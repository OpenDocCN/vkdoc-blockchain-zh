  trans: '

    ### 5.1.1 基于委员会的权益证明


    `基于链的`权益证明依然依赖哈希难题来创建区块。作为一种替代技术，基于委员会的权益证明遵循了更有序的流程：


    - 根据质押权益建立利益相关者委员会。

    - 允许委员会轮流创建区块。


    在全局网络中，通常采用安全的多方计算（MPC）技术来推选这样的委员会。MPC 是一种分布式计算方式，其中从不同输入出发的不同部分会产生相同的结果。


    基于委员会的权益证明中的 MPC 流程有效实现了以下功能：从所有股东瞄准的区块链当前状态中获取价值，并生成一个伪随机序列的股东（领导者序列），这些股东随后将组成提议委员会。（参见图
    5-2。）


    这个领导者序列对所有参与方而言都是相同的，并且拥有更高权威级别的参与方可以在该序列中占据多个位置。


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig2_HTML.jpg](img/520777_1_En_5_Fig2_HTML.jpg)


    **图 5-2** `CommitteeElect()` 与基于委员会的权益证明的通用流程


    ### 5.1.2 “无成本”难题


    在许多早期的基于链的权益证明系统中，既没有惩罚也没有激励措施。（参见图 5-3。）


    这会产生不良后果：如果多条链相互竞争，验证者的动机就是尝试在每条链上生成区块。这有两个基本原因：


    - 与工作量证明不同，验证者可以免费在多个分支上验证交易。因为构建区块不需要工作量证明，所以在每个分叉上生成区块的计算成本很低。

    - 验证者会在所有分叉上工作，因为这样对他们有利可图。如果验证者主要验证两条（或更多）链上的区块，他们将收集任意获胜分支上的交易费用。这增加了收集成功的概率。


    因此，问题是如果验证者指向每一个分叉，区块链将更容易受到双重花费攻击。


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig3_HTML.jpg](img/520777_1_En_5_Fig3_HTML.jpg)


    **图 5-3** 基于链的权益证明系统


    在工作量证明中，同时挖多个链没有激励。如果矿工将其哈希算力（计算能力）分散到两条链上，并不会增加他们挖出区块的机会。


    这个问题可以通过两种策略解决——Slash 机制和 Dunkle 机制。


    #### 5.1.2.1 Slash 机制


    这包括对同时在多条链上创建区块的验证者进行惩罚，以及提供作恶证据。在这种情况下，作恶验证者的保证金会被削减。激励结构因此发生改变。（参见图 5-4。）


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig4_HTML.jpg](img/520777_1_En_5_Fig4_HTML.jpg)


    **图 5-4** Slash 机制


    然而，要使这项技术解决问题，两个分支上每个区块的验证者选择必须相同，这就需要在分叉之前进行验证者选择。该解决方案存在某些缺点：


    - 节点必须频繁在线才能保持对区块链的安全视图。

    - 对中程验证者存在共谋风险的开放性（例如，在 30 个验证者中，有 25 个提前串通，对前 19 个区块发起 51% 攻击的情况）。


    #### 5.1.2.2 Dunkle 机制


    第二种方法是简单地对在错误链上创建区块的验证者进行惩罚。假设两个对立的链 A 和 B。在 A 上构建区块的验证者会在 A 上获得 +R 的奖励，但该区块的头部可以包含在
    B 中，而验证者会在 B 上受到 -F 的惩罚。换句话说，即使是试图“错误地”伪造链（次要链）的验证者也可能被惩罚。（参见图 5-5。）


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig5_HTML.jpg](img/520777_1_En_5_Fig5_HTML.jpg)


    **图 5-5** Dunkle 机制


    这里的洞见在于，你可以在权益证明内复制工作量证明的经济机制。


    在工作量证明中，在链上创建区块时犯错是有代价的，但这个成本隐藏在环境中。矿工必须消耗更多电力，并购买或租赁额外的硬件。或者，他们必须分割自己的计算资源，这并不方便。


    在这里，制裁措施被明确陈述。这种技术的缺点是使验证者面临更大的风险。


    由于这些原因，以太坊 2.0 正在计划其自己的权益证明机制，名为 Casper，采用 BFT（拜占庭容错）风格。


    ### 5.1.3 基于 BFT 的权益证明


    由于仍然采用最长链规则来保证区块的概率性最终性，基于链的权益证明和基于委员会的权益证明在很大程度上遵循了中本聪共识结构。相比之下，基于 BFT 的权益证明整合了一个额外的共识层，该层提供了区块的确定性快速最终确认。


    区块提议可以由任何权益证明机制（轮询、基于委员会等）执行，只要它向 BFT 共识层注入稳定的新区块流即可。


    除了标准方法之外，还可以采用检查点机制来确保区块链的目标得以实现。（参见图 5-6。）


    因此，最长链规则可以通过当前安全的检查点规则以安全的方式替代，以确定规范的主链。


    其中 `BlockGen()`：


    - 以与质押价值成正比的成功率选出提议的区块。

    - 因此，提议区块 `BlockFi BTC()`。

    - 参与将获胜区块最终化的共识 BFT 过程。


    返回获胜区块。


    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig6_HTML.jpg](img/520777_1_En_5_Fig6_HTML.jpg)


    **图 5-6** 基于拜占庭容错机制的权益证明通用流程

    '
- fmt: "# 5.2 Ethereum Casper\n\nThe FT approach (partially synchronous) allows validators\
    \ to vote on blocks using proof of stake techniques, which deliver one or more\
    \ forms of signed messages. The goal is to reach consensus and to identify and\
    \ punish any dishonest validators.\n\nLike the BFT consensus algorithms, the assumption\
    \ is that if 2/3 of the validators follow the protocol properly, then, regardless\
    \ of network latency, the algorithm will not be able to resolve conflicting blocks.\n\
    \nVitalik Buterin states that one of Casper's targets is to reach the economic\
    \ purpose. We can define this as follows:\n\n`B1` block is economically finalized,\
    \ with margin `$X` crypto security, if a customer has proof that (i) `B1` will\
    \ be part of the canonical chain forever, or (ii) those actors who caused the\
    \ restoration of `B1` are guaranteed to be economically penalized by an amount\
    \ of at least `$X`.\n\nObviously, the economic crypto safety margin must be high\
    \ enough. In fact, if we think of `X = $70` million, we understand that that block\
    \ it is part of the chain and it is very expensive to change it. The PoW does\
    \ not have these guarantees. It is a specific feature of the PoS.\n\nThe intention\
    \ is to make 51% attacks extremely expensive, so most validators working together\
    \ fail to restore the locks finalized without suffering an extremely great economic\
    \ loss. The economic purpose is achieved by asking those who want to participate\
    \ in the validation process to file a bet.\n\nIf the protocol determines that\
    \ a validator acted dishonestly, violating the rules of the protocol, then they\
    \ are punished, and their bet is cut.\n\nThe set of rules of the protocol are\
    \ called slashing conditions. The slashing conditions make it possible to determine,\
    \ beyond any reasonable doubt, when a validator has acted inappropriately (for\
    \ example, voting for numerous different blocks at the same time).\n\nOn the other\
    \ hand, there is a guarantee for validators who follow the rules of the protocol\
    \ not to violate any rule and not to incur any sanction.\n\nThere are also the\
    \ finality conditions, which describe when it is possible to consider a certain\
    \ finalized hash. A hash is considered finalized when at least 2/3 of the total\
    \ balances, deposited by the current set of active validators, are committed the\
    \ hash. Slashing conditions must satisfy two properties:\n\n* **Accountable safety:**\
    \ If two conflicting hashes are finalized, then it must be demonstrable that at\
    \ least 1/3 of the validators violated certain cutting conditions.\n* **Plausible\
    \ liveness:** A set of messages must exist so that 2/3 of the validators can transmit\
    \ to complete some new hashes without breaching the slashing conditions unless\
    \ at least 1/3 of the validators violated certain slashing conditions.\n\nAccountable\
    \ safety is what brings this idea of economic purpose: if two conflicting hashes\
    \ are finalized (i.e., a fork), then you have mathematical proof that a large\
    \ set of validators must have violated some cut conditions and you can present\
    \ evidence of this to the blockchain and penalize them.\n\nPlausible liveness\
    \ basically means it \"shouldn't be.\" It is possible that the algorithm remains\
    \ blocked and is unable to finalize anything.\n\n# 5.3 Casper Implementation\n\
    \n`Blocktree`, which is a tree data structure, is related to the blocks that have\
    \ just been generated and received in Casper. The actual object of the consent\
    \ is the checkpoint tree, which is a subtree of `blocktree`.\n\nIn particular,\
    \ for each epoch of consent (every 100 in height of the `blocktree` or every 1\
    \ in height of the checkpoint tree), each validator transmits to its peers one\
    \ vote for a block as a checkpoint.\n\nA checkpoint is the genesis block and each\
    \ block whose height in the `blocktree` is 100 or a multiple of 100. However,\
    \ the \"checkpoint height\" of a block whose height is 100k is simply `k`. In\
    \ `blocktree`, the block's height has to be divisible by 100.\n\nFor a better\
    \ understanding, see the checkpoint tree in Figure [5-7](#520777_1_En_5_Chapter.xhtml#Fig7).\n\
    \n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig7_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig7_HTML.jpg)\n\
    \nFigure 5-7\n\nCheckpoint tree: Dashed lines represent 100 blocks between checkpoints\n\
    \nThe height function is shown in Figure [5-8](#520777_1_En_5_Chapter.xhtml#Fig8).\n\
    \n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig8_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig8_HTML.jpg)\n\
    \nFigure 5-8\n\nCheckpoint tree with the height function\n\nThe grade consists\
    \ of justified source checkpoint (`CPs`) and their height `h(s)`. A destination\
    \ gates `CPT` and their height `h(t)` and the signature of the validator `S`.\
    \ It must be `h(t) > h(s)`.\n\nTherefore `<s; CPs; CPt; h(s); h(t)>` is the vote\
    \ of the validator.\n\nEvery vote is sent to the network and is weighted based\
    \ on the value of participation of the signatory (from their stake).\n\nIf the\
    \ pair of source-target control points `<CP[s]; CP[t]>` is voted from validators\
    \ who have more than 2/3 of the total bets deposited, then `CP[t]` is justified\
    \ and `CP[s]` are completed. All blocks between `CP[s]` and `CP[t]` are also completed.\n\
    \nCasper FFG depends on two so-called Casper commandments to ensure the security\
    \ of consent:\n\n1. There can't be two votes for the same checkpoint height from\
    \ the validator.\n2. The validator does not need to cast a new vote because the\
    \ scope of its existing vote includes the source-target.\n\nViolators face harsh\
    \ penalties, including forfeiture of stakes and a temporary betting prohibition.\
    \ Casper FFG can easily detect and apply the cutting rules since each vote is\
    \ signed with the validator's private key, which is received by validators.\n\n\
    In addition, the following conditions apply:\n\n* A supermajority link is defined\
    \ as an ordered pair of checkpoints `(a; b)`, also written `a -> b`, such that\
    \ at least 2/3 of the validators (that is, the set of validators whose deposit\
    \ sum is 2/3 of total) posted a vote with `a` source and `b` target. The supermajority\
    \ links can skip check-points. So it's okay if `h(b) > h(a) + 1`.\n* Two checkpoints\
    \ (`a` and `b`) are defined as conflicting if and only if they are nodes in distinct\
    \ branches, that is to say, one is not an ancestor or descendant of the other.\n\
    * A checkpoint is said to be justified if:\n  * It is the source\n  * Link `c0\
    \ -> c` has a supermajority\n\nA checkpoint `c` is said to be finalized if a supermajority\
    \ link `c -> c0` exists, and `c0` is a significant child of `c`. In the same way,\
    \ `c` is finalized if and only if `c` is justified. There must also be a supermajority\
    \ link `c -> c0`, in which the checkpoints `c` and `c0` are not conflicting, and\
    \ `h(c0) = h(c) + 1`. (See Figure [5-9](#520777_1_En_5_Chapter.xhtml#Fig9).)\n\
    \n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig9_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9\n\nThe justified `r -> b1 -> b2 -> b3` chain\n\nEIP 1011 contains\
    \ information about Casper FFG's current smart contract. A stakeholder becomes\
    \ eligible to participate by registering for the committed smart contract, which\
    \ encodes Casper FFG e and can be accessed via Ethereum transactions.\n\nHere\
    \ we report the `CheckpointTimes()` function (see Figure [5-10](#520777_1_En_5_Chapter.xhtml#Fig10)),\
    \ and then the Casper FFG (Casper the Friendly Finality Gadget) algorithm.\n\n\
    ![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig10_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10\n\n`CheckPointVote()`\n\nThen we report Casper FFG, as shown in\
    \ Figure [5-11](#520777_1_En_5_Chapter.xhtml#Fig11).\n\n![../images/520777_1_En_5_Chapter/520777_1_En_5_Fig11_HTML.jpg](images/520777_1_En_5_Chapter/520777_1_En_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11\n\n`CheckPointVote()`"
  raw: "## 5.2 Ethereum Casper\n\nThe FT approach (partially synchronous) allows validators\
    \ to vote on blocks using proof of stake techniques, which deliver one or more\
    \ forms of signed messages. The goal is to reach consensus and to identify and\
    \ punish any dishonest validators.\n\nLike the BFT consensus algorithms, the assumption\
    \ is that if 2/3 of the validators follow the protocol properly, then, regardless\
    \ of network latency, the algorithm will not be able to resolve conflicting blocks.\n\
    \nVitalik Buterin states that one of Casper’s targets is to reach the economic\
    \ purpose. We can define this as follows:\n\nB1 block is economically finalized,\
    \ with margin `$X` crypto security, if a customer has proof that (i) B1 will be\
    \ part of the canonical chain forever, or (ii) those actors who caused the restoration\
    \ of B1 are guaranteed to be economically penalized by an amount of at least `$X`.\n\
    \nObviously, the economic crypto safety margin must be high enough. In fact, if\
    \ we think of X = $70 million, we understand that that block it is part of the\
    \ chain and it is very expensive to change it. The PoW does not have these guarantees.\
    \ It is a specific feature of the PoS.\n\nThe intention is to make 51% attacks\
    \ extremely expensive, so most validators working together fail to restore the\
    \ locks finalized without suffering an extremely great economic loss. The economic\
    \ purpose is achieved by asking those who want to participate in the validation\
    \ process to file a bet.\n\nIf the protocol determines that a validator acted\
    \ dishonestly, violating the rules of the protocol, then they are punished, and\
    \ their bet is cut.\n\nThe set of rules of the protocol are called *slashing conditions*\
    \ . The slashing conditions make it possible to determine, beyond any reasonable\
    \ doubt, when a validator has acted inappropriately (for example, voting for numerous\
    \ different blocks at the same time).\n\nOn the other hand, there is a guarantee\
