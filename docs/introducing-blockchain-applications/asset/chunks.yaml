    ## 17.12 The Tools and Software'
  trans: '

    # 安全监控器测试与控制器重训练


    在测试监控器时，最好对其进行全面检验，以便收集更多数据并建立数据间的关联。这一环节与上述难度等级无关，因为它涉及任何可能与环境相关、能证明监控器何时运行良好、何时出现问题的要素，并且更多涉及较高层面的故障注入。


    安全监控器设置的可修改方式主要取决于其实现方法，而开发团队负责选择包含哪些问题以及包含多少问题。减少传感器读取的数据量或向观测结果中添加噪声是两种简单的选择。此阶段将教授如何更改软件的内部设置以获得"理想"版本，该版本将在整个控制器重训练过程中使用。


    ## 17.10.3 控制器重训练


    至此，我们已经收集了关于监控器和控制器行为的信息。每当从最新的检查点保存神经网络时，我们将研究这些数值因所用学习技术不同而产生的差异。


    如本章开头所述，我们正在研究一个由神经网络构建的控制器，该网络已使用强化学习技术进行训练。在这些方法中，利用奖励函数来告知网络其表现是"好"还是"坏"，并且该函数会在每个预测步骤进行计算。


    训练函数需要关键参数，并在算法的每次迭代中重新评估：


    - 网络的响应。

    - 执行动作时系统的当前状态。

    - 以特定方式完成任务所获得的奖励。


    在本阶段，我们将研究不同的神经网络训练技术如何影响系统的整体行为，特别关注安全监控器的效能。


    为开始研究此问题，我们确定了四种技术以及训练完成时的预期结果。这些结果是"预测"性的，因为我们不知道网络会对训练方法的修改做出何种反应，也不确定观察到的行为是否与预测一致。


    使用这种技术所制定的策略主要取决于奖励函数和通道的行为：


    - S1) 当汽车撞击到物体时，奖励函数更具惩罚性，但只要汽车未停止前进，刹车会获得稍高的奖励。

    - S2) 安全监控器与系统相连，如果发出警报，监控器的响应优先于网络的响应（安全制动）。

    - S3) 如果监控器发出警报，网络的活动将被监控器的活动所取代。由于像监控器一样行动，网络会获得一个良好的奖励。

    - S4) 如果触发警报，训练阶段将终止，并且网络会获得一个较差的奖励。


    我们估计，如果采用 S1，控制器故障间的平均时间/距离将会减少。对碰撞给予更高的负面激励，并对刹车（如果汽车未停止行驶）给予较低的正面奖励，应该会促使汽车选择刹车而非急转弯（这可能导致新的危险场景），从而增加故障间的时间和行驶距离。


    S2 的目标是"训练"网络，使其在监控器发出警报时进行刹车。因此，原先由监控器覆盖的"战争状态"可能变为安全状态。


    S3 在许多方面与 S2 类似。为像监控器一样行动提供正面激励，有望加速学习。


    S4 是目前最有前景的方法，并且有可能带来最有趣的结果。当安全监控器发出警报时，无论它触发的是真警报还是假警报，一个负面奖励和训练步骤的改变应该会迫使网络完全避免监控器介入的情况。从根本上说，我们预计安全组件的效能会显著降低。


    当四个控制器得到充分训练后，新设备将像第一阶段一样进行测试。对控制器和监控器估算相同的测量值，并将结果与实际检查点进行比较。


    ## 17.11 方法实现与结果


    本章将回顾所使用的工具、软件架构和技术实现，以及在整个分析过程中收集的数据。一个 DDPG 代理（DDPG Agent）被训练在城市环境中驾驶。训练期间，记录网络状态的检查点以便进行比较。为了提供关于自动驾驶汽车（AV）行为的独特视角，这些网络检查点在使用和不使用简单安全监控器的情况下都进行了测试。


    ## 17.12 工具与软件

    '
- fmt: "### 17.12.1 CARLA Simulator\n\n`CARLA`，由巴塞罗那大学研究人员创建的开源模拟器，用于构建具有精确物理模拟和数据传感器的逼真环境。该模拟器的目标是提供一个环境，使\
    \ AI 智能体能够被训练驾驶，具备对模拟设置的高度控制，以及可以修改以改善或降低数据质量或插入错误的真实传感器模拟。\n\n`CARLA` 设计为在客户端-服务器环境中工作。服务器本质上是一个使用\
    \ Unreal Engine 4 用 `C++` 创建的游戏。`C++` 的速度对服务器的功能至关重要：不仅必须模拟环境（包括行人/车辆移动、气候建模等），还必须模拟连接到系统的传感器所需的所有数据。\n\
    \n`CARLA` 目前的版本是 `0.9.7`，每个版本都带来了显著的改进，因其逼真度而进一步获得了专家的关注。不幸的是，当我们研究开始时，`CARLA\
    \ 0.9` 刚刚发布，我们所需的工具尚未在线提供⁵。\n\n由于为之前稳定版本 `CARLA` 完成的工作数量，最初使用了 `0.8.4` 版本。\n\n\
    `0.9` 之前的版本在您对模拟参数及其收集的数据的控制量上存在限制。这并不妨碍我们的研究，但确实在某种程度上限制了关于环境和系统的有用信息。其中一些缺陷在之前的模拟器版本中仍然存在，但在从\
    \ `0.8` 版本升级到 `0.9` 版本后，大部分问题已得到修复²。\n\n最严重的问题之一被揭示是坐标系。在 `0.9` 版本之前，开发者使用了 `UE4`\
    \ 的默认坐标系，尽管标准是右手坐标系，但它却是左手坐标系。这看起来是一个小问题，因为可以通过使用变换矩阵轻松解决。然而，由于时间限制，决定坚持使用开发者的方法，主要在分析阶段修改数据²。\n\
    \n此版本的 `CARLA` 包含四个传感器，它们都被用于实验中。由于 `Python` API，它们易于学习：\n\n*   摄像头\n    *   最终摄像头提供场景的图片。\n\
    *   深度图摄像头\n    *   为了理解环境中的深度，深度图摄像头为物体分配 `RGB` 值。\n*   语义分割摄像头\n    *   语义分割通过根据其类别以不同颜色呈现视图中的不同物体来对其进行分类。\n\
    *   基于射线投射的激光雷达\n    *   通过用激光束照射物体并测量反射光返回传感器所需的时间，光探测与测距（`LDR`）是一种检测环境并估计物体之间距离的技术。\n\
    \n在网络训练阶段使用了三种摄像头。三台场景最终摄像头安装在汽车上，使驾驶员能够观察周围环境。\n\n得益于深度图摄像头，车辆可以获取场景中物体之间距离的彩色图。语义分割通过联系服务器获取地面实况信息来提供图片分类功能。这无疑是对真实系统的简化，在真实系统中，最强大的图片软件本质上是独立训练的其他神经网络。误分类也可以被视为控制系统错误。\n\
    \n如果检测到潜在威胁，安全监视器不会“修复”误解释，而是会迅速且安全地做出反应以避免后果；因此，这种简化不会影响整个方法。\n\n此版本 `CARLA`\
    \ 的另一个可用传感器是基于射线投射的激光雷达。该传感器的参数可以轻松调整，以模拟真实的激光雷达，如 `Velodyne Lidar`，或模拟诸如低数据质量、噪声数据或数据丢失等缺陷。数据以点云格式生成。\n\
    \n由于在模拟中需要高硬件资源来模拟真实的激光雷达，因此使用了 `Velodyne64` 激光雷达的显著修改版本，其参数如下：\n\n*   通道数 = 64\n\
    \    *   系统总激光束数量。这些激光器沿 `y` 轴均匀分布。激光器越多，扫描精度越高。\n*   量程为 75 米\n    *   激光器的以米为单位的测量范围。\n\
    *   旋转频率 = 15 Hz\n    *   这些设置定义了扫描光束的旋转速率（以 `Hz` 为单位）。\n*   每秒 1,000,000 个点\n\
    \    *   传感器每张图片产生的点云数量。\n*   垂直视场边界（上边界 = 24米，下边界 = -2米）。距离是相对于传感器位置测量的。\n  \
    \  *   扫描的最小和最大高度。\n\n模拟器拥有用于修改传感器的 `Python` API，并且对模拟内容有大量控制，例如为生成、行人和车辆行为设置放样位置，以及场景中“参与者”的状态（如其位置和速度）。\n\
    \n所有这些信息以及地面实况值都由模拟器提供。可以使用与模拟相关的度量，例如模拟时间步长或每秒帧数。与参与者相关的度量包括车辆速度、碰撞严重程度和 `3D`\
    \ 加速度向量。\n\n在测试此工具期间，发现了一个激光雷达传感器数据的问题，该问题尚未解决。该问题导致车辆的边界框在移动时发生扭曲，从而导致数据质量非常差。经过大量调查，发现了一个更新版本的模拟器，其每辆车的边界框已被修改以生成正确数据。开发人员目前正在处理此问题，但如果没有人工干预源代码，则无法修复。"
  raw: "### 17.12.1 CARLA Simulator\n\nCARLA^([^(20)](#fn20)), an open-source simulator\
    \ created by University of Barcelona researchers, was used to construct a realistic\
    \ environment with accurate physics simulation and data sensors. The objective\
    \ of this simulator was to provide an environment in which AI agents could be\
    \ trained to drive, with a high level of control over simulation settings and\
    \ the simulation of real sensors that could be modified to improve or diminish\
    \ data quality or insert mistakes.\n\nCARLA is designed to work in a client-server\
    \ environment. The server is essentially a game created in C++ using Unreal Engine\
    \ 4\\. C++ speed is unquestionably critical to the server’s functionality: not\
    \ only must the surroundings be simulated (including pedestrian/vehicle movements,\
    \ climate modeling, etc.), but also all of the data required from the sensors\
    \ linked to the system\n\nCARLA is now at version 0.9.7, and each release brings\
    \ significant improvements, earning further attention from experts for its realism.\
    \ Unfortunately, CARLA 0.9 had just been released when our study began, and the\
    \ tools we needed were not yet available online⁵.\n\nVersion 0.8.4 was utilized\
    \ at first due to the number of jobs completed for the previous stable version\
    \ of CARLA.\n\nVersion prior to 0.9 have limitations on the amount of control\
    \ you have over the simulation’s parameters and the data it collects. This does\
    \ not obstruct our study, but it does limit the useful information about the surroundings\
    \ and system in some way. Some of these flaws still exist in previous simulator\
    \ editions, but the bulk of them were fixed after the upgrade from version 0.8\
    \ to version 0.9².\n\nOne of the most severe difficulties was revealed to be coordinate\
    \ systems. Prior to version 0.9, developers utilized UE4’s default coordinate\
    \ system, which is left-handed despite the standard being right-handed. This looks\
    \ to be a minor issue, since the problem may be easily solved with the use of\
    \ a transformation matrix. However, due to time constraints, it was decided to\
    \ stick with the developers’ method and modify the data mostly at the analysis\
    \ stage.²\n\nThis version of CARLA includes four sensors, which were all used\
    \ in the experiments. Because of the Python APIs, they’re straightforward to learn:\n\
    \n*   Cameras\n    *   A picture of the scene is provided by the final camera.\n\
    \n*   To understand depth in the surroundings, the depth map camera assigns RGB\
    \ values to items.\n\n*   CARLA (see [`http://carla.org/`](http://carla.org/))\n\
    \    *   A semantic segmentation classifies distinct items in the view by presenting\
    \ them in various colors based on their class.\n\n*   Lidar based on raycast\n\
    \nBy lighting the object with laser beams and measuring the time it takes for\
    \ the reflected light to return to the sensor, Light Detection & Ranging (LDR)\
    \ is a technique for detecting the environment and estimating the distance between\
    \ objects.\n\nThe three cameras were utilized throughout the network’s training\
    \ phase. Three scene final cameras are mounted on the automobile to allow the\
    \ driver to observe the surroundings.\n\nThe vehicle may acquire a color-map of\
    \ the distances between objects in the scene thanks to the depth map camera. Semantic\
    \ segmentation provides picture categorization features by contacting the server\
    \ for ground-truth information. This is undeniably a simplification of a real\
    \ system, in which the most powerful photo software is essentially other neural\
    \ networks that have been trained independently. A misclassification can also\
    \ be viewed as a control system error.\n\nIf a possible threat is detected, the\
    \ safety monitor will not “fix” the misinterpretation; instead, it will react\
    \ promptly and safely to avoid the consequences; hence, this simplification will\
    \ have no influence on the entire approach.\n\nThe other accessible sensor for\
    \ this version of CARLA is a raycast based Lidar. This sensor’s parameters may\
    \ be readily tweaked to mimic actual Lidars like the Velodyne Lidar or flaws like\
    \ low data quality, noisy data, or data loss. The Point Cloud format was used\
    \ to produce the data.\n\nBecause high hardware resources are required to mimic\
    \ a genuine Lidar in the simulations, a significantly modified version of the\
    \ Velodyne64 Lidar is used with the given criteria:\n\n*   Number of channels\
    \ = 64\n    *   The system’s total number of laser beams. These lasers are spaced\
    \ evenly along the y axis. The more lasers there are, the more precise the scanning\
    \ will be.\n\n*   The range is 75 meters.\n    *   The range of lasers in meters\n\
    \n*   Frequency of rotation = 15 Hz\n    *   These settings define the scanning\
    \ beams’ rotation rate (in Hz)\n\n*   1.000.000 scores per each second\n    *\
    \   The quantity of points produced by the sensor for each picture\n\n*   FOV\
    \ vertical boundaries (high = 24m, lower = -2m). Distances are measured in relation\
    \ to the sensor’s location.\n    *   Scanning’s min and max heights\n\nThe simulator\
    \ has Python APIs for modifying sensors as well as a lot of control over what’s\
    \ being emulated, such as seeding places for spawning, pedestrian and vehicle\
    \ behavior, and the status of “actors” in the scene, such as their position and\
    \ velocity.\n\nAll of this information, as well as ground-truth values, is provided\
    \ by the simulator. Simulation-related measures, such as simulation time-steps\
    \ or frames per second, might be used. Metrics connected to actors include vehicle\
    \ speed, collision severity, and the 3D acceleration vector.\n\nDuring the testing\
    \ of this tool, an issue with the Lidar sensor data was discovered, which has\
    \ yet to be rectified. The issue caused the bounding boxes of the cars to be warped\
    \ when they moved, resulting in very poor data. Following considerable investigation,\
    \ an updated version of the simulator was discovered, with the bounding boundaries\
    \ for each vehicle being modified to produce correct data. Developers are currently\
    \ working on this problem, but it cannot be fixed without human involvement in\
    \ the source code."
  trans: "\n### 17.12.1 CARLA 模拟器\n\n`CARLA`，由巴塞罗那大学的研究人员创建的开源模拟器，用于构建具有精确物理模拟和数据传感器的逼真环境。该模拟器的目标是提供一个环境，使\
    \ AI 智能体能够被训练驾驶，具备对模拟设置的高度控制，以及可以修改以改善或降低数据质量或插入错误的真实传感器模拟。\n\n`CARLA` 设计为在客户端-服务器环境中工作。服务器本质上是一个使用\
    \ Unreal Engine 4 用 `C++` 创建的游戏。`C++` 的速度对服务器的功能至关重要：不仅必须模拟环境（包括行人/车辆移动、气候建模等），还必须模拟连接到系统的传感器所需的所有数据。\n\
    \n`CARLA` 目前的版本是 `0.9.7`，每个版本都带来了显著的改进，因其逼真度而进一步获得了专家的关注。不幸的是，当我们研究开始时，`CARLA\
    \ 0.9` 刚刚发布，我们所需的工具尚未在线提供⁵。\n\n由于为之前稳定版本 `CARLA` 完成的工作数量，最初使用了 `0.8.4` 版本。\n\n\
    `0.9` 之前的版本在您对模拟参数及其收集的数据的控制量上存在限制。这并不妨碍我们的研究，但确实在某种程度上限制了关于环境和系统的有用信息。其中一些缺陷在之前的模拟器版本中仍然存在，但在从\
    \ `0.8` 版本升级到 `0.9` 版本后，大部分问题已得到修复²。\n\n最严重的问题之一被揭示是坐标系。在 `0.9` 版本之前，开发者使用了 `UE4`\
    \ 的默认坐标系，尽管标准是右手坐标系，但它却是左手坐标系。这看起来是一个小问题，因为可以通过使用变换矩阵轻松解决。然而，由于时间限制，决定坚持使用开发者的方法，主要在分析阶段修改数据²。\n\
    \n此版本的 `CARLA` 包含四个传感器，它们都被用于实验中。由于 `Python` API，它们易于学习：\n\n*   摄像头\n    *   最终摄像头提供场景的图片。\n\
    *   深度图摄像头\n    *   为了理解环境中的深度，深度图摄像头为物体分配 `RGB` 值。\n*   语义分割摄像头\n    *   语义分割通过根据其类别以不同颜色呈现视图中的不同物体来对其进行分类。\n\
    *   基于射线投射的激光雷达\n    *   通过用激光束照射物体并测量反射光返回传感器所需的时间，光探测与测距（`LDR`）是一种检测环境并估计物体之间距离的技术。\n\
    \n在网络训练阶段使用了三种摄像头。三台场景最终摄像头安装在汽车上，使驾驶员能够观察周围环境。\n\n得益于深度图摄像头，车辆可以获取场景中物体之间距离的彩色图。语义分割通过联系服务器获取地面实况信息来提供图片分类功能。这无疑是对真实系统的简化，在真实系统中，最强大的图片软件本质上是独立训练的其他神经网络。误分类也可以被视为控制系统错误。\n\
    \n如果检测到潜在威胁，安全监视器不会“修复”误解释，而是会迅速且安全地做出反应以避免后果；因此，这种简化不会影响整个方法。\n\n此版本 `CARLA`\
    \ 的另一个可用传感器是基于射线投射的激光雷达。该传感器的参数可以轻松调整，以模拟真实的激光雷达，如 `Velodyne Lidar`，或模拟诸如低数据质量、噪声数据或数据丢失等缺陷。数据以点云格式生成。\n\
    \n由于在模拟中需要高硬件资源来模拟真实的激光雷达，因此使用了 `Velodyne64` 激光雷达的显著修改版本，其参数如下：\n\n*   通道数 = 64\n\
    \    *   系统总激光束数量。这些激光器沿 `y` 轴均匀分布。激光器越多，扫描精度越高。\n*   量程为 75 米\n    *   激光器的以米为单位的测量范围。\n\
    *   旋转频率 = 15 Hz\n    *   这些设置定义了扫描光束的旋转速率（以 `Hz` 为单位）。\n*   每秒 1,000,000 个点\n\
    \    *   传感器每张图片产生的点云数量。\n*   垂直视场边界（上边界 = 24 米，下边界 = -2 米）。距离是相对于传感器位置测量的。\n\
    \    *   扫描的最小和最大高度。\n\n模拟器拥有用于修改传感器的 `Python` API，并且对模拟内容有大量控制，例如为生成、行人和车辆行为设置放样位置，以及场景中“参与者”的状态（如其位置和速度）。\n\
    \n所有这些信息以及地面实况值都由模拟器提供。可以使用与模拟相关的度量，例如模拟时间步长或每秒帧数。与参与者相关的度量包括车辆速度、碰撞严重程度和 `3D`\
    \ 加速度向量。\n\n在测试此工具期间，发现了一个激光雷达传感器数据的问题，该问题尚未解决。该问题导致车辆的边界框在移动时发生扭曲，从而导致数据质量非常差。经过大量调查，发现了一个更新版本的模拟器，其每辆车的边界框已被修改以生成正确数据。开发人员目前正在处理此问题，但如果没有人工干预源代码，则无法修复。\n"
- fmt: '### 17.12.2 Controller Settings


    The neural network that will select what action to take to move the automobile
    is the most essential element for the controller implementation. We required a
    framework with the following features.


    - A code for training.

    - There are no significant flaws in the codebase.

    - Create an atmosphere in which the network can communicate with `CARLA`.

    - Make a default training approach available.


    We chose Intel AI Lab’s reinforcement-learning platform `Coach` after analyzing
    all of the device applications for `CARLA`. This framework fulfills all of the
    following criteria: it is distributed as a Python package that may be edited.
    The project’s development team assures us that the product will be of high quality.
    There are also numerous settings to choose from as a starting point. Two of these
    choices include a `CARLA` simulator interface and a preset training strategy,
    which is precisely what we needed.


    The Deep Deterministic Policy Gradient method, introduced in 2015, is implemented
    in these settings. As demonstrated in the original work, this method performed
    well in tasks such as vehicle driving.


    - **P1**: The first setup perceives the environment using a single front camera
    as well as the additional data enhancement cameras given by `CARLA`. This preset’s
    agent will very definitely lack any sense of depth provided by the regular camera,
    instead depending only on the depth camera.

    - **P2**: Because the automobile is equipped with three conventional cameras as
    well as all of the data augmentation cameras described in the preceding section,
    this setup employs all of the cameras accessible in `CARLA` and has a much more
    fascinating design.


    The usage of data augmentation cameras allows us to ignore object misclassifications
    as well as other benefits such as estimating distances between objects. This is
    a simplified form of a true architecture, in which object recognition units are
    neural networks that must be educated and assessed differently, as stated in the
    prior section.


    A misclassification, on the other hand, would very definitely cause the controllers
    to act in unexpected ways, which the security monitor would have to be able to
    detect and perhaps correct. Sadly, even if the vehicle is being rewarded positively,
    the initial setting has a flaw that causes it to stop throttling. It would have
    been interesting to test this setup as well, to see how it impacts the safety
    monitor’s efficacy in terms of network data access.


    It’s crucial to note that our objective isn’t to create the “ideal” agent or autonomous
    vehicle. The codebase was examined, but owing to time constraints, we were unable
    to examine all of the specifics of the given implementation. This framework served
    as an illustration of the ideas discussed in this book.


    ### 17.12.3 Safety Monitor Implementation


    To begin the research, we required software that could read Lidar data and map
    the environment as well as detect impediments. This software must also be real-time
    and capable of communicating with `CARLA`. The latter is self-evident: the `CARLA`
    server must receive the “brake” order whenever an alert is triggered. The first
    required some thought: one might envision capturing the Lidar data ahead of time
    and then conducting the simulations using this data. Unfortunately, this method
    will not work since we are concerned not only with having a 100% accurate forecast,
    but also with the quality of monitor’s security measures.


    If the same measurement is made in two separate simulations and the results are
    somewhat different, the monitor may respond in a completely different way than
    it would have if the real-time data provided during the model had been used. If
    the precision of measurements is solely relevant to the research simulator, we
    can’t disregard the impact that a brake has on a particular experiment.


    A survey of the best “non-neural network” approaches, as well as an evaluation
    of the open-source instruments available, were done in order to build an appropriate
    security monitor. To process point cloud data, the `Point Cloud` library was chosen
    as the open-source library. It was written in C++ to achieve those objectives
    while processing large amounts of data. This library was initially released in
    2011, and each successive version has enhanced it, due in part to the large community
    that has helped with testing and debugging new features.


    This package contains a set of methods that implement the most common Point Cloud
    processing techniques. The steps for creating an object-detection module are outlined
    here:


    - **Down sampling:** With a considerable degree of redundancy and noise, a single
    check can produce 100,000 records. As a first step, a down sample is generally
    required to eliminate all of the “useless” data. The `Voxel Grid Filter` was selected
    for this stage after considerable consideration.

    - **Ground segmentation:** The first required step after downsampling (if necessary)
    is to filter out data that is worthless for object recognition, such as points
    relative to the ground. To distinguish the ground from the things we want to identify,
    these points must be filtered. In our implementation, we use the `RANSAC2` algorithm,
    which is a mechanism for distinguishing between “inliers” and “outliers.”

    - **Clustering:** This last stage is necessary to properly define what constitutes
    a scene item and which data points are linked to that item. Clustering techniques
    based on point proximity can be used to accomplish this. Because it is a range-finding
    approach calculating the Euclidean distance between points and the premise that
    dense points indicate the same item, the `Euclidean Clustering Technique` was
    chosen.

    - **Tracking and Avoidance of Objects:** Items identified in the first three components
    must be watched throughout time to determine if two objects observed in two sequential
    stages are the same entity. This is usually done by combining a failure safety
    procedure with physical models, such as the `Kalman Filter`, that anticipate their
    behavior over time.


    However, developing a `Kalman Filter` for such a complex model would have taken
    much too long, forcing us to put our study on hold. As a result, we streamlined
    the object identification and failure avoidance procedure as follows:


    - Only data from in front of the automobile is saved. This is a significant improvement
    to the concept, since the monitor can now only identify obstructions in front
    of the vehicle. However, while this will undoubtedly affect the safety monitor’s
    efficacy, the ideas discussed in the preceding section remain valid.

    - The failure prevention procedure used is based on `Mobileye`’s `Responsibility-Sensitive
    Safety` paradigm, which was proposed by Intel. When an item is detected, the speed
    of the object in relation to the system is calculated. If the system’s distance
    traveled in one second plus the distance is greater than the object’s distance
    traveled plus the space between the systems and the objects, a safety brake is
    engaged.


    Because the safety monitor is written in C++, an architecture to communicate data
    with `CARLA` was created, both to use the `Point Cloud` library and for performance
    considerations. The `CARLA` client’s point clouds. This data is analyzed in the
    same way as the previous phases, and if necessary, an alarm is given back to the
    client. If the monitor receives an alarm message, the controller’s operations
    are overridden, and a brake is applied. The object identification module was influenced
    by Engin Bozkurt’s open-source project. To adjust the detection algorithm settings
    to our purposes and to interface with `CARLA`, the software was heavily changed.'
