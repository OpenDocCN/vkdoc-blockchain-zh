- fmt: '# 1.2 What This Book Covers


    To implement blockchain effectively in a distributed system, you first need to
    understand the blockchain technology and its related components in depth. These
    are covered in Chapters [2](#520777_1_En_2_Chapter.xhtml)-[7](#520777_1_En_7_Chapter.xhtml).
    Since consensus algorithms are an important concept in a distributed system transaction,
    Chapter [8](#520777_1_En_8_Chapter.xhtml) includes a project related to this topic.


    After that, the book discusses real-time systems and scheduling. These are key
    ideas in distributed systems that are covered in Chapters [9](#520777_1_En_9_Chapter.xhtml)
    and [10](#520777_1_En_10_Chapter.xhtml). (With real-time systems, the book explains
    how scheduling works. When many processes have the same demands and time restrictions
    and must be efficiently handled by the scheduling policy, this is known as *homogenous
    process scheduling*.)


    The systems must first be modeled to develop a successful blockchain application.
    When modeling systems, the above-mentioned approach must be used. When using blockchain
    technology in a distributed system, you must model the blockchain layers as part
    of the distributed system modeling to get a clear image of the system architecture
    and the systems of systems (SoS) capabilities. The `BLOCKLY 4SOS` modeling approach
    is used to create all these models.


    To model SoS systems, you must include `BLOCKLY 4SOS` as part of model-driven
    engineering. In Chapters [11](#520777_1_En_11_Chapter.xhtml) and [12](#520777_1_En_12_Chapter.xhtml),
    these topics are discussed in detail.


    With the aid of cyber-physical systems projects, you might execute a mix of all
    of these approaches. The book presents five projects. They were created using
    a variety of programming languages, and Chapters [13](#520777_1_En_13_Chapter.xhtml)-[17](#520777_1_En_17_Chapter.xhtml)
    include source code and modeling languages. For each project, the components of
    cyber-physical systems are also discussed.


    The book comes to a close with Chapter [18](#520777_1_En_18_Chapter.xhtml), which
    discusses worldwide regulations connected to blockchain and distributed systems,
    as well as the future of blockchain-distributed systems-related initiatives.


    Let’s start with the fundamentals of blockchain; the blockchain and its components
    are discussed in the next chapter.


    # 2. An Introduction to Blockchain


    A *blockchain* is a sharable and immutable ledger that makes transactions and
    computations between systems easier and more secure and tracks assets across the
    business world.


    It is important to understand that an asset can be tangible or intangible. This
    includes intellectual property, patents, copyrights, trademarks, and so on. The
    blockchain concept is widely used in the business field.


    A blockchain (think of it as a “series of blocks”) is a sharable and unchangeable
    data package. Generally, it can be defined as a digital registry whose entries
    are joined in a series/chains of “blocks” and strung together in sequential order,
    and whose integrity is ensured using cryptography. Although its size will grow
    over time, it is unchangeable because its contents, once written, cannot usually
    be altered or deleted without the entire architecture being invalidated. Tracking
    or trading assets on a blockchain system reduces risks and costs for parties on
    both sides of the transaction.


    Note that these concepts belong to the broader group of distributed ledgers. (A
    *distributed ledger* is a shared ledger. It can be a public or private set of
    digital information that’s synchronized and geographically distributed in multiple
    countries, sites, or institutions, without requiring an administrator or centralized
    data management.) This means that these systems are based on a distributed ledger
    that can be read and changed by multiple nodes in a network.


    Moreover, the nodes involved do not need to understand each other’s behavior or
    identity, nor do they need to trust each other. To ensure integrity and consistency
    between different copies, the addition of a new block is governed worldwide by
    a common rule or protocol. When a block is approved from the network or system,
    each node needs to update its own private copy. Hence, the data structure guarantees
    no future manipulation.


    Systems developed with the blockchain and distributed ledger technologies have
    digitalization of data, decentralization, disintermediation, traceability of transfers,
    and transparency.


    Thanks to these characteristics, you can provide transactions in a centralized,
    monitored way and provide security for each transaction.


    ## 2.1 A Short History of Blockchain


    According to Wikipedia, the first blockchain was presented in 2008 by Satoshi
    Nakamoto and was implemented the next year, with the aim of acting as a “ledger”
    (a register of all transactions) for the nascent digital currency Bitcoin. Nakamoto
    used the words *block* and *chain* differently in the original article. In 2009,
    Nakamoto’s creation, Bitcoin, was used for the first time to purchase a physical
    asset: a pizza.


    In August 2014, with Bitcoin having already achieved some notoriety globally,
    the size of its blockchain reached 20 gigabytes. In March 2018, it exceeded 162
    gigabytes. In 2014, the term “Blockchain 2.0” began to be used to refer to a new
    way of using blockchain. The idea was to allow people excluded from the current
    monetization to be able to access a reliable and secure monetary deposit, protect
    their privacy, and monetize their information. According to some authors, it also
    has the potential to resolve the issue of social injustice by changing the way
    wealth is distributed.


    In 2017, the Nevada senate completely liberalized blockchain. In particular, Section
    4 of Senate Bill 398:


    - Prevents local authorities from imposing taxes on blockchain.

    - Prevents the request for any form of license for the use of blockchain.

    - Prevents any other requests on the use of blockchain.

    - Prevents local authorities from imposing taxes on blockchain.


    In April 2019, during the International Handicraft Exhibition, the first product
    (made in Italy) was presented in which the production steps were entirely traced
    using blockchain technology.


    The need to timestamp a digital document led to blockchain technology. You can,
    for example, write yourself a letter and send it through the mail. If you leave
    it unopened, you can guarantee that the letter was written before the envelope
    was postmarked. Businesses adopt increasingly complex processes into their daily
    operations to improve the credibility of their internal documentation in the event
    that they are questioned later. In the Internet world, transactions need to be
    done with digital stamps in a secure way. Secure time-stamped digital signatures
    can be created using Bitcoin or blockchain technology.


    Hash functions are used in all digital signatures. These methods accept any file
    and generate fixed-length fingerprints, which is a code that uniquely identifies
    the file. Anybody with access to the file may produce the code; however, constructing
    the file from the code is very difficult.'
