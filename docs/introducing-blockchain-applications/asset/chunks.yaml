- fmt: "# System Analysis Method\n\n## Preliminary Rounds and Introduction\n\nThe\
    \ objective of this research is to provide a preliminary testing approach for\
    \ monitoring emergence-related traits that arise in a controlled environment when\
    \ a control system interacts with a system administrator. An antiviral program's\
    \ software design was reduced to just two components:\n\n- **A controller:** A\
    \ neural network that has been taught to control the automobile using reinforcement\
    \ learning methods.\n- **A safety supervisor:** A system supervisor submodule\
    \ that uses data from a Lidar sensor to determine if the vehicle is approaching\
    \ an object too rapidly and applies an emergency brake if necessary.\n\nThe goal\
    \ of this study is to take a fresh look at the problem and assess its feasibility\
    \ in a controlled, simulated setting. Because the system is made up of two constituent\
    \ systems—controlling and monitoring—we believe that a point of view based on\
    \ emerging behavior emerging from the interplay of the systems might increase\
    \ the standard of the evaluation.\n\nThis section explains and explores a strategy\
    \ for investigating the safety level of an autonomous vehicle over time, which\
    \ includes observing the emergent behavior of a neural network operator and evaluating\
    \ it safely in a virtual environment.\n\nThe suggested framework is focused on\
    \ investigating the emergence that occurs as a result of the interplay of these\
    \ two constituent networks.\n\nWe are focused on how a monitor's efficacy changes\
    \ as the neural network learns and the effects of training techniques on a safety\
    \ monitor's efficacy.\n\nThe ability to enhance neural networks by training them\
    \ on datasets is one of their most appealing elements. One step of training involves\
    \ gathering data across `n` stages and revising the weights of the prediction\
    \ function.\n\nThe weights of the function indicate the network's status at epoch\
    \ after the training phases. A neural net should produce satisfactory results\
    \ after \"enough\" epochs. As the number of epochs required grows, the task gets\
    \ more difficult. Driving a car is a difficult task, and saving the weights of\
    \ every period is impossible.\n\nAs a result, we define a breakpoint for a neural\
    \ network `N` as a generic epoch of `N`. Assume `N` has completed thousand epochs\
    \ of training. If we save the weights of the usually suppose every 100 epochs,\
    \ we'll have ten checkpoints:\n\n```\nCheckpoint1 < checkpoint2 < : : : < checkpoint10\n\
    ```\n\nwhere `checkpoint1` represents the channel's weights at epoch 100, `checkpoint2`\
    \ represents the network's weights at epoch 200, and so on.\n\nTake a look at\
    \ a self-driving car that is undergoing testing on the road. Its objective is\
    \ to stay in the car as long as possible without crashing. As the automobile progresses\
    \ on its journey, the world around it will alter. It is possible that the chance\
    \ of a subsequent accident increases dramatically in specific system states, such\
    \ as when a person unexpectedly crosses the road. If and only if the controller's\
    \ action results in the pedestrian being struck, will we consider it a failure.\
    \ If the pedestrian is genuinely identified and the automobile strikes something\
    \ else while attempting to avoid it, the same logic applies.\n\nAny action taken\
    \ by the controller that might cause a crash is deemed a failure. When a potentially\
    \ damaging event occurs, such as when the chances of seeing a crash are higher\
    \ than normal, the controllers is destined to fail if and only if its attempts\
    \ to prevent the coming failure are unsuccessful. In this sense, we don't distinguish\
    \ between climatic changes that enhance the chance of an accident (e.g., a passenger\
    \ strolling down the street) and the controller's harmful actions at this stage\
    \ of the project.\n\nIt is the sensor's job to run security to prevent a system\
    \ failure if the controllers fails.\n\nIf the controller fails, the monitoring\
    \ must not only identify whether it succeeded or not, but also run a security\
    \ routine to keep the entire system from failing. We believe the monitor's actions\
    \ to always be safe in this initial step of analysis. That is to say:\n\n- The\
    \ network will be in a safe condition if the controller completes all of the stages\
    \ in the safety routine.\n- One of the following might cause the safety monitoring\
    \ to fail:\n  - The obstruction has not been found.\n  - The barrier is identified,\
    \ but the routine's execution is not completed.\n\nIf both the administrator and\
    \ the safety monitor crash, resulting in a failure, we evaluate the system to\
    \ have failed.\n\nWe may separate the system states into three groups based on\
    \ this concept:\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig14_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig14_HTML.jpg)\n\
    \n*Figure 17-14: The phase space of the system is shown*\n\n- **Safe States:**\
    \ States in which the controller does not require the monitor's assistance.\n\
    - **Alert States:** Situations that necessitate the monitor's intervention. The\
    \ safe state space would be reentered if the impending mishap was correctly detected\
    \ (and prevented).\n- **Failure States:** Areas where an accident has occurred.\
    \ It's vital to keep in mind that the monitor can't identify every circumstance.\
    \ There are some incidents that cannot be avoided and for which no monitoring\
    \ can save the system, resulting in a straight shift from a safe to a failure\
    \ state. (See Figure [17-14](#520777_1_En_17_Chapter.xhtml#Fig14).)\n\nWhat's\
    \ important is discovering the likelihood of a system failure and figuring out\
    \ how to reduce it. Simultaneously, we want to see how the efficacy of the safety\
    \ monitor evolves over time as the controller learns.\n\nThis is beneficial not\
    \ just for ensuring that the network improves during the learning, but also for\
    \ the controller to get a better knowledge of the monitor's use as they gain experience.\
    \ Because several checkpoints of the very same system are evaluated under the\
    \ same exact circumstances to discover how the operator's behavior changes over\
    \ time, this is necessary for the experimental activity.\n\nMultiple checkpoints\
    \ are required not just to ensure that the connection is developing, but also\
    \ to track how the efficacy of the monitor changes over time. Furthermore, as\
    \ you'll see in the following section, if multiple checkpoints from the same system\
    \ are tested in the same situations, it can obtain relevant metrics and compare\
    \ the behavior of two checkpoints in the same circumstance.\n\nSeveral scenarios\
    \ must be established before the analysis can begin. A scenario is a collection\
    \ of beginning conditions under which the automobile is to be tested (for example,\
    \ the car's spawn position, seeds used in random number generators). The difficulty\
    \ level for the given example is represented by the `pedix h`. The rationale for\
    \ this is that we want to test the car in the same beginning settings as previously,\
    \ with the exception of one aspect, so that we may learn more about what causes\
    \ the system to fail more frequently. The `h` variations should become more complicated\
    \ as time goes on while remaining realistic. Scenario `S` might be modified by\
    \ increasing the number of cars in the scenario or simulating climate change.\n\
    \nA tougher version of `scenario1` should arise from combining these two versions.\
    \ It's crucial to remember that these scenarios should not be modified after they've\
    \ been established because they'll be utilized to test all of the checkpoints.\
    \ The information gathered here will aid in the process of determining what makes\
    \ a scenario \"harder\" for some systems than others."
  raw: "## 17.9 System Analysis Method\n\n### 17.9.1 Preliminary Rounds and Introduction\n\
    \nThe objective of this research is to provide a preliminary testing approach\
    \ for monitoring emergence-related traits that arise in a controlled environment\
    \ when a control system interacts with a system administrator. An antiviral program’s\
    \ software design was reduced to just two components:\n\n*   **A controller:**\
    \ A neural network that has been taught to control the automobile using reinforcement\
    \ learning methods.\n\n*   **A** **safety supervisor** **:** A system supervisor\
    \ submodule that uses data from a Lidar sensor to determine if the vehicle is\
    \ approaching an object too rapidly and applies an emergency brake if necessary.\n\
    \nThe goal of this study is to take a fresh look at the problem and assess its\
    \ feasibility in a controlled, simulated setting. Because the system is made up\
    \ of two constituent systems—controlling and monitoring—we believe that a point\
    \ of view based on emerging behavior emerging from the interplay of the systems\
    \ might increase the standard of the evaluation.\n\nThis section explains and\
    \ explores a strategy for investigating the safety level of an autonomous vehicle\
    \ over time, which includes observing the emergent behavior of a neural network\
    \ operator and evaluating it safely in a virtual environment.\n\nThe suggested\
    \ framework is focused on investigating the emergence that occurs as a result\
    \ of the interplay of these two constituent networks.\n\nWe are focused on how\
    \ a monitor’s efficacy changes as the neural network learns and the effects of\
    \ training techniques on a safety monitor’s efficacy.\n\nThe ability to enhance\
    \ neural networks by training them on datasets is one of their most appealing\
    \ elements. One step of training involves gathering data across n stages and revising\
    \ the weights of the prediction function.\n\nThe weights of the function indicate\
    \ the network’s status at epoch after the training phases. A neural net should\
    \ produce satisfactory results after “enough” epochs. As the number of epochs\
    \ required grows, the task gets more difficult. Driving a car is a difficult task,\
    \ and saving the weights of every period is impossible.\n\nAs a result, we define\
    \ a breakpoint for a neural network N as a generic epoch of N. Assume N has completed\
    \ thousand epochs of training. If we save the weights of the usually suppose every\
    \ 100 epochs, we’ll have ten checkpoints:¹\n\nCheckpoint1 < checkpoint2 < : :\
    \ : < checkpoint10\n\nwhere checkpoint1 represents the channel’s weights at epoch\
    \ 100, checkpoint2 represents the network’s weights at epoch 200, and so on.\n\
    \nTake a look at a self-driving car that is undergoing testing on the road. Its\
    \ objective is to stay in the car as long as possible without crashing. As the\
    \ automobile progresses on its journey, the world around it will alter. It is\
    \ possible that the chance of a subsequent accident increases dramatically in\
    \ specific system states, such as when a person unexpectedly crosses the road.\
    \ If and only if the controller’s action results in the pedestrian being struck,\
    \ will we consider it a failure. If the pedestrian is genuinely identified and\
    \ the automobile strikes something else while attempting to avoid it, the same\
    \ logic applies.\n\nAny action taken by the controller that might cause a crash\
    \ is deemed a failure. When a potentially damaging event occurs, such as when\
    \ the chances of seeing a crash are higher than normal, the controllers is destined\
    \ to fail if and only if its attempts to prevent the coming failure are unsuccessful.\
    \ In this sense, we don’t distinguish between climatic changes that enhance the\
    \ chance of an accident (e.g., a passenger strolling down the street) and the\
    \ controller’s harmful actions at this stage of the project.\n\nIt is the sensor’s\
    \ job to run security to prevent a system failure if the controllers fails.\n\n\
    If the controller fails, the monitoring must not only identify whether it succeeded\
    \ or not, but also run a security routine to keep the entire system from failing.\
    \ We believe the monitor’s actions to always be safe in this initial step of analysis.\
    \ That is to say:\n\n*   The network will be in a safe condition if the controller\
    \ completes all of the stages in the safety routine.\n\n*   One of the following\
    \ might cause the safety monitoring to fail:\n    *   The obstruction has not\
    \ been found.\n\n*   The barrier is identified, but the routine’s execution is\
    \ not completed. If both the administrator and the safety monitor crash, resulting\
    \ in a failure, we evaluate the system to have failed.\n\nWe may separate the\
    \ system states into three groups based on this concept:\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig14_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig14_HTML.jpg)\n\
    \nFigure 17-14\n\nThe phase space of the system is shown\n\n*   **Safe States:**\
    \ States in which the controller does not require the monitor’s assistance.\n\n\
    *   **Alert States:** Situations that necessitate the monitor’s intervention.\
    \ The safe state space would be reentered if the impending mishap was correctly\
    \ detected (and prevented).\n\n*   **Failure States:** Areas where an accident\
    \ has occurred. It’s vital to keep in mind that the monitor can’t identify every\
    \ circumstance. There are some incidents that cannot be avoided and for which\
    \ no monitoring can save the system, resulting in a straight shift from a safe\
    \ to a failure state. (See Figure [17-14](#520777_1_En_17_Chapter.xhtml#Fig14).)\n\
    \nWhat’s important is discovering the likelihood of a system failure and figuring\
    \ out how to reduce it. Simultaneously, we want to see how the efficacy of the\
    \ safety monitor evolves over time as the controller learns.\n\nThis is beneficial\
    \ not just for ensuring that the network improves during the learning, but also\
    \ for the controller to get a better knowledge of the monitor’s use as they gain\
    \ experience. Because several checkpoints of the very same system are evaluated\
    \ under the same exact circumstances to discover how the operator’s behavior changes\
    \ over time, this is necessary for the experimental activity.\n\nMultiple checkpoints\
    \ are required not just to ensure that the connection is developing, but also\
    \ to track how the efficacy of the monitor changes over time. Furthermore, as\
    \ you’ll see in the following section, if multiple checkpoints from the same system\
    \ are tested in the same situations, it can obtain relevant metrics and compare\
    \ the behavior of two checkpoints in the same circumstance.\n\nSeveral scenarios\
    \ must be established before the analysis can begin. A scenario is a collection\
    \ of beginning conditions under which the automobile is to be tested (for example,\
    \ the car’s spawn position, seeds used in random number generators: : :). The\
    \ difficulty level for the given example is represented by the `pedix h`. The\
    \ rationale for this is that we want to test the car in the same beginning settings\
    \ as previously, with the exception of one aspect, so that we may learn more about\
    \ what causes the system to fail more frequently. The h variations should become\
    \ more complicated as time goes on while remaining realistic. Scenario S might\
    \ be modified by increasing the number of cars in the scenario or simulating climate\
    \ change.\n\nA tougher version of scenario1 should arise from combining these\
    \ two versions. It’s crucial to remember that these scenarios should not be modified\
    \ after they’ve been established because they’ll be utilized to test all of the\
    \ checkpoints. The information gathered here will aid in the process of determining\
    \ what makes a scenario “harder” for some systems than others."
  trans: "\n# 系统分析方法\n\n## 初步阶段与介绍\n\n本研究的目的是提供一种初步测试方法，用于监测控制系统与系统管理员交互时，在受控环境中出现的涌现相关特征。一款杀毒程序的软件设计被简化为仅包含两个组件：\n\
    \n- **控制器：** 一个通过强化学习方法训练来控制汽车的神经网络。\n- **安全监督器：** 一个系统监督子模块，它利用激光雷达传感器数据判断车辆是否过快接近障碍物，并在必要时施加紧急制动。\n\
    \n本研究的目标是以全新视角审视该问题，并在受控的模拟环境中评估其可行性。由于该系统由控制与监测两个子系统构成，我们认为，从系统间相互作用所产生的涌现行为这一角度出发，可能会提升评估的标准。\n\
    \n本节阐述并探讨了一种策略，用于研究自动驾驶汽车随时间推移的安全水平，其中包括观察神经网络操作员的涌现行为，并在虚拟环境中对其进行安全评估。\n\n所提出的框架专注于研究这两个组成网络相互作用所产生的涌现现象。\n\
    \n我们关注的是，随着神经网络的学习，监测器的效能如何变化，以及训练技术对安全监测器效能的影响。\n\n通过数据集训练来增强神经网络的能力是其最吸引人的特点之一。训练的一个步骤涉及在\
    \ `n` 个阶段收集数据，并修正预测函数的权重。\n\n函数的权重代表了网络在训练阶段结束后，某个时期的网络状态。经过“足够”多的时期后，神经网络应能产生令人满意的结果。随着所需时期数量的增加，任务难度也随之提升。驾驶汽车是一项艰巨的任务，保存每个时期的权重是不可能的。\n\
    \n因此，我们为神经网络 `N` 定义了一个断点，作为 `N` 的一个通用时期。假设 `N` 已经完成了数千个时期的训练。如果我们通常假设每 100 个时期保存一次权重，那么我们将得到十个检查点：\n\
    \n```\nCheckpoint1 < checkpoint2 < : : : < checkpoint10\n```\n\n其中 `checkpoint1`\
    \ 代表网络在第 100 个时期时的权重，`checkpoint2` 代表网络在第 200 个时期时的权重，以此类推。\n\n设想一辆正在进行道路测试的自动驾驶汽车。其目标是尽可能长时间地在道路上行驶而不发生碰撞。随着汽车在行驶过程中前进，其周围的世界会发生变化。在特定的系统状态下，例如当有人突然横穿马路时，随后发生事故的可能性可能会急剧增加。当且仅当控制器的动作导致行人被撞时，我们才将其视为一次失败。如果行人确实被识别到，而汽车在试图躲避时撞上了其他物体，同样的逻辑也适用。\n\
    \n控制器任何可能导致碰撞的行为都被视为失败。当一个潜在的破坏性事件发生时，例如观察到碰撞的几率高于正常水平时，当且仅当控制器防止即将到来的失败的努力不成功，那么该控制器注定要失败。在此意义上，在项目的这个阶段，我们不区分增加事故几率的气候变化（例如，行人在街上漫步）和控制器的有害行为。\n\
    \n如果控制器出现故障，传感器的任务是运行安全程序以防止系统发生故障。\n\n如果控制器失效，监测器不仅必须识别控制器是否成功，而且必须运行一个安全程序以防止整个系统失效。在这个初步的分析步骤中，我们认为监测器的动作总是安全的。也就是说：\n\
    \n- 如果控制器完成了安全程序中的所有阶段，网络将处于安全状态。\n- 以下情况之一可能导致安全监测失败：\n  - 未发现障碍物。\n  - 障碍物已被识别，但程序未执行完毕。\n\
    \n如果管理器和安全监测器都崩溃了，导致失败，我们则评估系统已失效。\n\n基于这个概念，我们可以将系统状态分为三组：\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig14_HTML.jpg](img/520777_1_En_17_Fig14_HTML.jpg)\n\
    \n*图 17-14：系统的相空间示意图*\n\n- **安全状态：** 控制器不需要监测器协助的状态。\n- **警戒状态：** 需要监测器干预的情况。如果即将发生的意外被正确检测（并预防），系统将重新进入安全状态空间。\n\
    - **失效状态：** 已发生事故的区域。需要牢记的是，监测器无法识别所有情况。有些事故是无法避免的，没有任何监测手段能挽救系统，从而导致从安全状态直接转变为失效状态。（见图\
    \ 17-14。）\n\n关键在于发现系统失效的可能性，并找出如何降低这种可能性。同时，我们想观察随着控制器的学习，安全监测器的效能如何随时间演变。\n\n\
    这不仅有助于确保网络在学习过程中持续改进，而且也有利于控制器在积累经验后，能更好地理解监测器的用途。由于同一系统的多个检查点是在完全相同的条件下进行评估，以观察操作员的行为如何随时间变化，这对于实验活动来说是必要的。\n\
    \n需要多个检查点不仅是为了确保连接正在发展，也是为了追踪监测器的效能如何随时间变化。此外，正如你将在下一节中看到的，如果来自同一系统的多个检查点在相同情况下进行测试，就可以获得相关指标，并比较两个检查点在相同情况下的行为。\n\
    \n在分析开始之前，必须建立若干场景。一个场景是一组起始条件，汽车将在这些条件下进行测试（例如，汽车的生成位置、随机数生成器中使用的种子）。给定示例的难度级别由\
    \ `pedix h` 表示。这么做的原因是，我们希望除了一个方面之外，在相同的起始条件下测试汽车，这样我们就能更多地了解是什么原因导致系统更频繁地失效。随着时间的推移，`h`\
    \ 变化应该变得越来越复杂，同时保持现实性。可以通过增加场景中汽车的数量或模拟气候变化来修改场景 `S`。\n\n结合这两个版本，应该会产生一个难度更高的\
    \ `scenario1` 版本。必须记住，这些场景一旦建立就不应修改，因为它们将被用于测试所有检查点。这里收集的信息将有助于确定，对于某些系统而言，是什么因素使得一个场景比其他场景“更难”。\n"
- fmt: "## 17.10 The Experimental Method\n\nThe method for this exploratory study\
    \ is broken into three stages:\n\n- **Stage 1:** Given `c` checkpoints of a neural\
    \ network and `nh` circumstances, the operator is assessed in all situations and\
    \ its runs are logged.\n- **Stage 2:** The security monitor is verified once it\
    \ has been connected to the system by repeating the tests that were performed\
    \ in Stage 1.\n- **Stage 3:** The network is retrained using various techniques\
    \ to enhance its efficiency from the previous checkpoint. After that, the updated\
    \ controllers and the safety monitor are evaluated in all of the specified situations.\n\
    \nWe’re interested in determining the neural network and monitor’s quality in\
    \ the first phase. This is accomplished in two phases. The controller’s `m` checkpoints\
    \ are tested in all circumstances in the first stage. We’re primarily interested\
    \ in seeing how the controller’s reliability varies in relation to these checkpoints\
    \ in this phase.\n\nThe issue of repeatability is one of the most difficult aspects\
    \ of evaluating a neural network. It’s quite improbable that the same neural network\
    \ would act in the same way in numerous runs if the beginning circumstances were\
    \ the same.\n\nBecause of this network characteristic, it’s feasible that the\
    \ mode of failure indicated in one of the scenario runs may never happen again,\
    \ or that the time necessary to do so would be unreasonably long. Because it is\
    \ hard to foresee all conceivable failure scenarios, we believe that this type\
    \ of situation approach may help in resolving this issue by creating more challenging\
    \ operating conditions in which the variables that cause a crash may be examined.\n\
    \nTo address the issue of repeatability, a black box was built for each test scenario\
    \ that was run. This method keeps track of the operator’s actions so that the\
    \ particular run may be looked at further to discover whatever went wrong with\
    \ the controller. These data may then be utilized to find out which dangerous\
    \ circumstances the controller safeguards at checkpoint `j`, and whether or not\
    \ these scenarios are still protected when the network is reviewed at checkpoints\
    \ `--:j + x`.\n\n### 17.10.1 Controller Test\n\nThe controllers are assessed in\
    \ solitude in each situation, at each difficulty level, until a crash occurs.\
    \ It’s still conceivable that there won’t be any failures recorded. Acceptable\
    \ acting criteria are outside the scope of this study, although they remain a\
    \ source of debate in academia; nevertheless, as mentioned in the previous section,\
    \ this issue may be resolved.\n\nSome of the difficulties that occurred during\
    \ the method development phase prompted the decision to isolate the controller\
    \ in order to test it. The primary challenges are consistency and non-intrusiveness.\
    \ As previously mentioned, the neural network’s repeatability problem is handled\
    \ by creating a black box that saves information about the car’s condition in\
    \ every frame. Because a safety-brake enforced by the monitor would almost certainly\
    \ modify the ambient circumstances for the duration of the simulator, we wouldn’t\
    \ be able to calculate controller performance metrics, we can’t test the entire\
    \ system (controller and monitor) at the same time.\n\nTesting the controller\
    \ in isolation aids in the resolution of these difficulties and serves as a warmup\
    \ for the second step. In all cases when the controller has been tested for each\
    \ complexity, the following must be computed at a minimum:\n\n![../images/520777_1_En_17_Chapter/520777_1_En_17_Figk_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figk_HTML.jpg)\n\
    \nOne of the most important metrics for assessing a system’s dependability function\
    \ `R(t)` is the Median Time to Failure, which is simple to compute under simulated\
    \ conditions and is used to determine the rate of the exponential function. Statistics\
    \ in the automobile sector, on the other hand, are frequently expressed in terms\
    \ of traveled distance, such as average distance to failure, collision incidence\
    \ per kilometer, and so on. If the parameters and simulation hardware are powerful\
    \ enough to conduct the computations at a defined time-step, it’s very simple\
    \ to flip the point of view on the data using this approach.\n\nWe expect the\
    \ following inequation to continue as long as the neural network is fully trained:\
    \ `Ri(t) 6 Rj(t)`, where `i` and `j` are two checkpoints, and `i j`. This may\
    \ be easily confirmed using the data collection method described previously.\n\
    \n![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig15_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig15_HTML.jpg)\n\
    \n**Figure 17-15**\n\nThe reliable function determines the likelihood that the\
    \ system will continue to work at time `t`. We anticipate that more experienced\
    \ drivers will be able to complete longer runs than less trained networks.\n\n\
    - Other information should be recorded as well, if the simulator used for testing\
    \ permits it, in order to improve knowledge of the controller’s behavior, such\
    \ as:\n  - The car’s instantaneous velocity and acceleration vector.\n  - What\
    \ the automobile collided with (another car, a walker).\n  - Set one or more destination\
    \ goals and track whether the vehicle meets them.\n  - If a crash happened at\
    \ time `t`, determine environmental conditions at time `t-x`. These figures are\
    \ crucial for distinguishing between “safe” and “catastrophic” failures. If a\
    \ fence is struck at less than 10 km/h, for example, it may be deemed a less harmful\
    \ accident than striking a person at the same speed.\n\nBecause a trained driver\
    \ causes fewer accidents than a newbie, we anticipate the reliable function to\
    \ increase as the controller learns, boosting the `MTBF`.\n\nIf the black box\
    \ utilizes better data, it’s also possible to track changes in the car’s behavior\
    \ in connection to the situation and difficulty level. If we double the number\
    \ of automobiles in the situation, for example, the number of crashes with other\
    \ barriers will almost certainly increase. If this is the case, the simulation\
    \ should be looked into more in order to focus the training strategy in a specific\
    \ direction, since this might result in the controllers colliding with walls while\
    \ attempting to avoid other automobiles."
