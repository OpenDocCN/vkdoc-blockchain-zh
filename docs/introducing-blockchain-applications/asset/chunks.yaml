- fmt: '### 3.2.1 Nakamoto’s Genius


    Understanding all of the predecessors that comprise elements of the Bitcoin design
    leads to an appreciation of Nakamoto’s truly great discoveries.


    `Proof-of-Work` (`PoW`) is used to protect the book master or ledger. `Proof-of-work`
    resolution is done by miners. Each miner solves a slightly different form of the
    challenge; thus the odds of success are proportional to the fraction of the world’s
    processing power that the miner owns. A miner who solves a problem can donate
    a new transaction block to the ledger, which is added to the ledger depending
    on the timestamp. A prospector who contributes a block is paid with units of recently
    produced coin in exchange for maintaining the ledger. If a prospector contributes
    to an invalid block or a transaction, it will most likely be eliminated by the
    majority of other prospectors who contribute to succeeding blocks, invalidating
    the block reward for the wrong block.


    Miners are mutually insured in this way, thanks to monetary incentives. Instead
    of the sophisticated method used to bring the computer system, Nakamoto’s genius
    is one of the individual components of Bitcoin. Nobody thought of encouraging
    the knots to be truthful. No one has thought of using a consent algorithm to avoid
    the twofold cost.


    To eliminate duplicate spending and ensure that the currency has value, Bitcoin
    requires a secure ledger. Miners must be rewarded in some way. The strength of
    the miner’s power, in turn, is used to safeguard the ledger. Otherwise, an enemy
    with more than 51% the world’s mining capacity may generate blocks quicker than
    the rest of the network, do double-spend computations or transactions, and completely
    rewrite history by avoiding the computer system.


    As a result, Bitcoin is launched with a well-balanced reliance on these three
    components.


    ## 3.3 Key and Address


    In order to have your own Bitcoins, that is, to spend them, it is necessary to
    have:


    - A collection of digital keys, including a private key and a public key

    - A Bitcoin address

    - A digital sign


    The `Elliptic Curve Digital Signature Method` is a cryptographic algorithm that
    underpins Bitcoin’s private and public keys. It’s used to make sure that only
    legitimate owners can spend money.


    ### 3.3.1 Private Key


    In the context of Bitcoin, a private key is a secret number that allows you to
    spend Bitcoins. Each Bitcoin wallet comes with one or more private keys kept in
    the wallet file. It is also used to make a digital signature.


    A private key is just a number that is created at random. It’s a signed 256-bit
    (32-byte) integer. Not all 256-bit unsigned numbers, however, are Bitcoin private
    keys. In fact, the standard `secp256k1` used by Bitcoin limits the number of valid
    private keys. `Secp256k1` is described in the standards for efficient cryptography
    and corresponds to the parameters of the elliptic curve used in Bitcoin public
    key cryptography (SEC). Keep in mind that the private key is utilized to generate
    the public key.


    ### 3.3.2 Public Key


    The argument is that a public key can be used to verify the authenticity of a
    signature (that is, produced with the correct private key). In general, the public
    key is created by multiplying the private key by an elliptic curve. Bitcoin is
    defined in the `secp256k1` constant and uses a constant elliptic curve and a set
    of mathematical constants.


    Starting with a private key `<< privkey >>` and multiplying it by a predefined
    dot on the curve called the *generator point* `G` produces a different dot on
    the curve, which corresponds to the public key `<< pubKey >>`. Usually, a public
    key can be defined by the coordinates of the point `«privkey»*G=«pubKey» = (x,y)`
    (see Figure [3-2](#520777_1_En_3_Chapter.xhtml#Fig2)).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig2_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** Example of an elliptic curve cryptographic function for calculating
    the public key


    The generating point `G` is described as part of `secp256k1`, and it is the same
    for all keys in Bitcoin. The private key `<< privKey >>` multiplied by `G` will
    have the outcome with the same public key `<< pubKey >>`. The connection between
    `<<privKey >>` and `<< pubKey >>` is constant. However it can only be computed
    in single direction, from `<< privKey >>` to `<< pubKey >>`.


    The (x; y) coordinates of a point on an elliptic curve can be used to describe
    the public key. Hexadecimal is the most commonly used format for storing data.


    Hence, there are two formats for public keys:


    - Uncompressed public key

    - Compressed public key


    Note that the uncompressed public key is the old format. It is generally no longer
    used in favor of the compressed format. Bitcoin originally used both `x` and `y`
    coordinates to store the public key. In this uncompressed format, the coordinates
    are simply strung together, and the prefix `04` is added to indicate that it is
    an uncompressed public key, as shown in Figure [3-3](#520777_1_En_3_Chapter.xhtml#Fig3).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig3_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig3_HTML.jpg)


    **Figure 3-3** Uncompressed public key


    With a compressed public key, the elliptical curve is symmetrical along the axis
    of X, as shown in Figure [3-4](#520777_1_En_3_Chapter.xhtml#Fig4).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig4_HTML.png](images/520777_1_En_3_Chapter/520777_1_En_3_Fig4_HTML.png)


    **Figure 3-4** Symmetry of the elliptical curve


    Hence, in the compressed public key format (see Figure [3-5](#520777_1_En_3_Chapter.xhtml#Fig5)),
    you only save the full `x` coordinates, along with a prefix indicating if `y`
    is even or odd.


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig5_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig5_HTML.jpg)


    **Figure 3-5** Compressed public key


    This format saves a lot of space on the blockchain.'
  raw: '### 3.2.1 Nakamoto’s Genius


    Understanding all of the predecessors that comprise elements of the Bitcoin design
    leads to an appreciate of Nakamoto’s truly great discoveries.


    Proof-of-Work (PoW) is used to protect the book master or ledger. Proof-of-work
    resolution is done by miners.


    Each miner solves a slightly different form of the challenge; thus the odds of
    success are proportional to the fraction of the world’s processing power that
    the miner owns. A miner who solves a problem can donate a new transaction block
    to the ledger, which is added to the ledger depending on the timestamp.


    A prospector who contributes a block is paid with units of recently produced coin
    in exchange for maintaining the ledger. If a prospector contributes to an invalid
    block or a transaction, it will most likely be eliminated by the majority of other
    prospectors who contribute to succeeding blocks, invalidating the block reward
    for the wrong block.


    Miners are mutually insured in this way, thanks to monetary incentives.


    Instead of the sophisticated method used to bring the computer system, Nakamoto’s
    genius is one of the individual components of Bitcoin.


    Nobody thought of encouraging the knots to be truthful. No one has thought of
    using a consent algorithm to avoid the twofold cost.


    To eliminate duplicate spending and ensure that the currency has value, Bitcoin
    requires a secure ledger. Miners must be rewarded in some way. The strength of
    the miner’s power, in turn, is used to safeguard the ledger. Otherwise, an enemy
    with more than 51% the world’s mining capacity may generate blocks quicker than
    the rest of the network, do double-spend computations or transactions, and completely
    rewrite history by avoiding the computer system.


    As a result, Bitcoin is launched with a well-balanced reliance on these three
    components.


    ## 3.3 Key and Address


    In order to have your own Bitcoins, that is, to spend them, it is necessary to
    have:


    *   A collection of digital keys, including a private key and a public key


    *   A Bitcoin address


    *   A digital sign


    The Elliptic Curve Digital Signature Method is a cryptographic algorithm that
    underpins Bitcoin’s private and public keys. It’s used to make sure that only
    legitimate owners can spend money.


    ### 3.3.1 Private Key


    In the context of Bitcoin, a private key is a secret number that allows you to
    spend Bitcoins. Each Bitcoin wallet comes with one or more private keys kept in
    the wallet file.


    It is also used to make a digital signature.


    A private key is just a number that is created at random. It’s a signed 256-bit
    (32-byte) integer. Not all 256-bit unsigned numbers, however, are Bitcoin private
    keys. In fact, the standard secp256k1 used by Bitcoin limits the number of valid
    private keys.


    Secp256k1 is described in the standards for efficient cryptography and corresponds
    to the parameters of the elliptic curve used in Bitcoin public key cryptography
    (SEC).


    Keep in mind that the private key is utilized to generate the public key.


    ### 3.3.2 Public Key


    The argument is that a public key can be used to verify the authenticity of a
    signature (that is, produced with the correct private key). In general, the public
    key is created by multiplying the private key by an elliptic curve. Bitcoin is
    defined in the `secp256k1` constant and uses a constant elliptic curve and a set
    of mathematical constants.


    Starting with a private key `<< privkey >>` and multiplying it by a predefined
    dot on the curve called the *generator point* `G` produces a different dot on
    the curve, which corresponds to the public key `<< pubKey >>`. Usually, a public
    key can be defined by the coordinates of the point `«privkey»*G=«pubKey» = (x,y)`
    (see Figure [3-2](#520777_1_En_3_Chapter.xhtml#Fig2)).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig2_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Example of an elliptic curve cryptographic function for calculating the public
    key


    The generating point `G` is described as part of `secp256k1`, and it is the same
    for all keys in Bitcoin.


    The private key `<< privKey >>` multiplied by `G` will have the outcome with the
    same public key `<< pubKey >>`. The connection between `<<privKey >>` and `<<
    pubKey >>` is constant. However it can only be compute in single direction, from
    `<< privKey >>` to `<< pubKey >>`.


    The (x; y) coordinates of a point on an elliptic curve can be used to describe
    the public key. Hexadecimal is the most commonly used format for storing data.


    Hence, there are two formats for public keys :


    *   Uncompressed public key


    *   Compressed public key


    Note that the uncompressed public key is the old format. It is generally no longer
    used in favor of the compressed format. Bitcoin originally used both x and y coordinates
    to store the public key. In this uncompressed format, the coordinates are simply
    strung together, and the prefix 04 is added to indicate that it is an uncompressed
    public key, as shown in Figure [3-3](#520777_1_En_3_Chapter.xhtml#Fig3).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig3_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Uncompressed public key


    With a compressed public key, the elliptical curve is symmetrical along the axis
    of X, as shown in Figure [3-4](#520777_1_En_3_Chapter.xhtml#Fig4).


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig4_HTML.png](images/520777_1_En_3_Chapter/520777_1_En_3_Fig4_HTML.png)


    Figure 3-4


    Symmetry of the elliptical curve


    Hence, in the compressed public key format (see Figure [3-5](#520777_1_En_3_Chapter.xhtml#Fig5)),
    you only save the full x coordinates, along with a prefix indicating if `y` is
    even or odd.


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig5_HTML.jpg](images/520777_1_En_3_Chapter/520777_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Compressed public key


    This format saves a lot of space on the blockchain .'
  trans: '

    ### 3.2.1 中本聪的天才之处


    理解构成比特币设计要素的所有前身技术，有助于我们领会中本聪真正伟大的发现。


    `工作量证明`（`PoW`）用于保护总账或分类账。`工作量证明`的求解工作由矿工完成。每位矿工解决的挑战形式略有不同；因此，其成功概率与其所拥有的全球算力比例成正比。解决难题的矿工可以向账本提交一个新的交易区块，该区块将根据时间戳被添加到账本中。贡献区块的矿工将获得新铸造的比特币作为奖励，以换取维护账本的服务。如果某个矿工贡献了一个无效的区块或交易，它很可能会被其他大多数为后续区块做出贡献的矿工所剔除，从而使错误区块的区块奖励失效。


    通过这种方式，由于货币激励的存在，矿工们相互之间形成了保险机制。与用于协调计算机系统的复杂方法不同，中本聪的天才之处在于比特币的各个组成部分。以前没人想到要激励节点保持诚实，也没人想到要使用共识算法来避免双重支付问题。


    为了消除双重支付并确保货币具有价值，比特币需要一个安全的账本。矿工必须以某种方式获得奖励。而矿工的算力反过来又用于保护账本的安全。否则，一个拥有超过全球 51%挖矿能力的敌手，可能比网络中的其他节点更快地生成区块，进行双重支付计算或交易，并通过绕过计算机系统来彻底重写历史。


    因此，比特币的诞生依赖于这三个组件之间精心设计的平衡关系。


    ## 3.3 密钥与地址


    为了拥有自己的比特币，即能够花费它们，你需要具备：


    - 一组数字密钥，包括一个私钥和一个公钥

    - 一个比特币地址

    - 一个数字签名


    `椭圆曲线数字签名算法`是一种加密算法，是比特币私钥和公钥的基础。它用于确保只有合法的所有者才能花费比特币。


    ### 3.3.1 私钥


    在比特币的语境中，私钥是一个秘密数字，允许你花费比特币。每个比特币钱包都包含一个或多个存储在钱包文件中的私钥。它也被用于生成数字签名。


    私钥只是一个随机生成的数字。它是一个有符号的 256 位（32 字节）整数。然而，并非所有 256 位无符号整数都是比特币私钥。事实上，比特币采用的标准`secp256k1`限制了有效私钥的数量。`Secp256k1`在高效加密标准中有详细描述，它对应于比特币公钥加密中所使用的椭圆曲线参数（SEC）。请记住，私钥用于生成公钥。


    ### 3.3.2 公钥


    关键在于，公钥可以用来验证签名的真实性（即，该签名是使用正确的私钥生成的）。通常，公钥是通过将私钥与椭圆曲线上的一个点相乘来生成的。比特币使用`secp256k1`常数中定义的固定椭圆曲线和一组数学常数。


    从私钥`<< privkey >>`开始，将其与曲线上一个称为*生成点* `G`的预定义点相乘，会在曲线上产生另一个不同的点，该点就对应着公钥`<< pubKey
    >>`。通常，公钥可以用点`«privkey»*G=«pubKey» = (x,y)`的坐标来定义（见图 3-2）。


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig2_HTML.jpg](img/520777_1_En_3_Fig2_HTML.jpg)


    **图 3-2** 用于计算公钥的椭圆曲线密码函数示例


    生成点`G`是`secp256k1`标准的一部分，对于比特币中的所有密钥都是相同的。私钥`<< privKey >>`乘以`G`的结果将得到与之对应的唯一公钥`<<
    pubKey >>`。`<<privKey >>`与`<< pubKey >>`之间的关系是固定的，但只能以单向方式计算，即从`<< privKey >>`到`<<
    pubKey >>`。


    椭圆曲线上点的 (x, y) 坐标可用于描述公钥。十六进制是最常用的数据存储格式。


    因此，公钥有两种格式：


    - 非压缩公钥

    - 压缩公钥


    请注意，非压缩公钥是旧格式。现在通常已不再使用，转而采用压缩格式。比特币最初使用`x`和`y`坐标来存储公钥。在这种非压缩格式中，坐标被简单地串联起来，并添加前缀`04`以表明这是一个非压缩公钥，如图
    3-3 所示。


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig3_HTML.jpg](img/520777_1_En_3_Fig3_HTML.jpg)


    **图 3-3** 非压缩公钥


    对于压缩公钥，椭圆曲线沿 X 轴对称，如图 3-4 所示。


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig4_HTML.png](img/520777_1_En_3_Fig4_HTML.png)


    **图 3-4** 椭圆曲线的对称性


    因此，在压缩公钥格式中（见图 3-5），你只需存储完整的`x`坐标，以及一个指示`y`坐标是偶数还是奇数的前缀。


    ![../images/520777_1_En_3_Chapter/520777_1_En_3_Fig5_HTML.jpg](img/520777_1_En_3_Fig5_HTML.jpg)


    **图 3-5** 压缩公钥


    这种格式在区块链上节省了大量空间。

