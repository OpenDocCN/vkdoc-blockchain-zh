  trans: '

    ### 18.3.4 分布式信息系统


    这些系统的目标是管理分布式信息。也就是说，我们拥有来自不同系统的信息片段，并希望以某种方式对其进行管理，使它们看起来像是全部存在于一个系统中。


    经典例子：分布式数据库。可能存在以下实现方式：


    - 分布式事务处理（或 TPS：事务处理系统）

    - 企业应用集成（EAI）


    **分布式事务处理。** 在事务系统中，ACID（原子性、一致性、隔离性、持久性）属性适用于数据库。


    具体来说，原子性指的是能够执行一整块指令，否则就什么都不做。一致性意味着所有的约束条件都得到了遵守。隔离性意味着多个并行事务互不干扰。持久性意味着当事务被提交后，操作的结果是永久性的。


    分布式事务系统比集中式系统具有更大的固有难点：它们可能会崩溃。试想我们正在处理多个数据库，每个数据库位于不同的系统中。如果在一个中间数据库中的任务失败，那么还需要取消所有先前已完成任务的数据库中的工作。


    通常使用**事务处理监控器**（TPM：Transaction Processing Monitor）来实现分布式事务系统。基本上，它采用一个中央系统来收集请求，并将其分发到不同的系统，精确地验证各个操作的进展情况。这样，信息是分布式的，但控制逻辑是集中式的。


    除了集成数据库，还可以考虑集成应用程序，从而接近企业应用集成的概念。


    在这种情况下，会有一系列配备了对等通信接口的服务器。通过访问包含所需信息的各个服务器来构建所需信息，然后进行适当组装。这种方法比 TPM 复杂得多。例如，考虑带有服务访问接口的
    Web 服务器。为了集成相关数据，需要对相关服务的响应进行处理。


    ### 18.3.5 分布式普适系统


    普适分布式系统是我们周围环境的一部分。构成它们的设备需要发现服务并适应环境。


    普适分布式系统的示例包括：


    - 家庭系统

    - 用于医疗保健的电子系统以及无线传感器网络


    一个典型的家用系统具有以下特点：


    - 自我管理

    - 自我配置

    - 个人空间


    电子医疗保健系统由传感器组成，这些传感器检测患者的健康指标（运动传感器、心电图等），并通过体域网（BAN）将其传输到一个集线器，该集线器收集这些数据并将其重新传输到中央存储库。


    另一种架构是通过持续的无线连接，将测量传感器连接到外部存储系统。与家庭系统不同，医疗保健系统不能采用单一服务器架构进行部署。


    医疗保健系统需要网络内计算能力。无线传感器网络（WSN）是分布在物理空间中的自主传感器系统，它们协作监控物理或环境条件。


    它们在以下方面受到严格限制：


    - 处理能力

    - 内存容量

    - 供电能力


    这些系统在以下方面尤其具有挑战性：


    - 能耗

    - 编程

    - 安全性

    - 路由

    - 软件工程

    - 中间件


    通常需要获取从传感器网络收集到的信息。有多种可能的架构。


    可以假设传感器之间不相互协作，也不存储收集到的数据，而只是将数据直接发送给操作员；或者，也可以采用能够处理并存储数据的传感器。作为对查询的响应，只有负责所请求数据的传感器才会发送答案。


    这些解决方案并不太理想，因为：


    - 能耗很高。

    - 需要限制返回给操作员的响应数据。


    由于这些原因，人们认为需要具备网络内处理能力。为此，可以使用发布/订阅（pub/sub）模式。


    ## 18.4 客户端与服务器架构剖析


    ### 18.4.1 客户端


    客户端的功能是允许用户与服务器进行交互。此功能可以通过多种方式实现。客户端可以通过仅向用户提供界面来提供对服务器服务的直接访问。在此上下文中，服务器完成所有工作。这种客户端被称为**瘦**客户端。


    一个例子是 X Window 系统机器，在这种系统中，客户端仅负责显示由服务器决定生成的图形。


    客户端也可能托管一些超越了纯粹图形界面的软件组件，承担部分应用逻辑，并逐渐发展到极端情况，例如自动取款机（ATM）和电视机顶盒。在这些情况下，用户界面可能成为客户端软件中占比较小的部分，而本地处理与通信支持则可能成为主要组成部分。


    到目前为止，我们讨论了软件的功能性需求。但也可能存在非功能性需求。


    例如，数据访问的透明性通常通过在客户端上运行一个软件模拟器来实现，该模拟器提供与服务器相同的接口，从而屏蔽差异（数据和通信格式）。


    租约、迁移和重定位通常通过命名系统并在客户端软件的配合下完成。例如，考虑一下你手机的工作方式。当你走路时，手机会测量它当前所连接小区的信号强度，并将其与它接收到的其他小区的信号强度进行比较。


    当参考小区的信号强度下降过多时，手机（即客户端）会触发更换参考小区的过程，请求连接到可用信号中最强的那一个。


    类似地，当处理嵌入式系统和多 TCP（传输控制协议）时，这意味着第四层（蜂窝网络）客户端会打开多个 TCP 通道（例如，通过无线网络和 WiFi）。它会将
    TCP 流量路由到性能最佳的通道上。如果当前通道的信号因你离 WiFi 接入点太远而变差，你的手机会将 TCP 流量切换到无线网络。实际上，如果两个信号都很好，它可以在两个网络上进行负载均衡。这是一个服务重定位的例子。即使是通信错误的屏蔽通常也在客户端侧完成。

    '
- fmt: '### 18.4.2 `Server`


    一个*服务器*是实现特定服务以供一组客户端使用的进程。组织服务器有多种方式。迭代式服务器直接处理请求并响应客户端。并发式服务器不直接处理请求，而是将其传递给一个单独的线程或进程，之后它们会等待下一个请求。


    并发式服务器使用线程或进程来实现。


    服务器工作的端口要么是已编录的，要么是已知端口。存在一些超服务器，它们可以启动其他服务器。当超服务器看到针对特定服务器管辖端口的调用时，它会激活该服务器。有一些
    UNIX 服务负责执行此工作。并且，超服务器仅适用于那些很少被调用的服务器。


    可能有必要为服务器建立两个通道：一个用于正常工作，另一个带外通道用于发送控制信息。一个经典的例子是 FTP。


    另一个需要考虑的方面是，可能有必要管理请求的状态。无状态请求的服务器被称为*无状态*服务器，而如果请求有需要处理的状态，则称为*有状态*服务器。


    无状态服务器不需要存储执行客户端所请求服务所需的信息。它只需通过发送所请求的数据来做出响应。如果它存储了与过去相关的某些内容，这些内容对于处理所请求的服务并非必需。Web
    服务器就是无状态服务器的一个例子。在这种情况下，如果需要保持状态信息，则必须将其保存在客户端（例如 Web 或 HTTP cookie）。


    相反，有状态服务器需要为每个已连接的客户端维护处理所请求服务所需的信息。例如，文件服务器需要为每个客户端维护正在进行中的请求状态，以防止两个不同的客户端同时对同一个文件进行写入。


    是否为每个客户端管理请求状态会产生非常显著的影响。无状态服务器的开发要简单得多。


    不仅因为它们需要保持控制的数据较少，更主要的原因是，如果无状态服务器崩溃，你可以直接重启它。你不需要重建状态。


    另一方面，如果有状态服务器发生故障，则有必要为每个客户端重建正在进行中的操作状态：这是一个复杂得多的操作。另一方面，有状态服务器通常速度更快，尽管更为复杂。


    ## 18.5 关于分布式系统的问题


    ### 18.5.1 中间件在分布式系统中的作用是什么？


    中间件是位于操作系统和架构层之间的一个软件层。它可以提供关于数据访问的透明性。例如，一个用 C 语言编写的客户端必须与一个用 Java 编写的服务器进行交互。Java
    虚拟机确保了对整数数据的统一定义。


    相反，C 编译器会对整数数据的内存访问进行优化，因此通常来说，不同硬件系统上的数据结构会有所不同。就像小端硬件系统和大端系统之间的数据格式可能不同一样。中间件可以解决这些关于数据访问的差异。但它还可以提供其他服务，例如提供一个通用的
    API 来编写其他服务。


    中间件用于提高分布式系统的透明性，而这种透明性在网络操作系统中通常是缺失的。也就是说，中间件增强了分布式系统应有的统一视图。


    ### 18.5.2 什么是（分布式的）透明性？


    分布式透明性是指向用户和应用程序隐藏系统具有分布式方面细节的能力。例子包括数据访问透明性、定位透明性、迁移透明性、重定位透明性、复制透明性、并发透明性、故障透明性和持久性透明性。


    ### 18.5.3 为什么在分布式系统中有时很难隐藏故障的发生及其恢复？


    因为通常情况下，无法区分以下两种情况：由于服务器宕机而长时间等待响应，与由于服务器响应缓慢而导致的相同等待。因此，当服务器实际上只是需要时间来响应时，系统可能会声明该服务不可用。


    ### 18.5.4 在开发分布式系统时使用两种不同的编程语言是否可行？


    一个用 C++ 编写的服务器程序提供了一个 `BLOB` 对象的实现，该对象可以被一个用 Java 编写的客户端程序访问。服务器和客户端可能有不同的硬件，但它们都连接到互联网。描述需要解决哪些问题，才能使客户端在服务器上调用一个对象的方法。


    在硬件和软件层面都需要解决一些问题。硬件可能具有不同类型的数据存储方式（高位优先 `MSB` vs. 低位优先 `LSB`），而软件使用不同的结构来管理数据（`C++`
    对象与用 `Java` 编写的相同对象不同）。因此，在这些情况下，有必要使用一个能够处理相关实现细节的框架。


    拥有不同的硬件意味着在从客户端到对象的请求和响应消息中，数据可能有不同的表示形式。必须为每种在客户端和对象之间双向传输的数据类型定义一个共同的标准。


    此外，计算机可能有不同的操作系统。因此，有必要处理不同类型的操作来发送和接收消息或执行方法调用。在 C++/Java 程序中会定义一个通用操作，该操作将被转换为所用操作系统内的特定操作。


    由于使用了两种不同的编程语言 C++ 和 Java，因此有两种不同的表示数据结构的方式。有必要为每种要传输的数据结构定义一个共同的标准，并为每种语言定义一种解释该标准的方法。


    ### 18.5.5 缓存和复制之间的区别是什么？


    *缓存*会复制部分数据，并且通常是在客户端进行。*复制*则会完整地复制一个节点，并且在服务器端进行。复制的一个好处是系统的可扩展性。


    复制的一个缺点是，在数据频繁更新的情况下，更新副本所需的数据流量和时间可能会变得难以承受。


    ### 18.5.6 什么时候使用集群计算机比使用网格计算机更合适？


    *集群*用于不同计算机之间通信速率要求高的场景。服务器通过高速数据网络连接。


    网格计算面向客户端/服务器类型任务的执行：分配一个任务，然后执行它。服务器通过互联网连接，可以属于不同的组织，并且节点可以具有不同的功能。


    ### 18.5.7 如何区分不同类型的分布式系统？


    *企业信息系统*管理分布在不同节点上的不同数据集，其目标是使整个数据集透明化，即就好像所有数据都集中在一个节点上一样。


    *普适计算系统*是分布在环境中的一组自治节点，它们协作以实现共同的目标。'
  raw: '### 18.4.2 Server


    A *server* is a process that implements a specific service used by a collection
    of clients. There are several ways to organize servers. Iterative servers directly
    handle requests and respond to clients. Concurrent servers do not handle the request
    directly, but pass it on to a separate thread/process, after which they wait for
    the next request.


    Concurrent servers are implemented with threads or with processes.


    The port on which the server works is either cataloged or is a known port. There
    are superservers that launch other servers. When a superserver sees a call on
    the port of competence of a particular server, it activates it. There are UNIX
    services that do this job. And it is worth using a superserver only toward servers
    that are rarely called.


    It may be necessary to have two channels to the server, one working, and the other
    out of band to send control information. A classic example is FTP.


    Another aspect to consider is the possible need to manage the status of the request.
    A server with stateless requests is said to be *stateless*, while if the requests
    have a state to handle, we have *stateful* servers.


    A stateless server does not need to store information necessary to perform the
    client’s requested service. It merely responds by sending the requested data.
    If it stores something related to the past, it is not something necessary for
    the processing of the requested service. The web server is an example of a stateless
    server. In this case, if you need to keep status information, you are forced to
    keep it in the client (as a web or HTTP cookie).


    Instead, a stateful server needs to maintain information for the processing of
    the requested service, for each connected client. For example, a file server needs
    to maintain the status of requests in progress from each client to prevent concurrent
    writes to the same file by two different clients.


    Whether or not to manage the status of the request for each client has a very
    significant impact. Stateless server development is much simpler.


    Not only because they have less data to keep under control, but mostly because
    if a stateless server crashes, you can just restart it. You don’t need to rebuild
    the state.


    On the other hand, if a stateful server fails, it is necessary to reconstruct
    the status of the operations in progress for each client: a much more complex
    operation. On the other hand, a stateful server is usually faster, albeit more
    complex.


    ## 18.5 Questions About Distributed Systems


    ### 18.5.1 What Is the Role of Middleware in a Distributed System?


    Middleware is a software layer placed between the operating system and the architectural
    layer. It can provide transparency regarding access to data. For example a client
    written in C, which must interact with a server written in Java. The Java virtual
    machine ensures a homogeneous definition of an integer data.


    Instead, the C compiler optimizes access to the memory of an integer data, consequently
    in general it has different structures for different hardware systems. Just as
    the format between Little Endian hardware systems can differ from Big Endian systems.
    Middleware can address these differences regarding data access. But it can also
    provide other services, such as a common API to program other services.


    Middleware is used to improve the transparency of the distribution, which is normally
    missing in the network operating system. That is, the middleware increases the
    unified vision that the distributed system must have.


    ### 18.5.2 What Is Meant By Transparency (of Distribution)?


    Distribution transparency means the ability to hide from users and applications
    the fact that the system has distributed aspects. Examples can be transparency
    in access to data, transparency in localization, transparency in migration, transparency
    in relocation, transparency in the reply, transparency to competition, transparency
    to faults, and transparency to persistence.


    ### 18.5.3 Why Is it Sometimes Difficult to Hide the Occurrence of a Failure and
    Its Recovery in a Distributed System?


    Because it is usually not possible to distinguish between a long wait for the
    response because the server is down, compared to the same wait because the server
    is slow in responding. Consequently, a system can say that the service is not
    available, when in fact the server just takes time to respond.


    ### 18.5.4 Is It Okay to Have Two Different Programming Languages for the Development
    of Distributed Systems?


    A server program written in C ++ provides the implementation of a BLOB object
    that can be accessed by a client program written in Java. Server and client may
    have different hardware, but they are all connected to the Internet. Describe
    what problems need to be resolved in order for a client to invoke an object method
    on the server.


    There are problems to be addressed at both the hardware and software levels. Hardware
    can have different types of data storage (MSB vs. LSB), and software use different
    structures for their management (C++ objects are different from the same objects
    written in Java). Consequently, in these cases it is necessary to use a framework
    that takes care of the related implementation details.


    Having different hardware means you can have different representations of the
    data in the request and response messages from client to object. A common standard
    must be defined for each type of data to be transmitted between client and object
    and vice versa.


    Furthermore, computers can have different operating systems. Therefore, it is
    necessary to deal with different types of operations to send and receive messages
    or to carry out method invocations. A common operation will be defined in the
    C ++/Java program, which will be translated into the particular operation required
    within the operating system used.


    Having two different programming languages, C ++ and Java, you have two different
    ways of representing data structures. It is necessary to define a common standard
    for each type of data structure to be transmitted, and a way of interpreting it
    for each of the languages.


    ### 18.5.5 What Is the Difference Between Cache and Replication?


    The *cache* copies some of the data, and usually does it on the client. *Replication*
    copies a node in its entirety and does so on the server. A benefit of replication
    is system scalability.


    A drawback of replication that, in the event of frequent data updates, the data
    traffic and the time required to update replicas can become unsustainable.


    ### 18.5.6 When Is It Appropriate To Use a Cluster Rather Than a Grid Computer?


    A *cluster* is used when the communication rate between different computers is
    high. The servers are connected with a high-speed data network.


    Grid computing is oriented toward the execution of client/server type tasks: a
    task is assigned, and it is executed. Servers are connected via the Internet and
    can belong to different organizations, and nodes can have different functions.


    ### 18.5.7 How Do You Differentiate Between Different Types of Distributed Systems?


    The *enterprise information systems* manage different sets of data distributed
    on different nodes, with the aim of making the total set of data transparent,
    that is, as if it were all centralized in a single node.


    *Pervasive systems* are sets of autonomous nodes, distributed throughout the environment,
    which collaborate to achieve a common purpose.'
