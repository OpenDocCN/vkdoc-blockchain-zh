  trans: '

    ### 存储的 Gas 费用


    `gas`不仅用于支付计算步骤，还用于支付内存使用。归档费用的计算有一些细微的差别。例如，由于内存的大幅增加会增加所有节点上以太坊状态数据库的大小，因此在归档时需要激励用户保持较小的数据量。


    因此，如果某笔交易存在一个清除存储空间条目的阶段，该交易的执行费用将被取消，并会发放退款以释放存储空间。此外，存储成本非常高。在开发智能合约时，我们有三种方式访问内存：


    - **栈**：访问易失性栈。

    - **内存**：访问易失性存储或内存。

    - **存储**：访问非易失性存储。其中非易失性存储的成本最高。


    图 4-20 展示了一个表格，列出了每次内存操作所需的 gas。


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig20_HTML.jpg](img/520777_1_En_4_Fig20_HTML.jpg)


    **图 4-20** 每次内存操作的 gas 费用列表


    总之，在以太坊上持续存储数据的成本极高。使用以太坊来存储数据是没有意义的。只应存储当前操作所需的数据；将归档任务委托给其他解决方案。


    然而，一个很好的方法是将默克尔树的根或基础哈希作为数据防篡改证明，仅归档到以太坊中，而数据本身存储在外部分布式服务上。


    理解智能合约在 gas 消耗或计算方面的情况，对于控制运营成本至关重要。


    有一些 API 可以估算交易成本以及智能合约的成本，但这超出了本书的讨论范围。最终，无论是计算操作还是归档操作，其成本都以 gas 单位进行衡量。当用户提交交易时，他们会为每个
    gas 单位提供一个 ETH 价格，以及他们愿意花费的 gas 单位数量。代码消耗的 gas 越低，其在执行代码所需的资源方面效率就越高。


    ### Gas 的目的


    以太坊运行的一个重要方面是，网络执行的每一个操作都是由所有全节点共同完成的。但你已经看到，以太坊虚拟机上的计算步骤可能成本更高。


    因此，以太坊智能合约主要用于基础活动，例如执行简单的业务策略、验证数字签名和其他加密对象，而非用于文件归档、电子邮件、机器学习以及通常会加重网络负担的更复杂用途。


    费用机制的引入可以防止用户过度使用。请注意，以太坊是一种完全图灵完备的语言，简而言之，它能够模拟任何算法。这也使得它可以创建循环，从而使以太坊容易面临程序无限执行的问题。


    如果没有费用机制，攻击者可能会通过在一个操作或动作中运行无限循环来企图拖垮网络，而无需承担任何后果。


    ## 交易与消息


    我们将以太坊区块链定义为一个基于交易的机器状态。因此，交易是一个可以改变以太坊区块链状态的事件。交易可以出于不同目的而创建：


    - 外部拥有账户之间的数字货币转账

    - 在以太坊区块链上部署智能合约

    - 在已部署的智能合约上执行函数


    交易只能由外部拥有账户创建和发送。


    ### 交易结构


    一条以太坊交易是一个字节数组。该数组被分为多个字段，如图 4-21 所示。


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Fig21_HTML.jpg](img/520777_1_En_4_Fig21_HTML.jpg)


    **图 4-21** 交易结构


    交易通过修改后的默克尔帕特里夏树进行维护，这在前文关于世界状态的章节中已详细讨论过。


    在此逻辑中，键由交易 ID 表示，值则正是交易本身。


    ### 交易数字签名流程


    我们按照维塔利克·布特林在影响以太坊的硬分叉后提出的 EIP（以太坊改进提案）方案，来演示签名交易的具体步骤，该方案可防范可能的重放攻击。使用旧方案也可以工作，但以太坊创始人建议使用新方案来保护自己免受重放攻击。可以在此处看到：


    ![../images/520777_1_En_4_Chapter/520777_1_En_4_Figa_HTML.jpg](img/520777_1_En_4_Figa_HTML.jpg)


    这由以太坊创始人提出，并附带了所有链的 ID 列表。


    一旦创建了交易，就会通过`RLP`函数对其进行序列化：


    ```

    L1 = RLP(T(T[n]; T[p]; T[g]; T[t]; T[v]; p; chainID; (); ()))

    ```

    其中，如果`T[t] = 0`，则 `p = T[i]`，否则 `p = T[d]`。


    序列化后，将应用名为 SHA-3（也称为 Keccak-256）的加密哈希函数：


    ```

    h1 = KEC(L(T))

    ```


    完成此步骤后，即可应用签名：


    ```

    ECDSASIGN(h(T); privKey) = (T[w]; T[r]; T[s])

    ```


    其中：


    - `T[w]` 是一个恢复标识符，其值为双倍再加 35 或 36

    - `T[r]` 是数字签名的 `randomPart`（随机部分）

    - `T[s]` 是数字签名的签名值


    因此，`T[r]` 和 `T[s]` 构成了 ECDSA 数字签名的输出（`randomPart`；`sign`），而 `T[w]` 则根据 `EIP155`
    计算得出，具有双重目的：


    - 防范重放攻击

    - 允许检索信息以快速恢复公钥


    实际上，发送者的地址并不存在于交易中。完成这一步骤后，字段 `T[w]`、`T[r]` 和 `T[s]` 会被添加到交易中，得到 `T(T[n]; T[p];
    T[g]; T[t]; T[v]; p; T[w]; T[r]; T[s])`。


    然后，对此应用 `RLP` 序列化函数：


    ```

    L2 = RLP(T(T[n]; T[p]; T[g]; T[t]; T[v]; p; T[w]; T[r]; T[s]))

    ```


    并再次应用 SHA-3 哈希函数：


    ```

    h2))

    ```


    最终得到的就是交易 ID。


