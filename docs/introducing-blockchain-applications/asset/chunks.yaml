    case 1:set_color(RGB(0,1,0));

    mydata->new_message = 1; break;

    case 2:set_color(RGB(0,1,0));

    mydata->new_message = 2;break;

    case 3:set_color(RGB(0,0,1));

    mydata->new_message = 3;break;

