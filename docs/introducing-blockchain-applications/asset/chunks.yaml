    ## 12.2 SoS 行为仿真环境


    在创建静态模型后，可以向任何块引入行为。用户可以通过右键点击受影响的块并选择 **添加行为** 来添加行为。可以使用 Python 编程语言编写行为，这代表了将在仿真过程中执行的代码（如图
    12-7 所示）。


    `init`、`start` 和 `run` 函数的标题可以指定，它们分别在上电启动时、块启动时和仿真执行时执行。服务块的 `run` 函数具有特定的含义，并作为
    TCP-IP 服务器呈现。^([1])


    在代码生成期间，为所有块创建的所有行为代码会合并到单个文件中。XML 和代码生成 模型可以在导入后，通过点击工具右上角的相应按钮，生成为 XML 和用于仿真的代码。^([1])


    以下格式用于为所有块生成唯一的对象名称：


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig7_HTML.jpg](img/520777_1_En_12_Fig7_HTML.jpg)


    **图 12-7** 链接到需求管理的块是此类块的示例


    - **仿真器的组件**。仿真器是一组用于运行设计者预期场景的 Python 脚本。仿真器的主要组件包括对象初始化器、目录、活动图、GUI、程序执行序列图、日志生成和时钟。


    - **对象初始化器**。仿真使用模型中描述的每个块的构造函数来对其进行初始化。单个输入被视为文本、数字或对象，而多个输入则被视为数组。


    在一些块（如 CS、Wrapper 或 CPS）中可以找到名为 `cardinality` 的成员。它指定了将要被仿真的项目数量。这是通过使用 Python
    的 `deep_copy()` 方法对原始对象进行操作来实现的。每个实例都会被赋予一个唯一的 ID，范围从 1 到 *n*，其中 *n* 是模型的基数。


    例如，以下模型生成了一个名为 `My_SoS` 的 SoS，其中包含 200 个名为 `cs_1` 的 CS。每个 CS 将拥有一个实例 ID 属性，其范围从
    1 到 200。


    日志是仿真器的关键组件之一。它是一种服务，用于跟踪 SoS 中各个 CS 提供的服务。CS 利用它来对特定服务进行分析。


    注册表在仿真器中作为 TCP-IP 服务器应用，允许 CS 添加、删除和更新它们自己的相关详细信息。


    通过拥有一个已知的公共注册表，可以在多个连接的计算机系统序列图集上执行仿真。用于序列图的相关块有助于创建明确的序列图，这些图可以直接转换为代码。在图表的情况下，仿真会复制用户创建的序列。


    因此，当仿真器启动并初始化后，从序列图生成的代码（见图 12-8）会立即运行。为了模拟一个场景，会将一个序列图连接到模型（见图 12-9）；该序列图是使用支持结构工具构建的。


    ![../images/520777_1_En_12_Chapter/520777_1_En_12_Fig11_HTML.jpg](img/520777_1_En_12_Fig11_HTML.jpg)


