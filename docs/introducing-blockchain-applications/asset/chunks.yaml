  trans: '

    ### 17.10.2 监控器或观察测试


    在操作员的运行记录完成后，即可开始监控器测试。在此阶段，我们不仅要评估安全监控器在防止崩溃方面的性能，还要寻找证据，以确定哪些情况对监控系统来说是“困难的”，哪些对控制器来说是“容易的”。


    由于控制器现在涵盖了之前由屏幕揭露的所有故障，并且其新颖行为所带来的风险已大到监控系统无法察觉，随着互联网骨干网的成熟，控制器的行为可能会演变到监控器不再能够检测到即将发生的故障的程度。


    另一方面，相反的情况也是一种可行的选择。例如，在早期阶段，控制器会“疯狂”地驾驶，进行许多突然的大角度转向并高速行驶。由于控制器的行为出乎意料，监控器将更难以预测未来状态。随着网络的学习，其运行会更加平稳，从而使监控器更容易发现潜在的事故。


    主要问题在于，随着网络的学习，监控器的效能可能会下降，导致其成为一个完全无用的组件，甚至可能对系统的性能有害：操作员可能发展得足够强大，能够覆盖之前检查点由屏幕涵盖的所有损害，从而产生一个无用的组件。如果我们认为监控器的活动完全安全，系统的整体安全性可能不会受到威胁，但安全监控器的安全性将导致更少的平稳行程。


    通过重复控制器测试阶段生成的运行来对监控器进行测试。起始条件也必须相同，并且必须保存在前一阶段的黑盒中。现在重复控制器的先前运行，同时将监控器连接到系统，并记录整个运行过程中发出的警告，以及它是否能够避免之前的碰撞。


    在此阶段的研究中，主要问题是非侵入性。由于上述原因，我们不能仅仅通过添加安全监控器并观察事态进展来重新运行模拟。如果触发警报，安全监控器会覆盖控制器的动作，从而改变运行的下一部分。理论上，如果你能区分假阳性和真阳性，这不成问题。然而，如果不开发软件传感器来监控和映射环境，我们将无法预测技术错误会是什么。


    因为这只是一个安全监控器，即使频率极低，也会有假阳性，因此这种方法无法解决问题。


    目标是跟踪操作过程中发出的警告，同时避免启动安全程序。由于我们将重复第一阶段的运行，因此能够精确地确定在崩溃之前切换到警报状态的具体时间点`t`。因为我们知道了`t`，基于此信息，所有在`t`之前的警报都是假阳性或误报。通过允许监控器在此时刻之后启动安全程序，可以近似估算覆盖率。


    如前一章所述，我们使用混淆矩阵来展示模型相对于真实值的预测值，以评估其在分类任务中的表现。然而，对于实时关键系统来说，测量所有指标即使不是不可能，也是非常困难的。尤其难以理解的是，当操作员避免了碰撞，但监控器却没有发出警报的情况。


    这使得计算真阴性的数量极其困难，因为在大多数情况下，此类实例只有通过操作员审查每一次单独运行时才能被识别出来，这给真阴性等指标带来了一定程度的主观性。


    例如，安全监控器的输入由一系列定时输入组成，这些输入可以被视为系统运行时环境的发展演变。因此，无法预测另一个状态会被警报还是被认为是安全的，因为我们不知道最终会导致崩溃的输入集合将从何时开始。


    由于监控器需要一定数量的真阴性，因此可计算的指标和比率是有限的。同时，安全监控器对每一帧的系统状态进行分类，收集激光雷达数据，对其进行评估，并决定是否需要安全制动。考虑到系统的实时性，我们可以将监控器未发出警报的任何一帧视为真阴性。使用这种方法，我们可以计算统计分类模型中所有广泛使用的指标。


    我们必须结合真假阳性和阴性，例如精确率和准确率，才能获得显著收益，因为由于前面所述的原因，真阴性的数量很可能远大于其他指标。由于假阳性率的公式为 `FP/(FP+TN)`，结果中会出现在第一个有效数字之前有许多零的数字。此外，为了提供一个可理解的假阳性比率度量，假阳性的数量是根据一次行程中行驶的距离来计算的。


    正确和错误操作员预测的比率如前所述确定，并可用于比较不同检查点：


    *   漏报率和警觉率

    *   特异性和后果

    *   正确率

    *   精确率

    *   马修斯相关系数

    *   每米假阳性率

    *   裁剪后的精确率-召回率曲线


    准确度和可靠性是根据一项 ISO 标准来选择的。准确度的概念已被预测真实度的概念所取代，而精确度则被解释为表示包含需要高精密度和准确度的随机误差的组合。评估混淆矩阵最有用的指标是马修斯相关系数，它被计算为所有预测的总和，并且已被发现能提供比
    F1 分数更准确的总体数据。


    我们选择不使用 `Fi`，因为它通常在不平衡数据集上表现不佳，导致结论根据数据集大小而过于乐观。由于存在大量的真阴性，并且我们关注监控器的整体效用，因此我们选择使用
    `MCC` 作为监控器性能的衡量标准。


    `每米假阳性数` 用于预测如果控制器和安全系统同时开启并一起运行时系统的行为，并量化后者错误安全制动的影响。`ROC2` 曲线，即分类器工具诊断能力的图形表示，本可以提供传感器功效的快速可视化表示，但这种方法无法实现。其
    x 轴由 `PR` 决定，y 轴由 `TPR` 决定。


    由于我们数据集的严重不平衡（根据真阴性的分类方式，假阳性的数量可能低于 `10^-2`），该图将在左侧被压平。因此，根据每个难度级别下每个检查点获得的数据，我们使用高度精确的裁剪来生成图形平均值，即通过定义
    x 轴为召回率、y 轴为精确率来生成的曲线。


    由于监控器仅根据激光雷达传感器提供的数据实时将状态定义为安全或危险，我们无法在改变制动决策阈值并展示完整曲线的情况下构建一个测试集来评估监控器。因此，我们计算了每个难度级别的历史数据，并展示了这些数值，以探究难度与监控器效能之间的关系，并将图形裁剪到包含预期值的区域。

    '
- fmt: '# Security Monitor Testing and Controller Retraining


    When testing the monitor, it''s a good idea to put it through its paces in order
    to gather additional data and develop links between the data. This element is
    unconnected to the level of difficulty mentioned above, since it is anything linked
    to the environment that may provide proof as to when the monitor is operating
    well and when it is not, and it is more involved with fault injection at a higher
    level.


    The ways by which a security monitor''s settings may be modified are mostly defined
    by how it''s implemented, and the development team is in charge of selecting what
    problems to include and how many to include. Reduce the amount of data read by
    the sensors or add noise into the observations are two easy options. This stage
    will teach you how to change the software''s internal settings to get the "ideal"
    version, which will be utilized throughout the controller retraining process.


    ## 17.10.3 Controller Retraining


    At this point, we''ve gathered information on the monitor''s and controller''s
    actions. Whenever the neural network is saved from the latest checkpoint, we will
    investigate how much these values differ depending on the learning technique used.


    We''re looking at a controller constructed up of a neural network that has been
    trained using reinforcement learning techniques, as described at the start of
    this chapter. In these methods, a reward function is utilized to inform the network
    whether it is functioning GOOD or BAD, and it is calculated for each prediction
    step.


    The essential parameters are required by the training function and are reevaluated
    at each algorithm''s iteration:


    - Response of the network.

    - The current state of the system where the action was performed.

    - A prize given for completing a task in a specific manner.


    In this phase, we''ll look at how different neural network training techniques
    impact the overall behavior of the system, with a focus on the security monitor''s
    efficacy.


    To begin our investigation into this issue, we identified four techniques as well
    as the expected consequences when the training is done. These results are "predicted"
    in the sense that we don''t know how the network will react to a modification
    in the training method or if the observed behavior will be the same as the one
    predicted.


    The strategies created using this technique are mostly dependent on the reward
    function and the channel''s actions:


    - S1) When the automobile strikes anything, the reward function is more punitive,
    but braking is somewhat more rewarded, as long as the car does not stop going.

    - S2) The security monitor is connected to the system, and if an alarm is raised,
    the monitor''s response takes precedence over the network''s (the safety brake).

    - S3) If the monitor raises an alarm, the network''s activity is substituted by
    the monitor''s. For acting like the monitor, the network receives a good reward.

    - S4) If an alarm is triggered, the training phase is terminated and the network
    is given a poor reward.


    We estimate the controller''s median time/distance among failures to be reduced
    if we use S1. Giving a higher negative incentive for crashes and a lower positive
    reward for braking (if the car does not stop driving) should encourage the car
    to choose braking over swerving (which might result in a new dangerous scenario),
    thereby increasing the time between failures and the distance traveled.


    The goal of S2 is to "train" the network to brake if the monitor raises an alert.
    As a result, the warring states formerly covered by the Monitor might become safe
    states.


    S3 resembles S2 in many ways. Providing a positive incentive for behaving like
    the monitors is expected to speed up learning.


    S4 is by far the most promising method, and it has the potential to provide the
    most intriguing outcomes. When the security monitor raises an alert, regardless
    of whether it''s a true or false positive, a negative reward and a change in the
    training step should compel the network to totally avoid instances where the monitor
    intervenes. Essentially, we expect the safety component''s efficacy to be significantly
    decreased.


    The new devices are tested as in Phase 1 when the four controllers have been sufficiently
    educated. For the controllers and monitor, the same measurements are estimated,
    and the results are compared to the actual checkpoints.


    ## 17.11 Method Implementation and Results


    The tools utilized, the software architecture and technique implementation, as
    well as the data gathered throughout the analysis, are reviewed in this chapter.
    A DDPG Agent1 was taught how to drive in a city setting. During the training,
    checkpoints of the network''s status were recorded for comparison. To provide
    a unique view on AV behavior, these network checkpoints were tested with and without
    a simple safety monitor.


