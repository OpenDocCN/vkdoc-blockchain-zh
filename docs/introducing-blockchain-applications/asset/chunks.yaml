- fmt: '# 17.8 Controller: The Problem with the Checker


    The connections between the `control sys` and the `sys admin` are at the heart
    of the vehicle’s motions. The `control sys`, often known as the *primary factor*,
    is the software that conducts the system’s major computations, which are required
    for the vehicle to run. To avoid catastrophic failures in this situation, fault-tolerance
    measures such as the system administrator are required. Due to high-reliability
    demands of these systems, this type of architecture is required in order to attempt
    to cover all conceivable failures. (See Figure [17-9](#520777_1_En_17_Chapter.xhtml#Fig9).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig9_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig9_HTML.jpg)


    **Figure 17-9** The system’s secure states are depicted in this diagram


    A safe condition is one in which the `control sys` generates an output that doesn’t
    cause the vehicle to crash. The system’s degree of safety may be represented as
    the union of the controller’s and supervisor’s failure regions, with an overlap
    region where the supervisor is truly damaging to the system’s performance.


    Consider a self-driving automobile on the road when an unexpected stumbling barrier
    arises. If the primary identifies the barriers properly, it should take a self-protective
    action to prevent going into alert mode.


    If the controller fails to detect the obstacle or detects it but continues to
    throttle, the controller is judged to have failed, and the fault features kick
    in, the controller switches from a safe to an alert state. It is now the `sys
    administrator`’s obligation to take remedial action to put the system into fail-safe
    mode. As a result of the failure of both elements, an administrator mistake will
    definitely force the system to fail, resulting in a failure state.


    The *clustering algorithm*, a unique table arrangement that allows visualization
    of a classification system’s performance, may be used to show the system supervisor’s
    probable actions. This is achieved by dividing the world into two categories:
    positive and negative.


    Assume we’re trying to tell the difference between white and black sheep in a
    flock. The `Positive Class` will be the black sheep’s class. A black sheep that
    has been identified as such is known as a `True +Ve`. White sheep make up the
    `-Ve` class, and each white sheep is a `True -Ve`. When a white or black sheep
    is misclassified, it is called a `False Positive` or `False Negative`¹. Actual
    and anticipated values are the two dimensions of this form of contingency table,
    as shown in Figure [17-10](#520777_1_En_17_Chapter.xhtml#Fig10).


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig10_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig10_HTML.jpg)


    **Figure 17-10** Matrix of perplexity table


    We need to specify what constitutes a good and bad classification in the realm
    of self-driving automobiles. Remember that a controller “failure” was defined
    as a transition from a safe position, in which the supervisor can manage the ecosystem
    without collapsing, to an alert state, in which the system would eventually collapse
    without the administrator.


    As a result, the `+ve` class represents the set of events that will ultimately
    cause the controller to fail, whereas the negative class represents the set of
    events that the controller successfully controls. We’ll put the administrator’s
    choice to distinguish between safe and alert statuses to the test. To accomplish
    this, we used the following definitions for positive and negative forecasting:


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig11_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig11_HTML.jpg)


    **Figure 17-11** True and erroneous predictions are represented graphically in
    the `sys`’s state space. The system’s present status is represented by dots. A
    blue dot indicates that no alert has been raised, whereas a red dot indicates
    that an alarm has been triggered by the monitor


    - **True Positive (TP):** Due to a controller failure, the system went into alert
    mode, which was correctly recognized and stopped by the controller.

    - **True Negative (TN):** The `sys` is in good working order, and the controller
    does not sound an alert.

    - **False Positive (FB):** Although the `sys` is safe, the monitoring signals
    an alarm.

    - **False Negative (FN):** The `sys` is on high alert, and the controller is unable
    to identify the threat.


    These raw numbers are just a starting point for more sophisticated and valuable
    measurements, which are generally given as rates and linked together using statistical
    laws, making them statistically comparable and straightforward to compute provided
    the amounts of right and erroneous predictions are known. These are some instances
    of these metrics:


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figc_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figc_HTML.jpg)


    - **Sensitivity (True Positive Rate):** Calculates the percentage of true +Ves
    that are accurately recognized as such.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figd_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figd_HTML.jpg)


    - **Specificity (True Negative Rate):** A metric that evaluates the percentage
    of true negatives that are accurately classified as being such.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fige_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fige_HTML.jpg)


    - ***Miss Rate*** (also known as the `False Negative Rate`): The percentage of
    real positives that are projected as negative.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figf_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figf_HTML.jpg)


    - ***Fall-Out:*** The fraction of real negatives projected as positives is measured
    by the fall-out (false positive rate).


    These four rates can also be coupled to provide a variety of other metrics that
    indicate the model’s forecast performance.


    Here are a few of the much more commonly utilized metrics:


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figg_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figg_HTML.jpg)


    - *Accuracy* is a metric for quantifying systematic mistakes in forecasts. Disparities
    between such a prediction and its “actual” value are caused by inadequate precision.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figh_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figh_HTML.jpg)


    - *Precision* is a measure of statistical variation in the model used for forecasts
    that is used to describe random mistakes in forecasts.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figi_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figi_HTML.jpg)


    - *Fβ-score* is a combined accuracy and sensitivities measure of a test’s reliability.
    This runs from 0 (worst value) to 1 (best value), and it is directly related to
    the true positive.


    Matthew’s Correlation Coefficient is an indicator of overall forecast quality
    that considers every cell in the confusion matrix. This measure runs from 1 (worst
    value) to 1 (highest value), allowing for a more comprehensive assessment of model
    correctness.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figj_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figj_HTML.jpg)


    The *ROC5 Curve Plot* is a graphical representation of a binary classifier’s effectiveness,
    with the x-axis indicating false positive rate and the y-axis indicating true
    positive rate, with the plot divided by the `y = x` line.


    Values above this line indicate “excellent” forecasts, while values below this
    line indicate “worse-than-random” forecasts, and values on the line indicate arbitrary
    guesses.


    All of these indicators may be computed and connected to one another if the real
    number of positive and negative expectations is known, making switching points
    of view of the analysis simple. We want to show that by utilizing this technique,
    we can estimate all of the quantities needed to compute complicated extra metrics
    like `Threat Score` and `False Discovery Rate`, which are reliant on the assessment’s
    needs.


    This is just a safety-related extension of the asymmetric fault-tolerant architecture
    for computer systems, with a primary component doing the major calculations and
    a primary checker detecting (and correcting) any primary defects. The challenge
    of determining the reliability of these simpler systems is well-studied in the
    publications.


    The chance of a system failing on a given input (or collection of inputs) is demonstrated
    to be tightly dependent on both the coverage of the primary checker and the coverage
    of the secondary checker in a paper released by Popov and Strigini in 2010.


    We want the primary to cover as much ground as possible in the case of self-driving
    cars. This is achieved by putting the neural networks that will drive the car
    through extensive training. The `control sys` must be able to manage the bulk
    of potentially hazardous occurrences if the network is “fully trained.” It’s feasible
    that, at some time, the controller learns to manage the system supervisor’s “alert
    states,” diminishing the supervisor’s total contribution to the software’s safety.
    (See Figure [17-12](#520777_1_En_17_Chapter.xhtml#Fig12).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig12_HTML.png](images/520777_1_En_17_Chapter/520777_1_En_17_Fig12_HTML.png)


    **Figure 17-12** The controller now captures all of the covered states in the
    past, as well as several that were previously only covered by the monitor


    Another scenario is that a part of the failure region covered by the controller
    becomes exposed during the training. This might lead to a scenario where certain
    formerly safe conditions are no longer safe.


    Because the system supervisor’s coverage area cannot vary without modifying its
    implementation, a transition to one of these states will invariably end in a failure.
    (See Figure [17-13](#520777_1_En_17_Chapter.xhtml#Fig13).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig13_HTML.png](images/520777_1_En_17_Chapter/520777_1_En_17_Fig13_HTML.png)


    **Figure 17-13** Although some of the states covered previously in the training
    are no longer covered, the controller now captures all the states covered in the
    past by the monitor


    When it comes to self-driving cars, we want the main to cover as much ground as
    possible. This is accomplished by rigorously training the neural networks that
    will control the vehicle. The management system should be able to handle the bulk
    of potentially harmful occurrences as long as the network is “fully educated”.


    The creation and execution of an experimental approach to examine these elements
    is presented and discussed in the following sections.'
