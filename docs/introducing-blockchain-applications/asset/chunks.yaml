    # 17.2 区块链用于信息共享与交换


    `Blockchain`对于物联网设备终端之间的数据共享与传输至关重要。它利用`BC`管理各个网络控制点、系统和服务器之间的无线通信网络。`BC`是一种物联网骨干技术，用于收集数据并将其分发至终端或最终节点。众所周知，`BC`在信息共享过程中为物联网节点和利益相关者提供了可追溯性、信任、隐私、安全性和透明度。


    `Blockchain`允许服务提供商和互联网公司基于客户隐私数据共享数据并批准互操作性。它还共享数据共享记录，以授权数据访问。数据可追溯性对于确保数据交换的合法性、可控性、可审计性和规范性同样重要³。


    信息应通过此区块链系统在终端之间以信任、安全和透明的方式进行通信。为获得数据访问权限，区块链共享数据共享记录。车辆驾驶员拥有自己的私有访问控制机制，以及共享或出售其数据的能力，如图
    17-2 所示。在此，运营商或通信服务提供商（`CSP`）提供以下优势：(1) 不发送任何私有数据，(2) 确认信息可被验证和修改，(3) 信息可追溯且防篡改。³


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig2_HTML.jpg](img/520777_1_En_17_Fig2_HTML.jpg)


    **图 17-2** 车辆管理系统中基于区块链技术的数据传输


    ## 备注


    在本章中，我们创建了一个结合了人工智能和区块链技术的项目（自动驾驶车辆管理）。其目标是侧重于人工智能，因为前一章已经大量讨论了区块链技术。这是人工智能、区块链和物联网等最热门技术的组合。在西方国家，有很多将这两种技术应用于应用程序开发的例子。


    在所有西方国家，自动驾驶汽车现已成为出行发展的主要支柱之一。欧盟委员会致力于支持任何能够帮助实现其智能与可持续出行计划中先前确立的可持续性和安全目标的互联与自动化出行解决方案。


    公共交通领域目前已存在具备自动驾驶功能的城市有轨电车和列车选项。未来几年内，我们可能会看到配备数字汽车共享系统的自动驾驶出租车在有限区域内运营。在私人交通方面，生产完全无人驾驶汽车的目标仍然遥遥无期，尤其是在交通拥堵地区。然而，在未来几年内，配备越来越先进自动驾驶功能的汽车将可供购买。一些城市甚至可能在十年内提供必要的基础设施，以开发能够部署部分自动驾驶功能的环境数字系统。即使这一变革将是渐进的，让我们期待一条全新的道路。


    目前，自动驾驶是汽车领域面临的最大挑战之一。开发其人工智能已进化到能够在无需人工干预的情况下驾驶，并且能够在千分之几秒内做出基本决策的汽车绝非易事。在对交通开放的公共道路测试阶段，涉及自动驾驶汽车的事故并不少见，但我们正一步步迈向无需人工干预的、越来越先进的车型。


    ## 自动驾驶车辆管理的优势包括：


    * **多任务处理：** 驾驶员可以专注于完全不同的活动。

    * **安全性：** 传感器和预测算法将使自动驾驶汽车能够评估，并在某些情况下预测风险。得益于安全驾驶，道路交通事故的数量将会减少。

    * **效率：** 可以避免急刹车和突然加速，从而优化燃油消耗。

    * **减少拥堵：** 一旦上路，车辆之间将不断通信，交换有关位置、行驶速度以及其他有助于交通合规的有用信息。

    * **无排斥性：** 自动驾驶汽车也可供残障人士使用。事实上，它们不需要特别的体能技能。只需向你的无人驾驶司机指明目的地即可。


    计算机现在在我们的文化中扮演着至关重要的角色。如今，这些系统被用于医学到航空电子等各个领域的多种应用，其中也包括相对较新的新兴技术——人工智能。


    由于这些技术应用于新的领域，“计算机系统”的概念需要被重新定义。这些系统中的大多数必须在严格的时间限制内完成其任务，否则可能导致灾难性后果，包括大规模破坏、人身伤害甚至死亡。


    当系统必须遵守严格的时间限制时，我们称之为*关键系统*。当一个系统的故障可能带来灾难性后果，对环境、基础设施或人员造成严重损害时，我们称之为*安全关键系统*。


    在某些情况下，这些系统在物理环境中使用。自动驾驶汽车就是此类系统的一个例子：它由一个执行完成指定任务所需计算的计算机系统和一个物理组件组成，该物理组件通过改变环境和平台的状态来与环境交互。


    由于这些系统如此普遍，而一旦失效又极其危险，因此在其设计和开发过程中满足并确保其（通常为）超高可靠性标准至关重要。系统的可靠性是衡量其“可信赖”程度或其提供准确服务能力的指标。


    故障是导致给定服务中断的事件。关键系统的*可靠性*被定义为一组理论和实践指标。让我们更仔细地探讨最重要的指标。

    '
- fmt: '## 17.3 Dependability and Safety


    A critical system’s *dependability* is described as a collection of *quantitative*
    indicators. Here are a few of the more important ones:


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figa_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figa_HTML.jpg)


    - *Availability* is a metric that compares the frequency of right versus faulty
    service.


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Figb_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Figb_HTML.jpg)


    - *Reliability* refers to a system’s capacity to deliver consistent service.

    - *Safety* is defined as the absence of catastrophic effects in the event of a
    failure.


    Because safety standards necessitate a quantifiable measure, the safety of a system
    is frequently described by integrating additional metrics like the Mean Time to
    the Next Catastrophic Failure.


    - *Maintainability* refers to the ability to maintain and restore a system after
    it has failed. This factor has an impact on availability.

    - *Coverage* is a metric for how effective the system’s fault-tolerance measures
    are at preventing, avoiding, or correcting problems.


    A *risk* is something that threatens the system’s reliability: it’s an “event”
    that causes the system to offer erroneous service. Threats can take various forms
    and originate from a variety of places, such as incorrect specification or incorrect
    execution of a requirement, or disasters.


    When it comes to system reliability, we want to make sure that the service is
    always right. A failure occurs when a service transitions from being accurate
    to being wrong. The requirement of minimizing probable transitions from a stage
    of suitable service to a stage of false service leads project deployment while
    building a critical system. (See Figure [17-3](#520777_1_En_17_Chapter.xhtml#Fig3).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig3_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig3_HTML.jpg)


    Figure 17-3


    Correct vs. incorrect services


    We should differentiate between benign and catastrophic failures when assessing
    the reliability of safety-critical systems. With benign failures, the system may
    not provide the best service possible, but it will remain safe. In instances when
    these systems and people operate in close proximity, unsafe service can have disastrous
    effects such as environmental damage, disturbance of the system’s infrastructure,
    or even fatal accidents. Consider a self-driving automobile as an example. Consider
    a situation in which the automobile is traveling under “regular” conditions when
    an obstruction appears in front of it.


    Despite the fact that a screeching halt and subsequent ride interruption is a
    failed state, it is considered a benign failure because nobody was injured. Apart
    from this, a scenario in which the vehicle accelerates toward a barrier (and eventually
    collides with it) is deemed a dangerous failure since the occupants may be seriously
    injured. (See Figure [17-4](#520777_1_En_17_Chapter.xhtml#Fig4).)


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig4_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig4_HTML.jpg)


    Figure 17-4


    States


    We want to discover all probable failures to assess the reliability of safety-critical
    systems. The researchers used the faulty mistake failure chain, which is well-known
    among academics and policymakers alike, to accomplish their goal:


    ![../images/520777_1_En_17_Chapter/520777_1_En_17_Fig5_HTML.jpg](images/520777_1_En_17_Chapter/520777_1_En_17_Fig5_HTML.jpg)


    Figure 17-5


    Fault, error, and failure


    - A fault is an error with an adjudicated or speculated cause.

    - Error: A portion of the system’s condition might result in the failure.

    - Failure: The circumstance in which a mistake enters the service interface, causing
    the entire system’s service to be disrupted. (See Figure [17-5](#520777_1_En_17_Chapter.xhtml#Fig5).)


    When a mistake has progressed to the point that it can no longer be corrected,
    a system’s dependability is determined by a collection of four approaches aimed
    at preventing or mitigating the impact of potential failures:


    - **Fault Prevent the Occurrence:** Methods of preventing failures from occurring
    or being introduced.

    - **Fault Tolerance:** Methods for allowing defects to be tolerated. Even if a
    failure occurs, the system is still capable of providing proper service.

    - **Fault Rid:** Lowering the quantity or severity of system defects.

    - **Fault Predicting:** Estimating the current number, future occurrence, and
    potential effects of defects using statistical approaches. The validation procedure
    is used to assess the efficacy of the steps taken to meet a system’s dependability
    criteria.


    System requirements confirmation is a method that must be followed throughout
    the development phase, including at the start of the design process. For each
    stage of the system development process, there are a number of validation techniques
    to choose from:


    - **Numerical Modeling:** Methods for modeling system capabilities using numerical
    models with a simple analytical solution. In other words, a quantitative analytic
    function may be used to express changes in the system. These models include the
    Sequential model and the State-Based model.

    - **Simulation:** In a simulated environment, there is an empirical estimate of
    system reliability. This approach allows you to test if a certain fault-tolerance
    mechanism operates without causing damage to the real system.

    - **Measurement:** Once a prototype of the system is ready, it may be monitored
    in action and the relevant metrics produced.


    It’s important to note that these techniques aren’t mutually exclusive, and that
    all of them should be considered during the validation process.


    As previously mentioned, validation must take place throughout the lifecycle of
    a project, beginning with the modeling phase and continuing after implementation.
    In certain periods, some of the approaches described in this book are more appropriate:


    - **Specification:** Validity is accomplished by the description of reliability
    criteria, which may be verified using numerical techniques. To identify the failure
    criteria for the system’s components, use approaches such as combinatorial designs.
    Failures are thought to be separate from each other.

    - **Design:** It’s appropriate to use State-Based models to represent the system’s
    state space during the design phase. Markov Chains and Petri Nets are examples
    of these models.

    - **Implementation:** When the project is far enough along, it may be possible
    to build a prototype model that can be closely monitored to see how effective
    fault-tolerance approaches are in improving system dependability.

    - **Functioning:** It is possible to test the system in a real-world setting after
    it has been installed.'
