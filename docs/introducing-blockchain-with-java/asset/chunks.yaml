    ### 62 `WalletData.getInstance().loadWallet()`; 63


    第 38 行和 39 行代表一条语句，它使用我们之前设置的`SQLDriver`来打开与`wallet.db`数据库的连接。`SQLDriver`会检查指定
    URL 位置下`wallet.db`文件是否存在，并打开与其的连接。如果文件缺失，`SQLDriver`将自动创建一个空的`wallet.db`文件。


    在第 40 行，我们使用已建立的与`wallet.db`数据库的连接来实例化`Statement`对象。每次我们使用这个`Statement`对象执行查询时，它都会在用于实例化它的连接所指向的数据库中执行这些查询。在本例中，该数据库就是`wallet.db`。在第
    41 至 46 行，我们在名为`walletStatment`的`Statement`对象上使用`executeUpdate(String s)`方法，该方法接收一个`String`参数，并将其作为
    SQL 语句在`wallet.db`中执行。除了在此添加的`IF NOT EXISTS`部分外，这个 SQL 字符串与我们手动创建`WALLET`表时生成的
    SQL 完全相同，如图 3-10 所示。换句话说，我们这里的 SQL 语句表示：如果`WALLET`表不存在，则创建一个模式与我们之前在“Wallet.db”部分手动创建的表完全相同的表。


    在接下来的代码行（第 47-58 行）中，我们将扩展应用的功能，使其能够识别`wallet.db`中是否已存在密钥对。如果为空，应用将生成一个新的密钥对并将其填充到`WALLET`表中。第
    47 行查询`WALLET`表，并将结果保存在`ResultSet`对象中。第 48 行检查`resultSet`对象是否为空，如果为空，则第 49-57
    行创建一个新的钱包并将其密钥导出到`Wallet`表中。让我们看看这一组功能能实现什么。我们可以在没有任何`wallet.db`的情况下运行应用，它会自动为其设置数据库并为我们创建一个新钱包。我们可以通过简单地复制`wallet.db`并替换目标机器上的`wallet.db`文件，将钱包移植到另一台机器上。我们的`init()`方法会识别出密钥对已存在，不会尝试覆盖它。最后需要注意的一点是第
    65 行。在这里，我们将把`wallet.db`中的内容加载到`WalletData`单例类中。这会将我们的钱包数据存储到应用内存中，使其在整个应用的其余部分更易于访问。我们将在下一章中进一步讨论`WalletData`类。


    现在让我们看看下面的代码片段中`init()`方法的下一部分：


    ```java

