- fmt: '# Chapter 1 Introduction to Blockchain


    We have two functions that should have the same properties as those for the symmetric-key
    algorithm.


    - `E(x, p)`, which encrypts a message `x` given a public key `p`

    - `D(x'', s)`, which decrypts an encrypted message `x''` given a private (secret)
    key `s`


    In our example, we will rely on the modulo operation. Recall that `a mod b` represents
    the remainder when `a` is divided by `b`. For example, `4 mod 2 = 0` because there
    is no remainder when dividing 4 by 2; however, `5 mod 2 = 1`.


    Here’s one example of a basic encryption algorithm based on addition and modulo
    operations:


    1. Pick one random number, for example 100. This will represent a common, publicly
    available key.

    2. Pick another random number in the range (1, 100), for example 97. This will
    represent the private key `s`.

    3. The public key `p` is obtained by subtracting the common key from the private:
    `100 - 97 = 3`.

    4. To encrypt data, add it to the public key and take modulo 100: `E(x, p) = (x
    + p) mod 100`.

    5. To decrypt data, we use the same logic but with our private key, so `D(x'',
    s) = (x'' + s) mod 100`.


    For example, suppose we want to encrypt 5. Then `E(5, 3) = (5 + 3) mod 100 = 8`.
    To decrypt 8, we have `D(8, 97) = (8 + 97) mod 100 = 105 mod 100 = 5`.


    This example uses a very simple generation pair of `(x + y) mod c`. But, in practice,
    the pair generation algorithm is much more complex and harder to break by attackers.
    After all, the complexity of the algorithm’s computation is what makes it hard
    to break it.


    We can use a similar algorithm for digital signatures:


    - `S(x, s)`, which signs a message `x` given a private key `s` (encryption)

    - `V(x'', sig, p)`, which verifies a signed message `x''`, given signature `sig`
    and public key `p` (decryption)


    As we said earlier, each record will also include a special number (or a hash).
    This hash will be what is produced by `S(x, s)` (encryption). A hash can be verified
    by using the verify function to confirm a record’s ownership (decryption).


    The wallet will contain a pair of public and a private key. These keys will be
    used to receive or send money. With the private key, it is possible to write new
    blocks (or transactions) to the blockchain, effectively spending money. With the
    public key, others can send currency and verify signatures.


    ## Exercise 1-1


    Come up with a table of functions such that:


    1. the input is a number, and the output is a number

    2. the input is a number, and the output is the name of an employee in a company
    given that number


    ## Exercise 1-2


    Check the three properties for a symmetric-key algorithm to ensure the Caesar
    cipher is compatible with them.


    ## Exercise 1-3


    Come up with an encryption scheme, based on mathematical substitution.


    ## Exercise 1-4


    Use the asymmetric-key algorithm we defined to sign a message and verify it.


    **Hint**: this is similar to the encryption/decryption example shown earlier.


    ## 1.3 Hashing


    **Definition 1-8** Hashing is a one-way function in that it encodes text without
    a way to retrieve the original value.


    Hashing is simpler than the previously described encryption schemes. One example
    of a hashing function is to return the length of characters as in `H("abc") =
    3`, but also `H("bcd") = 3`. This means we don’t have a way to retrieve the original
    value just by using the return value 3.


    As we mentioned earlier, the reason to use such a technique is that it has some
    interesting properties, such as providing us with the proof of work.


    **Definition 1-9** *Mining* is the process of validating transactions. For this
    effort, successful miners obtain money as a reward.


    **Hashcash** is one kind of a proof-of-work system[^3]. We will use it to implement
    mining. We will see how this algorithm works in detail in the later chapters where
    we will implement it.


    Hashing functions have another useful property that allows connecting two or more
    distinct blocks by having the information about the current block’s hash (current
    hash) and previous block’s hash (previous hash) in each block. For example, block-1
    may have a hash such as `123456`, and block-2 may have a hash such as `345678`.
    Now, block-2’s previous-hash will be block-1’s current hash, that is, `123456`.
    Here, we linked these two blocks, thus effectively creating a linked list of blocks
    containing ledgers with transactions. Figure 1-4 depicts this linking.


    The hash of the block is based on the block’s data itself, so to verify a hash
    we can just hash the block’s data and compare it to current hash.


    Two or more blocks (or transactions) that are connected form a blockchain. The
    validity of the blockchain will depend on the validity of each transaction.


    ## Exercise 1-5


    Come up with your own hashing function.


    ## Exercise 1-6


    In which way can the linked list depicted in Figure 1-4 be traversed? What are
    the implications of this property?


    [^3]: Hashcash was initially targeted for limiting email spam and other attacks.
    However, recently it’s also become known for its usage in blockchains as part
    of the mining process. Hashcash was proposed in 1997 by Adam Back.


    ## 1.4 Smart Contracts


    **Definition 1-10** A *smart contract* is a self-executing contract with the conditions
    of an agreement between a buyer and a seller being directly written into lines
    of code.


    A blockchain is programmable if the transactions themselves can be programmed
    by users. For example, users (not necessarily programmers) can write a script
    to add additional requirements that must be satisfied before sending money. It
    could look something like this:


    ```

    1 if (user has more than 10 money)

    2 then approve transaction

    3 else reject transaction

    ```


    Smart contracts are implemented as a computation that takes place on the blockchain.


    ## 1.5 Bitcoin


    Bitcoin was the world’s first implementation of a blockchain. In November 2008,
    a link to a paper authored by Satoshi Nakamoto titled “Bitcoin: A Peer-to-Peer
    Electronic Cash System” was published on a cryptography mailing list. Bitcoin’s
    white paper consists of nine pages; however, it is a mostly theoretical explanation
    of the design and as such may be a bit overwhelming to newcomers.


    The Bitcoin software is open source code and was released in January 2009 on SourceForge.
    The design of a Bitcoin includes a decentralized network (peer-to-peer network),
    block (mining), blockchain, transactions, and wallets, each of which we will look
    at in detail in this book.


    Although there are many blockchain models and each one of them differs in implementation
    details, the blockchain we will be building upon in this book will look pretty
    similar to Bitcoin, with some parts simplified.


    ## 1.6 Example Workflows


    We will list a few important workflows that our system will use, among others.


    Mining a block creates a new block, using Hashcash to calculate the current hash
    of the block. It also contains the previous hash that is a link to the previous
    block in the blockchain.


    Checking a wallet balance for person A will first filter all blocks in the blockchain
    (`sender = A` or `receiver = A`) and then sum them to calculate the balance. The
    more our blockchain grows, the longer this operation will take. For that purpose,
    we will use unspent transaction outputs or the UTXO model. This model is a list
    of transactions containing information about the owner and the amount of money.
    Thus, every transaction will consume elements from this list.'
