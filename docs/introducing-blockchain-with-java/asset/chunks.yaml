- fmt: '# Adding a Block to a Blockchain


    Adding a block to a blockchain consists of sending money from A to B. One prerequisite
    is that A has enough money; we check this using the wallet balance workflow. We
    proceed by creating a transaction (sender = A, receiver = B) and signing it. Then
    we mine a block using this transaction and update the UTXO with the rewards.


    ## 1.6 Summary


    The point of this chapter is to get a vague idea of how the system that we will
    implement looks. Things will become much clearer in the next chapter where we
    will be explicit about the definitions of every entity.


    ## Chapter 1 Introduction to Blockchain


    Here’s what we learned in this chapter, briefly:


    - The core entity of the system is a block.

    - A block contains (among other data) transactions.

    - We have a ledger that is an ordered list of all valid blocks (blockchain).

    - Every peer involved with the ledger has a wallet.

    - Every record in the ledger is signed by the owner and can be verified by the
    public (digital signatures).

    - The ledger is in a decentralized location; that is, everybody has a copy of
    it.

    - Trust is based upon proof of work (mining).


