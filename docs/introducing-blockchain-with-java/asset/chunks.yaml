    ### 4.4 Summary


    In this chapter, we covered how to create our front-end UI with its corresponding
    controllers. We learned how to use Scene Builder to create quick mock-ups of our
    scenes and create references for the back end. We learned how to create controller
    classes and how to design them properly.


    This is a small recap of what concepts we covered so far:


    - Creation of FXML files using Scene Builder

    - Creation of object and method references between the front and back ends of
    our application

    - Creation of controller classes using java and javafx

    - Setting up the Base64 external library encoder and its use

    - Design of controller classes with separation of concerns in mind

    - Creating dialog panes in javafx


