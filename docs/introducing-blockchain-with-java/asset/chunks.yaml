    1 将其区块链分享给对等节点 2，对等节点 2 接受对等节点 1 的最后一个区块，但也将其自己的交易添加到对等节点 2 已有的交易中。接下来，对等节点 1
    将其区块链分享给对等节点 3，同样的事情发生。此时，对等节点 2 和对等节点 3 都包含对等节点 1 的最后一个区块及其交易。此时，当对等节点 2 尝试将其区块链分享给对等节点
    3 时，它们将具有相同的当前哈希值，因为两者都有对等节点 1 的最后一个区块；然而，对等节点 2 缺少对等节点 3 的交易，反之亦然。这就是共识算法到达第
    296 行并检查它们交易账本的时刻。由于它们的交易账本不相同，将调用第 298 行的`updateTransactionLedgers`方法。


