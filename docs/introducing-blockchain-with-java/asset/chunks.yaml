    You will recall how in the `MainWindow.fxml` section we added `fx:id` references
    for the fields in our controller class to some of our elements.


    Now it’s time to create those fields. All the classes for these fields come from
    the `javafx` package, which is included in your Java SDK. We will need to annotate
    each element with the `@FXML` tag and name each field with the same name as our
    `fx:id` reference. If done properly, an icon next to the line number will appear,
    and if clicked, it will take you to the exact place in your FXML file where the
    field is referenced. Also make sure that the classes for our fields correspond
    to the types of elements we picked in our FXML file.


    Now let’s move on to our following code snippet where we will talk about our `initialize()`
    method for the controller:


    ```java

    34 private TextField eCoins;

    35 @FXML

