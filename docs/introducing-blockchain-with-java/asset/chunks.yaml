    (it will be used the same way the field currHash was used in the previous class).The
    ledgerId serves the same purpose as in the previous class. The fields with the
    FX suffix are simple duplicates formatted to String instead of byte[]. We do this
    so that we can easily display them on our front end.


    In this class we also have two constructors; the first one is used when we retrieve
    a transaction from the database, and the second one is used when we want to create
    a new transaction within our application. Let’s observe them in the following
