    \ try-with-resources 结构。我们从实例化一个套接字开始，使用本地 IP 和`queue`中的第一个端口号。接着在控制台打印一条消息以记录操作，然后在第\
    \ 29 行将刚刚用于实例化套接字的端口号移动到队列末尾。下一行我们设置了套接字超时。在第 32 和 33 行，我们实例化了`ObjectOutputStream`和`ObjectInputStream`对象。我们将主要使用这些对象提供的方法来发送区块链，然后接收响应的区块链。第\
    \ 35 行我们使用服务层方法获取区块链对象，下一行使用`objectOutput`将区块链对象发送给对等节点。此时，我们发送的区块链将由对等节点检查并与本地区块链进行比较。当该过程完成后，对等节点将根据其共识方法返回胜出的区块链。我们在第\
    \ 38 行使用`objectInput`检索此区块链。然而，由于我们不信任对等节点，接下来一行我们将其通过自己的共识算法处理。任何对等节点都可以修改本地机器上的应用程序来尝试发送虚假信息。这就是为什么我们要运行共识算法来验证之前收到的区块链，假设它来自良善节点。这样良善节点就能持续传播并扩展正确的区块链，同时阻止任何共享虚假区块链的尝试。\n\
