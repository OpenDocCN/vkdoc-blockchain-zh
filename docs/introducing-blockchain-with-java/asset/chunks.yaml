    # 向区块链添加区块


    向区块链添加区块的过程就是实现从 A 到 B 的资金转移。前提条件是 A 拥有足够的资金，我们可以通过钱包余额工作流程进行验证。具体步骤如下：创建一笔交易（发送方=A，接收方=B）并对其签名，然后基于这笔交易挖出一个新区块，并更新
    UTXO 中的奖励。


    ## 1.6 本章小结


    本章旨在让读者对我们将要实现的系统有一个初步概念。下一章我们将明确定义每个实体，届时一切都会变得更加清晰。


    ## 第 1 章 区块链简介


    以下是本章的要点速览：


    - 系统的核心实体是区块。

    - 区块包含（除其他数据外）交易数据。

    - 我们拥有一个账本，即所有有效区块的有序列表（区块链）。

    - 每个参与账本的节点都拥有一个钱包。

    - 账本中的每条记录均由所有者签名，并可被公众验证（数字签名）。

    - 账本采用去中心化存储，即每个人都拥有其副本。

    - 信任基础建立在工作量证明（挖矿）之上。


