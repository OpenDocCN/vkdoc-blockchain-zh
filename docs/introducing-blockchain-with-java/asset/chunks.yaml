    15 public class PeerClient extends Thread {

    16

    17     private Queue<Integer> queue = new ConcurrentLinkedQueue<>();

    18

    19     public PeerClient() {

    20         this.queue.add(6001);

    21         this.queue.add(6002);

    22     }

    23 }

    ```


