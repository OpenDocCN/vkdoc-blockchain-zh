    ### 3.6 Summary


    In this chapter, we covered the creation of two different databases that will
    support our application. We also created our `init()` method with functionality
    that allows easy portability and creation of wallets. Also, we made sure that
    our application is capable of creating the first block in our blockchain when
    no blockchain is present. This is a small recap of what concepts we covered so
    far:


    - Creation of databases and table schemas using the database browser program

    - Creation of our application’s main class

    - Creation of our `start(Stage s)` method

    - Setting up the SQLite driver in Java and using it to create and query databases
    using Java and SQL

    - Creating business logic for our app’s `init()` method by using the SQLite driver
    and Java


