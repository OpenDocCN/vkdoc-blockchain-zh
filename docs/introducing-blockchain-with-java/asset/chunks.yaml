    Therefore, in this case, we print the message on line 16 in the console. If our
    first if statement is false, then on line 17 our else if statement checks to see
    if less than 60 seconds (the mining interval also covered in Chapter [6](https://doi.org/10.1007/978-1-4842-7927-4_6))
    have passed since the last mined block. If this is true, then we will print to
    the console the time remaining until we get to 60 seconds. If we reach our else
    statement on line 20, that means we are in that time window between 60 and 65
    seconds since our last mined block and it’s time to mine (create) another. Line
    22 uses the service layer again 109


    ![](index-109_1.jpg)


    Chapter 5 Setting Up the network and MUltithreading to call a method to mine another
    block, and line 23 is used to print our new wallet balance to the console by using
    the service layer again. On lines 25


    and 26, regardless of the outcome of the previous control flow statements, we
    print out the time of our last mined block to the console just for clarity.


    Since there is no point in this thread to loop as fast as it can on line 28, we
    call the thread to sleep for two seconds, which effectively makes this thread
    repeat every two seconds. We will set the rate of acquiring mining points to be
    one point per second; therefore, on line 29 we will add two mining points for
    each two seconds we wait.


