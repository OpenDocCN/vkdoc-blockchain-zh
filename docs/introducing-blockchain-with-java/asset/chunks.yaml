    **Tip:** Look at the fields of `Transaction.java` just like we did with `Block.java`.


    If you managed to do it, good job! Our implementation of the `Transactions` table
    looks like Figure [3-6].


    ![](index-47_1.jpg)


    **Figure 3-6.** *Transactions table*


    Finally, the complete database schema should look like Figure [3-7].


    ![](index-48_1.jpg)


    **Figure 3-7.** *Complete database schema*


    Now obviously if you click the **Browse Data** tab, the tables will be empty,
    but let’s conclude this section by looking at Figure [3-8] and Figure [3-9], which
    contain some dummy data so we can visualize how everything will fall into place
    once we complete the rest of our application.


    ![](index-49_1.jpg)


    ![](index-49_2.jpg)


    **Figure 3-8.** *BLOCKCHAIN table with dummy data*


    **Figure 3-9.** *Transaction table with dummy data*


