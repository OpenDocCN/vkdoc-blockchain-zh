- fmt: '# Chapter 1: Introduction to Blockchain


    *The entirety of this chapter is comprised of an excerpt from* Introducing Blockchain
    with Lisp: Implement and Extend Blockchains with the Racket Language *by Boro
    Sitnikovski, and it is reused here with the author’s permission.*


    *“Chained” by Filip Rizov*


    © Spiro Buzharovski 2022


    S. Buzharovski, *Introducing Blockchain with Java*, [https://doi.org/10.1007/978-1-4842-7927-4_1](https://doi.org/10.1007/978-1-4842-7927-4_1)


    In this chapter, we will see some definitions and examples for blockchain. We
    will see what properties a blockchain has, what it allows us to do, and what it
    is good for.


    **Definition 1-1** *Blockchain* is a system in which a record of transactions
    is maintained across several computers that are linked in a peer-to-peer network.¹


    We will give an example that will serve as motivation, as well as define what
    encryption and hashing techniques are and how they will help us with our system.


    Note that we will skip some of the technical bits in this chapter, as it is only
    supposed to serve as introductory material. The technical bits will be covered
    later when we start building the blockchain.


    ## 1.1 Motivation and Basic Definitions


    Let’s assume that you and your friends exchange money often, for example, paying
    for dinner or drinks. It can be inconvenient to exchange cash all the time.


    One possible solution is to keep records of all the bills that you and your friends
    have. This is called a *ledger* and is depicted in Figure 1-1.


    ¹ We will use this definition throughout the book, but note that there are many
    different definitions on the Internet. By the end of this book, you should be
    able to distinguish the slight nuances and similarities in each definition.


    ***Figure 1-1.** A ledger and a set of connected friends (peers)*


    **Definition 1-2** A *ledger* is a book that contains a record of transactions.


    Further, at the end of every day, you all sit together and refer to the ledger
    to do the calculations to settle up. Let’s imagine that there is a pot that is
    the place where all of the money is kept. If you spent more than you received,
    you put that money in the pot; otherwise, you take that money out.


    We want to design the system such that it functions similarly to a regular bank
    account. A holder of a wallet (bank account) should be able to only send money
    from their wallet to other wallets. Thus, every person in the system will have
    a wallet of a kind, which can also be used to determine the balance for them.
    Note that with the current setup using a ledger, we have to go through all the
    existing records to determine the balance of a specific wallet.


    If we want to avoid going through all the existing records, there is a way we
    can optimize this with *unspent transaction outputs* (UTXOs), as we will see later
    in Chapter 3.


    A problem that may arise is the *double-spending problem*, where Bob can try to
    send all of his money to Alice and you at the same time, thus effectively doubling
    the money he sends in relation to what he owned.


    There are several ways this can be resolved, and the solution that we will provide
    will be a simple check of the sum of the inputs and the sum of the outputs.


    A problem that might appear with this kind of system is that anyone can add a
    transaction. For example, Bob can add a transaction where Alice pays him a few
    dollars without Alice’s approval. We need to re-think our system such that each
    transaction will have a way to be verified/signed.


    **Definition 1-3** A *digital signature* is a way to verify the authenticity of
    digital messages or documents.'
