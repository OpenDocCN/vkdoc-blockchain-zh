    In this chapter, we covered the creation of multiple threads that will allow our
    application to run responsively and uninterrupted. We learned how to use sockets
    to send and receive requests to other peers. We learned what elements are required
    to form a peer-to-peer network. We learned how to run the UI of our application,
    and we learned how to set up a mining subroutine. This is a small recap of what
    concepts we covered so far:


    • Creating threads


    • Using threads to handle different operations that need to run in parallel


    • Creating and using network sockets


    • Setting up network client and server threads


