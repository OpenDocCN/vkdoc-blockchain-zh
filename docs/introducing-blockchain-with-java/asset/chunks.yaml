    it Make Transaction. To do this, first let’s open the Menu tab and drag another
    MenuItem element and drop it right above the Close MenuItem, as shown on Figur[e
    4-9.](#index_split_000.html#p72)


    ***Figure 4-9.** Adding elements*


    Chapter 4 Building the ui


    As you are dragging the MenuItem element, notice the orange line that will help
    you visualize where the item will be placed once you drop it.


    You will notice that this MenuItem gets named by default as Unspecified Action.
    Let’s select this element by clicking it in the Hierarchy tab and then expand
    the Properties tab. You will notice a property called *text* that has a text value
    named Unspecified Action. Let’s change this value to **Make** **Transaction**,
    which effectively renames our element. The final result should look like Figur[e
    4-10](#index_split_000.html#p74).


    ![](index-74_1.jpg)


    Chapter 4 Building the ui


    ***Figure 4-10.** Renaming the text element*


    ![](index-75_1.jpg)


    ![](index-75_2.jpg)


    Chapter 4 Building the ui


    **EXERCISE 4-1**


    rename the Menu element named File to **Menu** and the Menuitem Close to **Exit**.


    We are finished with our MenuBar and its subelements for now, so let’s move on.
    Next add a TableView element from the Controls tab onto the BorderPane’s CENTER
    subelement. Once you expand the TableView element, you should find two nested
    TableColumn elements named C1


    and C2\. Drag TableColumn C2 into TableColumn C1\. This will make TableColumn
    C2 a nested element of TableColumn C1\. If you followed the instructions correctly,
    your hierarchy structure should look like Figur[e 4-11.](#index_split_000.html#p75)


    ***Figure 4-11.** Two nested TableColumn elements* 76


    ![](index-76_1.jpg)


    Chapter 4 Building the ui


    Let’s add four more TableColumn elements from the Controls tab as nested elements
    of TableColumn C1\. In this table view that we are creating we would like to be
    able to display our current block transactions with the associated details, so
    we should rename our table columns accordingly such as C1 to **Current Block Transactions**
    and then all the nested table columns in order like this: **From**, **To**, **Value**,
    **Signature**, and **Created On**. If you have done things correctly, your screen
    should look like Figur[e 4-12](#index_split_000.html#p76).


    ***Figure 4-12.** The finished table columns*


    ![](index-77_1.jpg)


    Chapter 4 Building the ui


    You have most likely noticed that the width of our table columns doesn’t cover
    the whole area of our screen. To fix the width of our table columns, select the
    TableView element, go into its Properties tab to find the Column Resize Policy
    attribute, and select constrained-resize, as shown in Figure [4-13.](#index_split_000.html#p77)


    ***Figure 4-13.** Resizing the table columns*


    Our next task is to add some elements that will allow us to display our coins
    balance, our public key/wallet address, and a button that will refresh our UI
    and retrieve the latest information regarding transactions and our balance. We
    will do this by dragging another BorderPane from the Containers tab inside the
    BOTTOM section of our existing BorderPane.


    This new BorderPane will come with its own existing TOP, LEFT, CENTER, RIGHT,
    and BOTTOM sections. In other words, this new BorderPane subdivides the bottom
    section of the first BorderPane into five new sections, as shown in Figur[e 4-14.](#index_split_000.html#p78)


    ![](index-78_1.jpg)


    ![](index-78_2.jpg)


    Chapter 4 Building the ui


    ***Figure 4-14.** New BorderPane*


    This will allow us to position the elements, we mentioned earlier, in their own
    separate sections, which helps organize our hierarchy structure.


    Now let’s insert an AnchorPane from the Containers tab into the LEFT, CENTER,
    and RIGHT sections of our new BorderPane, as shown in Figur[e 4-15.](#index_split_000.html#p78)


    ***Figure 4-15.** Inserting an AnchorPane*


    ![](index-79_1.jpg)


    ![](index-79_2.jpg)


    Chapter 4 Building the ui


    The AnchorPane will allow us to adjust the visual position of our elements just
    by dragging them into a different position. Now let’s drag and drop a Label and
    a TextField element from the Controls tabs into our LEFT


    section AnchorPane. Once you have done that, notice that you can easily reposition
    them by dragging them on the view screen itself. Figur[e 4-16](#index_split_000.html#p79)


    shows how your hierarchy should look and the ability to drag and align your elements
    on the view screen.


    ***Figure 4-16.** Repositioning elements*


    **EXERCISE 4-2**


    rename the label element named label to **Your Balance:** and reposition it and
    the textField element so they look better visually.


    ![](index-80_1.jpg)


    ![](index-80_2.jpg)


    Chapter 4 Building the ui


    Next let’s drop a Label and TextArea element from the Controls tab into our CENTER
    section AnchorPane and a Button from the same tab into our RIGHT section AnchorPane.
    Your hierarchy structure should look like Figur[e 4-17.](#index_split_000.html#p80)


    ***Figure 4-17.** Adding a Label and TextArea to CENTER*


    **EXERCISE 4-3**


    rename the label element named label to **Your Address / Public Key:**, rename
    the Button from Button to **Refresh**, and then reposition them to look better
    visually.


    In Figur[e 4-18](#index_split_000.html#p81) you can see the complete UX/UI design
    of our scene with its expanded structure hierarchy. This is a good figure to review
    and check if you have missed something in your own scene.


    ![](index-81_1.jpg)


    Chapter 4 Building the ui'
  trans: '

    在屏幕的左上侧，我们可以看到用于创建视图的预制可视化元素，只需将它们拖放到屏幕中央或`Hierarchy`选项卡中即可。您还可以注意到，不同类型的元素被分组在不同的选项卡下，例如`Containers`、`Controls`等。在屏幕的左下角，我们可以看到`Hierarchy`选项卡；在这里，我们可以观察到场景的元素结构。在`Hierarchy`选项卡下方是`Controller`选项卡，我们可以在其中查看有关此视图控制器位置以及视图元素关联字段的信息。在中间，我们可以看到视图预览的样子。在屏幕的右侧，有三个选项卡：`Properties`、`Layout`和`Code`，我们可以在其中调整和自定义每个元素的属性。在开始向场景添加可视化元素之前，让我们先将此文件保存到`View`文件夹中，并将其命名为`MainWindow.fxml`，如图
    4-5 所示。


    **图 4-5.** 保存文件


    ![](img/index-69_1.jpg)


    ## 第 4 章 构建用户界面


    让我们通过将`BorderPane`元素从`Containers`选项卡拖到屏幕中央来开始创建前端场景。您的屏幕应如图 4-6 所示。


    **图 4-6.** 添加`BorderPane`


    ![](img/index-70_1.jpg)


    请注意`Hierarchy`选项卡中的`BorderPane`元素及其子元素。接下来，从`Controls`选项卡中拖出一个`MenuBar`，并将其放入`BorderPane`的`TOP`子元素中，如图
    4-7 所示。


    **图 4-7.** 添加`MenuBar`


    ![](img/index-71_1.jpg)


    如果您点击`MenuBar`元素旁边的`+`号，您会注意到它自带了三个名为`File`、`Edit`和`Help`的菜单子元素。由于我们只使用`File`子元素，请右键点击`Edit`和`Help`子元素，并从下拉菜单中选择`Delete`来删除它们，如图
    4-8 所示。


    **图 4-8.** 删除部分子菜单


    ![](img/index-72_1.jpg)


    现在，让我们展开`File`子菜单。在这里，您会注意到我们有一个名为`Close`的嵌套`MenuItem`元素。让我们添加另一个`MenuItem`元素，并将其命名为`Make
    Transaction`。为此，首先打开`Menu`选项卡，拖出另一个`MenuItem`元素，并将其放置在`Close MenuItem`正上方，如图 4-9
    所示。


    **图 4-9.** 添加元素


    在拖拽`MenuItem`元素时，请注意橙色线条，它将帮助您可视化放置元素的位置。


    您会注意到这个`MenuItem`默认被命名为`Unspecified Action`。让我们通过在`Hierarchy`选项卡中点击它来选择此元素，然后展开`Properties`选项卡。您会注意到一个名为`text`的属性，其文本值为`Unspecified
    Action`。让我们将此值更改为`Make Transaction`，这将有效地重命名我们的元素。最终结果应如图 4-10 所示。


    ![](img/index-74_1.jpg)


    **图 4-10.** 重命名文本元素


    ![](img/index-75_1.jpg)


    ![](img/index-75_2.jpg)


    **练习 4-1**


    将名为`File`的`Menu`元素重命名为`Menu`，将`MenuItem`元素`Close`重命名为`Exit`。


    我们已经完成了`MenuBar`及其子元素的工作，现在继续往下进行。接下来，从`Controls`选项卡中添加一个`TableView`元素到`BorderPane`的`CENTER`子元素上。展开`TableView`元素后，您应该会找到两个名为`C1`和`C2`的嵌套`TableColumn`元素。将`TableColumn
    C2`拖入`TableColumn C1`，这将使`TableColumn C2`成为`TableColumn C1`的子元素。如果操作正确，您的层次结构应如图
    4-11 所示。


    **图 4-11.** 两个嵌套的`TableColumn`元素


    ![](img/index-76_1.jpg)


    让我们再从`Controls`选项卡中添加四个`TableColumn`元素作为`TableColumn C1`的嵌套元素。在我们要创建的此表格视图中，我们希望能够显示当前的区块交易及其关联的详细信息，因此我们应该相应地重命名表格列：将`C1`重命名为`Current
    Block Transactions`，然后按顺序将嵌套的表格列命名为：`From`、`To`、`Value`、`Signature`和`Created On`。如果一切操作正确，您的屏幕应如图
    4-12 所示。


    **图 4-12.** 完成的表格列


    ![](img/index-77_1.jpg)


    您很可能已经注意到，我们表格列的宽度并未覆盖整个屏幕区域。要修复表格列的宽度，请选择`TableView`元素，进入其`Properties`选项卡，找到`Column
    Resize Policy`属性，并选择`constrained-resize`，如图 4-13 所示。


    **图 4-13.** 调整表格列的大小


    我们的下一个任务是添加一些元素，用于显示我们的硬币余额、公钥/钱包地址，以及一个用于刷新用户界面并检索有关交易和余额最新信息的按钮。我们将通过将另一个`BorderPane`从`Containers`选项卡拖入现有`BorderPane`的`BOTTOM`部分来实现此目的。


    这个新的`BorderPane`将自带其自己的`TOP`、`LEFT`、`CENTER`、`RIGHT`和`BOTTOM`部分。换句话说，这个新的`BorderPane`将第一个`BorderPane`的底部区域细分为五个新区域，如图
    4-14 所示。


    ![](img/index-78_1.jpg)


    ![](img/index-78_2.jpg)


    **图 4-14.** 新`BorderPane`


    这将使我们能够将前面提到的元素放置到各自独立的部分中，这有助于组织我们的层次结构。


    现在，让我们将`AnchorPane`从`Containers`选项卡插入到新`BorderPane`的`LEFT`、`CENTER`和`RIGHT`部分，如图
    4-15 所示。


    **图 4-15.** 插入`AnchorPane`


    ![](img/index-79_1.jpg)


    ![](img/index-79_2.jpg)


    `AnchorPane`允许我们只需将元素拖拽到不同位置，即可调整其视觉位置。现在，让我们将`Label`和`TextField`元素从`Controls`选项卡拖放到我们的`LEFT`部分的`AnchorPane`中。完成后，您会注意到可以通过在视图屏幕上直接拖拽来轻松地重新定位它们。图
    4-16 展示了您的层次结构应如何呈现，以及在视图屏幕上拖拽和对齐元素的能力。


    **图 4-16.** 重新定位元素


    **练习 4-2**


    将名为`label`的`label`元素重命名为`Your Balance:`，并重新定位它和`textField`元素，使其在视觉上看起来更美观。


    ![](img/index-80_1.jpg)


    ![](img/index-80_2.jpg)


    接下来，让我们将一个`Label`和`TextArea`元素从`Controls`选项卡拖放到`CENTER`部分的`AnchorPane`中，并将一个`Button`元素从同一选项卡拖放到`RIGHT`部分的`AnchorPane`中。您的层次结构应如图
    4-17 所示。


    **图 4-17.** 将`Label`和`TextArea`添加到`CENTER`


    **练习 4-3**


    将名为`label`的`label`元素重命名为`Your Address / Public Key:`，将名为`Button`的`Button`重命名为`Refresh`，然后重新定位它们，使其在视觉上更美观。


    在图 4-18 中，您可以看到包含展开的层次结构的完整场景 UI/UX 设计。这是一张很好的图，可以供您检查自己的场景中是否遗漏了某些内容。


    ![](img/index-81_1.jpg)

