  trans: '

    ### 图 4-18. 场景的完整 UX/UI 设计


    如果你现在从 IntelliJ 打开 `MainWindow.fxml` 文件，你会注意到 Scene Builder 已自动用相应的 FXML 代码填充了它。请记住，你需要先在
    Scene Builder 中保存更改，FXML 文件中的代码才会生成。此外，如果你打算手动修改 FXML 文件，请确保在 Scene Builder 中保存最新更改并退出；否则，你可能会使
    Scene Builder 的工作与本地文件不同步，从而丢失部分更改。


    到目前为止，我们只处理了场景的视觉设计。


    所有元素都已按照我们想要的方式定位，但我们现在缺少的是对后端方法和字段的引用，以便我们能够使用它们。首先，让我们添加此场景未来控制器类的文件路径。这将在应用程序中创建视图与其控制器之间的链接。换句话说，应用程序将尝试找到并运行/显示我们将在视图中引用的、来自其对应控制器类的任何方法或字段。要添加控制器类的文件路径，请打开屏幕左下角的“Controller”选项卡，并在“Controller
    class”文本字段中输入它，如图 4-19 所示。


    ![](img/index-82_1.jpg)

    ![](img/index-82_2.jpg)


    第 4 章 构建 UI


    ### 图 4-19. 添加控制器类的文件路径


    现在，让我们为刷新按钮添加一个方法引用，该方法将在我们点击按钮时被调用。为此，选择我们的刷新按钮，展开屏幕右下角的“Code”选项卡，并在“On Action”文本字段中输入方法名称，即
    `refresh`，如图 4-20 所示。


    ### 图 4-20. 添加刷新按钮


    ![](img/index-83_1.jpg)


    第 4 章 构建 UI


    接下来，让我们添加对公钥字段的引用，以便我们可以在 TextArea 中显示它。选中 TextArea，然后在“Code”选项卡中找到 `fx:id` 字段；将其命名为
    `publicKey`，如图 4-21 所示。


    ### 图 4-21. 添加对公钥字段的引用


    我们将用于显示硬币余额的 TextField 命名为 `eCoins`，如图 4-22 所示。


    ![](img/index-84_1.jpg)

    ![](img/index-84_2.jpg)


    第 4 章 构建 UI


    ### 图 4-22. 命名硬币余额字段


    现在我们已经向你展示了如何添加控制器引用，你应该能够自己完成其余部分的添加。


    **练习 4-4**


    为第一个 BorderPane 的 `fx:id` 字段添加引用，命名为 `borderPane`；为 tableView 添加引用，命名为 `tableview`；为
    From 列添加引用，命名为 `from`；为 to 列添加引用，命名为 `to`；为 Value 列添加引用，命名为 `value`；为 Signature
    列添加引用，命名为 `signature`；为 Created On 列添加引用，命名为 `timestamp`。


    **注意：** 这些值是区分大小写的，请确保完全按照所示添加。


