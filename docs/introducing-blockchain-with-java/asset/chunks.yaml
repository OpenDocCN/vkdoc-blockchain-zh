    \n## 5.5 总结\n\n在本章中，我们介绍了多个线程的创建，这些线程将使我们的应用程序能够响应迅速且不间断地运行。我们学习了如何使用套接字向其他对等节点发送和接收请求。我们了解了组成点对点网络所需的元素。我们学习了如何运行应用程序的用户界面，以及如何设置挖矿子程序。以下是我们目前涵盖概念的简要总结：\n\
    \n- 创建线程\n- 使用线程处理需要并行运行的不同操作\n- 创建和使用网络套接字\n- 设置网络客户端和服务器线程\n- 设计点对点网络\n- 使用\
