    ## Chapter 2 Model: Blockchain Core


    Now that we have explained in theory what a blockchain is and how it is useful,
    the next obvious step is to start implementing it in Java. In this chapter, we
    will start by creating the model classes that represent the most elementary building
    blocks for our application. You can either look at the code snippets provided
    or download the complete repository from [https://github.com/5pir3x/e-coin](https://github.com/5pir3x/e-coin).
    The exercises included will offer insight and give you ideas for you to modify
    my code to create alternative implementations of various aspects of the application.
    I urge you to try to complete as many of them as possible; my hope is that at
    the end you will have not only a greater and deeper understanding of blockchain
    technology but also a great project for your portfolio that’s an alternative to
    my implementation instead of a mere copy. I have chosen to create a folder named
    `Model` inside my `src.com.company` folder structure in my repository and keep
    my model classes there. It is recommended that you choose the same folder structure
    for your project to avoid any pathing or import problems.


    ## 2.1 Block.java


    We will start first by listing the imports in the following code snippet:


    ```

    1 package com.company.Model;

    3 import sun.security.provider.DSAPublicKeyImpl;

    4

    5 import java.io.Serializable;

    6 import java.security.InvalidKeyException;

    7 import java.security.Signature;

    8 import java.security.SignatureException;

    9 import java.util.ArrayList;

    10 import java.util.Arrays;

    11 import java.util.LinkedList;

    ```


    Next we move on to our class declaration and fields:


    ```

    13 public class Block implements Serializable {

    15     private byte[] prevHash;

    16     private byte[] currHash;

    17     private String timeStamp;

    18     private byte[] minedBy;

    19     private Integer ledgerId = 1;

    20     private Integer miningPoints = 0;

    21     private Double luck = 0.0;

    23     private ArrayList<Transaction> transactionLedger = new ArrayList<>();

    ```


    The first thing we recognize on line 13 is that this class implements the interface
    `Serializable`. Since all the blocks for our blockchain will be created using
    this class, we need them to be serializable so that we can share our blockchain
    through our network.


    The field `prevHash` will contain the signature or, in other words, the encrypted
    data from the previous block. The `currHash` will contain the signature or, in
    other words, the encrypted data from this block, which will be encrypted with
    the private key of the miner that will get to mine this block. The `timeStamp`
    obviously will contain a timestamp of when this block was mined/finalized. The
    field `minedBy` will contain the public key, which also doubles as the public
    address of the miner that managed to mine this block. In the process of blockchain
    verification, this public address/public key will be used to verify that the `currHash`/signature
    of this block is the same as the hash of the data presented by this block and
    secondarily that this block was indeed mined by this particular miner.


    We will touch on this topic a bit later in this section when we explain the `isVerified`
    method of this class. Next is our `ledgerId` field. Since we intend to implement
    a database with separate Block and Transaction tables, this field will help us
    retrieve the correct corresponding ledger for this block. You can also look at
    this field as the block number. Our next fields, `miningPoints` and `luck`, will
    be used to form the network consensus in regard to choosing this block’s miner.


    We will get into the details of how these fields are used in Chapter [6](https://doi.org/10.1007/978-1-4842-7927-4_6).


    The field `transactionLedger` is simply an `ArrayList` of all the transactions
    contained in this block. We will explain the `Transaction` class in the section
    “Transaction.java.”


    In the following snippet, we can see the three constructors starting on line 26,
    line 38, and line 45:


    ```

    25 //This constructor is used when we retrieve it from the db

    26 public Block(byte[] prevHash, byte[] currHash, String timeStamp, byte[] minedBy,
    Integer ledgerId,

    27               Integer miningPoints, Double luck,

    28               ArrayList<Transaction> transactionLedger) {

    29     this.prevHash = prevHash;

    30     this.currHash = currHash;

    31     this.timeStamp = timeStamp;

    32     this.minedBy = minedBy;

    33     this.ledgerId = ledgerId;

    34     this.transactionLedger = transactionLedger;

    35     this.miningPoints = miningPoints;

    36     this.luck = luck;

    37 }

    38 //This constructor is used when we initiate it after retrieve.

    39 public Block(LinkedList<Block> currentBlockChain) {

    40     Block lastBlock = currentBlockChain.getLast();

    41     prevHash = lastBlock.getCurrHash();

    42     ledgerId = lastBlock.getLedgerId() + 1;

    43     luck = Math.random() * 1000000;

    44 }

    45 //This constructor is used only for creating the first block in the blockchain.

    46 public Block() {

    47     prevHash = new byte[]{0};

    48 }

    ```


    The first constructor is used when we retrieve our blockchain from the database.
    Here we retrieve all the blocks completely finalized, and this constructor helps
    us instantiate the block with all of the fields properly set up. The second constructor
    is used while the application is running and is used to create a completely new
    block (in other words, the head of the blockchain) for us to work on. We will
    go over the details of how this is achieved in Chapter [6](https://doi.org/10.1007/978-1-4842-7927-4_6).
    Our third constructor on line 45 will be used only once by our `init()` method
    to create our first block.


    Our next snippet showcases the `isVerified` method:


    ```

    49 public Boolean isVerified(Signature signing)

    50     throws InvalidKeyException, SignatureException {

    51     signing.initVerify(new DSAPublicKeyImpl(this.minedBy));

    52     signing.update(this.toString().getBytes());

    53     return signing.verify(this.currHash);

    54 }

    ```


    We accept an object from the `Signature` class as a parameter. The `Signature`
    class is actually a class from the `java.security` package.'
