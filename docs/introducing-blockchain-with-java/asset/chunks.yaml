    ```


    On line 39 we initialize our `Base64.Encoder` encoder. On lines 40–49 we are creating
    cell value factories for our table columns. In other words, we reference the values
    from the fields of the class that our table view contains to be displayed in the
    appropriate columns. On line 50, we set the coins balance to be displayed. Here
    you will notice that we are using methods from our service layer to achieve this,
