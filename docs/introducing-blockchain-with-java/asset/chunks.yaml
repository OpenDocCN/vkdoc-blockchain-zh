    15 private byte[] from;

    16 private String fromFX;

    17 private byte[] to;

    18 private String toFX;

    19 private Integer value;

    20 private String timestamp;

    21 private byte[] signature;

    22 private String signatureFX;

    23 private Integer ledgerId;

    ```


    由于此类也会创建构成区块链的对象，它将实现`Serializable`接口，以便通过网络共享。


    字段`from`和`to`分别包含发送方和接收方账户的公钥/地址。


    `value`是发送的货币数量，`timestamp`是交易发生的时间。`signature`包含所有字段的加密信息，用于验证交易的有效性（其使用方式与上一类中`currHash`字段相同）。`ledgerId`的作用与上一类中相同。带有`FX`后缀的字段是简单的副本，格式化为`String`而非`byte[]`。这样做的目的是为了方便在前端显示。


    在本类中还有两个构造函数：第一个用于从数据库检索交易时使用，第二个用于在应用程序内创建新交易时使用。让我们在以下代码片段中观察它们：


    ```java

