    ### 5.2 Mining Thread


    The object of our mining thread is for it to handle all the mining operations
    of the application. It will need to run continuously as long as our application
    is running and make sure new blocks are created at the appropriate interval. Also,
    since we will be using mining points as a method of achieving block consensus,
    this thread will also need to keep track of the points. Our mining thread will
    first check if we have a blockchain that is current and up-to-date, and then it
    will initiate the mining of a new block at a precise interval. This thread will
    loop every two seconds continuously.


    Let’s look at the code of our `MiningThread` class in our next code snippet:


    ```

