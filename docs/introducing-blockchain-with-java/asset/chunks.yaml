    ## 1.3 哈希


    **定义 1-8** 哈希是一个单向函数，它对文本进行编码，并且无法找回原始值。


    哈希比之前描述的加密方案更简单。哈希函数的一个示例是返回字符长度，如 `H("abc") = 3`，但 `H("bcd") = 3`。这意味着我们无法仅通过返回值
    3 来恢复原始值。


    正如我们之前提到的，使用这种技术的原因是因为它有一些有趣的特性，例如为我们提供工作量证明。


    **定义 1-9** *挖矿*是验证交易的过程。为此付出的努力，成功的矿工将获得金钱作为奖励。


    **Hashcash** 是一种工作量证明系统[³]。我们将使用它来实现挖矿。我们将在后续实现该算法的章节中详细看到这个算法是如何工作的。


    哈希函数还有一个有用的特性，即通过在每个区块中包含当前区块哈希（当前哈希）和前一区块哈希（先前哈希）的信息，可以将两个或多个不同的区块连接起来。例如，区块
    1 可能有一个哈希值 `123456`，而区块 2 可能有一个哈希值 `345678`。现在，区块 2 的先前哈希将是区块 1 的当前哈希，即 `123456`。这里，我们将这两个区块链接起来，从而有效地创建了一个包含交易账本的区块链表。图
    1-4 描绘了这种连接。


    区块的哈希基于区块数据本身，因此要验证一个哈希，我们只需对区块数据进行哈希，并将其与当前哈希进行比较。


    两个或多个相连的区块（或交易）构成一个区块链。区块链的有效性将取决于每笔交易的有效性。


