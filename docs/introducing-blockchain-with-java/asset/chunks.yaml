    ## Chapter 3 Database Setup


    For a greater visualization of our blockchain and our wallet data, we chose to
    implement a SQLite database instead of storing it in raw file data format. Our
    plan is to set up one database for our blockchain and another for our wallet just
    so we can maintain better separation of concerns and increase security. In this
    chapter, we will learn how to set up our databases from scratch and write an `init()`
    method for our application that will write our table schemas in SQL with preset
    defaults. For this purpose we will be using the SQLite JDBC driver and SQLite
    database browser.


    ### 3.1 SQLite Database Browser Setup


    First we will be downloading our SQLite database browser from <https://sqlitebrowser.org/dl/>.
    Just download the recommended version for your operating system and install it
    on your machine with the recommended settings. Once you run it, the app should
    look something like Figure [3-1].


    **Figure 3-1.** *Our app*


    ![](index-41_1.jpg)


    This means that you have installed the database browser successfully, and we can
    move on to setting up our actual databases.


    ### 3.2 Blockchain.db


    Our first database that we will implement is the one for storing our blockchain
    data, and we will name it appropriately as `blockchain.db`. In this chapter, we
    will learn to set up our database step-by-step by using the SQLite browser. However,
    in the section “Writing your App `init()` Method,” we will learn to set up our
    database programmatically by using SQL and the SQL JDBC driver. Ideally this chapter
    will go a long way in visualizing the data contained in the blockchain through
    the database browser and help bridge the gap for people less familiar with SQL.
    The “Writing your App `init()` Method” section will give you the SQL code and
    teach you how to programmatically implement your database setup in the future.


    We start by clicking the **New Database** button or go to **File** and then click
    the **New Database** command in case the button tray doesn’t show. This should
    open a screen similar to Figure [3-2], asking us to name our database and choose
    a filepath for saving it.


    ![](index-42_1.jpg)


    **Figure 3-2.** *Naming and saving our database*


    I chose to create a folder named `db` in my `e-coin` project folder and name the
    database `blockchain`. You can choose a different name or location for your database;
    just make sure you remember to use those names throughout instead of the ones
    in this book’s instructions. Once we click **Save**, we are greeted with the window
    shown in Figure [3-3] that prompts us to create our first table.


    ![](index-43_1.jpg)


    **Figure 3-3.** *Creating a table*


    We will name our table `BLOCKCHAIN`, and we want it to store all of our blocks
    and the data they contain. Now in the upper window on the tab named **Fields**,
    we will click the **Add** button to add a field row. These field rows will represent
    the table columns, so from now on we will refer to them as such. When you start
    creating your columns in the upper window, you will notice that the SQL code in
    the lower window will modify itself to correspond to your choices. For now let’s
    look at Figure [3-4] and set up our table columns accordingly.


    ![](index-44_1.jpg)


    **Figure 3-4.** *Setting up table columns*


    If you noticed that the names of the columns are similar to the names of the fields
    of the `Block.java` class, then great job; having a different column for each
    class field is exactly how we want to store our data.


    Each row in our `BLOCKCHAIN` table will represent a different block, so we also
    include an `ID` column here, which will number our blocks. The type


    ![](index-45_1.jpg)


    chosen for our column corresponds closely to the types of the fields in the `Block.java`
    class in order to maintain the integrity of the data. This is especially important
    for all our class fields of the byte array type to be stored as `BLOB`; otherwise,
    the conversion to another type will change the original information and render
    the public keys and signatures stored in them invalid. You can read up more on
    SQLite types if you are interested at <https://www.w3resource.com/sqlite/sqlite-data-types.php>.
    Now once we click the **OK** button, we will have our first table in our database
    created, and our database browser should look like Figure [3-5].


    **Figure 3-5.** *Our first table in our database*


    ![](index-46_1.jpg)


    Our next step is to create a table that will contain the transactions included
    in each block. For that purpose we click the **Create Table** button and get another
    window looking exactly like the window we used to create our `BLOCKCHAIN` table.


    #### **EXERCISE 3-1**


    Try creating the next table named `TRANSACTIONS` on your own before learning how
