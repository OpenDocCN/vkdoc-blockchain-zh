- fmt: '# BLOCKCHAIN Table


    For the `BLOCKCHAIN` table in Figure [3-8, e](#index_split_000.html#p49), each
    row represents a different block in the blockchain. For the `Transactions` table
    in Figure [3-9](#index_split_000.html#p49), each row represents a single transaction.
    All transactions containing the same `LEDGER_ID` number represent transactions
    contained in a single corresponding block with the same `LEDGER_ID` number.


    ## 3.3 Wallet.db


    Before we go through basically the same steps for creating `Wallet.db`, let’s
    explain our design decision as to why we create the wallet in a separate database
    instead of creating just another table in our `blockchain.db` database. It’s because
    this way we get a clear separation of concerns.


    All the data in the blockchain database is supposed to get shared over a peer-to-peer
    network, and all the data in your `Wallet.db` database is supposed to be kept
    away from others; therefore, having your application create separate connections
    to both also increases security. Another benefit is that portability of either
    your wallet or your blockchain is just a simple copy/paste of either `blockchain.db`
    or `wallet.db` from your current machine to another without the need of any extra
    code. Of course, this is not to say that the application can’t be made to work
    with only a single database or that this is all you need to keep everything secure.


    ### EXERCISE 3-2


    Try creating the next table named `WALLET` on your own before looking how we did
    it.


    **Tip** Follow same steps as in the “blockchain.db” section.


    ![](index-51_1.jpg)


    *Chapter 3 Database setup*


    If you managed to do it and realize that we might need to split the `keyPair`
    field in our `Wallet.java` class into two columns, one for each key, then great
    job. If not, then let’s go over the steps again. Let’s click the **New Database**
    button, name our table `WALLET`, and in it create two columns called `PRIVATE_KEY`
    and `PUBLIC_KEY` that will constitute our keypair. It should look similar to Figure
    [3-10](#index_split_000.html#p51).


    ***Figure 3-10.** Creating our keypair*


    ![](index-52_1.jpg)


    *Chapter 3 Database setup*


    Our complete database schema for our `wallet.db` database will look like Figure
    [3-11](#index_split_000.html#p52).


    ***Figure 3-11.** Database schema for `wallet.db`*


    ## 3.4 JDBC Driver for SQLite Setup


    Now let’s install a JDBC driver for SQLite so we can use SQL inside our app to
    set up the same schemas. Visit [https://search.maven.org/artifact/org.xerial/sqlite-jdbc/3.34.0/jar](https://search.maven.org/artifact/org.xerial/sqlite-jdbc/3.34.0/jar)
    and download the JAR manually from the downloads option, as shown in Figure [3-11](#index_split_000.html#p52).


    ![](index-53_1.jpg)


    ![](index-53_2.jpg)


    *Chapter 3 Database setup*


    ***Figure 3-12.** Downloading JARs*


    You can create a `libs` folder inside your project folder and save it there just
    like we have in our repository. Next select **File** and then **Project Structure**;
    then go to the **Libraries** tab in **Project Settings**, click the plus sign
    to add new project library, choose **Java**, and select the JAR file we just downloaded
    then click **OK**. Look at Figures [3-13](#index_split_000.html#p53) and [3-14](#index_split_000.html#p54)
    for visual help.


    ***Figure 3-13.** Selecting Java*


    ![](index-54_1.jpg)


    *Chapter 3 Database setup*


    ***Figure 3-14.** Selecting the JAR file*


    With the library in place, we can start writing our `ECoin` class that will contain
    our `main` and `init()` methods.


    ## 3.5 Writing Your App `init()` Method


    Let’s briefly start with looking at our `ECoin.java` class before we jump inside
    its `init()` method. Our `ECoin.java` class is located in the `src.com.company`
    folder structure in our repository. This is our main application class; in other
    words, our application starts from here. Our next snippet shows the class imports,
    class declaration, the `main` method, and the `start` method:


    ```

    1 package com.company;


    3 import com.company.Model.Block;


    4 import com.company.Model.Transaction;

    ```'
