    Chapter 4 Building the ui


    Before we move on to explain the code in the controllers, let’s quickly download
    and install an encoder library called Base64, which will help us convert our public
    keys that are stored as byte arrays into strings, and vice versa. This is important
    because the standard Java encoder while converting byte arrays to strings will
    change the contents of the byte arrays, which will make them invalid as a public
    key. To install our Base64 library, let’s vis[it http://migbase64.sourceforge.net/
    and do](http://migbase64.sourceforge.net/)wnload it. Once we download it, we will
    need to unzip it and place in it the libs folder next to our SQLite driver, as
    shown in Figur[e 4-25.](#index_split_000.html#p93)


    ***Figure 4-25.** Installing the encoder library called Base64*


