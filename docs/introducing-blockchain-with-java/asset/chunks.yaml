    ## Chapter 5 Setting Up the network and MUltithreading


    This chapter will cover creating our network layer; we will explain the creation
    and functionality of each of our multiple threads and how they fit into our application.
    Here we will explain the need for each thread and how some of them are used to
    create a peer-to-peer network where we transfer blockchain data and reach block
    consensus. In this chapter, we will be using the standard Java and Javafx libraries,
    which will help you learn every detail of the implementation. Before starting
    with this chapter, if you are unfamiliar with the topic of Java threads, you can
    find a quick tutorial that will help you grasp the basic concepts at [https://www.javatpoint.com/thread-concept-in-java](https://www.javatpoint.com/thread-concept-in-java).


    ### 5.1 UI Thread


    Since in our previous chapter we talked about the creation of our UI, let’s start
    first with our UI thread. The object of the UI thread is for it to load the UI
    and then wait and listen for any user interaction. To make our UI responsive,
    our UI thread will need to be actively listening for user input. To allow the
    UI thread to wait and listen, we will have to move any continuous operations such
    as mining or sending requests to peers into other threads. This thread is fairly
    simple, and it mostly contains some standard boilerplate code from the javafx
    package. Let’s look at the following code snippet:


