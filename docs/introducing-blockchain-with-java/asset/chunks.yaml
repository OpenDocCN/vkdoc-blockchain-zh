    在前面的场景中，如果对等节点 3 尝试将其区块链分享给对等节点 1，接下来会发生什么？


    **问题 6-2**


    在前面的场景中，如果对等节点 2 再次尝试将其区块链分享给对等节点 3，接下来会发生什么？


    *答案见本章末尾。*


    对于最后一种情况，当两个区块链完全相同时，则在控制台打印第 302 行的消息，并在第 307 行返回接收到的区块链。


