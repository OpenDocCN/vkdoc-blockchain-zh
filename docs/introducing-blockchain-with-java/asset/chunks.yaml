  trans: "\n一旦你挖到了一些币，就可以通过从其他节点的 UI 中复制其地址，并在`Add New Transaction`窗口中输入该地址，来实际地将这些币发送给另一个节点，如图\
    \ 7-7 所示。请注意，在当前区块达成共识之前，这些币不会出现在接收账户中。这可以防止双花问题，因为共识算法在将币分配给其他节点账户之前，会检查是否存在双花尝试。\n\
    \n**图 7-7.** 添加交易\n\n![](img/index-164_1.jpg)\n\n### 第 7 章 附加内容\n\n其他功能包括：停止其中一个节点，让其区块链变成旧状态（比其他人落后一到两分钟），然后重启该节点并观察一切如何同步。最后，你可以停止所有节点，并使用`SQLite\
    \ Developer`检查数据库。这应该能为你提供关于数据如何存储的额外洞察和确认，并且你将对你刚刚创建的整个区块链有一个很好的概览。效果应类似于图 7-8\
    \ 和图 7-9 所示。\n\n**图 7-8.** 浏览数据\n\n![](img/index-165_1.jpg)\n\n### 第 7 章 附加内容\n\
    \n**图 7-9.** 交易表\n\n### 第 7 章 附加内容\n\n## 7.2 未来改进方向\n\n如果你决定继续对该应用进行开发，以下是一些供你参考的想法：\n\
    \n-   实现比特币的工作量证明算法用于共识。\n-   实现权益证明算法。\n-   实现智能合约。\n-   实现对非同质化代币（NFT）的支持。\n\
    -   在 UI 中添加钱包功能，例如使用助记词导入/导出和创建钱包。\n-   实现通过 UI 遍历整个区块链；目前只能通过浏览数据库来实现。\n-  \
    \ 添加一个开关，可以在保持发送币功能的同时，开启/关闭挖矿。\n\n## 7.3 结论\n\n首先，我想感谢你阅读到本书的最后。本书所涵盖的内容远未穷尽所有关于区块链技术的知识，但我真诚地希望，本书为你提供了坚实的基础，并让你在使用基础\
    \ Java 的同时，对区块链有了更好的理论和实践理解。如你所见，这个应用绝不是一件成品，但它功能足够，可以成为一个不错的学习工具，供你进行实验和进一步自主学习。如果到现在为止，你已经产生了一些关于如何使用你喜欢的框架和库来改进和重写部分代码的想法，那么我认为这本书已经达到了它的目的。\n\
