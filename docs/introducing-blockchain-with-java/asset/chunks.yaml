- fmt: "Once you have mined some coins, you can actually send them to another peer\
    \ by copying the other peer’s address from their UI and using it in the `Add New\
    \ Transaction` window, as represented in Figure 7-7. Observe that until consensus\
    \ is reached for the current block, the coins won’t appear in the receiving account.\
    \ This prevents double spending because the consensus algorithm will check for\
    \ attempts at double spending before assigning the coins to the other peer’s account.\n\
    \n**Figure 7-7.** Adding a transaction\n\n![](index-164_1.jpg)\n\n### Chapter\
    \ 7 Extras\n\nOther functionality would be to stop one of the peers, let its blockchain\
    \ get old (older than one to two minutes), and then restart it and observe how\
    \ everything syncs up. Lastly, you can stop everything and check the databases\
    \ with `SQLite Developer`. This should provide you with additional insight and\
    \ confirmation of how the data is stored, and you’ll have a great overview of\
    \ the whole blockchain you have just created. Things should look similar to Figure\
    \ 7-8 and Figure 7-9.\n\n**Figure 7-8.** Browsing the data\n\n![](index-165_1.jpg)\n\
    \n### Chapter 7 Extras\n\n**Figure 7-9.** Transactions table\n\n### Chapter 7\
    \ Extras\n\n## 7.2 Topics for Future Improvements\n\nHere are some ideas for you\
    \ to consider if you decide to keep working on the application:\n\n- For consensus,\
    \ implement bitcoin’s proof-of-work algorithm.\n- Implement a proof-of-stake algorithm.\n\
    - Implement smart contracts.\n- Implement support for nonfungible tokens (NFTs).\n\
    - Add wallet functionality to the UI such as import/export and creation of wallets\
    \ with seed phrases.\n- Make the full blockchain traversable through the UI; currently\
    \ that’s only possible through browsing the database.\n- Add a toggle to turn\
    \ on/off mining while maintaining the ability to send coins.\n\n## 7.3 Conclusion\n\
    \nFirst I want to thank you for reaching the end of my book. What was covered\
    \ in this book by no means exhausts everything that can be said regarding blockchain\
    \ technology, but it is my sincere hope that it has provided you with solid fundamentals\
    \ and a better theoretical and practical understanding of blockchains while using\
    \ basic Java. The application as you can see is by no means a finished product,\
    \ but it is functional enough to be a nice learning tool that you can use to experiment\
    \ on and further your learning on your own. If by now you have started getting\
    \ ideas of how to improve and rewrite pieces of the code by using your favorite\
    \ frameworks and libraries, I’ll consider that this book has served its purpose.\n\
