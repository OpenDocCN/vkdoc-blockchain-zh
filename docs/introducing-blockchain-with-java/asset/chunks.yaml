    55 \n56             Thread.sleep(2000);\n57 \n58         } catch (SocketTimeoutException\
    \ e) {\n59             System.out.println(\"套接字超时\");\n60             queue.add(queue.poll());\n\
    61         } catch (IOException e) {\n62             System.out.println(\"客户端错误:\
    \ \" +\n63                 e.getMessage() + \" -- 端口错误: \" +\n64             \
    \    queue.peek());\n65             queue.add(queue.poll());\n66         } catch\
