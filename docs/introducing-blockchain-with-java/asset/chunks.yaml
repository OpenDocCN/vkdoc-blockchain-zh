    **6.2.1 Blockchain Consensus Protocol**


    Finally we have arrived to the method that executes the consensus algorithm in
    our application. Before we start explaining the code, we need to talk a little
    bit about blockchain consensus.


    Chapter 6 ServiCe Layer


    *Blockchain consensus*, or, in other words, the network consensus regarding the
    blockchain that each peer builds and shares, is at the heart of this technology.
    The main problem that needs to be solved for the consensus to be reached reliably
    each time is the so-called Byzantine generals problem. The term takes its name
    from an allegory developed to describe a situation in which, to avoid catastrophic
    failure of the system, the system’s actors must agree on a concerted strategy,
    but some of these actors are unreliable. In short, the byzantine generals problem
    goes like this: a number of Byzantine generals surround an enemy city and are
    trying to decide whether to attack or retreat. Whatever is decided, they must
    all follow the same decision. The problem gets more complicated by the fact that
    the generals are separated from each other, and they communicate only through
    messages. Also, some generals might be traitors and might try to spread misinformation
    to the other generals regarding their intentions to create even more confusion.


    Let’s circle back now and draw some parallels between the generals problem and
    our blockchain. The generals in question regarding our application will be the
    miners/peers. The need for consensus between them is obvious here; otherwise we
    end up with many different useless blockchains. Also, the ability of the good
    peers to discover and discard attempts at tampering with the validity of the blockchain
    by bad actors is mandatory. There is no use in reaching consensus on a blockchain
    filled with inaccuracies by bad actors. This means we have to treat each peer
    as potentially a bad actor and untrusted source.


    To explore the many complexities and problems that consensus solutions face, we
    decided to implement our own slightly modified version of the bitcoin’s proof-of-work
    algorithm. Our solution is of course far inferior to what bitcoin and other cryptocurrencies
    actually use, but we think that it will serve as a better learning tool to grasp
    the problems that consensus algorithms face.


