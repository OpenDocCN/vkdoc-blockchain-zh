    最后，我们需要检查 `jdbc` 连接，并将文件路径更改为与副本的文件路径对应。图 7-6 显示了一个示例。


    ***图 7-6.** 更改文件路径*


    其余的这些连接文件路径可以在 `ECoin` 类的 `init()` 方法以及服务层类 `BlockchainData` 和 `WalletData` 的多个方法中找到。最后这一更改将确保每个对等节点拥有自己独立的数据库来存储区块链和钱包。如果你想将钱包导出到另一个对等节点，只需将
    `wallet.db` 数据库从一个对等节点的文件夹路径复制到另一个即可。同时请记住，如果你删除了 `wallet.db` 数据库并且没有备份副本，那么该钱包的访问权限和币将永久丢失，因为你将失去密钥对。除此之外，你只需在
    IntelliJ 中运行每个副本，就能拥有一个运行中的点对点网络。


    在运行应用程序之前，请确保你已经安装了 Java SE 8。如果你不确定自己安装的版本，可以在 IntelliJ 的控制台中输入 `java -version`
    进行检查。

