    9 import java.security.GeneralSecurityException;

    10 import java.security.Signature;

    11 import java.util.Base64;


    13 public class AddNewTransactionController {


    15 @FXML

    16 private TextField toAddress;

    17 @FXML

    18 private TextField value;


    20 @FXML

    21 public void createNewTransaction()

    22 throws GeneralSecurityException {

    23 Base64.Decoder decoder = Base64.getDecoder();

    24 Signature signing =

    25 Signature.getInstance("SHA256withDSA");

    26 Integer ledgerId = BlockchainData.getInstance()

    27 .getTransactionLedgerFX().get(0).getLedgerId();

    28 byte[] sendB = decoder.decode(toAddress.getText());

    29 Transaction transaction =

    30 new Transaction(WalletData.getInstance()

    31 .getWallet(), sendB, Integer.parseInt(

    32 value.getText()), ledgerId, signing);

    33 BlockchainData.getInstance()

    34 .addTransaction(transaction,false);

    35 BlockchainData.getInstance()

    36 .addTransactionState(transaction);

    37 }

    38 }

    ```


    As you can see, it follows a similar design pattern. It contains only fields and
    methods referenced in the view and annotates them appropriately. Let’s explain
    the code in the `createNewTransaction()` method. Lines 22 and 23 instantiate objects
    from our helper classes.


    Line 24 retrieves the current `ledgerId` at the time of clicking the button.


    On line 25 we use our `Base64` object to convert our address from a string back
    into a byte array so that lines 26 and 27 can use it to create a new transaction.
    On line 28 we call on our service layer to add this transaction to the current
    block in the database. On line 29 we call on our service layer to adjust the current
    application state to include this transaction.


