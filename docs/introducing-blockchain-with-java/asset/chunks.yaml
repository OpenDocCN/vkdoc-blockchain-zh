    \ 18 行有一个`WalletData`类的静态字段，然后在第 20-22 行静态初始化它，使我们的类成为单例类。最后要提到的是`getInstance()`方法。我们使用此方法来访问该类，而不是尝试实例化新对象。让我们查看下一个代码片段，并解释此类中包含的其余代码：\n\
