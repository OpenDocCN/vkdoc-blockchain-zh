    Our `MiningThread` class extends the `Thread` class from the `java.lang` package.
    We are overriding the `run()` method to set the logic that this thread will run
    on. On line 12 we are setting a `while` loop with a `true` parameter, which means
    we will be repeating the actions of this method as long as our application is
    running. On lines 13 and 14 we are setting a field with the value of the date
    when we mined our last block in seconds.


    For this purpose we are using the `BlockchainData` class, which is part of our
    service layer that we explain how to create in our next chapter. In order not
    to burden the code, our application won’t handle different time zones; therefore,
    we will be using the standard `ZoneOffset.UTC` constant. Our first `if` statement
    on line 15 checks to see if more than 65 seconds (the timeout interval we have
    set up in our `BlockchainData` class that we will cover in Chapter 6) have passed
    since our last mined block. This will mean that our blockchain is too old, so
    there is no point in trying to mine it until we get an up-to-date version. Therefore,
    in this case, we print the message on line 16 in the console. If our first `if`
    statement is false, then on line 17 our `else if` statement checks to see if less
    than 60 seconds (the mining interval also covered in Chapter 6) have passed since
    the last mined block. If this is true, then we will print to the console the time
    remaining until we get to 60 seconds. If we reach our `else` statement on line
    20, that means we are in that time window between 60 and 65 seconds since our
    last mined block and it’s time to mine (create) another. Line 22 uses the service
    layer again to call a method to mine another block, and line 23 is used to print
    our new wallet balance to the console by using the service layer again. On lines
    25 and 26, regardless of the outcome of the previous control flow statements,
    we print out the time of our last mined block to the console just for clarity.


    Since there is no point in this thread to loop as fast as it can, on line 28 we
    call the thread to sleep for two seconds, which effectively makes this thread
    repeat every two seconds. We will set the rate of acquiring mining points to be
    one point per second; therefore, on line 29 we will add two mining points for
    each two seconds we wait.


