    For signing and verifying transactions we will rely on digital signatures (Figure
    [1-2). For now, let’s assume that anyone who adds information to the ledger also
    adds a signature with each record, and others have no way to modify the signature,
    but only to verify it. We will cover the technical details in the “Encryption”
    section.


    ***Figure 1-2.** Our ledger now contains signatures*


    ![](index-6_1.jpg)


    ## Chapter 1 Introduction to Blockchain


    However, let’s assume that Bob is keeping the ledger to himself, and everybody
    agrees to this. The ledger is now stored in what is a centralized place. But in
    this case, if Bob is unavailable at the end of the day when everybody gathers
    to settle up, nobody will be able to refer to the ledger.


    We need a way to decentralize the ledger, such that at any given time any of the
    people can do a transaction. For this, every person involved will keep a copy
    of the ledger to themselves, and when they meet at the end of the day, they will
    sync their ledgers.


    You are connected to your friends, and so are they to you. Informally, this makes
    a peer-to-peer network.


    **Definition 1-4** A *peer-to-peer network* is formed when two or more computers
    are connected to each other.


    For example, when you are accessing a web page on the Internet using a browser,
    your browser is the *client*, and the web page you’re accessing is hosted by a
    *server*. This represents a centralized system since every user is getting the
    information from a single place—the *server*.


    In contrast, in a peer-to-peer network, which represents a decentralized system,
    the distinction between a client and a server is blurred. Every peer is both a
    client and a server at the same time.


    With the system (Figure [1-3), as the list of peers (people) grows, we might run
    into a problem of trust. When everybody meets at the end of the day to sync their
    ledgers, how can they believe the others that the transactions listed in their
    ledgers are true? Even if everybody trusts everybody else for their ledger, what
    if a new person wants to join this network? It’s natural for existing users to
    ask this newcomer to prove that they can be trusted. We need to modify our system
    to support this kind of trust. One way to achieve that is through so-called *proof
    of work*, which we introduce next.


    ![](index-7_1.png)


    ![](index-7_2.jpg)


    ***Figure 1-3.** A decentralized ledger*


    **Definition 1-5** A *proof of work* is data that is time-consuming to calculate
    and easy for others to verify.


    For each record we will also include a special number (or a *hash*) that will
    represent proof of work, in that it will provide proof that the transaction is
    valid. We will cover the technical details in the “Hashing” section.


    At the end of the day, we agree that we will trust the ledger of the person who
    has put most of the work in it. If Bob has some errands to run, he can catch up
    the next day by trusting the rest of the peers in the network.


    In addition to all this, we want the transactions to have an order, so every record
    will also contain a link to the previous record. This represents the actual blockchain,
    depicted in Figure [1-4].


    ![](index-8_1.png)


    ![](index-8_2.jpg)


    ***Figure 1-4.** A chain of blocks: blockchain*


    If everybody agreed to use this ledger as a source of truth, there would be no
    need to exchange physical money at all. Everybody can just use the ledger to put
    in or retrieve money from it.


    To understand the technical bits of digital signatures and proof of work, we will
    be looking at encryption and hashing, respectively.


    Fortunately for us, the programming language that we will be using has built-in
    functionalities for encryption and hashing. We don’t have to dig too deep into
    how hashing and encryption and decryption work, but a basic understanding of them
    will be sufficient.


    Observe how we started with a simple definition of a ledger and gradually built
    up to a complex system. We will use the same approach in programming.


    ### 1.2 Encryption


    We will start with the following definition.


    **Definition 1-6** *Encryption* is a method of encoding values such that only
    authorized people can view the original content. *Decryption* is a method of decoding
    encrypted values.


    ![](index-9_1.png)


    ![](index-9_2.jpg)


    Note that in this section we will mostly talk about numbers, but characters and
    letters can also be encrypted/decrypted with the same methods, by using the ASCII[2]
    values for the characters.


    Before we talk about encryption, we first have to recall what functions are, since
    the encoding/decoding values are achieved with the usage of them.


    #### 1.2.1 Functions


    ***Figure 1-5.** A function*


    **Definition 1-7** *Functions* are mathematical entities that assign unique outputs
    to given inputs.


    For example, you might have a function that accepts as input a person and as output
    returns the person’s age or name. Another example is the function `f(x) = x +
    1`. There are many inputs this function can accept: `1`, `2`, `3.14`. For example,
    when we input `2`, it gives us an output of `3`, since `f(2) = 2 + 1 = 3`.


    > [!TIP]

    > An ASCII table is a table that assigns a unique number to each character (such
    as `!`, `@`, `a`, `Z`, etc.).


    One simple way to think of functions is in the form of tables. For a function
    `f(x)` accepting a single argument `x`, we have a two-column table where the first
    column is the input, and the second column is the output.


    For a function `f(x, y)` accepting two arguments `x` and `y`, we have a three-column
    table where the first and second columns represent the input, and the third column
    is the output. Thus, to display the function discussed earlier in the form of
    a table, it would look like this:


    | x | `f(x)` |

    |---|--------|

    | 1 | 2      |

    | 2 | 3      |

    | … | …      |


    #### 1.2.2 Symmetric-Key Algorithm


    We can assume that there exist functions `E(x)` and `D(x)` for encryption and
    decryption, respectively. We want these functions to have the following properties:


    - `E(x) ≠ x`, meaning that the encrypted value should not be the same as the original
    value

    - `E(x) ≠ D(x)`, meaning that the encryption and decryption functions produce
    different values

    - `D(E(x)) = x`, meaning that the decryption of an encrypted value should return
    the original value


    For example, let’s assume there’s some kind of an encryption scheme, say `E("Boro")
    = 426f726f`. We can “safely” communicate the value `426f726f` without actually
    exposing our original value, and only those who know the decryption scheme `D(x)`
    will be able to see that `D(426f726f) = "Boro"`.


    ![](index-11_1.png)


    ![](index-11_2.png)


    Another example of encryption scheme is for `E(x)` to shift every character in
    `x` forward, and for `D(x)` to shift every character in `x` backward.


    This scheme is known as the Caesar cipher. To encrypt the text `“abc”` we have
    `E("abc") = "bcd"`, and to decrypt it we have `D("bcd") = "abc"`.


    However, the scheme described makes a symmetric algorithm (Figure [1-6), meaning
    that we have to share the functions `E` and `D` with the parties involved, and
    as such, they may be open to attacks.


    ***Figure 1-6.** Symmetric-key algorithm*


    #### 1.2.3 Asymmetric-Key Algorithm


    To solve the problems that arise with symmetric-key algorithms, we will use what
    is called an *asymmetric algorithm* or *public-key cryptography* (Figure [1-7]).
    In this scheme, we have two kinds of keys: public and private.


    We share the public key with the world and keep the private one to ourselves.


    ***Figure 1-7.** Asymmetric-key algorithm*


    This algorithm scheme has a neat property where only the private key can decode
    a message, and the public key can encode a message.

