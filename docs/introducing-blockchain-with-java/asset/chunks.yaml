- fmt: '### Figure 4-18. Complete UX/UI design of our scene


    If you open the `MainWindow.fxml` file from IntelliJ now, you will notice that
    it has been filled up with the appropriate FXML code by Scene Builder automatically.
    Keep in mind that you need to save your changes in Scene Builder before the code
    in the FXML file gets generated. Also make sure to save the latest changes in
    Scene Builder and exit if you intend to change the FXML file manually; otherwise,
    you might desynchronize the work from Scene Builder and your local file and lose
    some of the changes.


    Until this point we have worked only on the visual design of our scene.


    We have all our elements positioned the way we want them, but what we are missing
    now are references to our back-end methods and fields so that we can use them.
    First let’s add the file path of our future controller class for this scene. This
    will create a link in the application between our view and its controller. In
    other words, the application will try to find and run/display any methods or fields
    that we will reference in the view from its corresponding controller class. To
    add the file path of our controller class, open the Controller tab in the bottom-left
    side of your screen and enter it in the Controller class text field, as shown
    in Figure [4-19](#index_split_000.html#p82).


    ![](index-82_1.jpg)

    ![](index-82_2.jpg)


    Chapter 4 Building the ui


    ### Figure 4-19. Adding the file path of our controller class


    Now let’s add a reference to the method that our refresh button should call once
    we click it. To do that, select our refresh button, expand its Code tab from the
    bottom-right side of the screen, and enter the method name in the On Action text
    field, which will be `refresh`, as shown in Figure [4-20](#index_split_000.html#p82).


    ### Figure 4-20. Adding a refresh button


    ![](index-83_1.jpg)


    Chapter 4 Building the ui


    Next let’s add reference to our public key field so that we can display it in
    our TextArea. Let’s select the TextArea and in the Code tab find the `fx:id` field;
    name it `publicKey`, as shown on Figure [4-21](#index_split_000.html#p83).


    ### Figure 4-21. Adding a reference to our public key field


    We’ll name our TextField for our coins balance `eCoins`, as shown in Figure [4-22](#index_split_000.html#p84).


    ![](index-84_1.jpg)

    ![](index-84_2.jpg)


    Chapter 4 Building the ui


    ### Figure 4-22. Naming our coins balance


    Now that we’ve shown you how to add controller references, you should be able
    to finish adding the rest on your own.


    **EXERCISE 4-4**


    Add references to the `fx:id` field for our first BorderPane as `borderPane`,
    for our tableView as `tableview`, for our From tableColum as `from`, for our to
    tableColumn as `to`, for our Value tableColumn as `value`, for our Signature tableColumn
    as `signature`, for our Created On tableColumn as `timestamp`.


    **Note:** these are case-sensitive values, so make sure to add them exactly as
    written.


    ![](index-85_1.jpg)


    Chapter 4 Building the ui


    **EXERCISE 4-5**


    Add references to the On action field for our Make transaction MenuItem as `toNewTransactionController`,
    and for the exit MenuItem as `handleExit`.


    **Note:** these are case-sensitive values, so make sure to add them exactly as
    written.


    Double-check to see if your changes are identical to the `MainWindow.fxml` code
    in the following code snippet or found in our repository:


    ```

    1 <?xml version="1.0" encoding="UTF-8"?>

    2

    3 <?import javafx.scene.control.Button?>

    4 <?import javafx.scene.control.Label?>

    5 <?import javafx.scene.control.Menu?>

    6 <?import javafx.scene.control.MenuBar?>

    7 <?import javafx.scene.control.MenuItem?>

    8 <?import javafx.scene.control.TableColumn?>

    9 <?import javafx.scene.control.TableView?>

    10 <?import javafx.scene.control.TextArea?>

    11 <?import javafx.scene.control.TextField?>

    12 <?import javafx.scene.layout.AnchorPane?>

    13 <?import javafx.scene.layout.BorderPane?>

    14

    15 <BorderPane fx:id="borderPane" maxHeight="-Infinity"

    ```'
