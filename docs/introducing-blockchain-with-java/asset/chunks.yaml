    need our application to both act as a client and send requests to other peers
    and act as a server where it listens for requests from other peers and serves
    them. Let’s start first with our `PeerClient` class thread.


    For the purposes of our book, we won’t be exposing our network to the Internet
    due to security concerns; instead, we will set different local ports to act as
    if they are different peers on our network.


