  22 和 23 行从我们的辅助类中实例化了对象。


  第 24 行在点击按钮时获取当前的 `ledgerId`。


  在第 25 行，我们使用 `Base64` 对象将地址从字符串转换回字节数组，以便第 26 和 27 行可以用它来创建新交易。在第 28 行，我们调用服务层将此交易添加到数据库的当前区块中。在第
