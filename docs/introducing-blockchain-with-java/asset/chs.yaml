- '# 第 2 章 模型：区块链核心


  接下来查看类声明及其字段，如下一个代码片段所示：


  ```java

  13 public class Transaction implements Serializable {

  15 private byte[] from;

  16 private String fromFX;

  17 private byte[] to;

  18 private String toFX;

  19 private Integer value;

  20 private String timestamp;

  21 private byte[] signature;

  22 private String signatureFX;

  23 private Integer ledgerId;

  ```


  由于此类也会创建构成区块链的对象，它将实现`Serializable`接口，以便通过网络共享。


  字段`from`和`to`分别包含发送方和接收方账户的公钥/地址。


  `value`是发送的货币数量，`timestamp`是交易发生的时间。`signature`包含所有字段的加密信息，用于验证交易的有效性（其使用方式与上一类中`currHash`字段相同）。`ledgerId`的作用与上一类中相同。带有`FX`后缀的字段是简单的副本，格式化为`String`而非`byte[]`。这样做的目的是为了方便在前端显示。


  在本类中还有两个构造函数：第一个用于从数据库检索交易时使用，第二个用于在应用程序内创建新交易时使用。让我们在以下代码片段中观察它们：


  ```java

  26 // 用于加载现有签名的构造函数

  27 public Transaction(byte[] from, byte[] to, Integer value, byte[] signature, Integer
  ledgerId,

  28                    String timeStamp) {

  29     Base64.Encoder encoder = Base64.getEncoder();

  30     this.from = from;

  31     this.fromFX = encoder.encodeToString(from);

  32     this.to = to;

  33     this.toFX = encoder.encodeToString(to);

  34     this.value = value;

  35     this.signature = signature;

  36     this.signatureFX = encoder.encodeToString(signature);

  37     this.ledgerId = ledgerId;

  38     this.timestamp = timeStamp;

  39 }

  40 // 用于创建新交易并对其签名的构造函数

  41 public Transaction(Wallet fromWallet, byte[] toAddress, Integer value, Integer
  ledgerId,

  42                    Signature signing) throws InvalidKeyException, SignatureException
  {

  43     Base64.Encoder encoder = Base64.getEncoder();

  44     this.from = fromWallet.getPublicKey().getEncoded();

  45     this.fromFX = encoder.encodeToString(fromWallet.getPublicKey().getEncoded());

  46     this.to = toAddress;

  47     this.toFX = encoder.encodeToString(toAddress);

  48     this.value = value;

  49     this.ledgerId = ledgerId;

  50     this.timestamp = LocalDateTime.now().toString();

  51     signing.initSign(fromWallet.getPrivateKey());

  52     String sr = this.toString();

  53     signing.update(sr.getBytes());

  54     this.signature = signing.sign();

  55     this.signatureFX = encoder.encodeToString(this.signature);

  56 }

  ```


  '
- '# 第 2 章 模型：区块链核心


  第一个构造函数根据从数据库检索的数据设置类字段，并使用`Base64.Encoder`类将`byte[]`字段安全地转换为`String`。




  第二个构造函数稍微复杂一些，因此我们将逐段详细解释它。首先，让我们看看不同的构造函数参数：`Wallet fromWallet`和`Signature signing`。我们将在下一节更详细地解释`Wallet`类，目前只需注意`fromWallet`参数包含交易发送者/创建者的公钥和私钥。我们使用了与前一节`Block`类的`isVerified`方法中相同的`Signature`类。


  接下来，我们将解释构造函数的主体，以便了解在我们的案例中加密数据是如何工作的。图 2-1 所示的签名创建阶段概述了我们要实现的目标。


  ***图 2-1.** 签名创建*


  第 2 章 模型：区块链核心


  为了实现这一点，首先我们通过参数初始化类的字段来设置数据，并在第 44 到 50 行添加时间戳。现在，一旦我们有了想要加密的数据，我们在第 51 行通过语句将私钥设置到签名对象中。这告诉签名对象在加密时使用我们提供的私钥。在第
  52 行，我们使用`toString()`方法将所有要加密的数据放入一个`String`对象中。在第 53 行，我们将所有要加密的数据提供给签名对象，在第 54
  行，我们实际加密数据并将其赋值给我们的`signature`字段。


  接下来是用于验证交易的方法，如下面的代码片段所示：


  ```

  58 public Boolean isVerified(Signature signing)

  59   throws InvalidKeyException, SignatureException {

  60   signing.initVerify(new DSAPublicKeyImpl(this.

  61   getFrom()));

  62   signing.update(this.toString().getBytes());

  63   return signing.verify(this.signature);

  64 }

  ```


  此方法将被其他对等节点用于验证每笔交易是否有效。在解释代码之前，让我们看看图 2-2 以及我们的方法试图实现什么。


