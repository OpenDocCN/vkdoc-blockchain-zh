  102    pstmt.executeUpdate();\n103    Signature transSignature = Signature.getInstance(\"\
  SHA256withDSA\");\n104    initBlockRewardTransaction = new Transaction(WalletData.getInstance().getWallet(),\
  \ WalletData.getInstance().getWallet().getPublicKey().getEncoded(), 100, 1, transSignature);\n\
  105 }\n106 resultSetBlockchain.close();\n```\n\n第 80 行查询我们的 `BLOCKCHAIN` 表，第 82\
  \ 行检查区块链是否存在；如果不存在，则执行第 83–105 行。第 83 行使用我们的第三个区块构造函数。第 84 行从 `WalletData` 单例类中检索我们的公钥，并将我们设置为初始区块的创建者/矿工。第\
  \ 85 行设置时间戳。第 87 到 90 行实例化并使用 `java.security` 中的 `Signature` 类，通过区块创建者/矿工的私钥加密区块中包含的所有数据，并将其设置为我们当前的哈希值。同样的过程在图\
  \ 2-1 中有所展示，并在其中进行了更详细的解释。第 91–102 行将初始区块的数据从应用程序导出到我们的 `BLOCKCHAIN` 表中。在第 103 和\
  \ 104 行，我们为区块准备了初始区块奖励交易。我们暂不将其转移到 `TRANSACTIONS` 表，因为还不确定该表是否存在于数据库中。让我们看看下面处理\
  \ `TRANSACTIONS` 表的代码片段：\n\n```java\n108 blockchainStmt.executeUpdate(\"CREATE TABLE\
  \ IF NOT EXISTS TRANSACTIONS ( \" +\n109         \" ID INTEGER NOT NULL UNIQUE,\
  \ \" +\n110         \" \\\"FROM\\\" BLOB, \" +\n111         \" \\\"TO\\\" BLOB,\
  \ \" +\n112         \" LEDGER_ID INTEGER, \" +\n113         \" VALUE INTEGER, \"\
  \ +\n114         \" SIGNATURE BLOB UNIQUE, \" +\n115         \" CREATED_ON TEXT,\
  \ \" +\n116         \" PRIMARY KEY(ID AUTOINCREMENT) \" +\n117         \")\");\n\
  118 if (initBlockRewardTransaction != null) {\n119     BlockchainData.getInstance().addTransaction(initBlockRewardTransaction,\
  \ true);\n120     BlockchainData.getInstance().addTransactionState(initBlockRewardTransaction);\n\
  121 }\n122 blockchainStmt.close();\n123 blockchainConnection.close();\n124 } catch\
  \ (SQLException | NoSuchAlgorithmException | InvalidKeyException | SignatureException\
  \ e) {\n125     System.out.println(\"db failed: \" + e.getMessage());\n126 } catch\
  \ (GeneralSecurityException e) {\n127     e.printStackTrace();\n128 }\n129 BlockchainData.getInstance().loadBlockChain();\n\
  130 }\n131 }\n```\n\n在第 108 到 118 行，我们检查 `TRANSACTIONS` 表是否存在，如果不存在则创建它，方式与我们处理之前表格的方式非常相似。第\
  \ 119 行检查我们是否已创建初始奖励交易，如果已创建，则第 120 和 121 行将其转移到数据库并设置我们的应用程序状态。第 130 行最后的声明显示，我们的单例类\
  \ `BlockData` 正在加载存储在 `blockhain.db` 数据库中的数据。在下一章中，我们将解释如何实现这一点。\n\n## 3.6 总结\n\n\
  在本章中，我们介绍了如何创建两个不同的数据库来支持我们的应用程序。我们还创建了 `init()` 方法，其功能可轻松实现钱包的移植和创建。此外，我们确保了当区块链不存在时，应用程序能够创建区块链中的第一个区块。这是对我们目前所涵盖概念的简要回顾：\n\
  \n- 使用数据库浏览器程序创建数据库和表结构\n- 创建应用程序的主类\n- 创建我们的 `start(Stage s)` 方法\n- 在 Java 中设置\
  \ SQLite 驱动，并使用它通过 Java 和 SQL 创建和查询数据库\n- 通过使用 SQLite 驱动和 Java 为应用程序的 `init()` 方法创建业务逻辑\n\
