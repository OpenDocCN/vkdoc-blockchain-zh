  ***图 2-2.** 验证阶段*


  流程示意图非常简单；我们需要使用公钥比较签名哈希与类中包含的数据哈希。


  现在，让我们回到`isVerified`方法，解释流程示意图中的工作流是如何实现的。作为参数，我们接收要验证的`Transaction`对象和`Signature`辅助类对象，该对象已像之前一样预先初始化为使用带有
  DSA 算法的 SHA256。在第 60 行，我们设置用于解密签名的公钥。`new DSAPublicKeyImpl(byte[] encoded)`只是`sun.security.provider`包中的一个包装器，它将帮助将我们的公钥信息从`byte[]`转换为`PublicKey`对象。在第
  61 行，我们设置要针对签名进行验证的交易数据。最后，在第 62 行（`Blockchaintransaction.java`），我们提供签名，比较/验证过程会执行，并自动为我们返回结果。


