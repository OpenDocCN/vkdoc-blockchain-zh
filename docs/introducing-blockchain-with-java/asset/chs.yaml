  [³]: Hashcash 最初的目标是限制电子邮件垃圾邮件和其他攻击。然而，最近它因其在区块链挖矿过程中的使用而闻名。Hashcash 于 1997 年由亚当·贝克提出。


  ## 1.4 智能合约


  **定义 1-10** *智能合约*是一种自动执行的合约，其中买方和卖方之间的协议条款被直接写入代码行中。


  如果交易本身可以由用户编程，那么区块链就是可编程的。例如，用户（不一定是程序员）可以编写脚本，添加在发送资金之前必须满足的额外要求。它可能看起来像这样：


  ```

  1 if (用户拥有超过 10 的货币)

  2 then 批准交易

  3 else 拒绝交易

  ```


  智能合约被实现为在区块链上发生的计算。


  ## 1.5 比特币


  比特币是世界上第一个区块链实现。2008 年 11 月，一篇由中本聪撰写的题为“比特币：一种点对点的电子现金系统”的论文链接发布在一个密码学邮件列表中。比特币的白皮书共有九页；然而，它主要是一个理论上的设计解释，因此对新手来说可能有点难以理解。


  比特币软件是开源代码，于 2009 年 1 月在 SourceForge 上发布。比特币的设计包括去中心化网络（点对点网络）、区块（挖矿）、区块链、交易和钱包，我们将在本书中详细探讨每一个部分。


  尽管有许多区块链模型，且每个模型在实现细节上有所不同，但我们在本书中将要构建的区块链将与比特币非常相似，只是对某些部分进行了简化。


  ## 1.6 示例工作流程


  我们将列出我们的系统将使用的几个重要工作流程，以及其他一些流程。


  挖矿创建一个新区块，使用 Hashcash 来计算区块的当前哈希。它还包括作为区块链中前一个区块链接的先前哈希。


  检查钱包余额，适用于个人 A。首先过滤区块链中的所有区块（`发送方 = A` 或 `接收方 = A`），然后对它们求和以计算余额。我们的区块链增长得越大，此操作所需的时间就越长。为此，我们将使用未花费的交易输出或
  UTXO 模型。此模型是一个交易列表，其中包含关于所有者及其货币数量的信息。因此，每笔交易都将消耗此列表中的元素。




