  \n### 6.2.1 区块链共识协议\n\n终于，我们到达了在应用程序中执行共识算法的方法。在开始解释代码之前，我们需要先讨论一下区块链共识。\n\n*区块链共识*，或者说，关于每个对等节点构建和共享的区块链的网络共识，是这项技术的核心。要实现每次都可靠地达成共识，需要解决的主要问题是所谓的拜占庭将军问题。这个术语源自一个寓言，用于描述这样一种情况：为了避免系统灾难性故障，系统的参与者必须就一项协调策略达成一致，但其中一些参与者是不可靠的。简而言之，拜占庭将军问题是这样描述的：一群拜占庭将军包围了一座敌军城市，正在决定是进攻还是撤退。无论做出什么决定，他们都必须遵循相同的决定。问题因将军们彼此隔离、仅通过消息进行通信而变得更加复杂。此外，有些将军可能是叛徒，可能会向其他将军散布关于他们意图的虚假信息，以制造更多混乱。\n\
  \n现在让我们回到正题，在将军问题和我们的区块链之间进行一些类比。关于我们的应用程序，这里的将军将是矿工/对等节点。它们之间达成共识的必要性是显而易见的；否则，我们最终会得到许多不同的、无用的区块链。此外，好的对等节点必须有能力发现并丢弃坏的行为者篡改区块链有效性的企图。如果在一个充满坏行为者造成的错误的区块链上达成共识，那将毫无用处。这意味着我们必须将每个对等节点都视为潜在的坏行为者和不可信来源。\n\
  \n为了探索共识解决方案面临的许多复杂性和问题，我们决定实现一个略微修改的比特币工作量证明算法版本。当然，我们的解决方案远不如比特币和其他加密货币实际使用的方案，但我们认为，它将作为更好的学习工具，帮助掌握共识算法面临的问题。\n\
  \n```\n278 public LinkedList<Block> getBlockchainConsensus(LinkedList<Block> receivedBC)\
  \ {\n279     try {\n280         // 验证接收到的区块链的有效性。\n281         verifyBlockChain(receivedBC);\n\
  282         // 检查我们是否收到了完全相同的区块链。\n283         if (! Arrays.equals(receivedBC.getLast().getCurrHash(),\
  \ getCurrentBlockChain().getLast().getCurrHash())) {\n284             if (checkIfOutdated(receivedBC)\
  \ != null) {\n285                 return getCurrentBlockChain();\n286          \
  \   } else {\n287                 if (checkWhichIsCreatedFirst(receivedBC) != null)\
  \ {\n288                     return getCurrentBlockChain();\n289               \
  \  } else {\n290                     if (compareMiningPointsAndLuck(receivedBC)\
  \ != null) {\n291                         return getCurrentBlockChain();\n292  \
  \                   }\n293                 }\n294             }\n295         //\
  \ 如果只有交易账本不同，则合并它们。\n296         } else if (! receivedBC.getLast().getTransactionLedger().equals(getCurrentBlockChain()\n\
  297             .getLast().getTransactionLedger())) {\n298             updateTransactionLedgers(receivedBC);\n\
  299             System.out.println(\"Transaction ledgers updated\");\n300      \
  \       return receivedBC;\n301         } else {\n302             System.out.println(\"\
  blockchains are identical\");\n303         }\n304     } catch (GeneralSecurityException\
  \ e) {\n305         e.printStackTrace();\n306     }\n307     return receivedBC;\n\
  308 }\n```\n\n我们的`getBlockchainConsensus`方法接受一个`LinkedList<Block>`参数，该参数代表我们从对等节点接收到的区块链。我们将对我们的本地区块链和接收到的区块链执行验证检查和多次比较。首先，我们将解释方法的整体逻辑，然后深入解释我们尚未介绍的每个方法。在第\
  \ 281 行，我们首先验证接收到的区块链的有效性。如前所述，我们不信任任何对等节点，因此我们总是验证从他们那里得到的任何内容。如果我们收到的方法未能通过验证检查，故事就此结束。我们的应用程序会抛出异常，并丢弃接收到的区块链。如果接收到的区块链通过验证，则我们继续进行比较。在第\
  \ 283 行，我们执行第一个比较：比较我们自己的方法和接收到的那个。这里我们检查每个区块链的当前哈希值是否完全匹配。只有当我们的区块链完全匹配时，此检查才会为真。\n\
  \n让我们回顾一下我们的区块链与接收到的区块链的当前哈希值不匹配的情况。\n\n这意味着两个区块链有不同矿工挖掘的最后一个区块。当发生这种情况时，意味着我们需要执行一些共识检查，以确定哪个矿工有权挖掘最后一个区块。\n\
  \n\n\n# 共识检查过程\n\n我们的第一个共识检查是确定是否有任何区块链已经过时，即检查它们是否比一个完整的挖矿间隔更旧。我们将在后面进一步详细解释`checkIfOutdated`方法；现在仅提及它的功能。它简单地确定是否有任何方法过时并将其丢弃。如果接收到的区块链过时，则我们继续使用自己的。如果我们的区块链过时，则丢弃自己的并从此时开始使用接收到的。如果两者都过时，则我们不对共识做任何操作，并等待接收一个最新的区块链。如果两者都是最新的，则我们继续执行共识检查。\n\
  \n下一个检查在第 287 行，运行`checkWhichIsCreatedFirst`方法。此方法用于确定两个区块链是否具有相同的初始区块。如果不同，我们将使用最先创建的那个。在第\
  \ 290 行的下一个检查是在两个区块链具有相同初始区块时到达的。这里我们运行`compareMiningPointsAndLuck`方法。当我们到达此方法时，已确定接收到的区块链是有效的，并且两个区块链都是最新的，且在最后一个区块之前完全相同。为了确定我们将使用哪个区块链的最后一个区块，我们将检查每个区块链记录的挖矿点数。如果出现平局，我们将根据它们记录的运气值（只是一个大的随机数）来确定结果。\n\
  \n现在让我们回到第 283 行，讨论区块链当前哈希值相同的情况。这意味着最后一个区块的矿工在此方法的先前运行中已经确定。回顾第 5 章，我们不断尝试将我们的区块链分享给其他对等节点，因此`getBlockchainConsensus`方法会重复运行。所以如果我们的当前哈希值相同，则继续执行到第\
  \ 296 行。在第 296 行，我们比较区块链的交易账本。\n\n有些情况下，我们在获取该区块期间发生的所有交易之前就已确定了正确的矿工。让我们设想一种情况：对等节点\
  \ 1、对等节点 2 和对等节点 3 在刚刚挖出一个新区块后尝试分享它们的区块链。对等节点 1 具有最高的挖矿点数，因此我们期望其区块链在对等节点 2 和对等节点\
  \ 3 的共识检查中获胜。然而，所有对等节点开始时只拥有它们自己记录在其区块上的交易。首先对等节点 1 将其区块链分享给对等节点 2，对等节点 2 接受对等节点\
  \ 1 的最后一个区块，但也将其自己的交易添加到对等节点 2 已有的交易中。接下来，对等节点 1 将其区块链分享给对等节点 3，同样的事情发生。此时，对等节点\
  \ 2 和对等节点 3 都包含对等节点 1 的最后一个区块及其交易。此时，当对等节点 2 尝试将其区块链分享给对等节点 3 时，它们将具有相同的当前哈希值，因为两者都有对等节点\
  \ 1 的最后一个区块；然而，对等节点 2 缺少对等节点 3 的交易，反之亦然。这就是共识算法到达第 296 行并检查它们交易账本的时刻。由于它们的交易账本不相同，将调用第\
  \ 298 行的`updateTransactionLedgers`方法。\n\n**问题 6-1**\n\n在前面的场景中，如果对等节点 3 尝试将其区块链分享给对等节点\
  \ 1，接下来会发生什么？\n\n**问题 6-2**\n\n在前面的场景中，如果对等节点 2 再次尝试将其区块链分享给对等节点 3，接下来会发生什么？\n\n\
  *答案见本章末尾。*\n\n对于最后一种情况，当两个区块链完全相同时，则在控制台打印第 302 行的消息，并在第 307 行返回接收到的区块链。\n\n## 服务层方法详解\n\
