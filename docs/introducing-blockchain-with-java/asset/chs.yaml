  \n`getConsensus`方法中唯一需要解释的方法就是`updateTransactionLedgers`方法。让我们看看下面的代码片段：\n\n```\n\
  310 private void updateTransactionLedgers(LinkedList<Block> receivedBC) throws GeneralSecurityException\
  \ {\n311     for (Transaction transaction : receivedBC.getLast().getTransactionLedger())\
  \ {\n312         if (!getCurrentBlockChain().getLast().getTransactionLedger().contains(transaction))\
  \ {\n313             getCurrentBlockChain().getLast().getTransactionLedger().add(transaction);\n\
  314             System.out.println(\"current ledger id = \" + getCurrentBlockChain().getLast().getLedgerId()\
  \ + \" transaction id = \" + transaction.getLedgerId());\n315             addTransaction(transaction,\
  \ false);\n316         }\n317     }\n318     getCurrentBlockChain().getLast().getTransactionLedger().sort(transactionComparator);\n\
  319     for (Transaction transaction : getCurrentBlockChain().getLast().getTransactionLedger())\
  \ {\n320         if (!receivedBC.getLast().getTransactionLedger().contains(transaction))\
  \ {\n321             receivedBC.getLast().getTransactionLedger().add(transaction);\n\
  322         }\n323     }\n324     receivedBC.getLast().getTransactionLedger().sort(transactionComparator);\n\
  325 }\n```\n\n此方法用于在本地和接收到的区块链的最后一个区块之间，共享可能缺失的任何交易。在第 311 行，我们遍历接收到的区块链最后一个区块账本中的交易。在第\
  \ 312 行，我们检查本地区块链的最后一个区块账本是否包含每个交易。如果不包含，则将其添加到本地区块链和数据库中。在第 319 行，我们进行第二次循环，遍历本地区块链最后一个区块的交易。在第\
  \ 320 行，我们检查每个交易是否包含在接收到的区块链中。如果不包含，则将其添加到接收到的区块链中。\n\n最后，在这个类中，我们有一些简单的 getter\
  \ 和 setter 方法，如下面的代码片段所示：\n\n```\n420 public LinkedList<Block> getCurrentBlockChain()\
  \ {\n421     return currentBlockChain;\n422 }\n424 public void setCurrentBlockChain(LinkedList<Block>\
  \ currentBlockChain) {\n425     this.currentBlockChain = currentBlockChain;\n426\
  \ }\n428 public static int getTimeoutInterval() { return TIMEOUT_INTERVAL; }\n430\
  \ public static int getMiningInterval() { return MINING_INTERVAL; }\n432 public\
  \ int getMiningPoints() {\n433     return miningPoints;\n434 }\n436 public void\
  \ setMiningPoints(int miningPoints) {\n437     this.miningPoints = miningPoints;\n\
  438 }\n440 public boolean isExit() {\n441     return exit;\n442 }\n444 public void\
  \ setExit(boolean exit) {\n445     this.exit = exit;\n446 }\n447 }\n```\n\n## 总结\n\
  \n在本章中，我们介绍了应用程序的完整服务层。我们讨论了单例类设计以及它如何适用于我们的应用程序。接着，我们介绍了支持钱包和区块链功能的方法。我们通过实现这些方法所使用的逻辑，了解了前几章的功能是如何实现的。我们介绍的最重要的内容之一就是区块链共识的实现。\n\
  \n以下是本章内容的简要回顾：\n\n- 钱包功能\n- 使用单例类\n- 与 JavaFX 前端的接口\n- 区块链功能\n- 前几章功能的实现\n- 区块链共识的实现\n\
  \n问题 6-1 的答案：第 298 行的`updateTransactionLedgers`方法将被调用。\n\n问题 6-2 的答案：两个区块链是相同的；控制台会打印第\
  \ 302 行的消息，并且接收到的区块链会在第 307 行被返回。\n\n![](img/index-160_1.jpg)\n\n# 额外内容\n\n本章将介绍如何设置和运行我们的区块链应用程序。我们还将讨论扩展应用程序功能的主题和想法，并对本书进行总结。\n\
  \n## 运行应用程序\n\n在前面的章节中，我们提到由于安全原因，不会将应用程序暴露到互联网上，而是决定在本地进行测试。为此，我们首先需要创建 e-coin\
  \ 项目文件夹的多个副本，如图 7-1 所示。\n\n***图 7-1.** 创建 e-coin 项目的副本*\n\n下一步是在 IntelliJ 中打开每个项目。你可以通过选择“文件”，然后选择“打开项目”，选择其他文件夹，并在提示时选择在新窗口中打开来实现。你可以参考图\
  \ 7-2 和图 7-3。\n\n© Spiro Buzharovski 2022\nS. Buzharovski, *Introducing Blockchain\
  \ with Java*,\n[`doi.org/10.1007/978-1-4842-7927-4_7`](https://doi.org/10.1007/978-1-4842-7927-4_7#DOI)\n\
  \n![](img/index-161_1.jpg) ![](img/index-161_2.jpg)\n\n***图 7-2.** 导航到文件夹*\n\n***图\
  \ 7-3.** 打开项目*\n\n完成此步骤并且所有副本都在 IntelliJ 中打开后，就该更改一些硬编码的值，以确保每个副本都是自己独立的对等节点了。首先更改\
  \ `PeerServer` 端口，因为每个对等节点都需要有自己的端口号。见图 7-4。\n\n![](img/index-162_1.jpg) ![](img/index-162_2.jpg)\
  \ ![](img/index-162_3.jpg)\n\n***图 7-4.** 更改 `PeerClient` 端口*\n\n接下来，我们需要在 `PeerClient`\
  \ 类的构造函数中，将其他对等节点的套接字端口号添加到彼此的 `PeerClient` 队列中，如图 7-5 所示。\n\n***图 7-5.** 添加套接字编号*\n\
  \n最后，我们需要检查 `jdbc` 连接，并将文件路径更改为与副本的文件路径对应。图 7-6 显示了一个示例。\n\n***图 7-6.** 更改文件路径*\n\
  \n其余的这些连接文件路径可以在 `ECoin` 类的 `init()` 方法以及服务层类 `BlockchainData` 和 `WalletData` 的多个方法中找到。最后这一更改将确保每个对等节点拥有自己独立的数据库来存储区块链和钱包。如果你想将钱包导出到另一个对等节点，只需将\
  \ `wallet.db` 数据库从一个对等节点的文件夹路径复制到另一个即可。同时请记住，如果你删除了 `wallet.db` 数据库并且没有备份副本，那么该钱包的访问权限和币将永久丢失，因为你将失去密钥对。除此之外，你只需在\
  \ IntelliJ 中运行每个副本，就能拥有一个运行中的点对点网络。\n\n在运行应用程序之前，请确保你已经安装了 Java SE 8。如果你不确定自己安装的版本，可以在\
  \ IntelliJ 的控制台中输入 `java -version` 进行检查。\n\n\n\n一旦你挖到了一些币，就可以通过从其他节点的 UI 中复制其地址，并在`Add\
  \ New Transaction`窗口中输入该地址，来实际地将这些币发送给另一个节点，如图 7-7 所示。请注意，在当前区块达成共识之前，这些币不会出现在接收账户中。这可以防止双花问题，因为共识算法在将币分配给其他节点账户之前，会检查是否存在双花尝试。\n\
  \n**图 7-7.** 添加交易\n\n![](img/index-164_1.jpg)\n\n# 第 7 章 附加内容\n\n其他功能包括：停止其中一个节点，让其区块链变成旧状态（比其他人落后一到两分钟），然后重启该节点并观察一切如何同步。最后，你可以停止所有节点，并使用`SQLite\
  \ Developer`检查数据库。这应该能为你提供关于数据如何存储的额外洞察和确认，并且你将对你刚刚创建的整个区块链有一个很好的概览。效果应类似于图 7-8\
