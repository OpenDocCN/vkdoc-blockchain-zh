- '# 第 3 章 数据库设置


  为了更好地可视化我们的区块链和钱包数据，我们选择实现一个 SQLite 数据库，而不是将其存储在原始文件数据格式中。我们的计划是为区块链设置一个数据库，为钱包设置另一个数据库，以便更好地分离关注点并提高安全性。在本章中，我们将学习如何从头开始设置数据库，并为我们的应用程序编写一个
  `init()` 方法，该方法将使用 SQL 编写我们的表模式，并带有预设的默认值。为此，我们将使用 SQLite JDBC 驱动程序和 SQLite 数据库浏览器。


  ## 3.1 SQLite 数据库浏览器设置


  首先，我们将从 <https://sqlitebrowser.org/dl/> 下载我们的 SQLite 数据库浏览器。只需为你的操作系统下载推荐版本，并使用推荐设置将其安装到你的机器上。运行它后，应用程序看起来应该类似于图
  [3-1]。


  **图 3-1.** *我们的应用程序*


  ![](img/index-41_1.jpg)


  这意味着你已经成功安装了数据库浏览器，我们可以继续设置我们的实际数据库了。


  ## 3.2 Blockchain.db


  我们将实现的第一个数据库是用于存储区块链数据的数据库，我们将其恰当地命名为 `blockchain.db`。在本章中，我们将学习如何使用 SQLite 浏览器逐步设置我们的数据库。然而，在“编写你的应用程序
  `init()` 方法”部分，我们将学习如何使用 SQL 和 SQL JDBC 驱动程序以编程方式设置我们的数据库。理想情况下，本章将通过数据库浏览器可视化区块链中包含的数据，并帮助缩小那些不熟悉
  SQL 的人的知识差距。“编写你的应用程序 `init()` 方法”部分将为你提供 SQL 代码，并教你如何在将来以编程方式实现数据库设置。


