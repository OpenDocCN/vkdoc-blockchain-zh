- '# 第 1 章 区块链简介


  以下是本章的要点速览：


  - 系统的核心实体是区块。

  - 区块包含（除其他数据外）交易数据。

  - 我们拥有一个账本，即所有有效区块的有序列表（区块链）。

  - 每个参与账本的节点都拥有一个钱包。

  - 账本中的每条记录均由所有者签名，并可被公众验证（数字签名）。

  - 账本采用去中心化存储，即每个人都拥有其副本。

  - 信任基础建立在工作量证明（挖矿）之上。


