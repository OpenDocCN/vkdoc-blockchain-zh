  **重要提示！**


  - 注意，我们的区块链钱包不需要任何关于钱包持有者的信息。这是钱包持有者匿名性的基础。

  - 我们的区块链钱包也不会包含任何存储钱包当前余额的字段。我们将在[第 6 章](https://doi.org/10.1007/978-1-4842-7927-4_6)中解释如何获取钱包余额。


  接下来，让我们看看下一个代码片段中的前两个构造函数，当我们想要创建一个新钱包并为其分配一个新的密钥对时，将用到它们：


