  raw: '### Delegating responsibilities


    We’re going to use `node.py` as the entrypoint for running our node. “What’s an
    entrypoint?” you ask. Think of it as the canonical way to run our node. I find
    it helpful, when designing programs, to be as abstract as possible—design how
    you want the program to run before implementing anything:


    ```

    # Instantiate the server with some config

    server = Server(**some_config)

    # Start the server

    server.run()

    ```


    Pause here for a brief moment and think about the various parts that we’ll be
    implementing: do you think our fake `Server()` class should be responsible for
    holding our blockchain? How about making transactions? If it’s responsible for
    running *everything*, then how will be swap out our transactions model for, say,
    UTXOs at a later point?


    A sound principle when designing applications is that *each module should be responsible
    for doing one thing and doing it well* . Here’s a better way of abstracting our
    server:


    ```

    from funcoin.blockchain import Blockchain

    from funcoin.pool import ConnectionPool

    from funcoin.server import Server

    # Instantiate  the  blockchain  and our pool for "peers"

    blockchain = Blockchain()

    connection_pool = ConnectionPool()

    # Instantiate the server and "bolt on" our modules

    server = Server(blockchain, connection_pool)

    # Now start the server

    server.start()

    ```


    Now, we have a much cleaner abstraction—our server need not concern itself with
    the blockchain at all; it just needs to worry about being a server. Without explaining
    the various modules right now, here’s what our final `node.py` looks like.


    ```

    1  import asyncio


    3  from funcoin.blockchain import Blockchain

    4  from funcoin.connections import ConnectionPool

    5  from funcoin.peers import P2PProtocol

    6  from funcoin.server import Server


    8  blockchain = Blockchain() ①

    9  connection_pool = ConnectionPool() ②


    11  server = Server(blockchain, connection_pool, P2PProtocol)


    14  async def main():

    15      # Start the server

    16      await server.listen()


    19  asyncio.run(main())

    Listing 7-1

    funcoin/node.py

    ```


    Notice the instantiation of the `Connectionpool` ① and `Blockchain` classes ②.
    This ensures that they re stateful singletons—meaning that any module doing a
    `from node import connection_pool` will be importing the same instantiated object,
    thus maintaining state.


    Let’s set the goal of our four critical modules before implementing them.


    | **Module** | **Description** |

    | --- | --- |

    | `blockchain` | Module to house our `Blockchain` class containing the de facto
    blockchain we built in earlier chapters |

    | `Peers` | Logic to handle the propagation of messages that peers may send us:
    how we communicate. We’ll call this the `P2PProtocol` |

    | `connections` | Logic to handle the “pool” of active connections communicating
    with our node |

    | `server` | Where our basic TCP `Server` lives |


    Note


    Since we’re using `asyncio` (as opposed to threads), we’re vastly simplifying
    the concurrency problem: when using threads the programmer needs to worry about
    race conditions (two or more threads compete to update or receive something).The
    downside of this approach is that the code can become difficult to read and reason
    about (but in my experience, well worth it if you take the time to follow it).


    Our entrypoint has a single function `main()`. Typical of an `asyncio` program,
    it’s used to spin up our server.


    ## The **server** module


    We’ll be transforming the chat server we created in Chapter [5](#475256_1_En_5_Chapter.xhtml)
    and adapting it for our purpose, in `funcoin/server.py`.


    Here’s the rough outline for our class.


    ```

    class Server:

    def __init__ (self, blockchain, connection_pool, p2p_protocol):

    ...

    async def get_external_ip(self):

    # Finds our "external IP" so that we can advertize it to our peers

    ...

    async def handle_connection(self, reader: StreamReader, writer: StreamWriter):

    # This function is called when we receive a new connection

    # The `writer` object represents the connecting peer

    while True:

    try:

    # We handle and/or reply to the incoming data

    ...

    except  (asyncio.exceptions.IncompleteReadError, ConnectionError):

    # An error happened, break out of the wait loop

    break

    async def listen(self, hostname="0.0.0.0", port=8888):

    # This is the listen method which spawns our server

    server = await asyncio.start_server(self.handle_connection, hostname, port)

    logger.info(f"Server listening on {hostname}:{port}")

    async with server:

    await server.serve_forever()

    Listing 7-2

    server.py

    ```


    Let’s flesh out the methods, sequentially. Do not be alarmed if you don’t “get
    it” upon first inspection; we’ll be revisiting the server frequently as we keep
    bootstrapping our modules.


    *   ① This is how we “bootstrap” our modules to the server: the server class (and
