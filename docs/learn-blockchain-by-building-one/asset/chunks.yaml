    # 4. Proof of Work


    The primary goal of this chapter is to clearly explain how blocks are mined in
    a blockchain. Indirectly, this explains how new currency comes into being, as
    well as how disparate people forming a network can all reach consensus (agree
    on the state of the blockchain). And so, you’ll leave this chapter with a practical
