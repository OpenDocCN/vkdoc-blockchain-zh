    sending an email. In other words, it becomes expensive for the sender to spam
    people.


    But what is the constraint? Hashes are just numbers, but they are seemingly random,
    so we can apply any constraint we want. I could make the rule that anyone sending
    me an email must provide a hash of the email that is an odd number. But this wouldn’t
    be a good constraint because a sender would have a 50% of generating an odd hash.


    The Hashcash algorithm applies the constraint that a hash value must be lower
    than a certain number. This sounds deceivingly simple, but think about this for
    a moment: since cryptographic hash functions output a random number for a given
    input, how could we ensure that an email body hashed to a certain number? We can’t.
    The only thing we can do is insert arbitrary data into the email body and keep
    trial-and-erroring until our hash satisfies the constraint.


    Let’s look at an example, and let’s also make the constraint that the email body
    should hash to a number lower than 10,000.


    Note


    I’m using an eight-digit hash function that only outputs decimal numbers here
    for the sake of simplicity.


    ```

    from: dan@example.com

    subject: Buy  Bitcoins!

    Hey Ethan,I think you should buy some Bitcoins!

    hash: 95119035

    Listing 2-4

    Should this email be accepted by our server?

    ```


    **No.** The hash of the body of this email is `95119035`, which isn’t less than
    `10,000`. Thus, the sender has not done the work required: he must ensure that
    the hash of the email body satisfies the constraint.


    One way the sender can do this is by inserting arbitrary data in the email body:


    ```

    from: dan@example.com

    subject: Buy  Bitcoins!

    Hey Ethan, I think you should buy some Bitcoins!

    s8763ASdh727212213098

    hash: 00000891

    ```


    Now we see that the hash of the body is `891`, satisfying our constraint! (I’ve
    padded the hash with 0s because hexadecimal numbers are usually shown this way).
    Our email server will hash the body of the email and see that it is indeed `891`
    and will accept the email.


    This is what proof of work is: the work is proven by displaying a particular hash,
    and the server can easily verify it. Another way to think about this scheme is
    that it is something that is difficult to generate but easy to verify.


    Note


    This is the critical idea that allows any proof-of-work blockchain to generate
    (or mine) money by proving unequivocally that computational work was done to everyone
    on the network. The energy is consumed by exploiting the seemingly random nature
    of cryptographic hashes!


    ## Summary


    At this point, you should be practically familiar with hashing functions and how
    to *hash* arbitrary data. To summarize, you should be comfortable


    1.  Importing the hashlib library in Python


    2.  Hashing any data structure or binary file in Python


    3.  Understanding that cryptographic hashing functions are unfeasibly difficult
    to reverse


    *Still don’t get the gist of it?*


    That’s OK. This stuff is hard. If you’re still uncertain about hashing, it’s worthwhile
    to pause here and review this chapter again until it sinks in. It’s arguably the
    most important aspect of the blockchain data structure, and one we’ll use extensively
    going forward.


    # 3. Blockchains


    In this chapter, we’ll dive headfirst into blockchains by using simple data types
    in Python. You’ll leave this chapter with a fundamental understanding of what
    a blockchain is, what’s inside them, and how hashes are used to make them resilient.


    The concepts of the previous chapter are crucial to understanding why blockchains
    are considered immutable (read untamperable). We’ve already seen how to send untamperable
    emails. We’ll extend those ideas to build a blockchain from the ground up and,
    with a clear understanding of the data structures involved, show why fraud is
    impossible on a blockchain.


    Let’s dive in.'
  trans: "\n#### 解决方案\n\n整体思路是让爱丽丝和鲍勃事先约定一个共享密钥。然后爱丽丝从消息中删除密钥短语，将消息和哈希值一起发送给鲍勃。鲍勃随后执行与爱丽丝相同的操作：他附加预共享的密钥短语并输出一个哈希值。如果该哈希值与爱丽丝发送的不一致，他就知道消息已被篡改。\n\
    \n总结如下：\n\n1.  爱丽丝和鲍勃共享一个密钥短语 `S`。\n2.  爱丽丝将密钥附加到消息 `M` 的末尾，然后创建消息 `M` 的哈希值 `H`：`H\
    \ = hash(M + S)`。\n3.  爱丽丝将 `H` 和 `M`（即消息和计算出的哈希值）发送给鲍勃。\n4.  鲍勃自己计算 `H` 来检查消息的完整性，看其是否与爱丽丝公布的哈希值相同。\n\
    \n**注意**  \n这个通用方案描述了一系列称为 HMAC（哈希消息认证码）的协议，该协议由 IETF RFC 2104 定义。\n\n让我们看一个例子。在爱丽丝和鲍勃开始通信之前，他们都同意使用一个秘密密码\
    \ `bolognese`。爱丽丝使用给定的方案编写她的电子邮件。以下是鲍勃收到它时的样子：\n\n```\n发件人: alice@example.com\n\
    主题: 你听说过比特币吗？\n嘿鲍勃，我认为你应该了解一下区块链！我一直在投资比特币，目前我的账户里正好有 12.03 BTC。\n哈希值: 71890dc61c21370874d2a7b74064396cb613a1924f09aa06925abc7842e6802c\n\
    ```\n\n鲍勃注意到爱丽丝在邮件正文中包含了哈希值。他将哈希值剥离，然后将密钥短语 (`bolognese`) 附加到邮件正文的末尾，并计算其哈希值。如果该哈希值与邮件正文中包含的哈希值匹配，那么他就可以断定消息没有被篡改（并且爱丽丝确实拥有\
    \ 12.03 BTC）。\n\n爱丽丝和鲍勃都必须知道他们将用于验证的协议，这非常重要。这包括要使用的哈希函数 (`sha256`)、密钥短语在消息中的放置位置（他们同意将其附加到末尾），以及任何可能进一步增强方案安全性的其他数据（例如时间戳）。\n\
    \n让我们看看鲍勃如何用 Python 验证爱丽丝的消息。\n\n```python\nfrom hashlib import sha256\nsecret_phrase\
    \ = \"bolognese\"\ndef get_hash_with_secret_phrase(input_data, secret_phrase):\n\
    combined = input_data + secret_phrase\nreturn sha256(combined.encode()).hexdigest()\n\
    email_body = \"嘿鲍勃，我认为你应该了解一下区块链！ \" \\\n\"我一直在投资比特币，目前我的账户里正好有 12.03 BTC。\"\n\
    print(get_hash_with_secret_phrase(email_body, secret_phrase))\n```\n\n当鲍勃运行这段代码时，他就能验证爱丽丝的哈希值。\n\
    \n## 防止垃圾邮件如何促成了工作量证明\n\n你知道哈希函数可以用来防止电子邮件垃圾邮件吗？这个想法背后的算法被称为“工作量证明”算法，它是比特币的核心。它由英国密码学家亚当·巴克于\
    \ 1997 年发明，他称之为 Hashcash。\n\n其总体思路是只接受哈希值满足特定约束的电子邮件。这会导致电子邮件发送者在发送邮件之前执行某种计算工作。换句话说，发送者想要向人们发送垃圾邮件的成本变得很高。\n\
    \n但是约束是什么呢？哈希值只是些数字，但它们看起来是随机的，所以我们可以应用任何我们想要的约束。我可以规定，任何给我发送电子邮件的人都必须提供该电子邮件的哈希值，并且该哈希值是一个奇数。但这并不是一个好的约束，因为发送者生成一个奇数哈希值的概率有\
    \ 50%。\n\nHashcash 算法应用的约束是：哈希值必须小于某个特定数字。这听起来简单得令人难以置信，但请思考一下：既然加密哈希函数对于给定的输入会输出一个随机数，我们如何确保邮件正文的哈希值是一个特定的数字呢？我们做不到。我们唯一能做的就是向邮件正文中插入任意数据，并不断尝试，直到我们的哈希值满足约束条件为止。\n\
    \n让我们看一个例子，同时设定约束条件为：邮件正文的哈希值必须小于 10,000。\n\n**注意**  \n为简单起见，我这里使用一个只输出十进制数的八位哈希函数。\n\
    \n```\n发件人: dan@example.com\n主题: 购买比特币！\n嘿伊森，我认为你应该买一些比特币！\n哈希值: 95119035\n```\n\
    \n**不行。** 这封邮件正文的哈希值是 `95119035`，它不小于 `10,000`。因此，发送者没有完成所需的工作：他必须确保邮件正文的哈希值满足约束条件。\n\
    \n发送者可以这样做的一种方法是在邮件正文中插入任意数据：\n\n```\n发件人: dan@example.com\n主题: 购买比特币！\n嘿伊森，我认为你应该买一些比特币！\n\
    s8763ASdh727212213098\n哈希值: 00000891\n```\n\n现在我们看到正文的哈希值是 `891`，满足我们的约束条件！（我用\
    \ 0 填充了哈希值，因为十六进制数字通常这样显示）。我们的邮件服务器会对邮件正文进行哈希运算，看到它确实是 `891`，并接受这封邮件。\n\n这就是工作量证明：通过展示一个特定的哈希值来证明工作已经完成，而服务器可以轻松验证。另一种理解这个方案的方式是，它生成困难但验证容易。\n\
    \n**注意**  \n正是这一关键思想，使得任何工作量证明区块链能够通过向网络中的每个人明确证明完成了计算工作来生成（或挖出）货币。通过利用加密哈希函数看似随机的特性，消耗了能量！\n\
    \n## 总结\n\n至此，你应该已经实际熟悉了哈希函数以及如何对任意数据进行哈希运算。总结一下，你应该能够自如地完成以下操作：\n\n1.  在 Python\
    \ 中导入 `hashlib` 库\n2.  在 Python 中对任何数据结构或二进制文件进行哈希运算\n3.  理解加密哈希函数在实际上极难逆向\n\n\
    *还是没理解要点？*\n\n没关系。这本来就不容易。如果你对哈希函数仍不确定，值得在此暂停，重新阅读这一章，直到理解透彻为止。可以说，这是区块链数据结构最重要的方面，也是我们后续将要广泛使用的。\n\
    \n# 3. 区块链\n\n在本章中，我们将通过使用 Python 中的简单数据类型，一头扎进区块链的世界。学完本章后，你将从根本上理解区块链是什么、其内部结构，以及哈希函数如何使其具有韧性。\n\
    \n上一章的概念对于理解为什么区块链被认为是不可篡改的至关重要。我们已经了解了如何发送不可篡改的电子邮件。我们将扩展这些想法，从头构建一个区块链，并清晰理解所涉及的数据结构，从而说明为什么在区块链上进行欺诈是不可能的。\n\
    \n让我们开始吧。\n"
- fmt: '# 区块长什么样？


    我们的区块是简单的Python字典。以下是一个区块在Python中的示例：


    ```

    block_1038 = {

    ''index'': 1038,

    ''timestamp'': "2020-02-25T08:07:42.170675",

    ''data'': [

    {

    ''sender'': "bob",

    ''recipient'': "alice",

    ''amount'': "$5",

    }

    ],

    ''hash'': "83b2ac5b",

    ''previous_hash'': "2cf24ba5f"

    }

    ```


    每个区块都有上述基本结构，但我希望你关注最后两个字段：`hash`和`previous_hash`。每个区块内部都包含前一个区块的哈希值。区块1038包含区块1037的哈希值，区块1037包含区块1036的哈希值，依此类推……一直追溯到第一个区块——“创世”区块。


    区块可以包含*任何*数据：文件、图片、交易、记录等。在上述示例中，我们的区块包含一笔从Bob到Alice的5美元交易。这个区块与大多数加密货币区块（如比特币）的结构类似。你可能听说过有人将以太坊描述为“世界计算机”。这是因为以太坊区块的数据中还包含*可执行代码*，指示网络上的参与者在区块链本身上执行操作。


    ## 不可变性与哈希的重要性


    区块链的概念并不难以理解——**每个区块内部都包含前一个区块的哈希值，从而形成一条链**。这种哈希的“链接”赋予了区块链不可变性和防欺诈的特性。


    更具体地说，`previous_hash`字段是区块之间的链接，用于创建*链*。如果攻击者以某种方式破坏了链中较早的区块，那么所有后续区块都会发生变化，因为它们的哈希值会变得不正确。例如，如果我们必须修改区块#1037中的单个数据，那么#1037的哈希值会不同，因此#1038中的`previous_hash`值也会不同。**因此，如果任何较早区块中的单个比特被篡改，整个后续区块链都将失效。**这就是区块链的链式特性——它们通过使用`previous_hash`的哈希链来确保安全：


    ![../images/475256_1_En_3_Chapter/475256_1_En_3_Fig1_HTML.jpg](images/475256_1_En_3_Chapter/475256_1_En_3_Fig1_HTML.jpg)


    图3-1 区块哈希形成链


    这就是比特币的“独门秘方”——将一切联系在一起的粘合剂。如果有人通过更改链中某处交易的金额来欺诈一个区块，下一个区块的`previous_hash`字段就会不同，从而导致所有后续哈希值都不同。而比特币网络中的每个人都会立即发现这种差异并忽略该更改！


    ## 用Python实现基础区块链


    打开你喜欢的文本编辑器或IDE（我个人使用PyCharm），创建一个名为`blockchain.py`的新文件。我们现在只使用一个文件，但如果遇到困难，你可以随时参考源代码：[`https://github.com/dvf/blockchain`](https://github.com/dvf/blockchain)。


    ### 使用类表示区块链


    我们首先创建一个简单的区块链类。到本书结束时，这个类会变得更加复杂，但现在我们将通过向类中添加不同的方法来逐步介绍各种概念。


    让我们先搭建一些方法，创建一个蓝图：


    *清单3-1. blockchain.py*


    ```

    class Blockchain(object):

    def __init__ (self):

    self.chain = []

    def new_block(self):

    # Generates a new block and adds it to the chain

    pass

    @staticmethod

    def hash(block):

    # Hashes a Block

    pass

    def last_block(self):

    # Gets the latest block in the chain

    pass

    ```


    我们的蓝图有一个构造函数，它创建一个初始的空列表`chain`（用于存储区块链），以及额外的方法`new_block`、`create_block`、`hash`和`last_block`，用于创建新区块、对区块进行哈希处理以及获取最新区块。


    这里的思路是`new_block`方法负责创建区块并将其添加到链中。我们的`Blockchain`类将负责维护区块链所需的所有操作。让我们开始充实其中一些方法。


    #### 支持交易


    在本书后面的章节中，交易将占据整整一章。它们涉及大量密码学知识，并且包含数字签名。开始时，我们的区块链将支持简单的未签名交易——仅用于说明目的——因此我们将创建一个名为`new_transaction`的方法：


    *清单3-2. blockchain.py*


    ```

    class  Blockchain(object):

    def __init__ (self):

    self.chain = []

    self.pending_transactions = []

    def new_block(self):

    # Generates a new block and adds it to the chain

    pass

    @staticmethod

    def hash(block):

    # Hashes a Block

    pass

    def last_block(self):

    # Gets the latest block in the chain

    pass

    def new_transaction(self, sender, recipient, amount):

    # Adds a new transaction to the list of pending transactions

    self.pending_transactions.append({

    "recipient": recipient,

    "sender": sender,

    "amount": amount,

    })

    ```


    但目前，我们会保持交易简单。稍后，在第[6](#475256_1_En_6_Chapter.xhtml)章中，我们将了解更多关于交易背后的密码学知识，以及它们如何在生产级区块链（如比特币）中得到支持。'
  raw: '## What does a block look like?


    Our blocks are simple Python dictionaries. Here’s an example of what a single
    block may look like, in Python:


    ```

    block_1038 = {

    ''index'': 1038,

    ''timestamp'': "2020-02-25T08:07:42.170675",

    ''data'': [

    {

    ''sender'': "bob",

    ''recipient'': "alice",

    ''amount'': "$5",

    }

    ],

    ''hash'': "83b2ac5b",

    ''previous_hash'': "2cf24ba5f"

    }

    ```


    Each block has the preceding basic structure, but I’d like you to focus on the
    two last fields: `hash` and `previous_hash`. Each block contains within itself
    a hash of the previous one. Block 1038 contains the hash of block 1037, which
    contains the hash of block 1036, and so on…back to the first block—the “genesis”
    block.


    A block can contain *any* data: files, images, transactions, records, etc. In
    the preceding example, our block contains a single transaction from Bob to Alice
    for $5\. This block is similar to what most cryptocurrency blocks (like Bitcoin)
    look like. You may have heard people describe Ethereum as a “world computer.”
    That’s because Ethereum blocks also contain *executable code* as part of their
    data, instructing participants on the network to perform operations on the blockchain
    itself.


    ## Immutability and the importance of hashes


    The idea of a chain shouldn’t be too far of a stretch—**each block contains within
    itself the hash of the previous block, forming a chain**. This “linking” of hashes
    is what gives blockchains their immutability and fraud prevention properties.


    More specifically, the `previous_hash` field is the link between blocks to create
    the *chain*. If an attacker somehow corrupted an earlier block in the chain then
    all subsequent blocks will have change, because their hashes will be incorrect.
    For example, if we had to modify a single piece of data in block #1037 then the
    hash of #1037 would be different, and so the `previous_hash` value in #1038 would
    be different. **Thus, if a single bit, in any earlier block, were to be tampered
    with, the entire blockchain thereafter would be invalid.** This is the chain nature
    of blockchains—they are secured by a chain of hashes using the `previous_hash`:


    ![../images/475256_1_En_3_Chapter/475256_1_En_3_Fig1_HTML.jpg](images/475256_1_En_3_Chapter/475256_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Hashes of blocks forming a chain


    This is Bitcoin’s “special sauce”—the glue that holds it all together. If somebody
    were to defraud a block, by changing the amount of a transaction somewhere in
    the chain, the `previous_hash` field of the next block would be different, leading
    to all the consequent hashes being different. And everyone in the Bitcoin network
    would immediately notice the discrepancy and ignore the change!


    ## A basic blockchain in Python


    Open up your favorite text editor or IDE (personally, I use PyCharm) and create
    a new file called `blockchain.py`. We’ll only use a single file for now, but if
    you get lost, you can always refer to the source code at [`https://github.com/dvf/blockchain`](https://github.com/dvf/blockchain).


    ### Representing a blockchain using a class


    We’ll be creating a simple blockchain class to begin with. By the end of the book
    this class will be more advanced, but for now we’re going to gently introduce
    the various concepts by adding distinct methods to our class.


    Let’s start by stubbing out some methods to create a blueprint:


    *Listing 3-1. blockchain.py*


    ```

    class Blockchain(object):

    def __init__ (self):

    self.chain = []

    def new_block(self):

    # Generates a new block and adds it to the chain

    pass

    @staticmethod

    def hash(block):

    # Hashes a Block

    pass

    def last_block(self):

    # Gets the latest block in the chain

    pass

    ```


    Our blueprint has a constructor which creates an initial empty list chain (to
    store our blockchain) with an additional methods new_block, create_block, hash,
    and last_block to create new blocks, hash them and fetch the latest.


    The idea here is that the new_block method is responsible for creating the blocks
    and adding them to the chain. Our `Blockchain` class will be responsible for all
    the operations necessarily for maintaining our blockchain. Let’s start fleshing
    out some of these methods.


    #### Supporting transactions


    Later on in the book, transactions take an entire chapter. They involve a heap
    of cryptographic knowledge and involve digital signatures. To begin with, our
    blockchain will support primitive unsigned transactions—just for illustration
    sake—so we’ll create a method called new_transaction:


    *Listing 3-2. blockchain.py*


    ```

    class  Blockchain(object):

    def __init__ (self):

    self.chain = []

    self.pending_transactions = []

    def new_block(self):

    # Generates a new block and adds it to the chain

    pass

    @staticmethod

    def hash(block):

    # Hashes a Block

    pass

    def last_block(self):

    # Gets the latest block in the chain

    pass

    def new_transaction(self, sender, recipient, amount):

    # Adds a new transaction to the list of pending transactions

    self.pending_transactions.append({

    "recipient": recipient,

    "sender": sender,

    "amount": amount,

    })

    ```


    But for now, we’ll keep our transactions simple. Later on, in Chapter [6](#475256_1_En_6_Chapter.xhtml),
    we’ll learn more about the cryptography behind transactions, and how they’re supported
    in production blockchains, like Bitcoin.'
