- fmt: '# Introduction to proof of work


    In forming Bitcoin, Satoshi Nakamoto’s genius was not in creating, but rather
    in the amalgamation of preexisting breakthroughs by cryptographers concerned with
    the erosion of privacy. These breakthroughs span disparate fields and topics,
    such as addressing the problem of centralization and trust by leveraging peer-to-peer
    networks originally used to share files over the Internet (torrents); or more
    specifically using technology invented to combat email spam to solve the problem
    of “minting” money.


    But Bitcoin’s biggest breakthrough was the leveraging of proofs of work to form
    consensus among peers on a network who don’t know each other, and more importantly,
    don’t trust each other. In simpler words: in a decentralized network where everyone
    has an equal say, we need a way of agreeing on things; things like whether a transaction
    is fraudulent or if a blockchain is valid. Now, we may be jumping the gun here
    (we’ll clarify most of these concepts soon), but it’s important to zoom out and
    see where the different parts of the puzzle fit.


    Proof of work or, more formally, a proof-of-work (POW) algorithm describes the
    method in which new blocks are added to a blockchain. Bitcoin and Ethereum (at
    present) both use proof-of-work algorithms to add new blocks to their blockchains.
    Proof-of-work algorithms sound pretty complicated, but in practice they’re actually
    very simple. To get the cogs turning before we dive in, I’d like to pose a problem
    to you: *How do you prove to someone that you did work?*


    Think about it for a minute or two. Let’s say that you’re digging holes in your
    backyard and you find a gold nugget. Is that gold nugget proof that effort was
    done to obtain it? I’d argue that it’s proof that *someone* did *some* work. Let’s
    switch gears here for a second—how about proof that you ran a marathon? You could
    probably strap a camera to your head and record the whole race, step by step.
    That would be sufficient, wouldn’t it? Maybe, but the footage could’ve been modified,
    or someone else may have been wearing the camera. Perhaps we’re grabbing at straws
    here, but I’m trying to draw your attention to just how difficult it is to *prove*
    that work was done without doubt (or trust), especially if you’re behind a computer,
    which is pretty handy at faking things.


    In lay terms, proof-of-work algorithms achieve just this—they allow you to prove
    that your computer did some work. More technically, proof-of-work algorithms are
    consensus mechanisms—if you can prove that work was done, then you can show your
    proof to someone else who can easily verify that it is true. There are many variants
    of these algorithms, but we’re going to focus on a simple example to sink this
    in.


    We’ve already explained that POW is the algorithm for mining new blocks. The actual
    method of the proof of work algorithm is simple—to discover a number which satisfies
    a small mathematical problem: the number must be difficult to find but easy to
    verify, computationally speaking, by anyone on the network. This is the core idea
    behind proof of work: *difficult to do, but easy to verify*. We’ll look at a very
    simple example to help this sink in.


    ## A trivial example of Proof of Work


    Let’s decide that the *hash* of some integer `x` multiplied by another integer
    `y` must end in `0`. So, `hash(x * y) = dedb2ac23dc...0`. And for this simplified
    example, let’s fix `x = 5`. Implementing this in Python:


    ```

    1  from hashlib import sha256


    4  x = 5

    5  y = 0  # We don''t know what y should be yet...


    7  while  sha256(f''{x*y}''.encode()).hexdigest()[-1] != "0":

    8      y += 1


    10  print(f''The solution is y = {y}'')

    ```


    The solution here is `y = 21`. Since the produced hash ends in `0`:


    ```

    >>> sha256(f"{5 * 21}".encode()).hexdigest()

    ''1253e9373e781b7500266caa55150e08e210bc8cd8cc70d89985e3600155e860''

    ```


    In Bitcoin, the proof-of-work algorithm has a name; it is called *Hashcash*. And
    it’s not too different from the preceding basic example. It’s the algorithm that
    miners race to solve in order to create a new block. In general, the difficulty
    is determined by the number of zeros at the beginning of a string; the miners
    are then rewarded for their solution by receiving a set number of Bitcoins—in
    a transaction; and the network is able to easily *verify* their solution, as we
    did earlier.


    ## An analogy: Jigsaw puzzles


    Jigsaw puzzles are a good example of a proof-of-work algorithm, because the proof
    of work is in the unanimous (human) identification of an image. If we told a computer
    to unscramble a jigsaw puzzle:


    ![../images/475256_1_En_4_Chapter/475256_1_En_4_Figa_HTML.jpg](images/475256_1_En_4_Chapter/475256_1_En_4_Figa_HTML.jpg)


    it would have to brute-force every combination:


    ![../images/475256_1_En_4_Chapter/475256_1_En_4_Figb_HTML.jpg](images/475256_1_En_4_Chapter/475256_1_En_4_Figb_HTML.jpg)


    and it would keep this up forever, until we hit “stop” when we saw an image appear:


    ![../images/475256_1_En_4_Chapter/475256_1_En_4_Figc_HTML.jpg](images/475256_1_En_4_Chapter/475256_1_En_4_Figc_HTML.jpg)


    And you could now show this image to someone, and they would know beyond a doubt
    that work was done.'
