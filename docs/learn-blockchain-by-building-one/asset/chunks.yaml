    \n*谨以此书献给**约书亚***，他总是有始有终。\n\n# 引言\n\n## 又一本关于区块链的书？为什么？\n\n理解区块链并不容易。至少对我来说是这样：当比特币首次登上新闻头条时，我试图了解它的工作原理，却发现面向程序员（像我这样的人）的资源少之又少。虽然有比特币参考维基百科（[`https://en.bitcoin.it`](https://en.bitcoin.it)），但在当时，它的组织方式并不像今天这样清晰；尽管我读了中本聪的白皮书，但起初并没有真正理解它——至少不理解加密部分是如何运作的。\n\
    \n我在 YouTube 上漫无目的地浏览，完成了许多不完整的教程，并因那些未能清晰传达概念的示例而感到沮丧。于是，我决定尝试自己构建一个区块链，并记录下在这个过程中学到的所有东西。通过这样做，我发现了为什么加密货币如此难以解释和理解；因为首先你需要定义数字货币的构成要素：\n\
    \n-   货币是如何创造的？（挖矿）\n-   爱丽丝如何向鲍勃发送货币？（数字签名交易）\n-   谁负责追踪所有这些交易和生成的货币？（每个人，通过分布式账本）\n\
    \n这些高层次的概念依赖于不同的知识单元，必须首先理解它们，然后才能将它们组合成一套大家共同遵守的通用规则。而理解这些不同概念的最佳方式是逐一击破——通过实际动手构建自己的加密货币来实践。因此，我写这本书是为了那些和我有同样挫败感的人，并通过在代码层面处理主题来克服它——这才是真正让知识扎根的方法。如果你坚持读下去，并动手实践，我相信在本书结束时，你将扎实掌握它们的运作原理。\n\
    \n## 为成功做好准备\n\n### GitHub 仓库\n\n最终代码位于 [`https://github.com/dvf/blockchain-book`](https://github.com/dvf/blockchain-book)。但请尝试自己动手编码——代码结构设计为高层方法已预留接口，细节逐步填充。此代码会保持更新，因此它可作为参考的北极星。\n\
    \n### 花时间配置你的开发环境\n\n使用一个好的集成开发环境（IDE），例如 Microsoft VSCode 或 JetBrains PyCharm。它们都是免费的，并且能在你之前发现代码中的错误。在开始之前花时间设置好\
    \ IDE 是非常值得的。把你的时间花在操心区块链上，而不是代码的语法错误上。\n\n### 知道去哪里获取答案\n\n浏览并在 GitHub 仓库的 *Issues*（问题）页面提问。该仓库拥有庞大的社区关注者，因此你很可能会遇到其他有类似问题的人。如果你遇到错误或漏洞，恳请你提交一个\
    \ *Issue*。\n\n### 不会 Python？\n\n没关系。Python 以其可读性著称；它是一种非常易于转译的语言。我曾见过其他程序员（C#、JavaScript\
    \ 和 Rust）实时完成书中的示例。\n\n# 致谢\n\n**本书献给我的兄弟约书亚，他总是有始有终**。特别感谢\n\n-   我的朋友兼比特币教育同行**贾斯汀·穆恩**，感谢他帮助我澄清概念、测试代码，并在需要时提供中肯的建议。\n\
    -   我的朋友**费德里科·乌尔福**，不仅感谢他每周不辞辛劳地审阅和复核我的工作，也感谢他在过去几年中陪我参加了无数比特币和闪电网络的活动与会议。\n\
    -   Apress 出版社的**丽塔·费尔南多**和**希万吉·拉马钱德兰**，感谢他们对我的信任，并使这本书得以问世。\n\n# 关于作者\n\n# 关于技术审稿人\n\
    \n# 1. 为应用开发做好准备\n\n对于不熟悉的人来说，Python 是最流行的语言之一。它被广泛使用于各个领域——从学术界、科学领域到像 Instagram\
    \ 这样的大型网络应用。其受欢迎的部分原因在于其拥有大量免费在线的库、包和扩展，以及由于其类似伪代码而易于阅读。\n\n在本章中，我们将确保你的计算机已为应用开发正确配置，并且\
    \ Python 已正确安装。然后，我将向你展示如何创建一个实用的 Python 项目以及如何安装依赖项。\n\n## Python 版本\n\nPython\
    \ 有两个版本：版本 2 和版本 3。版本 2 已不再受 Python 软件基金会支持，但由于许多内部工具仍在使用它，因此大多数操作系统仍预装了它。另一个复杂因素是，不同的操作系统将\
    \ Python 安装在文件系统的不同位置。这些因素使得设置开发环境变得棘手。\n\n我们将尝试通过安装和使用有助于管理 Python 安装的工具来克服这些障碍。\n\
    \n> **注意**  \n> 按照惯例，在本书中，我们将在终端命令前加上 `$` 符号。输出将以纯文本形式显示。\n\n## 安装 Python\n\n\
    ### Windows 系统安装\n\n`Python.org` 包含适用于 Windows 的可下载二进制文件。前往 [`www.python.org/downloads/windows/`](http://www.python.org/downloads/windows/)\
    \ 下载 Python 3.8 的二进制文件。\n\n下载完成后，安装 Python 3.8，确保选择以下选项：\n\n-   卸载 Python 的先前版本。\n\
    -   安装 `pip`（Python 包管理器）。\n-   将 Python 添加到 `PATH` 环境变量（允许你在命令行中执行 Python）。\n\
    \n安装完成后，为了确认一切设置正确，打开命令行并检查 Python 版本：\n\n```\nC:\\Users\\dan> python --version\n\
    3.8.3\n```\n"
- fmt: "### macOS installation\n\nAlthough macOS ships with a version of Python for\
    \ internal purposes, we don’t want to modify it when we develop, so we’ll be installing\
    \ a fresh version of Python using Homebrew—a tool used to help manage and install\
    \ third party packages on macOS.\n\nFirst, we’ll need to make sure Apple’s Command\
    \ Line tools are installed, in your terminal:\n\n```\n$ xcode-select --install\n\
    ```\n\nYou’ll need to install *Homebrew*, a package installer for macOS. To install\
    \ it, follow the instructions on [`https://brew.sh/`](https://brew.sh/), and ensure\
    \ that Homebrew is correctly installed.\n\nAfter you’ve installed Homebrew, let’s\
    \ install the latest version of Python:\n\n```\n$ brew install python\n```\n\n\
    Once the installation completes, verify that Python has been installed correctly:\n\
    \n```\n$ python --version\nPython 3.8.3\n```\n\n### Linux installation\n\nIf you’re\
    \ using a Debian-based version of Linux, you can install Python 3.8 using `apt`\
    \ (or any other package manager):\n\n```\n$ sudo apt-get update\n$ sudo apt-get\
    \ install python3.8\n```\n\nOnce the installation completes, verify that Python\
    \ has been installed correctly:\n\n```\n$ python --version\nPython 3.8.3\n```\n\
    \nIf you’re not using a Debian-based Linux distribution, you can compile Python\
    \ from the source: [`www.python.org/downloads/source/`](http://www.python.org/downloads/source/).\n\
    \n## How Python programs run\n\nWhen you install Python, you’re actually installing\
    \ an *interpreter*—a program that translates written Python code to instructions\
    \ that your computer understands and executes. The interpreter you’ve installed\
    \ is called CPython, a popular interpreter written in the C language.\n\nYou run\
    \ a Python program by feeding it to the Python interpreter in your terminal:\n\
    \n```\n$ python my_program.py\n```\n\nThis converts your code to “computer instructions”\
    \ and executes them.\n\nHow Does Your OS Know Where the Python Interpreter Is?\n\
    \nYour OS has a system-wide variable called `PATH`, containing a list of file\
    \ paths to traverse when looking for programs. You can check what it’s set to\
    \ by running `echo $PATH` in your terminal. The Python interpreter resides in\
    \ `/usr/local/bin/`. This is verified by calling `which python`.\n\n## Managing\
    \ project dependencies\n\nEvery project you build is likely to use external libraries.\
    \ These dependencies may be database access libraries or tools needed to parse\
    \ documents or websites, but the important thing is that they’re included in your\
    \ project.\n\nManaging project dependencies can be a tricky task, since different\
    \ dependencies have different requirements—some dependencies require specific\
    \ versions of Python, others may depend on sibling dependencies. Modern Python\
    \ projects use package managers to cope with the arduous tasks of downloading,\
    \ installing, and keeping up-to-date dependencies. In summary, it makes your life\
    \ easier to use a package manager.\n\nPoetry is one out of a handful of dependency\
    \ managers for Python. There are other, more popular ones, like Pipenv. But after\
    \ using both extensively, I’ve found that Poetry has a cleaner interface and is\
    \ more pragmatic in its goals.\n\n### Installing Poetry\n\nThe recommended way\
    \ of installing Poetry is to run the following in your terminal:\n\n```\n$ curl\
    \ -sSL https://raw.githubusercontent.com/sdispater/poetry/master/get-poetry.py\
    \ | python\n```\n\nIf you run into any problems, please refer to the official\
    \ documentation and installation instructions on the Poetry website: [`https://poetry.eustace.io/docs/`](https://poetry.eustace.io/docs/)\n\
    \nVerify that Poetry has been installed correctly by invoking it in the shell:\n\
    \n```\n$ poetry\nPoetry version 1.0.9\nUSAGE\npoetry [-h] [-q] [-v []] [-V] [--ansi]\
    \ [--no-ansi] [-n]  [] ... []\nARGUMENTS\n               The  command  to  execute\n\
    \                   The arguments of the command\nGLOBAL OPTIONS\n-h (--help)\
    \             Display this help message\n-q (--quiet)            Do not output\
    \ any message\n-v (--verbose)          Increase the verbosity of messages: \"\
    -v\" for normal output, \"-vv\" for more verbose output, and \"-vvv\" for debug\n\
    -V (--version)          Display this application version\n--ansi             \
    \     Force ANSI output\n--no-ansi               Disable ANSI output\n-n (--no-interaction)\
    \   Do not ask any interactive question\nAVAILABLE  COMMANDS\nabout          \
    \         Shows information about Poetry.\nadd                     Adds a new\
    \ dependency to pyproject.toml.\nbuild                   Builds a package, as\
    \ a tarball and a wheel by default.\nCache                   Interacts with Poetry's\
    \ cache.\ncheck                   Checks the validity of the pyproject.toml file.\n\
    config                  Manages configuration settings.\ndebug               \
    \    Debugs various elements of Poetry.\nenv                     Interacts with\
    \ Poetry's project environments.\nexport                  Exports the lock file\
    \ to alternative formats.\nhelp                    Displays the manual of a command.\n\
    init                    Creates a basic pyproject.toml file in the current directory.\n\
    install                 Installs the project dependencies.\nlock             \
    \       Locks the project dependencies.\nnew                     Creates a new\
    \ Python project at .\npublish                 Publishes a package to a remote\
    \ repository.\nremove                  Removes a package from the project dependencies.\n\
    run                     Runs a command in the appropriate environment.\nsearch\
    \                  Searches for packages on remote repositories.\nself       \
    \             Interacts with Poetry directly.\nshell                   Spawns\
    \ a shell within the virtual environment.\nshow                    Shows information\
    \ about packages.\nupdate                  Updates the dependencies as according\
    \ to the pyproject.toml file.\nversion                 Shows the version of the\
    \ project or bumps it when a valid bump rule is provided .\n```\n\n### Creating\
    \ a Python project with Poetry\n\nLet’s create a new project with Poetry:\n\n\
    ```\npoetry new my-project\n```\n\nThis creates the following “standard” Python\
    \ project structure in a folder called `my-project`:\n\n```\n.\n├── README.rst\n\
    ├── my_project\n│  └── __init__.py\n├── pyproject.toml\n└── tests\n├── __init__.py\n\
    └── test_my_project.py\n```\n\nThe most important file here is `pyproject.toml`\
    \ which describes the project and its dependencies. It’s written in a markup format\
    \ called `TOML`:\n\n```\n[tool.poetry]\nname = \"my-project\"\nversion = \"0.1.0\"\
    \ndescription = \"\"\nauthors = [\"Daniel van Flymen \"]\n[tool.poetry.dependencies]\n\
    python = \"^3.8\"\n[tool.poetry.dev-dependencies]\npytest = \"^5.2\"\n[build-system]\n\
    requires = [\"poetry>=0.12\"]\nbuild-backend = \"poetry.masonry.api \"\n```\n\n\
    Note that the only dependency we have right now is Python `^3.8`, which indicates\
    \ that your project requires *any* Python version between `3.8.0` and `4.0.0`.\
    \ Poetry has also added `pytest` as a `dev` dependency for running tests, but\
    \ we’ll get into that later."
