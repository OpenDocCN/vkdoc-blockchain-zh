- fmt: '# The shortcomings of funcoin


    As you’ve experienced firsthand, there are roughly four critical components needed
    in order to have a publicly functioning blockchain:


    * A **consensus protocol** which allows distributed peers to agree on the state
    of the system (the data stored in the blockchain). It’s this magic that allows
    us to call a blockchain “decentralized.”

    * A **networking layer** which allows peers to communicate and propagate information
    throughout the network.

    * A **chain of cryptographically secured blocks** (the blockchain itself).

    * An **economical incentivization scheme** (proof of work) which secures the chain
    under the pressure of work.


    Problems arising in any of these components almost always have implications for
    *all* of them. For example, a bug in the networking layer may be exploited to
    delay the propagation of transactions to certain nodes on the network, thereby
    affecting the consensus protocol. Writing this book has been extremely tricky
    for me because I set out to build an easy-to-understand blockchain that would
    be simple to understand, only to come to the slow realization that projects like
    Bitcoin have the same goal: in some sense, they *are* the simplest manifestation
    of their protocols.


    As a mental exercise, I’d like you to take a moment and reflect on the work done
    in the various components of funcoin and think about how resilient they are to
    attack. The network layer is a difficult and complex facet of our system; that’s
    probably a good place to start.


    ## The networking layer


    The first assumption we made in the network layer was to use JSON as a serialization
    format for our messages. This is suboptimal for a myriad of reasons, mostly because
    it does not support streaming. In other words, we need to know where one JSON-encoded
    object starts and another begins. In order to get around this hurdle, we made
    the rule that messages are delimited by newlines. Here’s the code in our `Server`
    class that accomplishes this:


    ```

    1  async def handle_connection(self, reader: StreamReader, writer: StreamWriter):

    2      while True:

    3          try:

    4              # Wait forever on new data to arrive

    5              data = await reader.readuntil(b"\n")

    7              decoded_data = data.decode("utf8").strip()

    9              try:

    10                  message = BaseSchema().loads(decoded_data)

    11              except MarshmallowError:

    12                  logger.info("Received unreadable message", peer=writer)

    13                  break

    15              # Extract the address from the message, add it to the writer object

    16              writer.address = message["meta"]["address"]

    18              # Let''s add the peer to our connection pool

    19              self.connection_pool.add_peer(writer)

    21              # ...and handle the message

    22              await self.p2p_protocol.handle_message(message, writer)

    24              await writer.drain()

    25              if writer.is_closing():

    26                  break

    28          except (asyncio.exceptions.IncompleteReadError, ConnectionError):

    29              # An error happened, break out of the wait loop

    30              break

    ```


    Can you see the problem with this? It leaves our node open to a denial of service
    attack. All somebody needs to do is send us a message without a newline, and our
    node would keep the connection open, waiting for the message to end. This, however,
    can be easily mitigated by keeping track and throttling the amount of data a peer
    may send us. That being said, we used JSON-based messages to make the implementation
    easier. Bitcoin uses column-delimited bytes for message structures, which would
    require arduous implementation. Here’s the structure of a Bitcoin message:


    | **Field Size** | **Description** | **Data Type** | **Comments** |

    | --- | --- | --- | --- |

    | 4 | magic | `uint32` | Signifies if the message should be on test or real network
    |

    | 12 | command | `char[12]` | String signifying the message’s content type |

    | 4 | length | `uint32` | Size in bytes of the payload |

    | 4 | checksum | `uint32` | The first 4 bytes of the hash of the message |

    | ? | payload | `char[]` | The actual data |


    We also have not spoken about how our node sorts and stores peers. We have no
    heuristic for doing so. Let me give you an example of what I mean by a *heuristic*:
    when a peer asks us for nodes, we could send them *all* the nodes we know about,
    but that’s wasteful and could be better considered. What if we sent the requesting
    node 20 peers at random? Would that result in a peer being able to propagate a
    transaction to the entire network (assuming other peers also returned random nodes)?
    This is largely in the realm of peer-to-peer research, and such heuristics are
    typically called *Gossip Protocols* or *Peer Discovery*. This area of research
    garnered renewed interest after the famous shutdown of Napster—the first software
    allowing people to download music from a peer-to-peer network. But Napster was
    centralized: it served a list of available peers, and so if Napster went down,
    so did the network.


    BitTorrent is an example of a distributed hash table (DHT): a decentralized key
    value storage system typically used to download movies and TV shows illegally
    via websites like The Pirate Bay and ISOHunt. Governments and law enforcement
    agencies for years tried to shut down these so-called torrent websites but were
    largely unsuccessful—they still exist today. But why? What makes them so resilient
    to censorship? It seems like blockchains such as Bitcoin and Ethereum should learn
    a thing or two from DHTs like eDonkey and Kad. The secret lies in how nodes on
    these networks discover and organize their peers—doing it correctly makes a P2P
    network scalable, censorship-resistant, and fast. If your network needs to support
    file storage, you may consider using a DHT, since they are really just rules for
    governing which nodes on the network host which files. If you’re building a decentralized
    blockchain, you don’t need to worry about storing large files, since everybody
    is really storing the same “large” file—the blockchain itself.


    Most of the research around peer-to-peer protocols is nascent, and comes from
    file sharing. Modern decentralized networks exist at the application layer, and
    implement protocols for:


    * **Peer Discovery**: How to discover nodes on the network

    * **Routing**: Which routes to take to contact nodes (messages)

    * **Naming**: A uniform way to identify nodes


    These protocols almost always exist at the Application Layer of the networking
    stack.


    ![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig3_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    The typical network stack'
