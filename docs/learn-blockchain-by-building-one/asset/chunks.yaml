    代码应该很直观。我在代码中添加了一些注释以帮助保持清晰。请注意，当我们的 `Blockchain` 类被实例化时，我们会用一个创世块（一个没有前驱区块的区块）来播种它。


    此时，您应该会好奇网络中的参与者如何就向各自的区块链添加新区块达成一致。由于我们想要一个完全去中心化的点对点网络，因此需要有一套所有参与者都遵守的共同规则（一种协议）；这就是游戏的规则。向区块链添加新区块是挖矿的结果。让我们深入了解一下。


    # 4. 工作量证明


    本章的主要目标是清楚地解释区块是如何在区块链中被挖出的。间接地，这也解释了新货币是如何诞生的，以及组成网络的不同个体如何达成共识（就区块链的状态达成一致）。因此，在阅读完本章后，您将对实现这一目标的工作量证明（Proof
    of Work）协议有一个实际的了解。


    我们还会看到，由于点对点网络的去中心化性质，在任何给定时间点，都不存在唯一的一个区块链。同时存在许多有效的链，但随着时间的推移，节点们会就哪条链是权威链达成共识。


    在上一章中，我们实现了区块链类中的方法。我们还学习了区块如何通过哈希值“链接”在一起，并实现了创建和添加新区块的方法。扎实掌握哈希的概念至关重要，因为本章才是真正神奇之处——我们将阐明“挖矿”的概念，或者更正式地说，是创建工作量证明（proofs
    of work）。


    ## 使用 iPython 与区块链类交互


    一个有助于与 Python 解释器交互的伟大工具是 `iPython`。它为您的 Python 解释器添加了制表符补全和语法高亮功能，使交互更容易查看和理解。首先启用您的虚拟环境，然后使用
    `pip` 安装它：


    ```bash

    $ pip install ipython

    ```


    然后调用 Python 解释器：


    ```python

    $ ipython -i funcoin/examples/chapter_3/full_blockchain.py

    Python 3.8.3 (default, Oct 13 2019, 18:33:25)

    Type ''copyright'', ''credits'', or ''license'' for more information.

    IPython 7.12.0 -- An enhanced Interactive Python. Type ''?'' for help.

    In [1]:

    ```


    尝试调用您的区块链，并对方法使用制表符补全：


    ```python

    In [1]: bc = Blockchain()

    Creating genesis block

    Created block 0

    In [2]: bc.h____________________

    hash

    chain

    last_block

    new_block

    pending_transactions

    ```


    展望未来，您需要主动试验您的区块链类，以获得对即将到来的概念的直观理解。

