- fmt: "#### Peer Discovery\n\n**Modern peer-to-peer networks aren’t centralized**:\
    \ There was a time when they were—when BitTorrent used trackers (servers that\
    \ list tons of IPs to connect to, like Napster). But if peer-to-peer networks\
    \ relied on trackers, they’d be susceptible to an easy form of attack: bringing\
    \ down the tracker.\n\nImagine you and I want to talk to each other over the Internet,\
    \ without a server. How do we find each other’s IPs?\n\n* Let’s use email/SMS/Telegram/WhatsApp\
    \ to send our IPs to each-other?\n\nThat could work, but it’s **centralized**—if\
    \ email is down, the system doesn’t work (interestingly, Bitcoin used IRC Chatrooms\
    \ to list IPs in the early days).\n\n* We can agree to run our clients on a specific\
    \ port and keep pinging random IPs on that port until we find each other.\n\n\
    **Finding each other is unlikely**—we’d have to ping approximately 2^32-1 IPv4\
    \ and an unimaginable 2^128-1 IPv6 addresses. **But that’s on the right track!**\n\
    \n* So, how does Bitcoin do it?\n\nIt turns out that if the network is large enough,\
    \ we can use a combination of those previously presented: When a Bitcoin client\
    \ is started for the first time, it doesn’t know about the world, or any other\
    \ nodes—it relies on hard-coded DNS entries. These DNS entries are maintained\
    \ by the Bitcoin community and return lists of trusted addresses for the client\
    \ to connect to.\n\n**But DNS servers are centralized**: A single server can be\
    \ spoofed and made to return phony IP addresses, isolating a node to accept fake\
    \ transactions and a bogus blockchain. For this reason alone, clients shouldn’t\
    \ rely solely on DNS. Thus, there’s an inherent risk when running a client for\
    \ the first time, but it’s mitigated by the fact that the longer a client is running,\
    \ the more costly it is to maintain an attack.\n\n![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig4_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4\n\nA node joining a network for the first time\n\nIn the preceding\
    \ diagram, when our Bitcoin client `node U` finds another node, it starts communicating\
    \ with it:\n\n```\nHello node A, I'm using Bitcoin protocol v0.16.0\n```\n\n`node\
    \ A` then responds:\n\n```\nHey node U! I'm also using v0.16.0, my latest block\
    \ is 528491, and here are some other nodes I know about: node X, node Z, ...\n\
    ```\n\n`node A` then broadcasts us to other nodes who may contact us too. And\
    \ we can download missing blocks from our new *swarm* of nodes and ask them for\
    \ information about their neighbors too.\n\nThis is the basis of peer discovery,\
    \ and why P2P networks are resilient—there’s no central point of failure, just\
    \ a “cloud” of nodes. And stopping a well-organized network is akin to censoring\
    \ individual network connections—an infeasible task.\n\n#### Naming\n\nThe IP\
    \ address of a peer can change, so we need a way of consistently referring to\
    \ it on the network. Ethereum uses a 256-bit hash of a peer’s public key to identify\
    \ a peer. BitTorrent uses 160-bit hash of a random number. In any case, identifiers\
    \ are large enough to guarantee uniqueness. If the network uses an appropriate\
    \ hash function, say SHA-256, then we can allow for ~2^256 peers on our network.\n\
    \n#### Distance functions\n\nBefore we can organize our network, we need a way\
    \ to measure the “distance” between two peers on a network. In mathematics, this\
    \ is called a metric. It means “a way to measure distance.” It’s important to\
    \ understand that we are not referring to geographical (Euclidean) distance, we’re\
    \ talking about something abstract, a common way of the network deciding how close\
    \ two nodes are from each other.\n\nIn 2002, two researchers Petar Maymounkov\
    \ and David Mazières published a groundbreaking paper called Kademlia. It describes\
    \ how, when providing a specific way of measuring distance, a decentralized network\
    \ can be structured in such a way that it becomes fast, resilient, and routable.\
    \ Most DHTs, like BitTorrent, adopted the Kademlia algorithm. Let’s talk a bit\
    \ about how it works.\n\nThe Kademlia algorithm uses the XOR (Exclusive or) function\
    \ to measure the distance between any two nodes. As a refresh, XOR is a logical\
    \ operation between two inputs which outputs true only when the two inputs are\
    \ different. Here are some examples:\n\n```\n1000 XOR 1000 = 0000\n0000 XOR 1111\
    \ = 1111\n1011 XOR 0101 = 1110\n```\n\nIn mathematics, to be called a metric,\
    \ a distance function must satisfy the following three criteria (as the XOR metric\
    \ indeed does):\n\n* The distance between a node and itself is zero.\n\n* The\
    \ distance between node A and node B is the same as the distance between node\
    \ B and node A (symmetry).\n\n* The distance from node A to node B to node C is\
    \ always greater than or equal to the distance from node A to node C (the triangle\
    \ inequality).\n\nFurthermore, the XOR function is trivial to implement and cheap\
    \ to calculate. It’s important to realize that the XOR function simply calculates\
    \ the distance between two node IDs.\n\n#### Routing\n\nThe following image shows\
    \ the network map for a small network with a maximum of eight nodes. The node\
    \ IDs are listed as leaves along the bottom of the diagram. The image shows how\
    \ the network is structured as seen from the view of node `110`. As you can see,\
    \ the closest node is `111` since `110 XOR 111 = 001`. The furthest node is `001`\
    \ since `110 XOR 001 = 111`. As you can see, there are a few great properties\
    \ about using XOR as a distance function; firstly it guarantees that half the\
    \ network is stored in the farthest collection (or bucket as it’s referred to\
    \ in the paper). This is convenient because then if a peer asks node `110` for\
    \ its neighbors, `110` needs only to return the closest peers to the requesting\
    \ node.\n\n![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig5_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5\n\nThe Kademlia algorithm\n\n### Data persistence\n\nOur blockchain\
    \ is stored in memory, that is, our `Blockchain` class clears and maintains the\
    \ entire chain in the running program!\n\n```python\nclass Blockchain(object):\n\
    \    def __init__(self):\n        self.chain = []\n```\n\nThis means that every\
    \ time we restart the server, our node will have to download the entire blockchain\
    \ from its neighbors. The blockchain is monotonic—it is ever-increasing in size—so\
    \ we’ll need to find a better solution for storing it. Bitcoin uses Google’s LevelDB\
    \ database for local storage. LevelDB is a simple key value store that can be\
    \ persisted to disk. At the time of writing, Bitcoin’s full storage space is around\
    \ 160GB."
  raw: '#### Peer Discovery


    **Modern peer-to-peer networks aren’t centralized**: There was a time when they
    were—when BitTorrent used trackers (servers that list tons of IPs to connect to,
    like Napster). But if peer-to-peer networks relied on trackers, they’d be susceptible
    to an easy form of attack: bringing down the tracker.


    Imagine you and I want to talk to each other over the Internet, without a server.
    How do we find each other’s IPs?


    *   Let’s use email/SMS/Telegram/WhatsApp to send our IPs to each-other?


    That could work, but it’s **centralized**—if email is down, the system doesn’t
    work (interestingly, Bitcoin used IRC Chatrooms to list IPs in the early days).


    *   We can agree to run our clients on a specific port and keep pinging random
    IPs on that port until we find each other.


    **Finding each other is unlikely**—we’d have to ping approximately 232-1 IPV4
    and an unimaginable 2^(128)-1 IPv6 addresses. **But that’s on the right track!**


    *   So, how does Bitcoin do it?


    It turns out that if the network is large enough, we can use a combination of
    those previously presented: When a Bitcoin client is started for the first time,
    it doesn’t know about the world, or any other nodes—it relies on hard-coded DNS
    entries. These DNS entries are maintained by the Bitcoin community and return
    lists of trusted addresses for the client to connect to.


    **But DNS servers are centralized**: A single server can be spoofed and made to
    return phony IP addresses, isolating a node to accept fake transactions and a
    bogus blockchain. For this reason alone, clients shouldn’t rely solely on DNS.
    Thus, there’s an inherent risk when running a client for the first time, but it’s
    mitigated by the fact that the longer a client is running, the more costly it
    is to maintain an attack.


    ![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig4_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    A node joining a network for the first time


    In the preceding diagram, when our Bitcoin client `node U` finds another node,
    it starts communicating with it:


    ```

    Hello node A, I''m using Bitcoin protocol v0.16.0

    ```


    `node A` then responds:


    ```

    Hey node U! I''m also using v0.16.0, my latest block is 528491, and here are some
    other nodes I know about: node X, node Z, ...

    ```


    `node A` then broadcasts us to other nodes who may contact us too. And we can
    download missing blocks from our new *swarm* of nodes and ask them for information
    about their neighbors too.


    This is the basis of peer discovery, and why P2P networks are resilient—there’s
    no central point of failure, just a “cloud” of nodes. And stopping a well-organized
    network is akin to censoring individual network connections—an infeasible task.


    #### Naming


    The IP address of a peer can change, so we need a way of consistently referring
    to it on the network. Ethereum uses a 256-bit hash of a peer’s public key to identify
    a peer. BitTorrent uses 160-bit hash of a random number. In any case, identifiers
    are large enough to guarantee uniqueness. If the network uses an appropriate hash
    function, say SHA-256, then we can allow for ~2256 peers on our network.


    #### Distance functions


    Before we can organize our network, we need a way to measure the “distance” between
    two peers on a network. In mathematics, this is called a metric. It means “a way
    to measure distance.” It’s important to understand that we are not referring to
    geographical (Euclidean) distance, we’re talking about something abstract, a common
    way of the network deciding how close two nodes are from each other.


    In 2002, two researchers Petar Maymounkov and David Mazières published a groundbreaking
    paper called Kademlia. It describes how, when providing a specific way of measuring
    distance, a decentralized network can be structured in such a way that it becomes
    fast, resilient, and routable. Most DHTs, like BitTorrent, adopted the Kademlia
    algorithm. Let’s talk a bit about how it works.


    The Kademlia algorithm uses the XOR (Exclusive or) function to measure the distance
    between any two nodes. As a refresh, XOR is a logical operation between two inputs
    which outputs true only when the two inputs are different. Here are some examples:


    ```

    1000 XOR 1000 = 0000

    0000 XOR 1111 = 1111

    1011 XOR 0101 = 1110

    ```


    In mathematics, to be called a metric, a distance function must satisfy the following
    three criteria (as the XOR metric indeed does):


    *   The distance between a node and itself is zero.


    *   The distance between node A and node B is the same as the distance between
    node B and node A (symmetry).


    *   The distance from node A to node B to node C is always greater than or equal
    to the distance from node A to node C (the triangle inequality).


    Furthermore, the XOR function is trivial to implement and cheap to calculate.
    It’s important to realize that the XOR function simply calculates the distance
    between two node IDs.


    #### Routing


    The following image shows the network map for a small network with a maximum of
    eight nodes. The node IDs are listed as leaves along the bottom of the diagram.
    The image shows how the network is structured as seen from the view of node `110`.
    As you can see, the closest node is `111` since `110 XOR 111 = 001`. The furthest
    node is `001` since `110 XOR 001 = 111`. As you can see, there are a few great
    properties about using XOR as a distance function; firstly it guarantees that
    half the network is stored in the farthest collection (or bucket as it’s referred
    to in the paper). This is convenient because then if a peer asks node `110` for
    its neighbors, `110` needs only to return the closest peers to the requesting
    node.


    ![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig5_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    The Kademlia algorithm


    ### Data persistence


    Our blockchain is stored in memory, that is, our `Blockchain` class clears and
    maintains the entire chain in the running program!


    ```

    class  Blockchain(object):

    def __init__(self):

    self.chain = []

    ```


    This means that every time we restart the server, our node will have to download
    the entire blockchain from its neighbors. The blockchain is monotonic—it is ever-increasing
    in size—so we’ll need to find a better solution for storing it. Bitcoin uses Google’s
    LevelDB database for local storage. LevelDB is a simple key value store that can
    be persisted to disk. At the time of writing, Bitcoin’s full storage space is
    around 160GB.'
  trans: "\n#### 节点发现\n\n**现代的 P2P 网络并非中心化**：曾几何时，它们确实是中心化的——比如 BitTorrent 使用跟踪服务器（像\
    \ Napster 那样维护大量 IP 地址列表的服务器）。但如果 P2P 网络依赖跟踪服务器，就很容易遭受一种攻击：瘫痪跟踪服务器。\n\n想象一下，你我想在没有服务器的情况下通过互联网互相通信。我们如何找到对方的\
    \ IP 地址？\n\n*   用电子邮件/短信/Telegram/WhatsApp 把各自的 IP 地址发给对方？\n\n这或许可行，但它是**中心化**的——一旦电子邮件服务瘫痪，整个系统就无法运行（有趣的是，比特币早期曾使用\
    \ IRC 聊天室来列出 IP 地址）。\n\n*   我们可以约定让客户端监听特定端口，并不断向该端口上的随机 IP 地址发送探测包，直到找到对方。\n\n\
    **找到对方的概率微乎其微**——我们得探测大约 2³²-1 个 IPv4 地址和数量难以想象的 2¹²⁸-1 个 IPv6 地址。**但方向是对的！**\n\
    \n*   那么，比特币是如何做到的呢？\n\n事实证明，如果网络规模足够大，就可以综合运用上述两种方法：当比特币客户端首次启动时，它对整个世界一无所知，也不认识任何其他节点——它依赖于硬编码的\
    \ DNS 条目。这些 DNS 条目由比特币社区维护，会向客户端返回一系列可信地址供其连接。\n\n**但 DNS 服务器是中心化的**：单个服务器可能被欺骗，返回虚假的\
    \ IP 地址，从而将节点隔离，使其接收伪造的交易和虚假的区块链。仅此一点，客户端就不应完全依赖 DNS。因此，首次运行客户端存在固有风险，但运行时间越长，维持攻击的成本就越高，风险也因此得以缓解。\n\
    \n![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig4_HTML.jpg](img/475256_1_En_8_Fig4_HTML.jpg)\n\
    \n图 8-4\n\n节点首次加入网络\n\n在上图中，当我们的比特币客户端`节点 U`找到另一个节点时，便开始与之通信：\n\n```\n你好节点 A，我使用的是比特币协议\
    \ v0.16.0\n```\n\n`节点 A`随后回应：\n\n```\n你好节点 U！我也在使用 v0.16.0，我的最新区块是 528491，这里还有一些我认识的节点：节点\
    \ X、节点 Z……\n```\n\n接着，`节点 A`会将我们广播给其他可能也会联系我们的节点。我们就能从新的节点 *集群* 中下载缺失的区块，并向它们询问其相邻节点的信息。\n\
    \n这就是节点发现的基本原理，也是 P2P 网络具有强大韧性的原因——没有中心故障点，只有一片由节点构成的“云”。想要阻止一个组织良好的网络，无异于试图审查单个网络连接——这是一项不可能完成的任务。\n\
    \n#### 命名\n\n节点的 IP 地址可能会改变，因此我们需要一种在网络中稳定引用它的方式。以太坊使用节点公钥的 256 位哈希值来标识节点。BitTorrent\
    \ 则使用随机数的 160 位哈希值。无论如何，标识符的位数都足够大，可以保证唯一性。如果网络使用合适的哈希函数，例如 SHA-256，那么我们的网络理论上可以容纳约\
    \ 2²⁵⁶ 个节点。\n\n#### 距离函数\n\n在组织网络之前，我们需要一种方法来测量网络中两个节点之间的“距离”。在数学中，这被称为度量。它意味着“测量距离的一种方式”。需要理解的是，这里指的不是地理（欧几里得）距离，而是一种抽象概念，是网络用来判断两个节点之间亲近程度的通用方法。\n\
    \n2002 年，两位研究员 Petar Maymounkov 和 David Mazières 发表了一篇开创性的论文《Kademlia》。它描述了当提供一种特定的距离测量方式时，可以如何构建一个去中心化网络，使其变得快速、稳定且具备可路由性。大多数\
    \ DHT，如 BitTorrent，都采用了 Kademlia 算法。我们来简单谈谈它的工作原理。\n\nKademlia 算法使用异或函数来测量任意两个节点之间的距离。作为复习，异或是两个输入之间的逻辑运算，仅当两个输入不同时输出为真。以下是一些示例：\n\
    \n```\n1000 XOR 1000 = 0000\n0000 XOR 1111 = 1111\n1011 XOR 0101 = 1110\n```\n\
    \n在数学上，要被称为度量，距离函数必须满足以下三个条件（异或度量确实满足）：\n\n*   节点到自身的距离为零。\n\n*   节点 A 到节点 B 的距离等于节点\
    \ B 到节点 A 的距离（对称性）。\n\n*   从节点 A 经节点 B 到节点 C 的距离总是大于或等于从节点 A 直接到节点 C 的距离（三角不等式）。\n\
    \n此外，异或函数实现简单，计算成本低。重要的是要认识到，异或函数仅仅计算两个节点 ID 之间的距离。\n\n#### 路由\n\n下图展示了一个最多包含八个节点的小型网络的网络映射图。节点\
    \ ID 作为叶子节点列在图表的底部。该图展示了从节点`110`的视角看到的网络结构。可以看到，最近的节点是`111`，因为`110 XOR 111 = 001`。最远的节点是`001`，因为`110\
    \ XOR 001 = 111`。可以看出，使用异或作为距离函数有几个很好的特性；首先，它保证了有一半的网络节点被存储在最远的集合（或在论文中被称为桶）中。这很方便，因为当某个节点向节点`110`询问其邻居时，`110`只需返回离请求节点最近的节点即可。\n\
    \n![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig5_HTML.jpg](img/475256_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5\n\nKademlia 算法\n\n### 数据持久化\n\n我们的区块链存储在内存中，也就是说，我们的`Blockchain`类在程序运行期间会清空并维护整条链！\n\
    \n```python\nclass Blockchain(object):\n    def __init__(self):\n        self.chain\
    \ = []\n```\n\n这意味着每次重启服务器时，我们的节点都必须从其邻居节点那里下载整个区块链。区块链是单调递增的——其规模在不断增长——所以我们需要一个更好的存储方案。比特币使用谷歌的\
    \ LevelDB 数据库进行本地存储。LevelDB 是一个简单的键值存储库，可以持久化到磁盘。在撰写本文时，比特币的完整存储空间约为 160GB。\n"
- fmt: "### Alternative consensus: Proof of stake\n\nThroughout this book we’ve only\
    \ spoken about proof of work: the algorithm which secures our blockchain and creates\
    \ consensus. It’s worth mentioning that there are loud criticisms against proof\
    \ of work, the most popular of which is the argument that it is bad for the environment:\
    \ it’s no secret that Bitcoin consumes an enormous amount of energy for proof\
    \ of work. But this is largely contested by a game theoretical argument that it’s\
    \ precisely this energy which secures the network. Additionally, it incentivizes\
    \ Bitcoin miners to stay profitable by moving their mining operations to states\
    \ which have electricity surpluses or low-cost renewable energy. At the macro\
    \ level, Bitcoin maximalists contrast the energy usage to the indeterminable costs\
    \ of running a fiat banking system with countless branches, vaults, electricity,\
    \ employees, forms, and a seemingly endless supply of paper notes.\n\nIn Proof\
    \ of Stake (PoS), the miner of the next block is *chosen* by an algorithm according\
    \ to certain criteria. Depending on the implementation, these criteria may be\
    \ related to the miner’s wealth or period of time that they’ve maintained a balance\
    \ or be completely at random. In contrast, PoS does not require an abundant usage\
    \ of energy to secure the network. `NXT` is a cryptocurrency that has implemented\
    \ pure Proof of Stake; other cryptocurrencies like `Peercoin` use a hybrid system,\
    \ while (at the time of writing) `Ethereum` has been in the process of moving\
    \ toward a PoS system.\n\nThere are plenty of developers in the community who\
    \ don’t see Proof of Stake as an ideal replacement for proof of work due to a\
    \ variety of factors. The first is that proof of work offers additional network\
    \ layer benefits: if Bitcoin had to suffer an eclipse attack—tons of bad actor\
    \ nodes on the network attempting to facade an alternative chain—those actors\
    \ would be forced to repeat *all* the work done with the trillions of terawatt-hours\
    \ of electricity, making it infeasible; the second is that Proof of Stake is susceptible\
    \ to a problem known as the *nothing-at-stake* problem wherein miners (perhaps\
    \ a better term is block generators) have nothing to lose by acting in bad faith\
    \ (voting for multiple blockchain histories) and preventing consensus. This is\
    \ a direct consequence of having no sunk economic cost (like energy), so there\
    \ is no cost to working on multiple chains at once. In order to mitigate these\
    \ vulnerabilities, punitive protocols have been suggested which punish bad actors\
    \ on the network.\n\n### Smart contracts\n\nThe idea of a “smart” contract was\
    \ originally introduced by Bitcoin’s `P2PK` (Pay to Pubkey) and `P2PH` (Pay to\
    \ Pubkey Hash). Ethereum breakthrough was the introduction of Turing-complete\
    \ language to write smart contracts. In lay terms, Turing completeness means that\
    \ the smart contract language can effectively compute operations like any real-world\
    \ computer.\n\nThe introduction of smart contracts was initially seen as a more\
    \ comprehensive version of Bitcoin’s `Script` system or, more simply, code that\
    \ can be stored on the blockchain and executed by miners. It’s called a *contract*\
    \ because the idea behind the code is that it operates against accounts or serves\
    \ as an intermediary logging events in the blockchain or taking action when certain\
    \ criteria are met. This is pertinent in the legal space as it alleviates the\
    \ need for middlemen or intermediaries. In funcoin, our blockchain stores simple\
    \ transactions, not instructions (or code). Technically, a smart contract is not\
    \ that smart at all—it’s a bunch of code, written in a special language that miners\
    \ (and nodes) run when they validate a block. This code may instruct funds to\
    \ be transferred from one account to another or allow a certain transaction to\
    \ happen upon request; the possibilities are seemingly endless.\n\n- **Example\
    \ 1. Notarizing a Document**\n\nLet’s say that you wanted to notarize a document.\
    \ You’d first need to instruct your bank to pay your lawyer and then wait for\
    \ your lawyer to process your document. With a smart contract, however, there’s\
    \ no need for banks or any intermediation. With smart contracts, the lawyer can\
    \ be paid automatically once they produce a document satisfying certain conditions\
    \ set by your code.\n\n- **Example 2. Buying a house**\n\nBuying a property is\
    \ a very complicated procedure. There are typically commission-based brokers,\
    \ representing the seller and buyer. They coordinate with each other and with\
    \ their respective lawyers and banks to manage the taxable process. In certain\
    \ cases, money must also be placed in an escrow account to release the funds from\
    \ the buyer to the seller when all the paperwork has been complete. This process\
    \ places a hefty amount of *trust* in many places to facilitate what in essence\
    \ is a simple transaction. In this case, a smart contract can automatically act\
    \ as both escrow service and payment provider—since all parties can be transacted\
    \ with *automatically* when criteria are met.\n\n![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig6_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6 A smart contract example\n\n- **Example 3. ICOs (Initial Coin Offerings)**\n\
    \nICOs can be thought of as blockchain-based crowdfunding. If you’d like to sell\
    \ shares in your new project or company, you can create a smart contract which\
    \ grants somebody a share when they transfer coins to a specific account. These\
    \ shares are usually in the form of tokens.\n\n### What does a smart contract\
    \ look like?\n\nIn Ethereum, smart contracts are written in a language called\
    \ `Solidity`. Here is an example of a voting contract (from the `Solidity` documentation\
    \ at [`https://github.com/ethereum/solidity/blob/v0.4.20/docs/solidity-by-example.rst`](https://github.com/ethereum/solidity/blob/v0.4.20/docs/solidity-by-example.rst)):\n\
    \n```\n/// @title Voting with delegation.\ncontract Ballot {\n    // This declares\
    \ a new complex type which will\n    // be used for variables later.\n    // It\
    \ will represent a single voter.\n    struct Voter {\n        uint weight; //\
    \ weight is accumulated by delegation\n        bool voted;  // if true, that person\
    \ already voted\n        address delegate; // person delegated to\n        uint\
    \ vote; // index of the voted proposal\n    }\n    // This is a type for a single\
    \ proposal.\n    struct Proposal {\n        bytes32 name;   // short name (up\
    \ to 32 bytes)\n        uint voteCount; // number of accumulated votes\n    }\n\
    \n    address public chairperson;\n\n    // This declares a state variable that\n\
    \    // stores a `Voter` struct for each possible address.\n    mapping(address\
    \ => Voter) public voters;\n\n    // A dynamically sized array of `Proposal` structs.\n\
    \    Proposal[] public proposals;\n\n    /// Create a new ballot to choose one\
    \ of `proposalNames`.\n    constructor(bytes32[] memory proposalNames) public\
    \ {\n        chairperson = msg.sender;\n        voters[chairperson].weight = 1;\n\
    \n        // For each of the provided proposal names,\n        // create a new\
    \ proposal object and add it\n        // to the end of the array.\n        for\
    \ (uint i = 0; i < proposalNames.length; i++) {\n            // `Proposal({...})`\
    \ creates a temporary\n            // Proposal object and `proposals.push(...)`\n\
    \            // appends it to the end of `proposals`.\n            proposals.push(Proposal({\n\
    \                name: proposalNames[i],\n                voteCount: 0\n     \
    \       }));\n        }\n    }\n\n    // Give `voter` the right to vote on this\
    \ ballot.\n    // May only be called by `chairperson`.\n    function giveRightToVote(address\
    \ voter) public {\n        // If the first argument of `require` evaluates\n \
    \       // to `false`, execution terminates and all\n        // changes to the\
    \ state and to Ether balances\n        // are reverted.\n        // This used\
    \ to consume all gas in old EVM versions, but\n        // not anymore.\n     \
    \   // It is often a good idea to use `require` to check if\n        // functions\
    \ are called correctly.\n        // As a second argument, you can also provide\
    \ an\n        // explanation about what went wrong.\n        require(\n      \
    \      msg.sender == chairperson,\n            \"Only chairperson can give right\
    \ to vote.\"\n        );\n        require(\n            !voters[voter].voted,\n\
    \            \"The voter already voted.\"\n        );\n        require(voters[voter].weight\
    \ == 0);\n        voters[voter].weight = 1;\n    }\n\n    /// Delegate your vote\
    \ to the voter `to`.\n    function delegate(address to) public {\n        // assigns\
    \ reference\n        Voter storage sender = voters[msg.sender];\n        require(!sender.voted,\
    \ \"You already voted.\");\n\n        require(to != msg.sender, \"Self-delegation\
    \ is disallowed.\");\n\n        // Forward the delegation as long as\n       \
    \ // `to` also delegated.\n        // In general, such loops are very dangerous,\n\
    \        // because if they run too long, they might\n        // need more gas\
    \ than is available in a block.\n        // In this case, the delegation will\
    \ be executed in the same\n        // transaction and will only consist of a few\
    \ round trips.\n        while (voters[to].delegate != address(0)) {\n        \
    \    to = voters[to].delegate;\n\n            // We found a loop in the delegation,\
    \ not allowed.\n            require(to != msg.sender, \"Found loop in delegation.\"\
    );\n        }\n\n        // Since `sender` is a reference, this\n        // modifies\
    \ `voters[msg.sender].voted`\n        sender.voted = true;\n        sender.delegate\
    \ = to;\n        Voter storage delegate_ = voters[to];\n        if (delegate_.voted)\
    \ {\n            // If the delegate already voted,\n            // directly add\
    \ to the number of votes\n            proposals[delegate_.vote].voteCount += sender.weight;\n\
    \        } else {\n            // If the delegate did not vote yet,\n        \
    \    // add to her weight.\n            delegate_.weight += sender.weight;\n \
    \       }\n    }\n\n    /// Give your vote (including votes delegated to you)\n\
    \    /// to proposal `proposals[proposal].name`.\n    function vote(uint proposal)\
    \ public {\n        Voter storage sender = voters[msg.sender];\n        require(!sender.voted,\
    \ \"Already voted.\");\n        sender.voted = true;\n        sender.vote = proposal;\n\
    \n        // If `proposal` is out of the range of the array,\n        // this\
    \ will throw automatically and revert all\n        // changes.\n        proposals[proposal].voteCount\
    \ += sender.weight;\n    }\n\n    /// @dev Computes the winning proposal taking\
    \ all\n    /// previous votes into account.\n    function winningProposal() public\
    \ view\n            returns (uint winningProposal_)\n    {\n        uint winningVoteCount\
    \ = 0;\n        for (uint p = 0; p < proposals.length; p++) {\n            if\
    \ (proposals[p].voteCount > winningVoteCount) {\n                winningVoteCount\
    \ = proposals[p].voteCount;\n                winningProposal_ = p;\n         \
    \   }\n        }\n    }\n\n    // Calls winningProposal() function to get the\
    \ index\n    // of the winner contained in the proposals array and then\n    //\
    \ returns the name of the winner\n    function winnerName() public view\n    \
    \        returns (bytes32 winnerName_)\n    {\n        winnerName_ = proposals[winningProposal()].name;\n\
    \    }\n}\n```\n\nWhen this code is executed by a miner, the computation is measured\
    \ in *gas*. In other words, *gas* is a calculation of the amount of computational\
    \ effort to execute the contract. Every operation costs some amount of gas, and\
    \ miners are paid by fees (in Ether) for the total amount of gas they spent. This\
    \ economy incentivizes contracts to be written efficiently."
  raw: "## Alternative consensus: Proof of stake\n\nThroughout this book we’ve only\
    \ spoken about proof of work: the algorithm which secures our blockchain and creates\
    \ consensus. It’s worth mentioning that there are loud criticisms against proof\
    \ of work, the most popular of which is the argument that it is bad for the environment:\
    \ it’s no secret that Bitcoin consumes an enormous amount of energy for proof\
    \ of work. But this is largely contested by a game theoretical argument that it’s\
    \ precisely this energy which secures the network. Additionally, it incentivizes\
    \ Bitcoin miners to stay profitable by moving their mining operations to states\
    \ which have electricity surpluses or low-cost renewable energy. At the macro\
    \ level, Bitcoin maximalists contrast the energy usage to the indeterminable costs\
    \ of running a fiat banking system with countless branches, vaults, electricity,\
    \ employees, forms, and a seemingly endless supply of paper notes.\n\nIn Proof\
    \ of Stake (PoS) , the miner of the next block is *chosen* by an algorithm according\
    \ to certain criteria. Depending on the implementation, these criteria may be\
    \ related to the miner’s wealth or period of time that they’ve maintained a balance\
    \ or be completely at random. In contrast, PoS does not require an abundant usage\
    \ of energy to secure the network. NXT is a cryptocurrency that has implemented\
    \ pure Proof of Stake; other cryptocurrencies like Peercoin use a hybrid system,\
    \ while (at the time of writing) Ethereum has been in the process of moving toward\
    \ a PoS system.\n\nThere are plenty of developers in the community who don’t see\
    \ Proof of Stake as an ideal replacement for proof of work due to a variety of\
    \ factors. The first is that proof of work offers additional network layer benefits:\
    \ if Bitcoin had to suffer an eclipse attack—tons of bad actor nodes on the network\
    \ attempting to facade an alternative chain—those actors would be forced to repeat\
    \ *all* the work done with the trillions of terawatt-hours of electricity, making\
    \ it infeasible; the second is that Proof of Stake is susceptible to a problem\
    \ known as the *nothing-at-stake* problem wherein miners (perhaps a better term\
    \ is block generators) have nothing to lose by acting in bad faith (voting for\
    \ multiple blockchain histories) and preventing consensus. This is a direct consequence\
    \ of having no sunk economic cost (like energy), so there is no cost to working\
    \ on multiple chains at once. In order to mitigate these vulnerabilities, punitive\
    \ protocols have been suggested which punish bad actors on the network.\n\n##\
    \ Smart contracts\n\nThe idea of a “smart” contract was originally introduced\
    \ by Bitcoin’s P2PK (Pay to Pubkey) and P2PH (Pay to Pubkey Hash). Ethereum breakthrough\
    \ was the introduction of Turing-complete language to write smart contracts. In\
    \ lay terms, Turing completeness means that the smart contract language can effectively\
    \ compute operations like any real-world computer.\n\nThe introduction of smart\
    \ contracts was initially seen as a more comprehensive version of Bitcoin’s Script\
    \ system or, more simply, code that can be stored on the blockchain and executed\
    \ by miners. It’s called a *contract* because the idea behind the code is that\
    \ it operates against accounts or serves as an intermediary logging events in\
    \ the blockchain or taking action when certain criteria are met. This is pertinent\
    \ in the legal space as it alleviates the need for middlemen or intermediaries.\
    \ In funcoin, our blockchain stores simple transactions, not instructions (or\
    \ code). Technically, a smart contract is not that smart at all—it’s a bunch of\
    \ code, written in a special language that miners (and nodes) run when they validate\
    \ a block. This code may instruct funds to be transferred from one account to\
    \ another or allow a certain transaction to happen upon request; the possibilities\
    \ are seemingly endless.\n\n*   *Example 1\\. Notarizing a Document*\n\n*   Let’s\
    \ say that you wanted to notarize a document. You’d first need to instruct your\
    \ bank to pay your lawyer and then wait for your lawyer to process your document.\
    \ With a smart contract, however, there’s no need for banks or any intermediation.\
    \ With smart contracts, the lawyer can be paid automatically once they produce\
    \ a document satisfying certain conditions set by your code.\n\n*   *Example 2\\\
    . Buying a house*\n\n*   Buying a property is a very complicated procedure. There\
    \ are typically commission-based brokers, representing the seller and buyer. They\
    \ coordinate with each other and with their respective lawyers and banks to manage\
    \ the taxable process. In certain cases, money must also be placed in an escrow\
    \ account to release the funds from the buyer to the seller when all the paperwork\
    \ has been complete. This process places a hefty amount of *trust* in many places\
    \ to facilitate what in essence is a simple transaction. In this case, a smart\
    \ contract can automatically act as both escrow service and payment provider—since\
    \ all parties can be transacted with *automatically* when criteria are met.\n\n\
    \    ![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig6_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig6_HTML.jpg)\n\
    \n    Figure 8-6\n\n    A smart contract example\n\n*   *Example 3\\. ICOs (Initial\
    \ Coin Offerings)*\n\n*   ICOs can be thought of as blockchain-based crowdfunding.\
    \ If you’d like to sell shares in your new project or company, you can create\
    \ a smart contract which grants somebody a share when they transfer coins to a\
    \ specific account. These shares are usually in the form of tokens.\n\n### What\
    \ does a smart contract look like?\n\nIn Ethereum, smart contracts are written\
    \ in a language called Solidity. Here is an example of a voting contract (from\
    \ the Solidity documentation at [`https://github.com/ethereum/solidity/blob/v0.4.20/docs/solidity-by-example.rst`](https://github.com/ethereum/solidity/blob/v0.4.20/docs/solidity-by-example.rst)):\n\
    \n```\n/// @title Voting with delegation.\ncontract Ballot {\n// This declares\
    \ a new complex type which will\n// be used for variables later.\n// It will represent\
    \ a single voter.\nstruct Voter {\nuint weight; // weight is accumulated by delegation\n\
    bool voted;  // if true, that person already voted\naddress delegate; // person\
    \ delegated to\nuint vote; // index of the voted proposal\n}\n// This is a type\
    \ for a single proposal.\nstruct Proposal {\nbytes32 name;   // short name (up\
    \ to 32 bytes)\nuint voteCount; // number of accumulated votes\n}\naddress public\
    \ chairperson;\n// This declares a state variable that\n// stores a `Voter` struct\
    \ for each possible address.\nmapping(address => Voter) public voters;\n// A dynamically\
    \ sized array of `Proposal` structs.\nProposal[] public proposals;\n/// Create\
    \ a new ballot to choose one of `proposalNames`.\nconstructor(bytes32[] memory\
    \ proposalNames) public {\nchairperson = msg.sender;\nvoters[chairperson].weight\
    \ = 1;\n// For each of the provided proposal names,\n// create a new proposal\
    \ object and add it\n// to the end of the array.\nfor (uint i = 0; i  winningVoteCount)\
    \ {\nwinningVoteCount = proposals[p].voteCount;\nwinningProposal_ = p;\n}\n}\n\
    }\n// Calls winningProposal() function to get the index\n// of the winner contained\
    \ in the proposals array and then\n// returns the name of the winner\nfunction\
    \ winnerName() public view\nreturns (bytes32 winnerName_)\n{\nwinnerName_ = proposals[winningProposal()].name;\n\
    }\n}\n```\n\nWhen this code is executed by a miner, the computation is measured\
    \ in *gas*. In other words, *gas* is a calculation of the amount of computational\
    \ effort to execute the contract. Every operation costs some amount of gas, and\
    \ miners are paid by fees (in Ether) for the total amount of gas they spent. This\
    \ economy incentivizes contracts to be written efficiently."
  trans: "\n### 替代共识：权益证明（Proof of Stake）\n\n在本书中，我们只讨论过*工作量证明*（Proof of Work）：一种保护区块链安全并达成共识的算法。值得一提的是，针对工作量证明存在强烈的批评声音，其中最流行的一种观点认为它*对环境不利*：比特币为进行工作量证明而消耗大量能源已不是什么秘密。但这在很大程度上受到一种博弈论观点的反驳，即正是这种*能耗*才保障了网络的安全性。此外，这还激励比特币矿工将挖矿业务迁移到电力富余或拥有低成本可再生能源的地区，以保持盈利。在宏观层面上，比特币极端主义者将这种能耗与运行法定银行体系所产生的无法估量的成本进行对比——后者需要无数的分支机构、金库、电力、员工、表格以及看似永不枯竭的纸质钞票。\n\
    \n在权益证明中，下一个区块的矿工是由算法根据特定标准*选择*的。根据具体实现，这些标准可能与矿工的财富、持有余额的时长有关，或者完全是随机的。相比之下，权益证明不需要大量消耗能源来保障网络安全。`NXT`\
    \ 是一种实现了纯权益证明的加密货币；像 `Peercoin` 等其他加密货币则使用混合系统，而（在撰写本文时）`以太坊` 正处在向权益证明系统迁移的过程中。\n\
    \n社区中有许多开发者由于多种因素，并不认为权益证明是工作量证明的理想替代方案。首先，工作量证明能提供额外的网络层优势：如果比特币遭受日蚀攻击——网络中存在大量恶意节点试图伪装成另一条链——这些攻击者将被迫重复所有耗费了数万亿兆瓦时电力的*所有*工作量，这使得攻击不可行；其次，权益证明容易受到一种被称为*无利害关系*问题的影响，即矿工（或许更适合称为区块生成者）无需担心自身受损，因此可以恶意行事（为多条区块链历史投票），从而阻止共识达成。这直接源于没有沉没经济成本（如能源），因此同时处理多条链没有任何成本。为了缓解这些漏洞，有人提出了惩罚协议，用于惩处网络中的不良行为者。\n\
    \n### 智能合约\n\n“智能”合约的概念最初由比特币的 `P2PK`（支付到公钥）和 `P2PH`（支付到公钥哈希）引入。以太坊的突破在于引入了图灵完备的语言来编写智能合约。通俗地讲，图灵完备意味着智能合约语言能够像任何真实世界的计算机一样有效地执行计算操作。\n\
    \n智能合约的引入最初被视为比特币 `Script` 系统的更全面版本，或者更简单地说，它是可以存储在区块链上并由矿工执行的代码。它之所以被称为*合约*，是因为代码背后的理念是针对账户操作，或作为中间人记录区块链上的事件，或在满足特定条件时采取行动。这在法律领域意义重大，因为它减少了对中间人或中介的需求。在我们的\
    \ Funcoin 中，区块链存储的是简单的交易，而不是指令（或代码）。从技术上讲，智能合约并不那么“智能”——它是由一种特殊语言编写的一组代码，矿工（和节点）在验证区块时会运行这些代码。这些代码可以指示资金从一个账户转移到另一个账户，或者允许在收到请求时执行特定交易；其可能性似乎是无限的。\n\
    \n-   **示例 1：公证文件**\n\n假设你想公证一份文件。你首先需要指示你的银行向你的律师付款，然后等待律师处理你的文件。然而，有了智能合约，就不需要银行或任何中介机构。通过智能合约，一旦律师生成满足你代码设定条件的文件，就可以自动获得付款。\n\
    \n-   **示例 2：购买房屋**\n\n购买房产是一个非常复杂的过程。通常有关注佣金的经纪人分别代表卖方和买方。他们相互协调，并与各自的律师和银行合作来管理纳税过程。在某些情况下，资金还必须存入一个托管账户，以便在所有手续完成后从买方释放给卖方。这个过程在多个环节都依赖于大量的*信任*，来促成本质上简单的交易。在这种情况下，智能合约可以自动充当托管服务和支付提供商——因为当条件满足时，所有各方都可以*自动*进行交易。\n\
    \n![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig6_HTML.jpg](img/475256_1_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6 智能合约示例\n\n-   **示例 3：首次代币发行**\n\nICO 可以被视为基于区块链的众筹。如果你想为你新项目或公司的股份进行募资，你可以创建一份智能合约，当有人向指定账户转账时，该合约会授予其一份股份。这些股份通常以代币形式存在。\n\
    \n### 智能合约长什么样？\n\n在以太坊中，智能合约是用一种名为 `Solidity` 的语言编写的。下面是一个投票合约的例子（来自 [`https://github.com/ethereum/solidity/blob/v0.4.20/docs/solidity-by-example.rst`](https://github.com/ethereum/solidity/blob/v0.4.20/docs/solidity-by-example.rst)\
    \ 的 `Solidity` 文档）：\n\n```\n/// @title 带委托的投票合约.\ncontract Ballot {\n    // 声明了一个新的复杂类型，将在之后用于变量。\n\
    \    // 它将代表一个单独的投票者。\n    struct Voter {\n        uint weight; // 通过委托累积的权重\n\
    \        bool voted;  // 如果为真，表示该人已经投票\n        address delegate; // 被委托的人\n \
    \       uint vote; // 所投票提案的索引\n    }\n    // 这是一个表示单个提案的类型。\n    struct Proposal\
    \ {\n        bytes32 name;   // 短名称（最多 32 字节）\n        uint voteCount; // 累积的票数\n\
    \    }\n\n    address public chairperson;\n\n    // 声明了一个状态变量，为每个可能的地址存储一个`Voter`结构体。\n\
    \    mapping(address => Voter) public voters;\n\n    // `Proposal`结构体的动态大小数组。\n\
    \    Proposal[] public proposals;\n\n    /// 创建一份新选票，从`proposalNames`中选一个。\n \
    \   constructor(bytes32[] memory proposalNames) public {\n        chairperson\
    \ = msg.sender;\n        voters[chairperson].weight = 1;\n\n        // 对于提供的每个提案名称，\n\
    \        // 创建一个新的提案对象并将其添加到数组末尾。\n        for (uint i = 0; i < proposalNames.length;\
    \ i++) {\n            // `Proposal({...})` 创建一个临时的\n            // Proposal 对象，而\
    \ `proposals.push(...)`\n            // 将其追加到 `proposals` 数组的末尾。\n           \
    \ proposals.push(Proposal({\n                name: proposalNames[i],\n       \
    \         voteCount: 0\n            }));\n        }\n    }\n\n    // 给予 `voter`\
    \ 在此选票上的投票权。\n    // 只能由 `chairperson` 调用。\n    function giveRightToVote(address\
    \ voter) public {\n        // 如果 `require` 的第一个参数计算结果为 `false`，\n        // 执行终止，并且所有对状态和以太余额的更改\n\
    \        // 都将被撤销。\n        // 在旧版本 EVM 中这曾消耗所有 gas，但现在不再如此。\n        // 使用 `require`\
    \ 来检查函数是否被正确调用通常是个好主意。\n        // 你还可以提供第二个参数来说明哪里出错了。\n        require(\n  \
    \          msg.sender == chairperson,\n            \"只有主席才能授予投票权。\"\n        );\n\
    \        require(\n            !voters[voter].voted,\n            \"该投票者已经投过票。\"\
    \n        );\n        require(voters[voter].weight == 0);\n        voters[voter].weight\
    \ = 1;\n    }\n\n    /// 将你的投票委托给投票者 `to`。\n    function delegate(address to)\
    \ public {\n        // 分配引用\n        Voter storage sender = voters[msg.sender];\n\
    \        require(!sender.voted, \"你已经投过票了。\");\n\n        require(to != msg.sender,\
    \ \"不允许自我委托。\");\n\n        // 只要 `to` 也进行了委托，就转发该委托。\n        // 通常，这种循环非常危险，\n\
    \        // 因为如果它们运行时间过长，可能会消耗超过一个区块中可用的 gas。\n        // 在这种情况下，委托将在同一笔交易中执行，并且只涉及少数几轮。\n\
    \        while (voters[to].delegate != address(0)) {\n            to = voters[to].delegate;\n\
    \n            // 我们在委托链中发现了一个循环，不允许这样做。\n            require(to != msg.sender,\
    \ \"在委托中发现循环。\");\n        }\n\n        // 由于 `sender` 是一个引用，这会修改 `voters[msg.sender].voted`\n\
    \        sender.voted = true;\n        sender.delegate = to;\n        Voter storage\
    \ delegate_ = voters[to];\n        if (delegate_.voted) {\n            // 如果被委托人已经投票，\n\
    \            // 直接将其票数加到相应的提案上\n            proposals[delegate_.vote].voteCount\
    \ += sender.weight;\n        } else {\n            // 如果被委托人尚未投票，\n          \
    \  // 则将其权重加到她的权重上。\n            delegate_.weight += sender.weight;\n        }\n\
    \    }\n\n    /// 将你的投票（包括委托给你的投票）投给提案 `proposals[proposal].name`。\n    function\
    \ vote(uint proposal) public {\n        Voter storage sender = voters[msg.sender];\n\
    \        require(!sender.voted, \"已经投过票。\");\n        sender.voted = true;\n \
    \       sender.vote = proposal;\n\n        // 如果 `proposal` 超出了数组范围，\n       \
    \ // 这将自动抛出异常并撤销所有更改。\n        proposals[proposal].voteCount += sender.weight;\n\
    \    }\n\n    /// @dev 计算获胜提案，考虑所有之前的投票。\n    function winningProposal() public\
    \ view\n            returns (uint winningProposal_)\n    {\n        uint winningVoteCount\
    \ = 0;\n        for (uint p = 0; p < proposals.length; p++) {\n            if\
    \ (proposals[p].voteCount > winningVoteCount) {\n                winningVoteCount\
    \ = proposals[p].voteCount;\n                winningProposal_ = p;\n         \
    \   }\n        }\n    }\n\n    // 调用 winningProposal() 函数获取提案数组中获胜者的索引\n    //\
    \ 然后返回获胜者的名称\n    function winnerName() public view\n            returns (bytes32\
    \ winnerName_)\n    {\n        winnerName_ = proposals[winningProposal()].name;\n\
    \    }\n}\n```\n\n当矿工执行这段代码时，计算量以 *gas* 计量。换句话说，*gas* 是对执行合约所需计算工作量的度量。每个操作都会消耗一定量的\
    \ gas，矿工根据他们消耗的 gas 总量获得费用（以 Ether 计价）。这种经济模式激励着合约被高效编写。\n"
