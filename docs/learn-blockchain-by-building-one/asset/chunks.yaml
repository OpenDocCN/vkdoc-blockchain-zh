    *Dedicated to* ***Joshua*** *, who finishes what he starts.*


    Introduction


    ## Another book on blockchains? Why?


    Understanding blockchains isn’t easy. Or at least wasn’t for me: when Bitcoin
    first made the news cycle, I tried to learn how it worked and discovered that
    there were too few resources addressed to programmers (like myself). There was
    always the Bitcoin reference wiki ( [`https://en.bitcoin.it`](https://en.bitcoin.it)
    ), but in those days, it wasn’t as clearly organized as today, and although I
    read Satoshi’s whitepaper, I didn’t really understand it at first—at least not
    how the cryptographic parts worked.


    I meandered through YouTube, completed porous tutorials, and felt the frustration
    of examples that didn’t communicate the concepts clearly. So, I decided to try
    and build a blockchain myself, and document all the things I learnt along the
    way. In so doing, I discovered why cryptocurrencies are so hard to explain and
    understand; it’s because you first need to define the ingredients of digital money:


    *   How does the money get created? (Mining)


    *   How does Alice send money to Bob? (Digitally signed transactions)


    *   Who keeps track of all these transactions and the generated money? (Everyone,
    via a distributed ledger)


    These high-level points rely on distinct units of knowledge that must be understood
    before they can be combined into a set of commonly agreed-upon rules that everyone
    follows. And the best way to understand these disparate concepts is piece by piece—by
    practically using them to build your own cryptocurrency. So, I wrote this book
    for people who feel the same frustration that I did, and overcome it by dealing
    with the subject matter at a code level—that’s what really gets it to stick. If
    you follow through, and do the same, I’m certain that at the end of this book,
    you’ll have a solid grasp of how they work.


    ## Setting yourself up for success


    ### GitHub repository


    The finalized code is located at [`https://github.com/dvf/blockchain-book`](https://github.com/dvf/blockchain-book)
    . But try do the coding yourself—the code is structured in such a way that methods
    are stubbed out at a high level with the details being filled incrementally. This
    code is kept updated, and so it’s handy as a north star.


    ### Take the time to set up your development environment


    Use a good IDE (integrated development environment) like Microsoft VSCode or JetBrains
    PyCharm. They are both free and fantastic at spotting errors in your code before
    you do. And it’s well worth the time to set your IDE up before you begin. Spend
    your time worrying about blockchains and not about syntax errors in your code.


    ### Know where to get answers


    Browse and ask questions on the GitHub repository’s *Issues* page. The repository
    has a large community following, so you’re likely to meet others with similar
    problems. And if you encounter errors or bugs, I implore you to open an *Issue*.


    ### Don’t speak Python?


    That’s OK. Python is known for its legibility; it’s a very easy language to transcribe.
    I have seen other programmers (C#, JavaScript, and Rust) do the examples in the
    book on the fly.


    Acknowledgments


    **This book is dedicated to my brother Joshua who always finishes what he starts**.
    A major thanks to


    *   My friend and fellow Bitcoin educator, **Justin Moon**, for helping me clarify
    concepts, test code, and provide sound advice when needed.


    *   My friend **Federico Ulfo**, not just for the arduous task of reviewing and
    double-checking my work each week but also for trekking with me to countless Bitcoin
    and Lightning events and conferences over the last few years.


    *   **Rita Fernando** and **Shivangi Ramachandran** from Apress for believing
    in me and making this book a reality.


    About the Author About the Technical Reviewer


    # 1. Getting Ready for Application Development


    For the unfamiliar, Python is one of the most popular languages. It’s extensively
    used everywhere—from academia and the sciences to large-scale web applications,
    like Instagram. Part of its popularity is due to the plethora of libraries, packages,
    and extensions available for free online as well as ease of reading due to its
    resemblance to pseudocode.


    In this chapter we’ll make sure your computer is properly set up for application
    development and that Python is properly installed. Then, I’ll show you how to
    create a pragmatic Python project and how to install dependencies.


    Python Versions


    Python comes in two flavors: version 2 and version 3\. Version 2 is no longer
    supported by the Python Software Foundation, but it still ships preinstalled on
    most operating systems because it’s used by plenty of internal tools. Another
    complication is that different operating systems install Python in different places
    in the file system. These factors make setting up a development environment tricky.


    We’ll try navigating these obstacles by installing and using tools which help
    us manage Python installations.


    Note


    As a convention, throughout this book, we’ll prefix a terminal command using the
    $ symbol. The output will be shown as plaintext.


    ## Installing Python


    ### Windows installation


    Python.org contains downloadable binaries for Windows. Head over to [`www.python.org/downloads/windows/`](http://www.python.org/downloads/windows/)
    and download the binary for Python 3.8.


    Once downloaded, install Python 3.8, making sure to choose the options to


    *   Uninstall previous versions of Python.


    *   Install the pip (the Python package manager).


    *   Add Python to the PATH (allowing you to execute Python on the command line).


    After installation, to confirm you’ve done everything correctly, open up your
    command line and check Python’s version:


    ```

    C:\Users\dan> python --version

    3.8.3

    ```'
