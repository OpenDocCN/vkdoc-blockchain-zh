- fmt: '# How we’ll be implementing transactions


    We’ll be making some changes to our funcoin node; specifically, we must figure
    out how transactions propagate across our network. The way that p2p networks are
    structured is crucial to the reliability of a cryptocurrency. Bitcoin is considered
    a “push” network: instead of a node querying its peers for new transactions, a
    node *pushes* a new transaction to all its peers when it receives one. Loosely
    speaking, when a new node joins a network, it should create a *gossip* effect
    whereby peers of peers learn about its presence and can reliably send it future
    transactions.


    A transaction has a simple data structure, containing


    ![../images/475256_1_En_7_Chapter/475256_1_En_7_Fig1_HTML.jpg](images/475256_1_En_7_Chapter/475256_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Creating a transaction using digital signatures


    1. Sender’s public key

    2. Recipient’s public key

    3. Amount to be transferred

    4. An advertised fee (think “tip,” to incentivize miners to include the transaction
    in their next block)


    In order to send or receive funcoins, we need to generate a wallet—a public-private
    key pair. To send funcoins to Beatrix, Aldo must create a transaction containing
    both his and Beatrix’s public keys and the amount to be sent. The transaction
    is then signed using Aldo’s private key.


    Any peers in the network can validate the transaction as authentic by inspecting
    Aldo’s public key. If the transaction passes validation, then it will later be
    added to the blockchain when a miner includes it.


