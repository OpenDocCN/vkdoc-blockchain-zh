    When our `Blockchain` is instantiated, we’ll need to seed it with a genesis block—a
    block with no predecessors and an index of 0. It’s a special case of a block and
    is almost always hard-coded into software. In Bitcoin, the genesis block was created
    by Satoshi Nakamoto and famously contained the following text (in hex) from a
    front-page article of *The Times* newspaper on 2009-01-03:


