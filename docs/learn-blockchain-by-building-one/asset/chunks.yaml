- fmt: "# 查找你的外部 IP 地址\n\n有一些第三方服务，当你连接它们时，会透露你的外部 IP 地址。这听起来可能很奇怪，但这实际上是比特币节点查找自己外部\
    \ IP 地址的方式。\n\n打开你的终端，让我们用 `cURL` 访问 `ipinfo.io` 服务：\n\n```\ncurl ipinfo.io\n\
    {\n\"ip\": \"72.81.18.117\",\n\"hostname\":  \"XX-XX-XXX-XXX.com\",\n\"city\"\
    :  \"New  York  City\",\n\"region\":  \"New  York\",\n\"country\": \"US\",\n\"\
    loc\": \"41.5143,-73.8060\",\n\"org\": \"AS701 MCI Communications Services, Inc.\
    \ d/b/a Verizon Business\",\n\"postal\": \"10004\",\n\"timezone\": \"America/New_York\"\
    ,\n\"readme\": \"https://ipinfo.io/missingauth\"\n}\n```\n\n注意它显示了我们的外部 IP 地址（`72.81.18.117`）。当我们的节点启动时，让我们在\
    \ `funcoin/utils.py` 中编写一个 Python 方法来实现这一点：\n\n```\nimport aiohttp\nimport structlog\n\
    logger = structlog.getLogger(__name__)\nasync def get_external_ip():\n    async\
    \ with aiohttp.ClientSession() as session:\n        async with session.get('http://ipinfo.io',\
    \ headers={\"user-agent\": \"curl/7.64.1\"}) as response:\n            response_json\
    \ = await response.json(content_type=None)\n            ip = response_json[\"\
    ip\"]\n            logger.info(f\"Found external IP: {ip}\")\n            return\
    \ ip\n```\n\n当我们在 `server.py` 中运行服务器的 `listen()` 方法时，我们可以填充 IP 地址。\n\n```\n1 \
    \ async def listen(self, hostname=\"0.0.0.0\", port=8888):\n2      server = await\
    \ asyncio.start_server(self.handle_connection, hostname, port)\n3      logger.info(f\"\
    Server listening on {hostname}:{port}\")\n\n5      self.external_ip = await self.get_external_ip()\n\
    6      self.external_port = 8888\n\n8      async with server:\n9          await\
    \ server.serve_forever()\nListing 7-9\nfuncoin/server.py\n```\n\n让我们第一次尝试加载服务器：\n\
    \n```\n(venv) $ python node.py\n2020-05-18  02:42.28 Creating genesis block\n\
    2020-05-18 02:42.28 Server listening on 0.0.0.0:8888\n2020-05-18 02:42.28 Found\
    \ external IP: 72.81.18.117\n```\n\n哇，这太棒了！我们的服务器现在正在网络上运行。但是节点无法连接到我们，原因有几个：\n\
    \n1. 你启用了防火墙（除非你非常清楚自己在做什么，否则应该保持启用状态）。\n2. 你的 Wi-Fi 路由器/接入点不会将外部连接转发到你的本地计算机（你很可能正在这里运行它），而且它也不应该这样做（这是一个重大的安全漏洞）。\n\
    3. 网络上的节点无法找到我们，因为到目前为止我们是唯一的节点。\n\n**注意**\n\n上述原因应该清楚地说明构建 p2p 网络有多么困难；除了开放传入互联网流量的安全问题外，播种一个由始终在线节点组成的网络也非常困难。如果你认真对待测试，我建议每月花几美元购买\
    \ AWS EC2 或 DigitalOcean Droplets（推荐），并在一个风险较低的环境中运行节点。\n\n# 8. 与现实世界去中心化网络的比较\n\
    \n恭喜，你已经拥有了一个可工作的节点（并且你是一个 Funcoinaire）。但它与比特币、以太坊、门罗币，或者任何其他现有的区块链有何不同？除了工作量证明之外，还有哪些替代方案？什么是智能合约？在本章中，我们将探讨\
    \ Funcoin 与现实生产区块链之间的差异，并尝试量化它们之间的距离。\n\n## 为什么区块链工程很困难\n\n区块链工程产生了计算机科学领域中最困难的一些问题，主要是因为它们是去中心化的：它们将分布式系统、网络、并发、密码学、经济学和博弈论的概念联系在一起。任何修复错误或缺陷的工作都必须在实时系统的背景下进行，同时不能牺牲可用性。更复杂的是，任何装有新版软件的客户端必须仍然能够验证由旧版软件创建的区块，这导致了一个不断增长的\
    \ `if` 语句列表——这就像在一架满载乘客、正在飞行中的大型喷气式飞机上修复问题一样。\n\n开源软件背后的理念是，任何感兴趣的人都可以贡献修复和改进。从博弈论的角度来看，比特币非常有趣，因为随着时间的推移，随着更多财富投入其中，投资者的警觉目光应该能够更快地对威胁和修复做出反应。但肯定没有多少应用程序像比特币那样高度重视向后兼容性。由于一个错误就可能导致所有财富（在撰写本文时为\
    \ 1200 亿美元）消失，比特币的理念是谨慎行事，在确定某个方案之前获得开发社区的共识，并在合并之前再次仔细检查以确保万无一失。在某些情况下，错误根本不值得修复，因为修复的成本不值得升级带来的麻烦。例如，在比特币中，中本聪本人引入了著名的“时间扭曲漏洞”，该漏洞导致区块的挖掘时间总是略短于\
    \ 10 分钟（而不是 10 分钟）：该算法没有对最近 2016 个区块的挖掘时间进行平均，而是错了一位，查看了最近 2015 个区块。这意味着区块的挖掘难度略高于应有的水平。这被认为不是一个主要问题，但修复它的成本远远超过其带来的好处。\n\
    \n在公有区块链中，变更以两种形式出现：硬分叉和软分叉。硬分叉是当前区块链的分歧。这使得旧客户端无法再理解新客户端遵循的新协议。比特币现金、比特币黄金、比特币\
    \ XT 和比特币经典都是比特币硬分叉的例子。另一方面，软分叉是向后兼容的：由新客户端生成的新区块能够被旧客户端验证。\n\n不要将硬分叉（一种改变共识规则，对不升级的节点造成安全破坏的变更）、软分叉（一种改变共识规则，削弱不升级节点安全性的变更）、软件分叉（当一个或多个开发者永久性地与其它开发者分开单独开发一个代码库时）、Git\
    \ 分叉（当一个或多个开发者临时性地与其它开发者分开单独开发一个代码库时）混淆。\n\n![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig2_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2 一个软分叉\n\n![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig1_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1 一个硬分叉\n\n**注意**\n\n另一种类型的分叉是软件分叉，因为代码库是开源的，没有什么能阻止你“分叉”比特币的代码库成为你自己的。有很多项目定期这样做，其中最著名的是莱特币。"
  raw: '### Finding your external IP address


    There are third-party services which, when you connect to them, will divulge your
    external IP address. This may sound strange, but this is actually how Bitcoin
    nodes find their own external IP addresses.


    Open up your terminal, and let’s use `cURL` to hit the ipinfo.io service:


    ```

    curl ipinfo.io

    {

    "ip": "72.81.18.117",

    "hostname":  "XX-XX-XXX-XXX.com",

    "city":  "New  York  City",

    "region":  "New  York",

    "country": "US",

    "loc": "41.5143,-73.8060",

    "org": "AS701 MCI Communications Services, Inc. d/b/a Verizon Business",

    "postal": "10004",

    "timezone": "America/New_York",

    "readme": "https://ipinfo.io/missingauth"

    }

    ```


    Note that it shows me what my external ip is (72.81.18.117). Let’s write a method
    to do this in Python when our node boots up in `funcoin/utils.py` :


    ```

    import aiohttp

    import structlog

    logger = structlog.getLogger(__name__)

    async def get_external_ip():

    async with aiohttp.ClientSession() as session:

    async with session.get(''http://ipinfo.io'', headers={"user-agent": "curl/7.64.1"})
    as response:

    response_json = await response.json(content_type=None)

    ip = response_json["ip"]

    logger.info(f"Found external IP: {ip}")

    return ip

    ```


    When we run the `listen()` method of our server in `server.py`, we can populate
    the IP address.


    ```

    1  async def listen(self, hostname="0.0.0.0", port=8888):

    2      server = await asyncio.start_server(self.handle_connection, hostname, port)

    3      logger.info(f"Server listening on {hostname}:{port}")


    5      self.external_ip = await self.get_external_ip()

    6      self.external_port = 8888


    8      async with server:

    9          await server.serve_forever()

    Listing 7-9

    funcoin/server.py

    ```


    Let’s try loading our server for the first time:


    ```

    (venv) $ python node.py

    2020-05-18  02:42.28 Creating genesis block

    2020-05-18 02:42.28 Server listening on 0.0.0.0:8888

    2020-05-18 02:42.28 Found external IP: 72.81.18.117

    ```


    Woah, how awesome is that? Our server is now running on the network. But peers
    won’t be able to connect to us for a couple of reasons:


    1.  You have a firewall enabled (and unless you really know what you’re doing,
    you should keep it enabled).


    2.  Your Wi-Fi router/access point does not forward outside connections to your
    local computer (where you’re probably running this), and nor should it (it’s a
    major security vulnerability).


    3.  Peers on the network have no way of finding us because we’re the only node
    so far.


    Note


    The preceding reasons should paint a stark picture of how difficult building a
    p2p network really is; besides the security problems of opening up incoming Internet
    traffic, it’s also really difficult to seed a network of always-online peers.
    If you’re serious about testing one, I suggest paying a few dollars a month for
    an AWS EC2 or DigitalOcean Droplets (recommended) and running a node in a context
    where there’s little risk in being attacked.


    # 8. Comparisons to Real-World Decentralized Networks


    Congratulations, you’ve got a working node (and you’re a funcoinaire). But how
    different is it to Bitcoin? Or Ethereum? Or Monero? Or any of the flavors out
    there? What alternatives are there to Proof of Work? What are smart contracts?
    In this chapter we’ll explore the differences between funcoin and real production
    blockchains and try to quantify the distance between them.


    ## Why blockchain engineering is hard


    Blockchain engineering gives rise to some of the hardest problems in the realm
    of computer science mainly because they are decentralized: they link together
    concepts from distributed systems, networking, concurrency, cryptography, economics,
    and game theory. And any work done to fix bugs or shortcomings must happen in
    the context of a live system without sacrificing usability. To compound this,
    any client with fresh software must still maintain the ability to validate blocks
    created by the old software, creating an ever-expanding list of *if* statements—it’s
    akin to fixing problems on a jumbo jet while the jet is in mid-flight and loaded
    with passengers.


    Behind open source software is the idea that fixes and changes are contributed
    by anybody interested. Bitcoin is interesting from a game theoretical point of
    view because over time, as more wealth is invested into it, the ever-watchful
    eyes of the invested should be able to react faster to threats and fixes. But
    there are certainly not as many applications that place such a heightened importance
    on backward compatibility as Bitcoin. Since a single mistake could cause all that
    wealth (at the time of writing, $120 billion dollars) to disappear, Bitcoin’s
    philosophy is to tread carefully and gain the consensus of the dev community before
    doubling down on things, quadruple-checking them once more for good measure before
    merging them. And in some circumstances, bugs just aren’t worth fixing since the
    cost of the fix simply isn’t worth the hassle of the upgrade. As an example, in
    Bitcoin, Satoshi himself introduced the well-known time warp bug which causes
    blocks to always be mined slightly short of 10 minutes (instead of 10 minutes):
    instead of averaging the time spent mining the last 2016 blocks, the algorithm
    is off by one and looks at the last 2015 blocks. This means that blocks are slightly
    more difficult to mine than they should be. It’s not considered a major problem,
    but the cost of fixing it well outweighs the benefits.


    In public blockchains, changes arrive in one of two flavors: hard forks and soft
    forks. Hard forks are divergences from the current block chain. This makes old
    clients no longer able to understand the new protocol followed by new clients.
    Bitcoin Cash, Bitcoin Gold, Bitcoin XT, and Bitcoin Classic are all examples of
    hard forks of Bitcoin. On the other hand, soft forks are backward-compatible:
    new blocks, generated by new clients, are able to be validated by old clients.


    Not to be confused with hard fork (a change in consensus rules that breaks security
    for nodes that don’t upgrade), soft fork (a change in consensus rules that weakens
    security for nodes that don’t upgrade), software fork (when one or more developers
    permanently develops a codebase separately from other developers), and git fork
    (when one or more developers temporarily develops a codebase separately from other
    developers).


    ![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig2_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    A soft fork


    ![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig1_HTML.jpg](images/475256_1_En_8_Chapter/475256_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    A hard fork


    Note


    Another type of fork is a software fork, since codebases are open sourced, nothing
    is preventing you from “forking” Bitcoin’s codebase into your own. There are plenty
    of projects that regularly do this, the most notable of which is Litecoin.'
