    这里的思路是`new_block`方法负责创建区块并将其添加到链中。我们的`Blockchain`类将负责维护区块链所需的所有操作。让我们开始充实其中一些方法。


    #### 支持交易


    在本书后面的章节中，交易将占据整整一章。它们涉及大量密码学知识，并且包含数字签名。开始时，我们的区块链将支持简单的未签名交易——仅用于说明目的——因此我们将创建一个名为`new_transaction`的方法：


