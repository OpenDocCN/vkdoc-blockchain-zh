    \ json\n2  from time import time\n3  \n4  from marshmallow import Schema, fields,\
    \ validates_schema, ValidationError\n5  \n6  \n7  class Transaction(Schema):\n\
    8      timestamp = fields.Int()\n9      sender = fields.Str()\n10     receiver\
    \ = fields.Str()\n11     amount = fields.Int()\n12     signature = fields.Str()\n\
    13  \n14     class Meta:\n15         ordered = True\n16  \n17  \n18  class Block(Schema):\n\
    19      mined_by = fields.Str(required=False)\n20      transactions = fields.Nested(Transaction(),\
    \ many=True)\n21      height = fields.Int(required=True)\n22      target = fields.Str(required=True)\n\
    23      hash = fields.Str(required=True)\n24      previous_hash = fields.Str(required=True)\n\
    25      nonce = fields.Str(required=True)\n26      timestamp = fields.Int(required=True)\n\
    27  \n28      class Meta:\n29          ordered = True\n30  \n31      @validates_schema\n\
    32      def validate_hash(self, data, **kwargs):\n33          block = data.copy()\n\
    34          block.pop(\"hash\")\n35  \n36          if data[\"hash\"] != json.dumps(block,\
    \ sort_keys=True):\n37              raise ValidationError(\"Fraudulent block:\
    \ hash is wrong\")\n38  \n39  \n40  class Peer(Schema):\n41      ip = fields.Str(required=True)\n\
    42      port = fields.Int(required=True)\n43      last_seen = fields.Int(missing=lambda:\
    \ int(time()))\n```\n\n*代码清单 7-7*\n*funcoin/schema.py*\n\n在代码中，我们实现了 `Peer`、`Block`\
    \ 和 `Transaction` 三个类。\n\n在 `Transaction` 中，我们包含了一个名为 `validate_signature` 的验证方法。它通过\
    \ `@validates_schema` 装饰器进行标记——这是一个特殊的装饰器，用于指示 Marshmallow 应该在验证过程中运行此函数。这就是我们验证交易的地方：在反序列化时，确保我们反序列化的*任何*交易都是*始终*有效的。\n\
    \n在 `Block` 中，我们也实现了一个验证方法，以确保*任何*消息中包含的*任何*区块都是始终有效的。\n"
- fmt: '### Defining the Messages (and Their Schema)


    在`funcoin/messages.py`中，我们将实现各种消息及其模式（schema），然后对它们进行测试以确保一致性。这些是我们要实现的类：


    *   `PeersMessage`

    *   `BlockMessage`

    *   `TransactionMessage`

    *   `PingPayload`

    *   `PingMessage`

    *   `Base`


    请注意，`PeersMessage`的载荷（payload）是一个`Peer`列表；`BlockMessage`的载荷是一个`Block`；`TransactionMessage`的载荷是一个`Transaction`。这就是我们首先在`types.py`中定义它们的原因。


    作为给读者的练习，你可以尝试跳过此处，自行定义每条消息的模式。


    以下是完成后它们应有的样子。


    ```python

    1  from marshmallow import Schema, fields, post_load

    2  from marshmallow_oneofschema import OneOfSchema

    4  from funcoin.schema import Peer, Block, Transaction, Ping

    7  class PeersMessage(Schema):

    8      payload = fields.Nested(Peer(many=True))

    10      @post_load

    11      def add_name(self, data, **kwargs):

    12          data["name"] = "peers"

    13          return data

    16  class BlockMessage(Schema):

    17      payload = fields.Nested(Block)

    19      @post_load

    20      def add_name(self, data, **kwargs):

    21          data["name"] = "block"

    22          return data

    25  class TransactionMessage(Schema):

    26      payload = fields.Nested(Transaction)

    28      @post_load

    29      def add_name(self, data, **kwargs):

    30          data["name"] = "transaction"

    31          return data

    34  class PingMessage(Schema):

    35      payload = fields.Nested(Ping)

    37      @post_load

    38      def add_name(self, data, **kwargs):

    39          data["name"] = "ping"

    40          return data

    43  class MessageDisambiguation(OneOfSchema):

    44      type_field = "name"

    45      type_schemas = {

    46          "ping": PingMessage,

    47          "peers": PeersMessage,

    48          "block": BlockMessage,

    49          "transaction": TransactionMessage,

    50      }

    51      def get_obj_type(self, obj):

    52        if isinstance(obj, dict):

    53            return obj.get("name")

    55  class MetaSchema(Schema):

    56      address = fields.Nested(Peer())

    57      client = fields.Str()

    60  class BaseSchema(Schema):

    61      meta = fields.Nested(MetaSchema())

    62      message = fields.Nested(MessageDisambiguation())

    65  def meta(ip, port, version="funcoin-0.1"):

    66      return {

    67          "client": version,

    68          "address": {

    69              "ip": ip,

    70              "port": port

    71          },

    72      }

    75  def create_peers_message(external_ip, external_port, peers):

    76      return BaseSchema().dumps({

    77          "meta": meta(external_ip, external_port),

    78          "message": {

    79              "name": "peers",

    80              "payload":  peers

    81          }

    82      }

    83      )

    86  def create_block_message(external_ip, external_port, block):

    87      return BaseSchema().dumps({

    88          "meta": meta(external_ip, external_port),

    89          "message": {

    90              "name": "block",

    91              "payload": block

    92          }

    93      }

    94      )

    96  def create_transaction_message(external_ip, external_port, tx):

    97      return BaseSchema().dumps(

    98          {

    99              "meta": meta(external_ip, external_port),

    100             "message": {

    101                 "name": "transaction",

    102                 "payload": tx,

    103             },

    104         }

    105     )

    ```


    Listing 7-8: `funcoin/messages.py`


    请注意，我们还包含一些辅助函数来创建消息。例如，在第89行，我们包含了`create_block_message`，它生成一个包含区块的消息。让我们针对一个区块来测试它：


    ```python

    some_block = {

    "mined_by": "some public key",

    "transactions":   [],

    "height": 123,

    "difficulty": 10,

    "hash": "some fake hash", "previous_hash":  0,

    "nonce":  23,

    "timestamp":  238778621,

    }

    ```


    如你所见，这不是一个有效的区块；让我们尝试将它加载到`Block()`验证器中：


    ```python

    Block().load(some_block)

    marshmallow.exceptions.ValidationError: {''transactions'': {''_schema'': [''Invalid
    input type.'']}, ''previous_hash'': [''Not a valid string.''], ''nonce'': [''Not
    a valid string.'']}

    ```


    如你所见，`marshmallow`的描述性相当强，它准确告诉我们区块存在的问题。让我们修复这些问题后再次尝试：


    ```python

    some_block = {

    "mined_by": "some public key",

    "transactions": [],

    "height": 123,

    "difficulty": 10,

    "hash": "some fake hash",

    "previous_hash":  0,

    "nonce":  23,

    "timestamp":  238778621,

    }

    Block().load(some_block)

    ValidationError: {''_schema'': [''Fraudulent block: hash is wrong'']}

    ```


    如你所见，`marshmallow`运行了我们的验证函数，该函数正确地判断出我们那个“some fake hash”哈希值显然是错误的。让我们再次尝试：


    ```python

    some_block = {

    "mined_by": "some public key",

    "height": 123,

    "difficulty": 10,

    "previous_hash": "some previous hash",

    "nonce": "213",

    "timestamp": 238778621,

    "hash": "a52bfa60bc4ad3d3e9571eab8b28370166f2476e0f1026df219bec07a0a9e2e7"

    }

    # Passes validation by not throwing an exception

    Block().load(some_block)

    ```


    现在，我们可以使用辅助方法来生成消息：


    ```python

    from funcoin.messages import create_block_message

    some_block = {

    "mined_by": "some public key",

    "height":  123,

    "difficulty": 10,

    "previous_hash": "some previous hash",

    "nonce":  "213",

    "timestamp":  238778621,

    "hash": "a52bfa60bc4ad3d3e9571eab8b28370166f2476e0f1026df219bec07a0a9e2e7"

    }

    message = create_block_message(some_block, "127.0.0.1", 8888)

    ```


    现在，我们可以将`message`发送给我们的对等节点，从而完整地充实`funcoin/peers.py`模块。


    ## 整合所有内容


    在我们能够运行节点之前，还有一些准备工作要做：


    1.  我们需要找到一种方法来定位我们的外部IP地址，即对外部世界可见的IP地址。

    2.  找到一种在节点启动时“引导”对等节点的方法：毕竟，我们需要构建一个网络。

    3.  决定我们的节点是否要成为矿工；如果是，我们需要指示它开始挖矿（并在挖到一个区块时将其传播给我们的对等节点）。


    让我们依次处理上述要点。'
  raw: '### Defining the messages (and their schema)


    In `funcoin/messages.py` we’ll implement the various messages and their schemas,
    then we’ll test them to ensure they’re consistent. These are the classes we’ll
    be implementing:


    *   `PeersMessage`


    *   `BlockMessage`


    *   `TransactionMessage`


    *   `PingPayload`


    *   `PingMessage`


    *   `Base`


    Note that the payload for `PeersMessage` is a list of `Peer`; the payload for
    `BlockMessage` is a `Block,` and the payload for `TransactionMessage` is a `Transaction`.
    This is why we defined them in `types.py` first.


    As an exercise to the reader, you may want to skip ahead and try defining the
    schema for each message on your own.


    Here’s what they should look like when you’re done.


    ```

