- fmt: "### Using Marshmallow to validate our messages\n\nWe’ll now use the `marshmallow`\
    \ library to validate our messages. Our server performs two actions: reading messages\
    \ and sending messages. When the server receives a message, that message arrives\
    \ as a JSON string. It must then be transformed to a Python dictionary and validated;\
    \ this process is called deserialization, since we’re going from a serialized\
    \ form (JSON) to a native Python `dict`. Serialization works the opposite: to\
    \ go from a `dict` to a JSON string. In summary\n\n1. Server reads messages being\
    \ sent by peers (deserialize: json → dict).\n2. Server sends messages to peers\
    \ (serialize: dict → json).\n\nFor each object we want to validate, Marshmallow\
    \ requires us to define a *schema*. Here’s what the schema for a `peer` object\
    \ looks like:\n\n```python\nfrom marshmallow import Schema, fields\nclass Peer(Schema):\n\
    \    ip = fields.Str(required=True)\n    port = fields.Int(required=True)\n  \
    \  last_seen = fields.Int(missing=lambda: int(time()))\n```\n\nNotice that we\
    \ specify the type of each field. When Marshmallow receives a JSON object, it\
    \ will throw an error if one of the fields doesn’t match their specified type,\
    \ saving us a ton of time and effort. Here’s an example of a serialized JSON string\
    \ sent to our server:\n\n```python\npayload = \"{'ip': '192.168.0.1', 'port':\
    \ 8888, 'last_seen': 1589780748}\"\n```\n\nWe can now ask Marshmallow to deserialize\
    \ it:\n\n```python\nresult = Peer().loads(payload)\n#  {'last_seen': 1589780748,\
    \ 'ip': '192.168.0.1', 'port': 8888}\n```\n\nIf one of the fields were incorrect,\
    \ or failed to validate, Marshmallow would go through a `ValidationError`.\n\n\
    Let’s try serializing the result:\n\n```python\nserialized = Peer().dumps(some_payload)\n\
    # \"{'last_seen': 1589780748, 'ip': '192.168.0.1', 'port': 8888}\"\n```\n\nIf\
    \ you’re still unsure how Marshmallow works, or why it saves us a lot of hassle,\
    \ it’s worthwhile to check out the documentation, as they offer tons of examples\
    \ on their website: [`https://marshmallow.readthedocs.io`](https://marshmallow.readthedocs.io)\n\
    \n**Note**\n\nA common theme in most serialization libraries is to stick with\
    \ `loads` and `dumps` as method names: `loads` deserializes from a string; `load`\
    \ deserializes from an object; `dumps` serializes to a string; `dump` serializes\
    \ to an object.\n\n### Implementing and validating types\n\nLet’s create three\
    \ new files, `funcoin/types.py`, `funcoin/messages.py`, and `funcoin/utils.py`,\
    \ to house our `types`, `messages`, and additional helper functions, respectively.\
    \ Your folder structure should look like so:\n\n```\n.\n├── funcoin\n│     ├──\
    \ __init__.py\n│     ├── blockchain.py\n│     ├── connections.py\n│     ├── factories.py\n\
    │     ├── messages.py\n│     ├── peers.py\n│     ├── server.py\n│     ├── transactions.py\n\
    │     ├── types.py\n│     └── utils.py\n├──__init__.py\n├── node.py\n├── poetry.lock\n\
    └── pyproject.toml\n```\n\nLet’s first define the Marshmallow schema in `funcoin/schema.py`.\n\
    \n```python\n1  import json\n2  from time import time\n3  \n4  from marshmallow\
    \ import Schema, fields, validates_schema, ValidationError\n5  \n6  \n7  class\
    \ Transaction(Schema):\n8      timestamp = fields.Int()\n9      sender = fields.Str()\n\
    10     receiver = fields.Str()\n11     amount = fields.Int()\n12     signature\
    \ = fields.Str()\n13  \n14     class Meta:\n15         ordered = True\n16  \n\
    17  \n18  class Block(Schema):\n19      mined_by = fields.Str(required=False)\n\
    20      transactions = fields.Nested(Transaction(), many=True)\n21      height\
    \ = fields.Int(required=True)\n22      target = fields.Str(required=True)\n23\
    \      hash = fields.Str(required=True)\n24      previous_hash = fields.Str(required=True)\n\
    25      nonce = fields.Str(required=True)\n26      timestamp = fields.Int(required=True)\n\
    27  \n28      class Meta:\n29          ordered = True\n30  \n31      @validates_schema\n\
    32      def validate_hash(self, data, **kwargs):\n33          block = data.copy()\n\
    34          block.pop(\"hash\")\n35  \n36          if data[\"hash\"] != json.dumps(block,\
    \ sort_keys=True):\n37              raise ValidationError(\"Fraudulent block:\
    \ hash is wrong\")\n38  \n39  \n40  class Peer(Schema):\n41      ip = fields.Str(required=True)\n\
    42      port = fields.Int(required=True)\n43      last_seen = fields.Int(missing=lambda:\
    \ int(time()))\n```\n\n*Listing 7-7*\n*funcoin/schema.py*\n\nIn the code, we implement\
    \ `Peer`, `Block`, and `Transaction`.\n\nIn `Transaction`, we include a validation\
    \ method called `validate_signature`. It is decorated with `@validates_schema`—a\
    \ special decorator indicating that Marshmallow should run this function as part\
    \ of its validation process. This is where we’ll validate a transaction: at the\
    \ point of deserialization to ensure that *any* transaction we deserialize is\
    \ *always* valid.\n\nIn `Block`, we too implement a validation method to ensure\
    \ that any block contained in *any* message is always valid."
  raw: '### Using Marshmallow to validate our messages


    We’ll now use the `marshmallow` library to validate our messages. Our server performs
    two actions: reading messages and sending messages. When the server receives a
    message, that message arrives as a JSON string. It must then be transformed to
    a Python dictionary and validated; this process is called deserialization, since
    we’re going from a serialized form (JSON) to a native Python `dict`. Serialization
    works the opposite: to go from a `dict` to a JSON string. In summary


    1.  Server reads messages being sent by peers (deserialize: json → dict).


    2.  Server sends messages to peers (serialize: dict → json).


    For each object we want to validate, Marshmallow requires us to define a *schema*.
    Here’s what the schema for a `peer` object looks like:


    ```

    from marshmallow import Schema, fields

    class Peer(Schema):

    ip = fields.Str(required=True)

    port = fields.Int(required=True)

    last_seen = fields.Int(missing=lambda: int(time()))

    ```


    Notice that we specify the type of each field. When Marshmallow receives a JSON
    object, it will throw an error if one of the fields doesn’t match their specified
    type, saving us a ton of time and effort. Here’s an example of a serialized JSON
    string sent to our server:


    ```

    payload = "{''ip'': ''192.168.0.1'', ''port'': 8888, ''last_seen'': 1589780748}"

    ```


    We can now ask Marshmallow to deserialize it:


    ```

    result = Peer().loads(payload)

    #  {''last_seen'': 1589780748, ''ip'': ''192.168.0.1'', ''port'': 8888}

    ```


    If one of the fields were incorrect, or failed to validate, Marshmallow would
    go through a `ValidationError`.


    Let’s try serializing the result:


    ```

    serialized = Peer().dumps(some_payload)

    # "{''last_seen'': 1589780748, ''ip'': ''192.168.0.1'', ''port'': 8888}"

    ```


    If you’re still unsure how Marshmallow works, or why it saves us a lot of hassle,
    it’s worthwhile to check out the documentation, as they offer tons of examples
    on their website: [`https://marshmallow.readthedocs.io`](https://marshmallow.readthedocs.io)


    Note


    A common theme in most serialization libraries is to stick with `loads` and `dumps`
    as method names: `loads` deserializes from a string; `load` deserializes from
    an object; `dumps` serializes to a string; `dump` serializes to an object.


    ### Implementing and validating types


    Let’s create three new files, `funcoin/types.py`, `funcoin/messages.py,` and `funcoin/utils.py,`
    to house our `types`, `messages,` and additional helper functions, respectively.
    Your folder structure should look like so:


    ```

    .

    ├── funcoin

    │     ├── __init__.py

    │     ├── blockchain.py

    │     ├── connections.py

    │     ├── factories.py

    │     ├── messages.py

    │     ├── peers.py

    │     ├── server.py

    │     ├── transactions.py

    │     ├── types.py

    │     └── utils.py

    ├──__init__.py

    ├── node.py

    ├── poetry.lock

    └── pyproject.toml

    ```


    Let’s first define the Marshmallow schema in `funcoin/schema.py`.


    ```

    1  import json

    2  from time import time


    4  from marshmallow import Schema, fields, validates_schema, ValidationError


    7  class Transaction(Schema):

    8      timestamp = fields.Int()

    9      sender = fields.Str()

    10      receiver = fields.Str()

    11      amount = fields.Int()

    12      signature = fields.Str()


    14      class Meta:

    15          ordered = True


    18  class Block(Schema):

    19      mined_by = fields.Str(required=False)

    20      transactions = fields.Nested(Transaction(), many=True)

    21      height = fields.Int(required=True)

    22      target = fields.Str(required=True)

    23      hash = fields.Str(required=True)

    24      previous_hash = fields.Str(required=True)

    25      nonce = fields.Str(required=True)

    26      timestamp = fields.Int(required=True)


    28      class Meta:

    29          ordered = True


    31      @validates_schema

    32      def validate_hash(self, data, **kwargs):

    33          block = data.copy()

    34          block.pop("hash")


    36           if data["hash"] != json.dumps(block, sort_keys=True):

    37               raise ValidationError("Fraudulent block: hash is wrong")


    40  class Peer(Schema):

