- fmt: "#### The solution\n\nThe overall idea is for Alice and Bob to agree on a shared\
    \ secret beforehand. Alice then removes the secret phrase from the message, and\
    \ sends it to Bob with the hash. Bob then performs the same procedure as Alice:\
    \ he appends the pre-shared secret phrase and outputs a hash. If the hash isn’t\
    \ the same as the one Alice sent, he’ll know that the message has been tampered\
    \ with.\n\nTo summarize:\n\n1. Alice and Bob both share a secret phrase `S`.\n\
    2. Alice then creates a hash `H` of the message `M` with the secret appended to\
    \ the end of the message: `H = hash(M + S)`.\n3. Alice sends `H` and `M` to Bob\
    \ (the message and the computed hash).\n4. Bob checks the message integrity by\
    \ calculating `H` himself to see if it’s the same as the hash Alice advertised.\n\
    \n**Note**  \nThis general scheme describes a range of protocols called HMAC (Hashed\
    \ Message Authentication Code) and is described by IETF RFC 2104.\n\nLet’s look\
    \ at an example. Before Alice and Bob begin communicating, they both agree on\
    \ a secret password, `bolognese`. Alice formulates her email using the given scheme.\
    \ Here’s what it looks like when Bob receives it:\n\n```\nFrom:  alice@example.com\n\
    Subject: Have you heard about Bitcoin?\nHey Bob,I think you should learn about\
    \ Blockchains! I've been investing in Bitcoin and currently have exactly 12.03\
    \ BTC in my account.\nhash: 71890dc61c21370874d2a7b74064396cb613a1924f09aa06925abc7842e6802c\n\
    ```\n\nBob notices that Alice has included the hash in the body of the email.\
    \ He strips the hash then appends the secret phrase (`bolognese`) to the body\
    \ of the email and computes the hash of it. If the hash matches the included hash\
    \ in the body of the email, then he can conclude that the message hasn’t been\
    \ tampered with (and Alice does in fact have 12.03 BTC).\n\nIt’s important that\
    \ Alice and Bob both know the protocol that they’ll be using for verification.\
    \ This includes the hash function to be used (`sha256`) and where to put the secret\
    \ phrase in the context of the message (they agree to append it to the end), and\
    \ any other data that may further secure the scheme (such as a timestamp).\n\n\
    Let’s look at how Bob may verify Alice’s message in Python.\n\n```python\nfrom\
    \ hashlib import sha256\nsecret_phrase = \"bolognese\"\ndef get_hash_with_secret_phrase(input_data,\
    \ secret_phrase):\ncombined = input_data + secret_phrase\nreturn sha256(combined.encode()).hexdigest()\n\
    email_body = \"Hey Bob, I think you should learn about Blockchains! \" \\\n\"\
    I've been investing in Bitcoin and currently have exactly 12.03 BTC in my  account.\"\
    \nprint(get_hash_with_secret_phrase(email_body,  secret_phrase))\n```\n\nWhen\
    \ Bob runs this code, he’ll be able to verify Alice’s hash.\n\n## How preventing\
    \ spam led to proofs of work\n\nDid you know that hash functions can be used to\
    \ prevent email spam? The algorithm behind this idea is called a “Proof-of-Work”\
    \ algorithm, and it forms the core of Bitcoin. It was invented by British cryptographer\
    \ Adam Back in 1997, he called it Hashcash.\n\nThe general idea is to only accept\
    \ emails whose hashes satisfy a constraint. This causes the sender of the email\
    \ to perform some sort of computational work before sending an email. In other\
    \ words, it becomes expensive for the sender to spam people.\n\nBut what is the\
    \ constraint? Hashes are just numbers, but they are seemingly random, so we can\
    \ apply any constraint we want. I could make the rule that anyone sending me an\
    \ email must provide a hash of the email that is an odd number. But this wouldn’t\
    \ be a good constraint because a sender would have a 50% of generating an odd\
    \ hash.\n\nThe Hashcash algorithm applies the constraint that a hash value must\
    \ be lower than a certain number. This sounds deceivingly simple, but think about\
    \ this for a moment: since cryptographic hash functions output a random number\
    \ for a given input, how could we ensure that an email body hashed to a certain\
    \ number? We can’t. The only thing we can do is insert arbitrary data into the\
    \ email body and keep trial-and-erroring until our hash satisfies the constraint.\n\
    \nLet’s look at an example, and let’s also make the constraint that the email\
    \ body should hash to a number lower than 10,000.\n\n**Note**  \nI’m using an\
    \ eight-digit hash function that only outputs decimal numbers here for the sake\
    \ of simplicity.\n\n```\nfrom: dan@example.com\nsubject: Buy  Bitcoins!\nHey Ethan,I\
    \ think you should buy some Bitcoins!\nhash: 95119035\n```\n\n**No.** The hash\
    \ of the body of this email is `95119035`, which isn’t less than `10,000`. Thus,\
    \ the sender has not done the work required: he must ensure that the hash of the\
    \ email body satisfies the constraint.\n\nOne way the sender can do this is by\
    \ inserting arbitrary data in the email body:\n\n```\nfrom: dan@example.com\n\
    subject: Buy  Bitcoins!\nHey Ethan, I think you should buy some Bitcoins!\ns8763ASdh727212213098\n\
    hash: 00000891\n```\n\nNow we see that the hash of the body is `891`, satisfying\
    \ our constraint! (I’ve padded the hash with 0s because hexadecimal numbers are\
    \ usually shown this way). Our email server will hash the body of the email and\
    \ see that it is indeed `891` and will accept the email.\n\nThis is what proof\
    \ of work is: the work is proven by displaying a particular hash, and the server\
    \ can easily verify it. Another way to think about this scheme is that it is something\
    \ that is difficult to generate but easy to verify.\n\n**Note**  \nThis is the\
    \ critical idea that allows any proof-of-work blockchain to generate (or mine)\
    \ money by proving unequivocally that computational work was done to everyone\
    \ on the network. The energy is consumed by exploiting the seemingly random nature\
    \ of cryptographic hashes!\n\n## Summary\n\nAt this point, you should be practically\
    \ familiar with hashing functions and how to hash arbitrary data. To summarize,\
    \ you should be comfortable:\n\n1. Importing the `hashlib` library in Python\n\
    2. Hashing any data structure or binary file in Python\n3. Understanding that\
    \ cryptographic hashing functions are unfeasibly difficult to reverse\n\n*Still\
    \ don’t get the gist of it?*\n\nThat’s OK. This stuff is hard. If you’re still\
    \ uncertain about hashing, it’s worthwhile to pause here and review this chapter\
    \ again until it sinks in. It’s arguably the most important aspect of the blockchain\
    \ data structure, and one we’ll use extensively going forward.\n\n# 3. Blockchains\n\
    \nIn this chapter, we’ll dive headfirst into blockchains by using simple data\
    \ types in Python. You’ll leave this chapter with a fundamental understanding\
    \ of what a blockchain is, what’s inside them, and how hashes are used to make\
    \ them resilient.\n\nThe concepts of the previous chapter are crucial to understanding\
    \ why blockchains are considered immutable (read untamperable). We’ve already\
    \ seen how to send untamperable emails. We’ll extend those ideas to build a blockchain\
    \ from the ground up and, with a clear understanding of the data structures involved,\
    \ show why fraud is impossible on a blockchain.\n\nLet’s dive in."
