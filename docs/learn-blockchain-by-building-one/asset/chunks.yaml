- fmt: '### Installing dependencies


    One of the most popular Python libraries is the `requests` library, which allows
    us to make easy HTTP requests. Let’s install it:


    ```

    $ poetry add requests

    Creating virtualenv my-project-py3.8 in /Users/dvf/Library/Caches/pypoetry/virtualenvs
    Using version ^2.22 for requests

    Updating dependencies

    Resolving dependencies... (0.7s)

    Writing lock file

    Package  operations:  14  installs, 0 updates, 0 removals

    - Installing  more-itertools  (7.2.0)

    - Installing zipp (0.6.0)

    - Installing importlib-metadata (0.23)

    - Installing atomicwrites (1.3.0)

    - Installing attrs (19.3.0)

    - Installing certifi (2019.9.11)

    - Installing chardet (3.0.4)

    - Installing idna (2.8)

    - Installing pluggy (0.13.0)

    - Installing py (1.8.0)

    - Installing six (1.12.0)

    - Installing urllib3 (1.25.6)

    - Installing pytest (3.10.1)

    - Installing requests (2.22.0)

    ```


    Using the syntax `poetry add requests` caused a number of things to happen:


    1. A “virtual environment” (virtualenv) was created at `/Users/dvf/Library/Caches/pypoetry/virtualenvs/my-project-py3.8`.
    A virtualenv is a folder containing a Python interpreter and packages for your
    project, so as not to pollute the rest of your system.


    2. The latest version of `requests` (2.22.0) was downloaded from Python’s Package
    Index at [`https://pypi.org`](https://pypi.org).


    3. All the dependencies that `requests` depend on were downloaded too. These are
    called sub-dependencies.


    4. All the downloaded packages were installed to your project’s virtualenv.


    We’re now ready to begin building and interacting with our dependencies.


    ## Activating the virtualenv


    Before you can run your project, you need to activate the virtualenv. That is,
    tell your computer to use the Python interpreter located in the virtualenv that
    Poetry manages.


    First, let’s inspect which Python interpreter we’re using:


    ```

    $ which python

    /usr/local/bin/python

    ```


    Let’s activate the virtualenv:


    ```

    $ poetry shell

    Spawning shell within /Users/dvf/Library/Caches/pypoetry/virtualenvs/my-project-py3.8

    ```


    And now, let’s verify that the Python interpreter we’re using is the one in Poetry’s
    virtualenv:


    ```

    $ which python

    /Users/dvf/Library/Caches/pypoetry/virtualenvs/my-project-py3.8/bin/python

    ```


    Running into Problems?


    If you’re running into a problem, then you should take care to close and reopen
    your terminal and follow the instructions carefully from the beginning of this
    chapter. If you’re still stuck, then there’s likely an issue with your `PATH`
    variable.


    I suggest carefully reading Poetry’s documentation to make sure you’ve followed
    all the steps, since it’s likely that the software may have changed since the
    publication of this book.


    ## Example: Getting the Bitcoin price


    Let’s get our feet wet by creating some code that fetches the current Bitcoin
    spot price from an exchange.


    First, create a file called `current_price.py` in `my-project/my_project`. Your
    folder structure should look as follows:


    ```

    .

    ├── README.rst

    ├── my_project

    │  ├── __init__.py

    │  └── current_price.py

    ├── pyproject.toml

    └── tests

    ├── __init__.py

    └── test_my_project.py

    ```


    We’ll use the `requests` library we just installed to get the price in US dollars.
    Enter the following code in `current_price.py`:


    ```

    import requests

    response = requests.get("https://api.coinbase.com/v2/prices/spot?currency=USD")

    print(response.text)

    ```


    OK, save your file. Let’s run it:


    ```

    $ poetry run python my_project/current_price.py

    {"data":{"base":"BTC","currency":"USD","amount":"9161.25"}}

    ```


    In the preceding command, note the `poetry run...` part. This is a shortcut for
    enabling the virtualenv and running the rest of the command inside of it. Equivalently,
    you could enable the virtualenv by using `poetry shell` and then running the command.


    If you scrutinize the output, you’ll see the price as `$9161.25`.


    ## Summary


    In conclusion, we’ve covered


    1. Installing a fresh Python 3.8 interpreter on your machine


    2. Using Poetry to create and install dependencies for a new project (which we’ll
    start doing in each chapter going forward)


    3. Grabbing the latest Bitcoin price by making an API call using the `requests`
    library


    Now that you’re set up with a project structure, we’re ready to dive in and start
    learning by doing.


    # 2. A Way to Identify Everything


    If you’re interested in blockchains and cryptocurrencies, then you’ve probably
    heard of hashing (or hashes). The idea of hashing is crypto-bedrock—a crucial
    ingredient in blockchain infrastructure. In this chapter you’ll gain a working
    knowledge of hashing and why it’s so important.


    ## Project setup


    In the spirit of learning by doing, we’re going to create a new project which
    we’ll build upon incrementally, chapter by chapter. We’ll call it `funcoin`:


    ```

