- fmt: '# Example 1: Hashing in Python


    Python ships with the standard stash of popular hash functions; they are available
    in the `hashlib` library. Let’s fire up Python and start playing with them.


    ```

    import hashlib

    # Hash functions expect bytes as input: the encode() method turns strings to bytes

    input_bytes = b"backpack"

    output = hashlib.sha256(input_bytes)

    # We use hexdigest() to convert bytes to hex because it''s easier to read

    print(output.hexdigest())

    ```


    What was the output that you got? It should’ve been:


    ```

    5f00368a6ad231c3c439c4f6bc33c27014b4d35a904ff1656d74f9528636f496

    ```


    Now, try changing one of the letters in `"backpack"` to uppercase. Try adding
    a space to the end. Play around with the input each time. Have you noticed that
    the resulting hashes are *completely* different? Good. Then you’ve just discovered
    the *avalanche* property: minor changes in input yield large changes in output.


    Typically, hash functions are considered **cryptographic** if they satisfy the
    following properties:


    - **Deterministic:** The same input always yields the same hash.

    - **Intractability:** It’s infeasible to find the input for a given hash except
    by exhaustion (trying a gargantuan amount of possible inputs).

    - **Collision-safety:** It’s infeasible to find two different inputs which output
    the same hash.

    - **Avalanche effect:** The smallest change in input should yield a hash so different
    that the new hash appears uncorrelated with the old hash.

    - **Speed:** It’s computationally *fast* to generate a hash.


    ## Choice of Hash Function


    Peer-to-peer blockchains make their choice of hash function known in their protocols:
    Bitcoin uses *double* `sha256`, while Ethereum uses `keccak256`. The important
    thing to know is that all of these hash functions do the same thing: they provide
    predictable output for a given input.


    Let’s recap what we’ve learnt so far.


    | Term | Explanation | Example |

    | --- | --- | --- |

    | Hash function | A function that identifies anything you feed into it by outputting
    a gargantuan, random hexadecimal number. This number is *always* the same for
    the same input. | A cryptographic hash function such as `sha256`, `md5`, `blake2b`,
    etc. |

    | Hash/digest | The output of the hash function: a huge, random hexadecimal number.
    | The hash of the word `"dan"`: `ec4f...f1cb` |


    # Example 2: Hashing images


    Here’s an image of a $100 bill.


    ![../images/475256_1_En_2_Chapter/475256_1_En_2_Fig1_HTML.jpg](images/475256_1_En_2_Chapter/475256_1_En_2_Fig1_HTML.jpg)


    The **hash** of this image is `e25641dc52387baba19751783ae4e060`.


    Here’s the same image, with a small modification.


    ![../images/475256_1_En_2_Chapter/475256_1_En_2_Fig2_HTML.jpg](images/475256_1_En_2_Chapter/475256_1_En_2_Fig2_HTML.jpg)


    Can you spot the modification? Maybe, maybe not. Look closer. (I made the word
    `"STATES"` singular.) But here’s the interesting part; if I run this image through
    a hash function, the result is `f4c56f530133b8de6b3b0b39a610be32`. This may not
    seem amazing, but if you compare the two hashes, you’ll notice that they are vastly
    different and seemingly random. I’ll line them up for you:


    ```

    e25641dc52387baba19751783ae4e060

    f4c56f530133b8de6b3b0b39a610be32

    ```


    > **Note:** The breakthrough idea behind Bitcoin is that hashes can be used to
    prove that work was done by a computer—we’ll be exploring this in the upcoming
    chapters, but for now, keep in mind that Bitcoin uses the apparent “randomness”
    of cryptographic hashes.


    Let’s try hashing our own image (or file), in Python.


    ```

    from hashlib import sha256

    file = open("my_image.jpg", "rb")

    hash = sha256(file.read()).hexdigest()

    file.close()

    print(f"The hash of my file is: {hash}")

    ```


    Let’s go through the preceding code and explain it, line by line:


    ```

    from hashlib import sha256

    ```


    This line imports the `sha256` hashing function from the `hashlib` library which
    is included with Python. `sha256` is one of the most popular hashing functions
    (it’s used extensively in Bitcoin).


    Here, we open a file called `my_image.jpg` residing in the same directory as your
    code:


    ```

    file = open("my_image.jpg", "rb")

    ```


    The `"rb"` argument denotes that the file should be in read-only mode, and read
    as bytes.


    ```

    hash = sha256(file.read()).hexdigest()

    ```


    Then we read the opened file into our hash function, like so: `sha256(file.read())`,
    and assign the `hexdigest()`, that is, the output as a hex string, to a variable
    called `hash`.


    Finally, we close the opened file and print the hash to the terminal.


    ## Verifying downloaded files from the Internet


    You can use the above script to verify that a downloaded file has not been tampered
    with by a third party. Reputable websites will advertise what the hash (sometimes
    called a checksum) of the file should be, so that you can verify it locally.


    ## Analogies


    If you’re still in the dark, here’s a real-life analogy to drive the idea home.


    Imagine you’re at the airport, passing through a security check, and you dump
    your backpack on the conveyor belt. But the conveyor belt is equipped with a special
    kind of scanner—a machine that X-rays your belongings and outputs a hash.


    The backpack is scanned, and the scanner pops out an 8-digit hash identifying
    your backpack: `13371817`. If your backpack and all the items in it are exactly
    the same, the scanner will always output the same number. But if you now decide
    to remove an item from your backpack, the scanner will return an entirely different
    number.


    ## Irreversibility


    As we’ve discussed, blockchains make use of **cryptographic** hash functions,
    which are hash functions that are extremely hard to reverse. Meaning, if we’re
    given a hash, it’s unfeasibly difficult (on a supercomputing level) to ever guess
    what the input was.


    In the preceding example, if I gave you the hash `e25641dc52387baba19751783ae4e060`,
    you’d have an extremely difficult time guessing that it was a photograph of a
    $100 bill.


    It’s crucial important to understand this concept, as it forms the basis of what
    secures Bitcoin and blockchains in general. And there are many different hash
    functions with different properties, as we’ll see later.


    # Example 3: Sending untamperable emails


    ## The Problem


    Alice wants to send Bob an email over an insecure channel like the open Internet.
    Bob isn’t interested if other people can read the email, but he wants to ensure
    that it hasn’t been tampered with. How can Bob verify that the email message hasn’t
    been tampered with?


    > **Note:** Before we give a solution, using the hashing knowledge you’ve just
    absorbed, can you think how such a scheme may be devised?'
