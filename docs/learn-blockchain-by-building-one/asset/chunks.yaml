    Listing 7-8

    funcoin/messages.py

    ```


    Note that we also include some helper functions to create the messages, for example,
    on line 89 we include create_block_message which generates a message containing
    a block. Let’s test this given a block:


    ```

    some_block = {

    "mined_by": "some public key",

    "transactions":   [],

    "height": 123,

    "difficulty": 10,

    "hash": "some fake hash", "previous_hash":  0,

    "nonce":  23,

    "timestamp":  238778621,

    }

    ```


    As you can see, this isn’t a valid block; let’s try loading this into the `Block()`
    validator:


    ```

    Block().load(some_block)

    marshmallow.exceptions.ValidationError: {''transactions'': {''_schema'': [''Invalid
    input type.'']}, ''previous_hash'': [''Not a valid string.''], ''nonce'': [''Not
    a valid string.'']}

    ```


    As you can see, Marshmallow is pretty descriptive and tells us exactly what’s
    wrong with the block. Let’s try again, fixing the problems:


    ```

    some_block = {

    "mined_by": "some public key",

    "transactions": [],

    "height": 123,

    "difficulty": 10,

    "hash": "some fake hash",

    "previous_hash":  0,

    "nonce":  23,

    "timestamp":  238778621,

    }

    Block().load(some_block)

    ValidationError: {''_schema'': [''Fraudulent block: hash is wrong'']}

    ```


    As you can see, Marshmallow ran our validation function which correctly determined
    that our hash of “some fake hash” is obviously wrong. Let’s try again:


    ```

    some_block = {

    "mined_by": "some public key",

    "height": 123,

    "difficulty": 10,

    "previous_hash": "some previous hash",

    "nonce": "213",

    "timestamp": 238778621,

    "hash": "a52bfa60bc4ad3d3e9571eab8b28370166f2476e0f1026df219bec07a0a9e2e7"

    }

    # Passes validation by not throwing an exception

    Block().load(some_block)

    ```


    Now, we can use the helper method to generate a message:


    ```

    from funcoin.messages import create_block_message

    some_block = {

    "mined_by": "some public key",

    "height":  123,

    "difficulty": 10,

    "previous_hash": "some previous hash",

    "nonce":  "213",

    "timestamp":  238778621,

    "hash": "a52bfa60bc4ad3d3e9571eab8b28370166f2476e0f1026df219bec07a0a9e2e7"

    }

    message = create_block_message(some_block, "127.0.0.1", 8888)

    ```


    Now we can send `message` to our peers, and thus complete fleshing out the `funcoin/peers.py`
    module.


    ## Bringing it all together


    Before we can run our node, there’s still a bit more handiwork to be done:


    1.  We need to find a way of locating our external IP address, this is the IP
    address that is visible to the outside world.


    2.  Find a way of “bootstrapping” peers to our node when it boots up: after all,
    we need to populate a network.


    3.  Decide if our node is to be a miner; if so, we’ll need to instruct it to begin
    mining (and propagating blocks to our peers when one is found).


    Let’s address the given points sequentially.'
