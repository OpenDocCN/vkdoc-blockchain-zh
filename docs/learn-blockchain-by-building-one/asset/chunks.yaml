    \   break\n83          elif message == \"/list\":\n84              connection_pool.list_users(writer)\n\
    85          else:\n86              connection_pool.broadcast_new_message(writer,\
    \ message)\n\n88          await writer.drain()\n\n90          if writer.is_closing():\n\
    91              break\n\n93      # 我们现在已退出消息循环，用户已退出。让我们进行清理...\n94      writer.close()\n\
    95      await writer.wait_closed()\n96      connection_pool.remove_user_from_pool(writer)\n\
    \n99  async def main():\n100      server = await asyncio.start_server(handle_connection,\
    \ \"0.0.0.0\", 8888)\n\n102      async with server:\n103          await server.serve_forever()\n\
    \n106  connection_pool = ConnectionPool()\n107  asyncio.run(main())\n```\n\n我们在第`72—91`行引入了循环。注意我们是如何将用户输入（第`74`行）包裹在一个\
    \ try-except 块中，以应对用户连接在未通知的情况下断开的情况。然后我们继续处理他们的消息——检查它是 `quit` 还是 `list` 方法——直到我们再次等待进一步的输入。\n\
    \n至此，我们的聊天服务器已完全具备功能。让我们打开两个或三个终端来模拟一个真实的聊天室：\n\n![../images/475256_1_En_5_Chapter/475256_1_En_5_Fig2_HTML.jpg](img/475256_1_En_5_Fig2_HTML.jpg)\n\
    \n**图 5-2** 并排的两个终端，模拟两个用户互相聊天\n\n> **注意**  \n> 把你的计算机 IP 地址给朋友，让他们在你的本地网络上连接到服务器。你也可以把聊天服务器托管在某个网络主机上，并给它一个完整的\
    \ URL，以便互联网上的任何用户都能连接。\n\n对于本演示中展示的概念进行实验和尝试非常重要，因为它们将在本书的目标中发挥关键作用：为我们区块链网络的底层网络层奠定基础。\n\
    \n> **提示**  \n> 完整源代码位于 GitHub 仓库：[`https://github.com/dvf/blockchain-book`](https://github.com/dvf/blockchain-book)。\n"
- fmt: "# Protocols\n\nProtocols are extremely important in the design of p2p networks.\
    \ Protocols are the “rules of the game,” and they’re difficult to design because\
    \ they require long-term foresight and planning. A lack of sound architecture\
    \ produces architectural rifts down the road—problems which require so-called\
    \ “hard forks”; or a change in the underlying protocol of the network. Good planning\
    \ leaves ample room for future impacts, be they technological advances or societal\
    \ changes in the network.\n\nPart of Bitcoin’s success is the simplicity of its\
    \ protocol and the careful consideration of its core developers when making new\
    \ changes. Rifts at the protocol level have often resulted in community-driven\
    \ “hard forks” such as Bitcoin Cash and the myriad of spin-off branches of Bitcoin’s\
    \ blockchain. It’s interesting to study why and when these forks happened because\
    \ they’re almost always the result of disagreements at the protocol level.\n\n\
    With that in mind, let’s look at the chat server that we’ve built and dissect\
    \ its protocol by looking at the “messages” possible. It’s helpful to break these\
    \ down into “user stories”:\n\n*   As a connected user, I may quit by sending\
    \ the message `/quit`.\n*   As a connected user, I may list all connected users\
    \ by sending the message `/list`.\n*   As a connected user, any text (excluding\
    \ the mentioned messages) that I send is broadcast to all connected clients.\n\
    \nOur toy chat server is extraordinarily simple. But by defining the preceding\
    \ protocol, we’re able to make it *generic*; this is crucial because it means\
    \ that *any* client on the Internet, using their own software, only needs to obey\
    \ the protocol to successfully engage with our server.\n\nBy implementing Bitcoin’s\
    \ protocol, developers are able to write their own software to interact with the\
    \ network. They only need to see what kinds of stories and messages are possible\
    \ on the network. The Bitcoin Wiki faithfully serves this information, here: [`https://en.bitcoin.it/wiki/Protocol_documentation`](https://en.bitcoin.it/wiki/Protocol_documentation).\
    \ When you download the software called “Bitcoin Core,” you’re really downloading\
    \ the *reference* implementation of the protocol, designed and maintained by developers\
    \ who devote their free time to Bitcoin.\n\n## Groundwork for building a blockchain\n\
    \nPeer-to-peer networks are made possible by every client on the network collectively\
    \ implementing the decided protocol. As an exercise, pause for a moment and try\
    \ to figure out what messages should be possible in a peer-to-peer network.\n\n\
    Following the advice, it’s helpful to first break our network into user stories\
    \ to help clarify what messages are needed. Let’s define the notion of *connected*\
    \ node to mean a node amply connected to enough other peers to form a network.\
    \ Here are some possible stories:\n\n*   As a *node*, I’m able to connect to peers\
    \ by discovering them.\n*   As a *connected node*, I’m able to publish a list\
    \ of my peers to anyone requesting them.\n*   As a *connected node*, I’m able\
    \ to accept and broadcast a new transaction from a peer.\n*   As a *connected\
    \ node*, I’m able to server the contents of a block to any peer requesting it.\n\
    *   As a *connected node*, I’m able to accept a new block and add it to my blockchain\
    \ if it meets certain criteria.\n\n### Gossip\n\nThe preceding list isn’t exhaustive\
    \ by any means—we haven’t taken into account punitive measures for peers who misbehave\
    \ or formed any sort of resolution when two valid (conflicting) blocks need to\
    \ be added—but for now this is a good basis to build on. But most importantly,\
    \ since there is no central authority, we need a way for a peer to localize the\
    \ network and form a *swarm*.\n\n![../images/475256_1_En_5_Chapter/475256_1_En_5_Fig3_HTML.jpg](images/475256_1_En_5_Chapter/475256_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\n\nA node joining a network for the first time\n\nIn the preceding\
    \ image, a node `U` must acquire a list of other nodes (peers) from `A`, and `A`\
    \ in turn has acquired a list of nodes from his neighbors, `X`, `Y`, and `Z`,\
    \ and must continually “heartbeat” them in order to make sure they’re still “alive”\
    \ on the network. `A` must also announce `U`’s presence to the network and so\
    \ on and so forth. This general scheme is called a gossip protocol, and a successful\
    \ gossip protocol is what makes for a resilient, decentralized network.\n\n# Cryptography\
    \ 101\n\nThe study of the algorithms presented in this chapter are well beyond\
    \ the scope of any book you can find or course you can take. They require years\
    \ of understanding and treatment and build upon algebraic concepts familiar to\
    \ specific fields of mathematics. But luckily theoretical insight into how cryptographic\
    \ algorithms work isn’t a requirement for using these tools in practice, so long\
    \ as you understand their purpose and implications. In other words, a working\
    \ knowledge of how to use cryptographic libraries is what’s important here.\n\n\
    If you’re like me (not a cryptographer), the correct approach to this material\
    \ is that of caution. I understand just enough cryptography to know that it’s\
    \ a lifelong balance—a study of trade-offs between security, convenience, and\
    \ speed—with shifting attack vectors as technology improves. As somebody learning\
    \ this stuff for the first time, you should err on the side of battle-tested,\
    \ well-known best practices and tools. There’s far too much at stake in our digital\
    \ world to take shortcuts—the majority of breaches and attacks on the Internet\
    \ are caused by simple mistakes: using bad implementations of things not quite\
    \ understood or, even worse, personal stamps of approval. There’s an adage in\
    \ the cryptography world: *never roll your own brand of cryptography*.\n\nCryptography\
    \ is the *crypto* in cryptocurrency. And real cryptographers can get annoyed at\
    \ the usage of the word *crypto* to mean cryptocurrency. Signing a check in real\
    \ life is very similar to signing a blockchain transaction—but it’s even more\
    \ secure, because the signature cannot be forged. In fact, it changes depending\
    \ on the document you’re signing!\n\n## Sending messages with integrity\n\nBefore\
    \ we dive into digital signatures and public key cryptography, I want to draw\
    \ on your knowledge of hashing by showing you how they can be used to send unforgeable\
    \ messages over an insecure medium, like the Internet.\n\nNote\n\nNote that this\
    \ example is just a toy example and there are well-built libraries for doing this.\
    \ In fact, the `hmac` library which ships with Python is built for just this purpose.\n\
    \nLet’s say that Alice wants to send a message to Bob. And let’s also say that\
    \ Alice and Bob agree to share a secret password `p@55w0rd` with each other before\
    \ the messages are sent.\n\nAlice creates a message and concatenates it with `p@55w0rd`;\
    \ then she computes a hash of the message:\n\n```\nfrom hashlib import sha256\n\
    message = \"Hello Bob, Let's meet at the Kruger National Park on 2020-12-12 at\
    \ 1pm.\"\nhash_message = sha256((\"p@55w0rd\" + message).encode()).hexdigest()\n\
    ```\n\nThe computed hash is `39aae6ffdb3c0ac1c1cc0f50bf08871a729052cf1133c4c9b44a5bab8fb66211`.\
    \ Alice then sends this message, including the hash to Bob, who will now verify\
    \ that only Alice could’ve sent it:\n\n```\nfrom hashlib import sha256\nalices_message\
    \ = \"Hello Bob, Let's meet at the Kruger National Park on 2020-12-12 at 1pm.\"\
    \nalices_hash = \"39aae6ffdb3c0ac1c1cc0f50bf08871a729052cf1133c4c9b44a5bab8fb66211\"\
    \nhash_message = sha256((\"p@55w0rd\" + alices_message).encode()).hexdigest()\n\
    if hash_message == alices_hash:\n    print(\"Message has not been tampered with\"\
    )\n```\n\nThis is a trivial example of a digital signature to give you a taste\
    \ of how they work. We’ll soon see that the libraries responsible for verifying\
    \ and signing the messages are more robust and don’t require the use of a pre-shared\
    \ key."
  raw: '## Protocols


    Protocols are extremely important in the design of p2p networks. Protocols are
    the “rules of the game,” and they’re difficult to design because they require
    long-term foresight and planning. A lack of sound architecture produces architectural
    rifts down the road—problems which require so-called “hard forks”; or a change
    in the underlying protocol of the network. Good planning leaves ample room for
    future impacts, be they technological advances or societal changes in the network.


    Part of Bitcoin’s success is the simplicity of its protocol and the careful consideration
    of its core developers when making new changes. Rifts at the protocol level have
    often resulted in community-driven “hard forks” such as Bitcoin Cash and the myriad
    of spin-off branches of Bitcoin’s blockchain. It’s interesting to study why and
    when these forks happened because they’re almost always the result of disagreements
    at the protocol level.


    With that in mind, let’s look at the chat server that we’ve built and dissect
    its protocol by looking at the “messages” possible. It’s helpful to break these
    down into “user stories”:


    *   As a connected user, I may quit by sending the message `/quit`.


    *   As a connected user, I may list all connected users by sending the message
    `/list`.


    *   As a connected user, any text (excluding the mentioned messages) that I send
    is broadcast to all connected clients.


    Our toy chat server is extraordinarily simple. But by defining the preceding protocol,
    we’re able to make it *generic*; this is crucial because it means that *any* client
    on the Internet, using their own software, only needs to obey the protocol to
    successfully engage with our server.


    By implementing Bitcoin’s protocol, developers are able to write their own software
    to interact with the network. They only need to see what kinds of stories and
    messages are possible on the network. The Bitcoin Wiki faithfully serves this
    information, here: [`https://en.bitcoin.it/wiki/Protocol_documentation`](https://en.bitcoin.it/wiki/Protocol_documentation).
    When you download the software called “Bitcoin Core,” you’re really downloading
    the *reference* implementation of the protocol, designed and maintained by developers
    who devote their free time to Bitcoin.


    ## Groundwork for building a blockchain


    Peer-to-peer networks are made possible by every client on the network collectively
    implementing the decided protocol. As an exercise, pause for a moment and try
    to figure out what messages should be possible in a peer-to-peer network.


    Following the advice, it’s helpful to first break our network into user stories
    to help clarify what messages are needed. Let’s define the notion of *connected*
    node to mean a node amply connected to enough other peers to form a network. Here
    are some possible stories:


    *   As a *node*, I’m able to connect to peers by discovering them*.


    *   As a *connected node*, I’m able to publish a list of my peers to anyone requesting
    them.


    *   As a *connected node*, I’m able to accept and broadcast a new transaction
    from a peer.


    *   As a *connected node*, I’m able to server the contents of a block to any peer
    requesting it.


    *   As a *connected node*, I’m able to accept a new block and add it to my blockchain
    if it meets certain criteria.


    ### Gossip


    The preceding list isn’t exhaustive by any means—we haven’t taken into account
    punitive measures for peers who misbehave or formed any sort of resolution when
    two valid (conflicting) blocks need to be added—but for now this is a good basis
    to build on. But most importantly, since there is no central authority, we need
    a way for a peer to localize the network and form a *swarm*.


    ![../images/475256_1_En_5_Chapter/475256_1_En_5_Fig3_HTML.jpg](images/475256_1_En_5_Chapter/475256_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    A node joining a network for the first time


    In the preceding image, a node `U` must acquire a list of other nodes (peers)
    from `A`, and `A` in turn has acquired a list of nodes from his neighbors, `X,
    Y,` and `Z`, and must continually “heartbeat” them in order to make sure they’re
    still “alive” on the network. `A` must also announce `U`’s presence to the network
    and so on and so forth. This general scheme is called a gossip protocol, and a
    successful gossip protocol is what makes for a resilient, decentralized network.


    # 6. Cryptography 101


    The study of the algorithms presented in this chapter are well beyond the scope
    of any book you can find or course you can take. They require years of understanding
    and treatment and build upon algebraic concepts familiar to specific fields of
    mathematics. But luckily theoretical insight into how cryptographic algorithms
    work isn’t a requirement for using these tools in practice, so long as you understand
    their purpose and implications. In other words, a working knowledge of how to
    use cryptographic libraries is what’s important here.


    If you’re like me (not a cryptographer), the correct approach to this material
    is that of caution. I understand just enough cryptography to know that it’s a
    lifelong balance—a study of trade-offs between security, convenience, and speed—with
    shifting attack vectors as technology improves. As somebody learning this stuff
    for the first time, you should err on the side of battle-tested, well-known best
    practices and tools. There’s far too much at stake in our digital world to take
    shortcuts—the majority of breaches and attacks on the Internet are caused by simple
    mistakes: using bad implementations of things not quite understood or, even worse,
    personal stamps of approval. There’s an adage in the cryptography world: *never
    roll your own brand of cryptography*.


    Cryptography is the *crypto* in cryptocurrency. And real cryptographers can get
    annoyed at the usage of the word *crypto* to mean cryptocurrency. Signing a check
    in real life is very similar to signing a blockchain transaction—but it’s even
    more secure, because the signature cannot be forged. In fact, it changes depending
    on the document you’re signing!


    ## Sending messages with integrity


    Before we dive into digital signatures and public key cryptography, I want to
    draw on your knowledge of hashing by showing you how they can be used to send
    unforgeable messages over an insecure medium, like the Internet.


    Note


    Note that this example is just a toy example and there are well-built libraries
    for doing this. In fact, the `hmac` library which ships with Python is built for
    just this purpose.


    Let’s say that Alice wants to send a message to Bob. And let’s also say that Alice
    and Bob agree to share a secret password `p@55w0rd` with each other before the
    messages are sent.


    Alice creates a message and concatenates it with `p@55w0rd`; then she computes
    a hash of the message:


    ```

    from hashlib import sha256

    message = "Hello Bob, Let''s meet at the Kruger National Park on 2020-12-12 at
    1pm."

    hash_message = sha256(("p@55w0rd" + message).encode()).hexdigest()

    ```


    The computed hash is `39aae6ffdb3c0ac1c1cc0f50bf08871a729052cf1133c4c9b44a5bab8fb66211.`
    Alice then sends this message, including the hash to Bob, who will now verify
    that only Alice could’ve sent it:


    ```

    from hashlib import sha256

    alices_message = "Hello Bob, Let''s meet at the Kruger National Park on 2020-12-12
    at 1pm."

    alices_hash = "39aae6ffdb3c0ac1c1cc0f50bf08871a729052cf1133c4c9b44a5bab8fb66211"

    hash_message = sha256(("p@55w0rd" + alices_message).encode()).hexdigest()

    if hash_message == alices_hash:

    print("Message has not been tampered with")

    ```


    This is a trivial example of a digital signature to give you a taste of how they
    work. We’ll soon see that the libraries responsible for verifying and signing
    the messages are more robust and don’t require the use of a pre-shared key.'
  trans: "\n# 协议\n\n协议在点对点网络设计中至关重要。协议是“游戏规则”，而设计它们之所以困难，是因为需要长期的前瞻性与规划。缺乏合理的架构会在未来导致结构性裂痕——即需要所谓“硬分叉”或改变网络底层协议的问题。良好的规划能为未来影响（无论是技术进步还是网络社会变迁）留出充足的空间。\n\
    \n比特币成功的部分原因在于其协议的简洁性，以及核心开发者在进行新变更时的审慎考量。协议层面的裂痕常常导致由社区驱动的“硬分叉”，例如比特币现金以及比特币区块链衍生出的众多分支。研究这些分叉发生的原因和时机很有趣，因为它们几乎总是协议层面意见不合的结果。\n\
    \n考虑到这一点，让我们审视一下我们构建的聊天服务器，并通过分析其可能的“消息”来剖析其协议。将这些分解成“用户故事”会很有帮助：\n\n*   作为已连接的用户，我可以通过发送消息\
    \ `/quit` 来退出。\n*   作为已连接的用户，我可以通过发送消息 `/list` 来列出所有已连接的用户。\n*   作为已连接的用户，我发送的任何文本（不包括上述提及的消息）都会被广播给所有已连接的客户端。\n\
    \n我们的玩具聊天服务器极其简单。但通过定义上述协议，我们能够使其变得*通用*；这一点至关重要，因为它意味着互联网上*任何*使用自己软件的客户端，只需遵守该协议就能成功与我们的服务器交互。\n\
    \n通过实现比特币的协议，开发者能够编写自己的软件来与网络交互。他们只需了解网络上可能存在哪些故事和消息。比特币维基忠实提供了这些信息，地址为：[`https://en.bitcoin.it/wiki/Protocol_documentation`](https://en.bitcoin.it/wiki/Protocol_documentation)。当你下载名为“Bitcoin\
    \ Core”的软件时，你实际上下载的是该协议的*参考*实现，由那些为比特币奉献业余时间的开发者设计和维护。\n\n## 构建区块链的基础工作\n\n点对点网络的实现，依赖于网络上的每个客户端共同执行商定的协议。作为练习，请暂停片刻，尝试思考在点对点网络中应该允许哪些消息。\n\
    \n遵循上述建议，首先将我们的网络分解为用户故事有助于厘清需要哪些消息。让我们将*已连接*节点的概念定义为：一个与足够多的其他对等体建立连接以形成网络的节点。以下是几个可能的故事：\n\
    \n*   作为一个*节点*，我能够通过发现对等体来连接它们。\n*   作为一个*已连接节点*，我能够向任何请求者发布我的对等体列表。\n*   作为一个*已连接节点*，我能够接受并广播来自对等体的新交易。\n\
    *   作为一个*已连接节点*，我能够向任何请求它的对等体提供某个区块的内容。\n*   作为一个*已连接节点*，我能够接受一个新区块，并在其满足特定条件时将其添加到我的区块链中。\n\
    \n### 八卦协议\n\n上述列表绝非详尽——我们尚未考虑对行为不端的对等体的惩罚措施，也未就添加两个有效（且冲突）区块时形成任何解决方案——但就目前而言，这是一个良好的构建基础。但最重要的是，由于没有中心化权威，我们需要一种方法让对等体定位网络并形成一个*群组*\n\
    \n![../images/475256_1_En_5_Chapter/475256_1_En_5_Fig3_HTML.jpg](img/475256_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3\n\n一个节点首次加入网络\n\n在上图中，节点 `U` 必须从 `A` 处获取其他节点（对等体）的列表，而 `A` 又从其邻居 `X`、`Y`\
    \ 和 `Z` 处获取了节点列表，并且必须持续地向它们发送“心跳”以确保它们在网络上仍然“存活”。`A` 还必须向网络宣布 `U` 的存在，以此类推。这种通用方案称为八卦协议，而一个成功的八卦协议正是构建弹性、去中心化网络的关键。\n\
    \n# 密码学入门\n\n本章所涉及算法的研究，远远超出了你所能找到的任何书籍或课程的范畴。它们需要多年的理解和钻研，并建立在特定数学领域所熟悉的代数概念之上。但幸运的是，在实际应用这些工具时，并不需要具备密码算法如何工作的理论洞察力，只要理解其用途和影响即可。换句话说，这里重要的是掌握如何使用密码库的实用知识。\n\
    \n如果你和我一样（不是密码学家），那么对待这些材料的正确方法是保持谨慎。我所理解的密码学知识，仅仅是认识到它是一个终生的平衡课题——一项关于安全性、便捷性和速度之间权衡的研究——并且攻击载体会随着技术进步而不断变化。作为一名初次学习这些内容的人，你应该倾向于那些久经考验、广为人知的最佳实践和工具。在我们的数字世界中，有太多东西岌岌可危，容不得半点偷工减料——互联网上的大多数入侵和攻击都是由简单错误造成的：使用了对某些事物理解不深的糟糕实现，或者更糟的是，个人的“盖章认可”。密码学领域有句格言：*永远不要自行创建你自己的密码学方案*。\n\
    \n密码学（Cryptography）是加密货币（Cryptocurrency）中的“加密”部分。真正的密码学家可能会对使用“crypto”一词来指代加密货币感到懊恼。在现实生活中签署支票与签署区块链交易非常相似——但甚至更加安全，因为签名无法伪造。事实上，签名会根据你签署的文档而发生改变！\n\
    \n## 发送完整性消息\n\n在我们深入探讨数字签名和公钥密码学之前，我想借助你对哈希的了解，展示如何利用哈希在不安全的媒介（如互联网）上发送不可伪造的消息。\n\
    \n注意\n\n注意，这个例子只是一个玩具示例，实际上有构建完善的库可以用于此目的。事实上，Python 自带的 `hmac` 库就是为此目的而构建的。\n\
    \n假设 Alice 想给 Bob 发送一条消息。同时，假设 Alice 和 Bob 在发送消息之前，约定好了共享一个秘密密码 `p@55w0rd`。\n\n\
    Alice 创建一条消息并将其与 `p@55w0rd` 拼接起来；然后计算该消息的哈希值：\n\n```\nfrom hashlib import sha256\n\
    message = \"Hello Bob, Let's meet at the Kruger National Park on 2020-12-12 at\
    \ 1pm.\"\nhash_message = sha256((\"p@55w0rd\" + message).encode()).hexdigest()\n\
    ```\n\n计算出的哈希值是 `39aae6ffdb3c0ac1c1cc0f50bf08871a729052cf1133c4c9b44a5bab8fb66211`。Alice\
    \ 然后将这条消息连同哈希值一起发送给 Bob，Bob 将验证只有 Alice 才能发送它：\n\n```\nfrom hashlib import sha256\n\
    alices_message = \"Hello Bob, Let's meet at the Kruger National Park on 2020-12-12\
    \ at 1pm.\"\nalices_hash = \"39aae6ffdb3c0ac1c1cc0f50bf08871a729052cf1133c4c9b44a5bab8fb66211\"\
    \nhash_message = sha256((\"p@55w0rd\" + alices_message).encode()).hexdigest()\n\
    if hash_message == alices_hash:\n    print(\"消息未被篡改\")\n```\n\n这是一个数字签名的简单示例，旨在让你初步了解其工作原理。我们很快会看到，负责验证和签名消息的库更加健壮，并且不需要使用预共享密钥。\n"
- fmt: '# Symmetric cryptography


    Symmetric cryptography is the oldest form of cryptography. It involves *sharing*
    a key (`cipher`) with the person you want to communicate with.


    For example, let’s say you want to share your car with your brother. You make
    a copy of the key and give the key to him. Now, only you and your brother are
    able start the car. But while you’re on holiday, your brother calls to tell you
    that the key has been lost, and somebody may have stolen it.


    This example illustrates some of the problems with symmetric cryptography—the
    primary problem being your placement of trust in the counter-party, and the overhead
    and maintenance of the list of authorized people who may drive your car. Also,
    you may not know when a particular key has been compromised. Let’s look at a classic
    example of symmetric cryptography.


    ## Caesar’s Cipher


    In Rome, circa 50 BC, Julius Caesar used a method of encryption for his personal
    correspondence. It’s a simple method of symmetric encryption that works by shifting
    the characters in a message by a fixed amount.


    ![../images/475256_1_En_6_Chapter/475256_1_En_6_Fig1_HTML.jpg](images/475256_1_En_6_Chapter/475256_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    A Caesar Cipher


    Ahead of time, Caesar would give the recipient the cipher (key) of say 3. And
    a `D` would become an `A` in the encrypted message. The recipient would apply
    the reverse and an `A` would become a `D`.


    The problem here is that the act of sending the cipher is insecure—any form of
    communication can be spied on and the key ascertained. We need a form of encryption
    free from the act of creating and sending shared keys. This is why public key
    cryptography was invented and solves the problem of shared trust.


    # Public key cryptography


    Public key cryptography is an example of *asymmetric* cryptography. It’s the type
    of cryptography that secures almost all modern systems on the Internet. We’re
    going to look at it from a simple level so that you get a gist of how and why
    it works, and then we’ll get more technical and granular with some examples mixed
    in.


    Public key cryptography involves not one but two (or more) key pairs, one of which
    is kept secret. There are many different public key cryptography algorithms, but
    we’ll be using the popular `RSA` (`Rivest`, `Shamir`, `Adleman`—the creators)
    algorithm (in the case of Bitcoin, the `ECDSA` (Elliptic Curve Digital Signature
    Algorithm) is used instead). These algorithms are complicated mathematical gems
    beyond the scope of this book, and they ship in a variety of flavors prized for
    certain properties: some are thought to be quantum computing-resistant; others
    are chosen for their speed or ease. But the output of any of these algorithms
    is the same: a *correlated* pair of keys, `A` and `B`, that you can use for the
    purposes of encrypting a message to be sent over an insecure channel.


    Note the word *correlated*—the keys `A` and `B` are linked in a mathematical way.
    `A` must be kept secret, known only to you. But `B` is your *public* key—you can
    publicize it on the Internet, and someone can use it to encrypt a message that
    *only you* can decrypt (using `A`). You can effectively send your `B` to anyone
    wishing to communicate with you in a secure manner, but you should guard `A` like
    Frodo did the Ring. We use public key cryptography all the time—mostly without
    realizing it—when you access a website over `https`, you’re using the website’s
    `B` to encrypt your outgoing data so that only the website may read it.


    Additionally—and this is really important—you can use your private key `A` to
    *sign* a message, and `B` (known to the public) can *verify* the signature. This
    is how transactions on a blockchain are validated. But more on that later. Let’s
    first look at some examples to get this sticking.


    # An Example in Python


    Here’s a fantastic analogy from the excellent open source Python `NaCL` library:


    > Imagine Alice wants something valuable shipped to her. Because it’s valuable,
    she wants to make sure it arrives securely (i.e., hasn’t been opened or tampered
    with) and that it’s not a forgery (i.e., it’s actually from the sender she’s expecting
    it to be from and nobody’s pulling the old switcheroo).


    > One way she can do this is by providing the sender (let’s call him Bob) with
    a high- security box of her choosing. She provides Bob with this box, and something
    else: a padlock, but a padlock without a key. Alice is keeping that key all to
    herself. Bob can put items in the box then put the padlock onto it. But once the
    padlock snaps shut, the box cannot be opened by anyone who doesn’t have Alice’s
    private key.


    > Here’s the twist though: Bob also puts a padlock onto the box. This padlock
    uses a key Bob has published to the world, such that if you have one of Bob’s
    keys, you know a box came from him because Bob’s keys will open Bob’s padlocks
    (let’s imagine a world where padlocks cannot be forged even if you know the key).
    Bob then sends the box to Alice.


    > In order for Alice to open the box, she needs two keys: her private key that
    opens her own padlock and Bob’s well-known key. If Bob’s key doesn’t open the
    second padlock, then Alice knows that this is not the box she was expecting from
    Bob, it’s a forgery.


    > This bidirectional guarantee around identity is known as mutual authentication.


    We’re going to be using `PyNaCl` to walk through an example of the preceding analogy
    in Python. First things first, let’s install `PyNaCl`:


    Note


    By the way, `PyNaCl` is a great example of a well-tested library to use in your
    own projects. Most importantly—for a cryptographic library—it has great documentation
    littered with examples. You can read more about it here: [`https://pynacl.readthedocs.io/en/stable/public/`](https://pynacl.readthedocs.io/en/stable/public/)


    ```

    poetry add pynacl

    ```


    Then let’s activate our virtual environment and spawn a Python interpreter:


    ```

    poetry shell

    ipython

    ```


    We’re going to use the given analogy to drive the concepts home. Bob and Alice
    will both generate their own public-private key pairs, and Bob will encrypt a
    message to Alice, for her to decrypt. PyNaCl supplies us with a very useful `Box`
    class which mimics the preceding analogy.


    Let’s go:


    ```

    from nacl.public import PrivateKey, Box

    # Generate secret keys for Alice and Bob

    alices_private_key = PrivateKey.generate()

    bobs_private_key = PrivateKey.generate()

    # Public keys are generated from the private keys

    alices_public_key = alices_private_key.public_key

    bobs_public_key = bobs_private_key.public_key

    # Bob will send Alice a message...

    # So he makes a Box with his private key and Alice''s public key

    bobs_box = Box(bobs_private_key, alices_public_key)

    # We encrypt Bob''s secret message (bytes)...

    encrypted = bobs_box.encrypt(b"I am Satoshi")

    # Alice creates a second box with her private key and Bob''s public key so that
    she can decrypt the message

    alices_box = Box(alices_private_key, bobs_public_key)

    # Now Alice can decrypt the message:

    plaintext = alices_box.decrypt(encrypted)

    print(plaintext.decode(''utf-8''))

    I am Satoshi

    ```


    `PyNaCl` will raise an exception if the message was tampered with or couldn’t
    be decrypted.'
