    # 构建我们的节点结构

    '
- fmt: "### Delegating responsibilities\n\nWe're going to use `node.py` as the entrypoint\
    \ for running our node. \"What's an entrypoint?\" you ask. Think of it as the\
    \ canonical way to run our node. I find it helpful, when designing programs, to\
    \ be as abstract as possible—design how you want the program to run before implementing\
    \ anything:\n\n```python\n# Instantiate the server with some config\nserver =\
    \ Server(**some_config)\n# Start the server\nserver.run()\n```\n\nPause here for\
    \ a brief moment and think about the various parts that we'll be implementing:\
    \ do you think our fake `Server()` class should be responsible for holding our\
    \ blockchain? How about making transactions? If it's responsible for running *everything*,\
    \ then how will be swap out our transactions model for, say, UTXOs at a later\
    \ point?\n\nA sound principle when designing applications is that *each module\
    \ should be responsible for doing one thing and doing it well*. Here's a better\
    \ way of abstracting our server:\n\n```python\nfrom funcoin.blockchain import\
    \ Blockchain\nfrom funcoin.pool import ConnectionPool\nfrom funcoin.server import\
    \ Server\n\n# Instantiate the blockchain and our pool for \"peers\"\nblockchain\
    \ = Blockchain()\nconnection_pool = ConnectionPool()\n\n# Instantiate the server\
    \ and \"bolt on\" our modules\nserver = Server(blockchain, connection_pool)\n\n\
    # Now start the server\nserver.start()\n```\n\nNow, we have a much cleaner abstraction—our\
    \ server need not concern itself with the blockchain at all; it just needs to\
    \ worry about being a server. Without explaining the various modules right now,\
    \ here's what our final `node.py` looks like.\n\n```python\n1  import asyncio\n\
    2  \n3  from funcoin.blockchain import Blockchain\n4  from funcoin.connections\
    \ import ConnectionPool\n5  from funcoin.peers import P2PProtocol\n6  from funcoin.server\
    \ import Server\n7  \n8  blockchain = Blockchain()         ①\n9  connection_pool\
    \ = ConnectionPool() ②\n10 \n11 server = Server(blockchain, connection_pool, P2PProtocol)\n\
    12 \n13 async def main():\n14     # Start the server\n15     await server.listen()\n\
    16 \n17 asyncio.run(main())\n```\n\n*Listing 7-1: `funcoin/node.py`*\n\nNotice\
    \ the instantiation of the `ConnectionPool` ① and `Blockchain` classes ②. This\
    \ ensures that they are stateful singletons—meaning that any module doing a `from\
    \ node import connection_pool` will be importing the same instantiated object,\
