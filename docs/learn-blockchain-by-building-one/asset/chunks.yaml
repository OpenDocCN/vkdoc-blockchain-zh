- fmt: '# Digital Signatures


    Digital signatures exist for many of the same reasons you may sign something in
    real life: they leave the recipient no room to doubt the authenticity of the document.
    They satisfy three useful claims:


    1. **Authenticity**: “This could’ve only been signed by Daniel.”

    2. **Integrity**: “This data wasn’t forged or tampered with.”

    3. **Non-repudiation**: “Daniel can’t deny having sent the data.”


    Digital signatures make use of public key cryptography to satisfy these claims.
    Much like in our example, where Alice creates a “box” with Bob’s public key, we
    use Bob’s public key to verify that only Bob could’ve sent and signed a piece
    of data. The idea is simple: anyone with my public key can quickly verify that
    I did indeed sign a message.


    Here’s a diagram of the given idea.


    ![../images/475256_1_En_6_Chapter/475256_1_En_6_Fig2_HTML.jpg](images/475256_1_En_6_Chapter/475256_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2** – Digitally signing a document


    1. First, our unencrypted, plaintext data is hashed (prevents tampering).

    2. Then the hash is encrypted using the private key.

    3. Then we attach (concatenate) the encrypted hash to the data.


    Let’s see what this looks like in Python. First, from Bob’s perspective, we’ll
    create a key pair; then sign a message with it. After, we’ll see how anyone can
    use that public key to verify the message.


    ```

    1  import nacl.encoding

    2  import nacl.signing

    4  # Generate a new key-pair for Bob

    5  bobs_private_key = nacl.signing.SigningKey.generate()

    6  bobs_public_key = bobs_private_key.verify_key

    8  # Since it''s bytes, we''ll need to serialize the key to a readable format
    before publishing it:

    9  bobs_public_key_hex = bobs_public_key.encode(encoder=nacl.encoding.HexEncoder)

    11  # Now, let''s sign a message with it

    12  signed = bobs_private_key.sign(b"Send $37 to Alice")

    ```


    The public key (in hex) generated on line `10` was:


    ```

    e7ff10ede8a691b982516059a0627d369504e3633e0297e28ec5fc71994577d3

    ```


    Firstly, let’s see what the `signed` message looks like on line `12`. As you can
    see, the message is not encrypted! But it is padded with bytes containing the
    signature:


    ```

    b''\x9fq\x02\xe1o\xb8y2\xc7\xe7@9$\xc4[\xb2\xa4\xe1+97.>\r\xcaGG\x8a

    Y\x86\xc3\xfe\xb9W{\xc4\x9c\x87\x00(\x1d\xe9}j\xe4\xed\xd2\x0b\xcb\x88\x87J\xecy\x04GQ

    H\xea\xcc\xc2\xe7\x03Send $37 to Alice''

    ```


    ### Verification


    The verification process uses the signer’s public key to check the signature.


    ![../images/475256_1_En_6_Chapter/475256_1_En_6_Fig3_HTML.jpg](images/475256_1_En_6_Chapter/475256_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3** – Verifying a digital signature


    Let’s see how we can use the public key to verify that the message was signed
    by Bob:


    ```

    1  import nacl.encoding

    2  import nacl.signing

    5  # From the above example...

    6  bobs_public_key = b''e7ff10ede8a691b982516059a0627d369504e3633e0297e28ec5fc71994577d3''

    8  # We generate the verify_key

    9  verify_key = nacl.signing.VerifyKey(bobs_public_key, encoder=nacl.encoding.HexEncoder)

    11  signed_message = b''\x9fq\x02\xe1o\xb8y2\xc7\xe7@9$\xc4[\xb2\xa4\xe1+97.>\r\xca
    GG\x8a Y\x86\xc3\xfe\xb9W{\xc4\x9c\x87\x00(\x1d\xe9}j\xe4\xed\xd2\x0b\xcb\x88\x87
    J\xecy\x04GQH\xea\xcc\xc2\xe7\x03Send $37 to Alice''

    13  # Now we attempt to verify the message

    14  # Any invalidation will result in an Exception being thrown

    15  verify_key.verify(signed_message)

    ```


    **Note:** Does the preceding example make sense? It’s good to take a pause and
    play around in the Python interpreter until you get the gist of using NaCl. It’s
    going to become important as we go through the next chapter on transactions.


    ## Wallets on the Blockchain


    Unlike Bitcoin, Ethereum is an account-based model—meaning each “user” on the
    Blockchain would have an account. Bitcoin doesn’t have the notion of an *account*;
    instead, it’s a system that closely resembles the way cash flows in and out of
    a physical wallet. The Bitcoin system is called UTXO (Unspent Transaction Outputs),
    and it’s an elegant data structure for modeling transactions. We’ll talk about
    UTXOs in the next chapter, but for now let’s focus on the account-based model
    of Ethereum.


    When you initially interact with Ethereum, the first thing you usually do is generate
    a key pair. Your Ethereum *address* is just your public key. Your private key
    is stored somewhere safe, either in some sort of software or on a hardware wallet.
    For someone to send you money over the Ethereum blockchain, they just need to
    know your public key. But only you can access that money because only you hold
    the private key.


    # Creating a Transactional Node


    To attain a fully fledged cryptocurrency, the data in our blockchain must be *transactions*.
    Each transaction transfers ownership of coins from one private key to another.
    The transactions are collected in each block and *mined*, growing the blockchain;
    in fact, the older a block is, the more surety it has—it’s more likely to be part
    of the de facto blockchain. At any given time, miners are busy mining slightly
    different blocks containing different transactions—it’s a race to find a block—when
    a miner finds a block, they broadcast it, and the rest of the miners drop their
    current blocks (they’ve lost the race) and move on to the next one. These “dropped”
    blocks are usually called orphaned blocks.


    In this chapter, we’ll wrangle all the concepts we’ve learned and incorporate
    them into a full node capable of operating in a peer-to-peer network. Then, using
    the previous chapter’s cryptography, we’ll clarify how transactions are made and
    verified.


    ## Transactions and Work Summary


    ### A Departure from Bitcoin’s UTXO Model


    If you’ve spent any time investigating Bitcoin, then you’re likely to have heard
    of UTXOs or, more formally, Unspent Transaction Outputs (UTXOs). This model is
    elegant because it resembles the way that cold, hard cash works in the real world—there
    are no accounts: money is a “note” that may reside in someone’s wallet (public
    key). UTXOs are contrasted to an account-based model, which is roughly how your
    bank account works: you give someone your account number, and they may transfer
    money to it. Some cryptocurrencies use this model, most notably Ethereum.


    This is the model we’ll be implementing, because it’s easy to reason about, test,
    and explain. We’ll be designing the class in such a way that it may be easily
    swapped out for a UTXO model (left as an exercise to the reader).


    ### The Role of a Miner


    As we saw in Chapter 4, the role of a miner is to generate new coins by finding
    an appropriate hash for a block. While mining, a miner collects incoming transactions
    in a pool—known as the mempool in Bitcoin—waiting to be included in the subsequent
    block. If there are too many transactions to fill a block, then a miner picks
    the ones with the highest fees to increase profits. During the 2017 cryptocurrency
    boom, the price of Bitcoin transactions exceeded $40 because of how many transactions
    were backed up. Topics of scaling Bitcoin often include the mempool and transaction
    fees, most notably the question of block size: how many transactions should we
    store in a block? In Bitcoin the limit is 1 megabyte worth, which is on average
    around 1700 transactions.'
