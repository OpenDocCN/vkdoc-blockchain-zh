  trans: '

    # funcoin 的不足之处


    根据您的亲身实践，一个可公开运行的区块链系统大致需要四个关键组件：


    *   **共识协议**：使分布式节点能够就系统状态（区块链中存储的数据）达成一致。正是这种神奇机制，让我们得以将区块链称为“去中心化”系统。

    *   **网络层**：使节点能够通信并在整个网络中传播信息。

    *   **加密安全区块链**（即区块链本身）。

    *   **经济激励方案**（工作量证明）：通过工作量压力来保障链条安全。


    上述任何一个组件出现问题，几乎都会对*所有*组件产生影响。例如，网络层的一个漏洞可能被利用，延迟向网络中的某些节点传播交易，从而影响共识协议。撰写本书对我来说极具挑战，因为我最初的目标是构建一个易于理解的区块链，结果却慢慢意识到，像比特币这样的项目也怀有同样的目标：从某种意义上说，它们*就是*各自协议的最简化体现。


    作为一次思维练习，我想请您花点时间反思一下 funcoin 各组件中的工作，并思考它们抵御攻击的能力如何。网络层是我们系统中一个既困难又复杂的部分；这或许是个不错的切入点。


    ## 网络层


    我们在网络层做出的第一个假设是使用 JSON 作为消息的序列化格式。出于多种原因，这种选择并非最优，最主要的是它不支持流式传输。换句话说，我们需要知道一个
    JSON 编码对象的起点和另一个对象的起点在哪里。为了绕过这个障碍，我们制定了以换行符分隔消息的规则。以下是我们 `Server` 类中实现此功能的代码：


    ```

    1  async def handle_connection(self, reader: StreamReader, writer: StreamWriter):

    2      while True:

    3          try:

    4              # 永远等待新数据到达

    5              data = await reader.readuntil(b"\n")

    7              decoded_data = data.decode("utf8").strip()

    9              try:

    10                  message = BaseSchema().loads(decoded_data)

    11              except MarshmallowError:

    12                  logger.info("Received unreadable message", peer=writer)

    13                  break

    15              # 从消息中提取地址，添加到 writer 对象中

    16              writer.address = message["meta"]["address"]

    18              # 将节点添加到连接池中

    19              self.connection_pool.add_peer(writer)

    21              # ...然后处理消息

    22              await self.p2p_protocol.handle_message(message, writer)

    24              await writer.drain()

    25              if writer.is_closing():

    26                  break

    28          except (asyncio.exceptions.IncompleteReadError, ConnectionError):

    29              # 发生错误，跳出等待循环

    30              break

    ```


    您看到问题所在了吗？这会使我们的节点面临拒绝服务攻击的风险。只需要有人向我们发送一条不带换行符的消息，我们的节点就会保持连接打开状态，等待消息结束。不过，我们可以通过跟踪并限制对等节点可能发送的数据量来轻松缓解这个问题。话虽如此，我们使用基于
    JSON 的消息是为了简化实现。比特币对消息结构使用以分隔符分隔的字节，这需要冗长繁琐的实现。以下是比特币消息的结构：


    | **字段大小** | **描述** | **数据类型** | **备注** |

    | --- | --- | --- | --- |

    | 4 | 魔数 | `uint32` | 标识消息应位于测试网络还是真实网络 |

    | 12 | 命令 | `char[12]` | 标识消息内容类型的字符串 |

    | 4 | 长度 | `uint32` | 有效载荷的字节大小 |

    | 4 | 校验和 | `uint32` | 消息哈希的前 4 个字节 |

    | ? | 有效载荷 | `char[]` | 实际数据 |


    我们也没有讨论节点如何排序和存储对等节点。我们没有任何相关的启发式算法。让我举例说明什么是*启发式*算法：当对等节点向我们请求节点列表时，我们可以将*所有*已知节点都发送给它，但这很浪费，并且可以做得更好。如果我们向请求节点随机发送
    20 个对等节点会怎样？这样做能使一个节点将交易传播到整个网络吗（假设其他节点也返回随机节点）？这主要属于点对点网络研究领域，此类启发式算法通常被称为*八卦协议*或*节点发现*。在著名的
    Napster 关闭后，这一研究领域重新引起了人们的兴趣。Napster 是第一个允许人们从点对点网络下载音乐的软件。但 Napster 是中心化的：它提供一个可用节点列表，因此如果
    Napster 宕机，整个网络也会瘫痪。


    BitTorrent 是分布式哈希表的一个例子：一种典型的去中心化键值存储系统，常被用来通过 The Pirate Bay 和 ISOHunt 等网站非法下载电影和电视节目。多年来，各国政府和执法机构一直试图关闭这些所谓的种子网站，但基本上都未能成功——它们至今仍然存在。但这是为什么呢？是什么让它们如此抵制审查？像比特币和以太坊这样的区块链似乎应该从
    eDonkey 和 Kad 这样的分布式哈希表中学到一些东西。其中的秘密在于这些网络上的节点如何发现和组织它们的对等节点——正确做法能使点对点网络具备可扩展性、抗审查性和高速性。如果您的网络需要支持文件存储，您可能会考虑使用分布式哈希表，因为它们实际上只是管理网络中哪些节点托管哪些文件的规则。如果您正在构建一个去中心化的区块链，则无需担心存储大文件，因为实际上每个人都存储着同一个“大”文件——区块链本身。


    大多数关于点对点协议的研究都处于初期阶段，并且源自文件共享领域。现代去中心化网络存在于应用层，并实现了以下协议：


    *   **节点发现**：如何发现网络上的节点

    *   **路由**：联系节点（消息）所需采取的路由

    *   **命名**：一种统一的节点识别方式


    这些协议几乎总是存在于网络协议栈的应用层。


    ![../images/475256_1_En_8_Chapter/475256_1_En_8_Fig3_HTML.jpg](img/475256_1_En_8_Fig3_HTML.jpg)


    图 8-3


    典型的网络协议栈

