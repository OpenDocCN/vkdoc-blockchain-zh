- fmt: '# A rapid introduction to asyncio


    Python’s `asyncio` library allows us to write asynchronous code in an easy-to-read
    way by giving us a ton of helper functions. These allow us to separate our code
    into tasks which look like they’re running in parallel.


    Let’s get a grasp of how `asyncio` works by taking a look at a very simple program:


    ```

    1  import asyncio

    2  import time


    5  async def greet(name, delay):

    6      await asyncio.sleep(delay)

    7      print(f''{name}: I waited {delay} seconds before saying "hello"'')


    10  async def main():

    11      task_1 = syncio.create_task(greet("t1", 3))

    12      task_2 = syncio.create_task(greet("t2", 2))

    13      task_3 = syncio.create_task(greet("t3", 2))


    15      start_time = time.time()


    17      print("0.00s: Program  Start")


    19      await task_1

    20      await task_2

    21      await task_3


    23      print(f"{time.time() - start_time:.2f}s: Program End")


    26  asyncio.run(main())

    ```


    The most important parts of this program are the lines


    ```

    1  task_1 = asyncio.create_task(greet(1))

    2  task_2 = asyncio.create_task(greet(2))

    3  task_3 = asyncio.create_task(greet(2))

    ```


    which “transform” three tasks—functions with arguments—into tasks which can be
    executed concurrently; these are called *awaitables*, since they’ll soon be “waited
    upon.”


    The following lines


    ```

    1  await task_1

    2  await task_2

    3  await task_3

    ```


    are responsible for triggering the tasks to be run using Python’s `await` expression.


    Finally, `main()` is called inside `asyncio`’s `run()` function ; this tells Python
    that `main` (and the stuff within it) should be run concurrently.


    When run, the program outputs the following:


    ```

    0.00s: Program Start

    t2: I waited 2 seconds before saying "hello"

    t3: I waited 2 seconds before saying "hello"

    t1: I waited 3 seconds before saying "hello"

    3.00s: Program End

    ```


    As shown, our tasks did indeed run concurrently; if the program ran *synchronously*,
    then it would’ve taken about 7 seconds, as each function executed sequentially.


    In my introduction I mentioned that we “pause” our tasks; this is done here by
    the `await asyncio.sleep(...)` line within our function. Take a moment to examine
    this; it effectively is asking the following question: “*If the sleep delay is
    not reached, pause the function (await) here, and resume with something else*.”


    It’s crucial to grasp this pattern conceptually (even if you don’t fully understand
    it)—and try it out yourself—because it forms the pattern of most asynchronous
    programs. The `main` function is sometimes called the *entrypoint* to our program,
    and we’ll use it extensively as we build.


    A full treatise of `asyncio` is well beyond the scope of this book, and for the
    context of building blockchains, it’s both important and unimportant. It’s important
    to understand what’s going on under the hood (if you care about building production-ready
    applications), but it’s also unimportant in the context of learning about blockchains
    and networking because it’s really an implementation detail that we can learn
    more about later.


    # Building a chat server from the ground up


    Since building a blockchain is pretty useless unless it’s connected to other clients
    over a network, we’re going to start with something similar and a bit a chat server
    that allows many connected clients to chat with each other at once. You can even
    use it to host your own chat server and have friends from all over the world connect
    to it. We’ll do this in about 100 lines of Python.


    I grew up using IRC (Internet Relay Chat) in the late 90s. It’s a robust chat
    protocol from the early internet that allowed people from all over the world to
    chat in chatrooms. In fact, the #bitcoin channel on the freenode network is still
    heavily in use today—it’s where all the core contributors chat. But implementing
    the IRC protocol is a pretty tall order, and because this is “learning by doing”,
    we’re going to ignore all prior work and in the name of time and simplicity focus
    on a minimal example to help get the gist of writing asynchronous TCP server-client
    applications in Python. Modern web applications are scalable and concurrent, so
    it’s important to understand how asynchronous code is written to avoid common
    pitfalls.


    In order to accomplish our goal, we’re going to be building our chat server using
    TCP sockets. Python makes it easy to work with them. In fact, the `asyncio` module
    provides a lot of functionality out the box.


    We’ll begin with as simple as it gets—a plain “echo” server that simply sends
    back any message sent to it.


    ```

    1  import asyncio


    4  async def handle_connection(reader, writer):

    5      writer.write("Hello new user, type something...\n".encode())


    7      data = await reader.readuntil(b"\n")


    9      writer.write("You sent: ".encode() + data)

    10      await writer.drain()


    12      # Let''s close the connection and clean up

    13      writer.close()

    14      await writer.wait_closed()


    17  async def main():

    18      server = await asyncio.start_server(handle_connection,  "0.0.0.0", 8888)


    20      async with server:

    21          await server.serve_forever()


    24  asyncio.run(main())

    ```


    Before we dissect the code, let’s run this server and send it some information
    to get a sense of expectation. Open up two terminals, and put them side by side.


    In the first terminal, run the preceding code:


    ```

    $ python my_server.py

    ```


    And in the second terminal, connect to the server using `nc`


    ```

    nc 127.0.0.1 8888

    ```


    or `telnet` if you’re on Windows:


    ```

    telnet 127.0.0.1 8888

    ```


    A Note on Different OSes


    Both `nc` (`netcat`) and `telnet` are programs which allow you to open up socket
    connections to remote hosts. Since I’m not sure which operating system you’re
    using, I’ll leave it to you to figure out which to use (or install one if necessary).


    Type a message, and hit enter; you should see the following output:


    ```

    nc 127.0.0.1 8888

    Hello new user, type something...

    hey fellow  blockchain  enthusiast!

    You sent: hey fellow blockchain enthusiast!

    ```


    If you see this message, great—you’re able to connect to our server on the IP
    address `127.0.0.1` (which is a special IP address referring to your own computer)
    and port `8888` (a port we chose). If you’re on a local network, you can try connecting
    to your server from another computer; just substitute `127.0.01` with your local
    IP address.


    Stuck? Make Sure You Aren’t Before Continuing


    If you aren’t getting the preceding output, then you’ll need to fix the situation
    before continuing. Make sure that your Python server code is indeed running and
    that no other process is using port `8888`.


    In the preceding code, the server is initialized (line `18`) with a *callback
    function*, `handle_connection` to handle new connections. The `handle_connection`
    function implicitly receives a `reader` and `writer` as arguments (line `4`),
    representing the underlying connection. On line `24`, we tell the server to start
    and never stop.


    Supporting Multiple Connections


    Since we’re using `asyncio`, try opening up multiple terminals and connect to
    your server. You’ll find that since our code is asynchronous, we can support plenty
    of concurrent connections. How many? The maximum number of theoretical clients
    is the maximum number of ports your operating system is able to assign; on most
    systems, this is approximately 65,536 (or 2^16), but you’ll likely be limited
    by memory and CPU overhead far before you reach that many.'
