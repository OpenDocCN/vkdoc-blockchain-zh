  24          }


  26          # 获取新区块的哈希值，并将其添加到区块中

  27          block_hash = self.hash(block)

  28          block["hash"] = block_hash


  30          # 重置待处理交易列表

  31          self.pending_transactions = []


  33          return block


  35      @staticmethod

  36      def hash(block):

  37          # 确保字典有序，否则哈希值会不一致

  38          block_string = json.dumps(block, sort_keys=True).encode()

