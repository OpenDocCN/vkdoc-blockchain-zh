  | | `is_miner` | `bool` | `False` |\n```\n\n\n### 使用 Marshmallow 验证消息\n\n接下来，我们将使用\
  \ `marshmallow` 库来验证我们的消息。我们的服务器执行两项操作：读取消息和发送消息。当服务器收到一条消息时，该消息以 JSON 字符串的形式到达，它必须被转换成\
  \ Python 字典并进行验证；这个过程称为**反序列化**，因为我们是从序列化形式（JSON）转换回原生的 Python `dict`。**序列化**则相反：是从\
  \ `dict` 转换到 JSON 字符串。总结如下：\n\n1. 服务器读取对等节点发送的消息（反序列化：json → dict）。\n2. 服务器向对等节点发送消息（序列化：dict\
  \ → json）。\n\n对于每个需要验证的对象，Marshmallow 要求我们定义一个*模式（schema）*。以下是一个 `peer` 对象的模式示例：\n\
  \n```python\nfrom marshmallow import Schema, fields\nclass Peer(Schema):\n    ip\
  \ = fields.Str(required=True)\n    port = fields.Int(required=True)\n    last_seen\
  \ = fields.Int(missing=lambda: int(time()))\n```\n\n请注意，我们需要指定每个字段的类型。当 Marshmallow\
  \ 接收到一个 JSON 对象时，如果某个字段的类型不匹配，它会抛出一个错误，这为我们节省了大量的时间和精力。以下是一个发送到我们服务器的序列化 JSON 字符串示例：\n\
  \n```python\npayload = \"{'ip': '192.168.0.1', 'port': 8888, 'last_seen': 1589780748}\"\
  \n```\n\n现在，我们可以让 Marshmallow 对其进行反序列化：\n\n```python\nresult = Peer().loads(payload)\n"
- '#  {''last_seen'': 1589780748, ''ip'': ''192.168.0.1'', ''port'': 8888}

  ```


  如果某个字段不正确或验证失败，Marshmallow 会抛出一个 `ValidationError`（验证错误）。


