  \ |\n\n### 创建文件结构\n\n现在，我们将创建一个嵌套的 `funcoin` 文件夹来存放我们的“原子”单元——组合起来形成一个完整节点的不同方面或类。为以下内容创建空文件：\n\
  \n```\ntouch node.py\nmkdir funcoin\ncd funcoin\ntouch __init__.py\ntouch blockchain.py\n\
  touch connections.py\ntouch transactions.py\ntouch server.py\ntouch types.py\ntouch\
  \ messages.py\ntouch utils.py\n```\n\n您的完整文件夹结构应如下所示：\n\n```\nfuncoin\n├── funcoin\n\
  │     ├── __init__.py\n│     ├── blockchain.py\n│     ├── connections.py\n│    \
  \ ├── messages.py\n│     ├── peers.py\n│     ├── server.py\n│     ├── transactions.py\n\
  │     ├── types.py\n│     └── utils.py\n├── __init__.py\n├── node.py\n├── poetry.lock\n\
  └── pyproject.toml\n```\n\n`funcoin/funcoin` 目录下的空文件将包含我们即将从前几章重构的代码。让我们检查一下我们节点的结构。\n\
  \n## 构建我们的节点结构\n\n\n\n### 职责分配\n\n我们将使用 `node.py` 作为运行节点的入口点。“什么是入口点？”你可能会问。可以将其视为运行节点的规范方式。在设计程序时，我发现尽可能抽象化是有帮助的——在实现任何功能之前，先设计好你希望程序如何运行：\n\
  \n```python\n#### 使用一些配置实例化服务器\nserver = Server(**some_config)\n#### 启动服务器\nserver.run()\n\
  ```\n\n请稍作停顿，思考一下我们将要实现的各个部分：你认为我们虚构的 `Server()` 类是否应该负责保存区块链？或者处理交易？如果它负责运行*一切*，那么后续我们如何将交易模型替换为像\
  \ UTXO 这样的其他模型呢？\n\n设计应用程序时的一个健全原则是：*每个模块应只负责一件事，并且把它做好*。这里有一种更好的方式来抽象我们的服务器：\n\n\
  ```python\nfrom funcoin.blockchain import Blockchain\nfrom funcoin.pool import ConnectionPool\n\
  from funcoin.server import Server\n\n#### 实例化区块链和用于“对等节点”的连接池\nblockchain = Blockchain()\n\
  connection_pool = ConnectionPool()\n\n#### 实例化服务器，并将我们的模块“嵌入”其中\nserver = Server(blockchain,\
  \ connection_pool)\n\n#### 现在启动服务器\nserver.start()\n```\n\n现在，我们有了一个更加清晰的抽象——服务器完全无需关心区块链；它只需要专注于成为一个服务器。在不对各个模块进行解释的前提下，这是我们最终\
  \ `node.py` 的模样：\n\n```python\n1  import asyncio\n2  \n3  from funcoin.blockchain\
  \ import Blockchain\n4  from funcoin.connections import ConnectionPool\n5  from\
  \ funcoin.peers import P2PProtocol\n6  from funcoin.server import Server\n7  \n\
  8  blockchain = Blockchain()         ①\n9  connection_pool = ConnectionPool() ②\n\
  10 \n11 server = Server(blockchain, connection_pool, P2PProtocol)\n12 \n13 async\
  \ def main():\n14     # 启动服务器\n15     await server.listen()\n16 \n17 asyncio.run(main())\n\
  ```\n\n*清单 7-1：`funcoin/node.py`*\n\n请注意 `ConnectionPool` ① 和 `Blockchain` ② 类的实例化。这确保了它们是带有状态的单例——意味着任何通过\
  \ `from node import connection_pool` 导入的模块都将获得同一个已实例化的对象，从而保持状态一致。\n\n在实现它们之前，我们先设定四个关键模块的目标。\n\
  \n| **模块** | **描述** |\n|---|---|\n| `blockchain` | 用于存放我们 `Blockchain` 类的模块，该类包含我们在前几章构建的区块链实例\
  \ |\n| `Peers` | 处理对等节点可能发送给我们的消息传播逻辑：即我们如何进行通信。我们将其称为 `P2PProtocol` |\n| `connections`\
  \ | 处理与我们节点通信的活动连接“池”的逻辑 |\n| `server` | 存放我们基本 TCP `Server` 的地方 |\n\n> **注意** \
  \ \n> 由于我们使用的是 `asyncio`（而不是线程），我们极大地简化了并发问题：使用线程时，程序员需要担心竞态条件（两个或多个线程争相更新或接收数据）。这种方法的缺点是代码可能变得难以阅读和理解（但根据我的经验，如果你花时间去遵循它，是非常值得的）。\n\
  \n我们的入口点只有一个函数 `main()`。这是 `asyncio` 程序的典型特征，用于启动我们的服务器。\n\n## 服务器模块\n\n我们将改造在第\
