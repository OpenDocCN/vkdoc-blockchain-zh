  \n\n\n### 协议\n\n协议在点对点网络设计中至关重要。协议是“游戏规则”，而设计它们之所以困难，是因为需要长期的前瞻性与规划。缺乏合理的架构会在未来导致结构性裂痕——即需要所谓“硬分叉”或改变网络底层协议的问题。良好的规划能为未来影响（无论是技术进步还是网络社会变迁）留出充足的空间。\n\
  \n比特币成功的部分原因在于其协议的简洁性，以及核心开发者在进行新变更时的审慎考量。协议层面的裂痕常常导致由社区驱动的“硬分叉”，例如比特币现金以及比特币区块链衍生出的众多分支。研究这些分叉发生的原因和时机很有趣，因为它们几乎总是协议层面意见不合的结果。\n\
  \n考虑到这一点，让我们审视一下我们构建的聊天服务器，并通过分析其可能的“消息”来剖析其协议。将这些分解成“用户故事”会很有帮助：\n\n*   作为已连接的用户，我可以通过发送消息\
  \ `/quit` 来退出。\n*   作为已连接的用户，我可以通过发送消息 `/list` 来列出所有已连接的用户。\n*   作为已连接的用户，我发送的任何文本（不包括上述提及的消息）都会被广播给所有已连接的客户端。\n\
  \n我们的玩具聊天服务器极其简单。但通过定义上述协议，我们能够使其变得*通用*；这一点至关重要，因为它意味着互联网上*任何*使用自己软件的客户端，只需遵守该协议就能成功与我们的服务器交互。\n\
  \n通过实现比特币的协议，开发者能够编写自己的软件来与网络交互。他们只需了解网络上可能存在哪些故事和消息。比特币维基忠实提供了这些信息，地址为：[`https://en.bitcoin.it/wiki/Protocol_documentation`](https://en.bitcoin.it/wiki/Protocol_documentation)。当你下载名为“Bitcoin\
  \ Core”的软件时，你实际上下载的是该协议的*参考*实现，由那些为比特币奉献业余时间的开发者设计和维护。\n\n## 构建区块链的基础工作\n\n点对点网络的实现，依赖于网络上的每个客户端共同执行商定的协议。作为练习，请暂停片刻，尝试思考在点对点网络中应该允许哪些消息。\n\
  \n遵循上述建议，首先将我们的网络分解为用户故事有助于厘清需要哪些消息。让我们将*已连接*节点的概念定义为：一个与足够多的其他对等体建立连接以形成网络的节点。以下是几个可能的故事：\n\
  \n*   作为一个*节点*，我能够通过发现对等体来连接它们。\n*   作为一个*已连接节点*，我能够向任何请求者发布我的对等体列表。\n*   作为一个*已连接节点*，我能够接受并广播来自对等体的新交易。\n\
  *   作为一个*已连接节点*，我能够向任何请求它的对等体提供某个区块的内容。\n*   作为一个*已连接节点*，我能够接受一个新区块，并在其满足特定条件时将其添加到我的区块链中。\n\
  \n### 八卦协议\n\n上述列表绝非详尽——我们尚未考虑对行为不端的对等体的惩罚措施，也未就添加两个有效（且冲突）区块时形成任何解决方案——但就目前而言，这是一个良好的构建基础。但最重要的是，由于没有中心化权威，我们需要一种方法让对等体定位网络并形成一个*群组*\n\
  \n![../images/475256_1_En_5_Chapter/475256_1_En_5_Fig3_HTML.jpg](img/475256_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n一个节点首次加入网络\n\n在上图中，节点 `U` 必须从 `A` 处获取其他节点（对等体）的列表，而 `A` 又从其邻居 `X`、`Y`\
  \ 和 `Z` 处获取了节点列表，并且必须持续地向它们发送“心跳”以确保它们在网络上仍然“存活”。`A` 还必须向网络宣布 `U` 的存在，以此类推。这种通用方案称为八卦协议，而一个成功的八卦协议正是构建弹性、去中心化网络的关键。\n\
  \n"
- "# 密码学入门\n\n本章所涉及算法的研究，远远超出了你所能找到的任何书籍或课程的范畴。它们需要多年的理解和钻研，并建立在特定数学领域所熟悉的代数概念之上。但幸运的是，在实际应用这些工具时，并不需要具备密码算法如何工作的理论洞察力，只要理解其用途和影响即可。换句话说，这里重要的是掌握如何使用密码库的实用知识。\n\
  \n如果你和我一样（不是密码学家），那么对待这些材料的正确方法是保持谨慎。我所理解的密码学知识，仅仅是认识到它是一个终生的平衡课题——一项关于安全性、便捷性和速度之间权衡的研究——并且攻击载体会随着技术进步而不断变化。作为一名初次学习这些内容的人，你应该倾向于那些久经考验、广为人知的最佳实践和工具。在我们的数字世界中，有太多东西岌岌可危，容不得半点偷工减料——互联网上的大多数入侵和攻击都是由简单错误造成的：使用了对某些事物理解不深的糟糕实现，或者更糟的是，个人的“盖章认可”。密码学领域有句格言：*永远不要自行创建你自己的密码学方案*。\n\
  \n密码学（Cryptography）是加密货币（Cryptocurrency）中的“加密”部分。真正的密码学家可能会对使用“crypto”一词来指代加密货币感到懊恼。在现实生活中签署支票与签署区块链交易非常相似——但甚至更加安全，因为签名无法伪造。事实上，签名会根据你签署的文档而发生改变！\n\
  \n## 发送完整性消息\n\n在我们深入探讨数字签名和公钥密码学之前，我想借助你对哈希的了解，展示如何利用哈希在不安全的媒介（如互联网）上发送不可伪造的消息。\n\
  \n注意\n\n注意，这个例子只是一个玩具示例，实际上有构建完善的库可以用于此目的。事实上，Python 自带的 `hmac` 库就是为此目的而构建的。\n\n\
  假设 Alice 想给 Bob 发送一条消息。同时，假设 Alice 和 Bob 在发送消息之前，约定好了共享一个秘密密码 `p@55w0rd`。\n\nAlice\
  \ 创建一条消息并将其与 `p@55w0rd` 拼接起来；然后计算该消息的哈希值：\n\n```\nfrom hashlib import sha256\nmessage\
  \ = \"Hello Bob, Let's meet at the Kruger National Park on 2020-12-12 at 1pm.\"\n\
  hash_message = sha256((\"p@55w0rd\" + message).encode()).hexdigest()\n```\n\n计算出的哈希值是\
  \ `39aae6ffdb3c0ac1c1cc0f50bf08871a729052cf1133c4c9b44a5bab8fb66211`。Alice 然后将这条消息连同哈希值一起发送给\
  \ Bob，Bob 将验证只有 Alice 才能发送它：\n\n```\nfrom hashlib import sha256\nalices_message\
  \ = \"Hello Bob, Let's meet at the Kruger National Park on 2020-12-12 at 1pm.\"\n\
  alices_hash = \"39aae6ffdb3c0ac1c1cc0f50bf08871a729052cf1133c4c9b44a5bab8fb66211\"\
  \nhash_message = sha256((\"p@55w0rd\" + alices_message).encode()).hexdigest()\n\
  if hash_message == alices_hash:\n    print(\"消息未被篡改\")\n```\n\n这是一个数字签名的简单示例，旨在让你初步了解其工作原理。我们很快会看到，负责验证和签名消息的库更加健壮，并且不需要使用预共享密钥。\n\
  \n\n\n### 对称加密\n\n对称加密是最古老的一种加密形式。它涉及与你想要通信的人*共享*一把密钥（`cipher`）。\n\n例如，假设你想和你的兄弟共用你的汽车。你复制了一把钥匙并给他。现在，只有你和你兄弟能启动这辆车。但当你在度假时，你兄弟打电话告诉你钥匙丢了，可能被人偷了。\n\
  \n这个例子说明了对称加密存在的一些问题——主要问题在于你对交易对手的信任，以及维护有权驾驶你汽车的授权人员名单所带来的开销和管理成本。此外，你可能不知道某把钥匙何时已被泄露。让我们来看一个对称加密的经典例子。\n\
  \n## 凯撒密码\n\n大约在公元前 50 年的罗马，尤利乌斯·凯撒在他的私人通信中使用了一种加密方法。这是一种简单的对称加密方法，通过将消息中的字符按固定数量移位来实现。\n\
  \n![../images/475256_1_En_6_Chapter/475256_1_En_6_Fig1_HTML.jpg](img/475256_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\n一个凯撒密码示例\n\n事先，凯撒会告知接收者密码（密钥），比如数字 3。那么在加密后的消息中，一个 `D` 就会变成 `A`。接收者反向操作，一个\
  \ `A` 就会变回 `D`。\n\n这里的问题是，发送密码这个行为本身是不安全的——任何形式的通信都可能被监视，密钥也可能被获取。我们需要一种摆脱创建和发送共享密钥这一过程的加密形式。这就是公钥密码学被发明的原因，它解决了共享信任的问题。\n\
  \n### 公钥密码学\n\n公钥密码学是*非对称*加密的一个例子。它是保护互联网上几乎所有现代系统安全的加密类型。我们将从一个简单的层面来理解它，让你掌握其工作原理和原因的精要，然后我们会结合一些例子，从更技术性和更细致的角度深入探讨。\n\
  \n公钥密码学涉及的不是一个而是两个（或更多）密钥对，其中一个是保密的。有许多不同的公钥密码算法，但我们将使用流行的 `RSA`（`Rivest`、`Shamir`、`Adleman`——算法创建者）算法（在比特币的情况下，使用的是\
  \ `ECDSA`（椭圆曲线数字签名算法））。这些算法是复杂的数学瑰宝，超出了本书的讨论范围，它们有多种变体，各具优势：有些被认为能抵抗量子计算；有些则因其速度或易用性而被选中。但这些算法的输出都是一样的：一对*相关联*的密钥\
  \ `A` 和 `B`，你可以用它们来加密消息，以便在不安全的信道上发送。\n\n请注意*相关联*这个词——密钥 `A` 和 `B` 以数学方式链接在一起。`A`\
  \ 必须保密，只有你知道。但 `B` 是你的*公钥*——你可以在互联网上公开它，别人可以用它来加密一条*只有你*才能解密的消息（使用 `A`）。你可以有效地将你的\
  \ `B` 发送给任何希望与你安全通信的人，但你应该像佛罗多守护魔戒一样守护好 `A`。我们一直在使用公钥密码学——大多数时候甚至没有意识到——当你通过 `https`\
  \ 访问一个网站时，你就是在使用该网站的 `B` 来加密你的传出数据，这样只有该网站才能读取它。\n\n此外——这点非常重要——你可以用你的私钥 `A` 来*签名*一条消息，而\
  \ `B`（公开的）可以*验证*签名。区块链上的交易就是这样被验证的。不过后续章节会更详细地讨论。让我们先看一些例子来加深理解。\n\n#### Python\
  \ 示例\n\n这里有一个来自优秀开源 Python `NaCL` 库的绝妙类比：\n\n> 想象一下，爱丽丝想要将一些有价值的东西运送到她手中。因为东西很贵重，她想确保它能安全送达（即，没有被打开或篡改），并且它不是伪造的（即，它确实来自她期望的发件人，没有人掉包）。\n\
  >\n> 一种实现方式是，她向发件人（我们称他为鲍勃）提供一个她精心挑选的高安全性盒子。她将这个盒子以及另一样东西提供给鲍勃：一把挂锁，但这是一把没有钥匙的挂锁。爱丽丝自己保留了那把钥匙。鲍勃可以把物品放进盒子，然后将挂锁锁上。但是一旦挂锁锁上，任何没有爱丽丝私钥的人都无法打开这个盒子。\n\
  >\n> 不过这里有个转折：鲍勃也在盒子上加了一把挂锁。这把挂锁使用了一把鲍勃已经向世界公开的钥匙，这样，如果你有鲍勃的一把钥匙，你就知道这个盒子来自他，因为鲍勃的钥匙会打开鲍勃的挂锁（让我们想象一个即使你知道钥匙也无法伪造挂锁的世界）。然后鲍勃把盒子寄给爱丽丝。\n\
  >\n> 为了打开盒子，爱丽丝需要两把钥匙：她的私钥，用来打开她自己的挂锁；以及鲍勃广为人知的钥匙。如果鲍勃的钥匙打不开第二把挂锁，那么爱丽丝就知道这不是她期望从鲍勃那里收到的盒子，这是伪造的。\n\
  >\n> 这种关于身份的双向保证被称为相互认证。\n\n我们将使用 `PyNaCl` 来用 Python 实现上述类比的一个示例。首先，让我们安装 `PyNaCl`：\n\
  \n注意\n\n顺便说一句，`PyNaCl` 是一个经过充分测试的库的绝佳例子，非常适合在你的项目中使用。最重要的是——对于一个加密库来说——它有大量带示例的优秀文档。你可以在这里阅读更多：[`https://pynacl.readthedocs.io/en/stable/public/`](https://pynacl.readthedocs.io/en/stable/public/)\n\
  \n```\npoetry add pynacl\n```\n\n然后让我们激活虚拟环境并启动一个 Python 解释器：\n\n```\npoetry shell\n\
  ipython\n```\n\n我们将使用给出的类比来深入解释这些概念。鲍勃和爱丽丝都将生成他们自己的公私钥对，鲍勃将加密一条消息给爱丽丝，供她解密。PyNaCl\
  \ 为我们提供了一个非常有用的 `Box` 类，它模拟了上述类比。\n\n我们开始吧：\n\n```\nfrom nacl.public import PrivateKey,\
  \ Box\n#### 为爱丽丝和鲍勃生成密钥\nalices_private_key = PrivateKey.generate()\nbobs_private_key\
  \ = PrivateKey.generate()\n#### 公钥由私钥生成\nalices_public_key = alices_private_key.public_key\n\
  bobs_public_key = bobs_private_key.public_key\n#### 鲍勃将发送一条消息给爱丽丝...\n# 所以他用他的私钥和爱丽丝的公钥创建了一个\
  \ Box\nbobs_box = Box(bobs_private_key, alices_public_key)\n#### 我们加密鲍勃的秘密消息（字节形式）...\n\
  encrypted = bobs_box.encrypt(b\"I am Satoshi\")\n# 爱丽丝用她的私钥和鲍勃的公钥创建了第二个 Box，这样她就能解密该消息\n\
  alices_box = Box(alices_private_key, bobs_public_key)\n#### 现在爱丽丝可以解密消息：\nplaintext\
  \ = alices_box.decrypt(encrypted)\nprint(plaintext.decode('utf-8'))\nI am Satoshi\n\
  ```\n\n如果消息被篡改或无法解密，`PyNaCl` 将抛出一个异常。\n\n\n\n### 数字签名\n\n数字签名的存在原因，与你在现实生活中签署文件的原因大致相同：它能让接收方对文件的真实性深信不疑。数字签名能满足以下三个关键主张：\n\
  \n1.  **真实性**：“这必然是丹尼尔签署的。”\n2.  **完整性**：“这份数据未被伪造或篡改。”\n3.  **不可抵赖性**：“丹尼尔无法否认曾发送过这份数据。”\n\
  \n数字签名利用公钥密码学来满足这些主张。正如我们在示例中，爱丽丝用鲍勃的公钥创建了一个“盒子”，我们同样使用鲍勃的公钥来验证，只有鲍勃才能发送并签署一份数据。其核心思想很简单：任何拥有我公钥的人，都能快速验证我确实签署了一条消息。\n\
  \n下图展示了这一思想。\n\n![../images/475256_1_En_6_Chapter/475256_1_En_6_Fig2_HTML.jpg](img/475256_1_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2** – 数字签名过程\n\n1.  首先，对未加密的纯文本数据进行哈希处理（防止篡改）。\n2.  然后，使用私钥对哈希值进行加密。\n3.\
  \  最后，将加密后的哈希值附加（拼接）到数据上。\n\n让我们看看在 Python 中如何实现。首先，从鲍勃的角度出发，我们将创建一个密钥对；然后用它对一条消息进行签名。之后，我们将展示任何人都可以使用该公钥来验证这条消息。\n\
  \n```\n1  import nacl.encoding\n2  import nacl.signing\n4  # 为鲍勃生成一个新的密钥对\n5  bobs_private_key\
  \ = nacl.signing.SigningKey.generate()\n6  bobs_public_key = bobs_private_key.verify_key\n\
  8  # 由于是字节数据，我们需要将密钥序列化为可读格式后再发布：\n9  bobs_public_key_hex = bobs_public_key.encode(encoder=nacl.encoding.HexEncoder)\n\
  11  # 现在，用它来签署一条消息\n12  signed = bobs_private_key.sign(b\"请向爱丽丝发送 37 美元\")\n```\n\
  \n在第 `10` 行生成的公钥（十六进制）如下：\n\n```\ne7ff10ede8a691b982516059a0627d369504e3633e0297e28ec5fc71994577d3\n\
  ```\n\n首先，我们来看看第 `12` 行中的 `signed` 消息是什么样的。如你所见，消息本身并未加密！但它附加了一些包含签名字节的数据：\n\n```\n\
  b'\\x9fq\\x02\\xe1o\\xb8y2\\xc7\\xe7@9$\\xc4\\xb2\\xa4\\xe1+97.>\\r\\xcaGG\\x8a\n\
  Y\\x86\\xc3\\xfe\\xb9W{\\xc4\\x9c\\x87\\x00(\\x1d\\xe9}j\\xe4\\xed\\xd2\\x0b\\xcb\\\
  x88\\x87J\\xecy\\x04GQ\nH\\xea\\xcc\\xc2\\xe7\\x03 请向爱丽丝发送 37 美元'\n```\n\n#### 验证过程\n\
  \n验证过程使用签名者的公钥来检查签名。\n\n![../images/475256_1_En_6_Chapter/475256_1_En_6_Fig3_HTML.jpg\n\
  \n**图 6-3** – 验证数字签名\n\n让我们看看如何用公钥来验证该消息确实由鲍勃签署：\n\n```\n1  import nacl.encoding\n\
  2  import nacl.signing\n5  # 来自上述示例...\n6  bobs_public_key = b'e7ff10ede8a691b982516059a0627d369504e3633e0297e28ec5fc71994577d3'\n\
  8  # 我们生成 verify_key\n9  verify_key = nacl.signing.VerifyKey(bobs_public_key, encoder=nacl.encoding.HexEncoder)\n\
  11  signed_message = b'\\x9fq\\x02\\xe1o\\xb8y2\\xc7\\xe7@9$\\xc4[\\xb2\\xa4\\xe1+97.>\\\
  r\\xca GG\\x8a Y\\x86\\xc3\\xfe\\xb9W{\\xc4\\x9c\\x87\\x00(\\x1d\\xe9}j\\xe4\\xed\\\
  xd2\\x0b\\xcb\\x88\\x87 J\\xecy\\x04GQH\\xea\\xcc\\xc2\\xe7\\x03 请向爱丽丝发送 37 美元'\n\
  13  # 现在我们尝试验证消息\n14  # 任何验证失败都将引发异常\n15  verify_key.verify(signed_message)\n```\n\
  \n**注意：** 上面的示例是否清晰易懂？建议你暂停一下，在 Python 解释器中亲自尝试，直到掌握使用 NaCl 的要领。随着我们进入下一章关于交易的内容，它会变得愈发重要。\n\
  \n## 区块链上的钱包\n\n与比特币不同，以太坊采用的是基于账户的模型——这意味着区块链上的每个“用户”都会拥有一个账户。比特币没有*账户*的概念；相反，它的系统非常类似于现金在实物钱包中的流入和流出方式。比特币系统被称为\
  \ UTXO（未花费交易输出），这是一种用于建模交易的优雅数据结构。我们将在下一章讨论 UTXO，但现在先让我们专注于以太坊的基于账户的模型。\n\n当你首次与以太坊交互时，通常会生成一个密钥对。你的以太坊*地址*实际上就是你的公钥。你的私钥则被安全地存储在某处，可能是某种软件钱包或硬件钱包中。如果其他人想通过以太坊区块链向你转账，他们只需要知道你的公钥即可。但只有你能动用这笔钱，因为只有你持有私钥。\n\
  \n### 创建交易节点\n\n要实现一个功能完备的加密货币，我们区块链中的数据必须是*交易*。每笔交易都将代币的所有权从一个私钥转移到另一个私钥。这些交易被打包到每个区块中，并通过*挖矿*过程来扩展区块链；事实上，区块存在的时间越久，其确定性就越高——它成为事实区块链一部分的可能性就越大。在任何时候，矿工们都在忙于挖掘包含不同交易的、略有差异的区块——这是一场寻找新区块的竞赛——当某个矿工找到一个区块时，他会广播该区块，其他矿工则会放弃自己当前的区块（他们在竞赛中失败了）并开始寻找下一个区块。这些被“放弃”的区块通常称为孤块。\n\
  \n在本章中，我们将整合之前学到的所有概念，并将它们融入一个能够在点对点网络中运行的全节点。然后，利用上一章的密码学知识，我们将阐明交易是如何创建和验证的。\n\
  \n## 交易与工作量总结\n\n### 脱离比特币的 UTXO 模型\n\n如果你曾研究过比特币，那么很可能听说过 UTXO，或者更正式的名称——未花费交易输出（UTXO）。这个模型很优雅，因为它类似于现实世界中硬通货的运作方式——没有账户的概念：金钱以“纸币”的形式存在，可能存放在某人的钱包（公钥）中。UTXO\
  \ 与基于账户的模型形成对比，后者大致类似于你银行账户的工作方式：你给别人你的账号，他们就能向你的账户转账。一些加密货币（最著名的是以太坊）就采用这种基于账户的模型。\n\
  \n我们将要实现的正是这个模型，因为它易于推理、测试和解释。我们在设计类时将使其能够方便地替换为 UTXO 模型（将此作为练习留给读者）。\n\n### 矿工的角色\n\
  \n正如我们在第 4 章所见，矿工的角色是通过为区块找到合适的哈希值来生成新的代币。在挖矿过程中，矿工会将收到的交易收集到一个池子中——在比特币中被称为 `mempool`（内存池）——等待被纳入下一个区块。如果等待交易的量超过了区块的容量，矿工会选择手续费最高的交易以增加利润。在\
  \ 2017 年的加密货币热潮中，由于交易积压严重，比特币交易的手续费一度超过了 40 美元。关于比特币扩容的讨论经常涉及交易内存池和交易费用，其中最关键的问题是区块大小：一个区块中应该存储多少笔交易？在比特币中，限制是\
  \ 1 兆字节，平均大约能容纳 1700 笔交易。\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您的指示，对给定的英文文本进行翻译。翻译将严格遵循注意事项中的格式要求，包括保留粗体、斜体、内联代码、链接、列表、表格和代码块的格式，并翻译其中的内容。\n\
  \n\n### 我们将如何实现交易\n\n我们将对我们的 funcoin 节点进行一些改动；具体来说，我们必须找出交易如何在整个网络中传播。点对点（P2P）网络的结构方式对于加密货币的可靠性至关重要。比特币被认为是一种“推送”（push）网络：不是节点向对等节点查询新交易，而是当一个节点收到新交易时，它会将该交易*推送*给它的所有对等节点。宽松地说，当一个新节点加入网络时，它应该会产生一种*八卦*（gossip）效应，从而使得对等节点的对等节点也能了解到它的存在，并能够可靠地向它发送未来的交易。\n\
  \n交易的数据结构很简单，包含以下内容：\n\n![../images/475256_1_En_7_Chapter/475256_1_En_7_Fig1_HTML.jpg](img/475256_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n使用数字签名创建交易\n\n1.  发送者的公钥\n2.  接收者的公钥\n3.  要转移的金额\n4.  一个公示的费用（可以理解为“小费”，用于激励矿工将这笔交易包含在下一个区块中）\n\
  \n为了发送或接收 funcoin，我们需要生成一个钱包——一个公私钥对。要发送 funcoin 给 Beatrix，Aldo 必须创建一笔包含他和 Beatrix\
  \ 的公钥以及要发送的金额的交易。然后，这笔交易会使用 Aldo 的私钥进行签名。\n\n网络中的任何对等节点都可以通过检查 Aldo 的公钥来验证该交易是否真实有效。如果交易通过了验证，那么稍后，当有矿工将其打包时，它就会被添加到区块链中。\n\
  \n## 勘误与变更\n\n随着依赖项和库的变更，以及人们发现这个初始实现中的错误，随着时间的推移，实际运行的代码与图书内容出现差异是不可避免的，希望这种差异是微小的。如果您需要寻求帮助，请随时查阅公共\
  \ GitHub 仓库：[`https://github.com/dvf/learn-blockchains-book/`](https://github.com/dvf/learn-blockchains-book/)。\n\
  \n## 为我们的全节点创建项目\n\n### 安装依赖项\n\n在项目的这个阶段，我们已经涵盖了构建节点所需的所有原子单元：\n\n-   一个用于维护不可变数据链的区块链\n\
  -   一个允许客户端连接并来回发送数据的服务器\n-   一个用于创建新 funcoin 的挖矿算法\n-   允许我们验证和构建交易的密码学基础知识\n\n\
