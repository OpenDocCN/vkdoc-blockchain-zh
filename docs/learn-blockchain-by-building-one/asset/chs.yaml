- "# 1. 为应用开发做好准备\n\n对于不熟悉的人来说，Python 是最流行的语言之一。它被广泛使用于各个领域——从学术界、科学领域到像 Instagram\
  \ 这样的大型网络应用。其受欢迎的部分原因在于其拥有大量免费在线的库、包和扩展，以及由于其类似伪代码而易于阅读。\n\n在本章中，我们将确保你的计算机已为应用开发正确配置，并且\
  \ Python 已正确安装。然后，我将向你展示如何创建一个实用的 Python 项目以及如何安装依赖项。\n\n## Python 版本\n\nPython\
  \ 有两个版本：版本 2 和版本 3。版本 2 已不再受 Python 软件基金会支持，但由于许多内部工具仍在使用它，因此大多数操作系统仍预装了它。另一个复杂因素是，不同的操作系统将\
  \ Python 安装在文件系统的不同位置。这些因素使得设置开发环境变得棘手。\n\n我们将尝试通过安装和使用有助于管理 Python 安装的工具来克服这些障碍。\n\
  \n> **注意**  \n> 按照惯例，在本书中，我们将在终端命令前加上 `$` 符号。输出将以纯文本形式显示。\n\n## 安装 Python\n\n###\
  \ Windows 系统安装\n\n`Python.org` 包含适用于 Windows 的可下载二进制文件。前往 [`www.python.org/downloads/windows/`](http://www.python.org/downloads/windows/)\
  \ 下载 Python 3.8 的二进制文件。\n\n下载完成后，安装 Python 3.8，确保选择以下选项：\n\n-   卸载 Python 的先前版本。\n\
  -   安装 `pip`（Python 包管理器）。\n-   将 Python 添加到 `PATH` 环境变量（允许你在命令行中执行 Python）。\n\n\
  安装完成后，为了确认一切设置正确，打开命令行并检查 Python 版本：\n\n```\nC:\\Users\\dan> python --version\n\
  3.8.3\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### macOS\
  \ 安装\n\n尽管 macOS 自带了一个内部使用的 Python 版本，但我们在开发时并不想修改它，因此我们将使用 Homebrew——一个用于在 macOS\
  \ 上帮助管理和安装第三方包的工具——来安装一个全新的 Python 版本。\n\n首先，我们需要确保安装 Apple 的命令行工具，请在终端中执行：\n\n\
  ```\n$ xcode-select --install\n```\n\n你需要安装 *Homebrew*，这是一个 macOS 上的包安装器。要安装它，请遵循\
  \ [`https://brew.sh/`](https://brew.sh/) 上的说明，并确保 Homebrew 已正确安装。\n\n安装完 Homebrew\
  \ 后，让我们安装最新版本的 Python：\n\n```\n$ brew install python\n```\n\n安装完成后，请验证 Python 是否已正确安装：\n\
  \n```\n$ python --version\nPython 3.8.3\n```\n\n### Linux 安装\n\n如果你使用的是基于 Debian\
  \ 的 Linux 版本，你可以使用 `apt`（或任何其他包管理器）来安装 Python 3.8：\n\n```\n$ sudo apt-get update\n\
  $ sudo apt-get install python3.8\n```\n\n安装完成后，请验证 Python 是否已正确安装：\n\n```\n$ python\
  \ --version\nPython 3.8.3\n```\n\n如果你使用的不是基于 Debian 的 Linux 发行版，你可以从源代码编译 Python：[`www.python.org/downloads/source/`](http://www.python.org/downloads/source/)。\n\
  \n## Python 程序如何运行\n\n当你安装 Python 时，你实际上是在安装一个*解释器*——一个将你编写的 Python 代码翻译成计算机能够理解和执行的指令的程序。你安装的解释器叫做\
  \ CPython，这是一个用 C 语言编写的流行解释器。\n\n你通过在终端中将 Python 程序提供给 Python 解释器来运行它：\n\n```\n\
  $ python my_program.py\n```\n\n这会将你的代码转换为“计算机指令”并执行它们。\n\n你的操作系统如何知道 Python 解释器的位置？\n\
  \n你的操作系统有一个名为 `PATH` 的系统级变量，其中包含一个在查找程序时要遍历的文件路径列表。你可以通过在终端中运行 `echo $PATH` 来检查它的设置。Python\
  \ 解释器位于 `/usr/local/bin/`。这可以通过调用 `which python` 来验证。\n\n## 管理项目依赖\n\n你构建的每个项目都可能使用到外部库。这些依赖可能是数据库访问库，或是解析文档或网站所需的工具，但重点是它们要被包含在你的项目中。\n\
  \n管理项目依赖可能是一项棘手的任务，因为不同的依赖有不同的要求——有些依赖需要特定版本的 Python，其他的可能依赖于兄弟依赖。现代 Python 项目使用包管理器来应对下载、安装和保持依赖更新的艰巨任务。总之，使用包管理器能让你的工作更轻松。\n\
  \nPoetry 是 Python 的众多依赖管理器之一。还有其他更流行的，比如 Pipenv。但在广泛使用了两者之后，我发现 Poetry 拥有更简洁的界面，并且其目标更加务实。\n\
  \n### 安装 Poetry\n\n安装 Poetry 的推荐方法是在你的终端中运行以下命令：\n\n```\n$ curl -sSL https://raw.githubusercontent.com/sdispater/poetry/master/get-poetry.py\
  \ | python\n```\n\n如果遇到任何问题，请参考 Poetry 网站上的官方文档和安装说明：[`https://poetry.eustace.io/docs/`](https://poetry.eustace.io/docs/)\n\
  \n通过在 shell 中调用 Poetry 来验证它是否已正确安装：\n\n```\n$ poetry\nPoetry version 1.0.9\nUSAGE\n\
  poetry [-h] [-q] [-v []] [-V] [--ansi] [--no-ansi] [-n]  [] ... []\nARGUMENTS\n\
  \               The  command  to  execute\n                   The arguments of the\
  \ command\nGLOBAL OPTIONS\n-h (--help)             Display this help message\n-q\
  \ (--quiet)            Do not output any message\n-v (--verbose)          Increase\
  \ the verbosity of messages: \"-v\" for normal output, \"-vv\" for more verbose\
  \ output, and \"-vvv\" for debug\n-V (--version)          Display this application\
  \ version\n--ansi                  Force ANSI output\n--no-ansi               Disable\
  \ ANSI output\n-n (--no-interaction)   Do not ask any interactive question\nAVAILABLE\
  \  COMMANDS\nabout                   Shows information about Poetry.\nadd      \
  \               Adds a new dependency to pyproject.toml.\nbuild                \
  \   Builds a package, as a tarball and a wheel by default.\nCache              \
  \     Interacts with Poetry's cache.\ncheck                   Checks the validity\
  \ of the pyproject.toml file.\nconfig                  Manages configuration settings.\n\
  debug                   Debugs various elements of Poetry.\nenv                \
  \     Interacts with Poetry's project environments.\nexport                  Exports\
  \ the lock file to alternative formats.\nhelp                    Displays the manual\
  \ of a command.\ninit                    Creates a basic pyproject.toml file in\
  \ the current directory.\ninstall                 Installs the project dependencies.\n\
  lock                    Locks the project dependencies.\nnew                   \
  \  Creates a new Python project at .\npublish                 Publishes a package\
  \ to a remote repository.\nremove                  Removes a package from the project\
  \ dependencies.\nrun                     Runs a command in the appropriate environment.\n\
  search                  Searches for packages on remote repositories.\nself    \
  \                Interacts with Poetry directly.\nshell                   Spawns\
  \ a shell within the virtual environment.\nshow                    Shows information\
  \ about packages.\nupdate                  Updates the dependencies as according\
  \ to the pyproject.toml file.\nversion                 Shows the version of the\
  \ project or bumps it when a valid bump rule is provided .\n```\n\n### 使用 Poetry\
  \ 创建一个 Python 项目\n\n让我们用 Poetry 创建一个新项目：\n\n```\npoetry new my-project\n```\n\n\
  这将在名为 `my-project` 的文件夹中创建以下“标准”的 Python 项目结构：\n\n```\n.\n├── README.rst\n├── my_project\n\
  │  └── __init__.py\n├── pyproject.toml\n└── tests\n├── __init__.py\n└── test_my_project.py\n\
  ```\n\n这里最重要的文件是 `pyproject.toml`，它描述了项目及其依赖关系。它使用一种名为 `TOML` 的标记格式编写：\n\n```\n\
  [tool.poetry]\nname = \"my-project\"\nversion = \"0.1.0\"\ndescription = \"\"\n\
  authors = [\"Daniel van Flymen \"]\n[tool.poetry.dependencies]\npython = \"³.8\"\
  \n[tool.poetry.dev-dependencies]\npytest = \"⁵.2\"\n[build-system]\nrequires = [\"\
  poetry>=0.12\"]\nbuild-backend = \"poetry.masonry.api \"\n```\n\n请注意，我们现在唯一的依赖项是\
  \ Python `³.8`，这表明你的项目需要 `3.8.0` 到 `4.0.0` 之间的*任何* Python 版本。Poetry 还添加了 `pytest`\
  \ 作为用于运行测试的 `dev` 依赖项，但我们稍后会讲到这一点。\n\n\n\n### 安装依赖\n\n最流行的 Python 库之一是 `requests`\
  \ 库，它使我们能够轻松发起 HTTP 请求。我们来安装它：\n\n```\n$ poetry add requests\nCreating virtualenv\
  \ my-project-py3.8 in /Users/dvf/Library/Caches/pypoetry/virtualenvs Using version\
  \ ².22 for requests\nUpdating dependencies\nResolving dependencies... (0.7s)\nWriting\
  \ lock file\nPackage  operations:  14  installs, 0 updates, 0 removals\n- Installing\
  \  more-itertools  (7.2.0)\n- Installing zipp (0.6.0)\n- Installing importlib-metadata\
  \ (0.23)\n- Installing atomicwrites (1.3.0)\n- Installing attrs (19.3.0)\n- Installing\
  \ certifi (2019.9.11)\n- Installing chardet (3.0.4)\n- Installing idna (2.8)\n-\
  \ Installing pluggy (0.13.0)\n- Installing py (1.8.0)\n- Installing six (1.12.0)\n\
  - Installing urllib3 (1.25.6)\n- Installing pytest (3.10.1)\n- Installing requests\
  \ (2.22.0)\n```\n\n使用 `poetry add requests` 这一语法会导致以下一系列事情发生：\n\n1. 在 `/Users/dvf/Library/Caches/pypoetry/virtualenvs/my-project-py3.8`\
  \ 创建了一个“虚拟环境”（virtualenv）。虚拟环境是一个包含 Python 解释器和项目所需包的文件夹，这样就不会污染系统的其他部分。\n\n2. 从\
  \ Python 的包索引 [`https://pypi.org`](https://pypi.org) 下载了最新版本的 `requests` (2.22.0)。\n\
  \n3. `requests` 所依赖的所有依赖项也被一并下载了。这些被称为子依赖。\n\n4. 所有下载的包都被安装到了项目的虚拟环境中。\n\n我们现在已经准备好开始构建并与我们的依赖进行交互了。\n\
  \n## 激活虚拟环境\n\n在运行你的项目之前，你需要激活虚拟环境。也就是说，告诉你的计算机去使用由 Poetry 管理的虚拟环境中的 Python 解释器。\n\
  \n首先，让我们检查一下我们当前正在使用的 Python 解释器：\n\n```\n$ which python\n/usr/local/bin/python\n\
  ```\n\n让我们激活虚拟环境：\n\n```\n$ poetry shell\nSpawning shell within /Users/dvf/Library/Caches/pypoetry/virtualenvs/my-project-py3.8\n\
  ```\n\n现在，让我们验证一下我们正在使用的 Python 解释器是否是 Poetry 虚拟环境中的那个：\n\n```\n$ which python\n\
  /Users/dvf/Library/Caches/pypoetry/virtualenvs/my-project-py3.8/bin/python\n```\n\
  \n遇到问题了？\n\n如果你遇到了问题，那么你应该小心地关闭并重新打开你的终端，并严格按照本章开头部分的说明进行操作。如果仍然卡住，那么很可能是你的 `PATH`\
  \ 变量有问题。\n\n我建议你仔细阅读 Poetry 的文档以确保你已遵循所有步骤，因为自从本书出版以来，该软件可能已经发生了变更。\n\n## 示例：获取比特币价格\n\
  \n让我们通过编写一些代码来小试牛刀，这些代码会从交易所获取当前的比特币现货价格。\n\n首先，在 `my-project/my_project` 目录下创建一个名为\
  \ `current_price.py` 的文件。你的文件夹结构应如下所示：\n\n```\n.\n├── README.rst\n├── my_project\n\
  │  ├── __init__.py\n│  └── current_price.py\n├── pyproject.toml\n└── tests\n├──\
  \ __init__.py\n└── test_my_project.py\n```\n\n我们将使用刚刚安装的 `requests` 库来获取以美元计的价格。在\
  \ `current_price.py` 中输入以下代码：\n\n```\nimport requests\nresponse = requests.get(\"\
  https://api.coinbase.com/v2/prices/spot?currency=USD\")\nprint(response.text)\n\
  ```\n\n好的，保存你的文件。让我们运行它：\n\n```\n$ poetry run python my_project/current_price.py\n\
  {\"data\":{\"base\":\"BTC\",\"currency\":\"USD\",\"amount\":\"9161.25\"}}\n```\n\
  \n在前面这个命令中，注意其中的 `poetry run...` 部分。这是一种快捷方式，用于启用虚拟环境并在此环境中运行命令的其余部分。等价地，你也可以使用\
  \ `poetry shell` 来启用虚拟环境，然后运行命令。\n\n如果你仔细查看输出，你会看到价格为 `$9161.25`。\n\n## 总结\n\n总而言之，我们涵盖了：\n\
  \n1. 在你的机器上安装一个全新的 Python 3.8 解释器\n\n2. 使用 Poetry 为一个新项目创建并安装依赖（从本章开始，我们将在后续的每一章都这样做）\n\
  \n3. 通过使用 `requests` 库调用 API 来获取最新的比特币价格\n\n现在你已经设置好了项目结构，我们准备深入并开始在实践中学习。\n\n"
- "# 2. 识别万物的方法\n\n如果你对区块链和加密货币感兴趣，那么你可能听说过哈希。哈希的概念是密码学的基石——是区块链基础设施中的关键要素。在本章中，你将掌握哈希的实用知识以及它为何如此重要。\n\
  \n## 项目设置\n\n本着在实践中学习的精神，我们将创建一个新项目，并将在每个章节中逐步对其进行扩展。我们将其命名为 `funcoin`：\n\n```\n\
  $ poetry new funcoin\n```\n\n跳转到 `funcoin` 文件夹：\n\n```\n$ cd funcoin\n```\n\n`funcoin`\
  \ 文件夹应该如下所示：\n\n```\n.\n├── funcoin\n│  └── __init__.py\n├── pyproject.toml\n└──\
  \ tests\n├── __init__.py\n└── test_funcoin.py\n```\n\n项目结构\n\n这个文件夹结构大致是所有现代 Python\
  \ 项目的标准样式。它由 PEP（Python 增强提案）518 定义。当你创建新项目时，Poetry 强制执行了这种文件夹结构。\n\n为了学习本章内容，我们创建一个文件；在*项目文件夹*\
  \ `funcoin` 中，将其命名为 `chapter_2.py`。你的项目文件夹现在应该如下所示：\n\n```\n.\n├── README.rst\n\
  ├── funcoin\n│  ├── __init__.py\n│  └── chapter_2.py\n├── pyproject.toml\n└── tests\n\
  ├── __init__.py\n└── test_funcoin.py\n```\n\n## 哈希函数\n\n理论上，**哈希** 是识别数据的行为。它是一种特殊的方法，可以为任何数据（无论是句子、照片、电子表格还是下载的程序）分配一个唯一的、随机的值。你可以将哈希函数视为“识别机器”——一种为特定输入分配值的机器。输入是任意的——可以是图像、文档、文件、原始字节、数字，任何你喜欢的东西——但对于**相同的输入，其输出总是可预测的**。\n\
  \n命名约定\n\n人们倾向于将术语 **哈希** 同时用作动词和名词：“看看这张照片的哈希值”（名词），或者“让我们对以下文件进行哈希”（动词）。哈希函数输出的正确术语是“摘要”，但“哈希”已经成为普遍用法。\n\
  \n唯一性\n\n前面第二句话声称哈希值是唯一且随机的——这稍微有些不准确。在本书中，我们处理的是特殊类型的哈希函数，称为密码学哈希函数，其中计算出的哈希值是从一个足够大的值池中选择的，以至于在已知宇宙中，两个输入共享一个值的可能性极低。所以，修改一下上面的说法：哈希值实际上是*在可实际达到的范围内最接近唯一的*。\n\
  \n\n\n### 示例 1：Python 中的哈希运算\n\nPython 内置了常用的标准哈希函数集，这些函数位于 `hashlib` 库中。我们启动 Python\
  \ 并开始使用它们。\n\n```\nimport hashlib\n# 哈希函数期望输入为字节：encode() 方法可将字符串转换为字节\ninput_bytes\
  \ = b\"backpack\"\noutput = hashlib.sha256(input_bytes)\n# 我们使用 hexdigest() 将字节转换为十六进制，因为更易读\n\
  print(output.hexdigest())\n```\n\n你得到的输出是什么？应该是如下所示：\n\n```\n5f00368a6ad231c3c439c4f6bc33c27014b4d35a904ff1656d74f9528636f496\n\
  ```\n\n现在，尝试将 `\"backpack\"` 中的某个字母改为大写。尝试在末尾添加一个空格。每次调整输入后都进行实验。你是否注意到生成的哈希值*完全*不同？很好。那么你刚刚发现了*雪崩*特性：输入的微小变化会导致输出的巨大差异。\n\
  \n通常，如果一个哈希函数满足以下特性，则被认为是**加密**哈希函数：\n\n-   **确定性：** 相同的输入始终产生相同的哈希值。\n-   **难解性：**\
  \ 除了通过穷举（尝试海量可能的输入）之外，无法根据给定的哈希值找到对应的输入。\n-   **碰撞安全性：** 无法找到两个产生相同哈希值的不同输入。\n-\
  \   **雪崩效应：** 输入的微小变化应产生一个与旧哈希值看似毫无关联的全新哈希值。\n-   **速度：** 生成哈希值的计算速度*很快*。\n\n##\
  \ 哈希函数的选择\n\n点对点区块链会在其协议中声明所选的哈希函数：比特币使用*双重* `sha256`，而以太坊使用 `keccak256`。需要了解的重要一点是，所有这些哈希函数都做同一件事：对给定输入提供可预测的输出。\n\
  \n让我们回顾一下目前学到的知识。\n\n| 术语 | 解释 | 示例 |\n| --- | --- | --- |\n| 哈希函数 | 一种通过输出一个巨大的、随机的十六进制数来标识你输入的任何内容的函数。对于相同的输入，该数字*始终*相同。\
  \ | 一种加密哈希函数，例如 `sha256`、`md5`、`blake2b` 等。 |\n| 哈希值/摘要 | 哈希函数的输出：一个巨大的、随机的十六进制数。\
  \ | 单词 `\"dan\"` 的哈希值：`ec4f...f1cb` |\n\n### 示例 2：为图像进行哈希运算\n\n这是一张 100 美元钞票的图片。\n\
  \n![../images/475256_1_En_2_Chapter/475256_1_En_2_Fig1_HTML.jpg](img/475256_1_En_2_Fig1_HTML.jpg)\n\
  \n这张图片的**哈希值**是 `e25641dc52387baba19751783ae4e060`。\n\n这是同一张图片，但做了细微修改。\n\n![../images/475256_1_En_2_Chapter/475256_1_En_2_Fig2_HTML.jpg](img/475256_1_En_2_Fig2_HTML.jpg)\n\
  \n你能发现修改之处吗？可能能，也可能不能。仔细看看。（我把单词 `\"STATES\"` 改成了单数。）但有趣的是：如果我对这张图片运行哈希函数，结果会是 `f4c56f530133b8de6b3b0b39a610be32`。这看起来可能并不惊人，但如果比较这两个哈希值，你会发现它们截然不同且看似随机。我将它们并列展示：\n\
  \n```\ne25641dc52387baba19751783ae4e060\nf4c56f530133b8de6b3b0b39a610be32\n```\n\
  \n> **注：** 比特币背后的突破性理念是，哈希值可以用来证明计算机完成过工作量——我们将在后续章节中探讨这一点，但就目前而言，请记住比特币利用了加密哈希值的明显“随机性”。\n\
  \n让我们尝试用 Python 为我们自己的图片（或文件）计算哈希值。\n\n```\nfrom hashlib import sha256\nfile = open(\"\
  my_image.jpg\", \"rb\")\nhash = sha256(file.read()).hexdigest()\nfile.close()\n\
  print(f\"The hash of my file is: {hash}\")\n```\n\n让我们逐行审视并解释上述代码：\n\n```\nfrom\
  \ hashlib import sha256\n```\n\n这一行从 Python 自带的 `hashlib` 库中导入了 `sha256` 哈希函数。`sha256`\
  \ 是最流行的哈希函数之一（在比特币中被广泛使用）。\n\n这里，我们打开一个名为 `my_image.jpg` 的文件，该文件位于代码所在的同一目录：\n\n\
  ```\nfile = open(\"my_image.jpg\", \"rb\")\n```\n\n参数 `\"rb\"` 表示该文件应以只读模式打开，并以字节形式读取。\n\
  \n```\nhash = sha256(file.read()).hexdigest()\n```\n\n然后我们将打开的文件读入哈希函数，如：`sha256(file.read())`，并将\
  \ `hexdigest()`（即以十六进制字符串形式输出的结果）赋值给一个名为 `hash` 的变量。\n\n最后，我们关闭打开的文件并将哈希值打印到终端。\n\
  \n## 验证从互联网下载的文件\n\n你可以使用上述脚本验证下载的文件是否未被第三方篡改。信誉良好的网站会公布文件应有的哈希值（有时称为校验和），以便你在本地进行验证。\n\
  \n### 类比\n\n如果你仍然感到困惑，这里有一个现实生活中的类比，可以帮助你更深入地理解这个想法。\n\n想象一下你在机场通过安检，将背包放在传送带上。但传送带配备了一种特殊的扫描仪——一种能够对您的物品进行\
  \ X 光扫描并输出哈希值的机器。\n\n背包被扫描后，扫描仪会吐出一个标识您背包的 8 位数字哈希值：`13371817`。如果你的背包及其所有物品完全相同，扫描仪将始终输出相同的数字。但如果你决定从背包中取出一个物品，扫描仪会返回一个完全不同的数字。\n\
  \n## 不可逆性\n\n正如我们讨论过的，区块链使用了**加密**哈希函数，这些哈希函数极难逆转。这意味着，如果我们拿到一个哈希值，想要猜出原始输入是什么是极其困难的（达到超级计算机级别）。\n\
  \n在前面的例子中，如果我给你哈希值 `e25641dc52387baba19751783ae4e060`，你几乎不可能猜出它是一张 100 美元钞票的照片。\n\
  \n理解这个概念至关重要，因为它构成了比特币乃至整个区块链安全性的基础。正如我们稍后将看到的，还有许多具有不同特性的不同哈希函数。\n\n### 示例 3：发送防篡改的电子邮件\n\
  \n## 问题\n\n爱丽丝想通过开放互联网等不安全渠道向鲍勃发送一封电子邮件。鲍勃并不在意其他人能否阅读邮件内容，但他希望确保邮件未被篡改。鲍勃如何验证邮件信息未被篡改？\n\
  \n> **注：** 在我们给出解决方案之前，运用你刚刚掌握的哈希知识，你能想到如何设计这样的方案吗？\n\n\n\n### 解决方案\n\n整体思路是让爱丽丝和鲍勃事先约定一个共享密钥。然后爱丽丝从消息中删除密钥短语，将消息和哈希值一起发送给鲍勃。鲍勃随后执行与爱丽丝相同的操作：他附加预共享的密钥短语并输出一个哈希值。如果该哈希值与爱丽丝发送的不一致，他就知道消息已被篡改。\n\
  \n总结如下：\n\n1.  爱丽丝和鲍勃共享一个密钥短语 `S`。\n2.  爱丽丝将密钥附加到消息 `M` 的末尾，然后创建消息 `M` 的哈希值 `H`：`H\
  \ = hash(M + S)`。\n3.  爱丽丝将 `H` 和 `M`（即消息和计算出的哈希值）发送给鲍勃。\n4.  鲍勃自己计算 `H` 来检查消息的完整性，看其是否与爱丽丝公布的哈希值相同。\n\
  \n**注意**  \n这个通用方案描述了一系列称为 HMAC（哈希消息认证码）的协议，该协议由 IETF RFC 2104 定义。\n\n让我们看一个例子。在爱丽丝和鲍勃开始通信之前，他们都同意使用一个秘密密码\
  \ `bolognese`。爱丽丝使用给定的方案编写她的电子邮件。以下是鲍勃收到它时的样子：\n\n```\n发件人: alice@example.com\n\
  主题: 你听说过比特币吗？\n嘿鲍勃，我认为你应该了解一下区块链！我一直在投资比特币，目前我的账户里正好有 12.03 BTC。\n哈希值: 71890dc61c21370874d2a7b74064396cb613a1924f09aa06925abc7842e6802c\n\
  ```\n\n鲍勃注意到爱丽丝在邮件正文中包含了哈希值。他将哈希值剥离，然后将密钥短语 (`bolognese`) 附加到邮件正文的末尾，并计算其哈希值。如果该哈希值与邮件正文中包含的哈希值匹配，那么他就可以断定消息没有被篡改（并且爱丽丝确实拥有\
  \ 12.03 BTC）。\n\n爱丽丝和鲍勃都必须知道他们将用于验证的协议，这非常重要。这包括要使用的哈希函数 (`sha256`)、密钥短语在消息中的放置位置（他们同意将其附加到末尾），以及任何可能进一步增强方案安全性的其他数据（例如时间戳）。\n\
  \n让我们看看鲍勃如何用 Python 验证爱丽丝的消息。\n\n```python\nfrom hashlib import sha256\nsecret_phrase\
  \ = \"bolognese\"\ndef get_hash_with_secret_phrase(input_data, secret_phrase):\n\
  combined = input_data + secret_phrase\nreturn sha256(combined.encode()).hexdigest()\n\
  email_body = \"嘿鲍勃，我认为你应该了解一下区块链！ \" \\\n\"我一直在投资比特币，目前我的账户里正好有 12.03 BTC。\"\nprint(get_hash_with_secret_phrase(email_body,\
  \ secret_phrase))\n```\n\n当鲍勃运行这段代码时，他就能验证爱丽丝的哈希值。\n\n## 防止垃圾邮件如何促成了工作量证明\n\n你知道哈希函数可以用来防止电子邮件垃圾邮件吗？这个想法背后的算法被称为“工作量证明”算法，它是比特币的核心。它由英国密码学家亚当·巴克于\
  \ 1997 年发明，他称之为 Hashcash。\n\n其总体思路是只接受哈希值满足特定约束的电子邮件。这会导致电子邮件发送者在发送邮件之前执行某种计算工作。换句话说，发送者想要向人们发送垃圾邮件的成本变得很高。\n\
  \n但是约束是什么呢？哈希值只是些数字，但它们看起来是随机的，所以我们可以应用任何我们想要的约束。我可以规定，任何给我发送电子邮件的人都必须提供该电子邮件的哈希值，并且该哈希值是一个奇数。但这并不是一个好的约束，因为发送者生成一个奇数哈希值的概率有\
  \ 50%。\n\nHashcash 算法应用的约束是：哈希值必须小于某个特定数字。这听起来简单得令人难以置信，但请思考一下：既然加密哈希函数对于给定的输入会输出一个随机数，我们如何确保邮件正文的哈希值是一个特定的数字呢？我们做不到。我们唯一能做的就是向邮件正文中插入任意数据，并不断尝试，直到我们的哈希值满足约束条件为止。\n\
  \n让我们看一个例子，同时设定约束条件为：邮件正文的哈希值必须小于 10,000。\n\n**注意**  \n为简单起见，我这里使用一个只输出十进制数的八位哈希函数。\n\
  \n```\n发件人: dan@example.com\n主题: 购买比特币！\n嘿伊森，我认为你应该买一些比特币！\n哈希值: 95119035\n```\n\
  \n**不行。** 这封邮件正文的哈希值是 `95119035`，它不小于 `10,000`。因此，发送者没有完成所需的工作：他必须确保邮件正文的哈希值满足约束条件。\n\
  \n发送者可以这样做的一种方法是在邮件正文中插入任意数据：\n\n```\n发件人: dan@example.com\n主题: 购买比特币！\n嘿伊森，我认为你应该买一些比特币！\n\
  s8763ASdh727212213098\n哈希值: 00000891\n```\n\n现在我们看到正文的哈希值是 `891`，满足我们的约束条件！（我用 0\
  \ 填充了哈希值，因为十六进制数字通常这样显示）。我们的邮件服务器会对邮件正文进行哈希运算，看到它确实是 `891`，并接受这封邮件。\n\n这就是工作量证明：通过展示一个特定的哈希值来证明工作已经完成，而服务器可以轻松验证。另一种理解这个方案的方式是，它生成困难但验证容易。\n\
  \n**注意**  \n正是这一关键思想，使得任何工作量证明区块链能够通过向网络中的每个人明确证明完成了计算工作来生成（或挖出）货币。通过利用加密哈希函数看似随机的特性，消耗了能量！\n\
  \n## 总结\n\n至此，你应该已经实际熟悉了哈希函数以及如何对任意数据进行哈希运算。总结一下，你应该能够自如地完成以下操作：\n\n1.  在 Python\
  \ 中导入 `hashlib` 库\n2.  在 Python 中对任何数据结构或二进制文件进行哈希运算\n3.  理解加密哈希函数在实际上极难逆向\n\n*还是没理解要点？*\n\
  \n没关系。这本来就不容易。如果你对哈希函数仍不确定，值得在此暂停，重新阅读这一章，直到理解透彻为止。可以说，这是区块链数据结构最重要的方面，也是我们后续将要广泛使用的。\n\
  \n"
- '# 3. 区块链


  在本章中，我们将通过使用 Python 中的简单数据类型，一头扎进区块链的世界。学完本章后，你将从根本上理解区块链是什么、其内部结构，以及哈希函数如何使其具有韧性。


  上一章的概念对于理解为什么区块链被认为是不可篡改的至关重要。我们已经了解了如何发送不可篡改的电子邮件。我们将扩展这些想法，从头构建一个区块链，并清晰理解所涉及的数据结构，从而说明为什么在区块链上进行欺诈是不可能的。


  让我们开始吧。




  ## 区块长什么样？


  我们的区块是简单的 Python 字典。以下是一个区块在 Python 中的示例：


  ```

  block_1038 = {

  ''index'': 1038,

  ''timestamp'': "2020-02-25T08:07:42.170675",

  ''data'': [

  {

  ''sender'': "bob",

  ''recipient'': "alice",

  ''amount'': "$5",

  }

  ],

  ''hash'': "83b2ac5b",

  ''previous_hash'': "2cf24ba5f"

  }

  ```


  每个区块都有上述基本结构，但我希望你关注最后两个字段：`hash`和`previous_hash`。每个区块内部都包含前一个区块的哈希值。区块 1038 包含区块
  1037 的哈希值，区块 1037 包含区块 1036 的哈希值，依此类推……一直追溯到第一个区块——“创世”区块。


  区块可以包含*任何*数据：文件、图片、交易、记录等。在上述示例中，我们的区块包含一笔从 Bob 到 Alice 的 5 美元交易。这个区块与大多数加密货币区块（如比特币）的结构类似。你可能听说过有人将以太坊描述为“世界计算机”。这是因为以太坊区块的数据中还包含*可执行代码*，指示网络上的参与者在区块链本身上执行操作。


  ## 不可变性与哈希的重要性


  区块链的概念并不难以理解——**每个区块内部都包含前一个区块的哈希值，从而形成一条链**。这种哈希的“链接”赋予了区块链不可变性和防欺诈的特性。


  更具体地说，`previous_hash`字段是区块之间的链接，用于创建*链*。如果攻击者以某种方式破坏了链中较早的区块，那么所有后续区块都会发生变化，因为它们的哈希值会变得不正确。例如，如果我们必须修改区块#1037
  中的单个数据，那么#1037 的哈希值会不同，因此#1038 中的`previous_hash`值也会不同。**因此，如果任何较早区块中的单个比特被篡改，整个后续区块链都将失效。**这就是区块链的链式特性——它们通过使用`previous_hash`的哈希链来确保安全：


  ![../images/475256_1_En_3_Chapter/475256_1_En_3_Fig1_HTML.jpg](img/475256_1_En_3_Fig1_HTML.jpg)


  图 3-1 区块哈希形成链


  这就是比特币的“独门秘方”——将一切联系在一起的粘合剂。如果有人通过更改链中某处交易的金额来欺诈一个区块，下一个区块的`previous_hash`字段就会不同，从而导致所有后续哈希值都不同。而比特币网络中的每个人都会立即发现这种差异并忽略该更改！


