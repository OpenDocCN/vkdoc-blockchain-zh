  现在来充实我们的两个方法：`proof_of_work` 和 `valid_hash`，先从后者开始。`valid_hash` 很简单；它需要检查一个区块的哈希值是否以特定数量的零开头，比如
  4 个零：


  ```python

  @staticmethod

  def valid_block(block):

  return block["hash"].startswith("0000")

