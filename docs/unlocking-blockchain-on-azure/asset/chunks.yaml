    \n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig2_HTML.jpg](Images/474923_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2\n\nDetails of SWIFT architecture\n\nThe messaging architecture is\
    \ shown in Figure [4-3](#474923_1_En_4_Chapter.xhtml#Fig3).\n\n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig3_HTML.jpg](Images/474923_1_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3\n\nDetails of SWIFT messaging architecture\n\nThe SWIFT network allows\
    \ end users to initiate the transfer request through the bank’s platform. The\
    \ bank is connected to the SWIFT network. The messages are verified based on the\
    \ parameter check of the SWIFT network. Once verified by this centralized architecture,\
    \ it triggers the intended receipent’s bank, which may or may not be a part of\
    \ the SWIFT network. If it is a part of the network, the message is transferred,\
    \ thereby reflecting the transaction of money\n\nIn a blockchain, the decentralized\
    \ ledger performs similar operations; however, the difference is that the end\
    \ users—both the recipient and the initiator—are independent nodes that trigger\
    \ the transaction without any centralized intermediary in between.\n\nHyperledger\
    \ is an umbrella project of open source blockchains and related tools, started\
    \ in December 2015 by the Linux Foundation, and has received contributions from\
    \ IBM, Intel and SAP Ariba, to support the collaborative development of blockchain-based\
    \ distributed ledgers.\n\nIn simpler words, Hyperledger enables a Blockchain Framework\
    \ to set up decentralised systems in platform agnostic ways.\n\nLet’s view this\
    \ in action over Hyperledger. To set up Hyperledger for the first time, we’ll\
    \ create a development environment and establish the chain on a single instance\
    \ (single virtual machine). Further, we can scale it to production environments\
    \ for multi-node instances (multiple devices, VMs, etc.).\n\nFor both configurations,\
    \ the core foundation remains the same. The four main components are as follows:\n\
    \n*   **CA nodes**: The nodes running the certificate authority (CA) that issues\
    \ certificates across the elements of the network. These certificate services\
    \ extend to users or other components of the blockchain for operations such as\
    \ the addition of users or invoking transactions and TLS-secured connections between\
    \ users and other components of the blockchain. The CA nodes have to initialize\
    \ first, before the peer nodes, so as to set up the security, access control,\
    \ and rights. These nodes extend an identity to the network. Through the certificate\
    \ authority, while onboarding a user node, the enroll ID, name, type of identity,\
    \ affiliation, and maximum enrollments allowed are defined. Similarly, these nodes\
    \ provide other services for transactions and operations.\n\n*   **Orderer nodes**:\
    \ These nodes run the messaging system across the chain. Consider it the work\
    \ manager that distributes messages in a consistent framework. Based on the defined\
    \ operations, these nodes help in propagating messages as broadcasts or singular\
    \ transactions. They validate the transaction and ensure on-chain credibility\
    \ as a group of nodes. Hyperledger has two modes of ordering—SOLO (development\
    \ purpose) and Kafka (production environments to scale).\n\n*   **Peer nodes**:\
    \ Every node (end device, VM, smartphone, laptop) in the blockchain can be termed\
    \ as a peer node. These nodes are users that transact, maintain the last state,\
    \ or copy and append to the shared ledger. They contribute to making the blockchain\
    \ immutable, as every peer must get updated for any change to be registered on\
    \ the blockchain when used as a shared public ledger. Some peers may be observers,\
    \ validators, or initiators of transactions.\n\n*   **CouchDB nodes**: Nodes that\
    \ have the CouchDB database that stores the state and provides querying mechanisms\
    \ for the chaincode data and operations.\n\nCorrelate or contrast these components\
    \ against a centralized web platform that has elements of DNS hosting, TLS security\
    \ via SSL, queuing, front-end server, back-end server, and database. These elements\
    \ communicate with each other to render a website.\n\nFor Hyperledger to run,\
    \ CA nodes, Orderer nodes, Peer nodes, and CouchDB nodes must work in conjunction\
    \ to follow the consensus by chaincode so as to run the operations of the chain\
    \ (Figure [4-4](#474923_1_En_4_Chapter.xhtml#Fig4)).\n\n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig4_HTML.jpg](Images/474923_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4\n\nA distributed system. Source: [`https://github.com/caleteeter/azure-docs/blob/caleteeter-hlfupdates/articles/blockchain-workbench/hyperledger-fabric-single-member-blockchain.md`](https://github.com/caleteeter/azure-docs/blob/caleteeter-hlfupdates/articles/blockchain-workbench/hyperledger-fabric-single-member-blockchain.md).\
    \ Used under CC-BY 4.0 License\n\nLet’s start with the Hyperledger Composer.\n\
    \n### Hyperledger Composer\n\nNow that we know the key stakeholders of the blockchain\
    \ network, let’s see the execution in action via the Hyperledger Composer Playground.\
    \ Here, we’ll use the example of trade finance.\n\nLet’s see how trade finance\
    \ can leverage blockchains:\n\n*   Bill of lading, letter of credits, and bank\
    \ guarantees\n\n*   Connecting all stakeholders\n\n*   Fraud-pattern detections\n\
    \n*   Validation of true capacity\n\n*   Unbiased credit ratings\n\nExercise\n\
    \nDraw out real-life supply chains that affect your daily life and could be improved.\n\
    \nConsider a use case where we have an intended trade between importer and exporter.\
    \ The requirement for a letter of credit comes from the interbank lack of transparency,\
    \ which causes authorities to rely on LOCs signed by the advisory banks.\n\nFor\
    \ this, we built SmartPlug, a data translational tool that converts trade documents\
    \ into smart contracts to onboard traders for fair trade. Let’s see how the current-day\
    \ letter of credit is tangibly executed on a digital platform that runs on consensus.\n\
    \nVisit [`https://www.myraatechnologies.com/SP/smartplug.html#4`](https://www.myraatechnologies.com/SP/smartplug.html%25234)\
    \ and perform the following steps:\n\n1.  Click on Download Business Network 1.\n\
    \n2.  Download the `.bna` file, which contains the following elements:\n    *\
    \   Lib – It contains the business logic for the blockchain.\n\n    *   Models –\
    \ It stores information about participants and assets for the blockchain.\n\n\
    \    *   package.json – It stores dependencies with the various packages.\n\n\
    \    *   Permissions.acl – It stores user access control.\n\n    *   README.md –\
    \ It stores information related to the platform.\n\n#### Lib: sample.js\n\nThis\
    \ file contains all of the code that supports the business logic, such as handling\
    \ the account balance, storing the changing quantities, and so forth.\n\n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig5a_HTML.jpg](Images/474923_1_En_4_Fig5a_HTML.jpg)\n\
    \n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig5b_HTML.jpg](Images/474923_1_En_4_Fig5b_HTML.jpg)\n\
    \nFigure 4-5\n\nSample File showcasing business logic"
  trans: "\n# 金融机构中的解码流程设计\n\n由于区块链仍在发展演变，许多软件包、版本及现有链都可能发生变化。然而，利用区块链概念构建的去中心化网络的设计流程，将为去中心化经济奠定基础。其运作方式仍可能改变。例如，比特币和以太坊区块链因其去中心化网络及在该平台上交易的加密货币而备受认可。但它们可能会被新版本取代，或出现针对特定领域的新区块链框架。这并不会改变作为区块链核心概念的去中心化格式。\n\
    \n鉴于优步、爱彼迎和亚马逊已深刻改变了我们的出行、住宿和零售方式，金融领域的区块链将彻底革新货币的生成、存储、转移和套期保值方式。\n\n为了更好地理解，让我们审视一下当前\
    \ SWIFT 系统的运作方式（图 4-2）。\n\n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig2_HTML.jpg](img/474923_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2\n\nSWIFT 架构详情\n\n消息传递架构如图 4-3 所示。\n\n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig3_HTML.jpg](img/474923_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3\n\nSWIFT 消息传递架构详情\n\nSWIFT 网络允许终端用户通过银行平台发起转账请求。银行与 SWIFT 网络相连。消息通过 SWIFT\
    \ 网络的参数检查进行验证。一旦通过这种集中式架构的验证，就会触发目标收款人的银行，该银行可能隶属于 SWIFT 网络，也可能不隶属。如果属于该网络，消息就会被传递，从而体现资金的交易。\n\
    \n在区块链中，去中心化账本执行类似的操作；但区别在于，终端用户（收款方和发起方）都是独立的节点，无需任何集中式中介即可触发交易。\n\n`Hyperledger`是一个由\
    \ Linux 基金会于 2015 年 12 月发起的开源区块链及相关工具的伞形项目，并获得了 IBM、英特尔和 SAP Ariba 的贡献，以支持基于区块链的分布式账本的协作开发。\n\
    \n简单来说，`Hyperledger`使区块链框架能够以平台无关的方式搭建去中心化系统。\n\n让我们通过`Hyperledger`来实际看看。为了首次搭建`Hyperledger`，我们将创建一个开发环境，并在单实例（单台虚拟机）上建立链。随后，我们可以将其扩展到多节点实例（多台设备、虚拟机等）的生产环境。\n\
    \n对于这两种配置，核心基础都是相同的。四个主要组件如下：\n\n- **CA 节点**：运行证书颁发机构（CA）的节点，负责向网络各组件颁发证书。这些证书服务可扩展到用户或区块链的其他组件，用于用户添加、发起交易等操作，以及用户与区块链其他组件之间的\
    \ TLS 安全连接。CA 节点必须在同伴节点之前首先进行初始化，以建立安全、访问控制和权限。这些节点为网络赋予身份。在通过证书机构接入用户节点时，会定义注册\
    \ ID、名称、身份类型、隶属关系以及允许的最大注册次数。类似地，这些节点还为交易和操作提供其他服务。\n\n- **排序节点**：这些节点运行链上消息系统。可将其视为工作管理器，在一致的框架内分发消息。根据定义的操作，这些节点以广播或单一交易的形式传播消息。它们作为一组节点验证交易并确保链上可信度。`Hyperledger`有两种排序模式——`SOLO`（开发用途）和`Kafka`（用于扩展的生产环境）。\n\
    \n- **同伴节点**：区块链中的每个节点（终端设备、虚拟机、智能手机、笔记本电脑）都可称为同伴节点。这些节点是进行交易、维护最新状态、或复制并追加共享账本的用户。它们共同确保区块链的不可篡改性，因为当用作共享公共账本时，任何变更要记录到区块链上，都必须更新所有同伴节点。某些同伴节点可能是交易的观察者、验证者或发起者。\n\
    \n- **CouchDB 节点**：运行 CouchDB 数据库的节点，该数据库存储状态，并为链码数据和操作提供查询机制。\n\n将这些组件与包含 DNS\
    \ 托管、通过 SSL 实现的 TLS 安全、队列、前端服务器、后端服务器和数据库等元素的集中式 Web 平台进行关联或对比。这些元素相互通信以呈现网站。\n\
    \n为了让`Hyperledger`运行，CA 节点、排序节点、同伴节点和 CouchDB 节点必须协同工作，遵循链码的共识，从而执行链的操作（图 4-4）。\n\
    \n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig4_HTML.jpg](img/474923_1_En_4_Fig4_HTML.jpg)\n\
    \n图 4-4\n\n一个分布式系统。来源：[`https://github.com/caleteeter/azure-docs/blob/caleteeter-hlfupdates/articles/blockchain-workbench/hyperledger-fabric-single-member-blockchain.md`](https://github.com/caleteeter/azure-docs/blob/caleteeter-hlfupdates/articles/blockchain-workbench/hyperledger-fabric-single-member-blockchain.md)。根据\
    \ CC-BY 4.0 许可证使用\n\n让我们从`Hyperledger Composer`开始。\n\n## Hyperledger Composer\n\
    \n现在我们已经了解了区块链网络的关键参与者，让我们通过`Hyperledger Composer Playground`看看实际执行情况。这里我们将以贸易金融为例。\n\
    \n看看贸易金融如何利用区块链：\n\n- 提单、信用证和银行保函\n- 连接所有利益相关方\n- 欺诈模式检测\n- 真实能力验证\n- 无偏见的信用评级\n\
    \n**练习**\n\n画出影响您日常生活的、可以改进的实际供应链。\n\n设想一个进出口商之间意向交易的使用案例。信用证的需求源于银行间缺乏透明度，这使得相关机构不得不依赖由通知行签署的信用证。\n\
    \n为此，我们构建了`SmartPlug`，这是一个数据转换工具，可将贸易文档转换为智能合约，使贸易商能够公平交易。让我们看看当前的信用证是如何在基于共识运作的数字平台上切实执行的。\n\
    \n访问[`https://www.myraatechnologies.com/SP/smartplug.html#4`](https://www.myraatechnologies.com/SP/smartplug.html%25234)并执行以下步骤：\n\
    \n1. 点击下载业务网络 1。\n2. 下载`.bna`文件，该文件包含以下元素：\n   - `Lib` – 包含区块链的业务逻辑。\n   - `Models`\
    \ – 存储区块链的参与者和资产信息。\n   - `package.json` – 存储与各软件包的依赖关系。\n   - `Permissions.acl`\
    \ – 存储用户访问控制。\n   - `README.md` – 存储与平台相关的信息。\n\n### Lib: sample.js\n\n此文件包含所有支持业务逻辑的代码，例如处理账户余额、存储变化量等。\n\
    \n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig5a_HTML.jpg](img/474923_1_En_4_Fig5a_HTML.jpg)\n\
    \n![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig5b_HTML.jpg](img/474923_1_En_4_Fig5b_HTML.jpg)\n\
    \n图 4-5\n\n展示业务逻辑的示例文件\n"
- fmt: '#### Models: `sample.cto`


    In this file, we define assets, transactions, and participants of the blockchains.


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig6_HTML.jpg](Images/474923_1_En_4_Fig6_HTML.jpg)


    *Figure 4-6*


    #### `package.json`


    This has all the dependencies for the Hyperledger playground.


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig7_HTML.jpg](Images/474923_1_En_4_Fig7_HTML.jpg)


    *Figure 4-7*


    #### `permissions.acl`


    Any of the participants can perform all of the operations, such as creating a
    shipment.


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig8_HTML.jpg](Images/474923_1_En_4_Fig8_HTML.jpg)


    *Figure 4-8*


    #### `README.md`


    This file has information about the platform.


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig9_HTML.jpg](Images/474923_1_En_4_Fig9_HTML.jpg)


    *Figure 4-9*


    ### Running the Example


    Run the command


    ```

    composer archive create -t dir -n

    ```


    to create a BNA file (business network archive) using the Hyperledger composer.
    Now upload it.


    1.  Go to the Exporter tab of the SmartPlug demo (Figure [4-10](#474923_1_En_4_Chapter.xhtml#Fig10))
    and upload.


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig10_HTML.jpg](Images/474923_1_En_4_Fig10_HTML.jpg)


    *Figure 4-10* Interface to upload data blocks in usable forms


    2.  The interface will do some validation. Then click Submit.


    3.  You’ll see a success screen (Figure [4-11](#474923_1_En_4_Chapter.xhtml#Fig11)).
    Click “Let’s Blockchain!”


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig11_HTML.jpg](Images/474923_1_En_4_Fig11_HTML.jpg)


    *Figure 4-11* Hyperledger’s console that inputs the data from the portal to the
    decentralized platform


    4.  Click the Import/Replace button and upload the `.bna` file.


    5.  You’ll see Figure [4-12](#474923_1_En_4_Chapter.xhtml#Fig12). Click Deploy.


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig12_HTML.jpg](Images/474923_1_En_4_Fig12_HTML.jpg)


    *Figure 4-12* Imports BNA on console


    6.  Click on the Test tab (Figure [4-13](#474923_1_En_4_Chapter.xhtml#Fig13)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig13_HTML.jpg](Images/474923_1_En_4_Fig13_HTML.jpg)


    *Figure 4-13* Can set test variables for each variable


    7.  Click on Submit Transaction (you’ll see Figure [4-14](#474923_1_En_4_Chapter.xhtml#Fig14)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig14_HTML.jpg](Images/474923_1_En_4_Fig14_HTML.jpg)


    *Figure 4-14* Transaction methods defined in the code can be selected and executed
    on the Hyperledger Composer Playground


    8.  Create a transaction for `SetupDemo` (you’ll see the results in Figure [4-15](#474923_1_En_4_Chapter.xhtml#Fig15)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig15_HTML.jpg](Images/474923_1_En_4_Fig15_HTML.jpg)


    *Figure 4-15* Transaction registry


    9.  Check for the participants (exporter, importer, shipper), as shown in Figure
    [4-16](#474923_1_En_4_Chapter.xhtml#Fig16).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig16_HTML.jpg](Images/474923_1_En_4_Fig16_HTML.jpg)


    *Figure 4-16* Ledger data for exporter


    10.  Check for the contract (Figure [4-17](#474923_1_En_4_Chapter.xhtml#Fig17)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig17_HTML.jpg](Images/474923_1_En_4_Fig17_HTML.jpg)


    *Figure 4-17* Contract detail conditions from the code


    11.  Check for the shipment (Figure [4-18](#474923_1_En_4_Chapter.xhtml#Fig18)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig18_HTML.jpg](Images/474923_1_En_4_Fig18_HTML.jpg)


    *Figure 4-18* Shipment data on ledger


    12.  Check for the transactions (Figure [4-19](#474923_1_En_4_Chapter.xhtml#Fig19)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig19_HTML.jpg](Images/474923_1_En_4_Fig19_HTML.jpg)


    *Figure 4-19* Ledger for transaction records


    13.  Create a shipment transaction for the shipment ID (Figure [4-20](#474923_1_En_4_Chapter.xhtml#Fig20)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig20_HTML.jpg](Images/474923_1_En_4_Fig20_HTML.jpg)


    *Figure 4-20* Invoking creation of shipment


    14.  Upload the shipper receipt (Figure [4-21](#474923_1_En_4_Chapter.xhtml#Fig21)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig21_HTML.jpg](Images/474923_1_En_4_Fig21_HTML.jpg)


    *Figure 4-21* Shipper’s upload validates that the shipment is in transition with
    him


    15.  The platform validates all of the receipts and translations. If there is
    fraud in the receipt it will give an error before submitting (Figure [4-22](#474923_1_En_4_Chapter.xhtml#Fig22)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig22_HTML.jpg](Images/474923_1_En_4_Fig22_HTML.jpg)


    *Figure 4-22* If details mismatch, validation fails and avoids fraudulent data


    16.  After submitting the proper document (Figure [4-23](#474923_1_En_4_Chapter.xhtml#Fig23)),
    it will proceed.


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig23_HTML.jpg](Images/474923_1_En_4_Fig23_HTML.jpg)


    *Figure 4-23* Successful validation upon uploading correct documents


    17.  Create a transaction for shipment transit (Figure [4-24](#474923_1_En_4_Chapter.xhtml#Fig24)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig24_HTML.jpg](Images/474923_1_En_4_Fig24_HTML.jpg)


    *Figure 4-24* Validates with the shipment ID and the Orderer node (here, it’s
    the shipment company)


    18.  Check for the exporter and importer balances on the ledger (Figure [4-25](#474923_1_En_4_Chapter.xhtml#Fig25)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig25_HTML.jpg](Images/474923_1_En_4_Fig25_HTML.jpg)


    *Figure 4-25* Update of values in exporter’s wallet and records


    19.  The importer can then accept the shipment (Figure [4-26](#474923_1_En_4_Chapter.xhtml#Fig26)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig26_HTML.jpg](Images/474923_1_En_4_Fig26_HTML.jpg)


    *Figure 4-26* Platform where importer accepts shipment by uploading receipt


    20.  Check for exporter account balance (Figure [4-27](#474923_1_En_4_Chapter.xhtml#Fig27)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig27_HTML.jpg](Images/474923_1_En_4_Fig27_HTML.jpg)


    *Figure 4-27* Equivalent update of values in exporter’s records based on the contract
    details defined in the code


    21.  Check for the importer account balance (Figure [4-28](#474923_1_En_4_Chapter.xhtml#Fig28)).


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig28_HTML.jpg](Images/474923_1_En_4_Fig28_HTML.jpg)


    *Figure 4-28* Importer’s account balance amount is reduced, and payment is made
    as per contract


    #### Exercise


    Now that we have experienced the journey of the Hyperledger Composer Playground,
