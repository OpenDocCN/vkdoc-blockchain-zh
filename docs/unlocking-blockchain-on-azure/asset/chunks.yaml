- fmt: "# Automation: Processes for Auto-trigger/Alerts of Smart Contracts\n\nSince\
    \ the onset of the digital era, most businesses have transitioned online, including\
    \ bringing their data online. However, there are still large-scale companies relying\
    \ on off-chain practices due to a failure to integrate with modern systems.\n\n\
    This is exactly where automation by smart contracts can facilitate faster transactions.\
    \ Smart contracts not only digitize contract data but also digitize the states/processes\
    \ that are involved in transferring the data.\n\nThis integration can be achieved\
    \ as follows:\n\n- `REST` APIs\n- `Azure` event triggers\n- `Azure`'s logic apps\
    \ to service bus\n- Workbench modifications in consensus rule\n\nLet us examine\
    \ a medical transport scenario where smart contracts are to be integrated.\n\n\
    Consider organ transplants, which require the organ to quite literally be transacted\
    \ transparently in a secure environment from the donor to the patient. Here, the\
    \ data and the process around this transaction are highly sensitive. There are\
    \ several state flows to be considered:\n\n- Organ is safely transported in the\
    \ right environment.\n- Organ is tampered with at the source.\n- Organ transport\
    \ had a mishap and temperature was not maintained.\n- Organ was infected during\
    \ delivery at destination.\n\nThe state flow of the organ is highly crucial for\
    \ the suitable outcome of the transplant. If the donor, the doctor extracting\
    \ the organ, the transport conditions (via `IoT`), and the delivery check on the\
    \ recipient side are all on a blockchain bound with a smart contract clause for\
    \ a healthy organ for a successful transplant, and if any node supplies data that\
    \ has tampered with the state of the organ and its environment variables, then\
    \ the recipient can transparently avoid a faulty transaction. These auto-triggers\
    \ and alerts can be on the chain through the `Azure` event trigger at the very\
    \ moment any of the conditions (defined in the smart contract) for a healthy organ\
    \ fails the contract.\n\nFor example, if the cooling system during transfer were\
    \ to fail, the event trigger would invoke the `Azure` logic app to update the\
    \ state to indicate an unsuccessful transfer. This provides a safe, transparent,\
    \ clause-driven ecosystem with blockchains and the smart contract.\n\n## Complete\
    \ Picture\n\nThe key to a successful working ecosystem is design (Figure [6-6](#474923_1_En_6_Chapter.xhtml#Fig6)).\
    \ Having the right set of components aligned ensures each of the components stands\
    \ up to the expectations of its functionality and at the same time maintains the\
    \ conjunction of processes that were already in practice. While bringing decentralization\
    \ and automation through blockchain and smart contracts to organizations that\
    \ have long been run in a particular way, such changes are difficult and often\
    \ break into offline processes, leading to discrepancies and opaque layers of\
    \ clarity.\n\n![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig6_HTML.jpg](Images/474923_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6  \nAzure components for seamless integration\n\nDesign considerations\
    \ and awareness of what can be seamlessly integrated are highly crucial. This\
    \ chapter has aimed to cover those thoughts and considerations in terms of the\
    \ availability in the Microsoft Azure ecosystem of the components around the Azure\
    \ blockchain, as shown in the Figure [6-5](#474923_1_En_6_Chapter.xhtml#Fig5).\n\
    \nThese independent Azure Components are well tested and compliant for the services\
    \ described above and are widely used across enterprises. Thereby blockchains\
    \ must not be seen as a stand alone system during its adoption. It is recommended\
    \ to plan integration of existing systems with blockchains to run operations seamlessly.\n\
    \nThus with this, identify the touchpoints and Azure services that suit the purposes\
    \ of your blockchain and the processes around it.\n\n# Technological Tools\n\n\
    This chapter will decode the array of tools that enable designing, constructing,\
    \ and operating various aspects of blockchains in a decentralized application.\
    \ We shall walk through how these tools can be chained on-cloud and off-cloud\
    \ with Microsoft Azure's cloud services.\n\nThe blockchain solution lifecycle\
    \ has three stages of development:\n\n1. Business requirements and causes of decentralization\n\
    2. Solution architecture with respect to operations\n3. Developer's version of\
    \ technical component breakdown\n\nWe will use the top-down approach toward identifying\
    \ tools for blockchain implementations."
  raw: '## Automation: Processes for Auto-trigger/Alerts of Smart Contracts


    Since the onset of the digital era, most businesses have transitioned online,
    including bringing their data online. However, there are still large-scale companies
    relying on off-chain practices due to a failure to integrate with modern systems.


    This is exactly where automation by smart contracts can facilitate faster transactions.
    Smart contracts not only digitizes contract data but also digitizes the states/
    processes that are involved in transferring the data.


    This integration can be achieved as follows:


    *   REST APIs


    *   Azure event triggers


    *   Azure’s logic apps to service bus


    *   Workbench modifications in consensus rule


    Let us examine a medical transport scenario where smart contracts are to be integrated.


    Consider organ transplants, which require the organ to quite literally be transacted
    transparently in a secure environment from the donor to the patient. Here, the
    data and the process around this transaction are highly sensitive. There are several
    state flows to be considered:


    *   Organ is safely transported in the right environment.


    *   Organ is tampered with at the source.


    *   Organ transport had a mishap and temperature was not maintained.


    *   Organ was infected during delivery at destination.


    The state flow of the organ is highly crucial for the suitable outcome of the
    transplant. If the donor, the doctor extracting the organ, the transport conditions
    (via IoT), and the delivery check on the recipient side are all on a blockchain
    bound with a smart contract clause for a healthy organ for a successful transplant,
    and if any node supplies data that has tampered with the state of the organ and
    its environment variables, then the recipient can transparently avoid a faulty
    transaction. These auto-triggers and alerts can be on the chain through the Azure
    event trigger at the very moment the any of the conditions (defined in the smart
    contract) for a healthy organ fails the contract.


    For example, if the cooling system during transfer were to fail, the event trigger
    would invoke the Azure logic app to update the state to indicate an unsuccessful
    transfer. This provides a safe, transparent, clause-driven ecosystem with blockchains
    and the smart contract.


    ## Complete Picture


    The key to a successful working ecosystem is design (Figure [6-6](#474923_1_En_6_Chapter.xhtml#Fig6)).
    Having the right set of components aligned ensures each of the components stands
    up to the expectations of its functionality and at the same time maintains the
    conjunction of processes that were already in practice. While bringing decentralization
    and automation through blockchain and smart contracts to organizations that have
    long been run in a particular way, such changes are difficult and often break
    into offline processes, leading to discrepancies and opaque layers of clarity.


    ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig6_HTML.jpg](Images/474923_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Azure components for seamless integration


    Design considerations and awareness of what can be seamlessly integrated are highly
    crucial. This chapter has aimed to cover those thoughts and considerations in
    terms of the availability in the Microsoft Azure ecosystem of the components around
    the Azure blockchain, as shown in the Figure [6-5](#474923_1_En_6_Chapter.xhtml#Fig5).


    These independent Azure Components are well tested and compliant for the services
    described above and are widely used across enterprises. Thereby Blockchains must
    not be seen as a stand alone system during its adoption. It is recommended to
    plan integration of existing systems with Blockchains to run operations seamlessly.


    Thus with this, identify the touchpoints and Azure services that suit the purposes
    of your blockchain and the processes around it.


    # 7. Technological Tools


    This chapter will decode the array of tools that enable designing, constructing,
    and operating various aspects of blockchains in a decentralized application. We
    shall walk through how these tools can be chained on-cloud and off-cloud with
    Microsoft Azure’s cloud services.


    The blockchain solution lifecycle has three stages of development:


    1.  Business requirements and causes of decentralization


    2.  Solution architecture with respect to operations


    3.  Developer’s version of technical component breakdown


    We will use the top-down approach toward identifying tools for blockchain implementations.'
  trans: "\n# 自动化：智能合约的自动触发/警报流程\n\n自数字时代开启以来，大多数企业已转向线上运营，包括将其数据上线。然而，仍有一些大型企业因未能与现代系统集成，而依赖链下操作。\n\
    \n这正是智能合约的自动化能够促进交易加速的关键所在。智能合约不仅将合约数据数字化，还将数据传输所涉及的状态和流程也进行了数字化。\n\n这种集成可通过以下方式实现：\n\
    \n- `REST` API 接口\n- `Azure` 事件触发器\n- 将`Azure`逻辑应用连接到服务总线\n- 共识规则中的工作台修改\n\n让我们考察一个需要集成智能合约的医疗运输场景。\n\
    \n以器官移植为例，它要求器官在安全环境中从捐赠者到患者之间进行完全透明的交易。这里，围绕交易的数据和流程都极其敏感。需要考虑多个状态流程：\n\n- 器官在适当环境下安全运输\n\
    - 器官在源头被篡改\n- 器官运输发生意外，温度未维持\n- 器官在目的地交付时受到感染\n\n器官的状态流程对于移植的成功结果至关重要。如果捐赠者、摘取器官的医生、运输条件（通过`IoT`监测）以及接收方的交付检查，都绑定在区块链上并附带智能合约条款，以确保健康器官实现成功移植，那么当任何节点提供的数据篡改了器官状态及其环境变量时，接收方就能透明地规避一笔有问题的交易。这些自动触发器和警报可以通过`Azure`事件触发器上链，一旦智能合约中定义的任何健康器官条件未能满足合约要求，便会立即触发。\n\
    \n例如，如果运输过程中的冷却系统发生故障，事件触发器将调用`Azure`逻辑应用来更新状态，以指示运输失败。这通过区块链和智能合约构建了一个安全、透明、基于条款的生态系统。\n\
    \n## 整体视图\n\n一个成功运行生态系统的关键在于设计（图 6-6）。配置正确的组件集合，确保每个组件都能满足其功能期望，同时保持现有流程的连贯性。在通过区块链和智能合约向长期以来以特定方式运营的组织引入去中心化和自动化的过程中，此类变革往往困难重重，并且容易与线下流程脱节，导致数据不一致和透明度缺失。\n\
    \n![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig6_HTML.jpg](img/474923_1_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6  \n用于无缝集成的 Azure 组件\n\n设计考量以及对可无缝集成的组件的认知至关重要。本章旨在围绕 Microsoft Azure 生态系统中\
    \ Azure 区块链相关组件的可用性，涵盖这些思路与考量，如图 6-5 所示。\n\n这些独立的 Azure 组件经过充分测试，符合上述服务的标准，并在企业中广泛使用。因此，在采用区块链时，不应将其视为一个孤立的系统。建议规划现有系统与区块链的集成，以实现无缝运营。\n\
    \n因此，请据此确定适合您区块链及其相关流程的接触点和 Azure 服务。\n\n# 技术工具\n\n本章将解读一系列工具，这些工具能够帮助您在去中心化应用中设计、构建和运营区块链的各个方面。我们将探讨如何通过\
    \ Microsoft Azure 的云服务将这些工具在云上和云下串联起来。\n\n区块链解决方案的生命周期包含三个开发阶段：\n\n1. 去中心化的业务需求与动因\n\
    2. 针对运营的解决方案架构\n3. 开发者视角的技术组件分解\n\n我们将采用自上而下的方法来识别区块链实现所需的工具。\n"
- fmt: '# Business Requirements and Causes of Decentralization


    Business developers identify the pain points in an existing business, workflow,
    or operations. For any technology to be implemented, its ability to be effective
    in helping the business achieve desired outcomes is extremely important. Thus,
    before any technology decision is made, carving out the business requirements
    is of utmost importance. Fill in the `CAUSE Matrix` in Table [7-1](#474923_1_En_7_Chapter.xhtml#Tab1)
    to understand the selection of blockchain types required for your business application.


    **Table 7-1** CAUSE Matrix for Business Developers to Shape the Blockchain Use
    Case


    | Collaborative workflow? | Assets digitized? | Unknown contributors? | Storage
    of State? | Encryption Crucial? | Blockchain Required? | Type of Blockchain? |

    | --- | --- | --- | --- | --- | --- | --- |

    | Is the workflow designed to be collaborative? | Can the asset be digitized or
    not? | Are the contributors known or unknown? | Should the history of states be
    recorded? | Is encryption crucial or not? | | |

    | Yes | Yes | Yes | Yes | Yes | Yes | Public blockchain |

    | Yes | Yes | No | Yes | Yes | Yes | Private blockchain |

    | Yes | Yes | Both (Access Control) | Yes | Yes | Yes | Hybrid blockchain |

    | No | Yes | Yes | No | Yes | No | Any other centralized platforms |

    | Yes | No | Yes | Yes | No | No | Any other centralized platforms |


    `CAUSE Matrix` helps businesses in designing the blockchain solutions. It is a
    5-factor questionnaire that business strategists must fill in to derive whether
    Blockchain is required or not and further identify the type of Blockchain suitable
    for it.


    It is a way to evaluate if blockchains are required in your business application.


    Based on the result of the matrix, you can identify if the business scenario really
    requires blockchains or not.


    Mark “yes” for “collaborative workflow” when the entire flow of operations needs
    to be linked digitally by multiple users. For example, consider a business use
    case where a team of 50 HR workers runs personnel operations across a Fortune
    500 company that has 50,000 employees. The company wishes to bind all activities
    together, connecting various aspects of personnel operations. This collaborative
    workflow can be on chain, thereby marking it as “Yes.”


    For “assets digitized,” the entity on record is employees that may be digitized
    based on the data records. If assets are not digital, one has to find a way to
    connect the physical asset to a digital one. For example, house-key access can
    be done through a smartphone or a biometric key that can be used as a data asset
    on the ledger.


    “Unknown contributors” is to evaluate if the stakeholders/users of the business
    process are end customers who are unknown and exploratory or known entities such
    as employees, business partners, or service providers. Based on that, public or
    private blockchains or both, forming hybrid blockchains, are used.


    “Storage of state” is to recognize if the data being recorded is required to store
    each state or just the last state. Referring to our example, if the HR worker
    needs to know the entire lifecycle of an employee, all state records are crucial,
    and therefore using a blockchain is legit as it provides a tamperproof record
    of all states of an employee. Conversely, in a case where only the last case matters,
    a blockchain may not be needed. A simple `ERP`/`CRM` could be used.


    Lastly, the factor for encryption helps to decide if end-to-end encryption is
    required. In a large organization, certain network information needs to be kept
    internal and confidential, and thus a private ledger could be used that encrypts
    valuable information between the relevant stakeholders only. In our example, data
    points such as salary need to be end-to-end encrypted between the employee and
    the HR department. The storage of such data is encrypted and distributed on-chain,
    making it difficult for a hacker to target one server to break out the information.


    Based on the outcome of the `CAUSE` matrix, refer to various examples of blockchains
    in Table [7-2](#474923_1_En_7_Chapter.xhtml#Tab2). The specific alignment of your
    use case to the blockchain can be further deduced in the second matrix in the
    solution architect’s phase of choice.


    **Table 7-2** Technology Platforms for Blockchain with Public, Private, and Hybrid


    | Public Blockchains | Private Blockchains | Hybrid Blockchains |

    | --- | --- | --- |

    | • Hedera Hashgraph • Bitcoin • Ethereum • Litecoin • Monero • MeWe • Choon •
    MINDS | • Hyperledger • Quorum • Bankchain • MONAX • MultiChain | • DragonChain
    • EWF • B3i • R3 Corda |


    Business developers have to identify the area of operation that requires decentralization
    based on the `CAUSE` factors so as to decide on the type of blockchain.


    Businesses that operate toward expanding services on a decentralized ledger to
    consumers who may be unknown end users who require no permission to join the ledger
    opt for a public blockchain. Businesses that operate in a `B2B` environment or
    internal to the company may utilize a private blockchain, where permission is
    crucial for controlled parameters.


    In the case of a marketplace business case, for instance, a combination of private
    and public blockchain networks is required, forming hybrid blockchains. Certain
    information, such as retail goods listings and service listings, may be put on
    the public blockchain, and the users can anonymously view the data on the public
    blockchain ledger. However, when there is a transaction between a buyer and a
    seller, a private blockchain network can be formed, and the transactions may operate
    based on the consensus principle of the chain.


    Business developers seek enterprise technology tools for deployments, especially
    to receive long-term support, scalability, skill availability, training, and so
    forth (Figure [7-1](#474923_1_En_7_Chapter.xhtml#Fig1)). Azure provides a wide
    range of enterprise support for its blockchain elements along with its other cloud
    services. This improves the integration capacity of the existing Microsoft framework
    so it can be on-cloud and on-chain wherever required.


    ![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig1_HTML.png](Images/474923_1_En_7_Fig1_HTML.png)


    **Figure 7-1** Key tools for blockchains with Azure


    ![../images/474923_1_En_7_Chapter/474923_1_En_7_Figa_HTML.jpg](Images/474923_1_En_7_Figa_HTML.jpg)
    **Exercise 7-1**


    As a business developer, identify a business case that truly requires a blockchain.
    Run the use case through the `CAUSE` matrix and confirm suitability. Break down
    the use case into specific aspects, such as:


    1.  Storage

    2.  Process

    3.  Access control

    4.  Contracts

    5.  Tokens


    Write user story across each aspect based on the business use case.


    This exercise further provides solution architects with tools to decide the specifics
    of the blockchain platform.'
