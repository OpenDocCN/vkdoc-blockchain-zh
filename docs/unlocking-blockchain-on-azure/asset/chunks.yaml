    \ deployment procedures.\n\n*   However, this does not mean that using it will\
    \ make it secure. The tool has to be correctly configured inside the app services,\
    \ complying with the encryption standards defined/designed for your blockchain.\
    \ Azure Key Vault ensures the key is never released out of the vault. We will\
