  trans: '

    ### 为初学者定义


    现在你已经了解了区块链的基本前提，我们将探讨一个交易复杂度更高的案例。在区块链出现之前，由中介机构存储的数据可能被篡改或不可信（图 1-3）。


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig3_HTML.png](img/474923_1_En_1_Fig3_HTML.png)


    *图 1-3 多方通过合同参与的用例，由于涉及中介，可信度可能存疑*


    如图 1-3 所示，珍娜制定了一份财产遗嘱，并委托其律师在她去世后依法执行。然而，该遗嘱可能容易因恶意或怀有偏见者的篡改或摆布而发生变更。这可能导致不公平的交易，此类交易可能并非总是可追溯的，并且会像我们在图
    1-4 的交易中看到的那样，对约翰等人产生负面影响。


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig4_HTML.png](img/474923_1_En_1_Fig4_HTML.png)


    *图 1-4 区块链上的防篡改交易*


    使用区块链后，你会得到如图 1-4 所示的交易。遗嘱的加密副本对交易中的每个参与方都可用。然而，要修改文档需要获得区块链上所有人的共识，从而在未经所有人批准的情况下防止对遗嘱的任何更改。


    律师或其他同行者在未发送更新通知并提醒所有参与共识的各方的情况下，无法修改文档。因此，约翰收到了一份防篡改的文档。链上的任何黑客都无法通过单次黑客攻击来篡改链上的数据。他必须拥有跨链的投票权，才能更改链上所有副本中的文档，这使得攻击文档变得困难。这使得区块链上的数据不可篡改。


    ### 为专家定义


    图 1-5 描绘了在端到端加密的区块链上形成共识的网络软件，该区块链连接了分布在全球各地的对等节点，促进了有中心化中介但采用去中心化见证系统的直接贸易和交易。控制权不属于任何单一用户。验证控制也根据所选的共识协议随机化。


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig5_HTML.jpg](img/474923_1_En_1_Fig5_HTML.jpg)


    *图 1-5 用户、设备、数据和交易在网络中连接形成区块链*


    为了理解构建任何区块链应用/服务的基础概念，让我们通过以下练习回顾透明度、加密、不可篡改性、去中心化和隐私这些关键要素。


    **练习：思考并画出不同环境下区块链的链式视图**


    1.  我们吃的食物

    2.  我们交易的货币

    3.  我们共享的文档

    4.  我们进行的购买

    5.  我们信任并与之建立关系的人

    6.  我们打交道的公司


    ## 历史事件链：分布式计算


    在古老的物物交换贸易时代，人们根据自己对特定物品背后价值的理解来交换货物和服务。这种价值是依情况而定的，并未完全标准化。人们可以根据自己对供需的理解，自由地将一根金条等同于
    100 公斤大米或五英亩土地。从那时起，当权者根据其发行的货币来标准化商品价值时，价值的概念开始变得集中。从那种货币开始，国家逐渐发展出各自的本国货币。一种货币相对于另一种货币的相对价值取决于世界贸易以及各国之间的相互依赖关系。因此，任何货币都只是一种基于中心化权威声明而被所有人信任的价值形式。如今，随着我们数字化货币、努力和价值，人们可能会将货币的价值改变为数字量化形式。因此，金钱只是一种经过共识信任和接受的数据形式；除中心化权威外，任何人都无法改变其价值。另一方面，将数据置于区块链上，则提供了一种对锁定在链上的价值的去中心化接受，该价值在共享账本上是不可篡改和不可更改的。这带来了一个承诺：无需任何中心化权威，即可在互联网络上，跨越不同部门、国家和经验的人群之间直接进行基于价值的交易；只有一群去中心化的人跨链添加验证。


    现在我们理解了基于信任的价值的演变，让我们看看我们在网络方面的技术发展。在互联网泡沫时期，几个中心化平台作为互联网上的聚合器出现。这些聚合器通过自身打开了世界贸易的大门。例如，eBay、亚马逊和阿里巴巴都使人们能够通过它们的平台购买当地没有销售或供应的商品。这些平台上的政策由平台所有者自身制定。这些平台的订阅者仅仅依赖于他们所持有的信任度和品牌价值。因此，每次你将信用卡详细信息输入此类门户网站时，你都是在信任那个中心化实体来促成交易。在技术方面，信用卡详细信息由中心化平台通过该平台选择的机制进行加密。这对用户来说是不透明的，并且永远无法知道其是否完全安全。


    另一方面，各种区块链平台公开了其源代码的功能，并将信任根展示为完全由最终用户控制的动态端到端加密。因此，与信任中心化平台不同，你信任的是网络，它不代表单一公司。


    随着过去几十年计算设备的发展（如图 1-6 所示），其可扩展性、适应性和可负担性满足了全世界大规模消费者的需求——以至于根据全球移动通信系统 (GSMA)
    的实时情报数据，有 51.3 亿人（约占世界人口的 66%）拥有手机、计算机和物联网 (IoT) 设备等形式各异的计算设备。如今，通过我们随身携带的高速紧凑型设备，我们比以往任何时候都更加互联。我们的数字痕迹已经无处不在。然而，随着数字使用的日益增长，我们的自身痕迹会泄露到互联网各处，容易受到攻击和安全漏洞的侵害，并暴露出一种可悲的信任状态——即那些展示价值但并未完全对我们的数据负责的品牌。


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig6_HTML.jpg](img/474923_1_En_1_Fig6_HTML.jpg)


    *图 1-6 计算设备的演进*

    '
- fmt: 'The applications we use currently online on a day to day basis, provide us
    only with the front end or the outer facade to use the application, and we have
    very little to no control over the centralized platforms used by these applications
    in the backend that define and govern the usage of the platform and the data we
    generate on it. The previous era found us highly engaged in social networks, trade
    networks, e-commerce networks, and so on. We all have been subscribers or clients
    of several centrally hosted digital services. All of these were secured with a
    simple password that stopped the neighbor from logging in.


    With digitization, the pattern of interaction between a consumer and a company
    is more online, creating a need for different business models and also leading
    to business online. Similarly, hackers have gotten more sophisticated, with improved
    computing devices to guess your passwords, hack systems, extract data, and manipulate
    transactions every day. Over 40,000 websites get hacked daily.


    Our current form of digital network surely needs to evolve. Thereby blockchains.


    Let’s examine what this change of network styles looks like for every type of
    consumer.


    ### Stage 1: Client-Server


    Subscribers use a hosted server service for its facilities (see Figure [1-7](#474923_1_En_1_Chapter.xhtml#Fig7)).
    A lot of our search engines, e-commerce platforms, and websites started with this.


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig7_HTML.jpg](Images/474923_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    The client-server model


    Most of the logic, data, and user interface pages are hosted on a single server.


    As computing devices evolved and the user base grew, businesses started multi-tiering
    their network architecture. For example, if 10,000 users/clients wished to access
    the same server at the same time in the traditional client-server network architecture,
    the loading time of a website could be really long. Thereby, Stage 2 evolved.


    ### Stage 2: Multi-tier Network Architecture


    Here, the client-side logic was separate, the intermediate layers of memory computation
    and calculations were separate, and the database had data logging and data storage
    facilities maintained separately (as shown in Figure [1-8](#474923_1_En_1_Chapter.xhtml#Fig8)).
    For example, trading engines, banking applications, email services, and so forth
    are multi-tiered.


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig8_HTML.jpg](Images/474923_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Multi-tier network architecture


    We now understand the limitations of a centrally hosted set of servers that result
    from its issues with data privacy, storage, and network structure. The third stage
    brings us a fully connected mesh of servers that work peer-to-peer. A server is
    nothing but a machine that hosts services on its own for others to access based
    on desired permissions set by the machine itself. Your very own mobile phone or
    tablet can be a server. Thereby, the evolution of Stage 3.


    ### Stage 3: Peer-to-peer Networks


    Every day, more and more people wish to engage in online transactions, be it buying
    groceries or establishing video calls. These needs are still served by the multi-tiered
    networks. However, it would be ideal to empower every consumer to establish his
    own network connection. And yes, that’s possible with the digital footprint of
    the computing-device owners we have worldwide.


    Note that not every peer-to-peer (P2P) network is a blockchain, as it’s the confluence
    of decentralization, consensus protocols, encryption, and immutability that constitutes
    a blockchain as shown in Figure [1-9](#474923_1_En_1_Chapter.xhtml#Fig9). Hence,
    the network further evolved to solve most of the P2P network issues of control
    management, record management, addition of peers, storage of data, and its state
    with a blockchain.


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig9_HTML.jpg](Images/474923_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    A peer-to-peer network


    Every user today with a mobile phone, tablet, computer, or IoT device (known as
    edge devices) can be a peer in this connected network. With the advancements of
    virtualization and cloud computing, services to use a cloud-based instance extend
    to any user. So, if your laptop or edge device does not have the computational
    capacity to interact with a large connected network for blockchain-based transactions,
    `Azure` provides the infrastructure to form a peer node in a blockchain.


    `Azure`’s `Blockchain Workbench` not only allows you to participate as a peer
    node, but also empowers users to form a connected network using any blockchain
    framework. In the coming chapters, you shall see the infrastructure enablers offered
    by `Azure` to onboard your offline or centralized online network to a true decentralized
    blockchain network.


    So from a Community Manager in one part of the globe to any wanderer in the extreme
    far away lands could connect over Blockchains with `Azure`, combining the trust
    & decentralization from Blockchains & Cloud computing facilities by `Azure`.


    In simple terms, `Azure`’s `Blockchain Workbench` allows anyone to set up the
    components of a blockchain environment with just a couple of clicks. It lets you
    initialize the components required to set up such a blockchain network.'
