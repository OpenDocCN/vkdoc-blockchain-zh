    ## 用例设计挑战


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figi_HTML.gif](img/474923_1_En_10_Figi_HTML.gif)


    四位朋友按饼图所示的比例出资购买了一英亩农场。


    他们同意共同在这片土地上经营农场生意。约翰住得离土地很远，因此无法到场工作；他想出租或出售部分土地。汤姆有一份全职工作，会在下班后干活。罗恩住在农场旁边，但不懂耕作。乔完全有时间在农场工作，并且拥有全面的知识和经验。


    他们决定所有决策都需要获得所有参与者的共识。因此，你必须为将在链上进行的各项活动设计一个区块链平台。在以下部分，写出每种类型的共识对于此情况的适用性优点和缺点。列出在每种共识类型下可以运作的活动。


    ### 示例解决方案

    '
- fmt: "### Proof of Work\n\n#### Activities on-chain:\n\n- Land registry and underwritings\n\
    - Ownership and sectoring of land\n- Adding users on submission of documents and\
    \ validation by peers\n- Request for join budgets and cost claims on upload of\
    \ receipts such as property tax, electricity, and water\n- Profit share can be\
    \ initiated when revenue crosses 2x of investments as per smart contract\n\n####\
    \ Advantages:\n\n- On-chain decisions have tamper-proof records of all activities\
    \ for new users to preview.\n- Paper trail of all transactions can be found on-chain.\n\
    \n#### Limitations:\n\n- John cannot sell the land to any random user till he\
    \ has all the conditions of the smart contract fulfilled and validated by peers.\n\
    - Tom, who works after hours for the farm, does not get profit-share returns until\
    \ the consensus clause is fulfilled.\n- Ron wants to expand his courtyard for\
    \ parties and weddings but cannot do so until validation across the chain is met.\n\
    - Joe, who works full time, wishes to hire more people on the farm but cannot\
    \ do so until he gains validation from all.\n\nNow that we have evaluated one\
    \ form of consensus for this set of activities, list out activities and their\
    \ suitability to the mentioned form of consensus. Remember, as a part of studying,\
    \ developing, and forming blockchains, one is free to design as required with\
    \ the choice best suited to the scenario.\n\n### Proof of Stake\n\nActivities\
    \ using this form of consensus are purely based on the stake of ownership in the\
    \ unsectored land. It requires the block proposer to gain validation from the\
    \ high-stake holders through the voting mechanism based on the weight of stakes.\n\
    \nIf validator nodes based on their weight form the majority, the block transaction\
    \ is allowed.\n\nFor example:\n\n`If`  \n`W1 x1 + W2 x2 + W3 x3 + W4 x4 + W5 x5\
    \ > 60%`  \n`then`  \n- `Allow block transaction activities`\n\nwhere weights\
    \ are proportional to the actual stakes.\n\n#### Activities on-chain:\n\n- •\n\
    - •\n- •\n- •\n- •\n\n#### Advantages:\n\n- •\n- •\n- •\n- •\n- •\n\n#### Limitations:\n\
    \n- •\n- •\n- •\n- •\n- •\n\n### Delegated Proof of Stake\n\nThis consensus algorithm\
    \ tries to decentralize further from PoS to enable a fairer voting mechanism.\
    \ The algorithm delegates and reassigns weights for various activities at random.\
