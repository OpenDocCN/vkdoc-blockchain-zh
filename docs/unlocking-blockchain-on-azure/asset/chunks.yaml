  trans: '

    # 去中心化 KYC 与信用数据验证


    诸如政府等国家及国际治理机构，一直在尝试通过护照、生物特征收录、社会安全号码等方式实现身份标准化。然而，对于金融机构而言，由于个人情况的多样性，身份证明或开户流程通常需要提交非标准化文件。另一个现实情况是，在姓名变更或搬迁时，文件缺失会给金融机构和客户双方带来极大不便。


    在此背景下，KYC 的相关方主要包括主要客户以及可能与之交易的金融机构等企业。对于任何金融交易——无论是银行账户交易、信用卡交易、存款还是共同基金——银行都需要了解客户。这种信任关系通过提交经授权的政府文件或在某些情况下通过推荐来建立。然而，监管金融经济安全的监管机构要求银行花费时间进行
    KYC 合规检查，以防止洗钱。因此，背景调查、证书认证等工作日益增加。现在设想一下，这一检查过程发生在区块链网络上，而非线下流程。在线下流程中，客户数据必须以对最终客户不透明的方式在各方之间传递。这增加了机密数据泄露的风险，同时，此类文件可能以已知方式被伪造，使得追踪此类欺诈行为变得困难。在接下来的章节中，我们将探讨身份证明如何在区块链上进行转换，这有望增强贸易金融领域的
    KYC，从而改善内部流程以便获取信用证和银行保函。


    # 降低欺诈风险与合规成本


    设想一个特定区域内完全互联的贸易金融网络。所有贸易活动都被数字化记录在区块链上，每个已知实体都在链上。未经该链更新，任何链下活动都不得跨境。在这种理想情况下，交易流程可实现匿名追踪。然而，若此类网络中出现洗钱欺诈行为，重复的非法活动将被识别。同样，当任何贸易实体试图寻找漏洞绕过传统贸易方式时，链上记录也能识别此类异常案例。这使得监管机构更易于执行反洗钱法规，并避免经济失衡。


    为了构建全球贸易互联网络，香港和新加坡的监管机构——香港金融管理局与新加坡金融管理局——联合二十家银行共同启动了跨境贸易金融活动的贸易流数字化进程。其他一些去中心化倡议，由不同银行组成联盟，包括
    We.Trade、Voltron、贸易信息网络、Marco Polo、BankChain 等。所有努力都旨在实现数据无纸化、流程透明且安全。从技术角度看，其中多项倡议的试点阶段仍在为技术选型而挣扎——是选择企业级闭源区块链平台，还是开源区块链平台。若尝试采用企业级平台，托管该区块链的源代码能否被其他利益相关方盲目信任？该平台版本的开源分叉是否更能被公开接受？它是否支持互操作性，并鼓励更多利益相关方加入此类生态系统？当前的工作组是否准备好将现有系统与这种尖端技术集成？这些都是构建完全去中心化系统时尚待尝试、测试和探索的问题。


    作为技术人员，我们可以为智能合约贡献逻辑应用，创建连接跨链网络的有效节点系统，并培训我们的工作组适应此类开放、去中心的平台。随着主要金融机构致力于拓展跨境关系与政策，针对这些用例开发的任何概念证明，若能真正解决痛点，必将获得关注。例如，可以开发一个欺诈检测工具，审查区块链网络上的匿名数据，并在发现无效交易上存在现金流搭便车行为时向链上发出警报。此类工具可被纳入验证节点中。同样，智能合约的自动检查功能可以核对进行贸易所需的所有文件的合规性。


    # 贸易活动融资与追踪的新途径


    随着加密货币的出现，多种代币经济模式应运而生。许多零售商开始接受此类支付方式。基于此类机制的微型借贷和融资成为可能。然而，由于缺乏监管，代币的可信度往往不符合国家法律框架。但自比特币问世以来，比特币和以太坊已成功获得了广泛关注。通过将工作和流程进行微量化，在链上进行激励无疑为利益相关方带来了优势。


    再看另一个因区块链而得到更好发展的例子：一家领先的组织，它作为一个市场平台，帮助采购方在供应链中以全球市场的最优价格采购物料。全球贸易的百分之九十通过国际航运业实现。让我们深入探讨该行业的采购周期，以及区块链技术如何对其产生影响。


    ## 海事行业：保险、采购与贸易


    让我们来看看最古老的行业之一，一个自丝绸之路时代就已存在的行业——海事行业。


    鉴于该行业覆盖全球各个角落、货物运输量大且价值高、从业人员众多、各国法律法规复杂，以及之前讨论过的贸易金融问题，通过区块链干预能够改进的用例数不胜数。我们可以探讨以下几个案例：


    *   海上保险

    *   海事市场平台

