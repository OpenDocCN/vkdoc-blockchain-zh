    # 5. 智能合约


    让我们从两个定义开始：


    -   `Contract`（合约）—— 一种书面或口头协议，尤其涉及雇佣、销售或租赁等，旨在具有法律强制执行力。

    -   `Smart Contract`（智能合约）—— 一种可编程的数字协议，根据协议和交易的性质，由区块链网络上的相关利益方直接达成，可以自动执行、自动生效或两者兼备。


    在深入探讨智能合约之前，让我们先了解其在区块链堆栈中的位置。回顾前几章内容，请从下至上查看图 5‑1。


    ![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig1_HTML.jpg](img/474923_1_En_5_Fig1_HTML.jpg)


    **图 5‑1** 区块链生态系统的层次结构


    最底层是节点层，包含参与区块链的机器/节点。这些机器可以是物理服务器、手机、云实例或虚拟机。多个节点可能在同一台机器的不同端口上运行，或者每个节点可能在智能手机上有其自身的表示形式。这取决于代表用户的节点配置。这对应于
    Azure Workbench 第 2 章的元素，架构师可以在其中决定实例数量以及实例利益相关方之间的事件注册。


    第二层是链接层，包含混合账本，提供不同的网络连接配置——私有或公有、许可或开放、云端、非云端或其组合。如第 3 章所述，我们在该章学习了加密类型、分布方式及其他方面，链接层受网络中使用的共识形式所支配。可以基于区块链应用的性质，使用诸如
    `Hyperledger`、`Ethereum`、`Corda` 等区块链框架。


    最顶层是逻辑层，由可编程的智能合约组成，最贴近用户端。智能合约的条件将自动管理由其他两层配置共同制定的区块链中的交易。将此与现有的中心化堆栈（包含服务器、数据库的后端）和前端（UX、HTML、JavaScript）相关联。类似地，智能合约构成了前端元素，使用诸如
    `Solidity`、`Vyper`、`Serpent`（更接近后端操作）和 `LLL` 等编程语言编写。然而，这些语言相对较新，并随着应用需求不断演进。


    因此，在本章中，重点将放在这些编程语言所使用的底层逻辑上，用于在各种去中心化应用中设计和开发直观的智能合约。那么，让我们回顾一下智能合约如何应用于我们的现实生活，其范围不仅限于机器、计算机、笔记本电脑和智能手机。


    ## 现实生活中的智能合约


    房屋、住宅、地产、建筑、别墅——住所是人类的基本需求。每一次为了获得住所的交易，无论是买房、租房、租赁商铺还是投资房产，都会签订一般的法律合约。传统上，法律合约以纸质形式签订，不过近来已转向受法律管辖的数字形式。民事法庭负责解决因违约而产生的纠纷，以执行正当的权利。这个过程是各方利益相关者为争取公正结果而进行的漫长博弈。


    ### 案例：购买房产


    **传统方式存在的问题**：买方有意购买一栋建筑中的公寓。该建筑预计于 2020 年竣工，这是建筑商的承诺。买方根据签署合同时注明的建筑商条款和条件启动分期付款。到了某个阶段，已支付了
    80% 的费用，但建筑商突然甚至到 2021 年都无法交付。这给买方造成了严重的时间和金钱损失，并带来了不稳定性。这种情况给成千上万的购房者带来了不便。为解决此问题，需要诉诸法律诉讼、谈判，并多次出庭讨论法律条款和条件，以及关于合同上下文含义的不同推论和申辩。经过数月甚至数年的漫长拉锯战，正义可能得到伸张，也可能无法得到伸张。


    现在，想象一下这个生态系统的区块链版本。房子是业主的资产。它不仅通过纸质或在线合约被数字化，还以房子的数字锁和钥匙的形式存在。保护房子的这套安全系统可以是区块链中的一个节点。当买方从建筑商处购买房子时，基于智能合约条件的满足情况，节点的访问权限会提供给合法的所有人，同时也赋予其物理访问权限。利益相关方采取的行动会被自动触发，促使买方按时分期付款，服务提供商（建筑商）按时提供服务；在支付最后一笔款项后，所有权可以实时转移，房子的节点访问权限也随之转移给买方。交易是去中心化的，并由链上的其他节点利益相关方见证。此外，审计追踪和记录状态全程在区块链上透明地维护。


    这促成了一个完全透明的流程，该流程记录所涉及交易的每一个状态，并基于可执行的条款自动执行合约。最终用户体验到一种防篡改、不可变更且可自动执行的、无缝衔接的协议。


    **房地产中的智能合约解决方案**：买方在区块链上对一个数字资产（通过物联网和区块链设置与物理资产关联的房屋钥匙节点）表示兴趣。这个区块链是一个混合账本，由代表建筑商、住房集团、经纪人和买方的节点在公共链上组成（类似于电商平台，但安排不同，因为平台规则并非仅由一个中心化主体掌控）。链上的参与者是独立的实体，可以参与链上活动。如果买方在阅读房地产公共账本上的信息后，对某个住房集团的房产感兴趣，则相关利益方会形成一个私有的许可链。在这个私有链中，利益相关方就智能合约的条件达成一致，并同意根据智能合约自动执行这些条件。因此，在这种情况下，当买方通过私有账本支付分期付款时，房屋节点的权益会按比例转移。这正是可以被编程实现的内容。付款完成后，数字资产会实时无延迟地转移给所有者。这与传统的支票方式不同，后者的资金可能需要几天才能到账，建筑公司也可能需要一些时间才能弄清转入其账户资金的确切状态。或者，可以在智能合约中编程实现的另一个条件是关于当建筑商未能交付房屋时应如何处理。见图
    5‑2。


    ![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig2_HTML.jpg](img/474923_1_En_5_Fig2_HTML.jpg)


    **图 5‑2**

