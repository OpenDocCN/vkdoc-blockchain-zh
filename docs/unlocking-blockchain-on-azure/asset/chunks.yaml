    transplant requirement. If the IOT nodes satisfy, it finally requires the doctor’s
    on-chain signature along with the patient’s multi-sign on the acknowledgment.
    This permissioned chain enables a transparent process that may be tamper-proof
    on a decentralized system. Therefore, blockchains here make ideal sense.


