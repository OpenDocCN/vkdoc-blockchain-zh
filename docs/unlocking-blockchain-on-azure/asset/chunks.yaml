    Azure provides the infrastructure to form a peer node in a blockchain.


    Azure’s Blockchain Workbench not only allows you to participate as a peer node,
    but also empowers users to form a connected network using any blockchain framework.
    In the coming chapters, you shall see the infrastructure enablers offered by Azure
    to onboard your offline or centralized online network to a true decentralized
    blockchain network.


    So from a Community Manager in one part of the globe to any wanderer in the extreme
    far away lands could connect over Blockchains with Azure, combining the trust
