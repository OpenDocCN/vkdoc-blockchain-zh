- fmt: '# Decentralized KYC and Credit Data Validation


    National and international governance bodies, such as the government, have been
    trying to standardize identity with the use of passports, biometric inclusions,
    Social Security numbers, and so forth. However, for financial institutions, the
    proof or onboarding of identity is usually a submission of non-standardized documents
    due to the diversity of cases of various individuals. Another dynamic to this
    situation is that during name changes or transfer of location, a lack of documents
    can cause great inconvenience to both parties—the financial institutions as well
    as the customer.


    Here, the stakeholders of KYC are the prime customers and the businesses such
    as financial institutions that may transact with the customer. For any financial
    transaction, being it a bank account transaction, credit card transaction, deposits,
    or Mutual Funds (MFs), the bank needs to know the customer. This trust is established
    through the submission of authorized governmental documents or by referrals in
    some cases. However, the regulatory bodies that govern the safety of the financial
    economy require banks to spend time on regulation checks over KYC to avoid money
    laundering. Therefore, there is an increase in background checks, certificate
    authorization, and so on. Now imagine this check occurring on a blockchain network
    rather than in an offline process. In an offline process, a customer’s data has
    to be passed from one party to another in a manner that is non-transparent to
    the end customer. This increases the risk of leak of confidential data, and at
    the same time such documents could be forged in known ways, making it difficult
    to trace such fraud. In the coming sections, we shall see how proof of identity
    is transformed on a blockchain, which could enhance KYC for trade finance, thereby
    improving internal processes to gain LoCs and bank guarantees.


    # Reduced Risk of Fraud and Lower Compliance Costs


    Imagine a fully connected trade finance network in a particular location. All
    trade activities are digitized onto a blockchain, with every known entity on-chain.
    No off-chain activities are allowed to cross the borders without an update on
    this chain. In such an ideal case, the flow of transactions is tracked anonymously.
    However, in case of fraud within such a network where cash is laundered, the repeated
    illegal activity could be identified. Similarly, when any trade entity attempts
    to bypass the conventional methods of trade by finding a loophole, the chain records
    could identify such an outlier case. This makes it easier for regulatory bodies
    to enforce Anti Money Laundering (AML) and avoid a disbalance of the economy.


    In the interest of forming a Global Trade Connectivity Network (GTCN), Hong Kong
    and Singapore’s regulatory bodies—Hong Kong Monetary Authority (HKMA) and Monetary
    Authority of Singapore (MAS)—along with twenty banks collectively initiated digitization
    of trade flows for cross-border trade finance activities. Several other decentralized
    initiatives, with different banks forming consortiums, are We.Trade, Voltron,
    Trade Information Network, Marco Polo, BankChain, and more. All efforts are toward
    making data paperless and processes transparent and secure. From a technology
    standpoint, the pilot phases of several of these initiatives are still struggling
    with the choice of technology—whether to choose an enterprise close-sourced blockchain
    platform or an open-sourced blockchain platform. If one attempts to go enterprise,
    would the trust of the source code hosting the blockchain be blindly trusted by
    other stakeholders? Wouldn’t an open-sourced hard fork of the platform version
    be more openly accepted? Does it allow interoperability and encourage more and
    more stakeholders to join such an ecosystem? Is the current task force ready to
    integrate the existing systems with such cutting-edge technology? These are the
    questions that are yet to be tried, tested, and explored for an entirely decentralized
    system.


    As technologists, we could contribute logic apps for smart contracts, create effective
    node systems that connect on interchain networks, and educate our task force on
    adaptability to such open, decentralized platforms. As major financial institutions
    are invested in opening cross-border relations and policies, proofs of concept
    developed for any of these use cases would definitely gain traction if they genuinely
    solved a pain point. For example, one could create a fraud-detection tool that
    reviews anonymous data on the blockchain network and alerts the chain in case
    of any piggybacking of cash flow over an invalid trade. Such a tool could be included
    among the validator nodes. Similarly, auto checks of a smart contract could checklist
    the compliance of all documents required to conduct trade.


    # New Avenues of Financing and Tracing Trade Activities


    With the advent of cryptocurrencies, many forms of tokenomics came into existence.
    Several retailers started accepting such modes of payment. Micro-lending and financing
    through such schemes became a possibility. However, due to the lack of regulation,
    the credibility of the tokens was many times not within the framework of a country.
    However, Bitcoin and Ethereum have managed to gain a lot of traction since Bitcoin’s
    inception. With the micro-quantification of efforts and processes, incentivizing
    on-chain definitely provides advantages to the stakeholders.


    Looking at another example that has been better enabled by blockchains, we will
    examine a leading organization that is a marketplace for the procurement of materials
    across the supply chain at the best prices across global markets. Ninety percent
    of world trade happens via the international shipping industry. Let us deep dive
    into the procurement cycles of the industry and how it is impacted by blockchain
    technology.


    ## The Maritime Industry: Insurance, Procurement, and Trade


    Let’s look at one of the oldest industries, one that has existed from the time
    of the silk route—the maritime industry.


    Given the scope of this industry, which spans the corners of the world, the large
    volume and large value of goods moved around, the large number of people employed,
    the complexities of the laws and regulations from every country, and the earlier
    discussed issue of trade finance, the use cases that can be improved with a blockchain-led
    intervention are numerous. Some of the cases that we can look into are as follows:


    *   Marine insurance

    *   Maritime marketplace'
