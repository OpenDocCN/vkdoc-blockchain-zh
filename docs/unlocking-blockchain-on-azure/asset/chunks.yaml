  trans: '

    # 透明更新与公平贸易


    请确定一个用例，其中 `IoT`、区块链和人工干预可以形成一个去中心化生态系统，通过智能合约实现透明更新和公平贸易。


    在理解了 `IoT` 与区块链集成的设计思路后，可以用 Azure 组件来构建平台。Azure 提供了多种选项，可通过其工作台配置区块链的选择，以连接 `IoT`
    设备及其他逻辑应用。


    根据所设计的架构，可以决定基于集成和预定义条件来调用区块链。例如，每当传感器超过阈值时，区块链就会记录此事件以用于审计。因此，当传感器数据超过阈值时，会调用区块链的
    API。`DLT` 服务确保对数据片段进行哈希处理和区块生成，并将其添加到区块链账本中。


    然而，必须明确指出，对于直接连接到 `IoT` 的监控和报警系统，可能不需要区块链。因此，`Power BI` 可以直接连接到链下`DB`，如图所示。区块链账本的作用是维护不可变的记录，支持审计以追溯传感数据的所有状态，确保在依赖传感数据的转发系统中维护共识等。


    一个例子是氧气瓶的传感器数据，这些数据可能连接到生命支持、孵化中心、儿童护理等系统。由于需要维护此类信息以供医院审计，这些传感器数据可以存储在这个防篡改的区块链账本上，该账本与一系列设备相连。可以在所有节点上持续检查供应水平的状态。


    # JSON 准备


    为以下用例创建 `JSON` 配置伪代码和状态图：区块链平台捕获在调用智能合约条件时发生的每个状态和状态变化。通过参考车轮定位系统的官方智能合约流程，观察
    `JSON` 准备步骤：


    1. 定义用户类型。

    2. 定义状态。

    3. 绘制达到理想条件的过程/步骤。

    4. 根据用户活动确定状态。


    # 解决痛点


    在本节中，让我们检查现有的链下场景及其缺点。作为解决方案架构师，请解决下图中区块链方案的痛点。


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figk_HTML.jpg](img/474923_1_En_10_Figk_HTML.jpg)


    就库存成本、库存量和缺货情况等供需理解而言，该供应链的各个环节彼此高度脱节。这是因为所有利益相关者之间的沟通有限，并且最终用户的订单完全不透明。大多数此类小型实体各自为政地预测需求流，当不基于整个链的运动进行计算时，会导致成本增加。


    要了解更多信息，请在此处玩游戏：[`https://beergame.masystem.se/`](https://beergame.masystem.se/)


    现在我们已经了解了链下问题，请按照以下步骤设计一个完整的区块链解决方案：


    1. 选择利益相关者和角色。

    2. 选择区块链配置和连接。

    3. 选择共识类型。

    4. 根据步骤 3 选择平台。

    5. 衡量可扩展性要求。

    6. 如果需要，定义代币经济学。

    7. 设置智能合约的状态和条件。

    8. 绘制联盟区块链的链视图。


    现在，你已经学会了为现实场景选择正确的共识形式，识别链下和链上活动，并在联盟中选择正确的对等节点、验证节点和区块链配置，接下来让我们看看以下部分中的解决方案。


    # 解决方案


    ## 填字游戏 1


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figl_HTML.jpg](img/474923_1_En_10_Figl_HTML.jpg)


    ## 填字游戏 2


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figm_HTML.jpg](img/474923_1_En_10_Figm_HTML.jpg)


    ## 填字游戏 3


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Fign_HTML.jpg](img/474923_1_En_10_Fign_HTML.jpg)


    ## 填字游戏 4


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figo_HTML.jpg](img/474923_1_En_10_Figo_HTML.jpg)


    ## 匹配顺序


    * 1 – C – 图表 4

    * 2 – A – 图表 2

    * 3 – D – 图表 1

    * 4 – B – 图表 3


    # 权益证明设计挑战


    链上活动：


    * 土地的出售/租赁

    * 新增利益相关者

    * 批准预算提案

    * 资金分配

    * 不动产建设


    优势：


    * 高权益持有者之间的控制权

    * 即使是小权益持有者也有机会聚集形成多数

    * 在链上透明地提出提案请求

    * 基于共识跟踪资金分配

    * 透明的投资决策


    限制：


    * 对少数投票者和利益相关者的控制力弱

    * 权力集中在少数节点群体手中

    * 多数利益相关者的僵化性和影响力

    * 极低权益持有者群体缺乏决策途径

    * 无法扩展到其他用户或第三方，这些用户或第三方没有权益参与链上的任何决策或服务


    通过了解 `PoW` 和 `PoS` 方法的优缺点，像以太坊这样的现有区块链网络正在向 `PoW/PoS` 混合模式迁移。可以决定对一组活动（例如区块创建和生成）使用
    `PoW`；并使用 `PoS` 根据智能合约进行验证和批准。这种方法的融合可能有助于消除攻击、偏见等缺点。在此处研究最新的以太坊黄皮书：


    ```

    https://ethereum.github.io/yellowpaper/paper.pdf

    ```


    通过研究黄皮书，可以构建这样的区块链配置，既可以使用 `Azure Workbench`，也可以简单地利用 Azure 上的一组 Ubuntu 服务器，通过
    Docker 文件完成对节点的模拟。每个服务器可以是该服务器内虚拟实例上的一个节点或一组节点。一旦服务器分配的职责明确了，用户就可以将每个服务器的端点连接到事件注册器，该注册器可以调用其上的智能合约。

    '
- fmt: '### Delegated Proof of Stake


    Activities on chain:


    - Nomination of stake responsibility

    - Task allocation and ownership

    - Inclusion of third-party nodes, users, services

    - Delegation to new farming professionals to work actively on behalf of stake
    owner

    - Tenants on farm may be delegated some stake for certain activities


    Advantages:


    - Shared decentralized balanced forms of responsibility

    - Avenue for low-stake holders to gain delegated stakes for various transactions/activity

    - Failsafe method to avoid concentration of power based on pre-defined stakes

    - Inclusion of new nodes can be onboarded based on random consensus of on-chain
    delegated nodes.

    - Allows expansion of on-chain activities with decentralization and inclusion

    - Low energy consumption

    - Low latency periods


    Limitations:


    - Vulnerable to centralization and biases

    - Fake consensus by delegated nodes to create false transaction, which may not
    be in the best interests of the original stakeholder

    - Exclusion of non-delegated stakeholders


    One example of a variant of Proof of Stake is `Harmony`. `Harmony` enables an
    adaptive threshold mechanism for various stake requirements for various activities.
    Nodes that qualify for the value of stake may participate. `Harmony` maintains
    its scalability and decentralization by sharding the network, data, and the states
    of transaction entirely. The sharding mechanism is non-uniform, scalable, and
    secure throughout. The consensus combines the Adaptive PoS with `FBFT` (Fast Byzantine
    Fault Tolerance), making it fault tolerant, distributed, and able to support high-speed
    transactions.


    ### Directed Acyclic Graphs (DAG)


    Activities:


    1. Daily video feeds of the farms

    2. Sensor based IoT feeds

    3. Internal micro-transactions between Joe and Ron

    4. Localized validations

    5. Easily expandable to other nodes external to the core stakeholders for activities
    such as plumbing, electricity, notarization, etc.

    6. Export of farming produce

    7. Import and inventory management of seeds, farming material, etc.

    8. Third-party integration triggers for security, fire hazards, etc.


    Advantages:


    1. Validation responsibility is a natural progression by later block producers.

    2. Shared ledger information management does not require manual validation every
    time, thereby allowing IoT data to be appended to the immutable ledger seamlessly.

    3. Allows offline status of nodes for transactions that may be irrelevant to someone
    like John and still maintains records for later awareness for such stakeholders.

    4. Allows high-speed data transmission


    Disadvantages:


    1. Disconnect from snoozed nodes

    2. A one-way street of data ingestion and validation

    3. Vulnerable to attacks

    4. Prone to centralization


    ### Federated Byzantine Agreement


    Activities:


    1. Approval for micro-budget transactions

    2. Addition of family nominees or trusted known node users

    3. Fixing of maintenance items on-field

    4. Upload of bills and receipts

    5. Regular activities on-field


    Advantages:


    1. Highly fault tolerant

    2. Enables faster decision-making

    3. Allows transactions

    4. Allows non-trivial information to be added with curated validation of random
    nodes


    Disadvantages:


    1. Suited only for a certain set of activities that are limited to non-trivial
    decisions

    2. Fault tolerance assumes bypassing crucial node members is fine


    ### Proof of Importance


    John, Ron, Tom, and Joe decide to rank all the preceding listed activities and
    decide that based on the work they do, importance scores will be earned on-chain.
    For example, John ensured all paperwork regarding the land was perfect and was
    uploaded on the ledger. So, apart from being a high-stake holder of land, he contributed
    to crucial activities, incentivizing him on-chain. Similarly, others are enabled
    to complete tasks and gain importance. However, a high importance score holder
    can allow the next task assignment. The scores are reviewed every seven days,
    and the validators shift based on the score. This is the agreement that was locked
    in under Proof of Importance.


    Activities:


    1. Incentivizing employees for contributions and actions

    2. Incentivizing third-party entities that interact with this chain

    3. Incentivizing a highly active member who works for the farm

    4. Linkage of performance to importance


    Advantage:


    1. Provides an avenue for a low-stake holder like Joe to gain importance as well
    as value based on his contribution

    2. Allows shift of authority based on engagement and involvement


    Disadvantage:


    1. Hoarding of power, value generated on chain

    2. High dependency on network-driven activities

    3. Decentralization may cause complete loss of control in some situations where
    governance is required.

    4. May require revision or a hard fork to change policies


    ### Hybrid Chain


    Such a Blockchain maintains high transparency for all involved as well as allows
    prospective buyers to have a single source of shared truth.


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figp_HTML.jpg](Images/474923_1_En_10_Figp_HTML.jpg)


    ### Data and Transactions


    | **Public Chain** | **Private Chain** |

    | --- | --- |

    | **Data** | **Transaction Activity** | **Data** | **Transaction Activity** |

    | General demographics | Pathology lab audits | Detailed blood reports | Doctor
    patient transactions |

    | BMI | Hospital inspection checks | Surgery records | Hospital patient transactions
    |

    | Anonymous Names | Doctor education and work experience history | Therapy session
    details | Pharmacy patient transactions |

    | Area of Diagnostics | Purchase of general medical items | Family history | Insurance
    claim transactions |

    | Blood Group | Purchase of medical instruments and quality | X-rays, sonography
    | Financial transactions |

    | General Blood Reports | Blood donation | Genetic trace and DNA | |

    | Doctors Records | Organ donation with anonymous donors | Biometrics | |

    | Hospital Records | | | |

    | Insurance Certificates | | | |


    ### Energy Allocation


    | **On-Chain Entities** | **Off-Chain Entities** |

    | --- | --- |

    | Records of electricity consumption data from Smart Meters | Aggregation of one-time
    data of machinery that are not connected to the main line, but use batteries |

    | Operation managers, which manage the electricity usage | Forecast of further
    electricity consumption |

    | Bill invoices to 25 factories | M&A of factories |

    | Disbursement and payments of bills | Faulty meter checks |

    | Transfer of stakeholders | |


    | **Required** | **Not Required** |

    | --- | --- |

    | When one factory proportionately increases or decreases consumption for other
    24 based on its operations. | When 25 factories have no dependency on each other
    over electricity consumption. |

    | When Smart Meters are everywhere and data can be integrated seamlessly | When
    this data is populated purely by manual intervention and meter readings |

    | When this data affects the costs of the produce, must be highly sensitive. |
    When this data does not affect overall operations and the requirements are highly
    stable every year. |


    ### Gadgets


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figq_HTML.jpg](Images/474923_1_En_10_Figq_HTML.jpg)


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figr_HTML.jpg](Images/474923_1_En_10_Figr_HTML.jpg)'
