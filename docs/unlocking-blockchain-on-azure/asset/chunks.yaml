  trans: '

    ### 第四项挑战


    在角色分配完成后，平台需要定义数据结构与交易活动。


    第四项设计挑战是定义链上数据结构与交易活动。


    此处，定义的范围基于信用证及其相关法规的重点。


    该场景中确定的数据点如下：


    - 文档输入，例如 `KYC`、提单等

    - 文档验证状态

    - 多数投票状态

    - 智能合约的条件


    交易活动点定义如下：


    - 文档验证

    - 文档传输

    - 智能合约条件审批

    - 根据多数状态进行付款调度


    为进行详细规划，可按以下方式分阶段进行所有步骤：


    | **功能** | **描述** |

    | --- | --- |

    | 节点生成、集成与链搭建 | • 创建节点（`KYC/ AML`）<br>• 访问控制<br>• 链接生成<br>• 序列锁定<br>• 文档机器翻译为智能合约<br>•
    自我认证 |

    | 信用证（`LoC`）和银行保函（`BG`）的智能合约 | • `LoC` 智能合约申请表<br>• `BG` 智能合约申请表<br>• 跨节点智能合约自动验证<br>•
    通过链传输文档<br>• 验证与警报<br>• 按合约执行的智能触发器 |

    | 交易与其他可执行操作 | • 履行 `LoC` 智能合约时的实时资金调度<br>• 扣留银行保函时的损失结算<br>• 各种文档更新的警报<br>• 低信用与欺诈检测的警告警报
    |

    | 监控面板 | • 按访问控制的节点视图<br>• 授权控制<br>• 验证控制<br>• 报告与警报 |


    ### 第五项挑战


    为了进一步明确并预测完整设计，必须确保区块链覆盖所有情况。因此，下一项设计挑战是确保功能全覆盖。


    第五项设计挑战是实现全覆盖的区块链代码。


    为确保区块链代码的全覆盖，需要定义每类用户之间所有可能的用户故事。让我们确定买方侧（图 8-5）和卖方侧功能（图 8-6）。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig6_HTML.jpg](img/474923_1_En_8_Fig6_HTML.jpg)


    图 8-6

    卖方侧的用户故事


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig5_HTML.jpg](img/474923_1_En_8_Fig5_HTML.jpg)


    图 8-5

    买方侧的用户故事


    银行节点是 `CA` 节点，并且存在具有不同权限级别的验证节点。如图 8-7 所示。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig7_HTML.jpg](img/474923_1_En_8_Fig7_HTML.jpg)


    图 8-7

    银行节点之间的验证与交易活动


    记住：作为架构师、开发者或区块链平台提供商，你有责任设计并开发一个完全可靠的方案，以避免任何漏洞、绕过和中心化机会。这些问题在中心化平台中可以得到处理，因为可以持续更新而无需订阅者达成共识。然而，区块链上的修正和更新由于需要接受更改并更新本地节点的共识而变得计算复杂。因此产生了分叉的概念。


    根据情况，分叉有多种定义方式，如下所示：


    - 区块链分叉为两条潜在前进路径时发生的情况

    - 协议的更改

    - 两个或多个区块具有相同区块高度时发生的情况

    - 发现矛盾漏洞或出现类似竞态条件的情况


    例如，当以太经典（工作量证明）这种去信任网络中的用户数量增加时，漏洞也随之增加，导致了 51% 攻击。这是一种攻击，当攻击者控制超过 50% 的网络算力时，可能对使用
    `PoW` 算法达成共识的区块链发起攻击。这意味着网络的大部分节点被攻击者占据，他们验证并允许欺诈交易，从而引发攻击。此类漏洞需要提前预见，以避免安全漏洞。


    这使得第五项挑战最为关键，即确保区块链的核心属性万无一失。如何确保这一点？请填写下表，包括痛点、围绕痛点的相关问题、这些情况下节点的责任，以及针对交易的总体解决方案行动，如图
    8-8 所示。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig8_HTML.jpg](img/474923_1_En_8_Fig8_HTML.jpg)


    图 8-8

    解决方案：所有情况下的用户故事


    **练习**


    为去中心化库存系统填写下表，以避免高库存成本并最小化缺货损失。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Figa_HTML.png](img/474923_1_En_8_Figa_HTML.png)


    如图 8-9 所示，买方和卖方是中介机构的订阅者，并享受金融机构的服务。作为服务的订阅者，他们在权限、透明度和决策权方面的平衡实际上并不受其控制。然而，当所有用户都进入去中心化平台时，它使用户能够主张权利并参与到决策过程中。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig9_HTML.png](img/474923_1_En_8_Fig9_HTML.png)


    图 8-9

    中心化的传统贸易融资流程


    例如，如图 8-10 所示，验证节点、对等节点和排序节点等节点是交易的参与方，它们基于所绑定的共识共同验证交易。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig10_HTML.jpg](img/474923_1_En_8_Fig10_HTML.jpg)


    图 8-10

    去中心化的贸易融资流程


    请注意，这种安排是多种区块链的联盟。有些在组织之间，有些在组织内部。例如，跨所有利益相关者的公有链将是组织间的，涉及贸易的多方。很多时候，节点代表将是组织代表，需要在公有链上执行某个操作之前达成内部共识。因此，每当内部组织的私有链形成共识时，也就是节点代表在公有链上验证交易之时，从而保持全链路端到端的透明度和连接性。

    '
- fmt: '### Sixth Challenge


    The final design challenge is to arrange the elements in the architecture based
    on decisions identified in Chapter [7](#474923_1_En_7_Chapter.xhtml) and in the
    preceding pain points.


    The sixth design challenge is to draw out the **consolidated architecture stack**.


    In the trade finance use case, we have stacked the key components of the services
    required.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig11_HTML.jpg](Images/474923_1_En_8_Fig11_HTML.jpg)


    Figure 8-11: A consolidated architecture stack with all components


    The consolidated stack comprises the end-to-end touchpoints, ranging from edge
    devices such as IoT integrations to the event grid that triggers events based
    on the smart contract or consensus (Figure [8-11](#474923_1_En_8_Chapter.xhtml#Fig11)).


    Figure [8-12](#474923_1_En_8_Chapter.xhtml#Fig12) shows a collaborative workflow
    aiming for true decentralization.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig12_HTML.jpg](Images/474923_1_En_8_Fig12_HTML.jpg)


    Figure 8-12: Enterprise positioning of financial institutions involved in global
    trade finance


    There are three levels of design:


    - System architecture

    - Enterprise architecture

    - Application architecture


    Refer to Figures [8-13](#474923_1_En_8_Chapter.xhtml#Fig13) and [8-14](#474923_1_En_8_Chapter.xhtml#Fig14)
    for sample architecture flows typically in a financial services environment.


    `System architecture` lets you place the physical and virtual components of the
    blockchain across the network with respect to hardware (such as virtual machines
    on cloud, computers, servers, mobile phones, smart devices) as well as its integration
    with the software service layers hosted.


    `Enterprise architecture` is a model that allows enterprise structure and functionalities
    to be embedded in the process of the application. Here, the design is focused
    on what the components do, and not how they work. This enables different sections
    of enterprise teams to interact and integrate. `TOGAF` and `Zachman` frameworks
    exist across enterprises, and blockchain designs can take references to the existing
    models and improvise.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig13_HTML.jpg](Images/474923_1_En_8_Fig13_HTML.jpg)


    Figure 8-13: Process flow for setup of blockchain in financial institutions


    `Application architecture` walks through the functional components specific to
    the application. The focus area must cover the chain service mechanism for transaction
    activity, contract definitions and translations, triggers and alerts, stake division,
    permissions, and so forth.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig14_HTML.jpg](Images/474923_1_En_8_Fig14_HTML.jpg)


    Figure 8-14: Application set up in a financial services environment


    Now that we have learned the different types of architecture and their application-based
    designs, let us look into the 8D Factors of Technical Architecture defined at
    the start of this chapter.


    ### Measure of Scale with Respect to User Base, Locations, Entities, and Objects


    #### User Base and Locations


    In trade finance, the user base includes a global canvas of people ranging from
    traders, buyers, exporters, and international agencies, to customs, regulatory
    bodies, countries, financial institutions, vetting bodies, and so on. At the same
    time, it includes local micro-chains of producers, transport companies, cooperative
    banks, agro distributors, packaging companies, financial micro lenders, local
    governmental schemes and bodies, and so forth that work around the local environment.
    As a blockchain platform, one may cover local or global areas—it depends on the
    problem that the platform wishes to solve.


    For example, if financial inclusion is the focus of the chain, it must start locally
    and spread to remote areas to which access is limited. When global financial inclusion
    is the focus, the blockchain platform must connect all remote areas globally and
    include trade aggregators to accelerate outreach. One may incentivize these peer
    nodes to onboard remote trade players. The question that may arise is, why include
    all such players while considering trade finance? When the end-to-end players
    are completely connected by a decentralized platform, information is a lot more
    credible than when you have biased sources of information offline or on centralized
    online platforms. With such credible information on this immutable ledger, better-informed
    decisions and predictive factors can be calculated. The proof of credit can be
    tangibly measured; you’ll have not just the validation of one node or a group
    of nodes but also the tamper-proof history on the blockchain ledger.


    An architect developing the design for such a platform needs to factor in the
    scale of the user base based on the short-term and long-term goals of the business
    service. Similarly, the locations of global, local, and remote entities have to
    be decided in order to shape the technology stack around them. Further, with the
    consideration of location, one has to factor in the socioeconomic status of the
    user’s locale. For example, places without proper internet access might need to
    be part of fault-tolerant networks so that if validation does not get approved
    by every user due to a lack of internet, operations could still continue. The
    architect has to maintain the right ratio of `validator nodes`, `peer nodes`,
    and `orderer nodes` for a functional network with the right forms of consensus
    mechanisms. Also, the architect must choose the device form based on location;
    for example, field specialists such as farmers and fishermen might not have computer
    access, and therefore those nodes might have to be on a virtual cloud server node
    or mobile device node or a camera node that could be an IoT device connected to
    the blockchain.


    #### Entities and Objects


    With platform of several entities involved in a trade finance blockchain, the
    regulations, IT policies, and access control may differ from entity to entity.
    If it is a collaborative network, to have appropriate consensus, all factors of
    the various entity policies have to be covered. For example, a cooperative bank
    or a financial institution needs to maintain its `Azure Active Directory` in a
    particular way; the format has to remain as is. Azure provides a mapping between
    the enterprise’s `Active Directory` to the blockchain’s user directory. A blockchain
    integration may run over multiple Azure accounts with their independent AD policies.
    This mapping to the blockchain’s directory is crucial to the design. At the same
    time, a node from one entity must not be able to access other entities’ ADs in
    any way.


    Objects may be assets, contracts, data structures, off-chain reports, and so forth.
    However, there have been several fintech hacks in the cryptocurrency markets resulting
    from improper security of off-chain wallets. So, in a trade finance network, if
    the validation circuit is on-chain, and the downloadable report can be modified
    off-line without a hash address trace, then the entire point of having such a
    validation on-chain is invalid. So, the architect must question whether a blockchain
    is truly required while constructing every object, both on-chain and off-chain.
    Azure securely maintains monitoring systems, event triggers, and off-chain stores
    to trace objects.


    The measure of scale could be as small as a three-entity local blockchain network
    for trade finance or as large as a million-entity global blockchain network for
    global trade finance. However, maintaining the decentralization and consensus
    along with the core fundamentals of the blockchain is extremely crucial at every
    stage. At the same time, once established and processes are set up on-chain, one
    can expand the transaction activity from one object to several objects (assets)
    and scale functionalities.'
  raw: '### Sixth Challenge


    The final design challenge is to arrange the elements in the architecture based
    on decisions identified in Chapter [7](#474923_1_En_7_Chapter.xhtml) and in the
    preceding pain points.


    The sixth design challenge is to draw out the **consolidated architecture stack**.


    In the trade finance use case, we have stacked the key components of the services
    required.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig11_HTML.jpg](Images/474923_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    A consolidated architecture stack with all components


    The consolidated stack comprises the end-to-end touchpoints, ranging from edge
    devices such as IoT integrations to the event grid that triggers events based
    on the smart contract or consensus (Figure [8-11](#474923_1_En_8_Chapter.xhtml#Fig11)).


    Figure [8-12](#474923_1_En_8_Chapter.xhtml#Fig12) shows a collaborative workflow
    aiming for true decentralization.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig12_HTML.jpg](Images/474923_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Enterprise positioning of financial institutions involved in global trade finance


    There are three levels of design:


    *   system architecture


    *   enterprise architecture


    *   application architecture


    Refer to Figures [8-13](#474923_1_En_8_Chapter.xhtml#Fig13) and [8-14](#474923_1_En_8_Chapter.xhtml#Fig14)
    for sample architecture flows typically in a financial services environment.


    System architecture lets you place the physical and virtual components of the
    blockchain across the network with respect to hardware (such as virtual machines
    on cloud, computers, servers, mobile phones, smart devices) as well as its integration
    with the software service layers hosted.


    Enterprise architecture is a model that allows enterprise structure and functionalities
    to be embedded in the process of the application. Here, the design is focused
    on what the components do, and not how they work. This enables different sections
    of enterprise teams to interact and integrate. TOGAF and Zachman frameworks exist
    across enterprises, and blockchain designs can take references to the existing
    models and improvise.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig13_HTML.jpg](Images/474923_1_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Process flow for setup of blockchain in financial institutions


    Application architecture walks through the functional components specific to the
    application. The focus area must cover the chain service mechanism for transaction
    activity, contract definitions and translations, triggers and alerts, stake division,
    permissions, and so forth.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig14_HTML.jpg](Images/474923_1_En_8_Fig14_HTML.jpg)


    Figure 8-14


    Application set up in a financial services environment


    Now that we have learned the different types of architecture and their application-based
    designs, let us look into the 8D Factors of Technical Architecture defined at
    the start of this chapter.


