  trans: '

    #### 高速交易与并发处理


    `Azure CosmosDB` 提供低延迟、高可用且全球分布的多模型数据库，以支持此类交易以及在联盟网络中运行并发交易。针对这一需求，也可选择类似的 NoSQL
    数据库。


    医疗记录在全球各地时刻都在生成，并会针对不同利益相关方从账本中被多次索引。因此，低延迟对于去中心化账本而言是一个关键因素。


    #### 开放或封闭，许可或无许可


    在医疗领域，大量信息（如医疗服务、政策等）会公开分发给利益相关方。然而，对医疗记录等机密信息的访问则需要进行许可控制。因此，该区块链可采用开放式许可账本。


    例如，`Azure Marketplace` 提供的 `Quorum` 通过将公共数据和私有数据分离到不同的网络，来维护交易和合约的隐私性，从而在保持私有数据隐私的同时，确保公共数据的透明性。


    #### 存储


    在区块链平台的分布式账本中，包含两个方面：一是链节点状态的去中心化存储，二是数据本身的存储。在此阶段，需要决定应用程序是运行在内网、互联网，还是带有虚拟节点集群的共享磁盘上。


    综合考虑医疗记录的共享需求以及前述对 `Quorum` 的选择——`Quorum` 保障的是交易及其状态的隐私，而非数据存储本身。因此，状态的存储是加密的，可存储在
    Azure 的 `Blob`、`CosmosDB` 或任何其他存储中。但对于那些数据存储比交易本身更关键的应用程序，可以考虑使用 `BigChainDB`
    这类扩展至分布式数据存储的工具。若需对文件进行完整加密，则可考虑 `IPFS`。当需要安全存储、交易/共享医疗记录时，可以设计将 `Quorum` 与 `IPFS`
    集成到 Azure 云组件中，从而使医疗记录的共享真正安全，并使存储在全球范围内同样得到保障。


    #### 代币、交易与信任


    医疗记录作为关乎患者健康的高度敏感文件，其来源的可信度至关重要。因此，在治理第一阶段选定的 `DAO` 建立了无偏见网络的信任基础。通过将认证委员会的投票机制上链，可以使记录更具可信度。此处的交易可能包括共享记录、购买医学检验和报告，或根据链上规定购买通用的匿名公共数据。在此，解决方案架构师需要设计联盟链，它可以是国家、地区或区域内的公有链，也可以是医生与患者的私有链，或企业与员工医疗记录的私有链，亦或是保险公司与客户的私有网络。交易网络的连接方式需在此阶段决定。一旦设计完成，便可基于业务需求量化链上操作。因此，首先要判断您的业务用例是否需要代币化；例如，医院/外科医生/病理学家的信用评级。客户对健康保险公司的信用评级等，可以通过链上约定的代币经济学在链上给予激励。然而，如果仅仅是维护账本上的数字保险库，则无需代币化。


    ![../images/474923_1_En_7_Chapter/474923_1_En_7_Figb_HTML.jpg](img/474923_1_En_7_Figb_HTML.jpg)
    练习 7-2：基于练习 7-1 中的业务案例，回答 GHOSSTTT 协议在您的用例中的输出结果


    当治理、高速和开放网络等要点明确后，即可开始调研适用于具体痛点的技术工具。在许多情况下，某些工具组合可能并未直接存在。此时，解决方案架构师需要决定是自行开发、选择现有的区块链解决方案，还是采用基于云组件的企业架构（如用于区块链网络的
    Azure）。


    完成本练习后，请参阅“解决方案架构师在业务和开发者层面决策的 21 个问题”表格。结合第 1 节和第 3 节的内容进行迭代，最终确定技术栈和架构。

