- fmt: "# Shared Ledgers\n\nThe traditional centralized cloud-based servers from the\
    \ last era are everywhere, be it e-commerce platforms or media channels or the\
    \ television industry. The ads we see and the programs that are hosted have a\
    \ more centralized, commercial approach.\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Figd_HTML.jpg](Images/474923_1_En_2_Figd_HTML.jpg)\
    \ Trivia\n\nIdentify the highly centralized platforms that show dominance on large\
    \ markets:\n\n*   Is highly mutable (can be manipulated by anyone—hackers, jammers,\
    \ etc.)\n*   Can be lost due to faults, write failures, and server downtimes\n\
    *   Vulnerable to data leaks and privacy\n*   Low access control and is in control\
    \ of the solution provider\n\nThis has led to several conspiracies about lost\
    \ ships and aircraft.\n\nThe concept of `BBChain` revamps the old-school storage\
    \ and hosting options with new-age decentralized transparent shared ledgers. The\
    \ append-only data on the ledgers can be truly trusted as the sole source of truth,\
    \ be secured, and have a direct connection and reliability with the correct stakeholders.\n\
    \nLet’s come back to the same question: Why blockchain? Why decentralize to a\
    \ shared ledger?\n\nIn the olden days, when democracy wasn’t fully matured, the\
    \ dominance of some influential individuals or companies was more prevalent. From\
    \ getting a telephone line to applying for a visa, things were entirely dependent\
    \ on centralized authorities. As society progressed, democracy’s structure improved\
    \ among the individuals, and a larger group of people was involved in decision-making,\
    \ laws and rights, and the way we work.\n\nThis era of millennials wouldn’t entirely\
    \ be aware of the pain it took to access certain opportunities before the internet.\
    \ Now that we are in this digital age where the internet is a common commodity,\
    \ structuring the software applications we use is important. For example, on a\
    \ social media platform, where one uploads a photo and chooses to delete it, the\
    \ data authority of the photo is entirely lost by the individual when he uploads\
    \ it to this centralized platform (this might get changed with the GDPR Regulations;\
    \ however, enforcement and checks may be manual). So, with the comparison of the\
    \ age when we didn’t have democracy with the current era, blockchain brings that\
    \ opportunity to give every identity a voice to structure, vote, and contribute\
    \ to this digital era. In technical terms, every device becomes an access control\
    \ touchpoint, every computer becomes a storage point, every user exercises voting\
    \ rights, and every policy that can be automated across the shared ledger brings\
    \ in transparency, data decentralization, privacy, security, immutability, and\
    \ validity of every transaction and action on such platforms. This is what this\
    \ book envisions educating all its readers about.\n\nExamples of blockchains—i.e.,\
    \ shared ledgers—that are bringing about social impact are as follows:\n\n*  \
    \ UN World Food Programme (WFP) started a program called Building Blocks in 2016,\
    \ which uses the Ethereum blockchain to make “WFP’s growing cash-based transfer\
    \ operations faster, cheaper, and more secure,” according to the project’s website.\
    \ This was piloted to track assistance to Syrian refugees.\n*   Invested in by\
    \ the UNICEF Innovations Fund, the blockchain platform Amply and IXO provide transparency\
    \ for funding transactions for charities helping with South African education.\n\
    *   The Brooklyn Microgrid is changing the way we choose our electricity source,\
    \ such as solar yielded at private homes, transmissioned energy, etc., driving\
    \ an economy that is truly decentralized for production and consumption with direct\
    \ demand and supply connectivity through a shared ledger.\n*   M-Vision is a decentralized\
    \ incubator that runs on blockchains and quantifies remote research efforts and\
    \ brings them closer to commercialization through the ledger network of researchers,\
    \ professionals, and industrialists.\n\nComing back to BBChain, we shared public\
    \ data, showcased in Figures [2-4](#474923_1_En_2_Chapter.xhtml#Fig4) and [2-5](#474923_1_En_2_Chapter.xhtml#Fig5),\
    \ on the shared ledger by using the principles of BigChainDB and Cassandra to\
    \ store data in a distributed manner.\n\nHere is a storage simulation of financial\
    \ data in a centralized platform versus decentralization:\n\n*   Centralized/Normal\
    \ Platform:\n    *   Stored as an encrypted record in a database stored on a single\
    \ server\n\n```\nX = \"Confidential Info: 1 Million USD Transferred to Dr. John\
    \ Doe\"\n```\n\n*   Decentralized Platform/Blockchain:\n    *   Making it difficult\
    \ for any fraudulent user or network jammer to decrypt and retrieve X, as first\
    \ the hacker would require the complete form of the encrypted sentence and then\
    \ the decryption key, which also may be distributed across the chain.\n\n```\n\
    Y = Encrypt (X), break X into pieces and store in N number of nodes on the ledger\n\
    ```\n\nBBChain distributes and locks data securely on-chain over the shared ledger.\n\
    \n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fige_HTML.jpg](Images/474923_1_En_2_Fige_HTML.jpg)\
    \ Challenge\n\nFrom the preceding information, identify which aspect of dominance\
    \ of an online platform can be restructured on a distributed ledger.\n\nFor example,\
    \ in trade finance, financial institutions are the dominant authorities that can\
    \ issue the letters of credit and bank guarantees for large-scale import-export\
    \ activities. The dominance aspect here is for the issuance, which is democratized\
    \ with the rules and checks defined by the authorities. However, this issuance\
    \ can have human biases and influences at times, causing defaulters. This aspect\
    \ of trust and authority when automated over a smart contract on a shared ledger\
    \ brings a better chance of avoiding trade defaults. So, this challenge asks the\
    \ readers to identify which part of dominance one wishes to reprogram, and this\
    \ book will help you construct and program the same."
