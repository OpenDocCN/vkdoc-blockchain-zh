- fmt: "# Application of GHOSSTTT Protocol\n\nThe next step is to stack up the layers\
    \ of the GHOSSTTT protocol into a block diagram to formulate the overall process\
    \ flow and architecture. For example let’s understand the architecture laid by\
    \ the Azure Blockchain Workbench, as shown in Figure [7-2](#474923_1_En_7_Chapter.xhtml#Fig2).\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig2_HTML.jpg](Images/474923_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2 Components of Azure\n\nCombining the answers from the GHOSSTTT protocol\
    \ and the 21-question matrix, the solution architect has to decide on either a\
    \ top-to-bottom approach (customer first to backend infrastructure) or a bottom-to-top\
    \ approach (backend infrastructure to customer interface). With an ecosystem such\
    \ as Azure, all components of a blockchain application are covered.\n\nFor example\
    \ in Figure [7-2](#474923_1_En_7_Chapter.xhtml#Fig2), a top-to-bottom approach\
    \ consists of the following:\n\n- User authentication (Cell No. 17) – Azure Active\
    \ Directory\n- Application interface (Cell No. 20) – Xamarin apps and IoT edge\
    \ devices with IoT Hub\n- Data communication channels (Cell no. 12) – REST-based\
    \ gateway service API, message brokers, service bus\n- Consumers such as DLT (on-chain),\
    \ database (off-chain), and hash storage (encrypted) consumers\n- Insights – Azure\
    \ Monitor and analytics\n- Transaction builder and signer – Azure Key Vault\n\
    - Transaction routers and ledgers\n- DLT watcher and event grid\n\nThese tools\
    \ are highly reliable when customers are located across geographical areas with\
    \ the means to connect over a reliable internet connect, as well as for an organization\
    \ that is looking for an enterprise infrastructure of cloud components to drive\
    \ the blockchain.\n\nRevisiting the CAUSE matrix, why is a blockchain required\
    \ in such a case, and not a centralized hosted system? Because for hosting parties\
    \ that develop and host such platforms, encryption is usually at the mercy of\
    \ the developers or under the governance of the company hosting such a service.\
    \ Therefore, such platforms have low credibility in terms of public trust on a\
    \ large scale. In a blockchain network, the encryption is distributed across a\
    \ network, making it difficult to decrypt by any random attacker. Also, in a blockchain\
    \ mode of governance, where the process runs on a decentralized, autonomous system\
    \ that can be seen as a set of pre-defined, agreed-upon rules set in a smart contract,\
    \ replacing the rules ad hoc is not allowed until all members agree and validate\
    \ the change of rule or until consensus is achieved on the change.\n\nSo far,\
    \ we have gotten a bird’s eye view of the architecture used to form a decentralized\
    \ blockchain application, along with the components that form the ledger and the\
    \ support components that drive the application. Further drill-downs inside the\
    \ blockchain architectures of Ethereum, Hyperledger, and so forth can be found\
    \ in the next chapter.\n\nThe following is a list of top-to-bottom functional\
    \ components for a decentralized application:\n\n- Front-end components\n  - Applications\n\
    - Block explorers\n- Monitoring systems (watchers, event trigger alerts)\n- Smart\
    \ contract tools\n- Definitions with Solidity and other smart contract languages\n\
    - Auto-validators, enforcers of the contract\n- Pre-defined standards and governance\n\
    \  - for tokens\n  - for identity\n  - for actions\n- Tooling components\n  -\
    \ Active Directory\n- Wallets\n- Vaults\n- Data Warehouse integrations\n- Integration\
    \ plugins\n- `Json RPC`\n- Inter-Chains\n- Oracles\n- Privacy and scaling components\n\
    \  - Encryption\n- Hashing\n- Computing\n- Concurrency of service buses\n- Core\
    \ blockchain components\n  - Network configuration\n- On-chain and off-chain states\
    \ and storage\n- Execution of smart contracts\n- Consensus\n  - for private networks\n\
    \  - for public networks\n- Network protocols\n  - `Devp2p`\n- Enterprise `P2p`\n\
    - `RLPx` wire\n- `Libp2p`\n\n## Azure Stack\n\nOnce the mechanisms and the component\
    \ structure are defined for the use case at hand, Design Architecture can be allocated\
    \ to the development teams based on the type of component, function, and role.\
    \ Note that once the solution architect finalizes the stack with the GHOSSTTT\
    \ protocol, 21-question matrix, and the component list, curating the actual execution\
    \ of true decentralization is of utmost importance. Proceeding further, we must\
    \ raise the following questions to improve the stack:\n\n- How is this credibility\
    \ established?\n- How is the true decentralization validated?\n- How is governance\
    \ tested and enforced?\n\nHaving an enterprise ecosystem where all third parties\
    \ also align with the definitions of components meant for true decentralization,\
    \ trust, and peer-to-peer networks is crucial.\n\nAzure Stack provides a single-click\
    \ deployment option for the Ethereum network wherein each member can contribute\
    \ to the network. The contributing member on-chain may run a set of nodes that\
    \ interact/transact with the other mining nodes on the chain. Azure lets one decide\
    \ the chain topology using network virtual appliance and connection resources\
    \ for single- or multi-member Ethereum consortium networks.\n\nIn an enterprise\
    \ setup that works B2B (for example, NBFCs working with DSAs for loan disbursals\
    \ or insurance companies working with insurance agencies), there are multiple\
    \ companies working with on another. The technical implementation of this business\
    \ setup requires nodes of the Blockchain communicate across different Azure accounts\
    \ that belong to different businesses.\n\nIn a setup where the processes are to\
    \ be decentralized within an organization, amongst different departments/employees\
    \ of the same organization, the nodes of the Blockchain will be a part of the\
    \ same organization subscription for Azure (cell nos. 11 and 16 of the 21-question\
    \ set).\n\nIn a multi-node Azure Stack, there are the following template components:\n\
    \n- Standalone and consortium leader deployment (also exists in single-node) –\
    \ the initiator\n- Joining consortium member deployment – the joining members\n\
    - Connecting other members with the initiator/genesis node\n\nAzure provides the\
    \ template for both components/members with a deployment option to run the template.\
    \ For details on executing the template, see the following: [https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-ethereum#standalone-and-consortium-leader-deployment](https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-ethereum%2523standalone-and-consortium-leader-deployment).\n\
    \nAs a solution architect, one has to identify the existing templates Azure provides\
    \ in its marketplace with respect to the business case, GHOSTTT protocol, and\
    \ 21-question matrix.\n\nAzure provides the following Ethereum alternatives.\n\
    \n### Quorum: EEA Single-Member Blockchain\n\nQuorum is an open source, permissioned\
    \ implementation of Ethereum that focuses on securely processing transactions\
    \ and restricts access based on the permission status of control (see Figure [7-4](#474923_1_En_7_Chapter.xhtml#Fig4)).\
    \ Figure [7-3](#474923_1_En_7_Chapter.xhtml#Fig3) highlights the essential components\
    \ that power a QuorumChain. Observing the transactions of Ethereum on Quorum,\
    \ we see how all of these components come alive to interact with each other in\
    \ Figure [7-4](#474923_1_En_7_Chapter.xhtml#Fig4).\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig4_HTML.jpg](Images/474923_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4 Flow of Transactions on QuorumChain\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig3_HTML.jpg](Images/474923_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3 Architecture of a QuorumChain\n\nSee: [https://entethalliance.org/quorum-consortium-network-in-azure-marketplace.pdf](https://entethalliance.org/quorum-consortium-network-in-azure-marketplace.pdf)"
  raw: "### Application of GHOSSTTT Protocol\n\nThe next step is to stack up the layers\
    \ of the GHOSSTTT protocol into a block diagram to formulate the overall process\
    \ flow and architecture. For example let’s understand the architecture laid by\
    \ the Azure Blockchain Workbench, as shown in Figure [7-2](#474923_1_En_7_Chapter.xhtml#Fig2).\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig2_HTML.jpg](Images/474923_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\n\nComponents of Azure\n\nCombining the answers from the GHOSSTTT\
    \ protocol and the 21-question matrix, the solution architect has to decide on\
    \ either a top-to-bottom approach (customer first to backend infrastructure) or\
    \ a bottom-to-top approach (backend infrastructure to customer interface). With\
    \ an ecosystem such as Azure, all components of a blockchain application are covered.\n\
    \nFor example in Figure [7-2](#474923_1_En_7_Chapter.xhtml#Fig2), a top-to-bottom\
    \ approach consists of the following:\n\n*   User authentication (Cell No. 17) –\
    \ Azure Active Directory\n\n*   Application interface (Cell No. 20) – Xamarin\
    \ apps and IoT edge devices with IoT Hub\n\n*   Data communication channels (Cell\
    \ no. 12) – REST-based gateway service API, message brokers, service bus\n\n*\
    \   Consumers such as DLT (on-chain), database (off-chain), and hash storage (encrypted)\
    \ consumers\n\n*   Insights – Azure Monitor and analytics\n\n*   Transaction builder\
    \ and signer – Azure Key Vault\n\n*   Transaction routers and ledgers\n\n*   DLT\
    \ watcher and event grid\n\nThese tools are highly reliable when customers are\
    \ located across geographical areas with the means to connect over a reliable\
    \ internet connect, as well as for an organization that is looking for an enterprise\
    \ infrastructure of cloud components to drive the blockchain.\n\nRevisiting the\
    \ CAUSE matrix, why is a blockchain required in such a case, and not a centralized\
    \ hosted system?\n\nBecause for hosting parties that develop and host such platforms,\
    \ encryption is usually at the mercy of the developers or under the governance\
    \ of the company hosting such a service. Therefore, such platforms have low credibility\
    \ in terms of public trust on a large scale. In a blockchain network, the encryption\
    \ is distributed across a network, making it difficult to decrypt by any random\
    \ attacker. Also, in a blockchain mode of governance, where the process runs on\
    \ a decentralized, autonomous system that can be seen as a set of pre-defined,\
    \ agreed-upon rules set in a smart contract, replacing the rules ad hoc is not\
    \ allowed until all members agree and validate the change of rule or until consensus\
    \ is achieved on the change.\n\nSo far, we have gotten a bird’s eye view of the\
    \ architecture used to form a decentralized blockchain application, along with\
    \ the components that form the ledger and the support components that drive the\
    \ application. Further drill-downs inside the blockchain architectures of Ethereum,\
    \ Hyperledger, and so forth can be found in the next chapter.\n\nThe following\
    \ is a list of top-to-bottom functional components for a decentralized application:\n\
    \n*   Front-end components\n    *   Applications\n\n*   Block explorers\n\n* \
    \  Monitoring systems (watchers, event trigger alerts)\n\n*   Smart contract tools\n\
    \n*   Definitions with Solidity and other smart contract languages\n\n*   Auto-validators,\
    \ enforcers of the contract\n\n*   Pre-defined standards and governance\n\n* \
    \  for tokens\n\n*   for identity\n\n*   for actions\n\n*   Tooling components\n\
    \    *   Active Directory\n\n*   Wallets\n\n*   Vaults\n\n*   Data Warehouse integrations\n\
    \n*   Integration plugins\n\n*   Json RPC\n\n*   Inter-Chains\n\n*   Oracles\n\
    \n*   Privacy and scaling components\n    *   Encryption\n\n*   Hashing\n\n* \
    \  Computing\n\n*   Concurrency of service buses\n\n*   Core blockchain components\n\
    \    *   Network configuration\n\n*   On-chain and off-chain states and storage\n\
    \n*   Execution of smart contracts\n\n*   Consensus\n\n*   for private networks\n\
    \n*   for public networks\n\n*   Network protocols\n    *   Devp2p\n\n*   Enterprise\
    \ P2p\n\n*   RLPx wire\n\n*   Libp2p\n\n## Azure Stack\n\nOnce the mechanisms\
    \ and the component structure are defined for the use case at hand, Design Architecture\
    \ can be allocated to the development teams based on the type of component, function,\
    \ and role. Note that once the solution architect finalizes the stack with the\
    \ GHOSSTTT protocol, 21-question matrix, and the component list, curating the\
    \ actual execution of true decentralization is of utmost importance. Proceeding\
    \ further, we must raise the following questions to improve the stack:\n\n*  \
    \ How is this credibility established?\n\n*   How is the true decentralization\
    \ validated?\n\n*   How is governance tested and enforced?\n\nHaving an enterprise\
    \ ecosystem where all third parties also align with the definitions of components\
    \ meant for true decentralization, trust, and peer-to-peer networks is crucial.\n\
    \nAzure Stack provides a single-click deployment option for the Ethereum network\
    \ wherein each member can contribute to the network. The contributing member on-chain\
    \ may run a set of nodes that interact/transact with the other mining nodes on\
    \ the chain. Azure lets one decide the chain topology using network virtual appliance\
    \ and connection resources for single- or multi-member Ethereum consortium networks.\n\
    \nIn an enterprise setup that works B2B (for example, NBFCs working with DSAs\
    \ for loan disbursals or insurance companies working with insurance agencies),\
    \ there are multiple companies working with on another. The technical implementation\
    \ of this business setup requires nodes of the Blockchain communicate across different\
    \ Azure accounts that belong to different businesses.\n\nIn a setup where the\
    \ processes are to be decentralized within an organization, amongst different\
    \ departments/employees of the same organization, the nodes of the Blockchain\
    \ will be a part of the same organization subscription for Azure (cell nos. 11\
    \ and 16 of the 21-question set).\n\nIn a multi-node Azure Stack, there are the\
    \ following template components:\n\n*   Standalone and consortium leader deployment\
    \ (also exists in single-node) – the initiator\n\n*   Joining consortium member\
    \ deployment – the joining members\n\n*   Connecting other members with the initiator/genesis\
    \ node\n\nAzure provides the template for both components/members with a deployment\
    \ option to run the template. For details on executing the template, see the following:\
    \ [`https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-ethereum#standalone-and-consortium-leader-deployment`](https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-ethereum%2523standalone-and-consortium-leader-deployment).\n\
    \nAs a solution architect, one has to identify the existing templates Azure provides\
    \ in its marketplace with respect to the business case, GHOSTTT protocol, and\
    \ 21-question matrix.\n\nAzure provides the following Ethereum alternatives.\n\
    \n### Quorum: EEA Single-Member Blockchain\n\nQuorum is an open source, permissioned\
    \ implementation of Ethereum that focuses on securely processing transactions\
    \ and restricts access based on the permission status of control (see Figure [7-4](#474923_1_En_7_Chapter.xhtml#Fig4)).\
    \ Figure [7-3](#474923_1_En_7_Chapter.xhtml#Fig3) highlights the essential components\
    \ that power a QuorumChain. Observing the transactions of Ethereum on Quorum,\
    \ we see how all of these components come alive to interact with each other in\
    \ Figure [7-4](#474923_1_En_7_Chapter.xhtml#Fig4).\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig4_HTML.jpg](Images/474923_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nFlow of Transactions on QuorumChain\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig3_HTML.jpg](Images/474923_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\n\nArchitecture of a QuorumChain\n\nSee: [`https://entethalliance.org/quorum-consortium-network-in-azure-marketplace.pdf`](https://entethalliance.org/quorum-consortium-network-in-azure-marketplace.pdf)"
  trans: "\n# GHOSSTTT 协议的应用\n\n下一步是将 GHOSSTTT 协议的层级堆叠成框图，以构建整体流程和架构。例如，我们来了解 Azure\
    \ 区块链工作台所构建的架构，如图 7-2 所示。\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig2_HTML.jpg](img/474923_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2 Azure 的组件\n\n结合 GHOSSTTT 协议和 21 个问题的矩阵的答案，解决方案架构师必须决定是采用自上而下的方法（从客户到后端基础设施）还是自下而上的方法（从后端基础设施到客户界面）。在\
    \ Azure 这样的生态系统中，区块链应用的所有组件都已涵盖。\n\n例如，在图 7-2 中，自上而下的方法包括以下内容：\n\n- 用户身份验证（第 17\
    \ 单元）– Azure Active Directory\n- 应用界面（第 20 单元）– Xamarin 应用和带有 IoT Hub 的 IoT 边缘设备\n\
    - 数据通信通道（第 12 单元）– 基于 REST 的网关服务 API、消息代理、服务总线\n- 消费者，例如 DLT（链上）、数据库（链下）和哈希存储（加密）消费者\n\
    - 洞察 – Azure Monitor 和分析\n- 交易构建器和签名器 – Azure Key Vault\n- 交易路由器和账本\n- DLT 监视器和事件网格\n\
    \n当客户分布在不同地理区域，并能通过可靠的互联网连接进行连接时，以及对于寻求利用云组件企业基础设施来驱动区块链的组织而言，这些工具具有很高的可靠性。\n\n\
    重新审视 CAUSE 矩阵，为什么在这种情况下需要区块链，而不是集中托管的系统？因为对于开发和托管此类平台的参与方而言，加密通常取决于开发者，或者受托管此类服务的公司治理。因此，此类平台在大规模公信力方面可信度较低。在区块链网络中，加密分布在网络中，使得任何随机攻击者都难以破解。此外，在区块链治理模式下，流程运行在去中心化、自治的系统上，该系统可视为智能合约中预设的、经各方同意的规则集，在全体成员同意并验证规则变更或就变更达成共识之前，不允许临时修改规则。\n\
    \n到目前为止，我们已经从宏观角度了解了构成去中心化区块链应用的架构，以及构成账本的组件和支持应用运行的辅助组件。下一章将进一步深入探讨以太坊、Hyperledger\
    \ 等区块链架构的内部细节。\n\n以下是去中心化应用自上而下的功能组件列表：\n\n- 前端组件\n  - 应用\n- 区块浏览器\n- 监控系统（监视器、事件触发警报）\n\
    - 智能合约工具\n- 使用 Solidity 及其他智能合约语言的定义\n- 合约的自动验证器与执行器\n- 预定义的标准与治理\n  - 针对代币\n\
    \  - 针对身份\n  - 针对操作\n- 工具组件\n  - Active Directory\n- 钱包\n- 保险库\n- 数据仓库集成\n- 集成插件\n\
    - `Json RPC`\n- 跨链\n- 预言机\n- 隐私与扩展组件\n  - 加密\n- 哈希\n- 计算\n- 服务总线并发\n- 核心区块链组件\n\
    \  - 网络配置\n- 链上及链下状态与存储\n- 智能合约执行\n- 共识\n  - 针对私有网络\n  - 针对公共网络\n- 网络协议\n  - `Devp2p`\n\
    - 企业级 `P2p`\n- `RLPx` 通信协议\n- `Libp2p`\n\n## Azure Stack\n\n一旦针对当前用例定义了机制和组件结构，设计架构便可根据组件类型、功能和角色分配给开发团队。请注意，当解决方案架构师使用\
    \ GHOSSTTT 协议、21 个问题矩阵和组件列表最终确定堆栈后，策划真正的去中心化实际执行至关重要。进一步推进时，我们必须提出以下问题来改进堆栈：\n\
    \n- 这种可信度是如何建立的？\n- 真正的去中心化如何验证？\n- 治理如何测试和执行？\n\n拥有一个企业生态系统，其中所有第三方也与真正去中心化、信任和对等网络所需的组件定义保持一致，这一点至关重要。\n\
    \nAzure Stack 为以太坊网络提供了一键部署选项，每个成员都可以为网络做出贡献。链上的贡献成员可以运行一组节点，与链上的其他挖矿节点进行交互/交易。Azure\
    \ 允许用户使用网络虚拟设备和连接资源来决定链拓扑，适用于单成员或多成员的以太坊联盟网络。\n\n在 B2B 的企业环境中（例如，非银行金融公司与 DSA\
    \ 合作处理贷款发放，或保险公司与保险代理合作），有多家公司相互协作。这种业务设置的技术实现要求区块链节点在不同企业所属的不同 Azure 账户之间进行通信。\n\
    \n在需要将流程在组织内部、同一组织的不同部门/员工之间进行去中心化的设置中，区块链节点将成为同一组织 Azure 订阅的一部分（21 个问题集中的第 11\
    \ 和第 16 单元）。\n\n在多节点 Azure Stack 中，包含以下模板组件：\n\n- 独立部署和联盟领导者部署（也存在于单节点中）– 发起者\n\
    - 加入联盟成员部署 – 加入的成员\n- 将其他成员与发起者/创始节点连接\n\nAzure 为这两个组件/成员提供了模板，并带有运行模板的部署选项。有关执行模板的详细信息，请参阅：[`docs.microsoft.com/en-us/azure-stack/user/azure-stack-ethereum#standalone-and-consortium-leader-deployment`](https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-ethereum%2523standalone-and-consortium-leader-deployment)。\n\
    \n作为解决方案架构师，必须根据业务案例、GHOSTTT 协议和 21 个问题矩阵，识别 Azure 在其市场中提供的现有模板。\n\nAzure 提供了以下以太坊替代方案。\n\
    \n### Quorum：EEA 单成员区块链\n\nQuorum 是以太坊的一个开源、许可式实现，专注于安全处理交易，并根据控制的权限状态限制访问（见图\
    \ 7-4）。图 7-3 重点展示了驱动 QuorumChain 的基本组件。观察 Quorum 上以太坊的交易流程，我们在图 7-4 中可以看到所有这些组件如何相互交互。\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig4_HTML.jpg](img/474923_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4 QuorumChain 上的交易流程\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig3_HTML.jpg](img/474923_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3 QuorumChain 的架构\n\n参见：[`entethalliance.org/quorum-consortium-network-in-azure-marketplace.pdf`](https://entethalliance.org/quorum-consortium-network-in-azure-marketplace.pdf)\n"
- fmt: "### Ether.camp’s Ethereum Studio Blockchain Environment\n\nThis option quickly\
    \ sets up the development and deployment setup for Ethereum. It provides the template\
    \ to write smart contracts and deploy them in a sandbox to test and emulate. It\
    \ has an IDE to code the smart contracts and deploy them in an Ubuntu environment.\
    \ The sandbox is a NodeJS server configuration that can emulate a multi-node network,\
    \ thereby assisting with connecting nodes and governing based on the enforced\
    \ smart contracts.\n\n### Ethereum on Azure by Microsoft/Parity Ethereum with\
    \ Proof of Authority (PoA)\n\nThis toolkit utilizes the Ethereum virtual machine\
    \ with proof of authority instead of PoW (proof of work) as shown in Figure [7-5](#474923_1_En_7_Chapter.xhtml#Fig5).\
    \ The governance is pre-defined.\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig5_HTML.jpg](Images/474923_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nEthereum on Azure\n\nIt contains the following Azure components\
    \ (Figure [7-5](#474923_1_En_7_Chapter.xhtml#Fig5)):\n\n*   Virtual machines for\
    \ running the PoA validators\n*   Azure Load Balancer for distributing RPC, peering,\
    \ and governance DApp requests\n*   Azure Key Vault for securing the validator\
    \ identities\n*   Azure Storage for hosting persistent network information and\
    \ coordinating leasing\n*   Azure Monitor for aggregating logs and performance\
    \ statistics\n*   VNet Gateway (optional) for allowing VPN connections across\
    \ private VNets\n\nNow that we have seen various architectures based on the variants\
    \ that are outcomes of the 21-question matrix, let’s drill down deeper to a component\
    \ level of understanding from a developer’s perspective and decide the suitability\
    \ of the options.\n\n## Developer’s Version of Technical Component Breakdown\n\
    \nMost major blockchain networks that are driven by public, private, or consortium\
    \ networks are largely accepted due to the source code–level transparency of the\
    \ platform. This establishes trust to implement and execute, thereby making it\
    \ a trustworthy source for end users.\n\nFor example, Ethereum, Hyperledger, Corda,\
    \ Quorum, NEM, Stellar, and so on all have made their frameworks open source and\
    \ have further extended component codes on GitHub. This kind of setup allows businesses\
    \ to integrate third-party frameworks in order to formulate blockchains with better\
    \ confidence, as no loopholes are missed regarding the privacy and governance\
    \ on-chain. The choice of development at this stage is most crucial.\n\nThe recipe\
    \ here is for the solution architect to clearly focus on the components defined\
    \ in the previous section. However, on a code level, severe scrutiny has to be\
    \ maintained by the developer utilizing the proposed framework. For example, the\
    \ 51% Miner’s attack is one of the cases that was a loophole in Ethereum's earlier\
    \ source code. However, its choice to move to proof of stake consensus ensures\
    \ such attacks are avoided going forward.\n\nFor a developer, some of the most\
    \ crucial elements are the toolkit provisions, programmatic inputs to develop\
    \ the logical flow, and the choice of language. The sequence of decision to be\
    \ made is recommended by focusing over the current infrastructure, business logic\
    \ & then the choice of language that fits the first two. Why is the order of these\
    \ elements crucial here?\n\n*   Infrastructural provisions – Because without the\
    \ right set of infrastructural provisions, the most idealistic consensus may not\
    \ work suitably for a business case that requires cloud components for large-scale\
    \ outreach.\n*   Logical flows – Because the logical design and integration has\
    \ to be correctly wired. For example, event registers and transaction watchers\
    \ have to be logically wired during every transaction.\n*   Code language – This\
    \ many times is driven by the community initiatives, such as those highlighting\
    \ language affinity; for example, languages such as Go that enable Go developers\
    \ to extend Go-Ethereum for several applications.\n\nSince we are focused on the\
    \ developer’s version of technology tool selection for blockchains, let us consider\
    \ the bottom-to-top approach (where bottom would be the back-end databases and\
    \ the top would be the end users or front-end applications).\n\n### Layers of\
    \ Tools\n\nIn a technology stack, every layer has specific functions, from the\
    \ database end to the back end to the user interactivity in the front end. The\
    \ layers of tools and the decisions based on functional components for a blockchain\
    \ application are detailed next.\n\n| • Network peer-to-peer |\n| • Core blockchain\
    \ frameworks |\n| • Privacy and scaling components |\n| • Tooling elements |\n\
    | • Front-end elements |\n\n#### Network P2P Libraries\n\nThe following are some\
    \ useful libraries:\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig6_HTML.jpg](Images/474923_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6\n\nMulti-Organization Peer-to-peer network in Hyperledger Fabric\n\
    \n1.  Hyperledger Fabric:\n\n1.  In the Ethereum Blockchain network on Azure:\n\
    \    1.  The chain topology is deployed using the network virtual appliances (NVA).\n\
    \    2.  NVAs maintain high availability behind load balancers and peer node servers,\
    \ thus providing a fault-tolerant ecosystem.\n    3.  NVA IP addresses are used\
    \ on-chain for a multi-node chain instead of the peer node’s actual IP address,\
    \ thus making it difficult to hack into a peer-to-peer environment.\n\n1.  In\
    \ Quorum (which is available on the Azure Marketplace)\n    1.  Network permissioning\
    \ is a feature that controls which nodes can connect to a given node and also\
    \ to which nodes the given node can dial out. Currently, it is managed at the\
    \ individual node level by the `--permissioned` command-line flag when starting\
    \ the node.\n\n1.  In Ethereum:\n    1.  RLPx transport protocol: a TCP-based\
    \ transport protocol used for communication among Ethereum nodes.\n    2.  Kademlia\
    \ DHT (distributed hash table) provides peer selection during lookup, joining\
    \ the network. The protocol contains four RPC—Ping, Store, Find Node, and Find\
    \ Value.\n\n1.  Noise: P2P networking stack for developing decentralized applications\
    \ and cryptographic protocols written in Go. This is used in Perlin Wavelet Network.\n\
    \    1.  Ref: [`https://github.com/perlin-network/noise`](https://github.com/perlin-network/noise)\n\
    \n1.  Libp2p provides the package to set up peer networks. However, due to the\
    \ developer alignment of language, it also has language implementation, such as\
    \ the following:\n    1.  Go P2p\n    2.  Kotlin-based P2P\n    3.  Js-Lib p2p\n\
    \    4.  Rust Lib p2p\n\nAs we observe in Figure [7-6](#474923_1_En_7_Chapter.xhtml#Fig6),\
    \ the peer-to-peer network in Hyperledger Fabric runs on the chaincode defined\
    \ by the network. This makes it flexible as well as focused on the purpose of\
    \ the chain, along with the certificate authority issued by the participating\
    \ organizations in a multi-node, multi-organization scenario."
  raw: "### Ether.camp’s Ethereum Studio Blockchain Environment\n\nThis option quickly\
    \ sets up the development and deployment setup for Ethereum. It provides the template\
    \ to write smart contracts and deploy them in a sandbox to test and emulate. It\
    \ has an IDE to code the smart contracts and deploy them in an Ubuntu environment.\
    \ The sandbox is a NodeJS server configuration that can emulate a multi-node network,\
    \ thereby assisting with connecting nodes and governing based on the enforced\
    \ smart contracts.\n\n### Ethereum on Azure by Microsoft/Parity Ethereum with\
    \ Proof of Authority (PoA)\n\nThis toolkit utilizes the Ethereum virtual machine\
    \ with proof of authority instead of PoW (proof of work) as shown in Figure [7-5](#474923_1_En_7_Chapter.xhtml#Fig5).\
    \ The governance is pre-defined.\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig5_HTML.jpg](Images/474923_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nEthereum on Azure\n\nIt contains the following Azure components\
    \ (Figure [7-5](#474923_1_En_7_Chapter.xhtml#Fig5)):\n\n*   Virtual machines for\
    \ running the PoA validators\n\n*   Azure Load Balancer for distributing RPC,\
    \ peering, and governance DApp requests\n\n*   Azure Key Vault for securing the\
    \ validator identities\n\n*   Azure Storage for hosting persistent network information\
    \ and coordinating leasing\n\n*   Azure Monitor for aggregating logs and performance\
    \ statistics\n\n*   VNet Gateway (optional) for allowing VPN connections across\
    \ private VNets\n\nNow that we have seen various architectures based on the variants\
    \ that are outcomes of the 21-question matrix, let’s drill down deeper to a component\
    \ level of understanding from a developer’s perspective and decide the suitability\
    \ of the options.\n\n## Developer’s Version of Technical Component Breakdown\n\
    \nMost major blockchain networks that are driven by public, private, or consortium\
    \ networks are largely accepted due to the source code–level transparency of the\
    \ platform. This establishes trust to implement and execute, thereby making it\
    \ a trustworthy source for end users.\n\nFor example, Ethereum, Hyperledger, Corda,\
    \ Quorum, NEM, Stellar, and so on all have made their frameworks open source and\
    \ have further extended component codes on GitHub. This kind of setup allows businesses\
    \ to integrate third-party frameworks in order to formulate blockchains with better\
    \ confidence, as no loopholes are missed regarding the privacy and governance\
    \ on-chain. The choice of development at this stage is most crucial.\n\nThe recipe\
    \ here is for the solution architect to clearly focus on the components defined\
    \ in the previous section. However, on a code level, severe scrutiny has to be\
    \ maintained by the developer utilizing the proposed framework. For example, the\
    \ 51% Miner’s attack is one of the cases that was a loophole in Ethereum's earlier\
    \ source code. However, its choice to move to proof of stake consensus ensures\
    \ such attacks are avoided going forward.\n\nFor a developer, some of the most\
    \ crucial elements are the toolkit provisions, programmatic inputs to develop\
    \ the logical flow, and the choice of language. The sequence of decision to be\
    \ made is recommended by focusing over the current infrastructure, business logic\
    \ & then the choice of language that fits the first two. Why is the order of these\
    \ elements crucial here?\n\n*   Infrastructural provisions – Because without the\
    \ right set of infrastructural provisions, the most idealistic consensus may not\
    \ work suitably for a business case that requires cloud components for large-scale\
    \ outreach.\n\n*   Logical flows – Because the logical design and integration\
    \ has to be correctly wired. For example, event registers and transaction watchers\
    \ have to be logically wired during every transaction.\n\n*   Code language –\
    \ This many times is driven by the community initiatives, such as those highlighting\
    \ language affinity; for example, languages such as Go that enable Go developers\
    \ to extend Go-Ethereum for several applications.\n\nSince we are focused on the\
    \ developer’s version of technology tool selection for blockchains, let us consider\
    \ the bottom-to-top approach (where bottom would be the back-end databases and\
    \ the top would be the end users or front-end applications).\n\n### Layers of\
    \ Tools\n\nIn a technology stack, every layer has specific functions, from the\
    \ database end to the back end to the user interactivity in the front end. The\
    \ layers of tools and the decisions based on functional components for a blockchain\
    \ application are detailed next.\n\n|     • Network peer-to-peer |\n|     • Core\
    \ blockchain frameworks |\n|     • Privacy and scaling components |\n|     • Tooling\
    \ elements |\n|     • Front-end elements |\n\n#### Network P2P Libraries\n\nThe\
    \ following are some useful libraries:\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig6_HTML.jpg](Images/474923_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6\n\nMulti-Organization Peer-to-peer network in Hyperledger Fabric\n\
    \n1.  Hyperledger Fabric:\n\n1.  In the Ethereum Blockchain network on Azure:\n\
    \    1.  The chain topology is deployed using the network virtual appliances (NVA).\n\
    \n    2.  NVAs maintain high availability behind load balancers and peer node\
    \ servers, thus providing a fault-tolerant ecosystem\n\n    3.  NVA IP addresses\
    \ are used on-chain for a multi-node chain instead of the peer node’s actual IP\
    \ address, thus making it difficult to hack into a peer-to-peer environment.\n\
    \n1.  In Quorum (which is available on the Azure Marketplace)\n    1.  Network\
    \ permissioning is a feature that controls which nodes can connect to a given\
    \ node and also to which nodes the given node can dial out. Currently, it is managed\
    \ at the individual node level by the `--permissioned` command-line flag when\
    \ starting the node.\n\n1.  In Ethereum:\n    1.  RLPx transport protocol: a TCP-based\
    \ transport protocol used for communication among Ethereum nodes\n\n    2.  Kademlia\
    \ DHT (distributed hash table) provides peer selection during lookup, joining\
    \ the network. The protocol contains four RPC—Ping, Store, Find Node, and Find\
    \ Value.\n\n1.  Noise: P2P networking stack for developing decentralized applications\
    \ and cryptographic protocols written in Go. This is used in Perlin Wavelet Network.\n\
    \    1.  Ref: [`https://github.com/perlin-network/noise`](https://github.com/perlin-network/noise)\n\
    \n1.  Libp2p provides the package to set up peer networks. However, due to the\
    \ developer alignment of language, it also has language implementation, such as\
    \ the following:\n    1.  Go P2p\n\n    2.  Kotlin-based P2P\n\n    3.  Js-Lib\
    \ p2p\n\n    4.  Rust Lib p2p\n\nAs we observe in Figure [7-6](#474923_1_En_7_Chapter.xhtml#Fig6),\
    \ the peer-to-peer network in Hyperledger Fabric runs on the chaincode defined\
    \ by the network. This makes it flexible as well as focused on the purpose of\
    \ the chain, along with the certificate authority issued by the participating\
    \ organizations in a multi-node, multi-organization scenario."
  trans: "\n### Ether.camp 以太坊区块链开发环境\n\n该选项可快速搭建以太坊的开发与部署环境。它提供了编写智能合约的模板，并可在沙盒中测试和模拟部署。该环境内置了用于编写智能合约的\
    \ IDE，并支持在 Ubuntu 环境中部署。沙盒是一个 NodeJS 服务器配置，能够模拟多节点网络，从而协助节点连接并基于强制执行的智能合约进行治理。\n\
    \n### 微软/Parity 基于权威证明（PoA）的 Azure 以太坊\n\n如图 7-5 所示，该工具包采用权威证明（PoA）而非工作量证明（PoW）来运行以太坊虚拟机。治理规则是预先定义的。\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig5_HTML.jpg](img/474923_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5\n\nAzure 上的以太坊\n\n它包含以下 Azure 组件（图 7-5）：\n\n*   用于运行 PoA 验证器的虚拟机\n*  \
    \ 用于分发 RPC、节点对等连接和治理 DApp 请求的 Azure 负载均衡器\n*   用于保护验证器身份的 Azure Key Vault\n* \
    \  用于托管持久化网络信息和协调租约的 Azure 存储\n*   用于聚合日志和性能统计的 Azure Monitor\n*   VNet 网关（可选），用于允许跨私有\
    \ VNet 的 VPN 连接\n\n现在我们已经了解了基于 21 个问题矩阵得出的各种变体架构，接下来让我们从开发者的角度深入理解组件层面，并决定各选项的适用性。\n\
    \n## 开发者的技术组件分解视角\n\n大多数由公链、私链或联盟链驱动的区块链网络，之所以获得广泛认可，很大程度上归功于其平台源代码级别的透明度。这为实施和运行建立了信任，从而使其成为终端用户信赖的来源。\n\
    \n例如，以太坊、Hyperledger、Corda、Quorum、NEM、Stellar 等都将其框架开源，并进一步在 GitHub 上扩展了组件代码。这种设置允许企业集成第三方框架，以更大信心构建区块链，因为链上的隐私和治理方面不会遗漏任何漏洞。此阶段的开发选择至关重要。\n\
    \n对于解决方案架构师而言，关键在于明确关注上一节中定义的组件。然而，在代码层面，开发者必须对所采用的框架进行严格审查。例如，51% 的矿工攻击就是以太坊早期源代码中的一个漏洞案例。然而，其转向权益证明共识的选择确保了未来能够避免此类攻击。\n\
    \n对于开发者而言，最关键的要素包括工具包配置、用于开发逻辑流的编程输入以及语言的选择。建议的决策顺序是：首先关注当前基础设施，然后是业务逻辑，最后选择适合前两者的语言。为什么这些要素的顺序如此关键？\n\
    \n*   基础设施配置——因为没有合适的基础设施配置，最理想的共识机制可能也无法适用于那些需要云组件以实现大规模覆盖的业务场景。\n*   逻辑流——因为逻辑设计和集成必须正确连接。例如，事件注册器和交易观察器必须在每次交易中进行逻辑连接。\n\
    *   编程语言——这在很多时候由社区倡议驱动，例如那些强调语言亲和性的倡议；比如，Go 语言使得 Go 开发者能够扩展 Go-Ethereum 以用于多种应用。\n\
    \n由于我们专注于开发者视角的区块链技术工具选择，让我们考虑自底向上的方法（其中底部是后端数据库，顶部是终端用户或前端应用）。\n\n### 工具层\n\n\
    在技术栈中，从数据库端到后端，再到前端的用户交互，每一层都有特定的功能。以下详述了区块链应用的各工具层以及基于功能组件的决策。\n\n| • 网络点对点 |\n\
    | • 核心区块链框架 |\n| • 隐私与扩展组件 |\n| • 工具化元素 |\n| • 前端元素 |\n\n#### 网络 P2P 库\n\n以下是一些有用的库：\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig6_HTML.jpg](img/474923_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6\n\nHyperledger Fabric 中的多组织点对点网络\n\n1.  Hyperledger Fabric：\n\n1.  在 Azure\
    \ 以太坊区块链网络中：\n    1.  链拓扑使用网络虚拟设备（NVA）进行部署。\n    2.  NVA 在负载均衡器和对等节点服务器之后保持高可用性，从而提供一个容错的生态系统。\n\
    \    3.  链上使用 NVA IP 地址进行多节点链通信，而不是使用对等节点的实际 IP 地址，这使得侵入点对点环境变得更加困难。\n\n1.  在\
    \ Quorum（可在 Azure 市场上获得）中\n    1.  网络许可是一项功能，用于控制哪些节点可以连接到一个给定节点，以及该给定节点可以向外拨号连接到哪些节点。目前，它在启动节点时通过在单个节点级别使用`--permissioned`命令行标志进行管理。\n\
    \n1.  在以太坊中：\n    1.  RLPx 传输协议：一种基于 TCP 的传输协议，用于以太坊节点之间的通信。\n    2.  Kademlia\
    \ DHT（分布式哈希表）在查找和加入网络时提供对等节点选择。该协议包含四个 RPC——Ping、Store、Find Node 和 Find Value。\n\
    \n1.  Noise：用于开发去中心化应用和加密协议的 P2P 网络栈，使用 Go 编写。用于 Perlin Wavelet Network。\n   \
    \ 1.  参考：[`https://github.com/perlin-network/noise`](https://github.com/perlin-network/noise)\n\
    \n1.  Libp2p 提供了建立对等网络的包。然而，由于开发者的语言偏好，它也有多种语言实现，例如：\n    1.  Go P2p\n    2. \
    \ 基于 Kotlin 的 P2P\n    3.  Js-Lib p2p\n    4.  Rust Lib p2p\n\n如图 7-6 所示，Hyperledger\
    \ Fabric 中的点对点网络运行在由网络定义的链码之上。这使得它在多节点、多组织的场景下，既能保持灵活性，又能专注于链的目的，同时还能利用参与组织颁发的证书授权。\n"
- fmt: "### Core Blockchain Frameworks\n\nThis section focuses on the components found\
    \ inside the blockchain and not the elements around it. For example, it covers\
    \ the consensus type, the network design for on-chain and off-chain activities,\
    \ the logic of governance, and so on. The three main aspects are storage/ledger\
    \ arrangement, execution, and consensus (Figure [7-7](#474923_1_En_7_Chapter.xhtml#Fig7)).\n\
    \n1.  Other frameworks such as Fabric, Sawtooth, Burrow, Iroha, or Indy provide\
    \ crypto-agnostic options.\n\n2.  Frameworks for Ethereum: Truffle:\n    -   Ethereum\
    \ developers can build logical smart contracts, deploy, and execute.\n    -  \
    \ Mocha and Chai JS–based automated testing tools ensure proper coverage of smart\
    \ contract codes.\n    -   Truffle supports JavaScript, SASS, ES6, and JSX, thereby\
    \ allowing creativity of visuals as well as client-side contract actions.\n  \
    \  -   Build management and pipelining\n\n3.  Key takeaways for developers:\n\
    \    -   Truffle for smart contract development\n    -   Ganache for blockchain\
    \ deployment for test environments\n    -   Drizzle – a redux store for fresh\
    \ chain data for transaction execution and state of smart contract testing on\
    \ the front end\n\n4.  Defined as a development environment, testing framework,\
    \ and asset pipeline for Ethereum, aiming to make life as an Ethereum developer\
    \ easier.\n\n5.  Microsoft’s Visual Studio Code IDE provides Truffle Services\
    \ along with Azure Cloud Services for an enhanced DevOps experience to develop\
    \ and deploy Ethereum.\n\n6.  This framework has three main elements:\n\n####\
    \ Microsoft Confidential Consortium Framework (CCF)\n\n-   Hardware – SGX-enabled\
    \ Azure Confidential Compute\n-   Ledger – An append-only ledger provides encryption\
    \ of the private data and serialization of the public data with a key-value pair\
    \ store. The data is replicated on all nodes as the leader commits the transaction.\
    \ The replication process currently uses Raft as the consensus algorithm.\n- \
    \  Encryption – GCM (Galois/Counter Mode) by a key shared by all nodes for private\
    \ data on-chain.\n-   Governance – CCF allows its members to submit policies/proposals,\
    \ which must be accepted by a quorum of members to be executed. The quorum is\
    \ defined as a Lua script in the genesis transaction. Common governance operations\
    \ include adding a new user, member, or version of the CCF code.\n-   Key-Value\
    \ Store structure of storing on-chain data, maps (tables), and transactions –\
    \ It includes serialization and encryption. Also extends Key-Value Store APIs.\n\
    -   Recovery – CCF ensures recovery in case of extreme network failure where some\
    \ transactions might not be copied in entirety. The restoration also occurs in\
    \ true decentralized forms that must be accepted by all stakeholders involved\
    \ in the loss of transaction data.\n\n7.  A framework to build secure, highly\
    \ available, and performant applications that focus on multi-party computations\
    \ and data\n\n8.  It is not a blockchain itself, but enables the core components\
    \ of a blockchain with the distributed ledgers, multi-party computing, and cryptography.\n\
    \n9.  The framework provides a TEE (trusted execution environment) wherein the\
    \ code and data are locked with confidentiality and integrity in a secure place.\n\
    \n10. It provides an Open Enclave SDK for developers to integrate in a TEE form\
    \ for genuine decentralization and integrity of in-chain logic and data, as shown\
    \ in Figure [7-8](#474923_1_En_7_Chapter.xhtml#Fig8).\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig8_HTML.jpg](Images/474923_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8: Confidential Consortium Framework\n\n11. Usually while developing\
    \ the consensus of any blockchain, the hard forks are kept limited and may not\
    \ be changed ad hoc by the host unless accepted by all members. Therefore, the\
    \ Open Enclave SDK provisions for that development credibility and stability.\
    \ This makes the blockchain platform unbiased regarding the host/developer behind\
    \ the platform once it is deployed on such a framework.\n\n12. Six prime elements\
    \ of this framework are the following (Figure [7-8](#474923_1_En_7_Chapter.xhtml#Fig8)):\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig7_HTML.jpg](Images/474923_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7: Core Blockchain Frameworks\n\n### Privacy and Scaling Components\n\
    \nThis section identifies the tools used for data privacy and details the components\
    \ that can be used to scale towards better privacy measures on a blockchain platform.\n\
    \n1.  Concurrency of Service Buses\n    -   Microsoft Azure Service Bus is a fully\
    \ managed enterprise integration message broker.\n    -   The service bus includes\
    \ the queuing mechanisms, topic, and subscriptions.\n\n2.  Hashing\n    -   Azure\
    \ provides a serverless environment for such dynamic functions with the help of\
    \ Azure logic apps and Flow.\n    -   Hashing may be implemented while onboarding\
    \ digital assets on-chain with a hashed version of data and metadata.\n\n3.  Encryption\n\
    \    -   Azure Media Services dynamically encrypt your content with AES 128-bit\
    \ clear encryption keys.\n    -   Azure Storage automatically encrypts your data\
    \ when persisting it to the cloud.\n    -   Azure Blockchain Service compiles\
    \ these into secure encrypted components inside isolated virtual networks, making\
    \ it difficult for a random hacker to identify the exact source of the data.\n\
    \    -   Data disks are encrypted by Azure Disk Encryption.\n    -   Shared Access\
    \ Signatures provide access on-chain for public assets.\n    -   For the blockchain\
    \ quorum, Constellation provides a peer-to-peer message exchange system. It provides\
    \ every node with key-generation capabilities and maintains a directory based\
    \ on the privacy level of public or private networks.\n\n### Tooling Elements\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig9_HTML.jpg](Images/474923_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9: Example – Layout of integration of wallets in a blockchain\n\n1.\
    \  Wallets\n    -   Ethereum blockchain interacts with several client-side wallets,\
    \ such as Metamask, Ledger Nano X, Jaxx, etc., available for smartphones, other\
    \ hardware, and desktop. These wallets are to transact on-chain.\n    -   Hyperledger\
    \ extends four types of wallets—File, In-Memory, HSM, and Database.\n\n### Front-end\
    \ Elements\n\n1.  Block Explorers\n    -   With the amalgamation of all cloud\
    \ components in the same ecosystem, a block explorer can be developed based on\
    \ the transaction watchers and event grids on Azure.\n    -   This would show\
    \ the true status of the number of transactions, value of blocks, etc.\n\n2. \
    \ Applications\n    -   `Truffle` framework in the preceding list extends several\
    \ front-end tools for smart contract deployments.\n    -   Similarly, the Hyperledger\
    \ Playground console provides a front end to visualize the transactions on-chain.\
    \ The Hyperledger Composer Playground provides a user interface for the configuration,\
    \ deployment and testing of a business network.\n    -   Mobile development for\
    \ Android and IOS on Xamarin and Azure help enhance wallet development on edge\
    \ devices.\n\nSo far, we have covered the individual components of the blockchain\
    \ stack for developer implementations and customizations. Let us further explore\
    \ blockchain as a service tools for rapid deployments on Azure.\n\n### Blockchain\
    \ as a Service\n\nFor this purpose, developers need to set up the Azure Dev Test\
    \ Lab, which allows them to test these services and explore their suitability\
    \ for the infrastructure defined by the solution architect.\n\nAzure Dev Test\
    \ Lab allows the following:\n\n-   Low-scale cloud setups for development purposes\n\
    -   Pre-configured templates with quick environment setups\n-   Tools to integrate\
    \ and scale\n\nIt includes the deployment of blockchain as a service options,\
    \ such as the `Blocknet` for instance."
  raw: "#### Core Blockchain Frameworks\n\nThis section focuses on the components\
    \ found inside the blockchain and not the elements around it. For example, it\
    \ covers the consensus type, the network design for on-chain and off-chain activities,\
    \ the logic of governance, and so on. The three main aspects are storage/ledgerarrangement,\
    \ execution, and consensus (Figure [7-7](#474923_1_En_7_Chapter.xhtml#Fig7)).\n\
    \n1.  Other frameworks such as Fabric, Sawtooth, Burrow, Iroha, or Indy provide\
    \ crypto-agnostic options.\n\n1.  Frameworks for Ethereum: Truffle:\n    1.  Ethereum\
    \ developers can build logical smart contracts, deploy, and execute.\n\n2.  Mocha\
    \ and Chai JS–based automated testing tools ensure proper coverage of smart contract\
    \ codes.\n\n3.  Truffle supports JavaScript, SASS, ES6, and JSX, thereby allowing\
    \ creativity of visuals as well as client-side contract actions.\n\n4.  Build\
    \ management and pipelining\n\n1.  Key takeaways for developers:\n\n1.  Truffle\
    \ for smart contract development\n\n2.  Ganache for blockchain deployment for\
    \ test environments\n\n3.  Drizzle – a redux store for fresh chain data for transaction\
    \ execution and state of smart contract testing on the front end\n\n1.  Defined\
    \ as a development environment, testing **framework**, and asset pipeline for\
    \ Ethereum, aiming to make life as an Ethereum developer easier.\n\n2.  Microsoft’s\
    \ Visual Studio Code IDE provides Truffle Services along with Azure Cloud Services\
    \ for an enhanced DevOps experience to develop and deploy Ethereum.\n\n3.  This\
    \ framework has three main elements:\n\n1.  Microsoft Confidential Consortium\
    \ Framework (CCF)\n    1.  Hardware – SGX-enabled Azure Confidential Compute\n\
    \n2.  Ledger – An append-only ledger provides encryption of the private data and\
    \ serialization of the public data with a key-value pair store. The data is replicated\
    \ on all nodes as the leader commits the transaction. The replication process\
    \ currently uses Raft as the consensus algorithm.\n\n3.  Encryption – GCM (**Galois/Counter\
    \ Mode**) by a key shared by all nodes for private data on-chain.\n\n4.  Governance –\
    \ CCF allows its members to submit policies/proposals, which must be accepted\
    \ by a quorum of members to be executed. The quorum is defined as a Lua script\
    \ in the genesis transaction. Common governance operations include adding a new\
    \ user, member, or version of the CCF code.\n\n5.  Key-Value Store structure of\
    \ storing on-chain data, maps (tables), and transactions – It includes serialization\
    \ and encryption. Also extends Key-Value Store APIs.\n\n6.  Recovery – CCF ensures\
    \ recovery in case of extreme network failure where some transactions might not\
    \ be copied in entirety. The restoration also occurs in true decentralized forms\
    \ that must be accepted by all stakeholders involved in the loss of transaction\
    \ data.\n\n1.  A framework to build secure, highly available, and performant applications\
    \ that focus on multi-party computations and data\n\n2.  It is not a blockchain\
    \ itself, but enables the core components of a blockchain with the distributed\
    \ ledgers, multi-party computing, and cryptography.\n\n3.  The framework provides\
    \ a TEE (trusted execution environment) wherein the code and data are locked with\
    \ confidentiality and integrity in a secure place.\n\n4.  It provides an Open\
    \ Enclave SDK for developers to integrate in a TEE form for genuine decentralization\
    \ and integrity of in-chain logic and data, as shown in Figure [7-8](#474923_1_En_7_Chapter.xhtml#Fig8).\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig8_HTML.jpg](Images/474923_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8\n\nConfidential Consortium Framework\n\n5.  Usually while developing\
    \ the consensus of any blockchain, the hard forks are kept limited and may not\
    \ be changed ad hoc by the host unless accepted by all members. Therefore, the\
    \ Open Enclave SDK provisions for that development credibility and stability.\
    \ This makes the blockchain platform unbiased regarding the host/developer behind\
    \ the platform once it is deployed on such a framework.\n\n6.  Six prime elements\
    \ of this framework are the following (Figure [7-8](#474923_1_En_7_Chapter.xhtml#Fig8)):\n\
    \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig7_HTML.jpg](Images/474923_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7\n\nCore Blockchain Frameworks\n\n#### Privacy and Scaling Components\n\
    \nThis section identifies the tools used for data privacy and details the components\
    \ that can be used to scale towards better privacy measures on a blockchain platform.\n\
    \n1.  Concurrency of Service Buses\n    1.  Microsoft Azure Service Bus is a fully\
    \ managed enterprise integration message broker.\n\n    2.  The service bus includes\
    \ the queuing mechanisms, topic, and subscriptions.\n\n1.  Hashing\n    1.  Azure\
    \ provides a serverless environment for such dynamic functions with the help of\
    \ Azure logic apps and Flow.\n\n    2.  Hashing may be implemented while onboarding\
    \ digital assets on-chain with a hashed version of data and metadata.\n\n1.  Encryption\n\
    \    1.  Azure Media Services dynamically encrypt your content with AES 128-bit\
    \ clear encryption keys.\n\n    2.  Azure Storage automatically encrypts your\
    \ data when persisting it to the cloud.\n\n    3.  Azure Blockchain Service compiles\
    \ these into secure encrypted components inside isolated virtual networks, making\
    \ it difficult for a random hacker to identify the exact source of the data.\n\
    \n    4.  Data disks are encrypted by Azure Disk Encryption.\n\n    5.  Shared\
    \ Access Signatures provide access on-chain for public assets.\n\n    6.  For\
    \ the blockchain quorum, Constellation provides a peer-to-peer message exchange\
    \ system. It provides every node with key-generation capabilities and maintains\
    \ a directory based on the privacy level of public or private networks.\n\n####\
    \ Tooling Elements\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig9_HTML.jpg](Images/474923_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9\n\nExample: Layout of integration of wallets in a blockchain\n\n\
    1.  Wallets\n    1.  Ethereum blockchain interacts with several client-side wallets,\
    \ such as Metamask, Ledger Nano X, Jaxx, etc., available for smartphones, other\
    \ hardware, and desktop. These wallets are to transact on-chain.\n\n    2.  Hyperledger\
    \ extends four types of wallets—File, In-Memory, HSM, and Database.\n\n#### Front-end\
    \ Elements\n\n1.  Block Explorers\n    1.  With the amalgamation of all cloud\
    \ components in the same ecosystem, a block explorer can be developed based on\
    \ the transaction watchers and event grids on Azure.\n\n    2.  This would show\
    \ the true status of the number of transactions, value of blocks, etc.\n\n1. \
    \ Applications\n    1.  Truffle framework in the preceding list extends several\
    \ front-end tools for smart contract deployments.\n\n    2.  Similarly, the Hyperledger\
    \ Playground console provides a front end to visualize the transactions on-chain.\
    \ The Hyperledger Composer Playground provides a user interface for the configuration,\
    \ deployment and testing of a business network.\n\n    3.  Mobile development\
    \ for Android and IOS on Xamarin and Azure help enhance wallet development on\
    \ edge devices.\n\nSo far, we have covered the individual components of the blockchain\
    \ stack for developer implementations and customizations. Let us further explore\
    \ blockchain as a service tools for rapid deployments on Azure.\n\n### Blockchain\
    \ as a Service\n\nFor this purpose, developers need to set up the Azure Dev Test\
    \ Lab, which allows them to test these services and explore their suitability\
    \ for the infrastructure defined by the solution architect.\n\nAzure Dev Test\
    \ Lab allows the following:\n\n*   Low-scale cloud setups for development purposes\n\
    \n*   Pre-configured templates with quick environment setups\n\n*   Tools to integrate\
    \ and scale\n\nIt includes the deployment of blockchain as a service options,\
    \ such as the Blocknet for instance."
  trans: "\n### 核心区块链框架\n\n本部分聚焦于区块链内部的组件，而非其外围元素。例如，它涵盖了共识类型、链上与链下活动的网络设计、治理逻辑等。三个主要方面是存储/账本结构、执行和共识（图\
    \ 7-7）。\n\n1.  其他框架，如 Fabric、Sawtooth、Burrow、Iroha 或 Indy，提供了与加密算法无关的选项。\n\n2.\
    \  以太坊框架：Truffle：\n    -   以太坊开发者可以构建逻辑智能合约，进行部署和执行。\n    -   基于 Mocha 和 Chai\
    \ JS 的自动化测试工具确保对智能合约代码的充分覆盖。\n    -   Truffle 支持 JavaScript、SASS、ES6 和 JSX，从而允许创建灵活的视觉效果和客户端合约操作。\n\
    \    -   构建管理与流水线化\n\n3.  开发者要点：\n    -   使用 Truffle 进行智能合约开发\n    -   使用 Ganache\
    \ 进行测试环境的区块链部署\n    -   Drizzle – 一个 Redux 存储，用于获取最新链上数据，以进行交易执行和前端智能合约状态测试\n\n\
    4.  被定义为以太坊的开发环境、测试框架和资源管道，旨在让以太坊开发者的工作更轻松。\n\n5.  微软的 Visual Studio Code IDE\
    \ 提供了 Truffle 服务以及 Azure 云服务，以增强开发和部署以太坊的 DevOps 体验。\n\n6.  该框架包含三个主要元素：\n\n####\
    \ 微软机密联盟框架（CCF）\n\n-   **硬件** – 支持 SGX 的 Azure 机密计算\n-   **账本** – 仅可追加的账本通过键值对存储提供私有数据的加密和公共数据的序列化。数据在领导者提交交易时复制到所有节点。复制过程目前使用\
    \ Raft 作为共识算法。\n-   **加密** – 所有节点共享的密钥使用 GCM（伽罗瓦/计数器模式）对链上的私有数据进行加密。\n-   **治理**\
    \ – CCF 允许其成员提交策略/提案，这些策略/提案必须获得法定成员数接受才能执行。法定成员数在创世交易中定义为 Lua 脚本。常见的治理操作包括添加新用户、新成员或新版本的\
    \ CCF 代码。\n-   **键值存储结构**，用于存储链上数据、映射（表）和交易 – 包括序列化和加密。还扩展了键值存储 API。\n-   **恢复**\
    \ – CCF 确保在极端网络故障（某些交易可能未完整复制）的情况下能够恢复。恢复也以真正的去中心化形式进行，必须获得交易数据丢失所涉及的所有利益相关者的同意。\n\
    \n7.  一个构建安全、高可用、高性能应用程序的框架，专注于多方计算和数据。\n\n8.  它本身不是区块链，而是通过分布式账本、多方计算和密码学来提供区块链的核心组件。\n\
    \n9.  该框架提供了一个 TEE（可信执行环境），其中代码和数据以机密性和完整性被锁定在安全位置。\n\n10. 它为开发者提供了 Open Enclave\
    \ SDK，使其能够以 TEE 形式集成，以实现链上逻辑和数据的真正去中心化和完整性，如图 7-8 所示。\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig8_HTML.jpg](img/474923_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8：机密联盟框架\n\n11. 通常在开发任何区块链的共识时，硬分叉会被限制，并且除非所有成员同意，否则主机不得临时更改。因此，Open Enclave\
    \ SDK 保证了这种开发的可靠性和稳定性。这使得区块链平台一旦部署在这样的框架上，就会对平台背后的主机/开发者保持中立。\n\n12. 该框架的六个主要元素如下（图\
    \ 7-8）：\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig7_HTML.jpg](img/474923_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7：核心区块链框架\n\n### 隐私与扩展组件\n\n本部分介绍了用于数据隐私的工具，并详细说明了可用于在区块链平台上扩展更好隐私措施的组件。\n\
    \n1.  服务总线并发\n    -   Microsoft Azure Service Bus 是一个完全托管的企业集成消息代理。\n    -   服务总线包括队列机制、主题和订阅。\n\
    \n2.  哈希\n    -   Azure 借助 Azure 逻辑应用和 Flow，为这类动态函数提供了无服务器环境。\n    -   在将数字资产上链时，可以使用数据和元数据的哈希版本来实现哈希。\n\
    \n3.  加密\n    -   Azure 媒体服务使用 AES 128 位明文加密密钥动态加密您的内容。\n    -   Azure 存储在将数据持久保存到云端时会自动加密您的数据。\n\
    \    -   Azure 区块链服务将这些编译到隔离虚拟网络中的安全加密组件内，使得随机黑客难以识别数据的准确来源。\n    -   数据磁盘由 Azure\
    \ 磁盘加密进行加密。\n    -   共享访问签名为公共资产提供链上访问权限。\n    -   对于区块链法定人数，Constellation 提供了一个点对点消息交换系统。它为每个节点提供密钥生成能力，并根据公共或私有网络的隐私级别维护一个目录。\n\
    \n### 工具元素\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig9_HTML.jpg](img/474923_1_En_7_Fig9_HTML.jpg)\n\
    \n图 7-9：示例 – 区块链中钱包集成的布局\n\n1.  钱包\n    -   以太坊区块链与多个客户端钱包交互，例如适用于智能手机、其他硬件和台式机的\
    \ Metamask、Ledger Nano X、Jaxx 等。这些钱包用于在链上进行交易。\n    -   Hyperledger 扩展了四种类型的钱包——文件、内存、HSM\
    \ 和数据库。\n\n### 前端元素\n\n1.  区块浏览器\n    -   通过将同一生态系统中的所有云组件合并，可以基于 Azure 上的交易监视器和事件网格开发区块浏览器。\n\
    \    -   这将显示交易数量、区块价值等的真实状态。\n\n2.  应用程序\n    -   前文列表中的 `Truffle` 框架扩展了多个用于智能合约部署的前端工具。\n\
    \    -   类似地，Hyperledger Playground 控制台提供了一个前端来可视化链上交易。Hyperledger Composer Playground\
    \ 提供了一个用于配置、部署和测试业务网络的用户界面。\n    -   在 Xamarin 和 Azure 上进行的 Android 和 iOS 移动开发有助于增强边缘设备上的钱包开发。\n\
    \n到目前为止，我们已经涵盖了区块链栈的各个组件，以供开发者进行实现和定制。接下来，让我们进一步探索 Azure 上用于快速部署的区块链即服务工具。\n\n\
    ### 区块链即服务\n\n为此，开发者需要设置 Azure 开发测试实验室，该实验室允许他们测试这些服务，并探索它们对解决方案架构师定义的基础设施的适用性。\n\
    \nAzure 开发测试实验室允许：\n\n-   用于开发目的的低规模云设置\n-   带有快速环境设置的预配置模板\n-   用于集成和扩展的工具\n\n\
    它包括部署区块链即服务选项，例如 `Blocknet`。\n"
- fmt: '#### The Blocknet


    This BaaS provides a lightweight option for having decentralized data be located
    across nodes on edge devices. It provides mobility, modularity, and interoperability.
    Have you ever wondered if a generic blockchain that creates copies on every node
    might take up too much space on each device? That is where Blocknet works like
    a decentralized exchange of data with a P2P atomic exchange protocol.


    Further, to explore all the various options of technology that help to construct
    various use cases, challenges, and so forth, I recommend you check out other tooling
    services, such as `OkCash`, `Ripple`, `Storj`, `BigChainDB`, and others.


    # 8. Technical Architectures


    This chapter will look at designing various constructs of blockchains and distributed
    ledgers in different use cases. After walking through an array of technological
    tools, the software architects, solution architects, and product design engineers
    have to generate architectures of blockchain elements either from scratch or on
    top of existing technology tools. This decision is usually based on the business
    requirements, technology choices, and developers’ skills.


    Architecture design of a software/application/platform or a network can be done
    at macro to micro levels based on the definition of the business use case. We
    shall divide the chapter based on the scale of the use case, starting with the
    macro level, moving to a domain-specific use case, and going to a micro-level
    design for automating smart contracts. Highlights of this chapter are as follows:


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig1_HTML.png](Images/474923_1_En_8_Fig1_HTML.png)


    Figure 8-1: Core fundamental process of designing architectures for a blockchain
    platform


    - **Designing**: In the first section, we will review the macroeconomics of the
    use case first, then define the business impact, and finally select the technology
    stack for assembling a blockchain for trade finance.

    - **Defining**: In the second section, the wide frame from the last section will
    be reduced to a narrower use case, one specific to a particular function and not
    the entire economy and ecosystem. The stakeholders are finite, and the functional
    dependency is highly reduced.

    - **Implementing**: In the third section, we will examine the technology stacks
    for smart contracts, including the legal frameworks for various geographical locations
    that recognize them and the requirements to adhere to the conditions of the smart
    contracts.


    The core fundamental process of developing architectures for a successful blockchain
    platform is an iterative process, as shown in Figure 8-1. It requires continuous
    review of the design based on the feedback of implementations.


    With the guidelines of Chapter 7, one can establish the structure of the use case
    at hand using the CAUSE Matrix, 21 Question Set, and the `GHOSSTTT` Protocol.
    The key components of consideration for any software platform for which we will
    plan and design architectures in this chapter with respect to blockchains are
    as follows:


    - Measure of scales with respect to user base, locations, entities, objects, etc.

    - Functional density and coverage

    - Functionality and scalability (depth-wise and breadthwise)

    - Computation complexity plus hardware dependencies

    - Core decisions toward implementations

    - Tools to support scale and maintenance

    - Frameworks

    - On-chain and off-chain combinations of architecture design


    Let’s call these the 8D factors of architecture.


    ## Designing a Blockchain Solution Architecture for Trade Finance


    The first step is to identify all key stakeholders that may interact with the
    trade finance blockchain platform. Enlist the stakeholders and decide the role
    of the user, whether they will be a full node or a contributor to the node or
    an off-chain member. In this use case, where we look at the world-trade application
    at a macro level, we must consider the following players:


    - Exporter/seller

    - Importer/buyer

    - Issuing bank

    - Nominated bank

    - Advising bank

    - Chain of banks/branches involved in the verification process

    - Intermediaries such as shipper, customs, procurement companies


    In a global trade scenario (as shown in Figure 8-2), there will be a lot more
    trade players—governmental, regulatory, customs, different shipments, and so on.
    However, to design the global trade application on a blockchain, we shall simplify
    the trade process for learning purposes. Once that is clear, one can add many
    types of players and define their roles on the chain. The onboarding of such players
    will be similar to the fundamentals explained in this section.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig2_HTML.jpg](Images/474923_1_En_8_Fig2_HTML.jpg)


    Figure 8-2: Global trade players


    This may vary case to case. Here, we look at it in the crudest form that a beginner
    would view and understand. From there on, it is an iterative process to refine
    the architecture design based on the maturity of the platform, the stakeholders,
    and the positioning of the core functions of the chain.


    In trade finance, let’s identify a challenge that really may need a blockchain.
    We must consider the credibility of the trade players. Many large-value trades
    default, either in payments or in delivery of the trade items. Trade finance brings
    letters of credit and bank guarantees by financial institutions to be catalysts
    for credible trade.'
