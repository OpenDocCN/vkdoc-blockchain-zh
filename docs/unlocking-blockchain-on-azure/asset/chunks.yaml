- fmt: '### Fourth Challenge


    After the assignment of roles, the platform requires the definition of the data
    structures and transaction activities.


    The fourth design challenge is to define on-chain data structures and transaction
    activities.


    Here, the definition is scoped based on the focus of the letters of credit and
    the regulations around them.


    Data points identified in this scenario are as follows:


    - Document inputs, such as `KYC`, bill of lading, etc.

    - Document verification status

    - Majority voting status

    - Conditions of the smart contracts


    Transaction activity points are defined as follows:


    - Validation of documents

    - Transfer of documents

    - Approval of smart contract conditions

    - Payment dispatch on majority status


    For detailed planning, one can phase out all stages as follows:


    | **FEATURES** | **Description** |

    | --- | --- |

    | Node generation, integration, and chain setup | • Creation of nodes (`KYC/ AML`)<br>•
    Access control<br>• Link generation<br>• Sequence locking<br>• Document machine
    translation to smart contracts<br>• Self-authentication |

    | Smart contracts for letters of credit (`LoC`) and bank guarantees (`BG`) | •
    `LoC` smart contract request form<br>• `BG` smart contract request form<br>• Auto-verification
    of smart contract across nodes<br>• Transfer of documents through chain<br>• Validation
    and alerts<br>• Smart triggers as per contract |

    | Transactions and other actionables | • Real-time money dispatch on honoring
    `LoC` smart contract<br>• Loss settlement on withholding bank guarantee<br>• Alert
    on various document updates<br>• Warning alerts on low credits and fraud detections
    |

    | Monitoring panel | • Node view as per access control<br>• Authorization control<br>•
    Validation controls<br>• Reports and alerts |


    ### Fifth Challenge


    To get further clarity and the predictability of a complete design, one must ensure
    the blockchain covers all cases. So, the next design challenge is ensuring full
    functional coverage.


    The fifth design challenge is to implement a full-coverage blockchain code.


    To ensure full coverage of the blockchain code, one needs to define all possible
    user stories between every type of user. Let us identify the buyer side (Figure
    [8-5](#474923_1_En_8_Chapter.xhtml#Fig5)) and seller side of functionalities (Figure
    [8-6](#474923_1_En_8_Chapter.xhtml#Fig6)).


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig6_HTML.jpg](Images/474923_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    User stories on the seller side


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig5_HTML.jpg](Images/474923_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    User stories on the buyer side


    The banking nodes are `CA` nodes, and there are validator nodes with different
    levels of authority. As shown in Figure [8-7](#474923_1_En_8_Chapter.xhtml#Fig7).


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig7_HTML.jpg](Images/474923_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Validation and transaction activity between banking nodes


    Remember: As an architect or a developer or a blockchain platform provider, one
    has the responsibility to design and develop a full proof so as to avoid any loopholes,
    bypasses, and centralization opportunities. These issues are entertained in a
    centralized platform as one can keep updating without any consensus of the subscribers.
    However, corrections and updates on a blockchain get computationally complicated
    due to the consensus required to accept the change and update the local nodes.
    Thus arose the concept of forking.


    Forking is defined in various ways based on the situation, as follows:


    - what happens when a blockchain diverges into two potential paths forward

    - a change in protocol

    - a situation that occurs when two or more blocks have the same block height

    - a situation where contradictory loopholes are found or race condition–like situations
    occur


    For example, when the number of users in the trustless network of Ethereum Classic
    (proof of work) increased, vulnerability increased, leading to a 51 percent attack.
    It is an attack that is possible on a blockchain that uses a `PoW` algorithm for
    consensus if the attackers have over 50 percent control of the network hash rate.
    That means the majority of the network is filled with attackers that validate
    and allow fraudulent transactions, causing the attack. Such loopholes are to be
    pre-envisioned to avoid security breaches.


    This makes the fifth challenge the most crucial, that is ensuring the core attributes
    of a blockchain are foolproof. How does one ensure that? Fill in the following
    table with the pain point, issues around the pain point, node responsibilities
    in those situations, and the solution action as a whole for the transaction, as
    shown in Figure [8-8](#474923_1_En_8_Chapter.xhtml#Fig8).


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig8_HTML.jpg](Images/474923_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Solution: user stories for all cases


    **Exercise**


    Fill in the following table for a decentralized inventory system such that it
    avoids high inventory costs and minimizes stock-out loss.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Figa_HTML.png](Images/474923_1_En_8_Figa_HTML.png)


    As we can see in Figure [8-9](#474923_1_En_8_Chapter.xhtml#Fig9), the buyer and
    seller are subscribers of an intermediary and avail themselves of the services
    of the financial institution. Being subscribers of the service, the equation of
    authority, transparency, and decision-making is not really in their control. Whereas,
    when all users come onto a decentralized platform, it enables the user to advocate
    and involve himself in the decision-making.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig9_HTML.png](Images/474923_1_En_8_Fig9_HTML.png)


    Figure 8-9


    Centralized conventional flow of trade finance


    For example, as we see in Figure [8-10](#474923_1_En_8_Chapter.xhtml#Fig10), the
    nodes such as validator, peer, and orderer are the transacting stakeholders, which
    jointly validate a transaction based on the consensus binded it.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig10_HTML.jpg](Images/474923_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Decentralized flow of trade finance


    Note that this arrangement is a consortium of various blockchains. Some between
    organizations, some within organizations. For example, the public chain across
    all stakeholders will be inter-organization, where multiple parties are involved
    in the trade. Many times, a node representative will be an organization representative
    that requires internal consensus to perform an action on the public chain. So,
    whenever the private chain in an internal organization is forming consensus, that
    is when the node representative validates the transaction on the public chain,
    thereby maintaining full end-to-end transparency and connectivity.'
