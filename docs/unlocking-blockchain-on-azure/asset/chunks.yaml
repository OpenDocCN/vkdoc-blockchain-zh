    the user’s node encrypts the data and uploads it to the ledger. Based on the consensus
    mechanism of that chain, data is tokenized and distributed among stakeholders
    with whom the user wishes to share. For any node or user to read this data, it
    must decrypt the entire sequence of distributed data stored across several nodes,
    making it highly secure and requiring more computations to crack.


    There are various techniques of encryption used in distributed ledgers. One can
    decide based on the application and type of blockchain.


    BBChain uses ED25519 for end-to-end encryption, especially for the private ledger
    side chains where more confidential data is shared. In a hybrid network such as
    BBChain, where users are on both private and public ledgers, key-sharing mechanisms
    are used to encrypt and decrypt data that is shared on the blockchain.


    Several cryptographic mechanisms , such as the SHA 2 Family, Shamir’s Secret Sharing,
    and EdDSA techniques, are widely used in blockchains. Imagine a user who is acquainted
    with setting up passwords—how will we enable them to encrypt their data securely
    on a blockchain? One way could be by using a pre-defined set of encryption rules
    on the blockchain or giving them the capability to choose their set of encryption
    techniques. In technical terms, the user on a blockchain may be a node/server
    dispatching data (to add a block). Thus, the encryption is set on this server
    where the data is originating through his private key. On-chain users may retrieve
    data using the public key and further decrypt it using the private key. Such combinations
    of encryption options are provided by the mechanisms mentioned here.


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Figg_HTML.jpg](Images/474923_1_En_2_Figg_HTML.jpg)
    Challenge


    Prepare three encryption packages that may be utilized on your social media data
