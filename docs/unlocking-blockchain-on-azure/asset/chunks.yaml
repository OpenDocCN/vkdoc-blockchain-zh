    it highly questionable whether it is worth it for a developer to learn such languages.'
  trans: "\n### 房地产领域的公链与私链设置\n\n一旦在私有账本上就智能合约的规则达成共识，关键访问权限就会转移。\n\n例如，让我们观察以下场景：根据预编程设定，如果到\
    \ 2020 年 3 月 1 日，尽管买方已全额付款，但由于未能完成交付而导致密钥尚未转移给业主，则建筑商必须开始支付罚金/租赁费。此条件随后会自动执行，无需任何讨论。链上的共识遵循智能合约，交易据此实时进行。因此，罚金不会被延迟。\n\
    \n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig3_HTML.jpg](img/474923_1_En_5_Fig3_HTML.jpg)\n\
    \n**图 5-3** – 面向利益相关方的、结合智能合约的区块链房地产\n\n在图 5-3 中，买方和建筑商都受限于关于购买房屋的智能合约条件。我们假设智能合约可能包含的基本条件：\n\
    \n-   买方按时向建筑商支付分期款项\n-   建筑商按时向买方交付房屋设施\n\n在任何房屋协议中，这些都是双方承担的非常基本但又重要的交易活动。现在，当买方将钱包中的金额转账给建筑商时，智能合约便激活了该房产的房屋设施权限。第二个条款是买方对所有设施的确认。\n\
    \n基于上述条件的智能合约伪代码：\n\n```\n如果 截至 2020 年 3 月 1 日买方的付款金额 == 建筑商针对 2020 年 3 月 1 日报价的房产成本：\n\
    \    在 2020 年 3 月 1 日，为买方启用房屋所有权和密钥访问权限。\n    如果 买方确认访问权限和房屋设施：\n        交易成功完成。\n\
    \    否则如果 建筑商延迟提供访问权限和所有权：\n        在延迟期间向买方支付租金成本\n否则如果 买方付款延迟超过 15 天且少于 6 个月：\n\
    \    处以相当于房屋成本 10%的利息罚款\n否则如果 买方付款延迟达 6 个月：\n    处以相当于房屋成本 20%的利息罚款\n```\n\n在另一种场景中，租户未能按照传统纸质合同的承诺按时支付租金。房东因沟通不畅和付款延迟而备受困扰。此外，当被要求腾空房屋时，租户未能执行，从而引发法律问题，给房东增加了成本、时间和不便。\n\
    \n如果将此场景上链，智能合约将预先编程好付款时间表以及违约时会发生什么。通过他们在账本上各自的数字签名表明双方达成共识后，在智能合约规定的期限内，房屋节点的访问权限将被转移给租户（启用物理访问权限）。当账本上出现未付款时，智能合约将自动执行警告，要求租户在警告期内付款。如果连这段宽限期也被违反，房屋的数字资产密钥将自动移交给房东，使得租户无法再次访问。根据预先约定的智能合约，不付款的租户将从私有账本中被移除，禁止其进行任何进一步的交易（见图\
    \ 5-4）。\n\n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig4_HTML.jpg](img/474923_1_En_5_Fig4_HTML.jpg)\n\
    \n**图 5-4** – 租户与房东之间区块链网络的智能合约执行\n\n### 练习\n\n1.  识别传统合同的应用案例并进行列举。\n2.  列出所识别案例中的利益相关方。\n\
    3.  探索所涉及的数字化资产和交易。\n4.  量化资产/交易状态变化或变动的条件。\n5.  绘制智能合约构造与执行的流程图（类似于图 5-4）。\n\
    6.  基于此，设计伪代码。\n\n## 智能合约语言\n\n一旦练习完成，设计就需要转向开发与实施。为此，让我们看看可用于不同目的的多种智能合约语言。\n\
    \n| 智能合约语言 | 区块链平台 | 特性 |\n| --- | --- | --- |\n| Solidity | Ethereum, Quorum,\
    \ Wanchain, Aeternity, Counterparty, Rootstock (RSK), Qtum, Cardano, DFINITY,\
    \ Soil, Expanse, Ubiq, Ethereum Classic, Monax | • 广泛使用的语言<br>• 与 Visual Studio、Remix、Truffle\
    \ 集成丰富<br>• 多种类型安全函数<br>• 维护面向对象结构，支持方法和变量的继承 |\n| Sophia 和 Verna | Aeternity\
    \ | • 函数式编程、状态、强类型、一流对象、模式匹配、众筹示例 |\n| F\\* | Zen |   |\n| RIDEON | Waves | •\
    \ 在多链接触点实现账户控制功能<br>• 具备实现多重签名、原子交换和代币冻结限制的能力 |\n| \\*C++, C\\* | EOS, Neo, Neblio,\
    \ Burst | • 对开发者极为便利<br>• 标记化管理权限<br>• 自给自足的奖励模型与费用免除<br>• 高速并行处理<br>• EOS 存在中心化问题\
    \ |\n| \\*C#\\* | Neo, Stratis | • 利用.NET 框架<br>• 允许与企业及现有的 C#包轻松集成 |\n| Kotlin\
    \ | Neo, Corda | • 易于分析数据状态<br>• 支持高流量法律实体中的并行交易，包括详细条目<br>• 通过内置哈希函数正确管理，消除交易排序错误\
    \ |\n| GoLang | Neo, HyperLedger Fabric, Neblio | • 允许使用 Hyperledger Fabric 构建许可型区块链<br>•\
    \ 高级查询能力<br>• 活跃的社区支持 |\n\n在对所有现有智能合约的调查过程中，一项关于以太坊最大交易量及其对应智能合约的有趣分析浮出水面。这些智能合约背后的用户主要是中心化及去中心化交易所、ICO\
    \ 和代币收藏者。这主要是由于过去几年加密货币市场获得了极高的人气。这表明，到目前为止，智能合约主要用于区块链上的金融交易与贸易。\n\n然而，本书的重点旨在探讨核心技术，因此我们将研究智能合约在应用层面（而非代币层面）及其经济学原理。加密市场的不稳定性以及这些尚且年轻的语言，使得开发者学习此类语言是否值得变得高度存疑。\n"
- fmt: '## Creating Smart Contracts


    As we know, smart contracts are programmable contracts that auto-execute based
    on various activities and transactions, thus fulfilling pre-defined rules. So,
    for a developer, the design of this logic to create programmable event-based functions
    is important.


    Contracts in the real world often have several loopholes that are then fought
    over in a legal system. Smart contracts in a blockchain’s decentralized world
    are expected to programmatically cover all cases of a situation for all stakeholders
    involved. However, it is the developer’s design logic that must cover most cases
    so as to avoid loopholes. Also, several smart contract language compilers may
    enable these checks to evaluate the Turing completeness. In simpler terms, the
    compiler needs to check for all cases that is computationally possible to check.
    This can only be established when the use case is tangible or binary for clear
    decision-making. Business developers, when considering smart contracts, have to
    deduce user stories that are tangible so as to enable these features. Refer to
    the pseudo-code logic in the real estate use case, for example. Thereby smart
    contracts require the logic to be developed in a way that it covers all cases
    and covers data driven decisions across the cases.


    Smart contracts enable automated execution of decisions based on the data purely.
    This means that based on the data flowing through the business logic defined in
    the smart contract, various clauses/actions are triggered. Thereby reducing manual
    biases of over the data and functions on the pre-defined set of conditions. To
    be clearer, a delay in payments must cause the addition of interest, which is
    usually accounted for in large-scale financial transactions or financial institutions.
    However, there are millions of freelancers who receive delayed payments with no
    interest. Now, instead of a paper contract, if a freelancer were to engage in
    business via a smart contract that was programmed to cover the addition of interest
    for delayed payments from the commissioning company, the effort and delay would
    be covered aptly. Conversely, if the smart contract were pre-programmed and agreed
    upon for a timely delivery of the project and the freelancer failed to deliver
    on time, penalties would be auto-calculated on the ledger, making it a fair programmatic
    agreement.


    Let’s look at another use case to further understand the use of smart contracts.


    ## Automobile: Manufacturing, Distribution, Reselling, Servicing


    Like homes, cars are enabled smart devices. The readings of the car’s performance
    can be observed in real time and added to the shared ledger of relevant stakeholders.
    In case of a malfunction, the entire tamper-proof history is clearly available
    to the servicing nodes of the automobile company. Similarly, the ownership of
    the vehicle is transferred in real time at the very second of the payment that
    aligns with the smart contract. Thus, blockchaining the automobile purchase for
    a first-time buyer from manufacturers through distributors can be performed on-chain,
    enabling a better user experience for both parties. Now, let’s consider a second-hand
    purchase, where the buyer purchases the vehicle from the seller. In this case,
    many times, the ownership transfer entails a long procedure with various other
    stakeholders. If this were to be digitized and validated via a smart contract,
    the transparency and convenience would be helpful.


    For this purpose, we chose Ethereum in the following example. Note that the essence
    of this practical walkthrough is to help the reader observe the actual implementation.
    However, the language and the setup may be irrelevant, as it would vary based
    on the application, time of version, and user requirements of the scenario.


    Here is the scenario: There are three types of users on a chain—manufacturer,
    vendor, and owner (the one who owns the car).


    ![../images/474923_1_En_5_Chapter/474923_1_En_5_Figa_HTML.png](Images/474923_1_En_5_Figa_HTML.png)


    The owner wishes to own a vehicle, books it through the vendor, the vendor orders
    from the manufacturer, and the vehicle is dispatched after 80 percent of payment
    has been made. This process traditionally requires the buyer to part ways with
    the majority of the money first and then have the car dispatched. The transfer
    of ownership is a longer process compared to the span of time over which the money
    is paid. With this private chain, the ledger provides a chance for real-time transfer
    of ownership upon payment of money, with complete transparency between all stakeholders.


    To set up the environment for this application, we use the Truffle Suite to develop
    smart contracts in Ethereum with Azure. Remember: Before choosing the implementation
    language, one has to design the flow and develop conditions. Upon understanding
    the nature of the application, one must choose the language and the tools (see
    Figure 5-5).


    ![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig5_HTML.png](Images/474923_1_En_5_Fig5_HTML.png)


    Figure 5-5


    Stack arrangement


    For test purposes, we will start with a small instance to initialize the basic
    setup on Azure. To set up the environment for this application, we use the `Truffle
    Suite` - a development environment, testing framework and asset pipeline for Ethereum.
    `Truffle Suite` enables to develop smart contracts with a lot of convenience due
    to the set of tools inbuilt.


    Search the Azure Marketplace for `Truffle`. One can find several variants on the
    marketplace. Upon clicking on `Truffle`, it explains what the suite provides.
    It enables developers to create virtual accounts over a virtual machine and directly
    use `Truffle` tools for smart contracts on Solidity during the pre-setup of an
    Ethereum blockchain.


    `Truffle` allows you to initialize the VM configuration with the instance name,
    area zone, and so forth. Choose the desired VM size specs and the region of operation.
    Select the desired disk specs and proceed to review and create.


    Once the steps for the virtual machine are complete, a full set of interconnected
    resource groups will be ready for use.


    `Truffle` has now provided a VM that is installed with the framework and the ten
    accounts. The purpose of `Truffle` here is to provide the basic infrastructure
    with the Ethereum blockchain nodes and the wallets. See the following:'
