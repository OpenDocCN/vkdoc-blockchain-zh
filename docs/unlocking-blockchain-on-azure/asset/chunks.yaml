    the scalability and the latency time have been of increasing concern with the
    increase of their popularity and adoption. Therefore Directed Acyclic Graphs ,
    a well-known graph data structure, can provide a method for a common consensus
    policy to maintain the shared ledger in a acyclic, low-latency, non-mining-dependent,
    pruned, lightweight-transactions manner on-chain.


    Several blockchains generate variants of DAG based on the activity on-chain. For
