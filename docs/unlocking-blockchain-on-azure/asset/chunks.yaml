    ## Use Case Design Challenge


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figi_HTML.gif](Images/474923_1_En_10_Figi_HTML.gif)


    A farm of one acre is purchased by four friends in the percentage of stake as
    shown in the pie chart.


    They agree to run a farming business together on the land. John does not live
    close to the land, thereby would not be around to work on it; he wants to rent
    or sell parts of the land. Tom has a full-time job and will work after his working
    hours. Ron lives beside the farm, but has no knowledge of farming. Joe is fully
    available to work on the farm as well and has complete knowledge and experience.


    They decide to gain consensus of all involved to make every decision. Therefore,
    you have to design a blockchain platform for all activities that are going to
    be conducted on-chain. In the following sections, write the advantages and drawbacks
    of each type of consensus for its suitability to this situation. List the activities
    that can work under each type of consensus.


