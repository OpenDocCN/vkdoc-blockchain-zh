    ### 重要性证明 (Proof of Importance)


    重要性可以是链上用于做决策的一个衡量标准。例如，医院中的实时手术可能比牙科检查具有更高的重要性；因此，医院针对这些场景的政策会相应分级。类似地，在这个农场的用例中，田间的危险情况可能需要更快的决策。或者，链上最活跃的成员可能获得验证交易的权限。因此，这种机制并不仅限于
    NEM 的定义，而是可以根据需要自行定义。


    在定义了活动和节点类型之后，分析适合的代币机制来治理链的规则。


    例如，NEM 的定义如下：


    ```

    https://nem.io/wp-content/themes/nem/files/NEM_techRef.pdf

    ```


    类似地，您可以定义自己的评分公式。


    #### 链上活动 (Activities on-chain)：


    - •

    - •

    - •

    - •

    - •


    #### 优势 (Advantages)：


    - •

    - •

    - •

    - •

    - •


    #### 局限性 (Limitations)：


    - •

    - •

    - •

    - •

    - •


    请注意，共识可能不是单一的机制，而是一种方法协同设计，以在整个链上强制执行通用策略，从而提供抗攻击能力和异步竞争条件。


    现在我们已经考虑了不同形式共识下的不同场景。总是可以为不同的目的、针对不同类型的用户构建混合区块链网络。例如，一个简单的土地所有者登记处可能不需要每个节点的共识验证，如果土地完全独立，可能只与所有者相关。然而，如果是共享土地，则可以选择就各种活动达成一项通用共识，并记录在每次行动的可追溯账本上。


    ### 混合链 (Hybrid Chain)


    这种区块链为所有参与者保持高透明度，也允许潜在买家拥有单一共享事实来源。


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figj_HTML.jpg](img/474923_1_En_10_Figj_HTML.jpg)


    您的任务是为上述土地所有者登记用例填充混合链中的公共节点。


    ## 数据与交易 (Data and Transactions)


    Xoroville 市已同意维护所有健康记录和医疗活动。您的工作是列出在公共链和私有链上发生的数据和交易。


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figu_HTML.png](img/474923_1_En_10_Figu_HTML.png)


    ## 能源分配 (Energy Allocation)


    一个拥有 25 家工厂的大型工厂内部的能源分配需要一条区块链来提供共享数据账本，以追踪电力需求。


    请使用本书提供的工具进行辩论，判断是否需要区块链。确定真正需要区块链的确切情况。


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figv_HTML.png](img/474923_1_En_10_Figv_HTML.png)


    既然您已经确定了需要区块链的确切情况，请识别需要上链和下链的对等节点。


    **注意：** 对等节点可以是最终用户，也可以不是。它们可以是用户、机器、传感器等。


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figw_HTML.png](img/474923_1_En_10_Figw_HTML.png)


    ## 小工具 (Gadgets)


    关于小工具的两个问题：


    - 识别您周围需要达成共识才能工作的五个小工具。

    - 识别化工工厂周围需要达成共识才能工作的五个小工具。

