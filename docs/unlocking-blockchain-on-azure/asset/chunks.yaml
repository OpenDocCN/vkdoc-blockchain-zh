    Let’s call these the **8D factors of architecture** .


    ## Designing a Blockchain Solution Architecture for Trade Finance


    The first step is to identify all key stakeholders that may interact with the
    trade finance blockchain platform. Enlist the stakeholders and decide the role
    of the user, whether they will be a full node or a contributor to the node or
    an off-chain member. In this use case, where we look at the world-trade application
    at a macro level, we must consider the following players:


    *   Exporter/seller


    *   Importer/buyer


    *   Issuing bank


    *   Nominated bank


    *   Advising bank


    *   Chain of banks/branches involved in the verification process


    *   Intermediaries such as shipper, customs, procurement companies


    In a global trade scenario (as shown in Figure [8-2](#474923_1_En_8_Chapter.xhtml#Fig2)),
    there will be a lot more trade players—governmental, regulatory, customs, different
    shipments, and so on. However, to design the global trade application on a blockchain,
    we shall simplify the trade process for learning purposes. Once that is clear,
    one can add many types of players and define their roles on the chain. The onboarding
    of such players will be similar to the fundamentals explained in this section.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig2_HTML.jpg](Images/474923_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Global trade players


    This may vary case to case. Here, we look at it in the crudest form that a beginner
    would view and understand. From there on, it is an iterative process to refine
    the architecture design based on the maturity of the platform, the stakeholders,
    and the positioning of the core functions of the chain.


    In trade finance, let’s identify a challenge that really may need a blockchain.
    We must consider the credibility of the trade players. Many large-value trades
    default, either in payments or in delivery of the trade items. Trade finance brings
    letters of credit and bank guarantees by financial institutions to be catalysts
    for credible trade.'
  trans: '

    #### 方块网络 （Blocknet）


    该区块链即服务（BaaS）提供了一种轻量级方案，使去中心化数据能够分布在边缘设备的各个节点上。它具备移动性、模块化和互操作性。你是否曾想过，一个在每个节点都创建副本的通用区块链可能会占用每台设备过多空间？而方块网络正是通过点对点原子交换协议，像一个去中心化的数据交换平台一样运作。


    此外，为了探索有助于构建各种用例、应对挑战等所有不同的技术选项，我建议你了解一下其他工具服务，例如`OkCash`、`Ripple`、`Storj`、`BigChainDB`等。


    # 8. 技术架构


    本章将探讨如何在不同的用例中设计区块链和分布式账本的各种结构。在介绍了一系列技术工具之后，软件架构师、解决方案架构师和产品设计工程师需要从头开始或在现有技术工具之上，构建区块链要素的架构。这个决策通常基于业务需求、技术选择以及开发者的技能。


    根据业务用例的定义，软件/应用/平台或网络的架构设计可以在宏观到微观的层面上进行。我们将根据用例的规模来划分本章，从宏观层面开始，过渡到特定领域的用例，最后深入到自动化智能合约的微观设计。本章的亮点如下：


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig1_HTML.png](img/474923_1_En_8_Fig1_HTML.png)


    图 8-1：为区块链平台设计架构的核心基础过程


    - **设计**：在第一部分，我们将首先审视用例的宏观经济学，然后定义其业务影响，最后为构建贸易金融区块链选择技术栈。

    - **定义**：在第二部分，上一部分的广泛框架将被缩小到一个更窄的用例，该用例特定于某个具体功能，而非整个经济体和生态系统。利益相关者是有限的，功能依赖性也大大降低。

    - **实施**：在第三部分，我们将考察智能合约的技术栈，包括各司法管辖区承认它们的法律框架，以及遵守智能合约条件的要求。


    为成功的区块链平台开发架构的核心基础过程是一个迭代的过程，如图 8-1 所示。它需要根据实施反馈不断重新审视设计。


    遵循第 7 章的指导，可以使用**CAUSE 矩阵**、**21 个问题集**和`GHOSSTTT 协议`来构建手头用例的结构。本章中我们将针对区块链进行规划和设计架构的任何软件平台，其关键考虑因素如下：


    -   关于用户群、地点、实体、对象等的规模度量

    -   功能密度与覆盖范围

    -   功能与可扩展性（深度和广度）

    -   计算复杂度及硬件依赖

    -   实现的核心决策

    -   支持扩展和维护的工具

    -   框架

    -   架构设计的链上与链下组合


    我们称之为架构的 8D 因素。


    ## 为贸易金融设计区块链解决方案架构


    第一步是识别所有可能与贸易金融区块链平台交互的关键利益相关者。列出这些利益相关者并决定用户的角色，他们是全节点、节点贡献者还是链下成员。在这个从宏观层面审视全球贸易应用的用例中，我们必须考虑以下参与者：


    -   出口商/卖方

    -   进口商/买方

    -   开证行

    -   指定银行

    -   通知行

    -   参与验证流程的银行链/分行

    -   中介机构，如航运公司、海关、采购公司


    在全球贸易场景中（如图 8-2 所示），会有更多的贸易参与者——政府、监管机构、海关、不同货运方等。然而，为了在区块链上设计全球贸易应用，为了学习目的，我们将简化贸易流程。一旦明确了这一点，就可以添加多种类型的参与者，并定义他们在链上的角色。这些参与者的加入过程与本节阐述的基本原理类似。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig2_HTML.jpg](img/474923_1_En_8_Fig2_HTML.jpg)


    图 8-2：全球贸易参与者


    这可能因情况而异。这里，我们以初学者能够查看和理解的最原始形式来看待它。从那里开始，这是一个根据平台成熟度、利益相关者以及链核心功能的定位来完善架构设计的迭代过程。


    在贸易金融中，让我们识别一个真正可能需要区块链的挑战。我们必须考虑贸易参与者的可信度。许多大额贸易交易会在付款或贸易项目交付中出现违约。贸易金融引入了由金融机构提供的信用证和银行担保，以成为可信贸易的催化剂。

