    \ in Azure to ensure that the VM resources you place within it are isolated from\
    \ each other when they are deployed within an Azure datacenter.\n\n*   Two Availability\
    \ Tests\n    *   The test validates the availability of the app services for the\
    \ app service bb-hofiog-api as shown in Figure [2-16](#474923_1_En_2_Chapter.xhtml#Fig16).\n\
    \n*   Here we have two test sets, one for the API app service and the other for\
    \ the UI layer.\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig16_HTML.jpg](Images/474923_1_En_2_Fig16_HTML.jpg)\n\
    \nFigure 2-16\n\nAvailability test sets\n\n*   Two SQL Databases (Standard S0)\n\
    \    *   These are simply storage servers of 30GiB SSD running on Ubuntu.\n\n\
    *   Two Azure Key Vaults for the app services\n    *   Key vaults, as the name\
    \ suggests, help to create, store, manage, and comply with FIPS 140-2 Level 2,\
    \ and enable SSL/TLS certificates. In short, they are a tool to handle most security-related\
    \ aspects of the app services and other encryption keys. They are a one-stop security\
