  trans: '

    在这种场景下，客户最终会被垃圾信息骚扰，而信息本身并未发挥其预期作用。因此，`Bill’U` 基于公共与私有区块链的结合，使零售商能够理解客户数据，并为他们提供洞察和相关数据，同时全程掩盖用户的个人数据。由于个人数据被隐藏，而其他相关数据在公共链上可用，零售商可以为客户定制优惠，并利用洞察为客户谋利，同时保护客户的个人信息——这些信息被单独存储在混合区块链的私有链上。由此，既保护了客户数据，又为他们带来“哇”的零售体验，帮助他们在购物后处理好所有相关细节。


    技术架构如图 9-3 所示。


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig3_HTML.png](img/474923_1_En_9_Fig3_HTML.png)


    **图 9-3** 基于用户间交易的链式表示。每个节点中的用户都拥有自己的 AI 模块，以避免共享私人数据


    每个用户代表一个对等节点，而`Bill’U`则在私有链中两个利益相关者之间的账单交易中扮演验证节点的角色。在公共链中，所有对等节点可以从分布在各节点间的匿名数据中推导出趋势、消费人群画像和优惠券信息。`Bill’U`节点的
    AI 处理对用户而言是本地的，这维护了`Bill’U`上最机密文档的隐私。这种数据安全的核心特性在大多数 AI 应用中极为罕见，因为后者通常在服务器而非设备上进行计算。


    与其他 AI 服务相比，这里原始数据的安全性得到了保障。来自节点的学习结果保存在公共账本上，不会暴露用户的原始数据，从而通过`Ask Bill’U`服务为所有利益相关者提供推荐购买趋势和其他建议，使大家受益。


    由于 AI 服务对用户而言是本地的，`Bill’U`服务以客户为中心。例如，当你使用`Ask Bill’U`时，它通过在你自己的节点上学习你的数据，并在设备本身进行分析来回答你的问题。而`Alexa`或`Siri`则会带着你所有的数据访问其他服务器，在公司服务器上进行分析，然后返回可能带有偏见或不带偏见的结果。


    `Bill’U`会提醒用户保修期到期，并提示使用购物者专属的优惠券和生日优惠。同时，它允许零售商在无需任何电子邮件或电话号码依赖的情况下，以无线方式共享账单。


    `Ask Bill’U`或`Make a Wish`部分的查询机制，如图 9-4 所示，对用户而言也是本地的。然而，这种私人服务依赖于 AI 模块的全局学习能力来理解用户的自然语言。因此，当通过区块链账本提供服务时，查询会首先在节点本地尝试搜索，然后遍历私人账本——该账本在客户、客户购物所在的零售商、`Bill’U`全局学习中心之间内部共享，最后在必要时才访问公共账本。这使得回答能以完全公平的方式涵盖用户的所有方面。


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig4_HTML.jpg](img/474923_1_En_9_Fig4_HTML.jpg)


    **图 9-4** `Bill’U`的 AI 功能，名为`Make a Wish`或`Ask Bill’U`，用于回答用户关于其账单的查询


    对这个 AI 能力的详细审视，是为了理解区块链在此平台上的作用。当在提供 AI 服务时如此小心地避免泄露任何机密数据，数据传输过程就需要谨慎选择技术。因此，我们利用区块链平台的加密、去中心化和透明性，在仅限区块链用户使用的公共区块链上传输匿名数据，并在私有链上发送买卖双方之间的个人交易数据。任何链外的用户都必须加入账本才能访问公共数据，而如果用户想访问私有区块链，则需要获得链上利益相关者的共识。此外，很多时候当机密数据局限于边缘设备时，会因物理损坏、文件损坏等原因面临数据丢失的风险。`Bill’U`提供了一种私有区块链选项，允许用户将节点备份并复制到另一台设备或虚拟机上，从而使其具备容错能力、安全性，并能通过云端访问，同时在私有区块链上实现分布式安全，而参与节点就是从不同设备访问它的唯一用户。


    `Bill’U`区块链特性：


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig5_HTML.jpg](img/474923_1_En_9_Fig5_HTML.jpg)


    **图 9-5** 区块链上的数字化账单


    -   资产文档的数字保险箱

    -   购买文档的数字储物柜

    -   安全、加密、有备份的个人 ERP 系统

    -   结合全局与本地学习模型的去中心化 AI

    -   针对保修到期、转售条款等事项的智能合约提醒

    -   支持转售、保修等智能合约的通用账单格式

    -   无需暴露电子邮件、ID 或电话号码的无线账单共享平台（参考图 9-5，基于二维码的账单）


    由于该平台是 B2B2C 模式，区块链架构将是公共与私有许可账本组成的混合网络。`Bill’U`的创世节点将以不同去中心化网络的形式连接到所有其他零售商。`Bill’U`将连接到各类供应商，他们可以扫描账单并上传到平台，这将数字化从杂货店、大型百货商店、诊所、出租车司机，甚至小商品店、医院、餐馆和电影票收集来的所有类型收据。


    由于这是一个私有许可区块链，每项资产都将存储在区块链上。一旦新区块在账本上更新，任何人都无法更改账本上的区块。区块链上的每笔交易都将是不可篡改的。


    最终用户会收到一个由私钥生成的唯一哈希标识符，并且只有启用的公共数据部分才能使用公钥查看。利用这个唯一标识符和私钥，最终用户可以访问其最近的支出，并在此基础上获得分析结果和推荐。然而，这些个人数据通过唯一的哈希
    ID 保持匿名。


    这种具有共同创世节点（即`Bill’U`节点）的链间网格，类似于多种可能的跨链架构。其中一种架构由南洋理工大学的`COMMENDO`形成，这是一个轻量级区块链，构成了数据和数据处理的基础链。


    作为一个 B2B2C 平台，这种混合链的广泛需求要求高速数据交易以及存储方面的可扩展性。


    为了实现各个私有链之间的多个异步交易以及公共数据流向公共区块链，区块链运行在`Apache Cassandra`（一种分布式数据库系统）之上。这确保了高可用性和高读写吞吐量。`Bill’U`的区块链利用南洋理工大学的`COMMENDO`区块链，通过分布式异步工作队列实现匿名交易。


    类似地，可以考察一下 Azure 的`CosmosDB`，它可能是一个去中心化分布式数据库的备选方案。

    '
- fmt: "`Azure CosmosDB`被定义为微软在全球范围内分布式、完全去中心化、多主数据库服务，适用于关键任务型应用程序。它提供开箱即用的全球分布，具备多主复制、吞吐量和存储的弹性全球扩展，以及个位数毫秒级的写入和读取。\n\
    \n这是现有区块链在分布式大规模存储方面的一个主要需求。\n\n要在一个企业级生态系统中考虑这样的平台，关键在于在一个无需信任且经过许可的网络上识别出高度可扩展的数据库。设想`Bill’U`被跨企业业务使用，用于存储公司账单、采购订单等。`Bill’U`可以跟踪对账单、采购文件和合同所做的任何更改。链间活动形成了一组业务节点网格，共同构成一个联盟网络。\n\
    \n联盟在区块链上构建共享应用，以监控这些资产在跨组织信任边界移动时的动向，并通过许可智能合约中的“链上”逻辑来管控状态变更。用例涵盖了从内部账单申请到跟踪外部采购订单和合同等一系列以资产和工作流为核心的场景。\n\
    \n借助这样一个端到端的安全区块链联盟，优惠券、代金券、索赔、转售、客户参与度和客户满意度等优势得以完美体现，且不会危及个人数据。\n\n虽然我们在此处看到了一个由多种新兴技术软件组合构建的非常特定的应用，但让我们来看一个更接近传统实体业务的例子，它成功运用了区块链技术来提供无与伦比的客户体验。\n\
    \n### 微软 Azure 与星巴克\n\n技术与生活始终相辅相成。技术专家设想用技术改善生活，而生活或生命体则塑造着技术。这种共生关系促成了两家公司——微软\
    \ Azure 和星巴克——的融合，它们将各自的经验结合起来，用技术改善人类生活。\n\n星巴克一直在与微软 Azure 合作，尝试区块链、人工智能和物联网等尖端技术，以加速生产力、效率和透明度，并为客户提供定制化、高度个性化的体验。\n\
    \n微软首席执行官萨提亚·纳德拉在 2019 年微软 Build 大会上介绍了星巴克如何使用新兴技术来提供其独特的客户体验。为了为到访星巴克的顾客提供更个性化的体验，这家咖啡连锁店正在使用强化学习技术，该技术能基于外部反馈在不可预测的环境中学习做出决策。\n\
    \n客户通过基于强化学习的平台（在微软 Azure 上开发和托管）接收定制的点单推荐。该平台通过根据本地门店库存、热门选择、天气和时间、社区偏好以及历史订单来推荐商品，从而帮助顾客。\n\
    \n如果需求与供应形成一个闭环，那么生产者在了解客户需求后，其盈利能力必然会提高。一位远离顾客的可可农民能够了解种植规模、可可类型以及需求的季节性。然而在现实中，这种信息传播尚未完全实现。借助`Azure\
    \ Blockchain Services`，愿景是将从农民到消费者的所有利益相关者纳入一个闭环。\n\n相反，该技术可以帮助在以前未尝试过的领域刺激需求。例如，如果已知一群消费者喜欢浓烈的哥伦比亚咖啡，区块链公共数据的推荐引擎可能会向这些用户极力推荐浓烈的牙买加咖啡，以帮助刺激对这种优质牙买加农场咖啡的需求。这种强化学习算法降低了在链上向消费者推荐可能不喜欢的咖啡的概率，从而在为农民提供市场拓展以及为消费者提供体验方面实现了双赢，因为两者分别在销售和体验方面得到了支持。\n\
    \n这里的主要焦点是为咖啡农带来更大的金融可能性，并允许顾客将他们的咖啡追溯到源头，使其成为一种体验。这被认为是`Ethereum`的一个理想用例，因为它具有透明的多个独立节点来验证交易。每个相关方都可以通过`Etherscan`自由追踪在`Ethereum`上进行的每一笔交易。\n\
    \n> **注意**  \n> `Etherscan`是用于以太坊区块链的区块浏览器。区块浏览器基本上是一个搜索引擎，允许用户轻松查找、确认和验证在以太坊区块链上发生的交易。\n\
    \n星巴克希望提升消费者体验，让他们了解咖啡的来源并直接理解其根源。同时，这一过程也为农民增加了市场曝光度。\n\n据微软发布的一份公告称，为此，这家咖啡连锁店正与微软合作，利用其`Azure\
    \ Blockchain Service`来追踪来自世界各地的咖啡运输，并为其供应链带来“数字化的、实时的可追溯性”。\n\n通过这一合作，微软的区块链服务将在共享账本上记录咖啡运输过程中的所有变更，为参与者提供供应链的“更完整视图”。\n\
    \n微软表示，该应用程序还将告知消费者星巴克是如何支持这些种植者的。"
  raw: 'Azure CosmosDB is defined as Microsoft''s globally distributed, fully decentralized,
    multi-mastered database service for mission-critical applications. It provides
    turnkey global distribution with multi-master replication, elastic scaling of
    throughput and storage worldwide, and single-digit millisecond write and read.


    This is a major need of existing blockchains in terms of distributed large-scale
    storage.


    To consider such a platform on an enterprise-grade ecosystem, it is crucial to
    identify a largely scalable database over a trustless and permissioned network.
    Consider Bill’U being used across enterprise businesses to store company bills,
    purchase orders, and so forth. Bill’U could track any changes made to the bills,
    purchase documents, and contracts. The interchain activities form a mesh of business
    nodes that form a consortium network.


    The consortiums build shared applications on a blockchain to monitor the movement
    of those assets as they move across organizational trust boundaries and govern
    state changes with “on chain” logic in permissioned smart contracts. Use cases
    cover a range of scenarios that are asset- and workflow-centric, from claiming
    internal bills to tracking external purchase orders and contracts.


    With such a secured end-to-end consortium of blockchains, the benefits of offers,
    vouchers, claims, resell, customer engagement, and customer satisfaction set up
    beautifully without compromising personal data.


    While we see over here a very niche application that has been built with a combination
    of multiple emerging-tech softwares, let’s look at an example that is closer to
    a conventional brick-and-mortar setup and has managed to employ blockchains to
    provide an unparalleled customer experience.


    ### Microsoft Azure and Starbucks


    Technology and life have always gone hand in hand. The technologists envision
    improving life with technology, and the life or the living beings are the ones
    to shape technology. This symbiotic relationship brings about the confluence of
    two companies—Microsoft Azure and Starbucks—to blend their experiences to make
    technology improve human lives.


    Starbucks has been experimenting with cutting-edge technologies such as blockchain,
    AI, and IoT with Microsoft Azure to accelerate productivity, efficiency, and transparency
    and to provide an experience to the customers that is customized and highly personalized.


    Microsoft CEO Satya Nadella at the 2019 Microsoft Build conference presented on
    how Starbucks is using emerging technologies to deliver its unique customer experience.
    In order to offer a more personalized experience for customers who visit Starbucks,
    the coffeehouse chain is using reinforcement learning technology that learns to
    make decisions in unpredictable environments based upon external feedback.


    Customers receive custom-made order recommendations through the reinforcement-learning
    platform—developed and hosted in Microsoft Azure—which helps them by suggesting
    things based on local store inventory, popular selections, weather, and time of
    day, community preferences, and previous orders.


    If the demand and supply are in a closed loop, the profitability for the producer
    definitely increases on understanding the customers’ demands. A cocoa farmer far
    away from the customer would gain understanding of the scale of growth, the type
    of cocoa to grow, and the seasonality of the demands. In reality, this information
    outreach is still not completely achieved. With the Azure Blockchain Services,
    the vision is to expand the inclusion of stakeholders, from farmers to consumers,
    in a closed loop.


    Conversely, the technology can help boost demand in areas where it was untried
    before. For example, if there is a group of consumers who are known to like strong
    Columbian coffee, the recommendation engine for the blockchain public data could
    boost the recommendation of strong Jamaican coffee to these very users to help
    boost the demand for such fantastic farm coffee from Jamaica. This reinforcement
    learning algorithm reduces the chances of recommending unlikeable coffee to consumers
    on-chain, thereby generating a win-win in terms of outreach for the farmers as
    well as on the consumer end, as both are supported in terms of sales and experience,
    respectively.


    The primary focus here is to bring greater financial possibilities for coffee
    farmers and allow the customers to track their coffee back to its source, making
    it experiential. This is said to be an ideal use case for Ethereum due to its
    transparent multiple individual nodes that verify transactions. Every involved
    party can freely track every single transaction made on Ethereum through Etherscan.


    Note


    Etherscan is a BlockExplorer for the Ethereum Blockchain. A BlockExplorer is basically
    a search engine that allows users to easily lookup, confirm and validate transactions
    that have taken place on the Ethereum Blockchain.


    Starbucks envisions enhancing the consumer experience so they know the source
    of their coffee and have a direct understanding of its roots. At the same time,
    this process increases exposure to markets for the farmers.


    For the effort, the coffee chain is working with Microsoft to harness its Azure
    Blockchain Service in tracking coffee shipments from across the world and bringing
    “digital, real-time traceability” to its supply chains, according to an announcement
    from Microsoft.


    With the partnership, Microsoft’s blockchain service will record all changes along
    the journey of the coffee on a shared ledger, providing participants with a “more
    complete view” of the supply chain.


    The app will also inform consumers of how Starbucks is supporting these growers,
    Microsoft indicated.'
