    #### Proof of Importance


    Importance could be a metric on-chain over which decisions can be made. For example,
    a real-time surgery in a hospital might be of higher importance than a dental
    check-up; therefore the hospital policies for these scenarios are graded accordingly.
    Similarly, in this use case of farmland, a hazardous situation in the field might
    require faster decision-making. Or the most active member on-chain might get the
    authority to validate the transaction. So, this mechanism is not merely limited
