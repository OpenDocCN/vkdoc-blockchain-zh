    invested in this technology? This is what many individuals, companies, and ecosystems
    wish to understand. However, on a day-to-day basis, how do blockchains affect
    you? In what way do your surroundings change with this technology? How would you
    interact with blockchains?


    All these answers will unfold in this chapter and in the course of this book.


    Like the 6 Sigma transition, across the five stages of define, measure, analyze,
    improve, and control over any challenge that improves yield stage by stage, this
    chapter brings the following six transitions:


    *   Introduction – Defining blockchains


    *   Benchmarking – Historical events of evolution to modern-day blockchains


    *   Measuring the change from distributed computing to distributed ledgers


    *   Analyzing the impact and improvement with blockchains in action


    *   Control decentralization with consensus


    *   Implement with Azure and scale across


    ## Defining Blockchains


    Humans best understand the world through exploration and discovery. Humans group
    together into an ecosystem to get life moving. Businesses form communities, supply
    chains, and economies within countries and across borders. The true nature of
    connecting, interacting, and evolving is at the core of everything in existence.


    Blockchains bring this very form of interaction, connectivity, and evolution to
    a software platform. They digitize not just data, but also the processes and the
    state of the processes in a digital ledger. Blockchains are a form of distributed
    digital ledger that doesn’t just hold data but also interacts with the daily operations
    of life.


    Blockchains represent a chain of blocks. This chain is a connected network of
    people interacting with one another in the form of blocks of data. That sounds
    like an existing social network, like Facebook, Instagram, Twitter, or others
    that we all know of. So, how is a blockchain different? In any existing social
    media platform or service, the user data is stored, transferred, and managed by
    a centralized server hosted and governed by the social media platform itself.
    If the platform were to be on a blockchain, that same user data would be stored,
    transacted, and governed in the form of blocks of data hosted and distributed
    by the end users themselves and not a single company. This is how blockchains
    enable end users to have better control of their data and its privacy, and to
    have awareness of how their data is stored, maintained, and distributed.


    A blockchain enables a group of users to come to an agreement on any action, transaction,
    or decision based on a pre-defined set of rules. It allows everyone into the decision-making
    process. Further, it empowers the chain’s complete right to privacy with its encryption
    of the data blocks and transactions.


    So far, we have understood blockchains to be a chain of blocks connected between
    peer-to-peer networks. Those blocks are hosted by peers themselves and are connected
    by the principle of consensus agreements over encrypted data and direct transactions.
    From there, a blockchain provides an avenue to digitize the efforts, value, and
    representation of money on that chain as it forms the single source of trusted
    truth.


    Further on, we will see the definition of a blockchain from a beginner’s perspective,
    and then an expert’s understanding, noting the varied levels of complexity and
    technicality.


    ### Defining for a New User


    If you are someone entirely new to the concept of blockchains or have just begun
    your journey in understanding and building blockchains, the following example
    might help you visualize an actual trade performed via blockchain. Before blockchains,
    the process went as shown in Figure [1-1](#474923_1_En_1_Chapter.xhtml#Fig1).


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig1_HTML.png](Images/474923_1_En_1_Fig1_HTML.png)


    Figure 1-1


    Centralized system where trade happens only through the shop


    As seen in Figure [1-1](#474923_1_En_1_Chapter.xhtml#Fig1), Alice, Ryan, Kiara,
    and Joe all transact over the e-commerce platform to either purchase or sell goods.
    This e-commerce platform may charge them a commission every time they transact
    and may regulate the prices as per its own policies.


    However, all of them trust the platform brand to transact and execute deals with
    unknown users globally. Thus, they are relying on a centralized, single source
    of trust.


    When Alice, Ryan, Kiara, and Joe are on a blockchain, however, it goes as shown
    in Figure [1-2](#474923_1_En_1_Chapter.xhtml#Fig2).


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig2_HTML.png](Images/474923_1_En_1_Fig2_HTML.png)


    Figure 1-2


    Trade peer-to-peer on a chain with the agreed-upon value, with not one single
    intermediary but rather a chain of people to validate the transaction


    They all can barter or trade or exchange items directly and have no loss of value
    or trust issues. The trust is maintained, witnessed by others who validate the
    trade. As we see in Figure [1-2](#474923_1_En_1_Chapter.xhtml#Fig2), when Alice
    purchases from Ryan, the network of Kiara and Joe becomes a witness of the trade;
    likewise while others trade. This chain could have infinite people, and a voting
    majority can allow the transaction on a chain.'
