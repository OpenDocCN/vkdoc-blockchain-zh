- fmt: '# 4. Permissioned Blockchains in FinTech


    Remember `XORO`? Let’s bring `XORO` back to life.


    After a lot of international shows, he decides to celebrate his daughter’s birthday
    in two days with a grand celebration. He plans to hire an events management company,
    `ROX`, to design the celebration. To kick it off, he needs to deposit a large
    amount of money.


    Being in the United States, `XORO` goes onto the bank website and tries to initiate
    a wire transfer. `ROX` has an account in London. Severe panic arises when the
    transfer delays longer than the intended time due to an intermediary being involved.
    `XORO` worries about the money, time, and the happiness of his daughter.


    Further, the bank advises him to visit the branch and submit a letter to confirm
    the large transaction for security purposes. All of this is entirely controlled
    and regulated by the bank. After all the formalities, the very money that `XORO`
    wanted to transfer gets hugely delayed because of the bank’s control over his
    money.


    To add to his grief, `XORO` was charged a minimum balance penalty, which he was
    truly unaware of. The bank had decided to increase the minimum amount that his
    account must hold and dispatched a letter to his house in London, which went unattended.
    The whole situation was a bitter experience for `XORO`, a penalty against his
    own money for the sake of the safety that the bank provided.


    Have you ever felt the pain that `XORO` experienced here? The frustration of bank
    transfers, deposits, and so forth?


    Imagine how it would have been decades ago. Today, we have blockchains rewiring
    the concept of money, transactions, security, and consensus.


    With the right kind of blockchain, `XORO` could have had the following:


    - Better access to his own money, digitally residing in his wallet on his node
    or machine

    - Faster transfer to the other user, with no other intermediary control

    - Secure end-to-end encryption of the transaction

    - Immutability and no room for human/manual error in intermediate operations

    - Awareness of the pre-defined rules and consensus of transfer, made clearer to
    him on the ledger

    - Stake in voting on the agreement to add a rule or remove a rule on the ledger


    Now, this does not mean that blockchains make banks obsolete. It purely makes
    the operations of financial institutions better, with an infrastructure upgrade
    for all stakeholders. It further decentralizes the processes and operations among
    all stakeholders.


    ## The History of International Transactions


    To understand better, let’s examine the transition of technologies that financial
    institutions have undergone for international transactions (Figure [4-1](#474923_1_En_4_Chapter.xhtml#Fig1)).

    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig1_HTML.png](Images/474923_1_En_4_Fig1_HTML.png)


    Figure 4-1


    Evolution of transaction networks


    In the early 1830s, telegraphy developed into a network of point-to-point transmissions
    of signals, which were represented initially by various visual codes, dashes,
    and dots, which further evolved into alphanumeric messages. The development of
    telegraphy picked up speed due to the accelerated developments of the electric
    battery and the wonders of electrical engineering performed by `Ohm`, `Faraday`,
    and `Ampere`.


    From there, with the demands of connectivity increasing in the 1930s, the frequencies
    of signals were varied using voice multiplexing with asynchronous requests. Thus,
    the `Telex` networks were developed. In simple words, it was an exchange network
    of teleprinters. These networks were a start to financial transactions’ occurring
    across countries. The switching networks took several days to transfer, depending
    on network connectivity. With further growing demands and the need for secure,
    speedy systems, the Society for Worldwide Interbank Financial Telecommunication,
    abbreviated as `SWIFT`, came into picture around the 1970s. This was the same
    time at which `ARPANET` was developed, which went on to be the basis of our current-day
    internet.


    Just as electrical improvements occurred, telegraphy evolved. With increased numbers
    of communication systems, `TELEX` improved. Just as `ARPANET` was at its inception,
    `SWIFT` evolved. Now that every user has a machine that has an `IP` address and
    computational power, having connectivity exist just between financial institutions
    is not enough anymore. End users seek complete connectivity with their assets
    and operations, thereby making blockchains a natural choice of operation as they
    connect peer to peer.


    The internet and digital banking services still make one’s finances a virtual
    black box for the end user, as digital banking services are centralized and governed
    by their own private regulations. The methods of encryption and storage are not
    known to the end user in private centralized platforms. With the concept of a
    blockchain, transparency and security are brought to the end user. As explained
    in this book and this chapter in particular, from the end consumer to the core
    developer, blockchains envision making people aware of the encryption options
    for their digital assets and what happens to them during a transaction, offering
    complete transparency. At the same time, blockchains provide a control and right
    to privacy with their infrastructure.'
