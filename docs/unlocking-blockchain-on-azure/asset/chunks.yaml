- fmt: '# First Challenge


    A letter of credit (LoC), also known as a documentary credit or bankers commercial
    credit, or letter of undertaking (LoU), is a payment mechanism used in international
    trade to provide an economic guarantee from a creditworthy bank to an exporter
    of goods (see Figure 8-3).


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig3_HTML.jpg](Images/474923_1_En_8_Fig3_HTML.jpg)


    Figure 8-3: Usual Process of Letter of Credit generation across institutions


    Traditionally, financial institutions were the centralized source of trust, therefore
    the concept of LoCs. However, in recent times, there have been cases of default
    despite such documents due to hackers being able to hack into bank systems, or
    manual intervention being undertaken by staff/contractual third-party collaborations,
    and so forth.


    This centralized trust can surely be scaled up with the more secure practices
    of blockchains. When a bank commissions and outsources the development of its
    digital systems to a company, if on a blockchain, the trust and transparency are
    maintained regarding the inclusion of said company. Many may disagree that such
    transparency allows for better practices. Therefore, during the design of a blockchain
    for the trade finance chain, one may choose the type of blockchain and its activities.


    However, one element of security is ensured: for a hacker to hack into a centralized
    server is lot less computationally intensive than to hack into a whole decentralized
    blockchain network. So with blockchains, we do not directly call for the removal
    of intermediaries. Many times blockchains facilitate more transparent and credible
    practices.


    Now that the design is established, we shall dissect the use case for blockchains
    in trade finance for letters of credit. Starting with who initiates the onboarding
    of other players among the listed set of trade players? Why would anyone agree
    to join a transparent blockchain ledger? How many businesses still avoid having
    an online presence?


    Therefore, the first challenge of design is **onboarding mechanisms**.


    Since a bank or a financial institute is deemed to be a credible source by all
    majority trade players, it may be logistically easier to initiate onboarding with
    banks. However, this is not a hard and fast rule. One may initiate onboarding
    industry-wise; for example, one can start with the onboarding of farmers and consumers
    and plug other players in gradually. So based on the players involved in a transaction
    for a business, the decentralized platform may choose the onboarding mechanism.


    Points of consideration for onboarding mechanisms:


    - Consensus required for onboarding?

    - Onboarding user and onboarding node the same?

    - Pre-requisites required for onboarding of member?

    - Who is enabled to onboard after the initial onboarding?


    All the answers to the preceding questions entirely depend on the business, challenge,
    and purpose of the chain. In our siloed case of consideration, we allow the financial
    institute to onboard an initial set of members. Members can further onboard other
    trade players that satisfy the on-chain consensus conditions. Every user is a
    node, making it truly decentralized end to end.


    # Second Challenge


    Once the onboarding mechanism is chosen, but before onboarding the members, the
    solution architect needs to ensure all activities/transactions follow the common
    rule of consensus defined before any onboarding. For example, when a set of smart
    contract rules are validated, only then can the defined activity take place, or
    can be the proof of stake where the majority of stakeholders decide the activity
    to execute or to decline. In a consortium of private and public blockchains, there
    can be more than one form of consensus in the blockchain, each pertaining to the
    private or public blockchain.


    Therefore, the second challenge of design is **choice of consensus mechanisms**.


    One of the original reasons for forming the blockchain was credibility; therefore,
    the consensus mechanism needs to ensure that the credibility of the trade players
    is transparently tracked and maintained on-chain. Points of consideration may
    be identified throughout the book where consensus mechanisms are defined, or one
    can develop one''s own mechanism.


    For the current use case, we chose a combination of proof of work and proof of
    stake, along with the conditions of the smart contract that create the value of
    credibility that will govern the overall trade trust.


    Once consensus is defined in the blockchain, onboarding to private/public blockchain
    consortiums can begin. The public blockchain may host all peer nodes that trade
    or are involved in trade. The private blockchain may be formed ad-hoc or synced
    whenever trade is initiated, and only those trade players may be included.


    # Third Challenge


    During onboarding, the Know-Your-Customer (KYC) may be required as per the design,
    along with the peer node validation. This is similar to a referral from friends/family
    or a validation from a bank.


    Post-onboarding of trade players, one has to assign the role they will undertake
    on chain.


    The third challenge of design is **assignment of roles to nodes**.


    Roles to assign in a blockchain may be as follows as we observe in Figure 8-4:


    - **Client Nodes** – End users that onboard when they require a service on the
    chain. In our current use case, it is the importer and exporter (i.e., buyer and
    seller).


    - **Peer Nodes** – The banks that the end users deal with need to be on-chain
    permanently. The issuing and nominated bank branches may be identified as peer
    nodes. Certain peer nodes can be endorser nodes. For example, the issuing bank
    endorses the exporter''s credibility, initiates a transaction, and maintains the
    state of his credibility.


    - **Orderer Nodes** – These nodes are the conveyers of transactions, validating
    unbiasedly to ensure the delivery of the transaction activity in a fault-tolerant
    way. Therefore, by design, the architect needs to ensure the ratio proportion
    of peer nodes and orderer nodes is appropriate to avoid bias imbalance.


    Further, CA nodes could be authorizers of these roles and assign powers associated
    with these roles. This authority by CA forms consensus by proof of stake to maintain
    the permissioned ledger aspect.


    Also, the KYC of client nodes could be a separate blockchain with proof of identity
    consensus, if required. This again depends on the focus of the platform provider.
    Otherwise, the CA nodes can ensure the onboarding validations.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig4_HTML.png](Images/474923_1_En_8_Fig4_HTML.png)


    Figure 8-4: Assigning the roles to members on-boarding'
