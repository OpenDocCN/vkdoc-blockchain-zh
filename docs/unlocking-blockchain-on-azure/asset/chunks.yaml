- fmt: '### Marine Insurance


    In 2017, one of The Big Four consultancies – `EY` along with `Guardtime`, a software
    security company, announced the world’s first blockchain platform for the field
    of marine insurance. The development and launch of this platform was a collaborative
    effort with `A.P. Møller-Maersk A/S`, `ACORD`, `Microsoft`, `MS Amlin`, `Willis
    Towers Watson`, and `XL Catlin`. The partners coming together for this went ahead
    with the move after a rigorous twenty-week `POC`.


    The platform for this has been built on the `Microsoft Azure` global cloud technology
    and was the first of its kind in the insurance industry, and the phased rollout
    intends to cover end-to-end use across the marine industry.


    The platform, based on a global platform, connects maritime clients, insurance
    brokers, insurance companies, and third parties to distributed common ledgers
    that help with the acquisition of data about identity, risk factors, and exposures.
    The same then integrates this information with insurance contracts. The platform
    can create and maintain asset data from multiple parties to link data to policy
    contracts; to receive and act upon information that results in a pricing or a
    business process change; to connect client assets, transactions, and payments;
    and to capture and validate up-to-date first notification or loss data.


    An excerpt from the `EY` insurance leader `Shaun Crawford` lays out that:


    > *Blockchain’s potential to transform the insurance ecosystem has always been
    clear. What we have done is to move forward from potential to reality. This solution
    is the first to apply blockchain’s transparency, security and standardization
    to marine insurance and is ready for commercial use. We look forward to deploying
    this technology across the marine insurance industry and are exploring how these
    findings and insights will be applied to other specialty insurance markets and
    beyond.*


    The platform deployed across the entire ecosystem of the marine insurance industry
    was built with the vision of addressing the challenges of its complex systems,
    which involve multiple parties, rules, duplication, and a lack of digital capture
    of data, along with issues with significant levels of reconciliation. The issues
    until then were causing problems with transparent access to data, linkage of data
    to the rest of the chain, and accuracy in underwriting risk by the insurance companies
    and the sharpening of their model with respect to the preceding issues.


    The words of `Lars Henneberg`, the head of risk and insurance for `A.P. Møller-Maersk
    A/S` in 2017, regarding this indicate that the problem of risk comprehension and
    evaluation has an affinity or potential to be addressed well by blockchains, thereby
    making the equation better for everyone. In his words:


    > *It is a priority for us to leverage technology to streamline and automate our
    interaction with the insurance market. Insurance transactions are currently far
    too tedious and frictional. The distance between risk and capital is simply too
    far. Blockchain technology has the potential to facilitate the desired development
    that is long overdue.*


    Insurers can use this blockchain platform to improve their capital and gain efficiencies,
    with increased transparency and reduced manual data entry or reconciliation and
    administration costs. The platform has been built over the `Keyless Signature
    Infrastructure`, also known as the `KSI` platform.


    Not just maritime, but all of the insurance industry can benefit from blockchain
    technology, as it has the potential to bring in transparency, remove time-taking
    activities, and reduce the cost at the same time. The entire series of benefits
    make risk assessment sharper and more in real time.


    If we go by the words of `Mark Russinovich`, Chief Technology Officer, `Microsoft
    Azure`, we can see this:


    > *Microsoft believes blockchain is a transformational technology with the ability
    to significantly reduce the friction of doing business, especially streamlining
    business processes shared across multiple organizations. Marine insurance is a
    prime example of a complex business process that can be optimized with blockchain.
    We remain committed to bringing blockchain to the enterprise, and are glad to
    work with EY, Guardtime and other industry experts to develop and deploy blockchain
    solutions powered by Microsoft Azure.*


    As of now, blockchains are finding more and more use cases in the banking and
    financial services space owing to the ownership and transparency brought in by
    this technology. The initial example of trade finance has been picked up well,
    and now even lending, along with the insurance sector, is exploring the potential
    of blockchains.'
