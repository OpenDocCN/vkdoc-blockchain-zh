- fmt: "[`https://docs.google.com/document/d/1GBNlHfLrd0orOKJHedhBSRX43xgokF9GA7ZIb3ljX04/edit?usp=sharing`](https://docs.google.com/document/d/1GBNlHfLrd0orOKJHedhBSRX43xgokF9GA7ZIb3ljX04/edit%253Fusp%253Dsharing)\n\
    \nThese nodes could be local or on Azure instances, based on your configuration.\
    \ Let us look at the syntactical format of a Solidity smart contract.\n\nWe have\
    \ designed the following smart contract for a manufacturer, for example:\n\n```\n\
    pragma solidity ^0.5.4;\ncontract Manufacturer {\n//Definitions of Users, Objects\
    \ & States\naddress public manufacturer;\naddress public vendor;\naddress public\
    \ owner;\naddress public car;\nuint public constant price = 4 wei;\nstruct car1{\n\
    string cModel;\nuint cRegNo;\nstring cLicensePlate;\n}\nmapping (address=> uint)public\
    \ balanceOf;\ncar1 carDetail;\n//Function Definitions\nfunction setCar(string\
    \ memory _cModel, uint _cRegNo, string memory _cLicensePlate)public{\n//storing\
    \ data in struct\ncarDetail.cModel= _cModel;\ncarDetail.cRegNo= _cRegNo;\ncarDetail.cLicensePlate=\
    \ _cLicensePlate;\n}\nfunction getCar() view public returns(string memory, uint,\
    \ string memory) {\nreturn (carDetail.cModel, carDetail.cRegNo, carDetail.cLicensePlate);\n\
    }\nstruct manufacturer1{\nuint mAge;\nstring mName;\nstring mAddress;\n}\nmapping(address\
    \ => manufacturer1) manufacturerDetails;\nmanufacturer1 manufacturerDetail;\n\
    constructor ()public payable\n{\nmanufacturer = msg.sender;\n//initialize\nbalanceOf[manufacturer]\
    \ = 0;\n}\nfunction setManufacturer(address manufacturer, uint _mAge, string memory\
    \ _mName, string memory _mAddress)public{\n//storing data in struct\nmanufacturerDetail.mAge=\
    \ _mAge;\nmanufacturerDetail.mName= _mName;\nmanufacturerDetail.mAddress= _mAddress;\n\
    }\nfunction getManufacturer(address manufacturer) view public returns (uint, string\
    \ memory, string memory) {\nreturn (manufacturerDetail.mAge, manufacturerDetail.mName,\
    \ manufacturerDetail.mAddress);\n}\n// State management\nenum State1{Created,\
    \ Locked, Inactive}\nState1 public state1;\nmodifier inState1(State1 _state) {\n\
    require(state1 == _state);\n_;\n}\nevent PurchaseConfirmed1();\nevent ItemReceived1();\n\
    }\n```\n\nThe constructs of the smart contract are in three major parts:\n\n1.\
    \  Definition of Variables – Users, Objects, and States\n2.  Function Definitions\
    \ – Read-Write Operations and their accesses\n3.  Update of state variables based\
    \ on event triggers\n\nIn the preceding code, we have first initialized a contract\
    \ for a manufacturer, where the definition of variables includes the stakeholders\
    \ with whom he interacts and objects such as `Car` that are developed on his end.\n\
    \nThe addresses are mapped to the user nodes. The data blocks, such as the status\
    \ of the manufactured car, are initialized based on the functions. These functions\
    \ enable the generation of the `Car` record and its statuses and manufacturer\
    \ details.\n\nUpon event triggers, the status of the `Car` object updates are\
    \ purchased and received according to the contract. Upon these event triggers,\
    \ the manufacturer’s balance may be updated and the car’s ownership may be registered.\n\
    \nNote that the syntax of Solidity is not the prime focus of the chapter, but\
    \ rather the ability to design such smart contracts. The language could be any—C++,\
    \ Python, Solidity—based on the application, business premise, and developer capacities.\n\
    \nGo ahead and detail out a new use case in food, employment, warranties, or other\
    \ fields where paper contracts have never helped.\n\n## Exercise\n\nThink of problems\
    \ in the current food-supply scenario in your house.\n\n1.  Write the challenges\
    \ you face, such as improper quality, wastage of food, lack of supply, pesticides\
    \ sprayed, artificially developed food, or an unknown source. Choose one.\n2.\
    \  Identify the stakeholders that handle this food supply for you. E.g., could\
    \ be your supermarket, online store, or a farm nearby, or the delivery guy, the\
    \ farmer, the retailer, the wholesaler, etc.\n3.  Build a block diagram of a block\
    \ chain representing all these stakeholders.\n4.  Arrange the linkages of processes\
    \ involved related to the challenge selected in Step 1. For example, if the challenge\
    \ is wastage of food, link the inventory node of the house to other fast-consuming\
    \ houses.\n5.  Once the chains are linked, decide the type of chain—public, private,\
    \ or hybrid—and arrange linkages based on it.\n6.  In a chain, decide on events\
    \ that require consensus, and the type of consensus.\n7.  If it is based on a\
    \ set of pre-defined rules that all stakeholders have to agree upon, implement,\
    \ or maintain data upon, create a flow diagram of the rules and conditions.\n\n\
    E.g., if the challenge is quality of food, then link all stakeholders from the\
    \ farming area, to the distributors, to the delivery to track the conditions of\
    \ growth, the time of freshness, and have cameras at each node linked on the blockchain\
    \ (IoT + blockchain). If the delivery node is to maintain the temperature of food\
    \ at 4 degrees, the sensory nodes could update the blockchain in real time for\
    \ all stakeholders of this data.\n\n8.  When data is added onto the blockchain,\
    \ the smart contract has to successfully run through the data across the chain\
    \ to form consensus. If the data (in the preceding example) breaks the rule on\
    \ the contract, the food is auto-rejected by the buyer, as the supplier couldn’t\
    \ maintain the conditions in the smart contract.\n\n# Blockchain Points of Integration\n\
    \nAt this stage of the book, we will discover the external and internal interactions\
    \ of blockchains. Interactions can vary from sourcing of metadata, to onboarding\
    \ of users, to connecting all the dots of the ecosystem surrounding the blockchain\
    \ application. This helps us focus on the points of integration that are crucial\
    \ for a successful seamless workflow that utilizes the benefits of a truly decentralized\
    \ platform.\n\nHere, the focus is not on the technology itself, but rather on\
    \ the processes that were in place before the blockchain technology was being\
    \ considered. While you unfolded different learnings of what a blockchain is in\
    \ the first half of the book, the second half helps you to visualize its implementation\
    \ and execution for the challenges around you. Focus on the existing centralized\
    \ platforms, the people operations, and the offline practices, and revisit each\
    \ of them closely. Each pain point in the old existing practices will help you\
    \ identify the right plug (data) point to connect to the blockchain.\n\nWe will\
    \ focus on four important points of integration that make large movements in implementation:\n\
    \n*   **Data sourcing** – Enterprise integration with existing systems\n*   **Onboarding**\
    \ – Compliance and regulatory requirements\n*   **Authorization** – Access control\
    \ and security access\n*   **Automation** – Processes for auto-trigger/alerts\
    \ of smart contracts\n\n    ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig1_HTML.png](Images/474923_1_En_6_Fig1_HTML.png)\n\
    \n    **Figure 6-1** Framework: Point of integration for a blockchain implementation"
