- fmt: "This use case covers a very important aspect of **transparency** that blockchains\
    \ provide (Figure [9-6](#474923_1_En_9_Chapter.xhtml#Fig6)).\n\n![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig6_HTML.png](Images/474923_1_En_9_Fig6_HTML.png)\n\
    \n**Figure 9-6**\n\nStages of farm to cup for the coffee supply chain\n\n**Note**\n\
    \nLet us dig in deeper to analyze how the process might be broken down. As readers,\
    \ one must try to correlate the use case with the technologies learned throughout\
    \ the book. Remember: we are not reading facts and following them. We are inferring\
    \ from the use cases to develop our solutions. Given the stage at which the technology\
    \ is, one can always challenge with newer ways and constructs. So, let us break\
    \ it down in a similar fashion and infer possibilities of implementations from\
    \ understanding the use case.\n\nAnother important aspect of the use of blockchains\
    \ is the automated efficiency and productivity they bring. Most of the time, in\
    \ large enterprises and companies, the information flow of data reaches very late\
    \ to the top management for effective direction. Even in the largest of the firms,\
    \ the predictive approach is still not formulated, and digitization exists mainly\
    \ in structured forms. Thus, Blockchains here enable digitization with credibility\
    \ due to its immutable style of storage (add-only) & transparency across all processes\
    \ involved. Thereby enabling the top management to drive data driven decisions\
    \ based on the state of data/ information across different timelines.\n\nFor example,\
    \ consider a factory that does milling through hulling machinery for coffee. There\
    \ is a small accident with one of the hulling machines. This issue goes unreported\
    \ for a day. The next day, the supervisor realizes that the supply generated would\
    \ be reduced by 1/10 due to the faulty machinery. The report goes to the management\
    \ after ten days. The information flows down to the sales department sitting in\
    \ another country on the fifteenth day. The customer on the end does not receive\
    \ the order and cancels the order or charges a late fee.\n\nThis shows the impact\
    \ of having transparency of data and unmonitored productivity rates. Now, for\
    \ a company like Starbucks, with more than 30,000 stores worldwide serving 100\
    \ million customers a week, staying profitable irrespective of the seasonality,\
    \ calamities, loss of productivity, and so on is of huge importance. At the same\
    \ time, they don’t want to reduce any experiential facilities for end customers.\n\
    \nStarbucks has integrated Azure Sphere—Microsoft’s end-to-end solution for creating\
    \ highly secure, connected devices—to deliver the following:\n\n*   **Hardware-based\
    \ root of trust**: The device must have a unique, unforgeable identity that is\
    \ inseparable from the hardware.\n*   **Small, trusted computing base**: Most\
    \ of the device’s software should be outside a small, trusted computing base,\
    \ reducing the attack surface for security resources such as private keys.\n*\
    \   **Defense in depth**: Multiple layers of defense mean that even if one layer\
    \ of security is breached, the device is still protected.\n*   **Compartmentalization**:\
    \ Hardware-enforced barriers between software components prevent a breach in one\
    \ from propagating to others.\n*   **Certificate-based authentication**: The device\
    \ uses signed certificates to prove device identity and authenticity.\n*   **Renewable\
    \ security**: Updated software is installed automatically, and devices that enter\
    \ risky states are always brought into a secure state.\n*   **Failure reporting**:\
    \ All device failures, which could be evidence of attacks, are reported to the\
    \ manufacturer.\n\nImagine such MCU devices from Azure Sphere being embedded at\
    \ every stage, from farm to cup. This would monitor the supply chain closely in\
    \ a secure manner impermeable to hacks in an encrypted network of devices/nodes.\
    \ At the same time, it would provide transparency and failure reporting to the\
    \ proper stakeholders to increase predictability and manage costs accordingly\
    \ (Figure [9-7](#474923_1_En_9_Chapter.xhtml#Fig7)).\n\n![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig7_HTML.png](Images/474923_1_En_9_Fig7_HTML.png)\n\
    \n**Figure 9-7**\n\nAn illustration of nodes that are IoT edge devices updating\
    \ data to the blockchain\n\nThe confluence of predictive models that run locally\
    \ on these intelligent edge devices at every stage of coffee manufacturing so\
    \ as to run the recommendation engine for the consumer makes it a complete closed\
    \ loop supply chain, thus enhancing experiences for all involved. Having all of\
    \ this connected on a blockchain makes traceability and accessibility highly transparent\
    \ to the management of the company so they can make pro-active decisions in favor\
    \ of most stakeholders. Decentralization here provides a promise to reduce losses\
    \ and envisions opening up new avenues with its means of providing transparency\
    \ and accessibility to farmers, customers, and business owners alike.\n\nLast\
    \ month, the Indian Commerce Ministry launched a blockchain-based coffee e-marketplace\
    \ app that conducts transparent coffee trade in the country. The app is believed\
    \ to bring a positive transformation among consumers who look for real Indian\
    \ coffee, as well as for the grower who is paid fairly for the coffee produced.\n\
    \nSimilarly, several economies are now gearing up to boost the efficiency of their\
    \ supply chain with the confluence of AI, IOT, and blockchains, making it end-to-end\
    \ digitized, tangible, and provable.\n\n### Other Industries\n\nA couple more\
    \ noteworthy use cases that deal with customer experiences in various industries\
    \ are:\n\n*   The dairy industry, for which it is highly crucial to have transparency\
    \ in terms of temperature control, shelf life of the product, conditions of transport\
    \ and storage, etc.\n*   The health industry, where diet regimes have been a crazy\
    \ fad across the social media. Many of us attempt to start and try various regimes\
    \ without complete knowledge of our own bodies and the historical evidence of\
    \ the diet. All that we have is a couple of internet searches and blogs telling\
    \ us what to do. Visiting a dietician would surely be a credible source, as the\
    \ time invested by the professional to understand your eating habits, regional\
    \ differences, cultural impact, and medical history definitely would help.\n \
    \   1.  Here, technology could assist the accessibility of such a professional.\n\
    \    2.  Validate the data in terms of results on-chain with body monitors.\n\
    \    3.  IoT devices that update weight parameters on blockchain and trace the\
    \ impact of various diet regimes.\n\nHowever, how many of us would want to share\
    \ our weight online at first? How is the privacy of an individual secured with\
    \ technology to help us in certain ways? This is the difference between using\
    \ a blockchain over a centralized internet platform. In the blockchain, which\
    \ is decentralized, the authority distributed to the stakeholders regulates the\
    \ activities of the chain in such a way that any activity might require the consensus\
    \ of the entire chain. On an internet platform that is hosted by one single party,\
    \ that party might have full authority to misuse your data and gain profits.\n\
    \nTherefore, a blockchain might be appropriate for such a use case, with IoT that\
    \ connects people to validated dieticians, maintains anonymous shared blockchain\
    \ data to trace the success rates of users, and incentivizes the customers rather\
    \ than one company itself."
  raw: "This use case covers a very important aspect of **transparency** that blockchains\
    \ provide (Figure [9-6](#474923_1_En_9_Chapter.xhtml#Fig6)).\n\n![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig6_HTML.png](Images/474923_1_En_9_Fig6_HTML.png)\n\
    \nFigure 9-6\n\nStages of farm to cup for the coffee supply chain\n\nNote\n\n\
    Let us dig in deeper to analyze how the process might be broken down. As readers,\
    \ one must try to correlate the use case with the technologies learned throughout\
    \ the book. Remember: we are not reading facts and following them. We are inferring\
    \ from the use cases to develop our solutions. Given the stage at which the technology\
    \ is, one can always challenge with newer ways and constructs. So, let us break\
    \ it down in a similar fashion and infer possibilities of implementations from\
    \ understanding the use case.\n\nAnother important aspect of the use of blockchains\
    \ is the automated efficiency and productivity they bring. Most of the time, in\
    \ large enterprises and companies, the information flow of data reaches very late\
    \ to the top management for effective direction. Even in the largest of the firms,\
    \ the predictive approach is still not formulated, and digitization exists mainly\
    \ in structured forms. Thus, Blockchains here enable digitization with credibility\
    \ due to its immutable style of storage (add-only) & transparency across all processes\
    \ involved. Thereby enabling the top management to drive data driven decisions\
    \ based on the state of data/ information across different timelines.\n\nFor example,\
    \ consider a factory that does milling through hulling machinery for coffee. There\
    \ is a small accident with one of the hulling machines. This issue goes unreported\
    \ for a day. The next day, the supervisor realizes that the supply generated would\
    \ be reduced by 1/10 due to the faulty machinery. The report goes to the management\
    \ after ten days. The information flows down to the sales department sitting in\
    \ another country on the fifteenth day. The customer on the end does not receive\
    \ the order and cancels the order or charges a late fee.\n\nThis shows the impact\
    \ of having transparency of data and unmonitored productivity rates. Now, for\
    \ a company like Starbucks, with more than 30,000 stores worldwide serving 100\
    \ million customers a week, staying profitable irrespective of the seasonality,\
    \ calamities, loss of productivity, and so on is of huge importance. At the same\
    \ time, they don’t want to reduce any experiential facilities for end customers.\n\
    \nStarbucks has integrated Azure Sphere—Microsoft’s end-to-end solution for creating\
    \ highly secure, connected devices—to deliver the following:\n\n*   **Hardware-based\
    \ root of trust**: The device must have a unique, unforgeable identity that is\
    \ inseparable from the hardware.\n\n*   **Small, trusted computing base**: Most\
    \ of the device’s software should be outside a small, trusted computing base,\
    \ reducing the attack surface for security resources such as private keys.\n\n\
    *   **Defense in depth**: Multiple layers of defense mean that even if one layer\
    \ of security is breached, the device is still protected.\n\n*   **Compartmentalization**:\
    \ Hardware-enforced barriers between software components prevent a breach in one\
    \ from propagating to others.\n\n*   **Certificate-based authentication**: The\
    \ device uses signed certificates to prove device identity and authenticity.\n\
    \n*   **Renewable security**: Updated software is installed automatically, and\
    \ devices that enter risky states are always brought into a secure state.\n\n\
    *   **Failure reporting**: All device failures, which could be evidence of attacks,\
    \ are reported to the manufacturer.\n\nImagine such MCU devices from Azure Sphere\
    \ being embedded at every stage, from farm to cup. This would monitor the supply\
    \ chain closely in a secure manner impermeable to hacks in an encrypted network\
    \ of devices/nodes. At the same time, it would provide transparency and failure\
    \ reporting to the proper stakeholders to increase predictability and manage costs\
    \ accordingly (Figure [9-7](#474923_1_En_9_Chapter.xhtml#Fig7)).\n\n![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig7_HTML.png](Images/474923_1_En_9_Fig7_HTML.png)\n\
    \nFigure 9-7\n\nAn illustration of nodes that are IoT edge devices updating data\
    \ to the blockchain\n\nThe confluence of predictive models that run locally on\
    \ these intelligent edge devices at every stage of coffee manufacturing so as\
    \ to run the recommendation engine for the consumer makes it a complete closed\
    \ loop supply chain, thus enhancing experiences for all involved. Having all of\
    \ this connected on a blockchain makes traceability and accessibility highly transparent\
    \ to the management of the company so they can make pro-active decisions in favor\
    \ of most stakeholders. Decentralization here provides a promise to reduce losses\
    \ and envisions opening up new avenues with its means of providing transparency\
    \ and accessibility to farmers, customers, and business owners alike.\n\nLast\
    \ month, the Indian Commerce Ministry launched a blockchain-based coffee e-marketplace\
    \ app that conducts transparent coffee trade in the country. The app is believed\
    \ to bring a positive transformation among consumers who look for real Indian\
    \ coffee, as well as for the grower who is paid fairly for the coffee produced.\n\
    \nSimilarly, several economies are now gearing up to boost the efficiency of their\
    \ supply chain with the confluence of AI, IOT, and blockchains, making it end-to-end\
    \ digitized, tangible, and provable.\n\n### Other Industries\n\nA couple more\
    \ noteworthy use cases that deal with customer experiences in various industries\
    \ are:\n\n*   The dairy industry, for which it is highly crucial to have transparency\
    \ in terms of temperature control, shelf life of the product, conditions of transport\
    \ and storage, etc.\n\n*   The health industry, where diet regimes have been a\
    \ crazy fad across the social media. Many of us attempt to start and try various\
    \ regimes without complete knowledge of our own bodies and the historical evidence\
    \ of the diet. All that we have is a couple of internet searches and blogs telling\
    \ us what to do. Visiting a dietician would surely be a credible source, as the\
    \ time invested by the professional to understand your eating habits, regional\
    \ differences, cultural impact, and medical history definitely would help.\n \
    \   1.  Here, technology could assist the accessibility of such a professional.\n\
    \n    2.  Validate the data in terms of results on-chain with body monitors.\n\
    \n    3.  IoT devices that update weight parameters on blockchain and trace the\
    \ impact of various diet regimes.\n\nHowever, how many of us would want to share\
    \ our weight online at first? How is the privacy of an individual secured with\
    \ technology to help us in certain ways? This is the difference between using\
    \ a blockchain over a centralized internet platform. In the blockchain, which\
    \ is decentralized, the authority distributed to the stakeholders regulates the\
    \ activities of the chain in such a way that any activity might require the consensus\
    \ of the entire chain. On an internet platform that is hosted by one single party,\
    \ that party might have full authority to misuse your data and gain profits.\n\
    \nTherefore, a blockchain might be appropriate for such a use case, with IoT that\
    \ connects people to validated dieticians, maintains anonymous shared blockchain\
    \ data to trace the success rates of users, and incentivizes the customers rather\
    \ than one company itself."
  trans: "\n这一用例涵盖了区块链所提供的**透明度**这一非常重要的特性（图 9-6）。\n\n![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig6_HTML.png](img/474923_1_En_9_Fig6_HTML.png)\n\
    \n**图 9-6**\n\n咖啡供应链从农场到杯子的各个阶段\n\n**注意**\n\n让我们深入分析流程可能如何分解。读者应尝试将该用例与本书学到的技术联系起来。请记住：我们不是在阅读事实并遵循它们，而是从用例中推断以开发我们的解决方案。鉴于当前技术所处的阶段，我们始终可以用新的方法和架构提出挑战。因此，让我们以类似的方式分解它，并从理解用例中推断实现的可能性。\n\
    \n使用区块链的另一个重要方面是其带来的自动化效率和生产力。大多数情况下，在大型企业和公司中，数据的有效信息流到达高层管理手中进行有效决策的时间非常晚。即使在规模最大的公司中，预测方法也尚未形成，数字化主要以结构化形式存在。因此，区块链凭借其不可变（仅追加）的存储方式以及所有相关流程中的透明度，实现了具有可信度的数字化。从而使高层管理能够根据不同时间线的数据/信息状态，做出数据驱动的决策。\n\
    \n例如，考虑一家使用脱壳机械进行咖啡加工的工厂。其中一台脱壳机发生了一起小事故。这个问题在一天内未被报告。第二天，主管意识到由于机械故障，供应量将减少 1/10。报告在十天后才送达管理层。信息在第十五天流向下设在另一个国家的销售部门。最终客户未能收到订单，从而取消订单或收取滞纳金。\n\
    \n这显示了数据透明度和缺乏监控的生产力所带来的影响。现在，对于像星巴克这样在全球拥有超过 30,000 家门店、每周服务 1 亿客户的公司而言，无论季节变化、灾难、生产力损失等如何，保持盈利至关重要。同时，他们也不希望减少为最终客户提供的任何体验设施。\n\
    \n星巴克已集成 Azure Sphere——微软端到端的高安全连接设备解决方案——以实现以下功能：\n\n*   **基于硬件的信任根**：设备必须具有唯一的、不可伪造的、与硬件不可分割的身份。\n\
    *   **小型可信计算基**：设备的大部分软件应位于一个小的可信计算基之外，减少私钥等安全资源的攻击面。\n*   **纵深防御**：多层防御意味着即使某一层安全被攻破，设备仍受保护。\n\
    *   **隔离**：软件组件之间的硬件强制隔离，防止一个组件的漏洞传播到其他组件。\n*   **基于证书的身份验证**：设备使用签名证书来证明设备身份和真实性。\n\
    *   **可更新的安全性**：自动安装更新的软件，并始终将进入风险状态的设备恢复为安全状态。\n*   **故障报告**：所有设备故障（可能是攻击证据）均报告给制造商。\n\
    \n想象一下，从农场到杯子的每个阶段都嵌入了此类 Azure Sphere 的 MCU 设备。这将以安全的方式密切监控供应链，在加密的设备/节点网络中防止黑客攻击。同时，它将向相关利益方提供透明度和故障报告，以提高可预测性并相应管理成本（图\
    \ 9-7）。\n\n![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig7_HTML.png](img/474923_1_En_9_Fig7_HTML.png)\n\
    \n**图 9-7**\n\n作为 IoT 边缘设备向区块链更新数据的节点示意图\n\n在咖啡制造的每个阶段，这些智能边缘设备上本地运行的预测模型与为消费者运行推荐引擎相结合，形成了一个完整的闭环供应链，从而提升了所有参与者的体验。将所有这一切连接到区块链上，使得可追溯性和可访问性对公司的管理层高度透明，以便他们能够做出有利于大多数利益相关者的主动决策。去中心化在这里承诺减少损失，并展望通过其提供透明度和可访问性的方式，为农民、客户和企业主等开辟新的途径。\n\
    \n上个月，印度商务部推出了一个基于区块链的咖啡电子市场应用，在印度境内进行透明的咖啡贸易。该应用被认为将为寻求正宗印度咖啡的消费者以及为所产咖啡获得公平报酬的种植者带来积极的转变。\n\
    \n类似地，目前多个经济体正准备通过结合人工智能、物联网和区块链来提高其供应链效率，使其实现端到端的数字化、有形化和可验证。\n\n### 其他行业\n\n\
    在不同行业中，还有几个值得注意的与客户体验相关的用例：\n\n*   乳制品行业，对于温度控制、产品保质期、运输和储存条件等方面的透明度至关重要。\n* \
    \  健康行业，在过去，饮食方案已成为社交媒体上的一种狂热潮流。我们许多人尝试开始并尝试各种方案，但对自己的身体和饮食的历史证据并不完全了解。我们所有的一切就是几项网络搜索和博客告诉我们该怎么做。咨询营养师当然是一个可靠的来源，因为专业人士投入时间来了解你的饮食习惯、地域差异、文化影响和病史，这肯定会有帮助。\n\
    \    1.  在这里，技术可以协助获得此类专业人士的服务。\n    2.  通过身体监测仪在链上验证结果数据。\n    3.  在区块链上更新体重参数并追踪不同饮食方案效果的物联网设备。\n\
    \n然而，一开始有多少人愿意在网上分享我们的体重？如何通过技术以特定方式保护个人隐私来帮助我们？这就是使用区块链而不是中心化互联网平台的区别。在去中心化的区块链中，分配给利益相关者的权限以这样一种方式监管链的活动，即任何活动都可能需要整个链的共识。在由单一方托管的互联网平台上，该方可能拥有滥用你的数据并获利的全部权力。\n\
    \n因此，对于此类用例，结合将人们与经过认证的营养师连接起来的物联网，维护匿名共享的区块链数据以追踪用户的成功率，并激励客户而非公司本身，区块链可能是合适的选择。\n"
- fmt: '## Decentralized Trade Finance


    One of the most common and foremost use cases of blockchains came out of the challenges
    faced in the conventional operation of trade finance; a more direct case is the
    international trade finance, where changes in banks, banking regulations, and
    international trade laws create processes that cause it to take days for transactions
    to be closed.


    Another challenge that comes up in such scenarios is the lack of transparency
    in terms of transfer of payments and the goods/services that have been provided
    in exchange and the sheer dependence on banks for the transaction (in most cases
    the bank of the other party may not even operate in your home country to offer
    assistance).


    Other pain points that have been raised repeatedly are as follows:


    - Error-prone manual processes for creating, validating, and auditing trade data
    and documentation

    - Siloed data that is difficult to verify, leading to multiple versions of the
    truth and major fraud, compliance, and audit risks

    - Disconnected legacy systems that limit new business opportunities and make it
    difficult for small and medium-sized businesses to gain access to financing alternatives


    Therefore, as we have studied the impact on customer experiences of the refining
    of supply-chain procedures with blockchain technology in the last section, let
    us deep dive into the trade finance processes that impact life, trade, and our
    finances in this section.


    ### Microsoft Azure and Banks


    `Microsoft News` mentions that more than 80 percent of the world’s largest banks
    are `Azure` customers.


    To help solve the pain points mentioned under the "Decentralized Trade Finance"
    section, blockchains have been introduced and experimented with, and now are finally
    coming into mainstream use. Major players like `Bank of America Merrill Lynch`
    now called `BofA Securities` are taking the lead with `Azure` blockchains to create
    an ecosystem for trade finance that will be more transparent, and that too, as
    early as 2016, speaks volumes about the belief of the industry in the potential
    of blockchains. Banks like `HSBC` and `ING Bank` have followed suit, and the same
    phenomena is becoming popular across all financial institutions today.


    To understand trade finance and the integration of blockchains better, let’s look
    into the `Bank Of America Merrill Lynch` case in depth.


    `Microsoft` and `Bank of America Merrill Lynch` announced a collaboration to use
    blockchain technology to fuel the transformation of trade finance transactions
    as early as 2016.


    As part of this collaboration, the two companies decided to build and test technology,
    create frameworks, and establish best practices for blockchain-powered exchanges
    between businesses and their customers and banks. `Microsoft Treasury` experts
    served as the advisors and initial test clients, establishing the first `Microsoft
    Azure`–powered blockchain transaction between a major corporate treasury and a
    financial institution.


    As we all know, when digitization started, there were many `ERP` systems that
    came into existence. With such software, the banks started increasing data entry
    to such systems, making it highly inefficient for people to support such a task,
    where the credibility of the data lay in the hands of the data-entry personnel.
    Not just in the banks, but all parts of trade finance—the importer, the exporter,
    the banks, the customs people, and other stakeholders—all had to fill in various
    kinds of paper and digital forms. This was highly manual, time consuming, and
    many times faulty. These systems used to store such data in plain-text, as most
    of them at the early stage of that technology were focused on simply aggregating
    data. However, the tamper-proof methods of storing such data were missing.


    With blockchains, processes can be digitized and automated, transaction settlement
    times shortened, and business logic applied to related data, creating a host of
    potential benefits for businesses and financial institutions, including more predictable
    working capital, reduced counterparty risk, improved operational efficiency, and
    enhanced audit transparency, among other benefits, in a closed-loop network of
    anonymous transactions.


    With this, blockchains open the door for streamlined trade finance, enabling participants
    to exchange data easily and track assets in real time. `Microsoft` is leveraging
    `Corda`, an enterprise-grade ledger that enables banks to limit who sees what
    information and selectively share data with only relevant parties. The solution
    involves blockchain technology paired with `Azure` and `API`s, and could be used
    in the future to involve technologies like `AI`, machine learning, `IoT`, and
    more.


    Upon using blockchains for the processing of letters of credit, the turnaround
    time for issuing an `SBLC` was reduced to three to five days from the earlier
    benchmark of three to five weeks! Similarly, the transaction settlement time for
    overseas transactions was reduced drastically after automating conditions on smart
    contracts. Once the conditions are fulfilled, the transactions are settled immediately.


    With the blockchain encapsulating the challenge with validator nodes that actively
    validate the transaction, the settlement is made clear a lot faster. However,
    in the absence of a blockchain, the transfer of data requests for clearance are
    dependent on non-standardized processes, scattered systems, and so forth.


    `Microsoft` further partnered with `JP Morgan Bank` to promote the `Blockchain
    Service on Azure` with the `Quorum Blockchain`. It enables the setup with a couple
    of clicks over `Azure`, integrating the `Active Directory`, event registers, and
    `Visual Studio` to write contracts and so forth. It applies all policies of the
    consortium defined by the `Quorum Blockchain`.


    "In a rapidly globalizing digital world, business processes touch multiple organizations
    and great sums are spent managing workflows that cross trust boundaries. As digital
    transformation expands beyond the walls of one company and into processes shared
    with suppliers, partners, and customers, the importance of trust grows with it.
    Microsoft’s goal is to help companies thrive in this new era of secure multi-party
    computation by delivering open, scalable platforms, and services that any company
    from game publishers and grain processors, to payments ISVs and global shippers
    can use to digitally transform the processes they share with others," explained
    `Mark Russinovich`, Chief Technology Officer, `Microsoft Azure`.


    ### Other Financial Industries


    Another set of applications that could benefit from a blockchain deployment of
    processes are the following:


    - Decentralized `KYC` (Know Your Customer) and credit data validation

    - Reduced risk of fraud and lower compliance costs

    - New avenues of financing and tracing trade activities


    As readers, one must question how the application is broken down into the real-life
    implementations. As we saw in the last chapter, the architecture for letters of
    credit involved an overseas trade activity.


    Similarly, for these application use cases, let us speculate on the suitable tools,
    consensuses, and outcomes.'
