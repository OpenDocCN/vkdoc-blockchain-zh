  trans: '

    # 去中心化应用


    在理解了区块链的所有构建模块之后，我们看到每个基本元素是如何融入应用程序，从而形成从去中心化账本到完整运行的区块链的。这不仅仅构成一个软件，更是一个强大的生态系统，能够驱动这个数字时代的经济。


    每一条区块链都代表着量化与共识的一个重要方面。已有许多现存的分布式数据库、账本、流程和系统，区块链之所以如此关键和与众不同，就在于其恰逢其时的出现、完善的生态系统，以及能够将其背后的真实价值体系货币化的能力。


    回到 BBChain，它为利益相关者带来了来自海运航程的高度可信数据源，其价值标准仅仅由上一节中提到的参数生成。


    围绕此类去中心化应用形成的问题如下：


    -   你这条链的核心数字资产是什么？

    -   关键利益相关者如何使用该数字资产？

    -   如何维护数字资产的安全性？

    -   如何维护合约和共识以保障资产数字交易的信誉？

    -   哪些技术符合区块链应用的需求？

    -   是否需要可扩展性？如何保持可扩展性？


    针对 BBChain，相应的答案如下：


    -   航程数据是关键的数字资产。

    -   利益相关者，如区块生产者（船东、港口所有者）生成数据，而保险公司和航运管理机构则订阅/购买此类数据。数据作为区块在不同的侧链和公共账本上传输。

    -   由于完整的加密数字资产（通过公钥）会被分解，并以容错共识的方式分布在不同的节点上，当达成正确的共识后，数据包的位置会被揭示给正确的利益相关者。在按正确顺序累积所有数据包后，正确的利益相关者使用私钥进行的解密操作将是有效的。

    -   正当的利益相关者与区块生产者/买家之间订有合约。在创建合约时，会根据合约的到期时间生成公钥和私钥。密钥随合约一起到期。私有账本上的共识由权益证明机制来管理。这由该侧链的所有利益相关者共同验证，这些利益相关者在其服务器上以加密形式共享了分布式数据。

    -   该架构支持满足链条件所需的技术（图 2-6）。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig6_HTML.jpg](img/474923_1_En_2_Fig6_HTML.jpg)


    图 2-6：BBChain 组件的架构


    -   由于船舶的航程数据记录着航行的每一刻，因此账本需要具备可扩展性。这一点通过 BigChainDB 和 IPFS 提供的存储机制来实现。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Figh_HTML.jpg](img/474923_1_En_2_Figh_HTML.jpg)


    **挑战：** 假设你要通过区块链出口商品并进行交易，请针对上述问题提供你自己的答案版本。记下你的想法，并与后续章节中提供的用例进行比较。


    # 搭建区块链环境


    到目前为止，我们已经在理论上涵盖了区块链的所有基础知识。现在，让我们进入实践环节，搭建一个区块链基础设施。


    在本节中，我们将在 Azure Blockchain Workbench 上部署一条区块链。可以将其视为一套有助于构建区块链的基础设施组件包，就像组装床或衣柜的宜家安装指南一样。Azure
    大大加速了部署过程，因为基础设施元素以打包形式处理好了。此外，在云上部署使得所有节点/用户之间的连接更快，便于业务流程进行连接和协作。


    Azure Blockchain Workbench 提供了一组 Azure 云组件，以及区块链的核心元素，并以模板形式封装在各种架构方案中。它通过开箱即用地支持其他基础设施元素，使企业能够专注于区块链的目的和设计需求。


    1.  如果没有 Azure 账户，请先开始设置您的 Azure 账户。可以参考 [`https://bit.ly/2Gd6TLk`](https://bit.ly/2Gd6TLk)
    来获取此处提到过程的详细操作指南。在本章中，我们专注于实现及其在我们的应用程序中的使用。


    2.  注册并登录仪表板后，点击左侧面板上的“+ 创建资源”（图 2-7）。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig7_HTML.jpg](img/474923_1_En_2_Fig7_HTML.jpg)


    图 2-7：Azure 市场展示


    3.  接着，搜索“Azure Blockchain Workbench”，它将帮助你设置所需数量的元素，例如加密密钥保管库、数据库、应用程序层和命名空间（图
    2-8）。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig8_HTML.jpg](img/474923_1_En_2_Fig8_HTML.jpg)


    图 2-8：设置 Azure Blockchain Workbench


    4.  选择 Azure Blockchain Workbench 后，根据你的用例填写字段。我们为 BBChain 填写了以下内容（图 2-9）。此步骤为资源组及其虚拟机设置了命名约定。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig9_HTML.jpg](img/474923_1_En_2_Fig9_HTML.jpg)


    图 2-9：Azure Blockchain Workbench 的设置


    5.  在第一步中定义了基本凭据后，第二步涵盖了所需设备的规格；例如，验证节点规格（图 2-10）。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig10_HTML.jpg](img/474923_1_En_2_Fig10_HTML.jpg)


    图 2-10：Azure Blockchain Workbench 的设置


    6.  由于这是一个用于理解设置过程的原型教程，我们在这里选择了一个 F1s 服务器验证节点，配备 2GB RAM 和 4GB 本地 SSD（图 2-11）。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig11_HTML.jpg](img/474923_1_En_2_Fig11_HTML.jpg)


    图 2-11：实例的选择


    7.  现在，查看摘要（图 2-12）。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig12_HTML.jpg](img/474923_1_En_2_Fig12_HTML.jpg)


    图 2-12：生成的 BBChain 资源组摘要


    8.  在步骤 4 中点击“购买”后，创建元素列表的部署过程开始。资源组被创建，元素根据指定的选择进行初始化。这可能需要一些时间，因为虚拟设备正在设置中。


    9.  部署完成时，你可能会收到通知。或者，你也可以通过侧边栏上的资源组来访问相同的内容。


    10. 接着，在资源组屏幕上，选择区块链名称——在我的例子中，是 `BBChain`。

    '
- fmt: "11.  Once the deployment is complete, open the resource group. You will find\
    \ all server elements and other infrastructure elements are deployed, as shown\
    \ in Figure [2-13](#474923_1_En_2_Chapter.xhtml#Fig13).\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig13_HTML.jpg](Images/474923_1_En_2_Fig13_HTML.jpg)\n\
    \n**Figure 2-13** Showcases a list of infra elements to build a blockchain template\n\
    \nThe resource group has the set of elements shown in Figure [2-14](#474923_1_En_2_Chapter.xhtml#Fig14)\
    \ initiated for use.\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig14_HTML.jpg](Images/474923_1_En_2_Fig14_HTML.jpg)\n\
    \n**Figure 2-14** Azure Event Grid elements\n\nHere are more details:\n\n- One\
    \ `Event Grid Topic`\n    - In a decentralized platform, where there are multiple\
    \ users behind different servers, certain event triggers appear based on the smart\
    \ contract or based on the protocol/consensus mechanism. Thus, Azure provides\
    \ a utility system as an event grid to manage various event triggers and handlers\
    \ on the chain. The `Event Grid Topic` provides an endpoint for the event publisher\
    \ to create and send event triggers.\n- The subscriber can choose to connect to\
    \ an `Event Grid Topic` based on the type of touchpoint.\n- The `Event Grid Topic`\
    \ extends its connectivity endpoints to Azure as well as to non-Azure components\
    \ such that on-chain online and offline elements can subscribe to the event triggers.\n\
    - Think of this as a connector for event triggers and listeners.\n- Two virtual\
    \ network resource groups (each with load balancer, network security group, public\
    \ IP address, virtual network)\n    - Load balancers that assist in load balancing\
    \ user requests and other event-triggered requests to the servers.\n- Log analytics\
    \ workspace that maintains the activity logs of all systems.\n- `App services`\
    \ are for the business application logic and REST-based and Message based API\
    \ layers.\n\nOn clicking the first app service shown, it will open the configuration\
    \ details of the service, where one can find the public URL allotted for the blockchain\
    \ network. Also, the public URL can be configured to any domain that is required.\
    \ For the scope of this introduction, we shall access the default link provided.\n\
    \n| NAME | TYPE | LOCATION |\n| --- | --- | --- |\n| `bb-eg-hofiog` | `Event Grid\
    \ Topic` | Southeast Asia |\n| `bb-hofiog` | `Application Insights` | Southeast\
    \ Asia |\n| `bb-hofiog` | `Key vault` | Southeast Asia |\n| `Bb-hofiog`, `bb-hofiog-api`\
    \ | `App Service` | Southeast Asia |\n| `Bb-lb`, `ethbb4vow-vlLb-reg1` | `Load\
    \ balancer` | Southeast Asia |\n| `bb-lb-public-ip` | `Public IP address` | Southeast\
    \ Asia |\n| `bb-plan` | `App Service plan` | Southeast Asia |\n| `bb-sb-hofiog`\
