    # 第一个挑战


    信用证（LoC），也称为跟单信用证、银行商业信用证或承付书（LoU），是国际贸易中采用的一种支付机制，旨在由信用良好的银行向货物出口商提供经济担保（见图 8-3）。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig3_HTML.jpg](img/474923_1_En_8_Fig3_HTML.jpg)


    图 8-3：信用证在各机构间生成的常规流程


    传统上，金融机构是中心化的信任源，因此产生了信用证的概念。然而，近来，即使有此类单据，也出现了违约案例，原因包括黑客能够入侵银行系统，或员工/合约第三方合作方进行人为干预，等等。


    这种中心化的信任无疑可以通过更安全的区块链实践得到扩展。当银行委托并将数字系统的开发外包给某公司时，如果基于区块链，则可以维持关于该公司参与的信任和透明度。许多人可能不认同这种透明度能带来更好的实践。因此，在为贸易金融链设计区块链时，可以选择区块链的类型及其活动。


    然而，有一项安全要素是有保障的：黑客入侵中心化服务器的计算强度远低于入侵整个去中心化的区块链网络。因此，采用区块链并非直接要求移除中介机构。很多时候，区块链能够促进更透明、更可信的实践。


    现在设计思路已确立，我们来剖析信用证贸易金融中的区块链用例。首先，在列出的贸易参与者中，谁负责启动其他参与者的加入流程？为什么有人会同意加入一个透明的区块链账本？有多少企业仍然回避建立在线业务？


    因此，设计的第一个挑战是**加入机制**。


    由于银行或金融机构被大多数贸易参与者视为可信来源，从银行开始实施加入流程在逻辑上可能更容易。然而，这并非硬性规定。可以按行业启动加入流程；例如，可以从农民和消费者的加入开始，然后逐步引入其他参与者。因此，基于业务交易中涉及的参与者，去中心化平台可以选择相应的加入机制。


    加入机制需考虑要点：


    -   加入是否需要达成共识？

    -   加入的用户与加入的节点是同一概念吗？

    -   成员加入需要哪些先决条件？

    -   初始加入后，谁有权添加新成员？


    上述所有问题的答案完全取决于链的业务、挑战和目的。在我们这个孤立的案例中，我们允许金融机构添加一组初始成员。成员可以进一步添加满足链上共识条件的其他贸易参与者。每个用户都是一个节点，从而实现真正端到端的去中心化。


    # 第二个挑战


    一旦选定了加入机制，但在成员加入之前，解决方案架构师需要确保所有活动/交易都遵循在加入前已定义的通用共识规则。例如，只有当一组智能合约规则得到验证后，定义的活动才能发生；或者可以采用权益证明机制，由大多数利益相关者决定执行或拒绝某项活动。在公私链联盟中，区块链中可以存在多种共识形式，每种形式分别适用于私有链或公有链。


    因此，设计的第二个挑战是**共识机制的选择**。


    形成区块链的原始原因之一是可信度；因此，共识机制需要确保贸易参与者的可信度能够在链上被透明地跟踪和维护。可以在本书定义共识机制的相关章节中识别需考虑的要点，或者也可以开发自己的机制。


    针对当前用例，我们选择了工作量证明与权益证明相结合的方式，并辅以创造可信度价值的智能合约条件，从而管理整体的贸易信任。


    一旦在区块链中定义了共识，就可以开始向私有/公有区块链联盟导入成员。公有链可以托管所有进行交易或参与交易的同类节点。私有链则可以在交易启动时临时形成或同步，并且只包括那些特定的贸易参与者。


    # 第三个挑战


    在导入成员期间，根据设计方案，可能需要进行了解你的客户（KYC）以及同类节点验证。这类似于亲友推荐或银行验证。


    贸易参与者完成导入后，必须为其分配将在链上承担的角色。


    设计的第三个挑战是**向节点分配角色**。


    在区块链中需要分配的角色，如图 8-4 所示，可能包括：


    - **客户端节点** – 在链上需要某项服务时加入的最终用户。在我们的当前用例中，是进口商和出口商（即买方和卖方）。


    - **对等节点** – 最终用户与之打交道的银行需要永久在链上。开证行和指定银行的分支机构可被指定为对等节点。某些对等节点可以充当背书节点。例如，开证行为出口商的可信度背书、发起交易并维护其可信度状态。


    - **排序节点** – 这些节点是交易的传递者，进行无偏见的验证，以确保交易活动以容错方式交付。因此，根据设计，架构师需要确保对等节点与排序节点的比例适当，以避免偏见失衡。


    此外，CA（证书颁发机构）节点可以作为这些角色的授权者，并分配与这些角色相关的权限。CA 通过权益证明形成此授权共识，以维护许可账本机制。


    另外，如果需要，客户端节点的 KYC 可以是一个独立的、具有身份证明共识的区块链。这同样取决于平台提供商的关注点。否则，CA 节点可以确保导入验证。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig4_HTML.png](img/474923_1_En_8_Fig4_HTML.png)


    图 8-4：向导入的成员分配角色

