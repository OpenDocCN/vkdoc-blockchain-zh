    #### Federated Byzantine Agreement (FBA)


    Remember: John is not always online to be involved in all activities for the farm.
    However, the group wants to ensure fair decisions that are transparent and agreeable
    to the chain node members. John, being a major stakeholder, becomes a bottleneck
    validator in the case of other mechanisms of consensus. FBA provides a fault-tolerant
