- fmt: "# 2. Decoding a Real-Life Blockchain\n\nThis chapter sets the stage to unfold\
    \ various elements of blockchains throughout the book.\n\nLet these flash cards\
    \ (in Figure [2-1](#474923_1_En_2_Chapter.xhtml#Fig1)) circulate around in your\
    \ head, and we will see how real-world applications bind them to a successful\
    \ blockchain implementation.\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig1_HTML.png](Images/474923_1_En_2_Fig1_HTML.png)\n\
    \nFigure 2-1\n\nFlash cards for aspects of blockchains\n\nThese flash cards are\
    \ arranged top to bottom in the sequence in which they are to be considered when\
    \ building a blockchain.\n\nFor this chapter, the real-life blockchain platform\
    \ making literal waves across the ocean is **BBChain**—**Blackbox on Blockchains**,\
    \ which brings a very interesting use case for blockchains from which we can learn.\
    \ We will decode each element of the blockchain and see how it is embedded into\
    \ the platform, changing the way maritime data moves across the globe. Highlights\
    \ of this chapter are as follows:\n\n- Purpose and principle behind the blockchain—consensus\
    \ and protocols\n- Transforming a centralized platform into a decentralized blockchain—shared\
    \ ledgers\n- Securing data throughout the chain—encryption\n- Valuing the chain\
    \ and its utility to stakeholders—tokens\n- The end picture—decentralized applications\
    \ (DApps)\n- Setting up blockchain environments on Azure\n\n## Consensus and Protocols\n\
    \nEvery decade, several ships on the ocean and aircraft in the expanse of the\
    \ sky disappear. Lives are lost, and no traces are left to be found.\n\nThese\
    \ lives count, and so does the data related to these accidents. Therefore, `BBChain`\
    \ attempts to handle the voyage data recorder (VDR) data over blockchains through\
    \ decentralization. The conventional black boxes or VDRs on the ships record all\
    \ the goings on onboard the ship. However, it sinks with the lost ship, nowhere\
    \ to be found in some cases.\n\nWhile several technologies came and went over\
    \ the decades, the latest era of technologists formulated to store VDR data on\
    \ the cloud. VDR providers would sync the box data to a centralized cloud server,\
    \ to which the black box would transmit at various time intervals.\n\nBy revolutionizing\
    \ the black box with `BBChain`'s protocol that uses blockchains, we will learn\
    \ how consensus plays a very important role in enhancing the credibility of the\
    \ black box (Figure [2-2](#474923_1_En_2_Chapter.xhtml#Fig2)).\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig2_HTML.jpg](Images/474923_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2\n\nIllustration of the BBChain public ledger\n\nAs seen in Figure\
    \ [2-2](#474923_1_En_2_Chapter.xhtml#Fig2), the main stakeholders involved in\
    \ the shipping trade include the following:\n\n- **Blackbox on Blockchain as Node\
    \ (IoT device)**: This device enters all on-ship measurements, sensory data, and\
    \ travel data in real-time to the blockchain node syncing with the entire network.\n\
    - **Ship Owners**: These users are able to transparently see the real-time situation\
    \ of the ship and can keep tabs.\n- **Manufacturer**: Ship manufacturers maintain\
    \ service contracts for the ship for years. Being on the chain lets them be in\
    \ the loop of the nautical miles traveled and required maintenance done.\n- **Insurance\
    \ Companies**: During audits, insurance companies require the complete audit trail\
    \ of records of the state of the ship throughout its history. Connecting on-chain\
    \ enables immutable records.\n- **Ship Brokers**: On-chain history provides credibility\
    \ for ship brokers to recommend ships.\n- **Port and Flag State**: Port state\
    \ is the location where the vessel/ship enters the water, whereas the flag state\
    \ is where the ship is registered. These records can be onboarded credibly by\
    \ these entities on the chain.\n- **Classification Societies**: Organization that\
    \ establishes and maintains technical standards for the construction and operation\
    \ of ships and offshore structures.\n- **Vetting Bodies**: These organizations\
    \ evaluate the ship’s structural integrity and performance, and perform audits\
    \ and quality checks to form a standardized grading system.\n\nThe chain of all\
    \ these stakeholders of the maritime industry forms the nodes of the blockchain\
    \ for the public ledger. For any change made to this public ledger, all stakeholders\
    \ must be in consensus given the pre-defined protocol of that blockchain. Currently,\
    \ the interaction of these stakeholders is entirely paper based—or is transitioning\
    \ to being cloud based with digital documents.\n\nBefore we dive into the form\
    \ of consensus used by `BBChain`, let us review what consensus means in simple\
    \ terms:\n\n> *Consensus—A generally accepted opinion or decision among a group\
    \ of people*  \n> —Cambridge Dictionary\n\nThe core of any blockchain lies in\
    \ its consensus. On a blockchain, a group of nodes (servers/peer instances representing\
    \ users) participating in the chain reaches an agreement on a base principle that\
    \ is coded into a set of rules for every single piece of data or state across\
    \ the network. This is achieved through a distributed process across all nodes.\
    \ Every blockchain may or may not be governed by different consensus mechanisms.\n\
    \nFor example, Bitcoin and Ethereum work on the proof of work consensus mechanism.\
    \ Every time a block equation is solved (work), tokens are awarded to the individuals\
    \ validating the transaction."
