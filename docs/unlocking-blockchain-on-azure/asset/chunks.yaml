    ### 有向无环图 (Directed Acyclic Graphs, DAG)


    在比特币和以太坊区块链中观察到的传统共识形式中，随着其受欢迎程度和采用率的提高，可扩展性和延迟时间日益成为人们关注的焦点。因此，有向无环图（一种著名的图数据结构）可以提供一种通用共识策略的方法，以无环、低延迟、非挖矿依赖、修剪过的轻量级事务方式维护链上的共享账本。


    一些区块链根据链上活动生成不同变体的 DAG。例如，如果在链上有 25 家零售商在不同的领域销售不同的商品，且拥有完全独特的客户资料，那么区块链账本可以是一个
    DAG，其中每个零售商的每笔交易条目都独立于其他零售商。这可以看作是运行在独立环境中的侧链活动。然而，数据需要防篡改，并锁定在去中心化链上。


    #### 链上活动 (Activities on-chain)：


    - •

    - •

    - •

    - •

    - •


    #### 优势 (Advantages)：


    - •

    - •

    - •

    - •

    - •


    #### 局限性 (Limitations)：


    - •

    - •

    - •

    - •

    - •


    ### 联邦拜占庭协议 (Federated Byzantine Agreement, FBA)


    请记住：John 并非总是在线参与农场的所有活动。然而，该团体希望确保决策公平、透明，并且得到链节点成员的认可。John 作为主要利益相关者，在其他共识机制下成为了验证的瓶颈。FBA
    提供了一种容错方法来验证链上交易。请识别需要此类机制的活动。


    #### 链上活动 (Activities on-chain)：


