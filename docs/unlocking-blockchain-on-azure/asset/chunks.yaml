  trans: "\n### 第四阶段：区块链\n\n至此，我们现在已经准备好让点对点网络中的每个用户都能通过区块链来了解、参与并处理这样一个安全网络上的事务。所以现在，如果你发现自己通过区块链购买蔬菜，区块链能让你了解以下信息：\n\
    \n- 蔬菜是如何生长的\n- 完整的产地溯源\n- 哪个分销商包装了它\n- 谁运输了它\n- 谁从中获得了报酬\n\n关于这种可能在任何电商网站上发生的活动，可能会产生以下问题：\n\
    \n- 我为什么想知道这些？\n- 为什么电商网站不能直接说明这些事实？\n- 只要我收到货，我何必在意谁得到了付款？\n\n这些问题的答案，在于对以下几点完全无法控制的挫败感：\n\
    \n- 所交付的质量（他们说有些植物是靠污水种植的）\n- 电商平台可能会篡改事实或美化信息\n- 可能使用的有害有毒包装\n- 低效的供应链交易导致价格上涨\n\
    - 运输有时会出现异常\n- 付款会由你的信用卡公司提前扣除，有时无法到达零售商手中（这在早期在线支付时经常发生）。\n\n区块链能够实现：\n\n- 来自真实最终用户数据的完全透明性与完整可信度\n\
    - 通过点对点网络实现真正的验证，作为一种去中心化的权威形式\n- 由所有人形成并接受的成熟的共识与策略网络\n- 共享账本上防篡改的数据，并支持公有链和私有链选项\n\
    - 真正不可篡改的事实来源\n- 针对机密数据的高度安全端到端加密，并在需要时保持匿名性\n- 共同开发、接受、强制实施和执行的自动化合约\n- 更清晰的量化价值形式，可以在没有强制中心化中介的情况下进行交易。\n\
    \n让我们再看一个现实生活中的例子，了解我们的人际交互数字网络需要如何成熟才能提高生活质量：建筑施工。\n\n房主们投入了价值数百万美元毕生积蓄，以便拥有一个像样的居所和一项能带来长期回报的房地产。那么，当你买房时，你会采取哪些步骤？\n\
    \n1. 搜索合适的地点。\n2. 预算内的户型配置。\n3. 理想的结构设计。\n4. 可靠或值得信赖的品牌建筑商。\n5. 建造质量好、强度高的建筑师。\n\
    6. 提供最佳原材料的供应商。\n7. 按要求建造的房屋开发商。\n\n所有这些步骤都依赖于基于这些专业人士过往经验建立起来的信任。现在，想象一下，如果这种寻找房产的整个手动筛选过程被搬上区块链。它将使购房者能够了解并参与以下事项：\n\
    \n- 水泥和其他原材料来自何处？\n- 建筑师毕业于哪所大学？他是否有资质设计所需结构？\n- 建筑商拥有哪些许可证？\n- 你真正打交道的真的是土地所有者吗？\n\
    - 所有文件是否都来自真实来源？\n- 提供一份将由点对点网络见证的数字签名\n\n上述所有问题背后的信息，都是从不同的点对点网络中提取出来的，这些网络托管着特定信息，并在区块链场景中直接提供给潜在购房者。请将这与传统的对房屋开发商或建筑商的单点信任模式进行比较。\n\
    \n这是从个人用户的角度来看的。然而，在设想这样一个透明开放网络的好处时，用户常常担心将所有信息都数字化地公之于众。这种担忧可以通过公有链和私有链的区块链变体来解决。该网络通常是一个联盟链或公有链与私有链的混合网络。在这样的网络中，节点被有选择地添加到私有网络中，而公有链网络则向更广泛的受众开放，处理通用信息。\n\
    \n因此，在电商区块链网络中，设计区块链时可以考虑以下几个方面：\n\n- 私有区块链可以私下处理交易，包括购买了什么、谁购买了等信息，这些信息可以直接在相关方之间传输。\n\
    \  1. 私有区块链中的节点仍然可以根据预先约定的共识，允许/验证加密数据包的传输。\n  2. 私有详情通过公钥进行端到端加密，并使用私钥解密。密钥管理可以有多种配置，如第`3`章“加密”中所述。\n\
    \  3. 在转售的情况下，可以将新买家添加到这个私有链中，以追溯购买历史、文档的真实来源以及数字轨迹。\n\n- 公有区块链可以像中心化平台一样，拥有产品的通用列表。\n\
    \  1. 然而，这些数据是不可变或防篡改的。\n  2. 所有状态和转换将永久成为公有链的一部分。\n  3. 来源的验证可由现有节点通过共同的原则（共识）进行核实。\n\
    \  4. 产品供应商的加入可以直接在链上完成，无需中心化机构批准，但必须由一个节点群体验证其加入。\n  5. 对于产品供应商的任何信息变更，所有节点或大多数节点必须同意并接受，以确保节点网络中的所有副本包含相同的信息。\n\
    \n类似地，对于购房者来说，以下交易适合公有链和私有链：\n\n| 公有链 | 私有链 |\n| --- | --- |\n| 开发商产品和服务列表记录 |\
    \ 购买报价 |\n| 过往开发记录 | 交易成交 |\n| 过往客户评价和体验 | 协议的数字签名 |\n| 建筑师作品集列表 | 条款智能合约 |\n\
    | 原材料来源 | 买/卖/转售 |\n| 土地历史 | 抵押贷款（如有） |\n| 许可证和证书 |  |\n| 交付状态和完工率 |  |\n\n请记住：所有这些总是可以在中心化平台上完成。解决导致不信任问题的方法有很多种。然而，这些平台并不透明。它们不让你接触信息的真实来源。它们不让信息源直接触达你。这是否意味着中介就要失业了？\n\
    \n不，他们获得了一条更开放的途径，可以更透明地将人们与全球公平市场连接起来。\n\n既然我们已经回顾了区块链的变体及其实际影响，接下来让我们研究一下在使用它们时需要理解的关键术语。\n"
- fmt: '# Blockchain Terminology


    Technical definition of blockchain:


    - A blockchain can be defined as an append-only list of blocks that are stored
    in a decentralized form of storage across a peer-to-peer network and encrypted
    using cryptography, and that exist under a common principal of agreement whereby
    the network majority verifies the transactions on the chain.


    The definitions of jargonistic words are broken down as follows:


    | Jargon | Simple words |

    | --- | --- |

    | Append-only | Adds every single state of the record. Once added, cannot be removed.
    |

    | Blocks | Records of transaction information that is encrypted into a hash and
    encoded into a Merkle tree. |

    | Hash | A hash is a function that converts an input of letters and numbers into
    an encrypted output of a fixed length. |

    | Encrypt | To convert (information or data) into a code, especially to prevent
    unauthorized access. |

    | Cryptography | Study of techniques for secure communication in the presence
    of third parties. |

    | Consensus | A common form of agreement by all/majority. |

    | Distributed | Not stored in a single or centralized source, making it less vulnerable
    for crackers/hackers. |

    | Trust | A computationally developed method of reliability. |

    | Merkle tree | A form of data structure that ensures blocks are verifiable efficiently
    and securely. |


    Here is what really happens:


    1. A piece of data is broken down into hashed blocks.

    2. A network is formed by several devices (peers) connected in a chain form.

    3. The network forms a general rule of common consensus.

    4. Consensus can be of various types, such as one based on work that happened,
    ownership that is involved, or various voting mechanisms that are commonly agreed
    upon.

    5. Blocks of data are transferred to this network such that all devices get updated
    with the information upon approval by a network majority consensus based on the
    rule.

    6. Once transferred, this block cannot be independently tampered with by anyone
    unless all blocks are updated with a new change, which will be an additional block
    of data.

    7. The existing block does not change at any cost.

    8. The energy spent in this transfer, validation, and storage is the true value
    cost of the transaction.


    This illustration varies in several ways based on the vision of the blockchain
    and the purpose it wishes to serve its users. For example, if the blockchain is
    for verifying identities, then the method of consensus will vary along with the
    treatment of data and the process of operation involved.


    However, the foundation of decentralization remains constant. The other variables’
    ratios vary based on the peer configurations. In the coming chapters, you will
    see the variants of blockchains that result from varying parameters of consensus,
    storage, cryptography types, and so forth.


    # How Does a Blockchain Work?


    Now that we have learned what blockchains are, let us examine how they work for
    you in the big picture.


    Even in today’s digital age, a lot of corporations struggle to connect stakeholders
    and processes across different departments and geographies. Hence, there is an
    urge to link these isolated processes and have a single source of truth. For example,
    the accounts department might have its own system for calculating the expenses
    of each branch location, which might not always resonate with the expenses reported
    by the administration department. However, there are governance processes and
    checks and balances in place to take care of this problem, but it entails a lot
    of manual effort and audits. If the same system were to be on a blockchain, all
    the stakeholders would be getting the same value of branch expenses. This would
    happen because the consensus policies ensure the credibility of any data added
    by the users. From a small time business to a multinational organization, a process
    if put on blockchain would showcase the online presence of all data generated
    in a process. The awareness of this entire network is the key to optimizing and
    leveraging the process flows better, thereby enabling trust. If you understand
    your network and ecosystem, figuring out the sweet spot of business operations
    is a cake walk. For instance, figuring out supply and demand ensures low inventory
    costs and low out-of-stock costs. Similarly, digitally understanding your network
    opens up a whole new understanding of trade, in several ways pro-actively.


    In a multi-tier network architecture, in situations where 10,000 subscribers are
    hitting the servers at once, the demand is channeled and distributed into different
    logical queues to serve back information. In the case of a single-server client
    network, this situation would have required scaling the server to accommodate
    such a user base.


    With a peer-to-peer network, not only is the load distributed throughout the chain,
    but also the security is decentralized throughout. The validation is not just
    for one to decide or approve, but for the network majority to decide.


    Next, we cover blockchains in different ecosystems.


    ## As an Individual


    Imagine being a business owner with a few clients who don’t pay on time. Smart
    contracts trigger automatically to enforce pre-agreed conditions. So, if you locked
    your clients into a smart contract that has a clause that charges 2 percent interest
    for every month of delay, the invoice’s value gets updated on the ledger upon
    every delay. The value of the amount owed by the client increases. Likewise, the
    client is empowered to expect timely delivery on such a smart contract. If the
    delivery is not met, the client can have a pre-defined program that penalizes
    the business owner 2 percent for the delayed month. This smart contract is undeniable
    due to the chain of validators ensuring its execution and enforcement.


    ## In an Office Department


    Imagine you head a team of 25 people in the Quality Check of Assembly for an Engineering
    Product. This department works on the functional processes such as:


    1. Visual check of Assembly

    2. Aggregation of defective images of the assembly

    3. Annotations of the Defects in the image & identification of the type of defect

    4. Diagnosis for the defect

    5. Identification of the stakeholder for the recommended diagnostic

    6. Getting it fixed

    7. Updating Assembly with fix

    8. Final check to close case


    As the head of the department, you ensure the assembly of the Engineering Product
    goes through perfectly with no defects. Each functional process mentioned is handled
    by different stakeholder in your department. Now traditionally, this record of
    who does what is known to you & can be stored in a standard ERP.


    Consider a scenario where a major fault was detected by your customer leading
    to heavy losses & the insurer is investigating over the point of failure.


    Based on the ERP, record, the last quality check was approved by you based on
    the working documents produced by your team. This ERP may be tampered thereby
    endangering credibility of information.


    Hence the Blockchain here stores the trace of work in a manner that no data can
    be tampered, thereby maintaining credibility of information & security.


    ## In a Company Across Branches


    Imagine a company with branches across the country and people scattered all over.
    The strategy head has to wait for reports to be aggregated from all zonal managers.
    All zonal managers have to reach out to regional heads. All regional heads have
    to extract data from local offices. This set of actions is every large-scale company’s
    nightmare. Sure, there are SAPs, ERPs, and several types of software for it. But
    how many times have these data points been tampered with, tweaked, and modified
    on their way to the top? It is highly questionable.'
  raw: '## Blockchain Terminology


    Technical definition of blockchain:


    *   A blockchain can be defined as an append-only list of blocks that are stored
    in a decentralized form of storage across a peer-to-peer network and encrypted
    using cryptography, and that exist under a common principal of agreement whereby
    the network majority verifies the transactions on the chain.


    The definitions of jargonistic words are broken down as follows:


    | Jargon | Simple words |

    | --- | --- |

    | **Append-only** | Adds every single state of the record. Once added, cannot
    be removed. |

    | **Blocks** | Records of transaction information that is encrypted into a hash
    and encoded into a Merkle tree. |

    | **Hash** | A **hash** is a function that converts an input of letters and numbers
    into an encrypted output of a fixed length. |

    | **Encrypt** | To convert (information or data) into a code, especially to prevent
    unauthorized access |

    | **Cryptography** | Study of techniques for secure communication in the presence
    of third parties |

    | **Consensus** | A common form of agreement by all/majority |

    | **Distributed** | Not stored in a single or centralized source, making it less
    vulnerable for crackers/hackers |

    | **Trust** | A computationally developed method of reliability |

    | **Merkle tree** | A form of data structure that ensures blocks are verifiable
    efficiently and securely |


    Here is what really happens:


    1.  A piece of data is broken down into hashed blocks.


    2.  A network is formed by several devices (peers) connected in a chain form.


    3.  The network forms a general rule of common consensus.


    4.  Consensus can be of various types, such as one based on work that happened,
    ownership that is involved, or various voting mechanisms that are commonly agreed
    upon.


    5.  Blocks of data are transferred to this network such that all devices get updated
    with the information upon approval by a network majority consensus based on the
    rule.


    6.  Once transferred, this block cannot be independently tampered with by anyone
    unless all blocks are updated with a new change, which will be an additional block
    of data.


    7.  The existing block does not change at any cost.


    8.  The energy spent in this transfer, validation, and storage is the true value
    cost of the transaction.


    This illustration varies in several ways based on the vision of the blockchain
    and the purpose it wishes to serve its users. For example, if the blockchain is
    for verifying identities, then the method of consensus will vary along with the
    treatment of data and the process of operation involved.


    However, the foundation of decentralization remains constant. The other variables’
    ratios vary based on the peer configurations. In the coming chapters, you will
    see the variants of blockchains that result from varying parameters of consensus,
    storage, cryptography types, and so forth.


    ## How Does a Blockchain Work?


    Now that we have learned what blockchains are, let us examine how they work for
    you in the big picture.


    Even in today’s digital age, a lot of corporations struggle to connect stakeholders
    and processes across different departments and geographies. Hence, there is an
    urge to link these isolated processes and have a single source of truth. For example,
    the accounts department might have its own system for calculating the expenses
    of each branch location, which might not always resonate with the expenses reported
    by the administration department. However, there are governance processes and
    checks and balances in place to take care of this problem, but it entails a lot
    of manual effort and audits. If the same system were to be on a blockchain, all
    the stakeholders would be getting the same value of branch expenses. This would
    happen because the consensus policies ensure the credibility of any data added
    by the users. From a small time business to a multinational organization, a process
    if put on blockchain would showcase the online presence of all data generated
    in a process. The awareness of this entire network is the key to optimizing and
    leveraging the process flows better, thereby enabling trust. If you understand
    your network and ecosystem, figuring out the sweet spot of business operations
    is a cake walk. For instance, figuring out supply and demand ensures low inventory
    costs and low out-of-stock costs. Similarly, digitally understanding your network
    opens up a whole new understanding of trade, in several ways pro-actively.


    In a multi-tier network architecture, in situations where 10,000 subscribers are
    hitting the servers at once, the demand is channeled and distributed into different
    logical queues to serve back information. In the case of a single-server client
    network, this situation would have required scaling the server to accommodate
    such a user base.


    With a peer-to-peer network, not only is the load distributed throughout the chain,
    but also the security is decentralized throughout. The validation is not just
    for one to decide or approve, but for the network majority to decide.


    Next, we cover blockchains in different ecosystems.


    ### As an Individual


    Imagine being a business owner with a few clients who don’t pay on time. Smart
    contracts trigger automatically to enforce pre-agreed conditions. So, if you locked
    your clients into a smart contract that has a clause that charges 2 percent interest
    for every month of delay, the invoice’s value gets updated on the ledger upon
    every delay. The value of the amount owed by the client increases. Likewise, the
    client is empowered to expect timely delivery on such a smart contract. If the
    delivery is not met, the client can have a pre-defined program that penalizes
    the business owner 2 percent for the delayed month. This smart contract is undeniable
    due to the chain of validators ensuring its execution and enforcement.


    ### In an Office Department


    Imagine you head a team of 25 people in the Quality Check of Assembly for an Engineering
    Product. This department works on the functional processes such as:


    1.  Visual check of Assembly


    2.  Aggregation of defective images of the assembly


    3.  Annotations of the Defects in the image & identification of the type of defect


    4.  Diagnosis for the defect


    5.  Identification of the stakeholder for the recommended diagnostic


    6.  Getting it fixed


    7.  Updating Assembly with fix


    8.  Final check to close case


    As the head of the department, you ensure the assembly of the Engineering Product
    goes through perfectly with no defects. Each functional process mentioned is handled
    by different stakeholder in your department. Now traditionally, this record of
    who does what is known to you & can be stored in a standard ERP.


    Consider a scenario where a major fault was detected by your customer leading
    to heavy losses & the insurer is investigating over the point of failure.


    Based on the ERP, record, the last quality check was approved by you based on
    the working documents produced by your team. This ERP may be tampered thereby
    endangering credibility of information.


    Hence the Blockchain here stores the trace of work in a manner that no data can
    be tampered, thereby maintaining credibility of information & security.


    ### In a Company Across Branches


    Imagine a company with branches across the country and people scattered all over.
    The strategy head has to wait for reports to be aggregated from all zonal managers.
    All zonal managers have to reach out to regional heads. All regional heads have
    to extract data from local offices. This set of actions is every large-scale company’s
    nightmare. Sure, there are SAPs, ERPs, and several types of software for it. But
    how many times have these data points been tampered with, tweaked, and modified
    on their way to the top? It is highly questionable.'
  trans: '

    # 区块链术语


    区块链的技术定义：


    - 区块链可定义为一种仅可追加的区块列表，这些区块以去中心化存储形式分布于点对点网络中，并通过密码学进行加密，且遵循共同协议原则——由网络中的多数节点验证链上的交易。


    以下是对专业术语的通俗解释：


    | 专业术语 | 通俗说法 |

    | --- | --- |

    | 仅可追加 | 记录每一次状态变更。一旦添加，不可删除。 |

    | 区块 | 交易信息的记录，这些信息被加密为哈希值并编码成默克尔树。 |

    | 哈希 | 一种函数，将字母和数字组成的输入转换为固定长度的加密输出。 |

    | 加密 | 将（信息或数据）转换为代码，尤其用于防止未经授权的访问。 |

    | 密码学 | 研究在第三方存在的情况下实现安全通信的技术学科。 |

    | 共识 | 全体或多数达成的一致意见形式。 |

    | 分布式 | 不存储在单一或中心化来源中，从而降低被黑客攻击的风险。 |

    | 信任 | 一种通过计算方式建立的可靠性方法。 |

    | 默克尔树 | 一种数据结构形式，确保区块能够高效且安全地被验证。 |


    以下是实际运作流程：


    1.  一条数据被分解为经过哈希处理的区块。

    2.  多个设备（节点）以链式连接形成网络。

    3.  该网络形成一套通用的共识规则。

    4.  共识有多种类型，例如基于已完成的工作、涉及的归属权，或共同商定的各种投票机制。

    5.  数据区块被传输到该网络，当网络根据规则达成多数共识批准后，所有设备的信息都会同步更新。

    6.  一旦传输完成，除非所有区块都随新变更（即一个新增的数据区块）更新，否则任何一方都无法单独篡改该区块。

    7.  现有区块在任何情况下都不会改变。

    8.  在此传输、验证和存储过程中消耗的能量，就是交易的真实价值成本。


    上述说明会根据区块链的愿景及其服务用户的目的而有所不同。例如，如果区块链用于验证身份，那么共识方法以及对数据的处理和操作流程都会随之变化。


    然而，去中心化的基础保持不变。其他变量的比例则根据节点配置而变化。在接下来的章节中，您将看到因共识、存储、密码学类型等参数不同而产生的各种区块链变体。


    # 区块链是如何工作的？


    现在我们已经了解了什么是区块链，让我们从宏观角度看看它们是如何为您工作的。


    即便在当今的数字时代，许多企业仍在努力连接不同部门和地区的利益相关者与流程。因此，存在着一种将孤立流程联系起来并建立单一事实来源的迫切需求。例如，财务部门可能有自己计算各分支地点开支的系统，而这未必与行政部门报告的开支相符。尽管有治理流程和制衡机制来解决这个问题，但这需要大量的手动工作和审计。如果采用相同的区块链系统，所有利益相关者都将获得相同的分支开支数值。这是因为共识策略确保了用户添加的任何数据的可信度。从一个小型企业到跨国公司，任何流程如果部署在区块链上，都将展示该流程中产生的所有数据的在线状态。对整个网络的认知是优化和更好地利用流程流的关键，从而建立信任。如果您了解自己的网络和生态系统，找到业务运营的最佳平衡点就像“小菜一碟”。例如，掌握供需关系可以确保低库存成本和低缺货成本。同样，数字化地理解您的网络，能够以多种主动方式开辟对贸易的全新认识。


    在多层级网络架构中，当有 10,000 名用户同时访问服务器时，需求会被引导并分配到不同的逻辑队列中以提供信息反馈。而对于单一服务器的客户端网络，这种情况则需要扩展服务器来容纳如此庞大的用户群。


    有了点对点网络，不仅负载分布在整个链上，而且安全性也是去中心化的。验证并非由单一方决定或批准，而是由网络中的多数节点来决定。


    接下来，我们将探讨不同生态系统中的区块链。


    ## 对于个人而言


    想象一下，您是一位企业主，有些客户总是不按时付款。智能合约会自动触发执行预先商定的条件。因此，如果您将客户锁定在一个智能合约中，该合约包含一条“每延误一个月收取
    2%利息”的条款，那么每次延误时，发票的价值都会在账本上更新，客户所欠的金额就会增加。同样，客户也有权期待在此类智能合约下按时交货。如果未能按时交付，客户可以通过预设的程序对企业主处以延迟月份
    2%的罚款。由于有验证者链确保其执行和强制力，该智能合约是不可否认的。


    ## 在办公室部门内


    想象一下，您负责一个工程产品装配质量检查的 25 人团队。该部门负责以下功能流程：


    1.  装配目视检查

    2.  收集装配缺陷图像

    3.  标注图像中的缺陷并识别缺陷类型

    4.  缺陷诊断

    5.  确定推荐诊断方案的责任人

    6.  修复缺陷

    7.  更新装配记录

    8.  最终检查并结案


    作为部门主管，您需要确保工程产品的装配完美无瑕。上述每个功能流程都由您部门内不同的相关人员处理。传统上，这个谁做了什么事的记录只有您知道，并且可以存储在标准的
    ERP（企业资源计划）系统中。


    设想一个场景：您的客户发现了一个重大故障，导致巨额损失，保险公司正在调查故障点。


    根据 ERP 系统记录，最后一次质量检查是基于您团队提交的工作文件由您批准的。这个 ERP 系统可能被篡改，从而危及信息的可信度。


    因此，区块链在此处的作用是以一种数据不可篡改的方式存储工作痕迹，从而维护信息的可信度与安全性。


    ## 在跨分公司公司内


    想象一家在全国设有分公司且员工分布各地的公司。战略主管必须等待所有区域经理汇总报告。所有区域经理必须联系地区负责人。所有地区负责人都必须从各地方办事处提取数据。这一系列操作是每家大型公司的噩梦。诚然，有
    SAP（企业管理解决方案）、ERP（企业资源计划）以及多种软件来处理此事。但数据在层层上报的过程中，有多少次被篡改、调整和修改过呢？这非常值得怀疑。

