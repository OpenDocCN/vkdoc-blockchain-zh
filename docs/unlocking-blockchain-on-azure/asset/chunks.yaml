- fmt: "### Stage 4: Blockchain\n\nWith this, we are now ready to empower every user\
    \ in a peer-to-peer network to be aware of, engage with, and deal over such a\
    \ secure network through blockchains. So now, if you find yourself buying vegetables\
    \ over a blockchain, the blockchain allows you to know the following:\n\n- How\
    \ it grew\n- The entire traceability of where it came from\n- Which distributor\
    \ packaged it\n- Who shipped it\n- Who gets paid with it\n\nThe following questions\
    \ may arise regarding this activity that could take place over any e-commerce\
    \ website:\n\n- Why would I want to know?\n- Why can’t the e-commerce website\
    \ mention these facts?\n- Why do I care who gets paid as long as I receive it?\n\
    \nThe answers to this lie in the frustration of having zero control over the following:\n\
    \n- The quality that is delivered (they say some plants are grown by the drainage)\n\
    - The e-commerce platform may manipulate facts or glorify information.\n- The\
    \ harmful toxic packaging it may come in\n- An inefficient supply chain trade\
    \ makes it expensive\n- Shipping goes rogue at times\n- Payments are deducted\
    \ in advance by your card companies, and it sometimes does not reach the retailer\
    \ (used to happen in the early days of online payments).\n\nBlockchains enable\
    \ the following:\n\n- Full transparency with complete credibility of data from\
    \ real end user providing it\n- True validation with a network of peers as a decentralized\
    \ form of authority\n- A mature network of consensus and policies formed and accepted\
    \ by all\n- Tamper-proof data on a shared ledger with public and private chain\
    \ options\n- A true source of immutable truth\n- Highly secure end-to-end encryption\
    \ for confidential data with anonymity maintained wherever required\n- Automated\
    \ contracts that are mutually developed, accepted, enforced, and executed\n- A\
    \ clearer form of quantification of value that can be transacted with no enforced\
    \ centralized intermediary.\n\nLet’s look at one more example here of a real-life\
    \ situation where our digital networks of human interaction need to mature for\
    \ better quality of life: building construction.\n\nMillions of dollars’ worth\
    \ of life savings are heavily invested by homeowners so they can have a decent\
    \ form of shelter and a real estate property with the goal of achieving long-term\
    \ returns. So, when you buy a house, what steps do you take?\n\n1. Search locations\
    \ that are suitable.\n2. Configurations that are in budget\n3. Structures that\
    \ are desirable\n4. Builders that are reliable or brand-worthy\n5. Architects\
    \ who construct well and maintain quality and strength\n6. Suppliers who provide\
    \ the best raw materials\n7. Housing developers who construct it to the requirements\n\
    \nAll these steps rely on trust that is developed based on the past experiences\
    \ of these professionals. Now, imagine if this entire manual screening of hunting\
    \ for a property were taken onto a blockchain. It would allow the home buyers\
    \ to know and engage in the following:\n\n- Where did the cement and other raw\
    \ materials come from?\n- Which college did the architect go to, and is he authorized\
    \ for the desired structure?\n- Which licenses does the builder have?\n- Is it\
    \ really the landowner you are genuinely dealing with?\n- Are all documents genuine\
    \ from the true source?\n- Provide a digital signature that will be witnessed\
    \ by the peer network\n\nThe information behind all the questions above, is pulled\
    \ out from a different network of peers that would be hosting that particular\
    \ information and provided to prospective home buyers directly in a blockchain\
    \ scenario. Compare this to the traditional one-spot trust of the housing developers\
    \ or builders.\n\nThis is the perspective from the solo-user angle. However, while\
    \ visualizing the perks of such a transparent open-loop network, users often worry\
    \ about putting everything out there digitally. This worry is handled via the\
    \ blockchain variants of public and private blockchains. The network is usually\
    \ a consortium or a hybrid mesh of public and private blockchains. In such a network,\
    \ peers are selectively added on a private network, whereas a public blockchain\
    \ network opens itself up to a larger audience and handles general information.\n\
    \nSo, in an e-commerce blockchain network, the following aspects may be considered\
    \ while designing a blockchain:\n\n- The private blockchain could handle the transaction\
    \ privately, in terms of information about what was purchased and who purchased\
    \ it, all of which can be transferred between the involved parties directly.\n\
    \  1. The peers in the private blockchain could still allow/validate the transfer\
    \ of encrypted data packets based on the pre-agreed consensus.\n  2. The private\
    \ details are encrypted end-to-end with the public key and decrypted with the\
    \ private key. The key management can be of various configurations, as explained\
    \ in Chapter `[3](#474923_1_En_3_Chapter.xhtml)` under “Encryptions.”\n  3. In\
    \ case of a resell, the new buyer could be added to this very private chain to\
    \ trace the purchase history and the true source of the document and digital trail.\n\
    \n- The public blockchain could have a general listing of products, as on a centralized\
    \ platform.\n  1. However, this data is immutable or tamper-proof.\n  2. All states\
    \ and transitions will permanently be a part of the public blockchain.\n  3. The\
    \ validation of sources may be verified by existing peers by a common form of\
    \ principle (consensus).\n  4. The onboarding of product suppliers can be done\
    \ directly on the chain without a centralized authority approving it, but a group\
    \ of peers must validate the onboarding.\n  5. For any change of information by\
    \ the product supplier, all peers or most peers have to agree and accept so as\
    \ to have all copies of the peer network contain the same information.\n\nSimilarly,\
    \ for a home buyer, the following transactions are suited for public and private\
    \ blockchains:\n\n| Public Blockchains | Private Blockchains |\n| --- | --- |\n\
    | Listing records of developers’ products and services | Quotation for purchase\
    \ |\n| Past records of developments | Transaction of the deal |\n| Reviews and\
    \ experiences of past customers | Digital signature of agreement |\n| Listing\
    \ of architect’s portfolio | Smart contract over clauses |\n| Sources of raw material\
    \ | Buy/sell /resell |\n| Land history | Mortgages/loans, if any |\n| Licenses\
    \ and certificates |  |\n| Delivery status and completion rates |  |\n\nRemember:\
    \ all of these can always be done on a centralized platform. There are several\
    \ existing ways to solve problems that cause mistrust. However, these platforms\
    \ are not transparent. They don’t let you engage with the true source of information.\
    \ They don’t let the source reach you directly. Does that really mean that intermediaries\
    \ are out of business?\n\nNo, they are given a more open avenue to connect people\
    \ more transparently to a fair market across the globe.\n\nNow that we’ve reviewed\
    \ the variants of blockchains and their actual impact, let’s examine the key terminology\
    \ that matters while working with them."
