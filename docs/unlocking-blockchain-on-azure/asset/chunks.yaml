  trans: '

    # 加密


    当我们登录银行门户网站或社保系统时，能感受到安全感和信任感；而在照片分享和社交媒体等开放平台上，数据的开放程度远高于个人的银行账户详情。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Figf_HTML.jpg](img/474923_1_En_2_Figf_HTML.jpg)
    小知识


    请找出你的社交媒体账户与数字银行账户在感知安全性方面的三大主要区别。


    那么，这与区块链中我们称之为透明、共享且安全的特性有何关联？如同存在多种用于社交媒体的在线应用和金融交易应用一样，区块链也有多种服务于不同目的的平台。在区块链中植入信任感的基本概念，是数据的端到端加密，使得不可篡改的数据只有在参与节点达成共识时才能被解密。在此，我们使用沙米尔秘密共享算法进行分布式拆分密钥管理。不同的区块链平台可以根据数据的关键性采用不同的密钥管理机制。在分布式账本上使用拆分密钥管理，使得黑客难以从外部攻破，除非链上利益相关者之间发生
    51%挖矿攻击（即多数节点/用户为欺诈节点）。


    最著名且最古老的区块链加密货币——比特币，是一种被称为电子现金的数字货币，其网络节点间的交易通过 `SHA256` 进行加密。每个区块都包含前一个区块的 `SHA256`
    加密哈希值，从而将其链接到前一个区块，区块链也因此得名。为了被网络中的其他节点接受，新区块必须包含工作量证明。矿工们依靠对大量输入计算“SHA256 哈希函数”，直到找到给定区块的临时数（nonce），然后才能将其添加到区块链中。


    在图 2-4 中，我们看到，对账本中的数据进行加密和分片处理，使得黑客或外部用户难以检索到任何相关信息。


    让我们回到社交媒体的话题，在那里，我们通过分享帖子、照片和个人观点，从朋友和家人的社交圈中获得关注。当这些数据被直接上传到服务器时，网络和服务器容易受到攻击，或者被其他已知或未知的未授权用户访问。这有时可能导致数据泄露，落入不法之徒手中。


    现在，想象一下将区块链用于社交媒体的场景。其功能是相同的，但数据的存储和管理方式却不同。在区块链上，用户的节点对数据进行加密并上传到账本。根据该链的共识机制，数据被代币化并分配给用户希望分享的利益相关者。任何节点或用户若要读取这些数据，必须解密存储于多个节点中的整个分布式数据序列，这使得数据高度安全，且破解需要更多的计算量。


    分布式账本中使用了多种加密技术。可以根据应用和区块链类型来决定采用哪种技术。


    `BBChain` 使用 `ED25519` 进行端到端加密，特别是在共享更机密数据的私有账本侧链中。在像 `BBChain` 这样的混合网络中，用户同时存在于私有账本和公共账本上，密钥共享机制被用于加密和解密在区块链上共享的数据。


    多种密码学机制，例如 SHA 2 系列、沙米尔秘密共享算法以及 `EdDSA` 技术，被广泛应用于区块链中。想象一下，一个熟悉设置密码的用户——我们如何让他们能够在区块链上安全地加密自己的数据？一种方法是在区块链上使用预定义的加密规则集，或者赋予他们选择自己加密技术集的能力。用技术术语来说，区块链上的用户可能是一个发送数据（以添加区块）的节点/服务器。因此，加密是在这个数据源服务器上通过其私钥设置的。链上用户可以使用公钥检索数据，并进一步使用私钥解密数据。此处提到的机制提供了这样的加密选项组合。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Figg_HTML.jpg](img/474923_1_En_2_Figg_HTML.jpg)
    挑战


    准备三个加密包，这些加密包可用于你的社交媒体数据，例如照片、帖子和位置信息。

    '
- fmt: '# Tokens


    Across centuries, nations, tribes, and humans in general have been attempting
    to quantify efforts to trade, be it the age-old barter systems or the modern era
    of financial transactions. The right quantification of time, space, and economies
    has been volatile throughout.


    Bitcoin utilizes the proof of work method, which helps to quantify the value of
    the token. The computing power to make one transaction across all nodes translates
    to the value of the Bitcoin by solving the equation. Thus, transacting in this
    digital currency has enabled trade over such cryptocurrencies.


    > *A cryptocurrency is a digital or virtual currency that uses cryptography for
    security.*

    >

    > —Investopedia


    Several blockchains have successfully quantified the value of the tokens through
    their ability to scale, operate, and impact in the form of security tokens or
    utility tokens.


    Security tokens are usually the famously listed ICOs, or cryptocurrencies, that
    receive investments through stakeholders that value the concept and operations
    of the decentralized blockchain platform.


    Utility tokens are the ones that are valued purely for their usage. The usage
    is quantified with the mechanism of the blockchain, like the value generated by
    proof of work, as explained earlier.


    With BBChain, the utility of the tokens generates the security value. The users
    of the chain transact with using this utility token on BBChain, to view, subscribe,
    and buy maritime ship data from other users.


    > *Now the question is, in the world of existing economies of different nations,
    how does one trust the so-called true value of the chain?*


    The value of the chain is decided based on the pre-designed nature of the chain,
    which is based on the consensus and its protocol.


    Let’s see how BBChain does it.


    BBChain Protocol encapsulates a blend of three consensus mechanisms; i.e., Federated
    Byzantine Agreement (FBA), proof of stake (POS), and proof of importance (POI).
    The public ledger is governed with FBA. The private ledger is regulated by the
    POS. POI governs universally across both public and private chains.


    Consider `N` nodes on the public ledger as `n1`, `n2`, `n3`, `n4` . . . `nN`.
    The movements on the blockchain are drawn with the validations from the quorum
    intersections for the public data for transactions and decisions, thus using the
    principle of FBA to form consensus on public ledger activities.


    Under the BBChain Protocol, data producers gain stakes in a private chain with
    the BBChain Genesis Node. Further, these data producers (ship owners, port owners,
    manufacturers) may subcontract their stakes to other users in this private side
    chain. Based on the smart contract, stakes are redistributed. While exchanging
    stakes, the value of the importance of every node and state is recalculated in
    the private as well as the public chain on the basis of the following:


    1. Stake value of the nodes at a given time in private ledgers

    2. Comparative/relative value of stake across all private ledgers

    3. All-time stake average throughout the year

    4. Threshold calculation of the vesting amount to become a stake owner

    5. Threshold calculation for a stake owner to initiate the side ledger

    6. Threshold calculations for anyone to join a side ledger

    7. Value of block and number of blocks

    8. Age of the block and size of group of blocks

    9. State of block (data traction and freshness)

    10. Total value of tokens in a chain and the minimum vested value on a node


    ## Data Flow Sequencing


    Since the prime element that moves across BBChain is the maritime data, let us
    understand the flow of data & the impacting factors based on the consensus algorithms
    & the transactions on chain as per the following sequence:


    1. On prioritizing transactions, states, and data across the chain, the value
    of importance is calculated on the preceding factors and will have calculated
    thresholds for every node to be able to perform some activities.

    2. This calculation takes precedence for data rendering mainly when we have high
    concurrency and data congestion in a limited node and hardware/network bandwidth
    scenario.

    3. Other actions, such as creating a side ledger, distributing data for subscriptions,
    and generating data requests for internal (highly private data), require the nodes
    to cross a certain value of importance to join the consensus (like joining a side
    ledger).

    4. Nodes with data that are obsolete (decided by the factor of age of block, e.g.,
    > 5 years, or highly redundant to no traction for a large set of data blocks)
    can be removed from the chain as a rule under the protocol, with an option to
    centralize and store.

    5. Nodes can raise a request from the public ledger to access that data, and high-importance
    nodes can perform consensus using the FBA mechanism to allow/validate the request.'
