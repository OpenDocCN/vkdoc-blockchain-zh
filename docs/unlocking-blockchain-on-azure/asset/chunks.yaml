    \ believe in them. That belief drove a lot of societal vision. This very belief\
    \ is digitized into consensus algorithms in blockchains. These consensus algorithms\
    \ are executed when there is agreement on a certain principle. This forms the\
    \ core of blockchains in all types of networks. Peers in the network, when in\
    \ consensus, allow transaction activity through the blockchain network. The forms\
    \ of consensus may vary based on the application and the level of criticality.\n\
    \nThe forms of consensus are based on the required methods of agreement that usually\
    \ occur in an offline scenario. For example, when a community decides that a certain\
    \ degree is required for a profession, it basically unknowingly validates this\
    \ offline agreement. For a real-life example, one may consider the role of an\
    \ architect. The people who form the civilization create a consensus of trust\
    \ that the person with the architecture degree can handle the structural designs\
    \ of buildings.\n\nNow that we have understood a real life consensus scenario,\
    \ Blockchain provides the infrastructure to digitize this very mutual agreement\
    \ on a software connected to all stakeholders participating in the process of\
    \ making a decision.\n\nTherefore, consensus algorithms form the most crucial\
    \ part of blockchains when transactions and contracts are actualized on a chain.\n\
    \nThink of the thought leadership that is evident in successfully liberated democracies.\
    \ The drivers of such leadership are the people and their belief networks. The\
    \ digital version of this is the consensus algorithm. In the world of blockchains,\
    \ various blockchains follow various forms of consensus based on the structure\
    \ of their network, the data on the chain, and the types of transaction activity.\n\
    \nOne such famous consensus algorithm, Proof of Work, is utilized by Bitcoin and\
    \ Ethereum. Several other mechanisms follow, such as the following:\n\n*   Proof\
    \ of Work\n    *   The peers that wish to engage in a transaction on the chain\
    \ are required to solve a complex problem, spending time and energy to solve it\
    \ and proving their interest to engage. The value of the spend is the processing\
    \ time.\n\n*   Proof of Stake\n    *   The voting mechanism here for block producers\
    \ to pass data on the chain requires the agreement of the stakeholder majority\
    \ based on the condition of the stake (wealth, age, seniority, etc.).\n\n*   Delegated\
    \ Proof of Stake\n    *   An implementation of technology-based democracy, using\
    \ voting and election processes to protect the blockchain from centralization\
    \ and malicious usage. Here, instead of the stakeholder, the voting rights are\
    \ delegated at random or are based on delegation so as to decentralize power.\n\
    \n*   Proof of Weight\n    *   The agreement on the chain is dependent on the\
    \ amount of tokens held by a peer and the probability of finding the next block\
    \ reward.\n\n*   Proof of Elapsed Time\n    *   This is used in private chains\
    \ when adding peers to the network. The agreement is reached over the time elapsed\
    \ to validate new peers’ onboarding based on dynamic snooze times.\n\n*   Proof\
    \ of Authority\n    *   Consensus agreement over any data or transaction happens\
    \ only by the validators who are assigned the authority to validate. This may\
    \ be coupled with Federated Byzantine Agreement.\n\nHowever, as an early adopter\
    \ of blockchains, one must understand that the preceding items are just mechanisms\
    \ that have been used to form consensus. One can develop one’s own principle or\
    \ mechanism or merge multiple methods to reach consensus in one’s networks as\
    \ desired. Note that the consensus algorithms are set and pre-defined during the\
    \ setup of the blockchains for any network. Updating with a new form may require\
    \ the consensus of the network."
  trans: "\n### 在企业集团中\n\n设想一个《财富》500 强企业集团，旗下涉及近 20 个不同行业领域，其产品或许也能供自家员工使用。集团内部各公司之间的认知度几乎毫无透明度可言。无论是简报、公司活动还是网站上汇总的信息，都纯粹基于品牌认知，而非真正的价值所在。\n\
    \n现在，设想在集团内部存在一个由私有链和公有链组成的混合网络。\n\n公有链可以包含描述各公司结构、领导层和产品的元数据。私有链则可能存储薪资、目标等机密数据。\n\
    \n人们总会质疑，为何此类用途需要区块链。同样的信息在网站或 PPT 演示中也能找到。这些形式的弊端在于：若网站本不打算公开，而仅面向员工的私有账本却对所有人开放，网站便会成为黑客的脆弱目标。一份演示文稿可能被复制、下载，并离线发送给无关人员，不留痕迹。因此，这些媒介存在缺陷，而区块链是更优的选择。私有链可以限制仅高级管理层访问，使其能基于账本上显示的所有来源做出信息充分的决策。\n\
    \n### 在国家间贸易集团中\n\n通过研究世界贸易的宏观经济学，我们都能理解导致货币波动的因素。世界贸易的价值是因素之一。每年不同产品与服务间的供需情况各不相同。市场时常变化，因此经济也因市场修正、贷款政策、政府补贴等因素而变动。其中许多变化是政策驱动的，旨在提高可预测性。然而，其能否按计划运作，还是因涉及诸多变量而崩溃，始终是个存疑的问题。获取正确的数据一直是必需，而数据数字化始于过去十年。与此同时，对可信*真实*数据源的数字化也已开始，区块链确保了数字化过程能够封装结构化、安全、可信的数据。\n\
    \n### 在全球范围内\n\n随着连接性的增强，无需中介便可直接触及全球各地，这开辟了激动人心的机遇之路。可信的教育、优质的食品、能源分配、良好的工作等都将变得更加可及（见图\
    \ 1-10）。\n\n![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig10_HTML.jpg](img/474923_1_En_1_Fig10_HTML.jpg)\n\
    \n图 1-10\n全球贸易链\n\n当所有这些生态系统都被重构为可信的基础设施后，我们看到我们彼此相处的方式将发生巨大变化，我们的流程被数字化，我们的数据比以往任何时候都更加结构化。\n\
    \n这改变了组织设计。它改变了世界贸易。它改变了我们赋予价值的方式。若能被正确捕捉到区块链中，它为公平贸易和公平评估努力提供了机会。它将政策改革为双方都同意的合约。它消除了篡改交易中已承诺数据的空间。\n\
    \n## 共识算法\n\n从石器时代人类到进化后的社会，大规模的变革总是在人们深信不疑时被推动。这种信念驱动了许多社会愿景。这种信念本身在区块链中被数字化为共识算法。当对某一原则达成一致时，这些共识算法便会执行。这构成了所有类型网络中区块链的核心。网络中的节点在达成共识时，允许交易活动通过区块链网络进行。共识的形式可能因应用和关键程度而异。\n\
    \n共识的形式基于通常在线下场景中发生的必要协商方法。例如，当一个社区决定某个职业需要特定学位时，它实际上是在无意识地验证这个线下协议。以一个现实生活中的例子来说，可以考虑建筑师的角色。文明社会的人们形成了一种信任共识，即拥有建筑学学位的人能够处理建筑物的结构设计。\n\
    \n现在我们理解了现实生活中的共识场景，区块链则提供了基础设施，将这种相互协议数字化到一个连接所有参与决策过程的利益相关者的软件上。\n\n因此，当交易和合约在链上实现时，共识算法构成了区块链最关键的组成部分。\n\
    \n想想那些在成功解放的民主政体中显而易见的领导力思想。这种领导力的驱动者是人民及其信念网络。其数字版本就是共识算法。在区块链世界中，不同的区块链根据其网络结构、链上数据以及交易活动类型，遵循不同形式的共识。\n\
    \n一个著名的共识算法是`工作量证明`，被比特币和以太坊所采用。还有其他几种机制，例如：\n\n- `工作量证明`\n  -  希望在链上进行交易的节点需要解决一个复杂问题，花费时间和精力来解决它，以证明其参与意愿。所花费的价值就是处理时间。\n\
    - `权益证明`\n  -  区块生产者将数据传递到链上的投票机制，需要基于权益条件（财富、任期、资历等）获得多数利益相关者的同意。\n- `委托权益证明`\n\
    \  -  一种基于技术的民主实现，利用投票和选举流程来保护区块链免受中心化和恶意使用。在此机制中，投票权不是由利益相关者直接行使，而是随机委托或基于委托进行，以实现权力去中心化。\n\
    - `权重证明`\n  -  链上的共识取决于节点持有的代币数量以及找到下一个区块奖励的概率。\n- `消逝时间证明`\n  -  用于私有链中向网络添加节点时。共识基于经过的时间来达成，根据动态休眠时间验证新节点的加入。\n\
    - `权威证明`\n  -  对任何数据或交易的共识仅由被授权验证的验证者完成。这可能与联邦拜占庭协议结合使用。\n\n然而，作为区块链的早期采用者，必须理解上述内容只是用于形成共识的机制。你可以根据需要，在自己的网络中开发自己的原则或机制，或合并多种方法来达成共识。请注意，共识算法是在为任何网络设置区块链时设定并预先定义的。更新为新的形式可能需要网络达成共识。\n"
- fmt: 'With the choice of the blockchain framework made, the consensus comes along.
    For example, Ethereum initially worked based on the Proof of Work mechanism, where
    the value on the chain is generated by mining, and the transaction utility also
    utilizes this value. Therefore, the consensus was reached purely based on the
    proof of work done on the chain. Now, Ethereum is working based on the adoption
    of Proof of Stake, where the value of the network movement is independent of mining
    or any such efforts but proportional to the stake the peers have in the network.
    The needs and demands of the network form the choice of consensus.


    A person skeptical of accepting this common agreement principle in the form of
    consensus algorithms may question whether it is really programmed for true consensus.
    They may question whether there are any loopholes in such consensus algorithms
    on blockchains where crucial trade activities could be conducted. This point of
    worry is solved with the open source nature of these blockchains, where the source
    code is laid open for critical review. Therefore, all parties agreeing on the
    chain are assured of the genuineness of the algorithm.


    Such conflicts are usually a concern when Enterprise businesses engage on blockchains
    that have a common form of mutually accepted consensus. The open source nature
    of such frameworks plays a crucial part. Azure’s Blockchain Workbench ensures
    the routing connectors to such blockchain frameworks have flawless integrations
    and infrastructural connectivity.


    Now that we understand the business perspective surrounding consensus, we will
    break down the technical needs of consensus for blockchains. For developers who
    code for inter-business or inter-departmental operations, there are zillions of
    cases that must be met. In a peer-to-peer network, where every peer’s environment
    may differ from the others, executing a truly decentralized activity on a blockchain
    may impact a lot of different workflows. Thus, such a network requires a common
    principle by which to achieve decentralization in decision-making and transaction
    activities. Therefore, the need for consensus. Consider race condition situations,
    or the million concurrent user requests that need to be serviced—which situation
    must be given priority is thereby decided and governed via the principle defined
    in the consensus algorithm.


    This book examines different variants of consensus while discussing various use
    cases. Remember the choice of consensus must be user/data/transaction-centric
    so as to emulate societal agreements in a more tangible form.


    # Azure and Blockchains


    With the increase of technology awareness, and its widespread impact across industries,
    domains, sectors, groups of people, markets, and ecosystems, the need for better
    processes is also increasing. Focusing on a vision of being change-makers, companies
    attempt to streamline operations with technology to enhance work quality. Traditional
    industries that have existed for decades have tons of data and people all across
    the globe who are actively running processes in widely distributed departments,
    locations, and so forth. Given the competitiveness of the market, various employee
    expectations, consumer transparency, and the speed of decision-making, the adoption
    of blockchains to form a truly decentralized ecosystem is inevitable. Several
    companies already have enterprise software that collates data. But to get the
    very people interacting with the software to feed in credible timely data is a
    huge deal, especially in companies that have offices across countries. This is
    exactly where Azure extends its connectivity and enterprise suite of integrations
    with blockchains as shown in Figure [1-11](#474923_1_En_1_Chapter.xhtml#Fig11).


    So, before we dive further into this book, let’s account for the transitions that
    may be required to ensure a decentralized network using blockchains.


    ## Authorizations of Users on a Chain


    Enterprises use Active Directory by Azure, which ensures the authentication and
    security of employee logins, customer logins, and so on. With Azure Blockchain
    Workbench, integration with the Azure Active Directory is seamless. Identity management
    is sorted with minimal effort. This allows businesses to handle authorization,
    access control, and user roles. When two businesses intend to engage with each
    other, their respective AD management can be linked without compromising decentralization.


    Once the Azure AD users are registered, the rightful application under Azure Workbench
    can be linked, thereby mapping the existing user identities from a centralized
    system to decentralized blockchain identities. User management is entirely anonymized
    on the chain wherever required with Azure’s AD mapping.


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig11_HTML.jpg](Images/474923_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    An example of blockchain deployment on Azure


    ## Metadata of Existing Information


    When multiple businesses engage with the blockchain, each comes with its own set
    of crucial metadata. This data is to be maintained privately for internal operations,
    and parts of it may be crucial for on-chain inter-operational activities between
    businesses. Workbench supports the off-loading of chain data to SQL servers for
    analysis and vice versa to maintain flexibility and privacy. Further, it enables
    the integration of blockchains with other Azure services via the Azure Blockchain
    Workbench for event triggers, external APIs, IoT hubs, and so on, with the flexibility
    of programming in Java, .NET, and Python through the open API integrations provided
    by Workbench.


    ## Process Challenges That Require Blockchains


    Before integrating Azure components with the blockchain, designing the workflow,
    process flow, and data flow is crucial. The key management, off-chain service
    integrations, and logic apps can all be connected in various forms. Organizational
    design and inter-organizational design have to be mutually accepted or use an
    existing framework that is agreeable to all parties.


    ## Business Applications and Presentation Tools


    Workbench provides a huge set of integrations with logic apps and data monitors—such
    as network monitors, DLT watchers, and so on—that send alerts in the case of any
    event triggers like down times, bottlenecks, etc. Logs are maintained for every
    state of movement. Elements such as Power BI and analytic tools provision better
    forms of visualization of the ongoing activities.


    This makes it a complete suite of infrastructure tools for anyone who wishes to
    decentralize. As we will see with several social media community managers empowered
    to run their groups online or over chats, the Azure Blockchain Workbench allows
    users to set up a peer-to-peer network with the array of supporting tools showcased.'
