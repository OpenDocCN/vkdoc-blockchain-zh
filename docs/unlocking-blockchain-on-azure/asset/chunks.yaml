    \ Southeast Asia |\n| `db-hofiog-bb` | `SQL server` | Southeast Asia |\n| `hofiog-bb`\
    \ (`db-hofiog-bb`/`hofiog-bb`) | `SQL database` | Southeast Asia |\n| `ethbb4vow-akv`\
    \ | `Key vault` | Southeast Asia |\n| `ethbb4vow-lbpip-reg1` | `Public IP address`\
    \ | Southeast Asia |\n| `ethbb4vow-oms` | `Log Analytics workspace` | Southeast\
    \ Asia |\n| `ethbb4vowstore`, `hofiogbb` | `Storage account` | Southeast Asia\
    \ |\n| `ethbb4vow-vlNsg-reg1` | `Network security group` | Southeast Asia |\n\
    | `poaAvailabilitySet-reg1` | `Availability set` | Southeast Asia |\n| `Vl-ethbb4vow-reg1-0`,\
    \ `vl-ethbb4vow-reg1-1` | `Virtual machine` | Southeast Asia |\n| `vl-ethbb4vow-reg1-0_OsDisk_1_d972feafdb584e318578647a023d402c`,\
    \ `vl-ethbb4vow-reg1-1_OsDisk_1_40add67153dd4fa8b9a8a18fc30c24b7` | `Disk` | Southeast\
    \ Asia |\n| `vl-nic0-reg1`, `vl-nic1-reg1` | `Network interface` | Southeast Asia\
    \ |\n| `Website-api-test`, `website-ui-test` | `Availability test` | Southeast\
    \ Asia |\n\n- `App Service Plan` is simply a record of all the services that are\
    \ running, encompassing the app services, which are nothing but services on Linux\
    \ servers.\n- `Application Insights` for the App Service provides the stats of\
    \ the service usage, number of user visits, server requests, number of unique\
    \ users, server response time, etc., as shown in Figure [2-15](#474923_1_En_2_Chapter.xhtml#Fig15).\n\
    \n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig15_HTML.jpg](Images/474923_1_En_2_Fig15_HTML.jpg)\n\
    \n**Figure 2-15** `Application Insights` dashboard\n\n- One `Availability Set`\n\
    \    - An availability set is a logical grouping capability that you can use in\
    \ Azure to ensure that the VM resources you place within it are isolated from\
    \ each other when they are deployed within an Azure datacenter.\n- Two `Availability\
    \ Tests`\n    - The test validates the availability of the app services for the\
    \ app service `bb-hofiog-api` as shown in Figure [2-16](#474923_1_En_2_Chapter.xhtml#Fig16).\n\
    - Here we have two test sets, one for the API app service and the other for the\
    \ UI layer.\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig16_HTML.jpg](Images/474923_1_En_2_Fig16_HTML.jpg)\n\
    \n**Figure 2-16** Availability test sets\n\n- Two `SQL Databases` (Standard S0)\n\
    \    - These are simply storage servers of 30GiB SSD running on Ubuntu.\n- Two\
    \ `Azure Key Vaults` for the app services\n    - Key vaults, as the name suggests,\
    \ help to create, store, manage, and comply with FIPS 140-2 Level 2, and enable\
    \ SSL/TLS certificates. In short, they are a tool to handle most security-related\
    \ aspects of the app services and other encryption keys. They are a one-stop security\
    \ center without reinventing the wheel from scratch. The features of the `Azure\
    \ Key Vault` provide all mandatory aspects for any enterprise development and\
    \ production deployment procedures.\n- However, this does not mean that using\
    \ it will make it secure. The tool has to be correctly configured inside the app\
    \ services, complying with the encryption standards defined/designed for your\
    \ blockchain. `Azure Key Vault` ensures the key is never released out of the vault.\
    \ We will cover the encryption aspects in detail in the next chapter.\n- One `Service\
    \ Bus Namespace`\n- Two `Azure Storage accounts` (Standard LRS)\n- Two `Virtual\
    \ Machine scale sets` (ledger nodes and workbench microservices)\n- Optional:\
    \ `Azure Monitor`\n\nAs you can see in the preceding table, all infrastructure\
    \ elements are created, configured, and appropriately interlinked for facilitating\
    \ the blockchain network. Column 1 shows the assigned element name, column 2 provides\
    \ the type of element, and column 3 mentions the region of the element.\n\nOn\
    \ clicking the public URL provided by the Azure Blockchain Workbench via the app\
    \ service, one can open the link to see this page (see Figure [2-17](#474923_1_En_2_Chapter.xhtml#Fig17)).\n\
    \n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig17_HTML.jpg](Images/474923_1_En_2_Fig17_HTML.jpg)\n\
    \n**Figure 2-17** App Service panel\n\nCopy and paste it into PowerShell, and\
    \ it will ask you to add your Active AD Tenant (Figure [2-18](#474923_1_En_2_Chapter.xhtml#Fig18)).\n\
    \n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig18_HTML.jpg](Images/474923_1_En_2_Fig18_HTML.jpg)\n\
    \n**Figure 2-18** Powershell commands\n\nI found my Azure AD Tenant here at `supportmyraatechnologies.onmicrosoft.com`\
    \ (Figure [2-19](#474923_1_En_2_Chapter.xhtml#Fig19)).\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig19_HTML.jpg](Images/474923_1_En_2_Fig19_HTML.jpg)\n\
    \n**Figure 2-19** Active Directory\n\nOnce the information is entered, it will\
    \ provide a URL and an OTP to register, as given in Figure [2-20](#474923_1_En_2_Chapter.xhtml#Fig20).\n\
    \n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig20_HTML.jpg](Images/474923_1_En_2_Fig20_HTML.jpg)\n\
    \n**Figure 2-20** OTP registration for the device\n\nThis step successfully registers\
    \ the use of PowerShell with my device, thereby creating a relational linkage\
    \ of my device with the process to initiate the blockchain elements, as shown\
    \ in Figure [2-21](#474923_1_En_2_Chapter.xhtml#Fig21).\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig21_HTML.jpg](Images/474923_1_En_2_Fig21_HTML.jpg)\n\
    \n**Figure 2-21** Processing app registration"
