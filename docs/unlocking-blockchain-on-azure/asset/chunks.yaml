- fmt: '# 9. Use Cases


    Over the course of this book, we have drilled into various aspects of blockchains
    as well as use cases to help us focus on those aspects. In this chapter, we will
    take a step up and view the array of possibilities of use cases that were executed
    in various industries for various purposes. As we walk through this journey of
    use cases and the experience of building and executing some, the reader is required
    to refer back over the initial chapters to correlate the elements of blockchain
    and to map the appropriate tools, architectures, consensus, and so on. If a particular
    use case uses a particular stack, one can always challenge with better protocols
    and architectures to yield better throughputs and performances.


    And as we upskill ourselves and improve our capabilities and our understanding
    to create, implement, and manage blockchain-based applications, we need to look
    around and understand the current use cases under implementation. Insight into
    such active use cases will give us a detailed understanding of the context in
    which blockchains can be used. Along with this, we will also be looking into some
    of the active use cases that have been developed for different industries and
    how Microsoft Azure Blockchain has been transforming the world from transport
    to trade.


    While the preceding description of the chapter may seem daunting and like a lot
    of work, and make you feel like grabbing a cup of coffee to replenish your mind
    and energy, it would be fun for you to know that now even coffee and blockchains
    are related. This comes from Microsoft Azure’s collaboration with Starbucks, one
    of the world’s leading coffeehouses, and how their efforts have brought in more
    transparency and experientiality to the entire generation of third-wave coffee
    drinkers.


    To understand this example better and to look at more such fascinating examples,
    let’s explore how blockchains have made the world a better place through the following
    examples:


    - Decentralized customer engagement

    - Decentralized trade finance

    - Document signing and records management

    - Distributed entity such as content


    ## Decentralized Customer Engagement


    Attracting and engaging customers and giving them the best customer experience
    is one of the key focus areas of any business, be it a small corner shop or a
    megastore like Walmart. While this equation has been relevant since the time the
    traders took to the Silk Route to sell goods from China to the Middle East, the
    mechanisms and appeal of the customer experience keep changing with economics,
    market conditions, and customer maturity. We will explore two use cases in depth
    to understand how blockchains helped these companies stand out when it came to
    customer experience.


    ### Bill’U: Your Personal ERP


    `Bill’U` is a Singapore-based enterprise blockchain platform focusing on the experience
    of retail customers to enhance their shopping experience by digitizing shopping
    receipts and warranty cards.


    `Bill’U`, a.k.a. [TechMyBill.​com](http://techmybill.com), provides a decentralized
    peer-to-peer bill-sharing platform. It is an expense ledger of billing documents,
    such as bills, coupons, vouchers, warranties, user manuals, and so forth—a one-stop-shop
    solution to managing all billing documents securely. It allows users to create,
    scan, share, and store documents on the ledger. This cutting-edge platform has
    two of development tracks: research specific and application specific.


    Blockchain research makes the platform a highly secure environment for retailers,
    customers, and all stakeholders to securely manage all their billing documents.
    Unlike the conventional options of mail or an online service that brokers user
    data, `Bill’U` brings end-to-end encryption and provides complete ownership of
    user data for all stakeholders involved. This part of the platform does not directly
    interact with the users in terms of features. However, data being the core asset,
    the presence of such a mesh of private and public blockchains is extremely crucial
    in terms of data security and data sensitivity. We shall elaborate the constructs
    of this in the use case below.


    The application side of `Bill’U` embeds artificial intelligence to make the numbers
    more human readable and usable. Imagine reminders of your expiring coupons that
    always go unused or renewal of warranties so as to be covered for any damages.
    All bill documents on the ledger can be searched intelligently with the “ASK Bill’U”
    feature. The user can ask questions about grocery costs, monthly travel expenses,
    or any queries about the uploaded expenses.


    The blockchain ledger and the AI-enabled application make `Bill’U` the next-generation
    platform for all billing documents.


    Every node (over an edge device—mobile, desktop, or a cloud account) uploads bills/scans
    digital QR Bills that are locally preserved as the first reference. The AI is
    locally embedded inside each node. Every such node participates in the blockchain
    ecosystem. The data that is authorized to be shared anonymously flows onto the
    public blockchain, whereas when a consumer purchases an item from a retailer,
    the specific information that is confidential is encrypted and shared over the
    private chain exclusive to the rightful stakeholder.


    Figure [9-1](#474923_1_En_9_Chapter.xhtml#Fig1) shows how it works.


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig1_HTML.jpg](Images/474923_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    The current offline process of billing for a retail customer


    You must have experienced a similar process while shopping, and along with shopping
    bags and happy memories of the day, you would have ended up with a lot of unwanted,
    difficult-to-manage receipts. The major disadvantages of this conventional setup
    are shown in Figure [9-2](#474923_1_En_9_Chapter.xhtml#Fig2).


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig2_HTML.jpg](Images/474923_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Emphasis on the challenges faced by retail customers and retailers on centralized
    platforms and offline processes


    As we can see, the conventional methods have multiple challenges related to storage,
    tracking, information capture, and expense management, to name a few for both
    the retailers as well as the shoppers. In order to overcome these, `Bill’U` uses
    a platform based out of AI and blockchains to ensure ease of service and customer
    data confidentiality.


    Customer data confidentiality is one of the prime Unique Selling Points (USPs)
    of the product, as all of the alternates of this require the customer to furnish
    their personal information, like name, mobile number, and addresses, which is
    then used and over-used by retailers and has no clause around confidentiality
    of the data and further sharing of it.'
