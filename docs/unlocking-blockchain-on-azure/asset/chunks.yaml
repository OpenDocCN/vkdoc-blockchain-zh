    \ The Blockchain Service also enables the automation of rules over the royalties\
    \ in the form of Smart Contracts.\n\nLet’s break down the implementation to better\
    \ understand the process flow.\n\n1.  Metadata is sourced from off-chain storage,\
    \ such as Azure Cosmos DB, SQL, or MongoDB.\n\n2.  Blockchain nodes are initialized\
    \ with the required information and the purpose of consensus, if defined.\n\n\
    3.  Further elements, such as event triggers, allow serverless code to be driven\
    \ on-chain with alerts and triggers.\n\nHere are the steps for integration:\n\n\
    1.  Reshape data schema to Azure Cosmos DB from SQL centralized forms.\n\n2. \
    \ Restructure data structures to key value, column family, documents, and graphs.\n\
    \n3.  Global distribution\n\n4.  Create a multi-master replication protocol based\
    \ on validation only or a form of consensus.\n\n5.  Check geographical limitations\
    \ and policies.\n\n6.  Identify the levels of trust and permissions required for\
    \ the processes.\n\n7.  Stack elements relevant to the processes.\n\nThese steps\
    \ are applicable when the distributed ledgers of data require the blockchain aspects\
    \ of connected validations and triggers of smart contracts. One needs to identify\
    \ the right confluence of integration for a seamless experience.\n\nFor example,\
    \ enterprises that maintain large-scale data jobs on Apache Spark can seamlessly\
    \ connect to Cosmos DB for the append-only transparent ledger. Further, if the\
    \ data jobs require a closed-loop consensus, Azure Blockchain Workbench enables\
    \ it. See: [`https://docs.microsoft.com/en-us/azure/cosmos-db/spark-connector`](https://docs.microsoft.com/en-us/azure/cosmos-db/spark-connector).\n\
    \nSimilar integrations can be established for IoT hub networks as well as SharePoint\
    \ systems with blockchains.\n\n## Onboarding: Compliance and Regulatory Requirements\n\
    \nOnce the sourcing of data is identified, data is sorted, structured, and stored\
    \ appropriately. The classification of data for private and public blockchains\
    \ as well as for on-chain and off-chain activities is crucial. Such classification\
    \ is linked to the policies that establish protection rights and regulations with\
    \ which every business must comply.\n\nAt the same time, the process by which\
    \ the data is handled is crucial, along with the state of the data, when we talk\
    \ about blockchains. For instance, a normal registration of a centralized online\
    \ platform merely requires an email and password set up, with some more details.\
    \ However, the process of storing the password and email is unknown to the end\
    \ user. There may be unsecured platforms that store passwords in plain-text and\
    \ may leak out values that could be used on secured platforms as well. Thus, onboarding\
    \ a user onto a blockchain differs from such common practices.\n\nOnboarding starts\
    \ with the machine addresses, private and public keys, and the validation of other\
    \ nodes, depending on the type and purpose of the blockchain.\n\nTherefore, the\
    \ second touchpoint of consideration is how this sourcing of data is seamlessly\
    \ onboarded to blockchains. This onboarding may be at the start of the blockchain\
    \ setup, or during intervals, or during ongoing operations, or during any number\
    \ of event triggers.\n\nHowever, how it is done is highly crucial to keeping the\
    \ sensitivity of the data and the credibility of its state in mind. As this integration\
    \ touchpoint is quite vulnerable to attack, the following aspects have to be scoped\
    \ out:\n\n*   Cybersecurity\n\n*   Compliance\n\n*   Regulations\n\n*   Geographic\
    \ policies (e.g., Europe)\n    *   GDPR\n\n    *   PSD2 and e-Privacy\n\n*   Industrial\
    \ domain policies\n    *   Maritime\n\n    *   Manufacturing\n\n    *   Medical\n\
    \nThis integration touchpoint does not have direct tools to implement; it is more\
    \ of a design consideration for the integration of processes related to onboarding.\
    \ This varies highly based on the application, location, and domain of the blockchain\
    \ platform.\n\n### GDPR Considerations for Blockchains\n\nThe **General Data Protection\
    \ Regulation** (EU) [2016/​679](https://eur-lex.europa.eu/eli/reg/2016/679/oj)\
    \ (**GDPR**) is a regulation in EU law that covers data protection and privacy\
    \ for all individual citizens of the [European Union](https://en.wikipedia.org/wiki/European_Union)\
    \ (EU) and the [European Economic Area](https://en.wikipedia.org/wiki/European_Economic_Area)\
    \ (EEA) . It also addresses the transfer of personal data outside the EU and EEA\
    \ areas. The GDPR aims primarily to give control to individuals over their personal\
    \ data and to simplify the regulatory environment for international business by\
    \ unifying the regulations within the EU.\n\nThis consists of three main aspects.\n\
    \n#### Definition of Purpose and Consent\n\nWhile onboarding users, the definition\
    \ of purpose must be clearly conveyed. Along with this, the rightful consents\
    \ to use the data must be clearly described. This European policy has ensured\
    \ such practices on a centralized platform. How does this apply to blockchains?\
    \ The answer is in the smart contract triggers, which may comply and check in\
    \ case of any deviation. For example, if a user has not provided consent, the\
    \ blockchain platform must clearly convey and commit to the bylaws defined in\
    \ the foundation of that blockchain."
  trans: "\n### 区块链的 Azure Cosmos DB 集成\n\n`Azure Cosmos DB` 是一个全球分布式、多模型的数据库服务，适用于任何规模。该\
    \ NoSQL 数据库提供跨全球连接的多主节点，同时透明地维护各处的副本。然而，这不应与区块链混淆。`Azure Cosmos DB` 恰当地将共享分布式账本的各个方面与区块链进行对齐和集成。\n\
    \n当你需要一个不可变、仅追加的账本，并且在已知许可利益相关方的无信任网络中与多方打交道时，你需要将许可区块链与 `Cosmos DB` 相结合，以维护分布式存储和可追溯性。\n\
    \n在其他情况下，如果共识不是主要需求，`Azure Cosmos DB` 可以在没有区块链的情况下满足要求。这些情况包括维护分布式的场景，以及加密等层面可以在该架构之上实现。考虑采用\
    \ `Azure Cosmos DB` 的独特卖点/关键差异化因素之一，在于它对新技术的开放集成性，同时从基础上就支持去中心化，并具备区块链的其他特性。\n\
    \n希望实现去中心化的平台，可以轻松地从 `SQL`、`MongoDB`、`Gremlin Graph`、`Cassandra`、`Tables` 和 `CSVs`\
    \ 大规模地全局迁移到 Azure 的 `Cosmos DB`。\n\n让我们了解一个 `Azure Cosmos DB` 与区块链结合的使用案例，然后再深入技术细节。\n\
    \n我们来看看微软在可通过 Azure 区块链服务访问的 XBOX 游戏发行商版税方面的使用案例。该示例展示了从可信来源追溯版税时所实现的透明度。游戏发行商可以通过这种技术组合访问版税报表。所涉及的过程是链上追踪、链下可视化以及流程不可变审计的混合。因此，`Azure\
    \ Cosmos DB` 实现了版税数据的全球分布式存储，而区块链服务则维护所有流程的状态，以保持所存储信息的可信度。区块链服务还通过智能合约的形式实现了版税规则的自动化。\n\
    \n让我们分解该实现，以更好地理解流程。\n\n1.  元数据来自链下存储，例如 `Azure Cosmos DB`、`SQL` 或 `MongoDB`。\n\
    2.  区块链节点根据所需信息进行初始化，并定义共识目的（如果已定义）。\n3.  进一步的其他元素，如事件触发器，允许在链上通过警报和触发器驱动无服务器代码。\n\
    \n以下是集成的步骤：\n\n1.  将数据模式从 `SQL` 集中式形式重塑为 `Azure Cosmos DB` 模式。\n2.  将数据结构重构为键值、列族、文档和图。\n\
    3.  全球分布。\n4.  创建基于仅验证或某种共识形式的多主复制协议。\n5.  检查地理限制和政策。\n6.  确定流程所需的信任级别和权限。\n7.\
    \  堆叠与流程相关的元素。\n\n当数据的分布式账本需要区块链方面的连接验证和智能合约触发时，这些步骤适用。需要找到合适的集成交汇点，以获得无缝体验。\n\
    \n例如，在 `Apache Spark` 上维护大规模数据作业的企业，可以无缝连接到 `Cosmos DB` 以获取仅追加的透明账本。此外，如果数据作业需要闭环共识，`Azure\
    \ Blockchain Workbench` 可以实现这一点。参见：[`https://docs.microsoft.com/en-us/azure/cosmos-db/spark-connector`](https://docs.microsoft.com/en-us/azure/cosmos-db/spark-connector)。\n\
    \n类似的集成也可以为 `IoT` 中心网络以及 SharePoint 系统与区块链建立连接。\n\n### 用户接入：合规与监管要求\n\n一旦确定了数据来源，数据就会被适当地分类、结构化并存储。在私有和公有区块链以及链上、链下活动中，数据的分类至关重要。这种分类与确立保护权利和法规的政策相关联，每个企业都必须遵守这些法规。\n\
    \n同时，在讨论区块链时，处理数据的过程以及数据的状态至关重要。例如，一个中心化在线平台的普通注册只需要设置电子邮件和密码，外加一些详细信息。然而，密码和邮件的存储过程对最终用户是不可知的。可能存在不安全的平台，以明文存储密码，并可能泄露那些也可以用于安全平台的值。因此，将用户接入区块链的过程与这些常见做法有所不同。\n\
    \n用户接入从机器地址、私钥和公钥以及根据区块链的类型和目的验证其他节点开始。\n\n因此，第二个考虑点是这些数据来源如何无缝地接入区块链。这种接入可能发生在区块链设置的开始阶段、过程中的间隔期、持续操作期间，或任何数量的事件触发期间。\n\
    \n然而，如何做到这一点对于保持数据的敏感性及其状态的可信度至关重要。由于这个集成接触点非常容易受到攻击，因此必须界定以下几个方面的范围：\n\n*   网络安全\n\
    *   合规性\n*   法规\n*   地理政策（例如，欧洲）\n    *   `GDPR`\n    *   `PSD2` 和电子隐私\n*   行业领域政策\n\
    \    *   海事\n    *   制造业\n    *   医疗\n\n这个集成接触点没有直接的实现工具；它更多是关于与用户接入相关流程集成时的设计考量。这根据区块链平台的应用、地点和领域而有很大差异。\n\
    \n#### 区块链的 GDPR 考量\n\n**通用数据保护条例**（欧盟）[2016/​679](https://eur-lex.europa.eu/eli/reg/2016/679/oj)\
    \ (**GDPR**) 是欧盟法律中的一项法规，涵盖了所有 [欧盟](https://en.wikipedia.org/wiki/European_Union)\
    \ 和 [欧洲经济区](https://en.wikipedia.org/wiki/European_Economic_Area) 公民的数据保护和隐私。它还涉及个人数据向欧盟和欧洲经济区以外的传输。GDPR\
    \ 的主要目标是赋予个人对其个人数据的控制权，并通过统一欧盟内部的法规来简化国际业务的监管环境。\n\n这包括三个主要方面。\n\n##### 目的与同意的定义\n\
    \n在接入用户时，必须清晰地传达目的定义。同时，必须明确描述使用数据的正当同意。这项欧洲政策已确保在中心化平台上实行此类做法。这如何应用于区块链呢？答案在于智能合约触发器，它可能在出现任何偏差时进行合规性检查和处理。例如，如果用户未提供同意，区块链平台必须清晰传达并遵守该区块链基础中定义的内部章程。\n"
- fmt: '#### Subject Access Request (SAR)


    Upon the request of a user, `SAR` allows the retrieval of all personal information
    for that user from the platform. On an immutable ledger facilitated by blockchains,
    the complete history of data is traceable yet secure as the ability to access
    this data resides purely with the user.


    Failure to comply with this provision may penalize the company with a fine of
    up to 20 million GBP or 4 percent of global turnover, whichever is higher. Such
    clauses may auto-trigger when such bylaws are broken. But the question here is,
    why would companies ever program a blockchain to become such non-profitable systems?
    The answer to this is that it enables the users to also have a beneficial contract
    during onboarding. The governance mechanism must require both stakeholders - the
    organizations & the users to comply with the regulations put forth in the smart
    contract mutually. It gives the user an avenue to put forth his terms. It may
    involve penalties or refunds based on the conditions agreed by both parties as
    a part of consensus. Since the user here is not a mere subscriber, this peer-to-peer
    relationship is master to master, and so the clauses must be balanced.


    #### Data Breach Notification


    The user must be notified if the platform faces a security breach so that suitable
    actions can be taken by the user. This also can be a part of a smart contract
    during onboarding.


    Based on these three aspects, the Azure Compliance Manager extends an array of
    tools to be utilized for any policy defined over the cloud components and enforced
    throughout. This does not mean it comes embedded with the Azure Blockchain suite,
    but since the architecture lies in the same environment, it is easier to integrate
    them for their specific purposes.


    More here: [`https://azure.microsoft.com/en-in/overview/trusted-cloud/compliance/`](https://azure.microsoft.com/en-in/overview/trusted-cloud/compliance/).


    Azure’s Compliance Manager offers various tools for various purposes. It covers
    an array of global policies and regulations across countries, industries, and
    timelines.


    #### Azure Blueprints


    Azure Blueprints allows businesses to utilize templates that are pre-defined as
    per policies and regulations, such as `ISO`, `GDPR`, etc., or to make custom templates
    for the entire organization to follow while building independent applications
    or company-wide applications. (This is currently a free service offered by Azure,
    allowing one to adhere to international policies, but it is not known how long
    they will keep it that way.)


    When building international blockchains with users across different industries
    and countries, these templates must be considered to avoid national conflicts
    over data privacy and protection rights.


    #### Azure Policy


    Here, independent policies are defined. As we saw, Blueprints provides a template/framework
    for policies and security rules. The policy definition takes place in this tool.
    The blockchain policies for nodes and transactions can be stored here while designing
    universal policies.


    #### Azure Security Center


    When one activates the Security Center on Azure, a monitoring agent is actively
    deployed over the virtual machine components. It actively checks for threats and
    attacks. Similar to the security checks for SQL injections, brute-force attacks,
    and so forth in centralized systems, blockchain nodes have to be actively monitored
    for the same.


    In case, in a trustless permissionless network, there are collusions observed
    in the patterns of fraudulent validations, the Security Center could trigger policies
    to avoid such attacks and safeguard the on-chain activities (Figure [6-5](#474923_1_En_6_Chapter.xhtml#Fig5)).


    ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig5_HTML.png](Images/474923_1_En_6_Fig5_HTML.png)


    Figure 6-5


    Security processes


    Exercise


    Refer to the preceding process flow and identify the right integration components
    for this flow in an insurance company.


    ## Authorization: Access Control and Security Access


    Most enterprises enforce access control for various roles and activities. Based
    on the login credentials and metadata from the preceding stages, the proper access
    control is selected and functionalities are catered. Now, in case of an attack,
    if the lowest authority becomes vulnerable, the entire hierarchy of control will
    fall. Therefore, considering the ongoing practices of access control, it is highly
    crucial to embed the existing processes of access control onto the blockchain.


    `Azure Active Directory` is widely used to maintain access control over all applications
    based on a common protocol. This component requires integration with the decentralized
    blockchain platform. The entity of access control is mapped from the existing
    record of users to the hashed machine addresses.


    Another aspect of security is the `Azure Key Vault`, where the user stores and
    maintains their set of public keys and backs up the private keys if desired. However,
    storing keys centrally again defies the initial purpose of blockchains, as the
    key could be made vulnerable to attacks or leaks, making it less secure. The main
    reason to use the `Azure Key Vault` is to seamlessly integrate the existing security
    mechanisms with the blockchain activities.


    Another form of authorization is the validator nodes, which are dependent on human
    intervention to approve new peers. There could be nodes assigned to forming consensus
    to issue CA certificates authorizing a new user on the chain.


    Lastly, smart contracts may enforce a checklist of pre-requisites for the user,
    perhaps a minimum set of documents or a biometric scan and iris scan, to gain
    authorization.


    The smart contract integration for such an application must consist of the following:


    - Right to access – It should allow users to understand how the contract is designed.

    - Restricted programming – It should eliminate vague definitions in code.

    - Informed triggers and alerts – It should activate conditional activities as
    defined.

    - Forgotten state or deletion actions – It should manage states of data on rollbacks
    and deletion requests.'
