- fmt: '# Transparent Updates and Fair Trade


    Identify a use case where `IoT`, blockchains, and human interventions can form
    a decentralized ecosystem of transparent updates and fair trade with smart contracts.


    Having understood the design thought process for `IoT` integrations with blockchain,
    one can structure the platform with Azure components. Azure provides an array
    of options to configure the choice of blockchain with its workbench to connect
    with `IoT` devices along with other logic apps.


    Depending on the design architected, one can decide to invoke the blockchain based
    on the integrations and the pre-defined conditions. For example, every time the
    sensor crosses a threshold, the blockchain would want to record it for audit purposes.
    So, when the sensor data crosses the threshold, the API to the blockchain is called.
    The `DLT` services ensure the hashing and generation of blocks is processed on
    the piece of data and it is added to the blockchain ledger.


    However, it must be made clear that for a direct monitoring and alarm system that
    connects to the `IoT`, a blockchain may not be required. Therefore the `Power
    BI` can directly be connected to the off-chain `DB` as shown. The purpose of the
    blockchain ledger would be to maintain immutable records, enable an audit to trace
    all states of the sensory data, to ensure consensus is maintained in a forwarding
    system dependent on the sensory data, and so on.


    One such example could be oxygen cylinders’ sensor data that may be connected
    to life support, incubation centers, child care, and so on. With a requirement
    to maintain such information for hospital audits, such sensor data can be stored
    on this tamper-proof blockchain ledger, which is linked to a chain of devices.
    The level of supply can be continuously checked for its state at all nodes.


    # JSON Preparation


    Create the `JSON` config pseudo code and the state diagram for the following use
    case: the blockchain platform captures every state and state change that occurs
    while invoking the smart contract conditions. Learning from the official smart
    contract flow for a wheel-alignment system, observe the `JSON` preparation steps:


    1. Define the user types.

    2. Define the states.

    3. Draw the processes/steps to the ideal condition.

    4. Decide the states on user activity.


    # Fixing Pain Points


    In this section, let us examine existing off-chain scenarios and their drawbacks.
    As solution architects, fix the pain points identified with the blockchain solutions
    in the following image.


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figk_HTML.jpg](Images/474923_1_En_10_Figk_HTML.jpg)


    The elements of this supply chain are highly disconnected from each other as far
    as understanding the supply demand in terms of cost of inventory, stocking, and
    runout. This is because the communication between all stakeholders is limited
    and there is zero transparency of the end user’s order. Most of these small-scale
    entities predict the demand flow in a silo, causing costs when not computed based
    on the entire chain’s movements.


    To understand more, play the game here: [`https://beergame.masystem.se/`](https://beergame.masystem.se/)


    Now that we understand the off-chain problem, design an entire blockchain solution
    with the following steps:


    1. Choose stakeholders and roles.

    2. Choose the blockchain configuration and linkages.

    3. Choose the consensus type.

    4. Choose the platform based on Step 3.

    5. Measure the scalability requirements.

    6. Define the token economics if required.

    7. Set up the states and conditions of the smart contracts.

    8. Draw the chain view of the consortium blockchain.


    So, now that you have learned to choose the correct form of consensus for a real-life
    scenario, identified off-chain and on-chain activities, and selected the right
    set of peer nodes, validator nodes, and blockchain configuration in the consortium,
    let’s see the solutions in the following sections.


    # Solutions


    ## Crossword 1


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figl_HTML.jpg](Images/474923_1_En_10_Figl_HTML.jpg)


    ## Crossword 2


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figm_HTML.jpg](Images/474923_1_En_10_Figm_HTML.jpg)


    ## Crossword 3


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Fign_HTML.jpg](Images/474923_1_En_10_Fign_HTML.jpg)


    ## Crossword 4


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figo_HTML.jpg](Images/474923_1_En_10_Figo_HTML.jpg)


    ## Matched Ordering Sequence


    * 1 – C – Chart 4

    * 2 – A – Chart 2

    * 3 – D – Chart 1

    * 4 – B – Chart 3


    # Proof of Stake Design Challenge


    Activities on chain:


    * Sale/lease of the land

    * Addition of new stakeholders

    * Approval of budget proposals

    * Allocation of funds

    * Immovable asset building


    Advantages:


    * Control among high-stake holders

    * Chance to gather together to form majority even for a small stakeholder

    * Raise proposal requests on chain transparently

    * Track fund allocations based on consensus

    * Transparent investment decisions


    Limitations:


    * Low control for minority voters and stakeholders

    * Concentrated power by a group of nodes

    * Rigidity and influence of majority stakeholders

    * No avenue for decision-making for very low-stake holder groups

    * Cannot be expanded to other users, third parties who do not have a stake to
    be a part of any decision-making or services on chain


    By understanding the advantages and disadvantages of the methods of `PoW` and
    `PoS`, existing blockchain networks like Ethereum are now migrating to the hybrid
    model of `PoW/PoS`. One may decide to formulate `PoW` for a set of activities
    such as block creation and generation; and `PoS` to validate and approve as per
    smart contracts. This confluence of methods might help to eliminate disadvantages
    such as attacks, biases, and so on. Study the latest Ethereum Yellow Paper here:


    ```

    https://ethereum.github.io/yellowpaper/paper.pdf

    ```


    On studying the yellow paper, one could construct such a blockchain configuration
    either with the `Azure Workbench` or simply by utilizing a group of Ubuntu servers
    on Azure, with emulation of the nodes done through the docker files. Each server
    may be a node or a group of nodes on the virtual instances inside a server. Once
    the role allocation of the server allocation is clear, the user can connect the
    end points of each server to the event register, which can invoke the smart contract
    on top of it.'
