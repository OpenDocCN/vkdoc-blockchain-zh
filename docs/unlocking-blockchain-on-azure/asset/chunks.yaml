    ## Introduction


    *Unlocking Blockchain on Azure* walks through the different layers of understanding
    blockchains, from defining them in several contexts to deploying them in Enterprise
    environments. This book aims to unfold all the aspects in and around blockchains
    in the most comprehensible ways. The book envisions demystifying concepts, processes,
    and the usability of blockchains in diverse industries, such as supply chain,
    manufacturing, maritime, oil and gas, trade finance, and many more.


    ### Structure of the Book


    The first three chapters define blockchains and their components. They provide
    examples and use cases throughout to maintain relatability for readers from all
    domains. They aim to cover the breadth and depth of the concept. These chapters
    introduce the Azure Blockchain Workbench and its capabilities that leverage the
    infrastructure tools.


    The second set of three chapters explores things both internal and external to
    the decentralized platform. Here, the focus is on business developers and solution
    architects to help them make and interpret suitable decisions for their applications.
    These chapters make one aware of how to plan better for one’s business requirements
    and help one draft a better plan for development.


    Lastly, the final set of chapters open up an array of technological tools and
    architectures that may be considered based on the application. The book guides
    one to make decisions that lead to a truly decentralized process. It has a lot
    of use cases in store as you read the book. The book closes with hands-on exercises
    to review the chapters and their implementations.


    ### What You’ll Learn


    * Understanding what Azure Blockchain Service enables and its components from
    various perspectives and industries

    * Learn to design decentralized applications with the design guide of Azure Blockchain
    Service

    * Drive processes and operations through a transparent, decentralized platform
    with several configurations of setup based on requirements

    * Accelerate processes with automated smart contracts

    * Develop decentralized applications


    ### Who This Book Is For


    * **Business Developers:** Who envision improving business processes

    * **Solution Architects:** For architecting decentralized platforms such that
    isolated system setups talk to each other in a transparent connected network

    * **Developers:** To understand technological tools and DevOps with Azure Blockchain
    Service


    The source code and images can be found at the following: [`www.myraatechnologies.com/unlocking-blockchains-with-azure`](https://www.myraatechnologies.com/unlocking-blockchains-with-azure)


    ![../images/474923_1_En_BookFrontmatter_Figc_HTML.jpg](Images/474923_1_En_BookFrontmatter_Figc_HTML.jpg)


    ## Acknowledgments


    Writing this book has been a roller coaster of hands-on developments, interactions,
    explorations, and validations from diverse areas of the globe with respect to
    industries, sectors, locations, and so forth. I thank every person I have met
    on this journey who helped me envision a decentralized ecosystem with blockchains.


    I express my gratitude toward the opportunity to share my experiences on the subject
    and the trust extended to me by the acquisition editor, Smriti Srivastava, and
    her team at Apress Media. I am thankful to the technical reviewer, Jean-Luc Verhelst,
    for his valuable constructive feedback on the subject, and to Matthew Moodie for
    all the editorial clarity to make the book more comprehensible.


    Further, I truly appreciate the support my researchers at Myraa Technologies extended
    regarding technological developments in the book and the use cases. I appreciate
    my partners in several entrepreneurial initiatives to nurture a decentralized
    ecosystem.


    I am grateful for all the creative juices from Shashwath Bolar regarding the concept
    and implementation of the design of this book. I am thankful for Rhythm Jolly
    from Aditya Birla Capital for his review and feedback on how to make the concepts
    in this book more relatable for the everyday reader.


    Lastly, I thank the gems of my life—dear Mum & Dad: Usha Karkera and Shashikant
    M. Karkera—for their unconditional love and support throughout! My mother’s compassionate
    fighting spirit to overcome challenges in life and my father’s passionate advice,
    both of which I inherited, make the writings in this book truly an experience!


    ## About the Author'
