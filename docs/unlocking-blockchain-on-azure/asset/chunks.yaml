- fmt: '### Federated Byzantine Agreement


    As shown in Figure [2-3](#474923_1_En_2_Chapter.xhtml#Fig3), the public ledger
    in yellow connects everyone in the chain. The data distribution for public data
    is entirely contained on this ledger configuration. This consensus encompasses
    the principles of `FBA` (Federated Byzantine Agreement , explained later in this
    book), with its fault-tolerant capabilities. So, all the ship voyage data that
    are publicly open to all stakeholders, such as ship routes, locations, and voyage
    schedules, are openly shared across the ledger. Any stakeholder interested in
    knowing more about any voyage can then initiate the contract request to join the
    private ledger to know more about that ship voyage.


    Figure [2-4](#474923_1_En_2_Chapter.xhtml#Fig4) shows the append-only feature
    of `BBChain`, which shows every state of data on the blockchain ledger. Every
    transaction on the public chain is witnessed by all stakeholders.


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig4_HTML.jpg](Images/474923_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Public ledger records


    Similarly transparency over Voyage Statuses (Figure [2-5](#474923_1_En_2_Chapter.xhtml#Fig5)),
    type of purchases of voyage data & other actions are witnessed & validated by
    Public Chain Nodes.


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig5_HTML.jpg](Images/474923_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Public ledger records—where legit data can be purchased transparently


    The platform allows one to purchase voyage data transparently and benefits the
    rightful stakeholders, including the ship owner and data owner. You can think
    of this as a listing of air ticket options on travel websites.


    Now, the question here is, if that’s what a public ledger on a blockchain is,
    then why not just have the old-school website listings on the internet that are
    already there? Many listings, such as Monster Jobs, Expedia, and, for that matter,
    Amazon, are all out there, providing a great amount of information publicly.


    However, many times, the data on such platforms is purely controlled by only the
    companies running them. Thus, the democracy of real users is entirely ignored
    in such cases. Every time a Terms and Conditions pop-up appears, many online users
    are forced to sign it and use the centralized platform. Many times, fraudulent
    activities that are difficult to trace for the centralized platforms themselves
    cause several inconveniences, such as fake jobs, false offers, or improper products.
    The access control to manipulate the displayed data on centralized platforms is
    far more liberal as it does not need all validators to validate many times. Also,
    if no proper notification system is designed on such centralized platforms, users
    may not even know the change, thereby making the data highly mutable and less
    reliable.


    That’s where the blockchain over a public ledger brings full transparency to all
    its users to trace every data addition or transaction, knowing the source of such
    additions and approving allowing the data to pass in the first place.


    However, let’s not mistake transparency for having no privacy. That’s another
    strong aspect of blockchain that involves the encryption of data that’s distributed
    across the ledger (explained in the coming subsections).


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Figa_HTML.jpg](Images/474923_1_En_2_Figa_HTML.jpg)
    Trivia


    Name three applications that can be decentralized onto a public ledger.


    ### Proof of Stake


    The `BBChain` on a ship transmits data to the ledger network. However, not all
    of it is publicly available due to the data’s sensitivity and the ownership of
    the data. Thus, such data is an asset to the ship owner, who is a high-level stakeholder.
    They can decide to extend their data to the stakeholders they wish to share it
    with. For example, the ship owner needs to claim insurance for the ship. Here,
    the ship owner, who has a high stake in the data, can decide to create an internal
    private ledger in the form a side chain (highlighted in aqua blue in Figure [2-3](#474923_1_En_2_Chapter.xhtml#Fig3)).


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Figb_HTML.jpg](Images/474923_1_En_2_Figb_HTML.jpg)
    Challenge


    Similarly, think how your stock exchange would work over a blockchain.


    *   Enlist which datapoints go onto the public ledger and private ledger.

    *   Identify all stakeholders crucial to using this blockchain.

    *   Identify the operations required on-chain and off-chain.

    *   Enlist the on-chain operations and define the mandatory principles.

    *   Draw out the structure, operations, and stakeholders, as in Figures [2-3](#474923_1_En_2_Chapter.xhtml#Fig3),
    [2-4](#474923_1_En_2_Chapter.xhtml#Fig4), and [2-5](#474923_1_En_2_Chapter.xhtml#Fig5).


    `BBChain`''s side chain will share private information across the contracted stakeholders.
    The contract will be a digital contract that programmatically allows users to
    agree on certain points, such as the quantity of data, type, price of subscription,
    and expiry. This internal chain works on proof of stake, as only the ones who
    have significant stakes can access the chain, contribute data, and view the data
    and transactions. At the start, the ship owner will have the maximum stake for
    their ship’s data, for obvious reasons, which will be distributed based on the
    subscriptions through the initial contract to other stakeholders. The ship owner—the
    block producer—delegates certain stakes to other producers when they contribute
    in the private chain so they become subscribers that receive private data (such
    as insurance reports, audits, etc.).


    ### Proof of Importance


    After the first two configurations are set up, the proof of importance method
    is used for the transfer of data across the chain and the priority access, which
    is based on the cumulative value of transactions on the ledger for that node.
    This helps to handle high-demand traffic scenarios in the event of interest from
    several stakeholders at the same time. The nodes may gain importance, or the transaction
    may gain importance based on the amount of tokens, size of data, and traction
    of data.


    With the blend of these three mechanisms, we formed the `BBChain Protocol`.


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Figc_HTML.jpg](Images/474923_1_En_2_Figc_HTML.jpg)
    Challenge


    Design a consensus mechanism for the following applications:


    1.  Housing Society activities, such as electing members, approval of NOCs (No
    Objection Certificates), etc.

    2.  Food raw materials ledger with quality control'
