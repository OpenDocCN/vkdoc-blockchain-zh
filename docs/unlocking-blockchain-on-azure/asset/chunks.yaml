  trans: "\n11.  部署完成后，打开资源组。你会发现所有服务器元素和其他基础设施元素都已部署完毕，如图 2-13 所示。\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig13_HTML.jpg](img/474923_1_En_2_Fig13_HTML.jpg)\n\
    \n**图 2-13** 展示了构建区块链模板的基础设施元素列表\n\n该资源组拥有如图 2-14 所示的一组已启动待用的元素。\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig14_HTML.jpg](img/474923_1_En_2_Fig14_HTML.jpg)\n\
    \n**图 2-14** Azure 事件网格元素\n\n更多详情如下：\n\n-   一个 `Event Grid Topic`\n    - 在去中心化平台中，多个用户位于不同服务器之后，基于智能合约或协议/共识机制会出现某些事件触发器。因此，Azure\
    \ 提供了一个实用系统作为事件网格，用于管理链上的各种事件触发器和处理程序。`Event Grid Topic` 为事件发布者提供了一个端点，用于创建和发送事件触发器。\n\
    -   订阅者可以根据接触点的类型选择连接到 `Event Grid Topic`。\n-   `Event Grid Topic` 将其连接端点扩展到 Azure\
    \ 以及非 Azure 组件，以便链上在线和离线元素可以订阅事件触发器。\n-   将其视为事件触发器和监听器的连接器。\n-   两个虚拟网络资源组（每个都包含负载均衡器、网络安全组、公共\
    \ IP 地址、虚拟网络）\n    -   负载均衡器有助于将用户请求和其他事件触发的请求均衡分发到服务器。\n-   用于维护所有系统活动日志的 Log\
    \ Analytics 工作区。\n-   `App services` 用于承载业务应用逻辑以及基于 REST 和基于消息的 API 层。\n\n点击显示的第一个应用服务，将打开该服务的配置详细信息，您可以在其中找到分配给区块链网络的公共\
    \ URL。此外，公共 URL 可以配置为任何所需的域。就本介绍而言，我们将访问提供的默认链接。\n\n| 名称 | 类型 | 位置 |\n| --- |\
    \ --- | --- |\n| `bb-eg-hofiog` | `Event Grid Topic` | 东南亚 |\n| `bb-hofiog` |\
    \ `Application Insights` | 东南亚 |\n| `bb-hofiog` | `Key vault` | 东南亚 |\n| `Bb-hofiog`,\
    \ `bb-hofiog-api` | `App Service` | 东南亚 |\n| `Bb-lb`, `ethbb4vow-vlLb-reg1` |\
    \ `Load balancer` | 东南亚 |\n| `bb-lb-public-ip` | `Public IP address` | 东南亚 |\n\
    | `bb-plan` | `App Service plan` | 东南亚 |\n| `bb-sb-hofiog` | `Service Bus Namespace`\
    \ | 东南亚 |\n| `bb-subnet-workers-nsg` | `Network security group` | 东南亚 |\n| `Bb-vnet`,\
    \ `ethbb4vow-vnet-reg1` | `Virtual network` | 东南亚 |\n| `bb-worker-n` | `Virtual\
    \ machine scale set` | 东南亚 |\n| `db-hofiog-bb` | `SQL server` | 东南亚 |\n| `hofiog-bb`\
    \ (`db-hofiog-bb`/`hofiog-bb`) | `SQL database` | 东南亚 |\n| `ethbb4vow-akv` | `Key\
    \ vault` | 东南亚 |\n| `ethbb4vow-lbpip-reg1` | `Public IP address` | 东南亚 |\n| `ethbb4vow-oms`\
    \ | `Log Analytics workspace` | 东南亚 |\n| `ethbb4vowstore`, `hofiogbb` | `Storage\
    \ account` | 东南亚 |\n| `ethbb4vow-vlNsg-reg1` | `Network security group` | 东南亚\
    \ |\n| `poaAvailabilitySet-reg1` | `Availability set` | 东南亚 |\n| `Vl-ethbb4vow-reg1-0`,\
    \ `vl-ethbb4vow-reg1-1` | `Virtual machine` | 东南亚 |\n| `vl-ethbb4vow-reg1-0_OsDisk_1_d972feafdb584e318578647a023d402c`,\
    \ `vl-ethbb4vow-reg1-1_OsDisk_1_40add67153dd4fa8b9a8a18fc30c24b7` | `Disk` | 东南亚\
    \ |\n| `vl-nic0-reg1`, `vl-nic1-reg1` | `Network interface` | 东南亚 |\n| `Website-api-test`,\
    \ `website-ui-test` | `Availability test` | 东南亚 |\n\n-   `App Service Plan` 只是所有正在运行服务的记录，包含了应用服务，而这些服务本质上就是\
    \ Linux 服务器上的服务。\n-   应用服务的 `Application Insights` 提供服务使用情况的统计数据，如用户访问次数、服务器请求数、独立用户数、服务器响应时间等，如图\
    \ 2-15 所示。\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig15_HTML.jpg](img/474923_1_En_2_Fig15_HTML.jpg)\n\
    \n**图 2-15** `Application Insights` 仪表板\n\n-   一个 `Availability Set`\n    - 可用性集是\
    \ Azure 中提供的一种逻辑分组功能，可确保您在 Azure 数据中心内部署 VM 资源时，这些资源彼此隔离。\n-   两个 `Availability\
    \ Tests`\n    - 该测试验证应用服务 `bb-hofiog-api` 的可用性，如图 2-16 所示。\n-   这里我们有两个测试集，一个用于\
    \ API 应用服务，另一个用于 UI 层。\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig16_HTML.jpg](img/474923_1_En_2_Fig16_HTML.jpg)\n\
    \n**图 2-16** 可用性测试集\n\n-   两个 `SQL Databases`（标准 S0 层）\n    -   这些只是运行在 Ubuntu\
    \ 上的 30GiB SSD 存储服务器。\n-   为应用服务提供的两个 `Azure Key Vaults`\n    -   密钥保管库，顾名思义，有助于创建、存储、管理并符合\
    \ FIPS 140-2 Level 2 标准，并启用 SSL/TLS 证书。简而言之，它们是处理应用服务安全相关方面及其他加密密钥的工具。它们是一个一站式安全中心，无需从头重新发明轮子。`Azure\
    \ Key Vault` 的功能提供了任何企业开发和生成部署流程所需的全部强制性方面。\n-   然而，这并不意味着使用它就能确保安全。该工具必须在应用服务内正确配置，遵循为区块链定义/设计的加密标准。`Azure\
    \ Key Vault` 确保密钥永远不会从保管库中释放。我们将在下一章详细介绍加密方面。\n-   一个 `Service Bus Namespace`\n\
    -   两个 `Azure Storage accounts`（标准 LRS）\n-   两个 `Virtual Machine scale sets`（账本节点和工作台微服务）\n\
    -   可选：`Azure Monitor`\n\n如上表所示，所有基础设施元素均已创建、配置并适当互连，以支持区块链网络。第 1 列显示分配的元素名称，第\
    \ 2 列提供元素类型，第 3 列提及元素所在的区域。\n\n单击 Azure Blockchain Workbench 通过应用服务提供的公共 URL，可以打开链接看到如下页面（见图\
    \ 2-17）。\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig17_HTML.jpg](img/474923_1_En_2_Fig17_HTML.jpg)\n\
    \n**图 2-17** 应用服务面板\n\n将其复制并粘贴到 PowerShell 中，系统会要求您添加 Active AD Tenant（图 2-18）。\n\
    \n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig18_HTML.jpg](img/474923_1_En_2_Fig18_HTML.jpg)\n\
    \n**图 2-18** PowerShell 命令\n\n我在这里找到了我的 Azure AD Tenant：`supportmyraatechnologies.onmicrosoft.com`（图\
    \ 2-19）。\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig19_HTML.jpg](img/474923_1_En_2_Fig19_HTML.jpg)\n\
    \n**图 2-19** Active Directory\n\n输入信息后，将提供一个用于注册的 URL 和一次性密码（OTP），如图 2-20 所示。\n\
    \n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig20_HTML.jpg](img/474923_1_En_2_Fig20_HTML.jpg)\n\
    \n**图 2-20** 设备 OTP 注册\n\n此步骤成功注册了 PowerShell 与我的设备的使用关联，从而建立了我的设备与启动区块链元素过程的关系链接，如图\
    \ 2-21 所示。\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig21_HTML.jpg](img/474923_1_En_2_Fig21_HTML.jpg)\n\
    \n**图 2-21** 处理应用注册\n"
- fmt: "# 部署 Azure Blockchain Workbench\n\n成功配置后，它会提供应用服务链接。点击并允许应用服务的权限。这将成功启动 Azure\
    \ Blockchain Workbench。\n\n您的应用服务已设置完成，如图 [2-22](#474923_1_En_2_Chapter.xhtml#Fig22)\
    \ 所示。\n\n只需几次点击，即可准备好在 Azure Blockchain Workbench 上开发 BBChain 的环境。\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig22_HTML.jpg](Images/474923_1_En_2_Fig22_HTML.jpg)\n\
    \n**图 2-22** Azure Blockchain Workbench 已初始化并部署\n\n对于包含 37 个元素的复杂架构，传统开发方式需要耗费更多时间。使用\
    \ Azure Workbench，基础设施元素的设置、配置、连接以及彼此之间的适当关联都由 Azure Workbench 处理。\n\n请注意，在学习和实现的高级阶段，您可以在需要时手动配置元素，并将其连接到自定义域名。\n\
    \n![../images/474923_1_En_2_Chapter/474923_1_En_2_Figi_HTML.jpg](Images/474923_1_En_2_Figi_HTML.jpg)\n\
    \n**挑战**\n\n基于本章的所有示例和挑战，在启动设置时，请在脑海中选定一个区块链应用目标。对我们来说，它是 BBChain，一个用于在海上分散数据分布的区块链账本。对于读者来说，它可以是\
    \ Housing Society 区块链、投票区块链或您设想的任何其他去中心化应用。为您自己的区块链项目执行上述步骤。\n\n# 3. 区块链交易的相关方面\n\
    \n在上一章进行了大量学习和实现之后，本章将简单直接地剖析上一章中出现的元素，并附上用例。\n\n在本章中，我们将涵盖成功进行区块链交易所需的相关项目，即：\n\
    \n*   理解区块链交易中的加密和验证——加密、验证\n*   区块链中的数据、权益和操作——分发、安全性\n\n在进一步深入之前，让我们了解为什么需要这些元素。\n\
    \n*   为什么加密如此重要？\n*   为什么交易完成后验证至关重要？\n*   为什么未分发的集中式系统无法满足需求？\n\n信息是一种资产，如果未彻底保护，可能会误导或偏离业务运营、经济乃至人类。因此，让我们考虑一个名叫\
    \ XORO 的名人，他没有安全地存储个人数据。XORO 允许在一个未受保护的网站上访问他的媒体存储。黑客只需攻击 XORO 的机器或这个安全性较差的网站，即可访问公开存储的信息。黑客将这些信息发布在互联网上。这次信息泄露导致人们相信未经任何验证的、来自未知来源的谣言。此外，与该名人相关的品牌股票下跌，从而影响其他相关元素，导致整个生态系统中的多米诺骨牌效应。\n\
    \n现在，想象一下：XORO 使用区块链平台与家人共享个人信息。数据不存储在单个设备上。即使私钥也可以被加密、分割并分发到链上，从而使黑客难以访问信息。这里的黑客需要遍历整个链才能检索到一条信息，而该信息在每个节点上的加密方式都不同。此外，虚假新闻的来源很容易被质疑，因为它并非源自存储\
    \ XORO 信息的区块链。区块链提供了不可变性；即它不允许任何人修改现有数据点——必须追加才能进行更新。因此，真实信息来源的可信度得以维持。这种控制为 XORO\
    \ 合作的品牌建立了信任。利益相关者可以很容易地根据这些措施量化信任。\n\n## 加密与验证\n\n像 XORO 一样，我们在数字环境中共享大量信息，无论是银行详细信息、电影偏好还是我们访问过的地点。让我们研究\
    \ WhatsApp 以了解端到端加密，然后探索区块链的各种加密选项。\n\n密码学是一门艺术，人类长期以来一直用它来跨传统、文化和语言存储、共享和维护秘密。这门艺术在现时代转变为用于改写文本、文学和国家机密的数学方法，现在我们有了电子密钥机制的使用。\n\
    \n我们倾向于以图像、音频、视频或文本的形式与同龄人、家人或同事共享大量数据。这些数据进一步被转换为随机字母数字字符集，称为哈希函数，以避免开发人员或未授权用户以明文形式读取。\n\
    \n哈希函数是一种数学函数，当应用于相同消息时，将生成相同输出。广泛使用的一种哈希函数示例是 `SHA256`——它被比特币使用。一个 256 位模式可以表示`2^(256)`种不同消息。通过暴力破解来破解\
    \ 256 位密钥所需的计算能力是破解 128 位密钥的`2^(128)`倍。理论上，五十台每秒可检查`10^18`个 `AES` 密钥的超级计算机需要约`3×10^(51)`年才能解码密钥空间。这使得不仅人类，甚至超级计算机都几乎不可能确定两个个体之间通信的数据。\n\
    \n让我们自由聊天的一个原因是简单的指示器：聊天是端到端加密的。这就是 WhatsApp 凭借如此庞大的用户群而受欢迎的原因。让我们看看他们是如何加密的。\n\
    \n端到端加密确保发送的消息只能由发送者和接收者读取，而不能由第三方读取，甚至 WhatsApp 也无法读取。WhatsApp 给出的基本描述是，正在发送的消息被锁保护，只有接收者和发送者拥有这些锁的钥匙。为了使第三方解密更加复杂，每条消息都有一组唯一的锁和钥匙。\n\
    \n用于加密的某些术语如下：\n\n*   公钥类型\n    *   `Identity Key Pair` – 一个长期 `Curve25519` 密钥对，在安装时生成\n\
    \    *   `Signed Pre-key` – 一个中期 `Curve25519` 密钥对，在安装时生成，由身份密钥签名，并定期轮换\n    *\
    \   `One-time Pre-keys` – 一次性的 `Curve25519` 密钥对队列，在安装时生成，并根据需要补充\n*   会话密钥类型\n\
    \    *   `Root Key` – 一个 32 字节值，用于创建链密钥\n    *   `Chain Key` – 一个 32 字节值，用于创建消息密钥\n\
    \    *   `Message Key` – 一个 80 字节值，用于加密消息内容。32 字节用于 `AES-256` 密钥，32 字节用于 `HMAC-SHA256`\
    \ 密钥，16 字节用于 `IV`\n\nWhatsApp 不仅加密聊天中的文本消息，还在每个步骤包含加密，从注册过程、发起会话、接收会话、交换消息、传输媒体和其他附件到群组消息、状态以及实时位置。\n\
    \n类似地，区块链通过在每个步骤、每个节点和每笔交易中为链上的每个区块添加加密来确保类似的安全性。加密货币是在解决基于链所依据的基本原则或共识的加密方程时被挖掘出来的。\n\
    \n让我们看看比特币如何通过其加密方式处理安全性："
  raw: "On a successful provision, it provides the app service link. Click and allow\
    \ permission for the app service. This initiates the Azure Blockchain Workbench\
    \ successfully.\n\nYour app service is set up, as shown on the screen in Figure\
    \ [2-22](#474923_1_En_2_Chapter.xhtml#Fig22).\n\nThe environment set up to develop\
    \ BBChain on a Azure Blockchain Workbench is ready in a couple of clicks.\n\n\
    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig22_HTML.jpg](Images/474923_1_En_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22\n\nAzure Blockchain Workbench is initialized and deployed\n\nThe\
    \ conventional development for such a complex architecture that has 37 elements\
    \ would have taken way more time. With Azure’s Workbench, setting up the infrastructure\
    \ elements, configuring them, wiring them, and appropriately linking them with\
    \ each other is taken care by Azure Workbench.\n\nNote that in advanced stages\
    \ of learning and implementation, one can go and manually configure the elements\
    \ whenever required and wire it to a custom domain name.\n\n![../images/474923_1_En_2_Chapter/474923_1_En_2_Figi_HTML.jpg](Images/474923_1_En_2_Figi_HTML.jpg)\
    \ Challenge\n\nBased on all the examples and challenges in this chapter, pick\
    \ a blockchain application goal in your mind while initiating the setup. For us\
    \ it is BBChain, a blockchain ledger to decentralize data distributions across\
    \ maritime. For the readers, it could be Housing Society blockchains, voting blockchains,\
    \ or any other decentralization you envision. Implement the preceding steps for\
    \ your own blockchain project.\n\n# 3. Aspects of Blockchain Transactions\n\n\
    After a heavy dose of learning and implementation in the last chapter, this chapter\
    \ is a simple, straightforward breakdown of the elements that were presented in\
    \ the last chapter, along with a use case.\n\nIn this chapter, we will cover the\
    \ breadth of items that are relevant for a successful blockchain transaction;\
    \ namely, the following:\n\n*   Understanding cryptography and validations over\
    \ blockchain transactions—encryption, validation\n\n*   Data, stakes, and operations\
    \ in a blockchain—distribution, security\n\nBefore moving further, let’s understand\
    \ why we need these elements.\n\n*   Why is encryption so important?\n\n*   Why\
    \ is validation so crucial after a transaction is done?\n\n*   Why does the undistributed,\
    \ centralized system not suffice?\n\nInformation is an asset that, when not secured\
    \ thoroughly, can mislead or divert business operations, economies, and humanity.\
    \ So, let’s consider a famous person named XORO who did not store his personal\
    \ data securely. XORO allowed access to his media storage on an unprotected website.\
    \ All the hacker had to do was attack XORO’s machine or this poorly secured website\
    \ to access information sitting there openly. The hacker shared this information\
    \ on the internet. This information leak caused people to believe rumors generated\
    \ by unknown sources without any validation of the news. Further, stocks of the\
    \ brand attached to this famous figure dropped, thereby affecting other related\
    \ elements and causing the pile of dominos to fall around the entire ecosystem.\n\
    \nNow, imagine this: XORO has used a blockchain platform to share personal information\
    \ with his family members. The data is not stored on a single device. Even the\
    \ private key can be encrypted, split, and distributed on a chain, thus making\
    \ it difficult for the hacker to access the information. The hacker here would\
    \ have to loop through the entire chain to retrieve a piece of information, which\
    \ is encrypted differently at every node. Also, fake news origins can easily be\
    \ discredited as it did not originate from the blockchain that stores XORO’s information.\
    \ The blockchain provides immutability; i.e., it does not allow anyone to modify\
    \ an existing data point—one must append and make an update. Thus, the creditability\
    \ of the true information source is maintained. This control creates a trust with\
    \ the brands XORO works with. The stakeholders can easily quantify trust based\
    \ on such measures.\n\n## Encryption and Validation\n\nLike XORO, we all share\
    \ a lot of information digitally, be it bank details or movie preferences or the\
    \ places we visit. Let’s study WhatsApp to understand end-to-end encryption and\
    \ then explore various cryptographic options with blockchains.\n\nCryptography\
    \ is an art that humans have long been using to store, share, and maintain secrets\
    \ across traditions, cultures, and languages. This art got transformed to mathematical\
    \ methods that are used to reword text, literature, and national secrets in the\
    \ modern era, and now we have the usage of electronic key mechanisms.\n\nWe tend\
    \ to share a lot of data with our peers, family, or co-workers in the form of\
    \ images, audio, video, or text. These are further converted into a random set\
    \ of alphanumeric characters known as hash functions to avoid plain-text readability\
    \ on the part of developers or unauthorized users.\n\nA hash function is a mathematical\
    \ function that, when applied on the same message, will generate the same output.\
    \ One such example of a hash function that is widely used is SHA256—it is used\
    \ by Bitcoin. A 256-bit pattern can represent 2^(256) different messages. Breaking\
    \ a 256-bit key by brute force requires 2^(128) times more computational power\
    \ than a 128-bit key. Fifty supercomputers that could check a billion billion\
    \ (10^18) AES keys per second would, in theory, requires about 3×10^(51) years\
    \ to decode the key space. This makes it almost impossible for not just a human\
    \ but also a supercomputer to determine the data communicated between two individuals.\n\
    \nOne thing that makes us comfortable to chat freely is the simple indicator that\
    \ the chat is end-to-end encrypted. That’s what made WhatsApp popular with such\
    \ a large user base. Let’s see how they encrypt.\n\nEnd-to-end encryption ensures\
    \ that a message sent can only be read by the sender and the receiver and not\
    \ by a third party, not even WhatsApp. A basic description given by WhatsApp states\
    \ that the message being sent is secured with locks, and only the recipients and\
    \ the sender have the key to these locks. Making it more complex for the third\
    \ party to decrypt, every message has a unique set of lock and key.\n\nCertain\
    \ terms used for the encryption are as follows:\n\n*   Public key types\n    *\
    \   Identity key pair – A long-term Curve25519 key pair, generated at install\
    \ time\n\n*   Signed pre-key – A medium-term Curve25519 key pair, generated at\
    \ install time, signed by the identity key, and rotated on a periodic timed basis\n\
    \n*   One-time pre-keys – A queue of Curve25519 key pairs for one-time use, generated\
    \ at install time, and replenished as needed\n\n*   Session Key Types\n    * \
    \  Root key – A 32-byte value that is used to create chain keys\n\n*   Chain Key –\
    \ A 32-byte value that is used to create message keys\n\n*   Message Key – An\
    \ 80-byte value that is used to encrypt message contents. 32 bytes are used for\
    \ an AES-256 key, 32 bytes for a HMAC-SHA256 key, and 16 bytes for an IV.\n\n\
    WhatsApp not only encrypts the text messages inside the chat, but also includes\
    \ encryption at every step, from the registration process, initiating sessions,\
    \ receiving sessions, exchanging messages, transmitting media and other attachments\
    \ to group messages, and statuses, to live locations.\n\nSimilarly, blockchain\
    \ ensures similar security with encryption embedded at each step for every addition\
    \ of blocks across the chain, across every node and every transaction. Cryptocurrencies\
    \ are mined on solving cryptographic equations based on the fundamental principle\
    \ or consensus the chain works on.\n\nLet’s see how Bitcoin handles security with\
    \ its encryptions:"
