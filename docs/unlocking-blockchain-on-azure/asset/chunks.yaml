    12.  检查交易记录（图 4-19）。


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig19_HTML.jpg](img/474923_1_En_4_Fig19_HTML.jpg)


    *图 4-19* 交易记录的账本


    13.  为指定的货运 ID 创建一笔货运交易（图 4-20）。


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig20_HTML.jpg](img/474923_1_En_4_Fig20_HTML.jpg)


    *图 4-20* 调用创建货运


    14.  上传承运人收据（图 4-21）。


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig21_HTML.jpg](img/474923_1_En_4_Fig21_HTML.jpg)


    *图 4-21* 承运人的上传确认该货物正在其运输途中


    15.  平台会验证所有收据和翻译。如果收据存在欺诈，提交前会报错（图 4-22）。


    ![../images/474923_1_En_4_Chapter/474923_1_En_4_Fig22_HTML.jpg](img/474923_1_En_4_Fig22_HTML.jpg)


    *图 4-22* 如果详细信息不匹配，验证失败，从而避免欺诈数据


