    ### 海上保险


    2017 年，四大会计师事务所之一的`EY`与软件安全公司`Guardtime`联合发布了全球首个针对海上保险领域的区块链平台。该平台的开发与推出是与`A.P.
    穆勒-马士基集团`、`ACORD`、`微软`、`MS Amlin`、`韦莱韬悦`及`XL Catlin`通力合作的结果。这些合作伙伴在经过长达二十周的严格`概念验证`后共同采取了这一举措。


    该平台基于`Microsoft Azure`全球云技术构建，是保险业首个此类平台，其分阶段部署旨在覆盖海运业端到端的应用场景。


    这一全球化平台将海运客户、保险经纪人、保险公司及第三方连接到分布式共享账本，帮助获取关于身份、风险因素和风险敞口的数据。随后，平台将这些信息与保险合同整合。该平台能够创建并维护来自多方的资产数据，将数据关联至保单合同；接收并处理导致定价或业务流程变更的信息；连接客户资产、交易和支付；以及捕获并验证最新的首次通知或损失数据。


    `EY`保险业务负责人`肖恩·克劳福德`的一段引述表明：


    > *区块链改变保险生态系统的潜力始终清晰可见。我们所做的是将潜力变为现实。该解决方案首次将区块链的透明度、安全性和标准化应用于海上保险，并已准备投入商业使用。我们期待在整个海上保险行业部署这项技术，并正在探索这些成果与洞察将如何应用于其他专业保险市场及更广泛的领域。*


    该平台部署于整个海上保险行业生态系统，其构建愿景是应对复杂系统带来的挑战——这些系统涉及多方参与、多重规则、工作重复、数据数字化采集缺失，以及大量对账问题。此前的这些问题导致数据访问不透明、数据无法与链条其他环节关联、保险公司承保风险评估不够精确，以及上述问题相关的模型优化困难。


    `A.P. 穆勒-马士基集团`2017 年风险与保险负责人`拉尔斯·亨内贝格`的言论指出，风险理解与评估的问题与区块链技术具有契合度或解决潜力，从而让各方都受益。他的原话是：


    > *利用技术简化和自动化我们与保险市场的互动是我们的优先事项。目前的保险交易过于繁琐且摩擦重重。风险与资本之间的距离实在太远了。区块链技术有望推动这一期待已久的理想发展。*


    保险公司可以利用该区块链平台优化资本配置、提升效率，同时提高透明度，减少人工数据录入、对账及管理成本。该平台基于`无密钥签名基础设施`（即`KSI`平台）构建。


    不仅是海运业，整个保险业都能从区块链技术中受益，因为它既能带来透明度，又能消除耗时的操作，同时降低成本。这一系列优势使风险评估更加精准、更具实时性。


    引用`Microsoft Azure`首席技术官`马克·鲁西诺维奇`的话，我们可以看出：


    > *微软认为区块链是一种变革性技术，能够显著降低商业摩擦，特别是简化跨组织的共享业务流程。海上保险正是可以通过区块链优化的复杂业务流程的典型例子。我们始终致力于将区块链引入企业，并很高兴与
    EY、Guardtime 及其他行业专家合作，开发和部署由 Microsoft Azure 支持的区块链解决方案。*


    目前，由于该技术带来的所有权属性和透明度，区块链在银行和金融服务领域的应用场景日益增多。贸易融资的首个案例已得到良好推广，如今，贷款及保险业也正在探索区块链的潜力。

    '
- fmt: '# Maritime Marketplace


    Exploring another use case, one a little more on the technical side as we will
    explain the buildup of infrastructure and the flow of sequences, let’s discuss
    the case of a marketplace for the maritime industry.


    Like any other online marketplace that has completely changed our shopping habits,
    consumer behavior, and patterns involving spending money, the maritime marketplace
    has seen changes, but within the context and constraints of the ecosystem.


    Unlike traditional blockchains, where all stakeholders are part of every transaction
    or validation on public ledgers, a hybrid chain of private and public ledgers
    would be suitable to run a maritime marketplace. On such a platform, one could
    purchase goods overseas, such as machinery, metals, chemicals, container ships,
    oil and gas, maintenance parts, and so on.


    Decentralized ledger technology maintains the proof of transaction and traces
    the credibility of doing business and trade on-chain. Complying with the best
    trade practices on-chain enables high credit ratings due to on-time deliveries,
    timely fulfillment, and proper procurement procedures. Stakeholders may gain access
    to credit guarantees from banks involved in the trade finance of such an ecosystem.


    The architecture was designed in such a way that all customers/users of the ledger
    reside on the public chain (public to the company and its approved stakeholders
    only) to avail themselves of general listing information. The transactions between
    relevant stakeholders are conducted in a private chain.


    The public ledger consensus works on Byzantine Fault Tolerance (BFT), whereas
    the private ledger is governed by the delegated proof of stake, where the initiator/block
    producers have a high stake through delegation and can share adequate stakes with
    other stakeholders of the transaction to conduct the business contract.


    The contract state is stored on the private ledger, and the transaction directive
    is done through DAG (directed acyclic graph). This ensures that the transaction
    is super-fast and the storage is decentralized securely between only the relevant
    stakeholders.


    The organization receives a graph view of all transactions across the hybrid chain
    instantaneously (Figure [9-8](#474923_1_En_9_Chapter.xhtml#Fig8)), thereby allowing
    it to delegate stakes so as to grant various access control rights to involved
    stakeholders.


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig8_HTML.jpg](Images/474923_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Transactions on-chain: side chains


    Steps to develop such a marketplace via blockchains are shown in the following
    table. (Remember: As technologists and early adopters of blockchains, the cost
    to pilot them has to be minimalistic, since there is a cost of improvisation,
    education, and engagement for all stakeholders)


    | PROCESS | BLOCKCHAIN FEATURES |

    | --- | --- |

    | Foundation | • Hybrid chain—role based• `Azure`-based environments for fast
    deployments• `BFT` for public blockchains and `PoS` for private blockchains |

    | Availability Check | • Ledger integration with `POS`• Decentralized ingestion
    of data• Validators and copy check• Distributed availability checker• Real-time,
    private chain creation based on availability and suitability |

    | Order Process | • Smart contract generation• Transaction conditions based on
    contract status• Event registers for contract status• Smart contract trigger events• System
    alerts for smart contract stakeholders |

    | Delivery Process | • Proof of work by document upload• Validators for confirmation• Auto-notification
    alert• `MOSCORD` auto checker by `BFT`• `PO` proof on immutable ledger |

    | Invoice Process | • Platform invoice generator integration with smart contracts• Term
    translation and actions• Maintain copy on private ledger• Maintain validators
    |

    | Payment Process | • `ETH` which is Ethereum’s native currency transaction/`Hyperledger`
    native currency value set up• Real-time financial transaction on private chain
    |


    Such a decentralized platform could enable a decentralized marketplace, where
    the policies are governed by the consensus of the validating stakeholders. The
    flow of onboarding stakeholders to the platform would be to add the aggregators
    of suppliers and their product offerings. The platform would enable direct peer-to-peer
    trade and also allow network-based trade, where the network regulates and validates
    the smart contract. This would enforce close control of fraudulent activities
    and reduce defaults. To design the smallest pilot, one should consider a private
    chain of one buyer and two suppliers, along with the set of regulatory nodes participating
    in the trade. Here, the block of data would be for the purchase of machinery parts,
    power tools, and safety items that are crucial for delivery. The trade deal on-chain
    would be initiated by a smart contract. If all on-chain activities fulfilled the
    conditions of the smart contract, it would quickly facilitate the payments. In
    the case of an incorrect supply delivery, the conditions of the smart contract
    would not trigger, and it would require the alternate clause of the smart contract
    to be executed. As developers of smart contracts, one must ensure all cases are
    covered. As solution architects, we must ensure the platform does not have any
    loopholes, and as business developers, defining such use cases is most crucial.


    The patterns of fulfilling or defaulting on such smart contracts generate the
    credit risk valuation of the stakeholders, thereby allowing a fair valuation via
    a predictive approach that helps banks provide correct letters of credit and bank
    guarantees. This helps to reduce trade losses as well as fraudulent activities.'
