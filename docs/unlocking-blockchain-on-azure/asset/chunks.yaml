  raw: '#### Proof of Work


    Activities on-chain:


    *   Land registry and underwritings


    *   Ownership and sectoring of land


    *   Adding users on submission of documents and validation by peers


    *   Request for join budgets and cost claims on upload of receipts such as property
    tax, electricity, and water


    *   Profit share can be initiated when revenue crosses 2x of investments as per
    smart contract


    Advantages:


    *   On-chain decisions have tamper-proof records of all activities for new users
    to preview.


    *   Paper trail of all transactions can be found on-chain.


    Limitations:


    *   John cannot sell the land to any random user till he has all the conditions
    of the smart contract fulfilled and validated by peers.


    *   Tom, who works after hours for the farm, does not get profit-share returns
    until the consensus clause is fulfilled.


    *   Ron wants to expand his courtyard for parties and weddings but cannot do so
    until validation across the chain is met.


    *   Joe, who works full time, wishes to hire more people on the farm but cannot
    do so until he gains validation from all.


    Now that we have evaluated one form of consensus for this set of activities, list
    out activities and their suitability to the mentioned form of consensus. Remember,
    as a part of studying, developing, and forming blockchains, one is free to design
    as required with the choice best suited to the scenario.


    #### Proof of Stake


    Activities using this form of consensus are purely based on the stake of ownership
    in the unsectored land. It requires the block proposer to gain validation from
    the high-stake holders through the voting mechanism based on the weight of stakes.


    If validator nodes based on their weight form the majority, the block transaction
    is allowed.


    For example:


    `If`


    W1 x1 + W2 x2 + W3 x3 + W4 x4 + W5 x5 > 60%


    `then`


    *   `Allow block transaction activities`


    where weights are proportional to the actual stakes.


