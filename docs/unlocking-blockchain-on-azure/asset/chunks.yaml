  trans: "\n[`https://docs.google.com/document/d/1GBNlHfLrd0orOKJHedhBSRX43xgokF9GA7ZIb3ljX04/edit?usp=sharing`](https://docs.google.com/document/d/1GBNlHfLrd0orOKJHedhBSRX43xgokF9GA7ZIb3ljX04/edit%253Fusp%253Dsharing)\n\
    \n根据您的配置，这些节点可以是本地节点，也可以是 Azure 实例。让我们来看看 Solidity 智能合约的语法格式。\n\n例如，我们为制造商设计了以下智能合约：\n\
    \n```\npragma solidity ⁰.5.4;\ncontract Manufacturer {\n//Definitions of Users,\
    \ Objects & States\naddress public manufacturer;\naddress public vendor;\naddress\
    \ public owner;\naddress public car;\nuint public constant price = 4 wei;\nstruct\
    \ car1{\nstring cModel;\nuint cRegNo;\nstring cLicensePlate;\n}\nmapping (address=>\
    \ uint)public balanceOf;\ncar1 carDetail;\n//Function Definitions\nfunction setCar(string\
    \ memory _cModel, uint _cRegNo, string memory _cLicensePlate)public{\n//storing\
    \ data in struct\ncarDetail.cModel= _cModel;\ncarDetail.cRegNo= _cRegNo;\ncarDetail.cLicensePlate=\
    \ _cLicensePlate;\n}\nfunction getCar() view public returns(string memory, uint,\
    \ string memory) {\nreturn (carDetail.cModel, carDetail.cRegNo, carDetail.cLicensePlate);\n\
    }\nstruct manufacturer1{\nuint mAge;\nstring mName;\nstring mAddress;\n}\nmapping(address\
    \ => manufacturer1) manufacturerDetails;\nmanufacturer1 manufacturerDetail;\n\
    constructor ()public payable\n{\nmanufacturer = msg.sender;\n//initialize\nbalanceOf[manufacturer]\
    \ = 0;\n}\nfunction setManufacturer(address manufacturer, uint _mAge, string memory\
    \ _mName, string memory _mAddress)public{\n//storing data in struct\nmanufacturerDetail.mAge=\
    \ _mAge;\nmanufacturerDetail.mName= _mName;\nmanufacturerDetail.mAddress= _mAddress;\n\
    }\nfunction getManufacturer(address manufacturer) view public returns (uint, string\
    \ memory, string memory) {\nreturn (manufacturerDetail.mAge, manufacturerDetail.mName,\
    \ manufacturerDetail.mAddress);\n}\n// State management\nenum State1{Created,\
    \ Locked, Inactive}\nState1 public state1;\nmodifier inState1(State1 _state) {\n\
    require(state1 == _state);\n_;\n}\nevent PurchaseConfirmed1();\nevent ItemReceived1();\n\
    }\n```\n\n智能合约的构造主要分为三个部分：\n\n1.  变量定义——用户、对象和状态\n2.  函数定义——读写操作及其访问权限\n3.  基于事件触发器更新状态变量\n\
    \n在前面的代码中，我们首先为制造商初始化了一个合约。其中，变量定义包括与之交互的利益相关者，以及在其端开发的诸如 `Car` 之类的对象。\n\n地址映射到用户节点。数据块（例如制造汽车的状态）根据函数进行初始化。这些函数使得能够生成\
    \ `Car` 记录及其状态和制造商详细信息。\n\n一旦事件被触发，`Car` 对象的状态会根据合约进行购买和接收的更新。在这些事件触发器的作用下，制造商的余额可能会更新，汽车的所有权也可能会被登记。\n\
    \n请注意，本章的重点不是 Solidity 的语法，而是设计此类智能合约的能力。语言可以是任何语言——C++、Python、Solidity——具体取决于应用程序、业务前提和开发人员的能力。\n\
    \n请继续详细描述一个新的用例，涉及食品、就业、保修或其他纸质合约从未奏效的领域。\n\n## 练习\n\n思考一下当前家中食品供应场景中存在的问题。\n\n\
    1.  写下您面临的挑战，例如质量不佳、食物浪费、供应不足、喷施农药、人造食品或来源不明。选择一个。\n2.  确定为您处理此食品供应的利益相关者。例如，可能是您的超市、在线商店或附近的农场，或者是送货员、农民、零售商、批发商等。\n\
    3.  构建一个代表所有这些利益相关者的区块链框图。\n4.  安排与步骤 1 中选定挑战相关流程的链接。例如，如果挑战是食物浪费，则将房屋的库存节点链接到其他快速消耗的房屋。\n\
    5.  链接好链条后，确定链的类型——公有链、私有链或联盟链——并据此安排链接关系。\n6.  在链中，决定需要达成共识的事件以及共识的类型。\n7.  如果基于所有利益相关者必须同意、实施或维护数据的一组预定义规则，请创建规则和条件的流程图。\n\
    \n例如，如果挑战是食品质量，则将从种植区到分销商再到配送的所有利益相关者链接起来，以跟踪生长条件、新鲜度时间，并在区块链上链接的每个节点安装摄像头（物联网\
    \ + 区块链）。如果配送节点需要将食品温度维持在 4 度，则传感器节点可以实时更新区块链，供所有利益相关者查看此数据。\n\n8.  当数据添加到区块链时，智能合约必须成功地遍历整个链上的数据以形成共识。如果数据（在前面的示例中）违反了合约上的规则，则买方会自动拒收该食品，因为供应商未能维持智能合约中规定的条件。\n\
    \n# 区块链的集成点\n\n在本章的现阶段，我们将探索区块链的外部与内部交互。交互可以涵盖从元数据获取、用户引导，到连接区块链应用生态系统的所有环节。这有助于我们专注于集成点，这些集成点对于实现利用真正去中心化平台优势的无缝工作流程至关重要。\n\
    \n这里，重点不在于技术本身，而在于考虑区块链技术之前就已存在的流程。当您在本书前半部分逐渐了解区块链是什么时，后半部分将帮助您可视化其针对身边挑战的实施和执行。请关注现有的中心化平台、人员操作和线下实践，并仔细重新审视每一个环节。旧有实践中的每个痛点都将帮助您确定连接到区块链的正确接入（数据）点。\n\
    \n我们将重点关注四个重要的集成点，它们在实施中会带来重大变革：\n\n*   **数据源获取** – 与现有系统的企业集成\n*   **用户引导** –\
    \ 合规与监管要求\n*   **授权** – 访问控制与安全权限\n*   **自动化** – 智能合约自动触发/告警的流程\n\n    ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig1_HTML.png](img/474923_1_En_6_Fig1_HTML.png)\n\
    \n    **图 6-1** 框架：区块链实施的集成点\n"
- fmt: "# Data Sourcing: Enterprise Integration with Existing Systems\n\nOne of the\
    \ prime reasons to learn how to use blockchains with Microsoft Azure is that it\
    \ brings you the complete infrastructure for this point of integration at an Enterprise\
    \ level. The `Azure Blockchain Workbench` allows for a completely agnostic set\
    \ of options for various types of blockchains and their integration with companies\
    \ based on existing IT ecosystems and workflows.\n\nWith large-scale enterprises\
    \ becoming more and more data driven, using the correct decentralized practices\
    \ in digital form has become of utmost importance and drives business decisions.\
    \ And as organizations across industries would have a varied use case for a blockchain\
    \ application and a very different IT architecture built to cater to its functioning,\
    \ Microsoft Azure comes in as a bridge that can accommodate both of these challenges.\
    \ And as organizations get more and more data driven with a lot of aspects of\
    \ their operations digitizing, the constant tussle of centralizing vs decentralizing\
    \ shall continue and grow even further. Hence a tool like Microsoft Azure enables\
    \ organization an easy and sustainable way to decentralize their processes effectively\
    \ without entirely disturbing existing operations over the Enterprise Tools that\
    \ were being used before Blockchains.\n\nConsider a 10,000-person organization.\
    \ The CIO wishes to make business decisions based on company strengths and weaknesses.\
    \ However, the reporting of this is not very transparent, as there is a hierarchical,\
    \ non-tangible process by which to derive this data offline. To avoid biases,\
    \ companies integrate productivity measures in digital form; for example, the\
    \ number of sales visits, number of converts, value of business, and so forth.\
    \ These measures existed long before technological tools were introduced. However,\
    \ with blockchains the process to trace and track these measures has become more\
    \ transparent and tangible. So, when all actions update on a chain, decision-making\
    \ can be a closed-loop online activity that measures and drives impact.\n\nWith\
    \ this need to be connected to the stakeholders of the business—be it employees,\
    \ clients, or suppliers—in tangible, traceable forms that are immutable, decentralized,\
    \ and secure, blockchains are an obvious Enterprise requirement. The `Azure Blockchain\
    \ Workbench` facilitates the smooth integration of Microsoft environments with\
    \ the various elements of blockchains.\n\nLet us see the variants of data sourcing\
    \ that require different forms of integration. Data in Enterprises may be of the\
    \ following types:\n\n* **Structured** – Databases, CSV files, etc.\n* **Unstructured**\
    \ – Speech recordings, image scan documents\n* **B2B** – Business-to-business\
    \ data flow\n* **B2C** – Business and consumer data\n* **Crowd-sourced** – Such\
    \ as Wikipedia\n* **Different volumes** – Varying scales of data\n\nBased on the\
    \ type of data and the processes around the data, the mode of integration is selected.\n\
    \nIn this chapter, we will focus on the most common form of structured data found\
    \ in Enterprises across various domains.\n\n## Structured Data Sources\n\nEvery\
    \ platform requires metadata to initiate decentralization of any process as well\
    \ as towards storage of information across the distributed ledger. For instance,\
    \ before blockchaining the KYC (Know Your Customer) process for a financial institution,\
    \ one must source the existing data from the centralized software platforms. Most\
    \ enterprises rely on smooth transitions before investing in any new technology.\
    \ Based on this common expectation before adoption of Blockchains, `Azure SQL\
    \ Databases`, one of the most widely used databases, supports easy integrations\
    \ for smoother migrations from Legacy Software to the adoption of Blockchains.\
    \ This integration allows to source the metadata to the platform seamlessly. The\
    \ flow of structured data could occur in various forms:\n\n* Connectivity to backend\
    \ systems and existing platforms, such as Microsoft Dynamics 365, which may run\
    \ ERPs and CRM applications in the organization. In such software, SQL servers\
    \ are used, which can be smoothly integrated with the blockchains for data-sourcing\
    \ purposes (Figure [6-2](#474923_1_En_6_Chapter.xhtml#Fig2)).\n\n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig2_HTML.png](Images/474923_1_En_6_Fig2_HTML.png)\n\
    \n  **Figure 6-2**  \n  Data sourcing from Azure SQL Database servers to Azure\
    \ blockchains\n\n* Certain activities may be on the chain and certain are allowed\
    \ to be off chain. When the impact of blockchains does not affect the storage\
    \ of data for reporting or display purposes (non-audit related), storage onto\
    \ SQL can easily be off-loaded (Figure [6-3](#474923_1_En_6_Chapter.xhtml#Fig3)).\n\
    \n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig3_HTML.png](Images/474923_1_En_6_Fig3_HTML.png)\n\
    \n  **Figure 6-3**  \n  Delivery of data from distributed ledgers to off-chain\
    \ databases, such as SQL servers on Azure\n\n* Bi-directional flow of data based\
    \ on different purposes and triggers. Blockchains may store on SQL servers non-trivial\
    \ data that could be used for intermediate reporting and analytics.\n\n* SQL servers\
    \ may invoke different logic apps and event triggers in the `Azure Blockchain\
    \ Workbench` whenever the threshold of data limiters is crossed, as defined in\
    \ the smart contracts or consensus algorithms (Figure [6-4](#474923_1_En_6_Chapter.xhtml#Fig4)).\n\
    \n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig4_HTML.png](Images/474923_1_En_6_Fig4_HTML.png)\n\
    \n  **Figure 6-4**  \n  Shared set of action items in terms of data distribution\
    \ for different purposes\n\n## Connectivity and Definition of SQL Integrations\
    \ with Blockchains\n\nThere are two steps in this process:\n\n1. **Establishing\
    \ connectivity.** The `SQL Server Management Studio` provides a preview of the\
    \ SQL storage in the `Blockchain Workbench`. Before defining the database schema,\
    \ you can see the changes in data flow. The basic step of integration is to set\
    \ up the right set of IP addresses for the blockchain nodes and the SQL server.\
    \ Then you must enable the Read-Write settings based on the directional flow of\
    \ data.\n\n2. **Defining database views, application views, application role views**\
    \ such as buyers and sellers, user allocation to the application user, and the\
    \ connection status of the application user.\n\nOther ERP integrations involving\
    \ `PowerBI`, `SAP`, and `Excel` could also be sourced to fit the blockchain ecosystems."
  raw: "## Data Sourcing: Enterprise Integration with Existing Systems\n\nOne of the\
    \ prime reasons to learn how to use blockchains with Microsoft Azure is that it\
    \ brings you the complete infrastructure for this point of integration at an Enterprise\
    \ level. The Azure Blockchain Workbench allows for a completely agnostic set of\
    \ options for various types of blockchains and their integration with companies\
    \ based on existing IT ecosystems and workflows.\n\nWith large-scale enterprises\
    \ becoming more and more data driven, using the correct decentralized practices\
    \ in digital form has become of utmost importance and drives business decisions.\
    \ And as organizations across industries would have a varied use case for a block\
    \ chain application and a very different IT architecture built to cater to its\
    \ functioning, Microsoft Azure comes in as a bridge that can accommodate both\
    \ of these challenges. And as organizations get more and more data driven with\
    \ a lot of aspects of their operations digitizing, the constant tussle of centralizing\
    \ vs decentralizing shall continue and grow even further. Hence a tool like Microsoft\
    \ Azure enables organization an easy and sustainable way to decentralize their\
    \ processes effectively without entirely disturbing existing operations over the\
    \ Enterprise Tools that were being used before Blockchains.\n\nConsider a 10,000-person\
    \ organization. The CIO wishes to make business decisions based on company strengths\
    \ and weaknesses. However, the reporting of this is not very transparent, as there\
    \ is a hierarchical, non-tangible process by which to derive this data offline.\
    \ To avoid biases, companies integrate productivity measures in digital form;\
    \ for example, the number of sales visits, number of converts, value of business,\
    \ and so forth. These measures existed long before technological tools were introduced.\
    \ However, with blockchains the process to trace and track these measures has\
    \ become more transparent and tangible. So, when all actions update on a chain,\
    \ decision-making can be a closed-loop online activity that measures and drives\
    \ impact.\n\nWith this need to be connected to the stakeholders of the business—be\
    \ it employees, clients, or suppliers—in tangible, traceable forms that are immutable,\
    \ decentralized, and secure, blockchains are an obvious Enterprise requirement.\
    \ The Azure Blockchain Workbench facilitates the smooth integration of Microsoft\
    \ environments with the various elements of blockchains.\n\nLet us see the variants\
    \ of data sourcing that require different forms of integration. Data in Enterprises\
    \ may be of the following types:\n\n*   Structured – Databases, CSV files, etc.\n\
    \n*   Unstructured – Speech recordings, image scan documents\n\n*   B2B – Business-to-business\
    \ data flow\n\n*   B2C – Business and consumer data\n\n*   Crowd-sourced – Such\
    \ as Wikipedia\n\n*   Different volumes – Varying scales of data\n\nBased on the\
    \ type of data and the processes around the data, the mode of integration is selected.\n\
    \nIn this chapter, we will focus on the most common form of structured data found\
    \ in Enterprises across various domains.\n\n### Structured Data Sources\n\nEvery\
    \ platform requires metadata to initiate decentralization of any process as well\
    \ as towards storage of information across the distributed ledger. For instance,\
    \ before blockchaining the KYC (Know Your Customer) process for a financial institution,\
    \ one must source the existing data from the centralized software platforms. Most\
    \ enterprises rely on smooth transitions before investing in any new technology.\
    \ Based on this common expectation before adoption of Blockchains, Azure SQL Databases,\
    \ one of the most widely used databases, supports easy integrations for smoother\
    \ migrations from Legacy Sofwares to the adoption of Blockchains. This integration\
    \ allows to source the metadata to the platform seamlessly. The flow of structured\
    \ data could occur in various forms:\n\n*   Connectivity to backend systems and\
    \ existing platforms, such as Microsoft Dynamics 365, which may run ERPs and CRM\
    \ applications in the organization. In such software, SQL servers are used, which\
    \ can be smoothly integrated with the blockchains for data-sourcing purposes (Figure\
    \ [6-2](#474923_1_En_6_Chapter.xhtml#Fig2)).\n\n    ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig2_HTML.png](Images/474923_1_En_6_Fig2_HTML.png)\n\
    \n    Figure 6-2\n\n    Data sourcing from Azure SQL Database servers to Azure\
    \ blockchains\n\n*   Certain activities may be on the chain and certain are allowed\
    \ to be off chain. When the impact of blockchains does not affect the storage\
    \ of data for reporting or display purposes (non-audit related), storage onto\
    \ SQL can easily be off-loaded (Figure [6-3](#474923_1_En_6_Chapter.xhtml#Fig3)).\n\
    \n    ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig3_HTML.png](Images/474923_1_En_6_Fig3_HTML.png)\n\
    \n    Figure 6-3\n\n    Delivery of data from distributed ledgers to off-chain\
    \ databases, such as SQL servers on Azure\n\n*   Bi-directional flow of data based\
    \ on different purposes and triggers. Blockchains may store on SQL servers non-trivial\
    \ data that could be used for intermediate reporting and analytics.\n\n*   SQL\
    \ servers may invoke different logic apps and event triggers in the Azure Blockchain\
    \ Workbench whenever the threshold of data limiters is crossed, as defined in\
    \ the smart contracts or consensus algorithms (Figure [6-4](#474923_1_En_6_Chapter.xhtml#Fig4)).\n\
    \n    ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig4_HTML.png](Images/474923_1_En_6_Fig4_HTML.png)\n\
    \n    Figure 6-4\n\n    Shared set of action items in terms of data distribution\
    \ for different purposes\n\n### Connectivity and Definition of SQL Integrations\
    \ with Blockchains\n\nThere are two steps in this process:\n\n1.  Establishing\
    \ connectivity. The SQL Server Management Studio provides a preview of the SQL\
    \ storage in the Blockchain Workbench. Before defining the database schema, you\
    \ can see the changes in data flow. The basic step of integration is to set up\
    \ the right set of IP addresses for the blockchain nodes and the SQL server. Then\
    \ you must enable the Read-Write settings based on the directional flow of data.\n\
    \n2.  Defining database views, application views, application role views such\
    \ as buyers and sellers, user allocation to the application user, and the connection\
