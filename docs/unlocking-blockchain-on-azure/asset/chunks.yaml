    (containing servers, databases) to front end (UX, HTML, JavaScript). Similarly,
    smart contracts form the front-end elements that are written with programming
    languages such as Solidity, Vyper, Serpent (closer to the backend operations),
    and LLL. However, these languages are fairly new and are continuously evolving
    based on application demands.


    Thus, in this chapter, the focus will be on the underlying logic used by these
    programming languages to design and develop intuitive smart contracts in various
    decentralized apps. So, let’s review how a smart contract can be used in our real
    lives, which is not limited to machines, computers, laptops, and smartphones.


    ## Real-life Smart Contracts


    Houses, homes, properties, buildings, and bungalows—shelter is a basic necessity
    for all humans. General legal contracts are made over every transaction to gain
    shelter, be it buying a house or renting a home or leasing shops or investing
    in properties. Legal contracts have been traditionally done on paper, though recently
    have moved into digital forms that are governed by the law. Civil courts are responsible
    for resolving disputes over breaches of contract so as to execute rightful actions.
    This process is a long iteration of various stakeholders fighting to have a just
    outcome for several details.


    ### Case Purchase of Property


    **Issues with Traditional Methods**: The buyer is interested in purchasing an
    apartment in a building. The building is due to be completed by 2020, as promised
    by the builder. The buyer initiates payment installments as per the builder’s
    terms and conditions, noted when signing the contract. At one point, 80 percent
    of the cost has been paid, and suddenly the builder is unable to deliver even
    by 2021\. This causes a severe loss of time and money as well as instability for
    the buyer. This situation has inconvenienced thousands of home buyers. To resolve
    it, lawsuits, negotiations, and a lot of court visits are required to discuss
    the legal terms and conditions and the different inferences and pleas over the
    contextual meaning of the contract. After a long iteration of months and sometimes
    years, justice may or may not be served.


    Now, imagine the blockchain version of this ecosystem. The house is an asset of
    the owner. It is digitized not just through a paper or an online contract but
    also in the form of a digital lock and key to the house. This security system
    protecting the house could be a node in the blockchain. When the buyer buys the
    house from the builder, the node access is provided to the rightful owner based
    on the fulfillment of the conditions of the smart contract, enabling physical
    access as well. Actions taken by the stakeholders get auto-triggered to make timely
    installments from the buyer and timely services by the service providers (builder);
    ownership can be transferred in real time upon making the final payment, and the
    node access of the house is transferred to the buyer. The deal is decentralized
    and witnessed by other node stakeholders on the chain. Also, the audit trail and
    the state of records are maintained transparently on the blockchain throughout.


    This leads to a completely transparent process that records every state of the
    transactions involved and automates contracts based on executable clauses. The
    end users experience a seamless agreement that is tamper-proof, immutable, and
    auto-enforceable.


    **Smart Contracts Solution in Real Estate** : The buyer initiates interest in
    a digital asset (house-key node that is linked to the physical asset through IoT
    and blockchain setup) on a blockchain. This blockchain is a hybrid ledger consisting
    of nodes representing builders, housing groups, brokers, and buyers on a public
    chain (similar to an e-commerce platform but a different arrangement since the
    rules of the platform are not governed by just one centralized body). The participants
    on the chain are independent entities and can participate in the on-chain activities.
    In case a buyer, on reading the information from the public ledger of real estate,
    is interested in a property from a housing group, a private permissioned chain
    is formed with the relevant stakeholders. In this private chain, the stakeholders
    decide on the conditions on a smart contract and agree on the automatic execution
    of the conditions as per the smart contract. So, in this case, when a buyer pays
    installments through the private ledger, the stake of the house node is being
    transferred proportionately. This is exactly what can be programmed. On completion
    of payment, the digital asset is transferred in real time to the owner without
    any delay. This is unlike the traditional method of a check, the funds from which
    may not get transferred for days, and the building company may take some time
    to figure out the exact status of the funds transferred into their account. Alternatively,
    the other condition that can be programmed in the smart contract could be regarding
    the what to do upon failure of delivery of the house by the builder. See Figure
    [5-2](#474923_1_En_5_Chapter.xhtml#Fig2).


    ![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig2_HTML.jpg](Images/474923_1_En_5_Fig2_HTML.jpg)


    Figure 5-2'
