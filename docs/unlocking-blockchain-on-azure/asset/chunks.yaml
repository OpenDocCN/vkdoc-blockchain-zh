    \ | Disk | Southeast Asia |\n| vl-nic0-reg1, vl-nic1-reg1 | Network interface\
    \ | Southeast Asia |\n| Website-api-test, website-ui-test | Availability test\
    \ | Southeast Asia |\n\n*   App Service Plan is simply a record of all the services\
    \ that are running, encompassing the app services, which are nothing but services\
