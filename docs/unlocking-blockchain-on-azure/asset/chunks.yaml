  trans: "\n# 面向运维的解决方案架构\n\n在从公有链、私有链或联盟链中做出选择后，必须根据解决方案架构师问卷所设定的因素来构建平台。请逐一查看表 7-2\
    \ 中的每个单元格，并根据相关属性审视您的业务用例情况。\n\n**表 7-3**\n**面向解决方案架构师的业务与开发者决策的 21 个问题**\n\n\
    | 可扩展性 1 | 用例是否依赖加密货币/任何形式的量化 2 | 社区支持/企业支持 3 | 技能可用性 4 | 适应性 5 | 安全性 6 | 监管风险\
    \ 7 |\n| --- | --- | --- | --- | --- | --- | --- |\n| 高性能/毫秒级交易 8 | 链上或链下奖励 9\
    \ | 特定行业开发 10 | 控制功能/公司内部/公司间/共识 11 | 与现有系统集成或独立运行 12 | 治理 13 | 信任/无需信任/许可型/非许可型/开放/封闭网络\
    \ 14 |\n| 谁维护完整性？选定成员还是全部 15 | 用户与业务逻辑的合同关系 16 | 身份/KYC 是否关键？私有交易？17 | 多利益相关方流程中的成本优化？18\
    \ | 提升可发现性和自动触发自动化？19 | 定制需求/DIY 解决方案/BAAS/开发平台 20 | 设计去中心化的领域知识 21 |\n\n## 用例：跨医院共享患者医疗健康记录\n\
    \n在医疗过程中，我们观察到患者在一段时间内并不总是由同一位医生或同一家医院治疗。这种情况可能由于患者迁移到不同地点、当前医院转诊至另一家医院、在其他城市遭遇不幸事件，或仅仅因为患者不喜欢医生的诊疗方式而发生。在这种情况下，将患者的完整病史与新医院/医生共享，对于保持医疗的连续性以及恰当理解患者的病情和过往治疗至关重要。\n\
    \n由于医疗记录是高度个人化和机密的文件，必须以安全、不可篡改且仅对正确用户可见的格式提供数据。这为探索使用区块链解决该问题的可行性打开了窗口。\n\n进一步探索发现，基于\
    \ CAUSE 矩阵，使用区块链确实合适，因为它具有以下特点：\n\n*   多方贡献者和协作者\n*   健康记录属于资产\n*   两种类型的贡献者：\n\
    \    *   已知（认证专业人士、医生和医院）\n    *   未知（最终用户、患者、客户）\n*   健康记录的每一个状态都至关重要\n*   为了实现完全匿名和隐私，此不可篡改的数据必须在链上实现端到端加密。\n\
    \n现在，让我们确定解决方案架构师的问卷内容：\n\n| 可扩展性 | 用例是否依赖加密货币/任何形式的量化 | 社区支持/企业支持 | 技能可用性 | 适应性\
    \ | 安全性 | 监管风险 |\n| --- | --- | --- | --- | --- | --- | --- |\n| 患者记录数量庞大。活跃患者护理的并发性也很高。\
    \ | 尚未，医疗健康指数可用于保险目的 | 医院采用企业支持 | 否，兼具医疗和技术知识的专家稀少。 | 是，能够适应不同的人口统计、地理区域和情境 |\
    \ 需要高安全性和数据隐私保护 | 必须遵守医疗法规。 |\n| 1 | 2 | 3 | 4 | 5 | 6 | 7 |\n| 高性能/毫秒级交易 | 链上或链下奖励\
    \ | 特定行业开发 | 控制功能/公司内部或公司间共识 | 与现有系统集成或独立运行 | 治理 | 信任/无需信任/许可型/非许可型/开放/封闭网络 |\n\
    | 是 | 两者皆可 | 否 | 公司间 | 是 | 是 | 无需信任/许可型/封闭网络 |\n| 8 | 9 | 10 | 11 | 12 | 13 |\
    \ 14 |\n| 谁维护完整性？ | 用户与业务逻辑的合同关系 | 身份/KYC 是否关键？私有交易？ | 多利益相关方流程中的成本优化？ | 提升可发现性和自动触发自动化？\
    \ | 定制需求/DIY 解决方案/BAAS/开发平台 | 设计去中心化的领域知识 |\n| 选定成员 | 合同关系 | 身份/KYC 至关重要 | 是 |\
    \ 是 | 定制需求 | 是 |\n| 15 | 16 | 17 | 18 | 19 | 20 | 21 |\n\n### GHOSSTTT 协议\n\n\
    一旦业务团队通过 CAUSE 矩阵定义了区块链平台的愿景并指定了区块链的类型，解决方案架构师就必须识别更深层次的设计组件，以桥接业务与技术。\n\n因此，我们提出了\
    \ GHOSSTTT 协议，使解决方案架构师能够将区块链的设计接触点归纳如下：\n\n*   **治理**是否必要？是单独、选择性授权、所有节点参与治理，还是基于智能合约规则的共识？\n\
    *   **高速**交易与并发？在较小的网络网格中使用私有账本的混合链。\n*   **开放**/封闭、许可型还是非许可型？\n*   大规模数据的**存储**状态——在分布式服务器上建立共识的定制解决方案，数据根据平台机制在私有链上复制存储。\n\
    *   **链上**存储是分布式并复制的吗？交易状态是否根据链上事件进行交互？\n*   是否需要**代币**？现有的评分机制？奖励计划？不足之处？是否需要价值自动校准？\n\
    *   **交易**与已知参与者交互——分布式账本、Ripple、Corda\n*   **可信**网络还是无需信任网络？\n\n解决方案架构师在此的责任是识别一套正确的工具，使其与业务需求以及可用的开发者技能集保持一致。GHOSSTTT\
    \ 协议将业务需求转化为技术决策。在 CAUSE 矩阵明确后，必须根据 GHOSSTTT 协议推导出具体细节。\n\n让我们针对跨医院共享患者医疗健康记录的用例来考虑\
    \ GHOSSTTT 协议。\n\n#### 治理\n\n在这个日益数字化的时代，治理带来了此前在生态系统、企业和平台中可能未曾考虑过的新挑战。为了在数字平台上存储、引用和交易时覆盖公平实践，治理需要不断演进。随着区块链的发展，引入了去中心化自治组织（DAO）的监管系统。该系统使参与的利益相关方能够受到一套所有各方都同意的、公共预定义规则的约束。在基于\
    \ DAO 的系统中，不允许任何超出这些规则的行为。因此，在设计区块链时，必须考虑是否需要在智能合约中定义此类监管措施，以实现不受链上任何一方偏袒影响的自治功能。即使是发起或托管区块链的一方也不应享有偏袒。\n\
    \n在上述医疗用例中，健康器官的条件构成了治理的一部分，以维护流程的完整性，并且不偏袒提供服务的医疗机构。这是与仅由医疗机构托管的、可能被篡改的普通网站的主要区别所在。然而，基于\
    \ DAO 的区块链上的记录是无法被篡改的，从而保持了所需的治理效果。\n"
- fmt: '#### High-Speed Transactions and Concurrency


    `Azure CosmosDB` provides a low-latency, high-availability and globally distributed,
    multi-model database to enable such transactions as well as to run concurrent
    transactions in consortium networks. Similar NoSQL databases can be selected for
    this factor.


    Medical records are generated at every instant in various parts of the world and
    are indexed several times from the ledger for various stakeholders. Therefore,
    the low latency is a crucial factor for a decentralized ledger.


    #### Open or Closed, Permissioned or Permissionless


    For health care, a lot of information is distributed openly to the stakeholders
    in terms of medical services, policies, and so forth. However, access to confidential
    information such as medical records is required to be permissioned. Therefore,
    the chain could be an open permissioned ledger.


    For example, `Azure Marketplace` provides `Quorum`, which maintains privacy for
    transactions and contracts by separating the public and private data over separate
    networks, thus maintaining the privacy for private data and the transparency for
    public data.


    #### Storage


    In a distributed ledger for a blockchain platform, there are two aspects: one
    is the decentralized storage of state of the chain nodes, and the second is the
    storage of data. At this stage, one has to decide if the application is across
    an intranet, internet, or a shared disk with virtual node clusters.


    Considering the sharing of medical records and the choice of `Quorum` in the preceding
    points, `Quorum` ensures the privacy of transactions and the state of transactions
    and not the data storage itself. Therefore, the storage of states is encrypted
    and can be stored in Azure’s `Blob` or `CosmosDB` or any other storage. However,
    for an application where the storage of data is more crucial than the transaction
    itself, tools such as `BigChainDB`, which extends to distributed storage of data,
    may be considered. If files are to be encrypted as is, `IPFS` can be considered.
    In cases where medical records are to be stored and transacted/shared securely,
    one can design `Quorum` to be integrated with `IPFS` for Azure cloud components
    to make sharing medical records truly safe and the storage equally vaulted across
    the globe.


    #### Tokens, Transactions, and Trust


    Medical records being a highly sensitive document with respect to patient health,
    the credibility of the source of the medical records is highly crucial. Therefore,
    the `DAO` selected in the first stage of governance establishes the trust of an
    unbiased network. Having the voting mechanism on-chain for authorization boards
    doing the certifying makes the record more trustworthy. Transactions here may
    be sharing records, buying medical tests and reports, or purchasing general anonymized
    public data within the regulations of the chain. Here, the solution architect
    has to design the consortium chain, which could be a public chain within a country,
    region, or area, or private chains of medical doctors and patients, or private
    chains of enterprises and the medical records of their employees, or private networks
    of insurance companies and customers. The wiring of transaction networks is to
    be decided at this stage. Once this is designed, based on the business requirements,
    quantification of on-chain actions can be made. So, first decide if tokenization
    is required in your business use case; for example, credit ratings of a hospital/surgeon/pathologist.
    Credit ratings of customers for health insurance companies and so on can be incentivized
    on-chain with the token-economics agreed to on-chain. However, for simply maintaining
    a digital vault on the ledger, no tokenization is required.


    ![../images/474923_1_En_7_Chapter/474923_1_En_7_Figb_HTML.jpg](Images/474923_1_En_7_Figb_HTML.jpg)
    Exercise 7-2\. Based on The Business Case in Exercise 7-1, Answer the Outcomes
    of GHOSSTTT Protocol for your Use Case


    When points of governance, high speed, and open networks are clear, start surveying
    the technology tools suitable for the pain points. In many cases, a certain combination
    of tools may not be readily present. That’s where the solution architect has to
    decide to either develop from scratch, choose an existing blockchain solution,
    or pick an enterprise structure of cloud-based components such as Azure for the
    blockchain network.


    After this exercise, walk through the “21 Questions for Business- and Developer-based
    Decisions for a Solution Architect” table. Finalize the technology stack and architecture
    in iteration with Sections 1 and 3.'
