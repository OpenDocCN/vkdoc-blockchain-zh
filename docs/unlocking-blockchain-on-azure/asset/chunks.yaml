    # 区块链：全景解析


    本章将以简洁的方式剖析区块链的方方面面，化解技术知识的壁垒，为其他领域的经验与区块链基础设施的融合开辟道路。从而让无论是否具备基础设施的用户，都能使用 Microsoft
    Azure 与区块链，真正实现去中心化生活方式在各行各业的落地！


    因此，无论你是学者、首席信息官、人力运营策略师、机械工程师、建筑师，甚至是一个十岁的孩子，或者你觉得自己就是其中之一，我都希望你能在本章中逐步建立起自己的理解。进一步，从本章出发，我们将迈向实际生活中的区块链部署，并探讨如何开发这些部署，使其适应区块链及其各种变体的每一个个体方面。


    我们将看到区块链如何改变我们处理金钱及其相关经济学的方式。一旦区块链的基础奠定，我们将学习智能合约，它使用户能够体验数字合约，这些合约以编程方式触发操作并强制执行预先商定的条款。从这里出发，我们将探索企业级现有软件与区块链的整合，这需要大规模的行动。在进入第
    7 章时，我们将开启一系列可用于制定区块链策略、业务设计、架构和开发工具的工具集。考虑到本书的读者背景多样，我们将详细阐述用于构建区块链平台和 DApp（去中心化应用）的不同技术架构案例。我们将通过世界各地不同领域的用例来拓宽理解，并探索区块链的跨学科整合。


    现在，我们已经预览了接下来几章将呈现的浩瀚内容，让我们聚焦于为什么我们要使用区块链。是什么让它们如此受欢迎，又为何它们承诺要改变金钱、商业乃至世界的方式？为什么全球超过
    50% 的最大数字公司投资于这项技术？这是许多个人、公司和生态系统都希望理解的问题。然而，在日常基础上，区块链又如何影响你呢？你的周围环境会因这项技术发生怎样的变化？你将如何与区块链互动？


    所有这些答案都将在本章以及本书的后续章节中展开。


    就像六西格玛转型那样，针对任何挑战，都要经历定义、测量、分析、改进和控制五个阶段，逐步提升产出率，本章带来了以下六个转变：


    *   介绍 – 定义区块链

    *   标杆对比 – 从历史事件进化到现代区块链

    *   度量从分布式计算到分布式账本的变革

    *   分析区块链在行动中的影响和改进

    *   通过共识控制去中心化

    *   使用 Azure 实施并跨领域扩展


    ## 定义区块链


    人类通过探索和发现来最好地理解世界。人类聚集在一起形成一个生态系统，让生活运转起来。商业在国家内部和跨境之间形成了社区、供应链和经济体。连接、互动和演化的本质是万物存在的核心。


    区块链正是将这种互动、连接和演化的形式带到了软件平台。它们不仅将数据数字化，还将流程及其状态数字化到一个数字账本中。区块链是一种分布式数字账本的形式，它不仅保存数据，还与日常生活的运作进行交互。


    区块链代表了一条由区块组成的链条。这条链是一个由人们以数据块形式相互交互的连接网络。这听起来像是一个现有的社交网络，比如我们都熟知的 Facebook、Instagram、Twitter
    或其他。那么，区块链有何不同呢？在任何现有的社交媒体平台或服务中，用户数据是由该社交媒体平台本身托管和管理的中心化服务器存储、传输和管理的。如果该平台运行在区块链上，那么同样的用户数据将以数据块的形式由终端用户自己托管和分发，而非由单一公司管理，以此实现存储、交易和管理。这就是区块链如何使终端用户更好地控制自己的数据及其隐私，并了解其数据如何被存储、维护和分发。


    区块链使一组用户能够基于预定义的规则集，就任何操作、交易或决策达成一致。它允许每个人参与决策过程。此外，它通过对数据块和交易进行加密，赋予了链条完全的隐私权。


    到目前为止，我们已经理解区块链是一条在对等网络之间连接的区块链条。这些区块由对等节点自己托管，并通过在加密数据和直接交易上达成共识的原则相互连接。由此，区块链提供了一条途径，将努力、价值和金钱的代表数字化到该链上，因为它构成了可信赖的单一真相来源。


    接下来，我们将从初学者的视角看到一个区块链的定义，然后是专家的理解，同时注意到不同层次的复杂性和技术性。


    ### 为新用户定义


    如果你是一个对区块链概念完全陌生的人，或者刚刚开始理解和构建区块链的旅程，下面的例子可能有助于你形象化地理解通过区块链进行的实际交易。在区块链出现之前，流程如图
    1-1 所示。


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig1_HTML.png](img/474923_1_En_1_Fig1_HTML.png)


    图 1-1


    交易仅通过商店进行的中心化系统


    如图 1-1 所示，爱丽丝、瑞安、琪亚拉和乔都在电商平台上交易，要么购买要么出售商品。这个电商平台可能会在他们每次交易时收取佣金，并可能根据其自身政策调节价格。


    然而，他们都信任该平台品牌，以便与全球未知用户进行交易和执行交易。因此，他们依赖的是中心化的、单一的信任来源。


    然而，当爱丽丝、瑞安、琪亚拉和乔都在区块链上时，流程如图 1-2 所示。


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig2_HTML.png](img/474923_1_En_1_Fig2_HTML.png)


    图 1-2


    在链条上以商定的价值进行点对点交易，没有一个单一的中介，而是由一链的人来验证交易


    他们都可以直接进行物物交换、交易或交换物品，没有任何价值损失或信任问题。信任得以维持，并由验证交易的其他人在场见证。正如我们在图 1-2 中看到的，当爱丽丝从瑞安那里购买时，琪亚拉和乔的网络就成了交易的见证者；同样地，当其他人交易时也是如此。这条链可以包含无限多的人，多数投票可以允许区块链上的交易。

