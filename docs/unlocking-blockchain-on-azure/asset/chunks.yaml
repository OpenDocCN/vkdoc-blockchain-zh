- fmt: '# Decentralized Applications


    After understanding all the building blocks of the blockchain, we saw how every
    fundamental element weaves into an application to form the decentralized ledger
    to a completely running blockchain. This does not form just a software but also
    a very powerful ecosystem that can drive economies of this digital age.


    Every blockchain signifies a strong aspect of quantification and consensus. There
    have been several existing distributed databases, ledgers, processes, and systems,
    so what makes blockchains so crucial and different is the right time, ecosystem,
    and the ability to monetize the true value system behind the blockchain.


    Coming back to BBChain, which brings a highly credible data source to its stakeholders
    from maritime voyages, the standards set for its value are simply generated by
    the parameters mentioned in the previous section.


    Questions that formulate around such a decentralized application are as follows:


    - What is the core digital asset of your chain?

    - What are the key stakeholders doing with the digital asset?

    - How does one maintain the security of the digital asset?

    - How are the contracts and consensus maintained to honor the digital transaction
    for the asset?

    - Which technologies fall in line with the requirements of the blockchain application?

    - Is scalability required? How is scalability maintained?


    Answers for BBChain are as follows, respectively:


    - Voyage data is the key digital asset.

    - Stakeholders such as block producers (ship owners, port owners) generate data,
    whereas insurers and shipping authorities subscribe/buy such data. Data as blocks
    are transferred in various side chains and on the public ledger.

    - As the complete encrypted digital asset (by the public key) is broken down and
    distributed with a fault-tolerant consensus among different nodes, upon the rightful
    consensus, the location of the data packet is revealed to the correct stakeholder.
    On accumulating all the data packets in the right sequence, the decryption will
    be valid with the use of the private key by the correct stakeholder.

    - The rightful stakeholder has a contract in place with the block producer/buyer.
    On creation of the contract, the public key and the private key are generated
    based on the expiry of the contract. The key expires along with the contract.
    The consensus among the private ledger is governed by the proof of stake. This
    is validated by all the stakeholders of that side chain who shared the distributed
    data on their servers in encrypted form.

    - The architecture supports the technologies required to suit the conditions of
    the chain (Figure [2-6](#474923_1_En_2_Chapter.xhtml#Fig6)).


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig6_HTML.jpg](Images/474923_1_En_2_Fig6_HTML.jpg)


    Figure 2-6: Architecture for BBChain components


    - As the voyage data of a ship records every moment of the voyage, scalability
    is required on the ledger. This is managed by the storage mechanisms provided
    by BigChainDB and IPFS.


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Figh_HTML.jpg](Images/474923_1_En_2_Figh_HTML.jpg)


    **Challenge:** Provide your version of answers to the preceding questions as if
    you were to export goods and transact over a blockchain. Jot down thoughts and
    compare notes with the use case provided in the upcoming chapters.


    # Setting Blockchain Environments


    By now, we have covered all fundamentals of blockchains, in theory. Now, let’s
    head to the practical implementation to set up a blockchain infrastructure.


    For this section, we will deploy a blockchain on the Azure Blockchain Workbench.
    Think of this as a package suite of infrastructural elements that contribute to
    building a blockchain, like IKEA assembly instructions for making a bed or a wardrobe.
    Azure makes the deployment a lot more accelerated, as the infrastructure elements
    are taken care of in a packaged form. Plus, deployment on cloud makes the connectivity
    across all nodes/users faster for business processes to connect and collaborate.


    Azure Blockchain Workbench provides a set of Azure cloud components, along with
    the core elements of blockchains, encased in various architecture alternatives
    in the form of templates. It allows businesses to focus on the purpose and design
    requirements of the blockchain by supporting the other infrastructure elements
    out of the box.


    1. Start with setting up your Azure Account if you don’t have one already. One
    can refer to [`https://bit.ly/2Gd6TLk`](https://bit.ly/2Gd6TLk) to get a detailed
    walkthrough of the process mentioned here. In this chapter, we focus on the implementation
    and its usage for our application.


    2. Once you have signed up and are on the dashboard, click on + Create a resource
    on the left panel (Figure [2-7](#474923_1_En_2_Chapter.xhtml#Fig7)).


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig7_HTML.jpg](Images/474923_1_En_2_Fig7_HTML.jpg)


    Figure 2-7: Showcase of the Azure Marketplace


    3. Further, search for the Azure Blockchain Workbench, which will help you set
    up the required number of elements, such as the encryption key vaults, databases,
    application layers and namespaces (Figure [2-8](#474923_1_En_2_Chapter.xhtml#Fig8)).


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig8_HTML.jpg](Images/474923_1_En_2_Fig8_HTML.jpg)


    Figure 2-8: Set up the Azure Blockchain Workbench


    4. On selection of the Azure Blockchain Workbench, fill in the fields for your
    use case. We have filled in the following for BBChain (Figure [2-9](#474923_1_En_2_Chapter.xhtml#Fig9)).
    This step sets the naming conventions for the resource group and its virtual machines.


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig9_HTML.jpg](Images/474923_1_En_2_Fig9_HTML.jpg)


    Figure 2-9: Setup of the Azure Blockchain Workbench


    5. After the basic credentials are defined in the first step, the second step
    covers the specifications of the devices that are required; for example, the validation
    node specifications (Figure [2-10](#474923_1_En_2_Chapter.xhtml#Fig10)).


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig10_HTML.jpg](Images/474923_1_En_2_Fig10_HTML.jpg)


    Figure 2-10: Setup of the Azure Blockchain Workbench


    6. Since this is a prototype tutorial to understand the setup process, here we
    selected a validator node with F1s server with 2GB RAM and 4GB Local SSD (Figure
    [2-11](#474923_1_En_2_Chapter.xhtml#Fig11)).


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig11_HTML.jpg](Images/474923_1_En_2_Fig11_HTML.jpg)


    Figure 2-11: Selection of instances


    7. Now, check out the summary (Figure [2-12](#474923_1_En_2_Chapter.xhtml#Fig12)).


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig12_HTML.jpg](Images/474923_1_En_2_Fig12_HTML.jpg)


    Figure 2-12: Generated summary of the BBChain resource group


    8. On initiation to buy in step 4, the deployment process to create the list of
    elements begins. The resource group is generated, and the elements are initialized
    with the specified choices. This may take some time, as virtual devices are being
    set up.


    9. You may receive a notification when the deployment is complete. Alternatively,
    one can access the same by using the resource group on the sidebar.


    10. Further, on the resource group screen, select the blockchain name—in my case,
    `BBChain`.'
