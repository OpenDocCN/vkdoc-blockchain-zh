    Once the definitions of the first two factors are clear, one has to map the technical
    aspects based on the defined functionality and scalability. For example, when
    there are thousands of features on a blockchain, with limited scalability, the
    time-lags are well adjusted. However, would the same source code for the blockchain
    suffice for a billion-user base? The vision of functional depth and breadth with
    respect to user-base scalability has to be clear so as to avoid several hard forks.
    When Azure components form parts of the blockchain, such as event grids, compute
    servers, and AD-based authentications, the scalability issues are modularized
    and can be easily taken care of in silos.


    ### Computation Complexity Plus Hardware Dependencies


    The form of consensus method chosen has a crucial impact on the hardware computation
    and memory. Every node has to be active for a blockchain, which causes an expectation
    of high up-time from all nodes, leading to an eventual bottleneck. The selection
    of a consensus algorithm based on the scale definitions helps to identify the
    hardware dependencies.


    Alternatively, businesses may start with planning for hardware limitations before
    doing the platform design, which is the step where consensus algorithms have to
    be selected. Based on this step and the affordability of the majority user base.


    ### Core Decisions for Implementations


    When certain limitations are discovered—for example, the proof of work reduced
    a stakeholder’s influence on decisions—such decisions have to be a hard rule on-chain.
    When a chain is governed by proof of stake, one has to decide to ensure all transaction
    activity follows that very standard set of procedures.


    ### Tools to Support Scale and Maintenance


    Azure components speed deployments and node inclusion in most cases. The maintenance
    of services on-chain is taken care of by the cloud service provider. At the same
    time, one must carefully measure the computation versus tool costs to enable blockchain
    services.


    ### Frameworks


    Blockchain frameworks such as Ethereum, Hyperledger, Corda, and Ripple can be
    easily integrable with the Azure components, making sure deployment is faster
    and scalable. Based on the choice of scale, locale, and form of consensus, one
    can choose the desired framework.


    ### On-chain and Off-chain Combinations of Architecture Design


    Since the trade finance blockchain network traverses through several organizations
    and entities, certain elements will always be off-chain. For example, the core
    AD values of authentication will be centrally controlled only by the organization
    owning it. Democratizing those elements on-chain is irrelevant in this blockchain.
    Similarly, SAP or other existing ERP data where the intermediate state of data
    is irrelevant do not have to be hosted over blockchains. Therefore, identifying
    elements, data structures, and assets both on-chain and off-chain is one of the
    most crucial aspects of design.


    ## Defining a Content Distribution Blockchain Architecture for Content Tracking,
    Licensing, and Royalties


    Getty Images and Shutterstock deliver image content with their licenses and use
    rights. Similarly, Spotify ensures connectivity to independent artists’ content
    that is catered to end users. These centralized platforms provision accessibility.
    However, the problem of piracy remains a large concern. Many movie scripts and
    screenplays have been plagiarized, with no order or control. Such data leaks were
    often not traceable, as the storage of machine addresses was not a common practice.
    Now, in this era, when global places are getting closer, a copied film script
    from one country is easily identifiable in a faraway country. However, such traceability
    is partly done online and partly offline due to the manual intervention involved.


    Similar to the case of fake news, fraudulent data contributors make it hard to
    identify fake patterns due to mismanagement of the data’s traceability. This does
    not mean centralized platforms do not have traceability, but it was never a prime
    concern. The traceability can be maintained in centralized platforms. However,
    it is highly tamperable. Enter blockchains.


    This makes it an interesting use case, where genuine data sharing is of true value
    and there is equal contribution throughput and returns for such data. So, content
    providers are directly incentivized based on the data’s value. This is even seen
    in many of today’s content platforms, such as YouTube, Instagram, and so forth.
    However, as the platform scales, it becomes very difficult to identify the genuineness
    of the platform content. The effort to identify fake content on such platforms
    costs platform providers time & resources as well as a case of mis-identity for
    genuine content creators.


    Blockchains maintain traceability from source to destination with every digital
    copy. Think of it as a digital signature of the artist/content creator that moves
    with the asset. When a document of data is shared with someone over Google Drive,
    one could create a copy, modify, tamper with it, and share it further. The original
    ownership and data about royalties are lost with such forms of sharing. Also,
    such centralized services expose the content over the network, as there is no
    upfront assurance of end-to-end encryption in such cases. So, we need blockchains.


    With end-to-end encryption and the transfer of assets with the digital signatures
    of the content creators, traceability can always be maintained with blockchains.
    Apart from traceability, it is the access to incentives that could happen in real
    time or more transparently and fairly on blockchains that makes them appealing.
    For example, in a centralized content-management platform like Twitch, where gamers
    who stream their game videos get paid between one cent and one dollar an hour
    based on popularity and viability for advertisements, the incentives are paid
    when certain conditions as per the rules of the platform are fulfilled and the
    disbursements are made as per company policy at the sole discretion of the company.
    In such situations, the content-hosting company has full ownership of the authority
    and incentives and may regulate value and policy as they wish without taking consensus
    or agreement from the content creators. Now, imagine if there were a blockchain-based
    content-sharing platform that distributed hosting and content-creation responsibilities
    to client nodes, orderer nodes for host sharing and load balancing, and validation
    nodes to validate the content distributions. On such a platform, sharing, distribution,
    and incentive-sharing would be based on true blockchain consensus. Only then would
    the action of viewing, redistribution, and payments be triggered. Also, the value
    of the incentives could be more transparent with respect to profit-sharing and
    the agreed upon value, as per consensus.'
  trans: '

    ### 功能密度与覆盖范围


    功能密度可能取决于为特定功能向链中添加更多参与者，或增加链中少数参与者的功能职责。同时，某些功能可能与可信度的核心挑战无关，并且可以离线处理。


    确切地说，信用证流程的验证可能会在一个实体内部经历多个内部流程。那么，是将所有参与者都添加到同一条链中，还是为这个内部流程创建一个单独的私有链？同样，在为贸易金融区块链服务决定用户纳入范围时，用户的选择是更广泛还是高度细分？这决定了覆盖范围中的用户类型。


    ### 功能性与可扩展性（深度与广度）


    一旦前两个因素的界定清晰，就需要根据已定义的功能性和可扩展性来规划技术层面。例如，当区块链上拥有数千个功能但可扩展性有限时，时间延迟可以得到很好的调整。然而，同样的区块链源代码是否足以支持十亿用户的基础？必须明确功能深度和广度相对于用户基数可扩展性的愿景，以避免出现多次硬分叉。当区块链采用诸如事件网格、计算服务器和基于
    AD 的身份验证等 Azure 组件时，可扩展性问题被模块化，并且可以在各自范围内轻松处理。


    ### 计算复杂度与硬件依赖


    所选择的共识方法的形式对硬件计算和内存有至关重要的影响。区块链上的每个节点都必须保持活跃，这导致所有节点都期望高正常运行时间，最终形成瓶颈。基于规模定义选择共识算法有助于确定硬件依赖关系。


    或者，企业可以在进行平台设计之前，先从规划硬件限制开始，而选择共识算法正是此步骤的一部分。这取决于此步骤以及大多数用户群的承受能力。


    ### 实施的核心决策


    当发现某些限制时——例如，工作量证明削弱了利益相关者对决策的影响——此类决策必须在链上成为硬性规则。当一条链由权益证明管理时，必须确保所有交易活动都遵循那一套非常标准的程序。


    ### 支持扩展与维护的工具


    在大多数情况下，Azure 组件可以加速部署和节点纳入。链上服务的维护由云服务提供商负责。同时，必须仔细衡量计算成本与工具成本，以支持区块链服务。


    ### 框架


    以太坊、Hyperledger、Corda 和 Ripple 等区块链框架可以轻松与 Azure 组件集成，确保部署更快且更具可扩展性。根据对规模、位置和共识形式的选择，可以选择所需的框架。


    ### 链上与链下结合的架构设计


    由于贸易金融区块链网络会穿越多个组织和实体，某些元素将始终保留在链下。例如，身份验证的核心 AD 值将仅由拥有它的组织集中控制。将这些元素在链上民主化在此区块链中并无意义。同样，无需托管中间状态数据的
    SAP 或其他现有 ERP 数据也不必托管在区块链上。因此，识别链上和链下的元素、数据结构及资产，是设计中最关键的方面之一。


    ## 为内容追踪、许可和版税定义内容分发区块链架构


    Getty Images 和 Shutterstock 提供带有许可和使用权的内容。同样，Spotify 确保连接到面向终端用户的独立艺术家的内容。这些中心化平台提供了可访问性。然而，盗版问题仍然是一个巨大的担忧。许多电影剧本和手稿被剽窃，毫无秩序和管控。此类数据泄露通常无法追溯，因为存储机器地址并非普遍做法。如今，在这个全球各地联系日益紧密的时代，从一个国家盗版的电影剧本很容易在遥远的另一个国家被识别出来。然而，这种可追溯性部分在线完成，部分由于涉及人工干预而离线完成。


    与假新闻的情况类似，由于数据可追溯性管理不善，欺诈性数据贡献者使得识别虚假模式变得困难。这并不意味着中心化平台没有可追溯性，但这从来不是其首要关注点。可追溯性可以在中心化平台中维护，但它极易被篡改。于是，区块链应运而生。


    这使得它成为一个有趣的用例，其中真实的数据分享具有真正价值，并且对此类数据有同等的贡献吞吐量和回报。因此，内容提供商会直接根据数据的价值获得激励。这在当今的许多内容平台中也能看到，例如
    YouTube、Instagram 等。然而，随着平台的扩展，识别平台内容的真实性变得非常困难。在这些平台上识别虚假内容的努力，不仅耗费平台提供商的时间和资源，也会导致真实内容创作者被误认。


    区块链为每一个数字副本维护从源头到目的地的可追溯性。可以将其视为艺术家/内容创作者的数字签名，随资产一起移动。当一份数据文档通过 Google Drive
    与他人共享时，接收方可以创建副本、修改、篡改并进一步分享。原始所有权和版税信息随着这种分享形式而丢失。此外，此类中心化服务会将内容暴露在网络中，因为在这些情况下没有端到端加密的事前保证。因此，我们需要区块链。


    通过端到端加密以及随内容创建者数字签名一同转移资产，区块链可以始终维护可追溯性。除了可追溯性之外，在区块链上能够实时、更透明、更公平地获取激励，也使其颇具吸引力。例如，在像
    Twitch 这样的中心化内容管理平台上，直播游戏视频的玩家根据其受欢迎程度和广告适配性，每小时能获得 1 美分到 1 美元不等的报酬。当满足平台规则中的特定条件时，报酬才会支付，并且支付方式完全由公司根据其政策自行决定。在这种情况下，内容托管公司完全掌控权限和激励，并可以在未经内容创建者共识或同意的情况下随意调整价值和政策。现在，想象一下，如果有一个基于区块链的内容分享平台，它将内容托管和创建职责分配给客户端节点，将主机共享和负载均衡职责分配给排序节点，并将验证内容分发的职责分配给验证节点。在这样的平台上，分享、分发和激励分配将基于真正的区块链共识。只有这样，查看、再分发和支付等行为才会被触发。同时，根据共识，激励的价值在利润分享和约定价值方面可以更加透明。


    '
- fmt: '# 排版后的文本


    一个基于工作量证明（即，创作、分发内容所消耗的能量以及内容的需求）的内容创作者和实现分发的节点之间去中心化利润分配的简单示例如图[8-15](#474923_1_En_8_Chapter.xhtml#Fig15)所示。一旦这个价值以付费订阅和广告曝光的形式变得有形，公司就可以直接根据不同的利润额公平地分享利润。这确保了更快的推广、更快的反馈和更快的支付。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig15_HTML.jpg](Images/474923_1_En_8_Fig15_HTML.jpg)


    *图 8-15*

    *在区块链上由人工智能驱动的内容分发平台架构*


    在上述安排中，基于链上约定的内容分发权，最终用户通过不同的私有和公共账本区块链连接。例如，如果某些内容对某些商业运营商是排他性的，它将保持加密状态（对其他人显示为乱码），并且解密密钥仅在接收者的地址上。然而，如果某个商业运营商希望进一步转售或许可该内容，则此商业实体与内容提供商之间的贸易共识可以通过智能合约达成，并据此进行转售和利润分享。因此，当`A`创建内容，`B`将内容转售给`C`，`D`查看并与`A`的内容互动时，从源到目的地的记录的可追溯性将保存在区块链账本上（图[8-16](#474923_1_En_8_Chapter.xhtml#Fig16)）。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig16_HTML.jpg](Images/474923_1_En_8_Fig16_HTML.jpg)


    *图 8-16*

    *Quizzycash：一种在区块链上衡量参与证明的内容分发平台*


    因此，一家名为`QuizzyCash`的区块链公司基于客户参与证明的共识运行。每个内容价值都根据其对客户/用户参与度的衡量获得激励。简而言之，如果一场重要的英格兰超级联赛即将到来，而最新的测验包含相关内容，那么客户参与的吸引力可能会很高，从而产生高额的广告价值，并相应地激励创作者。这是基于`NEM`的重要性证明框架开发的。代币机制是根据期望的衡量标准和分配方式生成的。


    现有框架的技术架构总可以被修改以适应应用架构、企业架构和系统架构。


    下表分析了内容分发用例的架构的8D因素。


    | 因素 | 影响 |

    | :--- | :--- |

    | 1. 关于用户群、位置、实体、对象等的规模度量 | 用户群可能因地理位置和市场大小而有很大差异。例如，`Netflix`在印度拥有庞大的消费者基础；因此，针对某个位置的内容的价值回报对于内容创作者来说可能变得更加透明。同样，当内容代理商参与与内容分发商的交易时，许多时候即使交付了盈利的内容，款项也会被卡住。在这里，区块链使得实体能够基于自动执行的智能合约参与到公平交易中。类似类型的内容可以存储在区块链账本上，例如电影、艺术品、书籍等。
    |

    | 2. 功能密度和覆盖范围 | 功能密度可以基于内容生成者的影响，其衡量标准超越了单纯的广告费和订阅率。它可能扩展到对某个区域或国家的神经科学影响，以及来自不同人群的影响覆盖范围。
    |

    | 3. 功能性 + 可扩展性（深度和广度） | 此类平台的区块链架构师必须根据从初始阶段到增长阶段的用户群来决定功能的广度或深度方向。同样，也需要决定可扩展性。
    |

    | 4. 计算复杂度及硬件依赖性 | 一旦功能性和可扩展性确定，就需要计算传递内容的计算复杂度。内容是整个内容本身都在区块链上，还是仅仅是一个指向内容的指针引用？例如，将电影或艺术品放在区块链上会使其在存储方面非常密集，因为多个副本会使它变得庞大。复杂度计算使人们能够预测节点服务器的运行成本，因此分发激励计划必须公平地考虑这一点。
    |

    | 5. 实现方面的核心决策 | 核心决策类似于整个平台必须遵守的规则。例如，区块链账本不允许将免费门票内容添加到平台上。 |

    | 6. 支持扩展和维护的工具 | 一旦确定规模扩展和功能覆盖范围可能会发生变化，就必须计划硬分叉和软分叉更新，或者在加入网络时将其包含在共识协议中。 |

    | 7. 框架 | 当前的示例是建立在`NEM`之上的。 |

    | 8. 架构设计的链上和链下组合 | 链上 – 内容上传、再分发、第三方集成<br/>链下 – 大规模内容存储库的存储 |


    ## 实施法律智能合约的架构


    本节不针对任何特定国家教育智能合约的法律方面；它主要针对逻辑流程和使能因素。


    智能合约主要源自以太坊的工作量证明框架（图[8-17](#474923_1_En_8_Chapter.xhtml#Fig17)）。


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig17_HTML.jpg](Images/474923_1_En_8_Fig17_HTML.jpg)


    *图 8-17*

    *以太坊中PoW的详细流程*


    进一步理解以太坊技术架构以及如何使其适应系统架构、企业架构和应用架构至关重要。以太坊中的难题求解通常实现了工作量证明。同样，贸易交易或经销商的法律框架在所有情况下都需要一个定义良好的智能合约以及共识。


    在此，自动执行和可执行智能合约的应用可能涉及土地所有权、租赁、房地产经销，直至保险索赔和金融程序。智能合约可能根据个人的驾驶风格（而不是基于标准值）执行不同的保险费档次。


    因此，架构的设计可以包括`Ethereum`/`Hyperledger`框架，以及用于钱包的`Truffle`集成和用于智能合约执行的`Solidity`。


    **练习**


    类似于前两节的学习内容，计算汽车服务合同管理的架构的8D因素。'
  raw: 'A simpler example of decentralized profit distribution among content creators
    and nodes that enable distribution is based on the proof of work; i.e., energy
    spent on creating the content, distributing the content, and the demand over the
    content (Figure [8-15](#474923_1_En_8_Chapter.xhtml#Fig15)). Once this value is
    tangible in the form of paid subscriptions and advertisement eyeballs, the company
    may profit share fairly based directly on the varying amounts of profit. This
    ensures faster outreach, faster feedback, and faster disbursals.


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig15_HTML.jpg](Images/474923_1_En_8_Fig15_HTML.jpg)


    Figure 8-15


    Content-distribution platform architecture powered with AI on blockchains


    In the preceding arrangement, end-to-end users are connected in different blockchains
    of private and public ledgers based on the content-distribution rights agreed
    to on-chain. For example, if certain content is exclusive to certain business
    operators, it remains encrypted (appears garbled to others), and the decryption
    key is only on the receivers’ address. However, if a business operator wishes
    to resell or license the content further, the consensus of trade between this
    business entity and the content provider may be agreed upon via a smart contract
    and can be taken forward for reselling and profit-sharing accordingly. So, when
    A creates content, B resells that content to C, and D views and interacts with
    A’s content, the traceability of source to destination records is maintained on
    the blockchain ledger (Figure [8-16](#474923_1_En_8_Chapter.xhtml#Fig16)).


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig16_HTML.jpg](Images/474923_1_En_8_Fig16_HTML.jpg)


    Figure 8-16


    Quizzycash: a content-distribution platform that measures proof of engagement
    on blockchains


    So, a blockchain company called QuizzyCash runs on the consensus of proof of customer
    engagement. Every content value is incentivized based on its measure of customer/user
    engagement. In simpler terms, if there is an important English Premier League
    match coming up and the latest quiz has relevant content, the traction of customer
    engagement may be high, yielding high advertisement values and thereby incentivizing
    the creator proportionally. This was developed based on NEM’s framework of proof
    of importance. The token mechanics are generated based on the desired measure
    and distribution.


    Technical architectures of existing frameworks can always be modified to fit the
    application, enterprise, and system architectures.


    The following table analyzes the 8D Factors of Architecture for the content-distribution
    use case.


    | Factor | Impact |

    | --- | --- |

    | 1. Measure of scale with respect to user base, locations, entities, objects,
    etc. | User base could largely vary based on geolocations and the market size.
    For example, Netflix has a huge consumer base in India; therefore, the value return
    for content targeted toward a location could become more transparent to the content
    creator directly. Similarly, when content agencies are involved in deals with
    content distributors, many times payments are stuck in spite of profitable deliveries.
    Here, blockchains enable entities to be involved in fair trade based on auto-executing
    smart contracts. Similar types of content can be stored on the blockchain ledgers,
    such as movies, artworks, books, etc. |

    | 2. Functional density and coverage | Functional density could be based on the
    content generators’ impact which measures beyond mere advertisement fees and subscription
    rates. It may extend to neuroscience impact in a region or a country as well as
    the coverage of impact from various demographics. |

    | 3. Functionality + scalability (depth-wise and breadthwise) | A blockchain architect
    for such a platform has to decide the direction of breadth of features or its
    depth based on the user base during its initial phase through the growth phase.
    Similarly, scalability is to be decided. |

    | 4. Computation complexity plus hardware dependencies | Once functionality and
    scalability are locked, the computational complexity of passing content is to
    be calculated. Is it entirely the content itself on the blockchain, or just a
    pointer reference of the content? For example, having movies or art pieces on
    a blockchain would makes it storage-wise intensive, as several copies make it
    bulky. Complexity calculations enable one to forecast the node server’s running
    costs, and so the incentive plans of distribution must fairly account for it.
    |

    | 5. Core decisions toward implementations | Core decisions are similar to rules
    that the platform as a whole must abide by. For example, the blockchain ledger
    does not allow free ticket content to be added on the platform. |

    | 6. Tools to support scale and maintenance | Once identified that the gradual
    scale and functional coverage may change, one has to plan the hard and soft forks
    of updates or include them in the consensus agreements during onboarding. |

    | 7. Frameworks | The current example was built on top of NEM. |

    | 8\. On-chain and off-chain combinations of architecture design | On-chain –
    Content uploads, redistributions, third-party integrationsOff-chain – Storage
    of large-scale content repository |


    ## Implementing Architectures for Legal Smart Contracts


    This section does not educate on the legal aspect for any country in particular
    for smart contracts; it mainly targets the logical flows and the enablers.


    Smart contracts mainly come from the Ethereum framework of proof of work (Figure
    [8-17](#474923_1_En_8_Chapter.xhtml#Fig17)).


    ![../images/474923_1_En_8_Chapter/474923_1_En_8_Fig17_HTML.jpg](Images/474923_1_En_8_Fig17_HTML.jpg)


    Figure 8-17


    Detailed flow of PoW in Ethereum


    Further understanding the Ethereum technical architecture and how to make it adaptive
    to the system, enterprise, and application architectures is highly crucial. The
    puzzle-solving in Ethereum generally enables the proof of work. Similarly, the
    legal framework of trade transactions or dealerships requires a well-defined smart
    contract for all cases, as well as consensus.


    Here, the application of auto-enforceable and -executable smart contracts may
    vary from land ownerships, leases, and real estate dealerships, to insurance claims
    and financial proceedings. Smart contracts may execute different slabs of insurance
    premiums based on the style of driving a person may have, rather than based on
    standard values.


    So, the design of an architecture can include the Ethereum/ Hyperledger framework
    along with the Truffle integrations for wallets and the Solidity execution for
    smart contracts.


    Exercise


    Similar to the learnings for the first two sections, compute the 8D Factors of
    Architecture for automobile service contract management.'
