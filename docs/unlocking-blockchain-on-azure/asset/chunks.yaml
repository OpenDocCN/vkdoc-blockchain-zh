  trans: "\n# 数据源：与企业现有系统的集成\n\n学习如何将区块链与 Microsoft Azure 结合使用的一个重要原因是，它能为您提供企业级集成所需的完整基础设施。`Azure\
    \ Blockchain Workbench` 提供了一套完全与技术无关的选项，支持各种类型的区块链，并能基于现有 IT 生态系统和工作流与企业进行集成。\n\
    \n随着大型企业越来越依赖数据驱动，采用正确的数字化去中心化实践已变得至关重要，并成为业务决策的核心驱动力。由于各行业的组织对区块链应用有不同的用例，且其适配运转的\
    \ IT 架构也大相径庭，Microsoft Azure 作为一座桥梁，能够同时应对这两大挑战。而随着组织运营的诸多方面日益数字化，数据驱动程度不断提高，中心化与去中心化之间的持续博弈将继续并进一步加剧。因此，像\
    \ Microsoft Azure 这样的工具，使组织能够以一种简单且可持续的方式来有效地实现流程去中心化，而无需完全干扰在区块链出现之前企业一直使用的既有企业级工具。\n\
    \n设想一个拥有 10,000 名员工的组织。首席信息官希望根据公司的优势与劣势来制定业务决策。然而，相关的汇报流程并不透明，因为线下获取这些数据所依赖的是一个层级化且无形的过程。为了避免偏见，公司以数字化形式集成了生产力指标；例如，销售拜访次数、转化数量、业务价值等等。这些指标在技术工具引入之前就已存在。但借助区块链，追踪和跟踪这些指标的过程变得更加透明和具象。因此，当所有操作都在链上更新时，决策就可以成为一个衡量并推动影响力的闭环在线活动。\n\
    \n由于需要以具象、可追溯、不可篡改、去中心化且安全的形式，与业务的利益相关者（无论是员工、客户还是供应商）保持连接，区块链显然已成为企业的必备需求。`Azure\
    \ Blockchain Workbench` 促进了微软环境与区块链各要素的平滑集成。\n\n让我们来看看需要不同集成形式的数据源变体。企业中的数据可能包含以下类型：\n\
    \n* **结构化数据** – 数据库、CSV 文件等。\n* **非结构化数据** – 语音录音、图像扫描文档\n* **B2B 数据** – 企业对企业数据流\n\
    * **B2C 数据** – 企业与消费者数据\n* **众包数据** – 例如维基百科\n* **不同体量** – 各种规模的数据\n\n根据数据类型及围绕数据所展开的流程，选择相应的集成模式。\n\
    \n在本章中，我们将重点介绍跨不同领域的企业中最常见的结构化数据形式。\n\n## 结构化数据源\n\n每个平台都需要元数据来启动任何流程的去中心化，以及将信息存储到分布式账本上。例如，在为金融机构的\
    \ KYC（了解你的客户）流程引入区块链之前，必须先从中心化软件平台获取现有数据。大多数企业在投资任何新技术之前，都依赖于平稳的过渡。基于这种区块链采用前的普遍预期，`Azure\
    \ SQL Databases`（最广泛使用的数据库之一）支持轻松集成，以实现从遗留软件向区块链的更平滑迁移。这种集成允许将元数据无缝地引入平台。结构化数据的流动可以多种形式发生：\n\
    \n* 连接后端系统和现有平台，例如 Microsoft Dynamics 365（该平台可能在组织中运行 ERP 和 CRM 应用程序）。在这些软件中，会用到\
    \ SQL 服务器，这些服务器可以为了数据源的目的与区块链平滑集成（图 6-2）。\n\n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig2_HTML.png](img/474923_1_En_6_Fig2_HTML.png)\n\
    \n  **图 6-2**  \n  从 Azure SQL 数据库服务器向 Azure 区块链提供数据源\n\n* 某些活动可能在链上执行，而某些活动允许在链外执行。当区块链对用于报告或展示目的（非审计相关）的数据存储不产生影响时，存储到\
    \ SQL 数据库中可以轻松地卸载处理（图 6-3）。\n\n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig3_HTML.png](img/474923_1_En_6_Fig3_HTML.png)\n\
    \n  **图 6-3**  \n  将数据从分布式账本交付到链外数据库，例如 Azure 上的 SQL 服务器\n\n* 基于不同目的和触发器的双向数据流。区块链可以将非平凡的数据存储到\
    \ SQL 服务器上，这些数据可用于中间报告和分析。\n\n* 当超过智能合约或共识算法中定义的数据限制器阈值时，SQL 服务器可以在 `Azure Blockchain\
    \ Workbench` 中调用不同的逻辑应用和事件触发器（图 6-4）。\n\n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig4_HTML.png](img/474923_1_En_6_Fig4_HTML.png)\n\
    \n  **图 6-4**  \n  针对不同目的的数据分发所共享的一套操作项\n\n## SQL 与区块链集成的连接与定义\n\n此过程包含两个步骤：\n\
    \n1. **建立连接**。`SQL Server Management Studio` 提供了 `Blockchain Workbench` 中 SQL\
    \ 存储的预览。在定义数据库架构之前，您可以看到数据流中的变化。集成的基本步骤是为区块链节点和 SQL 服务器设置正确的 IP 地址集。然后，您必须根据数据的流向启用读取-写入设置。\n\
    \n2. **定义数据库视图、应用程序视图、应用程序角色视图**——例如买方和卖方、用户对应用程序用户的分配以及应用程序用户的连接状态。\n\n涉及 `PowerBI`、`SAP`\
    \ 和 `Excel` 的其他 ERP 集成，也可以作为数据源来适配区块链生态系统。\n"
- fmt: "### Azure Cosmos DB Integrations with Blockchains\n\n`Azure Cosmos DB` is\
    \ a globally distributed, multi-model database service for any scale. This NoSQL\
    \ database provides multi-master nodes with connectivity across the globe while\
    \ transparently maintaining replicas throughout. However, this is not to be confused\
    \ with blockchains. `Azure Cosmos DB` appropriately aligns and integrates aspects\
    \ of shared distributed ledgers with blockchains.\n\nWhen you require an immutable,\
    \ append-only ledger and are dealing with multiple parties in a trustless network\
    \ with known permissioned stakeholdership, you need a combination of permissioned\
    \ blockchains with `Cosmos DB` to maintain the distributed storage and traceability.\n\
    \nIn other cases, where consensus is not a prime requirement, `Cosmos DB` may\
    \ suffice without the blockchains. Such cases include those where distribution\
    \ is maintained and aspects such as encryptions can be implemented on top of the\
    \ arrangement. One of the Unique Selling Proposition (USP)/key differentiators\
    \ of considering `Azure Cosmos DB` is its openness to integration with other technologies,\
    \ while at the same time allowing decentralization from its foundation, along\
    \ with other aspects of blockchains.\n\nPlatforms that wish to decentralize could\
    \ easily transition from `SQL`, `MongoDB`, `Gremlin Graph`, `Cassandra`, `Tables`,\
    \ and `CSVs` to Azure’s `Cosmos DB` on a large global scale.\n\nLet’s understand\
    \ a use case for `Azure Cosmos DB` with blockchains and then get into the technical\
    \ details.\n\nLet’s understand the use case by Microsoft over the XBOX Game Publishers’\
    \ Royalties that are accessible over the Azure Blockchain Services. This example\
    \ showcases the transparency facilitated in terms of tracing royalties from a\
    \ credible source. Game publishers can access royalty statements through this\
    \ assembly of technology. The process involved is a mix of on-chain tracing, off-chain\
    \ visualizations & immutable audit of processes. Thereby `Azure Cosmos DB` enables\
    \ the distributed storage of the royalties across the globe whereas the Blockchain\
    \ Service maintains the states of all processes maintaining credibility of the\
    \ information stored. The Blockchain Service also enables the automation of rules\
    \ over the royalties in the form of Smart Contracts.\n\nLet’s break down the implementation\
    \ to better understand the process flow.\n\n1.  Metadata is sourced from off-chain\
    \ storage, such as `Azure Cosmos DB`, `SQL`, or `MongoDB`.\n2.  Blockchain nodes\
    \ are initialized with the required information and the purpose of consensus,\
    \ if defined.\n3.  Further elements, such as event triggers, allow serverless\
    \ code to be driven on-chain with alerts and triggers.\n\nHere are the steps for\
    \ integration:\n\n1.  Reshape data schema to `Azure Cosmos DB` from `SQL` centralized\
    \ forms.\n2.  Restructure data structures to key value, column family, documents,\
    \ and graphs.\n3.  Global distribution.\n4.  Create a multi-master replication\
    \ protocol based on validation only or a form of consensus.\n5.  Check geographical\
    \ limitations and policies.\n6.  Identify the levels of trust and permissions\
    \ required for the processes.\n7.  Stack elements relevant to the processes.\n\
    \nThese steps are applicable when the distributed ledgers of data require the\
    \ blockchain aspects of connected validations and triggers of smart contracts.\
    \ One needs to identify the right confluence of integration for a seamless experience.\n\
    \nFor example, enterprises that maintain large-scale data jobs on `Apache Spark`\
    \ can seamlessly connect to `Cosmos DB` for the append-only transparent ledger.\
    \ Further, if the data jobs require a closed-loop consensus, `Azure Blockchain\
    \ Workbench` enables it. See: [`https://docs.microsoft.com/en-us/azure/cosmos-db/spark-connector`](https://docs.microsoft.com/en-us/azure/cosmos-db/spark-connector).\n\
    \nSimilar integrations can be established for `IoT` hub networks as well as SharePoint\
    \ systems with blockchains.\n\n### Onboarding: Compliance and Regulatory Requirements\n\
    \nOnce the sourcing of data is identified, data is sorted, structured, and stored\
    \ appropriately. The classification of data for private and public blockchains\
    \ as well as for on-chain and off-chain activities is crucial. Such classification\
    \ is linked to the policies that establish protection rights and regulations with\
    \ which every business must comply.\n\nAt the same time, the process by which\
    \ the data is handled is crucial, along with the state of the data, when we talk\
    \ about blockchains. For instance, a normal registration of a centralized online\
    \ platform merely requires an email and password set up, with some more details.\
    \ However, the process of storing the password and email is unknown to the end\
    \ user. There may be unsecured platforms that store passwords in plain-text and\
    \ may leak out values that could be used on secured platforms as well. Thus, onboarding\
    \ a user onto a blockchain differs from such common practices.\n\nOnboarding starts\
    \ with the machine addresses, private and public keys, and the validation of other\
    \ nodes, depending on the type and purpose of the blockchain.\n\nTherefore, the\
    \ second touchpoint of consideration is how this sourcing of data is seamlessly\
    \ onboarded to blockchains. This onboarding may be at the start of the blockchain\
    \ setup, or during intervals, or during ongoing operations, or during any number\
    \ of event triggers.\n\nHowever, how it is done is highly crucial to keeping the\
    \ sensitivity of the data and the credibility of its state in mind. As this integration\
    \ touchpoint is quite vulnerable to attack, the following aspects have to be scoped\
    \ out:\n\n*   Cybersecurity\n*   Compliance\n*   Regulations\n*   Geographic policies\
    \ (e.g., Europe)\n    *   `GDPR`\n    *   `PSD2` and e-Privacy\n*   Industrial\
    \ domain policies\n    *   Maritime\n    *   Manufacturing\n    *   Medical\n\n\
    This integration touchpoint does not have direct tools to implement; it is more\
    \ of a design consideration for the integration of processes related to onboarding.\
    \ This varies highly based on the application, location, and domain of the blockchain\
    \ platform.\n\n#### GDPR Considerations for Blockchains\n\nThe **General Data\
    \ Protection Regulation** (EU) [2016/​679](https://eur-lex.europa.eu/eli/reg/2016/679/oj)\
    \ (**GDPR**) is a regulation in EU law that covers data protection and privacy\
    \ for all individual citizens of the [European Union](https://en.wikipedia.org/wiki/European_Union)\
    \ (EU) and the [European Economic Area](https://en.wikipedia.org/wiki/European_Economic_Area)\
    \ (EEA). It also addresses the transfer of personal data outside the EU and EEA\
    \ areas. The GDPR aims primarily to give control to individuals over their personal\
    \ data and to simplify the regulatory environment for international business by\
    \ unifying the regulations within the EU.\n\nThis consists of three main aspects.\n\
    \n##### Definition of Purpose and Consent\n\nWhile onboarding users, the definition\
    \ of purpose must be clearly conveyed. Along with this, the rightful consents\
    \ to use the data must be clearly described. This European policy has ensured\
    \ such practices on a centralized platform. How does this apply to blockchains?\
    \ The answer is in the smart contract triggers, which may comply and check in\
    \ case of any deviation. For example, if a user has not provided consent, the\
    \ blockchain platform must clearly convey and commit to the bylaws defined in\
    \ the foundation of that blockchain."
