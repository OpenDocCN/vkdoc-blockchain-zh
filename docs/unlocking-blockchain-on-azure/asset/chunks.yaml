    dependent on non-standardized processes, scattered systems, and so forth.


    Microsoft further partnered with JP Morgan Bank to promote the Blockchain Service
    on Azure with the Quorum Blockchain. It enables the setup with a couple of clicks
    over Azure, integrating the Active Directory, event registers, and Visual Studio
    to write contracts and so forth. It applies all policies of the consortium defined
    by the Quorum Blockchain.


    “In a rapidly globalizing digital world, business processes touch multiple organizations
    and great sums are spent managing workflows that cross trust boundaries. As digital
    transformation expands beyond the walls of one company and into processes shared
    with suppliers, partners, and customers, the importance of trust grows with it.
    Microsoft’s goal is to help companies thrive in this new era of secure multi-party
    computation by delivering open, scalable platforms, and services that any company
    from game publishers and grain processors, to payments ISVs and global shippers
    can use to digitally transform the processes they share with others,” explained
    Mark Russinovich, Chief Technology Officer, Microsoft Azure.


    ### Other Financial Industries


    Another set of applications that could benefit from a blockchain deployment of
    processes are the following:


    *   Decentralized KYC (Know Your Customer) and credit data validation


    *   Reduced risk of fraud and lower compliance costs


    *   New avenues of financing and tracing trade activities


    As readers, one must question how the application is broken down into the real-life
    implementations. As we saw in the last chapter, the architecture for letters of
    credit involved an overseas trade activity.


    Similarly, for these application use cases, let us speculate on the suitable tools,
    consensuses, and outcomes.'
  trans: '

    ## 去中心化贸易金融


    区块链最常见且首要的应用场景之一，源于传统贸易金融运作中面临的挑战；一个更直接的例子是国际贸易金融，其中银行、银行法规和国际贸易法的变更所催生的流程，导致交易结算需要数天时间。


    此类场景中的另一个挑战是，在支付转账以及作为交换所提供的商品/服务方面缺乏透明度，并且交易完全依赖银行（在大多数情况下，交易对手方的银行可能甚至不在你的国家运营，无法提供协助）。


    其他反复被提及的痛点如下：


    -   创建、验证和审计贸易数据及文档的易错人工流程

    -   难以验证的孤立数据，导致信息多版本共存以及重大的欺诈、合规和审计风险

    -   互不关联的遗留系统限制了新的商业机会，并使中小企业难以获得融资渠道


    因此，既然我们在上一节研究了利用区块链技术优化供应链流程对客户体验的影响，那么在本节中，让我们深入探讨那些影响生活、贸易和我们财务状况的贸易金融流程。


    ### 微软 Azure 与银行


    `微软新闻`提到，全球超过 80%的大型银行是`Azure`的客户。


    为了帮助解决“去中心化贸易金融”部分提到的痛点，区块链被引入并进行试验，现在终于开始进入主流应用。像`美银美林`（现称为`BofA Securities`）这样的主要参与者正率先采用`Azure`区块链，旨在创建一个更加透明的贸易金融生态系统，而且早在
    2016 年就开始了，这充分说明了行业对区块链潜力的信心。像`汇丰银行`和`荷兰国际集团银行`这样的银行也纷纷效仿，如今这一现象在所有金融机构中正变得流行起来。


    为了更好地理解贸易金融和区块链的整合，让我们深入探究`美银美林`的案例。


    `微软`和`美银美林`早在 2016 年就宣布合作，利用区块链技术推动贸易金融交易的转型。


    作为此次合作的一部分，两家公司决定构建和测试技术、创建框架，并为基于区块链的企业与其客户及银行之间的交易建立最佳实践。`微软财务`专家担任顾问和初始测试客户，建立了大型企业财务与金融机构之间首个由`Microsoft
    Azure`驱动的区块链交易。


    众所周知，数字化开始的时候，出现了许多`ERP`系统。有了这类软件，银行开始增加向这些系统的数据录入，这使得支持此类任务的人员效率极低，而数据的可信度完全掌握在数据录入人员手中。不仅是在银行，贸易金融的所有环节——进口商、出口商、银行、海关人员以及其他利益相关者——都必须填写各种纸质和数字表格。这非常依赖于人工操作，耗费时间，且常常出错。这些系统过去通常以纯文本形式存储此类数据，因为当时大多数系统处于该技术的早期阶段，主要专注于简单地聚合数据。然而，缺乏防篡改的数据存储方法。


    借助区块链，流程可以实现数字化和自动化，缩短交易结算时间，并将业务逻辑应用于相关数据，为企业和金融机构带来一系列潜在优势，包括更可预测的营运资金、降低交易对手风险、提高运营效率和增强审计透明度等，这一切都在一个匿名的闭环交易网络中实现。


    由此，区块链为简化贸易金融打开了大门，使参与者能够轻松交换数据并实时追踪资产。`微软`正在利用`Corda`，这是一个企业级账本，使银行能够限制谁能查看哪些信息，并仅与相关方选择性共享数据。该解决方案涉及将区块链技术与`Azure`和`API`配对使用，未来还可用于集成`AI`、机器学习、`IoT`等技术。


    在将区块链应用于信用证处理流程后，签发`SBLC`的周转时间从之前的 3 到 5 周缩短到了 3 到 5 天！同样地，在自动化智能合约上的条件后，海外交易的结算时间也大幅缩短。一旦条件满足，交易即可立即结算。


    通过区块链封装挑战，并利用验证器节点积极验证交易，结算变得更加清晰和迅速。然而，在没有区块链的情况下，清关数据的传输请求依赖于非标准化流程、分散的系统等等。


    `微软`进一步与`摩根大通银行`合作，利用`Quorum 区块链`推广`Azure 上的区块链服务`。它允许通过在`Azure`上进行几次点击来完成设置，集成了`Active
    Directory`、事件注册表和`Visual Studio`来编写合约等。它应用了`Quorum 区块链`定义的所有联盟策略。


    “在快速全球化的数字世界中，业务流程涉及多个组织，大量的资金花费在管理跨越信任边界的流程上。随着数字化转型扩展到单个公司的围墙之外，并进入与供应商、合作伙伴和客户共享的流程，信任的重要性也随之增长。微软的目标是通过提供开放、可扩展的平台和服务，帮助公司在安全多方计算的新时代蓬勃发展，从游戏发行商、谷物加工商到支付
    ISV 和全球托运人，任何公司都可以使用这些平台和服务，对与他人共享的流程进行数字化转型，”`Microsoft Azure`首席技术官`Mark Russinovich`解释说。


    ### 其他金融行业


    其他可以从区块链部署流程中受益的应用包括：


    -   去中心化的`KYC`（了解你的客户）和信用数据验证

    -   降低欺诈风险和合规成本

    -   融资和贸易活动追踪的新途径


    作为读者，我们必须思考这些应用如何分解到实际实施中。正如我们在上一章所见，信用证的架构涉及海外贸易活动。


    类似地，针对这些应用场景，让我们推测合适的工具、共识机制和结果。

