- fmt: '# Kodak Services for Business Overview


    `Kodak Services for Business`, as the suite is called, is a platform built with
    the aim to store and manage documents that are sensitive in nature in an efficient
    and secure manner. The Kodak Document Management Platform is intended to provide
    businesses and governments a facility to handle documents by storing them with
    security and regulating access over a blockchain.


    Kodak estimates a 20 to 40 percent cost savings through the automation of workflows
    and decrease in human intervention in content, information, and documents. In
    January 2018, a third party licensed the Kodak brand name for `KODAKCoin`, which
    was designed to work with a blockchain developed to track image copyrights online.


    Similar to how the supply chain was one of the foremost reasons for blockchains
    to scale up, the process of document management and security is becoming more
    popular in the blockchain space. It is not only Kodak that is looking at it as
    a potential offering to businesses.


    `Billon`, a Polish-British fintech firm, is also working on a platform for a blockchain-based
    document management system.


    The digitization of documents in the digital era, given the redundancy and reconciliation
    efforts wasted in hard copy, has driven companies to look into digitization and
    further builds a case for blockchains as the most viable option, considering security
    and access control.


    With this, we come to the end of the part of the book where we reflect upon use
    cases and technical learnings. We envision helping you to evaluate your understandings
    and learnings in the next chapter. Chapter [10](#474923_1_En_10_Chapter.xhtml)
    further provides hands-on exercises.


    # 10. Puzzles and Exercises


    This chapter helps to validate the learning curve over Blockchains and enables
    to design blockchain implementations. Attempt the challenges presented here hands-on
    to develop your skill. Refer back to the chapters relevant to the question. As
    the vision of this book is to enable readers from technical as well as non-technical
    backgrounds to be a part of the blockchain ecosystem, attempting this chapter
    is one of the validators as well as a catalyst to innovate further.


    The exercises cover the following:


    * Terminology

    * Consensus algorithms

    * Design challenges

    * Blockchain or not?

    * IoT with blockchain

    * Smart contracts

    * Mind maps


    Remember: These exercises may have more than one correct answer. Also, as this
    is a field of innovation, the facts may evolve to a different form of existence.
    However, the fundamentals of decentralization, transparency, encryption, and immutability
    will remain the same. One may reflect upon the past chapters in different ways
    on every iteration of study.


    Throughout the book, we have examined various use cases across different industries.
    Before you start the exercises, choose one of the roles and view the challenges
    from that user’s lens.


    For example, if you read this book as a business developer, look at the infrastructure
    impact around the platform, the kind of people to interact with on-chain, and
    the policies that will have to be formed off-chain as well as on-chain. The challenges
    with respect to design will help you identify the right stakeholders to facilitate
    such a decentralized ecosystem.


    If you read as a solution architect, draw out the variables internal to the platform.
    Analyze the changes in these variables. Focus on the pros and cons of each variable
    from your standpoint. Identify various technology stack options for every use
    case and its maturity for each use case.


    If you read as a developer, focus on the tangibility of existing solutions with
    respect to the problem definitions at hand. To ensure building capabilities for
    better consensus algorithms and smart contracts, practice flow charts of execution,
    pseudo codes of business conditions, and user stories, and finally form it in
    the code. This code syntax may evolve from platform to platform; however, the
    fundamental logic will remain the same.


    Attempt these challenges with the focus and vision that you are working for. If
    you are working in a team comprising a business developer, a solution architect,
    and a developer, the book encourages you to solve the challenges individually
    and exchange notes to have a broader understanding from different perspectives
    and roles.


    Solutions are provided at the end of the chapter.


