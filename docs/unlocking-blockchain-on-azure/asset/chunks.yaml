    Consider a scenario where organs for transplant have to be transported. The hospital
    patient who subscribes to the service as well as the doctor gets to see the quality
    of the transfer throughout the transport.


    The blockchain ledger can have the following nodes:


    ![../images/474923_1_En_10_Chapter/474923_1_En_10_Figs_HTML.jpg](Images/474923_1_En_10_Figs_HTML.jpg)


