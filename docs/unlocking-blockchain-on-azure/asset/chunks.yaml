    # 2. 解码真实世界的区块链


    本章为全书中展开区块链的各个元素奠定了基础。


    请让这些概念卡片（如图 2-1 所示）在脑海中循环，我们将看到现实世界的应用如何将它们绑定成一个成功的区块链实现。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig1_HTML.png](img/474923_1_En_2_Fig1_HTML.png)


    图 2-1


    区块链各层面的概念卡片


    这些概念卡片按照构建区块链时应考虑的先后顺序，从上到下排列。


    在本章中，真正在海洋上掀起波澜的真实区块链平台是 **BBChain**——**区块链上的黑匣子**。它带来了一个非常有趣的区块链用例，值得我们学习。我们将解码区块链的每个元素，并观察它如何被嵌入到这个平台中，从而改变全球海事数据的流动方式。本章重点如下：


    - 区块链背后的目的与原理——共识与协议

    - 将中心化平台转变为去中心化区块链——共享账本

    - 在整个链上保障数据安全——加密

    - 评估链的价值及其对利益相关者的效用——代币

    - 最终图景——去中心化应用（DApps）

    - 在 Azure 上搭建区块链环境


    ## 共识与协议


    每十年，都有一些海上的船只和空中的飞机消失。生命逝去，不留踪迹。


    这些生命至关重要，与这些事故相关的数据亦然。因此，`BBChain` 尝试通过去中心化的方式，在区块链上处理航行数据记录仪（VDR）数据。传统的黑匣子或船载
    VDR 记录了船上发生的一切。然而，它会随着失事船只一同沉没，有时甚至无处可寻。


    尽管几十年来各种技术层出不穷，但最新一代的技术专家们制定了将 VDR 数据存储在云端的方案。VDR 提供商会将黑匣子数据同步到中心化的云服务器，黑匣子会按不同的时间间隔向该服务器传输数据。


    通过使用基于区块链的 `BBChain` 协议来革新黑匣子，我们将学习共识在增强黑匣子可信度方面扮演的重要角色（图 2-2）。


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig2_HTML.jpg](img/474923_1_En_2_Fig2_HTML.jpg)


    图 2-2


    BBChain 公共账本示意图


    如图 2-2 所示，航运贸易中涉及的主要利益相关者包括：


    - **作为节点（物联网设备）的区块链黑匣子**：该设备实时将所有船上测量数据、传感数据和航行数据输入到与整个网络同步的区块链节点。

    - **船东**：这些用户能够透明地查看船只的实时状况，并进行监控。

    - **制造商**：船厂为船舶维护多年的服务合同。加入链上可以让它们实时了解航行的海里数以及所需的维护工作。

    - **保险公司**：在审计期间，保险公司需要船舶历史上完整的符合性记录审计追踪。连接到链上可以实现记录的不可篡改。

    - **船舶经纪人**：链上的历史记录为船舶经纪人推荐船舶提供了可信度。

    - **港口国与船旗国**：港口国是船舶进入水域的地点，而船旗国是船舶注册的地方。这些实体可以在链上可信地接入这些记录。

    - **船级社**：制定和维护船舶及海上结构物建造与运营技术标准的组织。

    - **检验机构**：这些组织评估船舶的结构完整性和性能，并执行审计和质量检查，以形成标准化的评级体系。


    这一系列海事行业的利益相关者构成了公共账本区块链的节点。对于这个公共账本的任何更改，所有利益相关者都必须根据该区块链预定义的协议达成共识。当前，这些利益相关者之间的交互完全基于纸张——或者正在向基于云的数字文档过渡。


    在我们深入探讨 `BBChain` 所使用的共识形式之前，让我们先回顾一下共识的简单定义：


    > *共识——一群人普遍接受的意见或决定*

    > ——《剑桥词典》


    任何区块链的核心都在于其共识机制。在区块链上，参与链的一组节点（代表用户的服务器/对等实例）会就一个基本原则达成协议，该原则被编码为一套规则，适用于网络上的每一条数据或每一个状态。这是通过所有节点之间的分布式过程实现的。每个区块链受相同或不同的共识机制管理。


    例如，比特币和以太坊采用工作量证明共识机制。每次区块方程被解出（工作）时，奖励的代币就会给予验证交易的个体。

    '
- fmt: 'Further, Ethereum is pursuing a shift to the proof of stake consensus mechanism,
    where, instead of work, the stake (ownership value) takes precedence in forming
    an agreement.


    Here’s a view of different types of consensus governing various blockchains.


    | Blockchain Name | Consensus Mechanism | Description |

    | --- | --- | --- |

    | Bitshares | Delegated Proof of Stake | Mechanism where nodes can delegate the
    responsibility of having a stake to another node to validate a transaction |

    | NEM | Proof of Importance | Important nodes have high transactional control
    |

    | Stellar | Federated Byzantine Agreement | Quorum slices chosen at random form
    intersections to validate a transaction on behalf of all nodes |

    | Corda | Consensus over State Validity Uniqueness | Nodes reach certainty based
    on the validity of the contract over input and output states as well as the uniqueness
    of the output, such that the input was never consumed before |

    | EOS | Byzantine Fault Tolerance—Delegated Proof of Stake | Selection of block
    producers through a continuous approval voting system that runs with a fault-tolerant
    mechanism |


    The recent rise in popularity of this technology and the large flow of funds toward
    it are mainly due to the consensus-regulated nature of such platforms. The quantification
    of effort, value, and processes has increased tenfold in this era that has a growing
    digital footprint.


    Thus, as a software architect, how do we decide on the suitability of a principle
    for a blockchain platform?


    1. Start with understanding the application

    2. Break down and understand the existing digital form of the application at hand.

    3. Identify the limitations of the current setup that one is aiming to solve.

    4. Question which aspect of the application requires decentralization, tokenization,
    or encryption.

    5. Segment the audience for the application—random open users or restricted invite-only
    users?

    6. Analyze the audience dynamics.


    With BBChain, the answers to the preceding questions were as follows:


    1. A platform for voyage data to be shared across stakeholders

    2. Existing solutions are on ship or on centralized cloud servers

    3. Data can be manipulated or lost, leading to conspiracies over lost ships and
    aircraft in existing solutions

    4. Data on a shared decentralized ledger, with the value of the data quantified
    with tokens and secured channels of operations, such that data cannot be manipulated
    or modified without the agreement of the stakeholders involved

    5. Audiences of the maritime industry, such as ship owners, port owners, manufacturers,
    port and flag states, insurance companies, and private users

    6. The users may be the stakeholders of the public ledger that enlists the data
    of the ship voyages, vessel names, type of data, locations, ports, and routes.
    Further users like insurers may want to know more than the information on the
    shared public ledger. Thus, one must require that the insurer subscribes to private
    data on the private ledger.


    Thus, the following configuration of a hybrid network that has a combination of
    public and private ledgers would work (Figure [2-3](#474923_1_En_2_Chapter.xhtml#Fig3)):


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig3_HTML.jpg](Images/474923_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** Visual representation of a hybrid network of various stakeholders


    - **Public Ledger**: A chain of nodes where data is shared publicly with all nodes,
    and every transaction is validated publicly across the chain via a commonly agreed
    upon consensus of that chain. Anyone can openly invite new members to such a chain
    and add blocks transparently.

    - **Private Ledger**: A chain of selective nodes that exclusively have access
    to private data and selective validating rights to form consensus internally with
    a permissioned set of capacities.


    The BBChain protocol provides a way to reach consensus for the maritime peer-to-peer
    network of stakeholders for voyage data. The chain is a hybrid blockchain of private
    chains involving the BBChain node, ship owner, and the IoT devices on the ship,
    and a public chain that includes all maritime stakeholders, as shown in Figure
    [2-3](#474923_1_En_2_Chapter.xhtml#Fig3). Private chains can be formed on the
    fly when there are private transactions on the chain. Several such private chains
    are called side chains and form out of public chains.


    Consensus in this protocol can only be reached with a blend of the following:


    - Federated Byzantine Agreement

    - Proof of stake

    - Proof of importance


    The foundation of the protocol uses the Federated Byzantine Agreement on the public
    ledger, which includes all peers of the maritime industry, consisting of manufacturers,
    port and flag states, ship owners, and other stakeholders. Hence, let’s deep dive
    into the protocol and understand it better, using Figure [2-3](#474923_1_En_2_Chapter.xhtml#Fig3).'
  raw: 'Further, Ethereum is pursuing a shift to the proof of stake consensus mechanism,
    where, instead of work, the stake (ownership value) takes precedence in forming
    an agreement.


    Here’s a view of different types of consensus governing various blockchains.


    | Blockchain Name | Consensus Mechanism | Description |

    | --- | --- | --- |

    | Bitshares | Delegated Proof of Stake | Mechanism where nodes can delegate the
    responsibility of having a stake to another node to validate a transaction |

    | NEM | Proof of Importance | Important nodes have high transactional control
    |

    | Stellar | Federated Byzantine Agreement | Quorum slices chosen at random form
    intersections to validate a transaction on behalf of all nodes |

    | Corda | Consensus over State Validity Uniqueness | Nodes reach certainty based
    on the validity of the contract over input and output states as well as the uniqueness
    of the output, such that the input was never consumed before |

    | EOS | Byzantine Fault Tolerance—Delegated Proof of Stake | Selection of block
    producers through a continuous approval voting system that runs with a fault-tolerant
    mechanism |


    The recent rise in popularity of this technology and the large flow of funds toward
    it are mainly due to the consensus-regulated nature of such platforms. The quantification
    of effort, value, and processes has increased tenfold in this era that has a growing
    digital footprint.


    Thus, as a software architect, how do we decide on the suitability of a principle
    for a blockchain platform?


    1.  Start with understanding the application


    2.  Break down and understand the existing digital form of the application at
    hand.


    3.  Identify the limitations of the current setup that one is aiming to solve.


    4.  Question which aspect of the application requires decentralization, tokenization,
    or encryption.


    5.  Segment the audience for the application—random open users or restricted invite-only
    users?


    6.  Analyze the audience dynamics.


    With BBChain, the answers to the preceding questions were as follows:


    1.  A platform for voyage data to be shared across stakeholders


    2.  Existing solutions are on ship or on centralized cloud servers


    3.  Data can be manipulated or lost, leading to conspiracies over lost ships and
    aircraft in existing solutions


    4.  Data on a shared decentralized ledger, with the value of the data quantified
    with tokens and secured channels of operations, such that data cannot be manipulated
    or modified without the agreement of the stakeholders involved


    5.  Audiences of the maritime industry, such as ship owners, port owners, manufacturers,
    port and flag states, insurance companies, and private users


    6.  The users may be the stakeholders of the public ledger that enlists the data
    of the ship voyages, vessel names, type of data, locations, ports, and routes.
    Further users like insurers may want to know more than the information on the
    shared public ledger. Thus, one must require that the insurer subscribes to private
    data on the private ledger.


    Thus, the following configuration of a hybrid network that has a combination of
    public and private ledgers would work (Figure [2-3](#474923_1_En_2_Chapter.xhtml#Fig3)):


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig3_HTML.jpg](Images/474923_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Visual representation of a hybrid network of various stakeholders


    *   Public Ledger: A chain of nodes where data is shared publicly with all nodes,
    and every transaction is validated publicly across the chain via a commonly agreed
    upon consensus of that chain. Anyone can openly invite new members to such a chain
    and add blocks transparently.


    *   Private Ledger: A chain of selective nodes that exclusively have access to
    private data and selective validating rights to form consensus internally with
    a permissioned set of capacities.


    The BBChain protocol provides a way to reach consensus for the maritime peer-to-peer
    network of stakeholders for voyage data. The chain is a hybrid blockchain of private
    chains involving the BBChain node, ship owner, and the IoT devices on the ship,
    and a public chain that includes all maritime stakeholders, as shown in Figure
    [2-3](#474923_1_En_2_Chapter.xhtml#Fig3). Private chains can be formed on the
    fly when there are private transactions on the chain. Several such private chains
    are called side chains and form out of public chains.


    Consensus in this protocol can only be reached with a blend of the following:


    *   Federated Byzantine Agreement


    *   Proof of stake


    *   Proof of importance


    The foundation of the protocol uses the Federated Byzantine Agreement on the public
    ledger, which includes all peers of the maritime industry, consisting of manufacturers,
    port and flag states, ship owners, and other stakeholders. Hence, let’s deep dive
    into the protocol and understand it better, using Figure [2-3](#474923_1_En_2_Chapter.xhtml#Fig3).'
  trans: '

    此外，以太坊正寻求转向**权益证明**共识机制。在这种机制下，达成协议时，权益（所有权价值）占据优先地位，而非工作量。


    以下是管理不同区块链的各类共识机制概览。


    | 区块链名称 | 共识机制 | 描述 |

    | --- | --- | --- |

    | Bitshares | 委托权益证明 | 一种节点可将权益责任委托给另一节点以验证交易的机制 |

    | NEM | 重要性证明 | 重要节点拥有较高的交易控制权 |

    | Stellar | 联邦拜占庭协议 | 随机选择的仲裁片段形成交集，代表所有节点验证交易 |

    | Corda | 状态有效性唯一性共识 | 节点基于合约对输入与输出状态的有效性以及输出的唯一性（确保输入从未被使用过）达成确定性 |

    | EOS | 拜占庭容错——委托权益证明 | 通过一个与容错机制协同运行的持续批准投票系统来选择区块生产者 |


    这项技术近期广受欢迎并吸引大量资金流入，主要归因于此类平台具有基于共识的监管特性。在这个数字化足迹日益增长的时代，对工作量、价值和流程的量化需求已增长十倍。


    因此，作为软件架构师，我们应如何判断某个原则是否适用于特定区块链平台？


    1. 从理解应用场景开始

    2. 分解并理解现有应用的数字化形态

    3. 识别当前方案中亟待解决的局限性

    4. 审视应用的哪些方面需要去中心化、代币化或加密

    5. 划分应用的受众——是随机的开放用户，还是仅限受邀者的封闭用户？

    6. 分析受众动态。


    以 BBChain 为例，上述问题的答案如下：


    1.  平台用于在利益相关方之间共享航行数据

    2.  现有方案部署在船上或集中式云服务器上

    3.  数据可能被篡改或丢失，导致现有方案中关于船只和飞机失踪的阴谋论

    4.  数据存储在共享的去中心化账本上，数据价值通过代币量化，并拥有安全的操作通道，使得未经相关方同意，数据无法被篡改或修改

    5.  海事行业的受众，如船东、港口所有者、制造商、船旗国与港口国政府、保险公司以及私人用户

    6.  用户可能是公共账本的利益相关方，该账本记录船舶航行数据、船名、数据类型、位置、港口和航线。而保险公司等进一步用户可能希望获取超过共享公共账本之外的信息。因此，需要确保保险公司订阅私有账本上的私有数据。


    因此，如下所示，一个包含公共和私有账本的混合网络配置是可行的（图 2-3）：


    ![../images/474923_1_En_2_Chapter/474923_1_En_2_Fig3_HTML.jpg](img/474923_1_En_2_Fig3_HTML.jpg)


    **图 2-3** 多方利益相关者混合网络的直观表示


    -   **公共账本**：一个节点链，数据对所有节点公开共享，并通过该链普遍认同的共识机制公开验证每一笔交易。任何人都可以公开邀请新成员加入此链，并透明地添加区块。

    -   **私有账本**：一个由精选节点组成的链，这些节点拥有对私有数据的独占访问权，并拥有经许可的能力集在内部形成共识的选择性验证权。


    BBChain 协议为海事领域点对点网络中的利益相关者就航行数据达成共识提供了一种方式。该链是一个混合区块链，由涉及 BBChain 节点、船东和船上物联网设备的私有链，以及包含所有海事利益相关者的公共链组成，如图
    2-3 所示。当链上出现私有交易时，可以即时创建私有链。多个此类私有链被称为侧链，它们从公共链中衍生出来。


    该协议中的共识只能通过以下机制的混合来实现：


    -   联邦拜占庭协议

    -   权益证明

    -   重要性证明


    该协议的基础是在公共账本上采用联邦拜占庭协议，该账本包含海事行业的所有对等节点，包括制造商、港口国与船旗国政府、船东及其他利益相关者。因此，让我们使用图 2-3
    深入探讨该协议，以更好地理解它。

