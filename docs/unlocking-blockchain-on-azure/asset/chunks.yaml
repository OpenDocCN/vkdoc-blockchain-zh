- fmt: 'In such scenarios, the customer ends up getting spammed instead of the information
    serving its intended purpose. Thus, `Bill’U` has been powered by a combination
    of public plus private blockchains that enable retailers to understand their customers’
    data and provides them with insights and relevant data, all while masking the
    personal data of the user. As the personal data is masked but the other relevant
    data is available on the public chain, the retailer can create custom offers for
    clients and use insights for the benefit of the clients, all while shielding the
    client’s personal info, which is stored separately on the private chain of the
    hybrid blockchain, thus protecting the client’s data and giving them a “wow” retail
    experience, which helps them take care of all relevant details after shopping.


    The technical construct is shown in Figure [9-3](#474923_1_En_9_Chapter.xhtml#Fig3).


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig3_HTML.png](Images/474923_1_En_9_Fig3_HTML.png)


    **Figure 9-3** Chain representation based on the transaction between users. Each
    user in a node has its own AI module to avoid sharing of private data


    Every user represents a peer node, whereas `Bill’U` performs the role of a validator
    node between billing transactions of documents between two stakeholders in a private
    chain. In the public chain, all peer nodes can derive trends, consumption demographics,
    and voucher offers from anonymous data distributed among all nodes. The AI processing
    of the `Bill’U` nodes is local to the user, which maintains the privacy of the
    most confidential documents on `Bill’U`. This prime feature of data security is
    rare to find in most AI applications, which compute on a server rather than on
    a device.


    Here, the original data is kept secure as compared to the other AI services. The
    learnings from the nodes are on the public ledger, which do not expose the original
    data of users, thereby benefiting all stakeholders with recommended purchase trends
    and other recommendations with the `Ask Bill’U` service.


    AI services being local to the user, `Bill’U` services are customer-centric. For
    example, when you use `Ask Bill’U`, it answers by learning from your data on your
    node and analyzing on the device itself. Meanwhile, `Alexa` or `Siri` go to some
    other server, taking all your data, analyze on the company server, and return
    back results that may or may not be biased.


    `Bill’U` reminds the user about the expiry of warranties and prompts to use vouchers
    and birthday offers personal to the shopper. At the same time, it allows retailers
    to share bills wirelessly without any email or phone number dependency.


    The querying mechanism for `Ask Bill’U` or the `Make a Wish` section, shown in
    Figure [9-4](#474923_1_En_9_Chapter.xhtml#Fig4), is also local to the user. However,
    such a private service depends on the global learning of the AI module to understand
    the natural language of the user. Thus, when the service is catered through the
    blockchain ledger, the querying attempts to search locally on the node first,
    then traverses through the private ledger that is internally shared between the
    customer, retailers where this customer shops, the `Bill’U` global learning center,
    then, finally, the public ledger in the last case. This makes the response cover
    all aspects of the user in complete fairness.


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig4_HTML.jpg](Images/474923_1_En_9_Fig4_HTML.jpg)


    **Figure 9-4** AI feature of `Bill’U` known as `Make a Wish` or `Ask Bill’U` that
    answers user’s queries with respect to his bills


    This detailed look at the AI capabilities is to understand the role of the blockchain
    on this platform. When such care is taken toward not exposing any confidential
    data while delivering AI services, the process of data transfer requires a careful
    choice of technology. Therefore, we utilize the encryption, decentralization,
    and transparency of the blockchain platform for the transfer of anonymous data
    on public blockchains exclusive to the users of the blockchain only, and send
    the personal transaction data between buyer and seller on the private chain. Any
    user outside the chain will have to join the ledger to access the public data,
    and if a user wishes to access a private blockchain, it will require the consensus
    of the stakeholders of the chain. Also, many times when confidential data is limited
    to an edge device, there is a risk of losing data due to physical damage, corrupt
    files, etc. `Bill’U` provides a private blockchain option for users to back up
    and replicate the node on another device or a virtual machine, thereby making
    it fault tolerant, secure, and accessible over the cloud, with distributed security
    on a private blockchain, where the participating nodes are the sole user accessing
    it from different devices.


    `Bill’U` blockchain features:


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig5_HTML.jpg](Images/474923_1_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Digitized bill on blockchains


    - Digital vault for asset documents

    - Digital locker for purchase documents

    - Secure, encrypted, backed up personal ERP system

    - Decentralized AI with global and local learning models

    - Smart contract alerts for warranty expire, resale terms, etc.

    - Universal billing format enabling smart contracts for resell, warranty, etc.

    - Wireless bill-sharing platform without exposing your email, ID, or phone number
    (ref Figure [9-5](#474923_1_En_9_Chapter.xhtml#Fig5), QR-based bill)


    Since this platform is B2B2C, the blockchain architecture will be a hybrid network
    of public and private permissioned ledgers. The genesis node of `Bill’U` will
    be connected to all other retailers in the form of different decentralized networks.
    `Bill’U` will be connected to all types of vendors that can scan their bills and
    upload on the platform, which will digitize all types of receipts collected from
    the grocery shops, big department stores, medical offices, taxi drivers, even
    small merchandise, hospitals, restaurants, and movie tickets.


    Each asset will be stored on the blockchain, since it is a private permissioned
    blockchain. Once the new block is updated on the ledger, no one can change the
    block on the ledger. Each transaction on the blockchain will be immutable.


    The end user receives a unique hashed identifier formed with the private key,
    and only enabled parts of the public data can be viewed with the public key. Using
    this unique identifier and private key, the end user can access his last expenses
    and get analytics and recommendations on top of it. However, this personal data
    remains anonymous with the unique hash ID.


    This intermesh of chains with a common genesis, i.e., the `Bill’U` node, resembles
    several possible inter-chain architectures. One such architecture is formed by
    NTU’s `COMMENDO`, which is a lightweight blockchain that forms the underlying
    chain of data and data processes.


    Being a B2B2C platform, the expansive requirements of such a hybrid chain requires
    high-speed data transactions as well as scalability in terms of storage.


    To enable several asynchronous transactions among various private chains and the
    flow of public data onto the public blockchain, the blockchain works over `Apache
    Cassandra`—a distributed database system. This ensures high availability and high
    read-write throughput. `Bill’U`’s blockchain utilizes NTU’s `COMMENDO` blockchain
    to allow anonymous transactions with distributed asynchronous worker queues.


    Similarly, check out Azure’s `CosmosDB` as a probable choice for a decentralized
    distributed database.'
