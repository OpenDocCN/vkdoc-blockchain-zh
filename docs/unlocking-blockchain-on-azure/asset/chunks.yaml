    \ 256 位密钥所需的计算能力是破解 128 位密钥的`2¹²⁸`倍。理论上，五十台每秒可检查`10¹⁸`个 `AES` 密钥的超级计算机需要约`3×10⁵¹`年才能解码密钥空间。这使得不仅人类，甚至超级计算机都几乎不可能确定两个个体之间通信的数据。\n\
    \n让我们自由聊天的一个原因是简单的指示器：聊天是端到端加密的。这就是 WhatsApp 凭借如此庞大的用户群而受欢迎的原因。让我们看看他们是如何加密的。\n\
    \n端到端加密确保发送的消息只能由发送者和接收者读取，而不能由第三方读取，甚至 WhatsApp 也无法读取。WhatsApp 给出的基本描述是，正在发送的消息被锁保护，只有接收者和发送者拥有这些锁的钥匙。为了使第三方解密更加复杂，每条消息都有一组唯一的锁和钥匙。\n\
    \n用于加密的某些术语如下：\n\n*   公钥类型\n    *   `Identity Key Pair` – 一个长期 `Curve25519` 密钥对，在安装时生成\n\
    \    *   `Signed Pre-key` – 一个中期 `Curve25519` 密钥对，在安装时生成，由身份密钥签名，并定期轮换\n    *\
    \   `One-time Pre-keys` – 一次性的 `Curve25519` 密钥对队列，在安装时生成，并根据需要补充\n*   会话密钥类型\n\
    \    *   `Root Key` – 一个 32 字节值，用于创建链密钥\n    *   `Chain Key` – 一个 32 字节值，用于创建消息密钥\n\
    \    *   `Message Key` – 一个 80 字节值，用于加密消息内容。32 字节用于 `AES-256` 密钥，32 字节用于 `HMAC-SHA256`\
    \ 密钥，16 字节用于 `IV`\n\nWhatsApp 不仅加密聊天中的文本消息，还在每个步骤包含加密，从注册过程、发起会话、接收会话、交换消息、传输媒体和其他附件到群组消息、状态以及实时位置。\n\
    \n类似地，区块链通过在每个步骤、每个节点和每笔交易中为链上的每个区块添加加密来确保类似的安全性。加密货币是在解决基于链所依据的基本原则或共识的加密方程时被挖掘出来的。\n\
    \n让我们看看比特币如何通过其加密方式处理安全性：\n"
- fmt: 'Bitcoin (₿) is a cryptocurrency, a form of electronic cash. It is a decentralized
    digital currency without a central bank or single administrator that can be sent
    from user-to-user on the peer-to-peer Bitcoin network without the need for intermediaries.
    Transactions are verified by network nodes through cryptography and recorded in
    a public distributed ledger called a blockchain. Bitcoins are created as a reward
    for a process known as mining. They can be exchanged for other currencies, products,
    and services.


    So, let’s understand where encryption is used for a Bitcoin, in contrast with
    the WhatsApp example that we just saw. Bitcoin does not use encryption of the
    data throughout the transaction directly. It ensures that the user’s wallet is
    secured by digital signatures. Users using the Bitcoin network to transfer simply
    validate with their digital signatures. However, the mining process is different
    from a transaction—mining yields Bitcoins upon validation of the transaction on
    the network. Not all users may be miners. The ones who validate or take the effort
    to authenticate a transaction are the ones who earn.


    A digital signature offered by a Bitcoin user proves their ownership over the
    authorization of a transfer in a way that can be validated by everyone on the
    network. A digital signature such as `ECDSA` ([Elliptic Curve Digital Signature
    Algorithm](https://en.bitcoin.it/wiki/Elliptic_Curve_Digital_Signature_Algorithm))
    with variations of the elliptic curve are used. Imagine this like XORO walking
    to his bank safety deposit box with his private key, where the bank manager has
    a public key. The combination of both authorizes the opening of the locker. However,
    in the case of a Bitcoin, the private key is not provided by any central authority,
    but rather is generated privately in its true form, and the bank manager is the
    entire peer network rather than one person. This makes it way more reliable and
    inaccessible to anyone else.


    To dive deeper into the cryptography used by Bitcoin, the elliptic curve defined
    over `SHA256` is `secp256k1`.


    The definition of the elliptic curve in `secp256k1` is as follows:


    `y² = x³ + 7`


    Looks like gibberish? Let’s see how XORO uses all of this. XORO and the bank manager
    generate their own private keys. They agree on a public key based on an equation
    and factors of the curve. The formulation of this public key is a combination
    of the private key and the curve that satisfies at two ends. The public key formulation
    is based on six variables, thereby making any third-party guess nearly impossible.


    Developers wanting to include encryptions during development can implement the
    preceding strategy as shown:


    ![../images/474923_1_En_3_Chapter/474923_1_En_3_Fig2_HTML.jpg](Images/474923_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Using SECP256k1 in Python


    1. We’ve used the Azure Jupyter notebook to implement the following (Figure 3-1).


    ![../images/474923_1_En_3_Chapter/474923_1_En_3_Fig1_HTML.jpg](Images/474923_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    implementing the SHA256 encryption in Python


    2. We want to apply the elliptic curve `secp256k1` used in Bitcoin’s public-key
    cryptography for “hello”: Install `secp256k1` on `pip` by typing:


    ```

    !pip install secp256k1

    ```


    3. Implement as follows (Figure 3-2).


    ## Distribution and Security


    Now that we have learned about the methods used to encrypt and validate, let us
    see how distribution and security are maintained on the blockchain. Different
    blockchain applications run for different purposes.


    For example, the Bitcoin network runs for its cryptocurrencies and the proof of
    work. Hyperledger allows users to decentralize application processes, data, and
    authority based on the principle of design over the network. There are several
    such distribution-based networks known as DLT (decentralized ledger technology)
    that allow the platform to decentralize.


    Some famous decentralized applications (DApps) are as shown in Figure 3-3.


    ![../images/474923_1_En_3_Chapter/474923_1_En_3_Fig3_HTML.jpg](Images/474923_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Top eight DApps based on number of active users, trends, value, etc.


    Blockchain brings in the shared ledger aspect when DLT is considered. How does
    XORO benefit from the distributed network of data, processes, and authority? Let’s
    find out.


    ### Distributed Data


    As mentioned earlier, storage of XORO’s complete encrypted data is spread across
    a couple of servers. To decrypt or read that data, XORO needs to go through the
    entire network. However, what happens when one of the servers gets corrupted?
    Will XORO lose his data? That’s why the blockchain must be fault tolerant. Shared
    ledgers make multiple copies of the data. When one entry is to be changed, all
    the nodes must have the change replicated to allow the data change in a true sense.
    This may or may not require permission to modify the data based on whether the
    DLT is permissioned or permissionless.


    Consider the example of the Interplanetary File System—XORO has created a video
    album that is to go on the ledger. Every node stores 256kb of data chunked onto
    different servers. When XORO accesses the file, he goes through all the nodes.
    When XORO wants to modify info, until all nodes reflect the change, the info is
    not changed.


    Two more examples:


    * FileCoin uses the IPFS protocol to decentralize storage on a blockchain platform.
    XORO can safely use FileCoin and enjoy its benefits of credible data storage,
    immutability, and security.

    * SiaCoin leverages underutilized hard-drive capacity around the world to create
    a data storage marketplace that is more efficient and cheaper than current solutions.
    It’s like an AirBnb of space on a decentralized platform.


    ### Distributed Processes


    Bitcoin and Ethereum decentralize financial transactions and computing power.
    Several blockchains decentralize various processes. Let us see what other blockchains
    decentralize.


    | Blockchain Name | Protocol | Decentralized Aspect |

    |---|---|---|

    | Ripple | XRP Ledger Consensus Protocol | Decentralizes trust, settlement, and
    validation of transactions |

    | NEM | Proof of Importance | Decentralizes authority of transactions by calculating
    importance of a node/user |

    | Stellar | Federated Byzantine Agreement | Decentralizes cross-border currency
    conversions |


    The distribution of processes can be done for decentralized authority, decentralized
    ownership, and several such processes. Let’s take the use case from trade finance
    (Figure 3-4). The importer must present its paying capacity to the exporter to
    initiate the deal. Thus the importer has to produce a bank guarantee. The bank
    that the importer visits may or may not be biased to the importer’s situation,
    allowing leniency. This also allows the possibility of creating fake bank guarantees.


    Here, a decentralized process of generating a bank guarantee across a connected
    chain of stakeholders ensures the immutability of data and adherence to the smart
    contract in quantifiable ways (Figure 3-4), thus solving the typical bottlenecks
    of a centralized system.


    ![../images/474923_1_En_3_Chapter/474923_1_En_3_Fig4_HTML.png](Images/474923_1_En_3_Fig4_HTML.png)


    Figure 3-4


    Trade Finance Process in a centralized environment, and its problems'
