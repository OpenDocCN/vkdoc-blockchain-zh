- fmt: '### Defining for a Beginner


    Now that you understand the basic premise of blockchains, we will explore a case
    with a higher amount of complexity in the transaction. Before blockchains, data
    stored by the intermediary may or may not be tampered with or credible (Figure
    [1-3](#474923_1_En_1_Chapter.xhtml#Fig3)).


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig3_HTML.png](Images/474923_1_En_1_Fig3_HTML.png)


    *Figure 1-3 Use case where multiple parties are involved via a contract, and the
    credibility may be questionable due to the intermediary involved*


    As we see in Figure [1-3](#474923_1_En_1_Chapter.xhtml#Fig3), Jenna creates a
    property will and entrusts it to her lawyer to rightfully execute after her death.
    However, the will may be vulnerable to changes resulting from any tampering or
    manhandling done by someone with malicious or biased intent. This can result in
    an unfair transaction, which may not always be traceable and can impact someone
    like John in a negative manner, as we can see in the transaction in Figure [1-4](#474923_1_En_1_Chapter.xhtml#Fig4).


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig4_HTML.png](Images/474923_1_En_1_Fig4_HTML.png)


    *Figure 1-4 Tamper-proof transaction on a blockchains*


    After using a blockchain, you get a transaction like that in Figure [1-4](#474923_1_En_1_Chapter.xhtml#Fig4).
    The encrypted copy of the will is available to everyone involved in the transaction.
    However, modifying the document would require consensus from everyone on the blockchain,
    thus preventing any changes to the will without everyone approving it.


    The lawyer or other peer cannot modify the document without an update being sent
    alerting all parties involved in the consensus. John thus receives a tamper-proof
    document. Any hacker on the chain cannot mess with the data on the chain in a
    single instance of hacking. He’d have to have voting rights across the chain to
    change the document across all copies on the chain, making it difficult to attack
    the document. This makes the data on a blockchain immutable.


    ### Defining for an Expert


    Figure [1-5](#474923_1_En_1_Chapter.xhtml#Fig5) depicts network software that
    forms consensus over an end-to-end encrypted chain of blocks that links peers
    that are distributed across the globe, facilitating direct trade and transactions
    with a centralized intermediary, but a decentralized witness system. The ownership
    of control is not with any single user. The validation control is also randomized
    based on the chosen consensus protocol.


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig5_HTML.jpg](Images/474923_1_En_1_Fig5_HTML.jpg)


    *Figure 1-5 Users, devices, data, and transactions connected in a network forming
    a blockchain*


    To understand the concepts that are basic to building any blockchain application/service,
    let us review the key elements of transparency, encryption, immutability, decentralization,
    and privacy with the exercise below.


    **Exercise: Think and Sketch Chain View of Blockchain in Different Environments**


    1.  Food we eat

    2.  Money we trade

    3.  Documents we share

    4.  Purchases we make

    5.  People we trust and engage in relations

    6.  Companies we deal with


    ## Historical Chain of Events: Distributed Computing


    In the olden days of bartering in trade, people used to exchange goods and services
    based on their own understanding of the value behind a particular barter. This
    value was situational and was not entirely standardized. People were free to equate
    a bar of gold with 100 kgs of rice or five acres of land based on their own understanding
    of the demand and supply. From there, the concept of value started becoming centralized
    when those in power standardized the value of goods against the currency issued.
    From that currency, nations evolved to have their own currencies. The relative
    value of one currency to another depended on the world’s trade and countries’
    dependency on one another. So any currency is simply a form of value trusted by
    all based on the declaration of a centralized authority. Now that we are digitizing
    currency, effort, and value, one may vary the value of currency to the digital
    quantification. Therefore, money is simply a form of data trusted and accepted
    by consensus; the value cannot be changed by anybody but the centralized authority.
    On the other hand, having data on blockchains provides a decentralized acceptance
    of a value locked on the chain that is immutable and unchangeable on the shared
    ledger. This brings a promise of performing value-based trades directly across
    groups of people in different sectors, countries, and experiences on a connected
    network without any centralized authority; there is simply a group of decentralized
    people across the chain adding validation.


    Now that we understand the evolution of trust-based value, let us see how we grew
    technologically across networks. In the dot-com boom, several centralized platforms
    emerged as aggregators over the internet. These aggregators opened up the world
    to trade through themselves. For example, eBay, Amazon, and Alibaba all enable
    people to purchase items through their platforms that are not locally sold or
    available. The policies on these platforms are governed by the platform holders
    themselves. The subscribers to such platforms simply rely on the trust and brand
    value they hold. So, every time you put your credit card details onto such a portal,
    you are trusting that centralized entity to facilitate trade. On the technology
    side of it, the credit card details are encrypted by the centralized platform
    via mechanisms chosen by that centralized platform. This is not transparent to
    the user, and it will never be known if it is fully secure or not.


    On the other hand, various blockchain platforms open up what their source code
    does and showcase the root of trust to be the dynamic end-to-end encryptions that
    are under the full control of the end user. So, unlike trusting the centralized
    platform, you trust the network, which does not represent one single company.


    With the advancements in computing devices over the past decades (as seen in Figure
    [1-6](#474923_1_En_1_Chapter.xhtml#Fig6)), their scalability, adaptability, and
    affordability suited large-scale consumers across the world—so much so that 5.13
    billion people (about 66 percent of the world’s population) have computing devices
    in the form of mobile phones, computers, and Internet of Things (IoT) devices,
    as per Global System for Mobile Communications (GSMA) real-time intelligence data.
    We are now more connected than ever before, via high-speed compact devices that
    we carry with us. Our digital traces are already everywhere. However, with this
    growing rate of digital use, we leave traces of ourselves leaking all over the
    internet, vulnerable to attacks and security breaches and exhibiting a pitiful
    state of trust in brands that showcase value but do not entirely take responsibility
    for our data.


    ![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig6_HTML.jpg](Images/474923_1_En_1_Fig6_HTML.jpg)


    *Figure 1-6 Evolution of computing devices*'
