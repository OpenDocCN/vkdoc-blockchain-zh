- fmt: "# Solution Architecture with Respect to Operations\n\nAfter selecting from\
    \ among public, private, or hybrid blockchains, one has to check the factors laid\
    \ out by the solution architect’s questionnaire in order to build the platform.\
    \ Walk through every cell in Table [7-2](#474923_1_En_7_Chapter.xhtml#Tab3) and\
    \ review your business use case’s situation with respect to the attribute.\n\n\
    Table 7-3\n\n21 Questions for Business and Developer–based Decision for a Solution\
    \ Architect\n\n| Scalability1 | Use case dependent on cryptocurrency/ any kind\
    \ of quantification2 | Community support/enterprise support3 | Skill availability4\
    \ | Adaptability5 | Security6 | Regulatory risk7 |\n| --- | --- | --- | --- |\
    \ --- | --- | --- |\n| High PerformanceMillisecond transactions8 | Rewarded on-chain\
    \ or off-chain9 | Industry-specific developments10 | Control functionalityintra-firminter-firmconsensus11\
    \ | Integrations with existing systems or standalone12 | Governance13 | Trust/trustlessPermissioned/permission\
    \ lessOpen/close networks14 |\n| Who maintains integrity?Selected member or all15\
    \ | Contractual relationship of users with business logic16 | Identity/KYC crucial?Private\
    \ transactions?17 | Cost optimizations in a multi-stakeholder process?18 | Improve\
    \ discoverability and self-triggered automation?19 | Custom requirements/DIY Solutions/BAAS/Development\
    \ platforms20 | Domain knowledge to design decentralization21 |\n\n## Use Case:\
    \ Sharing Medical Health Records of Patients Across Hospitals\n\nIn cases of medical\
    \ treatment, it has been observed that it is not always the same doctor or hospital\
    \ treating a patient over a period of time. This may happen due to the patient\
    \ relocating to a different place, a referral from the current hospital to another\
    \ hospital, being in an unfortunate incident in some other city, or simply because\
    \ the patient does not like the approach of the doctor. In such cases, it becomes\
    \ important to have the complete medical history of the patient shared with the\
    \ new hospital/doctor in order to maintain continuity of care and appropriate\
    \ understanding of the patient’s illness and past treatments.\n\nAs medical records\
    \ are highly personal and confidential documents, it is important to have the\
    \ data available in a format that is secured, immutable, and available only to\
    \ the right users. This creates a window to explore the feasibility of solving\
    \ this problem using a blockchain.\n\nExploring further, we observe that based\
    \ on the CAUSE matrix, the use of a blockchain is surely suitable, as it has the\
    \ following:\n\n* Multiple contributors and collaborators\n* Health records are\
    \ assets\n* Both types of contributors\n  * Known (certified professionals, doctors,\
    \ and hospitals)\n  * Unknown (end users, patients, customers)\n* Every state\
    \ of the health record is crucial\n* This immutable data has to be fully end-to-end\
    \ encrypted on-chain for full anonymity and privacy.\n\nNow, let’s identify the\
    \ solution architect’s questionnaire:\n\n| Scalability | Use CaseDependent on\
    \ Cryptocurrency/ Any Kind of Quantification | Community Support / Enterprise\
    \ Support | Skill Availability | Adaptability | Security | Regulatory Risk |\n\
    | --- | --- | --- | --- | --- | --- | --- |\n| Number of patient records is large.\
    \ Concurrency of active patient care is also high. | Not yet, medical health index\
    \ could be used for insurance purposes | Enterprise support used by hospitals\
    \ | No, experts with the confluence of medical and technology are rare | Yes,\
    \ adaptable for varied demographics, geographies, situations | Requires high security\
    \ and data privacy | Compliance with medical regulations is a must. |\n| 1 | 2\
    \ | 3 | 4 | 5 | 6 | 7 |\n| High-performancemillisecond transactions | Rewarded\
    \ on-chain or off-chain | Industry-specific developments | Control functionalityintra-firm\
    \ orinter-firmconsensus | Integrations with existing systems or standalone | Governance\
    \ | Trust/trustlessPermissioned/permissionlessOpen/closed networks |\n| Yes |\
    \ Can be both | No | Inter-firm | Yes | Yes | Trustless permissioned/closed networks\
    \ |\n| 8 | 9 | 10 | 11 | 12 | 13 | 14 |\n| Who maintains integrity? | Contractual\
    \ relationship of users with business logic | Identity/KYC crucial?Private transactions?\
    \ | Cost optimizations in a multi-stakeholder process? | Improve discoverability\
    \ and self-triggered automation? | Custom requirements/DIY solutions/BAAS/development\
    \ platforms | Domain knowledge to design decentralization |\n| Selected member\
    \ | Contractual relationship | Identity/KYC Crucial | Yes | Yes | Custom requirements\
    \ | Yes |\n| 15 | 16 | 17 | 18 | 19 | 20 | 21 |\n\n### GHOSSTTT Protocol\n\nOnce\
    \ the business team defines the vision of the Blockchain platform & specifies\
    \ the type of the blockchain through the CAUSE Matrix, solution architects have\
    \ to identify deeper components of design that bridge business & technology.\n\
    \nThereby we coined the GHOSTTT protocol that enables solution architects to factor\
    \ design touchpoints for Blockchains as follows:\n\n* **Governance** required?\
    \ Single-handedly, selective authority, all nodes contribute to governance, or\
    \ consensus based on smart contract rules?\n* **High-speed** transactions and\
    \ concurrency? Hybrid chains of private ledgers in a smaller network mesh.\n*\
    \ **Open**/closed, permissioned or permissionless?\n* Large-scale data **Storage**\
    \ of states – Custom solutions for developing consensus across distributed servers\
    \ where data is stored with copies across the private chains based on the platform\
    \ mechanism.\n* **Storage** on-chain distributed and copied? Does the state of\
    \ transactions interact based on events on chain?\n* **Tokens** required? Existing\
    \ scoring mechanism? Reward program? Shortcomings? Auto-calibration of value required?\n\
    * **Transactions** interact with known participants – distributed ledgers, Ripple,\
    \ Corda\n* **Trusted** networks or trustless?\n\nThe solution architect’s responsibility\
    \ here is to identify the right set of tools that aligns with the business as\
    \ well as the developer skill set available. The GHOSSTTT protocol translates\
    \ the business demands for technology decisions. After the CAUSE matrix is clarified,\
    \ one has to deduce the specifics based on the GHOSSTTT protocol.\n\nLet’s consider\
    \ the GHOSSTTT protocol for the use case of sharing medical health records of\
    \ patients across hospitals.\n\n#### Governance\n\nGovernance in this growing\
    \ digital era has brought out new challenges that may have not been factored earlier\
    \ in ecosystems, enterprises & platforms. With the need to cover fair practices\
    \ while storing, referring & transacting on digital platforms, governance needs\
    \ to evolve. With Blockchains, Decentralized Autonomous organizations (DAO) regulation\
    \ systems are introduced. This system enables the stakeholders participating to\
    \ be governed by a common set of pre-defined rules agreed by all. No action out\
    \ of these rules are allowed in a DAO based system. So while designing Blockchains,\
    \ one must factor if any such regulatory measures have to be defined in the smart\
    \ contracts to enable Autonomous Functions unbiased by any party on chain. Even\
    \ unbiased to the party initiating or hosting the Blockchain.\n\nIn the medical\
    \ use case explained earlier, the conditions for a healthy organ form a part of\
    \ governance to maintain integrity of the process, unbiased to the medical institution\
    \ provisioning the service. This is the main differentiator from a mere website\
    \ hosted by the medical institution which can be manipulated, however, the records\
    \ on a DAO based Blockchain cannot be tampered, maintaining the governance as\
    \ desired."
