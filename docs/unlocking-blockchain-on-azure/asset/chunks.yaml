    \nFigure 2-14\n\nAzure Event Grid elements\n\nHere are more details:\n\n*   One\
    \ Event Grid Topic\n    *   In a decentralized platform, where there are multiple\
    \ users behind different servers, certain event triggers appear based on the smart\
    \ contract or based on the protocol/consensus mechanism. Thus, Azure provides\
    \ a utility system as an event grid to manage various event triggers and handlers\
    \ on the chain. The Event Grid Topic provides an endpoint for the event publisher\
    \ to create and send event triggers.\n\n*   The subscriber can choose to connect\
    \ to an Event Grid Topic based on the type of touchpoint.\n\n*   The Event Grid\
    \ Topic extends its connectivity endpoints to Azure as well as to non-Azure components\
    \ such that on-chain online and offline elements can subscribe to the event triggers.\n\
    \n*   Think of this as a connector for event triggers and listeners.\n\n*   Two\
    \ virtual network resource groups (each with load balancer, network security group,\
    \ public IP address, virtual network)\n    *   Load balancers that assist in load\
    \ balancing user requests and other event-triggered requests to the servers.\n\
    \n*   Log analytics workspace that maintains the activity logs of all systems.\n\
    \n*   App services are for the business application logic and REST-based and Message\
    \ based API layers\n\nOn clicking the first app service shown, it will open the\
    \ configuration details of the service, where one can find the public URL allotted\
    \ for the blockchain network. Also, the public URL can be configured to any domain\
    \ that is required. For the scope of this introduction, we shall access the default\
    \ link provided.\n\n| NAME | TYPE | LOCATION |\n| --- | --- | --- |\n| bb-eg-hofiog\
