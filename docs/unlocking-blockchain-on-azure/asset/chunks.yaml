    \ account | Southeast Asia |\n| ethbb4vow-vlNsg-reg1 | Network security group\
    \ | Southeast Asia |\n| poaAvailabilitySet-reg1 | Availability set | Southeast\
    \ Asia |\n| Vl-ethbb4vow-reg1-0, vl-ethbb4vow-reg1-1 | Virtual machine | Southeast\
