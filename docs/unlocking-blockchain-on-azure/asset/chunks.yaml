- fmt: '# Document Signing and Record Management


    Do you remember the last time you went to a bank? The foot traffic in bank branches
    has been reduced drastically with digitization.


    Banks have come a long way since the time when there were only tellers, which
    were then replaced or re-allocated when the automated teller or the ATM came in,
    and now we have digital banks, which rest in our pockets in the form of applications
    and websites. Any transaction, irrespective of its value or volume, goes through
    with the same velocity and requires absolutely no paperwork.


    One of the core things that enabled this, along with the technology, is the fact
    that people trust the tap of a button to handle their money as much as they earlier
    trusted a piece of paper. It’s this trust—along with the plethora of benefits
    of digitization—that drove millions across the world, from a street vendor in
    India to a multi-billion-dollar fund manager in the United States, to move their
    banking online over a period of a few years.


    Taking the premise of trust and digitization, let’s look into another use case
    for blockchains, this time in the field of document signing and record management.


    We are all aware of global processes like KYC (commonly known as Know Your Customer)
    or the on-boarding procedures at jobs that require us to furnish proof related
    to our identity or documents related to our education certificates, respectively.
    In all such processes, we are required to submit our digital documents—or physical
    ones, in some cases, even today. While it is understood that some of these cases
    might take a lot of time even after deploying AI-based parsers, the process of
    validation of documents is still fairly manual and time consuming, and this is
    not even the primary concern.


    The major concern with using documents to ascertain the identity of a person or
    something like a college degree is that it is highly personal and prone to misuse,
    as in the case of a security breach. The recent case of Cambridge Analytica opened
    up to the world the extent to which data can be used and the impact it can have.
    Thus, it is imperative to have a solution for this that keeps trust, transparency,
    and security in the forefront.


    Recognizing these factors, governments, banks, legal firms, courts, and even document
    storage companies are now building POCs that allow limited access, sharing, and
    authentication of document validation over a shared ledger.


    A traditional platform that is centrally hosted usually asks its stakeholders
    or third-party engagements to simply comply with the platform without any promise
    or means to maintain the security of the data. For example, while uploading scanned
    documents of identity, one is asked to attest to the physical signature and upload
    the scanned copy, and then it is verified manually even today.


    Let’s consider a case where service providers are asked to sign an invoice to
    raise the bill of service (Figure [9-9](#474923_1_En_9_Chapter.xhtml#Fig9)).


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig9_HTML.jpg](Images/474923_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    A normally hosted service platform


    In such a system, there is no attempt to reach consensus or provide a platform
    for such an option. It is a straightforward, single-focused platform. Similarly,
    in the education field our degree certificates are signed by the central authority
    of the education board.


    During background checks, one of the most expensive processes is to trace the
    truth of the source and physically check its existence in their records. Now,
    when the data is collated on a single blockchain network of truth and trust where
    all—the source as well as the end destination nodes—exist, the blocks of data
    transmitted in encrypted formats ensure the data request is witnessed and that
    a fraudulent request may not occur in the first place. In simple words, consider
    a real use case where all educational certificates (data blocks) lie on the shared
    ledger, and where the university is the source node and the companies that require
    validation are the end destination nodes. The student/employee nodes initiate
    the validation request on-chain and get verified over the shared ledger. In such
    systems, a student may never be able to fake a certificate as the witness of the
    source is on-chain.


    Another important aspect of using digital signatures for documents is that it
    leaves a machine fingerprint in the form of the address of the node. Therefore,
    such digital traces cannot be forged, and it is difficult to develop fakes.


    In a smart contract that formulates the consensus of a chain, the digital signatures
    of documents would simply be the machine address captured upon accepting the conditions
    of the smart contract. Not all digital signatures are developed purely from the
    machine address, however. Many times it is a mathematical formula that encapsulates
    the hash address of the node along with the private key.


    With such a valid digital signature for a document on the ledger, one would not
    be able to retract the signed block, thus embedding trust of the true source of
    the signature (authenticity) and ensuring no alteration of the data transmission.


    To understand the role of digital signatures, we will consider an industrial use
    case of art blockchains—a decentralized ledger that stores and transmits the state
    of the artwork (block) from the artist to the art buyer (refer to Figure [9-10](#474923_1_En_9_Chapter.xhtml#Fig10)).


    ![../images/474923_1_En_9_Chapter/474923_1_En_9_Fig10_HTML.jpg](Images/474923_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Actions taken over blockchain with respect to the artworks as assets


    The clear advantages of using blockchains in document management and signatures
    are as follows:


    *   **Cost savings** – This is the most obvious benefit. Because blockchain transactions
    don''t require intermediaries, processes can be made more efficient and less expensive.
    There''s no need for auditors or legal professionals to validate the authenticity
    of information, so those costs come out of the process.


    *   **Efficiency** – Fewer people means faster turnaround. Transactions that might
    take days waiting for multiple sign-offs can be concluded in seconds.


    *   **Security** – The fewer participants there are in a transaction, the less
    risk there is that something could go wrong. Handoff points are a prime vulnerability,
    and blockchains effectively eliminate them.


    *   **Flexibility** – Any digital asset can use a blockchain, including difficult-to-protect
    items like multimedia and email records.


    *Source: Iron Mountain*


    As we learn the extent of the applicability of blockchain technology and its advantages
    over traditional methods, we are going to look into another application that has
    been brought to the world by an organization that was once a giant in the field
    of photography and related devices and accessories and then picked up again with
    a pivot into tech with blockchain. The organization under discussion here is none
    other than Kodak.


    The recent pivot of Kodak to blockchain has been on the public stage since Kodak’s
    announcement that it would build a new blockchain-based document management system.
    The service developed by the company does not depend on a third-party license
    and is completely developed and owned by Kodak.'
