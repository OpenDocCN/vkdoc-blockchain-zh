- fmt: "### Public and Private Chain Setup for Real Estate\n\nUpon consensus over\
    \ the rules of the smart contract on the private ledger, the key access is transferred.\n\
    \nFor example, let’s observe the following scenario: It is pre-programmed that\
    \ by March 1, 2020, if the key has not been transferred to the owner due to non-completion\
    \ of delivery in spite of full payment by buyer, the builder must start paying\
    \ penalty/rental charges. This condition then gets auto-executed without any discussion.\
    \ The consensus of the chain adheres to the smart contract, and the transactions\
    \ are made accordingly in real time. Thus, the penalty is not delayed.\n\n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig3_HTML.jpg](Images/474923_1_En_5_Fig3_HTML.jpg)\n\
    \n**Figure 5-3** – Real estate on a blockchain with smart contracts for stakeholders\n\
    \nIn Figure [5-3](#474923_1_En_5_Chapter.xhtml#Fig3), the buyer and the builder\
    \ are locked into the conditions of the smart contract regarding the purchase\
    \ of a house. Let us assume the basic conditions that the smart contract may contain:\n\
    \n- Timely payment instalments by buyer to builder\n- Timely delivery of housing\
    \ facilities by builder to buyer\n\nThese are very basic but important transaction\
    \ activities undertaken by both stakeholders in any agreement over a house. Now,\
    \ when the wallet amount is transferred by the buyer to the builder, the smart\
    \ contract enables the housing facility of the property. The second clause is\
    \ the confirmation by the buyer of all facilities.\n\nPseudo code for the smart\
    \ contract based on the preceding conditions:\n\n```\nIf Payment Amount by Buyer\
    \ by 1st March 2020 == Cost of Property by Builder as on quote for 1st March 2020:\n\
    \    Enable House Ownership and Key Access for Buyer on 1st March 2020.\n    If\
    \ Buyer confirms on Access and housing facilities:\n        Deal is successfully\
    \ settled.\n    Else if Builder delays access and ownership:\n        Pay rental\
    \ cost to Buyer till period of delay\nElse If Payment is delayed > 15 days &&\
    \ < 6months by Buyer:\n    Penalize interest of 10% of House Cost\nElse If Payment\
    \ is delayed by 6 months by Buyer:\n    Penalize interest of 20% of House Cost\n\
    ```\n\nIn another scenario, a tenant stops paying timely rent as promised via\
    \ traditional paper contract. The owner is harassed by improper communication\
    \ and delayed payments. Also, on being asked to vacate the premises, tenant fails\
    \ to do so, making it a legal issue and adding costs, time, and inconvenience\
    \ to the owner.\n\nIf this scenario were to be blockchained, the smart contract\
    \ would be pre-programmed with the schedule of the payments and what would happen\
    \ upon the breach of the contract. On mutual agreement via the smart contract\
    \ on the ledger, indicated by their respective digital signatures, the house node\
    \ access would be transferred to the tenant (enabling physical access) for the\
    \ said duration of the smart contract. Upon a non-payment on the ledger, the smart\
    \ contract would self-execute the warning to the tenant to pay within the warning\
    \ time. If even that probation time is breached, the digital asset key of the\
    \ house would be auto-transferred to the owner such that the tenant could not\
    \ re-access. The non-paying tenant would be removed from the private ledger as\
    \ per the pre-agreed smart contract, barring him from any further transactions\
    \ (see Figure [5-4](#474923_1_En_5_Chapter.xhtml#Fig4)).\n\n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig4_HTML.jpg](Images/474923_1_En_5_Fig4_HTML.jpg)\n\
    \n**Figure 5-4** – Smart contract execution for a blockchain network between the\
    \ tenant and owner\n\n### Exercise\n\n1.  Identify traditional contract use cases\
    \ and list them.\n2.  Draw out stakeholders of the identified use cases.\n3. \
    \ Explore the digital assets and transactions involved.\n4.  Quantify the conditions\
    \ of movement/status of asset/transactions.\n5.  Draw flow diagrams of the smart\
    \ contract construct and execution (similar to Figure [5-4](#474923_1_En_5_Chapter.xhtml#Fig4)).\n\
    6.  Based on that, design the pseudo code.\n\n## Smart Contract Languages\n\n\
    Once the exercise is completed, the design is to be moved toward development and\
    \ implementation. For this purpose, let us see the various smart contract languages\
    \ available for various purposes.\n\n| Smart Contract Language | Blockchain Platforms\
    \ | Features |\n| --- | --- | --- |\n| Solidity | Ethereum, Quorum, Wanchain,\
    \ Aeternity, Counterparty, Rootstock (RSK), Qtum, Cardano, DFINITY, Soil, Expanse,\
    \ Ubiq, Ethereum Classic, Monax | • Widely used language• Large number of Integrations\
    \ with Visual Studio, Remix, Truffle• Multi type safe functions• Maintains the\
    \ object-oriented structure with inheritances of methods and variables |\n| Sophia\
    \ and Verna | Aeternity | • Functional programming, state, strongly typed, first-class\
    \ objects, pattern matching, a crowdfunding example |\n| F\\* | Zen |   |\n| RIDEON\
    \ | Waves | • Enables account control functionalities across multi-chain touchpoints.•\
    \ Has the ability to implement multi-signature cases, atomic swaps and token freeze\
    \ limits. |\n| \\*C++, C\\* | EOS, Neo, Neblio, Burst | • Extremely convenient\
    \ for developer• Tokenizes governance access• A self-sufficient reward model and\
    \ fee elimination• High-speed parallel processing• Centralization concerns with\
    \ EOS |\n| \\*C#\\* | Neo, Stratis | • Makes use of the .NET framework• Allows\
    \ easy integration with enterprise and existing packages in C# |\n| Kotlin | Neo,\
    \ Corda | • Ease of analysis over state of data• Supports parallel transactions\
    \ in high-traffic legal entities, including detailed entries• Eliminates mis-ordering\
    \ of transactions due to the hash functions inbuilt to manage rightly |\n| GoLang\
    \ | Neo, HyperLedger Fabric, Neblio | • Allows one to build permissioned blockchains\
    \ with Hyperledger Fabric• Advanced querying capabilities• Active community support\
    \ |\n\nDuring this survey of all existing smart contracts, there came to light\
    \ an interesting analysis of Ethereum’s largest transactions and the smart contracts\
    \ for these sets of transactions. The users behind these smart contracts were\
    \ mainly centralized and decentralized exchanges, ICOs, and token collectors.\
    \ This was mainly due to the cryptocurrency market which gained high popularity\
    \ in the last couple of years. This showcases that smart contracts so far have\
    \ been used over financial transactions & trade over the Blockchains.\n\nHowever,\
    \ the focus of this book being aimed toward the core technology, we shall look\
    \ into the application side of smart contracts and not tokens—the economics of\
    \ it. The instability of the crypto-market and this young set of languages makes\
    \ it highly questionable whether it is worth it for a developer to learn such\
    \ languages."
