- fmt: "### In a Group of Companies\n\nConsider a Fortune 500 group of companies that\
    \ are in almost 20 different industry sectors, with products that may work for\
    \ their very own employees. The awareness of the companies in the group is barely\
    \ transparent. Whatever is aggregated in newsletters, company events, and the\
    \ website is purely based on brand perception and not on the true value worth.\n\
    \nNow, imagine this to be a hybrid network of private and public blockchains within\
    \ the company group.\n\nThe public blockchain can have metadata that speaks about\
    \ each of these companies’ structures, leadership, and products. The private blockchain\
    \ may have confidential numbers for salaries, targets, and so on.\n\nPeople always\
    \ question why a blockchain is required for such purposes. The same information\
    \ could be found on a website or a Power Point presentation. The problem with\
    \ these forms is that the website becomes a vulnerable target for hackers if it\
    \ is not meant to be in the public domain, but just on the private ledger that\
    \ is open to employees. A presentation deck may be copied, downloaded, and sent\
    \ to the wrong people offline without a trace. So, these mediums fail, and blockchains\
    \ are a better option. The private blockchains could be restricted to senior management\
    \ so they can make a fully informed decision with all sources shown on the ledger.\n\
    \n### In a Group of Inter-country Trades\n\nBy studying the macroeconomics of\
    \ world trade, we can all understand the factors that cause variations in our\
    \ currencies. The value of world trade is one of the factors. Demand and supply\
    \ year by year vary from product to product, service to service. The market shifts\
    \ often, and so economies are altered by market corrections, loan policies, government\
    \ grants, and so forth. A lot of these changes are policy driven, with attempts\
    \ to increase predictability. However, it always remains a questionable affair\
    \ as to whether it works as planned or falls apart due to the many variables involved.\
    \ Getting data correct has always been a need, and digitizing data really started\
    \ in the last decade. Meanwhile, digitizing credible *true* sources of data has\
    \ begun, with blockchains ensuring the digitizing process encapsulates structured,\
    \ secure, credible data.\n\n### Across the Globe\n\nWith increased connectivity,\
    \ having access to every part of the globe directly without intermediaries opens\
    \ up exciting avenues of opportunity. Credible education, high-quality food, energy\
    \ distributions, good jobs, and so forth all become more accessible (see Figure\
    \ 1-10).\n\n![../images/474923_1_En_1_Chapter/474923_1_En_1_Fig10_HTML.jpg](Images/474923_1_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10\nThe global trade chain\n\nWith all these ecosystems now restructured\
    \ into a credible infrastructure, we see that how we deal with one another will\
    \ change greatly, with our processes being digitized and our data being more structured\
    \ than ever.\n\nIt changes organizational design. It changes world trade. It changes\
    \ how we assign value. It gives a chance for fair trade and fair valuation of\
    \ effort if rightly captured within blockchains. It reforms policies into mutually\
    \ agreeable contracts. It eliminates the room for the manipulation of data that\
    \ was once committed to in a transaction.\n\n## Consensus Algorithms\n\nFrom Stone\
    \ Age man to an evolved society, large-scale movements have been driven when people\
    \ believe in them. That belief drove a lot of societal vision. This very belief\
    \ is digitized into consensus algorithms in blockchains. These consensus algorithms\
    \ are executed when there is agreement on a certain principle. This forms the\
    \ core of blockchains in all types of networks. Peers in the network, when in\
    \ consensus, allow transaction activity through the blockchain network. The forms\
    \ of consensus may vary based on the application and the level of criticality.\n\
    \nThe forms of consensus are based on the required methods of agreement that usually\
    \ occur in an offline scenario. For example, when a community decides that a certain\
    \ degree is required for a profession, it basically unknowingly validates this\
    \ offline agreement. For a real-life example, one may consider the role of an\
    \ architect. The people who form the civilization create a consensus of trust\
    \ that the person with the architecture degree can handle the structural designs\
    \ of buildings.\n\nNow that we have understood a real life consensus scenario,\
    \ Blockchain provides the infrastructure to digitize this very mutual agreement\
    \ on a software connected to all stakeholders participating in the process of\
    \ making a decision.\n\nTherefore, consensus algorithms form the most crucial\
    \ part of blockchains when transactions and contracts are actualized on a chain.\n\
    \nThink of the thought leadership that is evident in successfully liberated democracies.\
    \ The drivers of such leadership are the people and their belief networks. The\
    \ digital version of this is the consensus algorithm. In the world of blockchains,\
    \ various blockchains follow various forms of consensus based on the structure\
    \ of their network, the data on the chain, and the types of transaction activity.\n\
    \nOne such famous consensus algorithm, `Proof of Work`, is utilized by Bitcoin\
    \ and Ethereum. Several other mechanisms follow, such as the following:\n\n- `Proof\
    \ of Work`\n  - The peers that wish to engage in a transaction on the chain are\
    \ required to solve a complex problem, spending time and energy to solve it and\
    \ proving their interest to engage. The value of the spend is the processing time.\n\
    - `Proof of Stake`\n  - The voting mechanism here for block producers to pass\
    \ data on the chain requires the agreement of the stakeholder majority based on\
    \ the condition of the stake (wealth, age, seniority, etc.).\n- `Delegated Proof\
    \ of Stake`\n  - An implementation of technology-based democracy, using voting\
    \ and election processes to protect the blockchain from centralization and malicious\
    \ usage. Here, instead of the stakeholder, the voting rights are delegated at\
    \ random or are based on delegation so as to decentralize power.\n- `Proof of\
    \ Weight`\n  - The agreement on the chain is dependent on the amount of tokens\
    \ held by a peer and the probability of finding the next block reward.\n- `Proof\
    \ of Elapsed Time`\n  - This is used in private chains when adding peers to the\
    \ network. The agreement is reached over the time elapsed to validate new peers’\
    \ onboarding based on dynamic snooze times.\n- `Proof of Authority`\n  - Consensus\
    \ agreement over any data or transaction happens only by the validators who are\
    \ assigned the authority to validate. This may be coupled with Federated Byzantine\
    \ Agreement.\n\nHowever, as an early adopter of blockchains, one must understand\
    \ that the preceding items are just mechanisms that have been used to form consensus.\
    \ One can develop one’s own principle or mechanism or merge multiple methods to\
    \ reach consensus in one’s networks as desired. Note that the consensus algorithms\
    \ are set and pre-defined during the setup of the blockchains for any network.\
    \ Updating with a new form may require the consensus of the network."
