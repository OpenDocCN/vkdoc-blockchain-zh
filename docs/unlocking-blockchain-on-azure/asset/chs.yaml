  四位朋友按饼图所示的比例出资购买了一英亩农场。


  他们同意共同在这片土地上经营农场生意。约翰住得离土地很远，因此无法到场工作；他想出租或出售部分土地。汤姆有一份全职工作，会在下班后干活。罗恩住在农场旁边，但不懂耕作。乔完全有时间在农场工作，并且拥有全面的知识和经验。


  他们决定所有决策都需要获得所有参与者的共识。因此，你必须为将在链上进行的各项活动设计一个区块链平台。在以下部分，写出每种类型的共识对于此情况的适用性优点和缺点。列出在每种共识类型下可以运作的活动。


