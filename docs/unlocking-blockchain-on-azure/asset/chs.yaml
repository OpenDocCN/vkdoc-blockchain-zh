  ### 重要性证明 (Proof of Importance)


  重要性可以是链上用于做决策的一个衡量标准。例如，医院中的实时手术可能比牙科检查具有更高的重要性；因此，医院针对这些场景的政策会相应分级。类似地，在这个农场的用例中，田间的危险情况可能需要更快的决策。或者，链上最活跃的成员可能获得验证交易的权限。因此，这种机制并不仅限于
  NEM 的定义，而是可以根据需要自行定义。


  在定义了活动和节点类型之后，分析适合的代币机制来治理链的规则。


