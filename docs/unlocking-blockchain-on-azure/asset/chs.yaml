  \ 的流程，那么让我们为其他金融科技用例构建一个。请构建一个点对点小额融资和借贷选项的用例。\n\n\n"
- "# 5. 智能合约\n\n让我们从两个定义开始：\n\n-   `Contract`（合约）—— 一种书面或口头协议，尤其涉及雇佣、销售或租赁等，旨在具有法律强制执行力。\n\
  -   `Smart Contract`（智能合约）—— 一种可编程的数字协议，根据协议和交易的性质，由区块链网络上的相关利益方直接达成，可以自动执行、自动生效或两者兼备。\n\
  \n在深入探讨智能合约之前，让我们先了解其在区块链堆栈中的位置。回顾前几章内容，请从下至上查看图 5‑1。\n\n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig1_HTML.jpg](img/474923_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5‑1** 区块链生态系统的层次结构\n\n最底层是节点层，包含参与区块链的机器/节点。这些机器可以是物理服务器、手机、云实例或虚拟机。多个节点可能在同一台机器的不同端口上运行，或者每个节点可能在智能手机上有其自身的表示形式。这取决于代表用户的节点配置。这对应于\
  \ Azure Workbench 第 2 章的元素，架构师可以在其中决定实例数量以及实例利益相关方之间的事件注册。\n\n第二层是链接层，包含混合账本，提供不同的网络连接配置——私有或公有、许可或开放、云端、非云端或其组合。如第\
  \ 3 章所述，我们在该章学习了加密类型、分布方式及其他方面，链接层受网络中使用的共识形式所支配。可以基于区块链应用的性质，使用诸如 `Hyperledger`、`Ethereum`、`Corda`\
  \ 等区块链框架。\n\n最顶层是逻辑层，由可编程的智能合约组成，最贴近用户端。智能合约的条件将自动管理由其他两层配置共同制定的区块链中的交易。将此与现有的中心化堆栈（包含服务器、数据库的后端）和前端（UX、HTML、JavaScript）相关联。类似地，智能合约构成了前端元素，使用诸如\
  \ `Solidity`、`Vyper`、`Serpent`（更接近后端操作）和 `LLL` 等编程语言编写。然而，这些语言相对较新，并随着应用需求不断演进。\n\
  \n因此，在本章中，重点将放在这些编程语言所使用的底层逻辑上，用于在各种去中心化应用中设计和开发直观的智能合约。那么，让我们回顾一下智能合约如何应用于我们的现实生活，其范围不仅限于机器、计算机、笔记本电脑和智能手机。\n\
  \n## 现实生活中的智能合约\n\n房屋、住宅、地产、建筑、别墅——住所是人类的基本需求。每一次为了获得住所的交易，无论是买房、租房、租赁商铺还是投资房产，都会签订一般的法律合约。传统上，法律合约以纸质形式签订，不过近来已转向受法律管辖的数字形式。民事法庭负责解决因违约而产生的纠纷，以执行正当的权利。这个过程是各方利益相关者为争取公正结果而进行的漫长博弈。\n\
  \n### 案例：购买房产\n\n**传统方式存在的问题**：买方有意购买一栋建筑中的公寓。该建筑预计于 2020 年竣工，这是建筑商的承诺。买方根据签署合同时注明的建筑商条款和条件启动分期付款。到了某个阶段，已支付了\
  \ 80% 的费用，但建筑商突然甚至到 2021 年都无法交付。这给买方造成了严重的时间和金钱损失，并带来了不稳定性。这种情况给成千上万的购房者带来了不便。为解决此问题，需要诉诸法律诉讼、谈判，并多次出庭讨论法律条款和条件，以及关于合同上下文含义的不同推论和申辩。经过数月甚至数年的漫长拉锯战，正义可能得到伸张，也可能无法得到伸张。\n\
  \n现在，想象一下这个生态系统的区块链版本。房子是业主的资产。它不仅通过纸质或在线合约被数字化，还以房子的数字锁和钥匙的形式存在。保护房子的这套安全系统可以是区块链中的一个节点。当买方从建筑商处购买房子时，基于智能合约条件的满足情况，节点的访问权限会提供给合法的所有人，同时也赋予其物理访问权限。利益相关方采取的行动会被自动触发，促使买方按时分期付款，服务提供商（建筑商）按时提供服务；在支付最后一笔款项后，所有权可以实时转移，房子的节点访问权限也随之转移给买方。交易是去中心化的，并由链上的其他节点利益相关方见证。此外，审计追踪和记录状态全程在区块链上透明地维护。\n\
  \n这促成了一个完全透明的流程，该流程记录所涉及交易的每一个状态，并基于可执行的条款自动执行合约。最终用户体验到一种防篡改、不可变更且可自动执行的、无缝衔接的协议。\n\
  \n**房地产中的智能合约解决方案**：买方在区块链上对一个数字资产（通过物联网和区块链设置与物理资产关联的房屋钥匙节点）表示兴趣。这个区块链是一个混合账本，由代表建筑商、住房集团、经纪人和买方的节点在公共链上组成（类似于电商平台，但安排不同，因为平台规则并非仅由一个中心化主体掌控）。链上的参与者是独立的实体，可以参与链上活动。如果买方在阅读房地产公共账本上的信息后，对某个住房集团的房产感兴趣，则相关利益方会形成一个私有的许可链。在这个私有链中，利益相关方就智能合约的条件达成一致，并同意根据智能合约自动执行这些条件。因此，在这种情况下，当买方通过私有账本支付分期付款时，房屋节点的权益会按比例转移。这正是可以被编程实现的内容。付款完成后，数字资产会实时无延迟地转移给所有者。这与传统的支票方式不同，后者的资金可能需要几天才能到账，建筑公司也可能需要一些时间才能弄清转入其账户资金的确切状态。或者，可以在智能合约中编程实现的另一个条件是关于当建筑商未能交付房屋时应如何处理。见图\
  \ 5‑2。\n\n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig2_HTML.jpg](img/474923_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5‑2**\n\n\n\n### 房地产领域的公链与私链设置\n\n一旦在私有账本上就智能合约的规则达成共识，关键访问权限就会转移。\n\n例如，让我们观察以下场景：根据预编程设定，如果到\
  \ 2020 年 3 月 1 日，尽管买方已全额付款，但由于未能完成交付而导致密钥尚未转移给业主，则建筑商必须开始支付罚金/租赁费。此条件随后会自动执行，无需任何讨论。链上的共识遵循智能合约，交易据此实时进行。因此，罚金不会被延迟。\n\
  \n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig3_HTML.jpg](img/474923_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** – 面向利益相关方的、结合智能合约的区块链房地产\n\n在图 5-3 中，买方和建筑商都受限于关于购买房屋的智能合约条件。我们假设智能合约可能包含的基本条件：\n\
  \n-   买方按时向建筑商支付分期款项\n-   建筑商按时向买方交付房屋设施\n\n在任何房屋协议中，这些都是双方承担的非常基本但又重要的交易活动。现在，当买方将钱包中的金额转账给建筑商时，智能合约便激活了该房产的房屋设施权限。第二个条款是买方对所有设施的确认。\n\
  \n基于上述条件的智能合约伪代码：\n\n```\n如果 截至 2020 年 3 月 1 日买方的付款金额 == 建筑商针对 2020 年 3 月 1 日报价的房产成本：\n\
  \    在 2020 年 3 月 1 日，为买方启用房屋所有权和密钥访问权限。\n    如果 买方确认访问权限和房屋设施：\n        交易成功完成。\n\
  \    否则如果 建筑商延迟提供访问权限和所有权：\n        在延迟期间向买方支付租金成本\n否则如果 买方付款延迟超过 15 天且少于 6 个月：\n\
  \    处以相当于房屋成本 10%的利息罚款\n否则如果 买方付款延迟达 6 个月：\n    处以相当于房屋成本 20%的利息罚款\n```\n\n在另一种场景中，租户未能按照传统纸质合同的承诺按时支付租金。房东因沟通不畅和付款延迟而备受困扰。此外，当被要求腾空房屋时，租户未能执行，从而引发法律问题，给房东增加了成本、时间和不便。\n\
  \n如果将此场景上链，智能合约将预先编程好付款时间表以及违约时会发生什么。通过他们在账本上各自的数字签名表明双方达成共识后，在智能合约规定的期限内，房屋节点的访问权限将被转移给租户（启用物理访问权限）。当账本上出现未付款时，智能合约将自动执行警告，要求租户在警告期内付款。如果连这段宽限期也被违反，房屋的数字资产密钥将自动移交给房东，使得租户无法再次访问。根据预先约定的智能合约，不付款的租户将从私有账本中被移除，禁止其进行任何进一步的交易（见图\
  \ 5-4）。\n\n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig4_HTML.jpg](img/474923_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** – 租户与房东之间区块链网络的智能合约执行\n\n## 练习\n\n1.  识别传统合同的应用案例并进行列举。\n2.  列出所识别案例中的利益相关方。\n\
  3.  探索所涉及的数字化资产和交易。\n4.  量化资产/交易状态变化或变动的条件。\n5.  绘制智能合约构造与执行的流程图（类似于图 5-4）。\n6.\
  \  基于此，设计伪代码。\n\n## 智能合约语言\n\n一旦练习完成，设计就需要转向开发与实施。为此，让我们看看可用于不同目的的多种智能合约语言。\n\n\
  | 智能合约语言 | 区块链平台 | 特性 |\n| --- | --- | --- |\n| Solidity | Ethereum, Quorum, Wanchain,\
  \ Aeternity, Counterparty, Rootstock (RSK), Qtum, Cardano, DFINITY, Soil, Expanse,\
  \ Ubiq, Ethereum Classic, Monax | • 广泛使用的语言<br>• 与 Visual Studio、Remix、Truffle 集成丰富<br>•\
  \ 多种类型安全函数<br>• 维护面向对象结构，支持方法和变量的继承 |\n| Sophia 和 Verna | Aeternity | • 函数式编程、状态、强类型、一流对象、模式匹配、众筹示例\
  \ |\n| F\\* | Zen |   |\n| RIDEON | Waves | • 在多链接触点实现账户控制功能<br>• 具备实现多重签名、原子交换和代币冻结限制的能力\
  \ |\n| \\*C++, C\\* | EOS, Neo, Neblio, Burst | • 对开发者极为便利<br>• 标记化管理权限<br>• 自给自足的奖励模型与费用免除<br>•\
  \ 高速并行处理<br>• EOS 存在中心化问题 |\n| \\*C#\\* | Neo, Stratis | • 利用.NET 框架<br>• 允许与企业及现有的\
  \ C#包轻松集成 |\n| Kotlin | Neo, Corda | • 易于分析数据状态<br>• 支持高流量法律实体中的并行交易，包括详细条目<br>•\
  \ 通过内置哈希函数正确管理，消除交易排序错误 |\n| GoLang | Neo, HyperLedger Fabric, Neblio | • 允许使用 Hyperledger\
  \ Fabric 构建许可型区块链<br>• 高级查询能力<br>• 活跃的社区支持 |\n\n在对所有现有智能合约的调查过程中，一项关于以太坊最大交易量及其对应智能合约的有趣分析浮出水面。这些智能合约背后的用户主要是中心化及去中心化交易所、ICO\
  \ 和代币收藏者。这主要是由于过去几年加密货币市场获得了极高的人气。这表明，到目前为止，智能合约主要用于区块链上的金融交易与贸易。\n\n然而，本书的重点旨在探讨核心技术，因此我们将研究智能合约在应用层面（而非代币层面）及其经济学原理。加密市场的不稳定性以及这些尚且年轻的语言，使得开发者学习此类语言是否值得变得高度存疑。\n\
  \n\n\n## 创建智能合约\n\n众所周知，智能合约是一种可编程合约，能够根据各种活动和交易自动执行，从而满足预先定义的规则。因此，对于开发者而言，设计出能够创建基于事件的可编程功能的逻辑至关重要。\n\
  \n现实世界中的合约通常存在许多漏洞，随后需要在法律体系中进行争论。而在区块链的去中心化世界中，智能合约期望通过编程方式，为所有相关方覆盖某一情境的所有情况。然而，这取决于开发者的设计逻辑，必须覆盖大多数情况以避免漏洞。此外，一些智能合约语言编译器可能会启用这些检查来评估图灵完备性。简单来说，编译器需要检查所有在计算上可能检查的情况。只有当用例足够具体或呈二元状态，以便做出清晰决策时，才能实现这一点。业务开发者在考虑智能合约时，必须推导出具体的用户故事，以便启用这些功能。以房地产用例中的伪代码逻辑为例。因此，智能合约要求开发逻辑的方式能够覆盖所有情况，并涵盖跨各种情况的数据驱动决策。\n\
  \n智能合约能够纯粹基于数据自动执行决策。这意味着，根据流经智能合约中定义的业务逻辑的数据，各种条款/动作会被触发。从而减少对预定义条件集上的数据和函数进行人工干预的偏见。更清楚地说，付款延迟必须导致利息的添加，这在大型金融交易或金融机构中通常是已考虑到的。然而，有数百万的自由职业者收到延迟付款却没有任何利息。现在，如果自由职业者不是通过纸质合同，而是通过一个预先编程好、能够覆盖委托公司延迟付款利息添加的智能合约来开展业务，那么所需的努力和延迟就能得到妥善覆盖。反之，如果智能合约预先编程并同意按时交付项目，而自由职业者未能按时交付，则分类账上将自动计算罚款，从而形成一个公平的程序化协议。\n\
  \n我们再看另一个用例，以进一步理解智能合约的用法。\n\n## 汽车：制造、分销、转售、维修\n\n像房屋一样，汽车也是智能设备。汽车性能的读数可以实时观察，并添加到相关方的共享分类账中。如果出现故障，整个防篡改的历史记录可以清晰地提供给汽车公司的维修节点。同样，车辆的所有权在符合智能合约的付款完成的那一刻实时转移。因此，首次购车者从制造商到分销商的汽车购买过程可以链上完成，为双方提供更好的用户体验。现在，考虑一下二手车购买场景，买家从卖家处购买车辆。在这种情况下，很多时候所有权转移涉及到与其他多个相关方的冗长程序。如果通过智能合约实现数字化和验证，透明度和便利性将大有裨益。\n\
  \n为此，我们在下面的示例中选择了以太坊。请注意，本次实践演练的目的是为了帮助读者观察实际的实现过程。然而，所使用的语言和配置可能并不相关，因为它们会根据应用场景、版本时间以及用户需求而有所不同。\n\
  \n以下是场景描述：链上有三种类型的用户——制造商、经销商和车主（拥有汽车的人）。\n\n![../images/474923_1_En_5_Chapter/474923_1_En_5_Figa_HTML.png](img/474923_1_En_5_Figa_HTML.png)\n\
  \n车主希望拥有一辆车，通过经销商预订，经销商向制造商下单，车辆在支付 80%的款项后发货。这个过程传统上要求买家先支付大部分款项，然后车辆才能发货。与支付款项的时间跨度相比，所有权的转移是一个更长的过程。通过这条私有链，分类账提供了在付款时实时转移所有权的机会，且所有相关方之间完全透明。\n\
  \n为了搭建此应用的开发环境，我们使用 `Truffle Suite` 在 Azure 上结合以太坊来开发智能合约。请记住：在选择实现语言之前，必须先设计流程并制定条件。在理解应用的性质后，再选择语言和工具（见图\
  \ 5-5）。\n\n![../images/474923_1_En_5_Chapter/474923_1_En_5_Fig5_HTML.png](img/474923_1_En_5_Fig5_HTML.png)\n\
  \n图 5-5\n\n技术栈结构\n\n出于测试目的，我们将从一个小的实例开始，在 Azure 上初始化基本设置。为了搭建此应用的开发环境，我们使用 `Truffle\
  \ Suite`——一个用于以太坊的开发环境、测试框架和资产管道。`Truffle Suite` 凭借其内置的工具集，使得开发智能合约变得非常便捷。\n\n在\
  \ Azure 市场中搜索 `Truffle`。可以在市场上找到多个变体。点击 `Truffle` 后，会说明该套件提供的功能。它使开发者能够在一台虚拟机上创建虚拟账户，并在预设的以太坊区块链上直接使用\
  \ `Truffle` 工具来开发 Solidity 智能合约。\n\n`Truffle` 允许你通过实例名称、区域等来初始化虚拟机配置。选择所需的虚拟机规格和运行区域。选择所需的磁盘规格，然后进行审核并创建。\n\
  \n一旦虚拟机的步骤完成，一组完整的互联资源组就可以使用了。\n\n`Truffle` 现在提供了一个已安装好框架和十个账户的虚拟机。这里使用 `Truffle`\
  \ 的目的是提供包含以太坊区块链节点和钱包的基本基础设施。参见下文：\n\n\n\n[`https://docs.google.com/document/d/1GBNlHfLrd0orOKJHedhBSRX43xgokF9GA7ZIb3ljX04/edit?usp=sharing`](https://docs.google.com/document/d/1GBNlHfLrd0orOKJHedhBSRX43xgokF9GA7ZIb3ljX04/edit%253Fusp%253Dsharing)\n\
  \n根据您的配置，这些节点可以是本地节点，也可以是 Azure 实例。让我们来看看 Solidity 智能合约的语法格式。\n\n例如，我们为制造商设计了以下智能合约：\n\
  \n```\npragma solidity ⁰.5.4;\ncontract Manufacturer {\n//Definitions of Users,\
  \ Objects & States\naddress public manufacturer;\naddress public vendor;\naddress\
  \ public owner;\naddress public car;\nuint public constant price = 4 wei;\nstruct\
  \ car1{\nstring cModel;\nuint cRegNo;\nstring cLicensePlate;\n}\nmapping (address=>\
  \ uint)public balanceOf;\ncar1 carDetail;\n//Function Definitions\nfunction setCar(string\
  \ memory _cModel, uint _cRegNo, string memory _cLicensePlate)public{\n//storing\
  \ data in struct\ncarDetail.cModel= _cModel;\ncarDetail.cRegNo= _cRegNo;\ncarDetail.cLicensePlate=\
  \ _cLicensePlate;\n}\nfunction getCar() view public returns(string memory, uint,\
  \ string memory) {\nreturn (carDetail.cModel, carDetail.cRegNo, carDetail.cLicensePlate);\n\
  }\nstruct manufacturer1{\nuint mAge;\nstring mName;\nstring mAddress;\n}\nmapping(address\
  \ => manufacturer1) manufacturerDetails;\nmanufacturer1 manufacturerDetail;\nconstructor\
  \ ()public payable\n{\nmanufacturer = msg.sender;\n//initialize\nbalanceOf[manufacturer]\
  \ = 0;\n}\nfunction setManufacturer(address manufacturer, uint _mAge, string memory\
  \ _mName, string memory _mAddress)public{\n//storing data in struct\nmanufacturerDetail.mAge=\
  \ _mAge;\nmanufacturerDetail.mName= _mName;\nmanufacturerDetail.mAddress= _mAddress;\n\
  }\nfunction getManufacturer(address manufacturer) view public returns (uint, string\
  \ memory, string memory) {\nreturn (manufacturerDetail.mAge, manufacturerDetail.mName,\
  \ manufacturerDetail.mAddress);\n}\n// State management\nenum State1{Created, Locked,\
  \ Inactive}\nState1 public state1;\nmodifier inState1(State1 _state) {\nrequire(state1\
  \ == _state);\n_;\n}\nevent PurchaseConfirmed1();\nevent ItemReceived1();\n}\n```\n\
  \n智能合约的构造主要分为三个部分：\n\n1.  变量定义——用户、对象和状态\n2.  函数定义——读写操作及其访问权限\n3.  基于事件触发器更新状态变量\n\
  \n在前面的代码中，我们首先为制造商初始化了一个合约。其中，变量定义包括与之交互的利益相关者，以及在其端开发的诸如 `Car` 之类的对象。\n\n地址映射到用户节点。数据块（例如制造汽车的状态）根据函数进行初始化。这些函数使得能够生成\
  \ `Car` 记录及其状态和制造商详细信息。\n\n一旦事件被触发，`Car` 对象的状态会根据合约进行购买和接收的更新。在这些事件触发器的作用下，制造商的余额可能会更新，汽车的所有权也可能会被登记。\n\
  \n请注意，本章的重点不是 Solidity 的语法，而是设计此类智能合约的能力。语言可以是任何语言——C++、Python、Solidity——具体取决于应用程序、业务前提和开发人员的能力。\n\
  \n请继续详细描述一个新的用例，涉及食品、就业、保修或其他纸质合约从未奏效的领域。\n\n## 练习\n\n思考一下当前家中食品供应场景中存在的问题。\n\n\
  1.  写下您面临的挑战，例如质量不佳、食物浪费、供应不足、喷施农药、人造食品或来源不明。选择一个。\n2.  确定为您处理此食品供应的利益相关者。例如，可能是您的超市、在线商店或附近的农场，或者是送货员、农民、零售商、批发商等。\n\
  3.  构建一个代表所有这些利益相关者的区块链框图。\n4.  安排与步骤 1 中选定挑战相关流程的链接。例如，如果挑战是食物浪费，则将房屋的库存节点链接到其他快速消耗的房屋。\n\
  5.  链接好链条后，确定链的类型——公有链、私有链或联盟链——并据此安排链接关系。\n6.  在链中，决定需要达成共识的事件以及共识的类型。\n7.  如果基于所有利益相关者必须同意、实施或维护数据的一组预定义规则，请创建规则和条件的流程图。\n\
  \n例如，如果挑战是食品质量，则将从种植区到分销商再到配送的所有利益相关者链接起来，以跟踪生长条件、新鲜度时间，并在区块链上链接的每个节点安装摄像头（物联网 +\
  \ 区块链）。如果配送节点需要将食品温度维持在 4 度，则传感器节点可以实时更新区块链，供所有利益相关者查看此数据。\n\n8.  当数据添加到区块链时，智能合约必须成功地遍历整个链上的数据以形成共识。如果数据（在前面的示例中）违反了合约上的规则，则买方会自动拒收该食品，因为供应商未能维持智能合约中规定的条件。\n\
  \n"
- "# 区块链的集成点\n\n在本章的现阶段，我们将探索区块链的外部与内部交互。交互可以涵盖从元数据获取、用户引导，到连接区块链应用生态系统的所有环节。这有助于我们专注于集成点，这些集成点对于实现利用真正去中心化平台优势的无缝工作流程至关重要。\n\
  \n这里，重点不在于技术本身，而在于考虑区块链技术之前就已存在的流程。当您在本书前半部分逐渐了解区块链是什么时，后半部分将帮助您可视化其针对身边挑战的实施和执行。请关注现有的中心化平台、人员操作和线下实践，并仔细重新审视每一个环节。旧有实践中的每个痛点都将帮助您确定连接到区块链的正确接入（数据）点。\n\
  \n我们将重点关注四个重要的集成点，它们在实施中会带来重大变革：\n\n*   **数据源获取** – 与现有系统的企业集成\n*   **用户引导** – 合规与监管要求\n\
  *   **授权** – 访问控制与安全权限\n*   **自动化** – 智能合约自动触发/告警的流程\n\n    ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig1_HTML.png](img/474923_1_En_6_Fig1_HTML.png)\n\
  \n    **图 6-1** 框架：区块链实施的集成点\n\n\n\n"
- "# 数据源：与企业现有系统的集成\n\n学习如何将区块链与 Microsoft Azure 结合使用的一个重要原因是，它能为您提供企业级集成所需的完整基础设施。`Azure\
  \ Blockchain Workbench` 提供了一套完全与技术无关的选项，支持各种类型的区块链，并能基于现有 IT 生态系统和工作流与企业进行集成。\n\n\
  随着大型企业越来越依赖数据驱动，采用正确的数字化去中心化实践已变得至关重要，并成为业务决策的核心驱动力。由于各行业的组织对区块链应用有不同的用例，且其适配运转的\
  \ IT 架构也大相径庭，Microsoft Azure 作为一座桥梁，能够同时应对这两大挑战。而随着组织运营的诸多方面日益数字化，数据驱动程度不断提高，中心化与去中心化之间的持续博弈将继续并进一步加剧。因此，像\
  \ Microsoft Azure 这样的工具，使组织能够以一种简单且可持续的方式来有效地实现流程去中心化，而无需完全干扰在区块链出现之前企业一直使用的既有企业级工具。\n\
  \n设想一个拥有 10,000 名员工的组织。首席信息官希望根据公司的优势与劣势来制定业务决策。然而，相关的汇报流程并不透明，因为线下获取这些数据所依赖的是一个层级化且无形的过程。为了避免偏见，公司以数字化形式集成了生产力指标；例如，销售拜访次数、转化数量、业务价值等等。这些指标在技术工具引入之前就已存在。但借助区块链，追踪和跟踪这些指标的过程变得更加透明和具象。因此，当所有操作都在链上更新时，决策就可以成为一个衡量并推动影响力的闭环在线活动。\n\
  \n由于需要以具象、可追溯、不可篡改、去中心化且安全的形式，与业务的利益相关者（无论是员工、客户还是供应商）保持连接，区块链显然已成为企业的必备需求。`Azure\
  \ Blockchain Workbench` 促进了微软环境与区块链各要素的平滑集成。\n\n让我们来看看需要不同集成形式的数据源变体。企业中的数据可能包含以下类型：\n\
  \n* **结构化数据** – 数据库、CSV 文件等。\n* **非结构化数据** – 语音录音、图像扫描文档\n* **B2B 数据** – 企业对企业数据流\n\
  * **B2C 数据** – 企业与消费者数据\n* **众包数据** – 例如维基百科\n* **不同体量** – 各种规模的数据\n\n根据数据类型及围绕数据所展开的流程，选择相应的集成模式。\n\
  \n在本章中，我们将重点介绍跨不同领域的企业中最常见的结构化数据形式。\n\n## 结构化数据源\n\n每个平台都需要元数据来启动任何流程的去中心化，以及将信息存储到分布式账本上。例如，在为金融机构的\
  \ KYC（了解你的客户）流程引入区块链之前，必须先从中心化软件平台获取现有数据。大多数企业在投资任何新技术之前，都依赖于平稳的过渡。基于这种区块链采用前的普遍预期，`Azure\
  \ SQL Databases`（最广泛使用的数据库之一）支持轻松集成，以实现从遗留软件向区块链的更平滑迁移。这种集成允许将元数据无缝地引入平台。结构化数据的流动可以多种形式发生：\n\
  \n* 连接后端系统和现有平台，例如 Microsoft Dynamics 365（该平台可能在组织中运行 ERP 和 CRM 应用程序）。在这些软件中，会用到\
  \ SQL 服务器，这些服务器可以为了数据源的目的与区块链平滑集成（图 6-2）。\n\n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig2_HTML.png](img/474923_1_En_6_Fig2_HTML.png)\n\
  \n  **图 6-2**  \n  从 Azure SQL 数据库服务器向 Azure 区块链提供数据源\n\n* 某些活动可能在链上执行，而某些活动允许在链外执行。当区块链对用于报告或展示目的（非审计相关）的数据存储不产生影响时，存储到\
  \ SQL 数据库中可以轻松地卸载处理（图 6-3）。\n\n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig3_HTML.png](img/474923_1_En_6_Fig3_HTML.png)\n\
  \n  **图 6-3**  \n  将数据从分布式账本交付到链外数据库，例如 Azure 上的 SQL 服务器\n\n* 基于不同目的和触发器的双向数据流。区块链可以将非平凡的数据存储到\
  \ SQL 服务器上，这些数据可用于中间报告和分析。\n\n* 当超过智能合约或共识算法中定义的数据限制器阈值时，SQL 服务器可以在 `Azure Blockchain\
  \ Workbench` 中调用不同的逻辑应用和事件触发器（图 6-4）。\n\n  ![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig4_HTML.png](img/474923_1_En_6_Fig4_HTML.png)\n\
  \n  **图 6-4**  \n  针对不同目的的数据分发所共享的一套操作项\n\n## SQL 与区块链集成的连接与定义\n\n此过程包含两个步骤：\n\n\
  1. **建立连接**。`SQL Server Management Studio` 提供了 `Blockchain Workbench` 中 SQL 存储的预览。在定义数据库架构之前，您可以看到数据流中的变化。集成的基本步骤是为区块链节点和\
  \ SQL 服务器设置正确的 IP 地址集。然后，您必须根据数据的流向启用读取-写入设置。\n\n2. **定义数据库视图、应用程序视图、应用程序角色视图**——例如买方和卖方、用户对应用程序用户的分配以及应用程序用户的连接状态。\n\
  \n涉及 `PowerBI`、`SAP` 和 `Excel` 的其他 ERP 集成，也可以作为数据源来适配区块链生态系统。\n\n\n\n### 区块链的 Azure\
  \ Cosmos DB 集成\n\n`Azure Cosmos DB` 是一个全球分布式、多模型的数据库服务，适用于任何规模。该 NoSQL 数据库提供跨全球连接的多主节点，同时透明地维护各处的副本。然而，这不应与区块链混淆。`Azure\
  \ Cosmos DB` 恰当地将共享分布式账本的各个方面与区块链进行对齐和集成。\n\n当你需要一个不可变、仅追加的账本，并且在已知许可利益相关方的无信任网络中与多方打交道时，你需要将许可区块链与\
  \ `Cosmos DB` 相结合，以维护分布式存储和可追溯性。\n\n在其他情况下，如果共识不是主要需求，`Azure Cosmos DB` 可以在没有区块链的情况下满足要求。这些情况包括维护分布式的场景，以及加密等层面可以在该架构之上实现。考虑采用\
  \ `Azure Cosmos DB` 的独特卖点/关键差异化因素之一，在于它对新技术的开放集成性，同时从基础上就支持去中心化，并具备区块链的其他特性。\n\n\
  希望实现去中心化的平台，可以轻松地从 `SQL`、`MongoDB`、`Gremlin Graph`、`Cassandra`、`Tables` 和 `CSVs`\
  \ 大规模地全局迁移到 Azure 的 `Cosmos DB`。\n\n让我们了解一个 `Azure Cosmos DB` 与区块链结合的使用案例，然后再深入技术细节。\n\
  \n我们来看看微软在可通过 Azure 区块链服务访问的 XBOX 游戏发行商版税方面的使用案例。该示例展示了从可信来源追溯版税时所实现的透明度。游戏发行商可以通过这种技术组合访问版税报表。所涉及的过程是链上追踪、链下可视化以及流程不可变审计的混合。因此，`Azure\
  \ Cosmos DB` 实现了版税数据的全球分布式存储，而区块链服务则维护所有流程的状态，以保持所存储信息的可信度。区块链服务还通过智能合约的形式实现了版税规则的自动化。\n\
  \n让我们分解该实现，以更好地理解流程。\n\n1.  元数据来自链下存储，例如 `Azure Cosmos DB`、`SQL` 或 `MongoDB`。\n\
  2.  区块链节点根据所需信息进行初始化，并定义共识目的（如果已定义）。\n3.  进一步的其他元素，如事件触发器，允许在链上通过警报和触发器驱动无服务器代码。\n\
  \n以下是集成的步骤：\n\n1.  将数据模式从 `SQL` 集中式形式重塑为 `Azure Cosmos DB` 模式。\n2.  将数据结构重构为键值、列族、文档和图。\n\
  3.  全球分布。\n4.  创建基于仅验证或某种共识形式的多主复制协议。\n5.  检查地理限制和政策。\n6.  确定流程所需的信任级别和权限。\n7. \
  \ 堆叠与流程相关的元素。\n\n当数据的分布式账本需要区块链方面的连接验证和智能合约触发时，这些步骤适用。需要找到合适的集成交汇点，以获得无缝体验。\n\n\
  例如，在 `Apache Spark` 上维护大规模数据作业的企业，可以无缝连接到 `Cosmos DB` 以获取仅追加的透明账本。此外，如果数据作业需要闭环共识，`Azure\
  \ Blockchain Workbench` 可以实现这一点。参见：[`https://docs.microsoft.com/en-us/azure/cosmos-db/spark-connector`](https://docs.microsoft.com/en-us/azure/cosmos-db/spark-connector)。\n\
  \n类似的集成也可以为 `IoT` 中心网络以及 SharePoint 系统与区块链建立连接。\n\n### 用户接入：合规与监管要求\n\n一旦确定了数据来源，数据就会被适当地分类、结构化并存储。在私有和公有区块链以及链上、链下活动中，数据的分类至关重要。这种分类与确立保护权利和法规的政策相关联，每个企业都必须遵守这些法规。\n\
  \n同时，在讨论区块链时，处理数据的过程以及数据的状态至关重要。例如，一个中心化在线平台的普通注册只需要设置电子邮件和密码，外加一些详细信息。然而，密码和邮件的存储过程对最终用户是不可知的。可能存在不安全的平台，以明文存储密码，并可能泄露那些也可以用于安全平台的值。因此，将用户接入区块链的过程与这些常见做法有所不同。\n\
  \n用户接入从机器地址、私钥和公钥以及根据区块链的类型和目的验证其他节点开始。\n\n因此，第二个考虑点是这些数据来源如何无缝地接入区块链。这种接入可能发生在区块链设置的开始阶段、过程中的间隔期、持续操作期间，或任何数量的事件触发期间。\n\
  \n然而，如何做到这一点对于保持数据的敏感性及其状态的可信度至关重要。由于这个集成接触点非常容易受到攻击，因此必须界定以下几个方面的范围：\n\n*   网络安全\n\
  *   合规性\n*   法规\n*   地理政策（例如，欧洲）\n    *   `GDPR`\n    *   `PSD2` 和电子隐私\n*   行业领域政策\n\
  \    *   海事\n    *   制造业\n    *   医疗\n\n这个集成接触点没有直接的实现工具；它更多是关于与用户接入相关流程集成时的设计考量。这根据区块链平台的应用、地点和领域而有很大差异。\n\
  \n#### 区块链的 GDPR 考量\n\n**通用数据保护条例**（欧盟）[2016/​679](https://eur-lex.europa.eu/eli/reg/2016/679/oj)\
  \ (**GDPR**) 是欧盟法律中的一项法规，涵盖了所有 [欧盟](https://en.wikipedia.org/wiki/European_Union)\
  \ 和 [欧洲经济区](https://en.wikipedia.org/wiki/European_Economic_Area) 公民的数据保护和隐私。它还涉及个人数据向欧盟和欧洲经济区以外的传输。GDPR\
  \ 的主要目标是赋予个人对其个人数据的控制权，并通过统一欧盟内部的法规来简化国际业务的监管环境。\n\n这包括三个主要方面。\n\n##### 目的与同意的定义\n\
  \n在接入用户时，必须清晰地传达目的定义。同时，必须明确描述使用数据的正当同意。这项欧洲政策已确保在中心化平台上实行此类做法。这如何应用于区块链呢？答案在于智能合约触发器，它可能在出现任何偏差时进行合规性检查和处理。例如，如果用户未提供同意，区块链平台必须清晰传达并遵守该区块链基础中定义的内部章程。\n\
  \n\n\n#### 主体访问请求 (SAR)\n\n根据用户请求，`SAR` 允许从平台检索该用户的所有个人信息。在区块链支持的不可篡改账本上，数据的完整历史记录是可追溯且安全的，因为访问这些数据的能力完全掌握在用户手中。\n\
  \n未能遵守此规定可能导致公司被处以最高 2000 万英镑或全球年营业额 4% 的罚款，以较高者为准。此类条款可能在章程被违反时自动触发。但问题在于，为什么公司会主动将一个区块链编程为这种非盈利系统？答案是，这能使用户在入驻时也拥有一份有利的合约。治理机制必须要求两个利益相关方——组织与用户——共同遵守智能合约中提出的规定。这为用户提供了一个提出自身条款的途径。其中可能包含基于双方共识条件所约定的罚款或退款。由于用户在此并非单纯的订阅者，这种点对点关系是对等的，因此条款必须平衡。\n\
  \n#### 数据泄露通知\n\n如果平台遭遇安全漏洞，必须通知用户，以便用户采取适当行动。这也可以作为入驻时智能合约的一部分。\n\n基于这三个方面，Azure\
  \ 合规性管理器提供了一系列工具，可用于针对云组件上定义并全面执行的任何策略。这并不意味着它内置于 Azure 区块链套件中，但由于架构位于同一环境中，因此更容易将它们集成以实现特定目的。\n\
  \n更多信息请访问：[`https://azure.microsoft.com/en-in/overview/trusted-cloud/compliance/`](https://azure.microsoft.com/en-in/overview/trusted-cloud/compliance/)。\n\
  \nAzure 的合规性管理器为各种目的提供了多种工具。它涵盖了跨国界、跨行业、跨时间线的全球性政策与法规。\n\n#### Azure 蓝图\n\nAzure\
  \ 蓝图允许企业利用根据政策和法规（例如 `ISO`、`GDPR` 等）预先定义的模板，或创建自定义模板，供整个组织在构建独立应用程序或全公司应用程序时遵循。（这目前是\
  \ Azure 提供的一项免费服务，允许用户遵守国际政策，但尚不清楚他们会维持多久。）\n\n当构建跨行业、跨国界的国际区块链时，必须考虑这些模板，以避免在数据隐私和保护权利方面出现国家间的冲突。\n\
  \n#### Azure 策略\n\n在此处定义独立的策略。正如我们所见，蓝图提供了策略和安全规则的模板/框架。策略定义在此工具中进行。在设计通用策略时，区块链的节点和交易策略可以存储在此处。\n\
  \n#### Azure 安全中心\n\n当用户在 Azure 上激活安全中心时，一个监控代理将会主动部署在虚拟机组件上。它会主动检查威胁和攻击。类似于中心化系统中针对\
  \ SQL 注入、暴力破解攻击等的安全检查，区块链节点也需要被主动监控。\n\n在一个无信任的无许可网络中，如果发现欺诈性验证的模式中存在串通行为，安全中心可以触发策略来避免此类攻击并保障链上活动安全（图\
  \ 6-5）。\n\n![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig5_HTML.png](img/474923_1_En_6_Fig5_HTML.png)\n\
  \n图 6-5\n\n安全流程\n\n练习\n\n参考上述流程，为一家保险公司确定该流程的正确集成组件。\n\n## 授权：访问控制与安全访问\n\n大多数企业针对不同角色和活动实施访问控制。基于登录凭证和来自前述阶段的元数据，选择合适的访问控制并提供相应功能。现在，如果发生攻击，即使最低权限的授权变得脆弱，整个控制层级也会崩溃。因此，考虑到当前的访问控制实践，将现有访问控制流程嵌入到区块链中至关重要。\n\
  \n`Azure Active Directory` 被广泛用于基于通用协议维护所有应用程序的访问控制。该组件需要与去中心化的区块链平台集成。访问控制的实体从现有的用户记录映射到经过哈希处理的机器地址。\n\
  \n安全的另一个方面是 `Azure Key Vault`，用户在此存储并维护其公钥集，并可根据需要备份私钥。然而，将密钥集中存储再次违背了区块链的初衷，因为密钥可能容易受到攻击或泄露，从而降低安全性。使用\
  \ `Azure Key Vault` 的主要原因是为了将现有的安全机制与区块链活动无缝集成。\n\n另一种授权形式是验证节点，它们依赖人工干预来批准新的对等节点。可能存在负责达成共识以颁发\
  \ CA 证书从而授权链上新用户的节点。\n\n最后，智能合约可以强制执行一个用户先决条件检查清单，例如最少文件集、生物特征扫描或虹膜扫描，以获得授权。\n\n\
  此类应用的智能合约集成必须包含以下内容：\n\n- 访问权——应允许用户理解合约的设计方式。\n- 限制性编程——应消除代码中的模糊定义。\n- 有告知的触发器和警报——应按定义激活条件性的活动。\n\
  - 遗忘状态或删除操作——应在回滚和删除请求时管理数据状态。\n\n\n\n"
- "# 自动化：智能合约的自动触发/警报流程\n\n自数字时代开启以来，大多数企业已转向线上运营，包括将其数据上线。然而，仍有一些大型企业因未能与现代系统集成，而依赖链下操作。\n\
  \n这正是智能合约的自动化能够促进交易加速的关键所在。智能合约不仅将合约数据数字化，还将数据传输所涉及的状态和流程也进行了数字化。\n\n这种集成可通过以下方式实现：\n\
  \n- `REST` API 接口\n- `Azure` 事件触发器\n- 将`Azure`逻辑应用连接到服务总线\n- 共识规则中的工作台修改\n\n让我们考察一个需要集成智能合约的医疗运输场景。\n\
  \n以器官移植为例，它要求器官在安全环境中从捐赠者到患者之间进行完全透明的交易。这里，围绕交易的数据和流程都极其敏感。需要考虑多个状态流程：\n\n- 器官在适当环境下安全运输\n\
  - 器官在源头被篡改\n- 器官运输发生意外，温度未维持\n- 器官在目的地交付时受到感染\n\n器官的状态流程对于移植的成功结果至关重要。如果捐赠者、摘取器官的医生、运输条件（通过`IoT`监测）以及接收方的交付检查，都绑定在区块链上并附带智能合约条款，以确保健康器官实现成功移植，那么当任何节点提供的数据篡改了器官状态及其环境变量时，接收方就能透明地规避一笔有问题的交易。这些自动触发器和警报可以通过`Azure`事件触发器上链，一旦智能合约中定义的任何健康器官条件未能满足合约要求，便会立即触发。\n\
  \n例如，如果运输过程中的冷却系统发生故障，事件触发器将调用`Azure`逻辑应用来更新状态，以指示运输失败。这通过区块链和智能合约构建了一个安全、透明、基于条款的生态系统。\n\
  \n## 整体视图\n\n一个成功运行生态系统的关键在于设计（图 6-6）。配置正确的组件集合，确保每个组件都能满足其功能期望，同时保持现有流程的连贯性。在通过区块链和智能合约向长期以来以特定方式运营的组织引入去中心化和自动化的过程中，此类变革往往困难重重，并且容易与线下流程脱节，导致数据不一致和透明度缺失。\n\
  \n![../images/474923_1_En_6_Chapter/474923_1_En_6_Fig6_HTML.jpg](img/474923_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6  \n用于无缝集成的 Azure 组件\n\n设计考量以及对可无缝集成的组件的认知至关重要。本章旨在围绕 Microsoft Azure 生态系统中\
  \ Azure 区块链相关组件的可用性，涵盖这些思路与考量，如图 6-5 所示。\n\n这些独立的 Azure 组件经过充分测试，符合上述服务的标准，并在企业中广泛使用。因此，在采用区块链时，不应将其视为一个孤立的系统。建议规划现有系统与区块链的集成，以实现无缝运营。\n\
  \n因此，请据此确定适合您区块链及其相关流程的接触点和 Azure 服务。\n\n"
- '# 技术工具


  本章将解读一系列工具，这些工具能够帮助您在去中心化应用中设计、构建和运营区块链的各个方面。我们将探讨如何通过 Microsoft Azure 的云服务将这些工具在云上和云下串联起来。


  区块链解决方案的生命周期包含三个开发阶段：


  1. 去中心化的业务需求与动因

  2. 针对运营的解决方案架构

  3. 开发者视角的技术组件分解


  我们将采用自上而下的方法来识别区块链实现所需的工具。




  '
- '# 业务需求与去中心化的缘由


  业务开发人员需要识别现有业务、工作流或运营中的痛点。对于任何待实施的技术，其是否能有效帮助业务实现预期成果至关重要。因此，在做出任何技术决策之前，明确业务需求是重中之重。请填写表
  7-1 中的“`CAUSE 矩阵`”，以了解您的业务应用所需选择的区块链类型。


  **表 7-1** 业务开发人员用于塑造区块链用例的 CAUSE 矩阵


  | 协作工作流？ | 资产数字化？ | 贡献者未知？ | 状态存储？ | 加密至关重要？ | 需要区块链？ | 区块链类型？ |

  | --- | --- | --- | --- | --- | --- | --- |

  | 工作流是否设计为协作式？ | 资产是否可以数字化？ | 贡献者是已知还是未知？ | 是否应记录状态历史？ | 加密是否至关重要？ | | |

  | 是 | 是 | 是 | 是 | 是 | 是 | 公有链 |

  | 是 | 是 | 否 | 是 | 是 | 是 | 私有链 |

  | 是 | 是 | 两者皆有（访问控制） | 是 | 是 | 是 | 混合链 |

  | 否 | 是 | 是 | 否 | 是 | 否 | 其他集中式平台 |

  | 是 | 否 | 是 | 是 | 否 | 否 | 其他集中式平台 |


  `CAUSE 矩阵`可帮助企业设计区块链解决方案。它是一个包含 5 个因素的问卷，业务战略家必须填写此问卷，以推导出是否需要区块链，并进一步确定适合的区块链类型。


  这是一种评估您的业务应用中是否需要区块链的方法。


  根据矩阵的结果，您可以判断业务场景是否真的需要区块链。


  当整个运营流程需要由多个用户进行数字化链接时，请在“协作工作流”一项中标记“是”。例如，考虑这样一个业务用例：一个由 50 名 HR 员工组成的团队，负责运营一家拥有
  50,000 名员工的财富 500 强公司的人事工作。该公司希望将各项活动绑定在一起，连接人事运营的各个方面。这种协作工作流可以上链，因此标记为“是”。


  对于“资产数字化”，记录中的实体是员工，可以基于数据记录进行数字化。如果资产不是数字化的，就必须找到一种方法将物理资产与数字资产连接起来。例如，门禁钥匙可以通过智能手机或生物识别钥匙来实现，这些钥匙可以作为账本上的数据资产使用。


  “贡献者未知”是评估业务流程的利益相关者/用户是未知且探索性的最终客户，还是已知的实体（如员工、业务伙伴或服务提供商）。基于此，可以使用公有链、私有链或两者结合形成混合链。


  “状态存储”用于识别所记录的数据是否需要存储每个状态，还是仅存储最后一个状态。参照我们的例子，如果 HR 员工需要了解员工的整个生命周期，那么所有状态记录都至关重要，因此使用区块链是合理的，因为它提供了员工所有状态的防篡改记录。反之，在只有最后一个状态重要的情况下，可能不需要区块链。使用简单的`ERP`/`CRM`系统即可。


  最后，加密因素有助于决定是否需要端到端加密。在大型组织中，某些网络信息需要保密并仅限于内部，因此可以使用私有账本，它仅对相关利益者之间的有价值信息进行加密。在我们的例子中，薪资等数据点需要在员工和
  HR 部门之间进行端到端加密。此类数据的存储经过加密并分布在链上，使得黑客难以通过攻击单一服务器来窃取信息。


  根据`CAUSE`矩阵的结果，请参考表 7-2 中的各种区块链示例。您的用例与区块链的具体匹配程度，可以进一步在解决方案架构师的选择阶段通过第二个矩阵来推导。


  **表 7-2** 公有、私有和混合区块链的技术平台


  | 公有链 | 私有链 | 混合链 |

  | --- | --- | --- |

  | • Hedera Hashgraph • 比特币 • 以太坊 • 莱特币 • 门罗币 • MeWe • Choon • MINDS | • Hyperledger
  • Quorum • Bankchain • MONAX • MultiChain | • DragonChain • EWF • B3i • R3 Corda
  |


  业务开发人员必须根据`CAUSE`因素确定需要去中心化的运营领域，以便决定区块链的类型。


  那些致力于在去中心化账本上向消费者扩展服务的企业，其消费者可能是未知的最终用户，且无需许可即可加入账本，这类企业会选择公有链。在`B2B`环境或公司内部运营的企业，则可能使用私有链，其中权限对于控制参数至关重要。


  以市场型业务为例，需要结合私有链和公有链网络，形成混合链。某些信息，如零售商品列表和服务列表，可以放在公有链上，用户可以匿名查看公有链账本上的数据。然而，当买卖双方之间发生交易时，可以形成一个私有链网络，交易则基于该链的共识原则进行。


  业务开发人员会寻求企业级技术工具进行部署，特别是为了获得长期支持、可扩展性、技能可用性、培训等（图 7-1）。Azure 为其区块链元素以及其云服务提供了广泛的企业级支持。这提高了现有微软框架的集成能力，使其能够在需要的地方实现云端化和链上化。


  ![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig1_HTML.png](img/474923_1_En_7_Fig1_HTML.png)


  **图 7-1** 适用于 Azure 的关键区块链工具


  ![../images/474923_1_En_7_Chapter/474923_1_En_7_Figa_HTML.jpg](img/474923_1_En_7_Figa_HTML.jpg)
  **练习 7-1**


  作为业务开发人员，请确定一个真正需要区块链的业务案例。通过`CAUSE`矩阵运行此用例并确认其适用性。将该用例分解为具体的方面，例如：


  1.  存储

  2.  流程

  3.  访问控制

  4.  合约

  5.  代币


  根据业务用例，为每个方面编写用户故事。


  此练习进一步为解决方案架构师提供了决定区块链平台具体规格的工具。




  '
- "# 面向运维的解决方案架构\n\n在从公有链、私有链或联盟链中做出选择后，必须根据解决方案架构师问卷所设定的因素来构建平台。请逐一查看表 7-2 中的每个单元格，并根据相关属性审视您的业务用例情况。\n\
  \n**表 7-3**\n**面向解决方案架构师的业务与开发者决策的 21 个问题**\n\n| 可扩展性 1 | 用例是否依赖加密货币/任何形式的量化 2 |\
  \ 社区支持/企业支持 3 | 技能可用性 4 | 适应性 5 | 安全性 6 | 监管风险 7 |\n| --- | --- | --- | --- | ---\
  \ | --- | --- |\n| 高性能/毫秒级交易 8 | 链上或链下奖励 9 | 特定行业开发 10 | 控制功能/公司内部/公司间/共识 11 | 与现有系统集成或独立运行\
  \ 12 | 治理 13 | 信任/无需信任/许可型/非许可型/开放/封闭网络 14 |\n| 谁维护完整性？选定成员还是全部 15 | 用户与业务逻辑的合同关系\
  \ 16 | 身份/KYC 是否关键？私有交易？17 | 多利益相关方流程中的成本优化？18 | 提升可发现性和自动触发自动化？19 | 定制需求/DIY 解决方案/BAAS/开发平台\
  \ 20 | 设计去中心化的领域知识 21 |\n\n## 用例：跨医院共享患者医疗健康记录\n\n在医疗过程中，我们观察到患者在一段时间内并不总是由同一位医生或同一家医院治疗。这种情况可能由于患者迁移到不同地点、当前医院转诊至另一家医院、在其他城市遭遇不幸事件，或仅仅因为患者不喜欢医生的诊疗方式而发生。在这种情况下，将患者的完整病史与新医院/医生共享，对于保持医疗的连续性以及恰当理解患者的病情和过往治疗至关重要。\n\
  \n由于医疗记录是高度个人化和机密的文件，必须以安全、不可篡改且仅对正确用户可见的格式提供数据。这为探索使用区块链解决该问题的可行性打开了窗口。\n\n进一步探索发现，基于\
  \ CAUSE 矩阵，使用区块链确实合适，因为它具有以下特点：\n\n*   多方贡献者和协作者\n*   健康记录属于资产\n*   两种类型的贡献者：\n\
  \    *   已知（认证专业人士、医生和医院）\n    *   未知（最终用户、患者、客户）\n*   健康记录的每一个状态都至关重要\n*   为了实现完全匿名和隐私，此不可篡改的数据必须在链上实现端到端加密。\n\
  \n现在，让我们确定解决方案架构师的问卷内容：\n\n| 可扩展性 | 用例是否依赖加密货币/任何形式的量化 | 社区支持/企业支持 | 技能可用性 | 适应性\
  \ | 安全性 | 监管风险 |\n| --- | --- | --- | --- | --- | --- | --- |\n| 患者记录数量庞大。活跃患者护理的并发性也很高。\
  \ | 尚未，医疗健康指数可用于保险目的 | 医院采用企业支持 | 否，兼具医疗和技术知识的专家稀少。 | 是，能够适应不同的人口统计、地理区域和情境 | 需要高安全性和数据隐私保护\
  \ | 必须遵守医疗法规。 |\n| 1 | 2 | 3 | 4 | 5 | 6 | 7 |\n| 高性能/毫秒级交易 | 链上或链下奖励 | 特定行业开发 |\
  \ 控制功能/公司内部或公司间共识 | 与现有系统集成或独立运行 | 治理 | 信任/无需信任/许可型/非许可型/开放/封闭网络 |\n| 是 | 两者皆可 |\
  \ 否 | 公司间 | 是 | 是 | 无需信任/许可型/封闭网络 |\n| 8 | 9 | 10 | 11 | 12 | 13 | 14 |\n| 谁维护完整性？\
  \ | 用户与业务逻辑的合同关系 | 身份/KYC 是否关键？私有交易？ | 多利益相关方流程中的成本优化？ | 提升可发现性和自动触发自动化？ | 定制需求/DIY\
  \ 解决方案/BAAS/开发平台 | 设计去中心化的领域知识 |\n| 选定成员 | 合同关系 | 身份/KYC 至关重要 | 是 | 是 | 定制需求 | 是\
  \ |\n| 15 | 16 | 17 | 18 | 19 | 20 | 21 |\n\n### GHOSSTTT 协议\n\n一旦业务团队通过 CAUSE 矩阵定义了区块链平台的愿景并指定了区块链的类型，解决方案架构师就必须识别更深层次的设计组件，以桥接业务与技术。\n\
  \n因此，我们提出了 GHOSSTTT 协议，使解决方案架构师能够将区块链的设计接触点归纳如下：\n\n*   **治理**是否必要？是单独、选择性授权、所有节点参与治理，还是基于智能合约规则的共识？\n\
  *   **高速**交易与并发？在较小的网络网格中使用私有账本的混合链。\n*   **开放**/封闭、许可型还是非许可型？\n*   大规模数据的**存储**状态——在分布式服务器上建立共识的定制解决方案，数据根据平台机制在私有链上复制存储。\n\
  *   **链上**存储是分布式并复制的吗？交易状态是否根据链上事件进行交互？\n*   是否需要**代币**？现有的评分机制？奖励计划？不足之处？是否需要价值自动校准？\n\
  *   **交易**与已知参与者交互——分布式账本、Ripple、Corda\n*   **可信**网络还是无需信任网络？\n\n解决方案架构师在此的责任是识别一套正确的工具，使其与业务需求以及可用的开发者技能集保持一致。GHOSSTTT\
  \ 协议将业务需求转化为技术决策。在 CAUSE 矩阵明确后，必须根据 GHOSSTTT 协议推导出具体细节。\n\n让我们针对跨医院共享患者医疗健康记录的用例来考虑\
  \ GHOSSTTT 协议。\n\n#### 治理\n\n在这个日益数字化的时代，治理带来了此前在生态系统、企业和平台中可能未曾考虑过的新挑战。为了在数字平台上存储、引用和交易时覆盖公平实践，治理需要不断演进。随着区块链的发展，引入了去中心化自治组织（DAO）的监管系统。该系统使参与的利益相关方能够受到一套所有各方都同意的、公共预定义规则的约束。在基于\
  \ DAO 的系统中，不允许任何超出这些规则的行为。因此，在设计区块链时，必须考虑是否需要在智能合约中定义此类监管措施，以实现不受链上任何一方偏袒影响的自治功能。即使是发起或托管区块链的一方也不应享有偏袒。\n\
  \n在上述医疗用例中，健康器官的条件构成了治理的一部分，以维护流程的完整性，并且不偏袒提供服务的医疗机构。这是与仅由医疗机构托管的、可能被篡改的普通网站的主要区别所在。然而，基于\
  \ DAO 的区块链上的记录是无法被篡改的，从而保持了所需的治理效果。\n\n\n\n#### 高速交易与并发处理\n\n`Azure CosmosDB` 提供低延迟、高可用且全球分布的多模型数据库，以支持此类交易以及在联盟网络中运行并发交易。针对这一需求，也可选择类似的\
  \ NoSQL 数据库。\n\n医疗记录在全球各地时刻都在生成，并会针对不同利益相关方从账本中被多次索引。因此，低延迟对于去中心化账本而言是一个关键因素。\n\n\
  #### 开放或封闭，许可或无许可\n\n在医疗领域，大量信息（如医疗服务、政策等）会公开分发给利益相关方。然而，对医疗记录等机密信息的访问则需要进行许可控制。因此，该区块链可采用开放式许可账本。\n\
  \n例如，`Azure Marketplace` 提供的 `Quorum` 通过将公共数据和私有数据分离到不同的网络，来维护交易和合约的隐私性，从而在保持私有数据隐私的同时，确保公共数据的透明性。\n\
  \n#### 存储\n\n在区块链平台的分布式账本中，包含两个方面：一是链节点状态的去中心化存储，二是数据本身的存储。在此阶段，需要决定应用程序是运行在内网、互联网，还是带有虚拟节点集群的共享磁盘上。\n\
  \n综合考虑医疗记录的共享需求以及前述对 `Quorum` 的选择——`Quorum` 保障的是交易及其状态的隐私，而非数据存储本身。因此，状态的存储是加密的，可存储在\
  \ Azure 的 `Blob`、`CosmosDB` 或任何其他存储中。但对于那些数据存储比交易本身更关键的应用程序，可以考虑使用 `BigChainDB`\
  \ 这类扩展至分布式数据存储的工具。若需对文件进行完整加密，则可考虑 `IPFS`。当需要安全存储、交易/共享医疗记录时，可以设计将 `Quorum` 与 `IPFS`\
  \ 集成到 Azure 云组件中，从而使医疗记录的共享真正安全，并使存储在全球范围内同样得到保障。\n\n#### 代币、交易与信任\n\n医疗记录作为关乎患者健康的高度敏感文件，其来源的可信度至关重要。因此，在治理第一阶段选定的\
  \ `DAO` 建立了无偏见网络的信任基础。通过将认证委员会的投票机制上链，可以使记录更具可信度。此处的交易可能包括共享记录、购买医学检验和报告，或根据链上规定购买通用的匿名公共数据。在此，解决方案架构师需要设计联盟链，它可以是国家、地区或区域内的公有链，也可以是医生与患者的私有链，或企业与员工医疗记录的私有链，亦或是保险公司与客户的私有网络。交易网络的连接方式需在此阶段决定。一旦设计完成，便可基于业务需求量化链上操作。因此，首先要判断您的业务用例是否需要代币化；例如，医院/外科医生/病理学家的信用评级。客户对健康保险公司的信用评级等，可以通过链上约定的代币经济学在链上给予激励。然而，如果仅仅是维护账本上的数字保险库，则无需代币化。\n\
  \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Figb_HTML.jpg](img/474923_1_En_7_Figb_HTML.jpg)\
  \ 练习 7-2：基于练习 7-1 中的业务案例，回答 GHOSSTTT 协议在您的用例中的输出结果\n\n当治理、高速和开放网络等要点明确后，即可开始调研适用于具体痛点的技术工具。在许多情况下，某些工具组合可能并未直接存在。此时，解决方案架构师需要决定是自行开发、选择现有的区块链解决方案，还是采用基于云组件的企业架构（如用于区块链网络的\
  \ Azure）。\n\n完成本练习后，请参阅“解决方案架构师在业务和开发者层面决策的 21 个问题”表格。结合第 1 节和第 3 节的内容进行迭代，最终确定技术栈和架构。\n\
  \n\n\n"
- "# GHOSSTTT 协议的应用\n\n下一步是将 GHOSSTTT 协议的层级堆叠成框图，以构建整体流程和架构。例如，我们来了解 Azure 区块链工作台所构建的架构，如图\
  \ 7-2 所示。\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig2_HTML.jpg](img/474923_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2 Azure 的组件\n\n结合 GHOSSTTT 协议和 21 个问题的矩阵的答案，解决方案架构师必须决定是采用自上而下的方法（从客户到后端基础设施）还是自下而上的方法（从后端基础设施到客户界面）。在\
  \ Azure 这样的生态系统中，区块链应用的所有组件都已涵盖。\n\n例如，在图 7-2 中，自上而下的方法包括以下内容：\n\n- 用户身份验证（第 17\
  \ 单元）– Azure Active Directory\n- 应用界面（第 20 单元）– Xamarin 应用和带有 IoT Hub 的 IoT 边缘设备\n\
  - 数据通信通道（第 12 单元）– 基于 REST 的网关服务 API、消息代理、服务总线\n- 消费者，例如 DLT（链上）、数据库（链下）和哈希存储（加密）消费者\n\
  - 洞察 – Azure Monitor 和分析\n- 交易构建器和签名器 – Azure Key Vault\n- 交易路由器和账本\n- DLT 监视器和事件网格\n\
  \n当客户分布在不同地理区域，并能通过可靠的互联网连接进行连接时，以及对于寻求利用云组件企业基础设施来驱动区块链的组织而言，这些工具具有很高的可靠性。\n\n\
  重新审视 CAUSE 矩阵，为什么在这种情况下需要区块链，而不是集中托管的系统？因为对于开发和托管此类平台的参与方而言，加密通常取决于开发者，或者受托管此类服务的公司治理。因此，此类平台在大规模公信力方面可信度较低。在区块链网络中，加密分布在网络中，使得任何随机攻击者都难以破解。此外，在区块链治理模式下，流程运行在去中心化、自治的系统上，该系统可视为智能合约中预设的、经各方同意的规则集，在全体成员同意并验证规则变更或就变更达成共识之前，不允许临时修改规则。\n\
  \n到目前为止，我们已经从宏观角度了解了构成去中心化区块链应用的架构，以及构成账本的组件和支持应用运行的辅助组件。下一章将进一步深入探讨以太坊、Hyperledger\
  \ 等区块链架构的内部细节。\n\n以下是去中心化应用自上而下的功能组件列表：\n\n- 前端组件\n  - 应用\n- 区块浏览器\n- 监控系统（监视器、事件触发警报）\n\
  - 智能合约工具\n- 使用 Solidity 及其他智能合约语言的定义\n- 合约的自动验证器与执行器\n- 预定义的标准与治理\n  - 针对代币\n  -\
  \ 针对身份\n  - 针对操作\n- 工具组件\n  - Active Directory\n- 钱包\n- 保险库\n- 数据仓库集成\n- 集成插件\n\
  - `Json RPC`\n- 跨链\n- 预言机\n- 隐私与扩展组件\n  - 加密\n- 哈希\n- 计算\n- 服务总线并发\n- 核心区块链组件\n\
  \  - 网络配置\n- 链上及链下状态与存储\n- 智能合约执行\n- 共识\n  - 针对私有网络\n  - 针对公共网络\n- 网络协议\n  - `Devp2p`\n\
  - 企业级 `P2p`\n- `RLPx` 通信协议\n- `Libp2p`\n\n## Azure Stack\n\n一旦针对当前用例定义了机制和组件结构，设计架构便可根据组件类型、功能和角色分配给开发团队。请注意，当解决方案架构师使用\
  \ GHOSSTTT 协议、21 个问题矩阵和组件列表最终确定堆栈后，策划真正的去中心化实际执行至关重要。进一步推进时，我们必须提出以下问题来改进堆栈：\n\n\
  - 这种可信度是如何建立的？\n- 真正的去中心化如何验证？\n- 治理如何测试和执行？\n\n拥有一个企业生态系统，其中所有第三方也与真正去中心化、信任和对等网络所需的组件定义保持一致，这一点至关重要。\n\
  \nAzure Stack 为以太坊网络提供了一键部署选项，每个成员都可以为网络做出贡献。链上的贡献成员可以运行一组节点，与链上的其他挖矿节点进行交互/交易。Azure\
  \ 允许用户使用网络虚拟设备和连接资源来决定链拓扑，适用于单成员或多成员的以太坊联盟网络。\n\n在 B2B 的企业环境中（例如，非银行金融公司与 DSA 合作处理贷款发放，或保险公司与保险代理合作），有多家公司相互协作。这种业务设置的技术实现要求区块链节点在不同企业所属的不同\
  \ Azure 账户之间进行通信。\n\n在需要将流程在组织内部、同一组织的不同部门/员工之间进行去中心化的设置中，区块链节点将成为同一组织 Azure 订阅的一部分（21\
  \ 个问题集中的第 11 和第 16 单元）。\n\n在多节点 Azure Stack 中，包含以下模板组件：\n\n- 独立部署和联盟领导者部署（也存在于单节点中）–\
  \ 发起者\n- 加入联盟成员部署 – 加入的成员\n- 将其他成员与发起者/创始节点连接\n\nAzure 为这两个组件/成员提供了模板，并带有运行模板的部署选项。有关执行模板的详细信息，请参阅：[`docs.microsoft.com/en-us/azure-stack/user/azure-stack-ethereum#standalone-and-consortium-leader-deployment`](https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-ethereum%2523standalone-and-consortium-leader-deployment)。\n\
  \n作为解决方案架构师，必须根据业务案例、GHOSTTT 协议和 21 个问题矩阵，识别 Azure 在其市场中提供的现有模板。\n\nAzure 提供了以下以太坊替代方案。\n\
  \n### Quorum：EEA 单成员区块链\n\nQuorum 是以太坊的一个开源、许可式实现，专注于安全处理交易，并根据控制的权限状态限制访问（见图 7-4）。图\
  \ 7-3 重点展示了驱动 QuorumChain 的基本组件。观察 Quorum 上以太坊的交易流程，我们在图 7-4 中可以看到所有这些组件如何相互交互。\n\
  \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig4_HTML.jpg](img/474923_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4 QuorumChain 上的交易流程\n\n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig3_HTML.jpg](img/474923_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3 QuorumChain 的架构\n\n参见：[`entethalliance.org/quorum-consortium-network-in-azure-marketplace.pdf`](https://entethalliance.org/quorum-consortium-network-in-azure-marketplace.pdf)\n\
  \n\n\n### Ether.camp 以太坊区块链开发环境\n\n该选项可快速搭建以太坊的开发与部署环境。它提供了编写智能合约的模板，并可在沙盒中测试和模拟部署。该环境内置了用于编写智能合约的\
  \ IDE，并支持在 Ubuntu 环境中部署。沙盒是一个 NodeJS 服务器配置，能够模拟多节点网络，从而协助节点连接并基于强制执行的智能合约进行治理。\n\
  \n### 微软/Parity 基于权威证明（PoA）的 Azure 以太坊\n\n如图 7-5 所示，该工具包采用权威证明（PoA）而非工作量证明（PoW）来运行以太坊虚拟机。治理规则是预先定义的。\n\
  \n![../images/474923_1_En_7_Chapter/474923_1_En_7_Fig5_HTML.jpg](img/474923_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\n\nAzure 上的以太坊\n\n它包含以下 Azure 组件（图 7-5）：\n\n*   用于运行 PoA 验证器的虚拟机\n*   用于分发\
  \ RPC、节点对等连接和治理 DApp 请求的 Azure 负载均衡器\n*   用于保护验证器身份的 Azure Key Vault\n*   用于托管持久化网络信息和协调租约的\
  \ Azure 存储\n*   用于聚合日志和性能统计的 Azure Monitor\n*   VNet 网关（可选），用于允许跨私有 VNet 的 VPN 连接\n\
  \n现在我们已经了解了基于 21 个问题矩阵得出的各种变体架构，接下来让我们从开发者的角度深入理解组件层面，并决定各选项的适用性。\n\n## 开发者的技术组件分解视角\n\
  \n大多数由公链、私链或联盟链驱动的区块链网络，之所以获得广泛认可，很大程度上归功于其平台源代码级别的透明度。这为实施和运行建立了信任，从而使其成为终端用户信赖的来源。\n\
  \n例如，以太坊、Hyperledger、Corda、Quorum、NEM、Stellar 等都将其框架开源，并进一步在 GitHub 上扩展了组件代码。这种设置允许企业集成第三方框架，以更大信心构建区块链，因为链上的隐私和治理方面不会遗漏任何漏洞。此阶段的开发选择至关重要。\n\
  \n对于解决方案架构师而言，关键在于明确关注上一节中定义的组件。然而，在代码层面，开发者必须对所采用的框架进行严格审查。例如，51% 的矿工攻击就是以太坊早期源代码中的一个漏洞案例。然而，其转向权益证明共识的选择确保了未来能够避免此类攻击。\n\
  \n对于开发者而言，最关键的要素包括工具包配置、用于开发逻辑流的编程输入以及语言的选择。建议的决策顺序是：首先关注当前基础设施，然后是业务逻辑，最后选择适合前两者的语言。为什么这些要素的顺序如此关键？\n\
  \n*   基础设施配置——因为没有合适的基础设施配置，最理想的共识机制可能也无法适用于那些需要云组件以实现大规模覆盖的业务场景。\n*   逻辑流——因为逻辑设计和集成必须正确连接。例如，事件注册器和交易观察器必须在每次交易中进行逻辑连接。\n\
  *   编程语言——这在很多时候由社区倡议驱动，例如那些强调语言亲和性的倡议；比如，Go 语言使得 Go 开发者能够扩展 Go-Ethereum 以用于多种应用。\n\
  \n由于我们专注于开发者视角的区块链技术工具选择，让我们考虑自底向上的方法（其中底部是后端数据库，顶部是终端用户或前端应用）。\n\n### 工具层\n\n在技术栈中，从数据库端到后端，再到前端的用户交互，每一层都有特定的功能。以下详述了区块链应用的各工具层以及基于功能组件的决策。\n\
