- '# 排版后的内容


  正因如此，本书的首要目标并非是以极其详尽的细节来解释这些技术。如今市面上大多数书籍都侧重于技术的应用，它们以令人难以置信的细节阐释技术基础，并基于数十年的专业洞察力提供锐利的商业见解。因此，撰写一本关于这些主题的文本无异于重复同样的努力，边际效用微乎其微。由于我们更关注这项技术从宏观经济背景中产生的影响，我们将坚持这一目标。


  然而，在理解其影响之前，我们有必要快速回顾一下这些技术的当前应用。边栏 2-2 和 2-3 分别简要介绍了金融科技和区块链，并展示了它们为何正在引发行业革命。对于那些希望获得更具体技术知识的读者，本章末尾的注释部分提供了一份值得考虑的推荐书目列表。


  ## 边栏 2-2：金融科技——一段短暂而活跃的历史


  金融科技代表了金融与技术的融合，以形成金融服务行业中的先进解决方案。这种现象并非新鲜事物。自数字时代到来以来，银行和企业家们已系统地更新或创建商业模式，以适应客户的新行为和新需求。


  正如《纽约时报》2016 年 4 月发表的一篇文章所指出的，金融技术基础设施的根源可以追溯到 20 世纪 50 年代，随着现代信用卡的引入而建立（Zimmerman,
  2016）。随着 60 年代的到来，巴克莱银行推出了自动取款机，全球电传网络也得以建立，该网络后来发展成为清算所银行间支付系统（CHIPS）。随着银行和公司开始加速交易，70
  年代见证了纳斯达克的诞生。进入 80 年代，我们目睹了允许电子交易的 E-Trade 以及英国在线银行的问世。在 21 世纪，互联网催生了 PayPal 和 eBay，而在这个十年的后期，比特币诞生了，谷歌等初创公司和非金融公司也进入了金融领域。


  如今，由于计算、自动化、加密以及最重要的客户关注度方面的进步，金融科技持续影响着众多金融服务。在被“一刀切”方法的暴政压抑后，如今的消费者渴望提供安全性、透明度和互操作性的个性化体验。在这方面，金融科技通过将技术与客户需求进行混合和匹配，提供了一份令人耳目一新的选择菜单。由于这种技术的融合，衡量其影响需要制定某种行业分类法，以定义当前正在推动这些行业的技术组装线。


  ### 1. 支付


  **定位**：面向客户


  **主要技术**：大数据、生物识别、数字钱包、移动应用、NFC、平台


  关于支付和金融科技，需要牢记的关键词是“无现金”，这是我们在第 3 章中讨论的主题。在过去五年中，移动设备和连接性被用来提高支付的简便性，而数字钱包和自动化的机器对机器支付则为客户提供了更多价值。随着近场通信（NFC）因其易用性而日益普及，信用卡正逐渐过时。Google
  Wallet 和 Apple Pay 在平台上提供数字钱包，允许用户将多张卡连接到它们（Apple Pay 支持八张，Google Wallet 无限制）。像
  Walla.by 这样的应用帮助客户在应该使用哪张卡上做出正确决定，从而通过优化偏好来节省资金。


  支付平台还允许客户进行基于银行账户的交易，而不是基于信用卡的交易。虽然这影响了卡提供商赚取的交易费，但对客户和商家来说都更便宜，因为信用卡交易的附加费更高。这些平台还为商家提供了客户数据的访问权限，这些数据可以通过大数据分析用于定制化服务。生物识别技术还通过允许客户使用智能手机扫描面部（也就是自拍！）来验证移动支付，从而提供了更好的安全性（例如，阿里巴巴的“微笑支付”）。汇款是一个也在展现出街头智慧式创新的领域。根据世界银行
  2015 年的报告，全球仍有约 20 亿成年人没有银行账户。因此，这些人不得不使用私人汇款网络（例如西联汇款）从国外收发款项，这可能极其昂贵。例如：在向某些国家汇款时，汇款费可能高达汇款金额的
  30%。M-Pesa 和 Transferwise 提供的巧妙解决方案通过提供极低的费用、更少的外汇风险、高透明度和易用性来消除这些障碍，用户可以通过移动应用收发款项。这正在对现有企业的商业模式产生不利影响。我们将在讨论区块链时再回到支付和汇款这个话题。


  **优势**：定制化参与度、更高的安全性、透明度、速度和更低的成本。


  **风险**：标准未确立、监管和数据隐私。


  ### 2. 借贷


  **定位**：面向客户、B2B


  **主要技术**：P2P 平台、大数据、移动银行、机器学习、人工智能


  自金融危机以来，由于更严格的监管和商业模式的变化，零售银行的风险偏好降低，限制了贷款的发放，尤其是对次级借款人的贷款。这种状况被基于 P2P 模式的替代性贷款平台的增长所平衡。通过使用自动化流程、基于大数据的风险评估方法和实时分析，这些新进入者在以前是商业银行专属领域的行业中，市场份额日益增长。


  这些在线 P2P 借贷平台导致了众筹平台的兴起，这些平台为客户提供了低成本、快速、灵活且更以客户为导向的替代方案，以对抗主流零售银行业务。尽管它们使用类似的先进评判方法和简化流程，但这些替代性贷款机构的商业模式因客户群体而异。因此，商业模式的多样性分散了借贷风险。这与传统银行贷款中所见的情况相反，在传统银行贷款中，银行的模式相对相似。例如：Funding
  Circle 和 Lending Club 等公司创建了 P2P 在线市场，利用客户数据提供多种价值主张和匹配策略，从而降低了融资成本。Kabbage 使用多种数据源，分析银行信息以及企业的规模、数量和声誉（通过社交媒体记录），以实时计算风险评分。运用这种方法，他们可以在创建账户后的六分钟内为中小企业提供高达
  10 万美元的贷款。通过采用精益、自动化的透明处理和更准确的承销，他们正在速度和资本获取便利性方面挑战现有企业。因此，大型银行现在正与这些新进入者合作，以重新获得特定人口群体中的市场份额（尤其是在中短期贷款市场）。


  **优势**：更容易、更快速地获得资金、更少的繁文缛节、透明度、声誉意识以及基于客户群体多样性的适当风险匹配。


  **风险**：声誉风险（被遗忘权、标准未确立、监管和数据隐私）。


  ### 3. 投资管理




