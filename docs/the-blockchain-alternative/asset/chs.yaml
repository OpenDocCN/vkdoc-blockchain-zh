- '# 监管监管


  危机过后，监管措施层出不穷，针对银行和市场的规则已经或正在实施，尤其是在美国和欧盟，例如《多德-弗兰克法案》（2010 年）、《沃尔克规则》（2013 年）、第三版《巴塞尔协议》（2013
  年）、欧盟委员会的《利卡宁提案》（2012 年）、《欧洲市场基础设施监管规则》（2012 年）等。这些监管法规瞄准了流动性及抵押品要求、货币市场基金、税收、衍生品和消费者保护权利等领域。由于监管范围广泛，我们将聚焦于监管的概念及其在市场参与者语境中的作用，而非深入探讨针对不同领域的复杂具体法规。


  市场常被指责为监管的替罪羊。媒体屡屡使用“扼杀式监管”或“过度监管”等词汇，将其描绘成创新与经济增长的障碍，而监管者则被刻画为“玩忽职守”，或者疏离于其所监管的市场。不幸的是，这些说法并非空穴来风，部分原因在于技术演进与监管改革之间存在时滞。由于这种时滞，企业不得不疲于应对耗时繁琐的官僚程序、昂贵过时的规定，以及卡特尔式的领地争夺。但在许多方面，这种观点是一种简单化的曲解，严重贬低了监管的真正功能与重要性。


  监管的存在是为了确保商品和服务的公平交付与交换，从而保护市场经济中公民的权利和安全。监管的真正功能并非压倒企业，而是通过充当资本创造与投资者保护之间的平衡器，来支撑经济的正常运转。在执行这一平衡行为时，监管者的关键目标是提升金融体系吸收冲击、维持金融稳定的有效性。


  然而，在全球金融危机的阴影下，监管框架的有效性受到了质疑。我们一再追问：尽管存在所有这些监管，我们为何未能预见危机的到来？虽然本书前文已为此提供了部分线索，但问题的很大一部分在于信息不对称。由于市场、投资者和监管者所掌握的信息量不同，知识的欠缺（进而监管的缺失）导致了危机前一片天真的无知。因此，要实施明智的监管，我们必须触及问题的核心，聚焦于数据，而非法律术语。只有在信息完全对称的情况下，我们才能评估风险、识别机遇，并制定出符合监管宗旨的恰当规则。反之则行不通。


  '
- '# 会计把戏


  近年来，因“做假账”和低效的业务控制体系引发的金融丑闻层出不穷。一个典型的例子是 2001 年的安然公司丑闻，公司高管和经理人公然藐视规则，利用会计漏洞、特殊目的实体和虚假财务报告，隐瞒了因失败交易和项目造成的数十亿美元债务。安然丑闻带来了两个主要后果：首先，它导致了《萨班斯-奥克斯利法案》（见本章末注释）的通过；其次，它向我们揭示了财务数据的可靠性与相关性之间的区别。


  财务数据对投资者至关重要，因为它能帮助他们做出决策。正是基于这些数据（相关性），投资者才能判断一家公司的未来增长潜力，以及它是否是一项好的投资。但数据相关并不意味着它可靠。正如安然丑闻所示，投资者被提供了相关但虚假的信息或夸大的数字，这鼓励他们继续投资。与此同时，可靠的数据（即无偏见、未经管理层操纵的精确信息）则掌握在高管手中，被隐藏起来不为人知。


  已报告的可靠数据与相关数据之间的分化，源于企业与投资者之间的利益冲突。矛盾的根源并非复式记账，而在于偏见。信息生产者（此处指管理人员和高管）始终面临一个难题：他们是提供关于自身业务（收入与现金流生成能力、资产与负债等）最客观真实的信息，还是只提供投资者通常寻求的最相关信息？如果他们提供所有信息，是否会产生阻碍或破坏性影响？为了在短期内为一小部分大股东谋取利益，从而在长期内保护公司，在一定程度上扭曲公司的经济现实，难道不是更好的主意吗？


  信息偏见和做假账并非近期才有的现象，安然丑闻只是其中一例。2014 年哈罗德·克鲁克斯的调查纪录片《我们付出的代价》揭示了苹果、谷歌、亚马逊等公司是如何将利润转移至开曼群岛等离岸税务属地与避税天堂，从而规避监管机构和税务机关的管辖。通过这些操作，管理者能够描绘出公司义务与负债的另一种图景，从而获得显著的中期现金流竞争优势。


  从过去到现在，控制这种行为的手段之一便是聘请私人审计公司。私人审计公司受雇于对公司高管与利益相关者之间可能存在的信息不对称进行评判。通过使用外部审计师，目标是揭露这种信息鸿沟。但这种监管方式值得商榷，因为私人审计公司，如同私营公司一样，也可能倾向于为了自身最大利益而提供片面信息。如今，我们都熟知被冠以“四大”之名的审计公司寡头联盟。但在安然丑闻之前，该行业由“五大”组成，第五大成员是安达信，该公司因在处理安然审计事宜中被判犯有刑事指控，于
  2002 年交出了其注册会计师执照。




  私人或自我监管总会因两个原因而存在偏见。首先，公司的审计师由公司自身选定。因此，在选择审计事务所时，管理者会倾向于选择与其商业利益一致的机构。其次，尽管原则上公司应轮换审计事务所，但该行业被四家私营公司寡头垄断的事实意味着，执行审计活动的人员在很大程度上并未改变。这加剧了偏见行为，因为这些圈子的参与者之间存在紧密联系以及内部义务与偏好。简而言之，由于存在互利共赢的利益联盟，客观性受到了损害。


  鉴于这些局限性，危机后，立法者试图通过增加法律及相应机构的数量来应对财务信息操纵和无效业务控制的问题。但正如本节开头所述，这些尝试并不总是有利于创新或业务增长。


  如今需要的是对监管观念的转变。监管不应被视为投资者保护与资本生成之间的平衡行为，而需要以投资者保护作为资本生成的基础。监管需要被视为一项公共义务，而不仅仅是私人责任。为此，我们需要一个专注于对公司进行客观分析的公共机构，以减少在互利寡头结构中看到的偏见影响。本质上，监管需要从私人业务职能转变为社会实体。这样的体系将更尊重公民利益，并专注于长期经济健康与稳定，而非短期利润最大化。


  为使这样的公共职能存在，监管机构必须配备一个由适当公共权力机构管理的控制机制。该公共权力机构应包含类似证券交易委员会的董事会，有权通过任命审计师来实施独立审计系统，以减少偏见。无偏见的信任必须成为监管的核心，因为只有为投资者提供所需的投资信心，监管才能让资本形成蓬勃发展。这样的框架将以透明度和公共利益为宗旨，并允许分层合规体系，而非一刀切的行业规则。


  区块链可用作构建此类框架的工具，其透明性为解决上述信息不对称问题提供了途径。我们可以设想一个主权/机构级别的区块链，能够与私营企业使用的其他区块链实现互操作。（这样的复合区块链框架将是
  Corda 平台和跨账本协议突出特征的融合。）如果公司被要求在此类框架上进行交易，监管机构就能实时看到其交易活动的永久记录。由于隐私始终至关重要，Corda 平台提出的将交易可见性限制在需要查看的人之内的概念，应被纳入此类框架的创建理念中。这反过来将为依赖相关性辩论提供反驳，因为在此类框架中，分析和报告公司活动的方式不再受公司利益的判断所掩盖。


  然而，这只是改革监管实践的部分解决方案。监管的第二个问题是数字市场和日益无现金社会中法律代码与技术代码之间的不对称。正如哈佛大学的劳伦斯·莱斯格所指出的，在数字环境中，法律（法律代码）和计算机代码（技术代码）都需要用于监管活动（英国政府首席科学顾问，2016
  年）。因此，除了当前面临的信息差距外，新的公共监管框架还必须能够融入这一特性。这不仅会使框架更适合我们的数字化市场，还能减少监管机构判断公司是否遵守规则所需付出的努力。


  数字环境中监管的这一方面，在英国政府报告《分布式账本技术：超越区块链》（2016 年）的第 3 章中得到了出色而简洁的分析，其中指出：


  > “法律代码与技术代码之间的一个根本区别在于两者影响活动的方式。法律代码是‘外在的’：规则可以被打破，但违规会带来后果以确保合规。相比之下，技术代码是‘内在的’：如果其规则被打破，系统会返回错误且不发生任何活动，因此合规通过代码本身的运行得以确保。软件的另一个特点是，即便合规会产生不可预见或不良的结果，机器也会严格执行规则。这导致了分布式账本系统与当前金融系统在运行上的一些显著差异。”


  这份报告帮助我们认识到，构建一个新的基于区块链的监管框架（BRF）的要素正在逐渐到位。金融市场已经由技术和法律代码的组合来管理。然而，本节开头引用的法规（如多德-弗兰克法案、利卡宁提案、欧洲市场基础设施监管规则等）本质上大多是法律性的，合规性追踪通过法律代码进行。由于市场参与者必须向监管机构提供信息，这本身就容易受到前述偏见的影响。但通过
  BRF，这个问题得以克服，因为企业需要在监管机构管辖范围内的区块链上运营。可以向参与者提供智能合约或合规软件来执行交易。由于代码在条件被违反时不会执行，这将减少对外部审计师的需求。这些角色在此类系统中的职能将不可避免地改变。他们可能从交易验证者转变为代码验证者，确保
  BRF 与市场的动态变化保持一致。这是一个至关重要的角色，因为当前的监管框架无法尊重市场的异质性。


  尽管当前的法规让市场更安全，但首先需注意两个陷阱。法规可能被设计来保护现有企业，并为新进入者设置准入门槛。这扼杀了创新，阻碍了行业的发展。其次，为了抵消第一个陷阱，监管机构可能过度反应，发布未能充分捕捉新技术和新企业风险的政策。这让我们回到了未能保护消费者利益的问题，正如在借贷和支付行业中所见。




  '
- '# BRF 与智能合约：多层次方法


  BRF 及其创建的智能合约因此必须采用多层次的方法。 BRF 不应为整个行业制定包罗万象的规则，而应旨在以风险为导向，为企业构建多重标准，在此框架下，同等企业同等对待，且关注的问题应优先于企业规模。例如，数据隐私并非仅是大企业才需担忧的问题。因此，可以建立像当前欧洲方法那样定义统一的欧盟范围标准以打击数据隐私泄露的规范，来作为处理与数据隐私相关的所有规则。


  另一方面，尚处起步阶段的金融科技公司等年轻的技术主导型企业，其副作用小，系统性风险也较低。因此，监管机构在创建智能合约时需要考虑到这一点，并定义结构合理的应对措施。关键在于审视创新时要保持技术中立，并专注于风险。企业的交易数据可用于确定其风险状况，基于此以及一系列特定行业的规则（例如所使用的杠杆率），企业需要遵守特定的法规。


  ## 对审计公司的影响


  这种监管框架的一个后果是，现有审计公司的角色将发生转变，它们将更多地发挥咨询公司而非审计事务所的功能。但很大程度上，情况已然如此，因为四大审计公司都拥有完善的咨询服务。从战略角度看，与其说是转型问题，不如说是适应性问题。这对四大审计公司来说可能是个好消息，因为众所周知，适应能力与进一步的盈利能力密切相关。


  ## 监管机构与区块链


  监管机构并非对这些可能性一无所知，越来越多的监管机构正开始认真考虑将区块链作为解决当前问题的方法。侧边栏 3-3 摘要列出了美国商品期货交易委员会现任委员 J.
  克里斯托弗·吉安卡洛在近期共识大会（2016 年 5 月）上发表的一些评论，并为监管机构提供了一些关于区块链的思考素材：


  ### 侧边栏 3-3：美国商品期货交易委员会委员 J. 克里斯托弗·吉安卡洛发表的个人意见陈述


  **来源：** 共识大会，2016 年 5 月，由 CoinDesk 主办


  **大会视频访问地址：** [`http://www.coindesk.com/events/consensus-2016/video/day2/`](http://www.coindesk.com/events/consensus-2016/video/day2/)


  **注：** 这些陈述是针对与区块链监管未来相关的几个问题作出的回答，并在对话的不同时段发表。然而，这并不意味着它们脱离了语境，因为整个对话都围绕这一主题展开。


  > “让我带你们回到那一刻，那时我清楚地意识到像区块链这样的东西是多么的必要。2008 年 9 月，在雷曼兄弟倒闭前几天，我担任全球最大的场外互换交易平台（电子语音交易平台）的高级主管，该平台主要交易信用违约互换。在雷曼兄弟倒闭前几天，我们看到雷曼兄弟以及许多世界交易银行的信用利差基点大幅扩大，这表明它们的生存能力面临着真正的压力……”


  > “……我们正在与银行审慎监管机构进行对话，他们问我们，我们在市场上看到了什么，信用利差在何处，交易对手方承受着多大压力，某些交易对手是否不再与其他交易对手交易……基本上是问市场向交易平台发出了哪些监管机构在其数据集中没有的信号……我清楚地认识到，金融危机的核心在于监管机构无法洞察世界上最大的交易银行之间彼此的对手方信用风险敞口……”


  > “……现在，多德-弗兰克法案对此的监管解决方案是创建掉期数据存储库，可以收集信息然后重新组装，以使其看起来像不同金融机构的实际交易账簿……危机过去八年了，这就是我们现在的处境。我们正试图收集这些信息，清理这些数据并重新组装账簿……而且我们将在未来很长一段时间内继续这样做……”


  > “……当今世界，监管体制既按民族国家划分，也按资产类别划分……例如，我们 CFTC 负责信用违约指数，而 SCC 则负责 CDS……这两种产品在现实世界中是同步交易的，但在监管世界中却被分开了。关键是（因为这种分离），我想我们将永远在组装数据、清理数据并试图重新组装交易账簿，而无法真正看清它是什么（这是关键点），而区块链有可能为我们提供这一点。因此，发展区块链有很多理由，但其中一个重要的理由是，它可以为监管机构提供他们在金融危机期间所没有的东西，即实时可见性……我不认为这种可见性会避免风险，但它无疑是一种非常核心的风险应对方法。”


  > “我们今天拥有的是事后数据或事件发生后的数据。我们拥有的数据集完整程度各异。我们拥有清算掉期的良好数据，但缺乏未清算掉期的数据。有时，我们看到的交易账簿可能看起来极不平衡，因为它可能只显示了账簿上的清算掉期，而没有显示未清算掉期。有了其余信息，它可能是一个平衡得多的投资组合……我们正试图在交易各方之间组装交易账簿……”


  > “区块链的潜力在于能够跨市场、跨资产类别，实时查看真实的账簿。这是向前迈出的一大步。这些信息是我们在危机期间所没有的。这些信息将使得监管机构在未来发生危机时，能够对其应对危机状况的措施进行更精准、更精细的校准。它不一定能避免失败……但它能让监管机构对问题事项有清晰的了解，以决定是允许那家公司倒闭还是阻止其倒闭……”


  > “现在，这只是区块链承诺的一部分。金融危机之后，G20 国家对金融机构施加了一系列监管指令、要求和资本要求，造成了巨大的操作复杂性、资本约束和资本复杂性。同样，区块链也承诺能够超越监管机构自身施加的部分监管和操作复杂性。”


  > “我认为，监管机构有其自身的理由，这些理由帮助他们履行对纳税人、公民和市场参与者的使命，看到这项技术蓬勃发展，并允许受监管实体在监管改革措施下履行其义务……”


  ## 总结与优势


  因此，上面方框中的评论有助于我们了解像 BRF 这样的监管结构在多大程度上可以减少信息不对称，并有助于将监管方向引导至投资者保护。这样的系统将具有多项优势，包括：




  *   **降低合规成本**，有助于引导更多资金用于企业的研发和创新项目；

  *   **提高透明度**，这对投资者和监管机构来说是一大福音；

  *   **减少公司经理和高管的偏见**，使其承担更多责任。这将创造一个更安全的商业环境，并有助于降低系统性风险；

  *   **加快监管机构识别系统性风险**并部署应对措施的速度；

  *   **基于企业风险状况的定制化监管**，而非一刀切的行业合规义务。这对新入行者和初创企业尤其有利，能让他们更快地进行尝试和扩张；

  *   **数据标准化**。目前，监管机构和审计人员难以分析和比较不同企业及其所持有资产的数据，因为信息没有标准化。采用`BRF`并建立规定的数据标准将能解决这一差异；

  *   **减轻监管机构的工作量**。通过结合使用技术代码和法律代码，监管机构能够以更少的人力、更稳健的方式进行监管；

  *   **更好地监督税收收入**；

  *   **最后**（并且，因为值得重申，所以要再提一次），**更好地保护公民**。


  `BRF`的有效运作需要有一个具备互操作性的主权`区块链`，并且如果它要成为全球性机制，则需要在不同地理区域进行部署。这一点在本章中已多次提及。因此，当我们从市场和监管转向政策议题时，我们将聚焦于主权区块链，并探究这类系统对整个社会可能带来的益处。


  ## 迈向无现金未来的政策


  对当今经济格局中市场和监管的回顾，向我们展示了变化是如何发生的，以及当局目前正面临哪些挑战。我们还看到，`区块链`提供了值得研究的解决方案路径，并且某些当局正在考虑这些方案。但是，如果说市场和监管是经济的支柱，那么政策就是经济赖以建立的基础。政府通过追求货币和财政政策目标来适应不断变化的市场条件，并利用监管杠杆来确保经济正常运转，从而改善企业和公民的日常生活。


  正如我们在第 1 章中所见，货币和财政政策常常将金融市场的角色排除在外。市场被视为一个多孔的外罩，其功能是确保价格发现和资源的正确配置。通过将这一功能“外包”给市场，政策制定者可以专注于通过控制利率和通胀来维持经济增长这一更重大的任务。这反过来将确保对当前商品和服务的名义需求稳定增长，进而保障适当的就业水平、平衡的不平等程度，并维持社会繁荣。


  但自危机以来，这一运作论点受到了挑战，因为过度杠杆以及交易无内在价值的金融资产已充斥市场，并在此过程中改变了市场的结构。过度关注通胀和利率导致央行忽视了私人信贷的创造和分配，从而引发了快速的信贷增长和过度的杠杆。当今经济体面临着预计将持续增长并永远超过国家生产力（`GDP`）的过度债务水平。加之技术进步、全球化加深以及生产力水平下降，不平等现象的蔓延正在加剧。


  造成这一现象的一个主要原因是现代经济体看待债务的方式。债务和信贷本身是创造繁荣的重要杠杆。通过允许个人以未来预期收入增长为抵押进行借贷，债务工具使家庭和企业能够达到当前的繁荣水平，对冲收入波动，并利用新机遇来确保更安全、更繁荣的未来。但在过去的三十年里，我们看到债务工具本身已经变成了商品。信贷工具并未被引导至具有生产性目的、最有潜力推动经济增长的投资项目，而是被转化为基于投机推断进行交易的衍生资产。


  这种信贷的转变降低了其社会价值。虽然衍生品被认为能增强价格发现、改善风险转移和提高经济效率（参考前文引用的艾伦·格林斯潘的言论），但它也导致了大规模的投机押注。价格发现当然是一个有用的功能。但在纳秒级别上交换这些衍生品的社会增益是什么？沉溺于利用利率差和这些衍生品未来价值预期进行交易活动，其社会经济收益又是什么？如果说有什么影响的话，这种做法导致了资源⁹（尤其是人才）的错误配置，并创建了一个让商业银行可以沉迷于短期利润最大化、加剧市场金融化的体系。正如凯恩斯在《货币论》中所言：




  > “存在两种交易类型：第一类涉及购买当前商品和服务，其价值与当前产出的货币价值（GDP）保持相当稳定的函数关系。第二类涉及资本品或大宗商品的投机交易……这些纯粹是金融交易，与当前生产率没有明确关系……所交换的资本品价格水平可能与消费品价格水平存在显著差异。”


  **金融化**已使信贷从实现未来繁荣的手段，转变为可交换价值的商品。这一转变的根源在于分类上的冲突。尽管债务被视为一种资产，但其本质与实际商品或服务截然不同。货币和信贷完全属于不同的产品类别，因为它们的创造会衍生购买力，进而产生宏观经济影响。这与基于技术进步创造新产品或服务的情况不同。新产品或服务会影响生产率曲线，并形成规模经济以降低价格。因此，购买力的任何提升都是其创造的结果，而非原因。而货币和信贷则不同，它们一经创造就能立即提升购买力。正因如此，将主导商品和服务创造的自由市场原则应用于信贷和货币供应，是一项极其微妙的实践。


  因此，我们需要质疑货币和信贷创造的根本机制，并问自己：谁应掌控其生产？如今，在任何经济体中，货币可通过两种方式创造：要么由政府承担创造法定现金的角色，要么依赖部分准备金银行体系，通过私人信贷发行创造货币。但正如前文所述，将基于债务的货币创造权交给商业银行已导致严重的社会问题，例如**金融化**加剧、银行“大而不能倒”以及主权债务水平过高。鉴于技术性失业以及最终私人债务会转化为公共债务并产生债务积压效应，我们需要思考：国家在货币创造中应扮演何种角色？是否将货币生产完全交由政府控制是更好的选择？若这显得过于集权和专制，那么另一种选择是考虑由不同主体创造多种形式的货币，且所有这些货币均需得到主权国家内公民的认可和接受。


  这两种货币创造方法并非新概念，过去已有人探索和运用。但此次的不同之处在于当今货币的无现金形态，以及完全数字化的货币可能带来的影响。这两种选择都将对中央银行运作及货币与财政政策产生重大影响。然而，它们也各有优势。通过采纳正确选项，政策制定者或许能真正解决经济中基于债务的增长问题。因此，让我们探讨这两种方案，以确定最佳的前进方向。首先，我们来考察政府对货币发行控制权的概念。在这方面，熟悉或重温《芝加哥计划》将大有裨益。边栏
  3-4 提供了摘要说明：


  **边栏 3-4：芝加哥计划**


  来源：*《重访芝加哥计划》*，Jaromir Benes 与 Michael Kumhof，国际货币基金组织，2012 年。


  注：本框中的结论是对上述来源研究结果的简化摘要。


  私人货币发行与高利贷在两方面存在内在联系：货币供应量及其产生的收益。首先来看供应方面。在部分准备金银行体系下，由于私人实体能够创造货币并影响流通中的货币数量，它们可以在经济繁荣时期增加现金量，导致信贷扩张和价格上涨。而在经济收缩时期，情况则相反。历史表明（参见
  Zarlenga，2002 年；Graeber，2012 年），这些扩张与收缩周期最终会导致系统性借款人违约，并促使财富集中在贷款人（即货币发行者）手中。


  第二种高利贷形式涉及货币发行所带来的收益或利益。正如我们在部分准备金银行体系中所见，私人货币必须通过贷款方式进入流通，并以正利率发行。利率部分归因于贷款的风险溢价。但这种利率值也基于货币即时创造购买力的能力。由于货币能立即为借款人提供流动性，借款人支付利息的部分原因也在于货币的流动性好处。其结果便是那些拥有私人货币发行特权的人展开了激烈的寻租行为。


  《芝加哥计划》正是为解决这些货币经济学的关键问题而提出的方案。大萧条之后，芝加哥大学的亨利·西蒙斯（Henry Simons）和耶鲁大学的欧文·费雪（Irving
  Fisher）等美国宏观经济学家提出了根本性的货币改革，呼吁将商业银行的货币功能与信贷功能分离。他们提议，私人银行的存款应 100%由政府发行的货币（基础货币，参见第
  1 章）支持，而新的商业银行信贷只能基于银行已获得的收益（以基础货币形式持有）发放，而非像当今部分准备金银行体系那样通过创造新存款来发放。费雪（Fisher，1936
  年）声称该计划有四大优势：


  1.  由于商业银行将不再能够扩张和收缩现金供应（第一种高利贷形式），这将有助于更好地控制信贷周期。

  2.  这将使政府能够以零利率发行货币（即消除第二种高利贷形式），而非从中央银行借入现金。这反过来会减轻政府财政的利息负担，并减少主权债务。

  3.  由于货币不再通过发行私人债务创造，这将降低私人债务水平（同时也会降低公共债务水平，因为如第 1 章所述，私人债务最终会转化为公共债务）。

  4.  这将消除银行挤兑现象。


  现金供应量的扩张与收缩问题至关重要。如本框开头所述，货币创造购买力。因此，通过信贷扩张和收缩货币供应并非由实体经济的根本面驱动，而是其本身改变了根本面（Benes
  和 Kumhof，2012 年）。由于在部分准备金银行体系下，（广义）货币只能通过创造信贷来产生，银行发放贷款的意愿不仅会造成货币过剩或短缺，还会推动名义总需求。


  但在《芝加哥计划》下，货币创造与信贷创造是分离的，可以彼此独立地进行管理。这样做将把银行的作用缩减至其本应履行的核心职能：充当纯粹的中介机构，吸收资金并将其贷给借款人。鉴于市场日益**金融化**，这是一个值得强调的关键点。债务不能通过发行更多债务来减少。我们需要通过增长来摆脱债务困境。




  '
- '# 芝加哥计划：债务减免与宏观经济稳定


  债务的特性以及芝加哥计划的第二个优势，是另一个值得讨论的关键因素。如今，金融体系的总负债（部分由于影子银行）远大于政府的负债。由于该计划要求商业银行以其负债为基础持有
  100%的准备金，政府发行的货币使得这些负债能够转化为政府的资产。由于金融体系的负债大于国家的负债，将私人负债转化为资产意味着国家负债总额的减少，因为他们获得的资产将超过当前的负债。费雪提出，这可以通过债券来实现。由于私人银行持有政府债券，国家可以回购这些债券并在此过程中取消其债务。


  `Benes` 和 `Kumhof` 认为，费雪这一回购债券并取消债务的提议，尽管合理，但对于当今的经济来说已经过时。当费雪在 20 世纪 30 年代提出这一提议时，美国的商业银行持有其大部分政府债务。由于如今大多数政府债务由本国商业银行以外的机构持有，`Benes`
  和 `Kumhof` 指出，政府发行国家货币并“保持各自的总头寸不变”会是一个更好的主意。无论采用哪种方法，结果都是一样的：政府净债务大幅减少*。


  由于商业银行需要将其负债转换为财政部的准备金，芝加哥计划降低私人债务水平的第三个优势尤为重要。正如我们在第 1 章中所看到的，私人债务不会消失，最终会变成公共债务（参见
  Sufi & Mian, 2014; Turner, 2015）。因此，降低私人债务水平对于降低公共债务水平至关重要。由于芝加哥计划要求商业银行在财政部持有全额准备金，这笔来自私营部门的现金流入可以被财政部用来回购目前由私营部门持有的任何政府债务。这笔现金流入也可以用来注销财政部已经发放给私营部门的任何信贷。本质上，这种持有准备金的做法为我们提供了选择权，以减少私营部门和公共部门资产负债表上的债务。在`Benes`
  和 `Kumhof` 进行的模拟中，回购私人银行债务（除实物资本融资投资外）是运行假设。


  基于这些原则和假设，该论文的作者创建并测试了一个基于最先进的`DGSE`模型（更多内容见第 4 章）的理论模型。他们发现了强有力的证据支持费雪的主张，并且发现基于无债政府发行货币的货币政策将降低整个经济体的债务水平，并确保更平稳的商业周期。其他一些值得一提的要点包括：


  *   **芝加哥计划创造了长期产出增长**：经济中较低的债务水平导致投资者要求更低的实际利率。这使得借贷风险降低，并有助于刺激投资。由于政府也能够获得更高的铸币税收入，它可以抵消公民支付的扭曲性税率，从而让公民有更多收入进行储蓄或投资。最后，由于现在可以无债创造货币，因此减少了对那些主要功能是创造充足货币供给的贷款进行监控的需求。这反过来又降低了信贷监控成本。


  > *（在审视这一计划时，应谨记，货币不应被视为政府发行的债务工具（如同在部分准备金银行体系下当前的做法）。相反，它应被视为股权。发行的货币对于持有者来说是资产，对任何人来说都不是负债，因为它并非基于债务的创造和发行。）*


  *   **通胀可以降至零且不会造成货币政策问题**：我们大多数人都熟悉央行试图通过将通胀保持在每年 2%左右来刺激经济的做法。采取这种做法的原因有多方面。首先，略微正向的通胀率有助于偿还债务。如果价格下跌，那么债务的价值就会增加，从而减少投资者的投资。其次，如果价格下跌，即通胀过低，那么借贷就会减少，央行将难以通过低利率来刺激经济（见下文关于流动性陷阱*的注释）。在这种情况下，唯一的选择是央行开始实施负利率。但如果消费者能够将银行存款转换为现金，那么这种措施最终将变得无效。这被称为利率的零下限，并可能导致流动性陷阱。因此，形成了一种共识：通胀需要保持低位但为正值——大约
  2%，并伴随 4-5%的名义 GDP 增长率（Turner, 2015）。


  在危机前的几十年里，我们看到的情况正是如此：名义 GDP 确实以年均 5%的速度增长，通胀接近 1-3%。但这种增长伴随着 10-15%的私人信贷增长（Turner,
  2015）。如果央行提高利率，那么信贷增长就会放缓，投资也随之放缓。这似乎表明，我们需要每年 10-15%的信贷增长率才能达到 2%的通胀目标。但正如我们所看到的，不断增长的债务水平正是我们今天需要避免的，因为它会导致一系列其他问题。


  基于芝加哥计划制定货币政策为我们解决了这个难题。由于货币和信贷不再相互交织，政府现在可以在不依赖私人银行发放/拒绝贷款意愿的情况下增加广义货币的数量，从而通过控制货币供应更好地刺激名义需求。


  此外，央行还可以根据投资目的发放贷款。危机前信贷迅猛增长的原因之一是对房地产和投机活动的投资增加。通过控制货币供应，央行现在能够确保信贷便利只用于特定活动，例如投资项目。因此，利率可以降至零甚至负值而不会产生任何实际问题。事实上，作者模型的一个关键结论是，通过使用独立的政策控制工具，特别是在控制货币供应量、银行贷款数量以及政府向银行放贷的利率方面，央行能够更好地控制通胀和利率，并能够解决零下限问题并消除流动性陷阱。用他们的话说，


  > “……零下限不适用于这个利率，这使得保持稳态通胀率为零成为可能，而无需担心名义政策利率在这种情况下更有可能达到零或负值。”


  > *（流动性陷阱是指中央银行向私营部门注入现金未能降低利率的情况。由于消费者认为利率很快会上升，这只是时间问题，他们宁愿储蓄也不愿借贷和投资。结果，货币政策变得无效。）*




