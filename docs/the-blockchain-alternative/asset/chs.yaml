  无论读者持何种立场，都应牢记，目标不应是支持某一特定方案或方法。相反，所提供的各种解决方案的多样性有助于我们阐明所面临挑战的丰富性，从而使我们认识到，决定适当技术选择的，正是特定身份被使用的环境。在一个日益复杂、充斥着多重人格表征的世界里，正是这些看似分离的解决方案的融合，将使我们能够为这个新时代找到最佳方案。


  尽管如此，当前数字身份系统的匮乏限制了监管机构提供高效、安全的数字金融服务的能力。要探讨需要什么，首先必须理解现行系统如何阻碍了数字身份的发展，并重新构想身份的概念。


  为了说明当前客户在身份识别和 KYC 方面面临的一些问题，让我们从一个真实的故事开始：一位汇丰银行的客户在想要开立账户时所遇到的情况。2009 年 10 月 2
  日，《每日电讯报》“财经”版的一封读者来信，揭示了现代生活中的身份问题（Birch, 2014）。写信人试图在汇丰银行开立银行账户，但她没有现行的护照或驾驶执照。


  她写道：“当我在分行解释这一点时，银行建议我去警察局开具身份证明。”她尽职尽责地去了当地警局，警方却告诉她，除非她有犯罪记录，否则从未听说过这种事。她觉得只有有犯罪记录才能开银行账户似乎很奇怪，于是返回分行，银行给她看了一份在开户时被认为可接受的证件清单。这次，他们建议她去英国税务海关总署（HMRC）开具证明信。她写道：“我依言去了当地税务局，那里的助理说她真希望银行不要再把人们送到这里来……他们不会浪费公共资金为银行提供这类证明信。”


  这封信接着列举了她提交但随后被银行拒绝的证件：已过期的护照、出生证明、现任雇主（她已工作二十多年的地方议会）的工资单、工作证（带微芯片）、水电费账单、另一家银行的单据、房契以及选民卡。这些证件中的任何一份都足以让她在银行获得一份工作，但显然，不足以开立一个账户。尽管自这封信发表以来，这个问题可能已得到纠正，但这个例子仍然与当今许多银行和金融机构的惯常做法相关。这里的问题不仅仅是
  KYC，而是关于身份如何被衡量，以及信誉被赋予何种价值。


  正是在这一点上，我们看到了现有 KYC 程序系统的现行缺陷。在很多方面，大多数机构并不真正关心身份。它们关心的是提交给它们的任何角色实体的信用记录。它们遵守严格的“了解你的客户”规定，尽管这些规定与任何真正的身份安全无关。就目前情况而言，如果有人凭护照（例如）开立账户，银行不可能知道这本护照是真是假。但这无关紧要，因为银行的义务仅仅是保留一份副本。如果他们这样做了，而护照随后被证明是假的，那也非其之过。


  因此，为了使 KYC 与数字经济相关，需要从一个新的视角来审视身份的概念。更重要的是，监管机构和服务提供商（金融或其他）必须考虑身份的数字化和金融的数字化，以创建一个适合未来时代的经过验证的价值交换渠道。要做到这一点，不仅需要理解在去中心化技术背景下身份的变化方式，还需要理解当今货币和价值转移系统的解读方式。数字经济，以及我们在此之上构建的数字社会，要求我们对身份和货币的思考方式有一个统一的看法。


  自从虚拟化身发展以来，我们根深蒂固的身份概念已经变得与现在在线、互联、网络化世界中的真实身份不相干了。一个单一身份可以同时存在于多种状态。因此，今天需要理解的是，身份以不同形式存在。界定一个人在不同网络和系统中可能拥有的身份种类，对于理解基于身份的信誉论述至关重要。毕竟，在
  KYC 流程中，被评判的是一个人的信誉。一个人的 Facebook 账户与他们的 LinkedIn 账户不同。一个人在这些媒介上表现自己的方式，直接反映了他们希望被雇主、亲友或整个世界如何看待。


  通过分析身份的不同表现形式，我们意识到，与人相关的身份实际上有三种：个人自身的身份或心理身份、社会身份和法律身份。可变性是区分个人身份、社会身份与法律身份的关键因素。个人身份和社会身份都不是固定的：它们会在人的一生中演变和改变。另一方面，法律身份是固定的，关乎个体的可识别性。在线状态下，一个人可以拥有多种社会身份，这些身份可能与其法律身份直接或间接关联。虽然一些公司坚持仅使用法律身份进行
  KYC 流程，但越来越多的新公司正在将法律身份与社会身份进行比较，以确定与个人相关的风险。


  例如，在线借贷平台 Kabbage 为小企业提供金融服务。被称为“6 分钟贷款”的 Kabbage，利用来自 eBay、亚马逊、Shopify、Stripe 和
  Square（以及其他平台）的真实业务数据，来确定潜在借款人的风险因素。基于此评分，借款人在发起资金请求后的 6 分钟内，就能借到高达 10 万美元的款项。


  上述例子是众多使用多种身份来源验证 KYC 和 KYB 的公司之一。通过不单纯依赖法律身份，他们能够通过评估客户在社会和个人网络中的信誉和历史，更深入地了解客户。无论使用何种身份渠道，需要这种理解深度的关键要素是信誉。身份和凭证很容易创造和销毁。另一方面，信誉则更难颠覆，因为它不取决于某个人的看法，而取决于网络中的每个人对某个个体的看法。在商业、KYC
  和 ALM 方面，信誉的作用优先于货币，用于建立交易。




  '
- '# 价值交换平台中的信任与身份


  信任是将身份状态的变迁与货币形态的变革相联结的纽带，这种联结体现在新型价值交换平台中。在基于信任的网络里，经济交换的动力来自声誉而非监管。从交易视角审视，我们可以窥见当今身份功能的另一面。例如，根据英国金融行为监管局的最新报告，英国政府已强制银行花费近
  10 亿英镑用于"往来账户转换系统"（`CASS`），旨在将银行账户转换时间从三周缩短至一周（FCA, 2015 年）。


  然而，若某客户决定从 A 银行转至 B 银行开户，仍需提交水电费账单原件、护照及复印件。为何客户无法直接使用 A 银行提供的在线银行身份在 B 银行开户？尤其这两家银行遵循几乎相同的
  KYC（了解你的客户）程序。


  这个问题的答案涉及多重因素，但核心症结在于：若银行间缺乏互惠互信的信任圈，身份与 KYC 相关问题便无法解决。该领域缺乏共享叙事的现状，正在阻碍以客户为中心的商业模式创造价值的进程。当前银行试图通过聚焦短期利润最大化来回避该问题，而非解决长期结构性症结。因此，亟需将身份体系与价值交换网络进行融合。


  主张以更包容的方式审视 KYC，同样需要结合具体场景。当前需要的不仅依赖用于物理边界管控的身份文件（如护照、驾照等），更需要虚拟边界的身份凭证。我们需要能够整合不同身份类型的基础设施——既有静态身份，也有灵活身份。同时，该基础设施需在严格层级提供适当隐私保护与安全机制，且无需在这些关键特性间取舍，同时保持成本效益以实现可扩展性。


  带着这样的前提审视，并从经验主义角度考察身份演变得出鲜明启示：当前需要的是一种机制，使个体能够证明其有权执行特定操作（如开户、理赔等），而无需在每个环节披露全部身份信息。证明个体有权从事某项活动与证明其身份是完全不同的命题，且可在不牺牲隐私的前提下实现——无需每次出示完整身份信息（Huckstep,
  2016 年）。


  例如：进入酒吧真的需要展示所有个人证件吗？或许只需一个"该用户年满 18 周岁"的认证即可。交易所需并非身份本身，而是与之关联的资格授权。


  ## 通证化身份与经济化身


  为实现此目标，我们需要基于通证化身份建立经济化身。化身是相对熟知的概念：即两个或多个相互关联的身份。个体可拥有经过验证的真实主身份，同时关联一个化名身份。这种双向关联机制使个体能在使用化名身份参与经济和社会交易时，自主控制隐私边界。这也为与区块链技术的融合提供了便利。


  身份通证化需分解为两个维度：


  1. 简化 KYC 流程，使虚拟身份的吸纳与身份信息共享更为顺畅。这样个体无需在每次卡点时重复证明身份，只需一次验证即可。

  2. 允许个体利用身份生成"经济化身"，用于证明其有权执行特定任务或享受服务/福利，而无需在该过程中披露全部身份特征。


  为实现此目标，可运用通证技术。以下假设性流程展示了实现路径：假设用户欲与商户交易，但不愿展示全部身份信息。同时商户需确认交易对象合法且非从事非法活动。针对此问题，当客户开户时，银行创建电子钱包并生成经过数字签名的通证提供给客户。该通证与客户在银行的账户绑定。但银行不知道通证接收方是谁，只知道接收方是已在银行开户并通过
  KYC 流程的客户。客户向商户付款时需提交通证。商户可验证银行的数字签名，确认通证提供者拥有经过验证的账户，同时保持匿名性。


  通过通证化客户身份，银行可确认其为客户，但银行与商户均不知晓客户真实身份。这引出一个关键点：化名身份需由可信机构背书才能产生价值。若客户从事违法行为，法院可指令服务机构披露客户真实身份。除了提供防范对手方风险的安全机制外，网络时代的隐私保护通过个人自主控制实现。需要强调的是，交易应当实现隐私性而非匿名性，这正是化名身份基础设施成为交易系统最重要特征的原因。


  ## 各国身份模式比较


  通证化身份模式的优势在于，它并不依赖特定国家的身份签发机构类型。各国身份规范化方式千差万别。在发达国家中，主要存在三种模式（Birch， 2014 年）：


  1. 斯堪的纳维亚模式：银行提供被商业和政府使用的身份；

  2. 大陆模式：政府身份被银行和商业使用；

  3. 大西洋模式：银行与商业相互提供身份，同时为政府所用。


  大西洋模式最适合法国这类国家，因为其存在多个签发部分身份信息的机构（如邮政局、政府机构等）。本质上，个体可能拥有三四个不同身份提供者签发的身份，如同我们持有不同银行卡。因此，个体可拥有银行身份、居住身份、教育身份和旅行身份等。


  这些身份可能由专业机构签发。例如，邮政服务可能成为"地址"属性的首选提供方。银行身份和旅行身份都可能使用该属性构建身份。通过让每个机构各司其职，同时传播其对个体身份的信任度（基于其
  KYC 流程），我们可以激发不同主体间的对话——正如前文所述，这正是当前系统的局限性之一。



  由于身份和身份属性在数字凭证中紧密绑定，正是这些凭证必须经过验证以支持交易。如果某人需要证明其年龄，他们可以出示包含证明其身份已超过特定年龄（例如 18 岁）的属性的认证凭证。该认证来自另一方能够识别并信任的提供商，这一事实通过其可自动验证的能力得到了进一步增强。使用此类框架的优势在于它们类似于现代互联网密码学核心框架。通过使用公钥证书（`PKC`）和公钥基础设施（`PKI`）²⁹，由第三方进行数字签名的信息可以得到验证。


  之所以参照大西洋模型提出身份代币化，是因为它回归到了去中心化身份的概念，这一概念自互联网诞生以来就一直是争论的主题。由于近期密码学的进步，目前正在探索的大多数解决方案都与公钥基础设施有关，人们可以安全地存储私钥，身份将去中心化，因为只有拥有密钥的人才能访问它。


  总部位于美国的比特币商户处理器 `Bitpay` 是最早在这一领域启动项目的公司之一，发布了`BitAuth`项目。该项目利用比特币技术来促进去中心化认证系统。该系统使用密码签名来替代服务器端密码存储，从而为
  IT 管理员解决了一个常见的安全问题³⁰ (Cawrey, 2014)。`BitAuth`使用比特币的技术，利用`secp256k1`创建公私钥对。通过为用户提供一个系统识别号（`SIN`），即公钥的哈希值，它允许在
  Web 服务间进行无密码认证。它使用签名来防止中间人（`MITM`）攻击，并使用一次性随机数（`nonce`）来防止重放攻击 (Raval, 2016)。私钥永远不会泄露给服务器，并且可以安全可靠地存储。身份是去中心化的，因此用户无需信任第三方来存储身份，而是可以自己存储。


  由 OpenID 基金会开发的 `OpenID` 协议也正在开创这一概念。`OpenID` 是一种去中心化身份协议，它使用现有的 Web 协议，如`HTTP`、`SSL`和`URI`。该技术的基础是，由于身份分散在整个网络中，通过使用
  OpenID 协议，用户可以将现有的 `URI` 转换成一个可以在任何支持 `OpenID` 的网站上使用的账户。通过允许用户将身份存储在一个可信源，服务提供商可以跨多个提供商携带该身份。谷歌、雅虎和推特都曾是
  `OpenID` 提供商。但 `OpenID` 仍然存在潜在的安全漏洞，因为它需要信任一个持有数据的服务提供商 (Raval, 2016)。


  `Namecoin` 旨在克服这一限制（也称为 Zooko 三角 ³¹）。虽然 `OpenID` 解决了 Zooko 三角的安全性和人类可读性属性，但 `Namecoin`
  通过包含去中心化特性完成了这一三角。`Namecoin` 使用区块链 ³² 作为用户与请求其身份的服务之间的中介。使用 `Namecoin`，用户可以通过发送一笔在其
  `/id` 命名空间下嵌入其名称的交易，将名称注册到 `Namecoin` 区块链中。当用户发送交易时，如果名称唯一，`Namecoin` 会存储它。因此，当用户创建并选择自己的身份时，用户会获得一个新的服务命名空间。


  从这个发展过程中衍生出的一个明显问题是，在这个碎片化的系统中，认证和授权将如何工作？为了回应这一关切，`NameID` 被创建出来，它可以被描述为 `Namecoin`
  和 `OpenID` 的结合。`Namecoin` 允许用户以去中心化和安全的方式注册任意的在线身份，而 `NameID` 则允许用户将其 `Namecoin`
  身份转换为 `OpenID`，并用于方便地登录成千上万个支持 `OpenID` 的网站。


  然而，关于身份的去中心化，有一个需要注意的警告：用户仍然需要本地存储其加密的私钥。为了帮助用户解决这个问题，`Coinbase`（它充当比特币持有者的银行，因此是去中心化的反面）将私钥存储作为一项服务提供。


  沿着 `Coinbase` 和其他早期进入者开辟的道路，近年来涌现了越来越多的公司提供去中心化身份服务。其中越来越多的公司正在利用区块链技术，因为它允许以安全开放的方式存储所有类型的数据和交易，同时打击身份盗窃。


  同时，将去中心化的区块链原则与身份验证相结合，使用户对自己的个人信息归谁所有以及如何访问这些信息拥有更大的控制权。消费者现在可以在无需输入任何传统用户名和密码信息的情况下登录和验证支付。通过一些区块链解决方案，消费者可以使用应用程序进行认证，而不是使用用户名和密码等传统方法。这些公司还提供存储其加密身份的解决方案，允许用户与公司共享数据，并按自己的方式管理数据。


  鉴于身份的这些多维属性，监管机构在创建身份和认证的新标准方面遇到困难也就不足为奇了。此外，随着交易复杂性随交易量增长而增加，监管机构有义务要求身份具有更高的粒度和准确性，尤其是在技术日益复杂化也让不良行为者得以利用薄弱身份系统的情况下。面对这些挑战，一些政府已开始推动创建新的数字身份系统（例如，爱沙尼亚的电子居民
  ³³）。然而，大多数努力都集中在监管层面，因此并未提供商业上可行的解决方案。


  由于身份是一个范围广泛的课题，为了创建一个普遍存在的身份系统，一定程度的劳动分工是必要的。因此，政府和私营机构需要共同定义数字身份的概念。考虑到技术解决方案提供商和技术公司的格局，可以说金融机构处于推动创建数字身份系统的最佳位置。金融机构存储客户数据用于自身的商业目的，因此能够在不付出大量增量努力的情况下开发身份工具包。然而，它们仍然需要政府的参与，只有通过共生协作，并始终以公民/用户为中心，才能取得进展。表
  2-2 和 2-3 分别详细说明了私营和公共行为者在数字身份化方面取得的一些进展。


