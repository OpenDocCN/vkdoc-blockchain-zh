- "# 康德拉季耶夫周期与经济周期\n\n在经济学中，康德拉季耶夫周期（以苏联经济学家尼古拉·康德拉季耶夫命名）是一种周期性现象，它将技术发明、扩张和最终替代的周期与其经济效应联系起来。尽管尼古拉·康德拉季耶夫于\
  \ 1925 年率先研究了技术对价格、工资、利率、工业生产及消费的经济影响，但约瑟夫·熊彼特才是将其引入学术界的关键人物。\n\n7\n\n本文中的模型由技术变革驱动，而技术变革源于追求利润最大化的经济主体所做的有意识投资决策。\n\
  \n8\n\n参见《一位失败哲学家的再次尝试》。\n\n9\n\n(i) 拉美主权债务危机 - 1982 年，(ii) 储蓄与贷款危机 - 1980 年代，(iii)\
  \ 股市崩盘 - 1987 年，(iv) 垃圾债券崩盘 - 1989 年，(v) 龙舌兰酒危机 - 1994 年，(vi) 亚洲金融危机 - 1997 至 1998\
  \ 年，(vii) 互联网泡沫 - 1999 至 2000 年，(viii) 全球金融危机 - 2007 至 2008 年。\n\n10\n\n**LHC**：大型强子对撞机是世界上最大、最强大的粒子加速器，位于欧洲核子研究组织（CERN，即\
  \ Conseil Européen pour la Recherche Nucléaire）。LHC 是一个 27 公里长的超导磁体环，可将质子等粒子加速至光速，然后使其碰撞，以研究质子内部的量子粒子。2012\
  \ 年 7 月 4 日，欧洲核子研究组织大型强子对撞机上的 ATLAS 和 CMS 实验发现了希格斯玻色子，这种基本粒子解释了粒子为何具有质量。这是本世纪最重要的一项科学发现，其意义至今犹在，未来亦然。\n\
  \n11\n\n早期将复杂理论经济学研究结合起来的先行者包括：肯尼斯·阿罗（经济学家）、菲利普·安德森（物理学家）、拉里·萨默斯（经济学家）、约翰·霍兰德（物理学家）、汤姆·萨金特（经济学家）、斯图尔特·考夫曼（物理学家）、大卫·派因斯（物理学家）、何塞·沙因克曼（经济学家）、威廉·布洛克（经济学家），当然还有\
  \ W·B·阿瑟（经济学家），他创造了“复杂经济学”这一术语，并且在其初步发展及向主流学术界推广中功不可没。\n\n12\n\n奈特不确定性是一个经济学术语，指代风险。它指出风险是不可衡量且无法计算的。“不确定性必须被理解为一种与通常的风险概念截然不同的含义，而这两者从未被恰当地区分开来，”芝加哥大学经济学家弗兰克·奈特如是说。\n\
  \n13\n\n欧洲中央银行（ECB）开发了一个名为斯梅茨-沃特斯模型的 DSGE 模型，用于分析整个欧元区的经济。（参见：斯梅茨和沃特斯，《欧元区动态随机一般均衡模型估计》，《欧洲经济协会杂志》，第\
  \ 1 卷，第 5 期，2003 年 9 月，第 1123-1175 页）。\n\n14\n\n这些限制包括：预算约束、劳动力需求约束、工资约束（关于工资调整频率的卡尔沃约束）、资本约束等（Slanicay,\
  \ 2014）。\n\n15\n\n泰勒规则是一套指导中央银行如何根据经济状况变化调整利率的准则。该规则由经济学家约翰·泰勒提出，旨在调整并设定审慎的利率，以实现经济的短期稳定，同时维持长期增长。该规则基于三个因素：(i)\
  \ 目标通胀水平与实际通胀水平；(ii) 充分就业水平与实际就业水平；(iii) 与充分就业相适应的短期利率水平（Investopedia）。其数学表达式为：`r\
  \ = p + 0.5y + 0.5(p - 2) + 2`，其中`r`代表联邦基金利率，`p`代表通货膨胀率，`y`代表实际 GDP 偏离目标的百分比（Bernanke,\
  \ 2015）。\n\n16\n\n契约理论最初由肯尼斯·阿罗（1972 年诺贝尔经济学奖得主）、奥利弗·哈特和本特·R·霍尔姆斯特伦于 20 世纪 60 年代末创立。后两人共同获得了\
  \ 2016 年诺贝尔经济学奖。\n\n17\n\n[`https://www.federalreserve.gov/econresdata/frbus/us-models-about.htm`](https://www.federalreserve.gov/econresdata/frbus/us-models-about.htm)\n\
  \n18\n\n根据特纳的说法，货币融资被定义为一种财政赤字，其资金来源并非发行带息债务，而是通过增加货币基础——即政府/中央银行不可赎回的、不付息的法定货币负债。例如：直升机撒钱。\n\
  \n19\n\n丹尼尔·卡尼曼以其在判断与决策心理学以及行为经济学方面的研究而闻名，并因此获得了 2002 年诺贝尔经济学纪念奖。\n\n20\n\n一个典型例子是，美国在提升经济理论理解方面的投资非常少——每年来自国家科学基金的资助约为\
  \ 5000 万美元——这仅占 10 万亿美元危机规模的 0.0005%（Axtell and Farmer, 2015）。\n\n21\n\n泰特（1831-1901）是一位苏格兰数学物理学家，以其在纽结理论、拓扑学、图论以及泰特猜想方面的研究而闻名。\n\
  \n22\n\n威廉·斯坦利·杰文斯、莱昂·瓦尔拉斯和卡尔·门格尔在完全独立互不干扰的情况下，同时建立并推动了边际革命。每位学者都发展出了边际效用理论，用以理解和解释消费者行为。\n\
  \n23\n\nMONIAC（Monetary National Income Analogue Computer，货币国民收入模拟计算机）是一种液压模拟器，利用有色水流来显示现金流动情况。\n\
  \n24\n\n伊达尔戈是一位统计物理学家、作家，也是麻省理工学院媒体艺术与科学学院的副教授。他还是麻省理工学院媒体实验室“宏观连接”小组的主任，以及“经济复杂性观察站”——`http://atlas.media.mit.edu/en/`的创建者之一。\n\
  \n25\n\n经济物理学是一个跨学科研究领域，它应用最初由物理学家发展的理论和方法来解决经济学问题。参见表 2 以了解经济物理学教科书的来源。\n\n26\n\
  \n**第一福利定理**：每一个瓦尔拉斯均衡配置都是帕累托有效的。  \n**第二福利定理**：每一个帕累托有效的配置都可以被支持为一种瓦尔拉斯均衡。\n\n\
  第一和第二福利定理是福利经济学的基本定理。第一定理指出，任何竞争性均衡，或瓦尔拉斯均衡，都会导致资源的帕累托有效配置。第二定理则阐述了其逆命题，即任何有效的配置都可以通过竞争性均衡来维持。\n\
  \n27\n\n\n\n艾伦·基尔曼（Alan Kirman）是艾克斯-马赛第三大学（University of Aix-Marseille III）和法国社会科学高等研究院（Ecole\
  \ des Hautes Etudes en Sciences Sociales）的经济学荣誉教授。他是一位非正统经济学家，发表过大量关于复杂性经济学、博弈论和非线性动力学等学科的论文和著作。他的最新著作《复杂性与演化：迈向经济学新综合》（Complexity\
  \ and Evolution: Toward a New Synthesis for Economics）于 2016 年 8 月出版。\n\n28\n\n\
  其他一些已知的编程语言和工具有`Repast`和`SimSesam`。这两个平台比`Netlogo`更先进，但需要具备一些`Java`编程经验。`Netlogo`是`Logo`语言的方言，是一个通用框架。`Repast`和`SimSeam`能够更轻松地集成外部库，并提供更高级别的统计分析、数据可视化和地理信息系统功能。\n\
  \n29\n\n多因·法默（Doyne Farmer）教授是牛津马丁学院（Oxford Martin School）的数学教授。他同时担任新经济思维研究所（Institute\
  \ for New Economic Thinking）复杂性经济学联合主任，以及圣塔菲研究所（Santa Fe Institute）的外部教授。他目前的研究重点是复杂性经济学，主要关注金融市场的系统性风险和技术进步。在其职业生涯中，他对复杂系统（参见附录\
  \ 1）、混沌理论、人工生命、理论生物学、时间序列预测和经济物理学做出了重要贡献。他还是一位企业家，共同创立了 Prediction Company，这是最早从事全自动量化交易的公司之一。\n\
  \n30\n\n杰基·马利特（Jacky Mallett）拥有麻省理工学院（MIT）计算机科学博士学位。她是雷克雅未克大学（Reykjavik University）的研究科学家，从事高性能分布式计算系统的设计与分析，以及经济系统模拟的研究，重点关注巴塞尔银行监管框架及其宏观经济影响。她还是“Threadneedle”的创造者，这是一个用于模拟部分准备金银行系统的实验工具。\n\
  \n31\n\n固定比例投资组合保险（CPPI）——这是一种投资组合保险方法，投资者为其投资组合的价值设定一个下限，然后围绕这一决策构建资产配置。这两类资产被归类为风险资产（通常是股票或共同基金）和无风险资产（现金或国债）。分配给每类资产的比例取决于投资策略的激进程度。\n\
