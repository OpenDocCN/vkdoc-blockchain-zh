  ### 可扩展性


  尽管像 `SWIFT`、`ACH` 和 `Earthport` 这样的网络能够传输大量交易，但目前并非所有区块链网络都能做到这一点。像 `Bitcoin` 区块链这样的开放网络每秒只能确认
  3.3 到 7 笔交易。另一方面，`Visa` 信用卡网络能够在数秒内确认一笔交易，平均每秒处理 2,000 笔交易，峰值速率可达 56,000 笔交易（Croman
  等人，2016）。因此，区块链的大规模部署要求该技术具有远超当前支持 `Bitcoin` 的极限的可扩展性。


  目前，众多参与者正在探索多种技术解决方案。其中一种探索方法是对区块链进行分片，用许多独立的区块链取代单一区块链，并通过跨链矿工以半可信的方式实现互操作（James-Lubin，2015）。另一种正在探索的可能性涉及高级密码学技术，称为“零知识证明”。这些证明允许在不实际运行计算的情况下快速验证交易。然而，这些技术仍处于探索阶段，尚未见到具体的大规模部署。


  像 `Ripple` 设计的私有区块链，其构建目的是更高效、更具可扩展性，以处理高交易量。`Ethereum` 和 `Ripple` 都比 `bitcoin`
  区块链能更快地验证交易。然而，由于 `Ripple` 的交易验证者是私有企业，它们拥有各种限制的常规 IT 系统。`Ripple` 开发出的 `InterLedger
  Protocol`（`ILP`）是对此局限性一种有趣的变通方案。`ILP` 本身并非账本，因为它不寻求对任何状态达成共识。相反，它提供了一个顶层密码学托管系统，允许资金在其称为“连接器”的中介帮助下在账本之间流动。正如
  `Ripple` 首席技术官 Stefan Thomas 所言：“只要你的账本支持 [`Interledger`]，你就可以参与支付，并且会有人能够提供流动性。它可以是
  `PayPal`、`Alipay`、`bitcoin`、银行账本或 `Skype`，任何人们持有余额的地方，就拥有了一个账本”（Rizzo，2015）


