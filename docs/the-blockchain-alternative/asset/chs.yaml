- '# 审视碎片化的新视角


  难道不好奇吗？关于“大而不倒”的讨论，解决方案竟然高度集中在监管领域。为什么在谈论如此复杂的社会性机构时，我们不去运用进化生物学或社会学中关于群体行为的研究成果和经验教训？难道不应该审慎地借鉴过去关于复杂系统决策制定的教训，然后在我们不断变化的金融生态系统中寻找相同条件正在形成的迹象吗？金融领域真的与其他人类内在的生态系统如此不同吗？


  这种以监管为中心解决“大而不倒”问题的方式，本质上当然是政治性的。但它也是过去几个世纪银行业结构集中化的结果。从 17 世纪起步阶段开始，银行体系就围绕着中央银行及其周边的二级银行构建。因此，银行业框架已发展成一种强大、层级分明的制度化结构，而这些宏伟建筑的建设也促使各国政府创建了复杂且受监管的银行体系。这种结构的讽刺之处在于，虽然银行对民主制度的发展作出了根本性贡献，但它们本身却最不体现民主这一特质，而且银行被赋予的日益增长的自主权已导致其变得愈加不平等（Ansart
  & Monvoisin, 2015），只有少数银行被视为“大而不倒”。因此，任何关于碎片化的讨论都带着令人不安的废除主义色彩。


  但鉴于当前的低效状况，或许真正需要的是一种非监管性质的、终结“大而不倒”的新视角。随着政策制定者的工具箱不断受到考验，一些近期研究表明，主流金融界已开始承认存在一个超越方程和监管的世界，并正在向行为金融学迈进（Davison,
  2015）。英格兰银行首席经济学家安迪·哈德恩最近的评论支持了这一观点：“实话实说，经济学和金融学中的主流模型，上帝保佑它，确实带有一些过于简化的假设，其中一些意味着它往往无法很好地应对压力情境”（Nordrum,
  2016）。


  哈德恩是在 2016 年 2 月发表此番言论的，就在一篇发表在主要科学期刊《科学》上的文章（他是合著者之一）发表后不久。在承认当前经济模型的不足后，这些金融学、社会学和物理学领域的专家作者指出，传统经济理论无法解释，更不用说预测金融体系的几近崩溃了。复杂性经济学和经济物理学（将在最后一章详细分析）的主题，为监管者提供了大量见解。虽然诸如临界点、网络、传染、反馈和韧性等术语和概念已进入金融和监管的词汇库（Battiston
  et al., 2016），但在考虑如何从经济或监管角度构建一个更好的模型时，这些学科的成果并未被利用。


  例如，在谈到临界点时，该文章的作者指出：“对从气候到生态系统等复杂系统的分析表明，在重大转变之前，往往存在一个渐进且未被察觉的韧性丧失过程。这使得系统变得脆弱：一个微小的扰动就可能引发多米诺骨牌效应，在整个系统中传播，并将其推向危机状态……标志包括网络节点间相关性上升，以及时间相关性、方差和波动模式的偏度增加。这些指标首先在数学上被预测，随后在包括生命系统在内的真实复杂系统中通过实验得到证实。


  一项对荷兰银行间网络的最新研究表明，使用同质网络模型进行标准分析，只能导致对 2008 年危机的延迟发现，而一个更现实、异质的网络模型却能在危机爆发前 3 年识别出预警信号。生态学家已经开发出量化食物网稳定性、稳健性和韧性的工具，并展示了这些特性如何依赖于网络的拓扑结构和相互作用的强度。流行病学家拥有衡量事件在相互作用的实体系统中传播潜力的工具，以识别与感染持续存在相关的超级传播者和核心群体，并设计预防或限制传染传播的策略。”


  通过这个对自然生态系统和网络运作的类比介绍，该文章进一步深入细节，展示了当前系统重要性银行的网络拓扑结构以及与银行间互联性相关的系统性风险，如何可能导致全球金融网络的崩溃，即使单个银行看起来似乎安全。


  这是因为，首先，银行网络由许多业务和风险模型相对相似、且违约倾向高度相关的银行组成。银行意识到，在困境中，它们会得到美国政府和欧洲各国政府的承保和可能支持（Freeman,
  2011）。因此，它们倾向于按照类似的路线构建自己，这导致了一种羊群效应，减少了行为的多样性，尤其是在处理风险时。


  其次，银行网络内部存在信息不对称，因为银行之间不共享信息。因此，诸如前述的压力测试和“生前遗嘱”等旨在重建网络和评估系统性风险的工具，都是利用部分公开可得信息来完成的。如果银行能公开报告更多数据，并告知我们它们与其他银行的联系，这些测试将得到极大改善。但今天的情况并非如此。正如对冲基金经理保罗·辛格所言：“金融机构财务报表的不透明性根本没有得到解决或改变……你所能依赖的只有谣言和感觉。你不知道[花旗集团]、摩根大通、美国银行等任何一家银行的财务状况……我们这里有一个非常庞大的分析研究团队，但我们没有发现任何人能够解析大银行对利率、资产价格等变化的敏感性。你做不到这一点”（Freeman,
  2011）。


  与这些局限性相伴的是单个节点造成的脆弱性。那篇关于复杂性的文章进一步指出：“单个节点失败的系统性影响……表明‘太过中心而不能倒’的问题可能比‘太大而不能倒’更为重要”（Battiston
  et al., 2016）。




  因此，尽管卡什卡里和其他推动终结“大而不倒”的人士在构想情境方面是正确的，但需要做的是从更跨学科的视角来思考“终结大而不倒”这一概念。运用前述文章中引用的科学方法，不仅能让监管者模拟更多情境，也有助于回应那些以规模经济优势为由为现行金融体系结构辩护的批评者所提出的质疑。


  因此，“拆分”这一概念本身就值得深入探讨，因为如果要让拆分银行合法化，就必须确定在一个相互关联的经济体中，规模更大还是更小的群体运作得更好。如果缺乏这种理解，我们就毫无逻辑依据来合理化拆分一个作为社会性组织机构的实体，更不用说确定拆分的最优阈值了。


  为了找到关于拆分最优阈值的答案，我们首先将注意力转向银行网络的核心与精髓。当剥离到本质时，该网络本质上是一大群个体，他们相互协作以实现个人利益最大化和风险最小化。从这个角度看，问题就变成了：群体行为（例如集体行动或决策）是如何基于经验进行的，以及这些行为如何在一个不断演化的系统中出现并持续存在。


  幸运的是，演化生物学领域的研究为我们提供了这些问题的答案。在最近一篇发表于《自然》期刊、题为《小群体与长期记忆促进合作》的论文中，研究人员表明，只要存在社会互动，生物体就会根据其社会环境及过往经验表现出不同的行为。通过构建一个研究多个参与者交换“公共物品”的演化框架，研究人员证明，当群体规模较小时，更长的记忆策略能使合作更容易演化，因为这些策略增加了合作得以稳定的方式数量，直至达到最优稳定点。通过探索行为与记忆的共同演化，他们发现，即使记忆有成本，更长的记忆策略也常常会演化出来，这反过来又推动了合作的演化，即使合作的收益很低（Stewart
  & Plotkin, 2016）。


  引用这些明显来自不同学科领域的研究成果，原因在于它们为我们思考拆分问题时提供了解决问题的途径。此外，这些来自《科学》和《自然》期刊的研究发现与具体的行业或技术无关。例如，正如我们在专栏
  2-1 中看到的，美国电信行业经历了一系列变革，改变了该行业对自身的定义。所有这些变革都涉及新参与者进入、老参与者重新定义商业模式、引入新技术以及消除垄断。在过去
  30 年里，随着竞争和开放程度的提高，该行业不仅涌现了大量新进入者，而且在所提供的服务方面，甚至无法与过去相提并论。从拨号上网的时代开始，该行业已发展到提供免费加密短信（WhatsApp）和免费通话（Skype）。这种变化不仅创造了指标饱和、超高效的商业模式，也导致了社会心态的转变。让一个青少年交出智能手机一天，看看他们是否会表现出恐慌发作的症状。


  因此，拆分似乎是当前经济困境的一剂解药。有人可能会争辩说，根据某些学者、商业巨头和政策制定者的观点，拆分银行能否拯救我们并不确定。但就像技术以技术为养分创造新技术一样，引入一个陌生的概念必然会引发质疑。因此，有必要认识并承认，一些读者可能会觉得这种将其他学科的研究成果混为一谈的做法缺乏依据，且与当前主题相去甚远。但这正是本书的要点所在。鉴于监管阻挠的无效与无能，我们需要一种新的视角来看待拆分“大而不倒”机构的问题。


  如果这本身还不足以成为支持拆分论点的理由，那么还有最后一个原因值得考虑：随着技术的进步以及对创业倡议的支持日益增加，金融业的分拆已经正在进行中。你可能听说过这种拆分有更温和的说法……在当今流行文化中，它被称为`金融科技`或`区块链`。




