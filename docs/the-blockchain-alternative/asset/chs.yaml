- '# 市场状况对债务发行的影响


  市场状况对债务发行的效应因此成为一个关键问题，而英格兰银行经济学家团队的最新研究发现，资本比率与贷款环境之间存在一种有趣的周期性关系。在一篇题为《顺境与逆境：银行资本比率与贷款利率》的论文中，奥斯本、米尔恩和富尔特斯发现，在经济景气时，较高的银行资本与更昂贵的信贷相关联，而在经济不景气时则恰恰相反。他们认为，其原因与银行在繁荣与萧条时期风险偏好的变化有关。尽管英格兰银行的研究并未表明资本比率对贷款利率存在因果关系，但若存在这种关系，就会引发人们对负债累累企业脆弱性的思考。


  受此影响的不仅仅是企业。如边栏 1-1 及本节前文所述，过去几十年里，家庭部门的杠杆率也在不断提高。因此，市场变化也影响着他们如何运用债务来创造繁荣的决策。当经济环境在
  20 世纪 70 年代发生变化时，为了对冲未来任何形式的经济动荡，家庭和企业越来越多地转向房地产领域，因为对大多数消费者而言，土地或房屋净值曾经是（并且仍然是）他们唯一的财富来源。随着消费者将投资转向住房领域，银行的主要业务也从向企业发展贷款转向了抵押贷款。事实上，金融部门为商业领域投资提供贷款这一标准角色，仅构成了银行业务的一小部分（Jorda
  et al., 2016）。


  债务与房地产业之间的这种关系尤为重要，因为当我们分析任何发达国家或发展中国家时，总会发现一个模式：经济灾难发生之前，家庭债务往往会出现大幅增长（Sufi & Mian,
  2016）。这种现象的出现源于借款人与储蓄者之间潜在的不平等。大多数储蓄者拥有金融资产，抵押贷款债务很少；而大多数借款人净资产较低，这正是他们需要借款投资住房的原因。因此，绝大多数用于购买房地产的贷款都高度偏向于收购现有资产，而非资助新建商业或住宅房地产（Dorling,
  2014）。于是，银行和资本市场体系向借款人提供资本，让他们相互竞争现有资产的所有权，这使得区位变得至关重要，因为土地和地理位置是不可移动的实体。


  在经济景气时，信贷需求旺盛（从而推高信贷价格），许多家庭购买杠杆资产。随着对同一地块的竞争加剧，土地价格以及获取土地所需的信贷也随之上升。但对这些资产的所有权主张归属于那些提供存款从而促成贷款的储蓄者。如果市场信心消散（正如次贷危机爆发前那样），随着借款人试图去杠杆，房价便会下跌。随着这种效应愈演愈烈，损失会更集中地落在那些最初财务状况就最糟糕的借款人身上（这也就是他们需要借贷的原因），因为他们的流动资产价值开始下降。近
  60%（截至 2014 年）的贷款被用于房地产投资（Jordà et al., 2015），这一事实因此加剧了上述效应，并加速了萧条的形成。过去和现在的此类事件遗迹，可见于爱尔兰、日本、西班牙部分地区以及近年来中国的“鬼城”现象。¹³
  因此，一个依赖信贷消费且将大量投资引向房地产业的体系，会产生过度投资周期，将风险集中于债务人，并与财富不平等紧密相连。


  由过度信贷发行所滋生的房地产过度投资周期，因此造成了实际资源的错配。但当信贷供给被切断（如萧条或危机之后），问题会变得更加严重。这会导致债务积压效应。债务积压是指债务负担过于沉重，以至于家庭或实体无法承担额外债务来为未来项目融资，即使这些项目未来能够产生足够利润以逐步减少其债务（Campbell
  et al., 2010）。苏菲和米安在他们的著作《债务屋》中描述了这种效应，丹尼·多林在其著作《一切坚固的东西》中亦有阐述。这些研究者指出，在经济景气时，房价上涨，诱使债务人借贷购买这些价值不断攀升的资产。然而，当市场转向时，杠杆率越高，跌幅就越大，因为随着资产价格下跌，债务人的净资产也会缩水。如果一个家庭办理了
  90%的贷款价值比抵押贷款，那么房价下跌 5%就会使其房屋净值减少 50%（Turner, 2015）。结果，债务人发现自己陷入了一种困境：所欠债务变得越来越难以偿还。他们既无法按购买价格出售资产，也无法获得另一条信贷额度（因为债权人此时也变得谨慎），因此其债务水平保持不变，而工资也毫无起色。如果房地产泡沫破裂还导致借款人失业，情况会进一步恶化，因为此时没有任何收入来源来管理债务。这一系列事件，或其他类似情况，是危机后经济复苏缓慢的原因之一（Jorda
  et al., 2016）。


  虽然危机可能造成巨大危害，但过度发行债务所导致的债务积压可能产生更持久的影响。随着房价下跌，那些高杠杆的家庭和企业试图通过削减支出和投资来降低债务水平。与此同时，信贷需求的缺乏导致债权人也削减其支出。这两种变化的累积效应导致投资停滞、失业率上升以及商品和服务需求减少。过去，为了克服这些影响并刺激支出，货币政策旨在降低利率，并采用非传统工具，如量化宽松，以增加信贷供给。虽然量化宽松及其他近期使用工具的效果将在本书后续部分讨论，但需要考虑的关键点是，此类措施的作用是有限的，因为已经过度杠杆化的借款人并不希望增加更多债务。因此，信贷可用性的需求方成为了更紧迫的问题（Koo,
  2014），因为即使以低价提供信贷，债务积压效应也会降低对信贷的需求。


  当企业削减投资、家庭减少支出时，政府赤字会因税收减少和失业人员社会支出增加而扩大。结果，私人部门发行的债务日益导致公共债务上升。正如舞者在维也纳华尔兹中优雅旋转一样，金融市场与主权经济体之间的相互联系会进一步加剧债务积压效应，并使其蔓延至该经济体的其他部门以及其他经济体。




