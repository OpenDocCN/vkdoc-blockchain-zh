  \ 5%的速度增长也就不足为奇了。然而，尽管利润丰厚，但由于支付涉及的各项费用，小额支付并不可行。据`Ripple`首席技术官斯蒂芬·托马斯称，2%的电汇会失败，结算需要超过两天时间，每年累计成本高达\
  \ 1.6 万亿美元。\n\n高额转账费用的原因在于交易涉及参与方数量众多，以及每个参与方必须遵守的监管合规要求。目前进行转账时，除了发送方和接收方的银行外，资金流还涉及非银行公司（如`Western\
  \ Union`）、处理外汇的代理银行、清算网络（如`SWIFT`和`ACH`[²¹]），以及监控 KYC 和 AML 标准的央行和金融监管机构。由于涉及众多独立参与方，发送方的信息需要由每个参与方验证，这导致重复的业务流程、累积的成本、延迟、错误和多项操作。\n\
  \n\n\n然而，正如我们在侧边栏 2-2 和 2-3 中所看到的，该系统目前正处于不断变化之中。像`M-Pesa`这样的公司正在允许无银行账户者在不依赖传统金融机构的情况下发送和接收付款，而像`Transferwise`这样的公司正在减少跨境交易中涉及的`FOREX`风险。如果将区块链引入此价值交换过程，将进一步简化整个交易流程。发送方和接收方仍然需要经过`KYC`（了解你的客户）流程才能拥有数字钱包和身份，但一旦验证通过，就无需在每一步重复验证过程。可以生成一个智能合约来规定交易对手之间的转账条件，货币兑换可以通过愿意促进兑换的流动性提供者或采用类似于`Transferwise`的方法来完成。随着智能合约的执行，交易将实时发生，整个历史记录可由区块链上的监管机构进行验证。这将实现合规自动化、确保信任、将结算时间减少数个数量级，并降低最终用户的成本。这一过程中唯一的输家将是当前扮演中间运营商角色的中介机构。\n\
  \n贷款机构也面临着来自侧边栏 2-2 和 2-3 中所述技术融合所带来的变化。当商业实体需要贷款来发展业务时，它们会面临与进行转账时类似的程序和障碍。贷款方首先需要进行大量手动执行的尽职调查流程，以确定该业务是否稳健、财务是否健康。这涉及分析大量数据源，既耗时又容易出错。由于承销流程通常不与尽职调查流程整合，且常常需要依赖第三方供应商，这导致了重复劳动、增加了投资者的额外成本，并因整个运营的孤立结构而造成了信息不对称。\n\
  \n然而，像`Kabbage`这样的公司向我们表明，通过使用大数据分析，这些步骤可以实现自动化。基于公司的数字足迹，贷款机构可以使用高级分析来执行其尽职调查，从而以更高的透明度、更少的人工干预和更快的速度，更好地了解所涉及的风险。除了根据可接受的风险水平更好地匹配交易对手之外，使用智能合约可以根据可编程的选择条件进一步定制合作标准，从而缩短获得贷款的时间。大数据还允许分析财务信息的其他属性，使投资者能够更全面地了解公司的特质。利用智能合约，这种自动化的尽职调查随后可用于自动化承销流程，从而缩短执行时间并减少当前雇用的辅助中介数量，进而降低运营风险和信息不对称。\n\
  \n`P2P`借贷领域已经在朝着这个方向迈进，以连接储蓄者和贷款人。像`MoneyCircles`这样的公司将储蓄者与其社交圈中的借款人联系起来。贷款人可以基于他们的`Gmail`、`Facebook`、`Twitter`或`LinkedIn`网络创建或加入圈子，并根据自己的标准借出资金。条件被嵌入到一个智能合约中，交易通过区块链进行。该智能合约还确保了贷款期限内本金和利息的支付。由于交易在贷款周期内实时发生，监管机构可以实时查看财务细节，从而简化了`KYC`/`AML`（反洗钱）程序。目前，`MoneyCircles`受英国审慎监管局和金融行为监管局的监管。\n\
  \n虽然机器学习和机器人顾问正在改变投资格局，但合规、审计和监管成本仍在飙升（Noonan, 2015）。正是在这个领域，银行、税务机构和监管机构最有可能通过采用区块链获益，因为这项技术有潜力为它们提供一种强有力的执法工具。目前，监管机构和审计师被要求获得年度财务报表和系统访问权限，以进行风险评估和压力测试。如果出现任何差异，就会启动一个流程来确定问题的规模。根据审计报告，该机构随后向投资者发布其季度/年度报告。这个过程耗费大量资源和时间，因为它会影响公司的日常运营。由于`IT`系统缺乏互操作性，审计过程需要大量人工操作，且容易出错。\n\
  \n然而，利用区块链，该流程可以在多个平台上得到简化。由于审计师和监管机构获得了授权访问权限，机构员工和领导层无需深入参与审计过程。使用来自区块链的数据，机构的审计可以通过智能合约在预定时间向审计师的报告工具提供信息，从而实现实时审计。这可以加快评估速度、实现精确的税收确定、更快速地发现差异以及更轻松地执行新法规。随着像`FundApps`这样的初创公司以机器可读语言提供监管信息，下一步将是允许智能合约将法规变更作为输入，并根据这些变更调整投资和报告程序。这将减少新法规执行中的时间延迟，提供更高的财务记录透明度，并使主权监管机构能够进行自动化的资本分析。同时，这也将使投资者能够做出更明智的决策。丹·塔普斯科特（Dan\
  \ Tapscott）著作的第 3 章（参见注释了解参考文献）详细阐述了审计公司将如何受到区块链的影响。\n\n\n\n"
- "# 区块链在金融市场中的应用\n\n## 资产再抵押与透明度\n\n区块链在投资市场最重要的应用之一将是在资产再抵押领域。金融机构经常参与这种做法，即客户作为抵押品存入的资产被金融机构用于自身目的，例如获取贷款。允许再抵押的客户可能会通过降低借款成本或费用返还来获得补偿。然而，这个过程需要有一定的限制，因为过度的再抵押会形成抵押链，错误分配资产，并给抵押品带来额外风险。资产所有权的模糊性以及交易对手风险的膨胀，因此需要一种能够追踪资产交易历史的机制。然而，当今的系统无法提供这种程度的洞察力，因为二级交易市场不需要详细说明资产的交易历史。由于这种透明度的缺乏，监管机构无法追踪证券，投资者也无法确定资产的真实价值，因为每次再抵押都会利用抵押品的一定比例。如果发生违约，这种雪球效应会破坏整个交易链，并可能对其他领域产生溢出效应。这在金融危机期间表现得尤为突出。\n\
  \n区块链对实物资产进行代币化的能力因此成为投资者和监管机构的宝贵工具。当资产被代币化后，其交易历史现在可以在区块链上追踪，并通过智能合约在其开始被再抵押时列举其价值和所有权。可以根据资产在被再抵押一定次数后的价值百分比来设定和编码监管限制，当达到限制时，智能合约将限制进一步的再抵押。这为投资者和监管机构提供了资产真实价值以及投资公司是否违反任何规定的透明视图。总之，它提供了对衍生品市场更清晰的看法。\n\
  \n## 高频交易与结算效率\n\n在人工智能主导的高频交易世界中，通用算法可能允许开发自动化学习策略并在纳秒内执行交易。然而，交易后的流程非常耗时，需要长达`T+3`天才能结算。由于交易在一天结束时批量执行，并且涉及托管银行、清算所和证券存管机构等中介机构，买卖双方之间的交易效率受到了不利影响。这种时间延迟影响了投资者在此期间可采取的行动。\n\
  \n区块链非常适合彻底改革这一流程，因为证券交易是为分类账量身定制的。交易对手可以使用智能合约来“预定”交易，然后流动性以及代币化资产（债券/股权）可以被转移到区块链上。一旦满足执行智能合约的条件，智能合约就会执行，资产与资金的交换就可以在区块链上进行。然后，实时交易通知可以发送给交易对手的银行和托管人，这将允许更快的结算时间、降低运营复杂性、消除中介机构并提高清算流程的效率。\n\
  \n## 保险行业的变革\n\n不起眼但规模巨大的保险行业是区块链能够产生重大影响的另一个金融领域。如边栏 2-2 所述，欺诈性索赔在保险行业构成了重大风险。虽然新的`P2P`保险模式由于群体内的声誉效应开始解决这个问题，但区块链也有助于将同样的做法推广到保险的其他分支。目前，虚假索赔与与索赔相关的多重真相版本有关。当被保险人报告索赔时，他们通常需要与确认索赔有效性的经纪人互动。随后，保险公司进行第二次评估，核实经纪人和其他来源的相关文件。这种多步骤流程对客户不友好，并且基于“一刀切”的套餐。中介机构成本高昂，并且来自第三方数据提供商的手动数据验证增加了欺诈风险、处理索赔所需的时间和资源。\n\
  \n借助区块链和物联网，这个过程可以大大简化。传感器（用于人寿或财产保险）可以根据预定义条件提交数据以触发索赔。使用数据分析和智能合约，尽职调查和分析过程可以自动化、编码化并执行。当需要验证其他数据源（例如天气状况）时，这也可以被包含并自动化。如果满足所有条件，则可以通过智能合约进行支付。\n\
  \n## 总体影响与挑战\n\n总而言之，在各种金融服务中，区块链和金融科技的使用可以带来简化的操作流程、更少的风险、更低的流动性要求、更少的中介机构、更高的透明度、更好的监管监督以及更容易的多方利益相关者达成一致。\n\
  \n尽管有这种潜力，但区块链的大规模部署由于两个主要原因而受阻。首先，由于传统的宏观经济分析方法基于不考虑金融系统行为的方法论，宏观经济学家越来越难以使用现有的方法论和理论来衡量这些变化的后果。正是出于这个原因，我们必须依靠其他学科（如进化生物学和复杂性科学）的知识来理解这些变化的未来影响，尽管它们与主题背景相对分离，但它们更适合这项任务。这就是为什么关于复杂系统中微观群体行为的发现如此重要；因为随着投资和参与者的涌入，我们需要一种新的方法论流程，帮助我们以认知上能够吸收的速度适应这种变化。没有对提供这种能力的新理论的坚定理解，我们就无法在这种泡沫般的水域中航行。\n\
  \n其次，区块链的大规模部署还需要向更数字化的系统进行转换。正如我们所看到的，当前的流程本质上大多是手动的，并且仍然涉及物理文档和人对人互动。要使区块链在社会层面有效，它需要克服这些物理障碍，即：\n\
  \n1. 数字身份和`KYC`  \n2. 可扩展性\n\n这两个主题将在本章的最后部分进行相对详细的讨论。\n\n\n\n"
- '# 敌人的敌人就是朋友


  > “善借恶彰显其德，正如静默的停顿让吟诵更添甜美。”——圣托马斯·阿奎那


  随着金融领域的分化持续进行，市场份额不断被分割，传统金融机构与初创公司发现自己成为了同一场竞赛中的对手。根据普华永道近期的一份报告，到 2020 年，超过 20%的金融服务业务将面临金融科技公司的威胁。该研究还估计，到
  2020 年，28%的银行与支付业务，以及 22%的保险、财富管理和资产管理业务将归属于金融科技公司（普华永道，2016 年）。据 Autonomous Research
  的数据，2015 年在线贷款机构在美国发放了 220 亿美元的个人和企业贷款。虽然这仅占此类贷款总额的 6%，但这家金融研究公司估计，该领域在 2016 年将增长
  75%。高盛的分析师预测，未来五年，银行将在学生贷款、消费贷款和抵押贷款业务上完全输给在线贷款机构（Crosman，2016 年）。


  虽然 57%的传统金融机构不确定或不太可能对区块链技术做出回应（普华永道，2016 年），但其余机构正出于显而易见的原因，大胆采取行动来引入这项技术。高盛的研究估计，仅在美国，区块链就能将保险承销的交易成本降低
  20 亿至 40 亿美元。通过应用区块链来简化现金证券（股票、回购和杠杆贷款）的清算和结算流程，他们估计该行业能在全球范围内节省 110 亿至 120 亿美元的费用、运营支出和资本支出（Schneider
  等人，2016 年）。由于区块链还提供了一种防篡改的记录存储方式，它可以简化了解客户所需的流程，并减少“可疑”交易的数量，从而为 KYC（了解你的客户）和 AML（反洗钱）合规节省
  30 亿至 50 亿美元的成本（Schneider 等人，2016 年）。


  随着 P2P 平台开始将消费者的角色转变为产消者，不依赖于中心化权威机构的商业模式正稳步增长。由于区块链适应这种环境且具有数字原生性，其以各种形式被持续使用的情况必将增加。虽然目前区块链中比特币的总价值约为
  200 亿美元，但以太坊和瑞波币日益增长的受欢迎程度和使用率正在改变局面，世界经济论坛估计，到 2027 年，全球高达 10%的 GDP 将存储在区块链上（世界经济论坛，2015
  年）。一些怀疑论者仍固执地认为，由于监管和运营方面的限制，这项技术将停留在金融领域的边缘，仅作为一种加密货币存在。但证据表明其潜力远不止于此。它是一种协议、一种商品、一个自动化系统、一个安全交易所、一个总账本，以及一个正在创造反文化运动的社区。


  与此同时，传统金融机构和初创公司也面临着不同的挑战。虽然银行在创新方面投入更多（例如，美国银行每年有 30 亿美元的创新预算），但它们仍需找到方法，将创新战略推广到整个组织，同时保住市场份额。为此，银行已开始相互合作，开发具有相同标准的新平台，以更新其遗留基础设施；R3
  联盟的主要目标之一就是解决全球跨境区块链使用的标准问题。另一方面，初创公司则试图在面临更严格的监管、更高的成本和更庞大的基础设施（这将使变更和管理变得更加困难）的同时，找到获取客户和扩大业务规模的方法。


  因此，正如进化生物学文章中所述，银行和金融科技初创公司现在正共同努力，寻找在保持竞争力的同时（重新）获取市场份额的方法。2015 年底，摩根大通与 OnDeck
  合作，开始为中小企业提供快速小额贷款。2016 年 5 月，瑞银集团与 SigFig 合作，为其富裕客户提供机器人咨询顾问服务（Yurcan，2016 年）。Kensho
  作为一家与多家银行有合作的独立技术公司运营，最初由高盛注资，并继续为其提供服务（Nadler，2016 年）。


  随着银行从传统性质不断向现代格局演变，合作伙伴关系和联盟将继续使该领域分化并发生质变。这不可避免地会伴随新的风险和挑战。障碍不仅在于法规方面，也在于政策方面。随着金融市场因技术而日益分化，它们也变得越来越无现金化。因此，未来针对去中心化和分化的未来所制定的政策需要适应这一特点。


  在一个无现金的世界里，当注册在线平台时，KYC 和 AML 合规措施将如何执行？需要制定什么样的法规来帮助金融科技公司继续发展，同时给予它们创新的空间？货币的发行将在分化的市场中受到何种影响？需要制定什么样的法规来阻止“大而不能倒”的现象，并且这些法规能否适应并理解新技术？例如：今天去试着对监管机构说：“该资产或产品的交易是有效且正当的，因为它是在一个加密安全、带时间戳且存在于混合许可/非许可型区块链上的分布式账本中完成的。”
  在使法规适应这种新环境方面，监管机构将需要喝上一杯烈酒来压压惊。


  但一个清醒的认识是显而易见的：今天我们生活在一个充斥着“大而不能倒”机构的金融泥潭中。随着技术不断与社会观念的变化相融合，新兴企业的出现正在分化金融领域，并呼吁学者、组织和监管机构开始通过新的视角来审视经济。这一呼声已被创新者听到，现在也正得到安迪·哈德恩、尼尔·卡什卡里和马克·卡尼等央行行长的响应。但如今主要的障碍似乎不在于技术，而在于为适应这一新环境，法规和政策需要如何构建。正如盖茨基金会前研究与创新主任杰克·肯德尔所说：


  > “……（就推广普惠金融服务而言），很多问题不是技术问题，而是监管问题或商业模式问题。”（微软研究大会，2016 年）


  因此，在回答“应该发行多少债务”以及“一家公司在构成系统性风险之前，允许其发展到多大”这些问题之前，我们需要了解，在展望未来无现金经济的同时，应该怎样制定管理这些机构的法规和政策。这将在下一章中探讨。




  ### 挑战与解决路径


  随着银行和金融机构开始从私人和公共领域评估区块链技术的适用性，身份验证与共享的方式被认为在具体情境中有所滞后。金融参与者及政府通常采用的“了解你的客户”（`KYC`）和反洗钱（`AML`）程序，似乎与分布式账本技术所提供的匿名及假名代表可能性存在矛盾。


  同样，可扩展性问题也是一个优先考虑的技术难题，目前业界正在探索多种方案，例如改进工作量证明/权益证明协议、联盟共识、侧链构建以及分片技术。考虑到当前对区块链的投资与关注，本书出版时很可能已有解决方案问世。Gavin
  Wood²⁴ 在 `Polkadot` 框架（参见《波卡：异构多链框架愿景》）及 `ByzCoi` 方面取得了最新进展。


  以下两节将讨论这些问题。


