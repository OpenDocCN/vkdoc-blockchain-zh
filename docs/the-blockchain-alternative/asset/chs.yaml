- '# 引言


  “渗透”是 2015 年的关键词。事实上，无论是在情感上还是经济上，这都是非同寻常的一年。当世界对巴黎及全球其他地区境内发生的一系列恐怖袭击做出骇人听闻的回应时，金融界目睹了其自身领域内一种新型的渗透。区块链，这一此前仅在金融界边缘被讨论的技术，突然之间成了投资者、风险投资人、银行家和政府官员们挂在嘴边的话题。


  从七年前一份不起眼的白皮书开始，这项技术如今已全面绽放，人们几乎随手拿起一份报纸或杂志，都能看到关于它的报道。随着疑问渐起，大量博客和业余纪录片开始在网上涌现，甚至
  BBC 也加入了行列。¹ 但如果 2014 年是比特币纪录片之年，那么 2015 年就是区块链会议之年。世界各地的演讲、圆桌讨论和研讨会层出不穷，银行家、政界人士、学者、投资者、程序员和技术专家纷纷发表主题演讲。随着
  2016 年的到来，这无疑是区块链书籍之年，仅今年一年就有超过 15 本相关书籍出版，而且数量还在增加。² 可以稳妥地说，这项技术正在成为主流，这对于像我这样多年来一直关注这个主题的人来说，是一种欣慰。


  那么，为什么还要写一本关于这个主题的书呢？这个问题的答案在于范围、规模和目标。尽管过去一年出版的大多数优秀著作都涉及了许多关键问题，但当前的讨论仍然无法让大多数人衡量这项技术影响的广度。以往及近期关于区块链的著作，大多从行业转型的角度审视该技术的应用。然而，针对该技术影响深远的洞见似乎仍显不足。


  要能确定未来的潜在影响，我们不仅需要理解区块链，还需要理解当前正在改变金融和经济学定义方式的其他技术及理论。因此，这本书并不仅仅关于区块链。它是对过去和现在的思想、政策及技术的一次回顾，这些思想、政策及技术正在挑战并改变现代资本主义这一复杂动态系统的功能。


  自然，随着变化的发生，这引出了许多问题。但就区块链而言，这些问题在本质上是极其深刻的，因为随着该技术开始被商业银行和金融机构采用，我们需要提出的问题是：这对社会其他部分意味着什么？这项技术能否为我们带来更大的透明度、民主和节约？它能否被用来创造一种更好的资本主义形式？如果能，又该如何实现？


  本书的主要目的不仅仅是试图回答其中一些问题，更是为了扭转当前各个圈子内讨论的方向，以鼓励人们就这项技术及其用途进行更深层次的思考。要做到这一点，就必须回到货币和金钱概念的原始起点。因此，本书的第一部分并非探讨区块链，而是探讨货币和债务是如何被创造出来的机制。我们首先了解部分准备金银行制度（当前货币生产中所使用的系统）的运作方式，从而深入了解货币经济学的操作系统。这能让读者清晰地看到，金融体系是如何利用债务和资产金融化来构建现代资本主义的基石的。如果没有对这些主题的充分理解，后续的讨论就没有了背景。



  '
- '# 区块链在金融领域的过渡性角色


  本书的第二部分从区块链在金融领域所扮演的过渡性角色这一视角，对其进行了深入探讨。2008 年金融危机之后，金融领域一直处于动荡之中。一方面，政府和监管机构如今要求金融创新、税收和跨境交易方面具有更高的透明度。另一方面，技术进步正在解构金融领域，使得现有企业面临科技公司的挑战。虽然当前的讨论将区块链视为一种独立的技术，但本书的这一部分试图阐明，当它与当前正在解构金融领域的其他技术并列时，它所具备的聚合功能。通过将区块链视为一种能够利用其他金融学科（如今普遍称为金融科技）进展的工具，我们能够更全面地理解这项技术的角色。


  在理解了金融领域如何在技术、债务和货币创造的背景下被解构之后，本书的第三部分试图确定这些范式转变对社会货币体系意味着什么。虽然人们常将金融领域出现这些变化的原因视为独立的波动，但它们实际上是相互关联的，而这种相互作用所产生的沉淀物，催生了重新定义经济学的需求。本节试图通过让读者理解包括区块链在内的不同技术如何改变金融领域并创造新的资本主义范式，来阐明这一定义。


  '
- '# 宏观经济影响与中央银行


  本书的第三和第四部分从更宏观的经济层面审视了这项技术的影响。在简要讨论货币政策和财政政策之后，对中央银行可能受到的影响进行了回顾。我们还将分析多种货币、去中心化账本和加密控制系统对中央银行意味着什么后果。这为理解需要掌握哪些措施、工具和理论以创建新的货币经济学框架奠定了基础。在此，读者还将接触到无现金经济的概念及其兴起。除了描述无现金系统在控制过度债务和经济污染方面的影响外，读者还将了解到哪些新的科学分支将帮助我们衡量和管理这一系统。


  虽然经济学是一门古老的学科，但用于理解这些多层面生态系统的方法，并未充分尊重其交织的网格结构所带来的复杂性。在当今数据丰富的环境中，我们需要的是一种能够比当前经济模型具有更高数学精确度和更高概率识别系统性风险的方法。随着世界在本质上日益数字化，迫切需要一种观察和衡量经济系统的新方式。不仅我们的技术已经过时，这些技术所依据的理论同样如此。


  '
- '# 新理论与新方法


  因此，最后一部分首先评估了当前的理论和技术在应对这些状况方面的不足，并向读者介绍了那些正在被发现、争论和检验的新原则。文中将提及诸如经济物理学、适应性市场假说、复杂性经济学和超级预测等主题，读者可以期待找到支持采用这些新理论和工具的推理论述。


  在描述了过去的和当前对事件的解读之后，本节试图通过串联各个点，以展示技术驱动的金融领域解构如何能够催生一个新的、债务更少的部分准备金银行体系。它还探讨了这些变革是否能为主权国家提供一种生产货币的新方式，并审视了除通货膨胀和利率之外其他可用于管理货币政策的选择。最后，它审视了多种情景，探讨这种新结构如何被用来实施创新政策，例如公开货币融资和全民基本收入，这些政策有助于解决当前威胁大多数经济体的收入不平等和技术性失业等问题。


  '
- '# 比特币、区块链与更广泛的讨论


  尽管本书的目的是更清晰地阐明区块链技术广泛应用的潜在影响，但货币领域日益增长的多样性也不能完全排除在讨论之外。随着区块链在正规金融界获得更多关注，其首个表现形式——比特币却日益被排除在讨论之外。这似乎与其二者间的共生关系相悖。更令人惊讶的是，这种将比特币与区块链分离的倾向，正是互联网刚出现时曾发生过的情况的重演。当银行试图通过创建私有区块链来利用区块链的力量时，我们发现自己正在目睹与当年私营公司试图创建内联网而非直接使用互联网时相同的事件进程。


  无论你是比特币的粉丝、区块链的粉丝，还是两者都支持，对这个话题持有细致或偏颇的观点都需要使用科学方法来形成。这是一项存在时间尚不足十年的新技术。但它所代表的，是我们对信任认知的转变，以及权力组织方式从传统的层级体系向以网络为中心的扁平体系的转变。它使我们得以重新定义货币和通货如何获得其实际价值，并迫使我们思考在全球社会经济规模上进行权力再平衡的问题。


  本书旨在一定程度上探讨这些问题，其局限性仅在于作者自身的知识和经验。它绝不试图解决比特币与区块链之间的争议，以及两者之间正在形成的持续裂痕。这本身是另一本书的主题。但是，通过审视这项技术的宏观经济用途和潜在影响，本书的目标是发起一场亟需的对话，探讨如何利用这项技术，在当前的社会经济环境中，以社会能够吸收的速度，创建一个更可持续、更合理的经济体系。


  '
- '# 新兴研究综述


  随着越来越多来自不同学科的学者开始思考类似问题，本书的另一个目的是为读者提供该研究领域进展的概要。任何试图涵盖融合所有这些主题和发展项目的人，都只能通过对众多研究人员、学者和政策制定者的工作进行广泛研究才能做到，这些人正在不同学科中重新思考这些主题。因此，尽管作者旨在为读者提供一个新的视角，但这种对资本主义的新描绘，正是那些正在与现状搏斗的思想家们智慧的结晶，没有他们的努力，本书便不可能存在。就此而言，本书有时可能看起来像一份冗长的学术报告，因为它融入了许多杰出新思想家的著作。作者在绘制这一蓝图过程中所面临的任何不可避免的批评，均由作者本人承担。




  在阅读本书之前，必须记住，**区块链**不应被视为解决所有经济问题的万能药。目前还有许多其他技术也在改变金融和经济学领域。但由于技术具有相互促进的特性，区块链作为一种基础设施技术，能够与其他技术结合并放大其效果。因此，本书的最终目标是澄清当今数字世界中信息轰炸所造成的迷雾，让读者能够自行串联起线索，见证技术的融合。最重要的是，它试图确定区块链如何被用来为我们沉迷于债务的货币体系找到解药。


  这项技术为我们提供了一个前排座位，让我们见证历史在眼前展开，并可能留下对未来的记忆。毕竟，历史不仅仅是过去，也是我们改变现在以影响未来的方式。


  **致谢**


