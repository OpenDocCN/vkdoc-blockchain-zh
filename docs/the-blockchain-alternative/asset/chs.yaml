- '# 央行数字货币：潜在的经济影响


  ## 1. 用数字货币购买的政府债券可能降低利率


  当央行用货币交换政府债务/债券时，它会收到利息支付。然而，如果这些利息收入大于利息支出（平均而言确实如此），那么它就能盈利。由于央行的利润会上缴给政府，这使得政府的债务存量更具可持续性，进而降低了政府的利率负担。作者指出，随着“央行数字货币”（CBDC）的引入，零售交易余额将逐渐从银行存款转向
  CBDC。结果，很大一部分银行融资将依赖市场价格。由于政府债务利率是构建整个经济利率结构的基础，随着债券利率下降，这将缩小债券利率与银行存款利率之间的利差。总体结果是借贷成本降低，实际利率下降。


  ## 2. 较低的利率带来财政收益


  作者发现，由于减少了利息支出，建立 CBDC 框架还能增加财政收入，并指出产出增长几乎与降低的利率幅度相当。财政收入的增加将使政府能够增加支出或降低税率。


  ## 3. 新的调控杠杆


  如前所述，CBDC 还使政府能够开发一种政策工具，用于调节政策利率。央行可以通过计算 CBDC 与 GDP 的比率，或者通过调整政策利率与 CBDC 利率之间的利差来实施。无论哪种方式，政府在控制利率和应对经济冲击方面都处于更有利的位置。


  ## 4. 降低交易成本


  作者质疑官方 CBDC 是通过央行区块链实施，还是像目前一样，通过货币发行方持有的中央登记册来实施。他们认为，一个经许可的分布式架构将提高结算效率，并增强恢复能力。最终结果是成本降低。


  ## 5. 账户服务竞争加剧


  非实体的官方货币也可以让央行像商业银行一样向公众提供存款账户。在某些方面，这类似于 100%准备金制度，即商业银行用央行准备金全额支持其存款。由于 CBDC 可类比于“在现有商业银行体系旁建立一个‘仅在线、有准备金支持、业务范围狭窄的银行’”，作者指出，这将导致存款账户市场竞争的扩大。其次，还有存款保险相关的风险问题。目前，消费者和公司只能通过商业银行存款进行支付。由于这一至关重要的角色，政府承保了保障银行存款的保险单（普通存款账户和小企业账户最高保障
  10 万欧元）。这样做，商业银行享有其负债由央行支持的特殊特权。这是“大而不倒”（TBTF）的主要原因。本质上，这种形式的存款保险造成了存款无风险的假象；实际上，它们是有风险的，风险落在了纳税人身上
  (Dyson and Hodgson, 2016)。通过发行 CBDC，政府可以为存款人提供一种真正无风险的资产，这种资产与政府而非商业银行相关联。


  ## 6. 支付服务竞争加剧和弹性增强


  当今银行的一个主要功能是交易验证。虽然现有系统的定价由成员机构决定，但在 CBDC 环境中，成为交易验证者的准入门槛降低，意味着更多参与者将进入支付服务市场，从而降低交易费用，使其更能反映验证成本。其次，当前的支付系统面临运营风险。如果一家银行或支付机构甚至暂时关闭，所有支付都需要通过其他渠道进行路由。这实际上可能会切断最终用户与支付系统的联系，直到他们找到替代方案。然而，在基于区块链的模型中，由于其分布式架构，这个问题得以避免。在支付方面的真正优势在于减少了抵押品和结算金额。目前，任何支付都包含风险：信用风险（如果银行破产）和流动性风险（如果交易对手方之一没有可在违约时变现的资产）。为了对冲这些风险，支付系统要求在进行交易前，提供具有高流动性和低信用风险的资产作为抵押品。但在
  CBDC 系统下，结算可以直接在交易对手方之间通过央行的资产负债表进行。因此，市场中的抵押品要求会降低，流动性会更充裕。


  ## 7. 更好的支付基础设施可以减少“大而不倒”（TBTF）问题


  央行目前使用的金融结算系统（如 CHAPS、BACS、FasterPayments、Fedwire、TARGET2 等）成本高昂、停机时间长，且在创新方面停滞不前
  (Danezis and Meiklejohn, 2015)。此外，虽然一些央行已经以准备金形式使用了电子形式的现金等价物（例如英格兰银行），但这些准备金账户只对持牌商业银行和少数金融机构开放
  (Dyson and Hodgson, 2014)。因此，商业银行已成为支付系统的守门人，并有能力成为经济中具有系统重要性的核心节点。结果，新进入者、小银行和其他支付服务提供商即使能够提供更好的支付服务，也必须通过持牌银行进入支付领域。转向基于区块链的支付基础设施可以为这些多重延迟问题提供单一解决方案，从而增加支付领域的竞争。如果
  CBDC 支付系统与现有系统并行构建，那么在一家具有系统重要性的银行发生故障时，它将提供一个替代支付网络。


  ## 8. 更好地应对冲击


  美国商品期货交易委员会（CFTC）委员 J. Christopher Giancarlo 的评论向我们展示了实时获取信息的重要性。因此，使用 CBDC 的一个关键特性是它为交易验证者和公众提供了获取历史及当前交易信息的途径。这反过来将为政策制定者提供更多关于金融体系相互关联性的数据，允许使用智能合约，并在创建宏观经济稳定性和应对冲击方面迈出一步。直接在央行持有存款的问题对于养老基金和保险公司等金融机构相对重要。目前，这些市场运营者必须在商业银行持有存款，但政府的存款保险（见上面第
  5 点）并不适用于它们。如果它们能直接在央行持有存款，它们受金融体系冲击的影响就会小得多。


  ## 9. 全天候运营


  商业银行和支付系统可能昼夜不停地运营，但央行并非全天候运作，其工作时段大多在早上 6 点到下午 6 点（用于 IT 维护）。这种安排使银行面临隔夜风险，这也是隔夜交易价值有限的原因。去中心化架构有助于我们解决这一限制。




