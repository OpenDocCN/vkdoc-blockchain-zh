  #### 第 2 章


  表 A-1 提供了一份书单，这些书籍提供了技术和/或商业应用方面的见解。本书在写作过程中参考了所有这些书籍。


  **表 A-1.** 技术与商业参考书目


  | 名称 | 作者 | 关注领域 |

  | --- | --- | --- |

  | 精通比特币：解锁数字加密货币 | 安德烈亚斯·安东诺普洛斯 | 技术类书籍，让读者理解比特币的工作原理。对计算机科学家和高级读者很有用。 |

  | 理解比特币：密码学、工程学与经济学 | 佩德罗·佛朗哥 | 技术类书籍，让读者理解比特币的工作原理以及该技术的经济影响。对学生、商界人士和高级读者很有用。
  |

  | 价值网络 | 克里斯·斯金纳 | 通识类书籍，整体阐述了金融科技和区块链公司如何利用技术创造新的价值互联网。对商界人士和学生很有用。 |

  | 区块链：新经济蓝图 | 梅兰妮·斯万 | 通识类书籍，从多个行业审视区块链的可用性和潜在影响。作者还讨论了加密货币和区块链的理论、哲学及社会影响。对普通读者，包括新手很有用。
  |

  | 商业区块链：下一互联网技术的承诺、实践与应用 | 威廉·穆贾雅 | 适合偏爱商业模式的商界人士。作者将自己在商业咨询领域的经验与对区块链的知识融会贯通。这本书对商界人士和商学院学生，尤其是那些希望在近期应用此技术的人很有用。
  |

  | 区块链革命：比特币背后的技术如何改变金钱、商业与世界 | 唐·塔普斯科特和亚历克斯·塔普斯科特 | 这本近期畅销书充满了真知灼见，并采访了金融领域的多位关键人物。该书属于通识读物，但让读者得以一窥关键人物对区块链的思考，同时提供了一份该领域值得关注人物的指南。
  |


