  这场危机最不利的后果之一是其对财富管理的影响：银行遭受了信任损失，而潜在客户如今需要更高的资本额才能进行投资。随着工资停滞和就业放缓，新投资者越来越难以投入小额资金。自
  2008 年以来，越来越多的自动化财富管理服务（也称为机器人投顾）应运而生，为传统财富管理提供了低成本、知识渊博的替代方案。


  通过使用基于大量股票和市场数据训练而成的数据模型和交易算法，`Betterment`和`Wealthfront`等公司提供自动化分析和个性化投资组合管理。例如：`Wealthfront`不仅帮助投资者以
  5000 美元建立投资组合，还在投资组合价值变动时发送通知，告知用户个人税款的变化（Johns, 2015）。除了这些平台，`StockTwits`和`Covestor`等网站允许投资者分享观点，并从专家和其他投资者那里获得市场见解。`Quantopian`和`Algofast`等网站还允许用户即使没有技术知识和基础设施，也能轻松构建、测试和执行交易算法。它们还允许经验丰富的投资者管理其他投资者的投资并收取费用，从而利用群众的力量。通过迎合那些比传统财富管理客户财富较少的客户，这些新公司正在为更广泛的客户群提供可访问性和低成本定制服务。


  这些公司也越来越多地接管现有机构的核心业务。通过使用精密的算法，它们甚至在决策层面实现了多个投资组合的大规模自动化管理。例如：`Ayasdi`和`Kensho`等公司利用数据找出市场中的相关性和异常值。这些结果随后由`人工智能`进行分析，用于创建假设、制定交易策略，并自动模拟投资情景。由于这些公司的运营流程本质上几乎是完全数字化的，像`FundApps`这样的公司应运而生，通过基于云的托管服务提供机器可读语言的监管信息。这使得这些公司能够更快地适应行业不断变化的监管。我们将在讨论智能合约时再次提及这一话题。


  以前，投资组合管理和情景生成需要雇用高级管理人员。然而，这些任务的自动化促使现有机构转向这些服务，引发了人们对行业未来格局的质疑。正如`Kensho`首席执行官丹尼尔·纳德勒在米尔肯会议（2016
  年）上所说：“不仅仅是副总裁和合伙人……还有（银行里的）数千名软件工程师……这些工作真的会被大量削减。”


  **优势**：更强的包容性、竞争加剧、数据标准化


  **风险**：合规成本、监管阻碍风险监控、技术性失业


  ## 4. 资本市场


  **立场**：面向企业


  **主要技术**：`交易算法`、`大数据`、`神经网络`、`机器/深度学习`、`人工智能`


  如果我们将私人财富管理行业中交易和服务的规模、速度和数量放大，就会发现自己身处资本市场的高频交易（HFT）世界，它涵盖了私募股权、大宗商品和衍生品的交易与管理。高频交易自
  20 世纪 90 年代初就已存在。通过构建对市场事件反应极快的交易策略，高频交易者加快了市场价格发现的速度并提高了流动性比率。


  这样做是因为对市场事件的快速反应可以减轻交易员头寸价值波动所固有的风险（库存风险），并降低与信息更充分的投资者交易的风险（以“过时”报价交易）。这也使得交易员能够预期未来价格波动而建仓（“方向性”策略），并提供相关资产之间的套利机会。然而，自危机以来，波动性降低、流动性改善、交易基础设施成本上升以及监管审查，都降低了高频交易的盈利能力，而
  2010 年闪崩、2014 年国债闪崩和 2015 年 ETF 闪崩等市场错位事件，则降低了高频交易的受欢迎程度。


  鉴于这些缺点，使用更智能、更快的机器执行算法交易策略的金融科技公司，正在改变市场在成交量、流动性、波动性和风险分散方面的结构。诸如`Neuro Dimension`之类的公司，利用`人工智能`（使用神经网络和遗传算法）进行技术分析，从历史数据中“学习”模式。然后，它们通过将搜索数据与多个宏观经济因素和量化的新闻洞察相结合，来优化大数据能力，从而计算潜在的上涨/下跌情景。借助机器学习算法和规范性分析，这些情景随后被测试，并通过自我修正的更新来持续改进交易策略，同时将人工干预降至最低。这些公司还能够通过挖掘`Twitter`等社交媒体平台的信息流来捕捉买入和卖出信号，尽管这在过去引发过一些复杂情况。2013
  年 4 月，美联社被黑客入侵的`Twitter`账户上发布了一条关于白宫爆炸的虚假报道。由于算法交易者的系统与关键的`Twitter`信息流相连，这引发了一轮抛售狂潮，导致标普
  500 指数在该推文发布后两分钟内蒸发了 1360 亿美元。


  正如在财富管理领域所见，随着机器自动化了从假设到决策的广泛核心活动，人类在整个交易过程中的参与度正在降低（世界经济论坛，2015 年）。随着交易算法变得更加智能，其分析的广度和准确性将会扩大，并可能导致市场观点趋向一致。基础设施成本的增加也可能在交易机构和个人投资者之间筑起一道鸿沟，因为信息壁垒开始形成。


  随着技术继续引领金融领域的这一板块，当务之急是制定能够针对特定策略（旨在减少风险和异常事件，而非一概限制快速交易）的监管法规。我们将在讨论智能合约的应用时再次涉及这一板块。


  **优势**：通过规模经济吸引更多参与者、更高的流动性、更多的数据流、数据标准化、改善的价格发现和价格准确性、透明度、速度以及更低的成本


  **风险**：虚假信号、策略趋同、更高的准入门槛、更严格的监管、数据完整性、技术性失业


