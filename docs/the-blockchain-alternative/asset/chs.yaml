- '# 重新排版后的文本


  正如我们所看到的，经济理论的数学研究基于理论物理学的模型。以这一出发点，它试图将自己确立为能够解释、预测和支配经济行为与事件的有效法则。但经济学非但没有找到能够通过检验被证伪的法则，反而日益转变为一种由假设和数学推导组成的公理体系，类似于欧几里得几何学。


  但正如我们所看到的，经济学绝非可推导的，也不能基于假设。作为行为主体——无论消费者、银行、企业还是政府机构——执行不同的行动，无论购买、出售、交易、投机还是投资——它们都在不断地创新、预测和适应基于彼此互动而不断变化的环境。这反过来创造了一个不断演化的生态系统，该生态系统呈现出暂时的、从未处于均衡状态的模式。在定义明确且静态的情境中，均衡会有一席之地。但这些将是普遍熵状态下的例外。因此，经济理论的目标不应是制定方程或使行为主体适应特定条件。它应该是阐明从正在发生的变化中获得的洞见。


  正是这种看待市场和政策方式的转变，构成了对资本主义的重新定义。这种重新定义不再是数学公式的集合，而是一种能力，即欣赏经济中正在发生的变化，并在目睹新现象产生时感到自如的能力。在这种情况下，经济理论将不再是可普遍应用的定理公式，而是在承认科学一致性（`consilience`）的前提下，理解创造模式的变化之力。


  这种转变正逐渐发生，而复杂性经济学（`complexity economics`）在这场重新定义中扮演的角色将是核心。为了强调这一点，并以基于主体的建模和基于主体的计算经济学作为本节的结尾，我邀请您思考欧洲央行行长让-克洛德·特里谢（`Jean-Claude
  Trichet`）于 2010 年 11 月 18 日在法兰克福欧洲央行中央银行会议上发表开幕词时的以下陈述：


  > “当危机来临时，现有经济和金融模型的严重局限性立即显现。套利失效……市场冻结……市场参与者陷入恐慌。宏观模型未能预测到危机……并且[未能]解释正在发生的事情……”“面对危机，我们感到被传统工具抛弃了。……关键教训……是依赖单一工具、方法论或范式的危险。现有模型背后的原子化、最优化行为主体无法捕捉危机时期的行为。基于主体的建模……允许行为主体之间更复杂的相互作用。……它摒弃了最优化假设，并允许行为主体之间更复杂的相互作用。这类方法值得我们关注。我们需要更好地将金融体系发挥的关键作用整合到我们的宏观模型中。”“我非常欢迎来自其他学科的启发：物理学、工程学、心理学、生物学。将这些领域的专家与经济学家和中央银行家聚集在一起，可能非常……有价值。”“金融市场观察到的行为的许多方面难以与有效市场假说（`efficient
  market hypothesis`）协调一致……但一种坚定的经验方法——它更注重基于数据的归纳推理，而非基于抽象前提或假设的演绎推理——是这些方法的核心……模拟将发挥有益作用。”


  ## 综合来看


  > “经济理论家，就像法国厨师对待食物一样，开发了风格化的模型，其成分受到一些不成文规则的限制。正如传统的法国烹饪不使用海藻或生鱼一样，新古典模型也不采用源自心理学、人类学或社会学的假设。我不同意任何限制经济模型成分性质的规则”——乔治·阿克洛夫（`George
  Akerlof`），《经济理论家故事集》（`An Economic Theorist’s Book of Tales`，1984 年）


  似乎我们在努力掌握复杂性经济学基础的过程中，已经偏离了区块链的主题。但实际上，我们只是在为本书要提出的最终观点搭建舞台。区块链不是万能药。它是一种工具，就像任何好工具一样，它用途广泛，并且当它是工具包的一部分时会工作得更好。复杂性经济学是另一个需要用来重新定义资本主义的工具，对于早熟的读者来说，区块链与复杂性经济学之间的联系必然已经很明显了。


  区块链有很多含义——它是一个共享账本，一种发行货币的媒介，一种去中心化交换价值的手段，以及一种提供实现全球金融包容性可能性的共识机制。但它最重要的意义是信任的数字体现。区块链本质上是一个经过编码的真实性验证机器，它能够通过去中心化网络上的协议将信任商品化。这句话中的关键词是“去中心化”，因为市场是去中心化的。一个组织可能是中心化的，具有各种层级结构。但市场是去中心化的，正如我们在第[2]章（请参考关于金融科技的部分）中所看到的，并且越来越如此。


  在具有多个行为主体的去中心化市场中，信任成为一个关键因素，因为它有相关成本。由于不确定性、机会主义和有限信息（有限理性），行为主体之间缺乏信任限制了网络中形成的互动和联系的数量。这种基于缺乏信任而犹豫建立联系的现象已在交易成本理论（也称为新制度经济学）领域得到广泛研究，该理论由罗纳德·科斯（`Ronal
  Coase`）于 1937 年创立。


  交易成本理论（`TCT`）是经济学的一个分支，研究交易成本以及为管理交易而发展起来的制度。它研究经济联系的成本以及行为主体为处理经济互动而组织自身的方式。科斯意识到经济交易是有成本的。在他开创性的论文《企业的性质》（`The
  Nature of the Firm`）中，科斯指出，虽然经济体涉及大量计划，但其中很大一部分计划并非由价格体系协调，而是在企业边界内进行的（伊达尔戈，`Hidalgo`，2015
  年）。由于企业有层级结构，企业内部的大多数互动都是政治性的。这创造了影响交易和互动的权力边界，导致它们偏离市场价格机制的清晰动态。这体现在合同、检查、争议、谈判等形式中。这些边界反过来又增加了成本，交易相关成本越高，进行该交易相关的摩擦就越大。


  但信任在任何网络中都是一个基本要素，因为它允许信息、知识和专门技能的转移。如果网络中存在更多信任，联系就更容易建立，交易也更流畅地进行，从而增加网络规模。通过降低联系成本并提供允许更多知识和专门技能交流的渗透性边界，高信任网络能够更快地适应市场和技术的变化。这一现象在塞萨尔·伊达尔戈（`César
  Hidalgo`）的《信息增长》（`Why Information Grows`，2015 年）一书中有非常详细的讨论。




  '
- "# 在经济网络中使用复杂性模型与信任\n\n借助复杂性模型，伊达尔戈开发了`TCT`，用以说明在经济网络中，链接成本越低，网络规模就越大。他运用科斯的理论指出，信任是社会资本的关键要素，它是维系和形成大型网络所需的粘合剂，而这样的网络能够促进其中积累的知识与技能的传播。信任通过降低链接成本来扩大网络规模。因此，链接的建立变得更加容易，因为创建新链接不再被视为高风险行为。相反，低信任网络会形成边界渗透性较差的网络，从而限制了其长期适应能力。他在书的结尾总结道，经济增长建立在信息增长的基础之上，而那些更擅长促进信息增长的国家则更加繁荣。总而言之，信任水平越高，经济越复杂，经济就越繁荣。\n\
  \n由于`区块链`是一种通过共识和透明度以加密方式强制执行约定合约的机制，它提供了一种在很大程度上降低信任需求的控制机制（Davidson 等人，2016）。随着`区块链`的采用率持续上升，它为政府提供的潜力不仅在于提高透明度，还在于作为增强经济信任度的一种方式。在一个饱受技术性失业和不平等困扰的世界里，`区块链`为政府提供了多种途径来重新思考其职能以及构成其经济的各种制度。\n\
  \n此外，对于在这些去中心化网络上流动的交易数据，政府不必被动旁观。通过运用复杂性经济学的方法，他们可以利用这些数据来观察一个经济体的重要组成部分之间如何发生交易，以及它们的互动如何改变生态系统。利用这些信息，他们可以创建模拟，以了解货币和财政政策（即：环境变化）将引发何种反应，以及这些环境变化的涟漪效应将如何影响经济中的较小参与者。货币和财政政策将不再需要具有被动反应的性质，而是可以具有前瞻性。\n\
  \n当然，过渡到这样一种框架并非一蹴而就的过程，因为这迫使我们从根本上重新思考市场基础和经济政策制定。但正如我们本章所见，这一进程已经开始，并且一个全新的科学研究领域正在重新构建我们对经济理论基础的认识。如何实施这一过程，以及它在微观、中观和宏观层面将带来的挑战，是未来几年需要详细探讨的课题。本书的篇幅有限，无法对所有与此努力相关的问题提供如此百科全书式的概述。正如从一开始就提到的，本书的目标一直是改变我们当下有关资本主义的对话方向。正如我们在这四个章节中所见，这种对话在部分学术界和政策圈中已经开始。我的目标是让这些对话发出集体的声音。\n\
  \n## 结论\n\n> “我认为下一个世纪将是复杂性的世纪。”——斯蒂芬·霍金，2000 年 1 月\n\n经济学与生态学有着共同的词源。它们都源自希腊语中表示“家”的词——\"\
  Oikos\"。\"Logy\" 源自另一个希腊词\"Logos\"（源自 `legein`），意为收集、计数或说明。而\"Nomos\" 则源自希腊语\"Nemein\"\
  ，意为分配或管理。因此，生态学在根源上指代的是居所的逻辑，或我们居住地的故事。经济学是`eco`加上`nomos`，意为家务管理（希腊语`oikonomia`）。\n\
  \n令人惊讶地发现，尽管这两个词同源，但在历史进程中它们已完全分道扬镳。这不仅体现在它们被研究的方式上，也体现在它们被相互对立的方式上。随着金融化程度加深、过度消费主义盛行、债务与不平等持续上升，气候变化和生态破坏的问题也日益严峻。我时常思考，如果我们当初开始学习经济学时，采用的是生态学家的视角，而非物理学家的工具（瓦尔拉斯方法），我们的生态是否还会是今天这般模样。\n\
  \n经济学那种陈旧的学科沙文主义似乎也忽略了其希腊表亲——民主。资本主义与民主常被视为携手并进，是天然的盟友。大多数资本主义国家同时也是民主国家，在某种程度上，尽管资本主义和民主都存在种种缺陷，但因为没有合理的意识形态替代方案，它们仍被广泛接受。然而，随着世界因`区块链`等技术的进步而日益复杂，我们需要留意这些技术的影响是什么，以及我们如何研究这些变化所带来的后果。\n\
  \n仅仅专注于技术的应用无法实现这一壮举。它还需要我们对经济史有深刻的理解。正如我们在本书中所见，我们今天面临的许多问题的解决方案，早在几十年前就已经由那些对经济理论的局限性以及在自由民主背景下资本主义的定义有着深刻理解的经济学家提出了。亚当·斯密、大卫·李嘉图、卡尔·马克思，直至熊彼特，都试图忠实于这种方法。亚尼斯·瓦鲁法基斯在\
  \ 2016 年 4 月于新学院的一次演讲中最好地总结了这一困境：\n\n> “没有国家的资本主义就像没有地狱的基督教。它行不通……将资本主义和民主视为天然盟友是一种非常晚近的现象……[但是]除非我们通过……同时研究经济史……或资本主义史、生产关系与技术之间的冲突演变，[以及另一方面]我们关于正在被这一历史演化过程所塑造的世界的观念的演变……来研究它（资本主义研究）……除非我们通过这个棱镜来研究过去、现在和未来的可能性，否则我们绝无可能利用数学化方法来把握我们所处的现实。”\n\
  \n今天的资本主义所走向的方向，是在它成为共产主义之前的一个阶段——资产阶级自由民主。利用那些正在改变资本主义定义的技术，来创建一个更理性、更公正且更符合科学现实的资本主义版本，是我们共同的责任和替代性义务。\n\
  \n在一个任何问题的答案都能被找到的信息世界里，真正的价值来自于提出正确的问题。`区块链`是一种用于转移价值并记录这些信息的工具。是时候开始提出正确的问题了：我们能利用这个工具做什么？\n\
  \n## 一些最后的说明\n\n以下部分为本章前面涉及的主题提供了进一步的视角：\n\n*   第“技术与发明：一个组合过程”节\n*   边栏 4-1：“理性预期的理论基础”\n\
  *   第“均衡经济模型的数学魔法”节\n\n\n\n### 计算简史\n\n资料来源：《计算宇宙：一场革命之旅》，托尼·海伊与久里·帕帕伊著（2014 年）；《现代计算史（第二版）》，保罗·E·塞鲁齐著（1998\
  \ 年）。\n\n计算与计算机的故事可以追溯到 19 世纪初，当时一位在剑桥接受过教育的数学家查尔斯·巴贝奇首次萌生了制造一台机器来计算对数表的想法。1819\
  \ 年，在离开剑桥后不久，巴贝奇正与天文学家约翰·赫歇尔合作，手工进行算术计算。由于这个过程既繁琐又容易出错，巴贝奇突然想到可以制造一台机器，通过遵循精确的算术程序来执行常规计算。这促使巴贝奇开始着手研究他后来称之为“差分机”的机器——一种能够计算天文和航海表，并将结果记录在金属板上（以便直接用于印刷）的机器。该项目后来由英国政府资助，由巴贝奇和约瑟夫·克莱门特共同开发了十多年。由于巴贝奇与克莱门特之间的分歧，该项目于\
  \ 1842 年被取消，并已花费政府超过 17,000 英镑——这在当时是一笔巨款。\n\n巴贝奇的差分机是第一台专用计算器，也是他下一个构想——分析机的基础。尽管他从未获得资金来推进第二个项目，但其设计理念（记录在超过\
  \ 6000 页的笔记、数百张工程图纸和操作流程图中）是当今现代计算机的基础。这些理念包括一个独立的计算部分（我们今天称之为中央处理器（`CPU`））、另一个用于存储数据（或内存）的部分，以及一种向机器提供指令的方法（编程语言）。与巴贝奇通信的艾达·洛夫莱斯也在编程语言的发展中发挥了\
  \ influential 作用，她强调分析机不仅可以进行数值计算，还可以操作符号。然而，编程语言的真正进步来自乔治·布尔，他设计了一种语言来描述和操作复杂的逻辑语句，以判断语句的真假。尽管创建了布尔代数的布尔本人并未从事计算工作，但他的逻辑运算（`AND`、`OR`\
  \ 和 `NOT`）思想后来被用于提升后续计算机的性能以及创建逻辑门。\n\n20 世纪 30 年代中期，美国工程师、发明家、二战期间美国科学研究与发展局（`OSRD`）负责人万尼瓦尔·布什创建了一台被称为“微分分析机”的模拟计算机。这台计算机用于求解常微分方程，这有助于计算炮弹的弹道。它由多个旋转圆盘和圆筒组成，由电动机驱动，并通过金属连杆连接，需要手动设置（有时长达两天）来解决任何微分方程问题。万尼瓦尔招募了克劳德·香农（今天被称为信息论之父），一位专攻符号逻辑的年轻研究生。\n\
  \n尽管微分分析机是一台带有活动部件的机械机器，但香农将其识别为一个带有继电器的复杂控制电路。因此，香农开始创建第一代电路设计，并在此过程中，能够将信息转化为可由机器操作的数量。利用布尔代数、逻辑门和二进制算术（比特和字节），香农能够用数字表示所有类型的信息，并在此过程中为当今的现代信息论奠定了基础。正因如此，他被称为信息技术之父。\n\
  \n随着 1939 年第二次世界大战的爆发，这些信息技术的进步已被各国军方采用，用于传递敏感信息。密码学成为掩盖信息的一种合适方式，并促成了恩尼格玛密码机的诞生。对盟军来说幸运的是，希望来自于另一位剑桥数学家艾伦·图灵几年前所做的一些工作。图灵与他的导师马克斯·纽曼一起着手设计和建造能够解密德国军方秘密通信的自动化机器（图灵机）（正如热门电影《模仿游戏》中所记载的那样）。然而，由于战时及战后数年对保密的执着，图灵和布莱切利园团队在计算机发展方面取得的成就一直未被公开。\n\
  \n与图灵机同期，在大西洋彼岸，约翰·莫奇利和普雷斯珀·埃克特正在开发一台名为 `ENIAC`（电子数值积分计算机）的机器。对气象学感兴趣的物理学家莫奇利试图开发一个天气预报模型。但他很快意识到，没有某种自动计算设备，这是不可能实现的。因此，他提出了使用真空管制造电子计算机的概念。正是在开发\
  \ `ENIAC` 期间，他遇到了博学多才的约翰·冯·诺依曼，并在他的帮助下设计出了一台存储程序计算机 `EDVAC`（电子离散变量自动计算机），这是第一台二进制计算机（`ENIAC`\
  \ 是十进制的）。见图 4-11。\n\n![A426969_1_En_4_Fig11_HTML.jpg](img/A426969_1_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11.  \n电子离散变量自动计算机的总体设计。资料来源：《冯·诺依曼架构》，《计算宇宙》，2014 年\n\n从抽象架构的角度来看，冯·诺依曼的设计在逻辑上等同于图灵的通用图灵机。事实上，冯·诺依曼在设计他的机器之前，已经阅读过图灵的理论论文。最终，正是这个简洁的设计被一代又一代的计算机科学家所发展，并导致了多处理器计算机的设计和并行计算的诞生。\n\
  \n战后的时期见证了计算机硬件方面的巨大进步。从早期的真空管和水银延迟线（一种充满水银的细管，用于存储代表二进制数据点的电脉冲——一个脉冲代表 `1`；没有脉冲代表\
  \ `0`），计算硬件迎来了磁芯内存的引入和硬盘的诞生。但在软件开发领域也取得了同样（甚至更加多样化）的进展。从穿孔卡片和简单的逻辑门开始，软件访问、计算和处理数据的能力取得了飞跃式的进步。像\
  \ `COBOL` 和 `FORTRAN`（`FORmula TRANslation`，公式翻译）这样的语言，帮助创建了早期操作系统，多年来，我们见证了软件设计和编程语言的兴起，例如\
  \ `BASIC`、`LISP`、`SIMULA`、`C`、`C++`、`UML`、`Unix`、`Linux` 等。最终，正是这些进步促成了分布式通信网络、互联网和万维网的构建。\n\
  \n\n\n"
- '# 计算历史简述


  计算的历史无法用简短的内容概括，鼓励读者查阅本注记开头引用的参考文献中列出的优秀书籍，以获得更详细的理解。提供此简要说明的目的在于强调技术是如何发展的。随着自然科学不同领域的每一次进步，技术都借鉴其前身，而创新来自于将不同技术家族中累积的微小变化结合起来。计算机可能源于数学，但正是物理学、化学以及最近生物学的发展，才使我们能够开发出今天的技术。如果没有这种科学探究方法和科学合流，我们将无法拥有今天的技术，也绝对无法谈论区块链。随着情感计算的进步，人类情感在技术演化中的作用将变得越来越重要。


  ## 神经可塑性


  大脑包含约 800 亿个神经元，它们构成了大脑的线路，每个细胞通过化学和电信号与其他 10,000 个细胞相连。在大约 100 万亿个突触（神经元之间的连接）处，大脑是最复杂的网络，其动态互连的数量比银河系中的恒星和行星还要多。


  大脑中互连的数量是学习的关键。在思考和学习的方面，大脑通过基于接触新想法和现有记忆，在大脑中建立新的突触连接来进行自我学习。当大脑接触到新想法时，这些连接会不断变化，并响应于经验、思维和心理活动。换句话说，心理活动（思考）不是大脑的产物，而是塑造大脑的东西。这被称为神经可塑性，正是它使我们能够学习新想法。这也是任何技能或才能得以发展的方式。


  神经可塑性通过连接性（突触）发生变化。当接收到新信息时，会形成新的突触，现有的突触会断开，新的想法会涌现。基于哪些神经元受到刺激，某些连接会变得更强、更高效。如果某个动作被重复，现有的连接会得到加强，执行重复任务的能力也会变得更快。重复并不能帮助我们更好地学习，它只是让我们做事情更快。


  随着更多连接的形成，我们学到更多，并能够将想法与现有知识联系起来。这使我们能够形成认知地图来解释世界，或者根据手头的信息形成某种信念体系。当接触到新想法时，大脑要么通过将新信息与已知信息进行验证来试图保护其现有想法，要么根据接收到的新信息更新其信念体系。


  这种升级活动也受到社会属性以及我们在社区中位置的支配。心理学家将此称为自我形象，在此过程中，我们对信念体系的适应基于他人如何解读我们。因此，智力是一种协作努力，也是我们交流的首要原因——通过阅读、倾听、观看，以及最近的大脑间传输来传递知识。毫不奇怪，科学的进步基于合流，因为我们天生就是信息、经验和知识的社会传递者。


  ## 宏观经济模型的类型


  来源：《预期在 FRB/US 宏观经济模型中的作用》，作者：弗林特·布雷顿、艾琳·莫斯科普夫、大卫·雷夫施奈德、彼得·廷斯利和约翰·威廉姆斯（1997 年）。


  `FRB/US`是过去 30 年来开发的众多宏观经济模型之一。宏观经济模型是用于总结诸如国内生产总值（`GDP`）、通货膨胀和利率等经济变量之间相互作用的方程系统。这些模型可以分为几种类型：


  - **传统结构模型**通常遵循凯恩斯范式，特点是价格调整缓慢。这类模型通常假设预期是适应性的，但将其融入特定方程的一般动态结构中，以至于预期本身的贡献无法被识别。以前在美联储使用的`MPS`和多国（`MCM`）模型就是例子。


  - **理性预期结构模型**明确纳入了与模型结构一致的预期。例子包括目前在美联储使用的`FRB/US`和`FRB/MCM`模型的变体、泰勒的多国模型以及国际货币基金组织的`Multimod`。


  - **均衡商业周期模型**假设劳动力市场和商品市场始终处于均衡状态，且预期是理性的。所有方程都紧密基于家庭效用最大化和企业利润最大化的假设。例子包括基德兰德和普雷斯科特以及克里斯蒂亚诺和艾肯鲍姆开发的模型。


  - **向量自回归（VAR）模型**使用少量估计方程来总结整个宏观经济的动态行为，除了模型中包含变量的选择外，经济理论对其限制很少。`Sims`是这类模型的最初倡导者。


  - **元胞自动机（CA）**：“自动机”（复数：“自动机”）是计算机科学和数学中使用的一个技术术语，用于描述一种假设的机器，它根据输入和先前的状态改变其内部状态（Sayama,
  2015）。一个元胞自动机由一个规则的单元格网格组成，每个单元格处于有限数量的状态之一，例如开和关。每个单元格被一组称为其邻域的单元格包围。在特定时间（`t`），单元格及其邻域单元格根据某些固定的数学规则处于特定状态。这些规则还决定了单元格如何随时间更新以及它们如何与其邻域交互。随着时间从（`t`）推进到（`t
  + t`），通过相互交互和同步更新，产生新一代的单元格。


  `CA`的原始想法由约翰·冯·诺依曼和斯坦尼斯瓦夫·乌拉姆提出。他们发明了这个建模框架，这是第一个用于模拟复杂系统的框架，目的是描述生命系统的自我繁殖和可演化行为。`CA`用于可计算性理论、数学、物理学、复杂性科学、理论生物学和微观结构建模。


  - **神经网络**：更具体地说是人工神经网络（`ANN`），它们是处理设备（可以是算法或实际硬件），松散地模仿了大脑皮层神经元的神经结构，但规模较小（图 4-12）。


  ![A426969_1_En_4_Fig12_HTML.jpg](img/A426969_1_En_4_Fig12_HTML.jpg)


  **图 4-12.** 生物神经网络示意图 来源：无边界心理学，2013


  现代`ANN`的起源基于一个称为感知器的神经元的数学模型，由弗兰克·罗森布拉特于 1957 年提出（Papay and Hey, 2015）。如图 4-13 所示，该模型与神经元的结构非常相似，其输入类似于树突。


  ![A426969_1_En_4_Fig13_HTML.jpg](img/A426969_1_En_4_Fig13_HTML.jpg)


  **图 4-13.**




  '
- '# 人工神经元的表示


  具有输入、连接权重以及受阈值函数约束的输出的人工神经元示意图。来源：《计算宇宙》，Gyuri Papay 和 Tony Hey，2015 年


  在 Warren McCulloch 和 Walter Pitts 提出的原始模型中，输入值为 0 或 1。每个树突/输入也带有 +1 和 -1 的权重。因此，输入与其权重相乘，然后输入的总和被馈送到模型中。因此，感知机接收多个二进制输入
  `I[1]`、`I[2]`、…… `I[N]`，并产生一个单一的二进制输出。如果输出大于设定的阈值水平，则模型产生特定输出。这可以用数学公式表示为：


  ![$$ \mathrm{输出}=0\;\text{如果}\ {\displaystyle {\sum}_j{W}_j{I}_j\;\le}\;\text{阈值}
  $$](img/A426969_1_En_4_Chapter_Equc.gif)


  ![$$ \mathrm{输出}=1\;\text{如果}\ {\displaystyle {\sum}_j{W}_j{I}_j\;\le}\;\text{阈值}
  $$](img/A426969_1_En_4_Chapter_Equd.gif)


  基于这一初始模式，感知机模型得以发展，允许神经元输入和权重取任意值。人工神经网络（ANN）无非就是感知机互连的层次结构，如图 4-14 所示。


  ![A426969_1_En_4_Fig14_HTML.jpg](img/A426969_1_En_4_Fig14_HTML.jpg)


  **图 4-14.** 感知机互连的层次结构。图片来源：《计算宇宙》，Gyuri Papay 和 Tony Hey，2015 年


  通过改变权重和阈值，我们可以得到不同的决策模型。隐藏层的输出也可以馈送到另一个感知机隐藏层。第一列感知机层通过权衡输入证据做出非常简单的决策。这些输出随后被馈送到第二层感知机，该层通过权衡来自第一层决策的结果来做出决策。通过这种方法，第二层的感知机可以做出比第一层感知机更复杂、更抽象的决策。如果涉及第三层，那么这些感知机做出的决策将更加复杂。通过这种方式，多层感知机网络可以从事复杂的决策。感知机层数越多，决策能力越高（图
  4-14）。


  ![A426969_1_En_4_Fig15_HTML.jpg](img/A426969_1_En_4_Fig15_HTML.jpg)


  **图 4-15.** 感知机多层网络。来源：`http://neuralnetworksanddeeplearning.com/`


  '
- '# 遗传算法


  遗传算法（GA）是一种启发式搜索方法，受达尔文进化论启发，用于人工智能和计算领域。它基于自然选择和进化生物学的理论（即选择、变异、遗传和重组）来寻找搜索问题的最优解。


  遗传算法基于将染色体视为一串基因的经典观点。R.A. 费舍尔利用这一观点创立了数理遗传学，提供了指定特定基因在种群中传播速率的数学公式（Fisher, 1958）。费舍尔公式的关键要素包括（Holland,
  2012）：


  1.  为每个基因指定一组备选方案，从而确定可以进化的允许的基因字符串。

  2.  逐代演化的观点，其中在每个阶段，个体种群会产生一组构成下一代的后代。

  3.  一个适应度函数，为每个备选方案的字符串分配该染色体携带者将贡献给下一代的后代数量。

  4.  一组遗传算子，特别是在费舍尔公式中的变异，它们修改个体的后代，使得下一代与当前代不同。


  在解决约束和无约束优化问题时，经典算法在每次迭代中生成单个数据点。数据点序列随后逼近最优解。另一方面，遗传算法使用类似于自然选择的过程——它反复修改个体解的种群，并在每一步中，从当前种群中随机选择数据点，并将它们用作“父代”来产生下一代的子代。在连续几代中，种群“进化”到最优解（Holland,
  2012）。


  尽管是随机化的，但遗传算法绝非随机，相反，它们利用历史信息将搜索引导到搜索空间中性能更好的区域。遗传算法模拟个体在连续几代中适者生存的过程来解决问题。每一代由一组字符串组成，这些字符串类似于我们在
  DNA 中看到的染色体。每个个体代表搜索空间中的一个点和一个可能的解。然后，种群中的个体经历一个进化过程。


  遗传算法用于搜索庞大而复杂的数据集，因为它们能够通过解决无约束和约束优化问题，为复杂问题找到合理的解决方案。它们用于解决不适合标准优化算法的问题，包括目标函数不连续、不可微、随机或高度非线性的问题。遗传算法在混合（连续和离散）组合问题上也特别有效，因为它们比经典梯度搜索方法更不容易“陷入”局部最优。然而，它们的计算成本往往很高。


  ---


