- '# 排版后内容


  近期两部著作中描述的理念与方法，使我们得以一窥：若转向基于主权无现金区块链的基础设施，并采用 100%准备金制度，货币政策将如何执行。这些方法或能为政策制定者当前在提升履职生产力与效率方面所面临的僵局，提供重要解答。它们还将促进金融包容性、提升透明度，并降低系统性风险。然而，转向
  100%准备金支持制度仍需审慎考量。部分保留意见已在侧边栏 3-4 的结论部分描述，其中我们读到了《芝加哥计划》。首先，仅依靠央行 100%准备金无法解决私人信贷过度创造的问题，因为如果消费者感到受限，他们可能创造并使用新型金融工具来绕过这一体系。其次，即便现有债务被准备金取代，也意味着将出现赢家和输家。第三，政府在掌管货币创造方面的记录并不光彩，且存在利用此权力谋求短期政治利益的风险。我们需要找到一种管理债务数量与类型的方法。与其依赖中央全额准备金银行模式，答案是否在于多种货币共存？


  ## 无现金环境下的多种货币


  关于私人货币发行的文献数量庞大。私人现金最坚定的支持者之一是奥地利经济学家弗里德里希·哈耶克，他认为私人主体可以利用市场创造兼具价值储存和记账单位功能的货币。在哈耶克看来，私人参与者无需政府干预即可创建稳定的货币体系。他认为，政府应允许公民使用自己选择的货币，并允许企业家通过创建数字货币和铸造商品货币在货币领域进行创新（Hayek,
  1976）。


  但以太坊和比特币等货币并非商品货币。它们可被视为私人发行的法定货币，本质上属于信用货币——即无商品支撑，且不能兑换为任何其他资产。尽管这些货币在去中心化网络上转移价值十分有效，但从经济学角度而言，由于与常规法定货币存在差异，其履行货币三大职能¹⁴的能力已受到质疑。这些差异包括：


  **波动性**：比特币等货币的价格波动一直是持续辩论的主题，导致分析人士评论称，由于存在大幅价格波动，该货币永远无法成为良好的价值储存手段。这确是事实，但若观察过去五年的波动性，可见其已逐渐趋于稳定。截至撰写本章时（2016
  年 9 月），30 日`BTC/USD`波动率为 1.16%，而 30 日`USD/EUR`波动率为 0.32%。2015 年 9 月至 2016 年 9 月间，`BTC/USD`波动率在
  4.93%的高点与 0.32%的低点之间震荡，而`USD/EUR`波动率则维持在 0.67%至 0.32%的区间内（图 3-3）。实际上，比特币尚未像主权法定货币那样稳定，但随着网络效应和用户基础扩大，其波动性正逐步降低。值得注意的是，英国脱欧公投宣布后比特币价格激增（图
  3-4）。加密货币的价值变化仍令人担忧，因为这削弱了其购买力及作为长期储蓄工具的功能。


