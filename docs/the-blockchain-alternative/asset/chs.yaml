- '# 金融化与风险的创新


  在对金融化的讨论中，若不谈及其主要组成部分——风险，则无法被认为是完整的。风险层面是金融化的核心。金融机构的职能之一，是在经济主体之间充当中间人，这些主体的目标可能不同或不一致，或者希望对冲信用风险或利率波动等风险。通过作为这些主体的交易对手，金融机构将风险承担在自己肩上，并以此提供服务，从而获得收入。但金融化的增长对风险的重新分配产生了奇特的影响。风险并非被简单地重新分配，而是经历了一个转变过程，其本身变成了一种产品，现在可以像实际商品一样进行交易和出售。


  从 20 世纪 80 年代起，随着非金融企业越来越多地涉足金融市场，那些愿意承担风险责任的参与者所获得的激励，催生了一系列神秘且日益复杂的衍生品（Partnoy,
  2009）。这一发展的累积效应意味着，非金融企业如今开始从制造商品等核心活动，转向提供信贷以购买这些商品等金融活动——而这原本是传统金融机构的领域。


  然而，角色的转换对金融机构来说并非全是坏消息。随着越来越多的消费者通过借贷购买产品，这意味着非金融机构的增长必须通过承担更多债务来实现杠杆化。随着债务螺旋的持续，贷款附带的风险在总量上不断增长，到了必须解决这一局面的地步。正是在这里，金融创新出手相救。由于非金融机构发行债务导致银行实力下降，银行通过其证券交易活动，特别是通过`CDO`（担保债务凭证）、`CLO`（担保贷款凭证）和`CDS`（信用违约互换），引入了新的风险管理实践。


  此前，银行通过提供或拒绝信贷来控制经济中的风险总量。这被称为风险管理的`发起-持有`模型（Santos, 2012）。然而，随着`CDO`、`CLO`和`CDS`的诞生，新的可能性被发现。在`发起-持有`模型下，银行将风险分配限制在抵押贷款、信用卡信贷、汽车贷款和学生贷款上。但现在，通过`CLO`，它们有了另一个渠道来分配其发起的贷款。结果，传统的`发起-持有`模型在其公司贷款业务的基础上演变为`发起-分销`模型。以`CDO`和`CDS`形式出现的进一步金融创新，导致这些模型演变为`发起`、`重新打包`和`出售`模型（Ansart
  & Monvoisin, 2015）。


  基于风险生产和交换的金融化，创造了涉及信贷操作的交易，这些交易内生于金融市场。由于这些交易涉及将风险转化为金融产品，我们观察到的是风险产品的分割和切碎，这成倍放大了流通中金融工具的名义价值（Davison,
  2015）。结果，它们以金融市场成交额增加、资产负债表扩大以及收入增长的形式表现出来。通过加剧的金融化进行风险转化的指数级增长，导致了金融债权和义务的激增，其结果是总财富中越来越大的部分不再以实物资产的形式存在，而是以金融资产或债权人债权的形式存在。这种增长也导致银行变得“大到不能倒”。


  ## TBTF


  自危机以来，“大到不能倒”（`TBTF`）一词一直占据着新闻头条。但这个术语日益流行并不令人意外。正如金融化可以被视为一个事件过程一样，`TBTF` 是一个在危机前就已逐步酝酿成形的迫近事件。事实上，包括拉古拉姆·拉詹、迪恩·贝克、史蒂夫·基恩、安·佩蒂福和努里尔·鲁比尼（Cooper,
  2015）在内的一些著名经济学家，都曾预测过金融市场的低效，警告我们注意不断上升的私人债务水平，并撰文指出即将到来的崩溃。所有这些经济学家也都警告过我们经济中日益加剧的金融化、市场放松管制、家庭债务水平上升以及经济衰退的风险。他们被系统性地、明确地忽视了。


  这种不屑一顾的行为，其根源首先在于将金融市场排除在宏观经济模型之外（见 Blanchard 等人，2010）。其次，对金融化也存在一种认知失调和逻辑谬误。由于金融业在我们社会的每个角落都无处不在，它已获得了一种信任感。如果当其他所有人都相信自由市场和风险适当分配时你却不信，那你还能相信什么呢？


  这种对经济理论、市场政策和社会心态的意识形态绑架，源于一种现在被称为“华盛顿共识”的货币思想实验。在这种意识形态下，市场纪律和自律足以防范金融机构的任何严重问题，并且如果任由其自行发展，金融体系不仅能更有效地配置资源，还能更好地重新分配风险。这种信念不仅广泛传播，而且具有传染性——国际货币基金组织、世界银行、美联储、欧洲中央银行和英格兰银行都受到了同一信念体系的影响（Ülgen,
  2015）。因此，雷曼兄弟和美国国际集团成为了`TBTF`，因为它们的倒闭是不可想象的（Admati 和 Hellwig, 2013）。


  正如可以从这个术语推断的那样，“华盛顿共识”以及`TBTF`的增长，其根源在于美国金融史的故事。由于金融化的普及和接受，在过去的 40 年里，认为对金融行业进行监管是不必要的观念已在社会中根深蒂固。1998
  年，艾伦·格林斯潘表示：“金融市场的参与者主要是专业人士，他们根本就不需要普通公众可能需要的客户保护。”一年后，美国国会几乎一致投票通过了`《格雷姆-里奇-比利雷金融现代化法案》`，该法案废除了`《格拉斯-斯蒂格尔法案》`，取消了银行的专营权，并终结了对商业银行业务与投资银行业务混合经营的禁令。正如共和党参议员菲尔·格拉姆（1999
  年`《格雷姆-里奇-比利雷法案》`的牵头人）所说：“我们已经认识到，政府不是答案。我们已经认识到，自由和竞争才是答案”（Myers-Lipton, 2009）。这几乎与大约
  15 年前里根在其总统就职演说中所说的话语如出一辙（见第 1 章侧边栏 1-1）。




  随着银行在经济中被赋予更大的发展自由，这也帮助它们实现了跨地域扩张。在 20 世纪的大部分时间里，银行在地域增长方面一直受到限制，因为《1927 年麦克法登法案》禁止全国性特许贷款机构在其注册州以外设立分支机构。与此同时，《1933
  年格拉斯-斯蒂格尔法案》将商业银行业务与投资银行业务分离，《1956 年银行控股公司法案》则将同样的禁令扩大到银行控股公司，这些控股公司本来是为了规避跨州银行业务限制而发展起来的（Maxfield,
  2013）。


  从 1994 年开始，美国政府通过《里格尔-尼尔跨州银行业和分行效率法案》放松了监管，该法案终止了对银行业务的地域限制，从而也终止了《麦克法登法案》（Ansart
  & Monvoisin, 2015）。最初允许跨州银行业务的决定，随着区域性银行并购的发展而迅速获得动力。前述的《1994 年里格尔-尼尔跨州银行业和分行法案》消除了跨州银行业务的联邦障碍，并在此过程中引发了一系列规模相仿银行的合并。再加上《1999
  年格雷姆-里奇-比利雷金融服务现代化法案》，它导致了**摩根大通**、**花旗集团**、**美国银行**和**富国银行**等银行的崛起（Maxfield, 2013）。


  由于过去 40 年的结构性变化以及随之而来的商业和社会的金融化，当今的市场由大型、复杂且高杠杆的公司组成，它们沉浸在一个证券被进行金融工程处理并与衍生工具挂钩的行业。这种相互关联的网状结构通常被吹捧为代表金融的适应性和创新性，因为它跟上了主流创业创新的步伐。


  例如，大型银行的支持者认为，大银行鼓励新金融创新的广泛采用，因为它们拥有庞大的客户群。因此，大型机构更有能力将技术投资成本分摊给更多用户，使它们能够以比新进入者更低的平均成本提供新的技术创新。这反过来又使银行能够提供规模经济，因为它们在一个统一的框架下为客户提供大量的服务。正是出于这些原因，银行才会进行并购，因为这使它们能够抓住机会，为客户提供一系列与交易相关的服务，例如融资、风险管理（以衍生品的形式）和外汇等。因此，银行组合提供多种服务在经济上更有效率。


  尽管这在一定程度上是正确的，但一个严峻的事实是，银行创新影响着支撑整个经济的货币和财政状况，因此该行业的变化会在更大程度上影响经济状况。虽然大银行可能提供更高的效率，但它们的规模也伴随着更多的流程、更多的繁文缛节、更多的透明度缺失以及更大的错误。


  以 2012 年**摩根大通**的“伦敦鲸”事件为例。当交易员通过执行一系列涉及信用违约互换的衍生品交易来实施其对冲策略时，其中一位**摩根大通**交易员布鲁诺·伊克西尔在市场上积累了庞大的信用违约互换头寸，并开始通过巨额押注扭曲市场。当信用违约互换市场的其他交易员开始注意到这一活动时，他们反向操作，开始建立与**摩根大通**头寸相反的头寸。与此同时，他们提出了异议，经过调查，最终美国最大的银行**摩根大通**遭受了
  62 亿美元的交易损失（Scannell, 2016）。


  对该事件的调查进一步凸显了大型机构的核心低效率。当被问及他的行为时，伊克西尔回应说，他 2012 年的行为不仅得到了授权，而且首席投资办公室和高级管理层反复指示他实施该交易策略（FT,
  2016）。根据他的解释，伦敦的投资办公室试图通过满足最低限度的监管要求来规避风险管理的资本监管法规。因此，交易员被激励去追求巨额收益，以至于他们不再关注简单的做法，而是专注于衍生品市场的复杂性，并忽视了压力测试提供的危险信号（Forelle,
  2012）。


  伦敦鲸事件只是危机后涉及“大而不能倒”银行的众多金融丑闻之一。自 2008 年以来，**汇丰银行**卷入了**伦敦银行间同业拆借利率**丑闻，**渣打银行**卷入洗钱交易，**摩根大通**、**花旗集团**、**美国银行**、**苏格兰皇家银行**、**巴克莱银行**和**瑞银集团**
  (也被称为“强盗俱乐部”) 都参与了操纵外汇市场（Independent, 2015）。在 2010 年至 2015 年间，**巴克莱银行**、**汇丰银行**、**劳埃德银行集团**和**苏格兰皇家银行**因操纵**伦敦银行间同业拆借利率**和外汇市场，以及错误销售支付保护保险事件而受到处罚后，总共承担了
  558 亿英镑的费用，用于应对行为与诉讼问题（Treanor, 2016）。在谈论效率时，令人惊讶的是，大银行的支持者们在他们的说辞中似乎经常遗漏这些事件。


  这些事件向我们表明，大银行有能力犯下大错误。虽然存在范围和规模上的好处，但这样的机构也更难管理和监督。因此，鉴于“大而不能倒”银行的影响力及其行动所带来的影响，银行的规模及其对货币和财政政策方向的掌控是一个值得公众讨论的话题。




  ## #终结“大而不倒”


  有人认为，拆分银行未必能带来更好的结果。大型银行的拥护者在辩论时常提出以下问题：


  -   如果二十年前银行就被拆分为更小的实体，危机是否就不会发生？

  -   通过拆分银行，能否计算出提升金融稳定性的成功概率？

  -   即使要拆分银行，又该拆分到什么程度？

  -   这种拆分是基于业务类型还是资产规模？

  -   由谁来决定如何拆分一家银行？


  所有这些问题都是合理的，需要得到回应。如果我们要求拆分银行，那么拆分标准就必须以该银行所产生的系统性风险衡量指标为依据。这反过来有助于我们理解：银行在构成系统性风险之前，其自然增长的临界点是什么；当达到这个极限时又该采取什么措施。如果按专业或业务职能拆分机构会降低其效率，那么反对这一做法的量化论据又是什么？就目前而言，对大型银行拥护者所提问题的大多数回应都基于主观判断。这并不是说这些回应毫无用处，但必须认识到，需要收集更多量化证据，以避免在执行明确的机构拆分指导方针时出现偏差。我们将在本书后续部分探讨这些量化方法。


  从更意识形态的角度看，也有人认为市场应该被允许犯错，这是创新过程的一部分。这种理由看似合乎逻辑，尤其是考虑到如今各行各业都在高唱创新口号。事实上，这种情况在过去也曾发生。20
  世纪 80 年代的储蓄和贷款危机中，3234 家储蓄贷款协会中有 1043 家倒闭（FDIC，2000 年），影响了数百万普通投资者。2000 年，科技泡沫的破裂确实影响了投资者和整个科技行业。然而，这些失败都没有构成系统性风险，也没有以金融崩溃为代价。金融体系的架构及其与其他机构的联系，使得大型复杂金融机构成为具有系统重要性的金融机构，对金融体系和经济构成风险。


  正是由于这些原因，关于终结“大而不倒”的讨论在公私场合不断回响并日益高涨。但正如所见，这是一个两面性的问题，在“大而不倒”的成本、范围和规模以及终结“大而不倒”的方式上存在分歧。随着讨论陷入僵局，最大的银行仍然“大而不倒”，持续对全球经济构成风险。


  必须记住，“大而不倒”并非危机的唯一原因。但银行救助后出现的失业、房屋止赎、储蓄损失以及纳税人的成本，体现了我们社会的金融化，展示了“大而不倒”银行处于金融体系核心的现实，同时突显了它们对危机严重程度以及其对全球经济所造成的广泛破坏的重大“贡献”。


  这并不是说在解决这个问题上毫无作为。监管改革后，大型银行和系统重要性金融机构现在被要求持有更多资本和拥有更大的流动性来源。根据《多德-弗兰克法案》，被认定为系统重要性金融机构的公司需接受美联储更严格的监管，必须参加压力测试，编写名为“生前遗嘱”的破产计划，并满足更严格的资本要求。所有这些措施以及其他许多改革，都是《多德-弗兰克法案》的成果，该法案旨在限制系统性风险，允许对最大的中介机构进行安全处置，对高风险的非银行机构进行更严格的审查，并改革衍生品交易。危机过后，这些措施不仅在美国实施，也在其他市场推行。根据《巴塞尔协议
  III》，每个国家的大型银行都必须满足更高的资本要求、进行年度压力测试、遵守额外的资本规定以及新的流动性和资产负债匹配要求。


  因此，监管机构如今进行的压力测试旨在评估那些最具核心重要性的机构能否抵御经济的内外部冲击。为了确保银行在无需大规模纳税人救助的情况下也能倒闭，监管机构采用了“生前遗嘱审查”程序。这迫使银行本质上思考自己的“死亡”，要求它们描述公司情况、风险暴露程度，以及在破产时如何重组而不引发金融不稳定或动用纳税人资金的策略。如果银行未能说服监管机构其有现实且安全的清盘计划，政府可根据《多德-弗兰克法案》的有序清算授权，在银行陷入困境时在法院系统之外对其进行处置。换句话说，银行有巨大动力确保其“生前遗嘱”具有说服力。


  所有这些措施都很重要，并且已取得了显著进展。表 2-1 总结了《多德-弗兰克法案》设定的一些目标及其执行程度。但尽管做出了这些努力，银行仍可能陷入困境，人们不禁质疑这些努力是否足够。随着危机从记忆中淡去，执行的紧迫性也在减弱。此外，还存在成本、范围和规模的问题：虽然“生前遗嘱”考虑了银行构成的威胁，但它未能考虑救助对社会造成的巨大不对称风险，以及大型银行倒闭对其他经济部门产生的广泛外部效应，包括失业、收入损失和财富损失。使问题更复杂的是，《多德-弗兰克法案》并未包含任何关于“生前遗嘱”的客观门槛或标准。例如，没有考虑破产计划必须在何种条件下运作：是在经济繁荣时期，银行单独倒闭时；还是在金融危机中，多家银行同时倒闭时。这是两种截然不同的情况，需要完全不同的计划。


