  伦敦银行间同业拆借利率（LIBOR）是通过全球主要银行提交的利率计算得出的平均利率。LIBOR 用于结算货币市场衍生品合约，也被用作基准来确定价值约 800 万亿美元的金融工具的支付，这些工具从复杂的利率衍生品到简单的抵押贷款不等。来源：《经济学人》：[`​www.​economist.​com/​node/​21558281`](http://www.economist.com/node/21558281)


  24


  定性宽松意味着针对特定资产，试图推高其价格并压低其收益率；而定量宽松则不具有针对性，旨在压低整个资产谱系的利率。来源：彭博社：[`​www.​bloomberg.​com/​news/​articles/​2014-10-31/​what-the-heck-is-japans-qqe2`](http://www.bloomberg.com/news/articles/2014-10-31/what-the-heck-is-japans-qqe2)


