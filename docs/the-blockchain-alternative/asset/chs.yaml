- '# 4. 复杂经济学：见证资本主义的新方式


  > 如果我们假设均衡，我们就为能在经济中观察到的东西设置了一个非常强大的过滤器。在均衡状态下，根据定义，没有改进或进一步调整的空间，没有探索的空间，没有创造的空间，没有暂时现象的空间，因此，经济中任何需要调整——适应、创新、结构变化、历史本身——的东西都必须被理论绕过或排除在外。结果是一个优美的结构，但却是缺乏真实性、活力和创造性的结构。——W.B.
  亚瑟，《复杂性与经济》，(2014 年)。


  2008 年底，伊丽莎白女王访问了伦敦政治经济学院经济系。在访问期间，她向在场的经济学家们提出了几个简单直接的问题：“为什么没有人预见到（危机）来临？”“如果这些事情如此重大，为什么大家都错过了？”（皮尔斯，2008）。虽然回答在深度和广度上各不相同，但有两个事实是明确的：首先，对市场是金融体系最佳管理者这一信条毫不妥协的错误自信，导致了金融化的加剧和不可持续的债务积累。其次，这种对市场能力的信念是基于学术经济学和政策制定中僵化的正统观念。这些理论不仅未能预见到即将到来的危机，还将金融体系削弱到政府被迫救助那些本应是问题根源的银行的地步。可悲的是，尽管正在采取一些措施来解决这些缺陷，但机构中正在教授和实践的根本理论仍有待彻底质疑，更不用说完全修改了。


  效仿女王问题的直率，前三章揭示了三个直截了当的事实——首先，日益增长的债务和经济金融化带来了系统性风险，并且目前是国家经济面临的最大挑战之一。其次，金融市场处于持续波动状态，新技术的加速涌现必将加剧这种变化状态的动荡。第三，当前管理市场、法规和政策的框架，在识别泡沫和崩盘的征兆方面显得笨拙且无能为力。本质上，经济思想中的主流流派，即有效市场假说和理性预期理论，正变得越来越不适合衡量和理解金融与宏观经济稳定。


  随着技术使金融体系更加复杂，这些问题将变得更加频繁。因此，与其专注于维持现状的方法，我们需要的是从根本上重新思考我们如何研究经济学，以及如何理解和衡量资本主义。如果不采用新的思维方式，我们将被迫承认永无止境的繁荣、萧条和危机循环的威胁。简而言之，我们不能期望用对过去工具和理论的顽固信仰来解决今天的问题，更不用说解决明天的问题了。




  '
- '# 引言


  具有讽刺意味的是，正通过研究技术史及其对资本主义的连续变革性影响，才能找到解决方案，因为每当我们面临新的技术趋势时，都会面对一个反复出现的讽刺性困境。一方面，技术使行业和服务更高效，更能满足我们的需求。但另一方面，它迫使我们重新构想需要执行的工作和任务类型，以及如何调整劳动力的教育和技能组合，以适应新的、更新的经济。重新思考经济学的任务似乎类似于一个可怕的难题——技术不仅迫使我们改变资本主义思维模式，而且我们还需要非常迅速地采取行动，才能跟上技术变革的速度。因此，要开启重新定义资本主义的最后一章，我们需要在静态经济理论的背景下理解技术变革的迅猛趋势。


  '
- '# 技术与发明：一个组合过程


  著名发明家兼未来学家雷·库兹韦尔（Ray Kurzweil）曾说过，当前技术趋势所呈现的指数级增长曲线，是基于技术“以技术为食”的倾向。鉴于我们当前所目睹的变化速度，如果我们接受所有已发明、正在发明和将要发明的技术都遵循同一套公式——即它们是已有技术的组合，而非纯粹源于灵感，那么这可以算是一个公允的说法。


  这对某些人来说可能像是一个常识性的陈述。过去，哲学家、历史学家、社会学家和经济学家，如刘易斯·芒福德（Lewis Mumford）、乔治·巴萨拉（George
  Basalla）、乔尔·莫基尔（Joel Mokyr）和保罗·罗默（Paul Romer），都提出过一些轶事性的理论来阐述这一概念。但是，如果我们想尊重波普尔（Popperian）科学方法来提出论断，那么我们需要查阅与此主题相关的研究来证明我们的假设。更重要的是，如果我们宣称技术是通过组合先前技术发明的零碎部分而创造的，那么我们也需要将这个假设扩展到发明过程本身，因为正是发明产生了新技术。


  圣塔菲研究所（Santa Fe Institute）和牛津马丁学院（Oxford Martin School）的研究人员发现，发明（以及由此衍生的几乎所有技术）都表现出这种组合现象。在
  2015 年由皇家学会（Royal Society）发表的一篇题为《发明作为组合过程：来自美国专利的证据》（Invention as a combinatorial
  process: evidence from US patents）的论文中，研究人员研究了 1790 年至 2010 年的美国专利记录，试图概念化发明——即我们如何获得新技术。专利被视为技术的“载体”或发明的“足迹”，因为它们留下了技术演变方式的文献轨迹。通过执行这项研究，研究人员能够证明，发明是将技术（无论是全新的还是以前使用过的）以未曾见过的方式汇集和组合的过程（Youn
  et.al，2015）。根据这项研究以及其他开始研究技术组合进化概念的研究，发明可以被概念化为组合的可能性。换句话说，发明仅仅是现有技术能力的新颖组合，本质上是进化性的。


  这种技术建立在先前或现有技术之上的倾向与生物进化非常相似。凯文·凯利（Kevin Kelly）以更简洁的方式类比了生物进化与技术进化。根据他的研究，自然和技术范式中看到的长期共同进化趋势共享五个共同的显著特征：专业化、多样性、普遍性、社会化以及复杂性。任何技术都表现出这五个特征。由于金融科技是本书和现代资本主义的主角之一，让我们分析一下这项技术的演变：


  金融科技根植于计算机的历史（参见注释：计算机简史）。最初，计算机是为非常特定或专业化的操作而制造的。例如，早期的计算机，如万尼瓦尔·布什（Vannevar Bush）在
  20 世纪 30 年代中期发明的微分分析机，是模拟计算设备，旨在求解常微分方程以帮助计算炮弹的轨迹。随着第二次世界大战爆发，这些计算方面的进步被各国军方采用和发展，通过集成密码学技术（一种自然选择）来传递敏感信息。为了对抗这一点，艾伦·图灵（Alan
  Turing）和他的导师马克斯·纽曼（Max Newman）等先驱开始设计和建造能够解密这些伪装的通信内容的自动化机器（图灵机）。这有效地改变了计算机的用途，并增加了计算机种类的多样性。


  战后，约翰·莫奇利（John Mauchly）、普雷斯珀·埃克特（Presper Eckert）和约翰·冯·诺依曼（John von Neumann，一位真正的博学家）等著名发明家的进步，促成了第一台二进制计算机——`EDVAC`（电子离散变量自动计算机）的诞生。随着二进制计算机的成熟，开发软件以向计算机发出指令的需求日益增长。打孔卡很快被逻辑门（来自布尔代数）所取代，而`COBOL`和`FORTRAN`（公式翻译）等语言帮助创建了早期操作系统。随着软件设计开始演变，计算机的功能也随之演变。`BASIC`、`LISP`、`SIMULA`、`C`、`C++`、`UML`、`Unix`、`Linux`等编程语言帮助构建了分布式通信网络、互联网，并最终形成了万维网。随着晶体管成本开始下降（摩尔定律），越来越多的任务实现了计算机化，导致了计算机在商业和生活的几乎所有功能中的普遍性。


  这种普遍性逐渐进入了贸易领域，进而扩展到金融。由于贸易是一种基本的社会互动，将计算机用于通信和价值交换的社会化，是一个自然的进化技术发展。过去二十年，通过数字渠道增加的社会化，导致了不同节点之间更多的互联，并形成了一个复杂的交织结构，其中没有一个中心点能够支撑整个大厦。随着计算的发展过程变得越来越分布式，计算的未来（以及金融科技的未来）必然会增加复杂性。选择、多样性、增量变异和时间进程（Wagner
  & Rosen，2014）将成为未来技术和资本主义的标志。


  正是最后的复杂性阶段，对我们理解现代资本主义构成了最大的智力挑战。正如前几章所示，银行业和商业的社会化和金融化所产生的高度复杂性，已经创造了一个不透明且难以监管的系统。金融系统中新技术的引入，如区块链，将帮助我们获得更高的透明度，但也会进一步增加系统的复杂性，因为每个参与节点都将成为通信和价值交换的一个点。如果监管者今天在识别系统性风险点和恶意参与者方面面临困难，那么在一个更具包容性和更复杂的无现金系统中，这个问题必然会变得越来越复杂。




  ### 其次，我们还需关注技术加速趋同的现象


  需要强调“技术加速趋同”这一概念，因为它为我们理解经济学与技术的研究和分析方式为何存在脱节奠定了基础。这种脱节尤为重要，因为技术演进的步伐及其对经济产生的颠覆性影响正变得越来越短、越来越快，如图
  4-1 所示。


  ![A426969_1_En_4_Fig1_HTML.jpg](img/A426969_1_En_4_Fig1_HTML.jpg)


  **图 4-1.** 康德拉季耶夫长波周期加速 来源：《经济学人》，“工业创新——乘风破浪”，1999 年。⁶


  随着技术的持续加速，它对经济产生了深远影响，因为技术性能的提升带来了生产成本的降低。`赖特定律`（1936 年）和`摩尔定律`（1965 年）表明，技术性能提高的同时，生产成本也会随之下降（图
  4-2）。西奥多·赖特（`赖特定律`的提出者）于 1936 年预测，随着技术随时间呈指数级改进，成本将随着累计产量的幂律关系而下降。麻省理工学院和圣塔菲研究所最近的一些研究表明，成本的指数级下降与产量的指数级增长相结合，将使`摩尔定律`和`赖特定律`难以区分（正如
  Sahal 最初指出的那样）（Nagy 等人，2013 年）。


  ![A426969_1_En_4_Fig2_HTML.jpg](img/A426969_1_En_4_Fig2_HTML.jpg)


  **图 4-2.** 技术曲线及其对生产成本的 经济影响。左图：`赖特定律`（1936 年）；右图：`摩尔定律`（1965 年） 来源：左图 - 维基百科；右图
  - `http://dx.doi.org/10.1371/journal.pone.0052669`


  技术的组合演化与其对网络化经济的影响之间的这种联系，不仅是理解技术进步经济影响的关键，也是理解现代资本主义核心信条的关键——技术与经济遵循着与生态系统相同的演化模式，并在此过程中增加了系统的复杂性。


  区块链（其本身是密码学、计算机科学、博弈论和货币经济学的结合体）只是增加经济学复杂性的一个元素。本书中讨论的其他技术也表明，当今大多数新创企业并非依赖单一技术来为客户提供价值。正是由于这种加速趋同，新企业能够比老牌企业遵循的路径更快地实现规模化。


  如果将经济视为一个生产代理网络，其中每个节点代表一个行业，那么由于技术的趋同性，一个行业生产的商品会被用作另一个行业的投入。当一个行业的技术开始与另一个行业的技术相结合时，就会产生创新，从而降低生产成本并催生新技术。随着投入成本降低或效率提高，新商品得以诞生。当新产品变得无处不在时，社会联系（包括管理模式）的改善，会带来更好的技术分配以及相关的规模经济效应。行业之间的联系越紧密，即经济结构网络化程度越高，这种现象的重复速度就越快，从而导致技术演化和生产成本降低发生指数级变化（另请参阅
  Farmer 和 Lafond，2015 年）。


  从以上表述我们可以推断，技术和投资决策处于持续变化的状态，很少是静态的。然而，尽管技术在经济中的内生作用在学术界获得了越来越多的关注，但经济学研究尚未实现向将经济变化视为一个沉浸于生态环境中的熵系统的转变。即使是在这个主题上被引用最多的论文之一——世界银行现任首席经济学家保罗·M·罗默于
  1990 年发表的《内生技术变革》——其模型也是围绕在技术变革下寻找均衡状态而构建的。⁷


  由于这些技术上的物质流伴随着货币流，技术变革的经济影响是同一枚硬币的两面。随着技术复杂性的持续增加，现代资本主义的网络化经济也必然会变得更加复杂。但尽管存在这种日益增长的复杂性及其伴随的熵，当今使用的经济模型仍然基于均衡状态。


  因此，如果我们想要纠正对技术和经济存在的脱节看法，就需要重新思考经济理论。当一个系统变得更为复杂时，新的联系会形成，旧的联系会被打破，这些创造性破坏运动的影响会创造一种持续变化或熵的状态。那么，为什么当我们学习经济学时，学到的却是均衡理论和理性预期理论，而实际发生的变化却是熵性的且大多是未预见到的，即非理性预期的？如果技术创造了复杂性，为什么经济理论仍基于均衡状态，尽管技术不断变化的性质对经济和资本主义具有高度的内生性？这种思维模式的一个主要原因基于我们如何认知地解释世界，以及我们为何总是试图预测未来。侧边栏
  4-1 提供了一些神经科学方面的见解。


  ### 侧边栏 4-1：理性预期的一个依据


  **来源：**《如何创造思维：人类思想奥秘的揭示》，雷·库兹韦尔（2014 年）；《组织变革的神经科学》，希拉里·斯卡利特（2016 年）；《领导组织变革的社会认知神经科学》，罗伯特·A·斯奈德（2016
  年）。


  理性预期基于人脑固有的工作方法论。我们必须记住，人脑并非在当今世界性都市环境中演化而来。它是在数千年前凶险的萨瓦纳环境中形成的，演化以实现两个主要目标：如何生存和如何预测。


  生存是大脑的自然状态，基于风险与回报之间的权衡。由于在人类的早期环境中风险更多，识别风险以求生存更为重要。因此，大脑更适应这种状态。当面对任何情况时，大脑会分析任何潜在的生存风险，这种原始本能反应更快、冲动和感觉更强烈，并且作为记忆留存时间更长。当某些刺激触发大脑的奖赏网络时，研究表明大脑反应较慢（因为这并非我们的自然状态）。这种感觉也较温和且相对短暂（几天后你就会忘记赞扬，但不会忘记辱骂）。




  为了在持续风险中生存，大脑必须具备预测能力。事实上，大脑可以被视为一个持续的预测机器，不断试图寻找安全并规避风险。我们大脑的`neocortex`（新皮层）持续预测着它将遇到的事物。这是一项巧妙工具，能够不间断地识别、记忆和预测模式，并形成关于我们将要体验到的假设。正如`Ray
  Kurzweil`所言，预测未来实际上是大脑存在的首要原因。下面的陈述例证了大脑如何持续进行预测，即使在没有明显危险迹象时也是如此：


  “I cnduo’t bvleiee taht I culod aulaclty uesdtannrd waht I was rdnaieg. Unisg the
  icndeblire pweor of the hmuan mnid, aocdcrnig to rseecrah at Cmabrigde Uinervtisy,
  it dseno’t mttaer in waht oderr the lterets in a wrod are, the olny irpoamtnt tihng
  is taht the frsit and lsat ltteer be in the rhgit pclae. The rset can be a taotl
  mses and you can sitll raed it whoutit a pboerlm”。


  但预测的过程是耗费精力的。大脑仅占我们体重的`2%`，却消耗了我们`20%`的能量。因此，大脑会试图通过走认知捷径来节省能量。它尝试使用抽象概念进行预测，即使我们面对的是具有多维特征的事件，大脑也会将事件模式表示为低层级模式的一维序列。换句话说，我们大脑内在的预测机制试图通过线性思维来节省能量。我们的大脑最擅长预测那些具有线性函数关系的事物。


  考虑这个简单的例子：一个球棒和一个球的费用共计€1.10。球棒比球贵€1。那么球的价格是多少？在大多数情况下，我们大脑本能预测出的第一个答案是 10 分钱。但如果我们将这个简单的计算推导出来，会发现球的实际价格是
  5 分钱。（(球棒 + 球 = 1.10)；既然 (球棒 = 1 + 球)；这意味着 ((球棒 + 球) = (2 * 球 + 1) = 1.10)；因此，2
  * 球 = 0.10；球 = 0.05）。


  大脑偏爱线性可预测性的历史倾向，可能解释了为何我们在技术变革背景下修改经济思维方式时会遇到困难。这两个学科过去可能都呈现出线性增长趋势。但正如我们在本章引言中讨论的，技术是基于`consilience`（知识整合）——即对旧技术的整合。


  随着技术日益数字化，技术的整合正在加速并以指数级速率进化。图 4-3 中所示的对数曲线就代表了这一事实。


  ![A426969_1_En_4_Fig3_HTML.jpg](img/A426969_1_En_4_Fig3_HTML.jpg)


  **图 4-3.** 摩尔定律：跨越 199 年并依旧强劲。图片来源：`BCA Research Special Report, ‘Human Intelligence
  and Economic Growth - From 50,000 B.C. to the Singularity’`（2013 年）。


  如图所示，这些指数曲线在经济史中是相对近期才出现的。当`Adam Smith`在 1776 年出版《国富论》时，经济学学科还代表着线性规模。技术演进的步伐要慢得多（参考图
  4-1），这促使社会科学中的经济学发展出那些最适合线性技术增长曲线以及我们线性预测思维方式的模型。在很长一段时间里，这是常态，而`理性预期理论`（`RET`）并非错误，而是对更简单经济体的自然反映。


  但随着技术进化并开始以指数级速率增长，它所带来的日益增长的复杂性正在挑战这一理论。`RET`基于经济学中的完全竞争理论，该理论预设了完备知识。但随着互动日益增多，经济系统参与者所持有的观点由于信息不对称而总是片面和扭曲的。那么，当我们并不拥有“完备”知识时，我们又如何能“理性地”预期任何事物呢？


  由区块链提供的信息将在一定程度上帮助我们解决这个问题，新的数据分析技术也将如此。但了解经济方方面面的尝试似乎是对完美的渐近追求。正是出于这个原因，在审视经济时，我们需要根据结果的可能性进行预测，而不是创建精确的线性模型。通过这一视角重新思考经济学的任务将是一项艰巨的挑战，但我认为仍然可行。近年来神经科学研究最令人惊讶的成果之一是大脑的`神经可塑性`（见注释）。大脑会根据新信息不断更新其认知地图或信念系统。随着新想法占据主导，旧的信念要么被升级要么被摒弃。经济学或许是一门古老的学科，但科学向我们表明，我们仍然可以教老狗学新把戏。




  '
- '# 经济熵与经济均衡


  技术通常按照科学方法进行研究，因为科学是技术的创造性引擎。哲学家卡尔·波普尔对科学方法做出了最佳阐述，他指出任何科学都应通过决定性实验来审视，以确定科学定律。根据这种方法（也称为波普尔可证伪性），任何科学定律的经验真理都无法被无可置疑地证实，也无法被绝对确定地认知。它们只能通过检验被证伪——即使一次失败的检验也足以证伪，而无论多少符合的实例都不足以证实。科学定律，进而对技术的研究，在本质上都具有假设性，其有效性仍需接受检验。


  虽然科学方法主要适用于自然科学，但其严谨性确保了事实的建立。但当我们对自然科学持有如此严格的标准时，却并未将同样的分析纪律延伸到社会科学，尤其是经济学。实际上，在过去几十年里，主流经济学已较少关注描述现实，而更倾向于将其理论建立在一个理想化的世界版本之上。其原因或许可以追溯到我们在侧边栏
  4-1 中讨论的神经科学发现。毕竟，传统经济学正在为一个对人类社会发展至关重要但困难的问题寻找答案——它想知道经济中的参与者（银行、企业、投资者和消费者）可能会如何应对他们共同创造的经济总体模式。更易于理解的线性模型提供了一种诱人的简单性。


  因此，为了回答这个问题，当代经济学更倾向于教条式地固守基于其认为合理的公理的理论。其中最著名的理论是有效市场假说（EMH），该假说将经济视为一个完美、理性、机械的实体，其中资产价格完全反映了所有可用信息。因此，参与者在总体上会以代表其掌握的所有信息的方式理性地行动（执行行动、制定策略、做出预测）。因此，根据理性预期理论（RET），所有参与者对未来都持有单一的最优看法，并且随着时间的推移，所有市场参与者都趋同于这一看法。如果某个参与者采取了与此看法相悖的行动，另一个参与者就会以一种利用该行动为其自身利益服务并抵消这种差异行为的方式行事。结果导致经济在起源上是静态的，并始终试图达到均衡。


  这一经济理论虽然非常雄辩，但却相当荒谬。它完全脱离了实际数据和任何形式的科学方法。虽然 EMH 声称参与者是“效用最大化者”，并基于 RET 做出决策，但几乎没有任何参与者有足够的时间或资源去经历优化过程并计算出最佳行动方案。即使参与者拥有所有信息，手头决策过程的复杂性（尤其是在当今技术带来的信息过载情况下）也意味着此类任务的计算必定局限于“足够好”，而非“在所有情况下都是最佳”。此外，参与者可能出于道德或迷信价值观做出选择，而这些可能与理性毫无关系。但无论是
  EMH、RET 还是任何经济学的数学框架，都没有考虑这些情况。它们不仅缺乏良好的科学实践，而且脱离了人类的利益和社会现实。


  经济学是一门社会科学，因为它涉及人以及体现在贸易行为和社会归属中的社会互动。尽管每个参与者都在为自身利益而努力，但他们看待世界的视角总是不完整的，他们的行动也总是带有偏见。正因如此，他们不会按照
  EMH 和 RET 所规定的那样采取适当行动。乔治·索罗斯在其“反身性理论”中，将这种不完整的世界观定义为“可错性原则”，将有偏见的决策过程定义为“反身性原则”。


  索罗斯首次在其 1987 年出版的《金融炼金术》一书中阐述了他的反身性理论。这本书取得了巨大成功，基金经理和投资者们争相挖掘他的投资秘诀。但很少有人关注他的反身性哲学。在书出版后的一次讲座⁸中，索罗斯本人也说：“（他书中的）哲学论点并没有给人留下深刻印象。它们大都被视为一个在商业上取得成功、自诩为哲学家的人的狂妄之词而被摒弃。”然而，这个理论之所以有趣，是因为不确定性在其中扮演了核心角色。


  不确定性通常是留给风险评估的概念。EMH 和 RET 并没有规定严格的行为准则或运作模式来涵盖不确定性的概念。然而，不确定性需要在根本层面上得到解决，因为参与者做出的经济决策是在不确定性中进行的。做出决策的参与者（无论是买入、卖出、生产、制定战略还是进行预测），还必须预测其他参与者将要做出的未来决策。毕竟，市场价格是参与者对未来将要发生事件的加权平均看法。由于未来取决于能否准确预测他人的决策，不确定性在合乎逻辑的经济决策中占据核心地位。


  RET 通过假设在每个市场中都存在一组单一的最优预期，且参与者的看法将围绕该预期趋同，从而规避了这个问题。但这一假设与现实毫无相似之处。在实践中，每个参与者都有不同的利益，而由于这些利益无法被知晓，参与者别无选择，只能在不确定性条件下做出决策。他们的决策必然基于信息不对称和个人偏见。这体现在资产价格扭曲、股票价格波动和货币波动性上。索罗斯将这种源于个人决策的波动性和扭曲现象称为“人类不确定性原理”。


  人类不确定性原理及其带来的波动性，是经济永远无法处于均衡状态的根本原因。参与者做出的个体决策导致价格扭曲，进而引发繁荣-萧条现象，导致泡沫、危机和衰退的产生。过去四十年间发生了
  8 次重大危机⁹，平均每五年一次。如果说经济中有什么是不变的，那便是它始终处于熵增状态。


  因此，在思考如何重新审视经济学研究时，首先要认识到经济中的参与者会对由他人以及自身创造的结果做出反应。由于这些决策会导致波动，我们不应将经济视为在均衡状态下运行的机器般的系统，而应更将其视为一个生态系统，其中各种行动、策略和信念同时竞争，并在此过程中创造出新的行为。换句话说，经济总是在形成和演化，并且不一定处于均衡状态。




  其次，我们需要考虑技术与经济之间的关系，因为经济创造技术的同时，也被技术所创造，这一点在前文中已作解释。技术对经济的影响也在近期诸多著作中得到了探讨，例如布林约尔松（Brynjolfsson）与麦卡菲（McAfee）合著的《与机器赛跑》（*Race
  Against the Machine*, 2011）。因此，经济不仅仅是技术的容器，更是技术的表达（Arthur, 2014）。随着技术的变革，市场、法规和政策也需要随之调整。本质上，技术变革重塑了经济结构。


  由于不确定性主体决策和技术演进所引发的持续变化，经济实际上通常处于非均衡状态，其表现更像是一个充满活力的生态系统中的有机体，结构在其中被不断构建与重构，并且强调对变化的开放性。正如技术内生于经济一样，非均衡也是如此。均衡可能存在，但它只是暂时的存在状态。非均衡才是常态。


  如果以此视角看待经济，那么技术与主体的相互作用，以及随之而来的组合与适应，正是复杂系统研究所反映的内容——这是一门观察任何系统中复杂性与涌现的深层规律的学科。复杂性理论诞生于
  20 世纪 70 年代（Wilson, 1998），最初受 19 世纪物理学启发，特别是经典力学、统计非平衡态物理和热力学领域（Helbing and Kirman,
  2014）。复杂性理论的主要原理借鉴了混沌理论、自组织临界性和适应性地形，从而聚焦于复杂系统如何生长、持续和崩溃。


  复杂性理论的首批学者在圣塔菲研究所（Santa Fe Institute）开始其理论构建，并将其对复杂系统的研究建立在抽象的非线性变换计算机模拟之上。他们试图在大型计算机辅助模拟中重现复杂系统中观察到的现象，无论是雨林还是大型强子对撞机中的质子碰撞。通过采用这种方法，他们试图更深入地理解与现实世界一致的综合性系统。过去，这群科学家在很大程度上被主流学术界忽视，因为传统学者认为他们的结论过于模糊且充满比喻。


  这在一定程度上源于两个原因：数据匮乏和计算能力低下，导致缺乏足够的证据来支持其理论。但过去二十年里，情况发生了变化。日益增长的数据量和指数级提升的计算能力，使得这门学科的研究者能够重现并研究复杂的操作，例如模拟质子碰撞后留下的残骸。随着复杂性研究获得关注，圣塔菲研究所的部分成员开始思考，他们掌握的方法和工具是否能够用于研究复杂经济系统中发生的相互作用？这一思想实验的结果，促成了
  20 世纪 90 年代初期复杂性经济学的诞生。


  复杂性经济学并不试图回避动态、充满活力且不断变化的经济生态系统中的复杂性和熵。相反，复杂性经济学的基础恰恰是利用那些包含非均衡现象的工具和方法。复杂性科学的数学基础建立在非线性交互的组成部分（主体）之上，系统在远离均衡的状态下度过大部分时间。系统可能表现出多种均衡状态，但这些状态是不稳定的、暂时的，因为反馈和涌现特性（如新技术）会产生反直觉的行为特征。系统被视为一个高度连通的网络，没有自上而下的控制参数，并且由于无法独立行动，主体不能随心所欲地行事。


  所有这些特征在我们当前的经济和金融市场中都能观察到，尤其是在考虑分布式价值交换网络的出现与日益流行时。然而，尽管如此，由于我们对过时的经济思想教条的依赖和依恋，我们仍然自欺欺人地认为经济在均衡状态下运行，并基于这一便利的观点来研究这一主题。


  令人惊讶的是，这种思维方式不仅在学术界，而且在经济治理中也占据主导地位。人们可能会想，如果商业银行正在向区块链技术投资数百万美元，那么政策制定者难道不也应该根据新系统的能力来更新其分析方法和模型吗？通过开发能够利用多个经济主体在透明无现金区块链上做出奈特式决策时的实时交易数据的工具和方法，为区块链的未来做好准备，难道不是明智之举吗？答案当然是否定的。


  尽管复杂经济系统与我们当前（及未来）的经济系统之间存在相似之处，但我们仍然继续使用基于一般均衡经济理论的模型，其中最流行的是动态随机一般均衡模型（DSGE）。基于
  DSGE 的模型自 20 世纪 80 年代初以来一直是宏观经济建模、经济预测和政策构建的主导工具，并至今仍扮演这一角色——例如，2009 年新西兰储备银行开发并采用了
  KITT（Kiwi 通胀目标技术）DSGE 模型，作为其主要的预测和情景分析工具（Beneš et al., 2009）。因此，要完全理解为什么我们需要考虑在区块链背景下使用基于复杂性的模型，我们首先必须回顾均衡经济模型。




  '
- '# 均衡经济模型的数学魔法


  如今，大多数中央银行都使用 DSGE 模型进行货币政策分析与商业周期预测。正如我们在第 3 章所见，货币政策和财政政策在引导市场状态与国家繁荣方面起着决定性作用。因此，鉴于这些模型在货币政策决策中的基础性地位，了解它们的历史、能力与局限性具有重要意义。


  目前，大多数中央银行，例如美联储和欧洲央行（ECB）¹³，使用两类模型来研究和预测经济走势（Axtell and Farmer, 2015）。第一类是统计模型，它将
  GDP、利率和失业率等变量的当前总量数据拟合到实证数据中，以预测/暗示近期的未来走向。第二类模型（应用更广泛）被称为"动态随机一般均衡"（DSGE）模型。这类模型的构建基于一个前提：若非受到经济外部事件的随机扰动，经济本应处于静止状态（即静态均衡）。


  尽管 DSGE 模型是研究商业周期行为的动态宏观经济模型，但其基础源于微观经济学，因为它们假定经济建立在追求最优化的代理人基础之上，这些代理人基于理性预期做出决策，以便在约束条件下最大化其目标¹⁴（Slobodyan
  and Wouters, 2012）。模型中的代理人以家庭和企业的形式呈现——家庭消费商品、提供劳动力、投资和交易债券，并以房地产或流动性形式积累资本。另一方面，企业制造商品、提供就业机会，并试图在约束条件下最大化利润。企业与家庭之间的相互作用引导经济经历商业周期的不同阶段，而中央银行则根据通胀、产出或其他经济状况的变化来调整名义利率。因此，在
  DSGE 模型中，中央银行扮演着一个反应性实体的角色（在泰勒规则¹⁵的背景下）。为了应对财政冲击，模型包含一部分"非最优化"的家庭，这些家庭会耗尽所有收入。在政治正确的语境中，这些家庭被称为"手口相传"家庭。请注意对商业周期、假设和理性预期的强调。


  这些模型的起源可以追溯到 20 世纪 40 年代，即凯恩斯《通论》（1936 年）出版之后。这部开创性著作发表后，政府机构和学术团体开始基于这种风格构建大规模宏观经济模型。根据凯恩斯宏观经济理论，人们提出具体或特定的规则，将其转化为变量，并创建相应的方程。在近三十年的时间里，这些新凯恩斯主义模型一直是宏观经济决策的中流砥柱。


  但随着 20 世纪 60 年代结束、70 年代来临，技术进步对这些模型赖以建立的假设提出了挑战。首先，由于这些模型依赖于通胀与失业之间的直接权衡，它们无法恰当地考虑技术的劳动力替代功能。其次，它们无法整合代表微观经济变化的变量，例如商品的弹性替代、劳动力供给弹性（特别是当技术替代体力劳动，使经济更偏向服务导向而非制造业密集型时）等。最后，它们未能认识到经济代理人的决策规则会随着货币政策的变化而发生系统性改变。这最后一个缺陷通常被称为"卢卡斯批判"。


  卢卡斯批判以及理性预期的引入（继 Muth 于 1961 年发表一篇开创性论文之后），导致了新凯恩斯主义模型的衰落。取而代之的是 DSGE 模型的出现。最早的
  DSGE 模型被称为真实商业周期（RBC）模型，于 20 世纪 80 年代初期引入，其基础是 Finn E. Kydland 和 Edward C. Prescott
  在 1982 年详细阐述的概念。RBC 模型基于商品和劳动力市场的完全竞争以及价格和工资灵活性的假设，并因其在匹配某些商业周期模式方面的成功而日益获得关注（Slanicay,
  2014）。这些模型将商业周期波动视为对外生变化的有效反应，这意味着商业周期是由"真实"力量创造的，而生产率冲击则是由技术进步创造的。


  然而，尽管在理论上有支撑认为技术是商业波动的主要来源，但经过一段时间的应用后，RBC 模型开始失去学者和政策制定者的青睐。大量实证研究发现，技术冲击对商业周期波动的贡献相对较小，而且
  RBC 模型对技术冲击下劳动力和生产率的预测开始遭到否定。它们被抛弃的第二个原因是其对货币政策的看法——在大多数 RBC 模型中，即使是在短期内，货币政策也被认为对实际变量没有影响。这与长期以来认为货币政策有能力在短期内影响生产产出和失业率的信念相悖（Christiano
  et al., 1998）。（另见"宏观经济学的问题"，Romer (2016)）。


  由于这些差异，RBC 模型开始经历一个演变阶段，从而产生了另一类 DSGE 模型，也称为新凯恩斯主义模型（NK 模型）。这些模型建立在 RBC 模型的现有框架之上，但其构建还受到当时在经济学领域日益受到青睐的一种新理论的影响——契约理论。大多数读者可能对这个理论并不陌生，因为开发该理论的三位¹⁶经济学家中有两位在
  2016 年 10 月获得了诺贝尔经济学纪念奖。


  契约理论将价格和工资刚性（参见边栏 4-2 及"工资刚性理论"，Stiglitz, 1984）的概念引入了 NK 模型。因此，较旧的 RBC 模型被增强了一些凯恩斯主义假设，即商品和劳动力市场上的竞争以及刚性。通过将名义价格和工资刚性纳入模型，短期名义利率的变化不会被通胀的同等变化所抵消，从而导致实际利率随时间而变化。由于实际利率的变化会影响消费和投资，生产产出和就业水平会根据新的总需求水平进行调整。因此，货币政策在短期内不再像旧
  RBC 模型中那样是中性的。




  '
- '# DSGE 模型的演进


  然而，DSGE 模型的演进远未结束。尽管契约理论允许引入刚性，使货币政策在短期内成为有效工具，但实证事实表明，模型预测与现实之间存在差距。近年来，格雷戈里·曼昆、里卡多·赖斯和劳伦斯·鲍尔等经济学家指出，这些模型中的粘性价格效应无法解释观测到的持续性通货膨胀（参见
  Mankiw & Reis, 2001, 2002）。这催生了一种新型刚性的引入——**粘性信息**。根据粘性信息理论，关于宏观经济状况的知识在经济体系中传播缓慢，这会影响家庭和企业的决策过程，进而影响工资和价格（Reis,
  2006）。这一见解也催生了 SIGE（粘性信息一般均衡）模型的创建，这是 DSGE 模型的一个新变体。


  所有 DSGE 模型都共享关于家庭和企业行为的核心假设，并且旨在体现市场与经济的自我调节精神。然而，它们仍然以均衡状态为前提。虽然企业会适应新的需求水平和不断变化的利率，但从长期来看，所有价格和工资据称都会进行调整，使经济回归其“自然均衡”（Slanicay,
  2014）。根据这些模型，当出现意外冲击时，经济会偏离其均衡状态，但经过一段时间后会恢复至均衡。调整过程的持续时间受名义刚性和实际刚性程度的影响（Goodfriend
  and King, 1997），而调整过程的渐进性将为潜在增进福利的经济（货币）政策留出空间，该政策旨在最小化扭曲，从而使经济在其均衡状态附近保持稳定（Slanicay,
  2014）。


  ## 边栏 4-2：契约理论与市场刚性简述


  来源：《DSGE 模型历史、理论与实证背景的一些笔记》，Martin Slanicay，2014 年；《粘性工资新凯恩斯主义模型的挑战》，Susanto Basu
  和 Christopher L. House，2015 年。


  作为雇员，我们拥有雇佣合同。作为债务人，我们拥有信贷合同。作为财产所有者，我们拥有保险合同。尽管合同中的双方都希望合作，但委托人（雇主/公司）和代理人（雇员）之间存在相互竞争的激励因素。契约理论正是处理个人、工人、雇主和政府之间这些相互冲突的激励因素。


  契约理论的作用是提供一种理解合同设计以及如何拟定更好合同的方法，以解决上述问题。该理论的力量不在于给出签订合同时要遵循的步骤，而在于赋予我们清晰思考相关问题所需的思维能力。


  这一点之所以尤为重要，有两个原因：首先，是风险问题。风险分担是关系的重要组成部分，因为雇员不希望承担企业在收入与利润波动时所面临的所有不确定性。另一方面，企业则希望将部分风险转嫁给工人，以便其成本与收入相匹配。


  其次，是合同不完整性问题。由于合同的所有要素无法被全部规定（总是存在不可预见的情况），因此总会面临一个问题：如果发生合同中未指定的意外事件，应该怎么办？如果陷入这种僵局，谁来决定应该做什么？这是一个关键问题，因为有权对合同未指定要素做出决定的一方拥有更大的议价能力，这将导致决策失衡。


  为了应对这些契约问题及其他类似问题，契约理论的开发者构建了一个理论框架，允许代理人和委托人为各种政策和制度设计合同。两位开发者都发挥了独特的作用。霍姆斯特罗姆提出了信息量原则，阐述了最优薪酬应如何与绩效挂钩；而哈特的贡献则在处理不完整合同方面取得了实质性进展。他们的工作得到了广泛应用，涵盖从如何处理公司股东与经理人之间的利益冲突，到投资者在破产中的权利，再到如何制定政治宪法等一系列问题。


  在新凯恩斯主义和 DSGE 模型的背景下，契约理论在以下方面发挥了作用：**劳动力市场灵活性**，即企业在雇佣员工数量和员工工作时间方面调整劳动力的能力；以及**价格粘性**，即产品/服务价格（尽管整体经济发生变化）因市场信息不完善或公司高管的非理性决策而难以改变的特性。


  工资和价格变化的这种“刚性”对 DSGE 模型至关重要，因为货币商业周期模型在很大程度上依赖于价格和工资刚性，而且实际工资和劳动力市场动态是通货膨胀过程的内在组成部分。因此，理解契约理论中的合同类型，有助于理解
  DSGE 模型的更精细运作。部分刚性类型如下：


  ### 显性合同


  显性合同用于正式商业协议，例如房地产或高价值资产的销售，以及涉及重大价值或义务的金融交易。对于 DSGE 模型而言，名义刚性侧重于长期工资合同以及关于价格和工资的长期协议对货币政策潜力的影响。其原因包括：

  -   （i）工资谈判对工人和企业双方来说都是耗时的；合同期限越长，这些交易成本的发生频率就越低；

  -   （ii）谈判可能失败，工人可能诉诸罢工行动以改善其议价地位；以及

  -   （iii）如果企业在面临负面需求冲击后降低了支付给员工的工资，而其他企业没有这样做，那么该企业的相对工资就会降低，从而可能增加劳动力流动率，这对企业来说成本高昂。


  长期合同的影响还取决于合同重新谈判是否同步（例如日本协商工资的“`shunto`”体系），或者经济体是否采用非同步的交错（错开）合同体系。在后一种情况下，面对冲击时，名义价格（工资）比前一种情况表现出更大的惯性。交错定价可以作为企业在信息不完善环境中的理性反应而产生。


  ### 隐性合同


  这类合同指的是双方就未来商品或服务交换自愿达成且自我执行的长期协议。在这种情况下，即使市场上可能有许多销售类似产品的公司，卖方也拥有一定的垄断权力。由于顾客会重复购买，企业有动力阻止顾客为寻找更优价格而在市场上进行搜索。频繁的价格变动会激励顾客另寻他处。虽然顾客会立即注意到价格上涨，但价格下降在顾客中引起的反应较小，因为其他企业的顾客需要时间才能注意到此类信息。再加上企业维护老客户的努力，顾客反应的这种不对称性导致了相对价格粘性。DSGE
  模型关注隐性合同，因为它有助于解释为什么实际工资经常偏离劳动的边际生产率。


  '
- '# 效率工资




  '
- '# 效率工资


  `效率工资`是指高于市场均衡水平的工资。管理者选择支付效率工资的一些原因是为了降低员工流失率并吸引高生产力员工。此外，如果员工的工作努力程度与实际工资率正相关，雇主可能有意将工资设定在均衡水平之上，以提高员工的生产力。


  ## 菜单成本


  `菜单成本`是企业因调整价格而产生的成本。菜单成本会阻碍企业设定最优价格，从而造成私人利润损失，然而这些损失低于菜单成本本身。通过采取“近乎理性行为”，这些企业偏离了最优价格（工资）设定，并减少了与搜寻需求（劳动力供给）变化信息相关的交易成本。在这种情况下，价格（工资）偏离最优值所造成的利润损失可以通过交易成本的降低来抵消。从企业角度看，这种行为可能最优，但却会导致总产出和就业水平的显著损失。


  ## DSGE 模型的局限性


  过去几十年中，`DSGE` 模型的广泛使用并非没有争议。随着经济日益互联，经济主体可获得的数据量越来越大。因此，经济主体的理性预期开始比以往更剧烈地波动。由于企业和家庭的预期无法观测，较老的
  `DSGE` 模型无法区分经济活动的变化是源于当前预期的改变，还是对过去计划的滞后反应。例如，它们无法确定企业资本投资的增长是归因于对销售额预期的修正，还是与早期投资计划相关的一系列渐进式资本收购的一部分（Brayton
  et al., 1997）。


  因此，美联储于 1996 年开始开发并使用一种新的宏观经济政策分析工具（此后经历了定期修订），即如今所称的 `FRB/US` 模型。根据美联储理事会的描述，“与动态随机一般均衡（`DSGE`）模型相比，其一个显著特点是在经济主体的预期形成假设之间进行切换的能力。另一个特点是模型的详细程度：`FRB/US`
  包含了美国国民账户中产品和收入方面的所有主要组成部分”。（斜体文字摘自 2014 年 4 月发表在美国联邦储备委员会网站上的一篇文章。参见下方网站链接¹⁷）。


  鉴于该模型的范围和规模，`FRB/US` 模型可以被认为是当今使用的最先进的宏观经济政策工具（尽管对此模型存在各种批评，这些批评可以追溯到该模型概念化初期的 20
  世纪 70 年代）。但 `FRB/US` 模型仍然是一个“美国经济的大规模估算一般均衡模型”（美联储理事会，2014）。前一句中需要强调的关键词是“估算”和“均衡”。自
  20 世纪 60 年代至今，几乎存在的每一个模型都基于这两个术语。无论我们使用传统结构模型、理性预期结构模型、均衡商业周期模型，还是向量自回归（`VAR`）模型（参见注释“宏观经济模型类型”），这些模型赖以构建的基础参数都是假设、估算和均衡。


  ## 金融部门的缺失


  其次，金融市场并未被真正纳入模型。我们已快速讨论过的 `DSGE` 宏观经济模型系列，是在大稳健时期（1983‑2008 年）作为芝加哥学派与新凯恩斯主义方法之间的综合产物而出现的。这是一个经济相对稳定的时期，使得政策方法只能依赖于货币政策（即利率）的运用。这是因为以芝加哥学派为主导的思想认为，应对商业周期和/或衰退趋势所需的一切就是积极的货币政策。有些人甚至认为连这都不需要，因为他们相信自由市场调整总能找到出路（Garcia,
  2011）。新新凯恩斯主义者也持有这种信念，他们认为不需要财政政策来处理商业周期或衰退趋势。因此，两个学派都汇聚于一种观点：避免商业周期或衰退趋势风险所需的一切，就是由一条货币规则引导的巧妙货币政策（García,
  2010）。其结果是财政政策逐渐被排挤，对财政政策替代方案的关注甚至更少。然而，危机向我们展示了，如果仅由财政政策指导，经济政策可能多么无效。这也是提出基于区块链的财政政策系统的主要原因之一。（另见：“货币融资的理由¹⁸——一个本质上的政治问题”，Turner,
  2015）。


  这种被广泛接受的假设——金融市场将基于经济主体做出逻辑决策而成为价格的最佳决定因素，因此无需将金融市场模型纳入考虑——与 `EMH` 直接相关。如果市场有效地反映了资产价格，那为什么还要费力为金融部门建模呢？这一逻辑基于两个假设：首先，金融部门总是趋向于均衡；其次，金融市场是完备的，即不平衡（违约、破产、流动性不足等）会随时间得到平衡。但正如我们在前几章中所见，这并不反映现实。因此，得知
  `DSGE` 模型无法捕捉国际金融联系的完整图景也就不足为奇了（Tovar, 2008）。


  ## 理性预期理论（RET）前提


  `RET` 前提是 `DSGE` 模型的另一个缺陷。有充分的科学证据，特别是来自 1993 年诺贝尔经济学奖得主道格拉斯·C·诺斯的证据表明，在不确定性下，不存在理性行为的确定性。用他自己的话说：


  > “弗兰克·奈特（1933）对风险和不确定性做出了根本性区分。在前者的情况下，可以通过足够的信息推导出结果的概率分布，因此选择是基于该概率分布做出的（保险的基础）。但在不确定性的情况下，不存在这样的概率分布，因此，引用两位最杰出的经济学实践者的话，‘在这种情况下无法形成任何理论’（Arrow,
  1951 p. 417），以及再次引用‘在不确定的情况下，经济推理将价值不大’（Lucas, 1981, p. 224）。但人类在纯粹不确定性的条件下确实一直在构建理论——并且确实依据这些理论行事……正是广泛存在的神话、禁忌、偏见和仅仅是不成熟的想法构成了决策的基础。事实上，塑造政体和经济发展方向的大多数基本经济和政治决策都是在面对不确定性时做出的。”（道格拉斯·C·诺斯，‘经济学与认知科学’，*Procedia
  - 社会与行为科学杂志*，2010）。




  另一位诺贝尔奖得主丹尼尔·卡尼曼在其前景理论中提出了类似的观点。卡尼曼能够凭经验证明，不确定性下的决策并不指向“行为人的理性行为”，而是风险规避主导了行为。斯坦福大学心理学社会科学荣誉教授阿尔伯特·班杜拉在其社会认知理论中也提出了类似的主张，他指出：


  > “理性取决于推理技能，而这些技能并不总是得到良好发展或有效运用。即使人们知道如何推理，当他们基于不完整或错误的信息进行推理，或者未能充分考虑不同选择的全部后果时，也会做出错误的判断。他们常常通过认知偏差以错误的方式解读事件，从而产生关于自身和周围世界的错误信念。当他们按照这些在他们看来主观合理的误解行事时，会被他人视为行为不合理或愚蠢。此外，人们通常知道应该做什么，但会被令人信服的环境或情感因素所左右而做出其他行为。”（班杜拉，《社会认知理论》，1998
  年）


  在`DSGE`模型背景下，强调理性预期理论的作用至关重要，因为它们在这些模型中充当输入变量。正如在`DSGE`模型和`FRB/US`模型中所见，主体预期是政策影响经济的主要渠道（斯博多内等人，2010
  年）。但如果结构参数基于错误假设的微观基础，那么即使该模型在技术上是卢卡斯批判稳健的，它也注定会做出糟糕的预测并存在错误。


  最后，它们对均衡的执着是这些模型的祸根。`DSGE`模型基于一个绝对的信念，即市场调整总会趋向均衡。这一信念基于四个原则：（i）在预算约束下，消费者总是最大化其个人效用；（ii）在资源约束下，生产者总是最大化其利润；（iii）市场可能因外生冲击而变得动荡，但这总会在几个季度后恢复到均衡状态；（iv）主体基于理性预期做出决策。因此，即使冲击使经济偏离稳态增长，在几个季度内，市场也会经历一个动态调整过程，并恢复到此前的状态。


  因此，`DSGE`模型建立在经济存在稳态均衡的假设之上。它们允许实际时间向该稳态移动，也允许三个整合模块（供给、需求和货币政策）之间的动态相互作用。因此，`DSGE`标签中的“动态”方面——即关于未来的预期是决定今日结果的关键因素（斯博多内等人，2010
  年）。它们也允许在走向该稳态的路径中存在一个随机（即随机的）元素。但其基本前提是一个无所不在的均衡状态的存在。图 4-4 提供了一个图形化解释：


  ![A426969_1_En_4_Fig4_HTML.jpg](img/A426969_1_En_4_Fig4_HTML.jpg)


  图 4-4.


  `DSGE`模型的基本结构 图片来源：《使用`DSGE`模型进行政策分析：导论》，纽约联邦储备银行


  这些模型总是趋向均衡，是因为它们被构建成以这种方式运行，而不是因为它们准确解释了现实经济。花旗集团首席经济学家威廉·比特指出，这种构建模式的主要原因之一是政策决策往往会产生非线性行为。由于这种非线性与主体不确定性的相互作用会产生复杂的数学问题，`DSGE`建模者移除了非线性元素，并将随机变量的复杂演化简化为一个带有加性随机变化的线性系统。在一篇题为《`DSGE`模型与中央银行》的文章中，国际货币基金组织高级经济学家卡米洛·E·托瓦尔也支持这一论点，他指出：“存在与当前`DSGE`模型错误设定程度相关的重要担忧……`DSGE`模型过于程式化，无法真正以有用的方式描述数据的动态变化”（托瓦尔，2008
  年）。在同一篇由国际清算银行发表的文章中，他还指出：“当前`DSGE`模型可能的主要弱点在于缺乏适当的金融市场建模方式。”


  然而，这些模型所依据的前提代表了一个更大的问题。在一篇题为《大多数‘最先进的’学术货币经济学的不幸无用性》的短文（发布于经济政策研究中心网站）中，威廉·比特解释了使用基于线性和均衡的`DSGE`模型的后果：


  > “当你对一个模型进行线性化，并用加性随机扰动对其进行冲击时，一个不幸的副产品是，由此产生的线性化模型要么以非常强烈的稳定方式运行，要么以无情的爆炸性方式运行。这类模型中不存在‘有界的不稳定性’。动态随机一般均衡圈子看到经济在过去没有无界地爆炸，并由此得出结论，认为在线性化模型中排除爆炸性解轨迹是合理的。他们剩下的是一个在外生随机扰动后会相当迅速地恢复到确定性稳态的东西。没有`L`型衰退。没有累积因果和衰退或扩张的有界但持续的过程。只有漂亮的`V`型衰退……

  ……

  ‘从随后用于实际数值政策分析的模型中移除所有非线性和大多数有趣的不确定性方面，是一个重大的倒退。我相信，在那些重要的中央银行中，这现在已经被扔进了历史的垃圾堆。’……

  ……

  ‘自 1970 年代以来大多数主流宏观经济理论创新……充其量只是自我参照、内向型的干扰。研究往往由既定研究项目的内部逻辑、智力沉没成本和审美难题所驱动，而不是由理解经济如何运作——更不用说理解经济在压力和金融不稳定时期如何运作的强烈愿望所驱动。’……（比特，2009
  年）”


  这些陈述不仅反映了经济理论的糟糕构思，也反映了数学上的无知和傲慢，这正在将经济学变成科学不良应用的反面典型。世界银行现任首席经济学家保罗·罗默在其论文《经济增长理论中的数学化》中探讨了过去七十年这一趋势的增长。罗默将数学化定义为：“它让学术政治伪装成科学。如同数学理论，数学化使用文字和符号的混合，但它没有建立紧密的联系，而是在自然语言与形式语言的陈述之间，以及在理论内容与经验内容的陈述之间留下了足够的滑动空间。”（罗默，2015
  年）（另见《宏观经济学的问题》，罗默，2016 年）。




  '
- '# 罗默的分析及经济学中理论模型的误用


  罗默的分析检验了经济学领域多篇开创性论文的数学基础，包括索洛 1956 年的增长数学理论、加里·贝克尔 1962 年的工资数学理论、麦格拉顿与普雷斯科特 2010
  年关于价格接受型增长模型的论文，以及博尔德林和莱文 2008 年关于完全竞争创新的论文。他还分析了其他著名经济学家的工作，例如罗伯特·卢卡斯（1995 年诺贝尔经济学奖得主）和托马斯·皮凯蒂（《二十一世纪资本论》作者）等。他的分析揭示了“数学伪装”如何被反复用来篡改数据以适配模型。更令人不安的是，这些做法已被学术界接受，这使得经济学学科背离了波普尔的科学检验方法。以下摘自其论文的片段能说明这些观点：


  > “除了使用与其正式模型不一致的词语外，博尔德林和莱文（2008）还做出了与任何形式分析脱节的大胆口头论断。例如，他们声称基于欧拉定理的论证不适用，因为只有在没有产能限制的情况下价格才等于边际成本。罗伯特·卢卡斯使用了同样无依据的口头论断来否定书籍或蓝图在创意模型中的作用：‘有些知识可以“体现”在书籍、蓝图、机器和其他形式的物质资本中，我们知道如何将资本引入增长模型，但我们也知道这样做本身并不能提供持续增长的引擎。’（Lucas
  2009, p.6）……这一疏忽在论文工作稿阶段或出版前的审稿过程中未被发现，这或许揭示了经济学领域的新平衡。无论是阅读工作稿的同事、审稿人还是期刊编辑，都没有认真关注数学推导。……也许我们的规范很快就会变得像职业魔术一样；揭露某人戏法的手段将变得不礼貌，甚至可能构成违反职业道德的行为。”（Romer,
  2015）


  罗默的论文受斯坦福大学金融学教授保罗·普夫莱德雷尔 2014 年发表的一篇论文启发。在这篇题为《变色龙：金融与经济学中理论模型的误用》的论文中，普夫莱德雷尔讨论了金融和经济学中的理论模型如何被以使其成为“变色龙”的方式使用：这些模型建立在与现实世界联系可疑的假设之上，但其结论却被不加批判地（重点强调）应用于理解我们的经济。普夫莱德雷尔指出，大多数经济模型会“精挑细选”想要使用的数据来支持预期结果。任何不符合这一功能的数据都被排除在外，因此结论不仅取决于包含什么数据，还取决于排除什么数据。他认为，之所以出现这种情况，是因为模型（尤其是其假设）并未总是接受必要的批判性评估，以检验它们是否以及如何适用于现实世界（Pfleiderer,
  2014）。


  普夫莱德雷尔在其论文中列举了几个“变色龙模型”的例子。但有一个例子值得引用并强调，因为它与债务主题直接相关，而债务是本书的主要议题之一。边栏 4-3 摘录了他论文中的部分内容，为本次对均衡经济模型的批判提供了一个恰当的总结。


  ## 边栏 4-3：一个关于债务的“变色龙模型”


  *来源：《变色龙：金融与经济学中理论模型的误用》，Pfleiderer (2014)。*


  2012 年 4 月，哈里·迪安杰洛和勒内·斯图尔茨发表了一篇题为《为什么高杠杆对银行是最优的》的论文。这里的论文标题很重要：它强烈暗示作者声称的内容与现实世界中的实际银行有关。在论文引言中，作者解释了其模型的设计目的：


  > “为了证明高银行杠杆是专注于流动性债权生产的中介活动的自然（无扭曲）结果，该模型排除了代理问题、存款保险、税收以及所有其他扭曲因素。通过设定这些理想化条件，该模型显然忽略了现实世界中银行资本结构的一些重要决定因素。然而，与
  MM 框架——以及仅包含杠杆相关扭曲的推广模型——相比，该模型允许银行作为流动性生产者发挥有意义的作用，并清楚地表明，如果将 MM 模型扩展以考虑这一作用，那么银行持有高杠杆就是最优的。”

  >

  > [普夫莱德雷尔重点强调]


  换句话说，他们的模型旨在证明：如果我们排除许多重要因素，仅仅关注单一因素，就能得出银行应该高杠杆的特定结论。这一论点从实际效果上看，与另一篇虚构论文《为什么高酒精摄入对人类是最优的》（作者：百加得与蒙大维）中的论点如出一辙。在论文引言中，百加得和蒙大维解释了其模型的作用：


  > “为了证明高酒精摄入是人类液体饮料消费的自然（无扭曲）结果，该模型排除了肝病、酒驾、健康益处、家庭暴力、失业以及所有其他扭曲因素。通过设定这些理想化条件，该模型显然忽略了现实世界中人类酒精消费的一些重要决定因素。然而，与酒精中性框架——以及仅包含过度消费相关扭曲的推广模型——相比，该模型允许人类作为生产饮酒时那种愉悦‘兴奋感’的主体发挥有意义的作用，并清楚地表明，如果将酒精中性模型扩展以考虑这一作用，那么人类在醒着的所有时间里都饮酒就是最优的。”

  >

  > [普夫莱德雷尔重点强调]


  迪安杰洛和斯图尔茨的模型显然是一个书架理论模型，如果我们想将其结果直接应用于现实世界，它无法通过任何合理的过滤器。除了忽略了大量重要因素（代理问题、税收、系统性风险、政府担保及其他扭曲因素）外，他们主要模型的结果还建立在银行资产无风险的假设之上，并基于一个在存款融资资产百分比上呈线性的假定目标函数。鉴于此，作者自然地得出了资产
  100%由存款融资的角点解。（他们没有明确模型讨论银行资产有风险时会发生什么，但声称当存在风险时，银行杠杆仍应保持“高”水平。）


  迪安杰洛和斯图尔茨的论文很好地说明了我的主张：人们通常可以开发一个理论模型，在很大范围内产生任何想要的结果。想要一个证明银行应该 100%由存款融资的模型吗？这里有一套假设和论证，就能给你那个结果。这样一个模型的存在本身并不能告诉我们什么。在未经过滤的情况下声称其相关性，它就成了一只变色龙。


  有人可能会问：“即使迪安杰洛/斯图尔茨模型以‘变色龙’的方式呈现，那又怎样？有什么危害呢？”难道看论文的人不会意识到它的局限性吗？有些人会，但并非所有人。例如，在
  2013 年 9 月 14 日《经济学人》杂志一篇题为《资本惩罚：强迫银行持有更多资本可能并非总是明智之举》的文章中写道：




  南加州大学的 Harry DeAngelo 和俄亥俄州立大学的 René Stulz 在一篇新论文中指出，这种溢价意味着银行与其他公司不同，并非如 Modigliani-Merton
  定理所暗示的那样对杠杆率漠不关心。DeAngelo 和 Stulz 证明，即使没有存款保险和隐性担保等摩擦，银行采取高杠杆经营也更有利。[参见《经济学人》印刷版，2013
  年 9 月 14 日《资本惩罚》一文]


  至少，变色龙会制造噪音，并加剧公众对重要问题的误解和困惑。


  Pfleiderer 的分析表明，我们迫切需要一种新的方法来理解经济。DSGE 模型未能预测到危机，因为它们基于不切实际的假设（例如无限信贷），并且是现实世界极其简单的讽刺画，未能考虑到经济从未处于均衡状态，而是处于持续的适应性变化之中。


  我们今天需要一种基于现实经济中发生的复杂相互作用的经济建模方法，这些相互作用创造了一种熵（`entropy`）状态，而非均衡状态。幸运的是，有一种方法可以利用复杂性科学的方法和工具，通过基于主体的建模（`agent-based
  modelling`，`ABM`）来实现这一壮举。使用这些方法，我们可以在计算机中模拟数百万个虚拟家庭、企业和个体的行为，并观察它们被允许相互作用时会发生什么。


  采用此类新技术不仅将使经济学研究更加科学，还将引入一种思考经济学的新方式。对 DSGE 模型的批判向我们展示了经济学研究多年来的演变过程。然而，大部分努力都集中在以相对次要的方式对现有理论进行修修补补，以解释经验事实。经济学家固守过去的理论，并试图修正它们以更好地理解变化的经济。但这种方法对于理解经济体演化过程中出现的结构性变化几乎未能提供任何见解。例如，经济系统可以发展成为一个具有自下而上参与性以及新的竞争、效率和增长模式的分布式价值交换系统，这一想法几乎没有受到关注，因为参与式去中心化组织的概念被认为与高效的经济结果不相容（Helbing
  和 Kirman，2014）。


  当今的经济学研究，就是在个人电脑上利用少量数据来创建和求解与现实几乎毫无相似之处的抽象简单模型（Axtell 和 Farmer，2015）。当前的模型将数百万个体浓缩为一个家庭，将数千家企业浓缩为一家企业，然后在无限远的未来理性地优化其风险调整后的折现预期收益。而这一切都只靠一台笔记本电脑和一些数学知识完成。值得注意的是，我们创建并运行的模型使用最大的计算机来处理拍字节（`petabytes`）的数据，以预测全球气候变化、进行石油/天然气勘探、分子建模和天气预报。但当涉及到对经济进行建模时，显然一台笔记本电脑和一些精心挑选的数据就足够了。（参见原书脚注
  20）华尔街的金融公司会雇佣气象学家团队，运行一个超算集群，以便在识别新兴天气模式方面获得微弱优势，但它们却不使用或认为 DSGE 模型毫无用处，这本身就充分说明了后者价值几何。如果经济学家的
  DSGE 模型能为经济运行方式提供任何洞见，它们也会被以同样的方式使用（彭博观点，2014）。


  当前主流经济学的主要问题在于其方法论。痴迷于构建能展示逻辑蕴含确定性的模型，已经阻碍了相关且现实的经济学的发展。坚持形式化（数学）建模迫使经济学家放弃现实性，用公理化的东西替代现实世界的相关性（Syll，2016）。然而，现实拒绝屈服于经济学家对其模型所要求的理论优雅性。以数学为模型的主流经济学，主要是演绎性的，并建立在公理化基础之上（Sinha，2012）。


  复杂性经济学（*complexity economics*）给我们提供了一个机会，让我们重新思考研究经济学的方式，并利用区块链所提供的透明度。当我们开始学习复杂性经济学时，必须记住两点：第一，经济从未处于均衡状态，而是处于持续的适应性变化之中。第二，我们应该通过一种相对较新的计算技术——基于主体的建模（`ABM`）——来拥抱现实经济中发生的复杂相互作用。让我们看看如何让老狗学会新把戏。




  '
- '# 复杂经济学与基于主体的建模导论


  > “科学是现实的诗歌”，理查德·道金斯


  如果要为观察和衡量经济提供一种新视角，我们首先需要追问：为何经济学采纳了“经济是一个均衡系统”这一本体论概念，并借用了与之配套的数学工具？这个问题的答案，需追溯至经济学作为一门正式学科的开端。


  19 世纪 70 年代，法国数理经济学家莱昂·瓦尔拉斯偶然读到一本由法国数学家兼物理学家路易·潘索所著的《静力学原理》。该书代表了当时数学和物理领域的前沿水平，探讨了静态均衡系统分析、联立方程及相互依存方程等概念
  (Beinhocker, 2007；另见 Mirowski, 《More Heat than Light》, 1991)。瓦尔拉斯大量借鉴此书，形成了自己的理论，最终提出边际价值论并发展了一般均衡理论。他并非唯一这样做的人，同时代的经济学家威廉·斯坦利·杰文斯也如法炮制，从开尔文勋爵和彼得·格思里·泰特合著的另一本著名物理教科书《自然哲学论》中汲取养分²¹，并独立发展了边际效用价值论²²。


  这些经济学家主张经济学是一门研究数量的数学科学，由此开启了经济思想史上的一个新篇章。事实上，瓦尔拉斯将潘索的思想推向了极致，他将经济主体简化为遵循物理定律、既不会学习也不会适应新行为的原子
  (Walker, 1996)。


  从早期开始，经济学逐渐被当作一门基于均衡方程的数学学科来对待，经济主体则按照市场的总体趋势行事（参见前文罗默关于“数学味”的注释）。这种遗留影响至今犹存，体现在最大化原则（例如效用）上——它模仿了物理学中的最小化原则（例如最小作用量原理）(Sinha
  et al., 2010)，也体现在“货币流通”这一概念上——这是由（以菲利普斯曲线闻名的）比尔·菲利普斯根据其建造的 MONIAC²³ (图 4-5) 所提出的。将宏观经济运动映射为流体运动，表明这些思想家将经济视为一个物理研究客体。


  ![A426969_1_En_4_Fig5_HTML.jpg](img/A426969_1_En_4_Fig5_HTML.jpg)


  图 4-5.


  A.W.H. (比尔) 菲利普斯教授与菲利普斯机器 (MONIAC) 来源：Nicholas Bar，《菲利普斯机器项目》，《伦敦政治经济学院杂志》，1988
  年 6 月，第 75 期。


  然而，20 世纪 50 年代约翰·冯·诺依曼引入的数学博弈论，却给经济学与物理学之间的这种联系投下了一枚炸弹。当博弈论被引入（参见冯·诺依曼和摩根斯坦的《博弈论与经济行为》），经济学界立即意识到，该领域的数学方法可用于研究经济中自私主体如何胜过其他主体的行为。但在以真实对象进行的实验中，主体却表现出非理性的合作行为才是常态
  (Sinha et al., 2010)。因此，经济学家们还原并接受了一个抽象观念：经济会收敛于均衡，在此过程中，一个主体的负面行为会被另一个主体的正面行为所抵消。复杂经济学试图解决的正是这一谬误。


  我们目前所看到的是，尽管我们使用确定性和公理化的模型进行经济研究，但经济现象并非源于确定性、公理化、可预见或机械化的规则。过去古典和新古典经济学家所采用的还原论方法，忽视了不同主体之间的相互依赖和相互联系、它们对彼此的影响以及这些互动带来的宏观经济后果。经济学家们不是去分析这些互动，而是将一个系统的总体行为简化为一系列基本规则，然后试图单独研究这些部分，以期了解整体图景。这种方法为他们提供了特定经济现象的聚合视图，随后这些视图被概括并应用于解释经济的合理行为规则。这种还原论排除了对主体所创造展现模式的研究，并简化了它们各自的后果，从而在现实与其形式化表达之间造成了脱节
  (Bruno et al., 2016)。


  复杂经济学挑战了均衡、原型主体和理性行为等基本的正统假设。它试图通过强调网络效应、反馈回路和主体异质性的重要性，来改变经济学研究的叙事方式。公理化、线性化和一般化被对主体间相互联系、关系相关性以及它们对经济环境（反之亦然）影响的深入研究所取代。异质的、相互作用的主体根据从环境和其他主体接收的新信息做出新决策，取代了传统上那些“理性”的、在时间静止状态下做出决策的独立主体
  (Gallegati and Kirman, 2013)。


  时间和信息在这一新的经济思想范式中扮演着关键角色，因为它们凸显了中层结构的重要性——即连接经济体微观与宏观结构的“结缔组织”。在复杂经济学中，抽象和教条的理论被对模式的研究所取代，这些模式产生于相互作用的主体接触新信息、做出影响周围其他主体的决策，并在此过程中改变经济环境结构之时。随着经济及主体决策随时间变化，新的结构得以形成。因此，复杂经济学是关于形成的——基于外生和内生变化，经济体内新结构的形成，以及这些形成过程如何影响引发它们的那些主体
  (Arthur, 2013)。


  信息也发挥着关键作用，因为决策的变化和新技术的引入影响着知识与诀窍的集中与分散。由于信息不断变化，主体必然相互作用以增加对这些变化的认识。由于相互作用无处不在，这加剧了非线性并催生了冲击，从而削弱了因果之间的直接比例关系：一次小冲击，基于主体对该冲击的解释，可能导致巨大的影响。这也意味着，由于主体具有处理信息并根据新信息做出相应决策的认知能力，标准的物理学工具不能`sic
  et simpliciter`（简单照搬）。




  信息之所以值得强调，不仅因为它在当今数字经济中无处不在，更因为它与经济繁荣密切相关。塞萨尔·伊达尔戈²⁴在其著作《*为什么信息会增长*》（2015）中指出，信息是一种成长性实体，能够具象化为本质上就是信息熔炉的新产品。新产品的生产基于知识在主体网络中的积累与专业技能的增长。主体间的连接数越高，网络规模越大，知识积累也越丰厚。理解这一概念至关重要，因为经济增长正是建立在信息增长的基础之上。伊达尔戈阐明，越是繁荣的国家，越擅长促进信息增长；而那些构成网络边界渗透性较差的区域，则会阻碍信息增长，并限制其应对经济变化的长期适应能力。


  因此，复杂性经济学的核心在于信息流动及其对主体的影响。经济网络仍然可以产生宏观模式，但值得注意的是：首先，这些模式是进化的；其次，正是主体的个体决策引发了特定模式的出现。主体会受到这种模式的影响，并将其解读为新信息。随着新信息的引入，主体的决策会发生变化，新的模式也开始形成。两者并非割裂，而是内在相连。加总并不仅仅是把个体主体的市场结果相加，以获得整个经济体的总量。它是主体与系统宏观属性之间双向依赖的关系：相互作用的要素产生宏观模式，而这些要素反过来又对这些模式做出反应（Gallegati
  和 Kirman, 2013）。因此，*中层* 在这一经济学研究中扮演了关键角色。


  与主体之间完全不互动的瓦尔拉斯方法相反，复杂性经济学将互动视为经济发展的基础，因为这些互动不仅影响宏观模式，还会创造出日益复杂的网络，使主体能够弥补信息有限的不足。这种将经济视为行动与策略不断演化、时间变得重要、结构不断形成与重组、标准均衡分析无法察觉的现象浮现、以及微观与宏观之间的中层变得关键的视角（Arthur,
  2013），正是复杂性经济学的核心分支。


  因此，复杂性经济学研究的是一个具有历史依赖性、充满活力且不断演化的系统，其属性源于自适应个体主体之间相互作用的结果。这些主体在适应新信息的过程中，改变了系统层面的行为以及系统的整体状态。因此，将系统分解为个体组件会破坏系统的属性（Bruno
  等, 2016）。由此，复杂性经济学的主要研究领域包括：自组织、模式发展与模式识别、主体决策、网络传播、相互作用的依存性、涌现、学习与记忆、内生创新、制度效应、不可预测的动态、异质性、路径依赖、拓扑结构、变化与演化、整体论与协同作用（Manson,
  2001）。这一跨学科研究分支融合了物理学、数学、计算机科学、生态学、工程学，当然还有经济学。


  我并非打算在本章中提供复杂性经济学的完整教育。首先，我并非此领域专家；其次，近年来已有越来越多优秀的研究人员和学者在此方面做出了令人钦佩的工作。表 4-1 列出了一些我参考过的著作，可以作为你自行探索的起点。


