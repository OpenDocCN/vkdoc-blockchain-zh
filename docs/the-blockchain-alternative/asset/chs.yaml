- '# 芝加哥计划及其影响


  作者们得出结论，这些好处都不会改变商业银行的角色，但也不会削弱这些机构在经济中的作用。它们将更多地发挥有效支付系统的功能，并实现有效的资本配置，以支持那些对社会有益的投资活动。然而，它们将不再做的事情是基于信贷发行来创造货币。货币供应将基本上变为无债务的，而创造新购买力的能力——目前是私人银行的特权——将归还给公共权力机构。


  ## 谨慎态度


  尽管芝加哥计划为降低私人和公共债务水平提供了依据，但仍需谨慎对待。首先，仅在中央银行持有 100%准备金并不能解决私人信贷过度创造的问题。债务很重要，因为它能够调动资本，并维持基于未来收入增长预期的生活方式。如果消费者受到新政策的约束，他们将创造和使用绕过正规银行体系的创新金融工具（正如危机前所见）。其次，正如作者所述，现有债务将被新创造的准备金取代。这在理论上是一个好主意，但这也意味着会有赢家和输家。如何平衡这一影响，无人能知。第三，如果政府掌握了货币创造的主动权，那么什么能限制它们利用这一权力来确保短期的政治利益？结论是明确的：在部分准备金银行体系或芝加哥计划下，我们不能在货币政策上采取任何形式的极端主义。需要找到一个最佳平衡点，使我们能够引导和管理经济中正在创造的债务的数量和类型。


  因此，问题就变成了：货币应该如何被创造？应该由谁来创造？以及应该创造多少？我们应该依赖国家控制的货币发行，还是多种形式的货币，或是两者的结合？为了回答这个问题，让我们从这些角度继续剖析货币政策和财政政策，但这次是在一个日益无现金化的经济背景下进行。


