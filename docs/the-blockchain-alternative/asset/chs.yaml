- '# 3. 创新资本主义


  如前章所述，采用技术解决“大而不倒”问题以及金融服务碎片化所面临的最紧迫挑战，是现有的监管与政策框架。我们还看到，尽管金融领域日益走向无现金化，但金融公司的验证和审计操作在很大程度上仍依赖人工和/或过时流程。然而，这种运作模式与当前的监管环境相适应，并且也是其得以持续存在的原因之一。此外，金融与宏观经济学之间的脱节，导致实施了不尽人意的货币与财政政策，这些政策既无法充分应对国家不断增长的债务，也无法有效察觉（更不用说应对）大型机构带来的系统性风险。因此，在建立无现金时代的新框架之前，我们需要确定当前监管与政策框架的障碍和局限性。只有识别出现行体系的痛点，我们才能判断今天的货币与财政政策是否已弹药耗尽，并推动变革与替代方案，以迎接资本主义的下一个纪元。




  '
- '# 重新审视资本主义的现行定义


  让我们首先提问：资本主义的定义是什么？对我而言，鉴于货币在我们生活方方面面中扮演的亲密角色，资本主义既是一种经济范式，也是一种文化建构。根据实证研究和哲学解释，资本主义社会是这样一种社会：市场由多个参与者组成，他们都在稀缺资源最优配置的前提下进行高效的价值交换操作。在此类市场中，法规和政策充当杠杆，需根据清晰规则恰当运用，以实现整个社会的繁荣成果。


  然而，前两章分析所沉淀出的结果表明，社会的日益金融化已玷污了这一描述。如今，资本主义已从一个利用市场实现某些共同繁荣目标的社会，转变为一个一切皆可出售的社会，连风险也不例外。几乎可以说，我们在资本主义的道路上走过了头，过度使用了资本主义的三大治理杠杆——市场、法规和政策——基于对效率的误解或不健全理解，制造了不平等的矩阵。因此，发现没有任何历史定义能涵盖所有这三项杠杆，也就不足为奇了。


  因此，要构建一个更新的资本主义定义，我们需要清晰且有辨析地理解这三项杠杆当前的局限性及其所扮演的角色。在重新定义市场角色时，我们需要引入不平等的概念，并扪心自问：由市场主导的收入和财富分配是否构成问题？不平等本身并非谬误；它是一种激励工具，能促进技能和知识的发展，进而将边缘化人群提升至此前未知的繁荣与幸福水平（有时被称为著名的“中产阶级”）。因此，不平等可被视为启动转型过程的催化剂，使强健经济体得以发展；过去三十年中国的发展，便是市场开放与消除不平等相结合如何带来变革性成果的绝佳例证。的确，过去三十年间，日益强劲的全球化势头使得利用社会不平等作为催化剂，将近十亿人从贫困中解救出来成为可能（Olinto
  & Uematsu, 2013）。但不平等也可能过犹不及。当不平等达到某个阈值时，会导致社会流动性降低，并影响未来经济增长，因为它使社会中的贫困阶层无法获得与创新密切相关的知识和技能（Chetty
  et al., 2015）。因此，尽管资本主义的市场杠杆解决了许多贫困问题，但不平等这一子因素却引发了新的问题。今天，我们目睹了社会各阶层民众的权利被剥夺。当不平等本身削弱了市场杠杆时，我们必须承认问题已经存在。


  法规杠杆则是一个更为复杂的九头蛇，它在行业和社会层面呈现出多种变体。有一种论调认为，正是制约性的法规导致了当前社会的停滞，并侵蚀了生产力浪潮。虽然有证据支持这一说法，但它掩盖了法规的本质。法规允许社会利用市场机制来达成结果，但其方式应当对整体社会有利，并确保市场参与者之间的公平竞争。法规的过程在于确定：对于我们所期望的社会目标，以及市场为实现这些目标所需采取的行动之间，理想的成本效益权衡是什么。这涵盖了从打破垄断到保护环境等一系列广泛的社会关切。毋庸置疑，法规至关重要。但正如我们所看到的，当前的监管结构导致了银行业寡头垄断的形成，并限制了区块链等技术的进步。由于法规在不断演变，但与技术浪潮加速的频率相比存在显著的时间滞后，因此需要努力弥合这一鸿沟。这是一项复杂而艰巨的任务，在本章稍后部分，我们将讨论一种看待法规的替代方式。


  由于市场和法规相互交织，构成了政策的经纬，资本主义的最后一项杠杆，即政策，是引导社会发展的基本工具。从宏观视角来看，可以说当今的政策在执行上是低效的，因为它们未能涵盖技术循环往复的行为特征。如文本框
  3 和 4 所示，技术进步最快的分支是软件。软件擅长循环行为。通过使用代码执行重复性任务，软件使得之前需要熟练工人的任务得以大规模自动化。过去，技术进步对体力劳动岗位构成威胁。但随着机器学习、神经网络和人工智能持续取得重大而迅速的进展，如今受雇从事认知性任务的技能人员也面临威胁（请参见侧栏
  3-1）。正如马克·安德森所说，“软件正在吞噬世界。”如今，软件日益威胁着任何其工作职能涉及重复性框架的人。随着自动化和金融化对工业化经济体构成最大风险，需要出台政策应对生产力的变化。因此，政策制定者必须明白，我们这个自我组织的社会已经出现问题，需要更多引导来对抗和适应未来的技术变革。为此，政策制定者需要思考与无现金社会发展、技术性失业、人类寿命延长及其宏观经济影响相关的举措。




  '
- '# 要点总结


  首先，必须让操纵三根杠杆的舵手们理解，未来对资本主义的定义不能建立在理论抽象之上，而应基于对未来社会复杂性与动态性的认识。随着社会碎片化与数字化的加速，我们正目睹虚拟与现实经济行为体之间多方关系的增长，这些行为体的行为并非理论化的理想代理人所描绘的那样。虽然宏观经济学家经常谈论创新经济学，但他们往往未能考虑经济学的创新。正如我们的机构以增长预期为前提一样，必须存在源源不断的创新，即便是在学术和理论层面也是如此。经济规律不像物理定律那样有一套放之四海而皆准的法则。我们将在本章后续部分看到，由于经济与金融转型的不同类型，资本主义存在多种变体。因此，与其构建一个普适的资本主义定义，我们更需要一套理论“自助餐”。在进行这种多理论开发的尝试之前，我们首先需要理解，在市场、法规与政策相互交织的资本主义社会中，技术是如何重新定义工作、收入和生产率的。边栏
  3-1 提供了一些见解。


  **边栏 3-1：技术如何取代技能与任务**


  来源：“Inequality, Technology and Job Polarization of the Youth Labor Market in Europe”（Bheemaiah
  & Smith，2015）。


  信息与通信技术（`ICT`）的发展对就业、教育和社会结构的各个领域产生了广泛而深远的影响。因此，要理解技术对就业未来的影响动态，就需要对当前各就业领域正在被自动化的任务范围进行整体分析。这反过来又为我们提供了教育、就业、收入水平与`ICT`之间的启发式联系。


  技术，更具体地说是`ICT`技术，对不平等及改变劳动力市场结构基础的影响，长期以来一直是研究人员的核心课题（参见 Acemoglu，2010；Autor 等，2003；Michaels
  等，2010）。这些研究侧重于理解技术进步对技能、教育和就业结构的影响。在这方面，包括技能偏向型技术变革（`SBTC`）假说和 Autor-Levy-Murnane（`ALM`）假说在内的一系列论点都强调了技术进步如何减少对非熟练劳动力的需求，并增加对熟练劳动力的收入补偿。


  虽然麻省理工学院的研究人员和经济学家，特别是 Daron Acemoglu，确立了技能获取与技术变革之间的相关性，但其他人，特别是 David Autor，得以证明技术进步正导致劳动力市场的极化，即需要高技能的就业领域出现了增长。Autor
  还发现，涉及“认知灵活性”的工作需求在增加，同时，需要“非常规手动任务”的低技能工作需求也在增长，从而造成了对涉及中等技能组合任务的工作需求下降。然而，Beardy
  等人（2013 年）的最新研究表明，由于`ICT`的发展，对需要认知灵活性的工作的需求也出现了反转。


  随着技术持续取代劳动，它也助长了不平等鸿沟的扩大。研究表明，更大的不平等会使更大比例的人口易受贫困影响（Jaumotte 等，2008），并且在危机之后，从库兹涅茨假说*的角度分析社会排斥变得越来越重要。虽然此前关于不平等成因的文献将全球化（贸易与金融两方面）、离岸外包和技术列为最普遍的三大因素，但劳动经济学家的主流观点一直是，技术比贸易更重要，是就业结构变化背后的驱动力（（Desjonqueres
  等，1999）；（Katz & Autor，1999）），并且技术变革偏向于熟练工人，从而引出了技能偏向型技术变革（`SBTC`）假说。


  最近，研究还关注了与高等教育和认知能力相关的工资溢价所扮演的角色（Frey & Osborne，2013）；（Autor，2014），以及技术在离岸外包就业中的作用。为了更深入地了解技术、离岸外包和全球化在加剧不平等方面的作用，诸如
  Jaumotte 等人（2008 年）进行的研究，考察了贸易与金融全球化的子组成部分的调查数据，包括制造业与农业出口的比较分析，以及投资组合债务与股权流动相对于外国直接投资（`FDI`）的分析。他们发现，虽然贸易自由化和出口增长与收入不平等相关，但金融开放度的提高与更高程度的不平等相关。


  *（一种经济假说，认为随着经济发展，市场力量首先加剧随后又会减轻经济不平等，遵循一条钟形曲线轨迹。）


  然而，这一研究路线的主要发现是，无论在发达国家还是发展中国家，这些因素对收入不平等的综合贡献远低于技术变革的贡献。虽然技术的传播本身与日益增长的全球化相关，但该研究发现，技术进步对不平等，尤其是工资方面，具有独特且可识别的影响：技术进步越大，对高技能投入支付的溢价就越高，而对低技能投入支付的溢价就越低。


  因此，观察到技术变革通过增加对更高技能的相对需求，从而加剧了发达经济体的收入不平等，影响了经济的很大一部分（制造业和服务业）。该研究还发现，更好地获得教育和培训可以有助于分享全球化和技术的益处，因为受教育机会的增加平均而言直接与更平等的收入分配相关。


  这些研究的结果表明，不平等的加剧主要归因于技术变革，而全球化的影响相比之下则相对较小。然而，技术进步和全球化都被认为增加了对技能的相对需求，因此，技术对工作结构的主要影响是创造了一个两极分化的劳动力队伍，其中高薪管理人员和低薪个人服务人员的就业份额在增长，而制造业和“常规性”办公室职员的就业份额在下降。




  技能相对需求与技术进步的关联，特别是技术变革的“技能偏向”（SBTC），最早由丁伯根（1974, 1975）的开创性工作及经典模型（Acemoglu & Autor,
  2010）的建立所确立。该模型提供了一种衡量工人技能回报变化的结构。经典模型在衡量收入的技能属性方面特别有用，因为它提供了一个对不同工人群体同时进行比较分析的框架。该模型在实证上的成功有助于解释收入分配中的显著变化（Autor,
  2010）。然而，尽管该模型具有适用性，但劳动力市场和就业趋势的现代变化促使人们创建一个更适应现代时代的新模型，因为经典模型的一个缺陷是它缺乏对“任务”的具体定义。


  根据 Autor 和 Acemoglu（2010）的定义，任务被定义为产生产出（即商品或服务）的工作活动单元。相比之下，技能是工人执行一项或多项任务的禀赋或能力。这些研究者认为，需要正式区分技能和任务的差别，因为工人执行任务的技能直接关系到所生产商品或服务的质量，从而也关系到工人所获得的工资。他们进一步指出，工人的工资因此与他或她执行多项任务的能力以及根据劳动力市场变化和新技术引入来调整自身技能组合的能力相关。


  （根据欧洲移民网络（EMN），高技能水平的工人是指通过所从事的工作创造了显著经济价值（人力资本）的人。熟练劳动通常以高教育水平或专业技能以及高工资为特征。熟练劳动涉及复杂的任务，需要特定的技能组合、教育、培训和经验；可能涉及抽象思维；并且被视为对信息通信技术（ICT）资本及与之相伴的组织形式具有补充性。例如包括医生、水管工、律师、工程师、科学家、建筑工人、建筑师和教授。低技能或非熟练劳动则包括劳动力中那些工作所创造的经济价值有限（人力资本）的部分。非熟练劳动通常以低教育水平和低工资为特征。）


  ALM 在 2003 年正式处理了对工人所执行各种任务的分类与区分。他们的论文将任务分为“常规性”和“非常规性”，其中常规性任务被定义为那些可以通过遵循明确规则完成的认知性和操作性活动，而非常规性任务则被定义为需要解决问题和复杂沟通活动的任务。利用这种分类，他们将工人执行的所有任务细分为四个独立的类别*：（1）非常规认知任务，（2）常规认知任务，（3）常规操作任务，以及（4）非常规操作任务。


  利用这种分类，ALM 提出了“常规化”假说，并继续令人信服地论证，现代技术能够替代常规性任务（即可通过逐步程序或规则执行的任务）中的人力资本，但无法替代非常规性任务中的人力资本。此外，他们提供了证据来支持这样一个事实：美国经济中对常规认知和操作任务劳动投入的需求已经下降，而对非常规分析和互动任务劳动投入的需求则已经上升。


  通过区分和衡量任务的相对需求与供给机制，常规化假说进一步证明，这些需求对劳动力市场的影响导致了一个“极化”的工作环境的形成，表现为对高技能和低技能工作岗位的需求出现扩张，但同时伴随着对常规性或“中等技能”**工作岗位需求的下降，并且工作极化正导致技能分布中间层次职业的就业集中度不断缩小。极化效应也影响着工资增长的极化，表现为相对于中位数或中等收入，高端收入和低端收入出现了相对增长。更近期的研究也表明，这一进程近年来仍在加速，因为中等技能工作岗位的人均就业量持续消失（Jaimovich
  & Siu, 2012）。


  日益增多的实证证据表明技术加剧了不平等效应，因此有必要仔细审视，以确定在这一转型转变中哪一类技术发挥着最具影响力的作用。在这方面，Michaels、Natraj
  和 van Reenen（2010）所做的工作，将信息通信技术（ICT）对国际范围内就业教育构成变化的主导作用归因于该技术。作者们还发现，ICT 增长速度更快的行业和国家，其对大学教育水平工人的需求相对于中等教育水平工人的需求也有所增加，并且
  ICT 质量调整后价格的下降是导致这一转变的重要原因。研究人员得出结论，ICT 和研发（R&D）都提高了对大学教育水平工人的相对需求，并且与基于 ICT 的极化假说相符，这种增长主要来自于对中等技能工人（而非低技能工人）相对需求的减少（Michaels
  等人，2010）。


  （根据职业信息网络（ONET）数据库，非常规或抽象任务涉及批判性思维、判断/决策、复杂问题解决、与计算机交互以及创造性思维。常规任务的衡量指标包括手臂-手部稳定性、手工灵巧度、手指灵巧度、操作监控以及估算产品、事件或信息的可量化特征。服务任务则通过社会洞察力、服务倾向、帮助和关怀他人、建立和维持人际关系、销售以及为公众表演或直接与公众合作来进一步衡量。）


  **（基于教育和培训水平，中等技能工作通常需要高中以上但低于学士学位的某些教育和培训。这些中学后教育或培训要求可能包括副学士学位、职业证书、重要的在职培训、先前的工作经验，或部分大学教育（但未获得学士学位）。这类工作以之前定义的常规认知和操作任务为代表。）


  技术变革（以 ICT 和研发为代理变量）对就业的影响与其他文献（参见 Draca, Bloom and van Reenen, 2009）的研究结果一致，这些文献发现技术在影响技能需求方面具有更强的解释力。虽然
  Michaels 等人的分析进一步支持了常规化假说，但 Jaumotte 等人（2008）的另一项工作也表明，决定不平等的一些关键控制变量包括技术发展（以 ICT
  资本在总资本存量中的份额衡量）和教育机会（以 15 岁及以上人口接受教育的年限以及至少受过中等教育的人口比例衡量）。




  衡量这种技能偏向就业适应性的方式是 Autor 和 Acemoglu 在 2010 年及 2013 年研究的主要成果。他们引入了一个框架，用以系统性地理解近期的劳动力市场趋势，以及技术对收入溢价和就业机会的影响。在先前工作（`ALM`，2003）的基础上，作者们解释称，创建这一新框架的必要性对于理解技术发展的影响至关重要，尤其是信息通信技术（`ICT`）对中等技能劳动者的影响。这种技术变革、技能和教育之间的共生关系与就业的任务维度相关，并持续成为就业灵活性和不平等的重要预测指标。因此，这使得
  `ICT` 对教育和就业的影响变得不容小觑（`Goos et al.`，2014）。


  尽管这些研究确立了 `ICT` 对教育和就业影响之间的联系，但教育与收入之间的关系则更为微妙。就业的两极分化与工资的两极分化同时存在（`Autor & Acemoglu`，2010），这表明劳动者的职业是其工资的主要决定因素。这暗示了劳动者的教育水平在决定职业和收入方面的作用相对较弱。


  为了衡量教育程度对工资决定的解释力，`Autor` 和 `Acemoglu`（2010）在研究中考虑了四个控制变量，包括受教育年限、教育程度（如部分高中、高中毕业、四年制大学、研究生学历等），以及针对十个职业类别*和十一个行业类别**的虚拟变量，并区分了性别。通过测量四十年间的趋势变化，他们得出结论：职业在就业和收入的演变中扮演着日益重要的角色，并且它不仅仅是教育或行业的代理变量（`Autor
  & Acemoglu`，2010）。


  这些研究结果使我们能够与`技能偏向型技术变革（SBTC）`和`常规化（ALM）`假说，以及其他关于任务与技能的文献进行类比。根据 `SBTC` 假说，技术增加了对高技能劳动力的需求，并减少了对低技能劳动力的需求，从而降低了后者的工资补偿。另一方面，`ALM`
  假说解释了技术的常规化和极化效应，而 `Acemoglu` 和 `Autor`（2010）的研究表明，决定收入的是技能和职业，而不仅仅是教育。教育所扮演的关键角色已被多项研究所证实。但近期研究的结果向我们表明，在技术变革日益加剧的背景下，技能适应性和认知灵活性在不平等问题的讨论中发挥着越来越重要的作用。


  *（职业类别根据四个任务层级选定，即：非重复性认知任务：管理人员、专业人员、技术人员；重复性认知任务：销售人员、办公室及行政人员；重复性体力任务：生产、工艺和维修人员，操作员、装配工和体力劳动者；非重复性体力任务：保护性服务人员、食品准备人员、建筑与场地维护人员、清洁人员、个人护理及个人服务人员。）


  **（行业类别同样根据四大任务类别细分，即：非重复性认知任务：专业、管理和技术类职业；重复性认知任务：文职、行政和销售类职业；重复性体力任务：生产、工艺、维修和操作类职业；非重复性体力任务：服务类职业。）


  虽然关于不平等的讨论常常聚焦于“最富有的 1%”，但这种做法忽视了剩余 99% 人群的赚钱能力，更具体地说，忽视了与高等教育和认知能力相关的工资溢价的急剧增长。过去三十年的计算机化以及
  `ICT` 在组织中的普及，日益提升了认知劳动的重要性，因为它能够补充那些擅长抽象问题解决和创造性任务的受过教育的劳动者。但当与极化效应相结合时，最终结果是增加了对正规教育、专业技术知识和认知灵活性的需求，同时贬低了没有高等教育学历劳动者的技能价值（`Autor`，2014）。


  然而，近期研究（`Beaudry et al.`，2013）表明，尽管高技能劳动者的供给在增长，但对这些劳动者的需求目前正在逐渐放缓。结果，越来越多的技能劳动者正在从事使其被视为“就业不足”的工作，同时将技能较低的劳动者挤出了与这些任务相关的岗位，在某些情况下，甚至将他们完全挤出了劳动力队伍。


  通过建立一个强调技术变革的模型，作者们发现，迫使高学历劳动者接受常规工作的技能降级过程，其原因是：随着技术进步对认知任务的生产率产生积极影响，最终导致认知任务就业率趋于下降。这与该领域需求增长的证据（`Autor
  et al`，1998）形成对比。


  作者们将这一发展称为“去技能化”过程，因为这涉及到那些已有经验且已在就业市场上的认知劳动者被迫向下移动职业阶梯以保住工作。这对新的求职者具有严重影响，因为这不仅为新进入者提高了入职门槛，而且可供他们选择的机会数量也减少了（`Beaudry
  et al.`，2013）。


  由于从事重复性认知工作的个体比从事非重复性认知工作的个体面临更高的失业概率，这两种职业之间的失业差距归因于技术的进步。然而，更重要的是，需要提出的问题是：技能偏向型技术变革是否正在被技能替代型技术变革所取代？如果是，教育是应对这一变化的唯一答案吗？


  鉴于方框 3 和方框 4 中提供的证据，这个问题的答案将不仅仅局限于教育创造的价值。毫无疑问，教育将在帮助知识型劳动者和体力劳动者为未来经济需求做准备方面发挥关键作用。但市场、政策和法规也将发挥同样重要的作用，因为必须记住，市场本身无助于技能的发展和增长。增长源于技术、企业和产业结构的共同演进，以及支撑它们的社会和公共机构，并通过复杂的反馈过程相互连接（`Jacobs
  & Mazzucato`，2016）。


  只有理解了技术对不平等的影响、劳动力市场的状况、技术对任务的极化效应以及不断变化的技能需求，我们才能开始为未来的无现金、创业驱动的知识经济重新定义市场、法规和政策。


  注意 尽管 `SBTC` 假设工资是由劳动力市场的供需力量决定的，但一些正在进行的研究正在挑战这一范式，指出可持续工资的主要决定因素是主要企业的雇佣实践。参考：“技能发展与可持续繁荣：累积与集体职业生涯对比技能偏向型技术变革”（`Lazonick
  et al.`，2015）。




  '
- '# 不断变化的市场结构


  信息革命正在颠覆工业革命，并在此过程中重塑市场结构。工业时代让人们能够聚集在庞大、机械化的组织层级中，建立工厂和公司；而信息革命则正在打破沟通壁垒，创造减少中间环节的技术，从而形成更小、更互联的团队（Ravikanth，2015）。随着诸如`区块链`等技术开始消除中央控制节点，当今不断演变的数字化和去中心化的市场结构，正在挑战关于生产率、风险分配和劳动力需求的既有理论。由机器/深度学习、移动支付、机器人技术的快速进步以及任务计算机化的指数级增长所推动的自动化程度提升，正催生出网络化的、按需服务的企业。这些企业正在转型和重组各类公司，并为整个经济体确立新的技能要求。随着任务被数字化、运营被网络化，流程可以被编码、继而复制。因此，这些变化开始挑战我们与技术的关系——那些曾被发明作为工具、用以提高工人生产效率的机器，如今正转变为工人本身。


  尽管这些技术中的大多数是为了挑战现有行业巨头而创造的，但有趣的是，那些为利用这些技术变革而创立的企业已经开始产生"赢家通吃"的效应，并在此过程中改变了市场份额的构成。虽然像`优步`或`爱彼迎`这样的公司崛起已被广泛讨论，并被视为有效的成功案例，但这些变化同样可见于其他领域。以成功融资平台`AngelList`为例，其崛起过程就是明证。`AngelList`成立于
  2010 年，是一家总部位于硅谷的社区风格公司，初创企业在此与投资者会面。这家公司负责推动数百万美元的投资，而完成这一切的团队仅有 22 人。几乎所有的运营环节，包括融资、招聘、工程、系统运维、产品开发、客户服务、市场营销、入站交易处理以及交易结算，都是通过代码完成的。在这
  22 名员工中，有 16 人是编程人员或具备编程经验（Slayton，2014）。


  随着数字化带来效率与网络效应的巨大提升，市场正变得越来越具有"熊彼特式"特征——那些能够将商业模式数字化的市场玩家，有能力超越现有行业巨头，并获取更大份额的市场。


  亚当·斯密在《国富论》中曾有名言：劳动分工受市场范围的限制。因此，随着数字化克服了进入市场的物理障碍，我们注意到它为正对不同现有市场和利基市场进行精细细分领域的专业化创造了空间。此外，随着技术诀窍和地理位置等壁垒变得模糊，战略上的影响则表现为对客户关注的痴迷。提供独特且可定制的服务，本身就会给企业家带来一定风险，因为成功与否取决于未来客户是否愿意从现有产品转向新产品。正因如此，实验精神和风险承担如今被创业界的权威人士日益推崇为创新的支柱。但这也在整个商业领域中创造了新的风险。


  正如本书前文所述，金融与经济领域并未对这一现象视而不见。然而，从市场风险的角度来看，金融领域仍受困于经济学与金融学之间固有的二元对立。危机过后，各国政府一直专注于加强对金融机构的监管措施，而对于为私营金融服务提供商制定合理有效的监管则关注不足。随着金融活动日益向网络世界迁移，政府越来越有必要在遏制系统性风险以确保经济增长的同时，为能够实现最大社会效用的民主价值交换网络的长期扩展创造条件。


  必须牢记，由于技术的多样性，这个新兴的金融市场在结构上是标量性质的。但是，随着新创新的推出，监管责任往往在地域和业务职能上缺乏一致性定义。因此，经常会出现监管规定与公司的法律描述及其从事的金融活动相悖的情况。当前监管权限的僵化，无法提供全局性的监督视角，这反过来又抑制了这些商业模式的扩展，并扼杀了创新。


  例如，尽管当今消费者有更好的渠道获取替代性信贷来源，但若对这些新产品缺乏了解，且未能获得监管机构的充分验证，风险就可能转嫁给最终投资者。虽然数据的使用能够提供可定制的金融服务，但这些富含数据的服务也伴随着网络风险、网络犯罪和数据隐私问题。因此，在信息保护方面建立标准，必须成为防范任何掠夺性不当行为、并促成大规模采用的关键安全目标。


  然而，技术改变了市场的风险状况，同时也使得创造能够增强市场稳定性的技术手段成为可能。因此，从监管角度来看，技术带来的风险可以通过一个允许利用技术来解决这些问题的市场框架来应对。金融市场的标量结构要求根据金融服务部门的不同，在多个层面部署这种"以火攻火"的方法。我们在前一章中已经看到不同的市场部门如何随着`区块链`和`金融科技`而改变。因此，我们将通过聚焦市场的两大核心功能——获取资金/信贷（借贷与支付市场）与商品交换（贸易融资市场）——来审视当今的市场结构，从而探究`区块链`如何重新定义市场运作，并为扩大这一变革所需的必要政策提供入门基础。




  ## 借贷与支付


  借贷与支付行业具有一些共同特征。首先，这些功能正逐渐从银行业务范畴转向商业领域，涉及商业和运营两个层面。其次，随着更多私人市场参与者涉足，企业与客户之间（尤其是针对中小企业）使用"私人监管"¹的趋势日益明显。私人监管的广泛使用导致风险仅由客户和金融机构共同承担。这种做法背后的原因相对简单：当金融科技公司利用技术创建专有算法和软件来满足客户需求时，其产品在市场上的扩散速度已超越了监管机构的适应能力。结果，我们面临这样一种局面：监管措施无法像保护传统渠道那样覆盖消费者利益。


  大型银行的借贷业务大多在传统线下世界执行，因此受到更严格的监管审查。例如在美国，提供贷款的老牌公司至少要接受两家监管机构的监督。虽然某个州的商业银行受地方监管机构管辖，但作为美联储成员银行的全国性银行则需接受美国财政部的审查。如果该银行被视为系统重要性金融机构，它还会受到金融稳定监督委员会的监督，甚至可能有政府代表参与其业务和合规运营（Murphy,
  2015）。当这些机构向企业提供贷款时，还需参与 CAMELS 五步评估²，若评级达到 3 级或以上，将面临监管纠正措施。除这些规定外，危机后的《多德-弗兰克法案》改革和新巴塞尔协议
  III 要求银行持有显著更高的资本金，并以应急可转换债券³形式发行债务（见注释）。


  这些监管措施无疑使借贷行业更加安全，但同时也产生了负面副作用。随着商业银行持续为次贷违规行为引发的诉讼进行和解，它们在对高风险借款人的放贷策略上不出所料地采取了更保守的做法。正如富国银行首席财务官约翰·舒鲁斯伯里所言："银行对向高风险借款人放贷毫无兴趣，即使是那些符合联邦住房标准的客户。这些贷款注定会违约，而我们将为此争论十年之久。我们不会重蹈覆辙"（Koren,
  2015）。


  然而，上述原因并未限制新进入者。相反，当前的环境和监管缺失反而使其在一定程度上蓬勃发展。以抵押贷款行业为例，2014 年发放的抵押贷款中有 42%来自新兴贷款机构，而
  2009 年这一比例仅为 10%；这些机构目前占据四成住房贷款市场（Koren, 2015）。但并非所有闪光之物都是金子。由于大多数新兴金融科技借贷平台提供的小额信贷（低于
  10 万美元）更适合服务中小企业贷款市场。


  但由于这些信贷提供者未被定义为银行，它们无需承受同样的监管压力。在多数情况下，这些贷款机构可能只需在监管机构注册并接受审查，但这并非硬性规定。监管的缺失导致新兴借贷平台开始参与更高风险的业务实践。有些金融科技贷款机构甚至不要求提供商业计划或未来现金流预测。要获得低于
  10 万美元的贷款，企业只需满足：成立超过 24 个月、年销售额至少 7.5 万美元、近期无破产记录。若大型银行采取类似做法，必遭"玩忽职守"的批评。这并非说完全没有监管。知名
  P2P 贷款平台借贷俱乐部由美国证券交易委员会监管，但这主要因其规模庞大且大部分资金来自机构渠道（如保险公司、摩根大通等银行）。从这个意义上说，它更像是现行规则下的特例。


  可以说，由于这些新兴公司规模较小，让它们遵守与大型机构同样严格的监管规定未免过当，且可能扼杀创新。这在很大程度上是正确的。但必须记住的是，就目前而言，金融科技公司无需遵守资本金要求。因此，如果经济形势恶化，这些公司难以应对信贷供给中断。随着越来越多的消费者和中小企业转向金融科技公司借贷，这种情况可能对众多中小企业造成灾难性影响。由于现行监管很大程度上属于"私人性质"，仅涉及提供商与消费者之间的合同协议，责任最终落在消费者身上，使其处于无保护状态。


  支付行业正面临与借贷服务类似的困境。过去几年该行业经历了戏剧性的技术变革，尤其是区块链技术的出现。这些变革反映了家庭和企业需求的变化，新型支付提供商应运而生以满足这些需求。某种程度上，监管机构在这一领域更为尽责。近期
  CHAPS、ACH 网络和实时全额结算系统等机构网络的推出（当前每日处理巨额交易——在英国，RTGS 系统每日在银行间结算约 5000 亿英镑，接近英国年度 GDP
  的三分之一），证明了机构适应变革的能力。


  支付`API`的普及和移动银行业务的兴起（如 Atom Bank）使非银行实体能够借助支付基础设施提供更优质服务，并使这些提供商无需构建庞大网络就能发展壮大。虽然这为最终用户带来了好处和节省，但也催生了新的风险。首先，实时支付使得有效防范洗钱、恐怖融资和各种电子欺诈变得更加困难。支付系统的互联性越强，网络攻击的威胁就越大，风险蔓延的可能性也越高。其次，传统支付提供商可直接接入支付网络，因此必须遵守其监管规定（Shafik,
  2016）。但金融科技公司并非如此，它们通常使用代理银行或替代支付渠道。因此，我们需要思考：是否应通过监管规定将新进入者纳入现有支付平台体系？




  总体来说，如今的借贷和支付行业面临三个根本性局限。首先，这些市场的新进入者不受与大型机构相同的法规和监管约束。这给消费者带来了更大风险，影响了新商业模式的扩展性，并使这些行业更容易受到系统性风险的影响。其次，公司只有在稳定的监管环境中才能提升绩效。缺乏这种环境会带来更高的利润不确定性。第三，由于技术发展速度超过监管速度，监管者几乎没有时间进行调整，且在不同领域的调整节奏各不相同。结果，这导致了系统内部控制的失衡，进而随着网络中薄弱环节的产生，增加了系统的脆弱性。为了解决这些局限，监管者必须将其监管实践扩展到所有市场参与者，同时确保规则能够根据金融机构的角色和类型进行调整。


  此外，正如前一章所述，借贷行业受到再抵押（`rehypothecation`）的困扰，它利用影子银行的渠道将安全的抵押品转换为高风险债务工具和结构化投资工具。再加上过度借贷和投资者可获得的信息匮乏，这些影子银行投资产品正是
  2007 年全球金融危机的根源。因此，除了这三个根本局限外，如果监管者想要避免历史重演，还需要确保借款人和投资者免受影子银行产品特有的债务期限错配的影响。


  正是为了应对这些局限，区块链提供了一条解决路径。贷款人或发送方本质上是在执行一个简单的操作：他们将资本交换为资产投资，或将价值从自己转移给他人。因此，在基础层面上，借贷和支付涉及在一组确定的拥有者之间，对现有资本向资产转移的记录。这正是区块链的定义所在。它在网络中发送价值，并记录在此空间中发生的每一次移动。智能合约的编码执行对监管者来说是另一个好处。在贷款情景中，诸如贷款金额、贷款期限、利率、本金、利息支付计划以及允许的灵活性等预先确定的条款，都可以被编码到智能合约中。这使得监管者能够验证一家公司是否以掠夺性方式行事，并在行业内创造更好的竞争循环。由于行动现在可以被验证和质疑，资产可以被追踪，其真实价值也可以通过追踪市场参与者之间的交换来验证。这反过来可以带来更好的消费者保护和更安全的环境。


  监管者需要解读的是，使用加密法律替代常规法律所能获得的好处。常规法律可以被视为系统外在的“代码”：规则可能被违反，但违反行为会带来后果，以确保合规（英国政府首席科学顾问，2016
  年）。而加密法律则是内在的：如果任何行动违反了代码/规则，则会返回一个错误，且不会发生任何活动。因此，合规是通过代码本身的运行来保证的。


  鉴于上述挑战和优势，政府机构应当认真考虑采用区块链。如前所述，区块链的主要优势之一在于它是一个基础设施工具。它同时提供公共和私有操作特性这一事实，也使其相对具有可塑性。我们可以设想这样一个场景：一家新成立的公司向政府机构申请在其主权区块链上进行交易的许可，就像公司需要注册其公司状态一样。一旦“了解你的业务”（`KYB`）流程完成，该公司便开始进行交易，而这些交易的验证可以由注册的政府机构或提供此服务并拥有执行此功能许可的私营企业来完成。这一想法与现有实践相差不远，而且像这样的基于区块链的举措已经在部署之中。


  以`Ripple`为例。在`Ripple`协议中，验证是通过一个称为共识（`consensus`）的过程完成的，而非工作量证明（`proof of work`）。共识与工作量证明的不同之处在于，它依赖于一个投票系统。每笔交易都由授权的交易验证者验证，而注册的`Ripple`验证者包括微软和麻省理工学院等知名机构。当这些验证者达成绝对多数（>70%）时，该交易即被视为有效，被验证并添加到`Ripple`区块链中。这个过程的好处是验证时间更短，每秒交易验证量（`TPS`）更高。正因如此，`Ripple`协议已被`Earthport`支付网络采用，该网络每天处理
  1.5 亿笔交易。


  因此，从技术角度来看，解决方案已经存在且值得探索。所需要的是政府的参与，以实现可扩展性和大规模应用。机构层面的参与也将刺激创新，并允许创建适合特定操作的区块链。通过使用诸如侧链（`Sidechains`）和跨账本协议（`ILP`）等概念，针对特定用途的区块链可以与主权区块链相连，为监管者提供必要的监督。


  但这样一个控制体系的有效运作，需要在机构层面部署区块链。就目前而言，大多数政府关注的是将这项新技术引入金融行业所带来的风险，并正在考虑需要采取哪些措施来限制或控制它。鉴于区块链促进繁荣、包容和稳定的潜力，也许最大的风险在于，矛盾重重的政府惰性可能会阻止它充分发挥其潜力。


  幸运的是，也有一些例外情况，一些政府机构正在认真地开始考虑这些想法。在英格兰银行最近的一次演讲中，该行副行长表示有兴趣利用区块链（或分布式账本）来创建“一个（新的）银行结算基础设施蓝图”。如果这样的计划得以实现，那么将意味着区块链上的事件可以由银行和金融公司运营所依据的法律和监管体系进行监督。这反过来将要求相关的法律和监管结构承认区块链是价值交换的真实记录。这也意味着主权货币需要被代币化（`tokenized`），以便它们在区块链上的交易具有法律地位。主权货币的代币化将在本章稍后专门讨论政策的部分进行阐述。




  '
- '# 互联网与贸易金融


  对各国政府而言，好消息是互联网的蓬勃发展已为其反思提供了历史参照框架。互联网之所以能发展，得益于政府、学术界和私营部门的通力合作。正如`TCP/IP`和`HTTP`等开放标准引领了互联时代的到来，`Ripple`等标准正在支持市场竞争并打通价值互联网的流动性。因此，政府需要做的是制定全球标准，以便像`Ripple`这样的创新能够与社会利益相关方携手合作，强化基本原则并指导政策制定。在国际层面，区块链领域需要一个类似`ICANN`的对应机构。


  ## 贸易金融


  贸易是人类社会最古老的价值交换形式。如今，商品的跨境流动通过供应链管理和贸易金融来实现。供应链处理的是记录商品从生产者到消费者流动过程的相关流程。它涵盖了管理制造、库存管理和质量控制的广泛程序与结构。这涉及众多中间商，它们之间的交易必须被记录，以确保贸易过程的完整性。需要记住的关键词是文档记录。当今的贸易交易及相关流程涉及采购订单、发票、提单、海关文件、真品证书等记录的转移。其中大部分转移仍以纸质记录和结构化的电子数据库形式保存。


  贸易的另一端涉及金融机构。虽然贸易代表着数十亿美元的收入，但也伴随着与时间延误、货物状况、外汇、政治不稳定，以及当然还有流动性和现金流限制相关的重大风险。银行通过为企业提供生产和制造资本、协助合规与防欺诈、以及为缺乏知名合作关系的企业提供信用担保（跨境`KYC`/`AML`合规）来支持贸易。银行还提供保理等服务，即银行在商品买方付款之前先向卖方付款。在此过程中，银行承担了买方付款延迟或违约的风险，但为此向供应商收取
  4%到 8%的费用，从而侵蚀了供应商的利润。因此，银行通过执行支付、降低风险和提供融资，在促成这些跨境贸易流动中发挥着核心作用。鉴于这些服务，银行充当了中间人，通过充当跨境贸易的催化剂来抵消风险。这催生了贸易金融，它成为银行的主要收入来源。贸易金融是一项安全的业务，因为它能提供独立于利率的收入来源，带来跨境支付手续费，并且违约率较低（比传统企业贷款低十倍左右（埃森哲，2016））。


  供应链管理与贸易金融共同为市场参与者提供资本，使其能够在境内和跨境生产并销售产品和服务。然而，近年来，供应链管理和贸易金融受到了越来越多的审视，导致了处理延迟和额外风险。机构对当前的贸易金融工具感到不满，因为它们费用相对较高、手续复杂，并且由于依赖纸质文件而耗时较长。此外，银行与客户之间存在互操作性问题：银行需要全面了解公司的交易流程，才能在价值链的关键节点提供有价值的服务。然而，由于大量流程本质上仍是手动的，市场上出现了大量提供独立解决方案的平台，但其互操作性较低。这种互操作性的缺失降低了透明度，增加了欺诈风险和更高费用，并且无法形成能够变革行业的网络效应。


  为了应对这些限制，越来越多的机构选择使用记账交易，即出口商供货，进口商在收货时或根据预先商定的付款条件付款。近年来，记账交易越来越受欢迎，目前占全球贸易的 90%（欧洲银行业协会，2016）。这样一来，机构正逐渐远离银行的中介产品，尽管这牺牲了融资选择。机构正通过数字化和提高供应链流程效率来应对这一损失，具体涉及交易服务、风险缓解、数据传输与匹配、报告、预测、外汇、流动性和现金管理等方面。随着从信用证向记账交易的转变持续进行，这种数字化催生了新的贸易工具（如银行付款责任）、数字贸易单据（如`essDOCS`/`Bolero`）以及新的企业资源规划系统（`SWIFT
  MT798`）。


  尽管有这些变化，但跨国监管的复杂性意味着互操作性问题依然存在，大规模的网络效应仍难以实现。银行通过提供在线门户网站来适应，这使得客户能用数字数据流替代纸质文件流，并提供发票匹配、预测、资产负债表和现金流分析等增值服务。但即使这些改变也不足以解决根本问题。


  这一普遍存在的挫折为新进入者提供了寻找解决方案的机会，进而加剧了竞争。随着银行间竞争持续升级，新的物流公司、替代供应网络以及专注于大宗商品贸易金融或专门服务中小企业的利基贸易金融公司，近年来已开始分割市场。（例如，阿里巴巴已与两家英国初创公司建立合作伙伴关系，为希望从中国供应商采购的英国小企业提供融资（埃森哲，2016）。）由于《巴塞尔协议
  III》的规定限制了大型银行的信贷供应，这些新进入者正利用这些监管变化，为大量贸易金融客户提供更好的服务。


  但这些新玩家面前仍有艰巨的任务。虽然它们提供的所有服务都可以归入融资和风险缓解的范畴，但由于各地区法规可能不同（以及互操作性的缺乏），这意味着对中间商的依赖和流程的重复始终存在。正如面向金融机构和全球企业的区块链网络
  Fluent 首席执行官拉马尔·威尔逊所言：


  > “目前，银行运营的贸易金融项目需要投入大量资源进行尽职调查、文件收集和处理，包括协调汇款信息。尽管融资提供方的利润率低且不断缩小，但企业的融资利率仍然很高。对于缺乏这种基础设施、必须为其大客户外包这些服务的小型银行来说，情况尤其如此。”（哈里斯，2016）




