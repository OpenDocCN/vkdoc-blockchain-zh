  trans: '

    # 生产环境中的测试资源管理


    我之前提到过如何在多种环境中进行测试，并希望尽可能在**生产环境**中执行测试套件，包括针对任何第三方组件的测试套件。那么挑战就变成了：当测试步骤之间存在长时间间隔时，如何进行事后清理（参见图
    7-7）？


    任何与质押相关的操作，最终都需要执行一笔 `unbond` 交易，然后等待一段停机时间，之后再提取资金。在某些场景下，可能涉及更多步骤、更多参与者和更长的等待时间。这个周期基于区块时间和周期数（例如，一个验证周期）计算。在本地或
    CI 环境中执行所有这些操作时，速度相对较快，并且你能完全控制所有值和环境。但在生产环境中执行同样的操作时，差异是巨大的——一个周期的时间是 24 小时。解绑期是
    7 天。某些操作还取决于你在 24 小时内的哪个时间点发起交易，这会导致更长的等待时间。这是一个滚动的时间窗口，效果生效可能需要 12 到 36 小时。


    显然，你不能让测试套件运行 7 天，就为了等待它自行清理——这完全是浪费资源。你可以拆分它，并通过 `cron` 单独执行清理部分——但这又引出了一个问题：如何在测试套件/清理工具之间存储和共享凭证。


    这也带来了另一个问题：如何对那些易于自动化但运行时间很长的任务进行断言？例如，成为 Creditcoin 区块链上的验证者是一个相对简单的过程；CLI 中甚至提供了
    `wizard` 命令，它可以为你执行所有步骤。然而，这个命令仅表示一个意图。结果不会立即生效。假设其他一切正常，参与者发出意图后，且相关交易被打包进区块后，成为活跃验证者可能需要
    12 到 36 小时。


    你如何断言测试套件所做的一切确实产生了预期的结果？你如何确保动态配置的资源（例如，虚拟机或容器）不会在实际需要之前被回收，也不会在之后被闲置？


    一种可能性是只进行人工测试，而忽略你花费时间自动化测试套件的事实。另一种可能性是采用分层方法，即所有功能都在隔离环境中进行测试，仅对生产环境进行部分测试。这引出了信心（可信度）的问题。


    如图 7-8 所示的第三种可能性，是将传统的*准备-执行-断言-拆除*流程拆分成多个独立的片段，这些片段可以独立执行，例如通过 `cron` 或某种队列。这些独立的自动化部分需要在它们之间共享数据。在测试区块链的上下文中，最简单的方法可能是在链上直接记录这些数据——无需额外的
    SQL 数据库。QA 和利益相关者应该能够查询这些数据以生成状态报告。然而，这并不能解决触发这些自动化脚本的问题——智能合约不能自己发起操作，所以你需要一个外部进程每隔一段时间调用智能合约中的函数。智能合约内部运行时间非常长的函数也面临挑战：它们会因
    Gas 耗尽而被回滚，因此你不能在测试开始时调用一个函数，让它休眠几天，然后再让它自行清理。智能合约也无法与链下世界交互，例如通过互联网调用 API 函数。有一些可用的解决方案，比如
    ChainAPI（[`https://chainapi.com/`](https://chainapi.com/)），但我还没有尝试过。


    我认为，在这里，一个用于编排长时间运行测试场景的实用解决方案大致如下：


    - 触发测试的*准备 + 执行*脚本。

    - 测试状态数据被记录到共享位置，可能通过智能合约记录在链上。

    - 应在未来执行的自动化脚本被记录到队列中，可能附带它们需要执行时的预估区块号。

    - 在未来的某个时间点，执行*断言 + 拆除*部分；结果通过智能合约记录回链上。

    - 在某些情况下，*拆除*部分本身就是一个包含多个步骤的长期运行任务。例如，解绑资金，然后在一周后提取它们。也遵循已经描述过的流程来处理。


    在能够访问区块链并测试同一区块链的背景下，我认为将共享数据记录到链本身是有意义的，这也是“吃自己的狗粮”的另一种方式。但这并非强制要求。你可以使用标准的 SQL
    数据库并构建自己的报告，或者更好的是使用像开源 Kiwi TCMS 这样的测试管理系统，它已经内置了必要的功能。


    **免责声明**


    我也是 Kiwi TCMS 的项目负责人！


    ![图 7-7](img/629923_1_En_7_Fig7_HTML.jpg)


    *图 7-7：传统测试序列在区块链长时间运行流程生效前中断的图示*


    ![图 7-8](img/629923_1_En_7_Fig8_HTML.jpg)


    *图 7-8：提议的测试编排器的示意性描述*

    '
- fmt: '## Troubleshooting Guides and `sos-report` Command


    Another interesting challenge I’ve come across has to do with community interactions.
    For whatever reasons somebody will end up having troubles – either they didn’t
    read the documentation, or didn’t pay enough attention or tried doing something
    that was never expected – users are good at this, perhaps even better than us
    testers. It could be the case that there has genuinely been some sort of a technical
    problem at the time when the user was trying to perform an operation or that the
    user wasn’t tech savvy enough to understand the documentation or that they simply
    made a mistake. When that happens, they will reach out to available communication
    and support channels and complain about their problem.


    Because of everything that happens in a blockchain, the long periods involved
    and also because your user base isn’t necessarily technical, the initial problem
    report will always be missing important information. Sometimes it will be easier
    for engineering to guess what the actual problem was and offer a solution to be
    communicated back; other times it may be entirely impossible. To be clear this
    is much more likely to happen in the event someone wants to become an active validator
    rather than trying to become a nominator via the `Creditcoin Staking Dashboard`.


    To combat this situation, I am proposing a two-step approach:


    1.  Curating a list of common questions and requests for additional information
    – this is to make sure you can collect as much initial data from the user as possible
    and also cover commonly known pitfalls and edge cases. Whenever the user contacts
    your support team, they will be asked to provide answers to these questions. The
    sooner this happens the better – for example, if a user shuts off their computer
    and then retries on the next morning, chain-state will have changed so their actions
    may result in a slightly different outcome. Ideally this list of questions is
    publicly available in the documentation, and users are aware what sort of information
    they should provide when contacting support.


    2.  Logs, local results, computer uptime, process uptime, and many other data
    are actually possible to be queried directly from the blockchain and the host
    running a `creditcoin3-node` process. Listing open ports, trying to reach out
    well-known `Creditcoin` URLs across the Internet, measuring networking speed,
    etc. are also possible. I call this the `sos-report` command similar to something
    I’ve seen in commercial Linux distributions. Ideally this command will be part
    of the docker container, will collect all of the necessary information from step
    1, and then allow the user to review it and submit it to the support team!


    This proposal is also where you start building your knowledge base and expanding
    the support services offered to the public. While not strictly a testing-related
    activity, it can benefit overall quality in a few ways.


    - Testers can learn a lot from the actual users on the field – this is real-world
    usage of the software under test, and we can use this knowledge to improve test
    coverage where needed.

    - In the event of known issues, testers are likely to have already seen it or
    to be familiar with the issue because we’ve got a lot of edge-case knowledge about
    the application collected through countless tests and exercising the same application.
    We can unlock this knowledge and share it with the rest of the organization.


    ## Integration Tests Speed-Up


    I’ve mentioned previously that the biggest part of the test suite for `Creditcoin
    3` is the CLI integration test suite. It contains the highest number of individual
    test scenarios and takes the most time to execute. On a per CI job basis, this
    execution time has grown to around 90 minutes for the longest jobs. While writing
    this book, I worked on a number of tasks to try and bring this down which of course
    starts by measuring how much testing do we actually do.


    At the time of writing this book, there were over 7000 workflow runs in `GitHub
    Actions` for the `gluwa/creditcoin3` repository alone. Of them CLI integration
    test jobs average roughly 1000 hours per month.


    The initial speed-up targeted a few low hanging fruits:


    - Reduce the value for hard-coded sleep calls, and remove such calls where possible.

    - Rewrite setup sections so that related test scenarios would share their setup
    instead of each scenario having their own. That was especially useful for long
    running test scenarios like `withdrawUnbonded.test.ts` which need to wait 15+
    minutes for the correct pre-conditions before they can actually do anything.

    - Conditionally skip other long-running test scenarios, like `validatorCycle.test.ts`
    on purpose. This scenario takes around 20 minutes, with a maximum timeout of around
    30 minutes, and acts like an end-to-end testing with all of the individual commands
    used inside of it tested separately in isolation. We don’t need to repeat this
    on every single pull request, so I’ve added a conditional statement which will
    execute this scenario only on commits directly into the `dev` branch, for example,
    post merge. It is still executed on pull requests against other branches for extra
    safety before a new release.


    The most significant change in this optimization space is switching away from
    GitHub’s hosted runners onto self-hosted ones. This is something that I already
    use as part of runtime-upgrade testing so it was just a matter of adding a bit
    of extra configuration to the existing CI pipeline. In particular, provide self-hosted
    runners using a matrix job with the similar arguments as the `integration-test-cli`
    matrix. Label the newly provisioned runners with their respective labels according
    to the test matrix, and then use the same labels in the `integration-test-cli`
    job definition to select the appropriate runner. That guarantees six unique runners
    each one of which will be assigned to only one integration test job. Then destroy
    them when finished!


    This effort lead to shaving off 30 minutes from the longest running test jobs
    in this matrix. My speculation is that even though there is a lot of waiting for
    blockchain-related operations, using these self-hosted runners is still faster
    than GitHub shared runners because they are a dedicated resource which isn’t oversubscribed.
    I/O and most likely CPU operations will take less time because the underlying
    operating system is giving its full attention to your testing instead of juggling
    hundreds or thousands of other processes. I don’t have a definitive proof if that’s
    the actual reason, but it does make sense, and empirical results show that using
    these self-hosted runners is faster than using the shared ones!


    **Caution**


    Besides the limits of how many virtual machines you can provision at the same
    time in your hosting environment, there is another more subtle factor which may
    be imposing unexpected limitations on your CI. This is the API request limit rates
    set by your chosen cloud provider in relation to how often you need to provision
    resources on-demand. With `Creditcoin 3` I’ve seen the underlying provisioning
    API respond with `429 Too Many Requests` often enough to be annoying and cause
    my CI setup failing!'
  raw: '#### Troubleshooting Guides and Sos-Report Command


    Another interesting challenge I’ve come across has to do with community interactions.
    For whatever reasons somebody will end up having troubles – either they didn’t
    read the documentation, or didn’t pay enough attention or tried doing something
    that was never expected – users are good at this, perhaps even better than us
    testers. It could be the case that there has genuinely been some sort of a technical
    problem at the time when the user was trying to perform an operation or that the
    user wasn’t tech savvy enough to understand the documentation or that they simply
    made a mistake. When that happens, they will reach out to available communication
    and support channels and complain about their problem.


    Because of everything that happens in a blockchain, the long periods involved
    and also because your user base isn’t necessarily technical, the initial problem
    report will always be missing important information. Sometimes it will be easier
    for engineering to guess what the actual problem was and offer a solution to be
    communicated back; other times it may be entirely impossible. To be clear this
    is much more likely to happen in the event someone wants to become an active validator
    rather than trying to become a nominator via the Creditcoin Staking Dashboard.


    To combat this situation, I am proposing a two-step approach:


    1.  Curating a list of common questions and requests for additional information
    – this is to make sure you can collect as much initial data from the user as possible
    and also cover commonly known pitfalls and edge cases. Whenever the user contacts
    your support team, they will be asked to provide answers to these questions. The
    sooner this happens the better – for example, if a user shuts off their computer
    and then retries on the next morning, chain-state will have changed so their actions
    may result in a slightly different outcome. Ideally this list of questions is
    publicly available in the documentation, and users are aware what sort of information
    they should provide when contacting support.


    2.  Logs, local results, computer uptime, process uptime, and many other data
    are actually possible to be queried directly from the blockchain and the host
    running a creditcoin3-node process. Listing open ports, trying to reach out well-known
    Creditcoin URLs across the Internet, measuring networking speed, etc. are also
    possible. I call this the `sos-report` command similar to something I’ve seen
    in commercial Linux distributions. Ideally this command will be part of the docker
    container, will collect all of the necessary information from step 1, and then
    allow the user to review it and submit it to the support team!


    This proposal is also where you start building your knowledge base and expanding
    the support services offered to the public. While not strictly a testing-related
    activity, it can benefit overall quality in a few ways.


    *   Testers can learn a lot from the actual users on the field – this is real-world
    usage of the software under test, and we can use this knowledge to improve test
    coverage where needed.


    *   In the event of known issues, testers are likely to have already seen it or
    to be familiar with the issue because we’ve got a lot of edge-case knowledge about
    the application collected through countless tests and exercising the same application.
    We can unlock this knowledge and share it with the rest of the organization.


    #### Integration Tests Speed-Up


    I’ve mentioned previously that the biggest part of the test suite for Creditcoin
    3 is the CLI integration test suite. It contains the highest number of individual
    test scenarios and takes the most time to execute. On a per CI job basis, this
    execution time has grown to around 90 minutes for the longest jobs. While writing
    this book, I worked on a number of tasks to try and bring this down which of course
    starts by measuring how much testing do we actually do.


    At the time of writing this book, there were over 7000 workflow runs in GitHub
    Actions for the gluwa/creditcoin3 repository alone. Of them CLI integration test
    jobs average roughly 1000 hours per month.


    The initial speed-up targeted a few low hanging fruits:


    *   Reduce the value for hard-coded sleep calls, and remove such calls where possible.


    *   Rewrite setup sections so that related test scenarios would share their setup
    instead of each scenario having their own. That was especially useful for long
    running test scenarios like withdrawUnbonded.test.ts which need to wait 15+ minutes
    for the correct pre-conditions before they can actually do anything.


    *   Conditionally skip other long-running test scenarios, like validatorCycle.test.ts
    on purpose. This scenario takes around 20 minutes, with a maximum timeout of around
    30 minutes, and acts like an end-to-end testing with all of the individual commands
    used inside of it tested separately in isolation. We don’t need to repeat this
    on every single pull request, so I’ve added a conditional statement which will
    execute this scenario only on commits directly into the dev branch, for example,
    post merge. It is still executed on pull requests against other branches for extra
    safety before a new release.


    The most significant change in this optimization space is switching away from
    GitHub’s hosted runners onto self-hosted ones. This is something that I already
    use as part of runtime-upgrade testing so it was just a matter of adding a bit
    of extra configuration to the existing CI pipeline. In particular, provide self-hosted
    runners using a matrix job with the similar arguments as the integration-test-cli
    matrix. Label the newly provisioned runners with their respective labels according
    to the test matrix, and then use the same labels in the integration-test-cli job
    definition to select the appropriate runner. That guarantees six unique runners
    each one of which will be assigned to only one integration test job. Then destroy
    them when finished!


    This effort lead to shaving off 30 minutes from the longest running test jobs
    in this matrix. My speculation is that even though there is a lot of waiting for
    blockchain-related operations, using these self-hosted runners is still faster
    than GitHub shared runners because they are a dedicated resource which isn’t oversubscribed.
    I/O and most likely CPU operations will take less time because the underlying
    operating system is giving its full attention to your testing instead of juggling
    hundreds or thousands of other processes. I don’t have a definitive proof if that’s
    the actual reason, but it does make sense, and empirical results show that using
    these self-hosted runners is faster than using the shared ones!


    Caution


    Besides the limits of how many virtual machines you can provision at the same
    time in your hosting environment, there is another more subtle factor which may
    be imposing unexpected limitations on your CI. This is the API request limit rates
    set by your chosen cloud provider in relation to how often you need to provision
    resources on-demand. With Creditcoin 3 I’ve seen the underlying provisioning API
    respond with *429 Too Many Requests* often enough to be annoying and cause my
    CI setup failing!'
  trans: '

    ## 故障排查指南与 `sos-report` 命令


    我遇到的另一个有趣挑战与社区互动有关。由于种种原因，用户最终会遇到麻烦——要么没阅读文档，要么不够留意，要么尝试了从未预料到的操作——用户对此很在行，甚至可能比我们测试人员更擅长。可能的情况是，用户在尝试执行操作时确实遇到了某种技术问题，或者用户的技术水平不足以理解文档，又或者他们只是犯了个错误。当这种情况发生时，他们会通过可用的沟通和支持渠道反映问题并抱怨。


    由于区块链中发生的一切都涉及较长的周期，而且你的用户群体不一定具备技术背景，因此最初的问题报告总会缺少重要信息。有时工程团队比较容易猜测出实际问题是什么，并给出解决方案进行反馈；而有时则完全不可能。需要明确的是，当有人想通过
    **`Creditcoin Staking Dashboard`** 成为活跃验证者而非提名者时，这种情况更有可能发生。


    为了应对这种情况，我提出了一个两步法：


    1.  整理一份常见问题及额外信息请求清单——这是为了确保你能尽可能多地收集用户初始数据，并涵盖已知的常见陷阱和边缘情况。每当用户联系你的支持团队时，他们会被要求提供这些问题的答案。越早这样做越好——例如，如果用户关闭了电脑，第二天早上再重试，链的状态已经改变，因此他们的操作可能会产生略有不同的结果。理想情况下，这份问题清单应在文档中公开，并且用户知晓在联系技术支持时应提供何种信息。


    2.  日志、本地结果、计算机运行时间、进程运行时间以及许多其他数据，实际上可以直接从区块链和运行 `creditcoin3-node` 进程的主机上查询。列出开放端口、尝试通过互联网访问知名的
    `Creditcoin` URL、测量网络速度等操作也是可行的。我将此命令称为 `sos-report`，类似于我在商业 Linux 发行版中见过的功能。理想情况下，此命令应成为
    Docker 容器的一部分，它能收集步骤 1 中的所有必要信息，然后允许用户查看并将其提交给支持团队！


    这个提议也是你开始构建知识库并扩展面向公众的支持服务的地方。虽然这不严格属于测试相关活动，但它可以在几个方面有益于整体质量。


    -   测试人员可以从实际用户那里学到很多东西——这是被测软件的真实世界使用情况，我们可以利用这些知识在需要的地方改进测试覆盖。

    -   如果遇到已知问题，测试人员很可能已经见过或熟悉该问题，因为我们通过无数次测试和运行同一应用程序，积累了关于该应用程序的大量边缘情况知识。我们可以解锁这些知识，并与组织的其他成员分享。


    ## 集成测试加速


    我之前提到过，`Creditcoin 3` 测试套件中最大的部分是 CLI 集成测试套件。它包含最多的单个测试场景，并且执行时间最长。就单个 CI 任务而言，最长任务的执行时间已增长到大约
    90 分钟。在撰写本书期间，我致力于一些任务来尝试降低这一时间，当然首先要衡量我们实际进行了多少测试。


    在撰写本书时，仅 `gluwa/creditcoin3` 仓库在 `GitHub Actions` 中的工作流运行次数就超过 7000 次。其中，CLI 集成测试任务平均每月大约耗时
    1000 小时。


    最初的加速针对一些容易实现的目标：


    -   减少硬编码的 sleep 调用值，并在可能的情况下移除这类调用。

    -   重写设置部分，使相关的测试场景共享它们的设置，而不是每个场景都有自己的设置。这对于像 `withdrawUnbonded.test.ts` 这样的长时间运行测试场景特别有用，该场景需要等待
    15 分钟以上的正确前置条件才能实际执行任何操作。

    -   有条件地跳过其他长时间运行的测试场景，例如特意跳过 `validatorCycle.test.ts`。此场景大约需要 20 分钟，最大超时时间约为
    30 分钟，它作为一个端到端测试，其中使用的所有单个命令都已单独隔离测试过。我们不需要在每个拉取请求上都重复此测试，因此我添加了一个条件语句，使得该场景仅在直接提交到
    `dev` 分支（例如合并后）时才会执行。它仍然在其他分支的拉取请求上执行，以在新版本发布前提供额外的安全性。


    此优化领域中最显著的改变是，从使用 GitHub 托管的运行器切换到使用自托管的运行器。这已经是我在运行时升级测试中使用的方法，所以只需在现有的 CI 流水线中添加一些额外的配置即可。具体来说，使用一个矩阵任务提供自托管运行器，其参数与
    `integration-test-cli` 矩阵类似。根据测试矩阵，用相应的标签标记新配置的运行器，然后在 `integration-test-cli`
    任务定义中使用相同的标签来选择适当的运行器。这保证了六个独立的运行器，每个运行器将只分配给一个集成测试任务。然后在完成后销毁它们！


    这项工作使该矩阵中运行时间最长的测试任务减少了 30 分钟。我的推测是，尽管有很多等待区块链相关操作的时间，但使用这些自托管运行器仍然比使用 GitHub
    共享运行器快，因为它们是一种不会被过度订阅的专用资源。I/O 以及很可能 CPU 操作所需的时间会更少，因为底层操作系统会将全部注意力投入到你的测试中，而不是同时处理成百上千的其他进程。我没有确凿的证据证明这就是实际原因，但这说得通，而且经验结果表明，使用这些自托管运行器比使用共享运行器更快！


    **注意**


    除了在你的托管环境中同时可以配置的虚拟机数量有限制之外，还有另一个更微妙的因素可能会对你的 CI 造成意外限制。这就是你选择的云提供商设置的 API 请求限制速率，这与你需要按需配置资源的频率有关。在使用
    `Creditcoin 3` 时，我经常遇到底层配置 API 返回 `429 Too Many Requests` 错误，这足以令人烦恼，并导致我的 CI
    设置失败！

    '
- fmt: 'This also tells me that the overall number of virtual machines that I can
    have at any given time has nothing to do with the number of how many API requests
    I am allowed per hour/per minutes, etc. This is something that needs to be evaluated
    in more details if your testing depends heavily on self-hosted runners.


    All of this isn’t very difficult to do with the existing syntax in GitHub Actions;
    however, it brings an unwanted side effect – you now have a matrix test job which
    depends on another matrix test job, see Figure [7-9](#629923_1_En_7_Chapter.xhtml#Fig9).
    If one of the integration test jobs fails, or times out, there is no easy way
    to restart it. I mean you could click the restart button in the GitHub interface
    for that specific job which has failed, but it will lead to unwanted results.
    The best you can do is restart all jobs part of the matrix together – and that’s
    simply not possible via the current GitHub interface – you have to restart all
    jobs defined in the same yaml file.


    At the time of writing this book, this was a fairly recent problem, but I think
    I know what the solution should be. If there is one more CI job, before the `deploy-github-runner`
    one, that is, to the left of the dependency chain, it could serve as the entrypoint.
    Let’s call it `integration-test-cli-entrypoint`. If any of the subsequent jobs
    needs to be restarted, a tester could restart the `integration-test-cli-entrypoint`
    job and everything else that comes after it. Still not very optimal, but it doesn’t
    trigger a restart for every other CI job defined in the same yaml file. I’m definitely
    trying this out!


    ![Figure 7-9](images/629923_1_En_7_Chapter/629923_1_En_7_Fig9_HTML.jpg)


    **Figure 7-9** Dependent matrix jobs


    ## Summary


    As you have seen by now, testing Creditcoin 3 is very similar to its predecessors
    from the v2 family. That is to be expected because the underlying technology stack
    and development practices are roughly the same. On the other hand, there are new
    testing challenges that came up which I guess is also to be expected.


    Unfortunately there is no more testing that I can share for now. As I am writing
    the book, the next phase of Creditcoin 3 is not there yet, and I haven’t worked
    on it, not am I aware of the practical details related to its implementation.


    In the next chapter, I will talk about how I approach testing in general and what
    I think a test engineer’s job is. Please stick around a bit more.


    Footnotes [1](#629923_1_En_7_Chapter.xhtml#Fn1_source)   [2](#629923_1_En_7_Chapter.xhtml#Fn2_source)


    # Part IV Blockchain Testing Approaches


    # 8. How Others Test Blockchain


    My motivation for writing this book was to share my personal experience in blockchain
    testing in the hope that it could be useful to others. During the process of writing
    it, I actually came to know other testers who were working in the blockchain domain.
    And of course they were working on products which are different than mine, and
    their approach is also different.


    This chapter outlines the experience of Andrew Snaith and Sebastian Viquez who
    kindly agreed to talk to me. As you will see, there is even more to test in blockchain
    than I have already covered in all the previous chapters.


    ## My Blockchain Testing Approach


    As with any other kind of testing, I start by trying to understand what we’re
    trying to do and the limitations of the environment I am working in:


    *   What are all of the components of the blockchain under test?


    *   How does each component work, and what is its complexity?


    *   What are the risks involved; what are the business requirements?


    *   What parts can be exercised via unit, integration, and/or other types of testing?


    *   How do I actually write these types of tests – for example, available tools,
    syntax, and examples?


    This helps me build up my understanding of all moving parts from business point
    of view and also from a technical point of view. I tend to start from the technical
    side first and then gradually expand my understanding. Whenever possible, I will
    opt-in for testing early in the development cycle and automating as much as possible.
    That also helps to codify the behavior of a complex system which has been handy
    on numerous occasions.


    For Creditcoin that means I was focusing mainly on testing business logic and
    covering additional scenarios as they arise and as we gain more understanding
    of how the entire blockchain is used and how it works in detail. Constantly participating
    in code review on pull requests, raising questions and opening tickets for missing
    tests or the need for refactoring so that they aren’t forgotten has contributed
    more for quality over time than any particular test scenario I’ve automated or
    any individual bug I’ve found.


    This is a bottom-up approach and is also a very organic one – testing from day
    one and testing every minimal bit of product that you can lay your hands on. This
    is also a personal bias that I have because of how my professional career has
    taken place over the years – I’ve always worked in product companies, always on
    products which are highly technical in nature and always on the same level as
    my developer counterparts. That is the nature of infrastructure-type software
    products anyway.


    I’m not sure if I am even qualified to offer advice for anyone else not being
    in the same situation as I am in. I guess just “give it a try” is good enough
    advice.


    ## Testing Across the Blockchain Stack with Andrew Snaith


    Testing a blockchain protocol and client implementation is one side of the puzzle
    and arguably the fact that Gluwa, Inc. controls both makes testing Creditcoin
    relatively easy. I talked to Andrew Snaith, Quality Engineering Lead at ChainSafe,
    about his point of view around blockchain testing and discovered even more nuances
    than I had previously thought about.


    ChainSafe is a multi-chain blockchain research and development company with a
    focus on open source software. They offer development services for external clients
    and also develop their own products.


    In terms of organization, the company has multiple engineering teams which for
    the majority part work on what they call streams. Some engineers are dedicated
    to a single stream, while others are working on multiple streams in parallel.
    Similarly some teams have a dedicated quality engineer, while others do not, more
    on this later. The work itself is spanning across multiple chains as well as across
    the entire stack: host client development, cross-chain bridges, web3 tooling libraries
    and SDKs, distributed applications, smart contracts, and browser extensions.


    **Note**


    A **bridge** is a computer program that connects two or more blockchains together
    usually for the purposes of transferring assets between them. Different chains
    are not natively connected to one another, so the bridge must make sure that token
    ownership and quantities are represented correctly in a cross-chain transfer.


    **Note**


    **Filecoin** is a decentralized blockchain-based storage network. It was developed
    by [Protocol Labs](https://en.wikipedia.org/wiki/Protocol_Labs)^([^(10)](#fn10))
    and shares some ideas from [InterPlanetary File System](https://en.wikipedia.org/wiki/InterPlanetary_File_System)^([^(11)](#fn11))
    allowing users to rent unused disk space. The blockchain is based on both proof-of-replication
    and [proof-of-spacetime](https://en.wikipedia.org/wiki/Proof_of_space-time)^([^(12)](#fn12))
    consensus algorithms.


    ### Products Under Test


    I’m not going to list every single project that ChainSafe works on, but here’s
    a list of several notable products under test grouped in their respective categories.
    Please try to keep in mind this diversity because it reflects on how testing is
    performed.'
