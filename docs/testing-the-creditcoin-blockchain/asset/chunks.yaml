    *   Jul 20, 2021: **sawtooth-legacy-core** – first GitHub actions in the fork.


    *   Jul 20, 2021: **creditcoin-legacy-processor-rust** – first CI status recorded
    on main branch but not on the default dev branch.


    *   Aug 09, 2021: **creditcoin-legacy-consensus-rust** – Azure Pipelines.


    *   Aug 23, 2021: **creditcoin-legacy-docker-compose** – first real testing in
    CI but never merged.


    *   Aug 13, 2021: **creditcoin-legacy-consensus-rust** – GitHub Actions.


    *   Sep 21, 2021: **sawtooth-legacy-sdk-rust** – enable CI in GitHub Actions;
    1st commit in fork.


    *   Sep 29, 2021: **creditcoin-legacy-gateway** – Azure Pipelines and GitHub actions.


    ### State of Testing Before I Joined


    As far as we can tell from public GitHub history, two repositories are running
    GitHub Pages actions, but no real checking on anything related to the software
    under test itself. Another four repositories are running CI pipelines in Azure
    DevOps which I speculate that only compile the software without performing much
    else.


    These pipelines in Azure don’t seem to have been defined in source code, and their
    definitions don’t seem to have been part of any git repository, so I cannot tell
    what kind of testing was executed as part of these pipelines. It is also unclear
    how exactly these Azure CI jobs were triggered and if that has been a reliable
    event or not since there are some commits and pull requests which don’t have statuses
    reported on them.'
