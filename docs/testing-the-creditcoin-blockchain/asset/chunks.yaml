  trans: '

    ### 其他有趣的测试及若干缺陷


    作为 v2.3 开发的一部分，曾出现过一些有趣的故障。这些故障发生在专用测试环境中，并促使我们在现有测试套件中增加了更多测试。


    一旦切换到指定权益证明机制，你就无法再更改区块链实现中的某些值。最重要的是，你不能更改质押周期——即选择验证人出块的时长！更改此项会导致区块链崩溃，因此我添加了静态分析检查和集成测试来捕获此问题！这也凸显了在此处选择合适的实际值是多么重要。


    另一个与升级测试基础设施相关的问题，是如何基于 Git 标签发现最新版本。CI 任务期望遵循特定的命名约定，例如，针对 Devnet（开发者网络）的升级使用
    `-devnet`，针对 Testnet（测试网）的升级使用 `-testnet`，以此类推。还记得运行时升级测试 CI 任务是如何检查拉取请求的目标分支，以确定同步到哪个链的吗？类似地，它们需要知道如何找到先前版本——该版本在
    CI 任务中会被多处使用。一致地命名版本非常重要，而有些版本打破了现有的命名约定，这对未来版本的 CI 任务执行产生了负面影响。通过更新版本号并在 GitHub
    上使用适当的名称标记新版本，该问题已得到修复。在测试方面，我还添加了另一个静态分析脚本，这样如果命名约定未被遵循，实际上就会中断发布流程。我打赌你没想到命名你的
    Git 标签也需要测试，但当你将其转变为公共接口时，它确实需要进行测试。


    当我着手设置负载测试工具时，曾短暂地遇到 `creditcoin-transaction-producer` 无法与最新版 Creditcoin 配合工作的问题。原因在于它在创建待发送交易之前会使用链元数据检查兼容性，请记住
    `gluwa-bot` 会在需要时自动更新链元数据。这个机器人带来的一个副作用是，更新 Creditcoin 版本号也会更改元数据。所有这些最终导致了一个
    CI 任务，该任务会检查区块链与我们开发工具之间的兼容性，以便我们知道它们始终可用且相互同步！


    作为 Testnet 上社区测试流程的一部分，开发账户 Alice 和 Bob 已被剥夺资金以防止滥用，例如盗窃资金。默认情况下，Alice 还拥有 sudo
    权限。这种资金剥夺行为破坏了针对实时目标的升级和集成测试。此后，测试流程开始使用不同的账户，这些账户的凭据在外部定义，并且出于安全考虑，被排除在 CI 执行环境之外。我想，除非你能够直接控制，否则不能想当然地认为某些账户和前置条件会始终成立。


    作为 PoW 到 PoS 迁移准备的一部分，团队一直在使用测试环境进行演练。这个测试环境最初在我们尝试对其执行 PoW 到 PoS 迁移过程后卡住了。原因是，当调用
    `switch_to_pos()` 外部函数时，它期望提供一个账户列表，这些账户将在第一个选举周期完成前充当初始验证人。该列表期望每个验证人有两条记录——一个
    **stash** 账户和一个 **controller** 账户——这些随后被传递给 BABE 模块（负责生产新区块的模块）。在源代码中指定这些参数的顺序，与
    BABE 期望的顺序相反。在之前的测试中，我们总是对 **stash** 和 **controller** 使用相同的账户，因此没有发现这个缺陷。从“测试”的角度看，测试环境成功地执行了发现问题的任务。


    附带说明一下：“**stash**” 和 “**controller**” 是来自 Substrate 框架的概念，其中一个账户（“**controller**”）代表另一个账户（“**stash**”）行事。在迁移期间，Substrate
    已经发布了该框架的新版本，从同时使用 **stash** 和 **controller** 账户迁移到仅使用单个账户，因为使用两个账户容易混淆。在 Creditcoin
    3.0 中，只有一个“**stash** 账户”！工程团队中的每个人都知道这一点，这也是包括我在内没人考虑使用两个不同账户进行测试的部分原因。


    与迁移相关的另外两个问题同样是在测试环境中发现的，这两个问题几乎肯定会导致整个区块链崩溃。两者都与一个特定的区块号有关，仅仅因为这个数字被用作一个硬编码的、足够大的值：


    1.  最初发现了一个节点内存耗尽并崩溃的问题。这发生在运行时升级之后。该操作试图分配过多内存，导致节点崩溃。内存足够大的机器没有崩溃，但升级耗时过长，无法被认为可行。


    2.  下一个问题与此相关——在每个区块上执行的 `on_initialize()` 钩子函数，试图从存储中删除过多的条目。这与 Creditcoin 2.0
    中发现的那个过度“贪婪”地将链上存储条目读入内存的函数是同一个；参见 [`https://github.com/gluwa/creditcoin/pull/1253`](https://github.com/gluwa/creditcoin/pull/1253)。当前的问题是，要删除的条目过多，I/O
    操作耗时超过了提议新区块所允许的时间，从而破坏了区块生产。这是 `::clear_prefix(block_number, u32::MAX, None)`
    这段代码，试图删除数量极其庞大的条目。修复方法在 [`https://github.com/gluwa/creditcoin/pull/1353`](https://github.com/gluwa/creditcoin/pull/1353)
    中——设置每个区块能删除的最大数量限制，并将内部清理过程分散到多个区块中执行。


    在测试方面学到的一些重要经验：


    1.  当你看到像 `u32::MAX` 这样的东西时，要高度质疑它们，并让你的 CI 工具能触发类似模式的检查。试图将软件系统推向极限从来不会带来什么好处。


    2.  读/写操作应该有限制，并且这些限制必须在它们变得过大以至于破坏系统之前得到验证。尤其是在 Substrate 框架中，从链上存储读取条目然后对其进行迭代是非常容易的——实现此功能的代码非常优雅且易于使用。然而，这同时也意味着很容易忘记设置上限，并尝试将过多数据读入内存。


    3.  警惕文档、示例和测试套件中硬编码的“足够大”的值，因为这些地方是用户在不完全清楚自己在做什么或不够小心时，会去查找参考的地方。如果可能，尽量使用能对硬编码数值进行触发的静态工具。


    上述问题之所以差点在生产环境演变成大问题，唯一原因是可能有人被要求使用一个从未打算用于生产环境的示例。由于不了解且可能不理解该示例的含义，他们复制了一个当时看来可能还很遥远的数值。有点像程序员过去不得不处理的千年虫问题。


    如果测试环境不是从生产环境分叉出来的，或者如果它包含的区块（存储中的数据）太少，这些问题永远不会被发现。这说明使用生产数据进行测试是多么重要！也说明良好的开发者体验（例如，文档和高质量的示例）可以直接惠及供应商和社区开发者。

    '
- fmt: '# Another Problem: Off-Chain Worker Nonce Management


    Another problem that was discovered was with off-chain worker nonce management.
    Remember this is the component which talks to the outside world and a nonce is
    a unique number used during communications. The issue is that when a verification
    fails the off-chain worker still updates its nonce while the on-chain nonce doesn’t
    change. The off-chain worker can handle the situation when it sends a transaction
    and that transaction fails immediately, but there’s no way to check what’s the
    status of a transaction if it gets removed from the pool at some later time or
    doesn’t fail immediately. So you end up with several failure scenarios on the
    next round:


    - `OCW` nonce is too small; on-chain nonce is higher – transaction will fail b/c
    the nonce has already been used.

    - Two transactions with the same nonce in the transaction pool – one will be dropped
    from the pool, but you don’t know that it has been dropped. There are also other
    reasons transactions can be dropped from the transaction pool, and then the two
    nonce counters get out of sync.

    - `OCW` nonce is too high; on-chain nonce is smaller – transaction looks good,
    but it stays in the transaction pool “forever.” Transaction from the pool will
    not be included in a block because it is waiting until the on-chain nonce counter
    catches up to it. The transaction will likely expire before that happens.


    This issue has always been present; however, with the switch to proof of stake,
    the Creditcoin team also added more extrinsics which require off-chain work. The
    voting process with proof of stake generates lots more on-chain activity, even
    when there are no loan transactions compared to an idle proof-of-work chain. Both
    of these facts combined made the problem appear more frequently.


    The technical fix for this is to monitor when these counters are about to diverge
    into a non-recoverable state and reset them.


    ## Testing Challenges During v2.3


    I’ve seen a few challenges during the development phase of v2.3. I believe most
    of them stem from the rapid development process and the lack of full understanding
    of all of the involved components. Sounds like any other testing project, right?


    Starting with all third-party components and forks – before making any choices
    and going ahead with implementation we should have taken the time to inspect their
    upstream code base, state of test suite, CI jobs history, and overall testing
    practices. As it happened, every single third-party component which we forked
    was in a rather poor state with regard to testing which opens a whole lot of questions
    around long-term maintenance. A tricky thing here which had misled the team was
    that other more popular blockchains are also built on top of the same components.
    After examining the state of the upstream repositories, I do not believe that
    what’s published on GitHub is exactly the same code base used in production. At
    least not for all of the components involved anyway.


    There is no good alternative here though. If the team had decided that these upstream
    components are not good enough, then we would have needed to invest much more
    time in developing our own or going through timely discussions with third-party
    vendors to use their hosted services instead. That’s something which works as
    a long-term strategy and the team will probably do it anyway, but it doesn’t work
    short term when you have a rapid development cycle.


    > **Tip**

    >

    > Assert on the state of any critical third-party open source components that
    you may rely upon! Even when the component doesn’t initially appear to be that
    critical!


    The next challenges are related – not understanding the components requirements
    well enough, due to not being familiar with all of the components themselves,
    and not communicating detailed enough with stakeholders around their expectations
    toward the release schedule and perceived level of quality. In practice the “public
    testnet release” was very close to the actual mainnet release in terms of schedule
    and quality. For this Testnet release, it wasn’t expected that it would be beta
    quality, rather it was expected that it will be close to production quality with
    only minor issues and bugs existing. That’s different from how other, more traditional
    software gets developed and published. In other words, the majority of the testing
    and development pressure gets shifted early in the release lifecycle, and you
    have sprints which can be roughly classified as periods of high activity and others
    which are relatively quiet.


    In some domains, certainly blockchain and crypto, the appearance of a testing
    release may very well be more important than the functional quality of said release.
    This skews the priority of seemingly small issues, which “you may fix later” toward
    actually becoming a big deal that needs to be addressed quickly and can even block
    your release. It’s all about the optics!


    I’ve mentioned earlier in this book that when relying on third-party components,
    you need to be aware of who’s the vendor producing them and what are their primary
    business objectives. This is certainly true when directly forking an open source
    application. For example, the Polkadot Staking Dashboard is used by the Polkadot
    blockchain, and I’ve found a number of bugs which they are happy to tolerate.
    On the other hand, the same bugs are present in the Creditcoin Staking Dashboard
    fork, and they are viewed as issues that the Creditcoin product owners are less
    willing to tolerate, therefore necessitating additional investment in development
    and testing resources in the same area. Simply because a bigger player uses the
    same underlying software components like you do doesn’t mean that the underlying
    software is 100% top-notch!


    > **Tip**

    >

    > Make sure that the entire team understands what’s expected quality wise! Make
    sure engineering and stakeholders are on the same page!


    Furthermore, it would be great if we as testers pioneer the adoption of acceptance
    criteria/release criteria. These are relatively common in large organizations
    dealing with enterprise-type software but far less so in a fast-moving start-up
    type of environment.


    For example, the Basic Release Criteria for the Fedora Project Linux distribution
    are documented at `https://fedoraproject.org/wiki/Basic_Release_Criteria`, and
    every new feature added inside a particular release has its own additional criteria.
    I believe this helps align everyone’s expectations around what will be delivered
    and is subject to feedback, planning, and adjustments. It can start small and
    evolve over time obviously, but I consider the lack of such criteria to be a mistake,
    especially on my side as a tester.


    ## Migration from PoW to PoS


    The actual migration process was scoped out into a document as a checklist and
    executed several times against different environments: locally, Staging (aka fork
    of Mainnet) until the team was confident in all the steps and there were no obvious
    problems before actually migrating Mainnet nodes!


    Sadly the `switch_to_pos()` extrinsic, the abovementioned checklist, and all tests
    related to asserting state before and after the migration from proof of work to
    proof of stake were no longer needed afterward and have been deleted since. That
    was really a “one off” type of testing.


    ## Summary


    Creditcoin 2.3 obviously survived the switch to proof of stake. At the time of
    this writing, it has been over 2 million blocks later, so the blockchain has been
    running as proof of stake longer than it has been running as proof of work. More
    importantly, I also survived this very hectic period and learned quite a lot more
    aspects of “testing the blockchain” which I hadn’t thought about before.


    In the next chapter, I will talk about the next iteration – Creditcoin 3.0 and
    the novelty it brings onboard. Once again the team makes a switch – this time
    in a slightly different direction.'
