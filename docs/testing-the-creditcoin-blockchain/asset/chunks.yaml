  trans: '

    ### 负载与性能测试


    在提名权益证明的背景下，区块链的性能问题再次变得重要起来。同时存在多个待处理事项：


    -   用于选择下一时代验证者的算法实际上是在遍历一个图。验证者数量越多，图就越大，求解所需时间就越长。如果我没记错，Web3 研究文档指出的实际限制约为
    300 个验证者，而 Kusama 和 Polkadot 等其他 Substrate 链已经运行在此限制下。对 Creditcoin 而言，找出我们自己的实际限制至关重要。

    -   还有一个设置限制了每个验证者的提名者数量。我不清楚这个数字是否会对上一项中的图算法产生影响。

    -   所有验证者在当前时代都会发送一个`i-am-online`的 ping 信号；否则，他们将受到惩罚。

    -   惩罚子系统监控在线 ping 信号，并在必要时计算惩罚，如有需要则冻结验证者节点。

    -   根据每个验证者在当前时代产生的区块数量，奖励子系统会计算验证者及其所有提名者的奖励。

    -   还有常规的 Creditcoin 借贷周期交易。


    与之前的工作量证明版本相比，整个区块链的通信量要繁重得多。


    着眼于 Creditcoin 2.3 的所有这些，我们需要建立一个性能基准，以及一套用于“性能测试”的工具集/方法论。这里使用引号，是因为我仅仅是触及了这个领域的皮毛，并未深入探究，你将会看到这一点。


    工具库中的第一个工具叫做 `Zombienet`，[`https://github.com/paritytech/zombienet`](https://github.com/paritytech/zombienet)。它使用模板，会启动一个独立的临时区块链网络。通过模板文件，可以配置不同数量的节点和参数。你还可以使用
    `Zombienet DSL` 语言对生成的网络进行断言！


    我使用 `Zombienet` 启动了包含 100 到 300 个验证者的网络，并调整了 Creditcoin 的设置，以建立测试所需的硬件基准和网络行为基准。Creditcoin
    Zombienet 的入口点是主 Git 仓库中的 `zombienet/` 目录。


    下一个重要问题是：“如果我们切换到提名权益证明，Creditcoin 能否支持最低数量的借贷交易？”或者更确切地说，“它能支持多少笔借贷交易？”换言之，从业务角度来看，切换到权益证明是否会对区块链吞吐量产生影响？起初我们研究了
    [`https://github.com/paritytech/polkadot-stps`](https://github.com/paritytech/polkadot-stps)，这是一个适用于任何基于
    Substrate 链的通用工具。`Polkadot-STPS` 发送余额转账，这种交易在几乎所有使用 Substrate 框架实现的区块链中都必然存在；然而，与借贷周期交易相比，它们相当轻量，因此并非最佳选择。


    我没有深入探究这个难题，因为最初发现的数据已经回答了关于未来短期到中期内预期区块链性能的最重要问题。还有另一位团队成员创建的工具 `creditcoin-transaction-producer`，其任务是发送成百上千笔交易，从而实际回答关于吞吐量的问题。


    ### 安全赏金计划


    安全问题一直是 Creditcoin 持续关注的重点。并且在我看来，我们作为工程师应该始终努力创建安全的软件，并沿着这条思路去思考。


    例如，作为 `creditcoin-cli` 开发的一部分，我成功地倡导移除了直接以明文指定密钥或在终端中直接显示这些密钥的功能。此类功能会带来安全风险，因为这些明文值可能会出现在终端历史文件中，或者在用户试图报告问题时，随着命令输出被复制粘贴给更广泛的受众。我在这个行业工作了足够长的时间，亲眼见识过经验丰富的团队通过各种不同方式在网上泄露他们的凭证。如果你的软件在没有最低限度防范措施的情况下以明文形式暴露密钥，那些安全意识较弱/技术不精的用户肯定会泄露他们的密钥。这无异于自找麻烦！


    在 `creditcoin-cli` 中，密钥要么通过终端提示符交互式读取（会屏蔽输入字符且不允许复制该值），要么需要作为环境变量指定！应用程序本身绝不会将这些值存储在磁盘上。


    除了 Creditcoin 工程师从安全角度进行内部风险评估、使用之前提到的静态分析工具、遵循最佳实践以及保持第三方依赖项更新之外，团队还在我们的安全赏金计划上做了更多工作。


    这是一个低调的赏金计划，最初托管在 `Hunter.dev` 平台上（该平台后来改变了其关注重点），并在每个仓库的 `SECURITY.md` 文件中记录了负责任地披露安全漏洞的步骤。其目标是让社区能够发现一些低级漏洞，同时让团队建立一个针对修补和响应安全漏洞的工作流程。对于测试而言，这意味着验证报告的条目，最重要的是确保重现步骤和问题描述足够精确，以便工程师能够着手处理。


    安全之旅的下一步将是一个专门的安全赏金计划，提供高额现金或加密货币奖励，并托管在一个专注于 Web3 安全研究的高知名度平台上。在撰写本文时，团队尚未达到这一步。


    注意，在编写本书期间，`huntr.dev` 平台本身发生了所有权变更，并将其关注点从一个通用安全赏金平台转向了专注于 AI/ML 的平台。因此，原来的赏金计划已不复存在！安全漏洞仍然可以通过电子邮件和/或
    GitHub 的安全公告界面（对所有人开放）进行披露，但这并非专门针对安全研究领域的专业人士。


    恰巧的是，我还参与起草了几个 Creditcoin 的安全公告，这些公告最终发布在 [`https://github.com/gluwa/creditcoin/security/advisories`](https://github.com/gluwa/creditcoin/security/advisories)。这是测试工程师工具带中需要增加的又一利器！

    '
- fmt: '### Other Interesting Testing and Some Bugs


    As part of v2.3 development, a number of interesting failures happened. They happened
    on dedicated testing environments and prompted more testing to be added to the
    existing suite.


    Once you switch to nominated proof of stake, you can’t change some values inside
    your blockchain implementation. Most importantly can’t change duration of staking
    epoch – the period for which validators are chosen to produce blocks! Changing
    this bricks the blockchain so I’ve added static analysis checks and integration
    tests to catch this! Which also highlights how important choosing the actual values
    here is.


    Another issue related to upgrade testing infrastructure is how latest releases
    are discovered based on git tags. The CI jobs expect a certain naming convention,
    for example, `-devnet` for upgrades intended for Devnet, `-testnet` for Testnet,
    and so on. Remember how the runtime upgrade testing CI jobs introspect the target
    branch for a pull request in order to figure out which chain to synchronize to?
    In a similar fashion, they need to know how to find the previous release which
    is used in several different places as part of those CI jobs. Consistently naming
    releases is important, and several versions broke the existing convention which
    negatively affected CI jobs execution for future releases. That’s been fixed by
    bumping the version number and tagging new releases in GitHub with the appropriate
    names. On the testing side, I’ve added another static analysis script to actually
    break the release pipeline in case the naming convention isn’t followed. I bet
    you didn’t imagine that naming your git tags is something that would require testing,
    but when you turn it into a public interface, then it does need to be tested.


    When I was working on setting up the load testing tools, briefly I had an issue
    where `creditcoin-transaction-producer` wasn’t working with the latest implementation
    of Creditcoin. The reason is that it uses the chain metadata before creating transactions
    to be sent and checks for compatibility and remember that `gluwa-bot` automatically
    updates the chain metadata whenever required. A side effect of this bot is that
    updating the Creditcoin version number also changes the metadata. All of this
    resulted in a CI job which would check the compatibility between the blockchain
    and our devel tools so that we know they are always usable and in-sync with one
    another!


    As part of the community testing process on Testnet, the development accounts
    Alice and Bob have been defunded to prevent abuse, for example, stealing funds.
    By default Alice also has sudo privileges. This defunding broke upgrade and integration
    testing against a live target. Since then the testing process has started to use
    different accounts, whose credentials are defined externally and kept out of the
    CI execution environment due to security concerns. I guess you can’t take for
    granted that certain accounts and pre-conditions will always hold true unless
    you can control them directly.


    As part of the PoW-PoS migration preparation, the team had been exercising using
    a staging environment. This staging environment initially got stuck after we tried
    executing the PoW to PoS migration process on it. The reason was that when calling
    the `switch_to_pos()` extrinsic, it expects a list of accounts which would act
    as initial validators before the first election cycle is complete. That list expects
    two entries for each validator – a stash and a controller account – which were
    then passed down to the BABE pallet (the pallet producing new blocks). The order
    in which these arguments were specified in the source code was reversed, compared
    to the order in which BABE expects them. During previous testing, we’ve always
    used the same account for both stash and controller, so we didn’t see this bug.
    In terms of “testing,” the staging environment did its job to catch the problem.


    A side note: “stash” and “controller” is a concept that comes from the Substrate
    framework where one account, the “controller,” acts on behalf of another one,
    the “stash.” During the time of migration, Substrate had already published new
    versions of the framework migrating from stash + controller accounts to a single
    account only because using two is confusing. In Creditcoin 3.0 there’s only a
    “stash account! The fact that everyone on the engineering team knew this was part
    of the reason why no one thought about testing with two different accounts, including
    yours truly.


    Another set of two problems related to migrations was discovered with the staging
    environment, both of which were almost certain to bring down the entire blockchain.
    Both are related to a particular block number simply because that number has been
    used as a hard-coded, large-enough value:


    1. An initial problem was found where nodes were running out of memory and crashing.
    This was happening after a runtime upgrade. That operation was trying to allocate
    too much memory and was crashing the node. Machines with large enough memory were
    not crashing, but the upgrade was still taking too much time to be considered
    viable.


    2. The next problem is adjacent – the `on_initialize()` hook, which executes on
    every block, was trying to remove too many items from storage. This is the same
    function which in Creditcoin 2.0 was found to be too eager reading items from
    on-chain storage into memory; see [`https://github.com/gluwa/creditcoin/pull/1253`](https://github.com/gluwa/creditcoin/pull/1253).
    The current problem was that there were too many items to remove and the I/O operation
    took more time than the allowed time in which new blocks must be proposed therefore
    breaking block production. This is the `::clear_prefix(block_number, u32::MAX,
    None)` code snippet trying to remove an obscenely huge number of items. This fix
    is in [`https://github.com/gluwa/creditcoin/pull/1353`](https://github.com/gluwa/creditcoin/pull/1353)
    – set a limit on how much you can remove per block and spread out the internal
    cleanup process over multiple blocks.


    Few important lessons learned on the testing side:


    1. When you see things like `u32::MAX`, question the hell out of them, and make
    your CI tools trigger on similar patterns. Nothing good ever comes out of trying
    to push a software system to its limits.


    2. Read/write operations should have limits, and those limits must be verified
    before they become too large to break the system. In the Substrate framework,
    in particular it is very easy to read items from on-chain storage and then iterate
    over them – the code for this is super elegant and easy to use. However, this
    also means it is very easy to forget an upper limit and try to read too much data
    into memory.


    3. Beware of hard-coded “large-enough” values used in documentation, examples,
    and test suites because these are the places where your users will look for references
    if they don’t quite know what they are doing and not being careful. If possible
    try having static tools that trigger on hard-coded numerical values.


    The only reason the abovementioned issues were ever close to becoming a big problem
    on production is that someone was likely told to use an example which was never
    intended for production purposes. Not knowing and probably not understanding what
    the example entails, they''ve copied a value that at the time probably appeared
    too far away into the future. Kind of like the year 2000 problem programmers had
    to deal with in the past.


    These problems would have never been discovered if the staging environment wasn’t
    forked from production or if it had too few blocks (data in storage). This goes
    to show how important testing with your production data is! Also goes to show
    that good developer experience, for example, documentation and quality examples,
    can benefit both vendor and community developers directly.'
  raw: '### Other Interesting Testing and Some Bugs


    As part of v2.3 development, a number of interesting failures happened. They happened
    on dedicated testing environments and prompted more testing to be added to the
    existing suite.


    Once you switch to nominated proof of stake, you can’t change some values inside
    your blockchain implementation. Most importantly can’t change duration of staking
    epoch – the period for which validators are chosen to produce blocks! Changing
    this bricks the blockchain so I’ve added static analysis checks and integration
    tests to catch this! Which also highlights how important choosing the actual values
    here is.


    Another issue related to upgrade testing infrastructure is how latest releases
    are discovered based on git tags. The CI jobs expect a certain naming convention,
    for example, -devnet for upgrades intended for Devnet, -testnet for Testnet, and
    so on. Remember how the runtime upgrade testing CI jobs introspect the target
    branch for a pull request in order to figure out which chain to synchronize to?
    In a similar fashion, they need to know how to find the previous release which
    is used in several different places as part of those CI jobs. Consistently naming
    releases is important, and several versions broke the existing convention which
    negatively affected CI jobs execution for future releases. That’s been fixed by
    bumping the version number and tagging new releases in GitHub with the appropriate
    names. On the testing side, I’ve added another static analysis script to actually
    break the release pipeline in case the naming convention isn’t followed. I bet
    you didn’t imagine that naming your git tags is something that would require testing,
    but when you turn it into a public interface, then it does need to be tested.


    When I was working on setting up the load testing tools, briefly I had an issue
    where `creditcoin-transaction-producer` wasn’t working with the latest implementation
    of Creditcoin. The reason is that it uses the chain metadata before creating transactions
    to be sent and checks for compatibility and remember that gluwa-bot automatically
    updates the chain metadata whenever required. A side effect of this bot is that
    updating the Creditcoin version number also changes the metadata. All of this
    resulted in a CI job which would check the compatibility between the blockchain
    and our devel tools so that we know they are always usable and in-sync with one
    another!


    As part of the community testing process on Testnet, the development accounts
    Alice and Bob have been defunded to prevent abuse, for example, stealing funds.
    By default Alice also has sudo privileges. This defunding broke upgrade and integration
    testing against a live target. Since then the testing process has started to use
    different accounts, whose credentials are defined externally and kept out of the
    CI execution environment due to security concerns. I guess you can’t take for
    granted that certain accounts and pre-conditions will always hold true unless
    you can control them directly.


    As part of the PoW-PoS migration preparation, the team had been exercising using
    a staging environment. This staging environment initially got stuck after we tried
    executing the PoW to PoS migration process on it. The reason was that when calling
    the `switch_to_pos()` extrinsic, it expects a list of accounts which would act
    as initial validators before the first election cycle is complete. That list expects
    two entries for each validator – a stash and a controller account – which were
    then passed down to the BABE pallet (the pallet producing new blocks). The order
    in which these arguments were specified in the source code was reversed, compared
    to the order in which BABE expects them. During previous testing, we’ve always
    used the same account for both stash and controller, so we didn’t see this bug.
