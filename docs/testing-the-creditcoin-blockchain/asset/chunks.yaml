    ### Testing v1.7 ➤ v1.8 Switchover and Suspected Networking Issues


    As part of the existing test suite, I’ve added extra nodes in order to simulate
    an older 1.7 node trying to peer with an upgraded 1.8 chain which should not be
    possible. The actual assertion is as simple as checking the node under test and
    making sure it did not connect to the rest of the blockchain. A few other scenarios
    have been added such as keeping track of average block publishing time by introspecting
    the blockchain under test and sanity checks for so-called house-keeping transactions.


    During the testing campaign of Creditcoin 1.8, I primarily worked with a developer
    to debug a suspected networking issue, possibly multiple issues. Using the existing
    docker-compose files, we launched a dedicated version of the blockchain spread
    across multiple cloud providers and geographic regions with slight variations
    in how network peers are specified – either statically or discovered dynamically.
    Then using the existing test suite, started sending transactions to this target
    chain and observed the state of networking. This is the origin of the `creditcoin-legacy-docker-compose-testnet`
    repository. Later this network was opened to selected community members for even
    more diversity.


    The main items we were looking for were node peering status and presence of forks
    using the tools at [`https://github.com/atodorov/Creditcoin-Tools`](https://github.com/atodorov/Creditcoin-Tools)
    since these were the most obvious symptoms of a not completely understood root
    cause. In practice a blockchain of just 6–10 nodes will not last half a day without
    some of the nodes losing connectivity between each other, not being able to reconnect
    and starting their own forks. Sometimes nodes would split into clusters ending
    into 2 or 3 isolated forks. Manually forcing them to reconnect, for example, by
    restarting, did not always work, sometimes resulting in forks which couldn’t be
    resolved. Remember that even when validators are disconnected, they still produce
    blocks because there are transactions which are triggered internally such as timestamps
    and house-keeping.


    This effort went through 41 internal rebuilds, as seen in [`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet/pull/12`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet/pull/12),
    before v1.8 was released. The last time I tested a Creditcoin Sawtooth implementation
    was on March 15, 2022\. [`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet/pull/13`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet/pull/13).


    ## The End


    Even though we made improvements in multiple areas and upgraded the core Hyperledger
    Sawtooth components, issues still remained. The Creditcoin documentation contains
    the following warning:


    > *General advisory notes concerning the 1.8 version* *and release:*

    >

    > *   > *Old images cannot be stopped from joining the network and will continue
    to disturb the network.*

    > *   > *Peering issues remain with frequent, long forks occurring.*

    > *   > *Nothing stops nodes from starting a network from scratch and attempting
    to resolve their own chain from very low heights.*

    > *   > *Broken or faulty comms between validator/consensus can trigger unrecoverable
    errors in the consensus depending on the missing event/timeout or state in the
    publishing state machine.*

    >

    > —The Creditcoin 1.8 change log^([⁵](#fn5))


    A decision was made that we will not continue going in this direction and it would
