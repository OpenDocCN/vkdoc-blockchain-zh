    ### Creditcoin-Legacy-Docker-Compose


    用于 `Creditcoin v1.x` 主网的 `Docker Compose` 文件。该仓库是 `Creditcoin 1.x` 各组件的各种 Docker
    镜像的规范参考，也是如何启动必要组件以成为网络参与者的配置示例。它也是创建用于测试目的配置的起点。


    源代码：[`https://github.com/gluwa/creditcoin-legacy-docker-compose`](https://github.com/gluwa/creditcoin-legacy-docker-compose)


    ### Creditcoin-Legacy-Docker-Compose-Testnet


    这是后文讨论的用于测试的仓库。它包含用于部署隔离测试环境的配置文件和对 Docker 镜像的引用。


    后来，社区成员也监控此仓库，以获取测试即将发布的 `Creditcoin 1.8` 版本所需的最新容器版本信息！


    源代码：[`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet)


    ## Creditcoin 1.x 时间线


    根据 `GitHub` 和 `Docker Hub` 上的公开历史记录，我可以梳理出以下时间线。此处主要是为了提供背景参考。


    1.  我于 `2021 年 6 月 17 日` 开始与 `Creditcoin` 团队合作。

    2.  我的第一个拉取请求似乎是在 `2021 年 7 月 13 日`。

    3.  `Creditcoin 1.7.1` 于 `2021 年 7 月 23 日` 发布，我并未参与其中。

    4.  基于 `Sawtooth` 框架的 `Creditcoin 1.8` 容器镜像于 `2022 年 3 月 28 日` 作为 `1.x` 网络的最后一个版本发布到
    `Docker Hub`。


    实际上，我对 `1.x` 系列的最后一个更新进行了测试，耗时大约 6 个月，因此如果信息不完整，还请见谅。后续章节会提供更多时间戳信息。


    ## 测试 Creditcoin 1.x


    当谈到 `Creditcoin 1.x`，特别是测试以及普遍改进团队工作以提高软件质量的话题时，我们必须考虑其所处的时期。在我看来，测试与流程和组织变革相结合是不可避免的。


    这里关注的时间段大致是 2021 年，在此期间团队开始在 `GitHub` 上为每个组件使用独立的公共仓库。这也是团队过渡到与一名全职 `QA` 工程师（即我本人）直接合作，并嵌入团队的时期。


    **仓库创建时间线：**


    *   `2018 年 11 月 27 日`：创建了 [`https://github.com/gluwa/creditcoin-legacy`](https://github.com/gluwa/creditcoin-legacy)

    *   `2019 年 2 月 28 日`：创建了 [`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet)

    *   `2019 年 7 月 29 日`：创建了 [`https://github.com/gluwa/creditcoin-legacy-docker-compose`](https://github.com/gluwa/creditcoin-legacy-docker-compose)

    *   `2021 年 4 月 14 日`：在 fork 中提交了 [`https://github.com/gluwa/sawtooth-legacy-sdk-cxx`](https://github.com/gluwa/sawtooth-legacy-sdk-cxx)
    的首次提交。

    *   `2021 年 4 月 17 日`：创建了 [`https://github.com/gluwa/creditcoin-legacy-shared`](https://github.com/gluwa/creditcoin-legacy-shared)

    *   `2021 年 4 月 17 日`：创建了 [`https://github.com/gluwa/creditcoin-legacy-client`](https://github.com/gluwa/creditcoin-legacy-client)

    *   `2021 年 5 月 12 日`：在 fork 中提交了 [`https://github.com/gluwa/sawtooth-legacy-core`](https://github.com/gluwa/sawtooth-legacy-core)
    的首次提交。

    *   `2021 年 5 月 28 日`：创建了 [`https://github.com/gluwa/creditcoin-legacy-processor-rust`](https://github.com/gluwa/creditcoin-legacy-processor-rust)

    *   本人正式加入团队。

    *   `2021 年 8 月 3 日`：创建了 [`https://github.com/gluwa/creditcoin-legacy-consensus-rust`](https://github.com/gluwa/creditcoin-legacy-consensus-rust)

    *   `2021 年 9 月 21 日`：在 fork 中提交了 [`https://github.com/gluwa/sawtooth-legacy-sdk-rust`](https://github.com/gluwa/sawtooth-legacy-sdk-rust)
    的首次提交。

    *   `2021 年 9 月 29 日`：创建了 [`https://github.com/gluwa/creditcoin-legacy-gateway`](https://github.com/gluwa/creditcoin-legacy-gateway)


    **CI 启用时间线：**


    *   `2020 年 2 月 25 日`：**creditcoin-legacy-docker-compose-testnet** – 用于 `GitHub
    Pages` 构建的 CI 状态，此仓库无实际测试。

    *   `2020 年 7 月 15 日`：**creditcoin-legacy-docker-compose** – 用于 `GitHub Pages`
    构建的 CI 状态，直到我加入团队后才开始进行测试。

    *   `2020 年 10 月 27 日`：**sawtooth-legacy-core** – 在 fork 中的一次提交上报告了首个 CI 状态，似乎是一个
    `Azure` 流水线。配置文件不在 git 中，实际的 CI 任务日志早已丢失。我假设这是一个编译任务，根据 `GitHub` 上的提交历史来看，它似乎并未在每次提交时都触发。

    *   `2021 年 4 月 14 日`：**sawtooth-legacy-sdk-cxx** – 在 `GitHub` 中启用 CI；fork 中有两次之前的提交。它在
    Docker 容器内运行 `CMake` 构建。

    *   `2021 年 4 月 26 日`：**creditcoin-legacy-shared** – `Azure` 流水线已不可用，源代码不在 git
    中，我假设它是一个构建/编译任务。稍后在 6 月，有来自安全扫描服务 `Snyk` 报告的扫描状态，这些状态与个人账户关联，随后消失。

    *   `2021 年 4 月 26 日`：**creditcoin-legacy-client** – 同样是 `Azure` 流水线，源代码不在 git
    中，流水线也已不可用。我假设它是一个构建任务。同年晚些时候，我们可以看到一些来自 `Snyk` 的状态报告，但之后消失了。

    *   我加入了团队，开始快乐地测试！

    *   `2021 年 6 月 17 日`：**sawtooth-legacy-core** – 首个带有状态检查的 `PR`。

    *   `2021 年 6 月 18 日`：**creditcoin-legacy** – 首个 CI 状态。

    *   `2021 年 7 月 20 日`：**sawtooth-legacy-core** – fork 中的首个 `GitHub Actions`。

    *   `2021 年 7 月 20 日`：**creditcoin-legacy-processor-rust** – 在主分支上记录了首个 CI 状态，但默认开发分支上没有。

    *   `2021 年 8 月 9 日`：**creditcoin-legacy-consensus-rust** – `Azure Pipelines`。

    *   `2021 年 8 月 23 日`：**creditcoin-legacy-docker-compose** – CI 中的首次实际测试，但从未合并。

    *   `2021 年 8 月 13 日`：**creditcoin-legacy-consensus-rust** – `GitHub Actions`。

    *   `2021 年 9 月 21 日`：**sawtooth-legacy-sdk-rust** – 在 `GitHub Actions` 中启用 CI；fork
    中的首次提交。

    *   `2021 年 9 月 29 日`：**creditcoin-legacy-gateway** – `Azure Pipelines` 和 `GitHub
    actions`。


    ### 我加入前的测试状况


    根据公开的 `GitHub` 历史记录，两个仓库正在运行 `GitHub Pages` 动作，但并未对被测软件本身进行任何实际检查。另外四个仓库正在 `Azure
    DevOps` 中运行 CI 流水线，我推测这些流水线仅编译软件，而没有执行其他操作。


    `Azure` 中的这些流水线似乎未在源代码中定义，其定义似乎也不是任何 git 仓库的一部分，因此我无法判断这些流水线执行了何种测试。同样不清楚这些 `Azure
    CI` 任务是如何触发的，以及这是否是一个可靠的事件，因为有些提交和拉取请求上没有报告任何状态。'
- fmt: '### Testing Overview


    The moment after I joined the Creditcoin team coincided with publishing discrete
    GitHub repositories for each component. The timeline is after the release of `v1.7`
    and before the release of `v1.8`.


    At the same time I’ve been trying to figure out what each component does and what
    are the testing requirements toward them. I can outline several major areas below.


    The private `creditcoin-legacy-tests` test suite and work items related to it
    which probably consumed the majority of my efforts.


    For each individual repository, generally try to figure out where we stand in
    terms of existing test coverage, and make sure that it has common testing and
    static analysis tools enabled:


    - Enable CI execution for every PR using GitHub Actions. Deprecate older Azure
    Pipelines which were not kept under git.

    - Execute any obvious unit tests (e.g., `cargo test`), and start collecting coverage
    metrics where possible to inform further decisions.

    - Enable static analysis tools aka linters and code formatters (e.g., `cargo check`,
    `cargo fmt`), and see where we stand. Work on fixing reported issues.

    - Start using Dependabot for keeping dependencies up to date.

    - Build docker container for the component, and run sanity checks against it because
    that’s how it is supposed to be delivered.

    - Experiment with other static analysis tools to see what can be helpful (e.g.,
    SonarCube), and fix some code smells as initial improvements.


    For all forks of upstream repositories, try doing the same where possible which
    wasn’t always successful. Keep in mind that for the better part of the first few
    months, I still don’t have a good understanding of how blockchain works in general,
    much less how the individual components of Creditcoin and their upstream repositories
    fit together!


    On the process side of things, establish a pattern where the test engineer will
    engage in code review, bug verification, preferably testing directly off of the
    existing pull request, and moving tickets to DONE **before** anything gets merged!
    Establish a checklist for code reviews where one of the items is a new unit/integration
    test being added. Also enable branch protection rules and a minimum of two approvals
    required before a pull request can be merged. And you may argue that this is not
    the job of a tester, but I will argue back. If it can improve quality, then it
    is my job!


    In this period I tried becoming more familiar with the Hyperledger Sawtooth framework
    and the various components of Creditcoin 1.x in order to start adding unit and
    integration tests written in Rust. Due to priorities, time constraints, and the
    nature of Sawtooth, that was unsuccessful on my part. I’ve only managed to add
    a few obvious unit tests for stand-alone functions here and there but not as much
    as I wanted. In next chapters, you will see that Creditcoin 2 is the complete
    opposite of this.


    The majority of the focus during this period was on the integration test suite
    and making use of it for the upcoming `v1.7` to `v1.8` switchover. The `1.8` transaction
    family is incompatible with older versions plus there were changes in almost all
    other components which brought up the need for this migration path to be exercised
    and tested with more scrutiny.


    Due to the fact that a Sawtooth node is represented by multiple individual components,
    each one executed as an independent container, being able to test directly off
    of a pull request isn’t easy. You do need hardware resources to be able to launch
    a stand-alone blockchain, and quite often feature changes may be spread across
    multiple components. This means testing in isolation isn’t practical. In reality
    what I was often doing was to check out all related pull requests, sometimes cherry-pick
    related commits into a temporary branch; then rebuild docker images for all components
    and start a local chain using the `docker-compose` files mentioned earlier. Then
    due to the fact that the main test suite is an integration type suite with different
    access control compared to the rest of the components, i.e., not publicly available
    on GitHub, the most practical way of executing it was to point its configuration
    to the newly created chain and kick-off all test scenarios by hand. Not impossible
    to automate given the existing infrastructure but not super practical either.


    Although not impossible, collecting coverage metrics across multiple components
    distributed in several different repositories, written in several different programming
    languages, using an integration type test suite was not practical either. Because
    of this, I don’t have a good idea how much and how thoroughly the existing test
    suite was covering the implementation. I’ve analyzed the source code of the existing
    test suite, and as far as I can tell it was exercising all transactions from the
    loan cycle at least once, including both positive and negative scenarios. Was
    a test scenario missing, or were some scenarios effectively duplicate with one
    another I simply don’t know, and it wasn’t obvious which was the case.'
