- fmt: '# 5. Creditcoin 2.0


    `Creditcoin 2.0` is a proof-of-work blockchain implemented using the `Substrate`
    framework. It models the same transactions and business logic as the previous
    1.8 implementation but was developed independently.


    The main objective of `Creditcoin 2.0` is protocol compatibility with the previous
    1.x version. Here I mean compatibility in terms of all possible transactions listed
    in the `Creditcoin` whitepaper being implemented with same or very similar names
    (allowing for capitalization) and input parameters. What I mean is a logical compatibility
    with the minimum necessity for changes in the whitepaper and in client side applications.
    There is no binary compatibility between the 1.8 and 2.0 versions, and they were
    never meant to be able to operate together with one another.


    `Creditcoin 2.0` mainnet has been deployed independently of `Creditcoin 1.x` mainnet,
    and there is no connection between the two. Because the underlying data structure
    and technology stack are completely different, interoperability between the two
    implementations was never a requirement, thus no interoperability testing.


    At the time of creating v2.0, there were probably around a million blocks on v1.8
    Mainnet, and the only data which were deemed important and needed to be migrated
    were non-zero CTC balances for all existing accounts which were included in the
    genesis block for 2.0! In other words, if a user called Jackie had participated
    in `Creditcoin 1.x` and had accumulated a balance greater than zero, then she
    should be able to immediately start using `Creditcoin 2.0` with the same account
    (same public and private keys) and see that her balance is exactly what it was
    before. This switch is uni-directional. The only bits of data that needed to be
    verified were accounts/balance mappings between the old and the new instance of
    the blockchain which is relatively easy to do by querying all of the data and
    comparing it. Not migrating other data, such as existing loan-flow transactions,
    was a business decision which luckily also removed the need to perform a more
    comprehensive data consistency testing during the migration process.


    For the sake of argument, let’s say that preserving chain history was a requirement,
    but still no need for the two different technological stacks to be connected to
    one another. In such a scenario, I think that some sort of a replay program would
    have been a good practical solution:


    - Query blocks from 1.x and iterate over the results to introspect each transaction.
    This is technically possible, and we already knew how to do it because all the
    necessary technical steps were used as part of the previous `creditcoin-legacy-tests`
    test suite. The Sawtooth REST API actually exposes this information quite nicely.


    - Then repeat each 1.x transaction onto the 2.0 chain using the same input parameters,
    thus recreating the history. Transaction and block hashes will be different; block
    numbers will not stay consistent either. Maybe include an `old_hash` field in
    each data structure to reference transactions from 1.x for transparency sake.


    - For testing purposes, query both chains and “make sure states match” accounting
    for the difference in data representation between the two! This will be a bit
    more involved in terms of actual implementation but should be doable.


    The same replay program could have been used both as part of testing and migration
    preparation as well as for the actual migration of production data itself. As
    we’ll see later in this book, preserving chain history became a requirement for
    the 2.3 release!


    The situation where the binary history for the previous tech stack should be preserved,
    meaning querying blocks and transactions by their existing hashes and having active
    loan history which essentially spans two different chains, is outside of the scope
    of this book as I haven’t tested anything like that. The easiest way to achieve
    this that I can imagine is to have both a `Substrate` node and a `Sawtooth` node
    running together plus an additional RPC routing layer which will connect to the
    respective chain depending on block number. In one version of this imaginary setup,
    you will have to account for the difference in RPC calls between Hyperledger Sawtooth
    and Substrate and/or provide a compatibility layer for that as well. Most likely
    you will have to generate dummy blocks on the new chain to account for the difference
    in block height.


    Another possibility would be to wrap the raw block data from v1.8 into a `Substrate`
    block and inject these blocks as part of the launch process for the 2.0 network
    and provide some sort of compatibility layer as part of the `Substrate` implementation.
    Which one would have been easier or more suitable, I cannot say.


    ## Components of Creditcoin 2.0


    A blockchain implementation based on the `Substrate` framework is a monolithic
    code base which compiles to an executable binary called a node. There are two
    main parts of the node called the client and the runtime. Application logic, the
    transactions, and storage items which define what the blockchain does are defined
    inside the runtime. The client part is responsible for standardized tasks such
    as peer-to-peer networking, exposing RPCs, consensus, producing blocks, and so
    on. Unlike the previous version in `Creditcoin 2.0`, everything is encapsulated
    into a single running container. The node itself is a multi-threaded application
    which spawns the various components of the blockchain and executes them in parallel
    – around 50 or so threads as shown in Listing [5-1](#629923_1_En_5_Chapter.xhtml#PC1).


    ```

    creditcoin3-nod─┬─11*[{creditcoin3-nod}]

    ├─{futures-timer}

    ├─{log-autoflush}

    ├─10*[{offchain-worker}]

    ├─{rocksdb:high}

    ├─5*[{rocksdb:low}]

    └─20*[{tokio-runtime-w}]

    ```


    *Listing 5-1* How a Creditcoin-Node Process Looks from the Operating System Point
    of View


    The `Substrate` framework utilizes a flexible modular architecture, illustrated
    in Figure [5-1](#629923_1_En_5_Chapter.xhtml#Fig1), and you may extend and/or
    replace its components relatively easily allowing you to add custom functionality
    only where needed.


    ![](images/629923_1_En_5_Chapter/629923_1_En_5_Fig1_HTML.jpg)


    *Figure 5-1* General architecture of the Substrate framework


    `Creditcoin 2.0` is implemented in the Rust programming language and shipped as
    a Docker image, although for testing purposes, most often we compile the code
    and run it as a stand-alone binary directly.


    Source code: [`https://github.com/gluwa/creditcoin`](https://github.com/gluwa/creditcoin)


    ### Extrinsics Pallets


    The functions which define what the business logic of the blockchain is are called
    `extrinsics`. This is what other frameworks call transactions. Inside `Creditcoin
    2.0`, these functions are organized in modules called `pallets`. `Creditcoin 2.0`
    uses some off-the-shelf modules, for example, `sudo` pallet, `system` pallet,
    `balances`, etc. It also uses custom pallets which are related to the main business
    logic. See the `pallets/` directory inside the source code.


    Extrinsic functions are automatically exported via RPC and can be triggered externally
    using client libraries. This is what the integration test suite and client applications
    are doing. Extrinsic functions can also be invoked directly when writing unit
    tests.


    #### Creditcoin Pallet


    Defines how a loan cycle is recorded onto the blockchain which is what the `Creditcoin`
    whitepaper describes in detail. Provides RPC calls that match the existing `Creditcoin
    1.x` family. The RPC interface and function signature is a logical match but doesn’t
    match the v1.x transactions family verbatim!


    This is the main entry point to the blockchain used by integrators and external
    applications. This is also where the bulk of the testing activities are focused
    – predominantly functional type testing.'
