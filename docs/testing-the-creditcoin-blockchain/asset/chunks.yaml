- fmt: '### Other Interesting Facts


    As mentioned earlier, transaction fees are not fixed, and they fluctuate depending
    on blockchain usage. Relatively early in the Creditcoin v2.0 lifecycle, I wanted
    to exercise this via an integration test and assert that transaction fees increase
    when the blockchain is “heavily used.” Not knowing the precise definition of “heavily
    used” at the time I went for a straightforward scenario: submit 10 transactions
    and expect the last fee to be greater than the first one. See [`https://github.com/gluwa/creditcoin/pull/142/files`](https://github.com/gluwa/creditcoin/pull/142/files).


    This actually did not work as anticipated because the testing scenario was incorrect.
    It needs to generate a lot more transactions in order to reach block fullness
    of 25% and higher over some period of time (blocks), so we can see the internal
    fee adjustment algorithm kicking into action. The team quickly estimated that
    we need to be generating thousands of transactions per second. If I’m not mistaken,
    we were talking in the vicinity of 40000 transactions, but I may be wrong about
    the number. That’s simply not possible with the existing integration test suite.


    It may have been possible to use `Promise.all` and the async/parallel nature of
    Creditcoin RPCs and the TypeScript client library in order to schedule these thousands
    of transactions. The problem which we then need to resolve is nonce management
    – that is, the client application needs to generate unique numeric identifiers
    which would be sent together with each transaction instead of relying on the blockchain
    to figure this out by itself as it does by default. We didn’t have an easy solution
    at that time, and this was extra work, which was not in scope so the test was
    abandoned.


    Around 6 months later, the team was faced with the challenge of generating loads
    of transactions again. The context was that we wanted to fill the Testnet environment
    with lots of records and make it look more similar to Mainnet. That’s important,
    for example, for testing migrations in order to simulate a realistic upgrade scenario
    and for performance benchmarks. The solution was to create a custom tool called
    `creditcoin-transaction-producer`, which is capable of producing thousands of
    parallel transactions and implements proper nonce management.


    Another testing area that was explored briefly was enabling the so-called “chaos”
    pallet as part of the Creditcoin runtime; see [`https://github.com/gluwa/pallet-chaos/pull/1`](https://github.com/gluwa/pallet-chaos/pull/1)
    and [`https://github.com/gluwa/creditcoin/pull/774`](https://github.com/gluwa/creditcoin/pull/774).
    This pallet is mean to inject chaos into an existing runtime and basically try
    to break your implementation as a means to find edge cases and push the boundaries
    of your existing code. This was a short-lived attempt because the pallet itself
    didn’t seem very practical in the context of Creditcoin. Upstream Polkadot and
    other Substrate chains use fuzzing which is more usable in this context, but I
    didn’t try it out.


    An interesting issue found was the fact that `creditcoin-node` didn’t always respond
    to `SIGTERM` signals and logs were missing so you couldn’t tell what was happening.
    The way that I tested this was with a docker container with artificially imposed
    resource limits and pressing `Ctrl+C` on the terminal, [`https://github.com/gluwa/creditcoin/pull/970`](https://github.com/gluwa/creditcoin/pull/970).
    It was discovered that this is a bug in upstream Substrate and was fixed by upgrading
    to newer versions of the Substrate framework.


    Previously I’ve mentioned how the integration test suite is kicked off manually
    after deployment on a particular environment. For mainnet, this is using Ethereum
    mainnet as well; for the rest of the environments, we were initially using the
    Rinkeby testnet; however, there were sporadic issues with it. After a while we
    found out that it was going to be deprecated by the Ethereum Foundation on October
    5, 2022, so we switched to Goerli testnet. For a short while, we were seeing issues
    with Gorli as well, in particular high transaction fees. A temporary switch to
    Sepolia solved that; however, we switched back to Goerli afterward. You can read
    more about the differences between Goerli and Sepolia here:


    [`https://www.quicknode.com/guides/ethereum-development/getting-started/goerli-vs-sepolia-a-head-to-head-comparison`](http://www.quicknode.com/guides/ethereum-development/getting-started/goerli-vs-sepolia-a-head-to-head-comparison).


    A word of caution: note that interactions with external blockchains require additional
    funds in the form of crypto tokens which means that for Creditcoin Mainnet – Ethereum
    Mainnet integration the test suite actually burns real ETH coins! That may escalate
    rather quickly if you aren’t careful, especially when dealing with high-value
    tokens.


    ## Summary


    In this chapter, you can see how testing of Creditcoin was starting to take shape
    and gradually explore new areas of interest besides the most obvious. It was actually
    a very pleasant time to work on the blockchain, and I was able to make quite a
    lot of progress both in testing but also in my own understanding of how the blockchain
    works.


    In the next chapter, I continue telling the story of Creditcoin 2 with another
    big change – switching the consensus algorithm from proof of work to proof of
    stake!


    Footnotes [1](#629923_1_En_5_Chapter.xhtml#Fn1_source) [2](#629923_1_En_5_Chapter.xhtml#Fn2_source)


    # 6. Creditcoin 2.3


    Creditcoin 2.3 (technical version number), publicly also referred to as Creditcoin
    2.0+ (2.0 plus), is the next significant release in the Creditcoin 2.x family.
    It is a natural successor of v2.0 and builds upon the existing implementation.
    The most noticeable change is the switch from a proof-of-work to a nominated proof-of-stake
    (NPoS) consensus algorithm.


    Note


    I will keep using the 2.3 version number in this book in order to make it a bit
    more explicit when I’m talking about the NPoS variant of Creditcoin 2!


    Participants in a proof-of-stake consensus mechanism compete for the opportunity
    to append blocks to the blockchain proportional to the amount of crypto tokens
    they have at stake. In general having more tokens staked is presumed to lead to
    greater chance of being chosen by the algorithm. Nominated proof of stake (NPoS)
    is a variation of the PoS consensus mechanism which also allows other blockchain
    participants to vote for validators which act honestly.


    Operators running Creditcoin nodes are still known as validators. There is also
    a new group of participants known as nominators who can vote for validators using
    their own funds. That is, nominators are saying we trust this validator(s) with
    our money because they have shown to act in good faith in the past. Remember that
    in general all of these participants are anonymous.


    ## Components of Creditcoin 2.3


    From an operational point of view, Creditcoin 2.3 introduces several new components
    to the blockchain, but most everything else stays the same! These components are
    forks of tools used by the Polkadot blockchain, which is a popular proof-of-stake
    blockchain and also the creators of the Substrate blockchain framework.'
