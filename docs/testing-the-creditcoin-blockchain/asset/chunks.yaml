  trans: "  \n## 什么是 Creditcoin  \n\n`Creditcoin` 最初是一个与区块链无关的投资协议，允许参与者借出和借入任何加密货币。在其官网上，它也被描述为“无国界金融平台”，此后该平台不断发展。该协议的详细内容发布在\
    \ `https://creditcoin.org` 网站上的一份白皮书中，第一版于 2017 年发布，此后已多次更新。  \n\n`Creditcoin`\
    \ 区块链是 `Creditcoin` 协议的规范开源实现，由 `Gluwa, Inc.` 构建和维护。它是一个面向投资相关活动的区块链网络，将贷款交易记录在分布式公共账本上。这使得现实世界资产得以表示，并促进了投资者与筹资者之间的连接。这些记录将永久存储在区块链上，感兴趣方（例如传统贷款机构）可在未来利用这些数据进行信用评估。\
    \  \n\n本书中提到的 1.x 和 2.x 版本范围较窄，主要关注贷款相关交易的记录，而最新的 3.x 版本则变得更加通用，演变为一个多链信用协议，通过原生支持智能合约来赋能现实世界资产。在\
    \ `https://gluwa.com/` 网站上，这一最新迭代版本被称为“推动全球金融包容性的技术”，不过这里我就不展开了。  \n\n![](img/629923_1_En_3_Fig1_HTML.jpg)\
    \  \n\n图 3-1  \nCreditcoin 的示意图  \n\n贷款条款、还款和信用表现等信息均可在 `Creditcoin` 区块链上获取，从而促进简单透明的风险评估，并将\
    \ Web3 资本与现实的信用投资机会连接起来。`Creditcoin` 区块链本身是创建与贷款相关的其他金融产品（例如点对点借贷平台、投资平台、交易所，或上述功能的组合）所必需的基础设施。\
    \  \n\n原始 `Creditcoin` 贷款周期的完整架构图在本页展示：  \n\n`https://docs.creditcoin.org/cc2/faq#how-does-the-creditcoin-network-use-ctc`\
    \  \n\n如图 3-1 所示，`Creditcoin` 在设计上是多链的。原生记录在 `Creditcoin` 链上的数据代表了贷款条款和协议，以及参与者之间随时间变化的借贷、放贷和还款状态。例如，Alice\
    \ 可以记录她正在寻求特定条款的贷款，然后 Bob 可以记录他愿意按相同条款放贷，最后他们的协议记录（称为 `DealOrder`）可以被记录在链上。`Creditcoin`（至少在最初的设计中）不支持加密货币，这意味着实际的资产转移发生在\
    \ `Creditcoin` 网络之外。资产转移在外部区块链网络上进行，并由第三方加密代币表示。例如，如果用 `ETH` 进行借贷，交易会记录在以太坊主网上。如果使用不同的加密代币来记录法币交易，则可能会使用其他与以太坊兼容的网络，如\
    \ `Goerli` 或 `Sepolia`。当外部区块链上的资金发生转移时，这一行为必须记录到 `Creditcoin` 中。实际记录包含外部链上的有效交易哈希，`Creditcoin`\
    \ 软件会（例如）访问以太坊来检查并验证提交给它的信息。两个参与者之间转移的金额及其地址应与之前在 `Creditcoin` 中记录的他们的身份和贷款条款相匹配。最初的\
    \ 1.x 版 `Creditcoin` 实现也包含了针对比特币的概念验证代码；不过，我不知道该代码是否在实际中曾被使用过。  \n\n`Creditcoin`\
    \ 区块链会验证并记录其他区块链上的外部工件（如地址和交易），并将其记录到自己的链上，同时还会验证地址的所有权（例如在以太坊上）。  \n\n`Creditcoin`\
    \ 区块链上的原生加密代币称为 `CTC`。它作为一种实用代币，用于保证区块链本身的经济稳定性。在撰写本书时，`CTC` 代币并未直接用于借贷。  \n\n\
    从商业角度来看，`Creditcoin` 背后的模型可描述为“基础设施即服务”。该区块链基础设施的主要使用者将是金融科技合作伙伴，他们希望将交易记录到区块链上，并愿意访问先前的信用记录，以及/或获得该基础设施所支持的潜在新市场及商业机会。例如，尼日利亚的\
    \ Aella 就是这样的合作伙伴之一。事实上，根据 `Creditcoin` 文档，[Aella](https://aellaapp.com/) 是 `Creditcoin`\
    \ 区块链的首个机构用户，其在 [2022 年 6 月](https://medium.com/creditcoin-foundation/creditcoin-x-aella-integration-live-c8b8eb3b606d)\
    \ 将其运营与 `Creditcoin` 进行了集成。  \n\n真实用户会参与信用相关活动，例如，我例子中的农民或投资代理在技术上可以直接使用区块链；这在展示\
    \ `Creditcoin` 1.x 客户端程序的 YouTube 视频中甚至有过演示。不过，我认为这并非一个可行的长期策略。这类用户更有可能在日常交互中使用移动应用，然后该移动应用会直接或通过某种后端\
    \ API 层与区块链基础设施进行通信。事实上，`Gluwa, Inc.` 也一直在开发这样一个名为 `Credal` 的 API 层，但我并未过多参与这方面的工作。\
    \  \n\n区块链上的所有参与者都需要支付交易费用，无论他们是只执行少量交易的自然人，还是在网络上记录数千笔交易的借贷合作伙伴。然而，绝大部分运营费用由那些运行计算机节点（即各种区块链节点）的人承担；他们通常需要向云服务提供商支付计算、存储容量和网络带宽的费用。\
    \  \n"
- fmt: '# Impact on Testing Activities


    请注意，本书所涵盖的时间段与 Creditcoin 自身的快速开发及演变相吻合。一方面，从 3.0 版本开始，Creditcoin 的定义开始向更通用的区块链网络转变。另一方面，我们需要讨论这对测试活动的影响。


    与任何快节奏环境一样，实际的工程和测试活动可能看起来非常混乱，并且与我们能在更传统或更慢速环境中发现的情况不同。具体来说：


    - 没有太多时间正式收集和记录深入的需求。通常，需求目标本身会在实际技术实施进行时发生变化。


    - 技术细节通常未知且不明确。这在当今的软件世界中并不罕见，因为用于构建软件的多个抽象层和第三方组件随处可见。而在区块链世界中，由于分布式系统固有的复杂性，这种情况可能更胜一筹。


    - 测试策略可能不会立即显现，这是前述项目的直接后果。很多时候，测试会基于基本原则开始，覆盖最明显的正向和负向场景，并随着我们对被测系统了解的增加而逐步扩展。这与其他软件测试项目相比并没有太大不同，但可能由于环境本身风险较高，遗漏重要测试的风险略高。


    - 与更传统类型的应用相比，可用的测试工具选择较少。例如，如果我没记错的话，在最初研究 Substrate 的客户端库时，只有两个可用——一个用 Python
    编写，另一个用 TypeScript 编写。现在我可以找到第三个，用 Rust 编写。虽然我个人更喜欢 Python，但当时那个特定的库不支持异步函数，而整个
    Substrate API 都是异步的。所以技术选择其实并非真正的选择。


    后续章节将记录具体场景，但需要注意的是，这里涉及大量的第三方开源组件。事实上，Creditcoin 3.0 版本几乎完全由第三方依赖项组成，其自身的原生组件非常少。我个人认为，对于区块链而言，这比
    Web 或移动开发带来了更高的风险。


    虽然 Web 和移动开发同样依赖许多第三方组件，但背后的组织通常不是你的直接竞争对手。例如，`Django` 和 `Ruby on Rails` Web 框架由大型社区开发，并由各自的非营利基金会管理，其唯一目的是为其他
    IT 社区提供更好的框架来创建 Web 应用。另一个例子是分别由 Facebook 和 Google 支持的 `React Native` 和 `Flutter`
    移动应用框架。虽然 Facebook 和 Google 都不是独立的软件供应商，但它们的核心业务依赖于快速开发高质量应用的能力，并且它们开发了大量的软件，这意味着它们实际上有直接的动机来创建优秀的通用开发框架。


    具体来说，关于 Substrate 区块链框架及其生态系统，其主要开发者是 `Polkadot/Parity Technologies`，其核心业务是运行
    Polkadot 网络区块链。虽然他们在提供通用区块链框架方面做得非常出色，但我们必须考虑到，某些组件的内部优先级可能高于其他组件，这与其业务目标一致。特别是，我在
    Polkadot Staking Dashboard 代码库中看到了一些在 Creditcoin 方面导致问题的领域。这是一种情况，同样的核心技术导致了在同一领域内运营的两个不同供应商面临已知问题和
    Bug 的不同严重程度。在我看来，这是一种需要考虑的技术风险形式，这种风险在更传统的 Web 和移动世界中程度较低。


    由于上述所有因素，我认为 Creditcoin 的测试策略可以概括为 **计划-构建-测试-发现-重复**，或者像我称之为的那样，*“吃饭、睡觉、测试、重复。”*
    也就是说，测试 Creditcoin 和提高质量是一个迭代过程，随着新领域和风险的发现，这个过程不断自我强化。


    这也意味着，测试区块链实现与开发紧密耦合，通过将测试工程师直接嵌入开发团队，你可以获得最大的成果。考虑到已经提到的所有约束条件，我认为不可能有其他方式。


    关于测试的好消息是，尽管 Creditcoin 区块链用于记录有关现实世界金融资产的信息，但它并不直接处理此类资产。贷款和还款转账由其各自方在单独的区块链上发起，这意味着你不直接处理转账，而只检查和记录关于它们的信息。这大大降低了任何金融服务应用中存在的相关风险。


    可能发生的最坏情况是完全服务中断和 100% 的数据丢失。从业务和工程的角度来看，这仍然是一个噩梦般的场景，但比损失数百万真实金融资产的风险小得多。为了便于讨论，人们可以通过在热备份上增加冗余服务能力、制定良好的备份和灾难恢复程序、以及制定在发生最坏情况时的应急计划，来规避此类技术风险。


    # Summary


    既然我已经介绍了 Creditcoin 的历史及其目标，那么让我们进入测试环节！在接下来的几章中，我将讨论我在 Creditcoin 实现的各个主要版本期间所做的工作。


    Footnotes [1](#629923_1_En_3_Chapter.xhtml#Fn1_source)   [2](#629923_1_En_3_Chapter.xhtml#Fn2_source)
      [3](#629923_1_En_3_Chapter.xhtml#Fn3_source)


    # Part IIITesting the Creditcoin Blockchain'
  raw: '## Impact on Testing Activities


    Please note that the timeframe which this book covers coincides with the rapid
    development and evolution of Creditcoin itself. On one hand, the definition of
    what Creditcoin is starts to shift toward a more generalized blockchain network,
    starting with version 3.0\. On the other hand, we need to talk about how that
    impacts testing activities.


    As in any fast-paced environment, the actual engineering and testing activities
    may look very chaotic and are different from what we could find in a more traditional
    setting or slower moving environment. In particular,


    *   There isn’t much time to formally collect and document in-depth requirements.
    Often requirement targets themselves will shift while the actual technical implementation
    is happening.


    *   Technical details are often unknown and unclear. This isn’t uncommon in today''s
    software world due to the presence of multiple layers of abstractions and third-party
    components used to build software. Perhaps this is a notch higher in the blockchain
    world due to the inherent complexity in distributed systems.


    *   Testing strategy may not be immediately obvious which is a direct consequence
    of the previous items. Many a time testing would start based on first principles,
    covering the most obvious positive and negative scenarios and over time be expanded
    as we gain more knowledge about the system under test. Again not so different
    from other software testing projects, but maybe contains a bit of a higher risk
    of missing important testing because the environment itself is higher risk.


    *   Less choice of available testing tools compared to a more traditional type
    of application. For example, if I remember correctly when initially looking into
    client libraries for Substrate, there were two available – one in Python and one
    in TypeScript. I can find a third one now, written in Rust. While I personally
    prefer Python, that particular library did not support async functions at the
    time, and the entire Substrate API is async. So the choice in technology was not
    really a choice.


    Later chapters will document specific scenarios, but it should be noted that there
    are lots of third-party open source components involved here. In fact, Creditcoin
    version 3.0 is almost entirely composed of third-party dependencies with very
    few native components of its own. It is my personal belief that in the case of
    blockchain, this brings in higher risk compared to web or mobile development.


    While for web and mobile you still rely on many third-party components, the organizations
    behind them are usually not your direct competitors. For example, the Django and
    Ruby on Rails web frameworks are developed by a large community and are governed
    by their respective nonprofit foundations for the sole purpose of giving the rest
    of the IT community better frameworks to create web apps. Another example are
    the React Native and Flutter mobile app frameworks supported by Facebook and Google,
    respectively. While both Facebook and Google are not independent software vendors,
    their core business relies on the ability to develop quality applications fast,
    and they develop a boatload of software, which means they actually have a direct
    incentive to create good general purpose development frameworks.


    Speaking particularly about the Substrate blockchain framework and its ecosystem,
    their primary developer is Polkadot/Parity Technologies whose core business is
    running the Polkadot Network blockchain. While they are doing a very good job
    at providing a general purpose blockchain framework, we have to account for the
    fact that some components may have higher internal priority than others which
    is inline with their business goals. In particular I’ve seen areas in the Polkadot
    Staking Dashboard code base which have led to issues on the Creditcoin side. That’s
    a situation where the same core technology leads to different severity of known
    issues and bugs for two different vendors operating in the same domain space.
    In my opinion, this is a form of a technological risk that needs to be taken into
    account which exists to a lesser extent in the more traditional web and mobile
    world.


    Due to all of the factors mentioned above, I think the Creditcoin testing strategy
    can be summarized as **Plan–Build–Test–Discover–Repeat****,** or as I like to
    call it *“Eat, Sleep, Test, Repeat.”* That is to say that testing Creditcoin and
    improving quality has been an iterative process which constantly feeds on itself
    as new areas and risks are discovered.


    It also means that testing a blockchain implementation is tightly coupled with
    its development, and you can reap the most results by embedding test engineers
    directly into the development team. I don’t think it could have been any other
    way given all of the constraints already mentioned.


    The good news with respect to testing is that although the Creditcoin blockchain
    is used to record information about real-world financial assets, it does not handle
    such assets directly. Loan and repayment transfers are initiated by their respective
    parties on a separate blockchain which means you are not handling transfers directly,
    only examining and recording information about them. This greatly reduces the
    associated risk found in any financial services application.


    The absolute worst scenario that can happen is complete disruption in service
    and 100% data loss. This is still a nightmarish scenario from the point of view
    of business and engineering alike, but it is far less riskier than loss of millions
    of real financial assets. For the sake of argument, one could engineer around
    such technical risks by adding redundant service capacity on hot-standby, having
    good backup and disaster recovery procedures in place, and developing contingency
    plans in the event the worst comes to pass.


    ## Summary


    Now that I’ve covered the history of Creditcoin and its objectives; let’s move
    onto testing! In the next few chapters, I will talk about my work during the various
    major versions of the Creditcoin implementation.


