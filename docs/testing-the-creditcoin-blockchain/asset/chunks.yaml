- fmt: '# Benchmarks and Weights Generation with `Gluwa-bot`


    In Substrate a benchmark is a programmatic way of discovering the computational
    complexity of an on-chain operation such as an extrinsic. Generally speaking,
    it is related to the number of storage reads and writes. Benchmark files are written
    by a human.


    Then benchmarks are executed as part of CI to make sure that they compile and
    that they don''t crash. This is the sanity testing portion.


    Before a release benchmarks are executed on reference hardware, and the generated
    weights are committed to the release branch. Because that''s different from the
    `dev` branch, the same commit is automatically rebased and published as a pull
    request against the `dev` branch too. This ensures that everything which gets
    released also makes it through the `dev` branch to minimize deviations in the
    future and the need to resolve conflicts in git, especially during the release
    process.


    ## Migrations and Upgrade Testing


    From the in-house pallets, only `pallet/creditcoin/` actually contains storage
    migrations. They are named sequentially, `v1`, `v2`, `v3`, etc., and each one
    of them is exercised via unit test in a mocked environment. That is to make sure
    the migration functions as expected – in other words storage items are actually
    migrated (think DB migrations in ORM apps). This mocked environment also exercises
    pre/post migration hooks as an early warning against errors inside of migration
    functions. Yet some uncertainties remain:


    - Have we missed corner cases

    - Will the migration work with actual production data


    These uncertainties are addressed by two extra test jobs:


    1. Simulating the upgrade process and making sure it won''t crash

    2. Simulating on-chain state and local storage and making sure that storage migrations
    will be applied without crashing


    The same simulations are executed via two different methods:


    1. Via `try-runtime`: This is a functionality set made available by the Substrate
    framework which allows an upgrade and migrations to be simulated in-memory. It
    will query a production RPC endpoint for the current on-chain state and replicate
    that locally in memory. Then it will execute the migrations against the local
    in-memory storage. If nothing fails, we''re considering this a success. This can
    be viewed as a sanity test of runtime upgrades. The detailed upstream documentation
    is at `https://paritytech.github.io/try-runtime-cli/try_runtime/`.


    2. Fork the chain and upgrade: This method is closer to reality as it consumes
    the real production data and performs a real runtime upgrade (in isolation). First
    we start a `creditcoin-node` and synchronize with an already existing blockchain
    – for example, Testnet or Mainnet, depending on which our release target is. Then
    using a helper tool called `creditcoin-fork`, `https://github.com/gluwa/creditcoin-fork`,
    the current on-chain state will be scraped and recorded into a JSON file. This
    json file represents a new chain specification, where the genesis block is a replica
    of the latest on-chain state. That allows you to execute a local chain whose storage
    items match the production version but still inject development accounts into
    it and execute it independently. When the newly created local chain is up and
    running, perform the runtime upgrade which triggers the storage migrations. When
    that passes, execute the integration test suite against the fork to make sure
    the fork is still functionally equivalent to the origin.


    For upgrade and migrations testing, we''re using self-hosted GitHub runners which
    are deployed on-demand in Azure. This is because the upgrade and migration workflows
    require lots of memory – 16 GiB at the very least. Block import process is also
    computationally intensive.


    Storage migration hooks are instrumented in two ways in order to facilitate these
    testing activities:


    - A pre and post hook for every migration which allows us to share state before
    and after the migration for the purposes of assertions. Since storage migrations
    are executed at runtime, we''re making use of the fact that the `assert!` macro
    in Rust will cause a runtime panic, that is, it will cause the process to crash
    if the assertion fails. A non-zero exit code will cause the CI job to report a
    failure.


    - A `warn_or_panic!` macro used around if statements whenever an edge case may
    be present. In a production node, this macro will only produce a warning; however,
    during testing it will also cause a crash. This behavior is controlled via compiler
    flags configured explicitly during testing. You can think of this as a last line
    of defense which you want to see crashing during testing in order to alert you
    about existing corner cases in production data, but you don''t want this to be
    crashing in production in order not to bring the blockchain down accidentally.
    The macro does what its name says – either logs a warning or causes a panic.


    - A helper static analysis script which fails when migration sources use the `log::warn!`
    macro directly. This helps ensure that we always use the `warn_or_panic!` macro
    and don''t remove it or circumnavigate it accidentally. Otherwise edge-case branches
    triggered by actual production data will not fail during testing, and the team
    may not become aware of that.


    In addition to all of this, the `creditcoin` pallet defines a `STORAGE_VERSION`
    constant which must match the number of the last migration. That''s also enforced
    with assertions in every migration as well as with a static analysis script –
    the number of the last migration file must match the value of the `STORAGE_VERSION`
    constant defined in the pallet!


    Here is an example of how a migration which moves a storage item between 2 pallets
    looks like:


    ```

    impl Migrate for Migration {

    fn pre_upgrade(&self) -> Vec {

    let count = Authorities::::iter().count();

    assert!(count != 0, "Authorities not found during migration");

    let old_pallet = TaskScheduler::::name();

    let new_pallet = SCHEDULER_PREFIX;

    if old_pallet == new_pallet {

    log::info!(

    target: "runtime::Creditcoin",

    "pre-migrate V7, nothing to do.",

    );

    return vec![];

    }

    let storage_prefix = Authorities::::storage_prefix();

    let new_pallet_prefix = twox_128(new_pallet.as_bytes());

    let authorities_prefix = [&new_pallet_prefix, &twox_128(storage_prefix)[..]].concat();

    let new_pallet_prefix_iter = frame_support::storage::KeyPrefixIterator::new(

    authorities_prefix.clone(),

    authorities_prefix,

    |key| Ok(key.to_vec()),

    );

    assert!(

    new_pallet_prefix_iter.count() == 0,

    "Expected new authorities storage to be empty"

    );

    assert!( as GetStorageVersion>::on_chain_storage_version()  Weight {

    let count: u32 = Authorities::::iter().count().saturated_into();

    let creditcoin = TaskScheduler::::name();

    move_storage_from_pallet(

    Authorities::::storage_prefix(),

    creditcoin.as_bytes(),

    SCHEDULER_PREFIX.as_bytes(),

    );

    crate::weights::WeightInfo::::migration_v7(count)

    }

    fn post_upgrade(&self, ctx: Vec) {

    assert_eq!(

    StorageVersion::get::>(),

    7,

    "expected storage version to be 7 after migrations complete"

    );

    let new_pallet = SCHEDULER_PREFIX;

    let new_pallet_prefix = twox_128(new_pallet.as_bytes());

    let new_pallet_prefix_iter = frame_support::storage::KeyPrefixIterator::new(

    new_pallet_prefix.to_vec(),

    new_pallet_prefix.to_vec(),

    |key| Ok(key.to_vec()),

    );

    let past_count = usize::from_le_bytes(ctx.try_into().unwrap());

    assert_eq!(new_pallet_prefix_iter.count(), past_count);

    }

    }

    ```


    The rest of the migrations source code is at `https://github.com/gluwa/creditcoin/tree/dev/pallets/creditcoin/src/migrations`.'
