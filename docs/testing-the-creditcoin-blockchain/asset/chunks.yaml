    Source: [`https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/docs/1.2/app_developers_guide/creating_sawtooth_network.md`](https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/docs/1.2/app_developers_guide/creating_sawtooth_network.md)[`https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/images/1.2/appdev-environment-multi-node.svg`](https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/images/1.2/appdev-environment-multi-node.svg)


    A blockchain implementation with Hyperledger Sawtooth comprises multiple nodes
    interconnected with one another. In the Sawtooth architecture of Creditcoin, each
    of the components above is implemented as a stand-alone program and distributed
    as a container image. A single Creditcoin node is a collection of containers running
    together, for example, spun up using docker-compose during testing.


    ## Components of Creditcoin 1.x


    What follows is a list of the high-level components of Creditcoin 1.x. Always
    keep in mind that these are completely separate from one another and that they
    are distributed as independent containers and communicate via each other and with
    other Creditcoin nodes via several networking protocols! Each of these components
    may have their own subcomponents!


    ### Client


    `ccclient` is a command line program that allows humans to interact with the Creditcoin
    blockchain by registering their Ethereum addresses, collecting some initial CTC
    tokens and then participating in the loan cycle as lenders, borrowers, or collectors.
    This program not only allows the user to send specific transactions to the blockchain
    but also allows them to perform certain queries. For example, here’s how some
    of these commands look like:


    ```

    list Transfers

    list AskOrders

    list BidOrders

    list Offers

    show Balance sighash|0

    show Address sighash|0 blockchain address network

    show MatchingOrders sighash|0

    show CurrentOffers sighash|0

    show CreditHistory sighash|0

    show NewDeals sighash|0

    show Transfer sighash|0 dealOrderId

    show CurrentLoans sighash|0

    creditcoin SendFunds amount sighash

    creditcoin RegisterAddress blockchain address network

    creditcoin RegisterTransfer gain transferId txId

    creditcoin AddAskOrder addressId amount interest maturity fee expiration

    creditcoin AddBidOrder addressId amount interest maturity fee expiration

    creditcoin AddOffer askOrderId bidOrderId expiration

    creditcoin AddDealOrder offerId expiration

    bitcoin RegisterTransfer gain dealOrderId|repaymentOrderId sourceTxId

    ethereum RegisterTransfer gain dealOrderId|repaymentOrderId

    erc20 RegisterTransfer gain dealOrderId|repaymentOrderId

    ```


    This application reads configuration from a json file and then communicates with
    the REST API endpoint of a single node in the Sawtooth network diagram. It can
    be any node, but usually that’s the publicly facing URL for Creditcoin or a node
    that you may be running yourself. This component is written in C# .NET.


    Source code: [`https://github.com/gluwa/creditcoin-legacy-client`](https://github.com/gluwa/creditcoin-legacy-client)


    ### Validator


    In the Sawtooth framework, the validator component ensures that the same transactions
    will result in the same state transitions and that the resulting data is the same
    for all participants in the network. The validator has two major subcomponents
    that use schedulers to calculate state changes and the resulting Merkle hashes
    based on transaction processing. These subcomponents are responsible for creating
    new candidate blocks, completing published blocks and validating proposed blocks
    to determine if they should be considered for the new chain head. Although the
    name is the same, please do not confuse this with a validator as defined in the
    scope of Creditcoin 2 and later.


    While the consensus interface is responsible for determining who can publish a
    block, whether a published block is valid according to the consensus rules, and
    which block should become the chain head in the case of a fork, it is the validator
    component that will publish the blocks.


    The validator component in Creditcoin 1.x is based on the `hyperledger/sawtooth-validator:1.0`
    container image which is implemented in Python. The container image deployed for
    Creditcoin is a custom build with hotfix patches overwriting the original Python
    files related to proof of work!


    Note that toward the end-of-life of Creditcoin 1.x, there was an attempt to switch
    to `hyperledger/sawtooth-validator:1.2` which itself is implemented in Rust, with
    the Creditcoin team contributing a few patches. Due to reasons discussed further
    in the book, this switch was short-lived.


    Another important note is that this component is still part of an older mono-repo,
    while some of the other components have been converted to stand-alone git repositories!
    This structure reflects the growth of the engineering team as well as overall
    reorganization of git repositories that was happening at the same time.


    Source code: [`https://github.com/gluwa/creditcoin-legacy/tree/dev/PoW`](https://github.com/gluwa/creditcoin-legacy/tree/dev/PoW)


    ### Consensus


    Creditcoin 1.x uses a proof-of-work consensus engine which was developed by the
    team and connects directly to the Validator component over the internal interconnect
    protocol in Sawtooth. It is implemented in the Rust programming language. Since
    the git history doesn’t go past the time when I’ve joined the Creditcoin team,
    I’m not entirely certain if this consensus implementation is the one which was
    there from the very beginning or if it replaced another implementation that existed
    prior.


    Source code: [`https://github.com/gluwa/creditcoin-legacy-consensus-rust`](https://github.com/gluwa/creditcoin-legacy-consensus-rust)'
  trans: '

    # 4. 信用币 1.0 版


    这是信用币的第一个实现版本，采用超级账本锯齿湖开发框架，初始版本为 1.0.5，后来切换到框架的 1.2 版本。信用币 1.x 是一个工作量证明区块链。一个重要的补充说明是，锯齿湖本身最初是用
    Python 编写的，在后来的版本中，其某些组件被用 Rust 重写。一个锯齿湖节点代表多个组件的集合，如图 4-1 所示。


    ![](img/629923_1_En_4_Fig1_HTML.jpg)


    图 4-1


    多个参与网络的锯齿湖节点示意图 许可协议：[知识共享署名 4.0 国际许可协议](http://creativecommons.org/licenses/by/4.0/)；参见[`https://github.com/hyperledger/sawtooth-docs/tree/main#license`](https://github.com/hyperledger/sawtooth-docs/tree/main#license)
    来源：[`https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/docs/1.2/app_developers_guide/creating_sawtooth_network.md`](https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/docs/1.2/app_developers_guide/creating_sawtooth_network.md)
    [`https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/images/1.2/appdev-environment-multi-node.svg`](https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/images/1.2/appdev-environment-multi-node.svg)


    使用超级账本锯齿湖实现的区块链包含多个相互连接的节点。在信用币的锯齿湖架构中，上述每个组件都作为独立程序实现，并以容器镜像形式分发。单个信用币节点是一组一起运行的容器集合，例如，在测试期间通过`docker-compose`启动。


    ## 信用币 1.0 版的组件


    以下是信用币 1.0 版高层级组件的列表。请务必记住，这些组件彼此完全独立，以独立容器形式分发，并通过多种网络协议相互通信以及与其他信用币节点通信！每个组件可能都有自己的子组件！


    ### 客户端


    `ccclient`是一个命令行程序，允许用户与信用币区块链交互，方法是注册其以太坊地址、收集一些初始 CTC 代币，然后作为贷款人、借款人或收款人参与贷款周期。该程序不仅允许用户向区块链发送特定交易，还允许他们执行某些查询。例如，以下是一些命令的示例：


    ```

    list Transfers

    list AskOrders

    list BidOrders

    list Offers

    show Balance sighash|0

    show Address sighash|0 blockchain address network

    show MatchingOrders sighash|0

    show CurrentOffers sighash|0

    show CreditHistory sighash|0

    show NewDeals sighash|0

    show Transfer sighash|0 dealOrderId

    show CurrentLoans sighash|0

    creditcoin SendFunds amount sighash

    creditcoin RegisterAddress blockchain address network

    creditcoin RegisterTransfer gain transferId txId

    creditcoin AddAskOrder addressId amount interest maturity fee expiration

    creditcoin AddBidOrder addressId amount interest maturity fee expiration

    creditcoin AddOffer askOrderId bidOrderId expiration

    creditcoin AddDealOrder offerId expiration

    bitcoin RegisterTransfer gain dealOrderId|repaymentOrderId sourceTxId

    ethereum RegisterTransfer gain dealOrderId|repaymentOrderId

    erc20 RegisterTransfer gain dealOrderId|repaymentOrderId

    ```


    此应用程序从 json 文件读取配置，然后与锯齿湖网络图中单个节点的 REST API 端点进行通信。它可以是任何节点，但通常是信用币的公开访问 URL，或您自己运行的节点。此组件使用
    C# .NET 编写。


    源代码：[`https://github.com/gluwa/creditcoin-legacy-client`](https://github.com/gluwa/creditcoin-legacy-client)


    ### 验证器


    在锯齿湖框架中，验证器组件确保相同的交易将产生相同的状态转换，并且对于网络中的所有参与者，最终的数据是相同的。验证器有两个主要的子组件，它们使用调度器基于交易处理来计算状态变化和由此产生的默克尔哈希。这些子组件负责创建新的候选区块、完成已发布的区块以及验证提议的区块，以确定它们是否应被考虑作为新的链头。尽管名称相同，但请不要将其与信用币
    2.0 及更高版本范围内定义的验证器混淆。


    虽然共识接口负责确定谁可以发布区块、发布的区块是否符合共识规则，以及在分叉情况下哪个区块应成为链头，但实际发布区块的是验证器组件。


    信用币 1.x 中的验证器组件基于`hyperledger/sawtooth-validator:1.0`容器镜像，该镜像使用 Python 实现。为信用币部署的容器镜像是自定义构建版本，带有热修复补丁，覆盖了与工作量证明相关的原始
    Python 文件！


    请注意，在信用币 1.x 生命周期末期，曾尝试切换到`hyperledger/sawtooth-validator:1.2`，该版本本身使用 Rust 实现，信用币团队贡献了一些补丁。由于书中将进一步讨论的原因，这次切换很短暂。


    另一个重要说明是，此组件仍然属于一个较旧的单一代码仓库，而其他一些组件已被转换为独立的 git 仓库！这种结构反映了工程团队的成长以及同时进行的 git 仓库整体重组。


    源代码：[`https://github.com/gluwa/creditcoin-legacy/tree/dev/PoW`](https://github.com/gluwa/creditcoin-legacy/tree/dev/PoW)


    ### 共识


    信用币 1.x 使用一个工作量证明共识引擎，该引擎由团队开发，并通过锯齿湖的内部互连协议直接连接到验证器组件。它使用 Rust 编程语言实现。由于 git
    历史记录不早于我加入信用币团队的时间，我不完全确定这个共识实现是否从一开始就存在，还是取代了之前存在的另一个实现。


    源代码：[`https://github.com/gluwa/creditcoin-legacy-consensus-rust`](https://github.com/gluwa/creditcoin-legacy-consensus-rust)

