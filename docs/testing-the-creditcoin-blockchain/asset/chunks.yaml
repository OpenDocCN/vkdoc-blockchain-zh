    ## 前言


    本书以第一人称视角，讲述了 Creditcoin 区块链在四个不同实现版本及众多技术中的质量工程之旅。书中讨论了使用 Hyperledger Sawtooth
    和 Substrate 区块链框架进行的测试实现、从工作量证明到权益证明共识算法的测试转换，以及以太坊虚拟机兼容层的测试。


    读者将经历数年快节奏的区块链实现和技术变革，内容涵盖所有被测试主要组件的解释、所采用的方法（包括测试自动化和工具的示例）、有趣的错误以及测试挑战。各章节将跟随
    Creditcoin 区块链的每一次重大实现，最后以对其他从事不同区块链相关产品测试工作的测试者的几次访谈作为结束。


    本书讨论的内容几乎 99%都是开源的，书中多处引用了源代码和 GitHub 的链接。


    本书面向软件测试人员和质量工程人员。他们可能即将需要参与区块链实现项目，但目前尚不具备必要的理解，不清楚区块链是什么、如何工作，以及在“保障”质量方面哪些是重要的。


    **目标读者：**


    *   软件测试员

    *   测试自动化方向的软件开发人员

    *   质量保证工程师

    *   质量保证经理


    **你将学到：**


    1.  区块链的关键组件（附有部分图表）

    2.  流行的区块链和加密货币术语表

    3.  使用 Hyperledger Sawtooth 框架实现区块链的概述

    4.  使用 Substrate 框架实现区块链的概述

    5.  与测试工作量证明、权益证明和基于 EVM 的区块链相关的实践主题


    ## 致谢


    我要感谢 Jeroen Rosink，他是第一个就本书内容给我反馈的人。到目前为止，你已经多次为我提供了宝贵的反馈。我可能误解了其中一些内容，也肯定没有完全采纳所有建议，但我毫不怀疑你的反馈给我的写作带来了积极的改变。接下来要感谢
    Sebastian Malyska，他帮助我联系了其他区块链测试者。Seba，希望我们很快能在另一个测试会议上相见！感谢我的同行兼邻居 Liviu Damian，他帮我联系上了
    Andrew Snaith。感谢 Andrew Snaith 同意为本书分享你的测试经验，这为我个人的故事增添了更多维度。最后但同样重要的是，感谢 Sebastian
    Viquez 同意分享你在智能合约方面的测试经验，使本书得以完善。


    ## 关于作者

    ## 关于技术审校者


    # 第一部分：区块链入门


    ## 1. 介绍


    密码学家大卫·乔姆在其 1982 年的论文《由相互猜疑的群体建立、维护和信任的计算机系统》中首次提出了一种类似区块链的协议，并在随后的 15-20 年中对此想法进行了进一步改进。第一个去中心化的区块链由化名为中本聪的个人（或团体）于
    2008 年构想，从而催生了比特币。2013 年是以太坊的起点，它引入了智能合约功能。由于对密码学计算所需高能耗的担忧，后来的链如 Cardano（2017）、Solana（2020）和
    Polkadot（2020）开始采用能耗较低的权益证明模型。


    目前，我们正目睹对区块链技术的兴趣和投资持续增长^(¹)，众多公司正在寻找加密货币之外的实际应用。这是一个区块链技术正进入更普遍的软件工程人员世界的时代。这也是区块链技术正在产品化的时代，这导致了对这些产品进行更多测试的必要性。


    作为一名拥有近二十年经验的质量保证工程师，我对在区块链测试领域工作感到非常好奇，但与此同时，在很长一段时间里，我也感到极度不自在。我之前有测试底层基础设施类软件的经验，比如
    Linux 操作系统的各个部分，但在此之前没有任何加密货币或区块链的经验。由于我参与的是一个已经投产的产品，我需要非常快速地学习大量知识，才能成为团队中高效的一员。这就像对着消防水管喝水，直到今天有时仍有这种感觉。


    本书面向普通的测试人员和质量工程人员。他们可能很快就需要参与区块链软件产品的工作，但目前尚不具备必要的理解，不清楚它是什么、实际如何工作，以及在“保障”质量方面哪些是重要的。


    区块链网络是分布式系统，通常比常规软件产品更复杂，并且有大量需要测试的项目，这需要广泛的技能组合。本书并非旨在成为涵盖所有可能场景的详尽资源；这是不可能的。相反，它旨在讲述我作为一名区块链测试工程师的故事，并希望能成为你在这个领域的起点。


    祝你测试愉快！'
- fmt: '# Introduction to Blockchain


    There are multiple components in distributed systems like blockchain, and some
    of them are not necessarily common knowledge unless you have worked in this specific
    technical field before. This chapter explains what a blockchain is and establishes
    some of the common terms used in this domain and gives you some examples.


    A blockchain is a growing list of records, called blocks, which are securely linked
    together by cryptographic functions which guarantee that data is tamper proof.
    In the context of Figure [1-1](#629923_1_En_1_Chapter.xhtml#Fig1), we can think
    about each block as a snapshot of the current state at a specific period of time.
    If someone tries to modify this state at a later date, that would cause all of
    the blocks afterward to be invalid with respect to the modified block, thus revealing
    data tampering. It is also referred to as a distributed digital ledger. Such architecture
    allows for participants who don’t trust each other to still have trust in the
    data recorded onto the blockchain.


    ![](images/629923_1_En_1_Chapter/629923_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Example of linked data blocks forming a blockchain License: CC BY 3.0, source
    [`https://commons.wikimedia.org/wiki/File:Blockchain_landscape.svg`](https://commons.wikimedia.org/wiki/File:Blockchain_landscape.svg)


    Blockchain participants are individual operators who execute the blockchain client
    software on their computer systems. Their motivation is usually financial – to
    gain rewards for providing distributed computing resources to the blockchain.


    In order to record new information onto the blockchain, participants must be in
    agreement – for example, what is the answer to a difficult mathematical problem.
    This is known as consensus. By design, most blockchain systems are open for participation
    to anyone, and in many cases participants are anonymous, could be faulty (due
    to software or hardware bugs) or misbehaving (due to possible external incentive
    to falsify records in the blockchain), and generally cannot be trusted. It is
    the job of a consensus algorithm to ensure that participants in such a system
    can reach an agreement and to detect and exclude participants who are considered
    to be at fault. Otherwise, the blockchain software cannot proceed to the next
    step, which is recording actual data into storage.


    Once new transactions are combined into a block and this block is distributed
    across multiple nodes in the blockchain, it cannot be erased or modified. The
    blockchain ensures full transaction history, and the use of cryptographic functions
    ensures that information recorded on the chain is secure by design. These records
    are essentially read-only. Algorithms and software architecture are chosen so
    that they guarantee these principles. The actual cryptographic, consensus, networking,
    and other algorithms and implementation architectures vary, and there is a lot
    of ongoing research in this space, but the underlying principle is ensuring data
    integrity as shown in Figure [1-1](#629923_1_En_1_Chapter.xhtml#Fig1).


    Although many of today’s blockchain platforms are capable of supporting smart
    contracts and cryptocurrencies, these are not strictly required for the core operation
    of a blockchain as a secure distributed ledger. It is the opposite, being a secure
    distributed ledger, that makes the existence of smart contracts and cryptocurrencies
    possible.


    A blockchain implementation is an infrastructure type of software which on a very
    high abstraction level resembles a database – there is some data recorded in storage
    and the outside world, that is, other applications can read and write to the blockchain.


    Blockchain applications are usually more complex than other pieces of software
    that testers may be familiar with, with multiple components working in parallel
    and multiple networking channels and protocols being active at the same time.


    # Blockchain Attributes


    This section is included only for your reference. In a practical implementation,
    most of these attributes are available to you out of the box, courtesy of the
    chosen blockchain framework.


    The testing requirements around these particular attributes depend on your operational
    and business requirements and in practical implementations, for example, where
    you are not developing the underlying algorithms themselves, are most likely going
    to be resolved by having heavy monitoring and alerts rather than a functional
    test suite.


    - **Security**: Information on a blockchain is generally considered to be secure
    against modification so that historical records can be trusted. The blockchain
    is also considered generally secure against malicious actors because of its distributed
    nature


    - **Fault tolerance**: In a blockchain network, there may be nodes which exhibit
    faulty behavior or are downright malicious. Blockchain implementations have built-in
    tolerance against this.


    - **Reliability**: The probability that the blockchain will work properly in a
    specified environment and for a given amount of time. For nominated proof-of-stake
    consensus, this translates to having at least two-thirds of all elected validators
    online and functioning properly during the current era.


    - **Reproducibility**: Transactions on the blockchain can be replayed by another
    node which should always result in the same state, for example, same information
    stored locally on disk for the node replaying the transactions.


    - **Transparency**: Records on a public blockchain are accessible to everyone,
    and all state transitions, from genesis to the current block, can be replayed
    and verified individually. That is, even though participants are generally anonymous,
    all of their actions are fully transparent and can be retraced by anyone.


    - **Finality** is the level of confidence that a well-formed block recently appended
    to the blockchain will not be revoked in the future and thus can be trusted. Most
    distributed blockchain protocols cannot guarantee the finality of a freshly committed
    block, and instead rely on “probabilistic finality”: as the block goes deeper
    into a blockchain, it is less likely to be altered or reverted by a newly found
    consensus.


    - **Public vs. private**: Whether the blockchain is fully open to the public,
    for example, anyone can participate or not. Blockchains that you hear about in
    the news are public, including Creditcoin.


    - **Permissionless vs. permissioned**: Whether anyone can join an existing blockchain
    network, operate a node, and participate in consensus with/without first obtaining
    some sort of permission, approval, etc. Popular blockchains like Bitcoin, Ethereum,
    and, of course, Creditcoin are permissionless.'
  raw: '## Introduction to Blockchain


    There are multiple components in distributed systems like blockchain, and some
    of them are not necessarily common knowledge unless you have worked in this specific
    technical field before. This chapter explains what a blockchain is and establishes
    some of the common terms used in this domain and gives you some examples.


    A blockchain is a growing list of records, called blocks, which are securely linked
    together by cryptographic functions which guarantee that data is tamper proof.
    In the context of Figure [1-1](#629923_1_En_1_Chapter.xhtml#Fig1), we can think
    about each block as a snapshot of the current state at a specific period of time.
    If someone tries to modify this state at a later date, that would cause all of
    the blocks afterward to be invalid with respect to the modified block, thus revealing
    data tampering. It is also referred to as a distributed digital ledger. Such architecture
    allows for participants who don’t trust each other to still have trust in the
    data recorded onto the blockchain.


    ![](images/629923_1_En_1_Chapter/629923_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Example of linked data blocks forming a blockchain License: CC BY 3.0, source
    [`https://commons.wikimedia.org/wiki/File:Blockchain_landscape.svg`](https://commons.wikimedia.org/wiki/File:Blockchain_landscape.svg)


    Blockchain participants are individual operators who execute the blockchain client
    software on their computer systems. Their motivation is usually financial – to
    gain rewards for providing distributed computing resources to the blockchain.


    In order to record new information onto the blockchain, participants must be in
    agreement – for example, what is the answer to a difficult mathematical problem.
    This is known as consensus. By design, most blockchain systems are open for participation
    to anyone, and in many cases participants are anonymous, could be faulty (due
    to software or hardware bugs) or misbehaving (due to possible external incentive
    to falsify records in the blockchain), and generally cannot be trusted. It is
    the job of a consensus algorithm to ensure that participants in such a system
    can reach an agreement and to detect and exclude participants who are considered
    to be at fault. Otherwise, the blockchain software cannot proceed to the next
    step, which is recording actual data into storage.


    Once new transactions are combined into a block and this block is distributed
    across multiple nodes in the blockchain, it cannot be erased or modified. The
    blockchain ensures full transaction history, and the use of cryptographic functions
    ensures that information recorded on the chain is secure by design. These records
    are essentially read-only. Algorithms and software architecture are chosen so
    that they guarantee these principles. The actual cryptographic, consensus, networking,
    and other algorithms and implementation architectures vary, and there is a lot
    of ongoing research in this space, but the underlying principle is ensuring data
    integrity as shown in Figure [1-1](#629923_1_En_1_Chapter.xhtml#Fig1).


    Although many of today’s blockchain platforms are capable of supporting smart
    contracts and cryptocurrencies, these are not strictly required for the core operation
    of a blockchain as a secure distributed ledger. It is the opposite, being a secure
    distributed ledger, that makes the existence of smart contracts and cryptocurrencies
    possible.


    A blockchain implementation is an infrastructure type of software which on a very
    high abstraction level resembles a database – there is some data recorded in storage
    and the outside world, that is, other applications can read and write to the blockchain.


    Blockchain applications are usually more complex than other pieces of software
    that testers may be familiar with, with multiple components working in parallel
    and multiple networking channels and protocols being active at the same time.


    ## Blockchain Attributes


    This section is included only for your reference. In a practical implementation,
    most of these attributes are available to you out of the box, courtesy of the
    chosen blockchain framework.


    The testing requirements around these particular attributes depend on your operational
    and business requirements and in practical implementations, for example, where
    you are not developing the underlying algorithms themselves, are most likely going
    to be resolved by having heavy monitoring and alerts rather than a functional
    test suite.


    *   **Security**: Information on a blockchain is generally considered to be secure
    against modification so that historical records can be trusted. The blockchain
    is also considered generally secure against malicious actors because of its distributed
    nature


    *   **Fault tolerance**: In a blockchain network, there may be nodes which exhibit
    faulty behavior or are downright malicious. Blockchain implementations have built-in
    tolerance against this.


    *   **Reliability**: The probability that the blockchain will work properly in
    a specified environment and for a given amount of time. For nominated proof-of-stake
    consensus, this translates to having at least two-thirds of all elected validators
    online and functioning properly during the current era.


    *   **Reproducibility**: Transactions on the blockchain can be replayed by another
    node which should always result in the same state, for example, same information
    stored locally on disk for the node replaying the transactions.


    *   **Transparency**: Records on a public blockchain are accessible to everyone,
    and all state transitions, from genesis to the current block, can be replayed
    and verified individually. That is, even though participants are generally anonymous,
    all of their actions are fully transparent and can be retraced by anyone.


    *   **Finality** is the level of confidence that a well-formed block recently
    appended to the blockchain will not be revoked in the future and thus can be trusted.
    Most distributed blockchain protocols cannot guarantee the finality of a freshly
    committed block, and instead rely on “probabilistic finality”: as the block goes
    deeper into a blockchain, it is less likely to be altered or reverted by a newly
    found consensus.


    *   **Public vs. private**: Whether the blockchain is fully open to the public,
    for example, anyone can participate or not. Blockchains that you hear about in
    the news are public, including Creditcoin.


    *   **Permissionless vs. permissioned**: Whether anyone can join an existing blockchain
    network, operate a node, and participate in consensus with/without first obtaining
    some sort of permission, approval, etc. Popular blockchains like Bitcoin, Ethereum,
    and, of course, Creditcoin are permissionless.'
  trans: '

    # 区块链简介


    像区块链这样的分布式系统包含多个组成部分，除非你之前从事过这个特定的技术领域，否则其中一些部分未必是常识。本章将解释什么是区块链，建立该领域中常用的一些术语，并为你提供一些示例。


    区块链是一种不断增长的数据记录列表，这些记录被称为区块，它们通过密码学函数安全地链接在一起，从而保证数据不可篡改。在图 1-1 的语境中，我们可以将每个区块视为特定时间段内当前状态的一个快照。如果有人稍后试图修改这个状态，那么相对于被修改的区块，所有后续区块都将变得无效，从而暴露数据篡改行为。它也被称为分布式数字账本。这种架构使得互不信任的参与者仍能信任记录在区块链上的数据。


    ![](img/629923_1_En_1_Fig1_HTML.jpg)


    图 1-1


    构成区块链的链接数据块示例 许可协议：CC BY 3.0，来源：[`https://commons.wikimedia.org/wiki/File:Blockchain_landscape.svg`](https://commons.wikimedia.org/wiki/File:Blockchain_landscape.svg)


    区块链参与者是在其计算机系统上运行区块链客户端软件的个体操作者。他们的动机通常是经济方面的——通过向区块链提供分布式计算资源来获得奖励。


    为了将新信息记录到区块链上，参与者必须达成一致——例如，一个困难数学问题的答案是什么。这被称为共识。根据设计，大多数区块链系统对任何人开放参与，并且在许多情况下，参与者是匿名的，可能出错（由于软件或硬件错误）或行为不端（由于可能存在篡改区块链记录的外部激励），并且通常不可信任。共识算法的工作就是确保在这种系统中的参与者能够达成一致，并检测和排除被认为有错误的参与者。否则，区块链软件无法进入下一步，即将实际数据记录到存储中。


    一旦新的交易被组合成一个区块，并且该区块被分发到区块链中的多个节点，它就无法被删除或修改。区块链确保了完整的交易历史，而密码学函数的使用则保证了记录在链上的信息在设计上是安全的。这些记录本质上是只读的。所选择的算法和软件架构确保了这些原则得以实现。实际的密码学、共识、网络以及其他算法和实现架构各不相同，并且该领域有大量正在进行的研究，但其基本原则是确保数据完整性，如图
    1-1 所示。


    尽管当今许多区块链平台能够支持智能合约和加密货币，但这些对于区块链作为安全分布式账本的核心运作来说并非严格必需。恰恰相反，正是作为安全分布式账本这一点，才使得智能合约和加密货币的存在成为可能。


    区块链实现是一种基础设施类型的软件，在非常高的抽象层面上类似于数据库——存储中记录了一些数据，外部世界（即其他应用程序）可以对区块链进行读写。


    区块链应用程序通常比测试人员可能熟悉的其他软件更复杂，它包含多个并行工作的组件，以及同时活动的多个网络通道和协议。


    # 区块链属性


    本节仅供参考。在实际实现中，借助所选用的区块链框架，这些属性中的大部分都可以直接为你所用。


    围绕这些特定属性的测试要求取决于你的运营和业务需求，并且在实际实现中（例如，在你并非开发底层算法本身的情况下），最有可能通过加强监控和警报而不是功能测试套件来解决。


    - **安全性**：一般认为区块链上的信息在防篡改方面是安全的，因此历史记录可以信赖。由于其分布式特性，区块链通常也被认为能够抵御恶意行为者。


    - **容错性**：在区块链网络中，可能存在表现出错误行为或完全恶意的节点。区块链实现对此具有内置的容错能力。


    - **可靠性**：区块链在指定环境中、在给定时间内正常工作的概率。对于指定的权益证明共识机制而言，这转化为在当前时代，至少有三分之二当选的验证者在线且正常运行。


    - **可复现性**：区块链上的交易可以由另一个节点重放，并且应始终产生相同的状态，例如，对于重放交易的节点，其本地磁盘上存储的信息相同。


    - **透明度**：公共区块链上的记录对所有人开放访问，从创世区块到当前区块的所有状态转换都可以被单独重放和验证。也就是说，尽管参与者通常是匿名的，但他们所有的行为都是完全透明的，任何人都可以追溯。


    - **最终确定性** 指的是对于最近添加到区块链的一个格式正确的区块不会在未来被撤销，因此可以信赖的置信度。大多数分布式区块链协议无法保证一个新提交区块的最终确定性，而是依赖于“概率性最终确定性”：随着区块在区块链中深入，它被新发现的共识更改或回滚的可能性就越小。


    - **公开 vs. 私有**：指区块链是完全对公众开放（例如，任何人都可以参与）还是并非如此。你在新闻中听到的区块链，包括 Creditcoin，都是公开的。


    - **无需许可 vs. 需许可**：指任何人是否可以在未经事先获得某种许可、批准等的情况下，加入现有的区块链网络，运行节点，并参与共识。流行的区块链，如比特币、以太坊，当然还有
    Creditcoin，都是无需许可的。

    '
- fmt: '# Blockchain Glossary


    **Transaction**, much like in a regular SQL database, is an operation that seeks
    to append new information onto the blockchain. It is usually exposed as an API
    function so that users may interact with the blockchain. Blockchain transactions
    are usually a singular entity analogous to a single SQL statement executed against
    a traditional database. Transactions represent the blockchain’s business domain,
    for example, `AddBidOrder` for Creditcoin or transfer of Ether from one party
    to another in the case of Ethereum. There can be multiple transaction types supported
    by a blockchain network.


    A **hash** is the result of a one-way cryptographic function usually receiving
    binary data as input and returning a hexadecimal string. Each data has a unique
    hash representation, and you cannot reverse the hash value back to the original
    input data. Even a one-bit modification of the input data will result in vastly
    different hash value. This makes it safe to publicly share the hash value in lieu
    of the data itself and to use the same hash value to verify that two pieces of
    data are exactly the same thing.


    **Transaction hash** is a hexadecimal string representing the cryptographic hash
    of each transaction. Very often these strings are used in lieu of identifiers.
    For example, `https://etherscan.io/tx/0x8d116ea41628ac89745c95147c0ea394809074607395b0d792d1bea9136280b1`
    represents a transaction where I have exchanged one crypto token (G-CRE) for another
    (ETH).


    **Gas** or **transaction fee** is the representation of how much it costs to execute
    a particular transaction on the blockchain. It can vary over time and between
    transaction types and is meant to represent the computational expense for the
    transaction. This value is usually represented by the blockchain’s native crypto
    token. The purpose of gas is related to token economics and also provides a security
    feature making malicious behavior economically not viable.


    A **block explorer** is typically a web application which allows the user to search
    and inspect blocks, transactions, and addresses on a blockchain. A popular one
    is Etherscan linked in the previous paragraph. For Creditcoin, a similar function
    is performed by Subscan (`https://creditcoin3-testnet.subscan.io/`) and Blockscout
    (`https://creditcoin-testnet.blockscout.com`).


    **Block** is a collection of multiple transactions that are recorded atomically
    onto the blockchain. Either all transactions within the block are recorded together
    or none of them are. If we make an analogy with the git version control system,
    a single chunk of modified source code will be a “*transaction",*” while a git
    commit of multiple modifications will be “the *block*.”


    While we may commonly refer to blocks as records, the meaning is different compared
    to a database record, which represents a singular collection of discrete values,
    in other words a row of column values. In the blockchain context, the term record
    is closer in meaning to the vinyl disk record which holds multiple songs.


    Blocks contain a list of transactions, references to the previous and next blocks,
    as well as additional metadata such as time stamps, cryptographic hashes, and
    signatures. There is a maximum limit of how many transactions can be stored in
    a single block, depending on implementation.


    **Block fullness** or **block saturation** level represents the percentage of
    how much of the total available space within a block is actually used. For example,
    if the blockchain is not in use, each block may hold a single heartbeat/timestamp
    transaction. Or it may hold hundreds of transactions in a heavily used blockchain.


    **Block hash** is the hexadecimal string representing the cryptographic hash of
    each block. Very often these strings are used in lieu of addresses or identifiers.
    For example, `0x34e89f72d1bc09af19759a94c347d769a94bb0ca9d257b2efe8ad5ac0502cc11`
    corresponds to block number 19517842 on the Ethereum main network. Its contents
    can be inspected via `https://etherscan.io/block/0x34e89f72d1bc09af19759a94c347d769a94bb0ca9d257b2efe8ad5ac0502cc11`
    or `https://etherscan.io/block/19517842`. This block contains 185 individual transactions,
    including the one where I have swapped some tokens.


    **Block height** or **block number** is the number of blocks preceding it. Older
    blocks have lower height. The bigger this number, the longer the blockchain has
    been in existence.


    **Block time** is the average time between blocks on the blockchain, for example,
    15 seconds. The value itself is arbitrary and is chosen by the creators of the
    blockchain. The important thing is that this value is approximately a constant.
    In Bitcoin, the expected block time is 10 minutes, while in Ethereum the design
    calls for a block time of 15 seconds which in practice is usually between 10 and
    19 seconds. Initial implementations of Creditcoin used 60 seconds, with later
    versions dropping down to 15 seconds. Constant block time is better for layered
    applications because they can know in what timeframe an operation can be considered
    as failed or timed out.


    **Genesis block** is block number zero. It is usually hard-coded into the blockchain
    implementation, for example, your client program, and may contain metadata that’s
    necessary for the subsequent correct operation of the chain. For example, which
    account is the root account or a starting balance for a set of predefined addresses.


    A **fork** happens when the blockchain diverges into two potential paths forward.
    A fork may occur when multiple nodes produce a block at nearly the same time.
    The fork is resolved when subsequent blocks are added and one of the paths becomes
    longer than the alternatives.


    A **hard fork** usually occurs when there is a change to the blockchain protocol
    that is not backward-compatible and requires all users to upgrade their software
    in order to continue participating in the network. In a hard fork scenario, the
    blockchain network exists as two separate digital entities which are not connected
    to one another. Hard forks may also occur due to bugs in the software implementation
    and/or networking issues which lead to consensus failure. In other words, participants
    in the blockchain cannot come to an agreement which path forward should be the
    canonical one and the result is two separate chains.


    Since a blockchain is meant to be used as a source of truth, situations in which
    forks cannot be resolved and the result is a hard-fork are considered to be critical
    and potentially damaging to the blockchain.


    Block **finality** refers to the irreversible confirmation of transactions on
    a blockchain, ensuring security and preventing double-spending. Block **finalization**
    is the process used to handle forks and choose the canonical chain where the majority
    of the participants are in agreement that blocks should not be reverted. In practical
    terms, this means two-thirds of all participants.'
