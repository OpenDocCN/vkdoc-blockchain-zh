    As you can imagine, the documentation for Creditcoin v3 started as a fork of the
    existing documentation for Creditcoin 2.3 and was then amended with information
    about the EVM compatibility layer and guides for deploying smart contracts. The
    initial content creation was done by the devel team and proofread by QA. Some
    pages of the documentation contain command line or source code examples, in particular
    the Smart-Contract Guides section. This naturally begs the question: how do we
    make sure that these examples are always up to date? I will even go a stretch
    further and ask: *how do we test third-party visual tools*, for example, deploying
    smart contracts via Remix – a popular IDE for Ethereum or via the command line
    tool Hardhat?


