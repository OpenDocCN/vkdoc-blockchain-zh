- fmt: '### Staking-Related Pallets


    This component refers to Substrate’s stock pallets which enable staking capabilities
    such as the ability to stake funds; the ability to vote for validators, penalties,
    and rewards for PoS participants; and the election mechanism which determines
    the set of active validators who get to participate in a current era. In Creditcoin
    2.3 and later an era is defined as 24 hours comprising of 2 sessions also known
    as epochs.


    These pallets are included into the Creditcoin runtime with minor modifications
    to the pallets themselves. The runtime however defines some values for them, such
    as expected block time and epoch duration in blocks.


    This should not to be confused with the directory `pallets/staking/src` inside
    the Creditcoin source code. That was part of a former effort to decentralize the
    off-chain worker component which was later removed. Arguably the naming of this
    component had been chosen poorly.


    ### Creditcoin-cli


    A nominated proof-of-stake blockchain requires a bit more interaction from all
    participants compared to a proof-of-work chain. While nominators have the Creditcoin
    Staking Dashboard web application, validators do not have a dedicated web interface.
    To be fair, there is the Polkadot JS Apps application, also known as the Substrate
    portal which can be used to configure a validator for any NPoS Substrate compatible
    blockchain. Instead of using this unbranded generic third-party interface, `creditcoin-cli`
    allows users to stake their funds, become validators, and perform a few other
    maintenance operations.


    This is a command line application written in TypeScript which is bundled together
    inside the docker image. All commands in the cli application talk to the blockchain
    via a WebSockets RPC endpoint. By default that is `ws://127.0.0.1:9944` which
    is the address on which the `creditcoin-node` binary accepts RPC connections inside
    of a running container.


    The reason for this bundling together is that some RPC calls are considered unsafe
    and should not be exposed via the Internet – for example, rotating node session
    keys. Pretty much everything else is either querying the blockchain or requires
    the user to sign an extrinsic and can be safely sent over to any available RPC
    endpoint. The canonical RPC URL for Creditcoin 2 is `wss://rpc.mainnet.creditcoin.network/ws`,
    and cli commands can communicate directly with it.


    Because Creditcoin is a distributed system, it doesn’t really matter which RPC
    endpoint you will point the cli application to. As long as a transaction is signed
    and is received by a running node, it will make its way to the underlying blockchain.
    It is entirely possible that the RPC node receiving the transaction is not the
    same node which will include said transaction into a block. The only exception
    here that I can think of is the aforementioned `rotate-keys` operation which talks
    to the node directly, doesn’t require a signature, and in a way bypasses the blockchain.


    ### Switch_to_pos()


    This is a custom extrinsic which lives in a dedicated pallet of a similar name.
    Its job is to store the block number at which the switch from PoW to PoS happened,
    raise block difficulty to the maximum in order to prevent any of the existing
    PoW nodes from producing a block, and initialize the list of validators for the
    first proof-of-stake session.


    This extrinsic is meant to be executed only once as the last step of migrating
    to proof-of-stake on production and then never used again. It requires sudo privileges.


    This is also the component with the shortest lifetime in the Creditcoin development
    lifecycle. The majority of it was removed after the switch, leaving only the `posSwitch.switchBlockNumber`
    storage item defined.


    For the curious, the change happened at block number 715,239 which can be queried
    directly from the Creditcoin Mainnet; see [`https://creditcoin.subscan.io/block/715239`](https://creditcoin.subscan.io/block/715239)
    and [`https://polkadot.js.org/apps/?rpc=wss://rpc.mainnet.creditcoin.network/ws#/explorer/query/0x0e754be623e67ba57b51c40a8603342736987b8cdfeacb88819c8457d0a40d93`](https://polkadot.js.org/apps/?rpc=wss://rpc.mainnet.creditcoin.network/ws#/explorer/query/0x0e754be623e67ba57b51c40a8603342736987b8cdfeacb88819c8457d0a40d93).


    You can also query the blockchain storage directly and see when the switch took
    place as shown in Figure [6-1](#629923_1_En_6_Chapter.xhtml#Fig1).


    ![](images/629923_1_En_6_Chapter/629923_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Polkadot/Substrate portal showing at which block number Creditcoin changed to
    nominated-proof-of-stake consensus


    ### Block History


    Since Creditcoin 2.3 is a natural progression of the existing 2.0 chain, it is
    important that blocks authored during the proof-of-work period are still available
    in the chain, and they can still be validated even after switching the consensus
    algorithm.


    The original Substrate implementation assumes proof-of-stake history starts at
    block zero, and that’s hard-coded into multiple locations in the source code.
    The most straightforward solution was to fork Substrate and modify these hard-coded
    locations. This is done as part of Gluwa’s Substrate fork at [`https://github.com/gluwa/substrate`](https://github.com/gluwa/substrate)
    inside the `pos-keep-history` branch.


    ### Creditcoin Staking Dashboard


    This is a web application which allows nominators to stake their funds and vote
    for validators. It is a standard React.js application which connects wallet browser
    extensions, such as SubWallet to the Creditcoin blockchain. The main functionality
    of Creditcoin Staking Dashboard is staking funds, filtering and voting for validators,
    and monitoring past performance and rewards.


    It is a fork of Polkadot Staking Dashboard with its branding adjusted for Creditcoin,
    some bug fixes, and simplified functionality. Mainly the functionality around
    nomination pools was removed because a business decision was made not to include
    this as part of the migration process. Later in Creditcoin 3.0 nomination pools
    are introduced back.


    Accessible at [`https://staking.creditcoin.org`](https://staking.creditcoin.org/).


    Source code: [`https://github.com/gluwa/creditcoin-staking-dashboard`](https://github.com/gluwa/creditcoin-staking-dashboard)


    ### Subscan Essentials


    Subscan is an API service which monitors dozens of Substrate-based blockchain
    networks and aggregates information into a SQL database. Subscan Essentials is
    the open source component which implements this functionality. Most notably the
    real Subscan software is not actually open source, and an on-premise version is
    available for a fee. Subscan appears to be using the open core development model.
    From what I could tell, this open source component is not a 1:1 match with the
    service and has some missing functionality which is to be expected.


    This component is used by the Creditcoin Staking Dashboard for the purposes of
    rendering performance charts, for example, past rewards. It is written in the
    Go programming language.


    Creditcoin 2.3 uses a fork of subscan essentials which adds the missing API endpoints
    needed by the staking dashboard. The fork also introduces various improvements.


    Source: [`https://github.com/gluwa/subscan-essentials`](https://github.com/gluwa/subscan-essentials)


    ### Creditcoin-squid


    This is the same GraphQL indexer as described earlier. There’s no substantial
    new functionality related to proof-of-stake added here so mentioning it just for
    completeness.


    ## Timeline of Creditcoin 2.3


    The timeline for v2.3 stretches roughly from May to September 2023. It is a period
    of rapid testing and development during which the major components have been fleshed
    out. This period goes through development, NPoS Testnet announcement plus community
    engagement, and finally the migration of Creditcoin Mainnet to proof of stake.'
