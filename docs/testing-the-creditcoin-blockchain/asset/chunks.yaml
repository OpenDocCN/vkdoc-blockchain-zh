- fmt: "### Testing Creditcoin 3 CLI and Proxy Functionality\n\nFor Creditcoin 3 CLI,\
    \ there is the expected combination of unit tests asserting against various helper\
    \ functions which don’t require a running chain and integration tests which exercise\
    \ individual commands and the validator flow and assert on their successful execution,\
    \ expected error handling, and on-chain state. The existing test suite here is\
    \ more detailed compared to the Creditcoin 2 CLI test suite. I’ve intentionally\
    \ added tests for every single command supported by the command line application,\
    \ exercising both positive and negative scenarios as well as a couple of end-to-end\
    \ test scenarios.\n\nBecause each testing scenario is executed independently,\
    \ I’ve given up on trying to collect and combine code coverage metrics. Instead\
    \ I’ve analyzed test coverage for each command and added the missing ones. This\
    \ isn’t as terrible as it sounds because the set of available commands almost\
    \ doesn’t change past their initial introduction – doing the test coverage analysis\
    \ by hand is acceptable in such a situation in my opinion. This time I’ve gone\
    \ for a low-tech solution instead looking to automate.\n\nA notable difference\
    \ for Creditcoin 3 CLI test suite is exercising proxy functionality as part of\
    \ the test suite. We have to consider the following attributes:\n\n*   Are we\
    \ using proxy account? Yes or No.\n*   Is the supplied proxy account secret valid?\
    \ Yes; No; Yes, but the account has no funds; Yes, but the proxy has been configured\
    \ for a different account.\n*   What is the proxy type? Three possible values.\n\
    \nImplementation wise, using proxy accounts results in a few important differences:\n\
    \n1.  Any secrets handling code must ask for the proxy account secrets, not for\
    \ the stash account ones.\n2.  Signing and submitting transactions to the blockchain\
    \ must be done via the proxy account.\n3.  Checking available balance is twofold:\n\
    \    - Proxy account must have enough funds to pay fees.\n    - Any additional\
    \ amount must be checked against the stash account balance – for example, when\
    \ you want to stake more funds, then your primary account, not the proxy account,\
    \ must have the specified free balance.\n4.  Displaying balance and status, query\
    \ operations, must always use the primary account address even when querying the\
    \ chain via the proxy account.\n\nWe’re not interested in the case where a supplied\
    \ secret isn’t valid because that will prevent any keyrings from initializing,\
    \ regardless of whether a proxy account is used or not. This will fail early on\
    \ before reaching the chain and isn’t tested explicitly. Some of the other combinations\
    \ aren’t valid either, so we’re left with the following testing combinations which\
    \ are expressed as environment variables inside of the CI configuration:\n\n1.\
    \  `proxy=no`\n2.  `proxy=yes / no-funds`\n3.  `proxy=yes / not-a-proxy`\n4. \
    \ `proxy=yes / valid-proxy / type=Staking`\n5.  `proxy=yes / valid-proxy / type=NonTransfer`\n\
    6.  `proxy=yes / valid-proxy / type=All`\n\nFor scenarios 2 and 3, the focus is\
    \ on asserting on the expected error handling. The command line application should\
    \ not crash, and it should not allow transactions to go through. Instead it should\
    \ print a human-friendly error message explaining what went wrong. This is something\
    \ I worked on even after the Testnet announcement because we didn’t get it fully\
    \ correct on the first try.\n\nThe test suite uses common setup/teardown functions\
    \ which manipulate testing accounts, their funds, and/or their secrets accordingly.\
    \ The majority of the test scenarios inside this test suite make use of conditional\
    \ execution, utilizing custom functions called `testIf` and `describeIf`, see\
    \ Listing [7-2](#629923_1_En_7_Chapter.xhtml#PC3). These functions are built upon\
    \ the existing `test()` and `describe()` functions from the Jest testing framework\
    \ and execute the actual test scenarios only when the given expression evaluates\
    \ to true because not every test scenario is applicable to every possible environment\
    \ combination, for example:\n\n```\ntestIf(\n    process.env.PROXY_ENABLED ===\
    \ 'yes' && process.env.PROXY_SECRET_VARIANT === 'no-funds',\n    'should error\
    \ with account balance too low message',\n    () => {\n        try {\n       \
    \     CLI('bond --amount 111');\n        } catch (error: any) {\n            expect(error.exitCode).toEqual(1);\n\
    \            expect(error.stderr).toContain(\n                'Invalid Transaction:\
    \ Inability to pay some fees , e.g. account balance too low',\n            );\n\
    \        }\n    },\n);\n```\n\n*Listing 7-2 Example usage of the `testIf()` function*\n\
    \nSome CLI commands do not support proxy functionality, either by explicit choice\
    \ or because they don’t require the user to be authenticated at all. For such\
    \ commands, the conditional test execution will evaluate the environment and skip\
    \ testing when needed instead of duplicating extra executions which will not bring\
    \ any new information. These commands are primarily tested when `proxy=no`.\n\n\
    Note that all of these six variants execute in parallel, and because they selectively\
    \ skip some test scenarios, there isn’t much overhead in the overall feedback\
    \ time when opening a pull request. The longest variant is `proxy=no` closely\
    \ followed by all combinations with a valid proxy configuration. The longest test\
    \ scenario of all is actually `validatorCycle.test.ts` which exercises each individual\
    \ command in sequence, waits and asserts on the results, distributes rewards,\
    \ and then stops being a validator, unbonds all funds, waits for them to become\
    \ available, and then withdraws the funds.\n\nAnother dimension of variability\
    \ added to the entire test suite en-masse was parametrizing the target URL for\
    \ all CLI commands. There are two nodes called Alice and Bob, and which one we\
    \ talk to is specified as `--url ws://127.0.0.1:<port>`. For the majority of testing\
    \ scenarios, we piggy-back on the proxy handling code which conveniently inserts\
    \ the `--url` argument in the resulting command line.\n\nAll existing CLI commands\
    \ are covered with tests, and the addition of more test scenarios for each of\
    \ these commands made the test suite grow to a point at which it actually started\
    \ to fail because the test automation code had a problem. The short version is\
    \ that scenarios which were supposed to be independent actually had a shared state,\
    \ and that was causing side effects to manifest between other test scenarios.\
    \ In particular, the actual integration testing looked like in Figure [7-3](#629923_1_En_7_Chapter.xhtml#Fig3).\n\
    \n![Figure 7-3](images/629923_1_En_7_Chapter/629923_1_En_7_Fig3_HTML.jpg)\n\n\
    *Figure 7-3 All tests using a shared blockchain*\n\nWhile the individual `*.test.ts`\
    \ files are still executed independently of one another, in sequence, the practical\
    \ implementation was that each test scenario will create a random account on the\
    \ blockchain and then use it to assume the roles of an active validator and exercise\
    \ different commands under test with that role. The shared state, for example,\
    \ who is the active validator and which account controls the nodes Alice and Bob,\
    \ was recorded on-chain, and it happened that in some situations the blockchain’s\
    \ active validator set was configured with certain accounts, while in reality\
    \ the next command was executing with a different account.\n\nFor example, `validate.test.ts`\
    \ uses an account XXXXXX to become a validator with Bob’s node and then doesn’t\
    \ clean up properly after itself. On the next step, another test scenario generates\
    \ an account YYYYYY and also tries to become a validator controlling Bob’s node!\
    \ In a sense hijacking the running Creditcoin node without cleaning up properly.\
    \ That’s possible because configuring session keys for the node (e.g., rotate\
    \ keys) is a permissionless operation, and as long as you have access to the running\
    \ process (e.g., the RPC port), you can do this."
