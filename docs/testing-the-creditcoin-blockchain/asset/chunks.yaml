    trigger a restart for every other CI job defined in the same yaml file. I’m definitely
    trying this out!


    ![](images/629923_1_En_7_Chapter/629923_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Dependent matrix jobs


    ## Summary


    As you have seen by now, testing Creditcoin 3 is very similar to its predecessors
    from the v2 family. That is to be expected because the underlying technology stack
    and development practices are roughly the same. On the other hand, there are new
    testing challenges that came up which I guess is also to be expected.


    Unfortunately there is no more testing that I can share for now. As I am writing
    the book, the next phase of Creditcoin 3 is not there yet, and I haven’t worked
    on it, not am I aware of the practical details related to its implementation.


    In the next chapter, I will talk about how I approach testing in general and what
    I think a test engineer’s job is. Please stick around a bit more.


    Footnotes [1](#629923_1_En_7_Chapter.xhtml#Fn1_source)   [2](#629923_1_En_7_Chapter.xhtml#Fn2_source)


    # Part IVBlockchain Testing Approaches


    # 8. How Others Test Blockchain


    My motivation for writing this book was to share my personal experience in blockchain
    testing in the hope that it could be useful to others. During the process of writing
    it, I actually came to know other testers who were working in the blockchain domain.
    And of course they were working on products which are different than mine, and
    their approach is also different.


    This chapter outlines the experience of Andrew Snaith and Sebastian Viquez who
    kindly agreed to talk to me. As you will see, there is even more to test in blockchain
    than I have already covered in all the previous chapters.


    ## My Blockchain Testing Approach


    As with any other kind of testing, I start by trying to understand what we’re
    trying to do and the limitations of the environment I am working in:


    *   What are all of the components of the blockchain under test?


    *   How does each component work, and what is its complexity?


    *   What are the risks involved; what are the business requirements?


    *   What parts can be exercised via unit, integration, and/or other types of testing?


    *   How do I actually write these types of tests – for example, available tools,
    syntax, and examples?


    This helps me build up my understanding of all moving parts from business point
    of view and also from a technical point of view. I tend to start from the technical
    side first and then gradually expand my understanding. Whenever possible, I will
    opt-in for testing early in the development cycle and automating as much as possible.
    That also helps to codify the behavior of a complex system which has been handy
    on numerous occasions.


    For Creditcoin that means I was focusing mainly on testing business logic and
    covering additional scenarios as they arise and as we gain more understanding
    of how the entire blockchain is used and how it works in detail. Constantly participating
    in code review on pull requests, raising questions and opening tickets for missing
    tests or the need for refactoring so that they aren’t forgotten has contributed
    more for quality over time than any particular test scenario I’ve automated or
    any individual bug I’ve found.


    This is a bottom-up approach and is also a very organic one – testing from day
    one and testing every minimal bit of product that you can lay your hands on. This
    is also a personal bias that I have because of how my professional career has
    taken place over the years – I’ve always worked in product companies, always on
    products which are highly technical in nature and always on the same level as
    my developer counterparts. That is the nature of infrastructure-type software
    products anyway.


    I’m not sure if I am even qualified to offer advice for anyone else not being
    in the same situation as I am in. I guess just “give it a try” is good enough
    advice.


    ## Testing Across the Blockchain Stack with Andrew Snaith


    Testing a blockchain protocol and client implementation is one side of the puzzle
    and arguably the fact that Gluwa, Inc. controls both makes testing Creditcoin
    relatively easy. I talked to Andrew Snaith, Quality Engineering Lead at ChainSafe,
    about his point of view around blockchain testing and discovered even more nuances
    than I had previously thought about.


    ChainSafe is a multi-chain blockchain research and development company with a
    focus on open source software. They offer development services for external clients
    and also develop their own products.


    In terms of organization, the company has multiple engineering teams which for
    the majority part work on what they call streams. Some engineers are dedicated
    to a single stream, while others are working on multiple streams in parallel.
    Similarly some teams have a dedicated quality engineer, while others do not, more
    on this later. The work itself is spanning across multiple chains as well as across
    the entire stack: host client development, cross-chain bridges, web3 tooling libraries
    and SDKs, distributed applications, smart contracts, and browser extensions.


    Note


    A **bridge** is a computer program that connects two or more blockchains together
    usually for the purposes of transferring assets between them. Different chains
    are not natively connected to one another, so the bridge must make sure that token
    ownership and quantities are represented correctly in a cross-chain transfer.


    Note


    **Filecoin** is a decentralized blockchain-based storage network. It was developed
    by [Protocol Labs](https://en.wikipedia.org/wiki/Protocol_Labs)^([^(10)](#fn10))
    and shares some ideas from [InterPlanetary File System](https://en.wikipedia.org/wiki/InterPlanetary_File_System)^([^(11)](#fn11))
    allowing users to rent unused disk space. The blockchain is based on both proof-of-replication
    and [proof-of-spacetime](https://en.wikipedia.org/wiki/Proof_of_space-time)^([^(12)](#fn12))
    consensus algorithms.


    ### Products Under Test


    I’m not going to list every single project that ChainSafe works on, but here’s
    a list of several notable products under test grouped in their respective categories.
    Please try to keep in mind this diversity because it reflects on how testing is
    performed.'
