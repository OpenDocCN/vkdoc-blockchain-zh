    # 2. Blockchain Development Frameworks


    Searching the Internet for “blockchain development frameworks” yields multiple
    results, and it is entirely possible that preferences will have changed by the
    time you read this book. Actual details will vary, but basic concepts should be
    similar. In this chapter, I will list the frameworks I’ve used personally in order
    to provide more context for the upcoming chapters.'
  trans: '

    ### 运行时升级


    由于区块链应用因业务需求而不断演进，其实现版本会有所不同。假设我们想要为井字棋区块链引入一个功能，让三名玩家能够同时互相竞技。


    运行时升级组件就负责实现这一功能。在某些区块链实现中，业务逻辑（交易）可能与实际的客户端程序分离保存。使用 Substrate 区块链框架时便是这种情况。一种流行的选择是
    WebAssembly 格式。如果运行时是独立的，它也可以被记录在区块链本身之上。


    在其他实现中，交易可能与客户端程序的其余部分紧密耦合，需要软件升级和重启后，用户才能访问区块链的新功能。


    该组件引发了关于不同客户端和运行时版本之间兼容性/互操作性测试的问题。


    ### 指标与遥测


    由于区块链应用是分布式的，并且出于安全原因鼓励大量节点参与，因此常常需要公开区块链软件内部运行的信息。这些信息可以汇总到诸如 Grafana 之类的工具中，以便进行进一步分析。


    遥测组件就是定义此类指标，并随后通过例如 HTTP 协议将其推送到外部服务的地方。


    ### 链下工作机（Off-Chain Worker）或预言机（Oracle）


    在区块链的语境中，所有计算和状态都存储在链上。然而，实际应用需要与外部世界通信，并将信息安全地传入和传出区块链。这就是所谓的预言机或链下工作机组件的领域。


    这里需要注意一点：链下工作机能够读取链上数据，但不应直接修改它。不过，如果需要反映外部世界的状态，该组件会将交易发送回区块链。这可以在内部发生，例如，在源代码中调用交易函数，或者通过现有的
    RPC 接口从外部路由到区块链。这些交易调用随后将由其他组件处理，如果成功，将被打包进一个区块。交易也可能因各种原因失败或未能被打包进区块。


    ### 智能合约


    智能合约是存储在区块链网络上的计算机程序。一旦智能合约被部署到区块链上，它可以存储任意状态、执行任意计算，或调用区块链上的其他合约。


    每个智能合约都有一个与之关联的地址，该地址充当合约的入口点，非常类似于 REST API 函数的 URL 地址。终端客户端通过与智能合约交互，使用其地址通过某种客户端库发送交易——一个流行的选择是
    `ethers.js`。


    一旦部署，智能合约便无法修改。不过，合约的新版本可以部署到不同的地址。


    智能合约的创建者铸造一种新的加密代币（即凭空创造出来）相当流行，这种代币随后被用作某些区块链网络上的价值表示。然而，智能合约也可以实现其他功能，例如自动透明的投票计数、托管拍卖、游戏以及安全地远程购买商品。


    智能合约的实际应用超出了本书的讨论范围。


    ## 共识机制


    共识引擎是区块链网络中最重要的组件之一，目前有许多正在开发或使用的机制。例如，工作量证明、权益证明、消逝时间证明、容量证明和位置证明等等。它们的特性影响着诸多属性，例如谁可以参与、参与难易程度、维护网络的成本、激励机制、出块速度快慢、网络能支持的节点数量、交易吞吐量，以及最重要的是，区块链的安全性！


    请查看这个包含 20 多种算法的列表以作进一步参考：[`https://medium.com/hackernoon/consensuspedia-an-encyclopedia-of-29-consensus-algorithms-e9c4b4b7d08f`](https://medium.com/hackernoon/consensuspedia-an-encyclopedia-of-29-consensus-algorithms-e9c4b4b7d08f)


    ### 工作量证明 (PoW)


    在 PoW 共识中，参与者需要消耗计算资源，以获取将新区块追加到区块链的机会。他们需要解决一个 CPU 密集型的加密难题，并将解（一个非常大的数字）提交给其他参与者，这些参与者可以非常容易地计算（并认同）该解是正确的。每个区块的数据部分被用作加密难题的输入。


    第一个找到正确解的矿工获得将新区块追加到区块链的机会。正因如此，我们说他们“挖”到了一个区块。


    矿工拥有的 CPU 资源越多，他们解决加密难题并将区块追加到区块链的机会就越大，从而为他们的努力赚取更多奖励。


    在 PoW 网络中，出块时间相对较慢，并且对电力有很高的要求。


    ### 权益证明 (PoS)


    在 PoS 共识机制中，参与者根据其质押的代币数量竞争追加区块的机会。一般而言，投资的代币越多，被算法选择去追加区块并因此获得更高回报的可能性就越大。


    PoS 网络避免了 PoW 网络的高计算成本。由于涉及的加密计算少得多，因此并没有真正的“挖矿”；然而，即使在这种情况下，我们通常也把验证者称为矿工。


    质押的资金被区块链实现作为“人质”持有，如果验证者被举报并被发现有错误或恶意行为，其资金可能会被作为惩罚没收。这个过程是自动化的，旨在限制人为参与并促进区块链网络的健康行为。例如，当一个验证者节点长时间离线时，他们将受到惩罚。


    在区块链网络中对参与者施加惩罚并没收其现有资金的过程，也被称为“罚没”（slashing）。


    ### 权威证明 (PoA)


    权威证明是一种算法，它通过一种基于身份作为抵押品或声誉作为抵押品的共识机制，提供相对较快的出块时间。在 PoA 网络中，个人通过努力获得成为验证者的权利，因此有动力去维持他们已经获得的地位。PoA
    共识通常可以在私有非许可链中找到。


    ## 本章小结


    在本章中，我介绍了区块链的基本概念，并讨论了一个区块链实现的一些主要组件和属性，以建立基础知识。你也可以随时参考术语表章节来温故知新。


    接下来，我将介绍我使用过的区块链开发框架、构建实际区块链实现的一些实用笔记，以及这对我们测试人员意味着什么。


    脚注 1


    # 2. 区块链开发框架


    在互联网上搜索“区块链开发框架”会得到大量结果，并且当你阅读本书时，偏好很可能已经发生了变化。具体细节会有所不同，但基本概念应该是相似的。在本章中，我将列出我个人使用过的框架，以便为后续章节提供更多背景信息。

