- fmt: "# On Test Automation and Tools\n\nGiven the diverse nature of products and\
    \ their stages of maturity, there isn’t a one-size-fits-all requirement for test\
    \ automation and code coverage metrics at ChainSafe. During the period in which\
    \ a product is undergoing rapid iteration and proof-of-concept, there is usually\
    \ not much investment in test automation. Teams are more likely to wait until\
    \ the architecture model has been stabilized before starting to work on adding\
    \ test automation and enabling CI jobs on pull requests in GitHub. This usually\
    \ happens while new functionality is being added to the product under test.\n\n\
    In terms of programming languages and testing frameworks, ChainSafe teams are\
    \ using the defaults coming from the language when it comes to unit and integration-type\
    \ testing in the same repository which ranges between Go, Rust, and TypeScript.\
    \ The rule of thumb for Andrew is “use the standard testing tools built into the\
    \ language.” This is what he also calls “core-testing.”\n\nAs we go up the testing\
    \ pyramid into e2e and UAT testing, the tools become a bit more standardized with\
    \ a clear preference to use Cypress for anything that touches a user interface.\
    \ Using Cypress however hits limitations when you have to interact with browser\
    \ extensions that sign and submit transactions to the underlying blockchain –\
    \ it isn’t directly supported, although there are workarounds and third-party\
    \ plugins; see [`https://github.com/cypress-io/cypress/issues/16703`](https://github.com/cypress-io/cypress/issues/16703)\
    \ and [`https://github.com/cypress-io/cypress/issues/14808`](https://github.com/cypress-io/cypress/issues/14808).\
    \ Hacking Cypress to speak to a browser extension is possible; however, ChainSafe\
    \ prefers not to add that complexity into their testing tools as they lose the\
    \ ability for introspection when sending commands from Cypress to the extension\
    \ and the ability to listen to blockchain events which may not be reported/observable\
    \ through the DOM or rather may not be observable through the extension itself.\n\
    \nFor the situation in which the subject under test is a distributed application,\
    \ but not the wallet extension itself, Andrew’s primary goal is to guarantee the\
    \ functionality of the dApp under test that’s why he prefers to remove the wallet\
    \ from the picture entirely. Essentially creating a false, programmatically controlled\
    \ wallet, inside the test suite itself by stubbing out the `window.ethereum` object,\
    \ for example, mocking the EVM side. The assumption is that the extension works\
    \ as expected, and it doesn’t need to be tested explicitly. In practice browser\
    \ extensions are still subjected to testing, at the very least via a manual smoke\
    \ test, because you still need to know that the distributed application and the\
    \ extension work well together and there are no obvious issues, or document them\
    \ if there are.\n\nThis approach didn’t work well for *Multix* because wallets\
    \ work slightly differently for Polkadot than for Ethereum-based chains. Also\
    \ because for a multisig wallet, Andrew discovered that they need to workaround\
    \ more scenarios. The solution here is a programmable wallet library that connects\
    \ your test framework to the Polkadot API. This is the previously mentioned `cypress-polkadot-wallet`\
    \ plugin which can be found at [`https://github.com/chainsafe/cypress-polkadot-wallet`](https://github.com/chainsafe/cypress-polkadot-wallet).\n\
    \nOn the other hand, if you don’t have the resources to create your own testing\
    \ tools and libraries and/or the ones by ChainSafe don’t fit your use case, you\
    \ may go ahead with Playwright for UI test automation. I have seen a working test\
    \ suite exercising several browser extensions, using the Chrome browser, which\
    \ can sign and submit transactions. May not be very elegant but is a relatively\
    \ easy way to get started.\n\nOther tools used by ChainSafe:\n- Chopsticks, [`https://github.com/AcalaNetwork/chopsticks`](https://github.com/AcalaNetwork/chopsticks),\
    \ is a forking tool for Substrate-based networks similar to our own creditcoin-fork.\n\
    - Dappeteer, [`https://github.com/ChainSafe/dappeteer`](https://github.com/ChainSafe/dappeteer),\
    \ now archived, is a library to facilitate end-to-end testing for dApps using\
    \ Puppeteer + MetaMask. This was created originally by ChainSafe for signing dapps\
    \ under test with a real metamask extension but later utilized further for testing\
    \ their snaps development work within MetaMask.\n\nFor smart contracts, testing\
    \ activities revolve around logic verification, vulnerabilities scanning, and\
    \ security audits, including from external third-party providers.\n\n# Testing\
    \ Smart Contracts with Sebastian Viquez\n\nDuring my journey of testing Creditcoin,\
    \ I have worked predominantly on testing at the protocol layer itself and almost\
    \ not at the layer that sits on top of it – that is a blockchain application implemented\
    \ as a smart contract. I even mentioned in the beginning of this book that practical\
    \ applications of smart contracts are outside of the scope of this book.\n\nWell,\
    \ well, well. Given that Creditcoin has now evolved into a general purpose blockchain\
    \ which supports smart contracts, it is only fitting that we actually get to hear\
    \ a different point of view from someone with more experience in this area.\n\n\
    I talked to Sebastian Viquez, a fellow QA lead and an early Bitcoin adopter from\
    \ Costa Rica. What follows is a summary of his experience.\n\n> **Note**  \n>\
    \ A smart contract is a computing program that is recorded onto the blockchain\
    \ itself! It can store data on-chain, execute other smart contract programs, and\
    \ emit events. Users interact with smart contracts by sending transactions to\
    \ the address on which the smart contract is deployed. From a user point of view,\
    \ these interactions are performed via a wallet application such as `MetaMask`."
  raw: '#### On Test Automation and Tools


    Given the diverse nature of products and their stages of maturity, there isn’t
    a one-size-fits-all requirement for test automation and code coverage metrics
    at ChainSafe. During the period in which a product is undergoing rapid iteration
    and proof-of-concept, there is usually not much investment in test automation.
    Teams are more likely to wait until the architecture model has been stabilized
    before starting to work on adding test automation and enabling CI jobs on pull
    requests in GitHub. This usually happens while new functionality is being added
    to the product under test.


    In terms of programming languages and testing frameworks, ChainSafe teams are
    using the defaults coming from the language when it comes to unit and integration-type
    testing in the same repository which ranges between Go, Rust, and TypeScript.
    The rule of thumb for Andrew is “use the standard testing tools built into the
    language.” This is what he also calls “core-testing.”


    As we go up the testing pyramid into e2e and UAT testing, the tools become a bit
    more standardized with a clear preference to use Cypress for anything that touches
    a user interface. Using Cypress however hits limitations when you have to interact
    with browser extensions that sign and submit transactions to the underlying blockchain
    – it isn’t directly supported, although there are workarounds and third-party
    plugins; see [`https://github.com/cypress-io/cypress/issues/16703`](https://github.com/cypress-io/cypress/issues/16703)
    and [`https://github.com/cypress-io/cypress/issues/14808`](https://github.com/cypress-io/cypress/issues/14808).
    Hacking Cypress to speak to a browser extension is possible; however, ChainSafe
    prefers not to add that complexity into their testing tools as they lose the ability
    for introspection when sending commands from Cypress to the extension and the
    ability to listen to blockchain events which may not be reported/observable through
    the DOM or rather may not be observable through the extension itself.


    For the situation in which the subject under test is a distributed application,
    but not the wallet extension itself, Andrew’s primary goal is to guarantee the
    functionality of the dApp under test that’s why he prefers to remove the wallet
    from the picture entirely. Essentially creating a false, programmatically controlled
    wallet, inside the test suite itself by stubbing out the `window.ethereum` object,
    for example, mocking the EVM side. The assumption is that the extension works
    as expected, and it doesn’t need to be tested explicitly. In practice browser
    extensions are still subjected to testing, at the very least via a manual smoke
    test, because you still need to know that the distributed application and the
    extension work well together and there are no obvious issues, or document them
    if there are.


    This approach didn’t work well for *Multix* because wallets work slightly differently
    for Polkadot than for Ethereum-based chains. Also because for a multisig wallet,
    Andrew discovered that they need to workaround more scenarios. The solution here
    is a programmable wallet library that connects your test framework to the Polkadot
    API. This is the previously mentioned *cypress-polkadot-wallet* plugin which can
    be found at [`https://github.com/chainsafe/cypress-polkadot-wallet`](https://github.com/chainsafe/cypress-polkadot-wallet)
    .


    On the other hand, if you don’t have the resources to create your own testing
    tools and libraries and/or the ones by ChainSafe don’t fit your use case, you
    may go ahead with Playwright for UI test automation. I have seen a working test
    suite exercising several browser extensions, using the Chrome browser, which can
    sign and submit transactions. May not be very elegant but is a relatively easy
    way to get started.


    Other tools used by ChainSafe:


    *   Chopsticks, [`https://github.com/AcalaNetwork/chopsticks`](https://github.com/AcalaNetwork/chopsticks),
    is a forking tool for Substrate-based networks similar to our own creditcoin-fork.


    *   Dappeteer, [`https://github.com/ChainSafe/dappeteer`](https://github.com/ChainSafe/dappeteer),
    now archived, is a library to facilitate end-to-end testing for dApps using Puppeteer
    + MetaMask. This was created originally by ChainSafe for signing dapps under test
    with a real metamask extension but later utilized further for testing their snaps
    development work within MetaMask.


    For smart contracts, testing activities revolve around logic verification, vulnerabilities
    scanning, and security audits, including from external third-party providers.


    ## Testing Smart Contracts with Sebastian Viquez


    During my journey of testing Creditcoin, I have worked predominantly on testing
    at the protocol layer itself and almost not at the layer that sits on top of it
    – that is a blockchain application implemented as a smart contract. I even mentioned
    in the beginning of this book that practical applications of smart contracts are
    outside of the scope of this book.


    Well, well, well. Given that Creditcoin has now evolved into a general purpose
    blockchain which supports smart contracts, it is only fitting that we actually
    get to hear a different point of view from someone with more experience in this
    area.


    I talked to Sebastian Viquez, a fellow QA lead and an early Bitcoin adopter from
    Costa Rica. What follows is a summary of his experience.


    Note


    A smart contract is a computing program that is recorded onto the blockchain itself!
    It can store data on-chain, execute other smart contract programs, and emit events.
    Users interact with smart contracts by sending transactions to the address on
    which the smart contract is deployed. From a user point of view, these interactions
    are performed via a wallet application such as MetaMask.'
  trans: "\n# 关于测试自动化和工具\n\n鉴于产品及其成熟度阶段的多样性，ChainSafe 对测试自动化和代码覆盖率指标没有统一的标准。在产品进行快速迭代和概念验证期间，通常不会在测试自动化上投入太多。团队更倾向于等到架构模型稳定后，才开始着手增加测试自动化，并在\
    \ GitHub 的拉取请求上启用 CI 任务。这通常发生在向被测产品添加新功能的过程中。\n\n在编程语言和测试框架方面，ChainSafe 团队在同一仓库中进行单元测试和集成测试时，会使用语言自带的默认工具，这些语言包括\
    \ Go、Rust 和 TypeScript。Andrew 的原则是“使用语言内置的标准测试工具”，他称之为“核心测试”。\n\n随着测试金字塔上升到端到端测试和用户验收测试，工具变得更标准化，明显倾向于使用\
    \ Cypress 来测试任何涉及用户界面的部分。然而，当需要与签名并向底层区块链提交交易的浏览器扩展进行交互时，使用 Cypress 会遇到限制——它不直接支持，尽管有变通方法和第三方插件；参见\
    \ [`https://github.com/cypress-io/cypress/issues/16703`](https://github.com/cypress-io/cypress/issues/16703)\
    \ 和 [`https://github.com/cypress-io/cypress/issues/14808`](https://github.com/cypress-io/cypress/issues/14808)。黑客手段可以使\
    \ Cypress 与浏览器扩展通信是可行的；但 ChainSafe 更倾向于不将这种复杂性引入其测试工具，因为从 Cypress 向扩展发送命令时会失去内省能力，也无法监听那些可能不会通过\
    \ DOM 报告或观察到的区块链事件，或者更确切地说，无法通过扩展本身观察到。\n\n对于被测对象是分布式应用程序但并非钱包扩展本身的情况，Andrew 的主要目标是保证被测\
    \ dApp 的功能，因此他更倾向于完全将钱包排除在外。本质上，是通过在测试套件内部伪造一个程序可控的钱包，例如，通过模拟 `window.ethereum`\
    \ 对象来伪造 EVM 端。假设扩展按预期工作，则无需显式测试。实际上，浏览器扩展仍然需要测试，至少通过手动冒烟测试，因为仍需了解分布式应用程序和扩展是否能良好协作，没有明显问题，或者如果有问题则需要记录。\n\
    \n这种方法对 *Multix* 效果不佳，因为 Polkadot 链上的钱包与基于以太坊的链上的钱包工作方式略有不同。另外，对于多签钱包，Andrew 发现他们需要应对更多场景。解决方案是提供一个可编程的钱包库，将测试框架连接到\
    \ Polkadot API。这就是之前提到的 `cypress-polkadot-wallet` 插件，可以在 [`https://github.com/chainsafe/cypress-polkadot-wallet`](https://github.com/chainsafe/cypress-polkadot-wallet)\
    \ 找到。\n\n另一方面，如果你没有资源创建自己的测试工具和库，或者 ChainSafe 的工具不适用于你的用例，你可以选择使用 Playwright 进行\
    \ UI 测试自动化。我见过一个有效的测试套件，使用 Chrome 浏览器操作了多个浏览器扩展，这些扩展可以签名和提交交易。这可能不够优雅，但却是相对容易上手的方式。\n\
    \nChainSafe 使用的其他工具：\n- Chopsticks，[`https://github.com/AcalaNetwork/chopsticks`](https://github.com/AcalaNetwork/chopsticks)，是一个用于\
    \ Substrate 网络的分叉工具，类似于我们自己的 creditcoin-fork。\n- Dappeteer，[`https://github.com/ChainSafe/dappeteer`](https://github.com/ChainSafe/dappeteer)，现已归档，是一个使用\
    \ Puppeteer + MetaMask 促进 dApp 端到端测试的库。它最初由 ChainSafe 创建，用于使用真实的 MetaMask 扩展对被测试的\
    \ dApp 进行签名，但后来被进一步用于测试 MetaMask 中的 snaps 开发工作。\n\n对于智能合约，测试活动围绕逻辑验证、漏洞扫描和安全审计展开，包括来自外部第三方提供商的审计。\n\
    \n# 与 Sebastian Viquez 一起测试智能合约\n\n在我测试 Creditcoin 的过程中，我主要专注于协议层本身的测试，几乎不涉及构建在它之上的那一层——即作为智能合约实现的区块链应用。我甚至在这本书的开头提到，智能合约的实际应用不在本书的讨论范围之内。\n\
    \n不过，鉴于 Creditcoin 现已发展成一个支持智能合约的通用区块链，我们确实有必要听听在这方面更有经验的人的不同观点。\n\n我与 Sebastian\
    \ Viquez 进行了交谈，他是一位来自哥斯达黎加的 QA 负责人，也是比特币的早期采用者。以下是他的经验总结。\n\n> **注意**  \n> 智能合约是记录在区块链本身的计算机程序！它可以在链上存储数据、执行其他智能合约程序并发出事件。用户通过向智能合约部署的地址发送交易来与之交互。从用户的角度来看，这些交互是通过钱包应用程序（例如\
    \ `MetaMask`）执行的。\n"
- fmt: '### Product Under Test


    For the purposes of this book, we are going to refer to the application under
    test with a madeup name: *The NFT Marketplace*. Note that the name and description
    is made up; however, the core product functionality isn’t.


    **Tip**


    **Non-fungible tokens** or **NFTs** are unique digital assets, recorded onto a
    blockchain, that come with cryptographically verifiable ownership. The metadata
    of NFTs makes them unique, which means no two NFTs can ever be the same. This
    metadata can be linked to digital files, for example. You can think about an **NFT**
    as an identifier or a receipt which can be used to certify proof of ownership
    and authenticity. The term *non-fungible* means that it is unique and cannot be
    replaced with something else; in other words, each token is very specific. On
    the other end are regular cryptocurrency tokens which are fungible, that is, they
    are similar to one another and can be easily exchanged.


    NFTs are created via a process called minting which also involves interacting
    with a smart contract. The main objective of minting an NFT is to get your digital
    content onto the blockchain while proving ownership of your digital art or item.
    Depending on the actual blockchain, the digital art which the NFT points to may
    use on-chain or off-chain storage!


    Smart contracts implementing NFTs follow standards which are already established
    in the blockchain ecosystem, for example, `ERC-721` and `ERC-1155`. In contrast,
    popular crypto tokens follow another standard, for example, `ERC-20`. More about
    these standards can be found at [`https://vegavid.com/blog/erc20-vs-erc721-vs-erc1155/#`](https://vegavid.com/blog/erc20-vs-erc721-vs-erc1155/).


    Digital content can be endlessly copied, and there is no way to tell one file
    apart from another, that is, there is no distinction between an original and a
    copy. Using an NFT’s unique identifier helps distinguish one NFT from another
    – that is, distinguish one digital file from another, even if their contents are
    the same. This in turn opens up more possibilities for creators in the digital
    world looking to profit from their work.


    *The NFT Marketplace* is an application which allows its users to transact with
    NFT assets representing images based on their subscription level. Users can view,
    buy, sell, or auction different digital assets. They can also gain value points
    and monitor how their assets are increasing in value based on interactions from
    other users, for example, how many likes their images have.


    *The NFT Marketplace* application is comprised of a traditional Web 2.0 front-end,
    a minting process, and a collection of several smart contracts which:


    - Manage user accounts where multiple roles are defined: *regular user, admin,
    artist*. Each role permits a different set of functionalities.

    - The NFTs minting process which involves creating a digital item or file, designing
    the artwork to accompany the item, establishing a text file with code, uploading
    the file to an NFT smart contract, and publishing it on the NFT marketplace.

    - Handle asset transactions, for example, transfers to other users. In the minting
    process, smart contracts are used to assign ownership and handle the transfer
    of the NFT while proving the item’s authenticity. When a piece of art is minted
    as an NFT, it is assigned a unique identifier directly linked to a single blockchain
    address. Each digital art has an owner, and the ownership details are publicly
    available on the blockchain and can be verified. Even if a creator mints 1,000
    NFTs of the same item, each one of them can easily be distinguished from the rest
    by its unique identifier.

    - Implement the marketplace and related application functionality. Imagine a website
    where you can upload an image and convert this image into a digital asset to include
    it in your profile account as an artist would when showing all of their paintings
    to sell in a showroom. It''s the same concept, but adding other factors, such
    as social media likes and site views, the more people like it, the more value
    acquired, the more money an artist could make.


    The application is deployed on the Polygon blockchain network and its main objectives
    are:


    1. To encourage users to be part of the subscription based on the assets which
    they can mint, acquire, sell or transfer.

    2. To increase value of the available assets in the marketplace using subscriptions
    and minting fees.


    Users are able to exchange their NFTs by using a wallet application, which in
    this example is MetaMask.'
