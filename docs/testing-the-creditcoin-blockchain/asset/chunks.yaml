    and storage items which define what the blockchain does are defined inside the
    runtime. The client part is responsible for standardized tasks such as peer-to-peer
    networking, exposing RPCs, consensus, producing blocks, and so on. Unlike the
    previous version in Creditcoin 2.0, everything is encapsulated into a single running
    container. The node itself is a multi-threaded application which spawns the various
    components of the blockchain and executes them in parallel – around 50 or so threads
    as shown in Listing [5-1](#629923_1_En_5_Chapter.xhtml#PC1).


    ```

    creditcoin3-nod─┬─11*[{creditcoin3-nod}]

    ├─{futures-timer}

    ├─{log-autoflush}

    ├─10*[{offchain-worker}]

    ├─{rocksdb:high}

    ├─5*[{rocksdb:low}]

    └─20*[{tokio-runtime-w}]

    Listing 5-1

    How a Creditcoin-Node Process Looks from the Operating System Point of View

    ```


    The Substrate framework utilizes a flexible modular architecture, illustrated
    in Figure [5-1](#629923_1_En_5_Chapter.xhtml#Fig1), and you may extend and/or
    replace its components relatively easily allowing you to add custom functionality
    only where needed.


    ![](images/629923_1_En_5_Chapter/629923_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    General architecture of the Substrate framework


    Creditcoin 2.0 is implemented in the Rust programming language and shipped as
    a Docker image, although for testing purposes, most often we compile the code
    and run it as a stand-alone binary directly.


    Source code: [`https://github.com/gluwa/creditcoin`](https://github.com/gluwa/creditcoin)


    ### Extrinsics Pallets


    The functions which define what the business logic of the blockchain is are called
    **extrinsics**. This is what other frameworks call transactions. Inside Creditcoin
    2.0, these functions are organized in modules called **pallets**. Creditcoin 2.0
    uses some off-the-shelf modules, for example, *sudo* pallet, *system* pallet,
    *balances*, etc. It also uses custom pallets which are related to the main business
    logic. See the `pallets/`directory inside the source code.


    Extrinsic functions are automatically exported via RPC and can be triggered externally
    using client libraries. This is what the integration test suite and client applications
    are doing. Extrinsic functions can also be invoked directly when writing unit
    tests.


    #### Creditcoin Pallet


    Defines how a loan cycle is recorded onto the blockchain which is what the Creditcoin
    whitepaper describes in detail. Provides RPC calls that match the existing Creditcoin
    1.x family. The RPC interface and function signature is a logical match but doesn’t
    match the v1.x transactions family verbatim!


    This is the main entry point to the blockchain used by integrators and external
    applications. This is also where the bulk of the testing activities are focused
    – predominantly functional type testing.'
  trans: '

    # 5. Creditcoin 2.0


    `Creditcoin 2.0` 是一个使用 `Substrate` 框架实现的**工作量证明**区块链。它的交易模型和业务逻辑与之前的 1.8 版本相同，但属于独立开发。


    `Creditcoin 2.0` 的主要目标是实现与旧版 1.x 系列的协议兼容性。这里的兼容性是指，`Creditcoin` 白皮书中列出的所有可能交易，在
    2.0 中都得以实现，且交易名称（允许大小写差异）和输入参数与旧版相同或非常相似。我的意思是实现一种逻辑上的兼容性，仅需对白皮书和客户端应用程序进行最小程度的必要修改。1.8
    和 2.0 版本之间不存在二进制兼容性，并且它们也从未设计为可以协同工作。


    `Creditcoin 2.0` 主网是独立于 `Creditcoin 1.x` 主网部署的，两者之间没有任何连接。由于底层数据结构和技术栈完全不同，两种实现之间的互操作性从来都不是必需要求，因此也无需进行互操作性测试。


    在创建 2.0 版本时，1.8 版本主网上大概已经产生了一百万个区块。当时被认为重要且需要迁移的唯一数据是所有现存账户的非零 CTC 余额，这些余额已被包含在
    2.0 的创世区块中！换句话说，如果一位名叫傑基的用户曾参与 `Creditcoin 1.x` 并积累了大于零的余额，那么她应该能够立即使用相同账户（相同的公钥和私钥）开始使用
    `Creditcoin 2.0`，并且看到她的余额与之前完全一致。这种切换是单向的。唯一需要验证的数据是新区块链与旧区块链之间的账户/余额映射关系，这通过查询所有数据并进行比较相对容易实现。不迁移其他数据（如现有的贷款流程交易）是一项业务决策，幸运的是，这也消除了在迁移过程中进行更全面的数据一致性测试的需要。


    为了便于讨论，假设保留链历史记录是一个要求，但仍然不需要将两个不同的技术栈连接到彼此。在这种情况下，我认为某种重放程序会是一个很好的实用解决方案：


    -   从 1.x 查询区块，并遍历结果以检查每笔交易。这在技术上是可行的，而且我们已知如何实现，因为所有必要的技术步骤都已在之前的 `creditcoin-legacy-tests`
    测试套件中使用过。实际上，Sawtooth REST API 很好地暴露了这些信息。


    -   然后，使用相同的输入参数将每笔 1.x 交易在 2.0 链上重放，从而重建历史记录。交易哈希和区块哈希将会不同；区块编号也不会保持一致。为了透明起见，也许可以在每个数据结构中包含一个
    `old_hash` 字段，用于引用 1.x 的交易。


    -   测试时，查询两条链并“确保状态匹配”，同时要考虑两者在数据表示上的差异！在实际实现中，这会更复杂一些，但应该是可行的。


    同一个重放程序既可以用于测试和迁移准备，也可以用于实际的生产数据迁移。正如我们将在本书后面看到的那样，保留链历史记录成为了 2.3 版本的一个要求！


    对于需要保留先前技术栈的二进制历史记录的情况——意味着能够通过其现有哈希查询区块和交易，并拥有一个横跨两条不同链的有效贷款历史——这超出了本书的范围，因为我还没有测试过类似的情况。我能想到实现这一目标的最简单方法是同时运行一个
    `Substrate` 节点和一个 `Sawtooth` 节点，外加一个额外的 RPC 路由层，该层将根据区块号连接到相应的链。在这个假设设置的一个版本中，您必须处理
    Hyperledger Sawtooth 和 Substrate 之间 RPC 调用的差异，并/或为此提供一个兼容层。很可能您还需要在新链上生成虚拟区块，以弥补区块高度的差异。


    另一种可能性是将 v1.8 的原始区块数据包装到一个 `Substrate` 区块中，并在 2.0 网络启动过程中将这些区块注入，同时作为 `Substrate`
    实现的一部分提供某种兼容层。哪种方法更容易或更合适，我无法断言。


    ## Creditcoin 2.0 的组件


    基于 `Substrate` 框架的区块链实现是一个整体式代码库，它编译成一个名为节点的可执行二进制文件。节点有两个主要部分，称为客户端（client）和运行时（runtime）。定义区块链行为的应用逻辑、交易和存储项都在运行时内定义。客户端部分负责标准化任务，例如点对点网络、暴露
    RPC、共识、生成区块等。与之前的版本不同，在 `Creditcoin 2.0` 中，所有内容都封装在一个单一运行的容器中。节点本身是一个多线程应用程序，它生成区块链的各个组件并并行执行它们——大约有
    50 个线程，如清单 5-1 所示。


    ```

    creditcoin3-nod─┬─11*[{creditcoin3-nod}]

    ├─{futures-timer}

    ├─{log-autoflush}

    ├─10*[{offchain-worker}]

    ├─{rocksdb:high}

    ├─5*[{rocksdb:low}]

    └─20*[{tokio-runtime-w}]

    ```


    *清单 5-1* 从操作系统角度看到的 Creditcoin 节点进程


    `Substrate` 框架采用灵活的模块化架构，如图 5-1 所示，您可以相对轻松地扩展和/或替换其组件，从而仅在需要的地方添加自定义功能。


    ![](img/629923_1_En_5_Fig1_HTML.jpg)


    *图 5-1* Substrate 框架的通用架构


    `Creditcoin 2.0` 使用 Rust 编程语言实现，并以 Docker 镜像形式分发，不过为了测试目的，我们通常编译代码并将其作为独立的二进制文件直接运行。


    源代码： [`https://github.com/gluwa/creditcoin`](https://github.com/gluwa/creditcoin)


    ### 外部函数（Extrinsics）和功能模块（Pallets）


    定义区块链业务逻辑的函数称为 `extrinsics`（外部函数）。这相当于其他框架中的交易。在 `Creditcoin 2.0` 内部，这些函数被组织成名为
    `pallets`（功能模块）的模块。`Creditcoin 2.0` 使用了一些现成的模块，例如 `sudo` 模块、`system` 模块、`balances`
    模块等。它还使用了与主要业务逻辑相关的自定义模块。请参阅源代码中的 `pallets/` 目录。


    外部函数会通过 RPC 自动导出，并且可以使用客户端库在外部触发。集成测试套件和客户端应用程序正是这样做的。在编写单元测试时，也可以直接调用外部函数。


    #### Creditcoin 功能模块


    定义了如何将贷款周期记录到区块链上，这正是 `Creditcoin` 白皮书详细描述的内容。它提供了与现有 `Creditcoin 1.x` 系列匹配的 RPC
    调用。RPC 接口和函数签名在逻辑上是匹配的，但与 v1.x 交易系列并不完全一致！


    这是供集成商和外部应用程序使用的区块链主要入口点。这也是大部分测试活动的重点——主要是功能类型测试。

    '
- fmt: '#### Difficulty Pallet


    难度调整是PoW共识算法的重要组成部分。所谓网络密码难题的难度级别，旨在确保出块时间保持一致、防止中心化与攻击，并维持挖矿的盈利性。该`pallet`负责在每个区块上计算和调整难度。它不对外使用，也不暴露外部交易（`extrinsics`）；但它暴露了一些存储项，可被外部查询。


    #### Off-Chain Task Scheduler Pallet


    负责执行需要与外部世界交互的任务，例如验证另一个区块链（如Ethereum）上的转账。请记住，实际的贷款转账和还款发生在`Creditcoin`链之外。


    此类交互具有不可预测性，并可能因各种原因失败。因此，它们无法在链上计算，需要一个单独的组件。链下任务调度器本质上是一个待处理任务的队列。


    该`pallet`对链上存储项具有只读访问权限，以促进组件间通信。然而，它无法直接写入区块链，需要调用外部交易（`extrinsics`）来记录每个正在处理的任务的成功或失败。此类外部交易调用与任何其他常规交易的处理方式相同。


    #### Rewards Pallet


    在`Creditcoin 2.0`中，区块挖矿者因在区块链上运行节点而获得`CTC`代币奖励。基础奖励为每区块`28 CTC`代币，这些代币会在区块最终确认时存入链上。回忆一下，在PoW区块链中，多个节点竞争追加区块到链上的机会。成功者将获得奖励。启动`Creditcoin
    2.0`节点时，可以选择额外的参数`--mining-key <SS58Address>`，用于指定接收奖励的账户地址。该`pallet`负责计算实际奖励并将其存入相应的目标账户。


    ### Transaction Fees


    有一个公式定义了每笔交易需要支付的费用。费用可以是固定的，也可以是动态的。在`Creditcoin 2.0`中，交易费用是动态的，其主要组成部分是所谓的“权重”（`weight`）；请参见下一节。


    业务需求设定了最低`0.01 CTC`的费用。实际值和费用公式会根据链的使用情况而波动，并且在链不活跃期间（尤其是在隔离环境中测试全新链时）可能降至所需最小值以下。


    其原理是，我们将区块填充率目标设为`25%`。因此，当区块填充率低于`25%`时，我们会降低费用；当区块填充率高于`25%`时，则会提高费用。这源于通证经济学研究^([⁶](#fn6))，并与波卡区块链所使用的机制一致。费用在`24`小时内最高可变化`30%`。


    更多信息和技术细节，请参见[`https://wiki.polkadot.network/docs/learn-transaction-fees`](https://wiki.polkadot.network/docs/learn-transaction-fees)和[`https://github.com/paritytech/substrate/issues/2430`](https://github.com/paritytech/substrate/issues/2430)。


    ### Weights and Benchmarks


    权重（`Weights`）代表了在区块链上执行特定交易所需的计算负担，是决定交易费用的主要组成部分。在填充交易时，每个区块能容纳的最大权重是有上限的。在基于Substrate的链（如`Creditcoin`）中，权重通常表示为每个外部函数（`extrinsic`）在链上执行的读取和写入次数。权重也可能因硬件配置而异。


    基准测试（`Benchmarks`）提供了一种统一的方式来表达运行时中不同函数在不同条件下执行所需的时间。基准测试由开发人员编写，然后可用于自动生成更精确的外部调用（`extrinsic
    calls`）权重！


    通常，这些基准测试会在被称为“参考硬件”（`reference hardware`）上执行，自动生成的权重会被包含在源代码中。此操作会定期重复进行，例如在准备发布新版本时。


    参考硬件取决于你根据区块链的功能和客户/参与者的目标所做的决定。对`Creditcoin`而言，这是在`Azure`上配置的一个内存优化的`Standard_E4as_v4`虚拟机实例。Substrate框架的创建者波卡（`Polkadot`）推荐使用更强大的硬件：Google
    Cloud Platform上的`n2-standard-8`虚拟机实例和`Amazon Web Services EC2`上的`c6i.4xlarge`。


    ### Runtime


    在`runtime/src/`目录中，所有组件被组合在一起，以定义`Creditcoin`节点的构成。这主要是些“管道”代码，用于为实现中所涉及的所有`pallet`定义具体的数据类型，例如：


    ```

    pub type Moment = u64;

    /// Some way of identifying an account on the chain. We intentionally make it
    equivalent

    /// to the public key of our transaction signing scheme.

    pub type AccountId = ::AccountId;

    /// Balance of an account.

    pub type Balance = u128;

    ```


    `Runtime`本身被编译为WebAssembly（WASM），并可以作为发布流程的一部分发布到链上。


    当本地编译的运行时版本与链上运行时版本匹配时，Substrate节点将使用其本地运行时，因为速度更快。在所有其他情况下，当链上和本地运行时的版本号不匹配时，节点将使用从链上下载的WASM运行时。这就是为什么为基于Substrate的区块链实现正确更新版本号至关重要！


    这使得发布和升级过程更加容易，因为矿工无需同时升级他们的容器！需要指出的是，不同本地和WASM版本之间的兼容性/互操作性属于Substrate框架本身的范畴，并未作为`Creditcoin`的一部分进行详细测试。由于团队对版本号更新采取了预防性措施，我不记得这曾引发过问题。


    ### Storage Migrations


    对于存储在链上的实际信息，一个很好的类比是典型的Web 2.0应用程序的数据库。类似于`Creditcoin 2.0`中的ORM模型，我们有存储项（`storage
    items`），它们是定义了写入链上内容的数据类型，例如账户与余额之间的映射，或出借人与借款人之间的映射！在区块链上，所有这些都以二进制格式`SCALE`编码。


    随着业务逻辑和源代码的变更，我们需要执行一些操作，将二进制数据从旧格式转换为所需的当前格式。这就是迁移组件（`migrations`）的职责，其行为类似于传统ORM框架中的数据库迁移。


    迁移是通过在WASM运行时升级时触发的内部钩子来执行的，并遵循内部编号方案。每个单独的`pallet`可以有独立于其他`pallet`的迁移。在`Creditcoin
    2.0`中，除了系统`pallet`之外，只有`pallets/creditcoin`包含自定义迁移。


    ### Custom RPCs


    此组件允许你定义和暴露额外的RPC方法，以供外部应用程序使用。这些方法可以是你决定的任何内容。在`Creditcoin 2.0`中，它被用于暴露一些与挖矿相关的统计数据以及一些用于监控运行中的矿工节点群的链内部信息。


    在Substrate框架中，RPC方法通过HTTP和WebSockets协议以JSON-RPC的形式暴露。'
  raw: '#### Difficulty Pallet


    Difficulty adjustment is an essential component of the PoW consensus algorithm.
    The so-called difficulty level of the network''s cryptographic puzzle ensures
    that block time stays consistent, prevents centralization and attacks, and maintains
    the profitability of mining. This pallet is responsible for calculating and adjusting
    the difficulty on each block. Not used externally and does not expose extrinsics;
    however, it exposes a few storage items which can be queried externally.


    #### Off-Chain Task Scheduler Pallet


    Responsible for executing tasks which need interaction with the outside world,
    such as validating transfers on another blockchain like Ethereum. Remember that
    actual loan transfers and repayments happen outside of Creditcoin.


    Such interactions are unpredictable and may fail due to variety of reasons. That’s
    why they can’t be computed on-chain and need a separate component. The off-chain
    task scheduler is essentially a queue of pending tasks.


    This pallet has read-only access to on-chain storage items in order to facilitate
    inter-component communication. However, it cannot write to the blockchain directly
    and needs to call extrinsics to record success or failure for each task that is
    being processed. Such extrinsic calls are processed in the same way any other
    regular transaction is.


    #### Rewards Pallet


    In Creditcoin 2.0, block miners are rewarded CTC tokens for running nodes on the
    blockchain. The base reward is 28 CTC tokens per block, which are deposited on-chain
    when the block is finalized. Recall that in a PoW blockchain, multiple nodes compete
    for the opportunity to append a block to the blockchain. Whoever manages to do
    so receives the reward. Whenever starting a Creditcoin 2.0 node, there is the
    extra option `--mining-key <SS58Address>` which specifies the account address
    which will be receiving the reward. This pallet is responsible for calculating
    the actual rewards and depositing them to their respective destination accounts.


    ### Transaction Fees


    There is a formula which defines how much fees will be paid for each transaction.
    Fees can be flat or they can be dynamic. In Creditcoin 2.0, transaction fees are
    dynamic, with the main component being what’s known as weight; see next section.


    A business requirement of min 0.01 CTC was established. The actual value and fee
    formula fluctuates based on chain usage and could drop below the required minimum
    during periods of inactivity on the chain, especially true when testing on a brand
    new chain in isolation.


    How it works is that we target a block fullness of 25%, so we adjust fees downward
    if blocks are less than 25% full, and adjust fees upward if blocks are >25% full.
    It''s derived from tokenomics research,^([⁶](#fn6)) and it matches what the Polkadot
    blockchain uses. Fees can change up to 30% across a 24-hour period.


    For more information and technical details, see [`https://wiki.polkadot.network/docs/learn-transaction-fees`](https://wiki.polkadot.network/docs/learn-transaction-fees)
    and [`https://github.com/paritytech/substrate/issues/2430`](https://github.com/paritytech/substrate/issues/2430).


    ### Weights and Benchmarks


    Weights represent the computational burden required to execute a specific transaction
    on the blockchain and are the main component in determining transaction fees.
    When filling blocks with transactions, there is a maximum weight that can fit
    into a block. Weights in a Substrate-based chain, such as Creditcoin, are generally
    denoted as the number of reads and writes on the chain for each extrinsic function.
    Weights can also vary with hardware configuration.


    Benchmarks provide a consistent way to express the amount of time it takes to
    execute different functions in the runtime and under different conditions. Benchmarks
    are written by a human developer and then can be used to automatically generate
    more accurate weights for extrinsic calls!


    Usually these benchmarks will be executed on what is designated “reference hardware,”
    and automatically generated weights will be included in the source code. This
    operation will be repeated on a regular basis, for example, when preparing for
    a new release.


    Reference hardware is whatever you decide given the functional and customer/participants
    target of the blockchain. For Creditcoin this is a memory optimized `Standard_E4as_v4`
    virtual machine instance in Azure. Polkadot, the creators of the Substrate framework,
    recommend more powerful hardware: `n2-standard-8` VM instance on Google Cloud
    Platform and `c6i.4xlarge` on Amazon Web Services EC2.


    ### Runtime


    Inside the `runtime/src/` directory is where all of the components are put together
    to define what constitutes the Creditcoin node. It’s mostly plumbing code which
    defines concrete data types for all of the pallets involved in the implementation,
    for example:


    ```

    pub type Moment = u64;

    /// Some way of identifying an account on the chain. We intentionally make it
    equivalent

    /// to the public key of our transaction signing scheme.

    pub type AccountId = ::AccountId;

    /// Balance of an account.

    pub type Balance = u128;

    ```


    The runtime itself is compiled into WebAssembly (WASM) and can be published on-chain
    as part of your release process.


    When both the natively compiled runtime version and the on-chain runtime version
    match, a Substrate node will use its native runtime because it is faster. In all
    other cases, when on-chain and native runtime numbers don’t match, the node will
    use the WASM runtime downloaded from the chain. This is why updating version numbers
    for a Substrate-based blockchain implementation correctly is important!


    This makes the release and upgrade process much easier because miners don’t need
    to upgrade their containers at the same time! It’s important to point out that
    compatibility/interoperability between different native and WASM versions falls
    within the scope of the Substrate framework itself and has not been tested in
    detail as part of Creditcoin. I don’t recall this ever being a problem because
    of the preemptive approach taken to version number updates by the team.


    ### Storage Migrations


    A good analogy for the actual information stored on-chain is a database for a
    typical web 2.0 application. Similar to ORM models in Creditcoin 2.0, we have
    storage items which are data types defining what gets written on-chain, for example,
    a map between accounts and balances or a map between lenders and borrowers! On
    the blockchain, this is all in binary format, SCALE, encoded in our implementation.


    As business logic and source code changes, we need to perform operations that
    would transform the binary data from its older format into the desired current
    format. This is what the migrations component is responsible for, and it behaves
    similar to database migrations in traditional ORM frameworks.


    Migrations are triggered via internal hooks upon upgrade of the WASM runtime and
    follow an internal numbering scheme. Each individual pallet can have its own migrations,
    independent of other pallets. In Creditcoin 2.0 outside of the system pallets,
    only `pallets/creditcoin` contains custom migrations.


    ### Custom RPCs


    This component allows you to define and expose additional RPC methods to be used
    by external applications. These methods can be whatever you decide. In Creditcoin
    2.0, it is used to expose some mining-related statistics and a bit of the chain
    internal information used for monitoring a fleet of running miner nodes.


    In the Substrate framework, RPC methods are exposed as JSON-RPC via the HTTP and
    WebSockets protocols simultaneously.'
  trans: '

    #### 难度调整模块（Difficulty Pallet）


    难度调整是 PoW 共识算法的重要组成部分。所谓网络密码难题的难度级别，旨在确保出块时间保持一致、防止中心化与攻击，并维持挖矿的盈利性。该`pallet`负责在每个区块上计算和调整难度。它不对外使用，也不暴露外部交易（`extrinsics`）；但它暴露了一些存储项，可被外部查询。


    #### 链下任务调度器模块（Off-Chain Task Scheduler Pallet）


    负责执行需要与外部世界交互的任务，例如验证另一个区块链（如 Ethereum）上的转账。请记住，实际的贷款转账和还款发生在`Creditcoin`链之外。


    此类交互具有不可预测性，并可能因各种原因失败。因此，它们无法在链上计算，需要一个单独的组件。链下任务调度器本质上是一个待处理任务的队列。


    该`pallet`对链上存储项具有只读访问权限，以促进组件间通信。然而，它无法直接写入区块链，需要调用外部交易（`extrinsics`）来记录每个正在处理的任务的成功或失败。此类外部交易调用与任何其他常规交易的处理方式相同。


    #### 奖励模块（Rewards Pallet）


    在`Creditcoin 2.0`中，区块挖矿者因在区块链上运行节点而获得`CTC`代币奖励。基础奖励为每区块`28 CTC`代币，这些代币会在区块最终确认时存入链上。回忆一下，在
    PoW 区块链中，多个节点竞争追加区块到链上的机会。成功者将获得奖励。启动`Creditcoin 2.0`节点时，可以选择额外的参数`--mining-key
    <SS58Address>`，用于指定接收奖励的账户地址。该`pallet`负责计算实际奖励并将其存入相应的目标账户。


    ### 交易费用


    有一个公式定义了每笔交易需要支付的费用。费用可以是固定的，也可以是动态的。在`Creditcoin 2.0`中，交易费用是动态的，其主要组成部分是所谓的“权重”（`weight`）；请参见下一节。


    业务需求设定了最低`0.01 CTC`的费用。实际值和费用公式会根据链的使用情况而波动，并且在链不活跃期间（尤其是在隔离环境中测试全新链时）可能降至所需最小值以下。


    其原理是，我们将区块填充率目标设为`25%`。因此，当区块填充率低于`25%`时，我们会降低费用；当区块填充率高于`25%`时，则会提高费用。这源于通证经济学研究^(⁶)，并与波卡区块链所使用的机制一致。费用在`24`小时内最高可变化`30%`。


    更多信息和技术细节，请参见[`https://wiki.polkadot.network/docs/learn-transaction-fees`](https://wiki.polkadot.network/docs/learn-transaction-fees)和[`https://github.com/paritytech/substrate/issues/2430`](https://github.com/paritytech/substrate/issues/2430)。


    ### 权重与基准测试


    权重（`Weights`）代表了在区块链上执行特定交易所需的计算负担，是决定交易费用的主要组成部分。在填充交易时，每个区块能容纳的最大权重是有上限的。在基于
    Substrate 的链（如`Creditcoin`）中，权重通常表示为每个外部函数（`extrinsic`）在链上执行的读取和写入次数。权重也可能因硬件配置而异。


    基准测试（`Benchmarks`）提供了一种统一的方式来表达运行时中不同函数在不同条件下执行所需的时间。基准测试由开发人员编写，然后可用于自动生成更精确的外部调用（`extrinsic
    calls`）权重！


    通常，这些基准测试会在被称为“参考硬件”（`reference hardware`）上执行，自动生成的权重会被包含在源代码中。此操作会定期重复进行，例如在准备发布新版本时。


    参考硬件取决于你根据区块链的功能和客户/参与者的目标所做的决定。对`Creditcoin`而言，这是在`Azure`上配置的一个内存优化的`Standard_E4as_v4`虚拟机实例。Substrate
    框架的创建者波卡（`Polkadot`）推荐使用更强大的硬件：Google Cloud Platform 上的`n2-standard-8`虚拟机实例和`Amazon
    Web Services EC2`上的`c6i.4xlarge`。


    ### 运行时（Runtime）


    在`runtime/src/`目录中，所有组件被组合在一起，以定义`Creditcoin`节点的构成。这主要是些“管道”代码，用于为实现中所涉及的所有`pallet`定义具体的数据类型，例如：


    ```

    pub type Moment = u64;

    /// Some way of identifying an account on the chain. We intentionally make it
    equivalent

    /// to the public key of our transaction signing scheme.

    pub type AccountId = ::AccountId;

    /// Balance of an account.

    pub type Balance = u128;

    ```


    `Runtime`本身被编译为 WebAssembly（WASM），并可以作为发布流程的一部分发布到链上。


    当本地编译的运行时版本与链上运行时版本匹配时，Substrate 节点将使用其本地运行时，因为速度更快。在所有其他情况下，当链上和本地运行时的版本号不匹配时，节点将使用从链上下载的
    WASM 运行时。这就是为什么为基于 Substrate 的区块链实现正确更新版本号至关重要！


    这使得发布和升级过程更加容易，因为矿工无需同时升级他们的容器！需要指出的是，不同本地和 WASM 版本之间的兼容性/互操作性属于 Substrate 框架本身的范畴，并未作为`Creditcoin`的一部分进行详细测试。由于团队对版本号更新采取了预防性措施，我不记得这曾引发过问题。


    ### 存储迁移（Storage Migrations）


    对于存储在链上的实际信息，一个很好的类比是典型的 Web 2.0 应用程序的数据库。类似于`Creditcoin 2.0`中的 ORM 模型，我们有存储项（`storage
    items`），它们是定义了写入链上内容的数据类型，例如账户与余额之间的映射，或出借人与借款人之间的映射！在区块链上，所有这些都以二进制格式`SCALE`编码。


    随着业务逻辑和源代码的变更，我们需要执行一些操作，将二进制数据从旧格式转换为所需的当前格式。这就是迁移组件（`migrations`）的职责，其行为类似于传统
    ORM 框架中的数据库迁移。


    迁移是通过在 WASM 运行时升级时触发的内部钩子来执行的，并遵循内部编号方案。每个单独的`pallet`可以有独立于其他`pallet`的迁移。在`Creditcoin
    2.0`中，除了系统`pallet`之外，只有`pallets/creditcoin`包含自定义迁移。


    ### 自定义 RPC（Custom RPCs）


    此组件允许你定义和暴露额外的 RPC 方法，以供外部应用程序使用。这些方法可以是你决定的任何内容。在`Creditcoin 2.0`中，它被用于暴露一些与挖矿相关的统计数据以及一些用于监控运行中的矿工节点群的链内部信息。


    在 Substrate 框架中，RPC 方法通过 HTTP 和 WebSockets 协议以 JSON-RPC 的形式暴露。

