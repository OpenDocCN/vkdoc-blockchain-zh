- fmt: '# Thoughts on Development and Testing


    As with any piece of software, how you build stuff has an effect on how you test
    it.


    For example, when working with Hyperledger Sawtooth, it felt like there were too
    many layers of abstractions, and it was hard for me to wrap my head around all
    of them. The major drawback in terms of testing is that all components live as
    separate repositories/docker containers, and it was difficult to test certain
    functionality in isolation. The obvious choice was to treat everything as one
    large system and test it from the outside.


    In contrast a Substrate-based implementation is more like a monolithic application
    where everything is bundled up together. I found it much easier to get started
    and to be productive. The Substrate framework itself also provides facilities
    for creating a mock runtime in order to test specific components in isolation.
    This was a huge driver behind being able to build an extensive unit test suite
    for Creditcoin.


    I need to point out that when I talk about a “testing framework,” I usually mean
    the actual facilities and libraries provided within a particular programming language.
    Since my background is fairly technical and I tend to work with developers directly,
    there isn’t much of “creating your own testing framework,” and rather there is
    a lot of “just write code, use whatever is already there and get it done” type
    of thing, especially when we talk about unit testing. If you the reader is coming
    from a different background, don’t worry. I think it is just important for you
    to know where I am coming from.


    During the initial phase of review for this book, I got a rather interesting feedback
    from Jeroen Rosink on the topic of using datasets for testing/test automation.
    And I think we differ here quite a lot. Let me elaborate on this.


    In practical terms, I don’t keep test data that I get to feed to test scenarios
    and exercise hundreds of loan transactions in order to find a bug. I am more concerned
    with the fact whether or not incoming data can be recorded onto the blockchain
    without crashing and who can record it, for example, a lender or a borrower. Many
    aspects of input validation are actually handled by the underlying programming
    languages. For example, I don’t need to be explicitly testing that using a negative
    value isn’t allowed when an unsigned integer data type is specified for a given
    parameter – my compilers are taking care of this and a thorough code review here
    would suffice.


    Another fact to take into consideration is that Creditcoin is a platform, which
    started to solve a particular business problem and later evolved into a more generic
    one. On a very high abstraction level, it is just a place where participants in
    the blockchain can record data onto it. This is not to say there aren’t any bugs
    in Creditcoin, most likely there are; however, when you lean toward building a
    generic platform, whether that data is 100% accurate and whether or not your software
    allows the user to shoot themselves in the foot becomes of secondary concern so
    you plan and prioritize accordingly.


    It is also important to note that my practical experience is less of using a test
    suite exercised against a shared environment, where previous state and existing
    data can affect its results and/or affect the usability of prepared test data
    but rather using programming languages to create ephemeral environments on the
    fly and inject data and model whatever preconditions I need as part of the system
    under test in order to assert on specific behavior. That is, the majority of testing
    for Creditcoin happens before anything gets merged and deployed into an existing
    network. By extension this also negates the need for many testing activities after
    a new version of the blockchain is deployed. This has probably saved me from having
    to deal with many practical challenges, but it is certainly something to think
    about depending on how your organization and you personally approach testing.


    ## Summary


    In this chapter, I’ve introduced the blockchain development frameworks I’ve used
    and talked a bit about the differences between them and how that affects testing.


    In the next chapter, I will introduce you to what Creditcoin is and how it works
    which will be the basis for subsequent chapters where I share my testing journey
    with you.


    # Part II: The Creditcoin Blockchain: Aims and Objectives


    # 3. Introducing the Creditcoin Blockchain


    One of the main problems that Creditcoin addresses is the fact that millions,
    and even billions, of people in the developing world do not have access to the
    traditional banking system – that is, they simply do not have bank accounts. Such
    individuals cannot use credit as a financial instrument in order to improve their
    lives because this traditional instrument isn’t accessible to them by virtue of
    them lacking bank accounts. In certain locations, there’s probably also a lack
    of brick-and-mortar infrastructure, for example, bank offices, to enable such
    access.


    Think, for example, of a farmer who is willing to take on debt in order to purchase
    machinery that will save hours of manual labor and therefore increase productivity.
    When you do not have access to infrastructure, this simply isn’t possible which
    is where Creditcoin comes in.'
