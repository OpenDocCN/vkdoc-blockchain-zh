    interested in anyway. I did try copying the upstream test files into the Creditcoin
    code base and modifying imports/call paths; however, I quickly realized that this
    isn’t going to work. There were private functions inside the upstream staking
    pallet which were used as part of existing unit tests, and that meant even more
    modifications to the fork which was not something I wanted to maintain.


    Note that during the Creditcoin 2.3 development effort, there have been new versions
    of the Substrate framework. We were aware of at least one breaking change that
    requires more attention downstream. However, a decision was made not to upgrade
    Substrate during the initial 2.3 development phase in order to minimize the risk
    of failures and the strain on engineering resources. Because of this, it isn’t
    clear how well the existing downstream CI jobs perform when there are major changes
    – at the time of this writing, we hadn’t yet ventured on this path!


    Another important note is that `gluwa/substrate` is following a versioned branch
    from upstream. If we want to upgrade, then we need to branch off the current code
    base, rebase against a newer upstream version branch, and see how that goes. This
    is a manual process which isn’t automated at the time of writing of this book.
    Again more work is necessary to be done here before we can become confident with
    our testing approach and the ability of the downstream test jobs to detect failures!'
  trans: '

    # 测试 Gluwa 的 Substrate 分叉


    由于前面提到的区块历史保留功能，我们选择使用 Substrate 框架的一个分叉。关于质押奖励和惩罚的一个问题促使我更深入地研究他们在上游是如何测试的。我所发现的情况，作为一个毕生从事开源项目开发的人，我并不赞同。


    上游 Substrate 在私有 GitLab 实例中执行其测试。据我所知，他们的一些作业定义使用了也未公开的工具和容器镜像。总的来说，如果你试图维护一个开源框架的下游分叉，这体验简直糟透了。


    本质上，Creditcoin 团队根本无法知道我们所做的任何更改是否破坏了 Substrate，或者任何较新的 Substrate 版本是否与我们自己的更改不兼容——直到所有这些内容被合并到下游分支，然后你尝试在此基础上构建
    Creditcoin 为止。


    ## 注意事项


    Substrate 的新版本对质押子系统进行了重大更改，例如，将他们所谓的“质押账户”和“控制器账户”合并为单一账户，这改变了与质押相关的大多数 API/交易调用的签名！


    在向 GitLab 注册了一个与 Creditcoin 相关的群组后，我花了大约一周时间，试图弄清楚上游的所有 CI 作业，找出它们在哪里出错，注释掉代码或尝试一些快速补丁，并大致探索了其整体状态。这个过程似乎并不容易，我感觉所需的时间会比最初预期的要长得多，因此我需要为分叉仓库实现一种应急测试方法。


    团队决定重用我们自己的私有测试基础设施（按需自托管 GitHub 运行器）并运行 `cargo check` 和 `cargo test`。尽管硬件资源部署在私有环境中，但它们的配置和测试结果是公开可见的。


    我们通过 Rust 编译器和现有的 Substrate 单元测试套件进行了静态检查。请注意，我称之为“单元测试”套件，因为在使用 Rust 内置测试工具时这最常见，但该测试套件本身包含数百个针对多个模块的测试场景，执行需要数小时，因此它可能包含多种类型的测试。这是另一段第三方代码，我们并不掌握所有细节，如果试图完全搞清楚，将会花费过多时间。


    根据我之前的调查，我发现质押奖励和惩罚在自动化测试场景中得到了相当充分的测试，而这正是我们所关心的。我确实尝试过将上游测试文件复制到 Creditcoin
    代码库中，并修改导入/调用路径；然而，我很快意识到这行不通。上游质押模块内部存在一些私有函数，这些函数被用作现有单元测试的一部分，这意味着需要对分叉进行更多修改，而这是我并不想维护的。


    ## 备注


    请注意，在 Creditcoin 2.3 开发期间，Substrate 框架发布了新版本。我们至少知道一个重大变更，需要下游给予更多关注。不过，为了最大程度降低失败风险和工程资源压力，我们决定在最初的
    2.3 开发阶段不升级 Substrate。正因如此，当出现重大变更时，现有下游 CI 作业的表现如何尚不明确——在撰写本文时，我们尚未涉足这条路径！


    另一个重要说明是，`gluwa/substrate` 遵循的是上游的一个版本分支。如果我们想要升级，那么我们需要从当前代码库拉出分支，基于较新的上游版本分支进行变基，然后看看效果如何。这（在本书撰写时）是一个手动过程，尚未实现自动化。在能对我们的测试方法以及下游测试作业检测故障的能力充满信心之前，我们还需要做更多工作。

    '
- fmt: "### Community Testing on PoS Testnet\n\nThere is no bug-free software; however,\
    \ switching the consensus engine of a blockchain is a major event which carries\
    \ risk to brand damage and community disapproval if not handled correctly. Loss\
    \ of data, either historical or the ability to produce blocks, is another major\
    \ risk, which is already covered by the existing test coverage. Here the focus\
    \ is on the remaining components of the stack.\n\nInternally all components have\
    \ been ironed out to the point where major bugs and visual flaws do not exist,\
    \ or they are not immediately obvious to the public after which the proof-of-stake\
    \ version of `Creditcoin` was considered good enough to be released as a public\
    \ beta. A fresh Testnet deployment was made together with the accompanying documentation,\
    \ Staking Dashboard, Subscan Essentials, and `creditcoin-cli` components. The\
    \ first deployment was \"PoS Devnet\" which was meant for internal consumption\
    \ by engineering. The community facing environment is called \"Creditcoin PoS\
    \ Testnet.\"\n\nAfter this new PoS Testnet environment was created and all of\
    \ the components deployed, the announcement was made on the Creditcoin website\
    \ and community channels. Community members were given Testnet CTC tokens and\
    \ encouraged to participate as both nominators and validators in the network.\
    \ In other words they were incentivized to exercise the newly introduced software\
    \ components. This effort was primarily driven by the Marketing team who facilitated\
    \ collecting feedback from users and compiled a list of bugs and questions from\
    \ the community that was sent down to the blockchain engineering team.\n\nThe\
    \ purpose of this community testing is mutifaceted and is no different than similar\
    \ efforts from other software vendors:\n\n1.  To generate marketing buzz and community\
    \ engagement of course.\n2.  To make sure major components are working as expected,\
    \ or at least not catastrophically broken and collect bugs and feedback from the\
    \ actual user base.\n3.  To make sure that documentation is adequate enough so\
    \ that users can actually participate and perform expected tasks without hitting\
    \ technical challenges even when they aren't very experienced in the actual technology.\
    \ For all we know, some users may be first time participants in a blockchain network.\
    \ I was one of these users once.\n4.  To establish a baseline of how many nominators\
    \ and validators are expected to participate in the network. There are some limitations\
    \ which I talk about later, and this is a convenient way of collecting realistic\
    \ data.\n5.  Allow other engineering teams, both internal and external, to experiment\
    \ with Creditcoin PoS implementation and adjust their applications if needed.\
    \ Serve as a staging environment for such teams if you wish.\n\nA few words about\
    \ why deploying independently! There are two general options here:\n\n1.  Upgrade\
    \ the existing Creditcoin Testnet blockchain.\n    - Pros\n        - This is what\
    \ you will actually do on Mainnet; makes sense to keep procedures the same in\
    \ order to exercise, gain confidence, and potentially uncover issues that have\
    \ been missed so far.\n        - Allows for real-world testing of the historical\
    \ block preservation functionality.\n        - The switch is highly visible, and\
    \ if it goes well, sends positive signals to your community.\n    - Cons\n   \
    \     - Existing PoW miners may not be aware of when exactly the switch is going\
    \ to happen which would leave them running without being able to produce a block.\
    \ Possibly undesirable because they will be expending computing resources and\
    \ may not be prepared to transition to proof of stake at the same time as you\
    \ do.\n        - Uncontrolled rapid adoption leading to saturation/overload/corner\
    \ case bugs – for example, 10000 validators want to join at the same time.\n \
    \       - If the switch goes badly, this is also highly visible, and the risk\
    \ of reputation damage is very high.\n    - Contingency\n        - Destroy the\
    \ broken chain and restore it from a backup. Relatively easy to do in technical\
    \ terms, may need some coordination with community members but overall very bad\
    \ publicity if this comes to pass.\n\n2.  Deploy a fresh blockchain.\n    - Pros\n\
    \        - Completely independent.\n        - Allows participants to join as they\
    \ wish. Existing miners may decide to redirect their hardware resources on their\
    \ own accord.\n        - Allows you to control who can participate and to limit\
    \ how many users onboard by controlling the supply of tokens on this new chain\
    \ as well as control settings how many active validators are permitted, for example,\
    \ slow growth.\n        - Does not disrupt existing PoW Testnet even if it goes\
    \ wrong. Still not a good publicity, but the negative effects should be less.\n\
    \    - Cons\n        - Does not allow exercising the workflow for performing the\
    \ switch on Mainnet.\n        - Does not allow testing the historical block preservation\
    \ feature.\n    - Contingency\n        - Destroy the PoS chain and start over\
    \ from scratch. Still not a good publicity, but the negative effects should be\
    \ minimal.\n\n### Documentation Review\n\nBefore the introduction of staking,\
    \ the existing documentation for version 1.x and 2.0 included a fairly limited\
    \ amount of user facing instructions. That was the so-called \"Creditcoin Mining\
    \ Node Setup\" which basically told the user how to generate a public/private\
    \ keypair and how to use their public address when starting a Creditcoin container.\
    \ It has been removed in `https://github.com/gluwa/creditcoin/pull/1505`.\n\n\
    The new documentation explains the concept of \"staking,\" the differences between\
    \ proof of work and proof of stake and basic concepts such as Validator Elections,\
    \ Eras and Sessions, Staking Rewards, and Slashing. A chapter on wallets documents\
    \ common third-party browser extensions and in-house and third-party command line\
    \ interfaces. Then there are two new chapters \"Nominator Guides\" and \"Validator\
    \ Guides\" which explain the two main roles in a nominated proof-of-stake blockchain\
    \ and point the users to the respective application which they can use.\n\nBecoming\
    \ a validator in a proof-of-stake network is much more involved compared to becoming\
    \ a miner in a proof-of-work blockchain and also includes multiple independent\
    \ steps.\n\nReviewing the documentation, both from QE and other stakeholders,\
    \ means exactly that – review for typos, grammatical errors, items which don't\
    \ make sense, terms which aren't clear or not obvious to someone without experience,\
    \ etc. It was an iterative process with lots of feedback and multiple changes\
    \ over a short period of time.\n\nThe other part of \"testing the documentation\"\
    \ is actually following all of the technical steps listed and making sure they\
    \ are correct; the order is the correct one, and the commands shown will result\
    \ in the documented outcome, making sure that version numbers, URLs, etc. are\
    \ also the correct ones.\n\nSome sections of the documentation contain examples\
    \ for platforms different from Linux, so you need someone to verify that they\
    \ are actually correct. After a while working with this document, one becomes\
    \ fairly biased and starts skipping sections from the docs or already anticipates\
    \ which commands you need to type, so double-checking everything super diligently\
    \ becomes a chore. This is when you have to bring in other team members, preferably\
    \ ones who have less experience and/or are unfamiliar with the documentation and\
    \ the overall \"become a validator\" workflow so they can spot more edge cases\
    \ and help improve the documentation.\n\nDocumentation URL: `https://docs.creditcoin.org/cc2`\
    \ (different from the Creditcoin 3.0 docs)."
