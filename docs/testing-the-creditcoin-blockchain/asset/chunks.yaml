- fmt: '# Hyperledger Sawtooth


    Hyperledger Sawtooth is a blockchain development framework by Hyperledger and
    the Linux Foundation with contributions by IBM, Intel, and others. It is a framework
    with modular architecture which separates the core system from the application
    domain, so developers can specify the business rules for applications without
    needing to know the underlying design of the entire system. Sawtooth supports
    a variety of consensus algorithms.


    Originally contributed by Intel, Sawtooth is a blockchain suite designed for versatility
    and scalability. Transaction business logic is decoupled from the consensus layer
    into the so-called `Transaction Families` that allow for restricted or unrestrained
    semantics. Original website: [`https://wiki.hyperledger.org/display/sawtooth`](https://wiki.hyperledger.org/display/sawtooth).


    Initial versions of Sawtooth were implemented in Python, and later some components
    were subsequently reimplemented in Rust.


    **Note**: The original Hyperledger Sawtooth repository on GitHub was archived
    at the request of its maintainers on Feb 1, 2024, during the writing of this book.
    Ongoing maintenance releases of this code base have since moved under the Splinter
    community at [`https://www.splinter.dev/`](http://www.splinter.dev/).


    Hyperledger Sawtooth was the development framework of choice for the Creditcoin
    1.x blockchain which I experienced toward the end of its life cycle.


    # Substrate


    Substrate, [`https://substrate.io`](https://substrate.io/), is a blockchain framework
    which claims to be the most powerful framework to quickly build customized future-proof
    blockchains. It is a framework which allows developers to build specialized blockchain
    applications. Substrate is spearheaded by the Polkadot network and Parity Technologies
    which are led by Gawin Wood, the first CTO of Ethereum.


    Building your own blockchain using Substrate is surprisingly easy, and you can
    get started in no time just by following their tutorial. See [`https://docs.substrate.io/tutorials/build-a-blockchain/build-local-blockchain/`](https://docs.substrate.io/tutorials/build-a-blockchain/build-local-blockchain/).
    The core concept here is composability – your blockchain implementation is composed
    of multiple components called pallets, which are glued together in a runtime.


    Substrate is built with the Rust programming language, while the rest of the Polkadot
    tooling uses TypeScript – these are usually client libraries and front-end applications.


    Creditcoin versions 2.x and later are built using Substrate.


    # Ethereum


    I have not done any development and testing on Ethereum personally but mentioning
    it here because it is quite popular. `Geth` seems to be the main Ethereum client
    implemented in the Go programming language; see [`https://github.com/ethereum/go-ethereum`](https://github.com/ethereum/go-ethereum).
    Because this implementation is open source, it is entirely possible to fork it
    and then modify the code in order to create a custom blockchain of your own flavor.
    This is apparently what the Musicoin chain had done. On the other hand, you are
    probably far more likely to implement a smart contract deployed on Ethereum main
    network instead of building a custom chain.


    In either case, there are lots of development tools available for Ethereum; see
    [`https://ethereum.org/en/developers/docs/frameworks/`](https://ethereum.org/en/developers/docs/frameworks/)
    if you are interested.


    # Programming Languages


    The programming languages discussed in this book are a colorful mix between Python,
    C++, and C# .NET during the Creditcoin 1.x timeframe and later primarily Rust
    and TypeScript for version 2.0 and later.


    `Rust` is a general-purpose programming language that emphasizes performance,
    type safety, and concurrency. It enforces memory safety without a garbage collector.
    Rust is a statically typed and strongly typed functional language and is a popular
    language for systems programming, including distributed systems like blockchain
    and also the Linux kernel.


    Developer Graydon Hoare created Rust as a personal project while working at Mozilla
    Research in 2006. Mozilla officially sponsored the project in 2009, and since
    then the language has enjoyed rapid adoption. Here’s how the Hello World program
    looks in Rust.


    ```

    fn main() {

    println!("Hello, World!");

    }

    ```


    In Rust developers can create user-defined types with the `struct` or `enum` keywords
    and then attach methods to these types with the `impl` keyword. Rust has been
    influenced by many other languages and is not entirely object oriented. While
    you can have user-defined data types with data and methods attached to them, which
    look like classes, Rust does not have the concept of true OOP inheritance. Instead
    Rust uses generics, traits, and polymorphism. If traits is unfamiliar to you,
    you can think about it as an interface definition which needs to be implemented
    in all data types that are supposed to support that interface.


    Using Rust from a testers point of view comes with a few “known issues”:


    - The compiler is your friend – memory safety pretty much excludes random runtime
    failures; strong types mean hardly no possibility to mistakenly use a variable
    in a code block where it wasn’t meant to be used (e.g., copy-and-paste issue).

    - Nice automated testing facilities built into the language.

    - Tests can be executed in parallel.

    - Assertions are performed via macros which generate a runtime panic when they
    fail.

    - Takes rather long time to compile from scratch so keeping build cache around
    is important.

    - Popular code coverage and static analysis tools may have poor support for Rust
    because it is still a relatively new language.

    - Distinction between “unit” and “integration” test code is relatively small and
    may not be immediately obvious if you are less experienced with the language.

    - There is no syntax for shared setup/teardown as part of the built-in test harness
    library.


    For more information on the Rust language and testing in particular, please see
    [`https://doc.rust-lang.org/book/ch11-00-testing.html`](https://doc.rust-lang.org/book/ch11-00-testing.html).


    `TypeScript` is JavaScript with syntax for types. TypeScript is a strongly typed
    programming language that builds on JavaScript.


    ```

    const message: string = ''Hello, World!'';

    console.log(message);

    ```


    The same pros mentioned previously for Rust apply here as well. The TypeScript
    compiler and linter are tester’s best friends and will catch errors for you. A
    huge bonus is that popular JavaScript testing frameworks have TypeScript bindings
    and provide more choice for test automation and quite good support from third-party
    tools and services. Website: [`https://www.typescriptlang.org/`](http://www.typescriptlang.org/).


    In the Substrate/Polkadot ecosystem, the framework of choice is the popular Jest
    testing framework which I’ve used quite extensively while testing Creditcoin.
    If you are coming from a background of test automation for web applications, for
    instance, you will probably have enough experience to get started very quickly.
    My personal testing background is rather far away from web and JavaScript, but
    I got only minor issues getting started.


    `Solidity` is a statically typed curly-braces programming language designed for
    developing smart contracts that run on Ethereum and other EVM compatible chains.'
