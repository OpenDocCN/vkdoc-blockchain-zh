    For example, money transfer (as the original concept behind modern blockchain),
    insurance, lending, and borrowing in the case of Creditcoin and generally anything
    related to financial assets, logistics and supply chain tracking, proof and transfer
    of ownership (e.g., real estate deeds), etc.


    An example which is practical yet simple to understand is the Tic-Tac-Toe game.
    We may have transactions to record the start of a new game, record each player’s
    turn (e.g., symbol and position on the board), and the final outcome of the game.
    A transaction schema may look like this:


    *   start_game(player_one_address, player_two_address)


    *   record_move(player_address, symbol, coordinates_on_board)


    *   calculate_outcome() - may be triggered internally


    *   record_victory(player_address)


    In the case of the original Creditcoin whitepaper, a transaction schema looks
    like this:


    *   Borrower asks for a loan (specific-terms).


    *   Lender proposes a loan (specific-terms).


    *   Record a Lender and Borrower pair, e.g., terms match/they agree on terms.


    *   Record transfer of funds.


    *   Actual transfer of funds, etc.


    Transactions may be consumed internally between nodes in the blockchain – for
    example, each Tic-Tac-Toe participant is required to be a validator on the blockchain
    and can only communicate with the blockchain via their validator program.


    It is however more practical that transactions are also exposed externally and
    are available via some sort of RPC interface. This means players in the game may
    be different from validators. This also means they can participate more easily,
    for example, via mobile or a web application, while utilizing the blockchain to
    record their actions.


    ### Transaction Fees


    The operation and maintenance of a blockchain network is not free of charge. It
    requires real-world computing resources which are often contributed by a large
    external community. This is especially true in public blockchain networks. This
    requires introducing transaction fees in the form of crypto tokens.


    In order to make the blockchain economically flexible, it is necessary that the
    implementation controls the transaction fee component according to its needs.
    It could be a simple mathematical formula, or it can be a more complex algorithm
    taking multiple factors into account, including but not limited to historical
    performance on the blockchain. For example, when the usage is high and it’s trending
    upward, then fees can rise as well. If the network has been idle for some period
    of time, fees can automatically adjust downward in order to stimulate more usage.


    ### Block Production


    This is a component responsible for serializing transactions into a block and
    communicating with the consensus, storage, and peer-to-peer components. It is
    important that a blockchain is able to produce new blocks. If there is no external
    activity, then a `time.set` transaction may be triggered by an internal clock.


    Block production can be compromised due to software bugs in this component or
    because of consensus or networking issues. When the blockchain cannot recover,
    it is said that **we brick the blockchain** and the chain becomes unusable, that
    is, no more blocks can be appended to it and that most likely will mean the end
    of your blockchain.


    ### Block Rewards


    Miners and/or validators on a blockchain will usually expect to earn rewards in
    exchange for them providing computing resources to maintain the infrastructure.


    Similar to transaction fees, rewards are represented as crypto tokens (could be
    the same or different), and usually they can be adjustable. The block rewards
    component could be a simple mathematical formula or a more complex algorithm –
    this is up to the creators of a particular blockchain to decide.


    This formula may change over time depending on the popularity of a blockchain,
    e.g., higher rewards during initial phases to stimulate participation and then
    scale down the rewards as the blockchain becomes more popular or saturated with
    participants.


    ### Remote Procedure Call (RPC) API


    In order for blockchain users to be able to interact with the network, they need
    some sort of network-enabled interface. The RPC component is responsible for how
    RPC methods are defined inside a blockchain implementation and how they are exposed
    to the outside world. When talking about “users,” here I mean “API consumers”
    regardless of their role in real life.


    For example, serve the API interface via the JSON-RPC and/or REST protocols which
    may be exposed via HTTP and/or WebSocket. Other network transport and RPC protocols
    may also be used in various implementations. For example, the Hyperledger Sawtooth
    blockchain framework uses ZeroMQ/Protobuf as its internal communication layer
    which if I’m not mistaken clients can use directly. For the purposes of convenience,
    this layer is wrapped into REST API.


    The most important component which needs to be exported via an RPC layer is the
    transaction interface. Exposing the transactions API via standard network protocols
    allows multiple types of applications to be able to interact with the blockchain.
    Using widely adopted industry protocols makes it easier to access this API from
    any sort of programming language.


    For example, a mobile application may be signing transactions with a public-private
    key pair and sending them to a blockchain node, which in turn will communicate
    this transaction to other nodes on the p2p network and the transaction will eventually
    be included into a block. The node receiving the transaction via the RPC API component
    may be different from the node performing validation and block production.


    ### Storage


    Responsible for persisting data locally on disk at each node participating in
    the network, typically as a highly efficient key-value store.


    For practical development purposes, the data represented on the blockchain must
    be represented via data types which have fields, rather than a stream of binary
    blobs. That is, we have a data schema which is used during the development of
    the blockchain software program and could also be used by third parties in the
    form of an SDK.


    For the purposes of abstraction, parts of the storage component may be viewed
    as an Object Relational Mapping framework commonly found in web application development.


    ### Migrations


    In order for practical blockchain applications to evolve according to business
    needs, developers need to be able to modify the data schema. For example, in our
    Tic-Tac-Toe example, we may want to record in which move a game was won, or we
    may want to allow a third player.


    Similar to ORM frameworks, the migration component allows developers to transform
    the data represented onto a blockchain, or even remove some of it. All of these
    transformations will be kept in the blockchain history at a particular block height.
    Older data may be retrieved if querying older blocks, but there is no guarantee
    for client applications to be backward compatible.


    Failed migrations could lead to compromised block production which may be fatal.'
  trans: '

    # 交易


    除了将单一交易序列化为二进制格式以便记录到区块的具体机制外，区块链的 `交易` 组件代表着其业务逻辑。也就是说，该特定区块链上可以记录何种类型的操作。


    例如，资金转移（作为现代区块链背后的原始概念）、保险、借贷（以信用币为例），以及通常与金融资产、物流和供应链追踪、所有权证明与转移（如房地产契约）等相关的任何内容。


    一个既实用又易于理解的例子是井字游戏。我们可以设计交易来记录新游戏开始、每位玩家的回合（例如，棋盘上的符号和位置）以及游戏的最终结果。一个交易模式可能如下所示：


    * `start_game(玩家一地址, 玩家二地址)`

    * `record_move(玩家地址, 符号, 棋盘坐标)`

    * `calculate_outcome()` - 可能在内部触发

    * `record_victory(玩家地址)`


    以最初的信用币白皮书为例，其交易模式如下：


    * 借款人请求贷款（`具体条款`）。

    * 贷款人提出贷款（`具体条款`）。

    * 记录贷款人与借款人配对，例如，条款匹配/双方同意条款。

    * 记录资金转移。

    * 实际资金转移等。


    交易可以在区块链上的节点之间内部消耗——例如，每个井字游戏参与者必须成为区块链上的验证者，并且只能通过其验证者程序与区块链通信。


    然而，更实用的做法是，交易也对外暴露，并通过某种 RPC 接口可用。这意味着游戏中的玩家可以与验证者不同。这也意味着他们可以更轻松地参与，例如通过移动端或
    Web 应用程序，同时利用区块链来记录他们的操作。


    # 交易费用


    区块链网络的运行和维护并非免费。它需要真实世界的计算资源，这些资源通常由庞大的外部社区提供。这在公有区块链网络中尤其如此。这要求引入以加密代币形式存在的交易费用。


    为了使区块链在经济上具有灵活性，实现方需要根据自身需求控制交易费用组件。它可以是一个简单的数学公式，也可以是一个考虑多种因素（包括但不限于区块链的历史性能）的更复杂的算法。例如，当使用率高且呈上升趋势时，费用也可能上涨。如果网络闲置了一段时间，费用可以自动下调以刺激更多使用。


    # 区块生产


    这是一个负责将交易序列化为区块，并与共识、存储和点对点组件进行通信的组件。区块链能够生产新区块至关重要。如果没有外部活动，内部时钟可能会触发一个 `time.set`
    交易。


    由于此组件中的软件错误，或者由于共识或网络问题，区块生产可能会受到损害。当区块链无法恢复时，就说**我们损坏了区块链**，该链变得不可用，也就是说，无法再向其追加新区块，这很可能意味着你的区块链的终结。


    # 区块奖励


    区块链上的矿工和/或验证者通常期望通过提供计算资源来维护基础设施而获得奖励作为回报。


    与交易费用类似，奖励以加密代币（可以是相同或不同的代币）的形式表示，并且通常是可以调整的。区块奖励组件可以是一个简单的数学公式或更复杂的算法——这取决于特定区块链的创建者来决定。


    该公式可能根据区块链的流行度随时间变化，例如，在初始阶段提供更高的奖励以刺激参与，然后随着区块链变得更受欢迎或参与者饱和而降低奖励。


    # 远程过程调用（RPC）API


    为了使区块链用户能够与网络交互，他们需要某种支持网络的接口。RPC 组件负责在区块链实现内部如何定义 RPC 方法，以及如何将它们暴露给外部世界。当谈到“用户”时，这里我指的是“API
    消费者”，无论他们在现实生活中的角色如何。


    例如，通过 JSON-RPC 和/或 REST 协议提供 API 接口，这些协议可能通过 HTTP 和/或 WebSocket 暴露。在各种实现中也可能使用其他网络传输和
    RPC 协议。例如，Hyperledger Sawtooth 区块链框架使用 ZeroMQ / Protobuf 作为其内部通信层。如果我没记错的话，客户端可以直接使用它。为了方便起见，该层被封装到一个
    REST API 中。


    需要通过 RPC 层导出的最重要的组件是交易接口。通过标准网络协议公开交易 API，允许多种类型的应用程序能够与区块链交互。使用广泛采用的行业协议可以更容易地从任何编程语言访问这个
    API。


    例如，一个移动应用程序可能使用公私钥对签署交易，并将其发送到区块链节点，该节点随后会将该交易传达给 p2p 网络上的其他节点，最终该交易会被包含在一个区块中。通过
    RPC API 组件接收交易的节点可能与执行验证和区块生产的节点不同。


    # 存储


    负责在参与网络的每个节点的本地磁盘上持久化数据，通常采用高效的键值存储形式。


    出于实际开发目的，区块链上表示的数据必须通过具有字段的数据类型来表示，而不是二进制数据块流。也就是说，我们有一个数据模式，在区块链软件程序开发期间使用，也可以由第三方以
    SDK 的形式使用。


    为了抽象的目的，存储组件的某些部分可以视作 Web 应用开发中常见的对象关系映射框架。


    # 迁移


    为了使实际的区块链应用能够根据业务需求演进，开发者需要能够修改数据模式。例如，在我们的井字游戏示例中，我们可能希望记录游戏在哪一步获胜，或者我们可能允许第三位玩家加入。


    与对象关系映射框架类似，迁移组件允许开发者转换区块链上表示的数据，甚至删除其中的一部分。所有这些转换都将保存在特定区块高度的区块链历史中。如果查询较旧的区块，可以检索到较旧的数据，但无法保证客户端应用程序向后兼容。


    失败的迁移可能导致区块生产受损，这可能是致命的。

    '
- fmt: '### Runtime Upgrades


    Originating from the need of blockchain applications to evolve due to business
    needs, there will be different versions of the implementation. Let’s say that
    we want to introduce the ability for three players to compete simultaneously against
    one another in our Tic-Tac-Toe blockchain.


    The runtime upgrade component is responsible for that. In some blockchain implementations,
    the business logic (transactions) may be kept separately from the actual client
    program. This is the case when using the Substrate blockchain framework. A popular
    choice is the WebAssembly format. If the runtime is separate, it could also be
    recorded onto the blockchain itself.


    In other implementations, the transactions may be tightly coupled with the rest
    of the client program requiring a software upgrade and restart before the user
    can access newer features of the blockchain.


    This component raises questions around compatibility/interoperability testing
    between different clients and runtime versions.


    ### Metrics and Telemetry


    Since blockchain applications are distributed and the participation of a high
    number of nodes is encouraged for security reasons, it is often necessary to expose
    information about the inner workings of the blockchain software. These could be
    aggregated into a tool such as Grafana for further analysis.


    The telemetry component is where such metrics can be defined and then pushed to
    external services via HTTP, for example.


    ### Off-Chain Worker or Oracle


    In the context of blockchain, all computations and state are stored onto the chain
    itself. Practical applications however need to communicate with the outside world
    and securely transfer information in and out of the blockchain. This is the domain
    of the so-called oracle or off-chain worker component.


    An important note here is that the off-chain worker would be able to read on-chain
    data but should not be able to modify it directly. This component will be sending
    transactions back to the blockchain though if it needs to reflect the state of
    the outside world. This could happen internally, for example, call the transaction
    function in the source code or routed externally to the blockchain via the existing
    RPC interface. These transaction calls will then be processed by the rest of the
    components and if successful will make it into a block. It is also possible that
    a transaction will fail and/or not make it into a block for various reasons.


    ### Smart Contracts


    Smart contracts are computer programs stored onto a blockchain network. Once a
    smart contract is deployed onto a blockchain, it can store an arbitrary state
    and execute arbitrary computations or call other contracts on the blockchain.


    Each smart contract has an address associated with it, which acts as an entry
    point to the contract, much similar to a URL address for a REST API function.
    End clients interact with a smart contract by sending transactions using its address
    via some sort of a client library – a popular choice is `ethers.js`.


    Once deployed, a smart contract cannot be modified. New versions of the contract
    can be deployed to a different address though.


    It is rather popular for the creator of a smart contract to mint a new crypto
    token, that is, create it out of thin air, which is then used as representation
    of value on some blockchain network. However, smart contracts may implement other
    functionalities such as automatic and transparent vote counting, hosting auctions,
    games, and safely purchasing goods remotely.


    The practical applications of smart contracts are outside of the scope of this
    book.


    ## Consensus Mechanisms


    The consensus engine is one of the most important components of a blockchain network,
    and there are many mechanisms which are currently being developed or in use. For
    example, proof of work, proof of stake, proof of elapsed time, proof of capacity,
    and proof of location, to name a few. Their properties influence attributes such
    as who can participate, how easy it is to participate, how much does it cost to
    maintain the network, what is the incentive scheme, how fast or how slow block
    time is, how many nodes can the network support, what is the transaction throughput,
    and above all how secure the blockchain is!


    Check out this list of 20+ algorithms for further reference: [`https://medium.com/hackernoon/consensuspedia-an-encyclopedia-of-29-consensus-algorithms-e9c4b4b7d08f`](https://medium.com/hackernoon/consensuspedia-an-encyclopedia-of-29-consensus-algorithms-e9c4b4b7d08f)


    ### Proof of Work (PoW)


    Participants in a PoW consensus expend computational resources in order to gain
    opportunity to append new blocks to the blockchain. They need to solve a CPU-intensive
    cryptographic puzzle and present its solution, a very big number, to other participants
    which can very easily compute (agree) that the solution is correct. The data portion
    of each block is used as input to the cryptographic puzzle.


    The first miner that finds a correct solution is given the opportunity to append
    the new block to the blockchain. Because of this, we say that they mined a block.


    The more CPU resources a miner has, the bigger chance they get in solving the
    cryptographic puzzles and appending blocks onto the blockchain, thus earning more
    rewards for their effort.


    In PoW networks, block time is relatively slow, and they have high requirements
    for electricity.


    ### Proof of Stake (PoS)


    Participants in a PoS consensus mechanism compete for the opportunity to append
    blocks proportional to the amount of crypto tokens they have at stake. In general
    having more tokens invested is presumed to lead to greater chance of being chosen
    by the algorithm to append blocks to the blockchain and thus yielding a greater
    return.


    PoS networks avoid the high computational costs of PoW networks. There is no real
    mining because there are far less cryptographic computations involved; however,
    we often commonly refer to validators as miners even in this case.


    Staked funds are held as a hostage by the blockchain implementation and may be
    taken away from the validator as a penalty if they were reported and found to
    be at fault or malicious. This process is automated with the goal of limiting
    human participation and promoting healthy behavior on the blockchain network.
    For example, when a validator node has been offline for an extended period of
    time, they will be penalized.


    The process of applying penalties and taking away existing funds from a participant
    in a blockchain network is also known as slashing.


    ### Proof of Authority (PoA)


    Proof of authority is an algorithm that delivers comparatively fast block times
    through a consensus mechanism based on identity as a stake or reputation at stake.
    In PoA networks, individuals earn the right to become validators so there is an
    incentive to retain the position they have gained. PoA consensus can typically
    be found in private permissionless blockchains.


    ## Summary


    In this chapter, I’ve covered the basics behind what a blockchain is and talked
    about some of the main components and attributes of a blockchain implementation
    in order to establish a baseline of understanding. You can also refer to the glossary
    section anytime you need a reminder.


    Next, I will cover the blockchain development frameworks I’ve used, some practical
    notes about building an actual blockchain implementation, and what does that mean
    for us testers.


    Footnotes [1](#629923_1_En_1_Chapter.xhtml#Fn1_source)


    # 2. Blockchain Development Frameworks


    Searching the Internet for “blockchain development frameworks” yields multiple
    results, and it is entirely possible that preferences will have changed by the
    time you read this book. Actual details will vary, but basic concepts should be
    similar. In this chapter, I will list the frameworks I’ve used personally in order
    to provide more context for the upcoming chapters.'
