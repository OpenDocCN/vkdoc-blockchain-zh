    *To the tester who gave me everything. You showed me what true, unconditional
    love and sacrifice is. I will always cherish the time that you allowed me to be
    together with you! I am deeply sorry that I was too selfish to not realize it
    in time. I apologize from the bottom of my heart that I hurt and betrayed you
    by taking away your most sacred dream. Please forgive me!*


    ## Preface


    This book follows the quality engineering journey of the Creditcoin blockchain
    across four distinct implementation versions and a myriad of technologies from
    a first-person point of view. It discusses testing implementations with the Hyperledger
    Sawtooth and Substrate blockchain frameworks, testing switch from proof-of-work
    to proof-of-stake consensus algorithm and testing an Ethereum Virtual Machine
    compatibility layer.


    Readers will traverse several years of fast-paced blockchain implementations and
    technological changes including explanation of all major components under test,
    the approach taken, including examples of test automation and tools, interesting
    bugs, and testing challenges. Chapters follow each major implementation of the
    Creditcoin blockchain and conclude with a couple interviews with other testers
    working on different blockchain-related products.


    Almost 99% of everything discussed in this book is open source, and multiple references
    to source code and GitHub are included throughout.


    This book is for the software tester and quality engineering folks, who may soon
    be working on a blockchain implementation without having the necessary understanding
    of what it is, how it works, and what is important in terms of "assuring" quality.


    **Target audience:**


    *   Software tester

    *   Software developer in test automation

    *   Quality assurance engineer

    *   Quality assurance manager


    **What you will learn:**


    1.  Key components of a blockchain with some diagrams

    2.  Glossary of popular blockchain and crypto terms

    3.  Overview of blockchain implementation with the Hyperledger Sawtooth framework

    4.  Overview of blockchain implementation with the Substrate framework

    5.  Practical topics related to testing proof-of-work, proof-of-stake, and EVM-based
    blockchains


    ## Acknowledgments


    I want to thank Jeroen Rosink for being the first one who gave me feedback about
    the contents of this book. You''ve given me valuable feedback several times till
    now. I may have misunderstood some of it and definitely not incorporated everything,
    but I have no doubt that your feedback has made a positive difference on my end.
    Next round of thanks goes to Sebastian Malyska who helped me get in touch with
    other blockchain testers. Seba, I hope we meet soon at another testing conference!
    Thank you to my fellow tester and neighbor Liviu Damian for putting me in touch
    with Andrew Snaith. Thank you Andrew Snaith for agreeing to share your testing
    experience for this book which added many other dimensions to my personal stories.
    Last but not least, thank you Sebastian Viquez for agreeing to share your testing
    experience around smart contracts which completes this book.


    ## About the Author

    ## About the Technical Reviewer


    # Part I: Introduction to Blockchain


    ## 1. Introduction


    Cryptographer David Chaum first proposed a blockchain-like protocol in his 1982
    dissertation "Computer Systems Established, Maintained, and Trusted by Mutually
    Suspicious Groups" with further improvements on this idea in the next 15–20 years.
    The first decentralized blockchain was conceptualized by a person (or group of
    people) known as Satoshi Nakamoto in 2008 giving rise to Bitcoin. 2013 was the
    start of Ethereum which introduced smart contract functionality. Due to concerns
    over the high energy consumption required for cryptographic computations, later
    chains such as Cardano (2017), Solana (2020), and Polkadot (2020) started adopting
    the less energy-intensive proof-of-stake model.


    At present, we are witnessing continuously increasing interest and investment
    into blockchain technology^([¹](#fn1)) with a multitude of companies searching
    for practical applications beyond cryptocurrencies. It is the time when blockchain
    technology is entering the world of the more common software engineering folks.
    It is also the time when blockchain technology is being productized, which leads
    to the necessity of more testing for these products.


    As an experienced quality assurance engineer with nearly two decades of experience,
    I felt very intrigued about working in the blockchain testing space, yet at the
    same time, I felt extremely uncomfortable for a very long time. I''ve had prior
    experience with testing low-level infrastructure type of software, like various
    parts of the Linux operating system, but didn''t have any experience with cryptocurrency
    or blockchain before. Because I was working on a product that was already in production,
    I needed to learn a lot of things very quickly in order to be a productive member
    of the team. It was like drinking from a firehose, and to this day it feels like
    that sometimes.


    This book is for the common tester and quality engineering folks, who may very
    soon be required to work on a blockchain software product without having the necessary
    understanding of what it is, how it actually works, and what is important in terms
    of "assuring" quality.


    Blockchain networks are distributed systems which are usually more complex compared
    to regular software products, and there are a myriad of items to be tested which
    requires a vast skill set. This book is not meant to be an exhaustive resource
    for every possible scenario; that is impossible. Instead, it is meant to tell
    my story as a blockchain test engineer and hopefully be your starting point in
    this domain.


    Happy testing!'
