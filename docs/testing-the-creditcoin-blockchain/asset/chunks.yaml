    formulated acceptance criteria.'
  trans: '

    # Creditcoin 2.3 测试


    此处的首要目标是确保现有功能均未受影响，并且切换到提名权益证明不会导致现有网络崩溃——这包括两方面：网络保持正常运行；切换后网络能持续出块，且旧区块历史仍可访问！


    次要测试目标是确保用户能够承担新引入的角色（验证人或提名人），并使用为此类角色提供的应用程序，而不会遇到重大错误——这些应用程序是新的 `creditcoin-cli`
    和 Creditcoin 质押仪表盘。


    任何其他组件可视为较低优先级，因为它们更多扮演支持角色，而非用户交互的核心和焦点！


    ## 单元测试


    在 Creditcoin 2.3 期间新增的`switch_to_pos`等外部函数，已按照先前建立的工作流程进行了单元测试。我尝试覆盖所有可能的场景和错误条件，并对存储变化和触发的事件进行了断言。这里并无特别之处。


    关于 NPoS 切换，其影响实际上无法从单元测试级别观察到，尝试通过单元测试模拟共识切换也不具实际价值，因为我们使用的是模拟运行时实现。这更适合从外部进行观察和检查。


    ## 集成测试


    原有集成测试套件的大部分内容保持不变，我按照常规工作流程为新增外部函数添加了测试。少量与指标和 RPC 相关的测试被移除，因为它们不再适用于权益证明。例如，由于不再进行挖矿，节点算力指标变得毫无用处。


    在正式切换到权益证明之前，有两个新事项变得重要：


    1.  断言区块历史得以保留。

    2.  将 `switch_to_pos()` 的调用整合到现有的升级测试流程中。


    断言历史区块保留相对直接：


    -   启动一个独立的区块链用于测试目的。它仍以工作量证明方式启动。

    -   在集成测试套件外部，记录最后一个工作量证明区块的信息——其哈希值和区块详情。将此信息保存到 JSON 文件中。也可以在测试套件内部作为设置步骤完成。之所以在测试套件外部进行，是为了能够针对其他已完成切换的链执行此测试套件。

    -   通过调用 `switch_to_pos()` 外部函数切换到权益证明。

    -   使用 JSON 文件中存储的同一区块哈希再次查询区块链。

    -   比较区块详情——它们应与 JSON 文件中存储的完全一致！


    在现有升级测试中模拟切换同样直接：


    -   启动一个独立的区块链用于测试目的。它仍以工作量证明方式启动。

    -   像之前一样与目标区块链同步，例如测试网。

    -   执行 `runtimeUpgrade` 脚本，将最新的 WASM 运行时二进制文件上传到链上。

    -   分叉或断开本地节点与目标实时链的连接，以防止变更传播。我们在两个独立的测试任务中都进行操作。

    -   针对本地运行的节点调用 `switchToPos()` 以触发切换。

    -   针对本地节点执行现有的集成测试套件，以确保一切仍正常工作。这包括内置于集成测试套件中的区块历史保留检查。


    提示


    在 Rust 源代码中，外部函数遵循所谓的 `snake_case` 命名约定，而在 TypeScript 客户端库中，相同的名称会转换为 `camelCase`。两者是相同的，但我认为不熟悉此规则的人可能会感到困惑！


    ## 测试 Subscan 基础组件


    实际的上游 Subscan 基础组件仓库在测试方面状态不佳。GitHub 上的历史记录显示，我上次检查时，CI 作业已失败超过一年，并且有一个长串的提交在
    CI 失败的情况下被合并到主分支。


    作为 Creditcoin 分支的一部分，我启用了我们在其他仓库中使用的所有常见工具——MegaLinter、pre-commit CI、Dependabot、CodeQL
    等。还添加了 golang CI linter 作为特定语言工具，并确保我们拥有代码覆盖率报告，且 CI 作业在每个拉取请求上执行。


    除此之外，我还对测试环境中所需服务的设置进行了多项改进——例如，使用现有的 `docker-compose.yml` 配置，而不是在多个位置指定配置值；在
    CI 中使用相同的 golang 版本；在构建 Docker 镜像时清理 Dockerfile 等。基本上是确保所有符合 Creditcoin 标准实践的额外工具都能正常运行，并且它们报告的问题都得到了解决。


    好消息是，存在一个用 Go 编写的现有测试套件。据我所知，它类似于一个 API 测试套件，介于功能完备的集成测试套件和单元测试套件之间。其任务是检验各个 API
    端点并对它们的响应进行断言。


    开发人员在开发新的 API 端点时曾尝试扩充这个现有测试套件；然而，我们并未对其进行彻底调查，我也不太清楚现有测试覆盖率（非代码覆盖率）以及该套件的质量究竟如何。简而言之，我没有足够的时间深入钻研这个现有代码库，弄清其测试套件的真实状况。


    对该组件的信心可以这样表述：“只要它不崩溃，不导致 Creditcoin 质押仪表盘产生错误，并且 Creditcoin 质押仪表盘能正确显示奖励图表，那么它可能就没问题。”这被视为非关键任务组件，因此制定了上述验收标准。

    '
- fmt: '### Testing Creditcoin Staking Dashboard


    The upstream version of this component is at [`https://github.com/paritytech/polkadot-staking-dashboard`](https://github.com/paritytech/polkadot-staking-dashboard).
    If we look more carefully at its test suite from the summer of 2023, we can see
    that there isn’t much in there, not publicly visible at least. CI jobs are executed
    on every pull request, and they would run linter and build jobs. The only test
    file I could find is called `graphs.test.ts`, and it exercises a few helper functions.
    There doesn’t seem to be anything else in the form of unit or component testing,
    nor any sort of visual automated testing with tools such as Selenium or Playwright.
    Unlike other components from the Polkadot ecosystem, this one doesn’t appear to
    have other test jobs scheduled in a private GitLab CI or Jenkins instance.


    Now it is entirely possible that there is internal testing being done on this
    application and/or automated test suite present as part of another git repository.
    It’s hard for me to believe that there isn’t. It is just that I wasn’t able to
    find anything obvious that would be publicly available on GitHub. So not the ideal
    situation to be in if you are working on a downstream fork but what can you do.
    It’s a risk that you have to accept the moment you fork the git repository and
    decide to use it.


    For the Creditcoin fork, I’ve gone ahead and enabled all of our standard tools
    – pre-commit CI, Dependabot, CodeQL, MegaLinter, etc. Some of these tools still
    report lots of issues against the code base, which were part of the initial state
    of this component. Not every one of these issues was deemed important enough to
    be fixed unlike in Creditcoin 3 where all of the reported issues were actually
    fixed.


    Because of the limited timeframe for developing and releasing Creditcoin v2.3,
    the team agreed on going forward with a simple manual test plan – around 20 test
    scenarios which cover the most visible aspects of branding and happy path functionality
    – that is, make sure it funds and nominates validators without any obvious issues
    or problems. This doesn’t mean there are no bugs; of course, there are. It is
    just that most of them were not critical enough to be a show-stopper. Many bugs
    were fixed in future downstream releases too.


    Keep in mind that this test plan was initially developed following visual clues
    from the Polkadot Staking Dashboard before any staking functionality was available
    in Creditcoin and has undergone multiple changes and improvements while being
    actively executed. It is just one more of these situations where as a tester you
    have to prepare for the unknown.


    In addition every pull request was tested manually – verify that whatever problem
    is supposed to be fixed was actually fixed and that nothing seems broken as mentioned
    already above.


    On the practical side, this means git check out the pull request, build it locally,
    and run a local Creditcoin blockchain before being able to reproduce and test
    these pull requests. This flow has been improved in Creditcoin 3.0.


    ### Testing `creditcoin-cli`


    `creditcoin-cli` is a standard TypeScript application designed to be executed
    in the terminal, more precisely to be executed inside a running docker container.


    There are two main subcomponents which are tested in a fairly straightforward
    fashion – utility and helper functions are exercised via unit tests, while the
    actual commands are exercised via an integration test suite in the same way a
    node operator would trigger these commands. Both test suites are written in TypeScript
    using the Jest testing framework.


    There is a clear separation between these two test suites – unit tests can be
    executed without any external dependencies, while integration tests require a
    running `creditcoin-node(s)` and an Ethereum compatible blockchain (e.g., `Hardhat`).
    All of this is running locally in isolation, and the predefined accounts `Alice`
    & `Bob` are used.


    In terms of assertions, the integration tests reuse existing helper functions
    and the blockchain API to assert on expected status. They also assert on command
    output to stdout!


    Due to the fast development pace, `creditcoin-cli` was initially tested manually
    simply by using the commands and trying to become a validator inside a PoS chain.
    I found lots of edge cases, bugs, and small mistakes which have been corrected
    before the official release. The unit and integration test suites were born out
    of this experience and at the moment of this writing are still work in progress
    as most testing efforts are.


    An interesting quirk, for example, is that when a new participant wants to join
    the Creditcoin blockchain, they first need CTC funds in their account. The setup
    process requires executing the `registerAddress` and `requestCollectCoins` extrinsics.
    These are meant to allow an external party to prove ownership over an Ethereum
    wallet and later convert from a G-CRE token on Ethereum into CTC on Creditcoin
    mainnet.


    The trouble here is that both extrinsic calls have transaction fees associated
    with them, and for a newcomer, there is no way to get started on Creditcoin without
    external funding. This also presents a problem for testing because we need funded
    accounts before we can claim any more funds. During isolated testing that’s resolved
    relatively easily by issuing a sudo transaction to update the balance of the testing
    account because we know the secrets for the sudo account! When testing against
    Testnet or Mainnet, we need to use already funded accounts, and some steps cannot
    be executed twice, so you can’t really cover all of the testing scenarios.


    At the time of writing of this book, this problem still exists and hasn’t been
    resolved. I think it’s always been there as part of the interaction flow in Creditcoin
    but hasn’t surfaced earlier because up to this point unassisted external participation
    has been limited. The easiest way to resolve the problem is probably to drop transaction
    fees for `registerAddress` and `requestCollectCoins` extrinsics.


    The `creditcoin-cli` test suites automatically collect code coverage metrics and
    send them to [`https://app.codecov.io/gh/gluwa/creditcoin/tree/main/scripts%2Fcc-cli`](https://app.codecov.io/gh/gluwa/creditcoin/tree/main/scripts/cc-cli);
    however, this metric is not used to inform the development of the test suite.
    At the time of writing, the focus of the cli integration test suite is to exercise
    the `wizard` command and also exercise a full validator cycle simulation as happy-path
    test scenarios. A few other commands are tested as well, but there wasn’t a comprehensive
    test coverage for all of commands available. Such test coverage was added later,
    after the initial release of this component.'
