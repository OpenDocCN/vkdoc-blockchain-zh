- fmt: '# Creditcoin 3.0


    `Creditcoin 3.0` is the next evolution of the `Creditcoin` blockchain evolving
    from a specialized blockchain to record loan transactions into a more generic
    chain targeting real-world asset management. It is a fully EVM-compatible Layer
    1 blockchain. In other words, it supports smart-contract development and is compatible
    with many popular tools used in the Ethereum ecosystem, for example, wallet apps
    and smart-contract development tools. `Creditcoin 3.0` is built with the `Substrate`
    framework adding a special EVM compatibility layer on top of it and uses the nominated-proof-of-stake
    consensus algorithm like its predecessor.


    The two main design features are EVM compatibility and the so-called Universal
    Oracle which unlocks multi-chain information streams and cross-chain transactions
    to help build and deploy multi-chain contracts. Development work is performed
    in phases, and at the time of writing this book, only the EVM compatibility layer
    has been implemented.


    `Creditcoin 3.0` is proposed as an independent blockchain, rather than an incremental
    upgrade from the 2.x family which again greatly simplifies development and testing.
    The original proposal also states that `Creditcoin 2` functionality will be implemented
    as an L2 on `Creditcoin 3.0`. I am assuming that would be a [set of] smart-contract(s)
    able to record the loan cycle flow. At the time of writing, these implementation
    details are non-existent though.


    **Note**


    The public announcement of `Creditcoin 3.0` Testnet ^([⁸](#fn8)) also mentions
    renaming of existing blockchains. The previous `Creditcoin 2` will be renamed
    to *“Creditcoin Classic,”* and the new EVM-compatible v3.0 will simply be named
    *“Creditcoin.”* I will keep using explicit version numbers throughout the rest
    of this book in order to avoid confusion.


    ## Components of Creditcoin 3.0


    I am going to outline the most important components of `Creditcoin 3.0` here.
    As it is a Substrate-based chain, some of the items are kind of the same as with
    `Creditcoin 2`.


    ### Polkadot-sdk


    This is the core `Substrate` framework used to build the blockchain as described
    previously. In versions newer than the one used for `Creditcoin 2`, upstream maintainers
    have decided to merge several git repositories together and archive the old ones.
    This is the new name.


    `Creditcoin 3.0` uses a fork which originally follows the `release-polkadot-v1.1.0`
    branch adding a few patches on top of it.


    Source: [`https://github.com/gluwa/polkadot-sdk`](https://github.com/gluwa/polkadot-sdk)


    ### Frontier


    This is an Ethereum compatibility layer for `Substrate` providing additional pallets
    which you may include in a runtime implementation. This component allows each
    `Substrate` account to automatically have a so-called “associated EVM address”
    which can be used for any EVM-related transactions. This is the component which
    provides EVM Compatibility and allows blockchain users to deploy smart contracts
    on `Creditcoin 3.0`. This is how it looks like.


    ![](images/629923_1_En_7_Chapter/629923_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1**


    EVM compatibility inside a Substrate-based chain


    An important note here is that `Substrate` and Ethereum use different address
    formats and the addresses are of different lengths too. Ethereum addresses start
    with the prefix `“0x,”` while `Substrate` ones don’t (and they always start with
    a 5). Ethereum style addresses are 20 bytes long, while `Substrate` ones are 32
    bytes. This is why in `Creditcoin 3.0` each account has two different addresses
    – the native `Substrate` address and a virtual EVM address which is called an
    associated address.


    Source: [`https://github.com/gluwa/frontier`](https://github.com/gluwa/frontier)


    ### Creditcoin3


    This is the main source code repository for the 3.0 version which contains the
    blockchain runtime implementation, the Docker container specification, and a few
    other bits. The main difference with `Creditcoin 2` is that the majority of this
    repository is plumbing code – at the time of writing, there are no custom pallets,
    no custom transactions, and almost no additional RPC calls.


    Source: [`https://github.com/gluwa/creditcoin3`](https://github.com/gluwa/creditcoin3)


    ### EVM Tracing RPC


    This is an internal component, part of the `creditcoin3-node` client which exports
    a number of RPC methods capable of tracing through the transactions which have
    occurred on the EVM layer inside of a Substrate-based chain, for example, transactions
    inside smart-contracts. The main purpose of this component is to expose the information
    necessary for block explorers such as `Blockscout`. Without this, a block explorer
    application will still be able to see each block and the transactions recorded
    inside of it; however, it won’t be able to traverse inside of the EVM-related
    transactions and display more granular details about them.


    The code for these RPCs comes from the `Moonbeam` blockchain and has been merged
    inside of the `creditcoin3-node` in [`https://github.com/gluwa/creditcoin3/pull/169`](https://github.com/gluwa/creditcoin3/pull/169).
    Because this is a very large chunk of third-party code, it has been manually vetted
    that it performs as expected. Initially the RPC methods exposed by this component
    were conditionally enabled via a compiler flag and afterward have been included
    as part of the standard build.


    ### Precompile(s)


    This is a component internal to the `gluwa/creditcoin3` repository which was added
    after the official announcement of the `Creditcoin 3 Testnet`. This component
    allows you to bridge the gap between the Ethereum side of `Creditcoin 3` and the
    `Substrate` runtime and interact with the runtime from the EVM side which isn’t
    normally possible.


    From an external point of view, this component acts as a smart-contract which
    is always available at a fixed address, a sort of a predefined collection of smart-contract(s).
    Implementation wise there is an entry-function which is written in Rust and is
    part of the `Creditcoin` runtime. This is very similar to an extrinsics function.
    Then there is the smart-contract interface definition written in the `Solidity`
    language. The important part here is the predefined address at which the contract
    is going to be deployed.


    At the time of writing this book, `Creditcoin 3` contains a single precompile
    called `substrate-transfer`, whose goal is to make it easier to fund EVM addresses
    on `Creditcoin` from existing `Substrate` wallets in just a single step (otherwise
    that would take two steps). It is available at address `0x0000000000000000000000000000000000000Fd1`
    ➤ [`https://creditcoin-testnet.blockscout.com/address/0x0000000000000000000000000000000000000Fd1`](https://creditcoin-testnet.blockscout.com/address/0x0000000000000000000000000000000000000Fd1)


    A counter example which contains more precompiled contracts is the `Moonbeam`
    network; see [`https://docs.moonbeam.network/builders/pallets-precompiles/precompiles/`](https://docs.moonbeam.network/builders/pallets-precompiles/precompiles/)
    and [`https://github.com/moonbeam-foundation/moonbeam/tree/master/precompiles`](https://github.com/moonbeam-foundation/moonbeam/tree/master/precompiles)
    for more details.


    ### Creditcoin 3 CLI


    Similar to the `Creditcoin 2` version, this is a command line program packaged
    inside the container image and meant to be used by operators of validator nodes.
    It is part of the `gluwa/creditcoin3` git repository. This component started as
    a copy of the existing command line source code for `Creditcoin 2` with two important
    extras: commands to handle evm transfers + support of proxy functionality.'
