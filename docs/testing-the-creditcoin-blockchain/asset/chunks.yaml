    ## How Do You Build a Blockchain Implementation


    A blockchain implementation is a complex infrastructure type of software, much
    like an operating system is or a database management engine is. One could go about
    implementing all of the respective components and algorithms required in order
    to have something that looks like and operates like a distributed ledger.


    Luckily the majority of the software companies are not operating system or database
    vendors. Rather these companies are in the business of solving a particular problem
    for their customers, for example, securely recording loan transactions, by using
    blockchain technology, thus shifting the focus of blockchain implementations elsewhere.


    It seems to me that the majority of practical blockchain-enabled applications
    today are either built on top of an existing blockchain platform or are built
    as stand-alone networks using a blockchain development framework or at the very
    least as a fork of another existing blockchain implementation.


    As testers and QA engineers who work with blockchain, we need to have a good understanding
    of the basic principles but will spend most of our energy testing business domain
    functionality and specific blockchain components as required by stakeholders.
    A very small portion of us will actually work on testing the underlying algorithms
    and complexities involved. Even though I am directly testing the Creditcoin blockchain
    myself, it is relatively rare that I need to venture deeper into the inner workings
    of the Substrate framework, especially for the purposes of testing something.


    Here’s a code snippet of how a blockchain implementation looks like using the
    Substrate framework (Listing [2-4](#629923_1_En_2_Chapter.xhtml#PC4)).


    ```

