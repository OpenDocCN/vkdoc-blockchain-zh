    \ from scratch. Still not a good publicity, but the negative effects should be\
    \ minimal.\n\n### Documentation Review\n\nBefore the introduction of staking,\
    \ the existing documentation for version 1.x and 2.0 included a fairly limited\
    \ amount of user facing instructions. That was the so-called “Creditcoin Mining\
    \ Node Setup” which basically told the user how to generate a public/private keypair\
    \ and how to use their public address when starting a Creditcoin container. It\
    \ has been removed in [`https://github.com/gluwa/creditcoin/pull/1505`](https://github.com/gluwa/creditcoin/pull/1505/files#diff-1406c2e627ea359e963d331f2f4a9d0d1833056ff987246778131f3e1b753f82).\n\
    \nThe new documentation explains the concept of “staking,” the differences between\
