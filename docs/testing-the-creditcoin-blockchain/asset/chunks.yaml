    *   Yours truly joins the team.


    *   Aug 03, 2021: [`https://github.com/gluwa/creditcoin-legacy-consensus-rust`](https://github.com/gluwa/creditcoin-legacy-consensus-rust)
    created.


    *   Sep 21, 2021: [`https://github.com/gluwa/sawtooth-legacy-sdk-rust`](https://github.com/gluwa/sawtooth-legacy-sdk-rust)
    first commit in the fork.


    *   Sep 29, 2021: [`https://github.com/gluwa/creditcoin-legacy-gateway`](https://github.com/gluwa/creditcoin-legacy-gateway)
    created.


    Timeline of CI enablement:


    *   Feb 25, 2020: **creditcoin-legacy-docker-compose-testnet** – CI status for
    GitHub Pages build, no real testing in this repository.


    *   Jul 15, 2020: **creditcoin-legacy-docker-compose** – CI status for GitHub
    Pages build, no testing until after I joined the team.


    *   Oct 27, 2020: **sawtooth-legacy-core** – first CI status reported on a commit
    in the fork, appears to be an Azure pipeline. Configuration file is not in git,
