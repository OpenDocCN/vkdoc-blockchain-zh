  trans: '

    ### 被测产品


    在本书中，我们将用一个虚构的名称来指代被测应用：*NFT 市场*。请注意，其名称和描述均为虚构；但核心产品功能并非如此。


    **提示**


    **非同质化代币**或 **NFT** 是记录在区块链上的独特数字资产，具有加密可验证的所有权。NFT 的元数据使其独一无二，这意味着任意两个 NFT 都不可能相同。例如，这些元数据可以链接到数字文件。你可以将
    **NFT** 视为一种标识符或收据，用于证明所有权和真实性。术语 *非同质化* 意味着它是唯一的，且无法被其他东西替代；换句话说，每个代币都是非常特定的。另一端则是可互换的常规加密货币代币，它们彼此相似，可以轻松交换。


    NFT 是通过一种名为“铸造”（minting）的过程创建的，该过程也涉及与智能合约的交互。铸造 NFT 的主要目标是将你的数字内容上传到区块链，同时证明你对你数字艺术或物品的所有权。根据实际区块链的不同，NFT
    指向的数字艺术可能采用链上或链下存储！


    实现 NFT 的智能合约遵循区块链生态系统中已建立的标准，例如 `ERC-721` 和 `ERC-1155`。相比之下，流行的加密代币则遵循另一种标准，例如
    `ERC-20`。有关这些标准的更多信息，可参阅 [`https://vegavid.com/blog/erc20-vs-erc721-vs-erc1155/#`](https://vegavid.com/blog/erc20-vs-erc721-vs-erc1155/)。


    数字内容可以被无限复制，并且无法区分一个文件与另一个文件，也就是说，原件与副本之间没有区别。使用 NFT 的唯一标识符有助于区分一个 NFT 与另一个 NFT——即区分一个数字文件与另一个数字文件，即使它们的内容相同。这反过来为希望在数字世界中从自己的作品中获利的创作者开辟了更多可能性。


    *NFT 市场* 是一个允许用户根据其订阅等级，交易代表图像的 NFT 资产的应用。用户可以查看、购买、出售或拍卖不同的数字资产。他们还可以获取价值点数，并监控其资产如何根据其他用户的互动（例如，他们的图像获得了多少个赞）而增值。


    *NFT 市场* 应用由一个传统的 Web 2.0 前端、一个铸造流程以及一组智能合约组成，这些合约用于：


    - 管理定义了多种角色的用户账户：*普通用户、管理员、艺术家*。每种角色允许不同的功能集。

    - NFT 铸造流程，涉及创建数字物品或文件、设计伴随该物品的艺术品、建立包含代码的文本文件、将文件上传到 NFT 智能合约，并将其发布到 NFT 市场。

    - 处理资产交易，例如，转移给其他用户。在铸造过程中，智能合约用于分配所有权并处理 NFT 的转移，同时证明物品的真实性。当一件艺术品被铸造为 NFT 时，它会被分配一个直接链接到单个区块链地址的唯一标识符。每件数字艺术品都有一个所有者，其所有权详细信息在区块链上公开可用且可验证。即使创作者铸造了同一物品的
    1,000 个 NFT，其中每一个都可以通过其唯一标识符轻松与其他区分开来。

    - 实现市场及相关应用功能。想象一个网站，你可以在其中上传图像，并将此图像转换为数字资产，并将其包含在你的个人资料账户中，就像艺术家在陈列室中展示所有待售画作一样。概念相同，但增加了其他因素，例如社交媒体点赞和网站浏览量：越多人喜欢，获得的增值越大，艺术家能赚到的钱就越多。


    该应用部署在 Polygon 区块链网络上，其主要目标是：


    1.  鼓励用户根据他们可以铸造、获取、出售或转让的资产来参与订阅。

    2.  通过订阅和铸造费用，增加市场中可用资产的价值。


    用户能够使用钱包应用（在本例中为 MetaMask）来交换他们的 NFT。

    '
- fmt: "### Testing\n\nSebastian has described his testing strategy in a Medium article,\
    \ [`https://medium.com/@sebas.viquez/simple-test-strategy-for-web3-apps-using-hardhat-testing-framework-2e5efa21e98e`](https://medium.com/@sebas.viquez/simple-test-strategy-for-web3-apps-using-hardhat-testing-framework-2e5efa21e98e),\
    \ and I urge you to read it in detail. Here’s the gist of it:\n\n- Start with\
    \ unit testing smart contracts, using the popular `Hardhat` tool in order to verify\
    \ the correctness of each individual function inside your smart contract(s). You\
    \ can configure `Hardhat` to use its own embedded Ethereum chain, another local\
    \ chain like `Ganache`, or an external chain like `Goerli` (a named Ethereum Testnet\
    \ instance).\n\n- Then move onto integration testing in order to exercise different\
    \ parts of the Web3 application, focusing on interactions between multiple smart\
    \ contracts.\n\n- Move onto security-related testing with tools like `MythX`^([^(24)](#fn24))\
    \ or `Slither`^([^(25)](#fn25)) to analyze your smart contracts for common security\
    \ vulnerabilities. Given these are more like static analysis tools, I personally\
    \ would move them toward the bottom of the testing pyramid and include them very\
    \ early in the process.\n\n- End-to-end testing which also includes the user interface\
    \ for the application. For the UI portion of the tests, use your favorite tool.\
    \ An interesting piece here is the `truffle-assertions`^([^(26)](#fn26)) library\
    \ which allows tests to assert on events emitted by smart contracts.\n\n- What\
    \ Sebastian calls “Blockchain Network Testing” is actually deploying your contracts\
    \ to a blockchain network running in the real world, rather than using a chain\
    \ locally on your computer, and then exercising the application and the test suite\
    \ again. Due to the cost of tokens on a real chain, a testnet-like environment,\
    \ for example, `Goerli` and `Sepolia`, can be used before moving to mainnet. Inevitably\
    \ that leads to the test suite having to execute some scenarios conditionally.\
    \ This approach is also something that I like to do quite a lot, as described\
    \ in earlier chapters of this book. The most certain way to know whether the application\
    \ will work in real life is to execute as much as you can in production.\n\n-\
    \ Sebastian describes load and performance testing using the `k6`^([^(27)](#fn27))\
    \ tool; however, any tool you are familiar with should work here. On the other\
    \ hand, my personal approach for performance and load testing has been to interact\
    \ with the blockchain directly, sending transactions using a chain-specific client\
    \ library.\n\nA notable testing challenge for *The NFT Marketplace* was the fact\
    \ that your entry point for testing is a random address on a blockchain and not\
    \ much else. One way to interact with the application and retrieve data is by\
    \ using a client library, for example, `ethers.js`; another way is to extract\
    \ the data and/or perform interactions using higher-level tools such as `Postman`\
    \ or the `RestAssured` library. This isn’t something I am very keen on because\
    \ I believe it represents more work on my side as a test engineer and because\
    \ I also prefer to program rather than use one-size-fits-all types of tools; however,\
    \ it is perfectly possible. Remember that in order for a blockchain network to\
    \ be useful for external parties, it exports an API interface usually via standard\
    \ RPC protocols, and this is where tools like `Postman` can plug into. Maybe that’s\
    \ more useful in the situation where you as a tester need to perform exploratory\
    \ testing and need tools which allow you to interact with the blockchain manually.\
    \ I’ve had limited similar experience due to the nature of my work, and it’s hard\
    \ for me to relate.\n\nAnother interesting challenge mentioned by Sebastian is\
    \ knowing how much every operation in *The NFT Marketplace* costs and also to\
    \ some extent being able to control that because transaction costs will have a\
    \ direct impact on user experience, application adoption, and the price of participating\
    \ in a marketplace. Here Sebastian has made extensive use of the `Ganache`^([^(28)](#fn28))\
    \ tool in order to easily simulate specific conditions before examining and testing\
    \ *The NFT Marketplace*. You can think of `Ganache` as a tool which lets you mock\
    \ and control everything about the blockchain before testing the application that\
    \ sits on top of it. This approach should make it possible for you as a tester\
    \ to be able to understand all of the internals of your smart contracts under\
    \ test even before deploying to a public blockchain.\n\nA short demonstration\
    \ video from testing this NFT marketplace application was previously available\
    \ on LinkedIn. In it we could notice the following testing scenarios executed\
    \ which give us a bit more insight into the functionality under test:\n\n- Should\
    \ transfer NFT and pay 250MATIC off market royalties\n- Should not mint tokens\
    \ if contract is paused\n- Should not mint tokens if public mint locked\n- Should\
    \ not let users mint more than 5 NFTs\n- Should mint more than max NFTs\n- Should\
    \ only allow admin to set token URI\n- Should not pay royalties if in excludedList\n\
    - Should not transfer NFT if not enough token for royalties\n- Should add/remove\
    \ from excludedList\n- Should transfer NFTs using market transfer method and award\
    \ the artist 6% of sale amount\n\nThe code from the demonstration mentioned above\
    \ is shown in Listing 8-1.\n\n*Listing 8-1. nft-test.js*\n\n```javascript\nconst\
    \ { expect } = require('chai');\nconst { ethers } = require('hardhat');\n\ndescribe('NFT',\
    \ async () => {\n  let admin, artist, owner1, owner2;\n  const offMarketTransferFee\
    \ = ethers.utils.parseUnits(\"250\", \"ether\");\n  const mintPrice = ethers.utils.parseUnits(\"\
    75\", \"ether\");\n  const maxNFTS = 10;\n  let token, nft;\n\n  beforeEach(async\
    \ () => {\n    ([admin, artist, owner1, owner2] = await ethers.getSigners());\n\
    \    const Token = await ethers.getContractFactory('MockToken');\n    token =\
    \ await Token.deploy();\n    await token.deployed();\n    await token.transfer(\n\
    \      owner1.address,\n      ethers.utils.parseUnits(\"500\", \"ether\")\n  \
    \  );\n    await token.transfer(\n      owner2.address,\n      ethers.utils.parseUnits(\"\
    500\", \"ether\")\n    );\n    const NFT = await ethers.getContractFactory('SNFT');\n\
    \    nft = await NFT.deploy(artist.address, token.address, 6, offMarketTransferFee,\
    \ mintPrice, maxNFTS);\n    await nft.deployed();\n    nft = nft.connect(admin);\n\
    \    await nft.safeMint(artist.address, \"0x\");\n  });\n\n  it('Should transfer\
    \ NFT and pay 250MATIC off market royalties', async () => {\n    let ownerNFT,\
    \ balanceSender, balanceArtist;\n    nft = nft.connect(artist);\n    await nft.transferFrom(\n\
    \      artist.address,\n      owner1.address,\n    );\n    ownerNFT = await nft.ownerOf(0);\n\
    \    expect(ownerNFT).to.equal(owner1.address);\n    await token.connect(owner1).approve(nft.address,\
    \ offMarketTransferFee);\n    await nft.connect(owner1).transferFrom(\n      owner1.address,\n\
    \      owner2.address,\n    );\n  });\n});\n```"
  raw: '### Testing


    Sebastian has described his testing strategy into a Medium.com article, [`https://medium.com/@sebas.viquez/simple-test-strategy-for-web3-apps-using-hardhat-testing-framework-2e5efa21e98e`](https://medium.com/@sebas.viquez/simple-test-strategy-for-web3-apps-using-hardhat-testing-framework-2e5efa21e98e),
    and I urge you to read it in details. Here’s the gist of it:


    *   Start with unit testing smart contracts, using the popular Hardhat tool in
    order to verify the correctness of each individual function inside your smart
    contract(s). You can configure Hardhat to use its own embedded Ethereum chain,
    another local chain like Ganache, or an external chain like Goerli (a named Ethereum
    Testnet instance).


    *   Then move onto integration testing in order to exercise different parts of
    the Web3 application. In particular focusing on interactions between multiple
    smart contracts.


    *   Moving onto security-related testing with tools like MythX^([^(24)](#fn24)),
    or Slither^([^(25)](#fn25)), to analyze your smart contracts for common security
    vulnerabilities. Given these are more like static analysis tools, I personally
    would move them toward the bottom of the testing pyramid and include them very
    early into the process.


    *   End-to-end testing which also includes the user interface for the application.
    For the UI portion of the tests, use your favorite tool. An interesting piece
    here is the truffle-assertions^([^(26)](#fn26)) library which allows tests to
    assert on events emitted by smart contracts.


    *   What Sebastian calls “*Blockchain Network Testing**”* is actually deploying
    your contracts to a blockchain network running in the real world, rather than
    using a chain locally on your computer, and then exercising the application and
    the test suite again. Due to the cost of tokens on a real chain, a testnet like
    environment, for example, Goerli and Sepolia, can be used before moving to mainnet.
    Inevitably that leads to the test suite having to execute some scenarios conditionally.
    This approach is also something that I like to do quite a lot as described in
    earlier chapters in this book. The most certain way to know whether the application
    will work in real life is to execute as much as you can in production.


    *   Sebastian describes load and performance testing using the k6^([^(27)](#fn27))
    tool; however, any tool that you are familiar with should work here. On the other
    hand, my personal approach for performance and load testing has been to interact
    with the blockchain directly, sending transactions using a chain-specific client
    library.


    A notable testing challenge for *The NFT Marketplace* was the fact that your entrypoint
    for testing is a random address on a blockchain and not much else. One way to
    interact with the application and retrieve data is by using a client library,
    for example, *ethers.js*; another way is to extract the data and/or perform interactions
    using higher level tools such as Postman or the RestAssured library. This isn’t
    something I am very keen on because I believe it represents more work on my side
    as a test engineer and because I also prefer to program rather than use one-size-fits-all
    type of tools; however, it is perfectly possible. Remember that in order for a
    blockchain network to be useful for external parties, it exports an API interface
    usually via standard RPC protocols, and this is where tools like Postman can plug
    into. Maybe that’s more useful in the situation where you as a tester need to
    perform exploratory testing and need tools which allow you to interact with the
    blockchain manually. I’ve had limited similar experience due to the nature of
    my work, and it’s hard for me to relate.


    Another interesting challenge mentioned by Sebastian is knowing how much every
    operation in *The NFT Marketplace* costs and also to some extent being able to
    control that because transaction costs will have a direct impact on user experience
    and application adoption and the price of participating in a marketplace. Here
    Sebastian has made extensive use of the Ganache^([^(28)](#fn28)) tool, in order
    to easily simulate specific conditions before examining and testing *The NFT Marketplace*.
    You can think about Ganache as a tool which lets you to mock and control everything
    about the blockchain before testing the application that sits on top of it. This
    approach should make it possible for you as a tester to be able to understand
    all of the internals of your smart contracts under test even before deploying
    to a public blockchain.


    A short demonstration video from testing this NFT marketplace application was
    previously available on LinkedIn. In it we could notice the following testing
    scenarios executed which give us a bit more insight into the functionality under
    test:


    *   Should transfer NFT and pay 250MATIC off market royalties


    *   Should not mint tokens if contract is paused


    *   Should not mint tokens if public mint locked


    *   Should not let users mint more than 5 NFTs


    *   Should mint more than max NFTs


    *   Should only allow admin to set token URI


    *   Should not pay royalties if in excludedList


    *   Should not transfer NFT if not enough token for royalties


    *   Should add/remove from excludedList


    *   Should transfer NFTs using market transfer method and award the artist 6%
    of sale amount


    The code from the demonstration mentioned above is shown in Listing 8-1.


    *Listing 8-1\. nft-test.js*


    ```

    const { expect } = require(''chai'');

    const { ethers } = require(''hardhat'');

    describe(''NFT'', async () =>  {

    let admin, artist, owner1, owner2;

    const offMarketTransferFee = ethers.utils.parseUnits("250", "ether");

    const mintPrice = ethers.utils.parseUnits("75", "ether");

    const maxNFTS = 10;

    let token, nft;

    beforeEach(async () => {

    ([admin, artist, owner1, owner2] = await ethers.getSigners());

    const Token = await ethers.getContractFactory(''MockToken'');

    token = await Token.deploy();

    await token.deployed();

    await token.transfer(

    owner1.address,

    ethers.utils.parseUnits("500", "ether")

    );

    await token.transfer(

    owner2.address,

    ethers.utils.parseUnits("500", "ether")

    );

    const NFT  = await ethers.getContractFactory(‘SNFT'');

    nft = await NFT.deploy(artist.address, token.address, 6, offMarketTransferFee,
    mintPrice, maxNFTS);

    await nft.deployed();

    nft = nft.connect(admin)

    await nft.safeMint(artist.address, "0x");

    });

    it(''Should transfer NFT and pay 250MATIC off market royalties'', async () =>
    {

    let ownerNFT, balanceSender, balanceArtist;

    nft =  nft.connect(artist);

    await nft.transferFrom(

    artist.address,

    owner1.address,


    );

    ownerNFT = await nft.ownerOf(0)

    expect(ownerNFT)

    .to

    .equal(owner1.address);

    await token.connect(owner1).approve(nft.address, offMarketTransferFee);

    await nft.connect(owner1).transferFrom(

    owner1.address,

    owner2.address,'
  trans: "\n### 测试\n\nSebastian 在 Medium 的一篇文章中描述了他的测试策略：[`https://medium.com/@sebas.viquez/simple-test-strategy-for-web3-apps-using-hardhat-testing-framework-2e5efa21e98e`](https://medium.com/@sebas.viquez/simple-test-strategy-for-web3-apps-using-hardhat-testing-framework-2e5efa21e98e)，我强烈建议你仔细阅读。以下是其核心要义：\n\
    \n- 从智能合约的**单元测试**开始，使用流行的 `Hardhat` 工具来验证智能合约中每个单独函数的正确性。你可以配置 `Hardhat` 使用其自带的嵌入式以太坊链、其他本地链（如\
    \ `Ganache`），或是像 `Goerli`（一个指定的以太坊测试网实例）这样的外部链。\n\n- 接着进行**集成测试**，以检验 Web3 应用程序的不同部分，重点关注多个智能合约之间的交互。\n\
    \n- 然后进行**安全相关测试**，使用 `MythX`^(²⁴) 或 `Slither`^(²⁵) 等工具分析你的智能合约是否存在常见安全漏洞。鉴于此工具更偏向静态分析，我个人会将它们置于测试金字塔的底部，并在流程的初期就尽早引入。\n\
    \n- 进行**端到端测试**，其中也包括应用程序的用户界面。对于测试中的 UI 部分，你可以使用自己偏好的工具。这里值得一提的是 `truffle-assertions`^(²⁶)\
    \ 库，它允许测试对智能合约发出的事件进行断言。\n\n- Sebastian 所谓的“区块链网络测试”，实际上是将合约部署到真实世界运行的区块链网络上，而不是使用本地计算机上的链，然后重新运行应用程序和测试套件。由于在真实链上消耗代币需要成本，可以先使用类似测试网的环境（例如\
    \ `Goerli` 和 `Sepolia`），然后再迁移到主网。这不可避免地导致测试套件必须根据某些场景有条件地执行。正如本书前文所述，这也是我非常推崇的一种方法。判断应用程序能否在真实环境中运行的最可靠方式，就是在生产环境中尽可能多地执行测试。\n\
    \n- Sebastian 描述了使用 `k6`^(²⁷) 工具进行**负载和性能测试**；不过，任何你熟悉的工具在此处都可以适用。另一方面，我个人进行性能和负载测试的方法是与区块链直接交互，使用特定于链的客户端库发送交易。\n\
    \n对于*The NFT Marketplace*，一个显著的测试挑战在于，你的测试入口点仅是区块链上的一个随机地址，除此之外别无他物。与应用程序交互并检索数据的一种方式是使用客户端库，例如\
    \ `ethers.js`；另一种方式是使用更高层次的工具（如 `Postman` 或 `RestAssured` 库）来提取数据和/或执行交互。我个人对此并不十分热衷，因为我认为这会为测试工程师带来更多工作量，而且我也更喜欢通过编程而非使用“一刀切”类型的工具；不过，这完全是可行的。请记住，为了让区块链网络对外部参与者有用，它通常会通过标准的\
    \ RPC 协议导出 API 接口，这正是 `Postman` 等工具可以接入的地方。当你作为测试人员需要进行探索性测试，并且需要能手动与区块链交互的工具时，这种方法可能更有用。由于我的工作性质，这方面的经验有限，因此很难感同身受。\n\
    \nSebastian 提到的另一个有趣的挑战，是了解*The NFT Marketplace*中每项操作的成本，并在一定程度上能够控制它，因为交易成本会直接影响用户体验、应用程序的采用以及参与市场的代价。为此，Sebastian\
    \ 大量使用了 `Ganache`^(²⁸) 工具，以便在检查测试*The NFT Marketplace*之前，轻松模拟特定条件。你可以将 `Ganache`\
    \ 视为一种工具，它允许你在测试基于区块链的应用程序之前，模拟并控制有关区块链的一切。这种方法应该能使你作为测试人员，甚至在将智能合约部署到公有链之前，就能理解被测合约的所有内部机制。\n\
    \n此前，LinkedIn 上有一个展示此 NFT 市场应用程序测试的简短演示视频。从中我们可以观察到以下执行的测试场景，这让我们对被测功能有了更深入的了解：\n\
    \n- 应转移 NFT 并支付 250MATIC 的场外版税\n- 如果合约暂停，则不应铸造代币\n- 如果公共铸造被锁定，则不应铸造代币\n- 不应让用户铸造超过\
    \ 5 个 NFT\n- 应允许铸造超过最大 NFT 数量\n- 仅允许管理员设置代币 URI\n- 如果地址在排除列表中，则不应支付版税\n- 如果没有足够的代币用于支付版税，则不应转移\
    \ NFT\n- 应能从排除列表中添加/移除地址\n- 应使用市场转移方法转移 NFT，并将销售额的 6% 奖励给艺术家\n\n上述演示的代码见代码清单 8-1。\n\
    \n*代码清单 8-1. nft-test.js*\n\n```javascript\nconst { expect } = require('chai');\n\
    const { ethers } = require('hardhat');\n\ndescribe('NFT', async () => {\n  let\
    \ admin, artist, owner1, owner2;\n  const offMarketTransferFee = ethers.utils.parseUnits(\"\
    250\", \"ether\");\n  const mintPrice = ethers.utils.parseUnits(\"75\", \"ether\"\
    );\n  const maxNFTS = 10;\n  let token, nft;\n\n  beforeEach(async () => {\n \
    \   ([admin, artist, owner1, owner2] = await ethers.getSigners());\n    const\
    \ Token = await ethers.getContractFactory('MockToken');\n    token = await Token.deploy();\n\
    \    await token.deployed();\n    await token.transfer(\n      owner1.address,\n\
    \      ethers.utils.parseUnits(\"500\", \"ether\")\n    );\n    await token.transfer(\n\
    \      owner2.address,\n      ethers.utils.parseUnits(\"500\", \"ether\")\n  \
    \  );\n    const NFT = await ethers.getContractFactory('SNFT');\n    nft = await\
    \ NFT.deploy(artist.address, token.address, 6, offMarketTransferFee, mintPrice,\
    \ maxNFTS);\n    await nft.deployed();\n    nft = nft.connect(admin);\n    await\
    \ nft.safeMint(artist.address, \"0x\");\n  });\n\n  it('Should transfer NFT and\
    \ pay 250MATIC off market royalties', async () => {\n    let ownerNFT, balanceSender,\
    \ balanceArtist;\n    nft = nft.connect(artist);\n    await nft.transferFrom(\n\
    \      artist.address,\n      owner1.address,\n    );\n    ownerNFT = await nft.ownerOf(0);\n\
    \    expect(ownerNFT).to.equal(owner1.address);\n    await token.connect(owner1).approve(nft.address,\
    \ offMarketTransferFee);\n    await nft.connect(owner1).transferFrom(\n      owner1.address,\n\
    \      owner2.address,\n    );\n  });\n});\n```\n"
- fmt: "```javascript\nownerNFT = await nft.ownerOf(0);\nbalanceSender = await token.balanceOf(owner1.address);\n\
    balanceArtist = await token.balanceOf(artist.address);\nexpect(ownerNFT).to.equal(owner2.address);\n\
    expect(balanceSender.toString()).to.equal(ethers.utils.parseUnits('250', 'ether'));\n\
    expect(balanceArtist.toString()).to.equal(ethers.utils.parseUnits('250', 'ether'));\n\
    ```\n\n```javascript\nit('Should not mint tokens if contract is paused', async\
    \ () => {\n  // only admin role can pause contract\n  nft = nft.connect(admin);\n\
    \  await nft.pause();\n  nft = nft.connect(owner1);\n  await expect(nft.preMint(artist.address)).to.be.reverted;\n\
    \  // make sure we can mint after unpausing\n  nft = nft.connect(admin);\n  await\
    \ nft.unpause();\n  await nft.grantMinterRole(owner1.address);\n  nft = nft.connect(owner1);\n\
    \  await token.connect(owner1).approve(nft.address, mintPrice);\n  await nft.preMint();\n\
    \  ownerNFT = await nft.ownerOf(1);\n  expect(ownerNFT).to.equal(owner1.address);\n\
