    # 使用 `Gluwa-bot` 进行基准测试和权重生成


    在 Substrate 中，基准测试是一种程序化手段，用于发现链上操作（如外部调用）的计算复杂程度。通俗来说，这与存储读取和写入的次数有关。基准测试文件由人工编写。


    随后，基准测试会作为持续集成的一部分执行，以确保它们能正常编译且不会崩溃。这是健全性测试环节。


    在发布之前，基准测试会在参考硬件上执行，生成的权重会被提交到发布分支。由于这与 `dev` 分支不同，同一提交会被自动变基并作为拉取请求发布到 `dev`
    分支。这确保了所有发布的内容也会通过 `dev` 分支，从而最大程度地减少未来的偏差以及解决 git 冲突的需求，尤其是在发布过程中。


    ## 迁移与升级测试


    在内部 Pallet 中，只有 `pallet/creditcoin/` 实际包含存储迁移。它们按顺序命名，例如 `v1`、`v2`、`v3` 等，每个迁移都在模拟环境中通过单元测试进行验证。这是为了确保迁移按预期运行——换句话说，存储条目确实被迁移了（可以理解为
    ORM 应用中的数据库迁移）。这种模拟环境还会执行迁移前/后钩子，作为对迁移函数内部错误的早期预警。然而，仍存在一些不确定性：


    -   我们是否遗漏了边界情况

    -   迁移能否在实际生产数据下工作


    这些不确定性通过两个额外的测试任务来解决：


    1.  模拟升级过程，确保其不会崩溃。

    2.  模拟链上状态和本地存储，确保存储迁移能够在不崩溃的情况下应用。


    相同的模拟通过两种不同的方法执行：


    1.  通过 `try-runtime`：这是 Substrate 框架提供的一套功能集，允许在内存中模拟升级和迁移。它会查询生产环境的 RPC 端点以获取当前链上状态，并在本地内存中进行复制。然后，它会针对本地内存存储执行迁移。如果一切顺利，我们就认为成功。这可以看作是运行时升级的健全性测试。详细的上游文档位于
    `https://paritytech.github.io/try-runtime-cli/try_runtime/`。


    2.  分叉链并进行升级：这种方法更接近现实，因为它使用真实的生产数据并执行真正的运行时升级（在隔离环境中）。首先，我们启动一个 `creditcoin-node`
    并与已有的区块链同步——例如，测试网或主网，具体取决于我们的发布目标。然后，使用一个名为 `creditcoin-fork` 的辅助工具（`https://github.com/gluwa/creditcoin-fork`），将当前的链上状态抓取并记录到一个
    JSON 文件中。这个 JSON 文件代表一个新的链规范，其中创世块是最新链上状态的副本。这允许你执行一个本地链，其存储项与生产版本匹配，但同时将开发账户注入其中并独立运行。当新创建的本地链启动并运行后，执行运行时升级以触发存储迁移。如果通过，则针对该分叉执行集成测试套件，以确保分叉在功能上仍然与原始链等效。


    对于升级和迁移测试，我们使用自托管的 GitHub 运行器，这些运行器按需部署在 Azure 中。这是因为升级和迁移工作流需要大量内存——至少需要 16 GiB。区块导入过程也是计算密集型的。


    为了方便这些测试活动，存储迁移钩子通过两种方式进行检测：


    -   每个迁移都有前后钩子，允许我们在迁移前后共享状态以进行断言。由于存储迁移在运行时执行，我们利用了 Rust 中 `assert!` 宏会导致运行时恐慌（即如果断言失败，会导致进程崩溃）这一特性。非零退出代码会导致
    CI 作业报告失败。


    -   每当可能出现边界情况时，在 `if` 语句周围使用 `warn_or_panic!` 宏。在生产节点中，此宏只会产生警告；然而，在测试期间，它也会导致崩溃。此行为通过测试期间显式配置的编译器标志来控制。你可以将其视为最后一道防线，希望在测试期间看到它崩溃，以便提醒你生产数据中存在的边界情况，但你不希望它在生产中崩溃，以免意外导致区块链停机。该宏如其名所示——要么记录警告，要么引发恐慌。


    -   一个辅助静态分析脚本，当迁移源代码直接使用 `log::warn!` 宏时，该脚本会失败。这有助于确保我们始终使用 `warn_or_panic!`
    宏，并且不会意外删除或绕过它。否则，由实际生产数据触发的边界情况分支在测试期间将不会失败，团队可能无法察觉。


    除此之外，`creditcoin` pallet 定义了一个 `STORAGE_VERSION` 常量，该常量必须与最后一个迁移的编号匹配。这也通过每次迁移中的断言以及静态分析脚本来强制执行——最后一个迁移文件的编号必须与
    Pallet 中定义的 `STORAGE_VERSION` 常量值匹配！


    以下是一个迁移如何在两个 Pallet 之间移动存储项的例子：


    ```

    impl Migrate for Migration {

    fn pre_upgrade(&self) -> Vec {

    let count = Authorities::::iter().count();

    assert!(count != 0, "Authorities not found during migration");

    let old_pallet = TaskScheduler::::name();

    let new_pallet = SCHEDULER_PREFIX;

    if old_pallet == new_pallet {

    log::info!(

    target: "runtime::Creditcoin",

    "pre-migrate V7, nothing to do.",

    );

    return vec![];

    }

    let storage_prefix = Authorities::::storage_prefix();

    let new_pallet_prefix = twox_128(new_pallet.as_bytes());

    let authorities_prefix = [&new_pallet_prefix, &twox_128(storage_prefix)[..]].concat();

    let new_pallet_prefix_iter = frame_support::storage::KeyPrefixIterator::new(

    authorities_prefix.clone(),

    authorities_prefix,

    |key| Ok(key.to_vec()),

    );

    assert!(

    new_pallet_prefix_iter.count() == 0,

    "Expected new authorities storage to be empty"

    );

    assert!( as GetStorageVersion>::on_chain_storage_version()  Weight {

    let count: u32 = Authorities::::iter().count().saturated_into();

    let creditcoin = TaskScheduler::::name();

    move_storage_from_pallet(

    Authorities::::storage_prefix(),

    creditcoin.as_bytes(),

    SCHEDULER_PREFIX.as_bytes(),

    );

    crate::weights::WeightInfo::::migration_v7(count)

    }

    fn post_upgrade(&self, ctx: Vec) {

    assert_eq!(

    StorageVersion::get::>(),

    7,

    "expected storage version to be 7 after migrations complete"

    );

    let new_pallet = SCHEDULER_PREFIX;

    let new_pallet_prefix = twox_128(new_pallet.as_bytes());

    let new_pallet_prefix_iter = frame_support::storage::KeyPrefixIterator::new(

    new_pallet_prefix.to_vec(),

    new_pallet_prefix.to_vec(),

    |key| Ok(key.to_vec()),

    );

    let past_count = usize::from_le_bytes(ctx.try_into().unwrap());

    assert_eq!(new_pallet_prefix_iter.count(), past_count);

    }

    }

    ```


    其余迁移的源代码位于 `https://github.com/gluwa/creditcoin/tree/dev/pallets/creditcoin/src/migrations`。

