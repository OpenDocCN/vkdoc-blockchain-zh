- fmt: "### Transaction Processor(s)\n\n在 Hyperledger Sawtooth 框架的架构中，事务集合通过一个可扩展的系统（称为交易族）来定义。每个应用程序为其独特需求定义自定义交易族；这是区块链应用的业务逻辑。对于\
    \ Creditcoin 而言，这包括如何建模贷款周期并将其工件记录到区块链上。\n\nSawtooth 框架允许应用开发者使用他们选择的编程语言编写交易处理器。有效的交易族集合最初在创世块中配置，并作为链上值保存，后续可以进行更改。Creditcoin\
    \ 1.x 使用两个独立的交易处理器，它们作为节点的一部分以独立容器的形式运行。\n\n`Settings-tp` 最初源自 `hyperledger/sawtooth-settings-tp:1.0`（Python），后来升级为\
    \ `hyperledger/sawtooth-settings-tp:1.2`（Rust）。此交易处理器负责存储链上设置，例如网关 URL（见下文）、有效的交易族及其版本、共识算法及其属性等。它作为一个键值对存储在区块链上，并且还可以定义供其他组件使用的自定义设置。\n\
    \n`CREDITCOIN` 交易族处理器理解贷款周期的概念。其版本从 1.0、1.1、1.2 一路演进到 1.8。客户端发送的每个事务都包含一个版本号，并且可以被具有兼容版本号的交易处理器理解。换句话说，这就是协议升级的方式。`CREDITCOIN`\
    \ 族处理器使用 Protocol Buffers 数据格式解析原始事务负载，并在将事务交给验证器组件写入链之前执行一些维护任务，例如关闭过期的贷款请求。\n\
    \nCreditcoin 交易处理器版本 1.0 到 1.7 最初使用 C++ 实现，并一直使用到 2021 年中旬我开始处理 Creditcoin 时。\n\
    \n源代码：[`https://github.com/gluwa/creditcoin-legacy/tree/dev/ccprocessor`](https://github.com/gluwa/creditcoin-legacy/tree/dev/ccprocessor)\n\
    \n大约在同一时间，Creditcoin 交易处理器使用 Rust 完全重写，并向后兼容支持 1.0 到 1.7 族，这也是我主要使用的版本。这个新实现旨在作为之前提到的切换到\
    \ Sawtooth 1.2 的一部分进行部署。请注意，尽管版本号格式看起来像兼容的 SemVer 数字，但同一交易处理器族的不同版本可能彼此不兼容。这意味着使用旧版本的区块链运营商可能无法处理来自新客户端的事务，他们应该进行升级。例如，这可能是由于后续版本中添加了新的事务，如果由旧版交易处理器执行，将会失败。\n\
    \n最后一个支持的事务族版本是 1.8！\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-processor-rust`](https://github.com/gluwa/creditcoin-legacy-processor-rust)\n\
    \n### REST API\n\nSawtooth 框架提供了一个 REST API，允许客户端和外部应用使用常见的 HTTP/JSON 协议与区块链交互。它提供了一个语言无关的接口，用于提交事务和读取区块。特别地，这对于在测试期间使用\
    \ `curl` 或你偏好的编程语言的库来查询区块信息非常有用。所有响应都是 JSON 格式。\n\nREST API 是构建在 Sawtooth 内部 ZeroMQ/Protobuf\
    \ 通信层之上的轻量级层。如果愿意，客户端可以完全绕过 REST API 接口，直接使用 ZeroMQ/Protobuf 与区块链通信。\n\nCreditcoin\
    \ 中使用的 REST API 组件是 `hyperledger/sawtooth-rest-api` 的一个分支，并在其基础上进行了微小的外观修补。据我所知，使用自定义容器是因为原始\
    \ `sawtooth-core` 仓库是一个单体仓库，而非其他原因。\n\n源代码：[`https://github.com/gluwa/sawtooth-legacy-core/tree/dev/rest_api`](https://github.com/gluwa/sawtooth-legacy-core/tree/dev/rest_api)\n\
    \n### Gateway\n\n网关组件促进与外部区块链的通信，以验证加密代币的转移。这就是后续版本中所谓的“链下工作者”组件。也就是说，它会确保当 Creditcoin\
    \ 记录贷款人与借款人之间的贷款事务时，双方之间有相应的、相同金额的转移被记录在外部区块链（如以太坊）上。\n\nCreditcoin 网关监听一个网络套接字，接收以下形式的请求：\n\
    \n```\n verify      \n```\n\n网关与 `CREDITCOIN` 交易处理器之间的通信协议是 ZeroMQ，而网关与区块链 RPC\
    \ 端点之间的通信依赖目标链，使用 `Nethereum` 或 `NBitcoin` 库。\n\n此组件使用 C# .NET 实现，并异步并行处理所有请求。网关实现了比特币、ERC20、以太坊和\
    \ Ethless 插件，其愿景是未来可以支持其他区块链网络。据我所知，只有以太坊经过了测试并在生产环境中得到正式支持！\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-gateway`](https://github.com/gluwa/creditcoin-legacy-gateway)\n\
    \n### SDK\n\n`Sawtooth-SDK-Rust` 和 `Sawtooth-SDK-Cxx` 是其各自上游仓库的分支，用于开发 Creditcoin\
    \ 交易族处理器。它们包含许多与 Creditcoin 相关的补丁。\n\n源代码：[`https://github.com/gluwa/sawtooth-legacy-sdk-rust`](https://github.com/gluwa/sawtooth-legacy-sdk-rust)\
    \ [`https://github.com/gluwa/sawtooth-legacy-sdk-cxx`](https://github.com/gluwa/sawtooth-legacy-sdk-cxx)\n\
    \n`Creditcoin-Shared` 是一个 C# 库，被一些使用该编程语言编写的组件使用，例如网关组件。\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-shared`](https://github.com/gluwa/creditcoin-legacy-shared)\n\
    \n请注意，在过渡到 Creditcoin 2.0 之后，所有与 1.x 相关的仓库都已重命名，其名称中包含 `-legacy-` 模式。我们曾经称之为 *processor*\
    \ 的组件现在变成了 `creditcoin-legacy-processor-rust`！在本书的其余部分，我将使用当前名称来指代各个组件，以最大程度地减少混淆。\n\
    \n### Creditcoin-Legacy-Tests\n\n这是 1.x 发布系列的主要测试套件。它是一个集成类型的测试套件，通过 RPC 端点向区块链发送事务。它由外部触发和执行，并存在于一个独立的\
    \ git 仓库中。不幸的是，该源代码仓库不公开可用，因此我们在本书中不会过多讨论它。\n\n这个仓库中的大部分基础工作在我开始研究时已经存在，我添加了一些改进和新的测试场景，但没有改变测试套件本身的整体架构。相同的代码库还被用作创建性能基准测试工具的起点。这个测试套件主要使用\
    \ C# .NET 编写，最初使用 `MSTest`，后来改用 `NUnit` 测试框架。"
  raw: "### Transaction Processor(s)\n\nIn the architecture of the Hyperledger Sawtooth\
    \ framework, the set of possible transactions are defined by an extensible system\
    \ called transaction families. Each application defines the custom transaction\
    \ families for its unique requirements; this is the business logic of the blockchain\
    \ application. In the case of Creditcoin, that is how we model a loan cycle and\
    \ record its artifacts onto a blockchain.\n\nThe Sawtooth framework allows application\
    \ developers to write transaction processors in a programming language of their\
    \ choice. The set of valid transaction families is initially configured inside\
    \ the genesis block and is kept as an on-chain value which can later be altered.\
    \ Creditcoin 1.x uses two separate transaction processors which are running independently\
    \ of each other as separate containers as part of a node.\n\n**Settings-tp** which\
    \ started as `hyperledger/sawtooth-settings-tp:1.0` (Python) and later `hyperledger/sawtooth-settings-tp:1.2`\
    \ (Rust). This transaction processor is responsible for storing on-chain settings\
    \ like Gateway URL (see below), valid transaction families and their versions,\
    \ consensus algorithm and its attributes, and others. It acts as a key-value pair\
    \ stored on the blockchain, and it is also possible to define your own settings\
    \ to be used by other components.\n\nThe **CREDITCOIN** transaction family processor\
    \ understands what a loan cycle is. Versions evolved from 1.0, 1.1, 1.2 all the\
    \ way to 1.8\\. Each transaction sent by a client carries a version number and\
    \ can be understood by a transaction processor with a compatible version number.\
    \ In other words, that’s how you can upgrade the protocol. The CREDITCOIN family\
    \ processor will parse the raw transaction payload using the Protocol Buffers\
    \ data format and also perform some house-keeping tasks like closing expired loan\
    \ requests before handing off the transaction to the Validator component for writing\
    \ onto the chain.\n\nCreditcoin transaction processor versions 1.0 through 1.7\
    \ have been initially implemented in C++ and used until mid-2021 when I started\
    \ working on Creditcoin.\n\nSource code: [`https://github.com/gluwa/creditcoin-legacy/tree/dev/ccprocessor`](https://github.com/gluwa/creditcoin-legacy/tree/dev/ccprocessor)\n\
    \nAround the same time, Creditcoin transaction processor was rewritten from scratch\
    \ using Rust with backward compatible support for families 1.0 through 1.7, and\
    \ that’s what I’ve mostly used. This new implementation was meant to be deployed\
    \ as part of the switch to Sawtooth 1.2 mentioned earlier. Note that despite the\
    \ fact that versioning scheme format looks like compatible SemVer numbers, different\
    \ versions of the same transaction processor family may be incompatible with one\
    \ another. This means blockchain operators using an older version may not be able\
    \ to process transactions coming from newer clients, and they should upgrade.\
    \ For example, this could be due to a new transaction being added in later versions,\
    \ which would fail if executed by an older transaction processor.\n\nThe last\
    \ supported transaction family version is 1.8!\n\nSource code: [`https://github.com/gluwa/creditcoin-legacy-processor-rust`](https://github.com/gluwa/creditcoin-legacy-processor-rust)\n\
    \n### REST API\n\nThe Sawtooth framework provides a REST API which allows clients\
    \ and external applications to interact with the blockchain using common HTTP/JSON\
    \ protocols. It provides a language-neutral interface for submitting transactions\
    \ and reading blocks. Notably this is useful to query information about blocks\
    \ during testing using `curl` or libraries for your favorite programming language.\
    \ All responses are in JSON format.\n\nThe REST API is a lightweight layer on\
    \ top of Sawtooth's internal ZeroMQ/Protobuf communication layer. Clients can\
    \ bypass the REST API interface entirely and use ZeroMQ/Protobuf to communicate\
    \ with the blockchain directly if they wish to do so.\n\nThe REST API component\
    \ used in Creditcoin is a fork of `hyperledger/sawtooth-rest-api` with minor cosmetic\
    \ patches on top. From what I can tell, the usage of a custom container was due\
    \ to the fact that the original sawtooth-core repository is a mono-repo rather\
    \ than anything else.\n\nSource code: [`https://github.com/gluwa/sawtooth-legacy-core/tree/dev/rest_api`](https://github.com/gluwa/sawtooth-legacy-core/tree/dev/rest_api)\n\
    \n### Gateway\n\nThe gateway component facilitates communication with external\
    \ blockchains in order to validate transfers of crypto tokens. This is the so-called\
    \ “off-chain worker” component in later versions. That is, it will make sure that\
    \ when Creditcoin records loan transactions between Lender and Borrower, there\
    \ are corresponding transfers between the same two parties, for the same amount\
    \ which are recorded on an external blockchain such as Ethereum.\n\nThe Creditcoin\
    \ gateway listens on a network socket for requests in the form:\n\n```\n verify\
    \      \n```\n\nThe communication protocol between Gateway and the CREDITCOIN\
    \ transactions processor is ZeroMQ and between Gateway and the blockchain RPC\
    \ endpoint is target dependent, either using the Nethereum or NBitcoin libraries.\n\
    \nThis component is implemented in C# .NET and handles all requests asynchronously\
    \ and in parallel. Gateway implements the Bitcoin, ERC20, Ethereum, and Ethless\
    \ plugins with the vision being that other blockchain networks could be supported\
    \ in the future. As far as I am aware, only Ethereum has been tested and officially\
    \ supported in production!\n\nSource code: [`https://github.com/gluwa/creditcoin-legacy-gateway`](https://github.com/gluwa/creditcoin-legacy-gateway)\n\
    \n### SDKs\n\n`Sawtooth-SDK-Rust` and `Sawtooth-SDK-Cxx` are forks of their respective\
    \ upstream repositories and used in the development of the Creditcoin transaction\
    \ family processors. They contain a number of patches related to Creditcoin.\n\
    \nSource code: [`https://github.com/gluwa/sawtooth-legacy-sdk-rust`](https://github.com/gluwa/sawtooth-legacy-sdk-rust)\
    \ [`https://github.com/gluwa/sawtooth-legacy-sdk-cxx`](https://github.com/gluwa/sawtooth-legacy-sdk-cxx)\n\
    \n`Creditcoin-Shared` is C# library used by some of the components written in\
    \ this programming language, for example, used by the Gateway component.\n\nSource\
    \ code: [`https://github.com/gluwa/creditcoin-legacy-shared`](https://github.com/gluwa/creditcoin-legacy-shared)\n\
    \nNote that after the transition to Creditcoin 2.0, all of the repositories related\
    \ to 1.x had been renamed to include the **-legacy-** pattern in their names.\
    \ What we used to call the *processor* during those times is now creditcoin-legacy-processor-rust!\
    \ In the rest of this book, I will be using the current names when speaking about\
    \ the various components to minimize the confusion.\n\n### Creditcoin-Legacy-Tests\n\
    \nThis is the main test suite for the 1.x release series. It is an integration\
    \ type test suite which sends transactions to the blockchain via an RPC endpoint.\
    \ It is triggered and executed externally and lives in a separate git repository.\
    \ The source code repository isn’t publicly available unfortunately, so we aren’t\
    \ going to talk much about it in this book.\n\nThe majority of the ground work\
    \ in this repository already existed when I started looking into it, and I’ve\
    \ added improvements and new test scenarios but haven’t changed the overall architecture\
    \ of the test suite itself. The same code base was also used as a starting point\
    \ for creating a performance benchmarking tool. This test suite was written predominantly\
    \ in C# .NET initially using MSTest and later the NUnit testing framework."
  trans: "\n### 交易处理器\n\n在 Hyperledger Sawtooth 框架的架构中，交易事务通过一个可扩展的系统（称为交易族）来定义。每个应用程序为其独特需求定义自定义交易族；这是区块链应用的业务逻辑。对于\
    \ Creditcoin 而言，这包括如何建模贷款周期并将其工件记录到区块链上。\n\nSawtooth 框架允许应用开发者使用他们选择的编程语言编写交易处理器。有效的交易族集合最初在创世块中配置，并作为链上值保存，后续可以进行更改。Creditcoin\
    \ 1.x 使用两个独立的交易处理器，它们作为节点的一部分以独立容器的形式运行。\n\n`Settings-tp` 最初源自 `hyperledger/sawtooth-settings-tp:1.0`（Python），后来升级为\
    \ `hyperledger/sawtooth-settings-tp:1.2`（Rust）。此交易处理器负责存储链上设置，例如网关 URL（见下文）、有效的交易族及其版本、共识算法及其属性等。它作为一个键值对存储在区块链上，并且还可以定义供其他组件使用的自定义设置。\n\
    \n`CREDITCOIN` 交易族处理器理解贷款周期的概念。其版本自 1.1 以来，依次经历了 1.1、1.2、1.3 乃至 1.8 的演进。客户端发送的每个交易都包含一个版本号，并且可以被拥有兼容版本号的交易处理器所理解。换言之，这就是协议升级的方式。`CREDITCOIN`\
    \ 族处理器使用 Protocol Buffers 数据格式解析原始交易负载，并在将交易交给验证器组件写入链之前执行一些维护任务，例如关闭过期的贷款请求。\n\
    \nCreditcoin 交易处理器版本 1.0 到 1.7 最初使用 C++ 实现，并一直使用到 2021 年中旬我开始处理 Creditcoin 时。\n\
    \n源代码：[`https://github.com/gluwa/creditcoin-legacy/tree/dev/ccprocessor`](https://github.com/gluwa/creditcoin-legacy/tree/dev/ccprocessor)\n\
    \n大约在同一时间，Creditcoin 交易处理器使用 Rust 完全重写，并向后兼容支持 1.0 到 1.7 族，这也是我主要使用的版本。这个新实现旨在作为之前提到的切换到\
    \ Sawtooth 1.2 的一部分进行部署。请注意，尽管版本号格式看起来像兼容的 SemVer 数字，但同一交易处理器族的不同版本可能彼此不兼容。这意味着使用旧版本的区块链运营商可能无法处理来自新客户端的事务，他们应该进行升级。例如，这可能是由于后续版本中添加了新的事务，如果由旧版交易处理器执行，则会失败。\n\
    \n最后一个支持的事务族版本是 1.8！\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-processor-rust`](https://github.com/gluwa/creditcoin-legacy-processor-rust)\n\
    \n### REST API\n\nSawtooth 框架提供了一个 REST API，允许客户端和外部应用使用常见的 HTTP/JSON 协议与区块链交互。它提供了一个与语言无关的接口，用于提交事务和读取区块。特别地，这对于在测试期间使用\
    \ `curl` 或你偏好的编程语言的库来查询区块信息非常有用。所有响应均采用 JSON 格式。\n\nREST API 是构建在 Sawtooth 内部\
    \ ZeroMQ/Protobuf 通信层之上的轻量级层。如果愿意，客户端可以完全绕过 REST API 接口，直接使用 ZeroMQ/Protobuf 与区块链通信。\n\
    \nCreditcoin 中使用的 REST API 组件是 `hyperledger/sawtooth-rest-api` 的一个分支，并在其基础上进行了微小的外观修补。据我所知，使用自定义容器是因为原始\
    \ `sawtooth-core` 仓库是一个单体仓库，而非其他原因。\n\n源代码：[`https://github.com/gluwa/sawtooth-legacy-core/tree/dev/rest_api`](https://github.com/gluwa/sawtooth-legacy-core/tree/dev/rest_api)\n\
    \n### 网关\n\n网关组件促进与外部区块链的通信，以验证加密代币的转移。这就是后续版本中所谓的“链下工作者”组件。也就是说，它会确保当 Creditcoin\
    \ 记录贷款人与借款人之间的贷款事务时，双方之间有相应的、相同金额的转移被记录在外部区块链（如以太坊）上。\n\nCreditcoin 网关监听一个网络套接字，接收以下形式的请求：\n\
    \n```\n verify      \n```\n\n网关与 `CREDITCOIN` 交易处理器之间的通信协议是 ZeroMQ，而网关与区块链 RPC\
    \ 端点之间的通信则依赖目标链，使用 `Nethereum` 或 `NBitcoin` 库实现。\n\n此组件使用 C# .NET 实现，并异步并行处理所有请求。网关实现了比特币、ERC20、以太坊和\
    \ Ethless 插件，其愿景是未来可以支持其他区块链网络。据我所知，只有以太坊经过了测试并在生产环境中得到正式支持！\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-gateway`](https://github.com/gluwa/creditcoin-legacy-gateway)\n\
    \n### SDK\n\n`Sawtooth-SDK-Rust` 和 `Sawtooth-SDK-Cxx` 是其各自上游仓库的分支，用于开发 Creditcoin\
    \ 交易族处理器。它们包含许多与 Creditcoin 相关的补丁。\n\n源代码：[`https://github.com/gluwa/sawtooth-legacy-sdk-rust`](https://github.com/gluwa/sawtooth-legacy-sdk-rust)\
    \ [`https://github.com/gluwa/sawtooth-legacy-sdk-cxx`](https://github.com/gluwa/sawtooth-legacy-sdk-cxx)\n\
    \n`Creditcoin-Shared` 是一个 C# 库，被一些使用该编程语言编写的组件使用，例如网关组件。\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-shared`](https://github.com/gluwa/creditcoin-legacy-shared)\n\
    \n请注意，在过渡到 Creditcoin 2.0 之后，所有与 1.x 相关的仓库都已重命名，其名称中包含 `-legacy-` 模式。我们曾经称之为 *processor*\
    \ 的组件现在变成了 `creditcoin-legacy-processor-rust`！在本书的其余部分，我将使用当前名称来指代各个组件，以最大程度地减少混淆。\n\
    \n### Creditcoin-Legacy-Tests\n\n这是 1.x 发布系列的主要测试套件。它是一个集成类型的测试套件，通过 RPC 端点向区块链发送事务。它由外部触发和执行，并存在于一个独立的\
    \ git 仓库中。不幸的是，该源代码仓库不可公开获取，因此我们在本书中不会过多讨论它。\n\n这个仓库中的大部分基础工作在我开始研究时已经存在，我添加了一些改进和新的测试场景，但没有改变测试套件本身的整体架构。相同的代码库还被用作创建性能基准测试工具的起点。这个测试套件主要使用\
    \ C# .NET 编写，最初使用 `MSTest`，后来改用 `NUnit` 测试框架。\n"
- fmt: '### Creditcoin-Legacy-Docker-Compose


    `Docker Compose` files for `Creditcoin v1.x` mainnet. This repository serves as
    the canonical reference to the various docker images for each component of `Creditcoin
    1.x` and as an example configuration of how to launch necessary components in
    order to become a participant in the network. It also served as the starting point
    for creating a configuration used for testing purposes.


    Source code: [`https://github.com/gluwa/creditcoin-legacy-docker-compose`](https://github.com/gluwa/creditcoin-legacy-docker-compose)


    ### Creditcoin-Legacy-Docker-Compose-Testnet


    This is the repository used for testing discussed later. It contains configuration
    files and references to docker images used for deploying an isolated testing environment.


    Later this repository was also monitored by community members to get information
    about the latest container versions needed for beta testing the upcoming `Creditcoin
    1.8` release!


    Source code: [`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet)


    ## Timeline of Creditcoin 1.x


    From the public history available on `GitHub` and `Docker Hub`, I can piece together
    the following timeline. It is here mostly for contextual reference.


    1.  I started working with the `Creditcoin` team on `June 17, 2021`.

    2.  My first pull request appears to be on `July 13, 2021`.

    3.  `Creditcoin 1.7.1` was released on `July 23, 2021`, without participation
    on my side.

    4.  `Creditcoin 1.8` container images, based on the `Sawtooth` framework, were
    released on `March 28, 2022`, to `Docker Hub` as the last release for the `1.x`
    network.


    Effectively I had been testing the last update in the `1.x` family which roughly
    took around 6 months, so excuse me if information is only partially available.
    Additional timestamps are provided in further sections.


    ## Testing Creditcoin 1.x


    When talking about `Creditcoin 1.x` and particularly on the topic of testing and
    generally improving the work of the team so that it can lead to software with
    higher quality, we must take into account the time period in which this is taking
    place. In my opinion, it is just inevitable that testing comes together with process
    and organizational changes.


    The period of interest here is roughly the year 2021 during which the team had
    started using individual public repositories on `GitHub` for each component. That
    is also a period during which the team has transitioned to working with a full-time
    `QA` engineer, myself, directly embedded into the team.


    **Timeline of repositories creation:**


    *   `Nov 27, 2018`: [`https://github.com/gluwa/creditcoin-legacy`](https://github.com/gluwa/creditcoin-legacy)
    created.

    *   `Feb 28, 2019`: [`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet)
    created.

    *   `Jul 29, 2019`: [`https://github.com/gluwa/creditcoin-legacy-docker-compose`](https://github.com/gluwa/creditcoin-legacy-docker-compose)
    created.

    *   `Apr 14, 2021`: [`https://github.com/gluwa/sawtooth-legacy-sdk-cxx`](https://github.com/gluwa/sawtooth-legacy-sdk-cxx)
    first commit in the fork.

    *   `Apr 17, 2021`: [`https://github.com/gluwa/creditcoin-legacy-shared`](https://github.com/gluwa/creditcoin-legacy-shared)
    created.

    *   `Apr 17, 2021`: [`https://github.com/gluwa/creditcoin-legacy-client`](https://github.com/gluwa/creditcoin-legacy-client)
    created.

    *   `May 12, 2021`: [`https://github.com/gluwa/sawtooth-legacy-core`](https://github.com/gluwa/sawtooth-legacy-core)
    first commit in the fork.

    *   `May 28, 2021`: [`https://github.com/gluwa/creditcoin-legacy-processor-rust`](https://github.com/gluwa/creditcoin-legacy-processor-rust)
    created.

    *   Yours truly joins the team.

    *   `Aug 03, 2021`: [`https://github.com/gluwa/creditcoin-legacy-consensus-rust`](https://github.com/gluwa/creditcoin-legacy-consensus-rust)
    created.

    *   `Sep 21, 2021`: [`https://github.com/gluwa/sawtooth-legacy-sdk-rust`](https://github.com/gluwa/sawtooth-legacy-sdk-rust)
    first commit in the fork.

    *   `Sep 29, 2021`: [`https://github.com/gluwa/creditcoin-legacy-gateway`](https://github.com/gluwa/creditcoin-legacy-gateway)
    created.


    **Timeline of CI enablement:**


    *   `Feb 25, 2020`: **creditcoin-legacy-docker-compose-testnet** – CI status for
    `GitHub Pages` build, no real testing in this repository.

    *   `Jul 15, 2020`: **creditcoin-legacy-docker-compose** – CI status for `GitHub
    Pages` build, no testing until after I joined the team.

    *   `Oct 27, 2020`: **sawtooth-legacy-core** – first CI status reported on a commit
    in the fork, appears to be an `Azure` pipeline. Configuration file is not in git,
    and the actual CI job logs are long gone. I assume this was a compile job, and
    it appears that it hasn’t been triggered on every commit judging by commit history
    on `GitHub`.

    *   `Apr 14, 2021`: **sawtooth-legacy-sdk-cxx** – CI in `GitHub`; two previous
    commits in fork. It is running a `CMake` build inside a docker container.

    *   `Apr 26, 2021`: **creditcoin-legacy-shared** – `Azure` pipeline which is not
    available anymore, source code not in git, and I assume it was a build/compile
    job. A bit later in June, there are scanning statuses reported by `Snyk`, a security
    scanning service, which are tied to a personal account and later disappear.

    *   `Apr 26, 2021`: **creditcoin-legacy-client** – `Azure` pipeline again, source
    not in git, pipeline isn’t available anymore. I am assuming it was a build job.
    Later in the year, we can see some statuses reported from `Snyk` which disappear
    afterward.

    *   I joined the team, happy testing!

    *   `Jun 17, 2021`: **sawtooth-legacy-core** – first `PR` with status checks.

    *   `Jun 18, 2021`: **creditcoin-legacy** – first CI status.

    *   `Jul 20, 2021`: **sawtooth-legacy-core** – first `GitHub Actions` in the fork.

    *   `Jul 20, 2021`: **creditcoin-legacy-processor-rust** – first CI status recorded
    on main branch but not on the default dev branch.

    *   `Aug 09, 2021`: **creditcoin-legacy-consensus-rust** – `Azure Pipelines`.

    *   `Aug 23, 2021`: **creditcoin-legacy-docker-compose** – first real testing
    in CI but never merged.

    *   `Aug 13, 2021`: **creditcoin-legacy-consensus-rust** – `GitHub Actions`.

    *   `Sep 21, 2021`: **sawtooth-legacy-sdk-rust** – enable CI in `GitHub Actions`;
    1st commit in fork.

    *   `Sep 29, 2021`: **creditcoin-legacy-gateway** – `Azure Pipelines` and `GitHub
    actions`.


    ### State of Testing Before I Joined


    As far as we can tell from public `GitHub` history, two repositories are running
    `GitHub Pages` actions, but no real checking on anything related to the software
    under test itself. Another four repositories are running CI pipelines in `Azure
    DevOps` which I speculate that only compile the software without performing much
    else.


    These pipelines in `Azure` don’t seem to have been defined in source code, and
    their definitions don’t seem to have been part of any git repository, so I cannot
    tell what kind of testing was executed as part of these pipelines. It is also
    unclear how exactly these `Azure CI` jobs were triggered and if that has been
    a reliable event or not since there are some commits and pull requests which don’t
    have statuses reported on them.'
  raw: '### Creditcoin-Legacy-Docker-Compose


    Docker Compose files for Creditcoin v1.x mainnet. This repository serves as the
    canonical reference to the various docker images for each component of Creditcoin
    1.x and as an example configuration of how to launch necessary components in order
    to become a participant in the network. It also served as the starting point for
    creating a configuration used for testing purposes.


    Source code: [`https://github.com/gluwa/creditcoin-legacy-docker-compose`](https://github.com/gluwa/creditcoin-legacy-docker-compose)


    ### Creditcoin-Legacy-Docker-Compose-Testnet


    This is the repository used for testing discussed later. It contains configuration
    files and references to docker images used for deploying an isolated testing environment.


    Later this repository was also monitored by community members to get information
    about the latest container versions needed for beta testing the upcoming Creditcoin
    1.8 release!


    Source code: [`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet)


    ## Timeline of Creditcoin 1.x


    From the public history available on GitHub and Docker Hub, I can piece together
    the following timeline. It is here mostly for contextual reference.


    1.  I started working with the Creditcoin team on June 17, 2021.


    2.  My first pull request appears to be on July 13, 2021.


    3.  Creditcoin 1.7.1 was released on July 23, 2021, without participation on my
    side.


    4.  Creditcoin 1.8 container images, based on the Sawtooth framework, were released
    on March 28, 2022, to Docker Hub as the last release for the 1.x network.


    Effectively I had been testing the last update in the 1.x family which roughly
    took around 6 months, so excuse me if information is only partially available.
    Additional timestamps are provided in further sections.


    ## Testing Creditcoin 1.x


    When talking about Creditcoin 1.x and particularly on the topic of testing and
    generally improving the work of the team so that it can lead to software with
    higher quality, we must take into account the time period in which this is taking
    place. In my opinion, it is just inevitable that testing comes together with process
    and organizational changes.


    The period of interest here is roughly the year 2021 during which the team had
