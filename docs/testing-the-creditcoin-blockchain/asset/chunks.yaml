- fmt: '### Proxy Functionality


    This is a functional sub-component of both the blockchain and the command line
    application. I am mentioning it here because it is important and because it affects
    how we do testing in a major way.


    Remember that when talking about Creditcoin 2.3, I’ve mentioned something called
    "stash" and "controller" accounts and that it was deprecated. Proxy accounts is
    the new kid on the block.


    As the name suggests in Creditcoin 3.0, users can create another account which
    holds enough funds to pay transaction fees and to be used for day-to-day operations
    on behalf of their primary account. Proxies get authorized by the primary account
    and are then used to sign transactions on behalf of the primary account. Using
    proxy accounts can significantly reduce the risk of compromising a significant
    amount of funds in case credentials are accidentally revealed or stolen because
    the primary account, holding all of the funds, needs to perform a single interaction
    with the blockchain – authorize the proxy. All other subsequent transactions can
    be performed using the proxy account secrets, thus minimizing exposure for the
    primary account.


    In a Substrate-based chain, it is possible to implement a proxy filter which exports
    different proxy types to the user and controls which runtime calls, aka extrinsics,
    are allowed. This is how you can implement access control for the proxy accounts.
    Creditcoin 3 comes with three different proxy types: `Staking`, `NonTransfer`,
    and `All`! This is how filtering is defined for Creditcoin (Listing 7-1).


    ```rust

    impl InstanceFilter for ProxyFilter {

    fn filter(&self, call: &RuntimeCall) -> bool {

    match self {

    ProxyFilter::All => true,

    ProxyFilter::Staking => matches!(

    call,

    RuntimeCall::Staking(_)

    | RuntimeCall::Session(_)

    | RuntimeCall::Utility(_)

    | RuntimeCall::VoterList(_)

    ),

    ProxyFilter::NonTransfer => matches!(

    call,

    RuntimeCall::Grandpa(_)

    | RuntimeCall::ImOnline(_)

    | RuntimeCall::Proxy(_)

    | RuntimeCall::Session(_)

    | RuntimeCall::Staking(_)

    | RuntimeCall::System(_)

    | RuntimeCall::Timestamp(_)

    | RuntimeCall::Utility(_)

    | RuntimeCall::VoterList(_)

    ),

    }

    }

    fn is_superset(&self, o: &Self) -> bool {

    match (self, o) {

    (ProxyFilter::All, _) => true,

    (ProxyFilter::NonTransfer, ProxyFilter::Staking) => true,

    (a, b) if a == b => true,

    _ => false,

    }

    }

    }

    ```


    *Listing 7-1: Proxy filter implementation*


    ### Staking Dashboard


    This is a web application which allows nominators to stake their funds and vote
    for validators. It is a standard React.js application which connects wallet browser
    extensions, for example, SubWallet to the Creditcoin 3 blockchain. The main functionality
    of Creditcoin Staking Dashboard is staking funds, filtering and voting for validators,
    creating and participating in nomination pools, and monitoring past performance
    and rewards.


    The origin of Staking Dashboard for Creditcoin 3 begins with the existing Creditcoin
    Staking Dashboard for v2 of the chain. Originally, we were thinking that a rebase
    to the latest available from the upstream fork will be enough to support both
    versions of the blockchain. The raw commits are in `https://github.com/gluwa/creditcoin-staking-dashboard/pull/108`.


    While working on this rebase, the team actually established that the upstream
    codebase has evolved to the point that it actually required an updated version
    of the Substrate framework used to build the blockchain. Luckily the amount of
    incompatibilities wasn’t very high, and it was technically possible to support
    both versions of Creditcoin using a single instance of Staking Dashboard; see
    the last commit on PR #108.


    Whether or not the arrangement of supporting multiple chains which have different
    versions within a single code base of Staking Dashboard would have worked is anybody’s
    guess. It very likely would have led to some sort of compatibility issue down
    the line. We will never know because a decision was made to spin off the existing
    code into a new repository, called `gluwa/creditcoin3-staking-dashboard`, and
    continue development separately. In production the two instances of Staking Dashboard
    are separate, and they are hosted under different URLs.


    Public URL: `https://cc3-staking.creditcoin.org`


    Source: `https://github.com/gluwa/creditcoin3-staking-dashboard/`


    ### Subscan API


    Subscan is an API service which monitors dozens of Substrate-based blockchain
    networks and aggregates information into a SQL database. This component is used
    by the Staking Dashboard for the purposes of rendering performance charts, for
    example, past rewards. It also provides a certain level of block-explorer functionality.


    This is the same component as in Creditcoin 2.3; however, instead of using it
    as an open source fork, Creditcoin 3 uses a SaaS version of this API publicly
    accessible at `https://creditcoin3-testnet.subscan.io/`.


    ### Blockscout


    Blockscout is a tool for inspecting and analyzing EVM-based blockchains aka a
    blockchain explorer. The main difference between Blockscout and other explorers,
    such as Subscan, is that it understands smart-contract calls or so-called internal
    transactions. In other words, transactions which aren’t represented by the existing
    Substrate extrinsics.


    This component is consumed as a service, and Creditcoin 3.0’s Testnet explorer
    can be found at `https://creditcoin-testnet.blockscout.com/`.


    ### Crunch


    In a NPoS blockchain based on the Substrate framework, validators and nominators
    earn rewards in the form of crypto tokens. This happens in every era, and there
    is a maximum window in which such rewards may be paid out – 84 eras. Anyone can
    trigger a payout but that doesn’t happen automatically.


    Crunch is a command-line interface and a Matrix bot to claim staking rewards every
    era for Substrate-based chains, thus reducing the need for manual interactions
    with the blockchain.


    This component is a fork of `turboflakes/crunch` with changes specific to Creditcoin
    3.0 and in particular with the intention to be used for automatically requesting
    payouts earned by Gluwa’s own validator nodes. It is written in the Rust programming
    language.


    Source: `https://github.com/gluwa/crunch`


    ## Timeline of Creditcoin 3.0


    This book outlines testing activities from the initial creation of 3.0 repositories
    until shortly after the public announcement of Creditcoin 3.0 Testnet – roughly
    between December 2023 and May 2024.


    Creditcoin 3 Testnet was officially announced on March 21, 2024!


    ## Testing of Creditcoin 3.0


    Testing for the 3.0 version largely builds upon the experience gained during testing
    the 2.x family of Creditcoin. This means things like static analysis tools, external
    and internal linters, and automatic updates, for example, Dependabot, are basically
    the same as in previous version.


    Because development of Creditcoin 3 began after 99% of the testing practices and
    infrastructure of Creditcoin 2 was already in place, it was fairly common in the
    early days to copy all of the CI configuration verbatim from the Creditcoin 2
    repository and then adjust bits and pieces where needed. This section will try
    focusing on what’s different in terms of testing for Creditcoin 3.0 instead of
    repeating all of the items I’ve mentioned for Creditcoin 2.0 and 2.3 previously.


    Keep in mind that one of the main testing objectives for the 3.0 version is EVM
    compatibility.


    Here’s how a typical CI pipeline exercised on pull requests looks like (Figure
    7-2).


    ![Figure 7-2: CI jobs overview](images/629923_1_En_7_Chapter/629923_1_En_7_Fig2_HTML.jpg)'
