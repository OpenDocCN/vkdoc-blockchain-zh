    **Listing 7-4** Failure output from the integration test suite


    The actual bug was that my helper function did not call `api.disconnect()`. How
    did I debug this?


    1.  All test files are executed sequentially, so I counted which one was the first
    to fail. I was interested in the number, not the actual test file, and this number
    stayed very consistent between different CI executions.


    2.  Then downloaded all log files from CI artifacts – their names include the
    Alice or Bob pattern and a timestamp, see Listing [7-5](#629923_1_En_7_Chapter.xhtml#PC7).


    3.  Found the files for both Alice and Bob corresponding to the execution number
    in which I was seeing failures, I think it was 8, and started looking into them.
    Because each test now uses a stand-alone blockchain, these files aren’t very big.


    4.  I started reading the log files, top to bottom. Everything looked good in
    terms of block production when suddenly I saw the error message shown in Listing
    [7-6](#629923_1_En_7_Chapter.xhtml#PC8):


    ```

    creditcoin3-node-Alice-2024-04-03T10-01-55.594Z-log.stderr

    creditcoin3-node-Alice-2024-04-03T10-07-22.470Z-log.stderr

    creditcoin3-node-Alice-2024-04-03T10-12-03.658Z-log.stderr

    creditcoin3-node-Alice-2024-04-03T10-16-49.086Z-log.stderr

    ```


    **Listing 7-5** Names of log files from multiple parallel test jobs


    ```

    2024-04-03 10:22:06 Too many connections. Please try again later.

    ```


    **Listing 7-6** Error message shown in creditcoin3-node logs


    I suspect that locally my OS was able to recycle TCP connections much faster compared
    to the containerized runners used by GitHub Actions, and/or their environment
    was much more limited in terms of how many TCP ports are available. Once I added
    the call to `.disconnect()`, everything was fine!


    ### Runtime Upgrade Testing


    ![](images/629923_1_En_7_Chapter/629923_1_En_7_Fig5_HTML.jpg)


    **Figure 7-5** Runtime upgrade CI pipeline


    Contrary to Creditcoin 2, there are no custom storage migrations because there
    are no custom pallets in Creditcoin 3. This removes the need for all of the plumbing
    around testing and asserting on migrations described previously. So no `try-runtime`,
    no assertions against items in storage before and after migrations, and no special
    macros to crash the node in case a migration goes south!


    There is still the need to perform a runtime upgrade and check whether the chain
    continues to function as before. This also somewhat covers any possible system
    migrations that may exist. The process for this is very similar to Creditcoin
    2 as shown in Figure [7-5](#629923_1_En_7_Chapter.xhtml#Fig5) – synchronize with
    a live chain, fork, and upgrade and test (blockchain + smart contract tests).'
