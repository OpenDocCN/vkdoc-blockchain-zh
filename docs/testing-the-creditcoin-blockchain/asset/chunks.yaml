  trans: '

    # 单元测试


    通常，外部函数的初始单元测试由实现该函数的开发人员创建。之后，我通常会补充更多场景、修正和/或改进，主要围绕错误处理和边界情况覆盖。有时这些工作会在同一个拉取请求中完成，有时则作为单独的拉取请求提交。


    代码覆盖率指标是判断外部函数的所有分支和错误条件是否通过单元测试得到验证的主要信息来源。在开发 Creditcoin 2.0 期间，我有意识地努力改善这一指标，并尽可能多地实现单元测试。如果我没记错的话，目标是
    85% 的覆盖率，我们最终接近了 80%。


    有些时候，仅仅为了满足指标要求，我会为辅助函数和特征添加单元测试，这些测试虽然提高了覆盖率百分比，但总体来看似乎并没有增加太多价值。不过，这纯粹是一种推测，因为我并没有尝试通过突变测试覆盖等技术来评估这套单元测试的有效性。我的经验法则很简单：如果覆盖率不足，并且添加单元测试以增加指标很容易，那就去做。


    编写单元测试也是一个很好的机会，可以更深入地了解 Substrate 框架的工作原理以及 Creditcoin 实现是如何组合在一起的。从流程上看，它强化了一种预期，即质量保证团队将持续进行代码审查，并从早期阶段就参与到开发过程中。


    ## 集成测试


    Creditcoin 2.0 的集成测试套件源于多个与区块链交互的示例。我希望运行这些示例，并确保在我们对实现进行更改时它们仍然能够正常工作——这再次遵循了简单的经验法则：如果代码存在于
    git 中，那么它必须被持续地运行和检查！


    一个粗略的 CI 作业执行了这些原始示例，这让我们意识到可以重构代码，使其对消费者更易用。因此，这些示例被转换成一个名为 `creditcon-js` 的
    TypeScript 库。它是围绕 `polkadot/api` TypeScript 库的一个包装器。随后，触发这些示例演变成了集成测试套件，并成为了 `creditcoin-js`
    的第一个消费者。


    集成测试套件本身是围绕流行的 Jest 测试框架构建的。当时，关于使用哪种语言和测试框架的选择并不多。一方面，有 Jest 可用，并且 `polkadot/api`
    也在上游的 Substrate 社区中使用。另一方面，虽然有一个 Python 客户端库，但遗憾的是它当时不支持异步函数，所以其实并没有太多选择。


    一个简单的集成测试如下所示。


    ```

    import { Blockchain, Guid } from ''creditcoin-js'';

    import { KeyringPair } from ''creditcoin-js'';

    import { createCreditcoinLoanTerms } from ''creditcoin-js/lib/transforms'';

    import { AddressRegistered } from ''creditcoin-js/lib/extrinsics/register-address'';

    import { signAccountId } from ''creditcoin-js/lib/utils'';

    import { creditcoinApi } from ''creditcoin-js'';

    import { CreditcoinApi } from ''creditcoin-js/lib/types'';

    import { testData, tryRegisterAddress } from ''creditcoin-js/lib/testUtils'';

    import { extractFee } from ''../utils'';

    describe(''AddAskOrder'', (): void => {

    let ccApi: CreditcoinApi;

    let lender: KeyringPair;

    let lenderRegAddr: AddressRegistered;

    let askGuid: Guid;

    const { blockchain, expirationBlock, loanTerms, createWallet, keyring } = testData(

    (global as any).CREDITCOIN_ETHEREUM_CHAIN as Blockchain,

    (global as any).CREDITCOIN_CREATE_WALLET,

    );

    beforeAll(async () => {

    ccApi = await creditcoinApi((global as any).CREDITCOIN_API_URL);

    lender = (global as any).CREDITCOIN_CREATE_SIGNER(keyring, ''lender'');

    });

    afterAll(async () => {

    await ccApi.api.disconnect();

    });

    beforeEach(async () => {

    const lenderWallet = createWallet(''lender'');

    lenderRegAddr = await tryRegisterAddress(

    ccApi,

    lenderWallet.address,

    blockchain,

    signAccountId(ccApi.api, lenderWallet, lender.address),

    lender,

    (global as any).CREDITCOIN_REUSE_EXISTING_ADDRESSES,

    );

    askGuid = Guid.newGuid();

    });

    it(''fee is min 0.01 CTC'', async (): Promise => {

    const { api } = ccApi;

    return new Promise((resolve, reject): void => {

    const unsubscribe = api.tx.creditcoin

    .addAskOrder(

    lenderRegAddr.itemId,

    createCreditcoinLoanTerms(api, loanTerms),

    expirationBlock,

    askGuid.toString(),

    )

    .signAndSend(lender, { nonce: -1 }, async ({ dispatchError, events, status })
    => {

    await extractFee(resolve, reject, unsubscribe, api, dispatchError, events, status);

    })

    .catch((error) => reject(error));

    }).then((fee) => {

    expect(fee).toBeGreaterThanOrEqual((global as any).CREDITCOIN_MINIMUM_TXN_FEE);

    });

    });

    });

    ```


    该集成测试套件的核心重点在于测试每一个可用的外部函数，以确保它们能够从外部访问。在实际检查方面，主要重点在于验证交易费用不低于 0.01 CTC。实际上，这个值可以通过参数进行配置，并且允许一定的误差范围，因为费用并非固定不变，还取决于区块链的使用情况。


    自定义 RPC、自定义指标、几个值得注意的错误条件以及一个完整的借贷周期也通过此集成测试套件进行了测试，并且结果以易于阅读的格式呈现。


    ```

    PASS src/test/collect-coins.test.ts (49.97 s)

    CollectCoins

    request

    ✓ fee is min 0.01 CTC (10 ms)

    ✓ 000 - with mixed up Ethereum addresses should throw IncorrectSender error (11797
    ms)

    ✓ 001 - end-to-end (15014 ms)

    ✓ should throw TransactionNotFound when txHash not found (9984 ms)

    fail

    ✓ fee is min 0.01 CTC (8 ms)

    persist

    ✓ fee is min 0.01 CTC but bypassed by OCW (8 ms)

    PASS src/test/register-funding-transfer.test.ts (59.98 s)

    RegisterFundingTransfer

    ✓ fee is min 0.01 CTC (29060 ms)

    ✓ emits a failure event if transfer is invalid (29987 ms)

    PASS src/test/close-deal-order.test.ts (70.005 s)

    CloseDealOrder

    ✓ fee is min 0.01 CTC (69127 ms)

    ```


    这些集成测试中有许多是通过配置变量控制的，Jest 使用配置文件，有时甚至会被跳过，因为我们增加了针对多个环境（甚至生产环境）执行测试的能力。在主网上，这作为一种健全性测试，用于验证借贷周期功能是否仍然有效，以及交易费用是否满足最低要求。

    '
- fmt: '### Sanity Testing and Static Analysis


    In this category, I classify most of what doesn’t fit elsewhere: linters, code
    formatters, and custom scripts – I like to follow the best practices set by the
    language and write clean code. Some of the tools I’ve used for testing Creditcoin
    are `ShellCheck`, `cargo fmt`, `Clippy`, `eslint`, and `prettier`.


    In certain cases, static analysis tools can detect patterns which may be known
    to cause bugs, so I make sure to create customized tools to check for such patterns
    in the source code. In some language ecosystems that effort has taken the form
    of linter plugins, while in the case of Creditcoin these are mostly stand-alone
    bash scripts. These scripts will inspect the source code, for example, using `grep`,
    and alert us about common mistakes which may lead to errors. For example:


    - Remember that there are native and on-chain runtimes and which one is used is
    dependent on the runtime version number? Now imagine the situation where runtime
    behavior changes but the version number doesn’t – this can lead to nodes running
    code that has different versions. There are a number of situations where the version
    number needs to be increased so this script takes a preemptive approach and requires
    version number bump based on a simplified heuristic. Sometimes this version number
    increase is not strictly necessary but better safe than sorry. It also fits well
    with the rest of the development process.


    - The order in which extrinsic functions are defined inside their pallets source
    code directly translates to their internal index in the chain metadata. These
    indices translate directly to error messages visible to the end user, as resolved
    by the `polkadot-js` API library, so we need to make sure that extrinsics order
    did not change. The bash script is a wrapper around the `polkadot-js-metadata-cmp`
    tool.


    - In order for transaction fees to be accurate, each extrinsic needs an associated
    weight which is generated by an associated benchmark function. So make sure that
    all in-house defined pallets have benchmarks, and these benchmarks are hooked
    into CI for automatic weight generation. Also make sure extrinsic name, benchmark
    function, and weight function names match to avoid copy-paste errors as much as
    possible.


    - We want to keep up-to-date dependencies and use various security-related tools
    which generally operate on scanning package versions and matching against popular
    third-party package repositories. Therefore, using libraries from git repositories,
    instead of packages, is not prefered. For Rust, prefer package repository `crates.io`!


    - Some of these static analysis scripts are asserting against internal development
    standards – for example, using or not a particular function or macro. This is
    for a better quality of life for the blockchain engineering team which usually
    can be translated to some sort of quality gain for the software itself.


    On the sanity spectrum, we are building a docker container and making sure that
    when started it doesn’t crash and that a few common operations can take place
    – for example, synchronize with an existing live chain; make sure that containers
    expose a `/health` endpoint to be used by DevOps for monitoring a running cluster,
    etc. The container target itself isn’t tested 100% explicitly because most of
    that is the `creditcoin-node` binary which is tested as part of other test jobs.


    ### Testing with Bots


    A number of automatic operations take place during development of Creditcoin 2.0.
    I call them “testing with bots,” but strictly speaking most of these are related
    to the development process. In any case having them automated has its benefits:


    - Menial tasks require less human involvement.

    - They happen on a regular basis.

    - Pull requests will be opened automatically which in turns kicks off the entire
    CI/CD pipeline.

    - Pull requests will be reviewed and merged as any other pull request.


    #### Dependabot


    Automatic upgrades of third-party dependencies are an integral part of Creditcoin
    2.0 and future versions and something I’ve personally been using for a number
    of years now. This service runs on a schedule and opens pull requests whenever
    a new version of a dependency library is available. The majority of these are
    related to `creditcoin-js` and `integration-tests` as they are written in TypeScript
    and receive updates much more frequently. However, even on the Rust side of things,
    we want to keep as up-to-date as possible. This reduces maintenance burden over
    the long run, lets you know whether the software under test is still compatible
    with newer libraries or not, and contributes a tiny bit to improved overall security
    of your software. If CI jobs are passing, then merge the updated version, usually
    with only the QA engineer providing review.


    A notable exception here is the Substrate framework itself, which is consumed
    via a git repository. The various components of the Substrate framework are rarely
    published via `crates.io`, the Rust package repository, and require manual upgrades.
    That process isn’t automated in Creditcoin 2.0. Technically speaking, it is relatively
    easy to create your own bot that would propose upgrades for newer versions of
    the Substrate framework, even when consumed via a git fork. It is my impression
    that Substrate is still actively changing quite frequently which would require
    manual work to inspect and assess any incompatibilities so probably not much benefit
    to be gained by automating this process.


    #### Pre-commit CI


    A popular service with Python developers which can modify the source code and
    create a new commit. Creditcoin 2.0 doesn’t use the full capabilities of this
    service – mainly it uses pre-commit CI to correct missing newline at the end of
    files, trailing white spaces and some typos. The service itself has not been designed
    with a Rust or TypeScript code base in mind and the benefit you can get out of
    it is limited. My main motivation for introducing it – annoying missing newline
    characters which just make everything look ugly when displaying file contents
    in a terminal [editor]. Just make the code look nice.


    #### Type Definitions with Gluwa-bot


    Any Substrate-based chain serializes its data types and error messages in the
    SCALE format (binary encoding) and exposes this metadata via RPC. Clients built
    with the Polkadot JS library can use this to refresh their internal typescript
    definitions and always keep up-to-date with the blockchain node implementation.
    This makes type checking JavaScript components work great, which in turn shifts
    detection of some errors to the static analysis level. Strong types just make
    a tester’s job easier!


    Creditcoin 2.0 automatically refreshes type definitions when running test jobs
    in CI and will automatically commit and push these changes to the current branch
    of a pull request. To avoid infinite CI loops, the majority of GitHub jobs aren’t
    repeated on the automated commit. To make it clear – all types are updated before
    any tests are executed in CI, and only if these tests are passing the changes
    are included into a commit.'
