    The code for these RPCs comes from the Moonbeam blockchain and has been merged
    inside of the creditcoin3-node in [`https://github.com/gluwa/creditcoin3/pull/169`](https://github.com/gluwa/creditcoin3/pull/169).
    Because this is a very large chunk of third-party code, it has been manually vetted
    that it performs as expected. Initially the RPC methods exposed by this component
    were conditionally enabled via a compiler flag and afterward have been included
    as part of the standard build.


    ### Precompile(s)


    This is a component internal to the gluwa/creditcoin3 repository which was added
    after the official announcement of the Creditcoin 3 Testnet. This component allows
    you to bridge the gap between the Ethereum side of Creditcoin 3 and the Substrate
    runtime and interact with the runtime from the EVM side which isn’t normally possible.


    From an external point of view, this component acts as a smart-contract which
    is always available at a fixed address, a sort of a predefined collection of smart-contract(s).
    Implementation wise there is an entry-function which is written in Rust and is
    part of the Creditcoin runtime. This is very similar to an extrinsics function.
    Then there is the smart-contract interface definition written in the Solidity
    language. The important part here is the predefined address at which the contract
    is going to be deployed.


    At the time of writing this book, Creditcoin 3 contains a single precompile called
    substrate-transfer, whose goal is to make it easier to fund EVM addresses on Creditcoin
    from existing Substrate wallets in just a single step (otherwise that would take
    two steps). It is available at address 0x0000000000000000000000000000000000000Fd1
    ➤ [`https://creditcoin-testnet.blockscout.com/address/0x0000000000000000000000000000000000000Fd1`](https://creditcoin-testnet.blockscout.com/address/0x0000000000000000000000000000000000000Fd1)


    A counter example which contains more precompiled contracts is the Moonbeam network;
    see [`https://docs.moonbeam.network/builders/pallets-precompiles/precompiles/`](https://docs.moonbeam.network/builders/pallets-precompiles/precompiles/)
    and [`https://github.com/moonbeam-foundation/moonbeam/tree/master/precompiles`](https://github.com/moonbeam-foundation/moonbeam/tree/master/precompiles)
    for more details.


    ### Creditcoin 3 CLI


    Similar to the Creditcoin 2 version, this is a command line program packaged inside
    the container image and meant to be used by operators of validator nodes. It is
    part of the gluwa/creditcoin3 git repository. This component started as a copy
    of the existing command line source code for Creditcoin 2 with two important extras:
    commands to handle evm transfers + support of proxy functionality.'
  trans: '

    # Creditcoin 3.0


    `Creditcoin 3.0` 是 `Creditcoin` 区块链的下一代演进产物，它从一个专门用于记录贷款交易的专用链，发展为一个面向现实世界资产管理的更通用的链。它是一个完全兼容
    EVM 的 Layer 1 区块链。换句话说，它支持智能合约开发，并且兼容以太坊生态系统中使用的许多流行工具，例如钱包应用和智能合约开发工具。`Creditcoin
    3.0` 使用 `Substrate` 框架构建，并在其上添加了一个特殊的 EVM 兼容层，同时像其前身一样采用了提名权益证明共识算法。


    其两个主要设计特点是 EVM 兼容性和所谓的通用预言机，后者解锁了多链信息流和跨链交易，以帮助构建和部署多链合约。开发工作分阶段进行，在撰写本书时，仅实现了
    EVM 兼容层。


    `Creditcoin 3.0` 被提议作为一个独立的区块链，而不是从 2.x 系列的增量升级，这再次极大地简化了开发和测试。最初的提议还指出，`Creditcoin
    2` 功能将作为 `Creditcoin 3.0` 上的一个 L2 来实现。我假设这将是一组能够记录贷款周期流程的智能合约。然而，在撰写本文时，这些实现细节尚不存在。


    **注意**


    `Creditcoin 3.0` 测试网的公开声明 ^(⁸) 还提到了对现有区块链的重新命名。之前的 `Creditcoin 2` 将更名为 *“Creditcoin
    Classic”*，而新的兼容 EVM 的 v3.0 将简称为 *“Creditcoin”*。为了避免混淆，我将在本书的其余部分继续使用明确的版本号。


    ## Creditcoin 3.0 的组件


    我将在下文中概述 `Creditcoin 3.0` 最重要的组件。由于它是一个基于 Substrate 的链，因此某些部分与 `Creditcoin 2`
    基本相同。


    ### Polkadot-sdk


    如前所述，这是用于构建区块链的核心 `Substrate` 框架。在比 `Creditcoin 2` 所使用的更新的版本中，上游维护者决定将几个 git 仓库合并在一起，并归档旧仓库。这是新的名称。


    `Creditcoin 3.0` 使用了一个最初遵循 `release-polkadot-v1.1.0` 分支并在此基础上添加了几个补丁的派生版本。


    来源：[`https://github.com/gluwa/polkadot-sdk`](https://github.com/gluwa/polkadot-sdk)


    ### Frontier


    这是 `Substrate` 的一个以太坊兼容层，提供了额外的模块（pallets），你可以将其包含在运行时实现中。该组件使得每个 `Substrate`
    账户自动拥有一个所谓的“关联 EVM 地址”，该地址可用于任何与 EVM 相关的交易。正是这个组件提供了 EVM 兼容性，并允许区块链用户在 `Creditcoin
    3.0` 上部署智能合约。其架构如下所示。


    ![](img/629923_1_En_7_Fig1_HTML.jpg)


    **图 7-1**


    基于 Substrate 的链中的 EVM 兼容性


    这里需要重要说明的是，`Substrate` 和以太坊使用不同的地址格式，并且地址长度也不同。以太坊地址以 `“0x”` 前缀开头，而 `Substrate`
    地址则没有（并且它们总是以 5 开头）。以太坊风格的地址长度为 20 字节，而 `Substrate` 地址长度为 32 字节。这就是为什么在 `Creditcoin
    3.0` 中，每个账户有两个不同的地址——原生的 `Substrate` 地址和一个被称为关联地址的虚拟 EVM 地址。


    来源：[`https://github.com/gluwa/frontier`](https://github.com/gluwa/frontier)


    ### Creditcoin3


    这是 3.0 版本的主源代码仓库，包含了区块链运行时实现、Docker 容器规范以及其他一些内容。与 `Creditcoin 2` 的主要区别在于，该仓库中的大部分代码都是管道代码——在撰写本文时，没有自定义模块，没有自定义交易，也几乎没有额外的
    RPC 调用。


    来源：[`https://github.com/gluwa/creditcoin3`](https://github.com/gluwa/creditcoin3)


    ### EVM 跟踪 RPC


    这是一个内部组件，是 `creditcoin3-node` 客户端的一部分，它导出了一些 RPC 方法，能够跟踪在基于 Substrate 的链内部的 EVM
    层上发生的交易，例如，智能合约内部的交易。该组件的主要目的是暴露区块浏览器（如 `Blockscout`）所需的信息。如果没有它，区块浏览器应用仍然能够看到每个区块和其中记录的交易；但是，它将无法遍历
    EVM 相关的交易并显示关于它们的更细粒度的细节。


    这些 RPC 的代码来自 `Moonbeam` 区块链，并已合并到 `creditcoin3-node` 中，参见 [`https://github.com/gluwa/creditcoin3/pull/169`](https://github.com/gluwa/creditcoin3/pull/169)。由于这是一大块第三方代码，因此已经过人工审核以确保其按预期运行。最初，该组件公开的
    RPC 方法通过编译器标志有条件地启用，之后已被纳入标准构建的一部分。


    ### 预编译合约


    这是一个在 `Creditcoin 3 测试网` 正式公告后添加的，`gluwa/creditcoin3` 仓库内部的组件。该组件允许你弥合 `Creditcoin
    3` 以太坊端与 `Substrate` 运行时之间的差距，并能够从正常情况下不可行的 EVM 侧与运行时进行交互。


    从外部来看，该组件充当一个始终在固定地址可用的智能合约，即一组预定义的智能合约集合。在实现方面，有一个用 Rust 编写的入口函数，它是 `Creditcoin`
    运行时的一部分。这与外部函数非常相似。此外，还有用 `Solidity` 语言编写的智能合约接口定义。这里的关键部分是合约将要部署的预定义地址。


    在撰写本书时，`Creditcoin 3` 包含一个名为 `substrate-transfer` 的预编译合约，其目标是简化从现有的 `Substrate`
    钱包为 `Creditcoin` 上的 EVM 地址提供资金的步骤，只需一步即可完成（否则需要两步）。它在地址 `0x0000000000000000000000000000000000000Fd1`
    可用 ➤ [`https://creditcoin-testnet.blockscout.com/address/0x0000000000000000000000000000000000000Fd1`](https://creditcoin-testnet.blockscout.com/address/0x0000000000000000000000000000000000000Fd1)


    包含更多预编译合约的反例是 `Moonbeam` 网络；详情请参见 [`https://docs.moonbeam.network/builders/pallets-precompiles/precompiles/`](https://docs.moonbeam.network/builders/pallets-precompiles/precompiles/)
    和 [`https://github.com/moonbeam-foundation/moonbeam/tree/master/precompiles`](https://github.com/moonbeam-foundation/moonbeam/tree/master/precompiles)。


    ### Creditcoin 3 命令行界面


    与 `Creditcoin 2` 版本类似，这是一个打包在容器镜像中的命令行程序，供验证人节点操作员使用。它是 `gluwa/creditcoin3` git
    仓库的一部分。该组件最初是作为现有 `Creditcoin 2` 命令行源代码的副本开始的，但有两个重要的补充：处理 EVM 转账的命令 + 对代理功能的支持。

