  trans: '

    ### 测试 Creditcoin 质押仪表板


    该组件的上游版本位于 [`https://github.com/paritytech/polkadot-staking-dashboard`](https://github.com/paritytech/polkadot-staking-dashboard)。如果我们仔细查看其
    2023 年夏季的测试套件，会发现里面内容并不多，至少没有公开可见的内容。每个拉取请求都会执行 CI 任务，这些任务会运行代码检查器和构建任务。我能找到的唯一测试文件名为
    `graphs.test.ts`，它测试了一些辅助函数。似乎没有其他形式的单元测试或组件测试，也没有使用 Selenium 或 Playwright 等工具进行任何可视化自动化测试。与
    Polkadot 生态系统中的其他组件不同，这个组件似乎没有在私有 GitLab CI 或 Jenkins 实例中安排其他测试任务。


    现在，完全有可能该应用程序正在进行内部测试，并且/或者自动化测试套件作为另一个 Git 仓库的一部分存在。我很难相信不存在这种情况。只是我没能在 GitHub
    上找到任何明显公开可用的东西。因此，如果你在开发下游分叉，这并非理想状况，但你也无能为力。这是你分叉 Git 仓库并决定使用它时就必须接受的风险。


    对于 Creditcoin 分叉，我已经启用了我们所有的标准工具——预提交 CI、Dependabot、CodeQL、MegaLinter 等。其中一些工具仍然报告了大量针对代码库的问题，这些问题在该组件初始状态时就已存在。并非所有这些问题都被认为足够重要而需要修复，而在
    Creditcoin 3 中，所有报告的问题实际上都得到了修复。


    由于开发和发布 Creditcoin v2.3 的时间有限，团队同意采用一个简单的手动测试计划——大约 20 个测试场景，涵盖了品牌和正常路径功能中最显眼的方面，即确保其能够为验证人提供资金和提名，而没有任何明显的问题。这并不意味着没有错误；当然有。只是大多数错误都不够严重，不足以成为阻碍发布的障碍。许多错误也在未来的下游版本中得到了修复。


    请记住，这个测试计划最初是根据 Polkadot 质押仪表板的视觉线索制定的，当时 Creditcoin 中还没有任何质押功能，并且在积极执行过程中经历了多次修改和改进。这只是测试人员必须为未知情况做好准备的又一种情况。


    此外，每个拉取请求都经过了手动测试——验证原本要修复的问题是否真的被修复了，并且如上所述，没有发现任何被破坏的地方。


    从实际操作角度来看，这意味着需要检出拉取请求，在本地构建它，并运行一个本地 Creditcoin 区块链，然后才能重现并测试这些拉取请求。这个流程在 Creditcoin
    3.0 中得到了改进。


    ### 测试 `creditcoin-cli`


    `creditcoin-cli` 是一个标准的 TypeScript 应用程序，设计用于在终端中执行，更准确地说，是在运行的 docker 容器内执行。


    有两个主要子组件以相当直接的方式进行测试——实用工具和辅助函数通过单元测试进行测试，而实际命令则通过集成测试套件进行测试，测试方式与节点操作员触发这些命令的方式相同。这两个测试套件都使用
    Jest 测试框架以 TypeScript 编写。


    这两个测试套件之间有明确的区分——单元测试无需任何外部依赖即可执行，而集成测试则需要一个正在运行的 `creditcoin-node(s)` 和一个兼容以太坊的区块链（例如
    `Hardhat`）。所有这些都在本地隔离环境中运行，并使用预定义的账户 `Alice` 和 `Bob`。


    在断言方面，集成测试重用现有的辅助函数和区块链 API 来断言预期状态。它们还对命令的标准输出进行断言！


    由于开发节奏很快，`creditcoin-cli` 最初是通过直接使用命令并尝试成为 PoS 链中的验证人来进行手动测试的。我发现了大量边缘情况、错误和小问题，这些问题在正式发布前都得到了纠正。单元测试和集成测试套件正是基于这次经验诞生的，并且在撰写本文时，由于大部分测试工作仍在进行中，它们也还在开发中。


    例如，一个有趣的奇怪现象是，当一个新的参与者想要加入 Creditcoin 区块链时，他们首先需要在其账户中拥有 CTC 资金。设置过程需要执行 `registerAddress`
    和 `requestCollectCoins` 外部调用。这些调用的目的是允许外部方证明对以太坊钱包的所有权，并随后将以太坊上的 G-CRE 代币转换为 Creditcoin
    主网上的 CTC。


    这里的麻烦在于，这两个外部调用都有关联的交易费用，而对于一个新用户来说，如果没有外部资金，就无法在 Creditcoin 上入门。这也给测试带来了问题，因为我们需要有资金的账户才能索取更多资金。在隔离测试期间，这相对容易解决，因为我们可以通过发出
    sudo 交易来更新测试账户的余额，我们知道 sudo 账户的秘密！在针对测试网或主网进行测试时，我们需要使用已经拥有资金的账户，并且有些步骤不能执行两次，所以你无法真正覆盖所有测试场景。


    在撰写本书时，这个问题仍然存在，尚未解决。我认为它作为 Creditcoin 交互流程的一部分一直存在，但之前没有浮出水面，因为到目前为止，无辅助的外部参与是有限的。解决这个问题最简单的方法可能是免除
    `registerAddress` 和 `requestCollectCoins` 外部调用的交易费用。


    `creditcoin-cli` 测试套件会自动收集代码覆盖率指标，并将其发送到 [`https://app.codecov.io/gh/gluwa/creditcoin/tree/main/scripts%2Fcc-cli`](https://app.codecov.io/gh/gluwa/creditcoin/tree/main/scripts/cc-cli)；但是，这个指标并未用于指导测试套件的开发。在撰写本文时，cli
    集成测试套件的重点是测试 `wizard` 命令，并模拟一个完整的验证人周期作为正常路径测试场景。其他一些命令也经过了测试，但并未对所有可用命令进行全面覆盖。这种测试覆盖是在该组件初始发布之后才添加的。

    '
- fmt: '# Testing Gluwa’s Substrate Fork


    Because of the aforementioned block history preservation functionality, we chose
    to use a fork of the Substrate framework. A question around staking rewards and
    penalties made me look more closely into how they were tested upstream. What I
    found out was not something I endorse as a person who’s spent his entire career
    hacking on open source.


    Upstream Substrate executes their testing inside a private GitLab instance. From
    what I could tell, some of their job definitions use tools and container images
    which aren’t publicly available either. Overall the worst user experience if you
    are trying to maintain a downstream fork of an open source framework.


    Essentially there was no way for the Creditcoin team to know if any of the changes
    we make aren’t breaking Substrate or if any of the newer Substrate versions are
    incompatible with our own changes before all of that gets merged into a downstream
    branch and then you try to build Creditcoin against it.


    ## Caution


    Newer versions of Substrate introduce a significant change to the staking subsystem,
    for example, consolidating what they call a stash and controller account only
    into one account which changes signatures for most API/transaction calls related
    to staking!


    After registering a Creditcoin-related group with GitLab, I spent about a week
    just trying to figure out all of the CI jobs from upstream, finding out where
    they break, commenting out code or trying some quick patches, and generally exploring
    the state of it all. It didn’t seem to be easy enough and I had the feeling that
    it would take much longer than anticipated at first, so I needed to implement
    a contingency testing method for the forked repository.


    The team settled on reusing our own private testing infrastructure (on-demand
    self-hosted GitHub runners) and running `cargo check` and `cargo test`. Even though
    the hardware resources are deployed in a private environment, their configuration
    and test results are publicly visible.


    We’ve got static checks via the Rust compiler and the existing unit test suite
    for Substrate. Note that I call it a “unit test” suite because that’s most common
    when using Rust’s built-in testing facilities, but the test suite itself contains
    hundreds of test scenarios for multiple modules and takes several hours to execute
    so it probably includes many types of tests. It’s yet another piece of third-party
    code where we don’t have all of the details and would have spent too much time
    if we were to try and figure all of it out.


    From my earlier investigation, I had found out that staking rewards and penalties
    were fairly well exercised via automated test scenarios, and that’s what we were
    interested in anyway. I did try copying the upstream test files into the Creditcoin
    code base and modifying imports/call paths; however, I quickly realized that this
    isn’t going to work. There were private functions inside the upstream staking
    pallet which were used as part of existing unit tests, and that meant even more
    modifications to the fork which was not something I wanted to maintain.


    ## Note


    Note that during the Creditcoin 2.3 development effort, there have been new versions
    of the Substrate framework. We were aware of at least one breaking change that
    requires more attention downstream. However, a decision was made not to upgrade
    Substrate during the initial 2.3 development phase in order to minimize the risk
    of failures and the strain on engineering resources. Because of this, it isn’t
    clear how well the existing downstream CI jobs perform when there are major changes
    – at the time of this writing, we hadn’t yet ventured on this path!


    Another important note is that `gluwa/substrate` is following a versioned branch
    from upstream. If we want to upgrade, then we need to branch off the current code
    base, rebase against a newer upstream version branch, and see how that goes. This
    is a manual process which isn’t automated at the time of writing of this book.
    Again more work is necessary to be done here before we can become confident with
    our testing approach and the ability of the downstream test jobs to detect failures!'
