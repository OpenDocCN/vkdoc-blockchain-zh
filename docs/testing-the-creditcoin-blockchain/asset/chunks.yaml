  trans: "\n### 在 PoS 测试网上进行社区测试\n\n没有完美无瑕的软件；然而，为区块链切换共识引擎是一件大事，如果处理不当，会带来品牌受损和社区反对的风险。数据丢失（无论是历史数据还是产生区块的能力）是另一个主要风险，这已由现有的测试覆盖范围所涵盖。此处，我们重点关注技术栈中的其余组件。\n\
    \n在内部，所有组件都已打磨至不存在重大漏洞或视觉缺陷，或者这些缺陷对公众来说并非一目了然，至此，`Creditcoin` 的权益证明版本被认为已足够完善，可以作为公开测试版发布。我们进行了全新的测试网部署，并附带了配套的文档、Staking\
    \ Dashboard、Subscan Essentials 和 `creditcoin-cli` 组件。首次部署的是“PoS Devnet”（PoS 开发网），仅供工程团队内部使用。面向社区的环境称为“Creditcoin\
    \ PoS Testnet”。\n\n在创建了这个新的 PoS 测试网环境并部署了所有组件之后，我们在 Creditcoin 官网和社区频道上发布了公告。社区成员获得了测试网\
    \ CTC 代币，并被鼓励以提名人和验证人的身份参与网络。换句话说，他们被激励去试用新引入的软件组件。这项工作主要由市场团队推动，他们负责收集用户反馈，并整理一份来自社区的漏洞和问题清单，然后提交给区块链工程团队。\n\
    \n此次社区测试的目的多种多样，与其他软件厂商的类似努力别无二致：\n\n1.  当然是为了制造营销热点并提升社区参与度。\n2.  确保主要组件按预期工作，或者至少没有灾难性故障，并从实际用户群中收集漏洞和反馈。\n\
    3.  确保文档足够充分，以便用户即使对实际技术不太熟悉，也能参与并执行预期任务，而不会遇到技术难题。据我们所知，有些用户可能是首次参与区块链网络。我曾经就是这样的用户之一。\n\
    4.  为预计会有多少提名人和验证人参与网络建立一个基准。稍后我会谈到一些限制，而这是收集真实数据的一种便捷方式。\n5.  允许其他工程团队（包括内部和外部）试用\
    \ Creditcoin PoS 实现，并在必要时调整他们的应用。如有需要，可将其作为这些团队的预发布环境。\n\n关于为何要独立部署，这里有几句话要说！主要有两种选择：\n\
    \n1.  升级现有的 Creditcoin 测试网区块链。\n    -   优点\n        -   这正是你在主网上实际会做的操作；保持流程一致以便演练、获得信心并可能发现迄今为止被忽视的问题，这是有意义的。\n\
    \        -   允许对历史区块保存功能进行真实世界的测试。\n        -   切换过程高度可见，如果进展顺利，会向你的社区传达积极信号。\n\
    \    -   缺点\n        -   现有的 PoW 矿工可能无法准确预知切换发生的时间，这将导致他们在无法产生区块的情况下继续运行。这可能是不期望的，因为他们会持续消耗计算资源，并且可能尚未准备好与你同时过渡到权益证明。\n\
    \        -   不受控制的快速采用会导致饱和/过载/边界情况错误——例如，10000 个验证人同时想加入。\n        -   如果切换失败，这也同样高度可见，并且声誉受损的风险非常高。\n\
    \    -   应急方案\n        -   销毁出现问题的链，并从备份中恢复。从技术上讲相对容易实现，但可能需要与社区成员进行一些协调，但如果真的发生这种情况，总体而言会非常损害声誉。\n\
    \n2.  部署一条全新的区块链。\n    -   优点\n        -   完全独立。\n        -   允许参与者按自己的意愿加入。现有的矿工可以自行决定是否重新分配其硬件资源。\n\
    \        -   允许你控制谁能参与，并通过控制这条新链上的代币供应量以及设置允许的活跃验证人数量（例如，缓慢增长）来限制用户数量。\n     \
    \   -   即使出错，也不会中断现有的 PoW 测试网。虽然也不是什么好消息，但负面影响应该会更小。\n    -   缺点\n        -  \
    \ 无法演练在主网上执行切换的工作流程。\n        -   无法测试历史区块保存功能。\n    -   应急方案\n        -   销毁\
    \ PoS 链并从头开始。虽然也不是什么好消息，但负面影响应该会降到最低。\n\n### 文档审阅\n\n在引入质押功能之前，现有针对 1.x 和 2.0\
    \ 版本的文档包含的用户指导非常有限。那就是所谓的“Creditcoin 挖矿节点设置”，它基本上告诉用户如何生成公钥/私钥对，以及如何在启动 Creditcoin\
    \ 容器时使用他们的公共地址。该文档已在 `https://github.com/gluwa/creditcoin/pull/1505` 中被移除。\n\n\
    新的文档解释了“质押”的概念、工作量证明与权益证明的区别，以及一些基本概念，如验证人选举、时代与周期、质押奖励和惩罚。关于钱包的章节记录了常见的第三方浏览器扩展以及自研和第三方的命令行界面。接着是两个新章节“提名人指南”和“验证人指南”，解释了提名权益证明区块链中的两个主要角色，并指引用户使用他们可以使用的相应应用程序。\n\
    \n与成为工作量证明区块链中的矿工相比，成为权益证明网络中的验证人要复杂得多，并且包含多个独立的步骤。\n\n审阅文档，无论来自 QE 还是其他利益相关者，其确切含义就是——检查拼写错误、语法错误、不合逻辑的条目、术语不清晰或对没有经验的人来说不易理解的地方等等。这是一个迭代的过程，在短时间内收到了大量反馈并进行了多次修改。\n\
    \n“测试文档”的另一部分则是实际按照所列出的所有技术步骤操作，并确保它们是正确的；顺序是正确的，并且显示的命令会产生文档中所述的结果，同时确保版本号、URL\
    \ 等也都是正确的。\n\n文档的某些部分包含针对非 Linux 平台的示例，因此需要有人验证这些示例是否正确。与这份文档合作一段时间后，人们会变得相当有偏见，开始跳过文档的某些部分，或者已经能预见到需要输入哪些命令，因此以极其勤勉的态度反复检查所有内容变成了一件苦差事。这时就需要引入其他团队成员，最好是那些经验较少和/或不熟悉这份文档以及整个“成为验证人”工作流程的人，这样他们就能发现更多的边缘情况，并帮助改进文档。\n\
    \n文档 URL：`https://docs.creditcoin.org/cc2`（不同于 Creditcoin 3.0 文档）。\n"
- fmt: '### Load and Performance Testing


    In the context of nominated proof of stake, the questions around performance of
    the blockchain became important again. There are multiple items happening at the
    same time:


    - The algorithm selecting validators for the next era is effectively traversing
    a graph. The bigger the number of validators, the bigger the graph which takes
    more time to solve. If I remember correctly, Web3 research documents a practical
    limit around 300 validators, and other Substrate chains like Kusama and Polkadot
    are already running at this limit. For Creditcoin it’s important to find out what
    is our practical limit.

    - There is also a setting which limits the number of nominators per validator.
    It’s unclear to me how this number influences the graph algorithm from the previous
    item if at all.

    - All validators are sending an `i-am-online` ping throughout the current era;
    otherwise, they will be penalized.

    - The penalty subsystem is monitoring online pings and calculating penalties when
    necessary, chilling off validator nodes if need be.

    - Based on the number of blocks produced by each validator during the current
    era, the rewards subsystem is calculating rewards for the validator and all of
    their nominators.

    - There are the regular Creditcoin loan-cycle transactions.


    The entire blockchain is far more chattier compared to its proof-of-work predecessor.


    Looking at all of this for Creditcoin 2.3, we needed to establish a performance
    baseline and a toolset/methodology of doing “performance testing.” Using quotes
    here because I’ve merely been scratching the surface in this area, not going deep
    enough as you’ll see.


    The first tool in the arsenal is called `Zombienet`, [`https://github.com/paritytech/zombienet`](https://github.com/paritytech/zombienet).
    It uses templates and will launch a stand-alone ephemeral blockchain network.
    Using the template files, it is possible to configure a different number of nodes
    and parameters. You may also use the `Zombienet DSL` language to assert against
    the spawned network!


    I used `Zombienet` to launch networks of 100 to 300 validators and adjust Creditcoin
    settings, to establish a baseline of hardware requirements for testing and a baseline
    of behavior for the network. The entrypoint for Creditcoin Zombienet is the `zombienet/`
    directory inside the main git repository.


    The next important question was “if we switch to nominated proof of stake, can
    Creditcoin support a minimum number of loan transactions” or rather “how many
    loan transactions can it support”? In other words, does the switch to a proof
    of stake have any impact on blockchain throughput from a business point of view?
    Initially we looked at [`https://github.com/paritytech/polkadot-stps`](https://github.com/paritytech/polkadot-stps)
    which is a generic tool for any Substrate-based chain. `Polkadot-STPS` sends balance
    transfers which are virtually guaranteed to exist in every blockchain implementation
    using the Substrate framework; however, they are fairly lightweight compared to
    loan cycle transactions so not the best fit.


    I didn’t go deeper into this rabbit hole because the data that was found out initially
    answered the most important questions toward the expected blockchain performance
    in the near to mid-term future. There is also the tool `creditcoin-transaction-producer`
    created by another team member whose job is to send hundreds and thousands of
    transactions and actually answer the questions around throughput.


    ### Security Bounty Program


    Security has been and still is an ongoing concern for Creditcoin. And in my personal
    opinion, we as engineers should always strive to create secure software and be
    thinking along those lines.


    For example, as part of the development of `creditcoin-cli`, I’ve successfully
    advocated for removing the ability to directly specify secrets in plain text or
    display them as such in the terminal. Such functionality poses a security concern
    because these plain text values may end up in a terminal history file or copy-pasted
    to a wider audience with command output while trying to report a problem, etc.
    I’ve been working in the industry long enough to have firsthand experience of
    experienced teams leaking their credentials on the Internet via a number of different
    means. Having your software expose secrets in plain text without a minimum precaution
    is a sure way for less security-cautious/tech-savvy users to leak their secrets.
    You are just asking for it!


    In `creditcoin-cli`, secrets are either read interactively via a terminal prompt
    which masks the input characters and doesn’t allow the value to be copied, or
    they need to be specified as environment variables! These values are never stored
    on disk by the application itself.


    Aside from Creditcoin engineers doing internal assessment on the risks from a
    security point of view and the already mentioned static analysis tools, following
    best practices, and keeping third-party dependencies up-to-date, the team made
    some more work on our security bounty program.


    It is a low-key bounty program originally hosted at the `Hunter.dev` platform
    which had changed focus since then and documents the steps to responsibly disclose
    security vulnerabilities inside a `SECURITY.md` file in each repository. The goal
    is to allow the community to discover any low hanging fruits and for the team
    to establish a workflow around patching and responding to security vulnerabilities.
    For testing that means validating the reported entries, most importantly making
    sure steps to reproduce and issue description are accurate to the point where
    an engineer can work on them.


    The next step in this security journey will be a dedicated security bounty program
    with high monetary or crypto rewards which is hosted on a higher profile platform
    dedicated to Web3 security research. At the time of writing, the team is not there
    yet.


    Note that during the writing of this book, the `huntr.dev` platform itself changed
    ownership and shifted their focus from a general-purpose security bounty platform
    into one targeting AI/ML. Thus the original bounty program is no more! Security
    vulnerabilities can still be disclosed via email and/or GitHub’s security advisory
    interface which is accessible to everyone, but isn’t specifically targeting professionals
    in the security research space.


    As it happens, I’ve also worked on crafting a couple of security advisories for
    Creditcoin that were eventually published under [`https://github.com/gluwa/creditcoin/security/advisories`](https://github.com/gluwa/creditcoin/security/advisories).
    One more thing for test engineers to add under their toolbelts!'
