  trans: '

    ### 与质押相关的 Pallet


    本组件指的是 Substrate 的标准 pallet，它们提供了质押功能，例如：质押资金的能力；为验证人投票的能力；PoS 参与者的惩罚和奖励机制；以及决定当前时代活跃验证人集合的选举机制。在
    Creditcoin 2.3 及更高版本中，一个时代被定义为 24 小时，包含 2 个会话（也称为时段）。


    这些 pallet 在被纳入 Creditcoin 运行时之前，本身进行了少量修改。但是，运行时为它们定义了一些值，例如预期的出块时间和以区块为单位的时段时长。


    请不要将此与 Creditcoin 源代码中 `pallets/staking/src` 目录混淆。那是早期为去中心化链下工作者组件所做努力的一部分，该组件后来已被移除。可以说，这个组件的命名选择并不恰当。


    ### Creditcoin-cli


    与工作量证明链相比，一个提名权益证明区块链要求所有参与者进行更多的交互。虽然提名人有 Creditcoin Staking Dashboard 这个 Web
    应用程序，但验证人并没有专用的 Web 界面。公平地说，有 Polkadot JS Apps 应用程序（也称为 Substrate 门户）可用于为任何兼容
    NPoS 的 Substrate 区块链配置验证人。为了避免使用这个无品牌的通用第三方界面，`creditcoin-cli` 允许用户质押资金、成为验证人，并执行一些其他维护操作。


    这是一个用 TypeScript 编写的命令行应用程序，它被打包在 Docker 镜像中。CLI 应用程序中的所有命令都通过 WebSockets RPC
    端点与区块链通信。默认端点是 `ws://127.0.0.1:9944`，这是在运行中的容器内，`creditcoin-node` 二进制文件接受 RPC
    连接的地址。


    将它们打包在一起的原因是，某些 RPC 调用被认为是不安全的，不应通过互联网暴露——例如，轮换节点会话密钥。几乎所有其他操作要么是查询区块链，要么需要用户签名一个外部函数（Extrinsic），这些操作可以安全地发送到任何可用的
    RPC 端点。Creditcoin 2 的规范 RPC URL 是 `wss://rpc.mainnet.creditcoin.network/ws`，CLI
    命令可以直接与之通信。


    因为 Creditcoin 是一个分布式系统，所以将 CLI 应用程序指向哪个 RPC 端点实际上并不重要。只要一笔交易被签名并被某个运行中的节点接收，它就会被传递到底层区块链。完全有可能接收交易的
    RPC 节点与最终将该交易包含进区块的节点不是同一个。我能想到的唯一例外是前面提到的 `rotate-keys` 操作，它直接与节点通信，不需要签名，并且在某种程度上绕过了区块链。


    ### Switch_to_pos()


    这是一个自定义的外部函数（Extrinsic），位于一个同名的专用 pallet 中。它的工作是存储从 PoW 切换到 PoS 时的区块号，将区块难度提高到最大值以防止任何现有的
    PoW 节点产块，并初始化第一个权益证明会话的验证人列表。


    此外部函数旨在仅执行一次，作为生产环境迁移到权益证明的最后一步，之后便不再使用。它需要 sudo 权限。


    这也是 Creditcoin 开发生命周期中生命周期最短的组件。在切换后，其大部分内容已被移除，只留下了 `posSwitch.switchBlockNumber`
    存储项。


    对于好奇的读者，该更改发生在区块号 715,239，可以直接从 Creditcoin 主网查询；请参见 [`https://creditcoin.subscan.io/block/715239`](https://creditcoin.subscan.io/block/715239)
    和 [`https://polkadot.js.org/apps/?rpc=wss://rpc.mainnet.creditcoin.network/ws#/explorer/query/0x0e754be623e67ba57b51c40a8603342736987b8cdfeacb88819c8457d0a40d93`](https://polkadot.js.org/apps/?rpc=wss://rpc.mainnet.creditcoin.network/ws#/explorer/query/0x0e754be623e67ba57b51c40a8603342736987b8cdfeacb88819c8457d0a40d93)。


    您也可以直接查询区块链存储，查看切换发生的时间，如图 6-1 所示。


    ![](img/629923_1_En_6_Fig1_HTML.jpg)


    图 6-1


    Polkadot/Substrate 门户显示 Creditcoin 切换到提名权益证明共识的区块号


    ### 区块历史


    由于 Creditcoin 2.3 是现有 2.0 链的自然演进，因此工作量证明期间生成的区块仍然可以在链上获取，并且在切换共识算法后仍然可以验证，这一点非常重要。


    原始的 Substrate 实现假定权益证明历史从零区块开始，这在源代码中的多个位置被硬编码。最直接的解决方案是复刻（Fork）Substrate 并修改这些硬编码的位置。这已在
    Gluwa 的 Substrate 复刻仓库 [`https://github.com/gluwa/substrate`](https://github.com/gluwa/substrate)
    的 `pos-keep-history` 分支中完成。


    ### Creditcoin Staking Dashboard


    这是一个 Web 应用程序，允许提名人质押资金并为验证人投票。它是一个标准的 React.js 应用程序，将 SubWallet 等钱包浏览器扩展连接到 Creditcoin
    区块链。Creditcoin Staking Dashboard 的主要功能是质押资金、筛选和投票给验证人，以及监控过往表现和奖励。


    它是 Polkadot Staking Dashboard 的一个复刻，其品牌形象已针对 Creditcoin 进行了调整，修复了一些错误并简化了功能。主要是移除了关于提名池的功能，因为业务决策决定不将此功能作为迁移过程的一部分。后来在
    Creditcoin 3.0 中，提名池功能被重新引入。


    可通过以下网址访问：[`https://staking.creditcoin.org`](https://staking.creditcoin.org/)


    源代码：[`https://github.com/gluwa/creditcoin-staking-dashboard`](https://github.com/gluwa/creditcoin-staking-dashboard)


    ### Subscan Essentials


    Subscan 是一个 API 服务，它监控数十个基于 Substrate 的区块链网络，并将信息聚合到 SQL 数据库中。Subscan Essentials
    是实现此功能的开源组件。值得注意的是，真正的 Subscan 软件实际上并非开源，其本地部署版本需要付费。Subscan 似乎采用了开源核心开发模式。据我所知，这个开源组件与其服务并非一一对应，并且缺少某些功能，这也在意料之中。


    该组件被 Creditcoin Staking Dashboard 用于渲染性能图表，例如过往奖励。它使用 Go 编程语言编写。


    Creditcoin 2.3 使用了一个 subscan essentials 的复刻版本，该版本添加了 Staking Dashboard 所需的缺失 API
    端点。该复刻还引入了各种改进。


    来源：[`https://github.com/gluwa/subscan-essentials`](https://github.com/gluwa/subscan-essentials)


    ### Creditcoin-squid


    这与前面描述的 GraphQL 索引器相同。这里没有添加与权益证明相关的实质性新功能，提及其仅为了完整性。


    ## Creditcoin 2.3 时间线


    v2.3 的时间线大致从 2023 年 5 月延伸到 2023 年 9 月。这是一个快速测试和开发的时期，在此期间主要组件已经成型。这个时期经历了开发、NPoS
    测试网公告及社区参与，最后是 Creditcoin 主网向权益证明的迁移。

    '
- fmt: '# Testing of Creditcoin 2.3


    The primary goal here is to make sure none of the existing functionalities breaks
    and that making the switch to nominated proof of stake doesn’t bring the existing
    network down – both in terms of the network staying up; the network keeps producing
    blocks after the switch and older block history is still accessible!


    A secondary testing objective is to make sure that users can assume one of the
    newly introduced roles, a validator or a nominator, and use the provided applications
    for these roles without suffering major bugs – this is the new `creditcoin-cli`
    and the Creditcoin Staking Dashboard applications.


    Any other components may be viewed as lower priority as they have more of a supporting
    role, rather than being front and center of the user experience!


    ## Unit Tests


    New extrinsics such as `switch_to_pos` and a few others added during the Creditcoin
    2.3 timeframe received unit tests as per previously established workflow. I’ve
    tried to cover all possible scenarios and error conditions and assert on storage
    changes and emitted events. Nothing out of the ordinary here.


    With respect to the NPoS switch, its effects can’t really be observed from the
    unit test level, and trying to model the consensus switch via unit tests doesn’t
    bring practical value because we’re using a mocked runtime implementation. This
    is something which is easier to be observed and checked from the outside.


    ## Integration Tests


    The majority of the preexisting integration test suite stayed the same, and I’ve
    added tests for new extrinsics as per the usual workflow. A few tests related
    to metrics and RPCs had to be removed because they were no longer applicable for
    proof of stake. For example, because there is no more mining, the node hashrate
    metric became useless.


    Two new items became important before the official switch to proof of stake:


    1. Assert that block history is preserved.

    2. Incorporate a call to `switch_to_pos()` as part of the existing upgrade testing
    procedure.


    Asserting on historical block preservation is relatively straightforward:


    - Launch a stand-alone blockchain for testing purposes. It still starts as proof
    of work.

    - From outside of the integration test suite, record information about the last
    proof-of-work block – its hash and block details. Keep this information into a
    JSON file. Could be done as a setup step inside the test suite itself as well.
    The reason it happens outside of the test suite is because of the ability to execute
    this test suite against other chains where the switch had already happened.

    - Switch to proof of stake by calling the `switch_to_pos()` extrinsic.

    - Query the blockchain again with the same block hash stored in the JSON file.

    - Compare block details – they should be the same as the ones stored in the JSON
    file!


    Simulating the switch as part of the existing upgrade testing is also straightforward:


    - Launch a stand-alone blockchain for testing purposes. It still starts as proof
    of work.

    - Synchronize with a target blockchain as before, for example, Testnet.

    - Execute the `runtimeUpgrade` script which uploads the newest WASM runtime blob
    on chain.

    - Either fork and/or disconnect the local node from the target live chain to prevent
    changes from propagating. We do both in two separate test jobs.

    - Call `switchToPos()` against the locally running node in order to trigger the
    switch.

    - Execute the existing integration test suite against the local node to make sure
    everything still works. This also includes a check for block history preservation
    which is baked into the integration test suite.


    Tip


    In the Rust source code, extrinsic functions follow the so-called `snake_case`
    naming convention, while in the TypeScript client libraries, the same names are
    converted to `camelCase`. Both are the same, but I guess this may lead to some
    confusion if one is unfamiliar!


    ## Testing Subscan Essentials


    The actual upstream repository of subscan essentials was not in the best state
    when it comes to testing. History on GitHub showed that CI jobs have been failing
    for over a year when I last checked, and there is a long list of commits being
    merged to the main branch with failing CI jobs.


    As part of the Creditcoin fork, I’ve enabled all of the common tools we use on
    other repositories – MegaLinter, pre-commit CI, Dependabot, CodeQL, etc. Also
    added golang CI linter as a language specific tool and made sure we have code
    coverage reporting and CI jobs are executed on each pull request.


    Together with this, I’ve added multiple improvements around setting up required
    services inside the testing environment – for example, use the existing `docker-compose.yml`
    setup instead of specifying configuration values in multiple places, using the
    same golang version as part of CI, and when building docker images, cleaning up
    Dockerfile and more. Basically make sure that all of the extra tools which are
    standard practice for Creditcoin are happy and the issues reported by them are
    resolved.


    The good news is that there is an existing test suite written in Go. It is a kind
    of an API test suite, somewhere between a fully featured integration test suite
    and a unit test suite as far as I can tell. Its job is to exercise the various
    API endpoints and assert on their responses.


    Developers have tried adding to this existing test suite while working on the
    new API endpoints; however, we haven’t investigated it thoroughly, and it’s not
    really clear to me where we stand in terms of available test coverage (not code
    coverage) and the quality of this existing test suite. In short I didn’t have
    enough time to dig deeper into this existing code base and find out what was the
    real state of their test suite.


    The confidence in this component can be formulated as such “if it doesn’t crash
    and it doesn’t cause Creditcoin Staking Dashboard to produce errors and it seems
    like Creditcoin Staking Dashboard displays the appropriate rewards graphs then
    it’s probably fine.” This was deemed a non mission-critical component hence the
    formulated acceptance criteria.'
