  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成符合要求的中文文档。



    ### 代理功能


    这是区块链和命令行应用程序的一个功能性子组件。我在这里提及它是因为它很重要，并且它极大地影响了我们的测试方式。


    请记住，在谈论 Creditcoin 2.3 时，我曾提到过名为“stash”和“controller”的账户，并且该功能已被弃用。代理账户是新晋的功能。


    顾名思义，在 Creditcoin 3.0 中，用户可以创建另一个账户，该账户持有足够的资金来支付交易费用，并用于代表其主要账户执行日常操作。代理由主账户授权，然后用于代表主账户签署交易。使用代理账户可以显著降低因凭证意外泄露或被盗而导致大量资金受损的风险，因为持有所有资金的主账户只需与区块链进行一次交互——即授权代理。所有后续的其他交易都可以使用代理账户的秘密信息来执行，从而最大限度地减少主账户的暴露风险。


    在基于 Substrate 的链中，可以实现一个代理过滤器，它向用户导出不同的代理类型，并控制允许哪些运行时调用（即 extrinsics）。这就是如何为代理账户实现访问控制。Creditcoin
    3 提供了三种不同的代理类型：`Staking`（质押）、`NonTransfer`（非转账）和 `All`（全部）！这就是 Creditcoin 中过滤器的定义方式（代码清单
    7-1）。


    ```rust

    impl InstanceFilter for ProxyFilter {

    fn filter(&self, call: &RuntimeCall) -> bool {

    match self {

    ProxyFilter::All => true,

    ProxyFilter::Staking => matches!(

    call,

    RuntimeCall::Staking(_)

    | RuntimeCall::Session(_)

    | RuntimeCall::Utility(_)

    | RuntimeCall::VoterList(_)

    ),

    ProxyFilter::NonTransfer => matches!(

    call,

    RuntimeCall::Grandpa(_)

    | RuntimeCall::ImOnline(_)

    | RuntimeCall::Proxy(_)

    | RuntimeCall::Session(_)

    | RuntimeCall::Staking(_)

    | RuntimeCall::System(_)

    | RuntimeCall::Timestamp(_)

    | RuntimeCall::Utility(_)

    | RuntimeCall::VoterList(_)

    ),

    }

    }

    fn is_superset(&self, o: &Self) -> bool {

    match (self, o) {

    (ProxyFilter::All, _) => true,

    (ProxyFilter::NonTransfer, ProxyFilter::Staking) => true,

    (a, b) if a == b => true,

    _ => false,

    }

    }

    }

    ```


    *代码清单 7-1：代理过滤器实现*


    ### 质押面板


    这是一个 Web 应用程序，允许提名人质押他们的资金并为验证人投票。这是一个标准的 React.js 应用程序，它将钱包浏览器扩展（例如 SubWallet）连接到
    Creditcoin 3 区块链。Creditcoin 质押面板的主要功能包括：质押资金、筛选和投票给验证人、创建和参与提名池，以及监控过往表现和奖励。


    Creditcoin 3 质押面板的起源始于链的 v2 版本的现有 Creditcoin 质押面板。最初，我们认为从上游分支进行变基（rebase）到最新版本就足以同时支持两个版本的区块链。原始提交位于
    `https://github.com/gluwa/creditcoin-staking-dashboard/pull/108`。


    在进行此变基工作的过程中，团队实际上确认上游代码库已经发展到需要更新用于构建区块链的 Substrate 框架版本的程度。幸运的是，不兼容的地方并不多，并且在技术上可以使用单个质押面板实例来支持两个版本的
    Creditcoin；详情请参见 PR #108 的最后一次提交。


    在单个质押面板代码库中支持拥有不同版本的多个链这种安排是否可行，这谁也说不准。它很可能在将来导致某种兼容性问题。我们永远无法得知了，因为团队决定将现有代码拆分到一个名为
    `gluwa/creditcoin3-staking-dashboard` 的新仓库中，并独立地继续开发。在生产环境中，这两个质押面板实例是分开的，并且托管在不同的
    URL 下。


    公共 URL：`https://cc3-staking.creditcoin.org`


    源码：`https://github.com/gluwa/creditcoin3-staking-dashboard/`


    ### Subscan API


    Subscan 是一个 API 服务，它监控数十个基于 Substrate 的区块链网络，并将信息聚合到 SQL 数据库中。质押面板使用此组件来渲染性能图表（例如过去的奖励）。它还提供了一定程度的区块浏览器功能。


    这个组件与 Creditcoin 2.3 中的相同；但是，Creditcoin 3 并没有将其作为开源分支使用，而是使用了该 API 的 SaaS 版本，该版本可通过
    `https://creditcoin3-testnet.subscan.io/` 公开访问。


    ### Blockscout


    Blockscout 是一个用于检查和基于 EVM 的区块链的工具，也称为区块链浏览器。Blockscout 与其他浏览器（例如 Subscan）的主要区别在于，它能够理解智能合约调用或所谓的内部交易。换句话说，它是现有
    Substrate extrinsics 不代表的交易。


    该组件作为服务使用，Creditcoin 3.0 的测试网浏览器可在 `https://creditcoin-testnet.blockscout.com/`
    上访问。


    ### Crunch


    在基于 Substrate 框架的 NPoS 区块链中，验证人和提名人以加密代币的形式获得奖励。这种情况在每个 Era 都会发生，并且支付此类奖励有一个最长期限窗口——84
    个 Era。任何人都可以触发支付，但这不会自动发生。


    Crunch 是一个命令行界面和一个 Matrix 机器人，用于在每个 Era 为基于 Substrate 的链领取质押奖励，从而减少与区块链手动交互的需要。


    此组件是 `turboflakes/crunch` 的一个分支，并针对 Creditcoin 3.0 进行了特定更改，特别是旨在用于自动请求 Gluwa 自身验证节点所赚取的奖励。它使用
    Rust 编程语言编写。


    源码：`https://github.com/gluwa/crunch`


    ## Creditcoin 3.0 时间线


    本书概述了从 3.0 仓库初始创建到 Creditcoin 3.0 测试网公开宣布后不久的测试活动——大致在 2023 年 12 月至 2024 年 5 月之间。


    Creditcoin 3 测试网于 2024 年 3 月 21 日正式宣布！


    ## Creditcoin 3.0 的测试


    对 3.0 版本的测试在很大程度上建立在测试 Creditcoin 2.x 系列期间获得的经验之上。这意味着静态分析工具、外部和内部代码检查工具以及自动更新（例如
    Dependabot）等，基本上与之前的版本相同。


    由于 Creditcoin 3 的开发是在 Creditcoin 2 的 99% 的测试实践和基础设施已就位之后才开始的，因此在早期阶段，直接从 Creditcoin
    2 仓库复制所有 CI 配置，然后根据需要进行调整，这是相当常见的做法。本节将尝试重点介绍 Creditcoin 3.0 测试方面的不同之处，而不是重复我在
    Creditcoin 2.0 和 2.3 中提到的所有内容。


    请记住，3.0 版本的主要测试目标之一是 EVM 兼容性。


    以下是在拉取请求上执行的典型 CI 流水线图（图 7-2）。


    ![图 7-2：CI 作业概览](img/629923_1_En_7_Fig2_HTML.jpg)

    '
- fmt: '### Unit Tests


    The Rust code base of Creditcoin 3.0 has a very small number of unit tests predominantly
    coming from the `evm-tracing` package. The rest are checks around Ethereum account
    ID derivation and checking that base extrinsic weight is EVM compatible. Precompiles
    are similar to extrinsic functions, and they have their own unit tests as well.


    The actual source code inside the `gluwa/creditcoin3` repository, except the `evm-tracing`
    package and `precompiles/` directory, is mostly the runtime plumbing. There isn’t
    much that can be exercised on the unit test level – there are no custom RPCs or
    custom metrics, there are no pallets, nor there are custom extrinsics like in
    Creditcoin 2.


    ### EVM and Smart-Contract Testing


    We’re using a smart-contract test suite, written by a different team. This test
    suite is packaged as the `@gluwa/evm-network-test` NPM package and provides a
    few executable commands as its entry points. At the time of writing this book,
    there are `basicTest` and `gasTest` commands both of which require a Creditcoin
    RPC URL and a private key as their arguments.


    These commands can be executed as such:


    ```

    ./node_modules/.bin/basicTest --rpc  --private_key

    ```


    Note that addresses and private keys here are in the EVM format, starting with
    `0x`, not the Substrate format. For executing against a stand-alone blockchain
    running in developer-mode, one can use the pre-funded development accounts and
    their addresses and private keys which are described in more details on [`https://docs.moonbeam.network/builders/get-started/networks/moonbeam-dev/#pre-funded-development-accounts`](https://docs.moonbeam.network/builders/get-started/networks/moonbeam-dev/#pre-funded-development-accounts).


    This EVM test suite is executed via Hardhat Runner – a popular task runner, part
    of a very popular development environment for Ethereum-based smart-contracts called
    Hardhat. The actual files containing test scenarios are written in JavaScript
    with the popular `chai` assertion library which is the default in the Hardhat
    ecosystem.


    `baseTest` compiles and deploys a smart contract which represents a crypto token,
    then exercises various transactions on it, and asserts on the expected state.
    The focus here is to make sure that a contract representing an ERC20 crypto token
    can be deployed onto Creditcoin, tokens can be transferred between different wallets,
    and in general that users can interact with the deployed contract. The `gasTest`
    tool collects gas results into a CSV file. Despite its name, there are no assertions
    in this file.


    The source code repository for this test suite isn’t available via GitHub, but
    the NPM package, published under the open source MIT license, is available from
    [`https://www.npmjs.com/package/@gluwa/evm-network-test`](http://www.npmjs.com/package/@gluwa/evm-network-test),
    and you can examine the actual code after installing it. Just `cd` into the `node_modules/@gluwa/evm-network-test/`
    directory and take a look.


    From the blockchain point of view, the tools which are part of this test suite
    are executed against every environment we run blockchain-related integration tests
    on, for example, local, Devnet, Testnet, etc. You can think of it as another branch
    of the integration test suite which is available in the main repository.


    ### Testing EVM Tracing Functionality


    The RPC methods `debug_traceTransaction` and `debug_traceBlockByHash` are the
    entry points to EVM tracing, and they are exercised via an integration test which
    deploys a smart contract, makes a couple of transactions, and then calls these
    RPC methods with the respective transactions hashes and asserts on the responses.
    These two RPC methods are meant to be consumed by third-party providers, so they
    are considered to be important, and if this test breaks, that will be a major
    blocker. This isn’t a stand-alone test suite but rather just some of the existing
    scenarios.


    ### Integration Tests for the Blockchain


    This is the parent of any sort of so-called integration testing related to the
    blockchain itself. It is written in TypeScript and uses the Jest testing framework.
    Source code location under the `gluwa/creditcoin3` repository is `cli/src/test/blockchain-tests`.


    **Note**: To make it easier/simpler to reuse shared code and helper functions,
    the blockchain integration test suite is bundled together with the unit/integration
    test suite for the Creditcoin 3 CLI component. This saves a bit of effort trying
    to figure out where everything is and makes the code base simpler. An alternative
    is moving it into a separate directory and managing dependencies separately which
    was perceived as extra work without extra benefit.


    Similar to Creditcoin 2, this test suite is controlled via Jest config files and
    can be executed against different environments, including against a production
    environment. At the time of writing, it includes the aforementioned evm-tracing
    tests, queries, and asserts on some runtime values from the running chain it is
    being executed against and exercises the available precompile, `substrate_transfer`,
    from the outside.


    Another important mention here is that Creditcoin 3 is more diverse when it comes
    to configuration for different environments. The major difference is in block
    time and staking epoch duration which are different for local, Devnet, and Testnet.


    ### Precompile Testing


    This was already mentioned, but it deserves a separate section because there’s
    more in this area. Obviously there are unit and integration tests which cover
    positive and negative path scenarios. There is also something else, called contract
    metadata.


    This metadata is stored in JSON files, and the Blockscout explorer application
    reads these JSON files via their URL. That’s necessary so that Blockscout knows
    what additional information to display for this contract when analyzing internal
    transactions related to it.


    This metadata contains the precompile name, address, its bytecode, as well as
    1-line version of the Solidity source code. It is treated as an external API interface
    from the Blockscout application.


    On the testing side, I mostly use custom static analysis scripts to assert on
    things like:


    - File names don’t change b/c that will result in 404 errors and break the consumer
    application.

    - Bytecode and source code included in metadata actually match the Solidity interface
    definition.

    - Addresses are defined in separate JSON fields so they need to match.

    - We already know how to automatically update source code in the repository so
    regenerate metadata in the event the underlying source code changes and commit
    to git using `gluwa-bot`.

    - The naming convention here is per branch aka per environment (e.g., Devnet,
    Testnet, Mainnet) so make sure that expected files are available based on which
    branch we are releasing into and roll forward the aforementioned automatic source
    updates according to the existing release procedures.

    - The existing integration tests use the `ethers.js` library which needs the contract
    hex address and the contract ABI (Application Binary Interface), in the form of
    another JSON file before it can instantiate an object that interacts with the
    blockchain. Obviously these two pieces of information are hard-coded, but we need
    to make sure that they always match the origin source code and don’t diverge over
    time, that is, not testing exactly the same piece of code that you are building!


    The question which is still unclear to me at the time of this writing is what
    do we have to do in case there are more precompiled contracts added to the blockchain.
    Do we squash all of their metadata into the same JSON file, or do we start having
    individual files per contract? The answer to this question will have an impact
    on how checks are performed.'
