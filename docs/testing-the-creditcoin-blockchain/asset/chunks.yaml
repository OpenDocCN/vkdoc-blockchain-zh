  trans: "\n### 测试 Creditcoin 3 CLI 和代理功能\n\n对于 Creditcoin 3 CLI，预期包含以下测试组合：针对各种辅助函数的单元测试（无需运行链），以及集成测试（执行单个命令和验证者流程，并断言其成功执行、预期错误处理及链上状态）。与\
    \ Creditcoin 2 CLI 的测试套件相比，现有的测试套件更为详细。我有意添加了针对命令行应用所支持的每一个命令的测试，既涵盖正面和负面场景，也包含若干端到端测试场景。\n\
    \n由于每个测试场景都是独立执行的，我放弃了尝试收集和合并代码覆盖率指标。相反，我分析了每个命令的测试覆盖率，并补充了缺失的部分。这并没有听起来那么糟糕，因为可用命令集在最初引入后几乎保持不变——我认为，在这种情况下，手动进行测试覆盖率分析是可以接受的。这次我选择了一种低技术含量的解决方案，而不是寻求自动化。\n\
    \nCreditcoin 3 CLI 测试套件的一个显著区别是，将代理功能作为测试套件的一部分进行测试。我们必须考虑以下属性：\n\n*   是否使用代理账户？是或否。\n\
    *   提供的代理账户密钥是否有效？有效；无效；有效，但账户没有资金；有效，但代理已配置给其他账户。\n*   代理类型是什么？有三种可能的值。\n\n在实现上，使用代理账户会导致一些重要的差异：\n\
    \n1.  任何密钥处理代码都必须请求代理账户密钥，而不是存储账户密钥。\n2.  向区块链签名并提交交易必须通过代理账户进行。\n3.  检查可用余额分为两步：\n\
    \    - 代理账户必须有足够的资金来支付费用。\n    - 任何额外的金额必须与存储账户余额进行核对——例如，当你想质押更多资金时，你的主账户（而非代理账户）必须拥有指定的可用余额。\n\
    4.  显示余额和状态、查询操作，即使通过代理账户查询链，也必须始终使用主账户地址。\n\n我们对提供的密钥无效的情况不感兴趣，因为这会导致无法初始化任何密钥环，无论是否使用代理账户。这种情况会在到达链之前提前失败，并且不会被显式测试。其他一些组合也无效，因此我们剩下以下测试组合，这些组合在\
    \ CI 配置中表示为环境变量：\n\n1.  `proxy=no`\n2.  `proxy=yes / no-funds`\n3.  `proxy=yes\
    \ / not-a-proxy`\n4.  `proxy=yes / valid-proxy / type=Staking`\n5.  `proxy=yes\
    \ / valid-proxy / type=NonTransfer`\n6.  `proxy=yes / valid-proxy / type=All`\n\
    \n对于场景 2 和 3，重点是断言预期的错误处理。命令行应用不应崩溃，也不应允许交易通过。相反，它应该打印一条易于理解的错误消息，解释出了什么问题。即使在测试网公告发布后，我仍在处理这个问题，因为我们第一次尝试时并未完全正确。\n\
    \n测试套件使用通用的 setup/teardown 函数来相应地操作测试账户、其资金和/或其密钥。该测试套件中的大多数测试场景都使用条件执行，利用名为 `testIf`\
    \ 和 `describeIf` 的自定义函数，参见代码清单 7-2。这些函数建立在 Jest 测试框架现有的 `test()` 和 `describe()`\
    \ 函数之上，并且仅当给定表达式评估为 true 时才执行实际测试场景，因为并非每个测试场景都适用于所有可能的环境组合，例如：\n\n```\ntestIf(\n\
    \    process.env.PROXY_ENABLED === 'yes' && process.env.PROXY_SECRET_VARIANT ===\
    \ 'no-funds',\n    '应该报错并显示账户余额过低的提示',\n    () => {\n        try {\n         \
    \   CLI('bond --amount 111');\n        } catch (error: any) {\n            expect(error.exitCode).toEqual(1);\n\
    \            expect(error.stderr).toContain(\n                '无效交易: 无法支付某些费用，例如账户余额过低',\n\
    \            );\n        }\n    },\n);\n```\n\n*代码清单 7-2 `testIf()` 函数的使用示例*\n\
    \n某些 CLI 命令不支持代理功能，要么是明确选择不支持，要么是因为它们根本不需要用户进行身份验证。对于此类命令，条件测试执行将评估环境，并在需要时跳过测试，而不是复制不会带来任何新信息的额外执行。这些命令主要在\
    \ `proxy=no` 时进行测试。\n\n请注意，这六种变体都是并行执行的，并且由于它们有选择地跳过某些测试场景，因此在打开拉取请求时，总体反馈时间开销并不大。最长的变体是\
    \ `proxy=no`，其次是所有包含有效代理配置的组合。其中，最长的测试场景实际上是 `validatorCycle.test.ts`，它依次执行每个单独的命令，等待并断言结果，分发奖励，然后停止作为验证者，解除所有资金的绑定，等待它们变得可用，然后提取资金。\n\
    \n为整个测试套件集体添加的另一个可变维度是为所有 CLI 命令参数化目标 URL。有两个节点，分别称为 Alice 和 Bob，我们与哪个节点通信由 `--url\
    \ ws://127.0.0.1:<port>` 指定。在大多数测试场景中，我们利用代理处理代码，它会方便地将 `--url` 参数插入到最终的命令行中。\n\
    \n所有现有的 CLI 命令都已涵盖在测试中，并且为每个命令添加更多测试场景导致测试套件增长到实际上开始失败的程度，因为测试自动化代码本身存在问题。简而言之，原本应该相互独立的场景实际上共享了一个状态，这导致副作用在其他测试场景之间显现。具体来说，实际的集成测试如图\
    \ 7-3 所示。\n\n![图 7-3](img/629923_1_En_7_Fig3_HTML.jpg)\n\n*图 7-3 所有测试使用一个共享的区块链*\n\
    \n虽然各个 `*.test.ts` 文件仍然是按顺序独立执行的，但在实际实现中，每个测试场景会在区块链上创建一个随机账户，然后使用该账户扮演活跃验证者的角色，并以该角色测试不同的命令。共享状态（例如，谁是活跃验证者，以及哪个账户控制\
    \ Alice 和 Bob 节点）记录在链上，有时会发生这样的情况：区块链的活跃验证者集合配置了某些账户，而实际上下一个命令正在使用不同的账户执行。\n\n\
    例如，`validate.test.ts` 使用账户 XXXXXX 成为 Bob 节点的验证者，但之后没有正确清理。下一步，另一个测试场景生成账户 YYYYYY，并也试图成为控制\
    \ Bob 节点的验证者！从某种意义上说，这是在未正确清理的情况下劫持正在运行的 Creditcoin 节点。这是可能的，因为为节点配置会话密钥（例如，轮换密钥）是一项无需许可的操作，只要你能访问正在运行的进程（例如，RPC\
    \ 端口），就可以做到这一点。\n"
- fmt: 'This results in a state where the on-chain algorithms are expecting certain
    signatures before they can finalize a block, but those signatures never arrive
    because the validator accounts are no more. This breaks finalization which in
    turn breaks all client transactions. More precisely, transactions still make it
    into new blocks, but our tools, including the test automation suite, are designed
    to wait until a block is finalized before reporting an error. Because finalization
    never happens, everything becomes super slow until commands and test jobs eventually
    time out.


    The solution to this problem is actually very simple – make sure test scenarios
    don’t have a shared state – that is, start a new independent chain before every
    group of test scenarios is executed as shown in Figure [7-4](#629923_1_En_7_Chapter.xhtml#Fig4)!


    ![](images/629923_1_En_7_Chapter/629923_1_En_7_Fig4_HTML.jpg)


    **Figure 7-4** Each test using a dedicated blockchain instance


    The practical side of implementing this separation between individual tests was
    handled by supplying a custom value for the `setupFilesAfterEnv` key in Jest’s
    test runner config plus a global `beforeAll`/`afterAll` pair to perform the setup
    and teardown of the individual chains. Worked like a charm and added negligible
    overhead to total execution time of this test suite.


    ```

    $ cat integration-tests.config.ts

    import type { Config } from ''@jest/types'';

    const config: Config.InitialOptions = {

    preset: ''ts-jest'',

    testEnvironment: ''node'',

    setupFilesAfterEnv: [''./integrationTestSetupAfterEnv.ts''],

    };

    export default config;

    $ cat integrationTestSetupAfterEnv.ts

    global.beforeAll(async () => {

    await startAliceAndBob();

    }, 10_000);

    global.afterAll(() => {

    killCreditcoinNodes();

    });

    ```


    To make sure that the target under test looks sane before executing any commands
    and asserting on their side effects, the same approach was used. Listing [7-3](#629923_1_En_7_Chapter.xhtml#PC5)
    shows the global `beforeEach()` function. This also has the extra benefit of failing
    early.


    ```

    global.beforeEach(async () => {

    const [last, finalized] = await Promise.all([

    api.rpc.chain.getBlock(),

    api.rpc.chain.getBlock(await api.rpc.chain.getFinalizedHead()),

    ]);

    const lastBlockNumber = last.block.header.number.toNumber();

    const lastFinalizedNumber = finalized.block.header.number.toNumber();

    expect(lastBlockNumber - lastFinalizedNumber).toBeLessThanOrEqual(5);

    });

    ```


    **Listing 7-3** Implementation of global `beforeEach()` setup function


    The function `startAliceAndBob` spawns two background processes and also captures
    stdout and stderr into text files which are later uploaded as CI artifacts in
    case you need to debug failures. That functionality became handy during implementation
    of the `global.beforeEach` hook. The `api` variable, not shown in the listing
    for brevity, is created within the same function and always connects to Alice.
    The reason is that this code snippet executes before any real test scenarios take
    place, and we cannot access context variables in said test scenarios. After around
    eight test files were executed, everything started failing randomly in CI but
    not locally. The reason turned out to be a networking issue, and no new connections
    were going through. This is how it looked like (Listing [7-4](#629923_1_En_7_Chapter.xhtml#PC6)).


