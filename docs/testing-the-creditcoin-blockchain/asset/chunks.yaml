    (44660 ms)

    ✓ should be able to withdraw CTC to a Substrate account via --url ws://127.0.0.1:9955
    (44010 ms)

    EVM Balance

    ✕ should be able to show evm balance correctly when balance is zero (100112 ms)

    ✕ should be able to show balance correctly after funding (10001 ms)

    ● EVM Commands › EVM Balance › should be able to show evm balance correctly when
    balance is zero

    thrown: "Exceeded timeout of 100000 ms for a hook.

    Add a timeout value to this test to increase the timeout, if this is a long-running
    test. See https://jestjs.io/docs/api#testname-fn-timeout".

    ```


    **代码清单 7-4** 集成测试套件的失败输出


    实际的错误是我的辅助函数没有调用`api.disconnect()`。我是如何调试的呢？


    1.  所有测试文件按顺序执行，所以我统计了第一个失败的测试文件序号。我关注的是序号本身而非实际测试文件，且该序号在不同 CI 执行之间非常稳定。


    2.  然后从 CI 产物中下载所有日志文件——其文件名包含 Alice 或 Bob 模式以及时间戳，参见代码清单 7-5。


    3.  找到与失败执行序号（我推断是第 8 次）对应的 Alice 和 Bob 日志文件，开始分析。由于每个测试现在使用独立的区块链，这些文件并不大。


    4.  我从上到下阅读日志文件。区块生产方面一切正常，直到突然看到代码清单 7-6 中的错误信息：


    ```

    creditcoin3-node-Alice-2024-04-03T10-01-55.594Z-log.stderr

    creditcoin3-node-Alice-2024-04-03T10-07-22.470Z-log.stderr

    creditcoin3-node-Alice-2024-04-03T10-12-03.658Z-log.stderr

    creditcoin3-node-Alice-2024-04-03T10-16-49.086Z-log.stderr

    ```


    **代码清单 7-5** 多个并行测试任务的日志文件名


    ```

    2024-04-03 10:22:06 Too many connections. Please try again later.

    ```


    **代码清单 7-6** creditcoin3-node 日志中显示的错误信息


    我怀疑本地操作系统回收 TCP 连接的速度比 GitHub Actions 使用的容器化运行器快得多，和/或他们的环境在可用 TCP 端口数量上更受限制。一旦我添加了`.disconnect()`调用，一切就正常了！


    ### 运行时升级测试


    ![](img/629923_1_En_7_Fig5_HTML.jpg)


    **图 7-5** 运行时升级 CI 流水线


    与 Creditcoin 2 不同，Creditcoin 3 没有自定义存储迁移，因为没有自定义 pallet。这消除了前述围绕迁移测试和断言所需的所有基础设施。因此不再需要`try-runtime`，不再需要在迁移前后对存储中的项目进行断言，也不需要在迁移失败时使用特殊宏来使节点崩溃！


    尽管如此，仍然需要执行运行时升级并检查链是否继续正常运行。这在某种程度上也涵盖了可能存在的任何系统迁移。此流程与 Creditcoin 2 非常相似，如图
    7-5 所示——同步到活跃链、分叉、升级和测试（区块链+智能合约测试）。

    '
- fmt: '### Testing Creditcoin Staking Dashboard


    Everything that was said previously for `Staking Dashboard` and the lack of a
    comprehensive test suite from the upstream repository still holds true. As a result,
    this component relies heavily on being manually tested, which requires a connection
    to a running chain.


    Quite often I’d run a local Creditcoin node using our `fast-runtime` compiler
    flag, to make staking periods shorter, and then checkout a pull request and execute
    `yarn dev` in order to review and test the new changes proposed for `Staking Dashboard`.
    Under the hood, this component is a static JavaScript single-page application.
    To make it easier for myself and others to be able to review pull requests, I
    instrumented the build process to copy the static files into cloud storage and
    then post a comment on the pull request (Figure [7-6](#629923_1_En_7_Chapter.xhtml#Fig6)).


    ![](images/629923_1_En_7_Chapter/629923_1_En_7_Fig6_HTML.jpg)


    **Figure 7-6** Ephemeral preview as GitHub comment


    Clicking on the *“Staking Dashboard Preview”* link will open a URL, which is unique
    for every pull request and hosts the application as built from the latest commit
    in that pull request. I call it an *ephemeral deployment* or a *preview build*,
    but there isn’t much of an actual deployment here – it’s just HTML and JavaScript.


    This also builds the application under test in development mode so that the connection
    *“CreditcoinLocal”* is displayed in the menu. This allows the tester to easily
    use Creditcoin Staking Dashboard while running a local blockchain accessible at
    `ws://127.0.0.1:9944`. Alternatively, you can also connect to other environments
    like Devnet and Testnet if the bug was only reproducible in one of them.


    Super small technical contribution, see [`https://github.com/gluwa/creditcoin3-staking-dashboard/pull/34`](https://github.com/gluwa/creditcoin3-staking-dashboard/pull/34),
    which actually provides a great productivity boost so I will definitely continue
    doing this in the future.


    As can be expected, the upstream `polkadot-staking-dashboard` code base also contains
    issues and bugs that negatively affect downstream forks, for example, [`https://github.com/paritytech/polkadot-staking-dashboard/issues/2031`](https://github.com/paritytech/polkadot-staking-dashboard/issues/2031).
    Another one I found myself personally is the inability to display current configuration
    for nomination pool commission once set. Opening the corresponding modal widget
    the next time around shows a blank screen as if nothing had been configured. After
    digging through the relevant sections of Substrate’s source code, it looks to
    me like this functional area isn’t feature complete, and there were some commits
    which to me indicate that an access control model around who can configure nomination
    pools commission will be implemented in future versions. If that’s the case, it
    would explain why this widget in `Staking Dashboard` looks rough around the edges.


    While we can report such issues upstream, patch them downstream, and even contribute
    said patches upstream, we should recognize the fact that there is zero guarantee
    any of this will be accepted by the maintainers. While graciously providing their
    code base as open source, it is important to recognize that Polkadot is in the
    business of building a Web3 platform and are in fact a direct competitor. They
    are not necessarily a software vendor or a traditional open source project, and
    changes to their code base are most likely accepted if they align with their own
    long-term vision and goals. As demonstrated several times in other parts of this
    book, this has an impact on downstream consumers such as Creditcoin.


    Indeed, during the writing of this book, there were some breaking changes upstream,
    and an important piece from the Polkadot ecosystem, a UI application similar to
    `Staking Dashboard`, had one of their pages updated so that it only works with
    newer compatible chains. That was the Staking page. As it turns out, the issue
    was reported immediately by Polkadex which, from the attached screenshots, appears
    to be using the Polkadot JS Apps as part of their user interface; see [`https://github.com/polkadot-js/apps/issues/10505`](https://github.com/polkadot-js/apps/issues/10505).
    As of this writing, this upstream issue was seeking guidance on what the expected
    path forward would be and whether there will be some sort of backward compatibility
    provided. As it stands, during the time writing this section, this upstream change
    has the potential to affect several of Creditcoin’s downstream components. The
    same goes for other blockchains relying on the same upstream code base!


    Not only does this change have an impact on production deployments, but it also
    has an impact on testing – the Polkadot JS Apps UI is a convenient way of exploring
    and monitoring blockchains, especially local ones while performing testing activities.
    The effective disappearance of an entire page in this application, especially
    the one related to all staking activities, makes it impossible to observe anything
    related to this area, making downstream testing that much harder. Luckily, the
    non-development instance, actually an older version, of this app still shows the
    Staking page when connected to a non-compatible chain (aka an older chain) and
    is a viable workaround for testing purposes, until this older version gets removed
    from the Internet that is. Hosted at [`https://ipfs.io/ipfs/Qmd5YFzh6CqnJJJyQ9FWYff9SDSP2mmj8oTqgBaQz8uWwV/#/staking`](https://ipfs.io/ipfs/Qmd5YFzh6CqnJJJyQ9FWYff9SDSP2mmj8oTqgBaQz8uWwV/?rpc=wss://rpc.cc3-devnet.creditcoin.network/ws#/staking).


    Note that this URL represents an older production version and may have expired
    since then.


    Do you remember the Subscan API service? While migrating to a SaaS service transfers
    any concerns around quality and testing for this component toward its vendor,
    it introduces a slightly undesirable side effect – you cannot test certain functionalities
    of the `Staking Dashboard` application because they rely on consuming SaaS APIs
    which are not available for all environments. Certainly not available when running
    a development blockchain on `localhost`. For example, data about nomination pool
    members comes from the Subscan API service. As a result of this service not being
    available for `127.0.0.1`, Creditcoin Staking Dashboard displays zero members
    and an empty list in the corresponding UI widget!


    While you can test using an arbitrary `Staking Dashboard` deployment connected
    to other blockchain environments, for example, Devnet, Testnet, and even Mainnet
    (all of them have their corresponding Subscan API SaaS endpoints), you simply
    cannot test against `CreditcoinLocal` even when connected to it! Depending on
    the technical details of certain features, this may prove to be either just a
    nuisance or escalate to a larger test blocker. Something to keep in mind when
    using third-party services!'
