  trans: '

    # 区块链术语表


    **交易**，与常规 SQL 数据库中的事务非常相似，是一种旨在向区块链追加新信息的操作。它通常以 API 函数的形式暴露出来，以便用户可以与区块链进行交互。区块链交易通常是一个独立的实体，类似于针对传统数据库执行的单条
    SQL 语句。交易代表了区块链的业务领域，例如 Creditcoin 的 `AddBidOrder`，或者以太坊中以太币从一方转移到另一方。一个区块链网络可以支持多种交易类型。


    **哈希** 是一种单向加密函数的结果，通常接收二进制数据作为输入，并返回一个十六进制字符串。每个数据都有唯一的哈希表示，并且你无法将哈希值反向推导回原始输入数据。即使输入数据修改一个比特位，也会导致哈希值截然不同。这使得公开共享哈希值来代替数据本身是安全的，并且可以使用相同的哈希值来验证两段数据是否完全相同。


    **交易哈希** 是一个十六进制字符串，代表每笔交易的加密哈希值。这些字符串通常被用作标识符。例如，`https://etherscan.io/tx/0x8d116ea41628ac89745c95147c0ea394809074607395b0d792d1bea9136280b1`
    代表了我用一种加密代币（G-CRE）兑换另一种（ETH）的交易。


    **Gas** 或 **交易费** 代表在区块链上执行特定交易所需的成本。它可能随时间变化，也因交易类型而异，旨在表示该交易的计算开销。该值通常以区块链的原生加密代币表示。Gas
    的目的与代币经济学相关，同时也提供了一种安全特性，使得恶意行为在经济上不可行。


    **区块浏览器** 通常是一种 Web 应用程序，允许用户搜索和查看区块链上的区块、交易和地址。一个流行的例子是上一段中链接的 Etherscan。对于 Creditcoin，类似的功能由
    Subscan（`https://creditcoin3-testnet.subscan.io/`）和 Blockscout（`https://creditcoin-testnet.blockscout.com`）提供。


    **区块** 是原子性地记录到区块链上的多个交易的集合。区块内的所有交易要么一起被记录，要么都不被记录。如果我们类比 git 版本控制系统，单个修改过的源代码块将是一个“*交易*”，而包含多个修改的一次
    git 提交则是“*区块*”。


    虽然我们通常将区块称为记录，但其含义与数据库记录不同，数据库记录表示离散值的单一集合，换句话说就是一行列值。在区块链上下文中，术语记录更接近于存储了多首歌曲的黑胶唱片的含义。


    区块包含一个交易列表、对前一个和下一个区块的引用，以及附加元数据，例如时间戳、加密哈希和签名。根据实现方式，单个区块中可以存储的交易数量有最大限制。


    **区块饱满度** 或 **区块饱和度** 代表区块内总可用空间实际使用的百分比。例如，如果区块链没有被使用，每个区块可能只包含一个心跳/时间戳交易。而在一个被重度使用的区块链中，它可能包含数百笔交易。


    **区块哈希** 是一个十六进制字符串，代表每个区块的加密哈希值。这些字符串通常被用作地址或标识符。例如，`0x34e89f72d1bc09af19759a94c347d769a94bb0ca9d257b2efe8ad5ac0502cc11`
    对应于以太坊主网上的第 19517842 号区块。其内容可以通过 `https://etherscan.io/block/0x34e89f72d1bc09af19759a94c347d769a94bb0ca9d257b2efe8ad5ac0502cc11`
    或 `https://etherscan.io/block/19517842` 查看。该区块包含 185 笔单独交易，包括我进行了一些代币兑换的那一笔。


    **区块高度** 或 **区块编号** 是其前面区块的数量。较旧的区块高度较低。这个数字越大，区块链存在的时间就越长。


    **出块时间** 是区块链上区块之间的平均时间，例如 15 秒。这个值本身是任意的，由区块链的创建者选择。重要的是这个值大致是一个常数。在比特币中，预期的出块时间是
    10 分钟，而在以太坊中，设计要求的出块时间是 15 秒，实际上通常在 10 到 19 秒之间。Creditcoin 的初始实现使用了 60 秒，后来的版本降到了
    15 秒。恒定的出块时间对于分层应用更有利，因为它们可以知道在什么时间范围内可以认为一个操作失败或超时。


    **创世区块** 是编号为零的区块。它通常被硬编码到区块链的实现中，例如你的客户端程序，并且可能包含后续链正确运行所需的元数据。例如，哪个账户是根账户，或者一组预定义地址的起始余额。


    **分叉** 发生在区块链向两个可能的路径前进时。当多个节点几乎同时生成一个块时就可能发生分叉。当后续区块被添加并且其中一条路径比其他路径更长时，分叉就会得到解决。


    **硬分叉** 通常发生在区块链协议发生不向后兼容的更改，并要求所有用户升级其软件才能继续参与网络时。在硬分叉的情况下，区块链网络作为两个彼此不连接的数字实体存在。硬分叉也可能由于软件实现中的错误和/或导致共识失败的网络问题而发生。换句话说，区块链中的参与者无法就哪条前进路径应该是权威路径达成一致，结果是产生了两条独立的链。


    由于区块链旨在用作事实来源，无法解决导致硬分叉的情况被认为是严重的，并且可能对区块链造成损害。


    区块**最终性** 指的是区块链上交易的不可逆确认，确保了安全性并防止了双花。区块**最终化** 是用于处理分叉并选择权威链的过程，在该链上，大多数参与者都同意区块不应被回滚。实际上，这意味着所有参与者的三分之二同意。

