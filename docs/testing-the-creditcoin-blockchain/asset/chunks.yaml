    # 第四部分 区块链测试方法


    # 8. 他人如何测试区块链


    我撰写本书的动机是分享我在区块链测试方面的个人经验，希望能对他人有所帮助。在写作过程中，我实际上结识了其他在区块链领域工作的测试人员。当然，他们从事的产品与我的不同，他们的方法也与我不同。


    本章概述了 Andrew Snaith 和 Sebastian Viquez 的经验，他们欣然同意与我交流。如您所见，区块链中需要测试的内容比我前面所有章节中涵盖的还要多。


    ## 我的区块链测试方法


    与其他任何类型的测试一样，我从试图理解我们想要做什么以及我所处环境的限制开始：


    *   被测区块链的所有组件是什么？

    *   每个组件如何工作，其复杂性如何？

    *   涉及哪些风险？业务需求是什么？

    *   哪些部分可以通过单元测试、集成测试和/或其他类型的测试来覆盖？

    *   我如何实际编写这些类型的测试——例如，可用的工具、语法和示例。


    这有助于我从业务角度和技术角度建立起对所有动态部分的理解。我倾向于先从技术方面入手，然后逐渐扩展我的理解。只要有可能，我会选择在开发周期早期进行测试，并尽可能实现自动化。这也有助于将复杂系统的行为编码化，这在许多情况下都非常有用。


    对 Creditcoin 而言，这意味着我主要专注于测试业务逻辑，并在出现新场景以及随着我们对整个区块链的使用方式和详细运作方式有了更多理解时，覆盖这些附加场景。持续参与拉取请求的代码审查，为缺失的测试或重构需求提出问题并提交工单以确保不被遗忘，从长远来看，这比我自动化过的任何特定测试场景或我发现的任何单个错误对质量的贡献都更大。


    这是一种自下而上的方法，也是一种非常有机的方法——从第一天开始测试，并测试你能接触到的每一个微小的产品部分。这也是我个人的偏好，源于我多年来的职业生涯发展——我一直在产品公司工作，总是从事高度技术性的产品，并且总是与开发人员处于同一水平。无论如何，这本身就是基础设施类软件产品的特性。


    我不确定我是否有资格为那些与我处境不同的人提供建议。我想“试一试”就是足够好的建议了。


    ## 与 Andrew Snaith 一起测试跨区块链栈


    测试区块链协议和客户端实现只是难题的一个方面，可以说 Gluwa, Inc. 控制着这两者使得测试 Creditcoin 相对容易。我与 ChainSafe
    的质量工程主管 Andrew Snaith 讨论了他对区块链测试的看法，并发现了比我之前想象的更多的细微差别。


    ChainSafe 是一家多链区块链研发公司，专注于开源软件。他们为外部客户提供开发服务，也开发自己的产品。


    在组织方面，公司有多个工程团队，大部分时间在所谓的“流”上工作。一些工程师专注于单个流，而另一些则同时并行处理多个流。同样，有些团队有专门的质量工程师，有些则没有，稍后会详细介绍。工作本身横跨多条链以及整个技术栈：主机客户端开发、跨链桥、Web3
    工具库和 SDK、分布式应用、智能合约以及浏览器扩展。


    **注意**


    **桥**是一种计算机程序，它连接两个或多个区块链，通常用于在它们之间转移资产。不同的链并非原生相互连接，因此桥必须确保代币所有权和数量在跨链转移中得到正确表示。


    **注意**


    **Filecoin** 是一个基于区块链的去中心化存储网络。它由 [Protocol Labs](https://en.wikipedia.org/wiki/Protocol_Labs)^(¹⁰)
    开发，并借鉴了 [星际文件系统](https://en.wikipedia.org/wiki/InterPlanetary_File_System)^(¹¹)
    的一些理念，允许用户出租未使用的磁盘空间。该区块链基于复制证明和 [时空证明](https://en.wikipedia.org/wiki/Proof_of_space-time)^(¹²)
    共识算法。


    ### 被测产品


    我不打算列出 ChainSafe 参与的每一个项目，但以下是按各自类别分组的几个值得注意的被测产品列表。请务必记住这种多样性，因为它反映了测试是如何进行的。

    '
- fmt: '### Protocol Clients and Bridges


    `Lodestar`^([^(13)](#fn13)) is an implementation of Ethereum consensus in the
    TypeScript language. It is a light client for Ethereum and is considered to be
    production grade.


    `Forest`^([^(14)](#fn14)) is an alternative implementation of the Filecoin host
    client, written in the Rust programming language, while the official Filecoin
    client and reference implementation is written in the Go language. `Forest` is
    already considered to be in production.


    `Gossamer`^([^(15)](#fn15)) is an implementation of the Polkadot host client written
    in Go which is not yet launched in production. This work is funded by the Polkadot
    Treasury after a successful Open Gov proposal.


    It is important to note that all of these are essentially a third-party implementation
    of somebody else’s open source protocol, while in the rest of this book I talk
    about protocol (the Creditcoin loan cycle and data structures) and client implementation
    (`creditcoin-node`) created by the same team! An important reason for client diversity
    is enhancing ecosystem security, that is, to prevent an attacker from exploiting
    bugs which may not exist in an alternative implementation. Here I mean bugs present
    in the client program itself, for example, logical errors, or bugs inherent to
    the programming language it was written in.


    `Sygma`^([^(16)](#fn16)) is a modular, open source, cross-chain connectivity protocol
    which allows applications to interoperate across EVM, Substrate, and other chains.
    You can also see this referred to as a cross-chain bridge, for example, a software
    component that makes it possible to connect events across different blockchains.
    The exact scope of this components varies depending on business and functional
    needs.


    ### Libraries and SDK


    `web3.js`^([^(17)](#fn17)) – a very popular JavaScript library for building on
    Ethereum, an alternative to `ethers.js` which I’ve used. ChainSafe is the current
    maintainer of this open source library.


    `web3.unity`^([^(18)](#fn18)) – an SDK for the Unity framework which allows games
    to interact with blockchains and provides an admin panel.


    You can find several more libraries on the ChainSafe GitHub page: [`https://github.com/orgs/ChainSafe/repositories?q=web3`](https://github.com/orgs/ChainSafe/repositories?q=web3).


    ChainSafe is also very proud of their `cypress-polkadot-wallet` plugin; however,
    this is not a core product but rather one of their testing tools so more on it
    a bit later.


    ### Browser Extensions and Distributed Applications


    `Polkadot Wallet Snap for MetaMask`^([^(19)](#fn19)) is a MetaMask plugin for
    interacting with distributed apps on Polkadot and other Substrate-based chains
    because a vanilla MetaMask installation can only work with Ethereum compatible
    chains.


    `Multix`^([^(20)](#fn20)) is an interface to easily manage complex multi-signature
    wallets on the Polkadot blockchain.


    ### Testing Strategy


    Andrew, like myself, is coming into the blockchain world from a traditional software
    development and testing background. His value proposition is to bring his existing
    expertise into the blockchain domain. In practical terms, this means to balance
    the need for blockchain development to be nimble and fast yet at the same time
    define some processes like collecting product requirements, establishing a process
    of reviewing pull requests, creating test plans and executing them, adding test
    automation, and so on.


    While my original impression was that there aren’t many test engineers in blockchain
    because of the inherent complexity of distributed systems and also the relatively
    unfamiliar programming languages, Andrew brings a slightly different point of
    view:


    - Blockchain development is still a pretty niche area in the world of software
    development. It''s mostly made up of smaller teams and the technology stack is
    still new, so it can be tricky to find talent in general and testers in particular.

    - Partly because of the immutability aspect, and I also think partly because of
    the nature of distributed systems, blockchain developers seem to have a higher
    level of testing experience compared to other domains in the IT industry. Or probably
    they are just more experienced developers because they need to be in order to
    work in this domain space.

    - In terms of test writing at the unit and integration layer we see a lot; however,
    this is done by developers as one of many other responsibilities and is not a
    dedicated effort.

    - Having someone who''s really focused on quality process and risk mitigation
    is super important as building a high-quality product is much more than just test
    creation and test execution.


    I will also add that some blockchain-related startups have been working on speculative
    coins and were under pressure to cut corners and seek fast exit rather than follow
    a traditional software development process and build a quality product. In this
    respect, Andrew is grateful not to have this challenge and aspect at ChainSafe.


    Due to the diversity of projects and teams at ChainSafe, and also in general,
    everyone’s definition of what “high quality” means is different. Andrew is going
    with a practical model following the ISO 25010^([^(21)](#fn21)) standard – high
    quality is the level to which the software under test satisfied the requirements
    posted by its stakeholders. This generic model is used as a guideline principle
    at ChainSafe which then evolves according to the product and blockchain-specific
    needs.


    According to Andrew, the challenges in terms of working with a blockchain are
    as follows:


    - **Data immutability**: Blockchain state cannot be changed after it is recorded,
    and if your testing requires specific on-chain state, you can mitigate this by
    either using fresh testing accounts every time and/or using local and shared testnet
    chains. In Creditcoin I actually use fresh testing accounts most of the time coupled
    with the fact that the test suite does not depend on the actual data itself –
    just that it is present! I am probably missing some test coverage here.'
