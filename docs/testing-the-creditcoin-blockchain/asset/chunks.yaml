- fmt: "**State** is the current snapshot on the blockchain – the total number of\
    \ blocks, the transactions recorded in these blocks, and the value(s) recorded\
    \ in local storage. In practice when we talk about state, we mean a snapshot of\
    \ the blockchain at a specific block. For example, the state at block 1000 is\
    \ that Alice has a balance of 300 and Bob has none! In block 1010, the internal\
    \ state may have changed due to transactions which have been executed in the meantime.\
    \ For example, Bob has now earned a certain amount of tokens. When we talk about\
    \ state, quite often we mean the last values recorded onto the blockchain ignoring\
    \ previous history. Depending on the context, we may want to take into account\
    \ prior history, probably if you are trying to reproduce a specific bug.\n\n**Mining**\
    \ is the process of performing computationally intensive cryptographic operations\
    \ as part of the proof-of-work consensus algorithm. Computers performing this\
    \ work are known as **miners**. Broadly speaking, we also use the term **miner**\
    \ when referring to a computer and/or a human participating in a blockchain, regardless\
    \ of the actual consensus algorithm.\n\nIn cryptography and blockchain, a **nonce**\
    \ is an arbitrary number that can be used just once in communication. It is often\
    \ a pseudo-random number issued in an authentication protocol to ensure that old\
    \ communications cannot be reused in replay attacks.\n\n**Validator** is a computer\
    \ node which verifies the legitimacy of blockchain transactions. Also known as\
    \ **miners** or **minters**, validators are the ones who participate in the consensus\
    \ algorithm and gain privilege to append blocks to the blockchain. The process\
    \ is entirely automated, and when we say \"user,\" we generally mean a computer\
    \ participating in the blockchain network; however, keep in mind that this computer\
    \ is operated by a human, aka the user, which may also be referred to with the\
    \ same terms. The term validator is commonly used with proof-of-stake consensus\
    \ algorithms, while miner is more commonly used with the proof-of-work algorithm.\n\
    \nA **nominator** is a participant in the blockchain which votes with their funds\
    \ in favor of selected validators. In proof-of-stake networks, nominators are\
    \ a role of users who can participate in the blockchain without needing much technical\
    \ knowledge to operate a blockchain node. They are sometimes also known as **\"\
    investors\"** because they only use their funds, as opposed to technical operators.\n\
    \n**[Crypto] token** is some sort of digital token that is used to represent value\
    \ on the blockchain in order for the blockchain network to be economically sustainable.\
    \ Validators are rewarded tokens in exchange for operating computing hardware\
    \ that supports the blockchain and the data stored within it.\n\nTokens such as\
    \ BTC, ETH, CTC, and others are referred to as **cryptocurrency** which then may\
    \ take a life of its own. Because a token is a representation of value, it can\
    \ be exchanged for other tokens of value, for example, paper money, also called\
    \ **fiat currency**, or another digital token. Token economics is outside the\
    \ scope of this book.\n\nThe existence of crypto tokens is usually a must for\
    \ public blockchain networks because it provides the incentive for operators to\
    \ join the network. Private networks with stricter access control and/or focus\
    \ on solving a particular business problem would rarely need crypto tokens. The\
    \ expected profit of solving the business problem at hand provides the necessary\
    \ motivation for operators of such networks.\n\n> **Note**  \n> Blockchains usually\
    \ have what's called a **native token** or a **utility token** which is meant\
    \ to facilitate operating the blockchain. Then there can be other tokens, also\
    \ known as **coins**, which could be exchanged, traded, or used for any other\
    \ purposes. It is not uncommon that such **coins** are attributed significant\
    \ value just because of their existence, not because of their technical utility.\n\
    \nA [crypto] **wallet address** is represented as a long hexadecimal string which\
    \ holds information about different crypto tokens and their balance owned by whoever\
    \ controls it. The hex string is used as the wallet address and in practice represents\
    \ the public key of a private-public key pair. In general wallets are anonymous\
    \ accounts on the blockchain. Note that this address is relevant to a particular\
    \ blockchain. My address on Ethereum is `0x718bb20f20ab1937710D2Ac579D97835a6fD099C`.\
    \ This address may not exist on other blockchain networks. It is also important\
    \ to note that different blockchains may use different address formats and representation.\
    \ In Ethereum the length is 20 bytes represented by 40 hexadecimal digits as shown\
    \ above. In Creditcoin, the Substrate framework, the format is 32-byte account\
    \ identifier; however, not all addresses in Substrate-based networks are based\
    \ on keys.\n\nSince the algorithms generating these addresses have very low probability\
    \ of collisions, wallet addresses are practically unique and can be used across\
    \ different blockchains as long as the format is supported. In practice, the first\
    \ time a transfer is made to a particular address, the \"account\" behind it will\
    \ start to exist on that particular blockchain.\n\nA **wallet app** is an application\
    \ which holds your public/private keys and allows the user to interact with a\
    \ blockchain by signing transactions for transferring or exchanging different\
    \ crypto tokens. Most commonly that is a web browser extension or a mobile application.\
    \ Popular wallet apps, for example, are **MetaMask** and **SubWallet**, but there\
    \ are many more available with varying functionality. For example, the financial\
    \ mobile application Revolut also contains features of a crypto wallet, allowing\
    \ you to purchase tokens, send transfers to other addresses, or make investments\
    \ in crypto, even though its feature scope is much larger. Because wallet apps\
    \ hold private keys and allow the user to sign transactions, they are often one\
    \ of the most visible software pieces for a user interacting with a blockchain.\n\
    \nNote that depending on context, the term **wallet** may refer either to the\
    \ address of an account, or to the user facing application used to manipulate\
    \ funds in this account or both.\n\nA crypto **faucet** is a quick way of rewarding\
    \ users with small amounts of crypto tokens in exchange for performing various\
    \ tasks on a website or mobile application. The tasks the user completes could\
    \ be clicking on a paid ad, completing a CAPTCHA test, logging in every day, or\
    \ interacting with a Discord bot, for example. In a blockchain testing environment,\
    \ your team will probably have internal/external faucets to help testers acquire\
    \ some cryptocurrency and use it for testing.\n\nAn **airdrop** is a marketing\
    \ strategy that involves sending coins or tokens to wallet addresses of active\
    \ members of the blockchain community for free or in return for a small service.\
    \ For testing purposes, it performs the same function as faucets but is not self-service.\n\
    \n**Mainnet**, **testnet**, **devnet**, and **stagenet** are separate instances\
    \ of a blockchain network. They are isolated from one another, and you can have\
    \ as many as you need for testing and development purposes. Unique accounts, tokens,\
    \ blocks, and transactions will exist in each instance of the network. The instance\
    \ called **mainnet** is the production environment. The rest are assigned more\
    \ or less arbitrarily by the blockchain creators. Some blockchains may have multiple\
    \ test and development environments denoted by names."
  raw: '**State** is the current snapshot on the blockchain – the total number of
    blocks, the transactions recorded in these blocks, and the value(s) recorded in
    local storage. In practice when we talk about state, we mean a snapshot of the
    blockchain at a specific block. For example, the state at block 1000 is that Alice
    has a balance of 300 and Bob has none! In block 1010, the internal state may have
    changed due to transactions which have been executed in the meantime. For example,
    Bob has now earned a certain amount of tokens. When we talk about state, quite
    often we mean the last values recorded onto the blockchain ignoring previous history.
    Depending on the context, we may want to take into account prior history, probably
    if you are trying to reproduce a specific bug.


    **Mining** is the process of performing computationally intensive cryptographic
    operations as part of the proof-of-work consensus algorithm. Computers performing
    this work are known as **miners**. Broadly speaking, we also use the term **miner**
    when referring to a computer and/or a human participating in a blockchain, regardless
    of the actual consensus algorithm.


    In cryptography and blockchain, a **nonce** is an arbitrary number that can be
    used just once in communication. It is often a pseudo-random number issued in
    an authentication protocol to ensure that old communications cannot be reused
    in replay attacks.


    **Validator** is a computer node which verifies the legitimacy of blockchain transactions.
    Also known as **miners** or **minters**, validators are the ones who participate
    in the consensus algorithm and gain privilege to append blocks to the blockchain.
    The process is entirely automated, and when we say “user,” we generally mean a
    computer participating in the blockchain network; however, keep in mind that this
    computer is operated by a human, aka the user, which may also be referred to with
    the same terms. The term validator is commonly used with proof-of-stake consensus
    algorithms, while miner is more commonly used with the proof-of-work algorithm.


    A **nominator** is a participant in the blockchain which votes with their funds
    in favor of selected validators. In proof-of-stake networks, nominators are a
    role of users who can participate in the blockchain without needing much technical
    knowledge to operate a blockchain node. They are sometimes also known as **“investors”**
    because they only use their funds, as opposed to technical operators.


    **[Crypto] token** is some sort of digital token that is used to represent value
    on the blockchain in order for the blockchain network to be economically sustainable.
    Validators are rewarded tokens in exchange for operating computing hardware that
    supports the blockchain and the data stored within it.


    Tokens such as BTC, ETH, CTC, and others are referred to as **cryptocurrency**
    which then may take a life of its own. Because a token is a representation of
    value, it can be exchanged for other tokens of value, for example, paper money,
    also called **fiat currency**, or another digital token. Token economics is outside
    the scope of this book.


    The existence of crypto tokens is usually a must for public blockchain networks
    because it provides the incentive for operators to join the network. Private networks
    with stricter access control and/or focus on solving a particular business problem
    would rarely need crypto tokens. The expected profit of solving the business problem
    at hand provides the necessary motivation for operators of such networks.


    Note


    Blockchains usually have what’s called a **native token** or a **utility token**
    which is meant to facilitate operating the blockchain. Then there can be other
    tokens, also known as **coins**, which could be exchanged, traded, or used for
    any other purposes. It is not uncommon that such **coins** are attributed significant
    value just because of their existence, not because of their technical utility.


    A [crypto] **wallet address** is represented as a long hexadecimal string which
    holds information about different crypto tokens and their balance owned by whoever
    controls it. The hex string is used as the wallet address and in practice represents
    the public key of a private-public key pair. In general wallets are anonymous
    accounts on the blockchain. Note that this address is relevant to a particular
    blockchain. My address on Ethereum is `0x718bb20f20ab1937710D2Ac579D97835a6fD099C`.
    This address may not exist on other blockchain networks. It is also important
    to note that different blockchains may use different address formats and representation.
    In Ethereum the length is **20 bytes** represented by 40 hexadecimal digits as
    shown above. In Creditcoin, the Substrate framework, the format is **32-byte**
    account identifier; however, not all addresses in Substrate-based networks are
    based on keys.


    Since the algorithms generating these addresses have very low probability of collisions,
    wallet addresses are practically unique and can be used across different blockchains
    as long as the format is supported. In practice, the first time a transfer is
    made to a particular address, the “account” behind it will start to exist on that
    particular blockchain.


    A **wallet app** is an application which holds your public/private keys and allows
    the user to interact with a blockchain by signing transactions for transferring
    or exchanging different crypto tokens. Most commonly that is a web browser extension
    or a mobile application. Popular wallet apps, for example, are **MetaMask** and
    **SubWallet**, but there are many more available with varying functionality. For
    example, the financial mobile application Revolut also contains features of a
    crypto wallet, allowing you to purchase tokens, send transfers to other addresses,
    or make investments in crypto, even though its feature scope is much larger. Because
    wallet apps hold private keys and allow the user to sign transactions, they are
    often one of the most visible software pieces for a user interacting with a blockchain.


    Note that depending on context, the term **wallet** may refer either to the address
    of an account, or to the user facing application used to manipulate funds in this
    account or both.


    A crypto **faucet** is a quick way of rewarding users with small amounts of crypto
    tokens in exchange for performing various tasks on a website or mobile application.
    The tasks the user completes could be clicking on a paid ad, completing a CAPTCHA
    test, logging in every day, or interacting with a Discord bot, for example. In
    a blockchain testing environment, your team will probably have internal/external
    faucets to help testers acquire some cryptocurrency and use it for testing.


    An **airdrop** is a marketing strategy that involves sending coins or tokens to
    wallet addresses of active members of the blockchain community for free or in
    return for a small service. For testing purposes, it performs the same function
    as faucets but is not self-service.


    **Mainnet****,** **testnet****,** **devnet****,** and **stagenet** are separate
    instances of a blockchain network. They are isolated from one another, and you
    can have as many as you need for testing and development purposes. Unique accounts,
    tokens, blocks, and transactions will exist in each instance of the network. The
    instance called **mainnet** is the production environment. The rest are assigned
    more or less arbitrarily by the blockchain creators. Some blockchains may have
    multiple test and development environments denoted by names.'
  trans: "\n**状态** 是区块链上的当前快照——包括区块总数、这些区块中记录的交易，以及本地存储中记录的值。在实践中，当我们谈论状态时，指的通常是某个特定区块的区块链快照。例如，区块\
    \ 1000 的状态是 Alice 有 300 余额，而 Bob 为零！到了区块 1010，内部状态可能因其间执行的交易而发生变化。例如，Bob 现在获得了一定数量的代币。当我们谈论状态时，通常指的是记录在区块链上的最新值，忽略之前的历史。但根据上下文，我们可能也需要考虑先前历史，比如在尝试复现某个特定错误时。\n\
    \n**挖矿** 是作为工作量证明共识算法的一部分，执行计算密集型加密操作的过程。执行此工作的计算机被称为**矿工**。广义而言，无论实际采用何种共识算法，当我们指代参与区块链的计算机和/或人类时，也会使用术语**矿工**。\n\
    \n在密码学和区块链中，**随机数（nonce）** 是一个在通信中仅能使用一次的任意数字。它通常是认证协议中颁发的伪随机数，用于确保旧通信无法在重放攻击中被重复使用。\n\
    \n**验证者** 是验证区块链交易合法性的计算机节点。也称为**矿工**或**铸币者**，验证者是参与共识算法并获得特权将区块追加到区块链上的人。这个过程完全是自动化的，当我们说“用户”时，通常是指参与区块链网络的计算机；但请记住，这台计算机是由人类操作的，也就是用户，可能也用同样的术语来指代。术语“验证者”常用于权益证明共识算法，而“矿工”更常用于工作量证明算法。\n\
    \n**提名者** 是区块链中的参与者，他们用自己的资金为选定的验证者投票。在权益证明网络中，提名者是一种用户角色，无需太多技术知识即可参与区块链，而不必操作区块链节点。他们有时也被称为**“投资者”**，因为他们只使用自己的资金，而非作为技术操作者。\n\
    \n**[加密]代币** 是一种数字代币，用于在区块链上代表价值，从而使区块链网络在经济上可持续运行。验证者通过运行支持区块链及其存储数据的计算机硬件，获得代币作为奖励。\n\
    \n像 BTC、ETH、CTC 等代币被称为**加密货币**，它们随后可能会自成体系。由于代币是价值的代表，它可以兑换成其他有价值的代币，例如纸币（也称为**法定货币**）或其他数字代币。代币经济学不在本书讨论范围之内。\n\
    \n加密代币的存在通常是公共区块链网络的必要条件，因为它为操作者提供了加入网络的激励。对于访问控制更严格或专注于解决特定业务问题的私有网络，则很少需要加密代币。解决当前业务问题所带来的预期利润，为此类网络的操作者提供了必要的动力。\n\
    \n> **注意**  \n> 区块链通常拥有所谓的**原生代币**或**实用代币**，旨在便利区块链的运行。此外还可以有其他代币，也称为**币**，它们可以被交换、交易或用于任何其他目的。此类**币**仅仅因为其存在而非技术实用性而被赋予重大价值的情况并不少见。\n\
    \n一个[加密]**钱包地址** 以一个长十六进制字符串表示，其中包含关于不同加密代币及其余额的信息，这些代币归地址控制者所有。该十六进制字符串用作钱包地址，实际上代表公钥-私钥对中的公钥。通常，钱包是区块链上的匿名账户。请注意，此地址与特定的区块链相关。我在以太坊上的地址是\
    \ `0x718bb20f20ab1937710D2Ac579D97835a6fD099C`。这个地址可能在其他区块链网络上不存在。同样重要的是，不同的区块链可能使用不同的地址格式和表示方式。在以太坊中，地址长度为\
    \ 20 字节，如上所示，用 40 个十六进制数字表示。在 Creditcoin（基于 Substrate 框架）中，格式是 32 字节的账户标识符；然而，并非所有基于\
    \ Substrate 的网络中的地址都基于密钥。\n\n由于生成这些地址的算法发生冲突的概率极低，只要格式支持，钱包地址实际上是唯一的，并且可以在不同的区块链上使用。在实践中，当首次向某个特定地址进行转账时，该地址背后的“账户”将在该特定区块链上开始存在。\n\
    \n**钱包应用** 是一个持有你的公钥/私钥，并允许用户通过签署交易来与区块链交互（用于转账或交换不同加密代币）的应用程序。最常见的是网页浏览器扩展或移动应用程序。流行的钱包应用例如有\
    \ **MetaMask** 和 **SubWallet**，但还有许多其他具有不同功能的钱包应用可用。例如，金融移动应用 Revolut 也包含加密钱包的功能，允许你购买代币、向其他地址转账或进行加密货币投资，尽管其功能范围要大得多。由于钱包应用持有私钥并允许用户签署交易，它们通常是用户与区块链交互时最显眼的软件之一。\n\
    \n请注意，根据上下文，术语**钱包**可能指账户的地址，也可能指用于管理该账户中资金的面向用户的应用程序，或者两者兼指。\n\n加密**水龙头** 是一种快速向用户奖励少量加密代币的方式，作为在网站或移动应用上完成各种任务的交换。用户完成的任务可能是点击付费广告、完成\
    \ CAPTCHA 测试、每日登录或与 Discord 机器人交互等。在区块链测试环境中，你的团队很可能会有内部/外部水龙头，以帮助测试者获取一些加密货币并用于测试。\n\
    \n**空投** 是一种营销策略，涉及将币或代币免费发送给区块链社区活跃成员的钱包地址，或作为完成一项小服务的回报。出于测试目的，它执行与水龙头相同的功能，但并非自助服务。\n\
    \n**主网**、**测试网**、**开发网** 和 **阶段网** 是区块链网络的独立实例。它们彼此隔离，你可以根据需要拥有任意数量用于测试和开发目的。唯一的账户、代币、区块和交易将存在于每个网络实例中。名为**主网**的实例是生产环境。其余的则由区块链创建者或多或少地任意分配命名。某些区块链可能拥有由不同名称表示的多个测试和开发环境。\n"
- fmt: '**Staking** is the action of committing a certain amount of crypto tokens
    in order to participate in the proof-of-stake consensus mechanism. This applies
    to both validator and nominator roles. The economic incentive is higher return
    on investment. While similar to traditional investment instruments, the process
    of staking by itself is meant to be a process where the user is actively engaged
    in order to ensure a healthy community for the blockchain. Remember that a blockchain
    is a highly distributed environment and the more participants the better.


    **Slashing** is the process of applying penalties (taking away tokens) to a malicious
    validator in a Proof of Stake blockchain network thus making such behavior economically
    unviable. Slashing also extends to nominators, and that’s why it is recommended
    for participants in blockchain staking to be active and monitor what’s happening
    on the blockchain regularly. For example, do not vote for a validator and then
    forget about it.


    **Client** program is any software program that communicates with a blockchain.
    In the context of a blockchain application, we usually mean the software program
    that is executed natively on the computer and implements the various components
    of the blockchain. That’s typically the program which acts as a validator on the
    blockchain. In a broader context, a client can also refer to a wallet application
    or to yet another application interacting with the blockchain, for example, a
    staking dashboard or a telemetry dashboard. It can also mean an application designed
    to interact with a particular smart contract.


    Some blockchain implementations have a separate **runtime** component which encapsulates
    the transactions and business logic while the client itself is delegated the lower
    level tasks of communicating over the network, writing to disk storage, consensus,
    etc.


    **Web3** is an idea for a new iteration of the World Wide Web which incorporates
    concepts such as decentralization, blockchain technologies, and token-based economics.
    The term was coined in 2014 by Ethereum co-founder Gavin Wood.


    A **smart contract** is a program written in a particular programming language,
    for example, Solidity, and stored on a blockchain capable of executing such programs.
    Not all blockchains support smart contracts. The most popular example is implementing
    a cryptocurrency token, say stored on Ethereum mainnet; however, smart contracts
    are not limited to that. Examples demonstrate transactional games such as tick-tac-toe,
    voting, blind auctions, payment channels, and more. I think everything that can
    be represented as transactions can be programmed into a smart contract.


    The core properties of a smart contract are that it cannot be changed once deployed
    on-chain (it is tied to a particular address or transaction hash) and that interactions
    with the smart contract are transparent, represented in the form of transactions,
    even though participants on all sides may be anonymous and not necessarily trust
    each other. Smart contracts may also execute other smart contracts by calling
    functions exposed by them. Execution of functions defined inside a smart contract
    is recorded as transactions on the blockchain. Once deployed on-chain, smart contracts
    cannot change; however, you can deploy newer versions of the contract which results
    in a different contract address. Smart contracts have the concept of contract
    storage, aka storage, available internally to the contract which can hold information
    such as token balances for a newly created cryptocurrency.


    **EVM**, or an **Ethereum Virtual Machine**, is the environment for executing
    smart contracts and decentralized applications. As the name suggests, this specification
    comes from the Ethereum mainnet blockchain. This specification is open and is
    maintained by the Ethereum Foundation and the Ethereum community.


    ## Blockchain Components


    Architecture diagram of single compute node for the Polygon zkEVM network is used
    as an illustration of complexity in blockchain implementations:


    ![](images/629923_1_En_1_Chapter/629923_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    A node in the Polygon network and its components


    Source: [https://github.com/0xPolygonHermez/zkevm-node#architecture](https://github.com/0xPolygonHermez/zkevm-node#architecture)
    License: GNU AFFERO GENERAL PUBLIC LICENSE, Version 3


    Blockchain applications have multiple components working in parallel with one
    another and working in a distributed fashion. All of these components can be viewed
    as a separate software system, for example, peer-to-peer networking, with their
    own modules, complexities, and testing requirements. A lot of these components
    rely on algorithms which aren’t used in other more common software development
    areas. Thus blockchain implementations tend to be more complex than other pieces
    of software.


    ### Peer-to-Peer Networking


    Blockchain nodes need to communicate with one another for the purposes of exchanging
    data and information about the network, for example, blocks. This happens over
    a peer-to-peer network.


    This component is responsible for peer discovery and connections management. It
    is some sort of a peer-to-peer networking implementation, for example, based on
    the `libp2p` library. There may be other components which need or communicate
    over a network, and they can be separate from one another, for example, exposed
    via a different TCP port or implemented as a different stand-alone process.


    ### Consensus Algorithm


    A fundamental problem in distributed computing systems is to achieve overall system
    reliability in the presence of a number of faulty nodes or untrusted nodes. This
    often requires coordinating processes to agree on some data value that is needed
    during computation.


    The consensus algorithm, consensus model, or consensus engine ensures that participants
    in the blockchain agree on the current state of the blockchain and are designed
    to secure the blockchain by preventing malicious participants from gaining an
    opportunity to append blocks in the chain.'
