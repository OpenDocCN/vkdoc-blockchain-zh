    *   Find all places, in all applications, or libraries, where a particular storage
    item/setting value is used.


    *   Create a list of the different functional areas where it is used, for example,
    [`https://github.com/gluwa/creditcoin3/pull/283#issuecomment-2015201729`](https://github.com/gluwa/creditcoin3/pull/283#issuecomment-2015201729),
    because it may not be immediately obvious or because other developers may have
    decided to add additional checks in unexpected places.


    *   Try to understand what all of the areas on your list are doing and how they
    work.


    *   Trace conditional expressions, for example, if statements and macros, which
    assert on the value you are analyzing, especially when they yield errors and panics.
    This is a clear indication something will go wrong under specific conditions.


    *   For values which represent minimum, maximum, etc. – inspect your current on-chain
    data to see whether you have outliers. For example, if I am about to reconfigure
    a setting related to minimum amount, do I already have on-chain participants which
    are staking less than the proposed new amount? Sort of a boundary-value analysis
    against the existing data.


    *   These “specific conditions” become the prerequisites before you can apply
    migrations and update the setting to its newly desired value. That’s the start
    of testing this area further.


    The above list is just a rough outline. It is important to note that it must be
    codified into a more formal process for engineers and stakeholders to follow with
    several places in this process where we can stop, evaluate pros and cons, and
    make decisions. Another important item is that such process and evaluation must
    not take too long, or at least be predictable so that you can deliver software
    changes in a timely manner. And that is the bane of all software development and
    testing – how do you estimate the unknown and how do you manage risk when you
    have no idea how all of the little pieces are supposed to work and when there
    are thousands of little pieces that you rely upon?'
  trans: '

    #### 挑战：如何分析并追踪链上设置的变更


    修改各种链上（可能还包括运行时）的配置设置，会带来一个有趣的挑战。回顾一下，许多区块链参数硬编码在 `runtime/` 目录下的源代码中，但还有更多参数是可以在后续进行修改的。例如，通过
    Polkadot JS Apps 网页界面，可以非常轻松地发送一条 `nominationPools.setConfig` 交易来修改现有配置——比如，更改创建提名池所需的最低保证金数额。这带来了两个主要挑战：


    1.  如何追踪此类变更？换句话说，如果我打算清除现有环境，并用最新的 Creditcoin 版本重新部署，如何确保其运行参数与之前保持一致？


    2.  如何分析此类变更，以弄清修改链上某个值可能带来的风险？在 [`https://github.com/paritytech/polkadot-sdk/issues/3739`](https://github.com/paritytech/polkadot-sdk/issues/3739)
    中，polkadot-sdk 的上游维护者建议区块链开发者在修改现有链上的值时务必谨慎，以免搬起石头砸自己的脚。原因在于，上游现有的测试和检查也并非完美无缺，它们可能遗漏了某些会产生负面影响的场景。


    第一个挑战相对容易解决。Substrate 已经包含了存储迁移子组件，并且我也概述了与迁移相关的若干测试活动。虽然仅仅为了更改一个值就启用整套迁移机制和相关的测试基础设施有些小题大做（例如，参见
    [`https://github.com/gluwa/creditcoin3/pull/120`](https://github.com/gluwa/creditcoin3/pull/120)），但我相信，这是解决这两个挑战的重要第一步。


    将所有链上存储变更作为迁移的一部分来管理，有几个好处：


    *   所有内容都在 git 中，因此保留了历史记录和可追溯性。

    *   任何从未来代码版本启动的新环境都会自动按需进行配置。

    *   可以针对模拟数据和生产数据进行测试，以发现边界情况。

    *   假设你知道如何解决挑战 #2，那么你就可以利用迁移机制，在源代码中实现前置条件，当迁移即将出错时（例如，在发布前针对生产环境进行测试时），这些前置条件会向你发出警报。


    接下来是更大的挑战——如何分析一个提议的变更，从而确信不会出问题，或者不会导致无法预见的副作用？例如，我们已经知道修改出块时间是不可行的，并且代码中也设置了断言，以便在变更通过整个发布流水线之前捕获这种情况。那么，其他看起来无害的设置呢？


    在撰写本书时，我一直在思考如何解决这个挑战，但尚未找到完整的答案。因为 Creditcoin 的整体架构包含多个层级和应用，我认为任何分析都必须涵盖所有这些部分。我也坚信，面对未知的技术，我们首先应该努力理解其核心运作原理，然后再尝试寻找边界情况和潜在风险。没有深入的理解，我们只是在猜测，而这在我看来是远远不够的。整个过程可能大致如下：


    *   在所有应用程序或库中，找到某个特定存储项/设置值被使用的所有位置。

    *   创建一个列表，列出该值被使用到的不同功能领域，例如 [`https://github.com/gluwa/creditcoin3/pull/283#issuecomment-2015201729`](https://github.com/gluwa/creditcoin3/pull/283#issuecomment-2015201729)，因为影响可能不是立竿见影的，或者因为其他开发者可能决定在非预期的地方添加额外的检查。

    *   尝试理解列表中所有领域的功能及其工作方式。

    *   追踪条件表达式，例如 `if` 语句和宏，特别是那些对你正在分析的值进行断言的条件表达式，尤其留意何时会产生错误和恐慌（panic）。这是一个明确的信号，表明在特定条件下会出现问题。

    *   对于表示最小值、最大值等的数值——检查你当前的链上数据，看是否存在异常值。例如，如果我即将重新配置一个与最低限额相关的设置，链上是否已有参与者质押的数额低于提议的新值？这是一种对现有数据进行的边界值分析。

    *   这些“特定条件”就成为了你应用迁移并将设置更新到所需新值的先决条件。这也是对此领域进行更深入测试的起点。


    以上列表只是一个粗略的提纲。需要强调的是，它必须被编撰成一个更正式的流程，供工程师和利益相关者遵循，并且流程中应设置多个可以停下来评估利弊、做出决策的节点。另一个重要事项是，这样的流程和评估不能耗时过长，或者至少是可预测的，以便能够及时交付软件变更。而这正是所有软件开发和测试的症结所在——你如何评估未知因素？当你对成千上万依赖的小部件如何协同工作一无所知时，你又如何管理风险？

    '
- fmt: '# Resource Management for Testing in Production Environments


    I’ve already mentioned how I am capable of testing against multiple environments
    and whenever possible would also like to exercise test suites against a production
    environment, including test suites for any third-party components. The challenge
    then becomes how do you clean up after yourself when you have long periods of
    time between steps, see Figure [7-7](#629923_1_En_7_Chapter.xhtml#Fig7)?


    Any operation related to staking will need to be followed by an `unbond` transaction
    eventually, then waiting for a downtime period and then withdrawal of funds. In
    certain scenarios there may be more steps, more actors, and more waiting involved.
    The period is based on block time and number of eras, for example, one validation
    cycle. When doing all of this locally or in CI, it is relatively quick, and you
    also have full control over all values and the environment. When doing the same
    in production, the difference is drastic – era time is 24 hours. Unbonding period
    is 7 days. Certain operations also depend on when exactly during these 24 hours
    you issue the transaction leading to even more wait time. It’s a rolling window
    of time which can take anywhere between 12 and 36 hours for the effect to take
    place.


    Obviously you cannot have your test suite running for 7 days and waiting to clean
    up after itself – that is just a waste of resources. You can split it up and say
    execute the cleanup portion separately via `cron` – this opens up the question
    of storing and sharing credentials between test suites/cleanup tools.


    This also brings the question of how to assert on long running tasks which are
    straightforward to automate? For example, becoming a validator on the Creditcoin
    blockchain is a relatively easy process; there is even the `wizard` command in
    the cli which performs all steps for you. However this command only signals an
    intention. The results do not take effect immediately. It can take anywhere between
    12 and 36 hours, assuming everything else is good for a participant to become
    an active validator after they signal their intentions and the respective transactions
    make it into a block.


    How do you assert that whatever the testsuite did actually result in the expected
    outcome? How do you make sure that dynamically provisioned resources, for example,
    a virtual machine or a container, do not get recycled before they are actually
    needed or are not left dangling afterward?


    One possibility here is only manual testing disregarding the fact that you spent
    time to automate your test suite. Another possibility is a tiered approach where
    all functionality will be tested in isolation and only partially tested against
    production environments. This opens up the question of confidence.


    A third possibility, depicted in Figure [7-8](#629923_1_En_7_Chapter.xhtml#Fig8),
    is to split the traditional *setup-act-assert-teardown* flow into multiple stand-alone
    pieces which could be executed independently, for example, via `cron` or some
    sort of a queue. These independent automation parts will need to share data between
    themselves, and probably the easiest way, in the context of testing a blockchain,
    is to record such data on-chain directly – no need for an extra SQL database.
    QA and stakeholders should be able to query this data for the purposes of status
    reports. However, this doesn’t solve the problem of triggering these automated
    scripts – smart contracts cannot initiate actions on their own, so you need an
    external process to call a function from the smart contract every so often. Very
    long running functions inside a smart contract also face the challenge that they
    will run out of gas and be reverted so you can’t call a function at the beginning
    of your test; have it sleep for a few days and then let it clean up. It is also
    not possible for smart contracts to interface with the off-chain world and call
    API functions across the Internet, for example. There are available solutions
    like ChainAPI, [`https://chainapi.com/`](https://chainapi.com/), which I haven’t
    tried yet.


    I think a practical solution for orchestration of long-running testing scenarios
    here would look something like this:


    - Trigger tests *setup + act* scripts.

    - Testing state data gets recorded in a shared location, possibly on-chain via
    a smart contract.

    - Automated scripts that should be executed in the future are recorded in a queue,
    possibly with an estimated block number when they need to be executed.

    - At a future time the *assert + teardown* parts are executed; the results recorded
    back on-chain via the smart contract.

    - In certain situations the *teardown* part itself is a long running task with
    multiple steps. For example, unbond funds, and then withdraw them after a week.
    Follow the already described process for this as well.


    In the context of having access to a blockchain, and testing the same blockchain,
    I believe it makes sense to just record shared data onto the chain itself as yet
    another way of eating your own dog food. However, that isn’t strictly necessary.
    You could use a standard SQL database and build your own reports or better yet
    use a test management system like the open source Kiwi TCMS which already has
    the necessary functionality built-in.


    **Disclaimer**


    I am the project lead of Kiwi TCMS too!


    ![Figure 7-7](images/629923_1_En_7_Chapter/629923_1_En_7_Fig7_HTML.jpg)


    *Figure 7-7: Illustration of where a traditional testing sequence breaks before
    long-running processes in a blockchain kick into effect*


    ![Figure 7-8](images/629923_1_En_7_Chapter/629923_1_En_7_Fig8_HTML.jpg)


    *Figure 7-8: Schematic depiction of the proposed test orchestrator*'
