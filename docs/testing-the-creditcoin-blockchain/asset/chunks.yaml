    ### Security-Related Testing


    There is a sentiment inside the engineering team toward producing a secure implementation
    of Creditcoin which is loosely defined. Creditcoin 2.0 targets the lowest hanging
    fruits on the security spectrum. The efforts generally revolve around establishing
    baseline for security practices, baseline for security-related tools, and baseline
    for community engagement around security. In no particular order these are


    *   Keep all dependencies up to date.


    *   Begin using `rustc` stable instead of nightly.


    *   Enable popular static analysis tools to figure out which ones are suitable
    for the Rust ecosystem and Creditcoin, and fix any code smells and issues reported
    by such tools.


    *   Enable a low-key security bounty program in order to allow external researchers
    to find more vulnerabilities and follow up on them.


    Tools which I’ve enabled:


    *   **Dependabot**: Will update third-party dependencies to latest and greatest
    and open pull requests. Additionally provides reports inside the GitHub interface
    about security issues affecting any of your third-party libraries.


    *   **GitHub’s CodeQL**: Static analyzer, supports JavaScript but doesn’t support
    Rust so not very useful.


    *   **Cargo audit**: a Rust native tool. Reports on CVEs and unmaintained dependencies.
    We have the report filtered out by first-level dependencies because we have less
    control over the Substrate framework and the entire dependency stack that it brings.
    Over time this tool started reporting issues which cannot be fixed unless you
    upgrade the version of the Substrate framework.


    *   **MegaLinter’s Rust flavor**: A larger collection of linting tools, some of
    which are relevant to security. It helped us tighten permission for GitHub actions
    and improve Dockerfile practices. Forced upgrade of some dependencies which had
    CVEs reported against them.


    On the keep-up-to-date front, we don’t allow the usage of Rust packages via git
    repositories because that breaks Dependabot and most other tools – this is enforced
    by a static analysis script. Notable exception is the Substrate framework itself,
    which doesn’t publish packages on crates.io. Instead we’re tracking specific git
    tags for Substrate. At the time of writing, alerting about newer Substrate versions
    isn’t automated but is fairly straightforward to implement.


    Enabling compilation with Rustc stable required several upgrades of Substrate
    itself, because of the WASM runtime functionality. We had to upgrade one version
    at a time and resolve the incompatibilities introduced by newer versions of Substrate
    but finally got there. It is not particularly difficult to do this, but it brings
    a lot of maintenance burden without clear benefits – anyone who’s been trying
    to keep up-to-date with a popular framework can testify to this – so you probably
    don’t want to be doing this super often if not required.


    ### Testing Creditcoin-squid


    Being an indexing proxy, the primary challenge for creditcoin-squid is to maintain
    data integrity. For testing purposes, it can be summarized as “is the exported
    data consistent with the blockchain at all times!”


    The secondary testing objective is related to the ability to aggregate data from
    multiple events on the blockchain – do cumulative events function correctly, for
    example, do we sum up all transaction fees properly!


    Initially I looked at property based testing and I was trying to find something
    like “assert on properties across data records.” Eventually I landed onto Slack’s
    Data Consistency Checks framework [`https://slack.engineering/data-consistency-checks/`](https://slack.engineering/data-consistency-checks/)
    which provided some initial inspiration.


    The third big challenge here is that the GraphQL API should expose a stable interface
    for building layered applications. Thus, any backward incompatible change in the
    API endpoints has potential to break existing applications and is highly undesirable.


    You can use your imagination to figure out creative solutions to these challenges.
    Unfortunately I cannot share source code or more details here.


    ### How We Found a Bug at Block 1 Million


    We did have an environment that was not part of the regular development lifecycle;
    it was used to conduct performance testing where the network was flooded with
    thousands of transactions eventually reaching past block 1 million.


    This exposed a bug where many records (DealOrders) were set to expire on block
    1000000 (hard-coded value from test scripts). The way Creditcoin filters expired
    entries is by fetching all of them from storage and removing the ones which are
    not funded and then writes the rest back to storage. This code snippet executes
    on every block inside a function called `on_initialize()`. The naive implementation
    is to read everything from storage, iterate over it, filter items, and write back
    the rest. That caused memory allocation to grow past a certain boundary and caused
    a crash.


    The temporary solution that the team went for is to keep expired records in storage
    at the expense of some more disc space being used b/c these are only relevant
    in the event where you have a loan marketplace which at the time of writing we
    didn’t have so the tradeoff was acceptable. See [`https://github.com/gluwa/creditcoin/pull/1253`](https://github.com/gluwa/creditcoin/pull/1253)
    for more details.


    The technical background of this bug lies inside the Substrate framework. There
    is a maximum allocation limit of 32 MB inside the runtime, and Creditcoin was
    trying to allocate 52 MB; see [`https://github.com/paritytech/substrate/issues/11132`](https://github.com/paritytech/substrate/issues/11132)
    and [`https://github.com/paritytech/substrate/pull/11206`](https://github.com/paritytech/substrate/pull/11206).


    At the time when this appeared, the version of Substrate used to build the production
    release of Creditcoin was 10 months old so hot-fixing this by cherry-picking commits
    from upstream may not have been feasible. It could have exposed other risks we
    weren’t aware of so the team didn’t go down this path!


    These facts just go to show that every piece of testing infrastructure should
    be treated with the same attention as production infrastructure – monitoring,
    alerts, and all!


    It also goes to show that there may be bugs hidden inside your blockchain implementation
    that will surface months or even years later, depending on usage volume, and simulating
    extended usage of the blockchain is important. As fate would have it, Creditcoin
    2.3 exhibited a very similar issue.'
