- fmt: '### Continuous Testing on Pull Requests, Devnet, Testnet, and Mainnet


    Before explaining when testing happens and each individual target, we need to
    explain the various environments.


    - **CI environment**: That''s GitHub Actions running an isolated blockchain and
    performing various assertions against it using all of the available test suites
    and test scripts. Usually this occurs in the context of an open pull request,
    regardless of the target branch.


    - **Devnet**: That''s an instance of the blockchain usually upgraded to the latest
    available version. The main consumer of this instance is other developer teams
    working on layered products, for example, mobile and/or front-end applications.
    The Devnet environment mainly exists for developing other applications that communicate
    with the blockchain and is intended to function as an internal dogfooding environment.
    This network itself is public but is far less likely to see much participation
    from external parties compared to Testnet. It is also much more likely that the
    actual blockchain data in this environment will not be preserved and will be destroyed
    over time.


    - **Testnet**: That is a public instance of Creditcoin. It is intended to serve
    as part of the release process and is updated less frequently than Devnet. It''s
    a soaking place for the upcoming Creditcoin release which is also accessible to
    the public. Testnet is used both for community testing when necessary, both as
    a showcase instance of what''s coming and also as a playground for loan providers
    to exercise their own code against (to ensure the latest version doesn''t break
    their own applications). It is possible that this environment may be wiped out,
    but the expectation is that this will happen only in very rare cases. For all
    practical purposes, this is considered a production environment. Once an upgrade
    is made, we explicitly test against this instance to ensure it functions as expected.


    - **Mainnet**: That is the production Creditcoin blockchain which is available
    to the public and loan providers. This is where the canonical information about
    loan transactions is kept. Once upgraded, we will explicitly perform testing against
    this environment.


    For more documentation about the different environments and their intended usage,
    please see [`https://docs.creditcoin.org/cc2/environments`](https://docs.creditcoin.org/cc2/environments).


    The development and release process for Creditcoin has settled on the following
    sequence:


    1. Each new feature is introduced via a pull request, which is tested automatically
    through available test suites, and also manually when necessary, going back and
    forth as needed.


    2. Every feature pull request is merged into the `dev` branch. Almost all CI jobs
    are executed for the `dev` branch as well. Jobs that automatically create new
    commits are skipped; they are executed only on pull requests.


    3. The WASM runtime from the `dev` branch gets compiled, and when its version
    differs from the version on the Devnet environment, a runtime upgrade is scheduled
    automatically.


    4. After a while, a temporary branch will be created from `dev`, and a new pull
    request will be opened against the `testnet` branch. All available CI jobs execute.
    The isolated runtime upgrade and migration testing kicks off at this point as
    well. This pull request is the preparation for a new release. Sometimes it may
    need adjustments due to Git conflicts; sometimes it could be a curated selection
    of commits, not everything currently in `dev`, etc. Usually a mandatory version
    bump is needed here unless the version has already been updated recently.


    5. Merge the pull request from step 4 into the `testnet` branch.


    6. Publish a new Git tag with the necessary version number. This will build Docker
    container and binary artifacts, upload to Docker Hub, and make a GitHub Release.
    The suffix is `-testnet`.


    7. Manually upload the WASM runtime to the Testnet environment. Follow this by
    deploying the newer container version for the client application as well. There
    is no particular reason why this isn''t automated.


    8. After a while, repeat the process described in step 4, and open a pull request
    bringing code from the `testnet` branch into the `main` branch. All available
    CI jobs, including upgrade and migration testing, will kick in.


    9. Merge to `main` and create a Git tag, and wait for the WASM runtime, Docker
    image, and binary artifacts to be created and attached to a GitHub release. Creating
    the release itself is fully automated.


    10. Manually upgrade the Mainnet runtime. Coordinate with DevOps regarding when
    to upgrade the client containers.


    Aside from the unit test, integration test, and various scripts that execute on
    every one of these pull requests, there are several outlier use cases:


    - Runtime upgrade and migration tests will introspect their target environment
    to sync from: either Testnet or Mainnet. The decision is made based on the target
    branch for a pull request. For example, a pull request against the `testnet` branch
    will be testing upgrades and storage migrations against `rpc.testnet.creditcoin.network`.


    - The integration test suite is triggered manually against Testnet or Mainnet
    **after** a new version has been deployed on each of these environments. Usually
    this happens immediately after the deployment due to versioning issues with `creditcoin-js`
    (used by the test suite). At a later date, the easiest way is to check out the
    appropriate Git commit or Git tag, reinstall the necessary Node.js dependencies,
    and execute the test suite. Selection of the target environment is performed by
    passing a configuration file to the Jest test runner, for example, `jest --config
    testnet.config.ts`.


    - Kicking off integration tests against Testnet and Mainnet is performed manually.
    There''s no particular reason for this; it could be triggered automatically as
    well, given all the necessary triggers and credentials are safely defined in GitHub
    CI.


    - Testing against any of the Devnet, Testnet, and Mainnet environments requires
    account credentials and sufficient funds. These are defined via environment variables
    and are kept secret. Due to security concerns, these accounts don''t have sudo
    permissions. It''s also important to mention that these accounts used for testing
    connect to external blockchains such as Ethereum for the purpose of exercising
    loan transactions. This also means they operate with real-world crypto tokens,
    which has an impact on the cost of testing.


    The configuration files used by Jest are TypeScript, which look like this:


    ```typescript

    import type { Config } from "@jest/types";

    const config: Config.InitialOptions = {

    preset: "ts-jest",

    testEnvironment: "node",

    testTimeout: 240000,

    globalSetup: "./src/devnetSetup.ts",

    };

    export default config;

    ```


    The `globalSetup` value is yet another TypeScript file that gives you full flexibility
    in how you want to control the global state available to Jest and all of the integration
    test cases. Usually it defines connection URLs, reads actual values from environment
    variables at runtime, and defines some hard-coded expected values. For example:'
