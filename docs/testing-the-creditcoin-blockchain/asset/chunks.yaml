  trans: '

    ### 协议客户端与桥接


    `Lodestar`^(¹³) 是以太坊共识层在 TypeScript 语言中的一种实现。它是以太坊的轻客户端，并已达到生产级标准。


    `Forest`^(¹⁴) 是 Filecoin 主机客户端的另一种实现，使用 Rust 编程语言编写，而官方 Filecoin 客户端及其参考实现则使用
    Go 语言。`Forest` 已被视为已进入生产环境。


    `Gossamer`^(¹⁵) 是 Polkadot 主机客户端的一种 Go 语言实现，尚未在生产环境中启动。该工作由一个成功的 Open Gov 提案获得波卡国库资助后得以开展。


    需要特别注意的是，所有这些本质上都是对他人开源协议的第三方实现，而本书其余部分讨论的是由同一团队创建的协议（Creditcoin 借贷周期与数据结构）和客户端实现（`creditcoin-node`）！客户端多样性的一个重要原因是为了增强生态系统安全性，即防止攻击者利用某些在替代实现中可能不存在的漏洞。这里指的漏洞存在于客户端程序本身，例如逻辑错误，或编写该程序所用的编程语言固有的错误。


    `Sygma`^(¹⁶) 是一个模块化、开源的跨链连接协议，允许应用在 EVM、Substrate 及其他链之间进行互操作。您也可以将其视为一种跨链桥，例如，一种能够连接不同区块链事件的软件组件。该组件的具体范围取决于业务和功能需求。


    ### 库与 SDK


    `web3.js`^(¹⁷) – 一个非常流行的用于在以太坊上进行开发的 JavaScript 库，是曾使用过的 `ethers.js` 的替代方案。ChainSafe
    是该开源库的当前维护者。


    `web3.unity`^(¹⁸) – 一个用于 Unity 框架的 SDK，允许游戏与区块链交互，并提供一个管理面板。


    您可以在 ChainSafe 的 GitHub 页面上找到更多库：[`https://github.com/orgs/ChainSafe/repositories?q=web3`](https://github.com/orgs/ChainSafe/repositories?q=web3)。


    ChainSafe 也对他们的 `cypress-polkadot-wallet` 插件感到非常自豪；然而，这并非核心产品，而是他们的测试工具之一，稍后将对此进行更多介绍。


    ### 浏览器扩展与分布式应用


    `Polkadot Wallet Snap for MetaMask`^(¹⁹) 是一个 MetaMask 插件，用于与 Polkadot 及其他基于 Substrate
    的链上的分布式应用进行交互，因为原生的 MetaMask 安装只能与兼容以太坊的链一起工作。


    `Multix`^(²⁰) 是一个用于在 Polkadot 区块链上轻松管理复杂多签钱包的界面。


    ### 测试策略


    Andrew 和我一样，是从传统软件开发与测试背景进入区块链世界的。他的价值主张是将他现有的专业知识带入区块链领域。实际而言，这意味着要平衡区块链开发对敏捷快速的需求，同时定义一些流程，例如收集产品需求、建立代码审查流程、制定并执行测试计划、添加测试自动化等。


    虽然我最初的印象是，由于分布式系统固有的复杂性以及相对不熟悉的编程语言，区块链领域没有多少测试工程师，但 Andrew 带来了略有不同的观点：


    -   在软件开发领域，区块链开发仍然是一个非常小众的领域。它主要由较小的团队组成，技术栈也仍是新的，因此总体而言，找到合适的人才，特别是测试人员，可能很棘手。

    -   部分由于不可变性，我也认为部分由于分布式系统的性质，与 IT 行业的其他领域相比，区块链开发者似乎拥有更高水平的测试经验。或者，可能他们只是更有经验的开发者，因为为了在该领域工作，他们必须具备这些经验。

    -   在单元和集成层面的测试编写方面，我们看到了很多；然而，这是由开发者作为众多职责之一来完成的，并非专门的投入。

    -   拥有一位真正专注于质量流程和风险缓解的人员至关重要，因为构建高质量产品远不止是创建和执行测试。


    我还要补充一点，一些区块链相关的初创公司一直在从事投机性的代币开发，并承受着偷工减料、寻求快速变现的压力，而不是遵循传统的软件开发流程来构建高质量产品。在这方面，Andrew
    很庆幸在 ChainSafe 没有遇到这个挑战。


    由于 ChainSafe 的项目和团队具有多样性，并且总体而言，每个人对“高质量”的定义都不同。Andrew 遵循 ISO 25010^(²¹) 标准采用了一个实用模型——高质量是指被测软件满足其利益相关者提出的要求的程度。这个通用模型被用作
    ChainSafe 的指导原则，随后会根据产品和区块链的具体需求而演变。


    据 Andrew 所述，在处理区块链方面面临的挑战如下：


    -   **数据不可变性**：区块链状态一旦记录便无法更改，如果您的测试需要特定的链上状态，可以通过每次使用新的测试账户和/或使用本地及共享测试网链来缓解这一问题。在
    Creditcoin 中，我实际上大部分时候都使用全新的测试账户，再加上测试套件并不依赖于实际数据本身——只依赖于数据存在的事实！我在这里可能遗漏了一些测试覆盖率。

    '
- fmt: '### 区块链测试中的关键挑战


    - **最终性**: 这是指最近添加的区块不会被从链上移除的置信度。其挑战在于存在多个独立运行的节点，你的交易很可能在某个节点A上被打包进一个区块的同时，另一个节点B也生成了一个区块。这被称为分叉，一个健康的区块链能够解决这些分叉，并最终使所有节点保持一致。对于开发和测试（特别是像桥接这样的产品）而言，挑战在于当你检查链上状态时，你看到的可能是规范链的一个分叉，该分叉稍后会被回滚，即尚未完全最终确定。一种解决方法是等待一定数量的区块（例如12个），然后针对最新区块执行断言。这个宽限期的长短通常取决于你对底层区块链的深入了解。与在单链上工作相比，这更可能是在处理跨链应用时遇到的挑战。


    - **延迟**: 被测系统中因果之间的延迟是一个挑战，这并非区块链特有，但根据Andrew的说法，这在区块链测试场景中是一个更突出的因素。对于某些项目，ChainSafe通过将其候选发布客户端部署到共享环境（例如测试网）中，然后在特定时间段（通常为两周）内在Grafana中记录性能统计数据来处理此问题。你可以将此视为一种浸泡测试。在浸泡期结束时，将当前基线数据与之前发布版本、竞争对手主机客户端的基线数据以及利益相关者的需求进行比较。


    - **数据保留/数据可用性**: 这指的是如果节点运营商没有动力去保留历史数据，那么历史区块链数据和链下数据可能不再可用。这在NFT的背景下变得尤为重要，因为在许多链上，NFT只是一个指向外部URL的链上收据。这个外部资源随时可能被移除。与此形成对比的是*Sui*网络上的NFT实现（[^(22)](#fn22)），在该网络中，所有数据都可以（但并非必须）无限期地存储在链上。解决此问题的一种方法是使用*Pinata*（[^(23)](#fn23)）等固定服务，你付费以使你的数据在特定时间段内被持久化。这本质上是一种数据镜像服务，可保证IPFS文件的可用性。另一种可行的方法是自行运营数据镜像服务或所谓的全节点，但在第三方链上工作时，这种方法的成本效益可能较低。当针对公共区块链网络进行测试时，你可能会遇到预期数据缺失的情况，这将导致测试套件失败。


    ### 拥有专职QA工程师的团队


    ChainSafe的某些团队拥有一名全职分配到团队的专职QA工程师。这些工程师参与所有团队活动，如站立会议和拉取请求审查。他们的工作重点和大部分测试工作发生在拉取请求本身，在新功能或新变更被合并之前。其他测试活动如下：


    -   在独立环境中进行补充测试，例如独立链或测试网。

    -   参与早期规划阶段——审查产品需求文档，并在编写任何代码之前与开发人员讨论实施细节并提出问题。

    -   为新功能进行测试自动化工作，主要是集成类型的测试。


    这里的长期目标是通过让QA人员持续参与开发过程，使其变得更强大、更有价值。


    ### 没有专职QA工程师的团队


    这些团队通常负责新项目（可能只是概念验证等）的工作。他们主要由开发人员组成，主要依赖单元测试和集成测试。这些测试套件大部分最初由开发人员自己创建，QA工程师随后加入，以填补测试空白，但测试的主体（集成测试）由开发团队负责。在这类团队中，QA工程师协助并就测试相关活动提供建议，例如在需要时创建测试计划和测试用例，或执行手动测试，但不会完全掌控测试工作。


    在此情况下，根据产品的不同，团队可能会拥有一套手动冒烟测试套件，测试工程师需要参与用户验收测试、端到端测试、在测试网环境中的测试，以及主要在Git仓库外部进行的自动化任务。


    例如，在测试*Sygma*桥接时，可能需要对两个不同的链执行多个步骤。在这种情况下，QA工程师更有可能编写一些辅助脚本来自动化设置链上状态，然后手动进行验证和检查，尤其是针对新功能和新集成。这是一种半自动化的测试方法，而不是编写一个完整的端到端测试用例。在Creditcoin质押的背景下，我之前描述过，全自动化的端到端测试套件在清理自身方面会遇到挑战，因为它需要等待很长时间才能在链上满足某些条件。通过不追求100%的自动化，ChainSafe能够避免此类问题。'
  raw: '*   **Finality**: This is the level of confidence that a recently appended
    block will not be removed from the chain. The challenge here is that there are
    multiple nodes which operate independently from one another, and it is entirely
    possible that your transactions make it into a block on a specific node A at the
    same time in which another node B produces a block. This is what we call forking,
    and a healthy blockchain will be able to resolve these forks and eventually all
    nodes will be consistent with one another. The challenge for development and testing,
    especially for products like a bridge, is that when you examine the on-chain state,
    you may be looking at a fork of the canonical chain which would later be reverted,
    that is, it is not completely finalized yet. One way to resolve this is to wait
    for a certain amount of blocks, for example, 12, and then perform the assertions
    against the latest block. How much this grace period will be is usually based
    on your intimate knowledge of the underlying blockchain. This is also more likely
    to be a challenge when working with cross-chain applications rather than when
    working on a single chain.


    *   **Latency**: The delay between cause and effect in the system under test is
    a challenge which isn’t specific to blockchain, but according to Andrew it is
    more of a factor in blockchain testing scenarios. For some projects, ChainSafe
    deals with this by deploying their release candidate clients into shared environments,
    for example, Testnet, and then records performance stats in Grafana for a specific
    period, usually 2 weeks. You can think of this as a soak test. At the end of the
    soak period, the current baseline is compared against previous releases and/or
    baselines from rival host clients and/or stakeholder requirements.


    *   **Data retention/data availability**: This refers to the fact that historical
    blockchain and off-chain data may no longer be available if node operators are
    not incentivized to keep it around. This becomes even more important in the context
    of NFTs because in many chains an NFT is just an on-chain receipt pointing to
    an external URL. This external resource could be removed at any point. Contrast
    this with the NFT implementation on the *Sui* network,^([^(22)](#fn22)) where
    all data can be, but doesn’t necessarily have to be, stored on-chain indefinitely.
    One way around this is to use pinning services such as *Pinata*^([^(23)](#fn23))
    where you pay for your data to be persisted for a certain period of time. This
    is essentially a data mirroring service which guarantees availability of IPFS
    files. Another possible way around this is to operate the data mirroring service
    yourself and/or a so-called full node, which may be less cost effective when working
    on a third-party chain. When testing against public blockchain networks, you may
    hit a situation where expected data is missing which will cause the test suite
    to fail.


    #### Squads with Dedicated QA Engineer


    Certain teams at ChainSafe have a dedicated QA engineer who is assigned to the
    team full time. These engineers take part in all team activities such as standup
    meetings and pull request review. Their focus and the bulk of their testing happens
    on the pull request itself, before a new feature or a new change gets merged.
    Other testing activities are as follows:


    *   Supplementary testing in stand-alone environments, for example, stand-alone
    chains or testnet(s).


    *   Join early planning phase – review product requirement document(s) and discuss
    implementation details/raise questions with developers before any code gets written.


    *   Work on test automation, primarily integration type testing, for new functionality.


    Long-term goal here is for QA to become stronger and more valuable by constantly
    taking part in the development process.


    #### Squads Without Dedicated QA Engineer


    These are teams who are working on new projects, maybe on a proof of concept,
    etc. They consist predominantly from developers and mainly rely on unit and integration-type
    tests. The majority of these test suites are initially created by the developers
    themselves with QA engineers joining to fill in the gaps with the bulk of the
    testing being integration-type testing owned by the dev team. In such teams, QA
    engineers help and advise with testing-related activities, for example, creating
    test plans and test cases where needed or performing manual test execution but
    do not own the testing effort completely.


    Here, depending on the product, the team may have a manual smoke test suite, and
    test engineers are expected to engage in user acceptance testing, end-to-end testing,
    and testing inside Testnet environments and/or automation tasks mostly happening
    outside of the git repository.


    For example, when testing the *Sygma* bridge, there may be multiple steps which
    are executed against two different chains. In this situation QA engineers are
    more likely to work on some helper scripts that automate setting up the on-chain
    state and then perform verification and inspection manually, especially for new
    functionality and new integrations. This is a semi-automated testing approach
    rather than hacking on a full end-to-end test case. In the context of Creditcoin
    staking, I have previously described how a fully automated e2e test suite experiences
    challenges in cleaning up after itself due to having to wait too long for certain
    conditions to materialize on-chain. By not going 100% automated ChainSafe is able
    to avoid such issues.'
