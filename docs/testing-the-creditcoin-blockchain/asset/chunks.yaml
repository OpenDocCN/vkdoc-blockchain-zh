  trans: '

    ### 测试 Creditcoin 质押面板


    此前关于`质押面板`以及上游仓库缺乏全面测试套件的情况依然存在。因此，该组件在很大程度上依赖人工测试，这需要连接到一条正在运行的链。


    我经常使用我们的`快速运行时`编译标志运行本地 Creditcoin 节点，以缩短质押周期，然后检出一个拉取请求，执行`yarn dev`来审查和测试为`质押面板`提出的新更改。在底层，该组件是一个静态的
    JavaScript 单页应用程序。为了方便我和他人审查拉取请求，我在构建过程中加入了将静态文件复制到云存储的步骤，然后在拉取请求中发布评论（图 7-6）。


    ![](img/629923_1_En_7_Fig6_HTML.jpg)


    **图 7-6** 作为 GitHub 评论的临时预览


    点击*“质押面板预览”*链接将打开一个 URL，该 URL 对于每个拉取请求都是唯一的，并托管从该拉取请求的最新提交构建的应用程序。我称之为*临时部署*或*预览构建*，但这里并没有太多的实际部署——它只是
    HTML 和 JavaScript。


    这还会以开发模式构建被测应用程序，以便菜单中显示连接 *“CreditcoinLocal”*。这使得测试人员在使用 Creditcoin 质押面板的同时，可以轻松连接到运行在`ws://127.0.0.1:9944`的本地区块链。或者，如果某个错误只在
    Devnet 或 Testnet 等特定环境中可重现，你也可以连接到这些环境。


    一个非常小的技术贡献，参见 [`https://github.com/gluwa/creditcoin3-staking-dashboard/pull/34`](https://github.com/gluwa/creditcoin3-staking-dashboard/pull/34)，它实际上极大地提高了生产力，所以我今后一定会继续这样做。


    可以预见，上游的 `polkadot-staking-dashboard` 代码库也包含影响下游分叉的问题和错误，例如，[`https://github.com/paritytech/polkadot-staking-dashboard/issues/2031`](https://github.com/paritytech/polkadot-staking-dashboard/issues/2031)。我本人发现的另一个问题是，一旦设置了提名池佣金的当前配置，便无法显示。下次打开相应的模态窗口部件时，会显示一个空白屏幕，就好像什么都没配置过一样。在翻阅
    Substrate 源代码的相关部分后，在我看来，这个功能领域的功能并不完整，并且有一些提交表明，未来版本将实现一个关于谁能配置提名池佣金的访问控制模型。如果真是这样，那就能解释为什么`质押面板`中的这个部件看起来有些粗糙了。


    虽然我们可以向上游报告此类问题，在下游修补它们，甚至向上游贡献这些补丁，但我们应该认识到，无法保证维护者会接受这些。虽然他们慷慨地将其代码库作为开源提供，但重要的是要认识到
    Polkadot 正在构建一个 Web3 平台，并且实际上是一个直接竞争对手。他们不一定是软件供应商或传统的开源项目，对代码库的更改如果符合他们自身的长期愿景和目标，才最有可能被接受。正如本书其他部分多次展示的那样，这会影响像
    Creditcoin 这样的下游消费者。


    事实上，在本书写作期间，上游出现了一些破坏性变更，Polkadot 生态系统中一个重要的、与`质押面板`类似的 UI 应用程序，其某个页面已被更新，以至于只适用于更新、更兼容的链。这个页面就是质押页面。Polkadex
    立即报告了这个问题，从附带的截图中看，他们似乎将 Polkadot JS Apps 用作其用户界面的一部分；参见 [`https://github.com/polkadot-js/apps/issues/10505`](https://github.com/polkadot-js/apps/issues/10505)。在撰写本文时，这个上游问题正在寻求指导，了解预期的前进方向是什么，以及是否会提供某种向后兼容性。就目前而言，在撰写本节内容期间，这一上游更改可能会影响
    Creditcoin 的多个下游组件。其他依赖同一上游代码库的区块链也是如此！


    此更改不仅影响生产部署，还影响测试——Polkadot JS Apps UI 是探索和监控区块链的便捷方式，尤其是在执行测试活动时监控本地区块链。如果此应用中的某个页面（尤其是与所有质押活动相关的页面）实际上消失，将导致无法观察与此领域相关的任何内容，从而使下游测试更加困难。幸运的是，此应用的非开发实例（实际上是较旧版本）在连接到不兼容的链（即较旧的链）时仍会显示质押页面，这在测试目的下是一个可行的变通方法，直到该旧版本从互联网上移除为止。托管于
    [`https://ipfs.io/ipfs/Qmd5YFzh6CqnJJJyQ9FWYff9SDSP2mmj8oTqgBaQz8uWwV/#/staking`](https://ipfs.io/ipfs/Qmd5YFzh6CqnJJJyQ9FWYff9SDSP2mmj8oTqgBaQz8uWwV/?rpc=wss://rpc.cc3-devnet.creditcoin.network/ws#/staking)。


    请注意，此 URL 代表一个较旧的生产版本，此后可能已过期。


    还记得 Subscan API 服务吗？虽然迁移到 SaaS 服务会将此组件在质量和测试方面的所有顾虑转移给供应商，但它也会引入一个略微不理想的副作用——你无法测试`质押面板`应用程序的某些功能，因为它们依赖于使用并非所有环境都可用的
    SaaS API。在 `localhost` 上运行开发区块链时当然不可用。例如，关于提名池成员的数据来自 Subscan API 服务。由于该服务对 `127.0.0.1`
    不可用，Creditcoin 质押面板在相应的 UI 部件中显示为零成员和一个空列表！


    虽然你可以使用连接到其他区块链环境（例如 Devnet、Testnet，甚至 Mainnet，它们都有相应的 Subscan API SaaS 端点）的任意`质押面板`部署进行测试，但你根本无法针对
    `CreditcoinLocal` 进行测试，即使已连接上它！根据某些功能的技术细节，这要么只是一个麻烦，要么会升级为一个更大的测试障碍。在使用第三方服务时需要牢记这一点！

    '
- fmt: '### Testing Gluwa''s Polkadot-sdk Fork


    Like any other upstream fork, I follow the mantra "enable all CI jobs and tests
    that already exist and then some more." Which in the case with `polkadot-sdk`
    isn''t much – couple documentation checks and linters and `rustfmt`. Similar to
    the older upstream repository for Substrate, this one has most of its upstream
    test jobs inside of a private GitLab CI instance which is not exactly easy to
    replicate downstream. The definition file is still inside of the git repository,
    but it heavily depends on private docker images and resources.


    Again the minimum of enabling branch protection rules, lint, build, and execute
    the existing unit tests was in order. The CI config uses self-hosted GitHub runners
    deployed on the fly, and execution time takes between 5 and 6 hours. It is a big
    test suite! In fact this repository is so big that even trying to compile the
    source code is impossible on my laptop. It takes around couple of hours before
    it actually crashes because I don''t have enough memory available! 32 gigs ought
    to be enough for everyone ?!?


    ### Testing Gluwa''s Frontier Fork


    This fork is much better in terms of existing upstream tests and CI configuration
    inside a downstream repository. It was just a matter of enabling GitHub Actions
    on the fork and configuring branch protection rules. It is small enough that it
    doesn''t need a self-hosted GitHub runner.


    ### Testing Gluwa''s Crunch Fork


    This is probably the worst example of lack of testing both upstream and downstream
    which I''ve seen in a while. Or maybe I am just biased because I want everything
    to have tests.


    Upstream includes pipeline configuration only for releases and that''s triggered
    only on git tags. They will execute the available unit test suite via `cargo test`
    and proceed to build and upload the binary artifacts. At the time of writing,
    the upstream repository `turboflakes/crunch` has less than 10 unit tests, no linting
    configuration whatsoever, and doesn''t build with older versions of `rustc`.


    Downstream the situation isn''t much better, and existing test scenarios related
    to configuration are actually failing as of commit `f29129d12f9ba6c03d67b450b39f1eba3782bc6d`.


    Note that at the time of writing I had not been involved with the crunch component,
    and configuring its CI jobs, tooling, and branch protection rules is something
    yet to be done in the future. Sometimes it does feel like I''m spending more time
    dealing with sub-optimal testing and code quality coming from upstream instead
    of focusing on actually testing behavior for the products we build.


