    one. On a very high abstraction level, it is just a place where participants in
    the blockchain can record data onto it. This is not to say there aren’t any bugs
    in Creditcoin, most likely there are; however, when you lean toward building a
    generic platform, whether that data is 100% accurate and whether or not your software
    allows the user to shoot themselves in the foot becomes of secondary concern so
    you plan and prioritize accordingly.


    It is also important to note that my practical experience is less of using a test
    suite exercised against a shared environment, where previous state and existing
    data can affect its results and/or affect the usability of prepared test data
    but rather using programming languages to create ephemeral environments on the
    fly and inject data and model whatever preconditions I need as part of the system
    under test in order to assert on specific behavior. That is, the majority of testing
    for Creditcoin happens before anything gets merged and deployed into an existing
    network. By extension this also negates the need for many testing activities after
    a new version of the blockchain is deployed. This has probably saved me from having
    to deal with many practical challenges, but it is certainly something to think
    about depending on how your organization and you personally approach testing.


    ## Summary


    In this chapter, I’ve introduced the blockchain development frameworks I’ve used
    and talked a bit about the differences between them and how that affects testing.


    In the next chapter, I will introduce you to what Creditcoin is and how it works
    which will be the basis for subsequent chapters where I share my testing journey
    with you.


    # Part IIThe Creditcoin Blockchain: Aims and Objectives


    # 3. Introducing the Creditcoin Blockchain


    One of the main problems that Creditcoin addresses is the fact that millions,
    and even billions, of people in the developing world do not have access to the
    traditional banking system – that is, they simply do not have bank accounts. Such
    individuals cannot use credit as a financial instrument in order to improve their
    lives because this traditional instrument isn’t accessible to them by virtue of
    them lacking bank accounts. In certain locations, there’s probably also a lack
    of brick-and-mortar infrastructure, for example, bank offices, to enable such
    access.


    Think, for example, of a farmer who is willing to take on debt in order to purchase
    machinery that will save hours of manual labor and therefore increase productivity.
    When you do not have access to infrastructure, this simply isn’t possible which
    is where Creditcoin comes in.'
  trans: '

    # 开发与测试的思考


    与任何软件一样，构建方式会影响测试方式。


    例如，在使用 Hyperledger Sawtooth 时，感觉抽象层级过多，让我很难完全理解。从测试角度来看，主要缺点是所有组件都作为独立的仓库/Docker
    容器存在，因此很难单独测试某些功能。显而易见的选择是将整个系统视为一个大型整体，并从外部进行测试。


    相比之下，基于 Substrate 的实现更像一个单体应用，所有内容都打包在一起。我发现上手更容易，工作效率也更高。Substrate 框架本身还提供了创建模拟运行时的功能，以便单独测试特定组件。这成为能够为
    Creditcoin 构建全面单元测试套件的巨大推动力。


    我需要指出，当我提到“测试框架”时，通常指的是特定编程语言中提供的实际工具和库。由于我的背景偏技术，且倾向于直接与开发者合作，因此很少涉及“创建自己的测试框架”，更多的是“直接编写代码，利用现有工具完成任务”，尤其是在单元测试方面。如果读者您来自不同背景，不必担心。您只需了解我的出发点即可。


    在本书的初稿审阅阶段，我收到了 Jeroen Rosink 关于使用数据集进行测试/测试自动化的一个相当有趣的反馈。我认为我们在这方面存在很大分歧。请允许我详细说明。


    在实际操作中，我不会保留测试数据来喂给测试场景，并执行数百笔贷款交易以寻找 bug。我更关心的是，传入的数据能否在不崩溃的情况下记录到区块链上，以及谁可以记录，例如借款人或贷款人。输入验证的许多方面实际上由底层编程语言处理。例如，当为某个参数指定了无符号整数数据类型时，我不需要显式测试是否不允许使用负值——我的编译器会处理这些，而彻底的代码审查就足够了。


    另一个需要考虑的事实是，Creditcoin 是一个平台，最初是为了解决特定业务问题而创建的，后来演变为更通用的平台。在高抽象层面上，它只是一个区块链参与者可以记录数据的地方。这并不是说
    Creditcoin 没有 bug，很可能是有一些的；然而，当你倾向于构建一个通用平台时，数据是否 100% 准确，以及你的软件是否允许用户搬起石头砸自己的脚，就变成了次要问题，因此你会相应地进行规划并确定优先级。


    同样重要的是要注意，我的实践经验较少涉及针对共享环境运行的测试套件（其中先前状态和现有数据会影响其结果和/或影响准备测试数据的可用性），而更多地是使用编程语言即时创建临时环境，注入数据，并建模我需要的任何前置条件，作为被测系统的一部分，以便断言特定行为。也就是说，Creditcoin
    的大部分测试发生在任何内容被合并并部署到现有网络之前。这进而也消除了区块链新版本部署后许多测试活动的必要性。这或许让我免于处理许多实际挑战，但这确实值得思考，具体取决于您所在组织及您个人如何看待测试。


    ## 总结


    在本章中，我介绍了使用过的区块链开发框架，并讨论了它们之间的差异及其对测试的影响。


    在下一章中，我将向您介绍 Creditcoin 是什么及其工作原理，这将是后续章节的基础，我将在其中与您分享我的测试历程。


    # 第二部分：Creditcoin 区块链：目标与目的


    # 3. 介绍 Creditcoin 区块链


    Creditcoin 解决的主要问题之一是，发展中国家有数百万甚至数十亿人无法使用传统银行系统——也就是说，他们根本没有银行账户。这些人无法将信贷作为金融工具来改善生活，因为由于没有银行账户，他们无法使用这种传统工具。在某些地区，可能还缺乏实体基础设施，例如银行网点，来实现这种接入。


    例如，想象一位农民，他愿意承担债务来购买机械，这能节省数小时的体力劳动，从而提高生产力。当你无法使用基础设施时，这根本不可能实现，而这正是 Creditcoin
    发挥作用的地方。

    '
- fmt: '## What Is Creditcoin


    `Creditcoin` started as a blockchain-agnostic investment protocol which allows
    participants to lend and borrow any cryptocurrency. On its website, it was also
    described as “Borderless Financial Platform” which had evolved since then. This
    protocol is detailed in a whitepaper which is published on the `https://creditcoin.org`
    website. Its first edition was published in 2017 and has been updated several
    times since then.


    The `Creditcoin` blockchain is the canonical, open source implementation of the
    `Creditcoin` protocol, built and maintained by `Gluwa, Inc.` It is a blockchain
    network for investment-related activities, which records loan transactions into
    a distributed public ledger. This allows representation of real-world assets and
    facilitates the connection between investors and fundraisers. The records are
    stored forever on the blockchain, and this data can be used for future credit
    evaluation by interested parties, for example, traditional lenders.


    Versions 1 and 2 mentioned in this book have a more narrow scope toward recording
    loan-related transactions, while the latest version 3 becomes more generic and
    evolves into a multichain credit protocol that powers real-world assets with native
    support of smart contracts. On the `https://gluwa.com/` website, this latest iteration
    is dubbed “Technology that powers global financial inclusion,” but I digress.


    ![](images/629923_1_En_3_Chapter/629923_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Schematic depiction of Creditcoin


    Information such as loan terms, repayments, and credit performance are available
    on the `Creditcoin` blockchain, facilitating easy and transparent risk assessment
    and connecting capital from Web3 to real-world credit investment opportunities.
    The `Creditcoin` blockchain itself is the necessary infrastructure for enabling
    the creation of other financial products related to loans, for example, a peer-to-peer
    lending platform, an investment platform, an exchange, or all of the above combined.


    The full schema of the original `Creditcoin` Loan Cycle is depicted on this page:


    `https://docs.creditcoin.org/cc2/faq#how-does-the-creditcoin-network-use-ctc`


    `Creditcoin` is multichain by design as shown on Figure 3-1. Data recorded natively
    into the `Creditcoin` chain represents loan terms and agreements and borrowing,
    lending, and repayment state between participants over time. For example, Alice
    may record that she is seeking a loan with particular terms, then Bob may record
    that he’s willing to lend under the same terms, and finally a record of their
    agreement (called a `DealOrder`) may be recorded. `Creditcoin`, at least in its
    original inception, does not support cryptocurrencies, which means that actual
    asset transfers happen outside of the `Creditcoin` network. Transfer of assets
    happens on external blockchain networks and is represented by third-party crypto
    tokens. For example, if lending in `ETH`, transactions are recorded on the Ethereum
    mainnet network. If using a different crypto token to record fiat currency transactions,
    then we may use other Ethereum-compatible networks such as `Goerli` or `Sepolia`.
    When funding on external blockchain happens, this must be recorded into `Creditcoin`.
    The actual record contains a transaction hash valid on the external chain, and
    the `Creditcoin` software will go to Ethereum, for example, to inspect and validate
    the information presented to it. The amount transferred between two participants
    and their addresses should match their identity and loan terms recorded previously
    in `Creditcoin`. Initial `Creditcoin` implementation in version 1.x came with
    proof-of-concept code for Bitcoin as well; however, I am not aware if that has
    ever been used in practice.


    The `Creditcoin` blockchain validates and records external artifacts such as addresses
    and transactions on other blockchains onto its own chain and also validates ownership
    of an address, for example, on Ethereum.


    The native crypto token on the `Creditcoin` blockchain is called `CTC`. It is
    used as a utility token to guarantee the economic stability of the blockchain
    itself. At the time of writing of this book, the `CTC` token is not used directly
    for lending.


    From a business point of view, the model behind `Creditcoin` can be described
    as Infrastructure as a Service. The primary consumer of this blockchain infrastructure
    will be fintech partners who would like to record transactions onto the blockchain
    and are willing to access prior credit history and/or gain access to potential
    new markets and business opportunities that this infrastructure enables. For example,
    one such partner is Aella in Nigeria. In fact according to the `Creditcoin` documentation,
    [Aella](https://aellaapp.com/) is the first institutional user of the `Creditcoin`
    blockchain, having integrated its operations with `Creditcoin` in [June 2022](https://medium.com/creditcoin-foundation/creditcoin-x-aella-integration-live-c8b8eb3b606d).


    Real humans engage in credit-related activities, for example, the farmer from
    my example or an investment agent can technically use the blockchain directly;
    that was even demonstrated in YouTube videos with the `Creditcoin` 1.x client
    program; however, I don’t think that was meant to be a viable long-term strategy.
    Such users are far more likely to use a mobile app for their day-to-day interactions,
    and then this mobile app would communicate with the blockchain infrastructure
    either directly or via some sort of back-end API layer. In fact `Gluwa, Inc.`
    has also been working on such an API layer named `Credal` but I did not have much
    involvement in this area.


    All participants in the blockchain will pay transaction fees regardless if they
    are a physical person exercising just a few transactions or if they are a lending
    partner who’s recording thousands of transactions on the network. The vast majority
    of the operational expenses, however, are assumed by those running computer nodes
    which act as the various blockchain nodes; they pay for computing and storage
    capacity and networking bandwidth most often to a cloud provider.'
