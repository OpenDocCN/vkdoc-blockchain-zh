    -   **余额检查**：验证仅当发送方有足够代币支付版税时，NFT 转账才能进行。\n-   **市场转账**：测试特定的市场转账方法及相关版税。\n\n\
    几年前在波兰 TestWarez 测试大会上发表题为 *《区块链测试框架挑战》* 的演讲时，Sebastian 提到了我们可以且应该测试的多个区块链组件和层级，但需要注意，这并非适用于所有场景。我认为许多区块链相关应用只关注技术栈的特定层级，而大部分测试也将集中于此。\n\
    \n在上述示例中，*NFT 市场* 本质上是一个智能合约，根据业务需求，可能无需对这一层级之外的内容进行测试。一个反面例子是 Creditcoin，其主要测试集中在协议层。尽管在\
    \ Creditcoin 2.x 中，我们从工作量证明共识切换到了权益证明共识，但我们并未测试算法实现本身。我们测试了转换流程，以及保留链上数据和区块历史的能力，但共识算法本身是一个现成的组件，我们的实现几乎是直接将其作为替代组件引入。\n\
    \n演讲中我特别喜欢的一句引文是：\n\n> *\"如果我们不完全理解智能合约，也没有相应的知识和工具，该如何测试它？\"*\n> —塞巴斯蒂安·维克斯"
- fmt: 'I definitely agree with this and just replace the words “`smart contract`”
    with whatever blockchain component you happen to be working with. I have worked
    primarily on testing the data model and transactions layer which is relatively
    straightforward. Regardless it took me a long time to be able to fully understand
    all of the components involved and their internal interactions before I felt comfortable
    in my environment. If you as a tester are new to a project and new to blockchain
    technology, you are bound to go through the same experience.


    On the tools spectrum, I was surprised to learn about `Hyperledger Caliper`([^(29)]),
    a performance benchmarking tool which I could have used during the Creditcoin
    1.x time frame. Instead my team and I went for in-house tooling because that’s
    what we knew how to do, and frankly I joined relatively late in the development
    cycle to have had any time to research and find this tool. During Creditcoin 2.x
    and then 3.0, my team performed more performance benchmarking, and this time around
    we were aware of existing tools for the Substrate ecosystem. However, we went
    for in-house solutions again because the existing tools were not immediately suitable
    for our use case, and it was just faster for us to create what we needed instead
    of figuring out how to workaround the limitations of a tool we had no experience
    with. This only goes to show that there are still areas in which the tooling and
    test framework ecosystem may not be mature enough or may not fit your particular
    testing needs.


    ## Summary


    As you have seen by now, blockchain testing can be very colorful. There are many
    areas in which we can test and also many tools that we can use. Despite that and
    despite the inherent complexity in certain software components, blockchain testing
    is not super different from traditional software testing.


    Thank you for reading so far into this book. I hope that you have enjoyed it and
    learned something valuable that you can apply in your day-to-day work!


    Happy testing!'
