  trans: '

    ### 单元测试


    Creditcoin 3.0 的 Rust 代码库中单元测试数量很少，主要来自 `evm-tracing` 包。其余测试围绕以太坊账户 ID 推导以及检查基础外部权重是否与
    EVM 兼容。预编译与外部函数类似，它们也有自己的单元测试。


    `gluwa/creditcoin3` 仓库中的实际源代码（不包括 `evm-tracing` 包和 `precompiles/` 目录）主要是运行时管道代码。在单元测试层面可测试的内容不多——没有自定义
    RPC 或自定义指标，也没有 pallet，更没有像 Creditcoin 2 中那样的自定义外部函数。


    ### EVM 和智能合约测试


    我们使用了一个由不同团队编写的智能合约测试套件。该测试套件被打包为 `@gluwa/evm-network-test` NPM 包，并提供几个可执行命令作为其入口点。在撰写本书时，存在
    `basicTest` 和 `gasTest` 两个命令，它们都需要一个 Creditcoin RPC URL 和一个私钥作为参数。


    这些命令可以这样执行：


    ```

    ./node_modules/.bin/basicTest --rpc <RPC_URL> --private_key <PRIVATE_KEY>

    ```


    请注意，这里的地址和私钥是 EVM 格式，以 `0x` 开头，而非 Substrate 格式。如果需要在以开发者模式运行的独立区块链上执行，可以使用预充值的开发账户及其地址和私钥，这些信息在
    [`https://docs.moonbeam.network/builders/get-started/networks/moonbeam-dev/#pre-funded-development-accounts`](https://docs.moonbeam.network/builders/get-started/networks/moonbeam-dev/#pre-funded-development-accounts)
    有更详细的描述。


    这个 EVM 测试套件通过 Hardhat Runner 执行——这是一个流行的任务运行器，是名为 Hardhat 的、基于以太坊的智能合约开发的极流行开发环境的一部分。包含测试场景的实际文件是用
    JavaScript 编写的，使用了流行的 `chai` 断言库，该库是 Hardhat 生态系统中的默认选择。


    `basicTest` 编译并部署一个代表加密代币的智能合约，然后对其执行各种交易，并断言期望的状态。其重点是确保一个代表 ERC20 加密代币的合约能够部署到
    Creditcoin 上，代币可以在不同钱包之间转移，并且通常用户可以与被部署的合约进行交互。`gasTest` 工具将 gas 结果收集到一个 CSV 文件中。尽管有这个名字，但这个文件中没有断言。


    此测试套件的源代码仓库无法通过 GitHub 获取，但以开源 MIT 许可证发布的 NPM 包可从 [`https://www.npmjs.com/package/@gluwa/evm-network-test`](http://www.npmjs.com/package/@gluwa/evm-network-test)
    获取，安装后即可查看实际代码。只需 `cd` 进入 `node_modules/@gluwa/evm-network-test/` 目录，然后查看即可。


    从区块链的角度来看，此测试套件中的工具会针对我们运行区块链相关集成测试的每个环境执行，例如本地环境、Devnet、Testnet 等。你可以将其视为主仓库中可用的集成测试套件的另一个分支。


    ### 测试 EVM 追踪功能


    RPC 方法 `debug_traceTransaction` 和 `debug_traceBlockByHash` 是 EVM 追踪的入口点，它们通过一个集成测试来验证，该测试部署一个智能合约，进行几笔交易，然后使用相应的交易哈希调用这些
    RPC 方法，并断言响应。这两个 RPC 方法旨在供第三方提供商使用，因此被认为很重要，如果此测试失败，将成为一个主要的阻碍因素。这不是一个独立的测试套件，而只是现有的一些测试场景。


    ### 区块链的集成测试


    这是与区块链本身相关的所有所谓集成测试的父级。它使用 TypeScript 编写，并使用 Jest 测试框架。它在 `gluwa/creditcoin3`
    仓库下的源代码位置是 `cli/src/test/blockchain-tests`。


    **注意**：为了更轻松/更简单地重用共享代码和辅助函数，区块链集成测试套件与 Creditcoin 3 CLI 组件的单元/集成测试套件捆绑在一起。这节省了试图弄清楚所有内容位置的一些精力，并使代码库更简单。另一种选择是将其移到一个单独的目录中并分别管理依赖关系，这被认为是额外的工作而没有额外的好处。


    与 Creditcoin 2 类似，此测试套件通过 Jest 配置文件进行控制，并且可以针对不同环境执行，包括针对生产环境。在撰写本文时，它包括了前面提到的
    evm-tracing 测试、对其执行时所运行的链的一些运行时值进行查询和断言，并从外部测试可用的预编译 `substrate_transfer`。


    另一个重要的提及点是，在不同环境的配置方面，Creditcoin 3 更加多样化。主要区别在于区块时间和质押纪元时长，这些对于本地环境、Devnet 和 Testnet
    是不同的。


    ### 预编译测试


    这一点已经提到过，但值得单独一节来阐述，因为这方面内容更多。显然，有覆盖正向和逆向路径场景的单元测试和集成测试。还有一些其他内容，称为合约元数据。


    这些元数据存储在 JSON 文件中，Blockscout 浏览器应用程序通过其 URL 读取这些 JSON 文件。这是必要的，以便 Blockscout 在分析与该合约相关的内部交易时知道要显示哪些额外信息。


    这些元数据包含预编译的名称、地址、其字节码以及一行版本的 Solidity 源代码。它被视为来自 Blockscout 应用程序的外部 API 接口。


    在测试方面，我主要使用自定义的静态分析脚本来断言诸如以下事项：


    -   文件名不会改变，因为改变会导致 404 错误并破坏消费者应用程序。

    -   元数据中包含的字节码和源代码实际上与 Solidity 接口定义相匹配。

    -   地址在单独的 JSON 字段中定义，因此它们需要匹配。

    -   我们已经知道如何自动更新仓库中的源代码，以便在底层源代码发生变化时重新生成元数据，并使用 `gluwa-bot` 提交到 git。

    -   这里的命名约定是按分支即按环境（例如，Devnet、Testnet、Mainnet）进行，因此需要确保根据我们发布到的分支存在预期的文件，并根据现有的发布流程推进前面提到的自动源代码更新。

    -   现有的集成测试使用 `ethers.js` 库，该库在实例化一个与区块链交互的对象之前需要合约十六进制地址和合约 ABI（应用程序二进制接口），以另一个
    JSON 文件的形式提供。显然，这两条信息是硬编码的，但我们需要确保它们始终与原始源代码匹配，并且不会随着时间的推移而偏离，也就是说，不要测试与你正在构建的代码不完全相同的代码！


    在我撰写本文时，我仍不清楚的一个问题是，如果向区块链添加更多预编译合约，我们需要做什么。我们是将其所有元数据合并到同一个 JSON 文件中，还是开始为每个合约单独建立文件？这个问题的答案将影响检查的执行方式。

