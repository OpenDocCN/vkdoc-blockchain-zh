  trans: '

    ### 测试 Gluwa 的 Polkadot-sdk 分支


    与其他上游分支一样，我遵循“启用所有已有的 CI 作业和测试，并尽可能增加更多”的原则。对于 `polkadot-sdk` 来说，这并不多——只有一些文档检查、linter
    和 `rustfmt`。与较早的 Substrate 上游仓库类似，该仓库的大部分上游测试作业都位于私有 GitLab CI 实例中，下游很难完全复现。定义文件虽然仍在
    git 仓库中，但它严重依赖私有 Docker 镜像和资源。


    同样，最低要求是启用分支保护规则、lint、构建和执行现有的单元测试。CI 配置使用按需部署的自托管 GitHub Runner，执行时间在 5 到 6 小时之间。这是一个巨大的测试套件！事实上，这个仓库非常大，在我的笔记本电脑上甚至无法编译源代码。在真正崩溃之前，它大约需要运行几个小时，因为我内存不足！32G
    内存应该对每个人来说都足够了吧？！？


    ### 测试 Gluwa 的 Frontier 分支


    这个分支在下游仓库中已有的上游测试和 CI 配置方面要好得多。只需在分支上启用 GitHub Actions 并配置分支保护规则即可。它足够小，不需要自托管的
    GitHub Runner。


    ### 测试 Gluwa 的 Crunch 分支


    这大概是我最近见过的最糟糕的上游和下游都缺乏测试的例子。或者也许只是因为我希望所有东西都有测试而有失偏颇。


    上游只包含针对发布的管道配置，并且仅在 git 标签上触发。它们会通过 `cargo test` 执行可用的单元测试套件，然后构建并上传二进制文件。在撰写本文时，上游仓库
    `turboflakes/crunch` 只有不到 10 个单元测试，完全没有 lint 配置，并且无法使用旧版本的 `rustc` 构建。


    下游的情况也好不到哪里去，现有的与配置相关的测试场景在提交 `f29129d12f9ba6c03d67b450b39f1eba3782bc6d` 时实际上已经失败了。


    请注意，在撰写本文时，我尚未参与 crunch 组件，并且其 CI 作业、工具和分支保护规则的配置还有待未来完成。有时我确实觉得，我花在应对上游带来的次优测试和代码质量上的时间，比真正测试我们构建产品的行为还要多。


    ### 文档审查与第三方工具测试


    可以想象，Creditcoin v3 的文档最初是 Creditcoin 2.3 现有文档的分支，然后增加了关于 EVM 兼容层的信息和部署智能合约的指南。初始内容由开发团队创建，并由
    QA 进行校对。文档的某些页面包含命令行或源代码示例，特别是智能合约指南部分。这自然引出一个问题：我们如何确保这些示例始终是最新的？我甚至想更进一步问：*我们如何测试第三方可视化工具*，例如，通过
    Remix（一个流行的以太坊 IDE）或通过命令行工具 Hardhat 部署智能合约？


    请记住，Creditcoin 2.0 上类似的最初编程示例用例促成了 `creditcoin-js` 库的诞生。随后，这个库有了自己的生命力。


    从功能角度来看，检查第三方工具的代码示例、文档和说明可能看起来并不重要——毕竟这不是你的源代码。但是，当你的核心功能变成支持智能合约的能力时，你的主要客户就变成了区块链开发者或准开发者，那么至少确保你宣传的工具能够可接受地工作就变得至关重要。我们可以将其视为互操作性测试的一部分，并注意潜在已知问题，这些问题虽然不完全是你的责任，但可能会对用户体验产生负面影响。


    在撰写本文时，我开始练习使用这些第三方工具，并发现以 Hardhat 为例，该工具发展迅速，以至于 Creditcoin 文档中提供的一些命令和示例已经被视为过时。安装最新版本的
    Hardhat 并逐字遵循文档根本无法工作。这就是为什么所有这些示例都被移到了 git 下，并通过 CI 作业执行命令。文档也已更新，通过 URL 指向示例内容，以便读者可以复制最新版本。


    文档 URL：[`https://docs.creditcoin.org/`](https://docs.creditcoin.org/)（与 Creditcoin
    2.0+ 文档不同）


    ### 其他有趣的测试


    **提示**


    如果你采用激进的升级策略，你所使用的任何第三方工具和依赖项——即使它们只是你开发、测试和/或发布管道的一部分——也可能会失败。


    就 Creditcoin 和 Rust 编程语言而言，一些工具和包需要更新的编译器版本，例如 [`https://github.com/gluwa/creditcoin3/pull/159`](https://github.com/gluwa/creditcoin3/pull/159)。当你了解这一点并且可以等待所有相关部分升级时，这没问题。但当你拥有额外的依赖项，这些依赖项并非直接在
    `Cargo.toml`（Rust 包管理器文件）中指定，而是使用固定版本直接安装到 CI 作业中时，这就成了一个问题。更糟糕的是，失败的 CI 作业是条件性执行的，当然不是在更新编译器版本的拉取请求的一部分！更更糟糕的是，在
    Rust 包仓库 `crates.io` 上，导致失败的 `subwasm` 包已经三年没有更新了；新版本仅以 git 标签形式存在，无法受益于自动化的 Dependabot
    升级。


    总而言之，这是一个关于测试的教训——你需要测试你所使用的一切。如果它没有作为现有 CI 作业/测试套件的一部分包含在内，那么你需要确保它被显式地执行！否则，它只会在你最意想不到的时候失败；参见
    [`https://github.com/gluwa/creditcoin3/pull/332`](https://github.com/gluwa/creditcoin3/pull/332)。在撰写本文时，我不得不从
    `v0.17.1` 升级到 `v0.19.0` 以避免编译器错误。即使这个版本也不是完全没问题。它会产生一个编译器警告：


    ```

    warning: ambiguous glob re-exports

    --> lib/src/lib.rs:19:9

    |

    19 | pub use chain_info::*;

    |     ^^^^^^^^^^^^^ the name `Error` in the type namespace is first re-exported
    here

    ...

    24 | pub use types::*;

    |     -------- but the name `Error` in the type namespace is also re-exported
    here

    |

    = note: `#[warn(ambiguous_glob_reexports)]` on by default

    warning: `subwasmlib` (lib) generated 1 warning

    Compiling subwasm v0.19.0

    ```

    '
- fmt: '#### Challenge: How to Analyze and Keep Track of Changes to On-Chain Settings


    There is an interesting challenge related to modifying various on-chain, and possibly
    runtime, configuration settings. If you recall, many of the blockchain parameters
    are hard-coded in source code under `runtime/`, and there are many more which
    can also be changed afterward. For example, using the Polkadot JS Apps web interface,
    it is very easy to send a `nominationPools.setConfig` transaction and modify existing
    configuration – for example, change minimum bond amount required to create a nomination
    pool. This poses two main challenges:


    1.  How to keep track of such changes; in other words if I am to wipe out an existing
    environment and redeploy it with the latest Creditcoin version, how do I make
    sure that its operational parameters will be the same as before?


    2.  How do I analyze such changes in order to figure out what are the possible
    risks of modifying a value on-chain? In [`https://github.com/paritytech/polkadot-sdk/issues/3739`](https://github.com/paritytech/polkadot-sdk/issues/3739),
    the upstream maintainers of polkadot-sdk recommend that blockchain developers
    be careful when changing values on existing chains to avoid shooting themselves
    in the foot. Reason being is that existing tests and checks upstream are also
    not perfect and they could have missed a scenario which would have a negative
    impact.


    The first challenge is relatively easy to solve. Substrate already contains the
    storage migration sub-component, and I’ve outlined several testing activities
    related to migrations. While enabling the whole migrations machinery and testing
    infrastructure around it just so you can change a single value is an overkill;
    see, for example, [`https://github.com/gluwa/creditcoin3/pull/120`](https://github.com/gluwa/creditcoin3/pull/120).
    I believe that this is an important first step in solving both challenges.


    Having all on-chain storage changes as part of a migration yields several benefits:


    *   Everything is in git so history and traceability is preserved.

    *   Any new environment launched from future code versions will take care to configure
    itself as needed.

    *   You can test against mock and production data in order to find edge cases.

    *   Assuming you know how to solve challenge #2, then you can use the migrations
    machinery and implement pre-conditions into the source code which will alert you
    when a migration is about to break, for example, when testing against a production
    environment before a release.


    On to the bigger challenge – how can you analyze a proposed change in order to
    gain confidence that nothing would break or that it would not cause unforeseen
    side effects? For example, we already know that changing block time is a no-go,
    and there are assertions in place in order to catch such a situation before it
    makes it through the entire release pipeline. What about other settings, which
    appear to be benign?


    At the time of writing this book, I’ve been thinking about how to solve this challenge
    but still don’t have the full answer. Because the entirety of Creditcoin comprises
    several layers and applications I believe whatever analysis you do must encompass
    all of them. I am also a firm believer that in the face of unknown technology,
    we should first strive to understand how it works in its core before trying to
    search edge cases and possible risks. Without in-depth understanding, we’re just
    guessing and that is not good enough in my opinion. The overall process will probably
    be something like this:


    *   Find all places, in all applications, or libraries, where a particular storage
    item/setting value is used.

    *   Create a list of the different functional areas where it is used, for example,
    [`https://github.com/gluwa/creditcoin3/pull/283#issuecomment-2015201729`](https://github.com/gluwa/creditcoin3/pull/283#issuecomment-2015201729),
    because it may not be immediately obvious or because other developers may have
    decided to add additional checks in unexpected places.

    *   Try to understand what all of the areas on your list are doing and how they
    work.

    *   Trace conditional expressions, for example, if statements and macros, which
    assert on the value you are analyzing, especially when they yield errors and panics.
    This is a clear indication something will go wrong under specific conditions.

    *   For values which represent minimum, maximum, etc. – inspect your current on-chain
    data to see whether you have outliers. For example, if I am about to reconfigure
    a setting related to minimum amount, do I already have on-chain participants which
    are staking less than the proposed new amount? Sort of a boundary-value analysis
    against the existing data.

    *   These “specific conditions” become the prerequisites before you can apply
    migrations and update the setting to its newly desired value. That’s the start
    of testing this area further.


    The above list is just a rough outline. It is important to note that it must be
    codified into a more formal process for engineers and stakeholders to follow with
    several places in this process where we can stop, evaluate pros and cons, and
    make decisions. Another important item is that such process and evaluation must
    not take too long, or at least be predictable so that you can deliver software
    changes in a timely manner. And that is the bane of all software development and
    testing – how do you estimate the unknown and how do you manage risk when you
    have no idea how all of the little pieces are supposed to work and when there
    are thousands of little pieces that you rely upon?'
