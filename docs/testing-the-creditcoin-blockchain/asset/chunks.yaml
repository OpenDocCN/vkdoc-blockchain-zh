    \ I was still very fresh to all of the components in Creditcoin 1.x, and visualizing\
    \ and implementing the testing strategy was in its infancy during this period\
    \ of time. Therefore, this section is more of a notable mention of my early contributions\
    \ to Creditcoin 1.x summarized from GitHub history.\n\nWork on the private `creditcoin-legacy-tests`\
    \ test suite and related performance benchmarks.\n\nCrude CI enablement for every\
    \ pull request – unit tests, linter, collect code coverage – initially to become\
    \ more familiar with the code base, establish a baseline of \"test coverage,\"\
    \ and find out an area where I can make some progress. This applies for:\n- `creditcoin-legacy-consensus-rust`\n\
    - `creditcoin-legacy-processor-rust`\n- `creditcoin-legacy-shared`\n\nExperiment\
    \ is the right word I believe in adding small unit tests for some of the components\
    \ written in Rust. Didn't really spend much time on this task, and at the time\
    \ the entire component architecture and implementation was still hazy to me, so\
    \ I wasn't very productive anyway.\n\nEnable branch protection rules and require\
    \ a minimum of two approvals before merge, including my first process improvement\
    \ – a pull request template with review checklist as shown in Figure [4-2](#629923_1_En_4_Chapter.xhtml#Fig2).\n\
    \n![](images/629923_1_En_4_Chapter/629923_1_En_4_Fig2_HTML.jpg)\n\n**Figure 4-2**\
    \ Code Review Checklist\n\nThis checklist later evolved to include more details,\
    \ but this is one of the earliest versions. While I was writing this book, I saw\
    \ a similar checklist from a fellow open source project; however, theirs was much\
    \ better. Each item was a hyperlink to a page providing more details and examples\
    \ about specific requirements or how to perform a specific task.\n\n> **Note**\
    \  \n> As testers we should definitely make use of such a format, where checklists\
    \ link back to documentation and examples, because it is far more productive for\
    \ everyone working inside the repository!\n\nFor forked repositories, `gluwa/sawtooth-legacy-core`;\
    \ `gluwa/sawtooth-legacy-sdk-rust`, I initially tried enabling GitHub actions\
    \ with the hope that we can just consume whatever tests they already have. This\
    \ was short-lived because at the time Hyperledger Sawtooth used Jenkins, not GitHub\
    \ actions, and I didn't have enough time to work on a full transition nor did\
    \ I have a desire to deploy and maintain a separate Jenkins instance because of\
    \ two repositories. Instead I settled for compile, lint, and unit test CI jobs\
    \ as long as we didn't have to do anything else other than configure the CI pipelines\
    \ and execute several `cargo` commands.\n\nI made `creditcoin-legacy-gateway`\
    \ more robust to malformed messages coming from the outside world, which I discovered\
    \ while working on an unrelated task. Made it ignore messages which it couldn't\
    \ parse instead of crashing. As part of exercising the performance benchmarks\
    \ I was working on, I've also managed to contribute a few optimizations too.\n\
    \nI've made small improvements to `ccclient`; error messages update in several\
    \ repositories; updated `restart_policy` field in example docker-compose files\
    \ because I discovered that nodes were running out of memory sometimes and then\
    \ crashing – mostly small things related to quality of life for the engineering\
    \ team.\n\nEnable Dependabot on every possible repository, so we can keep up-to-date.\
    \ For those unaware, Dependabot started as an independent company, later acquired\
    \ by GitHub, which automatically keeps tabs of your dependencies and opens pull\
    \ requests whenever a new version is available. This has the added benefit that\
    \ in case there are incompatibilities between versions your CI jobs will probably\
    \ fail. It is not 100% guaranteed that if everything in CI is green, then you\
    \ won't have a problem, but nevertheless Dependabot makes keeping multiple repositories\
    \ up to date a relatively easy task. It supports a plethora of package management\
    \ systems including Docker, NuGet, `cargo` (for Rust), and npm/yarn for Node.js\
    \ which I was most interested in.\n\nFor the C# .NET repositories, primarily `creditcoin-legacy-shared`,\
    \ I had access to SonarCloud as a static analysis tool which exposed a number\
    \ of code smells. Then I worked on fixing many of them. Someone may say that this\
    \ isn't the job of a tester, but I disagree – I am a test engineer and I don't\
    \ mind fixing code whenever I am capable of doing so.\n\nIf we look at a favorite\
    \ definition of mine:\n\n> *Static analysis is ... the analysis of computer software\
    \ that is performed without actually executing programs... performed on some version\
    \ of the source code...*\n> \n> —[`https://en.wikipedia.org/wiki/Static_program_analysis`](https://en.wikipedia.org/wiki/Static_program_analysis)\n\
    \nEspecially references 15, 16, and 17, we are going to see that there is an overlap\
    \ with the job role of a tester. I am a strong believer in static analysis tools\
    \ and in fact have used, spoken about, and hosted practical workshops on how to\
    \ extend or build your own static analysis tools with customized rules which can\
    \ help you detect certain bugs or possible errors during step #0 of your testing\
    \ pyramid – before you actually start testing anything else. That is why I tend\
    \ to use lots of such tools, and in the next chapters, you will see how I've added\
    \ a few custom ones to prevent possible error conditions for Creditcoin 2.\n\n\
    During the development of Creditcoin 1.8, there was a new transaction added called\
    \ `RegisterDealOrder`. This is also the reason for the incompatibility with older\
    \ versions of Creditcoin. This new transaction serves as a convenient entry-point\
    \ which internally records the same state as several stand-alone transactions.\
    \ I've worked on new integration and performance tests for `RegisterDealOrder`\
    \ as well as actually checking that it results in the same side effects on-chain\
    \ as produced by the other transactions it was meant to bundle together! A loan\
    \ is a loan after all, regardless of how many transactions you use to record it\
    \ into the blockchain – the results must be the same.\n\nBecause almost every\
    \ component of Creditcoin is distributed as a docker image, it was necessary to\
    \ have CI jobs that constantly build and inspect these containers. Initial testing\
    \ here focuses on having a `HEALTHCHECK` command in `Dockerfile` and read-only\
    \ file system inside the container, not the data volume, which are important from\
    \ an operations point of view. In Creditcoin 2 and 3, this coverage has been extended\
    \ with the use of extra static analysis tools which detect multiple deviations\
    \ from industry best practices, but we've also relaxed the requirement for a read-only\
    \ filesystem.\n\nDuring the testing campaign, I started publishing a sort of container\
    \ manifest to let internal and external observers know what we build and what\
    \ we/they are testing with, see [`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet/pull/7/files`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet/pull/7/files).\
    \ Here's how it looks like."
