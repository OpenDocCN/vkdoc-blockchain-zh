  trans: '

    # Hyperledger Sawtooth


    Hyperledger Sawtooth 是由 Hyperledger 和 Linux 基金会主导，IBM、英特尔等公司共同贡献的一个区块链开发框架。该框架采用模块化架构，将核心系统与应用领域分离，使开发者能够为应用程序指定业务规则，而无需了解整个系统的底层设计。Sawtooth
    支持多种共识算法。


    Sawtooth 最初由英特尔贡献，是一个专为灵活性和可扩展性设计的区块链套件。交易业务逻辑通过所谓的 `Transaction Families` 与共识层解耦，这些“交易家族”既可支持受限语义，也可支持非受限语义。原网站：[`https://wiki.hyperledger.org/display/sawtooth`](https://wiki.hyperledger.org/display/sawtooth)。


    Sawtooth 的初始版本使用 Python 实现，随后部分组件又用 Rust 重新实现。


    **注意**：GitHub 上的原始 Hyperledger Sawtooth 仓库已于 2024 年 2 月 1 日（本书撰写期间）应其维护者要求归档。此后，该代码库的持续维护版本已迁移至
    Splinter 社区，地址为 [`https://www.splinter.dev/`](http://www.splinter.dev/)。


    Hyperledger Sawtooth 是我在 Creditcoin 1.x 区块链生命周期末期所体验到的该链所使用的开发框架。


    # Substrate


    Substrate，[`https://substrate.io`](https://substrate.io/)，是一个区块链框架，自称是快速构建定制化、面向未来的区块链的最强大框架。该框架允许开发者构建专业化的区块链应用。Substrate
    由 Polkadot 网络和 Parity Technologies 主导，后者由以太坊首位 CTO 加文·伍德领导。


    使用 Substrate 构建自己的区块链出奇地容易，只需按照其教程即可快速上手。参见 [`https://docs.substrate.io/tutorials/build-a-blockchain/build-local-blockchain/`](https://docs.substrate.io/tutorials/build-a-blockchain/build-local-blockchain/)。其核心概念是**可组合性**——你的区块链实现由多个称为“Pallets”（模块）的组件构成，这些组件在运行时中组合在一起。


    Substrate 使用 Rust 编程语言构建，而 Polkadot 的其他工具则使用 TypeScript —— 这些通常包括客户端库和前端应用程序。


    Creditcoin 2.x 及更高版本使用 Substrate 构建。


    # Ethereum


    我个人并未在以太坊上进行过任何开发与测试工作，但在此提及它是因为它非常流行。`Geth` 似乎是使用 Go 编程语言实现的主要以太坊客户端；参见 [`https://github.com/ethereum/go-ethereum`](https://github.com/ethereum/go-ethereum)。由于该实现是开源的，完全可以通过分叉并修改代码来创建你自己风格的定制化区块链。显然，Musicoin
    链就是这样做的。另一方面，你更有可能在以太坊主网上部署智能合约，而非构建自定义链。


    无论哪种情况，以太坊都有大量的开发工具可用；如有兴趣，请参见 [`https://ethereum.org/en/developers/docs/frameworks/`](https://ethereum.org/en/developers/docs/frameworks/)。


    # 编程语言


    本书讨论的编程语言构成了一种丰富多彩的组合：在 Creditcoin 1.x 时代，包括 Python、C++ 和 C# .NET；而在 2.0 及更高版本中，则主要是
    Rust 和 TypeScript。


    `Rust` 是一种通用编程语言，强调性能、类型安全性和并发性。它在没有垃圾回收器的情况下保障内存安全。Rust 是一种静态类型且强类型的函数式语言，是系统编程（包括区块链等分布式系统以及
    Linux 内核）的热门语言。


    开发者格雷登·霍尔在 2006 年于 Mozilla Research 工作时，将 Rust 作为个人项目创建。Mozilla 于 2009 年正式赞助该项目，此后该语言得到了迅速普及。以下是
    Rust 中 Hello World 程序的样子。


    ```

    fn main() {

    println!("Hello, World!");

    }

    ```


    在 Rust 中，开发者可以使用 `struct` 或 `enum` 关键字创建用户自定义类型，然后使用 `impl` 关键字为这些类型附加方法。Rust
    受到许多其他语言的影响，并非纯粹的面向对象语言。虽然你可以拥有带有数据和方法的用户自定义数据类型（看起来像类），但 Rust 没有真正的面向对象继承概念。相反，Rust
    使用泛型、trait 和多态。如果你对 trait 不熟悉，可以将其视为一种接口定义，所有应支持该接口的数据类型都需要实现它。


    从测试人员的角度来看，使用 Rust 会遇到一些“已知问题”：


    - 编译器是你的朋友——内存安全几乎排除了随机的运行时故障；强类型意味着几乎不可能在代码块中误用本不该在那使用的变量（例如，复制粘贴问题）。

    - 语言内置了优秀的自动化测试工具。

    - 测试可以并行执行。

    - 断言通过宏来执行，当断言失败时会产生运行时恐慌（panic）。

    - 从头开始编译需要相当长的时间，因此保留构建缓存非常重要。

    - 流行的代码覆盖率和静态分析工具可能对 Rust 支持不佳，因为它仍然是一门相对较新的语言。

    - “单元”测试代码和“集成”测试代码之间的区别相对较小，如果你对该语言经验不足，可能不容易立即区分。

    - 内置的测试框架库中没有用于共享 setup/teardown 的语法。


    有关 Rust 语言特别是测试的更多信息，请参阅 [`https://doc.rust-lang.org/book/ch11-00-testing.html`](https://doc.rust-lang.org/book/ch11-00-testing.html)。


    `TypeScript` 是带有类型语法的 JavaScript。TypeScript 是一种建立在 JavaScript 之上的强类型编程语言。


    ```

    const message: string = ''Hello, World!'';

    console.log(message);

    ```


    前面提到的 Rust 的优点在此同样适用。TypeScript 编译器和 linter 是测试人员最好的朋友，它们会为你捕获错误。一个巨大的优势是，流行的
    JavaScript 测试框架都拥有 TypeScript 绑定，为测试自动化提供了更多选择，并且第三方工具和服务对其支持相当好。网站：[`https://www.typescriptlang.org/`](http://www.typescriptlang.org/)。


    在 Substrate/Polkadot 生态系统中，首选的框架是流行的 Jest 测试框架，我在测试 Creditcoin 时广泛使用了它。如果你来自（例如）Web
    应用的测试自动化背景，那么你可能拥有足够的经验来快速上手。我个人测试背景与 Web 和 JavaScript 相去甚远，但入门时只遇到了一些小问题。


    `Solidity` 是一种静态类型的、使用花括号的编程语言，专为开发在以太坊及其他 EVM 兼容链上运行的智能合约而设计。

    '
