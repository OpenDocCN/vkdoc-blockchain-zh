- fmt: "### Telemetry and Custom Metrics\n\nThe Substrate framework allows you to\
    \ automatically expose a telemetry stream to `Prometheus` – the open source monitoring\
    \ system and visualize these metrics in `Grafana`. This component allows you to\
    \ define your own metrics too which are conveniently available at `<url>:9615/metrics`\
    \ in plain/text format.\n\nIn a couple cases in `Creditcoin 2.0`, the same data\
    \ is made available both as `Prometheus` metrics and via a custom `RPC` method.\
    \ Both endpoints call into the same underlying internal functions and serve as\
    \ wrappers around them.\n\nAnother case is also present in `Creditcoin 2.0` where\
    \ custom metrics definitions call into an `RPC` method to extract information.\
    \ We call both a custom `RPC` method and a system defined one, there's no difference\
    \ between the two.\n\nThe fact that similar/same information is exposed as `JSON-RPC`\
    \ and `Prometheus` stream is mainly a convenience decision. You don't need to\
    \ do both.\n\n### Creditcoin-js\n\n`Creditcoin-js` is a wrapper around the `polkadot-js`\
    \ library, which is the primary means of communicating with Substrate-based chains.\
    \ `Creditcoin-js` provides some convenience in error handling and cleaner consumer\
    \ interface. At the time of writing, it is primarily used for integration tests\
    \ and/or helper scripts.\n\n### Creditcoin-squid\n\nThis is an indexing and proxy\
    \ service which ingests the events that happen on the blockchain and records them\
    \ into a standard `RDBMS` and then exports a `GraphQL API` for consumption. It\
    \ is based on the Subsquid open source project, [`https://subsquid.io`](https://subsquid.io/),\
    \ hence the name. The overall architecture of this component is shown in Figure\
    \ [5-2](#629923_1_En_5_Chapter.xhtml#Fig2).\n\nThis component is independent of\
    \ the blockchain and represents an industry-standard means of consuming blockchain-related\
    \ data by third-party applications. The source code uses the `GPL-3.0` open source\
    \ license; however, at the time of writing, it has not been released publicly!\n\
    \n![](images/629923_1_En_5_Chapter/629923_1_En_5_Fig2_HTML.jpg)\n\n**Figure 5-2**\
    \ Architecture of creditcoin-squid\n\n## Timeline of Creditcoin 2.0\n\nThe lifecycle\
    \ of `Creditcoin 2.0` begins in late November 2021 with a skeleton of the `creditcoin`\
    \ pallet built on top of an example code base of a Substrate-based blockchain\
    \ node. At that time I was still testing the upcoming `1.8` version, and the `2.0`\
    \ implementation was still considered an experiment. Later it turned out that\
    \ it was a viable option to just reimplement everything.\n\nIn the following months,\
    \ all existing extrinsics are implemented, including basic unit testing and cleaning\
    \ up of the code base and enabling other pallets as additional dependencies are\
    \ discovered. The implementation is bundled up as a docker image.\n\nThe first\
    \ public release is `2.0.0-beta-2` on Mar 2, 2022, followed by another one, titled\
    \ `Mainnet release: 2.0.0-beta-5` on Mar 23, 2022.^([⁷](#fn7)) `Creditcoin 2.0`\
    \ development continues throughout 2022 and 2023 and eventually becomes `Creditcoin\
    \ 2.3` described further in this book.\n\n## Testing of Creditcoin 2.0\n\nTesting\
    \ for `Creditcoin 2.0` started early during its lifecycle and is more organic\
    \ compared to `Creditcoin 1.x`. It is also more structured and better defined.\
    \ The Substrate framework makes it relatively easy to exercise a lot of the functionality\
    \ via `cargo test` and collect coverage metrics. Everything related to testing\
    \ `Creditcoin 2.0` is automated and is available in its `GitHub` repository! The\
    \ `CI` environment in which these automated tests are executed is `GitHub Actions`.\n\
    \nRegular `CI` jobs look like this.\n\n![](images/629923_1_En_5_Chapter/629923_1_En_5_Figa_HTML.jpg)\n\
    \nwhile upgrade `CI` jobs look like this.\n\n![](images/629923_1_En_5_Chapter/629923_1_En_5_Figb_HTML.jpg)\n\
    \nThese images have been taken from [`https://github.com/gluwa/creditcoin/pull/1203/commits`](https://github.com/gluwa/creditcoin/pull/1203/commits),\
    \ which is toward the end of the original `2.0` lifecycle.\n\n### Unit Testing\n\
    \nThe Rust programming language comes with its own built-in testing framework,\
    \ and the entry point for the built-in test runner is the `cargo test` command!\
    \ Cargo is the Rust package manager!\n\nAnything that can be exercised easily\
    \ as a unit test is covered here with the main focus being on extrinsics. For\
    \ each extrinsic function, we have the positive scenario plus all possible negative\
    \ scenarios. For the positive case, assert on results in storage and generated\
    \ events. For the negative scenarios, assert on returned errors with each error\
    \ condition returning a different error result (differently named type).\n\n```rust\n\
    #[test]\nfn close_deal_order_should_error_when_not_signed_by_borrower() {\n  \
    \  ExtBuilder::default().build_and_execute(|| {\n        let test_info = TestInfo::new_defaults();\n\
    \        let (deal_order_id, deal_order) = test_info.create_deal_order();\n  \
    \      let transfer_id = TransferId::new::(&deal_order.blockchain, b\"12345678\"\
    );\n        assert_noop!(\n            Creditcoin::close_deal_order(\n       \
    \         // bogus signature --------v\n                Origin::signed(test_info.lender.account_id),\n\
    \                deal_order_id,\n                transfer_id,\n            ),\n\
    \            crate::Error::::NotBorrower\n        );\n    });\n}\n\n#[test]\n\
    fn close_deal_order_should_error_when_deal_timestamp_is_in_the_future() {\n  \
    \  ExtBuilder::default().build_and_execute(|| {\n        let test_info = TestInfo::new_defaults();\n\
    \        let (deal_order_id, deal_order) = test_info.create_deal_order();\n  \
    \      let transfer_id = TransferId::new::(&deal_order.blockchain, b\"12345678\"\
    );\n        // simulate deal with a timestamp in the future\n        crate::DealOrders::::mutate(\n\
    \            deal_order_id.expiration(),\n            deal_order_id.hash(),\n\
    \            |deal_order_storage| {\n                deal_order_storage.as_mut().unwrap().timestamp\
    \ = Creditcoin::timestamp() + 99999;\n            },\n        );\n        assert_noop!(\n\
    \            Creditcoin::close_deal_order(\n                Origin::signed(test_info.borrower.account_id),\n\
    \                deal_order_id,\n                transfer_id,\n            ),\n\
    \            crate::Error::::MalformedDealOrder\n        );\n    });\n}\n```\n\
    \nIn this example, `ExtBuilder::default().build_and_execute()` creates what is\
    \ known as externalities builder which is a wrapper around a mock runtime in which\
    \ we can call extrinsic functions and simulate blocks being produced in the blockchain.\
    \ That allows a lot of the custom chain functionality and error handling to be\
    \ covered on the unit test level. The execution environment inside `ExtBuilder`\
    \ is an in-memory implementation of the on-chain storage. In addition to that,\
    \ the so-called mock runtime is a partial representation of the real blockchain\
    \ runtime which may simplify concrete data types and drop unnecessary pallets\
    \ to make testing easier. For the `creditcoin` pallet, it looks something like\
    \ this.\n\n```rust\n// Configure a mock runtime to test the pallet.\nframe_support::construct_runtime!(\n\
    \    pub enum Test where\n        Block = Block,\n        NodeBlock = Block,\n\
    \        UncheckedExtrinsic = UncheckedExtrinsic,\n    {\n        System: frame_system::{Pallet,\
    \ Call, Config, Storage, Event},\n        Creditcoin: pallet_creditcoin::{Pallet,\
    \ Call, Storage, Event, Config},\n        Balances: pallet_balances::{Pallet,\
    \ Call, Storage, Config, Event},\n        Timestamp: pallet_timestamp::{Pallet,\
    \ Call, Storage},\n        TaskScheduler: pallet_offchain_task_scheduler::{Pallet,\
    \ Storage, Event},\n    }\n);\n\nparameter_types! {\n    pub const BlockHashCount:\
    \ u64 = 250;\n    pub const SS58Prefix: u8 = 42;\n    // used in tests, lower\
    \ values == faster execution\n    pub const PendingTxLimit: u32 = 500;\n}\n```\n\
    \nIn this example, the runtime used for unit testing `pallets/creditcoin` configures\
    \ only 5 pallets – the target under test and immediate dependencies.\n\nWhen testing\
    \ `pallets/difficulty`, the mocked runtime is even simpler.\n\n```rust\n// Configure\
    \ a mock runtime to test the pallet.\nframe_support::construct_runtime!(\n   \
    \ pub enum Test where\n        Block = Block,\n        NodeBlock = Block,\n  \
    \      UncheckedExtrinsic = UncheckedExtrinsic,\n    {\n        System: frame_system::{Pallet,\
    \ Call, Config, Storage, Event},\n        Difficulty: pallet_difficulty::{Pallet,\
    \ Storage},\n        Timestamp: pallet_timestamp::{Pallet, Call, Storage},\n \
    \   }\n);\n```\n\nFor more info on how to get started unit testing in Substrate,\
    \ see their documentation at [`https://docs.substrate.io/test/`](https://docs.substrate.io/test/)."
  raw: '### Telemetry and Custom Metrics


    The Substrate framework allows you to automatically expose a telemetry stream
    to Prometheus – the open source monitoring system and visualize these metrics
    in Grafana. This component allows you to define your own metrics too which are
    conveniently available at <url>`:9615/metrics` in plain/text format.


    In a couple cases in Creditcoin 2.0, the same data is made available both as Prometheus
    metrics and via a custom RPC method. Both endpoints call into the same underlying
    internal functions and serve as wrappers around them.


    Another case is also present in Creditcoin 2.0 where custom metrics definitions
    call into an RPC method to extract information. We call both a custom RPC method
    and a system defined one, there’s no difference between the two.


    The fact that similar/same information is exposed as JSON-RPC and Prometheus stream
    is mainly a convenience decision. You don’t need to do both.


    ### Creditcoin-js


    Creditcoin-js is a wrapper around the polkadot-js library, which is the primary
    means of communicating with Substrate-based chains. Creditcoin-js provides some
    convenience in error handling and cleaner consumer interface. At the time of writing,
    it is primarily used for integration tests and/or helper scripts.


    ### Creditcoin-squid


    This is an indexing and proxy service which ingests the events that happen on
    the blockchain and records them into a standard RDBMS and then exports a GraphQL
    API for consumption. It is based on the Subsquid open source project, [`https://subsquid.io`](https://subsquid.io/),
    hence the name. The overall architecture of this component is shown in Figure
    [5-2](#629923_1_En_5_Chapter.xhtml#Fig2).


    This component is independent of the blockchain and represents an industry-standard
    means of consuming blockchain-related data by third-party applications. The source
    code uses the GPL-3.0 open source license; however, at the time of writing, it
    has not been released publicly!


    ![](images/629923_1_En_5_Chapter/629923_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Architecture of creditcoin-squid


    ## Timeline of Creditcoin 2.0


    The lifecycle of Creditcoin 2.0 begins in late November 2021 with a skeleton of
    the creditcoin pallet built on top of an example code base of a Substrate-based
    blockchain node. At that I time I was still testing the upcoming 1.8 version,
    and the 2.0 implementation was still considered an experiment. Later it turned
    out that it was a viable option to just reimplement everything.


    In the following months, all existing extrinsics are implemented, including basic
    unit testing and cleaning up of the code base and enabling other pallets as additional
    dependencies are discovered. The implementation is bundled up as a docker image.


    The first public release is 2.0.0-beta-2 on Mar 2, 2022, followed by another one,
    titled Mainnet release: 2.0.0-beta-5 on Mar 23, 2022.^([⁷](#fn7)) Creditcoin 2.0
    development continues throughout 2022 and 2023 and eventually becomes Creditcoin
    2.3 described further in this book.


    ## Testing of Creditcoin 2.0


    Testing for Creditcoin 2.0 started early during its lifecycle and is more organic
    compared to Creditcoin 1.x. It is also more structured and better defined. The
    Substrate framework makes it relatively easy to exercise a lot of the functionality
    via `cargo test` and collect coverage metrics. Everything related to testing Creditcoin
    2.0 is automated and is available in its GitHub repository! The CI environment
    in which these automated tests are executed is GitHub Actions.


    Regular CI jobs look like this.


    ![](images/629923_1_En_5_Chapter/629923_1_En_5_Figa_HTML.jpg)


    while upgrade CI jobs look like this.


    ![](images/629923_1_En_5_Chapter/629923_1_En_5_Figb_HTML.jpg)


    These images have been taken from [`https://github.com/gluwa/creditcoin/pull/1203/commits`](https://github.com/gluwa/creditcoin/pull/1203/commits),
    which is toward the end of the original 2.0 lifecycle.


    ### Unit Testing


    The Rust programming language comes with its own built-in testing framework, and
    the entry point for the built-in test runner is the `cargo test` command! Cargo
    is the Rust package manager!


    Anything that can be exercised easily as a unit test is covered here with the
    main focus being on extrinsics. For each extrinsic function, we have the positive
    scenario plus all possible negative scenarios. For the positive case, assert on
    results in storage and generated events. For the negative scenarios, assert on
    returned errors with each error condition returning a different error result (differently
    named type).


    ```

    #[test]

    fn close_deal_order_should_error_when_not_signed_by_borrower() {

    ExtBuilder::default().build_and_execute(|| {

    let test_info = TestInfo::new_defaults();

    let (deal_order_id, deal_order) = test_info.create_deal_order();

    let transfer_id = TransferId::new::(&deal_order.blockchain, b"12345678");

    assert_noop!(

    Creditcoin::close_deal_order(

    // bogus signature --------v

    Origin::signed(test_info.lender.account_id),

    deal_order_id,

    transfer_id,

    ),

    crate::Error::::NotBorrower

    );

    });

    }

    #[test]

    fn close_deal_order_should_error_when_deal_timestamp_is_in_the_future() {

    ExtBuilder::default().build_and_execute(|| {

    let test_info = TestInfo::new_defaults();

    let (deal_order_id, deal_order) = test_info.create_deal_order();

    let transfer_id = TransferId::new::(&deal_order.blockchain, b"12345678");

    // simulate deal with a timestamp in the future

    crate::DealOrders::::mutate(

    deal_order_id.expiration(),

    deal_order_id.hash(),

    |deal_order_storage| {

    deal_order_storage.as_mut().unwrap().timestamp = Creditcoin::timestamp() + 99999;

    },

    );

    assert_noop!(

    Creditcoin::close_deal_order(

    Origin::signed(test_info.borrower.account_id),

    deal_order_id,

    transfer_id,

    ),

    crate::Error::::MalformedDealOrder

    );

    });

    }

    ```


    In this example, `ExtBuilder::default().build_and_execute()` creates what is known
    as externalities builder which is a wrapper around a mock runtime in which we
    can call extrinsic functions and simulate blocks being produced in the blockchain.
    That allows a lot of the custom chain functionality and error handling to be covered
    on the unit test level. The execution environment inside ExtBuilder is an in-memory
    implementation of the on-chain storage. In addition to that, the so-called mock
    runtime is a partial representation of the real blockchain runtime which may simplify
    concrete data types and drop unnecessary pallets to make testing easier. For the
    creditcoin pallet, it looks something like this.


    ```

    // Configure a mock runtime to test the pallet.

    frame_support::construct_runtime!(

    pub enum Test where

    Block = Block,

    NodeBlock = Block,

    UncheckedExtrinsic = UncheckedExtrinsic,

    {

    System: frame_system::{Pallet, Call, Config, Storage, Event},

    Creditcoin: pallet_creditcoin::{Pallet, Call, Storage, Event, Config},

    Balances: pallet_balances::{Pallet, Call, Storage, Config, Event},

    Timestamp: pallet_timestamp::{Pallet, Call, Storage},

    TaskScheduler: pallet_offchain_task_scheduler::{Pallet, Storage, Event},

    }

    );

    parameter_types! {

    pub const BlockHashCount: u64 = 250;

    pub const SS58Prefix: u8 = 42;

    // used in tests, lower values == faster execution

    pub const PendingTxLimit: u32 = 500;

    }

    ```


    In this example, the runtime used for unit testing pallets/creditcoin configures
    only 5 pallets – the target under test and immediate dependencies.


    When testing `pallets/difficulty, the mocked runtime is even simpler.`


    ```

    // Configure a mock runtime to test the pallet.

    frame_support::construct_runtime!(

    pub enum Test where

    Block = Block,

    NodeBlock = Block,

    UncheckedExtrinsic = UncheckedExtrinsic,

    {

    System: frame_system::{Pallet, Call, Config, Storage, Event},

    Difficulty: pallet_difficulty::{Pallet, Storage},

    Timestamp: pallet_timestamp::{Pallet, Call, Storage},

    }

    );

    ```


    For more info on how to get started unit testing in Substrate, see their documentation
    at [`https://docs.substrate.io/test/`](https://docs.substrate.io/test/).'
  trans: "\n### 遥测与自定义指标\n\nSubstrate 框架允许你自动将遥测数据流暴露给 `Prometheus`（一款开源监控系统），并在 `Grafana`\
    \ 中将这些指标进行可视化。该组件也允许你定义自己的指标，这些指标可以通过 `<url>:9615/metrics` 以纯文本格式方便地获取。\n\n在 `Creditcoin\
    \ 2.0` 的某些情况下，相同的数据既会以 `Prometheus` 指标的形式提供，也会通过自定义的 `RPC` 方法提供。这两个端点都调用相同的底层内部函数，并作为这些函数的封装器。\n\
    \n在 `Creditcoin 2.0` 中还存在另一种情况，即自定义指标定义会调用一个 `RPC` 方法来提取信息。我们同时调用了自定义 `RPC` 方法和系统定义的\
    \ `RPC` 方法，二者之间没有区别。\n\n相似或相同的信息同时以 `JSON-RPC` 和 `Prometheus` 数据流的形式暴露，这主要是为了方便决策。你无需同时实现这两种方式。\n\
    \n### Creditcoin-js\n\n`Creditcoin-js` 是对 `polkadot-js` 库的一个封装，而 `polkadot-js`\
    \ 是与基于 Substrate 的链进行通信的主要手段。`Creditcoin-js` 在错误处理方面提供了一些便利，并提供了更简洁的消费者接口。在撰写本文时，它主要用于集成测试和/或辅助脚本。\n\
    \n### Creditcoin-squid\n\n这是一个索引和代理服务，用于摄取区块链上发生的事件，并将它们记录到标准的 `RDBMS` 中，然后导出一个\
    \ `GraphQL API` 供消费使用。它基于 Subsquid 开源项目（[`https://subsquid.io`](https://subsquid.io/)），因此得名。该组件的整体架构如图\
    \ 5-2 所示。\n\n该组件独立于区块链，代表了第三方应用程序消费区块链相关数据的一种行业标准方式。其源代码使用 `GPL-3.0` 开源许可证；然而，在撰写本文时，它尚未公开发布！\n\
    \n![](img/629923_1_En_5_Fig2_HTML.jpg)\n\n**图 5-2** Creditcoin-squid 架构\n\n##\
    \ Creditcoin 2.0 时间线\n\n`Creditcoin 2.0` 的生命周期始于 2021 年 11 月下旬，当时在基于 Substrate\
    \ 的区块链节点示例代码库之上构建了 `creditcoin` 模块的骨架。那时我仍在测试即将发布的 `1.8` 版本，而 `2.0` 的实现仍被视为一个实验。后来发现，直接重新实现所有内容是一个可行的选择。\n\
    \n在接下来的几个月里，所有现有的外部函数都被实现，包括基本的单元测试、代码库清理，以及在发现额外依赖项时启用其他模块。该实现被打包成一个 Docker 镜像。\n\
    \n第一个公开发布版本是 2022 年 3 月 2 日的 `2.0.0-beta-2`，随后在 2022 年 3 月 23 日发布了另一个版本，标题为`主网发布：2.0.0-beta-5`。^(⁷)。\
    \ `Creditcoin 2.0` 的开发贯穿 2022 年和 2023 年，并最终成为本书后续描述到的 `Creditcoin 2.3`。\n\n##\
    \ Creditcoin 2.0 测试\n\n`Creditcoin 2.0` 的测试在其生命周期早期就已开始，与 `Creditcoin 1.x` 相比，过程更自然。测试也更有结构性，定义更清晰。Substrate\
    \ 框架使得通过 `cargo test` 来执行大量功能并收集覆盖率指标变得相对容易。所有与测试 `Creditcoin 2.0` 相关的内容都已自动化，并且在其\
    \ `GitHub` 仓库中可用！执行这些自动化测试的 `CI` 环境是 `GitHub Actions`。\n\n常规的 `CI` 任务如下所示。\n\n\
    ![](img/629923_1_En_5_Figa_HTML.jpg)\n\n而升级 `CI` 任务如下所示。\n\n![](img/629923_1_En_5_Figb_HTML.jpg)\n\
    \n这些图片取自 [`https://github.com/gluwa/creditcoin/pull/1203/commits`](https://github.com/gluwa/creditcoin/pull/1203/commits)，该提交位于原始\
    \ `2.0` 生命周期的末期。\n\n### 单元测试\n\nRust 编程语言自带内置的测试框架，内置测试运行器的入口点是 `cargo test` 命令！Cargo\
    \ 是 Rust 的包管理器！\n\n所有可以轻松作为单元测试执行的内容都在这里得到覆盖，主要关注点是外部函数。对于每个外部函数，我们都有正向场景以及所有可能的负向场景。对于正向情况，在存储和生成的事件上断言结果。对于负向场景，对返回的错误进行断言，每个错误条件返回不同的错误结果（具有不同名称的类型）。\n\
    \n```rust\n#[test]\nfn close_deal_order_should_error_when_not_signed_by_borrower()\
    \ {\n    ExtBuilder::default().build_and_execute(|| {\n        let test_info =\
    \ TestInfo::new_defaults();\n        let (deal_order_id, deal_order) = test_info.create_deal_order();\n\
    \        let transfer_id = TransferId::new::(&deal_order.blockchain, b\"12345678\"\
    );\n        assert_noop!(\n            Creditcoin::close_deal_order(\n       \
    \         // bogus signature --------v\n                Origin::signed(test_info.lender.account_id),\n\
    \                deal_order_id,\n                transfer_id,\n            ),\n\
    \            crate::Error::::NotBorrower\n        );\n    });\n}\n\n#[test]\n\
    fn close_deal_order_should_error_when_deal_timestamp_is_in_the_future() {\n  \
    \  ExtBuilder::default().build_and_execute(|| {\n        let test_info = TestInfo::new_defaults();\n\
    \        let (deal_order_id, deal_order) = test_info.create_deal_order();\n  \
    \      let transfer_id = TransferId::new::(&deal_order.blockchain, b\"12345678\"\
    );\n        // simulate deal with a timestamp in the future\n        crate::DealOrders::::mutate(\n\
    \            deal_order_id.expiration(),\n            deal_order_id.hash(),\n\
    \            |deal_order_storage| {\n                deal_order_storage.as_mut().unwrap().timestamp\
    \ = Creditcoin::timestamp() + 99999;\n            },\n        );\n        assert_noop!(\n\
    \            Creditcoin::close_deal_order(\n                Origin::signed(test_info.borrower.account_id),\n\
    \                deal_order_id,\n                transfer_id,\n            ),\n\
    \            crate::Error::::MalformedDealOrder\n        );\n    });\n}\n```\n\
    \n在此示例中，`ExtBuilder::default().build_and_execute()` 创建了所谓的外部环境构建器，它是模拟运行时的一个封装器，我们可以在其中调用外部函数并模拟区块链中产生区块的过程。这使得许多自定义链功能和错误处理可以在单元测试级别得到覆盖。`ExtBuilder`\
    \ 内部的执行环境是链上存储的内存实现。除此之外，所谓的模拟运行时是真实区块链运行时的部分表示，它可以简化具体数据类型并删除不必要的模块，以便于测试。对于\
    \ `creditcoin` 模块，它看起来像这样：\n\n```rust\n// Configure a mock runtime to test the\
    \ pallet.\nframe_support::construct_runtime!(\n    pub enum Test where\n     \
    \   Block = Block,\n        NodeBlock = Block,\n        UncheckedExtrinsic = UncheckedExtrinsic,\n\
    \    {\n        System: frame_system::{Pallet, Call, Config, Storage, Event},\n\
    \        Creditcoin: pallet_creditcoin::{Pallet, Call, Storage, Event, Config},\n\
    \        Balances: pallet_balances::{Pallet, Call, Storage, Config, Event},\n\
    \        Timestamp: pallet_timestamp::{Pallet, Call, Storage},\n        TaskScheduler:\
    \ pallet_offchain_task_scheduler::{Pallet, Storage, Event},\n    }\n);\n\nparameter_types!\
    \ {\n    pub const BlockHashCount: u64 = 250;\n    pub const SS58Prefix: u8 =\
    \ 42;\n    // used in tests, lower values == faster execution\n    pub const PendingTxLimit:\
    \ u32 = 500;\n}\n```\n\n在此示例中，用于单元测试 `pallets/creditcoin` 的运行时仅配置了 5 个模块——即被测目标和直接依赖项。\n\
    \n当测试 `pallets/difficulty` 时，模拟的运行时甚至更简单：\n\n```rust\n// Configure a mock runtime\
    \ to test the pallet.\nframe_support::construct_runtime!(\n    pub enum Test where\n\
    \        Block = Block,\n        NodeBlock = Block,\n        UncheckedExtrinsic\
    \ = UncheckedExtrinsic,\n    {\n        System: frame_system::{Pallet, Call, Config,\
    \ Storage, Event},\n        Difficulty: pallet_difficulty::{Pallet, Storage},\n\
    \        Timestamp: pallet_timestamp::{Pallet, Call, Storage},\n    }\n);\n```\n\
    \n有关如何在 Substrate 中开始进行单元测试的更多信息，请参阅他们的文档 [`https://docs.substrate.io/test/`](https://docs.substrate.io/test/)。\n"
- fmt: '# Unit Testing


    Typically the initial unit tests for extrinsics will be created by the developer
    who implemented said extrinsic function. I would then follow up with more scenarios,
    corrections, and/or improvements usually around error handling and coverage of
    corner cases. Sometimes in the same pull request, other times as a separate pull
    request.


    Code coverage metric is the primary source of information whether or not all branches
    and error conditions of an extrinsic are exercised via unit tests. During the
    development of Creditcoin 2.0, I’ve made a deliberate effort to improve this metric
    and implement as many unit tests as I can. If I remember correctly, the target
    was 85% coverage, and we came close to 80%.


    On some occasions, just to satisfy the metrics, I’ve added unit tests for helper
    functions and traits which served to increase coverage percentage but didn’t seem
    to add much value overall. This is purely a speculation though because I hadn’t
    tried to evaluate the effectiveness of this unit test suite with techniques such
    as mutation test coverage. My rule of thumb was simple: if coverage is missing
    and it is easy to add a unit test to increase the metric, then do so.


    Working on unit tests was also a good opportunity to learn more about how the
    Substrate framework works and how the Creditcoin implementation is put together.
    Process wise it strengthened the expectation that QA will constantly perform code
    review and participate in the development process from an early stage.


    ## Integration Testing


    The integration test suite for Creditcoin 2.0 was born out of several examples
    of how to interact with the blockchain. I wanted to exercise these examples and
    make sure that they will still function as we make changes to the implementation
    – again simple rule of thumb: if it is in git, then it must be constantly exercised
    and checked!


    A crude CI job executing these original examples made us realize that we can refactor
    the code and make it more usable for consumers. That’s why these examples were
    converted into a TypeScript library called `creditcon-js`. It is a wrapper around
    the `polkadot/api` TypeScript library. Then triggering the examples grew into
    the integration test suite which became the first consumer of `creditcoin-js`.


    The integration test suite itself is built around the popular Jest testing framework.
    At the time there wasn’t much choice around what languages and testing frameworks
    to use. On one hand, there was Jest, and the `polkadot/api` was also used upstream
    in the Substrate community. On the other hand, there was a Python client library
    which at the time unfortunately did not support async functions, so it wasn’t
    really a choice.


    A simple integration test looks like this.


    ```

    import { Blockchain, Guid } from ''creditcoin-js'';

    import { KeyringPair } from ''creditcoin-js'';

    import { createCreditcoinLoanTerms } from ''creditcoin-js/lib/transforms'';

    import { AddressRegistered } from ''creditcoin-js/lib/extrinsics/register-address'';

    import { signAccountId } from ''creditcoin-js/lib/utils'';

    import { creditcoinApi } from ''creditcoin-js'';

    import { CreditcoinApi } from ''creditcoin-js/lib/types'';

    import { testData, tryRegisterAddress } from ''creditcoin-js/lib/testUtils'';

    import { extractFee } from ''../utils'';

    describe(''AddAskOrder'', (): void => {

    let ccApi: CreditcoinApi;

    let lender: KeyringPair;

    let lenderRegAddr: AddressRegistered;

    let askGuid: Guid;

    const { blockchain, expirationBlock, loanTerms, createWallet, keyring } = testData(

    (global as any).CREDITCOIN_ETHEREUM_CHAIN as Blockchain,

    (global as any).CREDITCOIN_CREATE_WALLET,

    );

    beforeAll(async () => {

    ccApi = await creditcoinApi((global as any).CREDITCOIN_API_URL);

    lender = (global as any).CREDITCOIN_CREATE_SIGNER(keyring, ''lender'');

    });

    afterAll(async () => {

    await ccApi.api.disconnect();

    });

    beforeEach(async () => {

    const lenderWallet = createWallet(''lender'');

    lenderRegAddr = await tryRegisterAddress(

    ccApi,

    lenderWallet.address,

    blockchain,

    signAccountId(ccApi.api, lenderWallet, lender.address),

    lender,

    (global as any).CREDITCOIN_REUSE_EXISTING_ADDRESSES,

    );

    askGuid = Guid.newGuid();

    });

    it(''fee is min 0.01 CTC'', async (): Promise => {

    const { api } = ccApi;

    return new Promise((resolve, reject): void => {

    const unsubscribe = api.tx.creditcoin

    .addAskOrder(

    lenderRegAddr.itemId,

    createCreditcoinLoanTerms(api, loanTerms),

    expirationBlock,

    askGuid.toString(),

    )

    .signAndSend(lender, { nonce: -1 }, async ({ dispatchError, events, status })
    => {

    await extractFee(resolve, reject, unsubscribe, api, dispatchError, events, status);

    })

    .catch((error) => reject(error));

    }).then((fee) => {

    expect(fee).toBeGreaterThanOrEqual((global as any).CREDITCOIN_MINIMUM_TXN_FEE);

    });

    });

    });

    ```


    The core focus of this integration test suite is exercising each available extrinsic
    to make sure it is accessible from the outside. In terms of actual checking, the
    primary focus is asserting that transaction fees don’t drop below 0.01 CTC. In
    reality this value is configurable via parameters and allows a margin of error
    since fees aren’t fixed and also depend on how much the blockchain is being used.


    Custom RPCs, custom metrics, a few notable error conditions, and a full loan cycle
    are also exercised via this integration test suite, and the results are presented
    in a nice humanly readable format.


    ```

    PASS src/test/collect-coins.test.ts (49.97 s)

    CollectCoins

    request

    ✓ fee is min 0.01 CTC (10 ms)

    ✓ 000 - with mixed up Ethereum addresses should throw IncorrectSender error (11797
    ms)

    ✓ 001 - end-to-end (15014 ms)

    ✓ should throw TransactionNotFound when txHash not found (9984 ms)

    fail

    ✓ fee is min 0.01 CTC (8 ms)

    persist

    ✓ fee is min 0.01 CTC but bypassed by OCW (8 ms)

    PASS src/test/register-funding-transfer.test.ts (59.98 s)

    RegisterFundingTransfer

    ✓ fee is min 0.01 CTC (29060 ms)

    ✓ emits a failure event if transfer is invalid (29987 ms)

    PASS src/test/close-deal-order.test.ts (70.005 s)

    CloseDealOrder

    ✓ fee is min 0.01 CTC (69127 ms)

    ```


    Many of these integration tests are controlled by configuration variables, Jest
    uses configuration files, and sometimes even skipped, because we’ve added the
    opportunity to execute them against multiple environments, even against production.
    In mainnet this serves as a sanity test that loan cycle functionality is still
    working and that transaction fees meet a minimum requirement.'
