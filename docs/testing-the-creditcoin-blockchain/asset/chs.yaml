- "# 第一部分：区块链入门\n\n## 1. 介绍\n\n密码学家大卫·乔姆在其 1982 年的论文《由相互猜疑的群体建立、维护和信任的计算机系统》中首次提出了一种类似区块链的协议，并在随后的\
  \ 15-20 年中对此想法进行了进一步改进。第一个去中心化的区块链由化名为中本聪的个人（或团体）于 2008 年构想，从而催生了比特币。2013 年是以太坊的起点，它引入了智能合约功能。由于对密码学计算所需高能耗的担忧，后来的链如\
  \ Cardano（2017）、Solana（2020）和 Polkadot（2020）开始采用能耗较低的权益证明模型。\n\n目前，我们正目睹对区块链技术的兴趣和投资持续增长^(¹)，众多公司正在寻找加密货币之外的实际应用。这是一个区块链技术正进入更普遍的软件工程人员世界的时代。这也是区块链技术正在产品化的时代，这导致了对这些产品进行更多测试的必要性。\n\
  \n作为一名拥有近二十年经验的质量保证工程师，我对在区块链测试领域工作感到非常好奇，但与此同时，在很长一段时间里，我也感到极度不自在。我之前有测试底层基础设施类软件的经验，比如\
  \ Linux 操作系统的各个部分，但在此之前没有任何加密货币或区块链的经验。由于我参与的是一个已经投产的产品，我需要非常快速地学习大量知识，才能成为团队中高效的一员。这就像对着消防水管喝水，直到今天有时仍有这种感觉。\n\
  \n本书面向普通的测试人员和质量工程人员。他们可能很快就需要参与区块链软件产品的工作，但目前尚不具备必要的理解，不清楚它是什么、实际如何工作，以及在“保障”质量方面哪些是重要的。\n\
  \n区块链网络是分布式系统，通常比常规软件产品更复杂，并且有大量需要测试的项目，这需要广泛的技能组合。本书并非旨在成为涵盖所有可能场景的详尽资源；这是不可能的。相反，它旨在讲述我作为一名区块链测试工程师的故事，并希望能成为你在这个领域的起点。\n\
  \n祝你测试愉快！\n\n\n### 区块链简介\n\n像区块链这样的分布式系统包含多个组成部分，除非你之前从事过这个特定的技术领域，否则其中一些部分未必是常识。本章将解释什么是区块链，建立该领域中常用的一些术语，并为你提供一些示例。\n\
  \n区块链是一种不断增长的数据记录列表，这些记录被称为区块，它们通过密码学函数安全地链接在一起，从而保证数据不可篡改。在图 1-1 的语境中，我们可以将每个区块视为特定时间段内当前状态的一个快照。如果有人稍后试图修改这个状态，那么相对于被修改的区块，所有后续区块都将变得无效，从而暴露数据篡改行为。它也被称为分布式数字账本。这种架构使得互不信任的参与者仍能信任记录在区块链上的数据。\n\
  \n![](img/629923_1_En_1_Fig1_HTML.jpg)\n\n图 1-1\n\n构成区块链的链接数据块示例 许可协议：CC BY 3.0，来源：[`https://commons.wikimedia.org/wiki/File:Blockchain_landscape.svg`](https://commons.wikimedia.org/wiki/File:Blockchain_landscape.svg)\n\
  \n区块链参与者是在其计算机系统上运行区块链客户端软件的个体操作者。他们的动机通常是经济方面的——通过向区块链提供分布式计算资源来获得奖励。\n\n为了将新信息记录到区块链上，参与者必须达成一致——例如，一个困难数学问题的答案是什么。这被称为共识。根据设计，大多数区块链系统对任何人开放参与，并且在许多情况下，参与者是匿名的，可能出错（由于软件或硬件错误）或行为不端（由于可能存在篡改区块链记录的外部激励），并且通常不可信任。共识算法的工作就是确保在这种系统中的参与者能够达成一致，并检测和排除被认为有错误的参与者。否则，区块链软件无法进入下一步，即将实际数据记录到存储中。\n\
  \n一旦新的交易被组合成一个区块，并且该区块被分发到区块链中的多个节点，它就无法被删除或修改。区块链确保了完整的交易历史，而密码学函数的使用则保证了记录在链上的信息在设计上是安全的。这些记录本质上是只读的。所选择的算法和软件架构确保了这些原则得以实现。实际的密码学、共识、网络以及其他算法和实现架构各不相同，并且该领域有大量正在进行的研究，但其基本原则是确保数据完整性，如图\
  \ 1-1 所示。\n\n尽管当今许多区块链平台能够支持智能合约和加密货币，但这些对于区块链作为安全分布式账本的核心运作来说并非严格必需。恰恰相反，正是作为安全分布式账本这一点，才使得智能合约和加密货币的存在成为可能。\n\
  \n区块链实现是一种基础设施类型的软件，在非常高的抽象层面上类似于数据库——存储中记录了一些数据，外部世界（即其他应用程序）可以对区块链进行读写。\n\n区块链应用程序通常比测试人员可能熟悉的其他软件更复杂，它包含多个并行工作的组件，以及同时活动的多个网络通道和协议。\n\
  \n### 区块链属性\n\n本节仅供参考。在实际实现中，借助所选用的区块链框架，这些属性中的大部分都可以直接为你所用。\n\n围绕这些特定属性的测试要求取决于你的运营和业务需求，并且在实际实现中（例如，在你并非开发底层算法本身的情况下），最有可能通过加强监控和警报而不是功能测试套件来解决。\n\
  \n- **安全性**：一般认为区块链上的信息在防篡改方面是安全的，因此历史记录可以信赖。由于其分布式特性，区块链通常也被认为能够抵御恶意行为者。\n\n- **容错性**：在区块链网络中，可能存在表现出错误行为或完全恶意的节点。区块链实现对此具有内置的容错能力。\n\
  \n- **可靠性**：区块链在指定环境中、在给定时间内正常工作的概率。对于指定的权益证明共识机制而言，这转化为在当前时代，至少有三分之二当选的验证者在线且正常运行。\n\
  \n- **可复现性**：区块链上的交易可以由另一个节点重放，并且应始终产生相同的状态，例如，对于重放交易的节点，其本地磁盘上存储的信息相同。\n\n- **透明度**：公共区块链上的记录对所有人开放访问，从创世区块到当前区块的所有状态转换都可以被单独重放和验证。也就是说，尽管参与者通常是匿名的，但他们所有的行为都是完全透明的，任何人都可以追溯。\n\
  \n- **最终确定性** 指的是对于最近添加到区块链的一个格式正确的区块不会在未来被撤销，因此可以信赖的置信度。大多数分布式区块链协议无法保证一个新提交区块的最终确定性，而是依赖于“概率性最终确定性”：随着区块在区块链中深入，它被新发现的共识更改或回滚的可能性就越小。\n\
  \n- **公开 vs. 私有**：指区块链是完全对公众开放（例如，任何人都可以参与）还是并非如此。你在新闻中听到的区块链，包括 Creditcoin，都是公开的。\n\
  \n- **无需许可 vs. 需许可**：指任何人是否可以在未经事先获得某种许可、批准等的情况下，加入现有的区块链网络，运行节点，并参与共识。流行的区块链，如比特币、以太坊，当然还有\
  \ Creditcoin，都是无需许可的。\n\n\n\n### 区块链术语表\n\n**交易**，与常规 SQL 数据库中的事务非常相似，是一种旨在向区块链追加新信息的操作。它通常以\
  \ API 函数的形式暴露出来，以便用户可以与区块链进行交互。区块链交易通常是一个独立的实体，类似于针对传统数据库执行的单条 SQL 语句。交易代表了区块链的业务领域，例如\
  \ Creditcoin 的 `AddBidOrder`，或者以太坊中以太币从一方转移到另一方。一个区块链网络可以支持多种交易类型。\n\n**哈希** 是一种单向加密函数的结果，通常接收二进制数据作为输入，并返回一个十六进制字符串。每个数据都有唯一的哈希表示，并且你无法将哈希值反向推导回原始输入数据。即使输入数据修改一个比特位，也会导致哈希值截然不同。这使得公开共享哈希值来代替数据本身是安全的，并且可以使用相同的哈希值来验证两段数据是否完全相同。\n\
  \n**交易哈希** 是一个十六进制字符串，代表每笔交易的加密哈希值。这些字符串通常被用作标识符。例如，`https://etherscan.io/tx/0x8d116ea41628ac89745c95147c0ea394809074607395b0d792d1bea9136280b1`\
  \ 代表了我用一种加密代币（G-CRE）兑换另一种（ETH）的交易。\n\n**Gas** 或 **交易费** 代表在区块链上执行特定交易所需的成本。它可能随时间变化，也因交易类型而异，旨在表示该交易的计算开销。该值通常以区块链的原生加密代币表示。Gas\
  \ 的目的与代币经济学相关，同时也提供了一种安全特性，使得恶意行为在经济上不可行。\n\n**区块浏览器** 通常是一种 Web 应用程序，允许用户搜索和查看区块链上的区块、交易和地址。一个流行的例子是上一段中链接的\
  \ Etherscan。对于 Creditcoin，类似的功能由 Subscan（`https://creditcoin3-testnet.subscan.io/`）和\
  \ Blockscout（`https://creditcoin-testnet.blockscout.com`）提供。\n\n**区块** 是原子性地记录到区块链上的多个交易的集合。区块内的所有交易要么一起被记录，要么都不被记录。如果我们类比\
  \ git 版本控制系统，单个修改过的源代码块将是一个“*交易*”，而包含多个修改的一次 git 提交则是“*区块*”。\n\n虽然我们通常将区块称为记录，但其含义与数据库记录不同，数据库记录表示离散值的单一集合，换句话说就是一行列值。在区块链上下文中，术语记录更接近于存储了多首歌曲的黑胶唱片的含义。\n\
  \n区块包含一个交易列表、对前一个和下一个区块的引用，以及附加元数据，例如时间戳、加密哈希和签名。根据实现方式，单个区块中可以存储的交易数量有最大限制。\n\n\
  **区块饱满度** 或 **区块饱和度** 代表区块内总可用空间实际使用的百分比。例如，如果区块链没有被使用，每个区块可能只包含一个心跳/时间戳交易。而在一个被重度使用的区块链中，它可能包含数百笔交易。\n\
  \n**区块哈希** 是一个十六进制字符串，代表每个区块的加密哈希值。这些字符串通常被用作地址或标识符。例如，`0x34e89f72d1bc09af19759a94c347d769a94bb0ca9d257b2efe8ad5ac0502cc11`\
  \ 对应于以太坊主网上的第 19517842 号区块。其内容可以通过 `https://etherscan.io/block/0x34e89f72d1bc09af19759a94c347d769a94bb0ca9d257b2efe8ad5ac0502cc11`\
  \ 或 `https://etherscan.io/block/19517842` 查看。该区块包含 185 笔单独交易，包括我进行了一些代币兑换的那一笔。\n\
  \n**区块高度** 或 **区块编号** 是其前面区块的数量。较旧的区块高度较低。这个数字越大，区块链存在的时间就越长。\n\n**出块时间** 是区块链上区块之间的平均时间，例如\
  \ 15 秒。这个值本身是任意的，由区块链的创建者选择。重要的是这个值大致是一个常数。在比特币中，预期的出块时间是 10 分钟，而在以太坊中，设计要求的出块时间是\
  \ 15 秒，实际上通常在 10 到 19 秒之间。Creditcoin 的初始实现使用了 60 秒，后来的版本降到了 15 秒。恒定的出块时间对于分层应用更有利，因为它们可以知道在什么时间范围内可以认为一个操作失败或超时。\n\
  \n**创世区块** 是编号为零的区块。它通常被硬编码到区块链的实现中，例如你的客户端程序，并且可能包含后续链正确运行所需的元数据。例如，哪个账户是根账户，或者一组预定义地址的起始余额。\n\
  \n**分叉** 发生在区块链向两个可能的路径前进时。当多个节点几乎同时生成一个块时就可能发生分叉。当后续区块被添加并且其中一条路径比其他路径更长时，分叉就会得到解决。\n\
  \n**硬分叉** 通常发生在区块链协议发生不向后兼容的更改，并要求所有用户升级其软件才能继续参与网络时。在硬分叉的情况下，区块链网络作为两个彼此不连接的数字实体存在。硬分叉也可能由于软件实现中的错误和/或导致共识失败的网络问题而发生。换句话说，区块链中的参与者无法就哪条前进路径应该是权威路径达成一致，结果是产生了两条独立的链。\n\
  \n由于区块链旨在用作事实来源，无法解决导致硬分叉的情况被认为是严重的，并且可能对区块链造成损害。\n\n区块**最终性** 指的是区块链上交易的不可逆确认，确保了安全性并防止了双花。区块**最终化**\
  \ 是用于处理分叉并选择权威链的过程，在该链上，大多数参与者都同意区块不应被回滚。实际上，这意味着所有参与者的三分之二同意。\n\n\n\n**状态** 是区块链上的当前快照——包括区块总数、这些区块中记录的交易，以及本地存储中记录的值。在实践中，当我们谈论状态时，指的通常是某个特定区块的区块链快照。例如，区块\
  \ 1000 的状态是 Alice 有 300 余额，而 Bob 为零！到了区块 1010，内部状态可能因其间执行的交易而发生变化。例如，Bob 现在获得了一定数量的代币。当我们谈论状态时，通常指的是记录在区块链上的最新值，忽略之前的历史。但根据上下文，我们可能也需要考虑先前历史，比如在尝试复现某个特定错误时。\n\
  \n**挖矿** 是作为工作量证明共识算法的一部分，执行计算密集型加密操作的过程。执行此工作的计算机被称为**矿工**。广义而言，无论实际采用何种共识算法，当我们指代参与区块链的计算机和/或人类时，也会使用术语**矿工**。\n\
  \n在密码学和区块链中，**随机数（nonce）** 是一个在通信中仅能使用一次的任意数字。它通常是认证协议中颁发的伪随机数，用于确保旧通信无法在重放攻击中被重复使用。\n\
  \n**验证者** 是验证区块链交易合法性的计算机节点。也称为**矿工**或**铸币者**，验证者是参与共识算法并获得特权将区块追加到区块链上的人。这个过程完全是自动化的，当我们说“用户”时，通常是指参与区块链网络的计算机；但请记住，这台计算机是由人类操作的，也就是用户，可能也用同样的术语来指代。术语“验证者”常用于权益证明共识算法，而“矿工”更常用于工作量证明算法。\n\
  \n**提名者** 是区块链中的参与者，他们用自己的资金为选定的验证者投票。在权益证明网络中，提名者是一种用户角色，无需太多技术知识即可参与区块链，而不必操作区块链节点。他们有时也被称为**“投资者”**，因为他们只使用自己的资金，而非作为技术操作者。\n\
  \n**[加密]代币** 是一种数字代币，用于在区块链上代表价值，从而使区块链网络在经济上可持续运行。验证者通过运行支持区块链及其存储数据的计算机硬件，获得代币作为奖励。\n\
  \n像 BTC、ETH、CTC 等代币被称为**加密货币**，它们随后可能会自成体系。由于代币是价值的代表，它可以兑换成其他有价值的代币，例如纸币（也称为**法定货币**）或其他数字代币。代币经济学不在本书讨论范围之内。\n\
  \n加密代币的存在通常是公共区块链网络的必要条件，因为它为操作者提供了加入网络的激励。对于访问控制更严格或专注于解决特定业务问题的私有网络，则很少需要加密代币。解决当前业务问题所带来的预期利润，为此类网络的操作者提供了必要的动力。\n\
  \n> **注意**  \n> 区块链通常拥有所谓的**原生代币**或**实用代币**，旨在便利区块链的运行。此外还可以有其他代币，也称为**币**，它们可以被交换、交易或用于任何其他目的。此类**币**仅仅因为其存在而非技术实用性而被赋予重大价值的情况并不少见。\n\
  \n一个[加密]**钱包地址** 以一个长十六进制字符串表示，其中包含关于不同加密代币及其余额的信息，这些代币归地址控制者所有。该十六进制字符串用作钱包地址，实际上代表公钥-私钥对中的公钥。通常，钱包是区块链上的匿名账户。请注意，此地址与特定的区块链相关。我在以太坊上的地址是\
  \ `0x718bb20f20ab1937710D2Ac579D97835a6fD099C`。这个地址可能在其他区块链网络上不存在。同样重要的是，不同的区块链可能使用不同的地址格式和表示方式。在以太坊中，地址长度为\
  \ 20 字节，如上所示，用 40 个十六进制数字表示。在 Creditcoin（基于 Substrate 框架）中，格式是 32 字节的账户标识符；然而，并非所有基于\
  \ Substrate 的网络中的地址都基于密钥。\n\n由于生成这些地址的算法发生冲突的概率极低，只要格式支持，钱包地址实际上是唯一的，并且可以在不同的区块链上使用。在实践中，当首次向某个特定地址进行转账时，该地址背后的“账户”将在该特定区块链上开始存在。\n\
  \n**钱包应用** 是一个持有你的公钥/私钥，并允许用户通过签署交易来与区块链交互（用于转账或交换不同加密代币）的应用程序。最常见的是网页浏览器扩展或移动应用程序。流行的钱包应用例如有\
  \ **MetaMask** 和 **SubWallet**，但还有许多其他具有不同功能的钱包应用可用。例如，金融移动应用 Revolut 也包含加密钱包的功能，允许你购买代币、向其他地址转账或进行加密货币投资，尽管其功能范围要大得多。由于钱包应用持有私钥并允许用户签署交易，它们通常是用户与区块链交互时最显眼的软件之一。\n\
  \n请注意，根据上下文，术语**钱包**可能指账户的地址，也可能指用于管理该账户中资金的面向用户的应用程序，或者两者兼指。\n\n加密**水龙头** 是一种快速向用户奖励少量加密代币的方式，作为在网站或移动应用上完成各种任务的交换。用户完成的任务可能是点击付费广告、完成\
  \ CAPTCHA 测试、每日登录或与 Discord 机器人交互等。在区块链测试环境中，你的团队很可能会有内部/外部水龙头，以帮助测试者获取一些加密货币并用于测试。\n\
  \n**空投** 是一种营销策略，涉及将币或代币免费发送给区块链社区活跃成员的钱包地址，或作为完成一项小服务的回报。出于测试目的，它执行与水龙头相同的功能，但并非自助服务。\n\
  \n**主网**、**测试网**、**开发网** 和 **阶段网** 是区块链网络的独立实例。它们彼此隔离，你可以根据需要拥有任意数量用于测试和开发目的。唯一的账户、代币、区块和交易将存在于每个网络实例中。名为**主网**的实例是生产环境。其余的则由区块链创建者或多或少地任意分配命名。某些区块链可能拥有由不同名称表示的多个测试和开发环境。\n\
  \n\n\n**质押**是指为了参与权益证明共识机制而提交一定数量加密代币的行为。这适用于验证者和提名者两种角色。其经济激励是更高的投资回报。虽然与传统投资工具类似，但质押过程本身旨在让用户积极参与，以确保区块链社区的健康。请记住，区块链是一个高度分布式的环境，参与者越多越好。\n\
  \n**罚没**是对权益证明区块链网络中的恶意验证者实施惩罚（扣除代币）的过程，从而使此类行为在经济上不可行。罚没也适用于提名者，这就是为什么建议区块链质押的参与者保持活跃并定期监控链上动态。例如，不要投票给某个验证者后就再也不管了。\n\
  \n**客户端**程序是指任何与区块链通信的软件程序。在区块链应用的语境中，我们通常指那些在计算机上原生执行并实现区块链各组件的软件程序。这通常是在区块链上充当验证者的程序。在更广泛的语境中，客户端也可以指钱包应用，或与区块链交互的其他应用，例如质押仪表板或遥测仪表板。它也可以指为与特定智能合约交互而设计的应用。\n\
  \n某些区块链实现有一个独立的**运行时**组件，它封装了交易和业务逻辑，而客户端本身则被委以更底层的任务，例如网络通信、写入磁盘存储、共识等。\n\n**Web3**\
  \ 是万维网新迭代的一种构想，它融合了去中心化、区块链技术和基于代币的经济学等概念。该术语由以太坊联合创始人加文·伍德于 2014 年提出。\n\n**智能合约**是用特定编程语言（例如\
  \ Solidity）编写的程序，并存储在能够执行此类程序的区块链上。并非所有区块链都支持智能合约。最著名的例子是实施一种加密代币，例如存储在以太坊主网上；然而，智能合约并不仅限于此。示例包括交易类游戏（如井字棋）、投票、盲拍、支付通道等等。我认为任何可以表示为交易的内容都可以被编程到智能合约中。\n\
  \n智能合约的核心属性是：一旦部署到链上就无法更改（它与特定地址或交易哈希绑定），并且与智能合约的交互是透明的，以交易的形式呈现，即使各方的参与者可能是匿名的且彼此不一定信任。智能合约也可以通过调用其公开的函数来执行其他智能合约。在智能合约内部定义的函数的执行会被记录为区块链上的交易。一旦部署到链上，智能合约就无法更改；但是，你可以部署合约的新版本，这会产生一个不同的合约地址。智能合约具有合约存储（即存储）的概念，合约内部可用，可以保存诸如新创建的加密货币的代币余额等信息。\n\
  \n**EVM**，即**以太坊虚拟机**，是执行智能合约和去中心化应用的环境。顾名思义，该规范源自以太坊主网区块链。该规范是开放的，由以太坊基金会和以太坊社区维护。\n\
  \n### 区块链组件\n\n以下为 Polygon zkEVM 网络的单个计算节点架构图，用于说明区块链实现的复杂性：\n\n![](img/629923_1_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2\n\nPolygon 网络中的节点及其组件\n\n来源：[`github.com/0xPolygonHermez/zkevm-node#architecture`](https://github.com/0xPolygonHermez/zkevm-node#architecture)\
  \ 许可证：GNU AFFERO GENERAL PUBLIC LICENSE, Version 3\n\n区块链应用拥有多个并行工作且以分布式方式协同的组件。所有这些组件都可以被视为独立的软件系统，例如点对点网络，它们各自拥有自己的模块、复杂性和测试要求。许多此类组件依赖于在其他更常见的软件开发领域中不常使用的算法。因此，区块链实现往往比其他软件更为复杂。\n\
  \n#### 点对点网络\n\n区块链节点之间需要相互通信，以交换数据和网络信息，例如区块。这通过点对点网络完成。\n\n该组件负责对等节点发现和连接管理。它是某种形式的点对点网络实现，例如基于\
  \ `libp2p` 库。可能还有其他需要通过或依赖网络通信的组件，它们可以彼此分离，例如通过不同的 TCP 端口暴露，或作为独立的进程实现。\n\n####\
  \ 共识算法\n\n分布式计算系统中的一个基本问题是如何在存在故障节点或不可信节点的情况下实现整个系统的可靠性。这通常需要协调进程以就计算过程中所需的某个数据值达成一致。\n\
  \n共识算法、共识模型或共识引擎确保区块链的参与者就区块链的当前状态达成一致，并且旨在通过阻止恶意参与者获得向链中添加区块的机会来保障区块链的安全。\n\n\n\
  \n### 交易\n\n除了将单一交易序列化为二进制格式以便记录到区块的具体机制外，区块链的 `交易` 组件代表着其业务逻辑。也就是说，该特定区块链上可以记录何种类型的操作。\n\
  \n例如，资金转移（作为现代区块链背后的原始概念）、保险、借贷（以信用币为例），以及通常与金融资产、物流和供应链追踪、所有权证明与转移（如房地产契约）等相关的任何内容。\n\
  \n一个既实用又易于理解的例子是井字游戏。我们可以设计交易来记录新游戏开始、每位玩家的回合（例如，棋盘上的符号和位置）以及游戏的最终结果。一个交易模式可能如下所示：\n\
  \n* `start_game(玩家一地址, 玩家二地址)`\n* `record_move(玩家地址, 符号, 棋盘坐标)`\n* `calculate_outcome()`\
  \ - 可能在内部触发\n* `record_victory(玩家地址)`\n\n以最初的信用币白皮书为例，其交易模式如下：\n\n* 借款人请求贷款（`具体条款`）。\n\
  * 贷款人提出贷款（`具体条款`）。\n* 记录贷款人与借款人配对，例如，条款匹配/双方同意条款。\n* 记录资金转移。\n* 实际资金转移等。\n\n交易可以在区块链上的节点之间内部消耗——例如，每个井字游戏参与者必须成为区块链上的验证者，并且只能通过其验证者程序与区块链通信。\n\
  \n然而，更实用的做法是，交易也对外暴露，并通过某种 RPC 接口可用。这意味着游戏中的玩家可以与验证者不同。这也意味着他们可以更轻松地参与，例如通过移动端或\
  \ Web 应用程序，同时利用区块链来记录他们的操作。\n\n#### 交易费用\n\n区块链网络的运行和维护并非免费。它需要真实世界的计算资源，这些资源通常由庞大的外部社区提供。这在公有区块链网络中尤其如此。这要求引入以加密代币形式存在的交易费用。\n\
  \n为了使区块链在经济上具有灵活性，实现方需要根据自身需求控制交易费用组件。它可以是一个简单的数学公式，也可以是一个考虑多种因素（包括但不限于区块链的历史性能）的更复杂的算法。例如，当使用率高且呈上升趋势时，费用也可能上涨。如果网络闲置了一段时间，费用可以自动下调以刺激更多使用。\n\
  \n### 区块生产\n\n这是一个负责将交易序列化为区块，并与共识、存储和点对点组件进行通信的组件。区块链能够生产新区块至关重要。如果没有外部活动，内部时钟可能会触发一个\
  \ `time.set` 交易。\n\n由于此组件中的软件错误，或者由于共识或网络问题，区块生产可能会受到损害。当区块链无法恢复时，就说**我们损坏了区块链**，该链变得不可用，也就是说，无法再向其追加新区块，这很可能意味着你的区块链的终结。\n\
  \n### 区块奖励\n\n区块链上的矿工和/或验证者通常期望通过提供计算资源来维护基础设施而获得奖励作为回报。\n\n与交易费用类似，奖励以加密代币（可以是相同或不同的代币）的形式表示，并且通常是可以调整的。区块奖励组件可以是一个简单的数学公式或更复杂的算法——这取决于特定区块链的创建者来决定。\n\
  \n该公式可能根据区块链的流行度随时间变化，例如，在初始阶段提供更高的奖励以刺激参与，然后随着区块链变得更受欢迎或参与者饱和而降低奖励。\n\n### 远程过程调用（RPC）API\n\
  \n为了使区块链用户能够与网络交互，他们需要某种支持网络的接口。RPC 组件负责在区块链实现内部如何定义 RPC 方法，以及如何将它们暴露给外部世界。当谈到“用户”时，这里我指的是“API\
  \ 消费者”，无论他们在现实生活中的角色如何。\n\n例如，通过 JSON-RPC 和/或 REST 协议提供 API 接口，这些协议可能通过 HTTP 和/或\
  \ WebSocket 暴露。在各种实现中也可能使用其他网络传输和 RPC 协议。例如，Hyperledger Sawtooth 区块链框架使用 ZeroMQ\
  \ / Protobuf 作为其内部通信层。如果我没记错的话，客户端可以直接使用它。为了方便起见，该层被封装到一个 REST API 中。\n\n需要通过 RPC\
  \ 层导出的最重要的组件是交易接口。通过标准网络协议公开交易 API，允许多种类型的应用程序能够与区块链交互。使用广泛采用的行业协议可以更容易地从任何编程语言访问这个\
  \ API。\n\n例如，一个移动应用程序可能使用公私钥对签署交易，并将其发送到区块链节点，该节点随后会将该交易传达给 p2p 网络上的其他节点，最终该交易会被包含在一个区块中。通过\
  \ RPC API 组件接收交易的节点可能与执行验证和区块生产的节点不同。\n\n### 存储\n\n负责在参与网络的每个节点的本地磁盘上持久化数据，通常采用高效的键值存储形式。\n\
  \n出于实际开发目的，区块链上表示的数据必须通过具有字段的数据类型来表示，而不是二进制数据块流。也就是说，我们有一个数据模式，在区块链软件程序开发期间使用，也可以由第三方以\
  \ SDK 的形式使用。\n\n为了抽象的目的，存储组件的某些部分可以视作 Web 应用开发中常见的对象关系映射框架。\n\n### 迁移\n\n为了使实际的区块链应用能够根据业务需求演进，开发者需要能够修改数据模式。例如，在我们的井字游戏示例中，我们可能希望记录游戏在哪一步获胜，或者我们可能允许第三位玩家加入。\n\
  \n与对象关系映射框架类似，迁移组件允许开发者转换区块链上表示的数据，甚至删除其中的一部分。所有这些转换都将保存在特定区块高度的区块链历史中。如果查询较旧的区块，可以检索到较旧的数据，但无法保证客户端应用程序向后兼容。\n\
  \n失败的迁移可能导致区块生产受损，这可能是致命的。\n\n\n\n#### 运行时升级\n\n由于区块链应用因业务需求而不断演进，其实现版本会有所不同。假设我们想要为井字棋区块链引入一个功能，让三名玩家能够同时互相竞技。\n\
  \n运行时升级组件就负责实现这一功能。在某些区块链实现中，业务逻辑（交易）可能与实际的客户端程序分离保存。使用 Substrate 区块链框架时便是这种情况。一种流行的选择是\
  \ WebAssembly 格式。如果运行时是独立的，它也可以被记录在区块链本身之上。\n\n在其他实现中，交易可能与客户端程序的其余部分紧密耦合，需要软件升级和重启后，用户才能访问区块链的新功能。\n\
  \n该组件引发了关于不同客户端和运行时版本之间兼容性/互操作性测试的问题。\n\n#### 指标与遥测\n\n由于区块链应用是分布式的，并且出于安全原因鼓励大量节点参与，因此常常需要公开区块链软件内部运行的信息。这些信息可以汇总到诸如\
  \ Grafana 之类的工具中，以便进行进一步分析。\n\n遥测组件就是定义此类指标，并随后通过例如 HTTP 协议将其推送到外部服务的地方。\n\n####\
  \ 链下工作机（Off-Chain Worker）或预言机（Oracle）\n\n在区块链的语境中，所有计算和状态都存储在链上。然而，实际应用需要与外部世界通信，并将信息安全地传入和传出区块链。这就是所谓的预言机或链下工作机组件的领域。\n\
  \n这里需要注意一点：链下工作机能够读取链上数据，但不应直接修改它。不过，如果需要反映外部世界的状态，该组件会将交易发送回区块链。这可以在内部发生，例如，在源代码中调用交易函数，或者通过现有的\
  \ RPC 接口从外部路由到区块链。这些交易调用随后将由其他组件处理，如果成功，将被打包进一个区块。交易也可能因各种原因失败或未能被打包进区块。\n\n####\
  \ 智能合约\n\n智能合约是存储在区块链网络上的计算机程序。一旦智能合约被部署到区块链上，它可以存储任意状态、执行任意计算，或调用区块链上的其他合约。\n\n\
  每个智能合约都有一个与之关联的地址，该地址充当合约的入口点，非常类似于 REST API 函数的 URL 地址。终端客户端通过与智能合约交互，使用其地址通过某种客户端库发送交易——一个流行的选择是\
  \ `ethers.js`。\n\n一旦部署，智能合约便无法修改。不过，合约的新版本可以部署到不同的地址。\n\n智能合约的创建者铸造一种新的加密代币（即凭空创造出来）相当流行，这种代币随后被用作某些区块链网络上的价值表示。然而，智能合约也可以实现其他功能，例如自动透明的投票计数、托管拍卖、游戏以及安全地远程购买商品。\n\
  \n智能合约的实际应用超出了本书的讨论范围。\n\n### 共识机制\n\n共识引擎是区块链网络中最重要的组件之一，目前有许多正在开发或使用的机制。例如，工作量证明、权益证明、消逝时间证明、容量证明和位置证明等等。它们的特性影响着诸多属性，例如谁可以参与、参与难易程度、维护网络的成本、激励机制、出块速度快慢、网络能支持的节点数量、交易吞吐量，以及最重要的是，区块链的安全性！\n\
  \n请查看这个包含 20 多种算法的列表以作进一步参考：[`https://medium.com/hackernoon/consensuspedia-an-encyclopedia-of-29-consensus-algorithms-e9c4b4b7d08f`](https://medium.com/hackernoon/consensuspedia-an-encyclopedia-of-29-consensus-algorithms-e9c4b4b7d08f)\n\
  \n#### 工作量证明 (PoW)\n\n在 PoW 共识中，参与者需要消耗计算资源，以获取将新区块追加到区块链的机会。他们需要解决一个 CPU 密集型的加密难题，并将解（一个非常大的数字）提交给其他参与者，这些参与者可以非常容易地计算（并认同）该解是正确的。每个区块的数据部分被用作加密难题的输入。\n\
  \n第一个找到正确解的矿工获得将新区块追加到区块链的机会。正因如此，我们说他们“挖”到了一个区块。\n\n矿工拥有的 CPU 资源越多，他们解决加密难题并将区块追加到区块链的机会就越大，从而为他们的努力赚取更多奖励。\n\
  \n在 PoW 网络中，出块时间相对较慢，并且对电力有很高的要求。\n\n#### 权益证明 (PoS)\n\n在 PoS 共识机制中，参与者根据其质押的代币数量竞争追加区块的机会。一般而言，投资的代币越多，被算法选择去追加区块并因此获得更高回报的可能性就越大。\n\
  \nPoS 网络避免了 PoW 网络的高计算成本。由于涉及的加密计算少得多，因此并没有真正的“挖矿”；然而，即使在这种情况下，我们通常也把验证者称为矿工。\n\n\
  质押的资金被区块链实现作为“人质”持有，如果验证者被举报并被发现有错误或恶意行为，其资金可能会被作为惩罚没收。这个过程是自动化的，旨在限制人为参与并促进区块链网络的健康行为。例如，当一个验证者节点长时间离线时，他们将受到惩罚。\n\
  \n在区块链网络中对参与者施加惩罚并没收其现有资金的过程，也被称为“罚没”（slashing）。\n\n#### 权威证明 (PoA)\n\n权威证明是一种算法，它通过一种基于身份作为抵押品或声誉作为抵押品的共识机制，提供相对较快的出块时间。在\
  \ PoA 网络中，个人通过努力获得成为验证者的权利，因此有动力去维持他们已经获得的地位。PoA 共识通常可以在私有非许可链中找到。\n\n### 本章小结\n\
  \n在本章中，我介绍了区块链的基本概念，并讨论了一个区块链实现的一些主要组件和属性，以建立基础知识。你也可以随时参考术语表章节来温故知新。\n\n接下来，我将介绍我使用过的区块链开发框架、构建实际区块链实现的一些实用笔记，以及这对我们测试人员意味着什么。\n\
  \n脚注 1\n\n"
- "# 2. 区块链开发框架\n\n在互联网上搜索“区块链开发框架”会得到大量结果，并且当你阅读本书时，偏好很可能已经发生了变化。具体细节会有所不同，但基本概念应该是相似的。在本章中，我将列出我个人使用过的框架，以便为后续章节提供更多背景信息。\n\
  \n\n\n### Hyperledger Sawtooth\n\nHyperledger Sawtooth 是由 Hyperledger 和 Linux 基金会主导，IBM、英特尔等公司共同贡献的一个区块链开发框架。该框架采用模块化架构，将核心系统与应用领域分离，使开发者能够为应用程序指定业务规则，而无需了解整个系统的底层设计。Sawtooth\
  \ 支持多种共识算法。\n\nSawtooth 最初由英特尔贡献，是一个专为灵活性和可扩展性设计的区块链套件。交易业务逻辑通过所谓的 `Transaction\
  \ Families` 与共识层解耦，这些“交易家族”既可支持受限语义，也可支持非受限语义。原网站：[`https://wiki.hyperledger.org/display/sawtooth`](https://wiki.hyperledger.org/display/sawtooth)。\n\
  \nSawtooth 的初始版本使用 Python 实现，随后部分组件又用 Rust 重新实现。\n\n**注意**：GitHub 上的原始 Hyperledger\
  \ Sawtooth 仓库已于 2024 年 2 月 1 日（本书撰写期间）应其维护者要求归档。此后，该代码库的持续维护版本已迁移至 Splinter 社区，地址为\
  \ [`https://www.splinter.dev/`](http://www.splinter.dev/)。\n\nHyperledger Sawtooth\
  \ 是我在 Creditcoin 1.x 区块链生命周期末期所体验到的该链所使用的开发框架。\n\n### Substrate\n\nSubstrate，[`https://substrate.io`](https://substrate.io/)，是一个区块链框架，自称是快速构建定制化、面向未来的区块链的最强大框架。该框架允许开发者构建专业化的区块链应用。Substrate\
  \ 由 Polkadot 网络和 Parity Technologies 主导，后者由以太坊首位 CTO 加文·伍德领导。\n\n使用 Substrate 构建自己的区块链出奇地容易，只需按照其教程即可快速上手。参见\
  \ [`https://docs.substrate.io/tutorials/build-a-blockchain/build-local-blockchain/`](https://docs.substrate.io/tutorials/build-a-blockchain/build-local-blockchain/)。其核心概念是**可组合性**——你的区块链实现由多个称为“Pallets”（模块）的组件构成，这些组件在运行时中组合在一起。\n\
  \nSubstrate 使用 Rust 编程语言构建，而 Polkadot 的其他工具则使用 TypeScript —— 这些通常包括客户端库和前端应用程序。\n\
  \nCreditcoin 2.x 及更高版本使用 Substrate 构建。\n\n### Ethereum\n\n我个人并未在以太坊上进行过任何开发与测试工作，但在此提及它是因为它非常流行。`Geth`\
  \ 似乎是使用 Go 编程语言实现的主要以太坊客户端；参见 [`https://github.com/ethereum/go-ethereum`](https://github.com/ethereum/go-ethereum)。由于该实现是开源的，完全可以通过分叉并修改代码来创建你自己风格的定制化区块链。显然，Musicoin\
  \ 链就是这样做的。另一方面，你更有可能在以太坊主网上部署智能合约，而非构建自定义链。\n\n无论哪种情况，以太坊都有大量的开发工具可用；如有兴趣，请参见 [`https://ethereum.org/en/developers/docs/frameworks/`](https://ethereum.org/en/developers/docs/frameworks/)。\n\
  \n### 编程语言\n\n本书讨论的编程语言构成了一种丰富多彩的组合：在 Creditcoin 1.x 时代，包括 Python、C++ 和 C# .NET；而在\
  \ 2.0 及更高版本中，则主要是 Rust 和 TypeScript。\n\n`Rust` 是一种通用编程语言，强调性能、类型安全性和并发性。它在没有垃圾回收器的情况下保障内存安全。Rust\
  \ 是一种静态类型且强类型的函数式语言，是系统编程（包括区块链等分布式系统以及 Linux 内核）的热门语言。\n\n开发者格雷登·霍尔在 2006 年于 Mozilla\
  \ Research 工作时，将 Rust 作为个人项目创建。Mozilla 于 2009 年正式赞助该项目，此后该语言得到了迅速普及。以下是 Rust 中 Hello\
  \ World 程序的样子。\n\n```\nfn main() {\nprintln!(\"Hello, World!\");\n}\n```\n\n在 Rust\
  \ 中，开发者可以使用 `struct` 或 `enum` 关键字创建用户自定义类型，然后使用 `impl` 关键字为这些类型附加方法。Rust 受到许多其他语言的影响，并非纯粹的面向对象语言。虽然你可以拥有带有数据和方法的用户自定义数据类型（看起来像类），但\
  \ Rust 没有真正的面向对象继承概念。相反，Rust 使用泛型、trait 和多态。如果你对 trait 不熟悉，可以将其视为一种接口定义，所有应支持该接口的数据类型都需要实现它。\n\
  \n从测试人员的角度来看，使用 Rust 会遇到一些“已知问题”：\n\n- 编译器是你的朋友——内存安全几乎排除了随机的运行时故障；强类型意味着几乎不可能在代码块中误用本不该在那使用的变量（例如，复制粘贴问题）。\n\
  - 语言内置了优秀的自动化测试工具。\n- 测试可以并行执行。\n- 断言通过宏来执行，当断言失败时会产生运行时恐慌（panic）。\n- 从头开始编译需要相当长的时间，因此保留构建缓存非常重要。\n\
  - 流行的代码覆盖率和静态分析工具可能对 Rust 支持不佳，因为它仍然是一门相对较新的语言。\n- “单元”测试代码和“集成”测试代码之间的区别相对较小，如果你对该语言经验不足，可能不容易立即区分。\n\
  - 内置的测试框架库中没有用于共享 setup/teardown 的语法。\n\n有关 Rust 语言特别是测试的更多信息，请参阅 [`https://doc.rust-lang.org/book/ch11-00-testing.html`](https://doc.rust-lang.org/book/ch11-00-testing.html)。\n\
  \n`TypeScript` 是带有类型语法的 JavaScript。TypeScript 是一种建立在 JavaScript 之上的强类型编程语言。\n\n\
  ```\nconst message: string = 'Hello, World!';\nconsole.log(message);\n```\n\n前面提到的\
  \ Rust 的优点在此同样适用。TypeScript 编译器和 linter 是测试人员最好的朋友，它们会为你捕获错误。一个巨大的优势是，流行的 JavaScript\
  \ 测试框架都拥有 TypeScript 绑定，为测试自动化提供了更多选择，并且第三方工具和服务对其支持相当好。网站：[`https://www.typescriptlang.org/`](http://www.typescriptlang.org/)。\n\
  \n在 Substrate/Polkadot 生态系统中，首选的框架是流行的 Jest 测试框架，我在测试 Creditcoin 时广泛使用了它。如果你来自（例如）Web\
  \ 应用的测试自动化背景，那么你可能拥有足够的经验来快速上手。我个人测试背景与 Web 和 JavaScript 相去甚远，但入门时只遇到了一些小问题。\n\n\
  `Solidity` 是一种静态类型的、使用花括号的编程语言，专为开发在以太坊及其他 EVM 兼容链上运行的智能合约而设计。\n\n\n\n// compiler\
  \ version must be greater than or equal to 0.8.24 and less than 0.9.0 pragma solidity\
  \ ⁰.8.24;\ncontract HelloWorld {\nstring public greet = \"Hello World!\";\n}\n```\n\
  代码清单 2-3\nSolidity 中的 Hello World 示例\n\n上述示例展示了一个智能合约，该合约存储了一个特定值，但未暴露任何可供外部调用的函数，此处仅作说明之用。更多信息请参阅\
  \ [`https://soliditylang.org/`](https://soliditylang.org/)。\n\n尽管 Creditcoin 最初并非智能合约平台，但始终需要与智能合约进行交互——请注意，实际的加密代币贷款转移和还款发生在外部区块链上。后来在\
  \ Creditcoin 3.0 版本中，智能合约成为了核心组成部分。\n\n本书不涉及智能合约本身的测试，我个人在此领域也缺乏经验。但至少在需要与智能合约交互的边界场景中，能够阅读并理解\
  \ Solidity 代码至关重要。\n\n### 如何构建区块链实现\n\n区块链实现是一种复杂的基础设施类软件，类似于操作系统或数据库管理引擎。要实现一个具备分布式账本形态和运作方式的系统，需要构建所有相关组件和算法。\n\
  \n幸运的是，大多数软件公司并非操作系统或数据库供应商。这些公司更专注于利用区块链技术为客户解决特定问题（例如安全记录贷款交易），从而将区块链实现的关注点转移到其他领域。\n\
  \n在我看来，当今大多数实用的区块链应用要么构建在现有区块链平台上，要么使用区块链开发框架作为独立网络构建，或者至少是其他现有区块链实现的分叉。\n\n作为从事区块链工作的测试人员和\
  \ QA 工程师，我们需要深刻理解基本原理，但主要精力会放在根据利益相关者需求测试业务领域功能和特定区块链组件上。只有极少数人会实际参与底层算法及复杂性的测试工作。即便我自己直接测试\
  \ Creditcoin 区块链，也很少需要深入探索 Substrate 框架的内部机制，尤其是出于测试目的。\n\n以下是使用 Substrate 框架的区块链实现代码片段（代码清单\
  \ 2-4）。\n\n```\n/// 具体数据类型定义\npub type BlockNumber = u32;\npub type Signature =\
  \ MultiSignature;\npub type AccountId = ::AccountId;\npub type Signer = ::Signer;\n\
  pub type AccountIndex = u32;\npub type Balance = u128;\npub type Nonce = u32;\n\
  pub type Hash = H256;\n/// 运行时中各模块的配置\nimpl pallet_balances::Config for Runtime\
  \ {\ntype RuntimeEvent = RuntimeEvent;\ntype WeightInfo =     pallet_balances::weights::SubstrateWeight;\n\
  type Balance = Balance;\ntype DustRemoval = ();\ntype ExistentialDeposit = ExistentialDeposit;\n\
  type AccountStore = System;\ntype ReserveIdentifier = [u8; 8];\ntype RuntimeHoldReason\
  \ = ();\ntype FreezeIdentifier = ();\ntype MaxLocks = MaxLocks;\ntype MaxReserves\
  \ = ();\ntype MaxHolds = ();\ntype MaxFreezes = ();\n}\nimpl pallet_sudo::Config\
  \ for Runtime {\ntype RuntimeEvent = RuntimeEvent;\ntype RuntimeCall = RuntimeCall;\n\
  type WeightInfo =     pallet_sudo::weights::SubstrateWeight;\n}\nimpl pallet_evm_chain_id::Config\
  \ for Runtime {}\n/// 实现运行时 API\nimpl_runtime_apis! {\nimpl sp_api::Core for Runtime\
  \ {\nfn version() -> RuntimeVersion {\nVERSION\n}\nfn execute_block(block: Block)\
  \ {\nExecutive::execute_block(block)\n}\nfn initialize_block(header: &::Header)\
  \ {\nExecutive::initialize_block(header)\n}\n}\nimpl sp_api::Metadata for Runtime\
  \ {\nfn metadata() -> OpaqueMetadata {\nOpaqueMetadata::new(Runtime::metadata().into())\n\
  }\nfn metadata_at_version(version: u32) -> Option {\nRuntime::metadata_at_version(version)\n\
  }\nfn metadata_versions() -> Vec {\nRuntime::metadata_versions()\n}\n}\n}\n代码清单\
  \ 2-4\nSubstrate 框架中区块链运行时的实现示例\n```\n\n完整版本请访问 [`https://github.com/gluwa/creditcoin3/blob/dev/runtime/src/lib.rs`](https://github.com/gluwa/creditcoin3/blob/dev/runtime/src/lib.rs)。\n\
  \n\n\n### 开发与测试的思考\n\n与任何软件一样，构建方式会影响测试方式。\n\n例如，在使用 Hyperledger Sawtooth 时，感觉抽象层级过多，让我很难完全理解。从测试角度来看，主要缺点是所有组件都作为独立的仓库/Docker\
  \ 容器存在，因此很难单独测试某些功能。显而易见的选择是将整个系统视为一个大型整体，并从外部进行测试。\n\n相比之下，基于 Substrate 的实现更像一个单体应用，所有内容都打包在一起。我发现上手更容易，工作效率也更高。Substrate\
  \ 框架本身还提供了创建模拟运行时的功能，以便单独测试特定组件。这成为能够为 Creditcoin 构建全面单元测试套件的巨大推动力。\n\n我需要指出，当我提到“测试框架”时，通常指的是特定编程语言中提供的实际工具和库。由于我的背景偏技术，且倾向于直接与开发者合作，因此很少涉及“创建自己的测试框架”，更多的是“直接编写代码，利用现有工具完成任务”，尤其是在单元测试方面。如果读者您来自不同背景，不必担心。您只需了解我的出发点即可。\n\
  \n在本书的初稿审阅阶段，我收到了 Jeroen Rosink 关于使用数据集进行测试/测试自动化的一个相当有趣的反馈。我认为我们在这方面存在很大分歧。请允许我详细说明。\n\
  \n在实际操作中，我不会保留测试数据来喂给测试场景，并执行数百笔贷款交易以寻找 bug。我更关心的是，传入的数据能否在不崩溃的情况下记录到区块链上，以及谁可以记录，例如借款人或贷款人。输入验证的许多方面实际上由底层编程语言处理。例如，当为某个参数指定了无符号整数数据类型时，我不需要显式测试是否不允许使用负值——我的编译器会处理这些，而彻底的代码审查就足够了。\n\
  \n另一个需要考虑的事实是，Creditcoin 是一个平台，最初是为了解决特定业务问题而创建的，后来演变为更通用的平台。在高抽象层面上，它只是一个区块链参与者可以记录数据的地方。这并不是说\
  \ Creditcoin 没有 bug，很可能是有一些的；然而，当你倾向于构建一个通用平台时，数据是否 100% 准确，以及你的软件是否允许用户搬起石头砸自己的脚，就变成了次要问题，因此你会相应地进行规划并确定优先级。\n\
  \n同样重要的是要注意，我的实践经验较少涉及针对共享环境运行的测试套件（其中先前状态和现有数据会影响其结果和/或影响准备测试数据的可用性），而更多地是使用编程语言即时创建临时环境，注入数据，并建模我需要的任何前置条件，作为被测系统的一部分，以便断言特定行为。也就是说，Creditcoin\
  \ 的大部分测试发生在任何内容被合并并部署到现有网络之前。这进而也消除了区块链新版本部署后许多测试活动的必要性。这或许让我免于处理许多实际挑战，但这确实值得思考，具体取决于您所在组织及您个人如何看待测试。\n\
  \n### 总结\n\n在本章中，我介绍了使用过的区块链开发框架，并讨论了它们之间的差异及其对测试的影响。\n\n在下一章中，我将向您介绍 Creditcoin\
  \ 是什么及其工作原理，这将是后续章节的基础，我将在其中与您分享我的测试历程。\n\n# 第二部分：Creditcoin 区块链：目标与目的\n\n# 3. 介绍\
  \ Creditcoin 区块链\n\nCreditcoin 解决的主要问题之一是，发展中国家有数百万甚至数十亿人无法使用传统银行系统——也就是说，他们根本没有银行账户。这些人无法将信贷作为金融工具来改善生活，因为由于没有银行账户，他们无法使用这种传统工具。在某些地区，可能还缺乏实体基础设施，例如银行网点，来实现这种接入。\n\
  \n例如，想象一位农民，他愿意承担债务来购买机械，这能节省数小时的体力劳动，从而提高生产力。当你无法使用基础设施时，这根本不可能实现，而这正是 Creditcoin\
  \ 发挥作用的地方。\n\n\n  \n## 什么是 Creditcoin  \n\n`Creditcoin` 最初是一个与区块链无关的投资协议，允许参与者借出和借入任何加密货币。在其官网上，它也被描述为“无国界金融平台”，此后该平台不断发展。该协议的详细内容发布在\
  \ `https://creditcoin.org` 网站上的一份白皮书中，第一版于 2017 年发布，此后已多次更新。  \n\n`Creditcoin` 区块链是\
  \ `Creditcoin` 协议的规范开源实现，由 `Gluwa, Inc.` 构建和维护。它是一个面向投资相关活动的区块链网络，将贷款交易记录在分布式公共账本上。这使得现实世界资产得以表示，并促进了投资者与筹资者之间的连接。这些记录将永久存储在区块链上，感兴趣方（例如传统贷款机构）可在未来利用这些数据进行信用评估。\
  \  \n\n本书中提到的 1.x 和 2.x 版本范围较窄，主要关注贷款相关交易的记录，而最新的 3.x 版本则变得更加通用，演变为一个多链信用协议，通过原生支持智能合约来赋能现实世界资产。在\
  \ `https://gluwa.com/` 网站上，这一最新迭代版本被称为“推动全球金融包容性的技术”，不过这里我就不展开了。  \n\n![](img/629923_1_En_3_Fig1_HTML.jpg)\
  \  \n\n图 3-1  \nCreditcoin 的示意图  \n\n贷款条款、还款和信用表现等信息均可在 `Creditcoin` 区块链上获取，从而促进简单透明的风险评估，并将\
  \ Web3 资本与现实的信用投资机会连接起来。`Creditcoin` 区块链本身是创建与贷款相关的其他金融产品（例如点对点借贷平台、投资平台、交易所，或上述功能的组合）所必需的基础设施。\
  \  \n\n原始 `Creditcoin` 贷款周期的完整架构图在本页展示：  \n\n`https://docs.creditcoin.org/cc2/faq#how-does-the-creditcoin-network-use-ctc`\
  \  \n\n如图 3-1 所示，`Creditcoin` 在设计上是多链的。原生记录在 `Creditcoin` 链上的数据代表了贷款条款和协议，以及参与者之间随时间变化的借贷、放贷和还款状态。例如，Alice\
  \ 可以记录她正在寻求特定条款的贷款，然后 Bob 可以记录他愿意按相同条款放贷，最后他们的协议记录（称为 `DealOrder`）可以被记录在链上。`Creditcoin`（至少在最初的设计中）不支持加密货币，这意味着实际的资产转移发生在\
  \ `Creditcoin` 网络之外。资产转移在外部区块链网络上进行，并由第三方加密代币表示。例如，如果用 `ETH` 进行借贷，交易会记录在以太坊主网上。如果使用不同的加密代币来记录法币交易，则可能会使用其他与以太坊兼容的网络，如\
  \ `Goerli` 或 `Sepolia`。当外部区块链上的资金发生转移时，这一行为必须记录到 `Creditcoin` 中。实际记录包含外部链上的有效交易哈希，`Creditcoin`\
  \ 软件会（例如）访问以太坊来检查并验证提交给它的信息。两个参与者之间转移的金额及其地址应与之前在 `Creditcoin` 中记录的他们的身份和贷款条款相匹配。最初的\
  \ 1.x 版 `Creditcoin` 实现也包含了针对比特币的概念验证代码；不过，我不知道该代码是否在实际中曾被使用过。  \n\n`Creditcoin`\
  \ 区块链会验证并记录其他区块链上的外部工件（如地址和交易），并将其记录到自己的链上，同时还会验证地址的所有权（例如在以太坊上）。  \n\n`Creditcoin`\
  \ 区块链上的原生加密代币称为 `CTC`。它作为一种实用代币，用于保证区块链本身的经济稳定性。在撰写本书时，`CTC` 代币并未直接用于借贷。  \n\n从商业角度来看，`Creditcoin`\
  \ 背后的模型可描述为“基础设施即服务”。该区块链基础设施的主要使用者将是金融科技合作伙伴，他们希望将交易记录到区块链上，并愿意访问先前的信用记录，以及/或获得该基础设施所支持的潜在新市场及商业机会。例如，尼日利亚的\
  \ Aella 就是这样的合作伙伴之一。事实上，根据 `Creditcoin` 文档，[Aella](https://aellaapp.com/) 是 `Creditcoin`\
  \ 区块链的首个机构用户，其在 [2022 年 6 月](https://medium.com/creditcoin-foundation/creditcoin-x-aella-integration-live-c8b8eb3b606d)\
  \ 将其运营与 `Creditcoin` 进行了集成。  \n\n真实用户会参与信用相关活动，例如，我例子中的农民或投资代理在技术上可以直接使用区块链；这在展示\
  \ `Creditcoin` 1.x 客户端程序的 YouTube 视频中甚至有过演示。不过，我认为这并非一个可行的长期策略。这类用户更有可能在日常交互中使用移动应用，然后该移动应用会直接或通过某种后端\
  \ API 层与区块链基础设施进行通信。事实上，`Gluwa, Inc.` 也一直在开发这样一个名为 `Credal` 的 API 层，但我并未过多参与这方面的工作。\
  \  \n\n区块链上的所有参与者都需要支付交易费用，无论他们是只执行少量交易的自然人，还是在网络上记录数千笔交易的借贷合作伙伴。然而，绝大部分运营费用由那些运行计算机节点（即各种区块链节点）的人承担；他们通常需要向云服务提供商支付计算、存储容量和网络带宽的费用。\
  \  \n\n\n\n### 对测试活动的影响\n\n请注意，本书所涵盖的时间段与 Creditcoin 自身的快速开发及演变相吻合。一方面，从 3.0 版本开始，Creditcoin\
  \ 的定义开始向更通用的区块链网络转变。另一方面，我们需要讨论这对测试活动的影响。\n\n与任何快节奏环境一样，实际的工程和测试活动可能看起来非常混乱，并且与我们能在更传统或更慢速环境中发现的情况不同。具体来说：\n\
  \n- 没有太多时间正式收集和记录深入的需求。通常，需求目标本身会在实际技术实施进行时发生变化。\n\n- 技术细节通常未知且不明确。这在当今的软件世界中并不罕见，因为用于构建软件的多个抽象层和第三方组件随处可见。而在区块链世界中，由于分布式系统固有的复杂性，这种情况可能更胜一筹。\n\
  \n- 测试策略可能不会立即显现，这是前述项目的直接后果。很多时候，测试会基于基本原则开始，覆盖最明显的正向和负向场景，并随着我们对被测系统了解的增加而逐步扩展。这与其他软件测试项目相比并没有太大不同，但可能由于环境本身风险较高，遗漏重要测试的风险略高。\n\
  \n- 与更传统类型的应用相比，可用的测试工具选择较少。例如，如果我没记错的话，在最初研究 Substrate 的客户端库时，只有两个可用——一个用 Python\
  \ 编写，另一个用 TypeScript 编写。现在我可以找到第三个，用 Rust 编写。虽然我个人更喜欢 Python，但当时那个特定的库不支持异步函数，而整个\
  \ Substrate API 都是异步的。所以技术选择其实并非真正的选择。\n\n后续章节将记录具体场景，但需要注意的是，这里涉及大量的第三方开源组件。事实上，Creditcoin\
  \ 3.0 版本几乎完全由第三方依赖项组成，其自身的原生组件非常少。我个人认为，对于区块链而言，这比 Web 或移动开发带来了更高的风险。\n\n虽然 Web\
  \ 和移动开发同样依赖许多第三方组件，但背后的组织通常不是你的直接竞争对手。例如，`Django` 和 `Ruby on Rails` Web 框架由大型社区开发，并由各自的非营利基金会管理，其唯一目的是为其他\
  \ IT 社区提供更好的框架来创建 Web 应用。另一个例子是分别由 Facebook 和 Google 支持的 `React Native` 和 `Flutter`\
  \ 移动应用框架。虽然 Facebook 和 Google 都不是独立的软件供应商，但它们的核心业务依赖于快速开发高质量应用的能力，并且它们开发了大量的软件，这意味着它们实际上有直接的动机来创建优秀的通用开发框架。\n\
  \n具体来说，关于 Substrate 区块链框架及其生态系统，其主要开发者是 `Polkadot/Parity Technologies`，其核心业务是运行\
  \ Polkadot 网络区块链。虽然他们在提供通用区块链框架方面做得非常出色，但我们必须考虑到，某些组件的内部优先级可能高于其他组件，这与其业务目标一致。特别是，我在\
  \ Polkadot Staking Dashboard 代码库中看到了一些在 Creditcoin 方面导致问题的领域。这是一种情况，同样的核心技术导致了在同一领域内运营的两个不同供应商面临已知问题和\
  \ Bug 的不同严重程度。在我看来，这是一种需要考虑的技术风险形式，这种风险在更传统的 Web 和移动世界中程度较低。\n\n由于上述所有因素，我认为 Creditcoin\
  \ 的测试策略可以概括为 **计划-构建-测试-发现-重复**，或者像我称之为的那样，*“吃饭、睡觉、测试、重复。”* 也就是说，测试 Creditcoin 和提高质量是一个迭代过程，随着新领域和风险的发现，这个过程不断自我强化。\n\
  \n这也意味着，测试区块链实现与开发紧密耦合，通过将测试工程师直接嵌入开发团队，你可以获得最大的成果。考虑到已经提到的所有约束条件，我认为不可能有其他方式。\n\
  \n关于测试的好消息是，尽管 Creditcoin 区块链用于记录有关现实世界金融资产的信息，但它并不直接处理此类资产。贷款和还款转账由其各自方在单独的区块链上发起，这意味着你不直接处理转账，而只检查和记录关于它们的信息。这大大降低了任何金融服务应用中存在的相关风险。\n\
  \n可能发生的最坏情况是完全服务中断和 100% 的数据丢失。从业务和工程的角度来看，这仍然是一个噩梦般的场景，但比损失数百万真实金融资产的风险小得多。为了便于讨论，人们可以通过在热备份上增加冗余服务能力、制定良好的备份和灾难恢复程序、以及制定在发生最坏情况时的应急计划，来规避此类技术风险。\n\
  \n### 总结\n\n既然我已经介绍了 Creditcoin 的历史及其目标，那么让我们进入测试环节！在接下来的几章中，我将讨论我在 Creditcoin 实现的各个主要版本期间所做的工作。\n\
  \n脚注 1   2   3\n\n# 第三部分 测试 Creditcoin 区块链\n\n\n\n# 4. 信用币 1.0 版\n\n这是信用币的第一个实现版本，采用超级账本锯齿湖开发框架，初始版本为\
  \ 1.0.5，后来切换到框架的 1.2 版本。信用币 1.x 是一个工作量证明区块链。一个重要的补充说明是，锯齿湖本身最初是用 Python 编写的，在后来的版本中，其某些组件被用\
  \ Rust 重写。一个锯齿湖节点代表多个组件的集合，如图 4-1 所示。\n\n![](img/629923_1_En_4_Fig1_HTML.jpg)\n\n\
  图 4-1\n\n多个参与网络的锯齿湖节点示意图 许可协议：[知识共享署名 4.0 国际许可协议](http://creativecommons.org/licenses/by/4.0/)；参见[`https://github.com/hyperledger/sawtooth-docs/tree/main#license`](https://github.com/hyperledger/sawtooth-docs/tree/main#license)\
  \ 来源：[`https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/docs/1.2/app_developers_guide/creating_sawtooth_network.md`](https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/docs/1.2/app_developers_guide/creating_sawtooth_network.md)\
  \ [`https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/images/1.2/appdev-environment-multi-node.svg`](https://github.com/hyperledger-archives/sawtooth-docs-archive/blob/main/images/1.2/appdev-environment-multi-node.svg)\n\
  \n使用超级账本锯齿湖实现的区块链包含多个相互连接的节点。在信用币的锯齿湖架构中，上述每个组件都作为独立程序实现，并以容器镜像形式分发。单个信用币节点是一组一起运行的容器集合，例如，在测试期间通过`docker-compose`启动。\n\
  \n## 信用币 1.0 版的组件\n\n以下是信用币 1.0 版高层级组件的列表。请务必记住，这些组件彼此完全独立，以独立容器形式分发，并通过多种网络协议相互通信以及与其他信用币节点通信！每个组件可能都有自己的子组件！\n\
  \n#### 客户端\n\n`ccclient`是一个命令行程序，允许用户与信用币区块链交互，方法是注册其以太坊地址、收集一些初始 CTC 代币，然后作为贷款人、借款人或收款人参与贷款周期。该程序不仅允许用户向区块链发送特定交易，还允许他们执行某些查询。例如，以下是一些命令的示例：\n\
  \n```\nlist Transfers\nlist AskOrders\nlist BidOrders\nlist Offers\nshow Balance\
  \ sighash|0\nshow Address sighash|0 blockchain address network\nshow MatchingOrders\
  \ sighash|0\nshow CurrentOffers sighash|0\nshow CreditHistory sighash|0\nshow NewDeals\
  \ sighash|0\nshow Transfer sighash|0 dealOrderId\nshow CurrentLoans sighash|0\n\
  creditcoin SendFunds amount sighash\ncreditcoin RegisterAddress blockchain address\
  \ network\ncreditcoin RegisterTransfer gain transferId txId\ncreditcoin AddAskOrder\
  \ addressId amount interest maturity fee expiration\ncreditcoin AddBidOrder addressId\
  \ amount interest maturity fee expiration\ncreditcoin AddOffer askOrderId bidOrderId\
  \ expiration\ncreditcoin AddDealOrder offerId expiration\nbitcoin RegisterTransfer\
  \ gain dealOrderId|repaymentOrderId sourceTxId\nethereum RegisterTransfer gain dealOrderId|repaymentOrderId\n\
  erc20 RegisterTransfer gain dealOrderId|repaymentOrderId\n```\n\n此应用程序从 json 文件读取配置，然后与锯齿湖网络图中单个节点的\
  \ REST API 端点进行通信。它可以是任何节点，但通常是信用币的公开访问 URL，或您自己运行的节点。此组件使用 C# .NET 编写。\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-client`](https://github.com/gluwa/creditcoin-legacy-client)\n\
  \n#### 验证器\n\n在锯齿湖框架中，验证器组件确保相同的交易将产生相同的状态转换，并且对于网络中的所有参与者，最终的数据是相同的。验证器有两个主要的子组件，它们使用调度器基于交易处理来计算状态变化和由此产生的默克尔哈希。这些子组件负责创建新的候选区块、完成已发布的区块以及验证提议的区块，以确定它们是否应被考虑作为新的链头。尽管名称相同，但请不要将其与信用币\
  \ 2.0 及更高版本范围内定义的验证器混淆。\n\n虽然共识接口负责确定谁可以发布区块、发布的区块是否符合共识规则，以及在分叉情况下哪个区块应成为链头，但实际发布区块的是验证器组件。\n\
  \n信用币 1.x 中的验证器组件基于`hyperledger/sawtooth-validator:1.0`容器镜像，该镜像使用 Python 实现。为信用币部署的容器镜像是自定义构建版本，带有热修复补丁，覆盖了与工作量证明相关的原始\
  \ Python 文件！\n\n请注意，在信用币 1.x 生命周期末期，曾尝试切换到`hyperledger/sawtooth-validator:1.2`，该版本本身使用\
  \ Rust 实现，信用币团队贡献了一些补丁。由于书中将进一步讨论的原因，这次切换很短暂。\n\n另一个重要说明是，此组件仍然属于一个较旧的单一代码仓库，而其他一些组件已被转换为独立的\
  \ git 仓库！这种结构反映了工程团队的成长以及同时进行的 git 仓库整体重组。\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy/tree/dev/PoW`](https://github.com/gluwa/creditcoin-legacy/tree/dev/PoW)\n\
  \n#### 共识\n\n信用币 1.x 使用一个工作量证明共识引擎，该引擎由团队开发，并通过锯齿湖的内部互连协议直接连接到验证器组件。它使用 Rust 编程语言实现。由于\
  \ git 历史记录不早于我加入信用币团队的时间，我不完全确定这个共识实现是否从一开始就存在，还是取代了之前存在的另一个实现。\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-consensus-rust`](https://github.com/gluwa/creditcoin-legacy-consensus-rust)\n\
  \n\n\n#### 交易处理器\n\n在 Hyperledger Sawtooth 框架的架构中，交易事务通过一个可扩展的系统（称为交易族）来定义。每个应用程序为其独特需求定义自定义交易族；这是区块链应用的业务逻辑。对于\
  \ Creditcoin 而言，这包括如何建模贷款周期并将其工件记录到区块链上。\n\nSawtooth 框架允许应用开发者使用他们选择的编程语言编写交易处理器。有效的交易族集合最初在创世块中配置，并作为链上值保存，后续可以进行更改。Creditcoin\
  \ 1.x 使用两个独立的交易处理器，它们作为节点的一部分以独立容器的形式运行。\n\n`Settings-tp` 最初源自 `hyperledger/sawtooth-settings-tp:1.0`（Python），后来升级为\
  \ `hyperledger/sawtooth-settings-tp:1.2`（Rust）。此交易处理器负责存储链上设置，例如网关 URL（见下文）、有效的交易族及其版本、共识算法及其属性等。它作为一个键值对存储在区块链上，并且还可以定义供其他组件使用的自定义设置。\n\
  \n`CREDITCOIN` 交易族处理器理解贷款周期的概念。其版本自 1.1 以来，依次经历了 1.1、1.2、1.3 乃至 1.8 的演进。客户端发送的每个交易都包含一个版本号，并且可以被拥有兼容版本号的交易处理器所理解。换言之，这就是协议升级的方式。`CREDITCOIN`\
  \ 族处理器使用 Protocol Buffers 数据格式解析原始交易负载，并在将交易交给验证器组件写入链之前执行一些维护任务，例如关闭过期的贷款请求。\n\n\
  Creditcoin 交易处理器版本 1.0 到 1.7 最初使用 C++ 实现，并一直使用到 2021 年中旬我开始处理 Creditcoin 时。\n\n\
  源代码：[`https://github.com/gluwa/creditcoin-legacy/tree/dev/ccprocessor`](https://github.com/gluwa/creditcoin-legacy/tree/dev/ccprocessor)\n\
  \n大约在同一时间，Creditcoin 交易处理器使用 Rust 完全重写，并向后兼容支持 1.0 到 1.7 族，这也是我主要使用的版本。这个新实现旨在作为之前提到的切换到\
  \ Sawtooth 1.2 的一部分进行部署。请注意，尽管版本号格式看起来像兼容的 SemVer 数字，但同一交易处理器族的不同版本可能彼此不兼容。这意味着使用旧版本的区块链运营商可能无法处理来自新客户端的事务，他们应该进行升级。例如，这可能是由于后续版本中添加了新的事务，如果由旧版交易处理器执行，则会失败。\n\
  \n最后一个支持的事务族版本是 1.8！\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-processor-rust`](https://github.com/gluwa/creditcoin-legacy-processor-rust)\n\
  \n#### REST API\n\nSawtooth 框架提供了一个 REST API，允许客户端和外部应用使用常见的 HTTP/JSON 协议与区块链交互。它提供了一个与语言无关的接口，用于提交事务和读取区块。特别地，这对于在测试期间使用\
  \ `curl` 或你偏好的编程语言的库来查询区块信息非常有用。所有响应均采用 JSON 格式。\n\nREST API 是构建在 Sawtooth 内部 ZeroMQ/Protobuf\
  \ 通信层之上的轻量级层。如果愿意，客户端可以完全绕过 REST API 接口，直接使用 ZeroMQ/Protobuf 与区块链通信。\n\nCreditcoin\
  \ 中使用的 REST API 组件是 `hyperledger/sawtooth-rest-api` 的一个分支，并在其基础上进行了微小的外观修补。据我所知，使用自定义容器是因为原始\
  \ `sawtooth-core` 仓库是一个单体仓库，而非其他原因。\n\n源代码：[`https://github.com/gluwa/sawtooth-legacy-core/tree/dev/rest_api`](https://github.com/gluwa/sawtooth-legacy-core/tree/dev/rest_api)\n\
  \n#### 网关\n\n网关组件促进与外部区块链的通信，以验证加密代币的转移。这就是后续版本中所谓的“链下工作者”组件。也就是说，它会确保当 Creditcoin\
  \ 记录贷款人与借款人之间的贷款事务时，双方之间有相应的、相同金额的转移被记录在外部区块链（如以太坊）上。\n\nCreditcoin 网关监听一个网络套接字，接收以下形式的请求：\n\
  \n```\n verify      \n```\n\n网关与 `CREDITCOIN` 交易处理器之间的通信协议是 ZeroMQ，而网关与区块链 RPC 端点之间的通信则依赖目标链，使用\
  \ `Nethereum` 或 `NBitcoin` 库实现。\n\n此组件使用 C# .NET 实现，并异步并行处理所有请求。网关实现了比特币、ERC20、以太坊和\
  \ Ethless 插件，其愿景是未来可以支持其他区块链网络。据我所知，只有以太坊经过了测试并在生产环境中得到正式支持！\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-gateway`](https://github.com/gluwa/creditcoin-legacy-gateway)\n\
  \n#### SDK\n\n`Sawtooth-SDK-Rust` 和 `Sawtooth-SDK-Cxx` 是其各自上游仓库的分支，用于开发 Creditcoin\
  \ 交易族处理器。它们包含许多与 Creditcoin 相关的补丁。\n\n源代码：[`https://github.com/gluwa/sawtooth-legacy-sdk-rust`](https://github.com/gluwa/sawtooth-legacy-sdk-rust)\
  \ [`https://github.com/gluwa/sawtooth-legacy-sdk-cxx`](https://github.com/gluwa/sawtooth-legacy-sdk-cxx)\n\
  \n`Creditcoin-Shared` 是一个 C# 库，被一些使用该编程语言编写的组件使用，例如网关组件。\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-shared`](https://github.com/gluwa/creditcoin-legacy-shared)\n\
  \n请注意，在过渡到 Creditcoin 2.0 之后，所有与 1.x 相关的仓库都已重命名，其名称中包含 `-legacy-` 模式。我们曾经称之为 *processor*\
  \ 的组件现在变成了 `creditcoin-legacy-processor-rust`！在本书的其余部分，我将使用当前名称来指代各个组件，以最大程度地减少混淆。\n\
  \n#### Creditcoin-Legacy-Tests\n\n这是 1.x 发布系列的主要测试套件。它是一个集成类型的测试套件，通过 RPC 端点向区块链发送事务。它由外部触发和执行，并存在于一个独立的\
  \ git 仓库中。不幸的是，该源代码仓库不可公开获取，因此我们在本书中不会过多讨论它。\n\n这个仓库中的大部分基础工作在我开始研究时已经存在，我添加了一些改进和新的测试场景，但没有改变测试套件本身的整体架构。相同的代码库还被用作创建性能基准测试工具的起点。这个测试套件主要使用\
  \ C# .NET 编写，最初使用 `MSTest`，后来改用 `NUnit` 测试框架。\n\n\n\n#### Creditcoin-Legacy-Docker-Compose\n\
  \n用于 `Creditcoin v1.x` 主网的 `Docker Compose` 文件。该仓库是 `Creditcoin 1.x` 各组件的各种 Docker\
  \ 镜像的规范参考，也是如何启动必要组件以成为网络参与者的配置示例。它也是创建用于测试目的配置的起点。\n\n源代码：[`https://github.com/gluwa/creditcoin-legacy-docker-compose`](https://github.com/gluwa/creditcoin-legacy-docker-compose)\n\
  \n#### Creditcoin-Legacy-Docker-Compose-Testnet\n\n这是后文讨论的用于测试的仓库。它包含用于部署隔离测试环境的配置文件和对\
  \ Docker 镜像的引用。\n\n后来，社区成员也监控此仓库，以获取测试即将发布的 `Creditcoin 1.8` 版本所需的最新容器版本信息！\n\n\
  源代码：[`https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet`](https://github.com/gluwa/creditcoin-legacy-docker-compose-testnet)\n\
  \n### Creditcoin 1.x 时间线\n\n根据 `GitHub` 和 `Docker Hub` 上的公开历史记录，我可以梳理出以下时间线。此处主要是为了提供背景参考。\n\
  \n1.  我于 `2021 年 6 月 17 日` 开始与 `Creditcoin` 团队合作。\n2.  我的第一个拉取请求似乎是在 `2021 年 7 月\
  \ 13 日`。\n3.  `Creditcoin 1.7.1` 于 `2021 年 7 月 23 日` 发布，我并未参与其中。\n4.  基于 `Sawtooth`\
  \ 框架的 `Creditcoin 1.8` 容器镜像于 `2022 年 3 月 28 日` 作为 `1.x` 网络的最后一个版本发布到 `Docker Hub`。\n\
  \n实际上，我对 `1.x` 系列的最后一个更新进行了测试，耗时大约 6 个月，因此如果信息不完整，还请见谅。后续章节会提供更多时间戳信息。\n\n### 测试\
  \ Creditcoin 1.x\n\n当谈到 `Creditcoin 1.x`，特别是测试以及普遍改进团队工作以提高软件质量的话题时，我们必须考虑其所处的时期。在我看来，测试与流程和组织变革相结合是不可避免的。\n\
  \n这里关注的时间段大致是 2021 年，在此期间团队开始在 `GitHub` 上为每个组件使用独立的公共仓库。这也是团队过渡到与一名全职 `QA` 工程师（即我本人）直接合作，并嵌入团队的时期。\n\
