  ## 前言


  本书以第一人称视角，讲述了 Creditcoin 区块链在四个不同实现版本及众多技术中的质量工程之旅。书中讨论了使用 Hyperledger Sawtooth
  和 Substrate 区块链框架进行的测试实现、从工作量证明到权益证明共识算法的测试转换，以及以太坊虚拟机兼容层的测试。


  读者将经历数年快节奏的区块链实现和技术变革，内容涵盖所有被测试主要组件的解释、所采用的方法（包括测试自动化和工具的示例）、有趣的错误以及测试挑战。各章节将跟随
  Creditcoin 区块链的每一次重大实现，最后以对其他从事不同区块链相关产品测试工作的测试者的几次访谈作为结束。


  本书讨论的内容几乎 99%都是开源的，书中多处引用了源代码和 GitHub 的链接。


  本书面向软件测试人员和质量工程人员。他们可能即将需要参与区块链实现项目，但目前尚不具备必要的理解，不清楚区块链是什么、如何工作，以及在“保障”质量方面哪些是重要的。


  **目标读者：**


  *   软件测试员

  *   测试自动化方向的软件开发人员

  *   质量保证工程师

  *   质量保证经理


  **你将学到：**


  1.  区块链的关键组件（附有部分图表）

  2.  流行的区块链和加密货币术语表

  3.  使用 Hyperledger Sawtooth 框架实现区块链的概述

  4.  使用 Substrate 框架实现区块链的概述

  5.  与测试工作量证明、权益证明和基于 EVM 的区块链相关的实践主题


