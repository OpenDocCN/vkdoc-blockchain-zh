  \ Helium 节点连接到 Helium P2P 网络所必需的代码。为此，我们为每个挖矿节点构建了一个 JSON-RPC 服务器和一个 JSON-RPC 客户端接口。我们还创建了一个目录服务器（或称种子节点）。我们的接口代码允许挖矿节点执行以下操作：\n\
  \n1.  从目录服务器获取其他节点的地址。\n2.  从网络接收交易并进一步传播。\n3.  接收网络中传播的区块并进一步传播。\n4.  获取节点区块链的高度。\n\
  5.  请求节点发送特定区块。\n6.  清除主区块链和备用区块链。\n\n在下一章中，我们将探讨将区块链序列化到磁盘的问题。我们还将展示节点如何从已序列化的区块链中重建其整个区块链环境（包括数据库）。\n\
  \n脚注 1 2 3 4 5 6 7\n\n# 16. 区块链维护\n\n在本章中，我们将探讨 Helium 区块链的维护。将讨论以下主题：\n\n1.  一个拥有空区块链的新\
  \ Helium 节点如何从 Helium 网络获取区块，并与分布式区块链保持同步。当节点离线或出现临时网络分区时，此获取区块的流程也同样适用。\n2.  重建\
  \ `Chainstate` 数据库。\n3.  重建 `blk_index` 数据库。\n\n## 区块链维护\n\n加入 Helium 对等网络的新节点需要获取区块链。此外，如果节点离线或出现临时网络分区，其持有的区块链可能需要同步。\n\
  \nHelium 网络接口提供了两个远程过程调用来处理这些用例：\n\n```\nget_blockchain_height() -> \"integer\"\n\
  get_block(block_no: \"int\") ->  \"stringified block or an error string\"\n```\n\
  \n`get_blockchain_height()` 用于获取远程节点持有的区块链高度。调用 `get_block()` 用于从远程节点获取特定区块。这两个远程过程调用在上一章中已讨论过。\n\
  \n我将留待您自行开发用于获取区块的测试。在生产环境中，为了提升性能，您可能希望增强代码以实现从多个远程节点同时并发下载区块。\n\n## Helium 的可靠性工程\n\
  \n管理金融交易的应用程序必须具有极高的可靠性。基本原则是，应用程序应尽可能采用最简的架构模式来实现其目标。\n\n在上一章中，我们了解到 Helium 的分布式对等架构创建了一个不易被降级（性能下降）的网络架构。生态系统中的所有节点能力均等，任何人都可以实例化一个节点并加入\
  \ Helium 网络。此外，比特币和 Helium 对硬件要求非常低，因此可以在廉价的普通硬件上运行。在笔记本电脑上运行 Helium 或比特币节点是完全可行的。\n\
  \n此外，我们在上一节中看到，如果节点离线或发生意外的网络分区，Helium 节点始终可以将其区块链与分布式区块链同步。\n\n除了这些可靠性特性之外，Helium\
  \ 和比特币还实现了一种单一故障点架构。这个故障点就是区块文件，它是一种简单的、编码后的文本文件。区块链就是这些文件的集合。\n\nHelium 节点可以从区块链（即区块文件的集合）重建其运行所需的所有数据结构和数据库。Helium\
  \ 使用两个键值存储：`Chainstate` 数据库和 `blk_index` 数据库，并通过设计确保这些数据库不是关键故障点。换句话说，只要拥有所有区块文件，Helium\
  \ 始终可以重建这些数据库。\n\nHelium 区块是编码后的、只读的文本文件。由于区块链是一种不可变的结构，因此不需要也不支持更新或删除区块文件。创建和读取操作由底层操作系统处理。以下来自\
  \ `hblockchain` 模块的代码片段展示了 Helium 中如何实现区块持久化：\n\n```\ndef add_block(block: \"dictionary\"\
  ) -> \"bool\":\n\"\"\"\nadd_block: adds a block to the blockchain. Receives a block.\
  \ The block\nattributes are checked for validity and each transaction in the block\
  \ is\ntested for validity. If there are no errors, the block is written to a file\n\
  as asequence of raw bytes. Then the block is added to the blockchain.\nThe chainstate\
  \ database and the blk_index databases are updated.\nreturns True if the block is\
  \ added to the blockchain and False otherwise\n\"\"\"\ntry:\n### validate the received\
  \ block parameters\nif validate_block(block) == False:\nraise(ValueError(\"block\
  \ validation error\"))\n### validate the transactions in the block\n### update the\
  \ chainstate database\nfor trx in block['tx']:\n### first transaction in the block\
  \ is a coinbase transaction\nif block[\"height\"] == 0 or block['tx'][0] == trx:\
  \ zero_inputs = True\nelse: zero_inputs = False\nif tx.validate_transaction(trx,\
  \ zero_inputs) == False:\nraise(ValueError(\"transaction validation error\"))\n\
  if hchaindb.transaction_update(trx) == False:\nraise(ValueError(\"chainstate update\
  \ transaction error\"))\n### serialize the block to a file\nif (serialize_block(block)\
  \ == False):\nraise(ValueError(\"serialize block error\"))\n### add the block to\
  \ the blockchain in memory\nblockchain.append(block)\n### update the blk_index\n\
  for transaction in block['tx']:\nblockindex.put_index(transaction[\"transactionid\"\
  ], block[\"height\"])\nexcept Exception as err:\nprint(str(err))\nlogging.debug('add_block:\
  \ exception: ' + str(err))\nreturn False\nreturn True\ndef serialize_block(block:\
  \ \"dictionary\") -> \"bool\":\n\"\"\"\nserialize_block: serializes a block to a\
  \ file using pickle.\nReturns True if the block is serialized and False otherwise.\n\
  \"\"\"\nindex = len(blockchain)\nfilename = \"block_\" + str(index) + \".dat\"\n\
  ### create the block file and serialize the block\ntry:\nf = open(filename, 'wb')\n\
  pickle.dump(block, f)\nexcept Exception as error:\nlogging.debug(\"Exception: %s:\
  \ %s\", \"serialize_block\", error)\nf.close()\nreturn False\nf.close()\nreturn\
  \ True\n```\n\n一旦区块经过验证，它就会被持久化到特定目录。^((67)) 您希望将区块写入 `data` 目录。函数 `serialize_block()`\
