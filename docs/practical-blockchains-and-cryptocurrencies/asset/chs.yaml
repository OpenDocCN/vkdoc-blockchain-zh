  \ P2PKH 脚本。\n15. 对前一笔交易 ID 的引用有效。\n16. 花费的总值小于或等于可花费总值。\n17. 花费值大于零。\n18. `vin`数组中的索引值引用了前一笔交易`vout`数组中的有效元素。\n\
  19. 交易输入可被花费。\n\n#### `validate_vin()`\n\n```python\ndef validate_vin(vin_element:\
  \ \"dictionary\") -> \"bool\":\n```\n\n测试`vin`元素是否具有有效值。如果`vin`有效则返回`True`，否则返回`False`。\n\
  \n#### `validate_vout()`\n\n```python\ndef validate_vout(vout_element: \"dictionary\"\
  ) -> \"bool\":\n```\n\n测试`vout`元素是否具有有效值。如果`vout`有效则返回`True`，否则返回`False`。\n\n####\
  \ `prevtx_value()`\n\n```python\ndef prevtx_value(txkey: \"string\") -> 'bool':\n\
  ```\n\n检查链状态数据库并返回交易片段：\n\n```json\n{\n\"pkkhash\":  ,\n\"value\":    ,\n\"spent\"\
  :    ,\n\"tx_chain\": \n}\n```\n\n接收一个交易片段键：`\"previous txid\" + \"_\" + str(prevtx_vout_index)`。\n\
  - 如果交易不存在、值已被花费或值不是正整数，则返回`False`。\n- 否则返回前一笔交易片段数据。\n\n#### `transaction_fee()`\n\
  \n```python\ndef transaction_fee(trans: 'dictionary', value_list: 'list' ) -> 'integer\
  \ or bool':\n```\n\n计算交易的手续费。接收一笔交易和一个链状态交易片段列表。\n- 返回交易手续费（以 helium_cents 为单位）或如果出错则返回`False`。\n\
