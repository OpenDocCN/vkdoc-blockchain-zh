  ```\n\n\n  \n## 结论  \n\n在本章中，我们基于区块链构建了一个基本的命令行钱包。该钱包实现了钱包所需的所有核心功能。可以通过加密用于持久化钱包状态的磁盘文件、将钱包包装在图形用户界面中以及提供其他便利功能来美化钱包。\
  \  \n\n在下一章（也是最后一章）中，我们将回到为 Helium 网络创建测试网络的问题。  \n\n# 18. Helium 测试网  \n\n在这简短的最后章节中，我们将简要讨论与测试\
  \ Helium 点对点网络相关的两个问题：  \n\n1. 在互联网上实现 Helium 测试网络  \n2. Helium 水龙头  \n\n## 实现 Helium\
  \ 测试网  \n\n在第 15 章中，我们在本地主机网络上实现了一个 Helium 点对点网络。在此实现中，网络节点监听回环地址（`127.0.0.x`）。在\
  \ `networknode.py` 文件中启用此功能的代码相关部分如下：  \n\n```  \n######################################################\
  \  \n### start the network interface for the server node on  \n### the localhost\
  \ loop: 127.0.0.19:8081  \n#####################################################\
  \  \nif __name__ == \"__main__\":  \n    app.listen(address=\"127.0.0.19\", port=\"\
  8081\")  \n    logging.debug('server node is running')  \n    print(\"network node\
  \ starting at 127.0.0.19:8081\")  \n```  \n\n我们可以轻松更改此实现，使节点监听可路由的互联网地址。每个网络节点编辑其\
  \ `networknode.py` 文件，将 `app.listen` 函数的 `address` 参数替换为自己拥有的唯一可路由 IP 地址。  \n\n\
  这一简单的调整使我们能够在互联网上搭建一个 Helium 测试网，该网络监听某个指定的公共端口。  \n\n## 实现 Helium 水龙头  \n\n一旦我们在互联网上搭建了\
  \ Helium 测试网，就需要为网络节点提供 Helium 加密货币，以便它们能够在网络上创建并传播测试交易。这可以通过创建 Helium 水龙头来实现。水龙头是一个网络节点，它：\
  \  \n\n1. 创建一对私钥-公钥  \n2. 创建并传播一笔交易，将固定数量的 Helium 币转移给所创建密钥对的所有者  \n\n水龙头的工作方式如下：请求者通过\
  \ JSON 远程过程调用向水龙头 JSON-RPC 服务器请求一些免费的 Helium 币。水龙头生成一对私钥-公钥，并将其发送回请求者。随后，水龙头创建一笔类似\
  \ coinbase 的交易，通过提供给请求者的密钥对将固定数量的 Helium 币转移给请求者。最后，水龙头在 Helium 网络上传播此交易。最终，这笔交易将被添加到一个区块中，该区块将被挖出。挖出后，请求者便拥有水龙头创建的、可供使用的\
  \ Helium 币。  \n\n我们也可以将水龙头实现为一项网络服务。访问水龙头网站的访客会获得一对私钥-公钥。该网站随后调用 JSON-RPC 水龙头服务器，该服务器创建并传播一笔使用提供给网站访客的密钥对的\
  \ Helium 交易。  \n\n## 结论  \n\n如果你读到了这里，那么恭喜你。你已经到达了本书的终点。我们从区块链和加密货币的密码学基础出发，一路构建了交易、区块链、挖矿节点和加密货币网络，完成了一段漫长的旅程。在此过程中，我们学习了该领域运行的关键算法。现在，你应该有能力自信地使用你选择的语言来设计和编程区块链及加密货币应用程序。\
