- "# 1. 货币简史\n\n我们将深入探讨加密货币和区块链应用。最具代表性的区块链应用是比特币，它是世界上第一种加密货币。因此，回顾货币的历史，看看比特币如何彻底改变了货币创造和分配的范式，是再合适不过的了。在本章中，我将呈现一段从新石器时代到当代的、带有个人见解的货币史，并特别突出货币演变过程中的里程碑事件。本章将以对比特币及其与传统货币差异的简要概述作为结尾。\n\
  \n## 新石器时代\n\n人类最早的互动形式之一是商品交换。例如，一笔交易可能涉及用 100 个鸡蛋换一条毯子，或者用一把石斧换 35 只母鸡。这类交易被称为物物交换，涉及两个交易方之间交换商品。当一个物体或商品具有效用（有用性）和稀缺性时，它就获得了价值。装饰品因其美丽以及熟练工匠需要付出巨大努力来制作而获得价值。付出大量技能和努力使得装饰品变得稀缺。\n\
  \n物物交换存在一个根本性问题；它是一种低效的价值交换方式。例如，如果你有一把斧头想要换一些母鸡，那么你必须找到一个既有母鸡可交易又想要斧头的人。可以想象，可能没有任何人满足这个条件，在这种情况下，价值交换就无法完成。此外，即使存在这样的人，还存在确定汇率的问题，也就是应该用多少只母鸡来换这把斧头。这取决于斧头的大小和品质以及母鸡的品质。最后，还有可分割性问题。例如，可能有一个人想要一把斧头，但只有\
  \ 12 只母鸡可以用来交换。最后，物物交换的商品通常不具有可互换性。如果一个东西与同类型的任何其他东西无法区分，那么它就是可互换的。正如这些例子所示，物物交换是一种非常低效的交易方式。\n\
  \n需要是发明之母，因此，物物交换的低效性产生了创造高效交换媒介的需求。大约 3000 到 4000 年前的新石器时代，中国首次出现了以硬币形式出现的货币。货币可以被视为代表一定数量价值的物品。例如，刻有斧头图案的金属硬币可以象征性地代表一把斧头的交换价值。任何形式的货币的有效性都取决于它被接受为价值的象征性代表。这种接受要求货币成为价值储藏手段。也就是说，如果今天刻有斧头图案的硬币可以换\
  \ 35 只母鸡，那么 90 天后它也应该能换 35 只母鸡。到公元前 700 年，硬币的使用已从中国传播到印度次大陆。\n\n大约在公元前 210 年，中国第一位皇帝秦始皇引入了以铜为基础的标准化硬币，作为第一个中华帝国的官方货币，并废除了当地使用的其他形式的货币。这是一项英明的政策，因为它通过促进整个帝国范围内的贸易而统一了帝国。这反过来又导致了帝国经济的加速增长和繁荣。那是中国的黄金时代。由于铜相对丰富，这些铜币的价值很低。帝国国库保证这些硬币可以按固定汇率兑换成有价值的实用物品，这一事实巩固了这些硬币的接受度。这种硬币的引入具备了我们现在通常与货币相关联的所有特征；它们被接受为交换媒介和价值储藏手段，并且这些硬币是可互换的。\n\
  \n\n\n## 银行与纸币的诞生\n\n公元七世纪，中国出现了不记名本票，并迅速得到广泛应用。不记名本票是一种凭证，其签发人承诺凭票即付或于未来某个固定日期，向持票人支付一定数量的货币或商品。由于本票体现了对持票人的支付承诺，持有者经常将其背书转让给他人。因此，这些票据开始像现代纸币一样流通。显然，不记名本票的接受度和可转让性取决于签发人的信誉。当时必定有信誉卓著、极其富有的商人，其本票能被公众当作货币接受。本票使用的迅速扩张促使唐朝设立了一个国库，负责发行以帝国财富与威望为担保的本票。这就是古代世界纸币的首次出现。大约在同一时期，不记名本票也在印度问世。\n\
  \n## 哈瓦拉体系\n\n即期本票在印度次大陆的出现带来了一项重大创新。此前，价值交换需要交易双方在交易完成的时刻同时在场。哈瓦拉（在印度称为`Hundi`）则消除了参与者必须在场才能完成交易的需求。换言之，价值可以在相距遥远的双方之间进行交换。哈瓦拉被认为在从中国延伸至威尼斯的古代丝绸之路的发展中发挥了关键作用。\n\
  \n哈瓦拉的运作方式如下：交易方将价值（例如一些硬币或一张即期本票）交给一个被称为“哈瓦拉达”的人，并指令他向某个遥远城市的人支付这笔价值。该“哈瓦拉达”联系该遥远城市的另一位“哈瓦拉达”，并指令他向指定的收款人付款。在月末或其它约定的结算日，两位“哈瓦拉达”之间进行账目清算。请注意，给第二位“哈瓦拉达”的指令并未伴随价值的转让。实际上，如果在结算日两位“哈瓦拉达”彼此欠款金额相等，那么他们在进行\
  \ *内部* 账目清算时，不会有任何价值转移。\n\n如果收款人居住在一个非常遥远的城市，交易中可能涉及多位“哈瓦拉达”，他们之间会定期进行账目清算。\n\n\
  哈瓦拉有几个值得注意的特点。首先，它建立在信任链条之上。其次，价值可以在遥远地区的交易者之间转移，而参与其中的“哈瓦拉达”之间无需实际转移任何货币。例如，如果在某个结算期内，北京的商人通过一位“哈瓦拉达”向上海的商人订购了价值一百万“半两”的货物，而上海的商人通过另一位“哈瓦拉达”向北京的商人订购了价值九十万“半两”的货物，那么北京的那位“哈瓦拉达”在结算日只需向上海的“哈瓦拉达”转账十万“半两”即可。哈瓦拉最后一个值得注意的特点是，它在很大程度上绕开了现代商业银行体系。\n\
  \n## 罗马帝国与通胀的起源\n\n从罗马帝国的货币史中，我们可以汲取一个独一无二的教训。这个教训就是铸币成色不足如何引发恶性通货膨胀。还有一个次要教训：一个过度扩张的帝国如何被迫贬值其货币，从而成为自身毁灭的工具。\n\
  \n罗马硬币由多种金属制成，包括银、铅、铁和铜。帝国的标准硬币是`第纳尔`。`第纳尔`是一枚重 4.5 克的硬币，几乎完全由银制成，这意味着其银纯度至少为 95%。白银在罗马帝国是一种相对稀有的金属，开采需要付出相当大的努力。`第纳尔`巩固了整个庞大罗马帝国的贸易，并因其成色纯正以及罗马帝国的实力和威望而被广泛接受和流通。`第纳尔`不仅是促进贸易的优良硬币，也被视为绝佳的价值贮藏手段。\n\
  \n然而，维持不断扩张的罗马帝国是一项非常昂贵的任务。罗马国库面临着诸多成本负担。例如，为了连接帝国，修建了近 5 万英里的道路，建造了无数引水渠和公共工程，罗马军团需要支付高额军饷，罗马城人口超过一百万，城市的维护也对罗马国库造成了巨大消耗。最后，还要结算与印度等遥远国家的贸易账户。据估计，罗马与印度之间的贸易每年涉及约\
  \ 200 艘船只。\n\n罗马国库面临的问题是，仅靠税收和掠夺被征服领土，无法维持帝国的开销。罗马没有用于为政府赤字和债务融资的金融机构或机制。因此，只有三种方式可以为政府支出融资：提高税收水平、增加白银供应量，或降低`第纳尔`的成色。罗马帝国本身只有少数几个银矿，因此白银产量很难轻易增加。增税又不可行，于是罗马皇帝们开始降低`第纳尔`的成色。普遍认为，因贸易逆差导致白银从罗马流向印度，是`第纳尔`成色下降的主要原因之一。在尤利乌斯·凯撒时代，`第纳尔`的银纯度仅为\
  \ 75%，而到了公元三世纪，其纯度已降至约 5%。这种成色降低带来了灾难性后果，并在帝国内引发了恶性通货膨胀。随着交易者对`第纳尔`失去信心，贸易崩溃。罗马雇佣的商人和外国雇佣兵只要求以黄金支付。随着`第纳尔`变成一文不值的货币，罗马军团变得虚弱且士气低落。`第纳尔`的成色降低证明罗马无法承担维持其帝国的成本。罗马的结局是众所周知的：来自亚洲的日耳曼和匈人蛮族不断攻击帝国本身，最后一位坐在罗马王位上的皇帝是蛮族人。`第纳尔`的成色降低可以被视为帝国崩溃的主要原因之一。\n\
  \n\n\n## 黄金与新大陆的掠夺\n\n罗马的艺术、文学与思想辉煌在其覆灭后未能存续。随着宗教狂热与基督教迷信笼罩欧洲大陆，欧洲陷入了长达千年的黑暗时代。到\
  \ 16 世纪初，西班牙已殖民了新大陆的部分地区，并利用原住民作为奴隶劳工开采金矿与银矿。\n\n当时主导的经济理论被称为重商主义。重商主义的基本原则是：国家的财富由其国库中储存的黄金、白银及其他贵金属数量来衡量。这一理论除了刺激对黄金和白银的探寻之外，还导致了关税及其他限制国家间贸易流通的壁垒的设立。\n\
  \n西班牙对新大陆的入侵引发了大规模的金银开采，并将大量金银从新大陆运往欧洲。据推测，其中约 10%至 20%的金银被持有英国王室特许状的私掠船以及悬挂海盗旗的海盗所劫掠。\n\
  \n西班牙利用这些涌入的贵金属建造宏伟的大教堂、实施虚荣工程，而最为重要的是为罗马教会的利益而资助战争。来自新大陆的金银涌入，使西班牙得以维持欧洲最庞大的陆军、建立强大的海军，并资助对英格兰、法国、荷兰、德意志诸邦国、奥斯曼帝国以及被视为异教徒的非天主教徒的战争。\n\
  \n金银涌入西班牙的直接后果之一，是在欧洲引发了广泛的通货膨胀。在西班牙，据信整个 16 世纪物价上涨了 300%。西班牙当时处于原始农业经济，并未从新大陆掠夺的金银中大量受益。西班牙鄙夷商业活动，视其为有限的宗教与道德价值。因此，西班牙日益依赖贵金属的涌入来资助国王那奢华的帝国与宗教冒险事业。西班牙的国库主要依赖从新大陆掠夺的金银，结果在\
  \ 16 世纪中四次破产，分别发生在 1557 年、1560 年、1576 年和 1596 年。这些主权债务违约清楚地表明，西班牙并没有重要的税收基础。最终，西班牙丧失了其在欧洲的霸主地位，到\
  \ 1750 年时已沦为落后地区。\n\n## 金本位制\n\n随着西班牙退出世界历史舞台，英国开始崛起为欧洲的主导力量。英国是一个贸易国家，拥有庞大且成熟的商人阶层，并且重视国家间贸易的益处。此外，英格兰一直处于新教改革的前沿，信奉加尔文主义教义，即日常工作的表现具有重要的宗教价值。1776\
  \ 年，亚当·斯密撰写了《国富论》，揭示了重商主义的谬误，并论证了自由贸易可以成为一种非零和博弈，每个贸易参与者都能因比较优势理论而获益。亚当·斯密还引入了劳动分工的概念及其益处。《国富论》倡导自由市场与自由贸易的好处，标志着现代经济理论的起点。与此同时，英格兰也开始发展完善的法律合同体系以及股份制公司这一卓越创新，这使得大量风险资本得以高效筹集。股份制公司的发明启动了工业革命。从\
  \ 18 世纪末开始，英国开启了长达一个世纪的殖民扩张。\n\n1844 年，英国议会通过了《银行特许法案》，其中英格兰银行承诺按固定汇率将其纸币兑换为金币。这在不列颠帝国以及与美国、加拿大、澳大利亚及其他与英国有广泛贸易关系的国家中建立了金本位制。这也确立了英镑作为世界储备货币的地位。贸易国乐于在贸易中使用英镑并将其作为储备资产持有，因为他们确信其持有的货币可以兑换成黄金。黄金是一种供应稀缺的贵金属，而英格兰银行发行的纸币按固定比率兑换成黄金的承诺，有效地限制了英国或任何其他实行金本位制的国家随意印制纸币的能力。一个国家的货币发行量如果超过其黄金及英镑储备，就可能面临货币挤兑风险，因为投机者会将其持有的该国货币兑换成英镑或黄金。\n\
  \n第一次世界大战给英国国库带来的巨大开支，导致英国实施了外汇管制；这实际上中止了英镑与黄金的兑换。许多欧洲国家亦步亦趋，放弃了本国货币与黄金的兑换。其后果是引发了大规模的通货膨胀，因为一战的费用是通过大量印制纸币来偿还债务的。换言之，一战的成本通过增加货币供应量转嫁给了民众。这意味着欧洲民众通过通货膨胀来承担一战的开销。众所周知，通货膨胀会导致债券等固定收益资产贬值。1925\
  \ 年，英国为了维护英镑作为世界储备货币的地位而重新恢复了金本位制。但事实证明，这只是昙花一现的努力。\n\n\n\n## 大萧条与凯恩斯经济学\n\n1929\
  \ 年 9 月 4 日，华尔街股市动荡不安，大幅下挫。在随后的一个半月里，股市剧烈震荡，表明投资者和投机者之间存在巨大的不确定性。接着，在 1929 年 10\
  \ 月 29 日（黑色星期二），纽约证券交易所的道琼斯工业平均指数暴跌 20%。这标志着大萧条的开始，并使全世界陷入了持续十年的空前经济萧条。美国工业产出下降了近\
  \ 40%，贸易额暴跌约 70%，失业率攀升至总人口的 25%。\n\n对英国和欧洲的影响类似。英国因担心挤兑英镑而放弃了金本位制。当时最主要的经济问题是如何摆脱大萧条，推动世界经济复苏。存在两种截然对立的观点：美国胡佛派主张财政保守主义，认为政府需要缩减开支，以防止公共债务进一步增加。与他们对立的是伟大的英国经济学家约翰·梅纳德·凯恩斯，他在其著作\
  \ *《就业、利息和货币通论》* 中主张，应增加公共工程方面的公共支出，以提供就业机会并促进经济生产。凯恩斯经济学的基本前提是，一旦经济走出萧条，增加的公共债务将因税收收入的增加而得到偿还。这就是凯恩斯经济学的基本原则：在经济衰退和萧条期间应增加公共支出，由此产生的公共债务将在经济复苏时因税收增加而得以清偿。罗斯福总统为将美国经济拉出萧条而制定的经济计划，正是凯恩斯经济学的一次实践。\n\
  \n凯恩斯经济学隐含着一个思想：货币供应不应与保证货币可兑换成黄金或任何其他贵金属铸币的标准挂钩，也就是说，政府应根据需要自由地印钞或举债，以维持充分就业。这是一个精巧的理论，但历史反复证明，随意印钞的权力就像一种危险且极易上瘾的毒品，最终会摧毁病人。\n\
  \n## 石油美元体系\n\n二战结束时，欧洲满目疮痍，美国成为世界上唯一的经济强国。1944 年，美国与欧洲签约国共同签署了《布雷顿森林协定》，签约国同意将其货币与美元按固定汇率挂钩，而美国则同意按每盎司黄金\
  \ 35 美元的价格，赎回任何外国央行持有的美元货币。在历史的这个节点上，美国持有世界上大部分的黄金。这一协议使美元取代英镑，成为世界储备货币。布雷顿森林体系实际上也在全球范围内建立了一个以美国为担保人的金本位制。以每盎司黄金\
  \ 35 美元的价格兑换的承诺，以及美国迅速扩张的军事和工业实力，确立了美元作为促进国际贸易主要工具的地位。\n\n18 年后，随着美国卷入越南战争，问题开始显现。美国开始与其贸易伙伴出现持续的国际收支逆差。此外，财政部还必须应对越南战争带来的巨额战争开支和通货膨胀。1971\
  \ 年，英国对美元的稳定性失去信心，将其持有的绝大部分美元储备兑换成了黄金。为防止英国的行动引发对美元的挤兑，并保护美国黄金储备不被耗尽，尼克松总统暂停了美元与黄金的兑换。此举将美元转化为一种法定货币。法定货币是一种不能兑换成黄金或任何其他贵重金属的货币，其价值完全来源于使用者愿意将其用作交换媒介和价值储存手段。\n\
  \n美国财政部意识到，美元脱离了金本位制后，原则上各国没有令人信服的理由再将其用于贸易或作为国际储备货币。因此，迫使各国使用美元作为国际储备货币，而不是依赖各国继续使用法定美元的良好意愿，就显得至关重要。这正是石油美元体系要解决的问题。\n\
  \n从 1974 年开始，美国与产油国达成协议，在国际市场上仅以美元销售石油。其直接后果是，要求想要购买石油的国家必须持有充足的美元储备。这样的国家可以通过两种方式获得这些储备：要么向美国出售商品并在其外汇账户中收取美元，要么与第三国进行同样的交易。石油美元体系隐含着一个假设，即大多数在海外流通的美元永远不会流回美国——如果世界经济持续扩张，这个假设在很大程度上是成立的。由于这些美元不会回流，这实际上意味着美国可以免费从其他国家购买商品和服务（即，只需印刷美元或发行以美元计价的债务即可）。此外，由于美元不与任何黄金标准挂钩，美联储随意印钞的能力不受限制。目前，美国的联邦债务已达到约\
  \ 26 万亿美元。这是帝国过度扩张、不受约束的政府支出（主要用于军事）、无法维持经常性政府开支的薄弱税基、美元不可兑换以及石油美元体系共同作用的结果。\n\n\
  在石油美元体系之前，一种货币通过发行方保证可以按固定汇率兑换成黄金铸币，从而获得国际储备货币的地位。不希望持有该储备货币的国家可以简单地将其持有的货币储备兑换成黄金。石油美元体系则以一种强制性取代了这一点。想要购买石油的国家必须持有法定美元才能进行此类购买。\n\
  \n\n\n## 在部分准备金银行体系中赚钱\n\n纵观历史，创造货币的权力一直被视为君主特权。例如，只有罗马皇帝才有权铸造第纳尔金币。因此，你可能会感到惊讶：在现代世界，一个国家的大部分货币并非由财政部创造，而是由银行创造。这是部分准备金银行制度的产物。\n\
  \n在部分准备金银行制度下，法律要求银行必须持有一定比例的存款以应对提款需求。这被称为准备金要求。让我们看看一家假设的银行如何*凭空*创造货币。假设我们有一家名为安大略银行的银行，最初没有存款或负债，法定准备金率为\
  \ 10%。一位客户存入 100 万美元。此时安大略银行的状况如表 1-1 所示。\n\n表 1-1\n银行状况\n\n| 总存款 | $1,000,000 |\
  \ 已发放贷款 | $0 |\n| 准备金要求 | $ 100,000 | 可贷资金 | $900,000 |\n\n安大略银行向一位借款人发放了 90 万美元贷款，该借款人将贷款金额存入安大略银行。此时安大略银行的财务状况如表\
  \ 1-2 所示。\n\n表 1-2\n银行状况\n\n| 总存款 | $1,900,000 | 已发放贷款 | $900,000 |\n| 准备金要求 | $190,000\
  \ | 可贷资金 | $810,000 |\n\n请注意，银行可贷资金的计算方式为：\n\n```\n可贷资金 = 总存款 - 准备金要求 - 已发放贷款\n\
  ```\n\n安大略银行现在向一位客户发放了 81 万美元贷款，该客户又将这笔钱存入银行。此时银行的财务状况如表 1-3 所示。\n\n表 1-3\n银行状况\n\
  \n| 总存款 | $2,710,000 | 已发放贷款 | $1,710,000 |\n| 准备金要求 | $271,000 | 可贷资金 | $729,000\
  \ |\n\n请注意，在这个阶段，银行从最初的 100 万美元存款中额外创造了 171 万美元的货币（银行存款）。\n\n如果我们继续这样操作，安大略银行可以持续发放贷款（创造货币），直至达到由货币乘数决定的理论最大值：\n\
  \n```\n初始存款/准备金要求\n```\n\n这意味着，如果银行收到 100 万美元存款，它最多可以创造 1000 万美元的存款（货币），并从这些贷款中获得利息收入。\n\
  \n如果银行对客户贷款收取 6%的年利率，那么它每年最多可获得 60 万美元的利息收入。正如你所理解的，在部分准备金银行体系中拥有银行是一项利润非常丰厚的业务。\n\
  \n奥地利经济学派（弗里德里希·哈耶克、路德维希·冯·米塞斯、罗恩·保罗等）的支持者认为，部分准备金银行制度本质上不稳定，会导致经济繁荣与萧条周期循环；此外，这是一种合法化的盗窃行为，因为它赋予特权阶级凭空创造购买力（货币）的权力。\n\
  \n在货币理论中，`M1`被定义为硬币、纸币以及其他与货币流动性相当的金融工具；包括银行活期存款、旅行支票等。`M2`包括不能轻易兑换成货币的工具，如银行储蓄存款、30\
  \ 天期国库券、货币市场基金等。`M2`由那些需要较短固定时间才能兑换成`M1`实物的工具组成。\n\n因此，`M1`主要由银行活期存款构成，这就不足为奇了。\n\
  \n### 基础货币经济学\n\n让我们简要了解一下*交易方程式*，这是货币经济学中的一个基本方程式。该方程式表示如下：\n\n`MV = PT`\n\n交易方程式的计算基于一个固定时期，比如一年。`M`是货币供应量或`M1`。`V`是货币流通速度，即单位货币在固定时期内流通的平均次数。除非出现恶性通货膨胀，否则我们预计`V`只会发生微小变化。原因在于个人的支出和储蓄习惯在一段时间内相对稳定。`P`是经济中的价格水平，`T`是固定时期内经济中的交易量。`T`并非经济中交易的货币价值，而是经济中实物或实际产出的独立指数衡量指标。\n\
  \n首先需要理解的是，交易方程式是一种恒等式；它永远成立。其次，该方程式展示了经济中货币供应量、价格水平和实际产出之间的关系。例如，如果货币供应量增加，但实际产出完全没有增长，那么增加的货币供应量将完全反映在物价通胀上。同样，如果货币供应量保持不变，但实际生产增加，则会出现物价通缩，即持有`M1`将变得更加有价值。\n\
  \n\n\n## 比特币登场\n\n到 2008 年，一个多极化的国际体系正在形成。美国经济背负着近十万亿美元的债务，美元与黄金的可兑换性已成为历史注脚。美元作为国际储备货币的地位，所依据的不是兑换承诺，也不是美国的威望和软实力，而是石油美元体系的强制力以及军事力量。\n\
  \n2008 年，中本聪在密码学邮件列表*Metzdowd*上发表了白皮书《比特币：一种点对点的电子现金系统》。这篇论文为互联网上一种完全去中心化的货币奠定了理论基础。2009\
  \ 年 1 月 3 日，中本聪发布了第一个版本的比特币，并挖出了第一个比特币区块，即创世区块。此后不久，极有可能是化名的中本聪（可能代表一人或多人）就从公众视野中消失了。在本书剩余部分，我将使用首字母大写的“Bitcoin”指代比特币生态系统，而用小写的“bitcoin”指代这种加密货币本身。\n\
  \n比特币有几个关键特征，使其区别于传统的法定货币。首先，它是一种纯粹的去中心化数字货币，运行在互联网上。所谓数字，是指比特币没有像硬币或纸币那样的有形物理形态。比特币的去中心化特性是一个非常重要的特征；比特币不依赖于任何中心化的服务器或控制节点。因此，它在理论上免于被关闭的风险。比特币也是一个点对点网络，比特币网络上的交易由交易双方直接完成，无需第三方中介。这第二个因素将银行机构排除在了比特币生态系统之外。\n\
  \n在传统的法定货币体系中，银行在记录和验证交易方面扮演着关键角色。而比特币则将交易记录在一个任何实体都无法控制的分布式账本上。此外，任何人都可以查验这个账本来验证交易。在传统的法定货币银行系统中，时间在验证交易方面扮演着重要角色。交易的有效性部分取决于交易随时间的发生顺序。比特币没有时间概念，特别是，交易的有效性并不依赖于交易随时间的发生顺序。这是一项关键创新；比特币可以在不依赖时钟、不要求交易按特定时间顺序发生、也不使用任何中心化超级节点的情况下，就交易的有效性达成分布式共识。\n\
  \n在比特币生态系统中，交易仅通过加密算法和分布式共识来验证。中本聪在他的白皮书中解决了一个重要的理论问题：如何在分布式系统中达成共识？我们将花相当多的时间来研究分布式共识算法，因为它们是加密货币以及许多区块链应用的关键组成部分。\n\
  \n在传统的银行系统中，信任是系统运行的一个重要元素。你将钱存入银行或使用其服务，是因为你信任银行的诚信。而比特币基于一种“无需信任”的模型。系统中交易的验证不需要信任任何实体。\n\
  \n传统法定银行系统中的交易并非匿名。任何交易的细节，交易银行和相关当局都能获取。相比之下，比特币是一个伪匿名系统。通过使用混币器和其他工具，可以提高伪匿名的程度。或者，我们也可以使用像门罗币这样真正匿名的货币。门罗币是一种类似比特币的货币，具有强大的匿名性保证。\n\
  \n与传统银行系统相比，比特币系统中的交易是不可变的，并且无法逆转。记录比特币交易的公开账本是一个不可变的账本，任何人都可以查看。交易不可变的严苛性可以通过使用比特币中可用的托管机制来缓解。比特币托管允许在交易完成前有条件地冻结价值。\n\
  \n最后一个将比特币与法定货币系统区分开来的因素是，交易成本要低得多，而且交易可以在几分钟内完成。\n\n任何互联网上的货币，如果其交易不是点对点完成的，或者其货币创造机制受控于中心化实体，那么它就不是真正的加密货币。\n\
  \n如果我们将交易方程式应用于一个只有比特币存在、且实物产出随时间增长的全球经济体，那么如果比特币的流通速度大致保持不变，物价水平将会下降，也就是说，比特币的价值必须随时间增长。换句话说，比特币的货币体系本质上是通缩的；它能够保护并提升所持比特币的长期价值。相比之下，以美元为例，自\
  \ 1913 年 12 月 23 日（美国联邦储备银行成立之日）起，截至 2020 年，美元累计通胀率接近 2500%。换句话说，如今一美元的价值仅相当于 1913\
  \ 年价值的 1/2500。\n\n法定货币可以随意印刷，因此，任何关于法定货币稀缺性的概念都是一种人为的虚构。相比之下，比特币及类似的加密货币通过限制可创建的加密货币单位总数来构建稀缺性。如前所述，这也带来了使货币通缩的效果。\n\
  \n比特币已经获得了交换媒介的地位。但它主要用于两个目的：首先是作为价值储存手段，或者更准确地说，是作为对美元的长期对冲工具；其次是用来押注美元的不稳定性。保守的共识是，在正在形成的多极世界中，石油美元体系最终将崩溃，随着美国的军事力量被均衡，美国沉重的债务负担（截至撰写本文时约\
  \ 26 万亿美元）将严重削弱国际社会对美元的信心。此外，1913 年至 2020 年间 2500%的价格通胀表明，美国货币供应量的增长远超其实际产出的增长。美元走弱将带来两个长期后果：一是资金从美元流向稀缺的真实资源，如土地；二是资金流向流动性对冲工具，如黄金、白银、贵重物品和加密货币。这些因素让许多投机者得出结论：比特币是对冲美元的有效长期工具。\n\
  \n读者可以注意到，比特币正在尝试扮演金本位制度中黄金的角色。在金本位制度下，持有货币的实体如果对该货币的信心减弱，可以自由将其兑换成黄金。比特币为投机者提供了同样的选择；他们可以抛售所持的法定货币，转而持有比特币，以此对冲法定货币的不稳定性。\n\
  \n\n\n## 比特币的特性及其影响\n\n比特币的特性对传统法定货币的稳定性和假定合法性构成了威胁，因此世界各国政府协同努力，试图控制或定罪比特币的传播。除了比特币侵犯了政府被认为独有的货币创造主权之外，当局还担心其法定货币因可与比特币兑换而受到的约束。控制比特币向法定货币体系扩散的主要途径之一，就是控制或禁止将法定货币兑换为比特币。\n\
  \n表 1-4 总结了比特币与法定货币之间的差异。\n\n**表 1-4**  \n*比特币与法定货币体系的差异*\n\n| | 比特币 | 法定货币体系 |\n\
  | --- | --- | --- |\n| 中心化 | 否 | 是 |\n| 货币稀缺 | 是 | 否 |\n| 货币创造方式 | 数学算法（挖矿） | 中央银行\
  \ |\n| 需要信任 | 否 | 是 |\n| 交易需要金融机构 | 否（点对点） | 是 |\n| 交易不可撤销 | 是（可提供托管服务） | 否 |\n\
  | 交易匿名性 | 伪匿名 | 否 |\n| 交易完成时间 | 非常快 | 慢 |\n| 交易成本 | 低 | 高 |\n\n### 暗网\n\n比特币作为一种近似货币的出现，也扩大了暗网的范畴。暗网可被描述为互联网上由加密节点组成的覆盖网络，需要特定的协议才能访问。暗网的最大组成部分是分发受版权保护材料（主要是电影）的点对点文件共享系统。暗网的这一部分主要依赖\
  \ `BitTorrent` 协议。`Pirate Bay` 节点是暗网这一部分的重要参与者。暗网的第二个重要组成部分，是它作为违禁品虚拟市场的作用。暗网的这一方面依赖于两个要素：一是仅通过比特币或其他加密货币进行交易，从而绕过传统银行系统；二是利用\
  \ TOR（洋葱路由）网络来加密并隐藏交易双方的活动。`TOR` 依赖于公钥加密，我们将在后续章节中详细学习。\n\n## 结语\n\n在本章中，我们考察了从新石器时代到比特币出现的货币历史。在此次历史之旅中，我们学习了罗马帝国的铸币、金本位制和石油美元体系。我们还解释了部分准备金银行制度的运作方式以及货币方程式。我们通过审视比特币的出现及其区别于货币的主要特征来结束本章。\n\
  \n在下一章中，我们将更详细地研究加密货币生态系统。\n\n"
- '# 2. 加密货币生态系统


  在上一章中，我们考察了货币的历史，并讨论了比特币如何改变货币创造与发行的范式。我们还看到了比特币交易与传统法定货币体系交易的不同之处。比特币的出现催生了大量与之相似程度不一的加密货币。它们在特性上与比特币有所区别，例如可产生的硬币总量、交易完成的速度和方式，以及加密货币就哪些交易有效达成共识的方式。此外，正如我们将在本章后面看到的，许多加密货币旨在处理特定领域的用例。


  在本章中，我们将回顾一些较为知名的替代加密货币（称为 altcoins）的特性，例如以太坊、比特币现金、莱特币、瑞波币、币安币、基本注意力代币、波场、门罗币和泰达币。如果你对加密货币生态系统完全陌生，可能不理解本章中使用的一些术语。请不要因此气馁；你可以在阅读后续章节后再回到本章。


  在继续之前，请回想一下，一种货币要被恰当地归类为加密货币，它必须具备以下两个基本特征：首先，货币的创造和发行过程必须是去中心化的；其次，交易有效性（共识）的确定也必须是去中心化的。


  ## 以太坊


  就市值而言，以太坊（ETH^(¹)）是仅次于比特币的第二大受欢迎的加密货币。以太坊与比特币有很大不同。


  比特币是一个价值传输网络。比特币网络在交易双方之间传输价值（比特币），并在一个称为区块链的分布式账本中记录所有方拥有的总价值。价值转移所依据的合同在比特币生态系统之外。以太坊则略有不同。与比特币一样，以太坊在交易双方之间转移价值；然而，在实体之间转移价值的合同可以在以太坊区块链上指定。因此，以太坊区块链不仅提供了实体持有的以太币（以太坊代币）的账目，还可以对在实体之间转移价值（*以太币*）的合同进行编码。这些合同被称为智能合约。


  以太坊随着维塔利克·布特林在 2014 年发布的白皮书而问世。^(²) 在这篇白皮书中，布特林描述了一个允许用户编写合同的加密货币生态系统，这些合同可以在未来某个时点有条件地转移价值。这些合同是用一种图灵完备的语言
  `Solidity` 编写的。`Solidity` 是一种包含控制流和循环结构的简单语言。以太坊使用 `Solidity` 来指定实体之间转移价值的条件。


  如果一种语言能够模拟图灵机的所有操作，则称其为图灵完备。图灵机是一种抽象机器，具有以下组件。首先，有一条无限长的纸带，被分成一系列单元格。机器有一个由有限数量符号组成的字母表，以及一个称为空白符号的特殊字母字符。机器还有有限数量的状态。每个状态描述了一条规则：写入一个单元格，可选地移动到另一个相邻单元格，并迁移到另一个状态。机器从纸带上的某个单元格开始（“我们可以说磁头位于该单元格上”），并处于某个状态。磁头可以读取磁头下的符号，并根据当前状态，向该单元格写入一个新符号，然后将磁头向左或向右移动一个单元格，并进入一个新状态。例如，机器的状态
  1 可能有规则“如果读取到的符号是 0，则向该单元格写入 1，将磁头向左移动一个单元格，然后进入状态 3”。图灵机的本质特征是，任何计算机算法都可以由这样的机器表示。大多数计算机语言都是图灵完备的，这意味着它们的语法可以表示任何计算机算法。


  除了智能合约，以太坊还提供了一个开发分布式应用程序（称为 `DApp(s)`）的平台。`DApp(s)` 可以发行自己的加密货币，称为代币。例如，如果你想与某个特定的
  `dapp` 交互或使用它，你可能需要购买该 `dapp` 发行的代币。发行这些代币的规则由名为 `ERC-20` 的以太坊标准规定。


  最后，请注意智能合约和 `DApp(s)` 是由以太坊虚拟机（`EVM`）执行的。用 `Solidity` 编写的智能合约会被转译成字节码，以便在 `EVM`
  上执行。请注意，由于以太坊是一个分布式的点对点网络，网络中的每个节点都维护着自己的一份 `EVM` 副本。




  ## 比特币现金


  我们将在后续章节中详细探讨比特币挖矿过程，但目前请先记住以下描述。一个区块包含多笔交易。成功挖出区块的矿工可以将该区块添加到比特币区块链上。矿工的激励在于，如果他成功挖出一个区块，他将获得预设的区块挖矿奖励（以比特币形式）以及该区块内所有交易的交易费用。比特币底层的数学算法确保大约每十分钟挖出一个新区块。区块的最大大小为
  1 MB，这隐含地设定了单个区块所能包含交易数量的上限。这一限制意味着比特币在处理高并发交易时表现尤为糟糕。一笔交易大约为 500 字节，因此一个区块大约可以包含
  2000 笔交易。^(【3】) 由此，比特币网络每小时大约能处理 12,000 笔交易，即每秒约 3.3 笔。这一性能非常低下。例如，VISA 每秒可处理约 10,000
  笔交易。这一限制也表明，比特币无法高效地大规模处理交易，难以支撑一个以比特币为基础的经济体。


  `比特币现金`是比特币的一个硬分叉，它试图通过将区块最大大小提升至 7 MB 来提高比特币的性能。除了这一改变外，`比特币现金`几乎与比特币完全相同。


  硬分叉是指获取现有源代码库并进行复制。然后对复制的代码进行修改，使其与原始代码分道扬镳。因此，在硬分叉点之前，代码是共通的，之后则出现了不同的代码分支。


  ## 瑞波币


  `瑞波币`（`XRP`）的主要动机是创建一个用于高并发、快速交易处理的加密货币网络。`瑞波币`的目标是取代国际交易中的`SWIFT`^(【4】) 网络。`SWIFT`是一个供参与银行和金融机构使用的消息传递网络。该网络中的消息是向参与金融机构发出的指令，要求其向`SWIFT`网络中的其他参与实体支付价值。`瑞波币`瞄准的是`SWIFT`体系中的大型支付处理商。


  国际价值转移速度极其缓慢。一笔转账可能需要 24 小时到 5 天不等。此外，交易费用也非常高昂。`瑞波币`旨在实现一个名为`RippleNet`的基于区块链的解决方案，该方案承诺实现即时价值转移、低交易费用、交易加密以及强大的防欺诈保护。概括来说，`瑞波币`打算用去中心化的区块链应用来替代将手动与自动处理混为一谈的过时`SWIFT`网络。^(【5】)


  ## 门罗币


  `门罗币`（`XMR`）是一种类似比特币的加密货币，它实施了强有力的协议来确保金融交易的隐私性。在比特币中，任何人都可以检查分布式公共账本，以确定金融交易涉及的双方（比特币地址）以及交易转移的价值量。此外，任何人都可以检查公共账本，以确定某个公共地址拥有的比特币数量以及与该地址相关的所有交易。


  `门罗币`通过实施一个混淆的公共账本来阻止此类检查。`门罗币`账本隐藏了交易中发送方和接收方的身份（公共地址）以及交易金额。因此，门罗币交易不可追踪，交易也无法与任何特定公共地址关联。


  你会记得，美元纸币是可互换的，这意味着任何一张一美元钞票与其他一美元钞票是相同的。此外，如果我们查看钱包里的一美元钞票，我们无法确定涉及这张特定钞票的过往交易。相比之下，比特币在这种意义上并非严格可互换。由于任何人都可以检查比特币分布式账本，我们可以确定与特定比特币相关的完整交易历史。因此，举例来说，如果某个比特币过去曾涉及非法交易，而这个比特币现在就在你的钱包里，我们可以轻易地追溯出它曾参与过非法交易。正因如此，比特币并非真正可互换的加密货币。相比之下，门罗币是可互换的，因为我们永远无法确定你钱包里某个门罗币单位的过往交易历史。


  ## 莱特币


  `莱特币`（`LTC`）于 2011 年从比特币分叉而来。`莱特币`与比特币主要有两个不同点。首先，莱特币的最大挖矿数量为 8400 万个，而比特币为 2100
  万个。其次，`莱特币`的区块大约每 2.5 分钟被挖出一个，而比特币约为 10 分钟。


  ## 基本注意力代币


  数字广告是互联网的祸害。我们被广告淹没，许多人已经训练自己的大脑去忽略数字广告。`基本注意力代币`（`BAT`）提出了一种巧妙且全新的数字广告范式。`BAT`旨在提高数字广告的有效性，增强隐私保护，并同时减少互联网用户接触到的广告数量。`BAT`分布式应用由`Brave`浏览器以及`BAT`代币（一种以太坊
  `ERC-20` 代币）组成。`BAT`背景过硬。这种专用代币以及浏览器是由首个互联网浏览器`网景导航者`和`JavaScript`语言的发明者`布伦丹·艾奇`构思的。


  其运作方式如下。希望投放广告的实体创建一个以太坊智能合约，并在合约中附带一些`BAT`代币。当有人在（`Brave`浏览器中）查看此广告时，他或她将获得该广告附带的一部分代币。此外，承载广告的页面发布者也会获得一些代币，最后，`Brave`浏览器也会获得一些代币。请注意，如果某人查看了广告，他或她会因其对广告付出的关注而获得补偿。


  在当前的数字广告*环境*中，用户的偏好和浏览习惯被无处不在的跟踪，并传输给集中式实体进行存储和分析，目的是向受试者推送定向广告，并出于其他目的对其进行分类——所有这些都未经过受试者的同意。`Brave`浏览器仅在本地存储用户的浏览习惯和偏好，不会将这些信息传输给任何集中式实体。因此，`BAT`和`Brave`浏览器代表了一种相当激进的隐私保护实施方案。


  ## 币安币


  `币安`是全球最重要的加密货币交易所之一。`币安`为加密货币交易提供了一个平台。`币安币`（`BNB`）是一种基于以太坊的 `ERC-20` 代币。其主要用途是支付交易所的手续费和上币费。交易者如果使用`BNB`支付交易费用，可以享受折扣。




  ## TRON


  TRON 是一个用于去中心化应用的区块链平台；其主要应用场景是在数字娱乐领域存储和分发抗审查内容。因此，它力图与 Facebook、Netflix、图片和音频存储库、博客平台等中心化内容提供商竞争。TRON
  是一个雄心勃勃的项目。


  TRON 的独特之处之一是其与 BitTorrent 协议集成，用于激励式的内容存储和检索。提供存储空间来存储文件或其部分的用户，在其他用户使用 TRON 的
  BitTorrent 协议下载文件时，可以获得一些`TRX`币。


  TRON 的架构由三层组成：一个可通过 BitTorrent 协议访问的**存储层**，一个实现 TRON 功能（包括 TRON (`TRX`) 加密货币）的**核心层**，以及一个实现分布式应用的**应用层**。^(⁶)


  BitTorrent 是一种广泛用于传输文件的对等文件共享协议。BitTorrent 网络由一组运行在 TCP/IP 网络之上的节点组成，每个节点都实现了 BitTorrent
  文件传输协议。该协议使网络中的对等节点能够发现哪些节点拥有某个文件或其部分，然后使该节点能够从这些节点下载文件。虽然没有精确的估计，但坊间证据表明，在任何给定时间，都有
  1500 万到 3000 万用户使用 BitTorrent 下载文件。


  ## Tether


  Tether (`USDT`) 是一种稳定币。稳定币旨在相对于法定货币（通常是美元）保持稳定的价值。Tether 通过明显为每个流通中的 Tether 维持一美元储备来确保这种稳定性。这些美元储备应由发行
  Tether 的实体（即 iFinex）控制。控制 Tether 的 iFinex 目前正面临与透明度、储备审计不充分和市场操纵相关的诉讼。


