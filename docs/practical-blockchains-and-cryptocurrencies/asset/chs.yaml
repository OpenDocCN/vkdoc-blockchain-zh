- "# 9. 加密货币交易处理\n\n在诸如比特币或 Helium 这样的加密货币网络中，交互的基本单元是交易，即价值从一个实体转移到另一个实体。在这类网络中，区块链是一个不可篡改的分布式账本，记录了所有在网络上发生的交易。价值从一个公共地址转移到另一个公共地址。通过扫描整个区块链中涉及某个地址的交易，我们可以查看并列举与该公共地址相关的所有交易。实际上，如果我们从创世块开始向前扫描区块链，那么涉及该地址的最后一笔交易也提供了与该地址关联的加密货币余额。\n\
  \n我们刚刚描述的这类加密货币区块链没有用户账户的概念。区块链不会为每个交易者提供一个记录了所有账户活动的唯一账户。相反，应用仅在交易发生时将其记录在链上。每笔交易由一个或多个原始公共地址组成，价值从这些地址转移到**一个或多个目标公共地址**。因此，由于个人使用公共地址来接收价值和转出价值，我们可以通过从创世块开始向前扫描区块链，查找涉及该个人所拥有的公共地址的交易，来构建与个人相关的交易。这正是用户钱包的构建方式。需要提及的是，重复使用公共地址被认为是一种不良做法，因为无论是离线还是在线创建新地址都几乎是零成本的。此外，使用多个地址在某种程度上可以模糊身份信息。\n\
  \n关于比特币和 Helium 这类加密货币网络，有一件事值得注意：转移价值的合约关系存在于网络之外。网络本身并不记录合约关系。这与以太坊形成对比，以太坊可以在网络上编码合约条款。\n\
  \n本章及接下来的两章将探讨加密货币交易。在本章中，我们将深入探讨加密货币交易、此类交易的验证，特别是价值如何安全地从合法所有者手中转移到预期接收者手中。在下一章中，我们将研究默克尔树以及如何利用它们来验证区块中的交易。在第\
  \ 11 章中，我们将为 Helium 交易处理编写代码。\n\n## 公共地址构建\n\n在典型的交易中，价值接收方会向价值转出方提供一个公共地址，以便将价值发送到该地址。通过使用加密技术，价值接收方可以证明其生成了该公共地址，因此是已转移到该地址的价值的所有者。\n\
  \n为简洁起见，此后我将把诸如 SHA-256 或 RIPEMD-160 等加密哈希函数的十六进制字符串编码输出简称为**消息摘要**或**哈希**。\n\n\
  以下算法列举了生成公共地址所涉及的步骤：\n\n1.  生成一对随机的 ECC 私钥-公钥对。^(⁴²)\n2.  生成公钥的 SHA-256 消息摘要。\n\
  3.  生成步骤 2 结果的 RIPEMD-160 消息摘要。\n4.  在 RIPEMD-160 哈希前添加一个版本字节 `0x1`。\n5.  计算步骤 4\
  \ 结果的 SHA-256 消息摘要。\n6.  提取步骤 5 结果的最后四个字节。这将作为我们的错误检测校验和。\n7.  将错误校验和与步骤 4 的结果拼接起来。\n\
  8.  对步骤 7 的结果进行 Base58 编码。结果即为一个公共地址。^(⁴³)\n\n我们可以用符号表示公共地址的生成过程：\n\n```\naddress\
  \ = base58_encode(\"1\" + RIPEMD-160(SHA256_HASH(public_key)) + checksum)\n```\n\
  \n图 9-1 展示了地址生成过程。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig1_HTML.jpg](img/492478_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n公共地址生成\n\nHelium 地址的版本字节将固定为 `hconfig` 模块中的值。Base58 编码之前的最后四个字节是一个校验和，使我们能够证明地址未被损坏。\n\
  \n此校验和的使用方式如下：\n\n1.  对公共地址进行 Base58 解码。\n2.  从上一步的结果中剥离最后四个字节。这四个字节是错误校验和。我们称之为提取的校验和。剩余部分包括前置的版本字节和\
  \ RIPEMD-160 哈希。我们将这部分称为 RIPEMD 哈希。\n3.  对 RIPEMD 哈希取 SHA-256 哈希，并提取最后四个字节。这是我们计算出的校验和。\n\
  4.  如果计算出的校验和与提取的校验和不相等，则该公共地址无效。\n\n请注意，由于公钥的随机生成以及哈希的加密特性，一个公钥总是会生成一个唯一对应的公共地址，*进而*该地址由某个唯一的私钥-公钥对生成。^(⁴⁴)\n\
  \n## 规范交易结构\n\n现在，我们将研究交易的规范 Python 结构。交易具有以下字典结构：\n\n```\n{\nversion:         \n\
  transactionid:   \nlocktime:        \nvin:             \nvout:            \n}\n\
  ```\n\n尖括号内的文本指定了键对应值的类型。\n\n`version` 键的值描述了用于处理交易的应用程序软件的版本。对于 Helium，该值固定为 \"\
  1\"。\n\n`transactionid` 是交易的通用唯一标识符。我们将使用 Python 标准库中的 `secrets` 模块来创建一个长度为 512\
  \ 位的随机且安全的加密十六进制编码字符串。^(⁴⁵)\n\n`locktime` 是一个非负整数。如果此值大于零，则指示矿工在指定时间过去之前不要处理该交易。时间流逝以秒为单位。缓存该交易以供将来处理的矿工，在所需时间过去之前不会将交易包含在区块中。`locktime`\
  \ 的值不能超过 Helium 配置模块中指定的 `MAX_LOCKTIME`。\n\n\n\n### 交易 `vin` 列表\n\n现在我们可以来讨论 `vin`\
  \ 列表以及解锁先前交易金额的问题了。`vin` 是 value in（输入值）的缩写。`vin` 是一个交易输入列表，它消耗了先前交易的输出。\n\n`vin`\
  \ 列表中的每个元素都是一个字典。该字典元素通常具有以下结构：\n\n```json\n{\ntxid:             \nvout_index:  \
  \     \nScriptSig:        \n}\n```\n\n`txid` 是先前某笔交易的交易 ID，该交易的一部分输出正在被消耗。\n\n`vout_index`\
  \ 是先前交易 `vout` 数组中的一个索引。先前交易的每个 `vout` 元素都指定了一个可被消耗（转移）的值。消耗的总价值是所有 `vin` 元素所转移价值的总和。请注意，先前交易\
  \ `vout` 元素中的整个输出都必须被完全消耗。\n\n`ScriptSig` 脚本通过证明对价值的所有权来实现价值转移。它是数字签名和公钥的拼接体。公钥是用于生成公钥地址的密钥，该地址在先前交易中接收了价值转移。我们很快就会详细探讨这个脚本。\n\
  \n### 交易 `vout` 列表\n\n`vout` 是 value out（输出值）的缩写。回想一下，当某个公钥地址根据一笔交易接收价值时，该价值随后可以被其所有者用于另一笔交易。交易的\
  \ `vout` 列表指定了可以转移给一个或多个价值接收者的价值。重申一下，`vout` 列表指定了可由其所有者在后续交易中花费的交易价值。\n\n`vout`\
  \ 是一个列表。每个 `vout` 列表元素都是一个字典，其表示形式如下：\n\n```json\n{\nvalue:  ,\nScriptPubKey: \n\
  }\n```\n\n`value` 是指定公钥地址接收到的加密货币价值。字符串 `RIPEMD-160(SHA-160(Public Key))` 是从该公钥地址中解析出来的；^((46))\
  \ 这个解析出的字符串位于 `ScriptPubKey` 中。`ScriptPubKey` 是一个符号性的解锁操作列表，将在后续讨论。`vout` 元素中的加密货币价值可以被能够解锁\
  \ `ScriptPubKey` 脚本的实体所花费。唯一能够解锁该脚本的实体是拥有与 `RIPEMD-160(SHA-160(Public Key))` 相对应的私钥的实体。我将在后面展示这一点。\n\
  \n关于 `vout` 有两点需要注意。首先，只能转移整数金额。在比特币领域，最小的可转移单位是 1 `聪`，即比特币的一亿分之一。在 Helium 中，最小的可转移单位是\
  \ 1 `helium 分`，也是 Helium 的一亿分之一。通过仅处理整数运算，我们避免了十进制和浮点运算中涉及的所有复杂问题。其次，请注意，整个 `vout`\
  \ 列表中的价值总和是交易接收方提供的公钥地址所收到的总价值。通常，这个数额会略低于转入该交易的总金额。差额即为交易手续费。\n\n### 交易机制\n\n在牛顿力学中，计算的基本单位是具有质量的物体。物体具有明确定义的属性，并且有物理定律支配它们的行为。类似地，加密货币网络中的基本计算单位是交易。没有交易，就没有区块链。交易具有严格且定义明确的结构，以及支配其行为的固定规则。\n\
  \n让我们逐步了解一笔典型交易中涉及的所有步骤。假设 Alice 想要向 Smith 转移一个 Helium。Alice 面前的任务是创建一个能够促成此转移的交易对象（前述的字典结构）。该交易对象必须\
  \ (i) 解锁一些 Alice 拥有的先前 *Helium*，以及 (ii) 锁定输出的 Helium 价值，以便只有 Smith 才能解锁和使用它们。解锁\
  \ Alice 拥有的 *Helium* 意味着她证明了自己对这些 *Helium* 的所有权，因此，她可以将其转移出去。一旦这些 *Helium* 被解锁，它们就成为可以交付给\
  \ Smith 的输出。Alice 锁定这些输出，以便只有 Smith 可以解锁它们。这将证明 Smith 拥有这些 *Helium*。\n\n在 Alice\
  \ 能够向 Smith 转移一个 Helium 之前，她必须至少拥有一个 Helium。因此，假设有一笔先前交易，其中包含一个 Alice 拥有的单一输出，金额为\
  \ 1.08 Helium（一个 `vout` 元素）。我们假设该先前交易的 ID 为：\n\n```json\n\"618a125ac95ba370187c574d174eb7d618f3ee35d374899ca0007a035ba0a9e1\"\
  \n```\n\n以下是 Alice 必须遵循的步骤，以便向 Smith 转移一个 Helium：\n\n1.  Alice 请求 Smith 向她发送一个公钥地址，她可以向该地址发送一个比特币。\n\
  \n2.  Smith 向 Alice 发送一个他创建的公钥地址。\n\n3.  Alice 为她的交易创建一个交易 ID。我们假设这个 ID 是：\n\n```json\n\
  \"d6b77f077ff700cd36df061ed75af353506f0cec6e267f0ce674eaa3b5d53217\"\n```\n\n4.\
  \  当 Alice 在先前交易 `\"618...9e1\"` 中收到 *Helium* 时，她曾向转让人提供了一个公钥地址。Alice 现在获取用于创建该地址的公钥（例如，称为\
  \ `pPubKey`）以及与该公钥配对的私钥（例如，称为 `PrivKey`）。Alice 提取以下可在先前交易输出（`vout` 元素）中获得的值：\n\n\
  ```\nMDHash = RIPEMD-160(SHA256(pPubKey))\n```\n\nAlice 为 `MDHash` 创建数字签名：\n\n```\n\
  Sig = Signature(MDHash)\n```\n\n接下来，Alice 创建一个包含两个元素的列表：`Sig` 和与该私钥对应的 `公钥` 字符串。这个列表被称为\
  \ `ScriptSig`。\n\n5.  利用这些信息，Alice 在交易的 `vin` 列表中创建 `vin` 元素。该列表只包含一个元素。`vout_index`\
  \ 元素是先前交易 `vout` 列表中的索引，它标识了正在被消耗的先前交易的输出（我们假设它为 0）。该 `vin` 元素为：\n\n```json\n{\n\
  \"txid\": \"618a125ac95ba370187c574d174eb7d618f3ee35d374899ca0007a035ba0a9e1\"\n\
  \"vout_index\": 0\n\"ScriptSig\":  [Sig, PublicKey]\n}\n```\n\n6.  接下来，Alice 获取\
  \ Smith 提供的公钥地址，反转 Base58 编码并剥离校验和。结果是：\n\n```\nRESULT =  \"1\" + RIPEMD-160(SHA256(Smith\
  \ 的公钥))\n```\n\n然后，她使用已剥离的校验和计算 `RESULT` 的 SHA256 哈希值。如果未指示错误，Alice 将以下字符串放入第一个\
  \ `vout` 元素的 `ScriptPubKey` 键中：\n\n```\n\"  MDHASH  \"\n```\n\n其中 `MDHASH` 是 `RIPEMD-160(SHA256(Smith\
  \ 的公钥))`。\n\n7.  Alice 的 `vout` 元素是：\n\n```json\n{\n\"value\":  1,\n\"ScriptPubKey\"\
  : \"  MDHASH  \"\n}\n```\n\n8.  至此，Alice 已创建了交易对象，它看起来像这样：\n\n\n\n```\n{\n\"version\"\
  : \"1\"\n\"transactionid\": \"d6b77f077ff700cd36df061ed75af353506f0cec6e267f0ce674eaa3b5d53217\"\
  \n\"locktime\": 0\n\"vin\": {\n\"txid\": \"618a125ac95ba370187c574d174eb7d618f3ee35d374899ca0007a035ba0a9e1\"\
  \n\"vout_index\": 0\n\"ScriptSig\":  \"Sig PublicKey\"\n}\n\"vout\": {\n\"value\"\
  :  1,\n\"ScriptPubKey\": [  MDHASH  ]\n}\n}\n```\n\n3.  创建交易对象后，爱丽丝将其序列化为 Base58\
  \ 字节序列，并在 Helium 点对点网络上广播。监听该网络以获取交易的矿工们会接收这笔交易，并（可能）将其包含在他们打算挖掘的区块中。\n\n在本章的后续部分，我们将展示`ScriptSig`脚本如何确保只有爱丽丝才能解锁之前交易中输出的\
  \ 1.08 *heliums*，以及`ScriptPubKey`脚本如何确保只有史密斯才能解锁这笔交易中输出的 1 个 helium。只有当`ScriptSig`和`ScriptPubKey`两者都成功执行且无错误时，交易才被视为有效。比特币和\
  \ Helium 都实现了一个简单的栈处理器来验证这些脚本是否成功执行。\n\n你可能已经注意到，我们解锁了 1.08 *heliums*，但只向史密斯转移了\
  \ 1 个 helium。剩下的 0.08 个 helium 去哪了？这部分多余金额被称为交易费。它是激励矿工将爱丽丝的交易包含在他们打算挖掘的区块中的诱因。如果某个矿工成功挖掘了一个包含爱丽丝交易的区块，那么该矿工就可以申领这\
  \ 0.08 个 helium。\n\n前述逻辑经过适当修改后，可应用于处理来自爱丽丝拥有的多个先前交易输出的输入（这些交易将有多个先前交易的`vout`列表元素），并且该交易可以将输出指向多个\
  \ helium 地址（该交易将拥有多个`vout`元素）。\n\n我之前描述的这些步骤通常由爱丽丝的 Helium 钱包执行。\n\n在一个典型的法币收银台交易中，你支付一些钱并收到一些找零。在加密货币中，找零按以下方式处理。假设爱丽丝有一笔包含\
  \ 5.08 个 helium 的先前交易，她打算在与史密斯的交易中使用这些 *heliums*。爱丽丝将创建一个公开地址，并向该地址转入 4 个 *heliums*。这样，史密斯将在他提供给爱丽丝的地址上收到\
  \ 1 个 helium，爱丽丝将在地自己创建的地址上获得 4 个 *heliums* 的找零，而交易费将是 0.08 个 *heliums*。交易的这一方面也将由\
  \ Helium 钱包透明地处理。\n\n## ScriptPubKey 和 ScriptSig 脚本\n\n交易`vout`元素中的`ScriptPubKey`脚本用于锁定该元素中指定的值。只有该值被转移到的公开地址的所有者才能解锁该值。\n\
  \n交易`vin`元素中的`ScriptSig`脚本描述了先前交易中将在当前交易中被消耗的一个值。该值将被转移到一个或多个公开地址。被消耗的值可以通过先前交易的交易\
  \ ID 以及该交易中`vout`元素的索引来完全识别。`ScriptSig`脚本确保先前交易中的这个值只能由该值的所有者转移。\n\n请注意，交易中的每个`vin`元素恰好引用先前交易中的一个`vout`元素，并且这样的`vin`元素必须消耗该`vout`元素中的全部值。\n\
  \n`ScriptPubKey`和`ScriptSig`脚本都是简单的列表。它们由一个我将要描述的简单栈语言处理。\n\n这些脚本中的元素（列表元素）要么是一个操作符符号，要么是一个操作数。我们将操作符符号称为操作码。操作数是一个值；例如，整数\
  \ 5 和字符串`\"hello world\"`都是操作数。操作码是对操作数执行操作的可符号化操作。例如，加法操作符`+`是一个对数字进行操作的操作码。每个列表元素恰好包含一个操作码或一个操作数。操作码用尖括号括起来表示。\n\
  \n执行栈是一个由操作码和操作数组成的列表。例如，`ScriptPubKey`和`ScriptSig`都是执行栈。\n\n`vin`和`vout`列表中的每个元素要么是操作码，要么是操作数。每个列表的行为都像一个栈，因此，它只允许对栈执行两种操作：`PUSH`（压入）和`POP`（弹出）。`POP`操作从栈顶弹出一个元素，`PUSH`操作将一个元素压入栈顶。\n\
  \n最后，我们还指定了一个结果栈。执行栈上的操作码将对结果栈上的值进行操作，如果操作码的语义要求，操作的结果可能会被推回结果栈。如果执行栈上的值是一个操作数，它将被简单地推送到结果栈上。\n\
  \n有效的操作码包括`DUP`、`HASH-160`、`PK_HASH`、`EQ-VERIFY`和`CHECK-SIG`。这些操作码的含义如下所述。有效的操作数必须是字符串。\n\
  \n本规范描述了一个简单的栈语言。\n\n如前所述，操作码将通过将其括在尖括号内来表示。表示值的操作数则不括在尖括号内。将要执行的操作码将由一个执行指针（粗箭头）指示。\n\
  \n我们将研究 P2PKHASH（个人到公钥哈希）脚本。这些类型的脚本将价值从单个实体转移到另一个单个实体。在典型的加密货币网络中，P2PKHASH 脚本占所有交易的\
  \ 98%到 99%。\n\n### ScriptSig 脚本\n\nP2PKHASH 交易的每个`vin`元素中的`ScriptSig`列表具有以下结构（图\
  \ 9-2）。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig2_HTML.jpg](img/492478_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\nScriptSig 结构\n\n一个`ScriptSig`脚本由两个操作数组成。`PUBKEY`是用于创建接收先前交易输出的公开地址的公钥（十六进制字符串）。\n\
  \n`SIG`是通过对以下值签名而创建的签名：\n\n```\nRIPEMD-160(SHA256(先前交易输入的公钥))\n```\n\n该值在先前交易的`vout`元素中也存在。\n\
  \n### ScriptPubKey 脚本\n\n考虑一个 P2PKHASH 交易。在此类交易中，交易每个`vout`元素中的`ScriptPubKey`脚本可以可视化为图\
  \ 9-3 左侧的栈。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig3_HTML.jpg](img/492478_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\nScriptPubKey 的执行栈\n\n该图还显示了右侧一个空的结果栈。这个栈将存放将由执行栈中的操作码进行操作的操作数。\n\n执行栈中操作码的含义如下：\n\
  \n`<DUP>` 表示取出结果栈顶部的值，并将该值的副本压回结果栈。\n\n`<HASH160>` 表示弹出结果栈顶部的值，并生成值：\n\n```\nRIPEMD-160(SHA-256(弹出的值))\n\
  ```\n\n然后将该消息摘要压入结果栈。`PK-HASH` 是一个字符串。\n\n`<EQUAL_VERIFY>` 表示从结果栈中弹出两个元素，并验证它们是否相等。\n\
  \n`<CHECK_SIG>` 表示从结果栈中弹出两个元素，并验证签名。\n```\n\n\n### 脚本签名与脚本公钥的实际操作\n\n让我们看看如何使用 `ScriptSig`\
  \ 和 `ScriptPubKey` 脚本来验证一笔 P2PKHASH 交易。只有当这两个脚本都执行无误时，该交易才被视为有效。一笔有效的交易会解锁该交易所引用的先前交易输出。我们将沿用之前的示例，即爱丽丝向史密斯转移一枚氦币。\n\
  \n首先，我们将 `ScriptSig` 和 `ScriptPubKey` 列表连接起来，得到如下执行栈（列表头部位于顶部）（图 9-4）。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig4_HTML.jpg](img/492478_1_En_9_Fig4_HTML.jpg)\n\
  \n**图 9-4** ScriptSig 和 ScriptPubKey 的执行栈\n\n现在，我们将执行此栈上的操作码。栈中出现的任何操作数都将被直接推入结果栈。\n\
  \n执行栈将通过一个执行指针（用一个粗箭头表示，见图 9-5）来指示下一个要执行的操作。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig5_HTML.jpg](img/492478_1_En_9_Fig5_HTML.jpg)\n\
  \n**图 9-5** 执行栈步骤 1\n\n第一个操作是 `SIG`。爱丽丝获取 `RIPEMD-160(SHA256(公钥))` 这个值（该值位于先前交易\
  \ `vout` 元素的 `ScriptPubKey` 中），并生成该值的签名。该值被推送到结果栈中。此时两个栈的状态如图 9-6 所示。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig6_HTML.jpg](img/492478_1_En_9_Fig6_HTML.jpg)\n\
  \n**图 9-6** 执行栈步骤 2\n\n下一个操作是 `PUBKEY`，即爱丽丝用来生成先前交易地址的公钥（该交易的输出正被爱丽丝使用）。此公钥的十六进制字符串被推送到结果栈中。此时两个栈的状态如图\
  \ 9-7 所示。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig7_HTML.jpg](img/492478_1_En_9_Fig7_HTML.jpg)\n\
  \n**图 9-7** 执行栈步骤 3\n\n下一个操作码是 `<DUP>`。此操作要求复制结果栈顶部的元素，并将其推回结果栈。执行此操作后，两个栈的状态如图\
  \ 9-8 所示。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig8_HTML.jpg](img/492478_1_En_9_Fig8_HTML.jpg)\n\
  \n**图 9-8** 执行栈步骤 4\n\n下一个操作码 `<HASH-160>` 要求弹出结果栈顶部的值，计算 `RIPEMD-160(SHA256(弹出的值))`，然后将结果推送到结果栈中。此操作的结果如图\
  \ 9-9 所示。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig9_HTML.jpg](img/492478_1_En_9_Fig9_HTML.jpg)\n\
  \n**图 9-9** 执行栈步骤 9\n\n下一个操作将 `PK-HASH` 值推送到结果栈中。`PK-HASH` 是在创建上一笔交易时生成的；其值为 `RIPEMD-160(SHA256(上一笔交易输入的公钥))`，如图\
  \ 9-10 所示。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig10_HTML.jpg](img/492478_1_En_9_Fig10_HTML.jpg)\n\
  \n**图 9-10** 执行栈步骤 10\n\n操作码栈上的下一个命令是 `<EQUAL_VERIFY>`。此操作码要求我们弹出结果栈顶部的两个值并比较它们。如果这两个\
  \ `RIPEMD-160` 哈希值不相等，则输入解锁失败，因为声称拥有上一笔交易中价值的一方未提供正确的公钥。如果爱丽丝使用她用于上一笔交易输入的公钥来计算哈希值，则相等性验证成功。\n\
  \n如果操作成功，则两个栈的状态如图 9-11 所示。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig11_HTML.jpg](img/492478_1_En_9_Fig11_HTML.jpg)\n\
  \n**图 9-11** 执行栈步骤 11\n\n最后一个操作码 `<CHECK_SIG>` 按以下方式验证上一笔交易：\n\n1.  根据爱丽丝用于先前交易输出的公钥，验证与该公钥对应的私钥是否生成了该值的签名。\n\
  \n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig12_HTML.jpg](img/492478_1_En_9_Fig12_HTML.jpg)\n\
  \n**图 9-12** 交易输出已解锁\n\n1.  如果签名有效，则从结果栈中弹出这两个元素。交易的 `vin` 元素已成功解锁了上一笔交易的输出（图 9-12）。\n\
  \n```\nRIPEMD-160(SHA256(公钥))\n```\n\n如果当前交易中的所有 `vin` 元素都已解锁，我们就说该交易已解锁。\n\n##\
  \ 多重签名交易\n\n考虑一个法币支票账户，要求配偶双方均在支票上签字。在这种情况下，有效的价值转移需要双方签字。将这种支票交付给付款人就是一次多重签名交易。在加密货币网络中，多重签名交易指的是涉及\
  \ n > 1 个实体的交易，每个实体提供一个该交易的公钥地址。然后，这 n 个实体中至少有 m 个实体必须提供他们的签名，才能将价值转移给接收方。这种交易通常被称为\
  \ m:n 交易；它通过一个验证多个签名的脚本来实现。我们的支票示例就是一个 2:2 交易。\n\n多重签名交易有几个有趣的应用场景。\n\n在 2:2 托管交易中，其中一方是中立仲裁人，其职能是监督约定的价值转移条件是否已满足。只有满足这些条件时，仲裁人才会提供其签名。我们也可以有\
  \ m:n 托管交易，其中需要 m 个（m < n）仲裁人签署交易。\n\n在双重身份验证交易中，上一笔交易的输出被两个公钥地址锁定。第一个公钥地址由在线钱包生成。第二个地址由保存在冷存储中的密钥生成。当两个签名都验证通过后，上一笔交易的输出才会被转移。\n\
  \n我们指定的这个简单栈语言可用于为多重签名交易以及其他场景创建脚本。请注意，由于此栈语言不支持控制流结构（例如 `if…else if…`）和循环，因此它不是图灵完备的。这是中本聪有意为之的设计，因为使脚本处理快速而简单是一个设计目标。\n\
  \n## 交易手续费\n\n在交易中转移价值的人，通常会为矿工提供激励，促使其将该交易纳入待挖掘的新区块中。这笔交易手续费等于输入总额减去输出总额的差值。支付交易手续费并非强制要求，但不支付手续费可能会显著延迟交易的处理，因为矿工缺乏动力将该交易纳入候选区块进行挖掘。\n\
  \n\n\n## 交易验证\n\n一旦 Helium 交易被创建，它就会在 Helium 点对点网络上进行广播。接收到这笔新交易的矿工可以选择将其包含在他正在挖矿的区块中。矿工决定是否包含该交易，部分会受到交易中提供的交易费用的影响。\n\
  \n在将交易包含到区块之前，矿工会对该交易进行测试以确定其有效性。只有有效的交易才会被包含在待挖掘的区块中。\n\n如果矿工挖掘的区块中包含无效交易，网络中的其他节点将拒绝将此新区块纳入其本地区块链版本中，因为每个接收到已挖掘区块的节点都会验证该区块以及其中交易的有效性。\n\
  \n以下是对交易进行验证时执行的部分测试：^(⁴⁸)\n\n1.  交易语法有效；这意味着所需的交易字段都存在且其类型有效。\n2.  交易输入为正整数。具体来说，它们不是浮点数。\n\
  3.  交易输出为正整数。具体来说，它们不是浮点数。\n4.  交易输入和输出不小于一个 Helium 分。\n5.  交易输入的总和小于 `hconfig`\
  \ 模块中 `MAX_HELIUM_COINS` 的值。\n6.  交易输出的总和小于 `hconfig` 模块中 `MAX_HELIUM_COINS` 的值。\n\
  7.  交易输入的总和大于或等于交易输出的总和。\n8.  交易的锁定时间不小于零。\n9.  锁定时间不大于 `hconfig` 模块中 `LOCKTIME_INTERVAL`\
  \ 的值。\n10. 每笔交易长度至少为 100 字节。\n11. 交易输入数量小于 `hconfig` 模块中的 `MAX_INPUTS`。\n12. 交易输出数量小于\
  \ `hconfig` 模块中的 `MAX_OUTPUTS`。\n13. `ScriptSig` 脚本具有有效值。\n14. `ScriptPubKey` 脚本具有有效值。\n\
  15. `ScriptSig` 和 `ScriptPubKey` 脚本成功实现价值转移。\n16. 只有当区块链从 `coinbase` 交易所在的区块之后增长了\
  \ `COINBASE_INTERVAL` 个区块时，`coinbase` 交易的输出才能被花费。我们将在后续讨论 coinbase 交易。\n17. `coinbase`\
  \ 交易没有任何输入（`vin` 列表为空）。\n18. 创世区块没有任何输入。\n\n## 总结\n\n加密货币网络中的基本计算单元是交易。区块链中的区块包含交易。随着加密货币网络上的节点处理交易，区块会被添加到区块链中。这些节点被称为矿工，将区块添加到区块链的过程被称为挖矿。\n\
  \n在本章中，我们研究了典型加密货币交易的结构，并审视了解锁先前交易中输入以便花费它们必须遵循的所有步骤。想要向加密货币区块链添加区块的节点必须在其候选区块中包含交易。这些节点必须首先验证区块中包含的交易是有效的。我们探讨了交易验证测试。如果挖矿节点成功地将区块添加到区块链中，它就有权获得该区块中所有交易的交易费用，以及包含在\
  \ `coinbase` 交易中的挖矿奖励。\n\n在下一章中，我们将学习默克尔树。这些树结构用于确定交易列表是否被篡改。默克尔树也可用于确定特定交易是否存在于某个区块中。\n\
  \n## 参考\n\n[`https://github.com/bitcoin/bitcoin`](https://github.com/bitcoin/bitcoin)，最后访问于\
  \ 2020 年 2 月 8 日\n\n脚注 1   2   3   4   5   6   7\n\n# 10. 默克尔树\n\n在上一章中，我们对加密货币交易进行了全面研究。交易是加密货币网络中的基本计算单元。没有交易，就没有区块链。一个区块由若干笔交易以及相关数据组成。对于任何包含交易的区块，我们希望确定两个属性：首先，这些交易没有被篡改；其次，特定交易是否存在于该区块中。\n\
  \n您应该还记得第 8 章中，区块属性 `prevblockhash` 用于测试前一个区块是否被篡改。此哈希值是对前一个区块的区块头进行计算得到的。前一个区块中的交易并不位于该区块头中。然而，区块头包含这些交易的默克尔根。这个根可用于验证区块中交易的完整性。如果任何交易被更改，默克尔根将会改变，因此，前一个区块的哈希值将不匹配，从而使交易无效。\n\
  \n在本章中，我们将了解如何使用默克尔树来验证区块交易的完整性。之后，我们将为 Helium 默克尔树实现代码。\n\n## 树数据结构\n\n在计算机科学中，树是节点的集合，节点之间通过父节点、子节点和兄弟节点关系相互关联。通过图表（图\
  \ 10-1）可以最好地解释这一点。\n\n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig1_HTML.jpg](img/492478_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n\n一种树数据结构\n\n在此图中，每个节点由一个圆形表示。共有 12 个节点，标记为 A 到 L。这些节点排列成四层。除了节点 A 之外，每个节点都通过一条线与它上方的节点相连。它上方的节点称为父节点。例如，D\
  \ 是 H 的父节点，C 是 E 和 F 的父节点。节点 A 没有父节点；它被称为根节点。除了位于此树结构底部的节点 G 到 L 之外，每个节点都与其下方的两个节点相连。这两个节点被称为上方节点（即父节点）的子节点（或称左子节点和右子节点）。例如，节点\
  \ E 有两个子节点，即 I 和 J 节点。E 是这些节点的父节点。同一父节点的子节点之间互为兄弟节点。树底部的节点没有子节点，被称为叶节点。\n\n该图是一个二叉树的示例；除叶节点外，所有节点都有两个子节点。此外，这是一棵平衡树，因为所有叶节点都位于同一层级。并非每个父节点都必须有两个子节点，树也不必是平衡的。我们可以构建节点子节点数量不同且树不平衡的树。然而，平衡二叉树具有非常好的性质；特别是，我们可以非常快速地在树中插入和删除节点。此外，在这些树中搜索节点也非常快。\n\
  \n树中的每个节点通常包含指向其子节点、其父节点的指针，以及特定于该树使用领域的数据。这些节点中的指针允许在树中进行双向移动。\n\n\n\n## Merkle\
  \ 树\n\n在典型的加密货币实现中，区块的数据部分包含一组交易。例如，一个比特币区块可能包含 2000 到 4000 笔交易。在 Helium 中，区块中的交易被表示为一个列表。每个列表元素是一笔交易，每笔交易具有字典结构。我们很快会看到，可以将此交易列表表示为树结构。\n\
  \n`Merkle` 树是一种平衡二叉树，其中节点通过加密哈希相互关联。`Merkle` 树的根节点唯一标识该树。\n\n假设我们有一个区块中的八笔交易列表。我们将按如下方式构建此列表的\
  \ `Merkle` 树。\n\n对于每笔交易，计算该交易的 `SHA256` 加密哈希作为十六进制字符串。这些值将成为我们 `Merkle` 树的叶节点（图\
  \ 10-2）。\n\n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig2_HTML.jpg](img/492478_1_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2**  \n`Merkle` 树的叶节点\n\n`TnhH` 是第 n 笔交易的 `SHA256` 哈希。由于 `Merkle` 树是平衡二叉树，它必须包含偶数个叶节点。因此，如果区块中的交易数量为奇数，我们只需将最后一笔交易在交易列表中重复添加一次。\n\
  \n现在我们可以推导 `Merkle` 树的第二层。从最左侧的叶节点开始，考虑其右侧的兄弟节点。我们将两个哈希 `T1H` 和 `T2H` 拼接起来，并计算此拼接字符串的\
  \ `SHA256` 哈希：\n\n```\nT12H = SHA256(T1H + T2H)\n```\n\n然后我们拼接下一对叶节点哈希并计算 `SHA256`\
  \ 哈希：\n\n```\nT34H = SHA256(T3H + T4H)\n```\n\n我们按此方式继续，直到所有叶节点都被处理完毕。这将得到一组加密哈希列表，其长度是叶节点数量的一半。`Merkle`\
  \ 树第二层的节点由这个新列表构建而成（图 10-3）。\n\n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig3_HTML.jpg](img/492478_1_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3**  \n`Merkle` 树的前两层\n\n为了推导 `Merkle` 树的第三层，我们计算以下哈希：\n\n```\nT1234H =\
  \ SHA256(T12H + T34H)\nT5678H = SHA256(T56H + T78H)\n```\n\n现在我们得到了 `Merkle` 树的第三层（图\
  \ 10-4）。\n\n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig4_HTML.jpg](img/492478_1_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4**  \n`Merkle` 树的前三层\n\n最后，我们将位于 `Merkle` 树第三层的两个节点中的 `SHA256` 哈希拼接起来：\n\
  \n```\nT12345678H = SHA256(T1234H + T5678H)\n```\n\n这给出了区块中八笔交易的 `Merkle` 树的最终表示（图\
  \ 10-5）。\n\n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig5_HTML.jpg](img/492478_1_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5**  \n八笔区块交易的 `Merkle` 树\n\n哈希值 `T12345678H` 被称为 `Merkle` 根。它是区块中交易的加密哈希。如果任何交易被篡改，或者它们在区块交易列表中的顺序被改变，`Merkle`\
  \ 根将与其先前的值不一致。由于 `Merkle` 根位于区块头中，区块头将变得不一致。\n\n你可能会问，为什么我们需要构建 `Merkle` 树。简而言之，像\
  \ `Merkle` 树这样的平衡二叉树是一种高效搜索结构。假设有一百万笔区块交易的假设列表。这个列表可以表示为深度为 20 层的 `Merkle` 树。此外，我们可以用\
  \ `O(log n)` 的时间在该列表中搜索特定交易，其中 `n` 是交易的数量。\n\n`Merkle` 树的另一个特性是，到任何叶节点（交易）的路径是唯一的。考虑\
  \ `SHA256` 哈希为 `T6H` 的交易；到该交易的路径可以表示为：\n\n```\nT12345678 + T5678 + T56 + T6\n```\n\
  \n在图 10-6 中，此路径用强调线标出。\n\n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig6_HTML.jpg](img/492478_1_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6**  \n到一笔区块交易的路径\n\n\n\n## 在 Helium 中推导默克尔根\n\n在第 8 章中，我们编写了 Helium 区块链的部分\
  \ Python 代码。当时该模块中的函数 `merkle_root` 仅作为占位符，返回了一个模拟值。现在我们将修正这一缺陷，编写代码来计算并返回区块中交易列表的默克尔根。\n\
  \n请删除 `hblockchain.py` 文件中的占位函数 `merkle_root`，并将以下代码添加到 `hblockchain` 模块末尾。主函数 `merkle_root`\
  \ 会将字典值转换为 JSON 编码的字符串，因此请确保已将标准 Python 模块 `json` 导入到 `hblockchain` 中：^(⁴⁹)\n\n\
  ```\ndef merkle_root(buffer: \"List\", start: \"bool\" = False) -> \"bool or string\"\
  :\n\"\"\"\nmerkle_tree: 计算交易列表的默克尔根。\n接收一个交易列表和一个布尔标志，用于指示\n该函数是首次被调用还是来自函数内部的递归调用。\n\
  如果成功，返回默克尔树的根；如果出错，返回 False。\n\"\"\"\ntry:\n### 如果 start 为 False，则验证是否包含 SHA-256\
  \ 哈希列表\nif start == False:\nfor value in buffer:\nif rcrypt.validate_SHA256_hash(value)\
  \ == False:\nraise(ValueError(\"交易列表 SHA-256 验证失败\"))\nbuflen = len(buffer)\nif\
  \ buflen != 1 and len(buffer)%2 != 0:\nbuffer.append(buffer[-1])\n### 如果是首次进入该函数，则创建默克尔叶节点\n\
  if start == True:\ntmp = buffer[:]\ntmp = make_leaf_nodes(tmp)\nif tmp == False:\
  \ return False\nbuffer = tmp[:]\n### 如果 buffer 只有一个元素，则已得到默克尔根\nif (len(buffer)\
  \ == 1):\nreturn buffer[0]\n### 从子节点构建父节点列表\nindex = 0\nparents = []\nwhile index\
  \ < len(buffer):\n#### 将两个子节点拼接成一个字符串\nparent_value = buffer[index] + buffer[index\
  \ + 1]\n#### 计算父节点字符串的 SHA-256 哈希值并添加到父节点列表\nparents.append(rcrypt.make_SHA256_hash(parent_value))\n\
  index += 2\n### 递归调用本函数，但将 start 标志设置为 False\nreturn merkle_root(parents, False)\n\
  except Exception as err:\nlogging.debug('merkle_root: 异常: ' + str(err))\nreturn\
  \ False\n\ndef make_leaf_nodes(tx_list: \"list\") -> \"List or False\":\n\"\"\"\n\
  make_leaf_nodes: 创建默克尔树的叶节点。\n接收一个交易列表。如果交易数量为奇数，则将最后一个交易再次追加到列表中，\n以便构建一个平衡二叉树。\n\
  计算每个交易的十六进制字符串编码的 SHA-256 消息摘要，并将其追加到\n初始为空的叶节点列表中。\n如果成功，返回叶节点列表；如果出错，返回 False。\n\
  \"\"\"\ntry:\n### 交易列表不能为空\nif (len(tx_list) == 0): raise(ValueError(\"交易列表长度为 0\"\
  ))\n### 验证类型是否为列表\nif type(tx_list) is not list: raise(ValueError(\"交易不是列表类型\"))\n\
  ### 验证每个交易的类型是否为字典\nfor tx in tx_list:\nif type(tx) is not dict: raise(ValueError(\"\
  交易不是字典类型\"))\n### 交易数量必须为偶数\nif len(tx_list) % 2 == 1 or len(tx_list) == 1:\ntx_list.append(tx_list[-\
  \ 1] )\n### 复制交易列表\ntrx_list = list(tx_list)\n### 将每个交易转换为 JSON 字符串\ntx = []\nfor\
  \ transaction in trx_list:\ntx.append(json.dumps(transaction))\n### 创建叶节点\nsha256_list\
  \ = []\nfor transaction in tx:\nsha256_list.append(rcrypt.make_SHA256_hash(transaction))\n\
  except Exception as err:\nlogging.debug('make_leaf_nodes: 异常: ' + str(err))\nreturn\
  \ False\nreturn sha256_list\n```\n\n这里有两个函数：`merkle_root` 和 `make_leaf_nodes`。`merkle_root`\
  \ 接收一个区块交易列表。`merkle_root` 由 `validate_block` 和 `blockheader_hash` 函数调用。\n\n`merkle_root`\
  \ 是一个递归函数；它接收一个布尔标志作为其第二个参数。如果 `merkle_root` 是从前述函数调用的，则该标志为 `True`；如果是被自身调用的，则为\
  \ `False`。`merkle_root` 做的第一件事就是调用函数 `make_leaf_nodes`，后者的任务是构建默克尔树的叶节点。\n\n`make_leaf_nodes`\
  \ 对其接收的交易列表执行一些验证。如果列表为空，则返回 `False`。空的交易列表没有叶节点。然后它会进行一些类型检查，以验证接收到的确实是一个列表，而不是其他数据结构。它还验证每个列表元素是否为字典类型。如果发现异常，则返回\
  \ `False` 值。否则，`make_leaf_nodes` 为此交易列表构建默克尔树的叶节点，并返回这些值。\n\n然后，`merkle_root` 通过递归调用自身（并将标志参数设置为\
  \ `False`）来处理叶节点，从而构建默克尔树。\n\n正如我之前提到的，本书的附录 10 包含了所有 Helium 模块的最终源代码。\n\n## 默克尔代码的\
  \ Pytest 测试\n\n现在我们将编写一些 pytest 单元测试来验证默克尔代码。请将以下 pytest 代码添加到 `test_blockchain`\
  \ 模块的末尾。\n\n添加单元测试代码后，从 `unit_tests` 目录运行测试：\n\n```\n$(virtual) pytest test_blockchain.py\
  \ -k -s\n```\n\n您应该会看到总共通过了 30 个测试：\n\n```\ndef test_empty_merkle_root(monkeypatch):\n\
  \"\"\"\n测试区块的默克尔根不能为空\n\"\"\"\nhblockchain.blockchain.clear()\nmonkeypatch.setattr(hblockchain,\
  \ \"merkle_root\", lambda x, y: \"\")\nassert hblockchain.add_block(block_1) ==\
  \ False\nhblockchain.blockchain.clear()\ndef test_invalid_merkle_root(monkeypatch):\n\
  \"\"\"\n测试无效的默克尔根\n\"\"\"\nmonkeypatch.setattr(hblockchain, \"merkle_root\", lambda\
  \ x, y: rcrypt.make_SHA256_hash('msg1'))\nmonkeypatch.setitem(block_1, \"merkle_root\"\
  ,  \\\n\"A88a1fd32a1f83af966b31ca781d71c40f756a3dc2a7ac44ce89734d2186f63z\")\nassert\
  \ hblockchain.add_block(block_1) == False\n\"\"\"\n测试默克尔根\n这些默克尔测试不测试交易的有效性\n\"\"\
  \"\ndef test_merkle_root_empty_tx(monkeypatch):\n\"\"\"\n测试空交易列表的默克尔根\n\"\"\"\n\
  monkeypatch.setattr(hblockchain, \"merkle_root\", \\\nlambda x, y: rcrypt.make_SHA256_hash('msg0'))\n\
  monkeypatch.setitem(block_0, \"tx\", [])\nmonkeypatch.setattr(hblockchain, \"merkle_root\"\
  , \\\nlambda x, y: rcrypt.make_SHA256_hash('msg1'))\nmonkeypatch.setitem(block_1,\
  \ \"tx\", [])\nassert hblockchain.add_block(block_1) == False\ndef test_merkle_root_tx_bad_type():\n\
  \"\"\"\n测试错误交易列表类型的默克尔根\n\"\"\"\nassert bool(hblockchain.merkle_root (\"123\", True))\
  \ == False\ndef test_merkle_bad_flag():\n\"\"\"\n测试错误标志参数的默克尔根\n\"\"\"\nassert bool(hblockchain.merkle_root\
  \ ([{\"a\":1}], False)) == False\ndef test_merkle_root_transactions_dict_type():\n\
  \"\"\"\n测试交易列表为字典类型的默克尔根\n\"\"\"\nassert bool(hblockchain.merkle_root ({'a': 1},\
  \ True)) == False\ndef test_merkle_root_random_transaction():\n\"\"\"\n测试合成随机交易的默克尔根\n\
  不测试前一个区块的哈希值\n\"\"\"\nhblockchain.blockchain.clear()\nblock_0[\"merkle_root\"] =\
  \ hblockchain.merkle_root(block_0[\"tx\"], True)\nassert hblockchain.add_block(block_0)\
  \ == True\nblock_1[\"merkle_root\"] = hblockchain.merkle_root(block_1[\"tx\"], True)\n\
  block_1[\"prevblockhash\"] = hblockchain.blockheader_hash(block_0)\nassert hblockchain.add_block(block_1)\
  \ == True\nblock_2[\"merkle_root\"] = hblockchain.merkle_root(block_2[\"tx\"], True)\n\
  block_2[\"prevblockhash\"] = hblockchain.blockheader_hash(block_1)\nassert hblockchain.add_block(block_2)\
  \ == True\n```\n\n## 结论\n\n默克尔树在区块链应用中至关重要，主要有两个原因。首先，它使我们能够高效地测试交易列表是否被篡改。其次，我们可以使用这些树来验证特定交易是否存在于交易列表中。在本章中，我们研究了默克尔树，并编写了根据区块中的交易列表构建默克尔树的代码。\n\
  \n在下一章中，我们将为 Helium 编写交易代码并对其进行单元测试。\n\n脚注 1\n\n\n\n# 11. 氦气交易处理\n\n本章以代码为主。在前两章中，我们研究了加密货币交易的理论，并了解了如何使用*默克尔根*来验证区块中的交易是否被篡改。在本章中，我们将通过编写处理氦气交易的\
  \ Python 代码，将这些理论知识付诸实践。\n\n## 交易处理代码解读\n\n标准的交易处理工作流程如下。一个实体创建一笔交易，然后将该交易提交到氦气点对点网络进行处理。随后，该交易会被氦气挖矿节点获取。这些节点从事交易处理和挖矿活动，以获取奖励。在比特币中，奖励是部分新发行的比特币以及节点成功挖出的区块内交易附带的交易手续费。一笔交易的交易手续费可能为零。交易手续费的具体数额完全由进行价值转移的实体自行决定。矿工可以选择将一笔交易纳入其正在挖掘的区块，也可以拒绝纳入。因此，不同的矿工通常会在同一时间挖掘不同的区块。如果矿工成功将一个区块添加到区块链中，我们就说该矿工挖到了这个区块。氦气中的交易处理工作流程与此相同。\n\
  \n当矿工接收到一个区块时，它要做的第一件事就是验证交易的完整性。验证意味着对交易进行检查，以确定其包含有效的数值。例如，如果交易的*锁定时间*参数是负数，那么它就是无效的。验证的一个重要方面是确保价值转出方花费的是其拥有的价值。本章将介绍交易验证。如果一笔交易有效，它就可以成为矿工意图挖掘的区块的一部分。\n\
  \n矿工挖到一个区块后，会将其添加到自己的本地区块链中。然后，矿工在网络中广播这个新挖出的区块。接收到该区块的其他矿工也会将其添加到自己的本地区块链中。\n\n\
  假设一个矿工挖到了一个包含无效交易的区块。它可能会恶意地将该区块添加到自己的本地区块链副本中。但其他矿工会拒绝将该区块添加到他们的本地区块链中，因为他们会判定该区块包含无效交易。\n\
  \n值得注意的是，氦气网络上的矿工可能拥有彼此不同的本地区块链。但由于分布式共识机制，网络始终会收敛于一条主导区块链。我们将在后续章节中讨论这一点。由于分布式共识的工作方式，网络中不需要信任。我们并不关心某个挖矿节点是否在*恶意*行事。这是中本聪突破性的见解。\n\
  \n好了，让我们开始代码解读。将以下程序代码复制到一个名为 `tx.py` 的文件中，并将其保存在交易目录下。\n\n你会注意到，我们通常会将此模块中的函数体包裹在异常处理块中。\n\
  \n在像 Python 这样的动态类型语言中，调试过程主要包括在运行时检测和修复类型错误。这种负担会随着程序规模的增大而成指数级增长。这一因素使得动态类型的解释型语言不适合大规模程序开发。相比之下，Go\
  \ 和 C++ 是强类型语言。如果程序中存在类型错误，Go 和 C++ 程序根本不会编译通过。在 Go 中，一旦程序编译成功，调试运行时错误通常非常快（大概是\
  \ `O(n)`）。\n\n`tx` 模块中的核心函数是 `validate_transaction`；它负责验证交易的完整性。该函数执行以下测试：\n\n1.\
  \  验证所需的交易属性是否存在。\n2.  锁定时间大于或等于零。\n3.  锁定时间值小于 `hconfig` 模块中指定的最大值。\n4.  版本号有效。\n\
  5.  交易 ID 格式有效。\n6.  如果交易不是创世区块交易且不是 coinbase 交易，则 vin 列表的长度为正数。\n7.  对于创世区块交易或\
  \ coinbase 交易，vin 列表为空。\n8.  vin 列表的长度不大于 `hconfig` 模块中指定的最大允许长度。\n9.  vin 列表格式有效。\n\
  10. vout 列表的长度为正数。\n11. vout 列表的长度不大于 `hconfig` 模块中指定的最大允许长度。\n12. vout 列表元素格式有效。\n\
  13. 交易实现了 p2pkhash 脚本。\n14. 对消耗了其输出的前一笔交易的引用是有效的。\n15. 花费的总价值小于或等于可花费的总价值。\n16.\
  \ 交易中所有被花费的价值都大于零。\n17. 交易输入可以被解锁。也就是说，一个实体只能消耗它拥有的输入。\n18. 在其锁定时间过期之前，coinbase\
  \ 交易的价值不能被消耗。\n\n在 `tx` 模块中，`prevtx_value` 函数引用前一笔交易中未花费的价值。该函数在单元测试中被模拟，因为我们尚未实现用于获取未花费交易金额的\
  \ LevelDB 数据库。我们将在下一章中研究氦气数据库。`transaction_fee` 函数计算交易的交易手续费。\n\n`unlock_transaction_fragment`\
  \ 函数确定前一笔交易中的价值是否可以被解锁，以便在当前交易中使用。该函数实现了两章之前讨论过的 `p2pkhash` 堆栈处理器。\n\n\n\n### `tx.py`\
  \ 模块文档\n\n`tx.py`：`tx`模块定义了 Helium 交易的结构，并实现了基本的交易验证操作。\n\n```python\n\"\"\"\ntx.py:\
  \ The tx module defines the structure of Helium transactions and implements\nbasic\
  \ transaction validation operations.\n\"\"\"\nimport hconfig\nimport hblockchain\
  \ as hchain\nimport json\nimport rcrypt\nimport secrets\nimport pdb\nimport logging\n\
  \"\"\"\nlog debugging messages to the file debug.log\n\"\"\"\nlogging.basicConfig(filename=\"\
  debug.log\",filemode=\"w\", \\\nformat='%(asctime)s:%(levelname)s:%(message)s',level=logging.DEBUG)\n\
  ```\n\n### 交易结构\n\n每笔交易建模为字典：\n\n```json\n{\n\"transactionid\": \n\"version\": \
  \  \n\"locktime\":  \n\"vin\":       >\n\"vout\":      >\n}\n```\n\n- `transactionid`\
  \ 是当前交易的 ID。\n- `vin` 是可花费输入列表，这些输入由花费它们的实体拥有。每个可花费输入来自前一笔交易的`vout`列表。\n- 每个`vin`元素是一个字典对象，结构如下：\n\
  \n```json\nvin element:\n{\n\"txid\":             \n\"vout_index\":       \n\"ScriptSig\"\
  :        >\n}\n```\n\n- `txid` 是前一笔交易的交易 ID。\n- `vout_index` 是指向该前一笔交易`vout`列表的索引。\n\
  \n- `vout` 是一个列表，每个`vout`元素是一个字典，结构如下：\n\n```json\nvout element:\n{\n\"value\":\
  \  ,\n\"ScriptPubKey\": >\n}\n```\n\n### 函数文档\n\n#### `create_transaction()`\n\n\
  ```python\ndef create_transaction(transaction: 'dictionary', zero_inputs: 'boolean'=False)\
  \ -> 'bool':\n```\n\n创建一笔交易。接收一个交易对象和一个谓词。\n- `zero_inputs` 在交易是创世块交易或 coinbase\
  \ 交易时为`True`，否则为`False`。\n- 如果交易参数无效则返回`False`，否则返回`True`。\n\n#### `validate_transaction()`\n\
  \n```python\ndef validate_transaction(trans: \"dictionary\", zero_inputs: \"boolean\"\
  =False) -> \"bool\":\n```\n\n验证交易是否具有有效值。接收一笔交易和一个谓词。\n- `zero_inputs` 在交易是创世块交易或\
  \ coinbase 交易时为`True`，否则为`False`。\n\n执行以下交易验证测试：\n1. 必需的属性存在。\n2. `locktime` 大于或等于零。\n\
  3. `locktime` 小于规定值。\n4. 版本号有效。\n5. 交易 ID 格式有效。\n6. 对于非创世块和非 coinbase 交易，`vin`列表长度为正。\n\
  7. 对于 coinbase 交易，`vin`列表为空。\n8. 创世块不可有输入。\n9. `vin`列表长度不超过最大允许值。\n10. `vin`列表格式有效。\n\
