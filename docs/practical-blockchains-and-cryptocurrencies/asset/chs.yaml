  retd = json.loads(ret)\nfor addr in retd[\"result\"]:\nif address_list.count(addr)\
  \ == 0:\naddress_list.append(addr)\nreturn\ndef compare_transaction_lists(block):\n\
  \"\"\"\n测试收到的区块中的交易是否也存在于正在挖矿的候选区块中\n\"\"\"\nfor tx1 in block[\"tx\"]:\nfor tx2\
  \ in remove_list:\nif tx1 == tx2: return False\nreturn True\ndef start_mining():\n\
