  ].append(trx)\ntxctr += 1\nif ctr > 0:\nblock[\"prevblockhash\"] = \\\nhblockchain.blockheader_hash(hblockchain.blockchain[ctr\
  \ - 1])\nret = hblockchain.merkle_root(block[\"tx\"], True)\nassert ret != False\n\
  block[\"merkle_root\"] = ret\nret = hblockchain.add_block(block)\nassert ret ==\
  \ True\nblocks.append(block)\nctr+= 1\nreturn blocks\n###################################################\n\
  ### 构建模拟区块链\n###################################################\nstartup()\nmake_blocks(500)\n\
  print(\"finished synthetic blockchain construction\")\nstop()\n```\n\n## 目录文件约束\n\
  \n一个正在运行的 Helium 节点会在其 `data` 目录中积累大量的区块文件。这引发了一个问题，即一个目录中可以写入的最大文件数。此约束取决于底层操作系统。在使用\
  \ `ext4` 文件系统的 Linux 中，理论上对可以写入一个目录的文件数量没有限制。然而，我们仍然可以选择使用分片算法将区块写入到多个子目录中，例如：\n\
  \n```\n创建数据目录的 n 个子目录：0, 1, 2, 3, ... n-1\n对于每个区块：\n    计算该区块的 SHA-256 哈希值。\n  \
  \  将此哈希值转换为整数：hash_num。\n    计算 hash_num 对 n 的模：hash_mod = hash_num % n\n    将该区块写入目录\
  \ hash_mod\n```\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循注意事项和示例，将给定的英文文本翻译成中文。\n\n\n## 链状态维护\n\
  \n在典型的加密货币交易中，一个实体花费之前收到但尚未使用的交易价值。`Chainstate` 数据库跟踪加密货币生态系统中所有已花费和未花费的价值。每个这样的价值都表示为一个交易片段。在任何时间点，`Chainstate`\
  \ 提供系统中已花费和未花费片段的快照。您可以参考第 12 章来复习 `Chainstate` 的理论。\n\n如果一个 Helium 节点拥有区块链，它总是可以重建\
  \ `Chainstate` 数据库。以下伪代码算法实现了这一点：\n\n```\nfor each block:\nfor each transaction\
  \ in the block:\nlet transaction id be trnid.\nlet ctr = 0.\nfor each vout element\
  \ in the transaction:\nfragment_id = trnid + \"_\" + string(ctr)\nvalue = vout[\"\
  value\"]\nhash = RIPEMD160(SHA256(public_key))\nchainstate[fragment_id] = {\"value\"\
  : value,\n\"spent\": False,\n\"tx_chain\": \"\",\n\"pkhash\": hash\n}\nctr += 1\n\
  for each vin element in the transaction:\nfragment_id = vin[\"txid] + \"_\" + vin[\"\
  vout_index\"]\nchainstate[fragment_id] = {\"value\": value,\n\"spent\": True,\n\"\
  tx_chain\": some_fragment,\n\"pkhash\": hash\n}\n```\n\n以下程序代码从区块文件集合中从头重建 `Chainstate`\
  \ 数据库。您会注意到，此代码利用了 `hchaindb` 模块，特别是使用了该模块中的 `update_transaction()` 函数来构建 `Chainstate`\
  \ 数据库。\n\n为了运行此代码，请将其复制到文件 `build_chainstate.py` 中，并保存在 `unit_tests` 目录下。然后在 `unit_tests`\
  \ 目录下创建一个高度为 500 个区块的模拟区块链。最后，如果存在，删除 `unit_tests/helium` 子目录中的 `Chainstate` 数据库\
  \ `helium_db` (`rm -rf heliumdb`)。以下命令将重建 Chainstate：\n\n```\n$(virtual) python\
  \ build_chainstate.py\n###########################################################################\n\
  ### build_chainstate: Builds the chainstate database from the blockchain files.\n\
  ###########################################################################\nimport\
  \ hblockchain\nimport hchaindb\nimport pickle\nimport os.path\nimport pdb\ndef startup():\n\
  \"\"\"\nstart the chainstate database\n\"\"\"\n### start the Chainstate Database\n\
  ret = hchaindb.open_hchainstate(\"heliumdb\")\nif ret == False:\nprint(\"error:\
  \ failed to start Chainstate database\")\nreturn\nelse: print(\"Chainstate Database\
  \ running\")\ndef stop():\n\"\"\"\nstop the chainstate database\n\"\"\"\nhchaindb.close_hchainstate()\n\
  def build_chainstate():\n'''\nbuild the Chainstate database from the blockchain\
  \ files\n'''\nblockno  = 0\ntx_count = 0\ntry:\nwhile True:\n### test whether the\
  \ block file exists\nblock_file = \"block\" + \"_\" + str(blockno) + \".dat\"\n\
  if os.path.isfile(block_file)== False: break\n### load the block file into a dictionary\
  \ object\nf = open(block_file, 'rb')\nblock = pickle.load(f)\n### process the vout\
  \ and vin arrays for each block transaction\nfor trx in block[\"tx\"]:\nret = hchaindb.transaction_update(trx)\n\
  tx_count += 1\nif ret == False:\nraise(ValueError(\"failed to rebuild chainstate.\
  \ block no: \" + \\\nstr(blockno)))\nblockno += 1\nexcept Exception as err:\nprint(str(err))\n\
  return False\nprint(\"transactions processed: \" + str(tx_count))\nprint(\"blocks\
  \ processed: \" +  str(blockno))\nreturn True\n### start the chainstate build\n\
  print(\"start build chainstate\")\nstartup()\nbuild_chainstate()\nprint(\"chainstate\
  \ rebuilt\")\nstop()\n```\n\n`build_chainstate()` 函数位于附录 9。\n\n## blk_index 维护\n\
  \n在第 12 章中，我们讨论了 `blk_index` 数据库。这是一个键值存储，用于确定特定交易所在的区块。键是交易 ID，值是区块高度。\n\n与 `Chainstate`\
  \ 数据库一样，`blk_index` 数据库也可以从区块链文件重建。\n\n以下伪代码从区块链重建 `blk_index`：\n\n```\nfor block\
  \ in blockchain:\nfor transaction in block:\nblk_index[transaction[transactionid]]\
  \ = block[\"height\"]\n```\n\n以下模块 `build_blk_index` 用于重建 `blk_index` 存储。将以下代码复制到文件\
  \ `build_blk_index.py` 中，并保存在 `unit_tests` 目录下。如果存在，请删除 `hblk_index` 子目录。\n\n我们现在可以重建\
  \ `blk_index` 数据库：\n\n```\n$(virtual) python build_index.py\n#########################################################################\n\
  ### build_blk_index: rebuilds the blk_index database from the blockchain\n#########################################################################\n\
  import blk_index\nimport pickle\nimport os.path\nimport pdb\ndef startup():\n\"\"\
  \"\nstart/create the blk_index database\n\"\"\"\n### start the blk_index Database\n\
  ret = blk_index.open_blk_index(\"hblk_index\")\nif ret == False:\nprint(\"error:\
  \ failed to start blk_index database\")\nreturn\nelse: print(\"blk_index Database\
  \ running\")\nreturn True\ndef stop():\n\"\"\"\nstop the blk_index database\n\"\"\
  \"\nblk_index.close_blk_index()\ndef build_blk_index():\n'''\nbuild the blk_index\
  \ database from the blockchain\n'''\nblockno = 0\ntx_count = 0\ntry:\nwhile True\
  \ :\n### test whether the block file exists\nblock_file = \"block\" + \"_\" + str(blockno)\
  \ + \".dat\"\nif os.path.isfile(block_file)== False: break\n### load the block file\
  \ into a dictionary object\nf = open(block_file, 'rb')\nblock = pickle.load(f)\n\
  ### process the transactions in the block\nfor trx in block[\"tx\"]:\nret = blk_index.put_index(trx[\"\
  transactionid\"], blockno)\ntx_count += 1\nif ret == False:\nraise(ValueError(\"\
  failed to rebuild blk_index. block no: \" \\\n+ str(blockno)))\nblockno += 1\nexcept\
  \ Exception as err:\nprint(str(err))\nreturn False\nprint(\"transactions processed:\
  \ \" + str(tx_count))\nprint(\"blocks processed: \" +  str(blockno))\nreturn True\n\
  ### start the build_index build\nprint(\"start build blk_index\")\nret = startup()\n\
  if ret == False:\nprint(\"failed to open blk_index\")\nos._exit(-1)\nbuild_blk_index()\n\
  print(\"blk_index rebuilt\")\nstop()\n```\n\n## 结论\n\n在本章中，我们探讨了 Helium 的一些重要维护方面。这些包括为新节点获取区块链，以及在节点宕机或出现临时网络分区时同步节点所持有的区块链。我们还展示了从区块链文件重建\
  \ `Chainstate` 数据库和 `blk_index` 数据库的代码。\n\n在下一章中，我们将开发一个 Helium 用户钱包。\n\n脚注 1\n\n\
  # 17. Helium 钱包构建\n\n## 引言\n\n在本章中，我们将研究 Helium 钱包的构建。特别是，我们将讨论以下主题：\n\n1.  什么是钱包\n\
  2.  Helium 钱包接口\n3.  Helium 钱包程序代码\n4.  Helium 钱包 Pytest 代码\n\n比特币参考钱包的实现依赖于对完整比特币区块链的访问。同样，任何拥有完整\
  \ Helium 区块链或可以访问此区块链的 Helium 节点都可以创建和维护一个钱包。\n\n本章创建一个实现核心功能的基本命令行 Helium 钱包。一旦我们实现了核心功能，我们就可以为钱包增加额外的功能。例如，我们可以为我们的命令行钱包包装一个\
  \ GUI。\n\n## 什么是钱包\n\nHelium 钱包是一个执行以下功能的对象：\n\n1.  创建并维护私钥-公钥对\n2.  记录钱包持有者收到的\
  \ Helium\n3.  记录转给其他实体的 Helium\n4.  记录钱包持有者的最终 Helium 余额（截至查询时）\n5.  创建交易并在 Helium\
  \ 网络上传播\n6.  将钱包数据保存到文件\n\n\n\n## Helium 钱包接口\n\nHelium 钱包维护以下字典数据结构：\n\n```\nwallet_state\
  \ = {\n\"keys\": [],          # 私钥-公钥元组列表\n\"received\": [],      # 钱包持有者接收的值\n\"\
  spent\": [],         # 钱包持有者转移的值\n\"received_last_block_scanned\": 0,\n\"spent_last_block_scanned\"\
  : 0\n}\n```\n\n`wallet_state` 描述了钱包在某一时间点的状态。\n\n`wallet[\"keys\"]` 是钱包持有者拥有的私钥-公钥对元组列表。钱包应用程序可以创建私钥-公钥对。\n\
  \n`wallet[\"received\"]` 是钱包持有者收到的所有值的列表。该列表中的每个元素的结构如下：\n\n```\n{\n\"value\": value\n\
  \"blockno\": block_height\n\"fragmentid: transaction[\"transactionid\"] + \"_\"\
  \ + str(index)\n\"public_key\" = key_pair[1]\n}\n```\n\n`wallet[\"spent\"]` 是钱包持有者转移的所有值的列表。该列表中的每个元素与\
  \ `wallet[\"received\"]` 的结构相同。\n\n`wallet[\"received_last_block_scanned\"]` 是扫描区块链以查找收到的值时，最后扫描的区块链区块。\n\
  \n`wallet[\"spent_last_block_scanned\"]` 是扫描区块链以查找钱包持有者转移的值时，最后扫描的区块链区块。\n\n我们的\
  \ Helium 钱包包含以下接口函数：\n\n### 密钥管理\n\n```\ncreate_keys() -> \"public, private key\
  \ tuple\"\n```\n\n此函数创建一个可用于交易的公钥-私钥对。\n\n### 交易记录\n\n```\nvalue_received(block_height\
  \ -> \"integer\" = 0) ->   \"boolean\"\n```\n\n`value_received` 创建一个钱包持有者已接收的 Helium\
  \ 值列表。`block_height` 是一个可选参数，指示函数获取自指定高度（含该区块）以来接收的值。如果函数失败，则返回 `False`，否则返回 `True`。\n\
  \n`value_received` 创建或更新 `wallet_state[\"received\"]` 键值。\n\n该函数的算法基于以下观察：将值转移给钱包持有者的交易中的\
  \ `vout` 元素包含由钱包持有者生成的公钥，其编码形式为 `RIPEMD-160(SHA-256(public_key))`。\n\n该函数的伪代码如下：\n\
  \n```\nlet values_received = []\nfor each block where block[\"height\"] >= block_height:\n\
  for each transaction trx in the block:\nfor each vout array element in trx:\nfor\
  \ each public_key, pk, owned by the wallet holder:\nif RIPEMD-160(SHA-256(pk)) ==\
  \ vout_element[\"ScriptPubKey][3]:\nvalues_received.append {\nvalue: vout_element[value]\n\
  block: block[\"height\"]\ntransaction: trx[transactionid]\npublic_key: pk\n}\n```\n\
  \n函数 `value_spent` 创建一个钱包持有者已转移给其他实体的 Helium 值列表。`block_height` 是一个可选参数，指示函数获取自指定高度（含该区块）之后转移的值。\n\
  \n```\nvalue_spent(block_height -> \"integer\" = 0) ->   \"list\"\n```\n\n此函数基于以下观察：钱包持有者转移给某个实体的每个值，都会由交易中包含钱包持有者公钥的\
  \ `vin` 元素标识。以下伪代码实现了此功能：\n\n```\nlet values_spent = []\nfor each block where block[\"\
  height\"] >= block_height:\nfor each transaction trx in the block:\nfor each vin\
  \ list element, vin_element, in trx:\nfor each public_key, pk, owned by the wallet\
  \ holder:\nif pk == vin_element[\"ScriptPubKey][1]:\npointer = vin_element[transactionid]\
  \ + \"_\" + \\\nvin_element[vout_index]\nvalues_spent.append {\nvalue: vin_element[value],\n\
  block: block[\"height\"],\ntransaction: pointer,\npublic_key: pk\n}\n```\n\n###\
  \ 持久化\n\n```\nsave_wallet() → \"boolean\"\n```\n\n`save_wallet` 函数保存 `wallet_state`。具体来说，`wallet_state`\
  \ 被持久化到磁盘文件 `wallet.dat` 中：\n\n```\nload_wallet()   ->  \"dictionary\"\n```\n\n\
  此函数将 `wallet.dat` 中的所有钱包数据加载到 `wallet_state` 结构中。\n\n请注意，由于钱包状态已持久化，我们无需查询整个区块链来更新钱包。我们只需从参数\
  \ `received_last_block_scanned` 和 `spent_last_block_scanned` 指定的区块开始检查即可。\n\n\n\n\
  ## Helium 钱包程序代码\n\n将以下程序代码复制到一个名为 `wallet.py` 的文件中，并保存在 `wallet` 目录下：\n\n```\n\
  ###########################################################################\n###\
  \ wallet.rb: Helium 的命令行钱包\n###########################################################################\n\
  import hblockchain\nimport rcrypt\nimport pdb\nimport pickle\n### 钱包的状态\nwallet_state\
  \ = {\n\"keys\": [],          # 私钥-公钥元组列表\n\"received\": [],      # 钱包持有者接收的值\n\"\
  spent\": [],         # 钱包持有者转出的值\n\"received_last_block_scanned\": 0,\n\"spent_last_block_scanned\"\
  : 0\n}\ndef create_keys():\nkey_pair = rcrypt.make_ecc_keys()\nwallet_state[\"keys\"\
  ].append(key_pair)\ndef initialize_wallet():\nwallet_state[\"received\"] = []\n\
  wallet_state[\"spent\"] = []\nwallet_state[\"received_last_block_scanned\"] = 0\n\
  wallet_state[\"spent_last_block_scanned\"] = 0\ndef value_received(blockno:\"integer\"\
  =0) -> \"list\" :\n\"\"\"\n通过检查区块链中的交易，获取钱包持有者收到的所有 Helium 值。\n更新钱包状态。\n{\nvalue:\
  \  ,\nScriptPubKey: \n}\n\"\"\"\nhreceived = []\nrvalue = {}\n### 从区块链中获取接收的值\n\
  for block in hblockchain.blockchain:\nfor transaction in block[\"tx\"]:\nctr = -1\n\
  for vout in transaction[\"vout\"]:\nctr += 1\nfor key_pair in wallet_state[\"keys\"\
  ]:\nif rcrypt.make_RIPEMD160_hash(rcrypt.make_SHA256_hash(key_pair[1])) \\ == vout[\"\
  ScriptPubKey\"][2]:\nrvalue[\"value\"] = vout[\"value\"]\nrvalue[\"blockno\"] =\
  \ block[\"height\"]\nrvalue[\"fragmentid\"] = transaction[\"transactionid\"] + \"\
  _\" + str(ctr)\nrvalue[\"public_key\"] = key_pair[1]\nhreceived.append(rvalue)\n\
  break\n### 更新钱包状态\nif block[\"height\"] > wallet_state[\"received_last_block_scanned\"\
  ]:\nwallet_state[\"received_last_block_scanned\"] = block[\"height\"]\nfor received\
  \ in hreceived:\nwallet_state[\"received\"].append(received)\nreturn\ndef value_spent(blockno:\"\
  integer\"=0):\n\"\"\"\n通过检查区块链中的交易，获取钱包持有者转出的所有 Helium 值。\n更新钱包状态。\n\"\"\"\nhspent\
  \ = []\ntvalue = {}\n### 从区块链交易中获取转出的值\nfor block in hblockchain.blockchain:\nfor\
  \ transaction in block[\"tx\"]:\nctr = -1\nfor vin in transaction[\"vin\"]:\nctr\
  \ += 1\nfor key_pair in wallet_state[\"keys\"]:\nif rcrypt.make_RIPEMD160_hash(rcrypt.make_SHA256_hash(key_pair[1]))\
  \ \\ == vin[\"ScriptSig\"][1]:\ntvalue[\"value\"] = vin[\"value\"]\ntvalue[\"blockno\"\
  ] = block[\"height\"]\ntvalue[\"fragmentid\"] = transaction[\"transactionid\"] +\
  \ \"_\" +  str(ctr)\ntvalue[\"public_key\"] = key_pair[1]\nhspent.append(tvalue)\n\
  break\n### 更新钱包状态\nif block[\"height\"] > wallet_state[\"spent_last_block_scanned\"\
  ]:\nwallet_state[\"spent_last_block_scanned\"] = block[\"height\"]\nfor spent in\
  \ hspent:\nwallet_state[\"spent\"].append(spent)\nreturn\ndef save_wallet() -> \"\
  bool\":\n\"\"\"\n将钱包状态保存到文件\n\"\"\"\ntry:\nf = open('wallet.dat', 'wb')\npickle.dump(wallet_state,\
  \ f)\nf.close()\nreturn True\nexcept Exception as error:\nprint(str(error))\nreturn\
  \ False\ndef load_wallet() -> \"bool\":\n\"\"\"\n从文件加载钱包状态\n\"\"\"\ntry:\nf = open('wallet.dat',\
  \ 'rb')\nglobal wallet_state\nwallet_state = pickle.load(f)\nf.close()\nreturn True\n\
  except Exception as error:\nprint(str(error))\nreturn False\n```\n\n`wallet.py`\
  \ 包含扫描区块链并构建所有已接收交易值以及已发送交易值列表的函数。由于钱包状态会维护构建这些列表时最后扫描的区块标记（`received_last_block_scanned`\
  \ 和 `spent_last_block_scanned`），因此只要钱包只使用通过其 `create_keys` 函数创建的私钥-公钥对，我们就无需重新扫描区块链中已扫描的部分来创建这些列表。\n\
  \n如果我们决定从创世块开始重新扫描区块链，可以调用 `initialize_wallet` 函数。\n\n我将把编写一个接收 Helium 地址并创建交易的钱包函数代码留作读者练习，该交易将在\
  \ Helium 网络上传播（有关创建和转换 Helium 地址的算法，请参阅第 9 章）。可以添加到该钱包的另一个功能是自动将钱包持有者拥有的小额输入值合并为更大的值。\n\
  \n## Helium 钱包 Pytest 代码\n\n以下程序代码为我们的 Helium 钱包实现了 Pytest 测试。这些测试是使用模拟区块链的集成测试。将此代码复制到一个名为\
  \ `test_wallet.py` 的文件中，并将其保存在 `unit_tests` 目录下。像往常一样，我们可以通过以下命令运行这些测试：\n\n```\n\
  (virtual) $ pytest test_wallet.rb\n```\n\n执行这些测试应显示 13 个测试通过。\n\n\n\n```python\n\
  ######################################################\n### test_wallet.rb\n######################################################\n\
  import hchaindb\nimport hmining\nimport hconfig\nimport hblockchain\nimport rcrypt\n\
  import tx\nimport wallet\nimport json\nimport logging\nimport os\nimport pdb\nimport\
  \ pytest\nimport secrets\nimport sys\nimport time\n\n\"\"\"\n将调试信息记录到文件 debug.log\
  \ 中\n\"\"\"\nlogging.basicConfig(filename=\"debug.log\", filemode=\"w\", \n    \
  \                format='client: %(asctime)s:%(levelname)s:%(message)s', level=logging.DEBUG)\n\
  \n\ndef setup_module():\n    \"\"\"\n    启动数据库\n    \"\"\"\n    # 启动 Chainstate\
  \ 数据库\n    ret = hchaindb.open_hchainstate(\"heliumdb\")\n    if ret == False:\n\
  \        print(\"错误：无法启动 Chainstate 数据库\")\n        return\n    else:\n        print(\"\
  Chainstate 数据库运行中\")\n\n    # 创建一个高度为 5 的模拟区块链\n    make_blocks(5)\n\n\ndef teardown_module():\n\
