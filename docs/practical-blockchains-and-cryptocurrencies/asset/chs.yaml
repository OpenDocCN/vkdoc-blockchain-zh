  \ 3-2 取自对 40,000 个单词的分析，分类列出了大量文本样本中字母出现的频率。^(⁸)\n\n**表 3-2** 英文字符的频率分布\n\n| a |\
  \ 8.12 | b | 1.49 | c | 2.71 | d | 4.32 |\n| e | 12.02 | f | 2.30 | g | 2.03 | h\
  \ | 5.92 |\n| i | 7.31 | j | 0.10 | k | 0.69 | l | 3.98 |\n| m | 2.61 | n | 6.95\
