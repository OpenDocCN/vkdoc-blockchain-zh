  \    # decode 函数将字节序列转换为字符串\n    address = address.decode(\"ascii\")\n    return\
  \ address\n```\n\n#### `validate_address(address: 'string') -> bool`\n\n使用附加到地址的四字符校验和验证\
  \ Helium 地址。接收 base58 编码的地址。\n\n```python\ndef validate_address(address: 'string')\
  \ -> bool:\n    \"\"\"\n    使用附加到地址的四字符校验和验证 Helium 地址。\n    接收 base58 编码的地址。\n\
  \    \"\"\"\n    # 将字符串地址编码为字节序列\n    addr = address.encode(\"ascii\")\n    # 反转地址的\
  \ base58 编码\n    addr = base58.b58decode(addr)\n    # 将地址转换为字符串\n    addr = addr.decode(\"\
  ascii\")\n    # 长度必须为 RIPEMD-160 哈希长度 + 校验和长度 + 1\n    if (len(addr) != 45): return\
  \ False\n    if (addr[0] != '1'):  return False\n    # 提取校验和\n    extracted_checksum\
  \ = addr[len(addr) - 4:]\n    # 从 addr 中提取校验和并计算剩余 addr 字符串的 SHA-256 哈希\n    tmp\
  \ = addr[:len(addr)- 4]\n    tmp = make_SHA256_hash(tmp)\n    # 从 tmp 获取计算出的校验和\n\
  \    checksum = tmp[len(tmp) - 4:]\n    if extracted_checksum == checksum: return\
  \ True\n    return False\n```\n\n#### `make_uuid() -> 'string'`\n\n生成一个编码为十六进制字符串的全局唯一\
  \ 256 位 ID，用作交易标识符。使用 Python 标准库 `secrets` 模块生成加密安全的随机 32 字节字符串，该字符串被编码为十六进制字符串（64\
  \ 字节）。\n\n```python\ndef make_uuid() -> 'string':\n    \"\"\"\n    生成一个编码为十六进制字符串的全局唯一\
  \ 256 位 ID，\n    用作交易标识符。使用 Python 标准库 secrets 模块\n    生成加密安全的随机 32 字节字符串，该字符串被编码为十六进制字符串（64\
  \ 字节）\n    \"\"\"\n    id = secrets.token_hex(32)\n    return id\n```\n\n---\n\n\
  ## Pytest 入门指南\n\n单元测试为我们提供了代码正确性的保证。因此，我们应该始终努力使用单元测试来提供高覆盖率的代码。从概念上讲，单元测试测试的是代码中一个小的独立片段。这段代码通常是一个函数，但也可以是像单个表达式或一组表达式这样的小片段。\n\
  \n我们将使用 Python 的 `Pytest` 模块对我们的模块执行单元测试。如果你不熟悉 `Pytest` 单元测试框架，可以阅读附录 3。附录 3 是关于如何使用\
  \ `Pytest` 的综合教程。本书的最后一个附录提供了所有用于 Helium 的 `Pytest` 文件。\n\n\n\n## rcrypt 单元测试\n\n\
  从你的 Helium 虚拟环境根目录安装 `pytest` 模块：\n\n```\n$(virtual) pip install pytest\n```\n\n\
  在你的虚拟环境中的 `unit_tests` 目录下创建一个名为 `test_rcrypt.py` 的文件，然后将以下源代码复制到该文件中。进入 `unit_tests`\
  \ 目录并运行测试：\n\n```\n$(virtual) pytest test_rcrypt.py -s\n```\n\n`-s` 限定符是可选的。它用于提供更详细的输出：\n\
  \n```python\n\"\"\"\n针对 rcrypt 模块的 pytest 单元测试\n\"\"\"\nimport pytest\nimport rcrypt\n\
  import pdb\n\n@pytest.mark.parametrize(\"input_string, value\", [\n('hello world',\
  \ True),\n('the quick brown fox jumped over the sleeping dog', True),\n('0', True),\n\
  ('', True)\n])\ndef test_make_SHA256_hash(input_string, value):\n    \"\"\"\n  \
  \  测试是否创建了 SHA-256 消息摘要\n    \"\"\"\n    ret = rcrypt.make_SHA256_hash(input_string)\n\
  \    assert rcrypt.validate_SHA256_hash(ret) == value\n\n@pytest.mark.parametrize(\"\
  input_string, value\", [\n('a silent night and a pale paper moon over the saskatchewan\
  \ river', 64),\n('Farmer Brown and the sheep-dog', 64),\n('', 64)\n])\ndef test_SHA256_hash_length(input_string,\
  \ value):\n    \"\"\"\n    测试以十六进制格式创建的 SHA3-256 哈希长度是否为 64 字节\n    \"\"\"\n   \
  \ assert len(rcrypt.make_SHA256_hash('hello world')) == 64\n\n@pytest.mark.parametrize(\"\
  digest, value\", [\n(\"123\", False),\n(\"644bcc7e564373040999aac89e7622f3ca71fba1d972fd94a31c3bfbf24e3938\"\
  , True),\n(\"644bcc7e564373040999aac89e7622f3ca71fba1d972fd94a31c3bfbf24e39380\"\
  , False),\n(\"644bcc7e564373040999aac89e7622f3ca71fba1d972fd94a31cZbfbf24e3938\"\
  , False),\n('', False),\n(\"644bcc7e564373040999aac89e7622f3caz1fba1d972fd94a31c3bfbf24e3938\"\
  , False),\n])\ndef test_validate_SHA256_hash(digest, value):\n    \"\"\"\n    验证是否生成了有效的\
  \ SHA-256 消息摘要格式\n    \"\"\"\n    assert rcrypt.validate_SHA256_hash(digest) ==\
  \ value\n\n@pytest.mark.parametrize(\"string_input, value\", [\n(\"0\", True),\n\
  ('andromeda galaxy', True),\n('Farmer Brown and the sheep-dog', True),\n('0', True)\n\
  ])\ndef test_make_RIPEMD160_hash(string_input, value):\n    \"\"\"\n    验证是否生成了有效的\
  \ RIPEMD-160 消息摘要格式\n    \"\"\"\n    ret = rcrypt.make_RIPEMD160_hash(string_input)\n\
  \    assert rcrypt.validate_RIPEMD160_hash(ret) == value\n\n@pytest.mark.parametrize(\"\
  hash, value\", [\n('123456789098765432169Q156c79FFa1200CCB1A', False),\n(\"lkorkflfor4flgofmr\"\
  , False),\n('off0099ijf87', False),\n('1234567890A87654321690156c79FFa1200CCB1A',\
  \ True),\n])\ndef test_validate_RIPEMD160_hash(hash, value):\n    \"\"\"\n    验证一个字符串是否为\
  \ RIPEMD-160 消息摘要格式\n    \"\"\"\n    assert rcrypt.validate_RIPEMD160_hash(hash)\
  \ == value\n\ndef test_make_ecc_keys():\n    \"\"\"\n    测试 ECC 公私钥对\n    \"\"\"\
  \n    ecc_keys = rcrypt.make_ecc_keys()\n    assert ecc_keys[0].find(\"BEGIN PRIVATE\
  \ KEY\") >= 0\n    assert ecc_keys[0].find(\"END PRIVATE KEY\") >= 0\n    assert\
  \ ecc_keys[0].find(\"END PRIVATE KEY\") > ecc_keys[0].find(\"BEGIN PRIVATE KEY\"\
  )\n    assert ecc_keys[1].find(\"BEGIN PUBLIC KEY\") >= 0\n    assert ecc_keys[1].find(\"\
  END PUBLIC KEY\") >= 0\n    assert ecc_keys[1].find(\"END PUBLIC KEY\") > ecc_keys[1].find(\"\
  BEGIN PUBLIC KEY\")\n\n@pytest.mark.parametrize(\"message, value\", [\n('50bfee49c706d766411777aac1c9f35456c33ecea2afb4f3c8f1033b0298bdc9',\
  \ True),\n('6e6404d8693aea119a8ef7cf82c56fe96555d8df2c36c2b9e325411fbef62014', True),\n\
  ('ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad', True),\n('hello\
  \ world', True) ,\n])\ndef test_sign_message(message, value):\n    \"\"\"\n    对消息进行数字签名，然后验证它\n\
  \    \"\"\"\n    ecc_tuple = rcrypt.make_ecc_keys()\n    priv_key  = ecc_tuple[0]\n\
  \    pub_key   = ecc_tuple[1]\n    sig = rcrypt.sign_message(priv_key, message)\n\
  \    ret = rcrypt.verify_signature(pub_key, message, sig)\n    assert ret == value\n\
  \n@pytest.mark.parametrize(\"prefix, value\", [\n(\"a\", False),\n(\"1\", True),\n\
  (\"Q\", False),\n(\"qwerty\", False),\n(\"\", False),\n])\ndef test_make_address(prefix,\
  \ value):\n    \"\"\"\n    测试从种子生成 Helium 地址\n    \"\"\"\n    ret = rcrypt.make_address(prefix)\n\
  \    assert rcrypt.validate_address(ret) == value\n\n@pytest.mark.parametrize(\"\
  length, ret\", [\n(64, True),\n(32, False)\n])\ndef test_make_uuid(length, ret):\n\
  \    \"\"\"\n    测试 ID 生成\n    \"\"\"\n    id = rcrypt.make_uuid()\n    assert (len(id)\
  \ == length) == ret\n```\n\n你应该会看到 33 个单元测试通过。\n\n## Python 日志记录器\n\n你会注意到，我们广泛使用\
  \ Python 日志记录器来协助调试源代码。以下示例演示了其用法：\n\n```python\nimport logging\nlogging.basicConfig(filename=\"\
  debug.log\", format='%(asctime)s:%(levelname)s:%(message)s',\n                 \
  \   level=logging.DEBUG)\n...\ndef adder(x, y):\n    z = x + y\n    logging.debug(\"\
  This is a debug message\")\n    logging.info(\"Informational message, output = \"\
  \ + str(z))\n    if z != x + y:\n        logging.error(\"An error has happened!\"\
  )\n    return z\n```\n\n`logging.basicConfig` 函数的参数指定将所有日志输出写入 `debug.log` 文件，并且所有严重级别为\
  \ `logging.DEBUG` 或更高的日志消息都将被记录。按严重性递增顺序排列的日志级别为：\n\n```\nDEBUG, INFO, WARNING,\
  \ ERROR, CRITICAL\n```\n\n日志记录器的第二个参数是可选的；它指定了日志记录器输出的格式。\n\n一旦设置了日志记录器的配置，我们可以像这样为该日志记录器指定一条日志消息：\n\
  \n```\nlogger.SEVERITY_LEVEL(\"Some String %s: %s\", message_1, message_2)\n```\n\
  \n`SEVERITY_LEVEL` 是一个日志级别：`DEBUG`、`INFO`、...、`CRITICAL`。\n\n例如，这将生成如下输出：\n\n```\n\
  2020-02-01 16:05:03,969:SEVERITY_LEVEL:validate_block: nonce is negative\n```\n\n\
  默认情况下，日志记录器会将消息追加到日志文件。我们可以通过指定可选的 `filemode` 参数来指示日志记录器覆盖现有日志文件：\n\n```python\n\
  logging.basicConfig(filename=\"debug.log\", filemode='w', level=DEBUG)\n```\n\n\n\
  \n## Helium 区块结构\n\n在本节中，我们将讨论 Helium 区块的结构。回顾第 6 章，你应记得区块链是一个经过加密验证的有序且不可变的区块集合。每个\
  \ Helium 区块都是一个交易的容器。\n\n区块是如下的字典数据结构（尖括号内描述的是区块属性的类型）：\n\n```\n{\n\"prevblockhash\"\
  :   \n\"version\":         \n\"timestamp\":       \n\"difficulty_bits\": \n\"nonce\"\
  :           \n\"merkle_root\":     \n\"height\":          \n\"tx\":            \
  \  \n}\n```\n\n在 Python 中，整数是一种有符号整数。Python 3 消除了普通整数与长整数之间的区别。整数可以有任意大小，仅受内存限制。Python\
  \ 可以执行任意大小的整数算术运算。\n\n`prevblockhash` 是前一区块头部的 SHA-256 消息摘要，以十六进制字符串格式表示。该值用于检测前一区块是否被篡改。创世区块的\
  \ `prevblockhash` 值是空字符串。\n\n区块属性的子集 `prevblockhash`、`version`、`timestamp`、`difficulty_bits`、`nonce`\
  \ 和 `merkle_root` 被称为区块头部。区块头部不包含交易列表。由于 Merkle 根包含在头部中，我们可以仅通过对头部计算 SHA-256 消息摘要来检验整个区块（包括交易）的有效性。\n\
  \n`version` 是该区块所属 Helium 的版本号。该属性在 Helium 配置模块中设置，值为“1”。\n\n`timestamp` 是区块创建时的\
  \ Unix 时间戳（纪元时间）。纪元时间是指自格林威治标准时间（即 UTC）1970 年 1 月 1 日午夜以来所经过的秒数。它标志着 Unix 的诞生。\n\
  \n`difficulty_bits` 是 Helium 配置模块中定义的 `DIFFICULTY_BITS` 值。这是该区块被挖掘时的值。请注意，`DIFFICULTY_BITS`\
  \ 参数会随着平均挖矿时间调整至十分钟而周期性变化。\n\n`nonce` 是在 Helium 挖矿算法中使用的数字。\n\n`merkle_root` 是一个\
  \ SHA-256 十六进制字符串。Merkle 根使我们能够确保区块中的交易未被篡改。它还能让我们判断特定交易是否存在于该区块中。我们将在后续章节中讨论这个值。\n\
  \n`height` 是该区块的高度。区块链中的区块按照分布式共识算法有序排列，可以形象地看作是逐个堆叠。第一个区块，即创世区块，其高度为 0。\n\n`tx`\
  \ 是交易列表。列表中的交易数量受区块最大允许大小的限制。在 Helium 配置模块中，此值设置为 1 MB。\n\n既然我们已经定义了区块，我们就可以定义一个\
  \ Helium 区块链：\n\n```\nblockchain = []\n```\n\n区块链是一个列表，每个列表元素都是一个区块。^(⁴¹)\n\n##\
  \ Helium 区块链详解\n\n现在我们准备详解 Helium 区块链代码。将以下程序代码复制到一个名为 `hblockchain.py` 的文件中，并将该文件复制到\
  \ `block` 目录下。这并非区块链模块的完整程序代码，因为交易和数据库操作已被抽象化处理。由于我们尚未开发交易和数据库模块的代码，我们将对这些模块的操作使用合成值进行模拟。\n\
  \nHelium 区块链代码使用了 `json` 和 `pickle` 模块。这两个模块都是 Python 标准库的一部分，因此无需安装它们。JSON 是一种数据交换标准，可以将\
  \ Python 对象编码为字符串，然后将这些字符串解码回相应的对象。`Pickle` 通过将对象转换为字节序列，并将此序列写入文件来序列化对象。这个过程称为序列化。`Pickle`\
  \ 可以反序列化文件以恢复原始对象。如果你之前从未使用过 `Pickle`，附录 5 提供了关于 Pickle 用法的简明介绍。\n\n`add_block`\
  \ 函数将一个区块添加到 Helium 区块链中。该函数接收一个区块。函数会检查区块属性是否具有有效值。特别地，它验证区块中包含的交易是否有效。如果区块无效，函数返回假值。如果区块有效，函数通过\
  \ Pickle 模块将区块序列化到一个原始字节文件中。然后，该区块被添加到内存中的区块链列表中。\n\n`serialize_block` 函数使用 Pickle\
  \ 将区块序列化到 `data` 目录下。文件名构造方式如下：\n\n```\nfilename = \"block_\" + block_height + \"\
  .dat\"\n```\n\n`read_block` 函数接收一个区块链中的索引，并返回该索引对应的区块。如果索引越界，将抛出异常。\n\n`blockheader_hash`\
  \ 函数接收一个区块，并返回区块头部的 SHA-256 消息摘要（十六进制字符串）。再次注意，由于 Merkle 根可用于检验区块中的交易是否被篡改，我们无需对整个区块内容计算\
  \ SHA-256 加密哈希。仅对包含 Merkle 根的区块头部计算该值就足够了。\n\n`validate_block` 函数测试区块是否具有有效值。该函数还通过比较\
  \ SHA-256 消息摘要来验证上一个区块。\n\n`hblockchain` 及其他 Helium 模块的最终程序代码清单可参阅本书附录 10。\n\n\n\
  \n## Helium 区块链模块\n\n`hbockchain.py`：该模块用于创建和维护 Helium 区块链。以下是该模块的部分实现。\n\n```python\n\
  import rcrypt\nimport hconfig\nimport json\nimport pickle\nimport pdb\nimport logging\n\
  import os\n```\n\n将调试信息记录到 `debug.log` 文件中。\n\n```python\nlogging.basicConfig(filename=\"\
  debug.log\", filemode=\"w\",\n                    format='%(asctime)s:%(levelname)s:%(message)s',\
  \ level=logging.DEBUG)\n```\n\n### 区块结构\n\n一个区块是一个具有以下结构的 Python 字典。属性类型用尖括号表示。\n\
  \n```\n{\n\"prevblockhash\":   \n\"version\":         \n\"timestamp\":       \n\"\
  difficulty_bits\": \n\"nonce\":           \n\"merkle_root\":     \n\"height\": \
  \         \n\"tx\":              \n}\n```\n\n区块链是一个列表，其中每个列表元素是一个区块。当被矿工使用时，这也被称为主区块链。\n\
  \n```python\nblockchain = []\n```\n\n### 函数\n\n#### `add_block(block: \"dictionary\"\
  ) -> \"bool\"`\n\n`add_block`：向区块链添加一个区块。接收一个区块。会检查区块属性的有效性，并测试区块中每笔交易的有效性。如果没有错误，该区块将以原始字节序列的形式写入文件。然后将该区块添加到区块链中。如果区块成功添加到区块链则返回\
  \ True，否则返回 False。\n\n```python\ndef add_block(block: \"dictionary\") -> \"bool\"\
  :\n    try:\n        # 验证接收到的区块参数\n        if validate_block(block) == False:\n\
  \            raise(ValueError(\"block validation error\"))\n        # 将区块序列化到文件\n\
  \        if (serialize_block(block) == False):\n            raise(ValueError(\"\
  serialize block error\"))\n        # 将区块添加到内存中的区块链\n        blockchain.append(block)\n\
  \    except Exception as err:\n        print(str(err))\n        logging.debug('add_block:\
  \ exception: ' + str(err))\n        return False\n    return True\n```\n\n#### `serialize_block(block:\
  \ \"dictionary\") -> \"bool\"`\n\n`serialize_block`：使用 pickle 将区块序列化到文件。如果区块序列化成功则返回\
  \ True，否则返回 False。\n\n```python\ndef serialize_block(block: \"dictionary\") -> \"\
  bool\":\n    index = len(blockchain)\n    filename = \"block_\" + str(index) + \"\
  .dat\"\n    # 创建区块文件并序列化区块\n    try:\n        f = open(filename, 'wb')\n       \
  \ pickle.dump(block, f)\n    except Exception as error:\n        logging.debug(\"\
  Exception: %s: %s\", \"serialize_block\", error)\n        f.close()\n        return\
  \ False\n    f.close()\n    return True\n```\n\n#### `read_block(blockno: 'long')\
  \ -> \"dictionary or False\"`\n\n`read_block`：接收一个指向 Helium 区块链的索引。返回一个区块，如果该区块不存在则返回\
  \ False。\n\n```python\ndef read_block(blockno: 'long') -> \"dictionary or False\"\
  :\n    try:\n        block = blockchain[blockno]\n        return block\n    except\
  \ Exception as error:\n        logging.debug(\"Exception: %s: %s\", \"read_block\"\
  , error)\n        return False\n    return block\n```\n\n#### `blockheader_hash(block:\
  \ 'dictionary') -> \"False or String\"`\n\n`blockheader_hash`：计算并返回区块头的 SHA-256\
  \ 消息摘要，格式为十六进制字符串。接收一个需要计算区块头哈希的区块。如果出错则返回 False，否则返回一个 SHA-256 十六进制字符串。区块头包含以下区块字段：(1)\
  \ `version`，(2) `prevblockhash`，(3) `merkle_root`，(4) `timestamp`，(5) `difficulty_bits`，以及\
  \ (6) `nonce`。\n\n```python\ndef blockheader_hash(block: 'dictionary') -> \"False\
  \ or String\":\n    try:\n        hash = rcrypt.make_SHA256_hash(block['version']\
  \ + block['prevblockhash'] +\n                                       block['merkle_root']\
  \ + str(block['timestamp']) +\n                                       str(block['difficulty_bits'])\
  \ + str(block['nonce']))\n    except Exception as error:\n        logging.debug(\"\
  Exception:%s: %s\", \"blockheader_hash\", error)\n        return False\n    return\
  \ hash\n```\n\n#### `validate_block(block: \"dictionary\") -> \"bool\"`\n\n`validate_block`：接收一个区块并验证其所有属性是否具有有效值。如果区块有效则返回\
  \ True，否则返回 False。\n\n```python\ndef validate_block(block: \"dictionary\") -> \"\
  bool\":\n    try:\n        if type(block) != dict:\n            raise(ValueError(\"\
  block type error\"))\n        # 验证标量区块属性\n        if type(block[\"version\"]) !=\
  \ str:\n            raise(ValueError(\"block version type error\"))\n        if\
