  \  |\n\n对英语中 40,000 个单词的分析也显示了最常见的 12 个二合字母的频率分布，如表 3-3 所示。^(⁹)\n\n**表 3-3** 最常见的\
  \ 12 个二合字母的频率分布\n\n| th | 1.52 | he | 1.28 | in | 0.94 | er | 0.94 |\n| an | 0.82\
  \ | re | 0.68 | nd | 0.63 | at | 0.59 |\n| on | 0.57 | nt | 0.56 | ha | 0.56 | es\
  \ | 0.56 |\n\n密码分析利用这些语言结构特征来解读密文。这种分析表明，一个好的加密算法会执行多个替换和置换步骤，以改变或掩盖这些语言特征。在理想的加密算法中，所有二合字母、三合字母以及\
  \ n 词组合在密文中出现的概率应该相等。其他密码分析技术则利用单词顺序和语法规则。\n\n加密算法的另一个理想特性是，明文中的微小变化应导致密文发生巨大变化，这称为雪崩效应。雪崩效应能够挫败差分密码分析，后者试图通过检查由同一算法加密的不同消息之间的差异来解码密文。\n\
  \n除了密码分析，语言分析在自然语言处理领域也非常重要。自然语言处理在聊天机器人、垃圾邮件过滤器、语言翻译器的设计中，以及在情感分析、行为预测和分类方面都有重要应用。\n\
  \n### 高级加密标准\n\n高级加密标准是美国国家标准与技术研究院推荐的对称加密算法。1997 年，NIST 宣布了一项竞赛，以取代老化的数据加密标准。四年后的\
  \ 2001 年，AES 在多个竞争加密设计中脱颖而出，被选为获胜者。AES 被世界各地的政府和金融机构广泛使用。它是一种非常快速的加密器。由于其体积小巧，AES\
  \ 应用于从微控制器到超级计算机的各种设备中。AES 处理 128 位的明文块，并支持 128、192 和 256 位的加密密钥长度。如果选择的密钥长度为 128\
  \ 位，它使用 10 轮加密；如果密钥为 192 位，则使用 12 轮；如果密钥为 256 位，则使用 14 轮。\n\n表 3-4 列举了一些著名的对称加密算法及其特性。\n\
  \n**表 3-4** 对称加密算法\n\n| 名称 | 引入年份 | 分组大小（位） | 密钥长度（位） | 轮数 |\n| --- | --- | ---\
  \ | --- | --- |\n| AES | 2001 | 128 | 128, 192, 256 | 10, 12, 14 |\n| Serpent^(¹⁰)\
  \ | 2001 | 128 | 128, 192, 256 | 32 |\n| RC2 | 1987 | 64 | 8–1024 | 18 |\n| Twofish^(¹¹)\
  \ | 2001 | 128 | 128, 192, 256 | 18 |\n\n### 密钥分发问题\n\n一方要解密密文，必须拥有密钥。当必须将密钥分发给大量接收者时，问题就出现了。在这种情况下，敌方很有可能截获并盗用该密钥。当加密密钥需要分发给大量用户时，对称密钥加密并不是一种合适的技术。解决这个密钥分发问题的方法在于一种称为公钥加密的密码技术，我们将在后续章节中研究它。\n\
  \n\n\n## 伪随机数生成器\n\n许多密码学算法需要使用一个或多个随机数，通常用于使用种子初始化进程、生成密钥、设定随机数、指定盐值或随机化变量。与通过采样自然过程或计算机上的某个过程来获取随机数不同，常见的做法是使用一个数学函数来生成一系列伪随机数。生成这种序列的函数被称为伪随机数生成器（`PRNG`）。`PRNG`的工作原理如下：`PRNG`被植入一个称为种子的随机数，然后它会递归地生成一个确定性的数字序列。请注意，给定特定的种子，`PRNG`将始终生成相同的数字序列。\n\
  \n一个好的伪随机数生成器具有统计特性，使其很难与真正的随机数序列区分开来。特别是，在一个高质量的`PRNG`中，连续的数字之间没有相关性，并且`PRNG`在数字开始重复之前具有非常大的周期。\n\
  \n线性同余生成器（`LCG`）是一种常用的`PRNG`。它有一个简单的定义：\n\n```\nXn+1 = (m*xn + a) mod P\nP >= 2\
  \ 是一个整数。 P 是 PRNG 的周期。\n整数系数 m 被称为乘数； m > 0 且 m < P。\n整数 a 被称为加数； a > 0 且 a < P。\n\
  生成器的初始值 x0 是种子。\nxn 是由该函数生成的第 n 个伪随机数。\n```\n\n请注意，`LCG`是一个递归函数。它非常容易实现，并且具有作为快速伪随机数生成器的优势。`LCG`的统计随机性对模数值\
  \ `P` 和所选的种子非常敏感。GNU C 库 `glibc` 在其 `LCG` 规范中使用了周期 `2⁴⁵`、乘数值 `25214903917` 和种子值\
  \ `11`。\n\n以下代码在 Python 中实现了线性同余生成器：\n\n```\nclass LCG:\n    def __init__(self,mult,addr,prd,seed):\n\
  \        self.multiplier = mult\n        self.addr = addr\n        self.period =\
  \ prd\n        self.lastValue = seed\n    def generator(self):\n        self.lastValue\
  \ = (self.multiplier*self.lastValue + self.addr) % self.period\n        return self.lastValue\n\
  \nlcg = LCG(11, 37, 1000, 0)\nctr = 0\nwhile ctr < 10:\n    ret = lcg.generator()\n\
  \    print(ret)\n    ctr += 1\n```\n\n梅森旋转算法是另一种备受关注的高质量 `PRNG`。在其最常见的推导中，它使用梅森素数\
  \ `2¹⁹⁹³⁷ – 1` 作为种子，并且其周期为 `2¹⁹⁹³⁷ – 1`。\n\n## 结论\n\n在本章中，我们研究了对称加密算法的设计以及对这些算法的密码分析。我们还了解了高级加密标准，这是一种广泛使用的加密算法。向大量用户分发加密密钥是一个严重的问题，因为它增加了密钥在分发过程中被盗的可能性。在后续章节中，我们将展示公钥加密如何解决密钥分发难题。最后，我们详细阐述了伪随机数生成器。\n\
  \n在下一章中，我们将研究密码学哈希函数。这些函数在区块链设计中尤其重要。\n\n## 密码学哈希函数\n\n不要被本章的标题吓到。密码学哈希函数的理论并非特别深奥。困难的是从头开始构建这些函数。然而，我们无需担心数学理论的这一方面，因为大多数编程语言库都为我们提供了丰富的函数可供选择。\n\
  \n密码学哈希函数涉及一个非常实际的问题：确定文档或文本字符串是否被恶意行为者篡改过。这些函数在区块链和加密货币应用的发展中扮演着非常重要的角色，因此，充分理解这些函数的数学理论对你来说至关重要。\n\
  \n## 密码学哈希简介\n\n设想这样一个场景。假设你我位于银河系的两端，我给你发送了一条消息。现在，收到消息后，你希望确信消息在传输过程中没有被某些不友好的外星人篡改。其次，你希望确信这条消息确实是我发送的，而不是某个冒名顶替者。进一步假设你无法与我进行安全通信来确认这两个问题。密码学哈希（或者如果你愿意，可以称之为密码学哈希函数）解决了消息在传输过程中是否被篡改的问题。在本章中，我们将研究这些函数。在后续关于数字签名的章节中，我们将探讨真实性问题：文档或消息是否真的由声称是作者的人所编写？\n\
  \n我可以利用的一种方式来让你确信消息在传输过程中未被篡改，即发送给你一串称为消息摘要的字符，这串字符以某种方式与消息相关联。假设你可以将消息输入一台机器，如果这台机器产生的消息摘要与你发送给我的消息摘要相匹配，那么你就可以断定消息未被更改。如果这台机器输出的字符串与你发送给我的消息摘要不匹配，那么你就可以断定消息在传输过程中被更改了。如果这样的机器满足一些即将讨论的约束条件，它就被称为密码学哈希函数（或密码学哈希算法）。\n\
  \n由这样的机器或密码学哈希函数产生的字符串输出被称为密码学哈希或消息摘要。通常，这个输出被简单（但不正确地）称为哈希。\n\n我们想要构建的机器是一个数学函数或数学算法。那么，我们如何构建这样的函数呢？\n\
  \n## 密码学哈希函数\n\n哈希函数是一种将任意长度的字符串作为输入，并产生一个字符串作为输出的函数。举个简单的例子，考虑函数 `y = F(x)`，它接受一个字符串\
  \ `x` 作为输入，并输出一个字符串，其中输入字符串中的每个字符都输出其下一个字符：\n\n```\nF('crypto') = 'dszqup'\n```\n\
  \n这是一个非常简单的哈希函数，但它不是一个密码学哈希函数，因为它不满足一些必要条件。\n\n密码学哈希函数是一种哈希函数，它具有四个基本属性：\n\n-  \
  \ 该函数产生固定长度的输出字符串。\n-   该函数是免碰撞的。\n-   该函数是不可逆的。\n-   该函数可以被高效计算。\n\n**注意**\n\n\
  我们可以构建输出数字而非字符串的哈希函数。然而，我们通常指定输出字符串的哈希函数。区块链和加密货币应用总是使用产生十六进制字符串输出的密码学哈希函数。\n\n\
  现在让我们来看看密码学哈希函数所需具备的属性。\n\n### 固定长度输出属性\n\n这是一个简单的要求。我们希望密码学哈希函数产生具有固定长度的消息摘要。理想情况下，我们希望消息摘要的尺寸较小，因为这关系到在网络上传输数据的效率。消息摘要的尺寸越小，在传输过程中被意外损坏的概率就越低。产生长度为\
  \ 128 位、256 位和 512 位的消息摘要的密码学函数很常见。\n\n\n\n### 抗碰撞性\n\n显而易见，如果我们有两个不同的消息，我们希望密码学哈希函数能产生两个不同的消息摘要。也就是说，如果\
  \ `x` 和 `y` 是两个不同的消息，而 `q = H(p)` 是我们的密码学哈希函数，那么我们需要满足：\n\n```\nx != y 意味着 H(x)\
  \ != H(y)\n```\n\n当 `x != y` 但 `H(x) = H(y)` 时，就会发生碰撞。如果一个哈希函数发生碰撞的概率极低，那么它就被称为具备抗碰撞性。一个好的密码学哈希函数可能会存在碰撞，但实际上几乎不可能找到这些碰撞。\n\
  \n典型的密码学哈希函数并非经典意义上的简洁数学表达式，例如 `y = e^xln2x`。它们是对输入文本进行的一系列有限且连续的替换和变换。由于函数是以这种方式定义的，我们永远无法绝对确定该函数不存在任何碰撞。^(¹⁵)\n\
  \n### 不可逆性\n\n这是一个常识性要求：我们不应该能够从消息摘要中推导出原始消息。一个好的密码学哈希函数是不可逆的。这意味着，给定哈希函数 `y = H(x)`\
  \ 的输出 `y`，从消息摘要 `y` 推导出输入 `x` 在计算上是不可行的。\n\n我们之前讨论的哈希函数：\n\n```\nF('crypto') = 'dszqup'\n\
  ```\n\n不是密码学哈希函数，因为它是可逆的。\n\n### 高效计算性\n\n这是一个好的密码学哈希函数所期望但不一定必需的特性。我们希望函数能够快速计算消息摘要。这一特性影响着需要计算消息摘要的应用程序的可扩展性。例如，考虑一个银行应用程序，它每秒必须处理数千笔交易，而每笔交易都需要计算一个或多个消息摘要。为了使该应用程序能够扩展，能够非常快速地计算消息摘要是至关重要的。\n\
  \n## 证明文件被篡改过\n\n让我们运用目前所学的知识来证明一个文件没有被篡改过。\n\n假设我们有一个文本文件和一个密码学哈希函数。如果我们将该文件的内容视为一长串字符，我们就可以计算这个文件的消息摘要。然后，如果有另一个新文件呈现给我们，并且它与之前的文件具有相同的消息摘要，那么由于两个文件的消息摘要（即密码学哈希值）相同，我们可以得出这两个文件是完全相同的结论。此外，如果消息摘要不同，我们就可以断定这两个文件不相同。\n\
  \n### 安全哈希算法 256 (SHA-256)\n\n发现密码学哈希函数是相当困难的。`SHA-256`、`SHA-512` 和 `RIPEMD-160`\
  \ 是三种常用的密码学哈希函数。我们来看一下在区块链应用中广泛使用的 `SHA-256` 和 `RIPEMD-160` 哈希函数。\n\n`SHA-256` 是安全哈希算法\
  \ 256 的首字母缩写。其中的 256 表示该函数输出的消息摘要（或密码学哈希值）长度为 256 位。\n\n图 4-1 展示了如何为消息或文件生成一个 `SHA-256`\
  \ 消息摘要。\n\n![../images/492478_1_En_4_Chapter/492478_1_En_4_Fig1_HTML.jpg](img/492478_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1 SHA-256 消息摘要生成过程\n\n文件或消息被分割成连续的块，每个块的大小为 512 位。如果消息或文件的比特长度不能被 512 整除，则在其末尾添加填充（一个\
  \ 1 位，后跟若干 0 位），以便 512 能够整除该消息或文件的比特长度。\n\n接下来，我们使用伪随机数生成器构造一个 256 位的随机 IV（初始化向量）。这只是一个\
  \ 256 位长的、由 1 和 0 组成的伪随机序列。IV 的目的是增加哈希生成过程的随机性。我们将这个 IV 与消息或文件的第一个 512 位块拼接起来。得到的\
  \ 768 位块被输入到安全哈希算法中。该算法是一个加扰和压缩函数，输出一个 256 位的字符串。该算法是对 768 位块进行的一系列替换和置换。\n\n然后，我们取第二个\
  \ 512 位消息块，并将其与之前输出的 256 位结果拼接起来。这个 768 位字符串被输入到相同的加扰和压缩函数中，产生一个 256 位的输出。我们以此类推，逐个处理消息块。最终的\
  \ 256 位输出就是由 `SHA-256` 算法生成的消息摘要（或密码学哈希值）。\n\n`SHA-256` 的核心是应用于每个 768 位块的加扰和压缩函数。对于\
  \ `SHA-256`，该函数由 64 轮组成。每一轮接收一个 768 位块，通过位移和逻辑位运算（OR、XOR、AND）进行加扰，然后输入到下一轮。最后一轮产生一个\
  \ 256 位的输出，该输出与消息的下一个 512 位块拼接，然后再次对这 768 位块应用 64 轮。此过程不断重复，直到处理完消息的最后一个块。\n\n`SHA-512`\
  \ 算法在概念上类似，只是消息块大小为 1024 位，并且加扰函数由 80 轮组成。理论上，加扰过程中涉及的步骤越多，函数的密码学安全性就越高。\n\n###\
  \ 一个针对 SHA-256 的 Python 示例\n\nPython 在其 `hashlib` 模块中提供了 `SHA-256` 以及其他密码学哈希算法的实现。以下\
  \ Python 代码示例演示了如何为字符串生成 `SHA-256` 十六进制编码的消息摘要：\n\n```\nimport hashlib\ndef getSHA256MD(inputStr):\n\
  \    m = hashlib.sha256()\n    # 将输入字符串转换为字节序列\n    strAsBytes = str.encode(inputStr)\n\
  \    m.update(strAsBytes)\n    # 以十六进制字符串形式返回消息摘要\n    return m.hexdigest()\nret\
  \ = getSHA256MD('the lazy brown fox jumped over the sleeping dog')\nprint(ret)\n\
  ```\n\n执行此程序的结果是 `SHA-256` 哈希值：`1845c1824b7710df04f1307ea1618857c16e891278eb9dc7edba809915581283`\n\
  \n\n\n### RIPEMD-160\n\n`RIPEMD` 是 RACE 完整性原语评估消息摘要（RACE Integrity Primitives Evaluation\
  \ Message Digest）的缩写。这种密码学哈希算法可以生成长度为 128、160、256 和 320 位的消息摘要。`RIPEMD` 于 1996 年进入公共领域。`RIPEMD-160`\
  \ 在比特币加密货币以及许多其他区块链应用中得到使用。\n\n生成 `RIPEMD-160` 哈希值的算法在概念上与生成 `SHA-256` 哈希值的过程类似。`RIPEMD-160`\
  \ 将输入消息划分为连续的一系列 512 位块。消息会填充一个 1 位和一连串的 0 位，以确保其长度能被 512 整除。然后，一个编码了消息长度的 64 位字符串会被追加到消息末尾。该算法使用五个\
  \ 32 位寄存器来保存中间结果以及最终的消息摘要。为了启动哈希生成过程，这五个 32 位寄存器会被初始化为一些固定值。随后，第一个 512 位块会经过十轮（rounds）变换，每一轮由\
  \ 16 步作用于消息块和寄存器值的置换与替换序列组成。这十轮运算的输出是一个填充了五个 32 位寄存器的 160 位值。然后，这些寄存器值与下一个块一起作为输入，重复此过程，直到消息的最后一个块处理完毕。^(¹⁶^)\
  \ 最终这五个寄存器中的 160 位值即为消息摘要。\n\n以下 Python 代码为字符串生成 `RIPEMD-160` 哈希值。输出结果编码为十六进制字符串：\n\
  \n```\nimport hashlib\ndef getRIPEMD160(inputStr):\nr = hashlib.new('ripemd160')\n\
  strAsBytes = str.encode(inputStr)\nr.update(strAsBytes)\nreturn r.hexdigest()\n\
  ret = getRIPEMD160('the lazy brown fox jumped over the sleeping dog')\nprint(ret)\n\
  ```\n\n## 消息认证码\n\n在前面的章节中，我们讨论了如何使用密码学哈希来确定消息的完整性，即证明消息是否被篡改。密码学哈希不能用于证明真实性。真实性关注的是证明消息的发送者确实是其声称的那个人。消息认证码（`MAC`）提供了消息完整性的保证，此外，还提供了有限形式的真实性保证。消息认证码算法依赖于共享的对称加密密钥。\n\
  \n消息认证码的工作原理如下：一组（两个或更多）个体共享一个秘密的对称加密密钥。想要发送消息的人使用 `MAC` 算法为该消息计算一个 `MAC` 值。然后，她将该消息连同\
  \ `MAC` 值一起发送给接收者。接收者使用同样的 `MAC` 算法和秘密密钥计算该消息的 `MAC` 值。如果计算出的 `MAC` 值与发送者提供的 `MAC`\
  \ 值相等，那么我们可以断定该消息未被篡改。此外，接收者可以确信该消息是由拥有该秘密密钥的人发送的。\n\n图 4-2 解释了消息认证码的使用方式。\n\n![../images/492478_1_En_4_Chapter/492478_1_En_4_Fig2_HTML.jpg](img/492478_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2。** 消息认证码流程\n\n你应该注意到，消息不必加密。在许多用例中，`MAC` 码与明文一起使用。例如，操作系统文件未加密，但可能附有 `MAC`\
  \ 值以证明文件的完整性。另一个突出的用例涉及通过网络传输文件，当我们希望确保文件在传输过程中未被破坏时。\n\n`MAC` 码只提供有限程度的认证保证。当接收到带有\
  \ `MAC` 码的消息时，我们只能断定该消息是由拥有该对称加密密钥的人发送的。特别是，一个人可以声称自己是拥有秘密密钥的其他某人来发送消息，而被冒充的个人将无法否认这一说法。正如我们将在后续章节中看到的，数字签名解决了完整性和认证的难题。\n\
  \n你可能会注意到诸如 `SHA-256` 等密码学哈希算法与 `MAC` 算法之间的一个本质区别。任何人都可以计算消息的 `SHA-512` 消息摘要。相比之下，计算消息的\
  \ `MAC` 值需要一个共享的秘密密钥。\n\n## 结论\n\n密码学哈希函数是区块链应用的基础。在本章中，我们讨论了密码学哈希函数的性质。我们还研究了两种著名的密码学哈希算法：安全哈希算法和\
  \ `RIPEMD-160`。\n\n密码学哈希算法可以证明消息的完整性，但不能证明真实性（谁编写了消息）。本章最后，我们讨论了消息认证码算法，它不仅能证明消息的完整性，还提供了一种有限形式的认证。\n\
  \n在下一章，我们将深入探讨公钥密码系统的基础。\n\n"
- "# 5. 公钥密码系统的炼金术\n\n本章关注的是可以被称为现代密码学或非对称密码学的领域。在第 3 章中，我们研究了对称加密，并推断当加密密钥需要分发给大量接收者时，它存在一个显著的可扩展性问题。例如，考虑一个加密密钥必须分发给数千个接收者的场景。每次向接收者传输密钥时，都伴随着一定的密钥被恶意行为者截获的概率。公钥密码系统的目标，*除其他外*，是解决这个可扩展性问题，同时也使得对手截获秘密密钥的问题变得无关紧要。公钥密码系统理论的*点睛之笔*是数字签名算法；它同时解决了三个问题：(i)\
  \ 保证消息的完整性，(ii) 保证消息的真实性，以及 (iii) 解决可扩展性问题。\n\n公钥密码系统在现代众多应用中都得到了应用。例如，它们被用于安全的\
  \ `HTTP` 通信、虚拟专用网络、信用卡、电子商务系统、智能卡、电子身份证以及诸如 `SWIFT` 等国际支付系统，现在也用于加密货币和区块链应用。\n\n\
  在本章中，我将首先总结对称加密密钥分发的问题，然后简要描述经典的数字签名算法。之后，我将向你介绍一些公钥密码系统背后的数学理论，最后深入讨论数字签名算法。随着讲解的深入，我还会提供\
  \ Python 代码示例。\n\n\n\n## 密钥分发问题再探讨\n\n再次假设你我正处在银河系的两端，而我想给你发送一条秘密消息。首先，你必须拥有对称加密密钥，才能解密该消息。因此，如果你没有这个密钥，我必须将其传输给你。在我提供密钥之后，我就可以向你发送加密消息，你将能够使用该密钥对其进行解密。为了检测消息在传输过程中是否被篡改，我还可以将明文或加密消息的\
  \ `SHA-256` 哈希值传输给你。这个加密哈希值可以附加在消息末尾。\n\n在上述场景中，有两个突出问题需要解决。首先，你无法知道该消息是否真的由我发送，还是由某个冒充我的恶意行为者发送。任何拥有加密密钥的人都可以伪造消息。这就是**真实性**问题。我们如何证明一条消息是由声称是其作者的人发送的？第二个问题是，加密密钥在传输过程中可能被恶意实体截获。没有确定性的方法可以证明密钥在传输过程中未被截获。当密钥需要分发给大量接收者时，这个问题会变得更加复杂。例如，考虑一个情报收集网络，其中的每个节点都必须配备加密密钥。\n\
  \n### 数字签名算法的启发式方法\n\n在公钥密码学中，使用非对称密钥生成算法来生成一对公钥和私钥。这些密钥中的每一个都是一个非常长的字符串。生成此密钥对的人会安全地将私钥保存在自己手中，并将公钥分发给预期的接收者。例如，公钥可以通过发布到互联网上，分发给全世界。公钥分发的关键方面在于，我们并不关心恶意实体是否拥有此密钥。由于生成密钥对的实体必须将私钥安全地保存在自己手中，因此非对称密钥生成算法必须使得从公钥恢复私钥在计算上不可行，这一点至关重要。\n\
  \n现在，一个人可以用公钥加密消息并将其传输给私钥持有者，或者直接将加密后的消息发布到互联网上。非对称密钥生成算法保证该消息只能使用私钥解密，也就是说，在没有私钥的情况下解密该消息在计算上是不可行的。所谓计算不可行，我们指的是在没有私钥的情况下，解密消息将花费极其漫长的时间（也许是数亿年之久）。\n\
  \n类似地，使用私钥加密的消息只能由与该私钥对应的公钥解密。对于攻击者来说，在没有公钥的情况下从密文中恢复出原始消息在计算上是不可行的。公钥和私钥互为逆运算，因为由任何一个密钥执行的加密操作都可以被另一个密钥逆转。这就是公钥密码系统的本质。图\
  \ 5-1 展示了这个过程。\n\n![../images/492478_1_En_5_Chapter/492478_1_En_5_Fig1_HTML.jpg](img/492478_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** 公钥密码系统\n\n在上述过程中，爱丽丝生成一对公私钥对，将公钥交付给史密斯，同时将私钥安全地保存在自己手中。然后史密斯用这个公钥加密一条消息，并将密文发送给爱丽丝。爱丽丝再用自己的私钥解密密文。\n\
  \n爱丽丝知道消息是由拥有公钥的人加密的，但通常情况下，爱丽丝无法知道实际加密这条消息的人的身份（除非爱丽丝确定只有史密斯拥有公钥）。确定身份这个问题需要公钥基础设施（PKI）来解决。我们稍后将讨论公钥基础设施。\n\
  \n另一种情况是爱丽丝用她的私钥加密一条消息。任何持有相应公钥的人都可以解密这样的消息。这里的关键特性是，消息的接收者可以得出结论，即该消息是由持有私钥的实体生成的。此外，爱丽丝无法否认该消息是由她持有的私钥生成的这一说法。请注意，在缺乏外部信息的情况下，接收者无法将私钥与爱丽丝关联起来。建立这种关联的一种方式是通过使用证书颁发机构（PKI）。\n\
  \n如果双方都使用对方的公钥发送消息，那么爱丽丝和史密斯就能进行安全的双向通信。\n\n数字签名算法解决了两个问题：一是消息未被篡改，二是签名是由某个特定的私钥生成的，因此是由该密钥的持有者生成的。该算法的第二个方面解决了身份验证问题。\n\
  \n这些算法包括两个阶段：签名生成阶段和签名验证阶段。图 5-2 展示了签名生成阶段涉及的步骤。\n\n\n\n![../images/492478_1_En_5_Chapter/492478_1_En_5_Fig2_HTML.jpg](img/492478_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 生成文档的数字签名\n\n爱丽丝生成了一对公私密钥，并有一份希望进行数字签名的文档。^(¹⁷) 第一步，爱丽丝生成该文档的加密哈希值，例如文档的\
  \ `SHA-256` 消息摘要。然后爱丽丝用自己的私钥加密该消息摘要。加密结果即为该文档的数字签名。第二步，爱丽丝将文档与数字签名拼接在一起，并将这份拼接后的文档传输给接收方。\n\
  \n正如我们之前指出的，`SHA-256` 这类高质量的加密算法具有雪崩效应。如果文档发生极微小的改变，哪怕只是一个比特位，生成的摘要消息也会发生剧烈变化。当使用私钥对消息摘要进行加密时，同样会产生这种雪崩效应。最后请注意，文档本身无需加密。在许多重要应用中，我们并不关心文档以明文形式传输，因为我们唯一关心的是检测文档是否被篡改以及验证文档的真实性。当然，爱丽丝也可以选择先用自己的私钥加密文档，然后再用私钥对该加密文档的\
  \ `SHA-256` 消息摘要进行加密。\n\n数字签名算法的第二阶段是文档接收方对文档进行验证。图 5-3 展示了这一过程。\n\n![../images/492478_1_En_5_Chapter/492478_1_En_5_Fig3_HTML.jpg](img/492478_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** 验证文档的数字签名\n\n在验证阶段，拼接文档的接收方（例如史密斯）将文档和签名分离。第一步，史密斯计算收到的文档的 `SHA-256`\
  \ 消息摘要。第二步，使用爱丽丝的公钥对与文档拼接在一起的签名进行解密。这便得到了文档发送方计算出的消息摘要。然后对比这两个消息摘要。如果消息摘要相同，那么史密斯可以得出结论：文档在传输过程中未被篡改，并且该文档是由爱丽丝签署和发送的，因为她的私钥与史密斯使用的公钥相匹配。如果消息摘要不一致，则存在三种可能性：其一，文档在传输过程中被篡改；其二，爱丽丝并非文档的作者；其三，史密斯所持有的公钥与爱丽丝的私钥不对应。\n\
  \n### 公钥基础设施\n\n回想一下，当史密斯收到一份用私钥加密的消息（或文档）时，他只能推断出发送者身份是持有该加密消息私钥的实体。史密斯必须拥有外部信息，才能将爱丽丝的身份与私钥关联起来。同样地，当爱丽丝收到一份用她的公钥加密的消息时，在没有外部信息的情况下，她只能断定该消息是由某个持有她公钥的人加密的。\n\
  \n将身份与公钥（以及隐含的其私钥）关联起来的一种方法是通过证书颁发机构（CA）。以下是证书颁发机构的工作方式：首先，证书颁发机构获取声称拥有某对公私密钥的申请人的身份信息。申请人向\
  \ CA 提供其公钥。接着，CA 要求申请人对 CA 提供的一份文档进行数字签名。申请人签署文档后，CA 对文档的签名进行验证。如果验证成功，则证明申请人确实持有与提供给\
  \ CA 的公钥相对应的私钥。随后，CA 向申请人颁发一份 `X.509` 证书。该证书由 CA 使用其私钥签名，以证明证书颁发者的身份，并确保证书未被篡改。颁发的证书通常包含识别申请人的信息，例如姓名、地址以及其他独特细节、申请人生成的公钥、证书的有效期等等。\n\
  \n爱丽丝可以通过以下方式证明某份文档的作者身份：首先，爱丽丝用自己的私钥加密她的证书，并将其与她想要发送的文档拼接在一起。接着，爱丽丝对此拼接后的文档进行数字签名，并将签名附加到拼接文档上。这将使接收方能够通过解密证书来安全地验证文档签署者的身份。\n\
  \n类似地，当史密斯用爱丽丝的公钥加密一份文档时，他也可以用自己的私钥加密他的证书，并将加密后的证书与该文档拼接在一起。爱丽丝随后通过使用史密斯的公钥解密证书，便能知晓这份用她公钥加密的文档的发送者身份。\n\
  \n\n\n### RSA 算法\n\n公有领域存在多种公私钥生成算法。最主要的两种算法是 `RSA` 和椭圆曲线数字签名算法（`ECDSA`）。`RSA` 算法是使用最广泛的公钥算法。^(¹⁸)\
  \ 这些算法依赖于数论中计算难度极高的难题。例如，`RSA` 依赖于将一个极大的数分解为质数乘积在计算上是不可行的这一事实。而 `ECDSA` 则依赖于寻找极大数的离散对数的难度。比特币代码使用了通过椭圆曲线数字签名算法生成的公私钥对。\n\
  \n在本可选章节中，我们将推导 `RSA` 算法。在此之前，我们需要了解一些数论知识：\n\n```\n定义（质数）：大于 1 的正整数 n，如果只能被 +1、-1、-n\
  \ 和 n 整除，则称为质数。\n```\n\n定理（算术基本定理）：任何大于 1 的整数 `m` 都可以分解为质数的乘积：\n\n`m = p[1]^(t1)p[2]^(t2)p[3]^(t3)\
  \ … p[n]^(tn)`\n\n其中 `p[1]` < `p[2]` < … < `p[n]` 是质数，`t1`、`t2`、… `tn` 是大于 0 的自然数。\n\
  \n定义（互质数）：如果两个大于 1 的正整数 `j` 和 `k` 唯一的公因子是 1，则称它们互质。\n\n例如，6 和 9 不互质，因为 3 是公约数。8\
  \ 和 15 互质。\n\n定义（欧拉函数 `Q(n)`）：对于任何大于 1 的整数 `n`，`Q(n)` 是小于 `n` 且与 `n` 互质的正整数的个数。\n\
  \n例如，`Q(15)` = 7，因为与 15 互质的集合是 { 2,4,7,8,11,13,14 }。\n\n定理（欧拉定理）：对于任何大于 1 的整数 `a`\
  \ 和 `n`，如果 `a` 和 `n` 互质，则 `a^(Q(n)) % n = 1`。^(¹⁹)\n\n例如，令 `a` = 15，`n` = 8，`Q(n)`\
  \ = 4，那么\n\n```\n154 % 8 = 50625 % 8 = 1\n```\n\n应该清楚的是，对于大于 1 的自然数 `m`，其质因数分解 `p[1]^(t1)p[2]^(t2)p[3]^(t3)\
  \ … p[n]^(tn)` 是唯一的。`RSA` 算法依赖于一个大数的质因数分解在计算上是不可行的这一事实。\n\n现在，我们可以按如下步骤推导出 `RSA`\
  \ 公私钥对：\n\n```\n步骤 1：选择两个大的随机质数 p 和 q，且 p 不等于 q。\n步骤 2：计算乘积：n = pq。\n步骤 3：由于 p 和\
  \ q 是质数，n 的欧拉函数值为 Q(n) = (p-1)(q-1)。\n步骤 4：选择一个整数 1 < e < Q(n)，使得 e 和 Q(n) 互质。\n\
  步骤 5：获取一个正整数 d，使得 de % Q(n) = 1。\n```\n\n公钥是元组 `(n, e)`。私钥是元组 `(p, q, d)`。公钥元组可以自由分发；私钥元组则需保密。\n\
  \n现在，我们来看 `RSA` 算法的应用。假设有一个文档或消息 `D`。`D` 可以看作一个非常长的比特序列，或者等价地看作一个巨大的正整数。因此，我们将 `D`\
  \ 视为这样一个整数。我们确保选择的质数 `p` 和 `q` 满足 `D < pq`。\n\n史密斯收到公钥元组 `(n, e)` 后，按如下方式创建加密消息\
  \ `C`：\n\n```\nC = De % n\n```\n\n`C` 是一个正整数，或者等价地是一个很长的比特序列。\n\n爱丽丝现在可以用她的私钥元组\
  \ `(p, q, d)` 解密密文：\n\n```\nD = Cd % n\n举个例子，令 p = 7，q = 5。\nn = pq = 35\n则 Q(35)\
  \ = 24，我们选择 e = 17。\ne 与 Q(n) 互质。\n我们选择 d 使得 de % Q(n) = 17d % 24 = 1\nd = 17\n\
  现在考虑文档 T = 12\n则密文为 1217 % 35 = 17\n我们用 1717 % 35 = 12 来解密密文\n```\n\n`RSA` 公私钥加密是使用最广泛的私钥-公钥加密系统。其安全性与使用椭圆曲线密码学（`ECDSA`）生成的密钥相当。遵循比特币的做法，我们将使用\
  \ `ECDSA` 密钥对。此类密钥的逻辑在概念上与 `RSA` 密钥相似，我将省略对其生成过程的讨论，因为对其背后的数学原理进行严谨论述会让我们陷入冗长的题外话。我们的区块链代码将包含生成\
  \ `ECDSA` 公私钥对所需的库函数。\n\n### Python 代码示例\n\n在下面的 Python 示例中，我们将使用 `pycryptodome`\
  \ 包，带领爱丽丝和史密斯完成使用 `RSA` 进行加密、解密、签名生成和签名验证的一系列步骤。^(²⁰) 你应该仔细阅读这段代码，以了解使用公私钥对加密和解密消息的机制。\n\
  \n如果你尚未安装此包，请执行以下命令进行安装：^(²¹)\n\n```\npip3 install pycryptodome\n#========================================\n\
  ## RSA 公钥密码学示例\n#========================================\nfrom Crypto.PublicKey\
  \ import RSA\nfrom Crypto.Cipher import PKCS1_OAEP\nfrom Crypto.Hash import SHA256\n\
  from Crypto import Random\nfrom hashlib import sha256\nimport binascii\n#=====================================\n\
  ### 生成一个 RSA 密钥对\n#=====================================\ndef RSAKeyPair(keylength):\n\
  \    keyPair = RSA.generate(keylength)\n    return keyPair\n### 爱丽丝生成一个 RSA 密钥对\n\
  AliceKeyPair = RSAKeyPair(1024)\n### 爱丽丝的公钥\npubKey = AliceKeyPair.publickey()\n\
  print(f\"公钥:  (n={hex(pubKey.n)}, e={hex(pubKey.e)})\")\n### 爱丽丝的公钥（PEM 格式）\n###\
  \ PEM 格式对密钥进行 Base64 编码\npubKeyPEM = AliceKeyPair.publickey().exportKey()\nprint(\"\
  公钥 PEM 格式: \" + pubKeyPEM.decode('ascii'))\n### 爱丽丝的私钥\nprint(f\"私钥: (n={hex(pubKey.n)},\
  \ d={hex(AliceKeyPair.d)})\")\n### 爱丽丝的私钥（PEM 格式）\nprivKeyPEM = AliceKeyPair.exportKey()\n\
  print(\"私钥 PEM 格式: \" + privKeyPEM.decode('ascii'))\n#======================================================\n\
  ### 史密斯使用爱丽丝的公钥加密一条消息\n### 消息必须是二进制字符串\n#======================================================\n\
  message = b\"The quick brown fox jumped over the farmer's hedge\"\ncipher = PKCS1_OAEP.new(pubKey)\n\
  cipherText = cipher.encrypt(message)\nprint(\"密文: \", binascii.hexlify(cipherText))\n\
  #=======================================================\n### 爱丽丝使用她的私钥解密史密斯的消息\n\
  #=======================================================\ndecipher = PKCS1_OAEP.new(AliceKeyPair)\n\
  plainText = decipher.decrypt(cipherText)\nprint('解密后的文本: ', plainText)\n#==========================================================\n\
  ### 爱丽丝通过对消息先生成 SHA-256\n#### 摘要，然后用她的私钥对其加密来签名一条消息。\n### 字符串消息被转换为二进制字符串\n#==========================================================\n\
  message = b'let sleeping dogs lie, said the farmer'\nhash = int.from_bytes(sha256(message).digest(),\
  \ byteorder=\"big\")\nsignature = pow(hash, AliceKeyPair.d, AliceKeyPair.n)\nprint(\"\
  爱丽丝的签名:\", hex(signature))\n#============================================================\n\
  ### 史密斯通过比较从接收到的消息生成的 SHA-256 哈希值\n#### 与从爱丽丝收到的签名解密得到的哈希值来验证签名\n#=============================================================\n\
  hashFromMessage = int.from_bytes(sha256(message).digest(), byteorder=\"big\")\n\
  decryptedHash   = pow(signature, AliceKeyPair.e, AliceKeyPair.n)\nif (hashFromMessage\
  \ == decryptedHash):\n    print(\"签名有效\")\nelse:\n    print(\"签名无效\")\n```\n\n\n\
  \n### 生成全局唯一标识符\n\n在区块链应用中，我们通常需要能够标识区块和交易的全局唯一值。生成这些全局 ID 的一种方法是生成一对公私钥，然后获取私钥或公钥的\
  \ SHA-256 哈希值。生成的 256 位消息摘要具有全局唯一性。^(22) 这意味着在计算上不可能生成另一对公私钥来产生相同的消息摘要。类似地，我们可以对公钥或私钥应用\
  \ RIPEMD-160 加密哈希函数。生成的 160 位消息哈希同样是一个全局唯一 ID。\n\n## 结论\n\n公钥密码学（或称非对称密钥加密）是区块链和加密货币应用非常重要的基础工具。在本章中，我们深入探讨了公钥密码学，特别是公私钥对和数字签名算法。我们还研究了\
  \ RSA 算法的推导过程，这是生成公私钥对最流行的算法。此外，我们描述了一种公钥基础设施，可用于将身份与这些密钥对关联起来。\n\n至此，我们结束了密码学领域的探讨，在下一章中，我们将进入本书的核心内容：区块链与加密货币应用。\n\
