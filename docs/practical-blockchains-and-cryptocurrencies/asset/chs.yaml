  \      raise(ValueError(\"merkle roots do not match\"))\n        # 通过比较消息摘要来验证前一个区块。\n\
  \        # 创世区块没有前驱区块\n        if block[\"height\"] > 0:\n            if block[\"\
  prevblockhash\"] != blockheader_hash(blockchain[block[\"height\"]-1]):\n       \
  \         raise(ValueError(\"previous block header hash does not match\"))\n   \
  \     else:\n            if block[\"prevblockhash\"] != \"\":\n                raise(ValueError(\"\
