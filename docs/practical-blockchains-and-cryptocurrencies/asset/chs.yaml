  height\"] == 0 and block[\"tx\"][0][\"vin\"] != []:\n            raise(ValueError(\"\
  missing coinbase transaction\"))\n        # 除创世区块外的其他区块必须至少包含两笔交易：一笔 coinbase 交易和至少一笔其他交易\n\
