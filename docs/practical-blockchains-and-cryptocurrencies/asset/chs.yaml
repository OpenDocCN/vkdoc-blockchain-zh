  if candidate_block() == False:\ntime.sleep(1)\ncontinue\n### 从交易池中移除已挖矿区块中的交易\n\
  if mine_block(candidate_block) != False:\nremove_mempool_transactions(remove_list)\n\
  else: time.sleep(1)\n```\n\n\n\n## 氦气挖矿数据结构\n\n### mempool\n\n`mempool` 是一个列表，包含已收到但尚未被任何已挖出区块收录的交易。\n\
  \n### received_blocks\n\n这是一个由其他挖矿节点挖出的区块列表，这些区块旨在被纳入接收节点的区块链中。\n\n### orphan_blocks\n\
  \n这是一个来自其他节点、已被验证有效但由于某种原因无法被追加到接收矿工区块链上的区块列表。\n\n### Blockchain\n\n这是由当前挖矿节点维护的本地区块链，位于\
  \ `hblockchain` 模块中。此区块链也被称为主区块链。\n\n### Secondary Blockchain\n\n当主区块链发生分叉时，矿工维护的另一条备选区块链。\n\
  \n## 氦气挖矿函数\n\n### mining_reward\n\n成功挖出区块的矿工有权获得奖励，奖励包括新发行的氦气币。挖矿奖励决定了授予矿工的新增货币数量。该奖励会定期减半。初始奖励和减半周期均由\
  \ `hconfig` 模块设定。\n\n初始奖励为 `hconfig.conf[\"MINING_REWARD\"]` 个币。该奖励每挖出 `hconfig.conf[\"\
  REWARD_INTERVAL\"]` 个区块减半一次。\n\n### receive_transaction\n\n`receive_transaction`\
  \ 函数负责接收在氦气 P2P 网络上传播的交易。该函数会检查交易是否已存在于 `mempool` 中。如果交易已在 `mempool` 中，则将其丢弃。\n\n\
  下一步，`receive_transaction` 会验证交易的有效性。如果交易有效，则将其添加到 `mempool` 中；否则丢弃该交易。如果交易被添加到 `mempool`，它将被发送以在氦气网络上进行进一步传播。\n\
  \n`receive_transaction` 应在 Python 线程中运行。^(⁵⁹)\n\n### make_candidate_block\n\n`make_candidate_block`\
  \ 的目的是创建一个可供挖矿的区块。如果 `mempool` 为空，该函数直接返回。\n\n`make_candidate_block` 会为区块创建一个部分头部，然后从\
  \ `mempool` 中抽取交易，并将其追加到该区块的 `tx` 字段中。可以使用任意算法从 `mempool` 中抽取交易。`make_candidate_block`\
  \ 使用简单的先进先出（FIFO）算法，持续抽取交易，直到接近达到 1 MB 的最大区块大小或 `mempool` 被抽空。对于每笔交易，该函数会插入一个 `vout`\
  \ 交易片段，将交易费分配给自身。\n\n`make_candidate_block` 完成从 `mempool` 的抽取后，会创建一个 `coinbase`\
  \ 交易。`coinbase` 交易是 `tx` 列表中的第一笔交易。对于每个区块，该函数会生成一对新的公私钥，用于创建 `coinbase` 交易和交易费片段。\n\
  \n最后，`make_candidate_block` 计算交易的默克尔根，并将其插入区块头部的默克尔字段中。然后，它测试所构建区块的有效性。如果区块有效，它会将区块中的交易从\
  \ `mempool` 中移除。此时，候选区块即可准备挖矿。\n\n### make_miner_keys\n\n该函数创建一对公私钥，并将这些密钥保存到一个文本文件中。`make_candidate_block`\
  \ 使用公钥创建 `RIPEMD160(SHA256(public key))` 哈希，该哈希被插入到 `coinbase` 交易的 `ScriptPubKey`\
  \ 部分以及每个交易费 `vout` 片段中。\n\n### add_transaction_fee\n\n`add_transaction_fee` 由 `make_candidate_block`\
  \ 调用。它接收一笔交易和矿工的公钥。该函数计算交易费，更新链状态，并创建一个交易片段，将交易费定向到与公钥对应的私钥持有者。\n\n### make_coinbase_transaction\n\
  \n`make_coinbase_transaction` 由 `make_candidate_block` 调用。它接收候选区块的高度和矿工的公钥。该函数计算区块奖励，然后创建并返回一个\
  \ `coinbase` 交易。\n\n### remove_mempool_transactions\n\n该函数从 `mempool` 中移除交易，从而防止同一笔交易在多个不同候选区块中被重复包含。\n\
  \n### mine_block\n\n`mine_block` 接收一个候选区块并开始对该区块进行挖矿。计算区块头部中 nonce 值的 SHA256 哈希值。如果计算出的\
  \ SHA-256 哈希值小于氦气 `hconfig` 模块中的难度值，则认为该区块已被挖出。如果该值大于或等于难度值，则 nonce 递增，并再次将计算结果与难度值进行比较。此过程持续进行，直到区块被挖出或计算循环被退出。\n\
  \n一旦区块被挖出，它将被附加到矿工的区块链上，然后在氦气 P2P 网络上传播，以便其他矿工将其追加到自己的区块链上。\n\n### proof_of_work\n\
  \n在将从其他矿工处收到的区块纳入本地区块链之前，节点必须验证区块及其交易的完整性，并验证区块头部提供的 nonce 值是否小于本节点 `hconfig` 文件中的难度值。该函数为收到的区块实现工作量证明。\n\
  \n### receive_block\n\n`receive_block` 接收由其他矿工挖出的区块。如果区块有效，挖矿节点会将该区块添加到其 `received_blocks`\
  \ 列表中。出现以下任一条件则区块无效：\n\n1.  区块无效。\n2.  区块高度小于（区块链高度 - 2）。\n3.  工作量证明失败。\n4.  区块未包含至少两笔交易。\n\
  5.  区块的第一笔交易不是 coinbase 交易。\n6.  区块中的交易无效。\n7.  区块已在区块链中。\n8.  区块已在 `received_blocks`\
  \ 列表中。\n\n如果接收的区块有效，它将被添加到 `received_blocks` 列表中，并在氦气 P2P 网络上传播，以便其他节点将其附加到自己的区块链上。\n\
  \n`receive_block` 应作为 Python 线程执行。\n\n\n\n#### `process_received_blocks`\n\n`process_received_blocks`\
  \ 从 `received_blocks` 列表中取出区块，并尝试将其附加到区块链上。此函数实现了分布式共识。请注意，由于矿工受利益驱动，他们总会延长自己最长的区块链。处理接收区块的算法如下：\n\
  \n1. 从 `received_blocks` 列表中获取一个区块。\n2. 如果区块链为空，且该区块的 `prevblockhash` 字段为空，则将此区块添加到区块链中（这是一个创世区块）。\n\
  3. 计算区块链上最后一个区块的区块头哈希值（`blkhash`）：\n\n```\nif blkhash == block[\"prevblockhash\"\
  ]\n```\n\n然后将该区块添加到区块链中。\n\n4. 如果区块链至少有两个区块，令 `blk_hash` 为区块链中倒数第二个区块的区块头哈希值，然后如果\n\
  \n```\nblock[\"prevblockhash\"] == blk_hash\n```\n\n则创建一个由区块链中除最新区块外的所有区块组成的二级区块链。将该区块附加到此二级区块链上。\n\
  \n5. 否则，将该区块移动到 `orphan_blocks` 列表。\n6. 如果接收到的区块已附加到某个区块链，则对于 `orphan_blocks` 列表中的每个区块，尝试将该孤立区块附加到主区块链或二级区块链（如果存在）。\n\
  7. 如果接收到的区块已附加到某个区块链，且二级区块链中有元素，那么若二级区块链的长度更长，则交换主区块链和二级区块链。\n8. 如果接收到的区块已附加，且二级区块链中有元素，那么若二级区块链的长度比主区块链落后两个区块以上，则清空二级区块链。\n\
  \n`process_receive_block` 旨在并发线程中运行。\n\n#### `fork_blockchain`\n\n此函数通过分叉主区块链来创建二级区块链。`fork_blockchain`\
  \ 接收一个区块参数，并将其附加到二级区块链上。\n\n#### `swap_blockchains`\n\n`swap_blockchains` 交换主区块链和二级区块链，使得主区块链成为更长的区块链。\n\
  \n#### `handle_orphans`\n\n`handle_orphans` 从孤儿列表取出孤立区块，并尝试将它们附加到主区块链上。距离区块链头部超过两个区块的孤立区块将被删除。\n\
  \n#### `remove_received_block`\n\n此函数从 `received_blocks` 列表中移除一个区块。\n\n#### `retarget_difficulty_number`\n\
  \n此函数每处理 `hconfig.conf[\"RETARGET_INTERVAL\"]` 个区块后被调用一次。它重新校准难度值。此函数的目的是确保区块平均每十分钟被挖出一个。该函数实现了第\
  \ 13 章中阐述的算法。\n\n#### 其他内容\n\n`hmining` 模块中剩余的函数处理并发挖矿，将在下一章讨论。\n\n## 对氦区块链模块的修改\n\
  \n为了处理二级区块链，请在 `hblockchain` 模块中添加以下顶层属性：\n\n```\n\"\"\"\n挖矿节点使用的二级区块链\n\"\"\"\n\
  secondary_blockchain = []\n```\n\n## 氦挖矿单元测试\n\n现在我们可以对挖矿模块运行单元测试了。将以下代码复制到名为 `test_hmining.py`\
