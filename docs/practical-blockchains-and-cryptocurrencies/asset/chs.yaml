  \    hmining.received_blocks.clear()\n```\n\n\n\n## 结论\n\n至此，我们已经实现了一个氦气挖矿节点的大部分功能。但我们的挖矿节点实现尚未完成。我们还需要将`hmining`模块的部分功能实现为并发进程，并将挖矿节点与外部氦点对点网络对接。这将是接下来要处理的事项。\n\
  \n脚注 1\n\n# 15\\. 氦气网络\n\n在本章中，我们将研究点对点网络的拓扑结构，并与互联网上占主导地位的计算模型——客户端-服务器模型进行对比。之后，我们将在本地回环地址`127.0.x.x`上搭建一个氦点对点网络。该网络可用于氦气的测试。\n\
  \n在上一章中，我们构建了氦挖矿节点的大部分功能。然而，我们并未将挖矿节点暴露给氦网络，也未说明如何实现这一点。关于挖矿节点，还存在一些未解决的问题：挖矿节点如何接收交易？节点如何处理由其他节点挖出的区块？挖矿节点如何告知其他节点它刚刚挖出了一个区块？一个没有区块链的新挖矿节点如何获取分布式区块链的副本？在本章中，我们将通过构建一个规范的\
  \ API 接口来回答这些问题，该接口使氦加密货币点对点网络上的节点能够相互协作。\n\n要跟上本章内容，你需要熟悉 Python 并发编程以及 JSON 远程过程调用。如有需要，可以参考附录\
  \ 4 和附录 6。这些附录提供了你在这些领域所需的所有知识。\n\n## 客户端-服务器模型\n\n客户端-服务器模型是互联网上主流的网络拓扑结构。在这种拓扑模型中，互联网上的节点要么是服务器，要么是客户端。希望执行任务的客户端联系服务器并发出请求。服务器可以选择响应请求或忽略它。某些服务器可能同时也是由其他服务器提供服务的客户端。\n\
  \n这种拓扑结构如图 15-1 所示。\n\n![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig1_HTML.jpg](img/492478_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n\n客户端-服务器拓扑结构\n\n此图展示了客户端与服务器之间的交互。线条代表客户端与服务器之间的双向通信线路（请求-响应）。客户端发出请求，服务器则响应这些请求。例如，网络浏览器（客户端）向服务器请求一个网页，服务器通过向客户端发送\
  \ HTML 页面来响应。\n\n就我们的目的而言，我们只需要注意到这种拓扑结构中存在一定程度的集中化。节点分为两种类型：服务器和客户端。服务器响应请求，并可以选择忽略某些请求。服务器控制着网络中的信息流。\n\
  \n## 点对点网络\n\n就此而言，区块链网络或加密货币网络是一种点对点网络。在点对点网络（P2P）中，所有节点在能力上都是平等的，没有超级节点。\n\n在\
  \ P2P 网络中，节点之间互为对等节点。就氦气而言，这意味着通常所有节点都维护着完整的区块链，并具备挖矿能力。当然，某些节点可能选择不参与挖矿，而其他节点出于自身目的，可能只维护区块链的一部分。正如我们之前所见，氦节点之间互不信任，但网络仍然可以就网络状态（即区块链）达成共识。\n\
  \n网络缺乏集中化，这正是区块链网络具有弹性且无法被关闭的原因。这与客户端-服务器网络形成鲜明对比，在后者中，只需关闭服务器即可使整个网络瘫痪。\n\n图 15-2\
  \ 展示了区块链网络的整体拓扑结构。\n\n![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig2_HTML.jpg](img/492478_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2\n\n*点对点网络*\n\n此图展示了多个在功能上彼此相同的节点在网络中相互交互。线条代表对等节点之间的双向通信通道。这种拓扑结构称为点对点网络，有时也称为网状网络。节点可以加入系统或退出系统，而不会降低网络的效能。此外，节点之间会临时建立通信链路。\n\
  \n以往建立替代货币网络的尝试都基于客户端-服务器模型。这些货币系统很容易被识别并关闭。此外，它们往往会引发出于动机的刑事起诉，这些起诉通常基于可疑的政治法律依据。比特币的核心优势在于它无法被关闭。中本聪意识到潜在刑事诉讼的可能性，在\
  \ 2011 年将比特币网络投入正常运行状态后便从公众视野中消失了。\n\nP2P 网络中的节点没有全局唯一的 ID 来区分彼此。所有节点在概念上互为对等节点。节点只能通过其\
  \ IP 地址相互区分。这种节点匿名性的后果之一是网络容易遭受女巫攻击。在女巫攻击中，一个节点会伪装成另一个节点或多个其他节点。\n\n## 启动一个节点\n\n\
  当点对点网络上的一个节点启动时，它会连接到一个或多个种子节点，并向这些节点查询网络上其他节点的地址。种子节点就像一个目录服务器，维护着节点的地址。向目录服务器发起查询，允许节点加入\
  \ P2P 网络并与一部分节点通信。在启动阶段，不同的节点可能联系不同的种子节点，因此，每个节点对网络的视图可能各不相同。P2P 网络上的每个节点都维护着一个已知节点地址的列表，因此，如果它愿意，也可以充当目录服务器。这些节点可以通过提供其节点地址列表来响应提供节点地址的查询。\n\
  \n分布式哈希表（DHT）是在 P2P 网络中提供节点地址最通用的方式。在这种 P2P 网络中，网络上的部分节点（如果不是全部）维护着一个地址的分布式哈希表。^(⁶⁰)\
  \ DHT 是一种键值存储，它将键空间映射到地址空间。网络上的任何节点都可以选择维护 DHT 的一部分。正在启动的节点会向 P2P 网络广播，搜索维护着地址分布式哈希表的节点。这些节点就是\
  \ DHT 类型网络中的种子节点。\n\n就我们的目的而言，我们只需指定一个或多个 P2P 节点作为目录服务器，负责响应节点地址的查询。^(⁶¹) 为氦网络实现一个分布式哈希表虽然并不困难，但这会使我们偏离主题太远。\n\
  \n在图 15-3 中，节点 A 请求目录服务器（种子）为其提供网络上其他节点的地址列表。目录服务器回复一个节点地址列表，并将查询节点的地址也添加到其节点列表中。目录服务器提供的节点成为请求节点的邻居。\n\
  \n![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig3_HTML.jpg](img/492478_1_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3\n\n在点对点网络上通过目录服务器启动一个节点\n\n\n\n## 点对点网络上的数据传播\n\n在比特币和 Helium 网络中，交易和新挖掘的区块通过一种称为\"\
  泛洪\"的过程在网络中传播。网络中的每个节点都在特定端口上监听网络中发生的交易以及新挖掘的区块。当节点收到新交易或新区块时，它会处理该新区块或交易，并可能将其传输到地址列表中的其他节点。图\
  \ 15-4 展示了一个交易在网络中传播的过程。\n\n![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig4_HTML.jpg](img/492478_1_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4\n\n*点对点网络上的交易传播*\n\n此图展示了一个由四个堆叠圆盘表示的交易从节点 D 开始传播的过程。节点 D 查询其地址列表，并将交易传送至节点\
  \ A 和 C。节点 C 查询其地址列表，并将交易传送至节点 E 和 F。传播过程按图中箭头所示继续进行。\n\n这种泛洪过程使得交易和新区块能够快速在网络中传播。当然，正如我们在上一章所讨论的，节点在将交易或新挖掘的区块转发给相邻节点之前，会先验证区块和交易。\n\
  \n您可能会担心交易和区块会在网络上无限传播。有两种方法可以确保这种情况不会发生。传统方法是为每个交易或区块包含一个生存时间（TTL）参数。例如，考虑一个全新的交易。该交易的元数据将包含一个生存时间（TTL）计数器，例如初始值为\
  \ 256。当一个节点收到此交易时，它会将 TTL 减 1，然后重新广播该交易。如果节点收到 TTL 为 0 的交易，则会直接丢弃该交易。\n\n第二种方法是比特币和\
  \ Helium 处理交易路由的方式。比特币节点会在以下情况丢弃传入的交易：(i) 该交易已存在于节点等待处理的事务缓存（*内存池*）中；(ii) 该交易已存在于区块链中；或\
  \ (iii) 该交易无效。否则，节点会将该交易重新广播至其地址列表中的其他节点。\n\n请注意，交易传播机制还使每个接收节点能够获取传播该交易的节点地址。接收节点可以将此地址添加到其地址列表中。这一特性使接收节点能够通过将以前未知的地址添加到地址列表中来扩展其网络视野。\n\
  \n由于泛洪算法，每个节点通常会处理一组不同的交易，特别是，某个节点可能无法接收到某些正在网络中传播的交易。如果出现临时网络分区或节点宕机，该节点可能会完全停止接收交易。\n\
  \n另外请注意，节点接收交易的顺序可能与交易创建的时间顺序不同。\n\n## 并发挖矿\n\n如上一章所述，挖矿模块中的某些函数设计为与 RPC 服务器并发运行。为便于实现这一点，请在`hmining`模块中的以下两个函数（例如`make_candidate_block`和`mine_block`）中添加`async`关键字：\n\
  \n```\nasync def mine_block(candidate_block: 'dictionary')\nasync def make_candidate_block()\n\
  ```\n\n通过这一简单修改，这两个函数便能够并发运行。\n\n`start_mining`函数是一个启动区块挖矿的并发线程。请在`hmining`模块末尾添加以下代码块：\n\
  \n```\n#####################################\n### start mining in a thread:\n###\
  \ $(virtual) python hmining.py\n#####################################\nif __name__\
  \ == \"__main__\":\n#Create the Threads\nt1 = threading.Thread(target=start_mining,\
  \ args=(), daemon=True)\nt1.start()\nt1.join()\n```\n\n从命令行启动此模块将在一个线程上开始区块挖矿。\n\
  \n## 在本地主机上模拟 Helium 网络\n\n本章中，我们将在托管于本地主机网络（127.0.x.x）^(⁶²)的点对点网络上模拟并测试 Helium\
  \ 挖矿节点。您应该已经在 Helium 根目录下创建了一个`simulated_network`子目录（参见第 7 章）。`simulated_network`目录必须位于\
  \ Python 解释器的路径中^(⁶³)。在`simulated_network`目录下创建一个名为`node_1`的目录。接下来，将 Helium 根目录下除`unit_tests`目录和`simulated_network`目录之外的所有子目录复制到`simulated_network/node_1`子目录中。删除`simulated_network/node_1/data`子目录中的所有文件。`node_1`目录树包含在模拟\
  \ Helium 网络上运行的节点所需的所有 Python 代码。\n\n接下来，在`simulated_network`目录下创建一个子目录树`seed_1/hnetwork`。将以下程序代码复制到一个名为`directory_server.py`的文件中，并将该文件保存到`seed_1/hnetwork`子目录下。这段代码指定了\
  \ Helium 网络上的一个目录服务器。\n\n至此，我们已经为模拟网络指定了一个种子节点和一个 Helium 挖矿节点。您现在可以根据需要，多次将`node_1`目录树复制并粘贴到`simulated_network`目录中，并根据需要重命名这些子树的根目录。这将为模拟网络上的每个\
  \ Helium 节点提供一个对应的子目录。您也可以根据需要指定多个种子节点（作必要修改后）。\n\n我们还可以使用 Docker 镜像和容器在本地主机上搭建\
  \ Helium 网络。Docker 是一种准虚拟化解决方案，可在容器中构建应用程序。容器可以部署到多个主机，而无需任何复杂的部署流程或对容器源代码进行任何修改。有关更多信息，请参考以下\
  \ Docker 资源：*Ian Miell 和 Aidan Sayers 著，《Docker 实战》，Manning Publications，2016 年版*\n\
  \n下面我们来看一下`directory_server`模块的代码。该程序代码位于`seed_1/hnetwork`子目录中：\n\n\n\n```python\n\
  '''\n在 127.0.0.69:8081 上启动目录服务器\n'''\nimport hmining\nfrom tornado import ioloop,\
  \ web\nfrom jsonrpcserver import method, async_dispatch as dispatch\nimport ipaddress\n\
  import json\nimport threading\nimport pdb\nimport logging\n\n### 仅供测试的虚假地址列表\naddress_list\
  \ = [\"127.0.0.10:8081\", \"127.0.0.11:8081\", \"127.0.0.12:8081\", \"127.0.0.13:8081\"\
  , \\\n\"127.0.0.14:8081\", \"127.0.0.15:8081\", \"127.0.0.16:8081\", \"127.0.0.17:8081\"\
  , \\\n\"127.0.0.18:8081\", \"127.0.0.19:8081\", \"127.0.0.20:8081\" ]\n\nlogging.basicConfig(filename=\"\
  debug.log\", filemode=\"w\", \\\nformat='server: %(asctime)s:%(levelname)s:%(message)s',\
  \ level=logging.DEBUG)\n\n@method\nasync def get_address_list():\n    with hmining.semaphore:\n\
  \        ret = address_list\n    return ret\n\n@method\nasync def register_address(address:\
  \ \"string\"):\n    global address_list\n    try:\n        # 验证 IP 地址和端口格式：addr:port\n\
  \        if address.find(\":\") == -1:\n            return \"error-invalid address\"\
  \n        addr_list = address.split(\":\")\n        addr_list[1] = addr_list[1].strip()\n\
  \        if len(addr_list[0]) == 0 or len(addr_list[1]) == 0:\n            return\
  \ \"error-invalid address\"\n        if int(addr_list[1]) >= 65536:\n          \
  \  return \"error-invalid address\"\n        _ = ipaddress.ip_address(addr_list[0])\n\
  \        addr = addr_list[0] + \":\" + addr_list[1]\n        if addr not in address_list:\n\
  \            with hmining.semaphore:\n                address_list.append(addr)\n\
  \        return address\n    except Exception as err:\n        logging.debug('directory\
  \ server::register address - ' + str(err))\n        return \"error-register address\"\
  \n\nclass MainHandler(web.RequestHandler):\n    async def post(self):\n        request\
  \ = self.request.body.decode()\n        logging.debug('decoded server request =\
  \  ' + str(request))\n        response = await dispatch(request)\n        print(response)\n\
  \        self.write(str(response))\n\napp = web.Application([(r\"/\", MainHandler)])\n\
  \n### 在本地回环地址 127.0.0.69:8081 上启动节点的网络接口\nif __name__ == \"__main__\":\n    app.listen(address=\"\
  127.0.0.69\", port=\"8081\")\n    logging.debug('server running')\n    print(\"\
  directory server started at 127.0.0.69:8081\")\n    ioloop.IOLoop.current().start()\n\
  ```\n\n这个 Python 脚本将在本地主机网络的 IP 地址 `127.0.0.69` 和端口 `8081` 上启动一个异步 JSON-RPC 目录服务器。如果你不熟悉\
  \ JSON 远程过程调用服务器和客户端，请参考附录 6。该目录服务器维护一个名为 `address_list` 的列表，其中包含其他 Helium 节点正在监听的\
  \ IP 地址和端口。^((64)) 此目录服务器执行两项任务：(i) 在收到请求时提供网络上 RPC 服务器（Helium 挖矿节点）的地址，以及 (ii)\
  \ 注册 RPC 服务器节点的地址。\n\n请注意，共享资源 `address_list` 通过使用信号量来防止数据竞争。如果你需要复习 Python 并发和资源锁定的理论，可以参考附录\
  \ 4。\n\n为了启动此目录服务器，请进入 `seed_1/hnetwork` 目录，并在你的 Helium 虚拟环境中执行 `directory-server.py`\
  \ 脚本：\n\n```\n$(virtual) python directory_server.py\n```\n\n每个非目录服务器的 Helium 节点都维护着一个\
  \ JSON-RPC 客户端和一个 JSON-RPC 服务器。RPC 客户端向 Helium P2P 网络上的其他 RPC 服务器发出请求，并处理接收到的响应。同样，RPC\
  \ 服务器会响应网络上其他 RPC 客户端发出的请求。\n\n对于你创建的每个节点目录（`node_1`、`node_2`……）（除了 `seed` 目录），请将以下程序代码复制到文件\
  \ `networknode.py` 中，并将此文件保存到相应的 `node_x/hnetwork` 子目录中。\n\n让我们来看看这段程序代码：\n\n\n\n\
  ### 代码架构说明\n\n`networknode`：一个同步 RPC 客户端节点的实现，该节点使用 JSON RPC 协议版本 2 向 RPC 服务器发起远程过程调用，以及一个响应来自\
  \ RPC 客户端节点请求的 JSON-RPC 服务器。\n\n```python\n'''\nnetnode: 一个同步 RPC 客户端节点的实现，该节点使用\
  \ JSON RPC 协议版本 2 向 RPC 服务器发起远程过程调用，\n以及一个响应来自 RPC 客户端节点请求的 JSON-RPC 服务器。\n'''\n\
  import blk_index as blkindex\nimport hblockchain\nimport hchaindb\nimport hmining\n\
  import networknode\nfrom   tornado import ioloop, web\nfrom   jsonrpcserver import\
  \ method, async_dispatch as dispatch\nfrom   jsonrpcclient.clients.http_client import\
  \ HTTPClient\nimport ipaddress\nimport threading\nimport json\nimport pdb\nimport\
  \ logging\nimport os\nimport sys\nlogging.basicConfig(filename=\"debug.log\",filemode=\"\
  w\",  \\\nformat='server: %(asctime)s:%(levelname)s:%(message)s', level=logging.DEBUG)\n\
  ##################################\n#### JSON-RPC 客户端\n##################################\n\
  def hclient(remote_server, json_rpc):\n'''\n向远程 RPC 服务器发送同步请求\n'''\ntry:\nclient\
  \ = HTTPClient(remote_server)\nresponse = client.send(json_rpc)\nvalstr = response.text\n\
  val = json.loads(valstr)\nprint(\"结果: \" + str(val[\"result\"]))\nprint(\"id:  \"\
  \ + str(val[\"id\"]))\nreturn valstr\nexcept Exception as err:\nlogging.debug(\"\
  node_client: \" + str(err))\nreturn '{\"jsonrpc\": \"2.0\", \"result\":\"error\"\
  , \"id\":\"error\"}'\n#######################################\n#### JSON-RPC 服务器\n\
  #######################################\naddress_list = []\n@method\nasync def receive_transaction(trx):\n\
  \"\"\"\n接收在 Helium 网络上广播的交易\n\"\"\"\ntry:\nhmining.semaphore.acquire()\nret = hmining.receive_transaction(trx)\n\
  hmining.semaphore.release()\nif ret == False: return \"error: invalid transaction\"\
  \nreturn \"ok\"\nexcept Exception as err:\nreturn \"error: \" + err\n@method\nasync\
  \ def receive_block(block):\n\"\"\"\n接收在 Helium 网络上广播的区块\n\"\"\"\ntry:\nret = hmining.receive_block(block)\n\
  if ret == False: return \"error: invalid block\"\nreturn \"ok\"\nexcept Exception\
  \ as err:\nreturn \"error: \" + err\n@method\nasync def get_block(height):\n\"\"\
  \"\n返回指定高度的区块，如果区块不存在则返回错误\n\"\"\"\nwith hmining.semaphore:\nif len(hblockchain.blockchain)\
  \ == 0:\nreturn (\"error: empty blockchain\")\nif height  hblockchain.blockchain[-1][\"\
  height\"]:\nreturn \"error-invalid block height\"\nblock = json.dumps(hblockchain.blockchain[height])\n\
  return block\n@method\nasync def get_blockchain_height():\n\"\"\"\n返回区块链的高度。注意，第一个区块的高度为\
  \ 0\n\"\"\"\nwith hmining.semaphore:\nif hblockchain.blockchain == []: return -1\n\
  height = hblockchain.blockchain[-1][\"height\"]\nreturn height\n@method\nasync def\
  \ clear_blockchain():\n\"\"\"\n清除主区块链和辅助区块链。\n\"\"\"\npdb.set_trace()\nwith hmining.semaphore:\n\
  hblockchain.blockchain.clear()\nhblockchain.secondary_blockchain.clear()\nreturn\
  \ \"ok\"\nclass MainHandler(web.RequestHandler):\nasync def post(self):\nrequest\
  \ = self.request.body.decode()\nlogging.debug('decoded server request =  ' + str(request))\n\
  response = await dispatch(request)\nprint(response)\nself.write(str(response))\n\
  def startup():\n'''\n启动节点相关系统\n'''\ntry:\n### 移除所有锁文件\nos.system(\"rm -rf ../data/heliumdb/*\"\
  )\nos.system(\"rm -rf ../data/hblk_index/*\")\n### 启动链状态数据库\nret = hchaindb.open_hchainstate(\"\
  ../data/heliumdb\")\nif ret == False: return \"error: failed to start Chainstate\
  \ database\"\nelse: print(\"链状态数据库正在运行\")\n### 启动 LevelDB 数据库 blk_index\nret = blkindex.open_blk_index(\"\
  ../data/hblk_index\")\nif ret == False: return \"error: failed to start blk_index\"\
  \nelse: print(\"blkindex 数据库正在运行\")\nexcept Exception:\nreturn \"error: failed to\
  \ start Chainstate database\"\nreturn True\napp = web.Application([(r\"/\", MainHandler)])\n\
  ######################################################\n### 在本地回环地址上启动服务器节点的网络接口\n\
  #### 127.0.0.19:8081\n#####################################################\nif\
  \ __name__ == \"__main__\":\napp.listen(address=\"127.0.0.51\", port=\"8081\")\n\
  logging.debug('服务器节点正在运行')\nprint(\"网络节点启动于 127.0.0.19:8081\")\n###############################\n\
  ### 启动此节点\n###############################\nif startup() != True:\nlogging.debug('服务器节点资源故障')\n\
  print(\"正在停止\")\nsys.exit()\nlogging.debug('服务器节点正在运行')\nprint('服务器节点正在运行')\n################################\n\
  ### 启动事件循环\n################################\nioloop.IOLoop.current().start()\n\
  ```\n\n该代码库基于我们在附录 6 中的 JSON-RPC 实现。请注意，此特定节点正在监听`127.0.0.19:8081`。模拟网络上的每个网络节点必须在（`localhost`）上监听唯一的\
  \ IP 地址。\n\n## RPC 请求格式\n\n由 RPC 客户端发起的请求具有以下语法格式：\n\n```python\nrpc   = json.dumps({\"\
  jsonrpc\":\"2.0\",\"method\":\"receive_block\",\"params\":{\"block\": blocks[0]},\
  \ \"id\":21})\nret = networknode.hclient(\"http://127.0.0.51:8081\", rpc)\n```\n\
  \n`json.dumps()`函数的参数是 JSON-RPC v.2 格式的远程过程调用。第二个参数的值是要在远程服务器上调用的方法（`receive_block`）。第三个参数的值是要传递给远程函数的参数，参数是一个\
  \ Python 字典。如果我们调用一个不带任何函数参数的远程方法，第三个参数将是空字典`{}`。第四个参数是标识我们请求的数字 ID，远程服务器将使用此 ID\
  \ 返回其响应。此 JSON-RPC 命令在被放置到网络上之前，先由`json.dumps`打包为字符串。\n\n## 发送命令到远程服务器\n\n我们现在准备将此命令发送到远程服务器。`networknode`是包含\
  \ RPC 客户端和服务器的 Python 模块。函数`networknode.hclient()`将把命令发送到远程服务器。`networknode.hclient()`函数的第一个参数是被调用的远程\
  \ JSON-RPC 服务器的 IP 地址和端口。请注意，地址包含用于与此服务器通信的协议（`http`）。第二个参数是我们打包后的 RPC 命令。\n\n##\
  \ 远程 JSON 服务器响应格式\n\n远程 JSON 服务器通常会以以下语法格式的响应进行回复：\n\n```json\n'{\"jsonrpc\": \"\
  2.0\", \"result\": [\"127.0.0.10:8081\", \"127.0.0.11:8081\"],\"id\":5}'\n```\n\n\
  这是一个编码为字符串的 JSON 对象。我们可以通过函数`json.loads()`将其转换为 Python 字典。\n\n第一个键项指定了用于格式化响应的 JSON\
  \ RPC 版本。第二个键项是`\"result\"`，这个键的值是我们感兴趣的。第三个键`id`标识了此响应所对应的请求 ID。\n\n## 错误响应格式\n\
  \n在出错的情况下，服务器将以以下格式响应：\n\n```json\n'{\"jsonrpc\": \"2.0\", \"error\": \"message\"\
  , \"id\": 5 }'\n```\n或：\n```json\n'{\"jsonrpc\": \"2.0\", \"result\": \"error: message\"\
  , \"id\": 5 }'\n```\n\n## JSON-RPC 服务器部分\n\n`networknode`模块的第二部分是 JSON-RPC 服务器。请检查此模块中的`app.listen()`调用：\n\
  \n```python\napp.listen(address=\"127.0.0.19\", port=\"8081\")\n```\n\n这指定了服务器将在\
  \ IP 地址`127.0.0.19`的`8081`端口上监听。每个网络节点必须监听唯一的 IP 地址和端口组合。\n\n最后，请注意共享资源通过使用信号量来防止数据竞争。\n\
  \n## 启动服务器\n\n为了在模拟网络上启动此服务器，请导航到节点的`hnetwork`目录，并在 Helium 虚拟环境中执行`networknode.py`脚本：\n\
  \n```bash\n$(virtual) python networknode.py\n```\n\n\n\n## 氦气节点网络接口\n\n氦气加密货币 P2P\
  \ 网络上的节点执行以下网络任务：\n\n1.  查询节点地址并从一台或多台目录服务器获取地址列表。\n2.  向其他请求节点提供其地址列表。\n3.  查询其他节点以获取区块，并处理接收到的区块。\n\
  4.  获取节点区块链的高度。\n5.  接收网络上传播的交易和区块，并将其传播到其他节点。\n\n氦气网络接口的规范如下。接口中的所有功能都实现为 JSON\
  \ 远程过程调用。^(⁶⁵) JSON-RPC 服务器上的过程通过 HTTP 调用。^(⁶⁶) RPC 服务器异步处理远程过程调用。每个氦气挖矿节点在其`networknode`模块中实现了以下所有功能，因此它既是\
  \ JSON-RPC 服务器又是客户端。\n\n### 氦气启动脚本\n\n```\ndirectory_server.py\nnetworknode.py\n\
  ```\n\n有两种类型的启动脚本：一个名为`directory_server.py`的目录服务器启动脚本和一个名为`networknode.py`的节点启动脚本。\n\
  \n`directory_server.py`启动一个目录服务器，该服务器向请求节点提供氦气节点地址列表。\n\n`networknode.py`是一个 Python\
  \ 脚本，它启动一个氦气节点，并将 RPC 服务器节点置于 P2P 网络上的运行状态。如前所述，氦气网络上每个非目录服务器的节点都实现了一个 RPC 服务器和一个客户端。\n\
  \n### 地址解析\n\n```\nget_address_list() -> \"string\"\nregister_address(address: \"\
  string\") -> \"string\"\n```\n\n`get_address_list`：通过请求调用一个种子节点（目录服务器），要求其发送节点地址列表。远程服务器返回一个字符串化的\
  \ P2P 节点地址列表。\n\n`register_address`：节点向种子节点或目录服务器注册其地址（例如`127.0.0.34:8081`）。\n\n\
  ### 区块链初始化\n\n```\nclear_blockchain() -> \"string\"\n```\n\n此命令清除节点的主区块链和副区块链。如果区块链被清除，它将返回字符串\"\
  `ok`\"。\n\n### 区块链查询\n\n有两个远程过程调用可用于进行区块链查询：\n\n```\nget_blockchain_height() ->\
  \ \"integer\"\nget_block(block_no: \"int\") -> \"stringified block or an error string\"\
  \n```\n\n`get_blockchain_height`：向远程节点请求提供其区块链的高度。请求者收到一个整数回复。节点使用此函数来确定其区块链是否与其他节点的区块链同步，或用于填充空的区块链。如果由于停机或网络故障等原因，节点区块链的高度远小于其他节点区块链的高度，则会出现不同步的情况。\n\
  \n`get_block`：请求远程节点发送具有特定区块高度的区块。如果请求的区块不存在，此函数返回一个区块或一个错误字符串。错误字符串将包含单词`error`。\n\
  \n### 区块传播\n\n```\nreceive_block(block: \"string\") -> \"ok or an error string\"\
  \n```\n\n`receive_block`：一个节点（作为 JSON-RPC 客户端）向远程节点（作为 JSON-RPC 服务器）发送一个区块。函数参数是一个字符串化的区块。该区块可以是新挖出的区块，或是在氦气\
  \ P2P 网络上传播的区块。如果发生错误，该函数将返回一个错误字符串。错误字符串将包含单词`error`。\n\n### 交易传播\n\n```\nreceive_transaction(transaction:\
  \ \"string\") -> \"ok or an error string\"\n```\n\n节点通过由远程节点（作为 JSON-RPC 客户端）发起的远程过程调用接收交易。如果发生错误，此函数返回一个错误字符串。错误字符串将包含单词`error`。\n\
  \n### 节点进程空间\n\n我们模拟的 P2P 网络在实际用途上与运行在互联网上的氦气网络完全相同。需要牢记的一点是，每个节点的 JSON-RPC 服务器和客户端都在其自己的进程空间中执行，特别是，即使所有内容都运行在一台机器上，也没有共享内存或程序代码。客户端只能通过\
  \ HTTP 和 JSON-RPC 2.0 协议与服务器通信。进一步说明，每个`networknode`模块及其导入的所有模块都在其自己的进程空间中执行。\n\n\
  ### 氦气网络接口的 Pytest 测试\n\n要开始测试，请确保你已按先前所述创建了模拟网络，并启动了一些服务器节点和一个或多个目录服务器节点。请确保在实例化服务器时你处于虚拟氦气环境中，并且每个服务器都在监听一个唯一的地址。我们的\
  \ Pytest 代码使用一个监听在`127.0.0.69:8081`的目录服务器，以及一个监听在`127.0.0.51:8081`的用于远程挖矿节点的 JSON-RPC\
  \ 服务器。最后，将`networknode.py`复制到`unit_tests`目录，并在`127.0.0.19:8081`启动一个服务器。\n\n将以下 Pytest\
  \ 程序代码复制到一个名为`test_hnetwork.py`的文件中，并将此文件保存在氦气根目录的`unit_tests`子目录中。\n\n该文件中的测试是集成测试，也就是说，它们在实际的模拟网络上执行远程过程调用，并返回获得的实际结果。它们不会模拟测试中涉及的任何函数。为了实现这一点，测试借助`make_blocks`和`make_random_transaction`函数构建了一个实际的合成区块链。附录\
  \ 7 讨论了创建任意高度的模拟区块链。\n\n导航到氦气根目录的`unit_tests`目录，并使用以下命令运行测试：\n\n```\n$(virtual)\
  \ pytest test_hnetwork.py -s\n```\n\n注意：在使用这些单元测试测试模块时，不要从命令行实例化`hmining`模块并执行`mine_blocks`。\n\
  \n注意\n\n你可以通过使用`-s`选项获取测试的扩展输出，例如：\n\n```\n$(virtual) pytest test_hnetwork.py -s\
  \ -k test_get_address_list\n```\n\n`-k`选项仅测试`test_get_address_list`而忽略其他测试。`-s`选项可提供扩展输出，否则该输出会被抑制。对于此特定测试，`-s`选项将在终端屏幕上打印接收到的地址列表。命令\n\
  \n```\n$(virtual) pytest test_hnetwork.py -s\n```\n\n将执行所有测试并提供扩展输出。\n\n你应该会看到六个测试通过。请注意，执行这些测试将输出构建模拟网络时的交易片段。\n\
