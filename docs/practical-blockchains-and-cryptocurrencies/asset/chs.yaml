  def test_unlock_bad_pubkey():\n    \"\"\"\n    使用错误的公钥测试解锁交易\n    \"\"\"\n    global\
  \ prev_tx_keys\n    prev_tx_keys.clear()\n    txn1 = make_synthetic_previous_transaction(4)\n\
  \    txn2 = make_synthetic_transaction(2)\n    # 创建一个交易片段，其中 txn2 的第一个 vin 元素\n\
  \    # 消耗 txn1 的第一个 vout 元素的值\n    # 在 tx2 中合成消耗的 vin 元素\n    vin = {}\n    vin['txid']\
  \ = txn1[\"transactionid\"]\n    vin['vout_index'] = 0\n    vin['ScriptSig'] = {}\n\
  \    signature = rcrypt.sign_message(prev_tx_keys[1][0], prev_tx_keys[1][1])\n \
  \   pubkey = prev_tx_keys[1][1]\n    sig = []\n    sig.append(signature)\n    sig.append(pubkey\
  \ + \"corrupted\")\n    vin['ScriptSig'] = sig\n    # txn2 中的公钥哈希\n    ripemd_hash\
  \ = rcrypt.make_RIPEMD160_hash(rcrypt.make_SHA256_hash(prev_tx_keys[1][1]))\n  \
  \  fragment = {\n        \"value\": 210,\n        \"pkhash\": ripemd_hash,\n   \
  \     \"spent\": False,\n        \"tx_chain\": txn2[\"transactionid\"] + \"_\" +\
  \ \"0\",\n        \"checksum\": rcrypt.make_SHA256_hash(txn1[\"transactionid\"])\n\
  \    }\n    assert tx.unlock_transaction_fragment(vin, fragment) == False\n\ndef\
  \ test_unlock_good():\n    \"\"\"\n    使用正确的私钥-公钥对测试解锁交易\n    \"\"\"\n    global\
  \ prev_tx_keys\n    prev_tx_keys.clear()\n    txn1 = make_synthetic_previous_transaction(4)\n\
  \    txn2 = make_synthetic_transaction(2)\n    # 创建一个交易片段，其中 txn2 的第一个 vin 元素\n\
  \    # 消耗 txn1 的第一个 vout 元素的值\n    # 在 tx2 中合成消耗的 vin 元素\n    vin = {}\n    vin['txid']\
  \ = txn1[\"transactionid\"]\n    vin['vout_index'] = 0\n    vin['ScriptSig'] = {}\n\
  \    signature = rcrypt.sign_message(prev_tx_keys[1][0], prev_tx_keys[1][1])\n \
  \   pubkey = prev_tx_keys[1][1]\n    sig = []\n    sig.append(signature)\n    sig.append(pubkey)\n\
  \    vin['ScriptSig'] = sig\n    # txn2 中的公钥哈希\n    ripemd_hash = rcrypt.make_RIPEMD160_hash(rcrypt.make_SHA256_hash(prev_tx_keys[1][1]))\n\
  \    fragment = {\n        \"value\": 210,\n        \"pkhash\": ripemd_hash,\n \
  \       \"spent\": False,\n        \"tx_chain\": txn2[\"transactionid\"] + \"_\"\
  \ + \"0\",\n        \"checksum\": rcrypt.make_SHA256_hash(txn1[\"transactionid\"\
  ])\n    }\n    assert tx.unlock_transaction_fragment(vin, fragment) == True\n```\n\
  \n\n## 更新 Helium 区块链模块\n\n现在我们已经拥有一个功能完整的交易模块；接下来需要更新 `hblockchain` 模块，让其能够验证区块中的交易。请确保将\
  \ `tx` 模块导入到 `hblockchain` 中。删除 `hblockchain` 模块中的 `add_block` 函数，并添加以下替代函数：\n\n\
  ```\ndef add_block(block: \"dictionary\") -> \"bool\":\n\"\"\"\nadd_block: 向区块链添加一个区块。接收一个区块。\n\
  检查区块属性是否有效，并验证区块中的每一笔交易。\n如果没有任何错误，则将区块以原始字节序列的形式写入文件。\n随后将该区块添加到区块链中。\n如果区块成功添加到区块链则返回\
  \ True，否则返回 False。\n\"\"\"\ntry:\n### 验证接收到的区块参数\nif validate_block(block) == False:\n\
  raise(ValueError(\"block validation error\"))\n### 验证区块中的交易\nfor trx in block['tx']:\n\
  ### 区块中的第一笔交易是 coinbase 交易\nif block[\"height\"] == 0 or block['tx'][0] == trx:\
  \ zero_inputs = True\nelse: zero_inputs = False\nif tx.validate_transaction(trx,\
  \ zero_inputs) == False:\nraise(ValueError(\"transaction validation error\"))\n\
  ### 将区块序列化到文件\nif (serialize_block(block) == False):\nraise(ValueError(\"serialize\
  \ block error\"))\n### 将区块添加到内存中的区块链\nblockchain.append(block)\nexcept Exception\
  \ as err:\nprint(str(err))\nlogging.debug('add_block: exception: ' + str(err))\n\
  return False\nreturn True\n```\n\n此方法会在将区块添加到区块链之前，验证该区块中的所有交易。\n\n## 本章小结\n\n在本章中，我们编写了用于验证\
  \ Helium 交易的程序代码。我们还为交易程序代码编写了单元测试。最后，我们优化了 Helium 区块链代码，使其在将区块添加到区块链之前验证交易。\n\n\
  你可能已经注意到，我们尚未实现从先前交易中检索未花费交易值的代码。此功能在我们的单元测试中被模拟了。下一章将解决这个问题。\n\n我们将为 Helium 实现两个数据库。与比特币类似，我们将实现一个\
  \ LevelDB 数据库，用于验证和获取未花费的交易金额。我们还将实现第二个 LevelDB 数据库，以便快速定位特定交易所在的区块。\n\n# 12. 链状态\n\
  \n在上一章中，我们实现了验证交易完整性的程序代码。这段代码中有一个重大遗漏：我们没有解决如何从先前交易中获取未花费值的问题，也没有处理验证先前交易中未花费值的相关事宜。遗漏的原因是未花费值是在键值存储中实现的。在本章中，我们将通过为交易实现一个键值存储来弥补这一不足。我们还将实现一个键值存储，用于确定包含特定交易的区块。\n\
  \n简而言之，键值存储是一种将键映射到值的数据结构。给定一个键，我们可以获取与其关联的值。存储中的键是唯一的。如果你想要一个类比，那么电话簿就是一个很好的模拟键值存储的例子。键值存储的主要且显著的优势在于它提供了对存储的随机访问。因此，获取、修改和删除键值都极其快速。一个非常大的持久化键值存储可以在一次磁盘访问中搜索并获取一个值。\n\
  \n在比特币中，未花费交易值的键值存储是通过 LevelDB 数据库实现的。Helium 在其实现中也使用了 LevelDB。本书附录 2 对安装和使用 LevelDB\
  \ 进行了很好的介绍。如果你不熟悉 LevelDB，应该阅读该附录。LevelDB 是一个特别简单的键值存储。这是有意为之的设计。LevelDB 的设计目标是实现一个极其简单、速度极快且具有极高可靠性的持久化存储。例如，你会注意到\
  \ LevelDB 仅支持字符串键和字符串值，并且 API 接口非常小。\n\n## 查找未花费的交易值\n\n在比特币和 Helium 中，区块作为普通文本文件存储在磁盘上。区块不存储在数据库中。这是一个刻意的设计特性。比特币的设计目标是将加密货币的实现保持在尽可能简单的水平。这最大化了可靠性。通过简单地将区块作为普通二进制文件存储到磁盘，确保区块成功写入磁盘的责任就落在了操作系统的肩上。此外，操作系统必须确保这些文件不会损坏。加密货币应用程序只需检查操作系统对写入区块请求的响应。这种基于文件的区块存储实现还有另一个原因。在比特币和\
  \ Helium 中，所有数据库和其他所需的数据结构都可以从这些区块文件从头开始构建。因此，唯一重要的故障点是任何缺失或损坏的区块文件。由于区块链是不可变的结构，区块文件也必须是不可变的、一次写入、多次读取的结构。确保区块文件完整性的主要责任在于操作系统。这种区块存储的实现比将区块存储在\
  \ SQL 或 NoSQL 数据库中要简单得多。\n\n然而，这种基于文件的区块存储模型存在一个固有的缺陷。考虑一笔交易，我们想要使用某笔先前交易中的某个值。进一步假设我们只有与该值对应的交易\
  \ ID。我们必须从包含该交易的区块中检索该交易，然后确定该值是否未被花费。由于区块没有索引，这将需要搜索所有区块文件以找到该特定交易，然后搜索后续是否有交易花费了这个值。例如，如果区块链由一千万个区块文件组成，那么这种搜索显然会慢得不可接受。在现实世界的应用中，每秒可能有数千笔交易。\n\
  \n交易存储可以通过在内存键值存储中维护交易元数据来解决这一可扩展性问题。每次发生交易时，应用程序都会将与该交易相关的元数据保存到键值存储中，并将这些数据持久化到磁盘。现在，如果应用程序需要查询区块链有关某一交易的信息，它会搜索键值存储，由于这种存储提供随机访问，响应几乎是即时的。我们将构建一个\
  \ LevelDB 数据库实现，为交易提供这种能力，并构建第二个 LevelDB 数据库，允许我们查询包含特定交易的区块。\n\n\n\n## 链状态数据库设计\n\
  \n我们将提供查询交易输出未花费状态能力的 LevelDB 数据库称为链状态数据库，或简称为 Chainstate。Chainstate 将帮助我们确定某个特定交易是否存在，以及某个特定交易价值是否已被花费。此外，Chainstate\
  \ 还会提供其他对交易处理有用的元信息。\n\nChainstate 数据库在构建钱包方面也极具价值。类似比特币的加密货币并不为每个进行交易的实体维护一个账户。相反，加密货币网络维护着一个记录交易发生的分布式账本。使用此类加密货币的客户端必须维护自己的钱包来进行交易。这样的钱包将包含用户的公私钥对，以及钱包持有者创建的公共地址上可用的未花费价值。钱包将提供钱包持有者已完成的交易历史记录。最后，钱包还允许用户创建用于交易的公私钥。您会注意到，如果没有这样的钱包，客户端将不得不维护整个区块链的本地副本，并在每次想要进行交易时查询区块链。\n\
  \n以下是 Chainstate 数据库的记录结构：\n\n```\nkey: \"transaction_index\" + \"_\" + \"vout_index\"\
  \nvalue: {\n\"pkhash\":\n\"value\":\n\"spent\":\n\"tx_chain\"\n}\n```\n\n该键称为交易键，是交易\
  \ ID 与指向所需价值所在位置的 *vout 列表* 索引的拼接。这两部分信息足以识别先前交易中的某个价值。由于交易 ID 的特性，交易键保证是全局唯一的。\n\
  \n与键关联的值是一个字典。我们将这个键值对称为交易片段。其字段解释如下。\n\n`value` 是一个正数。它是交易键中 `transactionid` 和\
  \ `vout index` 所指代交易中可花费的氦分数量。`value` 是一个整数。\n\n`pk_hash` 是以下形式的字符串：\n\n```\n\"\
  pk_hash\": RIPEMD_160(SHA-256(public_key))\n```\n\n`pk_hash` 由价值的接收方提供给转让方的公共地址构建而成。^(⁵³)\n\
  \n`spent` 是布尔类型。如果该价值已被花费则为 True，否则为 False。\n\n`tx_chain` 指向花费了此输出的交易输入。如果输出尚未被花费，则\
  \ `tx_chain` 为空。\n\n由于 LevelDB 数据库只接受字符串类型的键和值，我们在将交易片段字典插入数据库之前必须将其转换为字符串。^(⁵⁴)\
  \ 在 Python 中，可以很容易地使用 `json` 模块中的 `dumps` 函数来实现这一点。\n\n我们的 Chainstate 数据库将有五个接口函数：\n\
  \n```\nopen_chainstate(directory_path: \"string\")\nclose_chainstate()\nput_transaction(key:\
  \ \"string\", value: \"dictionary\") => \"bool\"\nget_transaction(key: \"string\"\
  ) => \"bool or string\"\ntransaction_update(key: \"string\") => \"bool\"\n```\n\n\
  `open_chainstate` 函数打开 Helium LevelDB Chainstate 数据库，如果该数据库不存在则创建它。此函数接收包含完整或部分文件路径的参数，其中包含数据库名称。`close_chainstate`\
  \ 用于关闭数据库。\n\n`get_transaction` 函数接收一个格式为“`transaction id` + `\"_\"` + `str(vout_index)`”的交易键。此函数返回与该键相关的交易片段，如果\
  \ Chainstate 中不存在该键则返回 False。\n\n`put_transaction` 函数向 Chainstate 添加一个键值对。此函数接收一个交易键和一个交易片段作为参数。如果键值对成功添加到\
  \ Chainstate 则返回 True，否则返回 False。`put_transaction` 对 Chainstate 执行同步写入操作。\n\nLevelDB\
  \ API 期望接收字节串参数并返回字节串。字节串是长度前缀字符串（与以空终止符 `'\\0'` 结尾的字符串相对）。这对于确保跨网络的传输可移植性是必需的。这些转换由我们的接口函数在内部处理。LevelDB\
  \ API 还包含一些函数，允许在将键值对写入存储之前进行批处理；这是一个性能特性。\n\n`transaction_update` 函数在交易价值被花费时更新\
  \ Chainstate 数据库。此函数确保其价值正在被花费的先前交易片段确实存在。它防止了对已花费价值的“双重花费”。此函数将交易片段标记为已花费，并将片段属性\
  \ `tx_chain` 设置为接收了可花费价值的交易片段。此函数接收一个交易作为其参数。\n\n我们现在可以为 chainstate 模块实现程序代码了。\n\
  \n## 链状态数据库代码\n\n确保您已编译并安装了 LevelDB 数据库。此外，请确保您在虚拟 Helium 环境中安装了 LevelDB Python\
  \ 接口，即 `plyvel` 模块。相关说明见附录 2。\n\n接下来，我们将创建一个空的 Helium LevelDB 数据库。该数据库将位于 Helium\
  \ 根目录下的 `data` 子目录中。导航到虚拟环境的根目录，进入 Python shell，并执行以下操作：\n\n```\n$(virtual) python\n\
  >>> import plyvel\n### 创建 Helium Chainstate 键值存储\n>>> db = plyvel.DB('data/heliumdb/')\n\
  ```\n\n如果您导航到 `data` 目录，您将看到一个 `heliumdb` 子目录。此子目录包含 Chainstate 文件。\n\n现在我们准备对 Helium\
  \ Chainstate 程序代码进行逐步讲解。将以下代码复制到名为 `hchaindb.py` 的文件中，然后将此文件复制到根目录下的 `chainstate`\
  \ 子目录中。\n\nHelium 在追踪和汇总交易方面有着特别简单的实现。`open_hchainstate` 函数接收包含 LevelDB 数据库名称的完整或部分文件路径。它打开路径中指定的\
  \ Helium Chainstate 数据库，如果该数据库不存在则创建它。此函数不会创建文件路径中列出的任何不存在的子目录。如果函数成功，它会返回一个指向 Chainstate\
  \ 数据库的句柄。如果失败，函数返回 False。\n\n`close_hchainstate` 函数接收一个指向 Chainstate 的句柄，并有序地关闭数据库。\n\
  \n`put_transaction` 函数接收一个交易键和一个交易片段作为参数。如果成功将 `transactionid`、`transaction fragment`\
  \ 键值对插入 Chainstate 数据库，则返回 True，否则返回 False。\n\n`get_transaction` 函数有一个交易键参数，并返回与该键关联的交易片段（以及校验和）。如果交易键是虚构的，`get_transaction`\
  \ 返回 False。\n\n`update_transaction` 函数在先前未花费价值被花费时更新 Chainstate。特别地，它防止一个未花费价值被两次或多次花费。此函数以一个交易作为其参数：\n\
  \n\n\n```python\n\"\"\"\nHelium 链状态键值存储的实现。该存储使我们能够通过交易密钥访问交易片段的相关信息。\n\"\"\"\n\
  import hconfig\nimport rcrypt\nimport plyvel\nimport logging\nimport json\nimport\
  \ pdb\n\n\"\"\"\n将调试信息记录到 debug.log 文件中\n\"\"\"\nlogging.basicConfig(filename=\"\
  debug.log\", filemode=\"w\",\n                    format='%(asctime)s:%(levelname)s:%(message)s',\
  \ level=logging.DEBUG)\n\n### Helium 链状态数据库句柄\nhDB = None\n\n\ndef open_hchainstate(filepath:\
  \ \"string\") -> \"db handle or False\":\n    \"\"\"\n    打开 Helium 链状态键值存储并返回其句柄。\n\
  \    如果数据库不存在，则会创建该数据库。filepath 中的所有目录必须已存在。\n    成功则返回数据库句柄，否则返回 False\n    \"\"\
  \"\n    try:\n        global hDB\n        hDB = plyvel.DB(filepath, create_if_missing=True)\n\
  \    except Exception as err:\n        logging.debug('open_hchainstate: exception:\
  \ ' + str(err))\n        return False\n    return hDB\n\n\ndef close_hchainstate()\
  \ -> \"bool\":\n    \"\"\"\n    关闭 Helium 链状态存储\n    如果数据库已关闭则返回 True，否则返回 False\n\
  \    \"\"\"\n    global hDB\n    try:\n        hDB.close()\n        if hDB.closed\
  \ != True:\n            return False\n    except Exception as err:\n        logging.debug('close_hchainstate:\
  \ exception: ' + str(err))\n        return False\n    return True\n\n\ndef put_transaction(txkey:\
  \ \"string\", tx_fragment: \"dictionary\") -> \"bool\":\n    \"\"\"\n    在链状态数据库中创建键值对\n\
  \    接收一个交易密钥和一个交易片段。\n    交易密钥的格式为：transactionid + \"_\" + str(vout_index)\n  \
  \  接收的 tx_fragment 参数格式如下：\n    {\n        \"pkhash\":                  \n     \
  \   \"value\":                   \n        \"tx_chain\"                 \n    }\n\
  \    如果键值对创建成功则返回 True，否则返回 False\n    \"\"\"\n    try:\n        # 如果交易密钥已存在则删除，因为交易片段即将被更新\n\
  \        encoded_key = str.encode(txkey)\n        hDB.delete(encoded_key)\n    \
  \    keyvalue = json.dumps(tx_fragment)\n        # 将 txkey-fragment 键值对保存到存储中\n\
  \        hDB.put(encoded_key, str.encode(keyvalue))\n    except Exception as err:\n\
  \        print(str(err))\n        logging.debug('put_transaction: exception: ' +\
  \ str(err))\n        return False\n    return True\n\n\ndef get_transaction(key:\
  \ \"string\") -> \"False or dictionary\":\n    \"\"\"\n    接收一个交易片段的交易密钥 (格式为：transactionid\
  \ + \"_\" + str(vout_index))\n    如果成功则返回该密钥对应的值（字典形式），否则返回 False。返回的交易片段格式如下：\n\
  \    {\n        \"pkhash\":                  \n        \"value\":              \
  \     \n        \"spent\":                   \n        \"tx_chain\"            \
  \     \n    }\n    \"\"\"\n    try:\n        # 获取与交易密钥对应的交易片段，如果密钥不存在则返回 False\n\
  \        fragment = hDB.get(str.encode(key))\n        if fragment == None:\n   \
  \         raise (ValueError(\"transaction fragment not found\"))\n        fragment\
  \ = json.loads(fragment.decode())\n    except Exception as err:\n        logging.debug('get_transaction:\
  \ exception: ' + str(err))\n        return False\n    return fragment\n\n\ndef transaction_update(trx:\
  \ \"transaction\") -> \"bool\":\n    \"\"\"\n    接收一个交易。更新链状态数据库以反映该交易。将之前的交易片段标记为已花费。\n\
  \    并更新这些片段，注明其被哪个交易 ID 所消费。\n    如果执行成功则返回 True，否则返回 False\n    \"\"\"\n    try:\n\
  \        # 收集所有前序交易的输出并将其标记为已花费\n        # 指定消费前序交易输入的交易密钥\n        for vin in trx[\"\
  vin\"]:\n            # 获取前序交易片段。该片段必须存在\n            prev_tx_key = vin[\"txid\"\
  ] + \"_\" + str(vin[\"vout_index\"])\n            tx_fragment = get_transaction(prev_tx_key)\n\
  \            if tx_fragment == False:\n                print(\"vin fragment not\
  \ found: \" + prev_tx_key)\n                raise (ValueError(\"transaction fragment\
  \ not found\"))\n            # 双重花费错误\n            # 应当在写入链状态之前被检测到\n          \
  \  if tx_fragment[\"spent\"] == True:\n                print(\"fragment is double\
  \ spend error: \" + prev_tx_key)\n                raise (ValueError(\"transaction\
  \ fragment double spend error: \" + prev_tx_key))\n            # 将前序交易片段中的 spent\
  \ 值设置为 True\n            tx_fragment[\"spent\"] = True\n            # 设置对消费交易的引用\n\
  \            tx_fragment[\"tx_chain\"] = trx[\"transactionid\"] + \"_\" + str(vin[\"\
  vout_index\"])\n            # 保存到 HeliumDB\n            ret = put_transaction(prev_tx_key,\
  \ tx_fragment)\n            if ret == False:\n                raise (ValueError(\"\
  failed to update spent tx fragment\"))\n        # 将消费交易的片段放入 HeliumDB\n        ctr\
  \ = 0\n        for vout in trx[\"vout\"]:\n            tx_fragment = {}\n      \
  \      txkey = trx[\"transactionid\"] + \"_\" + str(ctr)\n            tx_fragment[\"\
  pkhash\"] = vout[\"ScriptPubKey\"][2]\n            tx_fragment[\"value\"] = vout[\"\
  value\"]\n            tx_fragment[\"spent\"] = False\n            tx_fragment[\"\
  tx_chain\"] = \"\"\n            if put_transaction(txkey, tx_fragment) == False:\n\
  \                raise (ValueError(\"failed to insert consuming transaction fragment\"\
  ))\n            ctr += 1\n    except Exception as err:\n        print(str(err))\n\
  \        logging.debug('transaction_update: exception: ' + str(err))\n        return\
  \ False\n    return True\n```\n\n## 链状态数据库的 Pytest 测试\n\n将以下单元测试代码复制到 `test_hchaindb.py`\
