  \ chain.transaction_update(trx) == False\n```\n\n## 更新 tx 模块\n\n既然我们已经拥有一个功能完备的链状态模块，接下来可以更新\
  \ `tx` 模块以获取前一笔交易片段。请确保将 `hchaindb` 和 `json` 模块导入到 `tx` 模块中。在 `tx` 模块中，移除 `prevtx_value`\
  \ 函数，并插入以下函数作为替代：\n\n```python\ndef prevtx_value(txkey: \"string\") -> 'bool':\n\
  \    \"\"\"\n    检查链状态数据库，返回与 txkey 对应的交易片段：\n    {\n        \"pkkhash\":  <pkhash>,\n\
  \        \"value\":    <value>,\n        \"spent\":    <spent>,\n        \"tx_chain\"\
  : <tx_chain>\n    }\n    接收一个交易片段键：\n    \"前一笔交易 ID\" + \"_\" + str(prevtx_vout_index)\n\
  \    如果交易不存在，或者该值已被花费，或者值不是正整数，则返回 False\n    否则返回前一笔交易片段数据\n    \"\"\"\n    try:\n\
  \        fragment = hchaindb.get_transaction(txkey)\n        if fragment == False:\n\
  \            raise(ValueError(\"无法从链状态获取片段\"))\n        # 如果值已被花费或值不是正数，则返回 False\n\
  \        if fragment[\"spent\"] == True:\n            raise(ValueError(\"无法在链状态中重新花费片段:\
  \ \" + txkey))\n        if fragment[\"value\"] <= 0:\n            raise(ValueError(\"\
  片段值 <= 0\"))\n    except Exception as err:\n        logging.debug('prevtx_value:\
  \ 异常: ' + str(err))\n        return False\n    return fragment\n```\n\n如果 `prevtx_value`\
  \ 无法从链状态获取交易片段，则返回 `False`。如果交易键是虚构的，链状态将返回 `False`。另外，如果返回的字典中的值项不是正整数，或者该值已被花费，`prevtx_value`\
  \ 也会返回 `False`。\n\n\n\n## `blk_index` 数据库\n\n`blk_index` 数据库使我们能够确定包含特定交易的区块。这是一个\
  \ LevelDB 数据库。\n\n`blk_index` 数据库包含五个接口函数：\n\n```\nopen_blk_index(directory_path:\
  \ \"string\")\nclose_blk_index()\nget_blockno(key: \"string\") => \"bool or integer\"\
  \nput_index(key: \"string\", value: \"integer\") => \"bool\"\ndelete_index(key:\
  \ \"string\") => \"bool\"\n```\n\n`open_blk_index` 函数用于打开 Helium LevelDB `blk_index`\
  \ 数据库，如果数据库不存在则创建它。该函数接收一个完整或部分文件路径参数，其中包含数据库名称。`close_blk_index` 函数用于关闭数据库。\n\n\
  `get_blockno` 函数接收一个交易键作为参数。该函数返回包含该交易的区块编号（或区块高度），如果该交易键在 `blk_index` 中不存在，则返回\
  \ `False`。请注意，这是一个交易 ID，而不是指向交易片段的指针。\n\n`put_index` 函数用于向 `blk_index` 添加一个键值对。该函数接收一个交易\
  \ ID 键和一个区块编号（或区块高度）作为参数。如果键值对被成功添加到 `blk_index`，则返回 `True`，否则返回 `False`。请注意，创世区块的高度为零。\n\
  \n`delete_index` 函数接收一个交易键，如果该键值对存在，则从 `blk_index` 中删除交易键与区块编号对。如果该键不存在或出现其他错误，此函数返回\
  \ `False`。否则，函数返回 `True`。\n\n### `blk_index` 代码解读\n\n我们将创建一个空的 Helium `blk_index`\
  \ 数据库。该数据库将位于 Helium 应用程序根目录下的 `data` 子目录中。切换到虚拟环境的根目录，进入 Python shell，然后执行以下操作：\n\
  \n```\n#### 创建 Helium blk_index 键值存储\n>>> db = plyvel.DB('data/blk_index')\n```\n\
  \n如果你切换到 `data` 目录，你会看到一个 `blk_index` 子目录已被创建。该子目录包含 Helium `blk_index` 数据库。\n\n\
  将以下程序代码复制到文件 `blk_index.py` 中，并将该文件复制到 `chainstate` 目录：\n\n```python\n\"\"\"\nHelium\
  \ 区块索引键值存储的实现\n使我们能够搜索包含某交易的区块\n\"\"\"\nimport plyvel\nimport pdb\nimport logging\n\
  import json\nimport rcrypt\n\"\"\"\n将调试消息记录到文件 debug.log 中\n\"\"\"\nlogging.basicConfig(filename=\"\
  debug.log\",filemode=\"w\", format='%(asctime)s:%(levelname)s:%(message)s',\nlevel=logging.DEBUG)\n\
  #### Helium blk_index 键值存储的句柄\nbDB = None\ndef open_blk_index(filepath: \"string\"\
  ) -> \"db handle or False\":\n\"\"\"\n打开 Helium blk_index 存储并返回该数据库的句柄。\nfilepath\
  \ 中的所有目录必须存在。\n如果数据库不存在则会创建它。\n返回数据库句柄或 False\n\"\"\"\ntry:\nglobal bDB\nbDB = plyvel.DB(filepath,\
  \ create_if_missing=True)\nprint(\"blk_index opened\")\nexcept Exception as err:\n\
  print(\"open_blk_index: exception: \" + str(err))\nlogging.debug(\"open_blk_index:\
  \ exception: \" + str(err))\nreturn False\nreturn bDB\ndef close_blk_index() ->\
  \ \"bool\":\n\"\"\"\n关闭 Helium 区块索引存储\n如果数据库已关闭则返回 True，否则返回 False\n\"\"\"\ntry:\n\
  bDB.close()\nif bDB.closed != True: return False\nexcept Exception as err:\nlogging.debug(\"\
  close_blk_index: exception: \" + str(err))\nreturn False\nreturn True\ndef get_blockno(txid:\
  \ \"string\") -> \"False or integer\":\n\"\"\"\n接收一个交易 ID（不是交易片段 ID）\n返回包含该交易的区块的区块编号：\n\
  \"\"\"\ntry:\n#### 获取区块编号，如果该交易在存储中不存在则返回 False\nblock_no = bDB.get(str.encode(txid))\n\
  if block_no == None:\nraise(ValueError(\"txid does not have a block no.\"))\nblock_no\
  \ = block_no.decode()\nblock_no = int(block_no)\nexcept Exception as err:\nlogging.debug('get_blockno:\
  \ exception: ' + str(err))\nreturn False\nreturn block_no\ndef put_index(txid: \"\
  string\", blockno: \"integer\") -> \"bool\":\n如果成功创建了 transactionid_block_no 键值对，则返回\
  \ True，否则返回 False\n\"\"\"\ntry:\nif len(txid.strip()) != 64:\nraise(ValueError(\"\
  txid invalid length\"))\nif len(str(blockno).strip()) == 0:\nraise(ValueError(\"\
  blockno field is empty\"))\nif blockno < 0:\nraise(ValueError(\"negative blockno\"\
  ))\n#### 在存储中保存 transactionid-block no 键值对\nbDB.put(str.encode(txid), str.encode(str(blockno)))\n\
  except Exception as err:\nlogging.debug('put_blockno: exception: ' + str(err))\n\
  return False\nreturn True\ndef delete_index(txid: \"string\"):\n\"\"\"\n从 blk_index\
  \ 存储中删除一个 (txid, blockno) 键值对\n\"\"\"\ntry:\nbDB.delete(str.encode(txid))\nexcept\
  \ Exception as err:\nlogging.debug('delete_tx_blockno: exception: ' + str(err))\n\
  return False\nreturn True\n```\n\n## `blk_index` 数据库的 Pytest 测试\n\n将以下单元测试代码复制到文件\
  \ `test_blk_index.py` 中，并将该文件保存在 `unit_tests` 目录中。切换到 `unit_tests` 目录，在虚拟 Helium\
