  trans: "  \n# 结论  \n\n本章我们探讨了加密货币挖矿过程的工作原理。在类似比特币的分布式加密货币中，挖矿扮演着至关重要的角色。挖矿节点验证交易并将区块添加到本地区块链中。这些节点无需依赖信任、中央时钟或超级节点协调器，即可就主链或占主导地位的区块链达成分布式共识。我们研究了网络中区块链如何通过应用分布式共识算法收敛到单一视图的区块链。最后，我们分析了分布式加密货币如何解决“双重支付”问题。\
    \  \n\n下一章，我们将为 Helium 挖矿节点编写程序代码。  \n\n# 14. Helium 挖矿  \n\n上一章我们详细探讨了加密货币的挖矿过程。在模仿比特币构建的分布式加密货币中，挖矿是一个关键环节。回顾一下，挖矿会产生三个结果：\
    \  \n\n1. 将新区块附加到区块链上  \n2. 就区块链的内容达成分布式共识，进而对网络中的交易达成分布式共识  \n3. 创建新的加密货币单位并分配给矿工\
    \  \n\n本章我们将以理论概念为基础，通过实现挖矿节点来解决一个复杂的数学问题，从而达成分布式共识。解决这个问题被称为工作量证明，它使挖矿节点能够将区块附加到区块链上，并获得丰厚的挖矿奖励和交易费用。挖矿是一项计算密集型任务，因此会消耗大量电力。节点之间相互竞争以获取挖矿的经济利益。实现利润最大化的唯一途径就是尽可能多地挖掘区块，并将其附加到最长的区块链上。更长的区块链意味着在其上投入了更多的计算工作量。矿工不会尝试将新挖出的区块附加到较短的次级区块链上，因为这条区块链最终会被其他矿工删除。\
    \  \n\n本章我们将为 Helium 挖矿节点编写 Python 程序代码。像往常一样，我们将使用`pytest`单元测试来强化这段代码。闲话少叙，让我们开始这项任务。\
    \  \n\n## 分布式共识算法详解  \n\n在第 13 章中，我们描述了区块在 Helium 网络中的处理流程，以及网络如何就区块链达成分布式共识。现在，我们将提供矿工节点用于处理交易和区块并达成分布式共识的精确算法：\
    \  \n\n| **处理传入交易**                                                          \
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                                                               |\n|--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    | 交易到达矿工接口。存在两种情况：                                                           \
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                                              |\n| **情况 A：** | 如果交易有效，则将其添加到`mempool`中。具体而言，由于交易有效，它不会花费`Chainstate`数据库中已被花费的交易片段。\
    \                                                                            \
    \                                                                            \
    \                              |\n|              | **将交易添加到候选区块**            \
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                      |\n|              | 当交易被添加到候选区块时，我们会维护一个临时列表，记录这些交易将要花费的先前交易片段。如果被选入候选区块的交易试图花费该列表中的某个片段，则该交易将被拒绝纳入区块，并且也会从`mempool`中删除。\
    \                                                |\n| **情况 B：** | 交易无效。例如，矿工检查`Chainstate`数据库后发现，该交易引用的一个或多个先前交易片段已被花费。该交易被拒绝。\
    \                                                                            \
    \                                                                            \
    \     |\n| **处理传入区块**                                                        \
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                                                                      |\n| 区块到达矿工节点接口：\
    \                                                                            \
    \                                                                            \
    \                                                                            \
    \                                                                            \
