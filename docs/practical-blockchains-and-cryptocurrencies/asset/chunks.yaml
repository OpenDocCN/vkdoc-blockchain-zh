    ### 挖矿奖励


    ```

    MINING_REWARD = 5_000_000_000

    ```


    `MINING_REWARD` 是以 `HELIUM_CENTS` 为单位的新增 Helium 数量，这些新增的 Helium 会被创建并奖励给成功挖掘出区块的挖矿节点。`Helium`
    中的初始挖矿奖励是 50 亿 `HELIUM_CENTS`，即五枚 Helium 币（五个 helium）。这个奖励数额与 `Bitcoin` 的初始挖矿奖励相对应。


