    mined_value = int(hash, 16)

    mined_value = 1/mined_value

    # 测试以确定区块是否已被挖出

    if mined_value  (区块链高度 + 1)

    (4)  工作量证明失败

    (5)  区块未包含至少两笔交易

    (6)  区块的第一笔交易不是 coinbase 交易

    (7)  区块中的交易无效

    (8)  区块已存在于区块链中

    (9)  区块已存在于 received_blocks 列表中

    否则 (i)  将区块添加到 received_blocks 列表

