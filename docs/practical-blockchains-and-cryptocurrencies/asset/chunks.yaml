  trans: '

    # Python 安装与虚拟环境


    首要任务是创建一个用于 Helium 的虚拟环境。你需要一个大于等于 3.8 版本的 Python。本书附录 1 包含了创建此类虚拟环境的说明。


    你可以在任意目录（文件夹）中创建虚拟环境，但如果你想严格遵循本书内容，那么我建议在 `/var/www/` 目录下创建虚拟环境。此外，在你的虚拟环境中安装
    Python 3.8 版本。之后，你的 Helium 虚拟环境将位于以下目录（文件夹）中：


    ```

    /var/www/helium/

    ```


    我们将把 `/var/www/helium/` 目录称为虚拟环境的根目录，或者等同于 Helium 项目的根目录。在许多情况下，我会直接将该目录简称为 Helium
    根目录。


    在根目录下，创建以下 12 个子目录：`block`、`chainstate`、`config`、`crypt`、`data`、`hnetwork`、`mining`、`simulated_network`、`testnet`、`transactions`、`unit_tests`
    和 `wallet`。`block` 目录将存放我们的区块链实现。`crypt` 目录将包含 Helium 所需的加密函数，而单元测试将存放在 `unit_tests`
    目录中。


    `data` 目录将存放 Helium 区块以及其他数据。我将在后续章节中讨论其他目录。


    为了能够访问这些目录中的 Python 模块，我们必须将这些目录的路径添加到 Python 搜索路径中。请确保你已按如下方式激活了虚拟环境。从根目录执行：


    ```

    source virtual/bin/activate

    ```


