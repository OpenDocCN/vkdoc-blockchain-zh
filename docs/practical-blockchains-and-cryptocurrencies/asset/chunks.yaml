    verification stage. Figure [5-2](#492478_1_En_5_Chapter.xhtml#Fig2) shows the
    steps involved in the signature generation stage.'
  trans: '

    ## 密钥分发问题再探讨


    再次假设你我正处在银河系的两端，而我想给你发送一条秘密消息。首先，你必须拥有对称加密密钥，才能解密该消息。因此，如果你没有这个密钥，我必须将其传输给你。在我提供密钥之后，我就可以向你发送加密消息，你将能够使用该密钥对其进行解密。为了检测消息在传输过程中是否被篡改，我还可以将明文或加密消息的
    `SHA-256` 哈希值传输给你。这个加密哈希值可以附加在消息末尾。


    在上述场景中，有两个突出问题需要解决。首先，你无法知道该消息是否真的由我发送，还是由某个冒充我的恶意行为者发送。任何拥有加密密钥的人都可以伪造消息。这就是**真实性**问题。我们如何证明一条消息是由声称是其作者的人发送的？第二个问题是，加密密钥在传输过程中可能被恶意实体截获。没有确定性的方法可以证明密钥在传输过程中未被截获。当密钥需要分发给大量接收者时，这个问题会变得更加复杂。例如，考虑一个情报收集网络，其中的每个节点都必须配备加密密钥。


    ### 数字签名算法的启发式方法


    在公钥密码学中，使用非对称密钥生成算法来生成一对公钥和私钥。这些密钥中的每一个都是一个非常长的字符串。生成此密钥对的人会安全地将私钥保存在自己手中，并将公钥分发给预期的接收者。例如，公钥可以通过发布到互联网上，分发给全世界。公钥分发的关键方面在于，我们并不关心恶意实体是否拥有此密钥。由于生成密钥对的实体必须将私钥安全地保存在自己手中，因此非对称密钥生成算法必须使得从公钥恢复私钥在计算上不可行，这一点至关重要。


    现在，一个人可以用公钥加密消息并将其传输给私钥持有者，或者直接将加密后的消息发布到互联网上。非对称密钥生成算法保证该消息只能使用私钥解密，也就是说，在没有私钥的情况下解密该消息在计算上是不可行的。所谓计算不可行，我们指的是在没有私钥的情况下，解密消息将花费极其漫长的时间（也许是数亿年之久）。


    类似地，使用私钥加密的消息只能由与该私钥对应的公钥解密。对于攻击者来说，在没有公钥的情况下从密文中恢复出原始消息在计算上是不可行的。公钥和私钥互为逆运算，因为由任何一个密钥执行的加密操作都可以被另一个密钥逆转。这就是公钥密码系统的本质。图
    5-1 展示了这个过程。


    ![../images/492478_1_En_5_Chapter/492478_1_En_5_Fig1_HTML.jpg](img/492478_1_En_5_Fig1_HTML.jpg)


    **图 5-1** 公钥密码系统


    在上述过程中，爱丽丝生成一对公私钥对，将公钥交付给史密斯，同时将私钥安全地保存在自己手中。然后史密斯用这个公钥加密一条消息，并将密文发送给爱丽丝。爱丽丝再用自己的私钥解密密文。


    爱丽丝知道消息是由拥有公钥的人加密的，但通常情况下，爱丽丝无法知道实际加密这条消息的人的身份（除非爱丽丝确定只有史密斯拥有公钥）。确定身份这个问题需要公钥基础设施（PKI）来解决。我们稍后将讨论公钥基础设施。


    另一种情况是爱丽丝用她的私钥加密一条消息。任何持有相应公钥的人都可以解密这样的消息。这里的关键特性是，消息的接收者可以得出结论，即该消息是由持有私钥的实体生成的。此外，爱丽丝无法否认该消息是由她持有的私钥生成的这一说法。请注意，在缺乏外部信息的情况下，接收者无法将私钥与爱丽丝关联起来。建立这种关联的一种方式是通过使用证书颁发机构（PKI）。


    如果双方都使用对方的公钥发送消息，那么爱丽丝和史密斯就能进行安全的双向通信。


    数字签名算法解决了两个问题：一是消息未被篡改，二是签名是由某个特定的私钥生成的，因此是由该密钥的持有者生成的。该算法的第二个方面解决了身份验证问题。


    这些算法包括两个阶段：签名生成阶段和签名验证阶段。图 5-2 展示了签名生成阶段涉及的步骤。

    '
- fmt: '![../images/492478_1_En_5_Chapter/492478_1_En_5_Fig2_HTML.jpg](images/492478_1_En_5_Chapter/492478_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** Producing the Digital Signature of a Document


    Alice has generated a public private key pair and has a document that she wants
    to digitally sign.^([^(17)](#fn17)) In the first step, Alice generates a cryptographic
    hash of the document, say, the `SHA-256` message digest of the document. Alice
    then encrypts the message digest with her private key. The result of this encryption
    is the digital signature of the document. In the second step, Alice concatenates
    the document and the digital signature and transmits this concatenated document
    to the recipient.


    As we have noted previously, high-quality cryptographic algorithms such as `SHA-256`
    have an avalanche effect. If a document is changed very slightly, even by a single
    bit, this will produce a message digest which changes dramatically. This same
    avalanche effect occurs when the private key is applied to the message digest.
    Lastly, note that the document itself need not be encrypted. In many important
    applications, we do not care that the document is transmitted in plaintext since
    our only concern is with detecting alteration of the document and with the authentication
    of the document. Of course, Alice can also choose to encrypt the document with
    her private key and then encrypt the `SHA-256` message digest of the encrypted
    document with her private key.


    The second stage of digital signature algorithms is the verification of the document
    by a recipient of the document. Figure [5-3](#492478_1_En_5_Chapter.xhtml#Fig3)
    shows this process.


    ![../images/492478_1_En_5_Chapter/492478_1_En_5_Fig3_HTML.jpg](images/492478_1_En_5_Chapter/492478_1_En_5_Fig3_HTML.jpg)


    **Figure 5-3** Verifying the Digital Signature of a Document


    In the verification stage, the recipient of the concatenated document (say Smith)
    separates the document and the signature. In the first step, Smith computes the
    `SHA-256` message digest of the document that has been received. In the second
    step, the signature that was concatenated with the document is decrypted by applying
    Alice’s public key to the signature. This yields the message digest which was
    computed by the sender of the document. The two message digests are then compared.
    If the message digests are equal, then Smith can conclude that the document has
    not been tampered with while in transit and that Alice has signed and delivered
    this document since her private key matches the public key that Smith has used.
    If the message digests do not match, then there are three possibilities. Firstly,
    the document has been altered while in transit; secondly, Alice is not the author
    of the document; and lastly Smith does not possess the public key corresponding
    to Alice’s private key.


    ### Public Key Infrastructure


    As you will recall, when Smith receives a message (or document) encrypted with
    a private key, all that he can infer about the identity of the sender is that
    this entity is in possession of the private key that encrypted the message. Smith
    must possess exogenous information in order to associate the identity of Alice
    with the private key. Similarly, when Alice receives a message that has been encrypted
    with her public key, then in the absence of exogenous information, she can only
    conclude that the message has been encrypted by someone holding her public key.


    One way to associate an identity with a public key (and implicitly its private
    key) is through a certificate authority (CA). The following is the manner in which
    certificate authorities work. Firstly, the certificate authority obtains information
    on the identity of the applicant who claims to own a private-public key pair.
    The applicant provides the CA with his public key. The CA then asks the applicant
    to digitally sign a document provided by the CA. After the applicant has signed
    the document, the CA proceeds to verify the signature of the document. If the
    verification succeeds, it is proof that the applicant is in possession of the
    private key pertaining to the public key that he has supplied to the CA. The CA
    then issues an `X.509` certificate to the applicant. This certificate is signed
    by the CA with its private key to prove the identity of the certificate issuer
    and to assure that it has not been altered. The issued certificate typically contains
    information identifying the applicant, such as the name, address, and other distinguishing
    particulars, the public key generated by the applicant, the expiry date of the
    certificate, and so forth.


    Alice can provide proof of the authorship of a document in the following manner.
    Firstly, Alice will encrypt her certificate with her private key and concatenate
    it with the document she wants to deliver. Alice will digitally sign this concatenated
    document and attach the signature to the concatenated document. This will enable
    the recipient to securely verify the identity of the person who has signed the
    document by decrypting the certificate.


    In a similar manner, when Smith encrypts a document with Alice’s public key, he
    can also encrypt his certificate with his private key and concatenate the encrypted
    certificate with the document. Alice will now know the identity of the person
    who has sent her the document encrypted with her public key by decrypting the
    certificate with Smith’s public key.'
