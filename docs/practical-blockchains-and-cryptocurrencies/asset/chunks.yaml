  raw: '## Merkle Trees


    In typical cryptocurrency implementations, the data portion of a block contains
    a collection of transactions. For example, a Bitcoin block may contain 2000–4000
    transactions. In Helium, the transactions in a block are represented as a list.
    Each list element is a transaction, and each transaction has a dictionary structure.
    We will see shortly that we can represent this transaction list as a tree structure.


    A merkle tree is a balanced binary tree where the nodes are related through cryptographic
    hashes. The root node of the merkle tree uniquely identifies the tree.


    Suppose that we have a list of eight transactions in a block. We will construct
    the merkle tree of this list as follows.


    For each of these transactions, compute the SHA256 cryptographic hash of the transaction
    as a hexadecimal string. These values will become the leaf nodes of our merkle
    tree (Figure [10-2](#492478_1_En_10_Chapter.xhtml#Fig2)).


    ![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig2_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Leaf Nodes of the Merkle Tree


    *TnhH* is the SHA256 hash of the nth transaction. Since a merkle tree is a balanced
    binary tree, it must contain an even number of leaf nodes. Therefore, if we have
    an odd number of transactions in the block, we will simply add the last transaction
    twice to the transaction list.


    We can now derive the second layer of the merkle tree. Starting with the leftmost
    leaf node, we consider its sibling on the right side. We concatenate the two hashes,
    T1H and T2H, and compute the SHA256 hash of this concatenated string:


    ```

    T12H = SHA256(T1H + T2H)

    ```


    Then we concatenate the next pair of leaf node hashes and compute the SHA256 hash:


    ```

    T34H = SHA256(T3H + T4H)

    ```


    We proceed in this manner until all of the leaf nodes have been processed. This
    will give us a list of cryptographic hashes whose length is one half of the number
    of leaf nodes. The nodes in the second layer of the merkle tree are constructed
    from this new list (Figure [10-3](#492478_1_En_10_Chapter.xhtml#Fig3)).


    ![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig3_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    First Two Layers of the Merkle Tree


    To derive the third layer of the merkle tree, we compute the hashes:


    ```

    T1234H = SHA256(T12H + T34H)

    T5678H = SHA256(T56H + T78H)

    ```


    We now have the third layer of the merkle tree (Figure [10-4](#492478_1_En_10_Chapter.xhtml#Fig4)).


    ![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig4_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    First Three Layers of the Merkle Tree


    Finally, we concatenate the SHA256 hashes in the two nodes that are at the third
    level of the merkle tree:


    ```

    T12345678H = SHA256(T1234H + T5678H)

    ```


    This gives us the final representation of the merkle tree for the eight transactions
    in the block (Figure [10-5](#492478_1_En_10_Chapter.xhtml#Fig5)).


    ![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig5_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    The Merkle Tree for the Eight Block Transactions


    The hash value T12345678H is called the merkle root. It is a cryptographic hash
    of the transactions in the block. If any of the transactions are tampered with
    or if their order in the transaction list of the block is changed, the merkle
    root will be inconsistent with its previous value. Since the merkle root is in
    the block header, the block header will become inconsistent.


    You may ask why we need to construct a merkle tree. The short answer is that a
    balanced binary tree such as a merkle tree is a remarkably efficient search structure.
    Consider a hypothetical list of one million block transactions. This list can
    be represented as a merkle tree with a depth of 20 layers. Furthermore, we can
    search for a particular transaction in this list in `O(log n)` time where n is
    the size of the number of transactions.


    Another feature of a merkle tree is that the path to any leaf node (transaction)
    through the merkle tree is unique. Consider the transaction whose SHA256 hash
    is T6H; the path to this transaction can be represented as


    ```

    T12345678 + T5678 + T56 + T6

    ```


    In Figure [10-6](#492478_1_En_10_Chapter.xhtml#Fig6), this path is indicated with
    emphasized lines.


    ![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig6_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    The Path to a Block Transaction'
