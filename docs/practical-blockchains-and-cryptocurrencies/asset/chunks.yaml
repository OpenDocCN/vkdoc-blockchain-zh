  trans: '

    ### RIPEMD-160


    `RIPEMD` 是 RACE 完整性原语评估消息摘要（RACE Integrity Primitives Evaluation Message Digest）的缩写。这种密码学哈希算法可以生成长度为
    128、160、256 和 320 位的消息摘要。`RIPEMD` 于 1996 年进入公共领域。`RIPEMD-160` 在比特币加密货币以及许多其他区块链应用中得到使用。


    生成 `RIPEMD-160` 哈希值的算法在概念上与生成 `SHA-256` 哈希值的过程类似。`RIPEMD-160` 将输入消息划分为连续的一系列 512
    位块。消息会填充一个 1 位和一连串的 0 位，以确保其长度能被 512 整除。然后，一个编码了消息长度的 64 位字符串会被追加到消息末尾。该算法使用五个
    32 位寄存器来保存中间结果以及最终的消息摘要。为了启动哈希生成过程，这五个 32 位寄存器会被初始化为一些固定值。随后，第一个 512 位块会经过十轮（rounds）变换，每一轮由
    16 步作用于消息块和寄存器值的置换与替换序列组成。这十轮运算的输出是一个填充了五个 32 位寄存器的 160 位值。然后，这些寄存器值与下一个块一起作为输入，重复此过程，直到消息的最后一个块处理完毕。^(¹⁶^)
    最终这五个寄存器中的 160 位值即为消息摘要。


    以下 Python 代码为字符串生成 `RIPEMD-160` 哈希值。输出结果编码为十六进制字符串：


    ```

    import hashlib

    def getRIPEMD160(inputStr):

    r = hashlib.new(''ripemd160'')

    strAsBytes = str.encode(inputStr)

    r.update(strAsBytes)

    return r.hexdigest()

    ret = getRIPEMD160(''the lazy brown fox jumped over the sleeping dog'')

    print(ret)

    ```


    ## 消息认证码


    在前面的章节中，我们讨论了如何使用密码学哈希来确定消息的完整性，即证明消息是否被篡改。密码学哈希不能用于证明真实性。真实性关注的是证明消息的发送者确实是其声称的那个人。消息认证码（`MAC`）提供了消息完整性的保证，此外，还提供了有限形式的真实性保证。消息认证码算法依赖于共享的对称加密密钥。


    消息认证码的工作原理如下：一组（两个或更多）个体共享一个秘密的对称加密密钥。想要发送消息的人使用 `MAC` 算法为该消息计算一个 `MAC` 值。然后，她将该消息连同
    `MAC` 值一起发送给接收者。接收者使用同样的 `MAC` 算法和秘密密钥计算该消息的 `MAC` 值。如果计算出的 `MAC` 值与发送者提供的 `MAC`
    值相等，那么我们可以断定该消息未被篡改。此外，接收者可以确信该消息是由拥有该秘密密钥的人发送的。


    图 4-2 解释了消息认证码的使用方式。


    ![../images/492478_1_En_4_Chapter/492478_1_En_4_Fig2_HTML.jpg](img/492478_1_En_4_Fig2_HTML.jpg)


    **图 4-2。** 消息认证码流程


    你应该注意到，消息不必加密。在许多用例中，`MAC` 码与明文一起使用。例如，操作系统文件未加密，但可能附有 `MAC` 值以证明文件的完整性。另一个突出的用例涉及通过网络传输文件，当我们希望确保文件在传输过程中未被破坏时。


    `MAC` 码只提供有限程度的认证保证。当接收到带有 `MAC` 码的消息时，我们只能断定该消息是由拥有该对称加密密钥的人发送的。特别是，一个人可以声称自己是拥有秘密密钥的其他某人来发送消息，而被冒充的个人将无法否认这一说法。正如我们将在后续章节中看到的，数字签名解决了完整性和认证的难题。


    你可能会注意到诸如 `SHA-256` 等密码学哈希算法与 `MAC` 算法之间的一个本质区别。任何人都可以计算消息的 `SHA-512` 消息摘要。相比之下，计算消息的
    `MAC` 值需要一个共享的秘密密钥。


    ## 结论


    密码学哈希函数是区块链应用的基础。在本章中，我们讨论了密码学哈希函数的性质。我们还研究了两种著名的密码学哈希算法：安全哈希算法和 `RIPEMD-160`。


    密码学哈希算法可以证明消息的完整性，但不能证明真实性（谁编写了消息）。本章最后，我们讨论了消息认证码算法，它不仅能证明消息的完整性，还提供了一种有限形式的认证。


    在下一章，我们将深入探讨公钥密码系统的基础。


    # 5. 公钥密码系统的炼金术


    本章关注的是可以被称为现代密码学或非对称密码学的领域。在第 3 章中，我们研究了对称加密，并推断当加密密钥需要分发给大量接收者时，它存在一个显著的可扩展性问题。例如，考虑一个加密密钥必须分发给数千个接收者的场景。每次向接收者传输密钥时，都伴随着一定的密钥被恶意行为者截获的概率。公钥密码系统的目标，*除其他外*，是解决这个可扩展性问题，同时也使得对手截获秘密密钥的问题变得无关紧要。公钥密码系统理论的*点睛之笔*是数字签名算法；它同时解决了三个问题：(i)
    保证消息的完整性，(ii) 保证消息的真实性，以及 (iii) 解决可扩展性问题。


    公钥密码系统在现代众多应用中都得到了应用。例如，它们被用于安全的 `HTTP` 通信、虚拟专用网络、信用卡、电子商务系统、智能卡、电子身份证以及诸如 `SWIFT`
    等国际支付系统，现在也用于加密货币和区块链应用。


    在本章中，我将首先总结对称加密密钥分发的问题，然后简要描述经典的数字签名算法。之后，我将向你介绍一些公钥密码系统背后的数学理论，最后深入讨论数字签名算法。随着讲解的深入，我还会提供
    Python 代码示例。

    '
- fmt: '## The Key Distribution Problem Revisited


    Once again, suppose that you and I are at the opposite ends of the Milky Way and
    that I want to send you a secret message. Firstly, you must possess the symmetric
    encryption key so that you can decrypt the message. Thus, if you do not have this
    key, I must transmit it to you. After I provide you with the key, I can then send
    encrypted messages to you and you will be able to decrypt them using the secret
    key. In order to detect whether the message has been altered while in transit,
    I can also transmit the `SHA-256` hash of either the plaintext or encrypted message
    to you. This cryptographic hash can be appended to the message.


    In the previous scenario, there are two outstanding issues which have to be addressed.
    Firstly, you do not know whether the message has actually been sent by me or by
    some hostile actor who is impersonating me. The message could have been crafted
    by anyone who has the encryption key. This is the authenticity problem. How do
    we prove that a message has been sent by the person who purports to be its author?
    The second issue is that the encryption key could have been intercepted by a hostile
    entity while in transit. There is no deterministic way to prove that the secret
    key has not been intercepted while in transit. This problem is compounded when
    the key has to be distributed to a large number of recipients. Consider, for example,
    an intelligence-gathering network where each node in the network must be supplied
    with the encryption key.


    ### Heuristics of Digital Signature Algorithms


    In public key cryptography, an asymmetric key generation algorithm is used to
    generate a public key and a private key pair. Each of these keys is a very long
    string. The person generating this key pair keeps the private key securely with
    him- or herself and distributes the public key to his intended recipients. For
    example, the public key can be distributed to the world at large by posting it
    on the Internet. The essential aspect of the distribution of the public key is
    that we do not care that a hostile entity has possession of this key. Since the
    entity that generates the key pair must keep the private key securely with himself,
    it is important that the asymmetric key generation algorithm makes it computationally
    infeasible to recover the private key from the public key.


    A person can now encrypt a message with the public key and transmit it to the
    holder of the private key or simply post the encrypted message on the Internet.
    The asymmetric key generation algorithm guarantees that this message can only
    be decrypted with the private key, that is, it is computationally infeasible to
    decrypt the message without the private key. By computational infeasibility, we
    mean that it would take an enormous amount of time (perhaps eons) to decrypt the
    message in the absence of the private key.


    Similarly, a message encrypted with the private key can only be decrypted by the
    public key corresponding to the private key. It is computationally infeasible
    for an adversary to recover the original message from the ciphertext without the
    public key. The public and private keys are inverses of each other in the sense
    that encryption operations performed by either key can be reversed by the other
    key. This is the essence of public key cryptosystems. Figure [5-1](#492478_1_En_5_Chapter.xhtml#Fig1)
    shows this process.


    ![../images/492478_1_En_5_Chapter/492478_1_En_5_Fig1_HTML.jpg](images/492478_1_En_5_Chapter/492478_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Public Key Cryptosystem


    In the preceding process, Alice generates a public-private key pair and delivers
    the public key to Smith while keeping the private key securely with herself. Smith
    then encrypts a message with this public key and delivers the ciphertext to Alice.
    Alice then decrypts the ciphertext with her private key.


    Alice knows that the message has been encrypted by a person who has the public
    key, but typically Alice will not know the identity of the person who actually
    encrypted this message (unless Alice knows with certainty that only Smith has
    the public key). The determination of this identity issue requires a public key
    infrastructure (PKI). We will discuss public key infrastructures shortly.


    The other scenario is when Alice encrypts a message with her private key. Such
    a message can be decrypted by any person who holds the corresponding public key.
    The essential feature here is that the recipient of the message can conclude that
    the message was generated by the entity holding the private key. Furthermore,
    Alice cannot repudiate the assertion that the message was generated with the private
    key held by her. Note that in the absence of exogenous information, the recipient
    cannot associate the private key with Alice. One way of establishing such associations
    is through the use of certificate authorities (PKI).


    Alice and Smith can engage in secure bidirectional communications if each party
    sends messages using the other party’s public key.


    Digital signature algorithms address two issues: firstly that a message has not
    been tampered with and secondly that the signature has been generated by a certain
    private key and hence by the holder of this key. The second aspect of the algorithm
    solves the authentication problem.


    These algorithms consist of two stages: a signature generation stage and a signature
    verification stage. Figure [5-2](#492478_1_En_5_Chapter.xhtml#Fig2) shows the
    steps involved in the signature generation stage.'
  raw: '## The Key Distribution Problem Revisited


    Once again, suppose that you and I are at the opposite ends of the Milky Way and
    that I want to send you a secret message. Firstly, you must possess the symmetric
    encryption key so that you can decrypt the message. Thus, if you do not have this
    key, I must transmit it to you. After I provide you with the key, I can then send
    encrypted messages to you and you will be able to decrypt them using the secret
    key. In order to detect whether the message has been altered while in transit,
    I can also transmit the SHA-256 hash of either the plaintext or encrypted message
    to you. This cryptographic hash can be appended to the message.


    In the previous scenario, there are two outstanding issues which have to be addressed.
    Firstly, you do not know whether the message has actually been sent by me or by
    some hostile actor who is impersonating me. The message could have been crafted
    by anyone who has the encryption key. This is the authenticity problem. How do
    we prove that a message has been sent by the person who purports to be its author?
    The second issue is that the encryption key could have been intercepted by a hostile
    entity while in transit. There is no deterministic way to prove that the secret
    key has not been intercepted while in transit. This problem is compounded when
    the key has to be distributed to a large number of recipients. Consider, for example,
    an intelligence-gathering network where each node in the network must be supplied
    with the encryption key.


    ### Heuristics of Digital Signature Algorithms


    In public key cryptography, an asymmetric key generation algorithm is used to
    generate a public key and a private key pair. Each of these keys is a very long
    string. The person generating this key pair keeps the private key securely with
    him- or herself and distributes the public key to his intended recipients. For
    example, the public key can be distributed to the world at large by posting it
    on the Internet. The essential aspect of the distribution of the public key is
    that we do not care that a hostile entity has possession of this key. Since the
    entity that generates the key pair must keep the private key securely with himself,
    it is important that the asymmetric key generation algorithm makes it computationally
    infeasible to recover the private key from the public key.


    A person can now encrypt a message with the public key and transmit it to the
    holder of the private key or simply post the encrypted message on the Internet.
    The asymmetric key generation algorithm guarantees that this message can only
    be decrypted with the private key, that is, it is computationally infeasible to
    decrypt the message without the private key. By computational infeasibility, we
    mean that it would take an enormous amount of time (perhaps eons) to decrypt the
    message in the absence of the private key.


    Similarly, a message encrypted with the private key can only be decrypted by the
    public key corresponding to the private key. It is computationally infeasible
    for an adversary to recover the original message from the ciphertext without the
    public key. The public and private keys are inverses of each other in the sense
    that encryption operations performed by either key can be reversed by the other
    key. This is the essence of public key cryptosystems. Figure [5-1](#492478_1_En_5_Chapter.xhtml#Fig1)
    shows this process.


    ![../images/492478_1_En_5_Chapter/492478_1_En_5_Fig1_HTML.jpg](images/492478_1_En_5_Chapter/492478_1_En_5_Fig1_HTML.jpg)


