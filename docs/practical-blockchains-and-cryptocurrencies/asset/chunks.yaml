- fmt: '# 11. Helium Transaction Processing


    This is a code-intensive chapter. In the previous two chapters, we have examined
    the theory of cryptocurrency transactions and seen how the *merkle root* can be
    used to verify that the transactions in a block have not been tampered with. In
    this chapter, we are going to put this theoretical knowledge into practice by
    implementing Python code for processing Helium transactions.


    ## Transaction Processing Code Walkthrough


    The canonical transaction processing workflow is as follows. An entity creates
    a transaction and then places the transaction on the Helium peer-to-peer network
    for processing. The transaction is then picked up by Helium mining nodes. These
    nodes are engaged in the activity of processing transactions and mining blocks
    in order to reap rewards. In the case of Bitcoin, the reward is the issuance of
    some new bitcoins and the transaction fees which are attached to the transactions
    in the block that is successfully mined by the node. A transaction may have a
    zero transaction fee attached to it. The quantum of the transaction fee is within
    the sole discretion of the entity transferring value. A miner can elect to include
    a transaction in a block that it is mining or decline such an inclusion. Therefore,
    different miners will typically be mining different blocks at the same time. If
    a miner succeeds in adding a block to the blockchain, we say that the miner has
    mined the block. The transaction processing workflow is identical in Helium.


    When a miner receives a block, the very first thing that it will do is to verify
    the integrity of the transaction. Verification means that the transaction is examined
    to ascertain that it contains valid values. For example, the transaction *locktime*
    parameter will be invalid if it is a negative number. An important aspect of verification
    is to ascertain that the transferor of value is spending values that it owns.
    This chapter addresses transaction validation. If a transaction is valid, it can
    become part of a block that a miner intends to mine.


    After a miner has mined a block, it adds the block to its local blockchain. The
    miner then broadcasts the newly mined block on the Helium network. Other miners
    who receive this block will then add it to their local blockchain.


    Let us suppose that a miner mines a block with an invalid transaction. It may
    maliciously add this block to its local copy of the blockchain. But other miners
    will decline to add the block to their local blockchains, because they will ascertain
    that the block contains an invalid transaction.


    It is worth noting that miners on a Helium network may have local blockchains
    that differ from each other. But due to the distributed consensus mechanism, the
    network will always converge to a dominant blockchain. We will discuss this in
    a subsequent chapter. Because of the manner in which distributed consensus works,
    trust is not needed in the network. We do not care that a mining node is acting
    *mala fides*. This is Satoshi Nakamoto’s breakthrough insight.


    Alright, let us start with the code walkthrough. Copy the program code that follows
    into a file called `tx.py` and save it the transaction directory.


    You will notice that we have typically wrapped function bodies in this module
    within exception blocks.


    In dynamically typed languages such as Python, the debugging process consists
    primarily of detecting and fixing type errors at runtime. This burden rises exponentially
    as program size increases. This factor makes interpreted languages with dynamic
    typing unsuitable for large-scale program development. In contrast, Go and C++
    are very strictly typed. Go and C++ programs will simply refuse to compile if
    there is a type error in the program. In Go, once the program has compiled, debugging
    runtime errors is typically very fast (probably `O(n)`).


    The workhorse function in the `tx` module is `validate_transaction`; it verifies
    the integrity of a transaction. This function performs the following tests:


    1.  Verify that required transaction attributes are present.


    2.  The locktime is greater than or equal to zero.


    3.  The locktime value is less than the maximum specified in the `hconfig` module.


    4.  The version number is valid.


    5.  The transaction ID has a valid format.


    6.  The vin list has positive length if the transaction is not in the genesis
    block or if the transaction is not a coinbase transaction.


    7.  For genesis block transactions or a coinbase transaction, the vin list is
    empty.


    8.  The vin list is not greater than the maximum allowable length specified in
    the `hconfig` module.


    9.  The vin list has valid format.


    10.  The vout list has positive length.


    11.  The vout list is not greater than the maximum allowable length specified
    in the `hconfig` module.


    12.  The vout list elements have valid format.


    13.  The transaction implements a p2pkhash script.


    14.  The reference to a previous transaction those output is consumed is valid.


    15.  The total value spent is less than or equal to the total spendable value.


    16.  All of the spent values in a transaction are greater than zero.


    17.  The transaction inputs can be unlocked. That is, an entity only consumes
    inputs that it owns.


    18.  A coinbase transaction value is not consumed before its locktime has expired.


    In the `tx` module, the `prevtx_value` function references an unspent value in
    a previous transaction. This function is mocked in the unit tests since we have
    not implemented a LevelDB database to get unspent transaction amounts. We will
    look at Helium databases in the next chapter. The `transaction_fee` function computes
    the transaction fee for the transaction.


    The `unlock_transaction_fragment` function determines whether values in a previous
    transaction can be unlocked for use in the present transaction. This function
    implements the `p2pkhash` stack processor that was discussed two chapters previously.'
