  trans: '

    # 黄金与新大陆的掠夺


    罗马的艺术、文学与思想辉煌在其覆灭后未能存续。随着宗教狂热与基督教迷信笼罩欧洲大陆，欧洲陷入了长达千年的黑暗时代。到 16 世纪初，西班牙已殖民了新大陆的部分地区，并利用原住民作为奴隶劳工开采金矿与银矿。


    当时主导的经济理论被称为重商主义。重商主义的基本原则是：国家的财富由其国库中储存的黄金、白银及其他贵金属数量来衡量。这一理论除了刺激对黄金和白银的探寻之外，还导致了关税及其他限制国家间贸易流通的壁垒的设立。


    西班牙对新大陆的入侵引发了大规模的金银开采，并将大量金银从新大陆运往欧洲。据推测，其中约 10%至 20%的金银被持有英国王室特许状的私掠船以及悬挂海盗旗的海盗所劫掠。


    西班牙利用这些涌入的贵金属建造宏伟的大教堂、实施虚荣工程，而最为重要的是为罗马教会的利益而资助战争。来自新大陆的金银涌入，使西班牙得以维持欧洲最庞大的陆军、建立强大的海军，并资助对英格兰、法国、荷兰、德意志诸邦国、奥斯曼帝国以及被视为异教徒的非天主教徒的战争。


    金银涌入西班牙的直接后果之一，是在欧洲引发了广泛的通货膨胀。在西班牙，据信整个 16 世纪物价上涨了 300%。西班牙当时处于原始农业经济，并未从新大陆掠夺的金银中大量受益。西班牙鄙夷商业活动，视其为有限的宗教与道德价值。因此，西班牙日益依赖贵金属的涌入来资助国王那奢华的帝国与宗教冒险事业。西班牙的国库主要依赖从新大陆掠夺的金银，结果在
    16 世纪中四次破产，分别发生在 1557 年、1560 年、1576 年和 1596 年。这些主权债务违约清楚地表明，西班牙并没有重要的税收基础。最终，西班牙丧失了其在欧洲的霸主地位，到
    1750 年时已沦为落后地区。


    # 金本位制


    随着西班牙退出世界历史舞台，英国开始崛起为欧洲的主导力量。英国是一个贸易国家，拥有庞大且成熟的商人阶层，并且重视国家间贸易的益处。此外，英格兰一直处于新教改革的前沿，信奉加尔文主义教义，即日常工作的表现具有重要的宗教价值。1776
    年，亚当·斯密撰写了《国富论》，揭示了重商主义的谬误，并论证了自由贸易可以成为一种非零和博弈，每个贸易参与者都能因比较优势理论而获益。亚当·斯密还引入了劳动分工的概念及其益处。《国富论》倡导自由市场与自由贸易的好处，标志着现代经济理论的起点。与此同时，英格兰也开始发展完善的法律合同体系以及股份制公司这一卓越创新，这使得大量风险资本得以高效筹集。股份制公司的发明启动了工业革命。从
    18 世纪末开始，英国开启了长达一个世纪的殖民扩张。


    1844 年，英国议会通过了《银行特许法案》，其中英格兰银行承诺按固定汇率将其纸币兑换为金币。这在不列颠帝国以及与美国、加拿大、澳大利亚及其他与英国有广泛贸易关系的国家中建立了金本位制。这也确立了英镑作为世界储备货币的地位。贸易国乐于在贸易中使用英镑并将其作为储备资产持有，因为他们确信其持有的货币可以兑换成黄金。黄金是一种供应稀缺的贵金属，而英格兰银行发行的纸币按固定比率兑换成黄金的承诺，有效地限制了英国或任何其他实行金本位制的国家随意印制纸币的能力。一个国家的货币发行量如果超过其黄金及英镑储备，就可能面临货币挤兑风险，因为投机者会将其持有的该国货币兑换成英镑或黄金。


    第一次世界大战给英国国库带来的巨大开支，导致英国实施了外汇管制；这实际上中止了英镑与黄金的兑换。许多欧洲国家亦步亦趋，放弃了本国货币与黄金的兑换。其后果是引发了大规模的通货膨胀，因为一战的费用是通过大量印制纸币来偿还债务的。换言之，一战的成本通过增加货币供应量转嫁给了民众。这意味着欧洲民众通过通货膨胀来承担一战的开销。众所周知，通货膨胀会导致债券等固定收益资产贬值。1925
    年，英国为了维护英镑作为世界储备货币的地位而重新恢复了金本位制。但事实证明，这只是昙花一现的努力。

    '
- fmt: '# The Great Depression and Keynesian Economics


    On September 4, 1929, the stock market on Wall Street faltered and dropped significantly.
    Over the next month and a half, the stock market oscillated wildly indicating
    significant uncertainty among investors and speculators. Then on October 29, 1929
    (Black Tuesday), the Dow Jones Industrial Average on the New York Stock Exchange
    plummeted by 20%. It was the beginning of the great depression, and it plunged
    the world into an unprecedented economic depression that lasted a decade. Industrial
    output in the United States declined by nearly 40%, trade collapsed by some 70%,
    and unemployment climbed to 25% of the population.


    The impact on Britain and Europe was similar. Britain abandoned the gold standard
    fearing a run on the pound sterling. The foremost economic problem of the day
    was how to climb out of the great depression and get the world economy moving.
    There were two diametrically opposed points of view, the American Hooverites advocated
    fiscal conservatism and the need for governments to scale back their expenditures
    in order to prevent any further increases in the public debt. Opposing them was
    the great English economist, John Maynard Keynes, who argued in his book *The
    General Theory of Employment, Interest and Money* that increased public expenditures
    on public works should be undertaken to provide employment and increase production
    in the economy. The basic premise of Keynesian economics was that the increase
    in public debt would be paid for by the increase in tax revenue once the economy
    climbed out of the depression. This is the basic principle of Keynesian economics;
    public expenditures should be increased during recessions and depressions, and
    the public debt so incurred will be paid off when the economy recovers due to
    the increase in tax revenue. President Roosevelt’s economic plan to bootstrap
    the American economy out of the depression was an exercise in Keynesian economics.


    Implicit in Keynesian economics is the idea that the supply of money should not
    be tied to a standard guaranteeing the convertibility of the currency into gold
    or any other precious specie, that is, the government should be free to print
    money or incur public debt as required to maintain full employment. It’s a neat
    theory, but as history has repeatedly demonstrated, the power to print money at
    will is like a dangerous and highly addictive drug that ultimately destroys the
    patient.


    # The Petrodollar System


    The conclusion of World War II saw Europe shattered and the United States emerged
    as the sole economic powerhouse in the world. In 1944, the United States and European
    signatories assented to the Bretton Woods Agreement wherein the signatory countries
    agreed to peg their currencies to the US dollar at a fixed rate and the United
    States agreed to redeem the US currency holdings of any foreign central bank at
    the rate of 35 dollars for an ounce of gold. At this juncture in history, the
    United States held most of the world’s gold. This agreement replaced the pound
    sterling with the US dollar as the reserve currency of the world. Bretton Woods
    also effectively established a gold standard across the world with the United
    States as the guarantor of the standard. The promise of convertibility at the
    rate of 35 dollars for an ounce of gold as well as the rapidly expanding American
    military and industrial power established the US dollar as the primary instrument
    to facilitate international trade.


    Problems started to appear 18 years later as the United States got embroiled in
    the Vietnam War. The United States started to have persistent balance of payment
    deficits with its trading partners. In addition, the treasury had to grapple with
    the extensive war expenditures incurred by the Vietnam War and inflation. In 1971,
    Britain losing faith in the stability of the US dollar redeemed most of its US
    dollar holdings into gold. Fearing a run of the dollar triggered by Britain’s
    actions and in order to protect US gold reserves from depletion, President Nixon
    suspended the convertibility of the US dollar into gold. This action converted
    the US dollar into a fiat currency. A fiat currency is a currency that is not
    convertible into gold or any other precious asset, and the value derives solely
    from the willingness of users to utilize it as a medium of exchange and a store
    of value.


    The Treasury of the United States realized that with the US dollar off the gold
    standard, there was in principle no compelling reason for nations to use it in
    trade or as an international reserve currency. It was thus important to compel
    the use of the dollar as an international reserve currency rather than relying
    on the good faith of nations to continue using a fiat US dollar. This is the problem
    that the Petrodollar system solved.


    Starting in 1974, the United States and oil-producing countries came to agreements
    to sell oil on international markets in US dollars only. The immediate effect
    of this was to require countries that wanted to purchase oil to maintain an adequate
    amount of dollar reserves. Such a country could obtain these reserves in two ways,
    either by selling goods to the United States and receiving dollars on its foreign
    exchange account, or by doing the same with a third country. There was an implicit
    supposition in the Petrodollar system that most US dollars circulating abroad
    would never return home – a supposition which was largely true if the world economy
    kept on expanding. Since these dollars would not return home, this effectively
    meant that the United States could purchase goods and services from countries
    for free (i.e., by simply printing dollars or dollar-denominated debt). Furthermore,
    since the dollar was not on a gold standard, the US Federal Reserve System was
    not constrained in its ability to print dollars at will. At present, the federal
    debt of the United States is in the range of 26 trillion dollars. This is a consequence
    of imperial overreach, unconstrained government spending, primarily on the military;
    a weak tax base that cannot sustain the recurring government expenses, the non-convertibility
    of the dollar, and the Petrodollar system.


    Prior to the Petrodollar system, a currency acquired status as an international
    reserve currency through the guarantee of the maker to convert it into gold specie
    at some fixed rate. A country not wishing to hold the reserve currency could simply
    convert its currency holdings into gold. The Petrodollar system has replaced this
    with a compulsion. A country wanting to buy oil has to have fiat US dollars on
    hand to make such a purchase.'
