- fmt: '# Network Interface for Helium Nodes


    Nodes on the Helium cryptocurrency P2P network perform the following network tasks:


    1. Query for node addresses and obtain address lists from one or more directory
    servers.

    2. Provide their address lists to other requesting nodes.

    3. Query other nodes for blocks and process the blocks received.

    4. Get the height of a node''s blockchain.

    5. Receive transactions and blocks propagating on the network and propagate them
    to other nodes.


    The specification for the Helium network interface is as follows. All of the functions
    in the interface are implemented as JSON remote procedure calls.^([^(65)](#fn65))
    A procedure on a JSON-RPC server is invoked using HTTP.^([^(66)](#fn66)) The RPC
    server processes remote procedure calls asynchronously. Each Helium mining node
    implements all of the functions described as follows in its `networknode` module,
    and hence, it is both a JSON-RPC server and a client.


    ## Helium Bootup Scripts


    ```

    directory_server.py

    networknode.py

    ```


    There are two types of bootup scripts: a directory server bootup script called
    `directory_server.py` and a node bootup script called `networknode.py`.


    `directory_server.py` boots up a directory server that provides requesting nodes
    with a list of Helium node addresses.


    `networknode.py` is a Python script that boots up a Helium node and puts the RPC
    server node into an operational state on the P2P network. As indicated previously,
    each such node on the Helium network that is not a directory server implements
    an RPC server and a client.


    ## Address Resolution


    ```

    get_address_list() -> "string"

    register_address(address: "string") -> "string"

    ```


    `get_address_list`: This invokes a seed node (directory server) with a request
    to send a list of node addresses. The remote server returns a stringified list
    of P2P node addresses.


    `register_address`: A node registers its address (such as `127.0.0.34:8081`) with
    a seed node or a directory server.


    ## Blockchain Initialization


    ```

    clear_blockchain() -> "string"

    ```


    This clears the primary and secondary blockchains of a node. It returns the string
    "`ok`" if the blockchains are cleared.


    ## Blockchain Query


    There are two remote procedure calls to make blockchain queries:


    ```

    get_blockchain_height() -> "integer"

    get_block(block_no: "int") -> "stringified block or an error string"

    ```


    `get_blockchain_height`: This requests a remote node to provide the height of
    its blockchain. The requestor receives an integer reply. This function is used
    by a node to determine if its blockchain is in sync with the blockchain of some
    other node or to populate an empty blockchain. An out-of-sync condition will arise
    if the height of a node''s blockchain is substantially less than the height of
    the blockchains of other nodes due to conditions such as downtime or a network
    failure.


    `get_block`: This requests a remote node to send the block which has a certain
    block height. This function returns a block or an error string if a request is
    made for a non-existent block. An error string will contain the word `error`.


    ## Block Propagation


    ```

    receive_block(block: "string") -> "ok or an error string"

    ```


    `receive_block`: A node (acting as a JSON-RPC client) sends a block to a remote
    node (acting as a JSON-RPC server). The function argument is a stringified block.
    The block can be a newly mined block or a block that is propagating on the P2P
    Helium network. The function returns an error string in the event of an error.
    An error string will contain the word `error`.


    ## Transaction Propagation


    ```

    receive_transaction(transaction: "string") -> "ok or an error string"

    ```


    A node receives a transaction through a remote procedure call initiated by a remote
    node acting as a JSON-RPC client. This function returns an error string in the
    event of an error. An error string will contain the word `error`.


    ## Node Process Space


    Our simulated P2P network is for all practical purposes identical to a Helium
    network running on the Internet. One aspect to bear in mind is that the JSON-RPC
    server and client for each node executes in its own process space, and in particular,
    there is no shared memory or program code even though everything is running on
    one machine. Clients can only communicate with servers through the HTTP and JSON-RPC
    version 2.0 protocols. To elaborate further, each `networknode` module and all
    of the modules that it imports execute in its own process space.


    ## Pytests for the Helium Network Interface


    To initiate testing, make sure that you have created the simulated network as
    described earlier and started a few server nodes and one or more directory server
    nodes. Make sure that you are in the virtual Helium environment when you instantiate
    the servers and that each server is listening on a unique address. Our Pytest
    code uses a directory server listening at `127.0.0.69:8081` and a JSON-RPC server
    for a remote mining node that is listening at `127.0.0.51:8081`. Finally, copy
    `networknode.py` into the `unit_tests` directory and start a server at `127.0.0.19:8081`.


    Copy the following Pytest program code into a file called `test_hnetwork.py` and
    save this file in the `unit_tests` sub-directory of the Helium root directory.


    The tests in this file are integration tests, that is, they execute the remote
    procedure calls on an actual simulated network and return the actual results obtained.
    They do not mock any functions involved in a test. In order to effect this, the
    tests build an actual synthetic blockchain with the help of the functions `make_blocks`
    and `make_random_transaction`. Appendix 7 discusses the creation of simulated
    blockchains of arbitrary height.


    Traverse to the `unit_tests` directory of the Helium root and run the tests with


    ```

    $(virtual) pytest test_hnetwork.py -s

    ```


    Note: Do not instantiate the `hmining` module from the command line and execute
    `mine_blocks` when testing the module with these unit tests.


    Note


    You can get expanded output for a test by using the `-s` option, for example:


    ```

    $(virtual) pytest test_hnetwork.py -s -k test_get_address_list

    ```


    The `-k` option only tests `test_get_address_list` and ignores the other tests.
    The `-s` option gives expanded output, which is otherwise suppressed. For this
    particular test, the `-s` option will print the address list received on the terminal
    screen. The command


    ```

    $(virtual) pytest test_hnetwork.py -s

    ```


    will execute all of the tests and provide expanded output.


    You should see six tests passing. Note that executing these tests will emit the
    transaction fragments of the simulated network as it is built.'
