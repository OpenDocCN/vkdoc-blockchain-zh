- fmt: '# Conclusion


    At this stage, we have implemented a substantial portion of a Helium mining node.
    But our implementation of a mining node is not over. We have yet to implement
    portions of the `hmining` module as concurrent processes and interface the mining
    node with the external Helium peer-to-peer network. This is the matter that will
    be handled next.


    Footnotes [1](#492478_1_En_14_Chapter.xhtml#Fn1_source)


    # 15\. The Helium Network


    In this chapter, we are going to examine the topology of peer-to-peer networks
    and contrast this with the client-server model, which is the dominant model of
    computing on the Internet. After this, we will set up a Helium peer-to-peer network
    on the localhost loopback address `127.0.x.x`. This network is useful for testing
    Helium.


    In the previous chapter, we built most of the functionality of a Helium mining
    node. However, we did not expose mining nodes to the Helium network or indicate
    how this can be done. There are a number of outstanding questions concerning mining
    nodes. How does a mining node receive transactions? How does a node handle blocks
    that are mined by other nodes? How does a mining node inform other nodes that
    it has just mined a block? How does a new mining node that does not have a blockchain
    get a copy of the distributed blockchain? In this chapter, we are going to answer
    these questions by building a canonical API interface that enables nodes on the
    Helium cryptocurrency peer-to-peer network to interoperate with each other.


    In order to follow this chapter, you will need to be familiar with concurrent
    Python programming as well as JSON remote procedure calls. You can consult Appendixes
    4 and 6, if required. These appendixes provide you with all of the required knowledge
    in these areas.


    ## The Client-Server Model


    The client-server model is the dominant network topology on the Internet. In this
    topological model, nodes on the Internet are either servers or clients. A client
    that wants a task performed contacts a server and makes a request. The server
    can elect to respond to the request or ignore it. Some of the servers may also
    be clients that are served by other servers.


    This topology can be illustrated as shown in Figure [15-1](#492478_1_En_15_Chapter.xhtml#Fig1).


    ![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig1_HTML.jpg](images/492478_1_En_15_Chapter/492478_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    Client-Server Topology


    This diagram shows clients interacting with servers. The lines represent bidirectional
    lines of communication between a client and a server (request-response). Clients
    make requests and servers respond to these requests. For example, a web browser
    (client) requests a web page from a server, and the server responds by sending
    an HTML page to the client.


    For our purposes, we need to only observe that there is a degree of centralization
    in this topology. There are two types of nodes, servers and clients. The servers
    respond to requests and can choose to ignore some of the requests that are made.
    The servers control the flow of information in the network.


    ## Peer-to-Peer Networks


    A blockchain network or a cryptocurrency network for that matter is a peer-to-peer
    network. In a peer-to-peer network (P2P), all of the nodes on the network are
    equal in capability and there are no supernodes.


    In a P2P network, nodes are peers of each other. In the context of Helium, this
    means that typically all of the nodes maintain a full blockchain and have the
    capability to mine blocks. Of course, some nodes may elect not to engage in mining,
    and other nodes may, for their own purposes, choose to maintain only a portion
    of the blockchain. As we have seen previously, Helium nodes do not trust each
    other, but the network can nevertheless converge to a consensus as to the state
    of the network, that is, the blockchain.


    This lack of centralization in the network is why blockchain networks are resilient
    and cannot be shut down. This is in contrast to client-server networks, where
    the entire network can be degraded by simply shutting down the servers.


    Figure [15-2](#492478_1_En_15_Chapter.xhtml#Fig2) shows the gross topology of
    a blockchain network.


    ![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig2_HTML.jpg](images/492478_1_En_15_Chapter/492478_1_En_15_Fig2_HTML.jpg)


    Figure 15-2


    *A Peer-to-Peer Network*


    This diagram shows a number of nodes that are identical to each other in terms
    of functionality, interacting on a network. The lines represent bidirectional
    channels of communication between peer nodes. This type of topology is called
    a peer-to-peer network and sometimes a mesh network. Nodes can come into the system
    and exit from it without degrading the efficacy of the network. Furthermore, nodes
    form communication links with other nodes on a transient basis.


    Previous attempts to set up alternate currency networks were based on the client-server
    model. These currency systems were easy to identify and shut down. Furthermore,
    they attracted motivated criminal prosecution, often founded on dubious political
    jurisprudence. Bitcoin’s cardinal strength is that it cannot be shut down. Satoshi
    Nakamoto, being aware of the potentiality of criminal litigation, vanished from
    the scene after putting the Bitcoin network into a functional running state in
    2011.


    Nodes in a P2P network do not have globally unique IDs that distinguish one node
    from another. All of the nodes are conceptually peers of each other. Nodes can
    only be differentiated from one another on the basis of their IP addresses. One
    of the consequences of this node anonymity is that the network is vulnerable to
    Sybil attacks. In a Sybil attack, a node masquerades as another node or a number
    of other nodes.


    ## Booting Up a Node


    When a node on a peer-to-peer network boots up, it connects to one or more seed
    nodes and queries these nodes for the addresses of other nodes on the network.
    A seed node acts like a directory server that maintains addresses of nodes. A
    query to a directory server permits a node to join the P2P network and communicate
    with a subset of nodes. Different nodes may contact different seed nodes during
    the bootstrap phase, and consequently, each of these nodes will probably have
    a different view of the network. Each node on a P2P network maintains a list of
    node addresses that it knows and can thus also act as a directory server, if it
    so wishes. These nodes can respond to a query to provide node addresses by providing
    their list of node addresses.


    Distributed hash tables (DHT) are the most general manner in which node addresses
    can be provided in a P2P network. In such a P2P network, a subset of the nodes
    on the network, if not all of them, maintain a distributed hash table of addresses.^([^(60)](#fn60))
    A DHT is a key-value store that maps a keyspace into an address space. Any node
    on the network can elect to maintain a portion of the DHT. A node that is booting
    up floods the P2P network searching for nodes that maintain a distributed hash
    table of addresses. These nodes are seed nodes in a DHT type network.


    For our purposes, we will simply designate one or more P2P nodes to act as directory
    servers that respond to queries for node addresses.^([^(61)](#fn61)) An implementation
    of DHT for the Helium network, though not difficult, will take us to far afield.


    In Figure [15-3](#492478_1_En_15_Chapter.xhtml#Fig3), node A requests a directory
    server (seed) to provide it with a list of addresses of other nodes on the network.
    The directory server replies with a list of node addresses and also adds the address
    of the querying node to its list of nodes. The nodes provided by the directory
    server become the neighbors of the requesting node.


    ![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig3_HTML.jpg](images/492478_1_En_15_Chapter/492478_1_En_15_Fig3_HTML.jpg)


    Figure 15-3


    Booting Up a Node with a Directory Server on a Peer-to-Peer Network'
  raw: '## Conclusion


    At this stage, we have implemented a substantial portion of a Helium mining node.
    But our implementation of a mining node is not over. We have yet to implement
    portions of the *hmining* module as concurrent processes and interface the mining
    node with the external Helium peer-to-peer network. This is the matter that will
    be handled next.


