    \ hashes, and public key cryptography. You do not need any Calculus or Number\
    \ Theory to go through these three chapters.  \n\nChapter [6](#492478_1_En_6_Chapter.xhtml)\
    \ contains a detailed discussion on the theory of blockchains. We will look at\
    \ the essential characteristics of blockchains and how they are constructed. \
    \ \n\nIn Chapter [7](#492478_1_En_7_Chapter.xhtml), we start making the Helium\
    \ cryptocurrency. Helium is modeled after Bitcoin. This chapter specifies the\
    \ configuration constants for Helium. Chapter [8](#492478_1_En_8_Chapter.xhtml)\
    \ implements a blockchain for Helium. In a pattern that will repeat itself to\
    \ the end of this book, we will validate our Helium source code with unit tests\
    \ using the `Pytest` unit testing framework. Appendix 3 to this book provides\
    \ all of the know-how that is required to utilize `Pytest` effectively.  \n\n\
    Chapter [9](#492478_1_En_9_Chapter.xhtml) is a theory chapter that discusses transaction\
