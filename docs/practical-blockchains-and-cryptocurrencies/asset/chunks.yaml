- fmt: "# Pseudo-Random Number Generators\n\nMany cryptographic algorithms require\
    \ the use of one or more random numbers, typically to initialize a process with\
    \ a seed, generate keys, set a nonce, specify a salt, or randomize a variable.\
    \ Instead of obtaining a random number by sampling some process in nature or on\
    \ our computer, it is common practice to use a mathematical function to generate\
    \ a sequence of pseudo-random numbers. A function that generates such a sequence\
    \ is called a pseudo-random number generator (`PRNG`). A `PRNG` works as follows.\
    \ The `PRNG` is seeded with some random number which is called a seed, and it\
    \ then recursively generates a deterministic sequence of numbers. Note that, given\
    \ the certain seed, the `PRNG` will always generate the same sequence of numbers.\n\
    \nA good pseudo-random number generator has statistical properties that make it\
    \ very difficult to distinguish from a sequence of random numbers. In particular,\
    \ in a high-quality `PRNG`, successive numbers are not correlated and the `PRNG`\
    \ has a very large period before the numbers start to repeat.\n\nThe linear congruential\
    \ generator (`LCG`) is a commonly used `PRNG`. It has a simple definition:\n\n\
    ```\nXn+1 = (m*xn + a) mod P\nP >= 2 is an integer. P is the period of the PRNG.\n\
    The integer coefficient m is called the multiplier; m > 0 and m < P.\nThe integer\
    \ a is called the adder; a > 0 and a < P.\nThe initial value of the generator\
    \ x0 is the seed.\nxn is the nth pseudo-random number generated by the function.\n\
    ```\n\nNote that `LCG` is a recursive function. It is very easy to implement and\
    \ has the advantage of being a fast pseudo-random number generator. The statistical\
    \ randomness of `LCG` is sensitive to the modulus value `P` and the seed which\
    \ is selected. The GNU C library, `glibc`, uses a period of `2^(45)`, a multiplier\
    \ value of `25214903917`, and a seed value of `11`, in the specification of its\
    \ `LCG`.\n\nThe following code implements the linear congruential generator in\
    \ Python:\n\n```\nclass LCG:\n    def __init__(self,mult,addr,prd,seed):\n   \
    \     self.multiplier = mult\n        self.addr = addr\n        self.period =\
    \ prd\n        self.lastValue = seed\n    def generator(self):\n        self.lastValue\
    \ = (self.multiplier*self.lastValue + self.addr) % self.period\n        return\
    \ self.lastValue\n\nlcg = LCG(11, 37, 1000, 0)\nctr = 0\nwhile ctr < 10:\n   \
    \ ret = lcg.generator()\n    print(ret)\n    ctr += 1\n```\n\nThe Mersenne Twister\
    \ is another high-quality `PRNG` of interest. In its most common derivation, it\
    \ is seeded with the Mersenne prime number `2^(19937) – 1` and it has a period\
    \ of `2^(19937) – 1`.\n\n## Conclusion\n\nIn this chapter, we have examined the\
    \ design of symmetric encryption algorithms and the cryptanalysis of these algorithms.\
    \ We have also taken a look at the Advanced Encryption Standard, which is a widely\
    \ used encryption algorithm. The distribution of encryption keys to a large number\
    \ of users is a serious issue since it raises the possibility that a key may be\
    \ stolen during the distribution process. In a subsequent chapter, we will show\
    \ how public key encryption solves the key distribution dilemma. Finally, we have\
    \ elucidated upon pseudo-random number generators.\n\nIn the next chapter, we\
    \ will study cryptographic hash functions. These functions are particularly important\
    \ in blockchain design.\n\n# Cryptographic Hash Functions\n\nDon’t get intimidated\
    \ by the title of this chapter. The theory of cryptographic hash functions is\
    \ not particularly abstruse. What is difficult is the construction of these functions\
    \ from scratch. However, we need not concern ourselves with this aspect of the\
    \ mathematical theory since most programming language libraries provide us with\
    \ a good selection of functions to choose from.\n\nCryptographic hash functions\
    \ are concerned with the very practical problem of determining whether a document\
    \ or text string has been altered by some malicious actor. These functions play\
    \ a very important role in the development of blockchain and cryptocurrency applications,\
    \ so it is important that you have a good understanding of the mathematical theory\
    \ of these functions.\n\n## An Introduction to Cryptographic Hashes\n\nConsider\
    \ this scenario. Suppose that you and I are on opposite ends of the Milky Way\
    \ and I send you a message. Now upon receiving the message, you want to satisfy\
    \ yourself that the message has not been changed by some unfriendly alien while\
    \ it was in transit. Secondly, you want to satisfy yourself that the message was\
    \ actually sent by me and not by some impostor. Suppose further that you are unable\
    \ to securely communicate with me to ascertain these two issues. Cryptographic\
    \ hashes (or cryptographic hash functions, if you will) address the issue of whether\
    \ the message was tampered with while in transit. In this chapter, we examine\
    \ these functions. In the subsequent chapter on digital signatures, we will examine\
    \ the matter of authenticity; has the document or message really been authored\
    \ by the person who purports to be its author?\n\nOne way that I can utilize to\
    \ assure you that the message has not been tampered with while in transit would\
    \ be if I sent you a string of characters called a message digest that is somehow\
    \ related to the message. Suppose that you could then input the message into a\
    \ machine and if this machine produced a message digest that matched the message\
    \ digest that I have sent you, then you could conclude that the message has not\
    \ been altered. If this machine produced a string output that did not match the\
    \ message digest that I sent you, then you would conclude that the message was\
    \ changed while in transit. Such a machine would be called a cryptographic hash\
    \ function (or cryptographic hash algorithm) if it satisfied some constraints\
    \ to be discussed shortly.\n\nThe string output produced by such a machine or\
    \ cryptographic hash function is called a cryptographic hash or a message digest.\
    \ Frequently, the output is simply, but incorrectly, called a hash.\n\nThe machine\
    \ that we want to construct is a mathematical function or mathematical algorithm.\
    \ So how do we construct such a function?\n\n## Cryptographic Hash Functions\n\
    \nA hash function is a function that takes a string of any length as input and\
    \ produces a string as its output. As a simple example, consider the function\
    \ `y = F(x)` that takes a string `x` as an input and produces an output string\
    \ where each character in the input string emits the next character as its output:\n\
    \n```\nF('crypto') = 'dszqup'\n```\n\nThis is a very simple hash function, but\
    \ it is not a cryptographic hash function because it does not satisfy some required\
    \ conditions.\n\nA cryptographic hash function is a hash function which has four\
    \ essential properties:\n\n- The function produces an output string of fixed length.\n\
    - The function is collision-free.\n- The function is irreversible.\n- The function\
    \ can be efficiently computed.\n\n**Note**\n\nWe can construct hash functions\
    \ that produce numbers instead of strings. However, we typically specify hash\
    \ functions that emit strings. Blockchain and cryptocurrency applications invariably\
    \ use cryptographic hash functions that produce hexadecimal string outputs.\n\n\
    Now let us look at the required properties of cryptographic hash functions.\n\n\
    ### The Fixed Length Output Property\n\nThis is a simple requirement. We want\
    \ our cryptographic hash function to produce message digests that have a fixed\
    \ length. Ideally, we want message digests that are small in size since this bears\
    \ upon the efficiency of transmitting data over a network. The smaller the size\
    \ of a message digest, the lower the probability that it will be inadvertently\
    \ corrupted in the course of its transmission. Cryptographic functions that produce\
    \ message digests that are 128 bits, 256 bits, and 512 bits in length are common."
  raw: '## Pseudo-Random Number Generators


    Many cryptographic algorithms require the use of one or more random numbers, typically
    to initialize a process with a seed, generate keys, set a nonce, specify a salt,
    or randomize a variable. Instead of obtaining a random number by sampling some
    process in nature or on our computer, it is common practice to use a mathematical
    function to generate a sequence of pseudo-random numbers. A function that generates
    such a sequence is called a pseudo-random number generator (PRNG). A PRNG works
    as follows. The PRNG is seeded with some random number which is called a seed,
    and it then recursively generates a deterministic sequence of numbers. Note that,
    given the certain seed, the PRNG will always generate the same sequence of numbers.


    A good pseudo-random number generator has statistical properties that make it
    very difficult to distinguish from a sequence of random numbers. In particular,
    in a high-quality PRNG, successive numbers are not correlated and the PRNG has
    a very large period before the numbers start to repeat.


    The linear congruential generator (LCG) is a commonly used PRNG. It has a simple
    definition:^([^(12)](#fn12))


    ```

    Xn+1 = (m*xn + a) mod P

    P >= 2 is an integer. P is the period of the PRNG.

    The integer coefficient m is called the multiplier; m > 0 and m  0 and a < P.

    The initial value of the generator x0 is the seed.

    xn  is the nth pseudo-random number generated by the function.

    ```


    Note that LCG is a recursive function. It is very easy to implement and has the
    advantage of being a fast pseudo-random number generator. The statistical randomness
    of LCG is sensitive to the modulus value P and the seed which is selected. The
    GNU C library, glibc, uses a period of 2^(45), a multiplier value of 25214903917,
    and a seed value of 11, in the specification of its LCG.


    The following code implements the linear congruential generator in Python:^([^(13)](#fn13))


    ```

    class LCG:

    def __init__(self,mult,addr,prd,seed):

    self.multiplier = mult

    self.addr = addr

    self.period = prd

    self.lastValue = seed

    def generator(self):

    self.lastValue = (self.multiplier*self.lastValue + self.addr) % self.period

    return self.lastValue

    lcg = LCG(11, 37, 1000, 0)

    ctr = 0

    while ctr < 10:

    ret = lcg.generator()

    print(ret)

    ctr += 1

    ```


    The Mersenne Twister^([^(14)](#fn14)) is another high-quality PRNG of interest.
    In its most common derivation, it is seeded with the Mersenne prime number 2^(19937) –
    1 and it has a period of 2^(19937) – 1.


    ## Conclusion


    In this chapter, we have examined the design of symmetric encryption algorithms
    and the cryptanalysis of these algorithms. We have also taken a look at the Advanced
    Encryption Standard, which is a widely used encryption algorithm. The distribution
    of encryption keys to a large number of users is a serious issue since it raises
    the possibility that a key may be stolen during the distribution process. In a
    subsequent chapter, we will show how public key encryption solves the key distribution
    dilemma. Finally, we have elucidated upon pseudo-random number generators.


    In the next chapter, we will study cryptographic hash functions. These functions
    are particularly important in blockchain design.


    # 4. Cryptographic Hash Functions


    Don’t get intimidated by the title of this chapter. The theory of cryptographic
    hash functions is not particularly abstruse. What is difficult is the construction
    of these functions from scratch. However, we need not concern ourselves with this
    aspect of the mathematical theory since most programming language libraries provide
    us with a good selection of functions to choose from.


    Cryptographic hash functions are concerned with the very practical problem of
    determining whether a document or text string has been altered by some malicious
    actor. These functions play a very important role in the development of blockchain
    and cryptocurrency applications, so it is important that you have a good understanding
    of the mathematical theory of these functions.


    ## An Introduction to Cryptographic Hashes


    Consider this scenario. Suppose that you and I are on opposite ends of the Milky
    Way and I send you a message. Now upon receiving the message, you want to satisfy
    yourself that the message has not been changed by some unfriendly alien while
    it was in transit. Secondly, you want to satisfy yourself that the message was
    actually sent by me and not by some impostor. Suppose further that you are unable
    to securely communicate with me to ascertain these two issues. Cryptographic hashes
    (or cryptographic hash functions, if you will) address the issue of whether the
    message was tampered with while in transit. In this chapter, we examine these
    functions. In the subsequent chapter on digital signatures, we will examine the
    matter of authenticity; has the document or message really been authored by the
    person who purports to be its author?


    One way that I can utilize to assure you that the message has not been tampered
    with while in transit would be if I sent you a string of characters called a message
    digest that is somehow related to the message. Suppose that you could then input
    the message into a machine and if this machine produced a message digest that
    matched the message digest that I have sent you, then you could conclude that
    the message has not been altered. If this machine produced a string output that
    did not match the message digest that I sent you, then you would conclude that
    the message was changed while in transit. Such a machine would be called a cryptographic
    hash function (or cryptographic hash algorithm) if it satisfied some constraints
    to be discussed shortly.


    The string output produced by such a machine or cryptographic hash function is
    called a cryptographic hash or a message digest. Frequently, the output is simply,
    but incorrectly, called a hash.


    The machine that we want to construct is a mathematical function or mathematical
    algorithm. So how do we construct such a function?


    ## Cryptographic Hash Functions


    A hash function is a function that takes a string of any length as input and produces
    a string as its output. As a simple example, consider the function y = F(x) that
    takes a string x as an input and produces an output string where each character
    in the input string emits the next character as its output:


    ```

    F(''crypto'') = ''dszqup''

    ```


    This is a very simple hash function, but it is not a cryptographic hash function
    because it does not satisfy some required conditions.


    A cryptographic hash function is a hash function which has four essential properties:


    *   The function produces an output string of fixed length.


    *   The function is collision-free.


    *   The function is irreversible.


    *   The function can be efficiently computed.


    Note


    We can construct hash functions that produce numbers instead of strings. However,
    we typically specify hash functions that emit strings. Blockchain and cryptocurrency
    applications invariably use cryptographic hash functions that produce hexadecimal
    string outputs.


    Now let us look at the required properties of cryptographic hash functions.


    ### The Fixed Length Output Property


    This is a simple requirement. We want our cryptographic hash function to produce
    message digests that have a fixed length. Ideally, we want message digests that
    are small in size since this bears upon the efficiency of transmitting data over
    a network. The smaller the size of a message digest, the lower the probability
    that it will be inadvertently corrupted in the course of its transmission. Cryptographic
    functions that produce message digests that are 128 bits, 256 bits, and 512 bits
    in length are common.'
  trans: "\n# 伪随机数生成器\n\n许多密码学算法需要使用一个或多个随机数，通常用于使用种子初始化进程、生成密钥、设定随机数、指定盐值或随机化变量。与通过采样自然过程或计算机上的某个过程来获取随机数不同，常见的做法是使用一个数学函数来生成一系列伪随机数。生成这种序列的函数被称为伪随机数生成器（`PRNG`）。`PRNG`的工作原理如下：`PRNG`被植入一个称为种子的随机数，然后它会递归地生成一个确定性的数字序列。请注意，给定特定的种子，`PRNG`将始终生成相同的数字序列。\n\
    \n一个好的伪随机数生成器具有统计特性，使其很难与真正的随机数序列区分开来。特别是，在一个高质量的`PRNG`中，连续的数字之间没有相关性，并且`PRNG`在数字开始重复之前具有非常大的周期。\n\
    \n线性同余生成器（`LCG`）是一种常用的`PRNG`。它有一个简单的定义：\n\n```\nXn+1 = (m*xn + a) mod P\nP >=\
    \ 2 是一个整数。 P 是 PRNG 的周期。\n整数系数 m 被称为乘数； m > 0 且 m < P。\n整数 a 被称为加数； a > 0 且 a\
    \ < P。\n生成器的初始值 x0 是种子。\nxn 是由该函数生成的第 n 个伪随机数。\n```\n\n请注意，`LCG`是一个递归函数。它非常容易实现，并且具有作为快速伪随机数生成器的优势。`LCG`的统计随机性对模数值\
    \ `P` 和所选的种子非常敏感。GNU C 库 `glibc` 在其 `LCG` 规范中使用了周期 `2⁴⁵`、乘数值 `25214903917` 和种子值\
    \ `11`。\n\n以下代码在 Python 中实现了线性同余生成器：\n\n```\nclass LCG:\n    def __init__(self,mult,addr,prd,seed):\n\
    \        self.multiplier = mult\n        self.addr = addr\n        self.period\
    \ = prd\n        self.lastValue = seed\n    def generator(self):\n        self.lastValue\
    \ = (self.multiplier*self.lastValue + self.addr) % self.period\n        return\
    \ self.lastValue\n\nlcg = LCG(11, 37, 1000, 0)\nctr = 0\nwhile ctr < 10:\n   \
    \ ret = lcg.generator()\n    print(ret)\n    ctr += 1\n```\n\n梅森旋转算法是另一种备受关注的高质量\
    \ `PRNG`。在其最常见的推导中，它使用梅森素数 `2¹⁹⁹³⁷ – 1` 作为种子，并且其周期为 `2¹⁹⁹³⁷ – 1`。\n\n## 结论\n\n\
    在本章中，我们研究了对称加密算法的设计以及对这些算法的密码分析。我们还了解了高级加密标准，这是一种广泛使用的加密算法。向大量用户分发加密密钥是一个严重的问题，因为它增加了密钥在分发过程中被盗的可能性。在后续章节中，我们将展示公钥加密如何解决密钥分发难题。最后，我们详细阐述了伪随机数生成器。\n\
    \n在下一章中，我们将研究密码学哈希函数。这些函数在区块链设计中尤其重要。\n\n# 密码学哈希函数\n\n不要被本章的标题吓到。密码学哈希函数的理论并非特别深奥。困难的是从头开始构建这些函数。然而，我们无需担心数学理论的这一方面，因为大多数编程语言库都为我们提供了丰富的函数可供选择。\n\
    \n密码学哈希函数涉及一个非常实际的问题：确定文档或文本字符串是否被恶意行为者篡改过。这些函数在区块链和加密货币应用的发展中扮演着非常重要的角色，因此，充分理解这些函数的数学理论对你来说至关重要。\n\
    \n## 密码学哈希简介\n\n设想这样一个场景。假设你我位于银河系的两端，我给你发送了一条消息。现在，收到消息后，你希望确信消息在传输过程中没有被某些不友好的外星人篡改。其次，你希望确信这条消息确实是我发送的，而不是某个冒名顶替者。进一步假设你无法与我进行安全通信来确认这两个问题。密码学哈希（或者如果你愿意，可以称之为密码学哈希函数）解决了消息在传输过程中是否被篡改的问题。在本章中，我们将研究这些函数。在后续关于数字签名的章节中，我们将探讨真实性问题：文档或消息是否真的由声称是作者的人所编写？\n\
    \n我可以利用的一种方式来让你确信消息在传输过程中未被篡改，即发送给你一串称为消息摘要的字符，这串字符以某种方式与消息相关联。假设你可以将消息输入一台机器，如果这台机器产生的消息摘要与你发送给我的消息摘要相匹配，那么你就可以断定消息未被更改。如果这台机器输出的字符串与你发送给我的消息摘要不匹配，那么你就可以断定消息在传输过程中被更改了。如果这样的机器满足一些即将讨论的约束条件，它就被称为密码学哈希函数（或密码学哈希算法）。\n\
    \n由这样的机器或密码学哈希函数产生的字符串输出被称为密码学哈希或消息摘要。通常，这个输出被简单（但不正确地）称为哈希。\n\n我们想要构建的机器是一个数学函数或数学算法。那么，我们如何构建这样的函数呢？\n\
    \n## 密码学哈希函数\n\n哈希函数是一种将任意长度的字符串作为输入，并产生一个字符串作为输出的函数。举个简单的例子，考虑函数 `y = F(x)`，它接受一个字符串\
    \ `x` 作为输入，并输出一个字符串，其中输入字符串中的每个字符都输出其下一个字符：\n\n```\nF('crypto') = 'dszqup'\n```\n\
    \n这是一个非常简单的哈希函数，但它不是一个密码学哈希函数，因为它不满足一些必要条件。\n\n密码学哈希函数是一种哈希函数，它具有四个基本属性：\n\n-\
    \   该函数产生固定长度的输出字符串。\n-   该函数是免碰撞的。\n-   该函数是不可逆的。\n-   该函数可以被高效计算。\n\n**注意**\n\
    \n我们可以构建输出数字而非字符串的哈希函数。然而，我们通常指定输出字符串的哈希函数。区块链和加密货币应用总是使用产生十六进制字符串输出的密码学哈希函数。\n\
    \n现在让我们来看看密码学哈希函数所需具备的属性。\n\n### 固定长度输出属性\n\n这是一个简单的要求。我们希望密码学哈希函数产生具有固定长度的消息摘要。理想情况下，我们希望消息摘要的尺寸较小，因为这关系到在网络上传输数据的效率。消息摘要的尺寸越小，在传输过程中被意外损坏的概率就越低。产生长度为\
    \ 128 位、256 位和 512 位的消息摘要的密码学函数很常见。\n"
- fmt: "### The Collision-Free Property\n\nIt should be clear that if we have two\
    \ different messages, then we want our cryptographic hash function to produce\
    \ two different message digests. That is, if `x` and `y` are two different messages\
    \ and `q = H(p)` is our cryptographic hash function, then we require that:\n\n\
    ```\nx != y implies that H(x) != H(y)\n```\n\nA collision would occur when `x\
    \ != y` but `H(x) = H(y)`. A hash function is said to be collision-free if the\
    \ probability of a collision is infinitesimally small. A good cryptographic hash\
    \ function may have collisions, but it is virtually impossible to find these collisions.\n\
    \nTypical cryptographic hash functions are not neat mathematical expressions in\
    \ the classical sense, such as `y = e^xln2x`. They are a finite and sequential\
    \ series of substitutions and transformations of the input text. Because the function\
    \ specification is made in such a manner, we can never be absolutely certain that\
    \ the function does not contain any collisions.^([^(15)](#fn15))\n\n### The Irreversible\
    \ Property\n\nThis is a commonsense requirement; we should not be able to derive\
    \ a message from its message digest. A good cryptographic hash function is not\
    \ reversible. This means that given an output `y` of a hash function `y = H(x)`,\
    \ it is computationally infeasible to derive the input `x` from the message digest\
    \ `y`.\n\nOur previously discussed hash function:\n\n```\nF('crypto') = 'dszqup'\n\
    ```\n\nis not a cryptographic hash function because it is reversible.\n\n### The\
    \ Property of Efficient Computation\n\nThis is a desirable but not an essential\
    \ quality of a good cryptographic hash function. We want our function to be able\
    \ to compute message digests quickly. This property bears upon the scalability\
    \ of applications that need to compute message digests. Consider, for example,\
    \ a banking application that must process thousands of transactions per second,\
    \ and each transaction requires the computation of one or more message digests.\
    \ In order for this application to scale, it is essential that it be able to compute\
    \ message digests very quickly.\n\n## Proving That a File Has Been Tampered With\n\
    \nLet us apply what we have learned so far to prove that a file has not been tampered\
    \ with.\n\nSuppose that we have a text file and a cryptographic hash function.\
    \ We can compute the message digest of this file if we view the contents of this\
    \ file as a long stream of characters. Then, if subsequently a new file is presented\
    \ to us and it has the same message digest as the previous file, we can then conclude\
    \ that these two files are identical since the message digests (cryptographic\
    \ hashes) of both files are identical. Furthermore, if the message digests differ,\
    \ we can conclude that the two files are not identical.\n\n### The Secure Hash\
    \ Algorithm 256 (SHA-256)\n\nCryptographic hash functions are surprisingly difficult\
    \ to discover. `SHA-256`, `SHA-512`, and `RIPEMD-160` are three cryptographic\
    \ hash functions that are in common use. Let us take a look at the `SHA-256` and\
    \ `RIPEMD-160` hash functions which are used extensively in blockchain applications.\n\
    \n`SHA-256` is an acronym for secure hash algorithm 256. The 256 indicates that\
    \ the message digest (or cryptographic hash) that is emitted by this function\
    \ is 256 bits in length.\n\nFigure [4-1](#492478_1_En_4_Chapter.xhtml#Fig1) shows\
    \ how an `SHA-256` message digest is generated for a message or a file.\n\n![../images/492478_1_En_4_Chapter/492478_1_En_4_Fig1_HTML.jpg](images/492478_1_En_4_Chapter/492478_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1 SHA-256 Message Digest Generation\n\nThe file or message is broken\
    \ into consecutive blocks which are 512 bits in size. If the message or file is\
    \ not exactly mod 512 (divisible by 512), then padding is added to the end of\
    \ the message or the file (a 1 bit followed by zero bits) so that 512 divides\
    \ the bit length of the message or file without a remainder.\n\nNext, we construct\
    \ a 256-bit random IV (initialization vector) using a pseudo-random number generator.\
    \ This is just a 256-bit long pseudo-random sequence of 1 and 0 bits. The purpose\
    \ of the IV is to increase the randomness of the hash generation process. We concatenate\
    \ this IV with the first 512-bit block of the message or file. The resulting 768-bit\
    \ block is input into the secure hash algorithm. This algorithm is a scrambling\
    \ and compression function that outputs a 256-bit string. The algorithm is a series\
    \ of substitutions and permutations of the 768-bit block.\n\nWe next take the\
    \ second 512-bit message block and concatenate it with the previous 256-bit output.\
    \ This 768-bit string is input into the same scrambling and compression function\
    \ and a 256-bit output is produced. We proceed in this way, consuming the message\
    \ blocks. The final 256-bit output is the message digest (or cryptographic hash)\
    \ produced by the `SHA-256` algorithm.\n\nThe heart of `SHA-256` is the scrambling\
    \ and compression function that is applied to each 768-bit block. For `SHA-256`,\
    \ this function consists of 64 rounds. Each round takes a 768-bit block which\
    \ is scrambled with bit shift and logical bit operations (OR, XOR, AND) and then\
    \ fed into the next round. The last round produces a 256-bit output which is concatenated\
    \ with the next 512-bit block of the message, and then the 64 rounds are again\
    \ applied to this 768-bit block. This process repeats itself until the last block\
    \ of the message has been processed.\n\nThe `SHA-512` algorithm is conceptually\
    \ similar except that the message block size is 1024 bits in length and the scrambling\
    \ function consists of 80 rounds. Theoretically, the larger the number of steps\
    \ involved in the scrambling process, the greater the cryptographic security of\
    \ the function.\n\n### A Python Example for SHA-256\n\nPython provides an implementation\
    \ for `SHA-256` as well as other cryptographic hashing algorithms in its `hashlib`\
    \ module. The following Python code sample demonstrates the generation of `SHA-256`\
    \ hexadecimal-encoded message digests for strings:\n\n```\nimport hashlib\ndef\
    \ getSHA256MD(inputStr):\n    m = hashlib.sha256()\n    # convert the input string\
    \ into a sequence of bytes\n    strAsBytes = str.encode(inputStr)\n    m.update(strAsBytes)\n\
    \    # return the message digest as a hexadecimal string\n    return m.hexdigest()\n\
    ret = getSHA256MD('the lazy brown fox jumped over the sleeping dog')\nprint(ret)\n\
    ```\n\nThe result of executing this program is the `SHA-256` hash: `1845c1824b7710df04f1307ea1618857c16e891278eb9dc7edba809915581283`"
  raw: '### The Collision-Free Property


    It should be clear that if we have two different messages, then we want our cryptographic
    hash function to produce two different message digests, that is, if x and y are
    two different messages and *q = H(p)* is our cryptographic hash function, then
    we require that


    ```

    x != y implies that H(x) != H(y)

    ```


    A collision would occur when x != y but H(x) = H(y). A hash function is said to
    be collision-free if the probability of a collision is infinitesimally small.
    A good cryptographic hash function may have collisions, but it is virtually impossible
    to find these collisions.


    Typical cryptographic hash functions are not neat mathematical expressions in
    the classical sense, such as y = e^xln2x. They are a finite and sequential series
    of substitutions and transformations of the input text. Because the function specification
    is made in such a manner, we can never be absolutely certain that the function
    does not contain any collisions.^([^(15)](#fn15))


    ### The Irreversible Property


    This is a commonsense requirement; we should not be able to derive a message from
    its message digest. A good cryptographic hash function is not reversible. This
    means that given an output y of a hash function *y = H(x)*, it is computationally
    infeasible to derive the input x from the message digest y.


    Our previously discussed hash function


    ```

    F(''crypto'') = ''dszqup''

    ```


    is not a cryptographic hash function because it is reversible.


    ### The Property of Efficient Computation


    This is a desirable but not an essential quality of a good cryptographic hash
    function. We want our function to be able to compute message digests quickly.
    This property bears upon the scalability of applications that need to compute
    message digests. Consider, for example, a banking application that must process
    thousands of transactions per second, and each transaction requires the computation
    of one or more message digests. In order for this application to scale, it is
    essential that it be able to compute message digests very quickly.


    ## Proving That a File Has Been Tampered With


    Let us apply what we have learned so far to prove that a file has not been tampered
    with.


    Suppose that we have a text file and a cryptographic hash function. We can compute
    the message digest of this file if we view the contents of this file as a long
    stream of characters. Then, if subsequently a new file is presented to us and
    it has the same message digest as the previous file, we can then conclude that
    these two files are identical since the message digests (cryptographic hashes)
    of both files are identical. Furthermore, if the message digests differ, we can
    conclude that the two files are not identical.


    ### The Secure Hash Algorithm 256 (SHA-256)


    Cryptographic hash functions are surprisingly difficult to discover. SHA-256,
    SHA-512, and RIPEMD-160 are three cryptographic hash functions that are in common
    use. Let us take a look at the SHA-256 and RIPEMD-160 hash functions which are
    used extensively in blockchain applications.


    SHA-256 is an acronym for secure hash algorithm 256\. The 256 indicates that the
    message digest (or cryptographic hash) that is emitted by this function is 256
    bits in length.


    Figure [4-1](#492478_1_En_4_Chapter.xhtml#Fig1) shows how an SHA-256 message digest
    is generated for a message or a file.


    ![../images/492478_1_En_4_Chapter/492478_1_En_4_Fig1_HTML.jpg](images/492478_1_En_4_Chapter/492478_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    SHA-256 Message Digest Generation


    The file or message is broken into consecutive blocks which are 512 bits in size.
    If the message or file is not exactly mod 512 (divisible by 512), then padding
    is added to the end of the message or the file (a 1 bit followed by zero bits)
    so that 512 divides the bit length of the message or file without a remainder.


    Next, we construct a 256-bit random IV (initialization vector) using a pseudo-random
    number generator. This is just a 256-bit long pseudo-random sequence of 1 and
    0 bits. The purpose of the IV is to increase the randomness of the hash generation
    process. We concatenate this IV with the first 512-bit block of the message or
    file. The resulting 768-bit block is input into the secure hash algorithm. This
    algorithm is a scrambling and compression function that outputs a 256-bit string.
    The algorithm is a series of substitutions and permutations of the 768-bit block.


    We next take the second 512-bit message block and concatenate it with the previous
    256-bit output. This 768-bit string is input into the same scrambling and compression
    function and a 256-bit output is produced. We proceed in this way, consuming the
    message blocks. The final 256-bit output is the message digest (or cryptographic
    hash) produced by the SHA-256 algorithm.


    The heart of SHA-256 is the scrambling and compression function that is applied
    to each 768-bit block. For SHA-256, this function consists of 64 rounds. Each
    round takes a 768-bit block which is scrambled with bit shift and logical bit
    operations (OR, XOR, AND) and then fed into the next round. The last round produces
    a 256-bit output which is concatenated with the next 512-bit block of the message,
    and then the 64 rounds are again applied to this 768-bit block. This process repeats
    itself until the last block of the message has been processed.


    The SHA-512 algorithm is conceptually similar except that the message block size
    is 1024 bits in length and the scrambling function consists of 80 rounds. Theoretically,
    the larger the number of steps involved in the scrambling process, the greater
    the cryptographic security of the function.


    ### A Python Example for SHA-256


    Python provides an implementation for SHA-256 as well as other cryptographic hashing
    algorithms in its *hashlib* module. The following Python code sample demonstrates
    the generation of SHA-256 hexadecimal-encoded message digests for strings:


    ```

    import hashlib

    def getSHA256MD(inputStr):

    m = hashlib.sha256()

    # convert the input string into a sequence of bytes

    strAsBytes = str.encode(inputStr)

    m.update(strAsBytes)

    # return the message digest as a hexadecimal string

    return m.hexdigest()

    ret = getSHA256MD(''the lazy brown fox jumped over the sleeping dog'')

    print(ret)

    ```


    The result of executing this program is the SHA-256 hash: `1845c1824b7710df04f1307ea1618857c16e891278eb9dc7edba809915581283`'
  trans: "\n### 抗碰撞性\n\n显而易见，如果我们有两个不同的消息，我们希望密码学哈希函数能产生两个不同的消息摘要。也就是说，如果 `x` 和 `y`\
    \ 是两个不同的消息，而 `q = H(p)` 是我们的密码学哈希函数，那么我们需要满足：\n\n```\nx != y 意味着 H(x) != H(y)\n\
    ```\n\n当 `x != y` 但 `H(x) = H(y)` 时，就会发生碰撞。如果一个哈希函数发生碰撞的概率极低，那么它就被称为具备抗碰撞性。一个好的密码学哈希函数可能会存在碰撞，但实际上几乎不可能找到这些碰撞。\n\
