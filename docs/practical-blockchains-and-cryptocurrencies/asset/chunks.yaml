    加密货币的挖矿算法并非必须定期减半奖励。有些加密货币创建的新币数量是恒定的，或者根据某种公式变化。


    `Bitcoin` 诞生于 2009 年 1 月 3 日，当时中本聪创建并挖掘了创世区块。该区块及其后挖掘的每个区块的挖矿奖励都是 50 个比特币。2012
    年，挖矿奖励减半为 25 个；2016 年，奖励再次减半为 12.5 个比特币。2020 年，奖励减半至 6.25 个比特币。


    由于创造新 helium 或比特币的唯一途径是挖矿过程（除了创世区块的初始分配），这两种加密货币的挖矿算法对其可被创造的总量设定了上限。因此，随着时间的推移，这些算法造成了
    helium 和比特币的稀缺性，而这种稀缺性在理论上提升了这些加密货币的价值。


