  trans: '

    ![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig4_HTML.jpg](img/492478_1_En_13_Fig4_HTML.jpg)


    **图 13-4** 节点 Y 挖出一个区块


    现在，节点 Y 挖出的区块到达节点 C。节点 C 发现无法将该区块添加到其区块链版本的顶端，因为前一个区块的哈希值不匹配。节点 C 还观察到，如果区块链顶端区块的前一个区块实际上位于区块链顶端，那么这个新区块就可以被添加。因此，节点
    C 通过移除区块链顶端的节点，并将新区块添加到这条次级区块链上，从而创建了一条次级区块链。此时，节点 C 拥有一条主区块链和一条次级区块链，这两条区块链的顶端是不同的。


    所有带有星标的节点都遵循相同的逻辑，在节点 Y 的区块到达它们时，创建主区块链和次级区块链。


    类似地，当节点 X 挖出的区块到达带有直角矩形的节点时，这些节点会接受传入的区块，但必须创建主区块链和次级区块链。


    现在，节点 X 和节点 Y 挖出的两个区块都到达了带有矩形的节点，该节点也同样创建了一条主区块链和一条次级区块链。


    接下来，节点 d 成功挖出一个区块，并将其广播到网络上。这一次，网络上的其他挖矿节点无法足够快地挖出新区块，因此节点 d 挖出的区块到达了网络上的所有节点（图
    13-5）。其中一些节点可以将该区块添加到它们的主区块链上（这些是首先收到节点 Y 所挖区块的节点）。这些节点将该区块添加到它们的主区块链上。如果较短的区块链比长区块链短两个或更多区块，则较短的那条会被清除。


    ![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig5_HTML.jpg](img/492478_1_En_13_Fig5_HTML.jpg)


    **图 13-5** 节点 d 挖出一个区块


    类似地，那些首先收到节点 X 所挖区块的节点，可以将这个新区块添加到它们的次级区块链上。这些节点将该区块添加到它们的次级区块链上，然后删除它们的主区块链，并将次级区块链指定为新的主区块链。请注意，再次出现了较短的区块链被删除的情况。


    在此阶段，网络上的所有节点已经收敛到对区块链相同的视图。上述过程描述了中本聪为比特币首次实现的分布式共识算法。所有矿工之所以会遵循最长的区块链，是因为如果他们不这样做，大多数矿工都会将区块添加到最长的区块链上，而持不同意见的矿工会发现，尽管他们可以挖出区块，但却无法说服其他矿工将这些区块添加到较短的区块链上，因此他们将无法获得挖矿奖励和交易手续费。


    由于最长的区块链上投入了最多的算力，节点认为这条区块链是正确的，并会致力于延长它。


    正如我们刚刚看到的，当两条分叉的区块链（主区块链和次级区块链）重新收敛时，其中一条会被删除。那么被删除的区块链中的交易会发生什么？假设由于次级区块链比主区块链多一个区块，主区块链被删除。由于次级区块链是在排除主区块链上最新区块的情况下从主区块链创建的，我们只需要考虑这个特定区块中的交易。我们只需将这些交易中那些也不在次级区块链最新区块中的交易，放回交易内存池中。


    ## 恶意节点


    我们可以注意到恶意节点的三个方面。恶意节点无法创建窃取他人加密货币的交易，因为它需要该个体的私钥才能对恶意交易进行数字签名。


    其次，恶意挖矿节点可能决定不处理某笔交易。但这是一个无用的行为，因为收到该交易的其他挖矿节点会将其包含在自己的候选区块中。


    最后，一群串通作恶的恶意节点无法将其共同的区块链强加为网络上的主导区块链，除非它们控制了至少 51%的总算力。原因在于，如果这些节点拥有至少 51%的总算力，那么下一个区块由它们产出并添加到它们自己区块链版本上的概率至少为
    51%。因此，由于它们控制了大多数算力，它们将能够延长自己的区块链版本，并将其强加为网络上的主区块链。


    ## 交易确认


    当一个区块被挖出并添加到区块链上时，我们说该区块中的交易获得了一次确认。当另一个区块被添加时，前一个区块中的交易就获得了两次确认。随着添加到区块链上的区块数量不断增加，确认次数也在增加。在比特币中，获得六次确认的交易被认为是不可逆的，因为网络要撤销一个位于六个区块深度之下的区块中的交易，所需的算力成本是极其高昂的。恶意节点必须控制网络的大多数算力才能撤销这些区块，并构建出一条替代的最长区块链。


    ## 双重支付问题


    考虑以下场景。爱丽丝有一个氦币，她将其发送给史密斯。爱丽丝在网络上传播这笔交易，一名矿工开始挖一个包含该交易的区块。现在爱丽丝去了别处，再次花费了相同的氦币。由于还没有矿工挖出包含爱丽丝第一笔交易的区块，第二笔交易也在网络上传播，一些矿工将其添加到自己的候选区块中，并开始挖掘这些区块。这就是双重支付问题。爱丽丝显然两次花费了她的氦币。


    第一个矿工成功挖出它的区块，并在网络上广播该区块。该区块包含爱丽丝的第一笔交易。极短时间后，第二个矿工也成功挖出一个区块，并在网络上传播该区块。该区块包含爱丽丝的第二笔交易。


    考虑一个收到其中一个区块的节点。该节点会根据收到的区块延长自己的区块链，并更新其`Chainstate`数据库。如果不久后它收到了第二个区块，它会拒绝这个区块，因为对`Chainstate`数据库的查询会显示爱丽丝没有该交易所需要的金额。由于对`Chainstate`的检查，一个节点只会拥有包含爱丽丝交易的两个区块中的一个。即使节点已经分叉出一条主区块链和一条次级区块链，这一点也同样成立。


    这个例子说明了为什么交易确认很重要。对于小额交易，两次确认就足够了（在比特币网络上平均 20 分钟）。对于大额交易，至少需要获得六次确认（在比特币网络上大约一小时）。

    '
- fmt: '# Conclusion


    In this chapter, we have examined how the cryptocurrency mining process works.
    Mining performs a very important function in distributed cryptocurrencies that
    are modeled similarly to Bitcoin. Mining nodes verify transactions and add blocks
    to local blockchains. These nodes also reach a distributed consensus on the primary
    or dominant blockchain without any reliance on trust, a centralized clock, or
    a supernode coordinator. We have studied the manner in which blockchains in the
    network converge to one view of the blockchain through the application of the
    distributed consensus algorithm. Lastly, we have examined how distributed cryptocurrencies
    solve the “double-spend” problem.


    In the next chapter, we will write program code for a Helium mining node.


    # 14. Helium Mining


    In the previous chapter, we have examined the cryptocurrency mining process in
    detail. Mining is a critical aspect of distributed cryptocurrencies that are modeled
    after Bitcoin. As you will recall, mining produces three results:


    1. Attaches new blocks to the blockchain


    2. Achieves distributed consensus on the content of the blockchain and hence distributed
    consensus on the transactions in the network


    3. Creates fresh units of cryptocurrency that are distributed to miners


    In this chapter, we will implement the theoretical concepts pertaining to distributed
    consensus in the form of mining nodes that implement consensus by solving a difficult
    mathematical problem. Solving this problem is called proof of work, and it lets
    a mining node attach a block to the blockchain and hence collect a substantial
    mining reward as well as transaction fees. Mining is a computationally intensive
    task and hence consumes a substantial quantum of electricity. Nodes compete with
    each other to obtain the financial benefits of mining. The only way to maximize
    profit is to mine as many blocks as possible and attach them to the longest blockchain.
    Longer blockchains have more computational effort extended upon them. Miners will
    not attempt to attach newly mined blocks to a shorter secondary blockchain as
    this blockchain will eventually be deleted by other miners.


    In this chapter, we will write the Python program code for a Helium mining node.
    As usual, we will buttress this code with `pytest` unit tests. So without further
    ado, let us commence this task.


    ## Distributed Consensus Algorithm in Detail


    In Chapter [13](#492478_1_En_13_Chapter.xhtml), we described how blocks are processed
    in the Helium network and how the network arrives at a distributed consensus as
    to the blockchain. We are now going to provide the precise algorithm that a mining
    node uses to process transactions and blocks and achieve distributed consensus:


    | **Handling Incoming Transactions**                                                                                                                                                                                                                                                                                                                                                             |

    |------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|

    | A transaction arrives at a miners interface. There are two cases:                                                                                                                                                                                                                                                                                                                             |

    | **Case A:** | If the transaction is valid, add it to the `mempool`. In particular,
    since the transaction is valid, it does not spend transaction fragments in the
    `Chainstate` database which have already been spent.                                                                                                                                                                                      |

    |              | **Adding Transactions to a Candidate Block**                                                                                                                                                                                                                                                                                                                                                  |

    |              | As transactions are added to a candidate block, we maintain a
    temporary list of prior transaction fragments that are going to be spent by these
    transactions. If a transaction selected for the candidate block tries to spend
    a fragment that is in this list, it is rejected for inclusion in the block and
    also deleted from the `mempool`.                                                |

    | **Case B:** | The transaction is invalid. For example, the miner checks the
    `Chainstate` database and sees that this transaction references one or more previous
    transaction fragments that have already been spent. The transaction is rejected.                                                                                                                                                             |

    | **Handling Incoming Blocks**                                                                                                                                                                                                                                                                                                                                                                  |

    | A block arrives at a mining node interface:                                                                                                                                                                                                                                                                                                                                                   |

    | Get the block height of the incoming block. There are then five possible cases:                                                                                                                                                                                                                                                                                                               |

    | **Case A:** | The block height is less than the height of the blockchain.                                                                                                                                                                                                                                                                                                                                   |
    Reject the block; it is stale. A block at this height has already been mined.
    |

    | **Case B:** | The block height is greater than the height of the blockchain
    + 1.                                                                                                                                                                                                                                                                                                                            |
    Put the block in the `orphan_blocks` list. We will process this block later once
    our blockchain height increases. |

    | **Case C:** | The block height is equal to the height of the blockchain + 1.                                                                                                                                                                                                                                                                                                                                |
    We can add the block to the primary blockchain or the secondary blockchain (if
    it exists) depending upon the value of the `prevblockhash` attribute (see the
    following note). |

    | **Case D:** | The block height is equal to the current block height.                                                                                                                                                                                                                                                                                                                                        |
    If the `prevblock` hash of the new block matches the block header hash of the
    parent of the block at the head of the primary blockchain, then fork the blockchain.
    Otherwise, reject the block (see the following note). |

    | **Case E:** | A block arrives which is greater than the blockchain height +
    1.                                                                                                                                                                                                                                                                                                                              |
    Trigger a call to update our blockchain if a number of such blocks have been received
    by the miner. The blockchain is possibly behind the blockchain of other miners.
    |

    | **Note:** | Suppose that the head of our blockchain has a transaction that consumes
    a transaction fragment and the incoming block also has a transaction that consumes
    the same transaction fragment, then unless the miner that mined the incoming block
    is acting *mala fides*, the new block cannot have a `prevblockhash` value that
    points to the head of our primary blockchain. The new block must either sit on
    top of a secondary blockchain (if it exists) or have a `prevblockhash` that matches
    the block that is the parent of the head block at the head of our blockchain.
    In the latter case, we will have a fork of the primary blockchain. But in either
    case, two double-spending transactions cannot exist on one blockchain. One will
    exist on the primary blockchain, and the second will exist on the secondary blockchain.
    This solves the double-spend problem. Suppose further that we have a primary and
    secondary blockchain and a block arrives that has a `prevblockhash` value that
    matches the parent of the head on one of these blockchains. This block will be
    rejected, as it is in effect matching the block hash of the grandparent of the
    block at the head of the blockchain before it was forked (exercise: think this
    through with some diagrams). |'
