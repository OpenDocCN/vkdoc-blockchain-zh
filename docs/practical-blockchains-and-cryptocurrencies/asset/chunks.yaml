    # 交易可被锁定的最大时间（秒）

    ''MAX_LOCKTIME'': 30*1440*60,

    # Helium 交易中的最大输入数量

    ''MAX_INPUTS'': 10,

    # Helium 交易中的最大输出数量

    ''MAX_OUTPUTS'': 10,

    # 从前一个参考区块算起，必须再挖掘多少个新区块后，才能使用前一个参考区块中的 coinbase 交易

    ''COINBASE_INTERVAL'': 100,

    # 挖矿工作量证明计算中的起始 nonce 值

    ''NONCE'': 0,

    #

    # 挖矿工作量证明计算中使用的难度值

    #

    ''DIFFICULTY_BITS'': 20,

    ''DIFFICULTY_NUMBER'':  1/ (10 ** (256 - 20)),

    #

    # 为调整 DIFFICULTY_NUMBER 而设置的区块重定向间隔

    #

    ''RETARGET_INTERVAL'': 1000,

    #

    # 挖矿奖励

    #

    ''MINING_REWARD'': 5_000_000_000,

    #

    # 挖矿奖励减半的区块间隔

    #

    ''REWARD_INTERVAL'': 210_000

    }

    ```


    ## 总结


    在本章中，我们通过在配置模块中指定重要的配置参数，开始了 `Helium` 加密货币的构建。这些参数影响着 `Helium` 的交易处理、挖矿和货币创造特性。当然，软件开发人员可以修改它们。我们的
    `Helium` 配置是模仿 `Bitcoin` 设计的。


    在下一章中，我们将开发 `Helium` 加密模块。该模块用于支持 `Helium` 执行的所有加密操作。之后，我们将开发 `Helium` 区块链。


    # 8. Helium 区块链


    在本章中，我们将延续上一章的内容，开始构建 `Helium` 区块链。首先，我们将为 `Helium` 使用的加密函数创建接口，然后开发一些 `Helium`
    的区块链功能。


    如果您主要对区块链和加密货币的理论感兴趣，请随意跳转到下一个理论章节。


    ## Python 加密包


    `Helium` 大量使用了加密函数，特别是 `SHA-256`、`RIPEMD-160` 和数字签名。这些功能在 Python 的 `pycryptodome`
    包中可用。因此，让我们安装这个包。请确保您位于 `Helium` 虚拟环境的根目录，并且虚拟环境已激活。执行


    ```

    $(virtual) pip install pycryptodome

    ```


    我们还需要一些辅助性的 Python 模块。首先，我们将使用 Python 的 `re` 模块。`re` 包含在标准 Python 发行版中，因此无需安装。它是
    Python 的正则表达式解析器，用于检查字符串中是否存在指定的子字符串，并且还可以执行文本替换。


    接下来，我们必须安装 `Base58` 模块。`Base58` 将大字符串转换为受限的字母数字字符串。`Base58` 的字母数字字符集是


    ```

    123456789ABCDEFGHJKLMNPQRSTUVWXYzabcdefghijkmnopqrstuvwxyz

    ```


    一个 `Base58` 编码的字符串仅包含上述字符集中的字符。


    `Base58` 字符集与普通的字母数字字符集不同，因为它排除了容易混淆的字符。被排除的字符是 `I`（大写 i）、`l`（小写 L）、`O`（大写 o）和
    `0`（零）。^(³⁷)


    我们还将使用 `pdb` 调试器。`pdb` 使我们能够在源代码中设置断点，逐行执行源代码，并检查堆栈帧和变量的值。^(³⁸) `pdb` 是 Python
    标准发行版的一部分，因此无需通过 `pip` 安装。我们将始终在 `Helium` 源代码文件中导入 `pdb` 模块。


