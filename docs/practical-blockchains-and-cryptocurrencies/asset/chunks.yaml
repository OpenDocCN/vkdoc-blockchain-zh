  trans: "\n### 交易 `vin` 列表\n\n现在我们可以来讨论 `vin` 列表以及解锁先前交易金额的问题了。`vin` 是 value in（输入值）的缩写。`vin`\
    \ 是一个交易输入列表，它消耗了先前交易的输出。\n\n`vin` 列表中的每个元素都是一个字典。该字典元素通常具有以下结构：\n\n```json\n{\n\
    txid:             \nvout_index:       \nScriptSig:        \n}\n```\n\n`txid` 是先前某笔交易的交易\
    \ ID，该交易的一部分输出正在被消耗。\n\n`vout_index` 是先前交易 `vout` 数组中的一个索引。先前交易的每个 `vout` 元素都指定了一个可被消耗（转移）的值。消耗的总价值是所有\
    \ `vin` 元素所转移价值的总和。请注意，先前交易 `vout` 元素中的整个输出都必须被完全消耗。\n\n`ScriptSig` 脚本通过证明对价值的所有权来实现价值转移。它是数字签名和公钥的拼接体。公钥是用于生成公钥地址的密钥，该地址在先前交易中接收了价值转移。我们很快就会详细探讨这个脚本。\n\
    \n### 交易 `vout` 列表\n\n`vout` 是 value out（输出值）的缩写。回想一下，当某个公钥地址根据一笔交易接收价值时，该价值随后可以被其所有者用于另一笔交易。交易的\
    \ `vout` 列表指定了可以转移给一个或多个价值接收者的价值。重申一下，`vout` 列表指定了可由其所有者在后续交易中花费的交易价值。\n\n`vout`\
    \ 是一个列表。每个 `vout` 列表元素都是一个字典，其表示形式如下：\n\n```json\n{\nvalue:  ,\nScriptPubKey:\
    \ \n}\n```\n\n`value` 是指定公钥地址接收到的加密货币价值。字符串 `RIPEMD-160(SHA-160(Public Key))`\
    \ 是从该公钥地址中解析出来的；^((46)) 这个解析出的字符串位于 `ScriptPubKey` 中。`ScriptPubKey` 是一个符号性的解锁操作列表，将在后续讨论。`vout`\
    \ 元素中的加密货币价值可以被能够解锁 `ScriptPubKey` 脚本的实体所花费。唯一能够解锁该脚本的实体是拥有与 `RIPEMD-160(SHA-160(Public\
    \ Key))` 相对应的私钥的实体。我将在后面展示这一点。\n\n关于 `vout` 有两点需要注意。首先，只能转移整数金额。在比特币领域，最小的可转移单位是\
    \ 1 `聪`，即比特币的一亿分之一。在 Helium 中，最小的可转移单位是 1 `helium 分`，也是 Helium 的一亿分之一。通过仅处理整数运算，我们避免了十进制和浮点运算中涉及的所有复杂问题。其次，请注意，整个\
    \ `vout` 列表中的价值总和是交易接收方提供的公钥地址所收到的总价值。通常，这个数额会略低于转入该交易的总金额。差额即为交易手续费。\n\n### 交易机制\n\
    \n在牛顿力学中，计算的基本单位是具有质量的物体。物体具有明确定义的属性，并且有物理定律支配它们的行为。类似地，加密货币网络中的基本计算单位是交易。没有交易，就没有区块链。交易具有严格且定义明确的结构，以及支配其行为的固定规则。\n\
    \n让我们逐步了解一笔典型交易中涉及的所有步骤。假设 Alice 想要向 Smith 转移一个 Helium。Alice 面前的任务是创建一个能够促成此转移的交易对象（前述的字典结构）。该交易对象必须\
    \ (i) 解锁一些 Alice 拥有的先前 *Helium*，以及 (ii) 锁定输出的 Helium 价值，以便只有 Smith 才能解锁和使用它们。解锁\
    \ Alice 拥有的 *Helium* 意味着她证明了自己对这些 *Helium* 的所有权，因此，她可以将其转移出去。一旦这些 *Helium* 被解锁，它们就成为可以交付给\
    \ Smith 的输出。Alice 锁定这些输出，以便只有 Smith 可以解锁它们。这将证明 Smith 拥有这些 *Helium*。\n\n在 Alice\
    \ 能够向 Smith 转移一个 Helium 之前，她必须至少拥有一个 Helium。因此，假设有一笔先前交易，其中包含一个 Alice 拥有的单一输出，金额为\
    \ 1.08 Helium（一个 `vout` 元素）。我们假设该先前交易的 ID 为：\n\n```json\n\"618a125ac95ba370187c574d174eb7d618f3ee35d374899ca0007a035ba0a9e1\"\
    \n```\n\n以下是 Alice 必须遵循的步骤，以便向 Smith 转移一个 Helium：\n\n1.  Alice 请求 Smith 向她发送一个公钥地址，她可以向该地址发送一个比特币。\n\
    \n2.  Smith 向 Alice 发送一个他创建的公钥地址。\n\n3.  Alice 为她的交易创建一个交易 ID。我们假设这个 ID 是：\n\n\
    ```json\n\"d6b77f077ff700cd36df061ed75af353506f0cec6e267f0ce674eaa3b5d53217\"\n\
    ```\n\n4.  当 Alice 在先前交易 `\"618...9e1\"` 中收到 *Helium* 时，她曾向转让人提供了一个公钥地址。Alice\
    \ 现在获取用于创建该地址的公钥（例如，称为 `pPubKey`）以及与该公钥配对的私钥（例如，称为 `PrivKey`）。Alice 提取以下可在先前交易输出（`vout`\
    \ 元素）中获得的值：\n\n```\nMDHash = RIPEMD-160(SHA256(pPubKey))\n```\n\nAlice 为 `MDHash`\
    \ 创建数字签名：\n\n```\nSig = Signature(MDHash)\n```\n\n接下来，Alice 创建一个包含两个元素的列表：`Sig`\
    \ 和与该私钥对应的 `公钥` 字符串。这个列表被称为 `ScriptSig`。\n\n5.  利用这些信息，Alice 在交易的 `vin` 列表中创建\
    \ `vin` 元素。该列表只包含一个元素。`vout_index` 元素是先前交易 `vout` 列表中的索引，它标识了正在被消耗的先前交易的输出（我们假设它为\
