    # 点对点网络上的数据传播


    在比特币和 Helium 网络中，交易和新挖掘的区块通过一种称为"泛洪"的过程在网络中传播。网络中的每个节点都在特定端口上监听网络中发生的交易以及新挖掘的区块。当节点收到新交易或新区块时，它会处理该新区块或交易，并可能将其传输到地址列表中的其他节点。图
    15-4 展示了一个交易在网络中传播的过程。


    ![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig4_HTML.jpg](img/492478_1_En_15_Fig4_HTML.jpg)


    图 15-4


    *点对点网络上的交易传播*


    此图展示了一个由四个堆叠圆盘表示的交易从节点 D 开始传播的过程。节点 D 查询其地址列表，并将交易传送至节点 A 和 C。节点 C 查询其地址列表，并将交易传送至节点
    E 和 F。传播过程按图中箭头所示继续进行。


    这种泛洪过程使得交易和新区块能够快速在网络中传播。当然，正如我们在上一章所讨论的，节点在将交易或新挖掘的区块转发给相邻节点之前，会先验证区块和交易。


    您可能会担心交易和区块会在网络上无限传播。有两种方法可以确保这种情况不会发生。传统方法是为每个交易或区块包含一个生存时间（TTL）参数。例如，考虑一个全新的交易。该交易的元数据将包含一个生存时间（TTL）计数器，例如初始值为
    256。当一个节点收到此交易时，它会将 TTL 减 1，然后重新广播该交易。如果节点收到 TTL 为 0 的交易，则会直接丢弃该交易。


    第二种方法是比特币和 Helium 处理交易路由的方式。比特币节点会在以下情况丢弃传入的交易：(i) 该交易已存在于节点等待处理的事务缓存（*内存池*）中；(ii)
    该交易已存在于区块链中；或 (iii) 该交易无效。否则，节点会将该交易重新广播至其地址列表中的其他节点。


    请注意，交易传播机制还使每个接收节点能够获取传播该交易的节点地址。接收节点可以将此地址添加到其地址列表中。这一特性使接收节点能够通过将以前未知的地址添加到地址列表中来扩展其网络视野。


    由于泛洪算法，每个节点通常会处理一组不同的交易，特别是，某个节点可能无法接收到某些正在网络中传播的交易。如果出现临时网络分区或节点宕机，该节点可能会完全停止接收交易。


    另外请注意，节点接收交易的顺序可能与交易创建的时间顺序不同。


    ## 并发挖矿


    如上一章所述，挖矿模块中的某些函数设计为与 RPC 服务器并发运行。为便于实现这一点，请在`hmining`模块中的以下两个函数（例如`make_candidate_block`和`mine_block`）中添加`async`关键字：


    ```

    async def mine_block(candidate_block: ''dictionary'')

    async def make_candidate_block()

    ```


    通过这一简单修改，这两个函数便能够并发运行。


    `start_mining`函数是一个启动区块挖矿的并发线程。请在`hmining`模块末尾添加以下代码块：


    ```

    #####################################

    # start mining in a thread:

    # $(virtual) python hmining.py

    #####################################

    if __name__ == "__main__":

    #Create the Threads

    t1 = threading.Thread(target=start_mining, args=(), daemon=True)

    t1.start()

    t1.join()

    ```


    从命令行启动此模块将在一个线程上开始区块挖矿。


    ## 在本地主机上模拟 Helium 网络


    本章中，我们将在托管于本地主机网络（127.0.x.x）^(⁶²)的点对点网络上模拟并测试 Helium 挖矿节点。您应该已经在 Helium 根目录下创建了一个`simulated_network`子目录（参见第
    7 章）。`simulated_network`目录必须位于 Python 解释器的路径中^(⁶³)。在`simulated_network`目录下创建一个名为`node_1`的目录。接下来，将
    Helium 根目录下除`unit_tests`目录和`simulated_network`目录之外的所有子目录复制到`simulated_network/node_1`子目录中。删除`simulated_network/node_1/data`子目录中的所有文件。`node_1`目录树包含在模拟
    Helium 网络上运行的节点所需的所有 Python 代码。


    接下来，在`simulated_network`目录下创建一个子目录树`seed_1/hnetwork`。将以下程序代码复制到一个名为`directory_server.py`的文件中，并将该文件保存到`seed_1/hnetwork`子目录下。这段代码指定了
    Helium 网络上的一个目录服务器。


    至此，我们已经为模拟网络指定了一个种子节点和一个 Helium 挖矿节点。您现在可以根据需要，多次将`node_1`目录树复制并粘贴到`simulated_network`目录中，并根据需要重命名这些子树的根目录。这将为模拟网络上的每个
    Helium 节点提供一个对应的子目录。您也可以根据需要指定多个种子节点（作必要修改后）。


    我们还可以使用 Docker 镜像和容器在本地主机上搭建 Helium 网络。Docker 是一种准虚拟化解决方案，可在容器中构建应用程序。容器可以部署到多个主机，而无需任何复杂的部署流程或对容器源代码进行任何修改。有关更多信息，请参考以下
    Docker 资源：*Ian Miell 和 Aidan Sayers 著，《Docker 实战》，Manning Publications，2016 年版*


    下面我们来看一下`directory_server`模块的代码。该程序代码位于`seed_1/hnetwork`子目录中：

