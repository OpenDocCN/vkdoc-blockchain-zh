- fmt: "# Merkle Trees\n\n在典型的加密货币实现中，区块的数据部分包含一组交易。例如，一个比特币区块可能包含2000到4000笔交易。在Helium中，区块中的交易被表示为一个列表。每个列表元素是一笔交易，每笔交易具有字典结构。我们很快会看到，可以将此交易列表表示为树结构。\n\
    \n`Merkle`树是一种平衡二叉树，其中节点通过加密哈希相互关联。`Merkle`树的根节点唯一标识该树。\n\n假设我们有一个区块中的八笔交易列表。我们将按如下方式构建此列表的`Merkle`树。\n\
    \n对于每笔交易，计算该交易的`SHA256`加密哈希作为十六进制字符串。这些值将成为我们`Merkle`树的叶节点（图[10-2](#492478_1_En_10_Chapter.xhtml#Fig2)）。\n\
    \n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig2_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig2_HTML.jpg)\n\
    \n图10-2  \n`Merkle`树的叶节点\n\n`TnhH`是第n笔交易的`SHA256`哈希。由于`Merkle`树是平衡二叉树，它必须包含偶数个叶节点。因此，如果区块中的交易数量为奇数，我们只需将最后一笔交易在交易列表中重复添加一次。\n\
    \n现在我们可以推导`Merkle`树的第二层。从最左侧的叶节点开始，考虑其右侧的兄弟节点。我们将两个哈希`T1H`和`T2H`拼接起来，并计算此拼接字符串的`SHA256`哈希：\n\
    \n```\nT12H = SHA256(T1H + T2H)\n```\n\n然后我们拼接下一对叶节点哈希并计算`SHA256`哈希：\n\n```\n\
    T34H = SHA256(T3H + T4H)\n```\n\n我们按此方式继续，直到所有叶节点都被处理完毕。这将得到一组加密哈希列表，其长度是叶节点数量的一半。`Merkle`树第二层的节点由这个新列表构建而成（图[10-3](#492478_1_En_10_Chapter.xhtml#Fig3)）。\n\
    \n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig3_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig3_HTML.jpg)\n\
    \n图10-3  \n`Merkle`树的前两层\n\n为了推导`Merkle`树的第三层，我们计算以下哈希：\n\n```\nT1234H = SHA256(T12H\
    \ + T34H)\nT5678H = SHA256(T56H + T78H)\n```\n\n现在我们得到了`Merkle`树的第三层（图[10-4](#492478_1_En_10_Chapter.xhtml#Fig4)）。\n\
    \n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig4_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig4_HTML.jpg)\n\
    \n图10-4  \n`Merkle`树的前三层\n\n最后，我们将位于`Merkle`树第三层的两个节点中的`SHA256`哈希拼接起来：\n\n```\n\
    T12345678H = SHA256(T1234H + T5678H)\n```\n\n这给出了区块中八笔交易的`Merkle`树的最终表示（图[10-5](#492478_1_En_10_Chapter.xhtml#Fig5)）。\n\
    \n![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig5_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig5_HTML.jpg)\n\
    \n图10-5  \n八笔区块交易的`Merkle`树\n\n哈希值`T12345678H`被称为`Merkle`根。它是区块中交易的加密哈希。如果任何交易被篡改，或者它们在区块交易列表中的顺序被改变，`Merkle`根将与其先前的值不一致。由于`Merkle`根位于区块头中，区块头将变得不一致。\n\
