  trans: "\n# Helium 钱包程序代码\n\n将以下程序代码复制到一个名为 `wallet.py` 的文件中，并保存在 `wallet` 目录下：\n\
    \n```\n###########################################################################\n\
    # wallet.rb: Helium 的命令行钱包\n###########################################################################\n\
    import hblockchain\nimport rcrypt\nimport pdb\nimport pickle\n# 钱包的状态\nwallet_state\
    \ = {\n\"keys\": [],          # 私钥-公钥元组列表\n\"received\": [],      # 钱包持有者接收的值\n\
    \"spent\": [],         # 钱包持有者转出的值\n\"received_last_block_scanned\": 0,\n\"spent_last_block_scanned\"\
    : 0\n}\ndef create_keys():\nkey_pair = rcrypt.make_ecc_keys()\nwallet_state[\"\
    keys\"].append(key_pair)\ndef initialize_wallet():\nwallet_state[\"received\"\
    ] = []\nwallet_state[\"spent\"] = []\nwallet_state[\"received_last_block_scanned\"\
    ] = 0\nwallet_state[\"spent_last_block_scanned\"] = 0\ndef value_received(blockno:\"\
