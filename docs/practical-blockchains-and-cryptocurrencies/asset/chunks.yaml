    deficits and debt. Thus, there were only three ways to finance government expenditures:
    increase the taxation level, increase the supply of silver, or debase the denarius.
    The Roman Empire itself contained only a few silver mines, so the production of
    silver could not be easily increased. Increased taxation was infeasible, so the
    Roman emperors started to debase the denarius. The drain of silver from Rome to
    India through trade deficits is believed to have been one of the major causes
    for the debasement of the denarius. At the time of Julius Caesar, the denarius
    was only 75% pure silver, and by the advent of the third century, its purity had
    declined to about 5%. This debasement had disastrous consequences and caused hyperinflation
    in the Empire. Trade collapsed as traders lost faith in the denarius. Traders
    and foreign mercenaries in the employ of Rome demanded payment in gold only. The
    Roman legions became weak and demoralized as the denarius became a worthless currency.
    The debasement of the denarius is proof that Rome could not bear the costs of
    maintaining its empire. The end of Rome is well known; Germanic and Hunnish barbarians
    from Asia repeatedly attacked the empire itself, and the last emperor to sit on
    the throne of Rome was a barbarian. The debasement of the denarius can be construed
    to be one of the major causes of the collapse of the empire.'
  trans: '

    # 银行与纸币的诞生


    公元七世纪，中国出现了不记名本票，并迅速得到广泛应用。不记名本票是一种凭证，其签发人承诺凭票即付或于未来某个固定日期，向持票人支付一定数量的货币或商品。由于本票体现了对持票人的支付承诺，持有者经常将其背书转让给他人。因此，这些票据开始像现代纸币一样流通。显然，不记名本票的接受度和可转让性取决于签发人的信誉。当时必定有信誉卓著、极其富有的商人，其本票能被公众当作货币接受。本票使用的迅速扩张促使唐朝设立了一个国库，负责发行以帝国财富与威望为担保的本票。这就是古代世界纸币的首次出现。大约在同一时期，不记名本票也在印度问世。


    # 哈瓦拉体系


    即期本票在印度次大陆的出现带来了一项重大创新。此前，价值交换需要交易双方在交易完成的时刻同时在场。哈瓦拉（在印度称为`Hundi`）则消除了参与者必须在场才能完成交易的需求。换言之，价值可以在相距遥远的双方之间进行交换。哈瓦拉被认为在从中国延伸至威尼斯的古代丝绸之路的发展中发挥了关键作用。


    哈瓦拉的运作方式如下：交易方将价值（例如一些硬币或一张即期本票）交给一个被称为“哈瓦拉达”的人，并指令他向某个遥远城市的人支付这笔价值。该“哈瓦拉达”联系该遥远城市的另一位“哈瓦拉达”，并指令他向指定的收款人付款。在月末或其它约定的结算日，两位“哈瓦拉达”之间进行账目清算。请注意，给第二位“哈瓦拉达”的指令并未伴随价值的转让。实际上，如果在结算日两位“哈瓦拉达”彼此欠款金额相等，那么他们在进行
    *内部* 账目清算时，不会有任何价值转移。


    如果收款人居住在一个非常遥远的城市，交易中可能涉及多位“哈瓦拉达”，他们之间会定期进行账目清算。


    哈瓦拉有几个值得注意的特点。首先，它建立在信任链条之上。其次，价值可以在遥远地区的交易者之间转移，而参与其中的“哈瓦拉达”之间无需实际转移任何货币。例如，如果在某个结算期内，北京的商人通过一位“哈瓦拉达”向上海的商人订购了价值一百万“半两”的货物，而上海的商人通过另一位“哈瓦拉达”向北京的商人订购了价值九十万“半两”的货物，那么北京的那位“哈瓦拉达”在结算日只需向上海的“哈瓦拉达”转账十万“半两”即可。哈瓦拉最后一个值得注意的特点是，它在很大程度上绕开了现代商业银行体系。


    # 罗马帝国与通胀的起源


    从罗马帝国的货币史中，我们可以汲取一个独一无二的教训。这个教训就是铸币成色不足如何引发恶性通货膨胀。还有一个次要教训：一个过度扩张的帝国如何被迫贬值其货币，从而成为自身毁灭的工具。


    罗马硬币由多种金属制成，包括银、铅、铁和铜。帝国的标准硬币是`第纳尔`。`第纳尔`是一枚重 4.5 克的硬币，几乎完全由银制成，这意味着其银纯度至少为 95%。白银在罗马帝国是一种相对稀有的金属，开采需要付出相当大的努力。`第纳尔`巩固了整个庞大罗马帝国的贸易，并因其成色纯正以及罗马帝国的实力和威望而被广泛接受和流通。`第纳尔`不仅是促进贸易的优良硬币，也被视为绝佳的价值贮藏手段。


    然而，维持不断扩张的罗马帝国是一项非常昂贵的任务。罗马国库面临着诸多成本负担。例如，为了连接帝国，修建了近 5 万英里的道路，建造了无数引水渠和公共工程，罗马军团需要支付高额军饷，罗马城人口超过一百万，城市的维护也对罗马国库造成了巨大消耗。最后，还要结算与印度等遥远国家的贸易账户。据估计，罗马与印度之间的贸易每年涉及约
    200 艘船只。


    罗马国库面临的问题是，仅靠税收和掠夺被征服领土，无法维持帝国的开销。罗马没有用于为政府赤字和债务融资的金融机构或机制。因此，只有三种方式可以为政府支出融资：提高税收水平、增加白银供应量，或降低`第纳尔`的成色。罗马帝国本身只有少数几个银矿，因此白银产量很难轻易增加。增税又不可行，于是罗马皇帝们开始降低`第纳尔`的成色。普遍认为，因贸易逆差导致白银从罗马流向印度，是`第纳尔`成色下降的主要原因之一。在尤利乌斯·凯撒时代，`第纳尔`的银纯度仅为
    75%，而到了公元三世纪，其纯度已降至约 5%。这种成色降低带来了灾难性后果，并在帝国内引发了恶性通货膨胀。随着交易者对`第纳尔`失去信心，贸易崩溃。罗马雇佣的商人和外国雇佣兵只要求以黄金支付。随着`第纳尔`变成一文不值的货币，罗马军团变得虚弱且士气低落。`第纳尔`的成色降低证明罗马无法承担维持其帝国的成本。罗马的结局是众所周知的：来自亚洲的日耳曼和匈人蛮族不断攻击帝国本身，最后一位坐在罗马王位上的皇帝是蛮族人。`第纳尔`的成色降低可以被视为帝国崩溃的主要原因之一。

    '
- fmt: '# Gold and the Plunder of the New World


    The art, literature, and intellectual grandeur of Rome did not survive its collapse.
    Europe was plunged into a dark age lasting a thousand years as religious fanaticism
    and Christian superstition gripped the continent. By the early sixteenth century,
    Spain had colonized portions of the new world and was mining gold and silver using
    the aboriginal inhabitants as slave labor.


    The prevailing economic theory at this time was called mercantilism. The foundational
    principle of mercantilism was that the wealth of a nation was measured by the
    amount of gold, silver, and other precious metals that were held in its treasury.
    In addition to spurring the search for gold and silver, this theory also led to
    the imposition of customs duties and other barriers that restricted the flow of
    trade between nations.


    The Spanish incursion into the new world led to the mining and transportation
    of large quantities of gold and silver from the new world into Europe. About 10–20%
    of this gold and silver is presumed to have been looted by privateers acting under
    charters granted by the English Crown and buccaneers operating under pirate flags.


    Spain used this influx of precious metals to build magnificent cathedrals, execute
    vanity projects, and most importantly finance wars for the benefit of the Church
    of Rome. The influx of gold and silver from the new world permitted Spain to maintain
    the largest army in Europe, build a large navy, and finance wars against England,
    France, The Netherlands, the German principalities, the Ottoman Empire, as well
    as non-Catholics who were viewed as heretics.


    One of the immediate effects of the influx of gold and silver into Spain was to
    cause widespread inflation in Europe. In Spain, prices are believed to have increased
    by 300% over the sixteenth century. Spain had a primitive agrarian economy that
    did not benefit in large from the plunder of gold and silver from the new world.
    Spain had a disdain for commerce as a human endeavor and viewed it as having limited
    religious and ethical merit. Consequently, Spain became increasingly dependent
    upon the influx of precious metals to finance the extravagant imperial and religious
    misadventures of the King. The Spanish Exchequer being primarily reliant on the
    looting of gold and silver from the new world went into bankruptcy four times
    in the sixteenth century in the years 1557, 1560, 1576, and 1596. These sovereign
    bankruptcies were a clear indication that there was no taxation base of significance
    in Spain. Eventually, Spain lost its apex position in Europe, and by 1750, it
    was a backwater.


    # The Gold Standard


    As Spain receded from the stage of world history, Britain began to emerge as the
    predominant power in Europe. Britain was a trading nation with a large and sophisticated
    merchant class and also valued the benefit of trade between nations. In addition,
    England had been at the forefront of the Protestant reformation and adhered to
    the Calvinist doctrine that the performance of everyday work had substantial religious
    value. In 1776, Adam Smith wrote *The Wealth of Nations* which demonstrated the
    fallacy of mercantilism and showed that free trade could be a nonzero-sum game
    in which each participant in trade could benefit due to the theory of comparative
    advantage. Adam Smith also introduced the concept of the division of labor and
    its benefits. *The Wealth of Nations* espouses the benefits of free markets and
    free trade and marks the starting point of modern economic theory. At this time,
    England also started to develop a sophisticated law of contract and the stellar
    innovation of joint-stock companies which allowed large amounts of risk capital
    to be raised efficiently. The invention of the joint-stock company kick-started
    the industrial revolution. Starting at the end of the eighteenth century, Britain
    embarked upon a century of colonial expansion.


    In 1844, the British Parliament passed the *Bank Charter Act*, wherein the Bank
    of England promised to redeem its banknotes at a fixed rate into gold specie.
    This established a gold standard across the British Empire as well as in the United
    States, Canada, Australia, and other countries which had extensive trade relations
    with Britain. It also established the pound sterling as the world’s reserve currency.
    Trading nations were content to use the pound sterling in trade and hold reserves
    thereof since they had the assurance that their currency holdings could be converted
    into gold. Gold is a precious metal in scarce supply, and the promise of redeem
    ability of banknotes issued by the Bank of England into gold at a fixed rate effectively
    constrained the ability of England or any other country adhering to the gold standard
    to print paper currency at will. A country printing its currency in excess of
    its gold and sterling reserves faced the possibility of a run on its currency
    as speculators converted their holdings of the currency into pound sterling or
    gold.


    The enormous costs of World War I on the English Exchequer led Britain to impose
    exchange controls; this effectively suspended the convertibility of its currency
    into gold. Many European countries followed in lockstep and abandoned the convertibility
    of their currencies into gold. The effect of this was to cause massive inflation
    as the costs of World War I were financed by simply printing large quantities
    of paper currency to pay off the debt. In other words, the cost of World War I
    was passed on to the population by increasing the money supply. This meant that
    the costs of World War I were borne by the population of Europe through inflation.
    It is well known that inflation causes fixed income assets, such as bonds, to
    decrease in value. In 1925, Britain returned to the gold standard in order to
    preserve the status of the pound sterling as the reserve currency of the world.
    It would prove to be a short-lived effort.'
