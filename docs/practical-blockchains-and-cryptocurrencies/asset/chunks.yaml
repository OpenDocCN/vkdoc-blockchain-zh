    3.  创建交易对象后，爱丽丝将其序列化为 Base58 字节序列，并在 Helium 点对点网络上广播。监听该网络以获取交易的矿工们会接收这笔交易，并（可能）将其包含在他们打算挖掘的区块中。


    在本章的后续部分，我们将展示`ScriptSig`脚本如何确保只有爱丽丝才能解锁之前交易中输出的 1.08 *heliums*，以及`ScriptPubKey`脚本如何确保只有史密斯才能解锁这笔交易中输出的
    1 个 helium。只有当`ScriptSig`和`ScriptPubKey`两者都成功执行且无错误时，交易才被视为有效。比特币和 Helium 都实现了一个简单的栈处理器来验证这些脚本是否成功执行。


    你可能已经注意到，我们解锁了 1.08 *heliums*，但只向史密斯转移了 1 个 helium。剩下的 0.08 个 helium 去哪了？这部分多余金额被称为交易费。它是激励矿工将爱丽丝的交易包含在他们打算挖掘的区块中的诱因。如果某个矿工成功挖掘了一个包含爱丽丝交易的区块，那么该矿工就可以申领这
    0.08 个 helium。


    前述逻辑经过适当修改后，可应用于处理来自爱丽丝拥有的多个先前交易输出的输入（这些交易将有多个先前交易的`vout`列表元素），并且该交易可以将输出指向多个
    helium 地址（该交易将拥有多个`vout`元素）。


    我之前描述的这些步骤通常由爱丽丝的 Helium 钱包执行。


    在一个典型的法币收银台交易中，你支付一些钱并收到一些找零。在加密货币中，找零按以下方式处理。假设爱丽丝有一笔包含 5.08 个 helium 的先前交易，她打算在与史密斯的交易中使用这些
    *heliums*。爱丽丝将创建一个公开地址，并向该地址转入 4 个 *heliums*。这样，史密斯将在他提供给爱丽丝的地址上收到 1 个 helium，爱丽丝将在地自己创建的地址上获得
    4 个 *heliums* 的找零，而交易费将是 0.08 个 *heliums*。交易的这一方面也将由 Helium 钱包透明地处理。


    ## ScriptPubKey 和 ScriptSig 脚本


    交易`vout`元素中的`ScriptPubKey`脚本用于锁定该元素中指定的值。只有该值被转移到的公开地址的所有者才能解锁该值。


    交易`vin`元素中的`ScriptSig`脚本描述了先前交易中将在当前交易中被消耗的一个值。该值将被转移到一个或多个公开地址。被消耗的值可以通过先前交易的交易
    ID 以及该交易中`vout`元素的索引来完全识别。`ScriptSig`脚本确保先前交易中的这个值只能由该值的所有者转移。


    请注意，交易中的每个`vin`元素恰好引用先前交易中的一个`vout`元素，并且这样的`vin`元素必须消耗该`vout`元素中的全部值。


    `ScriptPubKey`和`ScriptSig`脚本都是简单的列表。它们由一个我将要描述的简单栈语言处理。


    这些脚本中的元素（列表元素）要么是一个操作符符号，要么是一个操作数。我们将操作符符号称为操作码。操作数是一个值；例如，整数 5 和字符串`"hello world"`都是操作数。操作码是对操作数执行操作的可符号化操作。例如，加法操作符`+`是一个对数字进行操作的操作码。每个列表元素恰好包含一个操作码或一个操作数。操作码用尖括号括起来表示。


    执行栈是一个由操作码和操作数组成的列表。例如，`ScriptPubKey`和`ScriptSig`都是执行栈。


    `vin`和`vout`列表中的每个元素要么是操作码，要么是操作数。每个列表的行为都像一个栈，因此，它只允许对栈执行两种操作：`PUSH`（压入）和`POP`（弹出）。`POP`操作从栈顶弹出一个元素，`PUSH`操作将一个元素压入栈顶。


    最后，我们还指定了一个结果栈。执行栈上的操作码将对结果栈上的值进行操作，如果操作码的语义要求，操作的结果可能会被推回结果栈。如果执行栈上的值是一个操作数，它将被简单地推送到结果栈上。


    有效的操作码包括`DUP`、`HASH-160`、`PK_HASH`、`EQ-VERIFY`和`CHECK-SIG`。这些操作码的含义如下所述。有效的操作数必须是字符串。


    本规范描述了一个简单的栈语言。


    如前所述，操作码将通过将其括在尖括号内来表示。表示值的操作数则不括在尖括号内。将要执行的操作码将由一个执行指针（粗箭头）指示。


    我们将研究 P2PKHASH（个人到公钥哈希）脚本。这些类型的脚本将价值从单个实体转移到另一个单个实体。在典型的加密货币网络中，P2PKHASH 脚本占所有交易的
    98%到 99%。


    ### ScriptSig 脚本


    P2PKHASH 交易的每个`vin`元素中的`ScriptSig`列表具有以下结构（图 9-2）。


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig2_HTML.jpg](img/492478_1_En_9_Fig2_HTML.jpg)


    图 9-2


    ScriptSig 结构


    一个`ScriptSig`脚本由两个操作数组成。`PUBKEY`是用于创建接收先前交易输出的公开地址的公钥（十六进制字符串）。


    `SIG`是通过对以下值签名而创建的签名：


    ```

    RIPEMD-160(SHA256(先前交易输入的公钥))

    ```


    该值在先前交易的`vout`元素中也存在。


    ### ScriptPubKey 脚本


    考虑一个 P2PKHASH 交易。在此类交易中，交易每个`vout`元素中的`ScriptPubKey`脚本可以可视化为图 9-3 左侧的栈。


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig3_HTML.jpg](img/492478_1_En_9_Fig3_HTML.jpg)


    图 9-3


    ScriptPubKey 的执行栈


    该图还显示了右侧一个空的结果栈。这个栈将存放将由执行栈中的操作码进行操作的操作数。


    执行栈中操作码的含义如下：


    `<DUP>` 表示取出结果栈顶部的值，并将该值的副本压回结果栈。


    `<HASH160>` 表示弹出结果栈顶部的值，并生成值：


    ```

    RIPEMD-160(SHA-256(弹出的值))

    ```


    然后将该消息摘要压入结果栈。`PK-HASH` 是一个字符串。


    `<EQUAL_VERIFY>` 表示从结果栈中弹出两个元素，并验证它们是否相等。


    `<CHECK_SIG>` 表示从结果栈中弹出两个元素，并验证签名。

    ```'
- fmt: '### ScriptSig and ScriptPubKey Scripts in Action


    Let us see how the `ScriptSig` and `ScriptPubKey` scripts are used to validate
    a P2PKHASH transaction. Such a transaction is valid if both of these scripts execute
    without an error. A valid transaction unlocks previous transaction outputs that
    are used in the transaction. We will use our previous example where Alice transfers
    one helium coin to Smith.


    Firstly, we concatenate the `ScriptSig` and `ScriptPubKey` lists and get the following
    execution stack (the head of this list is at the top) (Figure [9-4](#492478_1_En_9_Chapter.xhtml#Fig4)).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig4_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig4_HTML.jpg)


    **Figure 9-4** Execution Stack for ScriptSig and ScriptPubKey


    We will now execute the opcodes on this stack. Any operands that are present in
    this stack will simply be pushed onto the result stack.


    The execution stack will indicate the next operation to be performed with an execution
    pointer, which is a fat arrow (Figure [9-5](#492478_1_En_9_Chapter.xhtml#Fig5)).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig5_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Step 1 of the Execution Stack


    The first operation is `SIG`. Alice takes the value `RIPEMD-160(SHA256(public
    key))` which is available in the `ScriptPubKey` element of the previous transaction’s
    `vout` element and generates the signature of this value. This value is pushed
    onto the result stack. The two stacks now look like Figure [9-6](#492478_1_En_9_Chapter.xhtml#Fig6).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig6_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig6_HTML.jpg)


    **Figure 9-6** Step 2 of the Execution Stack


    The next operation is on `PUBKEY`, which is the public key that Alice used to
    generate the address in the previous transaction whose output is being consumed
    by Alice. This public key hexadecimal string is pushed onto the result stack.
    The two stacks now look like Figure [9-7](#492478_1_En_9_Chapter.xhtml#Fig7).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig7_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig7_HTML.jpg)


    **Figure 9-7** Step 3 of the Execution Stack


    The next opcode is `<DUP>`. This operation requires the element at the head of
    the result stack to be duplicated and pushed back onto the result stack. After
    this operation, the two stacks look like Figure [9-8](#492478_1_En_9_Chapter.xhtml#Fig8).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig8_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig8_HTML.jpg)


    **Figure 9-8** Step 4 of the Execution Stack


    The next opcode `<HASH-160>` requires the value at the head of the result stack
    to be popped off and the value `RIPEMD-160(SHA256(popped value))` to be computed
    and then pushed onto the result stack. The result of this operation is in Figure
    [9-9](#492478_1_En_9_Chapter.xhtml#Fig9).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig9_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig9_HTML.jpg)


    **Figure 9-9** Step 9 of the Execution Stack


    The next operation pushes the `PK-HASH` value onto the result stack. `PK-HASH`
    was created at the time the last transaction was created; its value is `RIPEMD-160(SHA256(public
    key of previous transaction input))` in Figure [9-10](#492478_1_En_9_Chapter.xhtml#Fig10).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig10_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig10_HTML.jpg)


    **Figure 9-10** Step 10 of the Execution Stack


    The next command on the opcode stack is `<EQUAL_VERIFY>`. This opcode requires
    us to pop the two values at the head of the result stack and compare their values.
    If the two `RIPEMD-160` hashes are not equal, the unlocking of the input fails
    since the party alleging to own the value in the previous transaction has not
    provided the correct public key. If Alice uses the public key that she used for
    her previous transaction input to compute the hash, the equality verification
    succeeds.


    If the operation succeeds, then the two stacks look like Figure [9-11](#492478_1_En_9_Chapter.xhtml#Fig11).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig11_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig11_HTML.jpg)


    **Figure 9-11** Step 11 of the Execution Stack


    The last opcode `<CHECK_SIG>` verifies the previous transaction as follows:


    1. Given the public key that Alice used for the prior transaction output, verify
    that the private key corresponding to this public key has generated the signature
    of the value


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig12_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig12_HTML.jpg)


    **Figure 9-12** Transaction Output Unlocked


    1. If the signature is valid, pop the two elements off the result stack. The `vin`
    element of the transaction has validly unlocked the output of the previous transaction
    (Figure [9-12](#492478_1_En_9_Chapter.xhtml#Fig12)).


    ```

    RIPEMD-160(SHA256(public key))

    ```


    If all of the `vin` elements in the present transaction are unlocked, then we
    say that the transaction is unlocked.


    ## Multisig Transactions


    Consider a fiat currency checking account that requires both spouses to sign a
    check. A valid transfer of value in this case requires the signature of both spouses.
    The delivery of such a cheque to the drawee is a multi-signature or multisig transaction.
    In a cryptocurrency network, a multisig transaction refers to a transaction involving
    n > 1 entities, where each entity provides a public address for the transaction.
    Then at least m of these n entities have to provide their signatures before value
    will be transferred to a recipient. This type of transaction is frequently called
    a n:m transaction; it is implemented through a script that verifies multiple signatures.
    Our cheque example is a 2:2 transaction.


    There are several interesting use cases for multisig transactions.


    In a 2:2 escrow transaction, one of the parties is a neutral arbitrator whose
    function is to oversee that agreed conditions for the transfer of value have been
    satisfied. The arbitrator only provides his or her signature if these conditions
    are satisfied. We can also have m:n escrow transactions where m < n arbitrators
    have to sign a transaction.


    In a two-factor authentication transaction, an output in the previous transaction
    is locked by two public addresses. The first public address is generated by an
    online wallet. The second address is generated from keys which are kept in cold
    storage. (47) The output from the previous transaction will be transferred when
    both signatures are verified.


    The simple stack language that we have specified can be used to create scripts
    for multisig transactions as well as other scenarios. Note that since this stack
    language does not support control flow constructs (such as `if … else if …`) and
    loops, it is not Turing complete. This was a deliberate omission by Satoshi Nakamoto
    since it was a design objective to make script processing fast and simple.


    ## Transaction Fees


    A person transferring value in a transaction typically provides miners with an
    incentive to include the transaction in a new block to be mined. This transaction
    fee is the difference between the sum of the inputs and the outputs. It is not
    necessary to provide a transaction fee, but the failure to do so may significantly
    delay the processing of the transaction, as miners are not incentivized to include
    the transaction in candidate blocks to be mined.'
