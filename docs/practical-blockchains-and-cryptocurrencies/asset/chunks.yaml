    *Dedicated to Sardar Hari Singh Nalwa, the illustrious Khalsa General, and his
    valiant servitors who kept on crossing this terrifying world ocean, again and
    again and again. Fluttering like moths ever nearer to the fire. Caring not. Marrying
    the Messenger of Death. Again and again and again. So that the dream of the Lord
    of the Falcons may come to pass.*


    Introduction


    Let me cut to the chase. In this book, we will build a cryptocurrency called Helium
    from scratch in the Python language. You will learn the key algorithms that are
    used in blockchain and cryptocurrency applications, and this will help you develop
    your own applications with confidence in any language.


    The *lingua franca* for Helium is Python. It is my impression that many of the
    developers who are interested in cryptocurrency and blockchain applications have
    expertise in languages other than Python. In order to make this book accessible
    to these developers, I have kept the Python language barrier as low as possible.
    For example, the Helium source code does not use Python classes. In addition,
    there are eight appendixes to this book which fill in various prerequisites. I
    have not attempted to follow Python best practices. This is deliberately so by
    design. The emphasis is on simplicity. The purpose of this book is to equip you
    with knowledge about the key algorithms that underlie cryptocurrency and blockchain
    applications.


    If you are completely new to Python, you can download my book *Python Rocket Science*
    ([`https://leanpub.com/python_rocket_science`](https://leanpub.com/python_rocket_science)
    ); this book has been used in bootcamps to equip students with Python language
    expertise in a minimum amount of time. About 70 pages of this book is all that
    you need to read *Practical Blockchains and Cryptocurrencies*.


    The first chapter of this book surveys the history of money and places Bitcoin
    within this historical context. There are many cryptocurrencies other than Bitcoin
    that are in circulation. The second chapter discusses some of the more prominent
    coins in the cryptocurrency ecosystem.


    In Chapters [3](#492478_1_En_3_Chapter.xhtml)–[5](#492478_1_En_5_Chapter.xhtml),
    we will discuss the cryptography that is required for blockchain and cryptocurrency
    applications. We will take a deep dive into symmetric encryption, cryptographic
    hashes, and public key cryptography. You do not need any Calculus or Number Theory
    to go through these three chapters.


    Chapter [6](#492478_1_En_6_Chapter.xhtml) contains a detailed discussion on the
    theory of blockchains. We will look at the essential characteristics of blockchains
    and how they are constructed.


    In Chapter [7](#492478_1_En_7_Chapter.xhtml), we start making the Helium cryptocurrency.
    Helium is modeled after Bitcoin. This chapter specifies the configuration constants
    for Helium. Chapter [8](#492478_1_En_8_Chapter.xhtml) implements a blockchain
    for Helium. In a pattern that will repeat itself to the end of this book, we will
    validate our Helium source code with unit tests using the *Pytest* unit testing
    framework. Appendix 3 to this book provides all of the know-how that is required
    to utilize Pytest effectively. Chapter [9](#492478_1_En_9_Chapter.xhtml) is a
    theory chapter that discusses transaction processing in cryptocurrency networks.
    This chapter contains a detailed discussion of transaction data structures and
    transaction validation in Bitcoin-like cryptocurrency networks. The next chapter
    (Chapter [10](#492478_1_En_10_Chapter.xhtml)) discusses Merkle trees, a particularly
    useful binary tree data structure that can be used to order and validate the transactions
    in a block. In Chapter [11](#492478_1_En_11_Chapter.xhtml), we implement all of
    the source code for transaction processing in Helium.


    Helium uses two key-value stores (databases), the *chainstate* key-value store
    and the *blk_index* store. Both of these stores are *LevelDB* databases. Appendix
    2 to this book equips you with the necessary *LevelDB* expertise. Chapter [12](#492478_1_En_12_Chapter.xhtml)
    discusses the purpose of these databases in a cryptocurrency application and provides
    a Python implementation for them in Helium.


    Mining is a central feature of cryptocurrency networks that are modeled after
    Bitcoin. Mining is the process by which new currency units are created and transactions
    are added to the blockchain. Chapter [13](#492478_1_En_13_Chapter.xhtml) goes
    into an extensive discussion on the theory of mining. Mining involves the addition
    of blocks to a blockchain. The critical insight of Satoshi Nakamoto, the inventor
    of Bitcoin, was that a consensus as to the order in which blocks should be added
    to the blockchain could be achieved without the necessity of some central arbitrating
    body. This is the distributed consensus algorithm. A significant feature of this
    algorithm is that the validity of transactions does not depend on ordering and
    prioritizing transactions by time or in any other fashion. In this chapter, we
    will discuss in minute detail how a cryptocurrency like Helium achieves distributed
    consensus. In Chapter [14](#492478_1_En_14_Chapter.xhtml), we implement Python
    code for Helium mining, and this includes an implementation of the distributed
    consensus algorithm.


    Cryptocurrency applications typically operate on peer-to-peer networks. Transactions
    and blocks are received from the network and nodes broadcast transactions and
    blocks onto the network. Chapter [15](#492478_1_En_15_Chapter.xhtml) of this book
    shows you how to implement a network interface for a cryptocurrency application.
    In this chapter, we will implement Python code that lets Helium operate on the
    localhost network (*127.0.0.x*). This is very useful for developers since we have
    a fully functioning cryptocurrency ecosystem on a single machine. The generalization
    to routable Internet addresses is a trivial exercise. This chapter utilizes concurrent
    mining operations. Appendixes 4 and 6 contain all of the concurrent Python background
    that you need to understand concurrency in Helium.'
