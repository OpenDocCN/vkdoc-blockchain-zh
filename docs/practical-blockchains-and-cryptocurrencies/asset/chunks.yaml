    3.  Having created the transaction object, Alice serializes it into a Base58 byte
    sequence and broadcasts it on the Helium peer-to-peer network. Miners who are
    listening on this network for transactions pick up the transaction and (may) include
    it in a block that they intend to mine.


    Subsequently in this chapter, we will show how the `ScriptSig` script ensures
    that only Alice can unlock the previous transaction output of 1.08 *heliums* and
    how the `ScriptPubKey` script ensures that only Smith will be able to unlock the
    transaction output of one helium. A transaction is only deemed to be valid if
    both the `ScriptSig` and the `ScriptPubKey` succeed without error. Bitcoin and
    Helium both implement a simple stack processor to verify that these scripts execute
    successfully.


    You will have noticed that we unlocked 1.08 *heliums* but we transferred only
    1 helium to Smith. What has happened to the remainder of 0.08 heliums? This excess
    amount is called a transaction fee. It is an inducement to miners to include Alice’s
    transaction in a block that miners intend to mine. If a miner successfully mines
    a block that contains Alice’s transaction, then the miner can claim these 0.08
    heliums.


    The preceding logic can be applied, mutatis mutandis, to handle inputs from several
    previous transactions holding outputs that Alice owns (there will be more than
    one previous transaction `vout` list element), and the transaction can direct
    outputs to several helium addresses (the transaction will have more than one `vout`
    element).


    The steps that I have described earlier would typically be carried out by Alice’s
    Helium wallet.


    In a typical fiat currency transaction at a cash register, you tender some money
    and get some change back. Change is handled in the following manner in a cryptocurrency.
    Suppose that Alice has a previous transaction with 5.08 heliums in it and she
    intends to use these *heliums* in her transaction with Smith. Alice would create
    a public address and direct 4 *heliums* into this address. Thus, Smith would receive
    one helium to the address that he gave to Alice, Alice would get change of 4 *heliums*
    at the address that she has created, and the transaction fee would be 0.08 *heliums*.
    This aspect of a transaction would also be handled transparently by a Helium wallet.


    ## The ScriptPubKey and ScriptSig Scripts


    The `ScriptPubKey` script in a `vout` element of a transaction is used to lock
    the value specified in this element. Only the owner of the public address to which
    this value is transferred can unlock the value.


    The `ScriptSig` script in a `vin` element of a transaction describes a value in
    a prior transaction that will be consumed in the present transaction. This value
    will be transferred to one or more public addresses. The consumed value can be
    identified completely from the transaction id of the previous transaction and
    the index of the `vout` element in this transaction. The `ScriptSig` script ensures
    that this value in the prior transaction can only be transferred by the entity
    that owns the value.


    Notice that each `vin` element in a transaction references exactly one `vout`
    element in a previous transaction and such a `vin` element must consume the entirety
    of the value in this `vout` element.


    The `ScriptPubKey` and `ScriptSig` scripts are both simple lists. They are processed
    by a simple stack language which I will now describe.


    An element (list element) in these scripts is either an operator symbol or an
    operand. We will call an operator symbol an opcode. An operand is a value; for
    example, the integer 5 and the string `"hello world"` are both operands. Opcodes
    are symbolic operations that perform operations on operands. For example, the
    addition operator `+` is an opcode that operates on numbers. Each list element
    contains exactly one opcode or one operand. Opcodes are designated between angle
    brackets.


    An execution stack is a list of opcodes and operands. For example, `ScriptPubKey`
    and `ScriptSig` are both execution stacks.


    Each element of the `vin` and `vout` lists is either an opcode or an operand.
    Each list behaves like a stack, and hence, it permits only two operations on the
    stack, `PUSH` and `POP`. The `POP` operation pops an element from the head of
    a stack, and a `PUSH` operation pushes an element onto the head of a stack.


    Finally, we also specify a result stack. An opcode on the execution stack will
    operate on values on the result stack, and the result of the operation may be
    be pushed back onto the result stack if the semantics of the opcode requires this.
    If the value on the execution stack is an operand, it is simply pushed onto the
    result stack.


    Valid opcodes are `DUP`, `HASH-160`, `PK_HASH`, `EQ-VERIFY`, and `CHECK-SIG`.
    The meaning of these opcodes is described as follows. Valid operands must be strings.


    This specification describes a simple stack language.


    As stated previously, opcodes will be denoted by enclosing them in angle brackets.
    Operands, which denote values, will not be enclosed in angle brackets. The opcode
    that is to be executed will be indicated by an execution pointer (a fat arrow).


    We are going to examine P2PKHASH (person to public key hash) scripts. These types
    of scripts transfer value from a single entity to another single entity. P2PKHASH
    scripts constitute 98% to 99% of all transactions in typical cryptocurrency networks.


    ### ScriptSig Scripts


    The `ScriptSig` list in each of the `vin` elements of a P2PKHASH transaction has
    the following structure (Figure [9-2](#492478_1_En_9_Chapter.xhtml#Fig2)).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig2_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    ScriptSig Structure


    A `ScriptSig` script is composed of two operands. `PUBKEY` is the public key (hexadecimal
    string) that was used to create the public address that received the previous
    transaction output.


    `SIG` is a signature which is created by signing the value:


    ```

    RIPEMD-160(SHA256(public key of previous transaction input))

    ```


    This value is also available in the `vout` element of the previous transaction.


    ### ScriptPubKey Scripts


    Consider a P2PKHASH transaction. In this type of transaction, the `ScriptPubKey`
    script in each of the `vout` elements of the transaction can be visualized as
    the stack on the left-hand side of Figure [9-3](#492478_1_En_9_Chapter.xhtml#Fig3).


    ![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig3_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Execution Stack for a ScriptPubKey


    This diagram also shows an empty result stack on the right side. This stack will
    hold operands which will be acted upon by the opcodes in the execution stack.


    The meaning of the opcodes in the execution stack are as follows:


    `<DUP>` means taking the value at the head of the result stack and pushing a copy
    of this value back onto the result stack.


    `<HASH160>` means popping the value at the head of the result stack and generating
    the value


    ```

    RIPEMD-160(SHA-256(popped value))

    ```


    and then pushing the message digest onto the result stack. `PK-HASH` is a string.


    `<EQUAL_VERIFY>` means popping two elements from the result stack and verifying
    that they are equal.


    `<CHECK_SIG>` means popping two elements from the result stack and verifying the
    signature.

