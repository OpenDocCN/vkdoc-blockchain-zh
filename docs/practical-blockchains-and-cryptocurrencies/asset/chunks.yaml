- fmt: '# Helium Mining Data Structures


    ## mempool


    `mempool` is a list containing transactions that have been received but are not
    in any mined block.


    ### received_blocks


    This is a list of blocks mined by other mining nodes and meant to be included
    in the receiving node’s blockchain.


    ## orphan_blocks


    This is a list of valid blocks which have been received from other nodes but which
    could not be appended to the receiving miner’s blockchain.


    ## Blockchain


    This is the local blockchain that is being maintained by this mining node. It
    is located in the `hblockchain` module. This blockchain is also referred to as
    the primary blockchain.


    ## Secondary Blockchain


    This is an alternate blockchain that is maintained by the miner when the primary
    blockchain is forked.


    # Helium Mining Functions


    ## mining_reward


    A miner who successfully mines a block is entitled to a reward which consists
    of the issuance of new helium coins. The mining reward determines the quantum
    of fresh currency awarded to the miner. This reward halves periodically. Both
    the initial reward and the halving period are set out in the `hconfig` module.


    The initial reward is `hconfig.conf["MINING_REWARD"]` coins. This reward halves
    every `hconfig.conf["REWARD_INTERVAL"]` blocks.


    ## receive_transaction


    The function `receive_transaction` receives a transaction propagating on the Helium
    P2P network. This function checks to determine whether the transaction is in the
    `mempool`. The function discards the transaction if it is already in the `mempool`.


    In the next step, `receive_transaction` verifies the validity of the transaction.
    If the transaction is valid, it is added to `mempool`; otherwise, the transaction
    is discarded. If the transaction is added to the `mempool`, it is sent for further
    propagation on the Helium network.


    `receive_transaction` is meant to run in a Python thread.^([^(59)](#fn59))


    ## make_candidate_block


    The purpose of `make_candidate_block` is to create a block that can be mined.
    If the `mempool` is empty, the function just returns.


    `make_candidate_block` creates a partial header for a block and then draws transactions
    from the `mempool` and appends them to `tx` field of this block. Any number of
    algorithms can be used to draw transactions from the `mempool`. `make_candidate_block`
    uses a simple FIFO (First-In, First-Out) algorithm and keeps on drawing transactions
    until the maximum block size of 1 MB is almost reached or the `mempool` is exhausted.
    For each transaction, this function inserts a `vout` transaction fragment giving
    itself the transaction fee.


    After `make_candidate_block` has finished its draw from `mempool`, it creates
    a `coinbase` transaction. The `coinbase` transaction is the first transaction
    in the `tx` list. For each block, this function creates a fresh public-private
    key pair that is used to create the `coinbase` transaction and the transaction
    fee fragment.


    Finally, `make_candidate_block` computes the merkle root of the transactions and
    inserts it into the merkle field of the block header. It then tests the validity
    of the constructed block. If the block is valid, it removes the transactions in
    the block from the `mempool`. The candidate block is now ready to be mined.


    ## make_miner_keys


    This function creates a public-private key pair and saves these keys to a text
    file. `make_candidate_block` uses the public key to create the `RIPEMD160(SHA256(public
    key))` hash that is inserted into the `ScriptPubKey` portion of the `coinbase`
    transaction and each transaction fee `vout` fragment.


    ## add_transaction_fee


    `add_transaction_fee` is called from `make_candidate_block`. It receives a transaction
    and the miner’s public key. This function calculates the transaction fee, updates
    the Chainstate, and creates a transaction fragment that directs the transaction
    fee to the holder of the private key corresponding to the public key.


    ## make_coinbase_transaction


    `make_coinbase_transaction` is called from `make_candidate_block`. It receives
    the height of the candidate block and the miner’s public key. This function computes
    the block reward and then creates and returns a `coinbase` transaction.


    ## remove_mempool_transactions


    This function removes transactions from the `mempool` and hence prevents transactions
    from being included more than once in different candidate blocks.


    ## mine_block


    `mine_block` receives a candidate block and initiates mining this block. The SHA256
    hash of the nonce in the block header is computed. The block is said to be mined
    if the computed SHA-256 hash is less than the difficulty number in the Helium
    `hconfig` module. If the value is greater than or equal to the difficulty number,
    then the nonce is incremented and the computational result is compared once again
    to the difficulty number. This process continues until the block is mined or the
    computational loop is exited.


    Once the block is mined, it is attached to the miner’s blockchain and then propagated
    on the Helium P2P network so that other miners can append it to their blockchains.


    ## proof_of_work


    Before a block received from another miner can be included in a local blockchain,
    the node must verify the integrity of the block and its transactions and also
    verify that the nonce supplied in the block header is less than the difficulty
    number in this node’s `hconfig` file. This function implements the proof of work
    for the received block.


    ## receive_block


    `receive_block` receives a block mined by some other miner. If the block is valid,
    the mining node adds the block to its `received_blocks` list. The block is invalid
    if any of the following conditions occur:


    1. The block is invalid.

    2. The block height is less than (blockchain height – 2).

    3. The proof of work fails.

    4. The block does not contain at least two transactions.

    5. The first block transaction is not a coinbase transaction.

    6. Transactions in the block are invalid.

    7. Block is already in the blockchain.

    8. The block is already in the `received_blocks` list.


    If the received block is valid, it is added to the `received_blocks` list and
    the block is propagated on the Helium P2P network so that other nodes can attach
    it to their blockchains.


    `receive_block` is meant to be executed as a Python thread.'
