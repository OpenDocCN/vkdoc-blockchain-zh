    # 排版后的文档


    加密货币等金融应用需要极高的韧性。加密货币和区块链应用必须尽可能简单。英语谚语有云：*简单是真理的标志*（也称为*奥卡姆剃刀*）。比特币和 Helium 通过仅使用一种基本数据结构来实现这种韧性，该数据结构是一个由主机操作系统管理的简单编码文本文件。这个文件就是一个区块文件，而区块链就是这些文件的集合。Helium
    中的所有内容，包括数据库，都可以从这些区块文件中重建。在第 16 章中，我们将讨论加密货币网络中的韧性，并为 Helium 提供一种韧性的实现方案。


    第 17 章讨论了加密货币的钱包实现。在本章中，我们为 Helium 提供了一个简单的命令行钱包。从软件开发者的角度来看，钱包的构建并非特别困难。其复杂性在于钱包图形用户界面的实现。


    第 18 章讨论了 Helium 测试网的实现。Helium 测试网本质上是第 15 章中讨论的 Helium 网络在特定 IP 地址空间（P2P 术语中的覆盖网络）上的一个实现。测试网的主要区别特征在于实现了一个水龙头，允许网络上的节点获取代币，这些代币随后可用于交易。


    最后，本书的附录 10 将 Helium 的所有源代码集中在一个地方。附录 9 包含了 Helium 的所有 Pytest 单元测试文件。附录 8 汇总了
    Helium 中使用的所有数据结构及其简要描述。


    最后，如果我不提请您注意附录 7，那将是我的失职。附录 7 包含了用于构建任意、用户指定高度的模拟 Helium 区块链的所有 Python 代码。这种合成区块链对于集成测试以及研究当加密货币具有某些特性时区块链的演变具有巨大的价值。


    ## 致谢


    如果没有 Apress 团队的宝贵贡献，本书的出版是不可能的。谢谢各位。我要感谢神经生物学家 Jannat Kaur（`kauress.me`），她能够勉强从她的虚拟现实世界中抽身出来，对
    Helium 源代码进行代码审查。感谢 Prasanth Sahoo 对本书的专业技术审阅。我特别感谢 Spandana Chatterjee，她从本书的构思到出版全程给予了指导。没有
    Spandana 的专业指导，一切都不可能实现。当然，还要感谢 Divya Modi。最后，我要感谢 Baljinder Singh 无私的帮助，这远远超出了他的职责范围。


    ## 关于作者 关于技术审阅者


    # 1. 货币简史


    我们将深入探讨加密货币和区块链应用。最具代表性的区块链应用是比特币，它是世界上第一种加密货币。因此，回顾货币的历史，看看比特币如何彻底改变了货币创造和分配的范式，是再合适不过的了。在本章中，我将呈现一段从新石器时代到当代的、带有个人见解的货币史，并特别突出货币演变过程中的里程碑事件。本章将以对比特币及其与传统货币差异的简要概述作为结尾。


    ## 新石器时代


    人类最早的互动形式之一是商品交换。例如，一笔交易可能涉及用 100 个鸡蛋换一条毯子，或者用一把石斧换 35 只母鸡。这类交易被称为物物交换，涉及两个交易方之间交换商品。当一个物体或商品具有效用（有用性）和稀缺性时，它就获得了价值。装饰品因其美丽以及熟练工匠需要付出巨大努力来制作而获得价值。付出大量技能和努力使得装饰品变得稀缺。


    物物交换存在一个根本性问题；它是一种低效的价值交换方式。例如，如果你有一把斧头想要换一些母鸡，那么你必须找到一个既有母鸡可交易又想要斧头的人。可以想象，可能没有任何人满足这个条件，在这种情况下，价值交换就无法完成。此外，即使存在这样的人，还存在确定汇率的问题，也就是应该用多少只母鸡来换这把斧头。这取决于斧头的大小和品质以及母鸡的品质。最后，还有可分割性问题。例如，可能有一个人想要一把斧头，但只有
    12 只母鸡可以用来交换。最后，物物交换的商品通常不具有可互换性。如果一个东西与同类型的任何其他东西无法区分，那么它就是可互换的。正如这些例子所示，物物交换是一种非常低效的交易方式。


    需要是发明之母，因此，物物交换的低效性产生了创造高效交换媒介的需求。大约 3000 到 4000 年前的新石器时代，中国首次出现了以硬币形式出现的货币。货币可以被视为代表一定数量价值的物品。例如，刻有斧头图案的金属硬币可以象征性地代表一把斧头的交换价值。任何形式的货币的有效性都取决于它被接受为价值的象征性代表。这种接受要求货币成为价值储藏手段。也就是说，如果今天刻有斧头图案的硬币可以换
    35 只母鸡，那么 90 天后它也应该能换 35 只母鸡。到公元前 700 年，硬币的使用已从中国传播到印度次大陆。


    大约在公元前 210 年，中国第一位皇帝秦始皇引入了以铜为基础的标准化硬币，作为第一个中华帝国的官方货币，并废除了当地使用的其他形式的货币。这是一项英明的政策，因为它通过促进整个帝国范围内的贸易而统一了帝国。这反过来又导致了帝国经济的加速增长和繁荣。那是中国的黄金时代。由于铜相对丰富，这些铜币的价值很低。帝国国库保证这些硬币可以按固定汇率兑换成有价值的实用物品，这一事实巩固了这些硬币的接受度。这种硬币的引入具备了我们现在通常与货币相关联的所有特征；它们被接受为交换媒介和价值储藏手段，并且这些硬币是可互换的。

    '
- fmt: '# The Emergence of Banks and Banknotes


    By the seventh century AD, bearer promissory notes had appeared in China, and
    they gained rapid adoption. A bearer promissory note is a document wherein the
    maker of the note promises to pay the bearer of the note a certain amount of money
    or commodity, either upon demand or at a certain fixed date in the future. Since
    the promissory note embodied a promise to pay a bearer, the holders of these notes
    would frequently sign them over to other recipients. Consequently, these notes
    started to circulate like a modern paper currency. Clearly, the acceptance and
    negotiability of bearer promissory notes depended upon the reputation of the maker.
    There must have been very wealthy merchants with stellar reputations whose promissory
    notes were accepted by the public as money. The rapid expansion in the use of
    promissory notes led the Tang dynasty to create a treasury that printed promissory
    notes which were backed by the wealth and prestige of the Empire. This was the
    first appearance of paper currency in the ancient world. At about the same time,
    bearer promissory notes made an appearance in India.


    # Hawala


    The appearance of demand promissory notes on the Indian subcontinent led to a
    significant innovation. Previously, the exchange of value required the participants
    of a transaction to both be present at the time the transaction was consummated.
    Hawala (called `Hundi` in India) eliminated the need for participants to be present
    to consummate a transaction. In other words, value could be exchanged between
    parties far removed from each other. Hawala is believed to have been instrumental
    in the development of the ancient Silk Road from China to Venice.


    The manner in which Hawala works is as follows. A transactor gives a person called
    a `hawaladar` value (say, some coins or a demand promissory note) and orders him
    to pay this value to a person in some remote city. The `hawaladar` contacts a
    `hawaladar` in the remote city and orders him to pay the intended recipient. At
    the end of the month or some other agreed-upon settlement date, the two `hawaladars`
    settle accounts among themselves. Notice that the order given to the second `hawaladar`
    is not accompanied by the transfer of value to him. Indeed, if the two `hawaladars`
    have equal amounts owing to each other on the settlement date, no value will be
    transferred by them when they settle their accounts *interse*.


    If the recipient lived in a city very far away, several `hawaladars` could be
    involved in the transaction and the `hawaladars` would settle accounts between
    themselves periodically.


    There are several aspects of Hawala which should be noticed. Firstly, it is based
    on a chain of trust. Secondly, value can be transferred between traders in remote
    locations without any money being transferred between the participating `hawaladars`
    themselves. For example, if traders in Peking used a `hawaladar` to order goods
    worth one million `Ban Liang` from traders in Shanghai during a settlement period
    and traders in Shanghai used a `hawaladar` to order goods worth 900,000 `Ban Liang`
    from traders in Peking, then the `hawaladar` in Peking would only need to transfer
    100,000 `Ban Liang` to the `hawaladar` in Shanghai on the settlement date. The
    last aspect of Hawala worth noting is that it largely bypasses the modern commercial
    banking system.


    # The Roman Empire and the Origins of Inflation


    There is one singular lesson to be learned from the history of currency in the
    Roman Empire. That lesson is how the debasement of coinage causes hyperinflation.
    There is also a secondary lesson: how an over-extended empire is forced to debase
    its currency and thus becomes the instrument of its own destruction.


    Roman coins were made from a variety of metals, including silver, lead, iron,
    and copper. The standard coin of the empire was the `denarius`. The `denarius`
    was a 4.5-gram coin composed almost entirely of silver, meaning that it was a
    coin with at least 95% purity in silver. Silver was a relatively scarce metal
    in the Roman Empire, and considerable effort was required to mine it. The `denarius`
    cemented trade through the breadth of the vast Roman Empire and was widely accepted
    and circulated primarily due to the purity of the coin and the power and prestige
    of the Roman Empire. Not only was the `denarius` a stellar coin for facilitating
    trade but it was perceived as an excellent store of value.


    However, the maintenance of the ever-expanding Roman Empire was a very expensive
    proposition. There were numerous cost impositions on the Roman treasury. For example,
    nearly 50,000 miles of roads were constructed to bind the empire, numerous aqueducts
    and public works were built, the Roman legions had to be well paid, the city of
    Rome had a population in excess of one million people, and the maintenance of
    the city was a considerable drain on the Roman treasury. Finally, trade accounts
    with distant countries such as India had to be settled. The trade between Rome
    and India was estimated to involve approximately 200 ships a year.


    The problem confronting the Roman treasury was that the costs of the Roman Empire
    could not be sustained by taxation and the plunder of conquered territories alone.
    Rome did not have financial institutions or mechanisms for financing government
    deficits and debt. Thus, there were only three ways to finance government expenditures:
    increase the taxation level, increase the supply of silver, or debase the `denarius`.
    The Roman Empire itself contained only a few silver mines, so the production of
    silver could not be easily increased. Increased taxation was infeasible, so the
    Roman emperors started to debase the `denarius`. The drain of silver from Rome
    to India through trade deficits is believed to have been one of the major causes
    for the debasement of the `denarius`. At the time of Julius Caesar, the `denarius`
    was only 75% pure silver, and by the advent of the third century, its purity had
    declined to about 5%. This debasement had disastrous consequences and caused hyperinflation
    in the Empire. Trade collapsed as traders lost faith in the `denarius`. Traders
    and foreign mercenaries in the employ of Rome demanded payment in gold only. The
    Roman legions became weak and demoralized as the `denarius` became a worthless
    currency. The debasement of the `denarius` is proof that Rome could not bear the
    costs of maintaining its empire. The end of Rome is well known; Germanic and Hunnish
    barbarians from Asia repeatedly attacked the empire itself, and the last emperor
    to sit on the throne of Rome was a barbarian. The debasement of the `denarius`
    can be construed to be one of the major causes of the collapse of the empire.'
