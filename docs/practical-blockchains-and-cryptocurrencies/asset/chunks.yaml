    # 10. Merkle Trees


    In the last chapter, we engaged in a comprehensive examination of cryptocurrency
    transactions. Transactions are the fundamental unit of computation in cryptocurrency
    networks. Without transactions, there is no blockchain. A block consists of several
    transactions as well as related data. For any block that contains transactions,
    we want to ascertain two properties: firstly, that these transactions have not
    been tampered with and, secondly, whether a particular transaction is present
    in the block.


    You will recall from Chapter [8](#492478_1_En_8_Chapter.xhtml) that the block
    attribute `prevblockhash` is used to test whether the previous block has been
    tampered with. This hash is computed over the block header of the previous block.
    The transactions in the previous block are not in this block header. However,
    the block header contains the merkle root of these transactions. This root can
    be used to verify the integrity of the transactions in the block. If any of the
    transactions have been altered, the merkle root will change, and consequently,
    the hash of the previous block will not match, invalidating the transaction.


    In this chapter, we will look at how merkle trees are used to verify the integrity
    of block transactions. After this, we will implement code for Helium merkle trees.


    ## Tree Data Structures


    In Computer Science, a tree is a collection of nodes where the nodes are related
    to each other through parent, child, and sibling relationships. This is best explained
    by means of a diagram (Figure [10-1](#492478_1_En_10_Chapter.xhtml#Fig1)).


    ![../images/492478_1_En_10_Chapter/492478_1_En_10_Fig1_HTML.jpg](images/492478_1_En_10_Chapter/492478_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    A Tree Data Structure


    In this diagram, each node is represented by a circle. There are 12 nodes, labeled
    from A to L. These nodes are arranged in four layers. Each node, except for node
    A, is connected to a node above it with a line. The node above it is called a
    parent node. For example, D is a parent node of H, and C is a parent of E as well
    as F. Node A does not have a parent; it is called the root node. Aside from the
    nodes G to L, which are at the bottom of this tree structure, each node is connected
    to two nodes below it. These two nodes are called the children (or left and right
    children) of the node above (which is a parent node). For example, node E has
    two children, the I and J nodes. E is the parent of these nodes. The children
    nodes of a parent node are called siblings of each other. The nodes at the bottom
    of the tree do not have any children and are called leaf nodes.


    This diagram is an example of a binary tree; all of the nodes except for the leaf
    nodes have two children. Furthermore, this is a balanced tree since all of the
    leaf nodes are at the same level. It is not necessary that each parent node have
    two children or that the tree be balanced. We can construct trees where nodes
    have a varying number of children and the tree is not balanced. However, balanced
    binary trees have very nice properties; in particular, we can do very fast insertions
    and deletions of nodes in the tree. Additionally, searching for a node in these
    trees is very fast.


    Each node in a tree will typically contain pointers to its children, its parent
    node as well as data specific to the domain in which the tree is being used. The
    pointers in these nodes permit bidirectional movement through the tree.'
  raw: '## Transaction Validation


