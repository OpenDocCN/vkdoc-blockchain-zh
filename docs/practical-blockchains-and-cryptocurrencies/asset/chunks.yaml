- fmt: "# Conclusion\n\nIn this chapter, we have constructed a basic command-line\
    \ wallet from a blockchain. This wallet implements all of the core functionality\
    \ that is required in a wallet. The wallet can be embellished by encrypting the\
    \ disk file that persists the state of the wallet, wrapping the wallet in a GUI\
    \ interface as well as providing other convenience features.\n\nIn the next and\
    \ final chapter, we will return to the matter of creating a test network for the\
    \ Helium network.\n\n# 18. The Helium Testnet\n\nIn this short concluding chapter,\
    \ we will briefly discuss two matters that pertain to testing a Helium P2P network:\n\
    \n1. The implementation of a Helium test network on the Internet\n2. Helium faucets\n\
    \n## Implementing a Helium Testnet\n\nIn Chapter 15，we implemented a Helium peer-to-peer\
    \ network on the localhost network. In this implementation, network nodes listen\
    \ on loopback addresses (`127.0.0.x`). The relevant portion of the code in the\
    \ file `networknode.py` that enables this is\n\n```\n######################################################\n\
    # start the network interface for the server node on\n# the localhost loop: 127.0.0.19:8081\n\
    #####################################################\nif __name__ == \"__main__\"\
    :\napp.listen(address=\"127.0.0.19\", port=\"8081\")\nlogging.debug('server node\
    \ is running')\nprint(\"network node starting at 127.0.0.19:8081\")\n```\n\nWe\
    \ can easily change this implementation so that nodes listen on routable Internet\
    \ addresses. Each network node edits its `networknode.py` file by replacing the\
    \ address parameter of the `app.listen` function with a unique routable IP address\
    \ that it owns.\n\nThis simple change enables us to set up a Helium testnet on\
    \ the Internet that listens on some designated common port.\n\n## Implementing\
    \ a Helium Faucet\n\nOnce we have a Helium testnet on the Internet, we need to\
    \ provide network nodes with Helium cryptocurrency so that they can create and\
    \ propagate test transactions on the network. This can be accomplished by creating\
    \ a Helium faucet. A faucet is a network node that\n\n1. Creates a private-public\
    \ key pair\n2. Creates and propagates a transaction that transfers a fixed amount\
    \ of Helium coins to the owner of the key pair that has been created\n\nA faucet\
    \ works as follows. A requestor asks the faucet to give it some free Helium coins\
    \ through a JSON remote procedure call to the faucet JSON-RPC server. The faucet\
    \ generates a private-public key tuple and sends it back to the requestor. The\
    \ faucet then creates a coinbase type transaction whereby a fixed number of Helium\
    \ coins are transferred to the requestor, using the key pair that has been provided\
    \ to the requestor. Finally, the faucet propagates this transaction on the Helium\
    \ network. Eventually, this transaction will be added to a block and the block\
    \ will be mined. Upon being mined, the requestor has spendable helium coins that\
    \ were created by the faucet.\n\nWe can also implement a faucet as a web service.\
    \ A visitor who comes to the faucet website is provided with a private-public\
    \ key tuple. The website then invokes the JSON-RPC faucet server, which creates\
    \ and propagates a Helium transaction that uses the key pair that has been provided\
    \ to the website visitor.\n\n## Conclusion\n\nIf you are reading this, then congratulations.\
    \ You have reached the terminal point of this book. We have completed a long journey\
    \ from the cryptographic foundations of blockchains and cryptocurrencies to the\
    \ construction of transactions, blockchains, mining nodes, and cryptocurrency\
    \ networks. Along the way, we have learned the key algorithms that operate in\
    \ this space. You should now have the facility to confidently architect and program\
    \ blockchain and cryptocurrency applications in the language of your choice.\n\
    \nIn the *metaphysiks* of the Sikh race, the material world is characterized as\
    \ the terrifying world ocean. And each time the ferryman ferries someone safely\
    \ over to the distant shore, a quantum of goodness is added to the equation. With\
    \ your hard-acquired knowledge, you too are a master of the ferry and the power\
    \ of goodness is with you. Thank you for your kind consideration. Good hunting.\n\
    \nKaran Singh  \nAttorney-at-law"
  raw: '## Conclusion


    In this chapter, we have constructed a basic command-line wallet from a blockchain.
    This wallet implements all of the core functionality that is required in a wallet.
    The wallet can be embellished by encrypting the disk file that persists the state
    of the wallet, wrapping the wallet in a GUI interface as well as providing other
    convenience features.


    In the next and final chapter, we will return to the matter of creating a test
    network for the Helium network.


    # 18. The Helium Testnet


    In this short concluding chapter, we will briefly discuss two matters that pertain
    to testing a Helium P2P network:


    1.  The implementation of a Helium test network on the Internet


    2.  Helium faucets


    ## Implementing a Helium Testnet


    In Chapter [15](#492478_1_En_15_Chapter.xhtml), we implemented a Helium peer-to-peer
    network on the localhost network. In this implementation, network nodes listen
    on loopback addresses (127.0.0.x). The relevant portion of the code in the file
    *networknode.py* that enables this is^([^(68)](#fn68))


    ```

    ######################################################

    # start the network interface for the server node on

    # the localhost loop: 127.0.0.19:8081

    #####################################################

    if __name__ == "__main__":

    app.listen(address="127.0.0.19", port="8081")

    logging.debug(''server node is running'')

    print("network node starting at 127.0.0.19:8081")

    ```


    We can easily change this implementation so that nodes listen on routable Internet
    addresses. Each network node edits its *networknode.py* file by replacing the
    address parameter of the *app.listen* function with a unique routable IP address
    that it owns.


    This simple change enables us to set up a Helium testnet on the Internet that
    listens on some designated common port.


    ## Implementing a Helium Faucet


    Once we have a Helium testnet on the Internet, we need to provide network nodes
    with Helium cryptocurrency so that they can create and propagate test transactions
    on the network. This can be accomplished by creating a Helium faucet. A faucet
    is a network node that


    1.  Creates a private-public key pair


    2.  Creates and propagates a transaction that transfers a fixed amount of Helium
    coins to the owner of the key pair that has been created


    A faucet works as follows. A requestor asks the faucet to give it some free Helium
    coins through a JSON remote procedure call to the faucet JSON-RPC server. The
    faucet generates a private-public key tuple and sends it back to the requestor.
    The faucet then creates a coinbase type transaction whereby a fixed number of
    Helium coins are transferred to the requestor, using the key pair that has been
    provided to the requestor. Finally, the faucet propagates this transaction on
    the Helium network. Eventually, this transaction will be added to a block and
    the block will be mined. Upon being mined, the requestor has spendable helium
    coins that were created by the faucet.


    We can also implement a faucet as a web service. A visitor who comes to the faucet
    website is provided with a private-public key tuple. The website then invokes
    the JSON-RPC faucet server, which creates and propagates a Helium transaction
    that uses the key pair that has been provided to the website visitor.


    ## Conclusion


    If you are reading this, then congratulations. You have reached the terminal point
    of this book. We have completed a long journey from the cryptographic foundations
    of blockchains and cryptocurrencies to the construction of transactions, blockchains,
    mining nodes, and cryptocurrency networks. Along the way, we have learned the
    key algorithms that operate in this space. You should now have the facility to
    confidently architect and program blockchain and cryptocurrency applications in
    the language of your choice.


    In the *metaphysiks* of the Sikh race, the material world is characterized as
    the terrifying world ocean. And each time the ferryman ferries someone safely
    over to the distant shore, a quantum of goodness is added to the equation. With
    your hard-acquired knowledge, you too are a master of the ferry and the power
    of goodness is with you.^([^(69)](#fn69)) Thank you for your kind consideration.
    Good hunting.


    Karan Singh


    Attorney-at-law'
  trans: "  \n# 结论  \n\n在本章中，我们基于区块链构建了一个基本的命令行钱包。该钱包实现了钱包所需的所有核心功能。可以通过加密用于持久化钱包状态的磁盘文件、将钱包包装在图形用户界面中以及提供其他便利功能来美化钱包。\
    \  \n\n在下一章（也是最后一章）中，我们将回到为 Helium 网络创建测试网络的问题。  \n\n# 18. Helium 测试网  \n\n在这简短的最后章节中，我们将简要讨论与测试\
    \ Helium 点对点网络相关的两个问题：  \n\n1. 在互联网上实现 Helium 测试网络  \n2. Helium 水龙头  \n\n## 实现\
    \ Helium 测试网  \n\n在第 15 章中，我们在本地主机网络上实现了一个 Helium 点对点网络。在此实现中，网络节点监听回环地址（`127.0.0.x`）。在\
    \ `networknode.py` 文件中启用此功能的代码相关部分如下：  \n\n```  \n######################################################\
    \  \n# start the network interface for the server node on  \n# the localhost loop:\
    \ 127.0.0.19:8081  \n#####################################################  \n\
    if __name__ == \"__main__\":  \n    app.listen(address=\"127.0.0.19\", port=\"\
    8081\")  \n    logging.debug('server node is running')  \n    print(\"network\
    \ node starting at 127.0.0.19:8081\")  \n```  \n\n我们可以轻松更改此实现，使节点监听可路由的互联网地址。每个网络节点编辑其\
    \ `networknode.py` 文件，将 `app.listen` 函数的 `address` 参数替换为自己拥有的唯一可路由 IP 地址。  \n\n\
    这一简单的调整使我们能够在互联网上搭建一个 Helium 测试网，该网络监听某个指定的公共端口。  \n\n## 实现 Helium 水龙头  \n\n一旦我们在互联网上搭建了\
    \ Helium 测试网，就需要为网络节点提供 Helium 加密货币，以便它们能够在网络上创建并传播测试交易。这可以通过创建 Helium 水龙头来实现。水龙头是一个网络节点，它：\
    \  \n\n1. 创建一对私钥-公钥  \n2. 创建并传播一笔交易，将固定数量的 Helium 币转移给所创建密钥对的所有者  \n\n水龙头的工作方式如下：请求者通过\
    \ JSON 远程过程调用向水龙头 JSON-RPC 服务器请求一些免费的 Helium 币。水龙头生成一对私钥-公钥，并将其发送回请求者。随后，水龙头创建一笔类似\
    \ coinbase 的交易，通过提供给请求者的密钥对将固定数量的 Helium 币转移给请求者。最后，水龙头在 Helium 网络上传播此交易。最终，这笔交易将被添加到一个区块中，该区块将被挖出。挖出后，请求者便拥有水龙头创建的、可供使用的\
    \ Helium 币。  \n\n我们也可以将水龙头实现为一项网络服务。访问水龙头网站的访客会获得一对私钥-公钥。该网站随后调用 JSON-RPC 水龙头服务器，该服务器创建并传播一笔使用提供给网站访客的密钥对的\
    \ Helium 交易。  \n\n## 结论  \n\n如果你读到了这里，那么恭喜你。你已经到达了本书的终点。我们从区块链和加密货币的密码学基础出发，一路构建了交易、区块链、挖矿节点和加密货币网络，完成了一段漫长的旅程。在此过程中，我们学习了该领域运行的关键算法。现在，你应该有能力自信地使用你选择的语言来设计和编程区块链及加密货币应用程序。\
    \  \n\n在锡克族的玄学中，物质世界被描绘为恐怖的汪洋大海。每当摆渡人安全地将某人渡到彼岸，世间便会增添一份善的能量。凭借你辛苦习得的知识，你也成为了摆渡的大师，善的力量与你同在。感谢你的耐心阅读。祝好运。\
    \  \n\nKaran Singh  \n律师  \n"
