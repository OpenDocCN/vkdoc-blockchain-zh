- fmt: '### Retarget Interval


    ```

    RETARGET_INTERVAL = 1000

    ```


    `Helium` attempts to mine new blocks every ten minutes. After 1000 new blocks
    have been mined, `Helium` uses an algorithm to adjust the `DIFFICULTY_NUMBER`
    so that blocks are mined every ten minutes on average.


    The `Bitcoin` algorithm also attempts to mine a new block every ten minutes on
    average. `Litecoin`, which is quite similar to `Bitcoin`, attempts to mine new
    blocks every two minutes on average.


    ### The Mining Reward


    ```

    MINING_REWARD = 5_000_000_000

    ```


    The `MINING_REWARD` is the amount of new heliums in `HELIUM_CENTS` that are created
    and awarded to a mining node that successfully mines a block. The initial mining
    reward in `Helium` is five billion `HELIUM_CENTS` or five Helium coins (five heliums).
    This reward corresponds to the initial mining reward in `Bitcoin`.


    In `Helium` as well as `Bitcoin`, the mining reward algorithm halves the mining
    reward periodically. The point in time when the reward is halved depends upon
    the number of blocks that have already been mined. Because of this periodic halving,
    the mining reward asymptotically approaches zero.


    A cryptocurrency mining algorithm does not have to halve the reward periodically.
    There are cryptocurrencies where the number of coins that are created remains
    constant or varies according to some formula.


    `Bitcoin` came into existence on January 3, 2009, when Satoshi Nakamoto created
    and mined the genesis block. The mining reward was 50 bitcoins for this block
    and every block that was mined thereafter. In 2012, this mining reward was halved
    to 25, and in 2016, the reward was again halved to 12.5 bitcoins. In 2020, the
    reward was halved to 6.25 bitcoins.


    Since the only way to create new heliums or bitcoins is through the mining process
    (aside from an initial distribution in the genesis block), the mining algorithms
    in these two cryptocurrencies create an upper limit on the number of heliums or
    bitcoins that can be created. Thus, these algorithms create a scarcity of heliums
    and bitcoins over time, and this scarcity theoretically enhances the value of
    these cryptocurrencies.


    ### Reward Interval


    ```

    REWARD_INTERVAL = 210,000

    ```


    The `REWARD_INTERVAL` determines the number of additional blocks that must be
    mined in order to halve the mining reward. For example, after two hundred and
    ten thousand new blocks have been mined, the mining reward will be halved. This
    number is identical to the interval used in `Bitcoin`.


    ## Helium Configuration Module


    We create a configuration module for `Helium` as follows. Create a file `hconfig.py`
    in the `config` directory and copy the following source code into this file:


    ```

    """

    hconfig.py:  parameters that are used to configure Helium.

    """

    conf = {

    # The Helium version no.

    ''VERSION_NO'': 1,

    # The maximum number of Helium coins that can be mined

    ''MAX_HELIUM_COINS'': 21_000_000,

    # The smallest Helium currency unit in terms of one Helium coin

    ''HELIUM_CENT'':  1/100_000_000,

    # The maximum size of a Helium block in bytes

    ''MAX_BLOCK_SIZE'': 1_000_000,

    # The maximum amount of time in seconds that a transaction can be locked

    ''MAX_LOCKTIME'': 30*1440*60,

    # The maximum number of Inputs in a Helium Transaction

    ''MAX_INPUTS'': 10,

    # The maximum number of Outputs in a Helium Transaction

    ''MAX_OUTPUTS'': 10,

    # The number of new blocks from a reference block that must be mined before

    # coinbase transaction  in the previous reference block can be spent

    ''COINBASE_INTERVAL'': 100,

    # The starting nonce value for the mining proof of work computations

    ''NONCE'': 0,

    #

    # Difficulty Number used in mining proof of work computations

    #

    ''DIFFICULTY_BITS'': 20,

    ''DIFFICULTY_NUMBER'':  1/ (10 ** (256 - 20)),

    #

    # Retargeting interval in blocks in order to adjust the DIFFICULTY_NUMBER

    #

    ''RETARGET_INTERVAL'': 1000,

    #

    #Mining Reward

    #

    ''MINING_REWARD'': 5_000_000_000,

    #

    # Mining reward halving interval in blocks

    #

    ''REWARD_INTERVAL'': 210_000

    }

    ```


    ## Conclusion


    In this chapter, we have commenced the construction of the `Helium` cryptocurrency
    by specifying important configuration parameters in a configuration module. These
    parameters bear upon the transaction processing, mining, and currency creation
    characteristics of `Helium`. They are, of course, modifiable by the software developer.
    Our `Helium` configuration is modeled after `Bitcoin`.


    In the next chapter, we will develop the `Helium` cryptographic module. This module
    is used to sustain all of the cryptographic operations that are performed by `Helium`.
    After this, we will develop the `Helium` blockchain.


    # 8. The Helium Blockchain


    In this chapter, we continue forward from the last chapter and begin the construction
    of the `Helium` blockchain. Firstly, we will create the interface for the cryptographic
    functions that are used by `Helium`, and next we will develop some of `Helium`’s
    blockchain functionality.


    If you are primarily interested in the theory of blockchains and cryptocurrencies,
    please feel free to proceed to the next theory chapter.


    ## Python Crypto Packages


    `Helium` makes extensive use of cryptographic functions, especially `SHA-256`,
    `RIPEMD-160`, and digital signatures. This functionality is available in the Python
    `pycryptodome` package. So, let us install this package. Ensure that you are at
    the root of your virtual `Helium` environment and that the virtual environment
    is active. Do


    ```

    $(virtual) pip install pycryptodome

    ```


    We will also need some ancillary Python modules. Firstly, we will be using Python’s
    `re` module. `re` is included in the standard Python distribution, so there is
    no need to install it. It is Python’s regular expression parser. `re` examines
    strings for the presence or absence of specified sub-strings and can also perform
    text substitutions.


    Next, we must install the `Base58` module. `Base58` converts a very large string
    into a restricted alphanumeric string. The `Base58` alphanumeric character set
    is


    ```

    123456789ABCDEFGHJKLMNPQRSTUVWXYzabcdefghijkmnopqrstuvwxyz

    ```


    A `Base58`-encoded string only includes characters from the preceding set.


    The `Base58` character set differs from the ordinary alphanumeric character set,
    in that it excludes characters that can be easily confused. The excluded characters
    are `I` (capital I), `l` (lowercase L), `O` (capital o), and `0` (zero).^([^(37)](#fn37))


    We will also be using the `pdb` debugger. `pdb` enables us to set breakpoints
    in source code, step through our source code line by line, and examine stack frames
    and the values of variables.^([^(38)](#fn38)) `pdb` is part of the Python standard
    distribution, so there is no need to install it through `pip`. We will always
    import the `pdb` module into our `Helium` source code files.


