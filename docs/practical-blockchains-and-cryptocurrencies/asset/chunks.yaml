    1.  Otherwise, move the block to the *orphan_blocks* list.


    2.  If the received block was attached to a blockchain, then for each block in
    the *orphan_blocks* list, try to attach the orphan block to the primary blockchain
    or the secondary blockchain, if it exists.


    3.  If the received block was attached to a blockchain and the secondary blockchain
    has elements, then swap the primary blockchain and the secondary blockchain if
    the length of the secondary blockchain is greater.


    4.  If the received block was attached and the secondary blockchain has elements,
    then clear the secondary blockchain if its length is more than two blocks behind
    the primary blockchain.


    *process_receive_block* is meant to run in a concurrent thread.


    #### fork_blockchain


    This function creates the secondary blockchain by forking the primary blockchain.
    *fork_blockchain* receives a block parameter which it attaches to the secondary
    blockchain.


    #### swap_blockchains


    *swap_blockchains* swaps the primary and secondary blockchains so that the primary
    blockchain is the longer blockchain.


    #### handle_orphans


    *handle_orphans* draws orphaned blocks from the orphans list and attempts to attach
    them to the primary blockchain. Orphaned blocks that are more than two blocks
    distant from the head of the blockchain are deleted.


    #### remove_received_block


    This function removes a block from the *received_blocks* list.


    #### retarget_difficulty_number


    This function is invoked every *hconfig.conf[“RETARGET_INTERVAL”]* number of blocks.
    It recalibrates the difficulty number. The purpose of this function is to ensure
    that blocks are mined every ten minutes on the average. This function implements
    the algorithm set out in Chapter [13](#492478_1_En_13_Chapter.xhtml).


    #### Miscellany


    The remaining functions in the *hmining* module handle concurrent mining and will
    be discussed in the next chapter.


    ## Changes to the Helium Blockchain Module


    In order to handle secondary blockchains, add the following top-level attribute
    to the *hblockchain* module:


    ```

    """

    secondary block used by mining nodes

    """

    secondary_blockchain = []

    ```


    ## Helium Mining Unit Tests


    We are now ready to run unit tests on the mining module. Copy the following code
    into a file called *test_hmining.py* and save it in the *unit_tests* directory.
    Execute the tests in your virtual Python environment with


    ```

    $ pytest test_hmining.py -s

    ```


    You should see 40 unit tests passing:'
  trans: '

    #### `process_received_blocks`


    `process_received_blocks` 从 `received_blocks` 列表中取出区块，并尝试将其附加到区块链上。此函数实现了分布式共识。请注意，由于矿工受利益驱动，他们总会延长自己最长的区块链。处理接收区块的算法如下：


    1. 从 `received_blocks` 列表中获取一个区块。

    2. 如果区块链为空，且该区块的 `prevblockhash` 字段为空，则将此区块添加到区块链中（这是一个创世区块）。

    3. 计算区块链上最后一个区块的区块头哈希值（`blkhash`）：


    ```

    if blkhash == block["prevblockhash"]

    ```


    然后将该区块添加到区块链中。


    4. 如果区块链至少有两个区块，令 `blk_hash` 为区块链中倒数第二个区块的区块头哈希值，然后如果


    ```

    block["prevblockhash"] == blk_hash

    ```


    则创建一个由区块链中除最新区块外的所有区块组成的二级区块链。将该区块附加到此二级区块链上。


    5. 否则，将该区块移动到 `orphan_blocks` 列表。

    6. 如果接收到的区块已附加到某个区块链，则对于 `orphan_blocks` 列表中的每个区块，尝试将该孤立区块附加到主区块链或二级区块链（如果存在）。

    7. 如果接收到的区块已附加到某个区块链，且二级区块链中有元素，那么若二级区块链的长度更长，则交换主区块链和二级区块链。

    8. 如果接收到的区块已附加，且二级区块链中有元素，那么若二级区块链的长度比主区块链落后两个区块以上，则清空二级区块链。


    `process_receive_block` 旨在并发线程中运行。


    #### `fork_blockchain`


    此函数通过分叉主区块链来创建二级区块链。`fork_blockchain` 接收一个区块参数，并将其附加到二级区块链上。


    #### `swap_blockchains`


    `swap_blockchains` 交换主区块链和二级区块链，使得主区块链成为更长的区块链。


    #### `handle_orphans`


    `handle_orphans` 从孤儿列表取出孤立区块，并尝试将它们附加到主区块链上。距离区块链头部超过两个区块的孤立区块将被删除。


    #### `remove_received_block`


    此函数从 `received_blocks` 列表中移除一个区块。


    #### `retarget_difficulty_number`


    此函数每处理 `hconfig.conf["RETARGET_INTERVAL"]` 个区块后被调用一次。它重新校准难度值。此函数的目的是确保区块平均每十分钟被挖出一个。该函数实现了第
    13 章中阐述的算法。


    #### 其他内容


    `hmining` 模块中剩余的函数处理并发挖矿，将在下一章讨论。


    ## 对氦区块链模块的修改


    为了处理二级区块链，请在 `hblockchain` 模块中添加以下顶层属性：


    ```

    """

    挖矿节点使用的二级区块链

    """

    secondary_blockchain = []

    ```


