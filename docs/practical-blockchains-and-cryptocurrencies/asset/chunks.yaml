  trans: '

    # 氦气挖矿数据结构


    ## mempool


    `mempool` 是一个列表，包含已收到但尚未被任何已挖出区块收录的交易。


    ### received_blocks


    这是一个由其他挖矿节点挖出的区块列表，这些区块旨在被纳入接收节点的区块链中。


    ## orphan_blocks


    这是一个来自其他节点、已被验证有效但由于某种原因无法被追加到接收矿工区块链上的区块列表。


    ## Blockchain


    这是由当前挖矿节点维护的本地区块链，位于 `hblockchain` 模块中。此区块链也被称为主区块链。


    ## Secondary Blockchain


    当主区块链发生分叉时，矿工维护的另一条备选区块链。


    # 氦气挖矿函数


    ## mining_reward


    成功挖出区块的矿工有权获得奖励，奖励包括新发行的氦气币。挖矿奖励决定了授予矿工的新增货币数量。该奖励会定期减半。初始奖励和减半周期均由 `hconfig`
    模块设定。


    初始奖励为 `hconfig.conf["MINING_REWARD"]` 个币。该奖励每挖出 `hconfig.conf["REWARD_INTERVAL"]`
    个区块减半一次。


    ## receive_transaction


    `receive_transaction` 函数负责接收在氦气 P2P 网络上传播的交易。该函数会检查交易是否已存在于 `mempool` 中。如果交易已在
    `mempool` 中，则将其丢弃。


    下一步，`receive_transaction` 会验证交易的有效性。如果交易有效，则将其添加到 `mempool` 中；否则丢弃该交易。如果交易被添加到
    `mempool`，它将被发送以在氦气网络上进行进一步传播。


    `receive_transaction` 应在 Python 线程中运行。^(⁵⁹)


    ## make_candidate_block


    `make_candidate_block` 的目的是创建一个可供挖矿的区块。如果 `mempool` 为空，该函数直接返回。


    `make_candidate_block` 会为区块创建一个部分头部，然后从 `mempool` 中抽取交易，并将其追加到该区块的 `tx` 字段中。可以使用任意算法从
    `mempool` 中抽取交易。`make_candidate_block` 使用简单的先进先出（FIFO）算法，持续抽取交易，直到接近达到 1 MB 的最大区块大小或
    `mempool` 被抽空。对于每笔交易，该函数会插入一个 `vout` 交易片段，将交易费分配给自身。


    `make_candidate_block` 完成从 `mempool` 的抽取后，会创建一个 `coinbase` 交易。`coinbase` 交易是 `tx`
    列表中的第一笔交易。对于每个区块，该函数会生成一对新的公私钥，用于创建 `coinbase` 交易和交易费片段。


    最后，`make_candidate_block` 计算交易的默克尔根，并将其插入区块头部的默克尔字段中。然后，它测试所构建区块的有效性。如果区块有效，它会将区块中的交易从
    `mempool` 中移除。此时，候选区块即可准备挖矿。


    ## make_miner_keys


    该函数创建一对公私钥，并将这些密钥保存到一个文本文件中。`make_candidate_block` 使用公钥创建 `RIPEMD160(SHA256(public
    key))` 哈希，该哈希被插入到 `coinbase` 交易的 `ScriptPubKey` 部分以及每个交易费 `vout` 片段中。


    ## add_transaction_fee


    `add_transaction_fee` 由 `make_candidate_block` 调用。它接收一笔交易和矿工的公钥。该函数计算交易费，更新链状态，并创建一个交易片段，将交易费定向到与公钥对应的私钥持有者。


    ## make_coinbase_transaction


    `make_coinbase_transaction` 由 `make_candidate_block` 调用。它接收候选区块的高度和矿工的公钥。该函数计算区块奖励，然后创建并返回一个
    `coinbase` 交易。


    ## remove_mempool_transactions


    该函数从 `mempool` 中移除交易，从而防止同一笔交易在多个不同候选区块中被重复包含。


    ## mine_block


    `mine_block` 接收一个候选区块并开始对该区块进行挖矿。计算区块头部中 nonce 值的 SHA256 哈希值。如果计算出的 SHA-256 哈希值小于氦气
    `hconfig` 模块中的难度值，则认为该区块已被挖出。如果该值大于或等于难度值，则 nonce 递增，并再次将计算结果与难度值进行比较。此过程持续进行，直到区块被挖出或计算循环被退出。


    一旦区块被挖出，它将被附加到矿工的区块链上，然后在氦气 P2P 网络上传播，以便其他矿工将其追加到自己的区块链上。


    ## proof_of_work


    在将从其他矿工处收到的区块纳入本地区块链之前，节点必须验证区块及其交易的完整性，并验证区块头部提供的 nonce 值是否小于本节点 `hconfig` 文件中的难度值。该函数为收到的区块实现工作量证明。


    ## receive_block


    `receive_block` 接收由其他矿工挖出的区块。如果区块有效，挖矿节点会将该区块添加到其 `received_blocks` 列表中。出现以下任一条件则区块无效：


    1.  区块无效。

    2.  区块高度小于（区块链高度 - 2）。

    3.  工作量证明失败。

    4.  区块未包含至少两笔交易。

    5.  区块的第一笔交易不是 coinbase 交易。

    6.  区块中的交易无效。

    7.  区块已在区块链中。

    8.  区块已在 `received_blocks` 列表中。


    如果接收的区块有效，它将被添加到 `received_blocks` 列表中，并在氦气 P2P 网络上传播，以便其他节点将其附加到自己的区块链上。


    `receive_block` 应作为 Python 线程执行。

    '
- fmt: '#### `process_received_blocks`


    `process_received_blocks` draws blocks from the `received_blocks` list and attempts
    to attach them to the blockchain. This function implements distributed consensus.
    Note that since miners are impelled to make a profit, they will always extend
    their longest blockchain. The algorithm for processing the received blocks is
    as follows:


    1. Get a block from the `received_blocks` list.

    2. If the blockchain is empty and the block has an empty `prevblockhash` field,
    then add the block to the blockchain (this is a genesis block).

    3. Compute the block header hash of the last block on the blockchain (`blkhash`):


    ```

    if blkhash == block["prevblockhash"]

    ```


    and then add the block to the blockchain.


    4. If the blockchain has at least two blocks, let `blk_hash` be the hash of the
    block header of the second latest block in the blockchain, and then if


    ```

    block["prevblockhash"] == blk_hash

    ```


    create a secondary block consisting of all of the blocks of the blockchain except
    for the latest. Append the block to this secondary blockchain.


    5. Otherwise, move the block to the `orphan_blocks` list.

    6. If the received block was attached to a blockchain, then for each block in
    the `orphan_blocks` list, try to attach the orphan block to the primary blockchain
    or the secondary blockchain, if it exists.

    7. If the received block was attached to a blockchain and the secondary blockchain
    has elements, then swap the primary blockchain and the secondary blockchain if
    the length of the secondary blockchain is greater.

    8. If the received block was attached and the secondary blockchain has elements,
    then clear the secondary blockchain if its length is more than two blocks behind
    the primary blockchain.


    `process_receive_block` is meant to run in a concurrent thread.


    #### `fork_blockchain`


    This function creates the secondary blockchain by forking the primary blockchain.
    `fork_blockchain` receives a block parameter which it attaches to the secondary
    blockchain.


    #### `swap_blockchains`


    `swap_blockchains` swaps the primary and secondary blockchains so that the primary
    blockchain is the longer blockchain.


    #### `handle_orphans`


    `handle_orphans` draws orphaned blocks from the orphans list and attempts to attach
    them to the primary blockchain. Orphaned blocks that are more than two blocks
    distant from the head of the blockchain are deleted.


    #### `remove_received_block`


    This function removes a block from the `received_blocks` list.


    #### `retarget_difficulty_number`


    This function is invoked every `hconfig.conf["RETARGET_INTERVAL"]` number of blocks.
    It recalibrates the difficulty number. The purpose of this function is to ensure
    that blocks are mined every ten minutes on the average. This function implements
    the algorithm set out in Chapter [13](#492478_1_En_13_Chapter.xhtml).


    #### Miscellany


    The remaining functions in the `hmining` module handle concurrent mining and will
    be discussed in the next chapter.


    ## Changes to the Helium Blockchain Module


    In order to handle secondary blockchains, add the following top-level attribute
    to the `hblockchain` module:


    ```

    """

    secondary block used by mining nodes

    """

    secondary_blockchain = []

    ```


    ## Helium Mining Unit Tests


    We are now ready to run unit tests on the mining module. Copy the following code
    into a file called `test_hmining.py` and save it in the `unit_tests` directory.
    Execute the tests in your virtual Python environment with


    ```

    $ pytest test_hmining.py -s

    ```


    You should see 40 unit tests passing.'
