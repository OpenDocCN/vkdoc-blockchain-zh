    \ the process by which new currency units are created and transactions are added\
    \ to the blockchain. Chapter [13](#492478_1_En_13_Chapter.xhtml) goes into an\
    \ extensive discussion on the theory of mining. Mining involves the addition of\
    \ blocks to a blockchain. The critical insight of Satoshi Nakamoto, the inventor\
    \ of Bitcoin, was that a consensus as to the order in which blocks should be added\
    \ to the blockchain could be achieved without the necessity of some central arbitrating\
    \ body. This is the distributed consensus algorithm. A significant feature of\
    \ this algorithm is that the validity of transactions does not depend on ordering\
