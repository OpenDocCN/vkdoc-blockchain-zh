    \ = 0\n    transaction['transactionid'] = make_transactionid()\n    transaction['vin']\
    \ = make_synthetic_vin(prev_tx)\n    transaction['vout'] = make_synthetic_vouts(transaction['vin'])\n\
    \    return transaction\n\ndef make_synthetic_vin(prev_tx):\n    \"\"\"\n    makes\
    \ a synthetic vin consuming outputs from the\n    synthetic previous transaction\n\
    \    returns a list of dictionaries\n    \"\"\"\n    vins = []\n    ctr = 0\n\
    \    for vout in prev_tx['vout']:\n        vinobj = {}\n        vinobj['txid']\
    \ = prev_tx['transactionid']\n        vinobj['vout'] = ctr\n        vinobj['ScriptSig']\
    \ = make_scriptsig()\n        vins.append(vinobj)\n        ctr += 1\n    ctr =\
    \ 0\n    for x in range(0,random.randrange(10)):\n        vinobj = {}\n      \
    \  vinobj['txid'] = rcrypt.make_uuid()\n        vinobj['vout'] = 0\n        vinobj['ScriptSig']\
    \ = make_scriptsig()\n        vins.append(vinobj)\n    return vins\n\ndef make_scriptsig():\n\
    \    \"\"\"\n    makes a synthetic ScriptSig\n    returns a list of strings and\
    \ bytes\n    \"\"\"\n    tmp = []\n    tmp.append(secrets.token_hex(64))\n   \
    \ tmp.append(secrets.token_hex(64))\n    return tmp\n\ndef make_synthetic_vouts(vins):\n\
    \    \"\"\"\n    makes a synthetic vouts receiving transaction outputs\n    returns\
    \ a list of dictionaries\n    \"\"\"\n    vouts = []\n    for vin in vins:\n \
    \       vout = {}\n        vout['value'] = make_value()\n        tmp = []\n  \
    \      tmp.append('')\n        tmp.append('')\n        tmp.append(secrets.token_hex(64))\n\
    \        tmp.append('')\n        tmp.append('')\n        vout['ScriptPubKey']\
    \ = tmp\n        vouts.append(vout)\n    return vouts\n\ndef make_transactionid():\n\
    \    \"\"\"\n    makes a random transaction id\n    \"\"\"\n    return rcrypt.make_uuid()\n\
    \ndef make_vout_index():\n    \"\"\"\n    makes a random vout index\n    \"\"\"\
    \n    return random.randrange(10)\n\ndef make_pkhash():\n    \"\"\"\n    creates\
    \ a random pkhash value\n    \"\"\"\n    id = rcrypt.make_uuid()\n    return rcrypt.make_RIPEMD160_hash(rcrypt.make_SHA256_hash(id))\n\
    \ndef make_value():\n    \"\"\"\n    creates a random value\n    \"\"\"\n    return\
    \ random.randrange(1000000)\n\ndef make_spent():\n    \"\"\"\n    creates a random\
    \ spent boolean\n    \"\"\"\n    sbool = random.randrange(10) % 2\n    if sbool:\
    \ return False\n    return True\n\ndef test_put_keyvalue():\n    \"\"\"\n    put\
    \ a key-value pair into the chainstate database\n    values have already been\
