- fmt: '# Transaction Validation


    Once a Helium transaction has been created, it is broadcast on the Helium peer-to-peer
    network. A miner who receives this new transaction can elect to include it in
    a block that he is mining. The miner’s decision to include the transaction will
    be partially influenced by the transaction fee offered by the transaction.


    Before including the transaction in a block, the miner will test the transaction
    to determine its validity. Only valid transactions will be included in the block
    that is to be mined.


    If a miner mines a block that has an invalid transaction, other nodes in the network
    will refuse to incorporate this new block in their local versions of the blockchain
    since each node that receives a mined block tests the validity of the block as
    well as the transactions in the block.


    Here are some of the tests that are performed on a transaction to validate it:^([^(48)](#fn48))


    1.  The transaction’s syntax is valid; this means that the required transaction
    fields are present and their types are valid.

    2.  The transaction inputs are positive integers. In particular, they are not
    floating-point numbers.

    3.  The transaction outputs are positive integers. In particular, they are not
    floating-point numbers.

    4.  Transaction inputs and outputs are not less than a Helium cent.

    5.  The sum of the transaction inputs is less than the value of `MAX_HELIUM_COINS`
    in the `hconfig` module.

    6.  The sum of the transaction outputs is less than the value of `MAX_HELIUM_COINS`
    in the `hconfig` module.

    7.  The sum of the transaction inputs is equal to or greater than the sum of the
    transaction outputs.

    8.  The locktime of the transaction is not less than zero.

    9.  The locktime is not greater than the value of `LOCKTIME_INTERVAL` in the `hconfig`
    module.

    10. Each transaction is at least 100 bytes long.

    11. The number of transaction inputs is less than `MAX_INPUTS` in the `hconfig`
    module.

    12. The number of transaction outputs is less than `MAX_OUTPUTS` in the `hconfig`
    module.

    13. The `ScriptSig` script has valid values.

    14. The `ScriptPubKey` script has valid values.

    15. The `ScriptSig` and `ScriptPubKey` scripts succeed in transferring value.

    16. The outputs of a `coinbase` transaction are not spent until the blockchain
    grows by `COINBASE_INTERVAL` blocks from the block in which the `coinbase` transaction
    is located. We will discuss coinbase transactions subsequently.

    17. A `coinbase` transaction does not have any inputs (the `vin` list is empty).

    18. The genesis block does not have any inputs.


    ## Conclusion


    The fundamental unit of computation in a cryptocurrency network is a transaction.
    The blocks in a blockchain contain transactions. Blocks are added to a blockchain
    as transactions are processed by nodes on the cryptocurrency network. These nodes
    are called miners, and the process of adding a block to a blockchain is called
    mining.


    In this chapter, we have looked at the structure of a canonical cryptocurrency
    transaction and examined all of the steps that must be followed to unlock the
    inputs in previous transactions so that they can be spent. Nodes that want to
    add a block to the cryptocurrency blockchain must include transactions in their
    candidate block. These nodes must, at the outset, verify that the transactions
    included in a block are valid. We have examined transaction validation tests.
    If a mining node successfully adds a block to the blockchain, it is entitled to
    the transaction fees in respect to all of the transactions in the block as well
    as a mining reward embodied in a `coinbase` transaction.


    In the next chapter, we are going to study Merkle trees. These tree structures
    are used to ascertain whether a list of transactions has been tampered with. Merkle
    trees can also be used to ascertain whether a particular transaction is in a block.


    ## Reference


    [`https://github.com/bitcoin/bitcoin`](https://github.com/bitcoin/bitcoin), last
    accessed on February 8, 2020


