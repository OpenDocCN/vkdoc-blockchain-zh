    print(f\"公钥:  (n={hex(pubKey.n)}, e={hex(pubKey.e)})\")\n# 爱丽丝的公钥（PEM 格式）\n# PEM\
    \ 格式对密钥进行 Base64 编码\npubKeyPEM = AliceKeyPair.publickey().exportKey()\nprint(\"\
    公钥 PEM 格式: \" + pubKeyPEM.decode('ascii'))\n# 爱丽丝的私钥\nprint(f\"私钥: (n={hex(pubKey.n)},\
    \ d={hex(AliceKeyPair.d)})\")\n# 爱丽丝的私钥（PEM 格式）\nprivKeyPEM = AliceKeyPair.exportKey()\n\
    print(\"私钥 PEM 格式: \" + privKeyPEM.decode('ascii'))\n#======================================================\n\
    # 史密斯使用爱丽丝的公钥加密一条消息\n# 消息必须是二进制字符串\n#======================================================\n\
    message = b\"The quick brown fox jumped over the farmer's hedge\"\ncipher = PKCS1_OAEP.new(pubKey)\n\
    cipherText = cipher.encrypt(message)\nprint(\"密文: \", binascii.hexlify(cipherText))\n\
    #=======================================================\n# 爱丽丝使用她的私钥解密史密斯的消息\n\
    #=======================================================\ndecipher = PKCS1_OAEP.new(AliceKeyPair)\n\
    plainText = decipher.decrypt(cipherText)\nprint('解密后的文本: ', plainText)\n#==========================================================\n\
    # 爱丽丝通过对消息先生成 SHA-256\n# 摘要，然后用她的私钥对其加密来签名一条消息。\n# 字符串消息被转换为二进制字符串\n#==========================================================\n\
    message = b'let sleeping dogs lie, said the farmer'\nhash = int.from_bytes(sha256(message).digest(),\
    \ byteorder=\"big\")\nsignature = pow(hash, AliceKeyPair.d, AliceKeyPair.n)\n\
    print(\"爱丽丝的签名:\", hex(signature))\n#============================================================\n\
    # 史密斯通过比较从接收到的消息生成的 SHA-256 哈希值\n# 与从爱丽丝收到的签名解密得到的哈希值来验证签名\n#=============================================================\n\
    hashFromMessage = int.from_bytes(sha256(message).digest(), byteorder=\"big\")\n\
    decryptedHash   = pow(signature, AliceKeyPair.e, AliceKeyPair.n)\nif (hashFromMessage\
    \ == decryptedHash):\n    print(\"签名有效\")\nelse:\n    print(\"签名无效\")\n```\n"
- fmt: "### Generating Globally Unique IDs\n\nIn a blockchain application, we typically\
    \ need universally unique values that identify blocks and transactions. One way\
    \ to generate these global IDs is to generate a public-private key pair and then\
    \ get the SHA-256 hash of the private or public key. The resultant 256-bit message\
    \ digest is globally unique.^([22](#fn22)) This means that it is computationally\
    \ infeasible to generate some other public-private key pair that will generate\
    \ the same message digest. Similarly, we can apply the RIPEMD-160 cryptographic\
    \ hash function to a public or private key. The resultant 160-bit message hash\
    \ is also a globally unique id.\n\n## Conclusion\n\nPublic key cryptography or\
    \ asymmetric key encryption is a very important foundational tool of blockchain\
    \ and cryptocurrency applications. In this chapter, we have delved into public\
    \ key cryptography and, in particular, public-private key pairs and digital signature\
    \ algorithms. We have also looked at the derivation of the RSA algorithm, which\
    \ is the most popular algorithm for generating public-private key pairs. In addition,\
    \ we have described a public key infrastructure which can be used to associate\
    \ identities with these key pairs.\n\nThis constitutes the end of our dive into\
    \ cryptography, and in the next chapter, we will proceed to the main corpus of\
    \ this book, blockchain and cryptocurrency applications.\n\nFootnotes  \n[1](#492478_1_En_5_Chapter.xhtml#Fn1_source)\
    \ [2](#492478_1_En_5_Chapter.xhtml#Fn2_source) [3](#492478_1_En_5_Chapter.xhtml#Fn3_source)\
    \ [4](#492478_1_En_5_Chapter.xhtml#Fn4_source) [5](#492478_1_En_5_Chapter.xhtml#Fn5_source)\
    \ [6](#492478_1_En_5_Chapter.xhtml#Fn6_source)\n\n# 6. The Constructor’s Guide\
    \ to Blockchains\n\nIn the last few chapters, we have studied some of the mathematical\
    \ concepts of cryptography which are pertinent to blockchains and cryptocurrencies.\
    \ Now that we have all of this arcane theory in our heads, we are now ready to\
    \ move to the heart of the matter, the construction of blockchain and cryptocurrency\
    \ applications.\n\nIn this chapter and the chapters that follow, we will examine\
    \ the components which are required to build blockchain applications. Components\
    \ such as blockchains, Merkle trees, peer-to-peer networks, transactions, mining,\
    \ and so forth. As we proceed, I will be building a cryptocurrency called Helium\
    \ from scratch in Python. The chapters that follow will typically be paired. The\
    \ first chapter will expose the theory of the particular component under examination.\
    \ The following chapter will develop the Python code that implements this component.\
    \ The entire code pertaining to this component will also be presented in an appendix\
    \ of this book. If you are primarily interested in the underlying theory, you\
    \ can safely ignore the code implementation chapters.\n\nSince this is a book\
    \ about learning blockchain concepts, I use the simplest possible Python code;\
    \ lucidity is favored over brevity or *Rubyesque* magic. If you are an experienced\
    \ Python developer, you may find the code non-idiomatic and verbose. This is deliberately\
    \ so by intention, in order to keep the barrier to this book at the lowest level\
    \ possible. Secondly, I have tried to annotate the code with extensive inline\
    \ comments, even at the risk of being redundant and explaining the obvious. Our\
    \ friend is the KISS principle (keep it simple, stupid). It has frequently been\
    \ observed that nature favors simplicity over complexity.^([23](#fn23)) As a software\
    \ developer, I have had very bad experiences reading the code written by other\
    \ programmers, so I want to spare you the anguish and pain of such an experience.\n\
    \nAlright, let us start.\n\n## Why Write a Cryptocurrency in Python?\n\nA cryptocurrency\
    \ can be developed using a variety of languages. For Helium, I considered C++,\
    \ Go, and Python. The main advantage of coding Helium in C++ would be that C++\
    \ has exceptional runtime performance and can produce very high-quality production\
    \ code. Equally important, we can use C++ class constructs, data encapsulation,\
    \ polymorphism, and other object-oriented design principles to develop Helium\
    \ in a modular way. I discarded C++ as a candidate, primarily because this is\
    \ a book about learning and implementing concepts, and C++ would have restricted\
    \ readership. C++ is a complex language, and developing Helium in C++ would have\
    \ required a readership that is very proficient in the language.\n\nI like Go\
    \ a lot.^([24](#fn24)) Go has been developed by programmers who were closely associated\
    \ with the C language. Go is simple and easy to learn. The influence of the C\
    \ programming language is manifestly evident in Go. In essence, Go is C for the\
    \ Web. Go is a very minimalist language; it eschews complexity and follows the\
    \ C metaprogramming principle that there should be only one way to do a particular\
    \ thing. Go has many very cool features. It is a strictly typed, compiled language\
    \ and is thus very fast. Like C, Go has a full-featured and high-quality standard\
    \ library.^([25](#fn25)) It has an implementation of concurrency which is hands\
    \ down better than that in any other language, excepting C++. The characterization\
    \ of Go as a systems language for infrastructure applications is a *canard*. Go\
    \ is, in fact, a general programming language, much like C++ and Python. Go is\
    \ not an object-oriented language, and in lieu thereof it offers structs and interfaces.\
    \ I eliminated Go as the development language for Helium on the basis that very\
    \ few developers are acquainted with this language, and thus, its usage in this\
    \ book would restrict readership.\n\nWhen a programming language pole vaults into\
    \ the rare stratosphere of the four most popular languages,^([26](#fn26)) joining\
    \ heavyweights such as C++, Java, and C, you just know that it has something going\
    \ for it. Python is a powerful and expressive interpreted language that is simple\
    \ to learn. Python has a huge library of software packages and is thus used in\
    \ a large spectrum of cutting-edge areas, such as machine learning, neural networks,\
    \ finance, virtual reality, genomics, and so forth. Python is a favorite language\
    \ of scientists and academics who are not programmers. We will develop Helium\
    \ in Python. Note that once you understand the architecture and algorithms typically\
    \ used in blockchain applications, you can develop your application in C++, Go,\
    \ or any other language for that matter. You can, of course, re-code Helium in\
    \ your preferred language.\n\nOne final note is in order; my endeavor is to make\
    \ the Helium code largely self-contained, and therefore, I will shun the extensive\
    \ use of Python libraries.\n\n## The Computer Is the Blockchain\n\nIn 1995 or\
    \ thereabouts, John Gage opined that *the network is the computer.* Gage’s hypothesis\
    \ was that, sometime in the future, desktop operating systems such as Windows\
    \ and desktop applications would be replaced by applications running on wide area\
    \ networks. It was a remarkable observation considering that it was made in 1996\
    \ when the Internet was still in a nascent stage. If blockchain technology fulfills\
    \ its promise of being a foundation stone for Internet applications, we will be\
    \ able to truthfully assert that *the computer is the blockchain*. So what exactly\
    \ is a blockchain?"
  raw: '### Generating Globally Unique IDs


    In a blockchain application, we typically need universally unique values that
    identify blocks and transactions. One way to generate these global IDs is to generate
    a public-private key pair and then get the SHA-256 hash of the private or public
    key. The resultant 256-bit message digest is globally unique.^([^(22)](#fn22))
    This means that it is computationally infeasible to generate some other public-private
    key pair that will generate the same message digest. Similarly, we can apply the
    RIPEMD-160 cryptographic hash function to a public or private key. The resultant
    160-bit message hash is also a globally unique id.


    ## Conclusion


    Public key cryptography or asymmetric key encryption is a very important foundational
    tool of blockchain and cryptocurrency applications. In this chapter, we have delved
    into public key cryptography and, in particular, public-private key pairs and
    digital signature algorithms. We have also looked at the derivation of the RSA
    algorithm, which is the most popular algorithm for generating public-private key
    pairs. In addition, we have described a public key infrastructure which can be
    used to associate identities with these key pairs.


    This constitutes the end of our dive into cryptography, and in the next chapter,
    we will proceed to the main corpus of this book, blockchain and cryptocurrency
    applications.


    Footnotes [1](#492478_1_En_5_Chapter.xhtml#Fn1_source)   [2](#492478_1_En_5_Chapter.xhtml#Fn2_source)
      [3](#492478_1_En_5_Chapter.xhtml#Fn3_source)   [4](#492478_1_En_5_Chapter.xhtml#Fn4_source)
      [5](#492478_1_En_5_Chapter.xhtml#Fn5_source)   [6](#492478_1_En_5_Chapter.xhtml#Fn6_source)


    # 6. The Constructor’s Guide to Blockchains


    In the last few chapters, we have studied some of the mathematical concepts of
    cryptography which are pertinent to blockchains and cryptocurrencies. Now that
    we have all of this arcane theory in our heads, we are now ready to move to the
    heart of the matter, the construction of blockchain and cryptocurrency applications.


    In this chapter and the chapters that follow, we will examine the components which
    are required to build blockchain applications. Components such as blockchains,
    Merkle trees, peer-to-peer networks, transactions, mining, and so forth. As we
    proceed, I will be building a cryptocurrency called Helium from scratch in Python.
    The chapters that follow will typically be paired. The first chapter will expose
    the theory of the particular component under examination. The following chapter
    will develop the Python code that implements this component. The entire code pertaining
    to this component will also be presented in an appendix of this book. If you are
    primarily interested in the underlying theory, you can safely ignore the code
    implementation chapters.


    Since this is a book about learning blockchain concepts, I use the simplest possible
    Python code; lucidity is favored over brevity or *Rubyesque* magic. If you are
    an experienced Python developer, you may find the code non-idiomatic and verbose.
    This is deliberately so by intention, in order to keep the barrier to this book
    at the lowest level possible. Secondly, I have tried to annotate the code with
    extensive inline comments, even at the risk of being redundant and explaining
    the obvious. Our friend is the KISS principle (keep it simple, stupid). It has
    frequently been observed that nature favors simplicity over complexity.^([^(23)](#fn23))
    As a software developer, I have had very bad experiences reading the code written
    by other programmers, so I want to spare you the anguish and pain of such an experience.


    Alright, let us start.


    ## Why Write a Cryptocurrency in Python?


    A cryptocurrency can be developed using a variety of languages. For Helium, I
    considered C++, Go, and Python. The main advantage of coding Helium in C++ would
    be that C++ has exceptional runtime performance and can produce very high-quality
    production code. Equally important, we can use C++ class constructs, data encapsulation,
    polymorphism, and other object-oriented design principles to develop Helium in
    a modular way. I discarded C++ as a candidate, primarily because this is a book
    about learning and implementing concepts, and C++ would have restricted readership.
    C++ is a complex language, and developing Helium in C++ would have required a
    readership that is very proficient in the language.


    I like Go a lot.^([^(24)](#fn24)) Go has been developed by programmers who were
    closely associated with the C language. Go is simple and easy to learn. The influence
    of the C programming language is manifestly evident in Go. In essence, Go is C
    for the Web. Go is a very minimalist language; it eschews complexity and follows
    the C metaprogramming principle that there should be only one way to do a particular
    thing. Go has many very cool features. It is a strictly typed, compiled language
    and is thus very fast. Like C, Go has a full-featured and high-quality standard
    library.^([^(25)](#fn25)) It has an implementation of concurrency which is hands
    down better than that in any other language, excepting C++. The characterization
    of Go as a systems language for infrastructure applications is a *canard*. Go
    is, in fact, a general programming language, much like C++ and Python. Go is not
    an object-oriented language, and in lieu thereof it offers structs and interfaces.
    I eliminated Go as the development language for Helium on the basis that very
    few developers are acquainted with this language, and thus, its usage in this
    book would restrict readership.


    When a programming language pole vaults into the rare stratosphere of the four
    most popular languages,^([^(26)](#fn26)) joining heavyweights such as C++, Java,
    and C, you just know that it has something going for it. Python is a powerful
    and expressive interpreted language that is simple to learn. Python has a huge
    library of software packages and is thus used in a large spectrum of cutting-edge
    areas, such as machine learning, neural networks, finance, virtual reality, genomics,
    and so forth. Python is a favorite language of scientists and academics who are
    not programmers. We will develop Helium in Python. Note that once you understand
    the architecture and algorithms typically used in blockchain applications, you
    can develop your application in C++, Go, or any other language for that matter.
    You can, of course, re-code Helium in your preferred language.


    One final note is in order; my endeavor is to make the Helium code largely self-contained,
    and therefore, I will shun the extensive use of Python libraries.


    ## The Computer Is the Blockchain


    In 1995 or thereabouts, John Gage opined that *the network is the computer.* Gage’s
    hypothesis was that, sometime in the future, desktop operating systems such as
    Windows and desktop applications would be replaced by applications running on
    wide area networks. It was a remarkable observation considering that it was made
    in 1996 when the Internet was still in a nascent stage. If blockchain technology
    fulfills its promise of being a foundation stone for Internet applications, we
    will be able to truthfully assert that *the computer is the blockchain*. So what
    exactly is a blockchain?'
  trans: "\n### 生成全局唯一标识符\n\n在区块链应用中，我们通常需要能够标识区块和交易的全局唯一值。生成这些全局 ID 的一种方法是生成一对公私钥，然后获取私钥或公钥的\
    \ SHA-256 哈希值。生成的 256 位消息摘要具有全局唯一性。^(22) 这意味着在计算上不可能生成另一对公私钥来产生相同的消息摘要。类似地，我们可以对公钥或私钥应用\
    \ RIPEMD-160 加密哈希函数。生成的 160 位消息哈希同样是一个全局唯一 ID。\n\n## 结论\n\n公钥密码学（或称非对称密钥加密）是区块链和加密货币应用非常重要的基础工具。在本章中，我们深入探讨了公钥密码学，特别是公私钥对和数字签名算法。我们还研究了\
    \ RSA 算法的推导过程，这是生成公私钥对最流行的算法。此外，我们描述了一种公钥基础设施，可用于将身份与这些密钥对关联起来。\n\n至此，我们结束了密码学领域的探讨，在下一章中，我们将进入本书的核心内容：区块链与加密货币应用。\n\
    \n脚注  \n1 2 3 4 5 6\n\n# 6. 区块链构建者指南\n\n在之前的几章中，我们学习了与区块链和加密货币相关的部分密码学数学概念。既然我们已经掌握了这些深奥的理论，现在就可以进入核心问题了：构建区块链与加密货币应用。\n\
    \n在本章及后续章节中，我们将研究构建区块链应用所需的组件。例如区块链、默克尔树、点对点网络、交易、挖矿等组件。随着学习的深入，我将用 Python 从零开始构建一个名为\
    \ Helium 的加密货币。后续章节通常成对出现：第一章介绍所研究组件的理论，第二章则开发实现该组件的 Python 代码。与组件相关的全部代码也将收录在本书的附录中。如果你主要对底层理论感兴趣，可以放心跳过代码实现章节。\n\
    \n由于这是一本学习区块链概念的书，我使用了尽可能简单的 Python 代码；清晰性胜过简洁性或*Rubyesque*式的魔法。如果你是一位经验丰富的 Python\
    \ 开发者，可能会觉得代码不够地道且冗长。这是有意为之，目的是将本书的阅读门槛降到最低。其次，我尝试在代码中添加了大量内联注释，即使冒着冗余和解释显而易见之事的风险。我们的朋友是\
    \ KISS 原则（保持简单与直接）。人们经常观察到，自然倾向于简单而非复杂。^(23) 作为一名软件开发人员，我阅读其他程序员编写的代码时有过非常糟糕的经历，因此我希望你能免于这种痛苦和煎熬。\n\
    \n好了，让我们开始吧。\n\n## 为什么用 Python 编写加密货币？\n\n加密货币可以使用多种语言开发。对于 Helium，我考虑过 C++、Go\
    \ 和 Python。用 C++编写 Helium 的主要优势在于，C++具有卓越的运行时性能，并能生成非常高质量的生产代码。同样重要的是，我们可以使用 C++的类构造、数据封装、多态性及其他面向对象设计原则来模块化地开发\
    \ Helium。我排除了 C++，主要是因为这是一本关于学习和实现概念的书，而 C++会限制读者群。C++是一种复杂的语言，用 C++开发 Helium\
    \ 需要读者对该语言非常精通。\n\n我非常喜欢 Go 语言。^(24) Go 是由与 C 语言密切相关的程序员开发的。Go 简单易学。C 编程语言的影响在\
    \ Go 中显而易见。本质上，Go 是面向 Web 的 C 语言。Go 是一种极简主义语言；它摒弃复杂性，遵循 C 语言的元编程原则：做特定事情只有一种方法。Go\
    \ 有许多非常酷的特性。它是一门严格类型化的编译型语言，因此速度很快。与 C 一样，Go 拥有功能丰富且高质量的的标准库。^(25) 它的并发实现，除 C++外，比任何其他语言都要出色。将\
    \ Go 描述为基础设施应用的系统语言是一种*谬误*。事实上，Go 是一种通用编程语言，很像 C++和 Python。Go 不是面向对象的语言，取而代之的是提供了结构体和接口。我排除了\
    \ Go 作为 Helium 的开发语言，原因是很少有开发者熟悉这门语言，因此在本书中使用它会限制读者群。\n\n当一种编程语言跃入四大最流行语言的稀薄平流层时，^(26)\
    \ 与 C++、Java 和 C 这类重量级语言并肩，你就知道它必有过人之处。Python 是一种功能强大且富有表现力的解释型语言，易于学习。Python\
    \ 拥有庞大的软件包库，因此被广泛应用于前沿领域，如机器学习、神经网络、金融、虚拟现实、基因组学等。Python 是科学家和非程序员出身的学者的最爱。我们将用\
    \ Python 开发 Helium。请注意，一旦你理解了区块链应用中常用的架构和算法，你就可以用 C++、Go 或任何其他语言开发自己的应用。当然，你也可以用自己偏好的语言重新编写\
    \ Helium。\n\n最后需要说明一点：我努力让 Helium 的代码尽量自包含，因此会避免大量使用 Python 库。\n\n## 计算机即区块链\n\
    \n大约在 1995 年，约翰·盖奇提出了*网络即计算机*的观点。盖奇的假设是，未来的某一天，Windows 等桌面操作系统和桌面应用将被运行在广域网上的应用所取代。考虑到这是在\
    \ 1996 年互联网仍处于萌芽阶段时提出的，这是一个非凡的观察。如果区块链技术能够实现其作为互联网应用基石的承诺，我们将能够真实地断言*计算机即区块链*。那么，区块链到底是什么？\n"
- fmt: '# Understanding Blockchains


    A blockchain is an ordered, immutable, and tamper-resistant collection of blocks
    of data where each block, except for the first, is related to its predecessor
    block using cryptographic techniques.^([^(27)](#fn27)) Take a look at Figure [6-1](#492478_1_En_6_Chapter.xhtml#Fig1).


    ![../images/492478_1_En_6_Chapter/492478_1_En_6_Fig1_HTML.jpg](images/492478_1_En_6_Chapter/492478_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** — A Blockchain


    Each block contains data which is specific to the domain of the blockchain application.
    Furthermore, each block is immutable once it is created. Each block is also tamper-proof;
    its data cannot be changed by a malicious interloper. Aside from the first block,
    each block is related to its previous block through a cryptographic relation.
    The blocks are ordered, meaning that they follow each other in a fixed, linear
    order. This ordered, immutable collection of blocks with cryptographic relations
    is called a blockchain.^([^(28)](#fn28))


    As more blocks are created, they are added to the head (right side) of the blockchain.
    In a canonical blockchain application, the blockchain keeps on increasing in size
    as more blocks are added on the right side. For example, the Bitcoin blockchain
    is over 250 GB and growing.


    Canonical blockchain applications maintain a distributed blockchain. This means
    that there are entities on the Internet which have a copy of the blockchain. These
    copies need not be identical with each other, in which case it is the responsibility
    of each entity to synchronize its copy of the blockchain. This synchronization
    requires a distributed consensus mechanism that resolves the differences between
    these copies. Take note that this synchronization does not require any centralized
    entity. Distributed consensus algorithms are a very important part of blockchain
    applications, and we will be examining distributed consensus closely in later
    chapters. Since the blockchain is distributed, a blockchain is sometimes described
    as a distributed ledger.


    Distributed consensus has important implications. There is no need for a central
    authority to maintain the integrity of the blockchain. This means that a blockchain
    is permission-less and open to the world at large. Distributed consensus solves
    one of the major hurdles in the creation of a distributed currency, the double-spend
    problem. This problem refers to a scenario where a person who owns a certain quantum
    of a cryptocurrency attempts to spend it twice. In centralized fiat money systems,
    it is trivial to prevent double-spending. However, it is a major hurdle when we
    are creating a distributed cryptocurrency. The foregoing discussion will become
    crystal clear when we get into the mechanics of actually creating a cryptocurrency.


    In canonical blockchain applications such as Bitcoin, time is not an important
    variable. Transactions are not ordered by time, and there is no central timekeeper
    or any need to synchronize the times of blockchain entities. Transactions can
    occur in any order, and the distributed consensus algorithm will sort everything
    out. This is a very powerful idea. By way of contrast, in a fiat money banking
    system, time is very important and transaction validity is typically tied to which
    transaction occurred first.


    Blockchains are typically meant to survive over time, so they are usually persisted
    to a hard disk or some other media. Lastly, in the typical blockchain application,
    members of the public are allowed to examine the blockchain, but this need not
    necessarily be so.


    ## The Genesis Block


    The very first block of a blockchain is called the genesis block. It is typically
    initiated by the application to bootstrap the blockchain. For example, in a cryptocurrency
    application, the genesis block will typically include an initial distribution
    of the currency.


    ## The Blockchain Database


    You may be inclined to conclude that a blockchain should be implemented using
    a database such as `PostgreSQL`, `Cassandra`, or `Redis`. This is a bad practice.
    A blockchain application should keep its implementation at the simplest and most
    transparent level that is possible, especially since cryptocurrency applications
    involve money. A database implementation introduces too much complexity. What
    do we do if the data in the database is corrupted or the database crashes?


    The canonical blockchain application simply persists the blocks in a blockchain
    as a simple text or binary files. The underlying operating system is used to write
    blocks to disk. A block is a write once read many times file.


    This does not mean that a blockchain application does not use databases. For example,
    Bitcoin uses `LevelDB` databases to index the blocks and maintain unspent amounts.
    In a blockchain application, these databases always play a role ancillary to the
    blockchain, and the data in these databases can always be built from scratch from
    the blockchain.


    ## Hash Pointers Are the Secret Ingredient


    We will now examine how the blocks in a blockchain are associated through cryptographic
    relations. Each block in a blockchain, aside from the genesis block, looks something
    like Figure [6-2](#492478_1_En_6_Chapter.xhtml#Fig2).


    ![../images/492478_1_En_6_Chapter/492478_1_En_6_Fig2_HTML.jpg](images/492478_1_En_6_Chapter/492478_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2** — A Block in a Blockchain


    A block consists of some application-specific data and a structure called a hash
    pointer. A hash pointer can be visualized as shown in Figure [6-3](#492478_1_En_6_Chapter.xhtml#Fig3).


    ![../images/492478_1_En_6_Chapter/492478_1_En_6_Fig3_HTML.jpg](images/492478_1_En_6_Chapter/492478_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3** — Hash Pointer Structure


    A hash pointer is a data structure that:


    * Points to the location of the previous block

    * Contains the message digest of the previous block’s data and hash pointer


    The pointer to the location of the previous block is the address of the previous
    block. For example, this pointer can be a path to a block file, a location in
    memory, or an index into a list. The pointer depends upon how the blocks are represented.
    Since the genesis block does not have a previous block, we simply set its hash
    pointer to `null`.


    For the message digest computation, we can use `SHA-256`.


    Thus, given a hash pointer, we can retrieve the data and message digest of the
    previous block. This permits us to verify that the data in the previous block
    has not been tampered with.


    We can now represent a blockchain with hash pointers as shown in Figure [6-4](#492478_1_En_6_Chapter.xhtml#Fig4).


    ![../images/492478_1_En_6_Chapter/492478_1_En_6_Fig4_HTML.jpg](images/492478_1_En_6_Chapter/492478_1_En_6_Fig4_HTML.jpg)


    **Figure 6-4** — Blockchain Structure'
  raw: '### Understanding Blockchains


    A blockchain is an ordered, immutable, and tamper-resistant collection of blocks
    of data where each block, except for the first, is related to its predecessor
    block using cryptographic techniques.^([^(27)](#fn27)) Take a look at Figure [6-1](#492478_1_En_6_Chapter.xhtml#Fig1).


    ![../images/492478_1_En_6_Chapter/492478_1_En_6_Fig1_HTML.jpg](images/492478_1_En_6_Chapter/492478_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    A Blockchain


    Each block contains data which is specific to the domain of the blockchain application.
    Furthermore, each block is immutable once it is created. Each block is also tamper-proof;
    its data cannot be changed by a malicious interloper. Aside from the first block,
    each block is related to its previous block through a cryptographic relation.
    The blocks are ordered, meaning that they follow each other in a fixed, linear
    order. This ordered, immutable collection of blocks with cryptographic relations
    is called a blockchain.^([^(28)](#fn28))


    As more blocks are created, they are added to the head (right side) of the blockchain.
    In a canonical blockchain application, the blockchain keeps on increasing in size
    as more blocks are added on the right side. For example, the Bitcoin blockchain
    is over 250 GB and growing.


    Canonical blockchain applications maintain a distributed blockchain. This means
    that there are entities on the Internet which have a copy of the blockchain. These
    copies need not be identical with each other, in which case it is the responsibility
    of each entity to synchronize its copy of the blockchain. This synchronization
    requires a distributed consensus mechanism that resolves the differences between
    these copies. Take note that this synchronization does not require any centralized
    entity. Distributed consensus algorithms are a very important part of blockchain
    applications, and we will be examining distributed consensus closely in later
    chapters. Since the blockchain is distributed, a blockchain is sometimes described
    as a distributed ledger.


    Distributed consensus has important implications. There is no need for a central
    authority to maintain the integrity of the blockchain. This means that a blockchain
    is permission-less and open to the world at large. Distributed consensus solves
    one of the major hurdles in the creation of a distributed currency, the double-spend
    problem. This problem refers to a scenario where a person who owns a certain quantum
    of a cryptocurrency attempts to spend it twice. In centralized fiat money systems,
    it is trivial to prevent double-spending. However, it is a major hurdle when we
    are creating a distributed cryptocurrency. The foregoing discussion will become
    crystal clear when we get into the mechanics of actually creating a cryptocurrency.


    In canonical blockchain applications such as Bitcoin, time is not an important
    variable. Transactions are not ordered by time, and there is no central timekeeper
    or any need to synchronize the times of blockchain entities. Transactions can
    occur in any order, and the distributed consensus algorithm will sort everything
    out. This is a very powerful idea. By way of contrast, in a fiat money banking
    system, time is very important and transaction validity is typically tied to which
    transaction occurred first.


    Blockchains are typically meant to survive over time, so they are usually persisted
    to a hard disk or some other media. Lastly, in the typical blockchain application,
    members of the public are allowed to examine the blockchain, but this need not
    necessarily be so.


    ### The Genesis Block


    The very first block of a blockchain is called the genesis block. It is typically
    initiated by the application to bootstrap the blockchain. For example, in a cryptocurrency
    application, the genesis block will typically include an initial distribution
    of the currency.


