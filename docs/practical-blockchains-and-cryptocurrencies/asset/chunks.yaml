- fmt: '# Design of Symmetric Encryption Algorithms


    As we have seen, an encryption algorithm takes plaintext and a secret key as inputs
    and produces a ciphertext as its output. The encryption algorithm must be independent
    of both the plaintext and the secret key. Typically, an encryption algorithm consists
    of a finite number of rounds where each round is a finite sequence of substitution
    and transposition operations. A substitution operation substitutes some other
    character for an input character in the text, and a transposition operation rearranges
    or permutes a portion of the input text. Each round of the encryption algorithm
    garbles the plaintext to some extent, and this garbled output becomes the input
    for the next round of the encryption algorithm. In order to recover the plaintext
    from the ciphertext, the operations of the encryption algorithm must be reversible.
    Therefore, the decryption algorithm simply executes the rounds and operations
    of the encryption algorithm in reverse. The Caesar cipher that we discussed previously
    is a simple substitution cipher, and there are no transposition operations.


    Symmetric encryption algorithms come in two flavors. Block ciphers partition the
    plaintext into blocks of fixed length and encrypt the plaintext one block at a
    time. Stream ciphers encrypt plaintext one byte at a time and are meant to encrypt
    data streaming over a network.


    Devising a strong symmetric encryption algorithm that can withstand cryptanalysis
    is a non-trivial endeavor.^([⁷](#fn7)) There are two main ways to attack an encryption
    algorithm and thus obtain the ability to decipher messages encoded by the algorithm.
    The first technique relies on a brute-force attack on the algorithm. This technique
    tries all possible secret keys until we obtain intelligible plaintext. The technique
    is not feasible if the keyspace is very large. Table [3-1](#492478_1_En_3_Chapter.xhtml#Tab1)
    shows the relationship between the size of the encryption key and the time required
    to decrypt a message with a brute-force attack.


    **Table 3-1** The Relationship Between Key Size and Decryption Time


    | Key Size | Number of Keys in Keyspace | Average Time to Recover Plaintext (10^(16)
    Decryptions per Second) |

    | --- | --- | --- |

    | 8 bits | 256 | < 1 second |

    | 64 bits | 2^(64) | 0.25 hours |

    | 128 bits | 2^(128) | 53.9*10^(12) years |

    | 256 bits | 2^(256) | 18.3*10^(51) years |


    This table shows that larger keys offer greater protection against brute-force
    attacks than smaller keys.


    The second avenue of attack relies upon the statistical analysis of the ciphertext.
    In the English language, certain letters of the alphabet appear with greater frequency
    than other letters and certain words appear with greater frequency than other
    words. For example, in a paragraph of text, the word `the` will ordinarily appear
    with greater frequency than the word `aardvark`. Similarly, certain two-letter
    combinations (digraphs) appear with greater frequency than other combinations;
    and certain three-letter combinations (trigraphs) appear with greater frequency
    than other combinations. Table [3-2](#492478_1_En_3_Chapter.xhtml#Tab2) taken
    from an analysis of 40,000 words categorizes the frequency with which letters
    appear in a large sample of text.^([⁸](#fn8))


    **Table 3-2** Frequency Distribution of English Characters


    | a | 8.12 | b | 1.49 | c | 2.71 | d | 4.32 |

    | e | 12.02 | f | 2.30 | g | 2.03 | h | 5.92 |

    | i | 7.31 | j | 0.10 | k | 0.69 | l | 3.98 |

    | m | 2.61 | n | 6.95 | o | 7.68 | p | 1.82 |

    | q | 0.11 | r | 6.02 | s | 6.28 | t | 9.10 |

    | u | 2.88 | v | 1.11 | w | 2.09 | x | 9.17 |

    | y | 2.11 | z | 0.07 |   |   |   |   |


    An analysis of 40,000 words from the English language also indicates the frequency
    distribution of the 12 most common digraphs, as shown in Table [3-3](#492478_1_En_3_Chapter.xhtml#Tab3).^([⁹](#fn9))


    **Table 3-3** Frequency Distribution of the 12 Most Common Digraphs


    | th | 1.52 | he | 1.28 | in | 0.94 | er | 0.94 |

    | an | 0.82 | re | 0.68 | nd | 0.63 | at | 0.59 |

    | on | 0.57 | nt | 0.56 | ha | 0.56 | es | 0.56 |


    Cryptanalysis takes advantage of these structural language characteristics to
    decipher ciphertext. This analysis shows that a good encryption algorithm implements
    several substitution and transposition steps that alter or mask these language
    characteristics. In the ideal encryption algorithm, all digraphs, trigraphs, and
    n-word combinations should have an equal probability of appearing in the ciphertext.
    Other cryptanalysis techniques take advantage of word order and the rules of grammar.


    Another desirable property of an encryption algorithm is that a small change in
    the plaintext should cause a large change in the ciphertext; this is called an
    avalanche effect. The avalanche effect thwarts differential cryptanalysis which
    attempts to decode ciphertext by examining how different messages encrypted by
    the same algorithm differ from each other.


    Aside from cryptanalysis, language analysis is important in the field of natural
    language processing (NLP). NLP has important applications in the design of chatbots,
    spam filters, language translators, as well as sentiment analysis, behavior prediction,
    and classification.


    ## Advanced Encryption Standard


    The Advanced Encryption Standard (AES) is the US National Institute of Standards’
    recommended symmetric encryption algorithm. In 1997, NIST announced a competition
    to replace the aging Data Encryption Standard. Four years later in 2001, AES was
    chosen as the winner among several competing encryption designs. AES is widely
    used by governments and financial institutions across the world. It is a very
    fast encryptor. Due to its small size, AES finds usage in devices ranging from
    microcontrollers to supercomputers. AES processes plaintext blocks of 128 bits
    and supports encryption key lengths of 128, 192, and 256 bits. It uses 10 encryption
    rounds if the selected key is 128 bits long, 12 rounds if the key is 192 bits,
    and 14 rounds if the key is 256 bits.


    Table [3-4](#492478_1_En_3_Chapter.xhtml#Tab4) enumerates some of the prominent
    symmetric encryption algorithms as well as their characteristics.


    **Table 3-4** Symmetric Encryption Algorithms


    | Name | Introduced In | Block Size (Bits) | Key Length (Bits) | Rounds |

    | --- | --- | --- | --- | --- |

    | AES | 2001 | 128 | 128, 192, 256 | 10, 12, 14 |

    | Serpent^([^(10)](#fn10)) | 2001 | 128 | 128, 192, 256 | 32 |

    | RC2 | 1987 | 64 | 8–1024 | 18 |

    | Twofish^([^(11)](#fn11)) | 2001 | 128 | 128, 192, 256 | 18 |


    ## The Key Distribution Problem


    For a party to decipher a ciphertext, he or she must possess the secret key. The
    problem arises when a secret key has to be distributed to a large number of recipients.
    In such a case, there is a significant danger that an adverse party will be able
    to intercept and appropriate the key. Symmetric key encryption is not a suitable
    technique when an encryption key has to be distributed to a large number of users.
    The solution to this key distribution problem lies in a cryptographic technique
    called public key encryption, which we will examine in a subsequent chapter.'
