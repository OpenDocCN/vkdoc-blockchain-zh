- fmt: '# TRON


    TRON is a blockchain platform for decentralized applications; its primary use
    case is for the storage and distribution of censorship-resistant content in the
    digital entertainment space. Thus, it seeks to compete with centralized content
    providers such as Facebook, Netflix, image and audio repositories, blogging platforms,
    and so forth. TRON is quite an ambitious project.


    One of the unique features of TRON is its integration with the BitTorrent protocol
    for the incentivized storage and retrieval of content. Users who provide storage
    space to store files or portions thereof receive some `TRX` coins when users download
    files using TRON’s BitTorrent protocol.


    TRON’s architecture consists of three layers: a storage layer which is accessible
    through the BitTorrent protocol, a core layer which implements the TRON functionality
    including the TRON (`TRX`) cryptocurrency, and an application layer where distributed
    applications are implemented.^([⁶](#fn6))


    BitTorrent is a peer-to-peer file sharing protocol that is widely used to transfer
    files. A BitTorrent network consists of a collection of nodes sitting on top of
    a TCP/IP network, which each implements the BitTorrent file transfer protocol.
    This protocol enables a peer on the network to discover which peers have a file
    or a portion of it and then enables this peer to download the file from these
    peers. Though accurate estimates are not available, anecdotal evidence suggests
    that at any given time anywhere from 15 million to 30 million users are downloading
    files using BitTorrent.


    # Tether


    Tether (`USDT`) is a stablecoin. Stablecoins are designed to maintain a stable
    value with respect to a fiat currency, typically the US dollar. Tether ensures
    this stability by evidently maintaining a US dollar for each Tether in circulation.
    These dollar reserves are supposed to be under the control of the entity issuing
    the Tethers, in this case iFinex. iFinex which controls Tether is currently facing
    lawsuits pertaining to transparency, inadequate auditing of reserves, and market
    manipulation.


    # The Gross Anatomy of Cryptocurrencies


    The language used to implement a cryptocurrency has a direct bearing on its performance
    and maintainability. Let’s take a look at the implementation languages as well
    as the gross characteristics of some of the leading cryptocurrencies in Tables
    [2-1](#492478_1_En_2_Chapter.xhtml#Tab1) and [2-2](#492478_1_En_2_Chapter.xhtml#Tab2).


    Table 2-2


    Transactions per Minute


    | Cryptocurrency | TPS | Primary Use Case |

    | --- | --- | --- |

    | Bitcoin (`BTC`) | 3 | Store of value, hedge against US dollar |

    | Ethereum (`ETH`) | 8 | Smart contracts, distributed apps |

    | Ripple (`XRP`) | 1500 | Supplant SWIFT network |

    | Litecoin (`LTC`) | 26 | Store of value |

    | Bitcoin Cash (`BCH`) | 60 | More TPS than Bitcoin |

    | Monero (`XMR`) | 4 | Privacy of transactions |

    | TRON (`TRX`) | 2000 | Distributed digital media and games |

    | Basic Attention Token (`BAT`) | ? | Alternate model for advertising |

    | Binance Coin (`BNB`) | ? | Transaction fees on the Binance exchange |

    | Tether (`USDT`) |   | Convertibility into the US dollar |


    Table 2-1


    Implementation Details


    | Cryptocurrency | Language | Consensus Formation | Supply (Coins) |

    | --- | --- | --- | --- |

    | Bitcoin (`BTC`) | C++ | Proof of work | 21 million |

    | Ethereum (`ETH`) | C++, Go, Rust | Proof of stake | Not fixed |

    | Ripple (`XRP`) | C++ | Distributed proof of stake | Not fixed |

    | Litecoin (`LTC`) | C++ | Proof of work | 84 million |

    | Bitcoin Cash (`BCH`) | C++ | Proof of work | 21 million |

    | Monero (`XMR`) | C++ | Proof of work | 18.4 million |

    | TRON (`TRX`) | Java | Distributed proof of stake | 100 billion |

    | Basic Attention Token (`BAT`) | C++ | Delegated proof of stake | 1.5 billion
    |

