    ### Directory File Constraints


    A running Helium node will accumulate a large number of block files in its *data*
    directory. This raises the issue of the maximum number of files that can be written
    into a directory. This constraint depends upon the underlying operating system.
    In Linux with the *ext4* filesystem, there is no theoretical limit on the number
    of files that can be written to a directory. We can nevertheless elect to write
    blocks into a number of sub-directories using a sharding algorithm, such as the
    following:


    ```

    create n sub-directories of the data directory: 0, 1,2,3,...n-1

    for each block:

    compute the SHA-256 hash of the block.

    convert this hash into an integer: hash_num.

    compute the n-modulus of hash_num: hash_mod = hash_num%n

    write the block into directory hash_mod

