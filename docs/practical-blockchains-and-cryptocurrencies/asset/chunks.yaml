- fmt: '# Chainstate Maintenance


    In a typical cryptocurrency transaction, an entity spends previous transaction
    values that have been received and not spent. The `Chainstate` database keeps
    track of all of the spent and unspent values in the cryptocurrency ecosystem.
    Each such value is represented as a transaction fragment. At each point in time,
    the `Chainstate` provides a snapshot of the spent and unspent fragments in the
    system. You can refer to Chapter [12](#492478_1_En_12_Chapter.xhtml) to review
    the theory of the `Chainstate`.


    If a Helium node has the blockchain, it can always rebuild the `Chainstate` database.
    The following algorithm in pseudo-code accomplishes this:


    ```

    for each block:

    for each transaction in the block:

    let transaction id be trnid.

    let ctr = 0.

    for each vout element in the transaction:

    fragment_id = trnid + "_" + string(ctr)

    value = vout["value"]

    hash = RIPEMD160(SHA256(public_key))

    chainstate[fragment_id] = {"value": value,

    "spent": False,

    "tx_chain": "",

    "pkhash": hash

    }

    ctr += 1

    for each vin element in the transaction:

    fragment_id = vin["txid] + "_" + vin["vout_index"]

    chainstate[fragment_id] = {"value": value,

    "spent": True,

    "tx_chain": some_fragment,

    "pkhash": hash

    }

    ```


    The following program code rebuilds the `Chainstate` database from scratch from
    the collection of block files. You will notice that this code leverages the `hchaindb`
    module and, in particular, uses the `update_transaction()` function in this module
    to build the `Chainstate` database.


    In order to exercise this code, copy this code into the file `build_chainstate.py`
    and save it in the `unit_tests` directory. Then make a simulated blockchain with
    a height of 500 blocks in the `unit_tests` directory. Finally, delete the `Chainstate`
    database, `helium_db` in the `unit_tests/helium` sub-directory (`rm -rf heliumdb`),
    if it exists. The following command will rebuild the Chainstate:


    ```

    $(virtual) python build_chainstate.py

    ###########################################################################

    # build_chainstate: Builds the chainstate database from the blockchain files.

    ###########################################################################

    import hblockchain

    import hchaindb

    import pickle

    import os.path

    import pdb

    def startup():

    """

    start the chainstate database

    """

    # start the Chainstate Database

    ret = hchaindb.open_hchainstate("heliumdb")

    if ret == False:

    print("error: failed to start Chainstate database")

    return

    else: print("Chainstate Database running")

    def stop():

    """

    stop the chainstate database

    """

    hchaindb.close_hchainstate()

    def build_chainstate():

    ''''''

    build the Chainstate database from the blockchain files

    ''''''

    blockno  = 0

    tx_count = 0

    try:

    while True:

    # test whether the block file exists

    block_file = "block" + "_" + str(blockno) + ".dat"

    if os.path.isfile(block_file)== False: break

    # load the block file into a dictionary object

    f = open(block_file, ''rb'')

    block = pickle.load(f)

    # process the vout and vin arrays for each block transaction

    for trx in block["tx"]:

    ret = hchaindb.transaction_update(trx)

    tx_count += 1

    if ret == False:

    raise(ValueError("failed to rebuild chainstate. block no: " + \

    str(blockno)))

    blockno += 1

    except Exception as err:

    print(str(err))

    return False

    print("transactions processed: " + str(tx_count))

    print("blocks processed: " +  str(blockno))

    return True

    # start the chainstate build

    print("start build chainstate")

    startup()

    build_chainstate()

    print("chainstate rebuilt")

    stop()

    ```


    The `build_chainstate()` is available in Appendix 9.


    ## blk_index Maintenance


    In Chapter [12](#492478_1_En_12_Chapter.xhtml), we discussed the `blk_index` database.
    This is a key-value store that determines the block in which a particular transaction
    is located. The keys are the transaction IDs and the values are the block heights.


    Like the `Chainstate` database, the `blk_index` database can be rebuilt from the
    blockchain files.


    The following pseudo-code rebuilds `blk_index` from the blockchain:


    ```

    for block in blockchain:

    for transaction in block:

    blk_index[transaction[transactionid]] = block["height"]

    ```


    The following module, `build_blk_index`, rebuilds the `blk_index` store. Copy
    the following code into the `build_blk_index.py` file and save it in the `unit_tests`
    directory. Delete the `hblk_index` sub-directory, if it exists.


    We can now rebuild the `blk_index` database:


    ```

    $(virtual) python build_index.py

    #########################################################################

    # build_blk_index: rebuilds the blk_index database from the blockchain

    #########################################################################

    import blk_index

    import pickle

    import os.path

    import pdb

    def startup():

    """

    start/create the blk_index database

    """

    # start the blk_index Database

    ret = blk_index.open_blk_index("hblk_index")

    if ret == False:

    print("error: failed to start blk_index database")

    return

    else: print("blk_index Database running")

    return True

    def stop():

    """

    stop the blk_index database

    """

    blk_index.close_blk_index()

    def build_blk_index():

    ''''''

    build the blk_index database from the blockchain

    ''''''

    blockno = 0

    tx_count = 0

    try:

    while True :

    # test whether the block file exists

    block_file = "block" + "_" + str(blockno) + ".dat"

    if os.path.isfile(block_file)== False: break

    # load the block file into a dictionary object

    f = open(block_file, ''rb'')

    block = pickle.load(f)

    # process the transactions in the block

    for trx in block["tx"]:

    ret = blk_index.put_index(trx["transactionid"], blockno)

    tx_count += 1

    if ret == False:

    raise(ValueError("failed to rebuild blk_index. block no: " \

    + str(blockno)))

    blockno += 1

    except Exception as err:

    print(str(err))

    return False

    print("transactions processed: " + str(tx_count))

    print("blocks processed: " +  str(blockno))

    return True

    # start the build_index build

    print("start build blk_index")

    ret = startup()

    if ret == False:

    print("failed to open blk_index")

    os._exit(-1)

    build_blk_index()

    print("blk_index rebuilt")

    stop()

    ```


    ## Conclusion


    In this chapter, we have considered some of important maintenance aspects of Helium.
    These have included obtaining a blockchain for a new node and synchronizing the
    blockchain held by a node if a node goes down or if there is a temporary network
    partition. We have also exposed code to rebuild the `Chainstate` database and
    the `blk_index` database from the blockchain files.


    In the next chapter, we will develop a user wallet for Helium.


    Footnotes [1](#492478_1_En_16_Chapter.xhtml#Fn1_source)


    # 17. Helium Wallet Construction


    ## Introduction


    In this chapter, we will examine the construction of Helium wallets. In particular,
    we discuss the following topics:


    1.  What is a wallet

    2.  The Helium wallet interface

    3.  Helium wallet program code

    4.  Helium wallet Pytest code


    The Bitcoin reference wallet implementation relies upon access to the complete
    Bitcoin blockchain. Similarly, any Helium node that has the complete Helium blockchain
    or has access to this blockchain can create and maintain a wallet.


    This chapter creates a basic command-line Helium wallet that implements core functionality.
    Once we have an implementation of core functionality, we can embellish our wallet
    with additional capabilities. For example, we can wrap a GUI around our command-line
    wallet.


    ## What Is a Wallet


    A Helium wallet is an object that performs the following functions:


    1.  Creates and maintains private-public key pairs

    2.  Records the heliums received by the wallet holder

    3.  Records the heliums transferred to other entities

    4.  Records the final helium balance of the wallet holder (as of the time of the
    query)

    5.  Creates transactions and propagates them on the Helium network

    6.  Saves wallet data to files'
