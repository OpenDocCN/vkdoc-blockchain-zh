    then encrypts a message with this public key and delivers the ciphertext to Alice.
    Alice then decrypts the ciphertext with her private key.


    Alice knows that the message has been encrypted by a person who has the public
    key, but typically Alice will not know the identity of the person who actually
    encrypted this message (unless Alice knows with certainty that only Smith has
    the public key). The determination of this identity issue requires a public key
    infrastructure (PKI). We will discuss public key infrastructures shortly.


    The other scenario is when Alice encrypts a message with her private key. Such
    a message can be decrypted by any person who holds the corresponding public key.
    The essential feature here is that the recipient of the message can conclude that
    the message was generated by the entity holding the private key. Furthermore,
    Alice cannot repudiate the assertion that the message was generated with the private
    key held by her. Note that in the absence of exogenous information, the recipient
    cannot associate the private key with Alice. One way of establishing such associations
    is through the use of certificate authorities (PKI).


    Alice and Smith can engage in secure bidirectional communications if each party
