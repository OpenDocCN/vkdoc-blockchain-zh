  raw: '## Data Propagation on a P2P Network


    In the Bitcoin and Helium networks, transactions and newly mined blocks propagate
    throughout the network by a process called flooding. Each node on the network
    listens on a specific port for transactions occurring on the network and for new
    blocks that have been mined. When a node receives a new transaction or a new block,
    it processes the new block or transaction and may also transmit it to other nodes
    in its address list. Figure [15-4](#492478_1_En_15_Chapter.xhtml#Fig4) shows a
    transaction being propagated on a network.


    ![../images/492478_1_En_15_Chapter/492478_1_En_15_Fig4_HTML.jpg](images/492478_1_En_15_Chapter/492478_1_En_15_Fig4_HTML.jpg)


    Figure 15-4


    *Transaction Propagation on a P2P Network*


    This diagram shows a transaction, represented by four stacked disks, being propagated
    from node D. Node D consults its address list and delivers the transaction to
    nodes A and C. Node C consults its address list and delivers the transaction to
    nodes E and F. The propagation continues as indicated by the arrows in the diagram.


    This flooding process permits transactions and new blocks to rapidly propagate
    through the network. Of course, and as we discussed in the last chapter, nodes
    validate blocks and transactions before forwarding a transaction or a newly mined
    block to a neighbor.


    You may be concerned that transactions and blocks will propagate endlessly on
    the network. There are two ways to ensure that this does not occur. The conventional
    way is to include a time-to-live (TTL) parameter with each transaction or block.
    Consider, for example, a fresh transaction. The metadata for this transaction
    will have a time-to-live (TTL) counter, with a value of 256, for example. When
    a node receives this transaction, it decrements the TTL and then re-broadcasts
    the transaction. If a node receives a transaction with a TTL of 0, it simply discards
    the transaction.


    The second approach is the manner in which Bitcoin and Helium handle transaction
    routing. A Bitcoin node discards the incoming transaction if (i) the node has
    this transaction in its cache of transactions waiting to be processed (the *mempool*),
    (ii) if the transaction is already in the blockchain, or if (iii) the transaction
    is invalid. Otherwise, the node re-broadcasts the transaction to the nodes in
    its address list.


    Note that the transaction propagation mechanism also provides each node receiving
    a transaction with the address of the node propagating the transaction. The receiving
    node can add this address to its address list. This feature enables receiving
    nodes to expand their view of the network by adding previously unknown addresses
    to their address lists.


    Due to the flooding algorithm, each node will typically have a different set of
    transactions that it is processing, and in particular, a node may not receive
    some transactions being propagated across the network. A node may completely cease
    receiving transactions if there is a temporary network partition or if the node
    goes down.


    Note that nodes may receive transactions in an order different than the time at
    which they were created.


    ## Concurrent Mining


    As indicated in the last chapter, some of the functions in the mining module are
    meant to operate concurrently with RPC servers. In order to facilitate this, add
    the *async* keyword to the following two functions in the *hmining* module, *make_candidate_block*
    and *mine_block*, for example:


    ```

    async def mine_block(candidate_block: ''dictionary'')

    async def make_candidate_block()

    ```


    With this simple change, these two functions become capable of concurrent operation.


    The *start_mining* function is a concurrent thread that starts the mining of blocks.
    Add the following block of code to the end of the *hmining* module:


    ```

    #####################################

    # start mining in a thread:

    # $(virtual) python hmining.py

    #####################################

    if __name__ == "__main__":

    #Create the Threads

    t1 = threading.Thread(target=start_mining, args=(), daemon=True)

    t1.start()

    t1.join()

    ```


    Starting this module from the command line will start the mining of blocks on
    a thread.


    ## Simulating the Helium Network on Localhost


    In this chapter, we will be simulating and testing Helium mining nodes on a peer-to-peer
    network hosted on a localhost network (127.0.x.x).^([^(62)](#fn62)) You should
    have already created a *simulated_network* sub-directory under the Helium root
    (see Chapter [7](#492478_1_En_7_Chapter.xhtml)). The *simulated_network* directory
    must be in the path of your Python interpreter.^([^(63)](#fn63)) Create a directory
    called *node_1* under the *simulated_network* directory. Next, copy all of the
    sub-directories under the Helium root with the exception of the *unit_tests* directory
    and the *simulated_network* directory into the *simulated_network/node_1* sub-directory.
    Delete all of the files in the *simulated_network/node_1/data* sub-directory.
    The *node_1* directory tree contains all of the necessary Python code for a node
    running on the simulated Helium network.


    Next, create a sub-directory tree *seed_1/hnetwork* under the *simulated_network*
    directory. Copy the following program code into a file called *directory_server.py*,
    and save this file in the *seed_1/hnetwork* sub-directory. This code specifies
    a directory server on the Helium network.


    At this stage, we have specified a seed node and a Helium mining node for our
    simulated network. You can now copy and paste the *node_1* directory tree into
    the *simulated_network* directory as many times as you want to and rename the
    root of these sub-trees as may be desired. This will give you a sub-directory
    for each Helium node on the simulated network. You can also specify more than
    one seed node, mutatis mutandis.


    We can also use Docker images and containers to set up the Helium network on localhost.
    Docker is a quasi-virtualization solution that builds applications in containers.
    Containers can be deployed to multiple hosts without requiring any complicated
    deployment pipelines or any source code changes to the containers. You can refer
    to the following Docker resource for more information: *Ian Miell and Aidan Sayers,
    Docker in Practice, Manning Publications, 2016*.


    Let’s look at the *directory_server* module code. This program code is in the
    *seed_1/hnetwork* sub-directory:'
