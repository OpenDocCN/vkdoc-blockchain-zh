    ## Conclusion


    In this chapter, we have looked at the *raison d’etre* for the Helium Chainstate
    database, and we have written code to interface with it. We can query this database
    and obtain answers to pertinent questions such as (i) has a transaction value
    been spent? and (ii) what is the RIPEMD-160 hash of the public key that can unlock
    this transaction? As we have seen, the Chainstate database is also important for
    the construction of client wallets. We have also constructed a *blk_index* key-value
    store that associates block heights with transaction IDs. This permits us to discover
    the block in which a particular transaction is contained.


    We have written unit tests for the *chainstate* and *blk_index* databases. Furthermore,
    we have added code to the *hblockchain* module to keep the *blk_index* and *c*hainstate
    databases updated as new blocks are added to the blockchain. Finally, we have
    updated code in the *tx* module to fetch and validate previous transaction values.


    In the next chapter, we will come to a central pillar of cryptocurrency applications.
    This is the mining of cryptocurrency blocks and the creation of new currency units
    in a distributed manner which is outside the control of any particular entity,
    *mala fides* or otherwise.


    Footnotes [1](#492478_1_En_12_Chapter.xhtml#Fn1_source)   [2](#492478_1_En_12_Chapter.xhtml#Fn2_source)
      [3](#492478_1_En_12_Chapter.xhtml#Fn3_source)   [4](#492478_1_En_12_Chapter.xhtml#Fn4_source)


    # 13. Mining Cryptocurrency


    We now come to mining a cryptocurrency, which is one of the central pillars of
    any cryptocurrency implementation. Mining performs three essential tasks:


    1.  It validates transactions occurring on the cryptocurrency network


    2.  It adds blocks to the blockchain


    3.  It creates new currency units


    All of these activities occur in a distributed manner outside the control of any
    particular node on the cryptocurrency network. Blocks are added to the blockchain
    through distributed consensus.


    In this chapter, we will examine how mining is carried out in a Bitcoin-like currency
    and how the distributed consensus algorithm adds blocks to the blockchain.


    A caveat is in order. In this chapter, you will sometimes see the phrase “the
    blockchain” used. There is in actuality no single authoritative blockchain held
    by some supernode. There are blockchains held by various nodes, and some of these
    nodes may hold blockchains that differ from those held by other nodes. The blockchain
    is a distributed structure. We refer to the blockchains held by various network
    nodes as local blockchains. The blockchain is an aggregated abstraction of all
    local blockchains. The distributed consensus algorithm ensures that all divergent
    blockchains will converge to a single authoritative blockchain.'
  trans: "\n# 更新区块链模块\n\n既然我们已经有了`Chainstate`和`blk_index`数据库的功能代码，就可以使用这些数据库来索引区块链了。`blk_index`算法特别简单。每次向区块链添加一个区块时，执行以下操作：\n\
    \n```\nfor transaction in block:\n    add blk_index[transaction id] = block[\"\
    height\"]\n```\n\n删除`hblockchain`模块中的`add_block`函数，并添加以下函数代码：\n\n```\ndef add_block(block:\
    \ \"dictionary\") -> \"bool\":\n    \"\"\"\n    add_block: 向区块链添加一个区块。接收一个区块。\n\
    \    检查区块属性的有效性，并测试区块中每笔交易的有效性。\n    如果没有错误，将区块以原始字节序列的形式写入文件。\n    然后将该区块添加到区块链中。\n\
    \    更新 chainstate 数据库和 blk_index 数据库。\n    如果区块成功添加到区块链则返回 True，否则返回 False。\n\
    \    \"\"\"\n    try:\n        # 验证接收到的区块参数\n        if validate_block(block)\
    \ == False:\n            raise(ValueError(\"block validation error\"))\n     \
    \   # 验证区块中的交易\n        # 更新 chainstate 数据库\n        for trx in block['tx']:\n\
    \            # 区块中的第一笔交易是 coinbase 交易\n            if block[\"height\"] == 0 or\
    \ block['tx'][0] == trx:\n                zero_inputs = True\n            else:\n\
    \                zero_inputs = False\n            if tx.validate_transaction(trx,\
    \ zero_inputs) == False:\n                raise(ValueError(\"transaction validation\
    \ error\"))\n            if hchaindb.transaction_update(trx) == False:\n     \
    \           raise(ValueError(\"chainstate update transaction error\"))\n     \
    \   # 将区块序列化到文件\n        if (serialize_block(block) == False):\n            raise(ValueError(\"\
    serialize block error\"))\n        # 在内存中向区块链添加该区块\n        blockchain.append(block)\n\
    \        # 更新 blk_index\n        for transaction in block['tx']:\n           \
    \ blockindex.put_index(transaction[\"transactionid\"], block[\"height\"])\n  \
    \  except Exception as err:\n        print(str(err))\n        logging.debug('add_block:\
    \ exception: ' + str(err))\n        return False\n    return True\n```\n\n确保导入`blk_index`模块：\n\
    \n```\nimport blk_index as blockindex\n```\n\n## 结论\n\n在本章中，我们探讨了 Helium `Chainstate`\
    \ 数据库存在的*理由*，并编写了与其交互的代码。我们可以查询该数据库并获得相关问题的答案，例如：(i) 交易价值是否已被花费？(ii) 可以解锁此交易的公钥的`RIPEMD-160`哈希值是什么？正如我们所看到的，`Chainstate`数据库对于构建客户端钱包也很重要。我们还构建了一个`blk_index`键值存储，它将区块高度与交易\
    \ ID 关联起来。这使得我们能够找到包含特定交易的区块。\n\n我们已经为`chainstate`和`blk_index`数据库编写了单元测试。此外，我们还在`hblockchain`模块中添加了代码，以便在新区块添加到区块链时保持`blk_index`和`chainstate`数据库的更新。最后，我们更新了`tx`模块中的代码，以获取并验证过往的交易价值。\n\
    \n在下一章中，我们将探讨加密货币应用的一个核心支柱。这就是以分布式方式挖掘加密货币区块和创建新的货币单位，这种方式不受任何特定实体的控制，无论其*善意*与否。\n\
    \n脚注 1 2 3 4\n\n# 13. 挖掘加密货币\n\n现在我们开始讨论挖掘加密货币，这是任何加密货币实现的核心支柱之一。挖矿执行三项基本任务：\n\
    \n1. 验证加密货币网络上发生的交易\n2. 向区块链添加区块\n3. 创建新的货币单位\n\n所有这些活动都以分布式方式进行，不受加密货币网络上任何特定节点的控制。区块通过分布式共识添加到区块链中。\n\
    \n在本章中，我们将探讨在类似比特币的货币中如何进行挖矿，以及分布式共识算法如何将区块添加到区块链中。\n\n需要事先说明一点。在本章中，你有时会看到“the\
    \ blockchain”（区块链）这个词组被使用。实际上，并不存在由某个超级节点拥有的单一权威区块链。各个节点持有不同的区块链，其中一些节点持有的区块链可能与其他节点持有的不同。区块链是一种分布式结构。我们将各个网络节点持有的区块链称为本地区块链。区块链是所有本地区块链的聚合抽象。分布式共识算法确保所有分叉的区块链最终收敛到单一的权威区块链。\n"
- fmt: "# The Mining Process\n\nWhy would an entity engage in mining? After all, mining\
    \ is an expensive process that consumes a lot of CPU cycles and hence electricity.\
    \ This incentive comes from the transaction fees and the mining reward that a\
    \ miner receives for successfully mining a block. This remuneration is substantial.\
    \ Any entity that has a local blockchain can engage in mining a cryptocurrency.\
    \ Let us see how mining works.\n\nConsider an individual who initiates a transaction\
    \ that will transfer some units of a cryptocurrency. After the transaction has\
    \ been consummated, the transferor of the cryptocurrency broadcasts the transaction\
    \ on the cryptocurrency peer-to-peer network.^([^(55)](#fn55)) Miners (mining\
    \ nodes), who have a local blockchain, are listening for transactions that are\
    \ propagating across this network.\n\nThe task before a miner is to construct\
    \ a prospective new block that can be added to the blockchain. The miner adds\
    \ transactions to a candidate block and then mines this block.\n\nConsider a miner\
    \ who receives a transaction. The miner verifies that the transaction is valid.\
    \ If it is invalid, the miner discards the transaction. Otherwise, the miner broadcasts\
    \ this incoming transaction to other mining nodes that this miner has discovered.\n\
    \nThe miner then examines the `locktime` of the received transaction. If the transaction\
    \ is to be processed at some future time, the miner places it into a local cache\
    \ of transactions that are to be processed in the future. This cache is called\
    \ a `memcache`. If the miner decides to include this particular transaction in\
    \ the candidate block that he intends to mine, he adds it to the block. Otherwise,\
    \ the miner adds the transaction to the `memcache`.\n\nThe miner accesses the\
    \ `memcache` as well as incoming transactions to add transactions to his candidate\
    \ block. Subject to the constraint on the maximum size of a block, it is completely\
    \ within the discretion of a miner as to which transactions and how many transactions\
    \ it is going to include in a candidate block. Each transaction may have a transaction\
    \ fee attached to it. It is within the sole discretion of the transferor of value\
    \ to specify the transaction fee, if any. The miner obviously wants to maximize\
    \ the transaction fees that he will receive if he successfully mines the candidate\
    \ block.\n\nOnce the miner has decided that there are enough transactions in the\
    \ candidate block, it adds a special transaction to the block. This transaction\
    \ is called a `coinbase transaction`. It is the first transaction in the candidate\
    \ block’s list of transactions. The `coinbase transaction` contains the quantum\
    \ of new cryptocurrency that will be created if the miner succeeds in mining the\
    \ block. This value is called the `mining reward`. The miner is entitled to the\
    \ mining reward. Thus, the mining reward and the total transaction fees for the\
    \ transactions included in the block are what the miner will receive if it successfully\
    \ mines the block.\n\nIn Bitcoin and Helium, the amount of the mining reward is\
    \ determined by an algorithm that depends on the number of blocks that have already\
    \ been mined. Periodically the mining reward is halved as the size of the blockchain\
    \ increases. The mining reward approaches zero asymptotically. Note that since\
    \ a mining reward is new currency, it has no corresponding `vin` element.\n\n\
    The Bitcoin mining algorithm implies that a maximum of 21 million bitcoins can\
    \ be produced. This suggests that Bitcoin is asymptotically deflationary; its\
    \ value (purchasing power) must rise over time. Other cryptocurrencies can implement\
    \ different currency creation algorithms. For example, the mining reward can be\
    \ constant or vary in accordance with the volume of transactions per fixed unit\
    \ of time. The TRON cryptocurrency has the dubious distinction of permitting the\
    \ creation of an unlimited number of currency units by ostensibly distributed\
    \ committee consensus. Helium follows the Bitcoin algorithm.\n\nAfter adding the\
    \ `coinbase transaction` to the candidate block, the miner builds the block header\
    \ of this block. Recall that a Helium block has the following dictionary structure.\
    \ The sub-dictionary with the exclusion of the `tx` list is called a block header:\n\
    \n```\n{\n\"prevblockhash\":   \n\"version\":         \n\"timestamp\":       \n\
    \"difficulty_bits\": \n\"nonce\":           \n\"merkle_root\":     \n\"height\"\
    :          \n\"tx\":              \n}\n```\n\nThe miner calculates the SHA-256\
    \ hash of the header of the most recent block in its blockchain and pairs this\
    \ value with the `prevblockhash` key of the candidate block. It next computes\
    \ the merkle root of the transactions in the block and also inserts this value\
    \ into the block header. Similarly, the miner puts the current Unix time, difficulty\
    \ bits, initial nonce value, and version number into the block header. Recall\
    \ that the genesis block has height 0, the succeeding block has height 1, and\
    \ so forth.\n\nAfter the miner has specified the block header, it is ready to\
    \ mine the candidate block."
