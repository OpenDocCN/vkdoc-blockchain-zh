  trans: '

    # Helium 钱包接口


    Helium 钱包维护以下字典数据结构：


    ```

    wallet_state = {

    "keys": [],          # 私钥-公钥元组列表

    "received": [],      # 钱包持有者接收的值

    "spent": [],         # 钱包持有者转移的值

    "received_last_block_scanned": 0,

    "spent_last_block_scanned": 0

    }

    ```


    `wallet_state` 描述了钱包在某一时间点的状态。


    `wallet["keys"]` 是钱包持有者拥有的私钥-公钥对元组列表。钱包应用程序可以创建私钥-公钥对。


    `wallet["received"]` 是钱包持有者收到的所有值的列表。该列表中的每个元素的结构如下：


    ```

    {

    "value": value

    "blockno": block_height

    "fragmentid: transaction["transactionid"] + "_" + str(index)

    "public_key" = key_pair[1]

    }

    ```


    `wallet["spent"]` 是钱包持有者转移的所有值的列表。该列表中的每个元素与 `wallet["received"]` 的结构相同。


    `wallet["received_last_block_scanned"]` 是扫描区块链以查找收到的值时，最后扫描的区块链区块。


    `wallet["spent_last_block_scanned"]` 是扫描区块链以查找钱包持有者转移的值时，最后扫描的区块链区块。


    我们的 Helium 钱包包含以下接口函数：


    ## 密钥管理


    ```

    create_keys() -> "public, private key tuple"

    ```


    此函数创建一个可用于交易的公钥-私钥对。


    ## 交易记录


    ```

    value_received(block_height -> "integer" = 0) ->   "boolean"

    ```


    `value_received` 创建一个钱包持有者已接收的 Helium 值列表。`block_height` 是一个可选参数，指示函数获取自指定高度（含该区块）以来接收的值。如果函数失败，则返回
    `False`，否则返回 `True`。


    `value_received` 创建或更新 `wallet_state["received"]` 键值。


    该函数的算法基于以下观察：将值转移给钱包持有者的交易中的 `vout` 元素包含由钱包持有者生成的公钥，其编码形式为 `RIPEMD-160(SHA-256(public_key))`。


    该函数的伪代码如下：


    ```

    let values_received = []

    for each block where block["height"] >= block_height:

    for each transaction trx in the block:

    for each vout array element in trx:

    for each public_key, pk, owned by the wallet holder:

    if RIPEMD-160(SHA-256(pk)) == vout_element["ScriptPubKey][3]:

    values_received.append {

    value: vout_element[value]

    block: block["height"]

    transaction: trx[transactionid]

    public_key: pk

    }

    ```


    函数 `value_spent` 创建一个钱包持有者已转移给其他实体的 Helium 值列表。`block_height` 是一个可选参数，指示函数获取自指定高度（含该区块）之后转移的值。


    ```

    value_spent(block_height -> "integer" = 0) ->   "list"

    ```


    此函数基于以下观察：钱包持有者转移给某个实体的每个值，都会由交易中包含钱包持有者公钥的 `vin` 元素标识。以下伪代码实现了此功能：


    ```

    let values_spent = []

    for each block where block["height"] >= block_height:

    for each transaction trx in the block:

    for each vin list element, vin_element, in trx:

    for each public_key, pk, owned by the wallet holder:

    if pk == vin_element["ScriptPubKey][1]:

    pointer = vin_element[transactionid] + "_" + \

    vin_element[vout_index]

    values_spent.append {

    value: vin_element[value],

    block: block["height"],

    transaction: pointer,

    public_key: pk

    }

    ```


    ## 持久化


    ```

    save_wallet() → "boolean"

    ```


    `save_wallet` 函数保存 `wallet_state`。具体来说，`wallet_state` 被持久化到磁盘文件 `wallet.dat` 中：


    ```

    load_wallet()   ->  "dictionary"

    ```


    此函数将 `wallet.dat` 中的所有钱包数据加载到 `wallet_state` 结构中。


    请注意，由于钱包状态已持久化，我们无需查询整个区块链来更新钱包。我们只需从参数 `received_last_block_scanned` 和 `spent_last_block_scanned`
    指定的区块开始检查即可。

    '
- fmt: "# The Helium Wallet Program Code\n\nCopy the following program code into a\
    \ file called `wallet.py` and save it in the `wallet` directory:\n\n```\n###########################################################################\n\
    # wallet.rb: a command-line wallet for Helium\n###########################################################################\n\
    import hblockchain\nimport rcrypt\nimport pdb\nimport pickle\n# the state of the\
    \ wallet\nwallet_state = {\n\"keys\": [],          # list of private-public key\
    \ tuples\n\"received\": [],      # values received by wallet holder\n\"spent\"\
    : [],         # values transferred by the wallet holder\n\"received_last_block_scanned\"\
    : 0,\n\"spent_last_block_scanned\": 0\n}\ndef create_keys():\nkey_pair = rcrypt.make_ecc_keys()\n\
    wallet_state[\"keys\"].append(key_pair)\ndef initialize_wallet():\nwallet_state[\"\
    received\"] = []\nwallet_state[\"spent\"] = []\nwallet_state[\"received_last_block_scanned\"\
    ] = 0\nwallet_state[\"spent_last_block_scanned\"] = 0\ndef value_received(blockno:\"\
    integer\"=0) -> \"list\" :\n\"\"\"\nobtains all of the helium values received\
    \ by the wallet holder by examining\ntransactions in the blockchain. Updates the\
    \ wallet state.\n{\nvalue:  ,\nScriptPubKey: \n}\n\"\"\"\nhreceived = []\nrvalue\
    \ = {}\n# get values received from the blockchain\nfor block in hblockchain.blockchain:\n\
    for transaction in block[\"tx\"]:\nctr = -1\nfor vout in transaction[\"vout\"\
    ]:\nctr += 1\nfor key_pair in wallet_state[\"keys\"]:\nif rcrypt.make_RIPEMD160_hash(rcrypt.make_SHA256_hash(key_pair[1]))\
    \ \\ == vout[\"ScriptPubKey\"][2]:\nrvalue[\"value\"] = vout[\"value\"]\nrvalue[\"\
    blockno\"] = block[\"height\"]\nrvalue[\"fragmentid\"] = transaction[\"transactionid\"\
    ] + \"_\" + str(ctr)\nrvalue[\"public_key\"] = key_pair[1]\nhreceived.append(rvalue)\n\
