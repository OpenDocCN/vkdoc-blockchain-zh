    3. `locktime` 小于规定值。\n4. 版本号有效。\n5. 交易 ID 格式有效。\n6. 对于非创世块和非 coinbase 交易，`vin`列表长度为正。\n\
    7. 对于 coinbase 交易，`vin`列表为空。\n8. 创世块不可有输入。\n9. `vin`列表长度不超过最大允许值。\n10. `vin`列表格式有效。\n\
    11. `vout`列表长度为正。\n12. `vout`列表长度不超过最大允许值。\n13. `vout`列表元素格式有效。\n14. `vout`列表实现\
    \ P2PKH 脚本。\n15. 对前一笔交易 ID 的引用有效。\n16. 花费的总值小于或等于可花费总值。\n17. 花费值大于零。\n18. `vin`数组中的索引值引用了前一笔交易`vout`数组中的有效元素。\n\
    19. 交易输入可被花费。\n\n### `validate_vin()`\n\n```python\ndef validate_vin(vin_element:\
    \ \"dictionary\") -> \"bool\":\n```\n\n测试`vin`元素是否具有有效值。如果`vin`有效则返回`True`，否则返回`False`。\n\
    \n### `validate_vout()`\n\n```python\ndef validate_vout(vout_element: \"dictionary\"\
    ) -> \"bool\":\n```\n\n测试`vout`元素是否具有有效值。如果`vout`有效则返回`True`，否则返回`False`。\n\n\
    ### `prevtx_value()`\n\n```python\ndef prevtx_value(txkey: \"string\") -> 'bool':\n\
    ```\n\n检查链状态数据库并返回交易片段：\n\n```json\n{\n\"pkkhash\":  ,\n\"value\":    ,\n\"spent\"\
    :    ,\n\"tx_chain\": \n}\n```\n\n接收一个交易片段键：`\"previous txid\" + \"_\" + str(prevtx_vout_index)`。\n\
    - 如果交易不存在、值已被花费或值不是正整数，则返回`False`。\n- 否则返回前一笔交易片段数据。\n\n### `transaction_fee()`\n\
    \n```python\ndef transaction_fee(trans: 'dictionary', value_list: 'list' ) ->\
    \ 'integer or bool':\n```\n\n计算交易的手续费。接收一笔交易和一个链状态交易片段列表。\n- 返回交易手续费（以 helium_cents\
    \ 为单位）或如果出错则返回`False`。\n- 创世块交易或 coinbase 交易没有手续费。\n\n### `unlock_transaction_fragment()`\n\
    \n```python\ndef unlock_transaction_fragment(vinel: 'dictionary', fragment: \"\
    dictionary\") -> \"boolean\":\n```\n\n使用 P2PKH 脚本解锁前一笔交易片段。执行脚本，如果交易未解锁则返回`False`。\n\
    - 接收：消耗性的`vin`和由该`vin`元素消耗的前一笔交易片段。\n"
- fmt: '## Transaction Processing Unit Tests


    Copy the following code into a file named`test_tx.py` and copy this file into
    the`unit_tests` directory. Traverse to the`unit_tests` directory and run the tests:^([(50)](#fn50))


    ```

    $(virtual) pytest test_tx.py -s

    ```


    You will note that at the outset we create a symbolic transaction as well as a
    symbolic previous transaction that is used by the unit tests to create a pair
    of transactions with randomized values. The`randomize_list` function provides
    randomized access to`vin` and`vout` list elements for our unit tests. This module
    makes extensive use of pytest mocks, so if you are not conversant with this technology,
    you will want to review Appendix 3. The last two unit tests are noteworthy for
    your consideration; they test the unlocking of previous transaction outputs.


    After executing the command line, you should see 35 unit tests passing:'
