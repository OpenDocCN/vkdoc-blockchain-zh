    \    key_pair = rcrypt.make_ecc_keys()\n    prev_tx_keys.append([key_pair[0],key_pair[1]])\n\
    \    return\n\n# instantiate a key pair\nmake_keys()\n\ndef make_synthetic_previous_transaction(num_outputs):\n\
    \    \"\"\"\n    makes synthetic previous transaction with randomized values\n\
    \    we abstract away the inputs to the previous transaction.\n    \"\"\"\n  \
    \  transaction = {}\n    transaction['version'] = 1\n    transaction['transactionid']\
    \ = rcrypt.make_uuid()\n    transaction['locktime'] = 0\n    transaction['vin']\
    \  = []\n    transaction['vout'] = []\n\n    def make_synthetic_vout():\n    \
    \    \"\"\"\n        make a synthetic vout object.\n        returns a vout dictionary\
    \ item\n        \"\"\"\n        vout = {}\n        vout['value'] = secrets.randbelow(1000000)\
    \ + 1000  # helium cents\n        tmp = []\n        tmp.append('')\n        tmp.append('')\n\
    \        tmp.append(prev_tx_keys[0][1])\n        tmp.append('')\n        tmp.append('')\n\
    \        vout['ScriptPubKey'] = tmp\n        return vout\n\n    ctr = 0\n    while\
    \ ctr < num_outputs:\n        transaction['vout'].append(make_synthetic_vout())\n\
    \        ctr += 1\n    return transaction\n\ndef make_synthetic_transaction(prev_tx):\n\
    \    \"\"\"\n    makes a synthetic transaction consuming outputs from the\n  \
