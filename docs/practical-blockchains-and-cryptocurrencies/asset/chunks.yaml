    blockchain application should keep its implementation at the simplest and most
    transparent level that is possible, especially since cryptocurrency applications
    involve money. A database implementation introduces too much complexity. What
    do we do if the data in the database is corrupted or the database crashes?


    The canonical blockchain application simply persists the blocks in a blockchain
    as a simple text or binary files. The underlying operating system is used to write
    blocks to disk. A block is a write once read many times file.


    This does not mean that a blockchain application does not use databases. For example,
    Bitcoin uses LevelDB databases to index the blocks and maintain unspent amounts.
    In a blockchain application, these databases always play a role ancillary to the
    blockchain, and the data in these databases can always be built from scratch from
