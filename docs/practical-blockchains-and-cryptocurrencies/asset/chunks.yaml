    该代码库基于我们在附录6中的JSON-RPC实现。请注意，此特定节点正在监听`27.0.019:8081`。模拟网络上的每个网络节点必须在（`localhost`）上监听唯一的IP地址。


    ## RPC请求格式


    由RPC客户端发起的请求具有以下语法格式：


    ```python

    rpc   = json.dumps({"jsonrpc":"2.0","method":"receive_block","params":{"block":
    blocks[0]}, "id":21})

    ret = networknode.hclient("http://127.0.0.51:8081", rpc)

    ```


    `json.dumps()`函数的参数是JSON-RPC v.2格式的远程过程调用。第二个参数的值是要在远程服务器上调用的方法（`receive_block`）。第三个参数的值是要传递给远程函数的参数，参数是一个Python字典。如果我们调用一个不带任何函数参数的远程方法，第三个参数将是空字典`{}`。第四个参数是标识我们请求的数字ID，远程服务器将使用此ID返回其响应。此JSON-RPC命令在被放置到网络上之前，先由`json.dumps`打包为字符串。


    ## 发送命令到远程服务器


    我们现在准备将此命令发送到远程服务器。`networknode`是包含RPC客户端和服务器的Python模块。函数`networknode.hclient()`将把命令发送到远程服务器。`networknode.hclient()`函数的第一个参数是被调用的远程JSON-RPC服务器的IP地址和端口。请注意，地址包含用于与此服务器通信的协议（`http`）。第二个参数是我们打包后的RPC命令。


    ## 远程JSON服务器响应格式


    远程JSON服务器通常会以以下语法格式的响应进行回复：


    ```json

    ''{"jsonrpc": "2.0", "result": ["127.0.0.10:8081", "127.0.0.11:8081"],"id":5}''

    ```


    这是一个编码为字符串的JSON对象。我们可以通过函数`json.loads()`将其转换为Python字典。


    第一个键项指定了用于格式化响应的JSON RPC版本。第二个键项是`"result"`，这个键的值是我们感兴趣的。第三个键`id`标识了此响应所对应的请求ID。


    ## 错误响应格式


    在出错的情况下，服务器将以以下格式响应：


    ```json

    ''{"jsonrpc": "2.0", "error": "message", "id": 5 }''

    ```

    或：

    ```json

    ''{"jsonrpc": "2.0", "result": "error: message", "id": 5 }''

    ```


    ## JSON-RPC服务器部分


    `networknode`模块的第二部分是JSON-RPC服务器。请检查此模块中的`app.listen()`调用：


    ```python

    app.listen(address="127.0.0.19", port="8081")

    ```


    这指定了服务器将在IP地址`127.0.0.19`的`8081`端口上监听。每个网络节点必须监听唯一的IP地址和端口组合。


    最后，请注意共享资源通过使用信号量来防止数据竞争。


    ## 启动服务器


    为了在模拟网络上启动此服务器，请导航到节点的`hnetwork`目录，并在Helium虚拟环境中执行`networknode.py`脚本：


    ```bash

    $(virtual) python networknode.py

    ```'
