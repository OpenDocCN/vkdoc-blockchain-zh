    This code base leverages our JSON-RPC implementation in Appendix 6. Notice that
    this particular node is listening on 27.0.019:8081\. Each network node on your
    simulated network must listen on a unique IP address (on localhost).


    A request made by an RPC client has the following syntactical format:


    ```

    rpc   = json.dumps({"jsonrpc":"2.0","method":"receive_block","params":{"block":
    blocks[0]}, "id":21})

    ret = networknode.hclient("http://127.0.0.51:8081", rpc)

    ```


    The argument to the *dumps* function is the remote procedure call in JSON-RPC
    v. 2 format. The value of the second argument is the method that is to be invoked
    on the remote server (*receive_block*). The value of the third argument are the
    arguments to be passed to the remote function. The arguments are a Python dictionary.
    The third argument will be the empty dictionary, {}, if we invoke a remote method
    which does not take any function parameters. The fourth argument is a numeric
    id that identifies our request. The remote server will return this id with its
    response. This JSON-RPC command is packaged as a string by j*son.dumps* before
    it is placed on the network.


    We are now ready to send this command to the remote server. *networknode* is the
    Python module containing the RPC client and server. The function *networknode.hclient*
    will send the command to the remote server. The first argument of the *networknode.hclient*
    function is the IP address and port of the remote JSON-RPC server that is being
    called. Notice that the address includes the protocol (*http*) that is used to
    communicate with this server. The second argument is our packaged RPC command.


    The remote JSON server will typically reply with a response with this type of
    syntactical format:


    ```

    ''{"jsonrpc": "2.0", "result": ["127.0.0.10:8081", "127.0.0.11:8081"],"id":5}''

    ```


    This is a JSON object encoded as a string. We can convert this into a Python dictionary
    with the function *json.loads()*.


    The first key item specifies the *json rpc* version that is used to format the
    response. The second key item is “*result*”. The value of this key is what we
    are interested in. The third key, *id*, identifies the id of the request to which
    this response pertains.


    In the event of an error, the server will respond in the following format:


    ```

    ''{"jsonrpc": "2.0", "error": "message", "id": 5 }''

    or:

    ''{"jsonrpc": "2.0", "result": "error: message", "id": 5 }''

    ```


    The second portion of the *networknode* module is the JSON-RPC server. Examine
    the *app.listen* call in this module:


    ```

    app.listen(address="127.0.0.19", port="8081")

    ```


    This specifies that the server will listen on port 8081 at IP address 127.0.0.19\.
    Each network node must listen on a unique IP address and port combination.


    Finally, note that shared resources are protected from data races through the
    use of semaphores.


    In order to start this server on the simulated network, traverse to the *hnetwork*
    directory of the node and execute the *networknode.py* script in the Helium virtual
    environment:


    ```

    $(virtual) python networknode.py

