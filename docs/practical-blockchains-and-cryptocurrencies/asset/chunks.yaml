- fmt: '### Blockchain Immutability


    It is quite easy to detect if a blockchain has been tampered with. Consider the
    blockchain represented in Figure [6-4](#492478_1_En_6_Chapter.xhtml#Fig4). Suppose
    further that the hash pointer for each block (except for the genesis block) includes
    the `SHA-256` message digest of the previous block’s data and hash pointer.


    Suppose that a malicious party changes the data or the hash pointer in the second
    block. An entity that is verifying that the blockchain has not been altered will
    compute the `SHA-256` message digest of the second block. It will then compare
    this value with the `SHA-256` message digest contained in the hash pointer of
    the third block. Since these two digests do not match, the entity will conclude
    that either the second block has been altered or the message digest in the third
    block has been altered.


    Since the malicious party has tampered with the second block, he will also have
    to change the cryptographic hash in the third block so that it matches the computed
    hash of the second block. But then the cryptographic hash in the fourth block
    will not match the computed hash for the third block. This changing of hash pointers
    will have to be effected for all of the blocks subsequent to the block which was
    initially changed. Furthermore, since a blockchain is a distributed data structure,
    the changed blocks will have to be transmitted to all of the other nodes in the
    blockchain network so that they can amend their copies of the blockchain. These
    nodes will detect the tampering and decline to change their copies.


    ### Making a Simple Blockchain


    Let us construct a very simple blockchain in Python. Our blockchain will be a
    list structure (called an array in other languages):


    ```

    blockchain = [ ]

    ```


    We will let the data in each block be the next number in the Fibonacci sequence
    (0, 1, 1, 2, 3, 5, 8, 13, 21…). For each block except the genesis block, the data
    and the hash pointer will be represented as the following dictionary item (or
    map in other languages):


    ```

    {

    ''ptr'':  index of the previous list element

    ''hash'': SHA-256 hash of the previous block as a hexadecimal string

    ''data'': Fibonacci number

    }

    ```


    The `SHA-256` message digest of a block will be computed by converting the list
    element’s value to a JSON string and then computing the hexadecimal value of the
    `SHA-256` message digest of this string.


    Given the foregoing specification, the genesis block is


    ```

    blockchain[0] = {

    ''ptr'': None

    ''hash'': None

    ''data'': 0

    }

    ```


    The second block in this blockchain is


    ```

    blockchain[0] = {

    ''ptr'': 0

    ''hash'': a hexadecimal string

    ''data'': 1

    }

    ```


    and so forth.


    One observation to be made is that since this blockchain is a list, the pointer
    to the previous block can be represented simply as the index of the previous list
    element.


    ### The Blockchain Universe


    So far, we have taken a deep dive into the theory of blockchains; it’s time to
    look at some of the applications of blockchains. As a general principle, we can
    state that any application that requires distributed consensus for decision-making
    is potentially a suitable candidate for the implementation of a blockchain.


    The very first use of a blockchain was in the cryptocurrency Bitcoin, and cryptocurrencies
    still constitute a major application domain for blockchains. Another major domain
    is smart contract cryptocurrencies, such as Ethereum. These cryptocurrencies permit
    the specification of contracts which specify conditions under which value will
    be transferred. These contracts are specified through a programming language that
    a blockchain virtual machine understands.^([^(29)](#fn29)) Projects, such as Ripple,
    are concerned with automating portions of the financial services industry with
    the objectives of reducing the costs of transactions and the time required for
    their completion.


    In Chapter [2](#492478_1_En_2_Chapter.xhtml), we looked at the Brave browser which
    proposes a radical model for the distribution of digital advertising. The Brave
    project enhances privacy on the Internet and also rewards all of the stakeholders
    in the distribution of digital advertising: the content creators, the people viewing
    this content, and the browser which hosts the content. All these stakeholders
    are rewarded with units of the `BAT` cryptocurrency.


    Another application domain is games and digital content. `TRON` is an example
    of such a project. `TRON` is designed to democratize the distribution of such
    content by eliminating gatekeepers who host this content. The `TRON` project uses
    the `BitTorrent` protocol to distribute and retrieve such content.^([^(30)](#fn30))


    Other application domains for blockchain technology include supply chain management,
    tamper-proof voting systems, distributed id systems, and permission-less escrow
    systems. There are, of course, many more potential application domains for this
    technology.


    ### Conclusion


    In this chapter, we have defined a blockchain and discussed its theoretical foundations
    and essential characteristics. We concluded by discussing some of the application
    domains for blockchain technology.


    In the next chapter, we will start our main project, the construction of a cryptocurrency
    called Helium. Our first task will be to program a blockchain for Helium.


    # 7. The Helium Cryptocurrency Project


    In this chapter, we shall begin the construction of the Helium cryptocurrency.
    Our implementation is going to include all of the features that you expect in
    a production-quality cryptocurrency. Helium is modeled after Bitcoin, which is
    the canonical standard. We will implement Helium in Python. Python is a simple
    yet powerful language whose syntax is lucid and exceptionally easy to understand.
    Python is an ideal language for clearly exposing the algorithms and techniques
    that constitute the backbone of a cryptocurrency. The downside of using Python
    is that it is an interpreted language and thus inherently slow. This limitation
    makes it unsuitable for a production environment.


    The Python code implementation of Helium should provide you with a reliable blueprint
    to implement a cryptocurrency in some other high-performance, compiled language,
    such as C, C++, Go, or Rust, if you are so inclined.^([^(31)](#fn31))


    If you are primarily interested in the theory of blockchains and cryptocurrencies,
    just read the “Helium Configuration” section of this chapter.'
