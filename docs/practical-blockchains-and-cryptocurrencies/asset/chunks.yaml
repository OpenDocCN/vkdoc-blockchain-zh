    ![../images/492478_1_En_6_Chapter/492478_1_En_6_Fig3_HTML.jpg](images/492478_1_En_6_Chapter/492478_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Hash Pointer Structure


