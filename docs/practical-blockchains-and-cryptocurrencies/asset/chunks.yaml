- fmt: '# Update the Helium Blockchain Module


    Now that we have a functional transaction module; we update the `hblockchain`
    module to validate transactions in a block. Ensure that you import the `tx` module
    into `hblockchain`. Remove the `add_block` function from the `hblockchain` module
    and add the following variant in lieu thereof:


    ```

    def add_block(block: "dictionary") -> "bool":

    """

    add_block: adds a block to the blockchain. Receives a block.

    The block attributes are checked for validity and each transaction

    in the block is tested for validity. If there are no errors, the block

    is written to a file as a sequence of raw bytes. Then the block is added

    to the blockchain.

    returns True if the block is added to the blockchain and False otherwise.

    """

    try:

    # validate the received block parameters

    if validate_block(block) == False:

    raise(ValueError("block validation error"))

    # validate the transactions in the block

    for trx in block[''tx'']:

    # first transaction in the block is a coinbase transaction

    if block["height"] == 0 or block[''tx''][0] == trx: zero_inputs = True

    else: zero_inputs = False

    if tx.validate_transaction(trx, zero_inputs) == False:

    raise(ValueError("transaction validation error"))

    # serialize the block to a file

    if (serialize_block(block) == False):

    raise(ValueError("serialize block error"))

    # add the block to the blockchain in memory

    blockchain.append(block)

    except Exception as err:

    print(str(err))

    logging.debug(''add_block: exception: '' + str(err))

    return False

    return True

    ```


    This validates all of the transactions in a block before the block is added to
    the blockchain.


    ## Conclusion


    In this chapter, we have written program code to validate Helium transactions.
    We have also written unit tests for our transaction program code. Lastly, we have
    refined the Helium blockchain code to verify transactions before a block is added
    to the blockchain.


    You will have noticed that we have not implemented any code to retrieve unspent
    transaction values from previous transactions. This feature was mocked in our
    unit tests. The next chapter addresses this matter.


    We will implement two databases for Helium. In the same manner as Bitcoin, we
    are going to implement a LevelDB database to verify and get unspent transaction
    amounts. We will also implement a second LevelDB database that lets us quickly
    determine the block in which a particular transaction is located.


    # 12. The Chainstate


    In the previous chapter, we implemented program code that validated the integrity
    of transactions. There was a significant omission in this code, we did not address
    the issue of how unspent values from a previous transaction are obtained, and
    we also did not address the matter of validating the unspent values in previous
    transactions. The reason for this omission is that unspent values are implemented
    in a key-value store. In this chapter, we will rectify this deficiency by implementing
    a key-value store for transactions. We will also implement a key-value store that
    lets us determine the block which contains a particular transaction.


    In brief, a key-value store is a data structure which maps keys to values. Given
    a key, we can obtain the value associated with it. The keys in the store are unique.
    If you are inclined to think of an analogy, then a telephone directory is a good
    example of an analogue key-value store. The primary and significant benefit of
    key-value stores is that they provide random access to the store. Thus, getting,
    mutating, and deleting key values is extremely fast. A very large persistent key-value
    store can search and fetch a value in one disk access.


    In Bitcoin, the key-value store of unspent transaction values is implemented as
    a LevelDB database. Helium also uses LevelDB in its implementation. Appendix 2
    of this book contains a good introduction to installing and using LevelDB. You
    should go through this appendix if you are not familiar with LevelDB. LevelDB
    is a particularly simple key-value store. It is so, deliberately by design. The
    LevelDB design objective is to implement a very simple and very fast persistent
    store which has extreme reliability. You will observe, for example, that LevelDB
    only supports string keys and string values and has a tiny API footprint.


    ## Finding Unspent Transaction Values


    In Bitcoin and Helium, blocks are stored on disk as ordinary text files. Blocks
    are not stored in a database. This is a deliberate design feature. The design
    objective in Bitcoin is to keep the cryptocurrency implementation at the simplest
    level possible. This maximizes reliability. By simply storing blocks to disk as
    ordinary binary files, it becomes the responsibility of the operating system to
    ensure that blocks are successfully written to disk. Furthermore, the operating
    system must ensure that these files are not corrupted. The cryptocurrency application
    needs to only examine the response of the operating system to a request to write
    a block to disk. There is an additional reason for such a file-based block storage
    implementation. In Bitcoin and Helium, all of the databases and other needed data
    structures can be built from scratch from these block files. The only significant
    point of failure is thus any missing or corrupted block files. Since a blockchain
    is an immutable structure, block files must also be immutable, write once, and
    read many times structures. It is primarily the responsibility of the operating
    system to ensure the integrity of block files. This implementation of block storage
    is significantly less complex than storing blocks in a SQL or NoSQL database.


    There is, however, an intrinsic deficiency in this file-based block storage model.
    Consider a transaction where we want to spend a value in some previous transaction.
    Suppose further that we only have the transaction id corresponding to this value.
    We will have to retrieve the transaction from the block that contains this transaction
    and then determine if the value is unspent. Since the blocks are not indexed,
    this will entail searching all of the block files for this particular transaction
    and then searching for a subsequent transaction that has spent this value. If,
    for example, the blockchain is composed of ten million block files, then it is
    patently obvious that such a search will be unacceptably slow. In a real-world
    application, there may be thousands of transactions per second.


    A transaction store can solve this scalability problem by maintaining transaction
    metadata in a memory key-value store. Every time a transaction occurs, the application
    saves metadata pertaining to the transaction in the key-value store and also persists
    this data to disk. Now, if the application needs to interrogate the blockchain
    about a transaction, it searches the key-value store, and since such a store provides
    random access, the response will be more or less instantaneous. We are going to
    build a LevelDB database implementation that provides such a capability for transactions
    and a second LevelDB database that lets us query it for the block that contains
    a particular transaction.'
  raw: '## Update the Helium Blockchain Module


    Now that we have a functional transaction module; we update the *hblockchain*
    module to validate transactions in a block. Ensure that you import the *tx* module
    into *hblockchain*. Remove the *add_block* function from the *hblockchain* module
    and add the following variant in lieu thereof:


    ```

    def add_block(block: "dictionary") -> "bool":

    """

    add_block: adds a block to the blockchain. Receives a block.

    The block attributes are checked for validity and each transaction

    in the block is tested for validity. If there are no errors, the block

    is written to a file as a sequence of raw bytes. Then the block is added

    to the blockchain.

    returns True if the block is added to the blockchain and False otherwise.

    """

    try:

    # validate the received block parameters

    if validate_block(block) == False:

    raise(ValueError("block validation error"))

    # validate the transactions in the block

    for trx in block[''tx'']:

    # first transaction in the block is a coinbase transaction

    if block["height"] == 0 or block[''tx''][0] == trx: zero_inputs = True

    else: zero_inputs = False

    if tx.validate_transaction(trx, zero_inputs) == False:

    raise(ValueError("transaction validation error"))

    # serialize the block to a file

    if (serialize_block(block) == False):

    raise(ValueError("serialize block error"))

    # add the block to the blockchain in memory

    blockchain.append(block)

    except Exception as err:

    print(str(err))

    logging.debug(''add_block: exception: '' + str(err))

    return False

    return True

    ```


    This validates all of the transactions in a block before the block is added to
    the blockchain.


    ## Conclusion


    In this chapter, we have written program code to validate Helium transactions.
    We have also written unit tests for our transaction program code. Lastly, we have
    refined the Helium blockchain code to verify transactions before a block is added
    to the blockchain.


    You will have noticed that we have not implemented any code to retrieve unspent
    transaction values from previous transactions. This feature was mocked in our
    unit tests. The next chapter addresses this matter.


    We will implement two databases for Helium. In the same manner as Bitcoin, we
    are going to implement a LevelDB database to verify and get unspent transaction
    amounts. We will also implement a second LevelDB database that lets us quickly
    determine the block in which a particular transaction is located.


    Footnotes [1](#492478_1_En_11_Chapter.xhtml#Fn1_source)


    # 12. The Chainstate


    In the previous chapter, we implemented program code that validated the integrity
    of transactions. There was a significant omission in this code, we did not address
    the issue of how unspent values from a previous transaction are obtained, and
    we also did not address the matter of validating the unspent values in previous
    transactions. The reason for this omission is that unspent values are implemented
    in a key-value store. In this chapter, we will rectify this deficiency by implementing
    a key-value store for transactions. We will also implement a key-value store that
    lets us determine the block which contains a particular transaction.


    In brief, a key-value store is a data structure which maps keys to values.^([^(51)](#fn51))
    Given a key, we can obtain the value associated with it. The keys in the store
    are unique. If you are inclined to think of an analogy, then a telephone directory
    is a good example of an analogue key-value store. The primary and significant
    benefit of key-value stores is that they provide random access to the store. Thus,
    getting, mutating, and deleting key values is extremely fast. A very large persistent
    key-value store can search and fetch a value in one disk access.


    In Bitcoin, the key-value store of unspent transaction values is implemented as
    a LevelDB database. Helium also uses LevelDB in its implementation. Appendix 2
    of this book contains a good introduction to installing and using LevelDB. You
    should go through this appendix if you are not familiar with LevelDB. LevelDB
    is a particularly simple key-value store. It is so, deliberately by design. The
    LevelDB design objective is to implement a very simple and very fast persistent
    store which has extreme reliability. You will observe, for example, that LevelDB
    only supports string keys and string values and has a tiny API footprint.


