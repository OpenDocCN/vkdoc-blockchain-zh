    ```


    你会注意到，在开始时我们创建了一个符号交易以及一个符号前序交易，单元测试利用这些数据来生成一对具有随机化数值的交易。`randomize_list`函数为我们的单元测试提供了对`vin`和`vout`列表元素的随机化访问。该模块广泛使用了
    pytest 模拟技术，因此如果你对此技术不熟悉，建议查阅附录 3。最后两个单元测试值得你重点关注；它们测试了前序交易输出的解锁操作。


    执行命令行后，你应该会看到 35 个单元测试通过：

