    \n图 4-1 SHA-256 消息摘要生成过程\n\n文件或消息被分割成连续的块，每个块的大小为 512 位。如果消息或文件的比特长度不能被 512 整除，则在其末尾添加填充（一个\
    \ 1 位，后跟若干 0 位），以便 512 能够整除该消息或文件的比特长度。\n\n接下来，我们使用伪随机数生成器构造一个 256 位的随机 IV（初始化向量）。这只是一个\
    \ 256 位长的、由 1 和 0 组成的伪随机序列。IV 的目的是增加哈希生成过程的随机性。我们将这个 IV 与消息或文件的第一个 512 位块拼接起来。得到的\
    \ 768 位块被输入到安全哈希算法中。该算法是一个加扰和压缩函数，输出一个 256 位的字符串。该算法是对 768 位块进行的一系列替换和置换。\n\n\
    然后，我们取第二个 512 位消息块，并将其与之前输出的 256 位结果拼接起来。这个 768 位字符串被输入到相同的加扰和压缩函数中，产生一个 256 位的输出。我们以此类推，逐个处理消息块。最终的\
    \ 256 位输出就是由 `SHA-256` 算法生成的消息摘要（或密码学哈希值）。\n\n`SHA-256` 的核心是应用于每个 768 位块的加扰和压缩函数。对于\
    \ `SHA-256`，该函数由 64 轮组成。每一轮接收一个 768 位块，通过位移和逻辑位运算（OR、XOR、AND）进行加扰，然后输入到下一轮。最后一轮产生一个\
    \ 256 位的输出，该输出与消息的下一个 512 位块拼接，然后再次对这 768 位块应用 64 轮。此过程不断重复，直到处理完消息的最后一个块。\n\n\
    `SHA-512` 算法在概念上类似，只是消息块大小为 1024 位，并且加扰函数由 80 轮组成。理论上，加扰过程中涉及的步骤越多，函数的密码学安全性就越高。\n\
    \n### 一个针对 SHA-256 的 Python 示例\n\nPython 在其 `hashlib` 模块中提供了 `SHA-256` 以及其他密码学哈希算法的实现。以下\
    \ Python 代码示例演示了如何为字符串生成 `SHA-256` 十六进制编码的消息摘要：\n\n```\nimport hashlib\ndef getSHA256MD(inputStr):\n\
    \    m = hashlib.sha256()\n    # 将输入字符串转换为字节序列\n    strAsBytes = str.encode(inputStr)\n\
    \    m.update(strAsBytes)\n    # 以十六进制字符串形式返回消息摘要\n    return m.hexdigest()\n\
    ret = getSHA256MD('the lazy brown fox jumped over the sleeping dog')\nprint(ret)\n\
    ```\n\n执行此程序的结果是 `SHA-256` 哈希值：`1845c1824b7710df04f1307ea1618857c16e891278eb9dc7edba809915581283`\n"
- fmt: '### RIPEMD-160


    `RIPEMD` is an acronym for RACE Integrity Primitives Evaluation Message Digest.
    This cryptographic hash algorithm can emit message digests which are 128, 160,
    256, and 320 bits in length. `RIPEMD` entered the public domain in 1996. `RIPEMD-160`
    finds usage in the Bitcoin cryptocurrency as well as numerous other blockchain
    applications.


    The algorithm to generate a `RIPEMD-160` hash is conceptually similar to the process
    that generates a `SHA-256` hash. `RIPEMD-160` divides the input message into a
    consecutive sequence of 512-bit blocks. The message is padded with a 1 bit and
    a sequence of 0 bits to ensure that it is completely divisible by 512. Then a
    64-bit string, encoding the length of the message, is appended to the message.
    The algorithm uses five 32-bit registers which hold the intermediate results as
    well as the final message digest. In order to start the hash generation process,
    these five 32-bit registers are initialized with some fixed values. The first
    512-bit block is then mutated by a sequence of ten rounds where each round consists
    of a 16-step sequence of permutations and substitutions that act on the message
    block and the register values. The output of these ten rounds is a 160-bit value
    populating the five 32-bit registers. These register values are then input with
    the next block, and the process repeats itself until the last block of the message
    has been processed.^(^(16)^) The final 160-bit value in the five registers is
    the message digest.


    The following Python code generates a `RIPEMD-160` hash value for a string. The
    output is encoded as a hexadecimal string:


    ```

    import hashlib

    def getRIPEMD160(inputStr):

    r = hashlib.new(''ripemd160'')

    strAsBytes = str.encode(inputStr)

    r.update(strAsBytes)

    return r.hexdigest()

    ret = getRIPEMD160(''the lazy brown fox jumped over the sleeping dog'')

    print(ret)

    ```


    ## Message Authentication Codes


    In the previous sections, we have discussed how cryptographic hashes can be used
    to determine the integrity of a message, that is, to prove whether a message has
    been tampered with. Cryptographic hashes cannot be used to prove authenticity.
    Authenticity is concerned with proving that the sender of a message is whom she
    or he purports to be. Message authentication codes (`MAC`) provide assurances
    of message integrity and, in addition, provides limited assurances of authenticity.
    Message authentication code algorithms rely upon shared symmetric encryption keys.


    This is how message authentication codes work. A group of two or more individuals
    share a secret symmetric encryption key. A person who wants to send a message
    uses a `MAC` algorithm to compute a `MAC` value for this message. She then sends
    the message along with the `MAC` value to a recipient. The recipient computes
    the `MAC` value of the message using the `MAC` algorithm and the secret key. If
    this computed `MAC` value is equal to the `MAC` value delivered by the originator,
    then we conclude that the message has not been tampered with. Furthermore, the
    recipient can be assured that the message was sent by someone who has the secret
    key.


    Figure 4-2 explains how message authentication codes are used.


    ![../images/492478_1_En_4_Chapter/492478_1_En_4_Fig2_HTML.jpg](images/492478_1_En_4_Chapter/492478_1_En_4_Fig2_HTML.jpg)


    **Figure 4-2.** Message Authentication Code Process


    You should note that the message does not have to be encrypted. There are many
    use cases where a `MAC` code is used along with plaintext. For example, operating
    system files are not encrypted but may have `MAC` values attached therewith in
    order to prove the integrity of the files. Another prominent use case pertains
    to the transmission of files over a network when we want assurance that the file
    was not compromised during transmission.


    `MAC` codes provide only a limited assurance of authentication. Where a message
    along with a `MAC` code is received, we can only conclude that the message was
    sent by a person who has the symmetric encryption key. In particular, a person
    can purport to send a message as some other person who has the secret key, and
    the impersonated individual will not be able to repudiate this claim. As we will
    see in a subsequent chapter, digital signatures solve the integrity and authentication
    puzzle.


    You may note an essential difference between cryptographic hash algorithms such
    as `SHA-256` and `MAC` algorithms. Anyone can compute the `SHA-512` message digest
    of a message. In contrast, a shared secret key is required in order to compute
    the `MAC` value of a message.


    ## Conclusion


    Cryptographic hash functions are foundational to blockchain applications. In this
    chapter, we have discussed the properties of cryptographic hash functions. We
    have also examined two prominent cryptographic hash algorithms: the secure hash
    algorithm and `RIPEMD-160`.


    Cryptographic hash algorithms can prove the integrity of messages but cannot prove
    authenticity (who authored the message). We concluded this chapter with a discussion
    of message authentication code algorithms, which can not only prove the integrity
    of messages but also provide a limited form of authentication.


    In the next chapter, we will delve into the foundations of public key cryptosystems.


    # 5. The Alchemy of Public Key Cryptosystems


    This chapter is concerned with what can be termed modern cryptography or asymmetric
    cryptography. In Chapter 3, we studied symmetric encryption and surmised that
    it has a significant scalability problem when the encryption key has to be distributed
    to a large number of recipients. For example, consider the scenario where an encryption
    key has to be distributed to thousands of recipients. Each transmission of the
    key to a recipient carries with it, a certain probability that the key will be
    intercepted by a malevolent actor. The aim of public key cryptosystems, *inter
    alia*, is to solve this scalability problem and also render moot the issue of
    the interception of the secret key by adversaries. The *piece de resistance* of
    the theory of public key cryptosystems are digital signature algorithms; these
    solve three problems simultaneously: (i) assuring the integrity of messages, (ii)
    assuring the authenticity of messages, and (iii) solving the scalability problem.


    Public key cryptosystems find usage in a myriad of modern applications. For example,
    they are used in secure `HTTP` communications, virtual private networks, credit
    cards, ecommerce systems, smart cards, electronic identity cards, and international
    payment systems such as `SWIFT` and now in cryptocurrencies and blockchain applications.


    In this chapter, I am going to start by summarizing the problem of distributing
    symmetric encryption keys and then provide a brief description of the canonical
    digital signature algorithm. After this, I will provide you with some of the mathematical
    theory underlying public key cryptosystems and finally proceed to discuss digital
    signature algorithms in greater depth. I will also provide code examples in Python
    as we proceed.'
