- fmt: '# The Helium Wallet Interface


    A Helium wallet maintains the following dictionary data structure:


    ```

    wallet_state = {

    "keys": [],          # list of private-public key tuples

    "received": [],      # values received by the wallet holder

    "spent": [],         # values transferred by the wallet holder

    "received_last_block_scanned": 0,

    "spent_last_block_scanned": 0

    }

    ```


    `wallet_state` describes the state of the wallet at a given point in time.


    `wallet["keys"]` is a list of the private-public key-pair tuples owned by the
    wallet holder. The wallet application can create private-public keys.


    `wallet["received"]` is a list of all the values received by the wallet holder.
    Each element in this list has the structure:


    ```

    {

    "value": value

    "blockno": block_height

    "fragmentid: transaction["transactionid"] + "_" + str(index)

    "public_key" = key_pair[1]

    }

    ```


    `wallet["spent"]` is a list of all the values transferred by the wallet holder.
    Each element in this list has the same structure as `wallet["received"]`.


    `wallet["received_last_block_scanned"]` is the last block of the blockchain that
    was scanned when the blockchain was scanned for values received.


    `wallet["spent_last_block_scanned"]` is the last block of the blockchain that
    was scanned when the blockchain was scanned for values transferred by the wallet
    holder.


    Our Helium wallet contains the following interface functions:


    ## Key Management


    ```

    create_keys() -> "public, private key tuple"

    ```


    This function creates a public-private key pair that can be used in a transaction.


    ## Transaction Record


    ```

    value_received(block_height -> "integer" = 0) ->   "boolean"

    ```


    `value_received` creates a list of helium values that have been received by the
    wallet holder. `block_height` is an optional parameter that directs the function
    to get the values received since and including the block with the given height.
    This function returns `False` if the function fails and `True` otherwise.


    `value_received` creates or updates the `wallet_state["received"]` key value.


    The algorithm for this function relies upon the observation that a `vout` element
    of a transaction that transfers value to the wallet holder contains a public key
    generated by the wallet holder in the encoded form `RIPEMD-160(SHA-256(public_key))`.


    The pseudo-code for this function is:


    ```

    let values_received = []

    for each block where block["height"] >= block_height:

    for each transaction trx in the block:

    for each vout array element in trx:

    for each public_key, pk, owned by the wallet holder:

    if RIPEMD-160(SHA-256(pk)) == vout_element["ScriptPubKey][3]:

    values_received.append {

    value: vout_element[value]

    block: block["height"]

    transaction: trx[transactionid]

    public_key: pk

    }

    ```


    The function `value_spent` creates a list of helium values that have been transferred
    by the wallet holder to other entities. `block_height` is an optional parameter
    that directs the function to get the values transferred after the block with the
    given height (inclusive of this block).


    ```

    value_spent(block_height -> "integer" = 0) ->   "list"

    ```


    This function relies on the observation that each value transferred by the wallet
    holder to some entity will be identified by a `vin` element in the transaction
    that contains the wallet holder’s public key. The following pseudo-code implements
    this functionality:


    ```

    let values_spent = []

    for each block where block["height"] >= block_height:

    for each transaction trx in the block:

    for each vin list element, vin_element, in trx:

    for each public_key, pk, owned by the wallet holder:

    if pk == vin_element["ScriptPubKey][1]:

    pointer = vin_element[transactionid] + "_" + \

    vin_element[vout_index]

    values_spent.append {

    value: vin_element[value],

    block: block["height"],

    transaction: pointer,

    public_key: pk

    }

    ```


    ## Persistence


    ```

    save_wallet() → "boolean"

    ```


    The `save_wallet` function saves `wallet_state`. In particular, `wallet_state`
    is persisted to the disk file `wallet.dat`:


    ```

    load_wallet()   ->  "dictionary"

    ```


    This function loads all of the wallet data from `wallet.dat` into the `wallet_state`
    structure.


    Note that because the state of the wallet is persisted, we do not have to interrogate
    the entire blockchain to update the wallet. We simply need to examine the blocks
    from parameters `received_last_block_scanned` and `spent_last_block_scanned` onward.'
