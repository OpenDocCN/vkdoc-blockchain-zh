  trans: '

    # 更新 Helium 区块链模块


    现在我们已经拥有一个功能完整的交易模块；接下来需要更新 `hblockchain` 模块，让其能够验证区块中的交易。请确保将 `tx` 模块导入到 `hblockchain`
    中。删除 `hblockchain` 模块中的 `add_block` 函数，并添加以下替代函数：


    ```

    def add_block(block: "dictionary") -> "bool":

    """

    add_block: 向区块链添加一个区块。接收一个区块。

    检查区块属性是否有效，并验证区块中的每一笔交易。

    如果没有任何错误，则将区块以原始字节序列的形式写入文件。

    随后将该区块添加到区块链中。

    如果区块成功添加到区块链则返回 True，否则返回 False。

    """

    try:

    # 验证接收到的区块参数

    if validate_block(block) == False:

    raise(ValueError("block validation error"))

    # 验证区块中的交易

    for trx in block[''tx'']:

    # 区块中的第一笔交易是 coinbase 交易

    if block["height"] == 0 or block[''tx''][0] == trx: zero_inputs = True

    else: zero_inputs = False

    if tx.validate_transaction(trx, zero_inputs) == False:

    raise(ValueError("transaction validation error"))

    # 将区块序列化到文件

    if (serialize_block(block) == False):

    raise(ValueError("serialize block error"))

    # 将区块添加到内存中的区块链

    blockchain.append(block)

    except Exception as err:

    print(str(err))

    logging.debug(''add_block: exception: '' + str(err))

    return False

    return True

    ```


    此方法会在将区块添加到区块链之前，验证该区块中的所有交易。


    ## 本章小结


    在本章中，我们编写了用于验证 Helium 交易的程序代码。我们还为交易程序代码编写了单元测试。最后，我们优化了 Helium 区块链代码，使其在将区块添加到区块链之前验证交易。


    你可能已经注意到，我们尚未实现从先前交易中检索未花费交易值的代码。此功能在我们的单元测试中被模拟了。下一章将解决这个问题。


    我们将为 Helium 实现两个数据库。与比特币类似，我们将实现一个 LevelDB 数据库，用于验证和获取未花费的交易金额。我们还将实现第二个 LevelDB
    数据库，以便快速定位特定交易所在的区块。


    # 12. 链状态


    在上一章中，我们实现了验证交易完整性的程序代码。这段代码中有一个重大遗漏：我们没有解决如何从先前交易中获取未花费值的问题，也没有处理验证先前交易中未花费值的相关事宜。遗漏的原因是未花费值是在键值存储中实现的。在本章中，我们将通过为交易实现一个键值存储来弥补这一不足。我们还将实现一个键值存储，用于确定包含特定交易的区块。


    简而言之，键值存储是一种将键映射到值的数据结构。给定一个键，我们可以获取与其关联的值。存储中的键是唯一的。如果你想要一个类比，那么电话簿就是一个很好的模拟键值存储的例子。键值存储的主要且显著的优势在于它提供了对存储的随机访问。因此，获取、修改和删除键值都极其快速。一个非常大的持久化键值存储可以在一次磁盘访问中搜索并获取一个值。


    在比特币中，未花费交易值的键值存储是通过 LevelDB 数据库实现的。Helium 在其实现中也使用了 LevelDB。本书附录 2 对安装和使用 LevelDB
    进行了很好的介绍。如果你不熟悉 LevelDB，应该阅读该附录。LevelDB 是一个特别简单的键值存储。这是有意为之的设计。LevelDB 的设计目标是实现一个极其简单、速度极快且具有极高可靠性的持久化存储。例如，你会注意到
    LevelDB 仅支持字符串键和字符串值，并且 API 接口非常小。


    ## 查找未花费的交易值


    在比特币和 Helium 中，区块作为普通文本文件存储在磁盘上。区块不存储在数据库中。这是一个刻意的设计特性。比特币的设计目标是将加密货币的实现保持在尽可能简单的水平。这最大化了可靠性。通过简单地将区块作为普通二进制文件存储到磁盘，确保区块成功写入磁盘的责任就落在了操作系统的肩上。此外，操作系统必须确保这些文件不会损坏。加密货币应用程序只需检查操作系统对写入区块请求的响应。这种基于文件的区块存储实现还有另一个原因。在比特币和
    Helium 中，所有数据库和其他所需的数据结构都可以从这些区块文件从头开始构建。因此，唯一重要的故障点是任何缺失或损坏的区块文件。由于区块链是不可变的结构，区块文件也必须是不可变的、一次写入、多次读取的结构。确保区块文件完整性的主要责任在于操作系统。这种区块存储的实现比将区块存储在
    SQL 或 NoSQL 数据库中要简单得多。


    然而，这种基于文件的区块存储模型存在一个固有的缺陷。考虑一笔交易，我们想要使用某笔先前交易中的某个值。进一步假设我们只有与该值对应的交易 ID。我们必须从包含该交易的区块中检索该交易，然后确定该值是否未被花费。由于区块没有索引，这将需要搜索所有区块文件以找到该特定交易，然后搜索后续是否有交易花费了这个值。例如，如果区块链由一千万个区块文件组成，那么这种搜索显然会慢得不可接受。在现实世界的应用中，每秒可能有数千笔交易。


    交易存储可以通过在内存键值存储中维护交易元数据来解决这一可扩展性问题。每次发生交易时，应用程序都会将与该交易相关的元数据保存到键值存储中，并将这些数据持久化到磁盘。现在，如果应用程序需要查询区块链有关某一交易的信息，它会搜索键值存储，由于这种存储提供随机访问，响应几乎是即时的。我们将构建一个
    LevelDB 数据库实现，为交易提供这种能力，并构建第二个 LevelDB 数据库，允许我们查询包含特定交易的区块。

    '
- fmt: '## Chainstate Database Design


    We will call the LevelDB database that provides the capability to query the unspent
    status of transaction outputs, a Chainstate database or simply Chainstate. Chainstate
    will let us determine whether a particular transaction exists and whether a particular
    transaction value is unspent. In addition, Chainstate will provide other metainformation
    that is useful for transaction processing.


    A Chainstate database is also invaluable in constructing wallets. Bitcoin-like
    cryptocurrencies do not maintain an account for each entity that conducts transactions.
    Instead, the cryptocurrency network maintains a distributed ledger that records
    transactions as they occur. Clients that use such a cryptocurrency must maintain
    their own wallets to conduct transactions. Such a wallet will contain the user’s
    public-private key pairs and the unspent values available at public addresses
    that the wallet holder has created. A wallet will provide a history of transactions
    that the wallet holder has consummated. Finally, a wallet will also let the user
    create public-private keys for use in transactions. You will note that in the
    absence of such a wallet, the client would have to maintain a local copy of the
    entire blockchain and query the blockchain every time she wanted to engage in
    a transaction.


    The following is the record structure for the Chainstate Database:


    ```

    key: "transaction_index" + "_" + "vout_index"

    value: {

    "pkhash":

    "value":

    "spent":

    "tx_chain"

    }

    ```


    The key, called a transaction key, is the concatenation of a transaction id and
    an index into the *vout list* at which a value of interest is located. These two
    pieces of information are sufficient to identify a value in a previous transaction.
    Due to the properties of transaction IDs, a transaction key is guaranteed to be
    universally unique.


    The value associated with a key is a dictionary. We call this key value a transaction
    fragment. Its fields are interpreted as follows.


    `value` is a positive number. It is the quantum of helium cents spendable in this
    transaction, which is pointed to by the `transactionid` and `vout index` in the
    transaction key. `value` is an integer.


    `pk_hash` is the string of the form


    ```

    "pk_hash": RIPEMD_160(SHA-256(public_key))

    ```


    `pk_hash` is constructed from the public address that the recipient of the value
    has provided to the transferor of the value.^([^(53)](#fn53))


    `spent` is a boolean type. It is True if the value has been spent and False otherwise.


    `tx_chain` points to the transaction input that has spent this output. `tx_chain`
    will be empty if the output has not been spent.


    Since a LevelDB database only accepts string keys and values, we must convert
    the transaction fragment dictionary to a string before insertion into the database.^([^(54)](#fn54))
    In Python, this can be easily accomplished with the `dumps` function in the `json`
    module.


    Our Chainstate Database will have five interface functions:


    ```

    open_chainstate(directory_path: "string")

    close_chainstate()

    put_transaction(key: "string", value: "dictionary") => "bool"

    get_transaction(key: "string") => "bool or string"

    transaction_update(key: "string") => "bool"

    ```


    The `open_chainstate` function opens the Helium LevelDB Chainstate database and
    creates it if it does not exist. This function receives a full or partial file
    path parameter, inclusive of the database name. `close_chainstate` closes the
    database.


    The `get_transaction` function receives a transaction key which has the form “`transaction
    id` + `"_"` + `str(vout_index)`”. This function returns the transaction fragment
    pertaining to this key or False if the key does not exist in Chainstate.


    The `put_transaction` function adds a key-value pair to Chainstate. This function
    receives a transaction key and a transaction fragment as arguments. It returns
    True if the key-value pair is added to Chainstate and False otherwise. `put_transaction`
    performs synchronous writes into the Chainstate.


    The LevelDB API expects byte string arguments and returns byte strings. A byte
    string is a length-prefixed string (as opposed to a string that has a null terminator
    `''\0''`. This is required to ensure transmission portability across networks.
    These conversions are handled internally by our interface functions. The LevelDB
    API also contains functions that permit key-value pairs to be batched before they
    are written into the store; this is a performance feature.


    The `transaction_update` function updates the Chainstate database when a transaction
    value is spent. This function ensures that the previous transaction fragment,
    whose value is being spent, does in fact exist. It prevents “double-spending”
    of a spent value. This function marks a transaction fragment as spent and sets
    the fragment attribute `tx_chain` to the transaction fragment that has received
    the spendable value. This function receives a transaction as its argument.


    We can now implement program code for the chainstate module.


    ## Chainstate Database Code


    Make sure that you have compiled and installed the LevelDB database. Additionally,
    ensure that you have installed the LevelDB Python interface, the `plyvel` module,
    in your virtual Helium environment. Instructions for this are in Appendix 2.


    Next, we will create an empty Helium LevelDB database. This database will be located
    in the `data` sub-directory of the root of Helium. Traverse to the root of your
    virtual environment, enter the Python shell, and do


    ```

    $(virtual) python

    >>> import plyvel

    # create the Helium Chainstate key-value store

    >>> db = plyvel.DB(''data/heliumdb/'')

    ```


    If you traverse to the `data` directory, you will see a `heliumdb` sub-directory.
    This sub-directory contains the Chainstate files.


    We are now ready for a walkthrough to the Helium Chainstate program code. Copy
    the following code into a file called `hchaindb.py` and then copy this file into
    the `chainstate` sub-directory of the root.


    Helium has a particularly simple implementation for tracking and summarizing transactions.
    The `open_hchainstate` function receives a full or partial file path including
    the name of the LevelDB database. It opens the Helium Chainstate database that
    is named in the path and creates this database if it does not exist. This function
    does not create any sub-directories listed in the file path if they do not exist.
    If the function succeeds, it returns a handle to the Chainstate database. In the
    event of a failure, the function returns False.


    The `close_hchainstate` function receives a handle to the Chainstate and closes
    the database in an orderly fashion.


    The `put_transaction` function receives a transaction key and a transaction fragment
    as its arguments. `put_transaction` returns True if it succeeds in inserting the
    `transactionid`, `transaction fragment` key-value pair into the Chainstate database.
    Otherwise, `put_transaction` returns False.


    The `get_transaction` function has a transaction key argument and returns the
    transaction fragment associated with this key (along with the checksum). If the
    transaction key is fictitious, `get_transaction` returns False.


    The `update_transaction` function updates the Chainstate when previous unspent
    values are spent. In particular, it prevents double-spending an unspent value
    two or more times. This function has a transaction as its argument:'
