- fmt: "# The Characteristics of Bitcoin and Its Impact\n\nThe characteristics of\
    \ bitcoin constitute a threat to the stability and presumed legitimacy of conventional\
    \ fiat currencies, and in consequence, there is a concerted effort by governments\
    \ across the world to control or criminalize the propagation of bitcoin. Aside\
    \ from the fact that bitcoin impinges upon the presumed sole sovereign prerogative\
    \ of a government to create money, what concerns authorities is the constraints\
    \ imposed upon their fiat currencies by their convertibility into bitcoin. One\
    \ of the main avenues to control the diffusion of bitcoin into the fiat money\
    \ system is the control or prohibition of the conversion of fiat currencies into\
    \ bitcoin.\n\nTable [1-4](#492478_1_En_1_Chapter.xhtml#Tab4) summarizes the difference\
    \ between bitcoin and fiat currencies.\n\n**Table 1-4**  \n*Differences between\
    \ Bitcoin and fiat currency systems*\n\n| | Bitcoin | Fiat Currency System |\n\
    | --- | --- | --- |\n| Centralized | No | Yes |\n| Currency is scarce | Yes |\
    \ No |\n| Currency creation | Mathematical algorithm (mining) | Central bank |\n\
    | Trust is required | No | Yes |\n| Transactions require financial institutions\
    \ | No (peer to peer) | Yes |\n| Transactions are irrevocable | Yes (escrow available)\
    \ | No |\n| Transactions are anonymous | Pseudo-anonymous | No |\n| Transaction\
    \ completion time | Very fast | Slow |\n| Transaction costs | Low | High |\n\n\
    ## The Darknet\n\nThe emergence of Bitcoin as a near money has also expanded the\
    \ scope of the Darknet. The Darknet can be described as an overlay of encrypted\
    \ nodes on the Internet which requires a specific protocol to access it. The largest\
    \ component of the Darknet are peer-to-peer file sharing systems that distribute\
    \ copyrighted material (principally movies). This segment of the Darknet relies\
    \ primarily upon the `BitTorrent` protocol. `Pirate Bay` nodes are a significant\
    \ player in this segment of the Darknet. The second important component of the\
    \ Darknet is its role as a virtual marketplace for contraband. This aspect of\
    \ the Darknet relies upon two facets: firstly bypassing the conventional banking\
    \ system by transacting only in bitcoin or some other cryptocurrency and secondly\
    \ the utilization of the TOR (The Onion Router) network to encrypt and hide the\
    \ activities of transacting parties. `TOR` relies upon public key encryption,\
    \ which we will study in detail in a subsequent chapter.\n\n## Conclusion\n\n\
    In this chapter, we have surveyed the history of money from the Neolithic age\
    \ to the emergence of bitcoin. In the course of our historical excursion, we have\
    \ studied coinage in the Roman Empire, the gold standard, and the Petrodollar\
    \ system. We have also explained how the fractional reserve banking system works\
    \ and the equation of money. We concluded our survey by looking at the emergence\
    \ of Bitcoin and the main characteristics which differentiate it from money.\n\
    \nIn the next chapter, we will look at the cryptocurrency ecosystem in greater\
    \ detail.\n\n# 2. The Cryptocurrency Ecosystem\n\nIn the previous chapter, we\
    \ surveyed the history of money and discussed how bitcoin changes the paradigm\
    \ for currency creation and distribution. We also saw how bitcoin transactions\
    \ differ from transactions in a conventional fiat money system. The advent of\
    \ Bitcoin has spawned a large number of cryptocurrencies which are similar in\
    \ varying degrees to it. They differ from Bitcoin in their characteristics, such\
    \ as the total number of coins that can be produced, the speed and manner in which\
    \ transactions are consummated, as well as the manner in which the cryptocurrency\
    \ reaches consensus as to which transactions are valid. Furthermore, as we will\
    \ see subsequently in this chapter, many cryptocurrencies are designed to handle\
    \ domain-specific use cases.\n\nIn this chapter, we will review the characteristics\
    \ of some of the more prominent alternate cryptocurrencies (called altcoins),\
    \ such as Ethereum, Bitcoin Cash, Litecoin, Ripple, Binance Coin, Basic Attention\
    \ Token, TRON, Monero, and Tether. If you are completely new to the cryptocurrency\
    \ ecosystem, you may not understand some of the terminology used in this chapter.\
    \ Do not let this detract you; you can come back to this chapter after reading\
    \ some of the subsequent chapters.\n\nBefore we proceed further, recall that in\
    \ order for a currency to be properly classified as a cryptocurrency, it must\
    \ have the following two essential characteristics: firstly, the process by which\
    \ the currency is created and distributed must be decentralized, and, secondly,\
    \ the determination of transaction validity (consensus) must also be decentralized.\n\
    \n## Ethereum\n\nIn terms of capitalization, Ethereum (ETH^([¹](#fn1))) is the\
    \ second most popular cryptocurrency after Bitcoin. Ethereum differs substantially\
    \ from Bitcoin.\n\nBitcoin is a value transfer network. The Bitcoin network transfers\
    \ value (bitcoins) between transacting parties and keeps an accounting of the\
    \ total value owned by all parties in a distributed ledger called a blockchain.\
    \ The contract on which the transfer of value is premised is outside the Bitcoin\
    \ ecosystem. Ethereum is a bit different. Like Bitcoin, Ethereum transfers value\
    \ between transacting parties; however, the contract which transfers value between\
    \ entities can be specified on the Ethereum blockchain. Thus, the Ethereum blockchain\
    \ provides an accounting of the Ether (the Ethereum coin) held by entities and\
    \ can also encode contracts which transfer value (*ether*) between entities. These\
    \ contracts are called smart contracts.\n\nEthereum came on the scene with Vitalik\
    \ Buterin’s white paper in 2014.^([²](#fn2)) In this paper, Buterin describes\
    \ a cryptocurrency ecosystem which permits users to write contracts that can transfer\
    \ value conditionally at some point in the future. These contracts are coded in\
    \ a Turing complete language called `Solidity`. `Solidity` is a simple language\
    \ containing control flow and loop constructs. Ethereum uses `Solidity` to specify\
    \ conditions under which value is transferred between entities.\n\nA language\
    \ is called Turing complete if it can simulate all of the operations of a Turing\
    \ machine. A Turing machine is an abstract machine with the following components.\
    \ Firstly, there is an infinitely long tape which is divided into a sequence of\
    \ cells. The machine has an alphabet consisting of a finite number of symbols\
    \ and a special alphabetic character called a blank symbol. The machine also has\
    \ a finite number of states. Each state describes a rule to write to a cell, optionally\
    \ move to another adjacent cell, and migrate to another state. The machine starts\
    \ at a certain cell on the tape (“we can say that the tape head is on the cell”)\
    \ and has a certain state. The tape head can read the symbol under the tape head\
    \ and depending on the current state write a new symbol to the cell and then move\
    \ the tape head one cell to the left or the right and go to a new state. For example,\
    \ state 1 of the machine may have the rule “if the symbol read is 0, then write\
    \ 1 to the cell and move the head one cell to the left and then go to state 3.”\
    \ The essential characteristic of a Turing machine is that any computer algorithm\
    \ can be represented by such a machine. Most computer languages are Turing complete,\
    \ meaning their syntax can represent any computer algorithm.\n\nAside from smart\
    \ contracts, Ethereum provides a platform for developing distributed applications\
    \ (called `DApp(s)`). `DApp(s)` can issue their own cryptocurrencies called tokens.\
    \ For example, if you want to interact with or use a particular `dapp`, you may\
    \ need to buy tokens issued by the `dapp`. The rules for issuing these tokens\
    \ are set out in an Ethereum standard called `ERC-20`.\n\nFinally, note that smart\
    \ contracts and `DApp(s)` are executed by the Ethereum Virtual Machine (`EVM`).\
    \ A smart contract encoded in `Solidity` is transpiled to bytecode for execution\
    \ by the `EVM`. Note that since Ethereum is a distributed peer-to-peer network,\
    \ each node in the network maintains its own copy of the `EVM`."
  raw: 'The characteristics of bitcoin constitute a threat to the stability and presumed
    legitimacy of conventional fiat currencies, and in consequence, there is a concerted
    effort by governments across the world to control or criminalize the propagation
    of bitcoin. Aside from the fact that bitcoin impinges upon the presumed sole sovereign
    prerogative of a government to create money, what concerns authorities is the
    constraints imposed upon their fiat currencies by their convertibility into bitcoin.
    One of the main avenues to control the diffusion of bitcoin into the fiat money
    system is the control or prohibition of the conversion of fiat currencies into
    bitcoin.


    Table [1-4](#492478_1_En_1_Chapter.xhtml#Tab4) summarizes the difference between
    bitcoin and fiat currencies.


    Table 1-4


    Differences between Bitcoin and fiat currency systems


    |   | Bitcoin | Fiat Currency System |

    | --- | --- | --- |

    | Centralized | No | Yes |

    | Currency is scarce | Yes | No |

    | Currency creation | Mathematical algorithm (mining) | Central bank |

    | Trust is required | No | Yes |

    | Transactions require financial institutions | No (peer to peer) | Yes |

    | Transactions are irrevocable | Yes (escrow available) | No |

    | Transactions are anonymous | Pseudo-anonymous | No |

    | Transaction completion time | Very fast | Slow |

    | Transaction costs | Low | High |


    ## The Darknet


    The emergence of Bitcoin as a near money has also expanded the scope of the Darknet.
    The Darknet can be described as an overlay of encrypted nodes on the Internet
    which requires a specific protocol to access it. The largest component of the
    Darknet are peer-to-peer file sharing systems that distribute copyrighted material
    (principally movies). This segment of the Darknet relies primarily upon the BitTorrent
    protocol. Pirate Bay nodes are a significant player in this segment of the Darknet.
    The second important component of the Darknet is its role as a virtual marketplace
    for contraband. This aspect of the Darknet relies upon two facets: firstly bypassing
    the conventional banking system by transacting only in bitcoin or some other cryptocurrency
    and secondly the utilization of the TOR (The Onion Router) network to encrypt
    and hide the activities of transacting parties. TOR relies upon public key encryption,
    which we will study in detail in a subsequent chapter.


    ## Conclusion


    In this chapter, we have surveyed the history of money from the Neolithic age
    to the emergence of bitcoin. In the course of our historical excursion, we have
    studied coinage in the Roman Empire, the gold standard, and the Petrodollar system.
    We have also explained how the fractional reserve banking system works and the
    equation of money. We concluded our survey by looking at the emergence of Bitcoin
    and the main characteristics which differentiate it from money.


    In the next chapter, we will look at the cryptocurrency ecosystem in greater detail.


    # 2. The Cryptocurrency Ecosystem


    In the previous chapter, we surveyed the history of money and discussed how bitcoin
    changes the paradigm for currency creation and distribution. We also saw how bitcoin
    transactions differ from transactions in a conventional fiat money system. The
    advent of Bitcoin has spawned a large number of cryptocurrencies which are similar
    in varying degrees to it. They differ from Bitcoin in their characteristics, such
    as the total number of coins that can be produced, the speed and manner in which
    transactions are consummated, as well as the manner in which the cryptocurrency
    reaches consensus as to which transactions are valid. Furthermore, as we will
    see subsequently in this chapter, many cryptocurrencies are designed to handle
    domain-specific use cases.


    In this chapter, we will review the characteristics of some of the more prominent
    alternate cryptocurrencies (called altcoins), such as Ethereum, Bitcoin Cash,
    Litecoin, Ripple, Binance Coin, Basic Attention Token, TRON, Monero, and Tether.
    If you are completely new to the cryptocurrency ecosystem, you may not understand
    some of the terminology used in this chapter. Do not let this detract you; you
    can come back to this chapter after reading some of the subsequent chapters.


    Before we proceed further, recall that in order for a currency to be properly
    classified as a cryptocurrency, it must have the following two essential characteristics:
    firstly, the process by which the currency is created and distributed must be
    decentralized, and, secondly, the determination of transaction validity (consensus)
    must also be decentralized.


    ## Ethereum


    In terms of capitalization, Ethereum (ETH^([¹](#fn1))) is the second most popular
    cryptocurrency after Bitcoin. Ethereum differs substantially from Bitcoin.


    Bitcoin is a value transfer network. The Bitcoin network transfers value (bitcoins)
    between transacting parties and keeps an accounting of the total value owned by
    all parties in a distributed ledger called a blockchain. The contract on which
    the transfer of value is premised is outside the Bitcoin ecosystem. Ethereum is
    a bit different. Like Bitcoin, Ethereum transfers value between transacting parties;
    however, the contract which transfers value between entities can be specified
    on the Ethereum blockchain. Thus, the Ethereum blockchain provides an accounting
    of the Ether (the Ethereum coin) held by entities and can also encode contracts
    which transfer value (*ether*) between entities. These contracts are called smart
    contracts.


    Ethereum came on the scene with Vitalik Buterin’s white paper in 2014.^([²](#fn2))
    In this paper, Buterin describes a cryptocurrency ecosystem which permits users
    to write contracts that can transfer value conditionally at some point in the
    future. These contracts are coded in a Turing complete language called Solidity.
    Solidity is a simple language containing control flow and loop constructs. Ethereum
    uses Solidity to specify conditions under which value is transferred between entities.


    A language is called Turing complete if it can simulate all of the operations
    of a Turing machine. A Turing machine is an abstract machine with the following
    components. Firstly, there is an infinitely long tape which is divided into a
    sequence of cells. The machine has an alphabet consisting of a finite number of
    symbols and a special alphabetic character called a blank symbol. The machine
    also has a finite number of states. Each state describes a rule to write to a
    cell, optionally move to another adjacent cell, and migrate to another state.
    The machine starts at a certain cell on the tape (“we can say that the tape head
    is on the cell”) and has a certain state. The tape head can read the symbol under
    the tape head and depending on the current state write a new symbol to the cell
    and then move the tape head one cell to the left or the right and go to a new
    state. For example, state 1 of the machine may have the rule “if the symbol read
    is 0, then write 1 to the cell and move the head one cell to the left and then
    go to state 3.” The essential characteristic of a Turing machine is that any computer
    algorithm can be represented by such a machine. Most computer languages are Turing
    complete, meaning their syntax can represent any computer algorithm.


    Aside from smart contracts, Ethereum provides a platform for developing distributed
    applications (called DApp(s)). DApp(s) can issue their own cryptocurrencies called
    tokens. For example, if you want to interact with or use a particular dapp, you
    may need to buy tokens issued by the dapp. The rules for issuing these tokens
    are set out in an Ethereum standard called ERC-20.


    Finally, note that smart contracts and DApp(s) are executed by the Ethereum Virtual
    Machine (EVM). A smart contract encoded in Solidity is transpiled to bytecode
    for execution by the EVM. Note that since Ethereum is a distributed peer-to-peer
    network, each node in the network maintains its own copy of the EVM.'
  trans: "\n# 比特币的特性及其影响\n\n比特币的特性对传统法定货币的稳定性和假定合法性构成了威胁，因此世界各国政府协同努力，试图控制或定罪比特币的传播。除了比特币侵犯了政府被认为独有的货币创造主权之外，当局还担心其法定货币因可与比特币兑换而受到的约束。控制比特币向法定货币体系扩散的主要途径之一，就是控制或禁止将法定货币兑换为比特币。\n\
    \n表 1-4 总结了比特币与法定货币之间的差异。\n\n**表 1-4**  \n*比特币与法定货币体系的差异*\n\n| | 比特币 | 法定货币体系\
    \ |\n| --- | --- | --- |\n| 中心化 | 否 | 是 |\n| 货币稀缺 | 是 | 否 |\n| 货币创造方式 | 数学算法（挖矿）\
    \ | 中央银行 |\n| 需要信任 | 否 | 是 |\n| 交易需要金融机构 | 否（点对点） | 是 |\n| 交易不可撤销 | 是（可提供托管服务）\
    \ | 否 |\n| 交易匿名性 | 伪匿名 | 否 |\n| 交易完成时间 | 非常快 | 慢 |\n| 交易成本 | 低 | 高 |\n\n## 暗网\n\
    \n比特币作为一种近似货币的出现，也扩大了暗网的范畴。暗网可被描述为互联网上由加密节点组成的覆盖网络，需要特定的协议才能访问。暗网的最大组成部分是分发受版权保护材料（主要是电影）的点对点文件共享系统。暗网的这一部分主要依赖\
    \ `BitTorrent` 协议。`Pirate Bay` 节点是暗网这一部分的重要参与者。暗网的第二个重要组成部分，是它作为违禁品虚拟市场的作用。暗网的这一方面依赖于两个要素：一是仅通过比特币或其他加密货币进行交易，从而绕过传统银行系统；二是利用\
    \ TOR（洋葱路由）网络来加密并隐藏交易双方的活动。`TOR` 依赖于公钥加密，我们将在后续章节中详细学习。\n\n## 结语\n\n在本章中，我们考察了从新石器时代到比特币出现的货币历史。在此次历史之旅中，我们学习了罗马帝国的铸币、金本位制和石油美元体系。我们还解释了部分准备金银行制度的运作方式以及货币方程式。我们通过审视比特币的出现及其区别于货币的主要特征来结束本章。\n\
    \n在下一章中，我们将更详细地研究加密货币生态系统。\n\n# 2. 加密货币生态系统\n\n在上一章中，我们考察了货币的历史，并讨论了比特币如何改变货币创造与发行的范式。我们还看到了比特币交易与传统法定货币体系交易的不同之处。比特币的出现催生了大量与之相似程度不一的加密货币。它们在特性上与比特币有所区别，例如可产生的硬币总量、交易完成的速度和方式，以及加密货币就哪些交易有效达成共识的方式。此外，正如我们将在本章后面看到的，许多加密货币旨在处理特定领域的用例。\n\
    \n在本章中，我们将回顾一些较为知名的替代加密货币（称为 altcoins）的特性，例如以太坊、比特币现金、莱特币、瑞波币、币安币、基本注意力代币、波场、门罗币和泰达币。如果你对加密货币生态系统完全陌生，可能不理解本章中使用的一些术语。请不要因此气馁；你可以在阅读后续章节后再回到本章。\n\
    \n在继续之前，请回想一下，一种货币要被恰当地归类为加密货币，它必须具备以下两个基本特征：首先，货币的创造和发行过程必须是去中心化的；其次，交易有效性（共识）的确定也必须是去中心化的。\n\
    \n## 以太坊\n\n就市值而言，以太坊（ETH^(¹)）是仅次于比特币的第二大受欢迎的加密货币。以太坊与比特币有很大不同。\n\n比特币是一个价值传输网络。比特币网络在交易双方之间传输价值（比特币），并在一个称为区块链的分布式账本中记录所有方拥有的总价值。价值转移所依据的合同在比特币生态系统之外。以太坊则略有不同。与比特币一样，以太坊在交易双方之间转移价值；然而，在实体之间转移价值的合同可以在以太坊区块链上指定。因此，以太坊区块链不仅提供了实体持有的以太币（以太坊代币）的账目，还可以对在实体之间转移价值（*以太币*）的合同进行编码。这些合同被称为智能合约。\n\
    \n以太坊随着维塔利克·布特林在 2014 年发布的白皮书而问世。^(²) 在这篇白皮书中，布特林描述了一个允许用户编写合同的加密货币生态系统，这些合同可以在未来某个时点有条件地转移价值。这些合同是用一种图灵完备的语言\
    \ `Solidity` 编写的。`Solidity` 是一种包含控制流和循环结构的简单语言。以太坊使用 `Solidity` 来指定实体之间转移价值的条件。\n\
    \n如果一种语言能够模拟图灵机的所有操作，则称其为图灵完备。图灵机是一种抽象机器，具有以下组件。首先，有一条无限长的纸带，被分成一系列单元格。机器有一个由有限数量符号组成的字母表，以及一个称为空白符号的特殊字母字符。机器还有有限数量的状态。每个状态描述了一条规则：写入一个单元格，可选地移动到另一个相邻单元格，并迁移到另一个状态。机器从纸带上的某个单元格开始（“我们可以说磁头位于该单元格上”），并处于某个状态。磁头可以读取磁头下的符号，并根据当前状态，向该单元格写入一个新符号，然后将磁头向左或向右移动一个单元格，并进入一个新状态。例如，机器的状态\
    \ 1 可能有规则“如果读取到的符号是 0，则向该单元格写入 1，将磁头向左移动一个单元格，然后进入状态 3”。图灵机的本质特征是，任何计算机算法都可以由这样的机器表示。大多数计算机语言都是图灵完备的，这意味着它们的语法可以表示任何计算机算法。\n\
    \n除了智能合约，以太坊还提供了一个开发分布式应用程序（称为 `DApp(s)`）的平台。`DApp(s)` 可以发行自己的加密货币，称为代币。例如，如果你想与某个特定的\
    \ `dapp` 交互或使用它，你可能需要购买该 `dapp` 发行的代币。发行这些代币的规则由名为 `ERC-20` 的以太坊标准规定。\n\n最后，请注意智能合约和\
    \ `DApp(s)` 是由以太坊虚拟机（`EVM`）执行的。用 `Solidity` 编写的智能合约会被转译成字节码，以便在 `EVM` 上执行。请注意，由于以太坊是一个分布式的点对点网络，网络中的每个节点都维护着自己的一份\
    \ `EVM` 副本。\n"
- fmt: '## Bitcoin Cash


    We are going to examine the bitcoin mining process in great detail in a subsequent
    chapter, but for the time being, bear the following description in mind. A block
    consists of a number of transactions. Miners who mine a block can append this
    block to the Bitcoin blockchain. The incentive for a miner is that if he successfully
    mines a block, he will receive a predetermined reward (in bitcoins) for mining
    the block as well as all of the transaction fees for the transactions included
    in this block. The mathematical algorithms underlying bitcoin ensure that a block
    is mined approximately every ten minutes. A block also has a maximum size of 1
    MB. This implicitly sets an approximate upper bound on the number of transactions
    that can be included in a block. This constraint means that Bitcoin is particularly
    poor at high-volume transaction processing. A transaction is approximately 500
    bytes in size, and thus a block can contain approximately 2000 transactions.^([³](#fn3))
    Thus, the bitcoin network can process about 12,000 transactions in an hour or
    about 3.3 transactions per second. This is particularly poor performance. For
    example, VISA can process about 10,000 transactions in a second. This constraint
    also indicates that bitcoin cannot efficiently process transactions at scale for
    a bitcoin-based economy.


    `Bitcoin Cash` is a hard fork of bitcoin that attempts to increase the performance
    of Bitcoin by increasing the maximum size of a block to 7 MB. Other than this
    change, `Bitcoin Cash` is virtually identical to Bitcoin.


    A hard fork takes an existing corpus of source code and makes a copy of it. Source
    code changes are then made to the forked copy which diverge from the source which
    was forked, and thus we have a body of common code up to the hard fork and divergent
    code bases thereafter.


    ## Ripple


    The main motivation for `Ripple` (`XRP`) is to create a cryptocurrency network
    for high-volume and very fast transaction processing. `Ripple`’s aim is to supplant
    the `SWIFT`^([⁴](#fn4)) network for international transactions. `SWIFT` is a messaging
    network used by participating banks and financial institutions. The messages in
    this network are instructions to a participating financial institution to pay
    value to some other participating entity in the `SWIFT` network. `Ripple`’s target
    are the big payment processors in the `SWIFT` universe.


    International transfer of value is terribly slow. A transfer can take anywhere
    from 24 hours to 5 days. Furthermore, transaction fees are very high. `Ripple`
    aims to implement a blockchain-based solution called `RippleNet`, which promises
    also instantaneous transfer of value, low transaction fees, transaction encryption,
    and strong protection against fraudulent transactions. As a concise summation,
    `Ripple` intends to replace the antiquated `SWIFT` network with its mix of manual
    and automated processing with a decentralized blockchain application.^([⁵](#fn5))


    ## Monero


    `Monero` (`XMR`) is a bitcoin-like cryptocurrency that implements strong protocols
    to ensure the privacy of financial transactions. In Bitcoin, anyone can examine
    the distributed public ledger to determine the parties (bitcoin addresses) involved
    in a financial transaction as well as the amount of value transferred by the transaction.
    Furthermore, anyone can examine the public ledger to determine the amount of bitcoins
    owned by a public address as well as all of the transactions connected with this
    address.


    `Monero` precludes such an examination by implementing an obfuscated public ledger.
    The `Monero` ledger hides the identity (public address) of the sender and the
    receiver of monero in a transaction as well as the amount of the transaction.
    Due to this, the monero transactions are not traceable and a transaction cannot
    be linked to any particular public address.


    You will recall that a dollar bill is fungible, meaning that a one dollar bill
    is the same as any other dollar bill. Furthermore, if we look at a dollar bill
    in our wallet, we cannot determine the past transactions involving this particular
    dollar bill. In contrast, bitcoin is not strictly fungible in this sense. Since
    we anyone can examine the distributed bitcoin ledger, we can determine the complete
    history of transactions associated with a particular bitcoin. So, for example,
    if a bitcoin was involved in an illegal transaction in the past and this bitcoin
    is in your wallet, we can easily ascertain that this bitcoin participated in an
    illegal transaction in the past. Because of this, bitcoin is not a truly fungible
    cryptocurrency. In contrast, monero is fungible since we can never determine the
    past transaction history of a monero unit in your wallet.


    ## Litecoin


    `Litecoin` (`LTC`) was forked from Bitcoin in 2011. `Litecoin` differs from bitcoin
    in two principal ways. Firstly, the maximum number of litecoins that can be mined
    is 84 million compared to 21 million for Bitcoin. Secondly, `Litecoin` blocks
    are mined every 2.5 minutes approximately compared to 10 minutes for bitcoin.


    ## Basic Attention Token


    Digital advertising is the bane of the Internet. We are inundated with advertising,
    and many of us have trained our brains to ignore digital ads. The `Basic Attention
    Token` (`BAT`) presents an ingenious and entirely new paradigm for digital advertising.
    `BAT` is designed to improve the effectiveness of digital advertising, enhance
    privacy, and also reduce the amount of advertising that Internet users are exposed
    to. The `BAT` distributed app consists of the `Brave` browser as well as the `BAT`
    token, which is an Ethereum `ERC-20` token. `BAT` has impeccable credentials.
    This specialized token as well as the browser is the brainchild of `Brendan Eich`,
    the inventor of the first Internet browser, `Netscape Navigator`, and the `JavaScript`
    language.


    The way that it works is as follows. An entity wanting to advertise creates an
    Ethereum smart contract and includes some `BAT` tokens with the contract. When
    a person views this advertisement (in the `Brave` browser), he or she receives
    a portion of the tokens attached to the advertisement. Furthermore, the publisher
    of the page on which the advertisement appears also receives some tokens, and
    lastly, the `Brave` browser also receives some tokens. Notice that if a person
    views an advertisement, he or she is compensated for the attention given to the
    advertisement.


    In the present digital advertising *milieu*, a user’s preferences and viewing
    habits are tracked pervasively and communicated to centralized entities that store
    and analyze this data in order to feed targeted advertisements to the subject
    as well as categorize him or her for other purposes – all without the target’s
    consent. The `Brave` browser only stores the user’s viewing habits and preferences
    locally and does not transmit any of this information to centralized entities.
    Thus, `BAT` and the `Brave` browser present a fairly radical implementation of
    privacy protection.


    ## Binance Coin


    `Binance` is one of the world’s foremost cryptocurrency exchanges. `Binance` provides
    a platform for trading cryptocurrencies. `Binance Coin` (`BNB`) is an Ethereum-hosted
    `ERC-20` token. Its primary use case is the payment of trading fees and listing
    fees on the exchange. Traders receive a discount if they use `BNB` to pay trading
    fees.'
