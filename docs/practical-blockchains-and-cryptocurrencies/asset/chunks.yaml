    # 16. Blockchain Maintenance


    In this chapter, we will examine Helium blockchain maintenance. The following
    topics will be discussed:


    1. How a new Helium node with an empty blockchain acquires blocks from the Helium
    network and synchronizes itself with the distributed blockchain. This procedure
    for acquiring blocks also applies if a node goes down or if there is a temporary
    network partition.

    2. Rebuilding the `Chainstate` database.

    3. Rebuilding the `blk_index` database.


    ## Blockchain Maintenance


    A new node that joins the Helium peer-to-peer network will need to obtain a blockchain.
    Furthermore, the blockchain held by a node may need synchronization if it goes
    down or if there is a temporary network partition.


    The Helium network interface provides two remote procedure calls to handle these
    use cases:


    ```

    get_blockchain_height() -> "integer"

    get_block(block_no: "int") ->  "stringified block or an error string"

    ```


    `get_blockchain_height()` obtains the height of the blockchain held by a remote
    node. The call `get_block()` obtains a specific block from a remote node. Both
    of these remote procedure calls were discussed in the previous chapter.


    I will leave it to you to develop tests to obtain blocks. In a production setting
    and in order to improve performance, you will want to enhance the code to provide
    for the concurrent downloading of blocks from several remote nodes.


    ## Reliability Engineering in Helium


    An application that manages financial transactions must have extreme reliability.
    The cardinal principle is that the application should implement the simplest architectural
    patterns possible to achieve its objectives.


    In the previous chapter, we saw that the distributed peer-to-peer architecture
    of Helium creates a network architecture that cannot be easily degraded. All of
    the nodes in the ecosystem are equal in capability, and anyone can instantiate
    a node and join the Helium network. Furthermore, Bitcoin and Helium have very
    modest requirements and thus can run on inexpensive commodity hardware. It is
    entirely feasible to run a Helium or Bitcoin node on a laptop.


    Furthermore, we saw in the previous section that a Helium node can always synchronize
    its blockchain with the distributed blockchain in the event that the node goes
    down or if there is an unexpected network partition.


    Aside from these reliability features, Helium and Bitcoin implement a single point
    of failure architecture. This point of failure is the block file, which is a simple,
    encoded text file. A blockchain is the collection of these files.


    A Helium node can rebuild all of the data structures and databases that it needs
    for its operation from the blockchain (the collection of block files). Helium
    uses two key-value stores, the `Chainstate` Database and the `blk_index` database,
    and ensures by design that these databases are not critical points of failure.
    In other words, Helium can always rebuild these databases as long as it has all
    of the block files.


    Helium blocks are encoded text files that are read-only. Since a blockchain is
    an immutable structure, block file updates and deletes are not required or supported.
    The create and read operations are handled by the underlying operating system.
    The following code snippet from the `hblockchain` module shows how block persistence
    is implemented in Helium:


    ```

    def add_block(block: "dictionary") -> "bool":

    """

    add_block: adds a block to the blockchain. Receives a block. The block

    attributes are checked for validity and each transaction in the block is

    tested for validity. If there are no errors, the block is written to a file

    as asequence of raw bytes. Then the block is added to the blockchain.

    The chainstate database and the blk_index databases are updated.

    returns True if the block is added to the blockchain and False otherwise

    """

    try:

    # validate the received block parameters

    if validate_block(block) == False:

    raise(ValueError("block validation error"))

    # validate the transactions in the block

    # update the chainstate database

    for trx in block[''tx'']:

    # first transaction in the block is a coinbase transaction

    if block["height"] == 0 or block[''tx''][0] == trx: zero_inputs = True

    else: zero_inputs = False

    if tx.validate_transaction(trx, zero_inputs) == False:

    raise(ValueError("transaction validation error"))

    if hchaindb.transaction_update(trx) == False:

    raise(ValueError("chainstate update transaction error"))

    # serialize the block to a file

    if (serialize_block(block) == False):

    raise(ValueError("serialize block error"))

    # add the block to the blockchain in memory

    blockchain.append(block)

    #  update the blk_index

    for transaction in block[''tx'']:

    blockindex.put_index(transaction["transactionid"], block["height"])

    except Exception as err:

    print(str(err))

    logging.debug(''add_block: exception: '' + str(err))

    return False

    return True

    def serialize_block(block: "dictionary") -> "bool":

    """

    serialize_block: serializes a block to a file using pickle.

    Returns True if the block is serialized and False otherwise.

    """

    index = len(blockchain)

    filename = "block_" + str(index) + ".dat"

    # create the block file and serialize the block

    try:

    f = open(filename, ''wb'')

    pickle.dump(block, f)

    except Exception as error:

    logging.debug("Exception: %s: %s", "serialize_block", error)

    f.close()

    return False

    f.close()

    return True

    ```


    Once a block has been validated, it is persisted to a specific directory.^([(67)](#fn67))
    You will want the blocks written into the `data` directory. The function `serialize_block()`
    writes a block into a directory. As you will notice, it is exceptionally simple.
    Each block is written to a file named


    ```

    "block" + "height of block " + ".dat"

    ```


    This simple naming scheme indexes the block files by height. The genesis block
    has height zero.


    The collection of all of the blocks in the directory is the blockchain.'
