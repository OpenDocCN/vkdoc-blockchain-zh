  trans: '

    # 大萧条与凯恩斯经济学


    1929 年 9 月 4 日，华尔街股市动荡不安，大幅下挫。在随后的一个半月里，股市剧烈震荡，表明投资者和投机者之间存在巨大的不确定性。接着，在 1929
    年 10 月 29 日（黑色星期二），纽约证券交易所的道琼斯工业平均指数暴跌 20%。这标志着大萧条的开始，并使全世界陷入了持续十年的空前经济萧条。美国工业产出下降了近
    40%，贸易额暴跌约 70%，失业率攀升至总人口的 25%。


    对英国和欧洲的影响类似。英国因担心挤兑英镑而放弃了金本位制。当时最主要的经济问题是如何摆脱大萧条，推动世界经济复苏。存在两种截然对立的观点：美国胡佛派主张财政保守主义，认为政府需要缩减开支，以防止公共债务进一步增加。与他们对立的是伟大的英国经济学家约翰·梅纳德·凯恩斯，他在其著作
    *《就业、利息和货币通论》* 中主张，应增加公共工程方面的公共支出，以提供就业机会并促进经济生产。凯恩斯经济学的基本前提是，一旦经济走出萧条，增加的公共债务将因税收收入的增加而得到偿还。这就是凯恩斯经济学的基本原则：在经济衰退和萧条期间应增加公共支出，由此产生的公共债务将在经济复苏时因税收增加而得以清偿。罗斯福总统为将美国经济拉出萧条而制定的经济计划，正是凯恩斯经济学的一次实践。


    凯恩斯经济学隐含着一个思想：货币供应不应与保证货币可兑换成黄金或任何其他贵金属铸币的标准挂钩，也就是说，政府应根据需要自由地印钞或举债，以维持充分就业。这是一个精巧的理论，但历史反复证明，随意印钞的权力就像一种危险且极易上瘾的毒品，最终会摧毁病人。


    # 石油美元体系


    二战结束时，欧洲满目疮痍，美国成为世界上唯一的经济强国。1944 年，美国与欧洲签约国共同签署了《布雷顿森林协定》，签约国同意将其货币与美元按固定汇率挂钩，而美国则同意按每盎司黄金
    35 美元的价格，赎回任何外国央行持有的美元货币。在历史的这个节点上，美国持有世界上大部分的黄金。这一协议使美元取代英镑，成为世界储备货币。布雷顿森林体系实际上也在全球范围内建立了一个以美国为担保人的金本位制。以每盎司黄金
    35 美元的价格兑换的承诺，以及美国迅速扩张的军事和工业实力，确立了美元作为促进国际贸易主要工具的地位。


    18 年后，随着美国卷入越南战争，问题开始显现。美国开始与其贸易伙伴出现持续的国际收支逆差。此外，财政部还必须应对越南战争带来的巨额战争开支和通货膨胀。1971
    年，英国对美元的稳定性失去信心，将其持有的绝大部分美元储备兑换成了黄金。为防止英国的行动引发对美元的挤兑，并保护美国黄金储备不被耗尽，尼克松总统暂停了美元与黄金的兑换。此举将美元转化为一种法定货币。法定货币是一种不能兑换成黄金或任何其他贵重金属的货币，其价值完全来源于使用者愿意将其用作交换媒介和价值储存手段。


    美国财政部意识到，美元脱离了金本位制后，原则上各国没有令人信服的理由再将其用于贸易或作为国际储备货币。因此，迫使各国使用美元作为国际储备货币，而不是依赖各国继续使用法定美元的良好意愿，就显得至关重要。这正是石油美元体系要解决的问题。


    从 1974 年开始，美国与产油国达成协议，在国际市场上仅以美元销售石油。其直接后果是，要求想要购买石油的国家必须持有充足的美元储备。这样的国家可以通过两种方式获得这些储备：要么向美国出售商品并在其外汇账户中收取美元，要么与第三国进行同样的交易。石油美元体系隐含着一个假设，即大多数在海外流通的美元永远不会流回美国——如果世界经济持续扩张，这个假设在很大程度上是成立的。由于这些美元不会回流，这实际上意味着美国可以免费从其他国家购买商品和服务（即，只需印刷美元或发行以美元计价的债务即可）。此外，由于美元不与任何黄金标准挂钩，美联储随意印钞的能力不受限制。目前，美国的联邦债务已达到约
    26 万亿美元。这是帝国过度扩张、不受约束的政府支出（主要用于军事）、无法维持经常性政府开支的薄弱税基、美元不可兑换以及石油美元体系共同作用的结果。


    在石油美元体系之前，一种货币通过发行方保证可以按固定汇率兑换成黄金铸币，从而获得国际储备货币的地位。不希望持有该储备货币的国家可以简单地将其持有的货币储备兑换成黄金。石油美元体系则以一种强制性取代了这一点。想要购买石油的国家必须持有法定美元才能进行此类购买。

    '
- fmt: '# Making Money in a Fractional Banking System


    Throughout the course of history, the power to create money has been viewed as
    a sovereign prerogative. For example, only the Roman emperor had the right to
    create denarius coins. So it might come as a surprise to you that in the modern
    world most of a nation’s money is not created by the treasury but by banks. This
    is a consequence of the fractional reserve banking system.


    In fractional reserve banking, a bank is required by law to hold a certain percentage
    of its deposits on hand to cover withdrawal requests. This is called the reserve
    requirement. Let’s look at how a hypothetical bank can create money *ex nihilo*
    (out of nothing). Suppose we have a bank called Bank of Ontario which has initially
    no deposits or liabilities and has a statutory reserve requirement of 10%. A customer
    comes in and deposits one million dollars. The position of the Bank of Ontario
    is now as shown in Table [1-1](#492478_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1

    Bank Position


    | Total Deposits | $1,000,000 | Loans Made | $0 |

    | Reserve Requirement | $ 100,000 | Available to Lend | $900,000 |


    The Bank of Ontario lends $900,000 to a borrower, and this borrower deposits the
    loan amount with the Bank of Ontario. The financial position of the Bank of Ontario
    is now as shown in Table [1-2](#492478_1_En_1_Chapter.xhtml#Tab2).


    Table 1-2

    Bank Position


    | Total Deposits | $1,900,00 | Loans Made | $900,000 |

    | Reserve Requirement | $190,000 | Available to Lend | $810,000 |


    Notice that the amount of funds that the bank can lend is


    ```

    Amount Available for Loans = Total Deposits – Reserve Requirement – Loans Made

    ```


    The Bank of Ontario now lends $810,000 to a customer who again deposits it with
    the bank. The financial position of the bank is now as shown in Table [1-3](#492478_1_En_1_Chapter.xhtml#Tab3).


    Table 1-3

    Bank Position


    | Total Deposits | $2,710,000 | Loans Made | $1,710,000 |

    | Reserve Requirement | $271,000 | Available to Lend | $729,000 |


    Notice that at this stage the bank has created an extra $1,710,000 of money (deposits
    with the bank) from the initial $1,000,000 deposit.


    And if we continue in this manner, the Bank of Ontario can keep on making loans
    (money) up to a theoretical maximum amount dictated by the money multiplier:


    ```

    Initial Deposit/Reserve Requirement

    ```


    What this means is that if the bank receives a deposit of one million dollars,
    it can create up to ten million dollars in deposits (money) and derive the interest
    income from these loans.


    If the bank charges an interest rate of 6% per annum on its loans to customers,
    it will derive a maximum interest income of $600,000 per annum. As you can appreciate,
    the ownership of a bank in a fractional reserve banking system is a very profitable
    proposition.


    The adherents of the Austrian School of Economics (Friedrich Hayek, Ludwig von
    Mises, Ron Paul, etc.) posit that fractional reserve banking is inherently unstable
    and gives rise to boom-bust cycles, and furthermore, it is a form of legalized
    theft since it gives a preferential class the power to create purchasing power
    (money) out of nothing.


    In monetary theory, `M1` is defined as coins, paper currency, as well as other
    financial instruments that are as liquid as money; these include demand deposits
    at banks, travelers’ checks, and so forth. `M2` includes instruments that cannot
    be readily converted into money, such as bank savings deposits, 30-day treasury
    bills, money market funds, and so forth. `M2` is comprised of instruments that
    take a short, fixed amount of time to convert into `M1` specie.


    It should thus not surprise you that most of `M1` is composed of bank demand deposits.


    ## Essential Monetary Economics


    Let’s take a brief look at the *Equation of Exchange*, which is a basic equation
    in monetary economics. This equation is represented as follows:


    `MV = PT`


    The Equation of Exchange is computed by reference to a fixed period of time, say,
    a year. `M` is the supply of money or `M1`. `V` is the velocity of money or the
    average number of times a unit of the currency circulates during the fixed period
    of time. Except in regimes of hyperinflation, we expect `V` to vary only slightly.
    The reason for this is that individual spending and savings habits are relatively
    stable over time. `P` is the price level in the economy, and `T` is the amount
    of transactions in the economy in the fixed time period. `T` is not the monetary
    value of the transactions in the economy but an independent index measure of the
    physical or real output in the economy.


    The first thing to understand is that the Equation of Exchange is a tautology;
    it is always true. Secondly, this equation shows the relationship between the
    supply of money, the price level, and real output in the economy. For example,
    if the supply of money is increased but physical output does not increase at all,
    then the increased supply of money will be reflected entirely by price inflation.
    Similarly, if the money supply is held constant but physical production increases,
    there will be price deflation, that is, holdings of `M1` will become more valuable.'
