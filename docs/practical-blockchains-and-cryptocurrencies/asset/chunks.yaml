    \ str(vout_index), keyvalue) == True\n    key = txid + \"_\" + str(vout_index)\n\
    \    ret = chain.get_transaction(key)\n    assert ret != False\n    assert type(ret)\
    \ == dict\n\ndef test_get_for_fake_key():\n    \"\"\"\n    attempt to get a key\
    \ value for a fictitious key\n    \"\"\"\n    txid = make_transactionid()\n  \
    \  vout_index = make_vout_index()\n    keyvalue = {\n        \"pkhash\": make_pkhash(),\n\
    \        \"value\":  make_value(),\n        \"spent\":  make_spent(),\n      \
    \  \"tx_chain\": \"\"\n    }\n    assert chain.put_transaction(txid + \"_\" +\
    \ str(vout_index), keyvalue) == True\n    key = \"junk_\" + str(vout_index)\n\
    \    ret = chain.get_transaction(key)\n    assert ret == False\n\ndef test_transaction_update():\n\
    \    \"\"\"\n    updates the HeliumDB to reflect a transaction\n    \"\"\"\n \
    \   # make a synthetic previous transaction\n    num_prev_tx_outputs = secrets.randbelow(5)\
    \ + 1\n    previous_tx = make_synthetic_previous_transaction(num_prev_tx_outputs)\n\
    \    #reflect this previous transaction in HeliumDB\n    ctr = 0\n    for vout\
    \ in previous_tx[\"vout\"]:\n        fragment = {}\n        fragment[\"pkhash\"\
    ] = vout[\"ScriptPubKey\"][2]\n        fragment[\"spent\"] = False\n        fragment[\"\
    value\"] = max(secrets.randbelow(1000000), 10)\n        fragment[\"tx_chain\"\
    ] = \"\"\n        txid = previous_tx[\"transactionid\"] + \"_\" + str(ctr)\n \
    \       chain.put_transaction( txid, fragment)\n        ctr += 1\n    # make a\
    \ transaction consuming some previous transaction outputs\n    trx = make_synthetic_transaction(previous_tx)\n\
    \    #update the Helium Chainstate\n    assert chain.transaction_update(trx) ==\
    \ True\n\ndef test_double_spend():\n    \"\"\"\n    tests transaction update when\
    \ a previous transaction fragment\n    has been spent\n    \"\"\"\n    # make\
    \ a synthetic previous transaction\n    num_prev_tx_outputs = secrets.randbelow(5)\
    \ + 1\n    previous_tx = make_synthetic_previous_transaction(num_prev_tx_outputs)\n\
    \    #reflect this previous transaction in HeliumDB\n    ctr = 0\n    for vout\
    \ in previous_tx[\"vout\"]:\n        fragment = {}\n        fragment[\"pkhash\"\
    ] = vout[\"ScriptPubKey\"][2]\n        fragment[\"spent\"] = True\n        fragment[\"\
    value\"] = max(secrets.randbelow(1000000), 10)\n        fragment[\"tx_chain\"\
    ] = \"\"\n        txid = previous_tx[\"transactionid\"] + \"_\" + str(ctr)\n \
    \       chain.put_transaction( txid, fragment)\n        ctr += 1\n    # make a\
    \ transaction consuming some previous transaction outputs\n    trx = make_synthetic_transaction(previous_tx)\n\
    \    #update the Helium Chainstate\n    assert chain.transaction_update(trx) ==\
    \ 0\n\ndef test_previous_tx_non_existent():\n    \"\"\"\n    tests transaction\
    \ update when a previous transaction does\n    not exist\n    \"\"\"\n    # make\
    \ a synthetic previous transaction\n    num_prev_tx_outputs = secrets.randbelow(5)\
    \ + 1\n    previous_tx = make_synthetic_previous_transaction(num_prev_tx_outputs)\n\
    \    #reflect this previous transaction in HeliumDB\n    ctr = 0\n    for vout\
    \ in previous_tx[\"vout\"]:\n        fragment = {}\n        fragment[\"pkhash\"\
    ] = vout[\"ScriptPubKey\"][2]\n        fragment[\"spent\"] = False\n        fragment[\"\
    value\"] = max(secrets.randbelow(1000000), 10)\n        fragment[\"tx_chain\"\
    ] =  \"\"\n        txid = previous_tx[\"transactionid\"] + \"_\" + str(ctr)\n\
    \        chain.put_transaction( txid, fragment)\n        ctr += 1\n    # make\
    \ a transaction consuming some previous transaction outputs\n    trx = make_synthetic_transaction(previous_tx)\n\
    \    trx[\"vin\"][0][\"txid\"] = \"bad previous tx id\"\n    #update the Helium\
    \ Chainstate\n    assert chain.transaction_update(trx) == False\n```\n\n## Updating\
    \ the tx Module\n\nNow that we have a functional Chainstate module, we can update\
    \ the `tx` module to get previous transaction fragments. Make sure to import the\
    \ `hchaindb` and `json` modules into `tx`. In the `tx` module, remove the `prevtx_value`\
    \ function and insert the following function in lieu thereof:\n\n```python\ndef\
    \ prevtx_value(txkey: \"string\") -> 'bool':\n    \"\"\"\n    examines the chainstate\
    \ database and returns the transaction fragment\n    corresponding to txkey:\n\
    \    {\n        \"pkkhash\":  <pkhash>,\n        \"value\":    <value>,\n    \
    \    \"spent\":    <spent>,\n        \"tx_chain\": <tx_chain>\n    }\n    receives\
    \ a transaction fragment key:\n    \"previous txid\" + \"_\" + str(prevtx_vout_index)\n\
    \    Returns False if the transaction if does not exist, or if the\n    value\
    \ has  been spent or if value is not a positive integer\n    otherwise returns\
    \ the previous transaction fragment data\n    \"\"\"\n    try:\n        fragment\
    \ = hchaindb.get_transaction(txkey)\n        if fragment == False:\n         \
    \   raise(ValueError(\"cannot get fragment from chainstate\"))\n        # return\
    \ False if the value has been spent or if the value is\n        # not positive\n\
    \        if fragment[\"spent\"] == True:\n            raise(ValueError(\"cannot\
    \ respend fragment in chainstate: \" + txkey))\n        if fragment[\"value\"\
    ] <= 0:\n            raise(ValueError(\"fragment value <= 0\"))\n    except Exception\
    \ as err:\n        logging.debug('prevtx_value: exception: ' + str(err))\n   \
    \     return False\n    return fragment\n```\n\n`prevtx_value` returns `False`\
    \ if it is unable to get a transaction fragment from the Chainstate. Chainstate\
    \ will return `False` if the transaction key is fictitious. `prevtx_value` also\
    \ returns `False` if the value item in the returned dictionary is not a positive\
    \ integer or if the value has been spent."
