  trans: "\n# 挖矿过程\n\n一个实体为何要参与挖矿？毕竟，挖矿是一个昂贵的过程，会消耗大量的 CPU 周期，进而耗费电力。其激励来源于交易手续费以及矿工成功挖出一个区块后获得的挖矿奖励。这笔报酬相当可观。任何拥有本地区块链的实体都可以参与加密货币的挖矿。让我们来看看挖矿是如何运作的。\n\
    \n设想一个人发起了一笔转移一定数量加密货币的交易。当交易完成后，加密货币的转出方会将该交易广播至加密货币的对等网络。^(⁵⁵) 拥有本地区块链的矿工（挖矿节点）会监听正在该网络上传播的交易。\n\
    \n矿工面临的任务是构建一个可以添加到区块链上的候选新区块。矿工将交易添加到候选区块中，然后对这个区块进行挖矿。\n\n假设一个矿工接收到了一笔交易。矿工会验证该交易是否有效。如果无效，矿工便会丢弃这笔交易。否则，矿工会将这笔新收到的交易广播给该矿工已发现的其他挖矿节点。\n\
    \n接着，矿工会检查所接收交易的`locktime`。如果该交易计划在未来某个时间点处理，矿工就会将其放入一个本地缓存中，这个缓存存储着未来待处理的交易，被称为`memcache`。如果矿工决定将这笔特定交易纳入其打算挖矿的候选区块，则将其添加到区块中。否则，矿工将该交易添加到`memcache`中。\n\
    \n矿工会访问`memcache`以及新收到的交易，以便将交易添加到其候选区块中。在受限于区块最大尺寸的条件下，矿工完全有权自行决定将哪些交易以及多少交易纳入候选区块。每笔交易都可能附带一笔交易手续费。是否设置交易手续费以及设置多少，完全由价值转出方自行决定。显然，矿工希望最大化其成功挖出候选区块后所能获得的交易手续费。\n\
    \n一旦矿工认为候选区块中的交易数量已经足够，它就会向该区块添加一笔特殊的交易。这笔交易被称为`coinbase 交易`。它是候选区块交易列表中的第一笔交易。`coinbase\
    \ 交易`包含了如果矿工成功挖出该区块将产生的新加密货币数量。这个值被称为`挖矿奖励`。矿工有权获得这笔挖矿奖励。因此，挖矿奖励以及区块内所有交易的总手续费，就是矿工成功挖出该区块后将获得的总收入。\n\
    \n在比特币和 Helium 中，挖矿奖励的数额由一个算法决定，该算法依赖于已经挖出的区块数量。随着区块链规模的增长，挖矿奖励会定期减半。挖矿奖励会渐近地趋向于零。请注意，由于挖矿奖励是新增的货币，它没有对应的`vin`元素。\n\
    \n比特币的挖矿算法意味着最多只能产生 2100 万个比特币。这表明比特币是渐近通缩的；其价值（购买力）必须随着时间的推移而上升。其他加密货币可以实现不同的货币创造算法。例如，挖矿奖励可以是恒定的，或者根据固定时间单位内的交易量而变化。TRON\
    \ 加密货币因其允许通过表面上的分布式委员会共识来创造无限数量的货币单位而声名狼藉。Helium 则遵循比特币的算法。\n\n在将`coinbase 交易`添加到候选区块后，矿工开始构建该区块的区块头。回顾一下，一个\
    \ Helium 区块具有如下的字典结构。排除`tx`列表后的子字典被称为区块头：\n\n```\n{\n\"prevblockhash\":   \n\"\
    version\":         \n\"timestamp\":       \n\"difficulty_bits\": \n\"nonce\":\
    \           \n\"merkle_root\":     \n\"height\":          \n\"tx\":          \
    \    \n}\n```\n\n矿工计算其区块链中最新区块头的 SHA-256 哈希值，并将此值与候选区块的`prevblockhash`键配对。接下来，它计算区块内交易的默克尔根，并将此值也插入到区块头中。同样地，矿工将当前的\
    \ Unix 时间戳、难度系数、初始随机数值和版本号放入区块头。回顾一下，创世区块的高度为 0，后续区块的高度为 1，依此类推。\n\n在矿工设定了区块头之后，它就准备好对候选区块进行挖矿了。\n"
- fmt: "# Mining a Block\n\nNow that the miner has a candidate block ready for mining,\
    \ it can start the actual process. The header block of a candidate block has a\
    \ number called a `nonce`; this is a non-negative integer initialized to zero.\
    \ The `nonce` starts the mining process and is incremented as the process proceeds.\n\
    \nThe miner computes the SHA-256 hexadecimal digest of the block header, which\
    \ includes the `nonce`. This hexadecimal string is converted into a (very large)\
    \ number and compared with the current difficulty number specified for the network.\
    \ If the computed value is less than the difficulty number, the block is said\
    \ to be mined.^([(56)](#fn56)) If the SHA-256 hash is greater than or equal to\
    \ the difficulty number, then the `nonce` is incremented and the SHA-256 hash\
    \ is recomputed and again compared to the difficulty number. This process continues\
    \ until a hashed value less than the difficulty number is obtained.\n\nIn Bitcoin,\
    \ the `nonce` is a 32-bit integer, and it frequently happens that the computed\
    \ value will fail to fall below the difficulty number as the computation runs\
    \ through the entire range of 2**32 – 1 `nonces`. If this occurs, the `nonce`\
    \ is again initialized at 0 and is placed in the transaction id field of the first\
    \ `vin` list element of the coinbase transaction. This is not a concern for our\
    \ Python implementation since Python can perform arithmetic on arbitrarily large\
    \ numbers.\n\nFigure [13-1](#492478_1_En_13_Chapter.xhtml#Fig1) shows the flowchart\
    \ for mining a block.\n\n![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig1_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1\n\nMining a Block\n\nWhile the miner is mining its candidate block,\
    \ other miners are also mining blocks. The blocks that the other miners are mining\
    \ need not contain the same transactions as the candidate block of our miner.\
    \ Indeed, some miners may have local blockchains that differ from the blockchains\
    \ of other miners.\n\nIf a miner succeeds in mining a candidate block, it will\
    \ add the new block to its local blockchain and then broadcast the mined block\
    \ on the cryptocurrency network. This is an invitation for other nodes to include\
    \ this block in their local blockchains.\n\nNodes that receive the newly mined\
    \ block will run a number of tests to validate the block. These tests are:\n\n\
    1. The correct difficulty number has been used.\n2. The block has a computed hash\
    \ that is less than the difficulty number for the `nonce` in the block header.\n\
    3. The block height of the new block is valid.\n4. The merkle root of the block\
    \ transactions matches the merkle root in the block header.\n5. No transaction\
    \ in the block is locked.\n6. The transactions in the block are valid.\n7. If\
    \ a transaction transfers a coinbase value, then a required minimum number of\
    \ blocks have been added to the blockchain since the block which contained this\
    \ coinbase transaction.\n8. There is a `prevblockhash` match as discussed in the\
    \ following.\n\nIf the mined node passes this suite of validation tests, the node\
    \ can add this block to its blockchain.\n\n## Block Height Validation\n\nThe node\
    \ receiving the new block checks the value of the `height` key in the block:\n\
    \n1. If the `height` is negative or zero, the block is rejected.\n2. If the `height`\
    \ value is less than the height of the node’s blockchain, the block is rejected.\n\
    3. If the block height is equal to the node’s blockchain height plus 2, the block\
    \ is placed in an orphan list.\n4. If the block height is greater than the node’s\
    \ blockchain height plus 2, the block is placed in an orphan list. The node’s\
    \ blockchain may be outdated. The node requisitions other nodes for the latest\
    \ block(s), so that it can bring its blockchain up to date, if so required.\n\n\
    ## Previous Block Validation\n\nA node that has received and validated a new block\
    \ can now add the new block. The following algorithm enumerates the steps in adding\
    \ the block to a blockchain.\n\n### Definitions\n\nLet `previousblockhash` be\
    \ the value of the `prevblockhash` key in the mined block.\n\nLet `block_name[latest]`\
    \ be the latest block on a blockchain that is named \"`block_name`\".\n\nLet `block_name[latest-1]`\
    \ be the second latest block on a blockchain that is named \"`block_name`\".\n\
    \nLet `hash(block_name[x])` be the SHA-256 hash of the block header of the block\
    \ named `block_name`, where `x` is `latest` or `latest-1`.\n\nIf the node has\
    \ one blockchain, then name it `primary_blockchain`.\n\nIf the node has two blockchains,\
    \ name one the `primary_blockchain` and the other one the `secondary_blockchain`.\n\
    \n### Algorithm\n\n1. If the node has one blockchain and:\n```\npreviousblockhash\
    \ == hash(primary_blockchain[latest])\n```\nthen append the mined block to the\
    \ `primary_blockchain`.\n\n2. Else if the node has one blockchain and:\n    ```\n\
    \    previousblockhash == hash(primary_blockchain[latest -1])\n    ```\n    then:\n\
    \    1. Make a new blockchain called `secondary_blockchain` by removing the latest\
    \ element of `primary_blockchain`.\n    2. Append the mined block to `secondary_blockchain`.\n\
    \n3. If the node has two blockchains, then:\n    ```\n    if previousblockhash\
    \ == primary_blockchain[latest]\n    then add the mined block to primary_blockchain\n\
    \    else if previousblockhash == secondary_blockchain[latest]\n    then add the\
    \ mined block to secondary_blockchain\n    ```\n\n4. If none of the aforementioned\
    \ is possible, then the node places the block and is added to an orphan blocks\
    \ list.\n\nNote that in the second case the node has two blockchains which are\
    \ competing to become the dominant blockchain.\n\nIf a node that receives a newly\
    \ mined block is a miner, it will check to see if any transactions in the mined\
    \ block are also in the block that it has been mining. If this is the case, the\
    \ miner will discard the block that it has been mining and return the transactions\
    \ in this block to the mempool. If this is not the case, it can keep on mining\
    \ its candidate block. The miner next updates its memcache by removing any transactions\
    \ in the mempool that are also in the mined block that has been received.\n\n\
    Finally, the node broadcasts the new block that it has received on the cryptocurrency\
    \ network so that other nodes can verify the block and add it to their local blockchains.\n\
    \n## Proof of Work\n\nMining a block is a computationally intensive task. When\
    \ a block is mined, the inclusion of the `nonce` and the difficulty number in\
    \ the block enables other miners to verify that the miner has in fact mined the\
    \ block. This verification is called proof of work. A block which fails this proof\
    \ of work will not be used by other miners to extend their local blockchains."
  raw: "## Mining a Block\n\nNow that the miner has a candidate block ready for mining,\
    \ it can start the actual process. The header block of a candidate block has a\
    \ number called a nonce; this is a non-negative integer initialized to zero. The\
    \ nonce starts the mining process and is incremented as the process proceeds.\n\
    \nThe miner computes the SHA-256 hexadecimal digest of the block header, which\
    \ includes the nonce. This hexadecimal string is converted into a (very large)\
    \ number and compared with the current difficulty number specified for the network.\
    \ If the computed value is less than the difficulty number, the block is said\
    \ to be mined.^([^(56)](#fn56)) If the SHA-256 hash is greater than or equal to\
    \ the difficulty number, then the nonce is incremented and the SHA-256 hash is\
    \ recomputed and again compared to the difficulty number. This process continues\
    \ until a hashed value less than the difficulty number is obtained.\n\nIn Bitcoin,\
    \ the nonce is a 32-bit integer, and it frequently happens that the computed value\
    \ will fail to fall below the difficulty number as the computation runs through\
    \ the entire range of 2**32 – 1 nonces. If this occurs, the nonce is again initialized\
    \ at 0 and is placed in the transaction id field of the first vin list element\
    \ of the coinbase transaction. This is not a concern for our Python implementation\
    \ since Python can perform arithmetic on arbitrarily large numbers.\n\nFigure\
    \ [13-1](#492478_1_En_13_Chapter.xhtml#Fig1) shows the flowchart for mining a\
    \ block.\n\n![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig1_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1\n\nMining a Block\n\nWhile the miner is mining its candidate block,\
    \ other miners are also mining blocks. The blocks that the other miners are mining\
    \ need not contain the same transactions as the candidate block of our miner.\
    \ Indeed, some miners may have local blockchains that differ from the blockchains\
    \ of other miners.\n\nIf a miner succeeds in mining a candidate block, it will\
    \ add the new block to its local blockchain and then broadcast the mined block\
    \ on the cryptocurrency network. This is an invitation for other nodes to include\
    \ this block in their local blockchains.\n\nNodes that receive the newly mined\
    \ block will run a number of tests to validate the block. These tests are\n\n\
    1.  The correct difficulty number has been used.\n\n2.  The block has a computed\
    \ hash that is less than the difficulty number for the nonce in the block header.\n\
    \n3.  The block height of the new block is valid.\n\n4.  The merkle root of the\
    \ block transactions matches the merkle root in the block header.\n\n5.  No transaction\
    \ in the block is locked.\n\n6.  The transactions in the block are valid.\n\n\
    7.  If a transaction transfers a coinbase value, then a required minimum number\
    \ of blocks have been added to the blockchain since the block which contained\
    \ this coinbase transaction.\n\n8.  There is a *prevblockhash* match as discussed\
    \ in the following.\n\nIf the mined node passes this suite of validation tests,\
    \ the node can add this block to its blockchain.\n\n### Block Height Validation\n\
    \nThe node receiving the new block checks the value of the height key in the block:\n\
    \n1.  If the height is negative or zero, the block is rejected.\n\n2.  If the\
    \ height value is less than the height of the node’s blockchain, the block is\
    \ rejected.\n\n3.  If the block height is equal to the node’s blockchain height\
    \ plus 2, the block is placed in an orphan list.\n\n4.  If the block height is\
    \ greater than the node’s blockchain height plus 2, the block is placed in an\
    \ orphan list. The node’s blockchain may be outdated. The node requisitions other\
    \ nodes for the latest block(s), so that it can bring its blockchain up to date,\
    \ if so required.\n\n### Previous Block Validation\n\nA node that has received\
    \ and validated a new block can now add the new block. The following algorithm\
    \ enumerates the steps in adding the block to a blockchain.\n\n#### Definitions\n\
    \nLet *previousblockhash* be the value of the *prevblockhash* key in the mined\
    \ block.\n\nLet block_name[latest] be the latest block on a blockchain that is\
    \ named “block_name”.\n\nLet block_name[latest-1] be the second latest block on\
    \ a blockchain that is named “block_name”.\n\nLet hash(block_name[x]) be the SHA-256\
    \ hash of the block header of the block named block_name, where x is *latest*\
    \ or *latest-1*.\n\nIf the node has one blockchain, then name it *primary_blockchain*.\n\
    \nIf the node has two blockchains, name one the *primary blockchain* and the other\
    \ one the *secondary_blockchain*.\n\n#### Algorithm\n\n1.  If the node has one\
    \ blockchain and\n\n```\npreviousblockhash == hash(primary_blockchain[latest])\n\
    ```\n\nthen append the mined block to the primary blockchain.\n\n1.  Else if the\
    \ node has one blockchain and\n\n    `previousblockhash == hash(primary_blockchain[latest\
    \ -1]`\n\n    then\n    1.  Make a new blockchain called secondary_blockchain\
    \ by removing the latest element of primary_blockchain\n\n    2.  Append the mined\
    \ block to secondary_blockchain\n\n2.  If the node has two blockchains, then\n\
    \n1.  If none of the aforementioned is possible, then the node places the block\
    \ and is added to an orphan blocks list.\n\n```\nif previousblockhash == primary_blockchain[latest]\n\
    then add the mined block to primary blockchain\nelse if previousblockhash == secondary_blockchain[latest]\n\
    then add the mined block to the secondary blockchain\n```\n\nNote that in the\
    \ second case the node has two blockchains which are competing to become the dominant\
    \ blockchain.\n\nIf a node that receives a newly mined block is a miner, it will\
    \ check to see if any transactions in the mined block are also in the block that\
