    \ There are tests for *put_transaction*, *get_transaction*, and *transaction_update*\
    \ functionality. The *put_transaction* function tests various random values for\
    \ *pkhash*, *value*, and *spent*. With *get_transaction*, we test in particular\
    \ that trying to get the value of a non-existent transaction key fails. The *update_transaction*\
    \ function tests the creation of unspent fragments and tests that double-spending\
    \ cannot occur.\n\nWhen you execute these tests, you should see six tests passing:"
  trans: "\n```python\n\"\"\"\nHelium 链状态键值存储的实现。该存储使我们能够通过交易密钥访问交易片段的相关信息。\n\"\"\"\
    \nimport hconfig\nimport rcrypt\nimport plyvel\nimport logging\nimport json\n\
    import pdb\n\n\"\"\"\n将调试信息记录到 debug.log 文件中\n\"\"\"\nlogging.basicConfig(filename=\"\
    debug.log\", filemode=\"w\",\n                    format='%(asctime)s:%(levelname)s:%(message)s',\
    \ level=logging.DEBUG)\n\n# Helium 链状态数据库句柄\nhDB = None\n\n\ndef open_hchainstate(filepath:\
    \ \"string\") -> \"db handle or False\":\n    \"\"\"\n    打开 Helium 链状态键值存储并返回其句柄。\n\
    \    如果数据库不存在，则会创建该数据库。filepath 中的所有目录必须已存在。\n    成功则返回数据库句柄，否则返回 False\n    \"\
    \"\"\n    try:\n        global hDB\n        hDB = plyvel.DB(filepath, create_if_missing=True)\n\
    \    except Exception as err:\n        logging.debug('open_hchainstate: exception:\
    \ ' + str(err))\n        return False\n    return hDB\n\n\ndef close_hchainstate()\
    \ -> \"bool\":\n    \"\"\"\n    关闭 Helium 链状态存储\n    如果数据库已关闭则返回 True，否则返回 False\n\
    \    \"\"\"\n    global hDB\n    try:\n        hDB.close()\n        if hDB.closed\
    \ != True:\n            return False\n    except Exception as err:\n        logging.debug('close_hchainstate:\
    \ exception: ' + str(err))\n        return False\n    return True\n\n\ndef put_transaction(txkey:\
    \ \"string\", tx_fragment: \"dictionary\") -> \"bool\":\n    \"\"\"\n    在链状态数据库中创建键值对\n\
    \    接收一个交易密钥和一个交易片段。\n    交易密钥的格式为：transactionid + \"_\" + str(vout_index)\n\
    \    接收的 tx_fragment 参数格式如下：\n    {\n        \"pkhash\":                  \n \
    \       \"value\":                   \n        \"tx_chain\"                 \n\
    \    }\n    如果键值对创建成功则返回 True，否则返回 False\n    \"\"\"\n    try:\n        # 如果交易密钥已存在则删除，因为交易片段即将被更新\n\
    \        encoded_key = str.encode(txkey)\n        hDB.delete(encoded_key)\n  \
    \      keyvalue = json.dumps(tx_fragment)\n        # 将 txkey-fragment 键值对保存到存储中\n\
    \        hDB.put(encoded_key, str.encode(keyvalue))\n    except Exception as err:\n\
    \        print(str(err))\n        logging.debug('put_transaction: exception: '\
    \ + str(err))\n        return False\n    return True\n\n\ndef get_transaction(key:\
    \ \"string\") -> \"False or dictionary\":\n    \"\"\"\n    接收一个交易片段的交易密钥 (格式为：transactionid\
    \ + \"_\" + str(vout_index))\n    如果成功则返回该密钥对应的值（字典形式），否则返回 False。返回的交易片段格式如下：\n\
    \    {\n        \"pkhash\":                  \n        \"value\":            \
    \       \n        \"spent\":                   \n        \"tx_chain\"        \
    \         \n    }\n    \"\"\"\n    try:\n        # 获取与交易密钥对应的交易片段，如果密钥不存在则返回 False\n\
    \        fragment = hDB.get(str.encode(key))\n        if fragment == None:\n \
    \           raise (ValueError(\"transaction fragment not found\"))\n        fragment\
    \ = json.loads(fragment.decode())\n    except Exception as err:\n        logging.debug('get_transaction:\
    \ exception: ' + str(err))\n        return False\n    return fragment\n\n\ndef\
    \ transaction_update(trx: \"transaction\") -> \"bool\":\n    \"\"\"\n    接收一个交易。更新链状态数据库以反映该交易。将之前的交易片段标记为已花费。\n\
    \    并更新这些片段，注明其被哪个交易 ID 所消费。\n    如果执行成功则返回 True，否则返回 False\n    \"\"\"\n   \
    \ try:\n        # 收集所有前序交易的输出并将其标记为已花费\n        # 指定消费前序交易输入的交易密钥\n        for\
    \ vin in trx[\"vin\"]:\n            # 获取前序交易片段。该片段必须存在\n            prev_tx_key\
    \ = vin[\"txid\"] + \"_\" + str(vin[\"vout_index\"])\n            tx_fragment\
    \ = get_transaction(prev_tx_key)\n            if tx_fragment == False:\n     \
    \           print(\"vin fragment not found: \" + prev_tx_key)\n              \
    \  raise (ValueError(\"transaction fragment not found\"))\n            # 双重花费错误\n\
    \            # 应当在写入链状态之前被检测到\n            if tx_fragment[\"spent\"] == True:\n\
    \                print(\"fragment is double spend error: \" + prev_tx_key)\n \
    \               raise (ValueError(\"transaction fragment double spend error: \"\
    \ + prev_tx_key))\n            # 将前序交易片段中的 spent 值设置为 True\n            tx_fragment[\"\
    spent\"] = True\n            # 设置对消费交易的引用\n            tx_fragment[\"tx_chain\"\
    ] = trx[\"transactionid\"] + \"_\" + str(vin[\"vout_index\"])\n            # 保存到\
    \ HeliumDB\n            ret = put_transaction(prev_tx_key, tx_fragment)\n    \
    \        if ret == False:\n                raise (ValueError(\"failed to update\
    \ spent tx fragment\"))\n        # 将消费交易的片段放入 HeliumDB\n        ctr = 0\n    \
    \    for vout in trx[\"vout\"]:\n            tx_fragment = {}\n            txkey\
    \ = trx[\"transactionid\"] + \"_\" + str(ctr)\n            tx_fragment[\"pkhash\"\
    ] = vout[\"ScriptPubKey\"][2]\n            tx_fragment[\"value\"] = vout[\"value\"\
    ]\n            tx_fragment[\"spent\"] = False\n            tx_fragment[\"tx_chain\"\
    ] = \"\"\n            if put_transaction(txkey, tx_fragment) == False:\n     \
    \           raise (ValueError(\"failed to insert consuming transaction fragment\"\
    ))\n            ctr += 1\n    except Exception as err:\n        print(str(err))\n\
    \        logging.debug('transaction_update: exception: ' + str(err))\n       \
    \ return False\n    return True\n```\n\n## 链状态数据库的 Pytest 测试\n\n将以下单元测试代码复制到 `test_hchaindb.py`\
    \ 文件中，并将该文件保存在 `unit_tests` 目录下。切换到 `unit_tests` 目录，并在虚拟 Helium 环境中运行测试：\n\n```bash\n\
    $(virtual): pytest test_hchaindb.py -s\n```\n\n`test_hchaindb.py` 中的 `setup_module`\
    \ 函数会在所有测试运行之前打开链状态数据库。`teardown_module` 函数会在测试执行完成后关闭数据库。其中有两个辅助函数，用于生成一对相邻的、随机化的合成交易。测试涵盖了\
    \ `put_transaction`、`get_transaction` 和 `transaction_update` 功能。`put_transaction`\
    \ 函数会测试 `pkhash`、`value` 和 `spent` 的多种随机值。对于 `get_transaction`，我们特别测试了尝试获取不存在的交易密钥值时是否会失败。`update_transaction`\
    \ 函数测试了未花费片段的创建，并验证了双重花费无法发生。\n\n当你执行这些测试时，应该会看到六个测试全部通过。\n"
- fmt: "# Pytest Unit Tests for the hchaindb Module\n\n```python\n\"\"\"\npytest unit\
