- fmt: "# Conclusion\n\nIn this chapter, we have developed the `rcrypt` module that\
    \ encapsulates the cryptographic functions that are used by Helium. We also wrote\
    \ unit tests for our cryptographic module. We then wrote program code for the\
    \ Helium blockchain. The module `hblockchain` encapsulates Helium blockchain functionality.\
    \ Finally, we wrote some unit tests to validate the blockchain module.\n\nIn the\
    \ next chapter, we turn our attention to the processing of cryptocurrency transactions.\n\
    \nFootnotes [1](#492478_1_En_8_Chapter.xhtml#Fn1_source) [2](#492478_1_En_8_Chapter.xhtml#Fn2_source)\
    \ [3](#492478_1_En_8_Chapter.xhtml#Fn3_source) [4](#492478_1_En_8_Chapter.xhtml#Fn4_source)\
    \ [5](#492478_1_En_8_Chapter.xhtml#Fn5_source)\n\n# 9. Cryptocurrency Transaction\
    \ Processing\n\nIn a cryptocurrency network such as Bitcoin or Helium, the fundamental\
    \ unit of interaction is a transaction where value is transferred from one entity\
    \ to another. In this type of network, the blockchain is an immutable, distributed\
    \ ledger of all of the transactions that have transpired on the network. Value\
    \ is transferred from one public address to another public address. We can examine\
    \ and enumerate all of the transactions associated with a public address by scanning\
    \ the entire blockchain for transactions that involve this address. In fact, if\
    \ we scan the blockchain forward from the genesis block, then the last transaction\
    \ involving this address also provides the cryptocurrency balance which is associated\
    \ with this address.\n\nThe type of cryptocurrency blockchain that we have just\
    \ described has no concept of a user account. The blockchain does not provide\
    \ each transactor with a unique account wherein all of the account activity is\
    \ recorded. Rather, the application only records transactions on the blockchain\
    \ as they occur. Each transaction is comprised of one or more origin public addresses\
    \ from which value is transferred to one or more destination public addresses.\
    \ Thus, since an individual uses a public address to receive value and transfer\
    \ away value, the transactions that involve an individual can be constructed by\
    \ scanning the blockchain from the genesis block forward for transactions involving\
    \ the public addresses that the person owns. This is precisely how a user's wallet\
    \ is constructed. It should be mentioned that it is considered bad practice to\
    \ reuse public addresses since it is essentially a zero-cost endeavor to create\
    \ them offline as well as online. Furthermore, using multiple addresses obscures\
    \ identity to some extent.\n\nOne thing to notice about cryptocurrency networks\
    \ like Bitcoin and Helium is that the contractual relations that transfer value\
    \ reside outside the network. The network does not record contractual relations.\
    \ This is in contrast to Ethereum, which can encode contractual terms on the network.\n\
    \nThis chapter and the next two chapters examine cryptocurrency transactions.\
    \ In this chapter, we are going to delve into cryptocurrency transactions, the\
    \ validation of such transactions, and, in particular, how value is transferred\
    \ securely from the hands of its rightful owner to an intended recipient. In the\
    \ next chapter, we will examine merkle trees and how they can be used to validate\
    \ the transactions in a block. In Chapter [11](#492478_1_En_11_Chapter.xhtml),\
    \ we will write code for Helium transaction processing.\n\n## Public Address Construction\n\
    \nIn a typical transaction, the receiver of value provides the transferor of value\
    \ with a public address to which value is to be sent. Using cryptographic techniques,\
    \ the receiver of value can prove that he or she generated the public address\
    \ and is therefore the owner of the value that has been transferred to this address.\n\
    \nHenceforth and for the sake of brevity, I shall refer to the hexadecimal string-encoded\
    \ output of a cryptographic hash function such as SHA-256 or RIPEMD-160 simply\
    \ as a message digest or a hash.\n\nThe following algorithm enumerates the steps\
    \ involved in generating a public address:\n\n1. Generate a random private-public\
    \ pair of ECC keys.^([^(42)](#fn42))\n2. Generate the SHA-256 message digest of\
    \ the public key.\n3. Generate the RIPEMD-160 message digest of the result in\
    \ Step 2.\n4. Add a version byte, 0x1, in front of the RIPEMD-160 hash.\n5. Compute\
    \ the SHA-256 message digest of the result in Step 4.\n6. Extract the last four\
    \ bytes of the result in Step 5. This will be our error detection checksum.\n\
    7. Concatenate the error checksum with the result of Step 4.\n8. Base58 encode\
    \ the result in Step 7. The result is a public address.^([^(43)](#fn43))\n\nWe\
    \ can symbolically represent public address generation as\n\n```\naddress = base58_encode(\"\
    1\" + RIPEMD-160(SHA256_HASH(public_key)) + checksum)\n```\n\nFigure [9-1](#492478_1_En_9_Chapter.xhtml#Fig1)\
    \ shows the address generation process.\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig1_HTML.jpg](images/492478_1_En_9_Chapter/492478_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nPublic Address Generation\n\nThe version byte of Helium addresses\
    \ will be fixed to the value in the `hconfig` module. The last four bytes prior\
    \ to the Base58 encoding are a checksum that enables us to prove that the address\
    \ is not corrupted.\n\nThis checksum is used as follows:\n\n1. Base58 decode the\
    \ public address.\n2. Strip the last four bytes from the result of the previous\
    \ step. These four bytes are the error checksum. We will call this the extracted\
    \ checksum. The remaining portion is the prepended version byte and the RIPEMD-160\
    \ hash. We will call this portion the RIPEMD hash.\n3. Take the SHA-256 hash of\
    \ the RIPEMD hash and extract the last four bytes. This is our computed checksum.\n\
    4. The public address is invalid if the computed checksum is not equal to the\
    \ extracted checksum.\n\nNote that due to the random generation of the public\
    \ key and the cryptographic properties of hashes, a public key will always generate\
    \ a corresponding unique public address, *a fortiori*, the address is generated\
    \ by some unique private-public key pair.^([^(44)](#fn44))\n\n## Canonical Transaction\
    \ Structure\n\nWe will now examine the canonical Python structure of a transaction.\
    \ A transaction has the following dictionary structure:\n\n```\n{\nversion:  \
    \       \ntransactionid:   \nlocktime:        \nvin:             \nvout:     \
    \       \n}\n```\n\nThe text that is enclosed in angle brackets specifies the\
    \ type of the value corresponding to the key.\n\nThe value of the `version` key\
    \ describes the version of the application software that is used to process the\
    \ transaction. For Helium, this is fixed at \"1\".\n\nThe `transactionid` is a\
    \ universally unique identifier for the transaction. We will use the `secrets`\
    \ module in the Python standard library to create a random and secure cryptographic\
    \ hexadecimal-encoded string that is 512 bits long.^([^(45)](#fn45))\n\n`locktime`\
    \ is a non-negative integer. This value, if greater than zero, instructs a miner\
    \ to refrain from processing the transaction until a specified amount of time\
    \ has elapsed. Elapsed time is measured in seconds. A miner who caches the transaction\
    \ for future processing does not include the transaction in a block until the\
    \ requisite time period has transpired. `locktime` cannot have a value in excess\
    \ of the `MAX_LOCKTIME` specified in the Helium configuration module."
