    in the economy.


    The first thing to understand is that the Equation of Exchange is a tautology;
    it is always true. Secondly, this equation shows the relationship between the
    supply of money, the price level, and real output in the economy. For example,
    if the supply of money is increased but physical output does not increase at all,
    then the increased supply of money will be reflected entirely by price inflation.
    Similarly, if the money supply is held constant but physical production increases,
    there will be price deflation, that is, holdings of M1 will become more valuable.'
  trans: '

    # 在部分准备金银行体系中赚钱


    纵观历史，创造货币的权力一直被视为君主特权。例如，只有罗马皇帝才有权铸造第纳尔金币。因此，你可能会感到惊讶：在现代世界，一个国家的大部分货币并非由财政部创造，而是由银行创造。这是部分准备金银行制度的产物。


    在部分准备金银行制度下，法律要求银行必须持有一定比例的存款以应对提款需求。这被称为准备金要求。让我们看看一家假设的银行如何*凭空*创造货币。假设我们有一家名为安大略银行的银行，最初没有存款或负债，法定准备金率为
    10%。一位客户存入 100 万美元。此时安大略银行的状况如表 1-1 所示。


    表 1-1

    银行状况


    | 总存款 | $1,000,000 | 已发放贷款 | $0 |

    | 准备金要求 | $ 100,000 | 可贷资金 | $900,000 |


    安大略银行向一位借款人发放了 90 万美元贷款，该借款人将贷款金额存入安大略银行。此时安大略银行的财务状况如表 1-2 所示。


    表 1-2

    银行状况


    | 总存款 | $1,900,000 | 已发放贷款 | $900,000 |

    | 准备金要求 | $190,000 | 可贷资金 | $810,000 |


    请注意，银行可贷资金的计算方式为：


    ```

    可贷资金 = 总存款 - 准备金要求 - 已发放贷款

    ```


    安大略银行现在向一位客户发放了 81 万美元贷款，该客户又将这笔钱存入银行。此时银行的财务状况如表 1-3 所示。


    表 1-3

    银行状况


    | 总存款 | $2,710,000 | 已发放贷款 | $1,710,000 |

    | 准备金要求 | $271,000 | 可贷资金 | $729,000 |


    请注意，在这个阶段，银行从最初的 100 万美元存款中额外创造了 171 万美元的货币（银行存款）。


    如果我们继续这样操作，安大略银行可以持续发放贷款（创造货币），直至达到由货币乘数决定的理论最大值：


    ```

    初始存款/准备金要求

    ```


    这意味着，如果银行收到 100 万美元存款，它最多可以创造 1000 万美元的存款（货币），并从这些贷款中获得利息收入。


    如果银行对客户贷款收取 6%的年利率，那么它每年最多可获得 60 万美元的利息收入。正如你所理解的，在部分准备金银行体系中拥有银行是一项利润非常丰厚的业务。


    奥地利经济学派（弗里德里希·哈耶克、路德维希·冯·米塞斯、罗恩·保罗等）的支持者认为，部分准备金银行制度本质上不稳定，会导致经济繁荣与萧条周期循环；此外，这是一种合法化的盗窃行为，因为它赋予特权阶级凭空创造购买力（货币）的权力。


    在货币理论中，`M1`被定义为硬币、纸币以及其他与货币流动性相当的金融工具；包括银行活期存款、旅行支票等。`M2`包括不能轻易兑换成货币的工具，如银行储蓄存款、30
    天期国库券、货币市场基金等。`M2`由那些需要较短固定时间才能兑换成`M1`实物的工具组成。


    因此，`M1`主要由银行活期存款构成，这就不足为奇了。


    ## 基础货币经济学


    让我们简要了解一下*交易方程式*，这是货币经济学中的一个基本方程式。该方程式表示如下：


    `MV = PT`


    交易方程式的计算基于一个固定时期，比如一年。`M`是货币供应量或`M1`。`V`是货币流通速度，即单位货币在固定时期内流通的平均次数。除非出现恶性通货膨胀，否则我们预计`V`只会发生微小变化。原因在于个人的支出和储蓄习惯在一段时间内相对稳定。`P`是经济中的价格水平，`T`是固定时期内经济中的交易量。`T`并非经济中交易的货币价值，而是经济中实物或实际产出的独立指数衡量指标。


    首先需要理解的是，交易方程式是一种恒等式；它永远成立。其次，该方程式展示了经济中货币供应量、价格水平和实际产出之间的关系。例如，如果货币供应量增加，但实际产出完全没有增长，那么增加的货币供应量将完全反映在物价通胀上。同样，如果货币供应量保持不变，但实际生产增加，则会出现物价通缩，即持有`M1`将变得更加有价值。

    '
- fmt: '# Bitcoin Comes onto the Scene


    By 2008, a multi-polar international system was emerging. The American economy
    was saddled with nearly ten trillion dollars of debt, and the convertibility of
    the dollar into gold had been relegated to a footnote in history. The position
    of the dollar as an international reserve currency was premised not upon a promise
    of convertibility and the prestige and soft power of the United States but by
    the compulsion of the Petrodollar system and military power.


    In 2008, Satoshi Nakamoto published the white paper *Bitcoin: A Peer-to-Peer Electronic
    Cash System* on the cryptography mailing list *Metzdowd*. This paper laid out
    the theoretical foundations for a completely decentralized currency on the Internet.
    On January 3, 2009, Nakamoto released the first version of Bitcoin and mined the
    first block of bitcoins called the genesis block. Shortly thereafter, Satoshi
    Nakamoto, who is in all likelihood a pseudonym for one or several authors, disappeared
    from public view. In the remainder of this book, I shall use the word Bitcoin
    in the proper case to refer to the Bitcoin ecosystem and bitcoin in the lowercase
    to refer to the cryptocurrency itself.


    Bitcoin has several critical features that distinguish it from traditional fiat
    currencies. Firstly, it is a purely decentralized digital currency that operates
    on the Internet. By digital, I mean that bitcoin does not have a tangible physical
    form such as a coin or a paper currency. The decentralized nature of bitcoin is
    a very important feature; bitcoin does not rely upon any centralized servers or
    points of control. Thus, it is theoretically immune to attempts to shut it down.
    Bitcoin is also a peer-to-peer network, and transactions on the Bitcoin network
    are consummated directly by the transacting parties without the necessity of an
    intermediary third party. This second factor removes banking institutions as players
    in the bitcoin ecosystem.


    In conventional fiat money systems, banks play a critical role in recording and
    validating transactions. Bitcoin records transactions in a distributed ledger
    which no entity can control. Furthermore, this ledger can be examined by anyone
    to verify transactions. Time plays an important role in validating transactions
    in a conventional fiat money banking system. Transaction validity depends in part
    on the sequence in which transactions occur over time. Bitcoin does not have a
    concept of time, and in particular, transaction validity does not depend on the
    sequence in which transactions occur over time. This is a critical innovation;
    Bitcoin can reach a distributed consensus on transaction validity without relying
    on a clock or transactions occurring in a specific order over time or by using
    any central supernode.


    In the Bitcoin ecosystem, transactions are validated only by cryptographic algorithms
    and through distributed consensus. In his white paper, Satoshi Nakamoto solved
    an important theoretical problem: how can one form consensus in a distributed
    system? We will spend quite a bit of time looking at distributed consensus algorithms
    since they are a critical component of cryptocurrencies as well as many blockchain
    applications.


    In a conventional banking system, trust is an important element in the operation
    of the system. You deposit money in a bank or utilize its services because you
    trust the integrity of the bank. Bitcoin is based on a trustless model. The validation
    of transactions in the system does not require any entity to be trusted.


    Transactions in a conventional fiat banking system are not anonymous. The details
    of any transaction are available to the transacting banks and any concerned authorities.
    In contrast, bitcoin is a pseudo-anonymous system. The level of pseudo-anonymity
    can be increased using mixers and other devices. In the alternative, we can use
    a truly anonymous currency such as Monero. Monero is a bitcoin-like currency with
    strong guarantees of anonymity.


    In contrast to conventional banking systems, transactions in the bitcoin system
    are immutable and cannot be reversed. The public ledger in which bitcoin transactions
    are recorded is an immutable ledger which anyone can examine. The severity of
    immutable transactions can be mitigated by using escrow mechanisms that are available
    in Bitcoin. Bitcoin escrow permits values to be held conditionally pending transaction
    completion.


    The last factor distinguishing Bitcoin from fiat money systems is that transaction
    costs are much lower and transactions can be consummated in a matter of minutes.


    Any currency on the Internet whose transactions are not consummated peer to peer
    or those currency creation mechanisms are under the control of a centralized entity
    is not properly a cryptocurrency.


    If we apply the Equation of Exchange to a world economy where only bitcoins are
    present and physical output is increasing over time, then the price level will
    be decreasing if the velocity of bitcoins remains more or less constant, that
    is, the value of a bitcoin must increase over time. To rephrase this, the Bitcoin
    monetary system is inherently deflationary; it protects and enhances the value
    of bitcoin holdings over time. Contrast this with the US dollar. Since December
    23, 1913 (the date on which the US Federal Reserve Bank was created), the US dollar
    has experienced a cumulative inflation of nearly 2500% as of 2020. In other words,
    the current value of one US dollar is only 1/2500th of its value in 1913.


    Fiat currencies can be printed at will, and in consequence, any notion of the
    scarcity of a fiat currency is an artificial contrivance. In contrast, bitcoin
    and similar cryptocurrencies build in scarcity by limiting the total number of
    cryptocurrency units that can be created. As indicated previously, this also has
    the effect of making the currency deflationary.


    Bitcoin has already achieved status as a medium of exchange. But it is being used
    primarily for two purposes: firstly as a store of value or more properly as a
    long-term hedge against the US dollar and secondly to speculate against the stability
    of the dollar. The conservative consensus is that the Petrodollar system will
    eventually collapse in the emerging multi-polar world, and as the military power
    of the United States is equalized, the massive debt overload of the United States
    (some 26 trillion dollars as of the time of writing) will severely diminish international
    confidence in the dollar. Furthermore, the price inflation of 2500% over the period
    from 1913 to 2020 demonstrates that the increase in the US money supply has far
    exceeded the increase in the real output of the United States. The weakening dollar
    will have two long-term consequences: firstly a flight from the dollar into scarce
    real resources such as land and secondly a flight into liquid hedges such as gold,
    silver, precious objects, and cryptocurrencies. These factors have led many speculators
    to the conclusion that bitcoin is a good long-term hedge against the US dollar.


    The reader can note that bitcoin is attempting to play the same role as gold in
    a gold standard regime. In such a regime, an entity holding a currency is free
    to convert it into gold if his or her confidence in the currency weakens. Bitcoin
    provides speculators with the same option; they can divest themselves of their
    fiat currency holdings and hold bitcoin as a hedge against the instability of
    the fiat currency.'
