  raw: 'Financial applications such as cryptocurrencies need extreme resiliency. Cryptocurrency
    and blockchain applications must be as simple as possible. The English idiom is
    *simplicity is the hallmark of truth* (also called *Occam’s razor*). Bitcoin and
    Helium implement this resiliency by using only one essential data structure which
    is a simple encoded text file which is managed by the host operating system. This
    file is a block file, and a blockchain is simply the collection of these files.
    Everything in Helium, including databases, can be rebuilt from these block files.
    In Chapter [16](#492478_1_En_16_Chapter.xhtml), we discuss resiliency in cryptocurrency
    networks and provide an implementation of resiliency for Helium.


    Chapter [17](#492478_1_En_17_Chapter.xhtml) discusses wallet implementations for
    cryptocurrencies. In this chapter, we provide a simple command-line wallet for
    Helium. Wallet construction is not particularly difficult from the software developer’s
    viewpoint. The complexity lies in the implementation of a wallet GUI.


    Chapter [18](#492478_1_En_18_Chapter.xhtml) discusses the implementation of a
    testnet for Helium. A Helium testnet is essentially an implementation of the Helium
    network discussed in Chapter [15](#492478_1_En_15_Chapter.xhtml) over a certain
    IP address space (an overlay network in P2P terminology). The primary distinguishing
    feature of a testnet is the implementation of a faucet which permits nodes on
    the network to acquire coins that can then be utilized in transactions.


    Finally, Appendix 10 of this book consolidates all of the source code for Helium
    in one spot. Appendix 9 contains all of the Pytest unit test files for Helium.
    Appendix 8 consolidates all the data structures used in Helium along with brief
    descriptions thereof.


    Lastly, I would be amiss if I were to neglect in directing your attention to Appendix
    7 which contains all of the Python code for constructing a simulated Helium blockchain
    of arbitrary, user-specified, height. Such a synthetic blockchain is immensely
    valuable for integration testing as well as examining the evolution of a blockchain
    when the cryptocurrency has certain characteristics.


    Acknowledgments


    The publication of this book would not have been possible without the valuable
    contributions of the Apress team. Thanks guys. I would like to thank Jannat Kaur
    (*kauress.me*), neurobiologist, who was able to reluctantly emerge from her virtual
    reality world to do a code review of the Helium source code. Thank you Prasanth
    Sahoo for your expert technical review of this book. I am particularly grateful
    to Spandana Chatterjee who guided this book from inception to publication. Nothing
    would have come to fruition without Spandana’s expert guidance. And, of course,
    thank you Divya Modi. Finally, I would like to thank Baljinder Singh for his selfless
    assistance, far above and beyond the call of duty.


    About the Author About the Technical Reviewer


    # 1. A Short History of Money


    We are going to embark upon a deep dive into cryptocurrencies and blockchain applications.
    The canonical blockchain application is bitcoin, the world’s first cryptocurrency.
    It would thus be fitting to survey the history of money and see how bitcoin has
    radically changed the paradigm for currency creation and distribution. In this
    chapter, I will present an opinionated history of money from the Neolithic age
    to the present time and, in particular, I will highlight landmark events in the
    evolution of money. This chapter will conclude with a brief overview of bitcoin
    and how it differs from traditional money.


    ## The Neolithic Age


    One of the earliest forms of human interaction was the exchange of goods. For
    example, a transaction could involve exchanging 100 eggs for a blanket or a stone
    ax for 35 hens. These types of transactions are called barter, and they involve
    the exchange of commodities between two transacting parties. An object or a commodity
    acquires value when it has utility (usefulness) and scarcity. Ornaments acquire
    value because of their beauty and the considerable effort that a skilled artisan
    has to expend to create them. The expenditure of considerable skill and effort
    makes ornaments scarce.


    There is a fundamental problem with barter; it is an inefficient way to exchange
    value. For example, if you have an ax that you want to trade for some hens, then
    you will have to find a person who has some hens available for trade and who wants
    an ax. Conceivably, there could be no one who satisfies this criterion, in which
    case an exchange of value cannot be consummated. Furthermore, even if such a person
    exists, there is the issue of establishing an exchange rate, that is, how many
    hens should be traded for the ax. This depends on the size and quality of the
    ax as well as the quality of the hens. Finally, there is a divisibility problem.
    For example, there could be a person who wants an ax but only has 12 hens to trade.
    Finally, there is problem that bartered goods are not typically fungible. A thing
    is fungible if it is indistinguishable from any other thing of the same type.
    As these examples demonstrate, barter is a very inefficient technique for trade.


    Necessity is the mother of invention, and consequently, the inefficiencies of
    barter produced the requirement of creating an efficient medium of exchange. Money
    or currency in the form of coins made its first appearance in China during the
    Neolithic age about 3000–4000 years ago. Money can be thought of as an object
    which represents a certain amount of value. For example, a metal coin with an
    ax inscribed on it could symbolically represent the exchange value of an ax. The
    efficacy of money in any form depends upon its acceptance as symbolically representing
    value. Such acceptance requires money to be a store of value. That is, if the
    coin with an ax inscribed on it is exchangeable for 35 hens today, then it should
    also be exchangeable for 35 hens 90 days hence. By 700 BC, the use of coin money
    had spread from China into the Indian subcontinent.


    Around 210 BC the first Chinese emperor Qin Shi Huang introduced a standardized
    coin based on copper as the official currency of the first Chinese Empire and
    abolished other forms of money that were being used locally. It was a brilliant
    policy because it unified the empire by increasing trade across the breadth of
    the Empire. This, in turn, led to accelerated economic growth and prosperity in
    the empire. It was a golden age in China. Since copper was relatively abundant,
    these copper coins had low value. The acceptance of these coins was cemented by
    the fact that the treasury of the empire guaranteed the convertibility of the
    coins into utilitarian objects of value at a fixed rate. The introduction of this
    coinage had all of the characteristics that we now typically associate with money;
    they were accepted as a medium of exchange and a store of value, and finally the
    coins were fungible.'
