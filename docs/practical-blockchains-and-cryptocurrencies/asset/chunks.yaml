- fmt: '### The RSA Algorithm


    Several public-private key generation algorithms exist in the public domain. The
    two leading algorithms are `RSA` and the Elliptic Curve Digital Signature Algorithm
    (`ECDSA`). The `RSA` algorithm is the most widely used public key algorithm.^([^(18)](#fn18))
    These algorithms rely upon computationally intractable problems in Mathematical
    Number Theory. For example, `RSA` relies on the fact that it is computationally
    infeasible to factor an extremely large number into a product of primes. `ECDSA`
    relies upon the difficulty of finding the discrete logarithms of extremely large
    numbers. The bitcoin code uses public-private key pairs that are generated using
    the Elliptic Curve Digital Signature Algorithm.


    In this optional section, we are going to derive the `RSA` algorithm. Before we
    do this, we need a few pieces from Number Theory:


    ```

    Definition (prime number): A positive integer n greater than 1 is called a prime
    number if it is only divisible by +1, -1, -n and n.

    ```


    Theorem (the fundamental theorem of arithmetic): Any integer `m` > 1 can be factored
    into a product of prime numbers


    `m = p[1]^(t1)p[2]^(t2)p[3]^(t3) … p[n]^(tn)`


    where `p[1]` < `p[2]` < … < `p[n]` are prime numbers and `t1`, `t2`, … `tn` are
    natural numbers greater than 0.


    Definition (relatively prime numbers): Two positive integers `j` > 1 and `k` >
    1 are said to be relatively prime if their only common factor is 1.


    For example, 6 and 9 are not relatively prime since 3 is a common divisor. 8 and
    15 are relatively prime.


    Definition (Euler’s totient function, `Q(n)`): For any integer `n` > 1, `Q(n)`
    is the number of positive integers less than `n` that are relatively prime to
    `n`.


    For example, `Q(15)` = 7 since the set of relatively prime numbers is { 2,4,7,8,11,13,14
    }.


    Theorem (Euler’s theorem): For any integers `a,n` > 1 where `a` and `n` are relatively
    prime, `a^(Q(n)) % n = 1`.^([^(19)](#fn19))


    For example, let `a` = 15 and `n` = 8, `Q(n)` = 4, and then


    ```

    154 % 8 = 50625 % 8 = 1

    ```


    It should be clear that for a natural number `m` > 1, the prime factorization
    `p[1]^(t1)p[2]^(t2)p[3]^(t3) … p[n]^(tn)` is unique. The `RSA` algorithm relies
    upon the fact that it is computationally infeasible to obtain the prime factorization
    of very large numbers.


    We can now derive an `RSA` public-private key pair as follows:


    ```

    Step 1: Choose two large random prime numbers p and q where p does not equal to
    q.

    Step 2: Calculate the product: n = pq.

    Step 3: Because p and q are prime numbers, Euler’s totient function value for
    n is Q(n) = (p-1)(q-1).

    Step 4: Choose an integer 1 < e < Q(n) such that e and Q(n) are relatively prime.

    Step 5: Get a positive integer d so that de % Q(n) = 1.

    ```


    The public key is the tuple `(n, e)`. The private key is the tuple `(p, q, d)`.
    The public key tuple can be distributed freely; the private key tuple is kept
    secret.


    Let us now look at the application of the `RSA` algorithm. Consider a document
    or message `D`. `D` can be viewed as a very long sequence of bits or equivalently
    as a massively large positive integer. Henceforth, we will consider `D` as such
    an integer. We make sure that our prime numbers `p` and `q` have been selected
    so that `D < pq`.


    Smith, who has received the public key tuple `(n, e)`, creates the encrypted message
    `C` as follows:


    ```

    C = De % n

    ```


    `C` is a positive integer or equivalently is a very long sequence of bits.


    Alice can now use her private key tuple `(p, q, d)` to decrypt the ciphertext:


    ```

    D = Cd % n

    As a concrete example, let p = 7 and q = 5.

    n = pq = 35

    Then Q(35) = 24 and we select e = 17.

    e and Q(n) are relatively prime.

    We select d such that de % Q(n) = 17d % 24 = 1

    d = 17

    Now consider a document T = 12

    Then the ciphertext is 1217 % 35 = 17

    We decrypt the ciphertext with 1717 % 35 = 12

    ```


    `RSA` public-private key encryption is the most widely used private-public key
    encryption system. It is just as secure as keys generated using elliptic curve
    cryptography (`ECDSA`). Following Bitcoin, we will use `ECDSA` key pairs. The
    logic of such keys is conceptually similar to `RSA` keys, and I will omit discussing
    their generation since a rigorous discussion of the underlying Mathematics will
    take us into a long digression. Our Blockchain code will contain the necessary
    library functions to generate `ECDSA` public-private key pairs.


    ### Python Code Example


    In the following Python example, we will use the `pycryptodome` package to lead
    Alice and Smith through a sequence of encryption, decryption, signature generation,
    and signature verification steps using `RSA`.^([^(20)](#fn20)) You should walk
    through this code carefully to see the mechanics of using public and private key
    pairs to encrypt and decrypt messages.


    If you have not already done so, install this package:^([^(21)](#fn21))


    ```

    pip3 install pycryptodome

    #========================================

    # RSA Public-key cryptography example

    #========================================

    from Crypto.PublicKey import RSA

    from Crypto.Cipher import PKCS1_OAEP

    from Crypto.Hash import SHA256

    from Crypto import Random

    from hashlib import sha256

    import binascii

    #=====================================

    # generate a RSA key-pair

    #=====================================

    def RSAKeyPair(keylength):

    keyPair = RSA.generate(keylength)

    return keyPair

    # Alice generates a RSA key-pair

    AliceKeyPair = RSAKeyPair(1024)

    # Alice''s public-key

    pubKey = AliceKeyPair.publickey()

    print(f"public-key:  (n={hex(pubKey.n)}, e={hex(pubKey.e)})")

    # Alice''s public-key in PEM format

    # PEM format Base64 encodes the key

    pubKeyPEM = AliceKeyPair.publickey().exportKey()

    print("PubKey PEM Format: " +pubKeyPEM.decode(''ascii''))

    # Alice''s private key

    print(f"Private key: (n={hex(pubKey.n)}, d={hex(AliceKeyPair.d)})")

    # Alice''s private key in PEM format

    privKeyPEM = AliceKeyPair.exportKey()

    print("PRIVATE KEY PEM FORMAT; " + privKeyPEM.decode(''ascii''))

    #======================================================

    # Smith encrypts a message using Alice''s public-key

    # message must be a binary string

    #======================================================

    message = b"The quick brown fox jumped over the farmer''s hedge"

    cipher = PKCS1_OAEP.new(pubKey)

    cipherText = cipher.encrypt(message)

    print("CipherText: ", binascii.hexlify(cipherText))

    #=======================================================

    # Alice decrypts Smith''s message using her private key

    #=======================================================

    decipher = PKCS1_OAEP.new(AliceKeyPair)

    plainText = decipher.decrypt(cipherText)

    print(''Decrypted Text: '', plainText)

    #==========================================================

    # Alice signs a message by first generating the SHA-256

    # digest of the message and then encrypting it with her

    # private key.

    # the string message is converted to a binary string

    #==========================================================

    message = b''let sleeping dogs lie, said the farmer''

    hash = int.from_bytes(sha256(message).digest(), byteorder="big")

    signature = pow(hash, AliceKeyPair.d, AliceKeyPair.n)

    print("Alice''s Signature:", hex(signature))

    #============================================================

    # Smith Verifies the signature by comparing the SHA-256 hash

    # generated from the received message with the hash obtained

    # by decrypting the signature received from Alice

    #=============================================================

    hashFromMessage = int.from_bytes(sha256(message).digest(), byteorder="big")

    decryptedHash   = pow(signature, AliceKeyPair.e, AliceKeyPair.n)

    if (hashFromMessage == decryptedHash):

    print("Signature is valid")

    else:

    print("signature is invalid")

    ```'
