    # 3. Symmetric Encryption


    The mathematical foundations of blockchains and cryptocurrencies are rooted in
    an area of Mathematics called cryptography (or cryptology). In this chapter and
    the three chapters that follow, we will examine these mathematical foundations.
    Even though I am not going to present the mathematical theory in a rigorous lemma-theorem-corollary
    style, I am going to present the theory in a lucid and understandable manner.
    The goal is to provide you with a clear understanding of the underlying mathematical
    concepts and theory. This deep exposure will be more than sufficient to enable
    you to develop blockchain and cryptocurrency applications with confidence.


    Alright, let’s begin our deep dive into cryptography.


    ## How Symmetric Encryption Works


    Symmetric or single-key encryption has been around for thousands of years. Symmetric
    encryption works as follows: a message (called plaintext) is encrypted with a
    secret key. The encryption process converts the plaintext into a garbled message
    called a ciphertext. The secret key is simply some sequence of characters or symbols.
    Only a person who has the secret key can decode the ciphertext and recover the
    origin plaintext. Mathematically, we can represent the encryption process as


    ```

    c = E(k,p)

    ```


    Here, `E` is the encryption algorithm (function), `k` is the secret key, and `p`
    is the plaintext. `c` is the ciphertext produced by the encryption algorithm.
    The decryption process can be represented as


    ```

    p = D(k,c)

    ```


    where `D` is the decryption algorithm. Note that the same key is used for encryption
    and decryption. Hence the term symmetric encryption key.


    Figure [3-1](#492478_1_En_3_Chapter.xhtml#Fig1) illustrates the encryption and
    decryption process.


    ![../images/492478_1_En_3_Chapter/492478_1_En_3_Fig1_HTML.jpg](images/492478_1_En_3_Chapter/492478_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Symmetric Encryption and Decryption


