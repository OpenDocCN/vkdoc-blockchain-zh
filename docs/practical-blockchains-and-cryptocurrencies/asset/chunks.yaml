- fmt: '# Conclusion


    In this chapter, we have discussed the two principal network topologies on the
    Internet, the client server topology and the peer-to-peer topology (P2P). We have
    also developed the program code necessary to interface Helium nodes to the Helium
    P2P network. In effecting this, we constructed a JSON-RPC server and JSON-RPC
    client interface for each mining node. We also created a directory server or seed
    node. Our interface code allows a mining node to do the following:


    1. Obtain the addresses of other nodes from a directory server.

    2. Receive transactions from the network and propagate them further.

    3. Receive blocks propagating on the network and propagate them further.

    4. Get the height of a node’s blockchain.

    5. Request a node to send it a certain block.

    6. Clear the primary and secondary blockchains.


    In the next chapter, we will address the issue of serializing the blockchain to
    disk. We will also show how a node can rebuild its entire blockchain environment
    including databases from a serialized blockchain.


