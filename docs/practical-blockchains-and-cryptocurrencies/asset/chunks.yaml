  trans: "\n# 结论\n\n在本章中，我们开发了 `rcrypt` 模块，该模块封装了 Helium 使用的加密函数。我们还为加密模块编写了单元测试。接着，我们为\
    \ Helium 区块链编写了程序代码。`hblockchain` 模块封装了 Helium 区块链的功能。最后，我们编写了一些单元测试来验证区块链模块。\n\
    \n在下一章中，我们将把注意力转向加密货币交易的处理。\n\n脚注 1 2 3 4 5\n\n# 9. 加密货币交易处理\n\n在诸如比特币或 Helium\
    \ 这样的加密货币网络中，交互的基本单元是交易，即价值从一个实体转移到另一个实体。在这类网络中，区块链是一个不可篡改的分布式账本，记录了所有在网络上发生的交易。价值从一个公共地址转移到另一个公共地址。通过扫描整个区块链中涉及某个地址的交易，我们可以查看并列举与该公共地址相关的所有交易。实际上，如果我们从创世块开始向前扫描区块链，那么涉及该地址的最后一笔交易也提供了与该地址关联的加密货币余额。\n\
    \n我们刚刚描述的这类加密货币区块链没有用户账户的概念。区块链不会为每个交易者提供一个记录了所有账户活动的唯一账户。相反，应用仅在交易发生时将其记录在链上。每笔交易由一个或多个原始公共地址组成，价值从这些地址转移到**一个或多个目标公共地址**。因此，由于个人使用公共地址来接收价值和转出价值，我们可以通过从创世块开始向前扫描区块链，查找涉及该个人所拥有的公共地址的交易，来构建与个人相关的交易。这正是用户钱包的构建方式。需要提及的是，重复使用公共地址被认为是一种不良做法，因为无论是离线还是在线创建新地址都几乎是零成本的。此外，使用多个地址在某种程度上可以模糊身份信息。\n\
    \n关于比特币和 Helium 这类加密货币网络，有一件事值得注意：转移价值的合约关系存在于网络之外。网络本身并不记录合约关系。这与以太坊形成对比，以太坊可以在网络上编码合约条款。\n\
    \n本章及接下来的两章将探讨加密货币交易。在本章中，我们将深入探讨加密货币交易、此类交易的验证，特别是价值如何安全地从合法所有者手中转移到预期接收者手中。在下一章中，我们将研究默克尔树以及如何利用它们来验证区块中的交易。在第\
    \ 11 章中，我们将为 Helium 交易处理编写代码。\n\n## 公共地址构建\n\n在典型的交易中，价值接收方会向价值转出方提供一个公共地址，以便将价值发送到该地址。通过使用加密技术，价值接收方可以证明其生成了该公共地址，因此是已转移到该地址的价值的所有者。\n\
    \n为简洁起见，此后我将把诸如 SHA-256 或 RIPEMD-160 等加密哈希函数的十六进制字符串编码输出简称为**消息摘要**或**哈希**。\n\n\
    以下算法列举了生成公共地址所涉及的步骤：\n\n1.  生成一对随机的 ECC 私钥-公钥对。^(⁴²)\n2.  生成公钥的 SHA-256 消息摘要。\n\
    3.  生成步骤 2 结果的 RIPEMD-160 消息摘要。\n4.  在 RIPEMD-160 哈希前添加一个版本字节 `0x1`。\n5.  计算步骤\
    \ 4 结果的 SHA-256 消息摘要。\n6.  提取步骤 5 结果的最后四个字节。这将作为我们的错误检测校验和。\n7.  将错误校验和与步骤 4 的结果拼接起来。\n\
    8.  对步骤 7 的结果进行 Base58 编码。结果即为一个公共地址。^(⁴³)\n\n我们可以用符号表示公共地址的生成过程：\n\n```\naddress\
    \ = base58_encode(\"1\" + RIPEMD-160(SHA256_HASH(public_key)) + checksum)\n```\n\
    \n图 9-1 展示了地址生成过程。\n\n![../images/492478_1_En_9_Chapter/492478_1_En_9_Fig1_HTML.jpg](img/492478_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1\n\n公共地址生成\n\nHelium 地址的版本字节将固定为 `hconfig` 模块中的值。Base58 编码之前的最后四个字节是一个校验和，使我们能够证明地址未被损坏。\n\
    \n此校验和的使用方式如下：\n\n1.  对公共地址进行 Base58 解码。\n2.  从上一步的结果中剥离最后四个字节。这四个字节是错误校验和。我们称之为提取的校验和。剩余部分包括前置的版本字节和\
    \ RIPEMD-160 哈希。我们将这部分称为 RIPEMD 哈希。\n3.  对 RIPEMD 哈希取 SHA-256 哈希，并提取最后四个字节。这是我们计算出的校验和。\n\
    4.  如果计算出的校验和与提取的校验和不相等，则该公共地址无效。\n\n请注意，由于公钥的随机生成以及哈希的加密特性，一个公钥总是会生成一个唯一对应的公共地址，*进而*该地址由某个唯一的私钥-公钥对生成。^(⁴⁴)\n\
    \n## 规范交易结构\n\n现在，我们将研究交易的规范 Python 结构。交易具有以下字典结构：\n\n```\n{\nversion:       \
    \  \ntransactionid:   \nlocktime:        \nvin:             \nvout:          \
    \  \n}\n```\n\n尖括号内的文本指定了键对应值的类型。\n\n`version` 键的值描述了用于处理交易的应用程序软件的版本。对于 Helium，该值固定为\
    \ \"1\"。\n\n`transactionid` 是交易的通用唯一标识符。我们将使用 Python 标准库中的 `secrets` 模块来创建一个长度为\
    \ 512 位的随机且安全的加密十六进制编码字符串。^(⁴⁵)\n\n`locktime` 是一个非负整数。如果此值大于零，则指示矿工在指定时间过去之前不要处理该交易。时间流逝以秒为单位。缓存该交易以供将来处理的矿工，在所需时间过去之前不会将交易包含在区块中。`locktime`\
    \ 的值不能超过 Helium 配置模块中指定的 `MAX_LOCKTIME`。\n"
- fmt: "### The Transaction `vin` List\n\nWe are now in a position to discuss the\
    \ `vin` list and unlocking previous transaction amounts. `vin` is an acronym for\
    \ value in. `vin` is a list of transaction inputs that consume the outputs of\
    \ previous transactions.\n\nEach element of the `vin` list is a dictionary. This\
    \ dictionary element has the following typical structure:\n\n```json\n{\ntxid:\
    \             \nvout_index:       \nScriptSig:        \n}\n```\n\n`txid` is the\
    \ transactionid of a previous transaction, a portion of whose output is being\
    \ consumed.\n\n`vout_index` is an index into the previous transaction's `vout`\
    \ array. Each `vout` element of a previous transaction specifies a value that\
    \ can be consumed (transferred). The total value consumed is a summation of values\
    \ transferred by all of the `vin` elements. Take note that the entire output in\
    \ the `vout` element of the previous transaction must be consumed.\n\nThe `ScriptSig`\
    \ script enables the transfer of value by proving ownership of the value. It is\
    \ the concatenation of a digital signature and a public key. The public key is\
    \ the key that was used to generate the public address to which value was transferred\
    \ in the previous transaction. We will look at this script in short order.\n\n\
    ### The Transaction `vout` List\n\n`vout` is an acronym for value out. Recall\
    \ that when a public address receives value pursuant to a transaction, then this\
    \ value can be subsequently spent in another transaction by its owner. A transaction's\
    \ `vout` list specifies the values that are transferrable to one or more receivers\
    \ of value. To reiterate, the `vout` list specifies transaction values that are\
    \ available to be spent in subsequent transactions by the owners of such values.\n\
    \n`vout` is a list. Each `vout` list element is a dictionary that has the following\
    \ representation:\n\n```json\n{\nvalue:  ,\nScriptPubKey: \n}\n```\n\n`value`\
    \ is the value of the cryptocurrency that is received by a specific public address.\
    \ The string `RIPEMD-160(SHA-160(Public Key))` is deconstructed from this public\
    \ address; ^([(46)](#fn46)) this deconstructed string is in `ScriptPubKey`. `ScriptPubKey`\
    \ is a list of symbolic unlocking operations, to be discussed subsequently. The\
    \ cryptocurrency value in a `vout` element can be spent by the entity who can\
    \ unlock the `ScriptPubKey` script. The only entity that can unlock the script\
    \ is the entity that possesses the private key pertaining to `RIPEMD-160(SHA-160(Public\
    \ Key))`. I will show this subsequently.\n\nThere are two aspects of `vout` to\
    \ notice. Firstly, only integer amounts can be transferred. In the Bitcoin realm,\
    \ the smallest transferable unit is one `satoshi`, or a hundred millionth of a\
    \ bitcoin. In Helium, the smallest transferable unit is a `helium cent`, which\
    \ is also a hundred millionth of a helium. By handling only integer arithmetic,\
    \ we avoid all of the messy complications involved in decimal and floating-point\
    \ arithmetic. Secondly, observe that the sum of values over the entire `vout`\
    \ list is the total value received by public addresses that have been provided\
    \ by the recipients of the transaction. Ordinarily, this amount will be slightly\
    \ less than the amount transferred into this transaction. The difference is the\
    \ transaction fee.\n\n### Transaction Mechanics\n\nIn Newtonian mechanics, the\
    \ fundamental unit of computation is a body which has mass. Bodies have well-defined\
    \ properties, and there are physical laws that govern their behavior. Analogously,\
    \ the fundamental unit of computation in a cryptocurrency network is the transaction.\
    \ Without transactions, there is no blockchain. Transactions have a rigid and\
    \ well-defined structure, as well as fixed rules that govern their behavior.\n\
    \nLet us go through all of the steps that are involved in a typical transaction.\
    \ Suppose that Alice wants to transfer one helium to Smith. The task before Alice\
    \ is to create a transaction object (the previous dictionary structure) that enables\
    \ this transfer. This transaction object must (i) unlock some of the previous\
    \ *heliums* that Alice owns and (ii) lock the output helium values so that only\
    \ Smith can unlock and use them. Unlocking the *heliums* that Alice owns means\
    \ that she has proven her ownership of these *heliums*, and hence, they can be\
    \ transferred away by her. Once these *heliums* are unlocked, they become outputs\
    \ that can be delivered to Smith. Alice locks these outputs so that only Smith\
    \ can unlock them. This will prove that Smith owns these *Heliums*.\n\nBefore\
    \ Alice can transfer one helium to Smith, she must own at least one helium. So\
    \ suppose that there is a previous transaction containing a single output of 1.08\
    \ heliums that Alice owns (one `vout` element). We suppose that the previous transaction\
    \ has id\n\n```json\n\"618a125ac95ba370187c574d174eb7d618f3ee35d374899ca0007a035ba0a9e1\"\
    \n```\n\nHere are the steps that Alice must follow to transfer one Helium to Smith:\n\
    \n1.  Alice requests Smith to send her a public address to which she can send\
    \ one bitcoin.\n\n2.  Smith sends Alice a public address that he has created.\n\
    \n3.  Alice creates a transaction id for her transaction. We suppose that this\
    \ id is\n\n```json\n\"d6b77f077ff700cd36df061ed75af353506f0cec6e267f0ce674eaa3b5d53217\"\
    \n```\n\n4.  When Alice received *heliums* in the previous transaction `\"618...9e1\"\
    `, she had provided a public address to the transferor. Alice now gets the public\
    \ key (say, `pPubKey`) with which this address was created and the private key\
    \ (say, `PrivKey`) paired with this public key. Alice extracts the following value,\
    \ which is available in the previous transaction's output (`vout` element):\n\n\
    ```\nMDHash = RIPEMD-160(SHA256(pPubKey))\n```\n\nAlice makes the digital signature\
    \ of `MDHash`:\n\n```\nSig = Signature(MDHash)\n```\n\nNext Alice creates a list\
    \ with two elements: `Sig` and the `Public Key` string corresponding to the private\
    \ key. This list is called a `ScriptSig`.\n\n5.  Using this information, Alice\
    \ creates the `vin` element in the transaction's `vin` list. This list contains\
    \ exactly one element. The `vout_index` element is the index into the `vout` list\
    \ of the previous transaction, and it identifies the output of the previous transaction\
    \ that is being consumed (let us assume it is 0). The `vin` element is\n\n```json\n\
    {\n\"txid\": \"618a125ac95ba370187c574d174eb7d618f3ee35d374899ca0007a035ba0a9e1\"\
    \n\"vout_index\": 0\n\"ScriptSig\":  [Sig, PublicKey]\n}\n```\n\n6.  Alice next\
    \ takes the public address provided by Smith and reverses the Base58 encoding\
    \ and strips off the checksum. The result is\n\n```\nRESULT =  \"1\" + RIPEMD-160(SHA256(smith's\
    \ public key))\n```\n\nShe then computes the SHA256 hash of `RESULT` with the\
    \ checksum that she has stripped off. If an error is not indicated, Alice places\
    \ the following string in the `ScriptPubKey` key of first `vout` element:\n\n\
    ```\n\"  MDHASH  \"\n```\n\nwhere `MDHASH` is `RIPEMD-160(SHA256(smith's public\
    \ key))`.\n\n7.  Alice's `vout` element is\n\n```json\n{\n\"value\":  1,\n\"ScriptPubKey\"\
    : \"  MDHASH  \"\n}\n```\n\n8.  And Alice has now created the transaction object,\
    \ which looks like this:"
