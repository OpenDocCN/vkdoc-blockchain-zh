- fmt: "# Helium Block Structure\n\nIn this section, we are going to discuss the structure\
    \ of a Helium block. From Chapter [6](#492478_1_En_6_Chapter.xhtml), you will\
    \ recall that a blockchain is an ordered, immutable collection of blocks that\
    \ have cryptographic validation. Each Helium block is a container for transactions.\n\
    \nA block is the following dictionary data structure (the angle brackets describe\
    \ the type of the block attribute):\n\n```\n{\n\"prevblockhash\":   \n\"version\"\
    :         \n\"timestamp\":       \n\"difficulty_bits\": \n\"nonce\":         \
    \  \n\"merkle_root\":     \n\"height\":          \n\"tx\":              \n}\n\
    ```\n\nIn Python, an integer is a signed integer. Python 3 eliminates the difference\
    \ between integers and long integers. Integers can have any size and are only\
    \ limited by memory. Python can perform arithmetic operations on integers of unlimited\
    \ size.\n\n`prevblockhash` is the SHA-256 message digest of the previous block\
    \ header in string hexadecimal format. This value is used to test whether the\
    \ previous block has been tampered with. The `prevblockhash` value of the genesis\
    \ block is the empty string.\n\nThe subset of block attributes `prevblockhash`,\
    \ `version`, `timestamp`, `difficulty_bits`, `nonce`, and `merkle_root` is called\
    \ the block header. The block header does not include the list of transactions.\
    \ Because the merkle root is included in the header, we can test the validity\
    \ of the entire block, inclusive of the transactions, by computing the SHA-256\
    \ message digest of the header only.\n\n`version` is the version number of Helium\
    \ to which this block pertains. This attribute is set in the Helium configuration\
    \ module and is “1”.\n\n`timestamp` is the Unix timestamp (epoch time) of when\
    \ the block was created. Epoch time is the number of seconds that have elapsed\
    \ since midnight, January 1, 1970, Greenwich Mean Time or UTC. It marks the birth\
    \ of Unix.\n\n`difficulty_bits` is the `DIFFICULTY_BITS` as defined in the Helium\
    \ configuration module. This is the value when the block was mined. Note that\
    \ the `DIFFICULTY_BITS` parameter is periodically varied as the average time to\
    \ mine a block is adjusted toward ten minutes.\n\n`nonce` is a number used in\
    \ the Helium mining algorithm.\n\n`merkle_root` is a SHA-256 hexadecimal string.\
    \ The merkle root lets us ensure that the transactions in the block have not been\
    \ tampered with. It also lets us determine if a particular transaction is present\
    \ in the block. We will discuss this value in a subsequent chapter.\n\n`height`\
    \ is the height of this block. Blocks in a blockchain are ordered in conformity\
    \ with the distributed consensus algorithm and can be visualized as being stacked\
    \ one on top of another. The first block, which is the genesis block, has height\
    \ 0.\n\n`tx` is a list of transactions. The number of transactions in the list\
    \ is constrained by the maximum permissible size of a block. In the Helium configuration\
    \ module, this value is set to 1 MB.\n\nNow that we have defined a block, we can\
    \ specify a Helium blockchain:\n\n```\nblockchain = []\n```\n\nThe blockchain\
    \ is a list and each list element is a block.^([^(41)](#fn41))\n\n# Helium Blockchain\
    \ Walkthrough\n\nWe are now ready to walk through our Helium blockchain code.\
    \ Copy the following program code into a file named `hblockchain.py` and copy\
    \ this file into the `block` directory. This is not the complete program code\
    \ for the blockchain module since transactions and database operations have been\
    \ abstracted. Since we have not developed the code for transaction and database\
    \ modules as of yet, we mock operations pertaining to these modules with synthetic\
    \ values.\n\nThe Helium blockchain code uses the `json` and `pickle` modules.\
    \ Both of these modules are part of the Python standard library, and thus, there\
    \ is no need to install them. JSON is a data interchange standard that can encode\
    \ Python objects into strings and then decode these strings back into the corresponding\
    \ objects. `Pickle` serializes objects by converting objects into a sequence of\
    \ bytes and then writing this sequence to a file. This process is called serialization.\
    \ `Pickle` can deserialize files to recover the original objects. If you have\
    \ never used `Pickle` before, Appendix 5 provides a concise introduction to Pickle\
    \ usage.\n\nThe `add_block` function adds a block to the Helium blockchain. This\
    \ function receives a block. The function checks whether the block attributes\
    \ have valid values. In particular, it verifies that the transactions included\
    \ in the block are valid. In the event that the block is invalid, the function\
    \ returns with a false value. If the block is valid, the function serializes the\
    \ block to a raw byte file through the Pickle module. This block is then added\
    \ to the blockchain list in memory.\n\nThe `serialize_block` function serializes\
    \ a block to the `data` directory using Pickle. The file name is constructed as\
    \ follows:\n\n```\nfilename = \"block_\" + block_height + \".dat\"\n```\n\nThe\
    \ `read_block` function receives an index into the blockchain and returns the\
    \ block corresponding to the index. An exception will be thrown if the index is\
    \ out of bounds.\n\nThe `blockheader_hash` function receives a block and returns\
    \ the SHA-256 message digest of the block header as a hexadecimal string. Observe\
    \ again that since the merkle root can be used to test whether the transactions\
    \ in the block have been tampered with, we do not have to compute the SHA-256\
    \ cryptographic hash of the block over the entire block contents. It is sufficient\
    \ to calculate this value over only the block header since it includes the merkle\
    \ root.\n\nThe `validate_block` function tests whether a block has valid values.\
    \ This function also validates the previous block by comparing SHA-256 message\
    \ digests.\n\nThe final program code listing for `hblockchain` as well as the\
    \ other Helium modules is available in Appendix 10 of this book."
