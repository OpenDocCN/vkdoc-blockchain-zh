  trans: "\n# 挖掘区块\n\n现在矿工已准备好一个候选区块并可开始挖掘，即可启动实际流程。候选区块的区块头中有一个名为 `nonce` 的数值；这是一个初始化为零的非负整数。`nonce`\
    \ 启动挖矿流程，并随着流程推进而递增。\n\n矿工计算包含 `nonce` 的区块头的 SHA-256 十六进制摘要。这个十六进制字符串会被转换成一个（非常大的）数字，并与网络当前指定的难度数值进行比较。如果计算值小于难度值，则该区块被视为已挖掘完成^((56))。如果\
    \ SHA-256 哈希值大于或等于难度值，则 `nonce` 递增，重新计算 SHA-256 哈希值并再次与难度值比较。此过程持续进行，直到获得一个小于难度值的哈希值为止。\n\
    \n在比特币中，`nonce` 是一个 32 位整数，当计算遍历完 2**32 – 1 个 `nonces` 的整个范围后，计算值常常仍无法小于难度值。如果发生这种情况，`nonce`\
    \ 会再次初始化为 0，并放置于 coinbase 交易的第一个 `vin` 列表元素的交易 ID 字段中。这对我们的 Python 实现来说不成问题，因为\
    \ Python 可以对任意大的数字执行算术运算。\n\n图 13-1 展示了挖掘区块的流程图。\n\n![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig1_HTML.jpg](img/492478_1_En_13_Fig1_HTML.jpg)\n\
    \n图 13-1\n\n挖掘区块\n\n当矿工正在挖掘其候选区块时，其他矿工也在挖掘区块。其他矿工挖掘的区块不一定要包含与我们矿工候选区块相同的交易。事实上，一些矿工的本地区块链可能与其他矿工的区块链不同。\n\
    \n如果矿工成功挖掘出一个候选区块，它会将该新区块添加到自己的本地区块链中，然后在加密货币网络上广播这个已挖掘的区块。这是邀请其他节点将此区块纳入其本地区块链。\n\
    \n接收到新挖掘区块的节点会运行一系列测试来验证该区块。这些测试包括：\n\n1.  已使用正确的难度数值。\n2.  该区块的计算哈希值小于区块头中 `nonce`\
    \ 对应的难度值。\n3.  新区块的区块高度有效。\n4.  区块交易的默克尔根与区块头中的默克尔根匹配。\n5.  区块中没有交易被锁定。\n6.  区块中的交易有效。\n\
    7.  如果某交易转移了 coinbase 值，则自包含该 coinbase 交易的区块之后，区块链上必须已添加了所需的最小区块数量。\n8.  存在匹配的\
    \ `prevblockhash`，如下文所述。\n\n如果被挖掘的节点通过这组验证测试，该节点即可将此区块添加到其区块链中。\n\n## 区块高度验证\n\
    \n接收新区块的节点会检查区块中 `height` 键的值：\n\n1.  如果 `height` 为负数或零，则拒绝该区块。\n2.  如果 `height`\
    \ 值小于节点区块链的高度，则拒绝该区块。\n3.  如果区块高度等于节点区块链高度加 2，则将该区块放入孤块列表。\n4.  如果区块高度大于节点区块链高度加\
    \ 2，则将该区块放入孤块列表。节点的区块链可能已过时。节点会向其他节点请求最新区块，以便在必要时更新其区块链。\n\n## 前序区块验证\n\n已完成新区块接收和验证的节点现在可以添加该新区块。以下算法列出了将区块添加到区块链的步骤。\n\
    \n### 定义\n\n设 `previousblockhash` 为已挖掘区块中 `prevblockhash` 键的值。\n\n设 `block_name[latest]`\
    \ 为名为 \"`block_name`\" 的区块链上的最新区块。\n\n设 `block_name[latest-1]` 为名为 \"`block_name`\"\
    \ 的区块链上的次新区块。\n\n设 `hash(block_name[x])` 为名为 `block_name` 的区块头的 SHA-256 哈希值，其中\
    \ `x` 为 `latest` 或 `latest-1`。\n\n如果节点有一个区块链，则将其命名为 `primary_blockchain`。\n\n\
    如果节点有两个区块链，则将一个命名为 `primary_blockchain`，另一个命名为 `secondary_blockchain`。\n\n###\
    \ 算法\n\n1.  如果节点有一个区块链，并且：\n```\npreviousblockhash == hash(primary_blockchain[latest])\n\
    ```\n则将挖掘出的区块追加到 `primary_blockchain`。\n\n2.  否则如果节点有一个区块链，并且：\n    ```\n    previousblockhash\
    \ == hash(primary_blockchain[latest -1])\n    ```\n    那么：\n    1.  通过移除 `primary_blockchain`\
    \ 的最新元素，创建一个名为 `secondary_blockchain` 的新区块链。\n    2.  将挖掘出的区块追加到 `secondary_blockchain`。\n\
    \n3.  如果节点有两个区块链，则：\n    ```\n    if previousblockhash == primary_blockchain[latest]\n\
    \    then add the mined block to primary_blockchain\n    else if previousblockhash\
    \ == secondary_blockchain[latest]\n    then add the mined block to secondary_blockchain\n\
    \    ```\n\n4.  如果上述情况均不成立，则节点将该区块放入孤块列表。\n\n请注意，在第二种情况下，节点拥有两条相互竞争成为主链的区块链。\n\
    \n如果接收到新挖掘区块的节点是一个矿工，它将检查该挖掘区块中的任何交易是否也存在于它一直在挖掘的区块中。如果是这种情况，矿工将丢弃它一直在挖掘的区块，并将该区块中的交易返回给内存池。如果不是这种情况，它可以继续挖掘其候选区块。接下来，矿工通过移除内存池中也存在于已接收挖掘区块中的任何交易来更新其内存缓存。\n\
    \n最后，节点在加密货币网络上广播其接收到的新区块，以便其他节点能够验证该区块并将其添加到它们的本地区块链中。\n\n## 工作量证明\n\n挖掘区块是一项计算密集型任务。当一个区块被挖掘出来时，区块中包含的\
    \ `nonce` 和难度值使得其他矿工能够验证该矿工确实挖掘出了这个区块。这种验证称为工作量证明。未通过此工作量证明的区块将不会被其他矿工用来扩展其本地区块链。\n"
- fmt: '# The Difficulty Number


    The difficulty number is not some fixed number. It dynamically changes over time.
    For example, in Bitcoin the constraint is that a block should be mined approximately
    every ten minutes. The purpose of the difficulty number is to ensure that on average
    a block is mined in this time period. In the Bitcoin ecosystem, the difficulty
    number is adjusted every two weeks to ensure that blocks are mined approximately
    every ten minutes. Helium follows this model.


    In Helium, after a fixed number of blocks have been mined, the mining nodes check
    to determine the frequency with which blocks are being mined. If the rate is too
    high, the difficulty number is adjusted downward, and if the blocks are being
    produced too slowly, the difficulty number is increased. Each node adjusts its
    difficulty number. When a mining node receives a mined block, it checks to determine
    that the correct difficulty number has been used.


    In Helium, a new block should be mined, on average, every ten minutes. The Helium
    difficulty number is calibrated by the following algorithm^([^(57)](#fn57)) every
    1000 blocks:


    ```

    time_initial    = timestamp of the block that is 1000 blocks earlier

    time_now        = timestamp of latest block

    elapsed_seconds = time_now - time_old

    blocks_expected_to_be_mined = elapsed_seconds / 600

    actual blocks mined = 1000

    discrepancy = 1000 - blocks_expected_to_be_mined

    new difficulty no = old_difficulty_number - old_difficulty_number * \

    (20/100)*(discrepancy/(1000 + blocks_expected_to_be_mined))

    ```


    The fraction `20/1000` constrains the new difficulty number to vary by no more
    than 20% from its previous value.


    # Hash Power Computations


    Mining a block involves computing the SHA-256 hash of the current value of the
    block header. Given the hardware which a miner has available to him, this miner
    can perform a fixed number of hashes per second. The total hash power of the cryptocurrency
    network is the total number of hashes which all of the miners in the network can
    perform in a second given their hardware configurations. Consequently, the probability
    of a miner mining a block is:


    ```

    probBlock = (miner''s hash power) / (total hash power of the network)

    ```


    The average amount of time that it will take for a miner to mine a block (`minerAvgTime`)
    is calculated as follows:


    ```

    let blockTime = average amount of time to mine a block in the network

    then:

    minerAvgTime = blockTime / probBlock

    ```


    For the Bitcoin network, the average time to mine a block is 600 seconds, so:


    ```

    minerAvgTime = 600 / probBlock

    ```


    # The Distributed Consensus Algorithm


    We are now ready to discuss how nodes on a cryptocurrency network arrive at a
    consensus as to the dominant blockchain on the network.


    Each full node in a cryptocurrency network maintains its own blockchain.^([^(58)](#fn58))
    Furthermore, such a node does not know what the blockchains of other full nodes
    look like. Conceivably, these local blockchains can differ from each other. The
    distributed consensus algorithm decides how blocks will be added to these local
    blockchains when different nodes in the cryptocurrency network have blockchains
    which differ from each other. This algorithm implements a distributed consensus
    that converges the nodes to the same blockchain without requiring any node to
    trust any other node. This distributed consensus algorithm constitutes the single
    most important innovation in the implementation of Bitcoin by Satoshi Nakamoto.


    To be precise, the distributed consensus algorithm that we are discussing is called
    the proof-of-work distributed consensus algorithm to distinguish it from the proof-of-stake
    distributed consensus algorithm.


    Before we begin our examination of this distributed consensus algorithm, note
    that there is no clock or timekeeper in the system and there is also no concept
    of the ordering of transactions on the basis of time or otherwise. A node processes
    blocks as they are received, and these blocks need not arrive in the order that
    they were produced. A node may not receive a block for any number of reasons including
    a temporary partition in the network.


    Mining is a costly endeavor and requires the expenditure of CPU cycles (electricity)
    to solve a difficult mathematical problem. A miner is only willing to undertake
    the cost of mining if it can be compensated by an adequate mining reward and transaction
    fees. It is this incentive for profit which impels miners to converge to the same
    view of the blockchain. As we shall see, this incentive compels nodes to be honest
    and follow the blockchain consensus algorithm.


    Consider a cryptocurrency network where all of the nodes initially have the same
    view of the blockchain.


    In Figure [13-2](#492478_1_En_13_Chapter.xhtml#Fig2), each circle represents a
    node in the cryptocurrency network. The rectangle in each node represents the
    head of the local blockchain of the node. Since all of these shapes are the same,
    we interpret this to mean that each of the nodes has the same blockchain.


    ![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig2_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig2_HTML.jpg)


    Figure 13-2

    Nodes in a Cryptocurrency Network


    Now, node X successfully mines a block and adds it to the head of its local blockchain.
    X then broadcasts the block, and its immediate neighbors append the new block
    to the head of their respective local blockchains. The nodes that have appended
    the new block to their blockchains are indicated by a circle with a star inside.
    Some of the nodes in the network have not received the new block or for some reason
    have not appended it to their local blockchains. The shape of these nodes remains
    unchanged (Figure [13-3](#492478_1_En_13_Chapter.xhtml#Fig3)).


    ![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig3_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig3_HTML.jpg)


    Figure 13-3

    Node X Mines a Block


    At this point in time, there are two views of the blockchain since some nodes
    have not yet appended the new block to their blockchains. These nodes are effectively
    one block behind.


    Now a very short time after X mined its block, node Y mines a block, and after
    adding it to its blockchain, it broadcasts the new block on the network. A number
    of nodes receive this block and append the block to their blockchains (Figure
    [13-4](#492478_1_En_13_Chapter.xhtml#Fig4)). The nodes that have appended Y’s
    mined block to their blockchains are depicted as the nodes with an angled rectangle
    inside a circle.


    ![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig4_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig4_HTML.jpg)


    Figure 13-4

    Node Y Mines a Block'
  raw: '## The Difficulty Number


    The difficulty number is not some fixed number. It dynamically changes over time.
    For example, in Bitcoin the constraint is that a block should be mined approximately
    every ten minutes. The purpose of the difficulty number is to ensure that on average
    a block is mined in this time period. In the Bitcoin ecosystem, the difficulty
    number is adjusted every two weeks to ensure that blocks are mined approximately
    every ten minutes. Helium follows this model.


    In Helium, after a fixed number of blocks have been mined, the mining nodes check
    to determine the frequency with which blocks are being mined. If the rate is too
    high, the difficulty number is adjusted downward, and if the blocks are being
    produced too slowly, the difficulty number is increased. Each node adjusts its
    difficulty number. When a mining node receives a mined block, it checks to determine
    that the correct difficulty number has been used.


    In Helium, a new block should be mined, on average, every ten minutes. The Helium
    difficulty number is calibrated by the following algorithm^([^(57)](#fn57)) every
    1000 blocks:


    ```

    time_initial    = timestamp of the block that is 1000 blocks earlier

    time_now        = timestamp of latest block

    elapsed_seconds = time_now - time_old

    blocks_expected_to_be_mined = elapsed_seconds / 600

    actual blocks mined = 1000

    discrepancy = 1000 - blocks_expected_to_be_mined

    new difficulty no = old_difficulty_number - old_difficulty_number * \

    (20/100)*(discrepancy/(1000 + blocks_expected_to_be_mined))

    ```


    The fraction 20/1000 constrains the new difficulty number to vary by no more than
    20% from its previous value.


    ## Hash Power Computations


    Mining a block involves computing the SHA-256 hash of the current value of the
    block header. Given the hardware which a miner has available to him, this miner
    can perform a fixed number of hashes per second. The total hash power of the cryptocurrency
    network is the total number of hashes which all of the miners in the network can
    perform in a second given their hardware configurations. Consequently, the probability
    of a miner mining a block is


    ```

    probBlock = (miner''s hash power) / (total hash power of the network)

    ```


    The average amount of time that it will take for a miner to mine a block (*minerAvgTime*)
    is calculated as follows:


    ```

    let blockTime = average amount of time to mine a block in the network

    then:

    minerAvgTime = blockTime / probBlock

    ```


    For the Bitcoin network, the average time to mine a block is 600 seconds, so:


    ```

    minerAvgTime = 600/probBlock

    ```


    ## The Distributed Consensus Algorithm


    We are now ready to discuss how nodes on a cryptocurrency network arrive at a
    consensus as to the dominant blockchain on the network.


    Each full node in a cryptocurrency network maintains its own blockchain.^([^(58)](#fn58))
    Furthermore, such a node does not know what the blockchains of other full nodes
    look like. Conceivably, these local blockchains can differ from each other. The
    distributed consensus algorithm decides how blocks will be added to these local
    blockchains when different nodes in the cryptocurrency network have blockchains
    which differ from each other. This algorithm implements a distributed consensus
    that converges the nodes to the same blockchain without requiring any node to
    trust any other node. This distributed consensus algorithm constitutes the single
    most important innovation in the implementation of Bitcoin by Satoshi Nakamoto.


    To be precise, the distributed consensus algorithm that we are discussing is called
    the proof-of-work distributed consensus algorithm to distinguish it from the proof-of-stake
    distributed consensus algorithm.


    Before we begin our examination of this distributed consensus algorithm, note
    that there is no clock or timekeeper in the system and there is also no concept
    of the ordering of transactions on the basis of time or otherwise. A node processes
    blocks as they are received, and these blocks need not arrive in the order that
    they were produced. A node may not receive a block for any number of reasons including
    a temporary partition in the network.


    Mining is a costly endeavor and requires the expenditure of CPU cycles (electricity)
    to solve a difficult mathematical problem. A miner is only willing to undertake
    the cost of mining if it can be compensated by an adequate mining reward and transaction
    fees. It is this incentive for profit which impels miners to converge to the same
    view of the blockchain. As we shall see, this incentive compels nodes to be honest
    and follow the blockchain consensus algorithm.


    Consider a cryptocurrency network where all of the nodes initially have the same
    view of the blockchain.


    In Figure [13-2](#492478_1_En_13_Chapter.xhtml#Fig2), each circle represents a
    node in the cryptocurrency network. The rectangle in each node represents the
    head of the local blockchain of the node. Since all of these shapes are the same,
    we interpret this to mean that each of the nodes has the same blockchain.


    ![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig2_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Nodes in a Cryptocurrency Network


    Now, node X successfully mines a block and adds it to the head of its local blockchain.
    X then broadcasts the block, and its immediate neighbors append the new block
    to the head of their respective local blockchains. The nodes that have appended
    the new block to their blockchains are indicated by a circle with a star inside.
    Some of the nodes in the network have not received the new block or for some reason
    have not appended it to their local blockchains. The shape of these nodes remains
    unchanged (Figure [13-3](#492478_1_En_13_Chapter.xhtml#Fig3)).


    ![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig3_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Node X Mines a Block


    At this point in time, there are two views of the blockchain since some nodes
    have not yet appended the new block to their blockchains. These nodes are effectively
    one block behind.


    Now a very short time after X mined its block, node Y mines a block, and after
    adding it to its blockchain, it broadcasts the new block on the network. A number
    of nodes receive this block and append the block to their blockchains (Figure
    [13-4](#492478_1_En_13_Chapter.xhtml#Fig4)). The nodes that have appended Y’s
    mined block to their blockchains are depicted as the nodes with an angled rectangle
    inside a circle.'
  trans: "\n# 难度值\n\n难度值并非固定不变的数字，它会随时间动态调整。例如在比特币中，约束条件是大约每十分钟应挖出一个区块。难度值的目的是确保区块平均能在该时间周期内被挖出。在比特币生态系统中，难度值每两周调整一次，以保证区块大约每十分钟被挖出一个。Helium\
    \ 遵循了这一模式。\n\n在 Helium 中，当挖出固定数量的区块后，挖矿节点会检查区块被挖出的频率。如果频率过高，难度值会向下调整；如果区块产出过慢，难度值则会增加。每个节点都会自行调整其难度值。当挖矿节点收到一个已挖出的区块时，它会检查该区块是否使用了正确的难度值。\n\
    \n在 Helium 中，平均每十分钟应挖出一个新区块。Helium 的难度值通过以下算法每 1000 个区块校准一次^(⁵⁷)：\n\n``` \ntime_initial\
    \    = 1000 个区块之前的区块时间戳\ntime_now        = 最新区块的时间戳\nelapsed_seconds = time_now\
    \ - time_old\nblocks_expected_to_be_mined = elapsed_seconds / 600\n实际挖出的区块数 =\
    \ 1000\n差异值 = 1000 - blocks_expected_to_be_mined\n新难度值 = 旧难度值 - 旧难度值 * \\\n(20/100)*(差异值/(1000\
    \ + blocks_expected_to_be_mined))\n```\n\n分数 `20/1000` 将新难度值的变动限制在其先前值的 20% 以内。\n\
    \n# 算力计算\n\n挖矿需要计算当前区块头值的 SHA-256 哈希值。根据矿工可用的硬件设备，该矿工每秒能执行固定次数的哈希运算。加密货币网络的总算力是指网络中所有矿工根据其硬件配置，每秒能执行的总哈希次数。因此，矿工挖出区块的概率为：\n\
    \n```\n概率 _ 区块 = (矿工的算力) / (网络总算力)\n```\n\n矿工挖出一个区块所需的平均时间（`矿工平均时间`）计算如下：\n\n\
    ```\n设 区块时间 = 网络挖出一个区块的平均时间\n则：\n矿工平均时间 = 区块时间 / 概率 _ 区块\n```\n\n对于比特币网络，挖出一个区块的平均时间为\
    \ 600 秒，因此：\n\n```\n矿工平均时间 = 600 / 概率 _ 区块\n```\n\n# 分布式共识算法\n\n现在我们准备讨论加密货币网络中的节点如何就网络上的主导区块链达成共识。\n\
    \n加密货币网络中的每个全节点都维护着自己的区块链^(⁵⁸)。此外，这样的节点并不知道其他全节点的区块链是什么样子。可以想象，这些本地区块链之间可能存在差异。分布式共识算法决定了当加密货币网络中不同节点拥有彼此不同的区块链时，区块将如何被添加到这些本地区块链中。该算法实现了一种分布式共识，它能使各节点收敛到同一条区块链上，且无需任何节点信任其他节点。这个分布式共识算法构成了中本聪实现比特币时最重要的创新。\n\
    \n准确地说，我们讨论的这种分布式共识算法被称为工作量证明分布式共识算法，以区别于权益证明分布式共识算法。\n\n在我们开始研究这种分布式共识算法之前，请注意系统中没有时钟或计时器，也没有基于时间或其他因素对交易进行排序的概念。节点在收到区块时就进行处理，而这些区块到达的顺序可能并非其被产生的顺序。节点可能因各种原因（包括网络临时分区）而未接收到某个区块。\n\
    \n挖矿是一项成本高昂的工作，需要消耗 CPU 周期（电力）来解决一个困难的数学问题。矿工只有在能够通过足够的挖矿奖励和交易费用获得补偿时，才愿意承担挖矿成本。正是这种对利润的激励机制促使矿工们收敛到对区块链相同的视图上。正如我们将看到的，这种激励迫使节点保持诚实并遵循区块链共识算法。\n\
    \n考虑一个加密货币网络，其中所有节点最初对区块链拥有相同的视图。\n\n在图 13-2 中，每个圆圈代表加密货币网络中的一个节点。每个节点中的矩形代表该节点本地区块链的头部。由于所有这些形状都相同，我们将其理解为每个节点都拥有相同的区块链。\n\
    \n![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig2_HTML.jpg](img/492478_1_En_13_Fig2_HTML.jpg)\n\
    \n图 13-2\n加密货币网络中的节点\n\n现在，节点 X 成功挖出了一个区块，并将其添加到本地区块链的头部。X 随后广播该区块，其相邻节点将该新区块追加到各自本地区块链的头部。那些已将新区块追加到其区块链的节点用带有星号的圆圈表示。网络中部分节点尚未收到该新区块，或出于某种原因尚未将其追加到本地区块链上。这些节点的形状保持不变（图\
    \ 13-3）。\n\n![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig3_HTML.jpg](img/492478_1_En_13_Fig3_HTML.jpg)\n\
    \n图 13-3\n节点 X 挖出一个区块\n\n在此时刻，由于一些节点尚未将新区块追加到其区块链上，因此存在两种区块链视图。这些节点实际上落后了一个区块。\n\
    \n在 X 挖出区块后很短的时间内，节点 Y 挖出了一个区块，并将其添加到自己的区块链后，在网络中广播该新区块。许多节点收到这个区块并将其追加到自己的区块链上（图\
    \ 13-4）。那些已将 Y 挖出的区块追加到其区块链的节点被描绘为圆圈内带有倾斜矩形的节点。\n\n![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig4_HTML.jpg](img/492478_1_En_13_Fig4_HTML.jpg)\n\
    \n图 13-4\n节点 Y 挖出一个区块\n"
- fmt: '![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig4_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig4_HTML.jpg)


    **Figure 13-4** Node Y Mines a Block


    Now the block mined by Y reaches node C. Node C notices that it cannot add this
    block to the head of its version of the blockchain since the previous block hash
    value does not match. Node C also observes that this block could be added if the
    block before the block at the head of the blockchain was in fact at the head of
    the blockchain. So node C creates a secondary blockchain by removing the node
    at the head of the blockchain and adding the new block to this secondary blockchain.
    At this stage, node C has a primary blockchain and a secondary blockchain, and
    the heads of these blockchains are different.


    All of the nodes with a star follow the same logic and create primary and secondary
    blockchains as node Y’s block reaches them.


    Similarly, as the block mined by X reaches the nodes with the angled rectangles,
    these nodes accept the incoming block but have to create primary and secondary
    blockchains.


    Now both of the blocks mined by X and Y reach the node with a rectangle, and it
    too creates a primary and secondary blockchain.


    Next, node d successfully mines a block and broadcasts it on the network. This
    time, no other mining node on the network is able to mine a node quickly enough,
    so the block mined by node d reaches all of the nodes on the network (Figure [13-5](#492478_1_En_13_Chapter.xhtml#Fig5)).
    Some of these nodes can add the block to their primary blockchains (these are
    the nodes that received the block mined by Y first). These nodes add the block
    to their primary blockchain. The shorter blockchain is cleared, provided it is
    two blocks or more blocks shorter than the longer blockchain.


    ![../images/492478_1_En_13_Chapter/492478_1_En_13_Fig5_HTML.jpg](images/492478_1_En_13_Chapter/492478_1_En_13_Fig5_HTML.jpg)


    **Figure 13-5** Node d Mines a block


    Similarly, the nodes that received the block from node X first can add the new
    block to their secondary blockchains. These nodes add the block to their secondary
    blockchains and delete their primary blockchains and designate the secondary blockchain
    as the primary blockchain. Notice once again that the shorter blockchain is deleted.


    At this stage, all of the nodes on the network have converged to the same view
    of the blockchain. The preceding process describes the distributed consensus algorithm
    which was implemented first by Satoshi Nakamoto for Bitcoin. The reason why all
    miners will follow the longest blockchain is because if they do not, the majority
    of miners will add blocks to the longest blockchain and the dissenting miners
    will discover that though they can mine blocks, they will not be able to persuade
    other miners to add these blocks to the shorter blockchain and thus they will
    be unable to collect mining rewards and transaction fees.


    Because the longest blockchain has the most hashing power expended on it, nodes
    consider this blockchain to be the correct one and will work on extending it.


    As we have just seen, when the two forked blockchains, the primary blockchain
    and the secondary blockchain, re-converge, one of these blockchains is deleted.
    So what happens to the transactions in the deleted blockchain? Let’s assume that
    the primary blockchain is deleted because the secondary blockchain is one block
    ahead of it. Since the secondary blockchain was created from the primary blockchain
    with the exclusion of the latest block on the primary blockchain, we only have
    to consider the transactions in this particular block. We simply put those transactions
    in this block which are also not in the latest block of the secondary blockchain,
    back into the mempool.


    ## Malicious Nodes


    We can note three aspects of malicious nodes. A malicious node cannot create a
    transaction that steals someone’s cryptocurrency because it needs the private
    key of this individual in order to digitally sign the malicious transaction.


    Secondly, a malicious mining node may decide not to process a transaction. But
    this is a useless action since other mining nodes that receive the transaction
    will include it in their candidate blocks.


    Lastly, a number of malicious nodes acting in concert cannot impose their common
    blockchain as the dominant blockchain on the network unless they control at least
    51% of the total hashing power. The reason for this is that if these nodes have
    at least 51% of the total hashing power, then the probability that the next block
    will be produced by them and added to their version of the blockchain is at least
    51%. Thus, since they control the majority of the hashing power, they will be
    able to extend their version of the blockchain and impose it as the primary blockchain
    on the network.


    ## Transaction Confirmations


    When a block is mined and added to the blockchain, we say that the transactions
    in the block have one confirmation. When another block is added, the transactions
    in the previous block are said to have two confirmations. As the number of blocks
    added to the blockchain keeps on increasing, so do the confirmations. In Bitcoin,
    transactions that receive six confirmations are considered to be irreversible
    because of the prohibitively expensive hashing power that would be required for
    the network to undo a transaction in a block that is six blocks deep. A malicious
    node would have to control the majority of the hashing power of the network to
    undo these blocks and build an alternate longest blockchain.


    ## The Double-Spend Problem


    Consider the following scenario. Alice has one helium coin and she transmits it
    to Smith. Alice propagates the transaction on the network and a miner starts mining
    a block that contains this transaction. Now Alice goes somewhere else and spends
    the same helium again. Since no miner has yet mined a block containing Alice’s
    first transaction, the second transaction also propagates on the network, and
    some miners add it to their candidate blocks and start mining these blocks. This
    is the double-spend problem. Alice has apparently spent her helium twice.


    The first miner successfully mines its block and broadcasts the block on the network.
    This block contains Alice’s first transaction. A very short time after, a second
    miner also successfully mines a block and propagates it on the network. This block
    contains Alice’s second transaction.


    Consider a node that receives one of these blocks. This node will extend its blockchain
    with the received block and update its `Chainstate` database. If a short time
    later it receives the second block, it will reject this block because a query
    on the `Chainstate` database will show that Alice does not have the required value
    for the transaction. Due to the examination of the `Chainstate`, a node will only
    have one of the two blocks containing a transaction by Alice. This is true even
    if a node has bifurcated to a primary and secondary blockchain.


    This example shows why transaction confirmations are important. For small value
    transactions, two confirmations are sufficient (20 minutes on the bitcoin network
    on average). For large value transactions, at least six confirmations should be
    obtained (about one hour on the bitcoin network).'
