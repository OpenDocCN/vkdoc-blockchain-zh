  trans: "\n# Helium 区块结构\n\n在本节中，我们将讨论 Helium 区块的结构。回顾第 6 章，你应记得区块链是一个经过加密验证的有序且不可变的区块集合。每个\
    \ Helium 区块都是一个交易的容器。\n\n区块是如下的字典数据结构（尖括号内描述的是区块属性的类型）：\n\n```\n{\n\"prevblockhash\"\
    :   \n\"version\":         \n\"timestamp\":       \n\"difficulty_bits\": \n\"\
    nonce\":           \n\"merkle_root\":     \n\"height\":          \n\"tx\":   \
    \           \n}\n```\n\n在 Python 中，整数是一种有符号整数。Python 3 消除了普通整数与长整数之间的区别。整数可以有任意大小，仅受内存限制。Python\
    \ 可以执行任意大小的整数算术运算。\n\n`prevblockhash` 是前一区块头部的 SHA-256 消息摘要，以十六进制字符串格式表示。该值用于检测前一区块是否被篡改。创世区块的\
    \ `prevblockhash` 值是空字符串。\n\n区块属性的子集 `prevblockhash`、`version`、`timestamp`、`difficulty_bits`、`nonce`\
    \ 和 `merkle_root` 被称为区块头部。区块头部不包含交易列表。由于 Merkle 根包含在头部中，我们可以仅通过对头部计算 SHA-256 消息摘要来检验整个区块（包括交易）的有效性。\n\
    \n`version` 是该区块所属 Helium 的版本号。该属性在 Helium 配置模块中设置，值为“1”。\n\n`timestamp` 是区块创建时的\
    \ Unix 时间戳（纪元时间）。纪元时间是指自格林威治标准时间（即 UTC）1970 年 1 月 1 日午夜以来所经过的秒数。它标志着 Unix 的诞生。\n\
    \n`difficulty_bits` 是 Helium 配置模块中定义的 `DIFFICULTY_BITS` 值。这是该区块被挖掘时的值。请注意，`DIFFICULTY_BITS`\
    \ 参数会随着平均挖矿时间调整至十分钟而周期性变化。\n\n`nonce` 是在 Helium 挖矿算法中使用的数字。\n\n`merkle_root` 是一个\
    \ SHA-256 十六进制字符串。Merkle 根使我们能够确保区块中的交易未被篡改。它还能让我们判断特定交易是否存在于该区块中。我们将在后续章节中讨论这个值。\n\
    \n`height` 是该区块的高度。区块链中的区块按照分布式共识算法有序排列，可以形象地看作是逐个堆叠。第一个区块，即创世区块，其高度为 0。\n\n`tx`\
    \ 是交易列表。列表中的交易数量受区块最大允许大小的限制。在 Helium 配置模块中，此值设置为 1 MB。\n\n既然我们已经定义了区块，我们就可以定义一个\
    \ Helium 区块链：\n\n```\nblockchain = []\n```\n\n区块链是一个列表，每个列表元素都是一个区块。^(⁴¹)\n\n\
    # Helium 区块链详解\n\n现在我们准备详解 Helium 区块链代码。将以下程序代码复制到一个名为 `hblockchain.py` 的文件中，并将该文件复制到\
    \ `block` 目录下。这并非区块链模块的完整程序代码，因为交易和数据库操作已被抽象化处理。由于我们尚未开发交易和数据库模块的代码，我们将对这些模块的操作使用合成值进行模拟。\n\
    \nHelium 区块链代码使用了 `json` 和 `pickle` 模块。这两个模块都是 Python 标准库的一部分，因此无需安装它们。JSON 是一种数据交换标准，可以将\
    \ Python 对象编码为字符串，然后将这些字符串解码回相应的对象。`Pickle` 通过将对象转换为字节序列，并将此序列写入文件来序列化对象。这个过程称为序列化。`Pickle`\
    \ 可以反序列化文件以恢复原始对象。如果你之前从未使用过 `Pickle`，附录 5 提供了关于 Pickle 用法的简明介绍。\n\n`add_block`\
    \ 函数将一个区块添加到 Helium 区块链中。该函数接收一个区块。函数会检查区块属性是否具有有效值。特别地，它验证区块中包含的交易是否有效。如果区块无效，函数返回假值。如果区块有效，函数通过\
    \ Pickle 模块将区块序列化到一个原始字节文件中。然后，该区块被添加到内存中的区块链列表中。\n\n`serialize_block` 函数使用 Pickle\
    \ 将区块序列化到 `data` 目录下。文件名构造方式如下：\n\n```\nfilename = \"block_\" + block_height +\
    \ \".dat\"\n```\n\n`read_block` 函数接收一个区块链中的索引，并返回该索引对应的区块。如果索引越界，将抛出异常。\n\n`blockheader_hash`\
    \ 函数接收一个区块，并返回区块头部的 SHA-256 消息摘要（十六进制字符串）。再次注意，由于 Merkle 根可用于检验区块中的交易是否被篡改，我们无需对整个区块内容计算\
    \ SHA-256 加密哈希。仅对包含 Merkle 根的区块头部计算该值就足够了。\n\n`validate_block` 函数测试区块是否具有有效值。该函数还通过比较\
    \ SHA-256 消息摘要来验证上一个区块。\n\n`hblockchain` 及其他 Helium 模块的最终程序代码清单可参阅本书附录 10。\n"
- fmt: "# Helium Blockchain Module\n\n`hbockchain.py`: This module creates and maintains\
    \ the Helium blockchain. This is a partial implementation of the module.\n\n```python\n\
    import rcrypt\nimport hconfig\nimport json\nimport pickle\nimport pdb\nimport\
    \ logging\nimport os\n```\n\nLog debugging messages to the file `debug.log`.\n\
    \n```python\nlogging.basicConfig(filename=\"debug.log\", filemode=\"w\",\n   \
    \                 format='%(asctime)s:%(levelname)s:%(message)s', level=logging.DEBUG)\n\
    ```\n\n## Block Structure\n\nA block is a Python dictionary that has the following\
    \ structure. The type of an attribute is denoted in angle delimiters.\n\n```\n\
    {\n\"prevblockhash\":   \n\"version\":         \n\"timestamp\":       \n\"difficulty_bits\"\
    : \n\"nonce\":           \n\"merkle_root\":     \n\"height\":          \n\"tx\"\
    :              \n}\n```\n\nThe blockchain is a list where each list element is\
    \ a block. This is also referred to as the primary blockchain when used by miners.\n\
    \n```python\nblockchain = []\n```\n\n## Functions\n\n### `add_block(block: \"\
    dictionary\") -> \"bool\"`\n\n`add_block`: adds a block to the blockchain. Receives\
    \ a block. The block attributes are checked for validity and each transaction\
    \ in the block is tested for validity. If there are no errors, the block is written\
    \ to a file as a sequence of raw bytes. Then the block is added to the blockchain.\
    \ Returns True if the block is added to the blockchain and False otherwise.\n\n\
    ```python\ndef add_block(block: \"dictionary\") -> \"bool\":\n    try:\n     \
    \   # validate the received block parameters\n        if validate_block(block)\
    \ == False:\n            raise(ValueError(\"block validation error\"))\n     \
    \   # serialize the block to a file\n        if (serialize_block(block) == False):\n\
    \            raise(ValueError(\"serialize block error\"))\n        # add the block\
    \ to the blockchain in memory\n        blockchain.append(block)\n    except Exception\
    \ as err:\n        print(str(err))\n        logging.debug('add_block: exception:\
    \ ' + str(err))\n        return False\n    return True\n```\n\n### `serialize_block(block:\
    \ \"dictionary\") -> \"bool\"`\n\n`serialize_block`: serializes a block to a file\
    \ using pickle. Returns True if the block is serialized and False otherwise.\n\
    \n```python\ndef serialize_block(block: \"dictionary\") -> \"bool\":\n    index\
    \ = len(blockchain)\n    filename = \"block_\" + str(index) + \".dat\"\n    #\
    \ create the block file and serialize the block\n    try:\n        f = open(filename,\
    \ 'wb')\n        pickle.dump(block, f)\n    except Exception as error:\n     \
    \   logging.debug(\"Exception: %s: %s\", \"serialize_block\", error)\n       \
    \ f.close()\n        return False\n    f.close()\n    return True\n```\n\n###\
    \ `read_block(blockno: 'long') -> \"dictionary or False\"`\n\n`read_block`: receives\
    \ an index into the Helium blockchain. Returns a block or False if the block does\
    \ not exist.\n\n```python\ndef read_block(blockno: 'long') -> \"dictionary or\
    \ False\":\n    try:\n        block = blockchain[blockno]\n        return block\n\
    \    except Exception as error:\n        logging.debug(\"Exception: %s: %s\",\
    \ \"read_block\", error)\n        return False\n    return block\n```\n\n### `blockheader_hash(block:\
    \ 'dictionary') -> \"False or String\"`\n\n`blockheader_hash`: computes and returns\
    \ SHA-256 message digest of a block header as a hexadecimal string. Receives a\
    \ block whose blockheader hash is to be computed. Returns False if there is an\
    \ error, otherwise returns a SHA-256 hexadecimal string. The block header consists\
    \ of the following block fields: (1) `version`, (2) `prevblockhash`, (3) `merkle_root`,\
    \ (4) `timestamp`, (5) `difficulty_bits`, and (6) `nonce`.\n\n```python\ndef blockheader_hash(block:\
    \ 'dictionary') -> \"False or String\":\n    try:\n        hash = rcrypt.make_SHA256_hash(block['version']\
    \ + block['prevblockhash'] +\n                                       block['merkle_root']\
    \ + str(block['timestamp']) +\n                                       str(block['difficulty_bits'])\
    \ + str(block['nonce']))\n    except Exception as error:\n        logging.debug(\"\
    Exception:%s: %s\", \"blockheader_hash\", error)\n        return False\n    return\
    \ hash\n```\n\n### `validate_block(block: \"dictionary\") -> \"bool\"`\n\n`validate_block`:\
    \ receives a block and verifies that all its attributes have valid values. Returns\
    \ True if the block is valid and False otherwise.\n\n```python\ndef validate_block(block:\
    \ \"dictionary\") -> \"bool\":\n    try:\n        if type(block) != dict:\n  \
    \          raise(ValueError(\"block type error\"))\n        # validate scalar\
    \ block attributes\n        if type(block[\"version\"]) != str:\n            raise(ValueError(\"\
    block version type error\"))\n        if block[\"version\"] != hconfig.conf[\"\
    VERSION_NO\"]:\n            raise(ValueError(\"block wrong version\"))\n     \
    \   if type(block[\"timestamp\"]) != int:\n            raise(ValueError(\"block\
    \ timestamp type error\"))\n        if block[\"timestamp\"] < 0:\n           \
    \ raise(ValueError(\"block timestamp error\"))\n        if block[\"height\"] <\
    \ 0:\n            raise(ValueError(\"block height error\"))\n        # height\
    \ must increase by one\n        if block[\"height\"] > 0:\n            if block[\"\
    height\"] != blockchain[-1][\"height\"] + 1:\n                raise(ValueError(\"\
    block height is not in order\"))\n        # The length of the block must be less\
    \ than the maximum block size that\n        # specified in the config module.\n\
    \        # json.dumps converts the block into a json format string.\n        if\
    \ len(json.dumps(block)) > hconfig.conf[\"MAX_BLOCK_SIZE\"]:\n            raise(ValueError(\"\
    block length error\"))\n        # validate the merkle_root.\n        if block[\"\
    merkle_root\"] != merkle_root(block[\"tx\"], True):\n            raise(ValueError(\"\
    merkle roots do not match\"))\n        # validate the previous block by comparing\
    \ message digests.\n        # the genesis block does not have a predecessor block\n\
    \        if block[\"height\"] > 0:\n            if block[\"prevblockhash\"] !=\
    \ blockheader_hash(blockchain[block[\"height\"]-1]):\n                raise(ValueError(\"\
    previous block header hash does not match\"))\n        else:\n            if block[\"\
    prevblockhash\"] != \"\":\n                raise(ValueError(\"genesis block has\
    \ prevblockhash\"))\n        # genesis block does not have any input transactions\n\
    \        if block[\"height\"] == 0 and block[\"tx\"][0][\"vin\"] != []:\n    \
    \        raise(ValueError(\"missing coinbase transaction\"))\n        # a block\
    \ other than the genesis block must have at least\n        # two transactions:\
    \ the coinbase transaction and at least\n        # one more transaction\n    \
    \    if block[\"height\"] > 0 and len(block[\"tx\"]) < 2:\n            raise(ValueError(\"\
    block does not have a coinbase transaction\"))\n    except Exception as err:\n\
    \        logging.debug(\"validate_block: exception: \" + str(err))\n        return\
    \ False\n    return True\n```\n\n### `merkle_root(tx_list: \"list of transactions\"\
    , first: \"bool\") -> \"string or False\"`\n\n`merkle_root`: computes the Merkle\
    \ root for a list of transactions. Receives a list of transactions and a boolean\
    \ flag. The function computes the Merkle root bottom-up. It computes the hash\
    \ for each transaction if it is the first call. These hashes are then paired and\
    \ concatenated for the next level of the tree. This process is repeated recursively\
    \ until only one hash remains. This hash is the Merkle root. Returns the Merkle\
    \ root or False if there is an error.\n\n```python\ndef merkle_root(tx_list: \"\
    list of transactions\", first: \"bool\") -> \"string or False\":\n    pass\n```\n\
    \n### `merkle_tree(tx_list: \"list of transactions\", first: \"bool\") -> \"bool\
    \ or string\"`\n\n`merkle_tree`: computes the merkle root for a list of transactions.\
    \ Receives a list of transactions and a boolean flag to indicate whether the function\
    \ has been called for the first time or whether it is a recursive call from within\
    \ the function. Returns the root of the merkle tree or False if there is an error.\n\
    \n```python\ndef merkle_tree(tx_list: \"list of transactions\", first: \"bool\"\
    ) -> \"bool or string\":\n    pass\n```\n\n# Helium Blockchain Unit Tests\n\n\
    Copy the following code to a file called `test_blockchain.py` and save it in the\
    \ `unit_tests` directory. You can now traverse to this directory and run all of\
    \ the tests:\n\n```bash\n$(virtual) pytest test_blockchain.py -v -s\n```\n\nYou\
    \ should see 23 unit tests passing.\n\nSince our present implementation of the\
    \ Helium blockchain is not complete, the following test suite is a restricted\
    \ set. The complete set of unit tests on `blockchain.py` is available in Appendix\
    \ 9 of this book."
