    Another application domain is games and digital content. TRON is an example of
    such a project. TRON is designed to democratize the distribution of such content
    by eliminating gatekeepers who host this content. The TRON project uses the BitTorrent
    protocol to distribute and retrieve such content.^([^(30)](#fn30))


    Other application domains for blockchain technology include supply chain management,
    tamper-proof voting systems, distributed id systems, and permission-less escrow
    systems. There are, of course, many more potential application domains for this
    technology.


    ## Conclusion


    In this chapter, we have defined a blockchain and discussed its theoretical foundations
    and essential characteristics. We concluded by discussing some of the application
    domains for blockchain technology.


    In the next chapter, we will start our main project, the construction of a cryptocurrency
    called Helium. Our first task will be to program a blockchain for Helium.


    # 7. The Helium Cryptocurrency Project


    In this chapter, we shall begin the construction of the Helium cryptocurrency.
    Our implementation is going to include all of the features that you expect in
    a production-quality cryptocurrency. Helium is modeled after Bitcoin, which is
    the canonical standard. We will implement Helium in Python. Python is a simple
    yet powerful language whose syntax is lucid and exceptionally easy to understand.
    Python is an ideal language for clearly exposing the algorithms and techniques
    that constitute the backbone of a cryptocurrency. The downside of using Python
    is that it is an interpreted language and thus inherently slow. This limitation
    makes it unsuitable for a production environment.


    The Python code implementation of Helium should provide you with a reliable blueprint
    to implement a cryptocurrency in some other high-performance, compiled language,
    such as C, C++, Go, or Rust, if you are so inclined.^([^(31)](#fn31))


    If you are primarily interested in the theory of blockchains and cryptocurrencies,
    just read the “Helium Configuration” section of this chapter.'
  trans: '

    ### 区块链的不可篡改性


    检测区块链是否被篡改是相当容易的。请参考图 6-4 所示的区块链。进一步假设每个区块（创世区块除外）的哈希指针都包含前一个区块数据及哈希指针的`SHA-256`消息摘要。


    假设恶意方修改了第二个区块中的数据或哈希指针。正在验证区块链是否被篡改的节点将计算第二个区块的`SHA-256`消息摘要，然后将该值与第三个区块哈希指针中包含的`SHA-256`消息摘要进行比较。由于这两个摘要不匹配，该节点将断定：要么第二个区块被篡改，要么第三个区块中的消息摘要被篡改。


    由于恶意方篡改了第二个区块，他还必须更改第三个区块中的加密哈希值，使其与第二个区块的计算哈希值匹配。但这样一来，第四个区块中的加密哈希值将与第三个区块的计算哈希值不匹配。这种对哈希指针的修改必须一直延续到初始被修改区块之后的所有后续区块。此外，由于区块链是一种分布式数据结构，被修改的区块必须传输到区块链网络中的所有其他节点，以便它们修正自己的区块链副本。这些节点将检测到篡改行为并拒绝更改其副本。


    ### 构建一个简单的区块链


    让我们用 Python 构建一个非常简单的区块链。我们的区块链将是一个列表结构（在其他语言中称为数组）：


    ```

    blockchain = [ ]

    ```


    我们将让每个区块中的数据是斐波那契数列中的下一个数字（0, 1, 1, 2, 3, 5, 8, 13, 21…）。对于除创世区块外的每个区块，数据和哈希指针将表示为以下字典项（在其他语言中称为映射）：


    ```

    {

    ''ptr'':  前一个列表元素的索引

    ''hash'': 前一个区块的 SHA-256 哈希值（十六进制字符串）

    ''data'': 斐波那契数

    }

    ```


    区块的`SHA-256`消息摘要将通过将列表元素的值转换为 JSON 字符串，然后计算该字符串的`SHA-256`消息摘要的十六进制值来获得。


    根据上述规范，创世区块是：


    ```

    blockchain[0] = {

    ''ptr'': None

    ''hash'': None

    ''data'': 0

    }

    ```


    这个区块链中的第二个区块是：


    ```

    blockchain[0] = {

    ''ptr'': 0

    ''hash'': 一个十六进制字符串

    ''data'': 1

    }

    ```


    以此类推。


    可以注意到的一点是，由于这个区块链是一个列表，指向前一个区块的指针可以简单地表示为前一个列表元素的索引。


    ### 区块链宇宙


    到目前为止，我们已经深入探讨了区块链的理论；现在该来看看区块链的一些应用了。作为一般性原则，我们可以说任何需要分布式共识来进行决策的应用程序，都可能适合用区块链来实现。


    区块链的第一个用途是在加密货币比特币中，而加密货币至今仍是区块链的主要应用领域。另一个主要领域是智能合约加密货币，例如以太坊。这些加密货币允许定义合约，指明价值转移的条件。这些合约通过区块链虚拟机能够理解的编程语言来指定。^(
    ²⁹ ) 像 Ripple 这样的项目致力于实现金融服务业的自动化，目标是降低交易成本并缩短交易完成时间。


    在第二章 2 中，我们研究了 Brave 浏览器，它提出了一种数字广告分发的激进模式。Brave 项目增强了互联网隐私，并奖励数字广告分发中的所有利益相关者：内容创作者、浏览内容的用户以及托管内容的浏览器。所有这些利益相关者都会获得`BAT`加密货币单位的奖励。


    另一个应用领域是游戏和数字内容。`TRON`就是此类项目的一个例子。`TRON`旨在通过消除托管此类内容的把关人来使内容分发民主化。`TRON`项目使用`BitTorrent`协议来分发和检索此类内容。^(
    ³⁰ )


    区块链技术的其他应用领域包括供应链管理、防篡改投票系统、分布式身份系统和无需许可的托管系统。当然，这项技术还有更多潜在的应用领域。


    ### 结论


    在本章中，我们定义了区块链，并讨论了其理论基础和基本特征。最后，我们讨论了区块链技术的一些应用领域。


    在下一章中，我们将开始我们的主要项目：构建一种名为氦气（Helium）的加密货币。我们的首要任务是为氦气编写一个区块链程序。


    # 7. 氦气加密货币项目


    在本章中，我们将开始构建氦气（Helium）加密货币。我们的实现将包含你对一个生产级加密货币所期望的所有特性。氦气模仿了作为权威标准的比特币。我们将用 Python
    实现氦气。Python 是一种简单而强大的语言，其语法清晰且极其易于理解。对于清晰地揭示构成加密货币核心的算法和技术，Python 是一种理想的语言。使用
    Python 的缺点在于它是一种解释型语言，因此天生缓慢。这一限制使其不适合生产环境。


    如果你有兴趣，氦气的 Python 代码实现应该能为你提供一个可靠的蓝图，以便用其他高性能编译语言（如 C、C++、Go 或 Rust）来实现加密货币。^(
    ³¹ )


    如果你主要对区块链和加密货币的理论感兴趣，那么只需阅读本章的“氦气配置”部分即可。

    '
- fmt: '# Python Installation and the Virtual Environment


    The very first order of business is the creation of a virtual environment for
    Helium. You are going to need a Python version greater than or equal to 3.8. Appendix
    1 of this book contains the instructions for creating such a virtual environment.


    You can create your virtual environment inside any directory (folder), but if
    you want to follow this book exactly, then I suggest creating the virtual environment
    in the `/var/www/` directory. In addition, install Python version 3.8 in your
    virtual environment. Your Helium virtual environment will then be inside the following
    directory (folder):


    ```

    /var/www/helium/

    ```


    We will call the directory `/var/www/helium/` the root of the virtual environment
    or equivalently the root of the Helium project, and on many occasions, I will
    simply refer to this directory as the Helium root.


    Inside the root directory, create the following 12 sub-directories: `block`, `chainstate`,
    `config`, `crypt`, `data`, `hnetwork`, `mining`, `simulated_network`, `testnet`,
    `transactions`, `unit_tests`, and `wallet`. The `block` directory will hold our
    blockchain implementation. The `crypt` directory will have the cryptographic functions
    that Helium requires, and our unit tests will reside inside the `unit_tests` directory.


    The `data` directory will hold Helium blocks as well as other data. I will discuss
    the other directories in subsequent chapters.


    In order to access the Python modules in these directories, we must add the paths
    to these directories to the Python search path. Make sure that you have activated
    your virtual environment as follows. From the root directory, do


    ```

    source virtual/bin/activate

    ```


    From the root directory, traverse to the `virtual/lib/python3.8/site-packages/`
    directory. Create a file called `helium.pth` inside this directory, and then add
    the following lines to this file:


    ```

    /var/www/helium/block/

    /var/www/helium/chainstate

    /var/www/helium/config/

    /var/www/helium/crypt/

    /var/www/helium/data/

    /var/www/helium/hnetwork/

    /var/www/helium/mining/

    /var/www/helium/simulated_network

    /var/www/helium/testnet/

    /var/www/helium/transactions/

    /var/www/helium/unit_tests/

    /var/www/helium/wallet

    ```


    Save this file and then deactivate and activate your environment from the root
    directory


    ```

    $(virtual) deactivate

    $ /bin/activate

    ```


    You should be using Git to periodically commit your work to a repository. Traverse
    to the root directory, initialize Git, and do an initial commit:


    ```

    $(virtual) git init

    $(virtual) git add .

    $(virtual) git commit -m "initial Helium commit, virtual environment created"

    ```


    You can view your commit history with


    ```

    $(virtual) git log

    ```


    `git` will enable you to roll back to a previous version in case you make an error.
    You may want to commit source code changes often.


    # Helium Configuration


    Helium uses several vital configuration parameters that define the characteristics
    and behavior of this cryptocurrency. The following is a brief description of these
    parameters. Do not be concerned if you do not understand the meaning of some of
    these parameters yet. Their meaning and significance will become clearer in our
    subsequent exposition.


    ## The Helium Version Number


    ```

    VERSION_NUMBER = 1

    ```


    This is the current version number of the Helium application.


    ## The Maximum Number of Helium Coins


    ```

    MAX_HELIUM_COINS = 21_000_000

    ```


    This is the maximum number of Helium coins that can come into existence. We will
    call a helium coin a helium, and a number of helium coins will be called heliums.


    A fixed number of heliums are initially created and distributed in the genesis
    block. The genesis block is a hard-coded block that bootstraps the block creation
    process. In Bitcoin, Satoshi Nakamoto created and distributed 50 bitcoins in the
    genesis block.


    Subsequently, new heliums are created as blocks are added to the Helium blockchain.
    Note that the maximum number of heliums that can be created is identical to the
    maximum number of bitcoins that can be produced in the Bitcoin ecosystem.


    ## The Smallest Helium Currency Unit


    ```

    HELIUM_CENT = 1/100_000_000

    ```


    `HELIUM_CENT` is the smallest subdivision of a helium that is possible. Observe
    that a hundred million Helium cents is equal to a helium. This definition corresponds
    to the definition of a satoshi in Bitcoin.


    ## Helium Block Size


    ```

    MAX_BLOCK_SIZE = 1_000_000

    ```


    `MAX_BLOCK_SIZE` is the maximum size of a Helium block in bytes. The maximum size
    of a block determines the maximum number of Helium transactions that can be included
    in a block and *a fortiori* the average number of transactions in a block.


    ## The Maximum Transaction Inputs


    A Helium transaction collects unspent values from previous transactions and then
    transfers these values to one or more recipients of value. The `Max-Inputs` parameter
    limits the maximum number of inputs in a transaction. This limitation promotes
    efficient transaction processing and helps avert denial-of-service attacks:


    ```

    MAX_INPUTS = 10

    ```


    ## The Maximum Transaction Outputs


    A Helium transaction transfers values to one or more recipients of value. The
    `Max_Outputs` parameter limits the maximum number of recipients in a transaction:


    ```

    MAX_OUTPUTS = 10

    ```


    ## The Locktime Interval


    ```

    MAX_LOCKTIME = 60*1440*7

    ```


    An entity creating a transaction can specify that this transaction is not to be
    processed until a certain amount of time has elapsed. This will prevent miners
    from including this transaction in a block to be mined until this time interval
    has elapsed. Elapsed time is in seconds.


    `MAX_LOCKTIME` specifies the maximum amount of time in seconds that a transaction
    can be locked from the time of its creation. We do not want to indefinitely lock
    transactions or lock transactions for very long periods of time. This can give
    rise to denial-of-service attacks as transaction caches maintained by miners become
    clogged with future transactions.


    The preceding configuration parameter sets the maximum period of time that a transaction
    can be locked to seven days.


    ## The Coinbase Interval


    ```

    COINBASE_INTERVAL = 100

    ```


    This positive integer specifies the number of new blocks that must be mined after
    a previous reference block, before a coinbase transaction in the reference block
    can be spent. When a miner mines a block, he is rewarded with the issuance of
    a fixed amount of new cryptocurrency. This new currency is presented to the miner
    in a coinbase transaction in the block. The coinbase interval parameter precludes
    a miner from spending a coinbase transaction until a certain number of new blocks
    have been added to the blockchain.


    In Helium, a new block is mined every ten minutes approximately, so Helium coinbase
    transactions are locked for approximately 1000 minutes.


    ## Nonce


    ```

    NONCE = 0

    ```


    This is a seed value. `NONCE` is the starting value that will be used in mining
    proof-of-work computations. We will discuss this use of nonces subsequently.


    ## The Difficulty Number


    ```

    DIFFICULTY_BITS   = 20

    DIFFICULTY_NUMBER =  1/ (10 ** (256 - DIFFICULTY_BITS))

    ```


    The `DIFFICULTY_BITS` parameter lets us adjust the `DIFFICULTY_NUMBER`. In Helium
    as well as Bitcoin, mining a block involves solving a difficult mathematical problem.
    The `DIFFICULTY_NUMBER` determines how difficult this problem is and hence the
    average amount of time it will take to solve this problem.


    A block is said to be mined when this difficult problem is solved by a Helium
    mining node. The node that solves this problem is entitled to append the mined
    block to the blockchain and is entitled to a reward of freshly mined heliums as
    well as the transaction fees attached to all of the transactions in the mined
    block.'
