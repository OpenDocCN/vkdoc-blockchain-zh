  ### 助记词


  **助记词**，也称为**种子词**、**恢复短语**或**记忆短语**，是一串按特定顺序书写的随机单词（通常是 12 或 24 个简单单词）。它们作为输入被输入到一个助记词转换器中，该转换器是一种算法，可将其转换为特定加密资产的私钥，如图
  11-7 所示。⁹⁴ 每个区块链对其私钥都有特定的格式，例如其起始字符或写入时的字节数。因此，例如将比特币发送到以太坊地址，要么无法成功，要么资金将永远丢失。


