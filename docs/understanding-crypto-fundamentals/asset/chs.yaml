  钱包类型的区分有时也采用不同的名称（即软件钱包（热）、网页钱包（热）与硬件钱包（冷））。事实上，这些名称更直观，因为它们暗示了热钱包是通过软件运行的，例如安装在桌面或移动设备上的应用，或通过在线访问。


  为了提高安全性，软件钱包通常将在线和离线部分分开。待处理的交易首先移至离线环境，在那里使用`私钥`进行签名。然后，软件仅在线广播该签名的哈希值。这样一来，它永远不会直接在网络上暴露`私钥`。


