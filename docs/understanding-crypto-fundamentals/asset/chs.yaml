- "# 7. 加密资产分类法\n\n> *这个世界上所有的分类都缺乏明确的界限，所有的转变都是渐进的。*\n> \n> —亚历山大·索尔仁尼琴\n\n请注意本书反复使用“*加密资产*”（cryptoasset）一词，而非更常见的术语“加密货币”。这种区分是有意为之，因为加密资产涵盖的资产远多于那些仅旨在作为货币的资产。\n\
  \n正式地讲，加密资产是在公共账本上通过密码学保护，并在去中心化的点对点网络上创建、管理和交换的数字资产。相比之下，加密货币是加密资产的一个子类别。在传统金融中，货币、股票、债券、大宗商品、房地产和收藏品等都属于资产。类似地，在加密世界中，加密资产也被分为多个类别。\n\
  \n对加密资产进行分类对于准确评估其价值至关重要。确实，可能的分类方式可以告知立法者未来将如何监管和对加密资产征税。反过来，监管和税收规则又会影响这些资产的增长潜力和风险状况。本章旨在为可能的加密资产分类法提供一些清晰的见解。\n\
  \n## 建立加密资产分类法面临的挑战\n\n在理想世界中，加密资产分类法应具有互斥性（一个资产只属于一个类别）、完全穷尽性（所有资产都有其适合的类别）和不变性（分类法不随时间改变）的类别。然而，这样的分类法是不可能的，因为加密资产子类别之间的界限是模糊且快速变化的，新的用例不断涌现。因此，更现实的加密资产分类法应不断更新以反映市场发展。\n\
  \n以隐私币为例，说明分类法的演变。隐私币曾经是一个有用的类别，但现在许多代币在其架构中都使用了隐私元素。因此，隐私从某些加密资产的核心功能演变为仅仅是一个可以具备的属性。现在有许多种可能的方式来实现隐私，以及不同级别的隐私。\n\
  \n对加密资产进行分类的另一个挑战是划分标准。例如，如果试图对运动类型进行分类，人们可能会考虑是根据团队运动与个人运动，还是基于球的运动与其他运动来进行划分。对于运动，就像对加密资产一样，有多种方式可以开始构建分类法。以下各节将介绍一些可能的此类方式。\n\
  \n\n\n## 按形式与功能划分的加密资产分类法\n\n在 2017 年畅销书《加密资产》中，克里斯·伯尼斯克和杰克·塔塔尔将加密资产分为三类 [29]。\n\
  \n- **加密货币** 是通过密码学保护的数字货币，可在网络上进行交换。\n- **加密商品** 是可作为制成品投入品的原始数字资源。\n- **加密代币**\
  \ 是制成的数字商品和服务。\n\n一张组织图将加密资产分类为加密货币、加密商品和加密代币。\n\n**图 7-1** — 根据伯尼斯克与塔塔尔的分类 [29]\n\
  \n这一早期分类法根据一项基本特征（即其形式）实现了加密资产的区分。然而，我们还可以在此分类基础上，根据功能进一步细分，如图 7-2（针对加密货币）和图 7-3（针对加密商品）所示。^(⁶⁷)\n\
  \n一张组织图展示了加密商品的分类及部分示例：平台协议包括 `Polkadot`、`Kadena` 和 `Neo`，互操作性协议包括 `Cosmos`、`Quant`\
  \ 和 `ICON`，预言机包括 `Chainlink`、`Witnet` 和 `Provable`。\n\n**图 7-3** — 加密商品的子类别及其示例\n\
  \n一张组织图展示了加密货币的分类及部分示例：数字价值存储（如比特币）、交易媒介（如比特币现金和 `Dogecoin`）、隐私币（如 `Monero`、`Dash`\
  \ 和 Z cash）以及稳定币（如 `Teter`、Coinbase 币、`Maker` 和 `Basecoin`）。\n\n**图 7-2** — 加密货币的子类别及其（可能具有争议的）示例\n\
  \n加密代币类别同样可进一步细分，但子类别数量庞大（数十种），且每个子类别的市场规模非常小。\n\n以下各节将分析加密资产的某些子类别。其目标既非详细描述每个子类别的工作原理，也非穷尽所有类别，而是从宏观层面概述整个加密生态系统的样貌及加密资产可能提供的功能。\n\
  \n### 加密货币\n\n以下小节遵循图 7-2 中的结构。\n\n#### 数字价值存储\n\n价值存储资产能够随时间保持或增加其购买力。这与保持其名义价值截然不同。例如，一百年前的\
  \ 1 美元如今仍然是 1 美元，但它并未保持其价值。当时它能购买一定数量的商品和服务（例如在一座大城市里吃一顿丰盛的餐食），而今天它只能购买这些商品和服务的一小部分。美元保持了名义价值，但未保持实际价值。它并非有效的价值存储工具。\n\
  \n#### 交易媒介\n\n某些加密资产（旨在）被用作日常交易的媒介。此类资产理想情况下应具有快速结算时间和广泛的商业应用。最优的货币币还应具备完全可互换性：人们不会因某一枚币的交易历史等因素而对其赋予不同价值。\n\
  \n#### 隐私币\n\n隐私币既是货币币的一个子类别，也是一种可在任何可互换加密资产中实现的功能。需要提醒的是，比特币并非匿名，而是假名。用户使用假名进行比特币交易，但该假名持有的比特币数量以及所有历史交易记录对任何人都是公开的。相比之下，隐私币为用户提供了匿名性。隐私币背后的算法使用环签名等技术来证明资金转移有效，但不会透露资金来源。\n\
  \n#### 稳定币\n\n稳定币是一种追踪法定货币或其他资产价值的加密货币。例如，它们可以追踪美元或黄金的价值。稳定币可以通过多种方式与目标资产的价值挂钩。具体而言，有有形资产支持的稳定币（如存放在金库中的美元或黄金），或者通过算法合成方式再现挂钩。\n\
  \n与其他加密资产相比，稳定币具有波动性低的优势。然而，与法定货币挂钩的稳定币会间接失去加密资产的一些理想特性，例如去中心化和无需信任。此外，由于基础货币的通货膨胀率，它们也会像法定货币一样随时间贬值，因此并非良好的价值存储工具。\n\
  \n#### 替代性加密货币分类法\n\n加密货币的另一种有用区分方式是根据其发行方。在 2018 年畅销书《区块链革命》（更新版）中，唐·塔普斯科特和亚历克斯·塔普斯科特将加密货币分为三类\
  \ [30]。\n\n1. 自组织加密货币\n2. 企业加密货币\n3. 国家加密货币\n\n比特币是*自组织加密货币*的一个例子。它没有中心化方管理，任何人都可以加入。在这三类中，它是唯一去中心化的。\n\
  \n`Diem`（原名 `Libra`）是*企业加密货币*的例子，因为它由一家公司（Meta，当时称为 Facebook）发起，尽管它由一个独立的非营利组织管理，而\
  \ Meta 仅是该组织的一名成员。\n\n中国的数字人民币电子支付（`DCEP`）（“数字人民币”）是该国中央银行中国人民银行发行的*国家加密货币*的一个例子。国家加密货币（有时称为中央银行数字货币，`CBDC`）为发行机构提供了对货币使用者之间资金流动前所未有的监督和控制能力。此外，与法定货币相比，`CBDC`\
  \ 发行机构的审查能力不仅得以保留，甚至大大增强。例如，中国正在探索其数字人民币的过期日期。如果在特定时间内未使用，你赚取的数字人民币可能会过期而变得毫无价值。或者，发行机构可以针对特定人群甚至特定个人实施专项税收或没收资金。而去中心化加密资产赋能人民，使其免受滥用权力的机构之害，`CBDC`\
  \ 则恰恰相反，它是现实世界中货币反乌托邦的基础，在这种乌托邦里，中央机构拥有绝对权力。\n\n### 加密商品\n\n以下小节遵循图 7-3 中的结构。\n\n\
  #### 平台协议或智能合约平台\n\n智能合约平台（或平台协议）允许用户为智能合约付费。例如，以太坊要求在区块链上运行智能合约时支付“燃料费”。术语*燃料费*是一个很好的类比。平台（以太坊）就像一个公路网络，允许汽车（应用程序）行驶（运行）。汽油的需求及其价格取决于路上的汽车数量、车辆大小以及行驶里程。以太坊的运作方式类似：希望运行智能合约的人越多，燃料费就越高。此外，就像大型汽车需要更多汽油一样，大型合约也需要更多燃料。因此，燃料费起到了基于供需关系的激励作用，以优化网络。\n\
  \n#### 互操作性\n\n互操作性服务使加密资产能够跨区块链进行交互。打个比方，Microsoft Teams 可以在 Windows、Linux 和苹果电脑上运行，而用户无需知道对方的操作系统。遗憾的是，加密资产目前尚不具备互操作性，但已有若干加密资产服务正在致力于解决这一问题。\n\
  \n\n\n#### Oracles\n\n在加密货币资产领域中，预言机是一种数据馈送机制，提供现实世界（链下）数据，可用于触发区块链智能合约中的事件。此类数据可包括天气数据、体育赛事结果、资产价格、选举结果，以及任何可以数字表示的信息。预言机对整个生态系统的发展至关重要，因为许多智能合约都依赖它们才能发挥作用。\n\
  \n### 加密代币\n\n如上所述，加密代币可以承担多种不同的功能。因此，本节仅阐述一些可能的分类和见解，以便从宏观层面理解加密代币。\n\n#### 平台代币\n\
  \n平台代币是一种构建在协议之上（例如以太坊区块链上的`ERC-20`或币安智能链上的`BEP20`）的数字资产[30]。此类数字资产可以是加密货币，也可以是现实世界中资产（如汽车、农产品、土地或房地产）的数字表示。\n\
  \n#### 金融服务类加密代币\n\n金融服务类加密代币共同构成了所谓的去中心化金融。它们利用区块链技术，旨在消除传统金融中的中介机构，例如银行、保险、资产经纪人或汇款服务。它们还促进了支付结算，并使（中心化或去中心化）交易所能够高效运作。例如，中心化交易所的币种可以支持用户以更低费用进行加密资产交易。\n\
  \n#### 非金融服务类加密代币\n\n加密代币也出现在了金融领域之外。其中，它们在游戏、博彩、社交媒体、数据存储、计算、数字艺术和收藏品等行业声名鹊起。\n\
  \n#### Web 3.0 加密代币\n\n在介绍 Web 3.0 加密代币之前，让我们简要回顾一下什么是 Web 3.0。万维网在持续演进，但可以识别出三次重大浪潮。Web\
  \ 1.0 是 Web 的第一阶段，由静态的只读网页定义。页面可以显示文本和图像，但不能与用户交互。相比之下，Web 2.0 增加了与用户之间以及用户与用户之间的交互。因此，内容变得动态化，并且通常由用户生成。社交媒体是一个绝佳的例子，用户生成的信息吸引着其他人加入平台。虽然\
  \ Web 2.0 侧重于前端（用户交互界面），但 Web 3.0 升级了 Web 的后端。Web 3.0 为更高级的目的组织数据，例如人工智能、3D 图形、虚拟现实或物联网设备。此外，虽然\
  \ Web 2.0 生成由少数公司拥有的中心化数据，但 Web 3.0 实现了数据的去中心化。\n\nWeb 3.0 加密代币促进了去中心化环境中的数据处理、存储及网络连接。\n\
  \n#### 非同质化代币\n\n在上述代币中，有些是独一无二的——就像现实世界中的雕塑一样。在这种情况下，它们就是非同质化代币。NFT 领域在 2021 年蓬勃发展，通过使数字艺术品具有唯一性而彻底改变了艺术界。\n\
  \n### 通用加密资产分类标准\n\n2018 年 2 月，区块链和加密资产研究公司 Brave New Coin 推出了通用加密资产分类标准[31]。这是一个动态（定期更新）的分类标准，基于\
  \ 70 多个指标，旨在服务于“资产管理者与交易员、监管机构、研究人员与学者、开发人员与产品所有者、行业高管以及加密爱好者。”它力求通过标准化和严谨的方法，一致且客观地评估加密资产的优劣势。\n\
  \n特别是，它将加密资产定义为一个新的资产超类，并进一步细分为两个族系和四个子类。分类的第一层将加密资产划分为“通用加密资产”和“协议代币”。第一族系根据 60\
  \ 多个定性和定量指标对资产进行分类，以将其细分为子类。相比之下，“协议代币”族系则将资产分配到各个行业，使得每项资产只属于一个行业。分类体系的下一个层级要精细得多，包含\
  \ 70 多个（部分重叠的）类别，例如去中心化交易所、核心流动性提供者、区块链即服务、`dApp`平台、虚拟现实平台加密货币或社交媒体。\n\n在分类标准首次迭代的基础上，Brave\
  \ New Coin 在随后几年更新了该方法，提供了一个全新的框架。它使用类别分层和形态结构对加密资产进行分类，以提供对该资产类别的 360 度视角。这些类别被组织成代表经济、法律、国际监管、技术和主题因素的维度。例如，经济维度旨在根据资产的经济用途或目的对其进行分类。该维度还有助于识别资产的经济属性，例如供应发行、可互换性、行业活动、可兑换性和基础价值。经济维度中的另一个分层结构是\
  \ Brave New Coin 的行业分类系统，截至 2023 年 3 月，该系统包含 10 个经济部门、14 个业务部门、23 个行业组、34 个行业和 108\
  \ 个利基市场。尽管每个层级都有独特的加密标签，但利基市场层级是专门为迎合独特的加密资产经济和商业模式而开发的。\n\nBrave New Coin 的方法已经表明，构建加密资产分类法有多种途径。与此同时及之后，其他公司也为加密资产建立了更多的分类标准。\n\
  \n### 数字资产分类标准\n\n2021 年 12 月中旬，CoinDesk Indices 为加密资产推出了一套完整的分类标准：数字资产分类标准[32]。该分类标准相当于\
  \ 1999 年由 MSCI 和标准普尔开发的全球行业分类标准的加密版本。`GICS` 自创立以来一直非常有价值，它使股权投资者能够解释同一行业内财务表现的协同变动，并评估可比的投资机会。虽然\
  \ `GICS` 对全球超过 26,000 家上市公司进行分类，但 `DACS` 至少对排名前 500 的数字资产进行分类(68)。`DACS` 确定行业和领域敞口的方法是标准化且透明的。`DACS`\
  \ 有潜力成为加密资产分类的基准，就像 `GICS` 之于股票一样。\n\n`DACS` 是一个动态分类标准（至少每月修订一次），它根据功能并以互斥的类别对加密资产进行划分。他们将资产分为三个层级：部门、行业组和行业。截至\
  \ 2023 年 5 月，该结构定义了 7 个部门、26 个行业组和 40 个行业，如图 7-4 [33] 所示。\n\n![](img/600732_1_En_7_Fig4_HTML.jpg)\n\
  \n一张组织结构图将加密资产分为 7 个部门。计算、文化与娱乐、货币、`DeFi`、数字化、智能合约平台和稳定币。每个部门又进一步细分为总共 26 个行业组和\
  \ 40 个行业。\n\n图 7-4\n\nCoinDesk Indices 的 `DACS`，截至 2023 年 5 月 [33]\n\n到目前为止，`DACS`\
  \ 分类法中大多数加密资产（按市值计算）都属于货币、智能合约平台或稳定币部门。\n\n![](img/600732_1_En_7_Fig5_HTML.jpg)\n\
  \n`DACS` 各部门占比饼图。数据如下：货币，47.84%。智能合约平台，30.41%。稳定币，17.43%。`DeFi`，1.83%。计算，1.22%。文化与娱乐，1.18%。数字化，0.08%。\n\
  \n图 7-5\n\nCoinDesk Indices 的 `DACS` 各部门相对规模，数据截至 2022 年 12 月 31 日 [32]\n\n\n\n\
  #### 全球加密货币分类标准 (GCCS)\n\n2023 年 2 月，21Shares 与 CoinGecko 公司联合推出了另一种加密资产分类法——全球加密货币分类标准\
  \ (GCCS) [34]。该分类法首先区分了“协议” 和“代币” 两个层级，然后细分为四个子层级：加密堆栈、板块、行业和代币分类。\n\n虽然这些层级中的某些类别与以往分类法中的类别相似（如加密货币、预言机、互操作性、智能合约平台），但对“资产超类”的划分是独创的。具体而言，该分类法将资产划分为三个“超类”，分别对应传统资产的功能：资本资产、可消耗/可转换资产以及价值储存资产。与\
  \ GTCA 类似，GCCS 承认可以从不同视角看待加密资产，并最终归属于不同的类别组。\n\n#### 分层视角的加密资产技术\n\n另一个可与先前分类法并行使用的有价值的加密资产分类方法是按层级划分。从核心技术到用户友好型应用的价值链中，加密资产出现在各个环节。具体而言，如图\
  \ 7-6 所示，加密生态系统可识别出五个不同的层级。\n\n![](img/600732_1_En_7_Fig6_HTML.png)\n\n一张图表展示了以下\
  \ 5 个层级的详细信息与示例：聚合层、应用层、网络或资产层、协议层以及技术层。\n\n**图 7-6**  \n加密生态系统层级可视化\n\n最基础的构建模块是底层技术（即区块链，或更具包容性的说法“分布式账本技术”）。该层奠定了加密生态系统的基础，有时被称为“第\
  \ 0 层”。\n\n直接构建在此技术之上的是协议层。它对应于例如以太坊或比特币核心协议。此层级的协议定义了使用区块链技术特定实现方式的规则。加密资产文献通常将它们称为“第\
  \ 1 层解决方案”。\n\n下一层是“网络”或“资产”层，也被称为“第 2 层解决方案”。它方便用户访问协议。例如，闪电网络构建于比特币之上，使得交易结算速度远快于直接与比特币区块链交互。另一个例子是\
  \ Polygon，它是一个扩展以太坊的框架，通过构建和连接兼容以太坊的区块链网络来实现扩展。\n\n随后是应用层，对应于中心化或去中心化应用 (dApps)。这类应用直接响应了用户需求，并且通常更加用户友好；例子包括\
  \ Augur、Bancor 和 CryptoKitties。\n\n最后，利用多个应用（或直接来自较低层级）功能的服务构成了聚合层。例如，它们会聚合来自多个应用的收益，从而为用户提供最佳金融服务。\n\
  \n从协议层到聚合层的服务，其中心化程度可以在从中心化到完全去中心化的连续频谱上任意分布。\n\n#### 加密资产是证券吗？\n\n出于监管和税务目的，确定加密资产是否为证券至关重要。证券与货币、商品、收藏品或不动产的处理方式不同。例如，报告要求可能会因资产是否为证券而存在巨大差异。例如，投资经理必须报告其“管理资产规模”，而这取决于加密资产是被归类为证券还是“现金或现金等价物”。更重要的是，在美国，只有合格投资者才能投资未在美国证券交易委员会\
  \ (SEC) 注册的证券。根据美国证券法，公开出售未在 SEC 注册的证券是非法的。\n\n`豪威测试` 用于定义某项工具是否符合“投资合同”或“证券”的资格。^(⁶⁹)\
  \ 具体而言，一项工具若满足“对一项共同企业进行金钱投资，并期望完全从他人的努力中获得利润”，则其为证券。\n\n请注意根据此定义，一项资产成为证券所需的四个明确条件。\n\
  \n1.  金钱投资\n2.  投入一项共同企业\n3.  期待获得利润\n4.  完全来源于他人的努力\n\n这一定义重实质而非形式。具体来说，如果一项加密资产的行为类似证券，那么它就是证券，而并非基于其产生方式（是否在区块链上）或名称（例如，加密资产、加密货币、数字货币、虚拟货币、币、代币）。\n\
  \n根据这一定义，可以说所有 DeFi 代币都是证券。此外，尽管存在激烈争论，但一旦加密资产采用权益证明 (PoS)，就应被视为证券。对于 PoS 代币尤其如此，因为在\
  \ PoS 机制下验证一个区块几乎不需要质押者付出任何工作，因此可以被认为是“完全来源于他人的努力”。^(⁷⁰) 这意味着几乎所有加密资产都应被视为证券，只有少数例外。这些例外中最引人注目的是比特币。^(⁷¹)\
  \ 挖矿比特币显然需要矿工付出工作，因此将其排除在豪威测试的定义之外。\n\n有些人则在其履行交换媒介功能时（例如在萨尔瓦多，比特币是法定货币）将其归类为现金或现金等价物。然而，越来越多的共识是将比特币视为一种无形资产：数字财产或商品。\n\
  \n尽管如此，截至 2023 年，许多国家仍没有正式法规明确哪些加密资产是证券。此外，在一些国家，如美国，甚至没有全国性的统一意见，因为不同的监管机构（如 SEC、商品期货交易委员会\
  \ (CFTC)、货币监理署和国内税务局 (IRS)）对加密资产的看法各不相同。然而，共同定义如何分类和监管此类资产的工作正在进行中。\n\n例如，CFTC 于\
  \ 2019 年正式裁定比特币为商品 [35]，并非正式地认定以太坊也是一种商品。与此观点一致，SEC 主席加里·根斯勒也多次重申比特币是商品。然而，直到 2023\
  \ 年 5 月，他一直小心翼翼地避免就对以太坊的证券地位发表意见。相比之下，SEC 已裁定其他几种 PoS 加密资产为证券。鉴于这种不明确性，美国总统在 2022\
  \ 年发布了一项行政命令，旨在界定加密领域中证券与非证券的界限。金融稳定监督委员会于当年 10 月以一份 124 页的文件回应了相应的风险和监管 [36]。尽管如此，界限仍然模糊不清。\n\
  \n\n\n## 国际监管格局\n\n迄今为止，国际监管机构也未能达成更大的共识。随着该行业必然增长的趋势日渐明确，它们努力确立对加密资产的立场，但主要成果仍是各自为政。例如，国际货币基金组织（IMF）的职责是“维护国际货币和金融体系的稳定”。然而，尽管它指出世界需要全球性、一致性、全面性和协调性的加密资产监管，却并未阐明此类监管应具体包含哪些内容。\n\
  \n国际清算银行（BIS）下属的巴塞尔银行监管委员会（Basel Committee on Banking Supervision）则定义了如何计量不同类别加密资产的风险。它还要求持有者彻底评估加密资产的潜在风险，并进行公开披露。然而，BIS\
  \ 目前尚未正式将加密资产分类为金融工具。\n\n最后，国际财务报告准则（IFRS）同样未就加密资产的分类提供明确答案。截至本文撰写时，它将判断权留给加密资产持有者，由其自行界定每项加密资产应归入哪个会计类别。关于加密资产如何落入每个可能的会计类别的深入分析，可参阅安永（Ernst\
  \ & Young）的《加密资产持有者的会计处理》报告[37]。\n\n尽管在加密资产分类上存在监管不确定性和分歧，但现有金融法规可以作如下解读：根据现行法规，一项加密资产若想不被定性为证券，就不能拥有可归属的实体，因此它必须真正去中心化。中本聪向我们展示了如何做到这一点：该资产的网络既不能有董事会，也不能有能够实质影响未来网络发展的创建者。一旦加密资产按预期运行，其创建者就应实际上消失，并放弃其持有的所有该资产（例如，将其发送至一个不可花费的地址）。因此，某些现有加密资产可能不再具有证券属性，但这需要其实际拥有者正式放弃对该资产网络的管理角色。\n\
  \n#### 关键概念\n\n对加密资产进行分类，对于确定其可能受到的监管和税收方式，进而评估其价值与风险状况至关重要。\n\n然而，要创建一套明确的加密资产分类体系是不可能的，因为加密资产之间的界限模糊且变化迅速。因此，分类标准需要不断更新。我们应并行使用多种分类体系，根据资产的不同特征（如其形式、功能或其在加密生态系统中的位置）进行划分。\n\
  \n一种未来可能成为行业标准的新兴分类体系是 CoinDesk Indices 推出的 DACS。它基于客观透明的标准，对主要加密资产进行定期更新的分类。\n\n\
  截至 2023 年，全球尚未就哪些加密资产属于证券或是否属于证券达成一致，针对这一新资产类别的监管规则也仍在制定中。\n\n## 扩展问题\n\n本章介绍的每种分类体系各有哪些优缺点？\n\
  \n加密资产的哪些子类别会长期存在，哪些会消失？\n\n以太坊（Ethereum）是一种证券吗？\n\n脚注 1 2 3 4 5 6\n\n"
- "# 8. 加密资产的投资类型\n\n> *如果你找不到睡觉时也能赚钱的方法，你就会工作到死。*\n> \n> ——沃伦·巴菲特\n\n对于任何投资而言，低价买入、高价卖出是收益的一种形式，即资本利得。然而，这往往并非从投资中获利的唯一途径。股权投资（股票）通常还能通过股息带来回报。固定收益投资（债券）主要通过利息带来回报。房地产投资则可通过租金带来回报。\n\
  \n同样，加密资产也提供了其他投资回报来源。本章将探讨这些来源。但在探讨之前，本章将先研究投资加密资产的不同方式，从区块链上的纯投资，到通过对加密资产有风险敞口的公司以及加密资产投资工具进行的间接投资。\n\
  \n## 加密资产的直接与间接投资\n\n从加密资产中获利最直接的方式就是直接买卖它们。这种买卖被称为*现货交易*，因为资产几乎是立即交割的（即期）。例如，如果你在\
  \ 2020 年 3 月以 5,800 美元的市场价格买入一枚比特币，并在 2021 年 3 月以 58,000 美元的市场价格卖出，那么你一年内就获得了+900%的回报，即增长了\
  \ 10 倍。反之，大幅下跌也是可能的。例如，如果你继续持有该资产 18 个月，那么相比 2021 年 3 月的价格，你会损失 66%，因为它在 2022 年\
  \ 10 月的交易价格仅为 20,000 美元。此类投资可以在中心化交易所（例如 Binance、KuCoin、Coinbase）或去中心化交易所（例如 dYdX、Uniswap、ApolloX）进行。\n\
  \n然而，监管规定或投资者的授权要求可能会限制对加密资产的直接投资。对于面临此类限制的投资者而言，幸运的是，仍存在其他选择，可以通过间接投资来获得对加密资产的风险敞口。\n\
  \n\n\n### 交易所交易基金（ETF）\n\n交易所交易基金（`ETF`）是一种追踪某项或某组资产表现的投资工具。与直接投资标的资产相比，`ETF` 为投资者提供了多项优势。首先，它们能实现投资组合多元化。通过购买某个指数的\
  \ `ETF`，投资者无需逐一购买每项资产，就能获得对所有标的资产的风险敞口。其次，`ETF` 通常具有很高的流动性，可以按公允市场价格进行大量买卖。第三，投资者无需熟悉加密资产钱包。然而，购买\
  \ `ETF` 可能比直接购买标的工具更昂贵，因为 `ETF` 会收取年费（例如，投资金额的 0.8%）。\n\n针对主要加密资产的 `ETF`（包括现货 `ETF`\
  \ 和期货 `ETF`）在许多国家越来越普及。现货 `ETF` 简单地追踪标的加密资产的价值。如果比特币价格上涨，那么比特币现货 `ETF` 价格也会以相同比例上涨。\n\
  \n期货 `ETF` 追踪标的加密资产“期货”的价值。“期货”是一种金融产品，双方约定一方将在特定日期以约定价格买入约定数量的资产，无论该资产在该日期实际价格如何。例如，爱丽丝和鲍勃签订了一份比特币期货合约，爱丽丝将在\
  \ 12 月 31 日以每个 50,000 美元的价格从鲍勃处购买两个比特币。即使届时比特币价格低于 50,000 美元，爱丽丝也必须以每个 50,000 美元的价格从鲍勃处买入这两个比特币。同样，即使比特币价格高于\
  \ 50,000 美元，鲍勃也必须以每个 50,000 美元的价格卖出这两个比特币。期货为未来的买入或卖出价格提供了确定性。比特币期货 `ETF` 追踪比特币期货在公开市场上的交易价值。\n\
  \n截至 2023 年 5 月，提供比特币现货 `ETF` 的国家包括澳大利亚、巴西、加拿大、荷兰和新加坡。此外，多个国家也提供以太坊现货 `ETF`。值得注意的是，美国是少数几个未批准任何加密资产现货\
  \ `ETF` 的国家之一。特别是，美国证券交易委员会（`SEC`）以存疑的理由拒绝了所有比特币现货 `ETF` 的申请，这些决定正在法院上诉中。\n\n然而，期货\
  \ `ETF` 的适用范围更广。例如，自 2021 年 10 月 19 日起，美国市场已提供首支比特币期货 `ETF`。截至撰写本文时，美国已批准六支比特币期货\
  \ `ETF` 上市交易，另有 25 支正在等待批准。同样，许多其他国家也提供比特币和以太坊期货 `ETF`。\n\n### 使用区块链的公司\n\n除了 `ETF`，另一种间接接触加密资产的途径是投资于目前正在使用区块链技术或正在开发区块链技术新用例的公司。与直接投资加密资产不同，此类间接投资是标准的（类似于投资任何公司），并且不需要针对加密资产的特殊报告或监管措施。\n\
  \n### 资产负债表上持有加密资产的公司\n\n类似地，投资者可以投资那些资产负债表上持有大量加密资产的公司。例如，上市公司商业智能公司 `MicroStrategy`\
  \ 在 2023 年初持有 130,000 枚比特币，价值超过 30 亿美元，大致相当于该公司的总市值。因此，如图 8-1 所示，该公司的股票价格非常密切地反映了比特币价格的演变（2020-2022\
  \ 年相关系数：93%）。\n\n![一张双轴折线图，展示了 2020 年 1 月至 2023 年 1 月比特币价格（以百万美元计）与 MSTR 股票价格的变化。两条波动剧烈的线先升后降。比特币价格线位于\
  \ MicroStrategy 价格线上方。](img/600732_1_En_8_Fig1_HTML.jpg)\n\n**图 8-1** 2020 年 1 月至\
  \ 2023 年 1 月比特币价格（左轴）与 `MicroStrategy` 公司（`NASDAQ`: `MSTR`）以`美元`计价的股票价格（右轴）\n\n\
  其他可公开交易的公司也持有比特币，但其持有比例远低于 `MicroStrategy`。这些公司包括 `Tesla` (`TSLA`)、`Galaxy Digital\
  \ Holding` (`BRPHF`) 和 `Block`（前身为 `Square`，股票代码 `SQ`）。虽然购买这些公司的股票可能提供一些对比特币的间接敞口，但这种敞口并不完美。特别是，如果未来几年比特币价格翻十倍，这些公司的价值可能会增加，但它们不太可能同样经历\
  \ 10 倍的估值增长。\n\n### 提供加密服务的公司\n\n从事加密资产挖矿或提供其他加密服务的公司是另一种间接（且不完美的）加密资产投资方式。例如，`Marathon\
  \ Digital Holdings` (`MARA`) 是一家主要的比特币挖矿公司，截至 2022 年底持有近 12,000 枚比特币，其目标是“在北美建立最大的挖矿业务”，拥有约\
  \ 69,000 台 `ASIC` 矿机。挖矿和 `ASIC` 将在下一节中解释。\n\n加密资产交易所是另一种可能性。例如，`Coinbase` 是美国最知名的公共加密交易所之一，也是首家上市的此类交易所。其资产负债表上也持有大量比特币（2022\
  \ 年为 9,000 枚），因此风险敞口是双重的：来自其运营以及比特币价格波动。\n\n\n\n## 早期加密资产投资\n\n另一种接触加密资产的方式是在其最早的开发阶段进行投资。目前存在多种投资方式，通常具有高潜在回报，但也伴随着高风险。\n\
  \n传统上，当一家私营公司决定上市（即向众多外部投资者公开发售股票）时，它会通过首次公开募股（`IPO`）来实现。在`IPO`中，投资者购买的是该公司的股份。加密货币行业借鉴了这一既定概念，发展出了首次代币发行（`ICO`）。`ICO`本质上是一种众筹形式，它将潜在投资者与项目创始人联系起来，为创意匹配资本。这是区块链初创企业筹集股权资本的原始方式。在`ICO`中，投资者购买的是新发行的加密资产，期望其未来价值会上涨。借此，任何人都可以成为风险资本投资者。创始人通常会保留该加密资产的大部分份额（例如\
  \ 20%），作为项目开发的资金来源。尽管其名称中带有“币”字，但`ICO`并非专用于意在成为货币的资产。相反，所有类型的加密资产都会使用`ICO`。\n\n\
  `ICO`最早始于 2013 年，首个重大案例是以太坊在 2014 年的`ICO`。随后，大多数`ICO`都在以太坊区块链上进行，其数量在接下来的几年里呈指数级增长。不幸的是，许多人利用`ICO`的热潮，发行毫无价值的代币。一旦投资者涌入，骗子便会卷款跑路，任由项目自生自灭。有时，创始人甚至利用区块链背后的数据隐私精神来隐藏真实身份，实施完美的诈骗。由于`ICO`中的创始人通常缺乏问责制，另一种替代方案——证券型代币发行（`STO`）应运而生。\n\
  \n与`ICO`不同，`STO`有公司的股票或未来利润作为支撑。`STO`就像购买现实世界中公司的一部分股权。相比之下，`ICO`就像购买一种没有价值的代币，除非项目承诺成为现实。这种差异降低了发行团队携款潜逃的动机。虽然`ICO`能够以比以往任何时候都更高效（更快、成本更低）、更广泛的方式筹集资金，但`STO`对投资者来说更加安全。`STO`的发行需要遵循严格的监管规定，最终成为注册证券。例如，投资者可能被要求遵循严格的“了解你的客户”（`KYC`）和反洗钱（`AML`）流程才能投资。这种监管框架降低了项目沦为骗局的风险。另一个关键区别在于意识形态方面。`ICO`依赖于去除中间商的核心思想，而`STO`则通常依赖一些中间人，以提升项目对发行方和投资者双方的可靠性。\n\
  \n总的来说，`ICO`和`STO`提高了传统上非流动资产的流动性，并为小型潜在风险资本投资者消除了进入壁垒。因此，曾经只有少数富裕投资者才能享有的特权机会，现在变得大众化。这代表了迈向金融民主化的重要一步。\n\
  \n然而，`ICO`和`STO`并非新加密资产早期发行的唯一可能性。其他替代方案在 2010 年代末期出现，并在 2020 年代初期持续涌现。其中包括首次交易所发行（`IEO`）、首次去中心化交易所发行（`IDO`）、Maker\
  \ 的强力持有者发行（`SHO`）以及首次推特发行（`ITO`）。对这些不太常见的发行方式感兴趣的读者，可以查阅 D-Core 的《机构区块链投资指南》[40]。\n\
  \n## 挖矿\n\n除了直接投资于加密资产、与加密资产相关的 ETF 或公司外，另一种可能的投资类型是通过基础设施进行投资，特别是投资于基于工作量证明共识机制的加密资产的挖矿业务，尤其是比特币。\n\
  \n### 传统加密资产挖矿\n\n与其投资一家挖矿公司，不如直接自己挖矿。第 6 章介绍了挖矿，即在工作量证明共识机制下，为加密资产发行新币（称为币基交易）的过程。此类加密资产包括比特币、比特币现金、莱特币、门罗币、达世币和狗狗币。然而，比特币是迄今为止哈希率（衡量网络安全性的指标）最高的资产，其哈希率是所有其他\
  \ PoW 资产哈希率总和的 100 倍。提醒一下，矿工们在一场赢家通吃的竞争中争夺验证区块链下一个区块的权利。为了赢得这场“竞赛”，矿工使用专用设备运行大量的加密哈希函数，直到偶然找到一个具有特定特征的数字。这类似于彩票，购买彩票的成本是算力（间接地，是电力）。成功的矿工将获得新铸造的币作为奖励。\n\
  \n挖矿可以是一项有利可图的生意，但它需要大量的前期投资，需要获得廉价电力，并且盈利前景波动较大。需要高额投资来购买专用设备进行挖矿。在某些情况下，你可能需要最新的专用集成电路（`ASIC`）才能具有竞争力。事实上，创新的速度使得矿机在几个月到几年内就会过时。这并不是说使用旧矿机就不可能挖矿。只是新型矿机执行哈希运算的数量增长迅速，使得旧设备很快失去竞争力。\n\
  \n![](img/600732_1_En_8_Fig2_HTML.png)\n\n一张比特币 ASIC 矿机的照片。\n\n图 8-2\n\nASIC 比特币矿机（来源：维基共享资源，公有领域）\n\
  \n截至 2023 年 5 月，一台新的`ASIC`矿机每秒可产生超过 200 terahashes（200 万亿次哈希）。作为对比，比特币区块链上的一个区块需要大约\
  \ 210 zettahashes（210 六万亿次哈希）才能找到一个成功的随机数。这个数字相当于十分钟内每秒 350 exahashes（350 万亿亿次哈希）（即撰写本文时比特币网络的哈希率，创历史新高）。\n\
  \n赢得挖矿“彩票”的可能性取决于你相对于整个网络的算力。如图 8-3 所示，哈希率在过去几年中持续增长，这反映了技术的进步以及越来越多的人为了从比特币价格上涨中获益而进入挖矿领域。2021\
  \ 年中期哈希率暴跌超过 50%，对应的是中国对比特币挖矿的禁令，而当时中国贡献了比特币大部分的哈希率。\n\n![](img/600732_1_En_8_Fig3_HTML.jpg)\n\
  \n一张从 2017 年 1 月到 2023 年 1 月比特币哈希率的折线图。曲线呈上升趋势，但波动剧烈。\n\n图 8-3\n\n2017 年 1 月至 2023\
  \ 年 1 月比特币网络每秒总哈希率，单位为 exahashes（来源：NASDAQ.com 及自行计算）\n\n\n\n运行这些挖矿设备需要消耗大量电力，因此电力成本低廉的地理位置对挖矿更具盈利优势。例如，冰岛的地热能比纽约市的电网电价便宜得多，这使得冰岛成为比特币挖矿的更优地点。由于冰岛的电力生产几乎\
  \ 100%来自可再生能源^(⁷²)，其可持续性也远高于其他地区。此类挖矿通常发生在*矿场*中——这些仓库里成百上千台 ASIC 矿机并行运作。矿场常直接建在水电站或地热能源站旁，以便利用电站产生的过剩电力来挖矿。这样一来，供应高峰（如雨季）或需求低谷（如夜间）产生的电力就能变现，同时还能保障比特币网络的安全。\n\
  \n截至 2023 年 5 月，各国电价差异悬殊：德国、丹麦或英国等国的电价平均每千瓦时超过 0.50 美元，而哈萨克斯坦、伊朗或马来西亚等国则低于 0.05\
  \ 美元。因此，毫不意外的是，后一类国家位列全球比特币挖矿量前十。不过，即便是平均电价较高的国家，也能利用偶发的廉价电力（例如可再生能源电厂的过剩能源）来挖矿——美国（占全球\
  \ 35%）、加拿大（10%）和德国（5%）也因此跻身同一前十榜单^(⁷³)。\n\n相比之下，截至本文撰写时，要使比特币挖矿盈利，所需电价须低于每千瓦时 0.11\
  \ 美元^(⁷⁴)。使用更昂贵的电力对矿工而言并无经济吸引力，因为挖矿奖励的可能性和规模无法抵消所需的能源成本。因此，在高电价地区挖矿无利可图，任何尝试者都将蒙受经济损失。值得注意的是，用于挖掘比特币等加密货币的能源，通常是原本会被浪费的能源。事实上，如果生产者能将此类能源用于其他任何用途，那通常会更有利可图。因此，比特币挖矿使我们得以从被浪费的能源中获利。与此同时，它并不会给高电价电网（例如发达国家的各大城市）带来压力，因为高电价地区缺乏挖矿的经济激励。\n\
  \n### 抗 ASIC 挖矿\n\n为了遏制永无止境的算力竞赛和不断攀升的电力消耗，开发者为部分加密货币的共识机制设计了抗 ASIC 特性。换言之，对于这些加密货币的挖矿，使用\
  \ ASIC 并不比在传统计算机中使用简单图形处理器（GPU）更具优势。此外，对于某些加密货币，从技术层面也无法使用 ASIC。在这种情况下，用自己的笔记本电脑在家挖矿，与使用最新专用设备挖矿的成功概率并无差别。\n\
  \n从技术角度看，实现抗 ASIC 有多种方法。例如，可以将挖矿算法设计为需要大量计算机内存。这一要求意味着运行该算法的计算机芯片上需要更大的物理面积。特别是，ASIC\
  \ 通常通过在计算机芯片上并行化物理线程来超越传统 GPU，而并行化本身就需要物理面积。然而，当算法步骤需要较大物理面积时，并行处理的优势就会减弱。ASIC 相对于\
  \ GPU 的竞争优势丧失，相应的加密货币便具有了抗 ASIC 特性。对于有兴趣的读者，现代基于工作量证明（PoW）的加密货币通过多重哈希 PoW、内存密集型\
  \ PoW 或程序化 PoW 来实现抗 ASIC，并且新的方法仍在不断涌现[41]。\n\n对于个人而言，挖矿抗 ASIC 加密货币比挖非抗 ASIC 加密货币更经济可行。不过，廉价电力仍然是挖矿盈利的必要条件。此外，抗\
  \ ASIC 加密货币还有一个附带好处：更高的去中心化程度。实际上，抗 ASIC 特性减少了企业建立大型矿场的激励，从而避免了资产挖矿的中心化。\n\n截至 2023\
  \ 年，最大的抗 ASIC 工作量证明加密货币包括门罗币（XMR）、以太坊经典（ETC）和渡鸦币（RVN）。\n\n### 矿池\n\n比特币挖矿面临的一个问题是，对于任何个人而言，成功挖出一个区块的概率微乎其微，尽管成功后的区块奖励相当可观^(⁷⁵)。解决办法是加入一个矿池。在矿池中，矿工们同意按各自贡献给矿池的算力比例，分配成功挖出区块的奖励。例如，假设一个矿池在\
  \ 2023 年挖出了 100 个比特币（16 个区块），而某个人在此期间贡献了该矿池总算力（哈希率）的 3%。那么，此人将获得 3 个比特币（扣除矿池管理费，例如\
  \ 2%）。如图 8-4 所示，2022 年，前 9 大比特币矿池占据了比特币总算力的 95%。\n\n![](img/600732_1_En_8_Fig4_HTML.jpg)\n\
  \n2022 年十大比特币矿池哈希率饼图。Foundry USA 23.20%。ANTPOOL 16.61%。币安矿池 11.50%。ViaBTC 9.58%。Poolin\
  \ 7.74%。Braiins Pool 5.21%。BTC.com 4.03%。Luxor 2.59%。其他 3.09%。\n\n图 8-4\n2022 年十大比特币矿池及其哈希率占比（来源：BTC.com\
  \ 及自行计算）\n\n建议愿意挖掘工作量证明加密货币的新手加入矿池，但需谨慎选择。特别地，应寻找那些在挖矿设备要求、费用计划、停机历史以及抵御 DDoS 攻击记录方面完全透明的矿池^(⁷⁶)。稳定（无停机且不易成为攻击目标）且透明的矿池，对于降低挖矿过程中的风险至关重要。\n\
  \n\n\n## 质押\n\n许多加密资产将质押作为一种可能的被动收入来源（例如，参见表格 8-1）。第 6 章介绍了权益证明共识机制，其中质押者负责验证新区块。他们被选中进行验证的可能性，通常（除其他标准外）取决于他们向网络承诺（质押）的代币数量。这些验证者随后会因其工作获得质押奖励。成为验证者可能需要大量的最低投资（例如，以太坊为\
  \ 32 `ETH`），以及繁琐的技术设置以避免停机（停机可能导致质押金被罚没）。然而，质押池对投资者来说很容易获得，无需专用设备或一次性大额投资。特别是，像\
  \ Binance、KuCoin 或 Coinbase 这样的交易所，为可质押的加密资产提供了有吸引力的奖励，且最低投资门槛极低。在这种情况下，质押奖励类似于债券收益率：质押的本金越高，质押奖励就越高。然而，与债券类似，这种收益也面临金融风险。特别是对于已质押的加密资产，它面临与资产本身及其质押平台相关的风险。\n\
