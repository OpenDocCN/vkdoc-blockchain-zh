- "# 4. 投资组合管理入门\n\n> *Audentes fortuna iuvat.（命运眷顾勇者。）*\n> \n> ——维吉尔\n\n让我们转换视角，从金融投资组合管理的角度来审视加密资产。本章介绍投资组合管理的基础知识，以评估加密资产的金融特性。正如分析所示，加密资产是过去十年来最具财务吸引力的投资，即使在风险调整后也是如此，并且在未来十年内可能继续保持这一态势。\n\
  \n\n\n### 价格波动\n\n虽然基本面定义了资产的经济价值，但交易所的供需关系驱动着其价格。资产价格与价值之间的差异为能够发现这种差异的投资者创造了机会：当价格最终趋向资产的经济价值时，他们便能确保获得投资回报。价格波动的幅度和频率（即波动性）在投资组合管理中至关重要。我们首先讨论价格如何波动，这最终驱动了回报和波动性。\n\
  \n价格变化取决于交易所的交易。一个*订单簿*中存有待成交的订单。它记录了买方愿意购买和卖方愿意出售的价格，以及每笔交易的数量。表 4-1 展示了订单簿的样貌以及大额交易发生时的情形。假设比特币当前交易价格为\
  \ `$123,456.78`（截至撰写本文时，该价格尚未达到），其订单簿如表 4-1 所示。\n\n**表 4-1** 比特币订单簿示例，当前价格为 `$123,456.78`\n\
  \n| | 价格（美元） | 数量（BTC） |\n|--- |--- |--- |\n| 卖方 | `123,500.00` | `3.141` |\n| |\
  \ `123,489.24` | `0.318` |\n| | `123,475.00` | `2.718` |\n| | `123,468.43` | `0.476`\
  \ |\n| | `123,459.00` | `1.618` |\n| | `123,457.55` | `0.693` |\n| | `123,457.00`\
  \ | `0.301` |\n| 买方 | `123,456.54` | `0.707` |\n| | `123,456.32` | `0.632` |\n|\
  \ | `123,456.00` | `0.774` |\n| | `123,455.00` | `1.000` |\n| | `123,453.50` | `0.547`\
  \ |\n| | `123,450.00` | `3.162` |\n| | `123,449.99` | `1.414` |\n\n表 4-1 中的每一行都对应着一个市场参与者的买入或卖出订单。例如，一位个人投资者愿意以每个\
  \ BTC `$123,457.00` 的价格卖出 `0.301 BTC`（第七行），另一位则愿意以 `$123,455.00` 的价格买入 `1.000 BTC`。两者都在等待市场价格变动以执行其订单，因为当前价格对买家来说过高，对卖家来说过低。价格从高到低排序，卖方价格总是高于当前价格，而买方价格则低于当前价格。情况总是如此；否则，订单会立即成交，而不会作为待成交订单显示在订单簿上。\n\
  \n现在假设一个大买家希望以最高每个 BTC `$123,500.00` 的价格收购 `10 BTC`。表 4-1 中可见的整个卖方待成交订单将立即成交。买家以\
  \ `$123,457.00` 获得 `0.301 BTC`，以 `$123,457.55` 获得 `0.693 BTC`，依此类推，直到以 `$123,500.00`\
  \ 获得 `3.141 BTC`。结果，比特币的当前价格会突然跃升至 `$123,500.00`。\n\n由于与传统股票和债券市场相比，加密资产市场的流动性相对较低（每日总交易量显著更低），大额订单往往会导致价格大幅波动。例如，特斯拉在\
  \ 2021 年 2 月购买了 `15 亿美元` 的比特币，导致价格飙升。大幅的价格变动造成了加密资产闻名的高波动性。然而，随着行业日趋成熟，加密资产可获得的流动性水平不断提高，这往往有助于降低波动性。\n\
  \n### 风险与回报\n\n简而言之，投资组合管理旨在识别最优资产配置，以在尽可能低的波动性下最大化预期回报。确实，对于大多数投资者而言，高财务回报和低波动性具有吸引力。按照惯例，行业内将术语“风险”赋予波动性，并将其衡量为回报的标准差。简单来说，回报的标准差就是它们相对于平均值的平均偏差。\n\
  \n诺贝尔奖得主哈里·马科维茨在 1952 年提出的优化金融投资组合的理论，至今仍是财务顾问使用的基本方法。这种*现代投资组合理论*旨在根据投资者的特定特征（如风险承受意愿和时间跨度）找到回报与风险之间的正确平衡。该方法识别出在给定风险水平下可预期的最高可能回报水平。可接受的风险水平越高，预期回报就可能越高。\n\
