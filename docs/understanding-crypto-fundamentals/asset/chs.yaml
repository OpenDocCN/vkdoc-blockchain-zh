  ## 中央银行与部分准备金银行制度


  与此同时，在大西洋的另一边，发生了一项重大的金融发展。直到第一次世界大战爆发前，美国以及大多数发达国家都以黄金作为其货币的后盾。由于黄金的新供应量（流量）与其存量相比微乎其微，因此没有通货膨胀。随着商品相对价格的调整，财富在各国的流转时有发生，但总和为零。通货膨胀几乎不存在，这使人们能够储存财富。这种情况在
  1914 年发生了改变，当时美国成立了一家私有银行——美联储，并被授权印刷美元。美联储独立于美国政府，没有预算，不接受审计，没有监管者，也不对任何人负责。^(¹⁰)
  正如美联储自己所描述的，它通过创造新货币来向美国政府放贷。^(¹¹) 这些“借贷”的货币是凭空创造出来的新货币。到现在应该很清楚，这并没有产生新的价值；印刷只是稀释了所有现有美元的价值。而且，美联储并不用黄金等实物价值来支持任何新发行的美元。


  当考虑到与之配套的部分准备金银行体系时，这一可疑的安排变得更具争议性。当一家商业银行持有公众存款时，只有一小部分金额必须存放在金库中。银行并不会持有这些存款，而是将其中大部分贷放出去。在美国，美联储设定了准备金要求。通过这种方式，它控制着有多少货币流入经济。假设准备金要求是
  10%。当爱丽丝将 100 美元存入她的商业银行（比如 ING）时，该银行可以向鲍勃贷出 90 美元，同时将 10 美元保留在金库中。^(¹²) 鲍勃用这笔钱从查理那里买东西，查理将他刚赚到的
  90 美元存入他在另一家商业银行（比如富国银行）的账户中。这家银行则将 9 美元（10%）留作备用，并将剩余的 81 美元贷给丹。丹从艾琳那里买东西，艾琳则将钱存入她的商业银行。此时，爱丽丝的银行账户里有
  100 美元，查理有 90 美元，艾琳有 81 美元。这一切都源于爱丽丝最初的 100 美元。这个过程并未止步，而是会继续进行下去。10%的部分准备金比率使得商业银行能够“创造”出多达原始存款九倍的资金：最初的
  100 美元最终可能变成 1000 美元在流通中。


  这就是银行创造货币的方式——当有人获得贷款时，只需在账本上记上一笔。此外，还需要为商业银行贷出的总金额支付利息。如果贷款利率是 5%，那么除了借出的 900 美元本金外，每年还需偿还
  45 美元的利息。而所有这一切都源于爱丽丝最初存入的 100 美元。偿还利息的唯一途径是从国外获取，或者借入更多的债务。从整个经济的规模来看，要同时偿还债务本金及其利息在数学上是不可能的，因为货币必须有来源。因此，当前依赖部分准备金银行制度的货币体系，是一种合法化的金字塔骗局。




  ### 大萧条


  20 世纪 20 年代代表着金融文化从战前时代的转变。公民不再储蓄，而是投资，低利率环境更助长了这一趋势。原先几乎专供企业使用的贷款逐渐扩展到个人。人们借钱买房、买车，甚至买股票。由于资金宽松和贷款驱动的购买力，一切——消费品、房地产、股票市场等等——都变成了泡沫。


  上世纪最严重的经济萧条发生在那个十年末。它最终对全球经济和人民的生活造成了毁灭性影响。奥地利经济学派的杰出理论家弗里德里希·冯·哈耶克和穆瑞·罗斯巴德将这场大萧条在很大程度上归因于
  20 世纪 20 年代的货币供应扩张，这催生了不可持续的信贷泡沫。^(¹³)


  随着泡沫破裂和价格下跌，许多人无法偿还现有贷款，也不再申请新的贷款。结果，正如任何在部分准备金银行制度下的萧条一样，货币供应收缩，导致进一步的价格下跌和工资大幅下降。空前数量的银行倒闭，吞噬了人们毕生的积蓄。1931
  年 9 月，英国对其黄金债务违约，这在所有其他国家引发了恐慌。由于担心美国也会发生同样的情况，人们纷纷挤兑黄金，导致美元遭受损失。再一次，由于纸币供应过剩，而稳定的“真正”货币——黄金供应不变，货币在市场上的价值与其面值出现了背离。人们越来越多地将纸币兑换成本该作为其支撑的黄金，直到银行无法再提供黄金。美国政府别无选择，只能切断其货币与黄金的挂钩。


  ![一张美国一美元纸币的特写照片。纸币顶部印有“美利坚合众国”字样，中央是美国首任总统乔治·华盛顿的肖像。](img/600732_1_En_1_Fig5_HTML.jpg)


  **图 1-5** 金本位时期（1928 年）的一美元纸币。纸币上仍印有“见票即付持票人”字样，该字样在金本位制结束后被移除。（来源：维基共享资源，公共领域）


  1933 年，富兰克林·德拉诺·罗斯福领导下的美国政府发布了第 6102 号行政命令。通过这项命令，美国政府实际上没收了美国公民所有的“金币、金条和金券”，并对不服从者处以高额罚款甚至监禁。^(¹⁴)
  然而，即便采取了如此极端的措施，仍不足以让政府偿还其债务。几个月后，美国对所有合同中的黄金条款违约。简而言之，政府正式宣布不会偿还其已订立合约的贷款，无论是国内还是国外的贷款。美国用本国纸币偿还贷款，而不是用真正的价值——黄金来偿还。一年后，美国将美元对黄金贬值
  59%，从而承认其此前高估了美元。


  又过了十年，经历了第二次世界大战，世界各国才重新恢复了金本位制。世界货币史上的这一重大决定发生在新罕布什尔州一个名为布雷顿森林的小地方。


  ### 布雷顿森林时代


  在战后时代之初，即 1944 年，世界主要大国建立了一套关于货币、金融和商业关系的规则体系，称为布雷顿森林体系。美国、加拿大、西欧国家、澳大利亚和日本同意制定一项货币政策，通过将各自货币与黄金挂钩来确保稳定的汇率。


  除了这套规则，他们还建立了国际机构来监管国际货币体系。这些机构包括国际货币基金组织（IMF）以及现在被称为世界银行的组织。其目标是加强国家间的合作，并防止货币贬值——这种贬值行为会使实施国获得优于其他国家的贸易竞争优势。^(¹⁵)


  随后，回归金本位制带来的国际经济成功是惊人的。接下来的三十年被称为*辉煌三十年*^(¹⁶)，也叫做*资本主义的黄金时代*，其特点是工业国家持续保持高水平的经济增长。虽然战后重建的需求促进了经济复苏，但金本位制也是一个关键的增长驱动因素，因为它对政府施加了纪律约束。如果政府想花钱，它首先得有黄金，所以它必须先拥有或收集真正的价值。




  ## 回归法定货币


  然而，美国试图通过印刷超过其黄金储备量的美元来逃避这一义务。随着外国政府察觉到这一伎俩，它们纷纷将手中的美元兑换成黄金。20 世纪 70 年代初，美国不得不采取行动，阻止真实价值流失到国外。


  1971 年夏天，美国总统尼克松终止了美元与黄金的直接兑换。这一决定实际上标志着布雷顿森林体系的终结。由于其他主要大国主要持有美元作为央行储备，它们也纷纷效仿，放弃了与黄金的固定汇率。其结果是，货币变成了法定货币^(¹⁷)，其价值仅靠对政府信用的信任来支撑。


  然而，取消金本位制，同时也取消了施加在政府身上的约束。随着这一转变到法定货币体系，政府可以通过印刷更多本国货币来随心所欲地支出。它们可以多年运行不受控制的赤字，而无需平衡预算。正如本章中的历史例子所示，人们无法通过印刷更多货币来创造新的价值。新印刷货币的价值来自于流通中的现有货币。每一张新美元都会稀释所有现有美元的价值。印刷新美元钞票实际上是将购买力从拥有储蓄的个人和公司转移到印钞实体手中。这是一种以储蓄价值不断下降为形式的储蓄税。正如诺贝尔奖得主米尔顿·弗里德曼所言："通货膨胀是一种无需立法的税收。"


  正如经济理论所预测的那样，当政府印刷这些货币时，其购买力下降，随之而来的是物价上涨。如图 1-6 所示，在布雷顿森林体系之后，公民以现金形式持有的毕生积蓄在短短几年内就损失了一半的价值：以美元为例，不到十年。这种价值侵蚀在整个世纪及以后的时间里持续进行。特别是，1971
  年留出的`$100`在一代人之后的 2001 年仅值约`$20`。尽管政治相对稳定，但事实证明，没有黄金支持的现金再次成为一种低效的价值储存手段。


