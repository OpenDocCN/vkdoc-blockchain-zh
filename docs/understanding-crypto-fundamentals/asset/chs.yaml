  另一个值得注意的印刷狂潮发生在 20 世纪初德国魏玛共和国时期。与所有之前的例子一样，它始于一场战争。第一次世界大战爆发时，德国放弃了与黄金挂钩的货币——金马克，转而使用纸马克。共和国开始使用铁、锌和铝等廉价金属铸造新硬币，并在战争期间将纸马克的发行量增加了四倍。


  过度货币供应的毁灭性影响直到战后才显现出来，因为人们在战争期间持有储蓄，避免不必要的支出。一战结束后的几年内，物价上涨了十多倍，抹去了人们 90%以上的储蓄价值。


  当向法国支付战争赔款到期时，印刷机加速了其疯狂运转。一金马克的价格从 1920 年的 15 马克上涨到 1923 年 7 月的 10 万马克，9 月达到 1300
  万马克，同年 11 月达到 1 万亿马克。流通中的典型纸币面额从 1920 年的 10 马克增长到 1924 年的 100 万亿马克。仅 1923 年 10 月，物价就上涨了
  29,500%，而印刷机每天还要额外印出 500 千万亿新纸马克。^(⁸) 与之前的例子一样，纸币变得一文不值，国家崩溃，最终又回归到以黄金为支撑的货币体系。


