  ### 中心化与去中心化平台


  用户加入中心化平台时，通常会自动设置托管钱包。尤其值得注意的是，2021 年，约 99%的加密资产交易是通过中心化平台完成的。^(⁹¹) 此类平台的功能类似于传统的在线证券交易所：用户将资金发送到一个私有平台（例如，使用信用卡或借记卡），然后可以在线进行投资。其用户友好性可能是其占据市场主导地位的原因。通过此类平台进行交易确实要容易得多，并且对于普通用户来说，与熟悉的平台更加相似。


  此外，中心化平台还因属于*交易所*还是*经纪服务*而有所不同。交易所允许用户在公开交易所上直接进行相互交易。相比之下，经纪服务平台是该平台上所有交易的对手方。著名的中心化加密资产交易所包括`Binance`、`Kraken`和`Bitstamp`。著名的加密资产经纪服务包括`Coinbase`^(⁹²)、`eToro`和`Robinhood`。


  与中心化平台相反，也存在去中心化交易所，它们能够实现更纯粹的点对点交易，尽管截至 2023 年，它们仍属特例。去中心化交易所（DEX）与其去中心化加密资产对应物相似，因为交易的另一方没有中央机构，甚至没有促进交易的中央机构。它们通常是开源项目，通过智能合约将买方与卖方、贷方与借方匹配起来，无需独特的全知全能监管。遵循最初的加密资产理念，它们是去信任化的。


  在某些情况下，DEX 依赖用户生成的流动性池，通过奖励来激励用户提供流动性。这样，平台可以成为自动做市商（AMM）。换句话说，它们不再需要依赖订单簿。使用 AMM
  时，价格由数学公式而非特定的买卖订单驱动，从而增加了无数代币的流动性。最早的 DEX 之一`Uniswap`，通过其 AMM 功能，在推动 DEX 行业发展方面发挥了关键作用。尽管其第一个版本于
  2018 年推出，但第二个版本在 2020 年通过`Ethereum`实现了任何代币的直接兑换，从而改变了游戏规则。任何加密资产都可以去中心化地兑换成任何其他加密资产。`Uniswap`的快速追随者也成长为生态系统中最大的
  dApp 之一。


  尽管 DEX 更符合加密资产的去中心化价值主张，但相比于中心化交易所，它们使用起来更具挑战性，并且更容易遭受诈骗。它们要求用户对流程有更多了解，并需要更多时间来熟悉。另一方面，它们免除了中心化交易所强制收取的部分费用、KYC
  和 AML^(⁹³)流程，从而提供了更高的隐私性。它们还提供了更高的安全性，因为资金分散在众多钱包中，相比中心化交易所，它们对黑客的吸引力较小。然而，尽管 DEX
  可能是未来加密资产的首选交易平台，但它们尚未成熟，需要用户谨慎行事。与去中心化交易所相比，中心化平台的使用量要大得多，这证明许多用户目前更看重托管服务的易用性，而非去中心化的额外好处。


  DEX 之间的区别在于它们所基于的底层协议（例如，`Ethereum`或`Binance Smart Chain`）、其关注点（例如，ERC-20 代币）以及它们提供的特定功能（例如，冷存储和双因素认证）。


  除了中心化和去中心化交易所之外，混合交易所结合了两者的优点。具体来说，它们提供了中心化交易所的易用性、速度和流动性，同时具备去中心化交易所的点对点和隐私功能。它们通常既有链上部分（如
  DEX），也有链下部分（如 CEX）。混合加密资产交易所包括`BitMax`和`CEX.IO`，各自提供中心化和去中心化的交易选项。


  在选择交易所时，应考虑可用选项中以下特征。如同钱包一样，许多网站会根据部分或全部这些特征对加密货币交易所进行排名。


  1.  托管状态

  2.  交易成本

  3.  提现成本

  4.  交易量

  5.  获得被动收入的可能性

  6.  使用衍生品（如期指或期权）的可能性

  7.  将资金兑换为法定货币的可能性

  8.  交易限额（每日存入/提取限额）

  9.  隐私级别（是否存在 KYC 和 AML 流程）

  10. 易用性


  #### 用户界面与交易所


  虽然交易所有时会将钱包作为其服务的一部分，但钱包和交易所是两个截然不同的概念。具体来说，用户可以通过多种不同方式设置钱包，并独立选择连接此钱包的交易所。例如，用户可以设置一个网页钱包或硬件钱包，并将其连接到中心化或去中心化交易所，或者不连接到任何交易所。


  软件钱包（例如，`Electrum`、`Mycelium`、`Exodus`）、网页钱包（例如，`Metamask`、`MyEtherWallet`、`Bitcoin.com
  Wallet`、`Trust Wallet`、`Coinbase Wallet`）或硬件钱包（例如，`Ledger`、`Trezor`、`KeepKey`、`Coldcard`）的用户界面与任何交易所都是独立的。例如，即使`Trust
  Wallet`也独立于交易所`Binance`，尽管`Binance Holdings Limited`自 2018 年收购以来一直拥有它。同样，`Coinbase
  Wallet`独立于`Coinbase`交易所，尽管它们由同一母公司`Coinbase, Inc`拥有。它们仍然是独立的产品，与相应的交易所没有直接关联。因此，这些钱包的用户界面不应被误解为交易所。推而广之，自托管钱包的用户界面并不意味着存在与经纪服务相同的第三方风险（例如，腐败、欺诈或当局干预的风险）。


  #### 确定性钱包与非确定性钱包


  钱包的另一个区别在于它们是否是确定性的，这仅适用于包含多个密钥对（私钥和公钥）的钱包。每个密钥对都有自己的公共地址。这样，单个用户可以在区块链上使用多个地址，就像单个用户可以在同一家银行拥有不同的银行账户一样。


  在确定性钱包中，一个主密钥可以创建多个密钥对。主密钥通常是一个助记词短语（将在下一节中解释），并且可以生成，例如，一百个密钥对。在这种钱包中，用户只需备份一次：即主密钥。一旦他拥有主密钥，他就可以访问所有密钥对以及相应地址上的所有加密资产。


  在非确定性钱包中，每个密钥对都是独立的。因此，用户必须为每个钱包密钥创建单独的备份。


  确定性钱包还包含其他子类别。例如，分层确定性（HD）钱包能够基于层级结构中的另一个私钥生成一组私钥。由主密钥创建的每个私钥本身也是一个主密钥。这对于具有多层层级结构的企业结构可能很有用，每一层都负责管理多个地址。


