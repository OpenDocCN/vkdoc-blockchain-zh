- '# 第五部分：如何进行投资？


  '
- "# 12. 投资策略\n\n> *衡量投资成功与否的最佳标准，不是你是否跑赢了市场，而是你是否制定了一项财务计划和一套行为纪律，让你有可能实现目标。*\n>\
  \ \n> ——本杰明·格雷厄姆\n\n关于投资的文献浩如烟海、种类繁多，有时甚至自相矛盾。无论如何，提供一个完整的投资框架远非本书所能涵盖。因此，本章仅简要概述加密资产新投资者的基本原则，并提醒一些尤其适用于此类资产类别的注意事项。本章可能无法满足资深投资者的期望，建议他们跳过。\n\
  \n首先，投资是高度个人化的事情。投资者有不同的投资期限、收益目标、风险承受能力、风险承担意愿、法律义务、税率、偏好（例如 ESG）以及其他独特特征。因此，本章甚至本书中的见解不应被视为对任何投资者的建议。相反，它们仅旨在为投资者在加密资产方面的教育做出贡献。潜在投资者应仔细评估自己在这些特征上的位置，并考虑咨询专业的投资组合经理以帮助制定投资策略。\n\
  \n其次，市场处于不断变化之中。债券、股票、货币和大宗商品等资产类别之间的关系并非固定不变，而是随时间变化。此外，它们的估值取决于其他市场参与者的看法和判断，而非特定的公式或模型。特别是，加密资产的发展速度超过任何其他资产类别，并且尤其容易受到其他参与者看法的影响。应谨慎看待本章内容，并根据其在特定时间点及面对市场环境变化时的相关性提出质疑。\n\
  \n尽管如此，制定投资策略至关重要。尤其对于仍波动剧烈且易受市场变化影响的资产类别而言，投资策略有助于投资者专注于长期目标，并防止他们对新闻或市场波动做出情绪化反应。\n\
  \n### 低买高卖\n\n许多新投资者决定在最糟糕的时机建立头寸。在加密资产市场中尤其如此，因为新闻往往在某个市场资产价格大幅上涨后才广泛报道。例如，比特币价格出现数量级增长或其他加密资产涨幅更大时，往往会登上头条。结果，潜在投资者害怕错过机会。当价格明显高于其长期趋势时，他们往往被吸引入市，而这之后通常会迅速跟随回调。特别是在\
  \ 2013 年、2017 年和 2021 年价格飙升（见第 9 章）之前，有许多新入市者加入。\n\n尽管这可能是显而易见的，但通过投资实现资本收益在于低买高卖。虽然听上去简单，但许多新投资者却做不到。具体来说，当价格显著高于其长期趋势时，入市时机通常不合适。要低买高卖。\n\
  \n这个简单的目标有时需要采取逆向策略：在市场情绪低迷时投资，在情绪非理性狂热时退出。例如，第 9 章介绍的恐惧与贪婪指数有助于评估加密市场周围的普遍狂热程度。此外，*相对强弱指标*（RSI），尽管是一种短期工具，但作为动量指标，也能提供有价值的信息，判断资产当前是超买（可能是卖出良机）还是超卖（可能是买入良机）。这些指标过去在加密资产的买卖时机方面往往能提供有价值的建议。然而，这些建议并非始终准确。因此，它们不应成为任何投资决策的唯一依据。\n\
  \n### 把握市场时机\n\n尽管财务分析、趋势、模型和新闻是有助于判断经济周期所处位置的实用工具，但准确把握市场时机是不可能的。由于固有的不确定性，没有人知道市场何时见底或见顶。因此，力求以最低价格买入并在市场最高点精确卖出可能是徒劳的。另一种方法是平均成本法。\n\
  \n### 平均成本法\n\n意识到无法把握最佳进出点，投资者可以依赖多次进出。例如，投资者可以每月投入可用资本的 1%或固定金额。这个过程称为“平均成本法”，是一种时间上的分散化投资。它降低了在错误时间投入大量资金的可能性。平均成本法在本杰明·格雷厄姆\
  \ 1934 年出版的、已成为行业标杆的价值投资著作《聪明的投资者》第 2 页中已有阐述 [42]。\n\n此外，平均成本法限制了情绪化交易带来的风险。加密资产市场比其他市场情绪化程度更高，因为加密资产的基本面不如传统资产类别那样被充分理解。同时，相对较低的流动性使得大额交易对价格的影响更大。将买入和卖出分散到不同时间似乎是更谨慎、更值得推荐的方法，尤其是对加密资产而言。\n\
  \n但请注意，纯粹从数学角度看，平均成本法并不优于一次性大额购买（假设有足够的流动性吸收购买行为，而不会对价格产生实质性影响）。\n\n\n\n### 过滤噪音\n\
  \n加密资产行业的超常增长引发了围绕这类新型资产投资的狂热。结果，行业相关信息多到无人能处理。这些信息来自各种渠道，从学术研究到公众人物，从企业到监管机构。尤其是传统新闻媒体，即便不了解加密资产行业的基本原理，也喜欢对其评头论足。例如，关于比特币挖矿对环境有害的论调就是这样传播开来的。正如第\
  \ 3 章所述，这种论调既不准确又带有偏见；综合来看，相反的观点更可能接近真相。\n\n面对一个快速增长且被误解的行业，从海量噪音中筛选有用信息至关重要。谨慎的投资者应确保选择高质量、信息可靠的来源。\n\
  \n此外，主动寻找与自己观点相悖的信息至关重要。勤勉的投资者应当主动寻求那些不同意其投资论点且学识渊博的人的观点。该行业的突破性潜力吸引了一批狂热的拥护者，他们对推广加密资产的投入近乎宗教般的狂热。同样，该行业也有强烈的反对者，将整个行业斥为骗局。只听信加密资产的传教士（无论是支持者还是反对者）都是危险的，因为这会使个人观点产生片面性。结果，要么高估了加密资产的潜在回报，要么低估了其风险。\n\
  \n最终目标不是为了向任何人证明某个观点的正确性，而是为了达到尽可能高的市场理解水平，从而做出明智的投资决策。过滤噪音意味着忽略短期价格波动以及廉价或有偏见的媒体头条，专注于基于高质量、独立研究信息的长期博弈。\n\
  \n### 税务\n\n税务问题因司法管辖区而异，差异巨大。熟悉当地税务法规（以及可能需要纳税的其他司法管辖区的法规）对于决定是否以及如何进行交易至关重要。加密资产税可能包括所得税、资本利得税和财富税。通常，加密资产被归类为商品、证券（如股票和债券）、数字财产或外币。这种出于税收目的的当地处理方式从根本上影响了如何处理该资产。\n\
  \n此外，税务处理可能因持有期而异。例如，在某些司法管辖区，一年内出售的加密资产可被视为投机行为而需征税，而持有超过一年则被视为投资而无需征税。另外，某些出售行为可能触发税务事件，而其他则不会。例如，将比特币这类加密资产换成\
  \ USDC 这样的稳定币可能不会触发税务事件，但换成法定货币则会。由于其影响，许多其他当地税务特性可能建议采用不同的交易方式。此外，规则也在快速演变。勤勉的投资者应随时关注当地法规，以决定如何最优地管理加密资产组合。\n\
  \n如果未考虑财务税务因素，处理像加密资产这样波动的资产可能会很危险。例如，一个粗心的投资者可能在十二月卖出加密资产，并通过此次出售获得巨额资本利得。将全部收益立即再投资于另一种加密资产，可能会让他陷入风险。假设这另一种加密资产（在这个行业中时有发生）价值大跌，那么投资者可能没有足够的流动资金来支付最初那笔巨额资本利得所应缴的税款。当税款在次年到期时，他可能不得不在非常不利的时机出售资产来支付应缴税款。\n\
  \n对加密资产税收感兴趣的读者可以参考 Schmidt、Bernstein、Richter 和 Zarlenga 合著的详尽著作《加密资产税收》（第二版，2023\
  \ 年），该书涵盖了超过 40 个国家的加密资产税法[3]。\n\n### 借款作为出售的替代方案\n\n需要即时流动性的投资者，在出售加密资产之外还有其他选择。例如，与其在不利时机出售加密资产，不如以其为抵押进行借款。只要贷款利率低于加密资产的升值率，投资者通过借款就能获得更大利益。此外，借款所用货币的通货膨胀率越高，对借款人越有利。原因在于，所欠资金未来在购买实际商品和服务方面的价值将会更低。\n\
  \n### 行为与心理偏差\n\n传统投资已经需要情绪自律和了解自身局限性，而加密资产投资则将这两项要求提升到了新的高度。确实，价格频繁且往往非理性的双向波动，不断地考验着投资者的心理素质。面对这种波动性，情绪抽离至关重要。无论好坏，这并不是人人都能掌握的技能，对于那些忽视其必要性的人来说，可能会产生严重后果。除了情绪自控，了解自身的心理偏差，对于在一个动态行业中管理波动的投资组合尤为重要。\n\
  \n经济学之父对此有如下论述。\n\n> *如果你不了解自己，股市会是一个让你付出高昂代价来认识自己的地方。*\n> \n> ———亚当·斯密\n\n本节涵盖了一些常见的情绪偏差和认知错误，勤勉的投资者在做出投资决策时应予以考虑。这些偏差和错误在一定程度上解释了，为何原本理性的投资者会做出不当的投资决策，从而为交易的对手方创造了机会。\n\
  \n#### 确认偏误\n\n如果你相信灰猫比黑猫多，那么每次看到灰猫都会强化你的信念，而不管这信念本身是否准确。这种倾向被称为*确认偏误*，我们大多数人都自然而然地受其影响，尽管常常不自知。毫不意外，这种偏误在投资中也会显现。\n\
  \n例如，为了证明自己对于某个（类）特定资产的理论而寻找依据，可能导致投资者只考虑部分可用信息。相反，与自身投资论点相冲突的信息，即使包含了投资者应考虑的关键数据要素，也会被忽略。\n\
  \n我们与生俱来的确认偏误可以通过从不同渠道寻求多样化信息，并主动寻找与自身投资论点相悖的信息来减轻。这特别意味着要批判性地思考自己为何以及如何可能犯错，而不是努力证明自己必定正确。\n\
  \n\n\n#### 损失规避\n\n社会科学研究广泛支持的另一偏见是损失规避。具体而言，研究表明，对大多数人来说，损失带来的痛苦程度要远大于同等收益带来的满足感。换句话说，赚取\
  \ 100 美元的快乐小于损失 100 美元的痛苦。\n\n这一简单事实对投资组合管理有着重大影响。它尤其支持了价值投资理论，即投资价格可能低于其经济价值。例如，面对波动性极高的投资，投资者往往会避而远之，这种倾向被称为*短视损失规避*。事实上，当面临两种高波动性证券的投资选择，且其中一种很可能价值归零时，大多数投资者更倾向于不投资。这意味着，即使另一种投资的巨额收益可能使整体组合仍具吸引力，情况依旧如此。损失规避自人类有史以来就一直是行为的一部分，并且很可能将长久存在[43]。\n\
  \n![](img/600732_1_En_12_Fig1_HTML.png)\n\n一张展示投资者价值与损失/收益关系的四象限折线图。从第三象限到第一象限呈上升趋势，表明与收益相比，损失的程度更高。\n\
  \n图 12-1\n\n损失规避效应的可视化呈现，其中在投资者眼中，损失的影响远大于同等价值的收益。\n\n这种偏见对于规模较小且流动性较低的资产类别（如加密资产）尤为重要，因为它们比成熟资产类别的波动性更大。为缓解这种偏见，可以考虑整体投资组合，并关注投资的潜在长期收益，而非投资组合中任何特定部分的短期风险，这或许会有所帮助。\n\
  \n#### 禀赋效应\n\n另一种偏见是*禀赋效应*，在此情境下类似于现状偏见。它表明，我们对自己已经拥有的东西，其估值高于尚未拥有的东西。例如，一个人可能愿意以\
  \ 5 美元卖掉一个特定的杯子，但不愿意花超过 2 美元去买它。理性会认为买卖的阈值应相同：即由该物品带来的效用所对应的价格。然而，社会科学的经验证据表明，拥有某物会使其对所有者更有价值。\n\
  \n在投资中，这种偏见具有重要影响。例如，仅仅因为你过去购买过某种加密资产，并不意味着当情况发生变化时，它仍然是你投资组合中的最优选择。然而，人们往往倾向于保持现状，即便这可能导致不恰当的资产配置。\n\
  \n#### 保守主义偏见\n\n保守主义偏见是导致禀赋效应的可能原因之一。当投资者对某件事形成观点后，改变这一观点需要付出不成比例的努力。例如，当投资者根据初始信息得出结论，认为某资产价格将上涨时，更新这一结论可能需要的信号和信息比得出原始结论时还要多。这种偏见与加密资产直接相关，因为大多数传统投资者不愿对整个基于法定货币的货币模型提出质疑，而该模型在过去半个世纪一直是投资行业的支柱。\n\
  \n#### 锚定效应\n\n锚点（过去达到的特定价格）常常成为未来发展的参照点，即使这并不理性。例如，当比特币突破 69,000 美元大关后，随后的任何价格都会与这个峰值比较：“比特币下跌了那么多百分比”，“比特币损失了那么多价值”等等。然而，很少有人提到，就在\
  \ 18 个月前，比特币的价格还低于 4,000 美元。无论资产的基本价值如何，将价格锚定在历史水平上要容易得多，这就是许多投资者如此做的原因。\n\n勤奋的投资者不应主要考虑一项资产过去达到过什么价格，而应思考其基本价值是多少。因此，应该摆脱任何锚点，这些锚点可能而且常常是由市场的非理性反应造成的。\n\
  \n#### 过度拟合偏见\n\n虽然数据有助于金融分析，但也可能被有意或无意地误用。具体来说，如果分析师发现并不存在的模式和关系，他们就存在过度拟合偏见。例如，他们可能强行让一个模型或理论去拟合特定数据集，即使数据本身并不自然支持该模型或理论。\n\
  \n#### 数据挖掘偏见\n\n先前从数据中得出的发现也可能使任何新的分析产生偏差。例如，如果新研究基于先前报道的证据，或者许多分析使用相同的数据库，数据分析就可能产生偏差。如果在一个被过度使用的数据集中，数据偶然显示了一种特定模式，那么因为众多研究都强调它，这种模式可能被过分依赖。\n\
  \n#### 样本选择偏见\n\n相比之下，某些数据可能被系统性地排除在外，例如由于缺乏可用性或提取该信息的难度。容易获得的东西并不比难以获得的东西更重要。\n\
  \n为了减轻这些基于数据的偏见，勤奋的投资者应努力从客观、独立、原始的来源收集完整的原始数据集（例如，直接从区块链收集数据，而不是使用第三方报告的数据），并得出自己的结论。\n\
  \n#### 幸存者偏差\n\n另一个与数据相关、且在加密资产领域高度相关的关键偏见是幸存者偏差。如果只考虑当前的幸存者，回顾历史数据可能会产生有偏见的看法。例如，一个人可能会后悔没有投资于某个近期价格上涨了\
  \ 10 倍的加密资产。然而，当该投资机会存在时，可能有 100 个具有相似风险特征的加密资产可供投资。如果其中 99 个变得一文不值，只有一个成功了，这并不意味着最初的投资是值得的。至少，投资该资产并不像只关注幸存者的分析所暗示的那么有吸引力。因此，恰当的分析应包括那些幸存下来的资产，以及那些没有幸存下来的资产。\n\
  \n从这个意义上说，幸存者偏差与后见之明偏差密切相关，后者指人们倾向于有选择性地回忆事实，以便在事后证明某个结果的“显而易见”。例如，许多投资者后悔十年前没有投资比特币。然而，当时比特币的风险性远高于今天，尽管许多风险并未成为现实。此外，当时大多数投资者会使用中心化平台进行投资（因为直接在区块链上投资比今天更难操作），而其中许多平台都曾被黑客攻击。这些投资中的大部分最终可能丢失或被盗。\n\
  \n因此，对过去投资的恰当分析应考虑当时已知的信息，而非今天已知的信息。详尽记录自己的投资论点及每笔交易的原因，有助于限制选择性回忆事实的倾向，以及避免陷入幸存者偏差或后见之明偏差。\n\
  \n\n\n#### 框架偏差\n\n人们往往会根据信息的呈现方式产生偏见，即使底层信息完全相同。例如，投资者可能会根据他们使用的分类标准或可选择的投资方案数量做出不同的决策。假设你有\
  \ 10 万美元可用于投资，并筛选出十个高关注度的加密资产，你可能会倾向于平均分配投资组合，即每个资产投入 1 万美元。然而，更合理的做法可能是将超过 50%的资金投入某一资产，其中七个资产的占比低于\
  \ 1%，其余资金分配给最后两个资产。虽然理性上不应对所有选项平均分配资金，但许多投资者为了简化操作而这样做，从而忽视了投资机会的相对规模。这一点在比特币上尤为突出，其市值几乎相当于所有其他加密资产的总和。具体来说，比特币不应被视作众多加密资产中的普通一员，而应被视为一个与其他任何加密资产截然不同的特殊案例。\n\
  \n#### 从众行为偏差\n\n从众行为指的是投资者倾向于追随他人的意见或行动，即使这些意见与自身观点不符。人们会因害怕错过机会以及媒体对资产上涨时大肆宣扬其优势、下跌时渲染其崩盘的广泛报道，而陷入从众行为（也称为*动量效应*）。因此，从众行为会强化市场周期，并可能导致市场泡沫，因为许多投资者会追随趋势，远远超出基本面所支撑的合理范围。\n\
  \n为了降低受从众行为偏差影响的可能性，投资者应进行独立分析，并坚持自己的投资策略，不受短期市场波动干扰。\n\n#### 预测过度自信偏差\n\n另一种偏差是预测过度自信。具体而言，投资者往往会高估未来价格预测的准确性。金融模型放大了这种偏差，因为它们通常会给出证券未来价格的一个精确数值（例如\
  \ 123,456.78 美元）。相比之下，考虑到未来的不确定性，假设一个宽泛的价格范围才更为合理。这种偏差也与知识幻觉相关，表明分析师通常会高估自身能力及其分析质量。\n\
  \n#### 规模偏差与 ESG 偏差\n\n另一种投资偏差源于大型投资机构的授权限制。例如，某投资机构希望将 10 亿美元资本平均分配至不超过 20 个投资项目。根据其授权，该机构可能还要求在每个项目中持股不超过\
  \ 10%，以避免获得控股权。每个入选项目将获得 5000 万美元投资，但其市值必须至少达到 5 亿美元才能被考虑。截至本文撰写时，不到 100 种加密资产能达到这一最低市值门槛。当有足够多的机构受到类似限制时，高价值加密资产将获得更多投资，而低价值资产则面临投资不足。在其他条件相同的情况下，小型项目常常被低估，仅仅因为大型投资机构不愿对其进行投资。\n\
  \n另一种基于投资机构授权的偏差与投资目标的企业责任或环境、社会和治理（ESG）实践相关。具体而言，寻找符合特定企业责任标准的投资标的的压力日益增大，这可能导致其他在财务上具有吸引力的投资资金不足。例如，大型投资者可能被授权限制，只能投资于不基于工作量证明机制的加密资产，因为有人认为此类机制对环境有净负面影响。并非基本面缺失，而是大型投资者授权中的任意限制，导致了这些标的市场价格的下行偏差。\n\
  \n#### 关键概念\n\n选择最优投资取决于多项标准。其中包括投资者的风险偏好、投资期限、流动性需求、税务状况和法律考量。没有一种投资或策略对所有人都最优。然而，某些方法对大多数投资者而言可能是值得推荐的。例如，分批次小额定投而非一次性大额投资，可以分散因入场时机不佳带来的风险。此外，所有投资者都会受到可能干扰理性投资策略的心理偏差的影响。意识到这些潜在缺陷有助于减轻其影响。\n\
  \n#### 拓展问题\n\n您如何研究加密资产行业，以最大程度提高做出无偏差投资决策的可能性？\n\n哪些税收规则会阻碍加密资产被用作交换媒介？\n\n您还可能受到哪些额外的心理偏差影响，从而损害有效投资的能力？\n\
  \n"
- '# 非金融风险管理


  > *成功的投资在于管理风险，而非规避风险。*

  >

  > ——本杰明·格雷厄姆


  为做出有效决策，负责任的投资者应透彻理解与其投资相关的金融风险与非金融风险。这两类风险各不相同，且加密资产投资的风险可能高于传统投资，这使得风险管理更为关键。本章涵盖非金融风险，第`14`章则涵盖金融风险。除描述风险外，这些章节还提供了缓解风险的工具。


  加密资产中的非金融风险较高，因为该行业仍在成熟过程中且快速变化。此外，历史数据点的时间跨度较短，无法评估该行业面临的所有风险。即便这些数据点在许多方面价值有限，因为上一个周期中的行业状况与当前周期有显著差异，导致较旧的数据参考意义不大。


  让我们从那些经常被提及但并未构成实质性威胁的风险开始。




  ### “51% 攻击”风险


  比特币白皮书的摘要为其区块链的运行设定了一个重要前提 [21]。


  > 只要大部分算力由不相互勾结攻击网络的节点控制，它们就能生成最长的链并超越攻击者。


  这个“只要”条件所指的正是通常所说的 *51% 攻击* 或 *双花攻击*。根据设计，在工作量证明（PoW）区块链中，如果大多数节点（按算力计）使用一条未包含某笔特定交易的区块链，那么这笔交易在官方记录上就从未发生过。此外，除非网络其余部分决定从主链进行硬分叉（正如
  The DAO 事件后以太坊所遭遇的情况，详见第 6 章），否则没有任何补救措施。


  从技术上讲，51% 攻击的风险是指，在 PoW 共识机制下，一个矿工群体控制了大部分哈希算力。这个群体验证欺诈区块的速度可能比诚实节点挖掘有效区块的速度更快。其结果是，这些欺诈区块可以，例如，排除一笔发送方已经获得收益的交易。发送方将能够再次花费这笔金额，这也正是这种欺诈行为得名“*双花*
  攻击”的原因。


  然而，就比特币区块链而言，发生 51% 攻击的可能性可以说是不存在的。实际上，网络的安全性与哈希率直接成正比。哈希率越高，攻击者需要聚集的算力就越多，才能在区块创建上超越诚实节点。更高的哈希率意味着更高的安全性。但是，比特币区块链的哈希率非常高，以至于某个联盟聚集全网
  51% 算力的概率几乎为零。即使所有大型科技公司将其全球算力联合起来，并协调一致专门用于攻击比特币区块链，它们仍然无法接近全球比特币哈希率的 51%。例如，“AWS、Azure
  和 Google Cloud 的总算力加起来还不到比特币算力的 1%”（截至 2022 年底）[44]。


  比特币网络的安全性比所有其他 PoW 区块链的总和高出 100 倍以上。因此，投资者可能会得出结论，虽然比特币区块链是安全的，但这种风险对于较小的 PoW 区块链仍然存在。然而，即便对于这些较小的链，发生
  51% 攻击的可能性也很低。这要归因于区块链挖矿过程固有的激励机制：任何潜在的攻击者都几乎没有动机采取欺诈行为，而根据区块链的运行方式，参与节点有强烈的动机诚实行事。所涉及的加密资产规模越大，节点诚实行动的动机就越强，网络的安全性也就越高。无论其规模大小，PoW
  区块链对潜在攻击者来说总是缺乏吸引力的：攻击链的成本高于潜在收益。这种共识机制使得作恶成为一种无效策略，这意味着即使是敌对者也遵守相同的规则，因为这样做显然符合他们的利益。


  尽管如此，过去确实发生过某种形式的 51% 攻击。例如，在 2018 年 4 月，Verge（XVG）区块链在黑客发现代码中的一个错误后遭受了 51% 攻击，该错误使他能够以比预期快得多的速度挖掘区块。然而，请注意，这次攻击的根本原因是代码错误，而非激励不当。此外，对于更成熟的加密资产，安全专家已经多次审查和测试了相应区块链的代码。事实上，任何人都可以随时进行此操作，因为这些区块链的代码是开源的，任何人都可以查看和审查。因此，大型加密资产中存在重大漏洞的问题很可能早已被发现。


  51% 攻击风险不仅极不可能发生，而且本身也并非实质性风险。一个常见的误解是，51% 攻击会让黑客将资金从任何地址发送给自己。这是不正确的。即使黑客成功获得了区块链上的绝大多数哈希算力，他仍然需要地址所有者的数字签名才能将资金转移给自己。因此，即使发生这种情况，他攻击区块链的能力仍然有限。


  黑客唯一能做的事情是撤销他自己发起的一笔交易。例如，他可以用这些币购买有形或数字商品，然后挖掘排除这笔交易的后续区块。根据区块链的记录，他仍然拥有这些资金，并且能够再次花费它们。然而，在多次发生此类交易之前，相关区块链失去完整性的情况就会变得显而易见。因此，其他用户很可能会在攻击发生前对其进行硬分叉。


  总而言之，尽管 51% 攻击在社区和理论讨论中经常被提及，但它实际上几乎是无害的，并且其发生的可能性几乎为零。




  ### 量子计算


  另一个在加密资产领域经常被提及、但实际上并不严重的风险，是量子计算技术兴起所带来的威胁。


  在过去大约 70 年里，计算能力呈指数级增长，同时计算机的尺寸却在不断缩小。这一过程是由计算机芯片中晶体管尺寸的持续减小所驱动的。晶体管本质上是使比特位从 0
  变为 1（或相反）的门电路。然而，我们现在正接近这一缩减过程的物理极限，因为晶体管的尺寸（约 5 纳米）已接近几个原子的大小。相比之下，一个红血球细胞的大小约是当今典型晶体管的
  1000 倍。


  由于晶体管尺寸达到纳米级别，粒子可能通过量子隧穿效应穿过被阻断的栅极。具体来说，由于与粒子相关的概率波可以延伸到势垒之外，因此粒子出现在势垒另一侧的概率不为零。一个理论上被阻断的栅极（比特位设为
  0）将无法有效阻断（它会表现得像 1）。不幸的是，这种可能性限制了传统计算机的能力。为了规避这个问题，科学家们正在致力于研发量子计算机。


  在量子计算中，最小的信息单位（比特）不再只能取 0 或 1 的值，而是可以在两者之间的任意状态。一个量子比特处于 0 或 1 的叠加态，其概率会随时间变化。然而，当被测量时，量子比特会坍缩为
  0 或 1，与传统计算机一样。量子计算机的一个结果是，产生类似输出所需的比特数更少，从而使其计算效率比传统计算机呈指数级提升。


  尤其对于大规模信息集，量子计算机只需少得多的计算能力和时间就能达到类似的输出。例如，谷歌声称其 `Sycamore` 处理器（构建量子计算机的尝试）只需约 200
  秒就能完成一项特定任务，而经典超级计算机完成同样的任务则需要约 10,000 年[45]。这一特性的一个关键应用领域是 IT 安全。推而广之，量子计算机对大多数加密资产中传统的密码学安全构成了挑战。


  特别是，虽然目前根据一个公钥地址来猜测其对应的私钥是不切实际、或者近乎不可能的，但量子计算机至少理论上可能使其成为可能。量子计算机可以使用暴力破解方法来猜测大量可能的私钥，直至找到能解锁区块链上加密资产移动权的那个。


  尽管如此，这仍然不是一件轻而易举的事。以比特币网络为例，从公钥地址获取私钥尤其困难，因为它使用了多种密码学算法。提醒一下，公钥地址是公钥的函数，而公钥又是私钥的函数。图
  11-1 对此进行了说明。具体来说，椭圆曲线数字签名算法 (`ECDSA`) 根据比特币网络上的任何私钥定义出一个公钥。接下来，两种哈希算法 `SHA-256`
  和 `RIPEMD160` 根据公钥定义出一个公钥地址。`ECDSA` 可能是量子计算机最先破解的算法，而后续的算法则需要更先进的技术。量子计算机或许能够通过从公钥识别出私钥来破解系统，因为唯一需要破解的密码学算法就是
  `ECDSA`。


  然而，针对量子计算机为特定公钥地址逆向破解 `ECDSA` 的风险，用户可以轻松地保护自己。当用户对一笔交易进行数字签名时，公钥就会被公开。一个风险意识极强的用户（例如大型加密货币交易所或机构基金的主账户）可以使用一个账户将所有资金转移到一个新的地址。由于新地址从未公开过其公钥，即使在理论上存在能够破解
  `ECDSA` 的量子计算机，其对应的私钥也仍然是安全的。


  另一种抵御这一风险的解决方案是使用分层确定性 (`HD`) 钱包。^(⁹⁷) `HD` 钱包会基于一个种子短语为每笔交易生成一个新的公私钥对。使用 `HD` 钱包可以使用户在同一条区块链上拥有多个身份标识。如前所述，即使量子计算机成功破解了算法，用户的资产也仍然是安全的。


  此外，这一风险短期内不会成为现实。这种情景最快也要几十年后才会出现。而且，即使量子计算机最终变得可行，它们也不会立刻广泛普及。相反，会有一个过渡期。在此期间，加密资产社区无疑会努力将密码学算法升级为抗量子算法。例如，抗量子能力已被确定为以太坊现有发展路线图中的一个步骤。因此，由于量子计算机无法破解新的密码学算法，整个这一风险将变得无关紧要。


  尽管如此，网络中仍然存在一个较小的相关风险。当将密码学算法更换为抗量子算法时，所有活跃的钱包都会更新到新的标准，这意味着签名交易的方法会有所不同，密钥对也可能改变。任何活跃用户都会下载新代码并继续正常操作，从此免受量子风险威胁。然而，所有丢失了私钥的钱包都不会更新到新算法。因此，如果量子计算机破解了保护私钥的密码学算法，那些未更新的钱包就可能被黑客攻击。其后果是，丢失的币会突然变得可以被找回。不过，这种后果并非灾难性的：它仅仅意味着该加密资产的有效供应量会增加与找回币数量相等的部分。没有任何活跃的钱包会受到损害。


  总之，来自量子计算机兴起的风险不太可能发生，距离还很遥远，并且很容易被缓解。




  ### 政府风险


  针对加密资产的一种常见批评是，政府决不会允许其货币的替代品发展得过于庞大。事实上，像 `Bitcoin` 这样已建立的、全球性的独立货币，将剥夺政府对货币的垄断权。它们对资金流动的控制将逐渐消失，它们禁止特定交易发生的能力也将随之消亡。这将意味着政府货币霸权的终结。


  对政府而言更糟的是，公民可能会意识到，例如 `Bitcoin` 提供了一种更优越的货币形式（如第 1 章所述），因为它是一种可证明稀缺的资产，最终将使他们能够长期维持购买力。他们会注意到，法定货币中缺失了许多理想的货币特性。一旦这一点变得显而易见，公民就会将储蓄从本国的法定货币转向
  `Bitcoin`，从而导致本国法定货币价值下跌。政府很可能想要避免这种情况，并尽其所能阻止其发生。例如，他们可以禁止用 `Bitcoin` 进行交易，甚至禁止持有
  `Bitcoin`。


  然而，这样的禁令至少有三个原因是不现实的。首先，它忽视了由此产生的激励效应。禁止 `Bitcoin` 反而会强化 `Bitcoin` 的价值主张。一项 `Bitcoin`
  禁令将使政府对货币的滥权垄断更加明显。这会比以往任何时候都更加凸显人们需要寻找政府发行货币的替代品。


  其次，这种禁令在实践中并不可行。从技术角度来看，`Bitcoin` 很简单：它是一个网络，每十分钟向网络其他部分广播少量数据（通常为 1 MB 到 2 MB）。只要有两台电脑相连，互联网就能存活，`Bitcoin`
  区块链的传播就能继续。当看到政府在执行另一项禁令（禁毒战争）时如此低效，很难想象他们能实际执行这样的禁令。毒品从生产到最终消费者的过程涉及极端复杂的流程，远比
  `Bitcoin` 挖矿复杂得多。它们始于巨额的前期投资、专门的种植、复杂的国际供应链，甚至还包括一些营销活动来让终端消费者知晓其可获取性。阻碍这一过程中的任何一个环节都会减少毒品的可得性。然而，任何人都能轻易在世界任何主要城市获得毒品。既然政府从未能在任何地方阻止毒品到达消费者手中，那么想象他们能在阻止
  `Bitcoin` 传播方面取得成功，实属妄想。


  现实世界中重大的 `Bitcoin` 禁令案例已经在中国发生。早在 2013 年 12 月，中国人民银行和多家中国金融监管机构就联合发布声明，阻止当地商业银行处理与
  `Bitcoin` 相关的交易。在本次禁令收效甚微之后，该国内进一步出台了更多禁令：2017 年的 ICO 禁令和 2019 年的 `Bitcoin` 挖矿禁令。中国政府在
  2020 年强化了这些禁令的立场，并在 2021 年再次更坚定地重申。这最后一次重申发生时，全球 `Bitcoin` 算力的三分之二来自中国。


  此外，中国将所有加密资产交易列为非法，并为国际加密货币交易所工作的行为都可能被起诉。作为这次最新禁令的结果，中国的 `Bitcoin` 挖矿活动暂停了几个月，导致全球哈希率下降了
  50%。哈希率降低后，对于剩余的矿工来说，挖 `Bitcoin` 突然变得利润丰厚得多。因此，许多中国矿工搬到了其他国家，更多矿工则在其他地方加入了这场竞赛。仅仅几个月后，`Bitcoin`
  的哈希率就恢复到了历史新高。中国 2021 年禁令实施一年后，中国的哈希算力发电量又回到了全球第二的位置，约占全球哈希率的 20%。换句话说，尽管中国当局竭尽全力，仍然未能阻止中国公民和公司挖矿和持有
  `Bitcoin`。这个例子证明了 `Bitcoin` 禁令在实践中并不可行。


  因此，政府风险不太可能扼杀 `Bitcoin` 或加密资产。它最多只能延缓采用，但无法阻止。`中本聪` 早在 `Bitcoin` 推出之前，就在密码学邮件列表的原始论坛上讨论过这个问题。在
  `Bitcoin` 白皮书发布的第一周，他就基于点对点逻辑 [20, p. 44] 反驳了这种风险。


  > *政府善于斩断像 Napster 这样的中央控制网络的头部，但像 Gnutella 和 Tor 这样的纯 P2P 网络却似乎能站稳脚跟。*


  最后，禁止 `Bitcoin` 也不符合政府的利益，因为这样做将是一个国家战略安全错误。美国空军少校杰森·洛厄里在他的麻省理工学院论文《Softwar》（2023
  年）中，清晰地阐述了囤积 `Bitcoin` 储备至关重要的国家战略利益，并鼓励采用 `Bitcoin` [46]。正如军队通过陆军、海军、空军和太空力量维护自由一样，政府有必要在网络空间积累足够的力量，以防止潜在敌人施加物理成本或强加任何形式的限制。`Bitcoin`
  已成为（迄今为止）存储和交换数字信息最安全的方式。通过其全球领先的开源 PoW 协议，它对任何试图篡改这些信息的攻击者施加了极高的成本（通过必需的电力消耗）。


  它这样做无需诉诸于相互确保摧毁的核威胁。保持拥有和控制有价值数字信息的能力，应是任何希望管辖范围内人民享有自由的政府的首要议程。从这个意义上说，`Bitcoin`
  超越了其最初的货币角色，并包含了作为国家安全工具的功能，以维护个人、公司和机构使用有价值数字信息的自由及其完整性。


  因此，与 51% 攻击和量子计算风险一样，政府禁止加密资产的风险经常在媒体和在线社区中被提及，但经过进一步分析，其影响微不足道。




  ### 开发者风险


  相比之下，某些风险在加密资产社区中鲜少被讨论，却正是最薄弱的环节。例如，开发者风险可能既具有极大危害性，又具有相当高的发生可能性。


  区块链协议的代码通常并非一成不变。对于所有主流区块链而言，开发者会维护并升级代码以改进区块链。虽然这种持续改进能够解决现有弱点，但同时也构成了显著风险。若新升级存在漏洞，可能被恶意第三方甚至开发者自身利用，从而损害所有生态参与者的利益。


  因此，评估加密资产需要理解代码开发与升级的具体流程。例如，最佳实践建议使用测试网，在区块链主网实施升级前先运行其测试版本。同时建议采用透明易懂的代码（如精准且详尽的注释），并由众多独立开发者与安全专家进行审查。这种透明度和审查机制能够最大限度降低代码中存在漏洞及故意植入后门的可能性。使用标准、知名且开源的加密库也有助于控制此类风险。


  代码关键区域（如加密机制）的漏洞可能意味着该加密资产的终结。若漏洞可被利用，加密系统将被破解，黑客便能从公钥中获取私钥。黑客将获得所有对应资金的控制权，而区块链将丧失其完整性。诚然，在发现漏洞后，社区可协商在攻击发生前进行硬分叉，修正弱点并继续运行。尽管如此，部分用户仍可能在此过程中蒙受资金损失，且该资产的信誉将因其过往失败而永远蒙上污点。


  此外，审慎的投资者应查明特定加密资产区块链开发的融资方式。若资金薄弱，开发者更易受到外部利益相关方的压力（贿赂或勒索），从而导致相关加密资产的风险增加。降低此风险的一种可行措施是确保开发团队由具有良好道德操守记录的可信人员组成。另一项措施是实施稳健的内部控制，以预防并发现潜在的贿赂或勒索企图，包括对团队活动进行定期审计与审查，以及建立报告和处理潜在问题的政策与程序。总体而言，虽然无法完全消除开发者遭受贿赂或勒索的风险，但采取这些措施有助于降低此类威胁的可能性，并维护加密资产的完整性。


  ### 社区分歧风险


  另一个常被忽视的风险是社区内部可能产生分歧，导致对某种加密资产的支持出现分裂。一个具有重要历史意义的冲突最能说明此风险。


  从 2015 年年中到 2017 年底，围绕比特币区块链区块大小的问题爆发了激烈争论。两大对立阵营——“小区块派”与“大区块派”——就比特币协议是否应提高其 1MB
  区块大小限制展开了辩论。小区块派主张维持现状，其理由主要围绕比特币协议根本性改变可能引发的滑坡效应。若像区块大小这样的重要特性可以在未获得社区压倒性共识的情况下随意更改，那么比特币中将没有任何永久性的东西。例如，2100
  万枚比特币的硬上限也可能发生变化。


  另一方面，大区块派希望立即解决比特币的可扩展性问题。尽管许多人同意长期来看这可能带来破坏性后果，但大区块派认为短期收益足以证明冒险是值得的。例如，增加比特币的区块大小可使每个区块容纳更多交易，从而维持低手续费。每个区块更多交易反过来将使数十亿无银行账户人口无需进一步技术发展即可（通过比特币）获得基本银行服务。


  虽然如今听来已是陈年旧事，但这场冲突异常激烈，对整个行业具有特别深远的意义。乔纳森·比尔在其著作《区块大小战争》[46]中精彩记述了这场冲突。在此期间，我们今天所熟知的比特币曾一度濒临消亡。其主要威胁并非敌对攻击者或试图禁止该技术的政府，而是来自那些对这项新技术愿景存在分歧的善意比特币爱好者。加密领域备受尊敬的核心人物（如加文·安德烈森和麦克·赫恩）成为改变比特币协议的强烈倡导者。他们甚至威胁通过向矿工施压而非达成广泛共识来实施变更。实际上，这将永久侵蚀比特币的去中心化精神及其不可篡改的特性。若任何私人团体能在未获广泛社区同意的情况下实质性地影响比特币协议的演变，比特币将丧失其核心价值主张——去中心化。


  尽管比特币在其本质屡遭攻击后勉强存活下来，但这场冲突却使其变得更加强大。《区块大小战争》凸显了当时社区尚未就比特币的意义达成共识。开发者和矿工意见分裂，个体参与者相对于网络规模拥有过大影响力。2017
  年后，此类威胁发生的可能性大幅降低。如果比特币能挺过这次危机，它很可能将经受住任何加密寒冬的考验。如今，社区对比特币的定位已更加清晰。同时，网络中矿工数量已大幅增加，胁迫任何特定群体几乎不可能再聚集网络多数算力。当然，关于比特币改进提案的健康争论将始终存在，但再不会有任何争议能像这次一样威胁比特币的存亡。


  然而，对于其他加密资产而言，社区内部的分歧是需要考虑的风险。利益相关方众多，包括开发者、矿工、商户、用户、监管机构等，各自拥有不同目标与激励。任何对加密资产演变方式不满的利益相关方都可能试图影响其未来，或许会以投资者利益为代价。因此，内部风险（可能比外部风险更甚）应始终处于任何审慎投资者的雷达范围内。有助于降低社区分歧风险的一个因素是加密资产的治理结构。具有清晰透明治理机制（如投票或决策流程）的资产能更好地管理社区分歧并避免潜在冲突。此外，加密资产的去中心化程度也会影响社区分歧的风险。高度去中心化的资产可能对社区分歧更具抵抗力，因为没有单个权威或小团体能够在缺乏共识的情况下单方面做出决策。




  ### 挖矿中心化风险


  如果过多的算力集中在少数矿工或矿池手中，去中心化的概念可能会消失。由于去中心化是加密资产的核心价值主张，这一风险将威胁其意义和根本价值。在 2017 年的一篇
  Medium 文章中，Vitalik Buterin 解释了去中心化的含义以及不同类型的去中心化[47]。具体而言，我们在此指的是“政治（去）中心化”（用他的话说），即有多少个人或团体控制着构成网络的计算机。


  就比特币而言，直到 2021 年中旬，中国一直构成一种存亡攸关的挖矿中心化风险。由于三分之二的矿工位于同一国家，出现卡特尔的可能性正在增加。例如，这可能意味着大多数矿工推动网络代码的特定升级，以有利于特定群体。尽管如此，中国
  2021 年的比特币禁令通过劝阻许多中国矿工，并间接激励世界其他地方的矿工加入网络，有效地缓解了这一风险。此外，2021 年夏天的中国禁令也展示了比特币安全性的韧性。即使大多数矿工突然退出网络，其影响也仅仅是图表上的一个小波动，哈希率很快恢复到了历史新高。因此，比特币的挖矿中心化风险非常低。


  相比之下，对于采用工作量证明（PoW）共识机制的山寨币，尤其是那些不具备抗 ASIC 特性的币种，挖矿中心化风险仍然是一个潜在威胁。具体来说，大型比特币矿工可能选择从比特币挖矿转向山寨币挖矿，从而在该山寨币的总哈希率中占据显著份额。


  ### 所有权集中风险


  不仅仅是矿工的集中是潜在风险，资金的集中同样如此。首先，对于基于权益证明（PoS）的加密资产，所有权意味着通过被选为验证者的可能性来影响协议输出。在标准的权益证明（PoS）设置中，一个人拥有的币越多，被选为下一个区块验证者的可能性就越高。这种系统可能导致少数人对网络拥有不成比例的影响力。这种情况可能带来网络风险，例如富有的用户可能串通操纵区块验证的结果。单个用户也可能伪造身份（称为*女巫攻击*）以获得对网络的不成比例的影响力，这被称为*女巫攻击*。因此，PoS
  加密资产是否提供了去中心化的激励是值得怀疑的。然而，原始 PoS 的变体旨在解决这一风险。例如，自动惩罚（slashing）机制是对试图串通或操纵网络的用户的惩罚。此类用户的资金将被罚没或永久冻结。


  然而，所有可交易的加密资产（无论是否基于 PoS）都间接面临所有权集中的风险，因为富有的持有者可能突然出售其持有的大部分或全部资产。在这种情况下，问题在于流动性风险：市场无法在不给价格带来大幅下行压力的情况下，迅速吸收如此大规模的抛售。审慎的投资者应分析任何加密资产的所有权集中程度以及相应资产的流动性。高集中度和低流动性是危险信号，表明价格突然下跌的风险较高。例如，狗狗币、ZCash
  和以太坊经典都存在高风险，它们各自表明，不到 100 个参与者控制着其相应生态系统中超过一半的财富（截至 2021 年）[48]。


  基尼系数和中本聪指数可以衡量财富不平等或所有权集中风险。基尼系数衡量人口中财富的分布情况，其值在 0 到 1 之间。基尼系数为 0 表示所有个体之间的分配完全平等，而系数为
  1 表示单个个体拥有所有现有财富。例如，爱尔兰的系数为 0.67^(⁹⁸)。相比之下，以太坊的系数为 0.64，而比特币的系数（自 2010 年以来持续下降趋势）在
  2021 年低于 0.50，这表明财富集中度较低。相比之下，狗狗币的系数高于 0.80，并且自 2015 年以来一直呈上升趋势[48]。


  中本聪指数衡量需要多少个个体（对于加密资产来说是“地址”）才能达到该资产现有供应量的 51%。对于全球范围内的法定货币而言，该指数为 388，这意味着地球上最富有的
  388 人拥有的财富超过了世界其他人口的总和。截至 2020 年，比特币的这一数值为 4,652，并且随着时间的推移呈财富更平等分配的趋势。这些数据表明，比特币的分配比传统法定货币要平等得多。相比之下，狗狗币高度集中，仅有
  7 个地址拥有 44%的所有币，并且集中趋势还在加剧。以太坊介于两者之间，前 100 个地址拥有以太币总财富的 35%[48]。审慎的投资者应系统地分析加密资产中的财富集中度，并对更集中的资产赋予更高的投资风险。


  ### 监管风险


  作为一种新兴且快速发展的资产类别，加密资产面临着高度的监管不确定性。这种不确定性带来了加密资产环境可能发生变化的风险，这可能影响其价值或可行性。例如，监管可能会限制加密资产按预期运行的能力。隐私功能或某些类型的交易可能会在某些司法管辖区被禁止，这可能会使一些加密资产在这些地方失去意义。在更极端的情况下，监管可能迫使交易所关闭，这意味着许多资产可能会以历史低位价格被清算。


  一个具体的例子是，《数字商品消费者保护法》（DCCPA）法案在 2022 年第四季度在美国引发了激烈的辩论。如果该法案通过，它将事实上禁止去中心化金融，从而扼杀一个新兴且有前景的行业。该法案要求的合规和报告要求，在技术上既无法由去中心化平台满足，在这种背景下也毫无意义。例如，它要求任命一名首席合规官，对于开源且可被任何人实时审计的自动执行智能合约来说，这是一个值得商榷的要求。此外，它还要求去中心化交易所（DEX）向
  CFTC 注册，从而挑战了其无许可特性。后来人们才清楚，FTX 首席执行官 Sam Bankman-Fried 在其欺诈帝国历史性崩溃之前，曾大力游说该法案，因为它会使
  FTX 广泛受益。


  然而，并非所有加密资产都面临相同类型的监管不确定性。例如，虽然比特币的会计处理方式已基本达成共识（被视为商品或数字财产），但其他加密资产面临的不确定性要大得多（尤其是它们可能被定性为证券）。例如，是否所有基于
  PoS 的加密资产都应被视为证券，并与比特币区别对待，这仍未得到广泛认同。无论如何，审慎的投资者应持续关注监管变化，并考虑其对投资的潜在影响。




  ### 平台风险


  许多加密资产投资者将资金存放在中心化或去中心化平台上。然而，历史表明这两种选择都不安全。著名的例子包括`Mt. Gox`（中心化）和`DAO`（去中心化）的崩溃。


  在加密早期，`Mt. Gox`是最大的加密货币交易所。这家总部位于东京的平台于 2010 年开始运营，鼎盛时期成长为超过 70%比特币交易的中介机构。然而，比特币价值的快速飙升使`Mt.
  Gox`成为黑客越来越关注的焦点。2014 年，一次成功的黑客攻击窃取了 84 万枚比特币（当时价值 4.6 亿美元，截至 2023 年 5 月价值 230 亿美元），导致该交易所申请破产[49]。几年后，类似的故事发生在去中心化的`The
  DAO`上，详见第 6 章。


  不幸的是，这些臭名昭著的事件并非孤立事件。过去还有其他几起安全漏洞导致投资者损失加密资产。黑客攻击不仅可能威胁平台的稳定性和可靠性，还可能影响其声誉。虽然这些事件的发生频率可能与加密资产领域尚不成熟有关，但截至
  2023 年，仍应将平台风险视为一种相当可能且重大的风险。


  为降低此风险，投资者应彻底研究所使用的平台，并在多个平台之间进行分散。例如，勤勉的投资者会审查平台的规模（交易量）、被黑客攻击的历史、独立审计的频率以及声誉。此外，可以考虑将资金分散到多个平台，或完全跳过中介机构。有关可供投资者使用的投资工具和选项的信息，请参见第
  11 章。


  ### 托管风险


  如果你口袋里有 100 美元钞票，你可能会丢失它或被人偷走。对于私钥，你面临同样的两种风险。丢失私钥意味着相应钱包中的资金将永久无法访问。去中心化网络上没有任何中央机构可以恢复你的资金或取消交易。因此，如果你决定不使用中心化交易所或托管服务来代为管理密钥，丢失密钥可能是最可能且最重大的风险（投资完全损失）。为降低此风险，强烈建议使用备份或恢复机制。


  此外，私钥也可能因被盗而丢失。特别是，黑客可能会试图诱骗你提供私钥。虽然最具吸引力的目标通常是拥有大量资金的大型用户或交易所，但普通投资者也无法完全免受此类风险。一些黑客通过使用恶意软件来实施攻击。他们包含诸如键盘记录器之类的恶意软件，能从你的计算机中窃取私钥并将其发送给攻击者。其他类型的恶意软件作用于受害者计算机的剪贴板：当用户复制钱包地址以在网站上输入时，该恶意软件会将此地址替换为另一个地址。受害者随后复制了错误的地址，将资金发送到欺诈性的公共地址。


  为降低此风险，用户应拥有干净、最新的操作系统和最先进的防病毒软件。此外，应仅从可信来源下载文件，并建议定期进行清理。


  总体而言，投资者应权衡托管风险与平台风险，并选择最合适的策略。例如，对大多数投资者来说，分散资金使其不全都面临同类型风险，可能是一种可取策略。


  ### 预言机风险


  黑客也可以间接攻击投资者。例如，他们可以操纵流入智能合约的预言机输出。这种风险在 DeFi 和预测市场中尤为重要。


  例如，设想一个包含基于体育赛事结果（由预言机提供信息）而进行条件支付的智能合约，攻击者可以操纵数据源。智能合约的安全性直接取决于底层预言机的安全性。即使预言机在技术上可靠，也应考虑通过贿赂或敲诈进行腐败的风险。


  降低此风险的一种方法是在合约中使用多个数据源。或者，可以基于声誉机制或激励方案来选择预言机，以促使它们持续提供准确可靠的数据。


  ### DDoS 攻击


  分布式拒绝服务（DDoS）攻击是一种网络攻击，通过向网络注入大量流量来阻止其正常运行，从而破坏网络运营。对于依赖部分中心化网络来运行（例如处理交易）的加密资产而言，DDoS
  攻击的风险是相关的。


  DDoS 攻击风险较低的加密资产使用强大且具有弹性的网络基础设施。例如，它们可以包括负载均衡和流量过滤，以将流量分配到多台服务器上，防止单个服务器不堪重负。有效去中心化的网络架构可缓解此风险，因为网络操作分散在许多计算机上。其具有多重冗余的设计使得攻击者更难瞄准并压垮网络的特定部分。因此，处理信息流的节点去中心化程度低会增加加密资产的风险。




  ### 诈骗与市场操纵


  由于加密资产行业仍相对新兴，且在过去十年中以其超常回报率闻名，不法团体可能试图通过欺骗手段利用贪婪的投资者。一种传统的诈骗形式是庞氏骗局，即向投资者承诺高回报率，但实际是用新投资者的资金支付回报。这类骗局在增长阶段可能难以被发现，但当足够多的投资者撤回资金并发现资产不足以支撑承诺时，就会最终崩盘。此外还存在无数其他诈骗手段，从主动提供的投资建议到对不存在的项目进行虚假营销。


  市场操纵通常通过拉高出货计划实施：一个富裕团体大力推广某种特定加密资产，甚至大量购入以拉高价格。随后，随着投机者加入这股狂热，价格持续上涨，直到该富团清空所有持仓，赚取巨额利润，而大多数其他投资者则蒙受损失，被拉高的代币也变得一文不值。


  当然，这些行为是违法的，但它们仍然存在于加密资产行业中。2022 年最后几个月 FTX 帝国的崩塌便是一个很好的例证。FTX 不仅通过庞氏骗局和市场操纵进行欺诈，还涉及会计欺诈、股权欺诈以及多种其他非法行为。结果，这个帝国从年初
  320 亿美元的估值在 11 月走向破产，并连带拖垮了无数其他公司。


  虽然这一最大加密资产交易所之一的倒闭打击了行业声誉，并使无数投资者血本无归，但这场灾难或许也有一线希望。在随后的几个月里，数量空前的中心化交易所投资者拥抱了加密资产的去中心化精神，将资金转向自我托管。事实上，FTX
  的崩塌并非加密资产行业本身的问题，而是中心化的问题；讽刺的是，这恰恰是加密资产正在解决的问题。此外，所有其他交易所都受到了更加严格的审查，要求提供储备证明，并需遵守更高的监管和透明度标准。


  尽管有了这些进展，FTX 无疑不会是冲击金融和加密资产行业的最后一场骗局。因此，研究公司、平台和协议至关重要，同时也要分散资金以尽可能分散风险。


  ## 去中心化保险


  将上述几种风险最小化的一种方法是购买中心化或去中心化保险。虽然中心化保险并非新鲜事物，但去中心化模式为交易的另一方提供了不同的激励机制。去中心化保险，即`基于区块链的保险`，可以是以智能合约形式存在：一旦保险事件发生，合约条款即被触发。或者，去中心化保险平台可以通过智能合约汇集资金，然后让向资金池贡献的用户对索赔进行投票。例如，保险可以覆盖交易所被黑客攻击，或编码不佳的智能合约中被利用的漏洞。去中心化保险平台包括
  Etherisc 和 Nexus Mutual。


  #### 关键概念


  审慎的投资者应了解与加密资产相关的风险。截至 2023 年，市场通常错误识别并误解了其中许多风险。例如，加密资产文章中常提及 51%攻击风险或双重支付风险，但实际上这些风险几乎不存在且无害。量子计算机出现所隐含的风险也是如此。同样，加密资产怀疑论者提出的一个论点是，政府不会允许加密资产超越其法定货币；然而，正面打击加密资产并不符合政府利益，而且他们甚至可能不具备阻止此类资产传播的技术能力。因此，这一风险也不像某些文献所暗示的那样关键。相比之下，其他风险虽讨论不多，但发生可能性更高，且可能对投资者造成更大伤害；例如，开发者失误或蓄意破坏的风险。


  尽管如此，大多数风险可以被缓解甚至完全通过保险覆盖。审慎投资者的第一步是承认这些风险，然后对其进行适当管理。在适当情况下，评估加密资产价值时也应考虑这些风险。


  #### 拓展问题


  你自己的投资面临哪些风险？


  你可以采取哪些措施来缓解这些风险？


