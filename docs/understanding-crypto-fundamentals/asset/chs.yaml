  \ | ADA | 5.7% | 120 天 |\n\n## 加密货币借贷\n\n质押之外的一种被动收入替代方案是加密货币借贷。在加密货币借贷中，贷方通常将法定货币（例如美元或欧元）或稳定币（例如\
  \ `Dai` 或 `USDC`）借给当前持有加密资产的借款人。这样，加密资产就成为了贷款的抵押品。\n\n通常，加密货币贷款是超额抵押的。例如，Alice 借给\
  \ Bob 5,000 `USDC`，而 Bob 目前持有五个以太币，每个价值 2,000 美元，Bob 将这五个以太币用作抵押。如果 Bob 在贷款到期时未能偿还借入的\
  \ `USDC`，Alice 有权出售这些以太币，直到她的贷款和利息得到偿还。在这种情况下，贷款是超额抵押的，因为抵押品的市场价值是贷款价值的两倍多。^(⁷⁷)\n\
  \n抵押降低了 Alice 的信用风险：只有当 Bob 未能偿还贷款，并且抵押品的价值跌至低于应还款额时，她才会蒙受损失。在这个例子中，需要以太币价值至少下跌\
  \ 50%，贷款才无法全额偿还。由于 Alice 的贷款风险低于没有抵押品的情况，她不需要向 Bob 要求特别高的利率。这意味着 Bob 可以通过提供抵押品来享受较低的利率。他可以用借来的钱购买更多他已经持有的加密资产，或者购买另一种加密资产。只要加密资产的增值速度高于贷款利率，Bob\
  \ 就能从这种金融安排中受益。\n\n由于加密货币借贷的存在，加密资产持有者可以通过借出他们的加密资产并获得正利率来获益。例如，与其让比特币闲置在加密平台上，不如通过借出它们来产生被动收入。\n\
  \n众多中心化和去中心化的加密平台以（相较于传统金融）有吸引力的利率提供加密货币借贷。此外，它们还提供近乎即时的贷款发放和结算。这些平台在匹配储蓄者和借款人方面发挥着关键作用，从而为这些贷款创造了市场。它们在利率、抵押品金额和最低存款要求方面各不相同。利率范围通常从不到一个百分点到两位数的回报率，如表\
  \ 8-4 所示。\n\n表 8-4\n\n截至 2023 年 1 月，币安提供的借贷年化收益率（APY）奖励（来源：币安 App）\n\n| 提供商 | 加密资产\
  \ | 代码 | 年化收益率 (APY) | 锁仓期限 |\n| --- | --- | --- | --- | --- |\n| 币安储蓄 | Axie Infinity\
  \ | AXS | 12.0% | 灵活 |\n| 币安储蓄 | 比特币 | BTC | 1.5% | 灵活 |\n| 币安储蓄 | USD Tether |\
  \ USDT | 5.5% | 灵活 |\n| 币安储蓄 | Chainlink | LINK | 0.2% | 灵活 |\n\n\n\n## 流动性挖矿\n\n\
  流动性挖矿是加密资产持有者获得被动收入的另一种方式，但它比质押或借贷更为复杂。从根本上来说，它是对流动性提供者所提供服务的奖励（即为市场提供流动性）。\n\n\
  奖励流动性的逻辑如下。一个平台（中心化或去中心化）旨在为众多加密资产交易对提供高流动性。对于一个交易对（例如 Solana 和 Axie Infinity），可能买家和卖家都很少，从而形成一个“非流动性市场”。在非流动性市场中，用一种资产购买另一种资产可能会实质性地改变市场价格，因为买卖双方都很少。这种情况通常发生在市场面临大额订单而缺乏足够交易量来吸收它们时。流动性市场对平台非常有价值，因为这样的市场能提供稳定的价格和有竞争力的佣金费用。这种价值会转化为对流动性提供者的奖励，通常表现为一种灵活的利息。\n\
  \n具体来说，流动性提供者通过存入一种资产（加密资产、法定货币或稳定币）进入包含两种资产的流动性池。在这样的池子中，两种目标资产根据各自可用数量的多少，在池中占据一个相对比例。提供者贡献一种资产（或两种资产）作为池子的流动性，并获得池子的份额，作为对这两种资产的索取权。该索取权的内容取决于提供者加入池子后，两种资产相对比例如何变化。\n\
  \n![](img/600732_1_En_8_Fig5_HTML.png)\n\n流动性挖矿示意图。一位流动性提供者向流动性池中存入 4 个 BTC，该池共有\
  \ 1,000 BTC 和 10,000 ETH，总份额为 100,000，提供者获得 200 份池份额。\n\n**图 8-5** BTC-ETH 流动性池示例，相对价格为\
  \ 10 ETH/BTC，一位流动性提供者通过贡献与池总价值成比例的相应数量 BTC，获得池中 0.2% 的份额\n\n交易者使用池子的自动做市商（AMM）用一种资产兑换另一种资产，并为此服务支付费用。流动性提供者的奖励取决于交易者在相应池子中兑换的交易量。兑换的交易量越高，总费用就越高，流动性提供者的回报也越高。截至\
  \ 2023 年 5 月，去中心化交易所 Uniswap 收取兑换金额 0.3% 的费用，而中心化交易所 Binance 则收取 0.15% 的标准费用（并提供\
  \ 50% 的费用返还，以 Binance 的原生币 BNB 支付）。\n\n![](img/600732_1_En_8_Fig6_HTML.png)\n\n\
  流动性挖矿示意图。一位流动性提供者向流动性池中存入 5 BTC + 50 ETH，获得 500 份池份额。一位交易者向流动性池中存入 1 BTC + 0.3%\
  \ 的费用，获得 10 ETH。\n\n**图 8-6** BTC-ETH 流动性池示例，相对价格为 10 ETH/BTC，一位流动性提供者获得池中 0.5%\
  \ 的份额，一位交易者支付 0.3% 的交易费用，用 1 BTC 兑换了 10 ETH\n\n流动性提供者最终获得的收益可能因交易对的不同而差异巨大，如下方表\
  \ 8-5 所示。\n\n**表 8-5** Binance 提供的流动性挖矿交易对示例，截至 2023 年 1 月的流动性和总收益水平差异巨大（来源：Binance\
  \ App）\n\n| 提供者 | 交易对 | 流动性 | 总收益 |\n| --- | --- | --- | --- |\n| Binance | USDT/DAI\
  \ | 1,548,984 USDT + 2,802,152 DAI | 1.16% |\n| Binance | BTC/ETH | 1,203 BTC +\
  \ 17,398 ETH | 1.38% |\n| Binance | AAVE/BTC | 5,925 AAVE + 22 BTC | 3.03% |\n|\
  \ Binance | ADA/BUSD | 1,610,694 ADA + 623,816 BUSD | 5.10% |\n| Binance | AXS/BNB\
  \ | 19,761 AXS + 756 BNB | 6.31% |\n| Binance | GALA/BNB | 8,019,080 GALA + 1,509\
  \ BNB | 16.11% |\n\n在使用流动性挖矿之前需要理解的一个概念是*无常损失*。池中每种资产的相对数量决定了流动性提供者份额的价值。当交易对中的一种资产有大量进出流动性池时，池中资产的份额会发生变化。因此，流动性提供者的投资价值可能低于仅仅持有这些资产时的价值。由于这种变化，投资会面临未实现损失（与单纯持有资产相比）。这种未实现损失被称为无常损失。然而，只有当池中资产的相对价值发生剧烈变化时，无常损失才会变得显著^(⁷⁸)。此外，提供流动性带来的回报通常足以弥补无常损失。\n\
  \n### 收益耕作\n\n收益耕作涉及通过锁定加密资产来获取尽可能高的被动收入。被动收入通常来源于底层的质押、借贷或流动性挖矿。\n\n一些平台，如 Aave、Compound\
  \ 或 yearn.finance，通过在不同 DeFi 服务之间转移资金来自动化此过程，以获取尽可能高的资本回报。在 2020 年初，看到收益耕作中三位数（有时甚至是四位数）的回报率并不罕见，这证明了其极高的风险水平。如此高的收益只有通过大量的杠杆投资和高风险项目才能实现。在\
  \ 2022 年的熊市中，随着流程变得更加成熟和风险降低，收益率更为温和，通常为个位数到较低的两位数回报率。\n\n### 空投\n\n在加密资产语境下，空投是一种用于新型加密资产获得普及度和增加使用量的营销策略。可以将空投视为相当于零售店提供免费样品的一种加密方式。尽管存在多种形式，空投通常包括用户免费获得少量新型加密资产，或通过完成一些小任务来获得^(⁷⁹)。这些任务可能是转发加密资产发行公司的帖子、加入加密项目的新闻通讯、在社交媒体上关注加密资产页面，或回答关于该加密资产如何运作的基本问题，从而证明用户花时间理解了其目的。有时，任务包括使用该加密资产：例如，至少持有一定数量的该资产，或使用发行公司提供的某项服务。空投对于通过加密资产的广泛使用来产生网络效应至关重要。\n\
  \n从历史上看，一些空投曾带来可观收益，例如 Uniswap 空投为每位接收者带来了 15,000 美元。然而，空投的回报通常很小（最多价值几美元），并且常常甚至无法交付承诺的代币。此外，空投通常针对处于起步阶段的加密项目，这些被空投的加密资产往往变得一文不值。对许多加密资产投资者而言，空投是否值得花时间完成整个注册过程，是值得商榷的。\n\
  \n\n\n## 交易路由\n\n某些加密资产提供了通过交易路由获利的机会。一个广为人知的例子是 Helium 挖矿。在此语境下，Helium 并非元素周期表中的惰性气体，而是一种为“人民网络”（一个去中心化无线网络）提供动力的加密资产。Helium\
  \ 节点使得智能设备能够通过低功耗、长距离的无线协议在线发送数据。因此，Helium 矿工可以根据其网络覆盖范围获得可观的奖励。连接到该网络的物联网设备包括，例如，狗狗的智能项圈或许多城市都有的\
  \ Lime 电动滑板车。矿工之所以能获得高额回报，是因为这种模式对任何单个矿工而言都无法规模化扩展。实际上，两台彼此靠近的 Helium 挖矿设备所提供的网络覆盖范围与单台设备相同。因此，矿工有动力（在每个地点）只拥有一台设备。\n\
  \n![](img/600732_1_En_8_Fig7_HTML.jpg)\n\nLinxdot Helium 矿机照片。\n\n图 8-7：Linxdot\
  \ 生产的 Helium 矿机\n\n另一个交易路由的例子是通过闪电网络实现的。闪电网络通过在比特币区块链之上构建基础设施来提高比特币的可用性，从而使交易能够即时完成，且交易费用可以忽略不计。这一特性对于解决比特币交易结算速度相对较慢的问题至关重要，将其从分钟级缩短到毫秒级。根据设计，闪电网络依赖于去中心化的节点来路由交易。任何人都可以运营这样一个节点，并从小额交易费用的分成中获益。全天候运行一个专用节点功耗低于每小时\
  \ 10 瓦，相当于在 2023 年的纽约这样的城市，每月电费大约为 1 美元。运营这样一个节点的收益取决于多个因素，包括路由交易的数量和规模，以及比特币的价格。截至\
  \ 2023 年，运营这样的节点并不赚钱：即使在最理想的情况下，也需要好几个月才能收回成本。然而，比特币倡导者将其用于帮助网络去中心化，并享受其他服务，例如提供闪电支付和开具闪电发票。随着闪电网络上支付数量的增加，运营一个路由节点可能会成为一个潜在的新收入来源。\n\
  \n![](img/600732_1_En_8_Fig8_HTML.jpg)\n\nRaspiBlitz 屏幕的照片。屏幕左侧有信息、节点、发票和关闭的菜单。中间屏幕显示比特币全节点和闪电网络。\n\
  \n图 8-8：运行在 RaspiBlitz 上的比特币全节点和闪电节点\n\n#### 关键概念\n\n有些投资者可能未被授权或监管以直接投资加密资产。然而，他们仍然可以通过间接投资（例如\
  \ ETF 或拥有、开发或挖掘加密资产的公司）从这种新资产类别中获益。此外，个人也可以选择直接挖掘加密资产或亲自为区块链项目做贡献。\n\n投资者可以通过资本收益和被动收入机会（例如质押、借贷或流动性挖矿）从加密资产中获益。他们还可以使用收益农场，将资金自动转移到\
  \ DeFi 世界中收益最高的选项，尽管这些选项通常伴随着额外风险（例如杠杆）。\n\n另一种高风险、高回报的直接投资策略是投资于 ICO、STO 或其替代的早期加密资产发行，以利用全新加密资产可能的价格上涨。\n\
  \n## 延伸问题\n\n由于大多数加密资产本质上属于证券（见第 7 章），ICO 构成了一种证券发行。而由于大多数 ICO 发行方并未注册，这类发行在许多司法管辖区可能是非法的（即使执法机构通常没有明确禁止）。对于\
  \ ICO 的投资者而言，真正的监管风险是什么？\n\n为什么截至 2023 年，没有更多公司将比特币纳入其资产负债表？\n\n质押和借贷背后的风险是什么？\n\
  \n脚注 1 2 3 4 5 6 7 8\n\n"
- '# 第三部分：何时是投资的好时机？


  ## 9. 加密货币趋势


  > *以史为鉴，可以知兴替，进而明晰未来。*

  >

  > ——卡洛斯·斯利姆·埃卢


  对于任何投资者而言，无论是投资加密资产还是其他领域，时机都至关重要。虽然把握好投资时机很困难，但理解宏观经济周期、加密资产特定周期以及特定的日历调整会有所帮助。本章探究这些周期及其他加密资产趋势。这些知识不仅能让面临投资大幅波动的投资者安心，还将有助于本书后面探讨的一些估值方法。




  ### 比特币价格


  我们首先分析比特币的历史趋势，因为它目前是规模最大的加密资产，并且截至 2023 年，它仍然主导着大多数其他加密资产的价格走势。虽然历史数据不能预测未来，但它能让我们了解过去推动价格波动的因素。正如哲学家桑塔亚那所言：“忘记过去的人，必将重蹈覆辙。”


  使用标准刻度来度量呈指数增长的数据（如图 9-1 所示），所能提供的洞察十分有限。


  ![](img/600732_1_En_9_Fig1_HTML.jpg)


  一张 2013 年 1 月至 2023 年 1 月比特币兑美元价格的折线图。曲线在 2017 年 1 月之前保持水平并伴有极轻微波动，随后上升至 2022 年
  1 月，之后下降并带有波动。


  图 9-1 2013 年 1 月至 2023 年 1 月比特币兑美元价格（标准刻度）


  对相同数据使用对数刻度，能对比特币的历史趋势进行更具启发性的分析。在这种刻度下，每个垂直标记代表的数值是前一个的十倍。图 9-2 展示了近十年的数据，并添加了对数趋势线。^(⁸⁰)


  ![](img/600732_1_En_9_Fig2_HTML.jpg)


  一张 2013 年 1 月至 2023 年 1 月比特币兑美元价格的上升折线图，带有波动，并在 2013 年、2017 年和 2021 年出现价格峰值。一条曲线在波动中上升。对数趋势线始于（约
  2013 年 1 月, 99），止于（2023 年 1 月, 80,000）。


  图 9-2 2013 年 1 月至 2023 年 1 月比特币兑美元价格（对数刻度），并带有一条对数趋势线


  从这些数据中首先可以识别出的模式是 2013 年、2017 年和 2021 年的价格峰值。细心的读者可能记得，这些年份紧随比特币减半事件年份之后（即作为比特币供应计划的一部分，每个区块奖励的新比特币数量减半的年份）。具体来说，2012
  年 11 月，每个区块奖励的比特币数量从 50 枚减至 25 枚。同样，2016 年 7 月从 25 枚减至 12.5 枚，2020 年 5 月从 12.5 枚减至
  6.25 枚。这些峰值曾将比特币价格推高至其对数趋势线以上约两个标准差的位置，随后价格崩溃。从最高点到最低点，比特币最大的几次跌幅分别为 93%（2011 年）、86%（2015
  年）、83%（2018 年）和 77%（2022 年）。这类跌幅与科技股在其增长阶段的表现相当。例如，亚马逊在 2000 年暴跌 80%，苹果从 2000 年到
  2002 年下跌了 91%（其中包括 2000 年 9 月 29 日单日暴跌 51%）。


  比特币的起伏遵循一个四年周期的模式，这一现象催生了多种关于其未来演变的理论。


  ![](img/600732_1_En_9_Fig3_HTML.jpg)


  一张 2010 年 7 月至 2023 年 1 月比特币兑美元价格的上升折线图，带有波动。图中三条竖线分别位于 2012 年 11 月 28 日、2016 年
  7 月和 2020 年 7 月。对数趋势线始于（约 2013 年 7 月, 0.8），止于（2023 年 1 月, 80,000）。


  图 9-3 2010 年 7 月至 2023 年 1 月比特币兑美元价格（对数刻度），并标注了 2012 年 11 月 28 日、2016 年 7 月 9 日和
  2020 年 5 月 11 日的减半事件


  #### 比特币“减半”周期


  由新供应量减半驱动的四年比特币周期，对未来价格走势的预测并不可靠，但可以提示其他市场参与者可能抱有何种预期。此外，仅仅因为其他市场参与者预期这些周期会持续下去，这一预期本身就可能成为自我实现的预言。


  比特币区块链每产出 210,000 个区块就会发生一次减半事件。由于大约每 10 分钟产生一个区块，这大致相当于每四年一次。然而，比特币的代码会根据网络算力，每两周调整一次挖矿难度。这样调整的目标是确保无论网络总计算能力如何，挖出一个区块所需时间始终约为
  10 分钟。如果在两次难度调整之间算力增加，那么到下一次调整前，挖出一个区块的平均时间会降至 10 分钟以下。过去，减半事件发生的间隔时间都短于四年，因为总算力随着采用率的提高而增加。


  随着算力稳步增长，这种模式很可能将持续下去，至少在短期内是如此。最近三次减半事件之间的间隔期分别为 3 年 10 个月 19 天、3 年 7 个月 11 天和
  3 年 10 个月 2 天。考虑到自上次减半以来算力的增长，预计未来间隔期约为 3 年 10 个月是合理的。因此，接下来的两次比特币减半事件很可能分别发生在 2024
  年 3 月和 2028 年 1 月。


  减半事件前后价值上涨的根本原因，在于比特币的存量-流量比率发生了变化，这一点在第 1 章中已有解释。当减半事件发生时，单位时间内新挖出的比特币数量（流量）相对于现有比特币总量（存量）的比值会突然显著减小。换言之，供应量的扩张速度骤然放缓，使得每个现有比特币的获取难度增加，因此价值也相应提升。由于未来减半事件对该比率的影响将会减小，其重要性在未来可能不如过去那样突出。




  ### 比特币黄金牛市比率


  比特币在其第二个周期（2018 年）之后的价格模式催生了*比特币黄金牛市比率*理论。该比率指出，从市场底部到减半事件的时间，占从底部到峰值总时长的 50%；而从减半事件到峰值的时间，也同样占从底部到峰值总时长的
  50%。在前两个周期中，该比率分别为 50.3%–49.7%和 50.8%–49.2%。尽管这个理论在 2021 年广为流传，但第三个周期几乎完美地符合该模式，其比率为
  48.4%–51.6%，如图 9-4 所示。


