- "# 前言\n\n我曾多次决定不投资加密资产。然而，近期的发展改变了我的想法。\n\n2012 年秋天的一个周六晚上，我和朋友们聚在布鲁塞尔，为我们新成立的智囊团举办了一次会议。轮到我来提出一个发人深省的话题。我们小组拥有从工程、IT\
  \ 到物理学的多元化专业知识。凭借我的经济学背景，当天的议题是补充性货币的革命性潜力。事实上，与传统单一货币模型并行的货币系统可以在无数方面惠及地方社区。那时，我甚至不知道比特币的存在。在加密资产成为主流之前的数年里，替代货币仍是一个尚待崛起的模糊概念。\n\
  \n这个富有远见的概念将改变一切。正如蒸汽、电力和互联网引发了第一、第二和第三次工业革命，重塑社会对货币的使用方式可能会开启第四次工业革命。\n\n几个月后，我在苏黎世的一次经济会议上首次听说了比特币。然而，尽管我坚信替代货币的潜力，但我认为这种新型数字货币不值其交易价格——每枚\
  \ 70 美元。\n\n随后，我专注于监管风险管理，并最终成为德国第三大银行的区块链技术本地专家。然而，考虑到相关风险，我仍在 2016 年 4 月坚持认为每枚\
  \ 430 美元的比特币被严重高估。尽管区块链前景广阔，但这种新兴技术在当时尚不能取代金融或货币体系中现有的工作方式。\n\n即使在 2018 年于新加坡完成\
  \ MBA 学业后，我仍对投资加密资产是否值得冒险持怀疑态度。我认为，过去远超表现最佳传统资产类别数个数量级的回报，并不能证明其缺乏基本面支撑的合理性。归根结底，比特币和其他加密资产完全依赖于对点对点网络将持续运行的信任。可能出错的环节太多。尽管比特币是技术应用于货币体系的一个迷人案例，但其失败的可能性异常之高。\n\
  \n在 2021 年的市场牛市期间，比特币和其他加密资产再次成为头条新闻。得益于加密资产行业的最新发展，其普及率飙升。此前公开反对加密货币的机构改变了想法。许多机构开始提供加密资产服务；有些机构甚至在这些资产上投入了大量资金。\n\
  \n随后出现了另一个数量级的价值增长。这是十年来的第七次。\n\n过去几年，加密资产历史跨越了多个里程碑。我们目睹萨尔瓦多成为第一个采用比特币作为法定货币的国家，金融行业也在发展以利用加密资产的潜力。它确立了加密资产作为一种资产类别的地位。监管不确定性降低，这可能使加密资产成为风险调整后预期回报最具吸引力的资产类别。\n\
  \n十年来，我一直过于规避风险，不敢涉足加密领域。然而，尽管我仍高度警惕风险，但我相信现在大多数投资者——甚至像我这样风险规避的投资者——是时候入场了。\n\n\
  而且，有这种感觉的不止我一个人。\n\n> *我认为在我一生中，没有比[比特币]更值得研究的事情了。*\n> \n> ——杰克·多西，Twitter 和 Block（前身为\
  \ Square）首席执行官，2021 年 6 月 4 日，比特币 2021 大会\n\n> *比特币是网络空间中的一家银行，由不可腐蚀的软件运行，为数十亿没有选择或不想管理自己对冲基金的人提供一个全球性、负担得起、简单且安全的储蓄账户。*\n\
  > \n> ——迈克尔·塞勒，MicroStrategy 首席执行官，2020 年 12 月 17 日，Twitter\n\n> *纸币正在消亡。而加密货币是一种比纸币更好的价值转移方式，这点是肯定的。*\n\
  > \n> ——埃隆·马斯克，特斯拉、SpaceX 和 Twitter 首席执行官，2019 年 2 月 19 日，接受 ARK Invest 采访\n\n\n\
  \n> *像比特币这样的东西将会成功，并会开启一种全新的金融运作方式。*\n> \n> —理查德·布兰森，维珍集团创始人，2016 年 10 月 21 日，Twitter\n\
  \n> *PayPal 曾怀有创建新货币的目标。我们未能实现这一点，只创造了一个新的支付系统。我认为比特币在新型货币层面已获成功，但其支付系统仍有不足。*\n\
  > \n> —彼得·蒂尔，PayPal 联合创始人，2015 年 2 月，《Buttonwood Gathering》访谈\n\n> *[比特币]是一项卓越的密码学成就。创造在数字世界不可复制的实物具有巨大价值。*\n\
  > \n> —埃里克·施密特，谷歌前 CEO，2014 年 3 月，计算机历史博物馆\n\n> *比特币是伟大事物的开端：一种无需政府支撑的货币，这是必要且势在必行的。*\n\
  > \n> —纳西姆·塔勒布，《纽约时报》畅销书作家，2013 年 3 月 20 日，Reddit 问答（AMA）\n\n> *我认为互联网将成为削弱政府角色的主要力量之一。目前欠缺但很快会发展起来的是可靠的电子现金——一种在互联网上将资金从\
  \ A 转移至 B，而无需 A 知道 B 或 B 知道 A 的方式……*\n> \n> —米尔顿·弗里德曼，诺贝尔经济学奖得主，1999 年，NTU 访谈\n\n\
  本书最初是我关于最优加密投资策略的笔记。它揭示了加密资产的非凡潜力及其特定风险。破除迷思，建立有意义的投资组合，并适应这个动荡的新世界。\n\n\n\n"
