  比特币社区达成共识，使用一份包含 2048 个（即 2¹¹）单词的官方列表作为比特币私钥的基础，以方便其存储。除英语外，其他语言也存在类似的列表。一套规则使得这些单词简单且不易混淆。例如，该列表不包含有多种拼写的单词，也不包含存在于其他语言对应列表中的单词。此外，没有两个单词以相同的前四个字母开头，因此知道每个（12
  或 24 个）助记词的前四个字母就足以恢复一个人的私钥。另外，最后一个单词是一个校验和，它依赖于所有其他单词，以确保助记词的有效性。每个单词还与 2048 单词列表中的一个数字相关联，因此知道一个人的（12
  或 24 个）数字列表（以及所选列表，即语言）是知道其助记词的一种替代方法。出于这个原因，一些硬件钱包简单地列出与助记词对应的数字，这些数字可以恢复用户的私钥。


