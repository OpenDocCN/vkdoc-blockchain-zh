  trans: "\n![](img/978-1-4842-9309-6_CoverFigure.jpg)\n\nISBN 978-1-4842-9308-9 电子书\
    \ ISBN 978-1-4842-9309-6 [`doi.org/10.1007/978-1-4842-9309-6`](https://doi.org/10.1007/978-1-4842-9309-6)\
    \ © Thomas Jeegers 2023 本作品受版权保护。版权所有，未经出版者明确书面许可，不得以任何形式或通过任何方式（包括但不限于翻译、重印、使用插图、引用、广播、以微缩胶片或任何其他物理方式复制、传输或信息存储与检索、电子改编、计算机软件，或目前已知或今后开发的类似或不同方法）复制或传播本作品的任何部分。本出版物中使用的一般描述性名称、注册商标、商标、服务标记等，即使未作明确声明，也不意味着这些名称不受相关保护性法律和法规的约束，因此可自由使用。出版者、作者和编辑尽最大努力确保本书在出版之日所提供的信息和建议是真实准确的。但出版者、作者或编辑不对本材料中的内容或可能存在的任何错误或遗漏提供明示或暗示的担保。出版者对已出版地图中的司法管辖权主张及机构隶属关系保持中立。\n\
    \n本 Apress 印记由注册公司 APress Media, LLC（Springer Nature 旗下机构）出版。\n\n注册公司地址为：美国纽约州纽约市纽约广场\
    \ 1 号，邮编 10004。\n\n*献给那些将自身财务未来掌握在手中的读者*\n\n# 免责声明\n\n本书并非对购买加密资产的推荐，而是对其本质、为何可能适合部分投资者、以及此类投资者应考虑事项的结构化分析。为此，需做出以下多项免责声明。\n\
    \n首先，我并非财务顾问。本书内容应被视为教育性材料，而非财务建议。\n\n其次，加密资产相较于传统投资，价格波动性更高，且面临更大的法律不确定性。并非所有投资者都能承受这种波动性和不确定性。\n\
    \n第三，加密资产领域发展极为迅速。尽管在出版时已尽力提供最新来源，但当你读到这些文字时，情况可能已经发生变化。因此，对于基于本书材料做出的陈旧信息或决策（无论财务或其他方面），我概不负责。\n\
    \n任何投资者（无论是投资加密资产或其他资产）都应评估某项特定投资是否适合自身具体需求，这包括风险收益特征、流动性、投资期限、税务状况及其他独特因素。任何投资都应被视为投资者整体投资组合的一部分，而非独立投资。此外，投资者有责任自行进行投资研究，特别是理解相关潜在风险。如果你没有能力或意愿进行此类评估，请咨询能够根据你的独特需求和特征定制投资组合建议的财务顾问。\n\
    \n# 前言\n\n我曾多次决定不投资加密资产。然而，近期的发展改变了我的想法。\n\n2012 年秋天的一个周六晚上，我和朋友们聚在布鲁塞尔，为我们新成立的智囊团举办了一次会议。轮到我来提出一个发人深省的话题。我们小组拥有从工程、IT\
    \ 到物理学的多元化专业知识。凭借我的经济学背景，当天的议题是补充性货币的革命性潜力。事实上，与传统单一货币模型并行的货币系统可以在无数方面惠及地方社区。那时，我甚至不知道比特币的存在。在加密资产成为主流之前的数年里，替代货币仍是一个尚待崛起的模糊概念。\n\
    \n这个富有远见的概念将改变一切。正如蒸汽、电力和互联网引发了第一、第二和第三次工业革命，重塑社会对货币的使用方式可能会开启第四次工业革命。\n\n几个月后，我在苏黎世的一次经济会议上首次听说了比特币。然而，尽管我坚信替代货币的潜力，但我认为这种新型数字货币不值其交易价格——每枚\
    \ 70 美元。\n\n随后，我专注于监管风险管理，并最终成为德国第三大银行的区块链技术本地专家。然而，考虑到相关风险，我仍在 2016 年 4 月坚持认为每枚\
    \ 430 美元的比特币被严重高估。尽管区块链前景广阔，但这种新兴技术在当时尚不能取代金融或货币体系中现有的工作方式。\n\n即使在 2018 年于新加坡完成\
    \ MBA 学业后，我仍对投资加密资产是否值得冒险持怀疑态度。我认为，过去远超表现最佳传统资产类别数个数量级的回报，并不能证明其缺乏基本面支撑的合理性。归根结底，比特币和其他加密资产完全依赖于对点对点网络将持续运行的信任。可能出错的环节太多。尽管比特币是技术应用于货币体系的一个迷人案例，但其失败的可能性异常之高。\n\
    \n在 2021 年的市场牛市期间，比特币和其他加密资产再次成为头条新闻。得益于加密资产行业的最新发展，其普及率飙升。此前公开反对加密货币的机构改变了想法。许多机构开始提供加密资产服务；有些机构甚至在这些资产上投入了大量资金。\n\
    \n随后出现了另一个数量级的价值增长。这是十年来的第七次。\n\n过去几年，加密资产历史跨越了多个里程碑。我们目睹萨尔瓦多成为第一个采用比特币作为法定货币的国家，金融行业也在发展以利用加密资产的潜力。它确立了加密资产作为一种资产类别的地位。监管不确定性降低，这可能使加密资产成为风险调整后预期回报最具吸引力的资产类别。\n\
    \n十年来，我一直过于规避风险，不敢涉足加密领域。然而，尽管我仍高度警惕风险，但我相信现在大多数投资者——甚至像我这样风险规避的投资者——是时候入场了。\n\
    \n而且，有这种感觉的不止我一个人。\n\n> *我认为在我一生中，没有比[比特币]更值得研究的事情了。*\n> \n> ——杰克·多西，Twitter 和\
    \ Block（前身为 Square）首席执行官，2021 年 6 月 4 日，比特币 2021 大会\n\n> *比特币是网络空间中的一家银行，由不可腐蚀的软件运行，为数十亿没有选择或不想管理自己对冲基金的人提供一个全球性、负担得起、简单且安全的储蓄账户。*\n\
    > \n> ——迈克尔·塞勒，MicroStrategy 首席执行官，2020 年 12 月 17 日，Twitter\n\n> *纸币正在消亡。而加密货币是一种比纸币更好的价值转移方式，这点是肯定的。*\n\
    > \n> ——埃隆·马斯克，特斯拉、SpaceX 和 Twitter 首席执行官，2019 年 2 月 19 日，接受 ARK Invest 采访\n"
- fmt: "> *Something like bitcoin is going to be successful, and it’s going to enable\
    \ a whole new way of doing finance.*\n> \n> —Richard Branson, Founder of the Virgin\
    \ Group October 21, 2016, Twitter\n\n> *PayPal had these goals of creating a new\
    \ currency. We failed at that, and we just created a new payment system. I think\
    \ Bitcoin has succeeded on the level of a new currency, but the payment system\
    \ is somewhat lacking.*\n> \n> —Peter Thiel, Co-founder of PayPal, February 2015,\
    \ interview with The Buttonwood Gathering\n\n> *[Bitcoin] is a remarkable cryptographic\
    \ achievement. The ability to create something which is not duplicable in the\
    \ digital world has enormous value.*\n> \n> —Eric Schmidt, former CEO of Google,\
    \ March 2014, Computer History Museum\n\n> *Bitcoin is the beginning of something\
    \ great: a currency without a government, something necessary and imperative.*\n\
    > \n> —Nassim Taleb, *New York Times* best-selling author March 20, 2013, Ask\
    \ Me Anything (AMA) on Reddit.com\n\n> *I think the Internet is going to be one\
    \ of the major forces for reducing the role of government. The one thing that’s\
    \ missing, but that will soon be developed, is a reliable e-cash, a method whereby\
    \ on the Internet you can transfer funds from A to B without A knowing B or B\
    \ knowing A…*\n> \n> —Milton Friedman, Economics Nobel Prize laureate 1999, interview\
    \ with the NTU\n\nThis book started as my notes on the optimal crypto investment\
    \ strategy. It uncovers the exceptional potential of cryptoassets and their specific\
    \ risks. Debunk the myths, set up a meaningful investment portfolio, and get to\
    \ terms with this volatile new world."
