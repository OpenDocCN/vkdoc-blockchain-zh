- fmt: "# Inclusion\n\nIn 2019, `UNICEF` identified that every fourth birth in the\
    \ world is unregistered, and the proportion of unrecorded births is increasing.\
    \ Developing countries in Southeast Asia and Africa drive this figure, as the\
    \ complexity of the process and registration fees may be dissuasive for parents.\
    \ Unfortunately, lacking official birth registration often excludes children from\
    \ access to essential services such as healthcare or education. In addition, lacking\
    \ registration puts these children at an even greater risk of exploitation [12].\n\
    \nObtaining a proof of identity should be simple and affordable. Again, blockchain\
    \ technology provides these benefits by removing barriers to access. Simple processes\
    \ provide access to inexpensive and unfalsifiable proof of identity, secured by\
    \ state-of-the-art cryptography. In addition, removing barriers to access for\
    \ greater inclusion is not only valid for identity but also for services such\
    \ as banking.\n\nAbout 2 billion people worldwide do not have a bank account and\
    \ are thus excluded from many economic opportunities. Even more so than for birth\
    \ registration, access fees can be dissuasive, transaction fees prohibitively\
    \ expensive, and minimum amounts required. With blockchain technology, no bank\
    \ account is necessary to participate in the economy. It is not even necessary\
    \ to have a formal proof of identity to do so. As a result, cryptoassets enable\
    \ higher inclusion of the unbanked, more simply and cheaply than any technology\
    \ has enabled thus far.\n\nAdmittedly, blockchain usage requires users to have\
    \ access to the Internet. And unfortunately, many of these 2 billion unbanked\
    \ people do not. However, as Internet infrastructure expands, an increasing number\
    \ of people can join an economy that was previously inaccessible to them.\n\n\
    # Private Property\n\nThe year 2022 forced millions of Eastern European citizens\
    \ to flee their countries. Seeking refuge elsewhere, many lost almost everything\
    \ they owned, as they could not transport their wealth across borders. In many\
    \ cases, the few belongings they carried physically were confiscated or stolen\
    \ from them. Besides the crisis in Ukraine, the United Nations High Commissioner\
    \ for Refugees flags at least another dozen emergencies worldwide, where people\
    \ often face analogous disasters.\n\nWhile much of one’s wealth resides in physical\
    \ objects, part lies in online money accounts. Unfortunately, this money is not\
    \ always easily transportable as the institutions behind it are often reticent\
    \ to enable withdrawals when they are most needed. Also, international transfers\
    \ can be limited to specific amounts and are subject to high fees.\n\nIn contrast,\
    \ `Bitcoin` enables holders to carry wealth regardless of circumstances. By memorizing\
    \ a 12-word seed phrase, one can resume transacting with a `Bitcoin` wallet from\
    \ anywhere on the planet. One can own private property regardless of conflicts,\
    \ financial institutions’ limitations, or states’ political agendas.\n\nFor this\
    \ reason, countries most at risk are leading cryptoasset adoption. For instance,\
    \ `Chainalysis`’ 2022 Global Crypto Adoption Index ranks Vietnam, Philippines,\
    \ Ukraine, and India as the countries with the highest crypto adoption [13].\n\
    \n# Free Speech\n\nIn October 2022, the financial technology giant `PayPal` updated\
    \ its acceptable use policy (`AUP`), warning users that they would be charged\
    \ a $2,500 fine for “promoting misinformation.” This update triggered an instantaneous\
    \ reaction from the public, vocally opposing this limitation to free speech. For\
    \ example, David Markus, `PayPal`’s former president, tweeted his utmost opposition\
    \ to this update.\n\n> *It’s hard for me to openly criticize a company I used\
    \ to love and gave so much to. But `@PayPal`’s new `AUP` goes against everything\
    \ I believe in. A private company now gets to decide to take your money if you\
    \ say something they disagree with. Insanity.*\n> \n> —David Markus\n\nWhile `PayPal`\
    \ quickly reversed course, this imprudent update raised concerns in communities\
    \ worldwide about the power of centralized authorities. In particular, it strengthened\
    \ the case for decentralized systems to protect the public from financial institutions’\
    \ ability to seize people’s funds. Safeguarding freedom of speech implies that\
    \ people should be able to freely express ideas without fearing repercussions\
    \ threatening their life or finances.\n\nFor this reason, journalists and activists\
    \ worldwide are already using cryptoassets, particularly `Bitcoin`, to transact.\
    \ Not only are they facing a low risk of seeing their funds confiscated by institutions\
    \ disagreeing with them or with different interests, but at the same time, they\
    \ are also increasing their privacy.\n\n# Inflation\n\nPer the World Bank database,\
    \ 28 countries had an average yearly inflation rate of two digits or more over\
    \ the twenty years ending in 2021.^([^(41)](#fn41)) These countries represent\
    \ over 1.3 billion people whose national currency is unreliable enough to store\
    \ value earned through work.^([^(42)](#fn42)) Moreover, in 2022, inflation increased\
    \ significantly worldwide, worsening the situation.\n\nAs presented in Chapter\
    \ [1](#600732_1_En_1_Chapter.xhtml), inflation reflects the increased quantity\
    \ of a currency in an economy. It happens through incremental currency made available\
    \ by the central bank and credits created by commercial banks. In other words,\
    \ letting central banks print currency at will opens the door to possibly unlimited\
    \ inflation.\n\nThe higher the credibility of a central bank, the higher the trust\
    \ that future inflation will remain close to the target. However, even comparatively\
    \ credible central banks have difficulty maintaining this target, as the incentives\
    \ to print more currency become overwhelming under challenging times. For example,\
    \ despite the European Central Bank’s mandate to keep inflation below 2%, the\
    \ Euro Area’s year-on-year official inflation rate was above 10% in October and\
    \ November 2022\\. As previously covered, actual inflation is likely even higher\
    \ due to the metric used to compute the official level of inflation. Even in the\
    \ case of the `ECB`, trust in the ability to tame inflation is eroding.\n\nIn\
    \ contrast, `Bitcoin` automates the role of a central bank with absolute credibility.\
    \ Nobody will ever mine bitcoins faster than the code imposes. Therefore, the\
    \ future inflation rate is known with absolute certainty and is unchangeable,\
    \ regardless of circumstances. In 2023, `Bitcoin`’s inflation rate is about 1.5%\
    \ and will continuously decrease until it reaches 0% around the year 2140."
