    # 使用工作量证明更新去中心化账本


    让我们重新审视一下更新去中心化账本的步骤（见图 6-5），并探究在工作量证明共识机制下会发生什么。


    在第一步（发起交易请求）中，爱丽丝使用她的私钥对发送到网络的交易进行签名。她将公钥附加在消息中。这个过程利用非对称加密，以密码学方式证明爱丽丝是消息的真正作者。在交易信息中，任何人都可以看到爱丽丝的化名请求向鲍勃的公钥地址发送，比如说，一个比特币。


    在第二步（收集交易）中，验证者从待处理交易池中收集交易。他们只选择有效的交易（即那些公钥能解密用发送者私钥加密的消息的交易）。验证者尽可能多地收集待处理交易，并尽可能选择价值高的交易，这符合他们的利益，因为他们会从每笔交易中抽取少量手续费——前提是他们成为该区块的成功验证者。


    在第三步（创建区块）中，他们竞相成为第一个解决数学问题以验证区块的人。这是一个无实际用途的琐碎问题，涉及随机运行数十亿次哈希算法，直到偶然得到一个具有特定特征的输出。例如，哈希输出必须以特定数量的零开头。得到这样的输出需要时间和
    CPU 算力（电力）。这些花费的时间和精力就是*工作量证明*中所谓的“工作量”。由于这个过程类似于矿工开采金矿，验证者通常被称为矿工。


    在第四步（分发有效区块）中，成功的矿工将该区块广播到网络上，指明选定的交易以及能够产生符合所需特征输出的输入值。


    在第五步（由网络验证区块）中，任何节点都可以测试提交的区块（即验证输出是否满足设定的特征）。与第三步相反，这个测试是瞬间完成的。实际上，有了正确的输入，验证输出是否符合所需特征是非常直接的。


    在最后一步（将区块添加到区块链）中，所有节点都接受这个新区块作为链上的最新区块。作为区块的一部分，成功的矿工因解决问题而获得预定数量的比特币奖励。他还会收取交易手续费。这些奖励确保了在任何时候网络上都有足够的矿工，通过竞争来解决下一个区块。


    ## 工作量证明下的区块结构


    图 6-7 展示了在采用工作量证明的区块链上，一个区块是如何构成的。它由两部分组成：一个区块头和一个交易集。


    ![](img/600732_1_En_6_Fig7_HTML.png)


    区块链的结构。顶部的区块头包括区块版本、区块大小、时间戳、前一个区块的哈希值、默克尔树根哈希值、随机数和难度目标。下面的交易计数器包含交易 1、2、3 到
    n，以及矿工奖励。


    *图 6-7 区块链上的区块结构*


    作为区块头的一部分，*区块版本*、*区块大小*和*时间戳*是不言自明的元素，它们提供了当前区块的信息。*前一个区块的哈希值*使链能够以正确的顺序链接其区块，就像一本书的页码一样。*默克尔树*是一个区块中所有交易的数字指纹，可以快速验证一个区块是否包含某笔交易。每个区块的头部都包含一个该状态的哈希值，以便将其所有信息总结为仅
    32 字节。*随机数*是矿工为使区块哈希产生特定输出而更改的一个数字。如图 6-3 所示，更改区块中的单个比特信息会产生完全不同的哈希输出。因此，矿工更改随机数并对生成的区块进行哈希运算，直到得到一个以特定数量零开头的区块哈希值。需要达到的零的个数由*难度目标*定义。试图解决区块的矿工越多（哈希率越高），难度目标就越高。对于比特币，这个目标被设定为使整个网络大约需要
    10 分钟才能解决一个区块。每两周，比特币的难度目标会根据哈希率进行调整，以保持平均 10 分钟的出块时间。其他加密资产的出块间隔时间可能不同。^(⁶²)


    交易计数器包含两部分内容。首先，它包含交易池中的交易（即用户提交以供记录的交易）。由于区块有最大容量限制，下一个区块的矿工并不会收集所有交易。矿工会尽可能多地收集交易，并优先选择金额最大的交易，因为有交易手续费。交易越多、金额越大，矿工获得的手续费就越高。


    其次，在交易计数器中，还有矿工奖励。它包括区块奖励和交易手续费。比特币的区块奖励在推出时是每个区块 50 个比特币，之后每 210,000 个区块（大约每四年）区块奖励减半。截至
    2023 年，比特币的区块奖励是每个区块 6.25 个比特币。交易手续费起初很小且微不足道。然而，现在比特币的价格达到数万美元，这些小额交易手续费已具有显著价值。最终，它们将取代区块奖励，以激励矿工继续挖矿。2023
    年 5 月初（区块编号 788,695），比特币区块链上区块空间需求的激增，使得交易手续费自 2017 年以来首次超过了区块奖励。


    ![](img/600732_1_En_6_Fig8_HTML.jpg)


    比特币区块 772,783 页面的截图。它包括开采日期以及币基消息和各种详细信息。这些详细信息包括哈希值、容量、距离、BTC、价值、平均价值、版本、默克尔根、难度、随机数、比特数和费用范围等。


    *图 6-8 比特币区块 788,695 的详细信息，开采于 2023 年 5 月 8 日（来源：blockchain.com）*

