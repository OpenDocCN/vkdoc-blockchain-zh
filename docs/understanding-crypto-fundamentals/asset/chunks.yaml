- fmt: '# Platform Risk


    Many cryptoasset investors hold their crypto funds on either centralized or decentralized
    platforms. However, history has shown that neither of these alternatives is safe.
    Famous examples include the collapse of `Mt. Gox` (centralized) and the `DAO`
    (decentralized).


    In the early days of crypto, `Mt. Gox` was the biggest cryptoexchange. This Tokyo-based
    platform started operating in 2010 and grew to become the chosen intermediary
    for over 70% of Bitcoin transactions at its peak. However, the rapid rise in the
    value of Bitcoin put `Mt. Gox` under increasing focus of hackers. In 2014, a successful
    hack stole 840,000 bitcoins (worth $460 million at the time and $23 billion as
    of May 2023) and caused the exchange to file for bankruptcy [49]. A few years
    later, a similar story happened to the decentralized `The DAO`, as explained in
    Chapter [6](#600732_1_En_6_Chapter.xhtml).


    Unfortunately, these infamous events are not isolated. Several other security
    breaches caused investors to lose their cryptoassets in the past. Not only could
    hacks threaten the stability and reliability of a platform, but they could also
    affect its reputation. While the frequency of these events is likely related to
    the low level of maturity of the cryptoasset space, one should still consider
    platform risk as a reasonably likely and material risk as of 2023.


    To mitigate this risk, one should thoroughly research the platforms one uses and
    diversify among several of them. For example, the diligent investor would review
    the platform’s size (volume of transactions), history of hacks, recurrence of
    independent audits, and reputation. In addition, one may consider splitting funds
    over multiple platforms or skipping intermediaries altogether. See Chapter [11](#600732_1_En_11_Chapter.xhtml)
    for information on investment vehicles and options available to investors.


    # Custody Risk


    If you have a $100 bill in your pocket, you risk losing it or somebody stealing
    it from you. With a private key, you run the same two risks. Losing your private
    key implies that the funds in the corresponding wallet would become permanently
    inaccessible. No central authority can restore your funds or cancel a transaction
    on a decentralized network. Therefore, if you decide not to use a centralized
    exchange or a custodial service to manage keys on your behalf, losing them may
    be the most likely and the most material risk (complete loss of your investment).
    To mitigate it, using back-ups or recovery mechanisms is strongly recommended.


    In addition, private keys can also be lost through theft. In particular, hackers
    could try to lure you into providing private keys. While the most attractive targets
    would typically be large users or exchanges with significant funds, the average
    investor is not safe from such a risk either. Some hackers operate through the
    use of malware. They include malicious software like a keylogger retrieving private
    keys from your computer and sending them to the attacker. Other types of malware
    act on the clipboard of the victim’s computer: when the user copies his wallet
    address to indicate it on a website, the malware replaces this address with another
    one. The victim then copies the wrong address, sending funds to the fraudulent
    public address.


    To mitigate this risk, users should have a clean, up-to-date operating system
    and state-of-the-art antivirus software. In addition, downloads should only ever
    take place from trusted sources, and regular clean-ups are advised.


    Overall, investors should weigh custody risk with platform risk and choose the
    most appropriate strategy. For example, splitting funds so that not all are subject
    to the same type of risk may be an advisable strategy for most investors.


    # Oracle Risk


    Hackers can also attack investors indirectly. For example, they can manipulate
    an oracle’s output that flows into a smart contract. This risk is especially relevant
    in DeFi and prediction markets.


    For example, imagine a smart contract including a payment conditional on the result
    of a sports match (information provided by an oracle), where the attacker could
    manipulate the data source. The security of the smart contract is directly dependent
    on the security of the underlying oracle. Even if the oracle is technologically
    sound, corruption through bribes or blackmail should also be considered.


    One way to mitigate this risk is to use multiple data sources in a contract. Alternatively,
    oracles could be selected based on reputation mechanisms or incentive schemes
    nudging oracles to provide accurate and reliable data consistently.


    # DDoS Attacks


    Distributed denial of service (DDoS) attacks are cyberattacks that can disrupt
    the operations of a network by flooding it with traffic to prevent it from functioning
    correctly. The risk of DDoS attacks is relevant for cryptoassets that rely on
    partially centralized networks to function, for example, to process transactions.


    Cryptoassets with a low risk of DDoS attacks use robust and resilient network
    infrastructure. They could include, for example, load balancing and traffic filtering
    to distribute traffic across multiple servers and prevent a single server from
    being overwhelmed. Effectively decentralized network architectures mitigate this
    risk as the network’s operations are spread on many computers. Their design with
    multiple redundancies makes it more difficult for attackers to target and overwhelm
    specific parts of the network. For this reason, low decentralization of nodes
    processing information flows increases risks for a cryptoasset.'
  raw: '## Platform Risk


    Many cryptoasset investors hold their crypto funds on either centralized or decentralized
    platforms. However, history has shown that neither of these alternatives is safe.
    Famous examples include the collapse of Mt. Gox (centralized) and the DAOsaster
    (decentralized).


    In the early days of crypto, Mt. Gox was the biggest cryptoexchange. This Tokyo-based
    platform started operating in 2010 and grew to become the chosen intermediary
    for over 70% of Bitcoin transactions at its peak. However, the rapid rise in the
    value of Bitcoin put Mt. Gox under increasing focus of hackers. In 2014, a successful
    hack stole 840,000 bitcoins (worth $460 million at the time and $23 billion as
    of May 2023) and caused the exchange to file for bankruptcy [49] A few years later,
    a similar story happened to the decentralized The DAO, as explained in Chapter
    [6](#600732_1_En_6_Chapter.xhtml).


    Unfortunately, these infamous events are not isolated. Several other security
    breaches caused investors to lose their cryptoassets in the past. Not only could
    hacks threaten the stability and reliability of a platform, but they could also
    affect its reputation. While the frequency of these events is likely related to
    the low level of maturity of the cryptoasset space, one should still consider
    platform risk as a reasonably likely and material risk as of 2023.


    To mitigate this risk, one should thoroughly research the platforms one uses and
    diversify among several of them. For example, the diligent investor would review
    the platform’s size (volume of transactions), history of hacks, recurrence of
    independent audits, and reputation. In addition, one may consider splitting funds
    over multiple platforms or skipping intermediaries altogether. See Chapter [11](#600732_1_En_11_Chapter.xhtml)
    for information on investment vehicles and options available to investors.


    ## Custody Risk


    If you have a $100 bill in your pocket, you risk losing it or somebody stealing
    it from you. With a private key, you run the same two risks. Losing your private
    key implies that the funds in the corresponding wallet would become permanently
    inaccessible. No central authority can restore your funds or cancel a transaction
    on a decentralized network. Therefore, if you decide not to use a centralized
    exchange or a custodial service to manage keys on your behalf, losing them may
    be the most likely and the most material risk (complete loss of your investment).
    To mitigate it, using back-ups or recovery mechanisms is strongly recommended.


    In addition, private keys can also be lost through theft. In particular, hackers
    could try to lure you into providing private keys. While the most attractive targets
    would typically be large users or exchanges with significant funds, the average
    investor is not safe from such a risk either. Some hackers operate through the
    use of malware. They include malicious software like a keylogger retrieving private
    keys from your computer and sending them to the attacker. Other types of malware
    act on the clipboard of the victim’s computer: when the user copies his wallet
    address to indicate it on a website, the malware replaces this address with another
    one. The victim then copies the wrong address, sending funds to the fraudulent
    public address.


    To mitigate this risk, users should have a clean, up-to-date operating system
    and state-of-the-art antivirus software. In addition, downloads should only ever
    take place from trusted sources, and regular clean-ups are advised.


    Overall, investors should weigh custody risk with platform risk and choose the
    most appropriate strategy. For example, splitting funds so that not all are subject
    to the same type of risk may be an advisable strategy for most investors.


    ## Oracle Risk


    Hackers can also attack investors indirectly. For example, they can manipulate
    an oracle’s output that flows into a smart contract. This risk is especially relevant
    in DeFi and prediction markets.


    For example, imagine a smart contract including a payment conditional on the result
    of a sports match (information provided by an oracle), where the attacker could
    manipulate the data source. The security of the smart contract is directly dependent
    on the security of the underlying oracle. Even if the oracle is technologically
    sound, corruption through bribes or blackmail should also be considered.


    One way to mitigate this risk is to use multiple data sources in a contract. Alternatively,
    oracles could be selected based on reputation mechanisms or incentive schemes
    nudging oracles to provide accurate and reliable data consistently.


    ## DDoS Attacks


    Distributed denial of service (DDoS) attacks are cyberattacks that can disrupt
    the operations of a network by flooding it with traffic to prevent it from functioning
    correctly. The risk of DDoS attacks is relevant for cryptoassets that rely on
    partially centralized networks to function, for example, to process transactions.


    Cryptoassets with a low risk of DDoS attacks use robust and resilient network
    infrastructure. They could include, for example, load balancing and traffic filtering
    to distribute traffic across multiple servers and prevent a single server from
    being overwhelmed. Effectively decentralized network architectures mitigate this
    risk as the network’s operations are spread on many computers. Their design with
    multiple redundancies makes it more difficult for attackers to target and overwhelm
    specific parts of the network. For this reason, low decentralization of nodes
    processing information flows increases risks for a cryptoasset.'
  trans: '

    # 平台风险


    许多加密资产投资者将资金存放在中心化或去中心化平台上。然而，历史表明这两种选择都不安全。著名的例子包括`Mt. Gox`（中心化）和`DAO`（去中心化）的崩溃。


    在加密早期，`Mt. Gox`是最大的加密货币交易所。这家总部位于东京的平台于 2010 年开始运营，鼎盛时期成长为超过 70%比特币交易的中介机构。然而，比特币价值的快速飙升使`Mt.
    Gox`成为黑客越来越关注的焦点。2014 年，一次成功的黑客攻击窃取了 84 万枚比特币（当时价值 4.6 亿美元，截至 2023 年 5 月价值 230
    亿美元），导致该交易所申请破产[49]。几年后，类似的故事发生在去中心化的`The DAO`上，详见第 6 章。


    不幸的是，这些臭名昭著的事件并非孤立事件。过去还有其他几起安全漏洞导致投资者损失加密资产。黑客攻击不仅可能威胁平台的稳定性和可靠性，还可能影响其声誉。虽然这些事件的发生频率可能与加密资产领域尚不成熟有关，但截至
    2023 年，仍应将平台风险视为一种相当可能且重大的风险。


    为降低此风险，投资者应彻底研究所使用的平台，并在多个平台之间进行分散。例如，勤勉的投资者会审查平台的规模（交易量）、被黑客攻击的历史、独立审计的频率以及声誉。此外，可以考虑将资金分散到多个平台，或完全跳过中介机构。有关可供投资者使用的投资工具和选项的信息，请参见第
    11 章。


    # 托管风险


    如果你口袋里有 100 美元钞票，你可能会丢失它或被人偷走。对于私钥，你面临同样的两种风险。丢失私钥意味着相应钱包中的资金将永久无法访问。去中心化网络上没有任何中央机构可以恢复你的资金或取消交易。因此，如果你决定不使用中心化交易所或托管服务来代为管理密钥，丢失密钥可能是最可能且最重大的风险（投资完全损失）。为降低此风险，强烈建议使用备份或恢复机制。


    此外，私钥也可能因被盗而丢失。特别是，黑客可能会试图诱骗你提供私钥。虽然最具吸引力的目标通常是拥有大量资金的大型用户或交易所，但普通投资者也无法完全免受此类风险。一些黑客通过使用恶意软件来实施攻击。他们包含诸如键盘记录器之类的恶意软件，能从你的计算机中窃取私钥并将其发送给攻击者。其他类型的恶意软件作用于受害者计算机的剪贴板：当用户复制钱包地址以在网站上输入时，该恶意软件会将此地址替换为另一个地址。受害者随后复制了错误的地址，将资金发送到欺诈性的公共地址。


    为降低此风险，用户应拥有干净、最新的操作系统和最先进的防病毒软件。此外，应仅从可信来源下载文件，并建议定期进行清理。


    总体而言，投资者应权衡托管风险与平台风险，并选择最合适的策略。例如，对大多数投资者来说，分散资金使其不全都面临同类型风险，可能是一种可取策略。


    # 预言机风险


    黑客也可以间接攻击投资者。例如，他们可以操纵流入智能合约的预言机输出。这种风险在 DeFi 和预测市场中尤为重要。


    例如，设想一个包含基于体育赛事结果（由预言机提供信息）而进行条件支付的智能合约，攻击者可以操纵数据源。智能合约的安全性直接取决于底层预言机的安全性。即使预言机在技术上可靠，也应考虑通过贿赂或敲诈进行腐败的风险。


    降低此风险的一种方法是在合约中使用多个数据源。或者，可以基于声誉机制或激励方案来选择预言机，以促使它们持续提供准确可靠的数据。


    # DDoS 攻击


    分布式拒绝服务（DDoS）攻击是一种网络攻击，通过向网络注入大量流量来阻止其正常运行，从而破坏网络运营。对于依赖部分中心化网络来运行（例如处理交易）的加密资产而言，DDoS
    攻击的风险是相关的。


    DDoS 攻击风险较低的加密资产使用强大且具有弹性的网络基础设施。例如，它们可以包括负载均衡和流量过滤，以将流量分配到多台服务器上，防止单个服务器不堪重负。有效去中心化的网络架构可缓解此风险，因为网络操作分散在许多计算机上。其具有多重冗余的设计使得攻击者更难瞄准并压垮网络的特定部分。因此，处理信息流的节点去中心化程度低会增加加密资产的风险。

    '
- fmt: '# Scams and Market Manipulation


    As the cryptoasset industry is still relatively young and known to have provided
    exceptional returns in the past decade, unscrupulous groups may seek to take advantage
    of greedy investors through deceptive practices. One traditional type of scam
    is the Ponzi scheme, where investors are offered high rates of returns but paid
    with funds from new investors. While such schemes may go undetected during their
    growth phase, they eventually collapse when a sufficient number of investors withdraw
    their money and notice insufficient assets back the claims. Countless other scam
    practices exist, from unsolicited investment offers to fraudulent marketing of
    non-existent projects.


    Market manipulation happens through pump-and-dump schemes, where a wealthy group
    heavily promotes a specific cryptoasset and possibly even buys much of it to pump
    the price. Then, as speculators join the exuberance, the price continues to rise
    until the wealthy group sells all of its holdings, pocketing a significant profit
    and leaving most other investors with a loss and the pumped token worthless.


    Of course, these practices are illegal, but they are present in the cryptoasset
    industry nonetheless. The fall of the FTX empire in the last months of 2022 illustrates
    this well. Not only was FTX committing fraud through Ponzi schemes and market
    manipulation, but also accounting fraud, equity fraud, and multiple other illegal
    practices. As a result, the empire went from a $32 billion valuation at the beginning
    of the year to bankruptcy in November, bringing countless other companies down
    in its wake.


    While the collapse of one of the largest cryptoasset exchanges is a hit to the
    industry’s reputation and ruined innumerable investors, there may be a silver
    lining to this debacle. In the following months, an unprecedented number of centralized-exchange
    investors embraced the decentralized spirit of cryptoassets and moved their funds
    toward self-custody. Indeed, the collapse of FTX was not a problem underlying
    the cryptoasset industry but a problem of centralization; ironically, it is precisely
    the problem that cryptoassets are solving. In addition, all other exchanges became
    much more heavily scrutinized, required to provide their proof of reserve, and
    held to much higher regulatory and transparency standards.


    Despite these developments, FTX is undoubtedly not the last scam to hit the finance
    and cryptoasset industries. Therefore, researching companies, platforms, and protocols
    is of utmost importance, as well as diversifying funds to spread risks to the
    extent possible.


    ## Decentralized Insurance


    One way to minimize several risks mentioned above is to subscribe to centralized
    or decentralized insurance. While centralized insurance is not new, the decentralized
    model provides different incentives to the other side of the trade. Decentralized
    insurance, or `blockchain-based insurance`, can be smart contracts, where the
    terms are triggered upon the occurrence of an insured event. Alternatively, a
    decentralized insurance platform can pool funds via smart contracts, then let
    users who contributed to the pool vote on claims. Insurances can cover, for example,
    exchange hacks or exploited weaknesses in a poorly coded smart contract. Decentralized
    insurance platforms include Etherisc and Nexus Mutual.


    ## Key Concepts


    Diligent investors should understand the risks related to cryptoassets. As of
    2023, the market typically misidentifies and misunderstands many such risks. For
    example, a 51%-attack risk or double-spend risk is often mentioned in cryptoasset
    articles but is actually close to non-existent and harmless. The same applies
    to the risks implied by the emergence of quantum computers. Similarly, one argument
    put forward by cryptoasset skeptics is that governments would not allow cryptoassets
    to eclipse their own fiat currencies; however, it is not in a government’s interest
    to fight cryptoasset head-on, and they likely do not even have the technical capacity
    to prevent such assets to spread. This risk is, therefore, also not as crucial
    as some literature may suggest. Other risks, in contrast, are not much discussed
    but are far more likely and could cause much more harm to investors; for example,
    the risk of a developer’s mistake or purposeful sabotaging.


    Nevertheless, most risks can be mitigated or even fully insured against. The diligent
    investor’s first step is acknowledging these risks and then managing them appropriately.
    Where relevant, such risks should also be considered while valuing cryptoassets.


    ## Extension Questions


    Which risks are you facing for your own investments?


    What can you do to mitigate these risks?


    How can risks be incorporated in cryptoasset valuations?


    Are ordinals inscriptions a risk for the functioning of the Bitcoin blockchain?


    Can a PoS consensus mechanism genuinely incentivize decentralization?


    Footnotes [1](#600732_1_En_13_Chapter.xhtml#Fn1_source) [2](#600732_1_En_13_Chapter.xhtml#Fn2_source)


    # Financial Risk Management


    > *Risk is a function of how poorly a strategy will perform if the “wrong” scenario
    occurs.*

    >

    > —Michael Porter


    Similar to non-financial risk, financial risk is higher for cryptoassets than
    traditional investments. For example, as introduced in Chapter [4](#600732_1_En_4_Chapter.xhtml),
    the most traditional measure of financial risk is volatility, expressed as the
    standard deviation of returns. Downward volatility is another helpful metric used
    as an input to compute the Sortino ratio, which was introduced in the same chapter.
    Both metrics indicate risk levels much higher for cryptoassets than stocks, for
    instance. These increased risks are only acceptable for investors because the
    level of expected return is correspondingly higher for cryptoassets. In any case,
    other metrics are necessary to fully understand the risk profile of cryptoassets;
    where possible, forward-looking metrics are especially beneficial.


    Responsible investors should understand not only an investment’s risk profile
    but also their personal situation. Indeed, the perceived risk of an investment
    depends critically on the investor’s circumstances. For example, a young investor
    with a long-term horizon will not perceive risk the same way as a seasoned investor
    with a time horizon of only a few years or months. Also, an investor with a stable
    income and promising career opportunities will not give the same importance to
    financial risk as an investor whose living standards depend on capital gains.
    This chapter defines multiple types of financial risks (e.g., credit, liquidity,
    and market risks), then introduces some metrics to assess them and approaches
    to mitigate them (e.g., value at risk, shortfall risk, expected shortfall, stress
    testing). Admittedly, this chapter is aimed toward more finance-affine readers,
    such as institutional investors considering large investments in cryptoassets.
    Still, it gives all readers a base to understand how financial risks can be measured
    for cryptoassets.'
