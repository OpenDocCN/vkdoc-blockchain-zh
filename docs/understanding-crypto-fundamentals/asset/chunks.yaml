    \nBlockchain-enabled payment flow. A money transfer from Alice to Bob does not\
    \ require any intermediary\n\nAlso, a blockchain transaction can settle instantly\
    \ at any time of the day or night, regardless of public holidays. In contrast,\
    \ traditional money transfers are much slower. When you tap your credit card at\
    \ a supermarket counter to buy groceries, it takes several days to settle, even\
    \ if the transaction is cleared in seconds. For international money transfers,\
    \ it can take weeks.\n\nAnother difference to traditional ledger systems is that\
    \ a blockchain facilitates the *auditability* of any transaction or account since\
    \ all transactions that ever happened are transparent and easily retrievable.\
    \ Therefore, the audit is no longer a sample-based, time-consuming, and expensive\
    \ process in the year after financial books closure. Instead, it becomes an exhaustive\
    \ and continuous process, as the network instantly validates every transaction.\n\
    \nTherefore, the real value of blockchain is not just a fancy new way to organize\
    \ data in a ledger. Blockchain is different because it removes the cost of trust\
    \ from transactions. It removes frictions implied by sharing data with unknown\
    \ third parties, such as banks. In addition, it shortens the waiting time to settle\
    \ transactions from days to minutes. It also shrinks direct (e.g., transaction\
    \ fees) and indirect costs (accounting, auditing, and issue settlement). By removing\
    \ these frictions, blockchain can stimulate commerce and enable greater economic\
    \ development, especially for those in need, such as the 2 billion people currently\
    \ unbanked [28].\n\n## Key Concepts\n\nBlockchain, part of distributed ledger\
    \ technologies, was developed to enable Bitcoin to work. It is a database with\
    \ the special characteristics of being decentralized, immutable, and pseudonymous.\
    \ In particular, it enables the transfer of ownership of digital information without\
    \ requiring trusting a third party. By removing the cost of trust, blockchains\
    \ enable higher economic activity at lower costs.\n\nIt uses cryptography and\
    \ consensus mechanisms to ensure data consistency despite its decentralized nature.\
    \ Different consensus protocols exist, with different strengths and weaknesses,\
    \ making them more appropriate in some cases and less in others, for example,\
    \ for private blockchains or public blockchains.\n\nBlockchain is a powerful new\
    \ tool, but it will not replace all databases. Actually, most databases do neither\
    \ need to be decentralized nor immutable.\n\n## Extension Questions\n\nAssume\
    \ you own ten bitcoins—each priced at $50,000—when a hard fork happens. Half the\
    \ miners continue mining one branch of the fork and the other half the other.\
    \ One block after the fork, how much is your portfolio worth?\n\nWhy was money\
    \ the first use-case of blockchain?\n\nHow can you escape the scalability trilemma?\n\
    \nIf you were to create a cryptoasset meant to be used as money, which (existent\
    \ or non-existent) consensus mechanism would be most appropriate?\n\nFootnotes\
    \ [1](#600732_1_En_6_Chapter.xhtml#Fn1_source)   [2](#600732_1_En_6_Chapter.xhtml#Fn2_source)\
    \   [3](#600732_1_En_6_Chapter.xhtml#Fn3_source)   [4](#600732_1_En_6_Chapter.xhtml#Fn4_source)\
    \   [5](#600732_1_En_6_Chapter.xhtml#Fn5_source)   [6](#600732_1_En_6_Chapter.xhtml#Fn6_source)\n\
    \n# 7. Cryptoasset Taxonomies\n\n> *All classifications in this world lack sharp\
    \ boundaries, and all transitions are gradual.*\n> \n> —Aleksandr Solzhenitsyn\n\
    \nNote this book’s recurrent use of the word *cryptoasset* rather than the more\
    \ common term *cryptocurrency*. This distinction is purposeful, as cryptoassets\
    \ encompass many more assets than only those meant to be currencies.\n\nFormally,\
    \ cryptoassets are digital assets secured by cryptography on a public ledger and\
    \ created, managed, and exchanged on decentralized peer-to-peer networks.^([^(66)](#fn66))\
    \ In comparison, cryptocurrencies are one subcategory of cryptoassets. In traditional\
    \ finance, currencies, stocks, bonds, commodities, real estate, and collectibles,\
    \ among others, are all assets. Similarly, in the crypto universe, cryptoassets\
    \ are divided into multiple categories.\n\nClassifying cryptoassets is essential\
    \ to value them accurately. Indeed, possible classifications inform how legislators\
    \ might regulate and tax cryptoassets in the future. In turn, regulations and\
    \ tax rules influence these assets’ growth potential and risk profile. This chapter\
    \ aims to provide some clarity on possible crypto taxonomies.\n\n## Challenges\
    \ with Setting up a Cryptoasset Taxonomy\n\nIn a perfect world, a cryptoasset\
    \ taxonomy would have categories that are mutually exclusive (an asset falls in\
    \ only one category), commonly exhaustive (all assets have a category where they\
    \ fit), and immutable (the taxonomy does not change over time). However, such\
    \ a taxonomy is impossible as boundaries between subcategories of cryptoassets\
    \ are blurry and rapidly changing, and new use cases are constantly emerging.\
    \ Therefore, a more realistic taxonomy for cryptoassets should be constantly updated\
    \ to reflect market developments.\n\nAs an example of the evolution of taxonomies,\
    \ take privacy coins. Privacy coins used to be a helpful category, but now many\
    \ tokens use an element of privacy in their architecture. As a result, privacy\
    \ evolved from the core function of some cryptoassets to merely an attribute they\
    \ can take. There are now many possible variations to achieve privacy and various\
    \ levels of privacy.\n\nAnother challenge in categorizing cryptoassets is the\
    \ criteria for the splits. For example, if one tried to make a taxonomy of sport\
    \ types, one could wonder whether to split them according to team sports vs. individual\
    \ sports or ball-based sports vs. others. For sports, as for cryptoassets, there\
    \ are multiple ways to start a taxonomy. The following sections present some possible\
    \ such ways."
  trans: "\n# 为什么区块链与众不同？\n\n首先，区块链与传统账本的不同之处在于，它实现了信息的*无需信任*（trustless）交换。这并非指系统中或交易对手之间不存在信任，而是说信任这个要素变得无关紧要。更具体地说，无需信任任何其他方；只需信任网络的持续性。\n\
    \n支付网络是众多可能例子中的一个，但它很容易理解，因为它是区块链的第一个应用。在传统支付系统中，需要信任多个中介机构。当爱丽丝向鲍勃汇款时，双方都必须信任各自的商业银行、实现转账的网络（例如\
    \ SWIFT 网络）以及该国的中央银行。当支付涉及跨国时，中介机构的数量会进一步增加。相比之下，区块链不依赖任何中央权威机构，从而消除了这些多余的步骤和对任何第三方的信任需求。\n\
    \n![](img/600732_1_En_6_Fig18_HTML.png)\n\n一个说明性的流程图。爱丽丝、爱丽丝的商业银行、爱丽丝商业银行的支付网络、中央银行、鲍勃商业银行的支付网络、鲍勃的商业银行以及鲍勃。\n\
    \n图 6-18\n\n传统支付流程。一笔从爱丽丝到鲍勃的汇款需要多个中介机构\n\n在区块链的情况下，信任仅被置于加密算法之上，而该算法是开源的，所有人都可以看到。\n\
    \n![](img/600732_1_En_6_Fig19_HTML.png)\n\n一个流程图，显示爱丽丝通过区块链向鲍勃进行支付。\n\n图 6-19\n\
    \n基于区块链的支付流程。一笔从爱丽丝到鲍勃的汇款不需要任何中介机构\n\n此外，区块链交易可以在白天或晚上的任何时间即时结算，无论是否公共假日。相比之下，传统的资金转账要慢得多。当你在超市柜台刷卡购买食品杂货时，即使交易在几秒钟内被清算，也需要几天才能完成结算。对于国际汇款，则可能需要数周时间。\n\
    \n与传统账本系统的另一个区别在于，由于所有发生过的交易都是透明且易于检索的，区块链促进了对任何交易或账户的*可审计性*（auditability）。因此，审计不再是在财务账簿结账后一年才进行的、基于样本的、耗时且昂贵的过程。相反，它变成了一个详尽且持续的过程，因为网络会即时验证每一笔交易。\n\
    \n因此，区块链的真正价值不仅仅是在账本中组织数据的一种新奇方式。区块链之所以与众不同，是因为它消除了交易中的信任成本。它消除了与未知第三方（如银行）共享数据所带来的摩擦。此外，它将交易结算的等待时间从几天缩短到几分钟。它还减少了直接成本（例如交易手续费）和间接成本（会计、审计和问题处理成本）。通过消除这些摩擦，区块链可以刺激商业活动并促进更大的经济发展，特别是对于那些有需求的人，例如目前*无银行账户*的\
    \ 20 亿人口 [28]。\n\n# 关键概念\n\n区块链作为分布式账本技术的一部分，是为了让比特币能够运行而开发的。它是一个具有去中心化、不可篡改和假名化等特殊特性的数据库。特别是，它使得无需信任第三方即可实现数字信息所有权的转移。通过消除信任成本，区块链能够以更低的成本实现更高的经济活动。\n\
    \n它使用密码学和共识机制来确保数据一致性，尽管其具有去中心化的性质。存在不同的共识协议，各有其优缺点，这使得它们在有些情况下（例如用于私有区块链或公有区块链）更为合适，而在其他情况下则不然。\n\
    \n区块链是一个强大的新工具，但它不会取代所有的数据库。实际上，大多数数据库既不需要去中心化，也不需要不可篡改。\n\n# 扩展问题\n\n假设你拥有十个比特币——每个价值$50,000——此时发生了一次硬分叉。一半的矿工继续挖掘分叉的一个分支，另一半挖掘另一个分支。在分叉后的一个区块，你的投资组合价值是多少？\n\
    \n为什么货币是区块链的第一个用例？\n\n你如何逃脱可扩展性三难困境？\n\n如果你要创建一种旨在用作货币的加密资产，哪种（现有的或非现有的）共识机制最合适？\n\
    \n脚注 1 2 3 4 5 6\n\n# 7. 加密资产分类法\n\n> *这个世界上所有的分类都缺乏明确的界限，所有的转变都是渐进的。*\n> \n>\
    \ —亚历山大·索尔仁尼琴\n\n请注意本书反复使用“*加密资产*”（cryptoasset）一词，而非更常见的术语“加密货币”。这种区分是有意为之，因为加密资产涵盖的资产远多于那些仅旨在作为货币的资产。\n\
    \n正式地讲，加密资产是在公共账本上通过密码学保护，并在去中心化的点对点网络上创建、管理和交换的数字资产。相比之下，加密货币是加密资产的一个子类别。在传统金融中，货币、股票、债券、大宗商品、房地产和收藏品等都属于资产。类似地，在加密世界中，加密资产也被分为多个类别。\n\
    \n对加密资产进行分类对于准确评估其价值至关重要。确实，可能的分类方式可以告知立法者未来将如何监管和对加密资产征税。反过来，监管和税收规则又会影响这些资产的增长潜力和风险状况。本章旨在为可能的加密资产分类法提供一些清晰的见解。\n\
    \n## 建立加密资产分类法面临的挑战\n\n在理想世界中，加密资产分类法应具有互斥性（一个资产只属于一个类别）、完全穷尽性（所有资产都有其适合的类别）和不变性（分类法不随时间改变）的类别。然而，这样的分类法是不可能的，因为加密资产子类别之间的界限是模糊且快速变化的，新的用例不断涌现。因此，更现实的加密资产分类法应不断更新以反映市场发展。\n\
    \n以隐私币为例，说明分类法的演变。隐私币曾经是一个有用的类别，但现在许多代币在其架构中都使用了隐私元素。因此，隐私从某些加密资产的核心功能演变为仅仅是一个可以具备的属性。现在有许多种可能的方式来实现隐私，以及不同级别的隐私。\n\
    \n对加密资产进行分类的另一个挑战是划分标准。例如，如果试图对运动类型进行分类，人们可能会考虑是根据团队运动与个人运动，还是基于球的运动与其他运动来进行划分。对于运动，就像对加密资产一样，有多种方式可以开始构建分类法。以下各节将介绍一些可能的此类方式。\n"
- fmt: '# Cryptoasset Taxonomy by Form and Function


    In their 2017 bestseller *Cryptoassets*, Chris Burniske and Jack Tatar divided
    cryptoassets into three categories [29].


    - **Cryptocurrencies** are cryptographically secured digital currencies that can
    be exchanged over a network.

    - **Cryptocommodities** are raw digital resources that can be used as input for
    a finished good.

    - **Cryptotokens** are finished digital goods and services.


    An organizational chart classifies crypto assets as crypto currencies, crypto
    commodities, and crypto tokens.


    **Figure 7-1** — Categorization of cryptoassets, according to Burniske and Tatar
    [29]


    This early classification enabled the differentiation of cryptoassets according
    to one fundamental characteristic: their form. However, it is also possible to
    build on this taxonomy by splitting categories further, based on their function,
    as illustrated in Figure [7-2](#600732_1_En_7_Chapter.xhtml#Fig2) for cryptocurrencies
    and Figure [7-3](#600732_1_En_7_Chapter.xhtml#Fig3) for cryptocommodities.^([^(67)](#fn67))


    An organizational chart classifies crypto commodities as follows with some examples.
    Platform protocols with `Polkadot`, `Kadena`, and `Neo`, interoperability with
    `Cosmos`, `Quant`, and `ICON`, and oracles with `Chainlink`, `Witnet`, and `Provable`.


    **Figure 7-3** — Subcategories of cryptocommodities, with some examples


    An organizational chart classifies cryptocurrencies as the following with some
    examples. Digital store of value with bitcoin, medium of transactions with bitcoin
    cash and `Dogecoin`, privacy coins with `Monero`, `Dash` and Z cash, and stable
    coins with `Teter`, coinbase coins, `Maker` and `Basecoin`.


    **Figure 7-2** — Subcategories of cryptocurrencies, with some (possibly controversial)
    examples


    The cryptotoken category similarly divides further, but the number of subcategories
    would be large (dozens) and the market size of each subcategory very small.


    The following sections analyze some subcategories of cryptoassets. The objective
    is neither to describe how any of them works in detail nor to be exhaustive but
    to give a high-level overview of what the general crypto ecosystem looks like
    and what functions cryptoassets may provide.


    ## Cryptocurrencies


    The following subsections follow the structure in Figure [7-2](#600732_1_En_7_Chapter.xhtml#Fig2).


    ### Digital Store of Value


    A store of value asset keeps or increases its purchasing power over time. It is
    quite different from keeping its nominal value. For example, one US dollar from
    100 years ago is still one US dollar today, but it did not keep its value. While
    it could buy a certain amount of goods and services at the time (such as a complete
    meal in a major city), it can only buy a fraction of these goods and services
    today. The US dollar kept its nominal value but not its real value. It is not
    an effective store of value.


    ### Medium of Exchange


    Some cryptoassets are (meant to be) used as a medium of exchange for daily transactions.
    Such assets would optimally have a quick settlement time and broad commercial
    adoption. Optimal currency coins would also be fully fungible: one would not value
    one coin differently from another (for example, based on the transaction history
    of that coin).


    ### Privacy Coins


    Privacy coins are both a subcategory of currency coins and a function implementable
    in any fungible cryptoasset. As a reminder, Bitcoin is not anonymous but pseudonymous.
    A user’s pseudonym is used to transact bitcoins, but the quantity of bitcoins
    held by the pseudonym and every transaction that ever happened is open for anybody
    to see. In comparison, privacy coins provide anonymity to users. The algorithms
    behind privacy coins use technologies such as ring signatures to prove that the
    money transfer is valid, but without revealing from where it comes.


    ### Stablecoins


    A stablecoin is a cryptocurrency tracking the value of a fiat currency or another
    asset. For example, they can track the US dollar’s or gold’s value. Stablecoins
    can peg to the other asset’s value in several ways. In particular, tangible assets
    can back the stablecoin (US dollars or gold in a vault), or an algorithm can synthetically
    reproduce the peg.


    Stablecoins benefit from low volatility in comparison to other cryptoassets. However,
    the ones pegged to fiat currencies indirectly lose desirable characteristics of
    cryptoassets, such as decentralization and trustlessness. Furthermore, due to
    the underlying currency’s inflation rate, they are also subject to the same loss
    of value over time as fiat currencies, making them poor stores of value.


    ### Alternative Cryptocurrency Taxonomy


    Another helpful distinction among cryptocurrencies is their emitter. In their
    2018 bestseller book *Blockchain Revolution* (updated edition), Don Tapscott and
    Alex Tapscott divide cryptocurrencies into three categories [30].


    1. Self-organizing cryptocurrencies

    2. Corporate cryptocurrencies

    3. State-based cryptocurrencies


    Bitcoin is an example of a *self-organizing cryptocurrency*. No centralized party
    manages it, and it is open for anyone to join. Of the three categories, it is
    the only one that is decentralized.


    `Diem` (formerly `Libra`) is an example of *corporate cryptocurrency*, as it was
    initiated by a corporation, Meta (known as Facebook at the time), even though
    it is managed by an independent not-for-profit organization, in which Meta is
    merely a member.


    China’s Digital Currency Electronic Payment (`DCEP`) (“digital yuan”) is an example
    of *state-based cryptocurrency* issued by the country’s central bank, the People’s
    Bank of China. State-based cryptocurrencies, sometimes called Central Bank Digital
    Currencies (`CBDC`), provide the issuing authority with unprecedented oversight
    and control over the money flows among the currency users. Moreover, compared
    to fiat currencies, the `CBDC` issuing authority’s censorship ability is not only
    maintained but even greatly strengthened. For example, China is exploring expiration
    dates with its digital yuan. If unused by a specific time, the yuan you earned
    may expire and be made worthless. Alternatively, the issuing authority could target
    certain tranches of the population or even specific people to implement ad-hoc
    taxes or money confiscation. While decentralized cryptoassets empower people and
    free them from abusive authorities, `CBDC`s are just the opposite, the base for
    a real-world monetary dystopia where a central authority is all-powerful.


    ## Cryptocommodities


    The following subsections follow the structure in Figure [7-3](#600732_1_En_7_Chapter.xhtml#Fig3).


    ### Platform Protocols or Smart Contract Platforms


    Smart contract platforms (or platform protocols) enable users to pay for smart
    contracts. For example, Ethereum requires to pay “gas fees” to run smart contracts
    on its blockchain. The term *gas fees* is a good analogy. The platform (Ethereum)
    is like a network of roads enabling cars (applications) to travel (run). Gasoline
    demand, and therefore its price, depends on the number of cars on the road, their
    size, and how much they ride. Ethereum works similarly: the more people want to
    run smart contracts, the higher the gas fees. Moreover, similar to bigger cars
    requiring more gasoline, bigger contracts also require more gas. Gas fees are
    therefore working as a supply-and-demand-based incentive for optimizing the network.


    ### Interoperability


    Interoperability services enable cryptoassets to interact from one blockchain
    to another. As an analogy, Microsoft Teams works on Windows, Linux, and Apple
    computers without users knowing their counterparty’s operating system. Unfortunately,
    cryptoassets are not interoperable yet, but several cryptoasset services are working
    on solving this issue.'
