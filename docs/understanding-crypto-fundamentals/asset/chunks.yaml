- fmt: "# Key Concepts\n\nBitcoin’s price has grown exponentially since its inception\
    \ and has driven the growth of the crypto market. It went through three four-year\
    \ cycles, prompted by its halving events. In particular, the steepest price increases\
    \ happened after every halving, for a duration (from halving to peak) equivalent\
    \ to the duration from the cycle’s bottom to its halving. Bitcoin remained the\
    \ largest cryptoasset throughout its existence, though its dominance decreased\
    \ over time as more cryptoassets emerged. While the cryptoasset market went through\
    \ high peaks followed by sharp price drops, it follows Gartner’s hype cycle for\
    \ emerging technologies for each subinnovation in this asset class (e.g., Bitcoin,\
    \ smart contracts, Web 3.0/NFTs). Besides, specific calendar dates are likely\
    \ to significantly impact prices, especially year-ends and quarter-ends, as investment\
    \ funds rebalance their portfolios or lock in gains by selling. A useful metric\
    \ to identify market sentiment at purchase or sale dates is `alternative.me`’s\
    \ Fear & Greed Index.\n\nFinally, cryptoasset adoption in 2023 is similar to Internet\
    \ adoption in the late 1990s in terms of the number of users; however, crypto\
    \ adoption is happening much faster than the adoption of the Internet at the time.\n\
    \n# Extension Question\n\nWhat is likely to happen to Bitcoin’s 4-year cycle for\
    \ the coming two cycles, regarding size and duration?\n\nWhat would cause Bitcoin\
    \ to enter a supercycle?\n\nWhich fundamentals explain the very similar price\
    \ pattern experienced in each of the previous three Bitcoin cycles and will this\
    \ pattern continue?\n\nFootnotes [1](#600732_1_En_9_Chapter.xhtml#Fn1_source)\
    \ [2](#600732_1_En_9_Chapter.xhtml#Fn2_source) [3](#600732_1_En_9_Chapter.xhtml#Fn3_source)\
    \ [4](#600732_1_En_9_Chapter.xhtml#Fn4_source) [5](#600732_1_En_9_Chapter.xhtml#Fn5_source)\
    \ [6](#600732_1_En_9_Chapter.xhtml#Fn6_source) [7](#600732_1_En_9_Chapter.xhtml#Fn7_source)\
    \ [8](#600732_1_En_9_Chapter.xhtml#Fn8_source)\n\n# 10. Prime Time\n\n> *The individual\
    \ investor should act consistently as an investor and not as a speculator.*\n\
    > \n> —Benjamin Graham\n\nAs of this writing, the cryptoasset market is not mature\
    \ yet. Nevertheless, trends indicate that the sector’s maturity is rapidly improving\
    \ as the market evolves. This chapter identifies characteristics temporarily holding\
    \ cryptoassets back. Improvements in any of these characteristics increase the\
    \ fundamental value of cryptoassets. In particular, cryptoasset prime time will\
    \ only happen once these characteristics reach a sufficient maturity level.\n\n\
    ## Liquidity\n\nIn finance, liquidity is the ability of investors, big or small,\
    \ to buy or sell an asset quickly at a fair market price without impacting the\
    \ price of that asset. As of 2023, the liquidity of the cryptoasset market is\
    \ well below that of large asset classes.\n\nThe foreign exchange market for major\
    \ currency pairs, say `EUR/USD` for example, is highly liquid. Major organizations\
    \ can buy or sell billions of `EUR` for `USD` with a negligible impact on the\
    \ price. The equivalent of several trillion `USD` changes hands daily in the foreign\
    \ exchange market as a whole.\n\nIn comparison, Bitcoin’s average daily volume\
    \ was “only” around $26 billion in early 2023^([^(88)](#fn88)) or less than 1%\
    \ of the foreign exchange market’s liquidity.\n\nHowever, cryptoasset liquidity\
    \ is rapidly growing with adoption. Over the last ten years, on average, transaction\
    \ volume (in `USD`) more than doubled every year. For example, Bitcoin’s liquidity\
    \ has grown three orders of magnitude since October 2014.\n\n![](images/600732_1_En_10_Chapter/600732_1_En_10_Fig1_HTML.jpg)\n\
    \nA line graph of value in `USD` millions from October 2014 to January 2023. The\
    \ line follows an increasing trend with fluctuations throughout.\n\n**Figure 10-1**\
    \ Bitcoin transaction volume in `USD` millions (log chart) from October 2014 to\
    \ January 2023\n\n## DEX Accessibility\n\nWhile the promises of decentralized\
    \ exchanges (`DEX`) are manifold, they are not broadly usable by the public yet.\
    \ They are technically accessible, but as of this writing, they are very complex.\
    \ In the same way the Internet in the 1990s was nowhere near user-friendly, `DEX`\
    \ usage requires extensive user knowledge. Users must thoroughly understand what\
    \ they are doing and have the grit to go through convoluted processes, often looking\
    \ shady and untested.\n\nHowever, developers are working toward simplifying `DEX`\
    \ platforms and reducing underlying risks. Ultimately, using a `DEX` should be\
    \ as simple as sending an email, but we are not there yet.\n\n## Layer 1s Interoperability\n\
    \nAs of 2022, bridges between layer 1s (e.g., Ethereum, Cardano, Solana, Polkadot)\
    \ are limited. Continuing the parallel to the Internet, it is as if one could\
    \ not surf from one website to another. Properly tested and functional interoperability\
    \ bridges are under development but not widespread yet.\n\n## Exchange-Traded\
    \ Funds (ETF) Availability\n\nThe absence of spot crypto `ETF`s in many countries\
    \ (especially the United States)^([^(89)](#fn89)) limits many institutional investors\
    \ from investing in the crypto asset class. This limitation induces less attention\
    \ given to the asset class than would be the case otherwise and, therefore, less\
    \ effort provided to growing the ecosystem. A spot `ETF` approval for a major\
    \ cryptoasset (Bitcoin and Ethereum will likely be the first ones to get such\
    \ an approval) in the United States (and in other countries that currently lack\
    \ it) would open the door to many more investors, which would increase scrutiny\
    \ and decrease regulatory uncertainty for the industry.\n\n## Formal Taxonomy\n\
    \nAs covered in Chapter [7](#600732_1_En_7_Chapter.xhtml), formal taxonomies have\
    \ been introduced recently, such as the `DACS` in December 2021. These taxonomies\
    \ enable funds to allocate their investments according to a formal structure,\
    \ facilitating portfolio attribution and reporting. However, investors worldwide\
    \ have not adopted a single taxonomy yet.\n\nIn contrast, the Global Industry\
    \ Classification Standard (`GICS`) is a worldwide benchmark for equities. Cryptoassets\
    \ need something similar. A broadly recognized single taxonomy backed by authorities\
    \ (e.g., the `SEC`) brings higher transparency and clarity to the market. Specifically,\
    \ it reduces uncertainty about how specific cryptoassets will be regulated in\
    \ the future, particularly whether they will be treated as securities. It also\
    \ contributes to increased comparability across funds and, ultimately, it would\
    \ likely justify more investments in cryptoassets.\n\n## Regulation\n\nPerhaps\
    \ the most critical obstacle to cryptoasset market maturity is its lack of consistent\
    \ regulation. While excessive regulation is clearly not conducive to effective\
    \ financial markets, no regulation is not either. The first decade of the existence\
    \ of cryptoassets was the equivalent of the wild west in terms of regulation.\
    \ Countries treated cryptoasset trades differently, with different classifications\
    \ and tax rates. They allowed disparate levels of access to cryptoassets, even\
    \ with some countries banning access altogether. In most jurisdictions, there\
    \ were neither rules nor oversight, leaving the door open to market manipulations\
    \ (e.g., “pump-and-dump” schemes) and hazardous projects hiding as safe investments.\n\
    \nHere again, material changes happened in the early 2020s. For example, the proposed\
    \ regulation `Markets in Crypto Assets (MiCA)` in EU law forms the cryptoasset\
    \ equivalent of the corresponding regulation for securities, investment intermediaries,\
    \ and trading venues (i.e., the `Markets in Financial Instruments Directive (MiFID)`).\
    \ Under Biden’s administration, the US Treasury also developed a framework for\
    \ international crypto regulation. These pieces of regulation aim to increase\
    \ investors’ protection and level the regulatory playing field across jurisdictions.\
    \ If these upcoming regulations achieve their aims without materially distorting\
    \ the market, significant benefits for the crypto sector will ensue."
  raw: "## Key Concepts\n\nBitcoin’s price has grown exponentially since its inception\
    \ and has driven the growth of the crypto market. It went through three four-year\
    \ cycles, prompted by its halving events. In particular, the steepest price increases\
    \ happened after every halving, for a duration (from halving to peak) equivalent\
    \ to the duration from the cycle’s bottom to its halving. Bitcoin remained the\
    \ largest cryptoasset throughout its existence, though its dominance decreased\
    \ over time as more cryptoassets emerged. While the cryptoasset market went through\
    \ high peaks followed by sharp price drops, it follows Gartner’s hype cycle for\
    \ emerging technologies for each subinnovation in this asset class (e.g., Bitcoin,\
    \ smart contracts, Web 3.0/NFTs). Besides, specific calendar dates are likely\
    \ to significantly impact prices, especially year-ends and quarter-ends, as investment\
    \ funds rebalance their portfolios or lock in gains by selling. A useful metric\
    \ to identify market sentiment at purchase or sale dates is alternative.me’s Fear\
    \ & Greed Index.\n\nFinally, cryptoasset adoption in 2023 is similar to Internet\
    \ adoption in the late 1990s in terms of the number of users; however, crypto\
    \ adoption is happening much faster than the adoption of the Internet at the time.\n\
    \n## Extension Question\n\nWhat is likely to happen to Bitcoin’s 4-year cycle\
    \ for the coming two cycles, regarding size and duration?\n\nWhat would cause\
    \ Bitcoin to enter a supercycle?\n\nWhich fundamentals explain the very similar\
    \ price pattern experienced in each of the previous three Bitcoin cycles and will\
    \ this pattern continue?\n\nFootnotes [1](#600732_1_En_9_Chapter.xhtml#Fn1_source)\
    \   [2](#600732_1_En_9_Chapter.xhtml#Fn2_source)   [3](#600732_1_En_9_Chapter.xhtml#Fn3_source)\
    \   [4](#600732_1_En_9_Chapter.xhtml#Fn4_source)   [5](#600732_1_En_9_Chapter.xhtml#Fn5_source)\
    \   [6](#600732_1_En_9_Chapter.xhtml#Fn6_source)   [7](#600732_1_En_9_Chapter.xhtml#Fn7_source)\
    \   [8](#600732_1_En_9_Chapter.xhtml#Fn8_source)\n\n# 10. Prime Time\n\n> *The\
    \ individual investor should act consistently as an investor and not as a speculator.*\n\
    > \n> —Benjamin Graham\n\nAs of this writing, the cryptoasset market is not mature\
    \ yet. Nevertheless, trends indicate that the sector’s maturity is rapidly improving\
    \ as the market evolves. This chapter identifies characteristics temporarily holding\
    \ cryptoassets back. Improvements in any of these characteristics increase the\
    \ fundamental value of cryptoassets. In particular, cryptoasset prime time will\
    \ only happen once these characteristics reach a sufficient maturity level.\n\n\
    ## Liquidity\n\nIn finance, liquidity is the ability of investors, big or small,\
    \ to buy or sell an asset quickly at a fair market price without impacting the\
    \ price of that asset. As of 2023, the liquidity of the cryptoasset market is\
    \ well below that of large asset classes.\n\nThe foreign exchange market for major\
    \ currency pairs, say EUR/USD for example, is highly liquid. Major organizations\
    \ can buy or sell billions of EUR for USD with a negligible impact on the price.\
    \ The equivalent of several trillion USD changes hands daily in the foreign exchange\
    \ market as a whole.\n\nIn comparison, Bitcoin’s average daily volume was “only”\
    \ around $26 billion in early 2023^([^(88)](#fn88)) or less than 1% of the foreign\
    \ exchange market’s liquidity.\n\nHowever, cryptoasset liquidity is rapidly growing\
    \ with adoption. Over the last ten years, on average, transaction volume (in USD)\
    \ more than doubled every year. For example, Bitcoin’s liquidity has grown three\
    \ orders of magnitude since October 2014.\n\n![](images/600732_1_En_10_Chapter/600732_1_En_10_Fig1_HTML.jpg)\n\
    \nA line graph of value in U S D millions from October 2014 to January 2023\\\
    . The line follows an increasing trend with fluctuations throughout.\n\nFigure\
    \ 10-1\n\nBitcoin transaction volume in USD millions (log chart) from October\
    \ 2014 to January 2023\n\n## DEX Accessibility\n\nWhile the promises of decentralized\
    \ exchanges (DEX) are manifold, they are not broadly usable by the public yet.\
    \ They are technically accessible, but as of this writing, they are very complex.\
    \ In the same way the Internet in the 1990s was nowhere near user-friendly, DEX\
    \ usage requires extensive user knowledge. Users must thoroughly understand what\
    \ they are doing and have the grit to go through convoluted processes, often looking\
    \ shady and untested.\n\nHowever, developers are working toward simplifying DEX\
    \ platforms and reducing underlying risks. Ultimately, using a DEX should be as\
    \ simple as sending an email, but we are not there yet.\n\n## Layer 1s Interoperability\n\
    \nAs of 2022, bridges between layer 1s (e.g., Ethereum, Cardano, Solana, Polkadot)\
    \ are limited. Continuing the parallel to the Internet, it is as if one could\
    \ not surf from one website to another. Properly tested and functional interoperability\
    \ bridges are under development but not widespread yet.\n\n## Exchange-Traded\
    \ Funds (ETF) Availability\n\nThe absence of spot crypto ETFs in many countries\
    \ (especially the United States)^([^(89)](#fn89)) limits many institutional investors\
    \ from investing in the crypto asset class. This limitation induces less attention\
    \ given to the asset class than would be the case otherwise and, therefore, less\
    \ effort provided to growing the ecosystem. A spot ETF approval for a major cryptoasset\
    \ (Bitcoin and Ethereum will likely be the first ones to get such an approval)\
    \ in the United States (and in other countries that currently lack it) would open\
    \ the door to many more investors, which would increase scrutiny and decrease\
    \ regulatory uncertainty for the industry.\n\n## Formal Taxonomy\n\nAs covered\
    \ in Chapter [7](#600732_1_En_7_Chapter.xhtml), formal taxonomies have been introduced\
    \ recently, such as the DACS in December 2021\\. These taxonomies enable funds\
    \ to allocate their investments according to a formal structure, facilitating\
    \ portfolio attribution and reporting. However, investors worldwide have not adopted\
    \ a single taxonomy yet.\n\nIn contrast, the Global Industry Classification Standard\
    \ (GICS) is a worldwide benchmark for equities. Cryptoassets need something similar.\
    \ A broadly recognized single taxonomy backed by authorities (e.g., the SEC) brings\
    \ higher transparency and clarity to the market. Specifically, it reduces uncertainty\
    \ about how specific cryptoassets will be regulated in the future, particularly\
    \ whether they will be treated as securities. It also contributes to increased\
    \ comparability across funds and, ultimately, it would likely justify more investments\
    \ in cryptoassets.\n\n## Regulation\n\nPerhaps the most critical obstacle to cryptoasset\
    \ market maturity is its lack of consistent regulation. While excessive regulation\
    \ is clearly not conducive to effective financial markets, no regulation is not\
    \ either. The first decade of the existence of cryptoassets was the equivalent\
    \ of the wild west in terms of regulation. Countries treated cryptoasset trades\
    \ differently, with different classifications and tax rates. They allowed disparate\
    \ levels of access to cryptoassets, even with some countries banning access altogether.\
    \ In most jurisdictions, there were neither rules nor oversight, leaving the door\
    \ open to market manipulations (e.g., “pump-and-dump” schemes) and hazardous projects\
    \ hiding as safe investments.\n\nHere again, material changes happened in the\
    \ early 2020s. For example, the proposed regulation Markets in Crypto Assets (MiCA)\
    \ in EU law forms the cryptoasset equivalent of the corresponding regulation for\
    \ securities, investment intermediaries, and trading venues (i.e., the Markets\
    \ in Financial Instruments Directive (MiFID)). Under Biden’s administration, the\
    \ US Treasury also developed a framework for international crypto regulation.\
    \ These pieces of regulation aim to increase investors’ protection and level the\
    \ regulatory playing field across jurisdictions. If these upcoming regulations\
    \ achieve their aims without materially distorting the market, significant benefits\
    \ for the crypto sector will ensue."
  trans: "\n# 关键概念\n\n比特币的价格自诞生以来呈指数级增长，并推动了加密市场的增长。它经历了三个四年周期，由减半事件触发。特别是，最剧烈的价格上涨发生在每次减半之后，其持续时间（从减半到峰值）相当于从周期底部到减半的持续时间。比特币在其整个存在期间一直是最大的加密资产，尽管随着更多加密资产的出现，其主导地位随时间推移而下降。虽然加密资产市场经历了高峰后的急剧下跌，但它遵循了高德纳针对新兴技术（如比特币、智能合约、Web\
    \ 3.0/NFT）每一子创新的炒作周期。此外，特定的日历日期可能对价格产生显著影响，尤其是年末和季末，因为投资基金重新平衡其投资组合或通过卖出锁定收益。一个用于识别买入或卖出日期市场情绪的有用指标是\
    \ `alternative.me` 的恐惧与贪婪指数。\n\n最后，2023 年加密资产的采用率在用户数量上类似于 1990 年代末的互联网采用率；然而，加密资产的采用速度远快于当时的互联网。\n\
    \n# 扩展问题\n\n未来两个周期中，比特币四年周期的规模和持续时间可能会发生什么变化？\n\n什么因素会导致比特币进入超级周期？\n\n哪些基本面因素解释了前三个比特币周期中出现的非常相似的价格模式，这种模式会持续吗？\n\
    \n脚注 1 2 3 4 5 6 7 8\n\n# 10. 黄金时代\n\n> *个人投资者应始终如一地作为投资者而非投机者行事。*\n> \n> ——本杰明·格雷厄姆\n\
    \n在撰写本书时，加密资产市场尚未成熟。然而，趋势表明随着市场的发展，该行业的成熟度正在迅速提高。本章识别了暂时限制加密资产发展的特征。这些特征中任何一项的改进都会增加加密资产的基本价值。特别是，只有当这些特征达到足够的成熟水平时，加密资产的黄金时代才会到来。\n\
    \n## 流动性\n\n在金融领域，流动性是指无论大小投资者，能够在不影响资产价格的情况下，以公平的市场价格快速买入或卖出资产的能力。截至 2023 年，加密资产市场的流动性远低于大型资产类别。\n\
    \n主要货币对的外汇市场（例如 `EUR/USD`）流动性很高。大型机构可以买入或卖出数十亿的 `EUR` 兑换成 `USD`，而对价格的影响微乎其微。整个外汇市场每天的交易额相当于数万亿美元。\n\
    \n相比之下，比特币在 2023 年初的日均交易量“仅”约为 260 亿美元^(⁸⁸)，不到外汇市场流动性的 1%。\n\n然而，加密资产的流动性正随着采用率的提高而迅速增长。在过去十年中，交易量（以\
    \ `USD` 计）平均每年增长一倍以上。例如，自 2014 年 10 月以来，比特币的流动性增长了三个数量级。\n\n![](img/600732_1_En_10_Fig1_HTML.jpg)\n\
    \n一张折线图，展示了从 2014 年 10 月到 2023 年 1 月以百万 `USD` 计的价值。该线呈上升趋势，并伴有波动。\n\n**图 10-1**\
    \ 从 2014 年 10 月到 2023 年 1 月比特币交易量（以百万 `USD` 计，对数图表）\n\n## DEX 的可访问性\n\n虽然去中心化交易所（`DEX`）的前景多种多样，但它们尚未被公众广泛使用。它们在技术上是可访问的，但截至撰写本书时，它们非常复杂。就像\
    \ 1990 年代的互联网远非用户友好一样，使用 `DEX` 需要用户具备广泛的知识。用户必须透彻理解自己在做什么，并有决心完成复杂的过程，这些过程通常看起来可疑且未经测试。\n\
    \n然而，开发人员正在努力简化 `DEX` 平台并降低底层风险。最终，使用 `DEX` 应该像发送电子邮件一样简单，但我们尚未达到那个目标。\n\n## 第一层互操作性\n\
    \n截至 2022 年，不同第一层（例如以太坊、卡尔达诺、Solana、波卡）之间的桥接是有限的。延续与互联网的类比，这就像无法从一个网站浏览到另一个网站。经过充分测试且功能正常的互操作性桥接正在开发中，但尚未普及。\n\
    \n## 交易所交易基金（ETF）的可获得性\n\n许多国家（尤其是美国）缺乏现货加密 `ETF`^(⁸⁹)，限制了众多机构投资者对加密资产类别的投资。这种限制导致该资产类别受到的关注少于本应获得的关注，因此，投入到生态系统发展上的努力也更少。美国（以及目前缺乏它的其他国家）批准主要加密资产（比特币和以太坊很可能是首批获得此类批准的加密资产）的现货\
    \ `ETF` 将为更多投资者打开大门，这将增加对该行业的审查并减少监管不确定性。\n\n## 正式分类法\n\n如第 7 章所述，最近引入了正式的分类法，例如\
    \ 2021 年 12 月的 `DACS`。这些分类法使得基金能够根据正式结构分配投资，从而促进投资组合归因和报告。然而，全球投资者尚未采纳单一分类法。\n\
    \n相比之下，全球行业分类标准（`GICS`）是股票市场的全球基准。加密资产需要类似的标准。一个得到权威机构（例如 `SEC`）支持的、被广泛认可的单一分类法将为市场带来更高的透明度和清晰度。具体来说，它减少了关于特定加密资产未来将如何被监管的不确定性，特别是它们是否会被视为证券。它还有助于提高基金之间的可比性，并最终可能会证明对加密资产的更多投资是合理的。\n\
    \n## 监管\n\n或许加密资产市场成熟的最大障碍是其缺乏一致的监管。虽然过度监管显然不利于有效的金融市场，但完全没有监管也不行。加密资产存在的头十年在监管方面相当于狂野西部。各国对加密资产交易的分类和税率不同，允许不同程度的准入，甚至有些国家完全禁止。在大多数司法管辖区，既没有规则也没有监督，为市场操纵（例如“拉高出货”计划）和伪装成安全投资的有害项目敞开了大门。\n\
    \n在这里，重大变化再次发生在 2020 年代初期。例如，欧盟法律中拟议的监管法规 `加密资产市场（MiCA）` 形成了与证券、投资中介机构和交易场所（即\
    \ `金融工具市场指令（MiFID）`）相应法规对等的加密资产版本。在拜登政府领导下，美国财政部也制定了一个国际加密监管框架。这些监管法规旨在增加投资者保护，并在各司法管辖区之间创造公平的监管环境。如果这些即将出台的法规能够在不过度扭曲市场的情况下实现其目标，加密行业将受益匪浅。\n"
- fmt: '## Historical Data


    Compared to other financial assets, cryptoassets have relatively few historical
    data points. In addition, the exceptional pace of growth of the market makes a
    large quantity of these data points irrelevant. Every year, the market is substantially
    different than in any previous year, so data points are quickly outdated. Furthermore,
    scaling solutions, crypto platforms, and other crypto services are still mainly
    in the development and implementation phases but not at the broad adoption phase
    yet. The longer the relevant history of cryptoassets, the more confidence the
    market has in the technology and its future, which drives further adoption.


    ## Awareness on Privacy


    When social media became mainstream in the late 2000s, privacy was barely on the
    radar of users and companies. Countless scandals, data breaches, and hacks exposed
    the importance of privacy and progressively increased the general public’s awareness
    of it. This process is still ongoing. With large companies collecting more personal
    data points on users at an ever-accelerating pace, users increasingly seek solutions
    to keep data confidential and secure. As privacy awareness grows, the privacy
    benefits of blockchain technology are likely to become increasingly desirable,
    providing additional appeal to cryptoassets offering higher levels of security
    for private data.


    ## Adoption As Means of Payment


    For cryptoassets to become means of payment, buyers must be willing to pay with
    cryptoassets, sellers must be willing to accept cryptoassets as payment, and easy-to-use
    technology must exist to match them. Though it sounds simple, these conditions
    are interdependent, as in a chicken-and-egg problem. For instance, buyers will
    only request to pay with cryptoassets if a sufficient number of sellers accept
    them and have the technology. Similarly, sellers will only acquire the technology
    if a sufficient number of buyers request to pay with cryptoassets.


    In the same way that Uber had to reach sufficient drivers and riders to give each
    group incentives to use their platform, the cryptoasset market must reach a critical
    mass of buyers and sellers before blooming. Only once a critical mass of each
    group exists will the market take on the feature of means of payment.


    ## Crypto Ecosystem


    The criteria discussed in this chapter do not evolve consecutively but in parallel.
    They are not independent from each other but intertwined. Indeed, every improvement
    in any characteristic impacts all others, in most cases, positively. For instance,
    higher liquidity is likely to increase adoption and the other way around, which
    are both likely to increase the need for regulation. At the same time, clearer
    and more consistent regulation will likely attract more crypto actors, increasing
    liquidity and the likelihood of ETF approvals. A whole ecosystem binds them together,
    with each filling specific functions to make the new asset class complete.


    In terms of actors, the ecosystem includes innovators (coders and developers),
    venture capitalists such as Andreessen Horowitz, institutions such as VISA or
    Goldman Sachs, NGOs such as the Chamber of Digital Commerce, academics, governments,
    regulators, and users. Each actor increases the acceptance of the whole crypto
    sector, which benefits all others.


    Crypto prime time will not happen when one specific event occurs. Instead, it
    is a continuous process relying on a set of characteristics and actors, all evolving
    in parallel and feeding on each other’s improvements. The crypto market fundamentals
    will improve on many fronts in parallel.


    Nevertheless, for the bullish cryptoasset investment thesis to materialize, there
    must be a catalyst: A specific event changing the game. For example, the burst
    of the housing market bubble in 2008 was the catalyst for the subsequent economic
    collapse. It uncovered an overheated market with many precarious and highly leveraged
    positions. Not only was the market unsustainable, but it needed something to spark
    the correction.


    A cryptoasset catalyst in the past was Tesla accepting Bitcoin as payment and
    adding it to its treasury in early 2021. These events sparked the subsequent upward
    movement of the crypto market. Similarly, while prime time does not depend on
    any specific event, one or a few catalysts will likely spark the market’s next
    leg up.


    ## Key Concepts


    As of early 2023, the cryptoasset market is not mature yet. However, major ongoing
    developments are improving this level of maturity quickly. Many characteristics
    evolve in parallel, each impacting others and contributing to a more developed,
    sustainable, and safer crypto market. These characteristics include market liquidity,
    platform accessibility, interoperability, investment vehicle availability, formal
    taxonomy, and regulation. Cryptoassets will only reach their prime time through
    mass adoption once these characteristics achieve a sufficient state of development
    for most users.


    ## Extension Questions


    What are possible catalysts for the next crypto bull run (the start of the next
    uptrend market)?


    What catalysts would delay crypto prime time? Can they invalidate the bullish
    crypto thesis altogether?


    What characteristics of the upcoming crypto market regulation will the United
    States and the European Union likely adopt, and how will they affect cryptoasset
    prime time?


    Given the current level of maturity and pace of development of the crypto industry,
    what level of adoption will it reach in 2025 and 2030 in terms of the number of
    active users?


    Footnotes [1](#600732_1_En_10_Chapter.xhtml#Fn1_source) [2](#600732_1_En_10_Chapter.xhtml#Fn2_source)


    # Part IV: Where Should One Invest?


    # 11. Investment Vehicles


    > *It is not how much money you make, but how much money you keep, how hard it
    works for you, and how many generations you keep it for.*

    >

    > —Robert Kiyosaki


    Investors in cryptoassets need to choose where to invest. Options are available,
    from pure investment on the blockchain to custodians investing on one’s behalf.
    This chapter investigates these options and the benefits they provide.'
