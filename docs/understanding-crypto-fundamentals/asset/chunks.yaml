  trans: '

    # 新冠疫情


    2010 年代末，世界各国政府迫切希望回归更可持续的财政状况。各国央行对近期一系列危机的反应，已向金融体系注入了异常庞大的新流动性。然而，一场疫情不幸爆发。与以往危机一样，印钞机被用作应对危机的经济武器。


    衡量货币供应量最纯粹的标准是央行的资产负债表规模。事实上，当央行印刷货币时，其资产负债表就会扩张。^(²¹) 2019 年底，全球四大央行（美联储、欧洲央行、英格兰银行和日本银行）的资产负债表规模合计略低于
    16 万亿美元。不到两年后，这一数字增至超过 26 万亿美元。^(²²) 换言之，有史以来创造的美元、欧元、英镑和日元中，有 38%是在 2020 年至 2021
    年间印刷的。仅就美元而言，这一比例超过 52%。^(²³) 正如本章所述，历史表明，这种印钞狂潮对货币持有者来说并非好事。


    资产的价格通常以法定货币表示。另一种方法是以“央行资产负债表规模”来表示。从根本上说，是用央行的资产负债表规模替换分母（例如美元）来得到比率。例如，用美国股市价值除以美联储资产负债表规模，而不是传统上用美元表示美国股市价值。这个新比率表示相对于特定流通货币数量的资产价值。这种方法揭示了资产的实际价值增长并不像通常呈现的那么快。相反，它们随着时间的推移保持了相对价值，如图
    1-8 所示。^(²⁴)


    ![](img/600732_1_En_1_Fig8_HTML.jpg)


    一张从 2009 年 1 月到 2023 年 1 月的标准化资产价值与美联储资产负债表对比的折线图。所有线条均以 2009 年的 100 为起点。房地产和黄金在
    2023 年降至 50，伴有轻微波动。标普 500 指数波动上升，在 2019 年达到 185，2020 年降至 105，随后上升。


    图 1-8


    2009 年 1 月至 2023 年 1 月，以美联储资产负债表为基准衡量的美国股市（标普 500 指数）、房地产（美国房价中位数）和黄金比例。标准化：2009
    年 1 月 1 日的价值=100（来源：美联储 (`federalreserve.gov/monetarypolicy`)、Macrotrends (`www.macrotrends.net`)
    及自行计算）


    图 1-8 显示，股票、房地产和黄金并未与其起点相差太远。特别是，它们都基本保持在起点值的 50%（一半）到 200%（两倍）之间。而且，它们倾向于回归均值。换言之，资产实际价值随时间的变化并不剧烈。并非股票、房地产或黄金处于泡沫之中；泡沫在于央行的资产负债表。


    ## 接下来往哪走？


    最后几节涵盖了货币史上的里程碑，其中文明在金本位制下繁荣，并在脱离金本位制时崩溃。每一次试图将货币与金钱分离的尝试，无论是通过减少硬币中贵金属的含量，还是转向法定货币标准，都以灾难性的后果告终。^(²⁵)


    认识到这一现实，近代历史上的当局多次诉诸没收黄金来补充其实际价值储备。^(²⁶) 公民们眼睁睁看着自己毕生的积蓄化为乌有，除了接受新现实之外别无他法。过去几十年，全球经济经历了货币供应的巨大洪流。流通中的货币数量是十年前的好几倍。不幸的是，历史表明这种情况的结局并不乐观。


    正如传统宏观经济学的结论，一个国家增加货币供应量会导致其物价水平成比例上涨。^(²⁷) 或者，正如前美联储主席（1987-2006 年）艾伦·格林斯潘所言：“在没有金本位制的情况下，无法保护储蓄免遭通货膨胀的侵蚀。”


    本章所述的观点并非针对任何特定实体。任何拥有印钞权力的中央当局都倾向于印刷过量的货币，因为不这样做就会让另一个当局上台。特别是，胜出的实体通常会向选民承诺更多的“免费”东西，无论选民是普通大众还是私人委员会。当然，“免费”的东西并非真正免费，而是通过使现有货币单位贬值来买单的。印钞就是将价值从人们的储蓄转移到新印刷的钞票上。这种达尔文主义的论点表明，问题不在于任何特定的政府，而在于激励机制错误的体制性问题。事实上，对于任何拥有此权力的中央当局来说，印刷货币的动机都强大到难以抗拒，无论是为了提供更多福利还是更多战争。一个拥有印钞权力的当局自然会印刷出经济上过量的货币。这个过程会持续下去，直到经济失衡导致货币崩溃和完全的货币熔化。只有当它回归到“不可印刷”的货币标准（如黄金）时，经济才能在一个健全的货币基础上复苏并恢复平衡。


    纵观历史，货币危机的希望之光实际上是金光。黄金投资不仅能在时间推移中保值，甚至在危机期间价值飙升。黄金仍然是长期投资者的终极价值储存手段，因为它是一种高存量-流量比的资产。在这方面，没有任何资产能企及黄金——直到最近。'
- fmt: "# The Highest Stock-to-Flow Asset of All Time\n\nAs covered in detail later\
    \ in the book, hard-coded features of Bitcoin limit the ultimate number of bitcoins\
    \ to 21 million. Also, the flow of new bitcoins halves every four years, making\
    \ Bitcoin an ever-increasing stock-to-flow asset. No authority can choose to emit\
    \ more bitcoins, even if the authority’s existence depends on it. Neither governments,\
    \ central banks, companies, miners, counterfeiters, nor anybody else can mine\
    \ bitcoins faster than Bitcoin’s supply schedule imposes. This is the ultimate\
    \ guarantee of supply limitation. Bitcoin is superior to gold as a high-stock-to-flow\
    \ asset since its stock-to-flow ratio keeps increasing, and its new supply is\
    \ entirely independent of its market price (i.e., it has a zero price elasticity\
    \ of supply; its supply is perfectly inelastic to price).\n\nBitcoin also scores\
    \ higher than gold for core characteristics of money covered at the beginning\
    \ of the chapter. Bitcoin is neither perishable nor corrodible, as its durability\
    \ is infinite. It also surpasses gold in portability since it can be conveniently\
    \ exchanged with a smartphone. Its level of divisibility is far superior, as one\
    \ can split a bitcoin into 100 million subunits instantly and at no cost. It is\
    \ also more fungible than gold, as one does not need to doubt the quality of coins\
    \ or bullion. Bitcoin is also gaining traction as a unit of account (for example,\
    \ many exchanges express other cryptoassets as a fraction of Bitcoin) and is already\
    \ more established as such than gold. Finally, its use as a medium of exchange\
    \ is growing worldwide at a tremendous pace. In particular, commerce increasingly\
    \ accepts Bitcoin payments, both online and physically, in virtually all countries.\
    \ In addition, it has already become the legal tender currency in El Salvador,\
    \ and other countries are following suit.\n\nIn terms of the saleability of the\
    \ asset, Bitcoin similarly scores remarkably high on all criteria, except two\
    \ of them, for which it is still evolving: (1) the level of market development\
    \ and speculation, and (2) the legal and regulatory limitations imposed on transacting\
    \ the asset. As Bitcoin is still a relatively new asset, it did not reach its\
    \ maturity on these levels yet but is improving quickly. In particular, Chapter\
    \ [10](#600732_1_En_10_Chapter.xhtml) presents multiple metrics testifying to\
    \ this maturity growth. These developments suggest that Bitcoin could soon become\
    \ the most pristine form of money that humanity has ever known, taking over this\
    \ title from gold.\n\nAs part of its value proposition, Bitcoin would establish\
    \ a separation of money and state. Indeed, Bitcoin as a form of money is independent\
    \ of the state’s interests. No state can produce it to pursue its own goals at\
    \ the expense of savers in that form of money. Adoption of Bitcoin would re-establish\
    \ discipline in governments that the gold standard once imposed, thereby enabling\
    \ people to save the value of their work in non-dilutable money.\n\n## Key Concepts\n\
    \nMoney is whichever medium is chosen by individuals to transact. Better media\
    \ of exchange gather critical characteristics, among which is the ability to store\
    \ value over time. For the best part of the last five millennia, gold fulfilled\
    \ this function best because its flow (new quantity of the asset available) remained\
    \ small compared to its stock (existing usable quantity of the asset), even when\
    \ its price soared. The limited supply combined with growing demand for gold placed\
    \ it above any other asset as a store of value. Bitcoin is a new alternative to\
    \ gold, gathering the crucial characteristics that made gold successful and improving\
    \ on characteristics such as portability, divisibility, durability, and fungibility.\n\
    \nHistory is populated by episodes of governments drifting away from gold as currency,\
    \ then frenzied printing of the new governmental currency (most often to fund\
    \ wars or to service debts contracted because of wars). However, each of these\
    \ episodes ended brutally, often with nation-destroying consequences. Returning\
    \ to a gold standard has always been the only viable way to recover stability\
    \ and resume prosperity. Money printing in the past two decades has increased\
    \ to levels much larger than in previous crises, especially since the COVID-19\
    \ pandemic broke out. Unfortunately, history suggests a gloomy ending for this\
    \ scenario. More pristine forms of money, such as gold or now Bitcoin, offer a\
    \ once-in-a-generation opportunity to benefit from the wealth transfer that the\
    \ unavoidable upcoming monetary crisis will generate.\n\n## Extension Questions\n\
    \nWhat are the incentives for governments to choose a gold standard vs a fiat\
    \ standard?\n\nWould a dual standard be desirable, where federal reserves are\
    \ held partly in gold and partly in Bitcoin?\n\nWhy did citizen continue using\
    \ fiat currencies in 1971 when their peg to gold was severed?\n\nFootnotes [1](#600732_1_En_1_Chapter.xhtml#Fn1_source)\
    \ [2](#600732_1_En_1_Chapter.xhtml#Fn2_source) [3](#600732_1_En_1_Chapter.xhtml#Fn3_source)\
    \ [4](#600732_1_En_1_Chapter.xhtml#Fn4_source) [5](#600732_1_En_1_Chapter.xhtml#Fn5_source)\
    \ [6](#600732_1_En_1_Chapter.xhtml#Fn6_source) [7](#600732_1_En_1_Chapter.xhtml#Fn7_source)\
    \ [8](#600732_1_En_1_Chapter.xhtml#Fn8_source) [9](#600732_1_En_1_Chapter.xhtml#Fn9_source)\
    \ [10](#600732_1_En_1_Chapter.xhtml#Fn10_source) [11](#600732_1_En_1_Chapter.xhtml#Fn11_source)\
    \ [12](#600732_1_En_1_Chapter.xhtml#Fn12_source) [13](#600732_1_En_1_Chapter.xhtml#Fn13_source)\
    \ [14](#600732_1_En_1_Chapter.xhtml#Fn14_source) [15](#600732_1_En_1_Chapter.xhtml#Fn15_source)\
    \ [16](#600732_1_En_1_Chapter.xhtml#Fn16_source) [17](#600732_1_En_1_Chapter.xhtml#Fn17_source)\
    \ [18](#600732_1_En_1_Chapter.xhtml#Fn18_source) [19](#600732_1_En_1_Chapter.xhtml#Fn19_source)\
    \ [20](#600732_1_En_1_Chapter.xhtml#Fn20_source) [21](#600732_1_En_1_Chapter.xhtml#Fn21_source)\
    \ [22](#600732_1_En_1_Chapter.xhtml#Fn22_source) [23](#600732_1_En_1_Chapter.xhtml#Fn23_source)\
    \ [24](#600732_1_En_1_Chapter.xhtml#Fn24_source) [25](#600732_1_En_1_Chapter.xhtml#Fn25_source)\
    \ [26](#600732_1_En_1_Chapter.xhtml#Fn26_source) [27](#600732_1_En_1_Chapter.xhtml#Fn27_source)\n\
    \n# 2. Complementary Currencies\n\n> *All money is a matter of belief.*\n> \n\
    > —Adam Smith\n\nWhile Bitcoin makes a compelling case against gold as pristine\
    \ money, Bitcoin is unlikely to replace gold entirely because of gold’s millennia-long\
    \ cultural establishment. Instead, a more likely scenario is that they coexist,\
    \ like television did not replace the radio entirely but only took a share of\
    \ its market. Given recent developments, it will also likely coexist with national\
    \ currencies, such as dollars, euros, or yen, as a payment medium. In fact, it\
    \ is already increasingly doing so. Such a system will effectively have multiple\
    \ currencies (accepted media of payments) running in parallel. While a multiple-currency\
    \ model sounds unusual, it is a notion that already exists and whose many benefits\
    \ have been praised for decades by monetary visionaries.^([^(28)](#fn28)) This\
    \ chapter investigates why it is the case."
