- fmt: '# Mining Concentration Risk


    If too much mining power is concentrated in the hands of a few miners or mining
    pools, the concept of decentralization might fade away. As decentralization is
    a crucial value proposition of cryptoassets, this risk threatens their meaningfulness
    and fundamental value. In a 2017 Medium article, Vitalik Buterin explained the
    meaning of decentralization and different types of decentralization [47]. In particular,
    we refer here to “political (de)centralization” (in his words), which is how few
    individuals or groups control the computers making up the network.


    In the case of Bitcoin, China was posing an existential mining centralization
    risk until mid-2021. With two third of the miners based in the same country, the
    possibility of a cartel emerging was growing. It could have, for example, implied
    most miners pushing for a specific upgrade of the network’s code in favor of a
    specific group of people. Nevertheless, China’s Bitcoin ban of 2021 effectively
    mitigated this risk by discouraging many Chinese miners and indirectly incentivizing
    miners everywhere else in the world to join the network. Moreover, the Chinese
    ban in the summer of 2021 also showed the resilience of Bitcoin’s security. Even
    with most miners suddenly dropping out of the network, the impact was only a blip
    on the graph, and the hash rate quickly recovered to a new all-time high. Bitcoin’s
    mining concentration risk is, therefore, very low.


    In contrast, mining concentration risk remains a possible threat for altcoins
    on a PoW consensus mechanism, especially for those not ASIC-resistant. Specifically,
    large Bitcoin miners could choose to switch from Bitcoin to altcoin mining and
    thereby have a significant share of that altcoin’s total hash rate.


    # Ownership Concentration Risk


    Not only the concentration of miners is a potential risk, but also the concentration
    of funds. First, for PoS-based cryptoassets, ownership implies influence on the
    protocol’s output through the likelihood of being selected as a validator. In
    a standard proof-of-stake (PoS) setting, the more coins one owns, the higher the
    likelihood of being selected as a validator for the next block. This system could
    lead to a few people with disproportionate influence over the network. Such a
    scenario could create network risks, such as the potential for wealthy users to
    collude and manipulate the outcome of block validation. A single user could also
    fake identities (known as *sybils*) to gain disproportionate influence over the
    network, known as a *Sybil attack*. It is therefore questionable whether PoS cryptoassets
    provide incentives for decentralization. However, variants to the original PoS
    aim to address this risk. For example, the automatic slashing mechanism is a penalty
    for users trying to collude or manipulate the network. Such users would have their
    funds slashed or permanently frozen.


    However, all tradable cryptoassets (PoS-based or not) are indirectly exposed to
    a risk of ownership concentration because wealthy owners could suddenly sell most
    or all of their possession in the asset. In this case, it is liquidity risk the
    issue: the inability of the market to absorb such a large sale quickly without
    having a substantial downward impact on the price. Diligent investors should analyze
    the concentration of funds for any cryptoasset and the liquidity for the corresponding
    asset. High concentration and low liquidity are red flags indicating a higher
    risk of sudden downward drops in price. It is, for example, a high risk for Dogecoin,
    ZCash, and Ethereum Classic, each of which indicates that less than 100 participants
    control more than half of the wealth in their corresponding ecosystem (as of 2021)
    [48].


    The Gini coefficient and the Nakamoto index can measure wealth inequality or ownership
    concentration risk. The Gini coefficient measures how wealth is spread for a population
    on a ratio from 0 to 1. A Gini coefficient of 0 indicates a perfectly equal distribution
    among all individuals, while a coefficient of 1 indicates that a single individual
    owns all the existing wealth. The country of Ireland, for example, has a coefficient
    of 0.67.^([^(98)](#fn98)) In comparison, Ethereum’s coefficient is 0.64, and Bitcoin’s
    coefficient (on a consistently decreasing trend since 2010) is below 0.50 as of
    2021, which suggests a lower concentration of wealth. Dogecoin, in contrast, has
    a coefficient above 0.80 and has been on an increasing trend since 2015 [48].


    The Nakamoto index measures how many individuals (“addresses” in the case of cryptoassets)
    are needed to reach 51% of the asset’s existing supply. For fiat currencies overall
    and worldwide, this index is 388, meaning that the wealthiest 388 individuals
    on the planet have more wealth than the rest of the world’s population. As of
    2020, this value was 4,652 for Bitcoin, on a trend toward a more equal distribution
    of wealth over time. These figures suggest that Bitcoin is spread much more equally
    than traditional fiat currencies. In contrast, Dogecoin is highly concentrated,
    with only seven addresses owning 44% of all coins and trending toward even more
    concentration. Ethereum lies between the two, as the top 100 addresses own 35%
    of all wealth in ethers [48]. Diligent investors should systematically analyze
    the concentration of wealth in cryptoassets and attribute a higher investment
    risk to more concentrated assets.


    # Regulatory Risk


    As a recent and quickly-evolving asset class, cryptoassets face high regulatory
    uncertainty. This uncertainty creates a risk that the environment for cryptoassets
    may change, which could impact their value or viability. For example, regulation
    could limit the ability of a cryptoasset to operate as intended. Privacy features
    or certain types of transactions could become prohibited in some jurisdictions,
    potentially making some cryptoassets irrelevant in these places. In a more extreme
    case, regulation could force an exchange to close, implying the possible liquidation
    of many assets at historically low prices.


    As a concrete example, the Digital Commodities Consumer Protection Act (DCCPA)
    bill has been heavily debated in the last quarter of 2022 in the United States.
    Had it passed, it would have been a de-facto ban on decentralized finance, essentially
    killing a nascent and promising industry. The bill would have required compliance
    and reporting requirements that could technologically neither be met by a decentralized
    platform nor make sense in this context. For example, it would have required designating
    a Chief Compliance Officer, a questionable requirement for open source and self-executing
    smart contracts auditable by anyone in real time. Also, it would have required
    DEXs to register with the CFTC, thus challenging their permissionlessness. It
    later became clear that FTX CEO Sam Bankman-Fried had heavily lobbied the bill
    before the historic collapse of his fraudulent empire, as it would have benefited
    FTX extensively.


    However, all cryptoassets do not face the same type of regulatory uncertainty.
    For example, while Bitcoin’s accounting treatment is generally agreed upon (treated
    as a commodity or digital property), other cryptoassets face much higher uncertainty
    (especially their potential status as security). For example, it is still not
    broadly agreed whether all PoS-based cryptoassets should be considered securities
    and treated very differently from Bitcoin. In any case, diligent investors should
    remain constantly informed of regulatory changes and consider their potential
    impact on investments.'
