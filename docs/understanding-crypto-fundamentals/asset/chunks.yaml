  trans: '

    # 存量-流量模型


    供给量在最著名的比特币估值模型——存量-流量（S2F）模型中变得至关重要。从根本上说，该模型为稀缺性定价，通常应用于黄金等自然资源。它衡量的是一项资产可供交易的总存量（“存量”）与单位时间内该资产的新增数量（“流量”）之间的比率。高存量-流量资产的价值逻辑已在第
    1 章介绍。化名为 PlanB 的荷兰机构投资者最初于 2019 年 3 月在 Medium 的一篇文章中提出了应用于比特币的该模型。^(¹¹⁴) 该模型基于尼克·萨博对稀缺性的定义，即“不可伪造的昂贵性”，这是比特币首次以数字化和去中心化的方式实现的壮举，并成为其核心价值主张。换言之，生产新的黄金或比特币既困难又昂贵，这使得现有的单位具有价值。


    截至 2023 年，全球黄金总供应量约为 20 万吨，每年开采量约为 3,000 吨。^(¹¹⁵) 黄金的 S2F 比率为 66.7（计算方式为 `200,000/3,000`），对应于在当前流量下积累到当前存量所需的年数。然而，其倒数可能更容易理解：1.5%（`3,000/200,000`），即一年内开采的存量占比。换言之，这就是黄金供应的通胀率。


    相比之下，比特币在 2020 年 5 月 11 日第三次减半事件时的存量为 18,375,000（占总量 2,100 万的 87.5%，忽略丢失的币），流量为每个区块
    6.25 个比特币，即每年约 328,725 个比特币。其 S2F 比率为 55.9，略低于黄金，表明在存量-流量方面，彼时的比特币稀缺性低于黄金。在减半事件之间，随着每个区块新增的比特币添加到存量中，该比率会缓慢增加。此外，每次减半事件都意味着流量减半，从而导致该比率突然翻倍。根据预计在
    2024 年 3 月左右的第四次减半事件，S2F 比率将达到 119.8（计算方式为 `19,687,500/164,362.5`），届时比特币的“稀缺性”将是黄金的近两倍。


    S2F 模型的价格预测将随时间变化的 S2F 比率值作为输入，代入一个包含其他系数的公式中，这些系数被选择用以拟合过去的数据。基于最能拟合过去价格和相应 S2F
    比率的数据，可以绘制出一条对数趋势线，从而预测未来的价格。例如，该模型求解以下方程，其中 `a` 和 `b` 是为拟合过去价格数据而选择的常数，`S2F`
    是前述比率。


    ```

    Price_{USD} = e^a × S2F^b

    ```


    应用于比特币的该模型如图 16-3 所示（系数 `a=-1.0` 和 `b=2.9`，以及基于过去 365 天数据的每日流量），从中可以看出过去的数据与模型的理论输出非常吻合。然而，尽管
    S2F 模型在过去几年中已被证明异常准确，但它仍然在很大程度上依赖于假设。


    ![折线图，标题为比特币价格与 S2F 比率，纵轴为 2010 年 7 月至 2027 年 12 月期间的美元价格。比特币价格在波动中上涨直至 2023 年
    5 月。365 天 S2F 紧随其后，有轻微波动，相互交叉重叠，并持续上升直至 2017 年 12 月。](img/600732_1_En_16_Fig3_HTML.jpg)


    **图 16-3** 基于 2010 年中期至 2028 年 1 月（第五次减半事件的预期日期）365 天流量的比特币存量-流量模型；比特币价格数据截至 2023
    年 3 月


    特别是，该公式的性质表明，价格将持续随着 S2F 比率上升，直到 2140 年最后一个新比特币被铸造出来。此外，为什么一种商品（无论是黄金还是比特币）的市值可以完全由新增供应量推导出来，这一点值得怀疑。实际上，该模型完全忽略了除存量、流量和时间以外的因素。例如，它完全忽略了需求的任何变化（无论是由于监管还是商业周期）、波动性，甚至其通常计价货币（美元）的供应量。


    这些缺点并未阻止大部分比特币社区广泛依赖该模型来预测未来价格。主要论点是，即使某些因素未被考虑，存量-流量关系仍然是稀缺资产（不仅是比特币，还包括贵金属和其他商品）市值的主要驱动因素。特别是，PlanB
    正确地指出，该模型对比特币具有极高的拟合优度^(¹¹⁶)，跨越了八个数量级。


    自该模型于 2019 年 3 月发表后，比特币的价格在三年的时间内（包括 2020 年第三次减半事件期间）持续紧密跟随该模型的理论预测。然而，在 2022
    年和 2023 年初的市场低迷期间，价格落后于模型预测。即使是 PlanB 也承认，比特币的价格最终会与该模型的预测脱钩，尽管迄今为止该模型异常准确。


    # 存量-流量跨资产（S2FX）模型


    为了解决 S2F 模型可能存在的局限性，PlanB 在其 S2F 文章发表仅一年多后，发布了一个更新的模型。该更新移除了模型中的时间成分，但添加了其他商品，特别是黄金和白银。它被称为比特币存量-流量跨资产（S2FX）模型。^(¹¹⁷)


    特别是，它识别了比特币演进的各个不同阶段，从概念验证到支付，再到数字黄金，最后到金融资产。在这四个按时间顺序排列的阶段中，每个阶段的比特币 S2F 比率和价格都显著高于前一阶段，如图
    16-4 所示。将白银和黄金的市值与其 S2F 比率的关系添加到模型中验证了这一发现，表明更高的 S2F 比率对应更高的市场价值。事实上，数据的拟合优度几乎是完美的（R²
    为 99.7%），这使得对潜在的因果关系有很高的信心。该模型的主要弱点在于其基于的观测数据点数量很少：只有六个（即，黄金、白银以及为比特币确定的四个时间阶段各自的值）。


    ![散点图，标题为比特币 S2F 跨资产模型，纵轴为市值与存量-流量之比，单位为 100 万亿美元。它描绘了比特币月度数据、BTC 集群 1、2、3 和 4、白银以及黄金的集中分布，这些点位于呈上升趋势的幂回归线
    1 的上方、线上和下方。](img/600732_1_En_16_Fig4_HTML.jpg)


    **图 16-4** 化名 PlanB（@100trillionUSD）在 Medium 文章（2020 年 4 月 27 日）中提出的原始 S2FX 模型图表
    [51]


    S2FX 模型至少为 S2F 模型的预测增加了更多信心，因为它通过与其它商品进行对比验证，确认了比特币市值的未来趋势。特别是，这两个模型确立了一个观点：比特币的每枚价格在
    2025 年（在第四次减半事件被市场消化后）将在 10 万至 100 万美元之间，并在本十年末（在第五次减半事件被市场消化后）远高于 100 万美元大关。

