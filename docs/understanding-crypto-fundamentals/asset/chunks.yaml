- fmt: 'Running these mining rigs requires a high amount of electricity, making geographies
    with access to cheap electricity more profitable for mining purposes. For example,
    geothermal energy in Iceland is much cheaper than energy from the grid in New
    York City, making Iceland a much better location for Bitcoin mining. Since electricity
    production in Iceland comes almost 100% from renewable energy^([^(72)](#fn72)),
    its sustainability is also much higher. Such mining typically happens in *mining
    farms*, which are warehouses with hundreds of ASIC mining rigs working in parallel.
    The mining farms are often placed directly next to a hydropower plant or a source
    of geothermal energy so that they can use the excess energy produced by the plant
    to mine Bitcoin. This way, the electricity production generated during supply
    peaks (e.g., rain season) or demand troughs (e.g., at night) can be monetized
    and, at the same time, secure the Bitcoin network.


    As of May 2023, the price of electricity ranges from more than $0.50 per kilowatt
    hour in countries like Germany, Denmark, or the United Kingdom to less than $0.05
    per kilowatt hour in countries like Kazakhstan, Iran, or Malaysia on average.
    Therefore, unsurprisingly, these latter countries are in the top 10 of the countries
    mining the most bitcoins. Nevertheless, even countries with a higher average cost
    of electricity can make use of occasional cheap energy (e.g., excess energy at
    renewable power plants) to mine Bitcoin, also bringing the United States (35%
    of total worldwide), Canada (10%) and Germany (5%) in the same top-10 list^([^(73)](#fn73)).


    In comparison, as of this writing, mining Bitcoin requires a source of electricity
    below $0.11 to be profitable^([^(74)](#fn74)). Using more expensive energy does
    not make it financially interesting for miners, as the likelihood and size of
    mining rewards do not offset the required energy costs. Therefore, mining in high-energy-price
    locations is unprofitable and will lead anybody who attempts it to financial losses.
    In particular, the energy used to mine cryptoassets like Bitcoin is typically
    energy that would be lost otherwise. Indeed, if the producer could use this energy
    for any other purpose, it would most likely be more financially interesting to
    do so. Bitcoin mining, therefore, enables us to profit from lost energy. At the
    same time, it is not putting any strain on high energy-cost grids (e.g., in large
    cities of developed countries) because it provides no incentives to mine where
    energy costs are high.


    ## ASIC-Resistant Mining


    To curb the never-ending race to more hashing power and the ever-increasing electricity
    use, developers designed some cryptoassets’ consensus mechanisms to be ASIC-resistant.
    In other words, for mining these cryptoassets, using an ASIC is not beneficial
    compared to using a simple Graphics Processing Unit (GPU) in a traditional computer.
    Furthermore, for some cryptoassets, using an ASIC is not technically possible.
    In these cases, mining with one’s laptop at home is as likely to succeed as mining
    with the latest specialized equipment.


    Technically, there are different methods to achieve ASIC resistance. For example,
    mining algorithms can be designed to require large computer memory. This requirement
    means more physical area on the computer chip running the algorithm. In particular,
    ASICs typically outperform traditional GPUs by parallelizing physical threads
    on a computer chip, which requires physical area. However, parallel processing
    becomes less useful when an algorithm step requires a wide physical area. ASICs
    lose their competitive advantage over GPUs, and the corresponding cryptoasset
    becomes ASIC-resistant. For interested readers, modern proof-of-work-based cryptoassets
    achieve ASIC resistance through multi-hash PoW, memory hard PoW, or programmatic
    PoW, and new methods continue to emerge [41].


    Mining ASIC-resistant cryptoassets is more affordable for private individuals
    than mining non-ASIC-resistant cryptoassets. Nevertheless, access to a cheap source
    of electricity is still necessary to make mining activities profitable. Also,
    a side benefit of ASIC-resistant cryptoassets is a higher level of decentralization.
    Indeed, ASIC resistance creates fewer incentives for companies to establish large
    mining farms that could centralize the asset’s mining.


    As of 2023, the largest proof-of-work cryptoassets that are ASIC-resistant are
    Monero (XMR), Ethereum Classic (ETC), and Ravencoin (RVN).


    ## Mining Pools


    An issue with mining Bitcoin is the tiny probability of successfully mining a
    block for any particular individual, even though the reward is quite sizable in
    a successful event^([^(75)](#fn75)). A solution is to join a mining pool. In such
    a pool, miners agree to split rewards from successfully mined blocks in proportion
    to the hashing power each miner contributed to the pool. For example, say a pool
    mines 100 bitcoins (16 blocks) in 2023, and a specific individual contributed
    3% of the pool’s total mining power (hash rate) over that period. In that case,
    this individual will earn three bitcoins (minus a pool management fee, e.g., 2%).
    In 2022, the top 9 Bitcoin mining pools shared 95% of the total Bitcoin mining
    hash rate, as shown in Figure [8-4](#600732_1_En_8_Chapter.xhtml#Fig4).


    ![](images/600732_1_En_8_Chapter/600732_1_En_8_Fig4_HTML.jpg)


    A pie chart of the hash rate of 10 Bitcoin mining pools in 2022. Foundry USA 23.20%.
    ANTPOOL 16.61%. Binance Pool 11.50%. ViaBTC 9.58%. Poolin 7.74%. Braiins Pool
    5.21%. BTC.com 4.03%. Luxor 2.59%. Others 3.09%.


    Figure 8-4

    Top 10 Bitcoin mining pools 2022, with their relative share of the hash rate (Source:
    BTC.com and own workings)


    Newcomers willing to mine proof-of-work cryptoassets are encouraged to join a
    pool but to choose it carefully. In particular, one should look for pools fully
    transparent on their mining equipment requirements, fee schedule, downtime history,
    and track record of repelling DDoS attacks^([^(76)](#fn76)). Stable (without downtime
    and unlikely to become a victim of attacks) and transparent pools are critical
    to reducing risks involved in the mining process.'
