- fmt: '`Bitcoin` 从未涉足超过极小部分的非法产业。与任何新技术一样，它都有其利弊；真正的问题在于其净效应。互联网早期也曾被欺诈者和用于非法目的，但这并非完全摒弃该技术的理由。将`Bitcoin`偶尔的非法使用归咎于它，无异于以电子邮件可被用于网络钓鱼攻击为由，而对电子邮件协议进行制裁。此外，根据《*Chainalysis
    Crypto Crime Report 2023*》，2022年由犯罪实体发送和接收的加密货币总额“仅为”180亿美元，占所有加密资产活动的0.2%。不仅如此，非法产业在加密资产交易中的份额还在持续下降[23]。作为对比，联合国估计全球GDP的2%至5%（约2万亿至4万亿美元）与犯罪活动或洗钱有关。换句话说，所有加密资产在非法产业活动中的占比不到1%。非法产业的货币既不是`Bitcoin`也不是任何其他加密资产，它仍然是法定货币，尤其是美元。


    最后，正如欺诈者最终会发现的那样，使用加密资产进行非法交易是一个非常糟糕的策略。在`Bitcoin`或`Ethereum`等加密资产上的所有交易都记录在一个永远无法被删除的开源数据库中。追踪此类交易非常直接，并能迅速找到其始作俑者。因此，开源加密资产的性质本身就抑制了其用于非法目的的动机。


    ## 加密平台与智能合约


    2014年，一种新型加密资产随着`Ethereum`——第二大加密资产——而出现。它建立在与`Bitcoin`相同的基础上，但在几个方面有所不同。特别是，它增加了一个关键功能：在其上编程任何事物的可能性。例如，它实现了智能合约。


    智能合约既不智能，甚至也不是传统法律意义上的合约。它们只是在区块链上编程到自执行代码中的一种“如果-那么”语句。然而，这个看似简单的概念却开启了一个新世界。例如，智能合约可以编程出不可变的协议，以指定价值流动（如交易），并实现自动、即时结算，且无需第三方。无需去法院并等待数周或数月来解决合约纠纷。在许多情况下，法院和等待时间都变得过时。


    然而，智能合约的关键要素并非金融交易的自动执行，因为这一概念在任何银行都已存在。真正具有革命性的是这种行为的去中心化性质。没有第三方，确保了该协议或“合约”将根据合约代码中指定的预定义规则得到公平执行。此外，智能合约并不仅限于定义价值流动。它们允许任何程序被上传到一种全球计算机上并自行执行。不仅是价值流动，任何程序的状态都会被永久记录在成千上万台计算机上，使其历史变得不可篡改。


    `Ethereum`是第一个广泛成功支持智能合约的平台。抽象地说，`Ethereum`就像一个应用商店。可以在其上构建应用程序。与此同时，还有其他应用商店可用：`Cardano`、`Solana`、`Polkadot`以及大量新兴平台。然而，截至撰写本文时，`Ethereum`仍然是迄今为止最大的平台。


    正如`Bitcoin`（大写B）是一个网络，其原生货币是`bitcoin`（小写b）（`BTC`）一样，`Ethereum`是一个网络，其原生货币是`ether`（`ETH`）。然而，与`Bitcoin`不同，`Ethereum`是一个可编程的区块链，`ether`促进了智能合约的流通。这些合约在去中心化的`Ethereum`虚拟机——前述的“全球计算机”——上执行。虽然`Bitcoin`只允许一组受限的指令来验证用户的支付能力且功能有限，但`Ethereum`提供了一套完整的可编程指令，使其能够用作通用计算机。用IT术语来说，其编程语言是*图灵完备*的。


    一个与互联网的有用类比能很好地说明这种差异。互联网依赖`TCP`作为一个基础协议。在`TCP`之上，构建了其他协议以实现特定功能（例如，`HTTP`用于网页，`SMTP`用于电子邮件，`FTP`用于文件传输，`XMPP`用于开源消息传递）。`Bitcoin`只允许一小部分指令集；从这个意义上说，它就像`SMTP`：为发送电子邮件而优化，或者对`Bitcoin`而言，是为发送货币而优化。另一方面，`Ethereum`是一个更基础的层，就像`TCP`。由于它包含了一套完整的可编程指令，它允许开发者创造任何有价值的东西：在其之上构建任何协议。唯一的限制是他们的想象力。


    一个重要的后果是可能对许多现有功能进行去中介化——移除中间人。在金融行业，识别那些分享价值蛋糕中一份的不必要中介是直接的；例如，匹配借款人和贷款人的银行。更广泛地说，任何在需求（如借款人）和解决方案（如贷款人）之间存在被捕获利润的金融服务，都可以通过智能合约进行编码和运行。因此，去中心化的代码可以取代传统金融的大部分：从资产管理到支付、经纪、托管、投资、衍生品等等。这些新的金融解决方案被称为*去中心化金融*，或简称*DeFi*。


    当然，智能合约的力量不仅限于金融，而是延伸到任何具有数字化成分的行业，这几乎涵盖了所有行业。在金融之外，需求可能甚至更大。第[3](#600732_1_En_3_Chapter.xhtml)章展示了几个例子，例如音乐和出版业。许多其他行业同样会受益于智能合约所实现的去中介化。'
  raw: 'Nevertheless, Bitcoin has never been involved in more than a tiny fraction
    of the illegal industry. As is often the case with any new technology, there are
    upsides and downsides; the real question is the net effect. The Internet in its
    early days was also used by fraudsters and for illegal purposes, but it was not
    a reason to discard the technology altogether. Blaming Bitcoin for occasional
    illegal use would be like sanctioning the email protocol with the justification
    that email can be used to facilitate phishing attacks. In addition, according
    to the *Chainalysis Crypto Crime Report 2023*, the total cryptocurrency value
    sent and received by criminal entities was “only” $18 billion in 2022, or 0.2%
    of all cryptoasset activity. Besides, the illicit industry’s share of cryptoasset
    transactions continues to drop [23]. In comparison, the United Nations estimate
    that between 2% and 5% of global GDP (about $2 trillion to $4 trillion) is connected
    to criminal endeavors or money laundering. In other words, all cryptoassets are
    involved in less than 1% of the illicit activity industry. The currency of the
    illegal industry is neither Bitcoin nor any other cryptoasset. It remains fiat
    currencies, and in particular the US dollar.


    Finally, as fraudsters eventually find out, using cryptoassets for illicit transactions
    is a very poor strategy. All transactions in cryptoassets such as Bitcoin or Ethereum
    are recorded in an open source database that can never be erased. Tracing such
    transactions is straightforward and can quickly lead to its perpetrator. The nature
    of open source cryptoassets is therefore disincentivising their use for illicit
    purposes.


    ## Crypto Platforms and Smart Contracts


    In 2014, a new type of cryptoasset emerged with Ethereum, the second largest cryptoasset.
    It builds on the same base as Bitcoin but differs in several respects. In particular,
    it adds a crucial feature: the possibility to program anything on it. It enables,
    for example, smart contracts.


    Smart contracts are neither smart nor even contracts, at least not in the traditional
    legal sense. Instead, they are simply an if-then statement programmed into self-executing
    code on a blockchain. However, this seemingly trivial concept opens the door to
    a new world. Smart contracts enable, for example, the programming of immutable
    agreements specifying value flows (e.g., transactions) with automatic and instantaneous
    settlement without third parties. There is no need to go to court and wait for
    weeks or months to settle a contract. In many cases, both the court and the waiting
    time are obsolete.


    However, the crucial element of smart contracts is not the automatic execution
    of a financial transaction, as this concept already exists in any bank. Instead,
    what is revolutionary is the decentralized nature of this action. The absence
    of a third party ensures that the agreement, or “contract,” will be executed fairly,
    according to predefined rules specified in the contract’s code. Besides, smart
    contracts are not limited to defining value flows. They enable any program to
    be uploaded to a sort of global computer and self-execute. Not only a value flow
    but also the state of any program is permanently recorded on thousands of computers,
    making its history unalterable.


    Ethereum is the first broadly successful platform enabling smart contracts. In
    abstract terms, Ethereum is like an app store. Apps can be built on it. In parallel,
    other app stores are available: Cardano, Solana, Polkadot, and a legion of new
    emerging platforms. However, as of this writing, Ethereum remains the biggest
    by far.


    In the same way that Bitcoin (capital B) is a network with bitcoin (lowercase
    b) (BTC) as its native currency, Ethereum is a network with ether (ETH) as its
    native currency. However, unlike Bitcoin, Ethereum is a programmable blockchain,
    and ether facilitates the flow of smart contracts. These contracts are executed
    on the decentralized Ethereum virtual machine, the aforementioned “global computer.”
    While Bitcoin only allows a restricted set of instructions to verify the spending
    ability of users and little more, Ethereum provides a complete set of programmable
    instructions that enable its use as a general-purpose computer. In IT jargon,
    its programming language is *Turing-complete*.


    A useful parallel with the Internet illustrates this difference well. The Internet
    relies on TCP as one possible base protocol. On top of TCP, other protocols were
    built to enable specific functionalities (e.g., HTTP for webpages, SMTP for emails,
    FTP for file transfer, and XMPP for open source messaging). Bitcoin enables only
    a small set of instructions; in that sense, it is like SMTP: optimized for sending
    emails or, in the case of Bitcoin, for sending money. Ethereum, on the other hand,
    is a more fundamental layer, like TCP. As it contains a complete set of programmable
    instructions, it enables developers to create anything of value: to build any
    protocol on top of it. The only limit is their imagination.


    One important consequence is the possibility of disintermediating many existing
    functions—removing the middleman. In the financial industry, identifying unnecessary
    intermediaries taking a share of the value pie is straightforward; for example,
    a bank matching borrowers and lenders. More broadly, any financial service where
    a margin is captured between the need (e.g., the borrower) and the solution (e.g.,
    the lender) can be coded and run through smart contracts. Thereby, decentralized
    code can replace most traditional finance: from asset management to payments,
    brokerage, custody, investment, derivative products, and more. These new financial
    solutions are called *Decentralized Finance*, or *DeFi* for short.


    Of course, the power of smart contracts is not limited to finance but extends
    to any industry having a digital component, which is to say, most industries.
    Outside of finance, the need may be even bigger. Chapter [3](#600732_1_En_3_Chapter.xhtml)
    presented several examples, such as the music and publishing industries. Many
    other industries would similarly benefit from the disintermediation that smart
    contracts enable.'
  trans: '

    `Bitcoin` 从未涉足超过极小部分的非法产业。与任何新技术一样，它都有其利弊；真正的问题在于其净效应。互联网早期也曾被欺诈者和用于非法目的，但这并非完全摒弃该技术的理由。将
    `Bitcoin` 偶尔的非法使用归咎于它，无异于以电子邮件可被用于网络钓鱼攻击为由，而对电子邮件协议进行制裁。此外，根据《*Chainalysis Crypto
    Crime Report 2023*》，2022 年由犯罪实体发送和接收的加密货币总额“仅为”180 亿美元，占所有加密资产活动的 0.2%。不仅如此，非法产业在加密资产交易中的份额还在持续下降[23]。作为对比，联合国估计全球
    GDP 的 2% 至 5%（约 2 万亿至 4 万亿美元）与犯罪活动或洗钱有关。换句话说，所有加密资产在非法产业活动中的占比不到 1%。非法产业的货币既不是
    `Bitcoin` 也不是任何其他加密资产，它仍然是法定货币，尤其是美元。


    最后，正如欺诈者最终会发现的那样，使用加密资产进行非法交易是一个非常糟糕的策略。在 `Bitcoin` 或 `Ethereum` 等加密资产上的所有交易都记录在一个永远无法被删除的开源数据库中。追踪此类交易非常直接，并能迅速找到其始作俑者。因此，开源加密资产的性质本身就抑制了其用于非法目的的动机。


    ## 加密平台与智能合约


    2014 年，一种新型加密资产随着 `Ethereum`——第二大加密资产——而出现。它建立在与 `Bitcoin` 相同的基础上，但在几个方面有所不同。特别是，它增加了一个关键功能：在其上编程任何事物的可能性。例如，它实现了智能合约。


    智能合约既不智能，甚至也不是传统法律意义上的合约。它们只是在区块链上编程到自执行代码中的一种“如果-那么”语句。然而，这个看似简单的概念却开启了一个新世界。例如，智能合约可以编程出不可变的协议，以指定价值流动（如交易），并实现自动、即时结算，且无需第三方。无需去法院并等待数周或数月来解决合约纠纷。在许多情况下，法院和等待时间都变得过时。


    然而，智能合约的关键要素并非金融交易的自动执行，因为这一概念在任何银行都已存在。真正具有革命性的是这种行为的去中心化性质。没有第三方，确保了该协议或“合约”将根据合约代码中指定的预定义规则得到公平执行。此外，智能合约并不仅限于定义价值流动。它们允许任何程序被上传到一种全球计算机上并自行执行。不仅是价值流动，任何程序的状态都会被永久记录在成千上万台计算机上，使其历史变得不可篡改。


    `Ethereum` 是第一个广泛成功支持智能合约的平台。抽象地说，`Ethereum` 就像一个应用商店。可以在其上构建应用程序。与此同时，还有其他应用商店可用：`Cardano`、`Solana`、`Polkadot`
    以及大量新兴平台。然而，截至撰写本文时，`Ethereum` 仍然是迄今为止最大的平台。


    正如 `Bitcoin`（大写 B）是一个网络，其原生货币是 `bitcoin`（小写 b）（`BTC`）一样，`Ethereum` 是一个网络，其原生货币是
    `ether`（`ETH`）。然而，与 `Bitcoin` 不同，`Ethereum` 是一个可编程的区块链，`ether` 促进了智能合约的流通。这些合约在去中心化的
    `Ethereum` 虚拟机——前述的“全球计算机”——上执行。虽然 `Bitcoin` 只允许一组受限的指令来验证用户的支付能力且功能有限，但 `Ethereum`
    提供了一套完整的可编程指令，使其能够用作通用计算机。用 IT 术语来说，其编程语言是 *图灵完备* 的。


    一个与互联网的有用类比能很好地说明这种差异。互联网依赖 `TCP` 作为一个基础协议。在 `TCP` 之上，构建了其他协议以实现特定功能（例如，`HTTP`
    用于网页，`SMTP` 用于电子邮件，`FTP` 用于文件传输，`XMPP` 用于开源消息传递）。`Bitcoin` 只允许一小部分指令集；从这个意义上说，它就像
    `SMTP`：为发送电子邮件而优化，或者对 `Bitcoin` 而言，是为发送货币而优化。另一方面，`Ethereum` 是一个更基础的层，就像 `TCP`。由于它包含了一套完整的可编程指令，它允许开发者创造任何有价值的东西：在其之上构建任何协议。唯一的限制是他们的想象力。


    一个重要的后果是可能对许多现有功能进行去中介化——移除中间人。在金融行业，识别那些分享价值蛋糕中一份的不必要中介是直接的；例如，匹配借款人和贷款人的银行。更广泛地说，任何在需求（如借款人）和解决方案（如贷款人）之间存在被捕获利润的金融服务，都可以通过智能合约进行编码和运行。因此，去中心化的代码可以取代传统金融的大部分：从资产管理到支付、经纪、托管、投资、衍生品等等。这些新的金融解决方案被称为
    *去中心化金融*，或简称 *DeFi*。


    当然，智能合约的力量不仅限于金融，而是延伸到任何具有数字化成分的行业，这几乎涵盖了所有行业。在金融之外，需求可能甚至更大。第 3 章展示了几个例子，例如音乐和出版业。许多其他行业同样会受益于智能合约所实现的去中介化。

    '
- fmt: "# Altcoins\n\nAny cryptoasset other than Bitcoin is called an *alternative\
    \ coin* or *altcoin*. As of May 2023, they encompass more than 23,000 cryptoassets.^([^(58)](#fn58))\n\
    \nThe first altcoin, `Namecoin`, was launched in the middle of 2011. It was closely\
    \ followed in the same year by a few other cryptoassets remarkably similar to\
    \ Bitcoin. Among them, `Litecoin` is still in the top 20 of the most valuable\
    \ cryptoassets ten years later. The number of altcoins then grew at an increasing\
    \ rate. In 2014, `Dogecoin` was created as a joke to make fun of cryptocurrency\
    \ hype. Ironically, as of 2023, `Dogecoin` is in the top 10 of the most valuable\
    \ cryptoassets.\n\nNot all altcoins have a real purpose in the new crypto ecosystem.\
    \ Many of these cryptoassets are justifiably called “sh*tcoins” as they are unlikely\
    \ to bring any value to the economy. Even if some of these cryptoassets benefited\
    \ from an unprecedented rise in value during crypto bull runs (more on that in\
    \ Part III), they are likely to become worthless. Some are even scams aimed at\
    \ stealing money from careless investors and speculators. As a result, the crypto\
    \ market will likely consolidate, with most existing coins dying while only a\
    \ few useful ones get the attention and accompanying rewards.\n\nNevertheless,\
    \ some altcoins bring real utility by unlocking value that could not be tapped\
    \ before. For example, a `Basic Attention Token` (`BAT`) monetizes media consumers’\
    \ time watching or interacting with ads online. It enables advertisers to value\
    \ precisely the attention users pay to ads. At the same time, it rewards users\
    \ for that attention. As a result, advertisers benefit more from running ads,\
    \ and consumers are fairly remunerated for their time and attention. `BAT` is\
    \ making an inefficient market more efficient. Value that was lost is now unlocked.\n\
    \nAnother example of unlocking value is `Chiliz` (`CHZ`), which enables entertainment\
    \ or sports communities to monetize and engage their audience. Hypothetically,\
    \ let’s say you are a fan supporting the Football Club Barcelona (FCB). You can\
    \ buy `FCB` tokens built on `Chiliz` and thereby get access to rebates for tickets\
    \ and merchandise from the team. In addition, your tokens could also correspond\
    \ to voting rights in decisions related to the club, such as the location of the\
    \ next merchandise building or the shape of stripes on the next socks worn by\
    \ the players.^([^(59)](#fn59)) Finally, if the team gains in popularity, then\
    \ the value of your token may go up. You are thereby not betting on a single game\
    \ but on a team. Again, this market did not exist before, or at least not to its\
    \ full extent; value is unlocked.\n\nThose are only a few examples of possibilities\
    \ enabled by altcoins, among thousands of other use cases currently under development.\n\
    \n# Key Concepts\n\nBitcoin, the first cryptoasset, was born in 2009 amid the\
    \ most serious financial crisis since the Great Depression. It is built on a new\
    \ technology, blockchain, which enables transacting assets digitally without requiring\
    \ any trusted intermediary.\n\nNot only is Bitcoin technically sound—the underlying\
    \ technology is working—but also socially acceptable, as was proved by the existence\
    \ of decentralized money for centuries in communities in the Pacific Ocean.\n\n\
    In its first decade, Bitcoin was used by a few early technology adopters, making\
    \ some of them millionaires. The illicit industry took advantage of Bitcoin’s\
    \ rapid growth, bringing negative headlines, even though its use remains a negligibly\
    \ small fraction of the illegal activity.\n\nCrypto platforms, like Ethereum,\
    \ were created in mid-2010 and extended the use of blockchain by enabling the\
    \ decentralized exchange of self-executing code rather than just value. Other\
    \ cryptoassets emerged, unlocking further value by creating previously non-existent\
    \ markets.\n\n# Extension Questions\n\nIf decentralized money systems are possible,\
    \ why were they only used anecdotally by small remote communities?\n\nIf a decentralized\
    \ digital money model is now possible, why are not more governments worldwide\
    \ embracing it yet?\n\nFootnotes [1](#600732_1_En_5_Chapter.xhtml#Fn1_source)\
    \ [2](#600732_1_En_5_Chapter.xhtml#Fn2_source) [3](#600732_1_En_5_Chapter.xhtml#Fn3_source)\
    \ [4](#600732_1_En_5_Chapter.xhtml#Fn4_source) [5](#600732_1_En_5_Chapter.xhtml#Fn5_source)\
    \ [6](#600732_1_En_5_Chapter.xhtml#Fn6_source) [7](#600732_1_En_5_Chapter.xhtml#Fn7_source)\n\
    \n# 6. Blockchain Basics\n\n> *Sed quis custodiet ipsos custodes? (But who will\
    \ guard the guards themselves?)*\n> \n> —Juvenal, ca. 100 BCE\n\nUnderstanding\
    \ cryptoassets involves understanding blockchain. The first cryptoasset, Bitcoin,\
    \ is only possible through blockchain, and blockchain was developed to make Bitcoin\
    \ possible. While alternative technologies were subsequently developed to make\
    \ cryptoassets technically possible, blockchain remains the core behind most cryptoassets.\n\
    \nThis chapter only scratches the surface of some essential technical aspects\
    \ enabling blockchain to work. A complete analysis would barely fit in an entire\
    \ book. Also, the core concepts are sufficient to understand the revolutionary\
    \ potential of blockchain. To draw a useful parallel, one can use the Internet\
    \ and build websites without understanding how the `TCP/IP` protocol works. The\
    \ same goes for blockchain; one can be a successful cryptoasset investor without\
    \ knowing all details behind cryptographic algorithms and all types of consensus\
    \ mechanisms. Nevertheless, the more one understands blockchain, the better one\
    \ can identify and manage underlying risks.\n\nReaders interested in the technical\
    \ details should refer to the onboarding guide *Bitcoin, the Blockchain and Beyond*\
    \ by Jean-Luc Verhelst [24] or, for more advanced reading, *Mastering Blockchain*\
    \ by Imran Bashir [1]."
  raw: "## Altcoins\n\nAny cryptoasset other than Bitcoin is called an *alternative\
    \ coin* or *altcoin*. As of May 2023, they encompass more than 23,000 cryptoassets.^([^(58)](#fn58))\n\
    \nThe first altcoin, Namecoin, was launched in the middle of 2011\\. It was closely\
    \ followed in the same year by a few other cryptoassets remarkably similar to\
    \ Bitcoin. Among them, Litecoin is still in the top 20 of the most valuable cryptoassets\
    \ ten years later. The number of altcoins then grew at an increasing rate. In\
    \ 2014, Dogecoin was created as a joke to make fun of cryptocurrency hype. Ironically,\
    \ as of 2023, Dogecoin is in the top 10 of the most valuable cryptoassets.\n\n\
    Not all altcoins have a real purpose in the new crypto ecosystem. Many of these\
    \ cryptoassets are justifiably called “sh*tcoins” as they are unlikely to bring\
    \ any value to the economy. Even if some of these cryptoassets benefited from\
    \ an unprecedented rise in value during crypto bull runs (more on that in Part\
    \ III), they are likely to become worthless. Some are even scams aimed at stealing\
    \ money from careless investors and speculators. As a result, the crypto market\
    \ will likely consolidate, with most existing coins dying while only a few useful\
    \ ones get the attention and accompanying rewards.\n\nNevertheless, some altcoins\
    \ bring real utility by unlocking value that could not be tapped before. For example,\
    \ a Basic Attention Token (BAT) monetizes media consumers’ time watching or interacting\
    \ with ads online. It enables advertisers to value precisely the attention users\
    \ pay to ads. At the same time, it rewards users for that attention. As a result,\
    \ advertisers benefit more from running ads, and consumers are fairly remunerated\
    \ for their time and attention. BAT is making an inefficient market more efficient.\
    \ Value that was lost is now unlocked.\n\nAnother example of unlocking value is\
    \ Chiliz (CHZ), which enables entertainment or sports communities to monetize\
    \ and engage their audience. Hypothetically, let’s say you are a fan supporting\
    \ the Football Club Barcelona (FCB). You can buy FCB tokens built on Chiliz and\
    \ thereby get access to rebates for tickets and merchandise from the team. In\
    \ addition, your tokens could also correspond to voting rights in decisions related\
    \ to the club, such as the location of the next merchandise building or the shape\
    \ of stripes on the next socks worn by the players.^([^(59)](#fn59)) Finally,\
    \ if the team gains in popularity, then the value of your token may go up. You\
    \ are thereby not betting on a single game but on a team. Again, this market did\
    \ not exist before, or at least not to its full extent; value is unlocked.\n\n\
    Those are only a few examples of possibilities enabled by altcoins, among thousands\
    \ of other use cases currently under development.\n\n## Key Concepts\n\nBitcoin,\
    \ the first cryptoasset, was born in 2009 amid the most serious financial crisis\
    \ since the Great Depression. It is built on a new technology, blockchain, which\
    \ enables transacting assets digitally without requiring any trusted intermediary.\n\
    \nNot only is Bitcoin technically sound—the underlying technology is working—but\
    \ also socially acceptable, as was proved by the existence of decentralized money\
    \ for centuries in communities in the Pacific Ocean.\n\nIn its first decade, Bitcoin\
    \ was used by a few early technology adopters, making some of them millionaires.\
    \ The illicit industry took advantage of Bitcoin’s rapid growth, bringing negative\
    \ headlines, even though its use remains a negligibly small fraction of the illegal\
    \ activity.\n\nCrypto platforms, like Ethereum, were created in mid-2010 and extended\
    \ the use of blockchain by enabling the decentralized exchange of self-executing\
    \ code rather than just value. Other cryptoassets emerged, unlocking further value\
    \ by creating previously non-existent markets.\n\n## Extension Questions\n\nIf\
    \ decentralized money systems are possible, why were they only used anecdotally\
    \ by small remote communities?\n\nIf a decentralized digital money model is now\
    \ possible, why are not more governments worldwide embracing it yet?\n\nFootnotes\
    \ [1](#600732_1_En_5_Chapter.xhtml#Fn1_source)   [2](#600732_1_En_5_Chapter.xhtml#Fn2_source)\
    \   [3](#600732_1_En_5_Chapter.xhtml#Fn3_source)   [4](#600732_1_En_5_Chapter.xhtml#Fn4_source)\
    \   [5](#600732_1_En_5_Chapter.xhtml#Fn5_source)   [6](#600732_1_En_5_Chapter.xhtml#Fn6_source)\
    \   [7](#600732_1_En_5_Chapter.xhtml#Fn7_source)\n\n# 6. Blockchain Basics\n\n\
    > *Sed quis custodiet ipsos custodes? (But who will guard the guards themselves?)*\n\
    > \n> —Juvenal, ca. 100 BCE\n\nUnderstanding cryptoassets involves understanding\
    \ blockchain. The first cryptoasset, Bitcoin, is only possible through blockchain,\
    \ and blockchain was developed to make Bitcoin possible. While alternative technologies\
    \ were subsequently developed to make cryptoassets technically possible, blockchain\
    \ remains the core behind most cryptoassets.\n\nThis chapter only scratches the\
    \ surface of some essential technical aspects enabling blockchain to work. A complete\
    \ analysis would barely fit in an entire book. Also, the core concepts are sufficient\
    \ to understand the revolutionary potential of blockchain. To draw a useful parallel,\
    \ one can use the Internet and build websites without understanding how the TCP/IP\
    \ protocol works. The same goes for blockchain; one can be a successful cryptoasset\
    \ investor without knowing all details behind cryptographic algorithms and all\
    \ types of consensus mechanisms. Nevertheless, the more one understands blockchain,\
    \ the better one can identify and manage underlying risks.\n\nReaders interested\
    \ in the technical details should refer to the onboarding guide *Bitcoin, the\
    \ Blockchain and Beyond* by Jean-Luc Verhelst [24] or, for more advanced reading,\
    \ *Mastering Blockchain* by Imran Bashir [1]."
  trans: "\n# 替代币\n\n除比特币之外的任何加密资产都被称为*替代币*。截至 2023 年 5 月，其数量已超过 23,000 种。^(⁵⁸)\n\n\
    第一种替代币 `Namecoin` 于 2011 年年中推出。同年紧随其后出现的几种加密资产与比特币极为相似。其中，`Litecoin` 在十年后仍位列最有价值加密资产的前\
    \ 20 名。此后，替代币的数量以越来越快的速度增长。2014 年，`Dogecoin` 作为一种嘲讽加密货币热潮的笑话而诞生。讽刺的是，截至 2023 年，`Dogecoin`\
    \ 已跻身最有价值加密资产的前十名。\n\n并非所有替代币都在新的加密生态系统中具有实际用途。其中许多加密资产被恰如其分地称为“垃圾币”，因为它们不太可能为经济带来任何价值。即使其中一些资产在加密货币牛市期间经历了前所未有的价值飙升（详见第三部分），它们也可能变得一文不值。有些甚至是旨在从粗心的投资者和投机者那里窃取资金的骗局。因此，加密货币市场可能会经历整合，大多数现有代币将消亡，只有少数有用的代币会获得关注和相应的回报。\n\
    \n尽管如此，一些替代币通过释放之前无法挖掘的价值，确实带来了实际效用。例如，`基本注意力代币`（`BAT`）将媒体消费者在线观看或与广告互动的时间货币化。它使广告商能够精确衡量用户对广告的关注度，同时，它也会因用户的关注而给予其奖励。其结果是，广告商从投放广告中获益更多，消费者也因其时间和注意力而获得公平的报酬。`BAT`\
    \ 正在使一个低效的市场变得更高效，那些曾经流失的价值现在被释放了出来。\n\n另一个释放价值的例子是 `Chiliz`（`CHZ`），它使娱乐或体育社区能够将其受众货币化并与其互动。假设你是一个支持巴塞罗那足球俱乐部（FCB）的球迷，你可以购买基于\
    \ `Chiliz` 构建的 `FCB` 代币，从而获得该球队门票和商品的折扣。此外，你的代币还可能对应于与俱乐部相关决策的投票权，例如下一个商品店的位置，或球员下一款球袜上条纹的形状。^(⁵⁹)\
    \ 最后，如果球队的人气提升，你的代币价值也可能上涨。因此，你不是在赌某一场比赛，而是在赌一支球队。再次强调，这个市场以前并不存在，或者说至少没有完全发展起来；价值被释放了。\n\
    \n这些只是替代币所实现可能性的少数几个例子，而目前正在开发的应用案例还有数千个。\n\n# 关键概念\n\n比特币，第一种加密资产，诞生于 2009 年大萧条以来最严重的金融危机之中。它建立在一种名为区块链的新技术之上，该技术无需任何可信中介即可实现数字资产交易。\n\
    \n比特币不仅在技术上可靠——其底层技术运行良好——而且在社会上也可接受，太平洋地区社区中几个世纪以来存在的去中心化货币就证明了这一点。\n\n在其诞生后的第一个十年里，比特币被少数早期技术采用者使用，其中一些人因此成为了百万富翁。非法行业曾利用比特币的快速增长，带来了负面头条新闻，尽管其使用在非法活动中所占的比例仍然微不足道。\n\
    \n像以太坊这样的加密平台创建于 2010 年代中期，它通过实现可自动执行代码（而不仅仅是价值）的去中心化交换，扩展了区块链的应用。其他加密资产也相继出现，通过创造以前不存在的市场，进一步释放了价值。\n\
    \n# 延伸问题\n\n如果去中心化货币体系是可行的，为什么它此前仅被与世隔绝的小型社区零星使用？\n\n如果去中心化数字货币模式现在已成为可能，为什么还没有更多国家的政府全面接受它？\n\
    \n脚注 1 2 3 4 5 6 7\n\n# 6. 区块链基础\n\n> *Sed quis custodiet ipsos custodes? （但谁来监督监督者自身？）*\n\
    > \n> ——尤维纳利斯，约公元前 100 年\n\n理解加密资产离不开理解区块链。第一种加密资产比特币只有通过区块链才能实现，而区块链的开发也正是为了使比特币成为可能。尽管后来发展了替代技术以使加密资产在技术上可行，但区块链仍然是大多数加密资产背后的核心。\n\
    \n本章仅触及使区块链得以运行的一些基本技术方面的皮毛。完整的分析几乎需要整本书的篇幅。此外，核心概念足以理解区块链的革命性潜力。打个有用的比方，一个人无需理解\
    \ `TCP/IP` 协议的工作原理，也能使用互联网和建立网站。区块链也是如此；一个人无需了解密码算法和所有类型共识机制背后的所有细节，也能成为成功的加密资产投资者。尽管如此，对区块链了解得越多，就越能识别和管理潜在风险。\n\
    \n对技术细节感兴趣的读者可参考 Jean-Luc Verhelst [24] 的入门指南《比特币、区块链及其超越》，或可阅读 Imran Bashir [1]\
    \ 的进阶读物《精通区块链》。\n"
- fmt: '# Blockchain’s Main Characteristics


    At its core, a blockchain is a database. In finance, one would call it a *ledger*,
    as it contains all the credits and debits of a digital asset since its inception.
    Digital assets stored on a blockchain can represent tangible assets, like real
    estate property titles, or be fully digital assets, like Bitcoin.


    A blockchain is characterized by *decentralization*. Instead of storing data on
    a single computer—a centralized model—data is stored on many computers on the
    network. An established blockchain like the Bitcoin one is stored on hundreds
    of thousands of computers spread all over the planet. It is not a fully *distributed*
    system where all users act as information-sharing entities. Nevertheless, it is
    a peer-to-peer (P2P) network that does not rely on any central authority and enables
    anybody to become a node in possession of the entire ledger, acting as an information-sharing
    entity. Therefore, blockchains are between decentralized and distributed networks:
    all nodes can share information (distributed), but not all choose to do so (decentralized).^([^(60)](#fn60))


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig1_HTML.png)


    A diagram of the centralized, decentralized, and distributed networks. Centralized
    has a central server connected to several nodes in a circle. Decentralized has
    4 connected servers, each with several nodes. Distributed has interconnected nodes
    that communicate with each other.


    **Figure 6-1** – Centralized, decentralized, and distributed networks


    The decentralized nature of blockchain networks implies that decisions regarding
    data are not taken by a single entity but through agreements among all network
    members. Also, *no central authority can shut down such networks* as transactions
    are *permissionless*. Indeed, no barriers to entry can be set by any central authority
    so that everybody can join the system and transact with anybody else on the network
    without requiring tedious approval processes.


    Successful blockchains entail an economic guarantee that they will continue functioning
    as intended. This guarantee is secured by carefully designed incentives in line
    with game theory principles. In other words, it is in all actors’ interest to
    behave according to the system’s rules, while deviating is costly and pointless.


    Another key characteristic of blockchain is that the data it stores is *immutable*.
    It cannot be changed. Once a transaction is successfully recorded, all nodes (computers)
    choosing to act as holders of the complete blockchain keep a record of that transaction
    and all transactions that precede it. Given the large number of independent copies,
    transactions approved by the network are unerasable.


    Most blockchains, such as the Bitcoin one, integrate a high degree of *transparency*
    but are *pseudonymous*. For example, the Bitcoin blockchain does not reveal the
    identity of Bitcoin holders but publicly shares their pseudonyms (the wallet’s
    digital address) and all related transactions. It differs from anonymity, where
    no pseudonym could be linked to a transaction.^([^(61)](#fn61)) In the case of
    Bitcoin, anybody can check online the amount held in the digital wallet of a pseudonym
    and all transactions it ever sent or received on the corresponding blockchain.


    To achieve these characteristics, blockchain technology uses cryptography and
    consensus mechanisms. The following sections analyze these concepts.


    # A Chain of Blocks


    As the name implies, a blockchain is a chain of *blocks*. Each block contains
    data such as user transactions, a timestamp, and a link to the previous block.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig2_HTML.png)


    A block diagram has the following flow: block `n`, block `n-1`, block `n-2`, block
    `n-2` to block `3`, block `2`, block `1`, and block `0` of the genesis block.


    **Figure 6-2** – A blockchain is a chain of blocks, where each block contains
    a cryptographic hash of the previous block in the chain


    The entire block content is cryptographically hashed, meaning that its content
    is summarized, for example, in a 64-character string. A *hash* can be considered
    the fingerprint of a set of digital information: much smaller than the original
    information but uniquely identifying it. Hashing a block gives it a unique label.
    Changing the slightest bit of information in the block gives the block a radically
    different label. Moreover, since the block contains the label of the previous
    block in its content, changing any information in a previous block of the chain
    radically changes the label of all future blocks.


    Figure [6-3](#600732_1_En_6_Chapter.xhtml#Fig3) illustrates how changing a tiny
    bit of information in the input of a hash function yields a drastically different
    output. This example uses `SHA-256` (SHA stands for Secure Hash Algorithm), the
    algorithm used to hash blocks in the Bitcoin blockchain.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig3_HTML.png)


    A flow diagram of input includes Alice sending several BTCs to Bob and Carol that
    leads to the output of fingerprint hash codes via the hash function.


    **Figure 6-3** – SHA-256 hashing algorithm example. Changing the slightest information
    in the input yields a drastically different output


    A characteristic of this algorithm is that regardless of the length or content
    of the input, the output is always 64 characters long and seems random. Also,
    using the same input always yields the same output. However, with any given output,
    it is virtually impossible to reverse engineer what the input was.


    One can think of a simple hashing algorithm as a mathematical algorithm, like
    the “square” function. For example, squaring `2` or `-2` would yield the same
    output, `4`, but given the output `4`, one cannot identify the input (in this
    case, whether it was `2` or `-2`). However, the `SHA-256` algorithm is much more
    complex, so guessing the input from a given output is virtually impossible, contrary
    to this simplistic example with `2` and `-2`.'
