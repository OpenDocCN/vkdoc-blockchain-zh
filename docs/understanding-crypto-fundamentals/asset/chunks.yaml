- fmt: '# Storing Value


    The concept of saleability introduced by Menger is closely related to that of
    a store of value. In particular, his first and third criteria^([³](#fn3)) are
    worth investigating further to understand what makes an actual store of value.


    Paraphrasing Menger’s first criterion, there must be a demand for the good. If
    the demand for a good is non-existent, it is worthless, regardless of its supply
    characteristics. For example, if a mediocre artist paints only five paintings
    over his lifetime, it does not automatically make them valuable. There must be
    interested buyers for the paintings to have value. In other words, a good store
    of value has a high demand. With population growth and increasing prosperity in
    early societies, the demand for shiny metals was growing, especially for gold
    and silver.


    Menger’s third criterion of the saleability of an asset relates to relative scarcity,
    which is measured by the *stock-to-flow* *ratio*.^([⁴](#fn4)) The *stock* of an
    asset is the total existing usable quantity of the asset. For example, while unmined
    gold still exists in difficult-to-reach areas, its *stock* is the quantity of
    available gold usable by individuals. On the other hand, the asset’s *flow* is
    the quantity that can be added to its stock per unit of time—for example, the
    number of tons of gold mined in a year.


    An asset with a high flow relative to its stock renders the stock of the asset
    worth little because the stock can increase significantly with time. For example,
    if the stock of copper in an economy at the beginning of a year is 100, and its
    yearly flow is 50, then the stock at the end of the year would sum up to 150,
    assuming no loss, destruction, or corrosion of the stock. A copper holder cannot
    expect the asset to remain scarce because a substantial proportion, compared to
    the existing quantity, can rapidly increase the stock. An asset with a high flow
    compared to its stock quickly loses any scarcity it might have had. By extension,
    only assets with a small flow compared to their stock (or high stock-to-flow ratio)
    can be potential stores of value because only such assets remain scarce.


    Regarding their stock-to-flow, assets are not equal. Far from it, actually. First,
    any perishable product (e.g., apples, eggs, nuts), corrodible asset (e.g., iron,
    copper), or other consumable commodities (e.g., zinc, nickel) have a low stock-to-flow
    because no stock can accumulate over extended periods. At the same time, the flow
    represents a substantial portion of the asset’s stock. Only durable (non-perishable)
    assets can apply as potential stores of value. Gold, for example, ranks well as
    a durable asset because its chemical stability makes it virtually indestructible.


    Second, an actual store of value must be an asset whose flow does not vary much
    with the stock’s market price. Economists refer to this characteristic as the
    price elasticity of supply. For example, if the market value of copper suddenly
    increased dramatically, many individuals would become copper producers to leverage
    the opportunity. As a result, the quantity of copper produced would rise accordingly.
    In other terms, the flow would increase until the asset is no longer scarce and
    its price drops to its long-term economic level. So, copper production (its flow)
    depends heavily on its market price. In economic terms, copper is an asset with
    a high price elasticity of supply. However, this price-to-supply relationship
    is almost non-existent for gold. History has shown that even when the price of
    gold increased dramatically, its production remained almost unchanged. In particular,
    the increase in the global gold stockpile did not exceed 2% in any year since
    World War II. In 2006, despite a 36% increase in the market price of gold, the
    annual production decreased in both 2006 and 2007.^([⁵](#fn5)) In other words,
    gold’s supply is not affected much by changes in its market price. Gold has a
    low price elasticity of supply.


    Growing demand and marginally increasing supply made gold the optimal store of
    value throughout the past few millennia. While silver ranks better than other
    commodities, it is still second to gold in these characteristics. For this reason,
    people typically only used silver as a medium of exchange for transactions of
    small value.'
  raw: '## Storing Value


    The concept of saleability introduced by Menger is closely related to that of
    a store of value. In particular, his first and third criteria^([³](#fn3)) are
    worth investigating further to understand what makes an actual store of value.


    Paraphrasing Menger’s first criterion, there must be a demand for the good. If
    the demand for a good is non-existent, it is worthless, regardless of its supply
    characteristics. For example, if a mediocre artist paints only five paintings
    over his lifetime, it does not automatically make them valuable. There must be
    interested buyers for the paintings to have value. In other words, a good store
    of value has a high demand. With population growth and increasing prosperity in
    early societies, the demand for shiny metals was growing, especially for gold
    and silver.


    Menger’s third criterion of the saleability of an asset relates to relative scarcity,
    which is measured by the *stock-to-flow* *ratio*.^([⁴](#fn4)) The *stock* of an
    asset is the total existing usable quantity of the asset. For example, while unmined
    gold still exists in difficult-to-reach areas, its *stock* is the quantity of
    available gold usable by individuals. On the other hand, the asset’s *flow* is
    the quantity that can be added to its stock per unit of time—for example, the
    number of tons of gold mined in a year.


    An asset with a high flow relative to its stock renders the stock of the asset
    worth little because the stock can increase significantly with time. For example,
    if the stock of copper in an economy at the beginning of a year is 100, and its
    yearly flow is 50, then the stock at the end of the year would sum up to 150,
    assuming no loss, destruction, or corrosion of the stock. A copper holder cannot
    expect the asset to remain scarce because a substantial proportion, compared to
    the existing quantity, can rapidly increase the stock. An asset with a high flow
    compared to its stock quickly loses any scarcity it might have had. By extension,
    only assets with a small flow compared to their stock (or high stock-to-flow ratio)
    can be potential stores of value because only such assets remain scarce.


    Regarding their stock-to-flow, assets are not equal. Far from it, actually. First,
    any perishable product (e.g., apples, eggs, nuts), corrodible asset (e.g., iron,
    copper), or other consumable commodities (e.g., zinc, nickel) have a low stock-to-flow
    because no stock can accumulate over extended periods. At the same time, the flow
    represents a substantial portion of the asset’s stock. Only durable (non-perishable)
    assets can apply as potential stores of value. Gold, for example, ranks well as
    a durable asset because its chemical stability makes it virtually indestructible.


    Second, an actual store of value must be an asset whose flow does not vary much
    with the stock’s market price. Economists refer to this characteristic as the
    price elasticity of supply. For example, if the market value of copper suddenly
    increased dramatically, many individuals would become copper producers to leverage
    the opportunity. As a result, the quantity of copper produced would rise accordingly.
    In other terms, the flow would increase until the asset is no longer scarce and
    its price drops to its long-term economic level. So, copper production (its flow)
    depends heavily on its market price. In economic terms, copper is an asset with
    a high price elasticity of supply. However, this price-to-supply relationship
    is almost non-existent for gold. History has shown that even when the price of
    gold increased dramatically, its production remained almost unchanged. In particular,
    the increase in the global gold stockpile did not exceed 2% in any year since
    World War II. In 2006, despite a 36% increase in the market price of gold, the
    annual production decreased in both 2006 and 2007.^([⁵](#fn5)) In other words,
    gold’s supply is not affected much by changes in its market price. Gold has a
    low price elasticity of supply.


    Growing demand and marginally increasing supply made gold the optimal store of
    value throughout the past few millennia. While silver ranks better than other
    commodities, it is still second to gold in these characteristics. For this reason,
    people typically only used silver as a medium of exchange for transactions of
    small value.'
  trans: '

    # 价值存储


    门格尔提出的“可销售性”概念与价值存储密切相关。要理解什么才是真正的价值存储载体，尤其需要深入研究他提出的第一和第三项标准^(³)。


    用通俗的话来说，门格尔的第一条标准是：商品必须存在需求。如果某种商品完全没有需求，无论其供给特性如何，都毫无价值。例如，即使一位平庸的画家一生只创作了五幅画，这并不会自动让这些画作变得珍贵。只有当存在感兴趣的买家时，这些画作才有价值。换言之，良好的价值存储载体必须具有高需求。在早期社会，随着人口增长和社会日益繁荣，人们对闪亮金属的需求不断增加，尤其是黄金和白银。


    门格尔关于资产可销售性的第三项标准涉及相对稀缺性，衡量标准是**存量-流量比**^(⁴)。资产的*存量*是指该资产现存的可使用总量。例如，虽然难以到达的地区仍存在未开采的黄金，但其*存量*是指人们可使用的现有黄金数量。另一方面，资产的*流量*是指单位时间内可添加到其存量中的数量——例如，一年内开采的黄金吨数。


    相对于存量而言具有高流量的资产，其存量价值极低，因为存量会随时间大幅增加。例如，假设年初经济体中铜的存量为 100，年流量为 50，则在无损耗、损毁或腐蚀的情况下，年末存量将增至
    150。铜持有者不能指望该资产保持稀缺，因为与现有数量相比，相当大的比例会迅速增加存量。相对于存量具有高流量的资产会迅速丧失其可能拥有的任何稀缺性。推而言之，只有相对于存量具有较小流量（即高存量-流量比）的资产才可能成为价值存储载体，因为只有这类资产才能保持稀缺。


    就存量-流量比而言，资产并非生而平等。实际上，差距悬殊。首先，任何易腐烂产品（如苹果、鸡蛋、坚果）、易腐蚀资产（如铁、铜）或其他消耗性商品（如锌、镍）的存量-流量比都很低，因为无法长期积累存量。同时，其流量占资产存量的很大比例。只有耐用（不易腐烂）的资产才可能成为价值存储载体。例如，黄金作为耐用资产表现优异，因其化学稳定性使其几乎坚不可摧。


    其次，真正的价值存储载体必须是一种流量不受存量市场价格大幅波动的资产。经济学家将这一特性称为供给的价格弹性。例如，如果铜的市场价值突然暴涨，许多人就会成为铜生产商以抓住这个机会。结果，铜的产量会相应增加。换言之，流量会增加，直至该资产不再稀缺，其价格回落到长期经济水平。因此，铜的生产（即其流量）严重依赖其市场价格。在经济学术语中，铜是一种供给价格弹性高的资产。然而，这种价格-供给关系对黄金而言几乎不存在。历史表明，即使黄金价格大幅上涨，其产量也几乎保持不变。特别是自二战以来，全球黄金储备在任何一年中的增幅都未超过
    2%。2006 年，尽管黄金市场价格上涨了 36%，但 2006 年和 2007 年的年产量却均有所下降。^(⁵) 换言之，黄金的供给受其市场价格变化的影响很小。黄金具有较低的供给价格弹性。


    不断增长的需求和微幅增长的供给，使黄金在过去几千年中成为最优的价值存储载体。虽然白银在这些特性上优于其他商品，但仍然次于黄金。正因如此，人们通常仅将白银用作小额交易的交换媒介。

