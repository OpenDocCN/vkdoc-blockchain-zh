  trans: "\n# 包容性\n\n2019 年，`联合国儿童基金会`指出，全球四分之一的出生人口未进行登记，且未记录出生人口的比例正在上升。东南亚和非洲的发展中国家是导致这一数字的主要因素，因为流程的复杂性和登记费用可能会让父母望而却步。不幸的是，缺乏官方出生登记往往使儿童无法获得医疗或教育等基本服务。此外，缺乏登记还使这些儿童面临更高的被剥削风险[12]。\n\
    \n获取身份证明应当简单且价格合理。同样，区块链技术通过消除获取障碍提供了这些优势。简化的流程提供了由最先进密码学保障的、廉价且不可伪造的身份证明。此外，消除获取障碍以促进更大的包容性不仅适用于身份领域，也适用于银行等服务领域。\n\
    \n全球约有 20 亿人没有银行账户，因此被排除在许多经济机会之外。与出生登记相比，开户费用可能令人却步，交易费用过高，且设有最低金额要求。借助区块链技术，无需银行账户即可参与经济活动，甚至无需拥有正式的身份证明。因此，加密资产能够更简单、更廉价地实现无银行账户人群的更高包容性，这是迄今为止任何技术都未能做到的。\n\
    \n诚然，使用区块链需要用户能够访问互联网。不幸的是，这 20 亿无银行账户的人中有许多无法上网。然而，随着互联网基础设施的扩展，越来越多的人能够加入他们此前无法触及的经济体系。\n\
    \n# 私有财产\n\n2022 年，数百万东欧公民被迫逃离自己的国家。在别处寻求庇护时，许多人几乎失去了所拥有的一切，因为他们无法携带财富跨境。在许多情况下，他们随身携带的少量物品被没收或被盗。除了乌克兰危机，联合国难民事务高级专员还指出了全球另外至少十几起紧急情况，在这些情况中，人们常常面临类似的灾难。\n\
    \n虽然一个人的财富大部分体现在实物上，但也有一部分存在于在线货币账户中。不幸的是，这些资金并不总是易于转移，因为其背后的机构往往在最需要提取资金时拒绝放款。此外，国际转账可能受到特定金额的限制，并需支付高额费用。\n\
    \n相比之下，`比特币`使持有者无论在任何情况下都能携带财富。通过记住一个 12 个单词的助记词，人们可以从地球上的任何地方恢复使用`比特币`钱包进行交易。无论冲突、金融机构的限制或国家的政治议程如何，人们都可以拥有私有财产。\n\
    \n正因如此，风险最高的国家正在引领加密资产的采用。例如，`Chainalysis`的 2022 年全球加密采用指数将越南、菲律宾、乌克兰和印度列为加密采用率最高的国家[13]。\n\
    \n# 言论自由\n\n2022 年 10 月，金融科技巨头`PayPal`更新了其可接受使用政策（`AUP`），警告用户，若“传播错误信息”将被处以 2500\
    \ 美元的罚款。这一更新立即引发了公众的强烈反应，人们纷纷发声反对这种对言论自由的限制。例如，`PayPal`前总裁大卫·马库斯在推特上表示了对这一更新的强烈反对。\n\
    \n> *我很难公开批评一家我深爱并为之付出良多的公司。但`@PayPal`的新`AUP`违背了我所信仰的一切。如今，一家私营公司竟能因为你说了他们不同意的话就决定罚没你的钱。简直疯狂。*\n\
    > \n> ——大卫·马库斯\n\n尽管`PayPal`迅速撤销了这一决定，但这草率的更新引起了全球各地社群对中心化机构权力的担忧。特别是，它加强了采用去中心化系统来保护公众免受金融机构扣押资金能力的理由。保障言论自由意味着人们应该能够自由表达观点，而无需担心招致威胁其生命或财产的后果。\n\
    \n正因如此，世界各地的记者和活动家已经开始使用加密资产，特别是`比特币`进行交易。他们不仅面临因与机构意见不合或利益冲突而导致资金被扣押的低风险，同时也提高了自身的隐私性。\n\
    \n# 通货膨胀\n\n根据世界银行数据库，在截至 2021 年的二十年里，有 28 个国家的年平均通胀率达到两位数或更高。^(⁴¹) 这些国家代表超过 13\
    \ 亿人，他们国家货币的可靠性不足以存储通过劳动获得的财富。^(⁴²) 此外，2022 年全球通货膨胀显著上升，使情况进一步恶化。\n\n正如第 1 章所述，通货膨胀反映了经济体中货币数量的增加。它通过中央银行提供的增量货币和商业银行创造的信贷来实现。换句话说，让中央银行随意印钞为可能无限的通货膨胀打开了大门。\n\
    \n中央银行的信誉越高，人们对未来通胀率将保持在目标水平附近的信任度就越高。然而，即使是相对可信的央行也难以维持这一目标，因为在困难时期，印制更多货币的动机会变得不可抗拒。例如，尽管欧洲央行的任务是保持通胀率低于\
    \ 2%，但欧元区 2022 年 10 月和 11 月的官方同比通胀率却超过了 10%。正如之前所述，由于用于计算官方通胀水平的指标问题，实际通胀率可能更高。即使对于`欧洲央行`而言，对其遏制通胀能力的信任也在减弱。\n\
    \n相比之下，`比特币`以绝对可信的方式实现了中央银行的功能自动化。没有人能以超出代码规定的速度挖掘比特币。因此，无论情况如何，未来的通胀率都是绝对确定且不可改变的。2023\
    \ 年，`比特币`的通胀率约为 1.5%，并将持续下降，直至大约 2140 年达到 0%。\n"
- fmt: '## Environment


    As of 2023, the total electricity consumption for securing the Bitcoin network
    is as high as the total energy consumption of Switzerland. This record energy
    usage is the cause of recurring attacks on cryptoassets by environmentalists.
    However, upon more informed analysis, this industry’s emergence is a net benefit
    for the environment, as exposed next.


    First, the high energy consumption argument does not apply to all cryptoassets.
    Most cryptoassets do not rely on an energy-intensive mechanism to secure their
    network but on alternatives consuming much less energy. For example, the more
    widespread proof-of-stake mechanism consumes less than 1% of the energy consumed
    by a proof-of-work mechanism. For instance, a transaction on the Solana blockchain
    only uses 2,707 Joules or less energy than three Google searches [14]. To set
    records straight, the high energy consumption of the industry is almost exclusively
    coming from Bitcoin mining, a process explored in detail in Chapter [6](#600732_1_En_6_Chapter.xhtml).
    For now, just remember that Bitcoin mining consists of thousands of computers
    worldwide partaking in a race by consuming computer power to earn (“mine”) new
    bitcoins, thereby securing the network from external attacks.


    Second, cryptoassets could replace most of the current financial industry. They
    have already started to replace banking services, payment transfer companies,
    brokers, clearing houses, and more. The outdated infrastructure they replace is
    highly energy-consuming. Even at its peak consumption, the cryptoasset industry
    consumes only a fraction of the energy the current inefficient infrastructure
    uses. For instance, a May 2021 study by Galaxy Digital establishes that Bitcoin’s
    energy consumption is less than half the energy consumed by the traditional banking
    system alone [15]. Transitioning from the traditional financial system to a cryptoasset-based
    system would materially decrease total energy consumption.


    However, these first two arguments are only minor in addressing the energy-consumption
    issue that cryptoasset critics put forward. The fundamental arguments they ignore
    are the following.


    The proof-of-work consensus mechanism securing the Bitcoin blockchain creates
    a market for energy where efficient energy sources have a competitive advantage.
    For example, natural and renewable geothermal energy in countries like El Salvador
    can now be valued and traded globally. However, mining Bitcoin is only interesting
    financially where and when energy is exceptionally cheap. For instance, it is
    only meaningful when it cannot power anything else useful. If that energy could
    serve any purpose besides mining Bitcoin, it would be advantageous for the producer
    to use it for that alternative purpose. As a result, Bitcoin’s energy consumption
    would not have otherwise gone to powering a US household or lighting a German
    highway. Instead, it is energy that would otherwise be lost because the demand
    on the electricity grid at that place and time is exceptionally low. Since excess
    energy cannot be effectively stored, using it to secure the Bitcoin network benefits
    all users worldwide while preventing energy from going to waste. In addition,
    countries rich in natural and renewable energy can now trade previously unusable
    excess energy to benefit local communities.


    Critics of Bitcoin’s energy consumption fail to understand that Bitcoin does not
    provide incentives to mine where energy can power other valuable purposes. It
    is in stark contrast to Christmas lights, for example, which plug where and when
    energy is necessary to fulfill basic needs such as warming a home or cooking food.
    Another example is clothes driers, typically using energy where it is valued the
    highest—big cities—and consuming more energy than Bitcoin mining worldwide.^([^(43)](#fn43))


    In addition, the energy used to mine Bitcoin comes primarily from renewable sources.
    The Bitcoin Mining Council, gathering 53 mining companies representing half of
    the global network, revealed in its Q4 2022 report that 59% of Bitcoin mining
    uses renewable energy, a figure higher than for any country in the world and growing
    rapidly. Independent institutions and academic bodies researching the same topic
    confirm this finding. In comparison, the share of renewable energy used to power
    the energy grid is only about 31% in the United States and below 22% worldwide.
    Securing the Bitcoin network is therefore a much greener endeavor than using most
    other technologies. Besides, Bitcoin mining efficiency and its sustainable electricity
    mix continuously evolve for the better. For instance, Bitcoin’s mining efficiency
    improved by a factor of 58 over the past eight years [16]. This phenomenal improvement
    means the cost of securing the Bitcoin network dropped by more than 98% over this
    period. Not only is the Bitcoin network secured in a much greener way than most
    technologies, but it is also increasingly more efficient in doing so.


    ![](images/600732_1_En_3_Chapter/600732_1_En_3_Fig1_HTML.jpg)


    A bar graph of Bitcoin mining % in 12 countries. Global bitcoin mining 58.8. Germany
    48.5. E U 43.5. South Korea 33.7. U S 31.4. Canada 22.5. Brazil 21.7. World 21.7.
    Russia 19.6. China 16.4. Japan 16.3. Poland 15.6. India 12.6.


    **Figure 3-1**


    Sustainable power mix: Bitcoin mining vs. countries (% of TWh) (Source: Bitcoin
    Mining Council Q4 2022 report [16])


    Furthermore, Bitcoin mining incentivizes the financing of renewable power infrastructure
    around the world. For example, wind turbines and hydropower plants are often in
    shortage when demand on the grid is high. However, they produce excess energy
    when demand is low—lost energy that producers cannot store or trade to recover
    investment costs. With the option to mine Bitcoin, they now have the means to
    put this excess energy to practical use and pay off their fixed costs with the
    proceeds. This mechanism of countercyclical energy use for Bitcoin mining compared
    to grid demand (reflected in energy prices) has a stabilizing impact. Investing
    in renewable power plants becomes more attractive with a more stable energy demand
    because producers can continuously benefit from their output. As a result, renewable
    energy revenues become more reliable, increasing incentives to finance renewable
    infrastructure.


    Finally, new developments enable Bitcoin miners to capture flared methane and
    other unwanted side-products of currently polluting processes. Oil drilling, for
    example, is a process during which natural gas is sometimes discovered. As petroleum
    drilling sites often lack pipelines to redirect it, natural gas in the past has
    typically been released into the atmosphere or burned, referred to as *flaring*.
    This stranded gas can now be used to create cheap electricity and mine Bitcoin.
    As a result, the CO[2] output of the oil drilling processes decreases while at
    the same time providing extra revenue to miners [17]. Bitcoin mining thereby further
    contributes positively to the environment. Therefore, if it is not the case already,
    Bitcoin mining will soon become a carbon-negative industry.'
  raw: '## Environment


    As of 2023, the total electricity consumption for securing the Bitcoin network
    is as high as the total energy consumption of Switzerland. This record energy
    usage is the cause of recurring attacks on cryptoassets by environmentalists.
    However, upon more informed analysis, this industry’s emergence is a net benefit
    for the environment, as exposed next.


    First, the high energy consumption argument does not apply to all cryptoassets.
    Most cryptoassets do not rely on an energy-intensive mechanism to secure their
    network but on alternatives consuming much less energy. For example, the more
    widespread proof-of-stake mechanism consumes less than 1% of the energy consumed
    by a proof-of-work mechanism. For instance, a transaction on the Solana blockchain
    only uses 2,707 Joules or less energy than three Google searches [14]. To set
    records straight, the high energy consumption of the industry is almost exclusively
    coming from Bitcoin mining, a process explored in detail in Chapter [6](#600732_1_En_6_Chapter.xhtml).
    For now, just remember that Bitcoin mining consists of thousands of computers
    worldwide partaking in a race by consuming computer power to earn (“mine”) new
    bitcoins, thereby securing the network from external attacks.


    Second, cryptoassets could replace most of the current financial industry. They
    have already started to replace banking services, payment transfer companies,
    brokers, clearing houses, and more. The outdated infrastructure they replace is
    highly energy-consuming. Even at its peak consumption, the cryptoasset industry
    consumes only a fraction of the energy the current inefficient infrastructure
    uses. For instance, a May 2021 study by Galaxy Digital establishes that Bitcoin’s
    energy consumption is less than half the energy consumed by the traditional banking
    system alone [15]. Transitioning from the traditional financial system to a cryptoasset-based
    system would materially decrease total energy consumption.


    However, these first two arguments are only minor in addressing the energy-consumption
    issue that cryptoasset critics put forward. The fundamental arguments they ignore
    are the following.


    The proof-of-work consensus mechanism securing the Bitcoin blockchain creates
    a market for energy where efficient energy sources have a competitive advantage.
    For example, natural and renewable geothermal energy in countries like El Salvador
    can now be valued and traded globally. However, mining Bitcoin is only interesting
    financially where and when energy is exceptionally cheap. For instance, it is
    only meaningful when it cannot power anything else useful. If that energy could
    serve any purpose besides mining Bitcoin, it would be advantageous for the producer
    to use it for that alternative purpose. As a result, Bitcoin’s energy consumption
    would not have otherwise gone to powering a US household or lighting a German
    highway. Instead, it is energy that would otherwise be lost because the demand
    on the electricity grid at that place and time is exceptionally low. Since excess
