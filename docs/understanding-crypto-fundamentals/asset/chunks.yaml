  trans: '

    # 区块链的主要特征


    区块链的核心是一个数据库。在金融领域，人们会称之为*账本*，因为它包含了某种数字资产自创建以来的所有贷方和借方记录。存储在区块链上的数字资产既可以代表有形资产（如房地产产权证），也可以是纯粹的数字资产（如比特币）。


    区块链的一个特点是*去中心化*。数据并非存储在单一计算机上（即中心化模式），而是存储在网络的众多计算机上。像比特币这样成熟的区块链存储在散布于全球各地的数十万台计算机上。它并非一个所有用户都充当信息共享实体的完全*分布式*系统。然而，它是一个点对点（P2P）网络，不依赖任何中央权威机构，并允许任何人成为持有完整账本的节点，从而充当信息共享实体。因此，区块链介于去中心化网络和分布式网络之间：所有节点都可以共享信息（分布式），但并非所有节点都选择这样做（去中心化）。^(⁶⁰)


    ![](img/600732_1_En_6_Fig1_HTML.png)


    中心化、去中心化和分布式网络的示意图。中心化网络有一个中心服务器，呈圆形连接到多个节点。去中心化网络有 4 个相连的服务器，每个服务器连接多个节点。分布式网络由相互通信的互联节点组成。


    **图 6-1** – 中心化、去中心化和分布式网络


    区块链网络的去中心化特性意味着，有关数据的决策并非由单一实体做出，而是通过所有网络成员之间的共识达成。此外，*没有中央权威机构可以关闭此类网络*，因为交易是*无需许可*的。实际上，任何中央权威机构都无法设置准入门槛，因此任何人都可以加入系统，并与网络上的任何人进行交易，无需经历繁琐的审批流程。


    成功的区块链包含一种经济保障，确保其能持续按预期运行。这种保障是通过依据博弈论原理精心设计的激励机制来确保的。换句话说，所有参与者按照系统规则行事符合自身利益，而偏离规则则代价高昂且毫无意义。


    区块链的另一个关键特征是其所存储的数据是*不可篡改*的。数据一旦记录便无法更改。一旦交易被成功记录，所有选择充当完整区块链持有者的节点（计算机）都会保留该交易及其之前所有交易的记录。由于存在大量独立的副本，网络批准的交易是不可删除的。


    大多数区块链（例如比特币区块链）都具有高度的*透明度*，但却是*假名的*。例如，比特币区块链不会透露比特币持有者的身份，但会公开其假名（钱包的数字地址）以及所有相关交易。这与匿名性不同，匿名性意味着没有任何假名能与某笔交易关联起来。^(⁶¹)
    以比特币为例，任何人都可以在线查询某个假名所持数字钱包中的金额，以及其在对应区块链上发送或接收过的所有交易。


    为了实现这些特性，区块链技术使用了密码学和共识机制。以下章节将分析这些概念。


    # 区块的链条


    顾名思义，区块链就是由*区块*组成的链条。每个区块都包含数据，例如用户交易、时间戳以及指向前一个区块的链接。


    ![](img/600732_1_En_6_Fig2_HTML.png)


    一个区块图具有以下流向：区块 `n`、区块 `n-1`、区块 `n-2`、区块 `n-2` 到区块 `3`、区块 `2`、区块 `1` 和创世区块 `0`。


    **图 6-2** – 区块链是一个区块的链条，其中每个区块都包含该链条中前一个区块的密码学哈希


    整个区块的内容都会进行密码学哈希处理，这意味着其内容会被总结，例如生成一个 64 字符的字符串。*哈希*可以被视为一组数字信息的指纹：它比原始信息小得多，但能唯一标识该信息。对区块进行哈希运算会为其赋予一个唯一的标签。改变区块中哪怕最微小的一点信息，都会使该区块的标签发生根本性改变。此外，由于区块内容中包含前一个区块的标签，因此在链条中更改任何前序区块的信息，都会根本性地改变所有后续区块的标签。


    图 6-3 展示了在哈希函数的输入中改变极其微小的信息会如何产生截然不同的输出。此示例使用 `SHA-256`（SHA 代表安全哈希算法），即比特币区块链中用于对区块进行哈希运算的算法。


    ![](img/600732_1_En_6_Fig3_HTML.png)


    输入流程图包括“Alice 向 Bob 和 Carol 发送若干 BTC”，该输入通过哈希函数产生输出“指纹哈希码”。


    **图 6-3** – SHA-256 哈希算法示例。改变输入中最微小的信息会产生截然不同的输出


    该算法的一个特点是，无论输入的长度或内容如何，输出始终是 64 个字符长，并且看起来是随机的。此外，使用相同的输入总会产生相同的输出。然而，给定任何输出，几乎不可能反向推导出输入是什么。


    我们可以将简单的哈希算法视为一种数学算法，比如“平方”函数。例如，对 `2` 或 `-2` 求平方会得到相同的输出 `4`，但给定输出 `4`，无法确定输入（在此例中，是
    `2` 还是 `-2`）。然而，`SHA-256` 算法要复杂得多，因此，与这个涉及 `2` 和 `-2` 的简单例子不同，根据给定输出猜出输入几乎是不可能的。

    '
- fmt: "# Asymmetric Encryption\n\n*Asymmetric encryption*，也称为*public-key cryptography*，可实现两个功能。首先，它允许消息的发送方对消息进行加密，使得只有拥有解密代码的特定人员才能解密。其次，它允许接收方确保消息来自发送方（即消息未被第三方篡改或伪造）。为了实现这一点，非对称加密使用两个密钥，每个密钥都是一系列看似随机的字符。第一个是私钥，仅由其持有者知晓。第二个是公钥，可以从私钥推断出来。这些密钥在数学上是相关的，因此公钥派生自私钥。然而，从公钥猜测私钥是不可能的。\n\
    \n非对称加密的第一个功能（加密消息）是通过使用接收方的公钥对原始消息进行编码来实现的——这是一种使原始消息不可读的代码。只有接收方可以解密消息，因为只有他拥有相应的私钥。你可以将此组合视为一把锁，只有公钥可以锁定，只有私钥可以解锁。\n\
    \n第二个功能（不可伪造的签名）使用公钥来确认消息的来源。由于公钥可以解密消息，这意味着相应的私钥对该消息进行了加密。只有真正的发送方知道私钥，因此没有其他人可能是该消息的发送方。\n\
    \n![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig4_HTML.png)\n\n示意图展示了Alice通过椭圆曲线函数从私钥到公钥的过程。其中包括Alice编写的原始消息经过非对称加密后得到密文。Alice发布她的公钥，用于输出解码后的消息。\n\
    \n**图6-4**  \n非对称加密中建立消息不可伪造来源的步骤示意图\n\n非对称加密证明，持有与公钥对应的私钥的用户编写了加密消息。由于私钥是一个在256位上编码的字符串（针对比特币区块链），它提供了极高的唯一性。特别是，使用256位（由1和0组成），共有`2^(256)`种可能性——大约相当于可观测宇宙中的原子数量。这使得独特且不可伪造的签名成为可能，从而使基于区块链的机制能够证明消息的来源。\n\
    \n# 更新去中心化账本\n\n在一个不由中心化权威维护的账本中添加新条目，其工作方式与中心化模型截然不同。网络上维护共享账本的一组计算机必须就谁将构建新条目以及如何将该条目添加到共享账本达成一致。为了达成这种共识，存在不同的方法，称为*共识机制*，本章稍后将对此进行探讨。本节介绍了一系列无论采用何种共识机制都必须发生的高级步骤。但请注意，这些步骤并非必须严格按照此顺序执行。\n\
    \n首先，用户发起一笔交易。例如，Alice用加密货币从Bob那里购买一辆汽车。为了支付，Alice使用非对称加密向该加密货币的点对点网络发送一笔交易请求。\n\
    \n其次，网络上的一个或多个验证节点收集交易池中的待处理交易。其中一笔交易就是Alice请求的交易。\n\n第三，一个验证节点创建一个区块，其中包含这些交易以及其他信息，例如区块版本、区块大小、时间戳以及区块链上前一个区块的哈希值。例如，该节点验证Alice是否持有执行该交易所需的足够数量的加密货币，并对收集的所有其他交易进行类似验证。\n\
    \n第四，根据共识机制的不同，验证者可能必须执行一些“工作量”或与其他验证者进行抽签竞争，并在区块中指明此信息。成功的验证者将生成的区块分发到网络上。\n\n\
    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig5_HTML.png)\n\n一个框图包含以下流程：请求交易、收集交易、使用交易创建区块、将区块分发到网络、由网络验证区块、将区块添加到区块链。\n\
    \n**图6-5**  \n更新区块链的关键步骤\n\n第五，所有网络成员验证区块的有效性（即，它是否满足某些预定义的标准）。例如，他们验证该区块是否正确引用了区块链上的最后一个有效区块，区块大小是否在约定的范围内，以及验证者是否确实执行了其工作或赢得了抽签。\n\
    \n第六，所有网络成员将有效的区块添加到他们本地区块链的副本中。Alice的交易变为有效，成功的验证者因其工作而获得奖励。\n\n现在，这些信息在区块链上，透明且永久。换句话说，所有人都可以看到它，并且它永远不会被移除。\n\
    \n![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig6_HTML.png)\n\n连接的三维区块示意图，编号为7123、7124、7125、7126和7127。\n\
    \n**图6-6**  \n区块链的视觉表示，其中最后一个区块被追加到现有链上\n\n# 共识机制\n\n共识机制或共识协议是在去中心化系统中达成一致的方式。共识机制如同将军们（如第[5](#600732_1_En_5_Chapter.xhtml)章拜占庭将军示例中）就攻击时间达成一致一样。它确保所有参与者都知道其他各方同意，无论网络上是否存在不可信的节点。在区块链环境中，他们就最新的版本达成一致，包括谁拥有什么。这种一致称为*分布式共识*，对于确保网络一致性至关重要。\n\
    \n比特币的区块链使用*工作量证明*（PoW）共识机制。在加密资产的最初十年，它仍然是验证区块的最常用方法。然而，在此期间，出现了替代性共识机制来解决PoW的缺点。*权益证明*（PoS）共识协议也已确立并得到广泛应用。特别是，它在2010年代后半叶逐渐得到更多采纳。以太坊甚至在2022年9月从PoW转向了PoS。此外，还存在数百种用于加密资产的其他机制。然而，并非所有共识机制都适用于所有类型的区块链。例如，像权威证明这样的机制更适合私有区块链（本章稍后会详细介绍）。相比之下，传统的PoW或PoS机制可能更适合用于作为货币的资产。\n\
    \n现在，让我们深入探讨与共识机制相关的区块链内部工作原理，从第一个区块链共识机制——工作量证明开始。"
  raw: '## Asymmetric Encryption


    *Asymmetric encryption*, also known as *public-key cryptography*, enables two
    things. First, it enables the sender of a message to cipher it so that only specific
    people owning a deciphering code can decipher it. Second, it enables the receiver
    to ensure that the message comes from the sender (i.e., it has not been tampered
    with or faked by a third party). To achieve this, asymmetric encryption uses two
    keys, each of which is a series of seemingly random characters. The first is private,
    only known by its holder. The second is public and can be inferred from the private
    one. The keys are mathematically related, so the public key derives from the private
    key. However, guessing the private key from the public one is impossible.


    The first function of asymmetric encryption (ciphering the message) is achieved
    by encoding an original message with the recipient’s public key—a code that makes
    the original message unreadable. Only the recipient can decrypt the message because
    only he has the corresponding private key. You can think of this combination as
    a lock that only the public key can lock and only the private key can unlock.


    The second function (unforgeable signature) uses the public key to establish the
    origin of a message. Since the public key deciphers the message, it implies that
    the corresponding private key ciphered this message. Only the genuine sender knows
    the private key, so nobody else could be the message’s sender.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig4_HTML.png)


    An illustration of Alice''s private key to public key via the elliptic curve function.
    It includes the original message written by Alice that undergoes asymmetric cryptography
    to encrypt the message and give a cryptic text. Alice publishes her public key
    that gives the decoded output message.


    Figure 6-4


    Illustration of steps in asymmetric cryptography to establish the unforgeable
    origin of a message


    Asymmetric encryption proves that the holder of the private key corresponding
    to the public key has written the ciphered message. Since the private key is a
    string of characters coded on 256 bits (for the Bitcoin blockchain), it offers
    an exceptionally high degree of uniqueness. In particular, with 256 bits (1s and
    0s), there are 2^(256) possibilities—or about as many possibilities as there are
    atoms in the observable universe. Unique, unforgeable signatures are thereby made
    possible, enabling blockchain-based mechanisms to certify the provenance of a
    message.


    ## Updating a Decentralized Ledger


    Adding a new entry in a ledger that is not maintained by a central authority works
    very differently than in a centralized model. A group of computers on a network
    maintaining a shared ledger must all agree on who will structure the new entry
    and how to add this entry to the shared ledger. To reach this agreement, there
    are different methods, called *consensus mechanisms*, investigated later in this
    chapter. This section presents a high-level series of steps that must occur regardless
    of the consensus mechanism. However, note that they do not strictly have to happen
    in this order.


    First, a user requests a transaction. For example, Alice buys a car from Bob with
    a cryptocurrency. To pay, Alice sends a transaction request to the peer-to-peer
    network of that cryptocurrency using asymmetric encryption.


    Second, one or several validator nodes on the network gather pending transactions
    in the transaction pool. One of these transactions is the one requested by Alice.


    Third, a validator node creates a block with these transactions and additional
    information, such as the block version, the block size, a timestamp, and a hash
    of the previous block on the blockchain. For example, the node verifies that Alice
    holds the amount necessary of the cryptocurrency to perform the transaction and
    similarly for all other transactions gathered.


    Fourth, depending on the consensus mechanism, the validator may have to perform
    some “work” or win a lottery against other validators and indicate this information
    in the block. The successful validator distributes the resulting block on the
    network.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig5_HTML.png)


    A block diagram has the following flow, request transaction, gather transactions,
    create block with transactions, distribute block to the network, validate block
    by the network, and add block to the blockchain.


    Figure 6-5


    Key steps in updating a blockchain


    Fifth, all network members verify the block’s validity (i.e., whether it fulfills
    some pre-defined criteria). For example, they verify that the block properly refers
    to the last valid block on the blockchain, that the size of the block is within
    agreed proportions, and that the validator indeed performed its work or won the
    lottery.


    Sixth, all network members add the valid block to their local copy of the blockchain.
    Alice’s transaction becomes valid, and the successful validator receives a reward
    for its work.


    The information is now on the blockchain, transparently and permanently. In other
    words, it is there for everybody to see, and it will never be removed.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig6_HTML.png)


    An illustration of connected 3 D blocks of numbers 7123, 7124, 7125, 7126, and
    7127.


    Figure 6-6


    Visual representation of a chain of blocks, where the last block is appended to
    the existing chain


    ## Consensus Mechanisms


    A consensus mechanism or consensus protocol is how agreements are reached in a
    decentralized system. Consensus mechanisms are how generals (as in Chapter [5](#600732_1_En_5_Chapter.xhtml)’s
    Byzantine Generals example) agree on the timing of the attack. It ensures they
    all know that the other parties agree, regardless of whether there are untrustworthy
    nodes on the network. In a blockchain context, they agree on the latest version,
    including who owns what. Such an agreement is a *distributed consensus* and crucial
    to ensuring network consistency.


    Bitcoin’s blockchain uses a *proof of work* (PoW) consensus mechanism. For the
    first decade of cryptoassets, it remained the most common method to validate blocks.
    During this period, however, alternative consensus mechanisms emerged to solve
    the drawbacks of PoW. The *proof of stake* (PoS) consensus protocol is also well-established.
    In particular, its adoption increased progressively over the second half of the
    2010s. Ethereum even moved from PoW to PoS in September 2022\. In addition, hundreds
    of other mechanisms exist for cryptoassets. Not all consensus mechanisms are suitable
    for all types of blockchains, though. For example, a mechanism such as proof of
    authority is more appropriate for private blockchains (more on that later in this
    chapter). In contrast, traditional PoW or PoS mechanisms are arguably better suited
    for assets meant to be used as a currency.


    Let us now dive into the inner workings of blockchain specific to consensus mechanisms,
    starting with the first blockchain consensus mechanism, proof of work.'
  trans: "\n# 非对称加密\n\n*非对称加密*，也称为*公钥密码学*，可实现两个功能。首先，它允许消息的发送方对消息进行加密，使得只有拥有解密代码的特定人员才能解密。其次，它允许接收方确保消息来自发送方（即消息未被第三方篡改或伪造）。为了实现这一点，非对称加密使用两个密钥，每个密钥都是一系列看似随机的字符。第一个是私钥，仅由其持有者知晓。第二个是公钥，可以从私钥推断出来。这些密钥在数学上是相关的，因此公钥派生自私钥。然而，从公钥猜测私钥是不可能的。\n\
    \n非对称加密的第一个功能（加密消息）是通过使用接收方的公钥对原始消息进行编码来实现的——这是一种使原始消息不可读的代码。只有接收方可以解密消息，因为只有他拥有相应的私钥。你可以将此组合视为一把锁，只有公钥可以锁定，只有私钥可以解锁。\n\
    \n第二个功能（不可伪造的签名）使用公钥来确认消息的来源。由于公钥可以解密消息，这意味着相应的私钥对该消息进行了加密。只有真正的发送方知道私钥，因此没有其他人可能是该消息的发送方。\n\
    \n![](img/600732_1_En_6_Fig4_HTML.png)\n\n示意图展示了 Alice 通过椭圆曲线函数从私钥到公钥的过程。其中包括\
    \ Alice 编写的原始消息经过非对称加密后得到密文。Alice 发布她的公钥，用于输出解码后的消息。\n\n**图 6-4**  \n非对称加密中建立消息不可伪造来源的步骤示意图\n\
    \n非对称加密证明，持有与公钥对应的私钥的用户编写了加密消息。由于私钥是一个在 256 位上编码的字符串（针对比特币区块链），它提供了极高的唯一性。特别是，使用\
    \ 256 位（由 1 和 0 组成），共有`2²⁵⁶`种可能性——大约相当于可观测宇宙中的原子数量。这使得独特且不可伪造的签名成为可能，从而使基于区块链的机制能够证明消息的来源。\n\
    \n# 更新去中心化账本\n\n在一个不由中心化权威维护的账本中添加新条目，其工作方式与中心化模型截然不同。网络上维护共享账本的一组计算机必须就谁将构建新条目以及如何将该条目添加到共享账本达成一致。为了达成这种共识，存在不同的方法，称为*共识机制*，本章稍后将对此进行探讨。本节介绍了一系列无论采用何种共识机制都必须发生的高级步骤。但请注意，这些步骤并非必须严格按照此顺序执行。\n\
    \n首先，用户发起一笔交易。例如，Alice 用加密货币从 Bob 那里购买一辆汽车。为了支付，Alice 使用非对称加密向该加密货币的点对点网络发送一笔交易请求。\n\
    \n其次，网络上的一个或多个验证节点收集交易池中的待处理交易。其中一笔交易就是 Alice 请求的交易。\n\n第三，一个验证节点创建一个区块，其中包含这些交易以及其他信息，例如区块版本、区块大小、时间戳以及区块链上前一个区块的哈希值。例如，该节点验证\
    \ Alice 是否持有执行该交易所需的足够数量的加密货币，并对收集的所有其他交易进行类似验证。\n\n第四，根据共识机制的不同，验证者可能必须执行一些“工作量”或与其他验证者进行抽签竞争，并在区块中指明此信息。成功的验证者将生成的区块分发到网络上。\n\
    \n![](img/600732_1_En_6_Fig5_HTML.png)\n\n一个框图包含以下流程：请求交易、收集交易、使用交易创建区块、将区块分发到网络、由网络验证区块、将区块添加到区块链。\n\
    \n**图 6-5**  \n更新区块链的关键步骤\n\n第五，所有网络成员验证区块的有效性（即，它是否满足某些预定义的标准）。例如，他们验证该区块是否正确引用了区块链上的最后一个有效区块，区块大小是否在约定的范围内，以及验证者是否确实执行了其工作或赢得了抽签。\n\
    \n第六，所有网络成员将有效的区块添加到他们本地区块链的副本中。Alice 的交易变为有效，成功的验证者因其工作而获得奖励。\n\n现在，这些信息在区块链上，透明且永久。换句话说，所有人都可以看到它，并且它永远不会被移除。\n\
    \n![](img/600732_1_En_6_Fig6_HTML.png)\n\n连接的三维区块示意图，编号为 7123、7124、7125、7126 和\
    \ 7127。\n\n**图 6-6**  \n区块链的视觉表示，其中最后一个区块被追加到现有链上\n\n# 共识机制\n\n共识机制或共识协议是在去中心化系统中达成一致的方式。共识机制如同将军们（如第\
    \ 5 章拜占庭将军示例中）就攻击时间达成一致一样。它确保所有参与者都知道其他各方同意，无论网络上是否存在不可信的节点。在区块链环境中，他们就最新的版本达成一致，包括谁拥有什么。这种一致称为*分布式共识*，对于确保网络一致性至关重要。\n\
    \n比特币的区块链使用*工作量证明*（PoW）共识机制。在加密资产的最初十年，它仍然是验证区块的最常用方法。然而，在此期间，出现了替代性共识机制来解决 PoW\
    \ 的缺点。*权益证明*（PoS）共识协议也已确立并得到广泛应用。特别是，它在 2010 年代后半叶逐渐得到更多采纳。以太坊甚至在 2022 年 9 月从\
    \ PoW 转向了 PoS。此外，还存在数百种用于加密资产的其他机制。然而，并非所有共识机制都适用于所有类型的区块链。例如，像权威证明这样的机制更适合私有区块链（本章稍后会详细介绍）。相比之下，传统的\
    \ PoW 或 PoS 机制可能更适合用于作为货币的资产。\n\n现在，让我们深入探讨与共识机制相关的区块链内部工作原理，从第一个区块链共识机制——工作量证明开始。\n"
- fmt: '# Updating a Decentralized Ledger with Proof of Work


    Let us revisit the steps to update a decentralized ledger (see Figure [6-5](#600732_1_En_6_Chapter.xhtml#Fig5))
    and investigate what happens under a PoW consensus mechanism.


    In the first step (requesting a transaction), Alice signs with her private key
    the transaction she is sending to the network. She attaches her public key to
    the message. This process uses asymmetric encryption to cryptographically certify
    that Alice is the actual author of the message. In the transaction information,
    anybody can see that Alice’s pseudonym requests to send, say, one bitcoin to Bob’s
    public address.


    In the second step (gathering transactions), the validators gather transactions
    from the pool of pending transactions. They only select valid transactions (i.e.,
    those whose public key deciphers the message ciphered with the sender’s private
    key). It is in the validators’ interest to gather as many pending transactions
    as possible, of as big a value as possible, because they take a small fee on each
    transaction. That is if they are the successful validator of this block.


    In the third step (creating the block), they compete to be the first to solve
    a mathematical problem to validate the block. It is a trivial problem with no
    utility, consisting of randomly running billions of hash algorithms until an output
    with a specific characteristic is reached by chance. For example, the hash output
    should start with a specific number of zeroes. Reaching such an output takes time
    and CPU power (electricity). This time and energy spent are the “work” referred
    to in *proof of work*. As this process resembles how miners quarry gold, the validators
    are typically called miners.


    In the fourth step (distributing the valid block), the successful miner broadcasts
    the block on the network, indicating the selected transactions and the input that
    yields an output respecting the required characteristics.


    In the fifth step (validating the block by the network), any node can test the
    submitted block (i.e., verify that the output fulfills the set characteristics).
    Contrary to the third step, this test is instantaneous. Indeed, with the right
    input, verifying that the output respects the required characteristics is straightforward.


    In the ultimate step (adding the block to the blockchain), all nodes accept this
    new block as the latest block of the chain. As part of the block, the successful
    miner is rewarded with a pre-defined number of bitcoins for solving the problem.
    He also captures transaction fees. These rewards ensure enough miners remain on
    the network at any time in a competition to solve the following block.


    ## Structure of a Block Under Proof of Work


    Figure [6-7](#600732_1_En_6_Chapter.xhtml#Fig7) illustrates how a block on a blockchain
    working with PoW is structured. It consists of two parts, a header and a set of
    transactions.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig7_HTML.png)


    A structure of a block chain. Block header on top includes block version, block
    size, timestamp, hash of previous block, Merkle tree root hash, Nonce, and difficulty
    target. Transaction counter below includes transactions 1, 2, 3 to n, and miner
    reward.


    *Figure 6-7 Structure of a block on a blockchain*


    As part of the header, the *block version*, *block size*, and *timestamp* are
    self-explanatory elements that provide information on the block at hand. The *previous
    block’s hash* enables the chain to link its blocks in the correct order, like
    the pages of a book. The *Merkle tree* is the digital fingerprint of all the transactions
    in a block, allowing quick verification of whether a block includes a transaction.
    Each block’s header includes a hash of this status to summarize all its information
    in only 32 bytes. A *nonce* is a number that miners change for the block’s hash
    to yield a specific output. As Figure [6-3](#600732_1_En_6_Chapter.xhtml#Fig3)
    shows, changing a single bit of information in a block yields a radically different
    hash output. Therefore, the miner changes the nonce and hashes the resulting block
    until he gets a block hash that begins with a specific number of zeroes. The target
    number of zeroes to obtain is defined in the *difficulty target*. The more miners
    try to solve the block (the higher the hash rate), the higher the difficulty target.
    For Bitcoin, this target is set so that it takes the network about 10 minutes
    to solve one block. Every two weeks, Bitcoin’s difficulty target is adjusted based
    on the hash rate so that the 10-minute average is maintained. Other cryptoassets
    can have a different target time between blocks.^([^(62)](#fn62))


    The transaction counter contains two things. First, it contains transactions that
    were in the transaction pool (i.e., those that users submitted for recording).
    Since there is a maximum size to a block, not all transactions are gathered by
    the miner of the next block. The miner gathers as many of them as possible and
    selects the transactions of the biggest amount first because there is a transaction
    fee. The more and bigger the transactions, the higher the fee for the miner.


    Second, in the transaction counter, there is a miner reward. It consists of the
    block reward and transaction fees. Bitcoin’s block reward started at 50 bitcoins
    per block when it was launched, then the reward per block was divided by two every
    210,000 blocks (roughly every four years). As of 2023, Bitcoin’s block reward
    is 6.25 bitcoins per block. Transaction fees were small and negligible at first.
    However, now that the price of Bitcoin is in the tens of thousands of dollars,
    these small transaction fees have significant value. Ultimately, they will replace
    the block reward to incentivize miners to keep mining. In early May 2023 (block
    number 788,695), a surge in demand for block space on the Bitcoin blockchain caused
    these transaction fees to be bigger than the block reward for the first time since
    2017.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig8_HTML.jpg)


    A screenshot of the Bitcoin block 772,783 page. It includes the mined-on date
    along with the coin base message and various details. The details include the
    values of hash, capacity, distance, BTC, value, average value, version, Merkle
    root, difficulty, nonce, bits, and fee range, among others.


    *Figure 6-8 Details of Bitcoin Block 788,695, mined on May 8, 2023 (Source: blockchain.com)*'
