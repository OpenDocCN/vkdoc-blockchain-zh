- fmt: '# Bitcoin Price


    Let us begin by analyzing the historical trend of Bitcoin because it is by far
    the largest cryptoasset and, as of 2023, still drives the price of most other
    cryptoassets. While historical data is not predictive of the future, it can provide
    insights into what has driven price swings in the past. As the philosopher Santayana
    puts it: “Those who do not remember the past are condemned to repeat it.”


    Using a standard scale for metrics growing exponentially, as in Figure [9-1](#600732_1_En_9_Chapter.xhtml#Fig1),
    offers limited insight.


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig1_HTML.jpg)


    A line graph of Bitcoin price in USD from January 2013 to January 2023. The line
    is horizontal with a very slight fluctuation until January 2017, increases up
    to January 2022, and decreases, with fluctuations.


    Figure 9-1 Bitcoin price in USD, January 2013 to January 2023, standard scale


    A logarithmic scale for the same data provides a more helpful analysis of Bitcoin’s
    historical trend. With such a scale, each vertical mark represents ten times the
    size of the previous one. Figure [9-2](#600732_1_En_9_Chapter.xhtml#Fig2) presents
    the last ten years of data with a logarithmic trend line.^([^(80)](#fn80))


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig2_HTML.jpg)


    An increasing line graph with fluctuations of Bitcoin price in USD from January
    2013 to January 2023 with spikes in 2013, 2017, and 2021. One line increases with
    fluctuations. A logarithmic trend line starts at around (January 2013, 99) and
    ends at (January 2023, 80,000).


    Figure 9-2 Bitcoin price in USD from January 2013 to January 2023, logarithmic
    scale, with a logarithmic trend


    The first patterns to identify from this data are the spikes in price in 2013,
    2017, and 2021. The careful reader may remember that these years follow the Bitcoin
    halving event years (i.e., the years in which the number of new bitcoins rewarded
    per block was divided by two as part of Bitcoin’s supply schedule). Specifically,
    in November 2012, the number of bitcoins rewarded per block decreased from 50
    to 25. Similarly, in July 2016, it went from 25 to 12.5 and from 12.5 to 6.25
    in May 2020. These spikes brought the price of Bitcoin about two standard deviations
    above its logarithmic trend before collapsing. From top to bottom, Bitcoin’s largest
    drops were 93% (2011), 86% (2015), 83% (2018), and 77% (2022). Such drops are
    comparable to technology stocks during their growth phase. For example, Amazon
    plunged 80% in 2000 and Apple 91% from 2000 to 2002 (including a 51% drop in a
    single day, on September 29, 2000).


    Bitcoin’s ups and downs follow a four-year cyclical pattern that gave rise to
    several theories on how they could evolve.


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig3_HTML.jpg)


    An increasing line graph with fluctuations of Bitcoin price in USD from July 2010
    to January 2023. 3 vertical lines are in November 28 2012, July 2016, and July
    2020. The logarithmic trend line starts at around (July 2013, 0.8) and ends at
    (January 2023, 80,000).


    Figure 9-3 Bitcoin price in USD from July 2010 to January 2023, logarithmic scale,
    with halving events on November 28, 2012, July 9, 2016, and May 11, 2020


    ## Bitcoin “Halving” Cycles


    The four-year Bitcoin cycles driven by the halving of the new supply are unreliable
    for future price movements but can hint at what other market participants may
    expect. Besides, the mere fact that other market participants may expect these
    cycles to continue could turn them into a self-fulfilling prophecy.


    Halving events occur every 210,000 blocks on Bitcoin’s blockchain. With a block
    created every 10 minutes, this rounds up to roughly once every four years. However,
    Bitcoin’s code adjusts the difficulty of mining blocks every two weeks based on
    the network’s hash rate. This adjustment’s goal is that it should always take
    about 10 minutes to mine a block, regardless of the network’s total computing
    power. If the hash rate increases between adjustments, the time to mine a block
    decreases to below 10 minutes on average until the next adjustment. In the past,
    halving events occurred faster than every four years because the total hash rate
    increased with adoption.


    As the hash rate increases steadily, this pattern will likely continue, at least
    in the short term. The last three periods between halving events lasted 3 years,
    10 months, and 19 days; 3 years, 7 months, and 11 days; and 3 years, 10 months,
    and 2 days. As the hash rate grows since the last halving, 3 years and 10 months
    for the upcoming periods seem a reasonable estimate. Therefore, the next two Bitcoin
    halving events will likely happen in March 2024 and January 2028.


    The underlying fundamental behind increases in value around a halving lies in
    the change in Bitcoin’s stock-to-flow ratio, as explained in Chapter [1](#600732_1_En_1_Chapter.xhtml).
    With a halving event, the number of new bitcoins mined per unit of time (the flow)
    suddenly becomes much smaller as a fraction of the existing quantity of bitcoins
    available (the stock). In other words, the supply expansion abruptly slows down,
    making each existing bitcoin more challenging to obtain and thus more valuable.
    Since the impact of future halving events on this ratio will be smaller, its importance
    will likely not be as prominent in the future as it was in the past.'
