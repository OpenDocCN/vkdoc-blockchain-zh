    ## The Sortino Ratio


    One shortcoming of the Sharpe ratio is that when returns are largely volatile
    on the upside, the ratio goes down the same way as when returns are volatile on
    the downside. However, the financial risk of these two situations is vastly different.
    True risk for an investor is the risk of losing money or, at least, the risk of
    not reaching a target level of return. The possibility of either matching the
    target return or largely overshooting it should not play a role in assessing an
    investment''s riskiness.


    This shortcoming is precisely what the Sortino ratio aims to address. Named after
    Frank Sortino, this ratio differentiates good volatility from bad volatility.
    Instead of simply using the standard deviation of returns, as the Sharpe ratio
    does, it removes the effect of upward price swings on the standard deviation to
    focus on the volatility of returns below a target return. This target return replaces
    the risk-free rate of return from the Sharpe ratio''s formula.


    In terms of their Sortino ratio and assuming a target rate of return of 5%, the
    previously covered investments fared as follows for daily, weekly, monthly, and
    yearly data.^(48)


    **Table 4-5** Sortino Ratio of Selected Investments, Using the Same Time Frame
    and Assuming a Target Rate of Return of 5% As the Benchmark


    | Sortino Ratio | BTC | ETH | Gold | S&P500 | NASDAQ | EU50 |

    | --- | --- | --- | --- | --- | --- | --- |

    | Daily | 0.04 | 0.07 | –0.02 | 0.02 | 0.05 | 0.00 |

    | Weekly | 0.14 | 0.24 | –0.05 | 0.05 | 0.14 | –0.01 |

    | Monthly | 0.49 | 0.63 | –0.13 | 0.12 | 0.36 | –0.03 |

    | Yearly | 18.86 | 4.57 | –0.37 | 0.56 | n.a. | –0.27 |


    The verdict reached by the Sortino ratio for these assets over the last decade
    is clear. When only considering "bad" volatility as a risk metric, the excess
    return of major cryptoassets largely overcompensates the increase in financial
    risk compared to traditional investments.


