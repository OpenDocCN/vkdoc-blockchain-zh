- fmt: '# Bitcoin Golden Bull Ratio


    Bitcoin price patterns after its second cycle (2018) gave rise to the *Bitcoin
    Golden Bull Ratio* theory. This ratio suggests that the period between the market’s
    bottom and the halving event represents 50% of the time from bottom to peak, and
    the period from the halving event to the peak represents 50% of the time from
    bottom to peak. For the first two cycles, this ratio was 50.3%–49.7% and 50.8%–49.2%,
    respectively. Despite this theory being widespread in 2021, the third cycle fits
    the pattern almost perfectly, with a 48.4%–51.6% ratio, as shown in Figure [9-4](#600732_1_En_9_Chapter.xhtml#Fig4).


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig4_HTML.jpg)


    An increasing line graph with fluctuations of bitcoin price in USD from July 2010
    to January 2023, has 3 vertical segments with labels bottom, peak, and halving
    in each. The logarithmic trend line starts at around (July 2010, 0.8) and ends
    at (January 2023, 80,000).


    **Figure 9-4** Bitcoin price in USD from July 2010 to January 2023, logarithmic
    scale. The three cycles are depicted with their key milestones: bottom, halving,
    and peak


    Some market participants may expect (perhaps irrationally) that this pattern will
    continue for the next cycle. Based on this 50%/50% pattern, the most recent market
    bottom (November 21, 2022), and the next expected halving event date (March 12,
    2024, assuming 3 years and 10 months between halving events), the next market
    top would occur on July 2, 2025. Of course, this is only a theoretical date based
    on the preceding assumptions and is highly unlikely to happen accurately in practice.
    Regulation changes, market dynamics, or even hash rate growth will impact the
    next Bitcoin price peak date much more than historical patterns. Nevertheless,
    the data underlying this theoretical date is provided in Table [9-1](#600732_1_En_9_Chapter.xhtml#Tab1).


    **Table 9-1** Milestone Bitcoin Price Dates of the Past Cycles: Bottoms, Halving
    Events, and Peaks, with Their Ratio per Cycle (Bottom to Peak)


    | | Bottom | Halving | Peak | Days | Ratio |

    | --- | --- | --- | --- | --- | --- |

    | Pre-cycle 1 | | | June 9, 2011 | | |

    | Cycle 1 | November 19, 2011 | | | 163 | |

    | | November 28, 2012 | | 375 | 50.3% |

    | | | December 4, 2013 | 371 | 49.7% |

    | Cycle 2 | January 14, 2015 | | | 406 | |

    | | July 9, 2016 | | 542 | 50.8% |

    | | | December 16, 2017 | 525 | 49.2% |

    | Cycle 3 | December 15, 2018 | | | 364 | |

    | | May 11, 2020 | | 513 | 48.4% |

    | | | November 8, 2021 | 546 | 51.6% |

    | Cycle 4 | November 21, 2022 | | | 378 | |

    | | (March 12, 2024) | | (477) | (50.0%) |

    | | | (July 2, 2025) | (477) | (50.0%) |


    # Bitcoin Cycles Rallies


    The next thing to identify from Figure [9-4](#600732_1_En_9_Chapter.xhtml#Fig4)
    is that the post-halving rallies have been much bigger than the pre-halving rallies.
    In particular, the periods between halving events and peak dates have yielded
    price increases of 101x (+10,044%), 30x, and 8x for the three instances, respectively.
    In contrast, the periods between bottoms and halving events “only” yielded 6x,
    3.7x, and 2.7x, as shown in Table [9-2](#600732_1_En_9_Chapter.xhtml#Tab2).


    **Table 9-2** Milestone Bitcoin Price Dates of the Past Cycles, Including Price
    in USD and Relative Changes Compared to Previous Milestones


    | | Bottom | Halving | Peak | Price | Change |

    | --- | --- | --- | --- | --- | --- |

    | Pre-cycle 1 | | | June 9, 2011 | 29.60 | |

    | Cycle 1 | November 19, 2011 | | | 2.05 | –93% |

    | | November 28, 2012 | | 12.20 | 6.0x |

    | | | December 4, 2013 | 1,237.60 | 101.4x |

    | Cycle 2 | January 14, 2015 | | | 178.10 | –86% |

    | | July 9, 2016 | | 650.96 | 3.7x |

    | | | December 16, 2017 | 19,497.40 | 30.0x |

    | Cycle 3 | December 15, 2018 | | | 3,236.76 | –83% |

    | | May 11, 2020 | | 8,601.80 | 2.7x |

    | | | November 8, 2021 | 67,566.83 | 7.9x |

    | Cycle 4 | November 21, 2022 | | | 15,787.28 | –77% |

    | | n.a. | | n.a. | n.a. |

    | | | n.a. | n.a. | n.a. |


    # Bitcoin Cycles Duration


    Another related theory widely discussed in 2021 (before reaching the third cycle’s
    bottom) is that of *Bitcoin’s lengthening cycles*. In Bitcoin’s first cycle, the
    period from bottom to peak lasted 746 days, while during its second cycle, it
    lasted 1,067 days, which gave rise to the theory.[^(81)](#fn81) The third cycle,
    however, was eight days shorter than the second at 1,059 days. A similar duration
    for the fourth cycle would place the next peak in mid-October 2025 (contrasting
    with the July 2025 peak date suggested by a continuation of the Golden Bull Ratio).


    Of course, the mere facts that these widespread theories exist imply that some
    actors are likely to time their transactions to take advantage of the pattern.
    A sufficiently high number of actors trading accordingly would at least bias these
    patterns and possibly invalidate them completely.


    Another widely discussed theory is that Bitcoin would enter a so-called *supercycle*.
    In a supercycle, the four-year pattern would fade away with cryptoasset mass adoption,
    and Bitcoin would enter an extended period of increasing prices.


    # Relative Market Dominance


    Another significant trend is the relative dominance within cryptoassets. Since
    Bitcoin started as the first cryptoasset, it used to have 100% dominance (i.e.,
    Bitcoin had 100% of the market capitalization of the cryptoasset space). As other
    cryptoassets entered the space, Bitcoin’s dominance decreased. During the 2017
    peak of the market, Bitcoin’s dominance dropped from 86% to 32%, mostly leaving
    place to Ethereum and XRP. Bitcoin never lost its number 1 spot, though. Over
    the following cycle (2018–2022), Bitcoin mainly oscillated between one-third and
    two-thirds of the total crypto market, while Ethereum fluctuated between 7% and
    22% of market dominance. In the meantime, XRP dropped from its 19% high to below
    3%, and no other cryptoasset ever broke the 6% dominance threshold.


    An up-to-date overview of relative market dominance is available on the website
    `CoinMarketCap.com`.[^(82)](#fn82)


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig5_HTML.jpg)


    An area graph of the % of total market cap from May 2013 to January 2023 for 11
    key crypto assets. The highest and least are Ethereum and Polygon, respectively.


    **Figure 9-5** The relative market dominance of key cryptoassets, May 2013 to
    January 2023, based on their market capitalization (Source: `CoinMarketCap.com`)


    # Bitcoin Lead


    The next critical historical pattern in the crypto market is that Bitcoin’s price
    action tends to be a leading indicator for altcoins’ price. When Bitcoin’s price
    surges, it is typically rapidly followed by increases in other cryptoassets prices.
    The same happens when Bitcoin’s price drops, inducing price decreases in the rest
    of the crypto market.


    While this pattern is evident from historical price data, it is irrational. What
    makes Bitcoin valuable is very different from what makes Ethereum, Chainlink,
    or Stellar Lumen valuable. As the fundamentals behind these assets differ, their
    price journeys should have little correlation. The historically high correlation
    between these assets confirms the market’s relatively low maturity level. As of
    this writing, investors still view all cryptoassets as “risk assets” (like technology
    stocks) without more profound thoughts on what differentiates them.'
