    # 早期加密资产投资


    另一种接触加密资产的方式是在其最早的开发阶段进行投资。目前存在多种投资方式，通常具有高潜在回报，但也伴随着高风险。


    传统上，当一家私营公司决定上市（即向众多外部投资者公开发售股票）时，它会通过首次公开募股（`IPO`）来实现。在`IPO`中，投资者购买的是该公司的股份。加密货币行业借鉴了这一既定概念，发展出了首次代币发行（`ICO`）。`ICO`本质上是一种众筹形式，它将潜在投资者与项目创始人联系起来，为创意匹配资本。这是区块链初创企业筹集股权资本的原始方式。在`ICO`中，投资者购买的是新发行的加密资产，期望其未来价值会上涨。借此，任何人都可以成为风险资本投资者。创始人通常会保留该加密资产的大部分份额（例如
    20%），作为项目开发的资金来源。尽管其名称中带有“币”字，但`ICO`并非专用于意在成为货币的资产。相反，所有类型的加密资产都会使用`ICO`。


    `ICO`最早始于 2013 年，首个重大案例是以太坊在 2014 年的`ICO`。随后，大多数`ICO`都在以太坊区块链上进行，其数量在接下来的几年里呈指数级增长。不幸的是，许多人利用`ICO`的热潮，发行毫无价值的代币。一旦投资者涌入，骗子便会卷款跑路，任由项目自生自灭。有时，创始人甚至利用区块链背后的数据隐私精神来隐藏真实身份，实施完美的诈骗。由于`ICO`中的创始人通常缺乏问责制，另一种替代方案——证券型代币发行（`STO`）应运而生。


    与`ICO`不同，`STO`有公司的股票或未来利润作为支撑。`STO`就像购买现实世界中公司的一部分股权。相比之下，`ICO`就像购买一种没有价值的代币，除非项目承诺成为现实。这种差异降低了发行团队携款潜逃的动机。虽然`ICO`能够以比以往任何时候都更高效（更快、成本更低）、更广泛的方式筹集资金，但`STO`对投资者来说更加安全。`STO`的发行需要遵循严格的监管规定，最终成为注册证券。例如，投资者可能被要求遵循严格的“了解你的客户”（`KYC`）和反洗钱（`AML`）流程才能投资。这种监管框架降低了项目沦为骗局的风险。另一个关键区别在于意识形态方面。`ICO`依赖于去除中间商的核心思想，而`STO`则通常依赖一些中间人，以提升项目对发行方和投资者双方的可靠性。


    总的来说，`ICO`和`STO`提高了传统上非流动资产的流动性，并为小型潜在风险资本投资者消除了进入壁垒。因此，曾经只有少数富裕投资者才能享有的特权机会，现在变得大众化。这代表了迈向金融民主化的重要一步。


    然而，`ICO`和`STO`并非新加密资产早期发行的唯一可能性。其他替代方案在 2010 年代末期出现，并在 2020 年代初期持续涌现。其中包括首次交易所发行（`IEO`）、首次去中心化交易所发行（`IDO`）、Maker
    的强力持有者发行（`SHO`）以及首次推特发行（`ITO`）。对这些不太常见的发行方式感兴趣的读者，可以查阅 D-Core 的《机构区块链投资指南》[40]。


    ## 挖矿


    除了直接投资于加密资产、与加密资产相关的 ETF 或公司外，另一种可能的投资类型是通过基础设施进行投资，特别是投资于基于工作量证明共识机制的加密资产的挖矿业务，尤其是比特币。


    ### 传统加密资产挖矿


    与其投资一家挖矿公司，不如直接自己挖矿。第 6 章介绍了挖矿，即在工作量证明共识机制下，为加密资产发行新币（称为币基交易）的过程。此类加密资产包括比特币、比特币现金、莱特币、门罗币、达世币和狗狗币。然而，比特币是迄今为止哈希率（衡量网络安全性的指标）最高的资产，其哈希率是所有其他
    PoW 资产哈希率总和的 100 倍。提醒一下，矿工们在一场赢家通吃的竞争中争夺验证区块链下一个区块的权利。为了赢得这场“竞赛”，矿工使用专用设备运行大量的加密哈希函数，直到偶然找到一个具有特定特征的数字。这类似于彩票，购买彩票的成本是算力（间接地，是电力）。成功的矿工将获得新铸造的币作为奖励。


    挖矿可以是一项有利可图的生意，但它需要大量的前期投资，需要获得廉价电力，并且盈利前景波动较大。需要高额投资来购买专用设备进行挖矿。在某些情况下，你可能需要最新的专用集成电路（`ASIC`）才能具有竞争力。事实上，创新的速度使得矿机在几个月到几年内就会过时。这并不是说使用旧矿机就不可能挖矿。只是新型矿机执行哈希运算的数量增长迅速，使得旧设备很快失去竞争力。


    ![](img/600732_1_En_8_Fig2_HTML.png)


    一张比特币 ASIC 矿机的照片。


    图 8-2


    ASIC 比特币矿机（来源：维基共享资源，公有领域）


    截至 2023 年 5 月，一台新的`ASIC`矿机每秒可产生超过 200 terahashes（200 万亿次哈希）。作为对比，比特币区块链上的一个区块需要大约
    210 zettahashes（210 六万亿次哈希）才能找到一个成功的随机数。这个数字相当于十分钟内每秒 350 exahashes（350 万亿亿次哈希）（即撰写本文时比特币网络的哈希率，创历史新高）。


    赢得挖矿“彩票”的可能性取决于你相对于整个网络的算力。如图 8-3 所示，哈希率在过去几年中持续增长，这反映了技术的进步以及越来越多的人为了从比特币价格上涨中获益而进入挖矿领域。2021
    年中期哈希率暴跌超过 50%，对应的是中国对比特币挖矿的禁令，而当时中国贡献了比特币大部分的哈希率。


    ![](img/600732_1_En_8_Fig3_HTML.jpg)


    一张从 2017 年 1 月到 2023 年 1 月比特币哈希率的折线图。曲线呈上升趋势，但波动剧烈。


    图 8-3


    2017 年 1 月至 2023 年 1 月比特币网络每秒总哈希率，单位为 exahashes（来源：NASDAQ.com 及自行计算）

