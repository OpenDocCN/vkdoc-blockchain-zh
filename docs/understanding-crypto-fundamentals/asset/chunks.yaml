- fmt: "# Key Concepts\n\nThere are different ways to invest in cryptoassets. In particular,\
    \ one can use a third party (a custodian) or set up one’s own wallet. While most\
    \ transactions rely on the former, the latter aligns more with the decentralized,\
    \ trustless philosophy behind cryptoassets. Custodial wallets rely on a third\
    \ party to hold users’ private keys. In contrast, non-custodial (or self-custodial)\
    \ wallets enable users to genuinely own their funds by making them inaccessible\
    \ to anyone else.\n\nThere are different types of wallets: hot wallets are connected\
    \ to the Internet, easing frequent transactions, while cold wallets are offline,\
    \ offering higher security to users. Many recent developments in the industry\
    \ enable new features, such as deterministic wallets, multiple signatures, and\
    \ master public keys. These features enable the industry to grow by responding\
    \ to corporate and institutional needs.\n\nSelecting a wallet or an exchange should\
    \ be a careful endeavor to ensure optimal fit and high security. Similarly, storing\
    \ one’s keys safely is of utmost importance.\n\n# Extension Questions\n\nWhich\
    \ wallet type is most appropriate for a private investor, a private trader, a\
    \ professional individual investor, an individual professional trader, a Bitcoin\
    \ mining company, a traditional corporation active in a non-crypto sector for\
    \ its internal treasury, a traditional corporation active in a non-crypto sector\
    \ but enabling payment in cryptoassets?\n\nWhich creative method could investors\
    \ use to secure their private key against loss and theft?\n\nWhat is the safest\
    \ way to set up a private key?\n\nFootnotes [1](#600732_1_En_11_Chapter.xhtml#Fn1_source)\
    \ [2](#600732_1_En_11_Chapter.xhtml#Fn2_source) [3](#600732_1_En_11_Chapter.xhtml#Fn3_source)\
    \ [4](#600732_1_En_11_Chapter.xhtml#Fn4_source) [5](#600732_1_En_11_Chapter.xhtml#Fn5_source)\
    \ [6](#600732_1_En_11_Chapter.xhtml#Fn6_source) [7](#600732_1_En_11_Chapter.xhtml#Fn7_source)\n\
    \n# Part V: How Should One Invest?\n\n# 12. Investment Strategies\n\n> *The best\
    \ way to measure your investing success is not by whether you’re beating the market\
    \ but by whether you’ve put in place a financial plan and a behavioral discipline\
    \ that are likely to get you where you want to go.*\n> \n> —Benjamin Graham\n\n\
    Literature on investing is abundant, wildly diverse, and sometimes even self-contradicting.\
    \ In any case, presenting a complete investing framework is well beyond the scope\
    \ of this book. Instead, this chapter only briefly highlights fundamental principles\
    \ for new investors in cryptoassets and reminds some words of caution especially\
    \ relevant to this asset class. This chapter will likely fall short of the expectations\
    \ of advanced investors, which are thus invited to skip it.\n\nFirst, investing\
    \ is a highly personal endeavor. Investors have different time horizons, return\
    \ objectives, abilities to take risks, willingness to take risks, legal obligations,\
    \ tax rates, preferences (e.g., ESG), and other unique characteristics. Insights\
    \ from this chapter, or even from this book, should therefore not be seen as a\
    \ recommendation for any investor. Instead, they aim solely to contribute to investors’\
    \ education on cryptoassets. Potential investors should carefully assess where\
    \ they lie on these characteristics and consider referring to professional portfolio\
    \ managers to help them craft an investment strategy.\n\nSecondly, markets are\
    \ in perpetual motion. The relationship between asset classes, such as bonds,\
    \ stocks, currencies, and commodities, is not fixed but changes over time. Besides,\
    \ their valuation depends on the perception and judgment of other market players,\
    \ not on specific formulas or models. In particular, cryptoassets are evolving\
    \ faster than any other asset class and are especially subject to other players’\
    \ perceptions. The content of this chapter should be considered with caution and\
    \ challenged for its relevance in time and in the face of changing conditions\
    \ in the market.\n\nNevertheless, developing an investment strategy is essential.\
    \ Especially for an asset class that is still volatile and subject to market changes,\
    \ an investment strategy can help investors focus on the long term and prevent\
    \ them from reacting emotionally to news or market swings.\n\n## Buy Low, Sell\
    \ High\n\nMany new investors decide to enter their first position at the worst\
    \ possible time. It is especially the case in the cryptoasset market because news\
    \ tends to share extensively about a market asset after major increases in its\
    \ price. For example, Bitcoin tends to make the headlines when its price increases\
    \ by an order of magnitude or another cryptoasset soars even more. As a result,\
    \ potential investors fear missing out. They are often drawn to the market when\
    \ prices are materially above their long-term trend, which is typically quickly\
    \ followed by a downward correction. In particular, many newcomers joined just\
    \ before the price spikes experienced in 2013, 2017, and 2021 (presented in Chapter\
    \ [9](#600732_1_En_9_Chapter.xhtml)).\n\nAt the risk of stating the obvious, realizing\
    \ capital gains through investments consists in buying when prices are low and\
    \ selling when prices are high. As evident as it sounds, many new investors do\
    \ not manage to do so. Specifically, market entry is typically inappropriate when\
    \ prices are significantly above their long-term trend. Buy low, sell high.\n\n\
    This simple objective sometimes involves adopting a contrarian approach: invest\
    \ when the market sentiment is down and withdraw when it is irrationally exuberant.\
    \ For example, the Fear & Greed index introduced in Chapter [9](#600732_1_En_9_Chapter.xhtml)\
    \ helps assess the general euphory level around the crypto market. In addition,\
    \ the *relative strength index* (RSI), although a short-term instrument, is a\
    \ momentum indicator that also provides valuable information on whether an asset\
    \ is currently overbought (possibly a good time to sell) or oversold (possibly\
    \ a good time to buy). These indicators tended to make valuable suggestions about\
    \ the timing of purchases and sales of cryptoassets in the past. However, these\
    \ suggestions were not consistently accurate. They should, therefore, not be the\
    \ sole basis for any investment decision.\n\n## Timing the Market\n\nWhile financial\
    \ analyzes, trends, models, and news are helpful tools to inform where one is\
    \ in the business cycle, timing the market accurately is impossible. Due to inherent\
    \ uncertainties, nobody knows when the market has reached its bottom or peak.\
    \ Striving to buy at the absolute lowest price and sell at the exact market peak\
    \ may therefore be a counterproductive endeavor. An alternative would be dollar-cost\
    \ averaging.\n\n## Dollar-Cost Averaging\n\nConscious of the impossibility of\
    \ timing the optimal entry and exit points, investors can rely on multiple entries\
    \ and exits. For example, an investor could invest 1% of the available capital\
    \ or a fixed amount every month. This process, called “dollar-cost averaging,”\
    \ is a sort of temporal diversification. It limits the likelihood of investing\
    \ a material amount at the wrong time. Dollar-cost averaging is already prescribed\
    \ on page 2 of Benjamin Graham’s 1934 value-investing book *The Intelligent Investor*,\
    \ which became a reference for the industry [42].\n\nIn addition, dollar-cost\
    \ averaging limits the risks implied by emotional trading. The cryptoasset market\
    \ is more emotional than others because cryptoasset fundamentals are less understood\
    \ than those of traditional asset classes. Also, the comparatively lower level\
    \ of liquidity makes large trades more impactful on price. Spreading purchases\
    \ and sales over time seems the more prudent and recommendable approach, especially\
    \ for cryptoassets.\n\nNote, however, that from a purely mathematical perspective,\
    \ dollar-cost averaging is not superior to a large one-off purchase (assuming\
    \ sufficient liquidity to absorb the purchase without a material impact on price)."
