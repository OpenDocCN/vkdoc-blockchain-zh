    # 17. Concluding Remarks


    > *All rational action is in the first place individual action. Only the individual
    thinks. Only the individual reasons. Only the individual acts.*

    >

    > —Ludwig von Mises


    As we venture into the unchartered territory of the digital revolution, cryptoassets
    and blockchain technology are bringing about a paradigm shift impacting the global
    economy, redefining trust, and reshaping industries across the board. This book
    explored a wide spectrum of topics and disciplines to understand this new paradigm.
    It covered monetary history, economics, game theory, technological innovations,
    portfolio management, risk management, and valuation methods. Indeed, valuing
    cryptoassets requires understanding each of these disciplines, as they all substantially
    impact ultimate valuations. This final chapter summarizes the key takeaways from
    the book and sets the stage for what comes next.


    ## Looking Back


    Introducing cryptoassets naturally begins with Bitcoin, the first cryptoasset
    and by far the largest. Capturing about half of the entire asset class value,
    Bitcoin is a special case with a different purpose, distinct risks, and separate
    valuation methods from any other asset. It emerged from the ashes of the Great
    Recession in 2008 and quickly grew into a trillion-dollar asset by putting the
    meaning of money into question. In particular, Bitcoin reinstated qualities of
    sound money that the gold standard once enforced, and that were lost in the last
    century when fiat money became the standard. In addition, it complemented these
    desirable economic qualities with digitalization, making it more appropriate for
    the current age.


    Furthermore, its main value proposition is unprecedented for a digital asset:
    combining scarcity and decentralization. By decentralizing a scarce digital asset,
    Bitcoin gathered the properties needed to solve society’s critical problems, such
    as monetary censorship, savings confiscation through inflation, and the lack of
    genuine ownership of value and property rights. Moreover, its state-of-the-art
    use of cryptography solves countless other issues, from privacy intrusions to
    confidential data breaches. The indirect consequences of these properties include
    a higher level of financial inclusion, lower fees for international money transfers,
    quicker settlement of transactions, and higher levels of free speech. Ultimately,
    Bitcoin is a voluntary, accessible, reliable, hard-to-confiscate, provably scarce,
    decentralized asset transparently offering finality and immutability of transactions,
    available at low cost and globally. It is independent of any political agenda
    and has spread for over a decade without downtime, 24 hours a day, 7 days a week,
    365 days a year.


    Subsequently, the cryptoasset industry has evolved to offer benefits even beyond
    these properties. A crucial innovation was the possibility of establishing decentralized
    agreements of any kind, extending beyond the limits of agreements to be transactions.
    Such decentralized agreements took the form of smart contracts, first implemented
    on the Ethereum blockchain. Similar to the Bitcoin innovation, smart contracts
    opened up countless new possibilities. In this case, they enabled the automation
    and decentralization of virtually any process to enhance reliability, security,
    transparency, accessibility, and compliance. They also facilitated new forms of
    governance for organizations and myriad new business models built on top of one
    another. In the same way that the Internet revolutionized essentially any business,
    blockchain-enabled innovations are making revolutionary waves in virtually all
    industries.


    Nevertheless, the path toward greater adoption is not smooth. The novelty of the
    cryptoasset industry brought challenges, from vocal opponents to hackers and other
    nefarious actors taking advantage of the industry’s publicity. As a result, early
    systems were hacked, some funds were stolen, others became used for illegitimate
    purposes, and major players struggled to keep up with the industry’s rapid pace
    of change.


    Despite these challenges, the need for decentralization and cryptoassets has never
    been more critical. Centralized authorities and private organizations collect
    more data on individuals at an accelerating pace and are increasingly more capable
    of exploiting this data. They are thereby restraining privacy and the freedom
    to express opinions without fearing consequences. Traditional institutions are
    slow, biased, expensive, and corruptible, all of which can be mitigated through
    a decentralized infrastructure leveraging the potential of cryptoassets.


    At the same time, millions of people suffer from sudden devaluations of their
    life savings due to fiat currency collapses,^([^(124)](#fn124)) and billions more
    experience a steady erosion of their wealth due to rampant inflation. The unnecessary
    coupling of money and state has had catastrophic consequences for decades, but
    it can finally be overcome.'
  raw: "## Key Concepts\n\nTraditional assessment methods of an asset’s economic value\
    \ need to be adjusted for valuing cryptoassets and differ based on the cryptoasset\
    \ at hand. In particular, NPV analyses can be used for proof-of-stake cryptoassets,\
    \ with the limitation that cash flows (staking rewards) are expressed in the assessed\
    \ asset. In contrast, a proof-of-work cryptoasset can be valued based on replacement\
    \ costs; that is, the current price of the electricity needed to mine the asset\
    \ at the current hash rate. Besides, demand for an asset can be measured through\
    \ usage or adoption, thereby hinting at the value of the growth component in a\
    \ traditional value investing approach. Supply-based models value scarcity and\
    \ are especially relevant for scarce assets such as commodities, including Bitcoin.\
    \ An alternative valuation approach is based on the value of comparable asset\
    \ classes and the expected market share capture of these asset classes. All valuation\
    \ models have in common that they suggest that Bitcoin’s price should be much\
    \ higher than its current level as of May 2023. Many variants of these approaches\
    \ can be based on countless on-chain metrics and can be complemented with short-term\
    \ indicators.\n\n## Extension Questions\n\nWhich valuation methods are appropriate\
    \ to value Bitcoin, and which weight should be given to each method? What about\
    \ Ethereum, Polygon, Uniswap, and Monero?\n\nHow does the appropriateness of valuation\
    \ methods evolve based on the maturity of the cryptoasset? \n\nHow can transaction\
