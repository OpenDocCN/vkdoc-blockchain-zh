  trans: '

    # 质押


    许多加密资产将质押作为一种可能的被动收入来源（例如，参见表格 8-1）。第 6 章介绍了权益证明共识机制，其中质押者负责验证新区块。他们被选中进行验证的可能性，通常（除其他标准外）取决于他们向网络承诺（质押）的代币数量。这些验证者随后会因其工作获得质押奖励。成为验证者可能需要大量的最低投资（例如，以太坊为
    32 `ETH`），以及繁琐的技术设置以避免停机（停机可能导致质押金被罚没）。然而，质押池对投资者来说很容易获得，无需专用设备或一次性大额投资。特别是，像
    Binance、KuCoin 或 Coinbase 这样的交易所，为可质押的加密资产提供了有吸引力的奖励，且最低投资门槛极低。在这种情况下，质押奖励类似于债券收益率：质押的本金越高，质押奖励就越高。然而，与债券类似，这种收益也面临金融风险。特别是对于已质押的加密资产，它面临与资产本身及其质押平台相关的风险。


    表 8-1


    截至 2023 年 1 月，顶级可质押资产的年化收益率（APY）质押奖励（来源：[*www.stakingrewards.com/cryptoassets/*](http://www.stakingrewards.com/cryptoassets/)）


    | 加密资产 | 代码 | 质押奖励 |

    | --- | --- | --- |

    | 以太坊 | ETH | 3.9% |

    | 卡尔达诺 | ADA | 3.4% |

    | 币安币 | BNB | 2.3% |

    | 雪崩协议 | AVAX | 8.1% |

    | 波卡 | DOT | 14.5% |

    | 多边形 | MATIC | 5.0% |

    | 阿尔戈兰德 | ALGO | 6.6% |

    | 索拉纳 | SOL | 4.2% |

    | 互联网计算机 | ICP | 7.5% |


    质押奖励的范围通常从中个位数到三位数的回报率，具体取决于几个标准。首先，可质押的加密资产根据其编程特性，会提供不同的质押奖励。


    其次，所选平台也很重要，因为一些平台会抽取更大份额的奖励，并提供不同的条件。表 8-2 展示了不同提供商之间质押奖励的差异。


    表 8-2


    截至 2023 年 1 月，排名前五的提供商（按质押总价值排序）的 MATIC 质押年化收益率（APY）奖励（来源：[*www.stakingrewards.com/earn/polygon/*](http://www.stakingrewards.com/earn/polygon/)）


