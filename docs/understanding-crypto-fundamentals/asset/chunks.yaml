- fmt: '# Liquidity Mining


    Liquidity mining is another passive income possibility for cryptoasset holders
    but is more complex than staking or lending. Fundamentally, it rewards liquidity
    providers for their service (i.e., providing liquidity to a market).


    The logic for rewarding liquidity is the following. A platform (centralized or
    decentralized) aims to provide high liquidity between many cryptoasset trading
    pairs. For a trading pair (e.g., Solana and Axie Infinity), there may be few buyers
    and sellers, creating an “illiquid market.” In an illiquid market, buying one
    asset with the other can materially move the market price because there are few
    buyers and sellers. It typically happens when the market faces large orders and
    insufficient volume to absorb them. Liquid markets are valuable for platforms
    because such markets provide stable prices and competitive commission fees. This
    value translates into rewards for liquidity providers, typically a flexible interest.


    Concretely, liquidity providers enter a liquidity pool containing two assets by
    depositing an asset (cryptoassets, fiat currencies, or stablecoins). In such a
    pool, the two targeted assets have a relative proportion of the pool, depending
    on how much of each asset is available. The provider contributes one asset (or
    both assets) as liquidity to the pool and gets a share of the pool in return for
    a claim on the two assets. The substance of the claim depends on how the relative
    proportion of the two assets evolves after the provider joins the pool.


    ![](images/600732_1_En_8_Chapter/600732_1_En_8_Fig5_HTML.png)


    An illustration of liquidity mining. A liquidity provider deposits 4 BTC into
    the liquidity pool with 1,000 BTC and 10,000 ETH of total shares 100,000 and receives
    200 pool shares.


    **Figure 8-5** Example of BTC-ETH liquidity pool with a relative price of 10 ETH/BTC
    where a liquidity provider gets 0.2% of the pool’s shares by contributing the
    corresponding quantity of BTC in proportion to the total pool’s value


    Traders use the pool’s automated market maker (AMM) to swap one asset for the
    other, paying a fee for the service. Rewards to liquidity providers depend on
    how much volume traders swap in the corresponding pool. The higher the volume
    swapped, the higher the total fees and the higher the return for the liquidity
    providers. As of May 2023, the decentralized exchange Uniswap charges a fee of
    0.3% of the swapped value, and the centralized exchange Binance charges a standard
    fee of 0.15% (with a 50% fee rebate, paid in Binance’s native coin, BNB).


    ![](images/600732_1_En_8_Chapter/600732_1_En_8_Fig6_HTML.png)


    An illustration of liquidity mining. A liquidity provider deposits 5 BTC + 50
    ETH into a liquidity pool and receives 500 pool shares. A trader deposits 1 BTC
    + 0.3% fee into the liquidity pool and receives 10 ETH.


    **Figure 8-6** Example of BTC-ETH liquidity pool with a relative price of 10 ETH/BTC
    where a liquidity provider gets 0.5% of the pool’s shares, and a trader swaps
    1 BTC for 10 ETH by paying a 0.3% fee for the trade


    The resulting yield for the liquidity providers can be vastly different depending
    on the trading pair, as shown in Table [8-5](#600732_1_En_8_Chapter.xhtml#Tab5).


    **Table 8-5** Examples of Liquidity Mining Trading Pairs Offered by Binance, with
    Vastly Different Levels of Liquidity and Yield As of January 2023 (Source: Binance
    App)


    | Provider | Trading Pair | Liquidity | Total Yield |

    | --- | --- | --- | --- |

    | Binance | USDT/DAI | 1,548,984 USDT + 2,802,152 DAI | 1.16% |

    | Binance | BTC/ETH | 1,203 BTC + 17,398 ETH | 1.38% |

    | Binance | AAVE/BTC | 5,925 AAVE + 22 BTC | 3.03% |

    | Binance | ADA/BUSD | 1,610,694 ADA + 623,816 BUSD | 5.10% |

    | Binance | AXS/BNB | 19,761 AXS + 756 BNB | 6.31% |

    | Binance | GALA/BNB | 8,019,080 GALA + 1,509 BNB | 16.11% |


    A concept to understand before using liquidity mining is *impermanent loss*. The
    relative quantity of each asset in the pool determines the value of the liquidity
    provider’s share. When a large volume of one asset in a pair enters or leaves
    a liquidity pool, the share of assets in the pool changes. As a result, the investment
    value of the liquidity provider can be lower than it would have been by just holding
    on to the assets. Due to this change, the investment is subject to unrealized
    loss (compared to simply holding to the asset). This unrealized loss is termed
    impermanent loss. However, impermanent loss only becomes material when the relative
    value of the assets in the pool changes wildly.^([^(78)](#fn78)) In addition,
    returns from providing liquidity typically more than compensate impermanent losses.


    ## Yield Farming


    Yield farming involves locking up cryptoassets to get the highest possible passive
    income. Passive income typically comes from underlying staking, lending, or liquidity
    mining.


    Some platforms, such as Aave, Compound, or yearn.finance, automate this process
    by moving funds between DeFi services to get the highest possible return on capital.
    In early 2020, it was not unusual to see three-digit (sometimes even four-digit)
    rates of return in yield farming, which testified to exceptional risk levels.
    Such yields were only possible through significant leverage and investments in
    high-risk projects. In the bear market of 2022, yields were more humble, typically
    single-digit to low-double-digit rates of return, as processes became more established
    and less risky.


    ## Airdrops


    In the cryptoasset context, airdrops are a marketing strategy for new cryptoassets
    to gain popularity and increase usage. One can think of an airdrop as the crypto
    equivalent of a free sample offered in a retail shop. While many variations exist,
    airdrops typically consist of users receiving a small amount of a new cryptoasset
    for free or in return for small services.^([^(79)](#fn79)) These services can
    be retweeting a post of the cryptoasset issuing company, joining the crypto project’s
    newsletter, following the cryptoasset page on social media, or answering basic
    questions on how the cryptoasset works, thereby testifying to the user spent time
    understanding its purpose. Sometimes, services include the usage of the cryptoasset:
    for example, holding at least a certain amount of it or using a service offered
    by the issuing company. Airdrops can be crucial to generate network effects through
    widespread usage of the cryptoasset.


    Historically, some airdrops have returned sizable amounts, such as the Uniswap
    airdrop yielding $15,000 for each recipient. However, airdrop returns are typically
    tiny (worth a few dollars at most) and often do not even deliver the promised
    token. In addition, airdrops are typically for crypto projects in their infancy,
    where the airdropped cryptoasset often becomes worthless. For many cryptoasset
    investors, whether airdrops are even worth the time necessary to complete the
    registration process is questionable.'
