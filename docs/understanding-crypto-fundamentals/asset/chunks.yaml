- fmt: '*   `Proof of activity (PoA)`^([^(64)](#fn64)) combines the most established
    consensus mechanisms, PoW and PoS. It supposedly combines the best of each by
    beginning as a PoW but resembling more PoS later in the process. In particular,
    once a new block is mined, the mechanism switches to PoS, randomly selecting validators
    based on the number of coins they own. Drawbacks of the mechanism are that the
    quantity of power used is still high (the main drawback of PoW), and coin hoarders
    are still favored in validating the block (the main drawback of PoS).


    *   `Proof of capacity (PoC)` moves away from using the miner’s stake (as in PoS)
    or computational power (as in PoW) to validate transactions. Instead, it uses
    the available space on the miner’s hard drive to store a list of possible solutions
    to a computational challenge. The more hard drive space is dedicated to the activity,
    the longer the list of possible solutions and the higher the likelihood for the
    miner to be selected to validate the next block. The main benefit compared to
    PoW or PoS is the higher resulting efficiency.


    *   `Proof of burn (PoB)` consists of burning coins to get the right to write
    blocks on the chain in proportion to the burnt coins. A miner would send coins
    (either the native coin of the blockchain or other coins, such as bitcoin or ether)
    to an unspendable address to get a reward in the native coin of the chain.


    *   `Proof of history (PoH)` is a series of cryptographic computations proving
    the time between two events, also known as a cryptographic clock. It uses a high-frequency
    Verifiable Delay Function to produce a series of transaction hashes (each including
    the previous hash as one of its inputs) so that the sequence of the transactions
    is easily verifiable. Proving a sequence of events is the PoH key to ensuring
    the blockchain’s integrity. This way, nodes do not need to wait for feedback from
    other nodes to validate the chain. PoH provides high speed for the blockchain
    while keeping its network secured and decentralized. It is notably used for the
    Solana blockchain, which posts a new block every 400 milliseconds.


    *   `Practical Byzantine fault tolerance (PBFT)` is a consensus mechanism replicating
    blocks between nodes. A primary node, elected by others, suggests a set of transactions
    to the rest of the network. Other nodes execute these transactions and broadcast
    the hash code of the resulting block. If at least two-thirds of the hash codes
    received correspond to the original one, the block is considered valid and appended
    to all local blockchain copies. This consensus mechanism benefits from remarkably
    high throughput and negligible waiting time. However, the number of computations
    necessary is high, and PBFT can only tolerate a failure of up to one-third of
    the network (in comparison, PoW can tolerate a failure of up to half of the network).


    *   `Delegated Byzantine fault tolerance (DBFT)` is a protocol in which all members
    get one vote, regardless of their wealth. In other words, it resembles how a country
    may elect a president. With this vote, members elect representatives (“bookkeeping
    nodes”). Among the representatives, one is randomly selected to propose the new
    block, which needs to be validated by the other representatives. If at least one-third
    disagree with the suggestion, another one is selected to propose the block. Similar
    to PBFT, one-third of the nodes could stall the process. However, the number of
    computations necessary is much smaller in DBFT.


    *   The `Ripple protocol (RP)` or the XRP ledger consensus mechanism (also known
    as *proof of correctness*) consists of a set of elected validators (the “unique
    node list”) acting on behalf of the network. They follow an iterative process
    where they can add or remove new transactions until they align with enough of
    the other validators. At least 80% of them must agree for the process to continue.
    Otherwise, the status of the blockchain remains unchanged. One major drawback
    is that only 20% +1 validators must be faulty for the entire process to stall.


    Many other consensus mechanisms exist and are under development. The interested
    reader may want to look into, among others, proof of storage, proof of deposit
    (PoD), proof of weight, proof of reputation, proof of space, proof of stake velocity,
    proof of identity, proof of existence, proof of retrievability, proof of believability,
    and federated Byzantine agreement.


    ## Decentralized Data vs. Decentralized Transactions


    A blockchain is a decentralized database of transactions. However, it does not
    hold the underlying data the transactions refer to. This distinction is irrelevant
    when the underlying data is nothing more than transactions, like for Bitcoin.
    In that case, everything is on the blockchain. However, when a sizeable specific
    dataset is at hand (for example, for a digital song), the blockchain typically
    does not hold the dataset (the song) itself; instead, it only holds transactions
    related to the dataset.


    In such a case, the blockchain must link to a database. The database can be centralized
    (in which case there is little interest in using a blockchain) or decentralized.
    One decentralized option to maintain the underlying data is IPFS: the InterPlanetary
    File System. IPFS marries well with blockchain as both the data transactions and
    the underlying database are decentralized. Introduced in 2016, IPFS is like a
    hard drive for blockchains. It stores not only data but also websites, applications,
    and more, as well as versions of this data over time.


    Since copies of a blockchain exist on many computers, storing large sets of information
    in the blockchain itself would be inefficient. It would needlessly waste storage
    space on the blockchain network. Instead, cryptographic hashes of data stored
    on IPFS servers lighten the blockchain and increase its efficiency.'
