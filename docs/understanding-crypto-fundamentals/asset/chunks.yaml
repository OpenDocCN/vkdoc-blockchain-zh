    ## The Sharpe Ratio


    Named after the Nobel Prize laureate William Sharpe, the Sharpe ratio assesses
    the relationship between risk and return on investment. Specifically, this ratio
    divides the incremental return (compared to a benchmark) by its volatility. Thereby,
    it measures an investment''s effectiveness compared to its risk in a single metric.
    For example, assume that a risk-free investment used as benchmark yields a 1%
    return. Another investment that yielded an average return of 4% with a volatility
    of returns of 2% has a Sharpe ratio of 1.50, computed as the incremental return
    of 3% (= 4% - 1%), divided by its volatility of 2%.


    Algebraically, it is as follows:


    ```

    Sharpe ratio = incremental return / volatility = (4% - 1%) / 2% = 1.50

    ```


    This metric is beneficial because it enables comparing investments with different
    risk profiles. For example, investing in a stock with an expected return of 10%
    is not better per se than investing in another stock with an expected return of
    8% if the risk of the former is materially higher than the risk of the latter.
    The Sharpe ratio enables like-for-like comparisons.


    Assuming a risk-free rate of return of 1%, Table 4-4 presents the Sharpe ratio
    of the previous investments using daily, weekly, monthly, and yearly data.


    **Table 4-4** Sharpe Ratio of Selected Investments, Using the Same Time Frame
    and Assuming a Risk-Free Rate of Return of 1% As the Benchmark


