    # 加密货币借贷


    质押之外的一种被动收入替代方案是加密货币借贷。在加密货币借贷中，贷方通常将法定货币（例如美元或欧元）或稳定币（例如 `Dai` 或 `USDC`）借给当前持有加密资产的借款人。这样，加密资产就成为了贷款的抵押品。


    通常，加密货币贷款是超额抵押的。例如，Alice 借给 Bob 5,000 `USDC`，而 Bob 目前持有五个以太币，每个价值 2,000 美元，Bob
    将这五个以太币用作抵押。如果 Bob 在贷款到期时未能偿还借入的 `USDC`，Alice 有权出售这些以太币，直到她的贷款和利息得到偿还。在这种情况下，贷款是超额抵押的，因为抵押品的市场价值是贷款价值的两倍多。^(⁷⁷)


    抵押降低了 Alice 的信用风险：只有当 Bob 未能偿还贷款，并且抵押品的价值跌至低于应还款额时，她才会蒙受损失。在这个例子中，需要以太币价值至少下跌
    50%，贷款才无法全额偿还。由于 Alice 的贷款风险低于没有抵押品的情况，她不需要向 Bob 要求特别高的利率。这意味着 Bob 可以通过提供抵押品来享受较低的利率。他可以用借来的钱购买更多他已经持有的加密资产，或者购买另一种加密资产。只要加密资产的增值速度高于贷款利率，Bob
    就能从这种金融安排中受益。


    由于加密货币借贷的存在，加密资产持有者可以通过借出他们的加密资产并获得正利率来获益。例如，与其让比特币闲置在加密平台上，不如通过借出它们来产生被动收入。


    众多中心化和去中心化的加密平台以（相较于传统金融）有吸引力的利率提供加密货币借贷。此外，它们还提供近乎即时的贷款发放和结算。这些平台在匹配储蓄者和借款人方面发挥着关键作用，从而为这些贷款创造了市场。它们在利率、抵押品金额和最低存款要求方面各不相同。利率范围通常从不到一个百分点到两位数的回报率，如表
    8-4 所示。


    表 8-4


    截至 2023 年 1 月，币安提供的借贷年化收益率（APY）奖励（来源：币安 App）


    | 提供商 | 加密资产 | 代码 | 年化收益率 (APY) | 锁仓期限 |

    | --- | --- | --- | --- | --- |

    | 币安储蓄 | Axie Infinity | AXS | 12.0% | 灵活 |

    | 币安储蓄 | 比特币 | BTC | 1.5% | 灵活 |

    | 币安储蓄 | USD Tether | USDT | 5.5% | 灵活 |

    | 币安储蓄 | Chainlink | LINK | 0.2% | 灵活 |

