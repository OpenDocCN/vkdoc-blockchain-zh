  trans: "\n# 反馈\n\n欢迎您对本书未来可能的版本提出任何反馈和建议。如有任何想法，请随时发送邮件至 `thomas@thomasjeegers.com`\
    \ 与我联系。\n\n# 引言\n\n> *投资知识，收益最佳。*\n> \n> ——本杰明·富兰克林\n\n基本面分析是一种深入研究资产经济价值及其价格驱动因素的理念。就股票而言，它涉及理解相关公司的业务和财务报表。就大宗商品而言，它涉及理解商品的库存和季节性周期、政府政策、相关市场，以及其供需驱动因素。因此，股票的基本面与大宗商品的基本面截然不同。\n\
    \n同样，加密资产的基本面也是独一无二的。它涉及理解数字信息如何具有价值、什么驱动着这种价值，以及加密资产生态系统如何影响它。然而，与任何可交易资产相似的是，加密资产的市场价格最终归结于供需关系。\n\
    \n基本面分析用于长期投资。它与技术分析有*根本性*的不同，后者通过分析资产的月度、周度、日度甚至日内价格模式来预测短期走势。换句话说，基本面分析是投资者的工具，正如技术分析是投机者的工具。适用于基本面和技术面分析的资产涵盖债务与股权、房地产与衍生品、货币与交易基金，以及任何证券。当然，加密资产也未能逃脱审视。\n\
    \n然而，加密资产在手头的资产类型上有所不同。特别是，区块链技术使比特币成为第一种稀缺且无法伪造的数字资产。这是通过去中心化该资产实现的，这意味着没有一个唯一的网络所有者。通过多种技术的巧妙结合，它实现了无需任何中介即可在几分钟内完成、永久记录的全球价值转移。这些特性使比特币及其他加密资产成为全球社会货币金融体系发展进程中合乎逻辑的下一个里程碑。这不是一场革命，而是一场演进——货币与金融历史中自然的下一个步骤。它们不仅提供了货币的数字化，而且更重要的，是提供了去中心化。\n\
    \n正如本书详细阐述的那样，去中心化使得加密资产成为一种在货币模型上严格优于政府实体或私人银行发行的纸币的基础。事实上，在获得足够采用的情况下，加密资产在货币的三大核心功能：记账单位、价值储藏和交换媒介方面，都提供了更大的价值。\n\
    \n此外，这种颠覆的影响远不止于货币体系。在一个日益数字化的社会中，数字资产的共享需要公平透明的规则。这不仅适用于货币，也适用于身份、产权、音乐和艺术等众多其他应用场景。因此，几乎所有行业都将直接或间接地受到加密资产及其底层技术——区块链的影响。特别是，第\
    \ 3 章介绍了区块链技术作为向善力量，以多种方式革新世界。\n\n本书主要探讨加密资产作为下一代货币体系的一部分以及作为一种新的投资资产类别的潜力。特别是，它遵循价值投资的原则，从经济和金融的角度分析加密资产。换言之，其目标在于识别这类新资产的价值所在。本书识别并衡量加密资产的基本支柱，以帮助评估其真实价值。同时，它也通过强调其背后的金融和非金融风险来平衡视角。具体而言，本书围绕任何投资者，无论经验丰富与否，在投资前都应提出的关键问题来构建结构。*为什么*这类资产有价值？*什么*构成了这类资产？*何时*是投资的最佳时机？*在哪里*投资？*如何*制定投资策略和风险管理？最后，*哪些*估值方法存在且适用于加密资产？本书并不推荐任何特定的投资，而是提供做出更明智的加密资产投资决策所需的框架。它使读者能够理解为何它们具有真正的经济价值，并暗示了如何衡量这一价值。对于严肃的长期加密资产投资者而言，这是一个起点，而非寻求快速致富方案的短期投机者的答案。\n\
    \n此外，市面上已有出色的加密资产资源。本书并非试图取代它们，而是通过专注于价值投资来加以补充。过多深入探讨加密资产和区块链技术的技术细节会偏离本书的宗旨。这项技术背后的所有复杂性甚至很难单独用一本书来涵盖。因此，本书仅涉及区块链技术的高层级运作原理。具体而言，它不涵盖以下主题。\n\
    \n*   高级密码学和 dApps 编程。感兴趣的读者和程序员应参考 Imran Bashir 所著的深度书籍《精通区块链》[1]。\n\n*   非同质化代币（NFT）。感兴趣的读者应参考\
    \ Fortnow 和 Terry 合著的《NFT 手册》[2]。\n\n*   加密资产税务。每个国家的加密资产税务考量差异巨大且变化迅速。感兴趣的读者可以参考\
    \ Schmidt、Bernstein、Richter 和 Zarlenga 所著的第二版（2023 年）详尽的书籍《加密资产的税务》，该书涵盖了 40 多个国家的加密资产税法\
    \ [3]。\n\n*   技术分析（TA）。本书侧重于长期，而非技术分析所考虑的短期视野。此处提出的宏观论点可能需要数年，甚至数十年才能显现。短期加密交易者应参考关于波段交易（短期）或突破交易（中期）的书籍。\n\
    \n由于比特币是第一种加密资产，且其市场价值约占所有加密资产总价值的一半，因此本书将相应重点放在这一特定资产上。尽管如此，在比特币之后涌现出更多加密资产，其用途远远超出了比特币最初的价值主张。\n\
    \n作为作者，我必须强调，我对加密资产所不了解的远比我了解的多。特别是，尽管我在这些领域有肤浅的经验，但我既不是程序员，也不是拥有数十年经验的专业投资者。此外，加密资产行业异常快速的发展步伐，使得不可能密切跟踪该领域发生的所有事情。尽管如此，我相信本书为加密资产、其在均衡投资组合中的应有地位，以及截至\
    \ 2023 年投资者面临的风险，提出了令人信服的论据。\n\n一些读者可能认为自己错过了机会。过去十年里，许多青少年加密百万富翁登上了新闻头条。一些早期投资者和创新者甚至通过该行业的早期收益成为了亿万富翁。正如本书所示，从这项创新中获利还为时不晚，远非如此。实际上，这仅仅是开始。如果将人的一生比作加密资产的发展，那么它目前正处在蹒跚学步的阶段。它几乎还不能自己站稳，但面前还有一生的时间要发展。危机必将伴随它的青少年时期，但最好的时光还在后头。\n\
    \n不论人们对加密资产有何看法，它们的概念验证重新定义了我们思考信任的方式。它们背后的技术可能成为自互联网以来对社会最具变革性的创新——不是大数据、人工智能或自动驾驶汽车，而是区块链。曾经掌握在少数有权势者手中的东西（无论好坏），现在可以掌握在每个人手中——或者谁的手中都没有，这取决于人们如何看待它。\n\
    \n# 关于作者 关于技术审校者\n"
- fmt: '# Part I: Why Consider Crypto Investments?


    ## 1. A Brief History of Money


    > *Central banks in their present form would no longer exist; nor would money…
    The successors to Bill Gates could put the successors to Alan Greenspan out of
    business.*

    >

    > —Mervyn King, 1999


    The history of cryptoassets, like this book, begins with money. In particular,
    with the established monetary system. Understanding what makes money and how it
    has evolved is essential to understand the value proposition of cryptoassets—Bitcoin
    in particular. Therefore, let us start with the basics by going back several millennia
    to identify the fundamentals of money. As you will see, they naturally make a
    case for what is coming next.


    ### What Makes Money?


    As human societies emerged millennia ago, the need to exchange value became crucial.
    Direct trades of value in a barter system, such as individuals exchanging eggs
    for fruits, had severe limitations. A barter system only works when one individual
    wants to buy what another wants to sell, while the seller also wants something
    the buyer has to offer. In addition, goods traded must have similar value. For
    example, a seller would not want to exchange a house that took months to build
    for a few eggs. Moreover, even if one could gather enough eggs, the trade would
    still be unattractive since eggs are perishable and inappropriate for transactions
    of considerable value. A medium of exchange, a form of money, had to arise to
    facilitate trade and economic activity.


    In all societies, media of exchange would naturally emerge. However, they would
    not all be equally appropriate. A medium of exchange requires several characteristics
    to become an optimal form of money. Nothing dictates what should or should not
    be money, but some features make for better forms of money. For example, sound
    money needs to have value in the eyes of as many potential trade participants
    as possible to broaden its usability. Also, it should hold its value through time.
    For instance, it should not be perishable, like the eggs in the previous example.
    Optimally, it should also be countable and divisible into smaller units to facilitate
    transactions of little value and transportable to enable users to carry their
    wealth. Finally, an optimal form of money would have all units worth the same
    and be indistinguishable from one another, a characteristic known as *fungibility*.


    In the fourth century BCE, Aristotle established the following critical characteristics
    as the base for sound money [4]. In particular, money should be:


    1. a medium of exchange

    2. a unit of account

    3. a store of value

    4. durable

    5. portable

    6. divisible

    7. fungible


    Forms of money used by societies over time only partially fulfilled these characteristics—from
    seashells to beads, cattle, grain, salt, tobacco, skins, silver, and even gold.


    The founder of the Austrian School of Economics[¹](#fn1), Carl Menger, challenges
    the popular thinking that a medium of exchange becomes money by authority, for
    example by law dictated by the state [5]. Instead, he considers money as a special
    case of other assets (commodities) with a remarkably high degree of “saleability”
    (*Absatzfähigkeit*). A saleable item is readily marketable at any convenient time
    without incurring a material decrease in the selling price. In other words, it
    represents the degree to which a seller can dispose of the asset at a fair economic
    price. Menger identifies the following six criteria affecting an asset’s saleability[²](#fn2):


    1. the number of potentially interested buyers

    2. their purchasing power

    3. the quantity available of the good compared to the total unsupplied quantity
    that the market wants of it

    4. the divisibility of the asset

    5. the level of market development and speculation

    6. the legal and regulatory limitations imposed on transacting the asset


    The criteria summarized by Aristotle on the one hand and by Menger on the other
    are critical in understanding why an asset makes a good form of money. By extension,
    they are crucial to evaluate the potential for such money to become valuable.
    These lists are also helpful in assessing how a change in any criterion affects
    the asset’s valuation. For example, improving market development or reducing regulatory
    limitations on transactions would increase the asset’s saleability and value.


    Rational individuals facing several potential media of exchange will naturally
    tilt toward the “better” forms of money, that is, those with greater saleability.
    Even if one does not need the asset, the mere knowledge that others may need it
    is sufficient to incentivize acquiring it. Indeed, the owner of the better medium
    of exchange maximizes his ability to purchase goods in the future. Individuals
    arriving at the marketplace with less saleable assets (e.g., rare antique writings)
    find themselves at a disadvantage compared to individuals with more saleable assets
    (e.g., gold coins). The less saleable asset must first be converted to a more
    saleable asset before the owner can perform any further trade.


    It ensued in every society that better forms of money (i.e., with a higher degree
    of saleability) tended to be hoarded. At the same time, comparatively inferior
    forms of money lost attractiveness. One tends to exchange less saleable for more
    saleable assets because doing so is in one’s best interest. Thus, the preceding
    criteria, not the pressure of a central authority, enabled specific forms of money
    in a free economy to become the most appropriate medium of exchange. These criteria
    enabled one particular asset to emerge as the best form of money among all potential
    candidates.


    ### Precious Metals As Money


    In early societies, precious metals were desirable for their utility and beauty.
    Gold and silver, for example, shone from the Far East to the Western world as
    ornaments. They were less prone to corrosion (contrary to iron or copper), so
    they could last generations. In other words, they had high durability. Also, since
    they carried much value in relatively small weight, they enabled the portability
    of one’s wealth. At the same time, their relative scarcity made the unsupplied
    quantity that the market demanded proportionally larger than the available quantity.
    These characteristics positioned them well as assets with a high degree of saleability.


    Before metals such as silver or gold became the officially state-backed medium
    of exchange, individuals already used them as such. Many individuals bought them
    because of their intrinsic characteristics of durability, portability, divisibility,
    and especially store of value. It enabled them to transfer value across space
    and time. This interest, in turn, increased their saleability. Precious metals
    became money because traders following their self-interest effectively used them,
    not because an authority imposed them as currency. As metallurgy improved, the
    malleability and subsequent standardization in shape, quality, and weight of these
    metals further enhanced their attributes of sound money (namely fungibility and
    divisibility), which made them even more saleable. They became the de facto money
    in most of the civilized world. However, it is essential to understand that money
    is a social construct, not a regulatory one. Regulations and state backing only
    followed and strengthened this pre-existing social construct.'
