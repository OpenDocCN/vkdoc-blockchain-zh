- fmt: '# The Ascension of Paper Currency


    In eighteenth-century France, this pattern appears again, but with elements of
    novelty: central banking and paper money. After the death of the French King Louis
    XIV, the Duke of Orléans Philip II took over the regency of the country until
    the eleven-year-old successor to the throne, Louis XV, came of age. The duke found
    the country buried under unimaginable war debt the previous monarch had accumulated.
    France’s tax revenue did not even cover the interest payments on that debt.


    The “remedy” came in May 1716, as the French government established a central
    bank with the power to print paper currency. In a few months of currency printing,
    France could not only pay interest on its debt but also reimburse that debt entirely.
    However, as in previous cases, inflating the currency supply inevitably led to
    rampant prices. By January 1720, prices were increasing at 23% monthly. Rents
    and real estate prices, for example, had increased 20-fold since the beginning
    of this money-printing frenzy. In February 1720, banks stopped redeeming paper
    currency for gold or silver. It became illegal to transact in precious metals,
    which were confiscated from anyone found in possession of them. When banks reopened
    in May of that year, gold, silver, and copper ran out as people were desperate
    to exchange the worthless paper currency for real money. Ultimately, these four
    years of hysteric money printing drove the country and a large part of Europe
    into a depression that lasted decades.


    ![](images/600732_1_En_1_Chapter/600732_1_En_1_Fig2_HTML.png)


    A close-up photograph of the French currency note. It has text in a foreign language.
    The number on top reads, 1098007.


    **Figure 1-2** Paper currency note issued by France’s Banque Royale in 1720 (Source:
    National Numismatic Collection at the Smithsonian Institution; Wikimedia, public
    domain)


    Using paper currency only resumed in France during the Revolutionary Wars toward
    the end of that century. Similar to its predecessor, the new French paper currency
    (the assignat) became legal tender. And similar to its predecessor, the currency
    supplier (the National Assembly) printed increasing amounts of the new currency.
    Despite critics pointing out that this approach risked the same fate as money-printing
    earlier in the century, the supply of assignats grew from millions to billions
    in a few short years. As expected, the new currency lost all of its value less
    than a decade after its creation.


    ![](images/600732_1_En_1_Chapter/600732_1_En_1_Fig3_HTML.jpg)


    A close-up photograph of a French legal tender. It is square in shape and has
    text in a foreign language. An illustration is at the bottom.


    **Figure 1-3** Assignat of 1792, a short-lived legal tender paper currency in
    France (Source: Design: Nicolas-Marie Gatteaux - Lettering: Jean-Baptiste Gérard;
    Wikimedia, public domain)


    Another noteworthy episode of printing frenzy happened under the Weimar Republic
    in Germany at the beginning of the twentieth century. As in all previous examples,
    it started with a war. At the outbreak of World War I, Germany abandoned its gold-bound
    currency, the gold mark, for the paper mark. The republic started to use cheap
    metals like iron, zinc, and aluminum to mint new coins and increased the number
    of paper marks 4-fold over the war period.


    The devastating impact of excessive currency supply did not materialize until
    after the war because people were holding on to savings during wartime, avoiding
    unnecessary spending. In a couple of years after the end of World War I, prices
    increased more than tenfold, wiping out over 90% of people’s savings value.


    When war reparation payments to France became due, the printing press accelerated
    its frenzy. The price of a gold mark increased from 15 marks in 1920 to 100 thousand
    marks in July 1923, 13 million marks in September, and 1 trillion marks in November
    of that year. Typical banknotes in circulation grew from 10 marks in 1920 to 100
    trillion marks in 1924. October 1923 alone saw prices increase by 29,500%, while
    printing presses emitted another 500 quadrillion new paper marks daily.^([⁸](#fn8))
    As in previous examples, the paper currency lost all of its value, and the nation
    collapsed and ultimately returned to a gold-backed currency.


    ![](images/600732_1_En_1_Chapter/600732_1_En_1_Fig4_HTML.png)


    A photograph of a German currency note with the number 100 and text in a foreign
    language. A side portrait of a person''s face is on the right.


    **Figure 1-4** Weimar Republic’s banknote of 100 trillion marks in 1924^([⁹](#fn9))
    (Source: National Numismatic Collection, National Museum of American History;
    Wikimedia, public domain)


    ## Central Banking and Fractional Reserve Banking


    On the other side of the Atlantic Ocean, a major financial development happened
    over the same period. Until the outbreak of World War I, the United States and
    most of the developed world backed their currency with gold. Since the new supply
    (the flow) of gold compared to its stock was minimal, there was no inflation.
    Back-and-forth wealth transfers happened from one country to another as the relative
    price of goods adjusted, but they summed up to zero. Inflation was virtually non-existent,
    enabling people to store their wealth. It changed for the United States in 1914
    when it created a private bank, the Federal Reserve, a.k.a. the Fed, with the
    authority to print US currency. The Fed is independent of the US government, has
    no budget, undergoes no audit, has no supervisor, and is accountable to no one.^([^(10)](#fn10))
    As the Fed describes itself, it lends to the US government by creating new currency.^([^(11)](#fn11))
    The “money” lent is new currency created out of thin air. As should be clear by
    now, no new value arises; printing just dilutes the value of all existing dollars.
    Also, the Fed does not back any new dollar with real value, such as gold.


    This questionable scheme becomes even more contentious when considering the fractional
    reserve banking system that goes with it. When a commercial bank holds deposits
    from the public, only a fraction of that amount has to stay in the vault. Instead
    of holding on to deposits, the bank lends out most of them. In the United States,
    the Fed sets the reserve requirement. This way, it controls how much currency
    flows into the economy. Assume a 10% reserve requirement. When Alice deposits
    $100 at her commercial bank, say ING, the bank can lend out $90 to Bob while it
    keeps $10 in its vault.^([^(12)](#fn12)) Bob buys stuff from Charlie with that
    money, and Charlie deposits the $90 he just earned into his account at his commercial
    bank, say Wells Fargo. This bank, in turn, keeps $9 (10%) on hand and lends the
    remaining $81 out to Dan. Dan buys stuff from Erin, who saves the money at her
    commercial bank. At this point, Alice has $100 in her bank account, Charlie has
    $90 in his, and Erin has $81. All of this is happening with the original $100
    from Alice. The process does not stop there but continues further. A 10% fractional
    reserve ratio enables commercial banks to “create” up to nine times that amount
    of money: the $100 can end up as $1,000 in circulation.


    That is how banks create money—by the stroke of a pen when someone takes out a
    loan. Moreover, interest is due on the total amount lent by the commercial banks.
    If the interest rate on loans is 5%, $45 of interest must be repaid yearly, on
    top of the borrowed $900. And all of this arises from the original $100 deposited
    by Alice. The only way to pay off interest is by getting it abroad or raising
    more debt. At the scale of the entire economy, it is mathematically impossible
    to repay both the debt and the interest on the debt because money must come from
    somewhere. Therefore, the current monetary system relying on fractional reserve
    banking is a sort of legalized pyramid scheme.'
