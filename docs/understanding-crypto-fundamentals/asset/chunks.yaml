- fmt: '# Sustainability


    In early 2022, deforestation of the Amazon rainforest rose to a 14-year high after
    reaching record levels in the previous two years. Deforestation is accelerating,
    causing permanent biodiversity loss and devastatingly impacting the climate.


    Despite climate commitments and political promises, one reason for the lack of
    care for the world’s largest rainforest is the lack of financial incentives for
    long-term forest management projects. As introduced in the previous two chapters,
    the continuous erosion in the value of fiat currencies creates a preference for
    short-term cash flows over long-term cash flows. Indeed, given the high pace of
    inflation and the uncertainty around it, investors prefer moderate returns on
    their investment in the upcoming quarter over large returns that may take decades
    to materialize.^([^(44)](#fn44)) A short-term return is more valuable in the eyes
    of investors because they do not discount it as heavily. With a currency losing
    value over time, the discount applied to any future cash flow increases with the
    time horizon. The financial value of the future is lower, misdirecting capital
    away from it.


    Moving to a currency standard where value does not erode over time, but grows
    over time, would radically change financial incentives. The future would no longer
    be discounted, which would no longer incentivize immediate spending at its expense.
    Instead, projects with long-term cash flows would become more interesting financially,
    redirecting capital toward sustainable endeavors. Such a currency standard has
    never been accessible but is now technologically available for all: `Bitcoin`.


    # Transparency


    The subprime mortgage crisis of 2008 was devastating throughout the world. However,
    countries with greater financial sector transparency suffered less from this disaster
    [18]. One reason is greater transparency increases incentives to “do the right
    thing,” as market participants can better act on information.


    Blockchain-based assets are typically highly transparent. For example, all `Bitcoin`
    transactions on the network are publicly shared and instantly retrievable by anybody.
    The underlying technology can enable greater transparency for companies and public
    officials at a low cost. It would most likely do so at lower costs than in the
    existing system. It is not to claim that full transparency on transactions and
    actions is necessary in all cases (though it is programmable if necessary). However,
    higher levels of transparency can bring more accountability. It is especially
    relevant in relationships with inherent conflicts of interest for people acting
    on behalf of others, known as the *agency problem*. For example, banks that are
    “too big to fail” take more risks than desired by savers, debtors, regulators,
    and the public. Banks benefit from the upside (higher expected profits) but do
    not suffer from downsides as governments would likely bail them out if things
    went wrong. Higher transparency on investments and spending would reduce such
    undesirable incentives. Public blockchains are highly transparent as they publish
    transactions in the public domain in an immutable ledger accessible by all.


    The value of transparency to investors is even measurable in financial markets.
    For instance, municipal bonds are less transparent than federal bonds. Even though
    more municipal bonds exist than any other security, they suffer from less financial
    interest because they lack transparency.


    # Velocity


    In a remote village, a stranger visits the local restaurant. He expects his date
    to arrive but is unsure whether she will show up. He nevertheless asks for the
    nicest table, where he would wait for her. The restaurant owner wants to ensure
    the stranger can pay and asks for a deposit before bringing the stranger guest
    to the table. The guest hands over a `$100` bill under the condition that he can
    reclaim it if his date does not come. While waiting, the restaurant owner uses
    the bill to pay his cook. The cook swiftly runs to the neighboring barber to pay
    off his debt of the same amount. The barber runs to the car dealer to pay for
    the ongoing repairs on his car. The car dealer takes the bill and brings it to
    the restaurant owner to pay for his last dinner on credit. The stranger guest
    then leaves, taking the `$100` bill back. No economic activity occurred, but all
    villagers are now more creditworthy, less indebted than they were just an hour
    before.


    A high velocity of money happens when the same dollar changes hands many times
    rather than being stuck under a mattress as a personal saving. Moreover, as the
    preceding story illustrates, a high velocity of money can increase economic prosperity
    even when no economic activity happens. On the other hand, money locked, saved,
    and unused does not allow transactions to occur, which slows down the economy.
    Unfortunately, our current banking system locks money for extended periods with
    every interbank transaction. For transactions within the same jurisdiction, the
    settlement typically lasts about two days, during which the transacted amount
    cannot serve any other purpose. International transfers can even lock money for
    weeks.


    Decentralized finance through blockchain solves this issue, shortening the settlement
    period from days to minutes. As it unlocks money, more prosperity can ensue, benefiting
    the whole system.


    # Foreign Exchange


    When international transactions happen, currencies often must be exchanged for
    another (e.g., Swiss francs for euros). In 2022, the foreign exchange market accounted
    for `$7.5` trillion daily.^([^(45)](#fn45)) However, a fee applies to each dollar,
    disincentivizing international trade and reducing economic activity. In particular,
    cross-border payments from the United States face an average `5%` fee. In addition,
    foreign exchange trades take time to settle, further slowing down the economy
    and requiring resources to deal with its complexities.


    The enormous amount lost in fees is due to the many middlemen involved and to
    different economies using different currencies, whose exchange rates fluctuate
    permanently. While the previous chapter made the case that several currencies
    are likely a good thing for the economy, this argument applies to currencies used
    in parallel to each other within the same economy (e.g., one for local trades,
    one for community-specific dealings, and one for global transactions). In a crypto-integrated
    world, international trades would not have to go through a prior foreign exchange
    to settle. Instead, such trades could happen on a global cryptoasset network,
    thereby minimizing trading fees and settlement time. A global currency is preferred
    for international transactions, not local currencies. It would eliminate inefficiencies
    implied by multiple banks and middlemen. In addition, this simplification would
    free up resources: hundreds of thousands of people working in foreign exchange
    markets could instead use their skills for more economically productive purposes.'
