    questions and published Bitcoin’s source code updates on SourceForge.net. The
    Bitcoin community was just forming, and having a knowledgeable, though anonymous,
    founder behind the emerging technology provided just enough thrust to get the
    ball rolling.


    At first, the adoption of Bitcoin picked up slowly and in waves. It took two years
    for the coin’s price to break the $1 threshold. The nature of this innovation
    made potential users skeptical about whether it was a revolution, a fad, or even
    a scam. Wikipedia even removed the Bitcoin page from its website in July 2010
    for not being noteworthy enough. Ironically, only four years later, Wikipedia
    started accepting donations in bitcoins.


    ![](images/600732_1_En_5_Chapter/600732_1_En_5_Fig3_HTML.jpg)


    A line graph, titled Bitcoin''s early price history to 1 U S D, of value in U
    S D in July, August, September, October, November, and December 2010, and in January,
    February, March, and April 2011\. The line is stable till October 2010 and then
    rises steeply with intense fluctuations.


    Figure 5-3


    Bitcoin’s early price history (in USD). It took more than two years (from January
    3, 2009 to February 10, 2011) for the price of a bitcoin to break the $1 threshold


    Bitcoin started making the headlines toward the end of 2010 when PC World magazine
    published an article suggesting that Bitcoin be used as payment and donation to
    WikiLeaks. While some saw it as an excellent opportunity to bring the innovation
    out of the shadows, Satoshi Nakamoto strongly opposed it.


    > *“No, don’t “bring it on”… Bitcoin is a small beta community in its infancy.
    You would not stand to get more than pocket change, and the heat you would bring
    would likely destroy us at this stage.”*


    Then, Nakamoto started to disappear. The project was growing, interest was spreading,
    and Nakamoto was no longer needed. The mystery behind his true identity arguably
    even strengthened public interest in Bitcoin. His posts became increasingly scarcer,
    then stopped altogether as developers at the Bitcoin Foundation took over the
    role of advocate for the asset and the underlying blockchain technology. In July
    2011, his penultimate post commented on WikiLeaks’ new acceptance of Bitcoin as
    payment: “WikiLeaks has kicked the hornet’s nest, and the swarm is headed towards
    us.”


    Nevertheless, Bitcoin did not collapse. Quite the opposite, its value increased
    by three orders of magnitude in less than three years as the unwanted attention
    attracted believers in the new technology.


    ![](images/600732_1_En_5_Chapter/600732_1_En_5_Fig4_HTML.jpg)


    A line graph, titled Bitcoin''s early price history to 1000 U S D, of value in
    U S D versus various months in the years from 2011 to 2014\. The line is stable
    till April 2013, rises steeply with intense fluctuations to reach a peak in October
    2013, drops in January 2014, and rises.


    Figure 5-4


    Bitcoin’s price history from April 2011 to January 2014 (in USD). Bitcoin’s price
    increased from $1 to over $1,000 in less than three years


    In parallel, Bitcoin started to be used for illegal activities, which triggered
    further negative headlines. In October 2013, the FBI shut down one of the most
    significant online criminal marketplaces, Silk Road, which accepted payments exclusively
    in Bitcoin. Silk Road was like the Amazon of illicit products: you could buy any
    drugs, from ecstasy to LSD and cannabis seeds, as well as fake passports, and
    have them delivered to your doorstep in a few days.'
