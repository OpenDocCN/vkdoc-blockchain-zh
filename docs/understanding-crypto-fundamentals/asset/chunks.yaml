  trans: "\n## 过滤噪音\n\n加密资产行业的超常增长引发了围绕这类新型资产投资的狂热。结果，行业相关信息多到无人能处理。这些信息来自各种渠道，从学术研究到公众人物，从企业到监管机构。尤其是传统新闻媒体，即便不了解加密资产行业的基本原理，也喜欢对其评头论足。例如，关于比特币挖矿对环境有害的论调就是这样传播开来的。正如第\
    \ 3 章所述，这种论调既不准确又带有偏见；综合来看，相反的观点更可能接近真相。\n\n面对一个快速增长且被误解的行业，从海量噪音中筛选有用信息至关重要。谨慎的投资者应确保选择高质量、信息可靠的来源。\n\
    \n此外，主动寻找与自己观点相悖的信息至关重要。勤勉的投资者应当主动寻求那些不同意其投资论点且学识渊博的人的观点。该行业的突破性潜力吸引了一批狂热的拥护者，他们对推广加密资产的投入近乎宗教般的狂热。同样，该行业也有强烈的反对者，将整个行业斥为骗局。只听信加密资产的传教士（无论是支持者还是反对者）都是危险的，因为这会使个人观点产生片面性。结果，要么高估了加密资产的潜在回报，要么低估了其风险。\n\
    \n最终目标不是为了向任何人证明某个观点的正确性，而是为了达到尽可能高的市场理解水平，从而做出明智的投资决策。过滤噪音意味着忽略短期价格波动以及廉价或有偏见的媒体头条，专注于基于高质量、独立研究信息的长期博弈。\n\
    \n## 税务\n\n税务问题因司法管辖区而异，差异巨大。熟悉当地税务法规（以及可能需要纳税的其他司法管辖区的法规）对于决定是否以及如何进行交易至关重要。加密资产税可能包括所得税、资本利得税和财富税。通常，加密资产被归类为商品、证券（如股票和债券）、数字财产或外币。这种出于税收目的的当地处理方式从根本上影响了如何处理该资产。\n\
    \n此外，税务处理可能因持有期而异。例如，在某些司法管辖区，一年内出售的加密资产可被视为投机行为而需征税，而持有超过一年则被视为投资而无需征税。另外，某些出售行为可能触发税务事件，而其他则不会。例如，将比特币这类加密资产换成\
    \ USDC 这样的稳定币可能不会触发税务事件，但换成法定货币则会。由于其影响，许多其他当地税务特性可能建议采用不同的交易方式。此外，规则也在快速演变。勤勉的投资者应随时关注当地法规，以决定如何最优地管理加密资产组合。\n\
    \n如果未考虑财务税务因素，处理像加密资产这样波动的资产可能会很危险。例如，一个粗心的投资者可能在十二月卖出加密资产，并通过此次出售获得巨额资本利得。将全部收益立即再投资于另一种加密资产，可能会让他陷入风险。假设这另一种加密资产（在这个行业中时有发生）价值大跌，那么投资者可能没有足够的流动资金来支付最初那笔巨额资本利得所应缴的税款。当税款在次年到期时，他可能不得不在非常不利的时机出售资产来支付应缴税款。\n\
    \n对加密资产税收感兴趣的读者可以参考 Schmidt、Bernstein、Richter 和 Zarlenga 合著的详尽著作《加密资产税收》（第二版，2023\
    \ 年），该书涵盖了超过 40 个国家的加密资产税法[3]。\n\n## 借款作为出售的替代方案\n\n需要即时流动性的投资者，在出售加密资产之外还有其他选择。例如，与其在不利时机出售加密资产，不如以其为抵押进行借款。只要贷款利率低于加密资产的升值率，投资者通过借款就能获得更大利益。此外，借款所用货币的通货膨胀率越高，对借款人越有利。原因在于，所欠资金未来在购买实际商品和服务方面的价值将会更低。\n\
    \n## 行为与心理偏差\n\n传统投资已经需要情绪自律和了解自身局限性，而加密资产投资则将这两项要求提升到了新的高度。确实，价格频繁且往往非理性的双向波动，不断地考验着投资者的心理素质。面对这种波动性，情绪抽离至关重要。无论好坏，这并不是人人都能掌握的技能，对于那些忽视其必要性的人来说，可能会产生严重后果。除了情绪自控，了解自身的心理偏差，对于在一个动态行业中管理波动的投资组合尤为重要。\n\
    \n经济学之父对此有如下论述。\n\n> *如果你不了解自己，股市会是一个让你付出高昂代价来认识自己的地方。*\n> \n> ———亚当·斯密\n\n本节涵盖了一些常见的情绪偏差和认知错误，勤勉的投资者在做出投资决策时应予以考虑。这些偏差和错误在一定程度上解释了，为何原本理性的投资者会做出不当的投资决策，从而为交易的对手方创造了机会。\n\
    \n### 确认偏误\n\n如果你相信灰猫比黑猫多，那么每次看到灰猫都会强化你的信念，而不管这信念本身是否准确。这种倾向被称为*确认偏误*，我们大多数人都自然而然地受其影响，尽管常常不自知。毫不意外，这种偏误在投资中也会显现。\n\
    \n例如，为了证明自己对于某个（类）特定资产的理论而寻找依据，可能导致投资者只考虑部分可用信息。相反，与自身投资论点相冲突的信息，即使包含了投资者应考虑的关键数据要素，也会被忽略。\n\
    \n我们与生俱来的确认偏误可以通过从不同渠道寻求多样化信息，并主动寻找与自身投资论点相悖的信息来减轻。这特别意味着要批判性地思考自己为何以及如何可能犯错，而不是努力证明自己必定正确。\n"
- fmt: '### Loss Aversion


    Another bias extensively supported by social science research is loss aversion.
    In particular, research establishes that for most people, the pain they suffer
    from a loss is disproportionally more intense than the satisfaction they get from
    a gain of the same amount. In other words, the pleasure of gaining $100 is smaller
    than the pain of losing $100.


    This simple fact has significant consequences for portfolio management. In particular,
    it supports the value investment thesis that an investment price may be lower
    than its economic value. For instance, investors facing highly volatile investments
    tend to shun them, a tendency referred to as *myopic loss aversion*. Indeed, when
    faced with an investment in two highly volatile securities, one of which will
    likely collapse to zero, most investors prefer not to invest. That is, even if
    the outsized gains on the other investment may still make the total a highly attractive
    opportunity. Loss aversion has been part of human behavior since as far as our
    history goes and is likely here to stay [43].


    ![](images/600732_1_En_12_Chapter/600732_1_En_12_Fig1_HTML.png)


    A 4-quadrant line graph of value to the investor versus losses to gains. An increasing
    trend from quadrants 3 to 1 indicates the degree of losses is higher in comparison
    to the gains.


    Figure 12-1


    Visual representation of the loss aversion effect, where a loss has a much more
    significant impact in the eyes of the investor than a gain of the same value


    This bias is especially relevant for small and less liquid asset classes, such
    as cryptoassets, since they are more volatile than established asset classes.
    To mitigate this bias, it can be helpful to consider the entire portfolio and
    focus on the potential long-term benefits of an investment rather than the short-term
    risks of any specific part of a portfolio.


    ### Endowment Effects


    Another bias is the *endowment effect*, which is similar to the status-quo bias
    in this context. It suggests that we value something we already own more highly
    than something we do not yet own. For example, one would be ready to sell a specific
    mug for $5 but not ready to buy it for more than $2. Rationality would suggest
    that the threshold for both buying and selling would be the same: at a price corresponding
    to the utility derived by the object. However, empirical evidence from social
    science suggests that owning something makes it more valuable to the owner.


    In investing, this bias has important consequences. For example, just because
    you bought a cryptoasset in the past does not mean it is still the optimal investment
    in your portfolio if the situation has changed. Nevertheless, people tend to prefer
    to stay in their current position, even though it may be an inadequate asset allocation.


    ### Conservatism Bias


    Among others, conservatism bias is one possible cause for the endowment effect.
    When an investor forms a view on something, changing that view takes disproportionally
    more effort. For example, when an investor concludes based on initial information
    that an asset will rise in price, updating this conclusion will likely require
    more signals and information than was needed for the original conclusion. This
    bias is directly relevant for cryptoassets, as most traditional investors are
    unwilling to put the entire monetary model (based on fiat currencies) into question,
    as it has been the backbone of the investment profession for the last half-century.


    ### Anchoring Effect


    Anchors (specific prices reached in the past) often become a reference point for
    future developments, even when irrational. For example, when Bitcoin broke the
    $69,000 barrier, any subsequent price was compared to that peak: "Bitcoin went
    down that much percent," "Bitcoin lost that much value", etc. However, few mentioned
    that Bitcoin''s price was below $4,000 just 18 months before. Regardless of the
    fundamental value of an asset, it is easier to anchor a price to a historical
    level, which is why many investors do so.


    The diligent investor should not primarily consider what price an asset reached
    in the past but what fundamental value it is worth. Thereby, one should detach
    from any anchor, which may be and often is caused by irrational reactions from
    the market.


    ### Overfitting Bias


    While data is helpful for financial analysis, it may also be misused, purposefully
    or not. In particular, analysts have an overfitting bias if they find patterns
    and relationships that do not exist. For example, they may force a model or theory
    to fit a particular dataset, even though data would not naturally back that model
    or theory.


    ### Data-mining Bias


    Previous findings from data may also bias any new analysis. For example, data
    analysis can be biased if new research is based on previously reported evidence
    or if many analyses use the same database. If data in an overused dataset indicated
    by chance a specific pattern, this pattern may be excessively relied on because
    many studies highlight it.


    ### Sample Selection Bias


    In contrast, some pieces of data may be systematically excluded, for example,
    due to lack of availability or difficulty in extracting this information. Something
    easily obtainable is not more important than something difficult to obtain.


    To mitigate these data-based biases, diligent investors should strive to gather
    complete sets of raw data from an objective, independent, and original source
    (e.g., gathering data directly from a blockchain rather than using data reported
    by third parties) and reach their own conclusion.


    ### Survivorship Bias


    Another crucial bias related to data and highly relevant in the context of cryptoassets
    is survivorship bias. Looking back at historical data may create a biased view
    if one only considers current survivors. For example, one may regret not investing
    in a cryptoasset whose price was recently multiplied by 10. However, when making
    that investment was possible, there may have been 100 cryptoassets with a similar
    risk profile to invest in. If 99 were worthless and only one became successful,
    it does not mean the original investment was worth it. At the very least, investing
    in this asset was not as attractive as an analysis focusing exclusively on survivors
    may suggest. Therefore, a proper analysis should include the assets that survived
    and those that did not.


    In this sense, survivorship bias is closely related to hindsight bias, suggesting
    that people tend to selectively recollect facts to justify how obvious an outcome
    is after it happened. For example, many investors regret not investing in Bitcoin
    10 years ago. However, Bitcoin''s riskiness was much higher than today, even though
    many risks did not materialize. In addition, most investors would have used a
    centralized platform to invest at the time (because it was even less user-friendly
    to invest directly on the blockchain than today), many of which have been hacked.
    Most of these investments would have ended up lost or stolen.


    Therefore, a proper analysis of past investments should consider what was known
    at the time rather than what is known today. Extensively documenting one''s investment
    thesis and reasons for every trade helps limit the tendency to recollect facts
    selectively and to be subject to survivorship or hindsight biases.'
  raw: '### Loss Aversion


    Another bias extensively supported by social science research is loss aversion.
    In particular, research establishes that for most people, the pain they suffer
    from a loss is disproportionally more intense than the satisfaction they get from
    a gain of the same amount. In other words, the pleasure of gaining $100 is smaller
    than the pain of losing $100.


    This simple fact has significant consequences for portfolio management. In particular,
    it supports the value investment thesis that an investment price may be lower
    than its economic value. For instance, investors facing highly volatile investments
    tend to shun them, a tendency referred to as *myopic loss aversion*. Indeed, when
    faced with an investment in two highly volatile securities, one of which will
    likely collapse to zero, most investors prefer not to invest. That is, even if
    the outsized gains on the other investment may still make the total a highly attractive
    opportunity. Loss aversion has been part of human behavior since as far as our
    history goes and is likely here to stay [43].


    ![](images/600732_1_En_12_Chapter/600732_1_En_12_Fig1_HTML.png)


    A 4-quadrant line graph of value to the investor versus losses to gains. An increasing
    trend from quadrants 3 to 1 indicates the degree of losses is higher in comparison
    to the gains.


    Figure 12-1


    Visual representation of the loss aversion effect, where a loss has a much more
    significant impact in the eyes of the investor than a gain of the same value


    This bias is especially relevant for small and less liquid asset classes, such
    as cryptoassets, since they are more volatile than established asset classes.
    To mitigate this bias, it can be helpful to consider the entire portfolio and
    focus on the potential long-term benefits of an investment rather than the short-term
    risks of any specific part of a portfolio.


    ### Endowment Effects


    Another bias is the *endowment effect*, which is similar to the status-quo bias
    in this context. It suggests that we value something we already own more highly
    than something we do not yet own. For example, one would be ready to sell a specific
    mug for $5 but not ready to buy it for more than $2. Rationality would suggest
    that the threshold for both buying and selling would be the same: at a price corresponding
    to the utility derived by the object. However, empirical evidence from social
    science suggests that owning something makes it more valuable to the owner.


    In investing, this bias has important consequences. For example, just because
    you bought a cryptoasset in the past does not mean it is still the optimal investment
    in your portfolio if the situation has changed. Nevertheless, people tend to prefer
    to stay in their current position, even though it may be an inadequate asset allocation.


    ### Conservatism Bias


    Among others, conservatism bias is one possible cause for the endowment effect.
    When an investor forms a view on something, changing that view takes disproportionally
    more effort. For example, when an investor concludes based on initial information
    that an asset will rise in price, updating this conclusion will likely require
    more signals and information than was needed for the original conclusion. This
    bias is directly relevant for cryptoassets, as most traditional investors are
    unwilling to put the entire monetary model (based on fiat currencies) into question,
    as it has been the backbone of the investment profession for the last half-century.


    ### Anchoring Effect


    Anchors (specific prices reached in the past) often become a reference point for
    future developments, even when irrational. For example, when Bitcoin broke the
    $69,000 barrier, any subsequent price was compared to that peak: “Bitcoin went
    down that much percent,” “Bitcoin lost that much value”, etc. However, few mentioned
    that Bitcoin’s price was below $4,000 just 18 months before. Regardless of the
    fundamental value of an asset, it is easier to anchor a price to a historical
    level, which is why many investors do so.


    The diligent investor should not primarily consider what price an asset reached
    in the past but what fundamental value it is worth. Thereby, one should detach
    from any anchor, which may be and often is caused by irrational reactions from
    the market.


    ### Overfitting Bias


    While data is helpful for financial analysis, it may also be misused, purposefully
    or not. In particular, analysts have an overfitting bias if they find patterns
    and relationships that do not exist. For example, they may force a model or theory
    to fit a particular dataset, even though data would not naturally back that model
    or theory.


    ### Data-mining Bias


    Previous findings from data may also bias any new analysis. For example, data
    analysis can be biased if new research is based on previously reported evidence
    or if many analyses use the same database. If data in an overused dataset indicated
    by chance a specific pattern, this pattern may be excessively relied on because
    many studies highlight it.


    ### Sample Selection Bias


    In contrast, some pieces of data may be systematically excluded, for example,
    due to lack of availability or difficulty in extracting this information. Something
    easily obtainable is not more important than something difficult to obtain.


    To mitigate these data-based biases, diligent investors should strive to gather
    complete sets of raw data from an objective, independent, and original source
    (e.g., gathering data directly from a blockchain rather than using data reported
    by third parties) and reach their own conclusion.


    ### Survivorship Bias


    Another crucial bias related to data and highly relevant in the context of cryptoassets
    is survivorship bias. Looking back at historical data may create a biased view
    if one only considers current survivors. For example, one may regret not investing
    in a cryptoasset whose price was recently multiplied by 10\. However, when making
    that investment was possible, there may have been 100 cryptoassets with a similar
    risk profile to invest in. If 99 were worthless and only one became successful,
    it does not mean the original investment was worth it. At the very least, investing
    in this asset was not as attractive as an analysis focusing exclusively on survivors
    may suggest. Therefore, a proper analysis should include the assets that survived
    and those that did not.


    In this sense, survivorship bias is closely related to hindsight bias, suggesting
    that people tend to selectively recollect facts to justify how obvious an outcome
    is after it happened. For example, many investors regret not investing in Bitcoin
    10 years ago. However, Bitcoin’s riskiness was much higher than today, even though
    many risks did not materialize. In addition, most investors would have used a
    centralized platform to invest at the time (because it was even less user-friendly
    to invest directly on the blockchain than today), many of which have been hacked.
    Most of these investments would have ended up lost or stolen.


    Therefore, a proper analysis of past investments should consider what was known
    at the time rather than what is known today. Extensively documenting one’s investment
    thesis and reasons for every trade helps limit the tendency to recollect facts
    selectively and to be subject to survivorship or hindsight biases.'
  trans: '

    ### 损失规避


    社会科学研究广泛支持的另一偏见是损失规避。具体而言，研究表明，对大多数人来说，损失带来的痛苦程度要远大于同等收益带来的满足感。换句话说，赚取 100 美元的快乐小于损失
    100 美元的痛苦。


    这一简单事实对投资组合管理有着重大影响。它尤其支持了价值投资理论，即投资价格可能低于其经济价值。例如，面对波动性极高的投资，投资者往往会避而远之，这种倾向被称为*短视损失规避*。事实上，当面临两种高波动性证券的投资选择，且其中一种很可能价值归零时，大多数投资者更倾向于不投资。这意味着，即使另一种投资的巨额收益可能使整体组合仍具吸引力，情况依旧如此。损失规避自人类有史以来就一直是行为的一部分，并且很可能将长久存在[43]。


    ![](img/600732_1_En_12_Fig1_HTML.png)


    一张展示投资者价值与损失/收益关系的四象限折线图。从第三象限到第一象限呈上升趋势，表明与收益相比，损失的程度更高。


    图 12-1


    损失规避效应的可视化呈现，其中在投资者眼中，损失的影响远大于同等价值的收益。


    这种偏见对于规模较小且流动性较低的资产类别（如加密资产）尤为重要，因为它们比成熟资产类别的波动性更大。为缓解这种偏见，可以考虑整体投资组合，并关注投资的潜在长期收益，而非投资组合中任何特定部分的短期风险，这或许会有所帮助。


    ### 禀赋效应


    另一种偏见是*禀赋效应*，在此情境下类似于现状偏见。它表明，我们对自己已经拥有的东西，其估值高于尚未拥有的东西。例如，一个人可能愿意以 5 美元卖掉一个特定的杯子，但不愿意花超过
    2 美元去买它。理性会认为买卖的阈值应相同：即由该物品带来的效用所对应的价格。然而，社会科学的经验证据表明，拥有某物会使其对所有者更有价值。


    在投资中，这种偏见具有重要影响。例如，仅仅因为你过去购买过某种加密资产，并不意味着当情况发生变化时，它仍然是你投资组合中的最优选择。然而，人们往往倾向于保持现状，即便这可能导致不恰当的资产配置。


    ### 保守主义偏见


    保守主义偏见是导致禀赋效应的可能原因之一。当投资者对某件事形成观点后，改变这一观点需要付出不成比例的努力。例如，当投资者根据初始信息得出结论，认为某资产价格将上涨时，更新这一结论可能需要的信号和信息比得出原始结论时还要多。这种偏见与加密资产直接相关，因为大多数传统投资者不愿对整个基于法定货币的货币模型提出质疑，而该模型在过去半个世纪一直是投资行业的支柱。


    ### 锚定效应


    锚点（过去达到的特定价格）常常成为未来发展的参照点，即使这并不理性。例如，当比特币突破 69,000 美元大关后，随后的任何价格都会与这个峰值比较：“比特币下跌了那么多百分比”，“比特币损失了那么多价值”等等。然而，很少有人提到，就在
    18 个月前，比特币的价格还低于 4,000 美元。无论资产的基本价值如何，将价格锚定在历史水平上要容易得多，这就是许多投资者如此做的原因。


    勤奋的投资者不应主要考虑一项资产过去达到过什么价格，而应思考其基本价值是多少。因此，应该摆脱任何锚点，这些锚点可能而且常常是由市场的非理性反应造成的。


    ### 过度拟合偏见


    虽然数据有助于金融分析，但也可能被有意或无意地误用。具体来说，如果分析师发现并不存在的模式和关系，他们就存在过度拟合偏见。例如，他们可能强行让一个模型或理论去拟合特定数据集，即使数据本身并不自然支持该模型或理论。


    ### 数据挖掘偏见


    先前从数据中得出的发现也可能使任何新的分析产生偏差。例如，如果新研究基于先前报道的证据，或者许多分析使用相同的数据库，数据分析就可能产生偏差。如果在一个被过度使用的数据集中，数据偶然显示了一种特定模式，那么因为众多研究都强调它，这种模式可能被过分依赖。


    ### 样本选择偏见


    相比之下，某些数据可能被系统性地排除在外，例如由于缺乏可用性或提取该信息的难度。容易获得的东西并不比难以获得的东西更重要。


    为了减轻这些基于数据的偏见，勤奋的投资者应努力从客观、独立、原始的来源收集完整的原始数据集（例如，直接从区块链收集数据，而不是使用第三方报告的数据），并得出自己的结论。


    ### 幸存者偏差


    另一个与数据相关、且在加密资产领域高度相关的关键偏见是幸存者偏差。如果只考虑当前的幸存者，回顾历史数据可能会产生有偏见的看法。例如，一个人可能会后悔没有投资于某个近期价格上涨了
    10 倍的加密资产。然而，当该投资机会存在时，可能有 100 个具有相似风险特征的加密资产可供投资。如果其中 99 个变得一文不值，只有一个成功了，这并不意味着最初的投资是值得的。至少，投资该资产并不像只关注幸存者的分析所暗示的那么有吸引力。因此，恰当的分析应包括那些幸存下来的资产，以及那些没有幸存下来的资产。


    从这个意义上说，幸存者偏差与后见之明偏差密切相关，后者指人们倾向于有选择性地回忆事实，以便在事后证明某个结果的“显而易见”。例如，许多投资者后悔十年前没有投资比特币。然而，当时比特币的风险性远高于今天，尽管许多风险并未成为现实。此外，当时大多数投资者会使用中心化平台进行投资（因为直接在区块链上投资比今天更难操作），而其中许多平台都曾被黑客攻击。这些投资中的大部分最终可能丢失或被盗。


    因此，对过去投资的恰当分析应考虑当时已知的信息，而非今天已知的信息。详尽记录自己的投资论点及每笔交易的原因，有助于限制选择性回忆事实的倾向，以及避免陷入幸存者偏差或后见之明偏差。

    '
- fmt: '### Framing Bias


    People are often biased depending on how information is framed, even when the
    underlying information is the same. For example, investors could make different
    decisions based on the taxonomy they are using or the number of investment alternatives
    they have. For example, if you have $100,000 to invest and you identified ten
    cryptoassets of high interest, you may tend to split your portfolio equally, with
    $10,000 in each asset. However, it may be more recommendable to have over 50%
    in one asset, less than 1% in seven of the ten assets, and the rest split among
    the last two. While it is often more rational not to split investments equally
    among the options available, many investors do so for simplicity reasons. They
    thereby ignore the relative size of the investment opportunities. It is especially
    relevant in the case of Bitcoin, which has roughly the same market capitalization
    as all other cryptoassets combined. Specifically, Bitcoin should not be considered
    as one cryptoasset among many but, as a particular case very different from any
    other cryptoasset.


    ### Herd Behavior Bias


    Herd behavior refers to the tendency to follow the opinions or actions of other
    investors, even when they may not align with their own opinion. People are subject
    to herd behavior (also called the *momentum effect*) by fear of missing out and
    due to media sharing extensively about the benefits of an asset when it goes up
    and its collapse when it goes down. Consequently, herd behavior reinforces cycles
    and may lead to market bubbles, as many investors follow a trend much beyond what
    underlying fundamentals suggest.


    To mitigate the likelihood of being subject to herd behavior bias, investors should
    conduct their own analyses and stick to their investment strategy despite short-term
    market fluctuations.


    ### Prediction Overconfidence Bias


    Another bias is prediction overconfidence. In particular, investors tend to overestimate
    the accuracy of future price predictions. Financial models amplify this bias because
    they typically provide an exact output for the future price of a security (e.g.,
    $123,456.78). In contrast, a wide range of possible prices is more reasonable
    to assume given the uncertainty of the future. It is also related to the illusion
    of knowledge, suggesting that analysts typically overestimate themselves and the
    quality of their analyses.


    ### Size and ESG Biases


    Another type of investment bias is due to the mandates of large investment firms.
    For example, take an investment firm willing to split equally $1 billion of capital
    into no more than 20 investment projects. As part of its mandate, the firm may
    also want to own at most 10% of the project in order not to obtain a controlling
    interest in it. Each selected project will benefit from an investment of $50 million
    but must have a market capitalization of at least $500 million to be considered.
    As of this writing, less than 100 cryptoassets can claim this minimum market capitalization.
    With a sufficient number of firms restrained by similar limits, high-value cryptoassets
    benefit from more investments, while smaller-value ones suffer from underinvestment.
    All other things being equal, smaller-value projects are frequently undervalued
    simply because large investment firms shy away from investing in them.


    An additional bias based on the mandate of investment firms is related to corporate
    responsibility or environmental, social, and governance (ESG) practices of investment
    targets. In particular, the growing pressure to find investments that respond
    to specific corporate responsibility criteria may leave otherwise financially
    attractive investments underfunded. For example, large investors may be restricted
    in their mandate to only invest in cryptoassets that are not based on proof-of-work
    mechanisms, as some may argue that they are a net negative for the environment.
    It is not the lack of fundamentals but arbitrary restrictions in large investors’
    mandates that would create a downward bias to the market price of these targets.


    ## Key Concepts


    Selecting the optimal investment depends on many criteria. Among others, it depends
    on the risk appetite of the investor as well as his time horizon, needs for liquidity,
    tax status, and legal considerations. No unique investment or strategy is optimal
    for all investors. Nevertheless, some approaches may be recommendable for most
    investors. For example, investing smaller amounts in waves rather than a large
    amount at once enables to spread the risk of investing at an unfortunate time.
    Also, all investors are subject to mental biases that can interfere with rational
    investment strategies. Being aware of these possible flaws can help mitigate them.


    ## Extension Questions


    How do you research the cryptoasset industry to maximize the likelihood of making
    unbiased investment decisions?


    Which taxation rules would prevent a cryptoasset from being used as a medium of
    exchange?


    Which additional psychological bias are you subject to that could impair your
    ability to invest effectively?


    # Non-Financial Risk Management


    > *Successful investing is about managing risk, not avoiding it.*

    >

    > —Benjamin Graham


    To make effective decisions, responsible investors should thoroughly understand
    financial and non-financial risks related to their investments. These two risk
    categories are different and likely higher for cryptoasset investments than traditional
    investments, making risk management even more critical. This chapter covers non-financial
    risks, and Chapter `14` covers financial risks. Besides describing the risks,
    these chapters also provide tools to mitigate them.


    Non-financial risks are high in cryptoassets because the industry is still maturing
    and rapidly changing. Also, the short span of historical data points does not
    enable assessing all risks the industry faces. Even these data points are in many
    respects of limited value, as the industry in the last cycle was materially different
    from its state in the current cycle, making older data of little relevance.


    Let us start with risks that are often mentioned but do not represent any material
    threat.'
