  trans: '

    ## 替代共识机制


    工作量证明（PoW）和权益证明（PoS）是最成熟的共识机制，但并非唯一。目前存在数百种替代方案，它们通过不同的权衡组合，在某些场景下适用，而在另一些场景下则不适用[26]。


    例如，一个关键的权衡是“可扩展性三难困境”。具体而言，共识机制只能完美具备以下三个特性中的两个，而第三个特性则难以兼顾。


    1.  安全性

    2.  去中心化

    3.  可扩展性


    举例来说，一种共识机制可以创建出安全且可扩展的区块链，但可能是部分中心化的。同样，它也可以是可扩展且去中心化的，但网络安全级别较低。最后，它还可以是安全且去中心化的，但面临可扩展性挑战。


    ![](img/600732_1_En_6_Fig15_HTML.png)


    一个关于安全性、去中心化和可扩展性模块的双向流程图。


    **图 6-15** 可扩展性三难困境。一个共识机制只能完美满足这三个属性中的两个


    安全性的缺失会使网络更容易受到恶意攻击。去中心化的缺失会降低网络对单个节点故障的容忍度。最后，可扩展性的缺失会限制网络处理高吞吐量的能力。例如，比特币区块链以其高度的去中心化和卓越的安全性而闻名，但其内在的可扩展性能力有限。在
    2010 年代后半期，当比特币的未来面临抉择时，这个问题引发了激烈的争论。然而，现在已有解决比特币这一问题的方案。例如，闪电网络允许小额交易在链下结算，只需偶尔在比特币区块链上发布。


    为了有效评估与加密资产相关的风险，理解其共识机制至关重要。本节介绍一些常见的共识机制，以展示为维护区块链完整性而可制定的各类规则和协议。请注意，图 6-16
    远非详尽列表。


    ![](img/600732_1_En_6_Fig16_HTML.png)


    一个共识机制的圆形图，包括工作量证明、权益证明、权威证明、权益权威证明、权益时间证明、重要性证明、活动证明、容量证明、燃烧证明和历史证明，延时工作量证明、委托权益证明、实用拜占庭容错及其委托版本，以及瑞波协议。


    **图 6-16** 部分常见共识机制概览（此外还有数十种）


    总体而言，共识机制分为两大类别：基于证明的协议和基于投票的协议[27]。基于证明的共识机制包括工作量证明（PoW）、延时工作量证明（dPoW）、重要性证明（PoI）、容量证明（PoC）和燃烧证明（PoB）。相比之下，基于投票的共识机制则包括权益证明（PoS）、委托权益证明（DPoS）、权威证明（PoA）、权益时间证明（PoST）、实用拜占庭容错（PBFT）、委托拜占庭容错（DBFT）以及瑞波协议（RP）。


    此外，共识协议使用不同的方法来选择区块验证者。总体而言，可以归纳出四种通用方法。


    1.  基于工作量（“工作”）

    2.  基于财富或资源

    3.  基于声誉或过往行为

    4.  基于委托


    很难说哪一种方法绝对优于另一种。然而，某些方法可能更适合特定的用例。评估一个共识机制是否合适，可以基于其在以下四个基本属性上的表现。


    1.  吞吐量

    2.  安全性

    3.  可扩展性

    4.  最终性


    以下描述了一些现有共识机制的高级功能。


    -   **延时工作量证明（dPoW）** 使用两条并行链，通过辅助链提供的安全性，使其能够安全地在主链上追加区块。通常，它使用比特币区块链（最安全的区块链）作为辅助链来保护主区块链。安全性来源于主区块链定期将其状态的哈希值发布到并行区块链上。通过这种方式，它利用了并行区块链的高算力。与
    `PoW` 的一个关键区别在于，在主链上追加新区块的节点是选举产生的。`dPoW` 的一个好处是减少了传统 `PoW` 挖矿的能源消耗。


    -   **委托权益证明（DPoS）** 是基于投票的，类似于 `PoS`。它由所有网络成员（加密资产持有者）选举代表来代表他们行事。这些代表称为见证人或区块生产者（BP），他们负责验证交易和区块，并因此获得服务奖励。作为避免欺诈或合谋的激励措施，BP
    可能会被投票罢免，在这种情况下，他们的权益将被冻结。`DPoS` 的支持者声称这是一种更民主的机制，因为区块验证者是依据其作为公平质押者的声誉而非纯粹财富来投票选出的。这种共识机制还具有比
    `PoS` 更高的吞吐量优势，但往往更加中心化。包括 Cardano、TRON 和 EOS 在内的区块链都使用 `DPoS`。


    -   **权威证明（PoA）** 也是 `PoS` 的一种变体，其中特定的可信节点充当区块验证者。可信节点（权威）会随着时间的推移积累声誉，这与其质押的权益无关。他们甚至根本不需要质押任何东西。这种共识机制是高度中心化的，因为少数参与者完全控制着网络，但它具有高吞吐量和低费用的优势。它适用于不需要去中心化的区块链，例如私有区块链。


    ![](img/600732_1_En_6_Fig17_HTML.png)


    一个关于权益证明、委托权益证明和权威证明的框图。顶部从左到右的箭头标注为“效率从最低到最高”，底部的箭头从右到左，标注为“去中心化”。效率包括高吞吐量、低等待时间和低费用。


    **图 6-17** PoS 及其部分变体之间的权衡。在三种机制中，PoA 效率最高，而 PoS 去中心化程度最高


    -   **权益权威证明（PoSA）** 是 `PoS` 和 `PoA` 的混合体，因被币安智能链（BSC）——最成熟的区块链之一——用作共识机制而闻名。与
    `PoW` 或 `PoS` 等共识机制的一个关键区别在于验证者数量较少。以 `BSC` 为例，验证者数量限制为 21 个。另一个关键区别是，`PoSA` 中验证者的激励完全来自交易费用，而非新铸造代币的奖励。这些特性使得
    `PoSA` 相比 `PoW` 或 `PoS` 能够拥有更低的成本和更短的出块时间。


    -   **权益时间证明（PoST）** 也是在 `PoS` 的基础上增加了时间因素。持有权益的时间越长，其价值就越高。还可以进行调整，例如使权益时间取决于用户的活跃程度（例如，在
    Vericoin 中实现的一个功能）：不活跃用户的权益会随时间减少。


    -   **重要性证明（PoI）** 是另一种源自 `PoS` 的基于投票的共识机制。其主要区别在于，要获得作为验证节点的权限，必须至少拥有最低数量的加密资产。低于该阈值的任何节点的重要性都为零。超过阈值后，与
    `PoS` 一样，质押的金额越高，被选为验证节点的可能性就越大。

