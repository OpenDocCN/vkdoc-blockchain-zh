  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项，将给定的英文文本翻译成中文。



    ### 历史 VaR


    与其使用理论值，我们可以减少计算中的假设数量，转而使用历史值。这正是历史 VaR 所做的。


    具体来说，例如，我们可以收集比特币最近 200 周的周回报率，并发现 90% 的情况下（180 个观测值），该资产的回报率高于 –10.1%。^(¹⁰³)
    根据收集到的数据样本，周度历史 VaR 将表明，在 90% 的概率水平下，预期损失为该值。


    对于加密资产而言，年度（而非周度）历史 VaR 的可靠性较低，因为可用的观测值数量要少得多，并且考虑到资产的发展速度（10 年前的比特币与 5 年前的风险收益特征有实质性差异，而
    5 年前的又与今天大不相同）。尽管如此，类似的分析也是可行的。例如，比特币的年度历史 VaR 在第 50^(个) 百分位得出的值为 +60%。换句话说，最近十个比特币观测值中有一半表明其年度收益至少为
    60%。


    一种解决数据过时问题的方法是为每个历史数据点赋予权重，其中较早的观测值权重较低，较近的观测值权重较高。Richardson 等人在 1997 年提出了这种方法，以便在更重视当前宏观经济状况和波动性的同时，不完全忽略较旧的数据。^(¹⁰⁴)
    考虑到加密资产行业的高速发展，建议采用类似的方法。应用此方法的一种可能方式是让权重随着时间的新近程度呈指数级衰减。


    ### 蒙特卡洛 VaR


    蒙特卡洛方法^(¹⁰⁵)是一种统计方法，用于模拟某个过程中，在考虑众多变量时特定结果出现的概率。计算机对输入变量（例如，通货膨胀、利率、GDP 增长、加密资产采用率增长以及其他市场状况）运行数千次模拟。由于这些变量相互影响，分析其综合效应比独立分析它们要复杂得多。大量的模拟会以特定的可能性（例如，第
    10^(个) 百分位）输出一个特定的投资组合价值。


    蒙特卡洛模拟是风险管理的有价值工具，因为它允许投资者理解变量以复杂方式相互作用的多种情景的潜在影响。


    ### VaR 指标的特性


    一方面，VaR 指标是有用的，因为它们可以比较同类资产，无论所考虑的资产类别是什么。另一方面，它们也有局限性，因为它们不考虑极端情况。例如，第 5^(个)
    百分位的 –10% VaR 并不能揭示最差的 5% 的情况是产生 –10% 到 –15% 之间的回报，还是产生接近 –100% 的回报。换句话说，这些指标不考虑极端变动（或称
    *黑天鹅事件*），而这些在加密资产行业并不罕见。


    历史 VaR 的另一个局限性在于，它本质上是一个回顾性指标，不考虑最近的发展或可能的未来发展。相比之下，分析性 VaR 则高度依赖于假设。由于这些原因，这些指标中的任何一个都无法单独建立一项投资的完整财务风险状况。相反，应综合考虑这些指标，以便让投资者更好地了解他们所面临的风险类型和水平。


    监管机构广泛使用 VaR 指标来定义银行允许承担的风险水平以及它们需要持有的、用以覆盖该风险的资本水平。^(¹⁰⁶) 虽然这尚未在加密资产行业广泛存在，但可以合理地假设
    VaR 指标将在未来的加密资产监管中发挥作用。尤其是，加密资产基金和中心化交易所未来可能需要接受 VaR 计量和报告。我们也可以推测，持有加密资产的去中心化平台未来是否可能面临类似的监管要求。


    ## 罗伊安全第一准则


    最常被引用的下行风险度量之一是罗伊安全第一准则，由 André Roy 于 1952 年提出，作为在风险约束条件下优化投资组合选择的度量标准。从根本上说，这是一个优化问题，旨在在损失特定金额的概率不超过特定值的约束下，最大化投资组合的预期收益。


    例如，它会在预期损失在 95% 的概率下不大于 –5% 的约束下，最大化投资组合的预期收益。或者，它可以在 90% 的概率下追求至少 +1% 的回报。罗伊安全第一比率的计算公式如下。


    ![$$ 安全第一比率=\frac{预期收益-最低收益}{收益的标准差} $$](img/600732_1_En_14_Chapter_TeX_Equb.png)


    在这个公式中，“最低收益”是投资者所能接受的最低回报。它与第 4 章介绍的夏普比率非常相似。唯一的区别在于，这里用投资者可接受的最低收益水平替代了夏普比率中的无风险收益率。担心加密资产波动性的投资者可以考虑使用类似的方法来确定其总资产中应分配给加密资产的比例。由于将加密资产加入传统投资组合很可能会提高预期收益，并且（在考虑了所有分散化投资的收益之后）会增加整个投资组合收益的标准差，因此，根据投资者的任意约束条件优化该公式，可以提供一种“最优的”加密资产配置比例（例如，10%）。


    ## 亏损风险


    罗伊安全第一准则与最小化亏损风险（即投资组合在特定时期内未能达到目标回报的风险）的目标有相似之处。这对于具有长期投资视野的投资组合，或者维持特定生活方式所必需的投资组合（如退休投资组合）尤其相关。然而，考虑到加密资产投资“高风险，高回报”的特点，最小化亏损风险建议的加密资产配置比例低于罗伊安全第一准则，因为最小化亏损风险忽略了获得可能远高于目标的回报的好处。


    ## 预期亏损


    下一个亏损风险度量是评估当错误情景发生时情况会变得多糟糕。它被称为*预期亏损*（或*条件风险价值*、*条件尾部期望*或*预期尾部损失*），它解决了传统 VaR
    指标的一个局限性。VaR 指标不考虑超出某个概率水平后的情况有多糟，而预期亏损正是衡量这一情景。它是指，如果投资组合的最终结果落在概率分布的特定百分位之外（例如，最差的
    10% 情景），该投资组合在特定时间范围内的预期损失。^(¹⁰⁷)

    '
- fmt: "# Backtesting\n\nRegardless of the specific metric used, investors should\
    \ backtest their approach. Backtesting is a reality check to assess the quality\
    \ of a risk metric. For example, investors could compute what the VaR would have\
    \ been had it been measured a year ago. Then, they should compare it to how reality\
    \ played out to assess the robustness of this risk metric.\n\nFor instance, they\
    \ could analyze how often a cryptoasset’s weekly returns in the past year were\
    \ lower than the 90% weekly VaR that would have been measured a year ago. The\
    \ VaR metric seems to hold well if returns were only about 10% of the time beyond\
    \ this range. However, if many more observations fall beyond the threshold, the\
    \ backtest indicates that the risk metric may not have been conservative enough.\n\
    \nFor example, the 90% weekly Bitcoin VaR measured with 200 weeks of data ending\
    \ on 31 December 2021 is –11.0%. In 2022, only six weeks yielded a return below\
    \ this threshold. Therefore, six weeks out of 52 in the year (11.5% of the weeks)\
    \ were beyond the 10^(th) percentile as computed with this VaR approach. Since\
    \ 11.5% is reasonably close to 10%, this VaR approach and this sample seem to\
    \ be appropriate. A similar approach for Ethereum also yields six observations\
    \ in 2022 and, therefore, a similar conclusion. However, unprecedented events\
    \ are ignored in this analysis. This is where stress testing is a useful complement\
    \ for managing possible future risks.\n\n## Stress Testing\n\nA meaningful approach\
    \ to challenge traditional risk metrics consists of running imaginary scenarios,\
    \ a method called stress testing. Typically, the scenarios considered are bleak\
    \ but plausible to assess how poorly an investment would perform under adverse\
    \ circumstances. If, even under pessimistic conditions, a scenario plays out acceptably,\
    \ the stress test is passed. Alternatively, one can find out how bad conditions\
    \ must be for a scenario to become detrimental (an approach called factor-push\
    \ analysis). Stress testing complements previously covered risk management approaches\
    \ by including scenarios that have not happened before or that are not easily\
    \ implementable in the assumptions of statistical approaches.\n\nIn particular,\
    \ scenarios including the non-financial risks covered in the previous chapter\
    \ could be valid examples to be included in a stress test. Alternatively, one\
    \ could consider scenarios with extreme lack of liquidity or major bankruptcies\
    \ with contagion across the industry. Of course, stress tests depend on the assumptions\
    \ used for each scenario and are unlikely to play out precisely as predicted.\
    \ Nevertheless, they are helpful because they challenge statistical risk metrics\
    \ and force the analyst to consider the consequences of wildly different scenarios\
    \ on a portfolio’s value.\n\n## Key Concepts\n\nSimilar to non-financial risks,\
    \ financial risks are also bigger for cryptoassets than traditional investments.\
    \ In particular, investors should consider possible defaults of third parties\
    \ in the cryptoasset ecosystem and, where possible, avoid them through decentralization.\
    \ Besides, liquidity can also be an issue as cryptoassets have a lower volume\
    \ exchanged daily than traditional asset classes; large trades can therefore have\
    \ a material impact on prices. Nevertheless, market risk is given the most attention\
    \ in the cryptoasset universe because of the rapid price swings it is known for.\n\
    \nThe value at risk concept is especially useful as it provides a single standard\
    \ metric for the expected loss at a given level of likelihood. There are multiple\
    \ ways to compute it: either by relying on assumptions (analytical method) or\
    \ past data (historical method). Each has advantages and limitations; investors\
    \ should therefore rely on a range of metrics rather than any single one.\n\n\
    Regardless, risk metrics should be backtested and complemented with stress tests\
    \ to challenge their impact and likelihood in this rapidly evolving environment.\n\
    \n## Extension Questions\n\nWhich past data are relevant to infer the current\
    \ risk on the market?\n\nHow far back can you go to rely on data?\n\nWhich stress\
    \ tests would be especially meaningful for cryptoasset investments?\n\nFootnotes\
    \ [1](#600732_1_En_14_Chapter.xhtml#Fn1_source) [2](#600732_1_En_14_Chapter.xhtml#Fn2_source)\
    \ [3](#600732_1_En_14_Chapter.xhtml#Fn3_source) [4](#600732_1_En_14_Chapter.xhtml#Fn4_source)\
    \ [5](#600732_1_En_14_Chapter.xhtml#Fn5_source) [6](#600732_1_En_14_Chapter.xhtml#Fn6_source)\
    \ [7](#600732_1_En_14_Chapter.xhtml#Fn7_source) [8](#600732_1_En_14_Chapter.xhtml#Fn8_source)\
    \ [9](#600732_1_En_14_Chapter.xhtml#Fn9_source)\n\n# Part VI: Which Valuation\
    \ Methods Exist?\n\n## 15. Assessment Framework\n\n> *Success in investing comes\
    \ not from being right but from being wrong less often than everyone else.*\n\
    > \n> —Aswath Damodaran\n\nBefore measuring the value of a cryptoasset, the diligent\
    \ investor should ask critical questions to identify whether the asset has value\
    \ in the first place. While the next chapter dives into valuation methods, this\
    \ chapter covers preliminary questions to filter out candidates for these valuations.\n\
    \n### What Problem Is the Asset Solving?\n\nA cryptoasset must address a real,\
    \ unmet need in the market.\n\nFor example, Bitcoin was the first digitally scarce\
    \ asset that could be exchanged without intermediaries. It addresses the need\
    \ for a decentralized and secure transfer of value online. Similarly, Ethereum\
    \ was the first decentralized platform that allows developers to build and deploy\
    \ smart contracts and dApps. It addresses the need for a secure and transparent\
    \ way to automate business processes and interactions without a central authority.\
    \ Likewise, 0x is a decentralized exchange protocol that allows users to trade\
    \ tokens and other assets securely and transparently. It addresses the need for\
    \ a decentralized alternative to traditional exchanges, often subject to security\
    \ breaches. Furthermore, several other cryptoassets uniquely deliver a valuable\
    \ service that addresses a genuine and unmet need.\n\nIn contrast, some projects\
    \ are copies of existing ones without significant innovation or improvement. For\
    \ example, Litecoin and Bitcoin Cash are hard forks of Bitcoin without many innovative\
    \ features but different block times, block sizes, and maximum supply.\n\nBesides,\
    \ other cryptoassets are created for the sole purpose of generating hype (or even\
    \ as Ponzi schemes) without any real service behind them. Such projects should\
    \ be filtered out from any fundamental valuation method. Their market price may\
    \ increase in the short run, but such development would be driven by speculation\
    \ rather than actual economic value. Dogecoin is, for example, a cryptoasset based\
    \ chiefly on its potential for creating hype. While it was initially created as\
    \ a joke and did not offer any unique features, it gained much popularity on social\
    \ media. It even grew to a market capitalization of over $88 billion in May 2021.\n\
    \n### How Important Is the Problem?\n\nIt is essential to consider the potential\
    \ value of solving the problem. A cryptoasset addressing a critical and pressing\
    \ problem in a large and growing market has a higher potential than a cryptoasset\
    \ addressing a minor or niche problem in a shrinking market. Metrics that analysts\
    \ could investigate to assess the problem’s importance include the number of people\
    \ suffering from the problem, how much they would be willing to pay to solve this\
    \ problem, and for how many years this problem will likely remain relevant.\n\n\
    For example, major and lasting problems affecting many users include high transaction\
    \ fees and slow transaction times in the international payment industry, data\
    \ security against breaches and leaks, and censorship of freedom of speech. Some\
    \ cryptoassets can help mitigate or even solve such problems."
  raw: "## Backtesting\n\nRegardless of the specific metric used, investors should\
    \ backtest their approach. Backtesting is a reality check to assess the quality\
    \ of a risk metric. For example, investors could compute what the VaR would have\
    \ been had it been measured a year ago. Then, they should compare it to how reality\
    \ played out to assess the robustness of this risk metric.\n\nFor instance, they\
    \ could analyze how often a cryptoasset’s weekly returns in the past year were\
    \ lower than the 90% weekly VaR that would have been measured a year ago. The\
    \ VaR metric seems to hold well if returns were only about 10% of the time beyond\
    \ this range. However, if many more observations fall beyond the threshold, the\
    \ backtest indicates that the risk metric may not have been conservative enough.\n\
    \nFor example, the 90% weekly Bitcoin VaR measured with 200 weeks of data ending\
    \ on 31 December 2021 is –11.0%. In 2022, only six weeks yielded a return below\
    \ this threshold. Therefore, six weeks out of 52 in the year (11.5% of the weeks)\
    \ were beyond the 10^(th) percentile as computed with this VaR approach. Since\
    \ 11.5% is reasonably close to 10%, this VaR approach and this sample seem to\
    \ be appropriate. A similar approach for Ethereum also yields six observations\
    \ in 2022 and, therefore, a similar conclusion. However, unprecedented events\
    \ are ignored in this analysis. This is where stress testing is a useful complement\
    \ for managing possible future risks.\n\n## Stress Testing\n\nA meaningful approach\
    \ to challenge traditional risk metrics consists of running imaginary scenarios,\
    \ a method called *stress testing*. Typically, the scenarios considered are bleak\
    \ but plausible to assess how poorly an investment would perform under adverse\
    \ circumstances. If, even under pessimistic conditions, a scenario plays out acceptably,\
    \ the stress test is passed. Alternatively, one can find out how bad conditions\
    \ must be for a scenario to become detrimental (an approach called *factor-push\
    \ analysis*). Stress testing complements previously covered risk management approaches\
    \ by including scenarios that have not happened before or that are not easily\
    \ implementable in the assumptions of statistical approaches.\n\nIn particular,\
    \ scenarios including the non-financial risks covered in the previous chapter\
    \ could be valid examples to be included in a stress test. Alternatively, one\
    \ could consider scenarios with extreme lack of liquidity or major bankruptcies\
    \ with contagion across the industry. Of course, stress tests depend on the assumptions\
    \ used for each scenario and are unlikely to play out precisely as predicted.\
    \ Nevertheless, they are helpful because they challenge statistical risk metrics\
    \ and force the analyst to consider the consequences of wildly different scenarios\
    \ on a portfolio’s value.\n\n## Key Concepts\n\nSimilar to non-financial risks,\
    \ financial risks are also bigger for cryptoassets than traditional investments.\
    \ In particular, investors should consider possible defaults of third parties\
    \ in the cryptoasset ecosystem and, where possible, avoid them through decentralization.\
    \ Besides, liquidity can also be an issue as cryptoassets have a lower volume\
    \ exchanged daily than traditional asset classes; large trades can therefore have\
    \ a material impact on prices. Nevertheless, market risk is given the most attention\
    \ in the cryptoasset universe because of the rapid price swings it is known for.\n\
    \nThe value at risk concept is especially useful as it provides a single standard\
    \ metric for the expected loss at a given level of likelihood. There are multiple\
    \ ways to compute it: either by relying on assumptions (analytical method) or\
    \ past data (historical method). Each has advantages and limitations; investors\
    \ should therefore rely on a range of metrics rather than any single one.\n\n\
    Regardless, risk metrics should be backtested and complemented with stress tests\
    \ to challenge their impact and likelihood in this rapidly evolving environment.\n\
    \n## Extension Questions\n\nWhich past data are relevant to infer the current\
    \ risk on the market?\n\nHow far back can you go to rely on data?\n\nWhich stress\
    \ tests would be especially meaningful for cryptoasset investments?\n\nFootnotes\
