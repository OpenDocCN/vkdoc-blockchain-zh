    \ from transaction routing. A widespread example is Helium mining. In this context,\
    \ Helium is not a noble gas from the periodic table of elements but a cryptoasset\
    \ powering the People’s Network, a decentralized wireless network. Helium nodes\
    \ enable smart devices to send data online through a low-power, long-range wireless\
    \ protocol. As a result, Helium miners can receive sizable rewards based on their\
    \ coverage. IoT devices connecting to the network include, for example, dogs’\
    \ smart collars or Lime electric scooters available in many cities. High returns\
    \ to miners are possible because the model is not scalable for any individual\
    \ miner. Indeed, two Helium mining devices close to each other provide the same\
    \ coverage as a single device. Therefore, miners are incentivized to own only\
    \ one device (per location).\n\n![](images/600732_1_En_8_Chapter/600732_1_En_8_Fig7_HTML.jpg)\n\
    \nA photograph of Linxdot Helium miner.\n\nFigure 8-7\n\nHelium miner from Linxdot\n\
    \nAnother example of routing transactions is through the Lightning Network. The\
    \ Lightning Network increases the usability of Bitcoin by building infrastructure\
    \ on top of the Bitcoin blockchain so that transactions can happen instantly and\
    \ with negligible transaction fees. This feature is critical to address the comparatively\
    \ slow settlement time of Bitcoin transactions, moving it from minutes to milliseconds.\
    \ By design, the Lightning Network relies on decentralized nodes to route transactions.\
    \ Anybody can operate such a node and benefit from a share of the small transaction\
    \ fees. Running a dedicated node full-time consumes less than 10 watts per hour,\
    \ corresponding to an electricity cost of roughly $1 per month in a city like\
    \ New York in 2023\\. The benefits of running such a node depend on several criteria,\
    \ including the quantity and size of transactions routed and Bitcoin’s price.\
