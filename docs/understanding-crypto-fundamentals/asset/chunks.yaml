- fmt: '### Fulcrum Index


    Another fundamental value method to value Bitcoin is to consider it as portfolio
    insurance. In particular, and as was presented by Greg Foss in an April 2021 article,
    Bitcoin insures against fiat governments defaulting on their debt.^([^(121)](#fn121))
    The value of this insurance can be measured by existing financial tools, which
    de facto provide a valuation for Bitcoin.


    A government defaulting on its debt means it cannot reimburse its contracted loans.
    Such an event forces it to print more of its currency to devalue its debt until
    it becomes repayable. As the currency’s value collapses, all prices expressed
    in that currency rise. Users of the currency would be left with savings of much-reduced
    value and would likely flee to a financial safe haven, one that cannot be manipulated
    at will by central authorities. Even if governments can print their way out of
    technical default, it would involve a crisis of confidence in their currency—a
    de facto default.


    It is reasonable to assume that, if a government cannot repay its fiat-denominated
    debt, the demand for Bitcoin would rise. Given the fixed Bitcoin supply, the increase
    in demand would bring prices up with it. The challenge here is to measure the
    likelihood of such an event and assign a price to it. Fortunately, the finance
    industry already developed a tool enabling such measurement: credit default swaps.


    A credit default swap is a contract that essentially represents insurance against
    an event of default. The buyer of the swap pays a fixed amount monthly and is
    entitled to a large payout in a default event. The market defines the price of
    the swap (the monthly payment) based on the assessed likelihood of the event.


    In his article, Greg Foss explains how he constructs the Fulcrum Index. This index
    measures the cumulated value of credit default swaps on a basket of G20 nations.
    These nations likely have the most robust fiat currencies of all. Indeed, before
    a G20 nation currency fails, many other (weaker) fiat currencies will likely have
    failed already. The index is constructed based on the likelihood of credit default
    (implied by the market) and the sum of the financial obligations in the corresponding
    currency (e.g., federal government outstanding debt, Medicare liabilities).


    A detailed explanation of the Fulcrum Index is beyond the scope of this book,
    but the output from Greg Foss’ analysis is worth sharing [52]. The valuation of
    the Fulcrum Index suggests a value of $108,000 to $160,000 per bitcoin (in 2021
    dollars).


    One useful intuition from this approach is that Bitcoin’s price will likely rise
    with the probability of default of major nations. As the debt-to-GDP ratios of
    these nations continue to increase to new all-time highs, this intuition suggests
    that Bitcoin’s future price direction is aligned with what previous models suggest.


    ### Valuing Bitcoin As a Cybersecurity Protocol


    A breakthrough in Bitcoin literature was the 2023 MIT thesis “Softwar” by US Air
    Force Major Jason Lowery [46]. While much of the attention around Bitcoin previously
    focused on its financial and monetary role, Major Lowery took a fundamentally
    different approach. He analyzed Bitcoin from a military and national strategic
    defense perspective. His thesis eloquently differentiates abstract, imaginary
    power from real, physical power and extends the reasoning to the digital world,
    to software. Contrary to competitors not based on a PoW consensus mechanism, Bitcoin’s
    security relies on real, tangible energy. It can only come into existence through
    the expenditure of electricity. This physical-world constraint prevents it from
    being systematically exploited through abstract power, whether from a currency
    emitter or ruling authority. In other words, its proof-of-work consensus protocol
    is a new cybersecurity system. In contrast, cryptoassets based on proof-of-stake
    and fiat currencies rely exclusively on an abstract belief system: imaginary value
    backed only by trust in the emitting authority.


    The most secure blockchain in existence, therefore, extends much beyond its value
    as a monetary protocol. It can also secure any valuable information, from personal
    data to national, strategic, and confidential information. In this respect, Bitcoin
    is completely different from any other cryptoasset and deserves a different categorization—and
    valuation method. As Major Lowery concludes, the importance of Bitcoin for individuals,
    corporations, and nations urges to stockpile Bitcoin reserves as a national strategic
    priority. While this perspective does not provide any specific valuation for Bitcoin,
    one can infer from this reasoning that Bitcoin’s fundamental value should be many
    times larger than its current level. In other words, it confirms and reinforces
    the findings from previously presented fundamental valuation methods.


    ### Valuation Methods Not Based on Fundamentals


    The previous sections focused on valuation methods based on fundamental value.
    They rely as little as possible on how other market players assess the asset’s
    value and strive to identify what it is objectively worth.^([^(122)](#fn122))
    Many methods exist to assess whether a cryptoasset is overpriced, but they rely
    almost exclusively on other market participants’ behavior. It is where valuations
    drift away from fundamentals and come closer to speculation.


    For example, one such approach is to compare an asset’s current value to its average
    acquisition costs. This relationship is called the *market-value-to-realized-value*
    (MVRV). MVRV indicates to what extent the average asset holder would generate
    a profit or a loss if it sold its holdings at the current price. Formally, MVRV
    is computed as follows.


    ![$$ MVRV=\frac{market\ value}{realized\ value} $$](images/600732_1_En_16_Chapter/600732_1_En_16_Chapter_TeX_Equd.png)


    While the *market value* is the asset’s market capitalization, the *realized value*
    is the volume held by each holder multiplied by its acquisition costs. A value
    above 1 indicates that the average holder has an unrealized gain and inversely.
    The theory behind MVRV predicts that this ratio tends to revert toward its mean.
    It can be extended by comparing the difference between its terms to the asset’s
    volatility (the MVRV Z-score), another short-term indicator of likely future prices.


    Another approach would be dividing market value by a measure of holders’ confidence.
    Such a measure of confidence could be, for example, the average number of days
    the cryptoasset stays in a wallet. It is, for example, the method of computing
    the *reserve risk*, a model created by Hans Hauge.^([^(123)](#fn123)) Alternative
    confidence measures include Google search trends, trending tweets, or market surveys.
    A low ratio of confidence (e.g., when long-term holders sell) compared to the
    asset’s price suggests the asset is overvalued.


    Many other short-term indicators exist to assess whether a cryptoasset is currently
    overpriced but are beyond the scope of this book. The interested reader could
    look into the Black-Scholes-Merton model applied to cryptoassets, logarithmic
    growth curves, HODL waves, the RHODL ratio, the Mayer Multiple, and the Puell
    Multiple. Other metrics should also be considered in assessing shorter-term moves
    in cryptoasset prices, such as the maximum “pain price” on exchanges (the price
    that creates the highest total loss to option holders), futures and forward prices
    (which reflect market participants’ expectations), or even debt cycles (in particular,
    Bitcoin price peaks tend to follow China’s debt cycle).'
