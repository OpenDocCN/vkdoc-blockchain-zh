- fmt: '# Credit Risk


    Credit risk refers to the risk that a counterparty cannot meet its debt or contractual
    obligations. An extreme scenario refers to a counterparty not making the required
    debt payment altogether (known as *jump-to-default risk*). However, credit risk
    also includes the possibility that the counterparty’s debt has to be restructured
    in a way that is unfavorable to stakeholders.


    One of the points of decentralization behind cryptoassets is to circumvent this
    risk altogether by not having any counterparty to deal with. However, credit risk
    is still relevant for users of centralized platforms, as the platform is the counterparty
    that could get into trouble. It is also relevant in some cases of decentralized
    finance, where payments rely on a counterparty’s creditworthiness. It would be
    impossible to make a complete list of all possible cases involving credit risk.
    Nevertheless, diligent investors should understand the nature of any deal they
    enter and whether future cash flows depend on any counterparty’s ability to service
    their debt obligations.


    # Liquidity Risk


    Liquidity risk refers to the possibility that an investor may not be able to buy
    or sell an asset when needed due to a lack of market liquidity. As a reminder,
    liquidity is the capacity of the market to absorb large purchases or sales without
    affecting the price of an asset. Cryptoassets are particularly susceptible to
    liquidity risk due to their comparatively small trading volume and low levels
    of institutional participation. While this risk is irrelevant for small investors
    focusing on the largest cryptoassets, it becomes relevant for adventurous investors
    considering assets with a small market capitalization and for large investors.
    For example, individual investors trading a couple of bitcoins or ethers will
    not impact these assets’ market prices. However, large investment funds considering
    sizable investments (e.g., tens of thousands of bitcoins) or investors considering
    cryptoassets with a small market capitalization should be mindful that liquidity
    may be insufficient to maintain the market price intact.


    One solution to address this issue is to split a significant transaction into
    many smaller transactions spread over time to give the market the ability to absorb
    it. This is, for example, the strategy used by the company MicroStrategy when
    it made large Bitcoin purchases in the past.


    # Market Risk


    In the context of portfolio management, market risk refers to changes in portfolio
    value implied by changes in market metrics such as interest rates and other economic
    indicators. Specifically, it refers to the systematic risk that cannot be eliminated
    through diversification by opposition to the unsystematic risk (or idiosyncratic
    risk) that is asset-specific or firm-specific, and that can be diversified away.
    The following sections introduce several metrics to measure this risk. Limiting
    exposure to market risk is possible through different forms of hedging. However,
    most hedging strategies come at a cost; therefore, reducing risk is not usually
    free for investors.


    # Value at Risk (VaR)


    People non-versed in traditional finance often intuitively understand risk as
    “the probability of losing one’s money.”^([^(99)](#fn99)) This concept is represented
    formally by the *value at risk* (VaR) metric, which JPMorgan introduced in the
    1990s. It subsequently became widely used by the industry and became a standard
    for senior management to understand the full risk of any investment. In particular,
    the VaR aims to measure the expected loss on an investment at a particular level
    of likelihood and over a specific period. So, for example, it would answer the
    question, “How much would I lose on my investment over one year if the worst 5%
    of scenarios happened?”. In other words, it enables investors to establish that
    they are *P* percent certain that they will not lose more than *D* dollars over
    a time period *T*.


    There are three methods to compute VaR: analytical, historical, and Monte Carlo.


    ## Analytical VaR


    The analytical method uses statistics to compute a theoretical value. It first
    establishes the portfolio’s expected return and standard deviation^([^(100)](#fn100))
    over the considered time horizon. Then, assuming a specific probability distribution,
    it identifies the factor to use at a specific level of significance (e.g., “worst
    5%”), as shown in Figure [14-1](#600732_1_En_14_Chapter.xhtml#Fig1).


    ![](images/600732_1_En_14_Chapter/600732_1_En_14_Fig1_HTML.jpg)


    A line graph, titled Standard normal probability distribution, of probability
    versus standard deviations away from the mean value. It plots a bell-shaped curve
    between (negative 2.5, 0) and (2.5, 0), and has a shaded region between estimated
    values of negative 2.5 and negative 1.625 marked as 5%.


    Figure 14-1


    Backward-looking worst 5% of events with a standard normal probability distribution
    (i.e., events with a value below 1.645 standard deviations below the mean)


    To illustrate this, assume that a cryptoasset portfolio worth $100,000 has an
    expected return of +50% over a four-year horizon, with a standard deviation of
    40%, and that returns follow a standard normal probability distribution. The investor
    would like to know the expected loss at the 5^(th) percentile (i.e., the worst
    5% scenario). Algebraically, it looks as follows: where `R_p̂` is the expected
    return of the portfolio, `z` is the number of standard deviations away from the
    mean value for a specific probability distribution and at a specific likelihood
    (it can be obtained via distribution tables), `σ` is the standard deviation, and
    `V[p]` is the value of the portfolio.


    `VaR = [R_p̂ - (z)(σ)] V_p = [0.50 - 1.65(0.40)]($100,000) = -$16,000`


    Given these assumptions, the expected loss at this probability level is –$16,000.
    In other words, the investment will do better than “lose $16,000” (i.e., either
    lose less or gain) over a four-year horizon with a 95% probability.


    Of course, the output ultimately depends on the quality of the assumptions. For
    example, one could challenge whether a standard normal distribution is the most
    appropriate probability distribution in the case of portfolio returns, especially
    for cryptoassets. Realistically, a probability distribution assuming fatter tails
    (a higher likelihood of extreme outcomes) would be more appropriate for financial
    returns.^([^(101)](#fn101)) Also, estimating the standard deviation of returns
    of a maturing financial asset is challenging because this standard deviation is
    likely not to be constant. Instead, it could decrease as the market evolves or
    be dependent on other criteria, such as the state of the overall market.^([^(102)](#fn102))


    Finally, given the presence of crypto cycles described in Chapter [9](#600732_1_En_9_Chapter.xhtml),
    taking a horizon shorter than four years is unlikely to be meaningful since cryptoasset
    returns in a bull market (uptrend) are very different from returns in a bear market
    (downtrend). All in all, the analytical VaR approach depends on many assumptions.'
