  trans: '

    # 纸币的崛起


    在 18 世纪的法国，这一模式再次显现，但增加了新的元素：中央银行和纸币。法国国王路易十四去世后，奥尔良公爵菲利普二世接任摄政王，直到年仅十一岁的继位者路易十五成年。公爵发现，这个国家被前任君主积累的、超乎想象的战争债务压得喘不过气来。法国的税收收入甚至无法覆盖这些债务的利息。


    “补救措施”于 1716 年 5 月出台，法国政府成立了一家有权印刷纸币的中央银行。在短短几个月的货币印刷之后，法国不仅能够支付债务利息，还能彻底偿清全部债务。然而，与之前的案例一样，货币供应量的膨胀不可避免地导致了物价飞涨。到
    1720 年 1 月，物价以每月 23%的速度上涨。例如，自这场货币印刷狂潮开始以来，租金和房地产价格已上涨了 20 倍。1720 年 2 月，银行停止用黄金或白银兑换纸币。使用贵金属进行交易变成非法行为，任何被发现持有贵金属的人都会被没收。当银行于同年
    5 月重新开业时，黄金、白银和铜被一抢而空，因为人们不顾一切地想用一文不值的纸币兑换真金白银。最终，这持续四年的疯狂印钞行动使该国以及欧洲大部分地区陷入了持续数十年的经济萧条。


    ![](img/600732_1_En_1_Fig2_HTML.png)


    一张法国纸币的特写照片。上面有外语文字。顶部的数字显示：1098007。


    **图 1-2** 1720 年由法国皇家银行发行的纸币（来源：史密森尼学会国家钱币收藏；维基共享资源，公有领域）


    直到本世纪末法国大革命战争期间，纸币的使用才在该国重新恢复。与其前身类似，新的法国纸币（指券）成为了法定货币。同样与其前身类似，货币供应方（国民议会）印刷了越来越多的新货币。尽管批评者指出，这种做法有可能重蹈本世纪初货币印刷的覆辙，但指券的供应量在短短几年内就从数百万增长到了数十亿。不出所料，这种新货币在诞生后不到十年就变得一文不值。


    ![](img/600732_1_En_1_Fig3_HTML.jpg)


    一张法国法定货币的特写照片。它呈方形，上面有外语文字。底部有一幅插图。


    **图 1-3** 1792 年的指券，一种短命的法国法定纸币（来源：设计：尼古拉-玛丽·加托 - 字体：让-巴蒂斯特·热拉尔；维基共享资源，公有领域）


    另一个值得注意的印刷狂潮发生在 20 世纪初德国魏玛共和国时期。与所有之前的例子一样，它始于一场战争。第一次世界大战爆发时，德国放弃了与黄金挂钩的货币——金马克，转而使用纸马克。共和国开始使用铁、锌和铝等廉价金属铸造新硬币，并在战争期间将纸马克的发行量增加了四倍。


    过度货币供应的毁灭性影响直到战后才显现出来，因为人们在战争期间持有储蓄，避免不必要的支出。一战结束后的几年内，物价上涨了十多倍，抹去了人们 90%以上的储蓄价值。


    当向法国支付战争赔款到期时，印刷机加速了其疯狂运转。一金马克的价格从 1920 年的 15 马克上涨到 1923 年 7 月的 10 万马克，9 月达到 1300
    万马克，同年 11 月达到 1 万亿马克。流通中的典型纸币面额从 1920 年的 10 马克增长到 1924 年的 100 万亿马克。仅 1923 年 10
    月，物价就上涨了 29,500%，而印刷机每天还要额外印出 500 千万亿新纸马克。^(⁸) 与之前的例子一样，纸币变得一文不值，国家崩溃，最终又回归到以黄金为支撑的货币体系。


    ![](img/600732_1_En_1_Fig4_HTML.png)


    一张德国纸币的照片，上面有数字 100 和外语文字。右侧是一个人的侧面肖像。


    **图 1-4** 魏玛共和国 1924 年发行的 100 万亿马克纸币^(⁹)（来源：美国国家历史博物馆国家钱币收藏；维基共享资源，公有领域）


    ## 中央银行与部分准备金银行制度


    与此同时，在大西洋的另一边，发生了一项重大的金融发展。直到第一次世界大战爆发前，美国以及大多数发达国家都以黄金作为其货币的后盾。由于黄金的新供应量（流量）与其存量相比微乎其微，因此没有通货膨胀。随着商品相对价格的调整，财富在各国的流转时有发生，但总和为零。通货膨胀几乎不存在，这使人们能够储存财富。这种情况在
    1914 年发生了改变，当时美国成立了一家私有银行——美联储，并被授权印刷美元。美联储独立于美国政府，没有预算，不接受审计，没有监管者，也不对任何人负责。^(¹⁰)
    正如美联储自己所描述的，它通过创造新货币来向美国政府放贷。^(¹¹) 这些“借贷”的货币是凭空创造出来的新货币。到现在应该很清楚，这并没有产生新的价值；印刷只是稀释了所有现有美元的价值。而且，美联储并不用黄金等实物价值来支持任何新发行的美元。


    当考虑到与之配套的部分准备金银行体系时，这一可疑的安排变得更具争议性。当一家商业银行持有公众存款时，只有一小部分金额必须存放在金库中。银行并不会持有这些存款，而是将其中大部分贷放出去。在美国，美联储设定了准备金要求。通过这种方式，它控制着有多少货币流入经济。假设准备金要求是
    10%。当爱丽丝将 100 美元存入她的商业银行（比如 ING）时，该银行可以向鲍勃贷出 90 美元，同时将 10 美元保留在金库中。^(¹²) 鲍勃用这笔钱从查理那里买东西，查理将他刚赚到的
    90 美元存入他在另一家商业银行（比如富国银行）的账户中。这家银行则将 9 美元（10%）留作备用，并将剩余的 81 美元贷给丹。丹从艾琳那里买东西，艾琳则将钱存入她的商业银行。此时，爱丽丝的银行账户里有
    100 美元，查理有 90 美元，艾琳有 81 美元。这一切都源于爱丽丝最初的 100 美元。这个过程并未止步，而是会继续进行下去。10%的部分准备金比率使得商业银行能够“创造”出多达原始存款九倍的资金：最初的
    100 美元最终可能变成 1000 美元在流通中。


    这就是银行创造货币的方式——当有人获得贷款时，只需在账本上记上一笔。此外，还需要为商业银行贷出的总金额支付利息。如果贷款利率是 5%，那么除了借出的 900
    美元本金外，每年还需偿还 45 美元的利息。而所有这一切都源于爱丽丝最初存入的 100 美元。偿还利息的唯一途径是从国外获取，或者借入更多的债务。从整个经济的规模来看，要同时偿还债务本金及其利息在数学上是不可能的，因为货币必须有来源。因此，当前依赖部分准备金银行制度的货币体系，是一种合法化的金字塔骗局。

