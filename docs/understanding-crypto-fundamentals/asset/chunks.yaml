- fmt: '# Keys and Addresses


    Going back to the mechanics of blockchain presented in Chapter [6](#600732_1_En_6_Chapter.xhtml),
    a `private key` enables access to cryptoassets sent to the corresponding public
    address on the blockchain. A `public key` is generated from the `private key`,
    and the `public address` is generated from the `public key`. This generation takes
    place through cryptographic algorithms. It is straightforward to obtain the output
    from the input but almost impossible to guess the input from the output (with
    current technology, at least).


    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig1_HTML.png)


    An illustration where a `public key` is generated via elliptic curve function
    from a `private key`, and a `public address` is generated using `SHA236` and `RIPEMD160`
    hashing functions.


    **Figure 11-1**


    The `public address` (where senders send cryptoassets) is a function of the `public
    key`, which is itself a function of the `private key`. The functions depicted
    are the ones for Bitcoin to get from a `private key` to a `public address`.


    These keys are only a long string of random characters stored in a "digital wallet"
    by analogy to the physical wallet used to store cash and physical credit cards.


    Losing one’s `private key` means losing access to the content of one’s `public
    address`. For this reason, safely securing keys is of paramount importance. Counterintuitively,
    a wallet does not hold the underlying coins. For example, a Bitcoin wallet does
    not hold the user’s bitcoins. The ownership of these bitcoins is recorded on the
    Bitcoin blockchain, while the wallet only holds the keys enabling the movement
    of the corresponding bitcoins. A better analogy for a cryptoasset wallet would
    therefore be a keychain. As per industry standards, however, we will continue
    using the word *wallet*.


    Different wallet types exhibit different risk profiles. In particular, crypto
    investors need to weigh the benefits of easy access to their funds with the increased
    risk they run for this comfort.


    # Hot Wallets and Cold Wallets


    Wallets having private keys stored online or on devices connected to the Internet
    are called *hot storage wallets* or simply *hot wallets*. In contrast, wallets
    storing private keys offline are called *cold storage wallets* or *cold wallets*.


    Investments made with a hot wallet run a higher risk of theft, as a successful
    hacker could access one’s `private key` and steal one’s funds. For example, a
    hacker could send spyware to access your confidential data or use a malicious
    app to fool you into giving away your `private key`. On the other hand, since
    cold wallets are offline and only occasionally connected to the Internet for transactions,
    they are comparatively safer.


    Hot wallets include desktop, mobile, and web-based wallets, while cold wallets
    include hardware and paper wallets. Of course, both hot and cold wallets can receive
    cryptoassets anytime, regardless of whether online. Again, the cryptoassets are
    not sent to the wallet but to an address on the blockchain. The wallets simply
    contain the key giving access to the content of that address.


    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig2_HTML.png)


    An illustration with diagrams of desktop, mobile, laptop, and tablet in column
    1 and diagrams of a USB and a paper document in column 2. Columns 1 and 2 list
    features of hot wallets and cold wallets, respectively.


    **Figure 11-2**


    Summary of main differences between hot and cold wallets.


    In a way, hot and cold wallets are similar to checking and savings accounts, respectively.
    A hot wallet is similar to a checking account in that it facilitates regular currency
    usage through easy access. A cold wallet is similar to a savings account as it
    supports long-term storage of wealth, though with more cumbersome access.


    A paper wallet is a specific form of cold wallet. It is a printed document containing
    two pieces of information: the `public address` to receive a specific cryptoasset
    and a `private key` to access the content of that address. When created with the
    highest level of security, they are generated from a computer or smartphone that
    has never been connected to the Internet.([^90](#fn90)) This complete isolation
    from the Internet makes such wallets safer against hacking attacks. In addition,
    they typically include QR codes corresponding to the strings of characters representing
    the `public address` and `private key` to ease their usage through an app.


    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig3_HTML.png)


    An illustration of a piece of paper with the following details. 2 QR codes followed
    by a sequence of characters are under `public address` and `private key` on the
    top and bottom, respectively. The `public address` could be shared, but the `private
    key` must be kept secret.


    **Figure 11-3**


    Example of a paper wallet (i.e., a piece of paper including two strings of seemingly
    random characters: the `public address` and the `private key`), represented by
    a QR code to facilitate usage.


    The distinction between wallet types sometimes also takes different names (i.e.,
    software wallets (hot) and web wallets (hot) vs. hardware wallets (cold)). Indeed,
    these names are more intuitive as they suggest that hot wallets run through software
    like an app downloaded on a desktop or mobile device or accessed online.


    For higher safety, software wallets typically partition online and offline sections.
    A pending transaction first moves offline, where the signature with the `private
    key` occurs. The software then only broadcasts the hash of that signature online.
    This way, it never exposes the `private key` directly online.


    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig4_HTML.jpg)


    A photograph of a hardware wallet.


    **Figure 11-4**


    Ledger Nano S hardware (cold) wallet. Such wallets have a user interface via a
    desktop app, enabling to sign transactions offline and only submit the hash of
    the signature online.


    # Custodial and Non-Custodial Wallets


    Wallets are also different in a meaningful way based on whether they are custodial.
    Custody refers to whether the end user owns the keys to the wallet. In particular,
    a custodial wallet is one in which a third party holds your keys on your behalf.
    To get access to your funds, you must trust a custodian and register via a traditional
    login and password on a website or an app. It is, for example, the model that
    many online exchanges use. Your investment is, therefore, directly dependent on
    the security infrastructure of the third party. As a result, if the custodian
    is corrupt, hacked, or forced by authorities to stop its activities, you may lose
    your funds. On the other hand, if you lose your password, there may be ways to
    recover it by proving your identity to a third party.


    In contrast, wallets can be non-custodial, also known as self-custodial. In such
    cases, users own their private keys. No trust in any third party is necessary
    as users genuinely own their funds. This distinction substantiates an important
    motto used by the crypto community.


    > *Not your keys, not your coins.*


    Non-custodial wallets are the preferred option of users living by the cryptoassets’
    trustless value proposition. They can also provide users a higher degree of privacy,
    as KYC (Know Your Customer) processes are not always required, contrary to most
    custodial exchanges. However, they are generally less user-friendly for holding
    one’s fund than going through a custodian. Furthermore, the risk profile of this
    option is also different: if the user loses the `private key`, the corresponding
    funds are irretrievably lost forever.'
