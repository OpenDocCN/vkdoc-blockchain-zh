  trans: '

    评估加密资产的分析师可以调整使用量指标，以反映真实的底层使用情况。例如，分析师可能希望赋予那些秉承行业去中心化精神的用户比中心化交易所上的投机者更高的价值。事实上，一个经历必要步骤设置自我托管钱包的用户，很可能比中心化交易所的用户对底层资产更加投入。使用量指标可以根据该资产的托管主导权（即托管资金占现有总资金的比例）进行加权。例如，分析师可以定义：一种加密资产的自托管程度越高，其用户的价值就越大。


    衡量加密资产使用情况的可能代理指标包括：活跃地址数、交易笔数、Gas 费、总交易成本以及锁仓总价值。区块链技术带来的透明性意味着这些指标可以直接从区块链上实时获取。由于这些指标具有可操纵性，综合使用这些代理指标很可能比单独使用其中任何一个指标更好。


    最后，让我们强调一下，加密资产的市场市值并不能衡量其使用情况。因为市值是市场给出的估值，它并非任何估值过程的输入，而是市场对所有估值的平均输出。


    ## 基于使用情况的增长衡量


    这些指标使投资者能够评估网络估值的增长部分。特别地，使用量的增长速度就是技术的扩散速率。具体而言，全球（经过身份验证的）加密资产用户基础在 2018 年至
    2020 年间每年增长近 190%，随后在 2021 年和 2022 年进一步加速。^(¹¹¹) 确切的数字取决于使用哪种指标以及如何衡量，但大多数估计显示使用量年增长率超过
    100%。这个速率意味着加密资产的采用率每年都会翻一番以上。相比之下，互联网在拥有类似用户数量（3 到 4 亿）时，其采用速度大约只有这个速度的一半。


    技术采用并非线性增长。通常，它遵循一条 S 型曲线：起步缓慢，随后急剧加速，最后以缓慢的收尾结束。埃弗雷特·罗杰斯的著作《创新的扩散》已成为经典，其中展示了图
    16-2。在这张图中，钟形曲线代表创新生命周期中任意一点的采用率。最终达到 100% 的 S 型曲线则是该创新直到峰值时所占据的累计市场份额。


    ![](img/600732_1_En_16_Fig2_HTML.jpg)


    一条向右倾斜、终点为 100% 市场份额的 S 型曲线，与一条具有以下数值的采用率钟形曲线相交：创新者 2.5%，早期采用者 13.5%，早期大众 34%，晚期大众
    34%，落后者 16%。


    **图 16-2** 根据埃弗雷特·罗杰斯理论的技术创新扩散速率（来源：维基共享资源，公共领域 [50]）


    基于加速发展的采用步伐和可用的潜在市场，截至 2023 年，加密资产行业正处于*早期采用者*阶段。此外，根据典型的 S 型曲线，从 0 增长到 10%（对于加密资产而言是
    2009 年到 2022 年）所需的时间，与从 10% 增长到 90%（暗示为 2022 年到 2035 年）所需的时间相同。而且，根据 GWI 市场研究，2023
    年 1 月全球 16 至 64 岁互联网用户中加密资产的使用率为 13%。^(¹¹²) 这些洞察表明，未来十年内采用率（使用量）可能会增长五倍。


    ## 将供应纳入估值考量


    如引言所述，可交易证券的市场价格最终由供需平衡点决定。需求在许多方面类似于前面章节描述的使用情况。相比之下，加密资产的供应是其可用的总量。许多加密资产有固定的上限，并且通过透明的方式规定了达到这个上限的途径和速度。例如，比特币总共将发行的数量为
    2100 万枚。它们随着每个新区块（大约每 10 分钟一个）逐步发行。此外，发行速度在不断降低，因为每 210,000 个区块（大约每四年）区块奖励就会减半。比特币的供应量将遵循此模式，直到大约
    2140 年所有 2100 万枚比特币发行完毕为止，之后将不再有新比特币被挖出。然而，减半事件的性质意味着，到 2024 年第四次减半事件时，总供应量的 93.75%
    已经被挖出。其他加密资产遵循不同的模式；有些也有理论上的最大供应量上限（例如，卡尔达诺），有些加密资产的供应量则在不断扩张（例如，狗狗币），还有一些则是通缩型的（例如，以太坊）。^(¹¹³)


    尽管如此，真正的供应量并非编码在加密资产特性中的理论总数量，而是可找回和可交易的代币数量。实际上，许多资产所有者丢失了他们的私钥，导致所有相应的代币无法找回，使得实际供应量远低于理论数量。例如，据估计，至少有
    20% 的比特币存于私钥已丢失的钱包中。基于这一数字，比特币的真实总供应量不是 2100 万，而是低于 1680 万。

