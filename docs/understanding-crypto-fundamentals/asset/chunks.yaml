    # 匿名电子现金与 DigiCash：1982 年


    盲签名是电子支付系统*匿名电子现金*的基础技术，由大卫·乔姆早在 1982 年开发[51]。


    盲签名是数字签名的扩展，为用户提供匿名性。它使签名者（例如在传统货币中，即银行）能够在无需查看文档内容的情况下签署文档。具体来说，如果爱丽丝通过盲签名进行数字支付，银行和卖家都无法知道是谁花了这笔钱。所有参与方都确认该货币有效（银行有验证流程），但无法追溯其来源。


    盲签名技术也可用于其他目的，例如电子投票或任何需要保护各类消息内容隐私的系统。例如，如果鲍勃想要购买要求他达到法定年龄的商品，他可以使用盲签名来传达他超过特定年龄的信息，而无需透露其确切出生日期。同样，如果发明家想要核实其发明是否已被申请专利，他可以从现有专利中检索特定信息，而无需透露他对这些专利的兴趣。


    大卫·乔姆以*匿名电子现金*为基础，于 1989 年创立了 DigiCash 公司。九十年代蓬勃发展的网络环境和对电子交易日益增长的需求，本应为该公司创造最佳的增长条件。然而，只有少数几家欧洲银行和美国的一家银行使用了
    DigiCash。该公司于 1998 年破产，并将其电子现金专利出售给了 eCash Technologies。


    乔姆认为，当时人们对隐私缺乏兴趣导致了 DigiCash 的失败：“随着网络的发展，用户的平均素养水平下降了。很难向他们解释隐私的重要性”[52]。


    不断发展的电子支付环境被信用卡公司占据，这成为了首选的在线支付方式。这很可能是由于当时便利性比隐私性更重要所驱动的。


    ## 用于为文档添加时间戳的安全区块链表：1991 年


    与此同时，在九十年代初期，斯图尔特·哈伯和斯科特·斯托内塔开发了一种协议，可以在无需中央时间戳授权机构的情况下为文档添加不可篡改的时间戳，同时保持文档内容的隐私性。从根本上说，他们的协议防止了文档的提前或推迟日期标注，并使用类似于现代区块链工作方式的流程。他们通过使用哈希值和数字签名来形成他们所谓的“分布式信任方案”来实现这一点[53]。


    ## 永恒服务：1996 年


    几年后，罗斯·安德森通过互联网在多台计算机上复制带有冗余的数据，实现了去中心化，从而抵御攻击。特别是，他将这一想法与密码学相结合，以建立不可篡改的数据库，其方式与当今的区块链技术非常相似。安德森
    1996 年的论文《永恒服务》，其名称本身就体现了由此产生的去中心化数据存储的不可篡改性。与现代区块链类似，这是一项向所有人提供的服务，无需任何“身份证明或其他手续”。同样，与比特币类似，“将没有一个可以被胁迫或腐败的总部，所有权的多样性和实现方式将提供抵御错误和攻击的韧性。”虽然它从未旨在创造任何可交易且数字稀缺的资产，但永恒服务包含了许多使比特币成功的特征[54]。


    ## 哈希现金：1997 年


    九十年代互联网的发展带来了新的挑战。电子邮件垃圾邮件泛滥，导致了拒绝服务攻击。拒绝服务攻击是一种网络攻击，旨在使连接到互联网的计算机或网络资源不可用，通常是通过淹没目标资源来实现。对于电子邮件而言，这是通过短暂时间内自动提交大量电子邮件以溢出服务器来实现的。亚当·贝克在
    1997 年 5 月提出了一个通过工作量证明机制解决该问题的方案，并在 2002 年的一篇论文中将其正式化[55]。


    加密哈希现金算法生成一个添加到电子邮件头部的邮票，证明发件人至少花费了特定量的 CPU 时间和能量来发送该邮件。人类电子邮件发件人几乎不会注意到这种差异，但自动发送数千封电子邮件就会变得困难重重。虽然
    CPU 时间和能量被浪费在解决一个无用的计算机问题上，但其目的是阻止垃圾邮件发送者，因为他们的商业模式依赖于发送海量电子邮件。垃圾邮件发送者如果每封邮件都需要承担这点小成本，就会变得无利可图。用一个具体的类比来说，哈希现金算法相当于在投递一封实体邮件之前，必须证明发件人绕着街区跑了一圈。这样做一次负担不大，但除非必要，没人会这样做一千次。


    哈希现金已在电子邮件客户端 Mozilla Thunderbird 中实现，并启发了微软等主要公司实施类似的减少垃圾邮件的方法。它在加密资产领域具有相关性，因为最初的加密资产也将工作量证明算法作为其实现的一部分。然而，工作量证明在加密资产中的使用方式恰恰相反：它用于验证合法发送者，而不是阻止不良行为。


    ## 比特黄金：1998 年


    比特黄金是由尼古拉斯·萨博（更为人熟知的是尼克·萨博）创建的一种理论上的去中心化数字货币。它从未被实施，但在形态上与比特币相似。特别是，它使用工作量证明共识机制来解决加密难题。解决后的难题会与解决者的公钥一起被发送到一个拜占庭容错的公共数据库中，在该数据库中，每个解决方案都成为下一个问题的一部分（即，实质上就是一条区块链）。尽管萨博一再否认这一说法，但比特黄金是比特币最接近的前身，其创建者被推测为中本聪。萨博还将他的法律和计算机科学专业知识结合起来，用计算机代码实现了自动执行合约。他正是“智能合约”一词的创造者，该概念是以太坊或卡尔达诺等网络的核心。


    ## B-money：1998 年


    一位名叫戴伟的中国计算机工程师兼密码学专家在 1998 年描述了一种基于密码学的现代货币系统。他的出版物《B-money，一种匿名的分布式电子现金系统》阐述了去中心化数字货币和自动执行合约如何运作[56]。该论文中的大多数核心概念，例如用于更新共享账本的工作量证明机制，后来都在比特币中得以实现。这篇出版物甚至在比特币白皮书中被引用。


    戴伟和亚当·贝克是中本聪在开发比特币期间最先联系的人，这证明了他们在该概念早期发展中所起的关键作用。


    以太坊网络随后接管了智能合约的概念，并将其作为与比特币的主要区别加以实现。正如比特币的最小单位被命名为“聪”以纪念中本聪（1 亿聪等于 1 比特币），以太币的最小单位被命名为“伟”以纪念戴伟（1,000,000,000,000,000,000
    伟，或 1 京伟，等于 1 以太币）。

    '
- fmt: '# Bitcoin’s Replacement Cost Valuation


    Chapter [16](#600732_1_En_16_Chapter.xhtml) explained how electricity costs could
    be used as input for the valuation of a cryptoasset based on a proof-of-work consensus
    mechanism. To not break that chapter’s flow, the following computation-heavy example
    for Bitcoin’s valuation was moved to this appendix.


    The valuation of Bitcoin based on its electricity costs is likely the first cryptoasset
    valuation to ever be established, as it was already used in autumn 2009, when
    the New Liberty Standard online exchange published the first formal Bitcoin exchange
    rate. This approach is called Bitcoin’s *electricity value*, the *electricity
    hash valuation**, or *energy-value equivalence*.


    Algebraically, the different elements of the following formula establish the implied
    costs of a bitcoin purely based on the cost of the electricity needed to mine
    it.


    ![$$ BTC\ electricity\ value=\frac{USD}{kWh}\times \frac{kWh}{Joules}\times \frac{Joules}{hash}\times
    \frac{hash}{block}\times \frac{block}{BTC} $$](images/600732_1_En_19_Chapter/600732_1_En_19_Chapter_TeX_Equa.png)


    See, in particular, how the denominator of each fraction in the formula cancels
    out with the nominator of the next term, so that only two terms are left.


    The first fraction of the formula is the cost per `kWh` of the electricity used
    to mine Bitcoin. Even if cheap energy is used, the miner should consider the opportunity
    cost of that electricity. In our example, let us assume it is `$0.11` per `kWh`.


    The second fraction is a constant. A watt is simply a consumption of `1` joule
    per second. There are `1,000` watts in a kilowatt and `3,600` seconds in `1` hour.
    Therefore, `1` joule corresponds to `1000 × 3600 kWh`, and `1 kWh` corresponds
    to `1 / (1000 × 3600)` joules.


    The third fraction considers the specificities of the ASIC miner. The number of
    joules necessary per hash depends on the miner’s consumption (in our example,
    `5,500` watts) and hash efficiency (in our example, `200` trillion hashes per
    second). These figures correspond to the efficiency of state-of-the-art ASIC miners
    as of May 2023, when maintained at `25` degrees Celsius. The corresponding value
    of the third fraction is `5500 / 200,000,000,000,000` or `27.5` joules per terahash,
    a unit of measure typically used for ASIC miners.


    The fourth fraction is the total hash rate of the network (`350` exahashes per
    second) expressed in the average time necessary to mine a block, `10` minutes.
    In other words, about `210` zettahashes.


    The final fraction is the inverse of the number of bitcoins mined per block: `6.25
    BTC` since the third halving event of May `11, 2020` and until the next halving
    event expected in March `2024`.


    Multiplying these terms with the aforementioned assumptions yields a Bitcoin electricity
    value of `28,233 USD`, the market price of Bitcoin as of this writing. Since its
    inception, Bitcoin’s market price has remained remarkably close (and mean-reverting)
    to its implied electricity value.


    ![$$ BTC\ electricity\ value=\$0.11\times \frac{1}{3.6E6}\times \frac{27.5}{1.0E11}\times
    2.1E23\times \frac{1}{6.25}=\$28,233 $$](images/600732_1_En_19_Chapter/600732_1_En_19_Chapter_TeX_Equc.png)


    This price is a minimum value for Bitcoin, a floor price, for multiple reasons.


    First, the most effective ASIC miners in existence were considered in the figures.
    In reality, most miners are less efficient than in this example. Increasing the
    number of watts required by the miner and reducing its hash efficiency suggests
    a higher valuation.


    Second, this valuation considers exclusively the electricity cost of mining. However,
    setting up a Bitcoin mining farm requires many more costs, from purchasing the
    `ASIC` miners to setup and maintenance costs.


    Third, the hash rate is consistently increasing. This has two consequences: on
    the one hand, the time necessary to mine a block (the fourth fraction) is, on
    average, under `10` minutes. On the other hand, it implies that increasingly more
    miners are joining the race, indicating that they expect future bitcoins mined
    will be worth more than the current market price.


    Also note that the formula can be reworked to isolate the cost of the electricity.
    Thereby, one can derive the maximum cost of the electricity that will make mining
    operations profitable for a specific miner, the Bitcoin market price, and the
    expected hash rate.


    # Financial Products Applied to Crypto


    Since financial concepts are not as digestible for all readers intended for this
    book, the following sections have been moved to an appendix. They cover approaches
    that investors may be tempted to use, in cryptoasset or otherwise, to benefit
    from potential investments, though with a different risk profile than traditional
    direct investments. Note, in particular, the important words of caution related
    to these approaches.'
