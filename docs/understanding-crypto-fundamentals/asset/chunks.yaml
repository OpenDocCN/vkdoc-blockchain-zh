- fmt: '# The Great Depression


    The 1920s represent a shift in financial culture from the pre-war era. Citizens
    were no longer saving but investing, which was enhanced by the low-interest rate
    environment. Loans that were formerly almost exclusively used by corporations
    gradually extended to private individuals. People borrowed to buy a house, a car,
    or even stocks. Due to the easy money and loan-enabled buying, everything became
    a bubble: consumption goods, real estate, the stock market, and more.


    The most severe economic depression of the past century followed at the end of
    that decade. It ended up having a devastating impact on economies and the lives
    of people the world over. Prominent theorists from the Austrian School of Economics,
    Friedrich von Hayek and Murray Rothbard, attribute much of the depression to the
    money supply expansion of the 1920s, driving unsustainable credit bubbles.^([^(13)](#fn13))


    As the bubbles popped and prices dropped, many people could not repay their existing
    loans and stopped requesting new ones. Consequently, as in any depression under
    fractional reserve banking, the money supply contracted, which drove additional
    price decreases and massive wage drops. An unprecedented number of banks failed,
    wiping out people’s life savings. In September 1931, the United Kingdom defaulted
    on its gold obligations, which created panic in all other nations. Fearing that
    the same would happen to the United States, a run for gold ensued at the expense
    of the US dollar. Once more, currency’s value in the street diverged from its
    stated value due to an excessive supply of paper currency versus stable “real”
    money—gold. People increasingly redeemed their paper money for the gold supposed
    to back it until banks could no longer deliver it. The US government faced no
    choice but to sever the peg between its currency and gold.


    ![A close-up photograph of a US one-dollar currency note. It has "United States
    of America" printed at the top with a portrait of the first US president George
    Washington at the center.](images/600732_1_En_1_Chapter/600732_1_En_1_Fig5_HTML.jpg)


    **Figure 1-5** US one-dollar bill under the gold standard (1928). It still holds
    the “will pay to the bearer on demand,” which was removed upon the end of the
    gold standard. (Source: Wikimedia, public domain)


    In 1933, the US government under Franklin Delano Roosevelt published FDR’s Executive
    Order 6102. With this order, the US government effectively confiscated all “gold
    coin, gold bullion, and gold certificates” from US citizens, threatening non-compliers
    with heavy fines or even jail time.^([^(14)](#fn14)) However, even this drastic
    measure was not enough to enable the government to service its debt obligations.
    A few months later, the United States defaulted on gold clauses in all contracts.
    Simply put, the government officially declared it would not reimburse loans it
    had contracted, both among its population and abroad. The United States repaid
    loans with the country’s paper currency but not with real value, gold. One year
    later, the United States devalued its currency to gold by 59%, thereby admitting
    it had overvalued its dollar.


    It took another decade and a second World War before nations across the world
    resumed a gold standard. This major decision in worldwide monetary history happened
    in a small area of New Hampshire called Bretton Woods.


    # The Bretton Woods Era


    At the dawn of the post-war era, in 1944, the world’s major powers established
    a set of rules on monetary, financial, and commercial relations known as the Bretton
    Woods system. The United States, Canada, Western European countries, Australia,
    and Japan agreed to set up a monetary policy to ensure stable exchange rates by
    tying their respective currencies to gold.


    In addition to a set of rules, they established institutions to regulate the international
    monetary system. These institutions included the International Monetary Fund (IMF)
    and what is now known as the World Bank. The objective was to increase cooperation
    between countries and ward off currency devaluations that would give its perpetrator
    a competitive trade advantage over other countries.^([^(15)](#fn15))


    The subsequent international economic success of returning to the gold standard
    was phenomenal. The following thirty years became known as the *Glorious Thirty*,^([^(16)](#fn16))
    also known as the *Golden Age of Capitalism*, characterized by sustained elevated
    levels of economic growth in industrial countries. While the need for post-war
    reconstruction contributed to this recovery, the gold standard was also a crucial
    growth driver as it imposed discipline on governments. If a government wanted
    to spend money, it needed to have gold first, so it needed to have or collect
    real value first.'
