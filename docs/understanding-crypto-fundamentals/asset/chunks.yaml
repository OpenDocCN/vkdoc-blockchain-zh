- fmt: '# The “Longest” Chain Is Always Right


    Under PoW, when a miner completes the validation of a block, this block is appended
    to the chain and becomes a *candidate block*. Because of the decentralized nature
    of blockchain technology and the PoW consensus mechanism, two blocks may be mined
    at about the same time by two independent miners. It could lead to a possible
    “tie,” as it is unclear to the network which block should be part of the blockchain.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig9_HTML.png)


    An illustration of 3 D blocks with numbers 7123, 7124, 7125, and 7126 connected
    to blocks of 7127 and 7127 prime.


    **Figure 6-9** Mining tie, where two blocks are mined at approximately the same
    time and are both candidate blocks


    PoW offers an elegant solution to this occasional problem: The network accepts
    the chain of blocks with the highest effort to build. In practice, the selected
    chain has the highest “chainwork” (i.e., the highest number of hashes expected
    to be necessary to build the chain). Miners on the network select that chain and
    continue mining on top of the last block of that chain.


    Once the following block (or the following few blocks) is (are) mined, the tie
    is broken, and the longest chain becomes the uniquely valid chain. The candidate
    blocks that were not part of that chain are abandoned.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig10_HTML.png)


    An illustration of 3 D blocks with numbers 7123, 7124, 7125, and 7126 connected
    to blocks 7127, 7128, and abandoned block 7129 at the top, and abandoned block
    7127 prime at the bottom.


    **Figure 6-10** The mining tie is broken once more blocks are mined on top of
    one of the candidate blocks. The abandoned block (from the non-selected chain)
    is an orphan block


    Through this mechanism, all users agree on which chain to use without debating
    or consulting each other.


    It implies that a mined block does not necessarily mean that all transactions
    are final because it could become an orphan block. Instead, a transaction is permanently
    settled once a few more blocks are mined on top of the block holding this transaction.
    In the case of Bitcoin, with 10 minutes between blocks, it would take about 30
    or 40 minutes (three or four blocks) to ensure that a transaction is permanently
    recorded in the ledger. This is one reason Bitcoin has been criticized as not
    being fit to be a medium of exchange (you would not want to wait for 30 minutes
    to pay for your coffee to go) and is instead seen as a store of value. Nevertheless,
    even such a “long” time to validate a transaction is much shorter than existing
    payment options, typically taking days to settle between banks (the payment is
    cleared in seconds but settled in days). Also, since 2017, there have been “layer
    2” payment protocols, such as the Lightning Network, that circumvent this issue
    and enable close-to-instantaneous settlements for small-amount transactions in
    Bitcoin.


    A dishonest node could try to tamper with a former block on the chain to double-spend,
    for example. However, changing any information in a former block changes the hash
    of all following blocks. Therefore, the dishonest node would need to solve all
    proof-of-work problems of all following blocks. The node would need to do so until
    its chain becomes the longest while the “real” chain continues to extend in parallel.
    As long as it is not the longest chain on the network, no other node would consider
    this alternative chain valid, and nobody would build on it or accept coins from
    it. Successfully attacking the chain would therefore require more computing power
    than all other nodes on the network combined. For the Bitcoin blockchain, this
    feat is just next to impossible.


    ## Software Updates and Forks


    As a blockchain evolves, it may need to apply changes to its core characteristics
    to remain relevant to the needs of the network. Such changes may include a different
    consensus mechanism, time between blocks, block size, and more. However, making
    changes to a blockchain is not straightforward because a large share of the validators
    on the network would need to approve and adopt the proposed new rules. To do so,
    the validators can freely download the latest version of the validation software
    and start validating blocks based on the new rules. Alternatively, they can choose
    not to adopt the newest version and continue validating under the older rules.


    This freedom of choice can lead to two versions of a blockchain: one following
    the newer rules and one following the older ones. In such a case, the blockchain
    would encounter a fork. Such forks can be either *soft* or *hard*.


    A soft fork of a blockchain happens when the newer rules still respect the older
    ones but become stricter. The validators using the newer rules would mine blocks
    that are also accepted by the validators using the older rules. However, the opposite
    is not true. A validator that updated its software would not accept all blocks
    newly mined under the older rules. For example, assume that a change reduces the
    maximum size of a block from 2 MB to only 1 MB. Such a change still respects the
    less strict rules (i.e., a block of a maximum of 1 MB in size is also below 2
    MB). However, if a miner under the old software mines a block of 1.6 MB, all validators
    with the updated software would consider this block invalid. Validators under
    the updated software would mine based on the blockchain version that includes
    only blocks compliant with the newer rules. Soft forks are, therefore, backward
    compatible. After a soft fork, only one version of the blockchain remains. The
    new rules would become the standard only if they created the longest chain. In
    other words, more than half of the miners (in terms of their hash power) must
    accept the new rules for them to become law.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig11_HTML.png)


    An illustration of 3 D blocks with numbers 7123, 7124, 7125, and 7126 connected
    to abandoned blocks 7127 and 7128 respecting the older rules but not the newer
    at the top, and blocks 7127, 7128, 7129, and 7130 primes respecting both the newer
    and older rules at the bottom.


    **Figure 6-11** Soft fork: new blocks are backward compatible but can only be
    mined under the stricter rules to be accepted by the validators under the newer
    software. If most validators update their software, the “new rules” blockchain
    becomes the longest. The other one is abandoned so that only one remains


    On the other hand, a hard fork is not backward compatible. It would, for example,
    include increasing the block size or changing the consensus mechanism. Such forks
    are controversial because they end in two incompatible blockchains running in
    parallel, each with its own rules.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig12_HTML.png)


    An illustration of 3 D blocks with numbers 7123, 7124, 7125, and 7126 connected
    to blocks 7127, 7128, 7129, and 7130 respecting the older rules at the top, and
    blocks 7127, 7128, 7129, and 7130 primes respecting the newer rules at the bottom.


    **Figure 6-12** Hard fork: new blocks are not backward compatible. Two chains
    exist in parallel, each with its unique rules and validators


    Forks are major events and are rare for the most established cryptoassets. However,
    they are also risky, as the change in rules opens the door to hackers taking advantage
    of an unseen bug in the new code. Therefore, they are often tested on a `testnet`—a
    dummy version of the main blockchain running in parallel.'
