- fmt: '# The COVID-19 Pandemic


    At the end of the 2010s, governments worldwide desperately needed to return to
    more sustainable financials. The central banks’ reaction to a series of recent
    crises had added an exceptional amount of new liquidity to the financial system.
    Then, unfortunately, a pandemic broke out. As in previous crises, the currency
    printing press was the economic weapon used to fight.


    The purest measure of the currency supply is the size of a central bank’s balance
    sheet. Indeed, when the central bank prints currency, its balance sheet expands.^([^(21)](#fn21))
    At the end of 2019, the balance sheets of four of the world’s largest central
    banks (the Federal Reserve, the European Central Bank, the Bank of England, and
    the Bank of Japan) summed up to just short of 16 trillion dollars. This figure
    increased to over 26 trillion dollars less than two years later.^([^(22)](#fn22))
    In other words, 38% of all US dollars, euros, British pounds, and Japanese yen
    ever created were printed between 2020 and 2021\. In the case of the US dollar
    alone, this figure increases to over 52%.^([^(23)](#fn23)) As noted throughout
    this chapter, history has shown that such a printing frenzy does not fare well
    for currency holders.


    The price of assets is typically expressed in a fiat currency. An alternative
    would be to express them in “the size of the central bank’s balance sheet.” Fundamentally,
    the denominator (e.g., USD) is replaced with the central bank’s balance sheet
    size to obtain a ratio. For example, the value of the US stock market over the
    size of the Fed’s balance sheet, instead of expressing it traditionally as the
    value of the US stock market in US dollars. This new ratio indicates the value
    of an asset in comparison to the quantity of one particular currency in circulation.
    This approach reveals that assets’ real value is not growing as fast as typically
    presented. Instead, they maintain their relative value over time, as shown in
    Figure [1-8](#600732_1_En_1_Chapter.xhtml#Fig8).^([^(24)](#fn24))


    ![](images/600732_1_En_1_Chapter/600732_1_En_1_Fig8_HTML.jpg)


    A line graph of standardized asset value in comparison to the Fed''s balance sheet
    from January 2009 to January 2023\. All lines begin at 100 in 2009\. Real estate
    and gold drop to 50 in 2023 with mild fluctuations. S and P 500 increases with
    fluctuations to 185 in 2019, drops to 105 in 2020 and rises.


    Figure 1-8


    US stock market (S&P500), real estate (US median home price), and gold expressed
    in proportion to the Fed’s balance sheet from January 2009 to January 2023\. Standardized:
    January 1, 2009’s value = 100 (Source: Federal Reserve (`federalreserve.gov/monetarypolicy`),
    Macrotrends (`www.macrotrends.net`) and own workings)


    Figure [1-8](#600732_1_En_1_Chapter.xhtml#Fig8) indicates that stocks, real estate,
    and gold did not diverge too far from their starting point. In particular, they
    all mainly remained between 50% (half as large) and 200% (twice as large) as their
    starting point. Also, they tend to revert toward a mean value. In other words,
    the change in assets’ real value over time is not drastic. It is not that stocks,
    real estate, or gold are in a bubble; the bubble is in the central banks’ balance
    sheets.


    ## Where to Go from Here?


    The last sections covered milestones in monetary history, where civilizations
    thrived under gold standards and collapsed when they moved away from them. Every
    attempt to separate currency from money, be it by reducing the precious material
    content of coins or moving to a fiat standard, ended with catastrophic consequences.^([^(25)](#fn25))


    Aware of this reality, authorities in recent history resorted multiple times to
    confiscating gold to refill their reserves of real value.^([^(26)](#fn26)) Citizens
    saw their life savings wiped out, with no recourse but to accept the new reality.
    The last couple of decades went through a tremendous flood of currency supply
    in economies worldwide. The amount of currency in circulation is multiple times
    larger than a decade ago. Unfortunately, history suggests a gloomy ending for
    this scenario.


    As traditional macroeconomics concludes, increasing a country’s money supply causes
    a proportional increase in its price level.^([^(27)](#fn27)) Or, as former Federal
    Reserve Chair (1987–2006) Alan Greenspan put it, “In the absence of the gold standard,
    there is no way to protect savings from confiscation through inflation.”


    The case presented in this chapter is not against any specific entity. Any central
    authority with currency printing power tends to print an excessive amount of currency
    because failure to do so would bring another authority into power. In particular,
    the entity that prevails typically promises more “free” stuff for voters, regardless
    of whether voters are the general population or a private council. Of course,
    the “free” stuff is not free but financed by devaluing existing currency units.
    Printing is moving value from people’s savings to newly printed currency notes.
    This Darwinian argument indicates that the problem is not any specific government
    but a structural issue of wrong incentives. Indeed, for any central authority
    with this power, the incentive for printing currency is too strong to resist,
    be it for providing more welfare or more warfare. An authority with the power
    to print currency naturally prints an economically excessive amount of that currency.
    This process continues until the economic imbalance causes a monetary crash and
    a complete currency meltdown. Only when it returns to an “unprintable” money standard,
    such as gold, can the economy recover on a sound monetary basis and restore the
    balance.


    The silver lining of the monetary crises throughout history has actually been
    a golden lining. Investments in gold not only maintained their value through time
    but even soared in value during crises. Gold remained the ultimate store of value
    for long-term investors because it was a high stock-to-flow asset. No asset has
    ever come close to gold in this regard—until recently.'
