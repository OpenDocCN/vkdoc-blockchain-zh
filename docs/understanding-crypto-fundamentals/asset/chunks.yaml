  trans: "\n> *像比特币这样的东西将会成功，并会开启一种全新的金融运作方式。*\n> \n> —理查德·布兰森，维珍集团创始人，2016 年 10 月\
    \ 21 日，Twitter\n\n> *PayPal 曾怀有创建新货币的目标。我们未能实现这一点，只创造了一个新的支付系统。我认为比特币在新型货币层面已获成功，但其支付系统仍有不足。*\n\
    > \n> —彼得·蒂尔，PayPal 联合创始人，2015 年 2 月，《Buttonwood Gathering》访谈\n\n> *[比特币]是一项卓越的密码学成就。创造在数字世界不可复制的实物具有巨大价值。*\n\
    > \n> —埃里克·施密特，谷歌前 CEO，2014 年 3 月，计算机历史博物馆\n\n> *比特币是伟大事物的开端：一种无需政府支撑的货币，这是必要且势在必行的。*\n\
    > \n> —纳西姆·塔勒布，《纽约时报》畅销书作家，2013 年 3 月 20 日，Reddit 问答（AMA）\n\n> *我认为互联网将成为削弱政府角色的主要力量之一。目前欠缺但很快会发展起来的是可靠的电子现金——一种在互联网上将资金从\
    \ A 转移至 B，而无需 A 知道 B 或 B 知道 A 的方式……*\n> \n> —米尔顿·弗里德曼，诺贝尔经济学奖得主，1999 年，NTU 访谈\n\
    \n本书最初是我关于最优加密投资策略的笔记。它揭示了加密资产的非凡潜力及其特定风险。破除迷思，建立有意义的投资组合，并适应这个动荡的新世界。\n"
- fmt: "# Feedback\n\nI welcome any feedback and suggestions for possible future editions\
    \ of the book. Please feel free to share any thoughts by emailing me at `thomas@thomasjeegers.com`.\n\
    \n# Introduction\n\n> *An investment in knowledge pays the best interest.*\n>\
    \ \n> —Benjamin Franklin\n\nFundamental analysis is the concept of thoroughly\
    \ researching an asset’s economic value and the drivers for its price. In the\
    \ case of a stock, it involves understanding the underlying company’s business\
    \ and financial statements. In the case of a commodity, it involves understanding\
    \ the commodity’s inventory and seasonal cycles, government policies, and related\
    \ markets, as well as the drivers of supply and demand for it. The fundamentals\
    \ of a stock and the fundamentals of a commodity are therefore wildly different.\n\
    \nLikewise, the fundamentals of cryptoassets are also unique. They involve understanding\
    \ how digital information can have value, what drives this value, and how the\
    \ cryptoasset ecosystem impacts it. However, similarly to any tradable asset,\
    \ the market price of a cryptoasset ultimately boils down to supply and demand.\n\
    \nFundamental analysis is used for long-term investment. It differs *fundamentally*\
    \ from technical analysis, which analyses an asset’s monthly, weekly, daily, or\
    \ even intra-daily price patterns to predict short-term moves. In other words,\
    \ fundamental analysis is the investor’s tool, the same way technical analysis\
    \ is the speculator’s tool. Assets subject to fundamental and technical analyses\
    \ span debt to equity, real estate to derivative products, currencies to traded\
    \ funds, and any security. Of course, cryptoassets do not escape scrutiny.\n\n\
    However, they differ in the type of asset at hand. In particular, blockchain technology\
    \ makes Bitcoin the first digital asset that is scarce and cannot be counterfeit.\
    \ It is achieved by decentralizing the asset, meaning that there is no unique\
    \ network owner. Through an ingenious combination of multiple technologies, it\
    \ enables worldwide transfers of value settled in minutes and permanently, without\
    \ requiring any intermediary. These characteristics make Bitcoin and other cryptoassets\
    \ the logical next milestones in the development of a global society’s monetary\
    \ and financial system. It is not a revolution but rather an evolution—the natural\
    \ next step in the history of money and finance. They not only offer monetary\
    \ digitalization but also, and much more importantly, decentralization.\n\nAs\
    \ this book covers in detail, decentralization makes cryptoassets the base for\
    \ a strictly superior monetary model compared to paper-based currencies emitted\
    \ by governmental entities or private banks. Indeed, with sufficient adoption,\
    \ cryptoassets offer greater value in all three core functions of money: unit\
    \ of account, store of value, and medium of exchange.\n\nIn addition, the consequences\
    \ of this disruption reach far beyond the monetary system. In an increasingly\
    \ digital society, sharing digital assets needs fair and transparent rules. It\
    \ is not only valid for money but also for identity, property titles, music, and\
    \ art, among many other use cases. As a result, virtually all industries will\
    \ be impacted, directly or indirectly, by cryptoassets and their underlying technology,\
    \ blockchain. In particular, Chapter [3](#600732_1_En_3_Chapter.xhtml) presents\
    \ multiple ways blockchain technology revolutionizes the world as a driver for\
    \ the greater good.\n\nThis book primarily covers the potential of cryptoassets\
    \ as part of the next monetary system and as a new asset class for investments.\
    \ In particular, it analyzes cryptoassets from an economic and financial perspective,\
    \ following principles of value investing. In other words, the aim is to identify\
    \ what this new asset class is worth. The book identifies and measures fundamental\
    \ pillars of cryptoassets to help assess their genuine value. It also balances\
    \ the picture by highlighting the underlying risks, both financial and non-financial.\
    \ Specifically, it is structured following critical questions that any investor,\
    \ experienced or new, should ask before investing. *Why* is this asset class valuable?\
    \ *What* is this asset class made of? *When* is the right time to invest? *Where*\
    \ should one invest? *How* should one invest in terms of investment strategy and\
    \ risk management? And finally, *which* valuation methods exist and are appropriate\
    \ for cryptoassets? This book does not recommend any particular investment but\
    \ provides the framework necessary to make more informed cryptoasset investment\
    \ decisions. It enables an understanding of why they have true economic value\
    \ and hints at how to measure it. It is the starting point for serious long-term\
    \ cryptoasset investors rather than the answer for short-term speculators looking\
    \ for get-rich-quick schemes.\n\nBesides, outstanding cryptoasset resources already\
    \ exist. This book does not seek to replace but rather complement them with a\
    \ focus on value investing. Covering technical aspects of cryptoassets and blockchain\
    \ technology too deeply would divert the focus from this book’s purpose. All intricacies\
    \ behind this technology would barely even fit in a book of their own. Therefore,\
    \ this book only covers blockchain technology’s high-level functioning. In particular,\
    \ it does not cover the following topics.\n\n*   Advanced cryptography and dApps\
    \ programming. Interested readers and programmers should refer to the in-depth\
    \ book *Mastering Blockchain* by Imran Bashir [1].\n\n*   Non-fungible tokens\
    \ (NFT). Interested readers should refer to *The NFT Handbook* by Fortnow and\
    \ Terry [2].\n\n*   Cryptoasset taxation. Tax considerations of cryptoassets are\
    \ wildly different for every country and rapidly evolving. Interested readers\
    \ can refer to the extensive book *Taxation of Crypto Assets* by Schmidt, Bernstein,\
    \ Richter, and Zarlenga, second edition (2023), covering tax law for cryptoassets\
    \ in over 40 countries [3].\n\n*   Technical analysis (TA). The book focuses on\
    \ the long term, not short-term horizons considered in technical analysis. The\
    \ macro thesis presented here will likely take several years, possibly decades,\
    \ to play out. Short-horizon crypto traders should refer to books on swing trading\
    \ (short term) or breakout trading (medium term).\n\nSince Bitcoin is the first\
    \ cryptoasset and because its market value is roughly half of all cryptoassets’\
    \ value combined, there is a corresponding focus on this particular asset. Nevertheless,\
    \ many more cryptoassets followed in Bitcoin’s wake, with purposes extending much\
    \ beyond Bitcoin’s original value proposition.\n\nAs the author, I feel compelled\
    \ to highlight that what I do not know about cryptoassets is much broader than\
    \ what I do know. In particular, while I have superficial experience in these\
    \ fields, I am neither a programmer nor a professional investor with decades of\
    \ experience. In addition, the exceptional pace of development of the cryptoasset\
    \ industry makes it impossible to closely follow all things happening in the cryptoasset\
    \ space. Nevertheless, I believe this book makes a compelling case for cryptoassets,\
    \ their rightful place in a balanced investment portfolio, and the risks investors\
    \ face as of 2023.\n\nSome readers may believe they missed the opportunity. Many\
    \ teenage cryptomillionaires made the headlines over the last decade. Some early\
    \ investors and innovators even became billionaires through the early gains of\
    \ the industry. As this book shows, it is not too late to profit from the innovation,\
    \ far from it. Actually, it is just the beginning. If a human life represented\
    \ the development of cryptoassets, it would currently be at the toddler stage.\
    \ It can barely stand on its own feet, but it still has a lifetime of development\
    \ ahead. Crises will surely pave its teenage years, but the best is yet to come.\n\
    \nRegardless of one’s opinion on cryptoassets, their proof of concept redefines\
    \ how we think about trust. The technology behind them could become the most transformational\
    \ innovation for society since the Internet—not big data, artificial intelligence,\
    \ or self-driving cars but blockchain. What was once in the hands of a powerful\
    \ few, for better or worse, can now be in everybody’s hands—or nobody’s hands,\
    \ depending on how one looks at it.\n\n# About the Author About the Technical\
    \ Reviewer"
