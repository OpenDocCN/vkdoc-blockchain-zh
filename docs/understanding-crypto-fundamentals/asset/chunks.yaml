- fmt: '# From Money to Currency


    Money and currency are not the same thing. Money is the natural medium selected
    by individuals to conduct transactions. On the other hand, governments impose
    currency on their citizens for these transactions. They can be the same and typically
    start as such. However, many times in history, governments have let their currency
    gradually drift away from money. These episodes ended badly, often in disasters
    of epic proportions. A few examples follow.


    Gold and silver established themselves as money for most of the past five millennia.
    Sound money enabled civilizations to flourish and push the boundaries of humankind’s
    development. Thanks to the coinage of these metals, the great Greek civilization,
    half a millennium BCE, became the world’s most prosperous society and kept expanding.
    It established a free-market economy with an effective tax system and became the
    world’s first democracy. However, in 431 BCE, Athens entered the Peloponnesian
    War against Sparta, which lasted almost two decades, much longer than anticipated.
    As the war went on, funding it became challenging and soon impossible. To ease
    the problem, Athenian authorities creatively mixed copper with the gold and silver
    they gathered from taxes to melt new coins. They could increase the number of
    coins they had on hand and suddenly spend more than their revenue. This creative
    development became the first currency debasement in history. Gold and silver were
    no longer traded based on their weight but rather on the historical value of coins.
    Athens had just created the first government currency. In the few years that followed,
    citizens progressively realized the trick and stopped accepting these coins as
    genuine gold or silver. The new currency quickly became worthless, Athens lost
    the war, and its prosperity ended. What remained of the country became a conquest
    of the next great civilization, Rome.


    The Roman Empire was next in line to reach the heights of the world’s dominant
    civilization. However, after centuries of prosperity, the emperors’ greed led
    Rome to unaffordable wars. Similar to the Greeks, Romans funded wars by debasing
    their currency. They shrank the size of coins and mixed cheaper metals to produce
    new ones. The debasement was initially slow and minimal. From the original `denarius`
    containing 95% silver under Augustus, only 50% remained under Caracalla two centuries
    later. However, once the process started, emperors minted more currency at increasing
    rates, trying to escape price increases. In the middle of the third century CE,
    the silver content in a `denarius` dropped to only 0.5% within a couple of decades.
    The unavoidable consequence materialized as the Roman Empire sank into hyperinflation.
    In these two decades, known as the Crisis of the Third Century, prices increased
    by nearly 1000% (i.e., multiplied by a factor of 10). Troops hired by the emperor
    would only accept payment in gold for their services, thereby plainly denying
    the value of the official currency. Toward the end of the century, the situation
    temporarily stabilized after the assassination of dozens of short-term emperors.
    However, the process quickly resumed. Under Diocletian in 301, a pound of gold
    traded for 50,000 `denarii`. By the year of his death, in 337, it increased to
    20 million `denarii`, corresponding to 40,000% inflation.^([⁶](#fn6))


    ![](images/600732_1_En_1_Chapter/600732_1_En_1_Fig1_HTML.jpg)


    A close-up photograph of the front and back of a circular Denarius coin. The front
    view has a man''s head facing sideways. The back view has the letters D I V V
    S, and I V L I V on either side of 4 radial lines that are in the top and bottom
    regions.


    **Figure 1-1** Denarius under Augustus (Source: Classical Numismatic Group, Inc.
    [`http://www.cngcoins.com`](http://www.cngcoins.com); Wikimedia, public domain)


    Episodes of hyperinflation are not limited to ancient history. For example, in
    sixteenth-century England, the Great Debasement under Henry VIII rhymes with the
    preceding stories of Greece and Rome. To finance wars in France, the English King
    ordered the reduction of precious metals in coins by replacing them with cheaper
    metals. As a result, the formerly prestigious English currency quickly disintegrated
    and disappeared from circulation. The same pattern arises in all cases: unaffordable
    wars require increasing the currency supply, leading to price increases, ruining
    the nation, and ending in a collapse of the currency.


    In the next century, on the European continent, small German states repeated the
    same mistakes in the Thirty Years War. Under the Holy Roman Empire, only a few
    princes had the right to mint coins. The Empire was, in theory, under a bimetallic
    standard, with large gold coins of high value and silver coins for smaller denominations.
    While coin alteration was punishable by death, enforcing the sentence was difficult.
    As a result, this period became known as the *clipping and culling times* (*Kipper-
    und Wipperzeit*), following the recurrent clipping of coin edges and careful selection
    of the best coins. Little remained due to debasement from the original coins made
    of valuable metals. Coins progressively lost their valuable content until becoming
    exclusively copper. As in previous examples, hyperinflation settled, and an economic
    crisis followed. People stopped accepting coins as payment, and the currency became
    worthless.^([⁷](#fn7))'
