    # 交易路由


    某些加密资产提供了通过交易路由获利的机会。一个广为人知的例子是 Helium 挖矿。在此语境下，Helium 并非元素周期表中的惰性气体，而是一种为“人民网络”（一个去中心化无线网络）提供动力的加密资产。Helium
    节点使得智能设备能够通过低功耗、长距离的无线协议在线发送数据。因此，Helium 矿工可以根据其网络覆盖范围获得可观的奖励。连接到该网络的物联网设备包括，例如，狗狗的智能项圈或许多城市都有的
    Lime 电动滑板车。矿工之所以能获得高额回报，是因为这种模式对任何单个矿工而言都无法规模化扩展。实际上，两台彼此靠近的 Helium 挖矿设备所提供的网络覆盖范围与单台设备相同。因此，矿工有动力（在每个地点）只拥有一台设备。


    ![](img/600732_1_En_8_Fig7_HTML.jpg)


    Linxdot Helium 矿机照片。


    图 8-7：Linxdot 生产的 Helium 矿机


    另一个交易路由的例子是通过闪电网络实现的。闪电网络通过在比特币区块链之上构建基础设施来提高比特币的可用性，从而使交易能够即时完成，且交易费用可以忽略不计。这一特性对于解决比特币交易结算速度相对较慢的问题至关重要，将其从分钟级缩短到毫秒级。根据设计，闪电网络依赖于去中心化的节点来路由交易。任何人都可以运营这样一个节点，并从小额交易费用的分成中获益。全天候运行一个专用节点功耗低于每小时
    10 瓦，相当于在 2023 年的纽约这样的城市，每月电费大约为 1 美元。运营这样一个节点的收益取决于多个因素，包括路由交易的数量和规模，以及比特币的价格。截至
    2023 年，运营这样的节点并不赚钱：即使在最理想的情况下，也需要好几个月才能收回成本。然而，比特币倡导者将其用于帮助网络去中心化，并享受其他服务，例如提供闪电支付和开具闪电发票。随着闪电网络上支付数量的增加，运营一个路由节点可能会成为一个潜在的新收入来源。


    ![](img/600732_1_En_8_Fig8_HTML.jpg)


    RaspiBlitz 屏幕的照片。屏幕左侧有信息、节点、发票和关闭的菜单。中间屏幕显示比特币全节点和闪电网络。


    图 8-8：运行在 RaspiBlitz 上的比特币全节点和闪电节点


    ## 关键概念


    有些投资者可能未被授权或监管以直接投资加密资产。然而，他们仍然可以通过间接投资（例如 ETF 或拥有、开发或挖掘加密资产的公司）从这种新资产类别中获益。此外，个人也可以选择直接挖掘加密资产或亲自为区块链项目做贡献。


    投资者可以通过资本收益和被动收入机会（例如质押、借贷或流动性挖矿）从加密资产中获益。他们还可以使用收益农场，将资金自动转移到 DeFi 世界中收益最高的选项，尽管这些选项通常伴随着额外风险（例如杠杆）。


    另一种高风险、高回报的直接投资策略是投资于 ICO、STO 或其替代的早期加密资产发行，以利用全新加密资产可能的价格上涨。


    ## 延伸问题


    由于大多数加密资产本质上属于证券（见第 7 章），ICO 构成了一种证券发行。而由于大多数 ICO 发行方并未注册，这类发行在许多司法管辖区可能是非法的（即使执法机构通常没有明确禁止）。对于
    ICO 的投资者而言，真正的监管风险是什么？


    为什么截至 2023 年，没有更多公司将比特币纳入其资产负债表？


    质押和借贷背后的风险是什么？


    脚注 1 2 3 4 5 6 7 8


    # 第三部分：何时是投资的好时机？


    ## 9. 加密货币趋势


    > *以史为鉴，可以知兴替，进而明晰未来。*

    >

    > ——卡洛斯·斯利姆·埃卢


    对于任何投资者而言，无论是投资加密资产还是其他领域，时机都至关重要。虽然把握好投资时机很困难，但理解宏观经济周期、加密资产特定周期以及特定的日历调整会有所帮助。本章探究这些周期及其他加密资产趋势。这些知识不仅能让面临投资大幅波动的投资者安心，还将有助于本书后面探讨的一些估值方法。

