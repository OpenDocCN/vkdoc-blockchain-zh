  trans: '

    运行这些挖矿设备需要消耗大量电力，因此电力成本低廉的地理位置对挖矿更具盈利优势。例如，冰岛的地热能比纽约市的电网电价便宜得多，这使得冰岛成为比特币挖矿的更优地点。由于冰岛的电力生产几乎
    100%来自可再生能源^(⁷²)，其可持续性也远高于其他地区。此类挖矿通常发生在*矿场*中——这些仓库里成百上千台 ASIC 矿机并行运作。矿场常直接建在水电站或地热能源站旁，以便利用电站产生的过剩电力来挖矿。这样一来，供应高峰（如雨季）或需求低谷（如夜间）产生的电力就能变现，同时还能保障比特币网络的安全。


    截至 2023 年 5 月，各国电价差异悬殊：德国、丹麦或英国等国的电价平均每千瓦时超过 0.50 美元，而哈萨克斯坦、伊朗或马来西亚等国则低于 0.05
    美元。因此，毫不意外的是，后一类国家位列全球比特币挖矿量前十。不过，即便是平均电价较高的国家，也能利用偶发的廉价电力（例如可再生能源电厂的过剩能源）来挖矿——美国（占全球
    35%）、加拿大（10%）和德国（5%）也因此跻身同一前十榜单^(⁷³)。


    相比之下，截至本文撰写时，要使比特币挖矿盈利，所需电价须低于每千瓦时 0.11 美元^(⁷⁴)。使用更昂贵的电力对矿工而言并无经济吸引力，因为挖矿奖励的可能性和规模无法抵消所需的能源成本。因此，在高电价地区挖矿无利可图，任何尝试者都将蒙受经济损失。值得注意的是，用于挖掘比特币等加密货币的能源，通常是原本会被浪费的能源。事实上，如果生产者能将此类能源用于其他任何用途，那通常会更有利可图。因此，比特币挖矿使我们得以从被浪费的能源中获利。与此同时，它并不会给高电价电网（例如发达国家的各大城市）带来压力，因为高电价地区缺乏挖矿的经济激励。


    ## 抗 ASIC 挖矿


    为了遏制永无止境的算力竞赛和不断攀升的电力消耗，开发者为部分加密货币的共识机制设计了抗 ASIC 特性。换言之，对于这些加密货币的挖矿，使用 ASIC 并不比在传统计算机中使用简单图形处理器（GPU）更具优势。此外，对于某些加密货币，从技术层面也无法使用
    ASIC。在这种情况下，用自己的笔记本电脑在家挖矿，与使用最新专用设备挖矿的成功概率并无差别。


    从技术角度看，实现抗 ASIC 有多种方法。例如，可以将挖矿算法设计为需要大量计算机内存。这一要求意味着运行该算法的计算机芯片上需要更大的物理面积。特别是，ASIC
    通常通过在计算机芯片上并行化物理线程来超越传统 GPU，而并行化本身就需要物理面积。然而，当算法步骤需要较大物理面积时，并行处理的优势就会减弱。ASIC 相对于
    GPU 的竞争优势丧失，相应的加密货币便具有了抗 ASIC 特性。对于有兴趣的读者，现代基于工作量证明（PoW）的加密货币通过多重哈希 PoW、内存密集型
    PoW 或程序化 PoW 来实现抗 ASIC，并且新的方法仍在不断涌现[41]。


    对于个人而言，挖矿抗 ASIC 加密货币比挖非抗 ASIC 加密货币更经济可行。不过，廉价电力仍然是挖矿盈利的必要条件。此外，抗 ASIC 加密货币还有一个附带好处：更高的去中心化程度。实际上，抗
    ASIC 特性减少了企业建立大型矿场的激励，从而避免了资产挖矿的中心化。


    截至 2023 年，最大的抗 ASIC 工作量证明加密货币包括门罗币（XMR）、以太坊经典（ETC）和渡鸦币（RVN）。


    ## 矿池


    比特币挖矿面临的一个问题是，对于任何个人而言，成功挖出一个区块的概率微乎其微，尽管成功后的区块奖励相当可观^(⁷⁵)。解决办法是加入一个矿池。在矿池中，矿工们同意按各自贡献给矿池的算力比例，分配成功挖出区块的奖励。例如，假设一个矿池在
    2023 年挖出了 100 个比特币（16 个区块），而某个人在此期间贡献了该矿池总算力（哈希率）的 3%。那么，此人将获得 3 个比特币（扣除矿池管理费，例如
    2%）。如图 8-4 所示，2022 年，前 9 大比特币矿池占据了比特币总算力的 95%。


    ![](img/600732_1_En_8_Fig4_HTML.jpg)


    2022 年十大比特币矿池哈希率饼图。Foundry USA 23.20%。ANTPOOL 16.61%。币安矿池 11.50%。ViaBTC 9.58%。Poolin
    7.74%。Braiins Pool 5.21%。BTC.com 4.03%。Luxor 2.59%。其他 3.09%。


    图 8-4

    2022 年十大比特币矿池及其哈希率占比（来源：BTC.com 及自行计算）


    建议愿意挖掘工作量证明加密货币的新手加入矿池，但需谨慎选择。特别地，应寻找那些在挖矿设备要求、费用计划、停机历史以及抵御 DDoS 攻击记录方面完全透明的矿池^(⁷⁶)。稳定（无停机且不易成为攻击目标）且透明的矿池，对于降低挖矿过程中的风险至关重要。

