  trans: '

    # 流动性挖矿


    流动性挖矿是加密资产持有者获得被动收入的另一种方式，但它比质押或借贷更为复杂。从根本上来说，它是对流动性提供者所提供服务的奖励（即为市场提供流动性）。


    奖励流动性的逻辑如下。一个平台（中心化或去中心化）旨在为众多加密资产交易对提供高流动性。对于一个交易对（例如 Solana 和 Axie Infinity），可能买家和卖家都很少，从而形成一个“非流动性市场”。在非流动性市场中，用一种资产购买另一种资产可能会实质性地改变市场价格，因为买卖双方都很少。这种情况通常发生在市场面临大额订单而缺乏足够交易量来吸收它们时。流动性市场对平台非常有价值，因为这样的市场能提供稳定的价格和有竞争力的佣金费用。这种价值会转化为对流动性提供者的奖励，通常表现为一种灵活的利息。


    具体来说，流动性提供者通过存入一种资产（加密资产、法定货币或稳定币）进入包含两种资产的流动性池。在这样的池子中，两种目标资产根据各自可用数量的多少，在池中占据一个相对比例。提供者贡献一种资产（或两种资产）作为池子的流动性，并获得池子的份额，作为对这两种资产的索取权。该索取权的内容取决于提供者加入池子后，两种资产相对比例如何变化。


    ![](img/600732_1_En_8_Fig5_HTML.png)


    流动性挖矿示意图。一位流动性提供者向流动性池中存入 4 个 BTC，该池共有 1,000 BTC 和 10,000 ETH，总份额为 100,000，提供者获得
    200 份池份额。


    **图 8-5** BTC-ETH 流动性池示例，相对价格为 10 ETH/BTC，一位流动性提供者通过贡献与池总价值成比例的相应数量 BTC，获得池中 0.2%
    的份额


    交易者使用池子的自动做市商（AMM）用一种资产兑换另一种资产，并为此服务支付费用。流动性提供者的奖励取决于交易者在相应池子中兑换的交易量。兑换的交易量越高，总费用就越高，流动性提供者的回报也越高。截至
    2023 年 5 月，去中心化交易所 Uniswap 收取兑换金额 0.3% 的费用，而中心化交易所 Binance 则收取 0.15% 的标准费用（并提供
    50% 的费用返还，以 Binance 的原生币 BNB 支付）。


    ![](img/600732_1_En_8_Fig6_HTML.png)


    流动性挖矿示意图。一位流动性提供者向流动性池中存入 5 BTC + 50 ETH，获得 500 份池份额。一位交易者向流动性池中存入 1 BTC + 0.3%
    的费用，获得 10 ETH。


    **图 8-6** BTC-ETH 流动性池示例，相对价格为 10 ETH/BTC，一位流动性提供者获得池中 0.5% 的份额，一位交易者支付 0.3% 的交易费用，用
    1 BTC 兑换了 10 ETH


    流动性提供者最终获得的收益可能因交易对的不同而差异巨大，如下方表 8-5 所示。


    **表 8-5** Binance 提供的流动性挖矿交易对示例，截至 2023 年 1 月的流动性和总收益水平差异巨大（来源：Binance App）


    | 提供者 | 交易对 | 流动性 | 总收益 |

    | --- | --- | --- | --- |

    | Binance | USDT/DAI | 1,548,984 USDT + 2,802,152 DAI | 1.16% |

    | Binance | BTC/ETH | 1,203 BTC + 17,398 ETH | 1.38% |

    | Binance | AAVE/BTC | 5,925 AAVE + 22 BTC | 3.03% |

    | Binance | ADA/BUSD | 1,610,694 ADA + 623,816 BUSD | 5.10% |

    | Binance | AXS/BNB | 19,761 AXS + 756 BNB | 6.31% |

    | Binance | GALA/BNB | 8,019,080 GALA + 1,509 BNB | 16.11% |


    在使用流动性挖矿之前需要理解的一个概念是*无常损失*。池中每种资产的相对数量决定了流动性提供者份额的价值。当交易对中的一种资产有大量进出流动性池时，池中资产的份额会发生变化。因此，流动性提供者的投资价值可能低于仅仅持有这些资产时的价值。由于这种变化，投资会面临未实现损失（与单纯持有资产相比）。这种未实现损失被称为无常损失。然而，只有当池中资产的相对价值发生剧烈变化时，无常损失才会变得显著^(⁷⁸)。此外，提供流动性带来的回报通常足以弥补无常损失。


    ## 收益耕作


    收益耕作涉及通过锁定加密资产来获取尽可能高的被动收入。被动收入通常来源于底层的质押、借贷或流动性挖矿。


    一些平台，如 Aave、Compound 或 yearn.finance，通过在不同 DeFi 服务之间转移资金来自动化此过程，以获取尽可能高的资本回报。在
    2020 年初，看到收益耕作中三位数（有时甚至是四位数）的回报率并不罕见，这证明了其极高的风险水平。如此高的收益只有通过大量的杠杆投资和高风险项目才能实现。在
    2022 年的熊市中，随着流程变得更加成熟和风险降低，收益率更为温和，通常为个位数到较低的两位数回报率。


    ## 空投


    在加密资产语境下，空投是一种用于新型加密资产获得普及度和增加使用量的营销策略。可以将空投视为相当于零售店提供免费样品的一种加密方式。尽管存在多种形式，空投通常包括用户免费获得少量新型加密资产，或通过完成一些小任务来获得^(⁷⁹)。这些任务可能是转发加密资产发行公司的帖子、加入加密项目的新闻通讯、在社交媒体上关注加密资产页面，或回答关于该加密资产如何运作的基本问题，从而证明用户花时间理解了其目的。有时，任务包括使用该加密资产：例如，至少持有一定数量的该资产，或使用发行公司提供的某项服务。空投对于通过加密资产的广泛使用来产生网络效应至关重要。


    从历史上看，一些空投曾带来可观收益，例如 Uniswap 空投为每位接收者带来了 15,000 美元。然而，空投的回报通常很小（最多价值几美元），并且常常甚至无法交付承诺的代币。此外，空投通常针对处于起步阶段的加密项目，这些被空投的加密资产往往变得一文不值。对许多加密资产投资者而言，空投是否值得花时间完成整个注册过程，是值得商榷的。

    '
- fmt: '# Transaction Routing


    Some cryptoassets enable opportunities to benefit from transaction routing. A
    widespread example is Helium mining. In this context, Helium is not a noble gas
    from the periodic table of elements but a cryptoasset powering the People’s Network,
    a decentralized wireless network. Helium nodes enable smart devices to send data
    online through a low-power, long-range wireless protocol. As a result, Helium
    miners can receive sizable rewards based on their coverage. IoT devices connecting
    to the network include, for example, dogs’ smart collars or Lime electric scooters
    available in many cities. High returns to miners are possible because the model
    is not scalable for any individual miner. Indeed, two Helium mining devices close
    to each other provide the same coverage as a single device. Therefore, miners
    are incentivized to own only one device (per location).


    ![](images/600732_1_En_8_Chapter/600732_1_En_8_Fig7_HTML.jpg)


    A photograph of Linxdot Helium miner.


    Figure 8-7: Helium miner from Linxdot


    Another example of routing transactions is through the Lightning Network. The
    Lightning Network increases the usability of Bitcoin by building infrastructure
    on top of the Bitcoin blockchain so that transactions can happen instantly and
    with negligible transaction fees. This feature is critical to address the comparatively
    slow settlement time of Bitcoin transactions, moving it from minutes to milliseconds.
    By design, the Lightning Network relies on decentralized nodes to route transactions.
    Anybody can operate such a node and benefit from a share of the small transaction
    fees. Running a dedicated node full-time consumes less than 10 watts per hour,
    corresponding to an electricity cost of roughly $1 per month in a city like New
    York in 2023. The benefits of running such a node depend on several criteria,
    including the quantity and size of transactions routed and Bitcoin’s price. As
    of 2023, running such a node is not lucrative: it takes many months to break even
    in best-case scenarios. However, Bitcoin advocates use it to help decentralize
    the network and benefit from other services, such as offering Lightning payments
    and issuing Lightning invoices. As the number of payments on the Lightning Network
    increases, operating a router node may become a potential additional revenue source.


    ![](images/600732_1_En_8_Chapter/600732_1_En_8_Fig8_HTML.jpg)


    A photograph of a RaspiBlitz screen. The screen has menus of info, node, invoice,
    and off on the left. The center screen indicates the Bitcoin full node and lightning
    network.


    Figure 8-8: Bitcoin full node and Lightning Node running on a RaspiBlitz


    ## Key Concepts


    Some investors may not be mandated or regulated to invest directly in cryptoassets.
    However, they can still benefit from this new asset class through indirect investments,
    such as ETFs or companies owning, developing, or mining cryptoassets. In addition,
    one can also choose to directly mine cryptoassets or contribute to blockchain
    projects oneself.


    Investors can benefit from cryptoassets through capital gains and passive income
    opportunities, such as staking, lending, or liquidity mining. They can also use
    yield farming to automatically move funds toward the most lucrative options in
    the DeFi world, though these options often come with additional risks (e.g., leverage).


    Another high-risk, high-reward direct investment strategy is investing in ICOs,
    STOs, or their alternative early cryptoasset offerings to take advantage of possible
    price increases in brand-new cryptoassets.


    ## Extension Questions


    Since most cryptoassets are fundamentally securities (see Chapter 7), ICOs constitute
    a security offering. And since most ICO issuers are not registered, such offerings
    would be illegal in many jurisdictions (even if they are often not explicitly
    forbidden by law enforcement authorities). What are the real regulatory risks
    for investors in ICOs?


    Why aren’t there more companies holding Bitcoin on their balance sheet as of 2023?


    What are the risks behind staking and lending?


    Footnotes [1](#600732_1_En_8_Chapter.xhtml#Fn1_source) [2](#600732_1_En_8_Chapter.xhtml#Fn2_source)
    [3](#600732_1_En_8_Chapter.xhtml#Fn3_source) [4](#600732_1_En_8_Chapter.xhtml#Fn4_source)
    [5](#600732_1_En_8_Chapter.xhtml#Fn5_source) [6](#600732_1_En_8_Chapter.xhtml#Fn6_source)
    [7](#600732_1_En_8_Chapter.xhtml#Fn7_source) [8](#600732_1_En_8_Chapter.xhtml#Fn8_source)


    # Part III: When Is a Good Time to Invest?


    ## 9. Crypto Trends


    > *With a good perspective on history, we can have a better understanding of the
    past and present, and thus a clear vision of the future.*

    >

    > —Carlos Slim Helu


    Timing is critical for any investor, in cryptoassets or otherwise. While timing
    an investment well is difficult, it helps to understand macroeconomic cycles,
    cryptoasset-specific cycles, and ad-hoc calendar adjustments. This chapter investigates
    these cycles and other cryptoasset trends. Not only will this knowledge reassure
    investors facing the naturally wild fluctuations of their investments, but it
    will also contribute to some valuation methods investigated later in the book.'
