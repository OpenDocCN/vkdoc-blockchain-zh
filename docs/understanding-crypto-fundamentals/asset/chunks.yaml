    ## 回归法定货币


    然而，美国试图通过印刷超过其黄金储备量的美元来逃避这一义务。随着外国政府察觉到这一伎俩，它们纷纷将手中的美元兑换成黄金。20 世纪 70 年代初，美国不得不采取行动，阻止真实价值流失到国外。


    1971 年夏天，美国总统尼克松终止了美元与黄金的直接兑换。这一决定实际上标志着布雷顿森林体系的终结。由于其他主要大国主要持有美元作为央行储备，它们也纷纷效仿，放弃了与黄金的固定汇率。其结果是，货币变成了法定货币^(¹⁷)，其价值仅靠对政府信用的信任来支撑。


    然而，取消金本位制，同时也取消了施加在政府身上的约束。随着这一转变到法定货币体系，政府可以通过印刷更多本国货币来随心所欲地支出。它们可以多年运行不受控制的赤字，而无需平衡预算。正如本章中的历史例子所示，人们无法通过印刷更多货币来创造新的价值。新印刷货币的价值来自于流通中的现有货币。每一张新美元都会稀释所有现有美元的价值。印刷新美元钞票实际上是将购买力从拥有储蓄的个人和公司转移到印钞实体手中。这是一种以储蓄价值不断下降为形式的储蓄税。正如诺贝尔奖得主米尔顿·弗里德曼所言："通货膨胀是一种无需立法的税收。"


    正如经济理论所预测的那样，当政府印刷这些货币时，其购买力下降，随之而来的是物价上涨。如图 1-6 所示，在布雷顿森林体系之后，公民以现金形式持有的毕生积蓄在短短几年内就损失了一半的价值：以美元为例，不到十年。这种价值侵蚀在整个世纪及以后的时间里持续进行。特别是，1971
    年留出的`$100`在一代人之后的 2001 年仅值约`$20`。尽管政治相对稳定，但事实证明，没有黄金支持的现金再次成为一种低效的价值储存手段。


    ![](img/600732_1_En_1_Fig6_HTML.jpg)


    一张从 1971 年到 2022 年，1971 年 100 美元价值随时间变化的折线图。它描绘了一条急剧下降至 1980 年，然后逐渐下降的曲线。


    图 1-6 1971 年`$100`价值直至 2022 年的变化，反映了布雷顿森林体系后时期以消费者价格指数衡量的美国通胀（来源：Macrotrends ([`www.macrotrends.net`](http://www.macrotrends.net))
    及自行计算）


    这种货币价值的侵蚀并非美元独有；日元、瑞士法郎和英镑也呈现出类似的趋势，因为其相应的央行持续印刷更多货币。


    虽然上述数字对于储户来说已经很不幸——他们的储蓄价值像阳光下的冰淇淋一样随时间融化——但现实甚至更为严峻。这是因为这些数字使用的是消费者价格指数（CPI）来衡量通胀。由于
    CPI 在其计算中使用了"恒定满意度水平"的概念，它低估了通胀。具体而言，CPI 衡量的是由消费者支出习惯定义的一篮子商品的价格。然而，它并未考虑作为对通胀反应的支出习惯的变化。


    为了说明这一点，假设消费者通常每周吃一次沙朗牛排，然后发生了所有价格翻倍的通货膨胀事件。工资不变的消费者必须改变他们的消费习惯。他们将每周的沙朗牛排替换为鸡胸肉。通胀事件后的鸡胸肉价格可能与通胀事件前的沙朗牛排相同。虽然实际通胀会显示
    100% 的增长（价格翻倍），但 CPI 却显示 0% 的通胀：一篮子商品发生了变化，使得通胀事件前后的成本相同。确实，消费者前后花费的金额相同，但基础商品的质量下降了。换句话说，计算
    CPI 的指标直接受到其所衡量对象的影响。因此，实际通胀远高于 CPI 所暗示的水平。^(¹⁸) 这意味着购买力的下降速度甚至比上图所示的还要快。


    尽管如此，法定货币购买力的下降为黄金持有者带来了机会。特别是在布雷顿森林体系后的头十年里，一盎司黄金的市场价格翻了 16 倍。它从 1971 年夏天的`$40`增长到
    70 年代末的`$600`以上。换句话说，真实价值并没有消失；相反，它只是从法定货币持有者转移到了"真实"货币——黄金——的持有者手中。


    ![](img/600732_1_En_1_Fig7_HTML.jpg)


    一张从 1950 年到 1981 年，布雷顿森林体系期间及之后一盎司黄金市场价格的折线图（以美元计）。它描绘了一条呈上升趋势并伴有波动的曲线。1950 年至
    1971 年为布雷顿森林体系的阴影区域，黄金价格稳定在每盎司 35 美元。


    图 1-7 布雷顿森林体系期间及之后一盎司黄金的市场价格（以美元计）（来源：Macrotrends ([`www.macrotrends.net`](http://www.macrotrends.net))
    及自行计算）


    ## 加快印钞速度


    20 世纪的最后 15 年以持续的宏观经济稳定为标志，因为货币政策侧重于遏制通胀，而非增加产出和限制失业。然而，新千年伊始，随着互联网泡沫破裂，美国和发达国家陷入了另一场衰退。


    为了应对这场衰退，央行降低了利率。^(¹⁹) 然而，人为降低利率会激励商业银行向企业和个人发放更多贷款。私人信贷的增长成为现实，尤其是在房地产领域。以历史低利率对现有抵押贷款进行再融资的活动激增，次级贷款市场的融资也蓬勃发展。廉价的信贷将房地产价格推至新高，远高于其经济价值。这个泡沫膨胀了几年，然后在
    2007 年破裂，从而引发了另一场危机：大衰退。多种因素加剧了这场危机，但这超出了本书的讨论范围。然而，值得注意的是，央行在其利率已处于历史低位时如何应对另一场危机。在将利率进一步下调（降至负值区间，这在以前的金融教科书里被认为是不可能的）之后，接下来的货币政策工具向系统注入了更多的流动性。技术上，央行称之为量化宽松，但根本上，这仅仅意味着更多地印刷货币。^(²⁰)


    由于这种廉价的融资，大多数政府达到了创纪录的债务水平。例如，美国的债务与 GDP 之比从 2007 年的 62% 飙升至 2010 年的 90%。在同一三年期间，欧盟的这一比率从
    62% 增加到 80%。在私人市场上，这种不可持续的赤字状况通常以破产告终。然而，对于现代政府而言，央行可以实现更多地印钞以使债务贬值，从而暂时避免违约。


    在接下来的十年里，前所未有的监管浪潮席卷了金融体系。金融和监管当局试图升级一个有缺陷的系统，而不是从根本上重新思考它。当它们努力改进旧系统时，一个全新的系统出现了。这个新系统并非旨在增加对基于法定货币的金融体系的信任，而是要使信任不再必要。就在这时，比特币腾飞了。

