- fmt: '### Historical VaR


    Instead of using theoretical values, one could reduce the number of assumptions
    in the computation and use historical values. It is precisely what the historical
    VaR does.


    Specifically, one could, for example, gather the last 200 weekly returns for Bitcoin
    and identify that in 90% of the cases (180 observations), the return for that
    asset is better than –10.1%.^([^(103)](#fn103)) Given the data sample gathered,
    the weekly historical VaR would suggest an expected loss of that value at the
    90% probability level.


    A yearly (instead of weekly) historical VaR is less reliable for cryptoassets
    because of the much lower number of observations available and given the pace
    of development of the assets (Bitcoin 10 years ago had a materially different
    risk-return profile than five years ago, which was again very different from today).
    Nevertheless, a similar analysis is also possible. For example, Bitcoin’s yearly
    historical VaR yields a value of +60% at the 50^(th) percentile. In other words,
    half of the last ten observations for Bitcoin indicate a yearly gain of at least
    60%.


    An approach to address the outdatedness of data is to give a weight to each historical
    data point, where older observations have a lower weight and more recent observations
    have a higher weight. Richardson et al. suggested this approach in 1997 to consider
    more heavily the current macroeconomic conditions and volatilities while at the
    same time not ignoring older data completely.^([^(104)](#fn104)) Given the high
    pace of development of the cryptoasset industry, a similar approach is recommended.
    One possible way of applying this method is by having weights decline exponentially
    with recency.


    ### Monte Carlo VaR


    The Monte Carlo method^([^(105)](#fn105)) is a statistical approach to model the
    probability of a specific outcome in a process that considers many variables.
    A computer runs thousands of simulations for input variables (e.g., inflation,
    interest rates, GDP growth, cryptoasset adoption growth, and other market conditions).
    Since these variables impact one another, their combined effect is much less straightforward
    to understand than analyzing them independently. The many simulations output a
    specific portfolio value at a certain likelihood (e.g., 10^(th) percentile).


    Monte Carlo simulations are a valuable tool for risk management because they allow
    investors to understand the potential impact of many scenarios where variables
    interact in a complex way.


    ### Characteristics of VaR Metrics


    On the one hand, VaR metrics are helpful because they can compare likes-for-likes
    regardless of the asset class under consideration. On the other hand, they are
    also limited because they do not consider extreme cases. For example, a VaR of
    –10% at the 5^(th) percentile does not reveal whether the last five percent of
    cases would yield returns between –10% and –15% or would yield returns close to
    –100%. In other words, these metrics do not consider extreme moves (or *black-swan
    events*), which are not uncommon in the cryptoasset industry.


    Another limitation of the historical VaR is that it is, by definition, a backward-looking
    metric, not considering recent developments or likely future developments. The
    analytical VaR, in contrast, is highly dependent on assumptions. For these reasons,
    none of these metrics alone can establish an investment’s complete financial risk
    profile. Instead, they should be considered together to give investors a better
    understanding of the type and level of risk they face.


    Regulators extensively use VaR metrics to define the level of risks banks are
    allowed to take and the level of capital they need to hold to cover that risk.^([^(106)](#fn106))
    While it is not yet broadly present in the cryptoasset industry, it is reasonable
    to assume VaR metrics will play a role in future cryptoasset regulation. In particular,
    cryptoasset funds and centralized exchanges could be subject to VaR measurement
    and reporting in the future. One can also speculate whether decentralized platforms
    holding cryptoassets may face similar regulatory requirements in the future.


    ## Roy’s Safety-First Criterion


    One of the most cited measures of downside risk is Roy’s safety-first criterion,
    proposed by André Roy in 1952 as a metric to optimize portfolio selection under
    risk constraints. Fundamentally, it is an optimization problem aiming to maximize
    the expected return of a portfolio under the constraint that the probability of
    a loss of a certain amount is not superior to a specific value.


    For example, it would maximize a portfolio’s expected return under the constraint
    that the expected loss is not bigger than –5% at a 95% probability. Alternatively,
    it could target at least a return of +1% at a 90% probability. Roy’s safety-first
    ratio is computed as follows.


    ![$$ Safety\ First\ Ratio=\frac{expected\ return- minimum\ return}{standard\ deviation\
    of\ return} $$](images/600732_1_En_14_Chapter/600732_1_En_14_Chapter_TeX_Equb.png)


    In this equation, “minimum return” is the minimum acceptable return by the investor.
    It is very similar to the Sharpe ratio introduced in Chapter [4](#600732_1_En_4_Chapter.xhtml).
    The only difference is that the minimum acceptable level of return for the investor
    replaces the risk-free rate of return from the Sharpe ratio. Investors worried
    about cryptoasset volatility can consider using a similar approach to define the
    share of their total portfolio to allocate to cryptoassets. Since adding cryptoassets
    to a traditional portfolio will likely increase expected return and (after all
    diversification benefits are factored in) increase the standard deviation of return
    of the total portfolio, optimizing for this equation could provide an “optimal”
    allocation in cryptoassets (e.g., 10%) given the investor’s arbitrary constraints.


    ## Shortfall Risk


    Roy’s safety-first criterion approach draws parallels to a target of minimizing
    shortfall risk (i.e., the risk that a portfolio does not meet a target return
    over a specific period). It is especially relevant for portfolios with long-term
    investment horizons or for portfolios necessary to maintain a specific lifestyle,
    such as retirement portfolios. However, given the “higher risk, higher return”
    characteristics of cryptoasset investments, minimizing shortfall risk suggests
    a lower allocation to cryptoassets than Roy’s safety-first criterion because minimizing
    shortfall risk ignores the benefits of having a return possibly much higher than
    the target.


    ## Expected Shortfall


    The next shortfall risk measure is assessing how bad things get if the wrong scenario
    occurs. It is referred to as *expected shortfall* (or *conditional value at risk*,
    *conditional tail expectation*, or *expected tail loss*) and addresses one limitation
    of traditional VaR metrics. While VaR metrics do not consider how bad things are
    beyond a certain probability level, expected shortfall measures precisely this
    scenario. It is the expected loss on a portfolio over a specific time horizon
    if the portfolio ends beyond a specific percentile of the probability distribution
    (e.g., worst 10% of scenarios).^([^(107)](#fn107))'
