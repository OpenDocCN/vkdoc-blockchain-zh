  trans: "\n### 结构性失衡\n\n当今的金融与货币体系并不稳定。在过去半个世纪（1970–2017 年）中，国际货币基金组织共识别出“151 次银行业危机、236\
    \ 次货币危机以及 74 次主权债务危机”[6]。这相当于平均每年发生十次金融灾难，或者说每五到六周就发生一次。\n\n尽管金融监管机构针对该领域的方方面面不断出台越来越多的监管规定，^(²⁹)但体系的稳定性并未因此改善，年复一年仍经历着数量相当的金融灾难。尽管\
    \ 2008 年大衰退之后出现了前所未有的新监管浪潮，南欧大部分国家的主权债务却变得岌岌可危：因经济危机，94%的委内瑞拉人口生活在贫困之中[7]；阿根廷比索、土耳其里拉和黎巴嫩镑贬值超过\
    \ 95%；还有更多国家遭受着经济灾难。虽然其中一些问题源于金融与货币体系之外，但面对挑战，这些体系并没能维持经济稳定。即使是在最近的 2023 年 5 月，美国主要银行的倒闭也表明，现有（且庞大的）监管体系并不能有效弥补当前体系的内在缺陷。\n\
    \n接下来的分析表明，我们脆弱体系中的问题之所以持续存在，是因为根本原因在于结构性问题：它植根于我们对待货币的基本方式。有效的解决方案不应只治疗经济危机的症状，而应针对这些灾难的根本原因。结构性问题需要结构性的解决方案。\n\
    \n### 顺周期的货币体系\n\n> *在所有组织银行业务的方式中，我们现在所采用的是最糟糕的一种。[……]我相信，变革是不可避免的*[8]。\n> \n\
    > ——默文·金爵士，英格兰银行行长\n\n经济以周期方式运行。当商业繁荣、人们乐观时，经济扩张。然而，当困难出现、对未来信心下降时，经济就会收缩。长周期持续数十年，^(³⁰)而在此期间，较短期的周期也在发生，通常持续几年，一般不到十年。\n\
    \n![](img/600732_1_En_2_Fig1_HTML.jpg)\n\n一张关于产出在 50 至 75 年时间轴上的折线图，显示两个经济周期。长周期在上升趋势曲线中形成波峰和波谷。短周期在其上下波动。\n\
    \n**图 2-1** 经济周期示意图，短周期叠加在长周期之上\n\n部分准备金银行制度的一个关键后果是，银行的行为具有顺周期性。当经济扩张时，银行愿意放贷，人们也愿意借钱创办新企业。正如前一章所述，银行贷款为经济创造了“新”货币，从而支持了经济扩张。然而，当形势恶化时，银行在放贷上会更加谨慎，人们也对借贷信心不足。结果，经济中的货币总量随着借贷减少而下降，从而加剧了经济收缩。\n\
    \n当前货币体系的顺周期性是理解当今经济的关键。这意味着，当经济前景光明时，该体系会鼓励信贷过度膨胀，催生债务泡沫。相反，当金融阴云出现时，信贷可得性降低则会加深经济衰退。\n\
    \n### 货币与金融的可持续性\n\n当前的货币体系是一项已有数百年历史的人为发明。它在中世纪社会中产生，当时并未经过深思熟虑，更谈不上研究如何将其构建为长期稳定的结构。\n\
    \n然而，现代科学为构建一个更好的体系提供了坚实的理论依据。货币领域的远见者们^(³¹)研究了自然生态系统如何运作、繁荣与崩溃。复杂网络具有可预测的结果——从生物系统中的植物到电路中的电子都是如此。特别是，自然生态系统是可持续的；它们已存在数百万年，比人类和我们的货币体系要长久得多。对此类系统的研究揭示了与货币生态系统之间引人注目的相似之处。事实上，经济中的货币类似于人体中的血液、生物体中的能量，甚至社交媒体上的信息。它们是使各自生态系统得以运行的基本流动。在不受干预的情况下，过剩的流向会填补不足，直至系统达到平衡。例如，当电子靠得太近时，它们会相互排斥，从而使它们绕行的能级趋于中性。当生物体过度劳累时，疲劳感会累积并迫使其休息以维持平衡。同样，当某种商品的价格暂时低于其均衡水平时，会有更多人购买；需求的增加会推高价格，直到价格恢复到供需相等的均衡水平。在不受干预的情况下，系统会自行调节以达到平衡。\n\
    \n这些复杂流动网络（货币、血液、能量或信息）在结构上的普遍性，使得驱动其存续的核心特征具有可比性。来自自然生态系统的见解有助于构建一个更具韧性的经济，并避免那些过于频繁且破坏性的金融灾难。可以说，这项研究的主要发现是：当一个生态系统平衡了两种相反的特征——**效率**和**韧性**——时，它就能长期繁荣。\n\
    \n![](img/600732_1_En_2_Fig2_HTML.png)\n\n一幅天平示意图，两侧分别为效率和韧性。效率一侧比韧性一侧更高，指针更接近效率。\n\
    \n**图 2-2** 可持续生态系统的关键特征：平衡效率与韧性\n\n**效率**是指系统中单位时间内处理的流量，即系统的吞吐量。这也是传统货币体系唯一优化的特性。使用单一货币是最有效率的体系：不同的参与者拥有共同的交易媒介，他们无需担心货币的相对估值，所有价格都以同一单位计价。这些优势使得单一货币体系的吞吐量极高，让体系变得**高效**。\n\
    \n然而，另一个关键特性——**韧性**——却基本被忽视了。**韧性**是指复杂网络应对变化的能力；即其在变化环境中生存和适应的能力。正如近期金融灾难的频率和影响所表明的，我们的经济体系令人担忧地缺乏韧性。\n\
    \n也许与直觉相反，自然界并不追求效率最优化，而是追求效率与韧性的健康组合。事实上，任何缺乏韧性的自然生态系统都不会存在至今，供我们研究。同样，一个缺乏效率的系统也无法跨越时代生存和繁荣。\n\
    \n对自然生态系统的研究发现，效率和韧性都取决于一个核心特性：**多样性**。^(³²)然而，其影响方向相反：更高的多样性会增加生态系统的韧性，但同时会降低其效率。\n\
    \n就货币体系而言，更高的多样性意味着使用不止一种货币。换句话说，组织和个人可以出于不同目的并行使用不同的货币。例如，他们可以同时使用一种本地货币、一种区域性货币和一种全球性货币。或者，他们会在一个社区使用一种货币，在另一个社区使用另一种货币。这种本地货币和社区货币具有下文各节中将介绍的许多好处。\n"
- fmt: '## Multiple-Currency Systems


    Multiple currencies working in parallel have been the standard for most of the
    past two millennia. Over this timeframe, the wide acceptance of gold coins made
    them optimal for international trade, while local coins, typically made of less
    valuable metals, supported local transactions. As a result, merchants who dealt
    with local and distant peers regularly switched from one currency to another.


    Modernization established national currencies that became increasingly unique
    and increasingly *efficient*. However, over the past couple of centuries since
    Adam Smith, the traditional economics discipline barely ever questioned the assumption
    that a single currency was the optimal way for the monetary system to operate.


    Yet, even today, we are making regular use of complementary currencies, however
    small they are in proportion to legal tender currency trades. When booking a flight,
    for example, you can use Air Miles as a substitute for payment with legal tender
    currency; hence, it is a form of complementary currency. Of course, usability
    is limited; only a few buyers exist (the airline companies using them), and purchasing
    with Air Miles is only for specific travel-related services. Nevertheless, their
    mere existence proves that even today, people frequently use complementary currencies,
    though often unknowingly.


    Many complementary currency systems in use today extend beyond corporate loyalty
    strategies—for example, cooperative currencies. By their typically local nature,
    communities craft them for local purposes. For instance, they can have specific
    goals such as preserving the environment, incentivizing local trades, empowering
    less fortunate members of society, or other social purposes.


    In Haiti, for example, the Small Farmers Alliance created a “tree currency.” Farmers
    receive tree credits by planting trees or maintaining tree farms. These credits
    are exchangeable for goods and services such as training sessions and livestock.
    In its first few years of existence, this model contributed to planting 6.5 million
    trees while at the same time increasing local incomes, sometimes as high as doubling
    them.


    TimeBanking^([^(33)](#fn33)) is another community currency that exchanges services
    based on the principle that one hour is one hour, regardless of the service performed.
    For example, if Alice teaches cooking to Bob for one hour, she gets one hour of
    credit from Bob. Alice can then spend this credit getting her car fixed by Charlie,
    who can have Bob mow his lawn or mentor his kids. No traditional currency is exchanged,
    only the time credits within the community. One of the objectives of TimeBanking
    is to connect people, create relationships and strengthen bonds within a community
    through acts of goodwill and reciprocity. This model follows the principle of
    equity, valuing everyone’s time equally. TimeBanking is estimated to be used by
    tens of thousands worldwide, split into hundreds of TimeBanks.


    The Local Exchange Trading System (LETS) is another mutual credit system working
    similarly to TimeBanking. However, instead of using time as a base for credit,
    it lets community members negotiate the rate at which to render services. For
    example, one could pay 12 `LETS` for an hour of cooking lessons, 14 `LETS` to
    fix a car, and 10 `LETS` to mow the lawn. The community similarly maintains the
    balance of each member with credits and debits upon every service rendered. This
    system also enables to apply skills that would otherwise be unused to solve needs
    that would otherwise be unaddressed.


    The possibilities and structures of such currencies are limitless. However, they
    often have in common that they are tapping into idle resources (e.g., time that
    would otherwise be spent on less productive tasks) to address unmet needs (e.g.,
    reforestation or tutoring). Consequently, people at the bottom of society typically
    do much better in a society with a dual currency system.


    Contrary to most legal tender currencies, cooperative currencies are usually run
    by the community or a non-governmental organization, not traditional banks or
    governmental entities. Therefore, the community, not a central authority, determines
    the quantity of that currency in circulation.


    In total, more than 4,000 such cooperative currencies were already mature before
    the first bitcoin ever appeared^([^(34)](#fn34)) [8]. The arrival of cryptocurrencies
    vastly increased this number, on top of increasing access through digitalization.


    ## The Wörgl Experiment


    Specific historical examples provide empirical evidence for complementary currencies’
    benefits to economies. In 1932, the consequences of the Great Depression were
    ravaging Europe through high unemployment and low transaction levels. In this
    dire situation, people held on to money as security for uncertain times. In the
    small Austrian city of Wörgl, with a 35% unemployment rate, the mayor addressed
    the problem by convincing the town hall to issue stamp scrips. Stamp scrips are
    a form of credit, which in this case were backed by 5,000 Austrian schillings
    deposited in a local bank. Fundamentally, it was a form of complementary currency
    used as a transaction medium in parallel to the legal tender currency.


    The result of this experiment dwarfed the greatest hopes. In the first year after
    their issuance, the local stamp scrips had circulated among the population 463
    times, which was 14 times faster than the legal tender currency. The same amount
    of value therefore created 14 times more jobs and transactions than traditional
    shillings did. While the rest of Europe continued to experience economic difficulties
    for years, the city of Wörgl prospered, with lower unemployment rates and higher
    living conditions for its citizens than in any comparable city in the region.


    Further evidence of benefits from complementary currencies comes to light in the
    neighboring country, Switzerland.'
  raw: '## Multiple-Currency Systems


    Multiple currencies working in parallel have been the standard for most of the
    past two millennia. Over this timeframe, the wide acceptance of gold coins made
    them optimal for international trade, while local coins, typically made of less
    valuable metals, supported local transactions. As a result, merchants who dealt
    with local and distant peers regularly switched from one currency to another.


    Modernization established national currencies that became increasingly unique
    and increasingly *efficient*. However, over the past couple of centuries since
    Adam Smith, the traditional economics discipline barely ever questioned the assumption
    that a single currency was the optimal way for the monetary system to operate.


    Yet, even today, we are making regular use of complementary currencies, however
    small they are in proportion to legal tender currency trades. When booking a flight,
    for example, you can use Air Miles as a substitute for payment with legal tender
    currency; hence, it is a form of complementary currency. Of course, usability
    is limited; only a few buyers exist (the airline companies using them), and purchasing
    with Air Miles is only for specific travel-related services. Nevertheless, their mere
    existence proves that even today, people frequently use complementary currencies,
    though often unknowingly.


    Many complementary currency systems in use today extend beyond corporate loyalty
    strategies—for example, cooperative currencies. By their typically local nature,
    communities craft them for local purposes. For instance, they can have specific
    goals such as preserving the environment, incentivizing local trades, empowering
    less fortunate members of society, or other social purposes.


    In Haiti, for example, the Small Farmers Alliance created a “tree currency.” Farmers
    receive tree credits by planting trees or maintaining tree farms. These credits
    are exchangeable for goods and services such as training sessions and livestock.
    In its first few years of existence, this model contributed to planting 6.5 million
    trees while at the same time increasing local incomes, sometimes as high as doubling
    them.


    TimeBanking^([^(33)](#fn33)) is another community currency that exchanges services
    based on the principle that one hour is one hour, regardless of the service performed.
    For example, if Alice teaches cooking to Bob for one hour, she gets one hour of
    credit from Bob. Alice can then spend this credit getting her car fixed by Charlie,
    who can have Bob mow his lawn or mentor his kids. No traditional currency is exchanged,
    only the time credits within the community. One of the objectives of TimeBanking
    is to connect people, create relationships and strengthen bonds within a community
    through acts of goodwill and reciprocity. This model follows the principle of
    equity, valuing everyone’s time equally. TimeBanking is estimated to be used by
    tens of thousands worldwide, split into hundreds of TimeBanks.


    The Local Exchange Trading System (LETS) is another mutual credit system working
    similarly to TimeBanking. However, instead of using time as a base for credit,
    it lets community members negotiate the rate at which to render services. For
    example, one could pay 12 LETS for an hour of cooking lessons, 14 LETS to fix
    a car, and 10 LETS to mow the lawn. The community similarly maintains the balance
    of each member with credits and debits upon every service rendered. This system
    also enables to apply skills that would otherwise be unused to solve needs that
    would otherwise be unaddressed.


    The possibilities and structures of such currencies are limitless. However, they
    often have in common that they are tapping into idle resources (e.g., time that
    would otherwise be spent on less productive tasks) to address unmet needs (e.g.,
    reforestation or tutoring). Consequently, people at the bottom of society typically
    do much better in a society with a dual currency system.


    Contrary to most legal tender currencies, cooperative currencies are usually run
    by the community or a non-governmental organization, not traditional banks or
    governmental entities. Therefore, the community, not a central authority, determines
    the quantity of that currency in circulation.


    In total, more than 4,000 such cooperative currencies were already mature before
    the first bitcoin ever appeared^([^(34)](#fn34)) [8]. The arrival of cryptocurrencies
    vastly increased this number, on top of increasing access through digitalization.


    ## The Wörgl Experiment


    Specific historical examples provide empirical evidence for complementary currencies’
    benefits to economies. In 1932, the consequences of the Great Depression were
    ravaging Europe through high unemployment and low transaction levels. In this
    dire situation, people held on to money as security for uncertain times. In the
    small Austrian city of Wörgl, with a 35% unemployment rate, the mayor addressed
    the problem by convincing the town hall to issue stamp scrips. Stamp scrips are
    a form of credit, which in this case were backed by 5,000 Austrian schillings
    deposited in a local bank. Fundamentally, it was a form of complementary currency
    used as a transaction medium in parallel to the legal tender currency.


    The result of this experiment dwarfed the greatest hopes. In the first year after
    their issuance, the local stamp scrips had circulated among the population 463
    times, which was 14 times faster than the legal tender currency. The same amount
    of value therefore created 14 times more jobs and transactions than traditional
    shillings did. While the rest of Europe continued to experience economic difficulties
    for years, the city of Wörgl prospered, with lower unemployment rates and higher
    living conditions for its citizens than in any comparable city in the region.


    Further evidence of benefits from complementary currencies comes to light in the
    neighboring country, Switzerland.'
  trans: '

    ## 多货币体系


    在过去两千年的大部分时间里，多种货币并行流通一直是常态。在这一时期，金币因其广泛接受度成为国际贸易的理想媒介，而当地硬币（通常由价值较低的金属制成）则支撑着本地交易。因此，与本地和远方同行打交道的商人需要频繁地在不同货币之间进行转换。


    现代化进程催生了各国货币，它们变得日益独特且越来越*高效*。然而，自亚当·斯密以来的几个世纪里，传统经济学学科几乎从未质疑过“单一货币是货币体系最优运作方式”这一假设。


    但即便在今天，我们也在经常使用补充货币（相对于法定货币交易而言，其规模可能很小）。例如，预订航班时，你可以使用航空里程代替法定货币支付；因此，它是一种补充货币形式。当然，其可用性有限：只有少数买家（使用该里程的航空公司），且使用航空里程仅限于购买特定的旅行相关服务。尽管如此，它们的存在本身就证明，即使在今天，人们仍频繁使用补充货币，尽管常常并未意识到。


    如今使用的许多补充货币体系已超越了企业忠诚度策略，例如合作货币。这类货币通常具有本地属性，由社区为本地目的而创造。例如，它们可以服务于特定目标，如保护环境、激励本地贸易、赋能社会弱势群体或其他社会目的。


    例如，在海地，小农联盟创造了一种“树木货币”。农民通过植树或维护林场获得树木积分。这些积分可兑换商品和服务，例如培训课程和牲畜。在该模式推行的头几年，它帮助种植了
    650 万棵树，同时提高了当地居民的收入，有时甚至翻了一番。


    时间银行^(³³)是另一种社区货币，它基于“一小时就是一小时”（无论提供何种服务）的原则来交换服务。例如，如果爱丽丝教鲍勃烹饪一小时，她就能从鲍勃那里获得一小时的积分。然后，爱丽丝可以用这笔积分让查理帮她修车，而查理则可以让鲍勃帮他修剪草坪或辅导孩子。整个过程中没有传统货币的交换，只有社区内部的时间积分流转。时间银行的目标之一是通过善意和互惠的行为，在社区内连接人们、建立关系并加强纽带。这种模式遵循公平原则，平等地衡量每个人的时间价值。据估计，全世界有数万人使用时间银行，分布在数百家时间银行中。


    本地交易交换系统（LETS）是另一种类似于时间银行的互助信用体系。不过，它不将时间作为信用基础，而是让社区成员自行协商提供服务的费率。例如，你可能会支付 12
    个`LETS`来获得一小时的烹饪课，支付 14 个`LETS`来修车，支付 10 个`LETS`来修剪草坪。社区同样会记录每次服务后每位成员的余额增减（借贷记账）。这个系统也使得人们能够运用原本可能闲置的技能，来满足原本可能无法被解决的需求。


    此类货币的可能性和结构是无限的。然而，它们通常有一个共同点：利用闲置资源（例如，本可能花在低效任务上的时间）来满足未得到满足的需求（例如，重新造林或辅导功课）。因此，在社会底层人群中，生活在双货币体系社会中的人通常会表现得更好。


    与大多数法定货币相反，合作货币通常由社区或非政府组织运作，而非传统银行或政府实体。因此，流通中该货币的数量由社区决定，而非中央权威机构。


    总的来说，在第一个比特币出现之前，已经有超过 4000 种此类合作货币发展成熟^(³⁴) [8]。加密货币的到来极大地增加了这个数字，同时也通过数字化提高了获取这些货币的便利性。


    ## 沃格尔实验


    特定的历史实例为补充货币对经济的益处提供了经验证据。1932 年，大萧条的后果正肆虐欧洲，表现为高失业率和低交易水平。在这种严峻形势下，人们囤积货币以应对不确定的未来。在失业率达
    35%的奥地利小城沃格尔，市长采取了行动，说服市政厅发行印花代金券。印花代金券是一种信用凭证，在此案例中，它以存入当地银行的 5000 奥地利先令作为担保。从根本上说，它是一种与法定货币并行的交易媒介形式的补充货币。


    这项实验的成果远超人们最大胆的期望。在发行后的第一年，当地的印花代金券在人群中流通了 463 次，比法定货币的流通速度快了 14 倍。因此，同等价值创造的就业和交易量是传统先令的
    14 倍。当欧洲其他地区在此后数年间持续经历经济困境时，沃格尔市却繁荣起来，其失业率低于该地区任何可比城市，市民生活条件也更优越。


    补充货币带来益处的进一步证据出现在邻国瑞士。

    '
- fmt: "# The Swiss Miracle\n\nIn 1934, from the ashes of the Great Depression rose\
    \ an important credit network in Switzerland: the *Wirtschaftsring* (German for\
    \ “Economic Circle”), or `WIR`. The Swiss `Wirtschaftsring` is a centralized credit\
    \ clearing system with over 50,000 members and is the largest and longest-surviving\
    \ community currency. Users of the `WIR` system can use `WIR` credits and debits\
    \ to purchase from suppliers and sell to customers as an alternative to the Swiss\
    \ franc. While most users are small and medium-sized companies, some households\
    \ are also part of the network. The goods exchanged are broad and diversified,\
    \ ranging from legal services to second-hand cars and paintings. Today, `WIR`\
    \ transactions clear in seconds via smartphones.\n\nWhile using traditional currencies\
    \ involves settling corporate trades after a specific number of days (for example,\
    \ a 2% discount if paid within 30 days or net if paid within 90 days), the `WIR`\
    \ system enables immediate settlement of trades. Thus, it is a system of moneyless\
    \ clearing of debits and credits with the emitting `WIR` bank. Creditors are therefore\
    \ incentivized to trade using the `WIR` system of bridge financing for payments\
    \ because it improves their working capital (money needed to run a company’s regular\
    \ operations).\n\nAlso, the debits and credits are not redeemable in the local\
    \ legal tender currency, the Swiss franc. Therefore, they must remain in the system\
    \ to have value, promoting local trade. Accepting `WIR` credits thereby gives\
    \ another incentive to corporations, which become prioritized over companies accepting\
    \ exclusively Swiss francs.\n\nA major macroeconomic consequence of this system\
    \ is that it behaves counter-cyclically in the short run. In other words, companies\
    \ use the `WIR` system more during recessions, where cash is scarce. Companies\
    \ are more willing to use the `WIR` system in these challenging times because\
    \ they hold on to their Swiss francs tighter. The number of `WIR` users peaked\
    \ at over 80,000 during the 2000 crisis, testifying to this thesis. Also, `WIR`\
    \ turnover tends to increase with unemployment in Switzerland. It is challenging\
    \ to accurately measure the impact of such a complementary currency network on\
    \ an economy’s stability. Nevertheless, indicators suggest that providing companies\
    \ with a substitute currency when Swiss francs are unavailable tends to limit\
    \ the downsides of economic cycles.\n\n## Incentives Due to Currency Devaluation\n\
    \nThe current economy tends to value the present more than the future because\
    \ fiat currencies lose value over time. When facing a yearly 2% decrease in a\
    \ currency’s value (a best-case scenario for most fiat currencies), $100 today\
    \ is worth the same as $102 next year. The nature of compounding amplifies this\
    \ impact many times in the distant future. Under the same 2% yearly attrition,\
    \ a project needs a $724 cash flow in 100 years to be worth the same as $100 today.\
    \ The unfortunate consequence of this reality is that companies favor projects\
    \ with short payback periods over long-term projects. As a result, incentives\
    \ are such that investing in a decade-long forest management plant in the Amazona,\
    \ for example, is less attractive financially than maximizing the next quarterly\
    \ earnings.\n\nHowever, these incentives change with the nature of the currency.\
    \ For example, a complementary currency increasing in value over time incentivizes\
    \ one to value the future more than the present. A project with long-term cash\
    \ flows could become more financially interesting than one with equivalent cash\
    \ flows today.\n\n## A Possible Future\n\nA world where complementary currencies\
    \ become the standard could help stabilize economies, incentivize local trades,\
    \ and support social communities. Several payment media established vertically\
    \ (for example, global, regional, and local currencies) and horizontally (different\
    \ currencies for communities with different purposes) could benefit all parties\
    \ involved.\n\nFor example, `Bitcoin` could become a global store of value, the\
    \ role historically taken by gold. Another cryptoasset could become a global payment\
    \ medium, while national currencies are alternatives used for tax purposes and\
    \ possible redistribution of wealth. In parallel, a regional credit network like\
    \ the `WIR` in Switzerland would facilitate corporate transactions. In addition,\
    \ a provincial currency would incentivize behaviors impacting climate, such as\
    \ planting trees or recycling waste, and a local cooperative currency would support\
    \ social endeavors, such as tutoring children or caring for the elderly.\n\nIf\
    \ such a world sounds less efficient than the current standard in which each nation\
    \ has a single currency, it is because it would indeed be less *efficient*. However,\
    \ the benefits of this diversity would likely largely compensate for the lower\
    \ efficiency. These include reducing the impact of economic downturns and matching\
    \ unused resources with unmet needs for less fortunate members of society. Therefore,\
    \ such a model has reasonable grounds to become superior. In addition, all these\
    \ currencies could be digital and used seamlessly through a mobile phone, making\
    \ the lower “efficiency” much less relevant than the first intuition suggests.\n\
    \n## Key Concepts\n\nThe current economic system is deeply unstable. While designed\
    \ for efficiency, it drastically lacks resilience and, as a result, is subject\
    \ to frequent collapses (worldwide, about ten financial disasters every year).\
    \ Insights from natural ecosystems identify that our single-currency model may\
    \ be the main cause of this lack of resilience. Empirical evidence supports these\
    \ findings. Indeed, cities and regions using complementary currencies in parallel\
    \ to legal tender currencies have shown remarkable advances (economic, environmental,\
    \ or social), where all stakeholders benefited in exceptional ways.\n\nThe permanent\
    \ devaluation of fiat currencies provides incentives to value the present more\
    \ than the future. A store of value (e.g., `Bitcoin`) not devalued over time through\
    \ excessive printing and working in parallel to local currencies meant as media\
    \ of payment could realign incentives for the longer-term focus of financial investments.\
    \ Long-term projects could become the priority over short-term ones, incentivizing\
    \ sustainable management of resources.\n\n## Extension Questions\n\nAssuming its\
    \ legality, what are the pros and cons of a local currency running in parallel\
    \ to its country’s legal tender?\n\nWhat could be the consequences of a world\
    \ where `Bitcoin` acts as a global store of value, `Ethereum` as a global medium\
    \ of payment, and national currencies as alternative local media of payments?\n\
    \nWhat does `Bitcoin` need to become not only a global store of value, but also\
    \ the standard medium of payment and unit of account?\n\nFootnotes [1](#600732_1_En_2_Chapter.xhtml#Fn1_source)\
    \ [2](#600732_1_En_2_Chapter.xhtml#Fn2_source) [3](#600732_1_En_2_Chapter.xhtml#Fn3_source)\
    \ [4](#600732_1_En_2_Chapter.xhtml#Fn4_source) [5](#600732_1_En_2_Chapter.xhtml#Fn5_source)\
    \ [6](#600732_1_En_2_Chapter.xhtml#Fn6_source) [7](#600732_1_En_2_Chapter.xhtml#Fn7_source)\
    \ [8](#600732_1_En_2_Chapter.xhtml#Fn8_source) [9](#600732_1_En_2_Chapter.xhtml#Fn9_source)\
    \ [10](#600732_1_En_2_Chapter.xhtml#Fn10_source) [11](#600732_1_En_2_Chapter.xhtml#Fn11_source)\n\
    \n# Blockchain As a Force for Good\n\n> *Men are only as good as their technical\
    \ development allows them to be.*\n> \n> —George Orwell\n\nWhile the previous\
    \ chapters focused on money, revolutionary promises of cryptoassets extend well\
    \ beyond the monetary sector. In particular, the underlying blockchain technology\
    \ can become a force for the greater good through countless use cases. Here is\
    \ just a glimpse of possible applications and their likely positive impact."
