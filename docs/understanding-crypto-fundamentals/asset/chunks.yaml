- fmt: '# Major Forks and Blockchain Concepts


    Major forks have happened in the past, though. For example, in mid-2017, some
    miners theorized that block size is one factor limiting Bitcoin’s scalability.
    They suggested increasing the block size from 1 MB to 8 MB, thereby hard-forking
    from Bitcoin’s blockchain and creating Bitcoin Cash. On August 1, 2017, Bitcoin
    (`BTC`) holders at block 478,558 were eligible to claim an amount of Bitcoin Cash
    (`BCH`) equivalent to their Bitcoin holdings. As a result, Bitcoin and Bitcoin
    Cash blockchains run in parallel, are priced differently and are sometimes even
    considered different instruments. For example, Bitcoin could be seen as a store
    of value, while Bitcoin Cash as a medium of payment.


    An infamous example of a hard fork relates to the 2016 disaster of The DAO, also
    coined the “DAOsaster.” [25] The DAO^([^(63)](#fn63)), standing for The Decentralized
    Autonomous Organization, was an open source digital venture capital fund directed
    by its investors. They sent ethers to get tokens from The DAO, thereby voting
    rights. They could then vote on which start-up The DAO would invest in. In June
    2016, a vulnerability in the code of The DAO enabled users to redirect $50 million,
    one-third of all funds of The DAO, to a private account. At the time, it represented
    14% of all existing ethers. This event led to the highly controversial hard fork
    of Ethereum: Ethereum (`ETH`) reinstated the funds as before the hack, while Ethereum
    Classic (`ETC`) continued working as before. `ETC` proponents advocate one motto
    behind decentralized ledger technologies, “code is law.” In their view, correcting
    past events would prove the lack of decentralization of the network.


    Vitalik Buterin, the co-founder and leading developer of Ethereum, argues that
    as Ethereum was still in its early days (in its first year of existence) and under
    development, this exceptional correction would not undermine the integrity of
    Ethereum’s values. As for `BTC` and `BCH`, `ETH` and `ETC` run in parallel, with
    wildly different valuations.


    ## Public vs. Private Blockchains and Hybrids


    Blockchains differ depending on whether they are public or private. A public blockchain
    is open to anyone at any time in a decentralized way. In contrast, a (fully) private
    blockchain is only partially decentralized and limited to a single organization.


    Most cryptoassets mentioned in this book are based on public blockchains. However,
    in some cases, private blockchains can be more appropriate. Private blockchains
    offer higher transaction speed, lower transaction costs, and higher efficiency
    than public ones. As a result, they can become the favored option of private companies
    to manage internal data flows as an alternative to traditional databases.


    What is the difference between a private blockchain and a traditional database?
    Technically, traditional databases use a centralized client-server model. In comparison,
    private blockchains are partially decentralized and use a peer-to-peer model based
    on cryptography. As a result, the private blockchain provides more data integrity
    than a traditional database but is slower and more expensive than the traditional
    model.


    In the mid-2010s, these concepts further evolved to give birth to hybrid blockchains,
    also known as consortiums, which mix public and private blockchains. In a consortium
    blockchain, a pre-defined set of nodes would control the blockchain. For example,
    a dozen financial institutions could form a consortium, agreeing that two-thirds
    must agree for the next block to be mined. Therefore, such a model is neither
    a public blockchain nor a fully private one. Another hybrid alternative is to
    use a private blockchain that is interoperable with a public one.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig13_HTML.png)


    A chart has 3 columns with characteristics. Public blockchain includes peer to
    peer model and highly decentralized, among others. Private includes peer to peer
    model and partially decentralized, among others. Traditional includes client server
    model and typically centralized, among others.


    **Figure 6-13** Comparison of key characteristics of public blockchains, private
    blockchains, and traditional databases


    ## Is Blockchain Going to Replace All Databases?


    The short answer is no. When given a hammer, one tends to see nails everywhere.
    Blockchain is a relatively new tool (a hammer) useful in some specific cases but
    not one to replace all other tools. Not all databases are nails. The large majority
    of them do not need to be decentralized. And if one needs immutability, some centralized
    database systems can provide it at a lower cost than blockchain solutions. Figure
    [6-14](#600732_1_En_6_Chapter.xhtml#Fig14) summarizes in a simplified way when
    a blockchain is the preferred option for managing data flows.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig14_HTML.png)


    A flowchart with questions such as, is data centrally managed, is high data throughput
    necessary, should data be mutable, are contributors trusting each other, and is
    access available to anyone. Yes leads to use of traditional database. Yes in last
    question to public blockchain and no to private.


    **Figure 6-14** Choice of a database based on data characteristics


    Nevertheless, in some cases, blockchains are transformational. Money is a straightforward
    example, but this revolution extends to insurance, identity management, music,
    art, supply chain, and countless other industries.


    ## Updating a Ledger Under Proof of Stake


    In the mid-2010s, an alternative to `PoW`, proof of stake (`PoS`), was developed
    to improve the original mechanism. In particular, it tackled the high energy consumption
    implied by thousands of miners competing to solve the same problem. Indeed, a
    crucial difference with `PoW` is that instead of having a winner-takes-all race
    to mine the next block, the `PoS` validator is selected before the effort is provided.
    This selection is based on the “stake” that the node has in the system (i.e.,
    on the amount of the system’s native cryptoasset that the node holds). In simple
    terms, if a node holds 2% of the existing supply of a `PoS` cryptoasset, then
    this node has a 2% chance of being selected as the next block proposer. Contrary
    to `PoW`, it does not require billions of hashes. The effort is therefore comparatively
    tiny.


    Once the block is proposed, a committee based on members’ stakes in the network
    assesses whether the block is valid. The members can approve or reject the block.
    If the block is approved by the majority (typically two-thirds), it is appended
    to the blockchain. The main drawback of `PoS` is that wealthy nodes are more likely
    to become validators, which tends to centralize the decision power on the network.
    Besides, any such tendency toward centralization is a big deal for blockchains
    because their main purpose is to offer decentralized alternatives to traditional,
    centralized models.


    `PoS` and `PoW` are fundamentally different. The former is secured internally
    (by economic incentives in its code), while the latter is secured externally (by
    the number and decentralization of miners). Neither is better, the same way no
    car is the “best” for all purposes; some fit better in specific contexts or for
    specific goals.


    As of 2023, `PoS`-like mechanisms are becoming the dominant consensus protocol
    for public blockchains, with the most important exception of Bitcoin.'
