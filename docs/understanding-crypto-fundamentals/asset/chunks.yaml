- fmt: '# Valuation from Comparables


    Using existing commodities’ market capitalization to establish Bitcoin’s value
    is also possible more directly, independently from the stock-to-flow ratio. However,
    the upcoming model (also focused on Bitcoin) relies extensively on arbitrary assumptions.
    In particular, Bitcoin’s comparables method relies on the function that the asset
    is assumed to hold. It estimates how much it captures market share from other
    assets currently filling this function.


    Arguably the most basic function of Bitcoin is as a store of value, a function
    that has traditionally been borne by gold. Indeed, when traditional savers aimed
    to keep the value of their savings over time, gold was the asset class of choice.
    Of course, it is not the only function gold has assumed, and it is not the only
    asset assuming this function, but let us start with this simple example and extend
    it as we go along.


    A simplified comparables approach could work as follows. Analysts are invited
    to refine each assumption to more accurate values for a better estimate. As of
    2023, gold has a total market capitalization of about 12 trillion dollars. Approximately
    46% of it exists in jewelry, 17% is held by central banks as reserves, and 22%
    as bars and coins outside of central banks, while the remaining 15% is held in
    other forms.^([^(118)](#fn118)) It is reasonable to assume that central bank reserves
    in gold and privately owned gold bars and coins fully assume the role of a store
    of value. In addition, let us assume that half of the existing jewelry is used
    as a store of value, and so is half of the other forms of gold (arbitrary assumptions).
    As per these assumptions, the market value of gold’s store of value function would
    therefore be $8.3 trillion.


    ![$$ \$12T\times \left(17\%+22\%+\frac{46\%}{2}+\frac{15\%}{2}\right)=\$8.3T $$](images/600732_1_En_16_Chapter/600732_1_En_16_Chapter_TeX_Equb.png)


    Conservatively assuming that Bitcoin “only” captures 20% of that market by the
    end of the decade (another arbitrary assumption), in addition to its current market
    capitalization of about $0.6 trillion, it would grow to a total value of $2.3
    trillion based on this function and on the capture of gold’s market share alone.
    Of course, other asset classes such as stocks (ca. $106 trillion), bonds (ca.
    $124 trillion), and real estate (ca. $327 trillion) are also, in part, stores
    of value. Conservatively assuming that Bitcoin “only” captures 3% of its total
    market by the end of the decade, Bitcoin’s market capitalization would grow to
    $19 trillion, or $905,000 per coin.


    ![](images/600732_1_En_16_Chapter/600732_1_En_16_Fig5_HTML.jpg)


    A treemap chart plots real estate, bond, stock, gold, and crypto. Real estate
    has the biggest occupied region, while crypto has the smallest occupied region.


    **Figure 16-5** — The relative market capitalization of different asset classes
    (Sources: CoinMarketCap for crypto, Savills for gold and real estate, SIMFA Capital
    Markets Fact Book for stock and bond markets)


    Furthermore, Bitcoin also assumes other functions than only a store of value.
    For example, it is also valued as an international payment medium, settling transactions
    permanently in instants. In this sense, it is superior to many existing transaction
    methods. It will likely also capture a share of the transaction market from incumbents
    such as Western Union, Visa, or Mastercard.


    For example, this valuation can be established based on a comparison with the
    existing supply of fiat currencies. The total value of fiat currencies is about
    $50 trillion worldwide as of early 2023. This figure is the narrow definition
    of currency supply (“M1” in economics terms), which consists of banknotes, coins,
    and overnight deposits (it excludes other financial assets, such as bonds, stocks,
    real estate, and gold). Therefore, this definition represents the total wealth
    used as a medium of exchange and excludes assets meant as a store of value. With
    an approach similar to the aforementioned valuation for a store of value, one
    can value Bitcoin based on comparable media of exchange and expected capture of
    their market share. The medium-of-exchange value resulting from such an estimate
    should be added to its store-of-value valuation, bringing this comparables-based
    valuation of Bitcoin well above the $1 million mark per bitcoin by the end of
    the decade.


    Finally, the preceding figures assume that Bitcoin’s total market value is divided
    by 21 million. However, as previously covered, it is more reasonable to assume
    that many bitcoins (at least 20%) are permanently lost. The price per bitcoin
    would therefore be correspondingly larger. In conclusion, even using conservative
    estimates, it is fair to value Bitcoin much higher than its current price level.


    # Network Value to Transactions Ratio


    Moving away from the store-of-value function and focusing on the medium-of-payment
    function of cryptoassets, it is useful to measure the price-to-transaction relationship
    of different assets. In the same way that stocks are compared based on their price-to-earnings
    ratio, cryptoassets can be compared based on their network value-to-transactions
    (NVT) ratio.


    ![$$ NVT=\frac{network\ value}{transaction\ volume} $$](images/600732_1_En_16_Chapter/600732_1_En_16_Chapter_TeX_Equc.png)


    In a 2017 Forbes article, Willy Woo introduced this ratio to assess whether Bitcoin
    was in a bubble.^([^(119)](#fn119)) It identified that the volume of transactions
    and the market capitalization of Bitcoin were closely related, especially as Bitcoin
    matured. When the ratio climbs significantly above its normal range, it could
    indicate a bubble, as was, for example, the case for Bitcoin in 2014. Other cryptoassets
    can be analyzed with the same metric since the logic is not Bitcoin-specific.
    However, while the network’s value is typically in line with usage, this relationship
    does not always hold. For example, staking rewards are reflected as transactions
    but do not represent increased network usage. Also, privacy cryptoassets such
    as Monero do not enable measuring transactions accurately by design. Nevertheless,
    the NVT ratio remains a helpful complement to other metrics.


    # Other Fundamental Metrics Behind Cryptoassets


    Beyond the metrics used as inputs in the previous models, countless other metrics
    can be leveraged to build new models. Among others, analysts could choose to include
    the following ones in their models: mean block size, block height, exchange deposits,
    exchange withdrawals, supply sold directly by miners/validators, average coin
    dormancy (the time each coin has remained dormant before being transacted),^([^(120)](#fn120))
    number of new addresses, and number of active addresses. One could also use the
    number of addresses with a balance over a certain fraction of the total supply,
    over a specific amount of the native currency, or a specific dollar amount. In
    addition, and specifically for PoW cryptoassets, the following metrics are also
    meaningful: current hash rate, 30-day average hash rate, current difficulty, 30-day
    average difficulty, or miner revenues from fees. Finally, different decentralization
    measures (Gini coefficient or Nakamoto index, covered in Chapter [13](#600732_1_En_13_Chapter.xhtml))
    could also be valuable additions to valuation models for cryptoassets.


    Traditional macroeconomic variables are, of course, also relevant in the context
    of cryptoassets. In particular, the tendency of cryptoassets (Bitcoin in particular)
    to absorb the existing liquidity on the market makes a measure of net liquidity
    especially relevant. The more overall liquidity is available on the market, the
    more it can flow to capital assets, including cryptoassets.'
