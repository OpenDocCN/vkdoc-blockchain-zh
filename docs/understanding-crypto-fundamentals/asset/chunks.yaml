  trans: '

    # 政府风险


    针对加密资产的一种常见批评是，政府决不会允许其货币的替代品发展得过于庞大。事实上，像 `Bitcoin` 这样已建立的、全球性的独立货币，将剥夺政府对货币的垄断权。它们对资金流动的控制将逐渐消失，它们禁止特定交易发生的能力也将随之消亡。这将意味着政府货币霸权的终结。


    对政府而言更糟的是，公民可能会意识到，例如 `Bitcoin` 提供了一种更优越的货币形式（如第 1 章所述），因为它是一种可证明稀缺的资产，最终将使他们能够长期维持购买力。他们会注意到，法定货币中缺失了许多理想的货币特性。一旦这一点变得显而易见，公民就会将储蓄从本国的法定货币转向
    `Bitcoin`，从而导致本国法定货币价值下跌。政府很可能想要避免这种情况，并尽其所能阻止其发生。例如，他们可以禁止用 `Bitcoin` 进行交易，甚至禁止持有
    `Bitcoin`。


    然而，这样的禁令至少有三个原因是不现实的。首先，它忽视了由此产生的激励效应。禁止 `Bitcoin` 反而会强化 `Bitcoin` 的价值主张。一项 `Bitcoin`
    禁令将使政府对货币的滥权垄断更加明显。这会比以往任何时候都更加凸显人们需要寻找政府发行货币的替代品。


    其次，这种禁令在实践中并不可行。从技术角度来看，`Bitcoin` 很简单：它是一个网络，每十分钟向网络其他部分广播少量数据（通常为 1 MB 到 2 MB）。只要有两台电脑相连，互联网就能存活，`Bitcoin`
    区块链的传播就能继续。当看到政府在执行另一项禁令（禁毒战争）时如此低效，很难想象他们能实际执行这样的禁令。毒品从生产到最终消费者的过程涉及极端复杂的流程，远比
    `Bitcoin` 挖矿复杂得多。它们始于巨额的前期投资、专门的种植、复杂的国际供应链，甚至还包括一些营销活动来让终端消费者知晓其可获取性。阻碍这一过程中的任何一个环节都会减少毒品的可得性。然而，任何人都能轻易在世界任何主要城市获得毒品。既然政府从未能在任何地方阻止毒品到达消费者手中，那么想象他们能在阻止
    `Bitcoin` 传播方面取得成功，实属妄想。


    现实世界中重大的 `Bitcoin` 禁令案例已经在中国发生。早在 2013 年 12 月，中国人民银行和多家中国金融监管机构就联合发布声明，阻止当地商业银行处理与
    `Bitcoin` 相关的交易。在本次禁令收效甚微之后，该国内进一步出台了更多禁令：2017 年的 ICO 禁令和 2019 年的 `Bitcoin` 挖矿禁令。中国政府在
    2020 年强化了这些禁令的立场，并在 2021 年再次更坚定地重申。这最后一次重申发生时，全球 `Bitcoin` 算力的三分之二来自中国。


    此外，中国将所有加密资产交易列为非法，并为国际加密货币交易所工作的行为都可能被起诉。作为这次最新禁令的结果，中国的 `Bitcoin` 挖矿活动暂停了几个月，导致全球哈希率下降了
    50%。哈希率降低后，对于剩余的矿工来说，挖 `Bitcoin` 突然变得利润丰厚得多。因此，许多中国矿工搬到了其他国家，更多矿工则在其他地方加入了这场竞赛。仅仅几个月后，`Bitcoin`
    的哈希率就恢复到了历史新高。中国 2021 年禁令实施一年后，中国的哈希算力发电量又回到了全球第二的位置，约占全球哈希率的 20%。换句话说，尽管中国当局竭尽全力，仍然未能阻止中国公民和公司挖矿和持有
    `Bitcoin`。这个例子证明了 `Bitcoin` 禁令在实践中并不可行。


    因此，政府风险不太可能扼杀 `Bitcoin` 或加密资产。它最多只能延缓采用，但无法阻止。`中本聪` 早在 `Bitcoin` 推出之前，就在密码学邮件列表的原始论坛上讨论过这个问题。在
    `Bitcoin` 白皮书发布的第一周，他就基于点对点逻辑 [20, p. 44] 反驳了这种风险。


    > *政府善于斩断像 Napster 这样的中央控制网络的头部，但像 Gnutella 和 Tor 这样的纯 P2P 网络却似乎能站稳脚跟。*


    最后，禁止 `Bitcoin` 也不符合政府的利益，因为这样做将是一个国家战略安全错误。美国空军少校杰森·洛厄里在他的麻省理工学院论文《Softwar》（2023
    年）中，清晰地阐述了囤积 `Bitcoin` 储备至关重要的国家战略利益，并鼓励采用 `Bitcoin` [46]。正如军队通过陆军、海军、空军和太空力量维护自由一样，政府有必要在网络空间积累足够的力量，以防止潜在敌人施加物理成本或强加任何形式的限制。`Bitcoin`
    已成为（迄今为止）存储和交换数字信息最安全的方式。通过其全球领先的开源 PoW 协议，它对任何试图篡改这些信息的攻击者施加了极高的成本（通过必需的电力消耗）。


    它这样做无需诉诸于相互确保摧毁的核威胁。保持拥有和控制有价值数字信息的能力，应是任何希望管辖范围内人民享有自由的政府的首要议程。从这个意义上说，`Bitcoin`
    超越了其最初的货币角色，并包含了作为国家安全工具的功能，以维护个人、公司和机构使用有价值数字信息的自由及其完整性。


    因此，与 51% 攻击和量子计算风险一样，政府禁止加密资产的风险经常在媒体和在线社区中被提及，但经过进一步分析，其影响微不足道。

