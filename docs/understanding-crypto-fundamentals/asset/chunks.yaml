  trans: "\n# 核心概念\n\n投资加密资产有多种方式。具体而言，可以使用第三方（托管人），也可以设置自己的钱包。虽然大多数交易依赖前者，但后者更符合加密资产背后去中心化、无需信任的理念。托管钱包依赖第三方持有用户的私钥。相比之下，非托管（或自我托管）钱包使用户能够真正拥有自己的资金，因为其他人无法获取。\n\
    \n钱包有不同类型：热钱包连接互联网，便于频繁交易；而冷钱包离线，为用户提供更高的安全性。行业内许多最新发展带来了新功能，例如确定性钱包、多重签名和主公共密钥。这些功能通过满足企业和机构的需求，推动了行业的发展。\n\
    \n选择钱包或交易所应谨慎，以确保最佳适配性和高安全性。同样，安全存储私钥至关重要。\n\n# 延伸问题\n\n对于私人投资者、私人交易者、专业个人投资者、个人专业交易者、比特币挖矿公司、非加密领域但管理内部资金的传统公司、以及非加密领域但支持加密资产支付的传统公司，哪种钱包类型最为合适？\n\
    \n投资者可以采用哪种创造性方法来保护私钥免遭丢失和盗窃？\n\n设置私钥最安全的方式是什么？\n\n脚注 1 2 3 4 5 6 7\n\n# 第五部分：如何进行投资？\n\
    \n# 12. 投资策略\n\n> *衡量投资成功与否的最佳标准，不是你是否跑赢了市场，而是你是否制定了一项财务计划和一套行为纪律，让你有可能实现目标。*\n\
    > \n> ——本杰明·格雷厄姆\n\n关于投资的文献浩如烟海、种类繁多，有时甚至自相矛盾。无论如何，提供一个完整的投资框架远非本书所能涵盖。因此，本章仅简要概述加密资产新投资者的基本原则，并提醒一些尤其适用于此类资产类别的注意事项。本章可能无法满足资深投资者的期望，建议他们跳过。\n\
    \n首先，投资是高度个人化的事情。投资者有不同的投资期限、收益目标、风险承受能力、风险承担意愿、法律义务、税率、偏好（例如 ESG）以及其他独特特征。因此，本章甚至本书中的见解不应被视为对任何投资者的建议。相反，它们仅旨在为投资者在加密资产方面的教育做出贡献。潜在投资者应仔细评估自己在这些特征上的位置，并考虑咨询专业的投资组合经理以帮助制定投资策略。\n\
    \n其次，市场处于不断变化之中。债券、股票、货币和大宗商品等资产类别之间的关系并非固定不变，而是随时间变化。此外，它们的估值取决于其他市场参与者的看法和判断，而非特定的公式或模型。特别是，加密资产的发展速度超过任何其他资产类别，并且尤其容易受到其他参与者看法的影响。应谨慎看待本章内容，并根据其在特定时间点及面对市场环境变化时的相关性提出质疑。\n\
    \n尽管如此，制定投资策略至关重要。尤其对于仍波动剧烈且易受市场变化影响的资产类别而言，投资策略有助于投资者专注于长期目标，并防止他们对新闻或市场波动做出情绪化反应。\n\
    \n## 低买高卖\n\n许多新投资者决定在最糟糕的时机建立头寸。在加密资产市场中尤其如此，因为新闻往往在某个市场资产价格大幅上涨后才广泛报道。例如，比特币价格出现数量级增长或其他加密资产涨幅更大时，往往会登上头条。结果，潜在投资者害怕错过机会。当价格明显高于其长期趋势时，他们往往被吸引入市，而这之后通常会迅速跟随回调。特别是在\
    \ 2013 年、2017 年和 2021 年价格飙升（见第 9 章）之前，有许多新入市者加入。\n\n尽管这可能是显而易见的，但通过投资实现资本收益在于低买高卖。虽然听上去简单，但许多新投资者却做不到。具体来说，当价格显著高于其长期趋势时，入市时机通常不合适。要低买高卖。\n\
    \n这个简单的目标有时需要采取逆向策略：在市场情绪低迷时投资，在情绪非理性狂热时退出。例如，第 9 章介绍的恐惧与贪婪指数有助于评估加密市场周围的普遍狂热程度。此外，*相对强弱指标*（RSI），尽管是一种短期工具，但作为动量指标，也能提供有价值的信息，判断资产当前是超买（可能是卖出良机）还是超卖（可能是买入良机）。这些指标过去在加密资产的买卖时机方面往往能提供有价值的建议。然而，这些建议并非始终准确。因此，它们不应成为任何投资决策的唯一依据。\n\
    \n## 把握市场时机\n\n尽管财务分析、趋势、模型和新闻是有助于判断经济周期所处位置的实用工具，但准确把握市场时机是不可能的。由于固有的不确定性，没有人知道市场何时见底或见顶。因此，力求以最低价格买入并在市场最高点精确卖出可能是徒劳的。另一种方法是平均成本法。\n\
    \n## 平均成本法\n\n意识到无法把握最佳进出点，投资者可以依赖多次进出。例如，投资者可以每月投入可用资本的 1%或固定金额。这个过程称为“平均成本法”，是一种时间上的分散化投资。它降低了在错误时间投入大量资金的可能性。平均成本法在本杰明·格雷厄姆\
    \ 1934 年出版的、已成为行业标杆的价值投资著作《聪明的投资者》第 2 页中已有阐述 [42]。\n\n此外，平均成本法限制了情绪化交易带来的风险。加密资产市场比其他市场情绪化程度更高，因为加密资产的基本面不如传统资产类别那样被充分理解。同时，相对较低的流动性使得大额交易对价格的影响更大。将买入和卖出分散到不同时间似乎是更谨慎、更值得推荐的方法，尤其是对加密资产而言。\n\
    \n但请注意，纯粹从数学角度看，平均成本法并不优于一次性大额购买（假设有足够的流动性吸收购买行为，而不会对价格产生实质性影响）。\n"
- fmt: "## Filter the Noise\n\nThe exceptional growth of the cryptoasset industry\
    \ created hype around investments in this new asset class. As a result, more information\
    \ is available on the industry than anybody could process. This information comes\
    \ from all sources, from academic research to public figures and corporations\
    \ to regulators. Traditional news media, in particular, like to comment on the\
    \ cryptoasset industry, even when they do not understand its fundamentals. It\
    \ is, for example, how the narrative of Bitcoin mining being bad for the environment\
    \ spread. As covered in Chapter [3](#600732_1_En_3_Chapter.xhtml), this narrative\
    \ is inaccurate and biased; considering everything, the opposite is more likely\
    \ to be true.\n\nIn the face of a rapidly growing and misunderstood industry,\
    \ it is essential to filter useful information from abundant noise. The careful\
    \ investor should ensure to select high-quality, informed sources.\n\nIn addition,\
    \ conscientiously searching for information contradicting one’s views is paramount.\
    \ Diligent investors should actively search for knowledgeable people disagreeing\
    \ with their investment thesis. The ground-breaking potential of the industry\
    \ gathered vocal followers whose devotion to promoting cryptoassets is nothing\
    \ short of religious fervor. Similarly, the industry has strong opponents flagging\
    \ the whole industry as a scam. Listening exclusively to missionaries either for\
    \ or against cryptoassets is dangerous, as it would bias one’s opinion in a single\
    \ direction. As a result, either the potential returns or the risks of cryptoassets\
    \ would be underestimated.\n\nThe ultimate objective is not to prove to anybody\
    \ that any opinion is correct but to reach the highest possible level of market\
    \ understanding to make wise investment decisions. Filtering the noise implies\
    \ ignoring short-term price movements and cheap or biased media highlights and\
    \ focusing on the long game based on high-quality, independently researched information.\n\
    \n## Taxation\n\nTaxation differs wildly depending on the jurisdiction. Familiarizing\
    \ oneself with local tax regulations (and in other jurisdictions where one may\
    \ need to pay taxes) is essential to decide whether and how to trade. Cryptoasset\
    \ taxes may include income, capital gain, and wealth taxes. Typically, cryptoassets\
    \ are classified as commodities, securities (like stocks and bonds), digital property,\
    \ or foreign currencies. This local treatment for tax purposes fundamentally affects\
    \ how to treat the asset.\n\nBesides, the tax treatment may differ based on the\
    \ holding period. For example, in some jurisdictions, cryptoassets sold within\
    \ one year can be considered speculation and therefore taxed, while beyond one\
    \ year, they would be considered an investment and therefore not taxed. In addition,\
    \ some sales may trigger tax events while others do not. For instance, selling\
    \ a cryptoasset like Bitcoin for a stablecoin like USDC may not trigger a tax\
    \ event, while selling it for a fiat currency would. Many other local tax specificities\
    \ may suggest trading differently due to their implications. Furthermore, rules\
    \ also evolve quickly. The diligent investor should remain current on local regulations\
    \ to decide how to manage a cryptoasset portfolio optimally.\n\nDealing with assets\
    \ as volatile as cryptoasset can be dangerous if fiscal aspects are not considered.\
    \ For example, a careless investor could sell a cryptoasset in December and make\
    \ a large capital gain through this sale. Reinvesting all proceeds immediately\
    \ in another cryptoasset could put him at risk. Suppose the other cryptoasset\
    \ loses most of its value, as occasionally happens in this industry. In that case,\
    \ the investor may not have enough liquid funds to pay the taxes due on the original\
    \ large capital gain. When taxes come due in the next year, he may have to sell\
    \ assets at a very unfortunate time to pay taxes due.\n\nReaders interested in\
    \ the taxation of cryptoassets can refer to the extensive book *Taxation of Crypto\
    \ Assets* by Schmidt, Bernstein, Richter, and Zarlenga, second edition (2023),\
    \ covering tax law for cryptoassets in over 40 countries [3].\n\n## Borrowing\
    \ As an Alternative to Sale\n\nAn investor in need of immediate liquidity faces\
    \ alternatives to selling cryptoassets. For example, instead of selling a cryptoasset\
    \ at an unfortunate time, one can borrow against it. As long as the interest rate\
    \ on the loan is below the rate of appreciation of the cryptoasset, the investor\
    \ is better off by borrowing. Also, a higher inflation rate in the currency in\
    \ which one borrows is better for the borrower. It is the case because the money\
    \ owed will be worth less in terms of real goods and services in the future.\n\
    \n## Behavioral and Mental Biases\n\nWhile traditional investing already requires\
    \ emotional self-discipline and knowledge of one’s limitations, cryptoasset investing\
    \ brings these requirements to a new level. Indeed, rapid and often irrational\
    \ price moves in either direction regularly test investors’ temperament. To face\
    \ such volatility, emotional detachment is essential. For better or worse, it\
    \ is not a skill mastered by anybody, and it can have drastic consequences for\
    \ those who ignore its necessity. Beyond emotional self-control, awareness of\
    \ one’s mental biases is especially important to manage a volatile portfolio in\
    \ a dynamic industry.\n\nThe father of economics puts it as follows.\n\n> *If\
    \ you don’t know who you are, the stock market is an expensive place to find out.*\n\
    > \n> —Adam Smith\n\nThis section covers some common emotional biases and cognitive\
    \ errors that diligent investors should consider while making investment decisions.\
    \ These biases and errors justify, in part, how otherwise rational investors can\
    \ make inappropriate investment decisions, leading to opportunities for those\
    \ on the other side of the trade.\n\n### Confirmation Bias\n\nIf you believe there\
    \ are more gray cats than black cats, every time you see a gray cat, it strengthens\
    \ your belief, regardless of its accuracy. This tendency is called a *confirmation\
    \ bias*, to which most of us are naturally subject, though often unknowingly.\
    \ Unsurprisingly, this bias also manifests in investing.\n\nFor example, looking\
    \ to prove one’s theory for or against a specific asset (class) can cause investors\
    \ to only consider some of the available information. In contrast, information\
    \ conflicting with one’s investment thesis would be ignored even if it contains\
    \ essential elements of data the investor should consider.\n\nOur natural confirmation\
    \ bias can be mitigated by seeking diverse information from various sources and\
    \ actively looking for information against one’s investment thesis. In particular,\
    \ it involves critically thinking about why and how one could be wrong rather\
    \ than striving to prove why one must be right."
