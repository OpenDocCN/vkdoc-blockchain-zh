  trans: '

    *   `活动证明（PoA）`^(⁶⁴)结合了最成熟的共识机制，即 PoW 和 PoS。它据称通过以 PoW 开始但在过程中后期更接近 PoS 的方式，融合了两者的优势。具体来说，一旦新区块被挖出，机制就会切换到
    PoS，根据验证者拥有的代币数量随机选择他们。该机制的缺点是能耗仍然很高（PoW 的主要缺点），并且在验证区块时仍然倾向于代币囤积者（PoS 的主要缺点）。


    *   `容量证明（PoC）`不再使用矿工的权益（如 PoS）或计算能力（如 PoW）来验证交易。相反，它利用矿工硬盘上的可用空间来存储针对某一计算挑战的可能解决方案列表。用于此活动的硬盘空间越大，可能解决方案的列表就越长，矿工被选中验证下一个区块的可能性也就越高。与
    PoW 或 PoS 相比，其主要优势在于效率更高。


    *   `燃烧证明（PoB）`包括燃烧代币，以根据燃烧的代币比例获得在链上写入区块的权利。矿工将代币（可以是区块链的原生代币或其他币，如比特币或以太币）发送到一个不可花费的地址，以获得该链原生代币的奖励。


    *   `历史证明（PoH）`是一系列证明两个事件之间时间的加密计算，也被称为加密时钟。它使用高频可验证延迟函数生成一系列交易哈希（每个哈希都将前一个哈希作为其输入之一），从而使得交易顺序易于验证。证明事件顺序是
    PoH 确保区块链完整性的关键。这样，节点无需等待其他节点的反馈即可验证链。PoH 为区块链提供了高速度，同时保持其网络安全和去中心化。它尤其被用于 Solana
    区块链，该链每 400 毫秒就发布一个新区块。


    *   `实用拜占庭容错（PBFT）`是一种在节点间复制区块的共识机制。由其他节点选出的主节点向网络其余部分提出一组交易。其他节点执行这些交易，并广播结果区块的哈希码。如果收到的哈希码中至少三分之二与原始哈希码相符，则区块被视为有效并被追加到所有本地区块链副本中。这种共识机制具有极高的吞吐量和可忽略不计的等待时间。然而，所需计算量很大，并且
    PBFT 只能容忍网络中最多三分之一的节点出现故障（相比之下，PoW 可以容忍多达一半的网络故障）。


    *   `委托拜占庭容错（DBFT）`是一种协议，其中所有成员无论财富多少都拥有一票投票权。换句话说，它类似于一个国家如何选举总统。通过投票，成员选举出代表（“记账节点”）。在代表中，随机选择一位来提议新区块，该区块需要由其他代表验证。如果至少三分之一的代表不同意该提议，则选择另一位代表来提议区块。与
    PBFT 相似，三分之一的节点可能导致流程停滞。然而，在 DBFT 中，所需计算量要小得多。


    *   `瑞波协议（RP）`或 XRP 账本共识机制（也称为*正确性证明*）由一组代表网络行事的当选验证者（“唯一节点列表”）组成。它们遵循一个迭代过程，可以添加或删除新交易，直到与足够多的其他验证者达成一致。该过程必须得到至少
    80%验证者的同意才能继续。否则，区块链的状态保持不变。一个主要缺点是，只需 20%+1 的验证者出现故障，整个流程就会停滞。


    还有许多其他共识机制存在并正在开发中。感兴趣的读者可以进一步了解存储证明、存款证明（PoD）、权重证明、声誉证明、空间证明、权益速度证明、身份证明、存在性证明、可检索性证明、可信度证明以及联邦拜占庭协议等。


    ## 去中心化数据 vs. 去中心化交易


    区块链是一个去中心化的交易数据库。然而，它并不保存交易所指的底层数据。当底层数据不过是交易本身时（如比特币），这种区别无关紧要。在这种情况下，一切都在区块链上。但是，当涉及大型特定数据集（例如，一首数字歌曲）时，区块链通常不保存数据集（歌曲）本身；相反，它只保存与数据集相关的交易。


    在这种情况下，区块链必须链接到一个数据库。数据库可以是中心化的（这种情况下使用区块链的意义不大），也可以是去中心化的。维护底层数据的一种去中心化选择是 IPFS：星际文件系统。IPFS
    与区块链配合良好，因为数据交易和底层数据库都是去中心化的。IPFS 于 2016 年推出，就像是区块链的硬盘。它不仅存储数据，还存储网站、应用程序等，以及这些数据随时间变化的版本。


    由于区块链的副本存在于许多计算机上，在区块链本身中存储大量信息将是低效的。这会不必要地浪费区块链网络上的存储空间。相反，存储在 IPFS 服务器上的数据的加密哈希减轻了区块链的负担并提高了其效率。

    '
- fmt: "# Why Is Blockchain Different?\n\nFirst, blockchains are different from traditional\
    \ ledgers by enabling a *trustless* exchange of information. It does not mean\
    \ that there is no trust in the system or its counterparties, but rather that\
    \ the element of trust is rendered irrelevant. More specifically, no trust in\
    \ any other party is necessary; only trust in the continuity of a network.\n\n\
    The payment network is one of many possible examples, but it is straightforward\
    \ to understand because it is blockchain’s first application. In the traditional\
    \ payment system, multiple intermediaries need to be trusted. When Alice sends\
    \ money to Bob, both parties must trust their respective commercial banks, the\
    \ networks enabling the transfer (e.g., the SWIFT network), and the country’s\
    \ central bank. When payments are international, the number of intermediaries\
    \ increases further. In comparison, blockchain does not rely on any central authority,\
    \ thereby removing these superfluous steps and the need to trust any third party.\n\
    \n![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig18_HTML.png)\n\nAn illustrative\
    \ flow diagram. Alice, Alice's commercial bank, Alice's commercial bank's payment\
    \ network, central bank, Bob's commercial bank's payment network, Bob's commercial\
    \ bank, and Bob.\n\nFigure 6-18\n\nTraditional payment flow. A money transfer\
    \ from Alice to Bob requires multiple intermediaries\n\nIn the case of blockchain,\
    \ trust is only put in the cryptographic algorithm, which is open source, there\
    \ for everybody to see.\n\n![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig19_HTML.png)\n\
    \nA flow diagram with Alice making payment to Bob via blockchain.\n\nFigure 6-19\n\
    \nBlockchain-enabled payment flow. A money transfer from Alice to Bob does not\
    \ require any intermediary\n\nAlso, a blockchain transaction can settle instantly\
    \ at any time of the day or night, regardless of public holidays. In contrast,\
    \ traditional money transfers are much slower. When you tap your credit card at\
    \ a supermarket counter to buy groceries, it takes several days to settle, even\
    \ if the transaction is cleared in seconds. For international money transfers,\
    \ it can take weeks.\n\nAnother difference to traditional ledger systems is that\
    \ a blockchain facilitates the *auditability* of any transaction or account since\
    \ all transactions that ever happened are transparent and easily retrievable.\
    \ Therefore, the audit is no longer a sample-based, time-consuming, and expensive\
    \ process in the year after financial books closure. Instead, it becomes an exhaustive\
    \ and continuous process, as the network instantly validates every transaction.\n\
    \nTherefore, the real value of blockchain is not just a fancy new way to organize\
    \ data in a ledger. Blockchain is different because it removes the cost of trust\
    \ from transactions. It removes frictions implied by sharing data with unknown\
    \ third parties, such as banks. In addition, it shortens the waiting time to settle\
    \ transactions from days to minutes. It also shrinks direct (e.g., transaction\
    \ fees) and indirect costs (accounting, auditing, and issue settlement). By removing\
    \ these frictions, blockchain can stimulate commerce and enable greater economic\
    \ development, especially for those in need, such as the 2 billion people currently\
    \ unbanked [28].\n\n# Key Concepts\n\nBlockchain, part of distributed ledger technologies,\
    \ was developed to enable Bitcoin to work. It is a database with the special characteristics\
    \ of being decentralized, immutable, and pseudonymous. In particular, it enables\
    \ the transfer of ownership of digital information without requiring trusting\
    \ a third party. By removing the cost of trust, blockchains enable higher economic\
    \ activity at lower costs.\n\nIt uses cryptography and consensus mechanisms to\
    \ ensure data consistency despite its decentralized nature. Different consensus\
    \ protocols exist, with different strengths and weaknesses, making them more appropriate\
    \ in some cases and less in others, for example, for private blockchains or public\
    \ blockchains.\n\nBlockchain is a powerful new tool, but it will not replace all\
    \ databases. Actually, most databases do neither need to be decentralized nor\
    \ immutable.\n\n# Extension Questions\n\nAssume you own ten bitcoins—each priced\
    \ at $50,000—when a hard fork happens. Half the miners continue mining one branch\
    \ of the fork and the other half the other. One block after the fork, how much\
    \ is your portfolio worth?\n\nWhy was money the first use-case of blockchain?\n\
    \nHow can you escape the scalability trilemma?\n\nIf you were to create a cryptoasset\
    \ meant to be used as money, which (existent or non-existent) consensus mechanism\
    \ would be most appropriate?\n\nFootnotes [1](#600732_1_En_6_Chapter.xhtml#Fn1_source)\
    \ [2](#600732_1_En_6_Chapter.xhtml#Fn2_source) [3](#600732_1_En_6_Chapter.xhtml#Fn3_source)\
    \ [4](#600732_1_En_6_Chapter.xhtml#Fn4_source) [5](#600732_1_En_6_Chapter.xhtml#Fn5_source)\
    \ [6](#600732_1_En_6_Chapter.xhtml#Fn6_source)\n\n# 7. Cryptoasset Taxonomies\n\
    \n> *All classifications in this world lack sharp boundaries, and all transitions\
    \ are gradual.*\n> \n> —Aleksandr Solzhenitsyn\n\nNote this book’s recurrent use\
    \ of the word *cryptoasset* rather than the more common term *cryptocurrency*.\
    \ This distinction is purposeful, as cryptoassets encompass many more assets than\
    \ only those meant to be currencies.\n\nFormally, cryptoassets are digital assets\
    \ secured by cryptography on a public ledger and created, managed, and exchanged\
    \ on decentralized peer-to-peer networks. In comparison, cryptocurrencies are\
    \ one subcategory of cryptoassets. In traditional finance, currencies, stocks,\
    \ bonds, commodities, real estate, and collectibles, among others, are all assets.\
    \ Similarly, in the crypto universe, cryptoassets are divided into multiple categories.\n\
    \nClassifying cryptoassets is essential to value them accurately. Indeed, possible\
    \ classifications inform how legislators might regulate and tax cryptoassets in\
    \ the future. In turn, regulations and tax rules influence these assets’ growth\
    \ potential and risk profile. This chapter aims to provide some clarity on possible\
    \ crypto taxonomies.\n\n## Challenges with Setting up a Cryptoasset Taxonomy\n\
    \nIn a perfect world, a cryptoasset taxonomy would have categories that are mutually\
    \ exclusive (an asset falls in only one category), commonly exhaustive (all assets\
    \ have a category where they fit), and immutable (the taxonomy does not change\
    \ over time). However, such a taxonomy is impossible as boundaries between subcategories\
    \ of cryptoassets are blurry and rapidly changing, and new use cases are constantly\
    \ emerging. Therefore, a more realistic taxonomy for cryptoassets should be constantly\
    \ updated to reflect market developments.\n\nAs an example of the evolution of\
    \ taxonomies, take privacy coins. Privacy coins used to be a helpful category,\
    \ but now many tokens use an element of privacy in their architecture. As a result,\
    \ privacy evolved from the core function of some cryptoassets to merely an attribute\
    \ they can take. There are now many possible variations to achieve privacy and\
    \ various levels of privacy.\n\nAnother challenge in categorizing cryptoassets\
    \ is the criteria for the splits. For example, if one tried to make a taxonomy\
    \ of sport types, one could wonder whether to split them according to team sports\
    \ vs. individual sports or ball-based sports vs. others. For sports, as for cryptoassets,\
    \ there are multiple ways to start a taxonomy. The following sections present\
    \ some possible such ways."
