- fmt: "# 16. Value Investing in Cryptoassets\n\n> *In essence, the stock market represents\
    \ three separate categories of business. They are, adjusted for inflation, those\
    \ with shrinking intrinsic value, those with approximately stable intrinsic value,\
    \ and those with steadily growing intrinsic value. The preference, always, would\
    \ be to buy a long-term franchise at a substantial discount from growing intrinsic\
    \ value.*\n> \n> —Michael Burry\n\nAs introduced at the beginning of this book,\
    \ value investing, or *fundamental analysis*, focuses on fundamentals. It identifies\
    \ and measures the pillars giving real economic value to an asset. Value investors\
    \ compare the asset’s value with the asset’s price and invest when the latter\
    \ is significantly lower than the former. Gains materialize for the investor when\
    \ the price eventually converges toward the underlying value.\n\nEven in traditional\
    \ finance, value investors face challenges to value assets of different natures.\
    \ For example, while the traditional discounted cash flow approach is appropriate\
    \ for some assets (e.g., high-growth companies with expected future cash flows),\
    \ it is not for others, in which case ratios of value over earnings may be more\
    \ suitable. With the arrival of cryptoassets as an investable asset class, value\
    \ investors face additional, new, different challenges. However, value investing\
    \ is neither confined to one or several methods nor one or several asset classes.\
    \ It is rather a principle—an approach. Value investing is about betting on an\
    \ investment’s long-term real economic value.\n\nStill, value investing and cryptoassets\
    \ are terms traditional investors dislike using in the same sentence. Indeed,\
    \ the Capital Asset Pricing Model, traditionally used to compute an investment’s\
    \ expected return, does not apply directly to cryptoassets, making any subsequent\
    \ analysis a more adventurous endeavor.\n\nThis book’s objective has been to dismantle\
    \ the apparent dichotomy between the terms cryptoassets and value investing. Not\
    \ only is value investing in cryptoassets possible, but it is also the critical\
    \ element welding this new asset class and traditional investments together. It\
    \ is essential to enable the finance and investment industries to evolve to their\
    \ next level, harnessing the ground-breaking potential of cryptoassets.\n\nFrom\
    \ 2020 to 2023, the size of the crypto market (the cumulated market capitalization\
    \ of all cryptoassets) oscillated between $0.7 trillion and $3 trillion. To know\
    \ whether it is more or less than it should be, methods to measure the underlying\
    \ value of cryptoassets are needed. Unfortunately, traditional financial modeling\
    \ techniques cannot be used directly to value cryptoassets. At the very least,\
    \ they need to be adapted to provide a meaningful valuation of a cryptoasset.\
    \ This chapter reviews and adapts traditional valuation methods and introduces\
    \ additional methods specific to cryptoassets.\n\n## Combining Valuation Methods\n\
    \nDiligent investors do not want to rely on a single valuation method, especially\
    \ for cryptoassets. Instead, combining several valuation approaches and assigning\
    \ a weight to each would likely provide a more reasonable valuation. For example,\
    \ assume method A values a specific asset at $7 at the end of the current year\
    \ while method B values the same asset at $12. If the investor believes that method\
    \ A is the more reliable and assigns it an 80% weight, leaving a 20% weight for\
    \ method B, a reasonable asset’s valuation would be $8 (`$7 × 80% + $12 × 20%\
    \ = $8`).\n\nIn addition, using different methods provides a range of possible\
    \ values, suggesting how differently the asset could evolve. This approach would\
    \ therefore mitigate the illusion of an accurate valuation that could otherwise\
    \ lead to incorrect financial decisions. Even well-established assets with consistent\
    \ cash flows are a challenge to value accurately, regardless of the quality of\
    \ the model, as they are also subject to uncertain events. For example, a US carmaker’s\
    \ stock price is influenced by commodities price expectations, European car emission\
    \ regulations, and competition from Japan. This reality is nicely encapsulated\
    \ in a quote from the twentieth-century British statistician George Box.\n\n>\
    \ *All models are wrong, but some are useful.*\n\nA more reasonable approach for\
    \ financial valuations is to consider the expected direction of future prices.\
    \ The real objective is to be directionally correct rather than accurately wrong.\
    \ In the case of cryptoassets, a 24-month ahead valuation landing in the correct\
    \ order of magnitude could be considered accurate enough. Given the uncertainty\
    \ around the future treatment of cryptoassets, even such a broad range seems challenging\
    \ to predict. Taking Bitcoin as an example, investor valuations for the end of\
    \ the year 2024 span over at least three orders of magnitude: below $100,000,\
    \ between $100,000 and $1 million, and above $1 million. The further in the future\
    \ the target valuation date, the broader the range.\n\n> *Being directionally\
    \ correct rather than accurately wrong.*\n\nWith this objective in mind, best\
    \ practice suggests keeping valuation models parsimonious. A simple model is often\
    \ more helpful than a convoluted one, with more room for errors and unappreciated\
    \ risks.\n\n## Net Present Value of Future Cash Flows\n\nA net present value (NPV)\
    \ approach or discounted cash flow method measures the current value of future\
    \ cash inflows and outflows. To understand this, one must first acknowledge the\
    \ time value of money. For example, receiving $100 today is worth more than receiving\
    \ $100 next year, even if it is with absolute certainty. Indeed, $100 today could\
    \ be invested so that it is expected to have more value next year. Therefore,\
    \ the further in the future a cash flow is, the larger it must be to have the\
    \ same value as a similar cash flow today. In other words, the present value of\
    \ future cash flows is discounted.\n\nThe NPV approach suggests that the value\
    \ of an asset is the sum of the present values of its future cash flows. To compute\
    \ it, an analyst estimates future cash flows and a discount rate. This approach\
    \ has traditionally been central to fundamental analysis. However, a common argument\
    \ against using it for cryptoassets is that they do not have future cash flows.\
    \ First, this argument is technically incorrect because some cryptoassets have\
    \ future cash flows. For example, any proof-of-stake cryptoasset (such as Ethereum)\
    \ generates future staking rewards that can be used as cash flow in an NPV analysis.\n\
    \nNevertheless, the difference with a traditional company generating cash flows\
    \ in US dollars is that the staked cryptoasset provides staking revenues in the\
    \ cryptoasset itself. For example, staking Cardano provides revenues in its native\
    \ currency, `ADA`. It is a chicken-and-egg problem in which the value of the cryptoasset\
    \ depends on the future inflow of more of that cryptoasset. The same issue would\
    \ arise if one tried to assess the value of the US dollar in another currency\
    \ with an NPV analysis. Therefore, even for cryptoassets with future cash flows,\
    \ the traditional NPV model is, at best, a valuation tool with limitations."
