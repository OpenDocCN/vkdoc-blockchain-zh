- fmt: '## Alternative Consensus Mechanisms


    PoW and PoS are the most established consensus mechanisms but not the only ones.
    Hundreds of alternatives exist, combining trade-offs that make them appropriate
    in some cases and not in others [26].


    For example, one essential trade-off is the scalability trilemma. In particular,
    consensus mechanisms can only have two of the following three characteristics,
    while the third one is only imperfect.


    1. Security

    2. Decentralization

    3. Scalability


    For instance, a consensus mechanism can create a secure and scalable blockchain
    but partially centralized. Similarly, it can be scalable and decentralized but
    with lower network security. Finally, it can be secure and decentralized but with
    scalability challenges.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig15_HTML.png)


    A bi-directional flow diagram of the security, decentralization, and scalability
    blocks.


    **Figure 6-15** Scalability trilemma. A consensus mechanism can only satisfy two
    of these three attributes perfectly


    A lack of security makes a network more vulnerable to malicious attacks. A lack
    of decentralization makes a network less tolerant of individual node failures.
    Finally, a lack of scalability limits a network’s ability to process high throughput.
    For example, the Bitcoin blockchain famously combines high decentralization and
    exceptional security but has limited ability to scale intrinsically. This issue
    generated heated debates in the second half of the 2010s when the future of Bitcoin
    was under consideration. However, solutions now exist to address this issue for
    Bitcoin. For example, the Lightning Network enables small transactions to settle
    off-chain and only be occasionally posted on the Bitcoin blockchain.


    To effectively assess the risks associated with a cryptoasset, one should crucially
    understand its consensus mechanism. This section introduces some common consensus
    mechanisms to give a flavor of the types of rules and protocols that can be developed
    to maintain the integrity of a blockchain. Note that Figure [6-16](#600732_1_En_6_Chapter.xhtml#Fig16)
    is far from an exhaustive list.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig16_HTML.png)


    A circle diagram of consensus mechanisms includes proof of work, stake, authority,
    staked authority, stake time, importance, activity, capacity, burn, and history,
    delayed proof of work, delegated proof of stake, practical Byzantine fault tolerance
    and its delegated, and ripple protocol.


    **Figure 6-16** Overview of some common consensus mechanisms (dozens more exist)


    Overall, consensus mechanisms divide into two broad groups: proof-based protocols
    and voting-based protocols [27]. Proof-based consensus mechanisms include proof
    of work (PoW), delayed proof of work (dPoW), proof of importance (PoI), proof
    of capacity (PoC), and proof of burn (PoB). In contrast, voting-based consensus
    mechanisms comprise proof of stake (PoS), delegated proof of stake (DPoS), proof
    of authority (PoA), proof of stake time (PoST), practical Byzantine fault tolerance
    (PBFT), delegated Byzantine fault tolerance (DBFT), and the Ripple protocol (RP).


    Also, consensus protocols use different methods for selecting block validators.
    Overall, one could identify four general approaches.


    1. Based on effort (“work”)

    2. Based on wealth or resources

    3. Based on reputation or past behavior

    4. Based on representation


    One is arguably not better than another. However, some may be more appropriate
    for specific use cases. Assessing whether a consensus mechanism is appropriate
    can be based on how they fare in the following four fundamental properties.


    1. Throughput

    2. Security

    3. Scalability

    4. Finality


    The following describes the high-level functioning of some existing consensus
    mechanisms.


    - **Delayed proof of work (dPoW)** uses two parallel chains, where the security
    provided by the secondary chain enables it to append blocks on the main chain
    safely. Typically, it uses the Bitcoin blockchain (the most secure one) as a secondary
    chain to secure the main blockchain. The security comes from the main blockchain
    posting a hash of its status on the parallel blockchain at regular intervals.
    This way, it leverages the high hash power of the parallel blockchain. A crucial
    difference with `PoW` is that nodes appending new blocks on the main blockchain
    are elected. One benefit of `dPoW` is to reduce energy usage from traditional
    `PoW` mining.


    - **Delegated proof of stake (DPoS)** is voting-based, similar to `PoS`. It consists
    of all network members (owners of the cryptoasset) electing representatives to
    act on their behalf. These representatives, called witnesses or block producers
    (BPs), validate transactions and blocks and are rewarded for their service. As
    an incentive to avoid fraud or collusion, BPs may be voted down, in which case
    their stake would be frozen. `DPoS` advocates claim it is a more democratic mechanism,
    as block validators are voted based on their reputation as fair stakers rather
    than purely on wealth. This consensus mechanism also benefits from a higher throughput
    than `PoS` but tends to be more centralized. Blockchains, including Cardano, TRON,
    and EOS, use `DPoS`.


    - **Proof of authority (PoA)** is also a `PoS` variant, where specific trusted
    nodes act as block validators. The trusted nodes (the authority) earn a reputation
    over time, independently of their stake. They do not even have to stake anything
    at all. This consensus mechanism is strongly centralized as few actors have complete
    control over the network, but it benefits from high throughput and low fees. It
    is appropriate for blockchains that do not need decentralization, such as private
    blockchains.


    ![](images/600732_1_En_6_Chapter/600732_1_En_6_Fig17_HTML.png)


    A block diagram of proof of stake, delegated proof of stake, and proof of authority
    with an arrow of lowest to highest efficiency from left to right at the top, and
    decentralization with an arrow from right to left at the bottom. Efficiency includes
    high throughput, low waiting time, and low fees.


    **Figure 6-17** Trade-offs between PoS and some of its variants. PoA has the highest
    efficiency of the three, while PoS has the highest level of decentralization


    - **Proof of staked authority (PoSA)**, a hybrid between `PoS` and `PoA`, is famous
    for being the consensus mechanism used by the Binance Smart Chain (BSC), one of
    the most established blockchains. A key difference with consensus mechanisms such
    as `PoW` or `PoS` is the small number of validators. In the case of `BSC`, the
    number of validators is limited to 21. Another crucial difference is that the
    incentive for validators in `PoSA` is exclusively in transaction fees, not a reward
    from newly minted coins. These characteristics enable `PoSA` to benefit from lower
    costs and a shorter block time than `PoW` or `PoS`.


    - **Proof of stake time (PoST)** also builds on `PoS` by adding a time factor.
    The longer one holds the stake, the more valuable it becomes. Tweaks are possible,
    such as making the Stake Time dependent on how active the user is (a feature implemented
    in Vericoin, for example): the stakes of inactive users decrease over time.


    - **Proof of importance (PoI)** is another voting-based consensus mechanism derived
    from `PoS`. The main difference is that to get permission to act as a validator
    node, one must own at least a minimum amount of the cryptoasset. Any node below
    the threshold is given zero importance. Above the threshold, as with `PoS`, the
    higher the amount staked, the higher the likelihood of being selected as a validator
    node.'
