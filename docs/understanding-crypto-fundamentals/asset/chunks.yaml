- fmt: "# Accounting\n\nIn 2018, a scandal hit `BT`, a British multinational telecommunication\
    \ company, where a human error in the group’s accounting underestimated its pension\
    \ obligation by £500 million. It happened just a year after another accounting\
    \ scandal at the company reduced the group’s valuation by £8 billion [19].\n\n\
    Unfortunately, human errors and fraud in accounting are regularly slipping through\
    \ companies’ internal controls and auditors’ verifications. Accounting scandals\
    \ have come to light in the last decade at companies such as `Wirecard`, `Wells\
    \ Fargo`, `Toshiba`, `Tesco`, `Petrobras`, and all major audit firms.\n\nUsing\
    \ blockchain technology in accounting could reduce human errors and fraud, facilitating\
    \ transactions and automating controls. For example, the digital signature of\
    \ a contract could set up a purchase order for that contract on a blockchain.\
    \ Invoices would be issued directly on the blockchain against that purchase order,\
    \ and payments would be triggered immediately for these invoices. Linking separate\
    \ items together in an automated and transparent way would provide all parties\
    \ involved with instantaneous updates on the status of all invoices, transactions,\
    \ and outstanding amounts. In addition, exhaustively auditing these records could\
    \ be automatic and continuous rather than sample-based and delayed, as they are\
    \ today. Automating this process would also drastically reduce auditing costs\
    \ and provide transaction transparency. Many other accounting processes are automatable\
    \ and can be simplified on blockchain-based systems. Such developments will likely\
    \ reduce accounting scandals and human errors through more automation and higher\
    \ transparency of corporate accounting processes.\n\n# Sharing Economy\n\nWhen\
    \ `Uber`’s ride-hailing app entered the market, it quickly became evident that\
    \ this business model was superior to traditional taxis. For instance, `Uber`\
    \ matches occasional drivers who have a few hours to invest in increasing their\
    \ income with people who need a more affordable ride than with licensed taxis.\
    \ Prices follow the laws of supply and demand to clear at the level suggested\
    \ by the market. In addition, rides are easily bookable through an app, making\
    \ prices transparent and minimizing wait times. Despite this travel revolution,\
    \ `Uber` is controversial due to the over-proportional share of profits that the\
    \ company captures, often only leaving drivers with just enough to cover the costs\
    \ of the car and the fuel.\n\nNow imagine the service delivered by `Uber`, but\
    \ without the company behind it. Not `Uber`, but also not any other company. The\
    \ service delivered does not need any company to run it. Instead, the community\
    \ could manage it through a decentralized platform. Matching idle drivers with\
    \ riders is cheaply programmable. Also, the community can vote on issues, such\
    \ as ensuring customers’ safety through certifications or ratings. Rides could\
    \ be even more affordable for customers and profitable to drivers since no company\
    \ would capture any share of the profits.\n\nSuch a system would be part of a\
    \ true sharing economy. Community-built apps, run by the people, for the people.\
    \ `Uber` is not the only example; imagine `Airbnb`’s service without the company\
    \ `Airbnb` behind it. Or `eBay`’s services without `eBay`. `YouTube` services\
    \ without `YouTube`. Banking services without banks. Blockchain’s decentralization\
    \ enables a whole new world for the sharing economy, which can now operate at\
    \ scale and without intermediaries.^([^(46)](#fn46))\n\n# Creators’ Empowerment\n\
    \nWhen an artist releases a song, the audience enjoying the music typically does\
    \ not pay him directly. Instead, many intermediaries stand in between content\
    \ creators and consumers: studios, record labels, agents, radios, intellectual\
    \ property services, streaming platforms such as `Spotify`, `Amazon Music`, or\
    \ `iTunes`, and more. Each intermediary takes a cut of the artist’s profit, leaving\
    \ him with little left to reward and refine his craft. Other creative expressions\
    \ experience the same erosion of fees in the distribution chain from creation\
    \ to consumption—for videos, books, paintings, or even video games.\n\nIn some\
    \ cases, record labels, publishers, and other middlemen add value to the process\
    \ by providing helpful feedback, targeting the right audience, or editing the\
    \ creative work for the better. However, in many instances, fees are over-proportional\
    \ to the delivered service. In any case, going through intermediaries or reaching\
    \ out directly to fans should be the artist’s choice, not an obligation implied\
    \ by limited technology or industry standards.\n\nBlockchain solutions offer this\
    \ choice. An artist can now publish his work, say a song, on a decentralized server\
    \ and use a blockchain for sharing it with predefined usage fees. Should one listen\
    \ to the song privately, the fees can be minimal. It can be higher for usage as\
    \ background music for a commercial video. And for usage as a theme song of a\
    \ movie, it can be even higher. The artist can be rewarded directly through crypto\
    \ payments on the same blockchain and have complete transparency on the popularity\
    \ of his work. Higher visibility allows other artists to identify opportunities\
    \ rather than face the black box of intermediaries’ fees. Drastically lower production\
    \ and distribution costs enable content creators to benefit fully from their intellectual\
    \ property. Moreover, users can reward them directly, and everybody benefits from\
    \ higher industry transparency.\n\n# Key Concepts\n\nWhile blockchain technology\
    \ challenges the meaning of money, blockchain’s benefits extend well beyond. In\
    \ particular, it shines as a driver for ESG practices and inclusion. For example,\
    \ decentralization frees people from abusive practices from institutions and governments,\
    \ which do not always prioritize people’s best interests. Higher security standards\
    \ and data encryption enable people to recapture their online identity and limit\
    \ risks related to database breaches. Blockchain also enables billions of people\
    \ to access basic services such as identity certification and banking, from which\
    \ they are currently excluded. Also, it enables a true sharing economy by removing\
    \ unnecessary middlemen capturing over-proportional shares of profits.\n\nMoreover,\
    \ the billions of people currently facing hyperinflation risk now have a currency\
    \ alternative for which future inflation is reliably known in advance. Furthermore,\
    \ blockchain-based assets can drastically reduce humanity’s negative impact on\
    \ the environment by accelerating the transition to renewable energy. Securing\
    \ cryptoasset networks such as `Bitcoin` leads the way through much higher usage\
    \ of renewables than any country in the world. Finally, many more use cases of\
    \ blockchain as a force for good are constantly being developed.\n\n# Extension\
    \ Questions\n\nHow could blockchain technology and cryptoassets enable to establish\
    \ a universal basic income?\n\nHow can blockchain strengthen local communities?\n\
    \nHow else can blockchain or `Bitcoin` be a driver for the greater good?\n\nFootnotes\
    \ [1](#600732_1_En_3_Chapter.xhtml#Fn1_source) [2](#600732_1_En_3_Chapter.xhtml#Fn2_source)\
    \ [3](#600732_1_En_3_Chapter.xhtml#Fn3_source) [4](#600732_1_En_3_Chapter.xhtml#Fn4_source)\
    \ [5](#600732_1_En_3_Chapter.xhtml#Fn5_source) [6](#600732_1_En_3_Chapter.xhtml#Fn6_source)\
    \ [7](#600732_1_En_3_Chapter.xhtml#Fn7_source) [8](#600732_1_En_3_Chapter.xhtml#Fn8_source)\n\
    \n# 4. Portfolio Management Primer\n\n> *Audentes fortuna iuvat. (Fortune favors\
    \ the bold.)*\n> \n> —Virgil\n\nLet us change perspective and look at cryptoassets\
    \ from a financial portfolio management point of view. This chapter introduces\
    \ the basics of portfolio management to assess the financial characteristics of\
    \ cryptoassets. As the analysis shows, cryptoassets have been the most financially\
    \ attractive investment of the last decade, even risk-adjusted, and could remain\
    \ so for the upcoming one."
