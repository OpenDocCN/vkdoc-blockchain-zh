    \ The publisher, the authors, and the editors are safe to assume that the advice\
    \ and information in this book are believed to be true and accurate at the date\
    \ of publication. Neither the publisher nor the authors or the editors give a\
    \ warranty, expressed or implied, with respect to the material contained herein\
    \ or for any errors or omissions that may have been made. The publisher remains\
    \ neutral with regard to jurisdictional claims in published maps and institutional\
    \ affiliations.\n\nThis Apress imprint is published by the registered company\
    \ APress Media, LLC, part of Springer Nature.\n\nThe registered company address\
    \ is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\n*To you, the readers who\
    \ take their financial future into their hands*\n\n# Disclaimer\n\nThis book is\
    \ not a recommendation to buy cryptoassets but rather a structured analysis of\
    \ what they are, why they may be appropriate for some investors, and what such\
    \ investors ought to consider. In this regard, several disclaimers are necessary.\n\
    \nFirst, I am not a financial advisor. The contents of this book should be regarded\
    \ as educational, not as financial advice.\n\nSecond, cryptoassets are subject\
    \ to high price volatility and more legal uncertainty than traditional investments.\
    \ Facing this volatility and uncertainty is not appropriate for all investors.\n\
    \nThird, the cryptoasset space is evolving very rapidly. Every effort was made\
    \ to provide up-to-date sources at the time of publication. However, it may no\
    \ longer be the case when you read these lines. I can, therefore, hold no responsibility\
    \ for outdated information or decisions (financial or otherwise) made based on\
    \ the material covered in this book.\n\nAny investor, in cryptoassets or otherwise,\
    \ should assess whether a particular investment fits one’s specific needs. They\
    \ include risk-return characteristics, liquidity, time horizon, tax status, and\
    \ other unique features. Any investment should be considered as part of the investor’s\
    \ total portfolio, not as an independent investment. Furthermore, one is responsible\
    \ for doing one’s own investment research, especially in regard to understanding\
    \ the underlying risks. If you do not have the ability or desire to perform such\
    \ an assessment, refer to a financial advisor who could tailor portfolio recommendations\
    \ based on your unique needs and characteristics.\n\n# Preface\n\nI decided not\
    \ to invest in cryptoassets—many times. However, recent developments changed my\
    \ mind.\n\nOn a Saturday evening in the autumn of 2012, I sat with friends for\
    \ a session of our newly-formed think tank in Brussels. It was my turn to bring\
    \ up a mind-provoking topic. Our group had diverse expertise ranging from engineering\
    \ to IT and physics. Leveraging my economics background, that day’s topic was\
    \ the revolutionary potential of complementary currencies. Indeed, monetary systems\
    \ working in parallel to a traditional single-currency model can benefit local\
    \ communities in countless ways. At the time, I was not even aware of Bitcoin’s\
    \ existence. Still years ahead of cryptoassets becoming mainstream, alternative\
    \ currencies were an obscure idea that needed to emerge.\n\nThis visionary concept\
    \ would change everything. In the same way steam, electricity, and the Internet\
    \ triggered the first, second, and third industrial revolutions, reframing society’s\
    \ use of currencies could initiate a fourth industrial revolution.\n\nA couple\
    \ of months later, I heard about Bitcoin for the first time during an economic\
    \ conference in Zurich. Yet, despite my unwavering belief in alternative currencies’\
    \ potential, I considered that this new digital currency was not worth its trading\
    \ price, $70 apiece.\n\nI then specialized in regulatory risk management and eventually\
    \ became the local expert on blockchain technology in Germany’s third-largest\
    \ bank. However, given the underlying risks, I still argued in April 2016 that\
    \ $430 per bitcoin was grossly overpriced. Despite blockchain’s promising future,\
    \ this nascent technology could not be relied upon to replace current ways of\
    \ working in finance or our monetary system. Yet.\n\nEven after completing an\
    \ MBA in Singapore in 2018, I doubted investing in cryptoassets was worth the\
    \ risk. I believed that past returns orders of magnitude above the highest-performing\
    \ traditional asset class did not justify the lack of fundamentals. Ultimately,\
    \ Bitcoin and other cryptoassets relied exclusively on trust that a peer-to-peer\
    \ network would keep working. Too much could go wrong. While Bitcoin was a fascinating\
    \ use case of technology as a monetary system, its likelihood of failure was exceptionally\
    \ high.\n\nDuring 2021’s market bull run, Bitcoin and other cryptoassets made\
    \ the headlines again. Thanks to recent developments in the cryptoasset industry,\
    \ their adoption skyrocketed. Institutions formerly loudly advocating against\
    \ cryptocurrencies changed their mind. Many of these institutions started offering\
    \ cryptoasset services; some even invested considerable amounts in such assets.\n\
    \nAnother increase in value ensued. By one order of magnitude. For the seventh\
    \ time in a decade.\n\nThe last few years passed multiple milestones in cryptoasset\
    \ history. We witnessed El Salvador become the first country to adopt Bitcoin\
    \ as legal tender, and the financial industry evolved to leverage cryptoassets’\
    \ potential. It established cryptoassets as an asset class. Regulatory uncertainty\
    \ dropped, likely making cryptoassets the asset class with the most attractive\
    \ risk-adjusted expected return.\n\nFor a decade, I have been too risk-averse\
    \ to dare set foot in the crypto arena. However, still highly risk-conscious,\
    \ I believe it is now time to step in for most investors—even risk-averse ones\
    \ like me.\n\nAnd I am not the only one who feels this way.\n\n> *I don’t think\
    \ there is anything more important in my lifetime to work on [than Bitcoin].*\n\
    > \n> —Jack Dorsey, CEO of Twitter and Block (previously Square) June 4, 2021,\
    \ Bitcoin 2021 Conference\n\n> *Bitcoin is a bank in cyberspace, run by incorruptible\
    \ software, offering a global, affordable, simple, & secure savings account to\
    \ billions of people that don’t have the option or desire to run their own hedge\
    \ fund.*\n> \n> —Michael Saylor, CEO of MicroStrategy December 17, 2020, Twitter\n\
    \n> *Paper money is going away. And crypto is a far better way to transfer value\
    \ than a piece of paper, that’s for sure.*\n> \n> —Elon Musk, CEO of Tesla, SpaceX,\
    \ and Twitter February 19, 2019, interview with ARK Invest"
