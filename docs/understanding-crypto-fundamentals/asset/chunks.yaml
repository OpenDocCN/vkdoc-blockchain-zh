- fmt: '# Centralized and Decentralized Platforms


    Custodial wallets are typically automatically set up via centralized platforms
    when a user joins. In particular, about 99% of transactions in cryptoassets in
    2021 were made through centralized platforms.^([^(91)](#fn91)) Such platforms
    function like a traditional online stock exchange: a user sends money to a private
    platform (e.g., with a credit or debit card) and can invest it online. Their user-friendliness
    likely drives their market dominance. Transacting via such platforms is indeed
    much easier and more similar to familiar platforms for average users.


    Furthermore, centralized platforms differ based on whether they are *exchanges*
    or *brokerage services*. An exchange enables users to trade directly with each
    other on an open exchange. In contrast, a brokerage service platform is the counterparty
    to all trades on that platform. Famous centralized cryptoasset exchanges include
    `Binance`, `Kraken`, and `Bitstamp`. Famous cryptoasset brokerage services include
    `Coinbase`^([^(92)](#fn92)), `eToro`, and `Robinhood`.


    In contrast to centralized platforms, decentralized exchanges also exist and enable
    purer peer-to-peer transactions, though they remain the exception as of 2023.
    Decentralized exchanges (DEXs) resemble their decentralized cryptoasset counterpart
    in that there is no central authority on the other side of the trade, nor even
    facilitating the trade. They are typically open source projects matching buyers
    with sellers and lenders with borrowers via smart contracts without unique omnipotent
    supervision. Following the original cryptoasset philosophy, they are trustless.


    In some cases, DEXs rely on user-generated liquidity pools, where users are incentivized
    through rewards to provide liquidity. This way, the platforms can become automated
    market makers (AMM). In other words, they no longer need to rely on an order book.
    With an AMM, prices are driven by mathematical formulas rather than specific buy
    and sell orders, increasing the liquidity of countless tokens. One of the first
    DEXs, `Uniswap`, was instrumental in growing the DEX industry through its AMM
    feature. Though its first version launched in 2018, the second version changed
    the game in 2020 by enabling direct swaps of any token via `Ethereum`. Any cryptoasset
    could be decentrally exchanged for any other cryptoasset. Quick followers of `Uniswap`
    also grew among the biggest dApps in the ecosystem.


    While they better suit the decentralized value proposition of cryptoassets, DEXs
    are more challenging to use and prone to scams than centralized exchanges. They
    require more knowledge of the processes and more time to get familiar with. On
    the other hand, they forgo some of the fees, KYC, and AML^([^(93)](#fn93)) processes
    that centralized exchanges impose, thereby offering higher privacy. They also
    offer higher security as funds are split among many wallets, making them less
    attractive to hackers than centralized exchanges. However, while DEXs may be the
    preferred trading forum for cryptoassets in the future, they are hardly mature
    yet and require users to proceed with caution. The much larger usage of centralized
    platforms compared to decentralized exchanges proves that many users currently
    value the custodian service’s ease of use more than they value the extra benefits
    of decentralization.


    DEXs differ from one another based on the underlying protocol on which they are
    built (e.g., `Ethereum` or `Binance Smart Chain`), their focus (e.g., ERC-20 tokens),
    and specific features they offer (e.g., cold storage and two-factor authentication).


    Beyond centralized and decentralized exchanges, hybrid exchanges combine the best
    of both worlds. In particular, they provide the ease, speed, and high liquidity
    of centralized exchanges but with decentralized exchanges'' peer-to-peer and privacy
    features. They typically have both an on-chain section (like DEX) and an off-chain
    section (like CEX). Hybrid cryptoasset exchanges include `BitMax` and `CEX.IO`,
    each providing centralized and decentralized trading options.


    While selecting an exchange, one should consider the following characteristics
    among the available options. As for wallets, many websites rank crypto exchanges
    based on some or all of these characteristics.


    1.  Custodial status

    2.  Transaction costs

    3.  Withdrawal costs

    4.  Volume traded

    5.  Possibility to earn passive income

    6.  Possibility to use derivative products, such as futures or options

    7.  Redeemability of funds into fiat currencies

    8.  Transaction limits (daily deposit/withdrawal limit)

    9.  Level of privacy (presence of KYC and AML processes)

    10.  Ease of use


    ## User Interfaces and Exchanges


    While exchanges sometimes include wallets as part of their service, wallets and
    exchanges are very different concepts. In particular, one can set up a wallet
    in many different ways and independently choose an exchange to which to connect
    this wallet. For example, one can set up a web or hardware wallet and connect
    it to either a centralized or decentralized exchange or not to any exchange.


    The user interface of software wallets (e.g., `Electrum`, `Mycelium`, `Exodus`),
    web wallets (e.g., `Metamask`, `MyEtherWallet`, `Bitcoin.com Wallet`, `Trust Wallet`,
    `Coinbase Wallet`), or hardware wallets (e.g., `Ledger`, `Trezor`, `KeepKey`,
    `Coldcard`) is independent of any exchange. For example, even `Trust Wallet` is
    independent of the exchange `Binance`, even though `Binance Holdings Limited`
    has owned it since its acquisition in 2018. Similarly, `Coinbase Wallet` is independent
    of the `Coinbase` exchange, even though the same parent company, `Coinbase`, Inc,
    owns them. They remain standalone products, not directly linked to the corresponding
    exchange. Therefore, these wallets’ user interface should not be misunderstood
    as an exchange. By extension, the user interface of a self-custodial wallet does
    not imply the same third-party risks as a brokerage service (e.g., risk of corruption,
    fraud, or intervention by authorities).


    ## Deterministic and Non-Deterministic Wallets


    Another distinction in wallets is whether they are deterministic, which only applies
    to wallets containing multiple key pairs (private and public keys). Each key pair
    has its own public address. This way, a single user can use multiple addresses
    on the blockchain, much like a single user can have different bank accounts at
    the same bank.


    In a deterministic wallet, a single master key creates multiple key pairs. The
    master key is typically a seed phrase (explained in the next section) and can
    produce, for example, a hundred key pairs. In such a wallet, the user only needs
    one backup: for the master key. Once he has the master key, he has access to all
    key pairs and to all cryptoassets on the corresponding addresses.


    In a non-deterministic wallet, each key pair is independent. Therefore, the user
    must create separate backups for each wallet key.


    Additional subcategories of deterministic wallets exist. For example, hierarchical
    deterministic (HD) wallets enable a set of private keys based on another private
    key in a hierarchy. Each private key created by the master key is also a master
    key in its own right. It may be helpful for corporate structures with several
    layers of hierarchy, each in charge of multiple addresses.


    ```

    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig5_HTML.png)

    ```


    An illustration of 2 columns with deterministic and non-deterministic wallets.
    In column 1, multiple key pairs are created from a single seed phrase. In column
    2, key pairs 1, 2, and 3 are created from seed phrases 1, 2, and 3, respectively.


    **Figure 11-5** Illustration of deterministic vs. non-deterministic wallets'
