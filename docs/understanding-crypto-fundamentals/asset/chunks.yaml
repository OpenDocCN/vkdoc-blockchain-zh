- fmt: '# Key Concepts


    Essential concepts of financial portfolio management are return and volatility
    (known as risk). Over the last decade, the average return and volatility of cryptoassets
    have been orders of magnitude higher than those of traditional equity and commodity
    investments. However, the relationship between the two—excess return per unit
    of financial risk—indicates that cryptoassets were by far the most financially
    attractive investment of the past decade.


    In addition, cryptoassets show relatively low levels of correlation to traditional
    investments (i.e., they do not tend to fluctuate in the same direction at the
    same time). This lack of correlation makes cryptoassets good instruments to diversify
    financial portfolios. Given the fiduciary duty of portfolio managers in financial
    institutions to act in the best interest of their investors, investing in cryptoassets
    will likely soon be a requirement as per their mandate. Once this happens, the
    size of the cryptoasset market is due to increase by a multiple of its current
    size.


    # Extension Questions


    For a typical pension fund, what would be the optimal percentage of assets under
    management to invest in cryptoassets?


    What about other institutional investors, such as major investment funds?


    Are the historical rates of return of cryptoassets indicative of their future
    expected returns?


    Footnotes [1](#600732_1_En_4_Chapter.xhtml#Fn1_source) [2](#600732_1_En_4_Chapter.xhtml#Fn2_source)
    [3](#600732_1_En_4_Chapter.xhtml#Fn3_source) [4](#600732_1_En_4_Chapter.xhtml#Fn4_source)
    [5](#600732_1_En_4_Chapter.xhtml#Fn5_source) [6](#600732_1_En_4_Chapter.xhtml#Fn6_source)


    # Part II: What Are Cryptoassets?


    # 5. Birth of a New Asset Class


    > *I’ve been working on a new electronic cash system that’s fully peer-to-peer
    with no trusted third party.*

    >

    > —Satoshi Nakamoto


    While the first part of the book covered why cryptoassets are worth understanding,
    this second part dives into what they are in more detail. This chapter introduces
    how the first cryptoasset came to life, why it was meaningful, and what followed.


    ## Genesis of the First Cryptoasset: Bitcoin


    Amid the largest financial crisis since the Great Depression of the 1930s, the
    financial system’s stability was on trial. The afternoon after Halloween 2008,
    the mysterious “Satoshi Nakamoto”^([^(53)](#fn53)) posted for the first time on
    a cryptography forum, the Cryptography Mailing List. Satoshi’s post started with
    the preceding quote and contained a link to a nine-page document titled “Bitcoin
    P2P e-cash paper”. This white paper was the conception of the first cryptoasset
    [20] [21].


    Bitcoin effectively came to life a few months later, just after New Year 2009,
    when Satoshi posted Bitcoin’s genesis block on a blockchain, the underlying technology
    enabling Bitcoin to work.


    Despite its birth in early 2009, Bitcoin’s proof of concept needed a few years
    to come out of the shadows. The first effective valuation of Bitcoin came in the
    autumn of that year when the New Liberty Standard online exchange bought 5,050
    bitcoins for $5.02 (1,006 bitcoins per US dollar) to publish the first formal
    Bitcoin exchange rate. This exchange rate was based on a simple model estimating
    the electricity cost needed to mine a bitcoin. Later, at the end of spring 2010,
    Laszlo Hanyecz completed the first commercial purchase in bitcoins. A 10,000-bitcoin
    transaction for a couple of Papa John’s pizzas. While the $41 these bitcoins represented
    at the time was already too much for purchasing two pizzas, they would now be
    worth hundreds of millions of dollars.


    From that moment onward, technology enthusiasts increasingly used Bitcoin as a
    digital currency. However, these transactions were not driven by ease. Instead,
    they aimed to show that value can be exchanged in a decentralized way without
    an intermediary. Indeed, this new digital currency is a true technological masterpiece
    as it solves issues that had never been effectively tackled.


    ## A Solution to the Double-Spend Problem


    The real innovation that Satoshi Nakamoto brought to the table is cracking the
    double-spend problem in a digital and decentralized environment.


    When you send an email or a picture online, you are actually sending a copy while
    you still own the original locally. This approach of sending copies cannot work
    for money. Money needs to be scarce to have value. If anybody can send copies
    of a digital coin around (i.e., spend it more than once, hence the term “double
    spend”), there is no scarcity. Just imagine what most people would do if they
    could spend the same $100 several times, in several shops, without being debited
    this amount from their bank account. The absence of scarcity would make it worthless
    as it could never become reliable money. Societies have traditionally relied on
    third parties, like banks, to avoid the double-spend problem. If you transfer
    money online from your bank account, your bank ensures you no longer own the money
    you transferred. The bank acts as an intermediary to prevent double-spending.


    Leveraging technological innovations and modern cryptography, Satoshi Nakamoto
    designed a technology to address the double-spend problem without necessitating
    any intermediary. This technology was later coined blockchain and is part of what
    is now known as distributed ledger technologies.


    Bitcoin was the first application of value with blockchain technology, the same
    way emails were the first with Internet technology. Of course, emails are only
    a fraction of the possibilities enabled by the Internet. The same goes for Bitcoin
    and blockchain.'
