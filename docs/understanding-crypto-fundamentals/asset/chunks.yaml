    the bill to pay his cook. The cook swiftly runs to the neighboring barber to pay
    off his debt of the same amount. The barber runs to the car dealer to pay for
    the ongoing repairs on his car. The car dealer takes the bill and brings it to
    the restaurant owner to pay for his last dinner on credit. The stranger guest
    then leaves, taking the $100 bill back. No economic activity occurred, but all
    villagers are now more creditworthy, less indebted than they were just an hour
    before.


    A high velocity of money happens when the same dollar changes hands many times
    rather than being stuck under a mattress as a personal saving. Moreover, as the
    preceding story illustrates, a high velocity of money can increase economic prosperity
    even when no economic activity happens. On the other hand, money locked, saved,
    and unused does not allow transactions to occur, which slows down the economy.
    Unfortunately, our current banking system locks money for extended periods with
    every interbank transaction. For transactions within the same jurisdiction, the
    settlement typically lasts about two days, during which the transacted amount
    cannot serve any other purpose. International transfers can even lock money for
    weeks.


    Decentralized finance through blockchain solves this issue, shortening the settlement
    period from days to minutes. As it unlocks money, more prosperity can ensue, benefiting
    the whole system.


    ## Foreign Exchange


    When international transactions happen, currencies often must be exchanged for
    another (e.g., Swiss francs for euros). In 2022, the foreign exchange market accounted
    for $7.5 trillion daily.^([^(45)](#fn45)) However, a fee applies to each dollar,
    disincentivizing international trade and reducing economic activity. In particular,
    cross-border payments from the United States face an average 5% fee. In addition,
    foreign exchange trades take time to settle, further slowing down the economy
    and requiring resources to deal with its complexities.


    The enormous amount lost in fees is due to the many middlemen involved and to
    different economies using different currencies, whose exchange rates fluctuate
    permanently. While the previous chapter made the case that several currencies
    are likely a good thing for the economy, this argument applies to currencies used
    in parallel to each other within the same economy (e.g., one for local trades,
    one for community-specific dealings, and one for global transactions). In a crypto-integrated
    world, international trades would not have to go through a prior foreign exchange
    to settle. Instead, such trades could happen on a global cryptoasset network,
    thereby minimizing trading fees and settlement time. A global currency is preferred
    for international transactions, not local currencies. It would eliminate inefficiencies
    implied by multiple banks and middlemen. In addition, this simplification would
    free up resources: hundreds of thousands of people working in foreign exchange
    markets could instead use their skills for more economically productive purposes.'
  trans: '

    # 可持续性


    2022 年初，亚马逊雨林的森林砍伐率在连续两年达到创纪录水平后，升至 14 年来的最高点。森林砍伐正在加速，导致永久性的生物多样性丧失，并对气候造成毁灭性影响。


    尽管有气候承诺和政治誓言，但对这片世界最大雨林缺乏关注的一个原因是，长期森林管理项目缺乏经济激励。正如前两章所介绍的，法定货币价值的持续侵蚀，使得人们更偏好短期现金流而非长期现金流。事实上，鉴于高通胀率及其不确定性，投资者更青睐未来一个季度内投资的中等回报，而非可能需要几十年才能实现的巨额回报。^(⁴⁴)
    在投资者眼中，短期回报更有价值，因为他们对其折现的程度较低。随着货币价值的持续贬值，对未来任何现金流所应用的折现率会随着时间跨度而增加。未来的财务价值较低，从而导致资本被错误地引导而远离它。


    转向一种价值不会随时间侵蚀、反而会随时间增长的货币标准，将从根本上改变经济激励。未来将不再被折现，从而不再鼓励以牺牲未来为代价的即时支出。相反，具有长期现金流的项目将在财务上变得更具吸引力，从而将资本引向可持续的事业。这样的货币标准此前从未实现过，但现在技术在技术上已可供所有人使用：`比特币`。


    # 透明度


    2008 年的次贷危机对全世界造成了毁灭性打击。然而，那些金融部门透明度更高的国家，在此次灾难中遭受的损失更小 [18]。原因之一是，更高的透明度增加了“做正确的事”的动机，因为市场参与者能够更好地根据信息采取行动。


    基于区块链的资产通常具有高度透明性。例如，网络上所有`比特币`交易都是公开共享的，任何人都可以即时检索。这项技术能够以低成本为企业及公职人员带来更高的透明度，并且其成本很可能低于现有体系。这并不是说在所有情况下都需要交易和行动的完全透明（尽管有必要时可以实现可编程的透明），但更高水平的透明度能够带来更强的问责制。这一点在那些代理人（即代表他人行事且存在固有利益冲突的关系）中尤为重要，这被称为*代理问题*。例如，“大到不能倒”的银行会承担比储户、债务人、监管机构和公众所期望的更高的风险。银行从上行收益（更高的预期利润）中获益，但不会承受下行风险，因为如果出现问题，政府很可能会出手救助它们。投资和支出方面更高的透明度将减少这种不良激励。公共区块链具有高度透明性，因为它们将所有交易发布在所有人都能访问的不可篡改的公共账本中。


    透明度对投资者的价值甚至在金融市场上也是可以衡量的。例如，市政债券的透明度低于联邦债券。尽管市政债券的数量超过任何其他证券，但由于缺乏透明度，它们获得的金融兴趣反而更少。


    # 流通速度


    在一个偏远的村庄里，一位陌生客人来到当地餐厅。他期待着约会对象到来，但不确定她是否会现身。尽管如此，他还是要求订下最好的餐桌，准备在那里等她。餐厅老板想确保这位陌生客人有能力付款，于是在带他入座前要求他支付押金。客人交出一张`$100`钞票，条件是如果约会对象没来，他可以要回这张钞票。在等待期间，餐厅老板用这张钞票付了厨师的工钱。厨师立刻跑到隔壁的理发师那里，偿还了同等金额的债务。理发师又跑到汽车经销商那里，支付他汽车正在进行的修理费用。汽车经销商拿着这张钞票，来到餐厅老板那里，支付他上次赊账的晚餐。之后，陌生客人离开了，带走了那张`$100`钞票。虽然没有发生任何经济活动，但所有村民的信用都变好了，负债也比一小时前减少了。


    高货币流通速度意味着同一张钞票被多次转手，而不是作为个人储蓄被压在床垫下。此外，正如前面的故事所说明的，即使没有发生经济活动，高货币流通速度也能增加经济繁荣。另一方面，被锁定、储存和不使用的货币无法促成交易，这会减缓经济发展。不幸的是，我们当前的银行系统在每一笔银行间交易中都会长时间锁定资金。在同一司法管辖区内的交易，结算通常需要大约两天时间，在此期间，交易的金额不能用于任何其他目的。国际转账甚至可能将资金锁定数周。


    通过区块链实现的去中心化金融解决了这个问题，将结算周期从几天缩短到几分钟。随着资金被释放，可以产生更多的繁荣，从而使整个系统受益。


    # 外汇


    当发生国际交易时，货币通常需要进行兑换（例如，瑞士法郎兑换欧元）。2022 年，外汇市场的日交易额达到`$7.5`万亿。^(⁴⁵) 然而，每笔美元交易都需支付费用，这抑制了国际贸易并减少了经济活动。特别是，从美国进行的跨境支付平均面临`5%`的手续费。此外，外汇交易需要时间进行结算，这进一步拖慢了经济，并需要投入资源来处理其复杂性。


    在费用上损失如此巨额资金，是因为涉及众多中间商，以及不同经济体使用不同货币，而这些货币的汇率又永久波动。虽然前一章论证了多种货币并存可能对经济有利，但这个论点适用于在同一经济体内部并行使用的货币（例如，一种用于本地交易，一种用于特定社区交易，一种用于全球交易）。在一个加密整合的世界里，国际贸易无需事先进行外汇兑换即可结算。相反，这类交易可以在全球加密资产网络上进行，从而最大限度地减少交易费用和结算时间。国际交易更倾向于使用全球性货币，而非本地货币。这将消除由众多银行和中间商造成的低效率。此外，这种简化将释放资源：数十万在外汇市场工作的人员可以将他们的技能用于更具经济生产性的目的。

