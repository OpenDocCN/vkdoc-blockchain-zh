  trans: '

    ### 支点指数


    另一种评估比特币基本价值的方法是将其视为投资组合保险。具体而言，正如 Greg Foss 在 2021 年 4 月的一篇文章中所提出的，比特币可以抵御法定政府对其债务违约的风险。^(¹²¹)
    这种保险的价值可以通过现有的金融工具来衡量，而这些工具实际上为比特币提供了估值。


    政府债务违约意味着其无法偿还合同约定的贷款。这种情况会迫使政府增发货币，使债务贬值直至能够偿还。随着货币价值崩溃，以该货币计价的所有价格都会上涨。该货币的用户将面临储蓄价值大幅缩水的局面，并很可能会逃向一个不会被中央当局随意操纵的金融避风港。即使政府能够通过印钞来摆脱技术性违约，这也将引发对其货币的信心危机——这实际上是另一种形式的违约。


    可以合理推测，如果政府无法偿还其法定计价债务，对比特币的需求将会上升。鉴于比特币供应量固定，需求的增加将推高其价格。这里的挑战在于衡量此类事件发生的可能性，并为其定价。幸运的是，金融行业已经开发出一种能够进行此类衡量的工具：信用违约互换。


    信用违约互换是一种合约，本质上代表了针对违约事件的保险。互换的买方每月支付固定金额，并在发生违约事件时有权获得大额赔付。市场根据对事件发生可能性的评估来确定互换的价格（即每月支付金额）。


    在他的文章中，Greg Foss 解释了他如何构建支点指数。该指数衡量一组二十国集团国家信用违约互换的累计价值。这些国家很可能拥有所有国家中最稳健的法定货币。事实上，在一个二十国集团国家的货币崩溃之前，许多其他（更弱的）法定货币很可能已经崩溃了。该指数的构建基于信用违约的可能性（由市场隐含）以及相应货币的金融债务总额（例如，联邦政府未偿债务、医疗保险负债）。


    对支点指数的详细解释超出了本书的范围，但 Greg Foss 分析得出的结果值得分享[52]。支点指数的估值表明，每个比特币的价值在 108,000 美元到
    160,000 美元之间（按 2021 年美元计算）。


    从这种方法可以得出一个有用的直观结论：比特币的价格很可能会随着主要国家违约概率的增加而上涨。随着这些国家的债务与 GDP 比率持续攀升至历史新高，这一直觉表明，比特币未来的价格方向与先前模型的预测是一致的。


    ### 将比特币作为网络安全协议进行估值


    比特币文献中的一个突破是 2023 年美国空军少校 Jason Lowery 的麻省理工学院论文《Softwar》[46]。此前围绕比特币的大部分关注点都集中在其金融和货币角色上，而
    Lowery 少校则采取了一种根本不同的方法。他从军事和国家战略防御的角度分析了比特币。他的论文雄辩地区分了抽象的、想象中的权力与真实的、物理的权力，并将这一推理延伸到了数字世界，即软件领域。与不基于工作量证明共识机制的竞争对手不同，比特币的安全性依赖于真实、有形的能源。它只能通过消耗电力而产生。这种物理世界的约束阻止了它通过抽象权力（无论是来自货币发行机构还是统治当局）被系统性利用。换句话说，其工作量证明共识协议是一种新的网络安全系统。相比之下，基于权益证明的加密资产和法定货币完全依赖于一种抽象的信仰体系：一种仅由对发行当局的信任所支撑的虚拟价值。


    因此，现存最安全的区块链，其价值远不止于作为货币协议。它还可以保护任何有价值的信息，从个人数据到国家、战略和机密信息。在这方面，比特币与任何其他加密资产都截然不同，值得进行不同的分类和估值方法。正如
    Lowery 少校所总结的，比特币对个人、公司和国家的至关重要性，促使将储备比特币作为国家战略优先事项。虽然这一观点没有为比特币提供任何具体的估值，但我们可以从这一推理中推断出，比特币的基本价值应该比其当前水平大很多倍。换句话说，它确认并强化了先前提出的基本估值方法的发现。


    ### 非基于基本面的估值方法


    前面的部分侧重于基于基本价值的估值方法。它们尽可能少地依赖其他市场参与者如何评估资产价值，并努力识别其客观价值。^(¹²²) 存在许多方法来评估加密资产是否被高估，但它们几乎完全依赖于其他市场参与者的行为。这正是估值偏离基本面并接近投机的领域。


    例如，一种方法是将资产的当前价值与其平均获取成本进行比较。这种关系被称为*市场价值与实现价值比率*（MVRV）。MVRV 表明了如果平均资产持有者以当前价格出售其持有量，将产生盈利还是亏损。形式上，MVRV
    的计算如下。


    ![$$ MVRV=\frac{市场价值}{实现价值} $$](img/600732_1_En_16_Chapter_TeX_Equd.png)


    *市场价值*是资产的市场资本总额，而*实现价值*是每个持有者持有的数量乘以其获取成本。数值高于 1 表明平均持有者拥有未实现收益，反之亦然。MVRV 背后的理论预测该比率往往会回归其均值。可以通过将其项之间的差值与资产的波动率（MVRV
    Z 分数）进行比较来扩展，这是另一个预测未来价格的短期指标。


    另一种方法是将市场价值除以衡量持有者信心的指标。这种信心指标可以是，例如，加密资产在钱包中停留的平均天数。例如，这是计算*储备风险*的方法，这是由 Hans
    Hauge 创建的模型。^(¹²³) 其他信心指标包括谷歌搜索趋势、热门推文或市场调查。与资产价格相比，信心比率较低（例如，当长期持有者卖出时）表明该资产被高估。


    还有许多其他短期指标可用于评估加密资产当前是否被高估，但这超出了本书的范围。感兴趣的读者可以研究应用于加密资产的布莱克-舒尔斯-默顿模型、对数增长曲线、HODL
    浪潮、RHODL 比率、Mayer 倍数和 Puell 倍数。在评估加密资产价格的短期波动时，还应考虑其他指标，例如交易所的最大“痛感价格”（为期权持有者带来最高总损失的价格）、期货和远期价格（反映市场参与者的预期），甚至债务周期（特别是，比特币价格峰值往往跟随中国的债务周期）。

    '
- fmt: '### Key Concepts


    Traditional assessment methods of an asset’s economic value need to be adjusted
    for valuing cryptoassets and differ based on the cryptoasset at hand. In particular,
    `NPV` analyses can be used for proof-of-stake cryptoassets, with the limitation
    that cash flows (staking rewards) are expressed in the assessed asset. In contrast,
    a proof-of-work cryptoasset can be valued based on replacement costs; that is,
    the current price of the electricity needed to mine the asset at the current hash
    rate. Besides, demand for an asset can be measured through usage or adoption,
    thereby hinting at the value of the growth component in a traditional value investing
    approach. Supply-based models value scarcity and are especially relevant for scarce
    assets such as commodities, including Bitcoin. An alternative valuation approach
    is based on the value of comparable asset classes and the expected market share
    capture of these asset classes. All valuation models have in common that they
    suggest that Bitcoin’s price should be much higher than its current level as of
    May 2023. Many variants of these approaches can be based on countless on-chain
    metrics and can be complemented with short-term indicators.


    ### Extension Questions


    Which valuation methods are appropriate to value Bitcoin, and which weight should
    be given to each method? What about Ethereum, Polygon, Uniswap, and Monero?


    How does the appropriateness of valuation methods evolve based on the maturity
    of the cryptoasset?


    How can transaction fees be included in Bitcoin valuation methods?


