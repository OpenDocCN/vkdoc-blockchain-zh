- fmt: '## The Return to Fiat Currencies


    Nevertheless, the United States tried to escape this obligation by printing more
    dollars than it had gold to cover for. As foreign governments noticed the trick,
    they increasingly redeemed their dollars for gold. In the early 1970s, the United
    States had to act to stop real value from leaving the country.


    In the summer of 1971, US President Nixon ended the convertibility of the US dollar
    to gold. This decision effectively marked the end of the Bretton Woods era. Since
    other major powers kept central bank reserves mainly in US dollars, they followed
    suit in abandoning their fixed exchange rate to gold. As a result, currencies
    became fiat,^([^(17)](#fn17)) backed only by trust in the government''s goodwill.


    However, removing the gold standard was removing the discipline imposed on governments.
    With this change to fiat currency systems, governments could spend as much as
    they wanted by printing more of their currency. They could run unchecked deficits
    for years without the need to balance out their budget. As history has shown in
    the examples in this chapter, one cannot create new value by printing more of
    a currency. The value of newly printed currency comes from the existing currency
    in circulation. Every new dollar dilutes the value of all existing dollars. Printing
    new dollar bills effectively transfers purchasing power from people and corporations
    with savings toward the printing entity. It is a tax on savings in the form of
    decreasing value of these savings. As Nobel Prize laureate Milton Friedman put
    it, "Inflation is taxation without legislation."


    As economic theory predicted, increased prices followed, as these currencies lost
    purchasing power when governments printed them. As shown in Figure [1-6](#600732_1_En_1_Chapter.xhtml#Fig6),
    post–Bretton Woods, citizens'' life savings held in cash lost half their value
    in a matter of years: in the case of the US dollar, in less than a decade. This
    value erosion continued over the rest of the century and beyond. In particular,
    `$100` set aside in 1971 was only worth about `$20` one generation later, in 2001.
    Despite the relative political stability, cash not backed by gold proved again
    to be an ineffective store of value.


    ![](images/600732_1_En_1_Chapter/600732_1_En_1_Fig6_HTML.jpg)


    A line graph of value of 100 dollars in 1971 over time, from 1971 to 2022. It
    plots a line that decreases steeply till 1980, and then has a gradual decrease.


    Figure 1-6 Value of `$100` in 1971 over time until 2022, reflecting US inflation
    measured by the Consumer Price Index in the post–Bretton Woods era (Source: Macrotrends
    ([`www.macrotrends.net`](http://www.macrotrends.net)) and own workings)


    This value erosion of currency is not unique to the US dollar; the Japanese yen,
    Swiss franc, and pound sterling followed a similar trend as their corresponding
    central banks kept printing more of their currency.


    While the preceding figures are already unfortunate for savers, whose value of
    savings melted over time like ice cream in the sun, the reality is even harsher.
    It is due to these figures using the Consumer Price Index (CPI) to measure inflation.
    The CPI understates inflation due to its use of the "constant level of satisfaction"
    concept in its computation. In particular, the CPI measures the price of a basket
    of goods defined by the spending habits of consumers. However, it does not consider
    the changes in spending habits as a reaction to inflation.


    To illustrate this, assume consumers typically eat sirloin steak once a week before
    an inflationary episode in which all prices double. Consumers whose salaries remained
    flat must change their spending habits. They replace the weekly sirloin steak
    with chicken breast. Chicken breast after the inflationary episode may cost the
    same as sirloin steak before this episode. While real inflation would indicate
    a 100% increase (prices doubled), the CPI indicates 0% inflation: the basket of
    goods changed such that it costs the same before and after the inflationary episode.
    Indeed, consumers spend the same amount before and after, but the quality of the
    underlying items decreased. In other words, the metric to compute the CPI is directly
    influenced by what it measures. Real inflation is, therefore, much higher than
    what the CPI suggests.^([^(18)](#fn18)) It implies that purchasing power decreased
    at an even higher rate than depicted above.


    Nonetheless, this drop in purchasing power of fiat currencies represented an opportunity
    for gold holders. In particular, over the first decade of the post–Bretton Woods
    era, the market price of one ounce of gold was multiplied by 16. It grew from
    `$40` in the summer of 1971 to above `$600` before the decade''s end. In other
    words, the real value did not vanish; instead, it merely transferred from holders
    of fiat currencies to holders of "real" money, gold.


    ![](images/600732_1_En_1_Chapter/600732_1_En_1_Fig7_HTML.jpg)


    A line graph of market price of 1 ounce of Gold during and after Bretton-Woods
    in U S D from 1950 to 1981. It plots a line with an increasing trend and fluctuations.
    The years from 1950 to 1971 have a shaded area of Bretton Woods, stable gold price
    at 35 U S D per ounce.


    Figure 1-7 The market price of one ounce of gold during and after the Bretton
    Woods system, measured in US dollars (Source: Macrotrends ([`www.macrotrends.net`](http://www.macrotrends.net))
    and own workings)


    ## Increasing the Pace of Printing


    The last 15 years of the 1900s are marked by sustained macroeconomic stability,
    as monetary policies focused on taming inflation rather than increasing output
    and limiting unemployment. However, the new century began with a crisis as the
    dot-com bubble popped, driving the United States and the developed world into
    another recession.


    To fight it, central banks reduced interest rates.^([^(19)](#fn19)) However, artificially
    reducing rates incentivizes commercial banks to lend more money to corporations
    and individuals. The increase in private lending materialized, especially in the
    real estate sector. The refinancing of existing mortgages at historically low
    rates soared, and the financing of the subprime market boomed. Cheap credit made
    real estate prices reach new records, much higher than their economic value. This
    bubble grew for a few years, then popped in 2007, which brought about another
    crisis: the Great Recession. Multiple factors intensified the crisis but are beyond
    the scope of this book. However, it was noteworthy how central banks reacted to
    another crisis while their interest rates were already historically low. After
    lowering interest rates even further (in negative territory, previously described
    as impossible in finance textbooks), the following monetary tool inputted even
    more liquidity into the system. Technically, central banks called it quantitative
    easing, but fundamentally, it was simply more currency printing.^([^(20)](#fn20))


    Due to this cheap financing, most governments reached record levels of debt. For
    example, the US debt-to-GDP ratio soared from 62% in 2007 to 90% in 2010. It increased
    from 62% to 80% in the EU over the same three-year period. In the private market,
    such unsustainable deficit situations typically end with bankruptcy. However,
    in the case of modern governments, central banking enables to print more to devalue
    debt and thereby temporarily escape default.


    Over the following decade, an unprecedented wave of new regulations flooded the
    financial system. Financial and regulatory authorities tried to upgrade a failing
    system instead of rethinking it from the ground up. While they strived to improve
    the legacy system, a radically new one emerged. Rather than striving to increase
    trust in a fiat-based financial system, the new one would make trust no longer
    necessary. This is when Bitcoin took off.'
