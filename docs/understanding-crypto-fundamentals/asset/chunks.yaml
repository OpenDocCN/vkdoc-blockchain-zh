    the only one that is decentralized.


    Diem (formerly Libra) is an example of *corporate cryptocurrency*, as it was initiated
    by a corporation, Meta (known as Facebook at the time), even though it is managed
    by an independent not-for-profit organization, in which Meta is merely a member.


    China’s Digital Currency Electronic Payment (DCEP) (“digital yuan”) is an example
    of *state-based cryptocurrency* issued by the country’s central bank, the People’s
    Bank of China. State-based cryptocurrencies, sometimes called Central Bank Digital
    Currencies (CBDC), provide the issuing authority with unprecedented oversight
    and control over the money flows among the currency users. Moreover, compared
    to fiat currencies, the CBDC issuing authority’s censorship ability is not only maintained
    but even greatly strengthened. For example, China is exploring expiration dates
    with its digital yuan. If unused by a specific time, the yuan you earned may expire
    and be made worthless. Alternatively, the issuing authority could target certain
    tranches of the population or even specific people to implement ad-hoc taxes or
    money confiscation. While decentralized cryptoassets empower people and free them
    from abusive authorities, CBDCs are just the opposite, the base for a real-world
    monetary dystopia where a central authority is all-powerful.


    ## Cryptocommodities


    The following subsections follow the structure in Figure [7-3](#600732_1_En_7_Chapter.xhtml#Fig3).


    ### Platform Protocols or Smart Contract Platforms


    Smart contract platforms (or platform protocols) enable users to pay for smart
    contracts. For example, Ethereum requires to pay “gas fees” to run smart contracts
    on its blockchain. The term *gas fees* is a good analogy. The platform (Ethereum)
    is like a network of roads enabling cars (applications) to travel (run). Gasoline
    demand, and therefore its price, depends on the number of cars on the road, their
    size, and how much they ride. Ethereum works similarly: the more people want to
    run smart contracts, the higher the gas fees. Moreover, similar to bigger cars
    requiring more gasoline, bigger contracts also require more gas. Gas fees are
    therefore working as a supply-and-demand-based incentive for optimizing the network.


    ### Interoperability


    Interoperability services enable cryptoassets to interact from one blockchain
    to another. As an analogy, Microsoft Teams works on Windows, Linux, and Apple
    computers without users knowing their counterparty’s operating system. Unfortunately,
    cryptoassets are not interoperable yet, but several cryptoasset services are working
    on solving this issue.'
  trans: '

    # 按形式与功能划分的加密资产分类法


    在 2017 年畅销书《加密资产》中，克里斯·伯尼斯克和杰克·塔塔尔将加密资产分为三类 [29]。


    - **加密货币** 是通过密码学保护的数字货币，可在网络上进行交换。

    - **加密商品** 是可作为制成品投入品的原始数字资源。

    - **加密代币** 是制成的数字商品和服务。


    一张组织图将加密资产分类为加密货币、加密商品和加密代币。


    **图 7-1** — 根据伯尼斯克与塔塔尔的分类 [29]


    这一早期分类法根据一项基本特征（即其形式）实现了加密资产的区分。然而，我们还可以在此分类基础上，根据功能进一步细分，如图 7-2（针对加密货币）和图 7-3（针对加密商品）所示。^(⁶⁷)


    一张组织图展示了加密商品的分类及部分示例：平台协议包括 `Polkadot`、`Kadena` 和 `Neo`，互操作性协议包括 `Cosmos`、`Quant`
    和 `ICON`，预言机包括 `Chainlink`、`Witnet` 和 `Provable`。


    **图 7-3** — 加密商品的子类别及其示例


    一张组织图展示了加密货币的分类及部分示例：数字价值存储（如比特币）、交易媒介（如比特币现金和 `Dogecoin`）、隐私币（如 `Monero`、`Dash`
    和 Z cash）以及稳定币（如 `Teter`、Coinbase 币、`Maker` 和 `Basecoin`）。


    **图 7-2** — 加密货币的子类别及其（可能具有争议的）示例


    加密代币类别同样可进一步细分，但子类别数量庞大（数十种），且每个子类别的市场规模非常小。


    以下各节将分析加密资产的某些子类别。其目标既非详细描述每个子类别的工作原理，也非穷尽所有类别，而是从宏观层面概述整个加密生态系统的样貌及加密资产可能提供的功能。


    ## 加密货币


    以下小节遵循图 7-2 中的结构。


    ### 数字价值存储


    价值存储资产能够随时间保持或增加其购买力。这与保持其名义价值截然不同。例如，一百年前的 1 美元如今仍然是 1 美元，但它并未保持其价值。当时它能购买一定数量的商品和服务（例如在一座大城市里吃一顿丰盛的餐食），而今天它只能购买这些商品和服务的一小部分。美元保持了名义价值，但未保持实际价值。它并非有效的价值存储工具。


    ### 交易媒介


    某些加密资产（旨在）被用作日常交易的媒介。此类资产理想情况下应具有快速结算时间和广泛的商业应用。最优的货币币还应具备完全可互换性：人们不会因某一枚币的交易历史等因素而对其赋予不同价值。


    ### 隐私币


    隐私币既是货币币的一个子类别，也是一种可在任何可互换加密资产中实现的功能。需要提醒的是，比特币并非匿名，而是假名。用户使用假名进行比特币交易，但该假名持有的比特币数量以及所有历史交易记录对任何人都是公开的。相比之下，隐私币为用户提供了匿名性。隐私币背后的算法使用环签名等技术来证明资金转移有效，但不会透露资金来源。


    ### 稳定币


    稳定币是一种追踪法定货币或其他资产价值的加密货币。例如，它们可以追踪美元或黄金的价值。稳定币可以通过多种方式与目标资产的价值挂钩。具体而言，有有形资产支持的稳定币（如存放在金库中的美元或黄金），或者通过算法合成方式再现挂钩。


    与其他加密资产相比，稳定币具有波动性低的优势。然而，与法定货币挂钩的稳定币会间接失去加密资产的一些理想特性，例如去中心化和无需信任。此外，由于基础货币的通货膨胀率，它们也会像法定货币一样随时间贬值，因此并非良好的价值存储工具。


    ### 替代性加密货币分类法


    加密货币的另一种有用区分方式是根据其发行方。在 2018 年畅销书《区块链革命》（更新版）中，唐·塔普斯科特和亚历克斯·塔普斯科特将加密货币分为三类 [30]。


    1. 自组织加密货币

    2. 企业加密货币

    3. 国家加密货币


    比特币是*自组织加密货币*的一个例子。它没有中心化方管理，任何人都可以加入。在这三类中，它是唯一去中心化的。


    `Diem`（原名 `Libra`）是*企业加密货币*的例子，因为它由一家公司（Meta，当时称为 Facebook）发起，尽管它由一个独立的非营利组织管理，而
    Meta 仅是该组织的一名成员。


    中国的数字人民币电子支付（`DCEP`）（“数字人民币”）是该国中央银行中国人民银行发行的*国家加密货币*的一个例子。国家加密货币（有时称为中央银行数字货币，`CBDC`）为发行机构提供了对货币使用者之间资金流动前所未有的监督和控制能力。此外，与法定货币相比，`CBDC`
    发行机构的审查能力不仅得以保留，甚至大大增强。例如，中国正在探索其数字人民币的过期日期。如果在特定时间内未使用，你赚取的数字人民币可能会过期而变得毫无价值。或者，发行机构可以针对特定人群甚至特定个人实施专项税收或没收资金。而去中心化加密资产赋能人民，使其免受滥用权力的机构之害，`CBDC`
    则恰恰相反，它是现实世界中货币反乌托邦的基础，在这种乌托邦里，中央机构拥有绝对权力。


    ## 加密商品


    以下小节遵循图 7-3 中的结构。


    ### 平台协议或智能合约平台


    智能合约平台（或平台协议）允许用户为智能合约付费。例如，以太坊要求在区块链上运行智能合约时支付“燃料费”。术语*燃料费*是一个很好的类比。平台（以太坊）就像一个公路网络，允许汽车（应用程序）行驶（运行）。汽油的需求及其价格取决于路上的汽车数量、车辆大小以及行驶里程。以太坊的运作方式类似：希望运行智能合约的人越多，燃料费就越高。此外，就像大型汽车需要更多汽油一样，大型合约也需要更多燃料。因此，燃料费起到了基于供需关系的激励作用，以优化网络。


    ### 互操作性


    互操作性服务使加密资产能够跨区块链进行交互。打个比方，Microsoft Teams 可以在 Windows、Linux 和苹果电脑上运行，而用户无需知道对方的操作系统。遗憾的是，加密资产目前尚不具备互操作性，但已有若干加密资产服务正在致力于解决这一问题。

    '
- fmt: '### Oracles


    在加密货币资产领域中，预言机是一种数据馈送机制，提供现实世界（链下）数据，可用于触发区块链智能合约中的事件。此类数据可包括天气数据、体育赛事结果、资产价格、选举结果，以及任何可以数字表示的信息。预言机对整个生态系统的发展至关重要，因为许多智能合约都依赖它们才能发挥作用。


    ## 加密代币


    如上所述，加密代币可以承担多种不同的功能。因此，本节仅阐述一些可能的分类和见解，以便从宏观层面理解加密代币。


    ### 平台代币


    平台代币是一种构建在协议之上（例如以太坊区块链上的`ERC-20`或币安智能链上的`BEP20`）的数字资产[30]。此类数字资产可以是加密货币，也可以是现实世界中资产（如汽车、农产品、土地或房地产）的数字表示。


    ### 金融服务类加密代币


    金融服务类加密代币共同构成了所谓的去中心化金融。它们利用区块链技术，旨在消除传统金融中的中介机构，例如银行、保险、资产经纪人或汇款服务。它们还促进了支付结算，并使（中心化或去中心化）交易所能够高效运作。例如，中心化交易所的币种可以支持用户以更低费用进行加密资产交易。


    ### 非金融服务类加密代币


    加密代币也出现在了金融领域之外。其中，它们在游戏、博彩、社交媒体、数据存储、计算、数字艺术和收藏品等行业声名鹊起。


    ### Web 3.0 加密代币


    在介绍 Web 3.0 加密代币之前，让我们简要回顾一下什么是 Web 3.0。万维网在持续演进，但可以识别出三次重大浪潮。Web 1.0 是 Web 的第一阶段，由静态的只读网页定义。页面可以显示文本和图像，但不能与用户交互。相比之下，Web
    2.0 增加了与用户之间以及用户与用户之间的交互。因此，内容变得动态化，并且通常由用户生成。社交媒体是一个绝佳的例子，用户生成的信息吸引着其他人加入平台。虽然
    Web 2.0 侧重于前端（用户交互界面），但 Web 3.0 升级了 Web 的后端。Web 3.0 为更高级的目的组织数据，例如人工智能、3D 图形、虚拟现实或物联网设备。此外，虽然
    Web 2.0 生成由少数公司拥有的中心化数据，但 Web 3.0 实现了数据的去中心化。


    Web 3.0 加密代币促进了去中心化环境中的数据处理、存储及网络连接。


    ### 非同质化代币


    在上述代币中，有些是独一无二的——就像现实世界中的雕塑一样。在这种情况下，它们就是非同质化代币。NFT 领域在 2021 年蓬勃发展，通过使数字艺术品具有唯一性而彻底改变了艺术界。


    ## 通用加密资产分类标准


    2018 年 2 月，区块链和加密资产研究公司 Brave New Coin 推出了通用加密资产分类标准[31]。这是一个动态（定期更新）的分类标准，基于
    70 多个指标，旨在服务于“资产管理者与交易员、监管机构、研究人员与学者、开发人员与产品所有者、行业高管以及加密爱好者。”它力求通过标准化和严谨的方法，一致且客观地评估加密资产的优劣势。


    特别是，它将加密资产定义为一个新的资产超类，并进一步细分为两个族系和四个子类。分类的第一层将加密资产划分为“通用加密资产”和“协议代币”。第一族系根据 60
    多个定性和定量指标对资产进行分类，以将其细分为子类。相比之下，“协议代币”族系则将资产分配到各个行业，使得每项资产只属于一个行业。分类体系的下一个层级要精细得多，包含
    70 多个（部分重叠的）类别，例如去中心化交易所、核心流动性提供者、区块链即服务、`dApp`平台、虚拟现实平台加密货币或社交媒体。


    在分类标准首次迭代的基础上，Brave New Coin 在随后几年更新了该方法，提供了一个全新的框架。它使用类别分层和形态结构对加密资产进行分类，以提供对该资产类别的
    360 度视角。这些类别被组织成代表经济、法律、国际监管、技术和主题因素的维度。例如，经济维度旨在根据资产的经济用途或目的对其进行分类。该维度还有助于识别资产的经济属性，例如供应发行、可互换性、行业活动、可兑换性和基础价值。经济维度中的另一个分层结构是
    Brave New Coin 的行业分类系统，截至 2023 年 3 月，该系统包含 10 个经济部门、14 个业务部门、23 个行业组、34 个行业和 108
    个利基市场。尽管每个层级都有独特的加密标签，但利基市场层级是专门为迎合独特的加密资产经济和商业模式而开发的。


    Brave New Coin 的方法已经表明，构建加密资产分类法有多种途径。与此同时及之后，其他公司也为加密资产建立了更多的分类标准。


    ## 数字资产分类标准


    2021 年 12 月中旬，CoinDesk Indices 为加密资产推出了一套完整的分类标准：数字资产分类标准[32]。该分类标准相当于 1999 年由
    MSCI 和标准普尔开发的全球行业分类标准的加密版本。`GICS` 自创立以来一直非常有价值，它使股权投资者能够解释同一行业内财务表现的协同变动，并评估可比的投资机会。虽然
    `GICS` 对全球超过 26,000 家上市公司进行分类，但 `DACS` 至少对排名前 500 的数字资产进行分类([68](#fn68))。`DACS`
    确定行业和领域敞口的方法是标准化且透明的。`DACS` 有潜力成为加密资产分类的基准，就像 `GICS` 之于股票一样。


    `DACS` 是一个动态分类标准（至少每月修订一次），它根据功能并以互斥的类别对加密资产进行划分。他们将资产分为三个层级：部门、行业组和行业。截至 2023
    年 5 月，该结构定义了 7 个部门、26 个行业组和 40 个行业，如图 [7-4](#600732_1_En_7_Chapter.xhtml#Fig4)
    [33] 所示。


    ![](images/600732_1_En_7_Chapter/600732_1_En_7_Fig4_HTML.jpg)


    一张组织结构图将加密资产分为 7 个部门。计算、文化与娱乐、货币、`DeFi`、数字化、智能合约平台和稳定币。每个部门又进一步细分为总共 26 个行业组和
    40 个行业。


    图 7-4


    CoinDesk Indices 的 `DACS`，截至 2023 年 5 月 [33]


    到目前为止，`DACS` 分类法中大多数加密资产（按市值计算）都属于货币、智能合约平台或稳定币部门。


    ![](images/600732_1_En_7_Chapter/600732_1_En_7_Fig5_HTML.jpg)


    `DACS` 各部门占比饼图。数据如下：货币，47.84%。智能合约平台，30.41%。稳定币，17.43%。`DeFi`，1.83%。计算，1.22%。文化与娱乐，1.18%。数字化，0.08%。


    图 7-5


    CoinDesk Indices 的 `DACS` 各部门相对规模，数据截至 2022 年 12 月 31 日 [32]'
  raw: '### Oracles


    In the cryptoasset universe, an oracle is a data feed providing real-world (off-chain)
    data that can be used to trigger events in a blockchain’s smart contracts. Such
    data can include weather data, sports results, asset prices, election outcomes,
    and any other information that can be represented digitally. Oracles are critical
    to the development of the ecosystem, as many smart contracts depend on them to
    be functional.


    ## Cryptotokens


    As mentioned above, cryptotokens can take many different functions. Therefore,
    this section only illustrates some possible classifications and insights to understand
    cryptotokens at a high level.


    ### Platform Tokens


    A platform token is a digital asset built on a protocol (such as ERC-20 on the
    Ethereum blockchain or BEP20 on Binance Smart Chain) [30]. Such digital assets
    can be cryptocurrencies or the digital representation of assets in the real world,
    like cars, produce, land, or real estate.


    ### Financial Services Cryptotokens


    Financial services cryptotokens form together what is called *decentralized finance*,
    or DeFi. They leverage blockchain technology to remove intermediaries in traditional
    finance, such as banks, insurance, asset brokers, or money transfer services.
    They also facilitate payment settlements and enable (centralized or decentralized)
    exchanges to work efficiently. For example, a centralized exchange’s coin enables
    the exchange of cryptoassets for a lower fee than would otherwise be charged.


    ### Non-Financial Services Cryptotokens


    Cryptotokens also emerged beyond the financial world. Among others, they became
    famous in gaming, gambling, social media, data storage, computing, digital art,
    and collectibles industries.


    ### Web 3.0 Cryptotokens


    Before covering Web 3.0 cryptotokens, let us briefly review what Web 3.0 is. The
    World Wide Web constantly evolves, but three significant waves can be identified.
    Web 1.0 was the first stage of the Web, defined by static read-only webpages.
    Pages could display text and images but not interact with users. In contrast,
    Web 2.0 added interactions with users and between users. As a result, content
    became dynamic and often generated by users. Social media are a splendid example
    where users generate information attracting others to the platform. While Web
    2.0 focuses on the front end (where users interact), Web 3.0 upgrades the back
    end of the Web, the architecture. Web 3.0 organizes data for more advanced purposes,
    such as artificial intelligence, 3D graphics, virtual reality, or internet-of-things
    devices. Also, while Web 2.0 generates centralized data owned by a handful of
    companies, Web 3.0 enables data to be decentralized.


    Web 3.0 cryptotokens facilitate data usage, storage, processing, and connectivity
    in a decentralized environment.


    ### Non-Fungible Tokens (NFTs)


    Among the aforementioned tokens, some are unique—like a sculpture in the physical
    world. In this case, they are non-fungible tokens, or NFTs for short. The NFT
    sector boomed in 2021, revolutionizing art by making digital art pieces unique.


    ## The General Taxonomy for Cryptographic Assets (GTCA)


    In February 2018, the blockchain and cryptoasset research company Brave New Coin
    launched the General Taxonomy for Cryptographic Assets (GTCA) [31]. It was a dynamic
    (regularly updated) taxonomy based on more than 70 metrics intended for “asset
    managers and traders, regulators, researchers and academics, developers and product
    owners, industry executives, and crypto enthusiasts.” It strived to assess the
    strengths and weaknesses of cryptoassets consistently and objectively through
    a standardized and rigorous approach.


    In particular, it introduced cryptographic assets as a new superclass of asset,
    further subdivided into two families and four subclasses of cryptographic assets.
    The first level of the taxonomy divided cryptoassets between “general cryptographic
    assets” and “protocol tokens.” The first family classified assets based on more
    than 60 qualitative and quantitative metrics to subdivide them between subclasses.
    In contrast, the “protocol tokens” family assigned assets to industries so that
    each asset falls into a single industry. The next level of the hierarchy was significantly
    more granular, with more than 70 (partially overlapping) categories, such as decentralized
    exchange, core liquidity provider, Blockchain as a Service, dApp platform, VR-platform
    cryptocurrency, or social media.


    Building upon the first iteration of the taxonomy, Brave New Coin updated the
    approach in the following years to provide a completely new framework. It categorized
    cryptoassets using hierarchical and morphological structures of categories to
    provide a 360-degree view of the asset class. These categories are organized into
    dimensions that represent economic, legal, international regulation, technical,
    and thematic factors. For example, the economic dimension is designed to classify
    cryptoassets based on their economic usage or purpose. This dimension also helps
    identify the economic properties of an asset, such as supply issuance, fungibility,
    industry activity, convertibility, and underlying value. Another hierarchical
    structure in the economic dimension is Brave New Coin’s industry classification
    system, which comprises 10 economic sectors, 14 business sectors, 23 industry
    groups, 34 industries, and 108 niche markets as of March 2023\. Although there
    is unique crypto labeling in each tier, the niche market tier was specifically
    developed to cater to the unique cryptoasset economy and business models.


    Brave New Coin’s approach already shows that there are multiple ways to build
    a cryptoasset taxonomy. In parallel and afterward, other companies established
    further taxonomies for cryptoassets.


    ## The Digital Asset Classification Standard (DACS)


    In mid-December 2021, CoinDesk Indices introduced a complete taxonomy for cryptoassets:
    the Digital Asset Classification Standard (DACS) [32]. This taxonomy is the crypto
    equivalent to the Global Industry Classification Standard (GICS) developed in
    1999 by MSCI and Standard & Poor’s. The GICS has been invaluable since its inception,
    enabling equity investors to explain financial performance co-movement within
    the same sector and assess comparable investment opportunities. While the GICS
    classifies more than 26,000 publicly traded companies worldwide, the DACS classifies
    at least the top 500 digital assets.^([^(68)](#fn68)) The DACS method to determine
    sector and industry exposure is standardized and transparent. The DACS could become
    the benchmark for cryptoasset categorization, like the GICS for equity.


    The DACS is a dynamic taxonomy (revised at least monthly) that divides cryptoassets
    by function and in mutually exclusive categories. They split assets into three
    layers: sector, industry group, and industry. As of May 2023, the structure defines
    7 sectors, 26 industry groups, and 40 industries, as shown in Figure [7-4](#600732_1_En_7_Chapter.xhtml#Fig4)
    [33].


    ![](images/600732_1_En_7_Chapter/600732_1_En_7_Fig4_HTML.jpg)


    An organizational chart classifies crypto assets into 7 sectors. Computing, culture
    and entertainment, currency, D e F i, digitization, smart contract platform, and
    stable coin. Each is further divided in to a total of 26 industry groups, and
    40 industries.


    Figure 7-4


    DACS by CoinDesk Indices, as of May 2023 [33]


    So far, most cryptoassets (in market capitalization) in the DACS taxonomy fall
    in the currency, smart contract platform, or stablecoin sectors.


    ![](images/600732_1_En_7_Chapter/600732_1_En_7_Fig5_HTML.jpg)


    A pie chart of the sector % of D A C S. The data are as follows. Currency, 47.84%.
    Smart contract platform, 30.41%. Stable coin, 17.43%. D e F i, 1.83%. Computing,
    1.22%. Culture and entertainment, 1.18%. Digitization, 0.08%.


    Figure 7-5


    The relative size of each sector of the DACS by CoinDesk Indices, data as of December
    31, 2022 [32]'
  trans: '

    ### Oracles


    在加密货币资产领域中，预言机是一种数据馈送机制，提供现实世界（链下）数据，可用于触发区块链智能合约中的事件。此类数据可包括天气数据、体育赛事结果、资产价格、选举结果，以及任何可以数字表示的信息。预言机对整个生态系统的发展至关重要，因为许多智能合约都依赖它们才能发挥作用。


    ## 加密代币


    如上所述，加密代币可以承担多种不同的功能。因此，本节仅阐述一些可能的分类和见解，以便从宏观层面理解加密代币。


    ### 平台代币


    平台代币是一种构建在协议之上（例如以太坊区块链上的`ERC-20`或币安智能链上的`BEP20`）的数字资产[30]。此类数字资产可以是加密货币，也可以是现实世界中资产（如汽车、农产品、土地或房地产）的数字表示。


    ### 金融服务类加密代币


    金融服务类加密代币共同构成了所谓的去中心化金融。它们利用区块链技术，旨在消除传统金融中的中介机构，例如银行、保险、资产经纪人或汇款服务。它们还促进了支付结算，并使（中心化或去中心化）交易所能够高效运作。例如，中心化交易所的币种可以支持用户以更低费用进行加密资产交易。


    ### 非金融服务类加密代币


    加密代币也出现在了金融领域之外。其中，它们在游戏、博彩、社交媒体、数据存储、计算、数字艺术和收藏品等行业声名鹊起。


    ### Web 3.0 加密代币


    在介绍 Web 3.0 加密代币之前，让我们简要回顾一下什么是 Web 3.0。万维网在持续演进，但可以识别出三次重大浪潮。Web 1.0 是 Web 的第一阶段，由静态的只读网页定义。页面可以显示文本和图像，但不能与用户交互。相比之下，Web
    2.0 增加了与用户之间以及用户与用户之间的交互。因此，内容变得动态化，并且通常由用户生成。社交媒体是一个绝佳的例子，用户生成的信息吸引着其他人加入平台。虽然
    Web 2.0 侧重于前端（用户交互界面），但 Web 3.0 升级了 Web 的后端。Web 3.0 为更高级的目的组织数据，例如人工智能、3D 图形、虚拟现实或物联网设备。此外，虽然
    Web 2.0 生成由少数公司拥有的中心化数据，但 Web 3.0 实现了数据的去中心化。


    Web 3.0 加密代币促进了去中心化环境中的数据处理、存储及网络连接。


    ### 非同质化代币


    在上述代币中，有些是独一无二的——就像现实世界中的雕塑一样。在这种情况下，它们就是非同质化代币。NFT 领域在 2021 年蓬勃发展，通过使数字艺术品具有唯一性而彻底改变了艺术界。


    ## 通用加密资产分类标准


    2018 年 2 月，区块链和加密资产研究公司 Brave New Coin 推出了通用加密资产分类标准[31]。这是一个动态（定期更新）的分类标准，基于
    70 多个指标，旨在服务于“资产管理者与交易员、监管机构、研究人员与学者、开发人员与产品所有者、行业高管以及加密爱好者。”它力求通过标准化和严谨的方法，一致且客观地评估加密资产的优劣势。


    特别是，它将加密资产定义为一个新的资产超类，并进一步细分为两个族系和四个子类。分类的第一层将加密资产划分为“通用加密资产”和“协议代币”。第一族系根据 60
    多个定性和定量指标对资产进行分类，以将其细分为子类。相比之下，“协议代币”族系则将资产分配到各个行业，使得每项资产只属于一个行业。分类体系的下一个层级要精细得多，包含
    70 多个（部分重叠的）类别，例如去中心化交易所、核心流动性提供者、区块链即服务、`dApp`平台、虚拟现实平台加密货币或社交媒体。


    在分类标准首次迭代的基础上，Brave New Coin 在随后几年更新了该方法，提供了一个全新的框架。它使用类别分层和形态结构对加密资产进行分类，以提供对该资产类别的
    360 度视角。这些类别被组织成代表经济、法律、国际监管、技术和主题因素的维度。例如，经济维度旨在根据资产的经济用途或目的对其进行分类。该维度还有助于识别资产的经济属性，例如供应发行、可互换性、行业活动、可兑换性和基础价值。经济维度中的另一个分层结构是
    Brave New Coin 的行业分类系统，截至 2023 年 3 月，该系统包含 10 个经济部门、14 个业务部门、23 个行业组、34 个行业和 108
    个利基市场。尽管每个层级都有独特的加密标签，但利基市场层级是专门为迎合独特的加密资产经济和商业模式而开发的。


    Brave New Coin 的方法已经表明，构建加密资产分类法有多种途径。与此同时及之后，其他公司也为加密资产建立了更多的分类标准。


    ## 数字资产分类标准


    2021 年 12 月中旬，CoinDesk Indices 为加密资产推出了一套完整的分类标准：数字资产分类标准[32]。该分类标准相当于 1999 年由
    MSCI 和标准普尔开发的全球行业分类标准的加密版本。`GICS` 自创立以来一直非常有价值，它使股权投资者能够解释同一行业内财务表现的协同变动，并评估可比的投资机会。虽然
    `GICS` 对全球超过 26,000 家上市公司进行分类，但 `DACS` 至少对排名前 500 的数字资产进行分类(68)。`DACS` 确定行业和领域敞口的方法是标准化且透明的。`DACS`
    有潜力成为加密资产分类的基准，就像 `GICS` 之于股票一样。


    `DACS` 是一个动态分类标准（至少每月修订一次），它根据功能并以互斥的类别对加密资产进行划分。他们将资产分为三个层级：部门、行业组和行业。截至 2023
    年 5 月，该结构定义了 7 个部门、26 个行业组和 40 个行业，如图 7-4 [33] 所示。


    ![](img/600732_1_En_7_Fig4_HTML.jpg)


    一张组织结构图将加密资产分为 7 个部门。计算、文化与娱乐、货币、`DeFi`、数字化、智能合约平台和稳定币。每个部门又进一步细分为总共 26 个行业组和
    40 个行业。


    图 7-4


    CoinDesk Indices 的 `DACS`，截至 2023 年 5 月 [33]


    到目前为止，`DACS` 分类法中大多数加密资产（按市值计算）都属于货币、智能合约平台或稳定币部门。


    ![](img/600732_1_En_7_Fig5_HTML.jpg)


    `DACS` 各部门占比饼图。数据如下：货币，47.84%。智能合约平台，30.41%。稳定币，17.43%。`DeFi`，1.83%。计算，1.22%。文化与娱乐，1.18%。数字化，0.08%。


    图 7-5


    CoinDesk Indices 的 `DACS` 各部门相对规模，数据截至 2022 年 12 月 31 日 [32]

