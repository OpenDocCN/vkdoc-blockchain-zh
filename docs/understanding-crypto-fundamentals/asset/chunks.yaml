- fmt: '# Stock-to-flow Model


    Supply becomes crucial in the most famous Bitcoin valuation model: the stock-to-flow
    (S2F) model. Fundamentally, this model values scarcity and is typically applied
    to natural resources, such as gold. It measures a ratio of the total existing
    quantity of an asset available for trading (the “stock”) over the new quantity
    of the asset made available per unit of time (the “flow”). The logic behind the
    value of high stock-to-flow assets was introduced in Chapter [1](#600732_1_En_1_Chapter.xhtml).
    The pseudonymous PlanB, a Dutch institutional investor, originally presented the
    model applied for Bitcoin in a Medium article in March 2019.^([^(114)](#fn114))
    It relied on Nick Szabo’s definition of scarcity as “unforgeable costliness,”
    a feat first achieved in a digital and decentralized way by Bitcoin as its primary
    value proposition. In other words, producing new gold or bitcoins is hard and
    expensive, making existing units valuable.


    As of 2023, the total global gold supply is around 200,000 tons, with approximately
    3,000 tons mined annually.^([^(115)](#fn115)) The S2F ratio of gold is 66.7 (computed
    as `200,000/3,000`) and corresponds to the number of years that it would take
    for the current flow to accumulate to the current stock. However, its inverse
    may be more easily understood: 1.5% (`3,000/200,000`), which is the fraction of
    the stock mined in a year. In other words, it is the inflation rate of gold’s
    supply.


    In comparison, Bitcoin’s stock at its third halving event on May 11, 2020 was
    18,375,000 (87.5% of the total 21 million, ignoring lost coins), with a flow of
    6.25 bitcoin per block or about 328,725 bitcoins per year. Its S2F ratio was 55.9,
    just below gold, indicating less scarcity than gold at this point in time in terms
    of stock-to-flow. This ratio increases slowly between halving events as new bitcoins
    are added to the stock with every block. In addition, each halving event implies
    a sudden doubling of the ratio as the flow is halved. Per the fourth halving event,
    expected around March 2024, the S2F ratio will be 119.8 (computed as `19,687,500/164,362.5`),
    making Bitcoin at that point in time almost twice “scarcer” than gold.


    The price prediction of the S2F model uses the value of the S2F ratio over time
    as input in a formula with other coefficients selected to fit past data. Based
    on data that best fits past prices and the corresponding S2F ratio, a logarithmic
    trend can be drawn, and, therefore, future prices can be predicted. For instance,
    the model solves the following equation, where `a` and `b` are constants chosen
    to fit past price data, and `S2F` is the aforementioned ratio.


    ```

    Price_{USD} = e^a × S2F^b

    ```


    This model applied to Bitcoin is presented in Figure [16-3](#600732_1_En_16_Chapter.xhtml#Fig3)
    (with the coefficients `a=-1.0` and `b=2.9`, and the daily flow based on the previous
    365 days of data), where one can identify that past data follow closely the theoretical
    output of the model. However, even though the S2F model has proven exceptionally
    accurate over the past years, it nevertheless relies heavily on assumptions.


    ![A line graph, titled Bitcoin price and S 2 F ratio, of price in U S D from July
    2010 to December 2027. Bitcoin price increases with fluctuations till May 2023.
    S 2 F 365 days follows closely with minor fluctuations intersecting and overlapping
    one another and continues to rise till December 2017.](images/600732_1_En_16_Chapter/600732_1_En_16_Fig3_HTML.jpg)


    **Figure 16-3** Bitcoin’s stock-to-flow model based on the 365-day flow from mid-2010
    to January 2028 (expected date of the fifth halving event); Bitcoin price data
    until March 2023


    In particular, the nature of the formula suggests that prices continually increase
    in line with the S2F ratio until 2140, when the last new fraction of a bitcoin
    is minted. In addition, it is questionable why the market capitalization of a
    commodity (be it gold or Bitcoin) could be derived exclusively from the rate of
    new supply. Indeed, the model completely ignores factors other than stock, flow,
    and time. For example, it completely ignores any change in demand (be it due to
    regulation or business cycles), volatility, or even the supply of the metric in
    which it is typically expressed: US dollars.


    These shortcomings did not prevent much of the Bitcoin community from relying
    extensively on the model to predict future prices. The main argument is that even
    though some factors are not considered, the stock-to-flow relationship is the
    main driver for the market capitalization of scarce assets, not only for Bitcoin
    but also for precious metals and other commodities. In particular, PlanB rightly
    points out that this model has an exceptionally high goodness-of-fit^([^(116)](#fn116))
    for Bitcoin, over eight orders of magnitude.


    After the March 2019 publication of the model, Bitcoin’s price continued to follow
    closely the theoretical prediction of the model for three years, including throughout
    the third halving event in 2020. However, the price lagged behind the model’s
    prediction during the down market of 2022 and early 2023. Even PlanB admits that
    Bitcoin’s price will eventually decouple from the model’s prediction, even though
    it has been exceptionally accurate so far.


    # Stock-to-flow Cross Asset (S2FX) Model


    To address possible limitations of the S2F model, PlanB published an updated model
    just over a year after his S2F article. This update removes the time component
    from the model but adds other commodities, particularly gold and silver. It was
    coined the Bitcoin Stock-to-Flow Cross Asset (S2FX) model.^([^(117)](#fn117))


    In particular, it identifies the different phases through which Bitcoin evolved,
    from proof-of-concept to payments to e-gold and to a financial asset. In each
    of these four chronological phases, Bitcoin’s S2F ratio and price were materially
    larger than in the previous phase, as shown in Figure [16-4](#600732_1_En_16_Chapter.xhtml#Fig4).
    Adding silver and gold’s market capitalization against their S2F ratio to the
    model validates the finding, indicating that a higher S2F ratio suggests a higher
    market value. In fact, the goodness-of-fit of data is almost perfect (R² of 99.7%),
    giving high confidence in the underlying causal relationship. The main weakness
    of the model is the small number of observations on which it is based: only six
    (namely, the values for gold, silver, and each of the four chronological phases
    identified for Bitcoin).


    ![A scatterplot, titled Bitcoin S 2 F cross asset model, of market values versus
    stock-to-flow at 100 trillion U S D. It plots the concentration of Bitcoin monthly
    data, B T C clusters 1, 2, 3, and 4, silver, and gold, on, above, and below the
    power regression 1 line with an increasing trend.](images/600732_1_En_16_Chapter/600732_1_En_16_Fig4_HTML.jpg)


    **Figure 16-4** Original S2FX model chart presented by pseudonymous PlanB (@100trillionUSD)
    in a Medium article (April 27, 2020) [51]


    At the very least, the S2FX model adds more confidence to the S2F model’s predictions
    as it confirms the future trend of Bitcoin’s market capitalization by validating
    this trend against other commodities. In particular, the two models establish
    that Bitcoin’s price per coin will be between $100,000 and $1 million in 2025
    (after the fourth halving event is priced in) and well above the $1 million mark
    by the end of the decade (after the fifth halving event is priced in).'
