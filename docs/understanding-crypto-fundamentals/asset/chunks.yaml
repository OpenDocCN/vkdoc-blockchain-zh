- fmt: "### The Global Crypto Classification Standard (GCCS)\n\nIn February 2023,\
    \ the companies 21Shares and CoinGecko jointly launched another cryptoasset taxonomy—the\
    \ Global Crypto Classification Standard (GCCS) [34]. The taxonomy first distinguishes\
    \ between the `protocol` and the `token` levels, then subdivides between four\
    \ sublevels: crypto stack, sector, industry, and token taxonomy.\n\nWhile some\
    \ categories within these levels are similar to categories in previous taxonomies\
    \ (cryptocurrencies, oracles, interoperability, smart contract platforms), the\
    \ division between `asset superclasses` is original. In particular, the taxonomy\
    \ classifies assets into three `superclasses` that correspond to functions taken\
    \ by traditional assets: capital assets, consumable/transformable assets, and\
    \ store of value assets. Like the GTCA, the GCCS acknowledges that cryptoassets\
    \ can be viewed from different perspectives and end in different groups.\n\n###\
    \ Cryptoassets Technology in Layers\n\nAnother valuable classification of cryptoassets\
    \ to use in parallel to previous classifications is per layer. Cryptoassets appear\
    \ at various places in the value chain going from the core technology to user-friendly\
    \ applications. In particular, five different layers in the crypto ecosystem can\
    \ be identified, as shown in Figure [7-6](#600732_1_En_7_Chapter.xhtml#Fig6).\n\
    \n![](images/600732_1_En_7_Chapter/600732_1_En_7_Fig6_HTML.png)\n\nA chart presents\
    \ the following 5 layers with details and examples. Aggregation layer, application\
    \ layer, networking or asset layer, protocol, and technology layer.\n\n**Figure\
    \ 7-6**  \nVisualization of the crypto ecosystem in layers\n\nThe most basic building\
    \ block is the underlying technology (i.e. blockchain, or “distributed ledger\
    \ technologies” to be more inclusive). This layer sets the crypto ecosystem’s\
    \ foundation, sometimes called `layer 0`.\n\nDirectly built on the technology\
    \ is the protocol layer. It corresponds, for example, to Ethereum or the Bitcoin\
    \ Core protocol. Protocols at this level define the rules on how to use a particular\
    \ implementation of blockchain technology. Cryptoasset literature often refers\
    \ to them as `layer 1 solutions`.\n\nThe next layer is the “networking” or “asset”\
    \ layer, also known to as `layer 2 solutions`. It facilitates access for users\
    \ to the protocol. For example, the Lightning Network is built on top of Bitcoin,\
    \ enabling transactions to settle much faster than by interacting directly with\
    \ the Bitcoin blockchain. Another example is Polygon, a framework scaling Ethereum\
    \ by enabling to build and connect Ethereum-compatible blockchain networks.\n\n\
    Then comes the application layer, corresponding to centralized or decentralized\
    \ applications (dApps). Such applications respond directly to users’ needs and\
    \ are typically more user-friendly; examples include Augur, Bancor, and CryptoKitties.\n\
    \nFinally, services leveraging the power of multiple applications (or directly\
    \ from lower layers) form the aggregation layer. They, for example, aggregate\
    \ yields from multiple applications to provide the best possible financial service\
    \ to users.\n\nServices from the protocol layer to the aggregation layer can be\
    \ anywhere on the continuum, from centralized to fully decentralized.\n\n### Are\
    \ Cryptoassets Securities?\n\nFor regulatory and taxation purposes, defining whether\
    \ a cryptoasset is a security is critical. Securities are treated differently\
    \ from currencies, commodities, collectibles, or properties. For example, reporting\
    \ requirements can differ wildly depending on whether an asset is a security.\
    \ Investment managers, for instance, must report their “assets under management,”\
    \ which depend on whether cryptoassets are classified as securities or as “cash\
    \ or cash equivalents”. More importantly, in the United States, only accredited\
    \ investors can invest in securities not registered with the Securities and Exchange\
    \ Commission (SEC). Under US securities law, it is unlawful to openly sell a security\
    \ not registered with the SEC.\n\nThe `Howey test` defines whether an instrument\
    \ qualifies as an “investment contract” or a “security.”^([^(69)](#fn69)) In particular,\
    \ an instrument is a security if it is “an investment of money in a common enterprise\
    \ with an expectation of profits to be derived solely from the efforts of others.”\n\
    \nNotice the four clear requirements for an asset to be a security as per this\
    \ definition.\n\n1.  an investment of money\n2.  in a common enterprise\n3.  an\
    \ expectation of profits\n4.  derived solely by the efforts of others\n\nThis\
    \ definition puts substance above form. In particular, a cryptoasset is a security\
    \ if it behaves like a security, not based on how it came into existence (on a\
    \ blockchain or not) nor based on its designation (e.g., cryptoasset, cryptocurrency,\
    \ digital currency, virtual currency, coin, token).\n\nAccording to this definition,\
    \ arguably, all DeFi tokens are securities. Also, despite heated debates, as soon\
    \ as a cryptoasset is on proof of stake (PoS), it should be considered a security.\
    \ This is especially the case for PoS tokens because validating a block under\
    \ PoS implies virtually no work by the staker and can therefore be considered\
    \ “solely derived by the efforts of others.”^([^(70)](#fn70)) It means that almost\
    \ all cryptoassets should be considered securities, with only a few exceptions.\
    \ The most notable of these exceptions is Bitcoin.^([^(71)](#fn71)) Mining Bitcoin\
    \ clearly requires work by the miner, thereby moving it outside the Howey-test\
    \ definition.\n\nSome instead classify Bitcoin as cash or cash equivalent when\
    \ it fulfills the function of a medium of exchange (like in El Salvador, where\
    \ Bitcoin is legal tender). However, the growing consensus is to consider Bitcoin\
    \ an intangible asset: digital property or a commodity.\n\nStill, as of 2023,\
    \ many countries have no formal regulations specifying which cryptoassets are\
    \ securities. Moreover, in some countries, like the United States, there is not\
    \ even a national agreement, as different regulatory institutions (such as the\
    \ SEC, the Commodity Futures Trading Commission (CFTC), the Office of the Comptroller\
    \ of the Currency, and the Internal Revenue Service (IRS)) consider cryptoassets\
    \ differently. Nevertheless, jointly defining how to classify and regulate such\
    \ assets is ongoing.\n\nFor example, the CFTC officially ruled in 2019 that Bitcoin\
    \ is a commodity [35] and unofficially asserted that Ethereum is also a commodity.\
    \ Aligning with that opinion, the SEC chairman Gary Gensler also repeatedly affirmed\
    \ that Bitcoin is a commodity. However, until May 2023, he has always carefully\
    \ avoided expressing his opinion on Ethereum’s status as a security. In contrast,\
    \ the SEC ruled several other PoS cryptoassets as securities. In light of this\
    \ unclarity, the US president issued an executive order in 2022 to define the\
    \ line between securities and non-securities in the crypto context. The Financial\
    \ Stability Oversight Council replied in October of that year with a 124-page\
    \ document on the corresponding risks and regulations [36]. Nevertheless, the\
    \ line remains blurry."
  raw: '## The Global Crypto Classification Standard (GCCS)


    In February 2023, the companies 21Shares and CoinGecko jointly launched another
    cryptoasset taxonomy—the Global Crypto Classification Standard (GCCS) [34]. The
    taxonomy first distinguishes between the *protocol* and the *token* levels, then
    subdivides between four sublevels: crypto stack, sector, industry, and token taxonomy.


    While some categories within these levels are similar to categories in previous
    taxonomies (cryptocurrencies, oracles, interoperability, smart contract platforms),
    the division between *asset superclasses* is original. In particular, the taxonomy
    classifies assets into three *superclasses* that correspond to functions taken
    by traditional assets: capital assets, consumable/transformable assets, and store
    of value assets. Like the GTCA, the GCCS acknowledges that cryptoassets can be
    viewed from different perspectives and end in different groups.


    ## Cryptoassets Technology in Layers


    Another valuable classification of cryptoassets to use in parallel to previous
    classifications is per layer. Cryptoassets appear at various places in the value
    chain going from the core technology to user-friendly applications. In particular,
    five different layers in the crypto ecosystem can be identified, as shown in Figure
    [7-6](#600732_1_En_7_Chapter.xhtml#Fig6).


    ![](images/600732_1_En_7_Chapter/600732_1_En_7_Fig6_HTML.png)


    A chart presents the following 5 layers with details and examples. Aggregation
    layer, application layer, networking or asset layer, protocol, and technology
    layer.


    Figure 7-6


    Visualization of the crypto ecosystem in layers


    The most basic building block is the underlying technology (i.e. blockchain, or
    “distributed ledger technologies” to be more inclusive). This layer sets the crypto
    ecosystem’s foundation, sometimes called *layer 0*.


    Directly built on the technology is the protocol layer. It corresponds, for example,
    to Ethereum or the Bitcoin Core protocol. Protocols at this level define the rules
    on how to use a particular implementation of blockchain technology. Cryptoasset
    literature often refers to them as *layer 1 solutions*.


    The next layer is the “networking” or “asset” layer, also known to as *layer 2
    solutions*. It facilitates access for users to the protocol. For example, the
    Lightning Network is built on top of Bitcoin, enabling transactions to settle
    much faster than by interacting directly with the Bitcoin blockchain. Another
    example is Polygon, a framework scaling Ethereum by enabling to build and connect
    Ethereum-compatible blockchain networks.


    Then comes the application layer, corresponding to centralized or decentralized
    applications (dApps). Such applications respond directly to users’ needs and are
    typically more user-friendly; examples include Augur, Bancor, and CryptoKitties.


    Finally, services leveraging the power of multiple applications (or directly from
    lower layers) form the aggregation layer. They, for example, aggregate yields
    from multiple applications to provide the best possible financial service to users.


    Services from the protocol layer to the aggregation layer can be anywhere on the
    continuum, from centralized to fully decentralized.


    ## Are Cryptoassets Securities?


    For regulatory and taxation purposes, defining whether a cryptoasset is a security
    is critical. Securities are treated differently from currencies, commodities,
    collectibles, or properties. For example, reporting requirements can differ wildly
    depending on whether an asset is a security. Investment managers, for instance,
    must report their “assets under management,” which depend on whether cryptoassets
    are classified as securities or as “cash or cash equivalents”. More importantly,
    in the United States, only accredited investors can invest in securities not registered
    with the Securities and Exchange Commission (SEC). Under US securities law, it
    is unlawful to openly sell a security not registered with the SEC.


    The *Howey test* defines whether an instrument qualifies as an “investment contract”
    or a “security.”^([^(69)](#fn69)) In particular, an instrument is a security if
    it is “an investment of money in a common enterprise with an expectation of profits
    to be derived solely from the efforts of others.”


    Notice the four clear requirements for an asset to be a security as per this definition.


    1.  an investment of money


    2.  in a common enterprise


    3.  an expectation of profits


    4.  derived solely by the efforts of others


    This definition puts substance above form. In particular, a cryptoasset is a security
    if it behaves like a security, not based on how it came into existence (on a blockchain
    or not) nor based on its designation (e.g., cryptoasset, cryptocurrency, digital
    currency, virtual currency, coin, token).


    According to this definition, arguably, all DeFi tokens are securities. Also,
    despite heated debates, as soon as a cryptoasset is on proof of stake (PoS), it
    should be considered a security. This is especially the case for PoS tokens because
    validating a block under PoS implies virtually no work by the staker and can therefore
    be considered “solely derived by the efforts of others.”^([^(70)](#fn70)) It means
    that almost all cryptoassets should be considered securities, with only a few
    exceptions. The most notable of these exceptions is Bitcoin.^([^(71)](#fn71))
    Mining Bitcoin clearly requires work by the miner, thereby moving it outside the
    Howey-test definition.


    Some instead classify Bitcoin as cash or cash equivalent when it fulfills the
    function of a medium of exchange (like in El Salvador, where Bitcoin is legal
    tender). However, the growing consensus is to consider Bitcoin an intangible asset:
    digital property or a commodity.


    Still, as of 2023, many countries have no formal regulations specifying which
    cryptoassets are securities. Moreover, in some countries, like the United States,
    there is not even a national agreement, as different regulatory institutions (such
    as the SEC, the Commodity Futures Trading Commission (CFTC), the Office of the
    Comptroller of the Currency, and the Internal Revenue Service (IRS)) consider
    cryptoassets differently. Nevertheless, jointly defining how to classify and regulate
    such assets is ongoing.


    For example, the CFTC officially ruled in 2019 that Bitcoin is a commodity [35]
    and unofficially asserted that Ethereum is also a commodity. Aligning with that
    opinion, the SEC chairman Gary Gensler also repeatedly affirmed that Bitcoin is
    a commodity. However, until May 2023, he has always carefully avoided expressing
    his opinion on Ethereum’s status as a security. In contrast, the SEC ruled several
    other PoS cryptoassets as securities. In light of this unclarity, the US president
    issued an executive order in 2022 to define the line between securities and non-securities
    in the crypto context. The Financial Stability Oversight Council replied in October
    of that year with a 124-page document on the corresponding risks and regulations
    [36]. Nevertheless, the line remains blurry.'
  trans: "\n### 全球加密货币分类标准 (GCCS)\n\n2023 年 2 月，21Shares 与 CoinGecko 公司联合推出了另一种加密资产分类法——全球加密货币分类标准\
    \ (GCCS) [34]。该分类法首先区分了“协议” 和“代币” 两个层级，然后细分为四个子层级：加密堆栈、板块、行业和代币分类。\n\n虽然这些层级中的某些类别与以往分类法中的类别相似（如加密货币、预言机、互操作性、智能合约平台），但对“资产超类”的划分是独创的。具体而言，该分类法将资产划分为三个“超类”，分别对应传统资产的功能：资本资产、可消耗/可转换资产以及价值储存资产。与\
    \ GTCA 类似，GCCS 承认可以从不同视角看待加密资产，并最终归属于不同的类别组。\n\n### 分层视角的加密资产技术\n\n另一个可与先前分类法并行使用的有价值的加密资产分类方法是按层级划分。从核心技术到用户友好型应用的价值链中，加密资产出现在各个环节。具体而言，如图\
    \ 7-6 所示，加密生态系统可识别出五个不同的层级。\n\n![](img/600732_1_En_7_Fig6_HTML.png)\n\n一张图表展示了以下\
    \ 5 个层级的详细信息与示例：聚合层、应用层、网络或资产层、协议层以及技术层。\n\n**图 7-6**  \n加密生态系统层级可视化\n\n最基础的构建模块是底层技术（即区块链，或更具包容性的说法“分布式账本技术”）。该层奠定了加密生态系统的基础，有时被称为“第\
    \ 0 层”。\n\n直接构建在此技术之上的是协议层。它对应于例如以太坊或比特币核心协议。此层级的协议定义了使用区块链技术特定实现方式的规则。加密资产文献通常将它们称为“第\
    \ 1 层解决方案”。\n\n下一层是“网络”或“资产”层，也被称为“第 2 层解决方案”。它方便用户访问协议。例如，闪电网络构建于比特币之上，使得交易结算速度远快于直接与比特币区块链交互。另一个例子是\
    \ Polygon，它是一个扩展以太坊的框架，通过构建和连接兼容以太坊的区块链网络来实现扩展。\n\n随后是应用层，对应于中心化或去中心化应用 (dApps)。这类应用直接响应了用户需求，并且通常更加用户友好；例子包括\
    \ Augur、Bancor 和 CryptoKitties。\n\n最后，利用多个应用（或直接来自较低层级）功能的服务构成了聚合层。例如，它们会聚合来自多个应用的收益，从而为用户提供最佳金融服务。\n\
    \n从协议层到聚合层的服务，其中心化程度可以在从中心化到完全去中心化的连续频谱上任意分布。\n\n### 加密资产是证券吗？\n\n出于监管和税务目的，确定加密资产是否为证券至关重要。证券与货币、商品、收藏品或不动产的处理方式不同。例如，报告要求可能会因资产是否为证券而存在巨大差异。例如，投资经理必须报告其“管理资产规模”，而这取决于加密资产是被归类为证券还是“现金或现金等价物”。更重要的是，在美国，只有合格投资者才能投资未在美国证券交易委员会\
    \ (SEC) 注册的证券。根据美国证券法，公开出售未在 SEC 注册的证券是非法的。\n\n`豪威测试` 用于定义某项工具是否符合“投资合同”或“证券”的资格。^(⁶⁹)\
    \ 具体而言，一项工具若满足“对一项共同企业进行金钱投资，并期望完全从他人的努力中获得利润”，则其为证券。\n\n请注意根据此定义，一项资产成为证券所需的四个明确条件。\n\
    \n1.  金钱投资\n2.  投入一项共同企业\n3.  期待获得利润\n4.  完全来源于他人的努力\n\n这一定义重实质而非形式。具体来说，如果一项加密资产的行为类似证券，那么它就是证券，而并非基于其产生方式（是否在区块链上）或名称（例如，加密资产、加密货币、数字货币、虚拟货币、币、代币）。\n\
    \n根据这一定义，可以说所有 DeFi 代币都是证券。此外，尽管存在激烈争论，但一旦加密资产采用权益证明 (PoS)，就应被视为证券。对于 PoS 代币尤其如此，因为在\
    \ PoS 机制下验证一个区块几乎不需要质押者付出任何工作，因此可以被认为是“完全来源于他人的努力”。^(⁷⁰) 这意味着几乎所有加密资产都应被视为证券，只有少数例外。这些例外中最引人注目的是比特币。^(⁷¹)\
    \ 挖矿比特币显然需要矿工付出工作，因此将其排除在豪威测试的定义之外。\n\n有些人则在其履行交换媒介功能时（例如在萨尔瓦多，比特币是法定货币）将其归类为现金或现金等价物。然而，越来越多的共识是将比特币视为一种无形资产：数字财产或商品。\n\
    \n尽管如此，截至 2023 年，许多国家仍没有正式法规明确哪些加密资产是证券。此外，在一些国家，如美国，甚至没有全国性的统一意见，因为不同的监管机构（如\
    \ SEC、商品期货交易委员会 (CFTC)、货币监理署和国内税务局 (IRS)）对加密资产的看法各不相同。然而，共同定义如何分类和监管此类资产的工作正在进行中。\n\
    \n例如，CFTC 于 2019 年正式裁定比特币为商品 [35]，并非正式地认定以太坊也是一种商品。与此观点一致，SEC 主席加里·根斯勒也多次重申比特币是商品。然而，直到\
    \ 2023 年 5 月，他一直小心翼翼地避免就对以太坊的证券地位发表意见。相比之下，SEC 已裁定其他几种 PoS 加密资产为证券。鉴于这种不明确性，美国总统在\
    \ 2022 年发布了一项行政命令，旨在界定加密领域中证券与非证券的界限。金融稳定监督委员会于当年 10 月以一份 124 页的文件回应了相应的风险和监管\
    \ [36]。尽管如此，界限仍然模糊不清。\n"
- fmt: "# International Regulatory Landscape\n\nInternational regulatory bodies have\
    \ also not reached a greater consensus so far. They strive to establish a stance\
    \ on cryptoassets as the notion of the inevitable growth of this industry settles,\
    \ but the output is mainly uncoordinated. For example, the International Monetary\
    \ Fund (IMF) is mandated to “safeguard the stability of the international monetary\
    \ and financial system.” However, while it established that the world needs global,\
    \ consistent, comprehensive, and coordinated cryptoasset regulation, it does not\
    \ provide insights into what such regulation should be.\n\nThe Basel Committee\
    \ on Banking Supervision, part of the Bank of International Settlements (BIS),\
    \ defines how to account for risks of different groups of cryptoassets. It also\
    \ invites holders to assess risks underlying cryptoassets thoroughly and disclose\
    \ them publicly. However, no formal BIS classification of cryptoassets as financial\
    \ instruments exists yet.\n\nFinally, the International Financial Reporting Standards\
    \ (IFRS) also do not provide a definitive answer on cryptoasset classification.\
    \ As of this writing, they leave it to cryptoasset holders to define which accounting\
    \ category each cryptoasset falls into. See Ernst & Young’s analysis “Accounting\
    \ by holders of crypto-assets” for a dive into what makes a cryptoasset fall in\
    \ each possible accounting category [37].\n\nDespite regulatory uncertainty and\
    \ disagreements on classifying cryptoassets, existing financial regulation can\
    \ be interpreted as follows. In order not to be a security under current regulation,\
    \ a cryptoasset cannot have an owning entity, so it should be truly decentralized.\
    \ Satoshi Nakamoto showed us how to do that: the asset’s network should neither\
    \ have a board of directors nor creators able to materially influence future network\
    \ developments. Once the cryptoasset functions as intended, its creators should\
    \ effectively disappear and renounce all their holdings in the asset (e.g., by\
    \ sending them to an unspendable address). Therefore, some existing cryptoassets\
    \ may lose their security status, but it would require their effective owners\
    \ to formally relinquish their managerial role for the asset’s network.\n\n##\
    \ Key Concepts\n\nClassifying cryptoassets is critical to defining how they may\
    \ be regulated and taxed and thereby how to value them and assess their risk profile.\n\
    \nHowever, creating a definitive cryptoasset taxonomy is impossible, as boundaries\
    \ between cryptoassets are blurry and change rapidly. Classifications should therefore\
    \ be constantly updated. One should use multiple taxonomies in parallel to divide\
    \ assets according to different characteristics, such as their form, function,\
    \ or where they lie in the crypto ecosystem.\n\nA recent taxonomy that could become\
    \ the industry standard in the future is the DACS from CoinDesk Indices. It is\
    \ a regularly updated taxonomy of the main cryptoassets based on objective and\
    \ transparent criteria.\n\nAs of 2023, there is no global agreement on whether\
    \ or which cryptoassets are securities, and regulation is still being developed\
    \ for this new asset class.\n\n## Extension Questions\n\nWhat are the benefits\
    \ and limitations of each taxonomy presented in this chapter?\n\nWhich subcategories\
    \ of cryptoasset are here to stay, and which will disappear?\n\nIs Ethereum a\
    \ security?\n\nFootnotes [1](#600732_1_En_7_Chapter.xhtml#Fn1_source) [2](#600732_1_En_7_Chapter.xhtml#Fn2_source)\
    \ [3](#600732_1_En_7_Chapter.xhtml#Fn3_source) [4](#600732_1_En_7_Chapter.xhtml#Fn4_source)\
    \ [5](#600732_1_En_7_Chapter.xhtml#Fn5_source) [6](#600732_1_En_7_Chapter.xhtml#Fn6_source)\n\
    \n# 8. Cryptoasset Investment Types\n\n> *If you don’t find a way to make money\
    \ while you sleep, you will work until you die.*\n> \n> —Warren Buffett\n\nFor\
    \ any investment, buying at a low price and selling at a higher price is one form\
    \ of return, capital gain. However, it is often not the only way to benefit from\
    \ the investment. Equity investments (stocks) typically also deliver returns in\
    \ dividends. Fixed-income investments (bonds) mainly deliver returns through interest.\
    \ Real estate investments can deliver returns through rent.\n\nSimilarly, cryptoassets\
    \ offer alternative sources of return on investment. This chapter investigates\
    \ these sources. However, before that, it explores the different ways to invest\
    \ in cryptoassets, from pure investment on the blockchain to indirect investments\
    \ via companies with cryptoasset exposure and investment vehicles in cryptoassets.\n\
    \n## Direct and Indirect Investments in Cryptoassets\n\nThe most straightforward\
    \ way to benefit financially from cryptoassets is to buy and sell them directly.\
    \ Such purchases and sales are called *spot trading* because the asset is delivered\
    \ almost immediately (on the spot). For example, if you bought a bitcoin at a\
    \ market price of $5,800 in March 2020 and sold it at the market price of $58,000\
    \ in March 2021, you would have made a +900% return, or 10x, in a year. Inversely,\
    \ large drops are also possible. For example, if you kept the asset for 18 more\
    \ months, you would have lost 66% from the March 2021 price, as it only traded\
    \ at $20,000 in October 2022. Such investments can be made on centralized exchanges\
    \ (e.g., Binance, KuCoin, Coinbase) or decentralized exchanges (e.g., dYdX, Uniswap,\
    \ ApolloX).\n\nHowever, regulation or investor mandates may limit direct investments\
    \ in cryptoassets. Fortunately for investors facing such limitations, alternatives\
    \ exist to get exposure to cryptoassets through indirect investments."
