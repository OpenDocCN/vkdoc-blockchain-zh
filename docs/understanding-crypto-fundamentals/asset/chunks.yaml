    | Binance Staking | Cardano | ADA | 3.2% | 60 days |

    | Binance Staking | Cardano | ADA | 4.2% | 90 days |

    | Binance Staking | Cardano | ADA | 5.7% | 120 days |


    # Crypto Lending


    A passive income alternative to staking is crypto lending. In crypto lending,
    the lender typically loans fiat money (e.g., US dollars or euros) or a stable
    coin (e.g., `Dai` or `USDC`) to a borrower currently holding cryptoassets. This
    way, the cryptoassets become collateral for the loan.


    Typically, crypto loans are overcollateralized. For example, Alice lends 5,000
    `USDC` to Bob, who currently holds five ethers priced at $2,000 each, by using
    the five ethers as collateral. If Bob does not repay the borrowed `USDC` by the
    loan term, Alice is entitled to sell the ethers until her loan, with interest,
    is repaid. In this case, the loan is overcollateralized because the market value
    of the collateral is twice higher than the loan’s value.^([^(77)](#fn77))


    The collateralization lowers Alice’s credit risk: she will only lose money if
    Bob does not repay the loan and if, in addition, the value of the collateral drops
    below the amount due. In this example, it would require ethers to lose at least
    50% of their current value for the loan not to be repaid in full. Since Alice’s
    risk on the loan is lower than without the collateral, she does not require a
    particularly high interest rate from Bob. It implies that Bob can benefit from
    a lower interest rate by posting collateral. He can use the borrowed amount to
    buy more of the cryptoasset he already holds or to buy another cryptoasset. Bob
    benefits from this financial setup as long as the cryptoasset appreciates at a
    higher pace than the loan’s interest rate.


    Because crypto lending exists, holders of cryptoassets can benefit by loaning
    out their cryptoassets and receiving positive interest rates. For example, rather
    than having bitcoins sitting idle on a cryptoplatform, passive income can be generated
    by loaning them out.


    Multiple centralized and decentralized crypto platforms offer crypto lending at
    attractive rates (compared to traditional finance). In addition, they offer close-to-instantaneous
    delivery and settlement of the loan. These platforms play a crucial role in matching
    savers with borrowers, thereby creating a market for these loans. They differ
    in their interest rates, the amount of collateral, and the minimum deposit required.
    Interest rates typically range from less than a percentage point to two-digit
    rates of return, as shown in Table [8-4](#600732_1_En_8_Chapter.xhtml#Tab4).


    Table 8-4


    Lending Rewards in APY Offered by Binance As of January 2023 (Source: Binance
    App)


    | Provider | Cryptoasset | Ticker | APY | Lock Period |

    | --- | --- | --- | --- | --- |

    | Binance Savings | Axie Infinity | AXS | 12.0% | Flexible |

    | Binance Savings | Bitcoin | BTC | 1.5% | Flexible |

    | Binance Savings | USD Tether | USDT | 5.5% | Flexible |

    | Binance Savings | Chainlink | LINK | 0.2% | Flexible |'
