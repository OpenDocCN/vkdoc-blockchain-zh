  trans: '

    # 基于倍数的估值


    基本面价值衡量的另一个核心支柱是使用*倍数*。具体而言，采用此方法的分析师会衡量企业产生的可分配现金流，并将其乘以一个特定数字来确定企业的价值。这个特定数字，或*倍数*，可以根据同行业中类似企业的情况进行估算。当然，这种估值方法最终取决于现金流衡量的恰当性（例如，净收入、自由现金流或营业收益）以及所使用的倍数。具体来说，倍数分析主要受困于难以找到可比企业。每家企业都有使其区别于其他企业的特征。例如，一家有杠杆的公司（使用杠杆——即债务的公司）很难与一家无杠杆的公司相比较，因为其底层风险截然不同。因此，未来现金流的稳定性和可预测性也可能大相径庭。


    基于这些原因，即使在传统金融领域，分析师也必须对其估值进行任意调整，无论他们采用的是倍数法还是`NPV`法。这些调整对于传统投资而言已存在争议，对于大多数分析师来说陌生且全新的加密资产则更是如此。此外，使用倍数进行估值在评估以本资产计价的现金流资产时，面临着与`NPV`分析相同的局限性。因此，倍数法同样不是评估加密资产的完美工具。


    ## 资产价值、盈利能力与成长价值


    像本杰明·格雷厄姆和大卫·多德这样的传统价值投资者，认可上述`NPV`分析和基于倍数的估值法在传统投资中的局限性。此外，他们还列出了这些方法超出本书范围的一些其他缺陷。然而，为了解决这些局限性，他们提供了一种替代方法，即分别衡量真实资产净值、企业的盈利能力以及成长价值。这一点很重要，因为这三个术语中的最后一个——成长价值——高度依赖于分析师的任意估算，并且远不如其他两者具体。这种方法能够将有形价值与其余部分独立衡量[43]。


    然而，再次指出，即使是该等式中更为有形的部分——资产价值和盈利能力——也不能直接应用于加密资产。充其量，只有通过调整这些指标及其底层基本原理，人们才能合理运用此方法。以下各节将涵盖这些调整。


    ## 基于重置成本的资产价值


    第一个术语是*资产价值*，通常根据公司资产负债表上资产的账面净值进行评估。然而，一个完全数字化的资产通常缺乏传统的账面价值。特别是，权益证明加密资产的账面价值是不存在的，这使得这一术语对此类资产而言无关紧要。然而，工作量证明加密资产（尤其是比特币，因为它比所有其他`PoW`资产的总和还要大得多）的账面价值可以被解释为开采该资产所需的电力价值，这对应于*历史成本*。


    更合理的是，它可以基于在当前电价和哈希率下开采该资产所需的电力价值（即*重置成本*）来确定。事实上，比特币高昂的生产成本正是其价值基础所在。


    传统的供需论证支持了这种方法的有效性。在 18 世纪，经济学之父亚当·斯密将供需过程描述为*市场无形之手*。根据这一基本经济洞察，如果资产的卖家多于买家（供给高于需求），那么价格就会下跌。较低的价格会吸引更多买家并阻止部分卖家，从而在供需匹配处稳定价格。


    这一洞察可以扩展到`PoW`加密资产的定价。由于在工作量证明加密资产的区块链上挖矿需要电力，因此挖出一个新区块所需的电力价格可以作为需求的指示。实际上，如果一项资产对矿工的价值低于电力成本，矿工就不会花费开采该资产所需的电力。^(¹⁰⁹)


    如同供需例子一样，市场无形之手会将资产价格推至与开采该加密资产所需电力成本相匹配的水平。如果电价高于预期的挖矿奖励，矿工会将能源转向其他用途，例如向电网出售能源。相反，如果电价低于预期的挖矿奖励，矿工会扩大运营规模，更多矿工加入竞争。结果，哈希率会调整，直到恢复均衡。哈希率是衡量矿工对工作量证明加密资产未来价格预期的领先指标。


    追求自身利益的投资者会完成其余工作。特别是，正如中本聪早在 2010 年所指出的，一个有效市场中`PoW`加密资产的价格最终会跟随电价和哈希率所隐含的成本。^(¹¹⁰)


    > *任何商品的价格都趋于向其生产成本靠拢。如果价格低于成本，生产就会放缓。如果价格高于成本，通过生成和销售更多产品就能获利。同时，产量的增加会提高难度，从而将生产价格推向成本水平。*


    截至 2023 年 5 月撰写本文时，比特币的市场价格恰好与最新`ASIC`矿机所用电力平均成本所隐含的价格相符。详细计算见附录。


    在传统的价值投资中，公司资产负债表上的流动资产（如现金、有价证券或存货）比非流动资产（如房产、设备或商誉等无形资产）具有更可靠的价值。尽管如此，遵循格雷厄姆和多德传统的估值方法也会考虑诸如声誉和客户关系质量等无形资产。加密资产同样属于*无形资产*类别。因此，它们可以被估值，但这种估值方法对加密资产的局限性类似于对无形资产估值的局限性：它们几乎没有或根本没有清算价值。


    一家濒临倒闭企业的商誉会丧失其大部分（即便不是全部）价值。类似地，一个濒临失败的加密资产也会迅速失去其价值。因此，对无形资产和加密资产进行估值的底层假设是，它们都将继续经营。换句话说，假设它们未来会持续运营下去。

    '
- fmt: '## Earnings Power Value Based on Staking Rewards


    Contrary to proof-of-work cryptoassets, which have replacement costs but no future
    cash flows, proof-of-stake cryptoassets have future cash flows but no replacement
    costs. PoS cryptoassets were, therefore, not the target for asset value (last
    section) but are so for the upcoming earnings power value (`EPV`) analysis.


    As introduced in the `NPV` section, future staking rewards can be used as future
    cash flows—*earnings* in Graham and Dodd''s valuation approaches. When valuing
    `EPV` for a business, choosing the appropriate measure of earnings is essential.
    For example, `net operating profit after taxes` considers the impact of taxes,
    which is not the case of `operating income`. Similarly, measuring staking rewards
    in terms of their real yield is essential. For instance, there may be costs implied
    with holding a sufficient amount of a PoS cryptoasset to benefit from staking
    rewards. For example, to activate the validator software and stake ethers directly
    on the Ethereum blockchain, one must deposit at least 32 ETH (worth over $50,000
    as of this writing). In addition, validators need the computer on which they run
    the software to always be connected to the Internet; otherwise, they face penalties
    for being offline.


    Removing indirect costs from the gross staking yield provides a more accurate
    measure of earnings, based on which `EPV` can be computed with a standard `NPV`
    approach. Similar to traditional finance models in value investing, `EPV` is obtained
    by dividing earnings by the cost of capital for the investor. As the denominator
    (the cost of capital) is similar for cryptoasset and traditional investments,
    this book does not cover its details and challenges. A sufficient number of quality
    resources already exist on the topic.


    ## Valuing Growth


    While most traditional value investors focus exclusively on the tangible part
    of a business, the industry generally evolved toward valuing growth in the last
    three decades. Indeed, a growing business typically has more value than a stable
    business, even if the book value of assets is similar. It is one of the reasons
    why some technology companies are valued in trillions of dollars.


    Besides, for most new high-growth businesses (e.g., ambitious technology start-ups),
    growth represents the lion''s share of their valuation. In this respect, cryptoassets
    share similarities. They are also new, high-growth endeavors whose primary value
    resides not in their tangible assets but in their growth prospects. Growth, however,
    is by far the most challenging element to value. In particular, it tends to be
    systematically and materially overvalued for technology companies. This fact substantiates
    our recommendation to take cryptoasset valuations, regardless of the method, with
    a considerable error margin and tilt toward the more conservative end of the valuation
    range. It does not mean that valuation is impossible, just that any valuation
    method is inaccurate and an overvaluation bias likely.


    Moreover, growth for a cryptoasset is very different from growth for a traditional
    business. While the value of a traditional business depends on the pace of organic
    growth of its revenue stream, this is not what is creating value for cryptoassets.
    In contrast, in the crypto industry, it is rather the usage of an asset that is
    creating value. In particular, the higher the usage of a currency, network, or
    cryptoasset, the more it is valuable to all users. This leads us to identify possible
    metrics for assessing usage.


    ## Measuring and Valuing Usage of a Cryptoasset


    ![](images/600732_1_En_16_Chapter/600732_1_En_16_Fig1_HTML.jpg)


    An illustration of 3 sets of networks. 1. one telephone connected to another.
    2. A pentagonal interconnection of networks between 5 telephones. 3. 12 telephones
    in a circle are interconnected to one another.


    **Figure 16-1** An illustration of Metcalfe''s law and the value of a network
    represented by connections between telephones: the more users on the network,
    the more this network becomes valuable. (Source: Wikicommons, public domain)


    Metcalfe''s law illustrates why usage may be the primary driver for value. Coined
    by Robert Metcalfe, one of the founders of Ethernet, Metcalfe''s law states that
    the value of a network is proportional to the square of its number of users. In
    a simple example, if you are the only person in the world with a telephone with
    no other function than calling, it has little value to you. However, once another
    user has a telephone, yours becomes valuable because you can call the other user.
    When a third user joins the network, the original two phones have more value because
    more people can call. With every new user on the network, all phones become more
    valuable. Since the value of the network can be represented as the number of connections
    between nodes, it increases quadratically with the number of nodes. As per Metcalfe''s
    law, the value grows with adoption and much faster than the number of users.


    This law is especially relevant when valuing social media networks such as Twitter,
    Facebook, Instagram, or Weixin/WeChat. Also, companies like Uber, Airbnb, or eBay
    follow a similar logic. Likewise, a cryptoasset used as a currency also falls
    in this category. Every buyer on the network adds value to every seller and vice
    versa. The first metric to measure usage is, therefore, the number of nodes on
    the network.


    The next metric is activity. For instance, active users bring more value to the
    network than inactive users. Continuing with the telephone example, if most users
    hardly ever make any call, the network has less value than if they are all regular
    callers. Among other reasons, regular users are more likely to incentivize non-users
    to join the network for telephones, social media, or currencies. Activity for
    cryptoassets can be measured, for example, by the volume of transactions. However,
    exceptionally low transaction fees for some cryptoassets make this metric easily
    manipulable. Indeed, a single node could create multiple pseudonymous accounts
    and make many fake transactions between accounts to simulate activity. Instead,
    an alternative and less manipulable activity metric is the total transaction costs
    (or `gas fees`). Any wealthy buyer could theoretically manipulate the metric,
    but doing so would come at a high cost, disincentivizing the nefarious behavior.


    Alternative metrics for usage depend on the nature of the cryptoasset. For instance,
    in the case of Defi protocols, the *total value locked* (`TVL`) is the crypto
    equivalent of *assets under management* (`AUM`) of traditional investment funds.
    In particular, `TVL` includes all assets locked into a Defi protocol''s functions,
    such as staking, lending, or liquidity pools. Higher `TVL`s indicate that more
    value is dedicated to the functions enabled by a Defi protocol. The greater the
    value of the protocol, the more people rely on its native currency to take advantage
    of its services. `TVL` is a reasonable proxy for the usage of the corresponding
    cryptoasset.'
  raw: '## Earnings Power Value Based on Staking Rewards


    Contrary to proof-of-work cryptoassets, which have replacement costs but no future
    cash flows, proof-of-stake cryptoassets have future cash flows but no replacement
    costs. PoS cryptoassets were, therefore, not the target for asset value (last
    section) but are so for the upcoming earnings power value (EPV) analysis.


    As introduced in the NPV section, future staking rewards can be used as future
    cash flows—*earnings* in Graham and Dodd’s valuation approaches. When valuing
    EPV for a business, choosing the appropriate measure of earnings is essential.
    For example, net operating profit after taxes considers the impact of taxes, which
    is not the case of operating income. Similarly, measuring staking rewards in terms
    of their real yield is essential. For instance, there may be costs implied with
    holding a sufficient amount of a PoS cryptoasset to benefit from staking rewards.
    For example, to activate the validator software and stake ethers directly on the
    Ethereum blockchain, one must deposit at least 32 ETH (worth over $50,000 as of
    this writing). In addition, validators need the computer on which they run the
    software to always be connected to the Internet; otherwise, they face penalties
    for being offline.


    Removing indirect costs from the gross staking yield provides a more accurate
    measure of earnings, based on which EPV can be computed with a standard NPV approach.
    Similar to traditional finance models in value investing, EPV is obtained by dividing
    earnings by the cost of capital for the investor. As the denominator (the cost
    of capital) is similar for cryptoasset and traditional investments, this book
    does not cover its details and challenges. A sufficient number of quality resources
    already exist on the topic.


    ## Valuing Growth


    While most traditional value investors focus exclusively on the tangible part
    of a business, the industry generally evolved toward valuing growth in the last
    three decades. Indeed, a growing business typically has more value than a stable
    business, even if the book value of assets is similar. It is one of the reasons
    why some technology companies are valued in trillions of dollars.


    Besides, for most new high-growth businesses (e.g., ambitious technology start-ups),
    growth represents the lion’s share of their valuation. In this respect, cryptoassets
    share similarities. They are also new, high-growth endeavors whose primary value
    resides not in their tangible assets but in their growth prospects. Growth, however,
    is by far the most challenging element to value. In particular, it tends to be
    systematically and materially overvalued for technology companies. This fact substantiates
    our recommendation to take cryptoasset valuations, regardless of the method, with
    a considerable error margin and tilt toward the more conservative end of the valuation
    range. It does not mean that valuation is impossible, just that any valuation
    method is inaccurate and an overvaluation bias likely.


    Moreover, growth for a cryptoasset is very different from growth for a traditional
    business. While the value of a traditional business depends on the pace of organic
    growth of its revenue stream, this is not what is creating value for cryptoassets.
    In contrast, in the crypto industry, it is rather the usage of an asset that is
    creating value. In particular, the higher the usage of a currency, network, or
    cryptoasset, the more it is valuable to all users. This leads us to identify possible
    metrics for assessing usage.


    ## Measuring and Valuing Usage of a Cryptoasset


    ![](images/600732_1_En_16_Chapter/600732_1_En_16_Fig1_HTML.jpg)


    An illustration of 3 sets of networks. 1\. one telephone connected to another.
    2\. A pentagonal interconnection of networks between 5 telephones. 3\. 12 telephones
    in a circle are interconnected to one another.


    Figure 16-1


    An illustration of Metcalfe’s law and the value of a network represented by connections
    between telephones: the more users on the network, the more this network becomes
    valuable. (Source: Wikicommons, public domain)


    Metcalfe’s law illustrates why usage may be the primary driver for value. Coined
    by Robert Metcalfe, one of the founders of Ethernet, Metcalfe’s law states that
    the value of a network is proportional to the square of its number of users. In
    a simple example, if you are the only person in the world with a telephone with
    no other function than calling, it has little value to you. However, once another
    user has a telephone, yours becomes valuable because you can call the other user.
    When a third user joins the network, the original two phones have more value because
    more people can call. With every new user on the network, all phones become more
    valuable. Since the value of the network can be represented as the number of connections
    between nodes, it increases quadratically with the number of nodes. As per Metcalfe’s
    law, the value grows with adoption and much faster than the number of users.


    This law is especially relevant when valuing social media networks such as Twitter,
    Facebook, Instagram, or Weixin/WeChat. Also, companies like Uber, Airbnb, or eBay
    follow a similar logic. Likewise, a cryptoasset used as a currency also falls
    in this category. Every buyer on the network adds value to every seller and vice
    versa. The first metric to measure usage is, therefore, the number of nodes on
    the network.


    The next metric is activity. For instance, active users bring more value to the
    network than inactive users. Continuing with the telephone example, if most users
    hardly ever make any call, the network has less value than if they are all regular
    callers. Among other reasons, regular users are more likely to incentivize non-users
    to join the network for telephones, social media, or currencies. Activity for
    cryptoassets can be measured, for example, by the volume of transactions. However,
    exceptionally low transaction fees for some cryptoassets make this metric easily
    manipulable. Indeed, a single node could create multiple pseudonymous accounts
    and make many fake transactions between accounts to simulate activity. Instead,
    an alternative and less manipulable activity metric is the total transaction costs
    (or gas fees). Any wealthy buyer could theoretically manipulate the metric, but
    doing so would come at a high cost, disincentivizing the nefarious behavior.


    Alternative metrics for usage depend on the nature of the cryptoasset. For instance,
    in the case of Defi protocols, the *total value locked* (TVL) is the crypto equivalent
    of *assets under management* (AUM) of traditional investment funds. In particular,
    TVL includes all assets locked into a Defi protocol’s functions, such as staking,
    lending, or liquidity pools. Higher TVLs indicate that more value is dedicated
    to the functions enabled by a Defi protocol. The greater the value of the protocol,
    the more people rely on its native currency to take advantage of its services.
    TVL is a reasonable proxy for the usage of the corresponding cryptoasset.'
  trans: '

    ## 基于质押奖励的盈利价值


    与工作量证明加密资产（有重置成本但无未来现金流）相反，权益证明加密资产有未来现金流但无重置成本。因此，PoS 加密资产并非上一节中资产价值的评估对象，而是即将进行的盈利价值（`EPV`）分析的目标。


    正如 `NPV` 部分所介绍的，未来的质押奖励可作为未来现金流——即格雷厄姆和多德估值方法中的*盈利*。在评估企业的 `EPV` 时，选择合适的盈利衡量标准至关重要。例如，`税后净营业利润`考虑了税收的影响，而`营业利润`则不然。同样，以实际收益来衡量质押奖励也至关重要。例如，持有足够数量的
    PoS 加密资产以从质押奖励中获益可能涉及隐含成本。比如，要激活验证器软件并直接在以太坊区块链上质押以太币，用户必须存入至少 32 ETH（撰写本文时价值超过
    50,000 美元）。此外，验证器需要运行该软件的计算机始终保持联网状态；否则，他们将因离线而面临惩罚。


    从总质押收益率中扣除间接成本，可以提供更准确的盈利衡量标准。基于此，可以使用标准的 `NPV` 方法计算 `EPV`。与价值投资中的传统金融模型类似，`EPV`
    是通过将盈利除以投资者的资本成本得出的。由于分母（资本成本）在加密资产和传统投资中类似，本书不涉及其细节和挑战。关于该主题已有足够多的优质资源。


    ## 评估增长


    虽然大多数传统价值投资者只关注企业的有形部分，但过去三十年来，整个行业通常已转向评估增长。事实上，即使资产账面价值相似，增长型企业通常也比稳定型企业具有更高的价值。这也是某些科技公司估值高达数万亿美元的原因之一。


    此外，对于大多数新的高增长企业（例如雄心勃勃的科技初创公司）而言，增长在其估值中占据主要份额。在这方面，加密资产具有相似之处。它们同样是新的、高增长的事业，其主要价值不在于有形资产，而在于增长前景。然而，增长是迄今为止最难评估的要素。特别是，对于科技公司而言，增长往往会被系统性地、显著地高估。这一事实支持了我们的建议：无论采用何种方法，都应带着相当大的误差范围来看待加密资产估值，并倾向于估值区间中更保守的一端。这并不意味着估值不可能，只是说明任何估值方法都不准确，并且很可能存在高估偏差。


    此外，加密资产的增长与传统企业的增长截然不同。传统企业的价值取决于其收入流的有机增长速度，但这并非加密资产创造价值的方式。相反，在加密行业中，正是资产的使用在创造价值。特别是，一种货币、网络或加密资产的使用率越高，它对所有用户的价值就越大。这引导我们确定评估使用情况的可能指标。


    ## 衡量和评估加密资产的使用情况


    ![](img/600732_1_En_16_Fig1_HTML.jpg)


    三组网络的示意图。1. 一部电话连接到另一部。2. 五部电话之间的五边形网络互联。3. 呈圆环状互联的 12 部电话。


    **图 16-1** 梅特卡夫定律的图示以及由电话连接所代表的网络价值：网络上的用户越多，该网络的价值就越大。（来源：维基共享资源，公有领域）


    梅特卡夫定律阐明了为什么使用情况可能是价值的主要驱动因素。该定律由以太网创始人之一罗伯特·梅特卡夫提出，指出网络的价值与其用户数的平方成正比。用一个简单的例子来说明：如果你是世界上唯一拥有电话的人，而电话除了通话外没有其他功能，那么它对你来说几乎没什么价值。但是，一旦另一个用户也有了电话，你的电话就变得有价值了，因为你可以给那个用户打电话。当第三个用户加入网络时，原来的两部电话有了更大的价值，因为可以联系的人更多了。随着网络上的每个新用户加入，所有电话的价值都变得更大了。由于网络的价值可以表示为节点之间的连接数，因此它随节点数呈二次方增长。根据梅特卡夫定律，价值随采用率的增长而增长，其速度远快于用户数的增长。


    这条定律在评估社交网络（如 Twitter、Facebook、Instagram 或微信/WeChat）时尤其相关。同样，像 Uber、Airbnb 或 eBay
    这样的公司也遵循类似的逻辑。同样，被用作货币的加密资产也属于这一类。网络上的每个买家都会为每个卖家增加价值，反之亦然。因此，衡量使用情况的第一个指标是网络上的节点数。


    下一个指标是活跃度。例如，活跃用户比不活跃用户能为网络带来更多价值。继续以电话为例，如果大多数用户几乎从不打电话，那么这个网络的价值就低于所有用户都定期通话的情况。原因之一是，对于电话、社交媒体或货币而言，定期用户更有可能激励非用户加入网络。加密资产的活跃度可以通过交易量来衡量。然而，某些加密资产异常低的交易费用使得该指标容易被操纵。实际上，单个节点可以创建多个匿名账户，并在这些账户之间进行大量虚假交易以模拟活跃度。取而代之的，另一种不易被操纵的活跃度指标是总交易成本（或`gas
    费`）。理论上，任何富有的买家都可以操纵该指标，但这样做成本高昂，从而抑制了这种恶意行为。


    衡量使用情况的其他指标取决于加密资产的性质。例如，在 DeFi 协议的情况下，*总锁定价值*（`TVL`）相当于传统投资基金*管理资产规模*（`AUM`）的加密版本。具体来说，`TVL`
    包括锁定在 DeFi 协议功能（如质押、借贷或流动性池）中的所有资产。更高的 `TVL` 表明有更多价值投入到 DeFi 协议所启用的功能中。协议的价值越高，就有越多的人依赖其原生货币来利用其服务。`TVL`
    是衡量相应加密资产使用情况的一个合理代理指标。

    '
- fmt: 'Usage metrics can be adjusted by analysts valuing cryptoassets to reflect
    the genuine underlying usage. For example, an analyst may want to attribute more
    value to users living by the industry’s decentralization spirit than speculators
    on centralized exchanges. Indeed, a user going through the necessary hurdles to
    set up a self-custodial wallet is likely more committed to the underlying asset
    than users on centralized exchanges are. A usage metric can be weighed based on
    custodial dominance for the asset (i.e., the ratio of custodial funds over total
    existing funds). For example, an analyst could define that the more dominant self-custody
    is for a cryptoasset, the more valuable its users are.


    Possible proxies for using a cryptoasset are the number of active addresses, the
    number of transactions, gas fees, total transaction costs, and total value locked.
    The transparency enabled by blockchain technology implies that these metrics are
    directly retrievable from the blockchain in real time. Due to the manipulability
    of these metrics, using a combination of these proxies is likely a better approach
    than using exclusively any of them.


    Finally, let us highlight that the market capitalization of a cryptoasset is not
    a measure of usage. Since it is the valuation given by the market, it is not the
    input in any valuation but the market’s average output of all valuations.


    ## Measuring Growth Based on Usage


    These metrics enable investors to value the growth portion of a network’s valuation.
    In particular, the growth pace of usage is the technology’s diffusion rate. In
    particular, the global (identity-verified) user base of cryptoassets increased
    by nearly 190% per year between 2018 and 2020 before accelerating even further
    in 2021 and 2022.^([^(111)](#fn111)) The exact figure depends on which metric
    is used and how it is measured, but most estimates indicate usage growth of over
    100% per year. This rate means that cryptoasset adoption more than doubles every
    year. For comparison, Internet adoption when it had a similar number of users
    (300 to 400 million) was approximately half as fast.


    Technology adoption is not linear. Typically, it follows an S-curve, with a slow
    start followed by a steep acceleration punctuated by a slow finish. Everett Rogers’
    book *Diffusion of Innovations* became a classic in which Figure [16-2](#600732_1_En_16_Chapter.xhtml#Fig2)
    is presented. In this figure, the Bell curve represents the adoption rate at any
    point over an innovation’s life. The S-curve ending at 100% is the cumulated share
    of the market that the innovation captured until reaching its peak.


    ![](images/600732_1_En_16_Chapter/600732_1_En_16_Fig2_HTML.jpg)


    A rightward leaning S-curve of market share ending at 100% intersects a bell curve
    of adoption rate that has the following values. Innovators 2.5%, early adopters
    13.5%, early majority 34%, late majority 34%, and laggards 16%.


    **Figure 16-2** Rate of diffusion of innovations according to Everett Rogers (Source:
    Wikicommons, public domain [50])


    Based on the accelerating pace of adoption and the potential market available,
    the cryptoasset industry is in the *early adopter* phase as of 2023. Besides,
    with a typical S-curve, the time it takes to get from 0 to 10% (2009 to 2022 for
    cryptoassets) is the same as the time it takes to get from 10% to 90% (suggesting
    2022 to 2035). Furthermore, per the GWI market research, worldwide usage of cryptoasset
    (by Internet users aged 16 to 64) stood at 13% in January 2023.^([^(112)](#fn112))
    These insights suggest that adoption (usage) will likely increase by a factor
    of 5 over the coming decade.


    ## Including Supply in Valuations


    As mentioned in the introduction, the market price of tradable securities is ultimately
    determined by the point where supply meets demand. Demand is in many ways similar
    to usage, as described in the previous sections. In contrast, the supply of a
    cryptoasset is the total quantity available of it. Many cryptoassets are capped
    at a fixed amount, with a transparent process on how and at which pace this amount
    will be reached. For example, the total number of bitcoins that will ever be minted
    is 21 million. They are issued progressively, with every new block, which is about
    every 10 minutes. Also, the issue is done at a decreasing pace, as the reward
    per block is divided by two every 210,000 blocks, which is roughly every four
    years. The Bitcoin supply will continue to follow this pattern until all 21 million
    bitcoins are issued, around the year 2140, after which no new bitcoin will ever
    be minted. However, the nature of halving events implies that by the fourth halving
    event in 2024, 93.75% of the entire supply will have already been mined. Other
    cryptoassets follow different patterns; while some also have a capped maximum
    theoretical supply (e.g., Cardano), other cryptoassets’ supply is ever-expanding
    (e.g., Dogecoin), and others still are deflationary (e.g., Ethereum).^([^(113)](#fn113))


    Nevertheless, genuine supply is not the total theoretical amount coded in the
    cryptoasset’s feature but the amount of retrievable and tradable coins. In reality,
    many asset owners have lost their private keys, making all corresponding coins
    irretrievable and the supply much lower than the theoretical amount suggests.
    For example, at least 20% of all bitcoins are estimated to be held in wallets
    whose private keys have been lost. Based on this figure, the total real supply
    of Bitcoin is not 21 million but below 16.8 million.'
