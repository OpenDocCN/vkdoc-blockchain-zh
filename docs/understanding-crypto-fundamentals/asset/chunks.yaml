  trans: "\n# 16. 加密资产的价值投资\n\n> *本质上，股票市场代表了三种不同类型的商业活动。经通胀调整后，它们分别是：内在价值缩水的企业、内在价值大致稳定的企业，以及内在价值稳步增长的企业。我们的偏好始终是，以远低于增长中内在价值的价格，买入一家长期特许经营企业。*\n\
    > \n> ——迈克尔·伯里\n\n正如本书开篇所介绍，价值投资，或称 *基本面分析*，聚焦于基本面。它识别并衡量为资产赋予真实经济价值的支柱。价值投资者将资产的价值与价格进行比较，并在价格显著低于价值时进行投资。当价格最终向基础价值收敛时，投资者便实现了收益。\n\
    \n即使在传统金融领域，价值投资者也面临着对不同性质资产进行估值的挑战。例如，传统的现金流贴现方法适用于某些资产（如具有预期未来现金流的高增长公司），却不适用于其他资产，在后一种情况下，价值与收益的比率可能更为合适。随着加密资产成为一种可投资资产类别，价值投资者面临着额外的、新的、不同的挑战。然而，价值投资既不局限于一种或几种方法，也不局限于一种或几种资产类别。它更是一种原则——一种方法。价值投资关注的是对投资长期真实经济价值的押注。\n\
    \n尽管如此，价值投资和加密资产这两个术语，传统投资者并不喜欢将它们放在同一个句子里。事实上，传统上用于计算投资预期回报的资本资产定价模型，并不能直接适用于加密资产，这使得任何后续分析都成了一次更具冒险性的尝试。\n\
    \n本书的目标一直是消解加密资产与价值投资这两个术语之间看似存在的二元对立。对加密资产进行价值投资不仅可行，而且是将这一新资产类别与传统投资焊接在一起的关键要素。这对于推动金融和投资行业迈向新阶段，利用加密资产的突破性潜力至关重要。\n\
    \n从 2020 年到 2023 年，加密市场的规模（所有加密资产的总市值）在 0.7 万亿美元到 3 万亿美元之间波动。要知道这个规模是多了还是少了，就需要衡量加密资产基础价值的方法。不幸的是，传统的金融建模技术无法直接用于加密资产估值。至少，它们需要经过调整，才能对加密资产提供有意义的估值。本章将回顾并调整传统的估值方法，并介绍针对加密资产的特定方法。\n\
    \n## 结合多种估值方法\n\n审慎的投资者不希望依赖单一的估值方法，尤其是对于加密资产。相反，结合多种估值方法并为每种方法分配权重，可能会提供更合理的估值。例如，假设方法\
    \ A 将某个特定资产在当年年底的价值估值为 7 美元，而方法 B 将同一资产估值为 12 美元。如果投资者认为方法 A 更可靠，并赋予其 80%的权重，给方法\
    \ B 留 20%的权重，那么该资产的合理估值将是 8 美元（`$7 × 80% + $12 × 20% = $8`）。\n\n此外，使用不同的方法可以提供一系列可能的价值，揭示该资产可能出现不同程度的变化。这种方法因此可以减轻对精确估值的错觉，否则这种错觉可能导致错误的财务决策。即使是那些现金流稳定、根基稳固的资产，也难以精确估值，无论模型质量如何，因为它们也受到不确定事件的影响。例如，一家美国汽车制造商的股价会受到大宗商品价格预期、欧洲汽车排放法规以及来自日本的竞争等因素的影响。20\
    \ 世纪英国统计学家乔治·博克斯的一句名言恰如其分地概括了这一现实。\n\n> *所有模型都是错的，但有些是有用的。*\n\n更合理的财务估值方法是考虑未来价格的预期方向。真正的目标是方向正确，而不是精确地错误。就加密资产而言，一个\
    \ 24 个月后的估值落在正确的数量级内，就可以认为足够精确了。考虑到围绕加密资产未来处理方式的不确定性，即使这样一个宽泛的范围也似乎难以预测。以比特币为例，投资者对其\
    \ 2024 年底的估值跨越了至少三个数量级：低于 10 万美元、介于 10 万到 100 万美元之间、以及高于 100 万美元。目标估值日期越靠后，这个范围就越广。\n\
    \n> *方向正确，而非精确地错误。*\n\n本着这一目标，最佳实践建议保持估值模型的简洁性。一个简单的模型通常比一个复杂的模型更有用，后者有更大的出错空间和未被充分认识的风险。\n\
    \n## 未来现金流的净现值\n\n净现值方法或现金流贴现法，衡量的是未来现金流入和流出的当前价值。要理解这一点，首先必须承认货币的时间价值。例如，今天收到\
    \ 100 美元比明年收到 100 美元更有价值，即使这是绝对确定的。因为今天的 100 美元可以用于投资，预计明年会变得更有价值。因此，未来的现金流越远，其金额必须越大，才能与今天等额的现金流具有相同的价值。换句话说，未来现金流的现值是被贴现的。\n\
    \n净现值方法表明，一项资产的价值是其未来现金流现值之和。为了计算它，分析师需要估计未来的现金流和贴现率。这种方法传统上是基本面分析的核心。然而，反对将其用于加密资产的一个常见理由是，它们没有未来现金流。首先，这个论点在技术上是错误的，因为一些加密资产确实有未来现金流。例如，任何权益证明机制的加密资产（如以太坊）都会产生未来的质押奖励，这些奖励可以在净现值分析中用作现金流。\n\
    \n然而，与以美元产生现金流的传统公司不同之处在于，质押的加密资产会以加密资产本身的形式提供质押收益。例如，质押卡尔达诺会以其原生币 `ADA` 的形式产生收益。这是一个“先有鸡还是先有蛋”的问题，加密资产的价值取决于未来更多该种加密资产的流入。如果有人试图用净现值分析来评估美元相对于另一种货币的价值，也会出现同样的问题。因此，即使对于有未来现金流的加密资产，传统的净现值模型充其量也只是一个存在局限性的估值工具。\n"
- fmt: '# Valuation Based on Multiples


    Another central pillar in fundamental value measurement is the use of *multiples*.
    In particular, analysts using this method measure distributable cash flows generated
    by a business and multiply them by a specific number to establish the value of
    the business. The specific number, or *multiple*, can be estimated based on similar
    businesses in the same industry. Of course, this valuation method ultimately depends
    on the appropriateness of measuring cash flows (e.g., net income, free cash flows,
    or operating earnings) and the multiple used. Specifically, multiple analysis
    suffers predominantly from the difficulty of finding comparable businesses. Every
    business has characteristics making it different from any other. For example,
    a levered company (one that uses leverage—i.e., debt) can hardly be compared to
    a non-levered one because the underlying risks are vastly different. Therefore,
    the stability and predictability of future cash flows can be very dissimilar.


    For these reasons, even in traditional finance, analysts must arbitrarily adjust
    their valuations, regardless of whether they use a multiples approach or an `NPV`
    one. These adjustments are already controversial for traditional investments and
    would be even more so for cryptoassets, which are new and unknown to most analysts.
    In addition, valuations using multiples suffer from the same limitation as `NPV`
    analyses for valuing an asset with cash flows expressed in this asset. Multiples
    are, therefore, also an imperfect tool for valuing cryptoassets.


    ## Asset Value, Earnings Power and Value of Growth


    Traditional value investors such as Benjamin Graham and David Dodd accept the
    aforementioned limitations of `NPV` analyses and valuations based on multiples
    for traditional investments. In addition, they list several additional shortcomings
    of these methods beyond the scope of this book. To address these limitations,
    however, they offer an alternative approach, consisting in measuring the real
    net asset value, the earnings power of a business, and the value of growth separately.
    This is important because the last of these three terms, the value of growth,
    is highly subject to an analyst’s arbitrary estimates and much less tangible than
    the other two. This approach enables tangible value to be measured independently
    from the rest [43].


    Again, however, even the more tangible parts of the equation—asset value and earnings
    power—are not directly applicable to cryptoassets. At best, only by adapting these
    metrics and their underlying fundaments can one reasonably use this approach.
    The following sections cover these adaptations.


    ## Asset Value Based on Replacement Costs


    The first of the terms is *asset value*, typically assessed based on the net book
    value of the assets on a company’s balance sheet. However, a fully digital asset
    typically lacks traditional book value. In particular, the book value of a proof-of-stake
    cryptoasset is non-existent, which makes this term irrelevant for such assets.
    However, the book value of a proof-of-work cryptoasset (in particular Bitcoin,
    because it is much larger than all other `PoW` assets combined) could be interpreted
    as the value of the electricity that was required to mine the asset, which corresponds
    to *historical costs*.


    More reasonably, it could be based on the value of the electricity required to
    mine the asset at the current electricity price and hash rate (i.e., *replacement
    costs*). Indeed, Bitcoin’s costly production costs are precisely what give it
    a basis for value.


    A traditional supply and demand argument makes a case for the validity of this
    approach. In the eighteenth century, the father of economics, Adam Smith, described
    the process of supply and demand as the *invisible hand of the market*. As per
    this fundamental economic insight, if there are more sellers than buyers of an
    asset (supply is higher than demand), then the price drops. A lower price attracts
    more buyers and discourages some sellers, stabilizing prices where supply matches
    demand.


    This insight can be extended to price `PoW` cryptoassets. Since mining blocks
    on the blockchain of a proof-of-work cryptoasset requires electricity, the price
    of the electricity necessary to mine a new block can be used as an indication
    of demand. Indeed, miners would not spend the electricity necessary to mine the
    asset if it had less value to them than the price of this electricity.^([^(109)](#fn109))


    As in the supply and demand example, the invisible hand of the market pushes the
    asset price to where it matches the price of the electricity necessary to mine
    that cryptoasset. Should the electricity price be higher than the expected mining
    rewards, miners redirect their energy toward another purpose, such as selling
    energy to the grid. Conversely, should the electricity price be lower than the
    expected mining rewards, miners upscale their operations, and more miners join
    the race. As a result, the hash rate adjusts until the equilibrium is restored.
    The hash rate is a leading indicator of miners’ expectations of the future price
    of a proof-of-work cryptoasset.


    Investors pursuing their self-interest do the rest of the job. In particular,
    the price of a `PoW` cryptoasset in an efficient market eventually follows costs
    implied by the electricity price and hash rate, as Satoshi Nakamoto was already
    suggesting in 2010.^([^(110)](#fn110))


    > *The price of any commodity tends to gravitate toward production costs. If the
    price is below costs, then production slows down. If the price is above cost,
    profit can be made by generating and selling more. At the same time, the increased
    production would increase the difficulty, pushing the cost of generating toward
    the price.*


    As of this writing in May 2023, the market price of Bitcoin corresponds exactly
    to the price implied by the average cost of the electricity used by the latest
    `ASIC` miners. Detailed computations are shown in the Appendices.


    In traditional value investing, liquid assets on a company’s balance sheet (current
    assets such as cash, marketable securities or inventory) have a more reliable
    value than illiquid assets (property, equipment or intangibles such as goodwill).
    Nevertheless, valuations in the Graham and Dodd tradition also consider intangible
    assets such as reputation and quality of customer relationships. Cryptoassets
    similarly fall in the *intangibles* category. Therefore, they can be valued, but
    the limitation of this valuation approach for cryptoassets is similar to the limitation
    of valuing intangibles: they have little to no liquidation value.


    A failing business’ goodwill loses most, if not all, of its value. Similarly,
    a failing cryptoasset would quickly lose its value. The underlying assumption
    for valuing both an intangible and a cryptoasset is, therefore, that they remain
    going concerns. In other words, they are assumed to continue their activities
    in the future.'
