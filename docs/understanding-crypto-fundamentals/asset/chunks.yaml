  trans: '

    ### 交易所交易基金（ETF）


    交易所交易基金（`ETF`）是一种追踪某项或某组资产表现的投资工具。与直接投资标的资产相比，`ETF` 为投资者提供了多项优势。首先，它们能实现投资组合多元化。通过购买某个指数的
    `ETF`，投资者无需逐一购买每项资产，就能获得对所有标的资产的风险敞口。其次，`ETF` 通常具有很高的流动性，可以按公允市场价格进行大量买卖。第三，投资者无需熟悉加密资产钱包。然而，购买
    `ETF` 可能比直接购买标的工具更昂贵，因为 `ETF` 会收取年费（例如，投资金额的 0.8%）。


    针对主要加密资产的 `ETF`（包括现货 `ETF` 和期货 `ETF`）在许多国家越来越普及。现货 `ETF` 简单地追踪标的加密资产的价值。如果比特币价格上涨，那么比特币现货
    `ETF` 价格也会以相同比例上涨。


    期货 `ETF` 追踪标的加密资产“期货”的价值。“期货”是一种金融产品，双方约定一方将在特定日期以约定价格买入约定数量的资产，无论该资产在该日期实际价格如何。例如，爱丽丝和鲍勃签订了一份比特币期货合约，爱丽丝将在
    12 月 31 日以每个 50,000 美元的价格从鲍勃处购买两个比特币。即使届时比特币价格低于 50,000 美元，爱丽丝也必须以每个 50,000 美元的价格从鲍勃处买入这两个比特币。同样，即使比特币价格高于
    50,000 美元，鲍勃也必须以每个 50,000 美元的价格卖出这两个比特币。期货为未来的买入或卖出价格提供了确定性。比特币期货 `ETF` 追踪比特币期货在公开市场上的交易价值。


    截至 2023 年 5 月，提供比特币现货 `ETF` 的国家包括澳大利亚、巴西、加拿大、荷兰和新加坡。此外，多个国家也提供以太坊现货 `ETF`。值得注意的是，美国是少数几个未批准任何加密资产现货
    `ETF` 的国家之一。特别是，美国证券交易委员会（`SEC`）以存疑的理由拒绝了所有比特币现货 `ETF` 的申请，这些决定正在法院上诉中。


    然而，期货 `ETF` 的适用范围更广。例如，自 2021 年 10 月 19 日起，美国市场已提供首支比特币期货 `ETF`。截至撰写本文时，美国已批准六支比特币期货
    `ETF` 上市交易，另有 25 支正在等待批准。同样，许多其他国家也提供比特币和以太坊期货 `ETF`。


    ### 使用区块链的公司


    除了 `ETF`，另一种间接接触加密资产的途径是投资于目前正在使用区块链技术或正在开发区块链技术新用例的公司。与直接投资加密资产不同，此类间接投资是标准的（类似于投资任何公司），并且不需要针对加密资产的特殊报告或监管措施。


    ### 资产负债表上持有加密资产的公司


    类似地，投资者可以投资那些资产负债表上持有大量加密资产的公司。例如，上市公司商业智能公司 `MicroStrategy` 在 2023 年初持有 130,000
    枚比特币，价值超过 30 亿美元，大致相当于该公司的总市值。因此，如图 8-1 所示，该公司的股票价格非常密切地反映了比特币价格的演变（2020-2022
    年相关系数：93%）。


    ![一张双轴折线图，展示了 2020 年 1 月至 2023 年 1 月比特币价格（以百万美元计）与 MSTR 股票价格的变化。两条波动剧烈的线先升后降。比特币价格线位于
    MicroStrategy 价格线上方。](img/600732_1_En_8_Fig1_HTML.jpg)


    **图 8-1** 2020 年 1 月至 2023 年 1 月比特币价格（左轴）与 `MicroStrategy` 公司（`NASDAQ`: `MSTR`）以`美元`计价的股票价格（右轴）


    其他可公开交易的公司也持有比特币，但其持有比例远低于 `MicroStrategy`。这些公司包括 `Tesla` (`TSLA`)、`Galaxy Digital
    Holding` (`BRPHF`) 和 `Block`（前身为 `Square`，股票代码 `SQ`）。虽然购买这些公司的股票可能提供一些对比特币的间接敞口，但这种敞口并不完美。特别是，如果未来几年比特币价格翻十倍，这些公司的价值可能会增加，但它们不太可能同样经历
    10 倍的估值增长。


    ### 提供加密服务的公司


    从事加密资产挖矿或提供其他加密服务的公司是另一种间接（且不完美的）加密资产投资方式。例如，`Marathon Digital Holdings` (`MARA`)
    是一家主要的比特币挖矿公司，截至 2022 年底持有近 12,000 枚比特币，其目标是“在北美建立最大的挖矿业务”，拥有约 69,000 台 `ASIC`
    矿机。挖矿和 `ASIC` 将在下一节中解释。


    加密资产交易所是另一种可能性。例如，`Coinbase` 是美国最知名的公共加密交易所之一，也是首家上市的此类交易所。其资产负债表上也持有大量比特币（2022
    年为 9,000 枚），因此风险敞口是双重的：来自其运营以及比特币价格波动。

    '
- fmt: '# Early-Stage Cryptoasset Investing


    An alternative way to gain exposure to cryptoassets consists of investing at the
    earliest development stage. Several offerings exist, with typically high possible
    rewards but also high risks.


    Traditionally, when a private company decides to go public (i.e., to emit shares
    publicly buyable by many outside investors), it does so through an Initial Public
    Offering (`IPO`). In an `IPO`, investors buy a share of the underlying company.
    The crypto industry leveraged this established notion by developing Initial Coin
    Offerings (`ICO`). An `ICO` is fundamentally a form of crowdfunding that matches
    potential investors with founders, matching capital with an idea. It is the original
    way for blockchain start-ups to raise equity capital. In an `ICO`, investors buy
    a newly emitted cryptoasset in the hope of future rising value. Thereby, anybody
    can become a venture capital investor. The founders typically keep a large share
    of the cryptoasset (e.g., 20%) as a source of funds for developing the project.
    Despite its name using the term "coin," `ICO`s are not exclusively for assets
    meant to be currencies. Instead, all types of cryptoassets use `ICO`s.


    `ICO`s started as early as 2013, the first major being Ethereum''s `ICO` in 2014\.
    Subsequently, most `ICO`s happened on Ethereum''s blockchain, and their number
    grew exponentially in the following few years. Unfortunately, many took advantage
    of the `ICO` hype by emitting tokens not meant to become anything worthwhile.
    As soon as investors jumped in, scammers would pocket the funds and leave the
    project to die. Sometimes, founders even took advantage of the data-privacy spirit
    behind blockchain to hide their true identity and run the perfect scam. As founders
    usually lack accountability in `ICO`s, an alternative, security token offerings
    (`STO`), was created.


    Unlike an `ICO`, an `STO` is backed by a company''s stock or future profits. An
    `STO` is like buying a stake in a real-world company. In comparison, an `ICO`
    is like buying a token without value unless a project''s promises become a reality.
    This difference reduces incentives for the issuing team to run away with the funds.
    While `ICO`s enable raising capital more efficiently (faster and at lower costs)
    and from a broader pool than has ever been possible, `STO`s are safer for investors.
    `STO`s take place following strict regulations to eventually become registered
    securities. For example, investors may be required to follow strict Know Your
    Customer (`KYC`) and Anti-Money Laundering (`AML`) processes to invest. This regulatory
    framework reduces the risk of turning out as a scam. Another crucial difference
    is in terms of ideology. While `ICO`s rely on the essential idea of removing intermediaries,
    `STO`s often rely on some middlemen to increase the reliability of the project
    for both issuers and investors.


    Overall, `ICO`s and `STO`s improved the liquidity of historically illiquid assets
    and removed barriers to entry for small potential venture capital investors. As
    a result, what once were privileged opportunities for a few wealthy investors
    became accessible to the masses. They represent a major step toward the democratization
    of finance.


    However, `ICO`s and `STO`s are not the only possibilities regarding early offerings
    of new cryptoassets. Alternatives emerged in the late 2010s and continued to bloom
    in the early 2020s. Among them are initial exchange offerings (`IEO`), initial
    DEX offerings (`IDO`), Maker''s strong holder offering (`SHO`), and Initial Twitter
    Offering (`ITO`). Readers interested in these less-common offerings may consult
    D-Core''s *Institutional Blockchain Investment Guide* [40].


    ## Mining


    Besides direct investments in cryptoassets, ETFs, or companies related to cryptoassets,
    another possible investment type is through infrastructure. In particular, by
    investing in the mining operations of cryptoassets based on a proof-of-work consensus
    mechanism, Bitcoin in particular.


    ### Traditional Cryptoasset Mining


    Instead of investing in a company mining cryptoassets, one can mine them directly.
    Chapter [6](#600732_1_En_6_Chapter.xhtml) covered mining, the process of emitting
    new coins (called coinbase transactions) for cryptoassets on a proof-of-work consensus
    mechanism. Such cryptoassets include Bitcoin, Bitcoin Cash, Litecoin, Monero,
    Dash, and Dogecoin. However, Bitcoin is by far the asset with the highest hash
    rate (a measure of the network''s security), which is 100 times larger than the
    combined hash rate of all other PoW assets combined. As a reminder, miners compete
    in a winner-takes-all competition to validate the next block of the blockchain.
    To win this "race," miners run many cryptographic hashes with specialized equipment
    until one hits a number with specific characteristics by chance. It is similar
    to a lottery where the price to purchase a ticket is computing power (indirectly,
    electricity). The successful miner receives a reward in the form of newly minted
    coins.


    Mining can be a profitable business, but it involves significant upfront investment,
    requires access to a cheap source of electricity, and has volatile profitability
    prospects. High investment is required to purchase specialized devices to mine
    on one''s behalf. In some cases, you may need a recent application-specific integrated
    circuit, or `ASIC`, to become relevant. Indeed, the pace of innovation makes mining
    rigs obsolete in a few months to a few years. It is not to say that it is impossible
    to mine with older rigs. However, the quantity of hashes performed by newer rigs
    evolves quickly, making older devices quickly uncompetitive.


    ![](images/600732_1_En_8_Chapter/600732_1_En_8_Fig2_HTML.png)


    A photograph of Bitcoin ASIC miner.


    Figure 8-2


    ASIC Bitcoin miner (Source: Wikimedia, public domain)


    As of May 2023, a new `ASIC` miner can yield over 200 terahashes (200 trillion
    hashes) per second. In comparison, a single block on the Bitcoin blockchain requires
    about 210 zettahashes (210 sextillion hashes) to find a successful nonce. This
    number corresponds to 350 exahashes (350 quintillion hashes) per second for ten
    minutes (i.e., the hash rate of the Bitcoin network as of this writing, an all-time
    high).


    The likelihood of winning the mining lottery depends on one''s relative hashing
    power compared to the network. As indicated in Figure 8-3, the hash rate has been
    growing over the past few years, reflecting better technology and more people
    entering the mining game to benefit from Bitcoin''s increasing price. The drop
    of more than 50% of the hash rate in mid-2021 corresponds to China''s ban on Bitcoin
    mining, while China produced most of Bitcoin''s hash rate at the time.


    ![](images/600732_1_En_8_Chapter/600732_1_En_8_Fig3_HTML.jpg)


    A line graph of Bitcoin hash rate from January 2017 to January 2023. The line
    increases with high fluctuations.


    Figure 8-3


    Total hash rate per second on the Bitcoin network from January 2017 to January
    2023, in exahashes (Source: NASDAQ.com and own workings)'
