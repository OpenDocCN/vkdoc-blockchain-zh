    | | | | 2021 年 11 月 8 日 | 67,566.83 | 7.9 倍 |

    | 周期 4 | 2022 年 11 月 21 日 | | | 15,787.28 | –77% |

    | | 不适用 | | 不适用 | 不适用 |

    | | | | 不适用 | 不适用 |


    # 比特币周期持续时间


    另一个在 2021 年（在触及第三周期底部之前）被广泛讨论的相关理论是*比特币周期延长*理论。在比特币的第一个周期中，从底部到峰值的持续时间是 746 天，而在第二个周期中，则是
    1067 天，这催生了该理论。⁸¹ 然而，第三个周期为 1059 天，比第二个周期短了八天。如果第四个周期具有相似的持续时间，那么下一个峰值将出现在 2025
    年 10 月中旬（这与黄金牛市比率延续所建议的 2025 年 7 月峰值日期形成对比）。


    当然，这些广为流传的理论存在这一事实本身，就意味着一些参与者可能会根据模式来安排他们的交易时机。足够多的参与者据此进行交易，至少会扭曲这些模式，甚至可能使其完全失效。


    另一个被广泛讨论的理论是比特币将进入所谓的*超级周期*。在超级周期中，随着加密资产的大规模采用，四年周期模式将逐渐消失，比特币将进入一个价格持续上涨的长期阶段。


    # 相对市场主导地位


    另一个重要趋势是加密资产内部的相对主导地位。由于比特币是首个加密资产，它曾经拥有 100%的主导地位（即比特币占据了加密资产领域 100%的市值）。随着其他加密资产进入该领域，比特币的主导地位有所下降。在
    2017 年市场高峰期，比特币的主导地位从 86%下降到 32%，主要份额让给了以太坊和瑞波币。不过，比特币从未失去其第一名的位置。在随后的周期（2018-2022
    年）中，比特币的主导地位主要在总加密市场的三分之一到三分之二之间波动，而以太坊的市场主导地位则在 7%到 22%之间波动。与此同时，瑞波币从其 19%的高点跌至
    3%以下，并且没有其他加密资产突破 6%的主导地位门槛。


    最新的相对市场主导地位概况可在网站`CoinMarketCap.com`上查看。⁸²


    ![](img/600732_1_En_9_Fig5_HTML.jpg)


    一张面积图，展示了 2013 年 5 月至 2023 年 1 月期间 11 种主要加密资产占总市值百分比的变化。最高和最低的分别是以太坊和 Polygon。


    **图 9-5** 主要加密资产的相对市场主导地位，2013 年 5 月至 2023 年 1 月，基于其市值（来源：`CoinMarketCap.com`）


    # 比特币引领作用


    加密市场中下一个关键的历史模式是，比特币的价格走势往往成为山寨币价格的领先指标。当比特币价格飙升时，其他加密资产的价格通常也会迅速随之上涨。当比特币价格下跌时，情况也是如此，会导致加密市场其他部分的价格下跌。


    虽然这种模式从历史价格数据看显而易见，但它是非理性的。使比特币有价值的原因与使以太坊、Chainlink 或 Stellar Lumen 有价值的原因截然不同。由于这些资产背后的基本面不同，它们的价格走势应该相关性很小。但这些资产之间历史上存在的高相关性，恰恰证实了市场相对较低的成熟度。在撰写本文时，投资者仍然将所有加密资产视为“风险资产”（类似于科技股），而没有更深入地思考它们之间的区别。

    '
- fmt: '## Macrocycles and Correlations


    Beyond the realm of cryptoassets, macroeconomic trends drive the economy up and
    down in cyclical patterns. These cycles have a material impact on all asset classes,
    including cryptoassets. As was introduced in Chapter [2](#600732_1_En_2_Chapter.xhtml),
    long-term cycles last many decades, and within them, shorter-term cycles last
    only a few years, typically less than a decade.


    The long-term cycles are also called the “long-term debt and capital market cycles”
    (lasting roughly 50 to 75 years),^([^(83)](#fn83)) Kondratiev waves (lasting 45
    to 60 years), or the secular trend. They all refer to the same pattern of expansion
    and then contraction of the economy. Important macro variables such as demographics,
    debt, and technologies drive the secular trend. Technologies, in particular, tend
    to be catalysts for changes in the secular trend, sparking a restart after a trough.


    Shorter-term or business cycles depend on central bank policies such as quantitative
    easing or rate hikes. Different assets and sectors are not typically at the same
    point within the cycle. For example, some sectors are more cyclical (e.g., energy,
    construction material, and consumer discretionary) and tend to overperform in
    the cycle’s expansion phase. In contrast, other sectors (e.g., healthcare or utilities)
    are more stable and much less affected by the phase of the cycle. Within business
    cycles, there are even shorter trends (tactical trends) which can be a few months
    long but can also be as short as days.


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig6_HTML.jpg)


    A line graph of output over a timeline of 50 to 75 years for two economic cycles.
    The long-term line fluctuates twice and follows an increasing trend. The short-term
    line is on top of the long-term line and fluctuates throughout.


    **Figure 9-6** Representation of economic cycles, with short-term cycles on top
    of a long-term cycle


    Cryptoassets follow a similar cyclical pattern: first, a comparatively long trend
    of growing value that aligns with the global level of adoption of cryptoassets.
    Second, short cycles are driven by regulations, policies, and significant events,
    such as a Bitcoin halving event or Ethereum’s “The Merge” event of mid-September
    2022.^([^(84)](#fn84))


    The low correlation of cryptoassets with traditional investments was highlighted
    in Chapter [4](#600732_1_En_4_Chapter.xhtml). However, correlations between asset
    classes tend to increase in cyclical recessionary phases. Indeed, when business
    becomes difficult, and the economy slows down, investors in need of cash tend
    to sell all types of assets. These selloffs happen throughout all asset classes
    and bring all prices down. It happened, for example, with gold in 2008 or with
    cryptoassets in 2022: correlation with equities materially increased as part of
    a global selloff. Higher correlations are reducing diversification’s benefits
    when investors need them most. This financial phenomenon is called *contagion*.


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig7_HTML.jpg)


    A dual-axis line graph of Bitcoin price in USD and S&P 500 price from August 2020
    to January 2023. Both lines with high fluctuations, increase at first and then
    decrease.


    **Figure 9-7** Bitcoin (left axis) and S&P500 (right axis) prices over August
    2020 to January 2023, showing higher correlation during the selloff of 2022 (i.e.,
    spikes and drops tend to happen simultaneously when correlations between assets
    are high)


    As the cryptoasset market evolves, it will decouple from Bitcoin halving cycles
    because they will proportionally have an increasingly smaller effect. As it does
    so, the cryptoasset market may align more with traditional cycles, which reflect
    capital invested (when capital is scarce, investors tend to sell all types of
    assets). Moreover, in the medium term, many cryptoassets are likely to continue
    being treated like risk assets due to their high level of volatility. Understanding
    where we are in the macroeconomic cycles and how other investors perceive asset
    classes will likely become increasingly relevant for cryptoasset investors.


    Yet, the value proposition of cryptoassets is fundamentally different from traditional
    asset classes. This value proposition can also be very different between cryptoassets.
    It would be reasonable to assume that diversification benefits will be sustained
    among asset classes and within the crypto asset class.


    For example, this diversification benefit was already visible in mid-March 2023
    during the collapses of multiple traditional banks. While financial markets dropped,
    Bitcoin’s price climbed 40% in a week—from `$20,000` to more than `$28,000`. This
    episode testifies that the narrative around Bitcoin becoming a “safe-haven asset”
    starts to settle.


    ## Other Crypto Cycles


    Cryptoasset cycles can be defined not only by prices but also by other metrics.
    For example, block space is one such metric, which is the quantity of information
    that can be put in a block. Depending on the blockchain, block space is used,
    expressed, and valued differently. On the Ethereum blockchain, for example, users
    pay a fee of a few `gwei` (a `gwei` is one billionth of an `ether`) to be included
    in the next block. As the crypto business cycle evolves, the demand for block
    space and the corresponding fees vary. In some cases, block space fees can even
    be an early indicator of future price movements.


    Similarly, many other on-chain metrics offer insights on possible future price
    movements through their position in their cycle. Future chapters include a discussion
    on such metrics.


    ## Charts in Technical Analysis


    The crypto community sometimes relies on charts such as price patterns or transaction
    volume to indicate future possible price movements. This approach moves away from
    fundamental analysis and enters the dangerous territory of technical analysis.


    This territory is dangerous because charts alone do not predict future prices
    and provide insufficient information to make long-term trades. Nevertheless, they
    can help choose the timing of a trade based on fundamentals. For example, they
    can inform on the presence of support and resistance levels. A support level is
    a price below the current asset price and at which many investors are willing
    to buy. Breaking through the support level would need enormous downward pressure
    on the price (i.e., even more sellers than buyers at that level). A resistance
    level is the opposite: a price above the current market price and at which many
    investors want to sell.


    Charts complement an investment thesis but do not replace it. They can confirm
    or challenge a theory, but charts alone cannot be the theory itself.'
