  trans: "\n# 回测\n\n无论使用哪种具体指标，投资者都应对其方法进行回测。回测是一种现实检验，用于评估风险指标的质量。例如，投资者可以计算一年前如果采用某个\
    \ VaR 指标，其数值会是多少。然后，他们应该将其与实际结果进行比较，以评估该风险指标的稳健性。\n\n例如，他们可以分析过去一年中，加密资产的每周回报有多少次低于一年前测算的\
    \ 90% 周 VaR 值。如果回报超出此范围的时间仅占约 10%，则该 VaR 指标似乎表现良好。然而，如果观测值超出阈值的次数明显更多，则回测表明该风险指标可能不够保守。\n\
    \n例如，使用截至 2021 年 12 月 31 日的 200 周数据测算的比特币 90% 周 VaR 为 –11.0%。在 2022 年，只有六周的回报低于此阈值。因此，该年\
    \ 52 周中有六周（占 11.5%）的回报低于此 VaR 方法计算的第十个百分位数。由于 11.5% 相当接近 10%，因此该 VaR 方法和此样本似乎是合适的。对以太坊采用类似方法，在\
    \ 2022 年也得出了六个观测值，从而得出了类似的结论。然而，此分析忽略了前所未有的事件。这正是压力测试作为管理未来可能风险的有效补充的用武之地。\n\n\
    ## 压力测试\n\n挑战传统风险指标的一种有意义的方法是运行假设情景，这种方法称为压力测试。通常，考虑的情景是暗淡但可信的，用以评估一项投资在不利条件下的表现有多差。即使在悲观条件下，如果情景结果尚可接受，则压力测试通过。或者，可以找出条件必须恶化到何种程度才会导致情景变得不利（这种方法称为因子推动分析）。压力测试通过包含以前从未发生过，或难以在统计方法假设中实现的情景，来补充前面介绍的风险管理方法。\n\
    \n特别是，包含前一章所述的非金融风险的情景可以作为压力测试的有效例子。或者，可以考虑极端缺乏流动性或重大破产在行业内蔓延的情景。当然，压力测试取决于每个情景所使用的假设，并且不太可能完全按预测发展。尽管如此，它们仍然很有帮助，因为它们挑战了统计风险指标，并迫使分析人员考虑各种截然不同的情景对投资组合价值的影响。\n\
    \n## 关键概念\n\n与非金融风险类似，加密资产的金融风险也比传统投资更大。特别是，投资者应考虑加密资产生态系统中第三方可能发生的违约，并在可能的情况下通过去中心化来避免。此外，流动性也可能成为问题，因为加密资产的日交易量低于传统资产类别；因此，大额交易可能对价格产生重大影响。尽管如此，由于加密资产领域以剧烈的价格波动而闻名，市场风险得到了最多的关注。\n\
    \n风险价值概念特别有用，因为它为给定可能性水平下的预期损失提供了一个单一的标准指标。有几种方法可以计算它：要么依赖假设（分析法），要么依赖历史数据（历史法）。每种方法都有其优点和局限性；因此，投资者应依赖一系列指标，而不是任何一个单一指标。\n\
    \n无论如何，在这个快速变化的环境中，风险指标都应该经过回测，并辅以压力测试，以挑战其影响和可能性。\n\n## 扩展问题\n\n哪些历史数据与推断当前市场风险相关？\n\
    \n你可以依赖多久以前的数据？\n\n对于加密资产投资，哪些压力测试会特别有意义？\n\n脚注 1 2 3 4 5 6 7 8 9\n\n# 第六部分：存在哪些估值方法？\n\
    \n## 15. 评估框架\n\n> *投资的成功不在于正确，而在于比其他人犯错的次数更少。*\n> \n> ——阿斯沃斯·达摩达兰\n\n在衡量加密资产的价值之前，谨慎的投资者应首先提出关键问题，以识别该资产是否具有价值。虽然下一章将深入探讨估值方法，但本章将介绍一些初步问题，用以筛选出值得进行这些估值的候选资产。\n\
    \n### 该资产解决了什么问题？\n\n加密资产必须满足市场中一个真实且未满足的需求。\n\n例如，比特币是第一种无需中介即可进行交换的数字稀缺资产。它满足了在线去中心化、安全的价值转移需求。同样，以太坊是第一个允许开发者构建和部署智能合约及去中心化应用的去中心化平台。它满足了在没有中央权威的情况下，以安全和透明的方式自动化业务流程和交互的需求。同样，0x\
    \ 是一个去中心化交易所协议，允许用户安全透明地交易代币和其他资产。它满足了传统交易所的去中心化替代方案的需求，而传统交易所常常遭受安全漏洞。此外，还有其他几种加密资产独特地提供了有价值的服务，满足了真实且未满足的需求。\n\
    \n相比之下，一些项目是对现有项目的复制，没有显著的创新或改进。例如，莱特币和比特币现金是比特币的硬分叉，除了不同的区块时间、区块大小和最大供应量外，没有太多创新特性。\n\
    \n此外，还有其他加密资产仅仅是为了制造热度（甚至作为庞氏骗局）而创建，背后没有任何实际服务。此类项目应从任何基本面估值方法中过滤掉。它们的市场价格在短期内可能会上涨，但这种发展是由投机而非实际经济价值驱动的。例如，狗狗币就是一种主要基于其制造热度潜力的加密资产。虽然它最初是作为一个笑话创建的，并且没有任何独特功能，但它在社交媒体上获得了极大的流行。它甚至在\
    \ 2021 年 5 月市值增长到超过 880 亿美元。\n\n### 该问题有多重要？\n\n考虑解决问题的潜在价值至关重要。如果一个加密资产解决的问题对于一个庞大且不断增长的市场是至关重要且紧迫的，那么它的潜力就高于一个在萎缩市场中解决次要或小众问题的加密资产。分析师可用来评估问题重要性的指标包括：受该问题影响的人数、他们愿意为解决此问题支付多少费用，以及该问题可能持续多少年仍然存在。\n\
    \n例如，影响许多用户的重大且持久的问题包括：国际支付行业的高交易费用和慢交易速度、数据安全（防止泄露和盗窃），以及对言论自由的审查。一些加密资产可以帮助缓解甚至解决此类问题。\n"
- fmt: '# How Is the Asset Solving the Problem?


    Analysts should also evaluate the quality of the solution proposed to the problem.
    They can do so, for example, by exploring the following characteristics of the
    proposed solution.


    First, they should consider its effectiveness. In particular, whether the project
    can deliver the desired result. It includes, for example, case studies of how
    the solution is used in the real world.


    Second, analysts should consider the efficiency of the solution. For example,
    solving the problem of high transaction fees should not come at the expense of
    settlement time.


    Third, the solution should be scalable. Even if niche use cases are successful,
    the solution should be able to meet the needs of a growing user base without materially
    losing out on efficiency.


    Analyzing how the asset is planning to solve a problem in the future should also
    include a clear roadmap by the developing team and how they execute this roadmap.


    # Which Candidate Best Solves the Problem in this Market?


    Depending on its size and complexity, it may be optimal for a market to have only
    a few prominent actors (a natural oligopoly) or even a single actor (natural monopoly).
    For example, large upfront investment costs may make the case for a market to
    become a natural monopoly. For example, the water and sewage services market is
    typically a monopoly because pipelines and treatment plants imply high fixed costs
    while marginal costs are low. The same goes for electricity and telecommunications
    companies, where only one or a few actors typically operate in a market.


    Furthermore, network effects may also limit the number of actors in a market.
    For example, the number of successful ride-hailing companies active in any particular
    market is typically not more than a few because each company needs to reach a
    critical mass of drivers and riders to succeed.


    Similarly, in the cryptoasset industry, some markets will likely only have a few
    successful competitors unless they materially differ. Specifically, there is likely
    no need for hundreds of smart contract platforms, for example. Instead, successful
    platforms must gather enough developers and enough users to be convenient for
    each group. In most cases, developers only learn to code in the platform’s programming
    language if there are enough users, and users only join an ecosystem if enough
    apps are available.


    For these reasons, analysts should identify what competitive advantage each cryptoasset
    offers against its competitors. For example, the largest proof-of-work cryptoasset
    benefits from a natural competitive advantage through an effective barrier to
    entry: the hash rate. While any new cryptoasset could try to compete with Bitcoin,
    it is unlikely to be able to do so. Indeed, the security of a PoW cryptoasset
    depends on the ability of the network to repel a 51% attack. Such an attack is
    only possible if a nefarious actor gathers most of the hash rate for that cryptoasset.
    Since Bitcoin gathered a hash rate over 100 times higher than all other PoW cryptoassets
    combined, some individual Bitcoin miners represent a risk for any new PoW cryptoasset.^([^(108)](#fn108))
    If a new PoW cryptoasset grew to become financially attractive, a prominent Bitcoin
    miner could redirect its hashing power toward mining this new asset and potentially
    attack it with more than 51% of the hash rate. While it is likely not in the attacker’s
    interest (Chapter [13](#600732_1_En_13_Chapter.xhtml) discussed how well-designed
    incentives can mitigate this risk), it is theoretically possible. For this reason,
    the security of any PoW cryptoasset that is not Bitcoin is low. Proof-of-work
    is a winner-takes-all consensus mechanism—a competition that Bitcoin has clearly
    won.


    Assessing whether a cryptoasset project is the best candidate to address a problem
    implies understanding the dynamics of the market at hand and the characteristics
    of its competitors. Subsequently, the analyst should identify the candidate’s
    unique advantage over its peers, given this market structure.


    # How Reliable Is the Team Behind the Asset?


    Given the presence of potential scams, investors want to keep a close eye on the
    development team of the crypto project.


    First, investors should ensure that the team has good credentials. For example,
    after having laid the base of Ethereum, its co-founders split because they could
    not agree on the future path the platform should take. Some of them moved on to
    develop their own smart contract platform as an alternative to Ethereum. For instance,
    Charles Hoskinson founded Cardano, and Gavin Wood created Polkadot. The presence
    of leading figures in the developing team with credentials as co-founders of Ethereum
    was seen as a token of credibility. Investors must ensure that developing teams
    of other cryptoasset projects are similarly capable, trustworthy, and reliable.


    Second, investors should ensure that the incentives of the development team are
    aligned with those of the asset holders. In particular, ICOs sometimes give inappropriate
    incentives to founders. For example, founders could receive a large share of the
    cryptoasset (say, over 20%) as funding for the project’s development and not be
    held accountable for what they do with these funds. In many cases, founders left
    with the funds or did not do the necessary work to ensure the project reached
    fruition. Understanding the funding structure, each actor’s incentives, and legal
    limitations is essential.


    Finally, diligent investors should be on the lookout for whether the development
    team is doing what it claims to be doing. For example, the team should meet development
    deadlines and stay aligned with the roadmap.


    # How Is the Local Regulatory Environment?


    As identified in previous chapters, the regulatory environment is among the material
    risks faced by cryptoassets. Navigating this regulatory complexity and uncertainty
    is far from straightforward, and cryptoasset projects must ensure they can deal
    with it appropriately. Therefore, a cryptoasset project with high potential has
    gathered a competent legal and regulatory team.


    Also, a cryptoasset project may be brilliant, with a strong team and scoring high
    on virtually all desirable metrics but face additional hurdles due to likely regulatory
    backlashes. For example, Monero has multiple reasons to claim technological superiority
    over Bitcoin. For instance, it provides users with a much higher level of privacy
    by using ring signatures to hide the identity of senders and receivers. It also
    uses stealth addresses, which are one-time use addresses generated for each transaction,
    thereby further protecting users’ privacy. This way, Monero offers cash-like respect
    for personal privacy, which Bitcoin lacks.


    Furthermore, Monero’s ASIC resistance makes it more prone to be decentralized,
    as there are lower incentives for running large mining farms. Finally, Monero’s
    dynamic block size adjusting based on demand has ground to justify better scalability
    than Bitcoin. Nevertheless, Monero peaked at a market capitalization of only $8.5
    billion in September 2021, when Bitcoin was worth over 100 times more. One reason
    for this difference is that regulation could fight a privacy-driven cryptoasset
    in the future because it could open the door to untraceable illicit transactions.
    Investors should consider how upcoming regulations could impact the future value
    of specific cryptoassets.'
  raw: '## How Is the Asset Solving the Problem?


    Analysts should also evaluate the quality of the solution proposed to the problem.
    They can do so, for example, by exploring the following characteristics of the
    proposed solution.


    First, they should consider its effectiveness. In particular, whether the project
    can deliver the desired result. It includes, for example, case studies of how
    the solution is used in the real world.


    Second, analysts should consider the efficiency of the solution. For example,
    solving the problem of high transaction fees should not come at the expense of
    settlement time.


    Third, the solution should be scalable. Even if niche use cases are successful,
    the solution should be able to meet the needs of a growing user base without materially
    losing out on efficiency.


    Analyzing how the asset is planning to solve a problem in the future should also
    include a clear roadmap by the developing team and how they execute this roadmap.


    ## Which Candidate Best Solves the Problem in this Market?


    Depending on its size and complexity, it may be optimal for a market to have only
    a few prominent actors (a natural oligopoly) or even a single actor (natural monopoly).
    For example, large upfront investment costs may make the case for a market to
    become a natural monopoly. For example, the water and sewage services market is
    typically a monopoly because pipelines and treatment plants imply high fixed costs
    while marginal costs are low. The same goes for electricity and telecommunications
    companies, where only one or a few actors typically operate in a market.


    Furthermore, network effects may also limit the number of actors in a market.
    For example, the number of successful ride-hailing companies active in any particular
    market is typically not more than a few because each company needs to reach a
    critical mass of drivers and riders to succeed.


    Similarly, in the cryptoasset industry, some markets will likely only have a few
    successful competitors unless they materially differ. Specifically, there is likely
    no need for hundreds of smart contract platforms, for example. Instead, successful
    platforms must gather enough developers and enough users to be convenient for
    each group. In most cases, developers only learn to code in the platform’s programming
    language if there are enough users, and users only join an ecosystem if enough
    apps are available.


    For these reasons, analysts should identify what competitive advantage each cryptoasset
    offers against its competitors. For example, the largest proof-of-work cryptoasset
    benefits from a natural competitive advantage through an effective barrier to
    entry: the hash rate. While any new cryptoasset could try to compete with Bitcoin,
    it is unlikely to be able to do so. Indeed, the security of a PoW cryptoasset
    depends on the ability of the network to repel a 51% attack. Such an attack is
    only possible if a nefarious actor gathers most of the hash rate for that cryptoasset.
    Since Bitcoin gathered a hash rate over 100 times higher than all other PoW cryptoassets
    combined, some individual Bitcoin miners represent a risk for any new PoW cryptoasset.^([^(108)](#fn108))
    If a new PoW cryptoasset grew to become financially attractive, a prominent Bitcoin
    miner could redirect its hashing power toward mining this new asset and potentially
    attack it with more than 51% of the hash rate. While it is likely not in the attacker’s
    interest (Chapter [13](#600732_1_En_13_Chapter.xhtml) discussed how well-designed
    incentives can mitigate this risk), it is theoretically possible. For this reason,
    the security of any PoW cryptoasset that is not Bitcoin is low. Proof-of-work
    is a winner-takes-all consensus mechanism—a competition that Bitcoin has clearly
    won.


    Assessing whether a cryptoasset project is the best candidate to address a problem
    implies understanding the dynamics of the market at hand and the characteristics
    of its competitors. Subsequently, the analyst should identify the candidate’s
    unique advantage over its peers, given this market structure.


    ## How Reliable Is the Team Behind the Asset?


    Given the presence of potential scams, investors want to keep a close eye on the
    development team of the crypto project.


    First, investors should ensure that the team has good credentials. For example,
    after having laid the base of Ethereum, its co-founders split because they could
    not agree on the future path the platform should take. Some of them moved on to
    develop their own smart contract platform as an alternative to Ethereum. For instance,
    Charles Hoskinson founded Cardano, and Gavin Wood created Polkadot. The presence
    of leading figures in the developing team with credentials as co-founders of Ethereum
    was seen as a token of credibility. Investors must ensure that developing teams
    of other cryptoasset projects are similarly capable, trustworthy, and reliable.


    Second, investors should ensure that the incentives of the development team are
    aligned with those of the asset holders. In particular, ICOs sometimes give inappropriate
    incentives to founders. For example, founders could receive a large share of the
    cryptoasset (say, over 20%) as funding for the project’s development and not be
    held accountable for what they do with these funds. In many cases, founders left
    with the funds or did not do the necessary work to ensure the project reached
    fruition. Understanding the funding structure, each actor’s incentives, and legal
    limitations is essential.


    Finally, diligent investors should be on the lookout for whether the development
    team is doing what it claims to be doing. For example, the team should meet development
    deadlines and stay aligned with the roadmap.


    ## How Is the Local Regulatory Environment?


    As identified in previous chapters, the regulatory environment is among the material
    risks faced by cryptoassets. Navigating this regulatory complexity and uncertainty
    is far from straightforward, and cryptoasset projects must ensure they can deal
    with it appropriately. Therefore, a cryptoasset project with high potential has
    gathered a competent legal and regulatory team.


    Also, a cryptoasset project may be brilliant, with a strong team and scoring high
    on virtually all desirable metrics but face additional hurdles due to likely regulatory
    backlashes. For example, Monero has multiple reasons to claim technological superiority
    over Bitcoin. For instance, it provides users with a much higher level of privacy
    by using ring signatures to hide the identity of senders and receivers. It also
    uses stealth addresses, which are one-time use addresses generated for each transaction,
    thereby further protecting users’ privacy. This way, Monero offers cash-like respect
    for personal privacy, which Bitcoin lacks.


    Furthermore, Monero’s ASIC resistance makes it more prone to be decentralized,
    as there are lower incentives for running large mining farms. Finally, Monero’s
    dynamic block size adjusting based on demand has ground to justify better scalability
    than Bitcoin. Nevertheless, Monero peaked at a market capitalization of only $8.5
    billion in September 2021, when Bitcoin was worth over 100 times more. One reason
    for this difference is that regulation could fight a privacy-driven cryptoasset
    in the future because it could open the door to untraceable illicit transactions.
    Investors should consider how upcoming regulations could impact the future value
    of specific cryptoassets.'
  trans: '

    # 该资产如何解决问题？


    分析师还应评估所提出解决方案的质量。例如，他们可以考察拟议解决方案的以下特征。


    首先，应考虑其有效性，特别是项目能否实现预期结果。这包括该解决方案在现实世界中的应用案例研究等内容。


    其次，分析师应考虑解决方案的效率。例如，解决高交易费用问题不应以牺牲结算时间为代价。


    第三，解决方案应具备可扩展性。即使小众用例取得了成功，解决方案也应能满足不断增长的用户群体的需求，而不会在效率上出现实质性下降。


    分析资产未来将如何解决某个问题时，还应包括开发团队清晰的路线图以及他们执行该路线图的方式。


    # 哪个候选者最能解决这个市场的问题？


    根据市场的规模和复杂性，一个市场可能最优选择是只有少数几个主要参与者（自然寡头垄断），甚至只有一个参与者（自然垄断）。例如，高昂的初始投资成本可能是市场形成自然垄断的原因。以供水和污水处理服务市场为例，该市场通常是垄断的，因为管道和处理厂意味着高固定成本，而边际成本却很低。电力公司和电信公司也是如此，通常一个市场中只有一家或少数几家运营商。


    此外，网络效应也可能限制市场参与者的数量。例如，在任何特定市场成功运营的叫车公司通常不超过几家，因为每家公司都需要达到司机和乘客的临界数量才能成功。


    类似地，在加密资产行业，除非存在实质性差异，否则某些市场可能只会出现少数成功的竞争者。具体来说，例如，市场上可能不需要数百个智能合约平台。相反，成功的平台必须吸引足够多的开发者和用户，以便于每个群体使用。在大多数情况下，只有当有足够多的用户时，开发者才会学习使用该平台的编程语言进行编码；而只有当有足够多的应用程序可用时，用户才会加入某个生态系统。


    基于这些原因，分析师应确定每种加密资产相对于其竞争对手的竞争优势。例如，最大的工作量证明（PoW）加密资产通过有效的进入壁垒——算力——获得了天然的竞争优势。虽然任何新的加密资产都可能尝试与比特币竞争，但成功的可能性不大。事实上，PoW
    加密资产的安全性取决于网络抵御 51% 攻击的能力。只有当恶意行为者聚集了该加密资产的大部分算力时，这种攻击才可能发生。由于比特币的算力是所有其他 PoW
    加密资产总和的 100 倍以上，一些个体比特币矿工对任何新的 PoW 加密资产都构成威胁。^(¹⁰⁸) 如果一种新的 PoW 加密资产发展到具有财务吸引力，那么一个大型比特币矿工可能会将其算力转向挖掘这种新资产，并可能以超过
    51% 的算力对其进行攻击。虽然这通常不符合攻击者的利益（第 13 章讨论了精心设计的激励机制如何降低这种风险），但在理论上是有可能的。因此，任何非比特币的
    PoW 加密资产的安全性都很低。工作量证明是一种赢家通吃的共识机制——而比特币显然已经赢得了这场竞争。


    评估一个加密资产项目是否是解决问题的最佳候选者，意味着要了解当前市场动态及其竞争对手的特征。随后，分析师应在给定市场结构下，识别该候选者相对于同行的独特优势。


    # 资产背后的团队有多可靠？


    鉴于存在潜在的骗局，投资者需要密切关注加密项目开发团队的情况。


    首先，投资者应确保团队拥有良好的资质。例如，在奠定了以太坊的基础后，其联合创始人因对未来发展道路意见不合而分道扬镳。其中一些人转而开发自己的智能合约平台，作为以太坊的替代品。例如，查尔斯·霍斯金森创立了卡尔达诺（Cardano），加文·伍德创建了波卡（Polkadot）。开发团队中有以太坊联合创始人身份的核心人物，被视为可信度的标志。投资者必须确保其他加密资产项目的开发团队同样有能力、值得信赖且可靠。


    其次，投资者应确保开发团队的激励机制与资产持有者的一致。特别是，首次代币发行（ICO）有时会向创始人提供不恰当的激励。例如，创始人可能会获得加密资产的很大一部分（例如超过
    20%）作为项目开发资金，而对其如何使用这些资金不负责任。在许多情况下，创始人带着资金离开，或者没有进行必要的工作来确保项目取得成功。理解资金结构、每个参与者的激励措施以及法律限制至关重要。


    最后，勤奋的投资者应留意开发团队是否在按其所宣称的方式行事。例如，团队应按时完成开发节点，并遵循路线图。


    # 当地监管环境如何？


    如前几章所述，监管环境是加密资产面临的重大风险之一。应对这种监管复杂性和不确定性绝非易事，加密资产项目必须确保能够妥善处理。因此，一个潜力巨大的加密资产项目会组建一支称职的法律与监管团队。


    此外，一个加密资产项目可能很出色，拥有强大的团队，几乎所有理想指标得分都很高，但由于可能遭遇监管反弹而面临额外障碍。例如，门罗币（Monero）有多个理由声称其在技术上优于比特币。它为用户提供了高得多的隐私水平，使用环签名来隐藏发送方和接收方的身份。它还使用隐形地址，即每笔交易生成的单一用途地址，从而进一步保护用户隐私。通过这种方式，门罗币提供了类似现金的对个人隐私的尊重，而这正是比特币所缺乏的。


    此外，门罗币的抗 ASIC（专用集成电路）特性使其更倾向于去中心化，因为运行大型矿场的激励较低。最后，门罗币根据需求动态调整区块大小的特性，使其在理论上比比特币具有更好的可扩展性。尽管如此，门罗币在
    2021 年 9 月的市值峰值仅为 85 亿美元，而比特币的市值是其 100 倍以上。造成这种差异的一个原因是，监管机构未来可能会打击注重隐私的加密资产，因为它可能为无法追踪的非法交易打开方便之门。投资者应考虑即将出台的法规将如何影响特定加密资产的未来价值。

    '
- fmt: '# Do the Tokenomics Make Sense?


    `Tokenomics` refer to the economic aspects of a cryptoasset’s functioning as implemented
    in its code. Investors in cryptoassets should consider whether the tokenomics
    of a particular asset make sense with respect to the need that the asset is addressing.


    `Tokenomics` include, among others, the token distribution schedule (is it distributed
    fairly between founders, developers, investors, and community?), token governance
    (how are decisions made?), token supply design (is it infinite like fiat currencies
    or limited like Bitcoin?), token inflation rate, consensus mechanism, and interoperability
    (ability to connect and exchange with other blockchains). In particular, a good
    token has a transparent and fair distribution of tokens between stakeholders,
    well-designed incentives aligning their interests, a limited supply, and a low
    or adaptive inflation rate.


    # How do Rating Agencies Assess the Cryptoasset?


    Rating agencies, such as Fitch, S&P, and Moody’s, assess the quality of bonds,
    stocks, derivative products, and other financial instruments. However, as of this
    writing, there is no major rating agency for the crypto market, even though this
    is deemed to change. As the market grows, there will be growing interest in a
    standardized and trusted rating system. There may even be a decentralized system,
    something the industry needs because of existing rating agencies’ recurrent failures
    and limitations.


    Once such a cryptoasset rating industry exists, analysts should compare their
    analysis with prevalent companies’ ratings of these assets. Blindly adopting any
    rating is not recommended, but standardized analyses may challenge an analyst’s
    assessment and is a view worth considering. In particular, analysts should understand
    the assumptions made by the rating agencies on the cryptoasset and assess their
    relevance in the face of changing market conditions.


    # Cryptoasset Picking


    Upon considering these questions, investors may wonder whether it is worth cherry-picking
    cryptoassets or simply investing in the largest ones. Another argument supports
    the latter. In equities, as a rule of thumb, about 50% of performance is due to
    the overall market performance, 30% due to the sector, and maybe 20% due to individual
    stocks selected. Whether an investment does well is, therefore, not mainly driven
    by the stock-picking skills of the portfolio manager but rather by market performance.
    In cryptoassets, the market performance also dominates, as testified by historically
    high correlations within the asset class. Until now, it may even have been more
    the case for cryptoassets than equities. In other words, when the cryptoasset
    market went up, price increases were seen across most cryptoassets and in similar
    proportions.


    Nevertheless, what makes Bitcoin valuable fundamentally differs from what makes
    Ethereum valuable, for example. Classifying them in the same industry is misleading
    because they are inherently different. They are arguably more different than stocks
    of two companies, say one in shipbuilding and the other in food delivery. They
    could even be considered as distinct as investing in different asset classes.
    The same goes for many other tokens. Therefore, while cryptoassets have tended
    to be highly positively correlated in the past, their correlation is poised to
    decrease eventually. When the market matures enough to distinguish the characteristics
    of each cryptoasset, they will likely evolve in their own direction. For this
    reason, it is meaningful for long-term investors to diversify within this new
    asset class to optimize their total portfolio’s risk-return characteristics.


    Besides, picking cryptoassets involves choosing which risk the investor is willing
    to face and which risk-reward features are most appropriate for that investor.
    For example, some cryptoassets have a much larger upside potential in percentage
    terms, typically with a much larger risk. For example, prominent crypto protocols
    (layer 1 solutions) are considered much safer than their competitors, which are
    a fraction of their market capitalization. However, they could also have a lower
    probability of multiplying an investment’s value by 100 in the coming few years
    than smaller crypto projects. Therefore, choosing cryptoassets to invest in depends
    critically on how much return the investor is seeking and how much risk is acceptable.


    # Key Concepts


    Before even attempting to value a cryptoasset, one must identify whether the asset
    has value in the first place. For this reason, investors should start by filtering
    out candidates for valuation. In particular, cryptoassets that can be valued should
    solve a real and unaddressed problem on the market. The bigger this problem, the
    more important the solution will be. Candidates for valuation should also have
    reasonable grounds to be the most appropriate asset to solve the problem, given
    the market dynamics and the existing competitors. In addition, reliable teams
    should be behind the development of the asset, with especially strong regulatory
    and legal teams, to address the industry’s regulatory uncertainty. Finally, meaningful
    tokenomics should be the base for the asset; for example, with effective incentives
    for all stakeholders.


    # Extension Questions


    Which cryptoasset features are red flags that will likely prevent them from ever
    having genuine fundamental value?


    How can you make sure to identify when a cryptoasset project is a scam?


    Which are the top assets for each category identified in the cryptoasset taxonomies
    presented in Chapter [7](#600732_1_En_7_Chapter.xhtml)?


    Footnotes [1](#600732_1_En_15_Chapter.xhtml#Fn1_source)'
