    # 理解高德纳的炒作周期


    技术研究与咨询公司高德纳提供了一个有价值的框架，用以梳理围绕技术创新的炒作。^(⁸⁵) 大多数创新都遵循类似的模式：首先经历高度的热情和预期，然后跌入幻灭的低谷，最后才在主流采用过程中稳定在合理的生产力水平。具体来说，炒作周期分为五个阶段，如图
    9-8 所示。


    ![](img/600732_1_En_9_Fig8_HTML.jpg)


    一张期望值随时间变化的折线图。线条经历了五次上升达到顶峰和下降至谷底，这五个阶段分别是：技术萌芽期、期望膨胀期、泡沫破裂低谷期、稳步爬升复苏期和生产成熟期。


    图 9-8


    高德纳，《理解高德纳的炒作周期》，Frances Karamouzis, Jan-Martin Lowendahl，2022 年 9 月 27 日


    要判断整个加密领域处于这个周期的哪个阶段是很有挑战性的。该领域内的不同子创新可能处于不同的周期阶段。例如，2013 年的市场高峰和 2014 年的崩盘，可能分别是比特币这项原始创新的“期望膨胀期”和“泡沫破裂低谷期”。一旦
    2015 年以太坊引入智能合约，这项创新就开始了新的周期。同样，2017 年出现了期望膨胀的高峰，随后在次年进入了泡沫破裂的低谷。接着，Web 3.0 和
    NFT 等进一步的创新在 2020-2022 年间引发了类似的起伏。特别是，NFT 项目的市值仅在 2021 年就增长了超过 100 倍，达到 400 多亿美元，然后在第二年暴跌超过
    75%。^(⁸⁶)


    # 日历效应


    特定的日历日期会驱动部分投资者的行为，直接影响加密资产的价格。在每个日历年度结束时，许多投资基金都会结算其损益表。整个财年积累的收益会体现在财务报表中，并可能决定基金的未来。为了应对这个关键的年末结算事件，基金可能希望锁定部分未实现的年度收益，以便在其报表上显示更多的盈利数字。因此，当市场在
    12 月份普遍上涨时，这些基金可能会引发不成比例的抛售压力。


    在较小程度上，与其他日子相比，日历季度末也往往呈现出不规则的模式。期权（金融衍生品）的到期日大多集中在季度末，这导致了这种趋势。庞大的加密资产期权市场使得季度结算对此类资产尤其重要。


    除此之外，投资基金通常还会遵循季度投资组合再平衡周期。在季度末，投资组合经理会重新评估其资产的相关性并调整投资组合。这一趋势会显著增加包括加密资产在内的所有资产的交易量。


    # 恐惧与贪婪指数


    我们已经讨论了长期和中期加密周期，但在一个周期内，何时是最佳的买入时机？要回答这个问题，必须理解市场行为往往是非理性的。具体来说，市场经常对那些本应对资产价格影响甚微或毫无影响的消息做出过度反应。这种非理性为那些能够看透它的人创造了绝佳的机会。例如，当其他金融市场（尤其是股票市场）表现不佳时，许多投资者会撤离高波动性资产，如加密资产。这种偶尔的“逃向安全资产”行为会暂时将波动性资产的价格压低到低于其趋势预测的水平。在其他条件不变的情况下，这就是一个有利的买入时机。正如商业巨头约翰·D·洛克菲勒所言：“赚钱的途径就是在血流成河时买入。”


    恐惧与贪婪指数可以衡量所谓的“血流成河”。软件比较公司 `alternative.me` 基于社交媒体上的情绪变化、调查以及市场动量、主导地位和趋势等市场指标创建了该指数。该指数在网页
    [`https://alternative.me/crypto/fear-and-greed-index/`](https://alternative.me/crypto/fear-and-greed-index/)
    上每日更新。该指数输出一个从 0 到 100 的数值。较低的分数表示极度恐惧（市场情绪上过度悲观），而较高的分数则表示极度贪婪（市场情绪上过度乐观）。因此，这个指数可能有助于把握加密资产的买入和卖出时机。


    ![](img/600732_1_En_9_Fig9_HTML.jpg)


    一张标题为“恐惧与贪婪指数，多因子加密市场情绪分析”的截图，上面有一个标尺。指针指向 60，一个标签写着“现在，贪婪”。底部列出的详细信息写着，“alternative
    dot me”，“最后更新于 2023 年 2 月 2 日”。


    图 9-9


    来自 `alternative.me` 的恐惧与贪婪指数，数据截至 2023 年 5 月 7 日


    # 采用


    试想现在是 1990 年，你在当地邮局上班。当你早晨喝咖啡时，你那热衷于科技同事正喋喋不休地谈论着某个据称将改变一切的新趋势。你听到的都是些难以理解的术语和陌生的缩写词。*这个`TCP/IP`到底是什么东西？反正没人会用它的。*
    实际上，这正是现代互联网的诞生。在接下来的几十年里，只有少数人能描述什么是`TCP/IP`，但几乎每个人都学会了日常使用互联网。


    三十年后的今天，我们处于类似的情况。只不过是用区块链代替了`TCP/IP`，用加密资产代替了互联网。大规模采用并不要求每个人都理解区块链技术、共识机制以及硬分叉含义的复杂性。相反，大规模采用是关于将加密货币用于支付或储蓄，就像人们使用电子邮件或即时通讯进行交流却无需理解底层协议一样。


    20 世纪 90 年代末的互联网用户数量与 21 世纪 20 年代初的加密资产用户数量相似：大约 3 亿。然而，当今的加密采用与 25 年前的互联网采用之间存在一个重大差异：加密采用的增长速度远快于当时的互联网。具体来说，本书的第
    16 章分析了使用量增长的数据，这在与加密资产估值相关的背景下尤其重要。区块链数据平台 Chainalysis 显示，全球范围内的加密采用是由英语国家和发展中经济体推动的，尤其是年轻一代（34
    岁以下）。^(⁸⁷)


    加密货币和去中心化金融的高速采用及其变革潜力，可能开启一个新的长期趋势——加密资产时代。下一章将探讨加密货币需要具备什么条件才能成为下一个长期趋势的催化剂。

