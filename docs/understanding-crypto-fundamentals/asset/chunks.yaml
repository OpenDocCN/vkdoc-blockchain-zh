- fmt: '# Staking


    Many cryptoassets offer staking as possible passive income (for example, see Table
    [8-1](#600732_1_En_8_Chapter.xhtml#Tab1)). Chapter [6](#600732_1_En_6_Chapter.xhtml)
    introduced the proof-of-stake consensus mechanism, where stakers validate new
    blocks. Their likelihood of being chosen for validation typically depends (among
    other criteria) on the number of coins they commit (stake) to the network. These
    validators then earn a staking reward for their work. Becoming a validator can
    require a substantial minimum investment (e.g., 32 `ETH` for Ethereum) and a burdensome
    technical setup to avoid downtime (which is punishable by having one’s stake slashed).
    However, staking pools are readily available for investors without requiring specialized
    equipment or a one-off investment. In particular, exchanges like Binance, KuCoin,
    or Coinbase offer attractive rewards for stakable cryptoassets with negligible
    minimum investment thresholds. In this case, staking rewards are similar to a
    bond yield: The higher the staked principal, the higher the staking rewards. However,
    similarly to a bond, this yield is subject to financial risks. In particular,
    in the case of staked cryptoassets, it is subject to risks related to the asset
    and the platform where it is staked.


    Table 8-1


    Staking Rewards in Annual Percentage Yield (APY) for Top Stakable Assets As of
    January 2023 (Source: [*www.stakingrewards.com/cryptoassets/*](http://www.stakingrewards.com/cryptoassets/))


