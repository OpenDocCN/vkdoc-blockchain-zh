  trans: '

    ## 宏观周期与相关性


    在加密资产领域之外，宏观经济趋势通过周期性模式推动经济起伏。这些周期对所有资产类别（包括加密资产）产生实质性影响。正如第 2 章介绍的，长期周期持续数十年，而在这些长期周期中，较短期周期仅持续数年，通常不到十年。


    长期周期也被称为“长期债务与资本市场周期”（持续约 50 至 75 年）^(⁸³)、康德拉季耶夫长波（持续 45 至 60 年），或长期趋势。它们均指经济扩张与收缩的相同模式。人口结构、债务和技术等重要宏观变量驱动着长期趋势。尤其是技术，往往成为长期趋势变化的催化剂，在低谷后引发新一轮重启。


    较短周期或商业周期则取决于央行的政策，例如量化宽松或加息。不同资产和行业在周期中通常并非处于同一节点。例如，一些行业更具周期性（如能源、建筑材料和可选消费），往往在周期扩张阶段表现优异。相比之下，其他行业（如医疗保健或公用事业）则更为稳定，受周期阶段影响小得多。在商业周期内部，还存在更短的趋势（战术趋势），可能持续数月，也可能短至数天。


    ![](img/600732_1_En_9_Fig6_HTML.jpg)


    一张折线图，显示两个经济周期在 50 至 75 年时间跨度内的产出变化。长期线波动两次，并呈上升趋势。短期线叠加在长期线上方，且全程波动。


    **图 9-6** 经济周期示意图，短期周期叠加于长期周期之上


    加密资产遵循类似的周期模式：首先是一个相对较长的价值增长趋势，与全球加密资产采用水平同步；其次是受监管、政策和重大事件（例如比特币减半事件或 2022 年
    9 月中旬以太坊的“合并”事件）驱动的短期周期。^(⁸⁴)


    第 4 章强调了加密资产与传统投资的低相关性。然而，在周期性衰退阶段，各类资产之间的相关性往往会上升。确实，当业务变得困难且经济放缓时，需要现金的投资者往往会抛售所有类型的资产。这些抛售发生在所有资产类别中，并拉低所有价格。例如，2008
    年的黄金或 2022 年的加密资产都出现过这种情况：作为全球抛售的一部分，与股票的相关性显著增加。在投资者最需要分散风险时，更高的相关性反而削弱了分散化投资的收益。这种金融现象被称为*传染*。


    ![](img/600732_1_En_9_Fig7_HTML.jpg)


    一张双轴折线图，显示 2020 年 8 月至 2023 年 1 月期间比特币美元价格和标普 500 指数价格。两条线均波动剧烈，先升后降。


    **图 9-7** 2020 年 8 月至 2023 年 1 月比特币（左轴）与标普 500（右轴）价格走势，显示在 2022 年抛售期间相关性更高（即当资产间相关性较高时，尖峰和下跌往往同时发生）


    随着加密资产市场的发展，它将逐渐与比特币减半周期脱钩，因为减半事件的影响将比例性地越来越小。在此过程中，加密资产市场可能更趋同于传统周期，后者反映了已投入的资本（当资本稀缺时，投资者倾向于抛售所有类型的资产）。此外，从中期来看，由于波动性较高，许多加密资产可能继续被视为风险资产。理解我们当前处于宏观周期的哪个阶段，以及其他投资者如何看待资产类别，对加密资产投资者而言可能会变得越来越重要。


    然而，加密资产的价值主张与传统资产类别有着根本不同。即使在不同加密资产之间，其价值主张也可能差异巨大。因此，有理由认为，资产类别之间以及加密资产类别内部的分散化收益将持续存在。


    例如，这种分散化收益在 2023 年 3 月中旬多家传统银行倒闭期间就已显现。当金融市场下跌时，比特币价格在一周内上涨了 40%——从`$20,000`升至超过`$28,000`。这一事件证明，比特币成为“避险资产”的说法开始站稳脚跟。


    ## 其他加密周期


    加密资产周期不仅可由价格定义，还可由其他指标定义。例如，区块空间就是这样一个指标，它指一个区块所能容纳的信息量。根据区块链的不同，区块空间的使用、表达和估值方式也不同。例如，在以太坊区块链上，用户需支付几个`gwei`（`gwei`是`ether`的十亿分之一）的费用，以便被纳入下一个区块。随着加密商业周期演变，对区块空间的需求及相应的费用也会变化。在某些情况下，区块空间费用甚至可能是未来价格变动的早期指标。


    同样，许多其他链上指标也能通过其自身所处的周期位置，为未来可能的价格变动提供见解。后续章节将讨论此类指标。


    ## 技术分析中的图表


    加密社区有时会依赖价格形态或交易量等图表来指示未来可能的价格变动。这种方法脱离了基本面分析，进入了危险的技术分析领域。


    这个领域之所以危险，是因为仅凭图表无法预测未来价格，且提供的信息不足以进行长期交易。尽管如此，它们仍有助于基于基本面选择交易时机。例如，它们可以提示支撑位和阻力位的存在。支撑位是一个低于当前资产价格的价格水平，在此价位上，许多投资者愿意买入。突破支撑位需要价格承受巨大的下行压力（即在该价位上卖家远多于买家）。阻力位则相反：是一个高于当前市场价格的价格水平，在此价位上，许多投资者想要卖出。


    图表可以补充投资论点，但不能替代它。它们可以确认或挑战某种理论，但图表本身不能成为理论。

    '
- fmt: '# Understanding Gartner’s Hype Cycles


    The technological research and consulting firm Gartner provides a valuable framework
    to navigate the hype around technological innovations.^([^(85)](#fn85)) Most innovations
    follow a similar pattern, first going through high enthusiasm and expectations
    before crashing through disillusionment and only afterward stabilizing at a reasonable
    level of productivity during mainstream adoption. In particular, the hype cycle
    is divided into five phases, as shown in Figure [9-8](#600732_1_En_9_Chapter.xhtml#Fig8).


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig8_HTML.jpg)


    A line graph of expectations versus time. The line increases with a peak and trough
    in 5 phases listed as innovation trigger, peak of inflated expectations, trough
    of disillusionment, slope of enlightenment, and plateau of productivity.


    Figure 9-8


    Gartner, Understanding Gartner’s Hype Cycles, Frances Karamouzis, Jan-Martin Lowendahl,
    September 27, 2022


    Identifying where the crypto space as a whole is in this cycle is challenging.
    Different sub-innovations within the space are likely at different cycle stages.
    For example, the market peak of 2013 and the crash of 2014 are likely the “inflated
    expectations” and “disillusionment” of the original innovation, Bitcoin. Once
    smart contracts entered the game with Ethereum in 2015, a new cycle began for
    this innovation. Again, a peak of inflated expectations took place in 2017, and
    a trough of disillusionment in the following year. Then, further innovations such
    as Web 3.0 and NFTs created similar ups and downs over 2020–2022. In particular,
    the market capitalization of NFT projects grew over 100 times in 2021 alone, to
    over $40 billion, before collapsing by more than 75% in the next year.^([^(86)](#fn86))


    # Calendar Adjustments


    Specific calendar dates drive some investors’ behaviors, directly affecting cryptoasset
    prices. At the end of each calendar year, many investment funds close their profit
    and loss statements. The gains accumulated over the financial year appear in the
    financial statements and may define the fund’s future. In anticipation of this
    critical year-end close event, funds may want to lock in some of the unrealized
    gains of the year to show more green figures on their statements. As a result,
    these funds may induce an over-proportional selling pressure when markets are
    largely up in December.


    To a smaller extent, calendar quarter ends also tend to show irregular patterns
    compared to other days. The expiration date of options (financial derivative products)
    happens mostly at quarter-end dates, which induces this trend. The large market
    for cryptoasset options makes quarter closes especially relevant for this asset
    class.


    In addition to that, investment funds also often follow a quarterly portfolio
    rebalancing cycle. At quarter end, portfolio managers reassess the relevance of
    their assets and rebalance their portfolio. This trend materially increases the
    volumes traded for all assets, including cryptoassets.


    # Fear & Greed Index


    Long-term and medium-term crypto cycles have been discussed, but when is the optimal
    time to buy within a cycle? To answer this question, one must understand that
    the market often acts irrationally. Specifically, it regularly overreacts to news
    that should have little to no impact on asset prices. This irrationality creates
    excellent opportunities for those able to see through it. For example, when things
    are bad in other financial markets, particularly equity (stocks), many investors
    move away from high-volatility assets, such as cryptoassets. These occasional
    flights to safety temporarily bring the price of volatile assets lower than their
    trend would predict. All other things equal, this is a favorable time to buy.
    As the business magnate John D. Rockefeller eloquently phrased it: “The way to
    make money is to buy when blood is running in the streets.”


    The Fear & Greed Index can measure the metaphorical “blood running in the streets.”
    The software comparator company alternative.me created this index based on sentiment
    changes on social media, surveys, and market metrics such as momentum, dominance,
    and trends. It is updated daily on the webpage [`https://alternative.me/crypto/fear-and-greed-index/`](https://alternative.me/crypto/fear-and-greed-index/).
    The index outputs a metric ranging from 0 to 100. A lower score indicates extreme
    fear (the market emotionally overreacting negatively), and a higher score indicates
    extreme greed (the market emotionally overreacting positively). Therefore, this
    index may be helpful for timing purchases and sales of cryptoassets.


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig9_HTML.jpg)


    A screenshot titled Fear and Greed Index, multi factorial crypto market sentiment
    analysis has a gauge. The pointer is at 60, and a label reads, now, greed. The
    details listed at the bottom read, alternative dot me, and last updated, February
    2, 2023.


    Figure 9-9


    Fear & Greed Index from alternative.me per May 7, 2023


    # Adoption


    It is 1990, and you go to work at the local post office. As you get your morning
    coffee, your technology-enthusiastic colleague rambles on about a new trend that
    is supposed to change everything. All you hear is incomprehensible jargon and
    unknown acronyms. *What is this `TCP/IP` thing, anyway? Nobody will ever use this.*
    Actually, it was the birth of the modern Internet. In the following decades, only
    a few people could describe what `TCP/IP` was, but almost everybody learned to
    use the Internet daily.


    Thirty years later, we are in a similar situation. Just replace `TCP/IP` with
    blockchain and the Internet with cryptoassets. Mass adoption does not require
    everybody to understand the intricacies of blockchain technology, consensus mechanisms,
    and the meaning of hard forks. Instead, mass adoption is about using cryptos for
    payments or savings, the same way people use emails or instant messaging for communication
    without understanding the underlying protocols.


    The number of Internet users in the late-1990s is similar to the number of cryptoasset
    users in the early 2020s: about 300 million. However, there is a major difference
    between the adoption of crypto today and the adoption of the Internet 25 years
    ago: crypto adoption is happening much faster than Internet adoption at the time.
    Specifically, Chapter [16](#600732_1_En_16_Chapter.xhtml) of this book analyzes
    data on usage growth, which is particularly relevant in the context of cryptoasset
    valuation. The blockchain data platform Chainalysis reveals that worldwide crypto
    adoption is driven by English-speaking countries and developing economies, especially
    younger generations (under 34 years of age).^([^(87)](#fn87))


    The high adoption pace of crypto and decentralized finance and their transformative
    potential could start a new secular trend—the era of cryptoassets. The next chapter
    investigates what it will take for crypto to be the catalyst for the next secular
    trend.'
  raw: '## Understanding Gartner’s Hype Cycles


    The technological research and consulting firm Gartner provides a valuable framework
    to navigate the hype around technological innovations.^([^(85)](#fn85)) Most innovations
    follow a similar pattern, first going through high enthusiasm and expectations
    before crashing through disillusionment and only afterward stabilizing at a reasonable
    level of productivity during mainstream adoption. In particular, the hype cycle
    is divided into five phases, as shown in Figure [9-8](#600732_1_En_9_Chapter.xhtml#Fig8).


    ![](images/600732_1_En_9_Chapter/600732_1_En_9_Fig8_HTML.jpg)


    A line graph of expectations versus time. The line increases with a peak and trough
    in 5 phases listed as innovation trigger, peak of inflated expectations, trough
    of disillusionment, slope of enlightenment, and plateau of productivity.


    Figure 9-8


    Gartner, Understanding Gartner’s Hype Cycles, Frances Karamouzis, Jan-Martin Lowendahl,
    September 27, 2022


    Identifying where the crypto space as a whole is in this cycle is challenging.
    Different sub-innovations within the space are likely at different cycle stages.
    For example, the market peak of 2013 and the crash of 2014 are likely the “inflated
    expectations” and “disillusionment” of the original innovation, Bitcoin. Once
    smart contracts entered the game with Ethereum in 2015, a new cycle began for
    this innovation. Again, a peak of inflated expectations took place in 2017, and
    a trough of disillusionment in the following year. Then, further innovations such
    as Web 3.0 and NFTs created similar ups and downs over 2020–2022\. In particular,
    the market capitalization of NFT projects grew over 100 times in 2021 alone, to
    over $40 billion, before collapsing by more than 75% in the next year.^([^(86)](#fn86))


    ## Calendar Adjustments


    Specific calendar dates drive some investors’ behaviors, directly affecting cryptoasset
    prices. At the end of each calendar year, many investment funds close their profit
    and loss statements. The gains accumulated over the financial year appear in the
    financial statements and may define the fund’s future. In anticipation of this
    critical year-end close event, funds may want to lock in some of the unrealized
    gains of the year to show more green figures on their statements. As a result,
    these funds may induce an over-proportional selling pressure when markets are
    largely up in December.


    To a smaller extent, calendar quarter ends also tend to show irregular patterns
    compared to other days. The expiration date of options (financial derivative products)
    happens mostly at quarter-end dates, which induces this trend. The large market
    for cryptoasset options makes quarter closes especially relevant for this asset
    class.


    In addition to that, investment funds also often follow a quarterly portfolio
    rebalancing cycle. At quarter end, portfolio managers reassess the relevance of
    their assets and rebalance their portfolio. This trend materially increases the
    volumes traded for all assets, including cryptoassets.


