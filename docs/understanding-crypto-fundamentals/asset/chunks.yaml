- fmt: '# Correlation and Diversification


    The idiom “do not put all your eggs in one basket” takes life in portfolio management
    through the concept of correlation. Typically, one expects some financial assets
    to perform well at certain times while others perform poorly in the same period.
    Indeed, a local or firm-specific event can affect one company without impacting
    others. For example, political upheaval in Africa can affect the region without
    too much impact on the other side of the world. This simple fact implies that
    diversifying one’s portfolio is beneficial because it enables one to lower one’s
    level of risk without impacting one’s level of expected return. For example, one
    is better off investing some capital in American technology stocks, some in Chinese
    manufacturing sites, some in European residential real estate, some in physical
    gold, and some in Australian municipal bonds than investing all of it in any of
    these categories.


    Correlation is the degree to which assets tend to move together. If one asset
    tends to increase when another increases, these assets are positively correlated.
    If one asset tends to decrease when the other increases, they are negatively correlated.
    If they evolve independently of each other, then they are uncorrelated. Correlation
    can therefore be represented on a spectrum from perfect negative correlation (–100%)
    to perfect positive correlation (+100%). The center of this range, 0% correlation,
    indicates uncorrelated assets.


    ![](images/600732_1_En_4_Chapter/600732_1_En_4_Fig5_HTML.jpg)


    A line graph of returns versus time for 2 assets. Asset A increases and decreases
    alternatively between negative 2 to 3%. Asset B follows a similar trend between
    negative 1.5 and 2%.


    **Figure 4-5** Example of positively correlated asset returns (correlation coefficient
    = 85%; i.e., tending to evolve in tandem over time)


    Even if there is some degree of positive correlation between most assets, the
    fact that they are not perfectly positively correlated (i.e., not moving exactly
    in the same direction and at the same time) implies diversification benefits.
    The higher the positive correlation between assets, the lower the diversification
    benefits of having these assets in the same portfolio.


    ![](images/600732_1_En_4_Chapter/600732_1_En_4_Fig6_HTML.png)


    A chart of relationship between increasing correlation and decreasing benefits
    of diversification presents 5 types from left to right. Highly negative, negative,
    uncorrelated assets, positive, and highly positive correlated assets.


    **Figure 4-6** Representation of the relationship between correlation and diversification
    benefits between assets


    All risk is not diversifiable, though. Systematic risk relates to macroeconomic
    events—to the economic system as a whole. It will always remain in any portfolio.
    On the other hand, unsystematic risk, or firm-specific risk, can be diversified
    away. For example, a new tax could benefit one industry at the expense of another.
    An investor with capital invested in each industry hedged this tax risk, as the
    gain on one investment offsets the loss on the other. Diversification can lower
    a portfolio’s level of risk without lowering its expected return.


    A portfolio manager’s job is to pick investments that maximize expected returns
    while keeping risk as low as possible. While client-specific criteria also play
    a part (time horizon, willingness to take risk, marginal tax rate), generally
    speaking, it boils down to maximizing return for a defined level of risk. Diversification
    across asset classes and within asset classes helps achieve that goal.


    The birth of cryptoassets enables portfolio managers to access a new asset class
    from which they can pick investments for their portfolios. As long as this new
    asset class is not perfectly positively correlated (+100%) to their existing portfolio,
    diversification benefits emerge from adding cryptoassets to it.


    Table 4-6 presents the pair correlations between investments selected earlier
    over the last decade.


    **Table 4-6** Correlation of Monthly Returns Between Pairs of Selected Assets,
    over the Same Time Frame


    |   | BTC | ETH | Gold | S&P500 | NASDAQ | EU50 |

    |---|---|---|---|---|---|---|

    | BTC |   | 44% | 1% | 24% | 20% | 16% |

    | ETH |   |   | 25% | 19% | 18% | 15% |

    | Gold |   |   |   | 5% | 2% | –1% |

    | S&P500 |   |   |   |   | 68% | 80% |

    | NASDAQ |   |   |   |   |   | 44% |

    | EU50 |   |   |   |   |   |   |


    A correlation is typically considered *moderate* when it is above 50% and *strong*
    when it is above 75%. While Table 4-6 indicates a correlation close to the “moderate”
    threshold within the asset class of cryptoassets (44% between Bitcoin and Ethereum),
    it shows that cryptoassets have little correlation with gold and with the three
    major indices selected (below 25%), at least over the timeframe selected.[^(51)](#fn51)


    Adding cryptoassets to a traditional portfolio can materially improve the prospects
    of that portfolio, not only due to the high returns presented previously but also
    due to the low level of correlation with other asset classes. Diversification
    benefits make it meaningful to have a non-zero cryptoasset allocation in any investment
    portfolio, even if one ignores the high returns they provide.


    # Fiduciary Duty of Portfolio Managers


    Entrusting a portfolio manager with one’s capital comes with trust from the investor
    and commitment from the portfolio manager. Indeed, the portfolio manager is obligated,
    as per his mandate, to act in the investor’s best interest. This obligation is
    called a fiduciary duty. Therefore, he must thoroughly research each potential
    investment and build an optimal portfolio for that investor. And the optimality
    of the portfolio considers, among others, its risk-return characteristics.


    The substantial diversification benefits of adding cryptoassets to a financial
    portfolio therefore make it a duty for all portfolio managers worldwide to invest
    part of their capital in cryptoassets. At the very least, they have to offer this
    possibility to investors willing to gain exposure to the highest-performing asset
    class of the decade.


    Among these portfolio managers are investment funds, mutual funds, and pension
    funds. As of the end of 2020, pension funds alone hold over $56 trillion of assets,
    most of which are in the United States.[^(52)](#fn52) However, these traditional
    investment firms do not yet have broad access to cryptoasset investments. Recent
    regulatory developments suggest it is poised to change in the coming months and
    years. Once this new asset class becomes investable for pension funds, investing
    just 2% of their assets under management in cryptoassets would more than double
    the size of the cryptoasset sector as of May 2023.


    Other institutional investors face a similar situation to pension funds in that
    they currently face major barriers to investing in cryptoassets. In addition,
    their assets under management are many times larger than pension funds. Due to
    their fiduciary duty and the recent regulatory developments in the cryptoassets
    industry, it is reasonable to assume that most of these financial institutions
    will soon enter the cryptoasset space. Their entry into cryptoassets will likely
    be a game-changer for the asset class size, similar to the situation that arose
    in the late 1990s when commodities became an investable asset class for institutions.
    Consequently, when it happens, the sizable flow of institutional capital into
    cryptoassets will likely increase many cryptoasset prices by large multiples.'
