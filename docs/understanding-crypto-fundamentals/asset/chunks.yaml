  trans: "\n# 会计\n\n2018 年，英国跨国电信公司`BT`爆出一桩丑闻，该集团会计中的人为错误将养老金负债低估了 5 亿英镑。而就在一年前，该公司另一起会计丑闻已导致集团估值减少\
    \ 80 亿英镑 [19]。\n\n不幸的是，会计中的人为错误和欺诈行为经常能绕过公司的内部控制和审计师的核查。过去十年间，`Wirecard`、`Wells\
    \ Fargo`、`Toshiba`、`Tesco`、`Petrobras`等公司以及所有大型审计事务所均曝出会计丑闻。\n\n在会计领域使用区块链技术可以减少人为错误和欺诈，促进交易并实现自动化控制。例如，合同的数字签名可以在区块链上为该合同建立采购订单。发票将直接根据该采购订单在区块链上开具，付款随后立即触发。以一种自动化且透明的方式将不同项目链接起来，可以让所有相关方即时了解所有发票、交易和未结金额的状态。此外，对这些记录进行详尽审计可以自动且持续进行，而不是像现在这样基于抽样且存在延迟。自动化这一过程还将大幅降低审计成本，并提供交易透明度。许多其他会计流程也可以实现自动化，并在基于区块链的系统上得到简化。通过提高公司会计流程的自动化和透明度，此类发展很可能减少会计丑闻和人为错误。\n\
    \n# 共享经济\n\n当`Uber`的叫车应用进入市场时，这种商业模式明显优越于传统出租车。例如，`Uber`将有闲暇时间想增加收入的临时司机，与需要比持牌出租车更实惠出行的乘客进行匹配。价格遵循供需规律，以市场建议的水平出清。此外，通过应用可以轻松预订行程，使价格透明并最小化等待时间。尽管这是一场出行革命，`Uber`仍因其攫取过高比例的利润而备受争议，往往只留给司机刚好够支付汽车和燃油费的钱。\n\
    \n现在，想象一下由`Uber`提供的服务，但背后没有这家公司。不是`Uber`，也不是任何其他公司。所提供的服务无需任何公司来运营。相反，社区可以通过一个去中心化平台来管理它。为闲置司机匹配乘客可以通过廉价的方式编程实现。此外，社区可以对各种问题进行投票，例如通过认证或评分来确保客户安全。由于没有公司会分走任何利润份额，乘客出行可能更实惠，司机也能获得更多利润。\n\
    \n这样的系统将成为真正共享经济的一部分。由人民创建、为人民运营的社区应用。`Uber`并非唯一的例子；想象一下没有`Airbnb`公司背后的`Airbnb`服务。或者没有`eBay`的`eBay`服务。没有`YouTube`的`YouTube`服务。没有银行的银行服务。区块链的去中心化为共享经济开启了一个全新的世界，使其能够大规模运行且无需中介机构。^(⁴⁶)\n\
    \n# 创作者赋能\n\n当一位艺术家发布一首歌时，欣赏音乐的听众通常不会直接付费给他。相反，内容创作者和消费者之间存在着众多中间方：录音室、唱片公司、经纪人、电台、知识产权服务商、如`Spotify`、`Amazon\
    \ Music`或`iTunes`等流媒体平台，以及更多。每个中间方都从艺术家的利润中分一杯羹，留给艺术家回报并精进其技艺的部分所剩无几。其他创意表达形式，如视频、书籍、绘画甚至电子游戏，在从创作到消费的分销链中也面临着同样的费用侵蚀。\n\
    \n在某些情况下，唱片公司、出版商和其他中间方通过提供有益的反馈、瞄准正确的受众或改进创意作品来增加价值。然而，在许多情况下，费用相对于所提供的服务来说过高了。无论如何，是选择通过中间方还是直接接触粉丝，应该是艺术家的选择，而不应是被有限技术或行业标准强加的义务。\n\
    \n区块链解决方案提供了这种选择。艺术家现在可以将他的作品（例如一首歌）发布在去中心化服务器上，并使用区块链以预定的使用费进行分享。如果是私人聆听歌曲，费用可以很低。如果用作商业视频的背景音乐，费用可以更高。如果用作电影的主题曲，费用甚至可以更高。艺术家可以通过同一区块链上的加密货币支付直接获得报酬，并完全了解其作品的流行度。更高的可见性使其他艺术家能够发现机会，而不是面对中间方费用的黑箱。大幅降低的制作和分销成本使内容创作者能够充分享受其知识产权的收益。此外，用户可以直接奖励他们，并且每个人都受益于更高的行业透明度。\n\
    \n# 关键概念\n\n虽然区块链技术挑战了货币的意义，但其益处远不止于此。特别是，它作为推动环境、社会和治理（ESG）实践及包容性的驱动力而大放异彩。例如，去中心化使人们摆脱了机构和政府的不当行为，这些机构并不总是将人民的最大利益放在首位。更高的安全标准和数据加密使人们能够重新掌控自己的在线身份，并限制与数据库泄露相关的风险。区块链还使数十亿人能够获得身份认证和银行服务等基本服务，而他们目前被排除在这些服务之外。同时，它通过消除攫取过高比例利润的不必要中间方，实现了真正的共享经济。\n\
    \n此外，当前面临恶性通货膨胀风险的数十亿人现在有了一种替代货币，其未来通胀率可以提前可靠预知。更重要的是，基于区块链的资产可以通过加速向可再生能源的过渡，大幅减少人类对环境的负面影响。保护像`Bitcoin`这样的加密资产网络，其可再生能源使用率远超世界上任何国家，从而引领了方向。最后，区块链作为向善力量的应用案例正在不断被开发出来。\n\
    \n# 扩展问题\n\n区块链技术和加密资产如何能够帮助建立全民基本收入？\n\n区块链如何能够增强本地社区？\n\n区块链或`Bitcoin`还能以其他哪些方式成为促进更大福祉的驱动力？\n\
    \n脚注 1 2 3 4 5 6 7 8\n\n# 4. 投资组合管理入门\n\n> *Audentes fortuna iuvat.（命运眷顾勇者。）*\n\
    > \n> ——维吉尔\n\n让我们转换视角，从金融投资组合管理的角度来审视加密资产。本章介绍投资组合管理的基础知识，以评估加密资产的金融特性。正如分析所示，加密资产是过去十年来最具财务吸引力的投资，即使在风险调整后也是如此，并且在未来十年内可能继续保持这一态势。\n"
- fmt: '# Price Fluctuations


    While fundamentals define the economic value of an asset, supply and demand on
    exchanges drive its price. The difference between the price of an asset and its
    value creates opportunities for investors able to spot it: they can secure a return
    on investment when the price eventually trends toward the asset’s economic value.
    The size and frequency of price fluctuations, known as volatility, are critical
    in portfolio management. Let us start by discussing how prices fluctuate, which
    ultimately drives both return and volatility.


    Price variations depend on trades on exchanges. An *order book* holds pending
    trades. It captures the price at which buyers are willing to buy and sellers are
    willing to sell, as well as the quantity for each trade. Table [4-1](#600732_1_En_4_Chapter.xhtml#Tab1)
    illustrates how an order book looks and what happens when a large trade happens.
    Assume that Bitcoin is currently trading at `$123,456.78` (a price it has not
    reached yet as of this writing) with the order book presented in Table [4-1](#600732_1_En_4_Chapter.xhtml#Tab1).


    **Table 4-1** Example of an Order Book for Bitcoin, Where the Current Price Is
    `$123,456.78`


    | | Price (USD) | Amount (BTC) |

    |--- |--- |--- |

    | Sell side | `123,500.00` | `3.141` |

    | | `123,489.24` | `0.318` |

    | | `123,475.00` | `2.718` |

    | | `123,468.43` | `0.476` |

    | | `123,459.00` | `1.618` |

    | | `123,457.55` | `0.693` |

    | | `123,457.00` | `0.301` |

    | Buy side | `123,456.54` | `0.707` |

    | | `123,456.32` | `0.632` |

    | | `123,456.00` | `0.774` |

    | | `123,455.00` | `1.000` |

    | | `123,453.50` | `0.547` |

    | | `123,450.00` | `3.162` |

    | | `123,449.99` | `1.414` |


    Every row in Table [4-1](#600732_1_En_4_Chapter.xhtml#Tab1) corresponds to a market
    participant’s purchase or sell order. For example, one private individual is willing
    to sell `0.301 BTC` for `$123,457.00` per BTC (the seventh row), and another is
    willing to buy `1.000 BTC` for `$123,455.00`. Both wait for the market price to
    move for their order to execute, as the current price is too high for the buyer
    and too low for the seller. Prices are sorted from highest to lowest, with prices
    on the sell side always higher than the current price and prices on the buy side
    lower than the current price. It will always be the case; otherwise, the orders
    would execute immediately and not be visible as pending trades on the order book.


    Now assume that a large buyer would like to acquire `10 BTC` for a price up to
    `$123,500.00` per BTC. The entire sell side of pending trades visible in Table
    [4-1](#600732_1_En_4_Chapter.xhtml#Tab1) would execute immediately. The buyer
    gets `0.301 BTC` at `$123,457.00`, `0.693 BTC` at `$123,457.55`, and so on until
    `3.141 BTC` at `$123,500.00`. As a result, Bitcoin’s current price would suddenly
    jump to `$123,500.00`.


    Since the cryptoasset market is relatively illiquid compared to traditional stocks
    and bonds markets (the total volume traded in a day is substantially lower), large
    orders tend to move prices significantly. For example, Tesla’s purchase of `$1.5
    billion` of Bitcoin in February 2021 caused the price to surge. Large price moves
    create the high volatility that cryptoassets are known for. Nevertheless, as the
    industry matures, increasing levels of liquidity become available for cryptoassets,
    which tend to reduce volatility.


    # Risk and Return


    In a nutshell, portfolio management aims to identify the optimal asset allocation
    to maximize expected return with as little volatility as possible. Indeed, for
    most investors, high financial returns and low volatility are attractive features.
    By convention, the industry gives the term “risk” to volatility and measures it
    as the standard deviation of returns. Simply speaking, the standard deviation
    of returns is their average deviation compared to their average.


    A theory developed by Nobel Prize laureate Harry Markowitz in 1952 to optimize
    financial portfolios is still an elemental method financial advisors use today.
    This *modern portfolio theory* aims to identify the right balance between return
    and risk, given specific characteristics of an investor, such as willingness to
    take risks and time horizon. This method identifies the highest possible level
    of return one can expect for a given level of risk. The higher the acceptable
    level of risk, the higher the expected return can be.


    With this background in mind, Table [4-2](#600732_1_En_4_Chapter.xhtml#Tab2) compares
    past returns of major cryptoassets (Bitcoin and Ethereum) to different benchmarks:
    gold and major diversified indices (S&P500, NASDAQ, and Euro Stoxx 50). Arbitrarily
    selecting a time frame can significantly bias an analysis. Therefore, a standard
    one is used, long enough to be meaningful and recent enough to be relevant: a
    ten-year window ending when writing this book—from January 1, 2013, to December
    31, 2022. To compare multi-year returns, one uses the *compound annual growth
    rate* (CAGR), which is the average yearly return of an investment, assuming continuously
    reinvested profits.


    **Table 4-2** Yearly Return Comparison of Selected Investments over 10 Years from
    2013 to 2022, Starting 2016 for Ethereum (its first full year). (Data source:
    Yahoo! Finance for BTC; ethereumprice.org for ETH; MacroTrends (`www.macrotrends.net`)
    for gold, S&P500 and NASDAQ; and investing.com for Euro Stoxx 50)


    | Return | BTC | ETH | Gold | S&P500 | NASDAQ | EU50 |

    |--- |--- |--- |--- |--- |--- |--- |

    | 2013 | `+6,035%` | n.a. | `–28%` | `+30%` | `+62%` | `+18%` |

    | 2014 | `–61%` | n.a. | `–0%` | `+11%` | `+22%` | `+1%` |

    | 2015 | `+38%` | n.a. | `–12%` | `–1%` | `+23%` | `+4%` |

    | 2016 | `+130%` | `+785%` | `+9%` | `+10%` | `+17%` | `+1%` |

    | 2017 | `+1,268%` | `+9,190%` | `+13%` | `+19%` | `+17%` | `+6%` |

    | 2018 | `–72%` | `–81%` | `–1%` | `–6%` | `+8%` | `–14%` |

    | 2019 | `+87%` | `–10%` | `+19%` | `+29%` | `+34%` | `+25%` |

    | 2020 | `+308%` | `+473%` | `+24%` | `+16%` | `+26%` | `–5%` |

    | 2021 | `+62%` | `+400%` | `–4%` | `+27%` | `+60%` | `+21%` |

    | 2022 | `–65%` | `–68%` | `–0%` | `–19%` | `–11%` | `–12%` |

    | **Total** | **`+124,317%`** | **`+130,242%`** | **`+10%`** | **`+169%`** | **`+770%`**
    | **`+44%`** |

    | **CAGR** | **`+103.9%`** | **`+178.6%`** | **`+0.9%`** | **`+10.4%`** | **`+24.1%`**
    | **`+3.7%`** |


    ![](images/600732_1_En_4_Chapter/600732_1_En_4_Fig1_HTML.jpg)


    A bar graph of CAGR versus the growth rate of 6 selected investments: BTC, `103.9%`;
    ETH, `178.6%`; Gold, `0.9%`; S&P 500, `10.4%`; NASDAQ, `24.1%`; EU 50, `3.7%`.


    **Figure 4-1** CAGR of selected investments 2013–2022


    As Table [4-2](#600732_1_En_4_Chapter.xhtml#Tab2) and Figure [4-1](#600732_1_En_4_Chapter.xhtml#Fig1)
    indicate, the average returns of the two largest cryptoassets are orders of magnitude
    larger than those of more traditional investments.


    However, returns are only part of the picture. Higher returns were only possible
    by accepting the much larger volatility of these returns. Table [4-3](#600732_1_En_4_Chapter.xhtml#Tab3)
    presents volatility based on the standard deviation of daily, weekly, monthly,
    and yearly returns for the same investments.


    **Table 4-3** Standard Deviation of Returns (aka Volatility or Risk) of Selected
    Investments over the Same Time Horizon'
