    # 比特币黄金牛市比率


    比特币在其第二个周期（2018 年）之后的价格模式催生了*比特币黄金牛市比率*理论。该比率指出，从市场底部到减半事件的时间，占从底部到峰值总时长的 50%；而从减半事件到峰值的时间，也同样占从底部到峰值总时长的
    50%。在前两个周期中，该比率分别为 50.3%–49.7%和 50.8%–49.2%。尽管这个理论在 2021 年广为流传，但第三个周期几乎完美地符合该模式，其比率为
    48.4%–51.6%，如图 9-4 所示。


    ![](img/600732_1_En_9_Fig4_HTML.jpg)


    一张显示 2010 年 7 月至 2023 年 1 月比特币美元价格波动上升的折线图，图中标有三个垂直分段，分别标注为底部、峰值和减半。对数趋势线从（2010
    年 7 月，0.8）附近开始，结束于（2023 年 1 月，80,000）。


    **图 9-4** 2010 年 7 月至 2023 年 1 月比特币美元价格（对数刻度）。展示了三个周期及其关键里程碑：底部、减半和峰值。


    一些市场参与者可能（也许是非理性地）期待这种模式会在下一个周期继续。根据这种 50%/50%的模式、最近的市场底部（2022 年 11 月 21 日）以及预计的下一次减半事件日期（假设减半事件之间相隔
    3 年 10 个月，即 2024 年 3 月 12 日），下一个市场顶部将出现在 2025 年 7 月 2 日。当然，这只是一个基于上述假设的理论日期，在实践中极不可能精确实现。监管变化、市场动态，甚至算力增长对下一次比特币价格峰值日期的影响，都将远大于历史模式。尽管如此，支撑这一理论日期的数据详见表
    9-1。


    **表 9-1** 历史周期的关键比特币价格日期：底部、减半事件和峰值，以及每个周期（从底部到峰值）的比率


    | | 底部 | 减半 | 峰值 | 天数 | 比率 |

    | --- | --- | --- | --- | --- | --- |

    | 周期前 1 | | | 2011 年 6 月 9 日 | | |

    | 周期 1 | 2011 年 11 月 19 日 | | | 163 | |

    | | | 2012 年 11 月 28 日 | | 375 | 50.3% |

