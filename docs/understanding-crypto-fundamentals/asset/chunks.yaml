    # 从货币到法定通货


    货币与法定通货并非同一概念。货币是个人在交易中自发选择的自然媒介，而法定通货则是政府强制要求公民在交易中使用的支付工具。两者起初可能等同，且通常以相同形态起步。然而历史上多次出现政府让法定通货逐渐背离货币属性的案例，这些尝试最终都以惨淡收场，往往酿成史诗级灾难。以下略举几例。


    在过去五千年的大部分时间里，黄金和白银确立了其货币地位。稳健的货币使文明得以繁荣，不断拓展人类发展的边界。得益于此，公元前五世纪的伟大希腊文明凭借金属铸币成为当时全球最繁荣且持续扩张的社会。它建立了具备高效税收体系的自由市场经济，成为世界上首个民主政体。然而公元前
    431 年，雅典与斯巴达爆发伯罗奔尼撒战争，这场持续近二十年的冲突远超预期。随着战事拖延，军费筹措日益困难，最终陷入绝境。为缓解困局，雅典当局"创造性"地将从税收中收取的金银与铜混合熔铸新币，使手头铸币数量激增，得以突破税收限制大肆挥霍。这项"创举"开启了历史上首次货币贬值。此后金银不再依据重量交易，而是按硬币的历史面值流通——雅典就此创造了首个政府法定通货。随后的几年里，民众逐渐识破伎俩，拒绝接受这些"金币"或"银币"。新币迅速沦为废纸，雅典输掉战争，繁华落幕，残存领土被下一个伟大文明——罗马所征服。


    罗马帝国随后崛起为世界主宰文明。但数百年繁荣之后，皇帝们的贪婪将帝国拖入无力承担的战争泥潭。与希腊如出一辙，罗马人通过货币贬值筹措军费：缩小硬币尺寸、掺入廉价金属铸造新币。起初贬值进程缓慢且有限——奥古斯都时期的原始`第纳尔`含银量达
    95%，两个世纪后卡拉卡拉在位时已降至 50%。然而一旦开启贬值进程，皇帝们便以递增速度疯狂铸币，试图逃避物价上涨。公元三世纪中叶，`第纳尔`的含银量在短短数十年间暴跌至
    0.5%。不可避免的恶果显现：罗马帝国陷入恶性通胀。在这被称为"三世纪危机"的二十年里，物价飙升近 1000%（即上涨十倍）。皇帝雇佣的军队只接受金币支付军饷，公然否定官方通货价值。本世纪末，在数十位短期皇帝遭刺杀后局势暂时稳定，但贬值进程迅速重启。公元
    301 年戴克里先时期，一磅黄金可兑换 5 万`第纳尔`。到 337 年其去世时，兑换比例升至 2000 万`第纳尔`，通胀率高达 40000%。^(⁶)


    ![](img/600732_1_En_1_Fig1_HTML.jpg)


    一枚圆形第纳尔硬币的正反面特写照片。正面为侧面男子头像，背面上下区域各有四条放射线，两侧刻有字母"D I V V S"和"I V L I V"。


    **图 1-1** 奥古斯都时期的第纳尔（来源：古典钱币集团，[`http://www.cngcoins.com`](http://www.cngcoins.com)；维基共享资源，公共领域）


    恶性通胀并非古代史独有。例如 16 世纪英格兰亨利八世时期的"大贬值"与前述希腊罗马故事如出一辙。为筹措对法战争军费，英王下令将硬币中的贵金属替换为廉价金属。曾经尊贵的英格兰通货迅速崩溃，退出流通领域。所有案例都遵循同一模式：无力承担的战争迫使增发货币，导致物价飞涨，国家经济崩溃，最终货币全面崩盘。


    下个世纪，欧洲大陆的小德意志邦国在三十年战争中重蹈覆辙。神圣罗马帝国内部仅有少数诸侯享有铸币权。帝国理论上实行双金属本位制：高价值大型金币与小额银币并行流通。虽然篡改硬币可判死罪，但刑罚执行极为困难。这一时期因此得名"剪币淘币时代"（*Kipper-
    und Wipperzeit*），源于反复剪削硬币边缘并精挑细选优质钱币的行为。原始贵金属硬币在持续贬值后所剩无几——硬币逐渐丧失价值含量，最终沦为纯铜制品。与前例相同，恶性通胀随之而来，经济危机接踵而至。民众拒绝接受硬币支付，通货沦为废纸。^(⁷)

