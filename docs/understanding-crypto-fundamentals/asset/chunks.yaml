- fmt: '# Developer Risk


    In contrast, some risks are rarely discussed in cryptoasset communities but are
    the weakest links. For example, developer risk could be both very harmful and
    conceivably likely.


    The protocol’s code of a blockchain is typically not fixed. For all major blockchains,
    developers maintain and upgrade the code to improve the blockchain. While this
    continuous improvement addresses existing weaknesses, it also represents a significant
    risk. Should a new upgrade contain bugs, it could be exploited by malicious third
    parties or even the developers themselves at the expense of all ecosystem members.


    Assessing a cryptoasset, therefore, requires understanding how the development
    and upgrading of the code take place. For example, best practices suggest using
    a testnet, where beta versions of upgrades run before their implementation on
    the blockchain’s mainnet. They also suggest having transparent easy-to-understand
    code (for example, precisely and extensively commented) reviewed by many independent
    developers and security experts. Such transparency and reviews minimize the likelihood
    of a bug and back-doors purposefully implemented in the code. Using standard,
    well-known, and open source cryptographic libraries also limits these risks.


    A bug in a critical area of the code, say in the encryption mechanism, could mean
    the end of the cryptoasset. If the bug can be exploited, the encryption could
    be cracked, and a hacker could, for example, obtain a private key from a public
    key. The hacker would gain access to all corresponding funds, and the blockchain
    would lose its integrity. Admittedly, upon identification of the bug, the community
    could agree to a hard fork from before the attack, correct the weakness, and continue
    operating. Nevertheless, some users could have lost funds in the process, and
    the asset’s reputation would be forever stained by its past failure.


    Also, the diligent investor should identify how the blockchain development of
    a specific cryptoasset is financed. Where financing is weak, developers are more
    subject to pressure from external stakeholders (bribes or blackmail). As a consequence,
    the risk of the underlying cryptoasset increases. One possible step to mitigate
    this risk is to ensure that the development team comprises trustworthy individuals
    with a strong track record of ethical behavior. Another step is implementing robust
    internal controls to prevent and detect potential bribery or blackmail attempts.
    It could include regular audits and reviews of the team’s activities and policies
    and procedures for reporting and addressing any potential issues. Overall, while
    it is not possible to completely eliminate the risk of developers being subject
    to bribery or blackmail, taking these steps can help to reduce the likelihood
    of these threats and protect the integrity of the cryptoasset.


    # Risk of Community Disagreement


    Another often ignored risk is a possible disagreement within a community, splitting
    support for a cryptoasset. One particularly meaningful historical conflict best
    illustrates this risk.


    From mid-2015 to the end of 2017, fierce debates took place around the size of
    Bitcoin’s blocks on the blockchain. Two opposing camps, the “small blockers” and
    the “large blockers,” argued whether the Bitcoin protocol should increase its
    1 MB blocksize limit. Small blockers were in favor of keeping the status quo.
    Their justification revolved around the possible slippery slope that a fundamental
    change in Bitcoin’s protocol would create. If an important feature like the block
    size were changeable without overwhelming consensus from the community, then nothing
    in Bitcoin would be permanent. For example, the hard cap at 21 million bitcoins
    could also change.


    On the other hand, large blockers wanted to address the Bitcoin scalability problem
    immediately. While many agreed it could have damaging consequences in the longer
    term, large blockers argued that short-term benefits justified this risk. For
    instance, increasing Bitcoin’s block size would enable more transactions to be
    included per block, thereby keeping fees low. More transactions per block would,
    in turn, enable billions of unbanked people to access essential banking services
    (via Bitcoin) without requiring further technological developments.


    While it may sound like ancient history today, this conflict has been extraordinarily
    intense and particularly meaningful for the industry. Jonathan Bier reports a
    fascinating account of the hostilities in his book *The Blocksize War* [46]. During
    this period, Bitcoin as it is known today came exceptionally close to dying. Its
    main threat was not hostile attackers or governments trying to ban the technology.
    Instead, it came from well-meaning bitcoiners who disagreed on the vision for
    this new technology. Respected and leading figures in the crypto space (such as
    Gavin Andresen and Mike Hearn) became loud advocates for changes in Bitcoin’s
    protocol. They even threatened to apply changes by pressuring miners rather than
    reaching a broad consensus. Effectively, it would have permanently eroded the
    decentralized spirit of Bitcoin and its unalterable features. If any private party
    could materially influence how Bitcoin’s protocol evolves without having a broad
    community agreement, Bitcoin would have lost its main value proposition: decentralization.


    While Bitcoin barely survived the repeated attacks on its essence, it became much
    stronger from this conflict. *The Blocksize War* highlighted that the community
    had not yet agreed on what Bitcoin meant. Developers and miners were divided,
    and individual parties had too much influence compared to the network size. Post-2017,
    the likelihood of such a threat decreased radically. If Bitcoin survived this,
    it would most likely endure any crypto winter. There is now much more clarity
    among the community on what Bitcoin stands for. Also, there are now so many more
    miners on the network that coercing any specific group is highly unlikely ever
    to gather a majority share of the network. Of course, there will always be healthy
    arguments for Bitcoin Improvement Proposals (BIPs), but none would threaten Bitcoin’s
    existence like this again.


    For other cryptoassets, however, internal disagreements among the community are
    a risk to consider. The stakeholders are many, each with different goals and incentives—developers,
    miners, merchants, users, regulators, and more. Any stakeholder who disagrees
    with how a cryptoasset evolves could try to influence its future, perhaps at investors’
    expense. Internal risks, possibly more than external risks, should therefore stay
    on the radar of any diligent investor. One factor that can help mitigate the risk
    of community disagreement is the governance structure of the cryptoasset. Assets
    with clear and transparent governance mechanisms, such as voting or decision-making
    processes, may better manage community disagreement and avoid potential conflicts.
    Additionally, the level of decentralization of the cryptoasset can also impact
    the risk of community disagreement. Highly decentralized assets may be more resistant
    to community disagreement, as no single authority or small group could unilaterally
    make decisions lacking consensus.'
