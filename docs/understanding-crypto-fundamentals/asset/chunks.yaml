  trans: '

    # 核心概念


    金融投资组合管理的核心概念是回报率和波动率（即风险）。过去十年间，加密资产的平均回报率和波动率比传统股票和大宗商品投资高出几个数量级。然而，两者之间的关系——单位金融风险的超额回报——表明加密资产是过去十年最具财务吸引力的投资。


    此外，加密资产与传统投资的相关性相对较低（即它们不会在同一时间朝同一方向波动）。这种低相关性使加密资产成为分散投资组合的良好工具。鉴于金融机构投资组合管理人有义务为投资者的最佳利益行事，投资加密资产很可能很快将成为其职责要求。一旦发生这种情况，加密资产市场的规模将成倍增长。


    # 扩展问题


    对于典型养老基金而言，其管理资产中投资于加密资产的最佳比例是多少？


    其他机构投资者，例如大型投资基金，情况又如何？


    加密资产的历史回报率是否预示了其未来的预期回报？


    脚注 1 2 3 4 5 6


    # 第二部分：什么是加密资产？


    # 5. 新型资产类别的诞生


    > *我一直在研发一种全新的电子现金系统，它完全点对点，无需任何可信第三方。*

    >

    > ——中本聪


    本书第一部分阐述了为什么加密资产值得理解，而第二部分将深入探讨其具体内涵。本章介绍第一个加密资产如何诞生、为何具有重要意义，以及后续的发展。


    ## 首个加密资产的诞生：比特币


    在自 20 世纪 30 年代大萧条以来最严重的金融危机中，金融体系的稳定性受到考验。2008 年万圣节过后的下午，神秘人物“中本聪”^(⁵³)首次在密码学论坛“密码学邮件列表”上发帖。中本聪的帖子以开头的引文开始，并包含一份九页文档的链接，标题为《比特币
    P2P 电子现金论文》。这份白皮书标志着第一个加密资产的诞生[20][21]。


    比特币实际上在几个月后，即 2009 年新年过后不久诞生，当时中本聪在区块链上发布了比特币的创世区块。区块链是使比特币得以运行的底层技术。


    尽管诞生于 2009 年初，但比特币的概念验证仍需几年时间才能走出阴影。比特币首次有效估值出现在那年秋天，当时“新自由标准”在线交易所用 5.02 美元购买了
    5050 个比特币（1 美元兑 1006 个比特币），以发布首个正式的比特币汇率。该汇率基于一个简单的模型，该模型估算出挖掘一个比特币所需的电力成本。后来，在
    2010 年春末，拉斯洛·汗耶茨完成了首笔比特币商业购买：用 10000 个比特币购买了两份棒约翰披萨。尽管当时这些比特币价值 41 美元已远高于两份披萨的价格，但如今它们将价值数亿美元。


    从那时起，科技爱好者越来越多地将比特币用作数字货币。然而，这些交易并非出于便利，而是旨在展示价值可以在去中心化、无中介的情况下进行交换。事实上，这种新型数字货币是一项真正的技术杰作，它解决了一直以来未被有效攻克的问题。


    ## 双重支付问题的解决方案


    中本聪带来的真正创新，是在数字和去中心化环境中破解了双重支付问题。


    当你发送电子邮件或在线图片时，实际上发送的是副本，而本地仍保留原件。这种发送副本的方式不适用于货币。货币需要稀缺性才有价值。如果任何人都能随意发送数字硬币的副本（即多次花费同一枚硬币，故称“双重支付”），那么稀缺性就不复存在。试想一下，如果大多数人可以在多家商店多次花费同一张
    100 美元钞票，而银行账户却不会被扣款，那会怎样？缺乏稀缺性会使它变得毫无价值，因为它永远无法成为可靠的货币。传统上，社会依赖银行等第三方来避免双重支付问题。如果你从银行账户在线转账，银行会确保你不再拥有转出的资金。银行充当了防止双重支付的中介。


    利用技术创新和现代密码学，中本聪设计了一种无需任何中介即可解决双重支付问题的技术。这项技术后来被命名为区块链，属于如今所称的分布式账本技术的一部分。


    比特币是区块链技术在价值领域的首个应用，正如电子邮件是互联网技术的首个应用一样。当然，电子邮件只是互联网所实现可能性的一小部分。比特币和区块链也是如此。

    '
- fmt: '### Byzantine Generals Problem


    One way to understand why blockchain matters is by first acknowledging a famous
    issue in distributed computing systems: The Byzantine Generals problem.^([^(54)](#fn54))


    Two Byzantine generals want to attack a city, each from one side. If they both
    attack simultaneously, they know they will be victorious. However, if one of them
    attacks alone, his troops will be annihilated by the city’s defenses. The generals
    do not have any preference for the timing of the attack but only care about its
    coordination.


    The issue lies in the communication system, which is unreliable. One general must
    send a messenger through the city to suggest a time for the attack to the other
    general. However, the enemy could intercept the messenger in the city. Therefore,
    after sending the messenger, the general does not know whether the other general
    received the message. Finally, even if he receives the message, the receiving
    general does not know whether the enemy tampered with the message (sent another
    messenger instead).


    These issues imply that the messenger who makes it to the receiving side must
    also return to the sending side to confirm delivery. However, even if he manages
    to go back and confirm, the sending general needs the receiving general to know
    that the messenger made it back to confirm. Otherwise, the receiving general would
    be unsure that the sending general would send his troops, as he might not have
    received confirmation. In other words, knowing that the other party knows is not
    enough. One must also know that the other party knows that one knows.


    It does not stop there: One must also know that the other party knows that one
    knows that the other party knows. This problem extends to infinity, with parties
    never sure that they agree on timing. In its generalized form, the problem states
    that a part of a system may fail, and there is imperfect information on whether
    any part has failed. Also, the number of generals needing coordination can be
    much bigger than two.


    ![An illustration of the Byzantine Generals Problem with more than two generals](images/600732_1_En_5_Chapter/600732_1_En_5_Fig1_HTML.png)


    In the successful attack instance, all 6 generals coordinate and successfully
    take the city in the center with their troops. In the unsuccessful attack instance,
    3 generals defect and the city annihilates the troops.


    *Figure 5-1: Illustration of the Byzantine Generals Problem with more than two
    generals*


    The Byzantine Generals Problem is directly relevant in the context of decentralized
    money. Any actor on a monetary network may try to trick the system. For example,
    a dishonest person may try to send the same money twice or send money and keep
    it at the same time. Without any central authority to prevent such behavior, all
    actors on the network need to reach a consensus on who owns which amount of money
    at any point in time.


    Like Byzantine generals, all actors on a monetary network need to coordinate under
    imperfect information. In particular, without knowing whether the enemy (a dishonest
    person) tampered with the message (the money transferred). Moreover, all members
    need to know that everybody on the network is aware of how much money each person
    has at any point in time, even in the presence of dishonest actors on the network.


    ### Byzantine Fault Tolerance


    Solving this problem is not straightforward. Solutions should avoid what is called
    a “Byzantine failure,” where nodes^([^(55)](#fn55)) (generals) in the system cannot
    reach an agreement because one or several nodes may be failing (dishonest). A
    solution consists in achieving a “Byzantine consensus,” where all working nodes
    (honest generals) accept the message sent by the broadcaster (the sending general).
    All working nodes agree, regardless of the possible presence of failing components.
    Also, they all know that all other working nodes agree. In the Byzantine context,
    consensus corresponds to all honest generals sending their troops simultaneously.
    In the monetary context, all members agree on who owns how much.


    A solution to reach a “Byzantine consensus” requires two things. First, unforgeable
    message signatures to prove from whom the message comes. Second, relying on the
    assumption that the majority of nodes are honest.


    Unforgeable message signatures can be achieved through cryptography. It is the
    process of encrypting a message through algorithms to keep it confidential.^([^(56)](#fn56))
    In particular, a public and private key combination enables this encryption and
    tamper-resistant evidence of the message’s originator. A node (sending general)
    encrypts its message with its private key. As the name implies, this key is private
    and cannot be forged by any dishonest node (the enemy). However, anyone can identify
    that the encrypted message can only come from the original node (sending general)
    using the corresponding public key. If the public key decrypts the message, it
    can only have been encrypted by the corresponding private key, testifying it is
    genuine.


    The next chapter covers details on asymmetric cryptography. For now, it is easier
    to imagine these keys in the context of a physical mailbox. The public key is
    the address of the mailbox,^([^(57)](#fn57)) known by everybody; anybody can send
    mail to that mailbox. In contrast, only the owner holds the private key that opens
    the mailbox and can send from it.


    The assumption that most nodes remain honest is achieved through carefully designed
    incentives and progressive network growth to ensure it remains decentralized.
    Dishonest nodes becoming the majority represent a risk in cryptoassets, analyzed
    in Chapter [13](#600732_1_En_13_Chapter.xhtml).


    Blockchain was engineered as a Byzantine fault-tolerant system to prevent double-spending
    for its first use case, Bitcoin. All users agree on the chronological order of
    transactions through a peer-to-peer exchange of information certified by computational
    proof. Even if some nodes in the network become dishonest, the rest will still
    reach a consensus without accepting fraudulent transactions. The Bitcoin blockchain
    was built to be consistent with game theory in that it gives the right incentives
    to all actors on the network. Every actor is encouraged to act in accordance with
    the rules, while cheating is not beneficial in any way. This way, it is in everybody’s
    interest to play by the book. Such technology is “technically” possible. In other
    words, there is a mathematically feasible way to achieve fault-proof, decentralized
    money transfers.


    Another critical aspect remains for this technology to work—the human one. Would
    a community accept to deal with assets in a decentralized way, without any intermediary?
    As history shows, yes, it would, and it has. This story brings us to a tiny island
    in the Pacific Ocean.'
  raw: '## Byzantine Generals Problem


    One way to understand why blockchain matters is by first acknowledging a famous
    issue in distributed computing systems: The Byzantine Generals problem.^([^(54)](#fn54))


    Two Byzantine generals want to attack a city, each from one side. If they both
    attack simultaneously, they know they will be victorious. However, if one of them
    attacks alone, his troops will be annihilated by the city’s defenses. The generals
    do not have any preference for the timing of the attack but only care about its
    coordination.


    The issue lies in the communication system, which is unreliable. One general must
    send a messenger through the city to suggest a time for the attack to the other
    general. However, the enemy could intercept the messenger in the city. Therefore,
    after sending the messenger, the general does not know whether the other general
    received the message. Finally, even if he receives the message, the receiving
    general does not know whether the enemy tampered with the message (sent another
    messenger instead).


    These issues imply that the messenger who makes it to the receiving side must
    also return to the sending side to confirm delivery. However, even if he manages
    to go back and confirm, the sending general needs the receiving general to know
    that the messenger made it back to confirm. Otherwise, the receiving general would
    be unsure that the sending general would send his troops, as he might not have
    received confirmation. In other words, knowing that the other party knows is not
    enough. One must also know that the other party knows that one knows.


    It does not stop there: One must also know that the other party knows that one
    knows that the other party knows. This problem extends to infinity, with parties
    never sure that they agree on timing. In its generalized form, the problem states
    that a part of a system may fail, and there is imperfect information on whether
    any part has failed. Also, the number of generals needing coordination can be
    much bigger than two.


    ![](images/600732_1_En_5_Chapter/600732_1_En_5_Fig1_HTML.png)


    An illustration. In the successful attack instance, all 6 generals coordinate
    and successfully take the city in the center with their troops. In the unsuccessful
    attack instance, 3 generals defect and the city annihilates the troops.


    Figure 5-1


    Illustration of the Byzantine Generals Problem with more than two generals


    The Byzantine Generals Problem is directly relevant in the context of decentralized
    money. Any actor on a monetary network may try to trick the system. For example,
    a dishonest person may try to send the same money twice or send money and keep
    it at the same time. Without any central authority to prevent such behavior, all
    actors on the network need to reach a consensus on who owns which amount of money
    at any point in time.


    Like Byzantine generals, all actors on a monetary network need to coordinate under
    imperfect information. In particular, without knowing whether the enemy (a dishonest
    person) tampered with the message (the money transferred). Moreover, all members
    need to know that everybody on the network is aware of how much money each person
    has at any point in time, even in the presence of dishonest actors on the network.


    ## Byzantine Fault Tolerance


    Solving this problem is not straightforward. Solutions should avoid what is called
    a “Byzantine failure,” where nodes^([^(55)](#fn55)) (generals) in the system cannot
    reach an agreement because one or several nodes may be failing (dishonest). A
    solution consists in achieving a “Byzantine consensus,” where all working nodes
    (honest generals) accept the message sent by the broadcaster (the sending general).
    All working nodes agree, regardless of the possible presence of failing components.
    Also, they all know that all other working nodes agree. In the Byzantine context,
    consensus corresponds to all honest generals sending their troops simultaneously.
    In the monetary context, all members agree on who owns how much.


    A solution to reach a “Byzantine consensus” requires two things. First, unforgeable
    message signatures to prove from whom the message comes. Second, relying on the
    assumption that the majority of nodes are honest.


    Unforgeable message signatures can be achieved through cryptography. It is the
    process of encrypting a message through algorithms to keep it confidential.^([^(56)](#fn56))
    In particular, a public and private key combination enables this encryption and
    tamper-resistant evidence of the message’s originator. A node (sending general)
    encrypts its message with its private key. As the name implies, this key is private
    and cannot be forged by any dishonest node (the enemy). However, anyone can identify
    that the encrypted message can only come from the original node (sending general)
    using the corresponding public key. If the public key decrypts the message, it
    can only have been encrypted by the corresponding private key, testifying it is
    genuine.


    The next chapter covers details on asymmetric cryptography. For now, it is easier
    to imagine these keys in the context of a physical mailbox. The public key is
    the address of the mailbox,^([^(57)](#fn57)) known by everybody; anybody can send
    mail to that mailbox. In contrast, only the owner holds the private key that opens
    the mailbox and can send from it.


    The assumption that most nodes remain honest is achieved through carefully designed
    incentives and progressive network growth to ensure it remains decentralized.
    Dishonest nodes becoming the majority represent a risk in cryptoassets, analyzed
    in Chapter [13](#600732_1_En_13_Chapter.xhtml).


    Blockchain was engineered as a Byzantine fault-tolerant system to prevent double-spending
    for its first use case, Bitcoin. All users agree on the chronological order of
    transactions through a peer-to-peer exchange of information certified by computational
    proof. Even if some nodes in the network become dishonest, the rest will still
    reach a consensus without accepting fraudulent transactions. The Bitcoin blockchain
    was built to be consistent with game theory in that it gives the right incentives
    to all actors on the network. Every actor is encouraged to act in accordance with
    the rules, while cheating is not beneficial in any way. This way, it is in everybody’s
    interest to play by the book. Such technology is “technically” possible. In other
    words, there is a mathematically feasible way to achieve fault-proof, decentralized
    money transfers.


    Another critical aspect remains for this technology to work—the human one. Would
    a community accept to deal with assets in a decentralized way, without any intermediary?
    As history shows, yes, it would, and it has. This story brings us to a tiny island
    in the Pacific Ocean.'
  trans: '

    ### 拜占庭将军问题


    理解区块链重要性的一个途径，是首先认识到分布式计算系统中的一个著名难题：拜占庭将军问题。^(⁵⁴)


    两位拜占庭将军计划从城池两侧同时发起进攻。如果他们协同进攻，必将获胜。然而，若其中一位独自出击，其部队将被城防力量歼灭。将军们对进攻时机并无偏好，只关心行动能否协调一致。


    问题在于通信系统并不可靠。一位将军必须派遣信使穿越城池，向另一位将军建议进攻时间。但敌人可能在城中截获信使。因此，发出信使后，这位将军无法知晓另一位将军是否收到了消息。即便另一位将军收到了消息，他也不知道消息是否被敌人篡改（或是否被敌方假冒的信使替换）。


    这些问题意味着，成功抵达接收方的信使还必须返回发送方以确认送达。然而，即使他成功返回并确认，发送将军仍需要接收将军知道信使已返回确认。否则，接收将军无法确定发送将军会出兵，因为发送将军可能并未收到确认。换言之，知道对方知情是不够的。还必须知道，对方知道自己知情。


    这还没完：还必须知道，对方知道自己知道对方知情。这个问题会无限延伸下去，各方始终无法确信彼此在时机上达成一致。其广义形式指出，系统中的某个部分可能发生故障，而关于任何部分是否发生故障的信息都不完备。此外，需要协调的将军数量可能远多于两位。


    ![一张包含超过两位将军的拜占庭将军问题示意图](img/600732_1_En_5_Fig1_HTML.png)


    在成功进攻的实例中，全部 6 位将军协同作战，率领部队成功攻占中央城池。在失败进攻的实例中，3 位将军叛变，城池歼灭了部队。


    *图 5-1：超过两位将军的拜占庭将军问题示意图*


    拜占庭将军问题与去中心化货币的背景直接相关。货币网络上的任何参与者都可能试图欺骗系统。例如，不诚实的人可能试图将同一笔钱花费两次，或者同时发送并保留这笔钱。在没有中央权威来阻止此类行为的情况下，网络上的所有参与者都需要就谁在何时拥有多少资金达成共识。


    如同拜占庭将军一样，货币网络上的所有参与者都需要在不完备的信息下进行协调。特别是，他们无法知道敌人（不诚实者）是否篡改了消息（转移的资金）。此外，所有成员都需要知道网络上的每个人都清楚谁在何时拥有多少资金，即便网络上存在不诚实的参与者。


    ### 拜占庭容错


    解决这个问题并不简单。解决方案应避免所谓的“拜占庭故障”，即系统中的节点^(⁵⁵)（将军）因一个或多个节点可能出现故障（不诚实）而无法达成一致。一种解决方案是实现“拜占庭共识”，即所有工作节点（诚实的将军）都接受广播者（发送将军）发送的消息。无论是否存在可能的故障组件，所有工作节点都达成一致。同时，它们都知道其他所有工作节点也达成了共识。在拜占庭背景下，共识对应所有诚实的将军同时派出部队。在货币背景下，则对应所有成员就谁拥有多少资金达成一致。


    实现“拜占庭共识”的解决方案需要两件事。首先，需要不可伪造的消息签名来证明消息来源。其次，需要依赖多数节点是诚实的这一假设。


    不可伪造的消息签名可以通过密码学实现。这是一种通过算法对消息进行加密以保持其机密性的过程。^(⁵⁶) 特别是，公钥和私钥的组合能够实现这种加密，并提供防篡改的消息来源证明。一个节点（发送将军）用其私钥对消息进行加密。顾名思义，这个密钥是私有的，任何不诚实的节点（敌人）都无法伪造。然而，任何人都可以使用对应的公钥来识别出，加密后的消息只能来自原始节点（发送将军）。如果公钥能解密该消息，那么该消息只能由对应的私钥加密，从而证明其真实性。


    下一章将详细介绍非对称密码学。现在，将这些密钥想象成物理邮箱会更容易理解。公钥相当于邮箱地址，^(⁵⁷) 人人皆知；任何人都可以向该邮箱发送邮件。相比之下，只有邮箱主人持有打开邮箱并从中发送邮件的私钥。


    关于多数节点保持诚实的假设，是通过精心设计的激励机制和网络的渐进式增长来实现的，以确保网络保持去中心化。不诚实节点成为多数代表了一种加密资产中的风险，这将在第
    13 章中分析。


    区块链被设计成一个拜占庭容错系统，其首个应用场景比特币就是为了防止双重支付。所有用户通过点对点的信息交换（由计算证明进行认证）来就交易的 chronological
    顺序达成一致。即使网络中的某些节点变得不诚实，其余节点仍能在不接受欺诈交易的情况下达成共识。比特币区块链的构建符合博弈论，它为网络上的所有参与者提供了正确的激励。每个参与者都被鼓励按照规则行事，而欺骗行为在任何方面都无利可图。这样，按规矩办事符合所有人的利益。这种技术在“技术上”是可行的。换句话说，存在一种数学上可行的方法来实现防故障、去中心化的货币转移。


    要使这项技术发挥作用，还有另一个关键方面——人的因素。一个社区会愿意在没有任何中介的情况下，以去中心化的方式处理资产吗？历史表明，会的，它愿意，并且已经做到了。这个故事将我们带到了太平洋上的一个小岛。

    '
- fmt: '# Decentralized Money Proof of Concept: Rai Stones


    Bitcoin was not the first intangible money to work without an intermediary. For
    centuries, the Micronesian island of Yap used a ubiquitous form of money to transfer
    value between individuals and villages without requiring a middleman.


    This form of money is known as *Rai stones* or *Yapese stone money*: large circular
    stones with a hole carved in the center and scattered throughout villages on the
    island. These stones could weigh up to a few tons, similar to a fully grown male
    Asian elephant.


    ![](images/600732_1_En_5_Chapter/600732_1_En_5_Fig2_HTML.jpg)


    A photograph of a thick large round stone with a rough surface placed on a grassy
    area. It has a small hole at the center.


    **Figure 5-2**


    Rai stone, used as money on the Micronesian island of Yap. (Source: Wikimedia,
    public domain)


    Contrary to Western societies’ standards, the bearer does not hold value. It would
    be difficult, if not impossible, for any individual to transport any such stone
    around to transact. Instead, the community agrees on value through word-of-mouth.
    For example, if a farmer sells part of his land, he gets half of the rai stone
    at the village entrance. The buyer and seller share this information with the
    community to validate the transaction. Since all community members know that the
    buyer owned that rai stone before the transaction, they agree that it can occur.
    In the community’s collective mind, the farmer is now the new owner of half of
    that rai stone, which he can use to make any purchase of that value.


    Similar to an “account” of the buyer and the farmer, the value held by each community
    member is recorded in the memory of every other member. In such a system, money
    is decentralized.


    Interestingly, it is not even the physical presence of the stone that gives value
    to it. In a famous example, a stone was being carried across the sea to a different
    island when the ship carrying it sank. The Yapese community agreed that the stone
    must still exist even at the bottom of the ocean. The stone kept its value and
    continued to be traded among the community.


    As this example proves, money is the agreement of value in the psyche of community
    members. It does not need to be physical. It only needs mutual agreement. It is
    not so different from dealing with considerable amounts in the Western world.
    The Nobel laureate economist Milton Friedman compared rai stones to gold in the
    vault of a nation. Germany can agree to transfer the value of gold in a vault
    to the United Kingdom without ever moving the gold from the vault [22]. By extension,
    transferring money digitally with a bank transfer is also not so different—at
    least in the sense that no physical exchange of goods is necessary. However, a
    critical difference between rai stones and a bank account is that rai stones do
    not need any intermediary—no bank, no central authority.


    Rai stones were only used among small communities as this monetary model is not
    scalable. Any individual, family, or community could only memorize the value split
    of a few dozen stones among community members. Hundreds at most. It certainly
    does not enable millions of daily transactions whose value must be validated and
    recorded in minutes. Nevertheless, the mere existence of rai stones shows that
    a decentralized monetary system can work and has worked for half a millennium.


    Coming back to the parallel with Bitcoin, not only is it *technically* possible
    to decentrally exchange money through technology, but it is also *societally*
    possible for a community to effectively work this way. Besides, Bitcoin and cryptoassets
    have evolved to become a lot more than just money. Money is just where it all
    started. The story continues with ups and downs and many more revolutionary innovations.


    ## Bitcoin Beyond Its Genesis


    In the years following its launch, Bitcoin was only of interest to the small cryptography
    community where it was born. Satoshi Nakamoto regularly posted on the Cryptography
    Mailing List and the `bitcointalk.org` forum. He mostly answered early adopters’
    questions and published Bitcoin’s source code updates on `SourceForge.net`. The
    Bitcoin community was just forming, and having a knowledgeable, though anonymous,
    founder behind the emerging technology provided just enough thrust to get the
    ball rolling.


    At first, the adoption of Bitcoin picked up slowly and in waves. It took two years
    for the coin’s price to break the `$1` threshold. The nature of this innovation
    made potential users skeptical about whether it was a revolution, a fad, or even
    a scam. Wikipedia even removed the Bitcoin page from its website in July 2010
    for not being noteworthy enough. Ironically, only four years later, Wikipedia
    started accepting donations in bitcoins.


    ![](images/600732_1_En_5_Chapter/600732_1_En_5_Fig3_HTML.jpg)


    A line graph, titled Bitcoin''s early price history to 1 U S D, of value in U
    S D in July, August, September, October, November, and December 2010, and in January,
    February, March, and April 2011. The line is stable till October 2010 and then
    rises steeply with intense fluctuations.


    **Figure 5-3**


    Bitcoin’s early price history (in USD). It took more than two years (from January
    3, 2009 to February 10, 2011) for the price of a bitcoin to break the `$1` threshold


    Bitcoin started making the headlines toward the end of 2010 when `PC World` magazine
    published an article suggesting that Bitcoin be used as payment and donation to
    WikiLeaks. While some saw it as an excellent opportunity to bring the innovation
    out of the shadows, Satoshi Nakamoto strongly opposed it.


    > *“No, don’t ‘bring it on’… Bitcoin is a small beta community in its infancy.
    You would not stand to get more than pocket change, and the heat you would bring
    would likely destroy us at this stage.”*


    Then, Nakamoto started to disappear. The project was growing, interest was spreading,
    and Nakamoto was no longer needed. The mystery behind his true identity arguably
    even strengthened public interest in Bitcoin. His posts became increasingly scarcer,
    then stopped altogether as developers at the Bitcoin Foundation took over the
    role of advocate for the asset and the underlying blockchain technology. In July
    2011, his penultimate post commented on WikiLeaks’ new acceptance of Bitcoin as
    payment: “WikiLeaks has kicked the hornet’s nest, and the swarm is headed towards
    us.”


    Nevertheless, Bitcoin did not collapse. Quite the opposite, its value increased
    by three orders of magnitude in less than three years as the unwanted attention
    attracted believers in the new technology.


    ![](images/600732_1_En_5_Chapter/600732_1_En_5_Fig4_HTML.jpg)


    A line graph, titled Bitcoin''s early price history to 1000 U S D, of value in
    U S D versus various months in the years from 2011 to 2014. The line is stable
    till April 2013, rises steeply with intense fluctuations to reach a peak in October
    2013, drops in January 2014, and rises.


    **Figure 5-4**


    Bitcoin’s price history from April 2011 to January 2014 (in USD). Bitcoin’s price
    increased from `$1` to over `$1,000` in less than three years


    In parallel, Bitcoin started to be used for illegal activities, which triggered
    further negative headlines. In October 2013, the FBI shut down one of the most
    significant online criminal marketplaces, Silk Road, which accepted payments exclusively
    in Bitcoin. Silk Road was like the Amazon of illicit products: you could buy any
    drugs, from ecstasy to LSD and cannabis seeds, as well as fake passports, and
    have them delivered to your doorstep in a few days.'
