- fmt: '# Anonymous eCash and DigiCash: 1982


    Blind signatures are the technology at the base of the electronic payment system
    *anonymous eCash*, developed by David Chaum as early as 1982 [51].


    Blind signatures are an extension to digital signatures that provide anonymity
    to the user. They enable the signer (e.g., in the case of traditional currencies,
    a bank) to sign a document without seeing its content. Concretely, if Alice spends
    money digitally through a blind signature, neither the bank nor the seller knows
    who spent that money. All parties agree that the money is valid (the bank has
    a process to verify it) but cannot trace its origin.


    The blind signature technology can also be used for other purposes, such as electronic
    voting or any system in which the content of a message of any kind should be kept
    private. For example, if Bob wants to purchase goods requiring him to be of legal
    age, he could use a blind signature to convey the piece of information that he
    is older than a specific age without requiring him to disclose his exact date
    of birth. Similarly, if an inventor wants to verify whether his invention is patented,
    he can retrieve specific information from existing patents without needing to
    reveal his interest in these patents.


    David Chaum used *anonymous eCash* as a base for founding the company DigiCash
    in 1989. The flourishing web environment of the nineties and the growing need
    for electronic transactions should have set the company in optimal growth conditions.
    Nevertheless, only a handful of banks in Europe and a single bank in the United
    States used DigiCash. The company went bankrupt in 1998 and sold its eCash patents
    to eCash Technologies.


    Chaum believes that the lack of interest in privacy at the time caused the doom
    of DigiCash: “As the Web grew, the average level of sophistication of users dropped.
    It was hard to explain the importance of privacy to them” [52].


    The growing electronic payment environment was seized by credit card companies,
    which became the preferred online payment method. This was likely driven by the
    higher importance of convenience compared to privacy at the time.


    ## Secured Chain of Blocks to Timestamp Documents: 1991


    In parallel, in the early nineties, Stuart Haber and Scott Stornetta developed
    a protocol to immutably timestamp documents without requiring a timestamping central
    authority while maintaining the privacy of the document’s content. Fundamentally,
    their protocol prevents the back-dating and forward-dating of documents and uses
    a process similar to how a modern blockchain works. They achieved it by using
    hashes and digital signatures to form what they call a “distributed-trust scheme.”
    [53]


    ## The Eternity Service: 1996


    A few years later, Ross Anderson made decentralization possible by replicating
    data with redundancies across many computers via the Internet, thereby protecting
    against attacks. In particular, he combined this idea with cryptography to set
    up an immutable database in much the same way blockchain technology does today.
    Anderson’s 1996 paper, “The Eternity Service,” bears in its name the immutable
    nature of the resulting decentralized data storage. Similar to modern blockchains,
    it was a service offered to all without any required “proof of identity or other
    formality.” Also, similar to Bitcoin, “there will be no head office which could
    be coerced or corrupted, and the diversity of ownership and implementation will
    provide resilience against both error and attack.” While it never aimed at creating
    any tradable and digitally scarce asset, the Eternity Service contained many characteristics
    that made Bitcoin successful [54].


    ## Hashcash: 1997


    The growth of the Internet in the nineties brought new challenges with it. Email
    spamming spread, enabling denial-of-service attacks. A denial-of-service (DoS)
    attack is a cyberattack designed to make a computer or network resource connected
    to the Internet unavailable, typically by flooding the target’s resources. In
    the case of emails, it is achieved by automating the submission of an enormous
    number of emails briefly to overflow a server. Adam Back suggested a solution
    to that problem through a proof-of-work mechanism in May 1997, which he formalized
    in a paper in 2002 [55].


    The cryptographic Hashcash algorithm delivers a stamp added to the header of an
    email, proving that the sender has spent at least a certain amount of CPU time
    and energy to deliver the email. Human email senders would barely notice this
    difference, but the automated sending of thousands of emails is made cumbersome.
    While CPU time and energy are wasted solving a useless computer problem, the objective
    is to discourage spammers, whose business model relies on sending a vast number
    of emails. Spammers needing to face this small cost for every email would become
    unprofitable. In a concrete analogy, the Hashcash algorithm corresponds to having
    to prove that the sender ran around the neighborhood before delivering a physical
    piece of mail. It is not too much of a burden to do so once, but one would not
    do so a thousand times unless necessary.


    Hashcash is implemented in the email client Mozilla Thunderbird and inspired major
    companies such as Microsoft to implement similar spam reduction approaches. It
    is relevant in cryptoassets because the first cryptoassets also used a proof-of-work
    algorithm as part of their implementation. However, the usage of proof-of-work
    in cryptoassets works the other way around: it enables the verification of valid
    senders rather than deterring undesirable behaviors.


    ## Bit Gold: 1998


    Bit gold is a theoretical, decentralized, digital currency created by Nicholas
    Szabo, better known as Nick Szabo. It was never implemented but resembled Bitcoin
    in shape and form. In particular, it used a proof-of-work consensus mechanism
    to solve a cryptographic puzzle. The solved problem would be sent with the public
    key of the solver to a Byzantine fault-tolerant public database, in which each
    solution becomes part of the next problem (i.e., effectively a blockchain). Despite
    Szabo repeatedly denying this statement, bit gold was the closest ancestor to
    Bitcoin and whose creator is speculated to be Satoshi Nakamoto. Szabo also combined
    his law and computer science expertise to implement self-executing contracts in
    computer code. He is namely the one who coined the term “smart contracts,” which
    is central to networks such as Ethereum or Cardano.


    ## B-Money: 1998


    A Chinese computer engineer and cryptography expert named Wei Dai described a
    modern money system based on cryptography in 1998. His publication “B-money, an
    anonymous, distributed electronic cash system” established how decentralized,
    digital money and self-executing contracts could function [56]. Most core concepts
    from that paper, such as a proof-of-work mechanism to update a collective ledger,
    were later implemented in Bitcoin. This publication is even cited in Bitcoin’s
    white paper.


    Wei Dai and Adam Back were the first people contacted by Satoshi Nakamoto during
    the development of Bitcoin, testifying to their instrumental role in the early
    development of the concept.


    The Ethereum network then took hold of the smart contract idea and implemented
    it as a main difference from Bitcoin. In the same way that the smallest fraction
    of Bitcoin has been named a satoshi in honor of Satoshi Nakamoto (100 million
    satoshis is 1 bitcoin), the smallest fraction of ether has been named wei in honor
    of Wei Dai (1 million million million wei, or 1 quintillion wei, is 1 ether).'
