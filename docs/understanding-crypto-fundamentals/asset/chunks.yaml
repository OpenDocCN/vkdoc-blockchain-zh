- fmt: '# Looking Forward


    Looking to the future, the promises of cryptoassets are manifold. First, the largest
    cryptoasset offers a solution to the long-term monetary debasement issue of the
    past century. Progressively moving toward a Bitcoin standard will restore the
    position of a hard asset at the heart of the economy and induce governments to
    live within their means, like everybody else. Monetary authorities will no longer
    be able to infinitely extend how many resources they have available at the expense
    of all users of the currency. However, the transition will likely neither be sudden
    nor complete. The new digital money will rather coexist with fiat ecosystems.
    It will likely become a complementary currency on a global scale, a concept that
    has been praised for decades for its expected stabilizing impact on economies.


    Second, the carbon footprint outlook of this solution is promising. Specifically,
    incentives for Bitcoin mining are to use stranded energy that would otherwise
    be lost rather than consuming electricity from the grid where and when it is most
    needed. As a result, mining farms often operate next to renewable sources such
    as hydropower or geothermal energy plants, utilizing excess energy produced by
    the plant when demand is low. Bitcoin mining operations support grid flexibility
    and demand response, as they can adjust their energy consumption based on grid
    conditions and electricity prices. This not only leads to more efficient use of
    energy resources but also helps stabilize power grids, especially in regions with
    high shares of intermittent renewable energy. The Bitcoin mining industry thus
    provides incentives for financing renewable infrastructure by making the expected
    output of renewable power plants more stable.


    Consequently, Bitcoin mining already uses predominantly renewable energy (in a
    much higher proportion than any country in the world) and is trending toward even
    greater sustainability. Additionally, new developments enable Bitcoin miners to
    capture flared methane and other unwanted byproducts of currently polluting processes
    such as oil drilling, reducing the detrimental results of these processes and
    contributing positively to the environment. Therefore, if not already the case,
    Bitcoin mining will soon become a carbon-negative industry.


    Third, cryptoassets are automating the entire financial industry and reducing
    counterparty risks by decentralizing its processes. Not only finance but also
    most other industries are affected. A whole new world of privacy and data security
    is made possible virtually everywhere, as information, data, and transactions
    can be exchanged with the minimum amount of information technically required through
    zero-knowledge proofs.


    In just over a decade, a new asset class was born and grew to over $2 trillion
    despite many governments persisting in undermining its growth and institutional
    investors mainly staying away from it. In the early 2020s, multiple milestones
    were passed as the new reality started to settle. Governments are now trying to
    understand and work with cryptoassets; many institutions are either joining the
    game or eager to be allowed to, and retail adoption accelerates.


    Furthermore, Bitcoin is becoming the legal tender currency for emerging economies.
    Talents in the tech and financial industries are leaving the traditional systems
    to build exciting new use cases with cryptoassets. Awareness of the need for privacy
    reaches an all-time high. Decentralization takes off as increasingly more activity
    happens directly on-chain. Capital flows to crypto projects at an astonishing
    speed. Web 3.0 start-ups are seizing the Internet to make it decentralized. The
    world of DeFi is becoming usable for the masses. Fiscal and regulatory uncertainty
    is dropping as legislation is passed to accommodate the unique nature of cryptoassets,
    giving confidence to investors that they are acting within their mandate. Also,
    scaling technologies are finally around the corner for both Bitcoin and altcoins.


    These developments indicate that the horizon for cryptoasset investors has never
    been brighter. Specifically, the potential reward compared to the level of risk
    has never been so attractive. Cryptoassets are an asymmetric trade with probabilities
    shifting in the right direction: the risk of losing capital decreases as the asset
    class is accepted as here to stay, and the potential for further exceptional upside
    is increasingly likely. It is not to say that risks do not exist. On the contrary,
    one focus of this book was to highlight that many risks remain, some of which
    are considerable. Proper research and risk mitigation techniques are still essential
    for cryptoasset investors. Nevertheless, these risks can be managed and seem reasonable
    compared to the diversification benefits and long-term upside potential of the
    industry. How cryptoassets will evolve exactly is still unknown, but their pivotal
    role in reshaping the economy is inevitable.


    As a burgeoning asset class, cryptoassets will continue to evolve, and so must
    our understanding and approach to valuing and investing in them. As seen time
    and again, those who are well-informed and adaptable will be the ones who thrive
    in this new era of decentralized finance and digital assets.


    `Blockchain` has become much more than just a new technology. It has transformed
    into a social ideology that empowers individuals, removes the need for trust in
    intermediaries, and promotes a secure and transparent digital future. `Blockchain`
    is becoming as transformational for society as steam, electricity, and the Internet
    have been in the past. It is a trigger for the fourth industrial revolution of
    humanity, a revolution that is still in its early days but has already started.


    Footnotes [1](#600732_1_En_17_Chapter.xhtml#Fn1_source)


    # Part VII Appendices


    # Precursors of Cryptoassets


    Despite being sometimes presented as such, Bitcoin did not emerge in isolation.
    The first cryptoasset had many precursors that either tried to accomplish the
    same goal or developed similar technology for other purposes. None of them achieved
    mainstream adoption like Bitcoin, but they directly influenced how cryptoassets
    developed, even beyond Bitcoin’s conception.


    This chapter illustrates how today’s cryptoassets are the result of four decades
    of innovation and development. As such, they result from many trials, errors,
    and improvements that paved the way for their ultimate success. Moreover, they
    are a recurring theme for tried innovations in that space because a global digital
    money independent from third parties is the logical progression in the evolution
    of the monetary system in a digital age, where self-sovereignty and privacy are
    becoming increasingly important. This evolution will redefine societies and prove
    as crucial for developing economies as double-entry accounting has been over the
    last five centuries.'
