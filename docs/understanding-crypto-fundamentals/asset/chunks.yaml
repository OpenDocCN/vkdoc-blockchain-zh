    | | | | 2013 年 12 月 4 日 | 1,237.60 | 101.4 倍 |

    | 周期 2 | 2015 年 1 月 14 日 | | | 178.10 | –86% |

    | | | 2016 年 7 月 9 日 | | 650.96 | 3.7 倍 |

    | | | | 2017 年 12 月 16 日 | 19,497.40 | 30.0 倍 |

    | 周期 3 | 2018 年 12 月 15 日 | | | 3,236.76 | –83% |

