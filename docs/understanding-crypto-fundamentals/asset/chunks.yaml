    ## Simple Analysis of Return for Investors


    While the preceding analysis favors cryptoassets, another more intuitive approach
    simplifies the case even further. While high volatility is, per se, undesirable,
    it is not a major concern for long-term investors. Indeed, if I invest for a four-year
    horizon and my investment is multiplied by ten or more, I do not care much about
    what volatility it experienced over this period. Such a return would be an order
    of magnitude larger than what I could expect from any traditional investment.
    The only values that are truly important for many investors are the entry price
    and the exit price.


    An example makes it more tangible. If I entered a long position (bought) in Bitcoin
    in May 2017, I would buy one bitcoin at its all-time high (at the time) for $2,000
    a piece (i.e., the first time bitcoin passed this milestone). If I had sold it
    four years later, in May 2021, for $50,000, I would have made a substantial return.
    In particular, I would have multiplied my investment 25 times (i.e., a 2400% return
    over four years), corresponding to a 124% CAGR. Does it matter that the price
    went wildly up and down over this period? I could have bought it cheaper in July
    2017 and sold it for over $64,000 in April 2021, making even bigger gains in an
    even shorter period. Indeed, a part of the opportunity is lost, but my annual
    return is still many times higher than what I would have earned on the stock market^(49)
    or with bonds^(50). Volatility is only a second-order concern in such a case.'
