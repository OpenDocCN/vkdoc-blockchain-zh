- fmt: '# Seed Phrases


    The *seed phrase*, also known as *seed words*, *recovery phrase*, or *mnemonic
    phrase*, is a list of random words (typically 12 or 24 simple words) written in
    a specific order. They are given as input in a mnemonic phrase converter, which
    is an algorithm that converts them into a private key for a specific cryptoasset,
    as shown in Figure [11-7](#600732_1_En_11_Chapter.xhtml#Fig7).^(94) Each blockchain
    has a specific format for its private keys, such as the character it starts with
    or the number of bytes with which it is written. Therefore, sending bitcoins to
    an Ethereum address, for example, will either not work or the funds will be lost
    forever.


    A seed phrase may look like the following 24-word list.


    1. bless

    2. sun

    3. moral

    4. farm

    5. saddle

    6. good

    7. live

    8. sphere

    9. figure

    10. year

    11. romance

    12. purpose

    13. glad

    14. satoshi

    15. point

    16. novel

    17. dolphin

    18. salad

    19. panel

    20. rich

    21. honey

    22. board

    23. success

    24. swap


    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig6_HTML.jpg)


    A photograph of a rectangular aluminum case with space for 24 entries in 2 columns.
    An engraving pen and anti-tamper seals are next to it.


    Figure 11-6


    Aluminum case designed for 24-word seed phrase recovery with engraving pen and
    anti-tamper seals. The case is fireproof, waterproof, shockproof, and corrosion-resistant.
    It is a type of paper (cold) wallet (in this case, not made of paper)


    The Bitcoin community agreed on an official list of 2048 (i.e., 2^11) words as
    the base for Bitcoin private keys to ease their storage. A similar list also exists
    in languages other than English. A set of rules make the words simple and unmistakable.
    For example, the list does not include words with multiple spellings or words
    existing in other languages’ corresponding lists. Also, no two words start with
    the same first four letters, so knowing the first four letters of each (12 or
    24) seed word is enough to recover one’s private key. In addition, the final word
    is a checksum dependent on all other words to ensure the validity of the seed
    phrase. Each word is also linked to a number of the 2048-word list, so knowing
    one’s list of (12 or 24) numbers (and the list selected, i.e., language) is an
    alternative to knowing one’s seed words. For this reason, some hardware wallets
    simply list numbers corresponding to the seed words that can reinstate the user’s
    private key.


    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig7_HTML.jpg)


    A screenshot presents the settings to generate a mnemonic. Auto compute option
    to generate a random mnemonic is selected. The text boxes are for, BIP39 mnemonic,
    BIP39 passphrase, BIP39 seed, coin, and BIP32 root key.


    Figure 11-7


    Bitcoin mnemonics, seed phrases, and private keys generator. (Source: [*https://iancoleman.io/bip39/*](https://iancoleman.io/bip39/))


    # Additional Wallet Features


    Another possible feature in blockchain wallets is a master public key, which provides
    access to all public keys in a wallet but without access to their corresponding
    private keys. Holders of the master public key see the balance of all addresses
    in a wallet but cannot move the corresponding assets. It is useful, for example,
    for accounting and audit, as one can share the master public key with auditors
    without risks to one’s funds, just to one’s privacy.


    A MultiSig wallet is another useful security feature. It requires multiple signatures
    from different private keys to submit a transaction. It is a form of two-factor
    authentication, like a locker with multiple locks and keys held by different people.
    Each person needs the others’ approval to open the locker. For example, the crypto
    wallet of a company could require all board members to sign a transaction before
    submitting it. Alternatively, several but not all signatures can be required,
    such as three out of five. MultiSig wallets have a higher level of security since
    different private keys reside in different locations, thereby avoiding a single
    point of failure.


    # Bitcoin Core


    One specific wallet type deserves a dedicated mention. In 2009, Satoshi Nakamoto
    released the first crypto wallet, Bitcoin-Qt, as open source code. Now known as
    Bitcoin Core (or Satoshi Client), it is the “official” code of the Bitcoin network,
    maintained, developed, and promoted by the Bitcoin Foundation. Essentially, Bitcoin
    Core is a desktop wallet that is also a *full Bitcoin client*, or *full node*.


    A full node downloads the entire Bitcoin blockchain^(95) on one’s computer and
    permanently synchronizes it with the rest of the network. Thereby, it helps the
    network to increase its decentralization. However, having a full Bitcoin client
    is unnecessary to run a Bitcoin node. Unlike a full node, a *thin client* (or
    *lightweight* client or *simple-payment-verification* client) downloads only the
    last few blocks from the blockchain. The more blocks it downloads (the *deeper*
    the client), the more trustworthy the client. Full nodes and thin clients are
    a tradeoff between storage space and trust in the integrity of the underlying
    blockchain.


    Furthermore, Bitcoin Core has multiple levels of security and is continuously
    improved by the Bitcoin Foundation to keep its safety at a state-of-the-art level.


    # Wallet Safety


    It is paramount for the security of one’s funds to ensure that the wallet provider
    is trustworthy. Several resources help to choose wallets carefully. For example,
    the not-for-profit website Bitcoin.org provides a list of trustworthy Bitcoin
    wallets, filterable by essential and desirable features (e.g., hardware wallets,
    MultiSig wallets).^(96) In addition, countless other online resources list the
    pros and cons of other cryptoasset wallets.


    # Storing Private Keys Safely


    Another essential safety measure for the self-custody of cryptoassets is storing
    one’s private key wisely and reliably. On the one hand, you may be tempted to
    keep multiple copies of your private key to minimize the risk of loss (which would
    imply losing all your funds). However, on the other hand, the more copies you
    keep, the higher the risk that one of them is stolen (which would also imply losing
    all of your funds).


    One way to mitigate this dilemma is through sharding. Instead of keeping the entire
    private key in one piece, you could split (or “shard”) it into two (or more) pieces.
    This way, should anybody steal one shard of your private key, your funds are still
    not at risk. The thief would need all shards to reconstruct the private key and
    get access to your funds.


    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig8_HTML.png)


    Lines of text present the following. A private key consisting of characters and
    numbers is on the top. The private key, which is divided into private key''s shard
    1 and private key''s shard 2, is at the bottom.


    Figure 11-8


    Splitting a private key into two shards


    For example, you could have three copies of each of the two shards, locked or
    hidden at six different locations (one location for each copy of each shard).
    This way, neither the theft nor the loss of any single copy would put your funds
    at risk.


    Of course, you could do the same with your seed words instead of the raw private
    key. Alternatively, or on top of this approach, you could also choose to memorize
    a part of your key or seed words to protect them from theft.


    ![](images/600732_1_En_11_Chapter/600732_1_En_11_Fig9_HTML.png)


    A chart presents copies of shards in multiple locations. Shard 1 is in locations
    1, 3, and 5. Shard 2 is in locations 2, 4, and 6.


    Figure 11-9


    Spreading copies of shards in multiple locations mitigates both the risk of theft
    and the risk of loss of one’s private key'
