  trans: '

    ## “51% 攻击”风险


    比特币白皮书的摘要为其区块链的运行设定了一个重要前提 [21]。


    > 只要大部分算力由不相互勾结攻击网络的节点控制，它们就能生成最长的链并超越攻击者。


    这个“只要”条件所指的正是通常所说的 *51% 攻击* 或 *双花攻击*。根据设计，在工作量证明（PoW）区块链中，如果大多数节点（按算力计）使用一条未包含某笔特定交易的区块链，那么这笔交易在官方记录上就从未发生过。此外，除非网络其余部分决定从主链进行硬分叉（正如
    The DAO 事件后以太坊所遭遇的情况，详见第 6 章），否则没有任何补救措施。


    从技术上讲，51% 攻击的风险是指，在 PoW 共识机制下，一个矿工群体控制了大部分哈希算力。这个群体验证欺诈区块的速度可能比诚实节点挖掘有效区块的速度更快。其结果是，这些欺诈区块可以，例如，排除一笔发送方已经获得收益的交易。发送方将能够再次花费这笔金额，这也正是这种欺诈行为得名“*双花*
    攻击”的原因。


    然而，就比特币区块链而言，发生 51% 攻击的可能性可以说是不存在的。实际上，网络的安全性与哈希率直接成正比。哈希率越高，攻击者需要聚集的算力就越多，才能在区块创建上超越诚实节点。更高的哈希率意味着更高的安全性。但是，比特币区块链的哈希率非常高，以至于某个联盟聚集全网
    51% 算力的概率几乎为零。即使所有大型科技公司将其全球算力联合起来，并协调一致专门用于攻击比特币区块链，它们仍然无法接近全球比特币哈希率的 51%。例如，“AWS、Azure
    和 Google Cloud 的总算力加起来还不到比特币算力的 1%”（截至 2022 年底）[44]。


    比特币网络的安全性比所有其他 PoW 区块链的总和高出 100 倍以上。因此，投资者可能会得出结论，虽然比特币区块链是安全的，但这种风险对于较小的 PoW
    区块链仍然存在。然而，即便对于这些较小的链，发生 51% 攻击的可能性也很低。这要归因于区块链挖矿过程固有的激励机制：任何潜在的攻击者都几乎没有动机采取欺诈行为，而根据区块链的运行方式，参与节点有强烈的动机诚实行事。所涉及的加密资产规模越大，节点诚实行动的动机就越强，网络的安全性也就越高。无论其规模大小，PoW
    区块链对潜在攻击者来说总是缺乏吸引力的：攻击链的成本高于潜在收益。这种共识机制使得作恶成为一种无效策略，这意味着即使是敌对者也遵守相同的规则，因为这样做显然符合他们的利益。


    尽管如此，过去确实发生过某种形式的 51% 攻击。例如，在 2018 年 4 月，Verge（XVG）区块链在黑客发现代码中的一个错误后遭受了 51% 攻击，该错误使他能够以比预期快得多的速度挖掘区块。然而，请注意，这次攻击的根本原因是代码错误，而非激励不当。此外，对于更成熟的加密资产，安全专家已经多次审查和测试了相应区块链的代码。事实上，任何人都可以随时进行此操作，因为这些区块链的代码是开源的，任何人都可以查看和审查。因此，大型加密资产中存在重大漏洞的问题很可能早已被发现。


    51% 攻击风险不仅极不可能发生，而且本身也并非实质性风险。一个常见的误解是，51% 攻击会让黑客将资金从任何地址发送给自己。这是不正确的。即使黑客成功获得了区块链上的绝大多数哈希算力，他仍然需要地址所有者的数字签名才能将资金转移给自己。因此，即使发生这种情况，他攻击区块链的能力仍然有限。


    黑客唯一能做的事情是撤销他自己发起的一笔交易。例如，他可以用这些币购买有形或数字商品，然后挖掘排除这笔交易的后续区块。根据区块链的记录，他仍然拥有这些资金，并且能够再次花费它们。然而，在多次发生此类交易之前，相关区块链失去完整性的情况就会变得显而易见。因此，其他用户很可能会在攻击发生前对其进行硬分叉。


    总而言之，尽管 51% 攻击在社区和理论讨论中经常被提及，但它实际上几乎是无害的，并且其发生的可能性几乎为零。

    '
- fmt: '# Quantum Computing


    Another risk that is often mentioned for cryptoassets but that is actually not
    substantial is the threat coming from the emergence of quantum computing.


    Over the past 70 years or so, computing power has increased exponentially while
    computers shrunk in size at the same time. This process is driven by the continuous
    reduction of transistors’ dimensions in a computer chip. Transistors are simply
    gates enabling a bit to change from 0 to 1 or inversely. However, we are now approaching
    the physical limits of this reduction process, as the size of transistors (ca.
    5 nm) is nearing the size of a few atoms. In comparison, a red blood cell is about
    1000 times larger than today’s typical transistor.


    Due to the nanoscopic size of transistors, particles could move through a blocked
    gate via quantum tunneling. Specifically, as the probability waves associated
    with the particles can extend beyond the barrier, there is a non-zero probability
    that the particle will be found on the other side. A theoretically blocked gate
    (a bit set on 0) would not be effectively blocked (it would act like a 1). Unfortunately,
    this possibility limits the power of traditional computers. To circumvent this
    issue, scientists are working on engineering quantum computers.


    In quantum computing, instead of having the smallest bit of information taking
    a value of either 0 or 1, values can range anywhere between these two extremes.
    A quantum bit is in a state of either 0 or 1, with a certain probability changing
    over time. When measured, however, the quantum bit subsides to either 0 or 1,
    as in traditional computers. One consequence of quantum computers is that fewer
    bits are required to produce a similar output, enabling computing to be exponentially
    more efficient than with traditional computers.


    Especially for large sets of information, quantum computing requires much less
    computing power and time to reach a similar output. For example, Google claims
    that its `Sycamore` processor (its attempt at building a quantum computer) takes
    about 200 seconds to perform a specific task that would require about 10,000 years
    for a classical supercomputer [45]. One crucial area of application of this property
    is IT security. By extension, quantum computers challenge traditional cryptographic
    security in most cryptoassets.


    In particular, while it is currently impractical, or rather next to impossible,
    to guess a private key based on a public address, quantum computers could make
    it possible, at least in theory. A quantum computer could use the brute force
    method to guess many possible private keys until breaking the one that enables
    to move cryptoassets on a blockchain.


    Nevertheless, it would still not be straightforward. For the Bitcoin network,
    for example, getting the private key from the public address is especially difficult
    because it uses multiple cryptographic algorithms. As a reminder, the public address
    is a function of the public key, and the public key is a function of the private
    key. Figure [11-1](#600732_1_En_11_Chapter.xhtml) illustrates this. In particular,
    an Elliptic Curve Digital Signature Algorithm (`ECDSA`) defines a public key from
    any private key on the Bitcoin network. Next, the two hashing algorithms, `SHA-256`
    and `RIPEMD160`, define a public address from a public key. `ECDSA` is likely
    the first algorithm that quantum computers will crack, while the ulterior algorithms
    require more advancements. Quantum computers might be able to break the system
    by identifying a private key from a public key because the only cryptographic
    algorithm necessary to break is `ECDSA`.


    However, it is easily possible to protect oneself against the risk of quantum
    computers reverse-engineering the `ECDSA` for a specific public key. The public
    key is made public when a user digitally signs a transaction. A highly risk-aware
    user (e.g., the main account of a large crypto exchange or institutional fund)
    could use one account to transfer all funds to a new address. As the new address
    would never have published its public key, the corresponding private key would
    be safe even in the theoretical presence of quantum computers able to break `ECDSA`.


    Another solution to protect against that risk is to use hierarchical deterministic
    (`HD`) wallets.^([^(97)](#fn97)) `HD` wallets create a new public-private key
    pair based on a seed phrase for each transaction. Using `HD` wallets enables users
    to have multiple IDs on the same blockchain. As before, even if quantum computers
    managed to break the algorithm, the user’s assets would still be safe.


    In addition, this risk will not be relevant any time soon. At best, such a scenario
    is decades away. Furthermore, even if quantum computers ever become feasible,
    they will not become broadly available at once. Instead, there will be a transition
    period. During this period, cryptoasset communities would undoubtedly work to
    change the cryptographic algorithms to become quantum resistant. Quantum resistance
    is, for example, already identified as one step in the existing development roadmap
    of Ethereum. Therefore, this entire risk would be made irrelevant as quantum computers
    could not break the new cryptographic algorithms.


    Nevertheless, a smaller related risk remains for the network. By changing the
    cryptographic algorithm to a quantum-resistant one, all active wallets update
    to a new standard, implying a different method to sign transactions and possibly
    different key pairs. Any active users download the new code and continue business
    unbothered, now safe from quantum risk. However, all wallets with lost private
    keys do not update to the new algorithm. Therefore, if quantum computers break
    the cryptographic algorithms protecting private keys, non-updated wallets could
    be hacked. The consequence is that lost coins would suddenly become retrievable.
    Nevertheless, the consequences are not drastic: they only imply that the effective
    supply of the cryptoasset would increase by the amount of the retrieved coins.
    No active wallet would be compromised.


    In conclusion, risks coming from the emergence of quantum computers are unlikely,
    far in the future, and can easily be mitigated.'
  raw: '## Quantum Computing


    Another risk that is often mentioned for cryptoassets but that is actually not
    substantial is the threat coming from the emergence of quantum computing.


    Over the past 70 years or so, computing power has increased exponentially while
    computers shrunk in size at the same time. This process is driven by the continuous
    reduction of transistors’ dimensions in a computer chip. Transistors are simply
    gates enabling a bit to change from 0 to 1 or inversely. However, we are now approaching
    the physical limits of this reduction process, as the size of transistors (ca.
    5 nm) is nearing the size of a few atoms. In comparison, a red blood cell is about
    1000 times larger than today’s typical transistor.


    Due to the nanoscopic size of transistors, particles could move through a blocked
    gate via quantum tunneling. Specifically, as the probability waves associated
    with the particles can extend beyond the barrier, there is a non-zero probability
    that the particle will be found on the other side. A theoretically blocked gate
    (a bit set on 0) would not be effectively blocked (it would act like a 1). Unfortunately,
    this possibility limits the power of traditional computers. To circumvent this
    issue, scientists are working on engineering quantum computers.


    In quantum computing, instead of having the smallest bit of information taking
    a value of either 0 or 1, values can range anywhere between these two extremes.
    A quantum bit is in a state of either 0 or 1, with a certain probability changing
    over time. When measured, however, the quantum bit subsides to either 0 or 1,
    as in traditional computers. One consequence of quantum computers is that fewer
    bits are required to produce a similar output, enabling computing to be exponentially
    more efficient than with traditional computers.


    Especially for large sets of information, quantum computing requires much less
    computing power and time to reach a similar output. For example, Google claims
    that its Sycamore processor (its attempt at building a quantum computer) takes
    about 200 seconds to perform a specific task that would require about 10,000 years
    for a classical supercomputer [45]. One crucial area of application of this property
    is IT security. By extension, quantum computers challenge traditional cryptographic
    security in most cryptoassets.


    In particular, while it is currently impractical, or rather next to impossible,
    to guess a private key based on a public address, quantum computers could make
    it possible, at least in theory. A quantum computer could use the brute force
    method to guess many possible private keys until breaking the one that enables
    to move cryptoassets on a blockchain.


    Nevertheless, it would still not be straightforward. For the Bitcoin network,
    for example, getting the private key from the public address is especially difficult
    because it uses multiple cryptographic algorithms. As a reminder, the public address
    is a function of the public key, and the public key is a function of the private
    key. Figure [11-1](#600732_1_En_11_Chapter.xhtml) illustrates this. In particular,
    an Elliptic Curve Digital Signature Algorithm (ECDSA) defines a public key from
    any private key on the Bitcoin network. Next, the two hashing algorithms, SHA-256
    and RIPEMD160, define a public address from a public key. ECDSA is likely the
    first algorithm that quantum computers will crack, while the ulterior algorithms
    require more advancements. Quantum computers might be able to break the system
    by identifying a private key from a public key because the only cryptographic
    algorithm necessary to break is ECDSA.


    However, it is easily possible to protect oneself against the risk of quantum
    computers reverse-engineering the ECDSA for a specific public key. The public
    key is made public when a user digitally signs a transaction. A highly risk-aware
    user (e.g., the main account of a large crypto exchange or institutional fund)
    could use one account to transfer all funds to a new address. As the new address
    would never have published its public key, the corresponding private key would
    be safe even in the theoretical presence of quantum computers able to break ECDSA.


    Another solution to protect against that risk is to use hierarchical deterministic
    (HD) wallets.^([^(97)](#fn97)) HD wallets create a new public-private key pair
    based on a seed phrase for each transaction. Using HD wallets enables users to
    have multiple IDs on the same blockchain. As before, even if quantum computers
    managed to break the algorithm, the user’s assets would still be safe.


    In addition, this risk will not be relevant any time soon. At best, such a scenario
    is decades away. Furthermore, even if quantum computers ever become feasible,
    they will not become broadly available at once. Instead, there will be a transition
    period. During this period, cryptoasset communities would undoubtedly work to
    change the cryptographic algorithms to become quantum resistant. Quantum resistance
    is, for example, already identified as one step in the existing development roadmap
    of Ethereum. Therefore, this entire risk would be made irrelevant as quantum computers
    could not break the new cryptographic algorithms.


    Nevertheless, a smaller related risk remains for the network. By changing the
    cryptographic algorithm to a quantum-resistant one, all active wallets update
    to a new standard, implying a different method to sign transactions and possibly
    different key pairs. Any active users download the new code and continue business
    unbothered, now safe from quantum risk. However, all wallets with lost private
    keys do not update to the new algorithm. Therefore, if quantum computers break
    the cryptographic algorithms protecting private keys, non-updated wallets could
    be hacked. The consequence is that lost coins would suddenly become retrievable.
    Nevertheless, the consequences are not drastic: they only imply that the effective
    supply of the cryptoasset would increase by the amount of the retrieved coins.
    No active wallet would be compromised.


    In conclusion, risks coming from the emergence of quantum computers are unlikely,
    far in the future, and can easily be mitigated.'
  trans: '

    # 量子计算


    另一个在加密资产领域经常被提及、但实际上并不严重的风险，是量子计算技术兴起所带来的威胁。


    在过去大约 70 年里，计算能力呈指数级增长，同时计算机的尺寸却在不断缩小。这一过程是由计算机芯片中晶体管尺寸的持续减小所驱动的。晶体管本质上是使比特位从
    0 变为 1（或相反）的门电路。然而，我们现在正接近这一缩减过程的物理极限，因为晶体管的尺寸（约 5 纳米）已接近几个原子的大小。相比之下，一个红血球细胞的大小约是当今典型晶体管的
    1000 倍。


    由于晶体管尺寸达到纳米级别，粒子可能通过量子隧穿效应穿过被阻断的栅极。具体来说，由于与粒子相关的概率波可以延伸到势垒之外，因此粒子出现在势垒另一侧的概率不为零。一个理论上被阻断的栅极（比特位设为
    0）将无法有效阻断（它会表现得像 1）。不幸的是，这种可能性限制了传统计算机的能力。为了规避这个问题，科学家们正在致力于研发量子计算机。


    在量子计算中，最小的信息单位（比特）不再只能取 0 或 1 的值，而是可以在两者之间的任意状态。一个量子比特处于 0 或 1 的叠加态，其概率会随时间变化。然而，当被测量时，量子比特会坍缩为
    0 或 1，与传统计算机一样。量子计算机的一个结果是，产生类似输出所需的比特数更少，从而使其计算效率比传统计算机呈指数级提升。


    尤其对于大规模信息集，量子计算机只需少得多的计算能力和时间就能达到类似的输出。例如，谷歌声称其 `Sycamore` 处理器（构建量子计算机的尝试）只需约
    200 秒就能完成一项特定任务，而经典超级计算机完成同样的任务则需要约 10,000 年[45]。这一特性的一个关键应用领域是 IT 安全。推而广之，量子计算机对大多数加密资产中传统的密码学安全构成了挑战。


    特别是，虽然目前根据一个公钥地址来猜测其对应的私钥是不切实际、或者近乎不可能的，但量子计算机至少理论上可能使其成为可能。量子计算机可以使用暴力破解方法来猜测大量可能的私钥，直至找到能解锁区块链上加密资产移动权的那个。


    尽管如此，这仍然不是一件轻而易举的事。以比特币网络为例，从公钥地址获取私钥尤其困难，因为它使用了多种密码学算法。提醒一下，公钥地址是公钥的函数，而公钥又是私钥的函数。图
    11-1 对此进行了说明。具体来说，椭圆曲线数字签名算法 (`ECDSA`) 根据比特币网络上的任何私钥定义出一个公钥。接下来，两种哈希算法 `SHA-256`
    和 `RIPEMD160` 根据公钥定义出一个公钥地址。`ECDSA` 可能是量子计算机最先破解的算法，而后续的算法则需要更先进的技术。量子计算机或许能够通过从公钥识别出私钥来破解系统，因为唯一需要破解的密码学算法就是
    `ECDSA`。


    然而，针对量子计算机为特定公钥地址逆向破解 `ECDSA` 的风险，用户可以轻松地保护自己。当用户对一笔交易进行数字签名时，公钥就会被公开。一个风险意识极强的用户（例如大型加密货币交易所或机构基金的主账户）可以使用一个账户将所有资金转移到一个新的地址。由于新地址从未公开过其公钥，即使在理论上存在能够破解
    `ECDSA` 的量子计算机，其对应的私钥也仍然是安全的。


    另一种抵御这一风险的解决方案是使用分层确定性 (`HD`) 钱包。^(⁹⁷) `HD` 钱包会基于一个种子短语为每笔交易生成一个新的公私钥对。使用 `HD`
    钱包可以使用户在同一条区块链上拥有多个身份标识。如前所述，即使量子计算机成功破解了算法，用户的资产也仍然是安全的。


    此外，这一风险短期内不会成为现实。这种情景最快也要几十年后才会出现。而且，即使量子计算机最终变得可行，它们也不会立刻广泛普及。相反，会有一个过渡期。在此期间，加密资产社区无疑会努力将密码学算法升级为抗量子算法。例如，抗量子能力已被确定为以太坊现有发展路线图中的一个步骤。因此，由于量子计算机无法破解新的密码学算法，整个这一风险将变得无关紧要。


    尽管如此，网络中仍然存在一个较小的相关风险。当将密码学算法更换为抗量子算法时，所有活跃的钱包都会更新到新的标准，这意味着签名交易的方法会有所不同，密钥对也可能改变。任何活跃用户都会下载新代码并继续正常操作，从此免受量子风险威胁。然而，所有丢失了私钥的钱包都不会更新到新算法。因此，如果量子计算机破解了保护私钥的密码学算法，那些未更新的钱包就可能被黑客攻击。其后果是，丢失的币会突然变得可以被找回。不过，这种后果并非灾难性的：它仅仅意味着该加密资产的有效供应量会增加与找回币数量相等的部分。没有任何活跃的钱包会受到损害。


    总之，来自量子计算机兴起的风险不太可能发生，距离还很遥远，并且很容易被缓解。

    '
- fmt: '# Governmental Risk


    One criticism regularly expressed toward cryptoassets is that governments would
    never let an alternative to their currency become too big. Indeed, an established,
    global, and independent currency such as `Bitcoin` would remove governments’ monopoly
    on money. Their control of money flows would fade away, and so would their ability
    to ban specific transactions from happening. It would be the end of governments’
    monetary hegemony.


    Even worse for governments, citizens could realize that `Bitcoin`, for example,
    offers a superior case for money (explained in Chapter [1](#600732_1_En_1_Chapter.xhtml)),
    as it is a provably scarce asset that will ultimately enable them to maintain
    purchasing power over time. They would notice that many of the desirable characteristics
    of money are missing from fiat currencies. Once this becomes obvious to many,
    citizens will shift their savings from the local fiat currency toward `Bitcoin`,
    and the value of the local fiat currency will drop as a result. Governments would
    likely want to avoid such a scenario and do everything they can to prevent it.
    For example, they could ban transacting in `Bitcoin` or even ban `Bitcoin` ownership.


    Such a ban, however, is unrealistic for at least three reasons. First, it ignores
    the incentives that it would create. Banning `Bitcoin` would strengthen `Bitcoin`’s
    value proposition. A `Bitcoin` ban would make the abusive governmental monopoly
    on money even more evident. More than ever, it would spotlight the need for people
    to look for an alternative to government-issued currencies.


    Second, such a ban is not applicable in practice. From a technological standpoint,
    `Bitcoin` is straightforward: it is a network broadcasting a small amount of data
    (typically 1 MB to 2 MB) every ten minutes to the rest of the network. As long
    as two computers are connected, the Internet survives, and the propagation of
    the `Bitcoin` blockchain can continue. It is difficult to imagine governments
    able to apply such a ban in practice when seeing how ineffective they have been
    at enforcing another ban: the war on drugs. Drugs going from production to end
    customers involve highly complex processes, much more complicated than `Bitcoin`
    mining. They start with significant upfront investments, specialized farming,
    a complex international supply chain, and even some marketing to create awareness
    of availability to end customers. Hindering any step of the process from happening
    would reduce the availability of drugs. Nevertheless, anybody can easily obtain
    drugs in any major city in the world. As governments have never been able to prevent
    drugs from reaching customers anywhere, it is delusional to imagine they would
    have any success in preventing `Bitcoin` from spreading.


    Major real-world `Bitcoin` ban cases have already happened in China. As early
    as December 2013, the Chinese central bank and several Chinese financial regulatory
    institutions jointly issued a statement preventing local commercial banks from
    handling `Bitcoin`-related transactions. After little success with this prohibition,
    further bans occurred in the country: ICOs in 2017 and `Bitcoin` mining in 2019.
    The Chinese government strengthened its stance on these bans in 2020 and reiterated
    it more firmly in 2021. This last reiteration occurred while two-thirds of worldwide
    `Bitcoin` mining power came from China.


    In addition, China made all cryptoasset transactions illegal, and all jobs for
    international crypto exchanges were subject to prosecution. As a result of this
    latest ban, `Bitcoin` mining in China halted for a few months, bringing the worldwide
    hash rate down 50%. With a lower hash rate, mining `Bitcoin` suddenly became much
    more profitable for remaining miners. As a result, many Chinese miners relocated
    to other countries, and many more miners joined the race elsewhere. `Bitcoin`’s
    hash rate was back to a new all-time high only a few months later. One year after
    the 2021 ban in China, the country was back to the number 2 spot worldwide for
    hash power generation, accounting for about 20% of the global hash rate. In other
    words, despite its best efforts, the Chinese authorities did not manage to prevent
    Chinese citizens and corporations from mining and holding `Bitcoin`. This example
    testifies that a `Bitcoin` ban is not applicable in practice.


    Governmental risk is, therefore, not likely to kill `Bitcoin` or cryptoassets.
    At best, it will delay adoption but not stop it. `Satoshi Nakamoto` was already
    discussing this issue on the original forum of the Cryptography Mailing List before
    `Bitcoin` was even launched. In the first week of the `Bitcoin` white paper’s
    publication, he argues against this risk based on peer-to-peer logic [20, p. 44].


    > *Governments are good at cutting off the heads of a centrally controlled network
    like Napster, but pure P2P networks like Gnutella and Tor seem to be holding their
    own.*


    Finally, it is also not in the interest of governments to ban `Bitcoin` because
    doing so would be a national strategic security mistake. In his MIT thesis “Softwar”
    (2023), US Air Force Major Jason Lowery provides a lucid account of the vital
    national strategic interest in stockpiling `Bitcoin` reserves and encourages `Bitcoin`
    adoption [46]. In the same way the military preserves freedom through armies,
    naval, air, and space forces, it is essential for governments to gather sufficient
    power in cyberspace to prevent potential enemies from inflicting physical costs
    or imposing any sort of limitations. `Bitcoin` has become the most secure way
    (by far) to store and exchange digital information. Through its globally leading
    open source PoW protocol, it imposes exceptionally high costs (via the necessary
    use of electricity) to any attacker willing to tamper with this information.


    It does so without resorting to nuclear threats accompanied by mutually assured
    destruction. Maintaining the ability to own and control valuable digital information
    should be at the forefront of the agenda of governments willing to maintain the
    freedom of people within their jurisdiction. In this sense, `Bitcoin` extends
    beyond its original monetary role and encompasses the function of national security
    tool to maintain the freedom to use and integrity of valuable digital information
    for individuals, corporations, and institutions.


    Therefore, as for the 51%-attack and quantum computing risks, the risk of governments
    banning cryptoassets is often mentioned in media and online communities but, upon
    further analysis, inconsequential.'
