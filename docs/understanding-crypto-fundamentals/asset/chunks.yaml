  trans: "\n# 国际监管格局\n\n迄今为止，国际监管机构也未能达成更大的共识。随着该行业必然增长的趋势日渐明确，它们努力确立对加密资产的立场，但主要成果仍是各自为政。例如，国际货币基金组织（IMF）的职责是“维护国际货币和金融体系的稳定”。然而，尽管它指出世界需要全球性、一致性、全面性和协调性的加密资产监管，却并未阐明此类监管应具体包含哪些内容。\n\
    \n国际清算银行（BIS）下属的巴塞尔银行监管委员会（Basel Committee on Banking Supervision）则定义了如何计量不同类别加密资产的风险。它还要求持有者彻底评估加密资产的潜在风险，并进行公开披露。然而，BIS\
    \ 目前尚未正式将加密资产分类为金融工具。\n\n最后，国际财务报告准则（IFRS）同样未就加密资产的分类提供明确答案。截至本文撰写时，它将判断权留给加密资产持有者，由其自行界定每项加密资产应归入哪个会计类别。关于加密资产如何落入每个可能的会计类别的深入分析，可参阅安永（Ernst\
    \ & Young）的《加密资产持有者的会计处理》报告[37]。\n\n尽管在加密资产分类上存在监管不确定性和分歧，但现有金融法规可以作如下解读：根据现行法规，一项加密资产若想不被定性为证券，就不能拥有可归属的实体，因此它必须真正去中心化。中本聪向我们展示了如何做到这一点：该资产的网络既不能有董事会，也不能有能够实质影响未来网络发展的创建者。一旦加密资产按预期运行，其创建者就应实际上消失，并放弃其持有的所有该资产（例如，将其发送至一个不可花费的地址）。因此，某些现有加密资产可能不再具有证券属性，但这需要其实际拥有者正式放弃对该资产网络的管理角色。\n\
    \n## 关键概念\n\n对加密资产进行分类，对于确定其可能受到的监管和税收方式，进而评估其价值与风险状况至关重要。\n\n然而，要创建一套明确的加密资产分类体系是不可能的，因为加密资产之间的界限模糊且变化迅速。因此，分类标准需要不断更新。我们应并行使用多种分类体系，根据资产的不同特征（如其形式、功能或其在加密生态系统中的位置）进行划分。\n\
    \n一种未来可能成为行业标准的新兴分类体系是 CoinDesk Indices 推出的 DACS。它基于客观透明的标准，对主要加密资产进行定期更新的分类。\n\
    \n截至 2023 年，全球尚未就哪些加密资产属于证券或是否属于证券达成一致，针对这一新资产类别的监管规则也仍在制定中。\n\n## 扩展问题\n\n本章介绍的每种分类体系各有哪些优缺点？\n\
    \n加密资产的哪些子类别会长期存在，哪些会消失？\n\n以太坊（Ethereum）是一种证券吗？\n\n脚注 1 2 3 4 5 6\n\n# 8. 加密资产的投资类型\n\
    \n> *如果你找不到睡觉时也能赚钱的方法，你就会工作到死。*\n> \n> ——沃伦·巴菲特\n\n对于任何投资而言，低价买入、高价卖出是收益的一种形式，即资本利得。然而，这往往并非从投资中获利的唯一途径。股权投资（股票）通常还能通过股息带来回报。固定收益投资（债券）主要通过利息带来回报。房地产投资则可通过租金带来回报。\n\
    \n同样，加密资产也提供了其他投资回报来源。本章将探讨这些来源。但在探讨之前，本章将先研究投资加密资产的不同方式，从区块链上的纯投资，到通过对加密资产有风险敞口的公司以及加密资产投资工具进行的间接投资。\n\
    \n## 加密资产的直接与间接投资\n\n从加密资产中获利最直接的方式就是直接买卖它们。这种买卖被称为*现货交易*，因为资产几乎是立即交割的（即期）。例如，如果你在\
    \ 2020 年 3 月以 5,800 美元的市场价格买入一枚比特币，并在 2021 年 3 月以 58,000 美元的市场价格卖出，那么你一年内就获得了+900%的回报，即增长了\
    \ 10 倍。反之，大幅下跌也是可能的。例如，如果你继续持有该资产 18 个月，那么相比 2021 年 3 月的价格，你会损失 66%，因为它在 2022\
    \ 年 10 月的交易价格仅为 20,000 美元。此类投资可以在中心化交易所（例如 Binance、KuCoin、Coinbase）或去中心化交易所（例如\
    \ dYdX、Uniswap、ApolloX）进行。\n\n然而，监管规定或投资者的授权要求可能会限制对加密资产的直接投资。对于面临此类限制的投资者而言，幸运的是，仍存在其他选择，可以通过间接投资来获得对加密资产的风险敞口。\n"
- fmt: '### Exchange-Traded Funds (ETFs)


    An exchange-traded fund, or `ETF`, is an investment vehicle tracking the performance
    of an asset or a group of assets. `ETF`s offer several benefits to investors compared
    to direct investments in the underlying asset. First, they offer portfolio diversification.
    By buying an `ETF` of an index, the investor obtains exposure to all underlying
    assets without needing to buy each asset separately. Second, `ETF`s are typically
    highly liquid. They can be bought and sold at a fair market price and in sizable
    amounts. Third, they do not require users to familiarize themselves with cryptoasset
    wallets. However, purchasing `ETF`s may be more expensive than directly buying
    the underlying instrument because `ETF`s charge an annual fee (e.g., 0.8% of the
    invested amount).


    `ETF`s for the main cryptoassets are increasingly available in many countries,
    both spot `ETF`s and futures `ETF`s. A spot `ETF` simply tracks the value of the
    underlying cryptoasset. If Bitcoin’s price goes up, then Bitcoin spot `ETF`s go
    up in the same proportion.


    A futures `ETF` tracks the value of a “futures” of the underlying cryptoasset.
    A “futures” is a financial product where two parties agree that one party will
    buy an agreed-upon amount of an asset at a specific date for an agreed price,
    regardless of what the actual price of the asset is on that date. For example,
    Alice and Bob enter a Bitcoin futures, where Alice will buy two bitcoins from
    Bob for $50,000 each on December 31. Even if Bitcoin’s price is below $50,000
    on December 31, Alice must still buy two bitcoins from Bob at $50,000 each. And
    even if Bitcoin’s price is above $50,000, Bob must still sell the two bitcoins
    for $50,000 each. Futures provide certainty about a future purchase or sale price.
    A Bitcoin futures `ETF` tracks the value at which Bitcoin futures trade on the
    open market.


    As of May 2023, countries offering spot Bitcoin `ETF`s include Australia, Brazil,
    Canada, the Netherlands, and Singapore. In addition, spot ether `ETF`s are also
    available in multiple countries. The notable exception for spot `ETF`s of any
    cryptoasset is the United States. In particular, the Securities Exchange Commission
    (`SEC`) in the United States has rejected all spot Bitcoin `ETF`s applications
    for questionable reasons, which are being appealed in front of courts of justice.


    Futures `ETF`s, however, are more broadly available. In particular, the first
    Bitcoin futures `ETF` has been available in the United States since October 19,
    2021. As of this writing, six Bitcoin futures `ETF`s are approved for trading
    in the United States, and 25 more are awaiting approval. Similarly, many other
    countries offer Bitcoin and ether futures `ETF`s.


    ### Companies Using Blockchain


    Besides `ETF`s, another indirect exposure to cryptoassets is possible by investing
    in companies currently using blockchain technology or developing new use cases
    for blockchain technologies. Contrary to investing in cryptoassets directly, such
    indirect investments are standard (similar to investing in any company) and do
    not require unusual reporting or regulatory measures that would be specific to
    cryptoassets.


    ### Companies with Cryptoassets on Their Balance Sheet


    Similarly, one can invest in companies with large amounts of cryptoassets on their
    balance sheet. For example, the publicly traded business intelligence company
    `MicroStrategy` held 130,000 bitcoins at the beginning of 2023, worth over $3
    billion or roughly the company’s entire market capitalization. As a result, the
    company’s stock price reflects the evolution of Bitcoin’s price very closely (coefficient
    of correlation over 2020–2022: 93%), as shown in Figure 8-1.


    ![A dual-axis line graph of Bitcoin price in USD millions and MSTR stock price
    from January 2020 to January 2023. The lines with high fluctuations increase and
    then decrease. Bitcoin is above MicroStrategy.](images/600732_1_En_8_Chapter/600732_1_En_8_Fig1_HTML.jpg)


    **Figure 8-1** Bitcoin price (left axis) vs. `MicroStrategy` Incorporated (`NASDAQ`:
    `MSTR`) stock price (right axis) in `USD` from January 2020 to January 2023


    Other publicly tradable companies also hold bitcoins, though in much smaller proportions
    than `MicroStrategy`. They include `Tesla` (`TSLA`), `Galaxy Digital Holding`
    (`BRPHF`), and `Block` (previously known as `Square`, `SQ`). While buying shares
    of these companies may provide some indirect exposure to Bitcoin, this exposure
    is far from perfect. In particular, if Bitcoin’s price is multiplied by ten in
    the coming couple of years, the value of these companies may increase, but they
    are unlikely to see similar 10x valuations.


    ### Companies Providing Crypto Services


    Companies mining cryptoassets or providing other crypto services are another indirect
    (and imperfect) investment in cryptoassets. For example, `Marathon Digital Holdings`
    (`MARA`) is a major Bitcoin mining company holding close to 12,000 Bitcoin at
    the end of 2022 and aiming “to build the largest mining operation in North America,”
    with some 69,000 `ASIC` miners. Mining and `ASIC`s are explained in the next section.


    Cryptoasset exchanges are another possibility. For example, `Coinbase` is among
    the most prominent public cryptoexchange in the United States and the first publicly
    traded one. It also holds a substantial number of bitcoins on its balance sheet
    (9,000 in 2022), so the exposure is dual: through its operations and Bitcoin’s
    price fluctuations.'
