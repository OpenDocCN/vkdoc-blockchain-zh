    # 比特币周期反弹


    从图 9-4 中可以识别的另一件事是，减半后的反弹幅度远大于减半前的反弹幅度。特别是，在三个实例中，从减半事件到峰值日期期间，价格分别上涨了 101 倍（+10,044%）、30
    倍和 8 倍。相比之下，从底部到减半事件期间的价格“仅”上涨了 6 倍、3.7 倍和 2.7 倍，如表 9-2 所示。


    **表 9-2** 历史周期的关键比特币价格日期，包含美元价格及相对于前一个里程碑的变化


    | | 底部 | 减半 | 峰值 | 价格 | 变化 |

