    \ them.\n\nNon-financial risks are high in cryptoassets because the industry is\
    \ still maturing and rapidly changing. Also, the short span of historical data\
    \ points does not enable assessing all risks the industry faces. Even these data\
    \ points are in many respects of limited value, as the industry in the last cycle\
    \ was materially different from its state in the current cycle, making older data\
    \ of little relevance.\n\nLet us start with risks that are often mentioned but\
    \ do not represent any material threat."
  trans: '

    ### 框架偏差


    人们往往会根据信息的呈现方式产生偏见，即使底层信息完全相同。例如，投资者可能会根据他们使用的分类标准或可选择的投资方案数量做出不同的决策。假设你有 10 万美元可用于投资，并筛选出十个高关注度的加密资产，你可能会倾向于平均分配投资组合，即每个资产投入
    1 万美元。然而，更合理的做法可能是将超过 50%的资金投入某一资产，其中七个资产的占比低于 1%，其余资金分配给最后两个资产。虽然理性上不应对所有选项平均分配资金，但许多投资者为了简化操作而这样做，从而忽视了投资机会的相对规模。这一点在比特币上尤为突出，其市值几乎相当于所有其他加密资产的总和。具体来说，比特币不应被视作众多加密资产中的普通一员，而应被视为一个与其他任何加密资产截然不同的特殊案例。


    ### 从众行为偏差


    从众行为指的是投资者倾向于追随他人的意见或行动，即使这些意见与自身观点不符。人们会因害怕错过机会以及媒体对资产上涨时大肆宣扬其优势、下跌时渲染其崩盘的广泛报道，而陷入从众行为（也称为*动量效应*）。因此，从众行为会强化市场周期，并可能导致市场泡沫，因为许多投资者会追随趋势，远远超出基本面所支撑的合理范围。


    为了降低受从众行为偏差影响的可能性，投资者应进行独立分析，并坚持自己的投资策略，不受短期市场波动干扰。


    ### 预测过度自信偏差


    另一种偏差是预测过度自信。具体而言，投资者往往会高估未来价格预测的准确性。金融模型放大了这种偏差，因为它们通常会给出证券未来价格的一个精确数值（例如 123,456.78
    美元）。相比之下，考虑到未来的不确定性，假设一个宽泛的价格范围才更为合理。这种偏差也与知识幻觉相关，表明分析师通常会高估自身能力及其分析质量。


    ### 规模偏差与 ESG 偏差


    另一种投资偏差源于大型投资机构的授权限制。例如，某投资机构希望将 10 亿美元资本平均分配至不超过 20 个投资项目。根据其授权，该机构可能还要求在每个项目中持股不超过
    10%，以避免获得控股权。每个入选项目将获得 5000 万美元投资，但其市值必须至少达到 5 亿美元才能被考虑。截至本文撰写时，不到 100 种加密资产能达到这一最低市值门槛。当有足够多的机构受到类似限制时，高价值加密资产将获得更多投资，而低价值资产则面临投资不足。在其他条件相同的情况下，小型项目常常被低估，仅仅因为大型投资机构不愿对其进行投资。


    另一种基于投资机构授权的偏差与投资目标的企业责任或环境、社会和治理（ESG）实践相关。具体而言，寻找符合特定企业责任标准的投资标的的压力日益增大，这可能导致其他在财务上具有吸引力的投资资金不足。例如，大型投资者可能被授权限制，只能投资于不基于工作量证明机制的加密资产，因为有人认为此类机制对环境有净负面影响。并非基本面缺失，而是大型投资者授权中的任意限制，导致了这些标的市场价格的下行偏差。


    ## 关键概念


    选择最优投资取决于多项标准。其中包括投资者的风险偏好、投资期限、流动性需求、税务状况和法律考量。没有一种投资或策略对所有人都最优。然而，某些方法对大多数投资者而言可能是值得推荐的。例如，分批次小额定投而非一次性大额投资，可以分散因入场时机不佳带来的风险。此外，所有投资者都会受到可能干扰理性投资策略的心理偏差的影响。意识到这些潜在缺陷有助于减轻其影响。


    ## 拓展问题


    您如何研究加密资产行业，以最大程度提高做出无偏差投资决策的可能性？


    哪些税收规则会阻碍加密资产被用作交换媒介？


    您还可能受到哪些额外的心理偏差影响，从而损害有效投资的能力？


    # 非金融风险管理


    > *成功的投资在于管理风险，而非规避风险。*

    >

    > ——本杰明·格雷厄姆


    为做出有效决策，负责任的投资者应透彻理解与其投资相关的金融风险与非金融风险。这两类风险各不相同，且加密资产投资的风险可能高于传统投资，这使得风险管理更为关键。本章涵盖非金融风险，第`14`章则涵盖金融风险。除描述风险外，这些章节还提供了缓解风险的工具。


    加密资产中的非金融风险较高，因为该行业仍在成熟过程中且快速变化。此外，历史数据点的时间跨度较短，无法评估该行业面临的所有风险。即便这些数据点在许多方面价值有限，因为上一个周期中的行业状况与当前周期有显著差异，导致较旧的数据参考意义不大。


    让我们从那些经常被提及但并未构成实质性威胁的风险开始。

    '
- fmt: '## “51% Attack” Risk


    The abstract of Bitcoin’s white paper specifies an important assumption for the
    functioning of its blockchain [21].


    > As long as a majority of CPU power is controlled by nodes that are not cooperating
    to attack the network, they’ll generate the longest chain and outpace attackers.


    This “as long as” condition refers to what is commonly known as a *51% attack*
    or a *double-spend attack*. By design, in a proof-of-work (PoW) blockchain, if
    the majority of nodes (in terms of computing power) use a blockchain on which
    a specific transaction is not included, then this transaction officially never
    happened. Also, there is no recourse unless the rest of the network decides to
    hard fork from the main chain (as happened to Ethereum following the DAOsaster,
    as covered in Chapter [6](#600732_1_En_6_Chapter.xhtml)).


    Technically, the risk of a 51% attack is a situation where a pool of miners controls
    most of the hash-generation power in a PoW consensus setting. This pool could
    validate fraudulent blocks faster than honest nodes mine valid blocks. As a result,
    the fraudulent blocks could, for example, exclude a transaction for which the
    sender already received benefits. The sender would be able to spend this amount
    anew, which gave its name to this fraudulent behavior: a *double-spend* attack.


    However, in the case of the Bitcoin blockchain, the possibility of a 51% attack
    is arguably non-existent. Indeed, the network’s security is directly proportional
    to the hash rate. The higher the hash rate, the more power the attackers must
    gather to outpace honest nodes in block creation. A higher hash rate means higher
    security. However, the hash rate on Bitcoin’s blockchain is so high that the probability
    of a consortium gathering 51% of the network’s computing power is next to zero.
    Even if all big tech companies combined their global computing power and coordinated
    to use it exclusively to attack Bitcoin’s blockchain, they would still not come
    close to 51% of the global Bitcoin hash rate. For instance, “the combined power
    of AWS, Azure, and Google Cloud would be less than 1% of Bitcoin” (as of end of
    2022) [44].


    The security of the Bitcoin network is over 100 times higher than the security
    of all other PoW blockchains combined. Consequently, investors may conclude that,
    while the Bitcoin blockchain is safe, this risk is still relevant for smaller
    PoW blockchains. However, a 51% attack is unlikely even for such chains. It is
    due to incentives inherent to the blockchain mining process: any potential attacker
    has little incentive to act deceitfully, while the participating nodes have a
    strong incentive to act honestly, as per the functioning of the blockchain. The
    bigger the cryptoasset at hand, the stronger the incentives for nodes to act honestly
    and the higher the network’s security. Regardless of their size, PoW blockchains
    are always unattractive for possible attackers: the cost of attacking the chain
    is higher than the potential gain. This consensus method makes misbehaving an
    ineffective strategy, implying that even enemies abide by the same rules since
    it is clearly in their interest to do so.


    Nevertheless, some sort of 51% attack has occurred in the past. For example, in
    April 2018, the Verge (XVG) blockchain suffered a 51% attack after a hacker identified
    a bug in the code, enabling him to mine blocks much faster than expected. Note,
    however, that the root cause of this attack was a bug in the code and not incorrect
    incentives. Moreover, for more established cryptoassets, security experts have
    reviewed and tested the corresponding blockchain’s code many times. In fact, anybody
    can do so at any time since the code of such blockchains is open source, available
    for anybody to view and review. The existence of major bugs for large cryptoassets
    would therefore have likely already been identified.


    Not only is the risk of a 51% attack highly unlikely to materialize, but it is
    also not a material risk. A common misconception is that a 51% attack would allow
    a hacker to seize funds from any address by sending them to himself. It is incorrect.
    Even if the hacker managed to get the large majority of the hash power on a blockchain,
    he would still need the digital signature of the address owner to transfer funds
    to himself. Therefore, his ability to hack the blockchain would still be limited
    even if such a scenario happened.


    The only thing a hacker could manage to do is to reverse a transaction he made.
    For example, he could spend the coins for a tangible or digital good and mine
    blocks that exclude this transaction afterward. According to the blockchain’s
    records, he would still have the funds and be able to spend them again. However,
    before many such transactions would happen, it would become evident that the corresponding
    blockchain lost integrity. As a result, other users would likely hard-fork it
    from before the attack.


    In summary, though it is often mentioned in the community and theoretical settings,
    a 51% attack would be virtually harmless, and its likelihood is nearly non-existent.'
