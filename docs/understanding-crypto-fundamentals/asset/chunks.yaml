  trans: '

    # 去中心化


    几年前，在地中海的一个小岛上，塞浦路斯人民用惨痛的教训上了一课，而世界上大多数人尚未理解这一课。当本国经济状况堪忧、银行艰难维持正向季度财报时，大多数公民仍认为自己与令人困惑的宏观经济事务绝缘。许多人的个人银行账户因数十年的辛勤工作和养老储蓄而持有可观金额。在这种情况下，人们几乎没有任何理由担心财务问题。


    然而，到了 2013 年初，创造性的`bail-in`（内部纾困）概念首次被激活。金融监管机构没有让资不抵债的商业银行直接破产，而是决定动用债权人的资金（主要是公民在这些银行中的存款）来偿还银行债务。^(³⁹)
    想象一下，你银行账户中的存款突然被"砍头"，无论是不受保的（超过 10 万欧元）还是受保的（低于 10 万欧元）存款，都完全合法且无法追索。不幸的是，就在几年前，这是成千上万在一个民主、工业化的欧洲国家中的人民所面临的现实。


    塞浦路斯的惨痛教训告诉我们：银行账户里的内容并不是你的钱。它只是你自愿委托给商业银行的一笔资金的所有权凭证。银行在用这笔钱冒险，如果出了问题，它可以拒绝（或被法律阻止）全额偿还你的债务。因此，你辛苦赚来的钱完全受制于可能拒绝归还的中心化机构。^(⁴⁰)


    现在，让我们设想另一个世界：你的钱不在商业银行，而是在一个去中心化的平台上。这是一个通过区块链技术实现的情景。没有银行董事会来决定存款人的资金如何使用，而是在一个由用户共同拥有或用户直接达成共识的共享在线技术平台上，决策被预先透明地编程。在这种情景下，存款人拥有他们自己的钱。当然，储蓄者如果愿意，仍可以单独选择借出部分储蓄以赚取回报。但如果他们愿意，也可以让自己的钱免受金融风险和中心化机构决策的影响。


    有时，说服人们相信去中心化的好处颇具挑战性，因为他们通常认为自己已经拥有了去中心化所能带来的东西：所有权。理解去中心化意味着理解当前的标准并非所有权，而是托管。你银行账户里的钱并不真正属于你；你只拥有对银行所持资金的所有权凭证。


    # 隐私


    2018 年初，黑客入侵了印度的国家身份数据库`Aadhaar`。他们泄露了 11 亿注册印度公民的个人数据，相当于地球上每七个人中就有一人受到影响。泄露信息包括姓名、银行账户详情，甚至指纹等生物识别信息
    [9]。


    仅仅三年后，在地球的另一端，2021 年 4 月，Facebook 因另一起安全漏洞登上新闻头条。这紧随该公司一系列臭名昭著的安全事件和数据泄露之后，这些事件暴露了数亿用户的个人信息。2021
    年的漏洞影响了超过 5 亿用户，泄露了全名、生日、位置、电子邮件地址及其他个人信息 [10]。


    虽然隐私问题并非新鲜事，但在过去十年中，它们已成为日益增长的担忧之源。政府和企业在保护公民和用户机密信息方面的失败过于频繁。不幸的是，前面的两个例子只是众多案例中的两个。尽管个人高度重视自己的隐私信息，但政府或公司对这种机密数据的重视程度却不同。由于托管方低估了我们数据的价值，这些数据最终往往保护不足。例如，Facebook
    以纯文本形式保存着数百万用户的记录，包括账户和密码，可供数千名 Facebook 员工访问 [11]。


    在这方面，区块链技术再次成为游戏规则的改变者。密码学的最新进展使区块链成为机密信息的理想数据库，信息的拥有者（公民）仍保有对其数据的所有权。事实上，从技术上讲，我们不需要将个人详细信息保存在中心化的政府或企业数据库中。相反，用户只需证明自己就是所声称的那个人，或者证明自己拥有所声称拥有的东西，而无需透露任何超出严格必要的信息。这可以通过密码学实现。


    特别是，`零知识证明`（`ZKP`）是一个密码学概念，它允许一方向另一方证明某个事实为真，而无需透露任何额外信息。例如，如果我想在美国买酒，我需要证明自己至少
    21 岁。通常，我会把身份证交给商家（或在线提交），商家可以核实我的身份和年龄。然而，在这个过程中，我透露的信息远超必要。我分享了姓名、国籍以及身份证上的所有其他信息，而商家并不需要这些。商家甚至不需要知道我的确切出生日期，只需要知道我已满
    21 岁即可。相反，使用`ZKP`技术，我可以刷一下卡（或使用在线平台），针对我是否已满 21 岁的问题返回“是”或“否”。通过密码学，我可以证明这些信息是真实且不可伪造的。机密信息得以保留，而商家也获得了必要的信息。当然，买酒并非这项技术的主要应用场景，只是一个易于理解的例子。`ZKP`
    可以类似地用于证明房屋所有权、信用状况、俱乐部会员资格以及无数其他场景，而无需分享任何超出必要的信息。


    其目的并非隐藏信息，而是保护自己免受可能发生在任何存储这些信息的系统中的数据泄露、黑客攻击或信息外泄。加密这些信息并使用区块链进行传输，可以防止任何公司或政府在没有充分保护的情况下存储这些信息。它使人们能够重新掌控自己的身份，并对自己的机密数据拥有自主权。这不仅会强制执行被遗忘权，还会使合规（例如，遵守`GDPR`）变得更便宜、更容易。


    区块链技术还可以解决相反的问题——无法通过传统方式正式登记个人数据。

