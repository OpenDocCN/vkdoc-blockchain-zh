    \ characteristics evolve in parallel, each impacting others and contributing to\
    \ a more developed, sustainable, and safer crypto market. These characteristics\
    \ include market liquidity, platform accessibility, interoperability, investment\
    \ vehicle availability, formal taxonomy, and regulation. Cryptoassets will only\
    \ reach their prime time through mass adoption once these characteristics achieve\
    \ a sufficient state of development for most users.\n\n## Extension Questions\n\
    \nWhat are possible catalysts for the next crypto bull run (the start of the next\
    \ uptrend market)?\n\nWhat catalysts would delay crypto prime time? Can they invalidate\
    \ the bullish crypto thesis altogether?\n\nWhat characteristics of the upcoming\
    \ crypto market regulation will the United States and the European Union likely\
    \ adopt, and how will they affect cryptoasset prime time?\n\nGiven the current\
    \ level of maturity and pace of development of the crypto industry, what level\
    \ of adoption will it reach in 2025 and 2030 in terms of the number of active\
    \ users?\n\nFootnotes [1](#600732_1_En_10_Chapter.xhtml#Fn1_source)   [2](#600732_1_En_10_Chapter.xhtml#Fn2_source)\n\
    \n# Part IVWhere Should One Invest?\n\n# 11. Investment Vehicles\n\n> *It is not\
    \ how much money you make, but how much money you keep, how hard it works for\
    \ you, and how many generations you keep it for.*\n> \n> —Robert Kiyosaki\n\n\
    Investors in cryptoassets need to choose where to invest. Options are available,\
    \ from pure investment on the blockchain to custodians investing on one’s behalf.\
    \ This chapter investigates these options and the benefits they provide."
  trans: '

    ## 历史数据


    与其他金融资产相比，加密资产的历史数据点相对较少。此外，市场异常迅猛的增长速度使得大量这些数据点失去相关性。每年，市场都与以往任何一年截然不同，因此数据点很快就会过时。再者，扩容解决方案、加密平台及其他加密服务仍主要处于开发和实施阶段，尚未进入广泛普及期。加密资产的相关历史越长，市场对其技术及未来的信心就越强，从而进一步推动其普及。


    ## 隐私意识


    当社交媒体在 21 世纪初成为主流时，隐私问题几乎未被用户和公司纳入考量。无数丑闻、数据泄露和黑客攻击揭示了隐私的重要性，并逐步提升了公众对隐私的认知。这个过程仍在持续。随着大型公司以日益加快的速度收集用户更多个人数据点，用户愈发寻求能够确保数据保密与安全的解决方案。随着隐私意识的增强，区块链技术的隐私优势可能变得越来越有吸引力，从而为能提供更高私密数据安全性的加密资产增添额外魅力。


    ## 作为支付手段的普及


    要让加密资产成为支付手段，买家必须愿意用加密资产支付，卖家必须愿意接受加密资产作为支付方式，并且必须存在易于使用的技术来连接双方。尽管听起来简单，但这些条件相互依存，如同鸡生蛋、蛋生鸡的问题。例如，只有当足够多的卖家接受加密资产并拥有相关技术时，买家才会要求用加密资产支付。同样，只有当足够多的买家要求用加密资产支付时，卖家才会采用该技术。


    正如优步（Uber）必须吸引足够的司机和乘客，才能激励双方使用其平台一样，加密资产市场在蓬勃发展之前，也必须达到一个由买卖双方构成的临界规模。只有当每一方都达到临界规模，市场才会具备支付手段的功能。


    ## 加密生态系统


    本章讨论的各项标准并非依次演进，而是并行发展的。它们并非彼此独立，而是相互交织。事实上，任何一项特性的改进，在大多数情况下都会积极影响所有其他特性。例如，更高的流动性可能会促进普及，反之亦然，而这两者都可能增加对监管的需求。同时，更清晰、更一致的监管可能会吸引更多加密参与者，从而提升流动性并增加
    ETF 获批的可能性。一个完整的生态系统将它们联系在一起，各自发挥特定功能，使这一新型资产类别趋于完善。


    在参与者方面，生态系统包括创新者（编程和开发人员）、安德森·霍洛维茨（Andreessen Horowitz）等风险投资家、维萨（VISA）或高盛（Goldman
    Sachs）等机构、数字商会（Chamber of Digital Commerce）等非政府组织、学者、政府、监管机构以及用户。每个参与者都提升了整个加密领域的接受度，这惠及所有其他参与者。


    加密的黄金时代并非在某个特定事件发生时突然到来。相反，它是一个持续的过程，依赖于一系列特性和参与者，所有这些并行发展并相互促进。加密市场的基本面将在多个方面同步改善。


    然而，要使看涨的加密资产投资论点得以实现，必须有一个催化剂：一个改变格局的特定事件。例如，2008 年房地产市场泡沫的破裂就是随后经济崩溃的催化剂。它暴露了一个过热的市场，其中存在着大量岌岌可危的高杠杆头寸。市场不仅不可持续，而且需要某个事件来引发修正。


    过去，特斯拉（Tesla）在 2021 年初接受比特币作为支付方式并将其纳入公司 treasury，就是一个加密资产催化剂。这些事件引发了随后加密市场的上涨行情。同样，虽然黄金时代不依赖于任何特定事件，但一个或几个催化剂很可能点燃市场下一轮上涨的导火索。


    ## 关键概念


    截至 2023 年初，加密资产市场尚未成熟。然而，正在进行的重大发展正在迅速提升其成熟度。许多特性并行发展，相互影响，共同促成一个更发达、更可持续、更安全的加密市场。这些特性包括市场流动性、平台可访问性、互操作性、投资工具可用性、正式分类体系以及监管。只有当这些特性对大多数用户来说达到足够的发展状态时，加密资产才能通过大规模普及进入其黄金时代。


    ## 延伸问题


    下一次加密牛市（下一轮上涨市场的开始）可能的催化剂是什么？


    哪些催化剂会延迟加密黄金时代的到来？它们能否完全否定看涨的加密投资理论？


    美国和欧盟可能会采纳哪些即将出台的加密市场监管特征？这些特征将如何影响加密资产的黄金时代？


    鉴于加密行业目前的成熟度和开发速度，到 2025 年和 2030 年，其在活跃用户数量方面将达到何种普及程度？


    脚注 1 2


    # 第四部分：投资哪里？


    # 11. 投资工具


    > *重要的不是你赚了多少钱，而是你保住了多少钱，它为你工作得有多努力，以及你能为多少代人守住它。*

    >

    > —罗伯特·清崎


    加密资产的投资者需要选择投资方向。从直接在区块链上进行投资，到委托托管方代为投资，有多种选择。本章将探讨这些选择及其带来的益处。

