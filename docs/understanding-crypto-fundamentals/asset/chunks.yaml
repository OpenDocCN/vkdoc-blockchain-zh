  trans: '

    # 比特币的重置成本估值


    第 16 章解释了如何将电力成本作为基于工作量证明共识机制的加密资产估值输入。为避免打断该章的连贯性，以下关于比特币估值的复杂计算示例被移至本附录。


    基于电力成本的比特币估值很可能是最早建立的加密资产估值方法，因为早在 2009 年秋季，新自由标准在线交易所发布首个正式比特币汇率时，该方法就已投入使用。这种估值方法被称为比特币的*电力价值*、*哈希电力估值*或*能量价值等价*。


    从代数角度看，以下公式中的不同元素仅根据挖矿所需的电力成本，推导出比特币的隐含成本。


    ![$$ BTC\ electricity\ value=\frac{USD}{kWh}\times \frac{kWh}{Joules}\times \frac{Joules}{hash}\times
    \frac{hash}{block}\times \frac{block}{BTC} $$](img/600732_1_En_19_Chapter_TeX_Equa.png)


    特别要注意，公式中每个分数的分母如何与下一项的分子相抵消，最终只留下两个项。


    公式的第一个分数是用于挖矿的电力成本，单位为`kWh`。即使使用廉价能源，矿工也应考虑这些电力的机会成本。在我们的示例中，假设每`kWh`成本为`0.11
    美元`。


    第二个分数是一个常数。1 瓦特即每秒消耗`1`焦耳。1 千瓦有`1,000`瓦，`1`小时有`3,600`秒。因此，`1`焦耳对应`1000 × 3600
    kWh`，而`1 kWh`对应`1 / (1000 × 3600)`焦耳。


    第三个分数考虑了 ASIC 矿机的特性。每哈希所需的焦耳数取决于矿机的功耗（本例中为`5,500`瓦）和哈希效率（本例中为每秒`200`万亿哈希）。这些数据对应截至
    2023 年 5 月，在`25`摄氏度条件下维护的顶尖 ASIC 矿机效率。第三个分数的对应值为`5500 / 200,000,000,000,000`，即每太哈希`27.5`焦耳，这是
    ASIC 矿机常用的计量单位。


    第四个分数是网络的总哈希率（每秒`350`艾哈希），以挖出一个区块所需的平均时间`10`分钟表示。换句话说，约为`210`泽哈希。


    最后一个分数是每个区块挖出的比特币数量的倒数：自 2020 年 5 月 11 日第三次减半事件起，直至预计 2024 年 3 月的下一次减半事件，每个区块挖出`6.25
    BTC`。


    将上述假设代入这些项相乘，得出比特币的电力价值为`28,233 美元`，这也是本文撰写时比特币的市场价格。自诞生以来，比特币的市场价格始终与其隐含的电力价值保持高度接近（并呈现均值回归趋势）。


    ![$$ BTC\ electricity\ value=\$0.11\times \frac{1}{3.6E6}\times \frac{27.5}{1.0E11}\times
    2.1E23\times \frac{1}{6.25}=\$28,233 $$](img/600732_1_En_19_Chapter_TeX_Equc.png)


    出于多重原因，这个价格是比特币的最低价值，即地板价。


    首先，这些数据考虑的是现有效率最高的 ASIC 矿机。实际上，大多数矿机的效率低于本例。增加矿机所需的瓦特数并降低其哈希效率，意味着更高的估值。


    其次，该估值仅考虑了挖矿的电力成本。然而，建立比特币矿场需要更多成本，从购买`ASIC`矿机到安装和维护成本。


    第三，哈希率持续增长。这带来两个后果：一方面，挖出一个区块所需的时间（第四个分数）平均低于`10`分钟。另一方面，这意味着越来越多的矿工加入竞争，表明他们预期未来挖出的比特币价值将高于当前市场价格。


    还需注意，该公式可以重新调整以分离出电力成本。由此，可以推导出使特定矿工的挖矿业务盈利的电力成本上限、比特币市场价格以及预期哈希率。


    # 应用于加密领域的金融产品


    由于本书面向的部分读者可能难以消化金融概念，以下章节已移至附录。这些内容涵盖投资者可能试图采用的策略——无论是在加密资产还是其他领域——以从潜在投资中获利，但这些策略的风险特征与传统直接投资有所不同。请特别注意与这些策略相关的重要警示语。

    '
- fmt: '# Leverage and Margin Trading


    To maximize gains, traders in the financial industry often use leverage. Compared
    to a simple investment (purchase), leverage consists of borrowing funds to invest
    to benefit even more from price appreciation while running even higher risks if
    prices drop.


    The following example is computation heavy but illustrates the benefits and risks
    of leverage trading. Assume a trader invested $100 in an asset. If the asset price
    increases by 10%, the trader has this return: 10% (ignoring transaction costs).
    However, if the trader borrowed another $100 on top (at a 5% interest rate) and
    invested it in the same asset before the price appreciation, the return would
    be much higher. In particular, the trader would have $220 in the asset (2 × *$*100
    × (1 + 10%)), which he can sell. He can repay the loan plus the 5% interest: $105.
    His return, in this case, would be 15% (computed as `($220 - $105) / $100 - 1`).
    In this scenario, the gain with leverage (15%) is much higher than without (10%).
    However, if the price had dropped (e.g., 10%), then the loss (–25%) would also
    be bigger than without leverage (–10%). Note that the interest rate on the loan
    is due no matter what so that potential additional losses are more than proportional
    to potential additional gains. By borrowing, traders can amplify positions to
    gain more from price increases while exposing themselves to higher risks if prices
    fall.


    ![](images/600732_1_En_20_Chapter/600732_1_En_20_Fig1_HTML.jpg)


    A multi-line graph, titled Impact of leverage on performance, of the performance
    of the trader''s position versus the performance of the invested asset in %. It
    plots without leverage and with leverage with an increasing trend, which intersect
    between 4 and 6% on the x-axis. With leverage is steeper.


    **Figure A-1** Performance of a portfolio with or without leverage (vertically),
    depending on the performance of an asset (horizontally), assuming a 5% interest
    rate due on the loan


    Leverage is also possible in cryptoassets and available through many centralized
    or decentralized platforms. However, the high volatility of cryptoassets makes
    them much less appropriate for leveraged positions. To understand this, one must
    be familiar with the concept of *margin trading*.


    The trader must typically post collateral for the loan to obtain leveraged positions.
    The collateral is a sort of security for the lender and is usually the asset the
    trader invests in. It is the “margin” in “margin trading.” The lender can thereby
    reduce his risk: if the asset’s price decreases below a certain point, the lender
    can sell the borrower’s asset on his behalf to reimburse the loan. However, this
    sale represents a substantial risk for the borrower, especially for volatile assets:
    the asset is disposed of after losing much of its original value. After the sale,
    the borrower has nothing left, even if the asset’s price rebounds. Not only is
    the borrowed amount gone, but also the amount initially invested.


    Margin trading is, therefore, hazardous for investors in highly volatile assets.
    Even if the asset price increases eventually, its volatility can “liquidate” many
    traders on the way.


    Cryptoasset sales happening when prices drop (due to the margin of leveraged positions
    being liquidated) cause prices to drop even further. As the cryptoasset market
    has traditionally been very leveraged, it constitutes a weighty reason for its
    volatility.


    # Derivative Products


    Another way to benefit from cryptoassets is through the use of derivative products.
    A derivative product derives its value from another product (the underlying).
    For example, the value of a stock option derives its value from the price of a
    stock.


    ## Call and Put Options


    A *call option* on a stock is the right to buy a stock in the future at a specific
    price. Like all other derivative products, this is a contract. It is similar to
    a bet on the future price of the underlying over a specific period.


    For a numerical example, assume Google’s stock price is currently trading at $1,000.
    I buy a call option on Google’s stock, for $50, with a strike price of $1,100
    and a maturity of 1 year. In other words, I now pay the premium of $50 to buy
    a right. The right is that I can (I have the “option” to) purchase Google’s stock
    next year at $1,100, regardless of its trading price. If Google’s stock trades
    next year at $1,250, then I exercise the option. Therefore, the call option seller
    is obligated to sell me the stock at $1,100, even though it is trading at a higher
    price. I have made a profit because my purchase price plus the premium ($1,100
    + $50 = $1,150) is lower than the current trading price of the underlying ($1,250).


    On the other hand, if the stock next year trades at $1,075, I do not exercise
    the option because I am better off buying the stock at $1,075 on the open market
    than at $1,100. In this case, I let the option expire worthless and have made
    a loss (the amount I paid for the right, i.e., $50).


    The price of the call option derives its value from the underlying stock’s price
    (among other factors). In other words, if the stock price rises, the option price
    also rises (all other things equal) because the likelihood of expiring above the
    strike price increases. A call option can have any product as underlying, from
    stocks and bonds to commodities, currencies, interest rates, or even other derivative
    products. Of course, call options also exist with cryptoassets as underlying.


    A *put option*, in contrast, is the option to “sell” an underlying in the future
    at a specific price. A put option is, in some sense, the opposite of a call option.
    It works like a call option but with the option to sell rather than the option
    to buy.


    One benefit of using put options is to insure oneself against price drops. For
    instance, a trader unable to afford a cryptoasset dropping below a particular
    value can buy a put option for that cryptoasset and that value. For example, a
    trader can buy a $50,000 Bitcoin and insure himself against the price dropping
    below $40,000 next year. To do so, the trader would buy a put option on Bitcoin
    with a one-year maturity and a strike price of $40,000. The trader can exercise
    the option and sell the asset for $40,000, limiting losses if the price drops
    below that level. Effectively, a put option is an insurance contract. The trader
    thereby benefits from the upside potential of the investment and, at the same
    time, limits the potential downside. Such contracts can, of course, be programmed
    in a smart contract and be traded decentrally.


    ## Futures Contracts


    Alternatively, traders can use futures contracts to express views on future price
    movements. In a futures contract, the buyer agrees to buy an asset for a specific
    price at a specific future date. This way, he can lock in a price without having
    to pay it immediately.¹²⁵


    Futures often benefit from higher liquidity and lower trading fees than buying
    the underlying product. Similar to put options, they can provide potentially infinite
    upside for a limited downside. They can therefore be used to hedge against some
    risks or for speculation. The cryptoasset trading exchange Binance is among the
    largest futures exchanges in the world.


    Many other derivative products exist for cryptoassets, just like other asset classes.
    Interested readers should refer to literature on financial derivative products
    or risk management.'
  raw: '## Leverage and Margin Trading


    To maximize gains, traders in the financial industry often use leverage. Compared
    to a simple investment (purchase), leverage consists of borrowing funds to invest
    to benefit even more from price appreciation while running even higher risks if
    prices drop.


    The following example is computation heavy but illustrates the benefits and risks
    of leverage trading. Assume a trader invested $100 in an asset. If the asset price
    increases by 10%, the trader has this return: 10% (ignoring transaction costs).
    However, if the trader borrowed another $100 on top (at a 5% interest rate) and
    invested it in the same asset before the price appreciation, the return would
    be much higher. In particular, the trader would have $220 in the asset (2 × *$*100 × (1 + 10%)),
    which he can sell. He can repay the loan plus the 5% interest: $105\. His return,
    in this case, would be 15% (computed as ![$$ \frac{\$220-\$105}{\$100}-1 $$](images/600732_1_En_20_Chapter/600732_1_En_20_Chapter_TeX_IEq1.png)).
    In this scenario, the gain with leverage (15%) is much higher than without (10%).
    However, if the price had dropped (e.g., 10%), then the loss (–25%) would also
    be bigger than without leverage (–10%). Note that the interest rate on the loan
    is due no matter what so that potential additional losses are more than proportional
    to potential additional gains. By borrowing, traders can amplify positions to
    gain more from price increases while exposing themselves to higher risks if prices
    fall.


    ![](images/600732_1_En_20_Chapter/600732_1_En_20_Fig1_HTML.jpg)


    A multi-line graph, titled Impact of leverage on performance, of the performance
    of the trader''s position versus the performance of the invested asset in %. It
    plots without leverage and with leverage with an increasing trend, which intersect
    between 4 and 6% on the x-axis. With leverage is steeper.


    Figure A-1


    Performance of a portfolio with or without leverage (vertically), depending on
    the performance of an asset (horizontally), assuming a 5% interest rate due on
    the loan


    Leverage is also possible in cryptoassets and available through many centralized
    or decentralized platforms. However, the high volatility of cryptoassets makes
    them much less appropriate for leveraged positions. To understand this, one must
    be familiar with the concept of *margin trading*.


    The trader must typically post collateral for the loan to obtain leveraged positions.
    The collateral is a sort of security for the lender and is usually the asset the
    trader invests in. It is the “margin” in “margin trading.” The lender can thereby
    reduce his risk: if the asset’s price decreases below a certain point, the lender
    can sell the borrower’s asset on his behalf to reimburse the loan. However, this
    sale represents a substantial risk for the borrower, especially for volatile assets:
    the asset is disposed of after losing much of its original value. After the sale,
    the borrower has nothing left, even if the asset’s price rebounds. Not only is
    the borrowed amount gone, but also the amount initially invested.


    Margin trading is, therefore, hazardous for investors in highly volatile assets.
    Even if the asset price increases eventually, its volatility can “liquidate” many
    traders on the way.


    Cryptoasset sales happening when prices drop (due to the margin of leveraged positions
    being liquidated) cause prices to drop even further. As the cryptoasset market
    has traditionally been very leveraged, it constitutes a weighty reason for its
    volatility.


    ## Derivative Products


    Another way to benefit from cryptoassets is through the use of derivative products.
    A derivative product derives its value from another product (the underlying).
    For example, the value of a stock option derives its value from the price of a
    stock.


    ### Call and Put Options


    A *call option* on a stock is the right to buy a stock in the future at a specific
    price. Like all other derivative products, this is a contract. It is similar to
    a bet on the future price of the underlying over a specific period.


    For a numerical example, assume Google’s stock price is currently trading at $1,000\.
    I buy a call option on Google’s stock, for $50, with a strike price of $1,100
    and a maturity of 1 year. In other words, I now pay the premium of $50 to buy
    a right. The right is that I can (I have the “option” to) purchase Google’s stock
    next year at $1,100, regardless of its trading price. If Google’s stock trades
    next year at $1,250, then I exercise the option. Therefore, the call option seller
    is obligated to sell me the stock at $1,100, even though it is trading at a higher
    price. I have made a profit because my purchase price plus the premium ($1,100
    + $50 = $1,150) is lower than the current trading price of the underlying ($1,250).


    On the other hand, if the stock next year trades at $1,075, I do not exercise
    the option because I am better off buying the stock at $1,075 on the open market
    than at $1,100\. In this case, I let the option expire worthless and have made
    a loss (the amount I paid for the right, i.e., $50).


    The price of the call option derives its value from the underlying stock’s price
    (among other factors). In other words, if the stock price rises, the option price
    also rises (all other things equal) because the likelihood of expiring above the
    strike price increases. A call option can have any product as underlying, from
    stocks and bonds to commodities, currencies, interest rates, or even other derivative
    products. Of course, call options also exist with cryptoassets as underlying.


    A *put option*, in contrast, is the option to “sell” an underlying in the future
    at a specific price. A put option is, in some sense, the opposite of a call option.
    It works like a call option but with the option to sell rather than the option
    to buy.


    One benefit of using put options is to insure oneself against price drops. For
    instance, a trader unable to afford a cryptoasset dropping below a particular
    value can buy a put option for that cryptoasset and that value. For example, a
    trader can buy a $50,000 Bitcoin and insure himself against the price dropping
    below $40,000 next year. To do so, the trader would buy a put option on Bitcoin
    with a one-year maturity and a strike price of $40,000\. The trader can exercise
    the option and sell the asset for $40,000, limiting losses if the price drops
    below that level. Effectively, a put option is an insurance contract. The trader
    thereby benefits from the upside potential of the investment and, at the same
    time, limits the potential downside. Such contracts can, of course, be programmed
    in a smart contract and be traded decentrally.


    ### Futures Contracts


    Alternatively, traders can use futures contracts to express views on future price
    movements. In a futures contract, the buyer agrees to buy an asset for a specific
    price at a specific future date. This way, he can lock in a price without having
    to pay it immediately.^([^(125)](#fn125))


    Futures often benefit from higher liquidity and lower trading fees than buying
    the underlying product. Similar to put options, they can provide potentially infinite
    upside for a limited downside. They can therefore be used to hedge against some
    risks or for speculation. The cryptoasset trading exchange Binance is among the
    largest futures exchanges in the world.


    Many other derivative products exist for cryptoassets, just like other asset classes.
    Interested readers should refer to literature on financial derivative products
    or risk management.'
  trans: '

    # 杠杆与保证金交易


    为了最大化收益，金融行业的交易者常常使用杠杆。与简单的投资（买入）相比，杠杆涉及借入资金进行投资，以便从价格上涨中获得更大收益，但同时也承担着价格下跌时更高的风险。


    以下示例计算量较大，但能说明杠杆交易的收益与风险。假设一位交易者用 100 美元投资某种资产。如果该资产价格上涨 10%，交易者的收益率即为 10%（忽略交易成本）。然而，如果交易者在此基础上额外借入
    100 美元（利率为 5%），并在价格上涨前将其投资于同一资产，那么收益率将高得多。具体来说，交易者将持有价值 220 美元的资产（2 × *$*100 ×
    (1 + 10%)），他可以将其出售。他需要偿还贷款本金及 5%的利息：105 美元。在这种情况下，他的收益率为 15%（计算公式为`($220 - $105)
    / $100 - 1`）。在此情景中，使用杠杆的收益（15%）远高于不使用杠杆的收益（10%）。但如果价格下跌（例如下跌 10%），那么亏损（–25%）也将比不使用杠杆（–10%）更大。请注意，无论情况如何，贷款利息都必须支付，因此潜在的额外亏损会按比例大于潜在的额外收益。通过借贷，交易者可以放大头寸，从价格上涨中获得更多收益，但同时也使自身面临价格下跌时更高的风险。


    ![](img/600732_1_En_20_Fig1_HTML.jpg)


    一张折线图，标题为“杠杆对业绩的影响”，展示了交易者头寸的业绩与投资资产业绩的百分比关系。图中绘制了“无杠杆”和“有杠杆”的曲线，均呈上升趋势，两条曲线在
    x 轴 4%到 6%之间相交。“有杠杆”曲线更为陡峭。


    **图 A-1** 有杠杆和无杠杆情况下的投资组合业绩（纵轴），取决于资产业绩（横轴），假设贷款利率为 5%


    加密货币资产中也可以使用杠杆，并且可以通过许多中心化或去中心化平台实现。然而，加密货币资产的高波动性使其远不适合杠杆头寸。要理解这一点，必须先熟悉*保证金交易*的概念。


    交易者通常需要为贷款提供抵押品才能获得杠杆头寸。抵押品对贷款人来说是一种担保，通常是交易者所投资的资产。这就是“保证金交易”中的“保证金”。贷款人可以借此降低风险：如果资产价格跌破某一特定点，贷款人可以代表借款人出售借款人的资产以收回贷款。然而，这种出售对借款人来说意味着巨大的风险，尤其是对于波动性高的资产：资产在失去其大部分原始价值后被处置。出售后，即使资产价格反弹，借款人也一无所有。不仅借入的资金没了，最初投入的资金也损失殆尽。


    因此，对于投资高波动性资产的投资者来说，保证金交易非常危险。即使资产价格最终上涨，其波动性也可能在过程中“清算”许多交易者。


    价格下跌时（由于杠杆头寸的保证金被清算）发生的加密货币资产抛售会导致价格进一步下跌。由于加密货币资产市场传统上杠杆率很高，这构成了其波动性的一个重要原因。


    # 衍生品产品


    从加密货币资产中获益的另一种方式是使用衍生品产品。衍生品产品的价值源自另一种产品（即标的资产）。例如，股票期权的价值源自股票的价格。


    ## 看涨期权与看跌期权


    股票的*看涨期权*是未来以特定价格购买该股票的权利。与所有其他衍生品产品一样，这是一种合约。它类似于对标的资产在未来特定时间段内的价格下注。


    举一个数值例子：假设谷歌的股价目前为 1,000 美元。我以 50 美元的价格买入一份谷歌股票的看涨期权，行权价为 1,100 美元，期限为 1 年。换句话说，我现在支付
    50 美元的期权费来购买一项权利。这项权利是：我可以在明年以 1,100 美元的价格购买谷歌的股票，无论其当时的交易价格是多少。如果明年谷歌股票的交易价格为
    1,250 美元，那么我就会行使该期权。因此，看涨期权的卖方有义务以 1,100 美元的价格将股票卖给我，尽管其市场价格更高。我获得了利润，因为我的购买价格加上期权费（1,100
    美元 + 50 美元 = 1,150 美元）低于标的资产的当前交易价格（1,250 美元）。


    另一方面，如果明年股票的交易价格为 1,075 美元，我就不会行使该期权，因为我在公开市场上以 1,075 美元买入股票比以 1,100 美元买入更划算。在这种情况下，我会让期权过期作废，从而遭受损失（即我为这项权利支付的金额，50
    美元）。


    看涨期权的价格（除其他因素外）源自标的股票的价格。换句话说，如果股票价格上涨，期权价格也会上涨（在其他条件不变的情况下），因为到期时价格超过行权价的可能性增加了。看涨期权的标的资产可以是任何产品，从股票、债券到大宗商品、货币、利率，甚至其他衍生品产品。当然，也存在以加密货币资产为标的的看涨期权。


    相比之下，*看跌期权*是未来以特定价格“卖出”标的资产的权利。从某种意义上说，看跌期权与看涨期权相反。它的运作方式与看涨期权类似，但拥有的是卖出权而非买入权。


    使用看跌期权的一个好处是能够对冲价格下跌的风险。例如，一位无法承受加密货币资产跌破特定价值的交易者，可以买入该加密货币资产在特定价值上的看跌期权。例如，一位交易者可以买入一枚
    50,000 美元的比特币，并为自己投保，防止明年其价格跌破 40,000 美元。为此，这位交易者将买入一份期限为一年、行权价为 40,000 美元的比特币看跌期权。如果价格跌破该水平，交易者可以行使期权，以
    40,000 美元的价格卖出该资产，从而限制损失。实际上，看跌期权就是一种保险合同。通过这种方式，交易者既能从投资的上行潜力中获益，同时又能限制潜在的下行风险。此类合约当然可以通过智能合约进行编程并实现去中心化交易。


    ## 期货合约


    或者，交易者可以使用期货合约来表达对未来价格走势的看法。在期货合约中，买方同意在未来某个特定日期以特定价格购买一项资产。通过这种方式，他可以锁定价格，而无需立即支付。¹²⁵


    与购买标的资产相比，期货通常具有更高的流动性和更低的交易费用。与看跌期权类似，它们可以提供潜在无限的上行空间，同时下行风险有限。因此，它们可用于对冲某些风险或进行投机。加密货币资产交易交易所币安是全球最大的期货交易所之一。


    与其它资产类别一样，加密货币资产也存在许多其他衍生品产品。感兴趣的读者应参考有关金融衍生品产品或风险管理的文献。

    '
