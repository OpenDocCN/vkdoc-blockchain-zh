  trans: '

    # 基于可比资产的估值


    利用现有商品的市场市值来确立比特币的价值，也是一种更直接、且独立于存量-流量模型的方法。然而，即将推出的模型（同样聚焦于比特币）在很大程度上依赖于主观假设。具体而言，比特币的可比资产法依赖于该资产被假定所承担的功能。它估算的是，该资产能从当前承担此功能的其他资产中夺取多少市场份额。


    可以说，比特币最基本的功能是作为价值储存手段，这一功能传统上由黄金承担。事实上，当传统储户希望随着时间推移保持其储蓄价值时，黄金一直是首选的资产类别。当然，这并非黄金承担的唯一功能，也并非只有黄金这一种资产承担此功能，但我们先从这个简单的例子开始，再逐步扩展。


    一个简化的可比资产方法可以这样运作。我们邀请分析师们将每个假设细化，使其数值更精确，从而得到更好的估算。截至 2023 年，黄金的总市值约为 12 万亿美元。其中约
    46%存在于珠宝中，17%由各国央行作为储备持有，22%为央行之外的实物金条和金币，其余 15%以其他形式持有。^(¹¹⁸) 可以合理假设，央行持有的黄金储备以及私人持有的金条和金币完全承担了价值储存的功能。此外，我们假设现存珠宝的一半以及黄金其他形式的一半（同样为主观假设）也用作价值储存。根据这些假设，黄金价值储存功能的市场价值因此为
    8.3 万亿美元。


    ![$$ \$12T\times \left(17\%+22\%+\frac{46\%}{2}+\frac{15\%}{2}\right)=\$8.3T $$](img/600732_1_En_16_Chapter_TeX_Equb.png)


    保守假设比特币“仅”在本十年末抢占该市场的 20%（又是一个主观假设），那么在其目前约 0.6 万亿美元市值的基础上，仅凭此项功能和对黄金市场份额的争夺，其总价值将增长至
    2.3 万亿美元。当然，其他资产类别，如股票（约 106 万亿美元）、债券（约 124 万亿美元）和房地产（约 327 万亿美元），也部分地扮演着价值储存的角色。保守假设比特币“仅”在本十年末抢占其总市场的
    3%，那么比特币的市值将增长至 19 万亿美元，即每枚 905,000 美元。


    ![](img/600732_1_En_16_Fig5_HTML.jpg)


    一张矩形树图描绘了房地产、债券、股票、黄金和加密货币。房地产占据的区域最大，而加密货币占据的区域最小。


    **图 16-5** — 不同资产类别的相对市值（来源：加密货币数据来自 CoinMarketCap，黄金和房地产数据来自 Savills，股票和债券市场数据来自
    SIMFA 资本市场数据手册）


    此外，比特币也承担着除了价值储存之外的其他功能。例如，它也被视为一种国际支付媒介，能够即时、永久性地结算交易。从这个意义上说，它优于许多现有的交易方式。它很可能还会从西联汇款、Visa
    或万事达卡等现有机构手中夺取一部分交易市场份额。


    例如，这种估值可以通过与现有法定货币供应量的比较来确定。截至 2023 年初，全球法定货币的总价值约为 50 万亿美元。这个数字是货币供应的狭义定义（经济学术语中的“M1”），包括纸币、硬币和隔夜存款（不包括其他金融资产，如债券、股票、房地产和黄金）。因此，这个定义代表了用作交换媒介的总财富，排除了旨在作为价值储存的资产。采用与上述价值储存估值类似的方法，我们可以基于可比的交换媒介及其预期能夺取的市场份额来评估比特币的价值。由此估算出的交换媒介价值，应加上其价值储存的估值，使得这种基于可比资产法的比特币估值远超本十年末每枚
    100 万美元的大关。


    最后，前面的数字假设比特币的总市值除以 2100 万。然而，如前所述，更合理的假设是许多比特币（至少 20%）已经永久丢失。因此，每枚比特币的价格会相应更高。总之，即使采用保守估计，也理应对比特币给出远高于其当前价格水平的估值。


    # 网络价值与交易量比率


    跳出价值储存功能，聚焦于加密资产的支付媒介功能，衡量不同资产的价格-交易关系是很有用的。就像股票基于市盈率进行比较一样，加密资产可以基于其网络价值与交易量（NVT）比率进行比较。


    ![$$ NVT=\frac{网络价值}{交易量} $$](img/600732_1_En_16_Chapter_TeX_Equc.png)


    在 2017 年《福布斯》的一篇文章中，Willy Woo 引入了这个比率来评估比特币是否处于泡沫中。^(¹¹⁹) 该比率表明，比特币的交易量和市值密切相关，尤其是在比特币日趋成熟的过程中。当该比率显著高于其正常范围时，可能预示着泡沫，例如
    2014 年的比特币就是这种情况。其他加密资产也可以用同样的指标进行分析，因为其逻辑并非比特币所独有。然而，虽然网络价值通常与使用量保持一致，但这种关系并非总是成立。例如，质押奖励被反映为交易，但并不代表网络使用量的增加。此外，像门罗币这样的隐私加密资产，其设计初衷就是无法准确衡量交易量。尽管如此，NVT
    比率仍然是其他指标的有益补充。


    # 加密资产背后的其他基本面指标


    除了作为前述模型输入的指标之外，还有无数其他指标可以用来构建新模型。分析师可以选择在其模型中包含以下指标：平均区块大小、区块高度、交易所存入量、交易所提取量、由矿工/验证者直接出售的供应量、平均币龄休眠期（每个币在交易前保持休眠的平均时间）^(¹²⁰)、新地址数量以及活跃地址数量。也可以使用余额超过总供应量一定比例、超过特定数量的原生货币或特定美元金额的地址数量。此外，特别是对于工作量证明（PoW）加密资产，以下指标也很有意义：当前哈希率、30
    天平均哈希率、当前难度、30 天平均难度，或者来自手续费的矿工收入。最后，不同的去中心化度量指标（基尼系数或中本聪指数，见第 13 章）对于加密资产的估值模型也是宝贵的补充。


    传统的宏观经济变量在加密资产领域当然也是相关的。特别是加密资产（尤其是比特币）吸收市场上现有流动性的趋势，使得衡量净流动性变得尤为重要。市场上的总体流动性越充裕，流入包括加密资产在内的资本资产的就越多。

