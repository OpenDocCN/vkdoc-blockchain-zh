- "# 7. 高性能计算\n\n在以太坊生态系统中，用户之间的价值转移通常通过代表数字资产的代币来实现。`Ether`是默认的代币，也是网络上用于交易和初始化智能合约的事实上的货币。以太坊还支持创建新型代币，这些代币可以代表任何常见的可交易商品作为数字资产。所有代币（例如本章稍后解释的`ANT`或`GLM`）均使用标准协议实现，因此这些代币与网络上的任何以太坊钱包兼容。这些代币通过首次代币发行（`ICO`）分发给对特定用例感兴趣的用户。在本章中，我们将重点关注为一种非常特定的用例创建的代币：高性能计算（HPC）。更准确地说，我们将讨论一种分布式\
  \ HPC 模型，其中矿工为某项任务提供计算资源，并以某种形式的以太坊代币获得奖励。\n\n我们将首先概述网络中代币的生命周期。然后，我们将深入探讨第一个代币——以太坊计算市场（`ECM`），它是最通用、最全面的分布式处理系统。`ECM`将作为我们使用代币的\
  \ HPC 的标准模型，并将介绍诸如争议解决（硬争议和软争议）以及链下处理与链上奖励的可验证性等概念。我们将讨论的第二个代币是`Golem`，它将自己定位为未使用\
  \ CPU 周期的 Airbnb。在撰写本文时，其最新版本称为`Clay Golem`，将允许使用`Blender`进行 3D 对象的分布式渲染。未来的版本将启用更高级的功能，例如处理大数据分析。我们将介绍的第三个代币是由网络挖矿组织的高性能计算（`SONM`），它扩展了雾计算（一种去中心化的计算处理模型）的概念，以创建一个由以太坊驱动的机器经济和市场。`SONM`发布了一份以技术为导向的路线图，重点关注神经网络和人工智能。其初始用例将是提供去中心化托管服务来运行*Quake*服务器。我们在本章中讨论的最后一个代币是`iEx.ec`，它利用成熟的桌面网格计算软件以及一种计算证明协议，该协议允许链下共识和所提供资源的货币化。在本章的最后，我们将探讨后区块链经济时代代币的影响以及侧链的敏捷开发。\n\
  \n\n\n## 代币与价值创造\n\n要理解代币的概念，我们首先需要了解其运作的背景——“胖”协议（`https://avc.com/2017/08/how-to-value-crypto-assets/`）。在\
  \ 2017 年共识大会上，Naval Ravikant 谈到了“胖”协议的理念，以及互联网公司与基于区块链的下一代初创企业之间的根本差异。当前，互联网协议栈由两部分组成：支撑万维网的“瘦”协议层和构建在协议之上的“胖”应用层。一些大型互联网公司，如谷歌和\
  \ Facebook，在应用层捕获价值，但随后不得不发明新协议和基础设施层来实现规模化。当互联网公司达到这种规模时，它们已验证了核心商业模式，并有足够资源投入到新协议的创建中。\n\
  \n基于区块链的公司则运行在另一种协议栈上，其特点是“瘦”应用层和“胖”协议层。价值集中在协议层，只有少部分溢出到应用层。Joel Monégro 和 Balaji\
  \ S. Srinivasan（`https://www.usv.com/writing/2016/08/fat-protocols/`）提出了两个可能的原因来解释为何协议层能吸引巨大的兴趣和投资：\n\
  \n*   **共享数据层：** 在区块链协议栈中，底层架构的特性使得关键数据可通过区块链浏览器公开访问。此外，网络中的每个成员都拥有完整的区块链副本，以达成网络共识。共享数据层在实际应用中的一个典型例子是，用户可以轻松地在\
  \ Poloniex 和 Kraken 等交易所之间切换。这些交易所都能平等、自由地访问底层数据或区块链交易。\n\n*   **访问代币：** 可以将代币类比为付费的\
  \ API 密钥，用于访问某项服务。在区块链协议栈中，协议代币用于访问网络提供的服务，例如 Storj 的文件存储。历史上，协议盈利的唯一方法是构建实现该新协议的软件，并使其优于竞争对手。这对于资金充足公司的研究部门来说是可能的；然而，在学术界，早期研究进展较慢，因为创造这些协议的研究人员几乎得不到经济收益。有了代币，协议创建者可以通过首次代币发行（ICO）直接获利，并且随着代币被广泛采用以及其他人基于新协议构建服务，他们将获得更多收益。\n\
  \n由于适当的激励机制、现成的数据共享层，以及代币超越货币用途的应用，开发者们正在底层协议上投入大量时间来解决棘手的技术问题。因此，建立在区块链协议栈上的初创企业将不可避免地花费更多时间在“胖”协议层上，通过解决技术挑战来捕获价值，并从海量的以太坊代币中脱颖而出。\n\
  \n最近，随着以太坊生态系统中越来越多的代币涌现，跨兼容性已成为一个问题。为了解决这个问题，Fabian Vogelsteller 制定了一项名为 ERC20\
  \ 的新规范。ERC20 是一套关于如何在以太坊网络上实现代币的标准。它描述了每个访问代币为实现与整个网络上的去中心化应用（DApp）兼容而应实现的六个标准函数。基于\
  \ ERC20 的代币可以与以太坊区块链上的其他智能合约和去中心化应用无缝交互。仅实现了部分标准函数的代币被视为部分符合 ERC20。即使是部分合规的代币，也可以根据缺失的函数，轻松地与第三方进行交互。\n\
  \n> **注意**\n> 在以太坊区块链上建立新代币需要一个智能合约。代币的初始参数和函数提供给该智能合约，由其管控代币在区块链上的执行。\n\n为了完全符合\
  \ ERC20 标准（`https://eips.ethereum.org/EIPS/eip-20`），开发者需要在其智能合约中整合一组特定的函数，以便能够对代币执行以下操作：\n\
  \n*   获取代币总供应量：`totalSupply()`\n*   获取账户余额：`balanceOf()`\n*   转移代币：`transfer()`,\
  \ `transferFrom()`\n*   批准代币花费：`approve()`, `allowance()`\n\n当创建新代币时，通常会预先挖矿，然后在众售（也称为首次代币发行）中出售。这里的*预挖*指的是为代币创建者和任何将为网络提供服务（例如运行全节点）的方分配一部分代币。代币有固定的销售价格。它们可以在新协议启动时的\
  \ ICO 期间公开发行和出售，以资助其开发，类似于初创公司使用 Kickstarter 来资助产品开发。随着 ERC20 代币的普及，更多挑战也日益显现。在之前的实现中，`transfer`函数只能单向工作：如果用户意外将代币发送到智能合约，即使合约所有者想归还代币，也无法收回。因此，技术错误导致预售活动中损失了数百万美元。此后，以太坊开发者通过引入\
  \ `transferFrom()` 函数修复了 `transfer` 函数。此外，还提出了新规范作为潜在候选方案，以取代 ERC20 或引入新型代币。让我们审视其中三种规范：\n\
  \n*   **ERC223：** 一项规范（`https://github.com/ethereum/eips/issues/223`），修复了早期 ERC20\
  \ 实现中 `transfer` 函数的错误。更具体地说，该实现将 `transfer` 和 `transferFrom` 函数合并为一个单一的 `transfer`\
  \ 函数，该函数可以取消交易。\n\n*   **ERC721：** 一项规范（`https://eips.ethereum.org/EIPS/eip-721`），引入了将代币视为资产和收藏品的概念。最初的\
  \ ERC20 规范创建了可互换的代币，所有代币价值相同。然而，ERC721 允许创建可能具有更高价值的独特代币。这一想法被一款名为 CryptoKitties\
  \ 的区块链游戏应用所采纳，其中年龄、颜色和品种等属性使得代币非常稀有，成为有价值的资产。\n\n*   **ERC948：** 一项规范（`https://github.com/ethereum/EIPs/issues/948`），为拥有实体存在并希望通过发行代币作为数字订阅来扩展到区块链的企业描述了订阅模式。\n\
  \n\n\n### Token 与以太坊计算市场（ECM）\n\n关于 Token，我们接下来要问的问题是：既然 Token 是数字化的，那么 Token 买家实际购买的是什么？本质上，用户购买的是一个私钥。这是我们类比付费\
  \ API 密钥时所提出的概念——你的私钥只是一串字符，它能授予你访问权限。私钥可以理解成类似于密码。就像你的密码能让你访问存储在 Gmail 等中心化数据库中的电子邮件一样，私钥能让你访问存储在以太坊等去中心化区块链栈上的数字\
  \ Token。\n\n> **提示**  \n> 私钥与存储在中心化数据库中的密码之间的关键区别在于：如果你丢失了私钥，你将无法找回它。最近，有一些尝试通过恢复服务来恢复账户访问权限的做法，该服务使用一个共同签名者来验证请求恢复的用户身份。\n\
  \n最终，与传统的基于订阅的服务相比，Token 似乎是一种更好的技术融资和盈利模式。目前，即使以太坊等基础加密货币拥有更大的市场份额，Token 最终将达到其\
  \ 100 倍的市场份额。图 7-1 总结了传统互联网公司与使用以太坊 Token 在区块链栈上构建的公司在价值创造方面的差异。让我们从我们的第一个 Token\
  \ 开始，它将成为后续所有 Token 的模型。ConsenSys 的 Michael Oved 在（[`https://media.consensys.net/the-blockchain-killer-app-ethereum-tokens-c3f5e6f4ce7f`](https://media.consensys.net/the-blockchain-killer-app-ethereum-tokens-c3f5e6f4ce7f)）中指出，Token\
  \ 将是大家一直期待的杀手级应用：\n\n> *如果说杀手级应用证明了更大技术的核心价值，那么以太坊 Token 无疑证明了区块链的核心价值，Token 为这些*\
  \ [新商业模式](https://blog.coinbase.com/app-coins-and-the-dawn-of-the-decentralized-business-model-8b8c951e734f)*带来的巨大成功就证明了这一点。*\n\
  \n> *我们现在看到一波浪潮，Token 作为区块链技术的第一个杀手级应用开始崭露头角。从很多方面来看，比特币都是基于区块链的资产的“概念验证”。以太坊平台正在大规模地证明这一概念。*\n\
  \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig1_HTML.jpg](img/430562_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1：Token 所使用的区块链栈概览\n\n该模型基于 Joyce J. Shen 对分布式账本技术的描述。像 Google 和 Facebook\
  \ 这样的传统互联网公司通过收集用户生成的数据，在应用层创造并捕获价值。区块链公司在所有权和可用技术方面具有不同的动态。区块链本身提供了一种共识机制和一个可公开访问的共享数据层。以太坊进一步通过一个能够运行智能合约中包含的指令的\
  \ `EVM`，提供了一种图灵完备的编程语言和节点间兼容性。使用智能合约，可以构建一个完整的应用程序在区块链上运行，而一组应用程序可以成为像 Storj 这样的完整去中心化服务。\n\
  \n### 以太坊计算市场（ECM）\n\n`ECM` 是一个用于链下计算的非常简单且功能性的 Token，也是我们将在本章中考虑的第一个 Token。它将作为一个教学工具和通用模型，涵盖高性能计算\
  \ Token 所需的所有必要特性。`ECM` 旨在促进链下计算的执行，这些计算如果放在以太坊虚拟机（`EVM`）中进行将过于昂贵。本质上，`ECM` 是亚马逊\
  \ `EC2`（一种在云中提供集中计算能力的网络服务）的去中心化版本。`ECM` 的关键技术进步是计算市场，它允许一个用户（客户）支付给另一个用户（主机）来执行链下算法，并将结果报告给客户。此外，为了维护链下计算的完整性，每个算法还有一个链上实现。这个链上组件可用于验证提交的最终结果是否确实正确。它还在解决争议中发挥作用。让我们通过图\
  \ 7-2 来看看通过 `ECM` 的请求生命周期。`ECM` 使用一些特定于该项目的术语来描述一个请求从最初接收到最终解决的生命周期。我们在图 7-2 中使用了其中一些术语，以及我们在此讨论的一些附加术语：\n\
  \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig2_HTML.jpg](img/430562_2_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2：请求通过 `ECM` 时的生命周期\n\n- **待处理：** 表示接收到请求时。每个请求都以待处理状态开始。\n- **等待解决：** 一个计算请求已提交到网络，主机已计算了算法并正在报告结果。这是客户的一个决策点；要么接受答案，请求将进入软解决状态；要么答案被质疑，在这种情况下，请求将进入需要解决状态。\n\
  - **需要解决：** 当答案被质疑时，从决策树中选择此路径。请求状态更改为需要解决，并且需要算法的链上验证组件。\n- **解决中：** 为请求执行链上计算的过渡期。请求将保持此状态，直到计算完成。\n\
  - **硬解决与软解决：** 一旦链上计算完成，请求被设置为硬解决状态。如果在答案提交给客户后的某个时间窗口内没有提出质疑，则请求被设置为软解决状态。\n- **已完成：**\
  \ 一旦通过软解决或硬解决获得答案，原始请求就可以设置为已完成状态。这会解锁客户端的付款，并允许主机收到链下计算的付款。\n\n在图 7-2 中，所描述的每个请求状态都被进一步分解为一个工作流。一旦任务请求在链下处理完毕，就会有一个关于最终答案的决策点。如果客户质疑主机提供的答案，算法的链上组件将执行，请求将经历几个需要解决的状态。另一方面，如果没有提出质疑，请求将进入软解决状态，并被视为已完成。请求达到已完成状态后，主机将收到付款。\n\
  \n现在我们已经了解了请求如何在 `ECM` 中被处理，让我们来谈谈市场以及该市场中的各个子市场。我们之前称之为在链下计算的*算法*这一概念，由三个独立的合约组成：一个经纪人合约、一个工厂合约和一个执行合约。\n\
  \n\n\n*   **经纪人合约:** 一种促进请求从客户传输到将执行计算的主机的合约。\n*   **执行合约:** 一种用于在链上验证计算的合约。当提交的答案受到质疑时，此合约可以执行一轮链上执行。\n\
  *   **工厂合约:** 一种在争议解决情况下处理执行合约链上部署的合约。此合约提供相关元数据，例如重新编译字节码并验证它所需的编译器版本。\n\n市场本身拥有垂直领域（市场内的细分市场），这些垂直领域执行专门类型的合约和算法，通过使用代币在以太坊区块链上创建特定用例的高性能计算经济。图\
  \ 7-3 提供了每个市场组成部分的三种合约的可视化总结。那么，在 ECM 上发起计算请求需要什么？主要有两个函数用于创建请求并提供所有必要的细节。这里，`requestExecution`\
  \ 函数用于创建计算请求，该函数接收两个参数。第一个是函数本身的输入集，第二个是一个时间窗口，在此期间，提交的答案可以在请求变为软解决状态之前受到质疑。这个时间窗口以区块数量给出，因为在以太坊中，区块是在确定的时间间隔内创建的。最后，此函数还指定了为此计算提供的报酬。`getRequest`\
  \ 函数返回关于该请求的所有元数据。以下是从元数据返回的一些相关参数：\n\n*   **address requester:** 请求计算的客户的地址\n*\
  \   **bytes32 resultHash:** 给定计算结果的 SHA-3 哈希值\n*   **address executable:** 为解决受质疑答案而部署在链上的可执行合约的地址\n\
  *   **uint status:** 请求在其生命周期中特定时间点的状态。它是一个与请求状态相对应的无符号整数，状态由数字 0-7 表示。\n*   **uint\
  \ payment:** 此请求将为完成计算而支付（给主机）的 wei 数量。Wei 是用户之间可以转移的最小以太币单位，类似于比特币中的聪。\n*   **uint\
  \ softResolutionBlocks:** 一个由区块数量给出的时间窗口，在此期间必须提交对答案的质疑。如果在该时间间隔内没有对答案提出质疑，请求将变为软解决状态。\n\
  *   **uint requiredDeposit:** 提交答案以响应请求时，或由反对已提交答案的质疑者提供的 wei 数量。此保证金将被锁定，直到请求进入最终确定状态，然后返还给主机。\n\
  \n重要的是要注意，在我们的讨论中，一些任务如答案验证、冲突解决和质疑需要保证金。保证金被用作一种对策，以减少网络上发生女巫攻击的可能性。在女巫攻击中，攻击者创建多个虚假或女巫身份以接管网络。更准确地说，在我们的案例中，攻击者会在网络上创建多个虚假节点。这使得攻击者能够在网络上投票、拒绝区块批准并阻止网络上区块的传输。大规模的女巫攻击需要攻击者控制网络上的大部分计算能力或哈希率。通过接管大部分计算能力，攻击者理论上可以逆转交易并实现双重支付。这也被称为“51%攻击”。然而，实际上，随着网络规模的增长，实现\
  \ 51% 攻击变得越来越不可行。\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig3_HTML.jpg](img/430562_2_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n\n市场中某细分市场的概览\n\n在图 7-3 中，我们看到了市场中响应客户请求所需的三个组件：经纪人合约、执行合约和工厂合约。经纪人合约促进客户与主机的交互，而另外两个合约在争议解决中发挥作用。如果对提交的答案提出质疑，经纪人将通过其工厂合约（也称为\
  \ FactorBase，以红色工作流程显示）启动执行合约的部署，该工厂合约整合信息并为算法的一轮执行做准备。执行所需的 gas 将从质疑者需提交的保证金中扣除。我们接下来将讨论提交和质疑流程。\n\
  \n接下来，我们将讨论将答案提交回客户以及质疑流程。提交链下计算完成的答案是使用 `answerRequest` 函数执行的。此函数接收正在被答复的请求的唯一\
  \ ID 作为输入。实际提交一个潜在答案需要一笔以太币保证金。此保证金将被锁定，直到请求达到软解决或硬解决状态。我们将简要讨论从相关方扣押保证金的重要性。一旦请求最终确定，提交答案的主机可以收回其缴纳的保证金以及执行计算获得的奖励。如果提交的答案不符合客户提交请求的期望，参与者可以质疑该答案。这将启动一个链上验证过程，该过程将在\
  \ EVM 内执行一轮计算，以验证提交的答案是否正确。如果在链上计算过程中发现提交的答案不正确，主机的保证金将被扣除该计算的 gas 成本。质疑者将获得客户保证金中的大部分奖励，争议由此解决。\n\
  \n对于提交的答案受到质疑的请求，该请求将进入需要解决状态。这通过调用 `initializeDispute` 函数实现，该函数充当从提出质疑到开始链上验证之间的过渡。现在，经纪人合约将使用工厂来部署一个用此请求的输入初始化的可执行合约。调用此函数并执行一轮计算的\
  \ gas 成本将从质疑者的保证金中报销。在请求的解决状态下，会持续调用 `executeExecutable` 函数，直到链上验证完成。此时，请求进入硬解决状态并最终确定。Gas\
  \ 费用和奖励系统可能看起来很复杂，但它遵循一个简单的原则：正确答案获得计算报酬，而错误的提交者必须为链上验证支付 gas。让我们回顾一下：\n\n*   在软解决的情况下，主机收回其初始保证金以及客户为执行计算而给予的奖励。\n\
  *   如果没有提交正确答案，则验证的 gas 成本由提交答案的用户平均分摊。奖励报酬返还给最初请求计算的客户。\n*   在硬解决的情况下，错误的主机在扣除（用于链上验证的）gas\
  \ 成本后，收回其剩余保证金。该主机不会获得计算奖励。\n*   如果质疑者在硬解决中获胜，他们将收回其保证金以及奖励报酬。gas 成本从错误主机的保证金中扣除。\n\
  \n\n\n由于 gas 成本，在链上验证计算本质上是一项昂贵的任务。`ECM` 的设计使得链下计算比在 `EVM` 中运行任务更便宜。从技术角度来看，有两种类型的链上执行实现：无状态计算和有状态计算。图\
  \ 7-4 展示了这两种实现之间的对比。\n\n如果一项计算是自给自足的，即不需要任何外部数据源，则该可执行合约是无状态的。本质上，前一步的返回值被用作下一步的输入。`Piper\
  \ Merriam`（`ECM` 的创建者）提出，无状态可执行合约优于有状态实现，主要原因有两个：编写算法时开销更低，以及由于计算周期是自持的，降低了复杂性。`Piper`\
  \ 强调的一个例子是斐波那契数列，它被编写为一个无状态实现，算法将最新的斐波那契数列作为下一执行周期的输入。以无状态形式编写此算法的开销非常小，并且没有引入本地存储的额外复杂性。\n\
  \n> **提示**\n> 对于无状态合约，执行合约与作为计算请求发送到市场进行计算的算法是相同的。在这里，链上验证将运行执行合约一个周期，而主机将运行它所需的尽可能多的周期以获得最终答案。\n\
  \n如果一项计算不是自给自足的，即需要额外的数据源以及前一步的返回值，则该可执行合约是有状态的。这个额外的数据源通常是一个持有本地存储的数据结构。让我们回到斐波那契数列的例子，现在让它变得有状态。为此，算法会将每个计算出的数字存储在合约存储中，并且只将最新的数字返回给算法以进行下一执行周期。执行的每一步都需要算法搜索最后存储的数字，以便计算下一个数字。通过包含存储，算法现在必须搜索已保存的结果，并输出任何已计算出的所需斐波那契序列。对本地状态的依赖使得这个合约实例成为有状态。有状态合约支持新的复杂功能，例如使用查找表和搜索，但也导致编写的算法复杂性增加。\n\
  \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig4_HTML.jpg](img/430562_2_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4**  \n以太坊计算市场中的工厂执行合约的两种模型\n\n在图 7-4 的链上验证过程中，将执行执行合约的一个周期。然而，无状态形式的自包含合约将高效地执行，且没有任何额外的复杂性。在无状态合约中，在\
  \ `EVM` 内部执行的每一步都是基本的，因此它在那个虚拟机的 `gas` 限制之内。另一方面，由于执行的复杂性，一些合约需要额外的存储。在这种情况下，会执行有状态合约，其中本地存储在链上验证期间绑定到\
  \ `EVM`。此存储是临时的，仅在链上处理期间存在。\n\n## Golem 网络\n\n`Golem` 是一个去中心化的通用超级计算网络。除了作为计算资源租用市场之外，`Golem`\
  \ 还旨在为微服务提供动力并允许异步任务执行。作为一个技术栈，`Golem` 通过去中心化的区块链栈为开发者提供了基础设施即服务（`IaaS`）和平台即服务（`PaaS`）。在\
  \ `Golem` 中，有三个组件作为去中心化市场的支柱：\n\n*   **去中心化农场：** 一种发送、组织和执行来自个体用户（称为请求者）和主机（称为提供者，提供计算资源）的计算任务的机制。这为用户提供了竞争性价格，用于诸如\
  \ `CGI` 渲染和网络访问上的机器学习等任务。\n\n*   **交易框架：** `Golem` 拥有一个自定义支付框架，供开发者将开发并运行在去中心化网络上的服务和软件货币化。此框架可以定制，以通过新颖创新的方式捕获价值，例如在以太坊区块链上的托管、保险和审计证明。\n\
  \n*   **应用注册表：** 开发者可以创建利用 `Golem` 作为分发渠道和拥有新颖独特货币化方案的市场（针对特定任务）的应用程序。这些应用可以发布到应用注册表，该注册表本质上作为该网络的`应用商店`。\n\
  \n`Golem` 构建市场的前提是并非所有成员都会一直需要额外的资源进行大量计算。因此，请求者可以成为提供者，出租自己的硬件以赚取额外费用。图 7-5 概述了\
  \ `Golem` 中的三个组件如何协同工作。目前，`Golem` 从以太坊继承其完整性（拜占庭容错）和共识机制，用于任务的部署、执行和验证。然而，最终 `Golem`\
  \ 将使用完全功能的微支付通道来运行构建在 `Layer 2.0` 升级之上的微服务。这将允许用户以完全去中心化的方式运行服务，例如笔记应用、托管网站，甚至大规模流媒体应用。在\
  \ `Golem` 达到该成熟度水平之前，还需要进行一些优化；目前，最紧迫的发展涉及任务的执行。在执行通用任务之前，我们需要确保计算发生在一个没有特权的隔离环境中，类似于\
  \ `EVM`，但扩展了更多功能。我们还需要应用注册表中认可的白名单和黑名单机制以及数字签名，这允许提供者建立信任网络，并允许用户运行由可信开发者进行加密签名的应用程序。此外，需要一个网络范围的信誉系统来奖励在计算任务中参与最多的提供者，同时检测恶意节点并有效地缓解任务。\n\
  \n> **注意**\n> 第一个版本，称为 `Brass Golem`，只允许一种类型的任务在网络上执行——`CGI` 渲染。此版本的主要目标是验证任务注册表并拥有一个基本的任务定义方案。开发者希望集成\
  \ `IPFS` 用于去中心化存储、为相关提供者建立基本的信誉系统，以及在网络中集成 `Docker`。后续版本增加了本节后面讨论的新功能。\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig5_HTML.jpg](img/430562_2_En_7_Fig5_HTML.jpg)\n\
  \n**图 7-5**  \n`Golem` 技术栈\n\n\n\nGolem 堆栈的三个主要组件如图 7-5 所示。软件开发人员创建自动化日常任务的应用程序，并将其发布到应用程序注册表中。例如，一个限时渲染应用程序可以消除对任何复杂交易或任务跟踪的需求。买方只需支付一次性押金，并在时间结束前使用该应用程序。当买方使用注册表中的应用程序时，所产生的收入将用于补偿开发人员的应用程序。该注册表包含两种类型的应用：经认证的开发者发布的已验证应用，以及来自未确认开发者的新应用。最终，验证者会将新上传的应用集中起来，并密切跟踪它们是否有任何可疑活动。经过几次使用后，新应用也会获得已验证状态。开发人员还会因这些应用在提供者节点上执行而获得少量报酬。提供者申请硬件用于运行应用，而运行任务产生的大部分收入将返还给提供者（矿工）。交易机制确保资金正确交付给相应的参与方，买方也通过同一机制为任务执行付费。\n\
  \n### 应用程序注册表\n\n应用程序注册表为请求者提供了一个庞大的仓库，用于搜索符合其需求的特定工具或应用。该注册表是一个以太坊智能合约，涉及三个实体：作者、验证者和提供者。添加这三个实体背后的设计原理是什么？对于通用计算而言，代码被隔离在沙箱中，并以最低权限执行。但潜在的软件漏洞可能会在提供者的沙箱中造成严重破坏，在虚拟机中执行恶意代码，意图提升权限，甚至接管机器。这就是为什么仅靠沙箱隔离对\
  \ Golem 来说是不够的。有人可能会问，是否可以对代码进行自动化的安全评估？理论上，这是不可行的。由于停机问题，我们无法在执行复杂算法之前确定其结果。\n\n\
  > **注意**  \n> 停机问题是：给定任意计算机程序及其输入，判断该程序是最终会停止运行，还是无限期继续运行下去的问题。\n\n为了确保在主机上安全可信地执行代码，应用程序注册表被划分为三个负责维护网络完整性的参与方。作者将去中心化应用发布到注册表，验证者通过创建白名单来审查和认证\
  \ DApp 为安全的，而提供者则维护问题 DApp 的黑名单。验证者还会通过将应用标记为恶意或垃圾信息来维护黑名单，而提供者通常最终会使用验证者提供的黑名单。类似地，提供者可以预先批准某些特定的\
  \ Golem 应用（经认证者认证）在其节点上执行。\n\n提供者也可以选择自行策划其白名单或黑名单。Golem 的默认选项是使用受信应用的白名单来运行。第一组应用将由开发人员验证，以启动\
  \ Golem；然而，在初始分发之后，网络将依赖于验证者。另一方面，提供者也可以采取仅依赖黑名单的方法。这种方法的优势在于能最大化提供者的覆盖范围（面向市场），并提供可在节点上执行的广泛应用。最终，提供者将变得专业化，并对其节点进行微调，使其在执行某一类任务时极其高效。这使提供者能更好地控制其节点上运行的内容，并为计算农场提供自定义硬件选项。最终，这一选项可供那些希望最大化利润并愿意运行搭载前沿软件的专用机器的开发者使用。\n\
  \n在像 Golem 这样的去中心化网络中，我们将看到传统验证者和先锋验证者之间的分化。传统验证者将维护一组执行非常常规任务的稳定应用。例如，一个复杂的 3D\
  \ 渲染请求可以在提供者的节点上启动一个可抢占的渲染实例。一旦任务完成，该实例将终止以释放内存，并将输出发送给请求者。另一方面，先锋验证者将纳入并批准那些突破\
  \ Golem 能力边界的新软件。在提供者的节点上运行新的实验性软件需要更好的虚拟机沙箱隔离和加固。但这些功能可以作为运行于提供者提供的特殊节点上的高级附加组件。将高级附加组件货币化也将阻止诈骗者和恶意实体。总体而言，这种设计方法使网络更具包容性，让诈骗者付出更高成本，并为开发者带来更多创新。\n\
  \n\n\n### 交易框架\n\n该交易框架可类比为 **Stripe**：一个用于在 Golem 上实现应用货币化的 API。众筹结束后，网络将使用 `GNT`（Golem\
  \ 网络代币）处理用户间的所有交易，以补偿软件开发者和计算资源提供者。该交易框架构建于以太坊之上，因此继承了底层支付架构，并扩展出高级支付方案，例如**纳米支付机制**和**交易批量处理**。这里提到的两项创新均为\
  \ Golem 独有，接下来我们将讨论它们为何对网络不可或缺。\n\n为了驱动微服务，Golem 需要处理海量的小额交易。单次支付的价值极低；这类支付也被称为“纳米支付”。然而，使用纳米支付存在一个难题：交易费用不能超过纳米支付本身的价值。为了解决这个问题，Golem\
  \ 采用了交易批量处理。该方案将若干纳米支付聚合起来，作为单笔以太坊交易一次性发出，从而降低所产生的交易费用。例如，Golem 开发者指出，在一笔交易中处理十次支付的成本，大约相当于分十笔交易处理同一金额的一半。通过批量处理多笔交易，为微服务按单位用量（按节点或按小时）付费的用户将能享受到显著降低的交易费用。\n\
  \n> **注意**\n> 对于提供者而言，另一种驱动微服务的模式是基于信用的按单位托管付费。在此模式下，请求者存入带有时间锁的 `GNT` 作为押金，提供者在一天结束时自动扣除使用费用，剩余信用额度将返还给请求者。\n\
  \n在 Golem 中，纳米支付运作于“一对多”的微支付场景中，即一个请求者向多个协助完成计算任务的提供者支付。微服务的支付规模约为 0.01 美元，对于如此小的金额，即便在以太坊上，交易费用也相对高昂。这里的思路是：请求者（付款方）不再进行单笔\
  \ 0.01 美元的交易，而是发行一张中奖概率为 1/100、奖金为 1 美元的彩票。这张彩票对于请求者而言价值 0.01 美元，其优势在于，平均每 100 张彩票中只有一张会触发实际交易。这是一种支持纳米交易的概率性机制，但如果计算的任务数量较少，则无法保证某个具体的\
  \ Golem 节点能得到充分补偿。Bylica 等人提供了数学基础，以确保随着网络扩展、请求者和提供者数量增加，这种彩票系统产生的收入能够公平分配。本质上，随着请求者发布的任务数量增加，一个节点从概率性彩票奖励中获得的收入，将趋近于它通过单笔交易收取费用所能获得的金额。\n\
  \n对于提供者而言，Golem 将要实现的彩票系统比纯粹的概率性方案具有更高的可预测性。提供者可以确信，在用于奖励单个任务参与者的所有彩票中，不存在哈希冲突，且只有一张是中奖彩票。此外，如果有\
  \ 100 个提供者参与彩票支付，那么纳米支付协议将保证该任务只需支付一次。Bylica 及其合作者讨论了几种反索赔机制，以防止恶意实体冒充中奖者并套现。图 7-6\
  \ 简要描绘了彩票流程。任务完成后，付款方发起一个新的彩票来支付参与其中的提供者。付款方创建彩票描述 `L`，其中包含唯一的彩票标识符，并计算其哈希值 `h(L)`。该哈希值被写入以太坊合约存储。付款方还将彩票描述\
  \ `L` 广播到 Golem 网络，以便每个参与节点可以验证支付金额是否正确，并确认 `h(L)` 确实已写入以太坊存储。彩票中奖者可以通过交叉引用给定的描述\
  \ `L` 和一个除彩票智能合约外无人知晓的随机值 `R` 来唯一确定。经过一定时间后，如果奖励未被申领，智能合约会（根据 `L` 和 `R`）计算出获胜提供者的地址，并将奖励从合约关联的存储中转移给获胜者。彩票的哈希值\
  \ `h(L)` 也会从合约存储中移除，新的彩票支付周期随即开始。\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig6_HTML.jpg](img/430562_2_En_7_Fig6_HTML.jpg)\n\
  \n**图 7-6** 基于纳米支付的彩票支付系统\n\n从宏观层面看，Andrzej Regulski 撰写了一篇文章，阐述了 `GNT` 背后的部分经济原则，以及这种交易框架如何推动代币的长期增值（[`https://blog.golemproject.net/the-economics-of-the-golem-network-token/`](https://blog.golemproject.net/the-economics-of-the-golem-network-token/)）。以下是其文章中最相关的段落：\n\
  \n> *要与 Golem 网络交互，必须使用 GNT。最初，它的唯一作用是实现价值从请求者向提供者以及软件开发者的转移。随后，交易框架将允许为代币赋予更多属性，例如，要求押金必须以\
  \ GNT 存储。*\n\n> *GNT 的数量（即供应量）将永久固定在其在 Golem 众筹期间生成的水平。之后不会再有新的 GNT 被创造出来。*\n\n\
  > *代币的贬值或增值对网络运营是中性的，因为用户可以自由地为 Golem 中的计算资源设定任何出价/要价，从而适应 GNT 价值的任何波动。*\n\n> *固定数量的代币将不得不满足日益增长的交易需求，从而推高对\
  \ GNT 的需求。在合理假设代币流通速度（即特定时期内单位代币的交易次数）保持恒定的前提下，可以从货币数量论推导出这一结论。这反过来意味着，Golem 网络的整体成功和增长，预示着\
  \ GNT 的长期增值。*\n\n\n\n此支付框架也可用作冲突解决的备用机制。如果某个任务挑战在经历传统 Golem 机制后仍悬而未决，我们将需要一种硬性解决方法（如我们在“Ethereum\
  \ 计算市场”部分所见）。此时，我们可以使用类 TrueBit 风格的“审判”来进行最终裁决。TrueBit 是一个基于智能合约的、为 Ethereum 构建的争议解决层。它作为附加组件集成在现有\
  \ Ethereum 项目（如 Golem）的架构之上。TrueBit 的设计原则是依赖网络中唯一可信的资源——矿工——来解决争议。使用 TrueBit 进行硬性解决依赖于一个涉及有限资源验证者（称为法官）的验证子程序。\n\
  \n在 TrueBit 的验证游戏中，有三个主要角色：求解者、质询者和法官。求解者提交任务的解决方案，质询者对提交的答案提出异议，法官则判定质询者或求解者哪一方正确。使用验证子程序的目的是降低链上计算的复杂度。这是通过游戏分轮次进行来实现的：每一轮都会缩小计算范围，直到只剩下一个简单的步骤。这最后一步由智能合约（法官）在链上执行，并最终裁定哪一方正确。请注意，这个方案中的法官在算力上是受限的。因此，最终只会将极其简单的计算放到链上供法官裁决。验证游戏的直观指南如图\
  \ 7-7 所示。\n\n> **注意**\n> \n> 验证游戏以迭代方式运作，其奖励结构有利于那些勤奋查找错误的验证者（质询者）。准确检测并最终验证错误后，质询者将获得丰厚的累积奖金作为奖励。\n\
  \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig7_HTML.jpg](img/430562_2_En_7_Fig7_HTML.jpg)\n\
  \n**图 7-7** 验证游戏\n\n要开始此游戏的第一轮，求解者必须提交在特定时间窗口内执行的一系列步骤（计算）。求解者选择在该时间窗口内时间间隔相等的计算步骤，并创建一个映射到网络完整内部状态的\
  \ Merkle 树。这些树的 Merkle 根被广播到区块链上。随后，质询者会通过 Merkle 树执行二分查找，直到发现第一个与自身预期不符的实例。也就是说，她找到一个步骤\
  \ *i*，在该步骤中，当状态从步骤 *i* 转换到步骤 *i*+1 时，Merkle 根并未更新。给定步骤 *i*，质询者可以请求获取该步骤前后内存访问的 Merkle\
  \ 证明。在此上下文中，Merkle 证明是从步骤 *i* 到 Merkle 根的路径，以及所有兄弟节点（它们捕捉了步骤 *i* 时的网络状态）。请注意，步骤\
  \ *i* 和 *i*+1 前后的兄弟节点完全相同；只有步骤 *i* 的数据会发生变化。此时，法官可以执行步骤 *i*，并检查将状态更新到 *i*+1 是否也正确更新了\
  \ Merkle 根。法官可以据此确凿地发现哪一方在此步骤中是错误的，并广播裁决结果。最终，要么作弊的求解者受到惩罚，要么质询者为此误报所消耗的资源买单。\n\n\
  与 ECM 中实现的链上验证相比，TrueBit 是一种先进的链上执行机制。它能够以低于运行完整指令集的成本来验证计算，因为只有一步是在链上执行的。通过将 TrueBit\
  \ 用作链下计算的争议解决层，智能合约可以使第三方程序以无需信任的方式执行文档完善的例程。即使是需要 TB 级数据的先进机器学习应用（如深度学习），只要训练数据的根哈希被编码在智能合约中，就能用其验证链下计算的完整性。TrueBit\
  \ 之所以能够处理大型数据集，原因很简单：Merkle 根映射了网络在给定时间点 *t* 的状态，并且质询者能够执行二分查找。对于像 Golem 这样旨在面向多种用例实现高性能计算（HPC）的项目，TrueBit\
  \ 可以支持在链下使用大型数据集，同时通过链上机制保证输出结果的准确性。\n\n> **注意**\n> \n> 链下任务执行引发了对网络完整性的担忧。Ethereum\
  \ 的 Layer 2.0 升级正在提升整体网络安全，并实现无需信任的链下任务执行。为此，TrueBit 正被考虑作为 Layer 2.0 升级的候选方案。\n\
  \nClay Golem 的发布带来了三个正在考虑的新用例：\n\n*   **gWasm：** WebAssembly (Wasm) 是一种独立于操作系统的格式，用于分发能在各种平台上以接近原生性能执行的二进制文件。`gWasm`\
  \ 是一个用于将新应用集成到 Golem 网络的封装器。`gWasm` 的前提是：如果一个应用能编译为 Wasm，它就能被分发给 Golem 网络。目前处于早期开发阶段。\n\
  \n*   **gLAMBDA：** Golem 即将推出的一个科学用例。应用并行化在 Golem 网络上（以去中心化方式）执行 RASPA 模拟。RASPA\
  \ 是一个通用模拟包，可用于气体、流体和碳纳米管中分子的模拟。\n\n*   **视频转码：** Golem 另一个即将推出的用例。专注于将大型视频文件从一种格式数字转换为另一种格式。\n\
  \n\n\n### SONM（由网络挖矿组织的超级计算机）\n\n`SONM` 是雾计算概念在区块链上的一种去中心化实现。要理解 `SONM` 如何在雾计算框架内运作，我们首先需要定义两个网络概念：`IoT`（物联网）和\
  \ `IoE`（万物互联）。欧盟委员会将物联网 (`IoT`) 架构定义为一个由具有 IP 地址并能通过网络传输数据的物体组成的泛在网络。`IoT` 更广泛地归属于万物互联\
  \ (`IoE`) 这一概念，`IoE` 在现实世界和虚拟世界中的物体之间提供无缝的通信总线和上下文服务。`IoE` 被思科公司定义如下：\n\n> *人、流程、数据和事物的网络化连接。`IoE`\
  \ 的益处源于连接人、流程、数据和事物所产生的复合效应，以及这种日益增强的连接性在“万物”在线时所创造的价值。*\n\n虽然 `IoT` 传统上指连接到彼此或云服务的设备，但\
  \ `IoE` 是一个更侧重于将“人”作为产生收入业务逻辑中关键组成部分的总称。从工程角度来看，`IoT` 是专注于设备间通信的消息传递层，而 `IoE` 是允许初创公司通过人与设备之间的交互来获利的货币化层。在\
  \ `IoT` 网络中连接的设备会产生海量数据。将这些数据传输到云端进行处理需要巨大的网络带宽，并且在数据生成、处理数据以及接收结果之间存在延迟（从数小时到数天不等）。`IoT`\
  \ 技术的一个主要限制就是这种传输延迟时间。近期，人们越来越关注由于传输和处理阶段而导致的可操作数据价值的损失。当我们收到那些处理后的结果时，再对这些数据采取行动已经为时已晚。\n\
  \n思科公司的 Ginny Nichols 提出的一个解决方案称为**雾计算**。雾计算通过将处理阶段转移到网络的较低层级来减少传输延迟。雾计算并非将任务卸载到集中式云端进行处理，而是将高优先级任务推送到离实际生成数据的设备最近的节点上进行处理。一个设备要参与雾计算，必须能够处理任务、拥有本地存储并具备一定的网络连接能力。雾计算这一概念是个隐喻，意指雾通常在地面附近形成。因此，雾计算将云服务扩展到了更靠近产生\
  \ `IoT` 数据的设备（地面）的位置，以便实现更快的行动。在雾计算中，数据处理被认为集中在边缘（更靠近生成数据的设备），而不是集中在云端。这使我们能够最小化延迟，从而更快地响应时间敏感型任务，或缩短对数据采取行动所需的时间。`SONM`\
  \ 将雾计算的这一层能力提供给去中心化的参与者网络，用于处理计算密集型任务。\n\n**注**\n\n大型企业对其收集的数据（或业务分析）需要更快的响应时间，这刺激了如\
  \ `Apache Spark`、`Storm` 和 `Hadoop` 等实时计算处理工具的发展。这些工具允许在数据收集和传输的过程中对其进行预处理。同样地，雾计算似乎是\
  \ `IoT` 的一个扩展，其发展是为了满足快速数据分类/处理的需求。\n\n`SONM` 构建于 `Yandex.Cocaine`（可配置全能自定义应用集成网络引擎）之上。`Cocaine`\
  \ 是一个开源的 `PaaS`（平台即服务）堆栈，用于创建应用程序的自定义云托管引擎，类似于 `Heroku`。`SONM` 拥有复杂的架构，旨在模仿以太坊的世界计算机模型。`SONM`\
  \ 团队设计的这台世界计算机，其组件与传统的个人计算机类似，但有一个主要区别——这些组件连接到了一个去中心化网络。\n\n- **中央处理器/处理器（负载均衡器）：**\
  \ 在 `SONM` 的架构中，处理器（中枢）充当负载均衡器和任务调度器。整个网络可以表示为一个中枢节点（或中枢）链，负责分发任务、从计算雾中收集结果、向矿工支付服务费用，并提供网络整体健康状态更新。每个中枢节点相当于一个处理器核心，核心（或中枢节点）的数量可以根据需要在网络上进行扩展或缩减。在个人计算机中，核心对于处理器来说是本地可访问的；然而，在\
  \ `SONM` 中，核心本质上是去中心化的。中枢为整个网络协调任务执行提供支持。更具体地说，中枢提供了在雾计算云上处理和并行化高负载计算的能力。\n\n- **基本输入输出系统（区块链）：**\
  \ 对于 `SONM` 来说，`BIOS`（基本输入输出系统）就是以太坊区块链。以太坊为网络共识和支付机制提供了可靠的支柱，`SONM` 可以继承这些特性。然而，基础的以太坊实现缺乏负载均衡器，并且高昂的\
  \ Gas 费用催生了在区块链之上的替代方案，例如 `SONM`。\n\n- **图形处理单元：** `SONM` 的 `GPU`（图形处理单元）就是雾计算云。更具体地说，这个雾计算云由\
  \ `SONM` 网络中的矿工组成，他们将自己的计算资源提供给买家使用。\n\n- **连接的外设：** `SONM` 中的买家相当于外围设备。买家连接到网络并为他们使用的任何资源付费。请求被广播到区块链上，矿工选择在他们自己的机器上执行哪些请求。然后，负载均衡器决定任务的执行。\n\
  \n- **硬盘：** `SONM` 中的存储将使用成熟的去中心化存储解决方案来实现，例如 `IPFS` 或 `Storj`。\n\n- **串行总线：** 一种通信模块，用于网络内发送方（节点）和工作机器之间的消息传递和数据传输。该串行总线基于\
  \ `Ethereum Whisper`，支持网络上的消息广播和监听功能。\n\n- **插件电路板：** 插件板可以被视为网络的扩展包。它允许 `SONM`\
  \ 通过无缝集成兼容的网络和计算农场来扩展其处理能力。\n\n图 7-8 提供了世界计算机组件的可视化表示。\n\n```\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig8_HTML.jpg](img/430562_2_En_7_Fig8_HTML.jpg)\n\
  ```\n\n**图 7-8** `SONM` 中实现的世界计算机\n\n\n\n在 Figure 7-8 中，你可以看到通信总线构成了该架构的骨干，在每个层级都与世界计算机的组件相连。通过\
  \ SONM 的请求工作流始于买家请求计算资源。该请求被广播到区块链和串行总线上，以便其他组件能够验证特定请求是否合法。矿工接受任务，负载均衡器将任务分发到雾计算云中执行。如有必要，负载均衡器还可以通过插件板将任务分配给与\
  \ SONM 兼容的特定应用网格网络。雾云还拥有一个去中心化服务的本地存储，例如 `Storj` 或 `IPFS`，可按需使用。最后，负载均衡器还有两个更重要的角色：跟踪任务结果和整体网络健康状况。负载均衡器（`Hub`）在任务完成后收集结果，并将其发送回买家。健康指标向负载均衡器和网络报告世界计算机中每个组件的状态，以便在任务分配/执行方面做出更优决策。\n\
  \nSONM 中的智能合约系统是一组用于区块链治理和网络上去中心化应用管理的协议（智能合约）。该智能合约系统维护着网络的完整性，并提供了若干针对恶意实体的对策，我们将在后面讨论。此外，SONM\
  \ 使用形式化定义和严格证明来展示买家与提供商之间通信的安全性（加密安全的消息传递）。网络中各参与方之间的交互使用一种名为 `pi-calculus` 的高级数学框架进行建模。该框架是一种形式化语言，用于描述在多参与方系统中通过定义良好的信道进行的安全并发交互。SONM\
  \ 中的治理原型包括一个去中心化自治组织（DAO）、一个法院合约、一个网络范围的中继注册表，以及一个用于将新应用部署到 SONM 网络（例如，白名单、中继工厂和中继钱包）的工厂合约。该模型进行了扩展，包含了管理网络上运行的\
  \ DApp 所必需的一些新元素（由工厂部署）。目前，购买计算资源的过程在网络中看起来非常分散。然而，在未来的版本中，买家将填写一份预购计算表单，以指明他们的硬件选择、要使用的\
  \ DApp 以及任何特殊的执行参数。让我们更深入地了解当前 SONM“区块链政府”中使用的完整智能合约集合：\n\n-   **SONM 代币：** 网络的默认货币。该代币用于奖励提供计算资源的矿工，以及网络内的用户交易。\n\
  -   **DAO：** SONM 的监管机构，授予用户投票权和管理去中心化应用的行政权限。网络上的 DApp 需要支付 *税收* 才能被纳入 DAO 并获得法院访问权限。DAO\
  \ 还拥有执行特权，可以执行诸如封禁中继、释放和锁定资金以确保矿工获得适当报酬，以及暂停或禁止中继等操作。\n    > 注意：法院将作为一个可通过 DAO 访问的争议解决智能合约来实现。它将为市场中的不公平买家或提供商提供保护，并在对解决方案提出质疑时提供结果验证。\n\
  \n-   **中继工厂：** 一个中继在智能合约系统中有两个扩展：一个工厂和一个钱包。钱包只能由中继钱包工厂创建。工厂创建一个新的钱包合约，然后将此合约注册到白名单中。\n\
  -   **中继钱包：** 中继钱包是一个接收买家付款并促进向矿工支付服务代币的合约。钱包由工厂创建，可以处于四种可能状态之一：已创建、已注册、空闲、疑似/已惩罚。最初，所有钱包都处于已创建状态，并有一定数量的冻结资金。在已创建状态下，合约可以在白名单上注册。该合约随后切换到已注册状态，并有权访问高级功能，例如转账和发薪。现在，该钱包可以在一个称为发薪期的指定时间内开始向矿工（但不向自己）付款。在发薪期结束后，钱包可以使用\
  \ `payday` 函数将剩余资金转移到所有者的钱包。如果发现关联的中继存在恶意行为，DAO 可以将其列入黑名单并没收冻结资金。根据情况，DAO 可以进一步决定将钱包状态更改为疑似或已惩罚。\n\
  -   **白名单：** 白名单是一种注册类型的合约，包含网络中中继的详细信息，包括其状态。所有由工厂创建的钱包都在此白名单合约中注册。最初，此白名单作为经 SONM\
  \ 开发者验证为安全可靠的可信中继注册表。最终，此功能将扩展到开放对新涌现中继的评级。\n-   **RegApp：** 一个使用 `React.js` 制作的简单\
  \ Web 应用，用于中继节点注册。该应用程序将一个节点添加到白名单合约中。需要注意的是，`RegApp` 与语言无关，只需要一个 Web 界面来注册节点。在此示例中使用了\
  \ `React.js`，但其他 Web 编程语言也同样适用。\n-   **PayOut 应用：** 一个在 SONM 网络上运行的支付应用程序，用于支付和处理给予矿工服务报酬的代币。该应用程序是工厂合约将部署的\
  \ DApp 类型的一个示例。\n\nFigure 7-9 为刚刚讨论的智能合约系统提供了直观的补充说明。来自 Chain Cloud 的 Anthony Akentiev\
  \ 审阅了 SONM 白皮书，并就未来版本中使用 SONM 代币为开发此智能合约架构提供资金的众筹工作提供了一些评论（[`https://medium.com/chain-cloud-company-blog/sonm-whitepaper-review-353ca2713ba9`](https://medium.com/chain-cloud-company-blog/sonm-whitepaper-review-353ca2713ba9)）：\n\
  \n> *众筹分为两个阶段——预售和 ICO。所有资金的 19% 和 20% 作为奖励发送给团队。开发和营销需要等额的資金：预售后，34% 用于开发，32% 用于营销；ICO\
  \ 后，30% 用于开发，33% 用于营销。这看起来很好且公平。*\n>\n> *结论——45/60*\n>\n> *这是我读过的最好的白皮书之一。大项目。大目标。预售和\
  \ ICO 将会很盛大。*\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig9_HTML.jpg](img/430562_2_En_7_Fig9_HTML.jpg)\n\
  \n**图 7-9** SONM 智能合约系统概览\n\n\n\n回顾一下，SONM 中的智能合约系统由多个相互协作的合约组成。其中第一个合约是迁移功能，它允许购买了\
  \ SONM 预售代币（`SPT`，即 Anthony 提到的预售期间发行的代币）的用户将其代币兑换为 `SNM`（SONM 代币）并参与网络。接下来是 SONM\
  \ 中用于应用部署的中心工厂合约。在当前实现中，中心工厂会创建用于向矿工支付计算资源费用的中心钱包。该工厂还会部署一个全网白名单合约，该合约作为网络中活跃中心的注册表以及每个中心内创建的钱包记录。最后，工厂部署一个支付应用，用于向矿工发放\
  \ `SNM` 代币以酬谢其提供的服务。我们在此要讨论的最后一个智能合约是 DAO，它提供了若干管理功能来阻止恶意实体。这些功能包括：在发现欺诈行为时将中心除名（从白名单合约中）、通过暂停中心钱包来冻结资金，或在出现争议时通过法庭进行冲突解决。\n\
  \n#### 买家–中心–矿工交互\n\n在 SONM 网络上发布请求计算资源的任务，需要在买家与执行任务的矿工之间进行大量的通信。例如，在处理开始之前，矿工、分配任务的中心和买家之间会发生多次验证交互。一旦买家通过验证，中心会将任务分配给矿工的雾计算云，并确保矿工获得服务报酬。这组交互在此被定义为买家–中心–矿工通信。这种交互可以通过图\
  \ 7-10 的两部分直观地展示。第一部分，图 7-10 (A)，解释了计算开始时矿工与中心之间的交互；图 7-10 (B) 则通过引入买家和矿工的支付流程展现了全貌。\n\
  \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig10_HTML.jpg](img/430562_2_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10 (A)\n\n矿工–中心验证\n\n在图 7-10 (A) 中，我们看到一个中心正在向区块链广播关于活跃中心钱包以及中心所有者 IP 地址的信息。这些信息由监听代理收集，然后分发给矿工。在执行任何任务之前，矿工会经过一系列步骤来验证分配任务的中心。此过程确保该中心值得信赖，并且其中心钱包中有足够资金来支付计算费用。矿工通过一个名为“中心池列表”的全局列表来获取关于分配中心的更多信息。这个全网范围的列表包含了所有已验证和未确认的中心。为了自我验证，中心钱包会向区块链发送其地址以及过往交易历史，作为身份验证的凭证。矿工接受该凭证后，即可开始计算。必须注意的是，此验证过程的所有组件——包括中心广播、验证请求、钱包信息以及中心池列表——都使用相同的基础设施：区块链。这些请求和广播通过构建在区块链之上、基于\
  \ Whisper 的消息总线共享给网络中的其他节点。图中蓝色虚线表示区块链上持续进行的过程，通知则通过消息总线传递。除了中心池列表，矿工还可以请求其他矿工独立验证分配中心的凭证。随着时间的推移，矿工会为网络中曾分配过任务的中心建立一个个人评分列表。该列表可用于自动化任务接受流程，并跳过对高度可信中心的验证步骤。\n\
  \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig11_HTML.jpg](img/430562_2_En_7_Fig11_HTML.jpg)\n\
  \n图 7-10 (B)\n\n买家–中心–矿工交互\n\n在图 7-10 (B) 中，我们看到在分配任务的中心完成初步验证后，买家会存入一笔初始押金。这笔押金是对计算成本的粗略估算，并存储在中心钱包中。矿工验证这笔押金后，买家会在区块链上签署一份协议，其中包含预估费用以及原始文件的哈希值。当中心分配计算任务时，该协议会被发送给矿工。原始文件通过种子供矿工下载。文件下载完成后，任务描述连同任何特殊参数被应用，处理过程随即开始。任务完成后，结果从雾计算云中提供，中心负责收集这些结果。随后，中心会通过另一个种子使结果可供买家下载。此时，协议已完成，中心钱包中的资金会发放给矿工，以酬谢其提供的计算资源。在未来的版本中，将加入适当的锁定机制来处理费用估算过高或过低的情况。在买家调整估算误差之前，中心不会释放结果。\n\
  \n\n\n#### 超级全局网络操作系统（SOSNA）\n\n那么，买家如何知道矿工是否满足编译和运行其所请求应用所需的依赖项？买家又如何知道哪些应用与矿工的系统设置兼容？这些问题由\
  \ SONM 的操作系统处理。没有操作系统的驱动，世界计算机是不完整的，而 SONM 的操作系统被称为 `SOSNA`。\n\n**注意**  \n在本章中，我们仅在\
  \ HPC 服务的买家和提供商背景下讨论了 SONM；然而，早期版本 SONM 的首批用例将专注于以完全去中心化的方式运行 *Quake* 服务器。路线图包括消息传递协议和支付应用。\n\
  \n依赖管理和编译器兼容性问题将通过在主机器上使用容器来解决。容器本质上是一个最小的虚拟机，能够加载任何指定的配置，从新的库到标准工具（如 GNU 编译器工具链）。容器在主机系统上一个最小的隔离环境中运行。这样做是为了防止容器内运行的恶意程序发起权限提升攻击。`SOSNA`\
  \ 可分为三个主要组件：包含智能合约系统的区块链层、一个网格核心以及面向消费者的应用层。我们已经详细讨论了区块链层和 API（由智能合约启用）。现在，让我们把焦点转向网格核心。在\
  \ SONM 中，任何网格兼容的 PaaS 堆栈都可以接入网络工作，例如 BOINC（伯克利开放式网络计算基础设施）或 Yandex.Cocaine。\n\n\
  一个简化的网格架构实现包含两个单元：多个工作/从属模块和一个主控模块。这两个单元构成一个计算云，而雾计算云将这一想法扩展到部署在所有类型机器上的数百个实例。网格网络的定义在于，主控机器管理分布在不同地理位置的工作机器。主控模块本质上像一个中心枢纽，管理矿工机器上应用的执行、平衡负载、调度任务并收集结果。更一般地说，我们可以认为主控模块的工作方式类似于传统的矿池。\n\
  \n在容器内执行的任何应用都被称为服务。从技术上讲，SONM 中的所有服务都基于 RPC，并接受一组特定的消息来执行指令。每个服务都有一个函数列表，在建立连接后，可以通过向该服务发送消息来引用这些函数。这组函数被称为服务协议。一旦服务通过定位器解析其名称而激活，就可以动态地获取该协议。定位器的使用可以类比于使用\
  \ DNS 进行主机名解析。我们稍后将回到定位器服务。启动时，节点会加载配置文件中指定的设置，包括所有需要在此特定节点上启动的服务。服务没有能力通过网络传输代码；在这种状态下，它们只能接收消息。为了允许访问网络并实现\
  \ RPC 兼容的通信，节点会启动一个名为定位器的特殊服务。容器中运行的所有其他服务都会附接到定位器，以接收和发送消息。一旦定位器服务被激活，它会绑定到网络中的一个公共端点，并将连接广播到区块链。那么，买家需要执行哪些步骤才能为其任务访问特定服务呢？使用定位器服务，买家需要执行以下五个步骤：\n\
  \n- 连接到公共端口上的定位器端点。\n- 向定位器发送一个包含服务名称的解析请求。\n- 从定位器接收一条消息，其中包含端点容器、协议描述和函数调用的信息。\n\
  - 接收一条确认消息，表明信息请求已完成。\n- 使用与定位器消息匹配的端点信息请求特定的矿工，并调用所需服务来执行/处理任务。\n\nSOSNA 各组件的可视化辅助图见图\
  \ 7-11。\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig12_HTML.jpg](img/430562_2_En_7_Fig12_HTML.jpg)\n\
  \n**图 7-11** SOSNA 架构概览\n\n在图 7-11 中，我们从区块链层开始，它为网络提供共识框架以及用于治理的智能合约系统。接下来是消息总线层，它充当世界计算机各个组件与网络用户之间的双向通信信道。这一层也存在于两侧，允许区块链与面向消费者的应用通信，以及让网格核心协调任务执行。在最顶层，我们有一个消费者应用层，买家可以在此访问网络并发布服务请求。`RegApp`\
  \ 是未来买家将与之交互的消费者应用的一个早期例子。最终，消费者层将分裂成更多垂直领域，例如为网络中信誉度高的用户提供免去验证阶段的可信运行时功能。在另一端的最底层，我们有网格核心。这是\
  \ SONM 的心脏，雾计算在此进行。网格本质上是数百个主控和从属模块的并行实现。从属模块运行执行服务的容器，这些服务连接到定位器。定位器运行在一个公共端口上，买家可以通过消费者应用层访问该端口。\n\
  \n随着项目从早期 Alpha 版本演进，SONM 平台发生了三项值得注意的更新。第一个是 `SONM-OS` 的安装镜像，可用于设备，使其能够立即连接 SONM\
  \ 市场并开箱即用地开始挖矿。积累的资源会被跟踪，出借其计算资源的租户将获得奖励。第二个是在运行 SONM 的设备上实现机器学习的用例，以在去中心化的雾计算平台上处理\
  \ `TensorFlow`、`Apache Spark` 和 `Theano` 应用。最后一项更新是 CDN 用例，用于将图像和媒体卸载到 SONM 设备上，并从基于雾计算的\
  \ CDN 中检索它们，这比传统的网络服务便宜得多，并提供可比的性能。SONM 服务的定价计算器可在网站上找到。\n\n\n\n### iEx.ec\n\n我们将以对\
  \ iEx.ec 平台的简短讨论来结束本章。iEx.ec 也是一个使用特定领域区块链的分布式高性能计算（HPC）代币。iEx.ec 构建于一套成熟的研究技术之上，该技术名为\
  \ XtremWeb，由法国国家信息与自动化研究所（INRIA）为桌面网格计算而开发。那么，什么是桌面网格呢？桌面网格计算背后的理念是，收集连接到网络的闲置机器的计算资源，以非常低的成本（如果是志愿桌面网格，甚至完全免费）来执行密集型并行应用程序，这与传统超级计算机相比成本极低。`XtremWeb-HEP`\
  \ 是其前身的一个去中心化版本，旨在矿工市场（marketplace of miners）中执行需要大量计算资源的任务。这一开源桌面网格技术栈属于“周期窃取”（Cycle\
  \ Stealing）家族，该家族利用连接到网络的机器上的闲置资源来执行数据密集型应用程序。`XtremWeb-HEP` 实现了我们之前看到的高性能计算代币所需的大部分特性：容错性、混合公私基础设施、虚拟镜像（容器）部署、负载均衡，以及面向矿工的支付机制。运行在网络上的去中心化应用（DApps）将依赖\
  \ iEx.ec 架构来自动搜索运行应用所需的所有计算资源、配置资源，并向相关方释放资金。\n\n使用一个成熟且经过充分测试的软件栈具有三个主要优势：\n\n\
  - **韧性：** 如果一个计算节点发生故障，任务可以重新分配给其他工作节点，并以最小的停机时间继续运行。\n- **效率：** 尽管工作节点之间的硬件配置存在差异，但网络中应用程序的基础性能仍然很高。\n\
  - **可插拔节点：** 无需特殊配置即可向网络添加新节点，节点在快速设置后即可集成。\n\n在 iEx.ec 中，任何发生在外部或链下的动作都被称为贡献（contribution）。例如，提供数据集、传输文件和执行计算，这些动作都需要相关方之间进行代币交易。我们如何知道动作是否实际正确执行了？如何将某一特定交易或交易集合与在链下执行的特定动作关联起来？需要一种新的协议来验证贡献是否确实发生，以及哪些交易与之对应。iEx.ec\
  \ 提出了`贡献证明（proof-of-contribution）`作为链下贡献的一种新共识机制。这一新机制还在启用 iEx.ec 中一项名为服务等级协议（SLA）的企业级功能方面发挥着作用。使用\
  \ SLA 可以追踪资源利用率，并实现从客户到提供商的可信计算资源订单。iEx.ec 团队预测，向网络中的各方分发内容将成为使用 iEx.ec 区块链的去中心化应用（DApps）的一个极其重要的功能。买家将通过智能合约访问区块链上的复杂数据集，并拥有一个简单的支付结构来运行他们的应用程序。利用`贡献证明`，iEx.ec\
  \ 可以保证内容提供者确实提供了对数据集的访问权限，并且该文件在处理期间是可访问的。出于支付目的，访问时长也可以被记录，以保护买家免受超额收费。此外，iEx.ec\
  \ 将采取多种对策来应对那些声称文件传输失败以降低数据费用的恶意实体。\n\niEx.ec 的最初几个版本将专注于巩固核心功能，以及一个需要高性能计算（HPC）的金融交易用例。这项名为\
  \ `eFast` 的服务将采用复杂的计算预测方法，使小额投资者能够做出更好的交易决策。其目标是通过对不同股票的聚类分析来创建多样化的投资组合，但这种分析的计算复杂性极其巨大，以至于只有大型金融机构才能负担得起。像\
  \ iEx.ec 这样的去中心化服务可以将处理成本降低到传统计算集群成本的十分之一。\n\n**注**\n\nGolem 和 iEx.ec 在产品开发方面有着相似的目标；然而，它们在业务方法上有所不同。Golem\
  \ 旨在构建网络的核心基础设施，并吸引高性能计算和云客户。iEx.ec 则首先专注于构建将在网络上运行的去中心化应用，以吸引那些需要这些应用并且寻求更优惠价格的普通云客户。\n\
  \n那么，任务是如何在 iEx.ec 上被分配和执行的？有两个算法管理这一过程：一个用于执行的匹配算法（matchmaking algorithm）和一个用于分配的调度器。让我们简要地谈谈这两者。\n\
  \n匹配算法在分布式系统中用于根据买家提供的资源描述，来匹配资源提供者和潜在买家对。回想一下，在 SONM 中，这一任务由负载均衡器接管；然而，在 iEx.ec\
  \ 中，由一个算法执行资源供应。开发者提议最终将描述计算资源可用性和运行任务所需资源的智能合约存储在区块链上。这可以包含诸如可用 RAM、处理器/CPU、磁盘空间以及\
  \ GPU 类型等信息。对于宿主机来说，任务将被部署到一个虚拟机实例或虚拟机监控器上，而买家将指定运行时指令。匹配算法可以实现比简单的一对一匹配更复杂的策略，并且\
  \ iEx.ec 可以对更复杂的匹配进行变现。匹配算法有几种设计选择，但 iEx.ec 将使用一种名为 `ClassAd` 的语言，该语言已在科学文献中得到充分验证。\n\
  \n第二个算法是调度器，它对任何分布式计算系统都至关重要。网络的性能和可扩展性取决于其调度器的有效性。iEx.ec 面临的设计挑战是创建一个支持多准则决策分析（MCDA）的调度器，该调度器能够为每个任务选择最优的计算资源，并对其进行适当调度以满足买家的标准。MCDA\
  \ 是运筹学的一个分支，专门评估如何在存在多个相互冲突的选项时优化决策。基于 MCDA 的解决方案可能更贴合客户的需求，尤其是基于成本与性能的基准测试时。一位客户可能希望最小化计算成本，即使这需要更长时间；而另一位客户可能希望最小化所需时间——这正是\
  \ iEx.ec 中调度器将要处理的各类场景。\n\n\n\n一个通用的调度和高效的匹配算法允许在高性能计算（HPC）领域对核心区块链技术进行非常有趣的升级。一个显著的例子是使用特定领域的区块链（或侧链）。侧链是一种可适应的区块链，旨在满足特定基础设施需求，用于运行那些在通用环境中性能不佳的应用程序。此类区块链的目标是最大化性能并最小化执行之间的时间延迟。通常情况下，应用程序会经过标准区块链；然而，在提交大量任务的情况下，部分任务可以被卸载到侧链进行追踪。侧链将追踪在宿主机上花费的时间，并将信息报告回网络，这种卸载可以减少通用区块链上的流量。需要开发一个先进的智能合约系统来实现这种切换。图\
  \ 7-12 提供了 iEx.ec 架构的可视化说明。\n\n!['../images/430562_2_En_7_Chapter/430562_2_En_7_Fig13_HTML.jpg'](img/430562_2_En_7_Fig13_HTML.jpg)\n\
  \n**图 7-12** iEx.ec 架构概览\n\n在图 7-12 中，最顶层是一个面向消费者的应用程序 `E-Fast`。这是 iEx.ec 的第一个用例，它提供了在分布式大规模环境中以极低成本运行复杂金融预测算法的基础设施。其下层是以太坊区块链层，它为网络提供共识，并为矿工的补偿提供任务追踪。该区块链还充当智能合约系统的平台，该系统最终将在网络中运行。需要注意的是，区块链层并不与\
  \ iEx.ec 的每一层都交互。分布式云层通过一个名为 `XtremWeb-HEP` 的中间件进行更直接的管理。这是一个资源管理层，由任务调度器和经过验证的数据存储库组成。调度器负责协调区块链与将任务分配给宿主机上工作节点之间的活动。数据存储库包含来自金融和基因组学等不同领域的大型数据集，这些数据集可供买方想要执行的应用程序访问。买方连接到资源管理层，并提供任务描述以及数据源。此信息也会记录在区块链上。中间件的两个组件都连接到已部署的工作节点，使用该描述并执行任务。最终结果由中间件收集，并在支付记录到区块链后提供给买方。最后一层是分布式的矿工云。请注意，这里我们不需要主模块，因为中间件执行该功能。任务在容器或虚拟机中执行，结果报告回资源层。这降低了网络的整体复杂性，因为在宿主机上运行的唯一代码就在容器中。\n\
  \n## 总结\n\n在本章中，我们从 HPC 应用的角度审视了以太坊代币。我们首先介绍了将代币作为以太坊应用引入的市场效用和基本原理。然后，我们讨论了一种名为\
  \ `ECM` 的原型 HPC 代币。该代币执行在计算市场中所需的所有基本功能，在该市场中，客户可以从由专用买方运营的集群购买计算能力。该代币允许在一个透明的计算能力市场中进行争议解决和链上验证。接着，我们深入探讨了更复杂的计算代币，例如\
  \ `Golem` 和 `SONM`。我们详细描述了这两者，涵盖了主要的技术进步以及这两个代币彼此之间的差异。最后，我们通过介绍基于经过多年测试的分布式云计算软件的\
  \ iEx.ec 来结束本章。`iEx.ec` 团队实现了一个去中心化版本的 `Xtreme-Web HPC`，以执行与 `Golem` 和 `SONM` 相同的任务，并启用一个计算市场。\n\
  \n"
- "# 8. 科学中的区块链\n\n基于证据的临床科学目前正面临一场令人瘫痪的可重复性危机。从临床心理学到癌症生物学，最近的元研究表明，研究人员无法重复其同行发表的研究成果的情况有所增加。这个问题不仅限于实验室中发生的实验台工作；它还困扰着从实验台到临床的转化研究。治疗方法、测试和技术从简单的实验室实验转变为影响数百人的\
  \ FDA 批准的设备和检测方法。因此，可重复性对于将科学突破转化为实用的补救措施至关重要。\n\n区块链技术在新兴的开放获取科学领域中的主要作用是提高这些流程的透明度。为此，本章介绍了三个用例和应用：第一个涉及临床试验数据的保存，第二个涉及可以为致力于开放研究的科研人员和机构开发的声誉系统，第三个涉及用于追踪假药的供应链管理应用。在这些用例中，我们提供了大量正在进行的工作示例，这些工作将极大地塑造区块链在科学领域的世界。我们将首先讨论当前的研究方法范式和负面数据的重要性；我们的重点将主要局限于临床科学。然后，我们将讨论目前用于衡量已发表研究影响力的传统指标和替代指标系统。这将使我们能够过渡到补充传统指标的用例，并扩展它们以使开放科学成为一个基本特征。最后，我们将通过审视将区块链融入现有研究基础设施的持续努力来结束我们的讨论。\n\
  \n\n\n## 可重复性危机\n\n让我们首先讨论在科学论述和研究中*可重复性*的含义。研究领域的重要基石之一，是能够遵循某项研究中记录的实验方案，使用其中记录的方法进行实验，并得出与该研究结果相同的结论。换句话说，一项已发表的研究可以被其他研究人员独立验证，并重复获得相同结果。近期临床科学的元研究表明，越来越多已发表的研究在实验上不够严谨，以至于难以被轻松重复。Leonard\
  \ P. Freedman 及其同事估计，超过 50%的临床前研究无法从动物模型转化到人体临床试验，因此仅在美国，不可重复性造成的年成本就约为 280 亿美元。其后果是，由于动物模型中的临床前发现很少能在临床试验中重现，药物发现的步伐已经放缓，成本急剧上升。经济成本十分沉重，因为每年有近\
  \ 2000 亿美元因无法重现已发现的靶点而被浪费。这些问题通常源于特定研究的设计，或是在不同细胞系实验中出现的非常复杂的、难以避免的纠纷。要理解其原因，我们必须到元研究中寻找答案。元研究是一个研究分支，它通过统计方法评估一项研究中的主张、结果和所进行的实验。\n\
  \n学术界众多因素正共同催生一种博士 Ben Goldacre 所称的“不良科学”的恶性文化：研究资金日益匮乏、“不发表就出局”的文化潮流，以及年轻研究人员在获取终身教职方面面临的巨大压力，这些都迫使他们采用错误的方法，最终导致不可重复的论文发表。在某些情况下，草率的研究方法和数据篡改甚至导致了欺诈和论文最终被撤回，给研究人员本人带来严重后果。\n\
  \n**注意**\n\n`Retraction Watch` 是一个近期出现的博客，旨在报道各个层面发生的科研不端行为，从与期刊合作的编辑到大学的个别研究人员。该博客还追踪那些因数据造假或实验证据篡改而从期刊上被撤稿的论文。感兴趣的读者可以访问他们的网站，该网站每年会发布约\
  \ 500 至 600 条撤稿信息。\n\n学术期刊也对这一乱象负有一部分责任，尽管有迹象表明相关工作正迎来真正的改变和改善。在过去几年里，在期刊上发表关于潜在药物靶点或特定药物有效性的阳性结果研究变得相对容易了。然而，来自实验的阴性结果，例如一个药物靶点尽管预期有效但实际上并未起作用，却极难发表。从表面上看，这似乎有道理：谁会想知道实验失败了？基于类似的理由，阴性数据通常会被忽略。而从市场营销的角度看，一家期刊宣称某种疗法未达预期，并非吸引读者的卖点。让我们更仔细地审视阳性与阴性数据在期刊塑造其使用与发表方式中的背景。\n\
  \n阳性数据只是对初始假设的证实，即研究者预测了某个发现，而数据验证了它。另一方面，阴性数据则来自未观察到预期或期望效果的情况。如果一个实验显示零假设和备择假设之间没有差异，那么这些数据和结果很可能最终会被埋没在实验室小组未发表的结果堆中。图\
  \ 8-1 非常简略地展示了一种处理阳性与阴性数据的错误研究方法，这种方法正是学术界压力下的产物。为了追求高需求、有吸引力的药物靶点，重复性被牺牲了，而这些靶点最终往往无法很好地转化为临床试验，并导致更多的经济损失。\n\
  \n![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig1_HTML.jpg](img/430562_2_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1** 研究发表背景下阳性与阴性数据概述\n\n在图 8-1 中，我们看到了假设检验的一个简单演示，它导致了“侥幸结果”的发表，这些结果在转化研究或大规模临床试验中是无法复制的。由于在学术期刊上发表论文的性质，阳性数据通常意味着你的工作完成了。大多数研究人员会在此止步，而不会费心去跟进在实验过程中收集或生成的数据中那些可观的部分。这可能包括关于某个不奏效的想法的潜在阴性数据，或因评审反馈而被省略的信息。一旦研究论文被接收，论文作者就没有进一步的动力去发布更多数据或投入更多时间来整理并提供其他结果。这最终导致了一些有害的后果，我们将在本章后面讨论。\n\
  \n国际上的期刊已经观察到了这些趋势，出版商们开始采取行动。大量新的倡议正在提高出版物中可包含数据的标准，以及为确保可重复性而必须满足的设计考量。我们在此讨论其中三项努力：\n\
  \n- **最低发表标准：** 印刷期刊对版面有特定要求，研究论文的每个部分只能分配有限的页数。在这种情况下，研究人员更侧重于提出大胆的主张，并展示能为其假设提供证据的数据。这通常是以牺牲“方法”部分为代价的，而该部分正为其他研究人员提供遵循以复现实验的指导。最近，大多数期刊已转向线上，版面已不成问题；然而，即使提供了补充材料，其质量仍然欠缺。`BioMed\
  \ Central` 发布了一份清单，列出了论文发表前必须满足的最低标准。这份清单的目的是提供一定程度的标准化，以便研究人员在撰写论文时能考虑特定标准，从而提高可重复性。如果满足所有标准，那么已发表的研究在更大程度上被重复的可能性就很高。\n\
  \n**注意** 更多知名期刊增加了数据共享声明，以说明数据集将在何处提供以及共享何种类型的数据。例如，`Cell Press` 创办了一份新期刊，用于发表经过同行评审、具有可重复性且方法透明的研究成果，名为\
  \ `STAR protocols`。同样，`EQUATOR` 网络也为科学报告中发表的数据制定了关于质量标准的结构化指南。\n\n\n\n### 数据发现索引\n\
  前文提到的主要问题之一是缺乏激励研究者共享补充数据的机制。美国国立卫生研究院（NIH）已着手创建一项名为“数据发现索引”的新指标，以表彰研究者上传额外实验数据的行为。这是一个可被引用的数据存储库，研究者可在此公开与自身研究相关的更多数据点。对于学术研究者而言，其重要激励在于能为工作赢得更多引用，而这反过来又成为已发表研究影响力的衡量标准。通过将数据库设为可引用状态，NIH\
  \ 创造了新的激励因素，促使研究者投入额外时间和资源来上传未发表的数据库。\n\n### 可重复性项目\n开放科学中心与科学交换机构合作，将针对 2010 年至\
  \ 2012 年间癌症生物学领域的高影响力研究，在科学交换机构成员的协助下对每项研究进行重复验证。关于重复实验、发现药物靶点等尝试的完整报告将连同详细方法一同开放获取。该项目分两个阶段进行：第一阶段最终形成一份注册报告，记录执行特定实验的标准化方案；第二阶段由科学交换机构的成员机构之一依据注册报告开展实验并记录结果。最终，报告与数据将由*eLife*期刊的审稿人进行同行评审，并在线上公开发布。\n\
  \n这三项举措是大规模协同提升研究可重复性的范例，未来还将涌现更多类似行动。至此，我们已探讨了学术环境中导致阴性数据与阳性数据区别对待的问题（这恰是可重复性危机的核心）及其引发的困难。接下来，我们将开始讨论药物试验中数据操纵引发的更严重后果。临床试验的数据点决定了将影响数千人命运的药物的最终走向。获取所有相关数据，不仅对于准确开具处方至关重要，也有助于规避已被探索过的误区和途径。\n\
  \n> **注意**  \n> 本·戈德埃克尔博士曾在 TED 演讲中讲述了 20 世纪 80 年代上市的药物洛卡尼的故事。该药本是一种抗心律失常药，旨在预防心脏病发作患者出现心律异常。在一项针对不到一百名患者的小型临床试验中，不幸有十人死亡。该药物被视为失败品，商业研发随之停止。这次失败试验的数据从未发表。在随后的几年里，其他制药公司对类似的抗心律失常药物产生了想法，并将其推向市场。据估算，约有\
  \ 10 万人因此死亡，因为这些新药同样导致了更高的死亡率。1993 年，最初于 1980 年开展那项研究的几位研究者站出来发表了道歉声明，称他们当时将增加的死亡率归因于早期试验中的偶然因素。如果这次失败试验的数据当时得以发表，本可提供早期警示，从而避免后续的死亡事件。这只是发表偏倚造成极其严重后果的一个例子。我们将在下一节讨论这种情况的普遍化版本。\n\
  \n## 临床试验\n\n我们已经描述了因临床试验数据报告存在缺陷而可能引发的若干复杂情况，接下来将开始勾勒一个潜在的解决方案。本节中，我们将聚焦三个具体问题，并为每个问题提供区块链技术的集成用例：\n\
  \n### 试验注册\n在临床试验启动时进行注册、及时提供更新信息，并将相关结果存入公共数据库，对于那些标准药物无效的患者而言，是提供新药临床试验的关键。尽管涉及人类参与者的大规模临床试验应当注册，但现实情况往往是这些试验杳无音信。未注册试验数据的唯一迹象，是一份出版物或若干高度剪裁、旨在证明拟议候选药物有效性的论文。此类发表偏倚会以危险的方式误导临床医生；因此，我们需要激励研究者定期提交已注册临床试验的进展报告及所有相关临床方案。\n\
  \n### 药物疗效比较\n如今，在大多数临床场景下，临床医生可选的药物种类越来越多，但往往缺乏头对头临床试验的证据来直接比较一种药物相对于另一种药物的疗效或安全性。计算模型允许通过一种称为“混合治疗比较”（MTC）的分析方法并行处理大型数据集。这些模型利用贝叶斯统计学整合某药物的可用数据，生成一份比较多种药物的探索性报告。随着更多数据从未发表或不可获取的信息孤岛中被解放出来，这可以成为自动化比较的基础。近期，人们对在临床试验中采用伞式方案越来越感兴趣。这类方案同时针对一种疾病测试多种治疗干预措施，并收集大量的比较数据。\n\
  \n### 后期处理\n在某些情况下，当一项试验已注册并随同出版物提供了部分补充数据时，注册库往往更像一个数据倾倒场，而非有条理的数据仓库。近期，我们看到了更多精心准备并发表的后期分析摘要；然而，这通常是例外而非惯例。关键在于，一旦临床试验数据与区块链链接，它便可以被纳入自动化工作流程，后期分析摘要/数据从而可以由算法而非人来生成。一个通用的数据存储后端可以促进前端客户端的开发，这些客户端读取区块链，并使用相应的公私钥对，从外部来源下载附加数据，并在本地进行后期处理。之后，摘要报告可以被附加回区块链。\n\
  \n> **注意**  \n> 苏恩克·巴特林与德国海德堡的一些合作者一直致力于利用区块链技术进行开放科学创新。最近，他们创立了一个名为“科学区块链”的智库，旨在加速区块链技术在开放科学领域的应用。感兴趣的读者可以访问他们的网站了解更多信息：`blockchainforscience.com`。\n\
  \n\n\n让我们讨论一个利用区块链提高临床试验透明度的典型解决方案。我们将使用彩色币（colored coins）的实现，将来自临床试验的补充数据上链。`Bitcoin-core`\
  \ 的脚本语言允许将少量元数据附加到区块链上。彩色币正是利用了这一特性，通过将静态元数据附加到区块链上，来代表具有现实世界价值的资产。从这个意义上说，彩色币利用了区块链存储虚拟资产的能力。我们将使用彩色币作为一种机制，引入稀缺性，并激励网络用户上传辅助临床数据并提供定期更新。就我们的目的而言，有三个组件使彩色币与众不同：\n\
  \n- **着色方案（Coloring scheme）：** 在区块链上对彩色币数据进行编码或解码的编码方法。\n- **资产元数据（Asset metadata）：**\
  \ 附加到彩色币交易并存储在区块链中的实际元数据；接下来我们将看一个例子。新的彩色币协议允许通过使用 torrent 密钥（提供去中心化方式共享和存储数据）将潜在无限量的元数据附加到彩色币交易中。\n\
  - **规则引擎（Rule engine）：** 过去，元数据仅包含添加到彩色币的静态信息。但最近，新增了一个规则部分，该部分对由[规则引擎](https://github.com/Colored-Coins/Colored-Coins-Protocol-Specification/wiki/Rules)支持的额外逻辑层进行编码，从而为彩色币解锁了智能合约功能。目前，支持四种类型的规则，我们将对此进行讨论。\n\
  \n以下是可添加到彩色币交易中的元数据的通用语法：\n\n```\n{\nmetadata: {...静态数据放在这里...},\nrules: {...规则定义放在这里...}\n\
  }\n```\n\n在我们的解决方案中，我们将使用规则引擎中的两条规则：过期规则和铸币者规则。过期规则用于借出资产，它规定了资产的生命周期。到期时，资产将返还给最后一个拥有有效到期日的输出（一个有效的比特币地址）。铸币者规则授予接收方发行更多相同资产的权利。因此，收到彩色币的铸币者可以进一步向网络上的其他人发行更多彩色币。在此区块链经济实例中，这两条规则在引入稀缺性方面都发挥着重要作用。稀缺性扮演什么角色？要理解这一点，我们需要介绍另一条规则：持有者规则。当发行资产时，持有者将在资产发行规则集中被描述为允许持有该资产的地址。\n\
  \n图 8-2 直观地描述了研究人员和铸币者之间的互动流程。研究人员注册一项临床试验并提供定期更新，而铸币者则确认更新，发行新的彩色币，并在试验进入下一阶段时请求未来的合作。让我们一步一步地讲解图\
  \ 8-2。临床试验始于我们的研究人员注册该试验，这启动了一笔从铸币者到持有者（我们的研究人员）的创始交易。这笔交易附带了一条过期规则，从某种意义上说，这是为给定临床试验的多个阶段之一提交相关数据的截止日期。研究人员必须向铸币者发送一笔彩色币交易，其中包含指向包含更新或新数据的元数据的\
  \ URL。当铸币者收到这笔交易时，系统会评估资产是否已过期，并输出评估结果。我们将在下一节中回到这个结果。在这笔返回交易之后，铸币者为下一阶段向持有者发行更多彩色币，并且循环重复。试验的每个阶段都会导致更多数据\
  \ URL 被附加到持有者发送的元数据中，作为持续更新的标志。\n\n**提示**\n\n彩色币协议的规则引擎也是不直接存储在区块链上的元数据的一部分；相反，它使用\
  \ torrents 以纯 JSON 格式存储。[Torrents](https://en.wikipedia.org/wiki/BitTorrent) 提供了一种去中心化的数据共享机制，并使规则能够与区块链外部的对象进行交互。我们在这里将铸币者抽象为一个预言机；然而，实际的实现将涉及自动评估器和智能合约的混合体。\n\
  \n图 8-2 中可视化的整个过程可以被类比为构成我们浏览器中安全客户端-服务器交互和对称加密基础的 `SSL-handshake`。也许在未来，我们可以推断，如果这种类型的交互变得常见，它可能成为彩色币钱包的一个功能。对铸币者收到的数据的评估可以公开进行，使用一个将结果返回给钱包软件的附加组件。未来，这种模块化附加组件设计将使新的协议能够集成到钱包客户端中。\n\
  \n![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig2_HTML.jpg](img/430562_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n铸币者与持有者之间的互动\n\n图 8-2 所示的过程可以通过强制执行到期来人为地制造稀缺性。持有者（研究人员）必须返回一笔包含对应更新的数据\
  \ URL 的彩色币交易。铸币者对持有者的状态进行评估，然后确认收到更新。为下一轮更新发行新的彩色币，整个循环重新开始。评估器结果被输出，并用于构建声誉系统，我们将在稍后对此进行讨论。\n\
  \n既然我们已经讨论了彩色币的交互，让我们看一下图 8-3 中的整个临床试验系统。\n\n![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig3_HTML.jpg](img/430562_2_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n区块链整合到临床试验工作流程的总结\n\n在图 8-3 中，流程从注册和提交一份关于临床试验将涉及的内容、使用的方法以及预期数据/结果的概要开始。在试验开始前，概要信息连同经批准的方案被附加到区块链上。这完成了注册过程。\n\
  \n\n\n### 彩色币与规则引擎\n\n`彩色币`与规则引擎用于管理研究人员提交的数据更新。这些更新在通过轻量级的隐私保护检查后，会被追加到区块链上。当临床数据进入公共后端后，最重要的好处或许在于，焦点可以从持有数据库的后端客户端，转向单纯开发能够读取区块链的前端客户端。数据管理将在区块链内部自动完成——我们需要的是一个能够读取元数据中遗留的标签或面包屑的机制，从而知道从外部位置提取哪些内容进行进一步处理。图\
  \ 8-3 所示的后处理单元就是一个例子。该单元包含适当的公私钥对和权限，用于读取区块链并访问外部位置。当向区块链追加数据更新的同一脚本中，还包含一段用于后处理的代码段，它告诉后处理单元如何将来自多个第三方位置的数据整合到一个本地集合中。\n\
  \n之后，会使用后分析统计方法来确定所追加数据的质量，并可以自动生成一份报告，该报告会按给定时间间隔总结试验的进展情况。研究人员应提交数据更新的间隔时间，以及如何处理已提供数据的说明，都被编码在一个脚本中，并提供给后处理单元。\n\
  \n## 信誉系统\n\n让我们重新审视稀缺性这个概念。它对于我们构建临床试验系统至关重要；然而，引入具有到期规则的`彩色币`也让我们能够构建另一个组件：信誉系统。信誉的前提很简单，就是跟踪对到期规则的遵守情况。回想一下，我们在评估器函数中构建了一个导出功能，这里我们可以利用导出函数作为一种计数机制，来奖励那些积极发送定期更新的研究人员（或彩色币协议中的持有者地址）。在实际应用中，这个导出计数器会在定期更新建立后由铸币者添加到元数据中。由此，建立信誉就成了一项简单的任务：更高的导出计数器对应着更好的信誉。\n\
  \n需要注意的是，在我们的临床试验系统中，信誉只是作为设计的一个属性而涌现出来的，但它对于可重复性有着深远的影响。高信誉表明一个机构或研究团队对质量控制的投入程度。一旦信誉机制在区块链上实现全网覆盖，它就可以被外部引用：第三方服务可以请求与特定彩色钱包关联的信誉评分。这可以简单到通过一次\
  \ API 调用来返回某个钱包的`rep_score`。这有什么用呢？在之前的讨论中，我们提到了数据发现索引（`DDI`），现在我们希望扩展`DDI`的概念，使其从仅仅是一个数据仓库，变成一个带有`rep_score`标签的仓库。这可以为`DDI`提供另一层粒度：为与临床试验相关的、可供公众使用的数据集附加信誉评分（高或低）的标签。请记住，在此设计中，来自临床试验或更新的所有数据都存放在`DDI`仓库中；然而，`rep_score`通过彩色币交易存在于区块链的元数据中。图\
  \ 8-4 描述了每次定期更新时发生的顺序评估，以及`rep_score`中信誉的增量增加。\n\n![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig4_HTML.jpg](img/430562_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n`rep_score`随每次定期更新而增加的概览\n\n评估器函数会检查到期规则，以及持有者提交的彩色币交易是否包含元数据中对应更新的 URL。如果这两个条件都满足，则更新持有者钱包的`rep_score`。这种缓慢的增长使得信誉能够随时间逐步建立，并且`rep_score`参数可以以区块链无关的方式被外部服务引用。API\
  \ 调用可以成为将最新的`rep_score`附加到`DDI`所存储的数据库的默认方式。\n\n现在我们对`rep_score`机制有了更好的理解，接下来让我们看看完整的信誉系统。图\
  \ 8-5 全面描绘了信誉系统及其对全网成员的影响。\n\n![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig5_HTML.jpg](img/430562_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n\n信誉系统\n\n\n\n图 8-5 从区块链记录彩色币协议中铸币者与持有者角色之间的彩色币交易开始。每当持有者提供更新且铸币者对其进行评估时，这些彩色币交易便发生。在首次更新后，铸币者将\
  \ `rep_score` 作为返回的彩色币交易的一部分发送出去，以继续临床试验的更新流程。此时，声誉会在每次交换中被附加到元数据中，而 `rep_score`\
  \ 也会随之每次修订。该分数最终可能成为持有者钱包的一项属性，并以此方式在区块链外部被引用。当临床试验成熟到能够生成足够多的更新，并可将这些更新汇编成一份全面概述时，后处理单元便变得至关重要。此单元的作用是自动执行质量控制统计计算，并遵循临床试验开始时添加到区块链的脚本中的指令来分享更新。类似地，后处理单元将汇编一份最终摘要，并将其附加到机构的页面上，同时附上临床试验分享的所有更新。\n\
  \n> **注意**  \n> 必须指出，后处理和数据存储均为链下完成的功能。区块链上不执行任何计算或数据操作。我们应尽可能将区块链可执行代码限制在仅包含必要原语的范围内。唯一与链上交易或元数据交互的工具，是用于更新变量或参数分布式状态的那些工具。\n\
  \n在过去的几年里，在为科研工作（包括开放出版和数据存储）构建专门的声誉系统方面已取得更重要的进展。以下回顾了三个此类项目：\n\n* **Augur** 是一个基于以太坊区块链构建的预测平台，以\
  \ `ERC-20` 代币形式存在。Augur 由一种名为 `REP` 的声誉代币驱动，该代币因在平台上进行准确报告而作为奖励获得。网络成员通过参与对事件结果的准确报告来赚取声誉（`REP`），这成为一种激励措施。随着时间的推移，用户间\
  \ `REP` 积累的记录会催生出一组可靠用户，他们更有可能做出准确预测：这是一种群体思维模型，其中群体智慧在预测结果时呈现出富有成效的形态。Augur 包含四个组件，用于在网络上传播声誉：一个供网络成员提交结果预测的平台、一个为准确预测奖励积分的评分机制、一个将积分汇总为声誉等长期参数的共识框架，以及最后负责维护网络安全和完整性的监督者群体。这些特性也使得\
  \ Augur 适合在一个去中心化市场中用于新一代科学假设/预测。\n\n* **学术背书系统（AES）** 是构建在区块链上的一个声誉系统，它使用学术背书积分（`AEP`），而\
  \ Augur 则使用 `REP`。`AEP` 被授予那些值得背书和公开推广的科学成果。但与 Augur 相比，AES 更全面地针对科学出版物和科研工作而构建。授予某个研究项目的\
  \ `AEP` 数量基于其过去获得的 `AEP`。这是一种对曾产出获得大量背书成果的研究人员的奖励。通过这种方式，产出高质量工作的研究者获得更多 `AEP`，并因此更有动力分享更多高质量成果。`AEP`\
  \ 作为一个全局声誉参数，未来或许能被期刊与更传统的引文指标（如 `H-index`）一同使用。\n\n* **PEvO（链上发布与评估）** 是一个基于 Steem\
  \ 的去中心化社交媒体平台，内容创作者可以直接与科学研究作者沟通。在此平台上，作者可以分享更新、上传新内容、回复评论，并将评审整合到研究的持续更新中。这创造了一种已发表论文的扩展形式，使其成为一份“活文档”，并且更新记录可以在驱动\
  \ Steem 的区块链上被追踪。此外，在 PEvO 上的互动会为作者带来报酬（以代币形式）。这激励作者参与讨论，而有意义的对话对整个科学界都有帮助。\n\n\n\
  \n### 药品追踪\n\n本章最后一个用例涉及通过供应链管理框架追踪药品。处方药监测项目是控制\"药贩子\"行为的关键要素。梅奥诊所将\"药贩子\"定义为患者在没有告知医生其已有其他处方的情况下，从多位医疗从业者处获取受控物质（通常是麻醉药品）的行为。这种行为会导致大规模药物滥用或非法销售。梅奥诊所将\"\
  药贩子\"行为归因于以下三个因素：\n\n*   **数据时效性差：** 药房或医疗服务提供者将处方数据上传到现有中央系统的频率有多高？基于区块链的后端系统将使与所有交易相关的药品立即对所有网络成员可见。\n\
  *   **可靠性：** 与本质上去中心化的区块链相比，中心化数据库存在单点故障，因此数据不依赖于单一数据库，使其更加可靠。\n*   **数据检索复杂度高：**\
  \ 当前的数据检索模式及其与现有医院系统的兼容性已完全失效。医院通常无法与药房使用的数据库同步，而更新是一项艰巨的任务。区块链通过提供一个供外部服务读取的公共后端，使这一过程变得通用。\n\
  \n在该系统中，当临床医生开具处方时，医疗服务提供者可以查询区块链，以查找患者任何当前有效处方的记录。这有助于临床医生判断患者是否正在从多个来源获取处方，或者是否有其他家庭成员正在获得相同的处方。来自不同医疗服务提供者的有效处方将自动使新的处方请求失效，这可以在网络中以双重花费请求的形式进行编码。否则，交易将通过，药房将收到向患者提供药物的请求。提出请求的医疗服务提供者和患者可以对交易进行签名，从而可以在特定患者的整个护理过程中实现更好的追踪。尽管这个系统看起来很简单，但它满足了《药品供应链安全法案》（DSCSA）兼容系统的大部分要求，可以在各医疗服务提供者之间实施。IBM\
  \ 和德勤区块链实验室等主要区块链参与者正在努力控制阿片类药物过度处方的问题。最近，一些专注于仅使用区块链进行药品追踪的初创公司也应运而生。\n\n尽管供应链管理最贴合区块链的基础设施，并且可以开箱即用，但这个领域非常新，技术也尚不成熟。随着新技术的出现，使得前所未有的通信层成为可能，药品追踪和开放科学的未来看起来更充满希望。即使区块链的作用仅此而已，它也已经成为了开放科学探究与讨论中新创新的巨大催化剂。\n\
  \n在撰写本文时，美国食品药品监督管理局（US FDA）正与加州大学洛杉矶分校健康中心（UCLA Health）合作，启动一项名为 `BRUINchain` 的试点研究。该试点的结果已发表在\
  \ *Blockchain for Healthcare Today* 上，我们希望分享来自 `LedgerDomain` 的 Ben Taylor 在一篇博文中撰写的一些见解：\n\
  \n> *作为由美国 FDA 委托并经同行评审的研究的一部分，该研究发表于* *Blockchain in Healthcare Today* *（*[*https://doi.org/10.30953/bhty.v3.134*](https://doi.org/10.30953/bhty.v3.134)*），`LedgerDomain`\
  \ 与 UCLA Health 联手部署并测试了 `BRUINchain`，这是一个由真实护理人员使用的、基于区块链的“最后一公里”解决方案，用于帮助分发救命药物。该研究是同类研究中的首批之一，它精确揭示了区块链仅凭一己之力就能如何为药房节省数十亿美元的劳动力成本和安全库存成本。在这篇文章中，我想反思一下这项研究的主要结论，以及如何将它们映射到新的健康领域。*\n\
  \n> *有关 `BRUINchain` 的背景信息，请点击* 此处 *（*[*https://www.youtube.com/watch?v=mppc2Qvqrdc*](https://www.youtube.com/watch%253Fv%253Dmppc2Qvqrdc)*）。*\n\
  \n> **药品供应链的现状**\n\n> *在当今的药品供应链中，每个交易方通常管理着自己的数据库系统。这些私有数据库使各方能够最大限度地减少外部安全威胁，同时最大限度地提高内部数据一致性。然而，这也意味着缺乏一个共享的全局记录系统来作为描述药品供应链中物品流动的唯一真实来源。这使得整个供应链更容易受到常见的攻击媒介，例如中间人攻击或欺骗。*\n\
  \n> **为什么药品供应链要使用区块链？**\n\n> *根据《药品供应链安全法案》（DSCSA），三年内，美国的药品供应链将整合到一个电子、可互操作的系统中，用于识别和追溯在全国范围内分销的处方药。DSCSA\
  \ 的核心要求之一是处方药必须具有唯一的产品标识符，该标识符采用二维条码的形式。*\n\n> *我们意识到，这些联邦政府强制要求的条码可以成为通用数据模型的基础信息构建块。与区块链相结合，这可以实现一个记录系统，减少在数据完整性和隐私性与全局可视性和可解释性之间进行权衡的需要。通过这种方式，区块链可以成为数百家制药和生物技术企业及其供应商协作并与数百家批发商和数万家配药机构沟通的通用真理来源。*\n\
  \n> **BRUINchain 试点应用**\n\n> *我们研究的基石是 `BRUINchain`，这是一个基于区块链的移动解决方案和通知系统，旨在使用 FDA\
  \ 规定的条码来追踪和追溯配药机构内部药物保管权的变更。通过将区块链与商业现成技术相结合，`BRUINchain` 使得在繁忙的医院或社区药房追踪和验证药物成为可能。*\n\
  \n> *从收货区到患者给药，护理人员使用 `BRUINchain` 移动应用程序扫描唯一的二维药品条码。在流转过程中，药物会通过一系列检查，直到最终被施用于患者。新的条码会被发送给交易伙伴进行验证，而问题药物则会被暂扣不予发放。开处方者可以随时查看药物从药房到诊所的进展。*\n\
  \n> **BRUINchain 的经验与成果**\n\n> *`BRUINchain` 试点为我们提供了重要的见解，让我们了解到更大规模的 DSCSA 验证系统实施会是什么样子。它也验证了在严重依赖遗留系统的药房中使用商业现成技术的可行性。使用商业现成技术，条码扫描的效率接近\
  \ 100%。药物可以在非常精细的级别上进行追踪。该系统能够追踪有效期、验证条码，并使药剂师更容易检查问题并报告问题。*\n\n> *在研究过程中，我们发现，一个实时的区块链系统可以大幅降低\
  \ DSCSA 合规的实施成本——为美国配药机构每年节省 1.83 亿美元，并成为抵御不良或欺诈交易的坚实堡垒。实时验证还将最大限度地减少配药机构在潜在隔离事件中需要保留的安全库存量，从而释放出\
  \ 200 亿美元的库存资金。*\n\n\n\n### 摘要\n\n本章首先概述了可重复性问题及其在循证科学领域造成的严重经济损失。随后，我们讨论了当前科学界的解决方案及其不足之处。之后，我们描述了利用区块链构建信誉系统的构想，并涵盖了三个用例：临床试验、信誉网络，以及从生产环节开始的药品追踪。所有用例都突显了区块链在追踪和问责方面相较于传统方法的优势。\n\
  \n"
- "# 9. 区块链在医疗健康领域的应用\n\n医疗健康产业是一个价值 3 万亿美元的行业，其中每年约有 1 万亿美元被浪费。随着老龄化人口中慢性病患病率的持续上升，护理协调正变得日益复杂。在许多情况下，医疗保健提供者现有的技术并不足以全面记录所提供护理的各个方面。其结果是各方之间信息传递不畅，最终降低了为患者提供的护理质量。这很大程度上归因于医疗机构使用的遗留系统、缺乏与非特定供应商技术的集成、基于纸质病历，以及医疗专业之间的横向信息传递不足。医院正在投入大量资源，重复进行那些本可由先进技术基础设施完成的工作，这加剧了使用设计不当系统的低效性。在本用例中，我们将从各自的激励机制和服务角度讨论支付方-提供方-患者模型，以及该模型在不久的将来可能发生的变化。接着，我们将介绍区块链如何整合到患者从首次就诊到最终诊断和治疗方案的整个工作流程追踪中。我们将介绍区块链整合所能实现的两个新特性：组件热切换和医疗数据整理。然后，我们呈现一个使用区块链进行医生资格认证的用例。最后，我们将讨论医疗健康领域的浪费管理问题，以及\
  \ Capital One 与 Gem 为提高经济产出所做的努力。\n\n## 展望\n\n读者应如何阅读本章？以下是一些值得关注的学习目标：\n\n-   什么是支付方-提供方-患者模型？它如何应用于现代医疗保健系统？索赔流程在该模型中如何运作？我们将在本章后续部分回到区块链上的索赔处理。\n\
  -   我们能否设计一个基于区块链的患者工作流概念，用以记录患者从初级保健医生，到实验室检查，最终到专科医生的整个转诊过程？\n-   患者工作流如何展示权限和访问控制的管理？\n\
  -   什么是热切换？为什么它很有必要？有哪些可用的热切换实现方案？\n-   什么是医生资格认证？它在区块链上是如何运作的？\n-   当前医疗机构在医疗索赔处理方面存在的经济成本和浪费来源是什么？区块链能否减少这些经济低效并简化业务流程？索赔能否在同一处理医疗记录的区块链上进行处理？从医疗领域的区块链索赔处理中汲取的经验能否应用于相关的垂直行业？\n\
  -   DeepMind 的可验证数据审计（Verifiable Data Audit）在审计和记录处理方面与区块链相比如何？\n\n## 支付方–提供方–患者模型\n\
  \n支付方-提供方-患者模型是医疗健康领域三大主要参与者之间相互作用的标准模型。图 9-1 直观地展示了这些互动关系，在本节中，我们将详细阐述这三方各自的动机和收益。为简单起见，我们假设支付方主要是保险公司，提供方是医院系统或私人诊所，而患者则是由特定保险公司服务的随机样本群体。现在，我们可以开始考虑涉及该模型的不同场景：\n\
  \n![../images/430562_2_En_9_Chapter/430562_2_En_9_Fig1_HTML.jpg](img/430562_2_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1 支付方-提供方-患者模型的简化概览\n\n-   第一个场景是最简单的：患者直接为医疗程序及就诊向医院付费。这种仅涉及两方的直接系统目前仍是许多国家医疗体系的常态。在美国，医疗保健提供成本显著增加，因此该体系中出现了一个新的参与者。\n\
  -   第二个场景是美国当前的实施模式。患者向保险公司购买保险后，获得健康保障。这家保险公司随后获得更强的议价能力，为医疗程序设定可行的价格，并代表患者支付费用。提供方现在向保险公司（而非直接向患者）发送索赔以获取付款。通过这种方式，保险公司已演变为一个中心化门户，为患者消除系统中的障碍并获得个性化医疗保健。\n\
  -   第三个场景更多关乎医疗健康的未来，即整合新的提供方，这些提供方是通过远程医疗、离院监测和远程医生提供护理的专业实体。\n\n最简单的情况是患者直接向医院支付服务费用。但更复杂的医疗程序和实验室检测需要患者购买保险来覆盖。现在，保险公司代表患者支付所有医疗账单。提供方也直接将索赔发送给保险公司，而不是患者。这个模型是理解当今医疗系统巨大复杂性的基础，该系统涉及数百个其他参与者。例如，保险公司和医院相对于患者可以运营的领域在很大程度上受到政府机构的监管。而这些机构又受到经济力量和消费者需求的影响。\n\
  \n**提示**\n克里斯·凯（Humana 公司首席信息官）在 2016 年“分布式：健康”大会上发表了主题演讲，讨论了 Humana 公司为采用区块链技术以降低医疗处理成本并更高效地为其会员提供个性化护理所做的努力。他谈到了前述第二个场景的一个潜在演变路径，即区块链可以无缝地驱动提供方和支付方之间的资金流动，并将责任导向结果，而不仅仅是程序。将控制权交到患者手中，可以使他们获得更好的护理和满意度，同时利用区块链不会增加任何摩擦或额外成本。\n\
  \n区块链上进行索赔处理的基本原理是利用去中心化共识、去信任化交易和网络验证等特性，来设计能够降低间接成本和时间的工作流程。让我们来看一个涉及区块链使用的患者就诊工作流程。\n\
  \n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n### 患者工作流程\n\n我们的工作流程始于简因食用某些食物后感到胃部不适，前往她的初级保健医生处进行检查。她的医生怀疑是病毒感染，并要求进行化验。随后，她被转诊给一位专科医生，由该医生做出最终诊断，并与她共同制定治疗计划。此工作流程的每一步，作为简病历的一部分，都会被记录在区块链上，并附有关于访问权限和所有权的适当许可。此外，简的病历还会包含每一次签出和签入的历史记录，包括对病历所做的编辑和补充。密切追踪所有权的变更方式，有助于我们在为简提供的不同护理节点之间进行过渡，随着她的健康状况更加全面地呈现出来，她也能在每个步骤中即时访问自己的病历。\n\
  \n本工作流程的主要目的是演示区块链如何处理多方无关实体之间的权限和所有权转移。通过利用用户使用密钥进行签名的机制，创建了这个基础医疗记录系统。我们可以使用版本控制系统的术语来更好地理解工作流程中的属性和权限。就像`Git`或`SVN`有提交消息和代码提交一样，每一次向病历签入新数据时，都会包含关于更改内容的提交消息。区块链变成了一个远程仓库（类似于`GitHub`），`Git`可以向其推送新的更改。此外，还有锁定机制来保护数据：一旦病历中的某个文档被签出给某个用户（如医生或护士），该文档就会被锁定，在原始用户签入其编辑内容并解锁文档之前，其他用户无法向同一文档签入新的更改。图\
  \ 9-2、9-3 和 9-4 将引导我们了解此工作流程。\n\n![../images/430562_2_En_9_Chapter/430562_2_En_9_Fig2_HTML.jpg](img/430562_2_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2 — 患者初次就诊\n\n在图 9-2 中，工作流程始于简前往她的全科医生处进行常规检查。医生记录了病史，并记下了她在身体系统检查中发现的任何突出症状。他将这些信息添加到一个非常标准的患者病史记录方法中，称为`SOAP`笔记。该笔记将连同其唯一的\
  \ `哈希` 标识被添加到区块链中。除了 `哈希` 之外，医生还将添加用于访问病历的权限和用户组角色。最初，只有医生和患者拥有访问权限，但可以轻松地扩展。最后，该笔记使用医生的密钥进行签名，以表示简的病历初始提交到区块链。一旦简的记录被推送到区块链，她也可以立即访问它们。\n\
  \n![../images/430562_2_En_9_Chapter/430562_2_En_9_Fig3_HTML.jpg](img/430562_2_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3 — 简正在接受医生安排的化验\n\n在图 9-3 中，简的医生安排了一些化验，因此两天后，她前往一家化验室。化验结果已被录入她的病历，并添加了允许化验室护士访问详细信息的权限。医生可以轻松设置访问权限，并为护士新增对病历的上传权限。此工作流程始于简到达之前，当时护士检索了她的病历并开始准备化验。简到达后，他们进行了咨询，护士告知她将要进行的化验项目。化验完成后，生成报告并将其附加到区块链上简的病历中。我们可以在右侧看到，简的总体病历现在新增了关于最近所做化验的附加内容。所有这些结果在上传后，简都能立即获取。\n\
  \n![../images/430562_2_En_9_Chapter/430562_2_En_9_Fig4_HTML.jpg](img/430562_2_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4 — 简被转诊给专科医生\n\n在图 9-4 中，工作流程增加了一个新步骤：简决定去看专科医生，以便更好地理解化验结果。两天后，她将自己的病历共享给了一位专科医生。此时，专科医生有两个选择：她可以检查简的病历，并准备好诊断和治疗方案，甚至无需简前来就诊；或者，简可以前来咨询，并与专科医生合作采纳治疗方案。第一个选项可能有助于降低简的就诊和服务成本，因为治疗方案和诊断最终都将在区块链上提供给简。这完成了从她初次就诊到获得诊断的整个工作流程。从最初的笔记到最终的治疗方案，此工作流程的每一步都被记录在区块链上。然而，对于患有慢性病的患者来说，此后的病历将被转移到一个慢性护理机构，该机构可以定期检查简的情况，并帮助她保持良好的健康状态。\n\
  \n## 热切换\n\n`热切换`是一种由区块链实现的设计原则，旨在创建组件可以被替换而系统整体以最小延迟运行的网络。热切换的目的是重新路由信息流，这一概念之所以能够实现，完全得益于区块链的去中心化特性；即不存在单点故障。为什么我们还需要热切换这样的新概念呢？传统的调度器已经相当好地完成了这项工作。一个基于区块链的操作性医疗记录系统将需要与区块链同步的在线和离线组件。医院的\
  \ IT 基础设施应该非常稳定，停机时间最短，但热切换可以实现隔离的系统升级而不会造成中断，并逐步使仍在运行的遗留系统与区块链兼容。\n\n目前有两种热切换的早期实现：闪电网络和可插拔共识。那么，什么是闪电网络？闪电网络的\
  \ alpha 版本提供了一种通过新的微支付通道（子通道）发送交易的机制。这种价值转移发生在链下，从而使交易即时完成。这些通道最终与区块链上游同步，并维护整个网络的数据完整性。以类似的方式，链下通道可以根据预先批准的访问控制，复制并临时存储间歇性的访问请求和病历发布请求。在某个定义的时间段之后，闪电通道可以与区块链同步中间变更并变为非活动状态。热切换的第二个应用是可插拔共识，指的是你可以根据区块链上正在处理的交易类型来替换共识算法。例如，在公私分区区块链上执行的私有交易可能需要与通用交易不同的共识机制。因此，区块链上允许存在多种共识算法。我们将在后续章节中更详细地讨论可插拔共识的实现。\n\
  \n注意\n\n支付通道是以太坊 2.0 中热切换概念的一种实现。在设计区块链时采用模块化方式，为构建复杂应用以及与外部基础设施（如预言机或数据源）交互提供了显著优势。\n\
  \n\n\n### 医师资质认证\n\n资质认证是对医师专业档案进行整理和核验的过程。任何加入诊所或医师网络的医生都必须通过资质验证，这包括审查其委员会认证、教育背景、工作履历等信息。推动该应用场景实现的思维转变在于：企业家们意识到资质认证可以作为独立于医院系统的规范实体进行维护。当需要时，医师只需通过智能合约将档案转移至新医院，合约履行即完成验证。这一流程毫无摩擦，而区块链的应用还能加速支付与验证流程。以下是普华永道报告（`https://www.pwc.com/us/en/industries/health-industries/library/blockchain-could-accelerate-credentialing.html`）中揭示现有系统效率低下的摘录：\n\
  \n> *低效的资质认证流程给医疗机构和支付方都造成了高昂成本。优质医疗可负担性委员会（CAQH）估计，支付方每年维护医疗机构数据库的费用超过 20 亿美元，其中\
  \ 75%可通过建立单一可信来源（如区块链）予以消除。*\n\n> *每家诊所的每位医师平均每年需提交 18 份资质认证申请。每份申请耗时 80 分钟——包括员工工作时间\
  \ 69 分钟和医师本人时间 11 分钟。支付方随后还需花费时间和金钱核验这些申请材料。*\n\n> *全美医疗人员服务协会（NAMSS）估计，大多数医师资质认证耗时超过\
  \ 120 天，而健康计划注册则需要 60 至 180 天。*\n\n> *这些成本甚至尚未计入区块链可简化的另一项全系统负担：更新医师接诊地址及是否与特定保险公司签约或接收新患者的资质认证与名录维护。NAMSS\
  \ 估计，12%至 18%的医疗机构目录已过时，或错误地将某机构列为参与计划方。*\n\n> *CMS 最近对联邦医疗保险优势计划在线医疗机构目录的审计发现，其中\
  \ 52.2%的目录存在不准确信息。根据 CMS 2019 年度函件，其将对未纠正严重目录缺陷的联邦医疗保险优势计划组织启动执法行动。*\n\nProCredEx（`https://hashedhealth.com/blockchain-healthcare-solutions/professional-credentials-exchange/`）是\
  \ Hashed Health 的合作伙伴，目前正通过开发专业资质认证交易所来实践这一应用场景：这是一个基于区块链的医师资质认证信息交换平台。关于实施方案的更多信息可查阅\
  \ Hashed Health 服务页面。此处我们简要探讨通用资质认证交易所的概念及其在医疗机构与支付方场景中的价值：\n\n- 医师加入交易所并通过资质核验。核验结果存储于区块链上，交易所逐步建立资质数据库。随着时间推移，交易所将演变为医师名录，支付方即可快速查询保险签约状况及其他执业详情。查询产生的微量交易成本将成为区块链网络维护者的奖励。这种激励机制可与代币结合产生倍增效应，从某种意义上确保了响应的准确性。\n\
  \n- 医疗机构成为交易所合作伙伴，通过智能合约申请核验新入职医师资质。交易所自动化处理该流程，智能合约在区块链上无摩擦地完成履行，实现快速周转。网络验证者层将在智能合约完成后获得奖励。\n\
  \n- 同理，随着交易所扩展至拥有足够规模的医师群体，支付方也可与之建立合作。这将促使医师服务项目及保险公司合同的查询更加流畅，并为实现无摩擦预授权铺平道路。\n\
  \n\n\n### 浪费管理：Capital One、Ark Invest、Gem 的视角\n\n一场由 `Gem`、`Capital One` 和 `Ark\
  \ Invest` 主办的网络研讨会概述了困扰医疗系统的经济成本和间接费用问题。这场浪费问题是在理赔处理背景下，从支付方（保险公司）的角度被强调的。然而，此处汲取的经验教训可广泛应用于其他处理理赔的行业，例如汽车保险。例如，`Gem`\
  \ 宣布与 `Toyota` 合作，将其为医疗保健保险行业开发的应用移植到汽车保险领域。其愿景是利用区块链实现大部分保险理赔流程的自动化。在此，我们将总结小组成员提出的关键发现。在随后的讨论中，小组成员提出的每个问题以\
  \ `[P]` 表示，提出的解决方案以 `[S]` 表示：\n\n![images/430562_2_En_9_Chapter/430562_2_En_9_Fig5_HTML.jpg](img/430562_2_En_9_Fig5_HTML.jpg)\n\
  \n**图 9-5** 连续护理。此图显示了跨越各级护理提供者和社区服务的全面健康服务阵列。该图片取自 `Eccovia` 关于责任医疗组织的演示文稿，已获许可。\n\
  \n- `[P]` 对于医疗服务提供者收取的每一美元，有 15 美分用于理赔处理、促进各方之间的支付以及人工劳动成本。想象一下，对于一个 3 万亿美元的行业，这\
  \ 15 美分累积起来会是多少。\n- `[P]` 医疗服务提供者通过提高报销率来应对，而支付方（保险公司）则通过提高保费来应对。\n- `[P]` 医院正充当银行角色，为患者提供自付费用的贷款，但缺乏支持这种低效支付频率并吸收其影响的基础设施。\n\
  - `[P]` 对于作为贷款提供的患者自付费用，医院的收款率仅为 5%。\n- `[P]` 这些严重的低效问题导致医院在服务基准费率之上额外收取高达 45% 的保费。\n\
  - `[S]` 从好的方面看，缩短处理服务提供者理赔的时间可节省 230 亿美元。\n- `[S]` 降低账单周期中自付费用收款的波动性可节省 70 亿美元。\n\
  - `[S]` 利用区块链追踪带有历史记录的交易可以显著降低欺诈率，为保险公司节省约 3000 亿美元。\n- `[P]` 结算机构需要花费数天，有时甚至数周来处理理赔，增加了大量间接费用。\n\
  - `[P]` 服务提供者使用多种第三方软件工具来管理理赔。技术非但没有提供帮助，诊所反而面临更严重的碎片化问题，需要依靠人工来整合不同的软件。\n- `[S]`\
  \ 区块链可以追踪整个连续护理过程和账单周期，以减少相关方之间的摩擦。\n- `[S]` 在去中心化账本上，交易和理赔可以被非常高效地追踪，使得理赔解决几乎即时完成，即使不是几分钟内。\n\
  - `[S]` 像比特币区块链这样的公共账本无法使用，`HIPAA` 法律限制了患者信息如何通过数字渠道传输。最终的解决方案将是使用具有已验证节点的许可账本。这将导致只有获得许可的用户才能通过公私钥的使用来访问被追踪的医疗记录。\n\
  - `[S]` 智能合约负责在请求医疗记录的各相关方之间协调区块链上的权限和访问角色。并非每一方都能看到完整的记录，因为许可访问仅允许查看相关内容。\n- `[P]`\
  \ 医疗服务提供者并非 IT 专业人员，他们没有足够的时间为新系统提供培训；因此，互操作性仍然是一个主要问题。\n- `[P]` 缺乏互操作性的问题延伸至：\n\
  \    - 医疗系统中的患者登记\n    - 手术授权\n    - 医疗记录\n    - 共付额收取\n    - 理赔提交\n    - 患者账单\n\
  \    - 理赔与账单的核算\n- `[P]` 功能性与分区——理赔和医疗记录应放在同一条区块链上吗？小组成员谈到了 `Aetna` 的一个场景，该公司每年收到约一百万份来自服务提供者关于理赔信息的传真。这带来了管理这些文书工作的巨大行政开销。理想情况下，理赔和记录是相辅相成的。上传到区块链上的患者手术记录应触发一笔理赔需要处理。最终，通过适当的分区，将两者放在区块链上会更高效。\n\
  - `[S]` 如图 9-5 所示，锚定侧链的概念可能对于涉及多方的协同护理变得更具相关性。特定领域的侧链可以更好地促进访问权限的转移，然后与主链同步。图 9-6\
  \ 展示了一个非常基础的侧链原理图。\n\n当医疗记录在多方之间流转时，区块链可以简化信息流。在本节中，我们总结了 `Ark Invest` 和 `Capital\
  \ One` 发现的一些关于经济浪费的关键发现。尽管侧链仍处于非常早期的发展阶段，但图 9-6 给出了一个简单的图示。\n\n![images/430562_2_En_9_Chapter/430562_2_En_9_Fig6_HTML.jpg](img/430562_2_En_9_Fig6_HTML.jpg)\n\
  \n**图 9-6** 执行链下交易的简单侧链。此过程可用于快速授予许可访问权限和特权；最终这些交易会与上游链同步。\n\n\n\n## 可验证数据审计\n\n\
  谷歌的 DeepMind 正在开发一项有趣的类区块链服务，用于为使用其健康服务辅助临床诊断的医院提供审计日志。这些医院将敏感的患者数据传输至 DeepMind\
  \ 的机器学习和 AI 服务以进行临床预测，而该项目旨在确保数据的使用符合患者的知情同意。我们联系了 DeepMind 询问相关进展，经许可后，在此转载对“可验证数据审计”的概述。\n\
  \n> *数据可以成为推动社会进步的强大力量，帮助最重要的机构改善其服务社区的方式。随着城市、医院和交通系统找到理解人们需求的新方法，它们也发现了改变当前工作方式的机遇，并识别出面向未来的激动人心的构想。*\n\
  \n> *只有获得社会的信任和信心，数据才能造福社会，而我们在这方面都面临着挑战。既然数据可用于如此多的用途，人们不仅会问“谁在持有信息”以及“信息是否安全存放”，他们还想更确切地了解数据究竟被用来做什么。*\n\
  \n> *在这种背景下，可审计性成为一项日益重要的品质。任何构建良好的数字工具都会记录其如何使用数据，并在受到质疑时展示和证明这些日志。但我们让审计过程越强大、越安全，就越容易建立起对数据实际使用方式的真正信心。*\n\
  \n> *想象一项服务，它能对每一条个人数据的处理情况提供数学上的保证，且不可能被伪造或遗漏。想象能够实时检查该系统的内部运作，确保数据仅被用于应有的用途。想象支撑这一切的基础设施是免费开源的，这样世界上任何组织都可以按需构建自己的版本。*\n\
  \n> *这个项目的暂定名称是“可验证数据审计”，我们非常兴奋能分享更多关于我们计划构建的细节！*\n\n### 面向 DeepMind 健康的可验证数据审计\n\
  \n> *今年内，我们将开始为* [*DeepMind 健康*](https://deepmind.com/applied/deepmind-health/)\
  \ *构建可验证数据审计系统——这是我们为医疗服务提供技术，帮助临床医生预测、诊断和预防严重疾病的努力，也是 DeepMind 将技术用于社会公益使命的关键部分。*\n\
  \n> *鉴于健康数据的敏感性，我们始终认为，在治理方面应像在技术本身一样力求创新。我们已经通过任命一个由不领薪水的* [*独立评审员*](https://deepmind.com/applied/deepmind-health/transparency-independent-reviewers/independent-reviewers/)\
  \ *小组来对 DeepMind 健康进行额外监督，他们负责审查我们的医疗工作、委托审计，并发布年度报告公布其发现。*\n\n> *我们认为可验证数据审计是对这种监督的有力补充，为我们的合作医院提供额外的实时且经过全面验证的机制，来检查我们如何处理数据。考虑到个人医疗数据的敏感性，以及每次数据交互都需要适当授权并符合患者同意规则，我们相信这种方法在医疗领域将特别有用。例如，持有健康数据的组织不能简单地决定对用于提供护理的患者记录进行研究，或者将研究数据集用于其他未经批准的用途。换句话说：重要的不仅是数据存在哪里，更是数据被用来做什么。我们希望首次实现这一点能够被实时验证和审计。*\n\
  \n> *那么，它将如何运作？我们作为数据处理者为合作医院服务，这意味着我们的角色是根据医院的指令提供安全的数据服务，而医院始终保留完全控制权。目前，每当我们的系统接收或接触这些数据时，我们都会创建一条交互日志，以便日后需要时进行审计。*\n\
  \n> *通过可验证数据审计，我们将在此基础上更进一步。每次与数据进行交互时，我们都将向一个特殊的数字账本中添加一条记录。该记录会记载特定数据被使用的事实，以及使用的原因——例如，某项血液检测数据曾与英国国家医疗服务体系（NHS）的国家算法进行比对，以检测可能的急性肾损伤。*\n\
  \n> *这个账本及其中的记录将共享* [*区块链*](https://en.wikipedia.org/wiki/Blockchain_%2528database%2529)\
  \ *的部分特性——这也是比特币和其他项目背后的理念。与区块链一样，账本只能追加，因此一旦添加了数据使用记录，就不能事后删除。而且与区块链一样，该账本将使得第三方能够验证没有人篡改过任何记录。*\n\
  \n> *但它也会在几个重要方面与区块链有所不同。区块链是去中心化的，因此任何账本的验证都由广泛参与者群体通过共识决定。为防止滥用，大多数区块链要求参与者反复执行复杂的计算，并承担巨大的相关成本（据某些估计，区块链参与者的总能耗可能相当于*\
  \ [*塞浦路斯的电力消耗*](https://www.ft.com/content/384a349a-32a5-11e4-93c6-00144feabdc0)\
  \ *）。这在医疗服务中并非必要，因为我们已经有值得信赖的机构，如医院或国家级机构，可以依靠它们来验证账本的完整性，从而避免了区块链的某些浪费。*\n\n> *我们还可以通过用树状结构替代区块链中的链式结构来提高效率（如果您想了解更多关于默克尔树的信息，英国政府数字服务部的开发*\
  \ [*博客*](https://technology.blog.gov.uk/2015/10/13/guaranteeing-the-integrity-of-a-register/)\
  \ *是一个不错的起点）。总体效果大同小异。每次我们向账本添加记录时，都会生成一个称为“加密哈希”的值。这个哈希过程的特殊之处在于，它不仅总结了最新记录，还总结了账本中所有先前的值。这使得任何人都无法回头悄悄修改其中一条记录，因为这不仅会改变该记录的哈希值，还会改变整棵树的哈希值。*\n\
  \n> *简单来说，你可以将其想象成叠叠乐游戏的最后一步移动。你可能试图轻轻取出或移动其中一块积木——但由于整体结构，最终会引发巨大的声响！*\n\n> *因此，我们现在拥有了一个改进版的简易审计日志：一个完全可信、高效的账本，我们知道它能捕捉所有与数据的交互，并且可以由医疗界内信誉良好的第三方进行验证。我们该如何利用它呢？*\n\
  \n> *简而言之：大幅改进这些记录的审计方式。我们将构建一个专用的在线界面，供合作医院的授权工作人员实时检查 DeepMind 健康数据使用的审计追踪记录。它将允许持续验证我们的系统是否按预期运行，并使合作伙伴能够轻松查询账本以检查特定类型的数据使用。我们还希望让合作伙伴能够运行自动查询，从而有效地设置警报，一旦发生任何异常情况便会触发。而且，随着时间的推移，我们甚至可以给合作伙伴提供选项，允许其他人（如个别患者或患者群体）检查我们的数据处理过程。*\n\
  \n\n\n#### 前方的技术挑战\n\n> *构建这一系统将是一项艰巨的任务，但鉴于其问题的重要性，我们认为值得投入。目前，三大技术挑战尤为突出。*\n\n\
  > *无盲点监控*：系统若要实现可验证的信任，就必须确保所有数据使用行为均被记录在账本中——否则概念便不成立。除了设计日志记录数据交互的时间、性质和目的，我们还希望能证明后台没有其他软件秘密操作数据。除了记录账本中每一次数据交互，我们还需要通过[形式化方法](https://en.wikipedia.org/wiki/Formal_methods)以及专家对代码和数据中心的审计，来证明数据中心内每个软件对数据的每次访问都被这些日志所捕获。此外，我们也在关注如何保证运行这些系统的硬件可信度——这是计算机科学研究中的一个活跃课题！\n\
  \n> *针对不同群体的差异化用途*：核心实现是一个接口，允许合作医院实时可验证地确认我们仅将患者数据用于经批准的目的。若这些合作伙伴希望将此能力扩展至其他人（如患者或患者群体），则需解决复杂的设计问题。\n\
  \n> *对于许多患者而言，长长的日志条目可能不实用，有些人可能更倾向于阅读汇总视图或依赖可信的中介。同样，患者群体可能无权查看可识别身份的数据，这意味着需要允许我们的合作伙伴提供某种形式的系统级信息——例如，机器学习算法是否在特定数据集上运行过——同时避免无意中泄露患者数据。*\n\
  \n> *关于如何提供对数据子集或摘要的可验证访问的技术细节，请参见我们即将使用的开源项目 [Trillian](https://github.com/google/trillian)\
  \ 以及这篇[解释其工作原理的论文](https://github.com/google/trillian/blob/master/docs/VerifiableDataStructures.pdf)。*\n\
  \n> *去中心化的数据与日志，不留缺口*：英国不存在单一的患者身份信息数据库，因此医疗流程涉及数据在医疗服务提供者、IT 系统乃至可穿戴设备等患者自控服务之间来回传输。目前已有大量工作致力于实现这些系统的互操作性（我们的移动产品\
  \ [Streams 即按互操作标准构建](https://deepmind.com/applied/deepmind-health/working-nhs/how-were-helping-today/)），以确保它们能安全协同工作。若这些标准能同时纳入可审计性，将有助于避免数据在系统间传输时出现审计盲区。\n\
  \n> *这并不意味着像 DeepMind 这样的数据处理方应查看其他系统的数据或审计日志。日志应像数据本身一样保持去中心化。审计互操作性仅旨在额外确保数据在系统间传输时无法被篡改。*\n\
  \n> *这是一项重大的技术挑战，但我们认为应当可以实现。具体而言，医疗互操作性领域正出现一种名为 FHIR 的开放标准，它有望通过有益的方式扩展以纳入可审计性。*\n\
  \n#### 开放式构建\n\n> *我们希望能在今年晚些时候实施首批组件，并计划通过博客公开分享进展与途中遇到的挑战。我们深知这非常艰难，而最严峻的挑战绝非技术层面。我们希望通过公开分享流程、坦诚记录失误，能与尽可能多的人合作并获取反馈，从而提升此类基础设施未来在医疗领域乃至更广范围得到更广泛应用的几率。*\n\
  \n## 总结\n\n本章聚焦区块链在支付处理中的新兴角色及其如何应用于医疗领域。讨论以描述中心化的支付方-提供方-患者模型以及该模型在不远的将来将如何变化作为开端。随后，我们探讨了如何利用区块链构建一个简易的电子健康记录系统，继而展示了如何将患者工作流记录在区块链上。这引出了对医生资质认证用例的简要讨论。最后，我们探讨了\
  \ Ark Invest 和 Gem 提出的医疗领域经济浪费问题，以及区块链如何在不久的将来缓解部分压力。\n\n"
- "# 10. 精益区块链\n\n对于有兴趣构建区块链产品的开发者而言，单纯投入时间研究技术是不够的。区块链堆栈包含深度融入技术模型的业务逻辑。因此，有必要初步熟悉那些正式描述初创企业组件以及如何围绕产品打造公司的框架。本章以精益方法论开篇，该模式由埃里克·莱斯创立，基于三大核心原则：\n\
  \n1. 将你的想法中最基础的版本转化为客户可互动的产品。\n2. 尽早并经常与潜在客户沟通。\n3. 根据客户反馈迭代基础模型，以实现完全符合客户需求的最终产品。\n\
  \n同时，我们铭记埃里克的这句话：“在构建最小可行产品时，请遵循这条简单规则：移除任何对你想获取的认知无贡献的功能、流程或努力。”随后，我们介绍了将精益方法论分解为九个可应用组件的商业模式画布。此外，我们探讨了杰弗里·摩尔针对高风险、高回报技术提出的产品-市场契合方法。接着，我们提出了三种模型，以帮助判断你的组织是否适合使用区块链。一旦决定采用区块链，超级账本项目提供了多个可定制部署的企业级区块链选项。最后，本章以对超级账本\
  \ Composer 及其用于捕获业务逻辑的模板的简要概述作为收尾。\n\n\n\n## 精益方法论\n\n精益方法论是一套用于开发产品的原则，旨在通过迭代的方式不断质疑所提出的商业模式是否真正解决了客户想要解决的问题，而非在没有明确终端客户的情况下规划产品。这通过更短的产品开发周期、随后多次发布以获取客户反馈、商业假设实验以及经证实的认知来实现。`Eric\
  \ Ries` 是精益方法论的创始人。它为将区块链这类高风险、高回报的技术推向市场提供了一个框架。对于任何试图整合区块链或尝试在区块链上提供新服务的组织来说，需要一个严谨的框架来评估该组织是否能从区块链中受益。精益方法论的实际应用将提供这样的工具集，在本节中，我们希望向读者介绍精益的基本原理：\n\
  \n-   **最小可行产品 (MVP)：** 可以说是精益方法论中最重要的方面。最小可行产品是指产品的最早期版本，功能数量有限，其设计目的仅仅是为了吸引早期采用者，从而获取关于核心概念的数据和反馈。MVP\
  \ 的设计必须以投入最小的组装精力，并产出关于产品和创意的最大数据量为目标。例如，一个提供定制贴纸的服务，无需花费数月时间设计复杂的贴纸。相反，一个带有几种贴纸设计的简单落地页就足以提出更关键的问题：客户想要那些贴纸吗？一个落地页可以检验这个假设，而我们的\
  \ MVP 可以就如何更新产品以使其符合客户需求提供指导。MVP 中包含的功能是基础性的，但这里的目的不是为了展示独特的功能，而是为了尽快接触客户。精心定义一个可操作的\
  \ MVP 并挖掘客户数据，是成功将高风险、高回报产品推向市场的第一步。\n\n-   **转型：** 在 MVP 的迭代开发过程中，与客户的互动将为构建新功能和更新提供宝贵的指导。然而，一些客户互动可能会指出产品的缺陷，以及需要对核心概念进行根本性改变。此时，你有两个选择：要么转型，要么坚持。转型是指改变产品中非常有限的属性集，并生成一个新的\
  \ MVP，以证明你的核心概念正在与客户需求同步进化。进行有限数量的改变，可以让你检验能最大化触达客户直接影响。另一方面，坚持是一种大胆的冒险，即认为进一步的实验和产品微调最终能满足客户需求。`Eric\
  \ Ries` 提出，衡量创业公司带宽的指标不一定是有多少资本，而是在产品准备好被大规模采用之前，它能够进行多少次转型。转型决策是关键的分支点，因此会带来风险。使用分离测试可以极大地帮助分层并降低风险。\n\
  \n-   **产品-市场契合：** 这是迭代设计中的一个阶段，此时 MVP 已功能丰富，早期采用者正在说服更多务实的用户尝试你的产品。产品-市场契合使你的产品正好处于即将实现大规模采用的临界点。在这个阶段，你已经验证了关于产品的所有假设，产品与市场需求同步。然而，你的产品需要营销和销售引擎的额外支持来占领市场并产生收入。本质上，创业公司中的其他服务需要被构建和部署。\n\
  \n-   **商业假设实验：** 假设深深植根于产品开发之中（尤其是在开发高风险、高回报的想法时），每个假设都带有失败的风险。精益将假设重新定义为需要在产品开发周期进一步推进之前被证实或证伪的假设。这通过确保我们的假设在内部保持一致并得到客户验证，从而降低了累积风险。精益创业中一种流行的假设检验技术称为分离测试（或\
  \ A/B 测试）。在 A/B 测试中，我们向终端用户展示两种不同的设计决策，其中一半的早期采用者会看到一个设计特性，而另一半会看到另一个不同的特性。从两组用户收集数据，以帮助确定哪种设计选择更受用户青睐。此外，这种数据收集提供了直接与客户访谈的机会，以更深入地了解用户如何与新的功能交互。使用这种方法有两个主要好处。首先，你可以直接衡量你的工作对用户的影响。作为开发者，我们可能会痴迷于编写更复杂的代码或开发终端用户最终可能并不关心的有趣功能。其次，A/B\
  \ 测试消除了关于功能开发优先级的冲突——新的功能可以在每次迭代时添加到 MVP 中，并随后进行 A/B 测试。我们可以让数据告诉我们用户认为哪些功能是相关的。通过这种方式，如果对\
  \ MVP 进行了有限数量的更改，收集的数据可以反映这些更改是否转化为用户留存率等参数的增长。\n\n-   **经证实的认知：** 只有当你和你的团队有纪律地严谨分析实验并从中学习时，A/B\
  \ 测试才有帮助。`Eric Ries` 谈到了有助于经证实认知的三个属性，总结为三个 A：可操作、可访问和可审计。\n    -   可操作：设计良好的实验将揭示对\
  \ MVP 所做的更改与获得的新用户之间的因果关系。这些实验产生的数据是可操作的，因为它们为未来的开发提供了方向。\n    -   可访问：收集的数据和使用的指标必须简单，并且团队中的每个成员都可以访问。特别是，对于任何收集数据的人来说，指标可能会变得非常具有误导性。因此，我们试图衡量的内容以及这些数据点的重要性应该用最简单的术语陈述，并对团队任何成员的评论持开放态度。\n\
  \    -   可审计：这类似于对经证实的认知和实验设计过程进行独立审查。任何人都应该能够查看原始数据并追溯指标，从而得到关于 MVP 每次迭代的相同建议。这为精益创业模型建立了严谨性，并为转型或坚持的决策增加了基于数据的理由。\n\
  \n**注意**\n\n精益创业已被美国国家科学基金会采纳并转化为正式的课程，面向那些希望将其技术商业化的大学研究人员。“创新队”计划（I-Corps）培训由研究人员和企业家组成的团队，为期十二周，让他们掌握客户发现技能。每周都是严格基于客户访谈的\
  \ MVP 迭代，团队会在举办 I-Corps 计划的地点得到专家小组的反馈。每个团队由一名技术负责人、一名创业负责人和一名 I-Corps 导师组成。团队需要每周记录客户访谈，并更新他们的商业模式画布（我们将在下一节讨论）。诸如转型点等重大决策都是基于访谈中记录的数据趋势做出的，这使得整个客户访谈过程非常严谨。\n\
  \n\n\n## 识别并构建适当的 MVP\n\n识别并构建适当的 MVP 可能极具挑战性。史蒂夫·布兰克在博客上分享了一个绝佳案例，说明这项任务有多困难且容易产生误导：\n\
  \n> 我在斯坦福大学遇到一家小型初创公司，他们想用搭载[高光谱相机](http://www.microimages.com/documentation/Tutorials/hyprspec.pdf)的无人机在农田上空飞行，采集[高光谱图像](http://en.wikipedia.org/wiki/Hyperspectral_imaging)。这些图像能够告诉农民：作物长势如何、是否存在病虫害、肥料是否充足、水分是否足够。（相机的分辨率足以看清每株植物。）掌握这些信息意味着农场可以更准确地预测田地产量、决定是否需要对特定区域进行虫害治理，并且只在需要的地方施用水肥。\n\
  >\n> （无人机比卫星更有优势，因为分辨率更高，且能更频繁地飞越农田；同时因为成本更低，也比飞机更有优势。）\n>\n> 所有这些信息都将帮助农民提高产量（增加收入），并通过仅在需要的地方施用减少用水和化肥/化学品的使用，从而降低成本。\n\
  >\n> 他们的计划是成为一项名为\"[精准农业](http://en.wikipedia.org/wiki/Precision_agriculture)\"\
  的新兴业务中的数据服务提供商。他们将每周前往农民的田地，操作无人机飞行、采集并处理数据，然后以易于理解的形式将数据提供给农民。\n\n### 在农场进行客户探索\n\
  \n> 我不知道斯坦福大学是怎么回事，但这已经是我在精准农业领域看到的第四或第五家使用无人机、[机器人](http://bluerivert.com)、高科技传感器等的初创公司了。当他们说\"\
  让我们给您讲讲我们与潜在客户的对话\"时，这家团队引起了我的注意。我认真听着他们描述客户访谈的过程，似乎他们发现——是的，农民确实认识到无法详细了解田间情况是个问题——而且——理论上，拥有这样的数据确实很棒。\n\
  >\n> 于是团队断定，这感觉像是一个他们想要真正去做的生意。而现在他们正在筹集资金，以构建一个原型最小可行产品。一切都很好。聪明团队，真正的高光谱成像、无人机设计领域专家，客户探索起步良好，并开始思考产品/市场契合度等等。\n\
  \n### 精益不是工程流程\n\n> 他们向我展示了下一步的目标和预算。他们想要的是，找到一位能够认识到数据价值、并愿意成为产品布道者的早期满意客户。这是个很棒的目标。\n\
  >\n> 他们得出结论：获得早期满意客户的唯一途径，就是构建一个最小可行产品。他们认为 MVP 需要：1) 演示无人机飞行，2) 确保软件能将所有田块图像拼接在一起，3)\
  \ 以农民能使用的方式向他们呈现数据。\n>\n> 他们合乎逻辑地推断，实现这一目标的方法是购买一架无人机、购买一台[高光谱相机](http://www.spectralcameras.com/aisa)、购买图像处理软件、花费数月工程时间集成相机、平台和软件等等。他们向我展示了完成这一切的底限预算。非常合乎逻辑。\n\
  >\n> 但这是错误的。\n\n## 聚焦核心目标\n\n> 团队混淆了 MVP 的目标（看看能否找到愿意为数据付费的满意农民）与实现目标的过程。他们目标正确，但用来测试目标的\
  \ MVP 却是错误的。原因如下：\n>\n> 团队的假设是：他们能够提供农民愿意付费的可执行数据。仅此而已。既然这家初创公司将自身定位为数据服务公司，那么归根结底，只要数据能及时提供信息，农民根本不在乎这些数据是来自卫星、飞机、无人机还是魔法。\n\
  >\n> 这意味着，所有关于购买无人机、相机、软件以及花时间整合这些资源的工作，都是在浪费时间和精力——在现阶段如此。他们根本还不需要测试这些。（[低成本无人机能够搭载相机](http://www.dji-innovations.com/)已有大量实例证明。）他们定义错了应该优先测试的\
  \ MVP。他们需要花时间做的，首先是测试农民是否在意这些数据。\n>\n> 于是我问道：\"租一台相机和一架飞机或直升机，飞越农田，手工处理数据，然后看看农民是否愿意为此付费——这样是不是更便宜？难道你不能在一两天内，用你预算十分之一的钱完成这件事吗？\"\
  \n\n## 说明\n\n本文摘自史蒂夫·布兰克的博客，在此分享是为了说明策划定义 MVP 所需阶段的重要性。错误的 MVP 将消耗更多资源，并产生无法直接验证你的假设的无关数据。另一方面，一个恰当构建的\
  \ MVP 将使你能够快速验证核心假设，而无需动用大量资源。\n\n这里讨论的精益原则，描述了产品如何通过多个阶段逐渐、迭代地成熟并捕获市场。产品-市场契合度是所有阶段中最重要的，组织理论家杰弗里·摩尔将其描述为产品必须跨越的一道鸿沟，才能进入大规模采用阶段。图\
  \ 10-1 总结了产品可以捕获的不同客户细分阶段。我们在此简要回顾其中的五个：\n\n- **创新者：** 这个细分群体由高级用户组成——这类客户具有一定背景，并在产品所属垂直领域拥有有限的专业知识。财务稳健是该群体的关键特征，低风险承受能力使他们能够采用最终可能失败的技术，而稳定的财务资源有助于吸收失败。这类客户渴望尝试新产品，并能提供宝贵的技术见解，因为他们与新产品能否成功息息相关。\n\
  \n- **早期采用者：** 这个细分群体与创新者联系紧密，拥有最高的社会资本来影响公众舆论。他们在采用新技术时更为审慎，并利用这一地位表明对新兴趋势的信心。早期采用者在帮助产品吸引更广泛受众、实现产品-市场契合度方面发挥着巨大作用。\n\
  \n- **鸿沟：** 大量初创企业失败，从未跨越这道鸿沟。它们开发的产品始终未能实现产品-市场契合度，最终初创公司耗尽资金。成功跨越鸿沟的公司则已准备好进入主流市场。\n\
  \n- **早期大众：** 这是主流务实消费者的第一个细分群体。尽管在这个层面上投入的社会资本较少，但口碑有助于产品广泛传播。\n\n- **晚期大众：** 这个细分群体对创新持高度怀疑态度。较低的财务稳健性是其主要特征，虽然接受得晚，但新产品的采用仍会在社会平均水平成员之后很久才发生。\n\
  \n\n\n精益原则的应用有两个方面。第一种是创业者基于精益和客户发现方法论，从零开始打造产品；第二种是大企业内部，试图利用潜在资源和支持，孵化出小型公司的创业者。这两种情境在资源配置上截然不同；然而，构建一个`MVP`是两者共同的起点目标。这应当以最小化资源使用的方式进行，从而避免成为成本高昂的实验。这两个实例在创业者的运作方式以及大组织的文化方面，也拥有不同程度的灵活性。涉及`MVP`迭代和客户访谈的核心原则，在这两种情境下是相同的。\n\
  \n![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig1_HTML.jpg](img/430562_2_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n\n产品-市场契合度与客户细分之间的鸿沟。本图最初由 Prototypr 的 Shah Mohammed 绘制。\n\n## 商业模式画布\n\
  \n瑞士商业理论家兼创业者亚历山大·奥斯特瓦德研究了数百家公司的结构后发现，每家公司都可分解为九大基本要素的模型。基于此，新的初创企业可以遵循精益方法论来构建，其形式就是包含这九个要素的一张画布，称为商业模式画布。其理念是在单页画布上工作，频繁更新关于你业务/产品的假设，并通过客户访谈来填充这九个要素。这与传统模式形成对比，后者是在没有任何客户验证的情况下，制定包含关键指标预测和用户采纳情况的冗长商业计划。该画布分为两面：左侧聚焦于你的产品/业务，右侧聚焦于客户。这两面通过价值主张交汇，价值主张被定义为你的业务或产品向客户提供的核心价值点。接下来，我们来逐一审视这九个要素，并在图\
  \ 10-2 中展示商业模式画布的直观呈现：\n\n- **客户细分：** 此部分列出将购买你产品的客户画像或典型特征。此外，本部分还应阐述客户为何会特别想从你的公司购买的原因。因此，你有责任访谈属于每种客户画像的客户，并记录他们如何与你的产品互动。\n\
  \n- **价值主张：** 此部分包含你的客户正在经历的痛点。通常，客户会尝试用拼凑的解决方案自行解决某个特定问题。这种方法对用户来说通常很不方便，可以说是“令人头疼”，但对创业者而言却是主要的价值来源。构建一个更简单的流程来解决那个问题，将立即成为一剂“止痛药”，并帮助你的产品更容易吸引大众。\n\
  \n- **渠道：** 此部分定义了你可以用来向客户传达价值主张、达成新销售以及从每个客户细分群体获取客户反馈的媒介。此部分的输出是将每个客户画像与合适的触达渠道连接起来。\n\
  \n- **客户关系：** 此部分描述了你将如何与客户互动，以及客户如何与你取得联系。这可以通过社交媒体账号、专属个人服务或论坛社区来实现。\n\n- **关键活动：**\
  \ 此部分代表了你为了与客户互动以交付价值主张而必须执行的工作。你需要创建一份与你的价值主张相关的关键活动清单。其中可能包括产品分销、研发、战略等。\n\n-\
  \ **关键资源：** 构建你的价值主张并将其交付给客户所需的资产。这包括任何设备、软件和知识产权（如专有知识），维持与客户的良好关系，以及确定潜在的新收入来源。关键资源应与你的关键活动相对应，以便为如何为客户创造价值提供清晰的路线图。\n\
  \n- **关键合作伙伴：** 你在执行所有关键活动时需要依赖的关键外部角色。没有这些合作伙伴，你将无法兑现你的价值主张。此部分的输出是一份合作伙伴名单，以及他们如何与你的关键活动相关联。\n\
  \n- **收入来源：** 商业模式画布所涵盖的核心财务特征，回答了一个简单问题：你的业务将如何产生收入。传统初创企业依赖三种主要的收入来源，包括产品销售、订阅费或授权许可。大多数区块链公司采用了带有免费层的订阅费模式，这允许用户在将其用于任何严肃项目之前先试用平台。本部分的输出是通过价值主张将客户细分群体与潜在的收入来源联系起来。\n\
  \n- **成本结构：** 此部分列出了与维持你的初创公司运营相关的所有成本。此外，通过精心规划，本部分有助于追踪那些最昂贵的关键活动或资源。\n\n这九个要素排列在商业模式画布上，分为左侧和右侧，如图\
  \ 10-1 所示，并通过价值主张连接起来。\n\n![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig2_HTML.jpg](img/430562_2_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2\n\n包含九大核心要素的商业模式画布概览，图片源自 Strategyzer\n\n\n\n### 你需要区块链吗？\n\n区块链技术的热潮像野火一样席卷了企业界。各类企业和公司都组建了小型区块链开发团队，研究如何从使用区块链中受益。热潮之下，区块链世界已出现非常严肃的技术发展迹象，其中许多内容都被收录在本书中。然而，我们仍处于起步阶段。支持区块链应用的业务优势的现实在于，它们可以简化业务流程并显著减少摩擦。在本节中，我们将介绍三种决策模型，它们可以帮助你批判性地分析，将区块链集成到你的项目/公司中是否确实是合适的技术解决方案：\n\
  \n*   **IBM 模型：** 一种突出区块链关键特性如何融入业务流程和应用的区块链模型。\n*   **Birch-Brown-Parulava 模型：**\
  \ 一个帮助你在分布式账本的许可型与无许可型实现之间做出选择的模型。由 Consult Hyperion 的开发人员设计。\n*   **Wüst-Gervais\
  \ 模型：** 一个结合了前两个模型优点的简化模型。由苏黎世联邦理工学院的两位研究人员设计。\n\n> **注**\n> 我们为什么选择这三种模型？网上有多种综合性的决策树可帮助企业判断哪些应用场景需要区块链。在本节中，我们选择了最简单的模型来说明将区块链集成到现有基础设施中更重要的设计原则。\n\
  \n在深入探讨每个模型的细节之前，这三个模型有哪些共同的一般原则？你可以将这些共同的设计作为标准来评估你的业务需求，然后基于一些简单的想法和问题创建针对你业务的特定模型：\n\
  \n*   **数据库：** 你需要首先理解你的业务为何要使用数据库。区块链使用一个所有参与者都能看到的共享数据库。你是否乐意在你的应用中使用共享账本？数据库会通过网络上的交易持续更新；你的应用能否与一个持续更新的数据库交互？\n\
  *   **写入者：** 数据库通过多个写入它的交易进行更新。区块链的设计允许多个写入者；即，多个实体生成并验证发布到账本的交易。\n*   **无需信任：**\
  \ 验证写入者身份对你的应用重要吗？这可能会改变你部署的账本实现。区块链的默认设置是，向账本写入的各方之间无需信任。这对你的应用来说足够吗？你网络上的各方是利益冲突还是动机相似？如果他们有相似的兴趣，一些管理信任的区块链构造就可以安全地移除。\n\
  *   **去中介化：** 区块链从网络中移除了一个中心化权威，因此交易被认为是去中心化的。这些交易由网络上的每个节点独立验证和处理。你想要或需要这种去中介化吗？针对你特定的应用场景，拥有一个把关者是否有任何显著的缺点？倾向于选择基于区块链的数据库的良好理由可能包括更低的成本、更快的流程、自动结算或监管影响。\n\
  *   **交易互依性：** 区块链最适合处理那些由写入者发布到区块链时相互依赖的交易。互依性部分指的是交易清算；例如，如果 A 向 B 发送资金，然后 B 向\
  \ C 发送资金，第一个交易未通过前，第二个交易就无法清算。区块链确保了写入者发布的交易有序且快速的处理。换句话说，当维护一个涉及多个用户、具有长历史的交易日志时，区块链才真正大放异彩。\n\
  \n让我们开始看看决策模型；第一个如图 10-3 所示。\n\n![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig3_HTML.jpg](img/430562_2_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3** Birch-Brown-Parulava 模型，显示了与账本类型对应的共识算法\n\n此模型引导用户决策是部署许可型账本还是无许可型账本。这可能导致决定软件基础时产生深刻变化；例如，在以太坊和\
  \ Quorum 之间选择。下一个模型来自 IBM，如图 10-4 所示。\n\n![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig4_HTML.jpg](img/430562_2_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4** IBM 关于何时使用区块链的决策图\n\n此流程图中一个需要强调的重要特征是，某些决策如何与区块链固有的特性相关联。例如，合同关系可以通过使用智能合约在区块链上得到良好处理。此图可以作为初步检查，判断区块链与你的项目的兼容性，并了解区块链启用的功能。\n\
  \n我们在此考虑的最后一个决策模型如图 10-5 所示。它由 Karl Wüst 和 Arthur Gervais（均为区块链研究员）在一篇题为“你需要区块链吗？”的论文中创建，对我们来说，它按顺序集成了前两个模型的概念。\n\
  \n![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig5_HTML.jpg](img/430562_2_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5** Wüst-Gervais 模型\n\n该模型试图为两种部署选项以及你是否应该考虑区块链来提供答案。这里的概念与之前的模型相似；然而，此流程图更侧重于网络本身的属性。\n\
  \n### Hyperledger 项目\n\n既然我们已经提供了一个框架来确定组织是否需要区块链，接下来我们将介绍 Hyperledger，这是一个开源项目，也是一套用于部署区块链的工具。Hyperledger\
  \ 本质上是 Linux 基金会的一个伞式项目，提供了用于建立、部署和管理开源区块链的底层框架、操作标准、最佳实践或指南以及开发人员工具。这个开源项目组织良好，并得到了一个由数百名贡献者、一个管理委员会和一个技术指导委员会监督的社区的支持。目前，Hyperledger\
  \ 框架是一个活跃的研究领域，用于为组织或特定应用的联盟构建企业级区块链。在本节中，我们将讨论七个 Hyperledger 框架和六个开发人员工具。\n\n>\
  \ **注**\n> 本节提供了 Hyperledger 项目的广泛概述。有关最新、准确的功能列表，请参考项目网站 [`www.hyperledger.org`](http://www.hyperledger.org)。此外，术语*账本*和区块链在本节中将互换使用。\n\
  \n\n\n#### Hyperledger Fabric\n\n`Hyperledger Fabric` 是一个许可型区块链基础设施，也是 Hyperledger\
  \ 伞状项目下首个代码库提案。该项目最初设计为在分布式账本上构建区块链应用的基础框架。它由 IBM 与 Digital Holdings 合作开发，并最终孵化成为\
  \ Hyperledger 项目。`Fabric` 提供了独特的模块化架构，其中诸如共识机制（称为可配置共识）和成员服务等核心组件均可即插即用。此外，网络中节点之间的用户权限有明确划分，因此智能合约的执行会根据权限不同而有所区别。\n\
  \n`Fabric` 的一个显著特点是，成员能够进行仅通过部分已验证节点传递的私有交易，而无需向整个网络广播。这一过程在保持网络完整性的同时，无需中央权威机构。本质上，私有交易包含两个组成部分：使用子通道，以及几个属性与网络中其他节点不同的节点。一旦广播，只有拥有更高访问权限的节点才能执行和验证交易。所有其他节点则会简单地“跳过”这些交易。\n\
  \n简而言之，`Fabric` 中有两组节点：负责执行智能合约（称为链码）、背书（验证）交易、并将区块链与基于其上构建的应用进行对接的 peer 节点；以及负责维护网络中全局状态内部一致性的执行或排序节点。`Orderer`\
  \ 节点最终创建区块并将其交付给网络中的所有成员。正是由于节点间的这种分工，`Fabric` 才能支持许可型部署，这与比特币不同。\n\n#### Hyperledger\
  \ Burrow\n\n`Burrow` 是一个完全模块化的区块链节点，带有一个许可型智能合约执行引擎。本质上，它是一个能够解释和执行代码的分布式数据库系统。该智能合约执行引擎作为一个内置的解释器，其规格遵循\
  \ `Ethereum Virtual Machine` 的标准。因此，`Burrow` 可以在容器化的虚拟机上执行用 `Solidity` 编写的 `EVM`\
  \ 智能合约代码。`Burrow` 使用名为 `Tendermint` 的权益证明共识算法，该算法支持高交易吞吐量，并能随网络规模扩大而同步扩展。目前，`Burrow`\
  \ 包含一个维护网络完整性和交易顺序的共识引擎、一个集成业务逻辑的智能合约应用、一个与外部应用交互的 API，以及一个将共识引擎与智能合约应用连接起来的 `Application\
  \ Blockchain Interface`。\n\n#### Hyperledger Indy\n\n`Indy` 是一个分布式账本，专为构建包含去中心化身份组件的应用而设计。该账本附带了一套库、测试工具和模块化组件，这些组件可被复用在区块链上创建私有数字身份。最终，`Indy`\
  \ 旨在创建与区块链无关的身份规范和标准，并能在任何兼容这些规范的分布式账本上实现互操作。用户的隐私信息不存储在账本本身；相反，`Indy` 使第三方应用能够快速验证受信任的组织是否已向成员颁发了私有凭证。这使得用户能更好地控制自己的私有数据，并将区块链用作身份验证网关来保护其信息。使用区块链架构提高了应用的整体安全水平，并提供了针对勒索软件的有效防护。\n\
  \n#### Hyperledger Sawtooth\n\n`Sawtooth` 是一个英特尔项目，被设计成一个模块化的区块链框架，用于构建和部署分布式企业级区块链。该项目采用了一种安全架构，将核心区块链网络与智能合约的执行隔离开来，使得恶意行为者无法提升权限以影响区块链。此外，`Sawtooth`\
  \ 支持对共识算法等核心组件进行热插拔。动态共识的特性使得网络能够根据网络规模动态地切换共识算法。\n\n默认情况下，`Sawtooth` 使用 `Proof-of-Elapsed-Time`\
  \ 作为共识算法，该算法在实现可扩展性的同时不会造成高能耗。因此，`Sawtooth` 同时支持许可型和非许可型部署。`Sawtooth` 拥有一个并行调度器来处理和执行交易，并配备了一种防止双重支付的安全机制。这使得对同一全局状态的多次更新成为可能，并且在交易执行性能上优于传统模型。`Sawtooth`\
  \ 的第一个实现是英特尔名为 `Sawtooth Lake` 的项目。它提供供应链管理，用于证明各种商品（尤其是鱼类）的来源，并跟踪货物在整个运输过程中的状态。\n\
  \n> **注意**  \n> `Sawtooth` 最近通过添加一个名为 `Seth` 的交易处理器，在跨平台兼容性方面取得了进展，该处理器基于 `Burrow\
  \ EVM`。这使得 `Seth` 能够在 `Sawtooth` 账本上执行用 `Solidity` 编写的 `Ethereum` 智能合约。\n\n####\
  \ Hyperledger Grid\n\n`Grid` 是 Hyperledger 的一个供应链实现方案。Hyperledger 的主要企业用例之一就是供应链管理。一些贡献组织在这一用例中识别出了分布式账本的强大概念验证，于是\
  \ `Grid` 被设计为解决供应链问题的规范。从架构角度来看，`Grid` 并非一个区块链框架。相反，它是一整套框架和库的集合，允许开发者选择适当的组件来构建特定业务的供应链应用。拥有像\
  \ `Grid` 这样的通用框架的主要优势包括：为在网络和节点上实现具有特定角色的成员提供参考模型、实现常见业务逻辑类型的智能合约，以及由行业合作伙伴共享的去中心化数据结构。\n\
  \n#### Hyperledger Iroha\n\n`Iroha` 被设计成一个移动应用开发框架，可以整合到更大的区块链项目中，以提供移动端接口。`Iroha`\
  \ 提供了用于在 Android 和 iOS 平台上进行应用开发的客户端库，支持快速原型开发。`Iroha` 应用将与 `Fabric` 和 `Sawtooth`\
  \ 账本实现交叉兼容，其开发环境使用 `C++` 编写，以吸引更广泛的贡献者群体。借助 `Iroha` 实现的物联网应用，将把基于区块链的数据管理扩展到外围设备，并创建半自主的互联设备网络。\n\
  \n\n\n#### Hyperledger Besu\n\n`Hyperledger Besu` 是一个基于 Java 的开源以太坊客户端，它实现了企业以太坊联盟（EEA）规范。`Besu`\
  \ 可以在以太坊主网、Rinkeby 等测试网络，甚至兼容规范的私有许可网络上运行。它包含多种共识算法，包括工作量证明与权威证明。此外，其权限模型旨在让 `Besu`\
  \ 适用于联盟链环境。EEA 规范为开发者构建运行于以太坊区块链上的应用建立了一套通用接口。组件的标准化使得来自开源和闭源项目的开发团队无需依赖于特定于供应商的应用元素。`Besu`\
  \ 实现了所有符合 EEA 规范的企业级特性。下面我们来了解 `Besu` 的三个关键特性：\n\n- **以太坊虚拟机（EVM）：** `Besu` 通过 EEA\
  \ 规范实现了完整的 EVM，能够通过主网上的交易执行智能合约。\n- **共识：** `Besu` 为不同任务实现了多种共识算法；例如，区块验证通过权威证明（PoA）算法完成。这是一种参与者彼此熟识并具有一定信任基础的共识算法。`IBFT\
  \ 2.0` 是 `Besu` 采用的 PoA 算法，其中交易和区块由一组称为验证者的受信任账户进行验证。这些验证者轮流创建下一个区块，现有验证者可以投票添加或移除其他验证者。此外，由于验证者的可信性质，所有区块都添加到主链上，即不存在分叉。\n\
  - **隐私与许可账本：** `Hyperledger Besu` 提供了在参与方之间保持交易私密性的能力。所有其他方无法访问私有交易的内容、发起方地址或收件人列表。这是通过\
  \ `Besu` 的私有交易管理器实现的。此外，私有交易支持许可网络，只有预先指定的账户才能参与特定交易或交易负载。所有其他没有适当访问权限的节点仅会传递交易，而无法访问任何细节。\n\
  \n为了提供更全面的开发环境，七个 Hyperledger 框架还附带以下六种开发者工具（还有更多工具正在积极开发中）：\n\n1.  **Hyperledger\
  \ Explorer：** `Explorer` 是一个区块链模块，旨在构建与账本交互的 Web 应用。它可用于查看基本网络信息、新创建的区块或交易地址，或查询交易数据及其他公开的区块参数。\n\
  2.  **Hyperledger Caliper：** `Caliper` 是一个为区块链实现计算性能数据的报告工具。使用 `Caliper`，您可以选择预定义的用例，并获得关于交易延迟、资源利用率以及账本上每秒交易数等性能因素的报告。`Caliper`\
  \ 能为计划采用分布式账本的组织辅助商业决策。\n3.  **Hyperledger Composer：** `Composer` 是一个基于 UI 的快速原型开发工具和开发框架，用于创建区块链应用和智能合约。此外，`Composer`\
  \ 还提供了一个用于部署应用的测试网络。该开发环境对用户友好，依托于 `Node.js` 和 `NPM` 等广泛熟悉的框架。`Composer` 还附带打包了示例业务抽象，这些抽象模拟了常见的业务应用，并提供了部署脚本，以便在沙盒中进行实时测试。下一节我们将再次讨论\
  \ `Composer` 的快速原型开发方面。\n4.  **Hyperledger Quilt：** `Quilt` 是跨账本协议（ILP）的 Java 实现，它支持以区块链无关的方式，在包括法定货币在内的任何去中心化网络上进行支付。`Quilt`\
  \ 提供了发送和接收交易所需的核心库和数据类型。这些库被抽象出来，作为开发者可用于构建应用的支付逻辑。使用 `Quilt` 构建的应用可以请求认证并访问其他账本或任何与\
  \ Interledger 兼容的支付系统。\n5.  **Hyperledger Cello：** `Cello` 是一个区块链供应仪表盘，可以减少设置、管理和使用分布式账本所需的管理工作量。对于系统管理员而言，`Cello`\
  \ 有助于维护区块链网络的生命周期，支持自定义区块链参数，并扩展传统的监控和日志工具，以报告区块链网络的运行状况。最终，`Cello` 将成为通过 `Hyperledger`\
  \ 设置区块链的前端界面。此外，`Cello` 中的高级部署功能使其成为一个用于生成和维护按需区块链的区块链即服务平台。这项链服务与多种基础设施跨平台兼容，包括虚拟机（VSphere）和容器平台（Docker,\
  \ Kubernetes）。\n6.  **Hyperledger Ursa：** `Ursa` 是一个共享功能的密码学库，它标准化了 `Hyperledger`\
  \ 的安全功能。这使得开发者能够精简代码，降低漏洞风险，并提升网络的整体安全水平。值得注意的是，`Ursa` 包含一个用于创建零知识证明的通用库，该库将可供任何与\
  \ `Ursa` 兼容的账本实现使用。\n\n\n\n### 使用 Hyperledger Composer 进行快速原型设计\n\nHyperledger Composer\
  \ 是一套用于建模业务的高级应用抽象层。当你确定自己的业务可能受益于使用区块链时，可以利用 Composer 为应用创建一个基于区块链的原型。以下是制作原型所涉及流程的概要：\n\
  \n-   安装 Hyperledger Composer 工具，或在在线游乐场中试用 Composer。\n-   定义业务网络、资产和交易。\n-   实现所有交易处理器。\n\
  -   在 Composer-UI 中测试业务网络。\n-   将业务网络部署到实时的 Hyperledger Fabric 区块链实例上。\n-   在底层抽象之上创建一个示例应用。\n\
  -   通过 RESTful API 或 Node.js 将其他应用连接到该部署。\n\nComposer 的功能性输出称为业务网络存档（`BNA`），它可以部署到测试网络或实时的\
  \ Fabric 区块链上。一个业务网络包含以下要素：通过角色/身份连接起来的参与者、在网络中传播的资产、描述资产交换的交易、作为交易支撑规则的合约，以及最终记录所有交易的账本。除了对业务网络的组件进行建模外，`BNA`\
  \ 还包含交易处理器、访问控制列表和查询定义。交易处理器（用 JavaScript 编写）在这些模型元素上实现并执行业务逻辑。访问控制列表描述了规则，允许对参与者在满足特定条件后能访问业务网络中的哪些资产进行精细控制。用于描述这些访问列表的语言非常精密，能够捕获复杂的所有权声明。将访问控制与交易处理器逻辑分开，使开发人员能够快速维护和更新这两个组件，而无需担心兼容性或功能中断问题。\n\
  \n**注意**\n\n在本节中，我们的重点是介绍 Hyperledger Composer 的基础知识，以便感兴趣的读者能够更快地从参考资料中掌握 Composer\
  \ 的建模语言。设计一个完整的业务网络模型超出了本书的范围。\n\n让我们深入了解建模语言，并深入讨论 Composer 的基础：\n\n-   **资产：**\
  \ 代表网络上用户之间交换的资源。形式上，用于定义资产的描述方案遵循 `关键字 - 类 - 标识符 - 属性 - 关系` 的顺序。这里也可以添加其他可选字段，但在整个建模语言中都遵循此通用方案。资产用\
  \ `asset` 关键字定义，并带有一个与之关联的、与领域相关的类名。例如，一辆汽车可以通过 VIN 标识为：`asset Vehicle identified\
  \ by vin`。资产拥有一组定义它们的属性；对于车辆来说，它可以是一个存储为 `String String` 类型的描述。此外，资产可以与其他建模语言中的资源建立关系，例如拥有汽车的用户，表示为\
  \ `--> User owner`。所有资产都存储在可供网络访问的资产注册表中。\n\n-   **参与者：** 代表网络中的用户（或交易对手）。参与者对于网络上的所有交互都至关重要，它们的描述方式与资产相同。参与者使用\
  \ `participant` 关键字表示，并且它们也有一个与其领域相关的类名，例如买方或卖方。完整的描述可以表示为 `participant Buyer identified\
  \ by email` 以及属性 `String firstName`。所有参与者都存储在参与者注册表中，该注册表可能不对网络用户开放。\n\n-   **交易：**\
  \ 代表资产在网络上的移动，以及资产在被交换过程中的生命周期。交易以与参与者或资产相同的方式描述，来自参与者的销售报价可以定义为 `transaction Offer\
  \ identified by transactionid`，并带有属性 `Double saleprice`。\n\n-   **概念：** 概念是不属于资产、参与者或交易的抽象类。概念通常用于为资产或交易添加限定符，并且通常被三者中的某一个所包含。例如，地址的概念可以描述为\
  \ `Concept Address`，带有属性 `String street` 和 `String city_default =\"Orlando\"`。现在，一个资产可以使用此概念来指定地址属性。\n\
  \n-   **交易处理器：** 代表执行业务逻辑，以便在交易广播到网络时对区块链进行状态变更和全局更新。本质上，这些处理器为交易提供了对模型进行操作的实现。它们被编写在单独的\
  \ js 文件中，并利用业务网络模型中的定义。\n\n这些组件在图 10-6 中以图形方式展示。\n\n![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig6_HTML.jpg](img/430562_2_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6** 业务网络存档的组成部分\n\n## 总结\n\n在本章中，我们研究了与区块链研究和开发相关的三个不同领域：使用精益创业方法论，将高风险的研发理念转化为客户想要的产品；如何判断你的组织是否需要区块链；以及\
  \ Hyperledger 项目概述——一个构建企业级区块链的开源项目。我们将精益方法论分解为亚历山大·奥斯特瓦德提出的商业模式画布和杰弗里·摩尔提出的产品-市场契合鸿沟模型。这些模型帮助我们更好地理解如何设计产品以占领市场。接着，我们提出了三个模型来判断你的项目或公司是否能从使用区块链中受益，以及如何决定部署类型。最后，我们简要回顾了\
  \ Hyperledger 项目，该项目提供了高度可定制的区块链实现，能够将业务逻辑捕获到模板中。我们希望读者能从本章中获得实用且可应用的技巧，以推动自己创意的实现。\n\
  \n\n\n"
- "# 11. 区块链 3.0\n\n区块链领域研发的快速增长，可以解释为业界对传统互联网公司与区块链公司价值创造与获取方式有了更深入的理解。风险投资家及区块链技术投资人乔尔·莫内格罗（Joel\
  \ Monegro）与纳瓦尔·拉维康特（Naval Ravikant）提出了\"胖协议\"的概念，认为区块链领域的大部分创新将发生在核心技术层。随后，代币层可以将底层架构的使用货币化，并为应用层提供访问权限。为此，我们见证了区块链发展的三代迭代：第一版是中本聪的原始协议，提供了用于交易的功能性区块链；第二版是以太坊等协议，提供了智能合约与链上操作；而下一代区块链协议则支持链上执行，并可将机器学习等服务集成到区块链中以完成高级任务。\n\
  \n在本章中，我们将重点介绍三项新技术，它们显著加深了我们对区块链赋能应用的理解，并为研究开辟了多条新途径。我们首先讨论`EOS`，这是一个以太坊的竞争对手，其架构灵感源于操作系统，并采用平台支持设计理念。它使用名为委托权益证明的新共识机制，实现快速交易验证，并对支持网络的代表进行持续投票循环。`EOS`中实现的消息传递协议非常先进，允许在消息传递时自动触发响应处理程序和操作，并构成了智能合约系统的大部分功能。此外，系统还支持网络范围内智能合约指令的并行无锁执行，大幅降低了通信和状态更新中的延迟。\n\
  \n我们介绍的第二项技术是一种面向合约的编程语言，名为`Chain-core`。`Chain`目前已不再活跃开发；但我们希望借此说明与区块链无关的面向合约编程在资产管理中的潜力。在`Chain`网络中，所有价值都集中在可由用户发行和控制的资产上。`Chain`为开发者提供了强大的\
  \ API（及图形用户界面），用于在区块链上管理和转移这些资产。我们将逐步讲解`Chain`的图形界面，并涵盖资产管理的基础知识。\n\n我们将讨论的最后一项技术是企业级以太坊。本节将聚焦三个主要贡献者：`Quorum`（摩根大通构建的企业级以太坊分叉）、以太坊企业联盟（一套用于构建企业应用的规范与标准）以及`R3`（区块链部署工具`Corda`背后的联盟）。该技术集旨在满足企业的高吞吐量需求，并提供了一些独特的升级。最引人注目的功能包括私有交易与智能合约、零知识证明以及可插拔的共识机制。\n\
  \n## EOS 区块链\n\n`EOS.IO`是一种类似操作系统的新型区块链架构方案。其设计考量使核心基础设施能够轻松扩展，以支持去中心化应用。这里的可扩展性更广泛地指代一系列原则，使区块链应用与传统非区块链应用具有相似性。在本节中，我们将重点关注`EOS`三大技术创新所带来的大规模应用潜力：先进的权限系统、名为委托权益证明的新共识方法，以及`EOS`区块链中的并行处理能力。让我们从`EOS`所体现的几个可扩展性原则开始讨论：\n\
  \n*   **用户规模：** 一个突破性的`EOS`区块链应用应能支持数百万用户和用户账户。底层架构需要设计为分布式账本能将账户视为基本单元（而非交易）。支持服务可提供账户与区块链全局状态的同步修改。\n\
  \n*   **免费访问：** 基于区块链构建的服务或应用不应将任何执行成本转嫁给用户。大型非区块链服务本质上是免费的，最终用户通过应用使用产生的数据实现货币化。为实现广泛采用，基于区块链的应用必须消除用户费用，分摊服务成本，并通过新用户注册应用来产生收入。\n\
  \n*   **更新与分叉：** 向服务集成新组件或功能不应导致任何停机。基于区块链的服务在某种程度上必须处理共识问题，分歧可能导致链分叉。这些分叉会产生不同长度的链，通常随着下一个区块的生成而迅速解决；然而，更严重的问题出现在软件更新时。网络中的漏洞应能轻松无缝地修复，无需进行任何会导致部分网络不兼容的硬分叉。区块链服务的去中心化特性创建了一个无单点故障的网络，结合冗余机制，可以提供独特的无停机体验。\n\
  \n*   **低延迟：** 比特币区块链目前存在高延迟和验证延迟过长的问题。一个为数千用户服务的实用系统难以承受漫长的等待时间；因此，`EOS`上的服务必须在适用场景提供极其快速的验证和确认方法。一些有趣的新特性（如并行处理）可能会缓解交易确认缓慢的痛点。\n\
  \n\n\n让我们从 EOS 如何处理账户和用户权限开始。在 EOS 中，所有账户都可以通过人类可读的唯一标识符创建。此外，EOS 在账户之间提供了一套定义良好的、带有处理器和自动化规则的消息传递协议。网络上的每个账户都可以向其他账户发送结构化的程序化消息，并定义处理接收消息的规则和脚本。用于处理消息的脚本也可以发送消息来响应特定的传入操作。每个账户还有一个私有存储空间，消息处理器可以访问它来修改账户状态。消息处理脚本与规则一同构成了\
  \ EOS 部署的智能合约系统。EOS 智能合约背后的设计原则，类似于经过充分研究的、描述操作系统如何与外部设备及其他硬件组件通信的消息传递协议。合约将在类似于\
  \ EVM 的虚拟机上执行。用 Solidity 或其他面向合约语言编写的现有智能合约可以移植并适配，以便在 EOS 区块链上的容器中运行。这些合约还将继承一些\
  \ EOS 特有的函数，使其能够与其他 EOS 组件通信。\n\n> **注**  \n> EOS 的另一个高级特性是能够在 EOS 区块链与兼容默克尔证明的外部区块链之间进行通信。这是通过使用相同的基本密码学原理（消息存在性证明和消息序列证明）在客户端完成的，用于验证进出区块链的消息。\n\
  \n让我们回到理解用户权限如何工作的话题。在 EOS 中，应用的结构使得身份验证和权限模块与业务逻辑保持分离。这允许开发者设计专门用于权限管理的工具，并精简应用，使其仅包含与应用导向操作相关的代码。EOS\
  \ 允许用户定义用于签名传出消息的密钥，以及用户访问的每个独立服务所使用的不同密钥。例如，一个用户可以拥有一个密钥用于签名发送给其他用户的消息，以及另一个不同的密钥用于访问社交媒体账户。也可以在不分配任何密钥的情况下，授予其他账户代表用户行事的权限。这种类型的受限访问可以让某人拥有对你社交媒体的“仅发布”权限（需事先获得许可），但这些帖子会保留其独特的签名。这是通过一个称为**权限映射**的概念来实现的，我们将在后面讨论。权限映射中的一个关键概念是单个账户的多用户控制。这被认为是去中心化应用的一种高级安全措施，并且在\
  \ EOS 中实现它是为了降低密码或代币被盗的风险。\n\n> **注**  \n> EOS 可以被视为由 Dan Larimer 创建的、基于区块链的社交网络\
  \ Steem 的广义进化版。Steem 构建在 Graphene 区块链上，权限映射最初作为一个功能实现，但功能非常有限。虽然 Steem 被设计为一个去中心化的社交平台，但\
  \ EOS 是一个应用开发平台，拥有一个类似于以太坊的图灵完备区块链。\n\n为了理解权限映射，让我们看一个涉及三个用户角色的例子：账户所有者、活跃用户和社交媒体用户。社交媒体权限只允许用户执行特定操作，例如投票和发帖。另一方面，活跃用户权限允许执行除移除所有者之外的几乎所有操作。所有者可以执行所有可用操作，包括提款。在这个例子中，权限映射指的是账户所有者定义角色并将相关权限映射到其他账户。EOS\
  \ 通过允许自定义角色和自定义操作（这些可以被映射到不同账户）来推广这个例子。例如，一个账户持有者可以将某个社交媒体应用的权限映射到一个“朋友”用户组。现在，任何被（账户持有者）添加到该权限组的账户都可以立即访问该社交媒体应用。他们可以发帖、投票以及执行该权限组可用的任何其他操作，但他们的唯一密钥会被记录下来。因此，始终可以识别出是哪个用户执行了操作。权限映射的概念如图\
  \ 11-1 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig1_HTML.jpg](img/430562_2_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1** – 自定义权限映射的结构\n\n在图 11-1 中，我们可以将这个表示图分成两个部分：所有权和消息本身。所有权部分包含来自账户持有者的密钥，持有者可以执行所有账户功能，包括提取代币。它还包含代表所有者行事的活跃用户的密钥。这个结构的第二部分是消息，这里我们继续使用社交媒体的例子。有三个由所有者映射到该账户的社交媒体用户，每个用户都有一个唯一密钥。当一条消息发布到社交媒体时，发布者使用他们自己的唯一密钥对消息进行签名，因此可以追踪到映射用户执行的任何操作。这里的消息模块可以被其他应用替换，账户持有者将自定义权限映射到该应用，为映射用户提供受限的功能。\n\
  \n\n\n### 委托权益证明（DPoS）\n\nEOS 采用了一种名为委托权益证明（DPoS）的新型共识机制。它是权益证明算法的一个变种，专注于提高效率并确保公平访问，为小额钱包/账户提供了生产区块并赚取奖励的公平机会。传统权益证明算法与\
  \ DPoS 之间的区别，可以类比为直接民主与代议制民主之间的差异。在传统的权益证明（PoS）算法中，任何拥有钱包的用户都可以参与验证交易、达成共识，并获取部分挖矿奖励的过程。然而，对于持有小钱包或“权益”较少的用户来说，这可能是无利可图的。在\
  \ DPoS 中，网络中任何持有任意数量代币的钱包都可以投票选举代表，由这些代表负责验证交易并将区块追加到区块链上。最终，DPoS 网络中有两个主要参与者：\n\
  \n-   **利益相关者：** EOS 网络中的账户，持有带有余额的钱包。拥有代币使你能够投票选举区块生产者。\n-   **区块生产者：** 也称为代表，这些实体驱动着\
  \ DPoS 的共识机制。区块生产者相当于 DPoS 体系中的传统矿工。他们在网络上验证交易、签名区块，并因将区块添加到区块链而获得奖励。\n\n在深入探讨 DPoS\
  \ 之前，让我们简要回顾一下共识机制以及全局状态更新的必要性。回顾一下，区块链可以被建模为一个具有一致更新历史的状态机。交易作用于这个状态机，而共识则是网络范围内就交易更新全局状态的顺序达成一致的过程。随着新交易被纳入区块，以及频繁的更新过滤掉无效或双花交易，状态更新会以特定的增量进行。DPoS\
  \ 的目标是让区块生产尽可能平均地分布在最多人群之中，并确保通过民主、公平的流程选举出区块生产者。常规的 PoS 网络需要完全共识才能进行验证，而在 DPoS\
  \ 系统中，有限数量的委托节点（代表）可以可验证地完成交易验证并达成共识。\n\n> **注意：**  \n> 在当前的时间表中，EOS 允许由单一的区块生产者每三秒生产一个区块。默认情况下，区块以多个轮次的形式生产，每个轮次包含二十一个区块生产者。\n\
  \nDPoS 算法有两个主要的操作角色：选举一组区块生产者以及调度区块生产。网络中每个账户在称为批准投票的过程中，至少允许为每个代表（矿工）投一票。然而，在网络中持有更大“权益”的账户遵循每代币每代表一票的原则，并且可以为多个代表投票。区块生产者（代表）被视为区块链上最小化信任的方，通过实时投票过程选举产生。这些代表可以轮流（按轮次）将交易添加到区块中，并对要添加到区块链的区块进行签名。因此，使用可信的方可以防止恶意方将无效交易添加到区块链中。需要注意的是，代表没有能力更改交易或区块的详细信息；他们只能选择将交易添加到区块中或不添加。这组代表基于某种加权公平队列算法的变体，被随机分配进行区块生产。其目标是基于两个标准高效地调度区块生产者：他们获得的票数以及代表等待生产区块的时间。获得更多选票的代表更有可能被安排下一个生产区块。另一方面，失职的代表可以被迅速投票淘汰，而不会影响任何显著的交易量。让我们总结一下代表的主要角色：\n\
  \n-   **区块生产：** 代表最重要的功能是按照每三秒一次的固定时间表创建区块。这包括在多个轮次中验证交易和签名区块。\n-   **网络支持：** 每次代表生产一个区块时，他们都会因锻造该区块而获得奖励。薪酬率由利益相关者设定；然而，一些代表可能为了从网络中获得更多选票而接受较低的薪酬率。此外，代表们可能会通过提供诸如营销和法律工作等额外服务来取代接受较低薪酬率。\n\
  \n图 11-2 展示了 DPoS 共识算法中使用的代表性区块生产过程。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig2_HTML.jpg](img/430562_2_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2** — DPoS 中的区块生产\n\n网络上的利益相关者投票选举代表，这些代表反过来验证交易并生产区块。这一点如图 11-2 所示。从得票最高的代表中，选出二十一名参与多个轮次并生产区块。这些代表被分配到一个生产区块的时间表中，此分配使用轮询算法进行。如果区块生产者在计划的时间段之外进行锻造，则该区块被视为无效。在代表对区块进行签名后，最终的区块就可以被追加到区块链上，如图右侧所示。如果某个区块生产者未能按时生产，则下一个代表的区块将更大，并包含之前的事务。同时，如果某个区块生产者反复失败，他们将被投票淘汰出该轮次。\n\
  \n> **提示：**  \n> 有趣的是，DPoS 区块链不易产生分叉。这是因为区块生产者相互合作生产区块，而不是像在 PoW 系统中那样相互竞争。万一发生分叉，共识会自动切换到最长的链上。\n\
  \n\n\n### 并行执行\n\n在以太坊中，指令（例如来自智能合约的指令）的执行是以确定性和同步的方式在整个网络中完成的。EOS 提供了一项非常有趣的升级，可以在不使用任何锁原语的情况下并行执行应用程序。在这种情况下，区块链本身必须有一种机制来确保每个账户只更新自己的数据库。传入的指令会更新账户状态；因此，它们必须按顺序应用，以便第\
  \ `n`+1 条指令只有在第 `n` 条指令之后才能更新该账户。对于二元的是/否类型指令，这一通用规则存在一个例外。某些账户处理程序可以将二元指令作为只读指令处理并回复，而无需对其内部状态进行任何更改。\n\
  \n从根本上说，EOS 中的并行执行依赖于将来自一个账户内不同来源生成的消息分派到独立的线程，以便它们可以并行执行。最终，一个账户的最终状态仅取决于传递给它的消息。区块生产者负责将消息分派到独立的线程。即使区块生产者按计划进行区块验证，消息的分派也会按照更快速和定制的计划进行，以利用并行性的优势。通常，这些消息的来源是区块链上运行的脚本或自动发送消息的账户处理程序。由于\
  \ EOS 的并行特性，当消息生成时，它不会立即被传递。相反，在消息生成和传递之间会有一段时间间隔，称为延迟。引入延迟的原因在于，即时传递可能会干扰正在因前一条消息而修改自身内部状态的接收方。无锁消息传递是通过将消息调度到下一个周期中传递来实现的。\n\
  \n那么，什么是周期？在正常情况下，为了避免消息冲突，一个账户必须等到下一个区块才能发送第二条消息或接收回复。每三秒生成一个区块；因此，账户在发送更多消息之间至少需要等待三秒。为了消除消息之间的等待时间，EOS\
  \ 将一个区块划分为多个周期，并进一步将这些周期细分如下：\n\n* 每个周期被分为多个线程。\n* 每个线程包含一个交易列表。\n* 每个交易包含一组将被传递的消息。\n\
  \n图 11-3 展示了区块内周期的细分结构和组织结构。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig3_HTML.jpg](img/430562_2_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3 EOS 中消息的区块结构\n\n每个区块被划分为一个周期，这构成了单个区块内快速通信的基础。如果一个区块内的两个交易没有修改同一个账户，那么一个周期内的所有交易都可以并行执行。对于发生在用户之间的每个交易，接收方预设的任何自动处理程序都会收到传入指令的通知。\n\
  \n区块生产者不断向区块添加新的周期，直到达到时间限制或没有生成新的交易。在一个周期的时间窗口内生成的交易也可以添加到后续周期或下一个区块中。一旦区块最终确定，我们可以提出以下问题：给定一个区块周期，是否存在两个线程包含修改同一个账户的交易？如果没有，那么任何给定的区块都可以通过并行执行所有线程来处理。一个交易所应用程序开发者会运行全节点，目的是向其用户展示交易所状态。这个交易所应用程序不需要与社交媒体应用相关的状态。EOS.io\
  \ 软件允许任何全节点选择运行任意应用程序子集。传递给其他应用程序的消息会被安全地忽略，因为一个应用程序的状态完全源自传递给它的消息。本节有两个重要的要点需要重申：\n\
  \n* 一个应用程序的内部状态源于专门传递给该应用程序的消息。\n* 对账户内部状态的任何更改都通过账户之间传递的消息发生，并包含在区块链的交易中。\n\nDan\
  \ Larimer 评论了 EOS 的并行特性，认为这是在区块链上构建应用程序的巨大优势：\n\n> *并行处理能力为您的应用程序带来了持续的可扩展性和可靠的高性能基础。现有的单线程能力迫使每个应用程序共享单一单线程区块链的容量和性能，造成了严格的扩展限制，最终可能导致网络拥塞，进而可能引发平台范围的停机。*\n\
  \n注意\n\nEOS.io 最近进行了一次 ICO 为其开发筹集资金，CryptoPortfolio 对该 ICO 进行了审查，提出了一些值得考虑的观点。首先，利润产生来自于\
  \ EOS 代币的价值增值。用户和开发者越多，估值就越高。其次，EOS 上没有交易费用，因此账户和 DApp 需要代币才能运行。持有一定数量的代币就像购买了 EOS\
  \ 计算能力的百分比份额。第三，由于平台将免费使用，你只需要在账户余额中持有代币即可在这个区块链上操作。最后，用户要求他们使用的服务有快速响应，因此 EOS 将努力使交易确认时间少于\
  \ 1.5 秒。\n\n\n\n### 调度\n\n本节中我们要讨论的最后一个主题是尽力而为调度。回顾之前关于计算市场的讨论，区块链上类似 EVM 的图灵完备虚拟机决定了合约中指令的执行成本。请求特定任务的客户为指令的每一步支付`gas`，如果步数超过\
  \ EVM 的 gas 限制，任务将不会执行。在 EOS 中，代表取代了虚拟机，负责对执行资格做出全局决策。区块生产者（代表）对处理交易内指令并传递消息的复杂度（指令步数）和所需时间进行主观评估。这种处理成本的主观评估类似于以太坊系统中的`gas`。基于代表的指令计数和成本确定机制简化了为区块链添加新功能和优化的过程，无需担心破坏成本计算。它还允许我们对网络进行功能性分类：用于执行的区块链和虚拟机，以及用于计算资源分配和管理的节点或区块生产者。\n\
  \n为了对计算运行时间计费，每个区块生产者使用其对 EOS 算法的自定义配置来计算资源利用率。在整个网络中，每个步骤都有执行时间限制，并且无论计算耗时 1 毫秒还是完整时间，都会收取固定的带宽使用成本。需要注意的关键点是，在\
  \ EOS 中，所有资源使用约束都是主观的，最终由区块生产者强制执行。作为集体，区块生产者已在 EOS 网络上达成以下标准：\n\n- 对于区块生产者，有两种选择：包含一笔交易（一组指令）或拒绝将其包含在区块中。\n\
  - 如果区块生产者判定某个账户消耗了不合理的计算带宽，他们在生产自己的区块时将拒绝来自该账户的交易。\n- 只要有一个区块生产者认为交易有效且符合资源使用限制，所有其他区块生产者也会接受它。但该交易在网络上的确认时间会更长。\n\
  - 如果一个区块生产者包含了远超资源限制的交易，另一个生产者可能会拒绝该区块，此时需要第三个生产者作为决策者。\n\n决策区块的传播会存在延迟，这给了利益相关者和其他代表充足的时间来定位资源违规的源头。随着时间的推移，如果某个恶意区块生产者持续批准超出限制的区块，她将被投票从代表名单中除名。区块生产者在\
  \ EOS 中扮演“尽力而为”调度器的角色：公平调度任务以最大化吞吐量，或拒绝任务在网络上的执行。\n\n**注意**\n\n`EOS.io Core` 目前为\
  \ 2.0.5 版本，包含新的稳定性更新和功能。`Quickstart IDE` 是一个基于网页的开发工具，用于使用`EOS.io 2.0`构建区块链应用。它能在几分钟内实现智能合约的快速原型设计和快速部署。这简化了应用开发流程，尤其对新手开发者而言，无需进行大量配置。\n\
  \n## 链核心（Chain Core）\n\n`Chain` 是一种面向合约的编程语言，专为管理区块链上的资产而设计。`Chain` 目前已不再活跃开发。然而，用于管理资产的编程语言的概念框架和设计对读者您来说具有巨大的学习价值。因此，我们在新版中保留了本节内容。以下是对\
  \ Chain 平台由他们团队的精彩总结：\n\n> *使 Chain 区块链成为共享账本（而非简单分布式数据库）的关键特征，在于它被设计用于追踪和控制价值——即一个或多个资产的单位。与数据不同，价值是稀缺的：一旦发行，便无法复制，只能转移。*\n\
  > \n> *当金融工具的基础格式转变为加密发行的数字资产时，我们获得了新的能力，其中最显著的一点是能够编写控制资产的程序。这些程序被称为合约。*\n> \n\
  > *Chain 区块链上的所有价值都由这类合约保护。每个合约控制或锁定某些特定价值——即一定数量的资产单位——并强制执行解锁该价值前必须满足的条件。从最简单的托管账户到最复杂的衍生工具，合约定义了\
  \ Chain 区块链网络上资产转移的规则。而 Ivy 让您能够组合这些规则。*\n> \n> *在设计 Ivy 时，我们只有一个目标：让编写安全、可靠且简单的程序来控制区块链上的价值流动变得容易。仅此而已。*\n\
  \n在 2017 年共识大会（一场重要的区块链开发会议）上，Chain 宣布了对核心编程语言的一系列更复杂的升级，使编写管理资产的合约更加容易。`Ivy Playground`\
  \ 就是这项旨在尽可能优化开发者体验的成果。Chain 和 Ivy 在设计合约时采纳的核心概念是限制区块链中的信息量：仅包含状态更新逻辑和维持共识的变量。Chain\
  \ 团队对这一设计原理的解释如下：\n\n> *应尽可能在链下（即“应用层”）执行区块链解决方案的业务逻辑——使用传统语言编写程序，通过其 SDK 与 Chain\
  \ Core 交互。需要纳入“智能合约”层的唯一逻辑，是那些保护并转移资产的一系列规则。*\n> \n> *某些区块链平台被宣传为工作流自动化工具、共享状态的全球数据库，或构建软件即服务应用的平台。我们认为这些目标做出了错误的权衡，因为它们有效地将计算和逻辑从计算成本低廉、信息私密的传统服务器，转移到了每个计算都必须在网络每个节点上冗余执行的区块链上。*\n\
  \n\n\n理解 Chain 设计的关键在于，传统服务无法直接迁移到区块链上；相反，它们需要针对新的架构进行重新设计。首先，应用程序中会引入涉及共识机制的额外参数。程序化例程需要区分两类内容：一类是应保持在区块链之外的业务逻辑，另一类是需要同步到链上的状态变量。因此，需要做出新的设计决策。此外，传统服务存在一些固有的冗余，这在数据中心的服务器上通常不是问题，但在去中心化网络中，每个节点必须在计算的每一步都按相同顺序更新账户状态（复制状态机），这些冗余就会被放大。\n\
  \n为了演示 Chain 的运作方式，我们将通过 Ivy 来逐步操作 Chain Core。本次操作的主要目标是了解如何创建 HSM 加密密钥、如何创建账户以及如何交易资产。其布局将与我们在前一章中介绍的\
  \ Aragon 非常相似。请特别关注资产相关信息在 Chain Core 中的流转方式（图 11-4）。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig4_HTML.jpg](img/430562_2_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4\n\n## 配置 Chain Core\n\n在我们的操作中，我们将加入一个测试网络，它的行为类似于区块链，但所有数据每周会重置一次。测试网络有助于理解如何正确地与区块链交互，以及如何在\
  \ Chain 中管理资产。\n\n点击“加入网络”后，你应能进入 Chain Core 的控制面板。在这里，你会看到一个开始教程的选项。我们将在此处介绍该教程的基础内容，并补充更多关于\
  \ Chain 主要概念的信息。控制面板左侧是我们在整个操作过程中会频繁使用的导航菜单，如图 11-5 所示。导航菜单分为三个部分。顶部处理与账户、资产和交易相关的数据。中间部分处理与区块链交互所需的公私钥对。底部则提供了一些开发者服务；我们将在本章稍后部分介绍\
  \ Ivy Playground。要与测试网络交互，我们首先需要创建密钥。Chain 使用基于硬件安全模块（HSM）的密钥管理，这个密钥将成为你进入网络的网关。要创建密钥，请转到导航菜单，在“服务”下点击\
  \ `MockHSM`。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig5_HTML.jpg](img/430562_2_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5\n\n### Chain 控制面板上的导航菜单布局\n\n图 11-5 中的导航菜单分为三部分：核心数据，包括账户、资产和交易；服务，我们可以在其中创建\
  \ HSM 密钥；最后是一些开发者工具。我们将使用 `MockHSM` 选项卡来创建一组密钥对。\n\n那么，为什么我们需要一个 HSM 密钥对呢？这个密钥对将用于创建新的资产类别、发行新资产以及创建新账户。Chain\
  \ 控制面板的默认视图是交易视图。点击 `MockHSM`，你会看到一个提示“没有 MockHSM 密钥”的页面，这很合理，因为我们还没有创建任何密钥。那么，我们开始点击“新建\
  \ MockHSM 密钥”，你应该会看到图 11-6。为密钥输入一个别名，该名称将在整个 Chain 中使用。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig6_HTML.jpg](img/430562_2_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6\n\n### 创建一个新的 HSM 密钥\n\n在测试网络上，图 11-6 中的密钥数据将在一周后被清除。点击提交后，你应该会看到刚创建的密钥的确认信息，如图\
  \ 11-7 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig7_HTML.jpg](img/430562_2_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\n\n## 创建资产\n\n现在我们有了一个密钥对，可以用它来创建资产。点击“核心数据”下的 `资产` 选项卡，你应该会看到一些默认资产（在撰写本文时，Chain\
  \ Core 有两个默认资产），如图 11-8 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig8_HTML.jpg](img/430562_2_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8\n\n### 创建一个新资产\n\n我们可以通过点击屏幕右上角的“新建资产”按钮来创建新资产。你应该会看到如下的资产创建界面，如图 11-9\
  \ 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig9_HTML.jpg](img/430562_2_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9\n\n#### 资产创建与签名\n\n图 11-9 中的资产创建过程需要两步。首先是资产信息，包括以 JSON 格式分配给资产的任何标识符或定义。第二步是用你的公钥对资产进行签名。这里，我们将资产命名为*Silver*。\n\
  \n完成资产信息填写后，您需要向下滚动，用我们刚刚创建的 HSM 密钥对资产进行签名。图 11-10 展示了签名过程。Chain 文档提供了一个例子，说明用户为何可能需要多密钥认证（如图\
  \ 11-10 所示）：\n\n> *在简单的情况下，一个资产或一个账户将定义发行或转账所需的单个密钥。但可以针对不同的使用模式或为了达到不同的安全级别而定义多个密钥。例如，一个高价值资产可以定义为需要两个签名密钥，要求两个不同的方对每笔发行交易进行签名。一个联名账户也可以定义为需要两个签名密钥，但只需要其中任意一方的一个签名即可进行每笔转账。所需签名的阈值数量称为法定人数。*\n\
  \n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig10_HTML.jpg](img/430562_2_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10\n\n### 签署一个资产\n\n图 11-10 中有几个参数需要考虑。默认情况下，新资产可以通过一个密钥的签名来创建。批准新资产所需的签名数量称为法定人数，我们将使用默认值。最后，我们必须使用我们创建的密钥对资产进行签名。点击提交后，你应该会看到一个确认屏幕，显示在测试网络上创建了*Silver*资产。\n\
  \n## 发行资产和创建账户\n\n现在我们有了资产，需要发行它。在 Chain 中，所有资产都由用户管理和控制；因此，我们发行的资产必须由一个账户来管理。网络上还没有任何账户，让我们通过点击导航菜单上的“账户”来解决这个问题。这会带我们到账户视图。测试网络上可能有一些示例账户，例如\
  \ Alice 或 Bob，但在账户屏幕的右上角有创建新账户的选项。点击它，你会看到一个与创建资产非常相似的界面。实际上，大多数步骤都是一样的，比如填写账户信息，然后提供一个\
  \ HSM 密钥来签名它。新账户视图如图 11-11 所示。\n\n\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig11_HTML.jpg](img/430562_2_En_11_Fig11_HTML.jpg)\n\
  \n**图 11-11** 创建新账户\n\n创建账户包含两个步骤：提供账户信息与密钥签名。第一步如图所示，第二步与签署资产的操作完全相同。提供账户信息后，使用你的\
  \ `HSM` 密钥签署账户，随后会看到刚创建的账户的确认界面。接下来，为了演示账户间的交易，我们需要两个账户。因此，请创建第二个账户，别名设为 \"Team\
  \ Rocket\"，最终结果应如图 11-12 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig12_HTML.jpg](img/430562_2_En_11_Fig12_HTML.jpg)\n\
  \n**图 11-12** 账户摘要\n\n图 11-12 中测试网络上的两个账户将允许我们演示交易、锁定和解锁操作。现在我们有了两个账户，就可以在它们之间进行资产交易了。需要注意的是，在\
  \ Chain Core 中，资产仅能执行四种操作：发行、花费、转移（控制）或移除（销毁）。通常，这些操作的组合可实现用户间的交易。我们将在此处探讨两种交易类型：一种是向某个账户发行新资产，另一种是将该资产交易给我们创建的第二个账户。最后，我们将通过观察这些操作在\
  \ Ivy Playground 中的演变来结束本次操作指南。首先，导航到 `Transactions` 选项卡并点击“New Transaction”。这会将你带到“New\
  \ Transaction”视图，如图 11-13 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig13_HTML.jpg](img/430562_2_En_11_Fig13_HTML.jpg)\n\
  \n**图 11-13** 新交易视图\n\n交易只能依据我们前面提到的四种操作之一来执行。每种操作都有一组关联参数，需要提供这些参数才能完成交易。在图 11-13\
  \ 中，我们想要发行一种新资产，因此应选择“Issue”。点击“Issue”后，会出现另一个屏幕，询问你要发行的资产参数，如图 11-14 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig14_HTML.jpg](img/430562_2_En_11_Fig14_HTML.jpg)\n\
  \n**图 11-14** 创建资产\n\n图 11-14 中的发行操作首先要求我们输入要创建的资产名称，然后是想要发行的数量。回想一下，在 Chain 中，资产不能凭空发行；新资产的创建与账户对资产的控制是相结合的。一旦资产发行完成，我们会将其分配给我们创建的第一个账户。图\
  \ 11-15 显示了资产控制权转移到新账户的过程。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig15_HTML.jpg](img/430562_2_En_11_Fig15_HTML.jpg)\n\
  \n**图 11-15** 将资产分配给账户\n\n如图 11-15 所示的资产分配，在 Chain 中也被称为 *控制到账户*。一百单位的银被转移到我们创建的第一个账户。填写完分配信息后，即可提交此交易。它将被添加到测试网络，确认信息如图\
  \ 11-16 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig16_HTML.jpg](img/430562_2_En_11_Fig16_HTML.jpg)\n\
  \n**图 11-16** 交易验证\n\n图 11-16 中的摘要显示，一百单位的银资产被发行，然后分配给了 Vikram 的账户。或者换句话说，资产被发行后，由我们创建的第一个账户控制。这是我们在\
  \ Chain 上能执行的最简单的交易；现在，让我们进入下一个涉及两个用户之间交易的步骤。这次，我们必须使用 *花费* 操作来使资产可用，并使用 *控制* 操作来转移资产。从侧边栏回到\
  \ `Transactions` 视图并点击“New Transaction”，但这次我们不使用发行操作，而是选择“spend from account”，如图\
  \ 11-17 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig17_HTML.jpg](img/430562_2_En_11_Fig17_HTML.jpg)\n\
  \n**图 11-17** 从账户发起花费操作以开始交易\n\n现在，我们需要指定要转移多少银（图 11-18）。这第一步只是让资产变为可用状态，它仍然需要被认领。\n\
  \n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig18_HTML.jpg](img/430562_2_En_11_Fig18_HTML.jpg)\n\
  \n**图 11-18** 从 Vikram 账户中取出十个单位的银用于交易\n\n现在银已可用，让我们将所有权从第一个账户切换到第二个账户（图 11-19）。\n\
  \n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig19_HTML.jpg](img/430562_2_En_11_Fig19_HTML.jpg)\n\
  \n**图 11-19** 将所有权从一个账户转移到第二个账户（此处为 Team Rocket）\n\n就像发行资产一样，交易资产涉及一个账户使资产可用，另一个账户控制这些已释放的资产。为了确认交易已发生，我们可以回到\
  \ `Transactions` 视图，然后查看最近的交易；点击它将会展开该交易（图 11-20）。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig20_HTML.jpg](img/430562_2_En_11_Fig20_HTML.jpg)\n\
  \n**图 11-20** 最近交易的摘要\n\n注意在图 11-20 中，十个单位的资产由第一个账户（Vikram）花费，然后十个单位的资产由第二个账户（Team\
  \ Rocket）控制，从而完成了我们的交易。\n\n到目前为止，我们已经讨论了交易的两个关键操作，它们是 Chain Core 的核心。还有一些其他可用选项，例如销毁资产，这仅意味着将给定数量的资产从流通中移除。其效果是增加网络上的稀缺性。现在我们理解了操作的概念，在\
  \ Chain 中我们还能做什么呢？编写复杂的脚本来管理和移动 Chain 中的资产会变得有点复杂。Ivy Playground 的引入是为了围绕区块链上的锁定和解锁资产开发一种正式的脚本语言。开发者可以向脚本添加条件，并编写更复杂的合约来保护价值和资产。Ivy\
  \ 的主要目标是通过一组描述资产解锁条件的子句来锁定资产的价值。Chain 团队讨论了在 Chain 上合约与诸如以太坊等其他分布式计算平台有何不同：\n\n\
  > *Chain 区块链上的合约是不可变的。合约不能被更新，只能被花费——即从区块链中移除，并替换为一个或多个锁定相同价值的新合约。*\n\n> *这种不可变的状态模型将我们的方法与（例如）以太坊和\
  \ Fabric 区分开来。在以太坊中，合约可以相互发送消息和价值，并且可以根据这些消息更新自己的状态。*\n\n\n\n> *大多数当前的智能合约方法提供了编写在区块链上执行任意逻辑的程序的自由，但使得提供\
  \ Ivy 旨在提供的安全保障几乎不可能。虽然其他平台的目标是让构建任何东西都变得容易，但 Ivy 的目标是让构建错误的东西变得困难。*\n\n**注意**\n\
  \n像 Ivy 这样的编程环境将允许开发者编写代码，这些代码继承了内置于数据结构中的资产管理的安全性和保障性。这使得开发者在管理整个应用程序中的资产时，无需担心引入新的安全漏洞。\n\
  \n至此，我们完成了 Chain Core 和 Ivy 的演练。我们重点介绍了如何创建 HSM 密钥、如何创建新账户，以及 Chain 中可用的不同交易模式。最后，我们讨论了使用\
  \ Ivy 管理资产和编写脚本。尽管 Chain Core 不再开发，但其资产管理和围绕资产的安全编码实践将作为脚本语言的一项特性被区块链 3.0 范式所采用。让我们继续本章最后一项技术的旅程：企业以太坊。\n\
  \n## 企业以太坊\n\n在最近的 DAO 攻击事件（我们在第 6 章中讨论过）之后，包括摩根大通（JPM）、微软和埃森哲在内的几家公司组成了一个名为企业以太坊联盟（EEA）的联盟，旨在打造能够处理高容量交易和业务应用的企业级以太坊区块链。摩根大通投入了大量开发资源，为\
  \ EEA 提供了 `Quorum`：一个企业级的以太坊许可版本。自 `Quorum` 发布以来，更多具有共同企业利益的同行业公司创建了新的联盟，例如专注于企业区块链部署的\
  \ R3。我们将从深入讨论功能丰富的企业级以太坊区块链 `Quorum` 开始本节内容，并回顾其白皮书。然后，我们将深入探讨零知识证明技术 `zk-SNARKs`。最后，我们将讨论另一个类似于\
  \ EEA 的联盟模型 R3 和 `Corda`。尽管 EEA 始于 `Quorum`，但该项目已扩展其范围，以囊括企业范式的新目标。2020 年，EEA 项目旨在为在企业中创建隐私、许可账本、可插拔共识和模块化组件的可用性标准方面发挥关键作用。EEA\
  \ 未来有四个基本组成部分：\n\n*   为企业和以太坊应用程序创建一个开源标准，而不是一个单一产品。\n*   满足企业级部署的需求并进行建模。\n*  \
  \ 与技术栈与公共以太坊同步。\n*   尽可能使用现有标准并加以改进。\n\n**注意**\n\n什么是许可账本？许可区块链限制了可以作为区块生产者或矿工的参与方，从而最终限制了谁可以为全局状态的共识做出贡献。在金融领域，这种验证对于规模化产品以满足大众需求可能变得必要。\n\
  \n### Quorum 技术栈\n\n`Quorum` 在 GitHub 上的开发页面列出了以下相较于以太坊的改进特性：\n\n*   **隐私：** 使 `Quorum`\
  \ 适用于企业工作的一个关键创新是通过私有交易和私有合约引入隐私。这是通过 `Constellation` 实现的，`Constellation` 是一个点对点消息传递守护进程，可以指导私有信息流向适当的网络参与者。\n\
  *   **替代性共识：** `Quorum` 不依赖 POW/POS 来实现许可账本；相反，有两种更适合企业级区块链的共识机制：\n    *   **`QuorumChain`：**\
  \ 一种基于智能合约的新模型，依靠节点投票达成共识\n    *   **基于 Raft 的共识：** 一种适用于封闭成员联盟环境的共识模型，具有极快的区块生成时间\n\
  *   **节点许可：** `Quorum` 中的一项功能，只允许与持有适当识别密钥并已注册参与许可网络的节点建立连接。\n*   **更高性能：** `Quorum`\
  \ 必须提供比以太坊显著更高的性能，才能在像支持银行级交易量所需的高容量环境中使用。\n\n当我们深入探讨 `Quorum` 的特性时，我们将首先讨论 `Quorum`\
  \ 中两种共识机制背后的关键概念。然后，我们将介绍对节点进行了哪些修改使其能够处理私有交易。最后，我们将讨论 `Constellation` 以及它如何在许可网络中促进数据传输。在技术讨论之后，我们将总结\
  \ `Quorum` 白皮书中关于 `Quorum` 特性和私有交易的内容。让我们从共识机制开始：\n\n*   **`QuorumChain`：** 一种多数投票共识机制，由智能合约决定哪些参与方（节点）可以投票接受或拒绝区块。\
  \ `Quorum` 上的参与节点可以是实际构建区块的`制造者`节点，也可以是对区块有效性进行投票的`投票者`节点。 `QuorumChain` 使用以太坊的签名验证方法（如\
  \ `ecrecover`）来验证从`制造者`节点和`投票者`节点收到的投票。一旦 `投票者`节点的投票达到阈值，该区块就被接受进入网络。\n*   **基于\
  \ Raft 的共识：** Raft 系统中工作的基本单元是日志条目。日志是一个有序的事件序列，如果网络中的所有成员都对条目及其顺序达成一致，则认为日志是一致的。在\
  \ Raft 中，一个节点可以是领导者或追随者，所有节点最初都是追随者。最终，通过一个对等选举过程，一个节点成为领导者。与之相比，在以太坊中，任何节点都可以挖出一个新区块或成为该特定轮的领导者。在\
  \ Raft 中，只有领导者才能在真正意义上“锻造”一个区块，但领导者不需要提供任何工作量证明。相反，领导者提出一个区块，由追随者投票，一旦获得法定人数（多数票）的投票，它就会被接受为扩展区块链的下一个区块。追随者还会向领导者发送确认，现在该区块被提交到日志条目。一旦领导者收到确认，它会通知每个节点这个新条目（区块）已提交到日志。\n\
  \n现在我们已经讨论了共识，让我们看看是什么让节点接受私有交易。在以太坊中，所有交易都是公开的，并且默认情况下，节点只接受公开广播的交易。要使 `Quorum`\
  \ 工作，必须进行以下更改：\n\n*   POW 共识算法已被基于投票的 `QuorumChain` 所取代。最终目标是让多个共识算法以“可插拔共识”的模式在区块链上运行。\n\
  \n\n\n- 经过修改的连接层，其中连接到许可账本的节点已被识别并注册。\n- 状态树已被拆分为两棵树：公共状态树和私有状态树。\n- 区块可以使用包含私有交易的新逻辑进行验证。\n\
  - 交易可以通过将部分数据替换为加密哈希来创建，以在需要时保护隐私。\n\n私有交易和合约是如何在网络中传播的？私有数据的流向又是如何处理的？首先，以太坊交易模型中引入了一个新的可选参数\
  \ `privateFor`，它可以接受多个地址。`Quorum` 将来自此参数的地址视为网络中的私有地址。引入了一种新的交易类型 `IsPrivate`，用于将某些交易标记为私有。然而，使私有交易传播成为可能的主要工具是\
  \ `Constellation`：一种点对点加密消息交换系统。以下是 `Constellation` 在 `Quorum` 中提供隐私的基本工作原理：在私有交易传播到\
  \ `Quorum` 网络之前，消息（包含在交易中）和标头会被替换为从 `Constellation` 收到的加密负载的哈希值。网络中的某些参与者的公钥已被 `Constellation`\
  \ 包含在负载中；当这些用户收到负载时，他们可以使用自己的 `Constellation` 实例进行解密。其他所有参与者只会看到一个加密的哈希值，并跳过该交易。涉及的参与者将解密负载并将其发送给\
  \ `EVM` 执行，从而相应地更新其内部状态。\n\n`Constellation` 中有两个组件在维护隐私方面发挥着重要作用：交易管理器（`transaction\
  \ manager`）和飞地（`enclave`）。交易管理器存储加密的交易数据，促进参与者之间加密负载的交换，并在满足条件时管理私有交易的传播。它还调用 `Quorum`\
  \ 中的其他模块，特别是调用飞地执行加密功能。在许多方面，交易管理器像一个中央枢纽，控制着消息在 `Quorum` 的各个组件之间的流动。飞地是 `Quorum`\
  \ 的加密核心。交易管理器本身无权访问任何敏感信息或密钥，它将对称密钥生成、数据加密和解密等加密任务委托给飞地。飞地还持有网络中账户的私钥。交易管理器和飞地都与其它组件隔离，以增强安全性。\n\
  \n## zk-SNARKs\n\n零知识证明，或称零知识简洁非交互式知识论证（`zk-SNARK`），是一种源自 `ZCash` 的新技术，旨在维护区块链上交易的隐私和匿名性。最近，`EEA`\
  \ 宣布，`ZCash` 背后的团队将帮助为 `Quorum` 实现一个 `zk-SNARK` 层，以增强区块链上交易的隐私和安全性。零知识证明是如何工作的？`zk-SNARK`\
  \ 技术通常用于复杂的支付场景。让我们看一个例子：假设如果发生 `X`、`Y` 或 `Z` 中的任何一个事件，Alice 就可以从智能合约中收到资金。现在，任何一种情况（`X`、`Y`、`Z`）都可能与\
  \ Alice 的健康状况或她不想向公众透露的商业决策有关。这正是 `zk-SNARK` 的用武之地，它可以为智能合约创建一个证明，表明三个条件（`X`、`Y`、`Z`）中有一个发生了，但不揭示具体是哪个条件发生了。更正式地说，来自\
  \ `ConsenSys` 的 `Christian Lundkvist` 将零知识证明描述如下：\n\n> “零知识证明的目标是让验证者能够说服自己，证明者拥有某个秘密参数（称为证据）的知识，该参数满足某些关系，同时不向验证者或任何其他人透露该证据。”\n\
  \n在我们之前的例子中，Alice 的三个选择构成了一个证据，她必须向智能合约证明其中之一发生了，但不需要透露具体情况。来自 `ZCash` 的 `Paige\
  \ Peterson` 证实，`zk-SNARK` 作为结算层将被引入 `Quorum`，为交易提供增强的隐私和安全性。最终目标（在 2017 年共识大会上描述）是使零知识证明与区块链无关，并将结算层作为一种服务来实现。未来与零知识证明的集成可能成为许可账本处理企业级交易的一个范式转变。吸取一些经验教训并拥有更好的结算层后，在医疗保健领域保护患者数据和维护隐私方面将出现一些极好的应用机会。\n\
  \n> **注意**\n>\n> `ZoKrates` 是一个高级编程工具包，可用于以开发者友好的语言编写零知识证明。这些证明编译成兼容以太坊的 `zk-SNARK`\
  \ 并在链上执行。此外，`ZoKrates` 可以将可验证计算扩展到 `DApp`，例如，可以在链下为某个任务执行计算证明，并将其提交到以太坊区块链进行验证。\n\
  \n## Review of Quorum Whitepaper\n\n图 11-21、11-22 和 11-23 摘自 Quorum 白皮书（已获许可），以图形方式提供了\
  \ Quorum 的高级概述，强调了新的技术组件和私有交易。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig23_HTML.jpg](img/430562_2_En_11_Fig23_HTML.jpg)\n\
