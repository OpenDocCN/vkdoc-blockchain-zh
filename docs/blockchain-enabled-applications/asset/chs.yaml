  图 11-22：隐私与私有交易在 Quorum 网络中传播的概述\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig21_HTML.jpg](img/430562_2_En_11_Fig21_HTML.jpg)\n\
  图 11-21：Quorum 概述及其关键创新\n\n注意图 11-21 右上角 Quorum 的架构设计，正如我们之前描述的所有主要组件一样。此外，图 11-23\
  \ 展示了全局状态在 Quorum 网络上是如何维护的：公共状态在所有网络节点之间保持一致并保持同步，而私有状态则基于权限而变化。从这些幻灯片中最重要的收获是私有交易在\
  \ Quorum 网络中传播时的详细工作流程。我们没有机会详细说明这个流程，因此包含这些幻灯片将增强您对私有交易和加密负载在 Quorum 中如何工作的理解。\n\
  \n\n\n### 企业以太坊联盟路线图\n\n首要目标中，EEA 旨在成为构建企业级以太坊应用的规范与标准。Helen Partz 近期在 *Cointelegraph*\
  \ 上发表的一篇文章强调了该项目在此方向上取得的进展：\n\n> 企业以太坊联盟（EEA）正在组建一个技术工作组，致力于协调主网与企业之间的协作。\n>\n>\
  \ 根据 8 月 6 日与 Cointelegraph 分享的一份新闻稿，该工作组名为“EEA 主网倡议”，旨在加速并引领 EEA 的企业和初创成员，以及从事主网技术和互操作性解决方案研究的人员之间的合作。\n\
  >\n> **EEA 主网倡议致力于互操作性与可扩展性解决方案**\n>\n> 新闻稿指出，主网倡议将努力提升对公共网络组件如何满足促进以太坊采用所需的商业市场要求的理解。EEA\
  \ 将作为以太坊基金会主要开发者大会 `Devcon5` 的一部分，围绕主网倡议举行互动讨论。\n\n以下三张图（图 11-24、图 11-25、图 11-26）取自\
  \ Bob Summerwill 提供的 EEA 最新动态。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig26_HTML.jpg](img/430562_2_En_11_Fig26_HTML.jpg)\n\
  \n图 11-26\n\nEEA 近期关注的三大领域\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig25_HTML.jpg](img/430562_2_En_11_Fig25_HTML.jpg)\n\
  \n图 11-25\n\n为处理企业级交易而修改的以太坊新协议栈\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig24_HTML.jpg](img/430562_2_En_11_Fig24_HTML.jpg)\n\
  \n图 11-24\n\n企业以太坊联盟简介\n\n在此例中，隐私至关重要，并且大多数矿工（节点）都是已知且可信的。请注意，企业协议位于共享的公有-私有区块链之上，并进行了必要的修改以保护隐私。公有客户端共享相同的存储和虚拟机，而私有或企业客户端则会被分配隔离的存储和虚拟机，用于执行加密的指令负载。更广泛地说，企业以太坊是一场比\
  \ EEA 正在开发的 `Quorum` 更为宏大的运动。让我们退一步，谈谈为何需要企业版本。`ConsenSys` 的 Jeremy Miller 给出了三个主要原因：\n\
  \n*   以太坊最初是为公有链部署而开发的，其去信任的交易需求优先于绝对性能。当前的公有链共识算法（尤其是工作量证明）对于拥有可信参与者和高吞吐量需求的网络来说过于繁重。\n\
  *   从定义上讲，公有链的隐私和权限要求有限（至少最初是这样）。尽管以太坊确实允许在智能合约和网络层实现权限控制，但它并不“开箱即用”地兼容传统的企业安全和身份架构，也不符合数据隐私要求。\n\
  *   自然，当前的[以太坊改进流程](https://github.com/ethereum/EIPs)（主要由以太坊改进提案主导）在很大程度上受公有链事务主导，此前企业\
  \ IT 需求在此流程中很难得到清晰阐述和优先考虑。\n\nEEA 在近期的核心技术目标是什么？图 11-26 在 `Quorum` 开发的背景下提供了三个主要关注点。\n\
  \nEEA 最大的关注点是开发可在全行业使用的企业参考规范和实现标准。另一方面，`Quorum` 的开发重心在于提供高水平的隐私保护（`JPMorgan` 将其视为主要障碍），并可根据用户执行的交易和智能合约进行配置。混合公有-私有链可以成为联盟型场景的理想模式。下一个重点是创建可插拔的共识模型，使得交易和复杂场景能够选择最适合该用例的共识机制。最后，高吞吐量性能对于\
  \ `Quorum` 的成功至关重要；因此，开发更好的基准测试工具来进行衡量和改进，将成为其广泛采用的关键。\n\n\n\n## R3 与 Corda\n\n\
  R3 是另一个类似于 Hyperledger 或 EEA 的联盟，也是 Corda 这一独特许可型区块链平台背后的驱动力。Corda 在许多方面不同于其他分布式账本技术，Nick\
  \ Avramov 在一篇博文中对此进行了解释：\n\n> *你需要掌握三个核心概念才能精通 Corda。它们分别是：*\n\n> *状态（State）——或称状态对象。它是\
  \ Corda 的构建模块，代表一份特定的协议或合约，如同现实世界中的合同。这正是需要达成共识的对象——即确切的状态对象，而非整个账本的状态。这一点非常重要，稍后将详细阐述。*\n\
  \n> *流程（Flow）——一种小型多方子协议，用于将交易数据（状态对象）共享给相关参与方。这与我们在比特币和以太坊等公链中观察到的全局广播机制截然相反。*\n\
  \n> *公证人（Notary）——提供交易排序和时间戳服务的实体。关键在于，Corda 并不将交易组织成区块，因此它并非区块链。*\n\n> *与比特币和以太坊不同*，Corda\
  \ 是一个基于许可的网络，你必须获得授权才能接入。这一点在流程 API 中已有明确规定——没错，就是我之前介绍的流程。它也可以被视为一个部落或类似实体，对你的身份施加了特定要求，除非满足这些要求，否则你无法加入该特定流程。共识是在交易层面达成的（而非像比特币或以太坊那样在账本层面），因此无需所有网络节点来验证和批准交易。\n\
  \n> *事实上，Corda 的一个重要特点在于其能够灵活使用不同的共识算法。由于它没有固定的单一算法，公证人实际上可以使用不同的算法——例如 BFT、Raft，或者其他算法。可以提前说明的是，Corda\
  \ 正在为所有这些子网络或流程开发一个元网络。想象一下，存在审计公司、银行以及为这些银行服务的清洁公司。它们都有自己内部的簿记、分包商以及各种其他金融和非金融关系。从某种意义上说，Corda\
  \ 旨在开发一个系统，使用相同的协议来处理所有这些交互，无论是公司内部的交互还是与外部公司的交互。*\n\n> *值得提及的是，Corda 的开发人员从一开始就宣称，他们正在创建一种架构，该架构将以具有法律强制执行力的方式模拟和自动化现实世界的交易。这是许多区块链的常见缺陷——它们存储的交易不具有法律价值。相反，Corda\
  \ 中的智能合约不仅包含交易信息，还包含法律条文。*\n\n> *与其他分布式账本技术（账本在所有组织间共享）不同，在 Corda 中，交易仅在该子网络或流程内共享。从这个意义上说，它采用的是直接通信而非全局广播，从而保护了隐私。*\n\
  \n> *没有任何一个实体拥有网络中所有交易的完整历史记录。但存在公证人，他们了解网络中这一特定部分的当前状态。他们充当交易的验证者。典型的交易流程如下：*\n\
  \n> *一笔新交易 A 将状态 X 转换（Corda 术语称为“花费”）以创建状态 Y。*\n\n> *你将交易 A 发送给知晓状态 X 的公证人。*\n\n\
  > *公证人检查状态 X 是否仍然有效，然后签署交易 A。状态 X 现在失效，由状态 Y 取而代之。*\n\n> *如果在提出交易时上述状态 X 无效，公证人将回应状态\
  \ X 已被花费。*\n\n> *因此，Corda* *将了解世界状态和查看所有交易的责任从整个网络转移到了一个专门的公证服务上。网络成员无需信任所有人，只需信任运行公证服务的组织。也可以有多个公证人，每个公证人因不同目的而受到信任。*\n\
  \n## 总结\n\n在本章中，我们从三个不同角度讨论了区块链 3.0 范式中应用高级链上执行的情况：EOS.io 及其精妙的消息传递和并行处理能力、作为区块链上资产管理未来模型的\
  \ Chain Core，以及企业级以太坊。以太坊的企业级应用正由希望解决特定领域问题的公司组成的联盟（如 Hyperledger、EEA 和 R3）引导。每个企业级项目背后都有一个开源社区，这使得代码库对于大规模部署而言更加安全、高效且实用。\n\
  \n"
- '# 12. 技术革命与金融资本市场


  全球金融市场正在经历一场剧烈的变革，这场变革清楚地表明，如果没有创新，大多数商业和金融模式可能很快就会过时。最近一份关于全球金融体系的概述将当前系统描述为：


  > *一个每天移动数万亿美元、服务于数十亿人的系统，但这个系统问题重重，通过费用和延迟增加成本，通过冗余且繁重的文书工作造成摩擦，并为欺诈和犯罪提供了机会。*


  > *据我们所知，45% 的金融中介机构，例如支付网络、证券交易所和汇款服务，每年都会遭受经济犯罪的侵害；整个经济体的这一比例为 37%，而专业服务和技术部门分别仅为
  20% 和 27%。难怪监管成本持续攀升，并一直是银行家最关注的问题。这一切都增加了成本，最终由消费者承担。*^(¹¹)


  《区块链革命》的作者唐·塔普斯科特指出，我们的金融体系效率低下有多方面原因：


  > *首先，因为它已经过时，是工业技术和纸面流程的拼凑物，只不过套了个数字化的外壳。其次，因为它中心化，这使其抵制变革，并容易受到系统故障和攻击。第三，它具有排他性，剥夺了数十亿人使用基本金融工具的权利。银行家们在很大程度上回避了那种创造性的破坏，尽管这种破坏是混乱的，但对经济活力和进步至关重要。*^(¹²)


  本章从与全球金融市场相关的问题入手，探讨区块链为何能成为提高其效率的创新解决方案。然后，我们将转向风险投资、ICO、加密货币、代币和交易所等主题。我们将讨论重大的
  ICO 市场影响、监管状况、美国证券交易委员会的介入、独特技术、商业模式、监管科技以及相关问题。在回顾这些概念和问题时，有几个问题和想法需要牢记：


  *   众筹如何扩展区块链应用？


  *   如何创建新的公司和借贷平台？


  *   监管科技能否满足市场对高效合规的需求？


  *   金融科技对银行业和投资银行业的市场影响是什么？


  *   ICO 融资和 ICO 泡沫的现状如何？


  *   随着技术帮助民主化金融机会，各种财富水平的人如何才能参与到金融市场中？


  在本章结尾，我们将介绍多个大型金融集团的现状及其在区块链、金融科技和其他金融技术领域的参与情况。




  ## 区块链行业现状


  自 2017 年第二季度以来，区块链行业在过去三年中呈现出巨大的增长态势。据著名加密金融研究公司 Smith & Crown 称，这已证明是区块链行业整体蓬勃发展的时期。加密代币市场持续上涨，其价值在短短数周内翻了一番甚至两番。Smith
  & Crown 指数（`SCI`）反映了加密代币的牛市行情，自 2017 年以来价值已增长逾一倍。加密代币市场市值的增长伴随着代币销售市场的狂热活动。从各方面来看，2017
  年第二季度正是一个创纪录时期的开端。^(¹³)


  ### 区块链解决方案


  正如我们在前几章所述，区块链是一种颠覆金融体系低效环节的创新解决方案。Humaniq 首席营销官 Kastelein 指出，支撑区块链技术、使其能够改变金融市场交易创建方式的基本原则有五项。值得重申这些支撑该技术的基本原则：


  - **分布式数据库：** 区块链上的每一方都可访问整个数据库及其完整历史记录。没有任何单一节点控制数据或信息。每一方无需中介即可直接验证其交易对手的记录。

  - **点对点传输：** 通信直接在节点之间进行，而非通过中心节点。每个节点存储信息并将其转发至所有其他节点。

  - **具有假名性的透明度：** 任何有权访问该系统的人都可查看每笔交易及其相关价值。区块链上的每个节点或用户都有一个由三十多个字母数字字符组成的唯一地址来标识身份。用户可选择保持匿名或向他人提供身份证明。交易发生在区块链地址之间。

  - **记录的不可逆性：** 一旦交易录入数据库且账户更新，记录便无法更改，因为它们与之前的所有交易记录相关联（故称之为*链*）。系统部署了多种计算算法和方法，以确保数据库中的记录是永久性的、按时间顺序排列的，并且网络上的所有其他节点均可访问。

  - **计算逻辑：** 账本的数字特性意味着区块链交易可与计算逻辑相结合，本质上可实现编程。因此，用户可以设置能够自动触发节点间交易的算法和规则。^(¹⁴)


  Tapscott 指出：


  > *在人类历史上，两方或两方以上——无论是企业还是可能互不相识的个人——首次无需依赖中介机构（例如银行、评级机构以及美国国务院等政府机构）来验证身份、建立信任或执行业务逻辑的关键环节（如签约、清算、结算和记录保存，这些是所有商业形式的基础），便能达成协议、进行交易并创造价值。*^(¹⁵)


  区块链应用可以通过点对点交易和协作，为经济体中所有参与者降低交易成本。区块链确实是一项颠覆性的金融市场解决方案，它运用新技术，并以思想领导力为驱动。


  ## 风险投资与 ICO


  真正的问题是：ICO 是否会取代传统风险投资成为募资模式？很少有人能想象，在一年之内，风险投资行业竟会被这种名为 ICO 的创新募资方式所超越和改变。ICO，也称为代币发行，是随着区块链技术、众筹、创新财富理念以及加密货币投资发展出新模式而兴起的。ICO
  对风险投资行业而言既是威胁也是机遇。


  传统风险投资家看到了 ICO 在加密货币、区块链投资、流动性以及更快获得财务收益方面的盈利机会。传统风险投资家的运作方式及其在市场中的地位可能面临颠覆。这是技术革新驱动金融市场发生巨变的时期，令人高度关注。美国证券交易委员会（SEC）近期在一封信函中声称，ICO
  受到证券法的约束。SEC 将在加密货币和 ICO 问题上采取行动，这一点消除了一个重大疑问。然而，个人、团体及发行如何符合 SEC 规定尚不明确。这个过程需要时间来解决，并确立相应的规则和先例。




  ### 首次代币发行


  `ICO`是一种为发行新加密货币进行众筹的方式。通常，在加密货币正式发行前，会出售新币的代币，以筹集技术开发资金。与首次公开募股（`IPO`）不同，购买代币并不赋予持有者在新加密货币开发公司中的所有权。与`IPO`不同的是，`ICO`不受（全面的）政府监管。^(¹⁶)


  `ICO`以及使用分布式账本技术的新型融资模式，正开始颠覆公开市场（`IPO`）和私人投资（风险投资）。《币报》的一篇文章阐述了区块链对风险资本形成的影响。《币报》进一步指出：“来自创业者和投资者群体的需求与兴趣已得到证实，但监管指导有限。`ICO`作为一种融资机制可能会继续获得发展动力。”^(¹⁷)


  “`首次代币发行`（`ICO`）正以快速且不断扩展的方式改变着加密货币市场。此外，风险投资行业正试图理解这种新的金融投资方式。比特币社区通过区块链技术、新财富、聪明的创业者以及由区块链驱动的想法所支持的投资者的结合，创造了这一局面。”《哈佛商业评论》撰稿人理查德·卡斯特莱恩表示。^(¹⁸)


  就筹集资金而言，`ICO`在整体众筹排行榜上占据主导地位，前二十名中有一半来自加密货币社区。高盛、纳斯达克以及拥有纽约证券交易所的美国控股公司洲际交易所等主导`IPO`和上市业务的公司，一直是区块链企业最大的投资者之一。^(¹⁹)


  《币电讯》将`ICO`解释为：


  > *一个最近在加密货币和区块链行业中出现的项目众筹概念。当一家公司为了融资而发行自己的加密货币时，它会发行一定数量的加密代币，然后将这些代币出售给目标受众，最常见的方式是换取比特币，但也可以是法定货币。结果，公司获得了产品开发所需的资金，而受众则获得了加密代币份额，并且他们拥有这些份额的完全所有权。*^(²⁰)


  关于`ICO`如何创建以及执行步骤的具体示例，可以在`SONM`执行模型中看到。首先，什么是`SONM`？“`SONM`是一个全球操作系统，也是一个去中心化的全球雾计算平台。它有可能包含无限的计算能力（`IoE`、`IoT`）。使用`SONM`系统组织的全球计算可以用于完成从
  CGI 渲染到科学计算等众多任务。”^(²¹)


  `SONM`的显著特征是其去中心化的开放结构，买家和工作者可以在没有中间人的情况下互动，同时首先为他们自己建立一个有利可图的市场，这与其他云服务（例如亚马逊、微软、谷歌）不同。


  与广泛使用的中心化云服务不同，`SONM`项目实现了雾计算结构，即一个去中心化的设备池，所有这些设备都连接到互联网（`IoT`/`IoE`）。`SONM`使用用于雾计算的`SOSNA`架构来实现。`SONM`
  `ICO`的具体执行步骤如下：


  *   `SONM`平台使用同名的代币`SONM`（代码`SNM`）。

  *   `SNM`的总供应量将限于众筹期间创建的代币数量。

  *   计算能力购买者将使用`SNM`代币，通过基于智能合约的系统支付计算费用。

  *   `SNM`是在以太坊区块链上发行的代币，使用了包括以太坊钱包在内的代币实施、存储和管理的标准。

  *   `SONM`项目众筹、`ICO`以及`SNM`的创建将使用以太坊智能合约进行。

  *   愿意支持`SONM`项目开发的参与者，将以太币发送到指定的`ICO`以太坊地址，通过此交易以指定的`SNM/ETH`汇率创建`SNM`代币。

  *   `ICO`参与者只能在众筹期（指定为以太坊区块编号）开始后，将以太币发送到`SONM`众筹以太坊地址。

  *   当指定的结束区块被创建，或达到`ICO`上限时，众筹将结束。

  *   `SNM`代币销售`ICO`。

  *   `SONM`预售于 2017 年 4 月 15 日启动，并在不到 12 小时内成功完成，筹集了 10,000 以太币。

  *   预`ICO`代币将通过一种特殊的安全迁移功能转移到主代币合约中。

  *   代币分配完成给所有方。

  *   交易完成。^(²²)


  该过程如图 12-1 所示。


