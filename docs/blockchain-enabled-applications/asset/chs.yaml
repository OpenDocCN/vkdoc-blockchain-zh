  \n## 引言\n\n区块链技术势必将从根本上改变我们的网络世界。比特币是区块链的第一个实现；然而，它通过允许在全球互联网上无需中心化权威即可进行价值转移，进而推动了线下世界的根本性转变。通过区块链实现信任的数字化和民主化，正在催生新一类应用和公司的成长。Marc\
  \ Andreessen 曾在《华尔街日报》上发表过一篇著名文章，描述了“软件吞噬世界”的主题，其中众多行业在被软件消化后正经历快速转型。为此，我们希望本书能为读者提供一个展望，展现区块链如何积极改造企业并创造全新的垂直领域。\n\
  \n区块链技术所代表的根本性转变，是在大规模分布式网络中摆脱单一中心化可信权威的方法。相反，它允许多个信任源基于算法共同达成一致，确认某笔交易是可信且有效的。此外，大多数区块链解决方案提供交易的不可篡改且持久的记录，任何来源（无论是否可信）都难以更改或修改。这为我们的网络世界带来了一个全新的安全、隐私和信任层级。正如您将在本书中看到的，当前区块链生态系统由各种用途、协议和标准构成。\n\
  \n我们也力求在技术参考与操作手册之间取得完美平衡，展示当前及未来状态用例的实践范例。虽然本书并非百科全书，但我们确实选择了几个前景广阔的领域，在这些领域中，区块链技术正开始为全新的行业细分领域赋能应用。我们希望本书能为您提供信息，并为利用区块链技术为您的业务赋能新应用而取得成功提供路线图。\n\
  \n在本书中，您将看到许多应用示例来强化关键要点。早期的示例超越了金融交易，涵盖了金融科技、监管科技、保险科技、政府科技（电子投票、许可、记录和认证）、健康科技等众多领域的其他方面。\n\
  \n为了理解这些早期示例，有必要在前几章中探索区块链的历史；分布式信任的基础；共识机制；硬件；软件；以及加密技术。接下来，您将了解区块链基础知识中的网络交易和简化支付。我们将把这与以太坊的扩展功能及特定特征（如\
  \ Gas 机制和去中心化应用的工作方式）进行比较，并辅以区块链即服务的示例。为了进一步扩展这些能力，本书用两章的篇幅专门探讨去中心化自治组织/去中心化组织及其领域的细节和示例。在第\
  \ 7 章中，以太坊代币因其创造价值的能力而受到强调，并辅以各种技术和商业领域的示例，这些示例凸显了智能合约的强大能力，它允许多种价值来源和规则直接嵌入交易中。接下来的三章（第\
  \ 8、9、10 章）分别提供了区块链在科学领域的应用、区块链在医疗保健领域的应用，以及超级账本项目的结构细节。第 11 章聚焦于许多最新发展，例如 EOS 区块链、企业以太坊联盟、Quorum、R3\
  \ 和 Corda。第 12 章特别关注首次代币发行及其对金融市场和流程的影响。下一章是作者与 Hashed Health 的 John Bass 就建立医疗保健联盟进行的对话。第\
  \ 14 章重点介绍了新的云-区块链计算格局，并强调了区块链即服务。随后的四章（第 15、16、17、18 章）是与区块链领域杰出人物的访谈，讨论了区块链在教育、人工智能、机器学习和量子模拟中正在转变的角色。\n\
  \n\n\n"
