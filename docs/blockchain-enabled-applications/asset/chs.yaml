- "# 16. 全新可能的艺术：用新兴技术与联邦学习变革医疗\n\n本章内容源自作者（Heather Flannery、Jonathon Passerat-Palmbah\
  \ 博士和 Sean T. Manion，由 Vikram Dhillon 编辑）于 2020 年 8 月 26 日在线上 ConsenSys Health COVID-19\
  \ 退伍军人健康峰会所做的演讲——“全新可能的艺术：五种新兴技术将如何变革医疗”。\n\n## 引言\n\n自商业互联网诞生以来，我们从未像现在这样，在医疗健康领域经历如此切实的颠覆性与变革性技术融合。不幸的是，我们早期革新医疗技术的尝试并未实现全面包容，导致提供者、患者和支付方陷入日益严峻的处境。最终造成了巨大的数字鸿沟，差距进一步恶化，医生因医学人文精神被异化而出现自杀危机，以及一系列其他全球性问题。如今，我们首次拥有了对人类具有非凡积极潜力的创新，其意义堪比古腾堡印刷机、蒸汽机、集成电路和互联网同时问世（这显然是假设性的）。当然，与任何颠覆性技术一样，在我们面对这些能够改变医疗健康的变革时，深思熟虑和伦理考量带来的巨大风险与理由至关重要。新时代的序曲已经奏响，此刻正当其时。\n\
  \n通过实施三大关键技术领域，医疗健康的转型是一个可以实现的现实：\n\n1. **区块链** – 包括可选的**代币化**\n2. **去中心化人工智能（AI）**\
  \ – 主要是**机器学习**\n3. **深度隐私保护** – 包括**零知识密码学**以及**可验证和机密计算**\n\n近年来，全球最大的医疗健康企业一直在开展关于区块链技术新模型的应用研发、实验、规划和业务开发。例如，`Synaptic\
  \ Health Alliance`成立于 2018 年 4 月，是一个专注于区块链的医疗健康行业联盟，成员包括 United Healthcare、Optum、Quest\
  \ Diagnostics、Aetna 等行业领导者及其他关键利益相关者。`Synaptic Health Alliance`不仅在技术实施方面引领潮流，在治理方法、资本形成方式，以及审视我们行业活动中的不同方面如何从竞争基础中剥离并实现共享化等方面也同样如此。\n\
  \n\n\n### 区块链与代币化\n\n区块链不仅仅是一项技术。它是一项同时存在于工程堆栈多个层面的技术，也是行为经济学领域的一项创新。它创造了一门新学科：**实时应用行为经济学**。这是一个全新的机遇，可以表达博弈论原理，形成假设，并测试不同的激励设计如何影响医疗健康领域及其他相关行业中的利益相关者群体。\n\
  \n从结构上看，它为全新的商业模式打开了大门——这些模式在物流层面以前从未可行，因此也从未被认真考虑过。同时，它引入了个体身份或自我主权的全新高度，包括对你是谁、你的数据以及与你相关数据的凭证或验证的潜力。所有这一切都因区块链而成为可能。区块链以网络的形式存在。这些网络可以是公共资源、公共基础设施，以及像`以太坊`主网或`比特币`区块链这样的中立平台。`以太坊`主网可以运行专注于任何类型应用的软件——不仅是数字货币，还包括任何类型的软件应用。\n\
  \n与公共区块链网络相比，私有区块链网络拥有完全不同的特性，尽管它们共享一些相同的优势，同时也有若干权衡。展望区块链在医疗健康行业的未来，最终的形态很可能会是一系列混合网络——大量私有企业网络通过单一的中立公共基础设施进行桥接或连接。\n\
  \n区块链的另一个标志性特征，尤其是像`以太坊`等较新的区块链平台，是执行和运行智能合约的能力：这些智能合约是经过加密存储和验证的存储过程，以微服务的形式在区块链基础设施上运行。这些智能合约至关重要，因为它们促成了跨组织边界的**安全自动化**。在过去三十年中，企业计算机工程的大部分工作都聚焦于特定企业内部的四壁之内。而这种分布式智能合约基础设施首次使得在生态系统层面运用同样的自动化与效率提升原则成为可能，提供了能够真正为医疗健康未来交付成果的技术。\n\
  \n此外，从经济学和行为经济学的角度来看，区块链提供了数字稀缺性。在我们当前的传统数据环境中，并不存在稀缺性，因为数据可以被无限复制。这种无休止的复制不断扩展所需的磁盘存储空间，并造成治理上的困难。通过代币化——无论是像序列号这样的单一物品的代币化，还是像加密货币、证书或任何具有价值的事物这样可复制单位的代币化——可以在具有既定价值单位的实际交易中创造稀缺性。\n\
  \n区块链最吸引人的一点是，用户将不会察觉到这项技术在后台“运行”以交换和管理数据。结合以人为中心的设计、精简的用户体验和界面、前端 Web 3.0 应用以及去中心化应用（DApps），用户永远不会感觉到后台有任何不同。公共区块链提供的某些特性，特别是透明度和去中心化，在作为私有区块链网络实施时会有所牺牲，而换来的是极致的隐私性。\n\
  \n新技术促进了链下计算与存储，从而在通用基础设施中实现了透明度和隐私性两方面的特性。当从数百种不同的架构模式、数十种区块链协议（公共、私有和混合）中进行选择时，总是需要在三个标准之间进行权衡：\n\
  \n1.  系统的可扩展性\n2.  其网络安全状况\n3.  其去中心化或中心化控制的程度\n\n在形成架构模式时，可以针对其中任何两个标准进行优化。\n\n\
  区块链技术对于医疗健康行业来说是必要的，但并非充分条件。还有其他重要领域，该技术能极大地增强医疗行业的独特需求，包括合规性、独特的网络安全环境、独特的隐私环境，以及我们在患者、提供者和设备身份方面面临的挑战。所有这些还需要对医疗生物伦理学有清晰的洞察。因此，要实现期望的结果，我们需要的不止是区块链。\n\
  \n\n\n### 去中心化人工智能（AI）\n\n目前，构成医疗保健领域人工智能应用主体的机器学习，是通过以下步骤实现的：1）将大量数据集中在一个中心位置进行整理；2）对数据集进行分析运算；3）最终训练极其复杂的机器学习模型。举一个该方案既合理又可扩展的例子，考虑一下你手机上的数据。你的手机数据与其他人的数据汇集在一个单一地点进行学习，例如，学习如何更好地预测智能手机键盘上的下一个单词。然后，一旦新的预测模型准备就绪，这个改进后的模型就会被推送回你的手机。其内在的假设是，要么汇集到中央数据湖中的数据不太敏感，要么你愿意与中央实体共享你的数据。显然，健康数据并非如此，因此中心化模型在医疗保健领域并不那么适用。在去中心化模型中，不同之处在于，不是将数据带给模型，而是将模型送到数据所在之处，因此数据不再移动——它保持静态。\n\
  \n在去中心化方法中，我们将模型发送到数据所在的每个位置。这可以是手机，也可以是机构拥有的更大的数据湖。例如，如果数据由不同的临床机构拥有，则可以在每个机构开发一个独特的学习模型；它们基本上会各自训练自己的模型。然后，机器学习的核心在于将每个机构（或站点或设备）学到的知识整合成一个单一的、新的联合模型。因此，在未来，你将无需考虑如何将数据收集到一个中心位置进行存储和访问；相反，你将把一个机器学习模型部署到网络中，并接收回传的衍生数据。\n\
  \n那么，为什么这很重要呢？首先，如果考虑的是我的个人数据，一旦我的数据被复制并被拿走而脱离我的控制，很多事情都可能发生。如果它静态地存在于我的系统或手机内，我就有更多的控制权。当你考虑到层出不穷、毫无平息迹象的数据泄露事件时，这种安心感对消费者和公众来说至关重要。此外，通过将数据留在原处，你抑制了数据复制，并引入了数字稀缺性。结合区块链，这就是创建去中心化市场所需的一切。如果一个去中心化系统能够显著减少数据威胁，同时仍然能够提供只有通过大量数据集进行广泛数据分析才能获得的先进知识价值，那么我们所知的健康与医疗保健领域将被彻底改变。\n\
  \n即使是在中心化的机器学习模型中，将区块链与机器学习相结合的另一个好处，涉及对训练数据的溯源和验证，以确保最终纳入训练集的每个数据元素都具有加密验证的来源。这对于解决可解释性问题以及其他长期存在的、关于训练数据来源、数据来源地以及数据本身是否被篡改的问题大有裨益。对学习功能进行去中心化，并对训练数据的来源进行去中心化，是唾手可得的成果，并且在去中心化数据上进行学习时，能带来巨大的增量收益。因此，区块链基础设施与去中心化机器学习方法的融合是绝对必要的。\n\
  \n这或许是个新闻，但进行去中心化机器学习的能力已经存在相当长一段时间了。然而，它尚未被医疗保健行业所接纳，因为缺乏合适的激励措施。通过将区块链与这些用于训练模型的去中心化\
  \ AI 策略相结合，我们能够将激励机制联系起来，并确切知道由谁授予了何种权限、用于何种目的、权限持续多长时间等等。这些技术的结合将对推动医疗保健领域的发展产生变革性影响。\n\
  \n### 深度隐私\n\n> “任何足够先进的技术都与魔法无异。” ——亚瑟·C·克拉克第三定律\n\n我们如何确保隐私与安全？当考虑健康数据时，这是每个人脑海中都会浮现的问题。事实证明，有一系列先进的加密隐私保护技术正被以新的方式加以利用，将对个人健康信息以及医疗保健和生命科学领域的合规性产生深远影响。一个典型的例子就是`零知识证明`（ZKP）。要详细讨论零知识证明和其他这些深度隐私技术，需要另一本书的多个章节。因此，从宏观层面来看，这里简要介绍一下零知识证明，以及它们与目前普遍使用的标准传统加密模型或方法有何本质区别。\n\
  \nZKP 加密技术已存在三十年，但近年来获得了额外的关注，尤其是在与区块链相关的领域。零知识证明的作用是，允许你证明一个陈述是正确且真实的，而无需揭示该确认的核心陈述本身。它的价值在于：证明你知道一个你想保守的秘密，并且能让另一方或网络中的其他成员确信你确实知道这个秘密，但又无需真正泄露这个秘密。\n\
  \n举一个现实世界的例子，将你的出生日期视为一个数据元素，以及无论出于何种原因，你为了证明年龄而必须输入出生日期的所有那些时刻。在一个将 ZKP 加密技术推广到全球工业规模的世界里，你的生日数据元素几乎再也不需要被传输。相反，对方系统只需存储一个加密证明，证明你的生日是高于、低于还是处在要求的出生年代区间内——答案是“是”或“否”。你生日的年、月、日数据将保持静态。这仅仅是一个简单的例子。如果你想象一下我们行业中临床、科学和业务流程所涉及的所有数据，那么\
  \ ZKP 加密技术，连同整个深度隐私加密技术家族，有着无限的应用前景。\n\n在我们所描述的整个技术栈背景下，为什么要以及如何使用这些先进的加密隐私保护技术？首先，它们为共享的衍生数据增加了更多的真实性。例如，想象一位名叫爱丽丝的病人，在预约一位非常忙碌的专家鲍勃进行咨询之前，必须使用一个远程的私有推理服务进行筛查。鲍勃的规定是，只有安全推理服务返回预测概率超过\
  \ 80% 时，才能与他预约会诊。当爱丽丝收到预测结果时，它已被加密，只有她本人才能解密。现在，爱丽丝想向鲍勃出示她的诊断结果以预约会诊。鲍勃如何确信爱丽丝出示的预测结果确实来自那个安全的推理预测服务呢？*除非*爱丽丝能提供一个加密证明，证明该预测值确实来自指定的推理服务，否则无法做到。用零知识证明的术语来说，这意味着要证明爱丽丝发送给鲍勃的明文预测结果，与她从该服务收到的加密内容相对应。爱丽丝不仅将预测结果发送给鲍勃，同时还会附加一个关于正确解密的零知识证明以及预测数值。请注意，整个过程从未将爱丽丝的输入医疗保健数据的明文泄露给预测服务或鲍勃。\n\
  \n\n\n除了深度隐私，还有一个重要方面，那就是安全推断的概念。推断是机器学习模型进行预测的功能。模型经过训练并开始执行其既定任务后，理论上会做出可能指导临床决策的预测。它可能指导患者行为，可能指导就医途径，也可能指导这些技术在我们行业中应用的任何环节。至关重要的是，由此产生的数据无法被逆向工程，或不当用于推导出关于数据来源的信息。模型仅能产生预期中的推断结果。\n\
  \n对于希望进一步研究这三项技术的人，请考虑以下内容：\n\n- **区块链**\n  - 去中心化应用（“DApps”）—— *Web3 用户体验*\n  -\
  \ 可选代币化—— *创建数字稀缺性*\n  - 智能合约—— *跨组织边界的安全自动化*\n  - 区块链网络—— *公有、私有和混合*\n- **去中心化人工智能**\n\
  \  - 区块链网络中的联邦学习\n  - 训练数据溯源、激励和安全推断的新范式\n  - 基于智能体的仿真与自动化\n- **深度隐私**\n  - 零知识证明密码学\n\
  \  - 可信执行环境\n  - 安全加密虚拟化\n  - 可验证计算\n  - 安全多方计算\n  - 盲计算\n  - 差分隐私\n  - 同态加密\n \
  \ - 抗量子加密\n\n#### 源健康数据与衍生健康数据\n\n在对这三项颠覆性技术进行高层级讨论之后，让我们思考一个价值创造方面的范式转变——数据拷贝不再是*唯一*能利用数据创造价值的方式。\n\
  \n在健康领域，源数据是指存在于防火墙之后的企业数据，或是患者自主拥有的数据，其规模正在爆炸式增长。过去十五年来，健康领域的源数据呈指数级增长，并且随着 5G\
  \ 无线连接的普及、医疗物联网的发展以及将社会决定因素数据*视为健康数据*的理解加深，这一趋势将持续下去。目前，我们的大多数策略都与复制和迁移源数据有关：试图集中化越来越庞大的源数据体系。\n\
  \n我们来定义一下**源数据**：\n\n1. **企业**数据位于防火墙之后——*静态*，而非*动态*\n2. **患者**自主拥有的数据——*位于云存储基础设施或边缘设备上*\n\
  \n过去十五年来，**源数据**一直呈**指数级增长**。随着**数据**的增长，我们正触及数据湖及其他集中化策略的物流极限。统计数据表明了其规模：\n\n-\
  \ 每人一生产生 1100 太字节（TB）的外源性数据（行为、社会经济、环境等），约占个人健康决定因素的 60%\n- 每人一生产生 6 TB 的基因组/表观基因组数据，约占个人健康决定因素的\
  \ 30%\n- 每人一生产生 0.4 TB 的临床数据，约占个人健康决定因素的 10%\n\n另一个考虑因素是相关的元数据，即对源数据的描述。最后，是试图从源数据中创造价值的产品，我们称之为衍生数据，由分析结果和见解组成。因此，当前的集中式系统是一个日落范式。它速度慢、劳动密集、容易出错且不可信。基于区块链框架的去中心化是新兴范式。它将快速、自动化、质量可控且可信。\n\
  \n今天，我们必须到处复制和移动数据。分析只能在我们能够安全保管的数据上进行。我们常常通过去标识化数据来做出妥协，这又引入了一系列新的挑战和风险。在这种新兴范式中，源数据将能够静态驻留在企业基础设施或患者自主拥有基础设施中。在大多数情况下，为了工作流程而必须交换数据将成为例外而非规则。分析将经常在网络参与者和源数据之间以联邦分析模型的形式进行。此外，源数据将能够保持完全标识且具有临床可操作性，而无需暴露、共享或转移所有权。\n\
  \n在这个新范式中，标准化和分析将发生重大变化。标准化将通过分发规则集并使其自动化来实现：在数据所在的源头上对其操作。分析也将在数据所在的源头上进行，只有那些衍生数据会被共享。汇总后的发现结果可以共享，而且重要的是，还可以进行加密验证。\n\
  \n新范式是向以人为中心的健康数据架构的转变，这是医疗行业转型的一部分。这包括五个架构组件，它们相互依赖且必不可少：\n\n1. 个体的自主主权身份\n2. 个体的可验证凭证\n\
  3. 连接个体数字身份与其所代表的真实人物的对应工作流\n4. 一个自主主权数据湖，所有个人数据均可汇聚于此——且*N*等于一，仅针对该个体本身，因此不会成为黑客的巨大目标。\n\
  5. 最后，能够与代币化价值进行交易，以赚取、交易和持有各种形式的代币化价值\n\n所有这些都需要隐私保护技术，主要针对以健康为重点的去中心化机器学习。这就是我们所说的**联邦学习**。\n\
  \n\n\n### 联邦学习\n\n将联邦学习或去中心化机器学习与区块链基础设施及深度隐私保护相结合，会呈现出怎样的形态？从技术角度而言，这种结合的核心价值主张又是什么？当我们实现数据（包括数据共享）的访问控制和内容管理时，区块链与去中心化人工智能的协同效应便得以显现。这仅仅是初期实施中最易实现的部分。\n\
  \n如果我们仅仅在区块链上管理同意和访问权限，却仍依赖移动数据这类传统原始方法，就会再次陷入复制并创建数据副本的范式。而这正是无法创造数字稀缺性的问题所在。如此一来，我们既无法提升数据的价值，反而增加了其脆弱性。例如，我们会成为完全不受控制的数据泄露事件的受害者——即便我们记录了自己的访问——甚至被拒绝访问自己的特定数据。\n\
  \n如果你能以去中心化模式访问数据——而非像我们如今的策略那样，将获取训练数据视为执行机器学习功能的最大障碍——那么数据就能得到更广泛的应用。现实情况是，数据科学家和机器学习从业者很难获得创建模型所需的数据。在这种去中心化方法中，我们可以彻底颠覆数据稀缺性及其行为经济学动态，在不集中存储数据的情况下获得/允许访问海量数据集。这是否能改变可用数据的总量，以及我们在这类由区块链促成的全新去中心化人工智能中，对数据及其来源的信任程度？\n\
  \n如果你观察大多数医疗健康数据研究，除了非常精心构建的数据集外，很难在数据规模上达到非常庞大的量级，而构建这类数据集本身既复杂又成本高昂。然而，如果反转这种范式，每个人都能贡献自己的个人数据、健康数据，或仅与健康间接相关的数据。例如，你可以通过智能手机应用程序贡献数据——这些应用接收来自临床试验项目的请求。在这个例子中，项目仅会使用你的数据，而不会传输、拥有你的数据，也不会在数据使用过程中知晓其内容。它只是授予项目/方使用数据的权限。该方无法查看数据、不知道数据内容，也永远不会知道数据是什么。这将激励各方回头请求更多所需数据——且仅请求所需的数据——而不是将所有数据累积并存储在某处的基础设施中（或许安全，或许不安全），寄希望于未来某天可能用到。\n\
  \n我们正在摒弃旧的逻辑，其大致如下：\n\n-   你几乎无法将数据变现。\n-   数据变现要求你一次性彻底出售数据。\n-   使用你的数据需要创建一个全新的副本。\n\
  \n因此，我们在此讨论的所有去中心化业务，实质上是将数据出售转变为数据出借/租赁，并且仅提供关键要素。\n\n除了深度隐私保护，还有一个重要方面，即安全推断的概念。推断是机器学习模型进行预测的功能。模型经过训练并开始执行其预定任务后，理论上会做出预测，这些预测可能指导临床决策、影响患者行为、指引医疗服务的获取，或指导该技术在行业内的任何应用场景。\n\
  \n## 结论\n\n区块链、去中心化人工智能和深度隐私保护的结合，正是医疗领域当前碎片化、受防火墙和孤岛式系统所缺失的数据“圣杯”。我们可以释放更多数据用于研究和循证医学，吸引更多专家关注健康的方方面面，并在无需无休止地共享和复制数据的情况下，允许更广泛的数据访问。这将促进更多医学发现、改善健康结果，同时避免暴露个人数据并防范大规模黑客攻击和数据泄露的风险。当这三项新兴技术领域叠加在一起时，我们便拥有了满足医疗行业需求的、既必要又充分的全套技术堆栈。\n\
  \n\n\n"
- '# 17. 区块链的正式研究与教育


  本章基于维克拉姆·迪隆与托里·塞纳吉的一次访谈，内容涉及托里在大多数工作仍以非正式方式进行并主要通过开发者博客传播时，如何着手创建正式的区块链研究教育空间。《当今医疗中的区块链》是当今区块链领域一本知名的同行评审期刊，其编辑委员会拥有非常广泛的从业经验。


  **VD**：*是什么启发了你创办这本期刊？是什么促使你思考需要用严谨的科学流程来评估区块链技术？*


  **TC**：我的整个职业生涯都专注于或包含了循证研究成果输出、出版规划、医学出版、研究咨询、医学教育以及研究数据的传播。我曾负责管理一个涵盖多个国际专业期刊和学会同行评审出版物的项目组合。对我来说，出版与传播一直是为全新突破性创新提供创造性表达的渠道。通过一本值得信赖的循证期刊进行交流，既能提升研究工作本身，也能促进成果和/或发现的传播。


  我从一位朋友那里了解到加密领域。他当时正在启动一项奖励太阳能使用的资产，我也开始参与挖矿。随着对这项技术了解的加深，我开始思考它在医疗领域的潜在应用。


  当时，金融市场就像一个乌烟瘴气的污水池，充斥着更多关心如何欺诈公众、快速捞钱，而不是致力于创造一个能建立监管和新世界市场的安全环境的邪恶参与者。


  鉴于我的背景是医疗领域并专注于出版，创办一本新的同行评审期刊，为区块链技术在医疗领域的应用开拓市场，对我来说是顺理成章的事。


  作为创始人和出版人，我选择创办一本传统的学术同行评审期刊，预见到了编辑使命将涉足一个不熟悉的领域。整个医疗行业需要逐步建立对这项技术的熟悉度和信心，并理解其广泛的应用前景。《当今医疗中的区块链》这本同行评审期刊提供了最广泛、最快速的采纳途径，用以规模化地掌握这项技术，提升领导层、早期采用者以及最终所有利益相关者的熟练度和灵活性，以填补知识空白、了解更多。


  我的想法是，在初期遵循传统学术出版渠道，将有助于更快地促成对期刊本身以及该技术应用的接受。那些理解并从事研究工作的人明白这一点。而那些刚进入这个市场的人则在沟通和撰写合格论文方面遇到了困难。当然，也存在一些傲慢的怀疑论者，但这本期刊已经证明了其对市场的价值：它为区块链技术在医疗领域的应用提供了验证，通过一本同行评审期刊赋予了其可信度。如今，它既塑造也反映了市场的增长与创新。我们的读者遍布七十多个国家，并且刚刚在海湾合作委员会（GCC）和埃及推出了期刊的授权版本。我对目前的发展轨迹相当满意。想了解更多关于期刊创刊号的信息，你可以随时阅读我的出版人信函，网址是
  [`https://doi.org/10.30953/bhty.v1.25`](https://doi.org/10.30953/bhty.v1.25)。


  **VD**：*创办这本期刊需要什么样的资源？我知道你过去曾参与过加密社区；跟我们谈谈你过去的经验，以及这些经验如何帮助你创办了这本期刊。*


  **TC**：从一开始，我就远离加密货币，不会发表任何与之相关的内容，只在会议上偶尔提及，因为当时围绕着它争议颇多。我一直认为，除非它具备真实的货币价值，否则它很可能，而且也经常，被用作我们市场中的一种行为矫正工具。


  我偶尔会问一位医生对区块链技术的看法。我得到的回答往往与投资机会有关，所以我知道巨大的认知鸿沟依然存在。这也是为什么我们为医生和药剂师开发了一个新的医学教育项目（CME），目前正在寻找赞助商。


  **VD**：*你成功组建了如此多元化的编辑/审稿人团队。在组建这个团队时，你在寻找什么样的专业背景？你是如何确定找到正确的人选的？*


  **TC**：我们编委会的水平是一流的，这是因为所有这些人都对改变医疗及传统系统充满了极大的热情。他们是充满好奇心的行家和专家，敢于挑战极限，无所畏惧，并且乐于承担风险。我们编委会的编辑们将自己的名字与一本当时还相对不知名的期刊（BHTY）联系在一起，他们都是在拿自己的声誉冒险。对此我心知肚明。《BHTY》的目标是引领市场，成为该领域最重要、最卓越的期刊。


  我一直相信每个人都能带来不同的观点。随着《BHTY》在市场上的成熟，我从世界各地寻找最优秀的人才，为期刊和我们的读者带来新的视角。这是一个志愿者职位，他们投入的时间是期刊质量的体现。这是一项团队合作，我们都为集体的努力感到自豪。


  **VD**：*你最期待收到哪种类型的研究发表在期刊上？为什么？过去一段时间里，创办期刊的经历如何改变了你对区块链技术发展方向的想法？*


  **TC**：我们通常会在年度“区块链预测”文章中总结市场上看到的趋势，邀请编委会成员和会议演讲者参与，分享他们对这项技术短期和长期的预测。这是一篇很受欢迎的文章，受到了很多媒体关注。


  我很兴奋地看到区块链技术正在被各个行业采纳，而不仅仅是医疗领域。我们看到了美国政府相关举措的增加，并且已经发表了反映这些举措的论文。我希望看到的是广泛的采用，以及大众对这项技术的理解——它是在新技术时代连接不同部分的底层连接机制和平台。但我仍在等待其为美国市场带来成本效益的实现。我们在海外看到了这种情况。此外，普遍存在一种假设，认为区块链成本高昂且由于编码问题难以实施。这种误解也必须要克服。


  **VD**：*作为一本期刊，在内容方面，你们正在探索哪些新的途径（或垂直领域）？作为一本与区块链这类尖端技术紧密相连的期刊，是否给编辑流程留出了一些实验空间？在不久的将来，是否有任何基于区块链的编辑活动计划？*


  **TC**：我可以分享的是，我们是第一本在区块链上为文章加盖时间戳，并与 ARTiFACTS 合作提供基于区块链的研究记录账本的健康科学期刊。我们为作者提供了一个定制化的仪表盘，用于分享和推广工作，并确保科学界的研究来源和可重复性。我们告诉作者要使用存储库来存放研究成果，并且还在为一个全球性的研究社区倡议而努力。我们已经成立了大学理事会，在全球设立了大使分会，并且一直在寻找新的、声誉良好的合作伙伴进行合作。欢迎随时联系我们。




