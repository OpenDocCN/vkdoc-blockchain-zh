- "# 4. 解析以太坊\n\n以太坊是一个开源的、去中心化的区块链平台，具备计算能力，它通过脚本语言将基本的货币兑换重构为用户之间的价值转移。以太坊被广泛认为是比特币协议的后继者，它泛化了原始概念，使得更多样化的应用能够构建在区块链技术之上。以太坊包含两个核心组成部分。首先，是一个图灵完备的虚拟处理器，能够计算所需的计算资源并执行脚本，被称为以太坊虚拟机（`EVM`）。第二个组成部分是一种价值代币，称为以太币，它是网络中的货币，用于用户之间的交易或对网络矿工的补偿。在本章中，我们将首先概览以太坊的架构，并将其与比特币进行比较，重点关注`EVM`和图灵完备性特性。架构部分之后，会简要讨论以太坊中的账户模型以及使用默克尔-帕特里夏树（Merkle-Patricia\
  \ Trees）进行的账户表示。这将引导我们进入以太坊全局状态表示、账户存储以及 Gas（一种网络中的垃圾信息预防机制）等主题。接着，我们解析`EVM`所支持的智能合约概念、围绕沙盒化可执行代码的安全问题，以及`EVM`如何将可执行代码（字节码）推送到区块链上。之后，我们将介绍\
  \ Solidity 和 Vyper——两种用于在以太坊中编写智能合约的编程语言。我们将探讨 Solidity 和 Vyper 的语法，以及当前流行的集成开发环境（`IDE`），并提供一份关键开发者资源的简要清单。接下来，我们聚焦于以太坊中提出的世界计算机模型，并介绍诸如`IPFS`和`Whisper`等支持的分布式技术。然后，我们将审视去中心化应用（`DApps`）的状态，以及以太坊中名为\
  \ Mist 的发布平台。这使我们能够过渡到讨论以太坊的第二层更新——这是本章以及 2020 年以太坊生态系统的主要技术焦点。最后，我们以对企业侧的简要讨论来结束本章。在此，我们将介绍一个特别值得关注的进展：由微软在\
  \ Azure 云上部署的区块链即服务（`BaaS`）。\n\n## 以太坊概览\n\n大约在 2013 年中，大部分比特币社区开始对区块链上除货币之外的应用想法产生兴趣。很快，在线论坛上涌现了大量新想法的讨论。一些流行的例子包括域名注册、资产保险、投票，甚至物联网（`IoT`）。当这股热潮开始消退后，对比特币协议更深入的分析揭示了可以在其之上构建的潜在应用的严重局限性。\n\
  \n一个关键的争论点是：是否应该允许在区块链上使用完整的脚本语言，还是应该构建逻辑驻留在区块链之外的应用。有两个关键问题引发了这场辩论：\n\n- 比特币协议中的脚本语言和操作码（OPCODES）在设计上功能非常有限。\n\
  - 比特币协议本身不具有通用性。虽然有过尝试；例如，Namecoin 是为一个特定任务（域名注册）设计的。当时最大的问题是：如何将协议通用化，使其能够向前兼容我们尚不了解的未来应用？\n\
  \n最终，关于脚本出现了两种思想流派。传统上，中本聪的白皮书提出将脚本语言的功能限制得十分有限。这将避免区块链中存在可执行代码所带来的安全隐患。从某种意义上说，区块链的可执行代码仅限于更新分布式状态所需的一些必要原语。第二种思想流派由维塔利克·布特林（Vitalik\
  \ Buterin）倡导，他认为区块链不仅仅是一个账本。他设想区块链是一个计算平台，可以使用合约和参数来执行定义明确的函数。这通过以太坊虚拟机（`EVM`）得以实现。`EVM`允许将可执行代码完全隔离，并安全地执行构建在区块链上的应用。我们将在本章稍后部分更详细地讨论这一点。让我们从以太坊背后的核心设计原则开始。\n\
  \n### 核心理念\n\n以太坊不是构建一个支持特定应用的区块链平台，而是要构建一个原生编程语言，该语言具有可扩展性，能够使用该语言在区块链平台上实现业务逻辑。\n\
  \n我们稍后回来理解这一原则的含义。与此同时，让我们讨论一下以太坊的另一个显著特征：共识算法。我们在之前的章节中讨论过共识的概念。在基于工作量证明（`PoW`）的加密货币（如比特币）中，网络奖励那些解决加密难题以验证交易并挖掘新区块的矿工。以太坊提出了一种不同的共识算法，称为权益证明（`PoS`）。在`PoS`算法中，下一个区块的验证者/创建者是基于账户在网络中的权益，以伪随机方式选出的。因此，如果你在网络中的权益越高，被选为验证者的机会就越大。然后，验证者将“锻造”下一个区块，并从网络中获得奖励。在这里，验证者确实是（从铁匠锻铁的意义上）“锻造”一个区块，而不是“挖矿”，因为在`PoS`中，基于硬件的挖矿概念被虚拟权益所取代。使用`PoS`的一个理由是规避`PoW`挖矿算法的高功耗和高能耗要求，这些要求转化为更高的电费，并成为一个常见的抱怨。Peercoin\
  \ 是第一个采用`PoS`推出的加密货币；然而，最近在 ShadowCash、Nxt 和 Qora 中可以看到更突出的`PoS`实现。图 4-1 突出了比特币和以太坊作为协议之间的主要区别。\n\
  \n\n\n以太坊的当前实现（也称为以太坊 1.0）使用工作量证明（ Proof-of-Work ）作为共识算法。然而，以太坊的 2.0 层升级计划将过渡到权益证明（\
  \ Proof-of-Stake ）作为主要的共识算法。有关此算法的更多细节将在本章后面提供。\n\n以下是以太坊社区开发者撰写的关于权益证明（PoS）的简要总结（[`https://docs.ethhub.io/ethereum-roadmap/ethereum-2.0/proof-of-stake/`](https://docs.ethhub.io/ethereum-roadmap/ethereum-2.0/proof-of-stake/)）:\n\
  \n> **权益证明（PoS）是一类依赖验证者在网络中的经济权益的公有区块链共识算法**。在基于工作量证明（PoW）的公有区块链（例如比特币和当前以太坊实现）中，算法奖励那些通过解决密码学难题来验证交易并创建新区块（即挖矿）的参与者。在基于权益证明（PoS）的公有区块链（例如以太坊即将推出的`Casper`实现）中，一组验证者轮流提议并对下一个区块进行投票，每个验证者投票的权重取决于其存款（即权益）的大小。PoS\
  \ 的显著优势包括**安全性、降低的中心化风险以及能源效率**。\n\n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig1_HTML.jpg](img/430562_2_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1：比特币和以太坊作为计算平台的概览\n\n聚焦于图 4-1，在比特币协议中，地址映射了从发送方到接收方的交易。区块链上运行的唯一程序是转账程序；给定地址和密钥签名，该程序可以将资金从一个用户转移到另一个用户。以太坊通过在每个节点上部署\
  \ EVM（以太坊虚拟机）来泛化这一概念，使得可验证代码能够在区块链上执行。在此，通用方案是外部账户将参数传递给一个函数，EVM 将该调用定向到相应的合约并执行该函数，前提是提供了足够的以太币和`gas`。因此，以太坊中的每一笔交易都可以被视为一个函数调用。\n\
  \n## 以太坊中的账户\n\n账户是以太坊中的元结构，也是区块链的基本操作单元。所有以太坊交易都需要一个账户。此外，账户也作为模型来存储和跟踪网络中用户的信息。网络上有两种类型的账户：\n\
  \n*   **用户账户：** 这些是用户控制的账户，也称为外部账户。这些账户拥有以太币余额，由公私钥对控制，可以发送交易，但没有关联的代码。以太坊网络中的所有操作都由外部账户发起的交易触发。在比特币协议中，我们称这些仅为地址。账户与地址之间的关键区别在于以太坊中能够包含和执行通用代码。\n\
  \n*   **合约：** 这本质上是由其自身代码控制的账户。合约账户是驻留在区块链上的以太坊功能程序单元。该账户拥有以太币余额，关联有代码，可以在收到来自其他账户的交易时执行代码，并能操作其自身的持久化存储。(区块链上的每个合约都有其唯一可以写入的存储空间；这被称为合约的状态)。网络上的任何成员都可以创建包含任意规则的应用，并将其定义为一个合约。\n\
  \n如果账户扮演如此关键的角色，它们在区块链上是如何表示的呢？账户成为默克尔树（Merkle trees）的一个元素，而默克尔树又成为每个区块头的一个元素。以太坊使用了一种修改版的二叉默克尔树，称为默克尔-帕特里夏树（Merkle-Patricia\
  \ trees）。对默克尔-帕特里夏树（[`http://www.emsec.rub.de/media/crypto/attachments/files/2011/04/becker_1.pdf`](http://www.emsec.rub.de/media/crypto/attachments/files/2011/04/becker_1.pdf)）的完整解释已超出本文范围；然而，图\
  \ 4-2 提供了一个图形摘要。\n\n> **注意**  \n> 这里解释的双账户系统可能不会在以太坊中长期存在。最近，越来越多地推动采用单一账户模型，即通过合约来实现用户账户。\n\
  \n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig2_HTML.jpg](img/430562_2_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2：区块 A 和区块 B 的区块头及默克尔-帕特里夏树概览\n\n在图 4-2 中，区块头包含一些标准定义，用于广播网络的状态。此外，以太坊中的每个区块头都包含三个针对不同对象的默克尔-帕特里夏树：交易（函数调用）、收据（函数调用的结果，记录每个交易的效果）以及状态对象。二叉树在管理交易历史方面很有用；然而，状态有多个需要更频繁更新的组件。图中所示的默克尔-帕特里夏树包含一个状态根，进一步记录多个账户对象。其中一个深层分支指向一个虚线框，其中包含定义账户的四个参数。根据这些参数，账户余额和网络中的随机数经常被更新。因此，需要一种更合适的数据结构，使我们能在插入、更新、编辑或删除操作后快速计算出新的树根，而无需重新计算整棵树。这种修改后的默克尔树允许快速查询诸如以下问题：此账户是否存在？此交易是否已包含在特定区块中？我账户的当前余额是多少？值得注意的是，余额仅与外部账户相关，同样，`codehash`（包含可执行代码）仅适用于合约。`Storage\
  \ root`是最后一个参数，包含用户上传到区块链的数据，或作为合约可用的内部存储空间。此内部存储空间可以由合约在执行阶段更新。接下来我们深入讨论这些账户参数。\n\
  \n\n\n### 状态、存储与燃料\n\n我们曾简要提及合约可以操作自身的存储并更新状态，那么什么是*状态*？回想一下，在比特币协议中，用户和交易的数据被构架并存储在\
  \ UTXO（未花费交易输出）的上下文中。以太坊则采用了不同的设计策略，使用状态对象。本质上，状态存储了一个账户列表，每个账户都有余额，以及区块链特定信息（代码和数据存储）。如果发送账户有足够余额支付交易（避免双重支付），则该交易被视为有效，因此发送账户会被扣款，接收账户会收到对应价值。如果接收账户关联了代码，则该代码会在收到交易时执行。合约或账户关联代码的执行可能对状态产生不同影响：内部存储可能被改变，代码甚至可能创建发送到其他账户的额外交易。\n\
  \n以太坊在网络中区分了状态和历史。状态本质上是特定时间点关于网络状态和账户的当前信息快照。而历史则是区块链上所有已发生事件的汇编，例如函数调用（交易）以及由此带来的变化（收据）。以太坊网络中的大多数节点都保存状态记录。更正式地说，状态是一种包含键值映射（KVM）的数据结构，用于将地址映射到账户对象。每个账户对象包含四个值：\n\
  \n- 当前 nonce 值\n- 账户余额（以 ether 为单位）\n- 代码哈希，合约情况下包含代码，外部账户则为空\n- 存储树根，即包含存储在区块链上的代码和数据的\
  \ Merkle-Patricia 树的根节点\n\n接下来，我们来谈谈以太坊中的燃料。燃料是跟踪以太坊执行成本的内部单位。换句话说，它是在区块链上执行一次计算的微交易费用。对于像以太坊这样的计算平台，由于停机问题：无法判断一个程序是会无限运行，还是只是运行时间很长，因此在运行代码时燃料变得至关重要。燃料为运行时间设置了限制，因为用户必须为执行合约的逐条指令付费。微交易的性质使得步骤的执行成本非常低廉，但对于非常长的运行时间，这些交易成本也会累积起来。一旦合约提供的燃料耗尽，用户就必须支付更多燃料才能继续执行。对于占用存储的操作，还会收取特殊的燃料费用。\n\
  \n存储、内存和处理等操作在以太坊网络中都需要消耗燃料。那么，接下来我们来谈谈存储。在以太坊中，外部账户可以使用合约将数据存储在区块链上。合约会管理上传和存储过程；然而，当前可存储的数据类型非常有限。一个自然的问题是：向以太坊区块链上传内容和信息有什么限制？什么能防止区块链膨胀？事实证明，目前有两种机制可以防止数据过载：\n\
  \n- 每个区块的燃料上限，决定了每个区块在存储/计算操作上可以消耗多少燃料\n- 用户为存储数据所需购买的燃料所需的金额\n\n第二个限制通常会阻止用户直接在区块链上存储数据。相反，使用像\
  \ STORJ 或 IPFS 这样的第三方去中心化服务进行存储，并将存储位置的哈希值放入以太坊合约中以包含在合约内，会变得更加高效和经济。未来，新的分布式存储应用将允许上传各种数据文件并将其包含在区块链上的合约中。\n\
  \n让我们总结一下到目前为止讨论的内容。我们从比特币和以太坊之间的差异开始，涉及使用账户、为操作收取燃料费、直接在区块链上存储数据、允许在区块链上执行代码、状态对象以及\
  \ Merkle-Patricia 树。图 4-3 提供了以太坊中发生的过程的简化功能概述。\n\n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig3_HTML.jpg](img/430562_2_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\n以太坊网络的简化概述\n\n在图 4-3 中，大致有三个以太坊组件需要讨论：API、网络和区块链。以太坊 JavaScript API（也称为`web3.js`）提供了丰富的功能集，用于构造交易和合约、引用函数以及存储收据。像\
  \ Mist 这样的增强型以太坊钱包客户端可以通过 GUI 接管其中的一些功能。一旦候选区块构建完成，它就会由以太坊客户端广播到网络。网络上的验证者确定交易是否有效，以及任何与交易或合约关联的代码（在区块中）是否有效。验证完成后，验证者执行关联的代码并将其应用于当前状态。该区块被广播到网络，矿工将“锻造”该区块；然后经过验证的区块被添加到区块链中。此步骤还会为区块中包含的每笔交易创建交易收据。新区块还提供对状态对象的更新，以及从当前区块到新区块的状态树的关系链接。\n\
  \n> **注**\n>\n> 什么能防止以太坊网络被微小、未使用的合约所膨胀？目前，没有控制合约生命周期的机制；然而，目前有一些关于临时订阅制合约的建议。未来，可能会出现两种不同类型的合约——一种具有永久生命周期（创建和计算成本显著更高），另一种则运行到其订阅到期为止（更便宜且临时，订阅到期后自毁以防止杂乱）。\n\
  \n\n\n### 以太坊虚拟机\n\n从形式上讲，以太坊虚拟机（`EVM`）是以太坊中智能合约的运行时环境。合约使用高级语言（例如 Solidity）编写，然后通过`EVM`中的解释器编译成`字节码`。随后，该`字节码`通过以太坊客户端上传至区块链。合约便以此可执行的`字节码`形式存在于区块链上。`EVM`被设计为与外界环境及网络其余部分完全隔离。在`EVM`内部运行的代码无法访问网络或任何其他进程；只有编译为`字节码`后，合约才能与外部世界及其他合约进行交互。\n\
  \n从运行的角度来看，`EVM`就像一个大型的去中心化计算机，拥有数百万个能够维护内部数据库、执行代码并通过消息传递相互通信的对象（账户）。然而，这个模型并非尽善尽美。在以太坊中，这个概念常被称为“世界计算机”的理念。我们回到`EVM`上代码执行的话题，以及它如何与共识机制紧密相连。`EVM`允许网络上的任何用户在一个无需信任的环境中执行任意代码，在此环境中结果完全确定，且执行过程可被保证。在仅执行读取功能的简单合约中，不会发生任何账户编辑，所有账户的状态保持不变。但正如之前所述，任何用户都可以通过从外部账户发送交易来触发一个操作。这里可能产生两种结果：如果接收方是另一个外部账户，那么该交易将仅转移一些以太币，不会发生其他操作。然而，如果接收方是一个合约，那么该合约将被激活并执行其内部代码。在网络内执行代码需要时间，并且这个过程相对缓慢且成本高昂。对于可执行指令的每一步，用户都需要支付`gas`。当用户通过一笔交易发起一次执行时，他们需要承诺一个为该合约或代码支付`gas`的货币上限。\n\
  \n**提示**\n\n以太坊近期已开始迁移至即时编译虚拟机（Just-In-Time VM），这将在`gas`消耗和性能方面提供一些优化。\n\n`EVM`的结果具有确定性意味着什么？其关键在于，对于同一个合约代码的相同输入，每个节点都必须达到完全相同的最终状态。否则，执行合约代码以验证交易的每个节点最终会得到不同的结果，共识便无法达成。正是`EVM`的这种确定性本质，使得每个节点都能就合约的执行结果及账户的相同最终状态达成共识。执行合约的节点就像钟表内部同步运动的齿轮，它们和谐运作，最终达到匹配的最终状态。一个合约也可以引用其他合约，但不能直接访问其他合约的内部存储。每个合约都在一个专用的、私有的`EVM`实例中运行，该实例只能访问某些输入数据、其内部存储、区块链上其他合约的代码，以及各种区块链参数，例如最近的区块哈希。\n\
  \n网络上的每个全节点都会为每笔交易同步执行合约代码。当一个节点正在验证一个区块时，交易会按照区块指定的顺序依次执行。这是必要的，因为一个区块可能包含多个调用同一合约的交易，而该合约的当前状态可能依赖于代码执行过程中先前引用所修改的状态。执行合约代码相对昂贵，因此当节点收到一个区块时，它们只会对交易进行基本检查：发送账户是否有足够的以太币来支付`gas`？交易签名是否有效？然后，挖矿节点会执行成本相对较高的交易处理任务，将其包含在区块中，并收取交易费作为奖励。当一个全节点收到一个区块时，它会执行该区块中的交易，以独立验证这些待包含至区块链的交易的安全性和完整性。让我们通过图\
  \ 4-4 直观地了解一下`EVM`。\n\n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig4_HTML.jpg](img/430562_2_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4** 运行在四个不同节点上的四个以太坊虚拟机实例\n\n在图 4-4 中，四个`EVM`同步执行一个合约的指令，并且一旦执行完成，将到达完全相同的账户状态。这是由于`EVM`的确定性本质所致，这使得合约能够在每一指令步骤上跨越整个网络达成共识。`EVM`的运行逻辑非常直观：它有一个唯一的运行循环，该循环会尝试逐步执行指令。在此循环内，会为每条指令计算`gas`，并在必要时扩展已分配的内存。该循环将持续运行，直到虚拟机要么收到指示成功执行的退出代码，要么抛出异常（例如`out-of-gas`）。\n\
  \n\n\n### Solidity 与 Vyper 编程语言\n\n`Solidity` 是一种高级的、面向合约的编程语言，用于在以太坊上编写智能合约。任何用\
  \ `Solidity` 编写的代码，在编译为字节码（即 `EVM` 的指令集）后，都可以在 `EVM` 上执行。字节码如何编码执行过程中调用的其他函数和合约的引用？这是通过应用程序二进制接口（`ABI`）实现的。通常，`ABI`\
  \ 是两个程序模块之间的接口：机器级指令与人类可读的高级编程语言。我们来将这个答案拆解为三个部分：\n\n*   **合约**：合约就是用形式语言（如 `Solidity`）定义的高级代码。\n\
  *   **编译后的合约**：合约被转换为字节码，以便在以太坊虚拟机（`EVM`）上执行，并遵循编译器的规范。请注意，函数名和输入参数在编译过程中会被哈希和混淆。因此，要让另一个账户调用某个函数，该账户必须能访问给定的函数名和参数，我们需要另一层接口来对接进入和离开字节码的编码过程。\n\
  *   **应用程序二进制接口（`ABI`）**：`ABI` 是以 JSON 格式列出的合约函数定义及其参数列表。函数定义和输入参数会被哈希处理并纳入 `ABI`\
  \ 中。它被包含在交易的数据中，并由目标账户的 `EVM` 进行解释。`ABI` 是必要的，通过它，你既可以指定要调用合约中的哪个函数，也能确保该函数将返回你期望格式的数据。\n\
  \n`Solidity` 为 Visual Studio 提供了一个插件，帮助你在这个强大的 IDE 中编写智能合约，并将其部署到以太坊网络上。我们在这里对 `Solidity`\
  \ 的讨论不会涉及高级的实现或定义。相反，我们将把后续的讨论限制在基础内容上，例如存储变量和创建简单的合约。让我们开始吧：\n\n```\n/* 定义一个合约\
  \ */\ncontract ExampleStorage {\n    uint storedNumber; // 无符号整数（uint）用于声明状态变量\n\
  \    /* set 函数可以修改状态变量的值 */\n    function set(uint x) {\n        storedNumber =\
  \ x;\n    }\n    /* get 函数可以检索状态变量的值 */\n    function get() constant returns (uint\
  \ retVal) {\n        return storedData;\n    }\n}\n```\n\n这个存储合约允许用户将一个整数作为状态变量\
  \ `storedNumber` 进行存储，然后使用 `get()` 和 `set()` 函数修改或检索其值。`Solidity` 还提供了现代编程语言中可用的若干高级特性，例如（合约的）继承、函数重载和类接口。接下来，让我们看一个更复杂的合约示例。这次我们将使用\
  \ `Solidity` 创建一个简单的银行合约：\n\n```\n// 这个银行合约允许存款、取款和查询余额\n// 'contract' 是用于声明类的关键字，类似于其他面向对象编程语言\n\
  contract SimpleBank {\n    // 'mapping' 是一个将地址对象映射到余额的字典\n    // 'private' 意味着其他合约不能直接查询余额\n\
  \    mapping (address => uint) private balances;\n    // 'public' 使其对区块链上的用户或合约外部可读\n\
  \    address public owner;\n    // 事件会在整个以太坊网络中触发消息\n    event LogDepositMade(address\
  \ accountAddress, uint amount);\n    // 构造函数\n    function SimpleBank() {\n    \
  \    // msg 提供了发送给合约的消息的详细信息\n        // msg.sender 是合约创建者的地址\n        owner = msg.sender;\n\
  \    }\n    // 向银行存款以太币\n    // 返回用户存款后的余额\n    function deposit() public returns\
  \ (uint) {\n        // 将存入的金额加到账户余额中\n        balances[msg.sender] += msg.value;\n\
  \        // 记录刚刚进行的存款操作\n        LogDepositMade(msg.sender, msg.value);\n      \
  \  // 返回存款后的余额\n        return balances[msg.sender];\n    }\n    // 从银行提取以太币\n \
  \   // withdrawAmount 是你想要提取的金额\n    // 返回用户剩余的余额\n    function withdraw(uint withdrawAmount)\
  \ public returns (uint remainingBal) {\n        /* 如果账户余额大于或等于请求提取的金额，则从余额中减去该金额\
  \ */\n        if(balances[msg.sender] >= withdrawAmount) {\n            balances[msg.sender]\
  \ -= withdrawAmount;\n            // 如果发送失败，则将金额加回原账户余额\n            if (!msg.sender.send(withdrawAmount))\
  \ {\n                balances[msg.sender] += withdrawAmount;\n            }\n  \
  \      }\n        // 返回提取后的剩余余额\n        return balances[msg.sender];\n    }\n \
  \   // 返回用户的余额\n    // 'constant' 防止函数修改状态变量；\n    function balance() constant returns\
  \ (uint) {\n        return balances[msg.sender];\n    }\n}\n```\n\n尽管这个合约有很多移动部件，但其结构是直截了当的。我们首先声明状态变量，这里我们使用了一种叫做映射（mapping）的高级数据类型。然后，我们声明了一个在合约中各处使用的地址变量，以及一个事件记录器。构造函数准备好可用的所有者对象，并附加上所有者对象来接收函数返回类型的消息。构造函数之后有三个函数，它们实现了银行的基本功能。`deposit`函数将传入的金额添加到余额中。`withdrawal`函数会检查请求的金额是否低于账户的可用余额。如果是这种情况，则确认取款，并从余额中减去请求的金额。如果余额不足，则本应提取的金额被加回账户，并将最终余额返回给用户。最后，最后一个函数允许我们根据合约请求，在给定时间返回某个账户的余额。现在，我们对\
  \ `Solidity` 有了更好的理解，让我们把注意力转向 `Vyper`。\n\n\n\nVyper 是一种通用的、面向合约的编程语言，编译后可生成 EVM（以太坊虚拟机）字节码，这与\
  \ `Solidity` 相似。使用 `Vyper` 的主要设计优势在于，它消除了编写智能合约过程中的诸多障碍，并以易于理解的方式呈现合约。作为通用原则，任何需要在\
  \ EVM 上运行的代码都必须非常高效，以最大限度地减少智能合约执行所需的 Gas。必须注意，编写不佳的合约执行成本会更昂贵，甚至可能高得令人望而却步，导致 EVM\
  \ 终止该合约。为此，`Vyper` 在编写合约时遵循与 `Solidity` 相同的逻辑，但摒弃了面向对象编程范式的需求。`Vyper` 专注于一组有限的定义，这些定义仅适用于在区块链上进行微交易编程。让我们来讨论一下\
  \ `Vyper` 的主要特性：\n\n- `Vyper` 不包含程序员熟悉的大部分面向对象编程结构：类继承、函数重载和递归功能已被移除。这些特性对于图灵完备性并非必需，并且会通过增加代码复杂性带来安全隐患。代码审查对于评估智能合约至关重要；然而，增加复杂性会进一步加大审计过程的难度。简化则能带来更可靠的审计。\n\
  \n- 编写更易于理解的代码也能降低出错的可能性。从 `Vyper` 比 `Solidity` 提供更高安全性的角度来看，这种额外的安全层是通过开发者的编码实践来强制实现的。即便限制了如设置\
  \ Gas 使用上限和溢出检查等功能，用 `Vyper` 编写的智能合约在可读性、可审计性和简洁性（因而也是安全性）方面依然表现出色。\n\n- `Vyper`\
  \ 提供了一组用于编写智能合约的内置函数，虽然全面审查这些函数超出了本章的范围，但我们想重点介绍 `assert` 函数。如果某个条件未满足，`assert()`\
  \ 会抛出一个错误。它通常用在方法开头，以检查方法是否满足特定条件以便继续处理。如果不满足，交易将被回滚，合约终止。例如，想象一个众筹场景，可以通过检查时间戳来使用\
  \ `assert()` 回滚合约。如果以太坊区块链上当前区块的时间戳超过了活动的截止日期，那么合约就应该终止，因为活动已经结束了。这样，`assert()`\
  \ 就成了一个非常简洁的函数，用于对合约代码施加条件。\n\n## 开发者资源\n\n随着以太坊在过去几年中的发展，开发者使用该平台构建应用程序的兴趣也与日俱增。在本节中，我们将介绍一些可用于在以太坊生态系统中进行快速原型开发的开发者资源：\n\
  \n- `Remix`：一个基于网页的 IDE，用于在以太坊上更快地编写和测试智能合约。它内置了对使用 `Solidity` 和 `Vyper` 编写合约的支持、用于扩展功能的插件管理器、单元测试以及一个区块链虚拟机。\n\
  \n- `Ethereum Studio`：另一个基于网页的 IDE，适合新开发者学习如何构建和部署智能合约。`Ethereum Studio` 提供了项目模板、交易日志记录器以及一个内置的以太坊虚拟机，用于在以太坊平台上进行快速原型开发。\n\
  \n- `OpenZeppelin SDK`：一套智能合约工具包，帮助构建、编译和部署智能合约，并在部署后与之交互。\n\n- `Embark`：一个用于构建去中心化应用（DApp）和智能合约的开发者平台。拥有用于部署合约的命令行界面、插件系统、交易浏览器以及一个活跃的开发者社区。\n\
  \n- `ConsenSys Academy`：一个自定进度的在线以太坊开发者课程，全年开放报名。更多关于教育资源的内容将在后续章节介绍。\n\n- `Ethereum\
  \ Stackexchange`：一个社区，可以提出任何与以太坊相关的问题，从平台开发到入门指南。\n\n- `Chainshot`：一个受邀参加的区块链开发训练营，专注于以太坊智能合约，其课程设置侧重于实际应用。\n\
  \n\n\n### 世界计算机模型\n\n以太坊项目怀揣着一个宏伟愿景：成为由数百万账户驱动的共享世界计算机，这些账户由区块链提供支持，而区块链则成为通信“智能日志”的后端，提供待执行去中心化逻辑的合约，以及充当执行平台的\
  \ EVM。但计算和处理能力并不足够；一台计算机还必须能够存储信息，并允许应用程序之间建立通信机制。这台世界计算机将运行在互联网 3.0 时代，由于信息流的去中心化特性，服务器将不再被需要。在这个雄心勃勃的尝试中，以太坊区块链只是世界计算机模型的四分之一。让我们介绍其他三个组成部分：\n\
  \n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig5_HTML.jpg](img/430562_2_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\n以太坊世界计算机模型的分层方法\n\n-   **Whisper**：一种安全的消息传递协议，允许区块链上的去中心化应用程序相互通信。此协议依赖于混淆和匿名化，类似于\
  \ Tor 项目（提供匿名网页浏览），其中有关消息内容、发送者和接收者的详细信息都会被隐藏。此外，这些信息无法通过数据包分析来收集。Whisper 协议建立在`RLPx`传输协议之上，这是一种基于\
  \ TCP 的传输协议，由以太坊节点内部用于通信。在许多情况下，DApp 需要通过消息总线进行通信；例如，宣布虚拟资产的限时抢购。Whisper 通过使用信封（由\
  \ Whisper 节点发送和接收的加密数据包）来实现轻松广播。为此，为避免垃圾信息，Whisper 节点必须使用工作量证明函数来发送消息。完成的工作量与所发送广播的大小成正比。最终，Whisper\
  \ 将为用户账户之间或代表用户账户运作的应用之间提供自动化的通信手段，如图 4-5 所示。\n\n-   **Swarm**：一种去中心化的存储和分发服务，用于\
  \ DApp 代码、用户数据、区块链数据和状态数据，可供以太坊区块链使用。未来，Swarm 将能够提供 Web 3.0 服务，如媒体流、去中心化数据库和状态通道。Swarm\
  \ 试图解决的主要问题是，目前在区块链上存储大量数据的成本仍然非常高昂。这就是为何任何需要存储的 DApp 都使用链下替代方案。Swarm 背后的理念很简单：利用协作节点的点对点网络来汇集资源。这个\
  \ P2P 网络充当一个分布式云存储系统，具有充足的数据冗余机会。该网络是自我维持的，因为相关的区块链可以根据资源交易来激励节点以获得报酬。Swarm 存储协议有三个主要组成部分：数据块、引用和清单。数据块是\
  \ Swarm 中存储和检索的基本单位：最大容量为 4K 的数据片段，链接到一个地址。引用是文件的唯一标识符，前端客户端可以使用它来检索内容。最后，清单是一种数据结构，它描述了一个文件集合以及用于检索内容的路径和相应哈希值。使用\
  \ Swarm 可以在网络间分布数据，并以去中心化的方式（使用节点）复制冗余数据，而无需托管集中式服务器。可以激励网络中的多个节点复制数据块并使用清单来引用数据，这很像\
  \ RAID 配置，从而消除了托管集中式服务器的需要。\n\n-   **智能合约**：以太坊平台的最后一个主要支柱。提供对区块链的编程式访问，并提供逻辑框架来驱动最终将在世界计算机上运行的应用程序。\n\
  \n在图 4-5 中，我们看到了世界计算机模型的分层方法。世界计算机上的用户账户（或简称为用户）是基本实体，因此它们是第一层。第二层是区块链，它充当网络中不同组件之间的通信串行总线；这是第二层。第三层是称为智能合约的逻辑框架，它存在于区块链上，为世界计算机提供计算能力。其中一些合约可能需要外部存储来输出结果，并使用\
  \ Swarm 来协调存储；这是第四层。最后，回顾第一层，我们有名为 Whisper 的消息传递协议，用于促进用户对用户或应用对应用的通信。世界计算机和互联网\
  \ 3.0 的概念不仅仅是哲学愿景或技术蓝图，它对于内容如何在网络上被控制和分发具有深远影响。以太坊的 Taylor Gerring 非常雄辩地（[`https://blog.ethereum.org/2014/08/18/building-decentralized-web/`](https://blog.ethereum.org/2014/08/18/building-decentralized-web/)）讲述了构建这个梦想：\n\
  \n> *随着以太坊生态系统的经济性日益成熟，使得针对最低费率存储的开放合约得以发展，内容托管的自由市场可能会演变。鉴于 P2P 应用的性质和动态，热门内容将随着群体共享而轻松扩展，而不是遭受孤立服务器的不堪重负。最终结果是热门内容的传输速度更快，而非更慢。*\n\
  \n> *这种蜕变将为开发者提供机会，去构建下一代去中心化、私密、安全、抗审查的平台，将控制权交还给下一个伟大创意的创造者和消费者。任何有梦想的人都可以自由地在这一类新型的下一代去中心化网络服务之上进行构建，而无需拥有信用卡或注册任何账户。*\n\
  \n> *尽管没有人告知或期望我们这样做，但我们有责任珍惜并改善那些某些人试图扰乱、操纵和控制的共享资源。正如没有人能完全理解新兴的互联网集体智慧一样，我们也不应期望任何单一实体能够完全理解或维持完美一致的动机。相反，我们应该依靠互联网来解决互联网的问题。*\n\
  \n### 第 2 层升级\n\n本章迄今为止描述的经典以太坊协议和网络属于第 1 层。为了达到理想的世界计算机模型，需要可扩展性和安全性升级，以便更多应用程序可以与区块链交互，并且可以执行复杂代码。这些升级都属于第\
  \ 2 层，将于 2020 年开始推出。我们在此讨论第 2 层的四个组成部分：分片、信标链、状态通道和 Plasma。对各组成部分的解释将按顺序引出下一个组成部分。\n\
  \n\n\n#### 分片\n\n区块链协议运行必须依赖三大要素：去中心化（定义为缺乏中心化验证权威机构）、可扩展性（定义为能够处理更多交易并具备高吞吐量）以及安全性（广义定义为所有节点都在同一网络副本上运行）。所有区块链实现都受困于一种称为“可扩展性三难困境”的现象，即三大要素中只能成功部署两项。以太坊必须进行\
  \ Layer 2.0 更新，才能实现可扩展性并突破这一困境。\n\n目前，在所有已知的区块链协议中，每个节点都必须存储整个网络状态（描述账户余额和合约代码的数据），并且每个节点都必须处理所有交易。这提供了高度一致性，但也造成了限制可扩展性的瓶颈：区块链处理的交易量无法超过单个节点。这带来了实际后果；例如，比特币每秒只能处理三到七笔交易。为了消除这一瓶颈，我们需要面对以下问题：能否设计一种机制，让只有一小部分节点验证交易，同时仍能保证整个网络的安全？其思路是将交易处理任务分割给较小规模的节点组，这些节点组可以并行验证每笔交易。即使每个节点组一次只验证一笔交易，并行执行也能带来惊人的可扩展性优势。\n\
  \n分片正是试图解决这一设计问题的方案。在该方案中，以太坊的状态和历史记录被分割成更小的分区，我们称之为分片。本质上，分片就是将大型数据库（在此场景下即区块链）划分为更小、更高效的分片，从而使整个网络更具可扩展性。分片是一个自我管理的分区，拥有自己的交易历史。在简单的分片形式中，分片内包含的交易仅限于该分片。例如，一个\
  \ DApp 可以将一组地址映射到整个分片，因此与该 DApp 相关的所有交易都将保留在该分片中。结果，整套垂直业务和应用都可以在一个分片上运行。\n\n####\
  \ 信标链\n\nHsiao-Wei Wang 提供了以太坊 2.0 系统的整体架构图，如图 4-6 所示。\n\n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig6_HTML.jpg](img/430562_2_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6 以太坊 2.0 的架构组织\n\n-   **PoW 链**: 这是以太坊目前在线并运行的部分。在以太坊 2.0 系统中，该层将继续保持原样运行，并在其之上添加新层。\n\
  -   **信标链**: 以太坊 2.0 中的权益证明部署。目前正在开发中，将是首个交付的组件。\n-   **分片**: 分片链是分片以及属于该分片的所有交易的复合体。这实现了信标链的可扩展性。最初将开启一个有限的运行时间，在此期间分片将聚合交易并对交易顺序达成共识，但不执行它们。\n\
  -   **虚拟机**: 虚拟机层将为以太坊 2.0 平台上的合约和交易提供计算和执行能力。\n\n为什么我们需要信标链？信标链的主要功能是为以太坊区块链及其附属的所有分片（具体来说是分片链）实现并管理权益证明协议。为此，信标链需要管理以下方面：管理验证者、为每个分片指定区块提议者、将验证者组织成委员会以对提议的区块进行投票，最后对验证者应用奖励和惩罚。“信标链”这个名字源于一个提供随机性来源的\
  \ NIST 随机信标发生器；我们稍后会看到为什么随机性这一属性对网络如此重要。\n\n##### 管理验证者\n\n在传统的 PoW 算法中，任何用户都可以使用自己的硬件成为矿工。然而，在以太坊\
  \ 2.0 中，用户需要质押他们的以太币（ETH）来激活验证者。需要注意的是，验证者是虚拟的，由提交以太币的质押者激活。每质押 32 ETH，就会激活一个验证者。信标链的一个主要功能是维护一套验证者：这些节点已质押了所需的\
  \ 32 ETH，现在负责运行以太坊 2.0 协议。\n\n节点可以通过将其质押发送到工作量证明链（当前的以太坊区块链）上的一个合约来加入验证者集。经过初步的有效性检查后，提交的质押被冻结，合约会广播一个所有信标链客户端都能接收到的公告。此时，该节点被认为已加入信标链上的验证者集。一旦节点激活，该验证者就能在信标链选中时通过提议区块参与到以太坊\
  \ 2.0 协议中，并加入对区块进行投票的委员会。\n\n##### 区块提议者\n\n在工作量证明协议中，最先解决挖矿难题的节点可以组装/挖掘下一个区块。然而，在权益证明中，不涉及挖矿。区块提议者本质上是一个被伪随机选中来构建区块的验证者。为了选取验证者，需要这种随机性的来源，因此有了信标链这个名字。\n\
  \n信标链为整个以太坊 2.0 网络提供了节奏。它在网络上每十六秒生成一个区块，而工作量证明协议则是不规则地生成区块，平均大约每十五秒一个。这十六秒的周期称为时隙，每个时隙都是向信标链添加一个区块的机会。对于每个时隙，信标链中选定的区块提议者收集来自验证者集对先前区块的所有投票，锻造区块本身，并将其发布到区块链上。未来，每个分片在时隙开始时都会有自己的提议者。这个分片区块提议者将收集该分片的所有交易，并将其组织成区块以供开始投票。\n\
  \n##### 委员会\n\n在以太坊 2.0 区块链的这个新权益证明协议中，一个关键的安全来源是各个委员会，它们负责投票决定哪些区块将被添加到区块链，并形成链的真实历史。信标链依赖计算其自身委员会的投票（也称为证明）来就区块达成共识并将其添加到区块链。该委员会由系统中的验证者组成，它们收集的证明共同创造了信标链的历史。未来，将会有创建更小子委员会的条款，这些子委员会一次只管理一个分片。这将允许子委员会确认来自分片的区块提议者，并保持历史记录的一致性。\n\
  \n##### 奖励与惩罚\n\n信标链的一项重要管理职责是跟踪和更新验证者在加入验证者集时所质押的存款。为此，验证者因维护网络共识和诚信行事而获得奖励，这激励他们参与区块委员会。如果验证者拒绝遵守验证者集制定的规则，他们可能会受到惩罚：他们最初质押的\
  \ 32 ETH 将被罚没，或者验证者可能被驱逐出系统。此外，如果验证者的余额低于 16 ETH，信标链将将其从验证者集中移除。\n\n\n\n### 状态通道\n\
  \n状态通道是一种通用模型，用于思考区块链上发生但可以在不影响网络安全性的情况下转移至链下的交互。比特币中一个经过充分研究的状态通道实例是支付通道：双方之间即时、无摩擦的支付交易，无需等待比特币区块链上漫长的确认周期。广义而言，状态通道的概念可应用于区块链协议上任何改变状态的交互。在不削弱安全性的前提下，将部分交易或区块链交互转移至链下，可以显著提升网络速度。\n\
  \n状态通道包含三个基本组件：\n\n- **锁定机制**：区块链状态的一部分通过多重签名智能合约锁定，使得特定的一组用户必须完全同意该合约才能更新它。\n-\
  \ **链下操作**：链下用户通过签署交易并构建可提交至主区块链的区块来更新本地状态。这些交易在支付状态通道中聚合并本地更新。\n- **解锁机制**：参与者将支付通道的聚合状态提交至区块链，若满足合约条件，则根据第一步在区块链上解锁该状态。\n\
  \n在此，第一和第三组件用于锁定和解锁全局状态的一个分区，被视为区块链操作。然而，第二组件可以完全在链下完成，并可能涉及大量交易/更新。这些更新可以快速进行，并在支付通道上保持内部一致性，而无需涉及区块链。这一步提供了可扩展性和巨大的性能优势。通过这种方式，只有第一和第三步需要发布到网络并在区块链上确认。中间的交易则可以在状态通道上以更快的速度执行。\n\
  \n### Plasma\n\n`Plasma` 是一个框架，用于在链下进行交易，同时利用以太坊区块链的共识和安全机制来同步这些交易。`Plasma` 链是部分独立的子链，它们注册到以太坊主区块链上。这些子链可以将交易批量提交至以太坊主区块链。通过这种方式，主区块链对计算能力的部分交易需求得以缓解。节点现在可以将这些计算能力用于合约和其他更高层次的任务。`Plasma`\
  \ 更进一步扩展了支付通道的概念，允许创建依附于以太坊主区块链的子区块链。这些子链又可以衍生出更多的子链。本质上，`Plasma` 是一个框架，用于链接到一条主区块链（此处是以太坊区块链）的多条分支区块链。\n\
  \n在安全性方面，基于 plasma 的链依赖以太坊主区块链来实现共识和一致性机制。用户可以依赖以太坊网络所提出的安全措施，来赎回在子链上决定的任何资产。`Plasma`\
  \ 链使用 `MapReduce` 结合默克尔树结构来确保交易验证并检测欺诈。此外，在 plasma 链中持有权益的成员会进行自我监管和监控。如果出现任何争议，他们可以向以太坊主区块链提交时间戳或恶意行为证明以供解决。`Plasma`\
  \ 链还包含另一种防欺诈机制，称为回滚。当双花类活动导致支付或交易失败时，该功能会被激活。当此功能激活时，所有资金都会恢复到网络在试图欺诈之前的状态。在提议的实现中，对于父级以太坊区块链而言，回滚过程在计算上非常廉价，并能提供巨大的安全性。\n\
  \n## 区块链即服务\n\n微软近期宣布与以太坊基金会合作，在其云平台 `Azure` 上推出基于区块链的服务。这种采用基础设施即服务的方式来提供快速简便的区块链实现，将使开发者能够以更低的成本试验新功能并部署\
  \ `DApps`。来自 `Azure` 区块链工程团队的 Marley Grey 描述了 `区块链即服务`（`BaaS`）将如何培育一个 `DApps` 生态系统：\n\
  \n> *微软和 ConsenSys 正在合作，在 Microsoft Azure 上提供* *以太坊区块链即服务 (E-BaaS)* *，使企业客户和开发者能够拥有一个一键式的云端区块链开发者环境。初始产品包含两个工具，支持基于智能合约的应用的快速开发：Ether.Camp——一个集成的开发者环境，以及\
  \ BlockApps——一个私有的、半私有的以太坊区块链环境，可部署到公共以太坊环境中。*\n>\n> *“由 Microsoft Azure 和 ConsenSys\
  \ 提供的以太坊区块链即服务”允许金融服务客户和合作伙伴在一个现成的开发/测试/生产环境中低成本地进行试验、学习和快速失败。它将使他们能够利用行业领先的框架非常快速地创建私有、公有和联盟链环境，并通过\
  \ Azure 的全球分布式（私有）平台分发他们的区块链产品。这使得 Azure 成为区块链应用的极佳开发/测试/生产环境。周边的功能如 Cortana 分析（机器学习）、Power\
  \ BI、Azure Active Directory、O365 和 CRMOL 可以集成到应用中，从而催生新一代去中心化的跨平台应用。*\n\n关于 `BaaS`\
  \ 的初步更新是在 2015 年底提供的，目前，一个完整的区块链实验室生态系统正在 `Azure DevTest` 社区中蓬勃发展。`DevTest Labs`\
  \ 允许用户和开发者探索并测试为特定用例设计的模板。此外，该平台最初从以太坊区块链起步，但最近有更多初创公司开始基于 `Azure` 进行构建，提供诸如 `Emercoin`\
  \ 的新服务（它提供了 `SSH` 服务），以及 `PokiDot` 及其面向医疗保健的区块链 `Dokchain`。随着时间的推移，越来越多的初创公司将 `Azure`\
  \ 作为运行区块链并在其上构建应用的标准。随着诸如 `Cortana` 等智能服务的集成，开发能够签署来自外部数据流（如物联网设备）的输入数据并提供一定完整性级别的预言机可能会变得更加容易。\n\
  \n**注意**\n\n微软在 `BaaS` 领域的两项进展在此值得关注。第一项是引入了 `Cryptlets`，这是一种用于与外部事件交互以构建企业级智能合约的安全中间件。第二项进展是\
  \ `Coco` 框架，这是一个用于在区块链之上构建高吞吐量网络的开源系统，其中的节点和参与者被明确声明和控制。根据设计，`Coco` 与任何账本协议兼容，并允许企业构建生产就绪的区块链网络。关于微软平台的更多内容将在后续章节中介绍。\n\
  \n\n\n## 去中心化应用\n\n我们在讨论 Whisper 时曾提及去中心化应用（或 DApp），但此处将进行更深入的探讨。去中心化应用是一种无服务器应用，运行在以太坊技术栈上，并通过能够调用后端技术栈的\
  \ HTML/JavaScript 前端与最终用户交互。传统上，移动或网页应用的后端运行在中心化的专用服务器上；然而，DApp 的后端代码则运行在去中心化的点对点网络上。图\
  \ 4-7 展示了一个 DApp 在区块链上运行的简化模型。\n\n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig7_HTML.jpg](img/430562_2_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7. DApp 的结构\n\n如图 4-7 所示，用户界面通常用 HTML 或 JavaScript 编写，是加载在用户设备上的唯一组件。该界面向后端发起调用，以执行特定合约，并在需要外部存储或应用需要与其他应用通信时，调用如\
  \ Swarm 或 Whisper 等后端资源。如果说传统应用由前端和运行后端服务的服务器组成，那么运行在以太坊技术栈上的 DApp 则由前端和运行在区块链上的合约构成。DApp\
  \ 通常在区块链上拥有自己的一套相关合约，用于编码业务逻辑并持久化存储其共识关键状态。回顾一下，以太坊技术栈上的所有代码都在一个 `EVM` 内运行，它会跟踪每一步操作，并向合约所有者收取燃料费。这防止了\
  \ DApp 开发者在区块链上执行过多操作，或因直接在区块链上存储数据而导致其膨胀。\n\n**注意：** 简单回顾一下，DApp 技术栈依赖去中心化存储（由类似\
  \ Swarm 的架构提供）来存储用户数据或应用数据，依赖区块链来处理合约逻辑和交易操作，并依赖前端来服务最终用户。前端界面根据用户操作，向区块链上运行去中心化应用的特定合约发起调用。\n\
  \nDApp 的后端如何为前端拉取静态内容（例如从以太坊技术栈获取 JS 到静态内容），并从区块链接收更新的全局状态？让我们看一个使用 IPFS 作为存储的示例，以理解这些后端调用（图\
  \ 4-8）：\n\n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig8_HTML.jpg](img/430562_2_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8. DApp 后端调用的简单示意图\n\n- 后端代码本质上是一个合约，在给予适当资源的情况下在区块链上执行。\n- 某些应用需要使用持久化数据库来托管应用中使用的静态内容；我们可以依赖\
  \ IPFS，它存储静态文件，并通过网络上的多个节点进行托管。\n- 来自 IPFS 的哈希值被传递给 DApp，合约的执行会更新全局状态，然后从以太坊技术栈传递给\
  \ DApp。\n\n在图 4-8 中，区块链可以将内容存入某个节点上类似 IPFS 的系统，并使这些哈希值可供应用在必要时检索。应用可以向区块链请求全局状态的更新，因为这会影响在设备上运行的应用。最后，根据需要，应用可以从去中心化存储中检索并将完整内容下载到用户设备。以这种方式划分角色可以实现更具创新性的用户界面，因为开发者可以更换前端而无需更改后端。\n\
  \n### Geth 与 Mist\n\n我们还需要简要讨论另外两个在 DApp 开发中发挥作用的工具。`Geth` 是用于在以太坊网络上运行全节点的命令行界面（用\
  \ Go 语言编写）。通过使用 `Geth`，你可以与以太坊区块链交互并执行以下任务：\n\n- 在网络中挖取以太币\n- 在地址之间转账\n- 创建合约并发送交易\n\
  - 使用 DApps API\n\n`Geth` 附带了两个用于开发的接口：包含 `web3.js` 库的 JavaScript 控制台，以及 `JSON-RPC`\
  \ 服务器。让我们简要谈谈这两种技术。`Geth` 可以启动一个交互式控制台，它提供 JS 运行时环境，让你与节点交互。这个运行时环境包含 `web3` 库，可以构建要传播到节点的合约和交易。`JSON-RPC`\
  \ 服务器是一种远程过程调用（RPC）协议，用于促进节点与其客户端之间的数据交换（JSON 是一种节点用来与客户端通信的数据交换格式）。更准确地说，RPC 是一组方法和规则，定义了数据（命令和输出）如何在节点和客户端之间传输。JavaScript\
  \ API 使用 `web3.js` 库来提供使用 RPC 方法的便捷接口。\n\n**提示：** 对于当今大多数以太坊应用来说，`Geth` 是作为命令行工具安装的先决条件。通常在安装过程中，`Geth`\
  \ 会作为附加组件提供，这样用户就不必单独下载并安装它。\n\n`Mist` 是官方的以太坊钱包应用。在早期讨论中，`Mist` 被设想为 DApp 的独立应用商店式浏览器，但这一愿景已经演变。为了与以太坊区块链交互，我们需要一个像\
  \ `Geth` 这样的区块链客户端。该客户端负责向网络广播交易、挖取以太币、签署交易和部署智能合约。大多数最终用户不习惯使用命令行界面，因此创建了如 `Mist`\
  \ 这样的包装器作为前端界面。`Mist` 在后台连接到 `Geth`，并作为钱包软件与用户之间的接口。此外，`Mist` 还提供了编写和部署智能合约或 DApp\
  \ 的接口。钱包软件无缝集成了部署合约所需的支付功能。\n\n最终，使用 `Geth` 和 `Mist` 在以太坊网络上最强大的实体将是去中心化自治组织（DAO），它们本质上是由运行在以太坊网络上的智能合约驱动的自动化公司。我们在此结束对以太坊的探索之旅，并在下一章继续讨论\
  \ DAO。\n\n## 总结\n\n在本章中，我们介绍了以太坊，这是与比特币竞争的最大替代货币之一。近年来，它受到了开发者和投资者的广泛关注。我们首先通过广泛概述以太坊与比特币的对比开始了讨论。我们讨论了作为以太坊基础的账户和函数调用。然后，我们更深入地阐述了账户作为区块链上实体的概念。之后，我们讨论了以太坊上用于智能合约执行的燃料费使用情况，内部存储如何适配默克尔-帕特里夏树，以及账户的内部状态概念。接着，我们探讨了\
  \ `EVM` 以及智能合约如何在区块链上执行。然后，我们讨论了使用 Solidity 和 Vyper 编写智能合约的模型，以及用于快速原型开发智能合约的开发者资源。这引出了对世界计算机模型及其在以太坊组件（如\
  \ IPFS 和 Whisper）中应用的讨论。最后，本章的主要技术焦点是正在为以太坊网络推出的 Layer 2 升级。我们以对 DApp 和区块链即服务模型的简短回顾结束了讨论，我们将在后续章节中对此进行扩展。\n\
  \n\n\n"
- "# 5. 去中心化组织\n\n比特币可以被视为首个原型**去中心化自治组织（DAO）**。它创建了一个基于网络的参与者生态系统，大家为同一个目标贡献算力。在比特币中，底层协议创建了一种金融服务，通过奖励提供验证服务的矿工，这种机制成为了一种基础的去中心化组织。在本章中，我们将重点介绍在区块链上使用\
  \ Aragon 创建的更复杂的组织。Aragon 是一个去中心化应用程序（DApp），它允许任何人创建和管理以太坊区块链上的各类组织（如非政府组织、非营利机构、基金会）。在以太坊早期，要创建一个\
  \ DAO 并实现哪怕是最基本的功能，都需要编写复杂的智能合约和 Solidity 代码。Aragon 简化了此过程。它将组织的基本功能集成在一个基础模板中，每当用户实例化一个公司时，该模板就会被部署。像股权结构表、投票功能、筹款和会计等大多数传统功能，在\
  \ Aragon 模板中都作为运行在区块链上的去中心化对等体提供。此外，一个 Aragon 公司可以进行非常精细化的定制，并通过添加新模块来扩展其现有的智能合约。Aragon\
  \ 使得不同类型的组织能够控制其内置的信任级别。\n\n本章首先介绍去中心化组织的概念。我们将依据拉尔夫·默克尔的理论框架，描述 DAO 运作所需的条件，以及\
  \ Aragon 如何将所有理论构造作为应用程序实现。然后，我们将介绍驱动 Aragon 的技术栈以及正在开发的衍生框架。在更好地理解 Aragon 之后，我们将介绍一个使用\
  \ Aragon 进行筹款和社会风险投资的特殊案例。这引出了本章的核心内容：全面讲解如何在 Aragon 上创建、设置、部署和管理一个 DAO。本教程包含三个主题。第一个主题向读者展示如何设置\
  \ MetaMask——一个用于连接 Aragon 的钱包。第二个主题介绍组织模板，以及如何创建和部署一个 DAO。最后一个主题讲解了如何在 DAO 中执行日常操作以及高级功能。本章遵循从概念背景到实践操作建议的结构。我们希望，在完成本教程后，您能够熟练地设置钱包，并在以太坊测试网上用您自己的\
  \ DAO 进行实验。\n\n## Aragon 技术栈与 Aragon 网络代币（ANT）\n\nAragon 是一个为基于以太坊的去中心化组织构建治理系统的生态系统。从技术角度看，Aragon\
  \ 是一个用于构建和管理去中心化组织的全栈式服务平台，它将组织视为在操作系统上并发运行的多个进程。尽管 Aragon 上同时运行着成千上万个去中心化自治组织（DAO），但我们在此只聚焦于一个单一的\
  \ DAO。在深入探讨 Aragon 之前，让我们用更简单的语言来描述 DAO 的概念。DAO 是一个建立在成员共识决策基础上的区块链实体。DAO 扩展了区块链固有的共识概念，将拥有\
  \ DAO 权益（通常以 DAO 代币形式体现）的成员所做的决策和选择也纳入其中。因此，DAO 的核心是自动化，外围是成员，他们依靠基于多数投票的共识来为组织做决策。虽然这种理解\
  \ DAO 的方式是一个通用的描述，但它并不完整。或许定义 DAO 的更好方法是通过它所执行的功能。DAO 的概念最初源自比特币，而比特币可以被视为第一个 DAO\
  \ 原型。\n\n**注释**\n\nAragon 网络上最简单的功能单元是 DAO，因此我们的大部分讨论将围绕一个最小用例展开。Aragon 提供了一个可用于设置\
  \ DAO 的基础模板，您可以修改此模板来建立一套自定义规则。其他类型的组织（如非政府组织或非营利机构）则是在此基础模板上进行重大修改后构建的，从而允许新的运作模式。此外，在本章后续内容中，术语“DAO”、“公司”或“组织”可能会互换使用，以表示同一概念。\n\
  \n拉尔夫·默克尔将 DAO 描述为一个拥有内部有价值财产、能够更新其内部状态、对成员负责并运行智能合约的实体。这些是任何 DAO 都应能执行的最基本功能；然而，目前对于\
  \ DAO 并没有类似于代币的`ERC20`那样的合规标准。Aragon 通过一个在 DAO 日常运营中具有特定功能的“器官”系统来实现默克尔的思想。每个 DAO\
  \ 模型的核心是一个内核。内核再通过一组器官来执行大部分日常活动。让我们回顾一下 Aragon 实现的这些器官：\n\n- **内核：** DAO 中所有其他组件的协调者。为此，内核仅提供两个功能：可升级性和权限管理。\n\
  \  - 从长远来看，Aragon 上的组织需要具备安全性和模块化，以便能够通过新功能进行扩展。为 Aragon 上的任何组织提供自身升级机制（包括内核本身）至关重要。因此，内核具备升级自身以及任何依赖它的应用的能力。\n\
  \n- 内核需要跟踪所有参与 DAO 的地址、分配给它们的权限，以及这些地址可以执行的操作。这个授权系统也称为访问控制列表（ACL），它保护 DAO 的用户免受权限提升攻击。\n\
  \n- **元器官：** 这是一个具有自我意识（就内部状态而言）并能自我行动的器官，负责根据成员的行动或外部事件在内部更新 DAO。该器官还负责维护在内核中运行的器官的全局注册表。\n\
  \n- **金库器官：** 金库器官充当 DAO 的集体钱包。它以代币形式存储 DAO 拥有的资金，并批准任何支出请求。\n\n\n\n-   **令牌器官（Token\
  \ organ）：** 令牌器官专门处理分配给 DAO 成员的治理令牌。该器官还包含用于添加新型令牌或替换/移除旧令牌的操作逻辑。\n\n-   **调度器官（Dispatch\
  \ organ）：** 一个验证器官，用于确定是否可代表请求者执行请求的操作或交易。这可以通过预言机或基于特定标准过滤请求的编程逻辑来完成。调度器官的输出结果为简单的“通过”或“失败”。如果操作失败，则不会执行。但如果操作或交易通过，它将被分派到更合适的器官进行处理或执行。调度器官还维护每个请求的优先级列表，以便进行分类和适当引导。\n\
  \n-   **应用器官（Applications organ）：** 在 DAO 核心运行的智能合约集合。该器官中运行的应用与组织的其余部分进行沙箱隔离，但大部分业务逻辑驻留在此器官中。Aragon\
  \ 提供了一组负责默认操作的基本以太坊合约，但此器官是可扩展的。可以向组织添加新的应用或模块，以增加功能来满足特定用例。\n\n> **注意**\n>\n> 所描述的器官本质上是理论构造，应由模块化且可扩展的\
  \ DAO 实现。这些器官作为应用的正式实现，将在 DAO 教程部分中更好地展示。\n\n本章稍后对 DAO 的逐步演示将展示这些器官在实践中如何应用。在本节的剩余部分，我们将概述\
  \ Aragon 技术栈。以下是该生态系统中所有使 DAO 得以快速开发和原型设计的组件：\n\n-   **`aragonCLI`：** Aragon 的命令行界面。提供设置和部署\
  \ DAO 所需的所有功能，并可对模板的全局参数进行更精细的控制。此外，还可以使用更高级的功能，例如部署自定义令牌、与 IPFS 集成以及访问包管理器。\n\n\
  -   **Aragon 客户端：** 用于将 Aragon 呈现给用户，以便创建 DAO 并将其部署到以太坊区块链的 Web 客户端。所有日常管理和操作都在此客户端中进行。此外，所有应用、权限和投票均可通过\
  \ Aragon 客户端访问。该客户端本质上是以终端用户形式提供的所有 Aragon 服务。\n\n-   **`aragonPM`：** Aragon 的包管理器，用于连接社区构建的仓库、启用可升级性以及分发构成\
  \ Aragon 客户端的最新版本包。在不久的将来，通过 `aragonPM` 进行的更新将允许核心组件和智能合约代码在运行时动态更新，而不会对 DAO 的服务造成任何中断。它还连接到\
  \ `aragonCLI`，并允许使用传统的基于 CLI 的方法来安装包，类似于 Linux 发行版中的包管理器。\n\n-   **`aragonUI`：**\
  \ 为 Aragon 上运行的所有应用标准化的设计语言。开发者和设计人员可以采用此 UI 方案和设计语言，使其应用看起来像是 Aragon 的原生应用。主题引擎和\
  \ UI 组件在 `aragonUI` 指南（[`https://ui.aragon.org/`](https://ui.aragon.org/)）中有详细说明。\n\
  \n-   **App Center（应用中心）：** 一个供开发者发布应用的 marketplace（市场），这些应用可供任何 DAO 使用。这些应用通常是开源的；然而，由于与区块链绑定并具有代币经济，DAO\
  \ 可以为访问实施新颖的支付机制。\n\n-   **Access Control List（访问控制列表）：** 一个包含 DAO 中每个地址所有权限和操作的主列表。包含在内核（kernel）中。\n\
  \n-   **Aragon Court（Aragon 法庭）：** 一个仲裁层，用于处理 Aragon 平台上发生的主观争议和冲突。法庭处理复杂度较高、需要以陪审员形式进行人工干预的案件。陪审员需要质押一种名为\
  \ `ANJ`（Aragon Network Jurors）的特殊令牌，方可加入陪审团。成功裁决冲突会获得网络费用形式的奖励，该费用与质押的 `ANJ` 成正比。\n\
  \n-   **Meta-DAO（元 DAO）：** Aragon 项目本身作为 DAO 运行，其令牌 `ANT` 存在于以太坊区块链上。用户可以购买 `ANT`\
  \ 的份额，从而影响 Aragon 本身的发展方向。Aragon 为其上运行的 DAO 提供的所有功能，也同样适用于 Meta-DAO 本身，只是规模更大。\n\
  \n\n\n### Aragon 的社会公益：筹款应用\n\n`Aragon` 让创建 `DAO` 变得更简单，而筹款应用的加入则使得构建社会创业用例成为可能。在本节中，我们将简要描述筹款活动如何在\
  \ `Aragon` 中运作，以及基于区块链的社会企业所蕴含的新潜力。\n\n在 `Aragon` 区块链上进行一轮融资与传统筹款方式截然不同。目前，`Aragon`\
  \ 中实现了两种筹款选项。第一种是向特定投资者进行一轮融资，以换取对方公司的一部分股权。第二种是进行公开销售，网络中的任何参与者都可以购买你公司的股票。其核心思想很简单：一旦你的\
  \ `DAO` 开始运作，你就可以发行股份，然后你可以向投资者提供其中一个类别的股份以换取 `ether`。这些股份可以提供给单个投资者，也可以在公开销售期间更广泛地提供给网络中的任何参与者。传统筹款与通过\
  \ `DAO` 进行的筹款之间存在显著差异。让我们来看看其中的一些不同之处。\n\n在 `DAO` 上进行筹款需要更结构化的方式，以便在决策过程中保持去中心化。领导筹款活动的项目团队在\
  \ `DAO` 中表现为理事会。理事会成员拥有一个独立的代币，并通过类似于多重签名账户（执行操作需要多个签名）的投票来执行其决策。需要注意的是，理事会成员的权限在设计上受到限制，以减少他们对\
  \ `DAO` 成员以及筹款活动的影响力。理事会有四项主要职责：决定谁应该被纳入理事会、开启预售活动、将 `DAO` 拥有的资产转入金库，以及开启投票让 `DAO`\
  \ 成员通过影响组织的决议。\n\n> **注意**  \n> 理事会成员与*普通* `DAO` 成员之间存在区别。用抽象术语描述这个概念容易令人困惑，所以我们用这个例子来说明：理事会成员将由一种名为\
  \ `High Table (HTBL)` 的代币代表，而 `HTBL` 将用于指定所有理事会职责的交易。`DAO` 成员则使用在预售（筹款活动的开场活动）期间购买到的代币。这些成员，也被称为代币持有者，将由另一种独立的代币\
  \ `Continental (CTL)` 代表，而 `CTL` 将用于影响 `DAO` 及其日常活动。\n\n`DAO` 成员的定义是：为 `DAO` 的整体方向和决策提供意见的非理事会代币持有者；他们享有多项特权，包括赎回在预售中购买的代币并将其兑换为\
  \ `ETH`；决定安装哪些应用以及更新哪些权限；决定理事会应将多少资金转入金库；以及决定如何更新筹款费用和抵押设置。\n\n预售标志着筹款活动的开始，是一个关键事件，其目标是销售预先指定数量的代币（沿用我们的例子，我们将销售\
  \ `CTL` 代币）。在预售期间，`Ethereum` 网络上的任何人都可以通过先购买 `DAI` 来购买 `CTL` 代币。`DAI` 是 `Ethereum`\
  \ 上的一种 `Stablecoin`（稳定币），旨在维持 `$1.00 USD` 的价值。在预售设置中，一个组织可以为其新代币设定一个以 `DAI` 计价的价格，购买者将转换他们的\
  \ `DAI` 来购买这种新代币。如果预售活动达到了预设目标，则视为成功，新代币的交易期即可开始。否则，筹款活动被视为失败，所有投入的资金将返还给相关方。`Fundraising`\
  \ 应用中提供了更高级的代币交易选项，例如分期归属，但这超出了本章的范围。\n\n## 身份管理用例\n\n`Aragon` 中的身份管理用例已不再积极开发，`Aragon`\
  \ 开发者解释说，这曾是一个过渡方案，直到他们能够扩展和泛化更多现有功能：\n\n> *尽管 Aragon 之前与 Keybase 进行了集成，但 ENS 的存在使我们能够构建一个避免依赖中心化第三方的身份系统。在此过程中，我们失去了之前由\
  \ Keybase 提供的许多功能，例如链下存储（例如，个人资料照片或其他服务标识符）。未来，我们计划将 Aragon ID 与去中心化的链下存储服务（如 Swarm\
  \ 或 IPFS）集成，以提供此类功能。*\n\n> *鉴于此，Aragon ID 是一个简单的身份系统，用以弥合差距，直到此类项目准备就绪。它利用现有的 ENS\
  \ 基础设施，安全地提供地址到 `<name>.aragonid.eth` 标识符的双向、先到先得映射。之后，用户将能够解析和反向解析任何 `<name>.aragonid.eth`\
  \ 到地址，并相信他们的名称注册安全地掌握在自己手中。*\n\n> **编者按**  \n> 我们决定保留这个用例，因为它有助于突出显示身份处理方法的思路，以及构建一个混合型组织的价值——在该组织中，用户身份被识别，但组织由智能合约驱动。\n\
  \n身份概念对于加密技术来说是一个难题，因为它要求网络架构中固有一定程度的信任。大多数将身份集成到基于共识的系统的通用方法，通常都涉及密码学证明和签名的某种变体。在\
  \ `Aragon` 中，一个名为 `Keybase` 的外部服务与一个注册合约一起被用来建立一个“无需信任的”双向验证方案。该方案背后的逻辑非常简单：证明某个特定地址属于你，然后验证你的用户名拥有该地址。这两个陈述如何在功能设置中协调一致？\n\
  \n让我们介绍构成双向桥梁的两个组件。简单来说，`Keybase` 是一个公私钥对管理服务，具有 `OAuth` 集成功能，允许用户进行认证和验证帐户。`Keybase`\
  \ 可以作为一个中心枢纽，供用户链接和验证外部账户。例如，在 `Keybase` 上创建帐户后，用户的公共资料可以显示所有他们关联的社交媒体账户，从而建立其合法性和连接性。第二个组件是一个注册合约，它从\
  \ `Aragon` 网络内部提供账户到地址的关联机制。双向桥梁是通过使用地址（关联到网络上的账户）对文件进行加密签名，然后将该文件托管在 `Keybase`\
  \ 上（通过各种社交媒体集成关联到用户身份）而形成的。\n\n> **注意**  \n> 务必牢记，在 `Aragon` 中，身份认证是一项可选功能。为 `Aragon`\
  \ 开发的用例范围之广，从提供完全匿名（例如 `DAO` 的情况），到为下一代区块链公司集成 `Keybase` 的完整用户名系统，不一而足。\n\n那么，用户如何让他们的身份可供双向验证方案使用呢？`Keybase\
  \ Registry 2.0` 中的工作流程简化到了一个简单的步骤：将已签名的证明上传到 `KBFS`。这引入了几个新组件，如下所示：\n\n- **Keybase\
  \ 文件系统（KBFS）**：一个加密安全的本地和云存储目录。`KBFS` 只允许目录的所有者添加新文件，并且这些文件会被公开。在 `KBFS` 中，添加到目录的每个文件都会自动由所有者的私钥签名，任何人都可以通过\
  \ `Keybase` 验证该签名。\n\n\n\n- **签名证明：** Aragon 使用由用户签名并上传至 KBFS 公共目录的标准身份证明。此证明包含四个组成部分：Keybase\
  \ 上的用户名、用户拥有的以太坊账户地址、用户输入的字符串或评论，以及最终的签名公钥。任何希望验证身份的人都可以获取此证明文件，并使用诸如 `getUsername(args)`\
  \ 之类的函数，根据证明中的账户地址执行用户名反向查找。\n\n- **Oraclize：** 反向查找是一个链上验证过程，通过 Aragon 网络内的注册合约执行。对于\
  \ Keybase 查找，采用了一种名为 Oraclize 的数据载体服务。Oraclize 请求给定 Keybase 用户名的签名，并创建该用户名到以太坊账户地址的映射。此证明文件上的签名应与网络上用户的公钥验证一致。Oraclize\
  \ 执行链上检查以验证证明签名，并确保映射是合法的。代表其他用户发起此验证的一方也需要支付相关步骤的费用，包括 Oraclize 的引用调用。\n\n- **Keybase\
  \ 解析器：** 以太坊名称服务（ENS）允许我们将人类可读的链接解析为以太坊地址。最近，Aragon 已开始测试一个 Keybase 解析器，该解析器将回调映射到用户名，从而得到地址，例如\
  \ `john.keybase.eth -> 0x99...cx88`。这简化了整个网络中的反向查找和用户名引用。\n\n现在我们对 Aragon、构成 DAO\
  \ 的组件以及募资机制有了基本了解，本章的剩余部分将重点介绍如何在 Aragon 上创建和管理一个 DAO 的详细步骤。\n\n## DAO / 公司操作指南\n\
  \n在本节中，我们将逐步创建 DAO，并熟悉 Aragon 中与 DAO 相关的主要操作。为简化起见，我们将仅有两个实体（账户）参与此 DAO。本指南分为三个主题：\n\
  \n- **设置 DAO 环境：** 我们将介绍此 DAO 的参与者，了解如何使用 MetaMask 创建钱包，并熟悉界面。\n\n- **设置 DAO：**\
  \ 在 MetaMask 设置完成后，我们将把账户连接到以太坊测试网，并使用它来创建一个 DAO。\n\n- **日常操作：** DAO 创建完成后，我们将逐步进行基本操作，例如铸造新代币、投票和提款。然后，我们将深入探讨更高级的功能，例如\
  \ DAO 财务管理以及添加新的应用权限，这为管理您的公司提供了一种全新的精细化治理层面。\n\n### 主题 1：设置 DAO 环境\n\nAragon 可用于通过网站（[`https://aragon.org/`](https://aragon.org/)）完全在线创建\
  \ DAO（无需下载客户端）。目前，Aragon 有两个组件：DAO 创建器（Aragon Core）和一个钱包（MetaMask）。Aragon 的 DAO\
  \ 创建器组件会变成一个用于管理 DAO 的完整仪表盘，所有与 DAO 相关的操作都可以通过仪表盘上的应用进行。第二个组件是 MetaMask：一个设计为 Chrome\
  \ 或 Firefox 浏览器插件的数字钱包，用于与以太坊区块链交互，使其对实用的日常用户来说易于访问。MetaMask 是可以与 Aragon UI 集成的四个钱包选项之一，我们在本章中将使用它，因为它所需的设置时间最少。让我们从设置\
  \ MetaMask 开始，然后将 Aragon 连接到 MetaMask，再连接到水龙头（可发放测试代币）。第一步涉及将 MetaMask 扩展程序添加到 Chrome。安装完成后，启动屏幕应如图\
  \ 5-1 所示。\n\n> **注意：** 广告拦截器和弹出窗口拦截器会干扰 MetaMask。为了让读者能跟随本教程操作，您可能需要为 Aragon 网站和水龙头禁用它们。\n\
  \n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig1_HTML.jpg](img/430562_2_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** MetaMask 启动屏幕\n\nMetaMask 会要求您在使用此插件前先设置一个钱包。点击（1）开始；这将带您进入图 5-2 所示的设置屏幕。有两个选项可用：创建新钱包（我们将选择的选项）或导入钱包（适用于您已有\
  \ MetaMask 钱包，或想要从其他浏览器导入钱包的情况）。点击图 5-2 中的（2），这将带您创建钱包密码。密码附带一个备份短语，您可以用它来在丢失密码时恢复您的钱包。\n\
  \n> **注意：** 如果您想将钱包导入 MetaMask，也需要此秘密短语。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig2_HTML.jpg](img/430562_2_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 设置屏幕。选择（2）为您的 MetaMask 钱包设置密码\n\n创建钱包密码后，您将进入秘密短语屏幕。此短语用于在您丢失密码时恢复钱包。点击（3）显示图\
  \ 5-3 所示的秘密短语，然后将其记下来。在下一个屏幕上，您将被要求重新输入秘密短语，然后您会收到钱包已设置成功的确认信息。设置完成后，您可以点击 MetaMask\
  \ 图标查看完整的钱包视图，如图 5-4 所示。\n\n> **注意：** 如前所述，还有其他方式可以通过提供高安全性且无需秘密短语的硬件钱包连接到 Aragon\
  \ 和以太坊区块链。更全面的介绍见参考文献中的其他部分。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig3_HTML.jpg](img/430562_2_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** 用于密码恢复的秘密短语。点击（3）显示短语并记下。点击（4）继续\n\n\n\n#### 钱包视图与 MetaMask 设置\n\n钱包视图如图\
  \ 5-4 所示。让我们快速浏览一下此处呈现的信息。请注意，我们做的第一个更改是切换到以太坊测试网，具体来说是 Rinkeby (5)。该测试网与 Aragon\
  \ 兼容，我们将在此处进行所有交易，而不是在以太坊主网上。当你对使用 Aragon 感到熟悉后，可以再切换回主网。(6) 显示了你当前正在使用的账户。MetaMask\
  \ 允许用户在同一个钱包中持有多个账户（地址）。因此，当前账户地址由 (7) 给出，这就是正在使用的账户。接下来是此当前账户的当前余额，由 (8) 给出。该钱包软件提供了两个基本功能\
  \ (9)，包括将 ETH 发送到另一个地址，以及通过从交易所或我们将使用的测试水龙头直接存入的方式，将 ETH 存入钱包。最后，通过该钱包进行的所有交易历史记录显示在\
  \ (10) 中。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig4_HTML.jpg](img/430562_2_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** – MetaMask 钱包主屏幕\n\n现在我们已经设置好了 MetaMask，接下来讨论如何将其与以太坊测试网上的 Aragon 进行交互。你可以通过\
  \ [`https://rinkeby.aragon.org/`](https://rinkeby.aragon.org/) 访问 Rinkeby 测试网；这将是我们构建\
  \ DAO 的界面。该界面如图 5-5 所示，其中 (11) 确认我们位于测试网上，并允许我们切换到以太坊主网。(12) 开始创建你的 DAO 的流程，但在此之前，让我们先链接我们的账户。\n\
  \n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig5_HTML.jpg](img/430562_2_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5** – 与以太坊测试网进行交互\n\n在屏幕的右上角，你会看到一个 `Connect account` 按钮；点击它将显示四个选项，如图 5-6\
  \ 所示。`Frame` 是一个桌面原生的以太坊提供商，允许多个不同的钱包与 DAO 进行交互（包括硬件钱包）。`Fortmatic` 和 `Portis` 是提供电子以太坊钱包的服务，并带有直接兑换（用法币购买以太坊）的选项。\n\
  \n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig6_HTML.jpg](img/430562_2_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6** – 将 MetaMask 账户连接到 Aragon\n\n一旦你点击 `MetaMask`，系统将请求权限将钱包连接到 Aragon，如图\
  \ 5-7 所示。接受权限后，屏幕右侧应显示钱包地址以及绿色的 `Connected to Rinkeby` 文字。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig7_HTML.jpg](img/430562_2_En_5_Fig7_HTML.jpg)\n\
  \n**图 5-7** – 连接 Aragon 和 MetaMask 钱包\n\n一旦钱包连接到 Aragon，我们需要获取一些测试 ETH 来设置一个 DAO。即使在测试网上，诸如在设置\
  \ DAO 的每一步签署合同之类的操作也需要消耗 gas 才能执行。因此，我们可以使用一个水龙头来发送一些没有实际价值但可用于我们目的的测试 ETH。我们将要使用的水龙头每\
  \ 24 小时只能发送一次 ETH，每次使用最多发送 0.2 ETH，链接在此：[`https://testnet.help/en/ethfaucet/rinkeby`](https://testnet.help/en/ethfaucet/rinkeby)。还有更多官方水龙头可用，但这个不需要进行广泛的社交媒体验证。水龙头界面如图\
  \ 5-8 所示。你的 MetaMask 钱包地址填入 (13)，金额是可选的 (14)，因为水龙头每次只会分发最多 0.2 ETH。你可以向你的交易添加一条消息，该消息将在测试网区块链浏览器上可见。你需要选择一个使用水龙头的理由；在\
  \ (15) 中选择任何一个显示的理由，并接受相关条件 (16)。完成后，解决验证码 (17) 并点击 `Claim` 按钮，即可将 0.2 ETH 分发到你的\
  \ MetaMask 钱包。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig8_HTML.jpg](img/430562_2_En_5_Fig8_HTML.jpg)\n\
  \n**图 5-8** – Rinkeby 测试网水龙头\n\n现在，水龙头已连接到钱包，并且你拥有了一些初始资金，你可以开始使用 DAO 了。你可能需要改天再访问水龙头，以获取足够的\
  \ ETH 来探索其他 DAO 功能/模板。\n\n\n\n### 主题 2：设置 DAO\n\nAragon 提供了一些入门模板，用于创建特定用例的 DAO；本章我们将重点介绍两个模板：公司模板和筹款模板。这些模板是开源的，可在\
  \ GitHub 上获取。任何开发者都可以通过新参数扩展这些模板，并创建更适合特定任务的新模板。\n\n一旦你的钱包连接到 Aragon 并且水龙头已向你的钱包分发了\
  \ `0.2 ETH`，你就可以继续创建 DAO。面向以太坊测试网的 Aragon DAO 创建工具位于 [`https://rinkeby.aragon.org/`](https://rinkeby.aragon.org/)，你的初始界面应如图\
  \ 5-5 所示。点击*创建组织*，你应该会看到如图 5-9 所示的模板；选择*公司*模板 (1)。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig9_HTML.jpg](img/430562_2_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9\n\nAragon 中可用的开源 DAO 模板\n\n选择公司模板后，你将进入该模板的概览页面，如图 5-10 所示。该模板附带一组已安装的应用程序，如\
  \ (2) 所示，我们稍后将进行审查。点击 (3) 开始设置。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig10_HTML.jpg](img/430562_2_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10\n\nDAO 公司模板概览\n\n点击 (3) 将进入下一步，即申领一个组织名称。Aragon 使用以太坊名称服务，类似于将网址指向你的 DAO\
  \ 的 DNS 系统。我们将为组织使用以下名称，如图 5-11 所示。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig11_HTML.jpg](img/430562_2_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11\n\n为我们的 DAO 命名。点击“配置模板”继续\n\n下一步是设置 DAO 的投票偏好。这些偏好将决定 DAO 内大部分决策的制定方式。我们来讨论一下投票配置，如图\
  \ 5-12 所示。(4) 声明了组织内部通过某项决议所需的最低投票百分比。我们将保留默认的 50%。(5) 设定了决议被视为有效所需的最低投票百分比，以防未能达成多数票。例如，我们将此参数设置为\
  \ 15%。如果 8% 的投票反对某项决议，而 5% 的投票赞成该决议，则该投票失败，因为它未达到决议被视为有效所需的最低批准率 15%（以所需投票数计）。(6)\
  \ 决定了投票期的持续时间。对于需要大量审议的问题，可能需要更长的投票期。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig12_HTML.jpg](img/430562_2_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12\n\n我们 DAO 的投票偏好\n\n现在我们已经设置了投票偏好，下一步是设置一个代币，该代币在我们 DAO 内将被视为等同于投票权，如图 5-13\
  \ 所示。如果用户在组织中持有更高份额的代币，其投票权就会增加。我们将代币命名为 Best (7)，并使用符号 BST 来表示它 (8)。最初，所有代币将分配给\
  \ MetaMask 中的钱包地址 (9)；此分配也使该地址成为我们 DAO 中的默认账户。我们开始将为 DAO 铸造 100 个代币。这意味着一旦 DAO 上线，它将拥有\
  \ 100 个 BST 代币。任何进一步的代币铸造都将通过投票过程进行 (10)。在此初始过程中，你始终可以向 DAO 添加更多代币持有者；其他地址可以是你在\
  \ MetaMask 钱包上管理的账户。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig13_HTML.jpg](img/430562_2_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13\n\n我们 DAO 的代币设置\n\n这就是部署 DAO 所需的全部设置。审阅图 5-14 所示的设置，然后我们就可以开始与我们的 DAO 进行交互了。\n\
  \n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig14_HTML.jpg](img/430562_2_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14\n\nDAO 设置审阅。点击“启动您的组织”以部署 DAO\n\n当你点击*启动您的组织*按钮时，Aragon 将带你进入一个新页面，系统会要求你签署几笔交易，每笔交易都将应用和你的\
  \ DAO 部署到测试网。这些交易都是部署 DAO 的智能合约所需的 Gas 费用。签名过程完成后，Aragon 将显示一个*开始使用*框，它将带你进入 DAO\
  \ 的主页，如图 5-15 所示。首先要注意的是你的 DAO 与 MetaMask 钱包的连接，如 (11) 所示。只有连接到钱包，你才能执行 DAO 的所有日常操作。请注意，(11)\
  \ 左侧是我们 DAO 的地址，如图 5-11 所示。此 DAO 安装了两个应用程序，我们将在下一个主题 (12) 中审查，最后是 DAO 的权限，我们将在本章后面部分审查\
  \ (14)。为此，DAO 的常用功能以快捷键形式呈现 (13)。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig15_HTML.jpg](img/430562_2_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15\n\nDAO 主页\n\n### 主题 3：DAO 应用和权限\n\n在本主题中，我们将审查 DAO 应用，包括代币、投票和财务。然后，我们将深入研究系统权限，并展示如何为你的\
  \ DAO 添加应用权限。让我们从代币应用开始。\n\n\n\n#### 代币应用\n\n首先，点击左侧边栏中的 `Tokens` 应用；你会看到代币审核界面，如图\
  \ 5-16 所示。在此界面中，我们在 DAO 设置过程中铸造的代币以余额 (1) 的形式显示，并分配给我们提供的钱包地址。右侧是我们的代币基本信息，包括代币总供应量（截至目前铸造的代币数量）、代币是否可转让以及代币名称\
  \ (2)。我们可以创建不可转让的代币，这可用于指定稀有资产。目前，此 DAO 只有一位成员，因此默认情况下，该成员拥有 100% 的代币所有权 (3)。我们可以铸造新代币，要开始此过程，请单击\
  \ (4)，*添加代币*。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig16_HTML.jpg](img/430562_2_En_5_Fig16_HTML.jpg)\n\
  \n**图 5-16**\n\n代币审核界面\n\n要铸造新代币，我们还需要将其分配给一个新地址，如图 5-17 所示。此过程还会向 DAO 添加一位新成员，其中成员资格定义为在\
  \ DAO 中拥有权益。但既然 DAO 已上线，此操作将需要通过投票。通常，对 DAO 操作的任何重大更改都将根据我们在上一节中设置的投票参数进行投票。\n\n\
  > **注意**\n> 新铸造的代币可以分配给任何地址；在这里，添加新地址同时允许我们添加一位在 DAO 中拥有权益的新成员。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig17_HTML.jpg](img/430562_2_En_5_Fig17_HTML.jpg)\n\
  \n**图 5-17**\n\n铸造十个新代币并将其分配给一个新地址\n\n单击 *添加代币* 将引导您完成四个步骤：\n\n*   创建执行铸造功能的交易。\n\
  *   创建一个投票，决定 DAO 是否批准铸造新代币。\n*   使用 DAO 智能合约将这两个功能部署到以太坊测试网。\n*   创建一个使用铸造功能来铸造新代币的交易。\n\
  \n此通用流程适用于通过 Aragon 中的大多数应用执行的操作；第一步如图 5-18 所示。(5) 确认你只能在投票后才能铸造新代币。(6) 告知我们，投票成功后，此交易将铸造新代币。单击\
  \ *创建交易* 将需要 MetaMask 支付 gas 费并签名。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig18_HTML.jpg](img/430562_2_En_5_Fig18_HTML.jpg)\n\
  \n**图 5-18**\n\n创建投票和交易以铸造新代币\n\n导航到 `Voting` 选项卡，你应该会看到一个公开投票，其标题为图 5-18 中来自 (6)\
  \ 的操作。这些投票由 DAO 自动创建。单击该投票将带你进入投票界面。选择 *是* 并签署交易以对你的决定进行投票。确认信息显示在通知中，如图 5-19 所示。\n\
  \n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig19_HTML.jpg](img/430562_2_En_5_Fig19_HTML.jpg)\n\
  \n**图 5-19**\n\n投票通知：(7) 指的是将铸造十个新代币的交易，(8) 指的是正在进行的投票\n\n投票摘要页面如图 5-20 所示。这代表了投票结果。(9)\
  \ 是该投票的描述；作为我们 DAO 的第一次投票，它被分配为投票 #0。此外，还提到了描述和投票创建者。目前，我们的 DAO 只有一位成员，因此投票结果由一位持有大部分权益（100\
  \ 个 BST 代币）的投票者决定 (10)。右侧是投票决议（已通过），以及有关所需支持率和最低批准率的信息 (11)。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig20_HTML.jpg](img/430562_2_En_5_Fig20_HTML.jpg)\n\
  \n**图 5-20**\n\n投票摘要页面\n\n现在投票已通过，让我们看看它为我们的 DAO 带来了哪些变化，如图 5-21 所示。(12) 是第一个主要变化；我们铸造的十个新代币现已分配给\
  \ DAO 上的一个新钱包（账户）。代币总供应量从 100 增加到 110 (13)，这也改变了所有权结构。新账户通过拥有 10 个代币 (14)，在 DAO\
  \ 的决策中获得了 9% 的权益。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig21_HTML.jpg](img/430562_2_En_5_Fig21_HTML.jpg)\n\
  \n**图 5-21**\n\n铸造的代币出现在我们的 DAO 中\n\n#### 投票应用\n\n投票是每个重大 DAO 操作中不可或缺的一部分。因此，我们使用了\
  \ `Voting` 应用来授权铸造十个新代币。类似地，我们可以使用它来提出议题，并经历相同的过程。让我们分享一个简短的例子。导航到 `Voting` 选项卡，单击\
  \ *新投票* 开始。输入你想要向 DAO 提出的问题，如图 5-22 所示。例如，在铸造新代币之前，可以作为一个简单投票来讨论此议题。一旦输入问题，DAO 将根据预设规则开始投票。\n\
  \n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig22_HTML.jpg](img/430562_2_En_5_Fig22_HTML.jpg)\n\
  \n**图 5-22**\n\n创建投票问题\n\n`Voting` 视图如图 5-23 所示。这显示了当前正在积极投票的决议，以及已通过或失败的已关闭决议。我们关于创建代币的新投票显示为开放状态，将在接下来的二十四小时内对\
  \ DAO 成员可用。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig23_HTML.jpg](img/430562_2_En_5_Fig23_HTML.jpg)\n\
  \n**图 5-23**\n\n投票视图\n\n\n\n#### 财务应用\n\n财务应用充当内部银行，记录 DAO 内发生的所有财务活动。在本主题中，我们将介绍如何使用财务应用进行存款和取款。要开始银行操作，我们先请求一些测试代币。导航至\
  \ `System` 选项卡下的 `Permissions`，向下滚动即可看到 *Request test tokens* 部分。这将使我们能够获得一些测试货币，如图\
  \ 5-24 所示。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig24_HTML.jpg](img/430562_2_En_5_Fig24_HTML.jpg)\n\
  \n图 5-24 – 为 DAO 请求代币\n\n现在，财务应用会显示刚发生的交易；更新后的视图如图 5-25 所示。（15）显示了我们请求测试代币后收到的 20\
  \ 个 Aragon 代币（ANT）。（16）列出了转入我们 DAO 的交易记录。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig25_HTML.jpg](img/430562_2_En_5_Fig25_HTML.jpg)\n\
  \n图 5-25 – 财务应用显示一笔流入交易\n\n将存款存入 DAO 的一个简单方法是使用已连接的钱包。我们可以通过在财务应用中发起一笔新的转账来存入资金。设置如图\
  \ 5-26 所示。首先，我们需要选择要转账的货币。我们的 MetaMask 钱包中只包含 ETH，因此这就是我们要转入 DAO 的资产（17）。接着，我们需要输入\
  \ 0.02 ETH 的存款金额（18）。最后，我们可以为这笔流入交易添加一条可选信息（19）。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig26_HTML.jpg](img/430562_2_En_5_Fig26_HTML.jpg)\n\
  \n图 5-26 – 从 MetaMask 钱包向我们的 DAO 转账\n\n从 DAO 提现的操作步骤与存款非常相似。如图 5-26 所示选择提现，并输入将接收提现资金的以太坊地址。然后，输入要提取的金额和币种。作为练习，尝试提取\
  \ 0.01 ETH 到一个 MetaMask 钱包地址。此过程应使财务选项卡显示如图 5-27 所示的内容。（20）显示 DAO 在任何给定时间的剩余余额。（21）是我们从水龙头请求的测试代币。（22）是我们从\
  \ MetaMask 钱包存入的 0.02 ETH，最后，（23）应显示已提取的 0.01 ETH。随着更多交易的进行，财务应用将成为 DAO 的内部追踪器。\n\
  \n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig27_HTML.jpg](img/430562_2_En_5_Fig27_HTML.jpg)\n\
  \n图 5-27 – DAO 的财务概览\n\n**注意：** Aragon 有一个名为 `Agent` 的应用，允许 DAO 与以太坊区块链上的任何其他智能合约进行交互。这使得组织可以使用\
  \ `Agent` 应用作为中介来发送外部资金或导入资金。由此产生的转账将在财务概览页面上记录，并引用 `Agent`。\n\n#### 应用权限\n\nDAO\
  \ 附带一组标准应用权限，用于实现特定功能。为了扩展应用的功能，或向 DAO 添加新的通用特性，必须对新的权限进行投票表决并添加。导航至侧边栏下的 `System\
  \ ➤ Permissions`。这将打开默认的 `Permissions` 视图，如图 5-28 所示。DAO 允许您更改应用的权限，以及在系统级别更改 DAO\
  \ 的权限。我们将只关注应用权限（24）。当前已安装的应用就在下方的（25）中列出。这些应用由模板提供并已预装。（26）列出了我们 DAO 中的应用可用的操作（27）。这些操作被分配给了某个应用，如（28）所示，这表示了从在应用上请求操作到指定应用批准的操作流程。在大多数情况下，如我们之前讨论过的，`Voting`\
  \ 应用将监督所有新的操作。（29）是管理器，可以将操作重新分配给安装在我们的 DAO 上的应用。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig28_HTML.jpg](img/430562_2_En_5_Fig28_HTML.jpg)\n\
  \n图 5-28 – 我们 DAO 的权限概览\n\n在图 5-28 的右侧，点击 *New permission* 开始添加新权限。这里的目标是添加一个权限，允许\
  \ DAO 中的任何账户销毁代币。这将取代默认限制仅由 `Voting` 应用执行销毁代币操作的功能。`Add Permissions` 视图如图 5-29 所示。首先，选择要为其添加新权限的应用，然后分配一个新的实体。在这里，我们将把任何账户分配给接下来要执行的操作，即销毁代币。一旦点击\
  \ *Add permission*，您将进入投票环节。与对 DAO 的任何重大更改一样，一旦该决议被 DAO 批准，该功能将变为可用。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig29_HTML.jpg](img/430562_2_En_5_Fig29_HTML.jpg)\n\
  \n图 5-29 – 添加新权限\n\n如前所述，在添加权限之前，我们需要对此决议进行投票。在图 5-29 中点击 *Add permission* 将带您进入投票界面，如图\
  \ 5-30 所示。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig30_HTML.jpg](img/430562_2_En_5_Fig30_HTML.jpg)\n\
  \n图 5-30 – 添加新权限的投票确认\n\n一旦投票成功，该权限即应用于 DAO，并会在 `Permissions` 选项卡下可见。如图 5-31 所示。至此，我们的教程结束，提供了一个关于如何在\
  \ Aragon 上设置 DAO 的基本概述。\n\n![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig31_HTML.jpg](img/430562_2_En_5_Fig31_HTML.jpg)\n\
  \n图 5-31 – 销毁代币操作的更新后权限视图\n\n在结束讨论之前，让我们简要介绍一下将股份编码为 DAO 中的受保护/限制资产这一主题。不可转让的代币可用作稀有资产，并具有更大的投票权。传统上，上市公司发行的股票有三种类型：\n\
  \n- **普通股（A 类）：** 这是人们通常所说的股票。普通股由公司发行，通常可在诸如 `Nasdaq` 等证券交易所进行交易。普通股的主要优点是获得股息支付以及在交易所进行交易。股息通常是在季度末，公司从该季度产生的利润中支付给股东的一笔款项。普通股也可以在认可的交易所随时进行交易或出售。这些可以编码为在组织成立后向\
  \ DAO 成员发行的新铸造代币。\n\n\n\n### 优先股（B 类）\n\n优先股是向在公司持有重大股份的投资者发行的一种特殊股票。与普通股相比，这种股票具有若干财务优势，投资风险更低。在股息方面，优先股在普通股之前兑付，因此能获得公司利润中更大份额的分配。此外，普通股的股息支付可能有所变动，但优先股对股东有固定回报。将此类资产编入\
  \ DAO 的过程需要使用 `aragon-cli`（命令行界面）。具体来说，我们利用 `aragon-cli` 为 DAO 创建一个名为 `MiniMeToken`\
  \ 的通用 ERC20 代币的克隆，并通过 `Agent` 导入。这使得一种新型资产得以导入并在我们的 DAO 中使用。\n\n### 创始人股（F 类）\n\n\
  F 类股是向公司创始人发行的专属优先股。这类股票拥有更大的投票权；例如，一股创始人股可以算作十票。相比之下，一股普通股仅算作一票。创始人股授予超级投票权，通常用于在涉及大量实体时保持对公司决策过程的控制。\n\
  \n**注意**\n\n使用 `aragon-cli` 超出了本章的讨论范围；然而，它允许实现非常强大的集成。例如，DAO 可以就一种新导入的代币进行投票，将其作为收款资产，让持有者通过向\
  \ DAO 投资而每年获得付款回报。\n\n## 总结\n\n在本章中，我们讨论了去中心化组织的概念。我们首先在基于区块链构建的去中心化组织背景下介绍了 Aragon。我们讨论了\
  \ DAO 的定义以及 Aragon 所实现的组织机构。然后，我们深入探讨了 Aragon 代币，以及借助 DAO 开展社交活动的用例的出现。最后，本章的核心内容是逐步讲解如何建立、管理和运营一个\
  \ DAO，包括其所有基本功能。本章为创建你自己的 DAO 奠定了基础。\n\n"
- "# 6. DAO 遭黑客攻击\n\n在第 5 章中，我们讨论了去中心化组织的概念以及 DAO 的运作方式。在此，我们希望强调一个导致第一个 DAO 创立的历史性时刻，以及它最终如何被黑客攻击。我们的讨论从\
  \ Buterin 对去中心化组织的新颖视角开始，进而引出 Slock.it 的故事——这家公司处于 DAO 革命的核心。然后，我们展示了一些导致 The DAO\
  \ 功能失常的代码：与漏洞相关的智能合约片段、允许从 The DAO 重复提取资金的条件，以及攻击本身。最后，我们通过讨论这次黑客攻击的后果来结束本章：关于硬分叉与软分叉的争论，以及以太坊经典（Ethereum\
  \ Classic）的诞生。\n\n## 引言\n\n全球区块链社区的讨论始终带有理想主义色彩，这可以追溯到中本聪早期关于比特币作为对中央银行业务的回应而撰写的文章。其核心思路是：容易腐败，或无论如何只迎合少数人意愿的系统，如果由代码来治理，可能会变得更负责任。如果该代码存在于区块链上，那么它就不会受到少数派有偏见干预的影响。秉承这一传统，在\
  \ 2013 年 9 月为《比特币杂志》撰写的一篇博客文章中，Vitalik Buterin 探讨了 DAO 的概念。文章开头如下：\n\n> *米特·罗姆尼提醒我们，公司也是人。无论你是否同意他的党派支持者从这一主张中得出的结论，这句话确实含有大量真理。毕竟，公司除了是一群按照特定规则共同工作的人之外，还能是什么呢？当一家公司拥有财产时，这实际上意味着存在一份法律合同，规定该财产仅可被用于当前董事会控制下的特定目的——而董事会本身又可由特定股东群体修改。如果一家公司做了某事，那是因为其董事会已同意应当这样做。如果一家公司雇佣员工，这意味着员工同意按照一套特定的规则（特别是涉及薪酬的规则）为公司的客户提供服务。当一家公司拥有有限责任时，这意味着特定的人被授予了额外特权，可以减少被政府法律起诉的担忧——这是一群比单独行动的普通人拥有更多权利，但最终仍是普通人的人。无论如何，归根结底，这不过是人与合同罢了。*\n\
  >\n> *然而，这里出现了一个非常有趣的问题：我们真的需要这些人吗？* ^(¹)\n\n在 Buterin 的文章首次发表三年后，The DAO 作为一个用\
  \ Solidity 编写的智能合约诞生了，这或许是这种理想主义最纯粹的体现。尽管有着典范性的标签，The DAO 并非第一个——也非最后一个——去中心化自治组织。事实上，到\
  \ 2016 年 5 月，当 Slock.it 的领导层启动 The DAO 创纪录的首次代币发行（ICO）时，DAO 已被公认为日益主流的区块链现象的第三波浪潮。^(²)\n\
  \n为了更好地理解 DAO 术语，请参阅以太坊开发者博客（`https://blog.ethereum.org/2014/05/06/daos-dacs-das-and-more-an-incomplete-terminology-guide/`），该博客对此进行了详细描述。尽管许多人认为比特币是第一个\
  \ DAO，但这两种服务的性质存在巨大差异。虽然比特币确实由网络中每个矿工共享的代码治理，但比特币没有内部资产负债表，只有用户可以用来交换价值的函数。尽管当时其他的\
  \ DAO 确实有资产所有权的概念，但 The DAO 的独特之处在于其代码核心是极其民主的过程，这些过程定义了 The DAO 将如何部署其资源。这是 Buterin\
  \ 关于一个可以在没有一名员工（更不用说 CEO）的情况下开展业务的公司的理念的实现。\n\n摘自 DAO 白皮书：\n\n> *本文阐述了一种方法，该方法首次允许创建这样的组织，其中\
  \ (1) 参与者保持对贡献资金的直接实时控制，并且 (2) 治理规则通过软件被形式化、自动化并强制执行。具体来说，已经编写了标准的智能合约代码，可用于在以太坊区块链上组建一个去中心化自治组织（DAO）。*\n\
  \n\n\nButerin 谈到了在区分去中心化组织与传统公司时，自动化与资本之间的平衡。来自 ConsenSys 的 Paul Kohlhaas 展示了图 6-1，用以说明\
  \ DAO 在自治组织谱系中的位置。请注意，此图显示了不同类型的自治组织分布在从自动化到人工控制的谱系上，例如简单的去中心化组织（DO）和传统的去中心化公司（DC）。\n\
  \n![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig1_HTML.jpg](img/430562_2_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1**  \n作为由自动化驱动决策、并有人类参与的实体——DAO\n\n本质上，DAO 是一次范式转变，它颠覆了以往不包含资本的自动化实体。通过使用区块链，我们可以注入资本，并构建混合商业模式，从而针对特定用例精细调整自动化的程度。以下是图\
  \ 6-1 中三个新术语的简要词汇表：\n\n- **DA**：去中心化代理（Decentralized agents），本质上是开发者为实现特定任务而编程的机器人。DA\
  \ 与 DAO 的主要区别在于后者拥有内部资本。\n- **DC**：去中心化公司（Decentralized corporations），本质上是介于不运营内部资本的论坛与完全自动化的去中心化代理之间的一种媒介。\n\
  - **DO**：去中心化组织（Decentralized organizations），本质上是介于传统公司与完全自治的 DAO 之间的一种媒介。\n\n##\
  \ 团队\n\n在区块链世界中，常出现的情况是，对于没有员工的 DAO 与编写并维护了 The DAO 代码的人类之间的关系性质，存在着许多混淆。就 The DAO\
  \ 而言，这些人类由 Slock.it 的高层领导，这是一家德国公司，旨在通过他们称之为“通用共享网络”（USN）的技术来颠覆共享经济。\n\nSlock.it\
  \ 的首席执行官 Christopher Jentzsch 和首席运营官 Stephan Tual，在创立 Slock.it 之前，曾在以太坊基金会担任高级职务（分别是首席测试员和首席商务官）。Jentzsch\
  \ 是 The DAO 代码的主要开发者，而 Tual 则通过博客文章、会议演讲和论坛贡献成为了 The DAO 的代言人。那么，他们现在的公司会如何从创建基于以太坊的无领导者风险投资基金中受益呢？要理解他们的动机，我们必须审视\
  \ Slock.it 将区块链连接到物理世界的愿景。\n\n在构建 USN 的过程中，Slock.it 旨在物联网技术的主流普及中扮演核心角色。通过提供一种从世界任何地方与网络设备进行交互的方式，USN\
  \ 有望成为一个超连接世界的骨干。在这个世界里，你的财产可以出租给他人，而无需像 Uber 和 Airbnb 这样的中心化公司。取而代之的是，USN 将为以太坊区块链提供一个接口，让去中心化应用可以管理构成共享经济的交易。\n\
  \n该公司计划构建一种名为“以太坊计算机”的专用调制解调器，用于将物联网设备连接到 USN。Slock.it 对 The DAO 的愿景是创立一个去中心化的风险投资基金，用于投资那些构建区块链支持的产品和服务的、有前景的提案。\n\
  \n在撰写本文时（距离最初的 DAO 的 ICO 几年后），Slock.it 已筹集了 200 万美元的种子资金，用于继续开发 USN 和以太坊计算机。根据 Tual\
  \ 在公司网站上的博客文章，Slock.it 现在将以免费开源镜像的形式，为诸如 Raspberry Pi 等流行的片上系统（SoC）提供以太坊计算机。该公司还构建并维护了\
  \ `Share&Charge` 服务，该服务允许电动汽车充电站的所有者通过基于区块链的移动应用程序，将其电力出售给电动汽车车主。\n\n在 Crowd Companies\
  \ 于 2016 年 11 月 19 日进行的一场题为“技术如何改善未来的住宿”的演讲中，Jeremiah Owyang 在图 6-2 所示的幻灯片中总结了 Slock.it\
  \ 的主要用例之一。\n\n![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig2_HTML.jpg](img/430562_2_En_6_Fig2_HTML.jpg)\n\
  \n**图 6-2**  \n通过将物理设备（智能锁）的购买链接到智能合约，Slock.it 可以充当去中心化的 Airbnb\n\n最终，图 6-2 中表达的理念被扩展成了一个去中心化的物联网平台，任何设备都可以连接到区块链。\n\
  \n\n\n### The DAO\n\nThe DAO 的原始构想并非最终在其 ICO 中发布的那个关于民主化商业流程的激进实验。Jentzsch 在 Slock.it\
  \ 博客上描述了这一过程：\n\n> *最初，我们创建了一个 slock.it 专属的智能合约，赋予代币持有者投票权，决定我们——slock.it——应如何使用所收到的资金。*\n\
  > \n> *经过进一步考虑，我们赋予了代币持有者更大的权力，让他们完全掌控这些资金，只有在由智能合约支持的详细提案投票通过后，资金才会被释放。这已经比 Kickstarter\
  \ 模式前进了一步，但在这个狭隘的 slock.it 专属 DAO 中，我们仍会是资金的唯一接收方。*\n> \n> *我们希望能更进一步，创建一个“真正的”DAO，使其成为资金的唯一且直接接收方，并代表创建一个类似于公司的组织，其中可能有成千上万的创始人。*\
  \ ^(³)\n\n为了实现 Slock.it 与 The DAO 的分离，Jentzsch 设计了一个 Solidity 合约，允许任何 DAO 代币持有者就如何处理\
  \ The DAO 的资源提出提案。所有代币持有者都可以对活跃的提案进行投票，提案的最低投票期为十四天。\n\n这意味着，一旦 The DAO 的 ICO 完成，Slock.it\
  \ 就必须像其他任何人一样向 The DAO 提交一份提案。其他用户可以使用 Mist 浏览器来评估该提案。提案的结构如下：\n\n```\nstruct Proposal\
  \ {\naddress recipient;\nuint amount;\nstring description;\nuint votingDeadline;\n\
  bool open;\nbool proposalPassed;\nbytes32 proposalHash;\nuint proposalDeposit;\n\
  bool newCurator;\nSplitData[] splitData;\nuint yea;\nuint nay;\nmapping (address\
  \ => bool) votedYes;\nmapping (address => bool) votedNo;\naddress creator;\n}\n\
  ```\n\n如你所见，提案——这个迅速筹集了 1.5 亿美元的自动化代码库的核心——是对 The DAO 资源的相对简单的请求（`uint amount`）。\n\
  \n任何 DAO 代币持有者都可以通过调用 `vote` 函数对提案进行投票：\n\n```\nfunction vote(\nuint _proposalID,\n\
  bool _supportsProposal\n) onlyTokenholders returns (uint _voteID);\n```\n\n来自任何地址的票数将根据该地址持有的\
  \ DAO 代币数量按比例加权。如果代币持有者想要对两个不同的立场进行投票，他们可以将要用于投票的代币数量转移到另一个地址，然后从那里再次投票。^(⁴) 任何对开放提案进行投票的代币都将被锁定（无法转移），直到投票期结束。\n\
  \n`uint proposalDeposit` 是提案创建者在投票期结束前必须为提案质押的保证金（以 wei 为单位）。如果提案从未达到法定人数，保证金将归\
  \ The DAO 所有。\n\n有两种特殊类型的提案不需要保证金，它们在 The DAO 的命运中发挥了关键作用。第一种类型是拆分 The DAO 的提案，实际上是将提案接收方的资金提取到一个新的“子”DAO\
  \ 中，该子 DAO 是原 DAO 的克隆，但位于一个新的合约地址。拆分提案的投票期为七天，而不是十四天，任何对拆分提案投赞成票的人都会跟随接收方，从原 DAO\
  \ 中提取他们的代币，并将其转移到生成的子 DAO 中。\n\n第二种特殊类型的提案是替换 The DAO 的监督人。DAO 监督人是在创建 The DAO 和任何子\
  \ DAO 时设定的地址，这些地址可以将接收方地址列入白名单，充当看门人的角色。^(⁵) 如果替换监督人的提案被多数票否决，投赞成票的人可以选择坚持他们的决定，从而创建一个由他们选定的监督人管理的新\
  \ DAO。\n\n### ICO 亮点\n\n最初 The DAO 概念的 ICO 一夜之间大获成功：\n\n*   它筹集了 1200 万 ETH（约合 1.5\
  \ 亿美元）。\n*   Jentzsch 和 Tual 都承认，他们从未预料到自己的创意会如此成功。\n\n## 黑客攻击\n\nThe DAO 容易受到攻击的观点一直在开发者社区中流传。Vlad\
  \ Zamfir 和 Emin Gün Sirer 首次在一篇博客文章中提出了这个问题，呼吁在漏洞得到解决之前暂停 The DAO 的运行。^(⁶) 就在攻击发生的几天前，MakerDAO\
  \ 警告社区其代码容易受到攻击，而 Peter Vessenes 则证明 The DAO 也存在同样的漏洞。^(⁷)\n\n这些警告促使 Tual 于 2016\
  \ 年 6 月 12 日在 Slock.it 网站上发布了一篇如今臭名昭著的博客文章，题为“在发现以太坊智能合约‘递归调用’漏洞后，DAO 资金无风险”。在接下来的几天里，人们提出了修复方案以纠正\
  \ The DAO 的许多已知漏洞，但为时已晚。6 月 17 日，一名攻击者开始从 The DAO 中抽走资金。\n\nThe DAO 攻击者利用了 The DAO\
  \ 一个本意良好但实现欠佳的功能，该功能旨在防止多数人压迫持不同意见的 DAO 代币持有者。摘自 The DAO 白皮书：\n\n> *每个 DAO 都必须缓解的一个问题是，多数人有可能在\
  \ DAO 成立后通过改变治理和所有权规则来掠夺少数人。例如，一个拥有 51% 代币的攻击者，无论是在资金募集期间获得的还是之后创建的，都可以提出一项提案，将所有资金发送给自己。由于他们持有大多数代币，他们总能通过自己的提案。*\n\
  > \n> *为了防止这种情况，少数人必须始终有能力取回他们那部分资金。我们的解决方案是允许一个 DAO 拆分成两个。如果某个个人或一组代币持有者不同意某项提案，并希望在提案执行前取回他们所拥有的那部分以太币，他们可以提交并批准一种特殊类型的提案，以形成一个新\
  \ DAO。对此提案投赞成票的代币持有者随后可以拆分 DAO，将他们那部分以太币转移到这个新 DAO 中，而剩下的代币持有者则只能花费他们自己的以太币。*\n\n\
  不幸的是，这种“拆分”功能的实现方式使 The DAO 因一个灾难性的重入漏洞而变得脆弱。^(⁸) 换句话说，某人可以递归地从 DAO 中拆分，无限期地提取相当于其原始\
  \ ETH 投资额的金额，而他们的提款记录从未被记录在原始 DAO 合约中。\n\n以下是 Solidity 合约文件 `DAO.sol` 中发现的漏洞：\n\n\
  ```\nfunction splitDAO(\nuint _proposalID,\naddress _newCurator\n) noEther onlyTokenholders\
  \ returns (bool _success) {\n...\n// [为说明添加] 第一步移动以太币并分配新代币\nuint fundsToBeMoved\
  \ =\n(balances[msg.sender] * p.splitData[0].splitBalance) /\np.splitData[0].totalSupply;\n\
  if (p.splitData[0].newDAO.createTokenProxy.value(fundsToBeMoved)(msg.sender) ==\
  \ false) //\n[为说明添加] 这一行在更新发起拆分账户中的资金之前进行 DAO 拆分\n...\n// 销毁 DAO 代币\nTransfer(msg.sender,\
  \ 0, balances[msg.sender]);\nwithdrawRewardFor(msg.sender); // 友好操作，获取其奖励\n// [为说明添加]\
  \ 上一行是关键，因为它是在 totalSupply 和 balances[msg.sender] 更新以反映拆分后的新余额之前调用的\ntotalSupply\
  \ -= balances[msg.sender]; // [为说明添加] 这发生在拆分之后\nbalances[msg.sender] = 0; // [为说明添加]\
  \ 这也发生在拆分之后\npaidOut[msg.sender] = 0;\nreturn true;\n}\n```\n\n\n如下所示，已将所提供的英文文本按照高级文档工程师的规范进行排版。保留了原有的标题层级和段落逻辑，将需要强调的变量名、函数名、命令等添加了反引号，并对代码块使用了正确的\
  \ Markdown 格式。\n\n---\n\n如图所示，The DAO 通过引用 `balances` 数组来确定有多少可转移的 DAO 代币。`p.splitData[0]`\
  \ 的值是提交给 DAO 的提案的一个属性，而非 DAO 的任意属性。这一点，再加上 `withdrawRewardFor` 在 `balances[]` 更新之前被调用，使得攻击者能够无限期地调用\
  \ `fundsToBeMoved`，因为其余额仍会返回原始值。\n\n进一步审视 `withdrawRewardFor()`，我们可以看到导致此漏洞的条件：\n\
  \n```\nfunction withdrawRewardFor(address _account) noEther internal returns (bool\
  \ _success) {\nif ((balanceOf(_account) * rewardAccount.accumulatedInput()) / totalSupply\
  \ < paidOut[_account])\nthrow;\nuint reward =\n(balanceOf(_account) * rewardAccount.accumulatedInput())\
  \ / totalSupply - paidOut[_account];\nif (!rewardAccount.payOut(_account, reward))\
  \ // [添加说明] 该语句易受递归攻击。我们需要深入研究。\nthrow;\npaidOut[_account] += reward;\nreturn true;\n\
  }\n```\n\n假设第一个语句评估为 false，那么标记为易受攻击的语句将执行。我们还需要再考察一步，才能理解攻击者是如何做到这一点的。当第一次调用 `withdrawRewardFor`\
  \ 时（当时攻击者拥有合法的可提取资金），第一个语句会正确评估为 false，从而导致以下代码执行：\n\n```\nfunction payOut(address\
  \ _recipient, uint _amount) returns (bool) {\nif (msg.sender != owner || msg.value\
  \ > 0 || (payOwnerOnly && _recipient != owner))\nthrow;\nif (_recipient.call.value(_amount)())\
  \ { // [添加说明] 这是致命一击\nPayOut(_recipient, _amount);\nreturn true;\n} else {\nreturn\
  \ false;\n}\n```\n\n第二个 `if` 语句中的 `PayOut()` 引用了 `\"_recipient\"` —— 即提出分拆的人。该地址包含一个函数，在代币余额更新之前，从\
  \ `withdrawRewardFor()` 内部再次调用 `splitDAO`。这创建了如下所示的调用堆栈：\n\n```\nsplitDao\nwithdrawRewardFor\n\
  payOut\nrecipient.call.value()()\nsplitDao\nwithdrawRewardFor\npayOut\nrecipient.call.value()()\n\
  ```\n\n因此，攻击者能够无限期地从 The DAO 提取资金到一个子 DAO。概括而言，攻击者实现了以下步骤：\n\n1.  分拆 DAO。\n2.  将他们的资金提取到新的\
  \ DAO。\n3.  在代码检查资金是否可用之前，递归地调用分拆 DAO 的函数。\n\n该过程在图 6-3 中进行了可视化展示。\n\n![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig3_HTML.jpg](img/430562_2_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n迭代提款的过程\n\n在图 6-3 中，我们可以直观地看到这个迭代过程。原始 DAO 用 A 表示，并在 B 中创建了一个子 DAO。然后，一个转账函数请求从原始\
  \ DAO C 中提取一些资金。最后，资金被转移到新创建的 DAO。随着每次循环创建新的 DAO，这个过程不断重复。\n\n## 争论\n\n然而，The DAO\
  \ 的投资者并非唯一对事件结果感兴趣的一方。围绕 The DAO 的热潮达到了 Buterin 在 2014 年预测的那种狂热程度。当时流通中近 5% 的 ETH\
  \ 都投资于 The DAO。这对整个以太坊生态系统产生了诸多影响，并引发了区块链短暂历史上最激烈的争论之一。\n\n争论的一方希望保护羽翼未丰的以太坊生态系统，使其免受一个持有流通中相当大比例\
  \ ETH 的恶意行为者的侵害。他们未必关心 The DAO 能否存活，但最终目标是确保以太坊作为一个声誉良好的区块链平台能够存活下去，以供未来在其上构建其他\
  \ DAO。这是 Buterin 和许多以太坊开发团队核心成员的立场。\n\n另一方则坚守去中心化和不可篡改的理念。在这个阵营（我们称之为正义阵营）的许多人眼中，区块链本质上是一个公正的系统，因为它是确定性的，任何选择使用它的人都默认同意了这一事实。从这个意义上说，DAO\
  \ 攻击者并未违反任何法律。相反，重入攻击利用了构成 The DAO 章程的软件代码，并反过来攻击了它自身。\n\n去中心化阵营认为，重写区块链以回滚攻击者将\
  \ ETH 锁定在子 DAO 中的行为，会损害区块链的完整性。按照这种思路，区块链应该是不可篡改的，并且没有任何中央权威，包括以太坊基金会。他们担心，由一小群人重写区块链的道德风险可能会为其他干预措施（如选择性审查）打开大门。\n\
  \n双方在社交媒体和新闻媒体上激烈辩论各自的立场。这一过程让软分叉和硬分叉的概念广为人知。分叉区块链——或者任何软件代码——对以太坊或 The DAO 来说并不新鲜，但它成为了正义阵营与不可篡改阵营之间争论的焦点。\n\
  \n与此同时，一群白帽黑客正夜以继日地试图黑掉黑客。白帽团队中既有支持硬分叉的成员，也有反对硬分叉的成员，但他们仍然共同努力，执行了与 6 月 17 日前发现的相同攻击手段，将被盗的\
  \ ETH 转移到新的合约中，以期将其归还给合法的所有者。^(⁹)\n\n白帽团队联系了那些在 The DAO 中进行了大量投资的人，为追踪攻击筹集资金。通过这些资金，他们能够跟随攻击者进入新的\
  \ DAO，并拥有比攻击者所能提取的资金更多的资金，从而在由此产生的 DAO 中获得多数投票权。\n\n\n## 分裂：以太坊（ETH）与以太经典（ETC）\n\
  \n7 月 30 日，超过 90%的算力表示支持分叉。DAO 的资金被返还给投资者，仿佛这个组织从未存在过。差不多可以这么说。\n\n反对硬分叉导致了以太经典（`ETC`）的出现，因为一小部分社区成员继续挖掘原始的以太坊区块链。这些不可变性原教旨主义者坚信，区块链代表了一种新的、颠覆性的治理模式。这场运动中最引人注目的成员是化名为`Arvicco`的俄罗斯开发者。在\
  \ 2016 年 7 月接受*Bitcoin Magazine*采访时，他这样描述了这场分歧：\n\n> *通过救助 DAO，以太坊基金会试图实现一个短视的目标，即“让投资者完整”和“提振对以太坊平台的信心”。但他们恰恰在反其道而行之。救助\
  \ DAO 削弱了以太坊平台三大关键长期价值主张中的两个。*^(¹⁰)\n\n尽管以太坊社区中这些发声的少数派十分顽强，但许多人并不认为这两个版本的区块链都能长期存活。主要的交易所和加密服务商增加了对`ETC`的支持，但许多人对其作为一个本质上复制以太坊功能的平台的长期前景持怀疑态度。\n\
  \n`Shapeshift.io`的创始人兼 CEO `Erik Vorhees`对`ETC`保持相关性的能力表示了怀疑，但他解释说，最终他相信这次分裂对区块链生态系统是有益的。2016\
  \ 年 11 月，他告诉*Decentralize Today*：\n\n> *尽管这造成了相当大的混乱（至今仍在持续），但我很难说这是一次失败。社区内部的分歧现在已经得到了解决，而且由于两个阵营的规模都足够庞大，我们现在有了两个以太坊，至少在一段时间内是这样。这实际上让社区变得更加和平，因为两个阵营不再争论谁对谁错，他们都可以用自己的方式“正确”，而市场将决定谁的产品实际上更好。我预计\
  \ ETH 会战胜 ETC，但我必须承认，ETC 的存活时间比我预想的要长。*\n\n在撰写本文时，`ETC`作为一个平台和社区仍在持续发展。尽管`ETC`的升值速度不及`ETH`，但`BTCC`和`Huobi`最近宣布，他们将在其交易所上架该代币。`ETC`的开发者也在加速脱离以太坊平台，发布了`Mantis`——这是第一个为`ETC`从头开始构建的客户端（与以太坊的`Mist`、`Parity`和其他客户端相对）。\n\
  \n## 未来\n\n当一项技术在万众瞩目中被大肆炒作后遭遇失败，想要恢复支撑该技术的理念的可信度是极其困难的。DAO 的未来会是什么样子？任何投资于 DAO\
  \ 代币的用户都应保持谨慎，但 DAO 的结构和治理方面已经取得了巨大的安全进步。有趣的是，`Paul Kohlhaas`还提出了 DAO 作为下一代自动化风险投资的新愿景，称之为去中心化基金管理人。根据`Kohlhaas`的说法，DAO\
  \ 代表了一类新型的金融资产管理工具，软件可以管理通常委托给传统风险投资家的基金。通过在其核心实施基于软件的管理，DAO 产生的任何利润都直接分配给代币持有者。这个新\
  \ DAO 的成员本质上是投资者，他们将获得一种新型代币，代表其持股（或权益）和收益。最终，在一个 DAO 中，成员可以指导资金如何分配，以及作为投资回报提供哪些好处。按理说，管理资金的\
  \ DAO 将按照传统的风险投资周期运作：\n\n*   第一个过渡周期涉及使用`ETH`资金进行投资。\n*   第二个周期涉及将 DAO 管理为下一代自动化风险投资。其治理模型可以为早期投资者（如天使投资联合体）提供新的决策能力。\n\
  \n我们在本书的第 12 章中讨论了人工智能（AI）主导金融投资的想法。\n\n## 总结\n\n尽管发生了 DAO 被黑事件，但以太坊的未来依然光明。随着以太经典的出现以及新开发成果的惊人速度，该平台正日益走向成熟。必须指出的是，以太坊作为一个平台并非漏洞的根源。在其初期阶段，智能合约代码必然会产生诸如这次黑客攻击的漏洞，这将促使更好的代码检查机制和安全代码编写实践的出现，从而避免此类陷阱。未来，作为分叉的结果，我们最终可能会像以前一样拥有一个统一的单一货币平台。\n\
