- "# 1. 见证梦想家\n\n焦虑或许是描述 2008 年底主导投资者和公众对金融市场态度的最佳词汇。众多经济学家认为，2008 年的金融危机是大萧条以来最严重的一次金融危机。危机前的几年，不负责任的抵押贷款泛滥，金融监管与监督出现了大规模的系统性失灵。其后果之严重，以至于威胁到了大型金融机构的生存，各国政府不得不进行干预，救助主要银行。在本章中，我们将首先概述\
  \ 2008 年的金融危机及其后果：一个让新银行系统和比特币等替代货币得以蓬勃发展的环境。然后，我们将深入探讨驱动比特币的技术栈。值得注意的是，该技术栈的各个组件并非全新，而是通过一个非常精巧的设计整合在一起，从而构建了一个新系统。最后，我们将讨论人们对区块链日益浓厚的兴趣，这是一项重大的技术突破，有可能彻底改变多个行业。Imbolo\
  \ Mbue 写了一本书（兰登书屋，2017 年），书名与本章相同，讲述了纽约的\"梦想家\"们经历金融危机以及他们的生活因此发生改变的故事。这本书记录了那些梦想建立一个更具韧性的金融体系的梦想家们。\n\
  \n## 范式转移\n\n革命往往看起来混乱，但这一次却在悄然酝酿，由一位（或一群）化名为中本聪、梦想改变金融世界的不知名人士领导。金融危机的责任可以归咎于很多方面；然而，共同点是那些用于维护整个系统完整性的基础金融和会计工具变得过于复杂，无法有效使用。信任，作为所有金融体系的终极粘合剂，在\
  \ 2008 年开始消失。自那以后，监管规则已发生改变，以防止类似情况再次发生；然而，很显然，交易对手之间的信任自动调节机制以及对其签订任何类型销售合同能力的透明度是迫切需要的。**交易对手**本质上是指金融交易中的另一方。换句话说，就是与卖方匹配的买方。在金融交易中，所涉及的众多风险之一被称为**交易对手风险**——即合同中*另一方*可能无法履行其协议义务的风险。前面提到的系统性失败现在可以从交易对手风险的角度来理解：交易中的双方都在积累巨大的交易对手风险，最终，双方都在合同条款下崩溃。想象一个涉及多方参与的类似交易场景，再想象这个场景中的每一个参与者都是一个主要金融机构、一家银行或一家保险公司，而它们又持有数百万的客户。这就是\
  \ 2008 年危机期间发生的情况。\n\n我们需要讨论的另一个问题是**双重支付**。我们将严格地再次在比特币的背景下讨论这个话题，但让我们先通过将其应用于金融危机来对这个概念有一个基本的理解。双重支付背后的原则是，已用于一笔交易的资源不能同时分配给另一笔不同的交易。这个概念对数字货币有明显的影响；然而，它也可以概括\
  \ 2008 年危机期间的核心问题。\n\n事情是这样开始的：贷款（以抵押贷款的形式）发放给了信用记录不佳、难以偿还贷款的借款人。这些高风险抵押贷款被出售给大银行的金融专家，他们通过将大量此类贷款集中在一起成组，将其打包成低风险的公共股票。当每笔贷款（抵押贷款）的风险不相关时，这种集中打包方式是可行的。大银行的专家们假设全国不同城市的房产价值会独立变化，因此打包并没有风险。事实证明这是一个巨大的错误。然后，这些打包好的抵押贷款组合被用来购买一种名为债务抵押债券（CDOs）的股票。CDOs\
  \ 被分成不同等级并出售给投资者。这些等级由金融标准机构进行评级，投资者根据这些评级购买最安全的等级。一旦美国房地产市场转向，就引发了多米诺骨牌效应，摧毁了路上的一切。尽管有评级，但\
  \ CDOs 最终变得一文不值。打包的抵押贷款组合价值暴跌，所有正在四处销售的包裹瞬间化为乌有。在这整个复杂的交易链条中，每一笔销售都增加了风险，并在多个层面引发了双重支付。最终，系统达到了均衡，却发现存在巨大的缺口，并因此在重压下崩溃。以下是\
  \ 2008 年的简要大事记。该时间线是根据 Micah Winkelspech 在 2016 年分布式健康大会上的演讲编制的：\n\n- 1 月 11 日：美国银行收购陷入困境的\
  \ Countrywide\n- 3 月 16 日：美联储迫使贝尔斯登出售\n- 9 月 15 日：雷曼兄弟申请第 11 章破产保护\n- 9 月 16 日：美联储斥资\
  \ 850 亿美元救助美国国际集团（AIG）\n\n\n\n*   9 月 25 日：`华盛顿互惠银行`倒闭\n*   9 月 29 日：金融市场崩盘，`道琼斯工业平均指数`暴跌\
  \ 777.68 点，整个体系濒临崩溃\n*   10 月 3 日：美国政府授权 7000 亿美元用于银行救助\n\n这次救助带来了巨大的经济后果，但更重要的是，它创造了一种有利于比特币蓬勃发展的环境。2008\
  \ 年 11 月，一篇白皮书（[`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)）被发布在密码学与密码政策邮件列表中，标题为“[比特币：一种点对点的电子现金系统](https://bitcoin.org/bitcoin.pdf)”，作者署名是中本聪。这篇白皮书详细描述了比特币协议，并附带了比特币早期版本的原始代码。从某种意义上说，这份白皮书是对刚刚发生的经济危机的回应，但这场技术革命还需要一段时间才能流行起来。一些开发者担心这种电子现金系统在站稳脚跟之前就会失败，而他们担忧的是可扩展性问题，如图\
  \ 1-1 所示。\n\n那么，中本聪是谁？他有什么背景？简单直接的答案是：我们不知道。事实上，假设他实际上是一个“他”也是武断的。中本聪这个名字在很大程度上是一个化名，而“他”可能是一位“她”，甚至是一个庞大的团队。一些记者和新闻媒体投入了大量时间和精力进行数字取证，以缩小候选人范围并找出真正的中本聪，但迄今为止所有的努力都徒劳无功（[`https://www.technologyreview.com/s/527051/the-man-who-really-built-bitcoin/`](https://www.technologyreview.com/s/527051/the-man-who-really-built-bitcoin/)）。在这种情况下，社区开始意识到中本聪是谁或许并不重要，因为开源的本质几乎使其无关紧要。比特币社区最受尊敬的开发者之一杰夫·加齐克这样描述道：“中本聪发布一个开源系统的目的，就是让你不必知道他是谁、信任他是谁，或关心他的知识。”开源精神的真谛在于代码本身就能说明一切，无需创建者/开发者的任何干预。\n\
  \n![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig1_HTML.jpg](img/430562_2_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n\n比特币协议的初步反响。对比特币可扩展性和现实前景的担忧\n\n## 技术栈\n\n中本聪在创建比特币协议时真正的天才之处在于解决了拜占庭将军问题。该解决方案通过借鉴密码朋克社区的组件和思想，被推广到金融交易中。我们将简要讨论其中三个想法，这些组件如何工作，以及它们如何帮助比特币协议：用于工作量证明的哈希现金，用于去中心化网络的拜占庭容错，以及用于消除对中心化信任或中央机构需求的区块链。让我们从哈希现金开始，逐一深入探讨。\n\
  \n`哈希现金`由亚当·巴克在 90 年代末设计，旨在通过首创的工作量证明算法来限制垃圾邮件。`哈希现金`背后的原理是为发送电子邮件附加一定的计算成本。垃圾邮件发送者的商业模式依赖于发送大量邮件，而每封邮件的成本极低。然而，如果每封发送的垃圾邮件都有哪怕很小的成本，那么成千上万封邮件的成本就会成倍增加，他们的生意就会变得无利可图。`哈希现金`依赖于加密哈希函数的概念——一种哈希函数（在比特币中，它是`SHA1`），它接收输入并将其转换为字符串，生成消息摘要，如图\
  \ 1-2 所示。哈希函数被设计成具有一种称为单向函数的属性，这意味着可以很容易地通过哈希函数验证潜在输入是否与摘要匹配，但从摘要反推输入是不可行的。重新创建输入的唯一可能方法是使用暴力搜索来找到合适的输入字符串。在实践中，这是`哈希现金`计算密集型元素，并已被引入比特币。这一原理已成为支撑当今比特币及大多数加密货币的工作量证明算法的基础。比特币的工作量证明更为复杂，并涉及新组件，我们将在后面的章节中详细讨论。\n\
  \n![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig2_HTML.jpg](img/430562_2_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2\n\n加密哈希函数的机制。它接收一个输入，并持续将其转换为一个输出摘要字符串\n\n接下来我们需要讨论的是拜占庭将军问题。这是一个将军群体之间的共识问题，每位将军指挥着拜占庭军队的一部分，准备攻击一座城市。这些将军需要制定进攻城市的策略，并充分相互沟通。重要的任务是每位将军必须朝着相同的行动努力，因为少数将军的软弱攻击还不如协同进攻或协同撤退。问题的关键在于，有些将军是叛徒。他们可能会投票欺骗其他将军，最终导致次优策略。让我们看一个例子：在奇数位将军的情况下，比如七位，三位支持进攻，三位支持撤退。第七位将军可能向支持撤退的将军表示同意，并向其他将军表示同意进攻，从而导致整个计划崩溃。进攻部队将无法攻占城市，因为没有内在的中央权威能够验证所有七位将军之间是否存在信任。\n\
  \n\n\n在这种场景下，若要实现拜占庭容错，所有忠诚的将军必须能够有效沟通，就作战策略达成无可争议的共识。如此一来，叛徒将军所投的误导性（错误）票就会被揭露，并且无法扰乱整个系统。在比特币协议中，中本聪实现拜占庭容错的关键创新在于创建了一个点对点网络，并配有一本能够记录和验证多数人批准的账本，从而揭露任何虚假（叛徒）交易。这本账本提供了一致的通信方式，并进一步使得整个系统无需信任。这本账本也被称为区块链。有了区块链的加持，比特币成为首个在整个网络范围内解决双重支付问题的数字货币。在本章剩余部分，我们将对该技术及支持区块链的应用程序概念进行广泛概述。\n\
  \n区块链主要是一种记录账本，它为所有相关方提供从始至终的安全且同步的交易记录。区块链能够非常快速地记录数百笔交易，并且其设计本身包含多种用于数据安全、一致性和验证的密码学措施。区块链上相似的交易被汇集到一个称为`区块`的功能单元中，然后用一个时间戳（一种加密指纹）进行封存，该时间戳将当前区块与前一个区块连接起来。这就创建了一条由时间戳连接而成、不可逆且防篡改的区块链条，方便地称之为区块链。区块链的架构使得每一笔交易都能被网络中的所有成员非常快速地验证。成员本地还存有区块链的最新副本，这使得在去中心化网络内能够达成共识。诸如不可变的记录保存和全网共识等功能可以被集成到一个技术栈中，以开发新型应用，即去中心化应用（DApps）。让我们在图\
  \ 1-3 中，在模型-视图-控制器（MVC）框架的背景下，来看一个 DApp 的原型。模型-视图-控制器框架是一种软件设计概念，它将应用程序分为三个组件：模型（包含与数据相关的逻辑）、视图（客户经常交互的\
  \ UI 组件）和控制器（在模型和视图之间进行交互的接口）。该框架常被用于设计可扩展且可伸缩的传统网络应用程序。在这里，我们想扩展一个行业标准，并用它来解释 DApp。\n\
  \n> **注意**\n> \n> 区块链的第一个区块被称为`创世区块`。这个区块的独特之处在于它不链接到任何前序区块。中本聪在这个区块中添加了一点历史信息，作为对英国当前金融环境的背景说明：“*《泰晤士报》2009\
  \ 年 1 月 3 日，财政大臣即将为银行进行第二轮纾困*。”这个区块不仅证明了在 2009 年 1 月 3 日之前不存在任何比特币，而且还为我们窥见创造者的思想提供了一点线索。\n\
  \n![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig3_HTML.jpg](img/430562_2_En_1_Fig3_HTML.jpg)\n\
  \n**图 1-3** 该图展示了一个去中心化应用的简单原型，它在最后步骤与最终用户进行交互\n\n这里的模型和控制器依赖区块链获取数据（数据完整性和安全性），并相应地更新视图以呈现给最终用户。这个原型中的秘密武器是\
  \ API，它负责从区块链中提取信息，并提供给模型和控制器。这个 API 提供了扩展业务逻辑并将其添加到区块链的机会，此外还包含一些基本操作，这些操作以区块为输入，并提供对二元问题的答案。区块链未来可能还会拥有更多功能，例如可以验证外部数据并在区块链本身上为其打上时间戳的预言机。为了更好地理解支持区块链的应用程序这一概念，我们必须欣赏能够支撑最终用户应用程序的完整服务栈；这在图\
  \ 1-4 中进行了展示。\n\n![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig4_HTML.jpg](img/430562_2_En_1_Fig4_HTML.jpg)\n\
  \n**图 1-4** 支持区块链的应用程序栈\n\n## 小结\n\n在本章中，我们开始讨论比特币的历史以及它诞生前后的金融环境。我们将在接下来的章节中继续讨论区块链以及点对点网络的具体特性，例如矿工等。\n\
  \n"
- "# 2. 淘金热：挖掘比特币\n\n挖矿是理解比特币协议功能的一个关键操作概念。它指的是对区块链的每个区块执行的一种去中心化审查过程，以达成共识，而无需一个中央权威机构来提供信任。换句话说，在参与双方互不信任的去中心化环境中，挖矿在计算上等同于同行评审。我们将在此更深入地继续讨论哈希函数，因为它涉及到挖矿和解决工作量证明函数。然后，我们将把区块目标值和网络难度的概念与挖矿结合起来，并探讨挖矿是如何发展以跟上不断增加的网络难度的。这将引导我们进一步讨论最近开发出的不同类型的硬件挖矿。本章将以分析那些开始销售专用挖矿硬件、从而引发比特币挖矿军备竞赛并最终失败的初创公司作为结尾。\n\
  \n\n\n## 达成共识\n\n挖矿是比特币协议的核心，主要有两个目的：向整个经济体注入新的比特币，以及验证交易。在本章中，我们将探讨这两个过程背后的机制。本质上，挖矿是解决我们之前讨论过的双重支付问题的恰当方案。为了消除对中央权威机构的需求，个人在自己的机器上运行比特币客户端（称为矿工），他们参与网络并验证双方之间的交易是否具有欺诈性。挖矿实际上是一项计算密集型活动，但是人们有什么动力去帮助挖掘新的比特币呢？矿工的主要动力是他们通过参与获得比特币形式的奖励。让我们通过图\
  \ 2-1 来简要了解挖矿过程。\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig1_HTML.jpg](img/430562_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1  \n挖矿过程的简化概览\n\n近期在比特币网络上发生但尚未打包的交易，会留在交易池（也称为 `mempool`，所有有效交易都在这里等待比特币网络确认）中，直到被矿工选取并打包进一个区块。矿工从交易池中选择交易，并将其打包成一个区块。区块创建完成后，它需要一个区块头才能被区块链接受。可以把它想象成邮寄包裹：包裹打包好后，需要贴上邮票才能寄出。矿工使用区块链中最新区块的区块头，为当前区块构建一个新的区块头。区块头还包含其他元素，例如时间戳、比特币客户端版本，以及与链中上一个区块对应的\
  \ ID。由此产生的区块称为候选区块，如果满足其他几个条件，它就可以被添加到区块链中。\n\n挖矿过程非常复杂，图 2-1 仅概述了矿工参与协议的宏观画面。接下来，我们将探讨“邮票”（沿用刚才的类比）的技术细节以及给包裹贴邮票的机制。请记住，挖矿是一个竞争过程。图\
  \ 2-1 只描述了一个矿工的过程，但实际上，网络中大量的矿工会同时参与进来。矿工们相互竞争，为他们创建的包裹（区块）寻找邮票，最先找到邮票的矿工获胜。矿工之间寻找邮票的竞赛大约每十分钟结束一次，接下来的十分钟又会开始新的竞赛。一旦找到邮票，矿工就可以完成该区块，并向网络公布。现在，该区块就可以被添加到区块链中了。让我们通过图\
  \ 2-2 来看看寻找邮票（更广为人知的说法是区块头）的过程。\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig2_HTML.jpg](img/430562_2_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2  \n通过解决工作量证明（PoW）生成区块头\n\n矿工创建的包裹几乎就是一个区块，只是缺少一个区块头。它被称为候选区块，只有在添加了邮票（即区块头）之后才能被添加到区块链中。它将从区块链中最新区块获取的区块头与一个\
  \ 32 位值（称为 `nonce`）结合起来。这个组合作为输入被送入哈希函数（`SHA-256`）。哈希函数计算出一个新的哈希值作为输出。然后，将这个生成的哈希值与网络的（给定时间点的）目标值进行比较。如果哈希值大于目标值，则调整\
  \ `nonce`，并将新的输入发送给哈希函数，以获取新的潜在输出。找到小于目标值的合适哈希值这一问题，是工作量证明的核心，并且只能通过暴力破解来解决。一旦矿工找到了一个小于目标值的哈希值，这个哈希就可以用于候选区块的区块头。第一个找到该哈希的矿工被认为是获胜者。获胜的矿工已经证明了她为找到该哈希所付出的工作量；因此，该区块中包含的交易现在被认为是有效的。这个区块现在可以被添加到区块链中。此外，获胜的矿工还会因解决工作量证明问题而获得奖励，奖励是特定数量的比特币。从将交易打包进区块，到找到哈希并向比特币网络公布该区块，整个过程大约每十分钟重复一次。\n\
  \n我们在图 2-2 中引入了一些新的术语；为了内容的完整性，我们来对它们进行适当的描述：\n\n*   **候选区块：** 一个不完整的区块，由矿工创建作为临时结构，用于存储来自交易池的交易。在通过解决工作量证明问题完成区块头后，它就变成了一个完整的区块。\n\
  \n*   **工作量证明（PoW）：** 发现可用于候选区块区块头的新哈希值的问题。这是一个计算密集型过程，涉及对取自最新区块的哈希值进行评估，并向其附加一个\
  \ `nonce`，然后与网络的目标值进行比较。该问题只能通过暴力破解来解决；也就是说，需要多次尝试使用（来自最新区块头的）哈希值，并且每次都需要调整 `nonce`，才能解决工作量证明问题。\n\
  \n*   **Nonce：** 一个 32 位的值，它与来自最新区块头的哈希值连接。这个值在每次尝试中不断更新和调整，直到发现一个低于目标值的新哈希。\n\n\
  *   **哈希函数：** 用于计算哈希值的函数。在比特币协议中，此函数是 `SHA-256`。\n\n*   **哈希值：** 哈希函数计算出的结果输出。\n\
  \n*   **目标值：** 一个所有比特币客户端共享的 256 位数字。它由难度决定，稍后会讨论。\n\n*   **币基交易：** 被打包进区块的第一笔交易。这是对矿工为候选区块挖掘工作量证明解决方案的奖励。\n\
  \n*   **区块头：** 区块的头部，包含许多特征，例如时间戳、工作量证明等。我们将在下一章更详细地描述区块头。\n\n> **注意：**  \n> 在了解了上述术语的定义之后，请重新审视图\
  \ 2-1 和图 2-2。之前一些抽象的概念现在会变得清晰，信息也会更好地整合起来。\n\n\n\n现在我们对挖矿原理有了更深入的理解，接下来看看**挖矿难度**和**目标值**。这两个概念类似于网络随时间调整的旋钮，所有比特币客户端都会更新以遵循最新数值。那么什么是挖矿难度？本质上，它可以定义为矿工在解决工作量证明问题时，找到低于目标值的哈希值的困难程度。难度增加意味着发现哈希并解决工作量证明所需的时间更长，这也就是挖矿时间。网络设定的理想挖矿时间约为十分钟，这意味着每十分钟会有一个新区块在网络中发布。挖矿时间取决于三个因素：目标值、网络中的矿工数量以及挖矿难度。让我们看看这些因素是如何相互关联的：\n\
  \n1.  挖矿难度的增加会导致目标值降低，以补偿挖矿时间。\n2.  加入网络的矿工数量增加会导致工作量证明的解决速度加快，从而缩短挖矿时间。为了调整这种情况，挖矿难度会增加，区块创建速率恢复正常。\n\
  3.  目标值每创建 2016 个区块重新计算和调整一次，这大约需要两周时间。\n\n正如我们所见，比特币网络中存在一种自我纠正的共性，使其具有极强的弹性。矿工是比特币网络的心脏，他们参与挖矿主要有两个动力：\n\
  \n*   区块中打包的第一笔交易称为 **coinbase 交易**。这是获胜矿工在挖出区块并在网络中宣布后获得的奖励。\n*   第二种奖励以手续费的形式出现，向网络用户收取用于发送交易。矿工因将交易打包进区块而获得这笔费用。这笔费用也可视为矿工的收入，因为随着越来越多的比特币被挖出，这笔费用将成为他们收入的重要部分。\n\
  \n现在，我们可以将这些概念以图 2-3 中另一个流程图的形式整合起来。这将有助于在难度和目标值的背景下巩固挖矿的过程。\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig3_HTML.jpg](img/430562_2_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\n\n解决工作量证明问题\n\n网络中的矿工竞相解决问题，获胜的矿工将区块广播到网络，然后该区块被纳入区块链。为了解决工作量证明，矿工必须使用递增的\
  \ `nonce` 不断生成新的哈希值（通过哈希函数），直到发现一个低于目标值的哈希值。在这种情况下，请注意 `nonce` 是唯一可调整的值。这是一个简化的工作量证明方案，其实现与现实存在细微差别。\n\
  \n> **注意**  \n> *挖矿* 这个术语源于其过程类似于稀有金属的挖掘。它非常消耗资源，并以缓慢的速度释放新货币，就像比特币协议中的矿工获得奖励一样。\n\
  \n我们讨论了比特币网络的自我纠正特性，以及它们如何使网络适应变化。接下来，我们将探讨随着比特币普及，网络中涌入大量矿工所带来的一个意外后果。这引发了一场军备竞赛，并产生了深远的影响。但首先，我们需要讨论出现的新型挖矿硬件。\n\
  \n## 挖矿硬件\n\n随着比特币开始获得更多商家的普及和接受，更多矿工加入网络以期获得奖励。矿工们在挖矿方式上开始变得更具创意，例如使用能生成更多哈希值的专业硬件。在本节中，我们将讨论随着比特币开始全球传播，挖矿硬件的演变过程。\n\
  \n*   **CPU 挖矿：** 通过比特币客户端可用的最早挖矿形式。它在比特币客户端的早期版本中成为挖矿的常态，但由于更好的选择出现，在后续更新中被移除。\n\
  *   **GPU 挖矿：** 挖矿技术的下一波进步。事实证明，使用 GPU 挖矿强大得多，因为它能生成比 CPU 多数百倍的哈希值。这现在是大多数加密货币挖矿的标准配置。\n\
  *   **FPGA 和 ASIC：** FPGA 代表现场可编程门阵列，是一种为特定用例设计的集成电路。在这种情况下，FPGA 被设计用于挖掘比特币。FPGA\
  \ 使用非常特定的硬件语言编写，使其能够在功耗和输出效率方面非常高效地执行单一任务。在 FPGA 引入后不久，一种更优化、可大规模生产且商业化的设计以 ASIC（专用集成电路）的形式出现。ASIC\
  \ 的单位成本更低，因此可以大规模生产。基于 ASIC 的设备外形也很紧凑，因此可以在单个设备中集成更多。ASIC 能够以低价位组合成阵列，这为加速挖矿效率提供了非常有说服力的理由。\n\
  *   **矿池：** 随着 ASIC 的兴起导致挖矿难度上升，矿工们意识到单独继续挖矿在经济上并不明智。挖矿耗时太长，奖励与投入的资源不匹配。因此，矿工们组织成称为矿池的团体，以整合所有成员的计算资源，作为一个整体进行挖矿。如今，加入矿池是开始挖掘几乎所有加密货币的常见方式。\n\
  *   **云挖矿服务：** 这些只是拥有专业挖矿设备的承包商。他们根据合同，以特定价格向矿工出租服务，在特定时间内进行挖矿。\n\n不难看出，在开发者和硬件爱好者意识到可以用相当低廉的价格制造自定义\
  \ ASIC 阵列后，ASIC 如何彻底改变了挖矿游戏。这标志着比特币硬件领域某种军备竞赛的开始，开发者们开始设计新的芯片，并购买新设备用于挖矿机，以便能挖到最多的比特币。这种由利润驱动的初期推动加速了比特币的普及，并为这种替代货币创造了一个黄金时代。更多的开发者和爱好者加入购买定制硬件以最大化利润的行列。随着矿工数量的增加，网络通过提高难度来应对。在很短的时间内，由于协议中存在的自我纠正特性，泡沫无法再为矿工维持，难度不断上升。在某些情况下，矿工购买的硬件甚至从工厂运达时就已经无法盈利了。需要预先投入大量资本才能获得可观的回报。如今，大多数\
  \ ASIC 硬件已成历史，甚至比特币矿池对普通矿工来说也已无利可图。那些将 ASIC 和定制硬件商业化的初创公司和企业在短时间内获得了可观的利润，然后就失败了。我们将在下一节中审视其中的一些重大失败案例。\n\
  \n\n\n## 创业故事\n\n在本节中，我们将重点介绍几个比特币\"淘金热\"时期（从 2013 年中期持续到 2014 年末）的故事。这里涵盖的初创公司遵循的策略是销售略微过时的挖矿硬件以获取利润，但有些公司则更进一步。我们要谈的第一家初创公司是**蝴蝶实验室**。这是一家来自密苏里州的公司，成立于\
  \ 2011 年末，承诺销售能够以远超竞争对手的速度挖矿的技术。据称，其专用集成电路（`ASICs`）挖矿速度比单台计算机快一千倍，并且在 2012 年首次发布后不久就开放了预售。矿工们蜂拥购买这些承诺在同年\
  \ 12 月交付的硬件。据美国联邦贸易委员会（`FTC`）报告，蝴蝶实验室通过预售筹集了约 2000 万至 3000 万美元。发货大约在 2013 年 4 月开始，但只有少数客户收到货，而大多数客户又等了一年才收到他们的挖矿设备。当客户实际收到机器时，它们已经过时了，有人指控蝴蝶实验室在交付前先使用这些硬件为自己挖矿。尽管无法完成最初的订单，蝴蝶实验室又开始提供一种新的、功能强大得多的矿机，并开启了预售。最终，该公司成为比特币社区最受憎恨的公司之一，`FTC`不得不介入并将其关闭。\n\
  \n我们要讨论的第二家公司是**CoinTerra**。这是一个更复杂的案例，因为该初创公司由一支在该领域拥有深厚专业知识的团队创立。首席执行官拉维·艾扬格此前曾是三星的\
  \ CPU 架构师，公司董事会中还有许多其他该领域的领导者。最初，他们获得了风险投资，资金充足，并于 2013 年宣布了他们的首款产品：**TerraMiner\
  \ IV**，预计同年 12 月发货。该公司未能按时发货，最终推迟了日期。矿机在 2014 年仍未到货，最终 CoinTerra 向客户道歉，并提供了一些补偿，但补偿也大幅延迟，进一步激怒了客户。该公司似乎正试图转向云挖矿服务，但他们已经失去了大部分客户群的信任。\n\
  \n我们的最后一个案例将聚焦一家名为 **HashFast** 的初创公司。与前两个例子类似，HashFast 提供了一款名为 **Baby Jet** 的矿机产品，预计\
  \ 2013 年 12 月交付。HashFast 的团队过度承诺了功能，但在挖矿难度飙升的时期却未能兑现。该公司很可能动用了早期采用者的资金来资助自身发展，当他们遇到困难时，客户要求退款。当时的问题是比特币价格持续上涨，因此公司没有足够的资金偿还客户。他们面临多起诉讼，现金储备迅速耗尽。最终，在\
  \ 2014 年 5 月，一名法官裁定允许拍卖该公司拥有的所有资产，以偿还债权人和投资者。\n\n这些公司的一个共同点是，它们常常无法在承诺的时间交付挖矿硬件，并且严重延迟或拒绝向客户退款。我们可以从这里介绍的案例以及其他同样失败的`ASIC`初创公司中，归纳出一个通用的运营模式：\n\
  \n-   以极高的价格开放预售，并虚假宣传高得离谱的哈希率和巨大的投资回报。\n-   将所有预售资金投入`ASICs`和定制硬件的研发。\n-   一旦从海外制造商处获得挖矿硬件，就在内部不间断地挖矿数月。\n\
  -   通过社交媒体向客户广播，声称制造过程比预期耗时更长。\n-   仅向那些威胁要起诉的客户交付硬件，作为发货已开始的早期证据。\n-   当`ASIC`硬件已经严重过时时，才交付给其他客户。\n\
  -   客户投诉并提起诉讼，公司最终分崩离析，面临巨额罚款。\n\n## 新的共识\n\n我们将以与本章开头相同的理念——**共识**——来结束本章。本章的核心思想是，在比特币中，挖矿用于达成共识，以防止用户双重支付并验证所有交易。然而，自比特币问世以来，其他共识算法也被开发出来。我们将比特币原始协议中用于达成共识的工作量证明算法称为**中本聪共识**。最近流行起来的一种新共识算法被称为**权益证明**，其中参与者主要扮演验证者的角色。在比特币中，持有欺诈交易的不良行为者必须面对矿工网络的严格审批和验证过程。在权益证明（`PoS`）中，参与者以货币形式在网络中拥有权益（因此得名）。因此，他们希望网络成功，信任就产生于由验证者投入最大权益币量的区块中。此外，恶意验证者会因其不当行为而被削减其权益。我们将在本书后面深入探讨`PoS`的技术细节，以及它与`PoW`机制的比较。我们的旅程在本章以共识结束，我们将在下一章继续讨论比特币网络和区块链。\n\
  \n## 总结\n\n在本章中，我们讨论了挖矿的概念，并介绍了理解矿工如何验证区块所需的技术背景。我们深入探讨了比特币挖矿的核心 —— `PoW`，并且在本书的其余部分，我们将介绍其他共识机制。然后，我们描述了比特币挖矿中为生产最佳硬件而展开的军备竞赛，这导致了难度的巨大提升，以及那个时期初创公司的失败。最后，我们以提及`PoS`结束了本章，我们将在后面的章节中再次回到这个话题。\n\
  \n\n\n"
- '# 3. 区块链的基础


  `区块链`是一种去中心化的数据结构，其内部一致性通过所有用户对网络当前状态达成的共识来维持。这是一项解决拜占庭将军问题的赋能技术（该问题描述的是在三位将军之间建立信任，以便协调进攻击败敌人；更多内容见第
  1 章），并为无需信任的交易和信息交换的应用开发开辟了全新的可能性。如果说互联网实现了点对点信息交换的民主化，那么区块链则实现了点对点价值交换的民主化。本章将从探讨比特币网络上用户之间的交易如何运作开始，这涉及对区块结构和交易结构的技术性讨论。接着，我们将深入探讨钱包和用户地址的作用。在讨论钱包之后，我们将把重点转向比特币网络中实现的简单支付验证（SPV）。通过
  SPV，我们将理解为何区块具有特殊结构，更重要的是，比特币网络如何在高速扩展中保持效率。最后，我们将通过讨论区块链中的硬分叉和软分叉来结束本章，并阐述分叉对运行比特币核心代码的商家和用户在向前兼容性方面的影响。尽管在技术发展的"寒武纪大爆发"阶段，区块链存在众多变体，但其核心原则始终如一。


  ## 交易工作流程


  比特币协议的核心目标是允许用户之间以去中心化方式通过网络进行交易。到目前为止，我们一直在讨论协议的零散片段以构建背景知识。现在，我们可以将这些概念整合到一个统一框架中，并探索区块链。挖矿的最终结果是随着网络随时间演进，区块数量不断增加。要理解两个用户（Alice
  和 Bob）之间的交易如何发生，我们首先需要了解承载交易的区块结构。简单来说，区块链是由两个主要原则约束的区块集合：


  - **内部一致性**：每个区块的运行遵循若干固有设计原则，使区块链保持内部一致性。例如，每个区块都链接到链中的前一个区块，并带有创建时间戳。区块链中的此类机制使其成为内部一致的数据结构，能够稳定记录交易。


  - **交易共识**：上一章描述的挖矿概念仅仅是验证交易的一种实现方式；还存在其他不涉及暴力哈希计算的机制。然而，在所有这些实现中，都存在一种方案，用于在网络某一个`x`时间间隔内发生的交易达成共识。我们可以通过使用`工作量证明`或其他将交易汇集后由网络参与者验证的协议，来泛化这种去中心化系统中的交易验证。


  交易本质上作为区块的一个属性——一种通过网络传播的数据结构——被承载，但这是如何发生的呢？为了更好地理解这一过程，让我们观察图 3-1 所示的更完整的区块结构。每个区块至少包含两个独特组件：包含唯一标识该区块的哈希值（称为默克尔根）的区块头，以及包含来自交易池的新交易的交易列表。请注意，每个区块的列表中包含的交易数量相同，但用户之间的具体交易内容不同。这是因为每十分钟只有一个区块能在区块链上赢得挖矿竞赛。在我们的简化模型中，区块仅有另外两个组件：在整个网络中保持一致性的区块大小，以及每个区块中交易数量的计数器。在此，我们将重点关注区块头和交易列表。


  区块头包含几个标准组件，例如之前讨论过的难度目标和`随机数`。它还包含获胜矿工运行的比特币核心代码的版本号。时间戳也是每个区块的独特特征，它明确标识网络中的某个特定区块。区块头还包含链中前一个区块的哈希值，以及标识本区块的特殊哈希值，称为默克尔根。我们将在本章后续讨论这种特殊哈希值是如何构建的。


  ### 生存证明


  最近有传言称维基解密创始人朱利安·阿桑奇已经去世。阿桑奇最近在 Reddit 上举办了一场"问我任何事"活动，并通过读取区块链上最新的区块哈希值来回应这些谣言，以此证明他还活着。该区块仅是在十分钟前创建的，因此这不可能是预先录制的，从而毫无悬念地证明了阿桑奇健在。这是区块哈希值首次在流行文化语境中发挥作用，阿桑奇称之为`生存证明`。


  ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig1_HTML.jpg](img/430562_2_En_3_Fig1_HTML.jpg)


  **图 3-1** 区块结构的简化概览


  红色文字显示每个区块中保持唯一的两个组件。我们进一步分解这两个组件如下。区块头由几个更小的部分组成，其中最特别的是默克尔根，它是唯一标识一个区块的哈希值。区块头包含前一个区块的哈希值、用于创建该特定区块的`随机数`以及网络难度，这些是我们之前讨论过的标准挖矿组件。如前所述，每个区块还包含一个交易列表。除了实际的交易之外，交易列表还包含对区块如何接受交易至关重要的几个组件。例如，锁定时间延迟规定了交易何时能被纳入区块。最后，该列表包含所有被此区块接受的交易，这些交易以一系列签名的输入和输出形式呈现，确保比特币从发送方转移到接收方。




  ### 交易列表的组成部分


  这里引入了一些新的术语和概念，我们现在就来逐一讲解。我们已经讨论过区块头、区块上的时间戳概念、默克尔根以及前一个区块的哈希值。现在我们将聚焦于交易列表的组成部分，先从延迟开始。完整的技术术语是锁定时间延迟，指的是交易可以被收录到某个区块中所需等待的时间。其精确机制涉及一个名为
  `blockheight` 的参数，该参数会随着区块链上区块的增加而递增。在交易指定的 `blockheight` 被超过之前，该交易将保持锁定状态且未经确认。


  接下来，我们需要讨论交易输入和输出的概念。这两个参数引导着交易在整个网络中的流转，并与花费能力的概念紧密相连。作为一种货币，比特币区块链上花费能力的基本单位称为未花费交易输出（`UTXO`），其价值以聪为单位。一个比特币可以进一步拆分为一亿个聪，类似于一美元可以拆分为
  100 美分。网络将整个比特币经济记录为已花费或未花费的交易。在一次交易事件中，买方所有的比特币都被用于购买某件物品，这会产生两个输出：一笔锁定给买方的已花费交易，以及剩余比特币构成的未花费交易。这些未花费交易会返还给买方，并赋予其在未来交易中的花费能力。对于最终用户而言，跟踪未花费交易已通过使用钱包实现了自动化。钱包软件会搜索区块链并收集属于特定地址的所有
  `UTXO`，从而为用户创建一个账户余额的概念。本质上，属于用户的比特币是来自多个交易事件中产生的 `UTXO` 的总和。我们稍后将讨论钱包和地址的概念。


  为了从实践角度理解 `UTXO`，我们需要讨论找零和找零地址的概念。这个想法其实非常简单——回想一下你上次用现金购买杂货的场景。你的交易有两个组成部分：你为所购物品付了钱，这部分付款被指定给了商家；同时你收到了一些找零，是付款后剩余的部分。`UTXO`
  就是你收到的找零。这笔找零会进入你拥有的一个比特币地址（称为找零地址）；请参考图 3-2 查看此过程的图形描述并跟随理解。每笔交易都被分成两部分：一部分被花费并锁定（或分配）给商家，另一部分则返还给买方。返还的部分就是未花费交易输出，可用于未来的交易。在一笔交易中，被该交易消耗的
  `UTXO` 被称为输入，而剩余或由交易新产生的 `UTXO` 被称为输出。只有交易输出（用户拥有的 `UTXO`）才能在未来的交易中被花费。图 3-2 中的例子说明了类似的情形：Bob
  想发送 1 BTC 给 Alice，但在此过程中，Bob 拥有的 10 BTC 被分成了两部分：发送给 Alice 的 1 BTC（现在已分配给她），以及以 `UTXO`
  形式返还给 Bob 的 9 BTC。这两个组成部分都被记录在区块链上，因为它们是同一笔交易的一部分，如图 3-2 所示。


  ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig2_HTML.jpg](img/430562_2_En_3_Fig2_HTML.jpg)


  **图 3-2** – 交易列表中 UTXO 的格式


  在这个示例中，Bob 想发送 1 BTC 给 Alice，该图展示了这笔交易是如何发生的。Bob 拥有的 BTC 被用作交易的输入，输出则分为两部分：一部分发送给
  Alice，金额为 1 BTC；另一部分作为找零返还给 Bob。这里需要注意，初始交易、新分配的交易以及找零都会作为输入和输出被记录在区块链上。


  现在我们对 `UTXO` 有了更好的理解，接下来谈谈交易是如何从一个用户分配给另一个用户的。这涉及到使用公私钥对来锁定和解锁交易。其过程如下：


  -   用户 Alice 发起了一笔她想发送给 Bob 的交易。

  -   Alice 使用她的私钥对交易进行签名。

  -   该交易在网络广播，任何人都可以使用 Alice 的公钥来验证该交易确实源自她。

  -   Bob 在交易经过网络验证并传播给他之后收到该交易。

  -   Bob 使用他的私钥解锁该交易。该交易是用一种脚本签名的，只有接收方才能解锁交易并将其分配给自己。


  我们提到交易的锁定和解锁机制使用了脚本，那么这个脚本是什么呢？比特币协议使用一种极简、基础且非图灵完备的编程语言来管理交易。中本聪的初衷是尽可能保持编程逻辑非常简单，并尽量使其不驻留在区块链上。每个交易都附带一个脚本，其中包含关于接收比特币的用户如何访问这些比特币的指令。本质上，发送方需要提供一个公钥（网络上的任何人都可以用它来确定交易确实源自脚本中包含的地址），以及一个签名（用于证明该交易是使用发送方的私钥签署的）。没有公私钥对的授权，用户之间的交易就无法进行。让我们完善之前开始用
  `UTXO` 构建的图景，如图 3-3 所示。


  ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig3_HTML.jpg](img/430562_2_En_3_Fig3_HTML.jpg)


  **图 3-3** – 区块链上的交易传播


  从概念上讲，将已花费交易视为锁定状态，而将网络上的未花费交易视为分散在数百个区块中的 `UTXO`，这可能会让人觉得奇怪，但这正是交易在网络中传播的方式。在我们图
  3-3 所示的例子中，Bob 首先发起了一笔发送给 Alice 的交易，1 BTC 被分配给了 Alice。他收到了 9 BTC 的找零作为未花费输出。Alice
  随后向另一用户发送了 0.5 BTC，在此过程中，她从自己的交易中收到了 0.5 BTC 的找零。请注意，第一笔交易是由发起交易的 Bob 签名的，随后 Alice
  对第二笔交易进行了签名。从某种意义上说，第一笔交易的输出成为了第二笔交易的输入，因此 Bob 的签名被保留作为第一笔交易的证明，而 Alice 的签名则充当了解锁机制。这就是交易如何在比特币网络上从源头一直追踪到最后所有者（最终地址）的方法。通过使用网络地址，网络保留了一定程度的假名性。


  现在我们已经讨论了 `UTXO`、签名、脚本以及交易是如何记录的，让我们把这些概念整合起来，回顾一下 Alice 和 Bob 之间交易的完整工作流程，如图 3-4
  所示。


  ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig4_HTML.jpg](img/430562_2_En_3_Fig4_HTML.jpg)


  **图 3-4** – 网络交易概览




  ### 比特币交易与钱包机制


  在图 3-4 中，Alice 从她的钱包发起交易，该钱包包含多个地址。每个地址都拥有一定数量的比特币余额（即与该地址关联的所有 `UTXO` 的总和），这些余额可用于创建新交易。随后，使用
  Alice 的私钥对交易进行签名，交易进入挖矿阶段，并被封装至一个候选区块中。挖矿结束后，获胜的矿工在网络中广播该区块，区块随之被添加到区块链中。交易随后传播至
  Bob，他现在可以使用自己的私钥解锁交易输出金额并加以使用。借助 `UTXO`、签名以及脚本锁定/解锁的概念，我们能够更深入地理解区块链作为去中心化账本是如何维持内部一致性的。


  在图 3-4 中，我们引入了一个新概念——钱包，它可以用来发起交易。简单来说，钱包本质上是一个**比特币地址加上用于解锁该地址的私钥**。钱包如今已成为比特币核心代码的标准组成部分，主要为用户提供三种用途：


  *   **创建交易**：用户可通过钱包的图形界面轻松创建交易。

  *   **维护余额**：钱包软件会追踪与某一地址关联的所有 `UTXO`，并向用户显示最终余额。

  *   **维护多个地址**：在钱包内，用户可以拥有多个地址，每个地址可与特定的交易相关联。


  从某种意义上说，地址是比特币网络中确立所有权的唯一方式。`UTXO` 与特定地址关联（作为账户余额），用户可以创建任意数量的地址。我们在图 3-4 中看到，Alice
  的钱包中包含三个地址，每个地址均可配合她的私钥使用。除了软件钱包之外，还有其他类型的钱包。图 3-4 中展示的是软件钱包，但其他两种钱包类型（移动钱包和冷存储物理钱包）的操作流程与此类似。


  移动钱包主要以便利性为设计目标，同时也是通往使用比特币等加密货币进行移动支付世界的大门。这些钱包通常充当完整钱包的独立但简化版本，允许用户随时随地访问余额并进行交易。这类钱包应用通常是在开源环境中设计的，因此它们也有助于将开发者和高级用户聚集到社区中。冷存储钱包则是一种更长期的比特币存储方法。曾发生过钱包软件损坏，或用户无法记住解锁钱包的密钥，从而导致其账户余额实际上变得不可用的情况。钱包密码没有直接的恢复机制。物理存储的理念是创建一个新钱包，并向该钱包上的一个新地址发送一笔交易。接下来，可以将这个新钱包进行备份并保存到如
  U 盘等物理设备上，并安全存放。一旦该交易在区块链上得到确认，你的比特币便可随时从 U 盘中安全取回。这样做可以防范任何意外情况，并将你的货币与你用于日常交易或挖矿的主钱包分离开来。一些开发者更进一步，创建了纸钱包，其中地址被编码为二维码，而该特定钱包的私钥则以另一个二维码的形式打印在纸上。


  **注意**


  如何在不自行编写脚本或代码的情况下，实际见证你的交易在比特币网络上进行？在比特币（以及大多数加密货币）中，有一种称为区块链浏览器的功能，它通常是一个网站，其上显示所有来自比特币网络的交易。你可以获取关于交易的各类详细信息，例如交易来源、金额、区块哈希以及收到的确认次数。


  ## 简单支付验证（SPV）


  到目前为止，我们已经讨论了区块的结构、交易列表、交易如何在用户之间发生，以及它们如何被记录在区块链上。区块本质上是链接在区块链上的数据结构，而交易则可以视为该数据结构的属性。更准确地说，在区块链的语境下，交易被表示为默克尔树的叶子节点。哈希值在比特币协议中被用作维护数据一致性的方法，因为哈希值非常容易验证，且几乎无法逆向还原。基于这些特性，我们可以解决区块链上一个非常棘手的技术挑战：如何验证某一特定交易是否属于某个区块？对一个包含
  *N* 个项目的列表进行检查，其效率极为低下；因此，我们无法简单地对区块链中（可能包含数百万个区块）的每一笔交易逐一检查以进行验证。这正是默克尔树提供速度和效率的关键所在。


  要直观理解默克尔树，请参考图 3-5。它由区块中的交易构建而成，以便快速访问并进行验证。让我们按照图 3-5 中的示例进行操作。在这个例子中，一个区块中收集了八笔交易，并以默克尔树的形式呈现。最底层是交易本身，通过将两笔交易进行哈希运算并得到一个输出哈希，它们被抽象到更高一层。这个哈希随后与第二个哈希结合，并再次进行哈希运算，从而抽象到更高一层。此过程重复进行，直到仅剩下两个哈希值。请注意，每一层都包含了其下一层的信息，最终，最顶层持有包含整棵树信息的哈希值。这个哈希被称为默克尔根。那么，默克尔根如何帮助查找交易呢？让我们通过图
  3-6 中的示例，来尝试从默克尔树中找到交易 6。首先，默克尔根允许我们跳过树的另一半，此时我们的搜索范围被限制在交易 5 到 8 之间。哈希值进一步引导搜索，使我们仅需三步就能抵达（找到）交易
  6。相比之下，如果遍历整棵树，进入每一层并逐一比较每笔交易来确认它是否确实是交易 6，这个过程在步骤数量和所需时间上将复杂得多；若搜索范围扩展到数百万笔交易，这将会变得异常繁重。


  ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig5_HTML.jpg](img/430562_2_En_3_Fig5_HTML.jpg)


  图 3-5 — 构建默克尔根



  在`Figure 3-5`中，最底层由交易构成，总体思路是不断将两个元素进行哈希运算，并保留下一层的部分信息。最终，我们仅剩下两个元素，它们被哈希在一起形成`Merkle`根。那么，何时搜索交易会有所帮助呢？对于刚开始使用标准`Bitcoin`钱包客户端的新用户，每个用户都必须下载整个区块链。随着时间的推移，区块链的下载量不断增加，最近已达到数千兆字节。这可能会吓到新用户，因为他们无法在区块链下载完成前使用钱包，从而可能打消其积极性。为了解决必须下载包含历史交易的臃肿区块链的问题，`Satoshi`提出了一种名为简单支付验证（`SPV`）的解决方案。`SPV`的原理是创建一个钱包客户端，只下载区块头而非整个区块链。这种新型轻量级客户端可以利用区块头中的`Merkle`根来验证特定交易是否存在于某个区块中。其精确机制要求钱包依赖`Merkle`分支，并最终定位到具体交易，这与`Figure
  3-6`中所示的示例非常相似。目前，对于`Bitcoin`，有一种名为`Electrum`的替代钱包客户端实现了`SPV`，允许新用户免去下载整个区块链的麻烦。


  ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig6_HTML.jpg](img/430562_2_En_3_Fig6_HTML.jpg)


  图 3-6：使用`Merkle`根查找交易


  在`Figure 3-6`中，根使我们能够在搜索过程中跳过一半的树，而下一层则进一步缩小搜索范围。使用`Merkle`根，我们只需三步即可找到交易，这在当前的`Bitcoin`网络上实现了极高的操作效率。到达交易
  6 的路径也被称为`Merkle`分支——它连接了根与叶节点。


  ## 区块链分叉


  这里有一个有趣的情景需要考虑：多个矿工正竞争解决工作量证明（`PoW`）并创建区块。巧合的是，两名矿工在几秒钟内相继找到了一个有效哈希，并将区块广播到网络。接下来会发生什么？这种情况被称为分叉，这是`Bitcoin`网络中完全正常的事件，尤其是在网络规模扩大并包含数千名矿工时。为了解决分叉，网络上存在一些称为共识规则的规则。平局会创建出区块链的两个版本，当下一个区块被发现时，这个平局会被打破。一些节点（`peers`）会在区块链的一个版本上工作，而其他节点则在第二个版本上工作。当下一个区块被发现时，由于包含了这个新区块，其中一条链会变得更长。这条链随即成为活跃链，所有节点将汇聚到这条新链上。这个过程如图`Figure
  3-7`所示。


  ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig7_HTML.jpg](img/430562_2_En_3_Fig7_HTML.jpg)


  图 3-7：链上的分叉


  在`Figure 3-7`所示的示例中，区块 4 被两名矿工同时发现，但当下一个区块在分支 B 上被发现时，平局得以解决。该分支随即成为活跃链，所有节点汇聚到使用分支
  B 作为新的活跃链。区块链上的普通分叉并不可怕，因为它们通常会在几分钟内解决。但软分叉和硬分叉则完全是另一回事。这些可能发生在`Bitcoin`核心代码升级时，此时未升级的节点（无法验证任何新创建的区块）与已升级并开始遵循新共识规则创建区块的节点之间会发生永久性分裂。网络上开始出现两种完全不同的区块，网络无法汇聚到单一的活跃链上，直到所有节点都升级到新规则为止。


  在这种情况下，有两种可能的结果：一种是网络中的大部分节点切换到新规则（软分叉），新规则允许沿用部分有效的旧区块。或者，第二种情况是，旧区块对新区块来说仍然无效，新区块不接收网络上的任何旧区块。这就是硬分叉，不存在向前兼容性，旧区块将不再被新区块所接受。所有矿工和节点都必须升级到新软件，以便其区块在新规则下被视为有效。硬分叉可能引发混乱，并对那些已创建依赖旧规则进行交易的处理终端和接口的用户和商家造成问题。他们必须升级后端软件，以兼容新规则，并确保新比特币的顺利接收。然而，`Bitcoin`网络近期不会进行硬分叉，因为开发者们已经开始研究这一过程的复杂性。我们在此结束对区块链分叉的讨论，但很快就会再次回到这个话题。在接下来的章节中，我们将研究在下一代`Bitcoin`协议中，硬分叉可能在哪些情况下变得必要。


  ## 总结


  在本章中，我们将挖矿的概念整合到了整个区块链网络中。我们描述了什么是区块链以及它在技术层面是如何运作的。然后，我们描述了交易的流程以及追踪未花费交易输出。我们讨论了交易是如何被组装并在区块链上传播的，以及诸如钱包和挖矿客户端等挖矿软件。之后，我们将挖矿置于一个恰当的网络环境中，展示了交易从被包含在一个区块中到被传播的过程。接着，我们讨论了`SPV`的概念以及`Merkle`哈希和根在`Bitcoin`中的重要性。我们以讨论区块链分叉及其对网络的影响结束了本章，我们将在本书后面重新讨论这个主题。



