    **Figure 11-11** Creating a new account


    There are two steps for creating an account: providing account information and
    key signing. The first step is shown in this figure, and the second step is exactly
    the same as for signing an asset. Once you have provided the account information,
    sign the account using your `HSM` key, and you should see a confirmation screen
    for the account that you just created. Now, to illustrate trading between accounts,
    we will need two accounts. So, create a second account with the alias "Team Rocket,"
    and the final result should look like Figure [11-12](#430562_2_En_11_Chapter.xhtml#Fig12).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig12_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig12_HTML.jpg)


    **Figure 11-12** Account summary


    The two accounts on our test net shown in Figure [11-12](#430562_2_En_11_Chapter.xhtml#Fig12)
    will allow us to show trading, locking, and unlocking. Now that we have two accounts,
    we can start to trade assets between them. It should be noted that in Chain Core,
    assets can only have four actions performed on them: an asset can be issued, spent,
    transferred (controlled), or removed (retired). Usually, a combination of these
    actions allows for transactions between users. We will be looking at two types
    of transactions here: one is simply issuing a new asset to an account, and the
    second one will involve trading that asset to the second account we created. Finally,
    we will end the walkthrough by looking at how these actions have evolved in the
    Ivy Playground. To begin, navigate to the `Transactions` tab and click on "New
    Transaction." This should take you to the New Transaction view, shown in Figure
    [11-13](#430562_2_En_11_Chapter.xhtml#Fig13).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig13_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig13_HTML.jpg)


    **Figure 11-13** New Transaction view


    A transaction can only be carried out in terms of one of the four actions that
    we mentioned earlier. Each action has a set of associated parameters that need
    to be given to complete a transaction. In Figure [11-13](#430562_2_En_11_Chapter.xhtml#Fig13),
    we want to issue a new asset, so we would go with "Issue." Once you click on "Issue,"
    another screen appears, asking you the parameters of the asset that you want to
    issue, as shown in Figure [11-14](#430562_2_En_11_Chapter.xhtml#Fig14).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig14_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig14_HTML.jpg)


    **Figure 11-14** Creating an asset


    The issue action in Figure [11-14](#430562_2_En_11_Chapter.xhtml#Fig14) first
    asks for the name of the asset we want to create and finally the amount that we
    want to issue. Recall that in Chain, assets can''t just be issued in a void; creation
    of a new asset is coupled with control of the asset by an account. Once an asset
    has been issued, we will assign it to the first account we created. Figure [11-15](#430562_2_En_11_Chapter.xhtml#Fig15)
    shows the control of the asset being passed to the new account.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig15_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig15_HTML.jpg)


    **Figure 11-15** Assigning an asset to an account


    Assigning an asset as shown in Figure [11-15](#430562_2_En_11_Chapter.xhtml#Fig15)
    is also referred to as *control with account* in Chain. The one hundred units
    of Silver are transferred to the first account that we created. Once the assignment
    is filled out, you can submit this transaction. It will be added to the test net,
    and the confirmation is shown in Figure [11-16](#430562_2_En_11_Chapter.xhtml#Fig16).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig16_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig16_HTML.jpg)


    **Figure 11-16** Transaction verification


    The summary in Figure [11-16](#430562_2_En_11_Chapter.xhtml#Fig16) shows one hundred
    Silver assets being issued and then assigned to Vikram''s account. Or, put differently,
    the assets were issued and then controlled by the first account we created. This
    was the simplest transaction we can do on Chain; now, let''s move to the next
    transaction involving trade between two users. This time around, we will have
    to use the *spend* action to make assets available, and *control* action to transfer
    them. Go back to the `Transactions` view from the sidebar and click on "New Transaction,"
    but this time instead of using the issue action, we will choose "spend from account,"
    as shown in Figure [11-17](#430562_2_En_11_Chapter.xhtml#Fig17).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig17_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig17_HTML.jpg)


    **Figure 11-17** Spend from account action to initiate a trade


    Now, we have to specify how much Silver we want to transfer (Figure [11-18](#430562_2_En_11_Chapter.xhtml#Fig18)).
    This first step only makes the asset available; it still needs to be claimed.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig18_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig18_HTML.jpg)


    **Figure 11-18** Making ten units of Silver available for trade from Vikram''s
    account


    Now that Silver is available, let''s switch ownership from the first account to
    the second (Figure [11-19](#430562_2_En_11_Chapter.xhtml#Fig19)).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig19_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig19_HTML.jpg)


    **Figure 11-19** Transferring ownership from one account to the second (Team Rocket,
    in this case)


    Just as with issuing assets, trading assets involves one account making assets
    available, and the second account taking control of the freed assets. To confirm
    that the transaction took place, we can go back to the `Transactions` view and
    then look at the most recent transaction; clicking on it will expand the transaction
    (Figure [11-20](#430562_2_En_11_Chapter.xhtml#Fig20)).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig20_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig20_HTML.jpg)


    **Figure 11-20** Summary of the most recent transaction


    Notice in Figure [11-20](#430562_2_En_11_Chapter.xhtml#Fig20) that ten assets
    were spent by the first account (Vikram) and ten assets were then controlled by
    the second account (Team Rocket), completing our trade.


    So far, we have discussed two actions of transactions that are key to Chain Core.
    There are a few more options available, such as retiring assets, which simply
    means taking a given amount of the asset out of circulation. This has the effect
    of increasing scarcity for the network. Now that we understand the concept of
    actions, what more can we do in Chain? Writing sophisticated scripts to manage
    and move assets in Chain becomes a little complicated. Ivy Playground was introduced
    to develop a formal scripting language around locking and unlocking assets on
    the blockchain. Developers can add conditions to a script and write more complex
    contracts to secure value and assets. The main objective of Ivy is to lock the
    value of an asset with a set of clauses that describe conditions under which the
    asset can be unlocked. The Chain team talks about how contracts are different
    in Chain as compared to other distributed computational platforms such as Ethereum:


    > *Contracts on a Chain blockchain are immutable. A contract cannot be updated,
    only spent — i.e., removed from the blockchain and replaced with one or more new
    contracts that lock the same value.*


    > *This immutable state model distinguishes our approach from that of (for example)
    Ethereum and Fabric. In Ethereum, contracts can send messages and value to each
    other and can update their own state in response to these messages.*'
