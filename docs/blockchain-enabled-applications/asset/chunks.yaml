  trans: '

    # 钱包视图与 MetaMask 设置


    钱包视图如图 5-4 所示。让我们快速浏览一下此处呈现的信息。请注意，我们做的第一个更改是切换到以太坊测试网，具体来说是 Rinkeby (5)。该测试网与
    Aragon 兼容，我们将在此处进行所有交易，而不是在以太坊主网上。当你对使用 Aragon 感到熟悉后，可以再切换回主网。(6) 显示了你当前正在使用的账户。MetaMask
    允许用户在同一个钱包中持有多个账户（地址）。因此，当前账户地址由 (7) 给出，这就是正在使用的账户。接下来是此当前账户的当前余额，由 (8) 给出。该钱包软件提供了两个基本功能
    (9)，包括将 ETH 发送到另一个地址，以及通过从交易所或我们将使用的测试水龙头直接存入的方式，将 ETH 存入钱包。最后，通过该钱包进行的所有交易历史记录显示在
    (10) 中。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig4_HTML.jpg](img/430562_2_En_5_Fig4_HTML.jpg)


    **图 5-4** – MetaMask 钱包主屏幕


    现在我们已经设置好了 MetaMask，接下来讨论如何将其与以太坊测试网上的 Aragon 进行交互。你可以通过 [`https://rinkeby.aragon.org/`](https://rinkeby.aragon.org/)
    访问 Rinkeby 测试网；这将是我们构建 DAO 的界面。该界面如图 5-5 所示，其中 (11) 确认我们位于测试网上，并允许我们切换到以太坊主网。(12)
    开始创建你的 DAO 的流程，但在此之前，让我们先链接我们的账户。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig5_HTML.jpg](img/430562_2_En_5_Fig5_HTML.jpg)


    **图 5-5** – 与以太坊测试网进行交互


    在屏幕的右上角，你会看到一个 `Connect account` 按钮；点击它将显示四个选项，如图 5-6 所示。`Frame` 是一个桌面原生的以太坊提供商，允许多个不同的钱包与
    DAO 进行交互（包括硬件钱包）。`Fortmatic` 和 `Portis` 是提供电子以太坊钱包的服务，并带有直接兑换（用法币购买以太坊）的选项。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig6_HTML.jpg](img/430562_2_En_5_Fig6_HTML.jpg)


    **图 5-6** – 将 MetaMask 账户连接到 Aragon


    一旦你点击 `MetaMask`，系统将请求权限将钱包连接到 Aragon，如图 5-7 所示。接受权限后，屏幕右侧应显示钱包地址以及绿色的 `Connected
    to Rinkeby` 文字。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig7_HTML.jpg](img/430562_2_En_5_Fig7_HTML.jpg)


    **图 5-7** – 连接 Aragon 和 MetaMask 钱包


    一旦钱包连接到 Aragon，我们需要获取一些测试 ETH 来设置一个 DAO。即使在测试网上，诸如在设置 DAO 的每一步签署合同之类的操作也需要消耗 gas
    才能执行。因此，我们可以使用一个水龙头来发送一些没有实际价值但可用于我们目的的测试 ETH。我们将要使用的水龙头每 24 小时只能发送一次 ETH，每次使用最多发送
    0.2 ETH，链接在此：[`https://testnet.help/en/ethfaucet/rinkeby`](https://testnet.help/en/ethfaucet/rinkeby)。还有更多官方水龙头可用，但这个不需要进行广泛的社交媒体验证。水龙头界面如图
    5-8 所示。你的 MetaMask 钱包地址填入 (13)，金额是可选的 (14)，因为水龙头每次只会分发最多 0.2 ETH。你可以向你的交易添加一条消息，该消息将在测试网区块链浏览器上可见。你需要选择一个使用水龙头的理由；在
    (15) 中选择任何一个显示的理由，并接受相关条件 (16)。完成后，解决验证码 (17) 并点击 `Claim` 按钮，即可将 0.2 ETH 分发到你的
    MetaMask 钱包。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig8_HTML.jpg](img/430562_2_En_5_Fig8_HTML.jpg)


    **图 5-8** – Rinkeby 测试网水龙头


    现在，水龙头已连接到钱包，并且你拥有了一些初始资金，你可以开始使用 DAO 了。你可能需要改天再访问水龙头，以获取足够的 ETH 来探索其他 DAO 功能/模板。

    '
- fmt: '### Topic 2: Setting Up the DAO


    Aragon provides a few starter templates to make DAOs for specific use cases; the
    two we will be focusing on in this chapter are the Company template and the Fundraiser
    template. These templates are open source and available on GitHub. Any developer
    can extend the templates with new parameters and create new templates better suited
    for a job.


    Once your wallet is connected to Aragon and the faucet has dispersed `0.2 ETH`
    to your wallet, you can move ahead with creating a DAO. The Aragon DAO-maker for
    the Ethereum test net is available at [`https://rinkeby.aragon.org/`](https://rinkeby.aragon.org/),
    and your starting screen should look like that in Figure [5-5](#430562_2_En_5_Chapter.xhtml#Fig5).
    Click on *Create an Organization*, and you should see the templates shown in Figure
    [5-9](#430562_2_En_5_Chapter.xhtml#Fig9); select the *Company* template (1).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig9_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Open source DAO templates available in Aragon


    Selecting the Company template brings you to the overview of the template shown
    in Figure [5-10](#430562_2_En_5_Chapter.xhtml#Fig10). The template comes with
    a set of apps installed as shown in (2), which we will review shortly. Click on
    (3) to begin the setup.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig10_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig10_HTML.jpg)


    Figure 5-10


    DAO Company template overview


    Clicking on (3) moves you forward to claim an organizational name. Aragon uses
    the Ethereum Name Service, analogous to the DNS system that refers a web address
    to your DAO. We will use the following name for our organization, as shown in
    Figure [5-11](#430562_2_En_5_Chapter.xhtml#Fig11).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig11_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Naming our DAO. Click on Configure template to move forward


    The next step is setting up the voting preferences for the DAO. These preferences
    will dictate how most decisions within the DAO are made. Let us discuss the voting
    configuration, shown in Figure [5-12](#430562_2_En_5_Chapter.xhtml#Fig12). (4)
    declares the percentage of votes that are needed within the organization for a
    given resolution to pass. We will stick to the default 50 percent. (5) sets the
    minimum percentage of votes needed for a resolution to be considered valid, in
    case a majority vote is not established. For instance, we have this parameter
    set to 15 percent. If 8 percent of the votes cast disapprove of a resolution,
    and 5 percent of the votes cast approve the resolution, this vote will fail because
    it has not reached the minimum approval number of 15 percent (in number of votes
    needed) for a resolution to be considered valid. (6) determines the duration of
    the voting period. Longer voting periods may be necessary for issues that require
    considerable deliberation.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig12_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Voting preferences for our DAO


    Now that we have voting preferences set up, next is setting up a token that will
    be treated within our DAO as equivalent to voting power, shown in Figure [5-13](#430562_2_En_5_Chapter.xhtml#Fig13).
    The voting power of a user increases if the user has a higher stake of tokens
    in the organization. We will call our token Best (7) and use the symbol BST to
    represent it (8). Initially, all the tokens will be assigned to the wallet address
    (9) from MetaMask; this assignment also makes that address the default account
    in our DAO. We will begin with minting 100 tokens for the DAO. This implies once
    the DAO is online, it will have 100 of the BST tokens. Any further minting of
    tokens will be done through a voting process (10). You can always add more token
    holders to the DAO in this initial process; other addresses can be accounts that
    you manage on the MetaMask wallet.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig13_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Token settings for our DAO


    This was all the setup required to deploy a DAO. Review the settings as shown
    in Figure [5-14](#430562_2_En_5_Chapter.xhtml#Fig14), and then we can start interacting
    with our DAO.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig14_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig14_HTML.jpg)


    Figure 5-14


    DAO setting review. Click Launch your organization to deploy the DAO


    When you click on the *Launch your organization* button, Aragon will take you
    to a new page, where you’ll be asked to sign a few transactions, each one deploying
    the apps and your DAO to the test net. These transactions are all gas costs required
    by the smart contracts that deploy your DAO. Once the signature process has been
    completed, Aragon will display a *Get started* box, which will take you to the
    homepage for your DAO, as shown in Figure [5-15](#430562_2_En_5_Chapter.xhtml#Fig15).
    The first thing to notice is the connection of your DAO to your MetaMask wallet,
    shown in (11). You can perform all the daily operations of the DAO only if you’re
    connected to the wallet. Notice that on the left-hand side of (11) is the address
    of our DAO, as captured in Figure [5-11](#430562_2_En_5_Chapter.xhtml#Fig11).
    There are two applications installed with this DAO that we will review in the
    next topic (12), and, finally, the DAO permissions that we will review later in
    the chapter (14). To that end, the common functions of a DAO are presented as
    shortcuts (13).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig15_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Homepage of the DAO


    ### Topic 3: DAO Apps and Permissions


    In this topic, we will review the DAO app, including tokens, voting, and finance.
    Then, we will dive into the system permissions and show how to add permissions
    to apps for your DAO. Let’s start with the Tokens app.'
