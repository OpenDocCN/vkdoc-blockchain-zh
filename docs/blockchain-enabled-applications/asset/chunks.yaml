  trans: '

    回顾一下，SONM 中的智能合约系统由多个相互协作的合约组成。其中第一个合约是迁移功能，它允许购买了 SONM 预售代币（`SPT`，即 Anthony 提到的预售期间发行的代币）的用户将其代币兑换为
    `SNM`（SONM 代币）并参与网络。接下来是 SONM 中用于应用部署的中心工厂合约。在当前实现中，中心工厂会创建用于向矿工支付计算资源费用的中心钱包。该工厂还会部署一个全网白名单合约，该合约作为网络中活跃中心的注册表以及每个中心内创建的钱包记录。最后，工厂部署一个支付应用，用于向矿工发放
    `SNM` 代币以酬谢其提供的服务。我们在此要讨论的最后一个智能合约是 DAO，它提供了若干管理功能来阻止恶意实体。这些功能包括：在发现欺诈行为时将中心除名（从白名单合约中）、通过暂停中心钱包来冻结资金，或在出现争议时通过法庭进行冲突解决。


    ### 买家–中心–矿工交互


    在 SONM 网络上发布请求计算资源的任务，需要在买家与执行任务的矿工之间进行大量的通信。例如，在处理开始之前，矿工、分配任务的中心和买家之间会发生多次验证交互。一旦买家通过验证，中心会将任务分配给矿工的雾计算云，并确保矿工获得服务报酬。这组交互在此被定义为买家–中心–矿工通信。这种交互可以通过图
    7-10 的两部分直观地展示。第一部分，图 7-10 (A)，解释了计算开始时矿工与中心之间的交互；图 7-10 (B) 则通过引入买家和矿工的支付流程展现了全貌。


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig10_HTML.jpg](img/430562_2_En_7_Fig10_HTML.jpg)


    图 7-10 (A)


    矿工–中心验证


    在图 7-10 (A) 中，我们看到一个中心正在向区块链广播关于活跃中心钱包以及中心所有者 IP 地址的信息。这些信息由监听代理收集，然后分发给矿工。在执行任何任务之前，矿工会经过一系列步骤来验证分配任务的中心。此过程确保该中心值得信赖，并且其中心钱包中有足够资金来支付计算费用。矿工通过一个名为“中心池列表”的全局列表来获取关于分配中心的更多信息。这个全网范围的列表包含了所有已验证和未确认的中心。为了自我验证，中心钱包会向区块链发送其地址以及过往交易历史，作为身份验证的凭证。矿工接受该凭证后，即可开始计算。必须注意的是，此验证过程的所有组件——包括中心广播、验证请求、钱包信息以及中心池列表——都使用相同的基础设施：区块链。这些请求和广播通过构建在区块链之上、基于
    Whisper 的消息总线共享给网络中的其他节点。图中蓝色虚线表示区块链上持续进行的过程，通知则通过消息总线传递。除了中心池列表，矿工还可以请求其他矿工独立验证分配中心的凭证。随着时间的推移，矿工会为网络中曾分配过任务的中心建立一个个人评分列表。该列表可用于自动化任务接受流程，并跳过对高度可信中心的验证步骤。


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig11_HTML.jpg](img/430562_2_En_7_Fig11_HTML.jpg)


    图 7-10 (B)


    买家–中心–矿工交互


    在图 7-10 (B) 中，我们看到在分配任务的中心完成初步验证后，买家会存入一笔初始押金。这笔押金是对计算成本的粗略估算，并存储在中心钱包中。矿工验证这笔押金后，买家会在区块链上签署一份协议，其中包含预估费用以及原始文件的哈希值。当中心分配计算任务时，该协议会被发送给矿工。原始文件通过种子供矿工下载。文件下载完成后，任务描述连同任何特殊参数被应用，处理过程随即开始。任务完成后，结果从雾计算云中提供，中心负责收集这些结果。随后，中心会通过另一个种子使结果可供买家下载。此时，协议已完成，中心钱包中的资金会发放给矿工，以酬谢其提供的计算资源。在未来的版本中，将加入适当的锁定机制来处理费用估算过高或过低的情况。在买家调整估算误差之前，中心不会释放结果。

