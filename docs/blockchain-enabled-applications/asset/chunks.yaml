    Now that we have a better understanding of the rep_score mechanism, let’s look
    at the complete reputation system. Figure [8-5](#430562_2_En_8_Chapter.xhtml#Fig5)
    provides a comprehensive depiction of a reputation system, as well as its consequences
    for members network-wide.


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig5_HTML.jpg](images/430562_2_En_8_Chapter/430562_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    The reputation system'
  trans: '

    # 彩色币与规则引擎


    `彩色币`与规则引擎用于管理研究人员提交的数据更新。这些更新在通过轻量级的隐私保护检查后，会被追加到区块链上。当临床数据进入公共后端后，最重要的好处或许在于，焦点可以从持有数据库的后端客户端，转向单纯开发能够读取区块链的前端客户端。数据管理将在区块链内部自动完成——我们需要的是一个能够读取元数据中遗留的标签或面包屑的机制，从而知道从外部位置提取哪些内容进行进一步处理。图
    8-3 所示的后处理单元就是一个例子。该单元包含适当的公私钥对和权限，用于读取区块链并访问外部位置。当向区块链追加数据更新的同一脚本中，还包含一段用于后处理的代码段，它告诉后处理单元如何将来自多个第三方位置的数据整合到一个本地集合中。


    之后，会使用后分析统计方法来确定所追加数据的质量，并可以自动生成一份报告，该报告会按给定时间间隔总结试验的进展情况。研究人员应提交数据更新的间隔时间，以及如何处理已提供数据的说明，都被编码在一个脚本中，并提供给后处理单元。


    ## 信誉系统


    让我们重新审视稀缺性这个概念。它对于我们构建临床试验系统至关重要；然而，引入具有到期规则的`彩色币`也让我们能够构建另一个组件：信誉系统。信誉的前提很简单，就是跟踪对到期规则的遵守情况。回想一下，我们在评估器函数中构建了一个导出功能，这里我们可以利用导出函数作为一种计数机制，来奖励那些积极发送定期更新的研究人员（或彩色币协议中的持有者地址）。在实际应用中，这个导出计数器会在定期更新建立后由铸币者添加到元数据中。由此，建立信誉就成了一项简单的任务：更高的导出计数器对应着更好的信誉。


    需要注意的是，在我们的临床试验系统中，信誉只是作为设计的一个属性而涌现出来的，但它对于可重复性有着深远的影响。高信誉表明一个机构或研究团队对质量控制的投入程度。一旦信誉机制在区块链上实现全网覆盖，它就可以被外部引用：第三方服务可以请求与特定彩色钱包关联的信誉评分。这可以简单到通过一次
    API 调用来返回某个钱包的`rep_score`。这有什么用呢？在之前的讨论中，我们提到了数据发现索引（`DDI`），现在我们希望扩展`DDI`的概念，使其从仅仅是一个数据仓库，变成一个带有`rep_score`标签的仓库。这可以为`DDI`提供另一层粒度：为与临床试验相关的、可供公众使用的数据集附加信誉评分（高或低）的标签。请记住，在此设计中，来自临床试验或更新的所有数据都存放在`DDI`仓库中；然而，`rep_score`通过彩色币交易存在于区块链的元数据中。图
    8-4 描述了每次定期更新时发生的顺序评估，以及`rep_score`中信誉的增量增加。


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig4_HTML.jpg](img/430562_2_En_8_Fig4_HTML.jpg)


    图 8-4


    `rep_score`随每次定期更新而增加的概览


    评估器函数会检查到期规则，以及持有者提交的彩色币交易是否包含元数据中对应更新的 URL。如果这两个条件都满足，则更新持有者钱包的`rep_score`。这种缓慢的增长使得信誉能够随时间逐步建立，并且`rep_score`参数可以以区块链无关的方式被外部服务引用。API
    调用可以成为将最新的`rep_score`附加到`DDI`所存储的数据库的默认方式。


    现在我们对`rep_score`机制有了更好的理解，接下来让我们看看完整的信誉系统。图 8-5 全面描绘了信誉系统及其对全网成员的影响。


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig5_HTML.jpg](img/430562_2_En_8_Fig5_HTML.jpg)


    图 8-5


    信誉系统

    '
- fmt: "Figure [8-5](#430562_2_En_8_Chapter.xhtml#Fig5) begins with the blockchain\
    \ recording colored coin transactions happening between the minter and holder\
    \ roles from the colored coin protocol. These colored coin transactions happen\
    \ each time the holder provides an update, and the minter evaluates it. After\
    \ the initial update, the minter sends a `rep_score` as a part of the returned\
    \ colored coin transaction to carry on the update process for a clinical trial.\
    \ The reputation now gets amended to the metadata with each exchange, and the\
    \ `rep_score` gets revised each time. This score can eventually become an attribute\
    \ of the holder’s wallet, and in this manner it can be referenced externally from\
    \ the blockchain. The post-processing unit becomes important after the clinical\
    \ trial has matured to generate enough updates that can be compiled in one comprehensive\
    \ overview. The purpose of this unit would be to automatically perform quality\
    \ control statistical calculations and share the updates by following instructions\
    \ in a script that was added to the blockchain in the beginning of the trial.\
    \ In a similar fashion, the post-processing unit will compile a final summary\
    \ and attach that to the institution’s page, along with all the updates shared\
    \ from the clinical trial.\n\n> **Note**  \n> It must be noted that post-processing\
    \ and data storage are all functions done off the blockchain. No calculations\
    \ or data manipulations are performed on the blockchain. We want to limit the\
    \ blockchain-executable code as much as possible to only the necessary primitives.\
    \ The only tools that interact with transactions or metadata on the blockchain\
    \ are in place to update the distributed state of a variable or parameter.\n\n\
    In the last few years, more-significant progress has been made in building reputation\
    \ systems that are specific for scientific efforts, including open publishing\
    \ and data deposition. Three such efforts are reviewed here:\n\n* **Augur** is\
    \ a prediction platform built on top of the Ethereum blockchain as an `ERC-20`\
    \ token. Augur is powered by a token of reputation called `REP` that is earned\
    \ as a reward for accurate reporting on the platform. Members of the network have\
    \ an incentive to earn reputation (`REP`) by participating in accurate reporting\
    \ on outcome of events. Over time, a record of `REP` building among users leads\
    \ to the emergence of a reliable set of users that are more likely to make accurate\
    \ predictions: a group-think model where wisdom of the crowd takes a productive\
    \ shape in predicting outcomes. Augur has four components that allow for propagation\
    \ of reputation on the network: a platform for members from the network to submit\
    \ predictions toward an outcome, a scoring mechanism to reward points for accurate\
    \ predictions, a consensus framework to gather the points into a long-term parameter\
    \ such as reputation, and, finally, a group of overseers who maintain network\
    \ security and integrity. These characteristics also make Augur suitable for a\
    \ new generation of scientific hypotheses/predictions in a decentralized market.\n\
    \n* **The Academic Endorsement System (AES)** is built on the blockchain as a\
    \ reputation system that uses Academic Endorsement Points (`AEP`), as compared\
    \ to Augur, which uses `REP`. `AEP` are awarded to scientific works that are worthy\
    \ of endorsement and public promotion. But compared to Augur, AES is more comprehensively\
    \ built for scientific publications and endeavors. The amount of `AEP` awarded\
    \ to a research item is based on `AEP` received in the past. This is a premium\
    \ awarded to researchers who have produced works that received significant endorsements.\
    \ In this manner, researchers who produce high-quality work receive more `AEP`\
    \ and are incentivized to share more quality work. The use of `AEP` as a global\
    \ reputation parameter can someday be used by journals along with more traditional\
    \ citation metrics such as `H-index`.\n\n* **PEvO (Publish and Evaluate Onchain)**\
    \ is a Steem-based decentralized social media platform where content creators\
    \ can communicate directly with authors of scientific studies. In this platform,\
    \ authors can share updates, upload new content, reply to comments, and integrate\
    \ reviews into continuous updates to the research. This creates an extension of\
    \ a published paper so it becomes a living document, and updates can be tracked\
    \ on the blockchain powering Steem. In addition, interactions on PEvO result in\
    \ a payout (in the form of tokens) to the authors. This incentivizes authors to\
    \ participate in discussions, and meaningful conversations are helpful to the\
    \ broader scientific community."
