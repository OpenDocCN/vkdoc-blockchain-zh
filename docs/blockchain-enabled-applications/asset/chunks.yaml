- fmt: '### Initial Coin Offerings


    An `ICO` is a means of crowdfunding the release of a new cryptocurrency. Generally,
    tokens for the new cryptocurrency are sold to raise money for technical development
    before the cryptocurrency is released. Unlike an initial public offering (`IPO`),
    acquisition of tokens does not grant ownership in the company developing the new
    cryptocurrency. Unlike an `IPO`, there is no (comprehensive) government regulation
    of an `ICO`.^([^(16)](#fn16))


    `ICO`s and new funding models using distributed ledger methodologies are starting
    to disrupt both public markets (`IPO`s) and private investments (venture capital).
    An article from *Coin Desk* illustrated the blockchain’s impact on venture capital
    formation. *Coin Desk* further noted, “There is proven demand and interest from
    both the entrepreneurial and investor audiences and limited regulatory guidance.
    `ICO`s could continue to gain steam as a funding mechanism.”^([^(17)](#fn17))


    “`Initial Coin Offerings` (`ICO`s) are changing the cryptocurrency markets in
    rapid and expanding ways. Additionally, the venture capital industry is trying
    to understand this new financial investment. The bitcoin community created the
    situation by a convergence of blockchain technology, new wealth, clever entrepreneurs,
    and crypto-investors who are backed by blockchain-fueled ideas,” stated *Harvard
    Business Review* writer Richard Kastelein.^([^(18)](#fn18))


    `ICO`s are dominating the overall crowdfunding charts in terms of funds raised,
    with half of the top twenty raises coming from the crypto community. The companies,
    such as Goldman Sachs, Nasdaq, and Intercontinental Exchange, the US holding company
    that owns the New York Stock Exchange, that dominate the `IPO` and listing business
    have been among the largest investors in blockchain ventures.^([^(19)](#fn19))


    An `ICO` is explained by *Coin Telegraph* as


    > *a recently emerged concept of crowdfunding projects in the cryptocurrency and
    blockchain industries. When a company releases its own cryptocurrency with a purpose
    of funding, it releases a certain number of crypto-tokens and then sells those
    tokens to its intended audience, most commonly in exchange for Bitcoins, but it
    can be fiat money as well. As a result the company gets the capital to fund the
    product development and the audience members get the crypto tokens share, plus,
    they have complete ownership of these shares.*^([^(20)](#fn20))


    A specific example of how an `ICO` is created and the steps for execution are
    seen in the `SONM` execution model. First of all, what is `SONM`? “`SONM` is a
    global operating system that is also a decentralized worldwide fog computer. It
    has the potential to include unlimited computing power (`IoE`, `IoT`). Worldwide
    computations organized using the `SONM` system can serve to complete numerous
    tasks from CGI rendering to scientific computations.”^([^(21)](#fn21))


    The defining feature of `SONM` is its decentralized open structure, where buyers
    and workers can interact with no middleman, while building a market profitable
    for them first, unlike other cloud services (e.g., Amazon, Microsoft, Google).


    Unlike widespread centralized cloud services, the `SONM` project implements a
    fog computing structure, a decentralized pool of devices, all of which are connected
    to the internet (`IoT`/`IoE`). `SONM` is implemented using the `SOSNA` architecture
    for fog computing. The specific execution steps in the `SONM` `ICO` are as follows:


    *   The `SONM` platform uses a token of the same name, `SONM` (ticker `SNM`).

    *   Total supply of `SNM` will be limited to the amount of tokens created during
    the crowdfunding period.

    *   `SNM` tokens will be used by the computing-power buyers to pay for the calculations
    using the smart-contracts-based system.

    *   `SNM` is a token issued on the Ethereum blockchain using standards of implementation
    and storage and management of tokens, including Ethereum wallet.

    *   `SONM` project crowdfunding, `ICO`, and `SNM` creation will take place using
    Ethereum smart contracts.

    *   Participants willing to support the `SONM` project development will send ether
    to a specified `ICO` Ethereum address, creating `SNM` tokens by this transaction
    at the specified `SNM/ETH` exchange rate.

    *   `ICO` participants will be able to send ether to the `SONM` crowdfunding Ethereum
    address only after the start of the crowdfunding period (specified as the Ethereum
    block number).

    *   Crowdfunding will finish when the specified end block is created or when the
    `ICO` cap is reached.

    *   `SNM` tokens sale `ICO`.

    *   `SONM` presale launched on April 15, 2017, and successfully finished in less
    than twelve hours, raising 10,000 Ethereum.

    *   Pre-`ICO` tokens will be transferred into the main token contract through
    a special safe migration function.

    *   Token allocations are completed to all parties.

    *   Transaction is complete.^([^(22)](#fn22))


    This process is demonstrated visually in Figure [12-1](#430562_2_En_12_Chapter.xhtml#Fig1).


    ![../images/430562_2_En_12_Chapter/430562_2_En_12_Fig1_HTML.jpg](images/430562_2_En_12_Chapter/430562_2_En_12_Fig1_HTML.jpg)


    Figure 12-1


    ICO process for the `SONM` token illustrated visually


    ### Digital Currency Exchanges


    Digital currency exchanges (`DCE`s) or Bitcoin exchanges are businesses that allow
    customers to trade digital currencies for other assets, such as conventional fiat
    money or different digital currencies. They can be market measures that typically
    take the bid–ask spreads as transaction commissions for their services or simply
    charge fees as a matching platform.^([^(23)](#fn23))


    Typically, `DCE`s operate outside of Western countries, avoiding regulatory oversight
    and complicating prosecutions. A US-based global Bitcoin exchange named Kracken
    is located in San Francisco. The Kracken website says Kracken is the world’s largest
    global Bitcoin exchange in Euro volume and liquidity. Poloniex is described on
    its website as a US-based digital asset exchange offering maximum security and
    advanced trading features.


    As one works with `DCE`s, and for all aspects of operating an exchange in the
    financial world, it is very important to establish identity easily and exactly.
    The future of identity management looks different with blockchain technology in
    a decentralized digital world. Digital identity networks built on the blockchain
    drive trust among businesses as a social enterprise by leveraging shared ledgers,
    smart contracts, and governance to standardize management, at the same time reducing
    the cost, risk, time, and complexity of decentralized identity management.'
  raw: '### Initial Coin Offerings


    An ICO is a means of crowdfunding the release of a new cryptocurrency. Generally,
    tokens for the new cryptocurrency are sold to raise money for technical development
    before the cryptocurrency is released. Unlike an initial public offering (IPO),
    acquisition of tokens does not grant ownership in the company developing the new
    cryptocurrency. Unlike an IPO, there is no (comprehensive) government regulation
    of an ICO.^([^(16)](#fn16))


    ICOs and new funding models using distributed ledger methodologies are starting
    to disrupt both public markets (IPOs) and private investments (venture capital).
    An article from *Coin Desk* illustrated the blockchain’s impact on venture capital
    formation. *Coin Desk* further noted, “There is proven demand and interest from
    both the entrepreneurial and investor audiences and limited regulatory guidance.
    ICOs could continue to gain steam as a funding mechanism.”^([^(17)](#fn17))


    “Initial Coin Offerings (ICOs) are changing the cryptocurrency markets in rapid
    and expanding ways. Additionally, the venture capital industry is trying to understand
    this new financial investment. The bitcoin community created the situation by
    a convergence of blockchain technology, new wealth, clever entrepreneurs, and
    crypto-investors who are backed by blockchain-fueled ideas,” stated *Harvard Business
    Review* writer Richard Kastelein.^([^(18)](#fn18))


    ICOs are dominating the overall crowdfunding charts in terms of funds raised,
    with half of the top twenty raises coming from the crypto community. The companies,
    such as Goldman Sachs, Nasdaq, and Intercontinental Exchange, the US holding company
    that owns the New York Stock Exchange, that dominate the IPO and listing business
    have been among the largest investors in blockchain ventures.^([^(19)](#fn19))


    An ICO is explained by *Coin Telegraph* as


    > *a recently emerged concept of crowdfunding projects in the cryptocurrency and
    blockchain industries. When a company releases its own cryptocurrency with a purpose
    of funding, it releases a certain number of crypto-tokens and then sells those
    tokens to its intended audience, most commonly in exchange for Bitcoins, but it
    can be fiat money as well. As a result the company gets the capital to fund the
    product development and the audience members get the crypto tokens share, plus,
    they have complete ownership of these shares.*^([^(20)](#fn20))


    A specific example of how an ICO is created and the steps for execution are seen
    in the SONM execution model. First of all, what is SONM? “SONM is a global operating
    system that is also a decentralized worldwide fog computer. It has the potential
    to include unlimited computing power (IoE, IoT). Worldwide computations organized
    using the SONM system can serve to complete numerous tasks from CGI rendering
    to scientific computations.”^([^(21)](#fn21))


    The defining feature of SONM is its decentralized open structure, where buyers
    and workers can interact with no middleman, while building a market profitable
    for them first, unlike other cloud services (e.g., Amazon, Microsoft, Google).


    Unlike widespread centralized cloud services, the SONM project implements a fog
    computing structure, a decentralized pool of devices, all of which are connected
    to the internet (IoT/IoE). SONM is implemented using the SOSNA architecture for
    fog computing. The specific execution steps in the SONM ICO are as follows:


    *   The SONM platform uses a token of the same name, SONM (ticker SNM).


    *   Total supply of SNM will be limited to the amount of tokens created during
    the crowdfunding period.


    *   SNM tokens will be used by the computing-power buyers to pay for the calculations
    using the smart-contracts-based system.


    *   SNM is a token issued on the Ethereum blockchain using standards of implementation
    and storage and management of tokens, including Ethereum wallet.


    *   SONM project crowdfunding, ICO, and SNM creation will take place using Ethereum
    smart contracts.


    *   Participants willing to support the SONM project development will send ether
    to a specified ICO Ethereum address, creating SNM tokens by this transaction at
    the specified SNM/ETH exchange rate.


    *   ICO participants will be able to send ether to the SONM crowdfunding Ethereum
    address only after the start of the crowdfunding period (specified as the Ethereum
    block number).


    *   Crowdfunding will finish when the specified end block is created or when the
    ICO cap is reached.


    *   SNM tokens sale ICO.


    *   SONM presale launched on April 15, 2017, and successfully finished in less
    than twelve hours, raising 10,000 Ethereum.


    *   Pre-ICO tokens will be transferred into the main token contract through a
    special safe migration function.


    *   Token allocations are completed to all parties.


    *   Transaction is complete.^([^(22)](#fn22))


    This process is demonstrated visually in Figure [12-1](#430562_2_En_12_Chapter.xhtml#Fig1).


    ![../images/430562_2_En_12_Chapter/430562_2_En_12_Fig1_HTML.jpg](images/430562_2_En_12_Chapter/430562_2_En_12_Fig1_HTML.jpg)


    Figure 12-1


    ICO process for the SONM token illustrated visually


    ### Digital Currency Exchanges


    Digital currency exchanges (DCEs) or Bitcoin exchanges are businesses that allow
    customers to trade digital currencies for other assets, such as conventional fiat
    money or different digital currencies. They can be market measures that typically
    take the bid–ask spreads as transaction commissions for their services or simply
    charge fees as a matching platform.^([^(23)](#fn23))


    Typically, DCEs operate outside of Western countries, avoiding regulatory oversight
    and complicating prosecutions. A US-based global Bitcoin exchange named Kracken
    is located in San Francisco. The Kracken website says Kracken is the world’s largest
    global Bitcoin exchange in Euro volume and liquidity. Poloniex is described on
    its website as a US-based digital asset exchange offering maximum security and
    advanced trading features.


    As one works with DCEs, and for all aspects of operating an exchange in the financial
    world, it is very important to establish identity easily and exactly. The future
    of identity management looks different with blockchain technology in a decentralized
    digital world. Digital identity networks built on the blockchain drive trust among
    businesses as a social enterprise by leveraging shared ledgers, smart contracts,
    and governance to standardize management, at the same time reducing the cost,
    risk, time, and complexity of decentralized identity management.'
  trans: '

    ### 首次代币发行


    `ICO`是一种为发行新加密货币进行众筹的方式。通常，在加密货币正式发行前，会出售新币的代币，以筹集技术开发资金。与首次公开募股（`IPO`）不同，购买代币并不赋予持有者在新加密货币开发公司中的所有权。与`IPO`不同的是，`ICO`不受（全面的）政府监管。^(¹⁶)


    `ICO`以及使用分布式账本技术的新型融资模式，正开始颠覆公开市场（`IPO`）和私人投资（风险投资）。《币报》的一篇文章阐述了区块链对风险资本形成的影响。《币报》进一步指出：“来自创业者和投资者群体的需求与兴趣已得到证实，但监管指导有限。`ICO`作为一种融资机制可能会继续获得发展动力。”^(¹⁷)


    “`首次代币发行`（`ICO`）正以快速且不断扩展的方式改变着加密货币市场。此外，风险投资行业正试图理解这种新的金融投资方式。比特币社区通过区块链技术、新财富、聪明的创业者以及由区块链驱动的想法所支持的投资者的结合，创造了这一局面。”《哈佛商业评论》撰稿人理查德·卡斯特莱恩表示。^(¹⁸)


    就筹集资金而言，`ICO`在整体众筹排行榜上占据主导地位，前二十名中有一半来自加密货币社区。高盛、纳斯达克以及拥有纽约证券交易所的美国控股公司洲际交易所等主导`IPO`和上市业务的公司，一直是区块链企业最大的投资者之一。^(¹⁹)


    《币电讯》将`ICO`解释为：


    > *一个最近在加密货币和区块链行业中出现的项目众筹概念。当一家公司为了融资而发行自己的加密货币时，它会发行一定数量的加密代币，然后将这些代币出售给目标受众，最常见的方式是换取比特币，但也可以是法定货币。结果，公司获得了产品开发所需的资金，而受众则获得了加密代币份额，并且他们拥有这些份额的完全所有权。*^(²⁰)


    关于`ICO`如何创建以及执行步骤的具体示例，可以在`SONM`执行模型中看到。首先，什么是`SONM`？“`SONM`是一个全球操作系统，也是一个去中心化的全球雾计算平台。它有可能包含无限的计算能力（`IoE`、`IoT`）。使用`SONM`系统组织的全球计算可以用于完成从
    CGI 渲染到科学计算等众多任务。”^(²¹)


    `SONM`的显著特征是其去中心化的开放结构，买家和工作者可以在没有中间人的情况下互动，同时首先为他们自己建立一个有利可图的市场，这与其他云服务（例如亚马逊、微软、谷歌）不同。


    与广泛使用的中心化云服务不同，`SONM`项目实现了雾计算结构，即一个去中心化的设备池，所有这些设备都连接到互联网（`IoT`/`IoE`）。`SONM`使用用于雾计算的`SOSNA`架构来实现。`SONM`
    `ICO`的具体执行步骤如下：


    *   `SONM`平台使用同名的代币`SONM`（代码`SNM`）。

    *   `SNM`的总供应量将限于众筹期间创建的代币数量。

    *   计算能力购买者将使用`SNM`代币，通过基于智能合约的系统支付计算费用。

    *   `SNM`是在以太坊区块链上发行的代币，使用了包括以太坊钱包在内的代币实施、存储和管理的标准。

    *   `SONM`项目众筹、`ICO`以及`SNM`的创建将使用以太坊智能合约进行。

    *   愿意支持`SONM`项目开发的参与者，将以太币发送到指定的`ICO`以太坊地址，通过此交易以指定的`SNM/ETH`汇率创建`SNM`代币。

    *   `ICO`参与者只能在众筹期（指定为以太坊区块编号）开始后，将以太币发送到`SONM`众筹以太坊地址。

    *   当指定的结束区块被创建，或达到`ICO`上限时，众筹将结束。

    *   `SNM`代币销售`ICO`。

    *   `SONM`预售于 2017 年 4 月 15 日启动，并在不到 12 小时内成功完成，筹集了 10,000 以太币。

    *   预`ICO`代币将通过一种特殊的安全迁移功能转移到主代币合约中。

    *   代币分配完成给所有方。

    *   交易完成。^(²²)


    该过程如图 12-1 所示。


    ![../images/430562_2_En_12_Chapter/430562_2_En_12_Fig1_HTML.jpg](img/430562_2_En_12_Fig1_HTML.jpg)


    图 12-1


    `SONM`代币的 ICO 流程示意


    ### 数字货币交易所


    数字货币交易所（`DCE`）或比特币交易所是允许客户将数字货币兑换成其他资产（如传统法定货币或其他数字货币）的企业。它们通常采取买卖价差作为服务交易佣金的市场措施，或者仅作为匹配平台收取费用。^(²³)


    通常，`DCE`在西方国家以外运营，以避免监管监督并增加起诉难度。一家名为 Kracken 的美国全球比特币交易所位于旧金山。Kracken 网站称，Kracken
    是全球最大的欧元交易量和流动性的全球比特币交易所。Poloniex 在其网站上描述为一家提供最高安全性和高级交易功能的美国数字资产交易所。


    当与`DCE`打交道时，以及在金融世界中运营交易所的各个方面，轻松准确地确立身份非常重要。在去中心化的数字世界中，使用区块链技术的身份管理的未来看起来有所不同。建立在区块链上的数字身份网络，通过利用共享账本、智能合约和治理来标准化管理，同时降低成本、风险、时间和去中心化身份管理的复杂性，从而作为社会企业促进企业间的信任。

    '
- fmt: '### Status of ICO Regulation


    Every year in the fall, *Coin Desk* releases a comprehensive report discussing
    the state of ICO regulation with a focus on legal status in six nations. Several
    points of interest are quoted by a recent report from Autonomous Next, a FinTech
    and research firm. The report considers Switzerland and Singapore to be the two
    most advanced nations for creating welcoming environments for FinTech and cryptocurrencies.
    In Switzerland, the law is that cryptocurrencies are assets rather than securities.
    The same is true for Singapore. The Singapore MAS authority does not regulate
    virtual currency transactions, but does monitor KYC and AML, the report states.


    The report singled out the United Kingdom and United States as jurisdictions with
    high activity, but a lack of legal clarity. The United States, with many regulatory
    groups and fifty states that implement rules, makes the process of regulation
    more complex. The state of Delaware has recently passed blockchain-related legislation.
    In China, tokens are considered a non-monetary digital asset. Russia has been
    welcoming of cryptocurrencies. Cryptotokens are categorized as legal financial
    instruments similar to derivatives.^([^(24)](#fn24))


    In the financial review of second quarter, 2017, Smith & Crown pointed out a significant
    problem in the legal status of token sales that is still in question. Participants
    in token sales might not enjoy the same legal status or protections as investors
    in private- and public-equity sales. Uncapped token sale raises and structures
    that allow projects to raise large sums of capital while retaining majority control
    over their token economy could exacerbate this problem by drawing attention from
    regulatory agencies. A number of countries are actively exploring new regulatory
    frameworks for token sales, and several groups, including Smith & Crown, are developing
    guidelines for best practices and self-regulation.^([^(25)](#fn25))


    The current regulation status is that the SEC in the United States issued a letter
    stating that ICOs, cryptocurrencies, and related matters are viewed by the SEC
    as securities. As stated previously, this brings some clarity to the marketplace
    on this issue. Although some will read it positively and others negatively, ultimately
    the SEC statement set in motion an entirely new understanding of the regulatory
    environment both in the United States and globally.


    *A Securities Law Framework for Blockchain Tokens* describes multiple key thoughts
    and actions for anyone that is interested in blockchain tokens. “The Framework
    focuses on US federal securities laws because these laws pose the biggest risk
    for crowd sales of blockchain tokens. In many jurisdictions, there may also be
    issues under anti-money laundering laws and general consumer protection laws,
    as well as specific laws depending on what the token actually does.” The Howey
    Test establishes the criteria for whether an investment contract is a security
    (*SEC v. Howey*).^([^(26)](#fn26))


    The framework illustrates six best practices for token sales:


    1. Publish a detailed whitepaper.

    2. For a presale, commit to a development roadmap.

    3. Use an open, public blockchain and publish all codes.

    4. Use clear, logical, and fair pricing in the token sale.

    5. Determine the percentage of tokens set aside for the development team.

    6. Avoid marketing the token as an investment.


    ### Pros and Cons of ICO Investments


    The pros and cons of investing in ICOs are illustrated by Jim Reynolds in a recent
    article titled, “Invest It In: Investment Ideas.” This list of pros and cons is
    by no means exhaustive, but it does contain many points to consider.


    **For ICO Founders: Entrepreneurs**


    - Raise capital efficiently.

    - ICOs are much cheaper than IPOs.

    - ICOs require much less documentation than IPOs.

    - Branding and marketing opportunity to get exposure for an altcoin.

    - Community building.

    - Create skin in the game with early adopters; this will make them part of the
    marketing mechanism of the project.

    - Entrepreneurs share both the risks and the benefits of their efforts with the
    investors.

    - Founders/developers have a method that can help them finance a project that
    can make the best use of their skills to the maximum possible extent.

    - Well-respected crypto-experts have a channel to cash in on the skills and credibility
    they built over the years.

    - Proof-of-stake altcoins resolve the problem of fair distribution through ICOs,
    and in PoS the coins come to fruition immediately.

    - Venture-capital funding is much more intrusive on the founder’s Vision360. An
    alternative to an ICO is borrowing, but this has many implications on the project
    cash flow that are not always possible to manage in altcoin/crypto projects.

    - Some transparency; for example, an escrow can be used to verify how the funds
    are being spent after the ICO.

    - Early investors will have more liquidity in early-stage companies.

    - Early access to a token that has the potential for capital growth.

    - Not regulated or registered with any government organization, and there are
    usually no investor protections other than what is built into the platform itself.

    - Investors can be part of a community.

    - An innovative way to deploy capital.

    - An ICO that uses existing networks, such as Stratis, Ardor, and Ethereum, is
    tapping into the network capital of an existing ecosystem.

    - Divest from main cryptocurrencies into altcoins.

    - Investors are usually the first users of the altcoin; thus, unlike holding a
    stock of a company whose products an investor never used, ironically altcoins
    can be more tangible than other investments.

    - The returns from investing in ICOs can be up to 1,000 percent, and also could
    be complete losses.

    - Diversification into other assets.

    - A high-risk, high-reward investment that is (to some extent) disconnected from
    the stock market and the economy.

    - Own an alternative asset not based on fiat currency.


    **For the Cryptocurrency Community:**


    - Altcoins will fuel the race to build Web 3.0, a decentralized web. The internet
    stack becomes fully independent from any central entity.

    - Altcoins are the cutting edge of FinTech, even if an altcoin project technology
    fails. There will be lessons learned regarding the technology and business model
    being proposed that will benefit the whole community.

    - More competition in the crypto space makes the competitors leaner, meaning the
    “invisible hand” of the market frets much faster in terms of creative destruction
    and survival of the fittest the more altcoin projects are launched.

    - Intra-altcoin competition is healthy, as it prepares the altcoins for the real
    competition, the crypto-based decentralized projects versus traditional firms.

    - There are two schools of thought: Bitcoin maximalists who consider Bitcoin as
    the one and only true cryptocurrency and altcoins as experiments. Others think
    the altcoins will eventually replace Bitcoin, just like the video was replaced
    by the CD, Myspace by Facebook, and old cameras by digital ones.


    The following are the risks of investing in ICOs:


    - Scammers take advantage of an unregulated industry.

    - Amateurs can use ICOs to launch projects that are doomed to fail.

    - Longer project delivery timelines increase the risk of competitive products
    being launched while the ICO to build your own product is not finished.'
