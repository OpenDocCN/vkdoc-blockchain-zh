    Markdown 格式。


    ---


    如图所示，The DAO 通过引用 `balances` 数组来确定有多少可转移的 DAO 代币。`p.splitData[0]` 的值是提交给 DAO 的提案的一个属性，而非
    DAO 的任意属性。这一点，再加上 `withdrawRewardFor` 在 `balances[]` 更新之前被调用，使得攻击者能够无限期地调用 `fundsToBeMoved`，因为其余额仍会返回原始值。


    进一步审视 `withdrawRewardFor()`，我们可以看到导致此漏洞的条件：


    ```

    function withdrawRewardFor(address _account) noEther internal returns (bool _success)
    {

    if ((balanceOf(_account) * rewardAccount.accumulatedInput()) / totalSupply < paidOut[_account])

    throw;

    uint reward =

    (balanceOf(_account) * rewardAccount.accumulatedInput()) / totalSupply - paidOut[_account];

    if (!rewardAccount.payOut(_account, reward)) // [添加说明] 该语句易受递归攻击。我们需要深入研究。

    throw;

    paidOut[_account] += reward;

    return true;

    }

    ```


    假设第一个语句评估为 false，那么标记为易受攻击的语句将执行。我们还需要再考察一步，才能理解攻击者是如何做到这一点的。当第一次调用 `withdrawRewardFor`
    时（当时攻击者拥有合法的可提取资金），第一个语句会正确评估为 false，从而导致以下代码执行：


    ```

    function payOut(address _recipient, uint _amount) returns (bool) {

    if (msg.sender != owner || msg.value > 0 || (payOwnerOnly && _recipient != owner))

    throw;

    if (_recipient.call.value(_amount)()) { // [添加说明] 这是致命一击

    PayOut(_recipient, _amount);

    return true;

    } else {

    return false;

    }

    ```


    第二个 `if` 语句中的 `PayOut()` 引用了 `"_recipient"` —— 即提出分拆的人。该地址包含一个函数，在代币余额更新之前，从 `withdrawRewardFor()`
    内部再次调用 `splitDAO`。这创建了如下所示的调用堆栈：


    ```

    splitDao

    withdrawRewardFor

    payOut

    recipient.call.value()()

    splitDao

    withdrawRewardFor

    payOut

    recipient.call.value()()

    ```


    因此，攻击者能够无限期地从 The DAO 提取资金到一个子 DAO。概括而言，攻击者实现了以下步骤：


    1.  分拆 DAO。

    2.  将他们的资金提取到新的 DAO。

    3.  在代码检查资金是否可用之前，递归地调用分拆 DAO 的函数。


    该过程在图 6-3 中进行了可视化展示。


    ![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig3_HTML.jpg](img/430562_2_En_6_Fig3_HTML.jpg)


    图 6-3


    迭代提款的过程


    在图 6-3 中，我们可以直观地看到这个迭代过程。原始 DAO 用 A 表示，并在 B 中创建了一个子 DAO。然后，一个转账函数请求从原始 DAO C 中提取一些资金。最后，资金被转移到新创建的
    DAO。随着每次循环创建新的 DAO，这个过程不断重复。


    ## 争论


    然而，The DAO 的投资者并非唯一对事件结果感兴趣的一方。围绕 The DAO 的热潮达到了 Buterin 在 2014 年预测的那种狂热程度。当时流通中近
    5% 的 ETH 都投资于 The DAO。这对整个以太坊生态系统产生了诸多影响，并引发了区块链短暂历史上最激烈的争论之一。


    争论的一方希望保护羽翼未丰的以太坊生态系统，使其免受一个持有流通中相当大比例 ETH 的恶意行为者的侵害。他们未必关心 The DAO 能否存活，但最终目标是确保以太坊作为一个声誉良好的区块链平台能够存活下去，以供未来在其上构建其他
    DAO。这是 Buterin 和许多以太坊开发团队核心成员的立场。


    另一方则坚守去中心化和不可篡改的理念。在这个阵营（我们称之为正义阵营）的许多人眼中，区块链本质上是一个公正的系统，因为它是确定性的，任何选择使用它的人都默认同意了这一事实。从这个意义上说，DAO
    攻击者并未违反任何法律。相反，重入攻击利用了构成 The DAO 章程的软件代码，并反过来攻击了它自身。


    去中心化阵营认为，重写区块链以回滚攻击者将 ETH 锁定在子 DAO 中的行为，会损害区块链的完整性。按照这种思路，区块链应该是不可篡改的，并且没有任何中央权威，包括以太坊基金会。他们担心，由一小群人重写区块链的道德风险可能会为其他干预措施（如选择性审查）打开大门。


    双方在社交媒体和新闻媒体上激烈辩论各自的立场。这一过程让软分叉和硬分叉的概念广为人知。分叉区块链——或者任何软件代码——对以太坊或 The DAO 来说并不新鲜，但它成为了正义阵营与不可篡改阵营之间争论的焦点。


    与此同时，一群白帽黑客正夜以继日地试图黑掉黑客。白帽团队中既有支持硬分叉的成员，也有反对硬分叉的成员，但他们仍然共同努力，执行了与 6 月 17 日前发现的相同攻击手段，将被盗的
    ETH 转移到新的合约中，以期将其归还给合法的所有者。^(⁹)


    白帽团队联系了那些在 The DAO 中进行了大量投资的人，为追踪攻击筹集资金。通过这些资金，他们能够跟随攻击者进入新的 DAO，并拥有比攻击者所能提取的资金更多的资金，从而在由此产生的
    DAO 中获得多数投票权。'
- fmt: '## The Split: ETH and ETC


    On July 30, over 90 percent of the hashrate signaled its support for the fork.
    The DAO funds were returned to investors as though the organization had never
    existed. Sort of.


    Opposition to the hard fork led to the emergence of Ethereum Classic (`ETC`),
    as a small portion of the community continued to mine the original Ethereum blockchain.
    These immutability fundamentalists were committed to the idea that blockchains
    represented a new, disruptive governance model. The most visible member of the
    movement was `Arvicco`, a Russian developer using a pseudonym. In a July 2016
    interview with *Bitcoin Magazine*, he characterized the disagreement in this way:


    > *By bailing out the DAO, the Ethereum Foundation is attempting to reach a shortsighted
    goal of “making investors whole” and “boosting confidence in Ethereum platform.”
    But they’re doing quite the opposite. Bailing out the DAO undermines two of the
    three key longterm value propositions of the Ethereum platform.*^([^(10)](#fn10))


    Despite the tenacity of this vocal minority in the Ethereum community, many people
    did not expect both versions of the blockchain to survive long term. Major exchanges
    and cryptoservices added support for `ETC`, but many were skeptical of the long-term
    prospects of a platform that essentially duplicated Ethereum’s capabilities.


    `Erik Vorhees`, founder and CEO of `Shapeshift.io`, expressed skepticism about
    `ETC`’s ability to remain relevant, but explained that, ultimately, he believed
    that the split was good for the blockchain ecosystem. In November 2016 he told
    *Decentralize Today*:


    > *While this caused quite a bit of turmoil (still ongoing), it’s hard for me
    to say it was a failure. A division within the community has now been resolved,
    and since both camps were significant enough in size, we now have two Ethereums,
    for a while at least. It has actually made the community more peaceful, because
    instead of the two camps arguing over who is right, both of them can be “right”
    in their own way, and the market will decide whose product is actually better.
    I expect ETH to win out over ETC, but I have to admit ETC has survived longer
    than I thought.*


    At the time of this writing, `ETC` continues to grow as a platform and as a community.
    Despite `ETC` appreciating less rapidly than `ETH`, `BTCC` and `Huobi` recently
    announced that they would be adding the token to their exchanges. `ETC` developers
    have also accelerated their departure from Ethereum as a platform, with the release
    of `Mantis`, the first client built from scratch for `ETC` (as opposed to Ethereum’s
    `Mist`, `Parity`, and other clients).


    ## The Future


    When a technology fails after being hyped in a massive spotlight, it is incredibly
    difficult to recover the credibility of the ideas powering that technology. What
    does the future of DAOs look like? Any user investing in a DAO token should be
    cautious, but there have been massive security advances to a DAO’s structure and
    governance. Interestingly, `Paul Kohlhaas` also presented a new outlook of DAOs
    as the next generation of automated VCs called Decentralized Fund Managers. According
    to `Kohlhaas`, DAOs represent a new class of financial asset management tools
    where a software can manage a fund that would normally be entrusted to traditional
    venture capitalists. By implementing software-based management at its core, any
    profits made by a DAO are distributed directly to the token holders. The members
    of this new DAO are essentially investors, and they would be issued a new class
    of tokens that represent their holdings (or stake) and earnings. Ultimately, in
    a DAO, the members can guide how the funds are being allocated and what benefits
    are offered in return for investment. It would stand to reason that a DAO managing
    funds would operate in traditional VC cycles:


    * The transition first cycle involves investing using the `ETH` funds.

    * The second cycle involves the management of a DAO into a next-generation automated
    VC. The governance model can provide for new decision-making abilities for early
    investors such as angel syndicates.


    We discuss the idea of artificial intelligence (AI) leading financial investments
    in Chapter [12](#430562_2_En_12_Chapter.xhtml) of the book.


    ## Summary


    The future of Ethereum is bright despite the DAO hack. With the emergence of Ethereum
    Classic and the incredible rate of new developments, the platform is pushing closer
    to maturity. It must be noted that Ethereum as a platform was not the cause of
    the vulnerability. In its nascent state, smart-contract code is bound to cause
    bugs such as this hack, which will result in better code-checking mechanisms and
    secure code-writing practices that can avoid such pitfalls. In the future, as
    a result of forks, we might end up with a consolidated single-currency platform
    just like before.


