- fmt: "> *大多数当前的智能合约方法提供了编写在区块链上执行任意逻辑的程序的自由，但使得提供 Ivy 旨在提供的安全保障几乎不可能。虽然其他平台的目标是让构建任何东西都变得容易，但\
    \ Ivy 的目标是让构建错误的东西变得困难。*\n\n**注意**\n\n像 Ivy 这样的编程环境将允许开发者编写代码，这些代码继承了内置于数据结构中的资产管理的安全性和保障性。这使得开发者在管理整个应用程序中的资产时，无需担心引入新的安全漏洞。\n\
    \n至此，我们完成了 Chain Core 和 Ivy 的演练。我们重点介绍了如何创建 HSM 密钥、如何创建新账户，以及 Chain 中可用的不同交易模式。最后，我们讨论了使用\
    \ Ivy 管理资产和编写脚本。尽管 Chain Core 不再开发，但其资产管理和围绕资产的安全编码实践将作为脚本语言的一项特性被区块链 3.0 范式所采用。让我们继续本章最后一项技术的旅程：企业以太坊。\n\
    \n## 企业以太坊\n\n在最近的 DAO 攻击事件（我们在第 [6](#430562_2_En_6_Chapter.xhtml) 章中讨论过）之后，包括摩根大通（JPM）、微软和埃森哲在内的几家公司组成了一个名为企业以太坊联盟（EEA）的联盟，旨在打造能够处理高容量交易和业务应用的企业级以太坊区块链。摩根大通投入了大量开发资源，为\
    \ EEA 提供了 `Quorum`：一个企业级的以太坊许可版本。自 `Quorum` 发布以来，更多具有共同企业利益的同行业公司创建了新的联盟，例如专注于企业区块链部署的\
    \ R3。我们将从深入讨论功能丰富的企业级以太坊区块链 `Quorum` 开始本节内容，并回顾其白皮书。然后，我们将深入探讨零知识证明技术 `zk-SNARKs`。最后，我们将讨论另一个类似于\
    \ EEA 的联盟模型 R3 和 `Corda`。尽管 EEA 始于 `Quorum`，但该项目已扩展其范围，以囊括企业范式的新目标。2020 年，EEA\
    \ 项目旨在为在企业中创建隐私、许可账本、可插拔共识和模块化组件的可用性标准方面发挥关键作用。EEA 未来有四个基本组成部分：\n\n*   为企业和以太坊应用程序创建一个开源标准，而不是一个单一产品。\n\
    *   满足企业级部署的需求并进行建模。\n*   与技术栈与公共以太坊同步。\n*   尽可能使用现有标准并加以改进。\n\n**注意**\n\n什么是许可账本？许可区块链限制了可以作为区块生产者或矿工的参与方，从而最终限制了谁可以为全局状态的共识做出贡献。在金融领域，这种验证对于规模化产品以满足大众需求可能变得必要。\n\
    \n### Quorum 技术栈\n\n`Quorum` 在 GitHub 上的开发页面列出了以下相较于以太坊的改进特性：\n\n*   **隐私：** 使\
    \ `Quorum` 适用于企业工作的一个关键创新是通过私有交易和私有合约引入隐私。这是通过 `Constellation` 实现的，`Constellation`\
    \ 是一个点对点消息传递守护进程，可以指导私有信息流向适当的网络参与者。\n*   **替代性共识：** `Quorum` 不依赖 POW/POS 来实现许可账本；相反，有两种更适合企业级区块链的共识机制：\n\
    \    *   **`QuorumChain`：** 一种基于智能合约的新模型，依靠节点投票达成共识\n    *   **基于 Raft 的共识：**\
    \ 一种适用于封闭成员联盟环境的共识模型，具有极快的区块生成时间\n*   **节点许可：** `Quorum` 中的一项功能，只允许与持有适当识别密钥并已注册参与许可网络的节点建立连接。\n\
    *   **更高性能：** `Quorum` 必须提供比以太坊显著更高的性能，才能在像支持银行级交易量所需的高容量环境中使用。\n\n当我们深入探讨 `Quorum`\
    \ 的特性时，我们将首先讨论 `Quorum` 中两种共识机制背后的关键概念。然后，我们将介绍对节点进行了哪些修改使其能够处理私有交易。最后，我们将讨论 `Constellation`\
    \ 以及它如何在许可网络中促进数据传输。在技术讨论之后，我们将总结 `Quorum` 白皮书中关于 `Quorum` 特性和私有交易的内容。让我们从共识机制开始：\n\
    \n*   **`QuorumChain`：** 一种多数投票共识机制，由智能合约决定哪些参与方（节点）可以投票接受或拒绝区块。 `Quorum` 上的参与节点可以是实际构建区块的`制造者`节点，也可以是对区块有效性进行投票的`投票者`节点。\
    \ `QuorumChain` 使用以太坊的签名验证方法（如 `ecrecover`）来验证从`制造者`节点和`投票者`节点收到的投票。一旦 `投票者`节点的投票达到阈值，该区块就被接受进入网络。\n\
    *   **基于 Raft 的共识：** Raft 系统中工作的基本单元是日志条目。日志是一个有序的事件序列，如果网络中的所有成员都对条目及其顺序达成一致，则认为日志是一致的。在\
    \ Raft 中，一个节点可以是领导者或追随者，所有节点最初都是追随者。最终，通过一个对等选举过程，一个节点成为领导者。与之相比，在以太坊中，任何节点都可以挖出一个新区块或成为该特定轮的领导者。在\
    \ Raft 中，只有领导者才能在真正意义上“锻造”一个区块，但领导者不需要提供任何工作量证明。相反，领导者提出一个区块，由追随者投票，一旦获得法定人数（多数票）的投票，它就会被接受为扩展区块链的下一个区块。追随者还会向领导者发送确认，现在该区块被提交到日志条目。一旦领导者收到确认，它会通知每个节点这个新条目（区块）已提交到日志。\n\
    \n现在我们已经讨论了共识，让我们看看是什么让节点接受私有交易。在以太坊中，所有交易都是公开的，并且默认情况下，节点只接受公开广播的交易。要使 `Quorum`\
    \ 工作，必须进行以下更改：\n\n*   POW 共识算法已被基于投票的 `QuorumChain` 所取代。最终目标是让多个共识算法以“可插拔共识”的模式在区块链上运行。"
  raw: "> *Most current smart contract approaches provide the freedom to write programs\
    \ that execute arbitrary logic on a blockchain, but make it essentially impossible\
    \ to provide the kind of safety assurances that Ivy is designed to give. While\
    \ other platforms have the goal of making it easy to build anything, Ivy’s goal\
    \ is to make it difficult to build anything wrong.*\n\nNote\n\nA programming environment\
    \ like Ivy would allow developers to write code that inherits the security and\
    \ safety of asset management built into the data structures. This allows developers\
    \ to code without worrying about introducing new security vulnerabilities while\
    \ managing assets in the overall application.\n\nThis concludes our walkthrough\
    \ of Chain Core and Ivy. We focused on how to create an HSM key, how to create\
    \ new accounts, and the different modes of transactions available in Chain. Finally,\
    \ we talked about managing assets and scripting using Ivy. Even though Chain Core\
    \ is not under development, the asset management design and secure coding around\
    \ assets will be adopted as a feature of scripting languages by the Blockchain\
    \ 3.0 paradigm. Let’s continue our journey with the final technology in this chapter:\
    \ Enterprise Ethereum.\n\n## Enterprise Ethereum\n\nAfter the recent DAO hack\
    \ (which we covered in Chapter [6](#430562_2_En_6_Chapter.xhtml)), a few corporations\
    \ such as JPMorgan (JPM), Microsoft, and Accenture formed a consortium called\
    \ Enterprise Ethereum Alliance (EEA) to make an enterprise-class Ethereum blockchain\
    \ capable of handling high-volume transactions and business applications. JPMorgan\
    \ has contributed massive development resources in providing the EEA with Quorum:\
    \ an enterprise-grade permissioned version of Ethereum. Since the launch of Quorum,\
    \ more companies in the same vertical with common enterprise interests have created\
    \ new consortiums such as R3 focusing on enterprise blockchain deployments. We\
    \ will begin this section with an in-depth discussion of Quorum, a feature-rich\
    \ enterprise Ethereum blockchain, and review the whitepaper. Then, we will dive\
    \ into zk-Snarks, a zero-knowledge proof technology. Finally, we will talk about\
    \ R3 and Corda, another consortium model similar to EEA. Even though EEA started\
    \ with Quorum, the project has expanded its scope to encapsulate new goals for\
    \ the enterprise paradigm. In 2020, the EEA project aims to play a crucial role\
    \ in creating standards for privacy, permissioned ledger, pluggable consensus,\
    \ and usability of modular components in enterprise. There are four fundamental\
    \ components of EEA moving forward:\n\n*   Create an open-source standard for\
    \ enterprise Ethereum applications and companies to follow, not a single product.\n\
    \n*   Address and model the requirements of enterprise-sized deployments.\n\n\
    *   Sync the technology stack with public Ethereum.\n\n*   Use existing standards\
    \ where possible and improve on them.\n\nNote\n\nWhat is a permissioned ledger?\
    \ A permissioned blockchain restricts the parties that can be block producers\
    \ or miners, ultimately limiting who can contribute to consensus of the global\
    \ state. In the financial world, this kind of verification may become necessary\
    \ to scale a product for the masses.\n\n### Quorum Tech Stack\n\nQuorum’s dev\
    \ page on GitHub lists the following features that are an improvement over Ethereum:\n\
    \n*   **Privacy:** A key innovation to make Quorum suitable for enterprise work\
    \ is the introduction of privacy through private transactions and private contracts.\
    \ This is accomplished using Constellation, a peer-to-peer messaging daemon that\
    \ can direct the flow of private information to the appropriate network participants.\n\
    \n*   **Alternative consensus:** Quorum does not rely on POW/POS for the permissioned\
    \ ledger; instead, there are two consensus mechanisms better suited for enterprise-grade\
    \ blockchains:\n    *   **QuorumChain:** A new smart-contract-based model that\
    \ relies on voting by nodes to achieve consensus\n\n*   **Raft-based Consensus:**\
    \ A consensus model suitable for closed-membership consortium settings, with very\
    \ fast block-generation times\n\n*   **Node Permissioning:** A feature in Quorum\
    \ that only allows connections to and from nodes that hold the appropriate identification\
    \ keys and have been registered to participate in the permissioned network\n\n\
    *   **Higher Performance:** Quorum has to offer significantly higher performance\
    \ than Ethereum to be used in a high-volume environment such as the one required\
    \ to power bank-level transaction volume.\n\nAs we dive into the features of Quorum,\
    \ we will begin by talking about the key concepts behind the two consensus mechanisms\
    \ available in Quorum. Then, we will cover what modifications have made nodes\
    \ capable of handling private transactions. Finally, we will talk about Constellation\
    \ and how it works to facilitate the transfer of data in the permissioned network.\
    \ A summary of Quorum’s features and private transactions from the Quorum whitepaper\
    \ will follow our technical discussion. Let’s begin with the consensus mechanisms:\n\
    \n*   **QuorumChain** **:** A majority-voting consensus mechanism where a smart\
    \ contract dictates which parties (nodes) can vote toward accepting or rejecting\
    \ a block. The participating nodes on Quorum can either be maker nodes that actually\
    \ construct a block or voter nodes that vote on the validity of a block. QuorumChain\
    \ uses a signature-verification method from Ethereum such as `ecrecover` to validate\
    \ the votes received from maker nodes and voter nodes. Once the votes from voter\
    \ nodes have reached a threshold, the block is accepted into the network.\n\n\
    *   **Raft-based consensus** **:** The fundamental unit of work in a Raft-based\
    \ system is a log entry. A log is an ordered sequence of events and is considered\
    \ consistent if all members of the network agree on the entries and their order.\
    \ In Raft, a node can either be a leader or a follower and all nodes start out\
    \ as followers. Eventually, through a peer-election process, one node emerges\
    \ as the leader. Compare that to Ethereum, where any node can mine a new block\
    \ or become the leader for that particular round. In Raft, only the leader can\
    \ “forge” a block in the true sense, but the leader doesn’t need to present any\
    \ proof of work. Instead, the leader proposes a block, which the followers vote\
    \ on, and once it receives a quorum (majority vote) of votes, it is accepted as\
    \ the next block to extend the blockchain. The followers also send an acknowledgment\
    \ to the leader, and now the block is committed to the log entry. Once the leader\
    \ has received the acknowledgment, it notifies every node that this new entry\
    \ (block) has been committed to the log.\n\nNow that we have talked about consensus,\
    \ let’s look at what makes nodes accept private transactions. In Ethereum, all\
    \ transactions are public, and by default nodes only accept transactions that\
    \ are broadcasted publicly. For Quorum to work, the following changes have to\
    \ be made:\n\n*   POW consensus algorithms have been replaced by QuorumChain,\
    \ which is voting based. The ultimate goal is to have multiple consensus algorithms\
    \ running on the blockchain in a model called “pluggable consensus.”"
