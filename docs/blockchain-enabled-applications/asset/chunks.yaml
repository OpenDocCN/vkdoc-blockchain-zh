  raw: '*   **Data Discovery Index:** One of the major problems mentioned earlier
    was the lack of incentives for researchers to make supplemental data available.
    The National Institutes of Health (NIH) has sought to create a new measure to
    credit researchers for uploading additional experimental data, called the Data
    Discovery Index. This is a citable data repository where researchers can make
    additional data points available related to their studies. For academic researchers,
    a huge incentive is to elicit additional citations for their work, which in turn
    becomes a measure of impact for a published study. By making the database citable,
    NIH created this new incentive for researchers to dedicate additional time and
    resources to upload unpublished databases.


    *   **Reproducibility Project:** The Center for Open Science in collaboration
    with Science Exchange will be looking at high-impact studies in cancer biology
    from 2010–2012 and replicating each one with help from members of Science Exchange.
    Full-length reports on the attempts at replicating experiments, discovering drug
    targets, and more will be made openly available along with detailed methods. This
    project is being done in two phases; the first phase culminates in a registered
    report that documents standardized protocols to carry out certain experiments.
    The second phase involves one of the member institutes of Science Exchange conducting
    the experiment using the registered report and documenting the results. Ultimately,
    both the reports and the data will be peer reviewed by reviewers at the *eLife*
    journal and made available online.


    These three initiatives are examples of a large-scale coordinated effort to enhance
    reproducibility, and many more are on the horizon. So far, we have discussed the
    problems in the academic environment leading to differing treatment of negative
    and positive data, the core of the reproducibility crisis, and the difficulties
    that arise as a result. Next, we will begin talking about the more serious consequences
    of data manipulation in the case of drug trials. The data points from clinical
    trials decide the fate of medications that will affect thousands of lives. Obtaining
    all relevant data is crucial not only for accurately prescribing medication, but
    also to avoid pitfalls and avenues already tackled in the past.


    Note


    Dr. Ben Goldacre gave a TED talk in which he told the story of the drug lorcainide,
    released in the 1980s. It was meant to be an anti-arrhythmic drug that could prevent
    abnormal heart rhythms in people who have had heart attacks. A small clinical
    trial was conducted in under one hundred patients, and unfortunately ten of them
    died. The drug was regarded as a failure, and commercial development stopped.
    The data from this failed clinical trial was never published. Over the next few
    years, other drug companies had similar ideas for anti-arrhythmic drugs, which
    were brought to market. It is approximated that 100,000 people died because these
    new drugs also caused an increased instance of death. In 1993, the researchers
    who conducted the original 1980 study came forth and wrote an apology mentioning
    that they had attributed the increased death rate to chance in the initial trials,
    and that had the data from this failed trial been published, it could have provided
    early warnings and prevented future deaths. This is just one example of the very
    serious consequences of publication bias. We’ll tackle a generalized version of
    this scenario in the next section.


    ## Clinical Trials


    We have already described a few complications that can arise due to flawed data
    reporting from clinical trials, and here we will begin outlining a potential solution.
    In this section, we will focus on three specific issues and provide a use case
    for the integration of blockchain technology in each one:


    *   **Trial registration:** Registering clinical trials when they begin, providing
    timely updates, and depositing the relevant results in a public database are crucial
    for offering clinical trials for new possible medications to patients for whom
    the standard drugs aren’t effective. Even though large-scale clinical trials involving
    human participants should be registered, more often than not, these trials remain
    missing in action. The only indications of data coming from the unregistered trial
    is a publication or perhaps a few papers that contain experiments and results
    highly tailored toward proving the effectiveness of the drug candidate being proposed.
    This type of publication bias can mislead clinicians in a dangerous manner; therefore
    we need to incentivize investigators to send regular updates from registered clinical
    trials on progress and any relevant clinical protocols.


    *   **Comparing drug efficacies:** Today, in most clinical settings, multiple
    drug options are increasingly becoming available to clinicians, but there is often
    a lack of evidence from head-to-head clinical trials that allows for direct comparison
    of the efficacy or safety of one drug over another. Computational models allow
    for parallel processing of large data sets in a type of analysis called Mixed
    Treatment Comparisons (MTCs). These models use Bayesian statistics to incorporate
    available data for a drug and generate an exploratory report comparing the drugs.
    This can become the foundation for automated comparisons as more data is liberated
    from unpublished or unavailable information silos. Recently, there has been more
    interest in using umbrella protocols for clinical trials. These protocols test
    multiple treatment interventions simultaneously for one disease and gather massive
    amounts of comparative data.


    *   **Post-processing:** In some cases, when a trial is registered, and it does
    provide some supplemental data that goes along with a publication, the registry
    acts more like a data dump than an organized data deposit. Recently, we have seen
    more carefully prepared and published post-analysis summaries; however, this is
    often an exception, not the rule. The key here is that once clinical-trial data
    is linked up to the blockchain, it becomes available to be included in an automation
    workflow, and now post-analysis summaries/data can be generated by an algorithm
    rather than a person. A universal backend for the storage of data can foster the
    development of frontend clients that read the blockchain and, using the appropriate
    public–private keypair, download the appended data from an external source and
    locally do the post-processing. After that, the summary reports can be appended
    back to the blockchain.


    Note


    Soenke Bartling and some collaborators in Heidelberg, Germany have been working
    relentlessly on open-science innovation using blockchain technology. Recently,
    they founded a think tank called Blockchain for Science to accelerate the adoption
    of blockchain technology in open science. The interested reader can find more
    on their website: `blockchainforscience.com`.'
  trans: "\n### 数据发现索引\n前文提到的主要问题之一是缺乏激励研究者共享补充数据的机制。美国国立卫生研究院（NIH）已着手创建一项名为“数据发现索引”的新指标，以表彰研究者上传额外实验数据的行为。这是一个可被引用的数据存储库，研究者可在此公开与自身研究相关的更多数据点。对于学术研究者而言，其重要激励在于能为工作赢得更多引用，而这反过来又成为已发表研究影响力的衡量标准。通过将数据库设为可引用状态，NIH\
    \ 创造了新的激励因素，促使研究者投入额外时间和资源来上传未发表的数据库。\n\n### 可重复性项目\n开放科学中心与科学交换机构合作，将针对 2010\
    \ 年至 2012 年间癌症生物学领域的高影响力研究，在科学交换机构成员的协助下对每项研究进行重复验证。关于重复实验、发现药物靶点等尝试的完整报告将连同详细方法一同开放获取。该项目分两个阶段进行：第一阶段最终形成一份注册报告，记录执行特定实验的标准化方案；第二阶段由科学交换机构的成员机构之一依据注册报告开展实验并记录结果。最终，报告与数据将由*eLife*期刊的审稿人进行同行评审，并在线上公开发布。\n\
    \n这三项举措是大规模协同提升研究可重复性的范例，未来还将涌现更多类似行动。至此，我们已探讨了学术环境中导致阴性数据与阳性数据区别对待的问题（这恰是可重复性危机的核心）及其引发的困难。接下来，我们将开始讨论药物试验中数据操纵引发的更严重后果。临床试验的数据点决定了将影响数千人命运的药物的最终走向。获取所有相关数据，不仅对于准确开具处方至关重要，也有助于规避已被探索过的误区和途径。\n\
    \n> **注意**  \n> 本·戈德埃克尔博士曾在 TED 演讲中讲述了 20 世纪 80 年代上市的药物洛卡尼的故事。该药本是一种抗心律失常药，旨在预防心脏病发作患者出现心律异常。在一项针对不到一百名患者的小型临床试验中，不幸有十人死亡。该药物被视为失败品，商业研发随之停止。这次失败试验的数据从未发表。在随后的几年里，其他制药公司对类似的抗心律失常药物产生了想法，并将其推向市场。据估算，约有\
    \ 10 万人因此死亡，因为这些新药同样导致了更高的死亡率。1993 年，最初于 1980 年开展那项研究的几位研究者站出来发表了道歉声明，称他们当时将增加的死亡率归因于早期试验中的偶然因素。如果这次失败试验的数据当时得以发表，本可提供早期警示，从而避免后续的死亡事件。这只是发表偏倚造成极其严重后果的一个例子。我们将在下一节讨论这种情况的普遍化版本。\n\
    \n## 临床试验\n\n我们已经描述了因临床试验数据报告存在缺陷而可能引发的若干复杂情况，接下来将开始勾勒一个潜在的解决方案。本节中，我们将聚焦三个具体问题，并为每个问题提供区块链技术的集成用例：\n\
    \n### 试验注册\n在临床试验启动时进行注册、及时提供更新信息，并将相关结果存入公共数据库，对于那些标准药物无效的患者而言，是提供新药临床试验的关键。尽管涉及人类参与者的大规模临床试验应当注册，但现实情况往往是这些试验杳无音信。未注册试验数据的唯一迹象，是一份出版物或若干高度剪裁、旨在证明拟议候选药物有效性的论文。此类发表偏倚会以危险的方式误导临床医生；因此，我们需要激励研究者定期提交已注册临床试验的进展报告及所有相关临床方案。\n\
    \n### 药物疗效比较\n如今，在大多数临床场景下，临床医生可选的药物种类越来越多，但往往缺乏头对头临床试验的证据来直接比较一种药物相对于另一种药物的疗效或安全性。计算模型允许通过一种称为“混合治疗比较”（MTC）的分析方法并行处理大型数据集。这些模型利用贝叶斯统计学整合某药物的可用数据，生成一份比较多种药物的探索性报告。随着更多数据从未发表或不可获取的信息孤岛中被解放出来，这可以成为自动化比较的基础。近期，人们对在临床试验中采用伞式方案越来越感兴趣。这类方案同时针对一种疾病测试多种治疗干预措施，并收集大量的比较数据。\n\
    \n### 后期处理\n在某些情况下，当一项试验已注册并随同出版物提供了部分补充数据时，注册库往往更像一个数据倾倒场，而非有条理的数据仓库。近期，我们看到了更多精心准备并发表的后期分析摘要；然而，这通常是例外而非惯例。关键在于，一旦临床试验数据与区块链链接，它便可以被纳入自动化工作流程，后期分析摘要/数据从而可以由算法而非人来生成。一个通用的数据存储后端可以促进前端客户端的开发，这些客户端读取区块链，并使用相应的公私钥对，从外部来源下载附加数据，并在本地进行后期处理。之后，摘要报告可以被附加回区块链。\n\
    \n> **注意**  \n> 苏恩克·巴特林与德国海德堡的一些合作者一直致力于利用区块链技术进行开放科学创新。最近，他们创立了一个名为“科学区块链”的智库，旨在加速区块链技术在开放科学领域的应用。感兴趣的读者可以访问他们的网站了解更多信息：`blockchainforscience.com`。\n"
- fmt: 'Let’s talk about a prototypical solution that uses the blockchain for making
    clinical trials more transparent. We will use an implementation of colored coins
    to make supplemental data available from clinical trials on the blockchain. The
    scripting language of `Bitcoin-core` allows for the attachment of small amounts
    of metadata to the blockchain. A colored coin takes advantage of this feature
    by attaching static metadata to the blockchain to represent assets with real-world
    value. In this sense, colored coins leverage the blockchain’s capacity to hold
    virtual assets. We will be using colored coins as a mechanism to introduce scarcity
    and incentivize users of a network to upload auxiliary clinical data and provide
    regularly timed updates. For our purposes, there are three components that make
    colored coins special:


    - **Coloring scheme:** The encoding method by which the colored coin data is encoded
    or decoded on the blockchain

    - **Asset metadata:** The actual metadata attached to a colored coin transaction
    that gets stored in blockchain; we will go over an example of it next. The new
    colored coins protocol allows for the attachment of a potentially unlimited amount
    of metadata to a colored coin transaction, by using torrent-keys that provide
    a decentralized way to share and store data.

    - **Rule engine:** In the past, the metadata just contained static information
    added to colored coins. But recently, a new rules section has been added that
    encodes an extra layer of logic supported by the [rule engine](https://github.com/Colored-Coins/Colored-Coins-Protocol-Specification/wiki/Rules)
    that unlocks smart contracts’ functionality to colored coins. Currently, four
    types of rules are supported that we will discuss.


    Here’s the generalized syntax for the metadata that can be added to a colored
    coin transaction:


    ```

    {

    metadata: {...Static data goes here...},

    rules: {...Rule definitions go here...}

    }

    ```


    There are two rules from the rule engine that we will be using in our solution:
    the expiration rule and the minter rule. The expiration rule is used to loan an
    asset, and it dictates the lifespan of an asset. Upon expiration, the asset returns
    to the last output (a valid Bitcoin address) that had a valid expiration. The
    minter rule grants a recipient permission to issue more of the same asset. So,
    a minter receiving colored coins can further issue more colored coins to others
    on the network. Both rules play an important role in introducing scarcity in this
    instance of blockchain economics. What role does scarcity play? To understand
    this, we need to introduce one more rule: the holder. When an asset is issued,
    holders are described within the set of asset-issuing rules as the addresses allowed
    to hold this asset.


    Figure [8-2](#430562_2_En_8_Chapter.xhtml#Fig2) visually describes the interaction
    between a researcher and a minter. The researcher registers a clinical trial and
    provides periodic updates, while the minter acknowledges the updates, issues new
    colored coins, and requests future cooperation as the next phases of the trial
    begin. Let’s walk through Figure [8-2](#430562_2_En_8_Chapter.xhtml#Fig2) step-by-step.
    The clinical trial begins with our researcher registering the trial, which initiates
    a genesis colored coin transaction from the minter to the holder (our researcher).
    This transaction comes with an expiration rule attached, and this in a sense is
    the deadline for depositing data associated with one of the several phases of
    a given clinical trial. The researcher must send a colored coin transaction back
    to the minter, with URLs to metadata containing updates or new data. When the
    minter receives this transaction, an evaluation is performed on whether the asset
    was expired, and the result is exported. We will return to this result in the
    next section. After this return transaction, the minter issues more colored coins
    to the holder for the next phase, and the cycle repeats. Each phase of the trial
    results in more data URLs’ being appended to the metadata sent by the holder as
    a sign of continuous updates.


    **Tip**


    The rules engine of the colored coin protocol is also a part of the metadata not
    stored directly on the blockchain; instead, it is stored in plain JSON format
    using torrents. [Torrents](https://en.wikipedia.org/wiki/BitTorrent) provide a
    decentralized mechanism to share data and make it possible for rules to interact
    with objects outside of the blockchain. We have abstracted the minter here as
    an oracle; however, the actual implementation would involve a hybrid of an automated
    evaluator and a smart contract.


    The entire process visualized in Figure [8-2](#430562_2_En_8_Chapter.xhtml#Fig2)
    can be considered analogous to the `SSL-handshake` that forms the foundation of
    sure server–client interactions and symmetric encryption in our browsers. Perhaps
    in the future, one can extrapolate, if this type of interaction becomes common,
    it could become a feature of the colored coin wallet. The evaluation of data received
    by the minter can be carried out publicly using an add-on that returns the results
    to the wallet software. In the future, this modular add-on design will enable
    the integration of new protocols into the wallet client.


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig2_HTML.jpg](images/430562_2_En_8_Chapter/430562_2_En_8_Fig2_HTML.jpg)


    Figure 8-2

    Interactions between a minter and a holder


    The process shown in Figure [8-2](#430562_2_En_8_Chapter.xhtml#Fig2) can create
    artificial scarcity by imposing the expiration rule. The holder (researcher) has
    to return a colored coin transaction with data URLs corresponding to the update.
    The minter performs an evaluation of the state of the holder and then acknowledges
    the receipt of updates. New coins are issued for the next cycle of updates, and
    the whole cycle begins anew. The evaluator result is exported and will be used
    to build a reputation system, which we will discuss shortly.


    Now that we have discussed the colored coin interactions, let’s take a look at
    the entire clinical trials system in Figure [8-3](#430562_2_En_8_Chapter.xhtml#Fig3).


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig3_HTML.jpg](images/430562_2_En_8_Chapter/430562_2_En_8_Fig3_HTML.jpg)


    Figure 8-3

    Summary of blockchain integration into clinical trials workflow


    In Figure [8-3](#430562_2_En_8_Chapter.xhtml#Fig3), the process begins with registration
    and a proposed summary of what the clinical trial will entail, the methods being
    used, and what data/results can be expected. The summary information along with
    the approved protocol are appended to the blockchain before the trial begins.
    This completes the registration process.'
