  trans: '

    ### 交易列表的组成部分


    这里引入了一些新的术语和概念，我们现在就来逐一讲解。我们已经讨论过区块头、区块上的时间戳概念、默克尔根以及前一个区块的哈希值。现在我们将聚焦于交易列表的组成部分，先从延迟开始。完整的技术术语是锁定时间延迟，指的是交易可以被收录到某个区块中所需等待的时间。其精确机制涉及一个名为
    `blockheight` 的参数，该参数会随着区块链上区块的增加而递增。在交易指定的 `blockheight` 被超过之前，该交易将保持锁定状态且未经确认。


    接下来，我们需要讨论交易输入和输出的概念。这两个参数引导着交易在整个网络中的流转，并与花费能力的概念紧密相连。作为一种货币，比特币区块链上花费能力的基本单位称为未花费交易输出（`UTXO`），其价值以聪为单位。一个比特币可以进一步拆分为一亿个聪，类似于一美元可以拆分为
    100 美分。网络将整个比特币经济记录为已花费或未花费的交易。在一次交易事件中，买方所有的比特币都被用于购买某件物品，这会产生两个输出：一笔锁定给买方的已花费交易，以及剩余比特币构成的未花费交易。这些未花费交易会返还给买方，并赋予其在未来交易中的花费能力。对于最终用户而言，跟踪未花费交易已通过使用钱包实现了自动化。钱包软件会搜索区块链并收集属于特定地址的所有
    `UTXO`，从而为用户创建一个账户余额的概念。本质上，属于用户的比特币是来自多个交易事件中产生的 `UTXO` 的总和。我们稍后将讨论钱包和地址的概念。


    为了从实践角度理解 `UTXO`，我们需要讨论找零和找零地址的概念。这个想法其实非常简单——回想一下你上次用现金购买杂货的场景。你的交易有两个组成部分：你为所购物品付了钱，这部分付款被指定给了商家；同时你收到了一些找零，是付款后剩余的部分。`UTXO`
    就是你收到的找零。这笔找零会进入你拥有的一个比特币地址（称为找零地址）；请参考图 3-2 查看此过程的图形描述并跟随理解。每笔交易都被分成两部分：一部分被花费并锁定（或分配）给商家，另一部分则返还给买方。返还的部分就是未花费交易输出，可用于未来的交易。在一笔交易中，被该交易消耗的
    `UTXO` 被称为输入，而剩余或由交易新产生的 `UTXO` 被称为输出。只有交易输出（用户拥有的 `UTXO`）才能在未来的交易中被花费。图 3-2 中的例子说明了类似的情形：Bob
    想发送 1 BTC 给 Alice，但在此过程中，Bob 拥有的 10 BTC 被分成了两部分：发送给 Alice 的 1 BTC（现在已分配给她），以及以
    `UTXO` 形式返还给 Bob 的 9 BTC。这两个组成部分都被记录在区块链上，因为它们是同一笔交易的一部分，如图 3-2 所示。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig2_HTML.jpg](img/430562_2_En_3_Fig2_HTML.jpg)


    **图 3-2** – 交易列表中 UTXO 的格式


    在这个示例中，Bob 想发送 1 BTC 给 Alice，该图展示了这笔交易是如何发生的。Bob 拥有的 BTC 被用作交易的输入，输出则分为两部分：一部分发送给
    Alice，金额为 1 BTC；另一部分作为找零返还给 Bob。这里需要注意，初始交易、新分配的交易以及找零都会作为输入和输出被记录在区块链上。


    现在我们对 `UTXO` 有了更好的理解，接下来谈谈交易是如何从一个用户分配给另一个用户的。这涉及到使用公私钥对来锁定和解锁交易。其过程如下：


    -   用户 Alice 发起了一笔她想发送给 Bob 的交易。

    -   Alice 使用她的私钥对交易进行签名。

    -   该交易在网络广播，任何人都可以使用 Alice 的公钥来验证该交易确实源自她。

    -   Bob 在交易经过网络验证并传播给他之后收到该交易。

    -   Bob 使用他的私钥解锁该交易。该交易是用一种脚本签名的，只有接收方才能解锁交易并将其分配给自己。


    我们提到交易的锁定和解锁机制使用了脚本，那么这个脚本是什么呢？比特币协议使用一种极简、基础且非图灵完备的编程语言来管理交易。中本聪的初衷是尽可能保持编程逻辑非常简单，并尽量使其不驻留在区块链上。每个交易都附带一个脚本，其中包含关于接收比特币的用户如何访问这些比特币的指令。本质上，发送方需要提供一个公钥（网络上的任何人都可以用它来确定交易确实源自脚本中包含的地址），以及一个签名（用于证明该交易是使用发送方的私钥签署的）。没有公私钥对的授权，用户之间的交易就无法进行。让我们完善之前开始用
    `UTXO` 构建的图景，如图 3-3 所示。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig3_HTML.jpg](img/430562_2_En_3_Fig3_HTML.jpg)


    **图 3-3** – 区块链上的交易传播


    从概念上讲，将已花费交易视为锁定状态，而将网络上的未花费交易视为分散在数百个区块中的 `UTXO`，这可能会让人觉得奇怪，但这正是交易在网络中传播的方式。在我们图
    3-3 所示的例子中，Bob 首先发起了一笔发送给 Alice 的交易，1 BTC 被分配给了 Alice。他收到了 9 BTC 的找零作为未花费输出。Alice
    随后向另一用户发送了 0.5 BTC，在此过程中，她从自己的交易中收到了 0.5 BTC 的找零。请注意，第一笔交易是由发起交易的 Bob 签名的，随后 Alice
    对第二笔交易进行了签名。从某种意义上说，第一笔交易的输出成为了第二笔交易的输入，因此 Bob 的签名被保留作为第一笔交易的证明，而 Alice 的签名则充当了解锁机制。这就是交易如何在比特币网络上从源头一直追踪到最后所有者（最终地址）的方法。通过使用网络地址，网络保留了一定程度的假名性。


    现在我们已经讨论了 `UTXO`、签名、脚本以及交易是如何记录的，让我们把这些概念整合起来，回顾一下 Alice 和 Bob 之间交易的完整工作流程，如图
    3-4 所示。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig4_HTML.jpg](img/430562_2_En_3_Fig4_HTML.jpg)


    **图 3-4** – 网络交易概览

