    777.68 points, and the whole system on the brink of collapse

    *   October 3: US government authorizes $700B for bank bailouts


    The bailout had massive economic consequences, but more important, it created
    the type of environment that would allow Bitcoin to flourish. In November 2008,
    a whitepaper ([`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf))
    was posted on the Cryptography and Cryptography Policy Mailing List titled “[Bitcoin:​
    A Peer-to-Peer Electronic Cash System](https://bitcoin.org/bitcoin.pdf),” with
    a single author named Satoshi Nakamoto. This whitepaper detailed the Bitcoin protocol,
    and along with it came the original code for early versions of Bitcoin. In some
    manner, this whitepaper was a response to the economic crash that had just happened,
    but it would be some time before this technological revolution caught on. Some
    developers were concerned with this electronic cash system failing before it could
    ever take hold, and their concern was scalability, as we can see pointed out in
    Figure [1-1](#430562_2_En_1_Chapter.xhtml#Fig1).


    So, who is Nakamoto? And what is his background? The short and simple answer is
    that we don’t know. In fact, it is presumptuous to assume that he is actually
    a “he.” The name Satoshi Nakamoto was largely used as a pseudonym, and “he” could
    have been a “she” or even a large group. Several reporters and news outlets have
    dedicated time and energy in digital forensics to narrow down candidates and find
    out the real Satoshi, but all the efforts so far have been wild-goose chases ([`https://www.technologyreview.com/s/527051/the-man-who-really-built-bitcoin/`](https://www.technologyreview.com/s/527051/the-man-who-really-built-bitcoin/)).
    In this case, the community is starting to realize that maybe it doesn’t matter
    who Satoshi is, as the nature of open source almost makes it irrelevant. Jeff
    Garzik, one of the most respected developers in the Bitcoin community, described
    it as follows, “Satoshi published an open-source system for the purpose that you
    didn’t have to know who he was, and trust who he was, or care about his knowledge.”
    The true spirit of open source makes it so that the code speaks for itself, without
    any intervention from the creator/developer.


    ![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig1_HTML.jpg](images/430562_2_En_1_Chapter/430562_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Initial reception of the Bitcoin protocol. Concerns about scalability and realistic
    prospects of Bitcoin


    ## Technology Stack


    Satoshi’s real genius in creating the Bitcoin protocol was solving the Byzantine
    Generals Problem. The solution was generalized to financial transactions with
    components and ideas borrowed from the cyberpunk community. We will briefly talk
    about three of those ideas, how the components work, and how they help the Bitcoin
    protocol: Hashcash for proof-of-work, Byzantine fault tolerance for the decentralized
    network, and the blockchain for removing the need for centralized trust or a central
    authority. Let’s dive into each one, starting with Hashcash.


    `Hashcash` was devised by Adam Black in the late nineties to limit email spam
    with the first of its kind proof-of-work (PoW) algorithm. The rationale behind
    `Hashcash` was to attach some computational cost to sending emails. Spammers have
    a business model that relies on sending large numbers of emails with very little
    cost associated with each message. However, if there is even a small cost for
    each spam email sent, that cost multiplies over thousands of emails, and their
    business becomes unprofitable. `Hashcash` relies on the idea of cryptographic
    hash functions—a type of hash function (in the case of Bitcoin, it’s `SHA1`) that
    takes an input and converts it into a string and generates a message digest, as
    shown in Figure [1-2](#430562_2_En_1_Chapter.xhtml#Fig2). The hash functions are
    designed to have a property called one-way functions, which implies that a potential
    input can be verified very easily through the hash function to match the digest,
    but reproducing the input from the digest is infeasible. The only possible method
    of recreating the input is by using brute force to find the appropriate string
    of input. In practice, this is the computationally intensive element of `Hashcash`
    and has been imported into Bitcoin. This principle has become the foundation behind
    the proof-of-work (PoW) algorithms powering Bitcoin today, and most cryptocurrencies.
    The PoW for Bitcoin is more complex and involves new components that we will talk
    about at length in a later chapter.


    ![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig2_HTML.jpg](images/430562_2_En_1_Chapter/430562_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Mechanism of a cryptographic hash function. It takes an input and consistently
    converts it to a string of an output digest


    The next idea we need to discuss is the Byzantine Generals Problem. It is an agreement
    problem between a group of generals, with each one commanding a portion of the
    Byzantine army, ready to attack a city. These generals need to formulate a strategy
    for attacking the city and communicate it to each other adequately. The important
    task is that every general must work toward the same action, as a tepid attack
    by a few generals would be worse than a coordinated attack or a coordinated retreat.
    The crux of the problem is that some of the generals are traitorous. They may
    cast a vote to deceive the other generals and ultimately lead to a suboptimal
    strategy. Let’s take a look at an example: In a case of odd-numbered generals,
    say seven, three support attacking and three support retreat. The seventh general
    might communicate an agreement to the generals in favor of retreat, and an agreement
    to attack to the other generals, causing the whole arrangement to fall apart.
    The attacking forces would fail to capture the city because no intrinsic central
    authority could verify the presence of trust among all seven generals.'
