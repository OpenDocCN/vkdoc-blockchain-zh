    from external sources were used with permission.


    In addition, we wish to acknowledge the authorship and stellar contributions from
    the following authors toward this book:


    Chapter [6](#430562_2_En_6_Chapter.xhtml): Colin Forward


    Chapter [13](#430562_2_En_13_Chapter.xhtml): John Bass


    Chapter [15](#430562_2_En_15_Chapter.xhtml): Katherine Kuzmeskas


