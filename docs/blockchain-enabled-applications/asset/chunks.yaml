    \ 是 The DAO 代码的主要开发者，而 Tual 则通过博客文章、会议演讲和论坛贡献成为了 The DAO 的代言人。那么，他们现在的公司会如何从创建基于以太坊的无领导者风险投资基金中受益呢？要理解他们的动机，我们必须审视\
    \ Slock.it 将区块链连接到物理世界的愿景。\n\n在构建 USN 的过程中，Slock.it 旨在物联网技术的主流普及中扮演核心角色。通过提供一种从世界任何地方与网络设备进行交互的方式，USN\
    \ 有望成为一个超连接世界的骨干。在这个世界里，你的财产可以出租给他人，而无需像 Uber 和 Airbnb 这样的中心化公司。取而代之的是，USN 将为以太坊区块链提供一个接口，让去中心化应用可以管理构成共享经济的交易。\n\
    \n该公司计划构建一种名为“以太坊计算机”的专用调制解调器，用于将物联网设备连接到 USN。Slock.it 对 The DAO 的愿景是创立一个去中心化的风险投资基金，用于投资那些构建区块链支持的产品和服务的、有前景的提案。\n\
    \n在撰写本文时（距离最初的 DAO 的 ICO 几年后），Slock.it 已筹集了 200 万美元的种子资金，用于继续开发 USN 和以太坊计算机。根据\
    \ Tual 在公司网站上的博客文章，Slock.it 现在将以免费开源镜像的形式，为诸如 Raspberry Pi 等流行的片上系统（SoC）提供以太坊计算机。该公司还构建并维护了\
    \ `Share&Charge` 服务，该服务允许电动汽车充电站的所有者通过基于区块链的移动应用程序，将其电力出售给电动汽车车主。\n\n在 Crowd Companies\
    \ 于 2016 年 11 月 19 日进行的一场题为“技术如何改善未来的住宿”的演讲中，Jeremiah Owyang 在图 6-2 所示的幻灯片中总结了\
    \ Slock.it 的主要用例之一。\n\n![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig2_HTML.jpg](img/430562_2_En_6_Fig2_HTML.jpg)\n\
    \n**图 6-2**  \n通过将物理设备（智能锁）的购买链接到智能合约，Slock.it 可以充当去中心化的 Airbnb\n\n最终，图 6-2 中表达的理念被扩展成了一个去中心化的物联网平台，任何设备都可以连接到区块链。\n"
- fmt: "# The DAO\n\nThe original conception of The DAO was not the radical experiment\
    \ in democratic business processes that was eventually released at its ICO. Jentzsch\
    \ described the process on the Slock.it blog:\n\n> *In the beginning, we created\
    \ a slock.it-specific smart contract and gave token holders voting power about\
    \ what we—slock.it—should do with the funds received.*\n> \n> *After further consideration,\
    \ we gave token holders even more power, by giving them full control over the\
    \ funds, which would be released only after a successful vote on detailed proposals\
    \ backed by smart contracts. This was already a few steps beyond the Kickstarter\
    \ model, but we would have been the only recipient of funds in this narrow slock.it-specific\
    \ DAO.*\n> \n> *We wanted to go even further and create a “true” DAO, one that\
    \ would be the only and direct recipient of the funds, and would represent the\
    \ creation of an organization similar to a company, with potentially thousands\
    \ of Founders.*^([³](#fn3))\n\nTo achieve this decoupling of Slock.it and The\
    \ DAO, Jentzsch designed a Solidity contract that would allow any DAO token holder\
    \ to make proposals for how The DAO’s resources should be handled. All token holders\
    \ could vote on active proposals, which had a minimum voting period of fourteen\
    \ days.\n\nThat meant that once The DAO’s ICO was complete, Slock.it would have\
    \ to submit a proposal to The DAO just like anyone else. Other users could use\
    \ the Mist browser to evaluate the proposal. This is how proposals were structured:\n\
    \n```\nstruct Proposal {\naddress recipient;\nuint amount;\nstring description;\n\
    uint votingDeadline;\nbool open;\nbool proposalPassed;\nbytes32 proposalHash;\n\
    uint proposalDeposit;\nbool newCurator;\nSplitData[] splitData;\nuint yea;\nuint\
    \ nay;\nmapping (address => bool) votedYes;\nmapping (address => bool) votedNo;\n\
    address creator;\n}\n```\n\nAs you can see, proposals—the core of this automaton\
    \ code base that would quickly raise $150 million—were relatively simple requests\
    \ for The DAO’s resources (`uint amount`).\n\nAny DAO token holder could vote\
    \ on proposals by calling the `vote` function:\n\n```\nfunction vote(\nuint _proposalID,\n\
    bool _supportsProposal\n) onlyTokenholders returns (uint _voteID);\n```\n\nThe\
    \ votes from any one address would be weighted proportional to the amount of DAO\
    \ tokens held at that address. If token holders wanted to vote for two separate\
    \ positions, they could transfer the amount of tokens they wanted to vote with\
    \ to another address, and vote again from there.^([⁴](#fn4)) Any tokens voting\
    \ on an open proposal were locked (could not be transferred) until the end of\
    \ the voting period.\n\nThe `uint proposalDeposit` was the deposit (in wei) that\
    \ creators of a proposal had to stake on the proposal until the voting period\
    \ closed. If the proposal never reached quorum, the deposit would remain with\
    \ The DAO.\n\nThere were two special types of proposal that did not require deposits\
    \ that would play a key role in the fate of The DAO. The first type was a proposal\
    \ to split The DAO, effectively withdrawing the funds of the recipient of the\
    \ proposal into a new “child” DAO, which was a clone of the original, but at a\
    \ new contract address. Split proposals had a voting period of seven days, instead\
    \ of fourteen, and anyone who voted yes on a split proposal would follow the recipient,\
    \ withdrawing their tokens from the original DAO and moving them into the resultant\
    \ child DAO.\n\nThe second special type of proposal was to replace the curator\
    \ of The DAO. DAO curators were addresses set at the creation of The DAO and the\
    \ creation of any child DAO that could whitelist recipient addresses, effectively\
    \ serving as gatekeepers.^([⁵](#fn5)) If the majority vote no on a proposal to\
    \ replace a curator, the yes votes can elect to stand by their decision, creating\
    \ a new DAO with their chosen curator.\n\n## The ICO Highlights\n\nThe ICO for\
    \ the initial The DAO concept was an overnight success:\n\n* It raised 12 million\
    \ ETH (~$150 million).\n* Both Jentzsch and Tual admitted that they never expected\
    \ their idea to be so successful.\n\n## The Hack\n\nThe idea that The DAO was\
    \ vulnerable to attack had been floating around in the developer community. Vlad\
    \ Zamfir and Emin Gün Sirer first raised the issue in a blog post calling for\
    \ a moratorium on The DAO until the vulnerabilities could be addressed.^([⁶](#fn6))\
    \ Just days before the attack, MakerDAO cautioned the community that their code\
    \ was vulnerable to an attack, and Peter Vessenes demonstrated that this vulnerability\
    \ was shared by The DAO.^([⁷](#fn7))\n\nThese warnings prompted a now infamous\
    \ blog post published on June 12, 2016, by Tual on the Slock.it website titled,\
    \ “No DAO funds at risk following the Ethereum smart contract ‘recursive call’\
    \ bug discovery.” Within a couple of days, fixes had been proposed to correct\
    \ many of the known vulnerabilities of The DAO, but it was already too late. On\
    \ June 17, an attacker began draining funds from The DAO.\n\nThe DAO attacker\
    \ exploited a well-intentioned although poorly implemented feature of The DAO\
    \ that was intended to prevent tyranny of the majority over dissenting DAO token\
    \ holders. From The DAO white paper:\n\n> *A problem every DAO has to mitigate\
    \ is the ability for the majority to rob the minority by changing governance and\
    \ ownership rules after DAO formation. For example, an attacker with 51% of the\
    \ tokens, acquired either during the fueling period or created afterwards, could\
    \ make a proposal to send all the funds to themselves. Since they would hold the\
    \ majority of the tokens, they would always be able to pass their proposals.*\n\
    > \n> *To prevent this, the minority must always have the ability to retrieve\
    \ their portion of the funds. Our solution is to allow a DAO to split into two.\
    \ If an individual, or a group of token holders, disagrees with a proposal and\
    \ wants to retrieve their portion of the Ether before the proposal is executed,\
    \ they can submit and approve a special type of proposal to form a new DAO. The\
    \ token holders who voted for this proposal can then split the DAO, moving their\
    \ portion of the Ether to this new DAO, leaving the rest alone only able to spend\
    \ their own Ether.*\n\nUnfortunately, the way that this “split” feature was implemented\
    \ made the DAO vulnerable due a catastrophic reentrancy bug.^([⁸](#fn8)) In other\
    \ words, someone could recursively split from the DAO, withdrawing amounts equal\
    \ to their original ETH investment indefinitely, before the record of their withdrawal\
    \ was ever recorded in the original DAO contract.\n\nHere is the vulnerability,\
    \ as found in the Solidity contract file `DAO.sol`:\n\n```\nfunction splitDAO(\n\
    uint _proposalID,\naddress _newCurator\n) noEther onlyTokenholders returns (bool\
    \ _success) {\n...\n// [Added for explanation] The first step moves Ether and\
    \ assigns new tokens\nuint fundsToBeMoved =\n(balances[msg.sender] * p.splitData[0].splitBalance)\
    \ /\np.splitData[0].totalSupply;\nif (p.splitData[0].newDAO.createTokenProxy.value(fundsToBeMoved)(msg.sender)\
    \ == false) //\n[Added for explanation] This is the line that splits the DAO before\
    \ updating the funds in\nthe account calling for the split\n...\n// Burn DAO Tokens\n\
    Transfer(msg.sender, 0, balances[msg.sender]);\nwithdrawRewardFor(msg.sender);\
    \ // be nice, and get his rewards\n// [Added for explanation] The previous line\
    \ is key in that it is called before\ntotalSupply and balances[msg.sender] are\
    \ updated to reflect the new balances after the split\nhas been performed\ntotalSupply\
    \ -= balances[msg.sender]; // [Added for explanation] This happens after the\n\
    split\nbalances[msg.sender] = 0; // [Added for explanation] This also happens\
    \ after the split\npaidOut[msg.sender] = 0;\nreturn true;\n}\n```"
  raw: '## The DAO


    The original conception of The DAO was not the radical experiment in democratic
    business processes that was eventually released at its ICO. Jentzsch described
    the process on the Slock.it blog:


    > *In the beginning, we created a slock.it-specific smart contract and gave token
    holders voting power about what we—slock.it—should do with the funds received.*


    > *After further consideration, we gave token holders even more power, by giving
    them full control over the funds, which would be released only after a successful
    vote on detailed proposals backed by smart contracts. This was already a few steps
    beyond the Kickstarter model, but we would have been the only recipient of funds
    in this narrow slock.it-specific DAO.*


    > *We wanted to go even further and create a “true” DAO, one that would be the
    only and direct recipient of the funds, and would represent the creation of an
    organization similar to a company, with potentially thousands of Founders.*^([³](#fn3))


    To achieve this decoupling of Slock.it and The DAO, Jentzsch designed a Solidity
    contract that would allow any DAO token holder to make proposals for how The DAO’s
    resources should be handled. All token holders could vote on active proposals,
    which had a minimum voting period of fourteen days.


    That meant that once The DAO’s ICO was complete, Slock.it would have to submit
    a proposal to The DAO just like anyone else. Other users could use the Mist browser
    to evaluate the proposal. This is how proposals were structured:


    ```

    struct Proposal {

    address recipient;

    uint amount;

    string description;

    uint votingDeadline;

    bool open;

    bool proposalPassed;

    bytes32 proposalHash;

    uint proposalDeposit;

    bool newCurator;

    SplitData[] splitData;

    uint yea;

    uint nay;

    mapping (address => bool) votedYes;

    mapping (address => bool) votedNo;

    address creator;

    }

    ```


    As you can see, proposals—the core of this automaton code base that would quickly
    raise $150 million—were relatively simple requests for The DAO’s resources (uint
    amount).


    Any DAO token holder could vote on proposals by calling the `vote` function:


    ```

    function vote(

    uint _proposalID,

    bool _supportsProposal

    ) onlyTokenholders returns (uint _voteID);

    ```


    The votes from any one address would be weighted proportional to the amount of
    DAO tokens held at that address. If token holders wanted to vote for two separate
    positions, they could transfer the amount of tokens they wanted to vote with to
    another address, and vote again from there.^([⁴](#fn4)) Any tokens voting on an
    open proposal were locked (could not be transferred) until the end of the voting
    period.


    The `uint proposalDeposit` was the deposit (in wei) that creators of a proposal
    had to stake on the proposal until the voting period closed. If the proposal never
    reached quorum, the deposit would remain with The DAO.


    There were two special types of proposal that did not require deposits that would
    play a key role in the fate of The DAO. The first type was a proposal to split
    The DAO, effectively withdrawing the funds of the recipient of the proposal into
    a new “child” DAO, which was a clone of the original, but at a new contract address.
    Split proposals had a voting period of seven days, instead of fourteen, and anyone
    who voted yes on a split proposal would follow the recipient, withdrawing their
    tokens from the original DAO and moving them into the resultant child DAO.


    The second special type of proposal was to replace the curator of The DAO. DAO
    curators were addresses set at the creation of The DAO and the creation of any
    child DAO that could whitelist recipient addresses, effectively serving as gatekeepers.^([⁵](#fn5))
    If the majority vote no on a proposal to replace a curator, the yes votes can
    elect to stand by their decision, creating a new DAO with their chosen curator.


    ## The ICO Highlights


    The ICO for the initial The DAO concept was an overnight success:


    *   It raised 12 million ETH (~$150 million).


    *   Both Jentzsch and Tual admitted that they never expected their idea to be
    so successful.


    ## The Hack


    The idea that The DAO was vulnerable to attack had been floating around in the
    developer community. Vlad Zamfir and Emin Gün Sirer first raised the issue in
    a blog post calling for a moratorium on The DAO until the vulnerabilities could
    be addressed.^([⁶](#fn6)) Just days before the attack, MakerDAO cautioned the
    community that their code was vulnerable to an attack, and Peter Vessenes demonstrated
    that this vulnerability was shared by The DAO.^([⁷](#fn7))


    These warnings prompted a now infamous blog post published on June 12, 2016, by
    Tual on the Slock.it website titled, “No DAO funds at risk following the Ethereum
    smart contract ‘recursive call’ bug discovery.” Within a couple of days, fixes
    had been proposed to correct many of the known vulnerabilities of The DAO, but
    it was already too late. On June 17, an attacker began draining funds from The
    DAO.


    The DAO attacker exploited a well-intentioned although poorly implemented feature
    of The DAO that was intended to prevent tyranny of the majority over dissenting
    DAO token holders. From The DAO white paper:


    > *A problem every DAO has to mitigate is the ability for the majority to rob
    the minority by changing governance and ownership rules after DAO formation. For
    example, an attacker with 51% of the tokens, acquired either during the fueling
    period or created afterwards, could make a proposal to send all the funds to themselves.
    Since they would hold the majority of the tokens, they would always be able to
    pass their proposals.*


    > *To prevent this, the minority must always have the ability to retrieve their
    portion of the funds. Our solution is to allow a DAO to split into two. If an
    individual, or a group of token holders, disagrees with a proposal and wants to
    retrieve their portion of the Ether before the proposal is executed, they can
    submit and approve a special type of proposal to form a new DAO. The token holders
    who voted for this proposal can then split the DAO, moving their portion of the
    Ether to this new DAO, leaving the rest alone only able to spend their own Ether.*


    Unfortunately, the way that this “split” feature was implemented made the DAO
    vulnerable due a catastrophic reentrancy bug.^([⁸](#fn8)) In other words, someone
    could recursively split from the DAO, withdrawing amounts equal to their original
    ETH investment indefinitely, before the record of their withdrawal was ever recorded
    in the original DAO contract.


    Here is the vulnerability, as found in the Solidity contract file *DAO.sol*:


    ```

    function splitDAO(

    uint _proposalID,

    address _newCurator

    ) noEther onlyTokenholders returns (bool _success) {

    ...

    // [Added for explanation] The first step moves Ether and assigns new tokens

    uint fundsToBeMoved =

    (balances[msg.sender] * p.splitData[0].splitBalance) /

    p.splitData[0].totalSupply;

    if (p.splitData[0].newDAO.createTokenProxy.value(fundsToBeMoved)(msg.sender) ==
    false) //

    [Added for explanation] This is the line that splits the DAO before updating the
    funds in

    the account calling for the split

    ...

    // Burn DAO Tokens

    Transfer(msg.sender, 0, balances[msg.sender]);

    withdrawRewardFor(msg.sender); // be nice, and get his rewards

    // [Added for explanation] The previous line is key in that it is called before

    totalSupply and balances[msg.sender] are updated to reflect the new balances after
    the split

    has been performed

    totalSupply -= balances[msg.sender]; // [Added for explanation] This happens after
    the

    split

    balances[msg.sender] = 0; // [Added for explanation] This also happens after the
    split

    paidOut[msg.sender] = 0;

    return true;

    }

    ```'
  trans: "\n# The DAO\n\nThe DAO 的原始构想并非最终在其 ICO 中发布的那个关于民主化商业流程的激进实验。Jentzsch 在 Slock.it\
    \ 博客上描述了这一过程：\n\n> *最初，我们创建了一个 slock.it 专属的智能合约，赋予代币持有者投票权，决定我们——slock.it——应如何使用所收到的资金。*\n\
    > \n> *经过进一步考虑，我们赋予了代币持有者更大的权力，让他们完全掌控这些资金，只有在由智能合约支持的详细提案投票通过后，资金才会被释放。这已经比 Kickstarter\
    \ 模式前进了一步，但在这个狭隘的 slock.it 专属 DAO 中，我们仍会是资金的唯一接收方。*\n> \n> *我们希望能更进一步，创建一个“真正的”DAO，使其成为资金的唯一且直接接收方，并代表创建一个类似于公司的组织，其中可能有成千上万的创始人。*\
    \ ^(³)\n\n为了实现 Slock.it 与 The DAO 的分离，Jentzsch 设计了一个 Solidity 合约，允许任何 DAO 代币持有者就如何处理\
    \ The DAO 的资源提出提案。所有代币持有者都可以对活跃的提案进行投票，提案的最低投票期为十四天。\n\n这意味着，一旦 The DAO 的 ICO\
    \ 完成，Slock.it 就必须像其他任何人一样向 The DAO 提交一份提案。其他用户可以使用 Mist 浏览器来评估该提案。提案的结构如下：\n\n\
    ```\nstruct Proposal {\naddress recipient;\nuint amount;\nstring description;\n\
    uint votingDeadline;\nbool open;\nbool proposalPassed;\nbytes32 proposalHash;\n\
    uint proposalDeposit;\nbool newCurator;\nSplitData[] splitData;\nuint yea;\nuint\
    \ nay;\nmapping (address => bool) votedYes;\nmapping (address => bool) votedNo;\n\
    address creator;\n}\n```\n\n如你所见，提案——这个迅速筹集了 1.5 亿美元的自动化代码库的核心——是对 The DAO 资源的相对简单的请求（`uint\
    \ amount`）。\n\n任何 DAO 代币持有者都可以通过调用 `vote` 函数对提案进行投票：\n\n```\nfunction vote(\n\
    uint _proposalID,\nbool _supportsProposal\n) onlyTokenholders returns (uint _voteID);\n\
    ```\n\n来自任何地址的票数将根据该地址持有的 DAO 代币数量按比例加权。如果代币持有者想要对两个不同的立场进行投票，他们可以将要用于投票的代币数量转移到另一个地址，然后从那里再次投票。^(⁴)\
    \ 任何对开放提案进行投票的代币都将被锁定（无法转移），直到投票期结束。\n\n`uint proposalDeposit` 是提案创建者在投票期结束前必须为提案质押的保证金（以\
    \ wei 为单位）。如果提案从未达到法定人数，保证金将归 The DAO 所有。\n\n有两种特殊类型的提案不需要保证金，它们在 The DAO 的命运中发挥了关键作用。第一种类型是拆分\
    \ The DAO 的提案，实际上是将提案接收方的资金提取到一个新的“子”DAO 中，该子 DAO 是原 DAO 的克隆，但位于一个新的合约地址。拆分提案的投票期为七天，而不是十四天，任何对拆分提案投赞成票的人都会跟随接收方，从原\
    \ DAO 中提取他们的代币，并将其转移到生成的子 DAO 中。\n\n第二种特殊类型的提案是替换 The DAO 的监督人。DAO 监督人是在创建 The\
    \ DAO 和任何子 DAO 时设定的地址，这些地址可以将接收方地址列入白名单，充当看门人的角色。^(⁵) 如果替换监督人的提案被多数票否决，投赞成票的人可以选择坚持他们的决定，从而创建一个由他们选定的监督人管理的新\
    \ DAO。\n\n## ICO 亮点\n\n最初 The DAO 概念的 ICO 一夜之间大获成功：\n\n*   它筹集了 1200 万 ETH（约合\
    \ 1.5 亿美元）。\n*   Jentzsch 和 Tual 都承认，他们从未预料到自己的创意会如此成功。\n\n## 黑客攻击\n\nThe DAO\
    \ 容易受到攻击的观点一直在开发者社区中流传。Vlad Zamfir 和 Emin Gün Sirer 首次在一篇博客文章中提出了这个问题，呼吁在漏洞得到解决之前暂停\
    \ The DAO 的运行。^(⁶) 就在攻击发生的几天前，MakerDAO 警告社区其代码容易受到攻击，而 Peter Vessenes 则证明 The\
    \ DAO 也存在同样的漏洞。^(⁷)\n\n这些警告促使 Tual 于 2016 年 6 月 12 日在 Slock.it 网站上发布了一篇如今臭名昭著的博客文章，题为“在发现以太坊智能合约‘递归调用’漏洞后，DAO\
    \ 资金无风险”。在接下来的几天里，人们提出了修复方案以纠正 The DAO 的许多已知漏洞，但为时已晚。6 月 17 日，一名攻击者开始从 The DAO\
    \ 中抽走资金。\n\nThe DAO 攻击者利用了 The DAO 一个本意良好但实现欠佳的功能，该功能旨在防止多数人压迫持不同意见的 DAO 代币持有者。摘自\
    \ The DAO 白皮书：\n\n> *每个 DAO 都必须缓解的一个问题是，多数人有可能在 DAO 成立后通过改变治理和所有权规则来掠夺少数人。例如，一个拥有\
    \ 51% 代币的攻击者，无论是在资金募集期间获得的还是之后创建的，都可以提出一项提案，将所有资金发送给自己。由于他们持有大多数代币，他们总能通过自己的提案。*\n\
    > \n> *为了防止这种情况，少数人必须始终有能力取回他们那部分资金。我们的解决方案是允许一个 DAO 拆分成两个。如果某个个人或一组代币持有者不同意某项提案，并希望在提案执行前取回他们所拥有的那部分以太币，他们可以提交并批准一种特殊类型的提案，以形成一个新\
    \ DAO。对此提案投赞成票的代币持有者随后可以拆分 DAO，将他们那部分以太币转移到这个新 DAO 中，而剩下的代币持有者则只能花费他们自己的以太币。*\n\
    \n不幸的是，这种“拆分”功能的实现方式使 The DAO 因一个灾难性的重入漏洞而变得脆弱。^(⁸) 换句话说，某人可以递归地从 DAO 中拆分，无限期地提取相当于其原始\
    \ ETH 投资额的金额，而他们的提款记录从未被记录在原始 DAO 合约中。\n\n以下是 Solidity 合约文件 `DAO.sol` 中发现的漏洞：\n\
    \n```\nfunction splitDAO(\nuint _proposalID,\naddress _newCurator\n) noEther onlyTokenholders\
    \ returns (bool _success) {\n...\n// [为说明添加] 第一步移动以太币并分配新代币\nuint fundsToBeMoved\
    \ =\n(balances[msg.sender] * p.splitData[0].splitBalance) /\np.splitData[0].totalSupply;\n\
    if (p.splitData[0].newDAO.createTokenProxy.value(fundsToBeMoved)(msg.sender) ==\
    \ false) //\n[为说明添加] 这一行在更新发起拆分账户中的资金之前进行 DAO 拆分\n...\n// 销毁 DAO 代币\nTransfer(msg.sender,\
    \ 0, balances[msg.sender]);\nwithdrawRewardFor(msg.sender); // 友好操作，获取其奖励\n//\
    \ [为说明添加] 上一行是关键，因为它是在 totalSupply 和 balances[msg.sender] 更新以反映拆分后的新余额之前调用的\n\
    totalSupply -= balances[msg.sender]; // [为说明添加] 这发生在拆分之后\nbalances[msg.sender]\
    \ = 0; // [为说明添加] 这也发生在拆分之后\npaidOut[msg.sender] = 0;\nreturn true;\n}\n```\n"
- fmt: '如下所示，已将所提供的英文文本按照高级文档工程师的规范进行排版。保留了原有的标题层级和段落逻辑，将需要强调的变量名、函数名、命令等添加了反引号，并对代码块使用了正确的
    Markdown 格式。


    ---


    As shown here, The DAO referenced the `balances` array to determine how many DAO
    tokens were available to be moved. The value of `p.splitData[0]` is a property
    of the proposal being submitted to the DAO, not any property of the DAO. That,
    in combination with the fact that `withdrawRewardFor` is called before `balances[]`
    is updated, made it possible for the attacker to call `fundsToBeMoved` indefinitely,
    because their balance will still return its original value.


    Looking more closely at `withdrawRewardFor()` shows us the conditions that made
    this possible:


    ```

    function withdrawRewardFor(address _account) noEther internal returns (bool _success)
    {

    if ((balanceOf(_account) * rewardAccount.accumulatedInput()) / totalSupply < paidOut[_account])

    throw;

    uint reward =

    (balanceOf(_account) * rewardAccount.accumulatedInput()) / totalSupply - paidOut[_account];

    if (!rewardAccount.payOut(_account, reward)) // [Added for explanation] this is
    the statement that is vulnerable to the recursion attack. We must go deeper.

    throw;

    paidOut[_account] += reward;

    return true;

    }

    ```


    Assuming the first statement evaluates as false, the statement marked as vulnerable
    will run. There’s one more step to examine to understand how the attacker was
    able to make that the case. The first time the `withdrawRewardFor` is called (when
    the attacker had legitimate funds to withdraw), the first statement would correctly
    evaluate as false, causing the following code to run:


    ```

    function payOut(address _recipient, uint _amount) returns (bool) {

    if (msg.sender != owner || msg.value > 0 || (payOwnerOnly && _recipient != owner))

    throw;

    if (_recipient.call.value(_amount)()) { // [Added for explanation] this is the
    coup de grace

    PayOut(_recipient, _amount);

    return true;

    } else {

    return false;

    }

    ```


    `PayOut()` as written in the second `if` statement references `“_recipient”` —
    the person proposing the split. That address contains a function that calls `splitDAO`
    again from within `withdrawRewardFor()`, before the token balance at that address
    is updated. That created a call stack that looked like this:


    ```

    splitDao

    withdrawRewardFor

    payOut

    recipient.call.value()()

    splitDao

    withdrawRewardFor

    payOut

    recipient.call.value()()

    ```


    The attacker was therefore able to withdraw funds from The DAO into a child DAO
    indefinitely. To recap, the attacker accomplished the following:


    1. Split the DAO.

    2. Withdrew their funds into the new DAO.

    3. Recursively called the split DAO function before the code checked to determine
    if the funds were available.


    This process is visually represented in Figure [6-3](#430562_2_En_6_Chapter.xhtml#Fig3).


    ![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig3_HTML.jpg](images/430562_2_En_6_Chapter/430562_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    The process of iterative withdrawal


    In Figure [6-3](#430562_2_En_6_Chapter.xhtml#Fig3), we can see the iterative process
    visually. The original DAO is represented by A, and a sub-DAO is created in B.
    Then, a transfer function requests some funds be withdrawn from the original DAO
    in C. Finally, the funds are transferred to the new DAO created. This process
    is repeated again as new DAOs are created with each loop.


    ## The Debate


    However, The DAO investors weren’t the only ones with an interest in the outcome
    of this turn of events. The hype surrounding The DAO had reached the religious
    proportions predicted by Buterin back in 2014. Almost 5 percent of ETH in circulation
    at the time was invested in The DAO. That had a number of implications for the
    entire Ethereum ecosystem, and led to one of the most contentious debates in the
    short history of blockchains.


    On one side of the debate were those looking to protect the fledgling Ethereum
    ecosystem from a malicious actor in possession of a nontrivial portion of the
    total ETH in circulation. They were not necessarily concerned with whether or
    not The DAO would survive, but ultimately wanted to ensure that Ethereum would
    survive as a reputable blockchain platform on which other DAOs could be built
    in the future. This was the disposition of Buterin and many of the core members
    of the Ethereum development team.


    On the other side were those committed to the ideals of decentralization and immutability.
    In the eyes of many in this camp (we’ll call them the justice camp), the blockchain
    is an inherently just system in that it is deterministic, and anyone choosing
    to use it is implicitly agreeing to that fact. In this sense, the DAO attacker
    had not broken any laws. To the contrary, the reentrancy attack used the software
    code that made up The DAO’s bylaws and turned it against itself.


    The decentralization camp believed that rewriting the blockchain to roll back
    the attacker’s sequestration of ETH in child DAOs would compromise the integrity
    of the blockchain. The blockchain, according to this line of thought, was supposed
    to be immutable and without any central authority, including the Ethereum Foundation.
    They were concerned the moral hazard of a small group of people rewriting the
    blockchain could open the door to other interventions, such as selective censorship.


    The two sides debated their positions passionately over social media and in news
    outlets. The process made famous the concepts of soft forks and hard forks. Forking
    blockchains — or any software code for that matter — was not new to Ethereum or
    The DAO, but it became the focus of the debate between the justice camp and the
    immutability camp.


    Meanwhile, a group of white hat hackers was working around the clock to try to
    hack the hacker. The white hat group consisted of people both for and against
    the hard fork, but they worked together, nonetheless, to perform some of the same
    attacks that had been identified before June 17 to move the stolen ETH into new
    contracts in hopes of returning it to its rightful owners.^([⁹](#fn9))


    The white hat team reached out to people who had made significant investments
    in The DAO to raise money for stalking attacks, in which they could follow the
    attacker into new DAOs with greater funds than the attacker was able to withdraw,
    giving them majority voting rights in the resulting DAO.'
