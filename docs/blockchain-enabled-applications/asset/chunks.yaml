    ## 关于作者


    ## 关于技术审校者


    # 1. 见证梦想家


    焦虑或许是描述 2008 年底主导投资者和公众对金融市场态度的最佳词汇。众多经济学家认为，2008 年的金融危机是大萧条以来最严重的一次金融危机。危机前的几年，不负责任的抵押贷款泛滥，金融监管与监督出现了大规模的系统性失灵。其后果之严重，以至于威胁到了大型金融机构的生存，各国政府不得不进行干预，救助主要银行。在本章中，我们将首先概述
    2008 年的金融危机及其后果：一个让新银行系统和比特币等替代货币得以蓬勃发展的环境。然后，我们将深入探讨驱动比特币的技术栈。值得注意的是，该技术栈的各个组件并非全新，而是通过一个非常精巧的设计整合在一起，从而构建了一个新系统。最后，我们将讨论人们对区块链日益浓厚的兴趣，这是一项重大的技术突破，有可能彻底改变多个行业。Imbolo
    Mbue 写了一本书（兰登书屋，2017 年），书名与本章相同，讲述了纽约的"梦想家"们经历金融危机以及他们的生活因此发生改变的故事。这本书记录了那些梦想建立一个更具韧性的金融体系的梦想家们。


    ## 范式转移


    革命往往看起来混乱，但这一次却在悄然酝酿，由一位（或一群）化名为中本聪、梦想改变金融世界的不知名人士领导。金融危机的责任可以归咎于很多方面；然而，共同点是那些用于维护整个系统完整性的基础金融和会计工具变得过于复杂，无法有效使用。信任，作为所有金融体系的终极粘合剂，在
    2008 年开始消失。自那以后，监管规则已发生改变，以防止类似情况再次发生；然而，很显然，交易对手之间的信任自动调节机制以及对其签订任何类型销售合同能力的透明度是迫切需要的。**交易对手**本质上是指金融交易中的另一方。换句话说，就是与卖方匹配的买方。在金融交易中，所涉及的众多风险之一被称为**交易对手风险**——即合同中*另一方*可能无法履行其协议义务的风险。前面提到的系统性失败现在可以从交易对手风险的角度来理解：交易中的双方都在积累巨大的交易对手风险，最终，双方都在合同条款下崩溃。想象一个涉及多方参与的类似交易场景，再想象这个场景中的每一个参与者都是一个主要金融机构、一家银行或一家保险公司，而它们又持有数百万的客户。这就是
    2008 年危机期间发生的情况。


    我们需要讨论的另一个问题是**双重支付**。我们将严格地再次在比特币的背景下讨论这个话题，但让我们先通过将其应用于金融危机来对这个概念有一个基本的理解。双重支付背后的原则是，已用于一笔交易的资源不能同时分配给另一笔不同的交易。这个概念对数字货币有明显的影响；然而，它也可以概括
    2008 年危机期间的核心问题。


    事情是这样开始的：贷款（以抵押贷款的形式）发放给了信用记录不佳、难以偿还贷款的借款人。这些高风险抵押贷款被出售给大银行的金融专家，他们通过将大量此类贷款集中在一起成组，将其打包成低风险的公共股票。当每笔贷款（抵押贷款）的风险不相关时，这种集中打包方式是可行的。大银行的专家们假设全国不同城市的房产价值会独立变化，因此打包并没有风险。事实证明这是一个巨大的错误。然后，这些打包好的抵押贷款组合被用来购买一种名为债务抵押债券（CDOs）的股票。CDOs
    被分成不同等级并出售给投资者。这些等级由金融标准机构进行评级，投资者根据这些评级购买最安全的等级。一旦美国房地产市场转向，就引发了多米诺骨牌效应，摧毁了路上的一切。尽管有评级，但
    CDOs 最终变得一文不值。打包的抵押贷款组合价值暴跌，所有正在四处销售的包裹瞬间化为乌有。在这整个复杂的交易链条中，每一笔销售都增加了风险，并在多个层面引发了双重支付。最终，系统达到了均衡，却发现存在巨大的缺口，并因此在重压下崩溃。以下是
    2008 年的简要大事记。该时间线是根据 Micah Winkelspech 在 2016 年分布式健康大会上的演讲编制的：


    - 1 月 11 日：美国银行收购陷入困境的 Countrywide

    - 3 月 16 日：美联储迫使贝尔斯登出售

    - 9 月 15 日：雷曼兄弟申请第 11 章破产保护

    - 9 月 16 日：美联储斥资 850 亿美元救助美国国际集团（AIG）

