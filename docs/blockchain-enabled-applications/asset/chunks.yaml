  trans: '

    Vyper 是一种通用的、面向合约的编程语言，编译后可生成 EVM（以太坊虚拟机）字节码，这与 `Solidity` 相似。使用 `Vyper` 的主要设计优势在于，它消除了编写智能合约过程中的诸多障碍，并以易于理解的方式呈现合约。作为通用原则，任何需要在
    EVM 上运行的代码都必须非常高效，以最大限度地减少智能合约执行所需的 Gas。必须注意，编写不佳的合约执行成本会更昂贵，甚至可能高得令人望而却步，导致 EVM
    终止该合约。为此，`Vyper` 在编写合约时遵循与 `Solidity` 相同的逻辑，但摒弃了面向对象编程范式的需求。`Vyper` 专注于一组有限的定义，这些定义仅适用于在区块链上进行微交易编程。让我们来讨论一下
    `Vyper` 的主要特性：


    - `Vyper` 不包含程序员熟悉的大部分面向对象编程结构：类继承、函数重载和递归功能已被移除。这些特性对于图灵完备性并非必需，并且会通过增加代码复杂性带来安全隐患。代码审查对于评估智能合约至关重要；然而，增加复杂性会进一步加大审计过程的难度。简化则能带来更可靠的审计。


    - 编写更易于理解的代码也能降低出错的可能性。从 `Vyper` 比 `Solidity` 提供更高安全性的角度来看，这种额外的安全层是通过开发者的编码实践来强制实现的。即便限制了如设置
    Gas 使用上限和溢出检查等功能，用 `Vyper` 编写的智能合约在可读性、可审计性和简洁性（因而也是安全性）方面依然表现出色。


    - `Vyper` 提供了一组用于编写智能合约的内置函数，虽然全面审查这些函数超出了本章的范围，但我们想重点介绍 `assert` 函数。如果某个条件未满足，`assert()`
    会抛出一个错误。它通常用在方法开头，以检查方法是否满足特定条件以便继续处理。如果不满足，交易将被回滚，合约终止。例如，想象一个众筹场景，可以通过检查时间戳来使用
    `assert()` 回滚合约。如果以太坊区块链上当前区块的时间戳超过了活动的截止日期，那么合约就应该终止，因为活动已经结束了。这样，`assert()`
    就成了一个非常简洁的函数，用于对合约代码施加条件。


    ## 开发者资源


    随着以太坊在过去几年中的发展，开发者使用该平台构建应用程序的兴趣也与日俱增。在本节中，我们将介绍一些可用于在以太坊生态系统中进行快速原型开发的开发者资源：


    - `Remix`：一个基于网页的 IDE，用于在以太坊上更快地编写和测试智能合约。它内置了对使用 `Solidity` 和 `Vyper` 编写合约的支持、用于扩展功能的插件管理器、单元测试以及一个区块链虚拟机。


    - `Ethereum Studio`：另一个基于网页的 IDE，适合新开发者学习如何构建和部署智能合约。`Ethereum Studio` 提供了项目模板、交易日志记录器以及一个内置的以太坊虚拟机，用于在以太坊平台上进行快速原型开发。


    - `OpenZeppelin SDK`：一套智能合约工具包，帮助构建、编译和部署智能合约，并在部署后与之交互。


    - `Embark`：一个用于构建去中心化应用（DApp）和智能合约的开发者平台。拥有用于部署合约的命令行界面、插件系统、交易浏览器以及一个活跃的开发者社区。


    - `ConsenSys Academy`：一个自定进度的在线以太坊开发者课程，全年开放报名。更多关于教育资源的内容将在后续章节介绍。


    - `Ethereum Stackexchange`：一个社区，可以提出任何与以太坊相关的问题，从平台开发到入门指南。


    - `Chainshot`：一个受邀参加的区块链开发训练营，专注于以太坊智能合约，其课程设置侧重于实际应用。

    '
- fmt: '### World Computer Model


    The Ethereum project has a grand vision of becoming a shared world computer with
    millions of accounts powered by the blockchain which becomes a backend for “smart-logging”
    of communications, contracts that provide the decentralized logic to be executed,
    and EVMs that act as the execution platform. But computation and processing are
    not enough; a computer must also be able to store information and allow for a
    mechanism for applications to communicate amongst each other. This world computer
    will operate in an Internet 3.0 era, where servers are no longer needed due to
    the decentralized nature of information flow. In this ambitious endeavor, the
    Ethereum blockchain is only one-quarter of the World Computer model. Let’s introduce
    the three other components:


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig5_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig5_HTML.jpg)


    Figure 4-5


    A tiered approach to the world computer model in Ethereum


    - **Whisper**: A secure message-passing protocol that allows decentralized applications
    on the blockchain to communicate with each other. This protocol relies on obfuscation
    and anonymization, similar to the Tor project (which provides anonymous web-browsing),
    where details regarding the message content, the sender, and the recipient are
    obscured. Additionally, this information cannot be gathered through packet analysis.
    The Whisper protocol is implemented on top of the `RLPx` transport protocol, a
    TCP-based transport protocol that is used internally by Ethereum nodes to communicate.
    There are a number of situations in which DApps need to communicate through a
    message bus; for instance, announcing a flash sale of a virtual asset. Whisper
    allows for easy broadcasting by using envelopes—encrypted packets that are sent
    and received by Whisper nodes. To that end, in an effort to avoid spam, a Whisper
    node must use a proof-of-work function to send a message. The work done is proportional
    to the size of the broadcast being transmitted. Ultimately, Whisper will provide
    an automated means of communication between user accounts or apps acting on behalf
    of the user accounts, as shown in Figure [4-5](#430562_2_En_4_Chapter.xhtml#Fig5).


    - **Swarm**: A decentralized storage and distribution service for DApp code, user
    data, blockchain data, and state data available to the Ethereum blockchain. In
    the future, Swarm will be able to provide Web 3.0 services such as media streaming,
    decentralized databases, and state channels. The main problem that Swarm is trying
    to solve is that currently, storing large amounts of data on the blockchain remains
    very expensive. This is why any DApps that need storage use an off-chain alternative.
    The idea behind Swarm is straightforward: a peer-to-peer network of collaborating
    nodes is used to pool together resources. This P2P network acts as a distributed
    cloud storage system with ample opportunity for data redundancy. The network is
    self-sustaining because of the associated blockchain that can incentivize nodes
    based on trading resources for payment. There are three main components of the
    Swarm storage protocol: chunks, references, and manifests. Chunks are the fundamental
    unit of storage and retrieval in Swarm: pieces of data that have a maximum size
    of 4K, linked to an address. References are unique identifiers of a file that
    can be used by a frontend client to retrieve the contents. Finally, a manifest
    is a data structure that describes a file collection along with paths and corresponding
    hashes to retrieve content. Using Swarm makes it possible to distribute data across
    the network and to replicate redundancy in a decentralized fashion (using nodes)
    without having to host a centralized server. Multiple nodes in the network can
    be incentivized to replicate chunks and use manifests to reference the data, much
    like a RAID configuration, eliminating the need for hosting centralized servers.


    - **Smart contracts**: The final major pillar of the Ethereum platform. Provide
    programmatic access to the blockchain and provides the logical framework to power
    applications that will eventually run on the world computer.


    In Figure [4-5](#430562_2_En_4_Chapter.xhtml#Fig5), we see a tiered approach to
    the world computer model. User accounts (or simply users) on the world computer
    are fundamental entities, therefore they are the first tier. The second tier is
    the blockchain, which serves as a communication serial bus between the different
    components in the network; this is the second tier. The third tier is the logical
    framework called smart contracts that lives on the blockchain and provides the
    computational capabilities to the world computer. Some of these contracts may
    require external storage for output and use Swarm to coordinate storage; this
    is the fourth layer. Finally, looking back at the first tier, we have the message-passing
    protocol called Whisper to facilitate user-to-user or application-to-application
    communication. More than a philosophical vision or a technological blueprint,
    the concept of a world computer and Internet 3.0 has some far-reaching implications
    for how content is controlled and distributed across the Web. Taylor Gerring from
    Ethereum talks very eloquently ([`https://blog.ethereum.org/2014/08/18/building-decentralized-web/`](https://blog.ethereum.org/2014/08/18/building-decentralized-web/))
    about building this dream:


    > *As economics of the Ethereum ecosystem mature such that open contracts for
    lowest-rate storage develop, a free market of content hosting could evolve. Given
    the nature and dynamics of P2P applications, popular content will readily scale
    as the swarm shares, rather than suffering from the buckling load of siloed servers.
    The net result is that popular content is delivered faster, not slower.*


    > *This metamorphosis will offer developers an opportunity to build the next-generation
    of decentralized, private, secure, censorship-resistant platforms that return
    control to creators and consumers of the next best idea. Anyone with a dream is
    free to build on this new class of next-generation decentralized web services
    without owning a credit card or signing up for any accounts.*


    > *Although we are not told to or expected to, we have an imperative to cherish
    and improve the very shared resources that some wish to disturb, manipulate, and
    control. Just as no single person fully understands the emerging internet collective
    intelligence, we should not expect any single entity to fully understand or maintain
    perfectly aligned motives. Rather, we should rely on the internet to solve the
    problems of the internet.*


    ### Layer 2 Upgrades


    The classic Ethereum protocol and network described in this chapter so far belongs
    to Layer 1. To reach the ideal world computer model, scalability and security
    upgrades are needed so that more applications can interact with blockchain and
    complex code can be executed. These upgrades are all part of Layer 2, which will
    begin rolling out in 2020. There are four components of Layer 2 that we discuss
    here: sharding, beacon chain, state channels, and plasma. The explanation for
    each component will lead to the next one in order.'
