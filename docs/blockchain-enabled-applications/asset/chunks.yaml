- fmt: '# Tokens and Value Creation


    To understand the concept of tokens, we first need to understand the context in
    which they operate—"fat” protocols (`https://avc.com/2017/08/how-to-value-crypto-assets/`).
    At Consensus 2017, Naval Ravikant talked about the idea of “fat” protocols and
    the fundamental differences between internet companies and the next generation
    of startups building on the blockchain. Currently, the internet stack is composed
    of two slices, a “thin” slice of protocols that power the World Wide Web and a
    “fat” slice of applications that are built on top of the protocols. Some of the
    largest internet companies, such as Google and Facebook, captured value in the
    application layer, but then had to invent new protocols and an infrastructure
    layer to actually scale. When internet companies reach that size, they have validated
    their core business model and have enough resources to allocate toward the creation
    of new protocols.


    Blockchain-based companies operate on a different stack with a “thin” slice of
    application layer and a “fat” slice of protocol layer. The value concentrates
    in the protocol layer, and only a fraction spills over to the application layer.
    Joel Monégro and Balaji S. Srinivasan (`https://www.usv.com/writing/2016/08/fat-protocols/`)
    propose two probable reasons for the large interest and investment in the protocol
    layer:


    *   **Shared data layer:** In a blockchain stack, the nature of underlying architecture
    is such that key data is publicly accessible through a blockchain explorer. Furthermore,
    every member of the network has a complete copy of the blockchain with which to
    reach consensus on the network. A pertinent example of this shared data layer
    in practical usage is the ease with which a user can switch between exchanges
    such as Poloniex and Kraken, or vice-versa. The exchanges all have equal and free
    access to the underlying data or the blockchain transactions.


    *   **Access tokens:** Tokens can be thought of as analogous to paid API keys
    that provide access to a service. In the blockchain stack, the protocol token
    is used to access the service provided by the network, such as file storage in
    the case of Storj. Historically, the only method of monetizing a protocol was
    to build software that implemented the new protocol, which was superior to the
    competition. This was possible for research divisions in well-funded companies;
    however, in academia, the pace of research was slower in the early days because
    the researchers creating those protocols had little financial gain. With tokens,
    the creators of a protocol can monetize it directly through an Initial Coin Offering
    (ICO) and benefit more as the token is widely adopted and others build services
    on top of the new protocol.


    Due to proper incentives, a readily available data-sharing layer, and application
    of tokens beyond the utility of a currency, developers are spending considerable
    time on the underlying protocols to solve difficult technical problems. As a result,
    startups building on the blockchain stack will inevitably spend more time on the
    “fat” protocol layer and solve technical challenges to capture value and differentiate
    themselves from a sea of Ethereum tokens.


    Recently, with more tokens up and coming in the Ethereum ecosystem, cross-compatibility
    has become a concern, and to address this issue a new specification called ERC20
    has been developed by Fabian Vogelsteller. ERC20 is a set of standards for how
    tokens can be implemented on the Ethereum network. It describes six standard functions
    that every access token should implement to be compatible with DApps across the
    network. ERC20-based tokens can seamlessly interact with other smart contracts
    and decentralized applications on the Ethereum blockchain. Tokens that only implement
    a few of the standard functions are considered partially ERC20-compliant. Even
    partially compliant tokens can easily interface with third parties depending upon
    which functions are missing.


    > **Note**

    > Setting up a new token on the Ethereum blockchain requires a smart contract.
    The initial parameters and functions for the token are supplied to the smart contract
    that governs the execution of the token on the blockchain.


    In order to be fully ERC20-compliant (`https://eips.ethereum.org/EIPS/eip-20`),
    a developer needs to incorporate a specific set of functions into their smart
    contract that will allow the following actions to be performed on the token:


    *   Get the total token supply: `totalSupply()`

    *   Get an account balance: `balanceOf()`

    *   Transfer the token: `transfer()`, `transferFrom()`

    *   Approve spending of the token: `approve()`, `allowance()`


    When a new token is created, it is often pre-mined and then sold in a crowdsale
    also known as an Initial Coin Offering. Here, a *pre-mine* refers to allocating
    a portion of the tokens for the token creators and any parties that will offer
    services for the network (such as running full nodes). Tokens have a fixed sale
    price. They can be issued and sold publicly during an ICO at the inception of
    a new protocol to fund its development, similar to the way startups have used
    Kickstarter to fund product development. As the popularity of ERC20 tokens has
    risen, more challenges have become apparent. In a previous implementation, the
    `transfer` function only worked one way: if a user accidentally sent tokens to
    a smart contract, there was no way to recover the tokens, even if the contract
    owner wanted to return the tokens. As a result, technical errors have resulted
    in the loss of millions of dollars during pre-sale events. Ethereum developers
    have since fixed the `transfer` function by introducing the `transferFrom()` function.
    In addition, new specifications have been proposed as potential candidates to
    replace ERC20 or introduce new token types. Let’s review three of these specs:


    *   **ERC223:** A specification (`https://github.com/ethereum/eips/issues/223`)
    fixing the `transfer` function error from a previous ERC20 implementation. More
    specifically, this implementation combines the `transfer` and `transferFrom` functions
    into a single `transfer` function that can cancel transactions.


    *   **ERC721:** A specification (`https://eips.ethereum.org/EIPS/eip-721`) that
    introduces the concept of tokens as assets and collectibles. The original ERC20
    specification creates interchangeable tokens such that all tokens have the same
    value. However, ERC721 allows for the creation of unique tokens that may have
    a higher value. This idea was picked up by a blockchain gaming app called Cryptokitties,
    where attributes such as age, color, and breed make the token very rare and a
    valuable asset.


    *   **ERC948:** A specification (`https://github.com/ethereum/EIPs/issues/948`)
    describing a subscription model for businesses that have a physical presence and
    want to extend to the blockchain by issuing tokens as digital subscriptions.'
