  trans: '

    ### 交易框架


    该交易框架可类比为 **Stripe**：一个用于在 Golem 上实现应用货币化的 API。众筹结束后，网络将使用 `GNT`（Golem 网络代币）处理用户间的所有交易，以补偿软件开发者和计算资源提供者。该交易框架构建于以太坊之上，因此继承了底层支付架构，并扩展出高级支付方案，例如**纳米支付机制**和**交易批量处理**。这里提到的两项创新均为
    Golem 独有，接下来我们将讨论它们为何对网络不可或缺。


    为了驱动微服务，Golem 需要处理海量的小额交易。单次支付的价值极低；这类支付也被称为“纳米支付”。然而，使用纳米支付存在一个难题：交易费用不能超过纳米支付本身的价值。为了解决这个问题，Golem
    采用了交易批量处理。该方案将若干纳米支付聚合起来，作为单笔以太坊交易一次性发出，从而降低所产生的交易费用。例如，Golem 开发者指出，在一笔交易中处理十次支付的成本，大约相当于分十笔交易处理同一金额的一半。通过批量处理多笔交易，为微服务按单位用量（按节点或按小时）付费的用户将能享受到显著降低的交易费用。


    > **注意**

    > 对于提供者而言，另一种驱动微服务的模式是基于信用的按单位托管付费。在此模式下，请求者存入带有时间锁的 `GNT` 作为押金，提供者在一天结束时自动扣除使用费用，剩余信用额度将返还给请求者。


    在 Golem 中，纳米支付运作于“一对多”的微支付场景中，即一个请求者向多个协助完成计算任务的提供者支付。微服务的支付规模约为 0.01 美元，对于如此小的金额，即便在以太坊上，交易费用也相对高昂。这里的思路是：请求者（付款方）不再进行单笔
    0.01 美元的交易，而是发行一张中奖概率为 1/100、奖金为 1 美元的彩票。这张彩票对于请求者而言价值 0.01 美元，其优势在于，平均每 100 张彩票中只有一张会触发实际交易。这是一种支持纳米交易的概率性机制，但如果计算的任务数量较少，则无法保证某个具体的
    Golem 节点能得到充分补偿。Bylica 等人提供了数学基础，以确保随着网络扩展、请求者和提供者数量增加，这种彩票系统产生的收入能够公平分配。本质上，随着请求者发布的任务数量增加，一个节点从概率性彩票奖励中获得的收入，将趋近于它通过单笔交易收取费用所能获得的金额。


    对于提供者而言，Golem 将要实现的彩票系统比纯粹的概率性方案具有更高的可预测性。提供者可以确信，在用于奖励单个任务参与者的所有彩票中，不存在哈希冲突，且只有一张是中奖彩票。此外，如果有
    100 个提供者参与彩票支付，那么纳米支付协议将保证该任务只需支付一次。Bylica 及其合作者讨论了几种反索赔机制，以防止恶意实体冒充中奖者并套现。图 7-6
    简要描绘了彩票流程。任务完成后，付款方发起一个新的彩票来支付参与其中的提供者。付款方创建彩票描述 `L`，其中包含唯一的彩票标识符，并计算其哈希值 `h(L)`。该哈希值被写入以太坊合约存储。付款方还将彩票描述
    `L` 广播到 Golem 网络，以便每个参与节点可以验证支付金额是否正确，并确认 `h(L)` 确实已写入以太坊存储。彩票中奖者可以通过交叉引用给定的描述
    `L` 和一个除彩票智能合约外无人知晓的随机值 `R` 来唯一确定。经过一定时间后，如果奖励未被申领，智能合约会（根据 `L` 和 `R`）计算出获胜提供者的地址，并将奖励从合约关联的存储中转移给获胜者。彩票的哈希值
    `h(L)` 也会从合约存储中移除，新的彩票支付周期随即开始。


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig6_HTML.jpg](img/430562_2_En_7_Fig6_HTML.jpg)


    **图 7-6** 基于纳米支付的彩票支付系统


    从宏观层面看，Andrzej Regulski 撰写了一篇文章，阐述了 `GNT` 背后的部分经济原则，以及这种交易框架如何推动代币的长期增值（[`https://blog.golemproject.net/the-economics-of-the-golem-network-token/`](https://blog.golemproject.net/the-economics-of-the-golem-network-token/)）。以下是其文章中最相关的段落：


    > *要与 Golem 网络交互，必须使用 GNT。最初，它的唯一作用是实现价值从请求者向提供者以及软件开发者的转移。随后，交易框架将允许为代币赋予更多属性，例如，要求押金必须以
    GNT 存储。*


    > *GNT 的数量（即供应量）将永久固定在其在 Golem 众筹期间生成的水平。之后不会再有新的 GNT 被创造出来。*


    > *代币的贬值或增值对网络运营是中性的，因为用户可以自由地为 Golem 中的计算资源设定任何出价/要价，从而适应 GNT 价值的任何波动。*


    > *固定数量的代币将不得不满足日益增长的交易需求，从而推高对 GNT 的需求。在合理假设代币流通速度（即特定时期内单位代币的交易次数）保持恒定的前提下，可以从货币数量论推导出这一结论。这反过来意味着，Golem
    网络的整体成功和增长，预示着 GNT 的长期增值。*

    '
- fmt: "This payment framework can also be used as a fallback mechanism for conflict\
    \ resolution. If a task challenge remains open after going through the traditional\
    \ Golem mechanics, we would need a method for hard resolution (as we saw in the\
    \ Ethereum Computation Markets section). Here, we can use a TrueBit-style “trial”\
    \ for final resolution. TrueBit is a smart contract–based dispute-resolution layer\
    \ built for Ethereum. It integrates as an add-on on top of the existing architecture\
    \ for Ethereum projects such as Golem. The design principle for TrueBit is to\
    \ rely on the only trusted resource in the network to resolve a dispute: the miners.\
    \ A hard resolution using TrueBit relies on a verification subroutine involving\
    \ limited-resource verifiers known as judges.\n\nIn TrueBit’s verification game,\
    \ there are three main players: a solver, a challenge, and judges. The solver\
    \ presents a solution for a task, a challenger contests the presented answer,\
    \ and the judge decides whether the challenger or the solver is correct. The purpose\
    \ of using the verification subroutine is to reduce the complexity of on-chain\
    \ computation. This is done as the game proceeds in rounds, where each round narrows\
    \ down the scope of computation until only a trivial step remains. This last step\
    \ is executed on-chain by a smart contract (judge), which makes the final verdict\
    \ on which party is correct. Note that the judges in this scheme are constrained\
    \ in terms of computational power. Therefore, only very simplistic computations\
    \ are ultimately carried out on-chain for the judge to make a ruling. A visual\
    \ guide to the verification game is provided in Figure [7-7](#430562_2_En_7_Chapter.xhtml#Fig7).\n\
    \n> **Note**\n> \n> The verification game works iteratively, with a reward structure\
    \ benefiting the verifiers (challengers) who diligently search for errors. Accurate\
    \ detection and eventual verification of errors results in challengers’ being\
    \ rewarded with a substantial jackpot.\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig7_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig7_HTML.jpg)\n\
    \n**Figure 7-7** Verification game\n\nTo begin the first round of this game, the\
    \ solver must commit to a segment of steps (computations) performed over a specific\
    \ time window. The solver selects computation steps equally spaced in time across\
    \ the provided window and creates a Merkle-tree mapping to the full internal state\
    \ of the network. The Merkle roots of these trees are broadcasted to the blockchain.\
    \ The challenger now performs a binary search through the Merkle trees until she\
    \ discovers the first instance that mismatches with her own expectations. That\
    \ is to say, she finds a step *i* where the Merkle root is not updated as the\
    \ state transitions from step *i* to *i*+1. Given step *i*, the challenger can\
    \ request a Merkle proof for memory access before and after this step. In this\
    \ context, a Merkle proof is a path from the step *i* to the Merkle root together\
    \ with all the siblings (capturing the state of the network at step *i*). Note\
    \ that the siblings are identical before and after (siblings at steps *i* and\
    \ *i*+1); only the data for step *i* will change. At this point, the judge can\
    \ run step *i* and check whether updating the state to *i*+1 also updates the\
    \ Merkle root correctly. The judge can provably discover which party is wrong\
    \ in this step and broadcast the verdict. In the end, either the cheating solver\
    \ will be punished, or the challenger will pay for the resources consumed by the\
    \ false alarm.\n\nTrueBit is an advanced on-chain execution mechanism compared\
    \ to the on-chain verification implemented in ECM. It offers the ability to verify\
    \ computations at a lower cost than running the full instruction because only\
    \ one step is executed on-chain. By using TrueBit as a dispute-resolution layer\
    \ for off-chain computations, smart contracts can enable third-party programs\
    \ to execute well-documented routines in a trustless manner. Even for advanced\
    \ machine learning applications such as deep learning that require terabytes of\
    \ data, as long as the root hash of the training data is encoded in the smart\
    \ contract, it can be used to verify the integrity of off-chain computations.\
    \ The reason TrueBit works for large datasets is simply due to the Merkle roots’\
    \ mapping the state of the network at a given time *t*, and a challenger’s ability\
    \ to perform a binary search. For a project like Golem aiming to achieve HPC toward\
    \ a variety of use cases, TrueBit can enable large datasets to be used off-chain\
    \ with an on-chain guarantee of accurate outputs.\n\n> **Note**\n> \n> Off-chain\
    \ task execution raises concerns about network integrity. Layer 2.0 upgrades to\
    \ Ethereum are raising overall network security and enabling trustless off-chain\
    \ task execution. To that end, TrueBit is being considered as a candidate for\
    \ Layer 2.0 upgrades.\n\nThere are three new use cases being considered with the\
    \ release of Clay Golem:\n\n*   **gWasm:** Webassembly (Wasm) is an operating-system-agnostic\
    \ format for distributing binary files that execute with near-native performance\
    \ on various platforms. `gWasm` is a wrapper for integrating new applications\
    \ into the Golem network. The premise of `gWasm` is that if an app can be compiled\
    \ to Wasm, it can be distributed to the Golem network. In early development.\n\
    \n*   **gLAMBDA:** An upcoming scientific use case for Golem. Applying parallelization\
    \ to perform RASPA simulations on the Golem network (in a decentralized fashion).\
    \ RASPA is a general-purpose simulation package that can be used in simulations\
    \ of molecules in gases, fluids, and carbon nanotubes.\n\n*   **Video transcoding:**\
    \ Another upcoming use case for Golem. Focuses on digital conversion of large\
    \ video files from one format to another."
