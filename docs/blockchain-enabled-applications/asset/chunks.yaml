    This score can eventually become an attribute of the holder’s wallet, and in this
    manner it can be referenced externally from the blockchain. The post-processing
    unit becomes important after the clinical trial has matured to generate enough
    updates that can be compiled in one comprehensive overview. The purpose of this
    unit would be to automatically perform quality control statistical calculations
    and share the updates by following instructions in a script that was added to
    the blockchain in the beginning of the trial. In a similar fashion, the post-processing
    unit will compile a final summary and attach that to the institution’s page, along
    with all the updates shared from the clinical trial.


    Note


    It must be noted that post-processing and data storage are all functions done
    off the blockchain. No calculations or data manipulations are performed on the
    blockchain. We want to limit the blockchain-executable code as much as possible
    to only the necessary primitives. The only tools that interact with transactions
    or metadata on the blockchain are in place to update the distributed state of
    a variable or parameter.


    In the last few years, more-significant progress has been made in building reputation
    systems that are specific for scientific efforts, including open publishing and
    data deposition. Three such efforts are reviewed here:


    *   Augur is a prediction platform built on top of the Ethereum blockchain as
    an ERC-20 token. Augur is powered by a token of reputation called REP that is
    earned as a reward for accurate reporting on the platform. Members of the network
    have an incentive to earn reputation (REP) by participating in accurate reporting
    on outcome of events. Over time, a record of REP building among users leads to
    the emergence of a reliable set of users that are more likely to make accurate
    predictions: a group-think model where wisdom of the crowd takes a productive
    shape in predicting outcomes. Augur has four components that allow for propagation
    of reputation on the network: a platform for members from the network to submit
    predictions toward an outcome, a scoring mechanism to reward points for accurate
    predictions, a consensus framework to gather the points into a long-term parameter
    such as reputation, and, finally, a group of overseers who maintain network security
    and integrity. These characteristics also make Augur suitable for a new generation
    of scientific hypotheses/predictions in a decentralized market.


    *   The Academic Endorsement System (AES) is built on the blockchain as a reputation
    system that uses Academic Endorsement Points (AEP), as compared to Augur, which
    uses REP. AEP are awarded to scientific works that are worthy of endorsement and
    public promotion. But compared to Augur, AES is more comprehensively built for
    scientific publications and endeavors. The amount of AEP awarded to a research
    item is based on AEP received in the past. This is a premium awarded to researchers
    who have produced works that received significant endorsements. In this manner,
    researchers who produce high-quality work receive more AEP and are incentivized
    to share more quality work. The use of AEP as a global reputation parameter can
    someday be used by journals along with more traditional citation metrics such
    as H-index.


    *   PEvO (Publish and Evaluate Onchain) is a Steem-based decentralized social
    media platform where content creators can communicate directly with authors of
    scientific studies. In this platform, authors can share updates, upload new content,
    reply to comments, and integrate reviews into continuous updates to the research.
    This creates an extension of a published paper so it becomes a living document,
    and updates can be tracked on the blockchain powering Steem. In addition, interactions
    on PEvO result in a payout (in the form of tokens) to the authors. This incentivizes
    authors to participate in discussions, and meaningful conversations are helpful
    to the broader scientific community.'
  trans: "\n图 8-5 从区块链记录彩色币协议中铸币者与持有者角色之间的彩色币交易开始。每当持有者提供更新且铸币者对其进行评估时，这些彩色币交易便发生。在首次更新后，铸币者将\
    \ `rep_score` 作为返回的彩色币交易的一部分发送出去，以继续临床试验的更新流程。此时，声誉会在每次交换中被附加到元数据中，而 `rep_score`\
    \ 也会随之每次修订。该分数最终可能成为持有者钱包的一项属性，并以此方式在区块链外部被引用。当临床试验成熟到能够生成足够多的更新，并可将这些更新汇编成一份全面概述时，后处理单元便变得至关重要。此单元的作用是自动执行质量控制统计计算，并遵循临床试验开始时添加到区块链的脚本中的指令来分享更新。类似地，后处理单元将汇编一份最终摘要，并将其附加到机构的页面上，同时附上临床试验分享的所有更新。\n\
    \n> **注意**  \n> 必须指出，后处理和数据存储均为链下完成的功能。区块链上不执行任何计算或数据操作。我们应尽可能将区块链可执行代码限制在仅包含必要原语的范围内。唯一与链上交易或元数据交互的工具，是用于更新变量或参数分布式状态的那些工具。\n\
    \n在过去的几年里，在为科研工作（包括开放出版和数据存储）构建专门的声誉系统方面已取得更重要的进展。以下回顾了三个此类项目：\n\n* **Augur**\
    \ 是一个基于以太坊区块链构建的预测平台，以 `ERC-20` 代币形式存在。Augur 由一种名为 `REP` 的声誉代币驱动，该代币因在平台上进行准确报告而作为奖励获得。网络成员通过参与对事件结果的准确报告来赚取声誉（`REP`），这成为一种激励措施。随着时间的推移，用户间\
    \ `REP` 积累的记录会催生出一组可靠用户，他们更有可能做出准确预测：这是一种群体思维模型，其中群体智慧在预测结果时呈现出富有成效的形态。Augur 包含四个组件，用于在网络上传播声誉：一个供网络成员提交结果预测的平台、一个为准确预测奖励积分的评分机制、一个将积分汇总为声誉等长期参数的共识框架，以及最后负责维护网络安全和完整性的监督者群体。这些特性也使得\
    \ Augur 适合在一个去中心化市场中用于新一代科学假设/预测。\n\n* **学术背书系统（AES）** 是构建在区块链上的一个声誉系统，它使用学术背书积分（`AEP`），而\
    \ Augur 则使用 `REP`。`AEP` 被授予那些值得背书和公开推广的科学成果。但与 Augur 相比，AES 更全面地针对科学出版物和科研工作而构建。授予某个研究项目的\
    \ `AEP` 数量基于其过去获得的 `AEP`。这是一种对曾产出获得大量背书成果的研究人员的奖励。通过这种方式，产出高质量工作的研究者获得更多 `AEP`，并因此更有动力分享更多高质量成果。`AEP`\
    \ 作为一个全局声誉参数，未来或许能被期刊与更传统的引文指标（如 `H-index`）一同使用。\n\n* **PEvO（链上发布与评估）** 是一个基于\
    \ Steem 的去中心化社交媒体平台，内容创作者可以直接与科学研究作者沟通。在此平台上，作者可以分享更新、上传新内容、回复评论，并将评审整合到研究的持续更新中。这创造了一种已发表论文的扩展形式，使其成为一份“活文档”，并且更新记录可以在驱动\
    \ Steem 的区块链上被追踪。此外，在 PEvO 上的互动会为作者带来报酬（以代币形式）。这激励作者参与讨论，而有意义的对话对整个科学界都有帮助。\n"
- fmt: '# Pharmaceutical Drug Tracking


    The final use case in this chapter covers tracking pharmaceutical drugs via a
    supply-chain management framework. Prescription drug monitoring programs are an
    essential element for controlling drug shopping. The Mayo Clinic defines drug
    shopping as a patient obtaining controlled substances (most often narcotics) from
    multiple healthcare practitioners without the clinician’s knowledge of the other
    prescriptions that the patient has. This leads to drug abuse or sales on a large-scale.
    The Mayo Clinic attributes drug shopping to the following three factors:


    * **Poor timeliness of data:** How often does a pharmacy or provider upload prescription
    data into their existing centralized system? A blockchain-based backend would
    make drugs associated with all transactions available instantly to all members
    of the network.

    * **Reliability:** Centralized databases have a single point of failure, as compared
    to the blockchain, which is decentralized by nature, and therefore the data does
    not rest on a single database, making it more reliable.

    * **Complexity of data retrieval:** The current model of data retrieval and compatibility
    with existing hospital systems is completely broken. Often times, hospitals are
    not synced up to the databases being used by pharmacies, and updating is an arduous
    task. Blockchain makes the process universal by providing a common backend to
    read for external services.


    In this system, when a clinician writes a script for a prescription, the provider
    can check the blockchain to find the patient record for any currently active prescriptions.
    This can help the clinician determine whether the patient is asking for a prescription
    from multiple sources or whether another family member is getting the same prescription.
    An active prescription from a different provider would automatically invalidate
    the request for a new one, and this can be encoded in the network as a double-spending
    request. Otherwise, the transaction will go through and the pharmacy will receive
    a request to provide medication to the patient. The requesting provider and patient
    can sign the transaction, allowing for better tracking all the way through the
    care of a particular patient. Although this system seems simple, it fulfills most
    of the requirements for a Drug Supply Chain Security Act (DSCSA)–compatible system
    that can be implemented across providers. There are some efforts under way by
    major blockchain players such as IBM and Deloitte blockchain lab to control the
    opioid over-prescription epidemic. Recently, some startups have sprung up that
    are focused solely on pharma drug tracking using the blockchain.


    Even though supply-chain management fits the blockchain infrastructure most closely
    and out-of-box, this field is very new and the technology is immature. The future
    of drug tracking and open science looks much more promising with new technologies
    enabling layers of communication that were never possible before. Blockchain,
    if nothing more, has been an immense catalyst of new innovation in open scientific
    inquiry and discourse.


    At the time of writing, US FDA is partnering with UCLA Health to launch a pilot
    study called `BRUINchain`. The results from this pilot were published in *Blockchain
    for Healthcare Today*, and we want to share some insights written by Ben Taylor
    from `LedgerDomain` in a blog post:


    > *As part of a peer-reviewed study commissioned by the US FDA and* published
    in *Blockchain in Healthcare Today* *(*[*https://doi.org/10.30953/bhty.v3.134*](https://doi.org/10.30953/bhty.v3.134)*),
    `LedgerDomain` and UCLA Health joined forces to deploy and test `BRUINchain`,
    a last-mile blockchain-driven solution used by real caregivers to help deliver
    lifesaving medications. The study is among the first of its kind to reveal exactly
    how blockchain could save pharmacies billions of dollars in labor and safety stock
    costs alone. In this post I’d like to reflect on the key takeaways from the study
    and how we can map them onto the new health landscape.*


    > *Background on `BRUINchain` is available* here *(*[*https://www.youtube.com/watch?v=mppc2Qvqrdc*](https://www.youtube.com/watch%253Fv%253Dmppc2Qvqrdc)*).*


    > **Current State of Pharmaceutical Supply Chain**


    > *In today’s pharmaceutical supply chain, each transacting party typically manages
    its own database systems. These private databases allow each party to minimize
    external security threats while maximizing internal data consistency. However,
    this also means that there’s no shared global system of record representing the
    single source of truth describing the flow of items through the pharmaceutical
    supply chain. This leaves the supply chain as a whole [lot] more vulnerable to
    common attack vectors such as man-in-the-middle or spoofing.*


    > **Why Blockchain for Pharmaceutical Supply Chain?**


    > *In three years, under the Drug Supply Chain Security Act (DSCSA), the US pharmaceutical
    supply chain will be brought together by an electronic, interoperable system to
    identify and trace prescription drugs as they’re distributed throughout the country.
    One of the core requirements of the DSCSA is that prescription medications must
    have a unique product identifier, which takes the form of a 2D barcode.*


    > *We realized that these federally mandated barcodes could be the foundational
    information building block for a common data model. Combined with blockchain,
    this could enable a system of record that would lessen the need to trade data
    integrity and privacy for global visibility and interpretability. In this way,
    blockchain can be a source of universal truth for hundreds of pharmaceutical and
    biotech enterprises and their vendors to work collaboratively and communicate
    with hundreds of wholesalers and tens of thousands of dispensers.*


    > **The BRUINchain Pilot Application**


    > *The keystone of our study was `BRUINchain`, a blockchain-based mobile solution
    and notification system designed to track and trace changes in custody of drug
    within a dispenser organization using FDA-stipulated barcodes. By combining blockchain
    with commercial off-the-shelf technology, `BRUINchain` makes it possible to track
    and verify drugs in a busy hospital or neighborhood pharmacy.*


    > *From the receiving bay to patient administration, caregivers scanned unique
    2D drug barcodes using the `BRUINchain` mobile app. During their journey, drugs
    passed a series of checks until they were administered to the patient. New barcodes
    were routed to a trading partner for verification, and the drug was held back
    from being administered. At any time, the prescriber could view the progress of
    the drug through the pharmacy into the clinic.*


    > **BRUINchain Learnings and Outcomes**


    > *The `BRUINchain` pilot provided us with important insights into what a larger
    implementation of a DSCSA verification system would look like. It also validated
    the use of commercial off-the-shelf technology in a pharmacy that relies heavily
    on legacy systems. Barcode scanning was nearly 100% effective with commercial
    off-the-shelf technology. Drugs could be tracked at a highly granular level. The
    system was able to track expiration dates, verify barcodes, and make it easier
    for pharmacists to inspect and report problems.*


    > *During the study, we found that the rollout costs for DSCSA compliance could
    be massively reduced by a real-time blockchain system—a $183 million annual savings
    to dispensers in the United States, as well as a major bulwark against bad or
    fraudulent transactions. Real-time verification would also minimize the amount
    of safety stock that dispensers need to retain in the event of potential quarantine
    events, freeing up $20 billion in inventory.*'
