- fmt: '# 比特币交易与钱包机制


    在图[3-4](#430562_2_En_3_Chapter.xhtml#Fig4)中，Alice 从她的钱包发起交易，该钱包包含多个地址。每个地址都拥有一定数量的比特币余额（与该地址关联的所有`UTXO`的总和），这些余额可用于创建新交易。然后使用
    Alice 的私钥对交易进行签名，交易进入挖矿阶段，并被打包到一个候选区块中。挖矿结束后，获胜的矿工在网络中宣布该区块，区块被添加到区块链中。交易传播到 Bob，他现在可以使用自己的私钥解锁交易输出金额并使用它。`UTXO`、签名和脚本锁定/解锁的概念，让我们更深入地理解区块链作为去中心化账本如何保持内部一致性。


    在图[3-4](#430562_2_En_3_Chapter.xhtml#Fig4)中，我们引入了一个新概念——钱包，它可以用来发起交易。简单来说，钱包本质上是一个**比特币地址
    + 用于解锁钱包的私钥**。钱包现在是比特币核心代码的标准组成部分，主要为用户提供三个用途：


    *   **创建交易**：用户可以使用钱包的图形界面轻松创建交易。

    *   **维护余额**：钱包软件追踪与地址关联的所有`UTXO`，并向用户提供最终余额。

    *   **维护多个地址**：在钱包内，用户可以拥有多个地址，每个地址可与特定交易关联。


    从某种意义上说，地址是比特币网络中所有权的唯一手段。`UTXO`与特定地址关联（作为账户余额），用户可以创建任意数量的地址。我们在图[3-4](#430562_2_En_3_Chapter.xhtml#Fig4)中看到，Alice
    的钱包中有三个地址，每个地址都可以配合她的私钥使用。除了软件钱包之外，还有其他类型的钱包。图[3-4](#430562_2_En_3_Chapter.xhtml#Fig4)使用的是软件钱包，但其他两种钱包类型（移动钱包和冷存储物理钱包）的过程类似。


    移动钱包主要是为了便利而设计的，也是通往使用比特币等加密货币进行移动支付世界的门户。这些钱包通常充当完整钱包的独立但小型化版本，允许用户随时随地访问余额和进行交易。作为钱包的应用通常是在开源环境中设计的，因此它们也有助于将开发者和高级用户聚集到社区中。冷存储钱包是一种更长期的比特币存储方法。曾出现过钱包软件损坏，或用户记不住解锁钱包的密钥，导致他们的账户余额实际上变得无用的情况。钱包密码没有直接的恢复机制。物理存储背后的理念是创建一个新钱包，并向该钱包上的一个新地址发送一笔交易。现在，新钱包可以被备份并保存到物理设备（如
    U 盘）上，并安全存放。一旦该交易在区块链上得到验证，你的比特币就可以随时从 U 盘中安全取回。这样做可以防止任何意外发生，并将你的货币与你用于进行交易或挖矿的主钱包分开。一些开发者更进一步，创建了纸钱包，其中地址被编码为二维码，并且该特定钱包的私钥也以另一个二维码的形式打印在纸上。


    **注意**


    如何在不自己编写脚本或代码的情况下，实际看到你的交易在比特币网络上进行？在比特币（以及大多数加密货币）中，有一个称为区块链浏览器的功能，通常是一个网站，所有来自比特币网络的交易都可见。你可以获取关于交易的各类详细信息，例如交易来源、金额、区块哈希或收到的确认次数。


    ## 简单支付验证（SPV）


    到目前为止，我们讨论了区块的结构、交易列表、交易如何在用户之间发生，以及它们如何被记录在区块链上。区块本质上是链接在区块链上的数据结构，而交易可以被视为该数据结构的属性。更准确地说，在区块链的情况下，交易被表示为默克尔树的叶子。哈希值在比特币协议中被用作维护数据一致性的方法，因为哈希值非常容易验证，并且几乎无法逆向工程。基于这些特性，我们可以解决区块链上一个非常困难的技术挑战：我们如何检查某个特定交易是否属于一个区块？检查一个包含*N*个项目的列表效率极低；因此，我们不能简单地对包含数百万个区块的区块链中的每一笔交易进行检查来验证。这就是默克尔树提供速度和效率的地方。


    要可视化默克尔树，请参考图[3-5](#430562_2_En_3_Chapter.xhtml#Fig5)。它由区块中的交易构建而成，以便快速访问进行验证。让我们按照图[3-5](#430562_2_En_3_Chapter.xhtml#Fig5)所示的示例进行。在这种情况下，一个区块中收集了八笔交易，并以默克尔树的形式表示。最底层是交易本身，通过将两个交易进行哈希运算并获得一个输出哈希，它们被抽象到更高一层。这个哈希与第二个哈希结合，并再次进行哈希运算，以抽象到更高一层。这个过程重复进行，直到只剩下两个哈希。请注意，每一层都包含其下一层的信息，最后，最高层持有一个包含整个树信息的哈希。这个哈希被称为默克尔根。那么，默克尔根如何帮助查找交易呢？让我们通过图[3-6](#430562_2_En_3_Chapter.xhtml#Fig6)中的示例来尝试从默克尔树中找到交易6。首先，默克尔根允许我们跳过树的另一半，现在我们的搜索范围仅限于交易5到8。哈希进一步引导搜索，使我们只需三步就能进入（到达）交易6。相比之下，如果遍历整棵树，进入每一层并比较每一笔交易来确认它是否真的是交易6，这个过程在步骤数和所需时间上会更加复杂，如果搜索扩展到数百万笔交易，这将变得非常繁重。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig5_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig5_HTML.jpg)


    图3-5 — 构建默克尔根'
  raw: 'In Figure [3-4](#430562_2_En_3_Chapter.xhtml#Fig4), Alice initiates the transaction
    from her wallet, which contains multiple addresses. Each address has a certain
    amount of Bitcoin balance (the sum of all UTXOs associated with that address)
    that can be used to create new transactions. The transaction is then signed using
    Alice’s private key, and then it enters the mining phase, where it will be packaged
    into a candidate block. As the mining concludes, the winning miner announces the
    block on the network, and the block is included in the blockchain. The transaction
    propagates to Bob, who can now use his private key to unlock the transaction output
    amount and use it. The ideas of UTXOs, signing, and script lock/unlock provide
    deeper insight into how the blockchain remains internally consistent as a decentralized
    ledger.


    In Figure [3-4](#430562_2_En_3_Chapter.xhtml#Fig4), we introduced a new concept
    of the wallet that can be used to initiate transactions. In simple terms, a wallet
    is essentially a **bitcoin address + a private key** used to unlock the wallet.
    Wallets are now a standard part of the Bitcoin core code and mainly serve three
    purposes for users:


    *   Create transactions: A user can create transactions easily using a graphical
    interface using the wallet.


    *   Maintain balance: The wallet software tracks all the UTXOs associated with
    an address and gives a user their final balance.


    *   Maintain multiple addresses: Within the wallet, a user can have multiple addresses,
    where each address can be associated with certain transactions.


    In a sense, addresses are the only means of ownership in the Bitcoin network.
    UTXOs are associated with a particular address (as account balances), and a user
    can create as many addresses as they want. We saw in Figure [3-4](#430562_2_En_3_Chapter.xhtml#Fig4)
    that Alice had three addresses in her wallet, and each of the addresses can work
    with her private key. There are actually other types of wallets, aside from a
    software wallet. Figure [3-4](#430562_2_En_3_Chapter.xhtml#Fig4) used a software
    wallet, but the process is similar for two other wallet types: mobile wallets
    and a cold storage physical wallet.


    Mobile wallets have largely been designed for the sake of convenience and as a
    gateway into the world of mobile payments using cryptocurrencies such as Bitcoin.
    These wallets often serve as an independent but miniaturized version of a complete
    wallet, and allow for access to balance and conducting transactions on the go.
    The apps that work as wallets are often designed in an open source environment,
    so they are also helping bring the developers and power-users together in the
    community. Cold-storage wallets are a more permanent method of storing Bitcoins
    over a longer period of time. There have been instances where wallet software
    was corrupted, or the users couldn’t remember the key to unlocking a wallet, rendering
    their account balance effectively useless. There is no direct recovery mechanism
    for a password on a wallet. The idea behind physical storage is to create a new
    wallet and send a transaction to a new address on that wallet. Now the new wallet
    can be backed up and saved to physical device such as a flash drive and stored
    away securely. Once that transaction has been verified on the blockchain, your
    Bitcoins are safe to be retrieved from the flash drive at any time. This can be
    done to prevent any accidents from happening and to keep your currency separate
    from the main wallet that you use to conduct transactions or mine for Bitcoins.
    Some developers have taken a step further and created paper wallets where the
    address is encoded in a QR code, and a private key for that particular wallet
    is also printed on the paper in another QR code.


    Note


    How can you actually see your transaction taking place on the Bitcoin network
    without having to write a script or code yourself to do it? In Bitcoin (and most
    cryptocurrencies), there is a feature called Blockchain Explorer, usually a website
    where all transactions are visible from the Bitcoin network. You can obtain all
    sorts of details about transactions such as the origin of the transaction, the
    amount, the block hash, or how many verifications it received.


    ## Simple Payment Verification (SPV)


    So far, we have talked about the structure of blocks, transaction lists, how transactions
    occur between users, and how they are recorded on the blockchain. Blocks are fundamentally
    data structures linked on the blockchain, and transactions can be thought of as
    properties of that data structure. More precisely, in the case of blockchain,
    transactions are represented as leaves of a Merkle tree. Hashes have been used
    throughout the Bitcoin protocol as a method for maintaining data consistency because
    a hash is very easy to verify and nearly impossible to reverse engineer. Building
    on these properties, we can tackle a very difficult technical challenge on the
    blockchain: How can we check if a particular transaction belongs to a block? Checking
    through an *N* number of items in a list would be very inefficient; therefore,
    we can’t simply check every transaction in a blockchain containing millions of
    blocks to verify. This is where a Merkle tree provides speed and efficiency.


    To visualize a Merkle tree , refer to Figure [3-5](#430562_2_En_3_Chapter.xhtml#Fig5).
    It is constructed from the transactions of a block to allow fast access for verification
    purposes. Let’s follow the example shown in Figure [3-5](#430562_2_En_3_Chapter.xhtml#Fig5).
    In this case, there are eight transactions collected in a block and represented
    on a Merkle tree. The lowest level is the transactions themselves, and they are
    abstracted to a higher level by hashing two transactions together and obtaining
    an output hash. This hash is combined with a second one and hashed again to abstract
    a higher level. This process repeats itself until only two hashes are left. Notice
    that each level contains information about the level below, and finally the highest
    level holds a hash with information from the entire tree. This hash is called
    the Merkle root. So how would a Merkle root assist in finding a transaction? Let’s
    run through an example in Figure [3-6](#430562_2_En_3_Chapter.xhtml#Fig6) and
    try to find transaction 6 from the Merkle tree. For starters, the Merkle root
    allows us to skip the other half of the tree, and now our search is limited to
    transactions 5 through 8\. The hashes guide the search further, allowing us to
    step into (reach) transaction 6 in just three steps. Compare this to searching
    through the whole tree, stepping into every level and comparing every transaction
    to see if it is indeed transaction 6\. That process would be more involved in
    terms of the steps taken and the time needed, and this becomes too exhaustive
    if the search expands to millions of transactions.


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig5_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Constructing a Merkle root'
