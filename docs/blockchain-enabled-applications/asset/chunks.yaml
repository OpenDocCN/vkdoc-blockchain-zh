    # 16. 全新可能的艺术：用新兴技术与联邦学习变革医疗


    本章内容源自作者（Heather Flannery、Jonathon Passerat-Palmbah 博士和 Sean T. Manion，由 Vikram
    Dhillon 编辑）于 2020 年 8 月 26 日在线上 ConsenSys Health COVID-19 退伍军人健康峰会所做的演讲——“全新可能的艺术：五种新兴技术将如何变革医疗”。


    ## 引言


    自商业互联网诞生以来，我们从未像现在这样，在医疗健康领域经历如此切实的颠覆性与变革性技术融合。不幸的是，我们早期革新医疗技术的尝试并未实现全面包容，导致提供者、患者和支付方陷入日益严峻的处境。最终造成了巨大的数字鸿沟，差距进一步恶化，医生因医学人文精神被异化而出现自杀危机，以及一系列其他全球性问题。如今，我们首次拥有了对人类具有非凡积极潜力的创新，其意义堪比古腾堡印刷机、蒸汽机、集成电路和互联网同时问世（这显然是假设性的）。当然，与任何颠覆性技术一样，在我们面对这些能够改变医疗健康的变革时，深思熟虑和伦理考量带来的巨大风险与理由至关重要。新时代的序曲已经奏响，此刻正当其时。


    通过实施三大关键技术领域，医疗健康的转型是一个可以实现的现实：


    1. **区块链** – 包括可选的**代币化**

    2. **去中心化人工智能（AI）** – 主要是**机器学习**

    3. **深度隐私保护** – 包括**零知识密码学**以及**可验证和机密计算**


    近年来，全球最大的医疗健康企业一直在开展关于区块链技术新模型的应用研发、实验、规划和业务开发。例如，`Synaptic Health Alliance`成立于
    2018 年 4 月，是一个专注于区块链的医疗健康行业联盟，成员包括 United Healthcare、Optum、Quest Diagnostics、Aetna
    等行业领导者及其他关键利益相关者。`Synaptic Health Alliance`不仅在技术实施方面引领潮流，在治理方法、资本形成方式，以及审视我们行业活动中的不同方面如何从竞争基础中剥离并实现共享化等方面也同样如此。

    '
- fmt: '# Blockchain and Tokenization


    Blockchain is more than a technology. It is a technology that exists simultaneously
    at multiple layers of the engineering stack as well as an innovation in the arena
    of behavioral economics. It has created a new discipline: applied behavioral economics
    in real time. It is a brand new opportunity to express game-theory principles,
    form hypotheses, and test the way that different incentive designs inform stakeholder
    groups in healthcare along with every other industry it touches.


    Structurally, it opens the door to new business models that have never been logistically
    possible before and, therefore, have never been meaningfully considered. And,
    it introduces radical new levels of personal identity or self-sovereignty, including
    the potential for credentials or verifications about who you are, your data, and
    data about you. All of these things are made possible by blockchain. Blockchain
    exists in the form of networks. Those networks can be public resources, public
    infrastructures, and neutral platforms like the `Ethereum` main net or the `Bitcoin`
    blockchain. The `Ethereum` main net can run software that can focus on any kind
    of application—not only digital money, but any sort of software application.


    Compared to public blockchain networks, private blockchain networks have completely
    different characteristics, though some of the same benefits along with several
    trade-offs. Looking to the future of blockchain in the healthcare industry, it
    seems likely that our end state will be an array of hybrid networks—lots of private
    enterprise networks that are bridged, or tethered, through a single neutral public
    infrastructure.


    Another defining characteristic of blockchain, particularly newer blockchain platforms
    like `Ethereum` and others, is the ability to execute and run smart contracts:
    cryptographically stored and cryptographically verified stored procedures expressed
    as microservices that run on a blockchain infrastructure. These smart contracts
    are key because they facilitate secure automation across organizational boundaries.
    For the last thirty years, most of the focus of enterprise computer engineering
    work has been looking inward into the four walls of any given enterprise. For
    the first time, this distributed smart contract infrastructure allows the use
    of the same kinds of principles for automation and efficiency gains at an ecosystem
    level, providing technology that can actually deliver the goods for the future
    of healthcare.


    In addition, blockchain provides for digital scarcity from an economics and behavioral
    economics perspective. In our current legacy data environment, there is no scarcity
    because data can be infinitely copied. This endless copying continues to expand
    the disk space required for storage and creates governance difficulties. Through
    tokenization—either tokenization of single items like something with a serial
    number or tokenization of units that are replicable like a cryptocurrency, a certificate,
    or things with a value of any kind—scarcity can be created for actual transactions
    with established units of value.


    One of the most appealing things about blockchain is that a user will not be aware
    that the technology is “running” in the background to exchange and manage data.
    Along with a human design–focused and streamlined user experience and interface,
    frontend Web 3.0 applications, and decentralized apps, a user would never know
    that the background is any different. Some of the things that a public blockchain
    delivers, particularly transparency and decentralization, are traded off when
    implemented as private blockchain networks. What is gained is extreme privacy.


    New technologies facilitate off-chain computation and storage to enable aspects
    of both transparency and privacy in a common infrastructure. When selecting from
    hundreds of different architectural patterns, dozens of blockchain protocols—public,
    private, and hybrid—there is always a trade-off between three criteria:


    1. Scalability of the system

    2. Its cybersecurity posture

    3. The degree to which it is decentralized or centrally controlled


    It is possible to correct for any two as architectural patterns are formed.


    Blockchain technology is necessary but not sufficient for the healthcare industry.
    There are additional important areas where the unique requirements of health can
    be greatly enhanced with this technology, including compliance, the unique cybersecurity
    environment, the unique privacy environment, and the challenges we have with identity
    of patients, providers, and devices. All of this also requires a clear eye toward
    bioethics of health. So, more than blockchain is required for the desired outcome.'
