  trans: '

    # 去中心化人工智能（AI）


    目前，构成医疗保健领域人工智能应用主体的机器学习，是通过以下步骤实现的：1）将大量数据集中在一个中心位置进行整理；2）对数据集进行分析运算；3）最终训练极其复杂的机器学习模型。举一个该方案既合理又可扩展的例子，考虑一下你手机上的数据。你的手机数据与其他人的数据汇集在一个单一地点进行学习，例如，学习如何更好地预测智能手机键盘上的下一个单词。然后，一旦新的预测模型准备就绪，这个改进后的模型就会被推送回你的手机。其内在的假设是，要么汇集到中央数据湖中的数据不太敏感，要么你愿意与中央实体共享你的数据。显然，健康数据并非如此，因此中心化模型在医疗保健领域并不那么适用。在去中心化模型中，不同之处在于，不是将数据带给模型，而是将模型送到数据所在之处，因此数据不再移动——它保持静态。


    在去中心化方法中，我们将模型发送到数据所在的每个位置。这可以是手机，也可以是机构拥有的更大的数据湖。例如，如果数据由不同的临床机构拥有，则可以在每个机构开发一个独特的学习模型；它们基本上会各自训练自己的模型。然后，机器学习的核心在于将每个机构（或站点或设备）学到的知识整合成一个单一的、新的联合模型。因此，在未来，你将无需考虑如何将数据收集到一个中心位置进行存储和访问；相反，你将把一个机器学习模型部署到网络中，并接收回传的衍生数据。


    那么，为什么这很重要呢？首先，如果考虑的是我的个人数据，一旦我的数据被复制并被拿走而脱离我的控制，很多事情都可能发生。如果它静态地存在于我的系统或手机内，我就有更多的控制权。当你考虑到层出不穷、毫无平息迹象的数据泄露事件时，这种安心感对消费者和公众来说至关重要。此外，通过将数据留在原处，你抑制了数据复制，并引入了数字稀缺性。结合区块链，这就是创建去中心化市场所需的一切。如果一个去中心化系统能够显著减少数据威胁，同时仍然能够提供只有通过大量数据集进行广泛数据分析才能获得的先进知识价值，那么我们所知的健康与医疗保健领域将被彻底改变。


    即使是在中心化的机器学习模型中，将区块链与机器学习相结合的另一个好处，涉及对训练数据的溯源和验证，以确保最终纳入训练集的每个数据元素都具有加密验证的来源。这对于解决可解释性问题以及其他长期存在的、关于训练数据来源、数据来源地以及数据本身是否被篡改的问题大有裨益。对学习功能进行去中心化，并对训练数据的来源进行去中心化，是唾手可得的成果，并且在去中心化数据上进行学习时，能带来巨大的增量收益。因此，区块链基础设施与去中心化机器学习方法的融合是绝对必要的。


    这或许是个新闻，但进行去中心化机器学习的能力已经存在相当长一段时间了。然而，它尚未被医疗保健行业所接纳，因为缺乏合适的激励措施。通过将区块链与这些用于训练模型的去中心化
    AI 策略相结合，我们能够将激励机制联系起来，并确切知道由谁授予了何种权限、用于何种目的、权限持续多长时间等等。这些技术的结合将对推动医疗保健领域的发展产生变革性影响。


    # 深度隐私


    > “任何足够先进的技术都与魔法无异。” ——亚瑟·C·克拉克第三定律


    我们如何确保隐私与安全？当考虑健康数据时，这是每个人脑海中都会浮现的问题。事实证明，有一系列先进的加密隐私保护技术正被以新的方式加以利用，将对个人健康信息以及医疗保健和生命科学领域的合规性产生深远影响。一个典型的例子就是`零知识证明`（ZKP）。要详细讨论零知识证明和其他这些深度隐私技术，需要另一本书的多个章节。因此，从宏观层面来看，这里简要介绍一下零知识证明，以及它们与目前普遍使用的标准传统加密模型或方法有何本质区别。


    ZKP 加密技术已存在三十年，但近年来获得了额外的关注，尤其是在与区块链相关的领域。零知识证明的作用是，允许你证明一个陈述是正确且真实的，而无需揭示该确认的核心陈述本身。它的价值在于：证明你知道一个你想保守的秘密，并且能让另一方或网络中的其他成员确信你确实知道这个秘密，但又无需真正泄露这个秘密。


    举一个现实世界的例子，将你的出生日期视为一个数据元素，以及无论出于何种原因，你为了证明年龄而必须输入出生日期的所有那些时刻。在一个将 ZKP 加密技术推广到全球工业规模的世界里，你的生日数据元素几乎再也不需要被传输。相反，对方系统只需存储一个加密证明，证明你的生日是高于、低于还是处在要求的出生年代区间内——答案是“是”或“否”。你生日的年、月、日数据将保持静态。这仅仅是一个简单的例子。如果你想象一下我们行业中临床、科学和业务流程所涉及的所有数据，那么
    ZKP 加密技术，连同整个深度隐私加密技术家族，有着无限的应用前景。


    在我们所描述的整个技术栈背景下，为什么要以及如何使用这些先进的加密隐私保护技术？首先，它们为共享的衍生数据增加了更多的真实性。例如，想象一位名叫爱丽丝的病人，在预约一位非常忙碌的专家鲍勃进行咨询之前，必须使用一个远程的私有推理服务进行筛查。鲍勃的规定是，只有安全推理服务返回预测概率超过
    80% 时，才能与他预约会诊。当爱丽丝收到预测结果时，它已被加密，只有她本人才能解密。现在，爱丽丝想向鲍勃出示她的诊断结果以预约会诊。鲍勃如何确信爱丽丝出示的预测结果确实来自那个安全的推理预测服务呢？*除非*爱丽丝能提供一个加密证明，证明该预测值确实来自指定的推理服务，否则无法做到。用零知识证明的术语来说，这意味着要证明爱丽丝发送给鲍勃的明文预测结果，与她从该服务收到的加密内容相对应。爱丽丝不仅将预测结果发送给鲍勃，同时还会附加一个关于正确解密的零知识证明以及预测数值。请注意，整个过程从未将爱丽丝的输入医疗保健数据的明文泄露给预测服务或鲍勃。

    '
- fmt: "Along with privacy-in-depth, there’s one other important aspect, and that’s\
    \ the notion of secure inference. Inference is the function of a machine learning\
    \ model making a prediction. After a model has been trained and is doing what\
    \ it’s meant to do, it is theoretically making a prediction that might guide clinical\
    \ decision making. It might guide patient behavior. It might guide access to care.\
    \ It might guide anything where these technologies are implemented in our industry.\
    \ It is critical that the resulting data can not be reverse engineered or inappropriately\
    \ used to derive information about the data’s origin or source. Only the intended\
    \ inference is produced by the model.\n\nFor those who wish to research these\
    \ three technologies further, consider the following:\n\n- **Blockchain**\n  -\
    \ Decentralized Apps (“DApps”) – *Web3 User Experience*\n  - Optional Tokenization\
    \ – *Creating Digital Scarcity*\n  - Smart Contracts – *Secure Automation Across\
    \ Organizational Boundaries*\n  - Blockchain Networks – *Public, Private, and\
    \ Hybrid*\n- **Decentralized AI**\n  - Federated learning in blockchain networks\n\
    \  - New paradigms in training data provenance, incentivization, and secure inference\n\
    \  - Intelligent agent-based simulation and automation\n- **Privacy-in-Depth**\n\
    \  - Zero-Knowledge Proof Cryptography (ZKPs)\n  - Trusted Execution Environments\
    \ (TEEs)\n  - Secure Encrypted Virtualization (SEV)\n  - Verifiable Computation\n\
    \  - Secure Multi-Party Computation\n  - Blind Computation\n  - Differential Privacy\n\
    \  - Homomorphic Encryption\n  - Quantum-Resistant Encryption\n\n## Source and\
    \ Derived Health Data\n\nNow that we’ve had a high-level discussion of these three\
    \ game-changing technologies, let’s consider a paradigm shift in value creation—moving\
    \ copies of data is no longer the *only* way to create value from data.\n\nIn\
    \ health, source data is enterprise data that lives behind firewalls, or the patient’s\
    \ self-sovereign data, the volume of which has been exploding in scale. Source\
    \ data in health has been expanding exponentially for the last fifteen years,\
    \ and this will continue with the widespread availability of 5G wireless connectivity,\
    \ the internet of medical things, and the growing understanding of social determinant\
    \ data *as health data*. Currently, most of our strategies have to do with copying\
    \ and moving source data from place to place: trying to centralize larger and\
    \ larger bodies of source data.\n\nLet’s define **source data**:\n\n1. **Enterprise**\
    \ data is behind firewalls – *at rest,* not *in motion*\n2. **Patient** self-sovereign\
    \ data – *within cloud storage infrastructures or at the edge on devices*\n\n\
    **Source data** has been **expanding exponentially** for the last fifteen years.\
    \ As **data** grows, we are reaching the logistic extremes of data lakes and other\
    \ centralization strategies. The statistics demonstrate the magnitude:\n\n- 1100\
    \ Terabytes (TB) per lifetime of exogenous data (behavior, socioeconomic, environmental,\
    \ etc.) representing roughly 60 percent of the determinants of an individual’s\
    \ health\n- 6 TB per lifetime of genomics/epigenomics data representing roughly\
    \ 30 percent of the determinants of an individual’s health\n- 0.4 TB per lifetime\
    \ of clinical data representing roughly 10 percent of the determinants of an individual’s\
    \ health\n\nAnother consideration is associated metadata, which are descriptions\
    \ of the source data. Finally, there is the product of the attempts to create\
    \ value out of source data, which we call derived data, composed of analytical\
    \ findings and insights. As such, the current centralized system is a sunsetting\
    \ paradigm. It is slow, labor intensive, error prone, and untrusted. Decentralization\
    \ with a blockchain framework is the emerging paradigm. It will be rapid, automated,\
    \ quality controlled, and trusted.\n\nToday, we have to copy and move data everywhere.\
    \ Analysis can only be performed on that of which we can secure custody. Often,\
    \ we make compromises by de-identifying data, which introduces a huge spectrum\
    \ of new challenges and risks. In this emerging paradigm source, data will be\
    \ able to remain at rest in enterprise infrastructures or in patient self-sovereign\
    \ infrastructures. Most of the time, it will become the exception instead of the\
    \ rule that the data has to be exchanged for a workflow to occur. Analysis will\
    \ frequently be performed in federated analytics models across network participants\
    \ and the source data. Further, source data will be able to remain fully identified\
    \ and clinically actionable without ever exposing it, sharing it, or transferring\
    \ ownership.\n\nIn this new paradigm, normalization and analysis will change substantially.\
    \ Normalization will occur by distributing rule sets and automating that normalization:\
    \ operating on the data where it resides at its source. The analysis will be also\
    \ performed where it resides at its source, and only that derived data will be\
    \ shared. The aggregated findings will be shareable and, importantly, also cryptographically\
    \ verified.\n\nThe new paradigm is a shift to a new person-centered health data\
    \ architecture as part of this healthcare industry transformation. This includes\
    \ five architectural components, all of which are interdependent and necessary:\n\
    \n1. The individual’s self-sovereign identity\n2. The individual’s verifiable\
    \ credentials\n3. The diametric workflows that connect the individual represented\
    \ to the physical person it represents\n4. A self-sovereign data lake where all\
    \ of an individual’s data can be brought together—and where *N* equals one, for\
    \ that individual alone, so that it is not a giant target for hackers.\n5. Finally,\
    \ the ability to transact with a tokenized value, to earn, to trade, and to hold\
    \ all forms of a tokenized value\n\nAll of this will require privacy-preserving\
    \ technologies, primarily for health-focused, decentralized machine learning.\
    \ This is what we call **federated learning**."
