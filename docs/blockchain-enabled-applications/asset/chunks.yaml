  trans: '

    # 代币与价值创造


    要理解代币的概念，我们首先需要了解其运作的背景——“胖”协议（`https://avc.com/2017/08/how-to-value-crypto-assets/`）。在
    2017 年共识大会上，Naval Ravikant 谈到了“胖”协议的理念，以及互联网公司与基于区块链的下一代初创企业之间的根本差异。当前，互联网协议栈由两部分组成：支撑万维网的“瘦”协议层和构建在协议之上的“胖”应用层。一些大型互联网公司，如谷歌和
    Facebook，在应用层捕获价值，但随后不得不发明新协议和基础设施层来实现规模化。当互联网公司达到这种规模时，它们已验证了核心商业模式，并有足够资源投入到新协议的创建中。


    基于区块链的公司则运行在另一种协议栈上，其特点是“瘦”应用层和“胖”协议层。价值集中在协议层，只有少部分溢出到应用层。Joel Monégro 和 Balaji
    S. Srinivasan（`https://www.usv.com/writing/2016/08/fat-protocols/`）提出了两个可能的原因来解释为何协议层能吸引巨大的兴趣和投资：


    *   **共享数据层：** 在区块链协议栈中，底层架构的特性使得关键数据可通过区块链浏览器公开访问。此外，网络中的每个成员都拥有完整的区块链副本，以达成网络共识。共享数据层在实际应用中的一个典型例子是，用户可以轻松地在
    Poloniex 和 Kraken 等交易所之间切换。这些交易所都能平等、自由地访问底层数据或区块链交易。


    *   **访问代币：** 可以将代币类比为付费的 API 密钥，用于访问某项服务。在区块链协议栈中，协议代币用于访问网络提供的服务，例如 Storj 的文件存储。历史上，协议盈利的唯一方法是构建实现该新协议的软件，并使其优于竞争对手。这对于资金充足公司的研究部门来说是可能的；然而，在学术界，早期研究进展较慢，因为创造这些协议的研究人员几乎得不到经济收益。有了代币，协议创建者可以通过首次代币发行（ICO）直接获利，并且随着代币被广泛采用以及其他人基于新协议构建服务，他们将获得更多收益。


    由于适当的激励机制、现成的数据共享层，以及代币超越货币用途的应用，开发者们正在底层协议上投入大量时间来解决棘手的技术问题。因此，建立在区块链协议栈上的初创企业将不可避免地花费更多时间在“胖”协议层上，通过解决技术挑战来捕获价值，并从海量的以太坊代币中脱颖而出。


    最近，随着以太坊生态系统中越来越多的代币涌现，跨兼容性已成为一个问题。为了解决这个问题，Fabian Vogelsteller 制定了一项名为 ERC20
    的新规范。ERC20 是一套关于如何在以太坊网络上实现代币的标准。它描述了每个访问代币为实现与整个网络上的去中心化应用（DApp）兼容而应实现的六个标准函数。基于
    ERC20 的代币可以与以太坊区块链上的其他智能合约和去中心化应用无缝交互。仅实现了部分标准函数的代币被视为部分符合 ERC20。即使是部分合规的代币，也可以根据缺失的函数，轻松地与第三方进行交互。


    > **注意**

    > 在以太坊区块链上建立新代币需要一个智能合约。代币的初始参数和函数提供给该智能合约，由其管控代币在区块链上的执行。


    为了完全符合 ERC20 标准（`https://eips.ethereum.org/EIPS/eip-20`），开发者需要在其智能合约中整合一组特定的函数，以便能够对代币执行以下操作：


    *   获取代币总供应量：`totalSupply()`

    *   获取账户余额：`balanceOf()`

    *   转移代币：`transfer()`, `transferFrom()`

    *   批准代币花费：`approve()`, `allowance()`


    当创建新代币时，通常会预先挖矿，然后在众售（也称为首次代币发行）中出售。这里的*预挖*指的是为代币创建者和任何将为网络提供服务（例如运行全节点）的方分配一部分代币。代币有固定的销售价格。它们可以在新协议启动时的
    ICO 期间公开发行和出售，以资助其开发，类似于初创公司使用 Kickstarter 来资助产品开发。随着 ERC20 代币的普及，更多挑战也日益显现。在之前的实现中，`transfer`函数只能单向工作：如果用户意外将代币发送到智能合约，即使合约所有者想归还代币，也无法收回。因此，技术错误导致预售活动中损失了数百万美元。此后，以太坊开发者通过引入
    `transferFrom()` 函数修复了 `transfer` 函数。此外，还提出了新规范作为潜在候选方案，以取代 ERC20 或引入新型代币。让我们审视其中三种规范：


    *   **ERC223：** 一项规范（`https://github.com/ethereum/eips/issues/223`），修复了早期 ERC20
    实现中 `transfer` 函数的错误。更具体地说，该实现将 `transfer` 和 `transferFrom` 函数合并为一个单一的 `transfer`
    函数，该函数可以取消交易。


    *   **ERC721：** 一项规范（`https://eips.ethereum.org/EIPS/eip-721`），引入了将代币视为资产和收藏品的概念。最初的
    ERC20 规范创建了可互换的代币，所有代币价值相同。然而，ERC721 允许创建可能具有更高价值的独特代币。这一想法被一款名为 CryptoKitties
    的区块链游戏应用所采纳，其中年龄、颜色和品种等属性使得代币非常稀有，成为有价值的资产。


    *   **ERC948：** 一项规范（`https://github.com/ethereum/EIPs/issues/948`），为拥有实体存在并希望通过发行代币作为数字订阅来扩展到区块链的企业描述了订阅模式。

    '
- fmt: "# Tokens and the Ethereum Computational Market (ECM)\n\nThe next question\
    \ we should ask regarding tokens is: Given that tokens are digital, what do token\
    \ buyers actually buy? Essentially, what a user buys is a private key. This is\
    \ the analogy we made to paid API keys—your private key is just a string of characters\
    \ that grants you access. A private key can be understood to be similar to a password.\
    \ Just as your password grants you access to the email stored on a centralized\
    \ database like Gmail, a private key grants you access to the digital tokens stored\
    \ on a decentralized blockchain stack like Ethereum.\n\n> **Tip**  \n> The key\
    \ difference between a private key and a password stored on a centralized database\
    \ is that if you lost your private key, you would not be able to recover it. Recently,\
    \ there have been some attempts to restore access to an account through a recovery\
    \ service using a co-signer who can verify the identity of the user requesting\
    \ recovery.\n\nUltimately, tokens appear to be a better funding and monetization\
    \ model for technology compared to traditional subscription-based services. Currently,\
    \ even though base cryptocurrencies such as Ethereum have a larger market share,\
    \ tokens will eventually amount to 100 times the market share. Figure [7-1](#430562_2_En_7_Chapter.xhtml#Fig1)\
    \ provides a summary of the differences between value creation for traditional\
    \ internet companies and that for companies building on the blockchain stack using\
    \ Ethereum tokens. Let’s begin with our first token, which will serve as a model\
    \ for all the tokens that follow. Michael Oved at ConsenSys suggests ([`https://media.consensys.net/the-blockchain-killer-app-ethereum-tokens-c3f5e6f4ce7f`](https://media.consensys.net/the-blockchain-killer-app-ethereum-tokens-c3f5e6f4ce7f))\
    \ that tokens will be the killer app that everyone has been waiting for:\n\n>\
    \ *If killer apps prove the core value of larger technologies, Ethereum tokens\
    \ surely prove the core value of blockchain, made evident by the runaway success\
    \ that tokens have brought to these* [new business models](https://blog.coinbase.com/app-coins-and-the-dawn-of-the-decentralized-business-model-8b8c951e734f)*.*\n\
    \n> *We are now seeing a wave of launches that break tokens through as the first\
    \ killer app of blockchain technology. Bitcoin, in many ways, is a “proof of concept”\
    \ for a blockchain-based asset. The Ethereum platform is proving that concept\
    \ at scale.*\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig1_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1: An overview of a blockchain stack used by tokens\n\nThis model is\
    \ based on Joyce J. Shen’s description of distributed ledger technology. Traditional\
    \ internet companies such as Google and Facebook created and captured value in\
    \ the application layer by harvesting data that users generated. Blockchain companies\
    \ have a different dynamic in terms of ownership and the technology available.\
    \ The blockchain itself provides a mechanism for consensus and a shared data layer\
    \ that is publicly accessible. Ethereum further provides a Turing-complete programming\
    \ language and node-to-node compatibility through an `EVM` that can run the instructions\
    \ contained in a smart contract. Using smart contracts, a full application can\
    \ be constructed to run on the blockchain, and a collection of applications can\
    \ become a full decentralized service such as Storj.\n\n## Ethereum Computational\
    \ Market (ECM)\n\n`ECM` is a very simplistic and functional token for off-chain\
    \ computations and is the first token we will consider in this chapter. It will\
    \ serve as a teaching tool and general model covering all the necessary features\
    \ that an HPC-token would need. `ECM` is designed to facilitate the execution\
    \ of computations off-chain that would be too costly to perform within the Ethereum\
    \ Virtual Machine (`EVM`). In essence, `ECM` is a decentralized version of Amazon’s\
    \ `EC2`, a web service that provides centralized computational capacity in the\
    \ cloud. The key technical advance in `ECM` is the computation marketplace, which\
    \ allows one user (the customer) to pay another (the host) to execute an algorithm\
    \ off-chain and report the results back to the customer. Additionally, to preserve\
    \ the integrity of the computation being done off-chain, each algorithm also has\
    \ an on-chain implementation. This on-chain component can be used to verify whether\
    \ the submitted end result is indeed correct. It also plays a role in resolving\
    \ disputes. Let’s take a look at the lifecycle of a request through `ECM` in Figure\
    \ [7-2](#430562_2_En_7_Chapter.xhtml#Fig2). `ECM` uses some terminology specific\
    \ to the project for describing the lifecycle of a request from when it’s initially\
    \ received to the final resolution. We employ some of this terminology in Figure\
    \ [7-2](#430562_2_En_7_Chapter.xhtml#Fig2), along with a few additional terms\
    \ that we discuss here:\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig2_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2: Lifecycle of a request as it goes through `ECM`\n\n- **Pending:**\
    \ Indicates when a request is received. Every request begins in the pending status.\n\
    - **Waiting for Resolution:** A request for computation has been submitted to\
    \ the network, and a host has computed the algorithm and is now reporting the\
    \ result. This is a decision point for the customer; either the answer will be\
    \ accepted and the request will move to soft resolution status, or the answer\
    \ will be challenged, in which case the request will move to the needs resolution\
    \ state.\n- **Needs Resolution:** When an answer is challenged, this path is taken\
    \ from the decision tree. The request is changed to needs resolution status, and\
    \ the on-chain verification component of the algorithm is required.\n- **Resolving:**\
    \ The interim period as on-chain computation is being performed for a request.\
    \ The request will remain in this status until the computation has been completed.\n\
    - **Firm versus Soft Resolution:** Once the on-chain computation has been completed,\
    \ the request is set to the firm resolution status. If no challenges are made\
    \ within a certain window of time after the answer has been submitted to the customer,\
    \ the request is set to soft resolution.\n- **Finalized:** Once an answer is obtained\
    \ through either soft or hard resolution, the original request can be set to finalized\
    \ status. This unlocks the payment from the customer’s end and allows the host\
    \ to receive payment for off-chain computation.\n\nIn Figure [7-2](#430562_2_En_7_Chapter.xhtml#Fig2),\
    \ each request-state described is broken down further into a workflow. Once a\
    \ task request is processed off-chain, there is a decision point concerning the\
    \ final answer. If the customer challenges the answer provided by the host, the\
    \ on-chain component of the algorithm will execute and the request will go through\
    \ a few states of needing resolution. On the other hand, if no challenges are\
    \ made, the request will move to soft resolution and be considered finalized.\
    \ The host receives payment after the request has reached the finalized state.\n\
    \nNow that we have an understanding of how a request gets processed in `ECM`,\
    \ let’s talk about the marketplace and individual markets within that marketplace.\
    \ The concept that we have referred to as an *algorithm* being computed off-chain\
    \ is made from three separate contracts: a broker contract, a factory contract,\
    \ and an execution contract."
  raw: 'The next question we should ask regarding tokens is: Given that tokens are
    digital, what do token buyers actually buy? Essentially, what a user buys is a
    private key. This is the analogy we made to paid API keys—your private key is
    just a string of a characters that grants you access. A private key can be understood
    to be similar to a password. Just as your password grants you access to the email
    stored on a centralized database like Gmail, a private key grants you access to
    the digital tokens stored on a decentralized blockchain stack like Ethereum.


    Tip


    The key difference between a private key and a password stored on a centralized
    database is that if you lost your private key, you would not be able to recover
    it. Recently, there have been some attempts to restore access to an account through
    a recovery service using a co-signer who can verify the identity of the user requesting
    recovery.


    Ultimately, tokens appear to be a better funding and monetization model for technology
    compared to traditional subscription-based services. Currently, even though base
    cryptocurrencies such as Ethereum have a larger market share, tokens will eventually
    amount to 100 times the market share. Figure [7-1](#430562_2_En_7_Chapter.xhtml#Fig1)
    provides a summary of the differences between value creation for traditional internet
    companies and that for companies building on the blockchain stack using Ethereum
    tokens. Let’s begin with our first token, which will serve as a model for all
    the tokens that follow. Michael Oved at ConsenSys suggests ([`https://media.consensys.net/the-blockchain-killer-app-ethereum-tokens-c3f5e6f4ce7f`](https://media.consensys.net/the-blockchain-killer-app-ethereum-tokens-c3f5e6f4ce7f))
    that tokens will be the killer app that everyone has been waiting for:


    > *If killer apps prove the core value of larger technologies, Ethereum tokens
    surely prove the core value of blockchain, made evident by the runaway success
    that tokens have brought to these* [new business models](https://blog.coinbase.com/app-coins-and-the-dawn-of-the-decentralized-business-model-8b8c951e734f)*.*


    > *We are now seeing a wave of launches that break tokens through as the first
    killer app of blockchain technology. Bitcoin, in many ways, is a “proof of concept”
    for a blockchain-based asset. The Ethereum platform is proving that concept at
    scale.*


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig1_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    An overview of a blockchain stack used by tokens


    This model is based on Joyce J. Shen’s description of distributed ledger technology.
    Traditional internet companies such as Google and Facebook created and captured
    value in the application layer by harvesting data that users generated. Blockchain
    companies have a different dynamic in terms of ownership and the technology available.
    The blockchain itself provides a mechanism for consensus and a shared data layer
    that is publicly accessible. Ethereum further provides a Turing-complete programming
    language and node-to-node compatibility through an EVM that can run the instructions
    contained in a smart contract. Using smart contracts, a full application can be
    constructed to run on the blockchain, and a collection of applications can become
    a full decentralized service such as Storj.


    ## Ethereum Computational Market (ECM)


    ECM is a very simplistic and functional token for off-chain computations and is
    the first token we will consider in this chapter. It will serve as a teaching
    tool and general model covering all the necessary features that an HPC-token would
    need. ECM is designed to facilitate the execution of computations off-chain that
    would be too costly to perform within the Ethereum Virtual Machine (EVM). In essence,
    ECM is a decentralized version of Amazon’s EC2, a web service that provides centralized
    computational capacity in the cloud. The key technical advance in ECM is the computation
    marketplace, which allows one user (the customer) to pay another (the host) to
    execute an algorithm off-chain and report the results back to the customer. Additionally,
    to preserve the integrity of the computation being done off-chain, each algorithm
    also has an on-chain implementation. This on-chain component can be used to verify
    whether the submitted end result is indeed correct. It also plays a role in resolving
    disputes. Let’s take a look at the lifecycle of a request through ECM in Figure
    [7-2](#430562_2_En_7_Chapter.xhtml#Fig2). ECM uses some terminology specific to
    the project for describing the lifecycle of a request from when it’s initially
    received to the final resolution. We employ some of this terminology in Figure
    [7-2](#430562_2_En_7_Chapter.xhtml#Fig2), along with a few additional terms that
    we discuss here:


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig2_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Lifecycle of a request as it goes through ECM


    *   **Pending:** Indicates when a request is received. Every request begins in
    the pending status.


    *   **Waiting for Resolution:** A request for computation has been submitted to
    the network, and a host has computed the algorithm and is now reporting the result.
    This is a decision point for the customer; either the answer will be accepted
    and the request will move to soft resolution status, or the answer will be challenged,
    in which case the request will move to the needs resolution state.


    *   **Needs Resolution:** When an answer is challenged, this path is taken from
    the decision tree. The request is changed to needs resolution status, and the
    on-chain verification component of the algorithm is required.


    *   **Resolving:** The interim period as on-chain computation is being performed
    for a request. The request will remain in this status until the computation has
    been completed.


    *   **Firm versus Soft Resolution:** Once the on-chain computation has been completed,
    the request is set to the firm resolution status. If no challenges are made within
    a certain window of time after the answer has been submitted to the customer,
    the request is set to soft resolution.


    *   **Finalized:** Once an answer is obtained through either soft or hard resolution,
    the original request can be set to finalized status. This unlocks the payment
    from the customer’s end and allows the host to receive payment for off-chain computation.


    In Figure [7-2](#430562_2_En_7_Chapter.xhtml#Fig2), each request-state described
    is broken down further into a workflow. Once a task request is processed off-chain,
    there is a decision point concerning the final answer. If the customer challenges
    the answer provided by the host, the on-chain component of the algorithm will
    execute and the request will go through a few states of needing resolution. On
    the other hand, if no challenges are made, the request will move to soft resolution
    and be considered finalized. The host receives payment after the request has reached
    the finalized state.


    Now that we have an understanding of how a request gets processed in ECM, let’s
    talk about the marketplace and individual markets within that marketplace. The
    concept that we have referred to as an *algorithm* being computed off-chain is
    made from three separate contracts: a broker contract, a factory contract, and
    an execution contract:'
  trans: "\n# Token 与以太坊计算市场（ECM）\n\n关于 Token，我们接下来要问的问题是：既然 Token 是数字化的，那么 Token\
    \ 买家实际购买的是什么？本质上，用户购买的是一个私钥。这是我们类比付费 API 密钥时所提出的概念——你的私钥只是一串字符，它能授予你访问权限。私钥可以理解成类似于密码。就像你的密码能让你访问存储在\
    \ Gmail 等中心化数据库中的电子邮件一样，私钥能让你访问存储在以太坊等去中心化区块链栈上的数字 Token。\n\n> **提示**  \n> 私钥与存储在中心化数据库中的密码之间的关键区别在于：如果你丢失了私钥，你将无法找回它。最近，有一些尝试通过恢复服务来恢复账户访问权限的做法，该服务使用一个共同签名者来验证请求恢复的用户身份。\n\
    \n最终，与传统的基于订阅的服务相比，Token 似乎是一种更好的技术融资和盈利模式。目前，即使以太坊等基础加密货币拥有更大的市场份额，Token 最终将达到其\
    \ 100 倍的市场份额。图 7-1 总结了传统互联网公司与使用以太坊 Token 在区块链栈上构建的公司在价值创造方面的差异。让我们从我们的第一个 Token\
    \ 开始，它将成为后续所有 Token 的模型。ConsenSys 的 Michael Oved 在（[`https://media.consensys.net/the-blockchain-killer-app-ethereum-tokens-c3f5e6f4ce7f`](https://media.consensys.net/the-blockchain-killer-app-ethereum-tokens-c3f5e6f4ce7f)）中指出，Token\
    \ 将是大家一直期待的杀手级应用：\n\n> *如果说杀手级应用证明了更大技术的核心价值，那么以太坊 Token 无疑证明了区块链的核心价值，Token 为这些*\
    \ [新商业模式](https://blog.coinbase.com/app-coins-and-the-dawn-of-the-decentralized-business-model-8b8c951e734f)*带来的巨大成功就证明了这一点。*\n\
    \n> *我们现在看到一波浪潮，Token 作为区块链技术的第一个杀手级应用开始崭露头角。从很多方面来看，比特币都是基于区块链的资产的“概念验证”。以太坊平台正在大规模地证明这一概念。*\n\
    \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig1_HTML.jpg](img/430562_2_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1：Token 所使用的区块链栈概览\n\n该模型基于 Joyce J. Shen 对分布式账本技术的描述。像 Google 和 Facebook\
    \ 这样的传统互联网公司通过收集用户生成的数据，在应用层创造并捕获价值。区块链公司在所有权和可用技术方面具有不同的动态。区块链本身提供了一种共识机制和一个可公开访问的共享数据层。以太坊进一步通过一个能够运行智能合约中包含的指令的\
    \ `EVM`，提供了一种图灵完备的编程语言和节点间兼容性。使用智能合约，可以构建一个完整的应用程序在区块链上运行，而一组应用程序可以成为像 Storj 这样的完整去中心化服务。\n\
    \n## 以太坊计算市场（ECM）\n\n`ECM` 是一个用于链下计算的非常简单且功能性的 Token，也是我们将在本章中考虑的第一个 Token。它将作为一个教学工具和通用模型，涵盖高性能计算\
    \ Token 所需的所有必要特性。`ECM` 旨在促进链下计算的执行，这些计算如果放在以太坊虚拟机（`EVM`）中进行将过于昂贵。本质上，`ECM` 是亚马逊\
    \ `EC2`（一种在云中提供集中计算能力的网络服务）的去中心化版本。`ECM` 的关键技术进步是计算市场，它允许一个用户（客户）支付给另一个用户（主机）来执行链下算法，并将结果报告给客户。此外，为了维护链下计算的完整性，每个算法还有一个链上实现。这个链上组件可用于验证提交的最终结果是否确实正确。它还在解决争议中发挥作用。让我们通过图\
    \ 7-2 来看看通过 `ECM` 的请求生命周期。`ECM` 使用一些特定于该项目的术语来描述一个请求从最初接收到最终解决的生命周期。我们在图 7-2 中使用了其中一些术语，以及我们在此讨论的一些附加术语：\n\
    \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig2_HTML.jpg](img/430562_2_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2：请求通过 `ECM` 时的生命周期\n\n- **待处理：** 表示接收到请求时。每个请求都以待处理状态开始。\n- **等待解决：** 一个计算请求已提交到网络，主机已计算了算法并正在报告结果。这是客户的一个决策点；要么接受答案，请求将进入软解决状态；要么答案被质疑，在这种情况下，请求将进入需要解决状态。\n\
    - **需要解决：** 当答案被质疑时，从决策树中选择此路径。请求状态更改为需要解决，并且需要算法的链上验证组件。\n- **解决中：** 为请求执行链上计算的过渡期。请求将保持此状态，直到计算完成。\n\
    - **硬解决与软解决：** 一旦链上计算完成，请求被设置为硬解决状态。如果在答案提交给客户后的某个时间窗口内没有提出质疑，则请求被设置为软解决状态。\n\
    - **已完成：** 一旦通过软解决或硬解决获得答案，原始请求就可以设置为已完成状态。这会解锁客户端的付款，并允许主机收到链下计算的付款。\n\n在图 7-2\
    \ 中，所描述的每个请求状态都被进一步分解为一个工作流。一旦任务请求在链下处理完毕，就会有一个关于最终答案的决策点。如果客户质疑主机提供的答案，算法的链上组件将执行，请求将经历几个需要解决的状态。另一方面，如果没有提出质疑，请求将进入软解决状态，并被视为已完成。请求达到已完成状态后，主机将收到付款。\n\
    \n现在我们已经了解了请求如何在 `ECM` 中被处理，让我们来谈谈市场以及该市场中的各个子市场。我们之前称之为在链下计算的*算法*这一概念，由三个独立的合约组成：一个经纪人合约、一个工厂合约和一个执行合约。\n"
- fmt: '*   **Broker:** A contract that facilitates the transfer of a request from
    the customer to the host who will carry out the computation.

    *   **Execution:** A contract used for on-chain verification of a computation.
    This contract can carry out one cycle of on-chain execution in the event that
    the submitted answer is challenged.

    *   **Factory:** A contract that handles the deployment of the execution contract
    on-chain in the case of dispute resolution. This contract supplies relevant metadata
    such as compiler version required to recompile the bytecode and verify it.


    The marketplace itself has verticals (markets within a marketplace) that execute
    specialized types of contracts and algorithms, creating use case–specific HPC-economics
    on the Ethereum blockchain using tokens. Figure [7-3](#430562_2_En_7_Chapter.xhtml#Fig3)
    provides a visual summary of the three contracts that are components of each market.
    So, what’s required to make a computation request on ECM? There are primarily
    two functions that create a request and provide all the necessary details. Here,
    the `requestExecution` function is used to create a request for computation, and
    this function takes two arguments. First is a set of inputs to the function itself,
    and second is the time window during which a submitted answer can be challenged
    before the request turns to soft resolved status. This time window is given in
    number of blocks because blocks are created at a definitive time interval in Ethereum.
    Lastly, this function also specifies the payment being offered for this computation.
    The `getRequest` function returns all the metadata regarding the request. The
    following are some of the relevant parameters returned from the metadata:


    *   **address requester:** The address of the customer that requested the computation

    *   **bytes32 resultHash:** The SHA-3 hash of the result from a given computation

    *   **address executable:** The address of the executable contract that was deployed
    on-chain to settle a challenged answer

    *   **uint status:** The status of a request at a given time in the lifecycle.
    It is an unsigned integer corresponding to the status of a request given by numbers
    0–7.

    *   **uint payment:** The amount in wei that this request will pay (to the host)
    in exchange for completion of a computation. Wei are the smallest unit of ether
    that can be transferred between users, similar to satoshis in Bitcoin.

    *   **uint softResolutionBlocks:** A time window given by the number of blocks
    within which a challenge to an answer must be submitted. If no challenges are
    submitted to an answer in that interval, the request changes to soft resolution.

    *   **uint requiredDeposit:** Amount in wei that must be provided when submitting
    an answer to a request, or by a challenger objecting to a submitted answer. This
    deposit is locked until the request moves to the finalized state and is then released
    back to the host.


    It is important to note that in our discussion a few tasks such as answer verification,
    conflict resolution, and challenges have required deposits. The deposits are used
    as a countermeasure to reduce the potential for Sybil attacks on the network.
    In a sybil attack, an attacker creates multiple fake or Sybil identities in order
    to take over the network. More precisely, in our case, an attacker would create
    multiple fake nodes on the network. This allows an attacker to vote on the network,
    refuse block approval, and halt the transmission of blocks on the network. Large-scale
    Sybil attacks require an attacker to control the majority of computing power or
    hash-rate on the network. By taking over the majority of computing power, an attacker
    can theoretically reverse transactions and surpass double-spending. This is also
    known as “51% attack”. However, practically speaking, as the network size grows
    larger, accomplishing a 51% attack becomes more and more unfeasible.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig3_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Overview of a market in the marketplace


    In Figure [7-3](#430562_2_En_7_Chapter.xhtml#Fig3), we see the three components
    necessary in a market for responding to a request by a user (customer): a broker
    contract, an execution contract, and a factory contract. The broker contract facilitates
    a customer–host interaction, and the other two contracts play a role in dispute
    resolution. In the case of challenges to a submitted answer, the broker will initiate
    the deployment of the execution contract through its factory contract (also called
    FactorBase, shown with the red workflow), which consolidates the information and
    prepares for a one-cycle execution of the algorithm. The gas necessary for execution
    will be taken from a deposit that the challenger is required to submit. We will
    discuss the submission and challenge process next.


    Next, we will talk about submitting an answer back to the customer and the challenge
    process. Submitting an answer for a computation done off-chain is performed with
    the `answerRequest` function. This function takes the unique ID of the request
    being answered as an input. The actual submission of a potential answer requires
    a deposit in ether. This deposit is locked until the request has reached either
    a soft or a hard resolution state. We will discuss the importance of holding a
    deposit from involved parties shortly. Once a request has been finalized, the
    deposit made by the host who submitted an answer is reclaimed, along with the
    reward for performing the computation. If a submitted answer does not fall within
    the expectations of the request submitted by a customer, a participant can challenge
    the answer. This initiates an on-chain verification process that will execute
    one cycle of the computation within the EVM to verify whether the submitted answer
    is correct. If the submitted answer is found to be incorrect during on-chain computation,
    the host’s deposit will have the gas costs of that computation deducted from it.
    The challenger will get a large portion of the reward from the customer’s deposit,
    and the dispute will be resolved.


    For a request where a submitted answer has been challenged, the request moves
    to the needs resolution state. This is accomplished by calling the `initializeDispute`
    function, which serves as a transition between the point at which a challenge
    is made and the beginning of on-chain verification. Now the broker contract will
    use a factory to deploy an executable contract initialized with the inputs for
    this request. The gas costs for calling this function and performing one-cycle
    execution are reimbursed from the challenger’s deposit. Throughout the resolving
    state on a request, the `executeExecutable` function is called until the on-chain
    verification has been completed. At this point, the request is moved to a hard
    resolution state and eventually finalized. The gas-charge and reward system may
    seem complicated, but it follows a simple principle: the correct answer receives
    payment for the computation, and incorrect submitters must pay for gas during
    on-chain verification. Let’s recap:


    *   In the case of soft resolution, a host reclaims their initial deposit and
    a reward given by the customer for executing the computation.

    *   If there were no correct submitted answers, the gas costs for verification
    are split evenly among the users that submitted answers. The reward payment returns
    to the customer who originally requested the computation.

    *   In the case of hard resolution, the incorrect host reclaims their remaining
    deposit after gas costs have been deducted (for on-chain verification). This host
    does not receive a reward for the computation.

    *   If a challenger wins hard resolution, they reclaim their deposit along with
    the reward payment. The gas costs are debited from the incorrect host’s deposit.'
  raw: '*   **Broker:** A contract that facilitates the transfer of a request from
    the customer to the host who will carry out the computation.


    *   **Execution:** A contract used for on-chain verification of a computation.
    This contract can carry out one cycle of on-chain execution in the event that
    the submitted answer is challenged.


    *   **Factory:** A contract that handles the deployment of the execution contract
    on-chain in the case of dispute resolution. This contract supplies relevant metadata
    such as compiler version required to recompile the bytecode and verify it.


    The marketplace itself has verticals (markets within a marketplace) that execute
    specialized types of contracts and algorithms, creating use case–specific HPC-economics
    on the Ethereum blockchain using tokens. Figure [7-3](#430562_2_En_7_Chapter.xhtml#Fig3)
    provides a visual summary of the three contracts that are components of each market.
    So, what’s required to make a computation request on ECM? There are primarily
    two functions that create a request and provide all the necessary details. Here,
    the `requestExecution` function is used to create a request for computation, and
    this function takes two arguments. First is a set of inputs to the function itself,
    and second is the time window during which a submitted answer can be challenged
    before the request turns to soft resolved status. This time window is given in
    number of blocks because blocks are created at a definitive time interval in Ethereum.
    Lastly, this function also specifies the payment being offered for this computation.
    The `getRequest` function returns all the metadata regarding the request. The
    following are some of the relevant parameters returned from the metadata:


    *   **address requester:** The address of the customer that requested the computation


    *   **bytes32 resultHash:** The SHA-3 hash of the result from a given computation


    *   **address executable:** The address of the executable contract that was deployed
    on-chain to settle a challenged answer


    *   **uint status:** The status of a request at a given time in the lifecycle.
    It is an unsigned integer corresponding to the status of a request given by numbers
    0–7.


    *   **uint payment:** The amount in wei that this request will pay (to the host)
    in exchange for completion of a computation. Wei are the smallest unit of ether
    that can be transferred between users, similar to satoshis in Bitcoin.


    *   **uint softResolutionBlocks:** A time window given by the number of blocks
    within which a challenge to an answer must be submitted. If no challenges are
    submitted to an answer in that interval, the request changes to soft resolution.


    *   **uint requiredDeposit:** Amount in wei that must be provided when submitting
    an answer to a request, or by a challenger objecting to a submitted answer. This
    deposit is locked until the request moves to the finalized state and is then released
    back to the host.


    It is important to note that in our discussion a few tasks such as answer verification,
    conflict resolution, and challenges have required deposits. The deposits are used
    as a countermeasure to reduce the potential for **Sybil attacks** on the network.
    In a sybil attack, an attacker creates multiple fake or Sybil identities in order
    to take over the network. More precisely, in our case, an attacker would create
    multiple fake nodes on the network. This allows an attacker to vote on the network,
    refuse block approval, and halt the transmission of blocks on the network. Large-scale
    Sybil attacks require an attacker to control the majority of computing power or
    hash-rate on the network. By taking over the majority of computing power, an attacker
    can theoretically reverse transactions and surpass double-spending. This is also
    known as “51% attack”. However, practically speaking, as the network size grows
    larger, accomplishing a 51% attack becomes more and more unfeasible.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig3_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Overview of a market in the marketplace


    In Figure [7-3](#430562_2_En_7_Chapter.xhtml#Fig3), we see the three components
    necessary in a market for responding to a request by a user (customer): a broker
    contract, an execution contract, and a factory contract. The broker contract facilitates
    a customer–host interaction, and the other two contracts play a role in dispute
    resolution. In the case of challenges to a submitted answer, the broker will initiate
    the deployment of the execution contract through its factory contract (also called
    FactorBase, shown with the red workflow), which consolidates the information and
    prepares for a one-cycle execution of the algorithm. The gas necessary for execution
    will be taken from a deposit that the challenger is required to submit. We will
    discuss the submission and challenge process next.


    Next, we will talk about submitting an answer back to the customer and the challenge
    process. Submitting an answer for a computation done off-chain is performed with
    the `answerRequest` function. This function takes the unique ID of the request
    being answered as an input. The actual submission of a potential answer requires
    a deposit in ether. This deposit is locked until the request has reached either
    a soft or a hard resolution state. We will discuss the importance of holding a
    deposit from involved parties shortly. Once a request has been finalized, the
    deposit made by the host who submitted an answer is reclaimed, along with the
    reward for performing the computation. If a submitted answer does not fall within
    the expectations of the request submitted by a customer, a participant can challenge
    the answer. This initiates an on-chain verification process that will execute
    one cycle of the computation within the EVM to verify whether the submitted answer
    is correct. If the submitted answer is found to be incorrect during on-chain computation,
    the host’s deposit will have the gas costs of that computation deducted from it.
    The challenger will get a large portion of the reward from the customer’s deposit,
    and the dispute will be resolved.


    For a request where a submitted answer has been challenged, the request moves
    to the needs resolution state. This is accomplished by calling the `initializeDispute`
    function, which serves as a transition between the point at which a challenge
    is made and the beginning of on-chain verification. Now the broker contract will
    use a factory to deploy an executable contract initialized with the inputs for
    this request. The gas costs for calling this function and performing one-cycle
    execution are reimbursed from the challenger’s deposit. Throughout the resolving
    state on a request, the `executeExecutable` function is called until the on-chain
    verification has been completed. At this point, the request is moved to a hard
    resolution state and eventually finalized. The gas-charge and reward system may
    seem complicated, but it follows a simple principle: the correct answer receives
    payment for the computation, and incorrect submitters must pay for gas during
    on-chain verification. Let’s recap:


    *   In the case of soft resolution, a host reclaims their initial deposit and
    a reward given by the customer for executing the computation.


    *   If there were no correct submitted answers, the gas costs for verification
    are split evenly among the users that submitted answers. The reward payment returns
    to the customer who originally requested the computation.


    *   In the case of hard resolution, the incorrect host reclaims their remaining
    deposit after gas costs have been deducted (for on-chain verification). This host
    does not receive a reward for the computation.


    *   If a challenger wins hard resolution, they reclaim their deposit along with
    the reward payment. The gas costs are debited from the incorrect host’s deposit.'
  trans: '

    *   **经纪人合约:** 一种促进请求从客户传输到将执行计算的主机的合约。

    *   **执行合约:** 一种用于在链上验证计算的合约。当提交的答案受到质疑时，此合约可以执行一轮链上执行。

    *   **工厂合约:** 一种在争议解决情况下处理执行合约链上部署的合约。此合约提供相关元数据，例如重新编译字节码并验证它所需的编译器版本。


    市场本身拥有垂直领域（市场内的细分市场），这些垂直领域执行专门类型的合约和算法，通过使用代币在以太坊区块链上创建特定用例的高性能计算经济。图 7-3 提供了每个市场组成部分的三种合约的可视化总结。那么，在
    ECM 上发起计算请求需要什么？主要有两个函数用于创建请求并提供所有必要的细节。这里，`requestExecution` 函数用于创建计算请求，该函数接收两个参数。第一个是函数本身的输入集，第二个是一个时间窗口，在此期间，提交的答案可以在请求变为软解决状态之前受到质疑。这个时间窗口以区块数量给出，因为在以太坊中，区块是在确定的时间间隔内创建的。最后，此函数还指定了为此计算提供的报酬。`getRequest`
    函数返回关于该请求的所有元数据。以下是从元数据返回的一些相关参数：


    *   **address requester:** 请求计算的客户的地址

    *   **bytes32 resultHash:** 给定计算结果的 SHA-3 哈希值

    *   **address executable:** 为解决受质疑答案而部署在链上的可执行合约的地址

    *   **uint status:** 请求在其生命周期中特定时间点的状态。它是一个与请求状态相对应的无符号整数，状态由数字 0-7 表示。

    *   **uint payment:** 此请求将为完成计算而支付（给主机）的 wei 数量。Wei 是用户之间可以转移的最小以太币单位，类似于比特币中的聪。

    *   **uint softResolutionBlocks:** 一个由区块数量给出的时间窗口，在此期间必须提交对答案的质疑。如果在该时间间隔内没有对答案提出质疑，请求将变为软解决状态。

    *   **uint requiredDeposit:** 提交答案以响应请求时，或由反对已提交答案的质疑者提供的 wei 数量。此保证金将被锁定，直到请求进入最终确定状态，然后返还给主机。


    重要的是要注意，在我们的讨论中，一些任务如答案验证、冲突解决和质疑需要保证金。保证金被用作一种对策，以减少网络上发生女巫攻击的可能性。在女巫攻击中，攻击者创建多个虚假或女巫身份以接管网络。更准确地说，在我们的案例中，攻击者会在网络上创建多个虚假节点。这使得攻击者能够在网络上投票、拒绝区块批准并阻止网络上区块的传输。大规模的女巫攻击需要攻击者控制网络上的大部分计算能力或哈希率。通过接管大部分计算能力，攻击者理论上可以逆转交易并实现双重支付。这也被称为“51%攻击”。然而，实际上，随着网络规模的增长，实现
    51% 攻击变得越来越不可行。


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig3_HTML.jpg](img/430562_2_En_7_Fig3_HTML.jpg)


    图 7-3


    市场中某细分市场的概览


    在图 7-3 中，我们看到了市场中响应客户请求所需的三个组件：经纪人合约、执行合约和工厂合约。经纪人合约促进客户与主机的交互，而另外两个合约在争议解决中发挥作用。如果对提交的答案提出质疑，经纪人将通过其工厂合约（也称为
    FactorBase，以红色工作流程显示）启动执行合约的部署，该工厂合约整合信息并为算法的一轮执行做准备。执行所需的 gas 将从质疑者需提交的保证金中扣除。我们接下来将讨论提交和质疑流程。


    接下来，我们将讨论将答案提交回客户以及质疑流程。提交链下计算完成的答案是使用 `answerRequest` 函数执行的。此函数接收正在被答复的请求的唯一
    ID 作为输入。实际提交一个潜在答案需要一笔以太币保证金。此保证金将被锁定，直到请求达到软解决或硬解决状态。我们将简要讨论从相关方扣押保证金的重要性。一旦请求最终确定，提交答案的主机可以收回其缴纳的保证金以及执行计算获得的奖励。如果提交的答案不符合客户提交请求的期望，参与者可以质疑该答案。这将启动一个链上验证过程，该过程将在
    EVM 内执行一轮计算，以验证提交的答案是否正确。如果在链上计算过程中发现提交的答案不正确，主机的保证金将被扣除该计算的 gas 成本。质疑者将获得客户保证金中的大部分奖励，争议由此解决。


    对于提交的答案受到质疑的请求，该请求将进入需要解决状态。这通过调用 `initializeDispute` 函数实现，该函数充当从提出质疑到开始链上验证之间的过渡。现在，经纪人合约将使用工厂来部署一个用此请求的输入初始化的可执行合约。调用此函数并执行一轮计算的
    gas 成本将从质疑者的保证金中报销。在请求的解决状态下，会持续调用 `executeExecutable` 函数，直到链上验证完成。此时，请求进入硬解决状态并最终确定。Gas
    费用和奖励系统可能看起来很复杂，但它遵循一个简单的原则：正确答案获得计算报酬，而错误的提交者必须为链上验证支付 gas。让我们回顾一下：


    *   在软解决的情况下，主机收回其初始保证金以及客户为执行计算而给予的奖励。

    *   如果没有提交正确答案，则验证的 gas 成本由提交答案的用户平均分摊。奖励报酬返还给最初请求计算的客户。

    *   在硬解决的情况下，错误的主机在扣除（用于链上验证的）gas 成本后，收回其剩余保证金。该主机不会获得计算奖励。

    *   如果质疑者在硬解决中获胜，他们将收回其保证金以及奖励报酬。gas 成本从错误主机的保证金中扣除。

