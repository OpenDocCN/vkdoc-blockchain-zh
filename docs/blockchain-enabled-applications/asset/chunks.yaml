    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig4_HTML.jpg](images/430562_2_En_8_Chapter/430562_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Overview of rep_score increasing with each periodic update


    The evaluator function checks for the expiration rule and if the colored coin
    transactions made by the holder contain the URLs corresponding to updates in the
    metadata. If those two conditions are met, the rep_score is updated for the holder’s
    wallet. This slow increase allows for the reputation to build over time, and the
    rep_score parameter can be referenced in a blockchain-agnostic manner from external
    services. API calls can become the default manner of attaching an up-to-date rep_score
