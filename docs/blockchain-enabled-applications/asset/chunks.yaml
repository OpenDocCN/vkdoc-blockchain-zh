    \ and the product is in sync with what the market needs. However, your product\
    \ needs additional support from marketing and sales engines to capture the market\
    \ and generate revenue. Essentially, the other services in a startup need to be\
    \ built and deployed.\n\n*   **Business hypothesis experimentation** **:** Assumptions\
    \ are ingrained in product development (especially when developing a high-risk,\
    \ high-reward idea), and each assumption carries a risk of failure. Lean reframes\
    \ the assumptions as hypotheses that need to be proven or disproven before the\
    \ cycle of product development can progress further. This reduces the cumulative\
    \ risk by ensuring that our assumptions are internally consistent and validated\
    \ by the customer. A popular technique for hypothesis testing in lean startup\
    \ is called split-testing (or A/B testing). In A/B testing, we present two different\
    \ design decisions to end users wherein half of the early adopters are shown one\
    \ design feature, and the other half are shown a different feature. Data is collected\
    \ from both user groups to help determine which design choice was better appreciated\
    \ by users. In addition, this data collection provides opportunities for direct\
    \ customer interviews to gain more insight into how the user interacted with the\
    \ new functionality. There are two major benefits to using this approach. First,\
    \ you can directly gauge the impact of your work on users. As developers, we may\
    \ obsess over writing more-sophisticated code or developing interesting features\
    \ that end users ultimately may not care about. Secondly, A/B testing eliminates\
    \ conflicts around the priority of feature development—new features can be added\
    \ to the MVP with each iteration and followed up with A/B testing. We can let\
    \ data inform us about the features that a user considers relevant. In this manner,\
    \ if a limited number of changes are made to the MVP, gathering data can reflect\
    \ whether the changes translate to increased user retention and other parameters.\n\
    \n*   **Validated learning:** A/B testing is helpful only if you and your team\
    \ have the discipline to analyze the experiments rigorously and learn from them.\
    \ Eric Ries talks about three properties that contribute to validated learning,\
    \ summarized as the three A's: actionable, accessible, and auditable.\n    * \
    \  Actionable: Well-designed experiments will reveal a causal relationship between\
    \ changes made to an MVP and new users acquired. These experiments generate data\
    \ that is actionable as they provide a direction for future development.\n\n*\
    \   Accessible : The data collected and metrics used must be simple and accessible\
    \ to every member on the team. In particular, metrics can become very misleading\
    \ to anyone collecting the data. As such, what we’re trying to measure and the\
    \ importance of those data points should be stated in the simplest possible terms,\
    \ and be open to comments from any member of the team.\n\n*   Auditable: This\
    \ is analogous to an independent review of your validated learning and experimental\
    \ design process. Anyone should be able to go through the raw data and trace the\
    \ metrics to reach the same recommendations for each iteration of your MVP. This\
    \ builds rigor in the lean startup model and adds data-based justifications for\
    \ pivot or persevere decisions.\n\nNote\n\nLean startup was adopted and transformed\
    \ by the National Science Foundation into a formal curriculum for university-based\
    \ researchers who want to commercialize their technology. The Innovation Corps\
    \ Program (I-Corps) trains teams of researchers and entrepreneurs for twelve weeks\
    \ and equips them with the customer discovery skills. Every week is an iteration\
    \ of the MVP based strictly on customer interviews, and the teams receive feedback\
    \ from a panel of experts at the site hosting the I-Corps program. Each team comprises\
    \ a technical lead, an entrepreneurship lead, and an I-Corps mentor. The teams\
    \ are required to log weekly customer interviews and present updates to their\
    \ business model canvas (which we discuss next). Major decisions such as pivot\
    \ points are made based on documented data trends from interviews, making the\
    \ whole customer-interview process very rigorous."
  trans: "\n# 精益方法论\n\n精益方法论是一套用于开发产品的原则，旨在通过迭代的方式不断质疑所提出的商业模式是否真正解决了客户想要解决的问题，而非在没有明确终端客户的情况下规划产品。这通过更短的产品开发周期、随后多次发布以获取客户反馈、商业假设实验以及经证实的认知来实现。`Eric\
    \ Ries` 是精益方法论的创始人。它为将区块链这类高风险、高回报的技术推向市场提供了一个框架。对于任何试图整合区块链或尝试在区块链上提供新服务的组织来说，需要一个严谨的框架来评估该组织是否能从区块链中受益。精益方法论的实际应用将提供这样的工具集，在本节中，我们希望向读者介绍精益的基本原理：\n\
    \n-   **最小可行产品 (MVP)：** 可以说是精益方法论中最重要的方面。最小可行产品是指产品的最早期版本，功能数量有限，其设计目的仅仅是为了吸引早期采用者，从而获取关于核心概念的数据和反馈。MVP\
    \ 的设计必须以投入最小的组装精力，并产出关于产品和创意的最大数据量为目标。例如，一个提供定制贴纸的服务，无需花费数月时间设计复杂的贴纸。相反，一个带有几种贴纸设计的简单落地页就足以提出更关键的问题：客户想要那些贴纸吗？一个落地页可以检验这个假设，而我们的\
    \ MVP 可以就如何更新产品以使其符合客户需求提供指导。MVP 中包含的功能是基础性的，但这里的目的不是为了展示独特的功能，而是为了尽快接触客户。精心定义一个可操作的\
    \ MVP 并挖掘客户数据，是成功将高风险、高回报产品推向市场的第一步。\n\n-   **转型：** 在 MVP 的迭代开发过程中，与客户的互动将为构建新功能和更新提供宝贵的指导。然而，一些客户互动可能会指出产品的缺陷，以及需要对核心概念进行根本性改变。此时，你有两个选择：要么转型，要么坚持。转型是指改变产品中非常有限的属性集，并生成一个新的\
    \ MVP，以证明你的核心概念正在与客户需求同步进化。进行有限数量的改变，可以让你检验能最大化触达客户直接影响。另一方面，坚持是一种大胆的冒险，即认为进一步的实验和产品微调最终能满足客户需求。`Eric\
    \ Ries` 提出，衡量创业公司带宽的指标不一定是有多少资本，而是在产品准备好被大规模采用之前，它能够进行多少次转型。转型决策是关键的分支点，因此会带来风险。使用分离测试可以极大地帮助分层并降低风险。\n\
    \n-   **产品-市场契合：** 这是迭代设计中的一个阶段，此时 MVP 已功能丰富，早期采用者正在说服更多务实的用户尝试你的产品。产品-市场契合使你的产品正好处于即将实现大规模采用的临界点。在这个阶段，你已经验证了关于产品的所有假设，产品与市场需求同步。然而，你的产品需要营销和销售引擎的额外支持来占领市场并产生收入。本质上，创业公司中的其他服务需要被构建和部署。\n\
    \n-   **商业假设实验：** 假设深深植根于产品开发之中（尤其是在开发高风险、高回报的想法时），每个假设都带有失败的风险。精益将假设重新定义为需要在产品开发周期进一步推进之前被证实或证伪的假设。这通过确保我们的假设在内部保持一致并得到客户验证，从而降低了累积风险。精益创业中一种流行的假设检验技术称为分离测试（或\
    \ A/B 测试）。在 A/B 测试中，我们向终端用户展示两种不同的设计决策，其中一半的早期采用者会看到一个设计特性，而另一半会看到另一个不同的特性。从两组用户收集数据，以帮助确定哪种设计选择更受用户青睐。此外，这种数据收集提供了直接与客户访谈的机会，以更深入地了解用户如何与新的功能交互。使用这种方法有两个主要好处。首先，你可以直接衡量你的工作对用户的影响。作为开发者，我们可能会痴迷于编写更复杂的代码或开发终端用户最终可能并不关心的有趣功能。其次，A/B\
    \ 测试消除了关于功能开发优先级的冲突——新的功能可以在每次迭代时添加到 MVP 中，并随后进行 A/B 测试。我们可以让数据告诉我们用户认为哪些功能是相关的。通过这种方式，如果对\
    \ MVP 进行了有限数量的更改，收集的数据可以反映这些更改是否转化为用户留存率等参数的增长。\n\n-   **经证实的认知：** 只有当你和你的团队有纪律地严谨分析实验并从中学习时，A/B\
    \ 测试才有帮助。`Eric Ries` 谈到了有助于经证实认知的三个属性，总结为三个 A：可操作、可访问和可审计。\n    -   可操作：设计良好的实验将揭示对\
    \ MVP 所做的更改与获得的新用户之间的因果关系。这些实验产生的数据是可操作的，因为它们为未来的开发提供了方向。\n    -   可访问：收集的数据和使用的指标必须简单，并且团队中的每个成员都可以访问。特别是，对于任何收集数据的人来说，指标可能会变得非常具有误导性。因此，我们试图衡量的内容以及这些数据点的重要性应该用最简单的术语陈述，并对团队任何成员的评论持开放态度。\n\
    \    -   可审计：这类似于对经证实的认知和实验设计过程进行独立审查。任何人都应该能够查看原始数据并追溯指标，从而得到关于 MVP 每次迭代的相同建议。这为精益创业模型建立了严谨性，并为转型或坚持的决策增加了基于数据的理由。\n\
    \n**注意**\n\n精益创业已被美国国家科学基金会采纳并转化为正式的课程，面向那些希望将其技术商业化的大学研究人员。“创新队”计划（I-Corps）培训由研究人员和企业家组成的团队，为期十二周，让他们掌握客户发现技能。每周都是严格基于客户访谈的\
    \ MVP 迭代，团队会在举办 I-Corps 计划的地点得到专家小组的反馈。每个团队由一名技术负责人、一名创业负责人和一名 I-Corps 导师组成。团队需要每周记录客户访谈，并更新他们的商业模式画布（我们将在下一节讨论）。诸如转型点等重大决策都是基于访谈中记录的数据趋势做出的，这使得整个客户访谈过程非常严谨。\n"
- fmt: '# Identifying and Building the Appropriate MVP


    Identifying and building the appropriate MVP can be very challenging. Steve Blank
    shares a fantastic example on his blog about how difficult and potentially misleading
    this task can be:


    > I ran into a small startup at Stanford who wants to fly Unmanned Aerial Vehicles
    (drones) with a [Hyper-spectral camera](http://www.microimages.com/documentation/Tutorials/hyprspec.pdf)
    over farm fields to collect [hyper-spectral images](http://en.wikipedia.org/wiki/Hyperspectral_imaging).
    These images would be able to tell farmers how healthy their plants were, whether
    there were diseases or bugs, whether there was enough fertilizer, and enough water.
    (The camera has enough resolution to see individual plants.) Knowing this means
    farms can make better forecasts of how much their fields will produce, whether
    they should treat specific areas for pests, and put fertilizer and water only
    where it was needed.


    > (Drones were better than satellites because of higher resolution and the potential
    for making more passes over the fields, and better than airplanes because of lower
    cost.)


    > All of this information would help farmers increase yields (making more money)
    and reduce costs by using less water and fertilizer/chemicals by only applying
    where it was needed.


    > Their plan was to be a data service provider in an emerging business called
    “[precision agriculture](http://en.wikipedia.org/wiki/Precision_agriculture).”
    They would go out to a farmer’s fields on a weekly basis, fly the drones, collect
    and process the data and then give it to the farmers in an easy understandable
    form.


    ## Customer Discovery on Farms


    > I don’t know what it is about Stanford, but this was the fourth or fifth startup
    I’ve seen in precision agriculture that used drones, [robotics](http://bluerivert.com),
    high-tech sensors, etc. This team got my attention when they said, “Let us tell
    you about our conversations with potential customers.” I listened, and as they
    described their customer interviews, it seemed like they had found that—yes, farmers
    do understand that not being able to see what was going on in detail on their
    fields was a problem—and yes—having data like this would be great—in theory.


    > So the team decided that this felt like a real business they wanted to build.
    And now they were out raising money to build a prototype minimum viable product
    (MVP). All good. Smart team, real domain experts in hyper-spectral imaging, drone
    design, good start on customer discovery, beginning to think about product/market
    fit, etc.


    ## Lean Is Not an Engineering Process


    > They showed me their goals and budget for their next step. What they wanted
    was a happy early customer who recognized the value of their data and was willing
    to be an evangelist. Great goal.


    > They concluded that the only way to get a delighted early customer was to build
    a minimum viable product (MVP). They believed that the MVP needed to 1) demonstrate
    a drone flight, 2) make sure their software could stitch together all the images
    of a field, and then 3) present the data to the farmer in a way he could use it.


    > And they logically concluded that the way to do this was to buy a drone, buy
    a [hyper-spectral camera](http://www.spectralcameras.com/aisa), buy the software
    for image processing, spend months of engineering time integrating the camera,
    platform and software together, etc. They showed me their barebones budget for
    doing all this. Logical.


    > And wrong.


    ## Keep Your Eyes on the Prize


    > The team confused the goal of the MVP (seeing if they could find a delighted
    farmer who would pay for the data) with the process of getting to the goal. They
    had the right goal but the wrong MVP to test it. Here’s why.


    > The team’s hypothesis was that they could deliver actionable data that farmers
    would pay for. Period. Since the startup defined itself as a data services company,
    at the end of the day, the farmer couldn’t care less whether the data came from
    satellites, airplanes, drones, or magic as long as they had timely information.


    > That meant that all the work about buying a drone, a camera, software and time
    integrating it all was wasted time and effort—now. They did not need to test any
    of that yet. (There’s plenty of existence proofs that [low cost drones can be
    equipped to carry cameras](http://www.dji-innovations.com/).) They had defined
    the wrong MVP to test first. What they needed to spend their time on was first
    testing whether farmers cared about the data.


    > So I asked, “Would it be cheaper to rent a camera and plane or helicopter, and
    fly over the farmer’s field, hand process the data and see if that’s the information
    farmers would pay for? Couldn’t you do that in a day or two, for a tenth of the
    money you’re looking for?”


    ## Note


    This post was taken from Steven Blank’s blog and shared here to illustrate the
    importance of planning the stages necessary to define an MVP. The incorrect MVP
    will cost more resources and result in tangential data that does not validate
    your hypothesis directly. On the other hand, a properly constructed MVP will allow
    you to validate your core hypothesis rapidly without using any significant resources.


    The lean principles discussed here capture a market as the product gradually and
    iteratively matures through multiple stages. Product-market fit is the most important
    of the stages, and Geoffrey Moore, an organizational theorist, characterizes it
    as a chasm that products have to cross to be launched into mass adoption phases.
    Figure [10-1](#430562_2_En_10_Chapter.xhtml#Fig1) summarizes the different phases
    of customer segments that a product can capture. Let us briefly review five of
    them here:


    - **Innovators:** This segment is made of power users—a type of customer with
    some background and limited domain expertise in the vertical that your product
    falls under. Financial lucidity is a key property of this segment, as a low risk
    tolerance allows them to adopt technologies that may ultimately fail, but stable
    financial resources help absorb the failures. This customer is eager to try new
    products and will provide valuable technical insights as they have a vested interest
    in seeing new products succeed.


    - **Early adopters:** This segment is very well connected with the innovators
    and has the highest amount of social capital to influence public opinion. More
    discrete in adopting new technologies and use this position to signal confidence
    in emerging trends. Early adopters play a huge role in helping a product appeal
    to broader audiences and achieve product-market fit.


    - **Chasm:** A significant number of startups fail and never cross the chasm.
    The products developed never achieve product-market fit, and eventually the startup
    runs out of capital investment. Companies that manage to cross the chasm are now
    ready for mainstream market.


    - **Early majority:** This is the first segment of the mainstream pragmatic consumers.
    Even though less social capital is invested at this level, word of mouth helps
    the product spread and reach very broadly.


    - **Late majority:** This segment approaches new innovation with significant skepticism.
    A low financial lucidity plays a major role here, and although late, new product
    adoption happens long after the average member of society.'
