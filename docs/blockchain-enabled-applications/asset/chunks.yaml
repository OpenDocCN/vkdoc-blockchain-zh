  raw: 'Buterin talked about the balance between automation and capital in the context
    of what sets decentralized organizations apart from traditional companies. Paul
    Kohlhaas from ConsenSys presented Figure [6-1](#430562_2_En_6_Chapter.xhtml#Fig1)
    to illustrate where DAOs fall on the spectrum of autonomous organizations. Note
    in this figure that different types of autonomous organizations fall on the spectrum
    between automation and human controlled, such as simple decentralized organizations
    (DOs) and traditional decentralized corporations (DCs) .


    ![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig1_HTML.jpg](images/430562_2_En_6_Chapter/430562_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    DAOs as automation-powered decision-making entities with human participants


    In essence, DAOs are a paradigm shift from automated entities that previously
    contained no capital. Using a blockchain allows us to infuse capital and build
    hybrid business models where we can fine-tune the degree of automation for specific
    use cases. The following is a brief glossary that explains three new terms used
    in Figure [6-1](#430562_2_En_6_Chapter.xhtml#Fig1):


    *   DAs: Decentralized agents, essentially bots that were programmed for specific
    tasks by developers. The main difference between DAs and DAOs is that the latter
    has internal capital.


    *   DCs: Decentralized corporations, essentially a medium between forums that
    run without any internal capital and decentralized agents that are completely
    automated.


    *   DOs: Decentralized organizations, essentially a medium between traditional
    companies and fully autonomous DAOs


    ## The Team


    As often is the case in the blockchain world, much confusion surrounds the nature
    of the relationship between the employeeless DAO and the humans who wrote and
    maintained The DAO’s code. Those humans, in the case of The DAO, were led by the
    top brass at Slock.it, a German company set on disrupting the sharing economy
    by way of a technology they called the Universal Sharing Network (USN).


    Christopher Jentzsch, Slock.it’s CEO, and Stephan Tual, the company’s COO, held
    senior positions at the Ethereum Foundation (Lead Tester and CCO, respectively)
    prior to starting Slock.it. Jentzsch was the primary developer of The DAO code,
    and Tual became the face of The DAO via blog posts, conference presentations,
    and forum contributions. So how would their current company benefit from the creation
    of a leaderless venture fund built on Ethereum? To understand their motivations,
    we have to examine Slock.it’s vision to connect the blockchain to the physical
    world.


    In building the USN, Slock.it set out to play a central role in mainstream adoption
    of IoT technology. By providing a way to interact with devices on the network
    from anywhere in the world, the USN would, hopefully, become the backbone of a
    hyperconnected world, where your property could be rented out to other people
    without the need for centralized companies like Uber and Airbnb. Instead, the
    USN would provide an interface to the Ethereum blockchain, where decentralized
    applications can govern the transactions that make up the sharing economy.


    The company intended to build a specialized modem, called the Ethereum Computer,
    for connecting IoT devices to the USN. Slock.it’s vision for The DAO was to create
    a decentralized venture fund that would invest in promising proposals to build
    blockchain-supported products and services.


    At the time of writing (a few years after the original DAO’s ICO), Slock.it has
    raised $2 million in seed funding to continue developing the USN and the Ethereum
    Computer. According to Tual’s blog posts on the company website, Slock.it will
    now make the Ethereum Computer available as a free and open source image for popular
    system-on-a-chip (SoC) systems such as Raspberry Pi. The company also built and
    supports Share&Charge, a service that lets owners of electric vehicle charging
    stations sell their power to electric vehicle owners via a blockchain-powered
    mobile app.


    Jeremiah Owyang, in a presentation titled “How Technology Improves Hosting of
    the Future” (given on 11.19.2016) from Crowd Companies, summarized one of the
    main use cases of Slock.it in a slide shown in Figure [6-2](#430562_2_En_6_Chapter.xhtml#Fig2).


    ![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig2_HTML.jpg](images/430562_2_En_6_Chapter/430562_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Slock.it can act as a decentalized Airbnb by linking the purchase of a physical
    device (a smart lock) to a smart contract


    Ultimately, the idea expressed in Figure [6-2](#430562_2_En_6_Chapter.xhtml#Fig2)
    was expanded to become a decentralized IoT platform, where any device could be
    connected to the blockchain.'
  trans: "\nButerin 谈到了在区分去中心化组织与传统公司时，自动化与资本之间的平衡。来自 ConsenSys 的 Paul Kohlhaas 展示了图\
    \ 6-1，用以说明 DAO 在自治组织谱系中的位置。请注意，此图显示了不同类型的自治组织分布在从自动化到人工控制的谱系上，例如简单的去中心化组织（DO）和传统的去中心化公司（DC）。\n\
