    在 COVID-19 疫情期间，基于区块链的应用正被重新利用，以协助接触者追踪、为公众开发"健康通行证"，以及追踪医生的职业倦怠情况。在不久的将来，建立在区块链上的供应链应用可以帮助维持个人防护装备（PPE）库存，甚至包括疫苗等治疗药物。我们希望您在探索区块链应用的基础知识、当前最佳实践和未来潜力时，能觉得本书中的信息既实用又有趣。欢迎您通过
    `info@metil.org` 向我们反馈。


    ## 致谢


