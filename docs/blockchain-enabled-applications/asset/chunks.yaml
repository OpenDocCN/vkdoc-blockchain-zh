    ### 企业以太坊联盟路线图


    首要目标中，EEA 旨在成为构建企业级以太坊应用的规范与标准。Helen Partz 近期在 *Cointelegraph* 上发表的一篇文章强调了该项目在此方向上取得的进展：


    > 企业以太坊联盟（EEA）正在组建一个技术工作组，致力于协调主网与企业之间的协作。

    >

    > 根据 8 月 6 日与 Cointelegraph 分享的一份新闻稿，该工作组名为“EEA 主网倡议”，旨在加速并引领 EEA 的企业和初创成员，以及从事主网技术和互操作性解决方案研究的人员之间的合作。

    >

    > **EEA 主网倡议致力于互操作性与可扩展性解决方案**

    >

    > 新闻稿指出，主网倡议将努力提升对公共网络组件如何满足促进以太坊采用所需的商业市场要求的理解。EEA 将作为以太坊基金会主要开发者大会 `Devcon5`
    的一部分，围绕主网倡议举行互动讨论。


    以下三张图（图 11-24、图 11-25、图 11-26）取自 Bob Summerwill 提供的 EEA 最新动态。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig26_HTML.jpg](img/430562_2_En_11_Fig26_HTML.jpg)


    图 11-26


    EEA 近期关注的三大领域


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig25_HTML.jpg](img/430562_2_En_11_Fig25_HTML.jpg)


    图 11-25


    为处理企业级交易而修改的以太坊新协议栈


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig24_HTML.jpg](img/430562_2_En_11_Fig24_HTML.jpg)


    图 11-24


    企业以太坊联盟简介


    在此例中，隐私至关重要，并且大多数矿工（节点）都是已知且可信的。请注意，企业协议位于共享的公有-私有区块链之上，并进行了必要的修改以保护隐私。公有客户端共享相同的存储和虚拟机，而私有或企业客户端则会被分配隔离的存储和虚拟机，用于执行加密的指令负载。更广泛地说，企业以太坊是一场比
    EEA 正在开发的 `Quorum` 更为宏大的运动。让我们退一步，谈谈为何需要企业版本。`ConsenSys` 的 Jeremy Miller 给出了三个主要原因：


    *   以太坊最初是为公有链部署而开发的，其去信任的交易需求优先于绝对性能。当前的公有链共识算法（尤其是工作量证明）对于拥有可信参与者和高吞吐量需求的网络来说过于繁重。

    *   从定义上讲，公有链的隐私和权限要求有限（至少最初是这样）。尽管以太坊确实允许在智能合约和网络层实现权限控制，但它并不“开箱即用”地兼容传统的企业安全和身份架构，也不符合数据隐私要求。

    *   自然，当前的[以太坊改进流程](https://github.com/ethereum/EIPs)（主要由以太坊改进提案主导）在很大程度上受公有链事务主导，此前企业
    IT 需求在此流程中很难得到清晰阐述和优先考虑。


    EEA 在近期的核心技术目标是什么？图 11-26 在 `Quorum` 开发的背景下提供了三个主要关注点。


    EEA 最大的关注点是开发可在全行业使用的企业参考规范和实现标准。另一方面，`Quorum` 的开发重心在于提供高水平的隐私保护（`JPMorgan` 将其视为主要障碍），并可根据用户执行的交易和智能合约进行配置。混合公有-私有链可以成为联盟型场景的理想模式。下一个重点是创建可插拔的共识模型，使得交易和复杂场景能够选择最适合该用例的共识机制。最后，高吞吐量性能对于
    `Quorum` 的成功至关重要；因此，开发更好的基准测试工具来进行衡量和改进，将成为其广泛采用的关键。

