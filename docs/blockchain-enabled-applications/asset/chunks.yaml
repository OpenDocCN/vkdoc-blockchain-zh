- fmt: '**John:** We have also developed expertise in tokenization, and we believe
    that one or more of our products will have a meaningful, token-centric architecture.
    The concept of a token offering is exciting because it has the potential to fund
    infrastructure concepts for public health. Designed effectively, tokens can also
    help deliver on the promise of intelligent value exchange in healthcare. Programmable
    payments are an incredible opportunity to improve how money flows in healthcare
    today, creating better incentive structures that result in the alignment we have
    been missing for so long, especially when it comes to physician and patient behavior.
    Dr. Rasu Shrestha said it well: “At the end of the day, innovation is really about
    behavior change, whether it’s a clinician putting in an order, that radiologist
    making a specific diagnosis or call on a finding, or the patient making a decision
    to eat that muffin versus going for that salad. Innovation is about behavior change.”
    [See it at `https://www.healthcare-informatics.com/article/upmc-s-rasu-shrestha-innovation-about-behavior-change-technology-should-be-invisible`.]


    We are in no rush to jump into the ICO craze, preferring to take our time and
    make sure the token mechanism is integral to the product and the token sale is
    offered in a way that satisfies the interests of our constituents while getting
    a token into the hands of those who will use it. No one can ignore the power of
    this innovation. A team of engineers anywhere in the world can make available
    a secure financial system with clear benefits over what exists today. It’s a model
    that makes it difficult for traditional systems and conventionally funded startups
    to compete.


    We feel confident that several of our use cases and pending partnerships have
    tokenization opportunities. We see tokens as a new, better container than what
    we have today. We are extremely interested in and excited by the emerging relationship
    between companies and tokens in the health industry. We are also interested to
    see if we can apply our same collaborative principles to the token distribution
    concept, especially in the areas of governance and coordination models.


    The value that Hashed Health delivers is simple and necessary at this stage of
    market- and product-building. We are a healthcare company first, which means we
    have the patient as our primary consideration. Our team averages fifteen years
    in healthcare technology. We know healthcare, and we are able to connect challenges
    in healthcare with the possibilities of blockchain. This means we are really good
    at healthcare blockchain use cases. Second, in a world where the technology is
    changing rapidly, we do not lock customers into a specific technology. Not every
    protocol or middleware solution is perfect for a specific business problem. At
    Hashed, the protocol supports the problem. And third, our collaborative approach
    lowers the risk and increases the likelihood of success for projects. The “build
    it and they will come” model results in an expensive academic exercise. There’s
    a better path where you can distribute the costs and the rewards across a network
    of collaborators who are organized around success. We have created a company and
    a business model that fits the spirit of the decentralized health solutions we
    build. Together we will innovate, and together we will accelerate the meaningful
    productive use and realize the potential of blockchain in healthcare.


    ## Blockchain-as-a-Service


    In an earlier chapter, we talked about using lean methodologies to discover whether
    integrating a blockchain is the right choice; we also provided an open source
    avenue in the form of open source DLTs available through Hyperledger. This chapter
    extends our prior discussion to Blockchain-as-a-Service: a more immersive environment
    for testing a blockchain deployment and smart contracts in the cloud.


    Blockchain-as-a-Service (BaaS) is a cloud-based blockchain service that provides
    a development environment for customers to write smart contracts, rapidly prototype
    blockchain applications, and deploy blockchain-based consortia with ease. It eliminates
    barriers to entry, particularly the massive up-front costs of hardware and expertise
    needed to deploy a blockchain network. This allows startups and even large companies
    trying to experiment with the blockchain to better understand the finances of
    integrating a blockchain into the existing business model. The role of a BaaS
    provider is analogous to that of a traditional web host. The provider manages
    the infrastructure, performs hardware upgrades, and keeps the network operational
    for customers to build complex business applications that rely on a blockchain.
    In terms of maintenance, the provider relies on networking tools for proper allocation
    of resources, manages bandwidth, and provides support for other hosting requirements.
    Using a BaaS service can help with mass adoption of blockchain technology as customers
    can focus on their application and core development while avoiding the technical
    complexities of creating a blockchain network and infrastructure-related support
    issues.


    A very interesting international example of the BaaS phenomenon helping with mass
    adoption is the Blockchain-based Service Network (BSN): a tailored infrastructure
    for blockchain development with managed support in the cloud. BSN was the result
    of a large collaborative effort between local blockchain companies in China with
    a vested interest in cloud infrastructure. BSN has already integrated with six
    public chains, including Tezos, NEO, Nervos, EOS, IRISnet, and Ethereum. This
    project aims to include more than ten public chains in the near future and offer
    more security features with technical services that allow developers to streamline
    the development process.


    In this chapter, we study the Blockchain-as-a-Service (BaaS) offerings from four
    providers (three major players in the cloud blockchain world and one ConsenSys-backed
    startup): Microsoft Azure, Amazon Web Services, Oracle, and Kaleido. Our main
    focus will be on the unique aspects of BaaS providers and how each provider is
    supporting the growth of new organizations/startups in the cloud.'
