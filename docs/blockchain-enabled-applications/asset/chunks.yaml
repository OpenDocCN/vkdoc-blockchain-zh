    \ DApp 以及任何特殊的执行参数。让我们更深入地了解当前 SONM“区块链政府”中使用的完整智能合约集合：\n\n-   **SONM 代币：** 网络的默认货币。该代币用于奖励提供计算资源的矿工，以及网络内的用户交易。\n\
    -   **DAO：** SONM 的监管机构，授予用户投票权和管理去中心化应用的行政权限。网络上的 DApp 需要支付 *税收* 才能被纳入 DAO 并获得法院访问权限。DAO\
    \ 还拥有执行特权，可以执行诸如封禁中继、释放和锁定资金以确保矿工获得适当报酬，以及暂停或禁止中继等操作。\n    > 注意：法院将作为一个可通过 DAO\
    \ 访问的争议解决智能合约来实现。它将为市场中的不公平买家或提供商提供保护，并在对解决方案提出质疑时提供结果验证。\n\n-   **中继工厂：** 一个中继在智能合约系统中有两个扩展：一个工厂和一个钱包。钱包只能由中继钱包工厂创建。工厂创建一个新的钱包合约，然后将此合约注册到白名单中。\n\
    -   **中继钱包：** 中继钱包是一个接收买家付款并促进向矿工支付服务代币的合约。钱包由工厂创建，可以处于四种可能状态之一：已创建、已注册、空闲、疑似/已惩罚。最初，所有钱包都处于已创建状态，并有一定数量的冻结资金。在已创建状态下，合约可以在白名单上注册。该合约随后切换到已注册状态，并有权访问高级功能，例如转账和发薪。现在，该钱包可以在一个称为发薪期的指定时间内开始向矿工（但不向自己）付款。在发薪期结束后，钱包可以使用\
    \ `payday` 函数将剩余资金转移到所有者的钱包。如果发现关联的中继存在恶意行为，DAO 可以将其列入黑名单并没收冻结资金。根据情况，DAO 可以进一步决定将钱包状态更改为疑似或已惩罚。\n\
    -   **白名单：** 白名单是一种注册类型的合约，包含网络中中继的详细信息，包括其状态。所有由工厂创建的钱包都在此白名单合约中注册。最初，此白名单作为经\
    \ SONM 开发者验证为安全可靠的可信中继注册表。最终，此功能将扩展到开放对新涌现中继的评级。\n-   **RegApp：** 一个使用 `React.js`\
    \ 制作的简单 Web 应用，用于中继节点注册。该应用程序将一个节点添加到白名单合约中。需要注意的是，`RegApp` 与语言无关，只需要一个 Web 界面来注册节点。在此示例中使用了\
    \ `React.js`，但其他 Web 编程语言也同样适用。\n-   **PayOut 应用：** 一个在 SONM 网络上运行的支付应用程序，用于支付和处理给予矿工服务报酬的代币。该应用程序是工厂合约将部署的\
    \ DApp 类型的一个示例。\n\nFigure 7-9 为刚刚讨论的智能合约系统提供了直观的补充说明。来自 Chain Cloud 的 Anthony\
    \ Akentiev 审阅了 SONM 白皮书，并就未来版本中使用 SONM 代币为开发此智能合约架构提供资金的众筹工作提供了一些评论（[`https://medium.com/chain-cloud-company-blog/sonm-whitepaper-review-353ca2713ba9`](https://medium.com/chain-cloud-company-blog/sonm-whitepaper-review-353ca2713ba9)）：\n\
    \n> *众筹分为两个阶段——预售和 ICO。所有资金的 19% 和 20% 作为奖励发送给团队。开发和营销需要等额的資金：预售后，34% 用于开发，32%\
    \ 用于营销；ICO 后，30% 用于开发，33% 用于营销。这看起来很好且公平。*\n>\n> *结论——45/60*\n>\n> *这是我读过的最好的白皮书之一。大项目。大目标。预售和\
    \ ICO 将会很盛大。*\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig9_HTML.jpg](img/430562_2_En_7_Fig9_HTML.jpg)\n\
    \n**图 7-9** SONM 智能合约系统概览\n"
- fmt: 'Recall that the smart contract system in SONM is further made from several
    contracts working together. The first of these contracts is a migration function
    that allows users who purchased the SONM Presale Token (`SPT`, during the presale
    that Anthony mentioned) to exchange their token for `SNM` (SONM Token) and participate
    in the network. Next is the hub factory contract used in SONM for deployment of
    applications. In the current implementation, the hub factory creates the hub wallet
    used to compensate miners for their computational resources. The factory also
    deploys a network-wide whitelist contract that serves as a registry of hubs active
    on the network and wallets created in each hub. Lastly, the factory deploys a
    payout application that releases `SNM` tokens to miners for the provided services.
    The last smart contract we will consider here is the DAO, which provisions several
    administrative functions to stop malicious entities. These functions include delisting
    a hub (from the whitelist contract) if caught in fraud, freezing funds by suspending
    a hub wallet, or conflict resolution in case of challenges using the court.


    ### Buyer–Hub–Miner Interactions


    Posting a task on the SONM network requesting computational resources requires
    a fair amount of communication between the buyer and the miner who will execute
    the task. For instance, before processing can begin, there are several verification
    interactions that occur between a miner, the assigning hub, and the buyer. Once
    the buyer is verified, a hub will assign the task to a miner’s fog computing cloud
    and ensure the miner is paid for their services. This collective set of interactions
    is defined here as Buyer–Hub–Miner communication. This interchange can be best
    demonstrated visually in the two parts of Figure [7-10](#430562_2_En_7_Chapter.xhtml#Fig10).
    The first part, Figure [7-10 (A)](#430562_2_En_7_Chapter.xhtml#Fig10), explains
    the miner–hub interactions when a computation begins, and Figure [7-10 (B)](#430562_2_En_7_Chapter.xhtml#Fig10)
    provides the full picture by introducing the buyer and miner payout.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig10_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig10_HTML.jpg)


    Figure 7-10 (A)


    Miner–Hub verification


    In Figure [7-10 (A)](#430562_2_En_7_Chapter.xhtml#Fig10), we see a hub broadcasting
    information about an active hub wallet and the hub owner’s IP address to the blockchain.
    This information is gathered by a listening agent and then dispatched to a miner.
    Before executing any tasks, a miner will go through a series of steps to validate
    the assigning hub. This process ensures that the hub can be trusted and that there
    are sufficient funds to pay for the computation in the hub wallet. A miner requests
    more information on the assigning hub through a global list called the Hubs Pool
    List. This network-wide list contains all the verified and unconfirmed hubs. To
    verify itself, a hub wallet sends its address on the blockchain, as well as a
    history of past transactions, as proof of authentication. The miner accepts the
    proof and can now begin the computation. It must be noted that all components
    of this validation process, including hub broadcasts, verification requests, wallet
    information, and Hubs Pool List, use the same infrastructure: the blockchain.
    The requests and broadcasts are shared to the rest of the network using the messaging
    bus built with Whisper on top of the blockchain. The dashed blue line in the figure
    indicates a continuation of processes happening on the blockchain, with notifications
    moving to the messaging bus. In addition to the pool list, the miner can also
    request other miners to independently verify the assigning hub’s credentials.
    Over time, the miner builds a personal rating list for hubs across the network
    that have assigned tasks. This list can be used to automate task acceptance and
    skip the verification steps for a highly trusted hub.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig11_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig11_HTML.jpg)


    Figure 7-10 (B)


    Buyer–Hub–Miner interactions


    In Figure [7-10 (B)](#430562_2_En_7_Chapter.xhtml#Fig10), we see that after the
    initial verification of the assigning hub has been completed, the buyer puts forth
    an initial deposit. This deposit is a rough estimate of the computation costs,
    and is stored in the hub wallet. The miner verifies this deposit, and the buyer
    signs an agreement on the blockchain with the estimated costs along with a hash
    of the raw file. This agreement is sent to the miner as the computational task
    is assigned by a hub. The raw file is made available to the miner for download
    through a torrent. After the file has been downloaded, the task description along
    with any special parameters are applied and the processing begins. Once the task
    is completed, the results are made available from the fog computing cloud, and
    the hub collects these results. This hub will now make the results available for
    the buyer to download through a separate torrent. At this point, the agreement
    has been completed and funds from the hub wallet are released to the miner for
    offering their computational resources. In future releases, there will be proper
    locking mechanisms to account for over/under-estimation of the costs. Until the
    buyer adjusts for any errors in the estimates, the results will not be released
    by the hub.'
