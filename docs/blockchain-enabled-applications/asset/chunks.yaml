  trans: '

    #### 财务应用


    财务应用充当内部银行，记录 DAO 内发生的所有财务活动。在本主题中，我们将介绍如何使用财务应用进行存款和取款。要开始银行操作，我们先请求一些测试代币。导航至
    `System` 选项卡下的 `Permissions`，向下滚动即可看到 *Request test tokens* 部分。这将使我们能够获得一些测试货币，如图
    5-24 所示。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig24_HTML.jpg](img/430562_2_En_5_Fig24_HTML.jpg)


    图 5-24 – 为 DAO 请求代币


    现在，财务应用会显示刚发生的交易；更新后的视图如图 5-25 所示。（15）显示了我们请求测试代币后收到的 20 个 Aragon 代币（ANT）。（16）列出了转入我们
    DAO 的交易记录。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig25_HTML.jpg](img/430562_2_En_5_Fig25_HTML.jpg)


    图 5-25 – 财务应用显示一笔流入交易


    将存款存入 DAO 的一个简单方法是使用已连接的钱包。我们可以通过在财务应用中发起一笔新的转账来存入资金。设置如图 5-26 所示。首先，我们需要选择要转账的货币。我们的
    MetaMask 钱包中只包含 ETH，因此这就是我们要转入 DAO 的资产（17）。接着，我们需要输入 0.02 ETH 的存款金额（18）。最后，我们可以为这笔流入交易添加一条可选信息（19）。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig26_HTML.jpg](img/430562_2_En_5_Fig26_HTML.jpg)


    图 5-26 – 从 MetaMask 钱包向我们的 DAO 转账


    从 DAO 提现的操作步骤与存款非常相似。如图 5-26 所示选择提现，并输入将接收提现资金的以太坊地址。然后，输入要提取的金额和币种。作为练习，尝试提取
    0.01 ETH 到一个 MetaMask 钱包地址。此过程应使财务选项卡显示如图 5-27 所示的内容。（20）显示 DAO 在任何给定时间的剩余余额。（21）是我们从水龙头请求的测试代币。（22）是我们从
    MetaMask 钱包存入的 0.02 ETH，最后，（23）应显示已提取的 0.01 ETH。随着更多交易的进行，财务应用将成为 DAO 的内部追踪器。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig27_HTML.jpg](img/430562_2_En_5_Fig27_HTML.jpg)


    图 5-27 – DAO 的财务概览


    **注意：** Aragon 有一个名为 `Agent` 的应用，允许 DAO 与以太坊区块链上的任何其他智能合约进行交互。这使得组织可以使用 `Agent`
    应用作为中介来发送外部资金或导入资金。由此产生的转账将在财务概览页面上记录，并引用 `Agent`。


    #### 应用权限


    DAO 附带一组标准应用权限，用于实现特定功能。为了扩展应用的功能，或向 DAO 添加新的通用特性，必须对新的权限进行投票表决并添加。导航至侧边栏下的 `System
    ➤ Permissions`。这将打开默认的 `Permissions` 视图，如图 5-28 所示。DAO 允许您更改应用的权限，以及在系统级别更改 DAO
    的权限。我们将只关注应用权限（24）。当前已安装的应用就在下方的（25）中列出。这些应用由模板提供并已预装。（26）列出了我们 DAO 中的应用可用的操作（27）。这些操作被分配给了某个应用，如（28）所示，这表示了从在应用上请求操作到指定应用批准的操作流程。在大多数情况下，如我们之前讨论过的，`Voting`
    应用将监督所有新的操作。（29）是管理器，可以将操作重新分配给安装在我们的 DAO 上的应用。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig28_HTML.jpg](img/430562_2_En_5_Fig28_HTML.jpg)


    图 5-28 – 我们 DAO 的权限概览


    在图 5-28 的右侧，点击 *New permission* 开始添加新权限。这里的目标是添加一个权限，允许 DAO 中的任何账户销毁代币。这将取代默认限制仅由
    `Voting` 应用执行销毁代币操作的功能。`Add Permissions` 视图如图 5-29 所示。首先，选择要为其添加新权限的应用，然后分配一个新的实体。在这里，我们将把任何账户分配给接下来要执行的操作，即销毁代币。一旦点击
    *Add permission*，您将进入投票环节。与对 DAO 的任何重大更改一样，一旦该决议被 DAO 批准，该功能将变为可用。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig29_HTML.jpg](img/430562_2_En_5_Fig29_HTML.jpg)


    图 5-29 – 添加新权限


    如前所述，在添加权限之前，我们需要对此决议进行投票。在图 5-29 中点击 *Add permission* 将带您进入投票界面，如图 5-30 所示。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig30_HTML.jpg](img/430562_2_En_5_Fig30_HTML.jpg)


    图 5-30 – 添加新权限的投票确认


    一旦投票成功，该权限即应用于 DAO，并会在 `Permissions` 选项卡下可见。如图 5-31 所示。至此，我们的教程结束，提供了一个关于如何在 Aragon
    上设置 DAO 的基本概述。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig31_HTML.jpg](img/430562_2_En_5_Fig31_HTML.jpg)


    图 5-31 – 销毁代币操作的更新后权限视图


    在结束讨论之前，让我们简要介绍一下将股份编码为 DAO 中的受保护/限制资产这一主题。不可转让的代币可用作稀有资产，并具有更大的投票权。传统上，上市公司发行的股票有三种类型：


    - **普通股（A 类）：** 这是人们通常所说的股票。普通股由公司发行，通常可在诸如 `Nasdaq` 等证券交易所进行交易。普通股的主要优点是获得股息支付以及在交易所进行交易。股息通常是在季度末，公司从该季度产生的利润中支付给股东的一笔款项。普通股也可以在认可的交易所随时进行交易或出售。这些可以编码为在组织成立后向
    DAO 成员发行的新铸造代币。

