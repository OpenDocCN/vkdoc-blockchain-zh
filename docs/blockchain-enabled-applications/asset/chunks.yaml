    ## R3 与 Corda


    R3 是另一个类似于 Hyperledger 或 EEA 的联盟，也是 Corda 这一独特许可型区块链平台背后的驱动力。Corda 在许多方面不同于其他分布式账本技术，Nick
    Avramov 在一篇博文中对此进行了解释：


    > *你需要掌握三个核心概念才能精通 Corda。它们分别是：*


    > *状态（State）——或称状态对象。它是 Corda 的构建模块，代表一份特定的协议或合约，如同现实世界中的合同。这正是需要达成共识的对象——即确切的状态对象，而非整个账本的状态。这一点非常重要，稍后将详细阐述。*


    > *流程（Flow）——一种小型多方子协议，用于将交易数据（状态对象）共享给相关参与方。这与我们在比特币和以太坊等公链中观察到的全局广播机制截然相反。*


    > *公证人（Notary）——提供交易排序和时间戳服务的实体。关键在于，Corda 并不将交易组织成区块，因此它并非区块链。*


    > *与比特币和以太坊不同*，Corda 是一个基于许可的网络，你必须获得授权才能接入。这一点在流程 API 中已有明确规定——没错，就是我之前介绍的流程。它也可以被视为一个部落或类似实体，对你的身份施加了特定要求，除非满足这些要求，否则你无法加入该特定流程。共识是在交易层面达成的（而非像比特币或以太坊那样在账本层面），因此无需所有网络节点来验证和批准交易。


    > *事实上，Corda 的一个重要特点在于其能够灵活使用不同的共识算法。由于它没有固定的单一算法，公证人实际上可以使用不同的算法——例如 BFT、Raft，或者其他算法。可以提前说明的是，Corda
    正在为所有这些子网络或流程开发一个元网络。想象一下，存在审计公司、银行以及为这些银行服务的清洁公司。它们都有自己内部的簿记、分包商以及各种其他金融和非金融关系。从某种意义上说，Corda
    旨在开发一个系统，使用相同的协议来处理所有这些交互，无论是公司内部的交互还是与外部公司的交互。*


    > *值得提及的是，Corda 的开发人员从一开始就宣称，他们正在创建一种架构，该架构将以具有法律强制执行力的方式模拟和自动化现实世界的交易。这是许多区块链的常见缺陷——它们存储的交易不具有法律价值。相反，Corda
    中的智能合约不仅包含交易信息，还包含法律条文。*


    > *与其他分布式账本技术（账本在所有组织间共享）不同，在 Corda 中，交易仅在该子网络或流程内共享。从这个意义上说，它采用的是直接通信而非全局广播，从而保护了隐私。*


    > *没有任何一个实体拥有网络中所有交易的完整历史记录。但存在公证人，他们了解网络中这一特定部分的当前状态。他们充当交易的验证者。典型的交易流程如下：*


    > *一笔新交易 A 将状态 X 转换（Corda 术语称为“花费”）以创建状态 Y。*


    > *你将交易 A 发送给知晓状态 X 的公证人。*


    > *公证人检查状态 X 是否仍然有效，然后签署交易 A。状态 X 现在失效，由状态 Y 取而代之。*


    > *如果在提出交易时上述状态 X 无效，公证人将回应状态 X 已被花费。*


    > *因此，Corda* *将了解世界状态和查看所有交易的责任从整个网络转移到了一个专门的公证服务上。网络成员无需信任所有人，只需信任运行公证服务的组织。也可以有多个公证人，每个公证人因不同目的而受到信任。*


    ## 总结


    在本章中，我们从三个不同角度讨论了区块链 3.0 范式中应用高级链上执行的情况：EOS.io 及其精妙的消息传递和并行处理能力、作为区块链上资产管理未来模型的
    Chain Core，以及企业级以太坊。以太坊的企业级应用正由希望解决特定领域问题的公司组成的联盟（如 Hyperledger、EEA 和 R3）引导。每个企业级项目背后都有一个开源社区，这使得代码库对于大规模部署而言更加安全、高效且实用。


    # 12. 技术革命与金融资本市场


    全球金融市场正在经历一场剧烈的变革，这场变革清楚地表明，如果没有创新，大多数商业和金融模式可能很快就会过时。最近一份关于全球金融体系的概述将当前系统描述为：


    > *一个每天移动数万亿美元、服务于数十亿人的系统，但这个系统问题重重，通过费用和延迟增加成本，通过冗余且繁重的文书工作造成摩擦，并为欺诈和犯罪提供了机会。*


    > *据我们所知，45% 的金融中介机构，例如支付网络、证券交易所和汇款服务，每年都会遭受经济犯罪的侵害；整个经济体的这一比例为 37%，而专业服务和技术部门分别仅为
    20% 和 27%。难怪监管成本持续攀升，并一直是银行家最关注的问题。这一切都增加了成本，最终由消费者承担。*^(¹¹)


    《区块链革命》的作者唐·塔普斯科特指出，我们的金融体系效率低下有多方面原因：


    > *首先，因为它已经过时，是工业技术和纸面流程的拼凑物，只不过套了个数字化的外壳。其次，因为它中心化，这使其抵制变革，并容易受到系统故障和攻击。第三，它具有排他性，剥夺了数十亿人使用基本金融工具的权利。银行家们在很大程度上回避了那种创造性的破坏，尽管这种破坏是混乱的，但对经济活力和进步至关重要。*^(¹²)


    本章从与全球金融市场相关的问题入手，探讨区块链为何能成为提高其效率的创新解决方案。然后，我们将转向风险投资、ICO、加密货币、代币和交易所等主题。我们将讨论重大的
    ICO 市场影响、监管状况、美国证券交易委员会的介入、独特技术、商业模式、监管科技以及相关问题。在回顾这些概念和问题时，有几个问题和想法需要牢记：


    *   众筹如何扩展区块链应用？


    *   如何创建新的公司和借贷平台？


    *   监管科技能否满足市场对高效合规的需求？


    *   金融科技对银行业和投资银行业的市场影响是什么？


    *   ICO 融资和 ICO 泡沫的现状如何？


    *   随着技术帮助民主化金融机会，各种财富水平的人如何才能参与到金融市场中？


    在本章结尾，我们将介绍多个大型金融集团的现状及其在区块链、金融科技和其他金融技术领域的参与情况。

