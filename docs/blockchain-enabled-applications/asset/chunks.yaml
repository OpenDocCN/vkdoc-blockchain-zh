  trans: "\n# 浪费管理：Capital One、Ark Invest、Gem 的视角\n\n一场由 `Gem`、`Capital One` 和 `Ark\
    \ Invest` 主办的网络研讨会概述了困扰医疗系统的经济成本和间接费用问题。这场浪费问题是在理赔处理背景下，从支付方（保险公司）的角度被强调的。然而，此处汲取的经验教训可广泛应用于其他处理理赔的行业，例如汽车保险。例如，`Gem`\
    \ 宣布与 `Toyota` 合作，将其为医疗保健保险行业开发的应用移植到汽车保险领域。其愿景是利用区块链实现大部分保险理赔流程的自动化。在此，我们将总结小组成员提出的关键发现。在随后的讨论中，小组成员提出的每个问题以\
    \ `[P]` 表示，提出的解决方案以 `[S]` 表示：\n\n![images/430562_2_En_9_Chapter/430562_2_En_9_Fig5_HTML.jpg](img/430562_2_En_9_Fig5_HTML.jpg)\n\
    \n**图 9-5** 连续护理。此图显示了跨越各级护理提供者和社区服务的全面健康服务阵列。该图片取自 `Eccovia` 关于责任医疗组织的演示文稿，已获许可。\n\
    \n- `[P]` 对于医疗服务提供者收取的每一美元，有 15 美分用于理赔处理、促进各方之间的支付以及人工劳动成本。想象一下，对于一个 3 万亿美元的行业，这\
    \ 15 美分累积起来会是多少。\n- `[P]` 医疗服务提供者通过提高报销率来应对，而支付方（保险公司）则通过提高保费来应对。\n- `[P]` 医院正充当银行角色，为患者提供自付费用的贷款，但缺乏支持这种低效支付频率并吸收其影响的基础设施。\n\
    - `[P]` 对于作为贷款提供的患者自付费用，医院的收款率仅为 5%。\n- `[P]` 这些严重的低效问题导致医院在服务基准费率之上额外收取高达 45%\
    \ 的保费。\n- `[S]` 从好的方面看，缩短处理服务提供者理赔的时间可节省 230 亿美元。\n- `[S]` 降低账单周期中自付费用收款的波动性可节省\
    \ 70 亿美元。\n- `[S]` 利用区块链追踪带有历史记录的交易可以显著降低欺诈率，为保险公司节省约 3000 亿美元。\n- `[P]` 结算机构需要花费数天，有时甚至数周来处理理赔，增加了大量间接费用。\n\
    - `[P]` 服务提供者使用多种第三方软件工具来管理理赔。技术非但没有提供帮助，诊所反而面临更严重的碎片化问题，需要依靠人工来整合不同的软件。\n- `[S]`\
    \ 区块链可以追踪整个连续护理过程和账单周期，以减少相关方之间的摩擦。\n- `[S]` 在去中心化账本上，交易和理赔可以被非常高效地追踪，使得理赔解决几乎即时完成，即使不是几分钟内。\n\
    - `[S]` 像比特币区块链这样的公共账本无法使用，`HIPAA` 法律限制了患者信息如何通过数字渠道传输。最终的解决方案将是使用具有已验证节点的许可账本。这将导致只有获得许可的用户才能通过公私钥的使用来访问被追踪的医疗记录。\n\
    - `[S]` 智能合约负责在请求医疗记录的各相关方之间协调区块链上的权限和访问角色。并非每一方都能看到完整的记录，因为许可访问仅允许查看相关内容。\n-\
    \ `[P]` 医疗服务提供者并非 IT 专业人员，他们没有足够的时间为新系统提供培训；因此，互操作性仍然是一个主要问题。\n- `[P]` 缺乏互操作性的问题延伸至：\n\
    \    - 医疗系统中的患者登记\n    - 手术授权\n    - 医疗记录\n    - 共付额收取\n    - 理赔提交\n    - 患者账单\n\
    \    - 理赔与账单的核算\n- `[P]` 功能性与分区——理赔和医疗记录应放在同一条区块链上吗？小组成员谈到了 `Aetna` 的一个场景，该公司每年收到约一百万份来自服务提供者关于理赔信息的传真。这带来了管理这些文书工作的巨大行政开销。理想情况下，理赔和记录是相辅相成的。上传到区块链上的患者手术记录应触发一笔理赔需要处理。最终，通过适当的分区，将两者放在区块链上会更高效。\n\
    - `[S]` 如图 9-5 所示，锚定侧链的概念可能对于涉及多方的协同护理变得更具相关性。特定领域的侧链可以更好地促进访问权限的转移，然后与主链同步。图\
    \ 9-6 展示了一个非常基础的侧链原理图。\n\n当医疗记录在多方之间流转时，区块链可以简化信息流。在本节中，我们总结了 `Ark Invest` 和 `Capital\
    \ One` 发现的一些关于经济浪费的关键发现。尽管侧链仍处于非常早期的发展阶段，但图 9-6 给出了一个简单的图示。\n\n![images/430562_2_En_9_Chapter/430562_2_En_9_Fig6_HTML.jpg](img/430562_2_En_9_Fig6_HTML.jpg)\n\
    \n**图 9-6** 执行链下交易的简单侧链。此过程可用于快速授予许可访问权限和特权；最终这些交易会与上游链同步。\n"
- fmt: '# Verifiable Data Audit


    Google’s DeepMind is working on an interesting blockchain-like service to function
    as an audit log for hospitals using its health services to assist clinical diagnosis.
    The hospitals are transferring sensitive patient data over to DeepMind’s machine
    learning and AI services to make clinical predictions, and this project is an
    effort to ensure the use of data is compliant with patient consent. We reached
    out to DeepMind inquiring about their efforts, and, with permission, we’re reproducing
    an overview of Verifiable Data Audit.


    > *Data can be a powerful force for social progress, helping our most important
    institutions to improve how they serve their communities. As cities, hospitals,
    and transport systems find new ways to understand what people need from them,
    they’re unearthing opportunities to change how they work today and identifying
    exciting ideas for the future.*


    > *Data can only benefit society if it has society’s trust and confidence, and
    here we all face a challenge. Now that you can use data for so many more purposes,
    people aren’t just asking about who’s holding information and whether it’s being
    kept securely—they also want greater assurances about precisely what is being
    done with it.*


    > *In that context, auditability becomes an increasingly important virtue. Any
    well-built digital tool will already log how it uses data, and be able to show
    and justify those logs if challenged. But the more powerful and secure we can
    make that audit process, the easier it becomes to establish real confidence about
    how data is being used in practice.*


    > *Imagine a service that could give mathematical assurance about what is happening
    with each individual piece of personal data, without possibility of falsification
    or omission. Imagine the ability for the inner workings of that system to be checked
    in real-time, to ensure that data is only being used as it should be. Imagine
    that the infrastructure powering this was freely available as open source, so
    any organization in the world could implement their own version if they wanted
    to.*


    > *The working title for this project is “Verifiable Data Audit,” and we’re really
    excited to share more details about what we’re planning to build!*


    ## Verifiable Data Audit for DeepMind Health


    > *Over the course of this year we’ll be starting to build out Verifiable Data
    Audit for* [*DeepMind Health*](https://deepmind.com/applied/deepmind-health/)*,
    our effort to provide the health service with technology that can help clinicians
    predict, diagnose, and prevent serious illnesses—a key part of DeepMind’s mission
    to deploy technology for social benefit.*


    > *Given the sensitivity of health data, we’ve always believed that we should
    aim to be as innovative with governance as we are with the technology itself.
    We’ve already invited additional oversight of DeepMind Health by appointing a
    panel of unpaid* [*Independent Reviewers*](https://deepmind.com/applied/deepmind-health/transparency-independent-reviewers/independent-reviewers/)
    *who are charged with scrutinizing our healthcare work, commissioning audits,
    and publishing an annual report with their findings.*


    > *We see Verifiable Data Audit as a powerful complement to this scrutiny, giving
    our partner hospitals an additional real-time and fully proven mechanism to check
    how we’re processing data. We think this approach will be particularly useful
    in health, given the sensitivity of personal medical data and the need for each
    interaction with data to be appropriately authorized and consistent with rules
    around patient consent. For example, an organization holding health data can’t
    simply decide to start carrying out research on patient records being used to
    provide care, or repurpose a research dataset for some other unapproved use. In
    other words: it’s not just where the data is stored, it’s what’s being done with
    it that counts. We want to make that verifiable and auditable, in real-time, for
    the first time.*


    > *So, how will it work? We serve our hospital partners as a data processor, meaning
    that our role is to provide secure data services under their instructions, with
    the hospital remaining in full control throughout. Right now, any time our systems
    receive or touch that data, we create a log of that interaction that can be audited
    later if needed.*


    > *With Verifiable Data Audit, we’ll build on this further. Each time there’s
    any interaction with data, we’ll begin to add an entry to a special digital ledger.
    That entry will record the fact that a particular piece of data has been used,
    and also the reason why - for example, that blood test data was checked against
    the NHS national algorithm to detect possible acute kidney injury.*


    > *The ledger and the entries within it will share some of the properties of*
    [*blockchain*](https://en.wikipedia.org/wiki/Blockchain_%2528database%2529)*,
    which is the idea behind Bitcoin and other projects. Like blockchain, the ledger
    will be append-only, so once a record of data use is added, it can’t later be
    erased. And like blockchain, the ledger will make it possible for third parties
    to verify that nobody has tampered with any of the entries.*


    > *But it’ll also differ from blockchain in a few important ways. Blockchain is
    decentralized, and so the verification of any ledger is decided by consensus amongst
    a wide set of participants. To prevent abuse, most blockchains require participants
    to repeatedly carry out complex calculations, with huge associated costs (according
    to some estimates, the total energy usage of blockchain participants could be
    as much as the* [*power consumption of Cyprus*](https://www.ft.com/content/384a349a-32a5-11e4-93c6-00144feabdc0)*).
    This isn’t necessary when it comes to the health service, because we already have
    trusted institutions like hospitals or national bodies who can be relied on to
    verify the integrity of ledgers, avoiding some of the wastefulness of blockchain.*


    > *We can also make this more efficient by replacing the chain part of blockchain,
    and using a tree-like structure instead (if you’d like to understand more about
    Merkle trees, a good place to start would be the UK’s Government Digital Service’s
    dev* [*blog*](https://technology.blog.gov.uk/2015/10/13/guaranteeing-the-integrity-of-a-register/)*).
    The overall effect is much the same. Every time we add an entry to the ledger,
    we’ll generate a value known as a “cryptographic hash.” This hash process is special
    because it summarizes not only the latest entry, but all of the previous values
    in the ledger too. This makes it effectively impossible for someone to go back
    and quietly alter one of the entries, since that will not only change the hash
    value of that entry but also that of the whole tree.*


    > *In simple terms, you can think of it as a bit like the last move of a game
    of Jenga. You might try to gently take or move one of the pieces—but due to the
    overall structure, that’s going to end up making a big noise!*


    > *So, now we have an improved version of the humble audit log: a fully trustworthy,
    efficient ledger that we know captures all interactions with data, and which can
    be validated by a reputable third party in the healthcare community. What do we
    do with that?*


    > *The short answer is: massively improve the way in which these records can be
    audited. We’ll build a dedicated online interface that authorized staff at our
    partner hospitals can use to examine the audit trail of DeepMind Health’s data
    use in real-time. It will allow continuous verification that our systems are working
    as they should, and enable our partners to easily query the ledger to check for
    particular types of data use. We’d also like to enable our partners to run automated
    queries, effectively setting alarms that would be triggered if anything unusual
    took place. And, in time, we could even give our partners the option of allowing
    others to check our data processing, such as individual patients or patient groups.*'
