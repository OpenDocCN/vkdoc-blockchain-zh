  trans: '

    # 药品追踪


    本章最后一个用例涉及通过供应链管理框架追踪药品。处方药监测项目是控制"药贩子"行为的关键要素。梅奥诊所将"药贩子"定义为患者在没有告知医生其已有其他处方的情况下，从多位医疗从业者处获取受控物质（通常是麻醉药品）的行为。这种行为会导致大规模药物滥用或非法销售。梅奥诊所将"药贩子"行为归因于以下三个因素：


    *   **数据时效性差：** 药房或医疗服务提供者将处方数据上传到现有中央系统的频率有多高？基于区块链的后端系统将使与所有交易相关的药品立即对所有网络成员可见。

    *   **可靠性：** 与本质上去中心化的区块链相比，中心化数据库存在单点故障，因此数据不依赖于单一数据库，使其更加可靠。

    *   **数据检索复杂度高：** 当前的数据检索模式及其与现有医院系统的兼容性已完全失效。医院通常无法与药房使用的数据库同步，而更新是一项艰巨的任务。区块链通过提供一个供外部服务读取的公共后端，使这一过程变得通用。


    在该系统中，当临床医生开具处方时，医疗服务提供者可以查询区块链，以查找患者任何当前有效处方的记录。这有助于临床医生判断患者是否正在从多个来源获取处方，或者是否有其他家庭成员正在获得相同的处方。来自不同医疗服务提供者的有效处方将自动使新的处方请求失效，这可以在网络中以双重花费请求的形式进行编码。否则，交易将通过，药房将收到向患者提供药物的请求。提出请求的医疗服务提供者和患者可以对交易进行签名，从而可以在特定患者的整个护理过程中实现更好的追踪。尽管这个系统看起来很简单，但它满足了《药品供应链安全法案》（DSCSA）兼容系统的大部分要求，可以在各医疗服务提供者之间实施。IBM
    和德勤区块链实验室等主要区块链参与者正在努力控制阿片类药物过度处方的问题。最近，一些专注于仅使用区块链进行药品追踪的初创公司也应运而生。


    尽管供应链管理最贴合区块链的基础设施，并且可以开箱即用，但这个领域非常新，技术也尚不成熟。随着新技术的出现，使得前所未有的通信层成为可能，药品追踪和开放科学的未来看起来更充满希望。即使区块链的作用仅此而已，它也已经成为了开放科学探究与讨论中新创新的巨大催化剂。


    在撰写本文时，美国食品药品监督管理局（US FDA）正与加州大学洛杉矶分校健康中心（UCLA Health）合作，启动一项名为 `BRUINchain` 的试点研究。该试点的结果已发表在
    *Blockchain for Healthcare Today* 上，我们希望分享来自 `LedgerDomain` 的 Ben Taylor 在一篇博文中撰写的一些见解：


    > *作为由美国 FDA 委托并经同行评审的研究的一部分，该研究发表于* *Blockchain in Healthcare Today* *（*[*https://doi.org/10.30953/bhty.v3.134*](https://doi.org/10.30953/bhty.v3.134)*），`LedgerDomain`
    与 UCLA Health 联手部署并测试了 `BRUINchain`，这是一个由真实护理人员使用的、基于区块链的“最后一公里”解决方案，用于帮助分发救命药物。该研究是同类研究中的首批之一，它精确揭示了区块链仅凭一己之力就能如何为药房节省数十亿美元的劳动力成本和安全库存成本。在这篇文章中，我想反思一下这项研究的主要结论，以及如何将它们映射到新的健康领域。*


    > *有关 `BRUINchain` 的背景信息，请点击* 此处 *（*[*https://www.youtube.com/watch?v=mppc2Qvqrdc*](https://www.youtube.com/watch%253Fv%253Dmppc2Qvqrdc)*）。*


    > **药品供应链的现状**


    > *在当今的药品供应链中，每个交易方通常管理着自己的数据库系统。这些私有数据库使各方能够最大限度地减少外部安全威胁，同时最大限度地提高内部数据一致性。然而，这也意味着缺乏一个共享的全局记录系统来作为描述药品供应链中物品流动的唯一真实来源。这使得整个供应链更容易受到常见的攻击媒介，例如中间人攻击或欺骗。*


    > **为什么药品供应链要使用区块链？**


    > *根据《药品供应链安全法案》（DSCSA），三年内，美国的药品供应链将整合到一个电子、可互操作的系统中，用于识别和追溯在全国范围内分销的处方药。DSCSA
    的核心要求之一是处方药必须具有唯一的产品标识符，该标识符采用二维条码的形式。*


    > *我们意识到，这些联邦政府强制要求的条码可以成为通用数据模型的基础信息构建块。与区块链相结合，这可以实现一个记录系统，减少在数据完整性和隐私性与全局可视性和可解释性之间进行权衡的需要。通过这种方式，区块链可以成为数百家制药和生物技术企业及其供应商协作并与数百家批发商和数万家配药机构沟通的通用真理来源。*


    > **BRUINchain 试点应用**


    > *我们研究的基石是 `BRUINchain`，这是一个基于区块链的移动解决方案和通知系统，旨在使用 FDA 规定的条码来追踪和追溯配药机构内部药物保管权的变更。通过将区块链与商业现成技术相结合，`BRUINchain`
    使得在繁忙的医院或社区药房追踪和验证药物成为可能。*


    > *从收货区到患者给药，护理人员使用 `BRUINchain` 移动应用程序扫描唯一的二维药品条码。在流转过程中，药物会通过一系列检查，直到最终被施用于患者。新的条码会被发送给交易伙伴进行验证，而问题药物则会被暂扣不予发放。开处方者可以随时查看药物从药房到诊所的进展。*


    > **BRUINchain 的经验与成果**


    > *`BRUINchain` 试点为我们提供了重要的见解，让我们了解到更大规模的 DSCSA 验证系统实施会是什么样子。它也验证了在严重依赖遗留系统的药房中使用商业现成技术的可行性。使用商业现成技术，条码扫描的效率接近
    100%。药物可以在非常精细的级别上进行追踪。该系统能够追踪有效期、验证条码，并使药剂师更容易检查问题并报告问题。*


    > *在研究过程中，我们发现，一个实时的区块链系统可以大幅降低 DSCSA 合规的实施成本——为美国配药机构每年节省 1.83 亿美元，并成为抵御不良或欺诈交易的坚实堡垒。实时验证还将最大限度地减少配药机构在潜在隔离事件中需要保留的安全库存量，从而释放出
    200 亿美元的库存资金。*

    '
