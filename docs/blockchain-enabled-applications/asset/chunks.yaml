- fmt: "### Azure Blockchain Development Kit\n\nThe Blockchain Development Kit is\
    \ a comprehensive GitHub repository that includes code samples with a particular\
    \ focus on integrations with Azure intelligent services. The development kit could\
    \ be extended in the near future to build machine learning apps that run on a\
    \ blockchain powered by Azure. Here, we will focus on two such examples: IoT Central\
    \ and Cognitive Search.\n\n**Note**  \nMachine learning capabilities are already\
    \ available in Azure; however, once data from a blockchain system can be imported,\
    \ it can be accessed by other Azure services. In the future, machine learning\
    \ services can \"scan\" the blockchain and have some level of event reporting\
    \ that allows for network-wide alerts and notifications.\n\nThe Cognitive Search\
    \ sample shows a user how to take ledger data from Ethereum and import that information\
    \ to Azure Search. Once imported, it becomes available to a wide range of Enterprise\
    \ applications, and the smart search options allow for the possibility of data-mining\
    \ and learning from your users. The IoT example demonstrates how to connect physical\
    \ products to a digital cloud and import data into your blockchain consortium.\
    \ In IoT Central, you can create simulated devices, provision new devices, manage\
    \ and troubleshoot physical devices, and define custom rules for incoming data\
    \ and custom actions for data.\n\n### Amazon Web Services\n\nAmazon Managed Blockchain\
    \ is a fully managed BaaS offering from AWS that makes it easier to build and\
    \ deploy blockchain networks in the cloud based on open source DLTs, such as Hyperledger\
    \ Fabric and Ethereum, soon coming to BaaS. Presently, building scalable blockchain\
    \ networks from scratch and deploying applications is technically challenging.\
    \ Adding multiple parties to your network extends that challenge as each new network\
    \ member needs to install software, create new security certificates or private\
    \ keys, manually provision hardware, and configure networking to support the network.\
    \ In addition, once a blockchain network is online, the developers have the additional\
    \ task of monitoring for increased transaction requests, new members joining,\
    \ and infrastructure health. Amazon Managed Blockchain streamlines this process\
    \ and reduces the technical overhead. The network can scale, adapting to increased\
    \ load and transaction volume. In addition, new members can join the cloud with\
    \ ease without needing any special hardware.\n\n#### Ease of Setup (taken from\
    \ Amazon Managed Blockchain documentation)\n\nIn the Managed Blockchain offering,\
    \ launching a new network can be done via templates within minutes, without the\
    \ need for extensive configuration. After the network is available, new members\
    \ can join the network with an invite. Once a new member accepts membership, they\
    \ can configure peer nodes that provide computational storage and memory to execute\
    \ DApps and maintain a copy of the ledger, all in the cloud. This bypasses the\
    \ need for any local hardware throughout the process. During periods of heavy\
    \ transaction load and network traffic, scaling an application simply requires\
    \ additional peer nodes to be added. New peer nodes can be provisioned within\
    \ the cloud network with ease. New nodes can be instantiated to support your increased\
    \ workload via a variety of instance families pre-configured into AWS Cloud Services.\n\
    \n#### Security (taken from Amazon Managed Blockchain documentation)\n\nManaging\
    \ private–public keys is crucial for blockchain-based platforms. The keys are\
    \ needed for accessing your wallet on a blockchain instance, signing contracts,\
    \ and enrolling in security certificates and identity management. Managed Blockchain\
    \ relies on AWS Key Management Service to act as the certificate authority for\
    \ Hyperledger Fabric. To that end, new users signing onto a Managed Blockchain\
    \ will not have to worry about setting up hardware security modules.\n\n#### Immutable\
    \ Ordering Service (taken from Amazon Managed Blockchain docs)\n\nThe default\
    \ ordering service for Hyperledger Fabric to support propagation of transactions\
    \ across the network is Apache Kafka. Even though Kafka is a messaging service\
    \ that delivers transactions (and the associated information) sequentially across\
    \ the network, it is not optimized to create a sequential log of transactional\
    \ history. Therefore, in case of network failure, Kafka makes it difficult to\
    \ retrieve historical transactions. Managed Blockchain has a new ordering service\
    \ built on Quantum Ledger Database (QLDB) that provides an immutable log and maintains\
    \ a complete network history of all uncommitted transactions in a blockchain network.\
    \ This QLDB service uses a centralized trusted authority for maintaining histories\
    \ and supplements the decentralized ledger.\n\n### Oracle\n\nPermissioned blockchain\
    \ networks begin with a few core-member organizations, and network governance\
    \ is easier; however, as the organization starts to expand with new members, fair\
    \ allocation of underlying hardware resources becomes more intricate and complex.\
    \ This is particularly true in the context of ordering responsibilities and selecting\
    \ members for private channels in Fabric implementations. Recall that a set of\
    \ ordering nodes bundles current transactions into blocks, finalizes the block,\
    \ and broadcasts a block to the network. Under an older consensus implementation,\
    \ a leader is selected at random from the global pool of ordering nodes for creating\
    \ the next block. The orderers also maintain a list of organizations that are\
    \ allowed to create private channels. A channel is created by an ordering node,\
    \ and it functions as a private subnet on the Fabric blockchain where network\
    \ members can conduct private and confidential transactions. In the past, a cluster\
    \ of Kafka and Zookeeper implementations was managing the ordering nodes; however,\
    \ in the cloud, this setup is more resource intensive. Recently, a new consensus\
    \ plugin called RAFT was introduced to manage the ordering service and make it\
    \ ready for enterprise-grade production networks. RAFT is a dynamic leader-based\
    \ protocol where a set of ordering nodes (called the consenter set) cooperates\
    \ in an ordering cluster to create blocks. This ensures a more fair and uniform\
    \ participation of member organizations, even with a large number of members.\
    \ Additionally, an ordering cluster is configured such that it provides enhanced\
    \ privacy: any node from the ordering cluster can create a channel with specific\
    \ member organizations to handle a specific private transaction. This allows more\
    \ granular control over transaction volume by selecting from specific members,\
    \ rather than using a global ordering queue. Using RAFT also streamlines computational\
    \ resource usage by eliminating the need for a resource-intensive cluster in the\
    \ cloud. Next, we will talk about the main features of Oracle BaaS from three\
    \ major categories: infrastructure maintenance, identity, and backups.\n\n####\
    \ Maintenance (taken from Oracle Support Documentation)\n\n- Includes Oracle operations\
    \ monitoring\n- Has zero downtime managed patching and updates\n- Includes embedded\
    \ ledger and configuration backups\n- Provides a comprehensive, intuitive web\
    \ user interface and wizards to automate many administration tasks. For example,\
    \ adding organizations to the network, adding new nodes, creating new channels,\
    \ deploying and instantiating chaincodes, browsing the ledger, and more.\n\n####\
    \ Identity (taken from Oracle Support Documentation)\n\n- Supports identity federation\
    \ and third-party client certificate support to enable consortia formation and\
    \ simplify member onboarding\n- Built-in integration with Oracle Identity Cloud\
    \ Service for user authentication, roles management, and identity federation immediately\
    \ leverages Oracle Identity Cloud Service accounts and enables easy onboarding\
    \ of consortium members who prefer using SAML-based federation for authentication\
    \ against their own identity providers"
  raw: '#### Azure Blockchain Development Kit


    The Blockchain Development Kit is a comprehensive GitHub repository that includes
    code samples with a particular focus on integrations with Azure intelligent services.
    The development kit could be extended in the near future to build machine learning
    apps that run on a blockchain powered by Azure. Here, we will focus on two such
    examples: IoT Central and Cognitive Search.


    Note


    Machine learning capabilities are already available in Azure; however, once data
    from a blockchain system can be imported, it can be accessed by other Azure services.
    In the future, machine learning services can “scan” the blockchain and have some
    level of event reporting that allows for network-wide alerts and notifications.


    The Cognitive Search sample shows a user how to take ledger data from Ethereum
    and import that information to Azure Search. Once imported, it becomes available
    to a wide range of Enterprise applications, and the smart search options allow
    for the possibility of data-mining and learning from your users. The IoT example
    demonstrates how to connect physical products to a digital cloud and import data
    into your blockchain consortium. In IoT Central, you can create simulated devices,
    provision new devices, manage and troubleshoot physical devices, and define custom
    rules for incoming data and custom actions for data.


    ### Amazon Web Services


    Amazon Managed Blockchain is a fully managed BaaS offering from AWS that makes
    it easier to build and deploy blockchain networks in the cloud based on open source
    DLTs, such as Hyperledger Fabric and Ethereum, soon coming to BaaS. Presently,
    building scalable blockchain networks from scratch and deploying applications
    is technically challenging. Adding multiple parties to your network extends that
    challenge as each new network member needs to install software, create new security
    certificates or private keys, manually provision hardware, and configure networking
    to support the network. In addition, once a blockchain network is online, the
    developers have the additional task of monitoring for increased transaction requests,
    new members joining, and infrastructure health. Amazon Managed Blockchain streamlines
    this process and reduces the technical overhead. The network can scale, adapting
    to increased load and transaction volume. In addition, new members can join the
    cloud with ease without needing any special hardware.


    #### Ease of Setup (taken from Amazon Managed Blockchain documentation)


    In the Managed Blockchain offering, launching a new network can be done via templates
    within minutes, without the need for extensive configuration. After the network
    is available, new members can join the network with an invite. Once a new member
    accepts membership, they can configure peer nodes that provide computational storage
    and memory to execute DApps and maintain a copy of the ledger, all in the cloud.
    This bypasses the need for any local hardware throughout the process. During periods
    of heavy transaction load and network traffic, scaling an application simply requires
    additional peer nodes to be added. New peer nodes can be provisioned within the
    cloud network with ease. New nodes can be instantiated to support your increased
    workload via a variety of instance families pre-configured into AWS Cloud Services.


    #### Security (taken from Amazon Managed Blockchain documentation)


    Managing private–public keys is crucial for blockchain-based platforms. The keys
    are needed for accessing your wallet on a blockchain instance, signing contracts,
    and enrolling in security certificates and identity management. Managed Blockchain
    relies on AWS Key Management Service to act as the certificate authority for Hyperledger
    Fabric. To that end, new users signing onto a Managed Blockchain will not have
    to worry about setting up hardware security modules.


    #### Immutable Ordering Service (taken from Amazon Managed Blockchain docs)


    The default ordering service for Hyperledger Fabric to support propagation of
    transactions across the network is Apache Kafka. Even though Kafka is a messaging
    service that delivers transactions (and the associated information) sequentially
    across the network, it is not optimized to create a sequential log of transactional
    history. Therefore, in case of network failure, Kafka makes it difficult to retrieve
    historical transactions. Managed Blockchain has a new ordering service built on
    Quantum Ledger Database (QLDB) that provides an immutable log and maintains a
    complete network history of all uncommitted transactions in a blockchain network.
    This QLDB service uses a centralized trusted authority for maintaining histories
    and supplements the decentralized ledger.


    ### Oracle


    Permissioned blockchain networks begin with a few core-member organizations, and
    network governance is easier; however, as the organization starts to expand with
    new members, fair allocation of underlying hardware resources becomes more intricate
    and complex. This is particularly true in the context of ordering responsibilities
    and selecting members for private channels in Fabric implementations. Recall that
    a set of ordering nodes bundles current transactions into blocks, finalizes the
    block, and broadcasts a block to the network. Under an older consensus implementation,
    a leader is selected at random from the global pool of ordering nodes for creating
    the next block. The orderers also maintain a list of organizations that are allowed
    to create private channels. A channel is created by an ordering node, and it functions
    as a private subnet on the Fabric blockchain where network members can conduct
    private and confidential transactions. In the past, a cluster of Kafka and Zookeeper
    implementations was managing the ordering nodes; however, in the cloud, this setup
    is more resource intensive. Recently, a new consensus plugin called RAFT was introduced
    to manage the ordering service and make it ready for enterprise-grade production
    networks. RAFT is a dynamic leader-based protocol where a set of ordering nodes
    (called the consenter set) cooperates in an ordering cluster to create blocks.
    This ensures a more fair and uniform participation of member organizations, even
    with a large number of members. Additionally, an ordering cluster is configured
    such that it provides enhanced privacy: any node from the ordering cluster can
    create a channel with specific member organizations to handle a specific private
    transaction. This allows more granular control over transaction volume by selecting
    from specific members, rather than using a global ordering queue. Using RAFT also
    streamlines computational resource usage by eliminating the need for a resource-intensive
    cluster in the cloud. Next, we will talk about the main features of Oracle BaaS
    from three major categories: infrastructure maintenance, identity, and backups.


    #### Maintenance (taken from Oracle Support Documentation)


    *   Includes Oracle operations monitoring


    *   Has zero downtime managed patching and updates


    *   Includes embedded ledger and configuration backups


    *   Provides a comprehensive, intuitive web user interface and wizards to automate
    many administration tasks. For example, adding organizations to the network, adding
    new nodes, creating new channels, deploying and instantiating chaincodes, browsing
    the ledger, and more.


    #### Identity (taken from Oracle Support Documentation)


    *   Supports identity federation and third-party client certificate support to
    enable consortia formation and simplify member onboarding


    *   Built-in integration with Oracle Identity Cloud Service for user authentication,
    roles management, and identity federation immediately leverages Oracle Identity
    Cloud Service accounts and enables easy onboarding of consortium members who prefer
    using SAML-based federation for authentication against their own identity providers'
  trans: "\n### Azure 区块链开发工具包\n\n区块链开发工具包是一个全面的 GitHub 仓库，其中包含特别关注与 Azure 智能服务集成的代码示例。该开发工具包在不久的将来可能会被扩展，用于构建在\
    \ Azure 驱动的区块链上运行的机器学习应用。在此，我们将重点关注两个此类示例：IoT Central 和认知搜索。\n\n**注意**  \n机器学习功能在\
    \ Azure 中已经可用；然而，一旦来自区块链系统的数据可以导入，它就能被其他 Azure 服务访问。未来，机器学习服务可以\"扫描\"区块链，并具备一定程度的事件报告能力，从而实现全网范围内的警报和通知。\n\
    \n认知搜索示例向用户展示了如何从以太坊获取账本数据并将其导入 Azure 搜索。导入后，这些数据即可供广泛的企业应用程序使用，而智能搜索选项则使从用户处进行数据挖掘和学习成为可能。该\
    \ IoT 示例演示了如何将实体产品连接到数字云并将数据导入您的区块链联盟。在 IoT Central 中，您可以创建模拟设备、预配新设备、管理和排除实体设备故障，并为传入数据定义自定义规则以及为数据定义自定义操作。\n\
    \n### Amazon Web Services\n\nAmazon Managed Blockchain 是 AWS 提供的一项完全托管的 BaaS 产品，它使得在云中基于开源分布式账本技术（如\
    \ Hyperledger Fabric 和 Ethereum，后者即将在 BaaS 中可用）构建和部署区块链网络变得更加容易。目前，从头开始构建可扩展的区块链网络并部署应用程序在技术上具有挑战性。将多方加入您的网络会加大这一挑战，因为每个新网络成员都需要安装软件、创建新的安全证书或私钥、手动配置硬件，并配置网络以支持该网络。此外，一旦区块链网络上线，开发人员还需要承担监控交易请求增加、新成员加入以及基础设施健康状况等额外任务。Amazon\
    \ Managed Blockchain 简化了这一流程并减少了技术开销。网络可以扩展，以适应增加的负载和交易量。此外，新成员可以轻松加入云中，无需任何特殊硬件。\n\
    \n#### 易于设置（取自 Amazon Managed Blockchain 文档）\n\n在 Managed Blockchain 产品中，启动一个新网络可以通过模板在几分钟内完成，无需进行大量配置。网络可用后，新成员可以通过邀请加入网络。一旦新成员接受成员资格，他们就可以配置对等节点，这些节点提供计算存储和内存来执行去中心化应用程序并维护一份账本副本，这一切都在云端完成。这省去了整个过程中对任何本地硬件的需求。在交易负载和网络流量沉重的时期，扩展应用程序只需添加额外的对等节点即可。新的对等节点可以轻松地在云网络中预配。可以通过\
    \ AWS 云服务中预先配置的各种实例系列来实例化新节点以支持您增加的工作负载。\n\n#### 安全性（取自 Amazon Managed Blockchain\
    \ 文档）\n\n管理公私钥对于基于区块链的平台至关重要。密钥用于访问区块链实例上的钱包、签署合约以及注册安全证书和身份管理。Managed Blockchain\
    \ 依赖 AWS Key Management Service 作为 Hyperledger Fabric 的证书颁发机构。为此，登录 Managed Blockchain\
    \ 的新用户无需担心设置硬件安全模块。\n\n#### 不可变排序服务（取自 Amazon Managed Blockchain 文档）\n\nHyperledger\
    \ Fabric 用于支持在网络中传播交易的默认排序服务是 Apache Kafka。尽管 Kafka 是一种在网络中顺序传递交易（及相关信息）的消息传递服务，但它并未针对创建交易历史的顺序日志进行优化。因此，在网络故障的情况下，Kafka\
    \ 使得检索历史交易变得困难。Managed Blockchain 拥有一种基于量子账本数据库 (QLDB) 构建的新排序服务，该服务提供不可变日志，并在区块链网络中维护所有未提交交易的完整网络历史记录。此\
    \ QLDB 服务使用中心化的可信机构来维护历史记录，并补充了去中心化账本。\n\n### Oracle\n\n许可区块链网络始于少数核心成员组织，网络治理相对容易；然而，随着组织开始因新成员加入而扩张，底层硬件资源的公平分配会变得愈发错综复杂。这在排序职责以及为\
    \ Fabric 实现中的私有通道选择成员方面尤其如此。回想一下，一组排序节点将当前交易打包成区块，最终确定该区块，并将区块广播到网络。在较旧的共识实现中，会从全局排序节点池中随机选择一位领导者来创建下一个区块。排序者还维护着被允许创建私有通道的组织列表。通道由排序节点创建，它作为\
    \ Fabric 区块链上的一个私有子网运行，网络成员可以在其中进行私密和保密的交易。过去，一组 Kafka 和 Zookeeper 实现来管理排序节点；然而，在云中，这种设置资源消耗更大。最近，引入了一种名为\
    \ RAFT 的新共识插件来管理排序服务，使其为企业级生产网络做好准备。RAFT 是一种基于动态领导者的协议，其中一组排序节点（称为共识者集合）在排序集群中协作创建区块。这确保了即使成员数量众多，成员组织也能更公平、更统一地参与。此外，排序集群的配置方式使其能提供增强的隐私性：排序集群中的任何节点都可以与特定的成员组织创建通道，以处理特定的私有交易。这允许通过从特定成员中选择，而不是使用全局排序队列，来对交易量进行更精细的控制。使用\
    \ RAFT 还通过消除对云中资源密集型集群的需求，简化了计算资源的使用。接下来，我们将从基础设施维护、身份和备份三大类别来讨论 Oracle BaaS 的主要功能。\n\
    \n#### 维护（取自 Oracle 支持文档）\n\n-   包括 Oracle 运营监控\n-   具有零停机时间的托管补丁和更新\n-   包括嵌入式账本和配置备份\n\
    -   提供全面、直观的 Web 用户界面和向导，以实现许多管理任务的自动化。例如，向网络添加组织、添加新节点、创建新通道、部署和实例化链码、浏览账本等。\n\
    \n#### 身份（取自 Oracle 支持文档）\n\n-   支持身份联合和第三方客户端证书支持，以促进联盟形成并简化成员入网流程\n-   与 Oracle\
    \ Identity Cloud Service 的内置集成，用于用户身份验证、角色管理和身份联合，可立即利用 Oracle Identity Cloud\
    \ Service 帐户，并使偏好使用基于 SAML 的联合身份验证（针对其自身身份提供商）的联盟成员能够轻松入网\n"
- fmt: '#### Backups (taken from Oracle Support Documentation)


    - Peer-node containers distributed across multiple VMs to ensure resiliency if
    one of the VMs is unavailable or is being patched

    - `Orderers`, `fabric-ca`, `console`, and `REST proxy` nodes are replicated in
    all VMs for transparent takeover to avoid outages.

    - Isolated VM environments for customer chaincode execution containers for greater
    security and stability

    - Autonomous monitoring and recovery agents in all components, leveraging dynamic
    object store backups of all configuration updates and ledger blocks to enable
    autonomous recovery


    ### Kaleido


    `Kaleido` is a `ConsenSys`-backed startup that has created two major blockchain
    offerings: an Ethereum-based software package that can run on Amazon Cloud to
    simplify development of blockchain applications, and a fully managed Blockchain-as-a-Service
    cloud called `Kaleido Core`. There are two main facets to `Kaleido` that we will
    discuss in this section.


    #### Network Governance (taken from Kaleido blog on BaaS)


    In the managed `Kaleido` service, a major theme is the creation of templates dedicated
    to common governance tasks and the provision of them to users through a simple
    UI. This includes a new-member onboarding workflow that can set up new members
    and peer-nodes with a few clicks. In addition, once the new members are on-boarded
    and familiar with the network, they have ownership of their node and key data.
    This allows for more granular control over node settings and flexibility in opting
    out of optional network features. `Kaleido` also provides a network-wide address
    book that lists all the users and their affiliations (within the consortia) and
    access permissions. For a more transparent history of transactions and network
    activity, a standard block explorer and token explorer for the ledger running
    in BaaS are also included. Finally, a native smart-contract manager is embedded
    into network governance. This includes common smart-contract tasks such as workflow
    for security tasks, firewall protection, versioning, and contract deployment to
    a ledger.


    #### High Availablility and Disaster Recovery (taken from Kaleido blog on BaaS)


    A blockchain network hosted in the cloud needs to be adaptive so that spikes in
    traffic or transaction load can be handled without the network going offline.
    To that end, high availability is crucial for the consensus algorithms, especially
    in a decentralized network. This is especially important for provisioning new
    nodes; for instance, if five new nodes join a network, they should be dynamically
    added to the consensus algorithm in order to prevent overload on the network.
    `Kaleido`’s Managed Blockchain also comes with network protections against new/untested
    consensus algorithms in order to provide some level of disaster recovery support.
    In the near future, this will allow developers to deploy and hot-switch new consensus
    algorithms and collect data on how the algorithm behaves during a period of high
    transaction volume.


    ## Summary


    In this chapter, we reviewed the basic concept of a Blockchain-as-a-Service platform
    and talked about four major platforms. We discussed the main features of each
    offering, the managed support given by each provider, and opportunities for blockchain
    companies to grow completely in the cloud.


    # 15. Rise of Blockchain Consortia


    This chapter is transcribed from a conversation between `Vikram Dhillon` (VD)
    and `Katherine Kuzmeskas` (KK) from Tamarin Health on her journey of creating
    a blockchain company, the challenges faced on the way, the evolving nature of
    consortia, and the future of her company.


    **VD:** *What were the main customer pain points that you were trying to solve
    with the company? How did this evolve with time? What roles did the blockchain
    play in all of this? Can you give us some kind of a timeline?*


    **KK:** When we first started, we were focusing on value-based care. This is an
    area of healthcare where physicians are being reimbursed for the outcomes they
    provide as opposed to the volume of services they provide. This has been around
    since 2008, originally started by Medicare (through Centers for Medicare & Medicaid
    Services [CMS]), then private payers followed the lead. I learned about value-based
    care by being a hospital administrator at Yale New Haven Health, and while I was
    there I needed better tools to manage patients once they physically left the hospital
    (or, put differently, post-discharge management). This is very challenging because
    once a patient leaves the hospital, their data is largely inaccessible, and new
    health data generated from follow-ups sits in silos created by a myriad of clinical
    applications that are not interoperable. We wanted to be the longitudinal connector
    of the patient, their care, and their data. As a connector, we have access to
    data on patient care, regardless of clinical location, that provides information
    for our provider customers and us to act on, and provides real-time estimates
    of savings or penalties based on the target price that CMS sets. The target price
    is basically the total cost of allowable reimbursement by Medicare; as a result,
    this is the total cost of care [that] providers should stay below.


    We came out of the gate with this idea when we were incorporated in early 2017.
    The blockchain connection initially began as a way to create an audit trail of
    all the longitudinal data in our platform. Ever since we defined how we were going
    to leverage blockchain in 2016, our focus was to intentionally start with a simple
    and basic implementation of blockchain: an audit trial for transition-of-care
    information and insurance reimbursement for value-based care that occurs across
    different settings. Once this audit trail is created, it cannot be deleted or
    modified, and this is really important in value-based care because the patient
    is transitioning between different practices, data sits in different locations,
    and the only entity up until now that had this complete view was Medicare via
    its claims data. Looking back to reconcile the care of the patient can be very
    difficult if you cannot trust or validate the sources of information. We wanted
    to solve this problem of connecting the patient through[out] their care and providing
    an immutable audit trail of the data, improving the reliability and trust in the
    data. Plans were always centered around growing features after proving this core
    concept. We wanted to test our foundation in the market, and once blockchain technology
    became more scalable, [and] broadly adopted, and people became more comfortable
    with it, we could grow, and the opportunities become endless with use in healthcare.


    Along with the audit trail, we have always been focused on providing the ability
    to govern access to data in a meaningful manner through a public–private keypair
    system. These two concepts, an audit trail and public–private keypair system,
    have guided our growth through value-based care toward our future, where patients
    can share their data via simple clicks and benefit from it.'
