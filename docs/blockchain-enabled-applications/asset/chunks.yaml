    # 7. High-Performance Computing


    In the Ethereum ecosystem, the transfer of value between users is often realized
    by the use of tokens that represent digital assets. Ether is the default token
    and the de facto currency used for transactions and for initializing smart contracts
    on the network. Ethereum also supports the creation of new kinds of tokens that
    can represent any commonly traded commodities as digital assets. All tokens (for
