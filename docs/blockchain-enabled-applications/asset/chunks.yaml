- fmt: '**VD:** The core of this chapter is about your consortium model. Tell us more
    about the proposal for the consortium. Why was it optimal to choose the consortium
    route? What benefits would members receive in a consortium model?


    **KK:** As you know, we created `Health Nexus`, which is a public–private healthcare-safe
    blockchain protocol. *Public* meaning you don’t have to be part of the consortium
    to access the blockchain network. The private side is more involved. There are
    two requirements in order to run a node on the network: you have to be an approved
    and authenticated consortium member, and additionally, you have to run a HIPAA-compliant
    server.


    There are very practical reasons that we took this route. Blockchain is a new
    technology, and you have to educate IT-security teams along with C-suite executives
    that even though you are offering a blockchain-based tool, your technology is
    safe. Ultimately, you will have to explain what decentralization means, and your
    customers must be comfortable with your system. If your customers are not able
    to understand the benefit of a decentralized protocol or the safety and security
    of how health data interacts with the infrastructure, there is no way to secure
    customers. The learning curve to understanding blockchain at a fundamental level
    is so steep that lack of trust in [the] network becomes a non-starter in many
    industries, but particularly in healthcare. Teaching the basics of a blockchain
    leads to questions about the servers. If you mention that a server can be anywhere
    in the world, you have to be able to explain—in a way that is comprehensible by
    your customer—why that is not a security risk.


    As such, current perceptions of existing decentralized blockchain protocols drove
    our decision to create `Health Nexus`. `Bitcoin` has always had legislative and
    perception challenges, particularly with a history of `Bitcoin` exchanges linked
    to Silk Road activities. Trying to build healthcare applications on a platform
    linked to historic illegal activity is already a non-starter—it makes conversations
    with the customer’s decision makers impossible. `Ethereum` is a public model in
    the truest sense: any user, anywhere in the world, from any country can run a
    node. We expected that any company that builds on top of our protocol will have
    to answer questions from healthcare ITS departments about who runs the network.
    An answer of “I am not sure” or “It looks like folks in other countries”—including
    those on the Federal Sanctions List—creates a non-starter, which would be the
    case with `Ethereum`. In addition, the need to explain this in depth to the ITS
    department will extend the already long sales cycle for healthcare applications.
    Again, both of these issues are perception based, but that alone is the issue
    affecting adoption. Having to explain away Silk Road or servers in countries that
    are on our OFAC Sanction list adds unnecessary complexity.


    Being able to describe a network of known-node runners who are required to maintain
    a HIPAA-compliant server to run a governance-based blockchain speaks more of the
    healthcare language than `Bitcoin` or `Ethereum` can; thus, the core infrastructure
    and design of `Health Nexus`. There are two aspects to the private interface on
    our network: no one can access your healthcare data without your private key,
    and secondly, we know who runs the nodes in our network. The servers are all HIPAA-compliant,
    and your PHI-protected data is not hosted on the blockchain itself. We only use
    the ledger for propagating metadata links in blocks and [for] transactions that
    can only be decrypted with a private key. You come to a level ground on this protocol.
    That’s why we call it “healthcare safe.”


    The reason we took a consortium route is to create this public–private interface.
    We wanted to create a public network, but it could not be completely permissionless.
    So, we designed a validation process where anyone who runs the network can validate
    and verify that potential consortium members are indeed running a HIPAA-compliant
    server. You can charge a fee for this service, the same way any HIPAA-compliant
    company pays someone quarterly to test their systems and maintain their HIPAA
    compliance.


    There are technical requirements for becoming a consortium member, and the validation
    process is two-dimensional: you have to be validated at first by a current consortium
    member (validator), and then you have to be voted in. New members go through a
    formal voting process involving the entire consortium and must keep their node
    available at all times. For the voting process, new members have to describe why
    they want to join the consortium, their past experiences in blockchain and healthcare,
    and their interests and commitment to maintaining their role as a consortium member.
    Then, the consortium votes whether or not to bring new members on board. All members
    have equal voting privileges, including our company, and the vote is stored on-chain
    for all member-related actions. To that end, any members can be kicked out for
    being malicious, and there is a low threshold for tolerating risky actions or
    inactivity. In the past, through vote, we removed a consortium member due to inactivity.
    This process ingrains governance into consortia blockchain, and also helps to
    maintain the protective nature of healthcare entities. This governance process
    is shown below in Figure [15-1](#430562_2_En_15_Chapter.xhtml#Fig1).


    **VD:** *Overall, building a blockchain company is difficult, but you managed
    to overcome several hurdles. What were the major challenges? How was the fundraising
    process? Tell us about the NSF grant that you received. Any new features or ideas
    that you’re very excited about?*


    **KK:** It was surprisingly easy to find our early consortium members, as we already
    had a large network to reach out to. The hardest part has been keeping members
    engaged (i.e., mining) without a monetary benefit that exists in other, grandfathered
    blockchain networks such as `Ethereum`. Even though our technology has been ready
    since fall 2017, we have only been able to launch our test net due to the expensive
    and lengthy SEC process that will be necessary for [the] main net launch. We are
    grateful that, up to now, some members have been running our network out of the
    goodness of their heart and because of their dedication to blockchain’s long-term
    impact in healthcare. Unfortunately, at this time true blockchain applications
    in healthcare are very difficult in the US, particularly due to the legislative
    climate. The necessary shifting in policy will create a more open environment
    for digital assets across all industries.


    Interestingly, in 2020, everyone is excited about DeFi, so it feels like blockchain
    is “popular” again and we can actually talk about blockchain. From 2018 to 2019,
    nearly everyone denounced blockchain tech. Innovating in healthcare is very challenging,
    but innovating with a new technology such as blockchain in healthcare is even
    harder. We have found success precisely in our strategic focus on keeping the
    technology as simple as possible (a basic audit trail to start) and building in
    a way to create a safe adoption for healthcare (focus on a public–private protocol
    and emphasis on governance).'
