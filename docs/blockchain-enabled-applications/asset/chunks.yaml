    # 13. Building a Healthcare Consortium


    John Bass is the founder and CEO of Hashed Health, a blockchain-based health IT
    consortium with members working to commercialize appropriate use cases in healthcare
    and deliver a proof-of-concept that can be scaled. In this chapter, we interview
    John Bass about the following topics:


    - His background and previous work in healthcare

    - The makings of Hashed Health

    - Collaborative and consortium models

    - Working groups for high-risk, high-reward model

    - Governance in Hashed Health

    - Member participation


    **Vikram:** *So, John, can you tell our readers about your background, and what
    made you interested in building healthcare startups?*


    **John Bass:** Many of us in the healthcare technology industry have spent our
    professional lives working to build applications and intelligence that help stakeholders
    (for instance providers, vendors, payers, consumers) understand the opportunities
    to improve care delivery and curb costs. As a community, we have a hope that we
    can change the system. That we can make an unfair system fair again. That, using
    technology, we can go back to a place where healthcare is centered on the individual
    consumer patient rather than the corporate interest. We all dream of the ever-elusive
    healthcare platform that captures the hearts and minds of patients, builds the
    network effects, and makes everything better. We dream of saving our country from
    run-away health costs, a national security issue of our own making. We dream about
    delivering care to the millions of people who struggle with access. We dream of
    creating something so viral that it scales globally and helps millions of people
    around the world get the care they need. We want it so bad we lose sleep. We want
    it so bad we abandon our families for weeks at a time, hoping to light the fuse.


    **Vikram:** *What got you started thinking about building a blockchain-based healthcare
    company?*


    **John:** The startups I have been a part of have all focused on web-based products
    that promoted collaboration, data sharing, shared workflows, and cross-enterprise
    clinical or financial performance. Our teams have built B2B platforms, patient
    portals, collaborative workflow solutions, surgical performance solutions, and
    other trendy IT solutions that I thought would change the industry. These efforts,
    like most of the solutions you see at the big healthcare technology trade shows,
    focus on adding applications on top of the existing infrastructure. They essentially
    support the existing healthcare value chains, with the goal of making them more
    efficient. Though successful at solving problems, it’s clear that these years
    of work and millions of dollars have had little impact on the macro cost/quality
    issues facing our country. The killer app and the platform are still out there.


    After twenty years I have realized that there is a more fundamental problem that
    can’t be fixed through additive technologies. Step back and you see that, over
    time, we have built a system that is more and more dependent on middle men, relational
    databases, and their associated applications. The structural truth is clear to
    me now. The structural truth is the driver of unstable economic trends, unfair
    access, failures in preventable illness, suboptimal outcomes, rising out-of-pocket
    costs, and medical debt. All systems inherit the characteristics of their container,
    which in the US is a fee-for-service marketplace which lacks any sort of rational,
    free-market characteristics. Anything built within this container is constrained
    by those characteristics. I don’t believe we can really solve anything building
    within the existing container.


    **Vikram:** *I think we would both agree that the existing container has worked
