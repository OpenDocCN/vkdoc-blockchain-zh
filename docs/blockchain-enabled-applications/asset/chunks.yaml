    by the CD, Myspace by Facebook, and old cameras by digital ones.


    The following are the risks of investing in ICOs:


    *   Scammers take advantage of an unregulated industry.


    *   Amateurs can use ICOs to launch projects that are doomed to fail.


    *   Longer project delivery timelines increase the risk of competitive products
    being launched while the ICO to build your own product is not finished.'
  trans: '

    ### ICO 监管现状


    每年秋季，*Coin Desk* 都会发布一份综合报告，讨论 ICO 的监管状况，重点关注六个国家的法律地位。金融科技研究公司 Autonomous Next
    最近的一份报告引用了其中的几个要点。该报告认为，瑞士和新加坡是为金融科技和加密货币创造友好环境方面最为先进的两个国家。在瑞士，法律规定加密货币是资产而非证券。新加坡的情况也是如此。报告指出，新加坡金融管理局不监管虚拟货币交易，但确实监控
    KYC（了解你的客户）和 AML（反洗钱）。


    报告特别指出，英国和美国是活动频繁但法律清晰度不足的司法管辖区。美国拥有众多监管机构和五十个州各自执行法规，使得监管过程更为复杂。特拉华州最近通过了与区块链相关的立法。在中国，代币被视为非货币数字资产。俄罗斯一直对加密货币持欢迎态度。加密代币被归类为类似于衍生品的合法金融工具。^(²⁴)


    在 2017 年第二季度的财务回顾中，Smith & Crown 指出了代币销售法律地位中一个仍然存疑的重大问题。代币销售参与者可能无法享有与私募和公开股权销售投资者相同的法律地位或保护。无上限的代币销售及其允许项目在保留对其代币经济多数控制权的同时筹集巨额资本的结构，可能会因引起监管机构关注而加剧这一问题。许多国家正在积极探索代币销售的新监管框架，包括
    Smith & Crown 在内的多个团体正在制定最佳实践和自律指南。^(²⁵)


    当前的监管状况是，美国证券交易委员会（SEC）发布了一封信函，声明 SEC 将 ICO、加密货币及相关事宜视为证券。如前所述，这为市场在该问题上带来了一定的清晰度。尽管有些人会对此持积极态度，另一些人则持消极态度，但
    SEC 的声明最终推动了对美国及全球监管环境的全新理解。


    *《区块链代币的证券法框架》* 为任何对区块链代币感兴趣的人描述了几个关键观点和行动。“该框架侧重于美国联邦证券法，因为这些法律对区块链代币的众售构成了最大风险。在许多司法管辖区，还可能存在反洗钱法、一般消费者保护法以及根据代币实际功能而定的特定法律问题。”豪威测试（Howey
    Test）确立了判断投资合同是否为证券的标准（*SEC v. Howey*）。^(²⁶)


    该框架阐述了代币销售的六大最佳实践：


    1.  发布详细的白皮书。

    2.  对于预售，承诺提供开发路线图。

    3.  使用开放、公开的区块链并发布所有代码。

    4.  在代币销售中使用清晰、逻辑合理且公平的定价。

    5.  确定为开发团队预留的代币百分比。

    6.  避免将代币作为投资进行营销。


    ### ICO 投资的利弊


    ICO 投资的利弊由 Jim Reynolds 在最近一篇题为《投资于：投资理念》的文章中进行了阐述。这份利弊清单绝非详尽无遗，但它确实包含了许多需要考虑的要点。


    **对于 ICO 创始人（企业家）：**


    -   高效筹集资金。

    -   ICO 比 IPO 便宜得多。

    -   ICO 所需的文件比 IPO 少得多。

    -   为山寨币获得曝光提供品牌和营销机会。

    -   建立社区。

    -   与早期采用者建立利益关联；这将使他们成为项目营销机制的一部分。

    -   企业家与投资者共享其努力的成果与风险。

    -   创始人/开发者拥有一种方法，可以帮助他们为一个能最大程度发挥其技能的项目提供资金。

    -   备受尊敬的加密专家有途径将他们多年来积累的技能和信誉变现。

    -   权益证明（PoS）山寨币通过 ICO 解决了公平分配的问题，并且在 PoS 中，代币立即生效。

    -   风险投资资金对创始人的 Vision360 愿景干预要大得多。ICO 的替代方案是借贷，但这会对项目现金流产生许多影响，而这些影响在山寨币/加密项目中并不总是能够管理的。

    -   一定的透明度；例如，可以使用托管来验证 ICO 后资金的支出情况。

    -   早期投资者在早期阶段公司将拥有更高的流动性。

    -   提前获得具有资本增长潜力的代币。

    -   不受任何政府组织的监管或注册，并且通常除了平台本身内置的保护之外，没有其他投资者保护。

    -   投资者可以成为社区的一部分。

    -   一种创新的资本部署方式。

    -   使用现有网络（如 Stratis、Ardor 和 Ethereum）进行的 ICO，正在利用现有生态系统的网络资本。

    -   从主流加密货币分散投资到山寨币。

    -   投资者通常是山寨币的首批用户；因此，与持有投资者从未使用过其产品的公司股票不同，具有讽刺意味的是，山寨币可能比其他投资更具体。

    -   投资 ICO 的回报率最高可达 1000%，也可能血本无归。

    -   分散投资于其他资产。

    -   一种（在某种程度上）与股票市场和经济脱节的高风险、高回报投资。

    -   拥有一种不基于法定货币的另类资产。


    **对于加密货币社区：**


    -   山寨币将推动构建 Web 3.0（去中心化网络）的竞赛。互联网堆栈变得完全独立于任何中心化实体。

    -   山寨币处于金融科技的前沿，即使山寨币项目的技术失败。从所提出的技术和商业模式中获得的经验教训将使整个社区受益。

    -   加密领域的更多竞争使竞争者更为精干，这意味着市场“看不见的手”在创造性破坏和适者生存方面运行得更快，启动的山寨币项目越多，这一效应就越明显。

    -   山寨币之间的内部竞争是健康的，因为它让山寨币为真正的竞争——基于加密的去中心化项目与传统公司之间的竞争——做好准备。

    -   存在两种思想流派：一种是以太坊最大化主义者，他们认为比特币是唯一真正的加密货币，而山寨币只是实验。另一种则认为山寨币最终将取代比特币，就像 CD 取代录像带、Facebook
    取代 Myspace、数码相机取代旧相机一样。


    以下是投资 ICO 的风险：


    -   诈骗者利用不受监管的行业牟利。

    -   业余者可以利用 ICO 启动注定失败的项目。

    -   更长的项目交付时间增加了在你 ICO 构建自己的产品尚未完成时，竞争产品被推出的风险。

    '
- fmt: '# 关于替代币的风险与监管技术


    交易所需要接受替代币，才能形成替代币的市场。


    首次代币发行（ICO）可能被炒作和“拉升”所包围，以掩盖其弊端，诱使投资者情绪化投资，结果却发现这一切只是空谈。


    这种做法是借比特币、以太坊和达世币的成功之势，却没有提供任何实际回报。


    监管机构未来可能会改变规则，使具有某些功能的代币变得非法。


    替代币技术极其新颖，诸如协议共识等基本问题尚未解决。许多替代币将会诞生，而另一些则会消亡，直到我们最终看到加密货币领域的谷歌、脸书和优兔。


    某些代币可以被复制（分叉）并改进。克隆版本最终可能比原版更有价值。当该代币并非网络的内在组成部分时，这种情况就会发生。^([^(27)](#fn27),[^(28)](#fn28))


    ## 监管技术：RegChain


    监管技术是一个具有巨大前景的创新领域。Investopedia 将监管技术定义为“监管与技术的合成词”，旨在通过创新技术解决金融服务领域的监管挑战。监管技术由一群公司组成，这些公司利用技术帮助企业高效、低成本地遵守法规。


    安永（一家税务咨询机构）在其出版物《监管技术创新》中的总结阐述了监管技术带来的若干好处：


    - 支持创新。

    - 提供分析。

    - 降低合规成本。


    还有一些短期好处：


    - 降低成本

    - 可持续且可扩展的解决方案

    - 高级数据分析

    - 无缝连接的控制与风险平台


    长期好处包括以下内容：


    - 积极的客户体验

    - 增强市场稳定性

    - 改善治理

    - 增强监管报告能力^([^(29)](#fn29))


    德勤创建的一个监管技术模型的当前创新经验是`RegChain`：


    > 德勤与爱尔兰基金及其成员合作，推进了“灯塔项目”，以评估区块链技术服务监管报告要求的能力。该项目测试了一个平台的以下能力：为基金管理人提供独立节点以存储和分析基金数据，同时将监管报告要求编码到智能合约中，用于执行和数据验证。此外，还促成了一个监管节点，允许公司与监管机构之间进行安全可靠的数据交换，并提高整体报告效率和市场透明度。除了技术设计和开发之外，还进行了一项比较业务分析，以审查拟议区块链解决方案的成本效益分析。

    >

    > `RegChain`是使用德勤的快速原型设计流程开发的，该流程采用了实验驱动的敏捷方法。关键阶段包括：解决方案愿景、设计和测试参数的定义、开发冲刺，以及与来自基金管理人和基金管理行业的参与者组成的行业小组委员会进行的持续审查。

    >

    > 该项目的一个关键考量与基石是确保技术人员与来自运营、监管团队和高级管理层的行业代表之间的协作。这被认为是实现全面概念验证设计所必需的，而且更重要的是，有助于定义未来生产解决方案如何实现。^([^(30)](#fn30))


    使用区块链技术是因为其众多特性和功能可以增强满足报告要求的整体能力：


    - 数据完整性

    - 可靠性

    - 存储与速度

    - 分析

    - 概念验证


    该概念验证创建了`RegChain`，这是一个基于区块链的平台，通过充当安全存储和审查大量监管数据的中央存储库，简化了传统的监管报告流程。`RegChain`已在市场中成功应用于多个案例，并给未来更广泛地采用和享受该模式的好处带来了希望。


    # 新的区块链公司与理念


    《哈佛商业评论》的一篇文章指出：“许多企业尚未从工业时代跃入信息时代，技术变革与组织变革之间的鸿沟正在扩大。”^([^(31)](#fn31))


    高盛在数字创新和区块链应用领域采取了一系列大胆果断的步骤。高盛已投资了`Circle`和`Digital Assets Holdings`等基于区块链技术的公司。此外，2016年10月，高盛推出了一个在线平台，向消费者提供无担保个人贷款。


    ## Homechain 与 SALT


    另一家新公司是`Homechain`，被描述为贷款发起和监管合规的未来。其商业理念是将住房贷款发起和监管合规流程从42天缩短到5天。`RegChain`支持向监管机构报告合规情况。目前，区块链技术正处于互联网1992年所处的发展阶段，它正在开启大量新的可能性，有望为金融、医疗、教育、音乐、艺术、政府等众多行业增加价值。^([^(32)](#fn32))


    `SALT`借贷平台允许区块链持有者将其持有的资产作为现金贷款的抵押品。`SALT`是第一个基于资产的借贷平台，让区块链资产持有者无需出售其代币即可获得流动性。`SALT`通过一个完全抵押的债务工具，为投资者提供了针对高增长资产类别进行借贷的创新且安全的机会。`SALT`是由非传统抵押品担保的传统贷款。


    每个`SALT`代币都代表`SALT`借贷平台的一个会员资格。该代币是一个`ERC20`智能合约。


    区块链技术正在许多行业掀起波澜。各个行业的公司都在创新，利用区块链创建新应用并创办颠覆性公司。埃森哲的一份报告显示了全球八家最大投资银行的成本数据，并指出到2025年，区块链技术每年可为投资银行节省高达120亿美元的成本。投资银行使用区块链技术有多重好处，包括数据传输更安全以及由于数字化媒介带来的管理成本降低。^([^(33)](#fn33))'
  raw: '*   Exchanges need to accept the altcoin for there to be a market for the
    altcoin.


    *   An ICO can be surrounded by hype and “pumping” to mask the cons of the ICOs
    and make investors invest emotionally, only to find out later that it was all
    hot air.


    *   This is done by piggybacking on the success of Bitcoin, Ethereum, and Dash
    without offering anything real back in return.


    *   Regulators can change rules and make coins with certain functionality illegal
    in the future.


    *   Altcoin technology is extremely new, and basic issues such as agreement on
    protocols are not yet resolved. Many altcoins will be born, and others will dissipate,
    until we eventually see the Google, Facebook, and YouTube of cryptocoins.


    *   Certain tokens can be copied (forked) and made better. The clone can eventually
    have more value than the original. This happens when the token is not an intrinsic
    part of the network^(.[^(27)](#fn27),[^(28)](#fn28))


    ### Regulation Technology: RegChain


    Regulation technology (RegTech) is a new innovation area that holds great promise
    for the regulation industry. RegTech is defined by Investopedia as “a blend word
    of regulating technology” that was created to address regulatory challenges in
    the financial services sector through innovative technologies. RegTech consists
    of a group of companies that use technology to help businesses comply with regulations
    efficiently and inexpensively.


    A summary in Ernst & Young’s (a tax advisory organization) publication “Innovating
    with Reg Tech” illustrates several benefits offering regulation technology:


    *   Supports innovation.


    *   Provides analytics.


    *   Reduces cost of compliance.


    There are also some short-term benefits:


    *   Cost reduction


    *   Sustainable and scalable solutions


    *   Advanced data analytics


    *   Control and risk platforms to be linked seamlessly


    Long-term benefits include the following:


    *   Positive customer experience


    *   Increased market stability


    *   Improved governance


    *   Enhanced regulatory reporting^([^(29)](#fn29))


    A current innovation experience of a RegTech model created by Deloitte is RegChain:


    > *Deloitte, in collaboration with Irish Funds and their members, advanced “Project
    Lighthouse” to assess blockchain technology’s ability to service regulatory reporting
    requirements. The project tested the ability for a platform to provide individual
    nodes for fund administrators to store and analyze fund data while coding regulatory
    reporting requirements into smart contracts for execution and data validation.
    A regulator node was also facilitated, allowing the safe and secure exchange of
    data between firms and the regulator, as well as to increase overall reporting
    efficiency and market transparency. In addition to technical design and development,
    a comparative business analysis was undertaken to review the cost–benefit analysis
    of the proposed blockchain solution.*


    > *RegChain* *was developed using Deloitte’s rapid prototyping process, which
    uses an experiment-driven agile methodology. Key phrases included solution visioning
    definition of design and test parameters, development sprints, and ongoing reviews
    with an industry subcommittee with participants from across the fund administrator*
    *and fund management world.*


    > *A key consideration and cornerstone* *for this project was to ensure collaboration
    among technologists and industry representatives from operations, regulatory teams,
    and senior management. This was deemed critical in order to have a comprehensive
    PoC design, and moreover, to help define how a future production solution could
    be realized.*^([^(30)](#fn30))


    Blockchain technology was used because of a number of features and characteristics
    that can enhance the overall ability to meet reporting requirements:


    *   Data integrity


    *   Reliability


    *   Storage and speed


    *   Analytics


    *   Proof-of-concept (PoC)


    The PoC created RegChain, a blockchain-based platform that streamlined the traditional
    regulatory reporting processes by acting as a central repository for the safe
    storage and review of a large volume of regulatory data. RegChain has been used
    in the marketplace successfully in multiple applications and gives hope that the
    future will see wider adoption and enjoyment of the benefits of this model.


    ## New Blockchain Companies and Ideas


    A *Harvard Business Review* article states, “Many businesses have yet to make
    the leap from the Industrial Age to the Information Age, and the gap between technological
    and organizational progress is widening.”^([^(31)](#fn31))


    Goldman Sachs has taken a series of steps that are bold and decisive in the area
    of digital innovation and blockchain applications. Goldman has been involved in
    some blockchain technology–based companies like Circle and Digital Assets Holdings.
    Additionally, in October 2016, Goldman Sachs introduced an online platform offering
    unsecured personal loans to consumers.


    ### Homechain and SALT


    Another new company is Homechain, described as the future of loan origination
    and regulatory compliance. The business idea is reducing the home loan origination
    and regulatory compliance process from forty-two days to five days. RegChain allows
    for compliance to reporting bodies. At this time, blockchain technology is at
    the stage where the internet was in 1992, and it is opening up a wealth of new
    possibilities that have the promise to add value to numerous industries, including
    finance, health, education, music, art, government, and more.^([^(32)](#fn32))


    The SALT lending platform allows the holders of blockchain to leverage their holdings
    as collateral for cash loans. SALT is the first asset-based lending platform to
    give blockchain asset holders access to liquidity, with their having to sell their
    tokens. SALT provides investors an innovative and secure opportunity to lend against
    a high-growth asset class through a fully collateralized debt vehicle. SALT is
    traditional lending secured by nontraditional collateral.


    Each SALT token is representative of a membership to the SALT lending platform.
    The token is an ERC20 smart contract.


    Blockchain technology is making waves in many industries. Companies in various
    sectors are innovating and using blockchain to create new applications and start
    up disruptive companies. A report by Accenture shows the cost data of eight of
    the world’s largest investment banks, and states that blockchain technology could
    help reduce the costs of investment banks by as much as $12 billion per annum
    by 2025\. There are multiple benefits for investment banks using blockchain technology,
    including safer transmission of data and overhead cost reductions due to a digital
    medium.^([^(33)](#fn33))'
