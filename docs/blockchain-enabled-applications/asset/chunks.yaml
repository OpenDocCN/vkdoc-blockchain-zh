- fmt: '**John:** Don’t get me wrong… the US health system has been remarkably successful.
    More people die of old age than infectious disease. We have become experts at
    treating acute care injuries and illnesses. Our pharmaceuticals industry produced
    a vaccine to Zika in a remarkably short amount of time. I would not say our system
    is broken or in need of a do-over. It is working exactly as we designed it to
    work. It is a representation of the user stories and requirements that we drew
    up for its developers. People from around the world travel to the United States
    to receive world-class treatment. And we are rapidly exporting our (good and bad)
    expertise to the rest of the world.


    What is clear is that we are no longer getting our money’s worth. The US is approaching
    $5T in spend, and one-third is waste. Medical errors are the third leading cause
    of mortality behind heart disease and cancer. Significant populations of people
    in the US and around the world have poor access to care. We all live in environments
    where unhealthy influences and behaviors have been institutionalized. Yesterday’s
    system we created was not designed to counter-balance the behaviors that have
    emerged as the leading causes of today’s cost and quality concerns. We are realizing
    that can''t be fixed with new applications on top of the as-designed system. We
    have to re-build, taking advantage of our successes while optimizing for today’s
    social and economic truths.


    **Vikram:** *So, what does the re-build look like? What are the new user stories
    and requirements? Who are the new developers of this system? Can the current corporate
    interests be trusted to re-design a platform for the future? How do we get from
    here to there?*


    **John:** Hashed Health sees the blockchain as the protocol for the next generation
    of health solutions. By moving trust to the protocol layer, we lay the foundation
    for more agile care-delivery models, payments systems, value chains, and consumer
    experiences. It is not THE answer to these questions, but it allows innovators
    to have a new conversation free of today’s limiting factors. When combined with
    IoT, machine learning, artificial intelligence, cryptocurrency, design thinking,
    and other tools, blockchain becomes a recipe for true disruption.


    The path to real change in healthcare is through the consumer. One reason blockchain
    is an enabler of disruption in healthcare lies in its potential to change the
    consumer’s relationship with existing systems of health and wellness. It provides
    an alternative to today’s corporate-focused environment that has become a limiting
    factor for society. The user will interact with this new model through their mobile
    devices, which will leverage “wallet” software that will become more and more
    self-sovereign over time. Consumers will become prosumers with controls over their
    health assets. Patients will no longer be asked to join a series of siloed patient
    portals as they move through the continuum of care. This provides a more holistic
    approach across an individual’s related health, wellness, social, and socioeconomic
    events. We have learned that one’s health is so much more than the 5 percent fragments
    that happen during a clinical visit. Patients will be empowered to their information
    and the ability to donate or monetize their records as they wish. Over time, honeypots
    of medical records data will be decentralized and distributed, making the user’s
    information less accessible to theft.


    **Vikram:** *By many standards, healthcare IT moves as a slow monolith. This may
    be due to design, but can you talk a bit more about why we don’t have a straightforward
    consumer-to-provider relationship in health IT, and healthcare more broadly?*


    **John:** The consumer-facing side of health IT is complicated. Consumerization
    of healthcare has been a buzzword for years now but has proven elusive. There
    are a few important reasons why this is true. First, on many levels, healthcare
    is not like other markets. Healthcare is not a traditional commodity or service
    to be purchased. Even if they were completely free to do so (more on this below),
    consumers are not in a position to make the best judgments about purchasing healthcare,
    either because of the complexity of healthcare treatments or due to the emergent
    need to seek care. Additionally, unlike almost all other products or services,
    a consumer cannot always predict the results of consuming healthcare. For example,
    purchasing a car produces predictable results: owning transportation equipment
    with stated features and in regulatory compliance. By contrast, a given treatment
    may or may not adequately address the illness or condition.


    Beyond these economic basics, consumerization is complicated by the configuration
    of the healthcare system itself. The drive to “Uber-ize” healthcare runs head-on
    into the wall of the US payment and delivery systems. The consumer has no knowledge
    of price for services. Providers themselves often cannot give pricing in advance.
    Furthermore, the consumer is not a party to the pricing agreement, as the contractual
    relationship is between the provider and the payor, on behalf of the consumer.
    These are all well-known, almost hackneyed issues related to US healthcare. By
    themselves, they do not prevent the creation of potentially useful consumer tools.
    Instead, to have utility, consumer tools need to “plug in” to the systems that
    deliver and pay for healthcare services. Given the dizzying array of payors, physician
    and service providers, as well as their oft-conflicting motivations, consumer
    tools are often stymied by the unwillingness of enterprises that control the healthcare
    marketplace. Consumerization of healthcare is elusive—not because of a lack of
    tools, but rather, due to the lack of an open platform.


    As groups of consumers organize or are convened in traditional and innovative
    ways, these groups will represent new centers of gravity for the future marketplace.
    The community or group (however you define it—village, employer, values-based
    group, nursing home, etc.) will also be empowered through the ability to organize,
    aggregate, and share. Similarly, groups of providers on the sell-side of the marketplace
    will organize (or be convened) into either traditional or innovative new cohorts
    for the provision of care in ways that are better, faster, and more economically
    rational than what can be delivered under today’s bloated market structure.


    **Vikram:** *How do you think the large enterprises (provider groups and insurance
    companies) will evolve to respond to the new opportunities such as blockchain?*


    **John:** Enterprises will, over time, be affected by new opportunities and challenges
    that result from changing market structures. The effects will be felt throughout
    today’s healthcare value chains, such as supply chain, revenue cycle, claims lifecycle,
    clinical research, insurance/benefits, and clinical episodes. Audit and compliance
    activities will fall away to automation. Contracting, rebating, admin fees, and
    discounting schemes will disappear or be transformed through the use of immutable,
    transparent shared ledgers. Closed relational databases like EMRs, ERPs, and materials
    management systems will evolve as the nature of their accounting functions move
    to the market level. Clinical trials programs will be optimized through sharing
    of information and streamlined administrative processes. Security will be enhanced,
    and, over time, data honeypots will fall away to a decentralized structure.'
