    transaction volume can set up load-balancers that can respond appropriately to
    a scaling BaaS setup.


    *   Security and data-redundancy standards: It is paramount to get familiar with
    the security and backup/disaster-recovery policies of the cloud platform hosting
    your BaaS instance. This comes down to understanding the security of private–public
    keys being stored and used in the cloud, on-site security team handling cloud
    provider’s BaaS instances, being compliant with security regulations, and redundancy
    of backups holding your blockchain instance.


    *   Integrations: Does your BaaS provider have plans for the integration of services
    that can enable new features and applications to be built on the blockchain? This
    is crucial for new startups as they pivot to find new avenues, or add new features
    to their minimum viable product. Additionally, developers must make sure that
    new features and integrations are easy to adopt into existing workflows. This
    reduces the additional overhead of becoming familiar with a new cloud system.


    *   Pricing and tiers of support: Transparent pricing is key in any BaaS provider;
    this also helps in planning the finances around your BaaS instance. Many providers
    offer tiers of pricing for using the infrastructure combined with levels of support.
    Fully managed instances require less in-house management of the instance once
    it moves online. This option is suitable for startups or companies without domain
    expertise in setting up BaaS or networking and allows them to focus only on blockchain
    development. Partially managed options are better suited for startups that are
    heavily tech-focused and have in-house expertise.


    Figure [14-1](#430562_2_En_14_Chapter.xhtml#Fig1) provides a graphical summary
    of the main BaaS providers on the market.


    ![../images/430562_2_En_14_Chapter/430562_2_En_14_Fig1_HTML.jpg](images/430562_2_En_14_Chapter/430562_2_En_14_Fig1_HTML.jpg)


    Figure 14-1


    BaaS hosting summary


    ### Microsoft Azure


    Azure offers a Blockchain-as-a-Service platform by providing customers with easy-to-deploy
    enterprise-grade templates for four major distributed ledger protocols, including
    Ethereum, Quorum, Fabric, and Corda (and many more planned). The Azure BaaS is
    divided into three main components: a fully managed Azure Blockchain Service,
    a development and management platform called Azure Blockchain Workbench, and integrations
    bundled in Azure Blockchain Development Kit. This section was prepared with reference
    material from the Azure Blockchain Service documentation.


    #### Azure Blockchain Service


    This is Microsoft Azure’s fully managed BaaS offering. Customers can create and
    deploy a permissioned Quorum network with a few clicks and manage the network
    policies along with security options using a GUI in the Azure Portal. In addition,
    Microsoft is releasing a Visual Studio extension that assists users in 1) writing
    and compiling Ethereum smart contracts; 2) deploying them to a consortium network
    through Azure Blockchain service or the public main-net; and 3) managing them
    through Azure Portal. This service enables organizations and consortia to grow
    and scale completely in the cloud with Azure without having to worry about underlying
    provisioning. Granular network governance and simplified infrastructure management
    allow for simple network deployment, easy-to-manage network operations and security,
    and the development of smart contracts with developer-friendly tools such as Visual
    Studio.


    Currently, Azure offers Quorum ledger with the Istanbul Byzantine Fault Tolerance
    consensus mechanism. Using a managed service allows customers to focus on developing
    their core products and business logic without worrying about the underlying virtual
    machine infrastructure. As with most cloud services, the use of virtual machines
    allows for redundant backups of the whole blockchain and the possibility of network
    restoration from a specific time slot if necessary.


    #### Azure Blockchain Workbench


    Azure Blockchain Workbench is a collection of Azure support services that help
    deploy and manage blockchain applications and share business processes with other
    organizations on a network. This workbench provides underlying infrastructure
    to capture business models and codify them into smart contracts that can be deployed
    to an existing blockchain network. It also provides developers with automation
    capabilities for redundant tasks. The workbench simplifies setting up a consortium
    blockchain network by providing a template within Azure Resource Manager; for
    now, the template only supports Ethereum, but more ledger protocols are under
    development. The key feature of Workbench is its integrations with existing Azure
    components; for instance, the REST API as explained by the Azure Blockchain documentation:


    > *You can use the Blockchain Workbench REST APIs and message-based APIs to integrate
    with existing systems* *. The APIs provide an interface to allow for replacing
    or using multiple distributed ledger technologies, storage, and database offerings.*


    > *Blockchain Workbench can transform messages sent to its message-based API to
    build transactions in a format expected by that blockchain’s native API. Workbench
    can sign and route transactions to the appropriate blockchain.*


    > *Workbench automatically delivers events to Service Bus and Event Grid to send
    messages to downstream consumers. Developers can integrate with either of these
    messaging systems to drive transactions and to look at results.*


    > *Azure Blockchain Workbench makes it easier to analyze blockchain events and
    data by automatically synchronizing data on the blockchain to off-chain storage.
    Instead of extracting data directly from the blockchain, you can query off-chain
    database systems such as SQL Server. Blockchain expertise is not required for
    end users who are doing data analysis tasks.*'
  trans: '

    # 服务提供商


    截至目前，市场上约有十家 BaaS 提供商，它们提供的服务和支持程度各不相同。尽管评估 BaaS 提供商的标准可能数不胜数，但每个商业应用都有其特定需求。这里有两个评估维度：托管
    BaaS 实例的云提供商，以及 BaaS 实例本身。在此，我们希望重点关注在选择 BaaS 提供商时需牢记的四个方面：


    *   **搭建区块链基础设施的过往经验：** 随着 BaaS 提供商市场的扩张，选择那些在开发和部署区块链基础设施方面拥有成熟业绩记录的提供商至关重要。当商业应用随着客户增多而开始扩展时，基础设施的可靠性会变得更加明显和关键。例如，具备区块链交易量处理经验的云提供商可以设置负载均衡器，以恰当响应不断扩展的
    BaaS 设置。


    *   **安全与数据冗余标准：** 熟悉托管你 BaaS 实例的云平台的安全和备份/灾难恢复策略至关重要。这涉及到理解在云端存储和使用的私钥/公钥的安全性、处理云提供商
    BaaS 实例的现场安全团队、遵守安全法规，以及持有区块链实例的备份冗余。


    *   **集成能力：** 你的 BaaS 提供商是否有计划集成各种服务，以便在区块链上构建新的特性和应用？这对新兴初创企业来说至关重要，因为它们需要调整方向寻找新途径，或为其最小可行产品添加新功能。此外，开发人员必须确保新的特性和集成易于融入现有工作流程。这能减少熟悉新云系统所带来的额外开销。


    *   **定价与支持层级：** 透明的定价是任何 BaaS 提供商的关键；这也有助于规划围绕 BaaS 实例的财务。许多提供商根据基础设施的使用情况结合支持级别提供不同层级的定价。完全托管的实例一旦上线，就需要更少的内部管理。这种选项适合那些在搭建
    BaaS 或网络方面缺乏领域专长的初创企业或公司，使它们能够专注于区块链开发。部分托管选项则更适合那些技术导向性强且拥有内部专长的初创企业。


    图 14-1 以图形方式总结了市场上主要的 BaaS 提供商。


    ![../images/430562_2_En_14_Chapter/430562_2_En_14_Fig1_HTML.jpg](img/430562_2_En_14_Fig1_HTML.jpg)


    图 14-1

    BaaS 托管概览


    ## Microsoft Azure


    Azure 提供区块链即服务平台，通过为客户提供易于部署的企业级模板，支持四种主要的分布式账本协议，包括 Ethereum、Quorum、Fabric 和
    Corda（并计划支持更多协议）。Azure BaaS 分为三个主要组件：完全托管的 `Azure Blockchain Service`、名为 `Azure
    Blockchain Workbench` 的开发和管理平台，以及捆绑在 `Azure Blockchain Development Kit` 中的集成组件。本节内容参考了
    Azure Blockchain Service 文档中的相关资料编写。


    ### Azure Blockchain Service


    这是 Microsoft Azure 提供的完全托管型 BaaS 服务。客户只需点击几下即可创建和部署一个带权限的 Quorum 网络，并使用 Azure
    门户中的图形用户界面管理网络策略和安全选项。此外，Microsoft 还发布了一个 Visual Studio 扩展，帮助用户：


    1. 编写和编译以太坊智能合约；

    2. 通过 Azure Blockchain Service 或公共主网将其部署到联盟网络；以及

    3. 通过 Azure 门户管理它们。


    这项服务使组织和联盟能够在 Azure 云端完全成长和扩展，而无需担心底层资源供应。精细的网络治理和简化的基础设施管理，使得网络部署简单、网络操作和安全易于管理，并能够使用
    Visual Studio 等对开发者友好的工具开发智能合约。


    目前，Azure 提供采用伊斯坦布尔拜占庭容错共识机制的 Quorum 账本。使用托管服务使客户能够专注于开发其核心产品和业务逻辑，而无需担心底层的虚拟机基础设施。与大多数云服务一样，虚拟机的使用允许对整个区块链进行冗余备份，并支持在必要时从特定时间点恢复网络。


    ### Azure Blockchain Workbench


    `Azure Blockchain Workbench` 是一系列 Azure 支持服务的集合，用于帮助部署和管理区块链应用，并与网络上的其他组织共享业务流程。该工作台提供底层基础设施，用于捕获业务模型并将其编码为可部署到现有区块链网络的智能合约。它还为开发者提供了自动化重复任务的能力。Workbench
    通过在 `Azure Resource Manager` 中提供一个模板，简化了联盟区块链网络的搭建；目前，该模板仅支持以太坊，但更多账本协议正在开发中。Workbench
    的主要特点在于它与现有 Azure 组件的集成；例如，正如 Azure 区块链文档所解释的 REST API：


    > 您可以使用 Blockchain Workbench REST API 和基于消息的 API 与现有系统集成。这些 API 提供了一个接口，允许替换或使用多种分布式账本技术、存储和数据库产品。


    > Blockchain Workbench 可以转换发送到其基于消息的 API 的消息，以构建该区块链原生 API 所期望格式的交易。Workbench
    可以对交易进行签名并将其路由到相应的区块链。


    > Workbench 会自动将事件传递给 Service Bus 和 Event Grid，以向下游消费者发送消息。开发者可以集成这些消息系统中的任何一个来驱动交易并查看结果。


    > Azure Blockchain Workbench 通过自动将区块链上的数据同步到链下存储，使得分析区块链事件和数据变得更加容易。您可以直接查询 SQL
    Server 等链下数据库系统，而无需直接从区块链提取数据。对于执行数据分析任务的最终用户来说，无需具备区块链专业知识。

