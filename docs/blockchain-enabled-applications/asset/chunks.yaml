  trans: '

    # 区块链与代币化


    区块链不仅仅是一项技术。它是一项同时存在于工程堆栈多个层面的技术，也是行为经济学领域的一项创新。它创造了一门新学科：**实时应用行为经济学**。这是一个全新的机遇，可以表达博弈论原理，形成假设，并测试不同的激励设计如何影响医疗健康领域及其他相关行业中的利益相关者群体。


    从结构上看，它为全新的商业模式打开了大门——这些模式在物流层面以前从未可行，因此也从未被认真考虑过。同时，它引入了个体身份或自我主权的全新高度，包括对你是谁、你的数据以及与你相关数据的凭证或验证的潜力。所有这一切都因区块链而成为可能。区块链以网络的形式存在。这些网络可以是公共资源、公共基础设施，以及像`以太坊`主网或`比特币`区块链这样的中立平台。`以太坊`主网可以运行专注于任何类型应用的软件——不仅是数字货币，还包括任何类型的软件应用。


    与公共区块链网络相比，私有区块链网络拥有完全不同的特性，尽管它们共享一些相同的优势，同时也有若干权衡。展望区块链在医疗健康行业的未来，最终的形态很可能会是一系列混合网络——大量私有企业网络通过单一的中立公共基础设施进行桥接或连接。


    区块链的另一个标志性特征，尤其是像`以太坊`等较新的区块链平台，是执行和运行智能合约的能力：这些智能合约是经过加密存储和验证的存储过程，以微服务的形式在区块链基础设施上运行。这些智能合约至关重要，因为它们促成了跨组织边界的**安全自动化**。在过去三十年中，企业计算机工程的大部分工作都聚焦于特定企业内部的四壁之内。而这种分布式智能合约基础设施首次使得在生态系统层面运用同样的自动化与效率提升原则成为可能，提供了能够真正为医疗健康未来交付成果的技术。


    此外，从经济学和行为经济学的角度来看，区块链提供了数字稀缺性。在我们当前的传统数据环境中，并不存在稀缺性，因为数据可以被无限复制。这种无休止的复制不断扩展所需的磁盘存储空间，并造成治理上的困难。通过代币化——无论是像序列号这样的单一物品的代币化，还是像加密货币、证书或任何具有价值的事物这样可复制单位的代币化——可以在具有既定价值单位的实际交易中创造稀缺性。


    区块链最吸引人的一点是，用户将不会察觉到这项技术在后台“运行”以交换和管理数据。结合以人为中心的设计、精简的用户体验和界面、前端 Web 3.0 应用以及去中心化应用（DApps），用户永远不会感觉到后台有任何不同。公共区块链提供的某些特性，特别是透明度和去中心化，在作为私有区块链网络实施时会有所牺牲，而换来的是极致的隐私性。


    新技术促进了链下计算与存储，从而在通用基础设施中实现了透明度和隐私性两方面的特性。当从数百种不同的架构模式、数十种区块链协议（公共、私有和混合）中进行选择时，总是需要在三个标准之间进行权衡：


    1.  系统的可扩展性

    2.  其网络安全状况

    3.  其去中心化或中心化控制的程度


    在形成架构模式时，可以针对其中任何两个标准进行优化。


    区块链技术对于医疗健康行业来说是必要的，但并非充分条件。还有其他重要领域，该技术能极大地增强医疗行业的独特需求，包括合规性、独特的网络安全环境、独特的隐私环境，以及我们在患者、提供者和设备身份方面面临的挑战。所有这些还需要对医疗生物伦理学有清晰的洞察。因此，要实现期望的结果，我们需要的不止是区块链。

    '
- fmt: '# Decentralized Artificial Intelligence (AI)


    Currently, machine learning, which makes up the bulk of the current artificial
    intelligence applications in healthcare, is accomplished by 1) putting a lot of
    data together in a central place to curate it; 2) running analytics on the data
    sets; and 3) eventually training extremely complicated machine learning models.
    As an example of when this is a reasonable proposition and scalable, consider
    data from your phone. Your phone data is pooled together with others’ data in
    a single place to learn, for example, how to better predict next words on the
    keyboard of your smartphone. Then, once a new predictive model is ready, this
    improved model is pushed back to your phone. Inherently, the assumption is made
    either that the data pulled together in a central data lake is not too sensitive
    or that you are okay with sharing your data with the central entity. Obviously,
    this is not the case with health data, so the centralized model does not work
    as well in healthcare. With the decentralized model, the difference is that instead
    of bringing the data to the model, the model is delivered to the data, so the
    data does not travel anymore—it remains at rest.


    In the decentralized approach, we send models to each of the locations where the
    data lives. It can be a mobile phone or larger data lakes owned by institutions.
    For example, if data is owned by different clinical institutions, a unique learning
    model can be developed at each of these institutions; they will basically each
    train their own model. Then, the key to machine learning is to combine the knowledge
    that has been learned at each of these institutions (or sites or devices) into
    a single new joint model. So, in the future, you will not need to consider how
    to gather data into a central location for storage and access; you will instead
    deploy a machine learning model to the network and receive back derived data.


    So, why is this important? For starters, if it’s my personal data we are considering,
    a lot can happen with my data once it’s copied and whisked off out of my control.
    If it’s at rest within my system, or within my phone, I have more control. That
    peace-of-mind aspect is important to the consumer and the general public when
    you consider the constant stream of data breaches that show no sign of abating.
    Further, by leaving the data where it is, you suppress copies and introduce digital
    scarcity. Combined with blockchain, that’s all you need to create a decentralized
    marketplace. If data threats could be significantly decreased with a decentralized
    system that is still able to deliver the value of advanced knowledge that can
    only come from the extensive data analytics of many data sets, health and healthcare
    as we know it will be transformed.


    An additional benefit of combining blockchain with machine learning, even in centralized
    machine learning models, involves sourcing and training data to have the cryptographically
    verified provenance of every data element that is ultimately included in a training
    set. That can go a long way toward resolving explainability problems and other
    long-standing issues with being able to source training data, understand where
    it came from, and determine whether the data itself was corrupted. Decentralizing
    the learning function and decentralizing the sourcing of training data is low-hanging
    fruit and represents a huge incremental benefit when conducting learning on decentralized
    data. Therefore, the convergence of blockchain infrastructures with decentralized
    machine learning approaches is absolutely necessary.


    This may be news, but the ability to conduct decentralized machine learning has
    existed for quite some time. However, it has yet to be embraced by the healthcare
    industry because it has lacked the appropriate incentives. By integrating blockchain
    with these decentralized AI tactics for training models, we are able to connect
    incentives and to know conclusively exactly what permissions are granted, by whom,
    to do exactly what, for how long, etc. The combination of these technologies will
    be transformative for advancing healthcare.


    # Privacy in Depth


    > “Any sufficiently advanced technology is indistinguishable from magic.” —Arthur
    C. Clarke’s Third Law


    How do we ensure privacy and security? It’s the question on everyone’s mind when
    we are considering health data. It turns out that there is a family of advanced
    cryptographic privacy-preserving techniques that are being utilized in new ways
    that will have a profound impact on personal health information and regulatory
    compliance in healthcare and life sciences. A prime example of this is `zero-knowledge
    proofs` (ZKPs). It would take multiple chapters of another book to go over ZKPs
    and these other privacy-in-depth techniques in detail. So, from a high level,
    here is a brief look at ZKPs and how they are substantially different from standard
    legacy cryptographic models or methods that are generally used today.


    ZKP cryptography has been around for thirty years, but it is getting extra traction
    in recent years, especially as it relates to blockchain. What ZKPs do is allow
    you to prove that a statement is correct and true without revealing the statement
    that is at the heart of the confirmation. Its value is to prove that you know
    something that you want to keep secret, and to convince another party or the rest
    of the network that you do actually know the secret, but without actually revealing
    the secret.


    As a real-world example, think about your birthdate as a data element and all
    the times you have to enter your birthdate in order to demonstrate your age, for
    whatever reason. In a world where ZKP cryptography was brought to global industrial
    scale, the data elements of your birthday would almost never need to be transferred.
    Instead, a cryptographic proof that your birthday was higher than or lower than
    or within the decade of the birthday requirement—yes or no—would be all that the
    other system would store. The month, day, and year of your birthday would remain
    at rest. That is just one simple example. If you imagine all the data that is
    involved in clinical, scientific, and business workflows in our industry, ZKP
    cryptography, along with the rest of the family of privacy-in-depth cryptography,
    has endless applications.


    Why and how are these advanced cryptographic privacy-preserving techniques used
    in the context of this whole stack we are describing? First, they add more authenticity
    to the shared derived data. For example, imagine that a patient, Alice, must use
    a remote private inference service that screens patients prior to scheduling a
    consultation with a very busy specialist named Bob. Bob’s policy implies that
    the secure inference service returns a prediction with a probability greater than
    80 percent in order to book an appointment with him. When Alice gets the prediction
    back, it’s been encrypted such that she’s the only person who can decrypt it.
    Now Alice wants to present her diagnosis to Bob to request an appointment. How
    can Bob be certain that the prediction Alice is presenting has indeed been obtained
    from the secure inference prediction service? There is no way to do that *unless*
    Alice can provide a cryptographic proof that the prediction value actually came
    from the specified inference service. In ZKP terms, this means proving that the
    plaintext prediction sent by Alice to Bob corresponds to the encrypted content
    she received from the service. Not only does Alice send the prediction to Bob,
    but she also adds a ZKP of the correct decryption alongside the prediction number.
    Note that the whole process never revealed Alice’s input healthcare data in plaintext
    to the prediction service or to Bob.'
  raw: '## Decentralized Artificial Intelligence (AI)


    Currently, machine learning, which makes up the bulk of the current artificial
    intelligence applications in healthcare, is accomplished by 1) putting a lot of
    data together in a central place to curate it; 2) running analytics on the data
    sets; and 3) eventually training extremely complicated machine learning models.
    As an example of when this is a reasonable proposition and scalable, consider
    data from your phone. Your phone data is pooled together with others’ data in
    a single place to learn, for example, how to better predict next words on the
    keyboard of your smartphone. Then, once a new predictive model is ready, this
    improved model is pushed back to your phone. Inherently, the assumption is made
    either that the data pulled together in a central data lake is not too sensitive
    or that you are okay with sharing your data with the central entity. Obviously,
    this is not the case with health data, so the centralized model does not work
    as well in healthcare. With the decentralized model, the difference is that instead
    of bringing the data to the model, the model is delivered to the data, so the
    data does not travel anymore—it remains at rest.


    In the decentralized approach, we send models to each of the locations where the
    data lives. It can be a mobile phone or larger data lakes owned by institutions.
    For example, if data is owned by different clinical institutions, a unique learning
    model can be developed at each of these institutions; they will basically each
    train their own model. Then, the key to machine learning is to combine the knowledge
    that has been learned at each of these institutions (or sites or devices) into
    a single new joint model. So, in the future, you will not need to consider how
    to gather data into a central location for storage and access; you will instead
    deploy a machine learning model to the network and receive back derived data.


    So, why is this important? For starters, if it’s my personal data we are considering,
    a lot can happen with my data once it’s copied and whisked off out of my control.
    If it’s at rest within my system, or within my phone, I have more control. That
    peace-of-mind aspect is important to the consumer and the general public when
    you consider the constant stream of data breaches that show no sign of abating.
    Further, by leaving the data where it is, you suppress copies and introduce digital
    scarcity. Combined with blockchain, that’s all you need to create a decentralized
    marketplace. If data threats could be significantly decreased with a decentralized
    system that is still able to deliver the value of advanced knowledge that can
    only come from the extensive data analytics of many data sets, health and healthcare
    as we know it will be transformed.


    An additional benefit of combining blockchain with machine learning, even in centralized
    machine learning models, involves sourcing and training data to have the cryptographically
    verified provenance of every data element that is ultimately included in a training
    set. That can go a long way toward resolving explainability problems and other
    long-standing issues with being able to source training data, understand where
    it came from, and determine whether the data itself was corrupted. Decentralizing
    the learning function and decentralizing the sourcing of training data is low-hanging
    fruit and represents a huge incremental benefit when conducting learning on decentralized
    data. Therefore, the convergence of blockchain infrastructures with decentralized
    machine learning approaches is absolutely necessary.


    This may be news, but the ability to conduct decentralized machine learning has
    existed for quite some time. However, it has yet to be embraced by the healthcare
    industry because it has lacked the appropriate incentives. By integrating blockchain
    with these decentralized AI tactics for training models, we are able to connect
    incentives and to know conclusively exactly what permissions are granted, by whom,
    to do exactly what, for how long, etc. The combination of these technologies will
    be transformative for advancing healthcare.


