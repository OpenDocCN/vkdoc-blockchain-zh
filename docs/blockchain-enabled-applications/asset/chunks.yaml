  raw: 'Now that we have a better idea of how mining works, let’s take a look at mining
    difficulty and target values. These two concepts are similar to knobs that are
    adjusted over the course of time for the network, and all Bitcoin clients get
    updated to follow the latest values. So, what is mining difficulty? Essentially,
    it can be defined as the difficulty of finding a hash below the target value as
    a miner is solving the proof-of-work problem. An increase in difficulty corresponds
    to a longer time needed to discover the hash and solve the PoW, also known as
    mining time. The ideal mining time is set by the network to be approximately ten
    minutes, which implies that a new block is announced on the network every ten
    minutes. The mining time is dependent on three factors: the target value, number
    of miners in the network, and mining difficulty. Let’s look at how these factors
    are interconnected:


    1.  An increase in mining difficulty causes a decrease in the target value to
    compensate for the mining time


    2.  An increase in the number of miners joining the network causes an increase
    in the rate at which PoW is solved, decreasing the mining time. To adjust for
    this, mining difficulty increases and the block-creation rate returns to normal.


    3.  The target value is recalculated and adjusted every 2016 blocks created, which
    happens in approximately two weeks.


    As we can see, there is a common theme of self-correction in the Bitcoin network
    that allows it to be very resilient. Miners are the heartbeat of the Bitcoin network,
    and they have two main incentives for participation:


    *   The first transaction to be packaged in a block is called the coinbase transaction.
    This transaction is the reward that the winning miner receives after mining the
    block and announcing it on the network.


    *   The second reward comes in the form a fee charged to the users of the network
    for sending transactions. The fee is given to the miners for including the transactions
    in a block. This fee can also be considered a miner’s income because as more and
    more Bitcoins are mined, this fee will become a significant portion of their income.


    Now we can put these concepts together in the form of another flowchart in Figure
    [2-3](#430562_2_En_2_Chapter.xhtml#Fig3). This will help solidify the process
    of mining in the context of difficulty and target values.


    ![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig3_HTML.jpg](images/430562_2_En_2_Chapter/430562_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Solving the PoW problem


    Miners across the network compete to solve the problem, and the winning miner
    announces the block to the network, which then gets incorporated in the blockchain.
    To solve the PoW, a miner has to keep generating new hash values (through the
    hash function) using the incremented nonce until a hash below the target value
    is discovered. In this case, notice that the nonce is the only adjustable value.
    This is a simplified PoW scheme, and there are small differences in its implementation
    versus reality.


    Note


    The term *mining* came about because the process is similar to the mining of rare
    metals. It is very resource intensive and makes new currency available at a slow
    rate, just like the miners in the Bitcoin protocol getting rewarded.


    We talked about the self-correction properties of the Bitcoin network and how
    they allow the network to adapt. Next, we will take a look at an unexpected consequence
    of getting a very large number of miners in the network as Bitcoin gained popularity.
    This led to an arms race of sorts, and it had far-reaching consequences. But first
    we need to talk about the new types of mining hardware that emerged.


    ## Mining Hardware


    As Bitcoin started to gain more popularity and acceptance with merchants, more
    miners joined the network in hopes of getting the rewards. Miners began to get
    more creative with how they approached mining, such as using specialized hardware
    that can generate more hashes. In this section, we will discuss the evolution
    of mining hardware as Bitcoin started to spread globally.


    *   **CPU mining** **:** The earliest form of mining available through the Bitcoin
    clients. It became the norm for mining in the early versions of the Bitcoin client
    but was removed in the later updates due to better options’ being accessible.


    *   **GPU mining** **:** The next wave of mining advancements. It turns out that
    mining with a GPU is far more powerful because it can generate hundreds of times
    more hashes than a CPU. This is now the standard for mining in most cryptocurrencies.


    *   **FPGAs and ASICs:** FPGA stands for Field-Programmable Gated Array and is
    an integrated circuit designed for a specific use case. In this case, the FPGAs
    were designed for mining Bitcoins. The FPGAs are written with very specific hardware
    language that allows them to perform one task very efficiently in terms of power
    usage and output efficiency. Shortly after the introduction of FPGAs, a more optimized,
    mass-producible, and commercial design came out in the form of ASICs (Application-Specific
    Integrated Circuits) . The ASICs have a lower per unit cost, so the units can
    be mass produced. The ASIC-based devices are also compact in form, therefore more
    can be integrated in a single device. The ability of ASICs to be combined in arrays
    at a low price point made a very convincing case for accelerating the rate of
    mining.


    *   **Mining pools** **:** As the mining difficulty went up due to the rise of
    ASICs, miners realized that individually, it was not financially wise to continue
    mining. It was just taking too long, and the reward did not match the resources
    that went into mining. So the miners organized themselves into groups called pools
    to combine the computational resources of all the members and mine as one unit.
    Today, joining a pool is very common to get started with mining in almost every
    crpytocurrency.


    *   **Mining cloud services** **:** These are simply contractors who have specialized
    mining rigs. They rent their services to a miner according to a contract for a
    given price to mine for a specific time.


    It is easy to see how ASICs completely changed the mining game after developers
    and hardware hobbyists realized that custom arrays of ASICs could be made at a
    fairly cheap price point. It was the beginning of a kind of arms race in Bitcoin
    hardware, and developers began designing new chips and buying new equpiment for
    mining rigs that could allow them to mine the most Bitcoin. This initial push
    driven by profit accelerated Bitcoin’s reach and created a golden era for the
    alternative currency. More developers and enthusiasts joined in on buying custom
    hardware to maximize their profits. The network responded by increasing the difficulty
    as the number of miners increased. Within a short span of time, the bubble could
    not sustain itself for the miners because of the self-correcting features present
    in the protocol, and the difficulty kept rising. In some cases, the hardware that
    miners purchased could no longer mine profitably by the time it arrived from the
    factory. A significant investment of capital was required up-front to make any
    appreciable returns. Most of the ASIC hardware is now historic, and even Bitcoin
    mining pools are not profitable for the average miner. The startups and companies
    that commercialized ASICs and custom hardware made a decent profit for a short
    time and then flopped. We will examine a few of those massive failures in the
    next section.'
  trans: "\n现在我们对挖矿原理有了更深入的理解，接下来看看**挖矿难度**和**目标值**。这两个概念类似于网络随时间调整的旋钮，所有比特币客户端都会更新以遵循最新数值。那么什么是挖矿难度？本质上，它可以定义为矿工在解决工作量证明问题时，找到低于目标值的哈希值的困难程度。难度增加意味着发现哈希并解决工作量证明所需的时间更长，这也就是挖矿时间。网络设定的理想挖矿时间约为十分钟，这意味着每十分钟会有一个新区块在网络中发布。挖矿时间取决于三个因素：目标值、网络中的矿工数量以及挖矿难度。让我们看看这些因素是如何相互关联的：\n\
    \n1.  挖矿难度的增加会导致目标值降低，以补偿挖矿时间。\n2.  加入网络的矿工数量增加会导致工作量证明的解决速度加快，从而缩短挖矿时间。为了调整这种情况，挖矿难度会增加，区块创建速率恢复正常。\n\
    3.  目标值每创建 2016 个区块重新计算和调整一次，这大约需要两周时间。\n\n正如我们所见，比特币网络中存在一种自我纠正的共性，使其具有极强的弹性。矿工是比特币网络的心脏，他们参与挖矿主要有两个动力：\n\
    \n*   区块中打包的第一笔交易称为 **coinbase 交易**。这是获胜矿工在挖出区块并在网络中宣布后获得的奖励。\n*   第二种奖励以手续费的形式出现，向网络用户收取用于发送交易。矿工因将交易打包进区块而获得这笔费用。这笔费用也可视为矿工的收入，因为随着越来越多的比特币被挖出，这笔费用将成为他们收入的重要部分。\n\
    \n现在，我们可以将这些概念以图 2-3 中另一个流程图的形式整合起来。这将有助于在难度和目标值的背景下巩固挖矿的过程。\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig3_HTML.jpg](img/430562_2_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3\n\n解决工作量证明问题\n\n网络中的矿工竞相解决问题，获胜的矿工将区块广播到网络，然后该区块被纳入区块链。为了解决工作量证明，矿工必须使用递增的\
    \ `nonce` 不断生成新的哈希值（通过哈希函数），直到发现一个低于目标值的哈希值。在这种情况下，请注意 `nonce` 是唯一可调整的值。这是一个简化的工作量证明方案，其实现与现实存在细微差别。\n\
    \n> **注意**  \n> *挖矿* 这个术语源于其过程类似于稀有金属的挖掘。它非常消耗资源，并以缓慢的速度释放新货币，就像比特币协议中的矿工获得奖励一样。\n\
    \n我们讨论了比特币网络的自我纠正特性，以及它们如何使网络适应变化。接下来，我们将探讨随着比特币普及，网络中涌入大量矿工所带来的一个意外后果。这引发了一场军备竞赛，并产生了深远的影响。但首先，我们需要讨论出现的新型挖矿硬件。\n\
    \n## 挖矿硬件\n\n随着比特币开始获得更多商家的普及和接受，更多矿工加入网络以期获得奖励。矿工们在挖矿方式上开始变得更具创意，例如使用能生成更多哈希值的专业硬件。在本节中，我们将讨论随着比特币开始全球传播，挖矿硬件的演变过程。\n\
    \n*   **CPU 挖矿：** 通过比特币客户端可用的最早挖矿形式。它在比特币客户端的早期版本中成为挖矿的常态，但由于更好的选择出现，在后续更新中被移除。\n\
    *   **GPU 挖矿：** 挖矿技术的下一波进步。事实证明，使用 GPU 挖矿强大得多，因为它能生成比 CPU 多数百倍的哈希值。这现在是大多数加密货币挖矿的标准配置。\n\
    *   **FPGA 和 ASIC：** FPGA 代表现场可编程门阵列，是一种为特定用例设计的集成电路。在这种情况下，FPGA 被设计用于挖掘比特币。FPGA\
    \ 使用非常特定的硬件语言编写，使其能够在功耗和输出效率方面非常高效地执行单一任务。在 FPGA 引入后不久，一种更优化、可大规模生产且商业化的设计以 ASIC（专用集成电路）的形式出现。ASIC\
    \ 的单位成本更低，因此可以大规模生产。基于 ASIC 的设备外形也很紧凑，因此可以在单个设备中集成更多。ASIC 能够以低价位组合成阵列，这为加速挖矿效率提供了非常有说服力的理由。\n\
    *   **矿池：** 随着 ASIC 的兴起导致挖矿难度上升，矿工们意识到单独继续挖矿在经济上并不明智。挖矿耗时太长，奖励与投入的资源不匹配。因此，矿工们组织成称为矿池的团体，以整合所有成员的计算资源，作为一个整体进行挖矿。如今，加入矿池是开始挖掘几乎所有加密货币的常见方式。\n\
    *   **云挖矿服务：** 这些只是拥有专业挖矿设备的承包商。他们根据合同，以特定价格向矿工出租服务，在特定时间内进行挖矿。\n\n不难看出，在开发者和硬件爱好者意识到可以用相当低廉的价格制造自定义\
    \ ASIC 阵列后，ASIC 如何彻底改变了挖矿游戏。这标志着比特币硬件领域某种军备竞赛的开始，开发者们开始设计新的芯片，并购买新设备用于挖矿机，以便能挖到最多的比特币。这种由利润驱动的初期推动加速了比特币的普及，并为这种替代货币创造了一个黄金时代。更多的开发者和爱好者加入购买定制硬件以最大化利润的行列。随着矿工数量的增加，网络通过提高难度来应对。在很短的时间内，由于协议中存在的自我纠正特性，泡沫无法再为矿工维持，难度不断上升。在某些情况下，矿工购买的硬件甚至从工厂运达时就已经无法盈利了。需要预先投入大量资本才能获得可观的回报。如今，大多数\
    \ ASIC 硬件已成历史，甚至比特币矿池对普通矿工来说也已无利可图。那些将 ASIC 和定制硬件商业化的初创公司和企业在短时间内获得了可观的利润，然后就失败了。我们将在下一节中审视其中的一些重大失败案例。\n"
- fmt: '## Startup Stories


    In this section, we will highlight a few stories from the "gold rush" era of Bitcoin,
    which lasted from mid-2013 to late 2014. The startups covered here followed the
    strategy of selling slightly outdated mining hardware to make profits, but some
    took it a step further. The first startup we will talk about is Butterfly Labs.
    This was a company out of Missouri that came about in late 2011 with the promise
    of selling technology that was capable of mining Bitcoin leaps and bounds ahead
    of the competition. The Application-Specific Integrated Circuits (`ASICs`) were
    supposedly able to mine Bitcoin one thousand times faster than a single computer,
    and they opened up for pre-orders soon after the initial announcement in 2012.
    Miners flocked to purchase the hardware, which was promised to be delivered by
    December of the same year. Butterfly Labs collected somewhere between $20 million
    and $30 million in pre-orders, as reported by the Federal Trade Commission (`FTC`).
    The shipments started to roll out to only a few customers around April of 2013,
    but most customers did not receive their mining equipment for another year. When
    the customers did receive their machines, they were obsolete, and some accused
    Butterfly Labs of using the hardware to mine for themselves before delivering
    them. Despite being unable to follow through with their initial orders, Butterfly
    Labs began offering a new and much more powerful miner and opened pre-orders for
    it. Ultimately, the company became one of the most hated in the Bitcoin community,
    and the `FTC` had to step in to shut it down.


    The second company we will discuss is CoinTerra. This is a more complicated case
    because the startup was founded by a team that had deep expertise in the field.
    The CEO, Ravi Iyengar, had previously been a CPU architect at Samsung, and the
    company''s board had many other leaders in the field. Initially, they were venture
    backed and well funded, and in 2013 they announced their first product: TerraMiner
    IV, which was supposed to be shipped in December of the same year. The company
    could not ship the product in time and eventually pushed the date back. The miner
    still didn''t arrive in 2014, and eventually CoinTerra apologized to the customers,
    offering them some compensation, which was also largely delayed and frustrated
    the customers even further. It seems that the company is trying to pivot to cloud-mining
    services, but they''ve already lost most of the customer base''s trust.


    The last of our cases will focus on a startup called HashFast. Similar to the
    previous two examples, HashFast was offering a miner product called Baby Jet that
    would be delivered in December 2013. The team at HashFast overpromised the features
    and under-delivered in a time when the difficulty level skyrocketed. It is likely
    that the company took the cash from early adopters to fund its own development,
    and when they encountered difficulties, the customers demanded refunds for their
    orders. The problem at the time was that the price of Bitcoin was increasing steadily,
    so the company did not have enough funds to pay back the customers. They were
    facing multiple lawsuits and running out of cash reserves very fast. Eventually,
    In May 2014, a judge ruled to allow the auctioning of all assets that the company
    owned to pay back the creditors and investors.


    A common theme across these companies is that they were frequently unable to deliver
    mining hardware at the promised time and significantly delayed or refused to issue
    any refunds to their customers. We can construct a general scheme of operations
    from the cases presented here and other ASIC startups that similarly failed:


    - Open for pre-orders at very high prices and falsely advertise a ridiculously
    high hashing rate with huge return on investment.

    - Invest all the funding from pre-orders to begin R&D for `ASICs` and custom hardware.

    - Once the mining hardware has been obtained from overseas manufacturers, use
    it to mine non-stop for months internally.

    - Broadcast to customers through social media that the manufacturing process is
    taking longer than expected.

    - Deliver the hardware only to the customers that threaten to sue as early proof
    that shipments have begun rolling out.

    - Deliver the `ASIC` hardware to other customers when it is already severely out
    of date.

    - Customers complain and file lawsuits, the company eventually falls apart and
    faces huge fines.


    ## New Consensus


    We will conclude this chapter by talking about the same idea that we started this
    chapter with: consensus. This chapter''s central idea was that in Bitcoin, mining
    is used to reach consensus to prevent users from double spending and validate
    all the transactions. However, since the advent of Bitcoin, other consensus algorithms
    have been developed. We will refer to the proof-of-work algorithm referenced in
    the original Bitcoin protocol for reaching consensus as Nakamoto Consensus. A
    new consensus algorithm that has recently become popular is known as proof-of-stake,
    where the participants essentially play the role of validators. In Bitcoin, bad
    actors with fraudulent transactions have to face the rigorous approval and validation
    process from the network of miners. In proof-of-stake (`PoS`), the participants
    have a stake in the network (hence the name) in the form of currency. As such,
    they want to see the network succeed, and trust emerges in blocks that have the
    largest stake of currency invested by the validators. Additionally, the malicious
    validators will get their stake slashed for acting in bad faith. We will dive
    into the technical aspects of `PoS`, and how it compares to the mechanism of `PoW`,
    later in the book. Our journey ends in this chapter with consensus, and we will
    pick up our discussion on the Bitcoin network and the blockchain in the next chapter.


    ## Summary


    In this chapter, we talked about the concept of mining and presented the technical
    background necessary to understand how miners verify blocks. We discussed in depth
    the backbone of mining in Bitcoin, called `PoW`, and throughout the remainder
    of the book, we will present other consensus mechanisms. Then, we described the
    arms race in Bitcoin mining over producing the best hardware, which led to the
    huge rise in difficulty, and the startup failures that resulted from that time
    period. Finally, we ended the chapter with a mention of `PoS`, which we will return
    to in a later chapter.'
