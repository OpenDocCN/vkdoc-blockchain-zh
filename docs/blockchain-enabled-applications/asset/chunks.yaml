  trans: '

    # SONM（由网络挖矿组织的超级计算机）


    `SONM` 是雾计算概念在区块链上的一种去中心化实现。要理解 `SONM` 如何在雾计算框架内运作，我们首先需要定义两个网络概念：`IoT`（物联网）和
    `IoE`（万物互联）。欧盟委员会将物联网 (`IoT`) 架构定义为一个由具有 IP 地址并能通过网络传输数据的物体组成的泛在网络。`IoT` 更广泛地归属于万物互联
    (`IoE`) 这一概念，`IoE` 在现实世界和虚拟世界中的物体之间提供无缝的通信总线和上下文服务。`IoE` 被思科公司定义如下：


    > *人、流程、数据和事物的网络化连接。`IoE` 的益处源于连接人、流程、数据和事物所产生的复合效应，以及这种日益增强的连接性在“万物”在线时所创造的价值。*


    虽然 `IoT` 传统上指连接到彼此或云服务的设备，但 `IoE` 是一个更侧重于将“人”作为产生收入业务逻辑中关键组成部分的总称。从工程角度来看，`IoT`
    是专注于设备间通信的消息传递层，而 `IoE` 是允许初创公司通过人与设备之间的交互来获利的货币化层。在 `IoT` 网络中连接的设备会产生海量数据。将这些数据传输到云端进行处理需要巨大的网络带宽，并且在数据生成、处理数据以及接收结果之间存在延迟（从数小时到数天不等）。`IoT`
    技术的一个主要限制就是这种传输延迟时间。近期，人们越来越关注由于传输和处理阶段而导致的可操作数据价值的损失。当我们收到那些处理后的结果时，再对这些数据采取行动已经为时已晚。


    思科公司的 Ginny Nichols 提出的一个解决方案称为**雾计算**。雾计算通过将处理阶段转移到网络的较低层级来减少传输延迟。雾计算并非将任务卸载到集中式云端进行处理，而是将高优先级任务推送到离实际生成数据的设备最近的节点上进行处理。一个设备要参与雾计算，必须能够处理任务、拥有本地存储并具备一定的网络连接能力。雾计算这一概念是个隐喻，意指雾通常在地面附近形成。因此，雾计算将云服务扩展到了更靠近产生
    `IoT` 数据的设备（地面）的位置，以便实现更快的行动。在雾计算中，数据处理被认为集中在边缘（更靠近生成数据的设备），而不是集中在云端。这使我们能够最小化延迟，从而更快地响应时间敏感型任务，或缩短对数据采取行动所需的时间。`SONM`
    将雾计算的这一层能力提供给去中心化的参与者网络，用于处理计算密集型任务。


    **注**


    大型企业对其收集的数据（或业务分析）需要更快的响应时间，这刺激了如 `Apache Spark`、`Storm` 和 `Hadoop` 等实时计算处理工具的发展。这些工具允许在数据收集和传输的过程中对其进行预处理。同样地，雾计算似乎是
    `IoT` 的一个扩展，其发展是为了满足快速数据分类/处理的需求。


    `SONM` 构建于 `Yandex.Cocaine`（可配置全能自定义应用集成网络引擎）之上。`Cocaine` 是一个开源的 `PaaS`（平台即服务）堆栈，用于创建应用程序的自定义云托管引擎，类似于
    `Heroku`。`SONM` 拥有复杂的架构，旨在模仿以太坊的世界计算机模型。`SONM` 团队设计的这台世界计算机，其组件与传统的个人计算机类似，但有一个主要区别——这些组件连接到了一个去中心化网络。


    - **中央处理器/处理器（负载均衡器）：** 在 `SONM` 的架构中，处理器（中枢）充当负载均衡器和任务调度器。整个网络可以表示为一个中枢节点（或中枢）链，负责分发任务、从计算雾中收集结果、向矿工支付服务费用，并提供网络整体健康状态更新。每个中枢节点相当于一个处理器核心，核心（或中枢节点）的数量可以根据需要在网络上进行扩展或缩减。在个人计算机中，核心对于处理器来说是本地可访问的；然而，在
    `SONM` 中，核心本质上是去中心化的。中枢为整个网络协调任务执行提供支持。更具体地说，中枢提供了在雾计算云上处理和并行化高负载计算的能力。


    - **基本输入输出系统（区块链）：** 对于 `SONM` 来说，`BIOS`（基本输入输出系统）就是以太坊区块链。以太坊为网络共识和支付机制提供了可靠的支柱，`SONM`
    可以继承这些特性。然而，基础的以太坊实现缺乏负载均衡器，并且高昂的 Gas 费用催生了在区块链之上的替代方案，例如 `SONM`。


    - **图形处理单元：** `SONM` 的 `GPU`（图形处理单元）就是雾计算云。更具体地说，这个雾计算云由 `SONM` 网络中的矿工组成，他们将自己的计算资源提供给买家使用。


    - **连接的外设：** `SONM` 中的买家相当于外围设备。买家连接到网络并为他们使用的任何资源付费。请求被广播到区块链上，矿工选择在他们自己的机器上执行哪些请求。然后，负载均衡器决定任务的执行。


    - **硬盘：** `SONM` 中的存储将使用成熟的去中心化存储解决方案来实现，例如 `IPFS` 或 `Storj`。


    - **串行总线：** 一种通信模块，用于网络内发送方（节点）和工作机器之间的消息传递和数据传输。该串行总线基于 `Ethereum Whisper`，支持网络上的消息广播和监听功能。


    - **插件电路板：** 插件板可以被视为网络的扩展包。它允许 `SONM` 通过无缝集成兼容的网络和计算农场来扩展其处理能力。


    图 7-8 提供了世界计算机组件的可视化表示。


    ```

    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig8_HTML.jpg](img/430562_2_En_7_Fig8_HTML.jpg)

    ```


    **图 7-8** `SONM` 中实现的世界计算机

