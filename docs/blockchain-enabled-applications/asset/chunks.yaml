    \ keypair, download the appended data from an external source and locally do the\
    \ post-processing. After that, the summary reports can be appended back to the\
    \ blockchain.\n\n> **Note**  \n> Soenke Bartling and some collaborators in Heidelberg,\
    \ Germany have been working relentlessly on open-science innovation using blockchain\
    \ technology. Recently, they founded a think tank called Blockchain for Science\
    \ to accelerate the adoption of blockchain technology in open science. The interested\
