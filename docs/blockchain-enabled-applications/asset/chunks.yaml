    Without their resilience and tireless hard work, our book would be less complete.


    About the Authors About the Technical Reviewer


    # 1. Behold the Dreamers


    Anxiety is perhaps the best way to describe the attitude that dominated the minds
    of investors and the general public concerning the financial markets toward the
    end of 2008\. The 2008 financial crisis is considered by numerous economists to
    have been the worst financial crisis since the Great Depression. The years leading
    up to the crisis saw a flood of irresponsible mortgage lending and a massive systemic
    failure of financial regulation and supervision. The fallout was so immense that
    it threatened the collapse of large financial institutions, and national governments
    had to intercede to bail out the major banks. In this chapter, we will begin our
    discussion with an overview of the 2008 financial crisis and its aftermath: an
    environment where a new banking system and an alternative currency such as Bitcoin
    could thrive. Then, we will dive into the technology stack that powers Bitcoin.
    Remarkably, the components of this stack are not completely new, but have been
    integrated in a very intricate design to build a new system. Finally, we will
    end the discussion by talking about the heightened interest in blockchain, a major
    technical breakthrough that has the potential to revolutionize several industries.
    Imbolo Mbue wrote a book (Random House, 2017), which has the same name as this
    chapter, and tells the story of “dreamers” in New York City going through the
    financial crisis, and how their lives had changed as a result. This book chronicles
    the dreamers who envisioned building a more resilient financial system.


    ## Paradigm Shift


    Revolutions often look chaotic, but this one was brewing quietly, headed by an
    unknown individual(s) under the name Satoshi Nakamoto who dreamt of changing the
    financial world. Any number of parties can be blamed for the financial crisis;
    however, the common denominator was that fundamental financial and accounting
    instruments used to maintain the integrity of the entire system became too complex
    to be used efficiently. Trust, the ultimate adhesive of all financial systems,
    began to disappear in 2008\. The regulations have since changed to not allow similar
    circumstances to arise; however, it was clear that there was a dire need for auto-regulation
    of trust between counterparties and transparency into their ability to enter into
    any type of sales contract. A **counterparty** is essentially the other party
    in a financial transaction. In other words, it’s the buyer matched to a seller.
    In financial transactions, one of the many risks involved is called **counterparty
    risk** —the risk that the *other* party involved in a contract may not be able
    to fulfill its side of the agreement. The systemic failure referenced earlier
    can now be understood in terms of counterparty risk: both parties in the transaction
    were accumulating massive counterparty risk, and in the end, both parties collapsed
    under the terms of the contract. Imagine a similar transaction scenario involving
    multiple parties, and now imagine that every single player in this scenario is
    a major financial institution, a bank or an insurance company that further holds
    millions of customers. This is what happened during the 2008 crisis.


    The next issue we need to discuss is that of **double spending** . We will revisit
    this topic again strictly in the context of Bitcoin, but let’s get a basic understanding
    of the concept by applying it to the financial crisis. The principle behind double
    spending is that resources committed to one transaction cannot be simultaneously
    allocated to a second disparate transaction. This concept has obvious implications
    for digital currencies; however, it can also summarize the central set of problems
    during the 2008 crisis.


    Here’s how it started: Loans (in the form of mortgages) were given out to borrowers
    with poor credit histories, who struggled to repay them. These high-risk mortgages
    were sold to financial experts at the big banks, who packaged them into low-risk
    public stocks by putting large numbers of them together in pools. This type of
    pooling would work when the risks associated with each loan (mortgage) are not
    correlated. The experts at big banks hypothesized that property values in different
    cities across the country would change independently, and therefore pooling was
    not risky. This proved to be a massive mistake. The pooled mortgage packages were
    then used to purchase a type of stock called collateralized debt obligations (CDOs).
    The CDOs were divided into tiers and sold to investors. The tiers were ranked
    and rated by financial standards agencies, and investors bought the safest tiers
    based on those ratings. Once the housing market in the United States turned, it
    set off a domino effect, destroying everything in the way. The CDOs turned out
    to be worthless, despite the ratings. The pooled mortgages collapsed in value,
    and all the packages being sold around instantly vaporized. Throughout this complex
    string of transactions, every sale increased the risk and incurred double spending
    at multiple levels. Eventually, the system equilibrated, only to find massive
    gaps, and collapsed under the weight. Following is a brief history of 2008\. This
    timeline was made following a presentation by Micah Winkelspech at Distributed
    Health, 2016:


    *   January 11: Bank of America buys the struggling Countrywide


    *   March 16: Fed forces the sale of Bear Stearns


    *   September 15: Lehman Brothers files for Chapter [11](#430562_2_En_11_Chapter.xhtml)
    bankruptcy


    *   September 16: Fed bails out American International Group (AIG) for $85B'
