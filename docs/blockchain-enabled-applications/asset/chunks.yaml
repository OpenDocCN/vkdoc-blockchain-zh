  raw: '### Summary


    This chapter started with a broad description of the reproducibility problem and
    its serious economic consequences in evidence-based sciences. Then, we moved into
    discussing the current solutions and their shortcomings in the science community.
    After that, we described the idea of building reputation systems using blockchain
    and covered three use cases: clinical trials, reputation networks, and finally
    pharmaceutical tracking of drugs from the point of manufacturing. All the use
    cases highlighted the strengths of blockchain in tracking and accountability,
    as opposed to traditional methods.


    # 9. Blockchain in Healthcare


    The healthcare sector is a $3 trillion industry, and about $1 trillion of it goes
    to waste annually. Care coordination is becoming more complex as chronic conditions
    in the aging population continue to rise. In many instances, the technology available
    to healthcare providers is not adequate to capture all aspects of the care being
    provided. The result is a rugged transfer of information between parties that
    ultimately reduces the quality of care being provided to patients. This is largely
    due to providers’ having legacy systems, lack of integration with non-vendor-specific
    technologies, paper-based medical records, and a lack of horizontal transfer between
    allied healthcare professions. Hospitals are investing a considerable amount of
    resources into duplicating work that can be completed by a sophisticated technology
    infrastructure and amplifying the inefficiency of using poorly designed systems.
    In this use case, we discuss the payer–provider–patient model in the context of
    the incentives and services each provides and how this model is likely to change
    in the near future. We then introduce how blockchain can integrate into tracking
    the workflow of a patient from the first visit to the final diagnosis and treatment
    plan. We introduce two new features that blockchain integration can enable: hot
    switching of components and medical data curation. Then, we present a use case
    of physician credentialing using the blockchain. Finally, we conclude by discussing
    waste management in healthcare and efforts by Capital One + Gem to increase the
    economic output.


    ## Outlook


    How should a reader approach this chapter? The following are some learning objectives
    to keep in mind:


    *   What is the payer–provider–patient framework? How does it apply to the modern
    healthcare system? How do claims move within the framework? We will return to
    claims processing on blockchain later in the chapter.


    *   Can we design the concept of a patient workflow based on the blockchain that
    documents the transition of a patient from her primary care physician, to lab
    work, and finally to a specialist?


    *   How does the patient workflow demonstrate handling permissions and access
    controls?


    *   What is hot switching? Why is it necessary? What implementations of hot switching
    are available?


    *   What is physician credentialing and how does it work on the blockchain?


    *   What are the current economic costs and sources of waste in healthcare claims
    processing for providers? Can the blockchain reduce these economic inefficiencies
    and streamline business processes? Can claims be processed on the same blockchain
    that handles medical records? Can the lessons learned from blockchain-enabled
    claims processing in healthcare get applied to related verticals?


    *   How does DeepMind’s Verifiable Data Audit compare to the blockchain for auditing
    and records processing?


    ## Payer–Provider–Patient Model


    The payer–provider–patient model is a standard model of interaction between the
    three major players in healthcare. Figure [9-1](#430562_2_En_9_Chapter.xhtml#Fig1)
    shows these interactions visually, and in this section, we will elaborate on the
    incentives and benefits for these three players. For the sake of simplicity, let’s
    assume that the payers are largely insurance companies, the providers are hospital
    systems or private clinics, and patients are a randomized sample served by a given
    insurance company. Now, we can start to consider the different scenarios involving
    this model:


    ![../images/430562_2_En_9_Chapter/430562_2_En_9_Fig1_HTML.jpg](images/430562_2_En_9_Chapter/430562_2_En_9_Fig1_HTML.jpg)


    Figure 9-1


    A simplified overview of the payers–providers–patients model


    *   The first scenario is the simplest one: the patient directly pays for procedures
    and visits to the hospital. This straightforward system involving just two players
    is still the norm for numerous healthcare systems in different countries. In the
    United States, the cost of providing healthcare has increased significantly, so
    a new player emerged within the system.


    *   The second scenario is the current implementation across the United States.
    The patients are provided health coverage after buying a premium from an insurance
    company. This company then gets more negotiating power to set viable prices for
    procedures, and then pays for them on behalf of the patients. The providers now
    send the claims for payment to the insurance companies, instead of the patients
    directly. In this manner, the insurance companies have evolved to become a centralized
    portal for patients to remove friction out of the system and receive personalized
    healthcare.


    *   The third scenario is more about the future of healthcare with the integration
    of new providers that are specialized entities for administering care through
    telehealth, off-site monitoring, and remote physicians.


    The simplest case is the patient directly paying for services to the hospital.
    But more complicated medical procedures and lab tests require some coverage that
    the patient purchases from an insurance company. Now the insurance company pays
    on behalf of the patient for any medical bills. The provider also sends claims
    for payments directly to the insurance, instead of the patient. This model is
    foundational to understanding the immense complexity present in the healthcare
    system today, which involves hundreds of other players. For instance, the domain
    in which insurance companies and hospitals can operate with respect to patients
    is largely regulated by governmental agencies. These agencies are in turn influenced
    by economic forces and consumer demand.


    Tip


    Chris Kay (Humana’s CIO) delivered the keynote address at Distributed: Health
    in 2016 discussing Humana’s efforts toward adopting blockchain to reduce processing
    costs in healthcare and provide personalized care more efficiently to their members.
    He spoke about a potential path of evolution for the second scenario just mentioned
    wherein the blockchain can power the flow of payments between providers and payers
    seamlessly and drive accountability toward outcomes, not just procedures. Shifting
    the locus of control into the hands of the patient allows them to receive better
    care and satisfaction, without any increase in friction or overhead costs using
    the blockchain.


    The rationale behind claims processing on the blockchain is to use features such
    as decentralized consensus, trustless transactions, and network verification to
    design workflows that reduce overhead costs and time. Let’s take a look at a patient
    visit workflow involving the use of blockchain.'
