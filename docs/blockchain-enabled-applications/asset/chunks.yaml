- fmt: '# Wallet View and MetaMask Setup


    The wallet view is presented in Figure [5-4](#430562_2_En_5_Chapter.xhtml#Fig4).
    Let’s quickly review the information presented here. Note that the first change
    we made was switching to the Ethereum test net, specifically Rinkeby (5). This
    test net is compatible with Aragon, and we will be doing all our transactions
    here, instead of on the Ethereum main net. Once you feel comfortable with using
    Aragon, you can switch over to the main net. (6) shows you the account that you
    are currently using. MetaMask allows a user to hold multiple accounts (addresses)
    in the same wallet. As such, the current account address is given by (7), and
    this is the account in use. Next is the current balance for this current account,
    given by (8). The wallet software offers two basic functions (9), including sending
    ETH to another address and depositing ETH into the wallet through a direct deposit
    from an exchange or from a test faucet that we will be using. Finally, a history
    of all transactions made through the wallet is presented in (10).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig4_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig4_HTML.jpg)


    **Figure 5-4** – MetaMask wallet main screen


    Now that we have MetaMask set up, let’s talk about interfacing it with Aragon
    on the Ethereum test net. You can access the Rinkeby test net at [`https://rinkeby.aragon.org/`](https://rinkeby.aragon.org/);
    this will be our interface for building a DAO. The interface is shown in Figure
    [5-5](#430562_2_En_5_Chapter.xhtml#Fig5), where (11) confirms that we are on the
    test net and allows us to switch to the Ethereum main net. (12) starts the process
    of creating your DAO, but before we do that, let’s link our account.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig5_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig5_HTML.jpg)


    **Figure 5-5** – Interfacing with Ethereum test net


    On the right upper-corner of the screen, you will see a `Connect account` button;
    clicking on it will reveal four options, as shown in Figure [5-6](#430562_2_En_5_Chapter.xhtml#Fig6).
    `Frame` is a desktop-native Ethereum provider that allows for multiple different
    wallets to interact with the DAO (including hardware wallets). `Fortmatic` and
    `Portis` are services providing electronic Ethereum wallets with direct exchange
    (to buy Ethereum with Fiat) options available.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig6_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig6_HTML.jpg)


    **Figure 5-6** – Connecting MetaMask account to Aragon


    Once you click on `MetaMask`, you will be asked for permission to connect the
    wallet to Aragon, as shown in Figure [5-7](#430562_2_En_5_Chapter.xhtml#Fig7).
    After accepting the permission, the right-hand side of the screen should show
    the wallet address and green text reading `Connected to Rinkeby`.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig7_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig7_HTML.jpg)


    **Figure 5-7** – Connecting Aragon and MetaMask wallet


    Once the wallet is connected to Aragon, we need to obtain some test ETH for setting
    up a DAO. Even on a test net, actions such as signing contracts at every step
    of setting up a DAO will cost gas to carry out. As a result, we can use a faucet
    to send some test ETH that have no real value but can be used for our purposes.
    The faucet we will be using can only send ETH every 24 hours and sends a maximum
    of 0.2 ETH per use, linked here: [`https://testnet.help/en/ethfaucet/rinkeby`](https://testnet.help/en/ethfaucet/rinkeby).
    There are more official faucets available, but this one does not require extensive
    social media verification. The faucet screen is shown in Figure [5-8](#430562_2_En_5_Chapter.xhtml#Fig8).
    The address for your MetaMask wallet goes in (13), and the amount is optional
    (14) because the faucet will only dispense a maximum of 0.2 ETH. You can add a
    message to your transaction, which will be visible on the test net blockchain
    explorer. You do need to pick a reason for using the faucet; select any of the
    presented reasons in (15) and accept the conditions (16). Once done, solve the
    captcha (17) and hit the `Claim` button to have 0.2 ETH dispensed to your MetaMask
    wallet.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig8_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig8_HTML.jpg)


    **Figure 5-8** – Rinkeby test net faucet


    Now that the faucet is connected to the wallet, and you have some initial funds,
    you can start with the DAO. You may want to visit the faucet another day to get
    enough ETH to explore other DAO features/templates.'
