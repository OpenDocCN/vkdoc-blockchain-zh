  trans: '

    # 使用 Hyperledger Composer 进行快速原型设计


    Hyperledger Composer 是一套用于建模业务的高级应用抽象层。当你确定自己的业务可能受益于使用区块链时，可以利用 Composer 为应用创建一个基于区块链的原型。以下是制作原型所涉及流程的概要：


    -   安装 Hyperledger Composer 工具，或在在线游乐场中试用 Composer。

    -   定义业务网络、资产和交易。

    -   实现所有交易处理器。

    -   在 Composer-UI 中测试业务网络。

    -   将业务网络部署到实时的 Hyperledger Fabric 区块链实例上。

    -   在底层抽象之上创建一个示例应用。

    -   通过 RESTful API 或 Node.js 将其他应用连接到该部署。


    Composer 的功能性输出称为业务网络存档（`BNA`），它可以部署到测试网络或实时的 Fabric 区块链上。一个业务网络包含以下要素：通过角色/身份连接起来的参与者、在网络中传播的资产、描述资产交换的交易、作为交易支撑规则的合约，以及最终记录所有交易的账本。除了对业务网络的组件进行建模外，`BNA`
    还包含交易处理器、访问控制列表和查询定义。交易处理器（用 JavaScript 编写）在这些模型元素上实现并执行业务逻辑。访问控制列表描述了规则，允许对参与者在满足特定条件后能访问业务网络中的哪些资产进行精细控制。用于描述这些访问列表的语言非常精密，能够捕获复杂的所有权声明。将访问控制与交易处理器逻辑分开，使开发人员能够快速维护和更新这两个组件，而无需担心兼容性或功能中断问题。


    **注意**


    在本节中，我们的重点是介绍 Hyperledger Composer 的基础知识，以便感兴趣的读者能够更快地从参考资料中掌握 Composer 的建模语言。设计一个完整的业务网络模型超出了本书的范围。


    让我们深入了解建模语言，并深入讨论 Composer 的基础：


    -   **资产：** 代表网络上用户之间交换的资源。形式上，用于定义资产的描述方案遵循 `关键字 - 类 - 标识符 - 属性 - 关系` 的顺序。这里也可以添加其他可选字段，但在整个建模语言中都遵循此通用方案。资产用
    `asset` 关键字定义，并带有一个与之关联的、与领域相关的类名。例如，一辆汽车可以通过 VIN 标识为：`asset Vehicle identified
    by vin`。资产拥有一组定义它们的属性；对于车辆来说，它可以是一个存储为 `String String` 类型的描述。此外，资产可以与其他建模语言中的资源建立关系，例如拥有汽车的用户，表示为
    `--> User owner`。所有资产都存储在可供网络访问的资产注册表中。


    -   **参与者：** 代表网络中的用户（或交易对手）。参与者对于网络上的所有交互都至关重要，它们的描述方式与资产相同。参与者使用 `participant`
    关键字表示，并且它们也有一个与其领域相关的类名，例如买方或卖方。完整的描述可以表示为 `participant Buyer identified by email`
    以及属性 `String firstName`。所有参与者都存储在参与者注册表中，该注册表可能不对网络用户开放。


    -   **交易：** 代表资产在网络上的移动，以及资产在被交换过程中的生命周期。交易以与参与者或资产相同的方式描述，来自参与者的销售报价可以定义为 `transaction
    Offer identified by transactionid`，并带有属性 `Double saleprice`。


    -   **概念：** 概念是不属于资产、参与者或交易的抽象类。概念通常用于为资产或交易添加限定符，并且通常被三者中的某一个所包含。例如，地址的概念可以描述为
    `Concept Address`，带有属性 `String street` 和 `String city_default ="Orlando"`。现在，一个资产可以使用此概念来指定地址属性。


    -   **交易处理器：** 代表执行业务逻辑，以便在交易广播到网络时对区块链进行状态变更和全局更新。本质上，这些处理器为交易提供了对模型进行操作的实现。它们被编写在单独的
    js 文件中，并利用业务网络模型中的定义。


    这些组件在图 10-6 中以图形方式展示。


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig6_HTML.jpg](img/430562_2_En_10_Fig6_HTML.jpg)


    **图 10-6** 业务网络存档的组成部分


    ## 总结


    在本章中，我们研究了与区块链研究和开发相关的三个不同领域：使用精益创业方法论，将高风险的研发理念转化为客户想要的产品；如何判断你的组织是否需要区块链；以及
    Hyperledger 项目概述——一个构建企业级区块链的开源项目。我们将精益方法论分解为亚历山大·奥斯特瓦德提出的商业模式画布和杰弗里·摩尔提出的产品-市场契合鸿沟模型。这些模型帮助我们更好地理解如何设计产品以占领市场。接着，我们提出了三个模型来判断你的项目或公司是否能从使用区块链中受益，以及如何决定部署类型。最后，我们简要回顾了
    Hyperledger 项目，该项目提供了高度可定制的区块链实现，能够将业务逻辑捕获到模板中。我们希望读者能从本章中获得实用且可应用的技巧，以推动自己创意的实现。

    '
- fmt: '# 11. Blockchain 3.0


    The rapid growth of R&D in the blockchain world can be explained by the industry''s
    gaining a deeper understanding of where the value is created and captured for
    a traditional internet company and a blockchain company. Joel Monegro and Naval
    Ravikant, both venture capitalists and investors in blockchain technology, talk
    about the idea of fat protocols, where most of the innovation in the blockchain
    space will happen at the core technology level. Then a token layer can monetize
    the use of the underlying architecture and provide access to the application layer.
    To that end, we have seen three iterations of blockchains in development: the
    first version was the original protocol by Satoshi that provides a functional
    blockchain for transactions. The second version was protocols like Ethereum that
    provide smart contracts and on-chain operations. The next generation of blockchain
    protocols allow on-chain execution and the integration of services such as machine
    learning onto a blockchain for advanced tasks.


    In this chapter, we will focus on three new technologies that have significantly
    advanced our understanding of blockchain-enabled applications and opened up several
    new avenues for research. We begin our discussion with `EOS`, an Ethereum competitor
    built with an operating system–inspired architecture and platform-support design
    philosophy. It uses a new consensus mechanism called Delegated Proof-of-Stake
    to enable rapid transaction verification and a continuous cycle of voting for
    delegates that support the network. The message-passing protocols implemented
    in `EOS` are very advanced, allowing automated response handlers and action triggers
    on message delivery, and they make up most of the smart-contract system. There
    is also support for parallel lockless execution of smart-contract instructions
    across the network, massively reducing latency in communication and state updates.


    The second technology we present is a contract-oriented programming language called
    `Chain-core`. `Chain` is no longer in active development; however, we want to
    illustrate the potential of blockchain-agnostic contract-oriented programming
    in asset management. On the `Chain` network, all value is concentrated within
    assets that can be issued and controlled by users. `Chain` provides a powerful
    API (and a graphical user interface) to developers for managing and transferring
    those assets on the blockchain. We provide a walkthrough of `Chain`''s graphical
    interface and cover the basics of asset management.


    The final technology that we will talk about is enterprise Ethereum. This section
    will focus on three main contributors: `Quorum` (an enterprise-grade fork of Ethereum
    built by JPMorgan), Ethereum Enterprise Alliance (a set of specifications and
    standards to build enterprise applications), and `R3` (a consortium behind the
    blockchain deployment tool `Corda`). This technology set is designed to handle
    the high-volume requirements of businesses and offers some unique upgrades. The
    most notable features include private transactions and smart contracts, zero-knowledge
    proofs, and pluggable consensus.


    ## EOS Blockchain


    `EOS.IO` is a new architectural approach to building a blockchain that resembles
    an operating system. The design considerations allow for core infrastructure that
    can be scaled with ease for decentralized applications. Here, scalability refers
    more generally to a set of principles that make blockchain applications analogous
    to their traditional non-blockchain counterparts. In this section, we will focus
    on the potential for large-scale adoption made possible due to three major technical
    innovations behind `EOS`: an advanced permissions system, a new method for consensus
    called Delegated Proof-of-Stake, and parallel processing in the `EOS` blockchain.
    Let''s begin our discussion with a few principles of scalability embodied by `EOS`:


    * **User base:** A disruptive `EOS` blockchain application should be able to support
    millions of users and user accounts. The underlying architecture needs to be designed
    such that a distributed ledger can handle accounts as the fundamental unit (as
    opposed to transactions). Supporting services can provide synchronous modification
    of accounts and the blockchain global state.


    * **Free access:** The services or applications built on a blockchain should not
    pass on any execution costs to the users. Large non-blockchain services are essentially
    free, and the end user is monetized based on data generated from app utilization.
    To enable widespread adoption, blockchain-based apps would have to eliminate user
    fees, amortize service costs, and generate revenue from new accounts signing up
    for the app.


    * **Updates and forks:** The integration of new components or features to a service
    should not require any downtime. Blockchain-based services have to deal with consensus
    at some level, and disagreements may lead to forks in the chain. These forks create
    chains with different lengths and are normally resolved very rapidly with the
    creation of the next block; however, the more serious problems arise with software
    updates. Bugs in the network should be fixed easily and seamlessly, without the
    need for a type of hard fork whereby some portion of the network is no longer
    compatible. The decentralized nature of blockchain services creates a network
    without a single point of failure and, combined with redundancy, it can provide
    a unique no-downtime experience.


    * **Low latency:** The Bitcoin blockchain currently suffers from high latency
    and incredibly long verification delays. A pragmatic service used by thousands
    of users is unsustainable with long wait periods; therefore, services on `EOS`
    must provide an incredibly rapid verification and confirmation method where applicable.
    There are some interesting new features such as parallel processing that may alleviate
    the pains of slow confirmations on transactions.'
  raw: '# 11. Blockchain 3.0


    The rapid growth of R&D in the blockchain world can be explained by the industry’s
    gaining a deeper understanding of where the value is created and captured for
    a traditional internet company and a blockchain company. Joel Monegro and Naval
    Ravikant, both venture capitalists and investors in blockchain technology, talk
    about the idea of fat protocols, where most of the innovation in the blockchain
    space will happen at the core technology level. Then a token layer can monetize
    the use of the underlying architecture and provide access to the application layer.
    To that end, we have seen three iterations of blockchains in development: the
    first version was the original protocol by Satoshi that provides a functional
    blockchain for transactions. The second version was protocols like Ethereum that
    provide smart contracts and on-chain operations. The next generation of blockchain
    protocols allow on-chain execution and the integration of services such as machine
    learning onto a blockchain for advanced tasks.


    In this chapter, we will focus on three new technologies that have significantly
    advanced our understanding of blockchain-enabled applications and opened up several
    new avenues for research. We begin our discussion with EOS, an Ethereum competitor
    built with an operating system–inspired architecture and platform-support design
    philosophy. It uses a new consensus mechanism called Delegated Proof-of-Stake
    to enable rapid transaction verification and a continuous cycle of voting for
    delegates that support the network. The message-passing protocols implemented
    in EOS are very advanced, allowing automated response handlers and action triggers
    on message delivery, and they make up most of the smart-contract system. There
    is also support for parallel lockless execution of smart-contract instructions
    across the network, massively reducing latency in communication and state updates.


    The second technology we present is a contract-oriented programming language called
    Chain-core. Chain is no longer in active development; however, we want to illustrate
    the potential of blockchain-agnostic contract-oriented programming in asset management.
    On the Chain network, all value is concentrated within assets that can be issued
    and controlled by users. Chain provides a powerful API (and a graphical user interface)
    to developers for managing and transferring those assets on the blockchain. We
    provide a walkthrough of Chain’s graphical interface and cover the basics of asset
    management.


    The final technology that we will talk about is enterprise Ethereum. This section
    will focus on three main contributors: Quorum (an enterprise-grade fork of Ethereum
    built by JPMorgan), Ethereum Enterprise Alliance (a set of specifications and
    standards to build enterprise applications), and R3 (a consortium behind the blockchain
    deployment tool Corda). This technology set is designed to handle the high-volume
    requirements of businesses and offers some unique upgrades. The most notable features
    include private transactions and smart contracts, zero-knowledge proofs, and pluggable
    consensus.


    ## EOS Blockchain


    EOS.IO is a new architectural approach to building a blockchain that resembles
    an operating system. The design considerations allow for core infrastructure that
    can be scaled with ease for decentralized applications. Here, scalability refers
    more generally to a set of principles that make blockchain applications analogous
    to their traditional non-blockchain counterparts. In this section, we will focus
    on the potential for large-scale adoption made possible due to three major technical
    innovations behind EOS: an advanced permissions system, a new method for consensus
    called Delegated Proof-of-Stake, and parallel processing in the EOS blockchain.
    Let’s begin our discussion with a few principles of scalability embodied by EOS:


    *   **User base:** A disruptive EOS blockchain application should be able to support
    millions of users and user accounts. The underlying architecture needs to be designed
    such that a distributed ledger can handle accounts as the fundamental unit (as
    opposed to transactions). Supporting services can provide synchronous modification
    of accounts and the blockchain global state.


    *   **Free access:** The services or applications built on a blockchain should
    not pass on any execution costs to the users. Large non-blockchain services are
    essentially free, and the end user is monetized based on data generated from app
    utilization. To enable widespread adoption, blockchain-based apps would have to
    eliminate user fees, amortize service costs, and generate revenue from new accounts
    signing up for the app.


    *   **Updates and forks:** The integration of new components or features to a
    service should not require any downtime. Blockchain-based services have to deal
    with consensus at some level, and disagreements may lead to forks in the chain.
    These forks create chains with different lengths and are normally resolved very
    rapidly with the creation of the next block; however, the more serious problems
    arise with software updates. Bugs in the network should be fixed easily and seamlessly,
    without the need for a type of hard fork whereby some portion of the network is
    no longer compatible. The decentralized nature of blockchain services creates
    a network without a single point of failure and, combined with redundancy, it
    can provide a unique no-downtime experience.


    *   **Low latency:** The Bitcoin blockchain currently suffers from high latency
    and incredibly long verification delays. A pragmatic service used by thousands
    of users is unsustainable with long wait periods; therefore, services on EOS must
    provide an incredibly rapid verification and confirmation method where applicable.
    There are some interesting new features such as parallel processing that may alleviate
    the pains of slow confirmations on transactions.'
  trans: '

    # 11. 区块链 3.0


    区块链领域研发的快速增长，可以解释为业界对传统互联网公司与区块链公司价值创造与获取方式有了更深入的理解。风险投资家及区块链技术投资人乔尔·莫内格罗（Joel
    Monegro）与纳瓦尔·拉维康特（Naval Ravikant）提出了"胖协议"的概念，认为区块链领域的大部分创新将发生在核心技术层。随后，代币层可以将底层架构的使用货币化，并为应用层提供访问权限。为此，我们见证了区块链发展的三代迭代：第一版是中本聪的原始协议，提供了用于交易的功能性区块链；第二版是以太坊等协议，提供了智能合约与链上操作；而下一代区块链协议则支持链上执行，并可将机器学习等服务集成到区块链中以完成高级任务。


    在本章中，我们将重点介绍三项新技术，它们显著加深了我们对区块链赋能应用的理解，并为研究开辟了多条新途径。我们首先讨论`EOS`，这是一个以太坊的竞争对手，其架构灵感源于操作系统，并采用平台支持设计理念。它使用名为委托权益证明的新共识机制，实现快速交易验证，并对支持网络的代表进行持续投票循环。`EOS`中实现的消息传递协议非常先进，允许在消息传递时自动触发响应处理程序和操作，并构成了智能合约系统的大部分功能。此外，系统还支持网络范围内智能合约指令的并行无锁执行，大幅降低了通信和状态更新中的延迟。


    我们介绍的第二项技术是一种面向合约的编程语言，名为`Chain-core`。`Chain`目前已不再活跃开发；但我们希望借此说明与区块链无关的面向合约编程在资产管理中的潜力。在`Chain`网络中，所有价值都集中在可由用户发行和控制的资产上。`Chain`为开发者提供了强大的
    API（及图形用户界面），用于在区块链上管理和转移这些资产。我们将逐步讲解`Chain`的图形界面，并涵盖资产管理的基础知识。


    我们将讨论的最后一项技术是企业级以太坊。本节将聚焦三个主要贡献者：`Quorum`（摩根大通构建的企业级以太坊分叉）、以太坊企业联盟（一套用于构建企业应用的规范与标准）以及`R3`（区块链部署工具`Corda`背后的联盟）。该技术集旨在满足企业的高吞吐量需求，并提供了一些独特的升级。最引人注目的功能包括私有交易与智能合约、零知识证明以及可插拔的共识机制。


    ## EOS 区块链


    `EOS.IO`是一种类似操作系统的新型区块链架构方案。其设计考量使核心基础设施能够轻松扩展，以支持去中心化应用。这里的可扩展性更广泛地指代一系列原则，使区块链应用与传统非区块链应用具有相似性。在本节中，我们将重点关注`EOS`三大技术创新所带来的大规模应用潜力：先进的权限系统、名为委托权益证明的新共识方法，以及`EOS`区块链中的并行处理能力。让我们从`EOS`所体现的几个可扩展性原则开始讨论：


    *   **用户规模：** 一个突破性的`EOS`区块链应用应能支持数百万用户和用户账户。底层架构需要设计为分布式账本能将账户视为基本单元（而非交易）。支持服务可提供账户与区块链全局状态的同步修改。


    *   **免费访问：** 基于区块链构建的服务或应用不应将任何执行成本转嫁给用户。大型非区块链服务本质上是免费的，最终用户通过应用使用产生的数据实现货币化。为实现广泛采用，基于区块链的应用必须消除用户费用，分摊服务成本，并通过新用户注册应用来产生收入。


    *   **更新与分叉：** 向服务集成新组件或功能不应导致任何停机。基于区块链的服务在某种程度上必须处理共识问题，分歧可能导致链分叉。这些分叉会产生不同长度的链，通常随着下一个区块的生成而迅速解决；然而，更严重的问题出现在软件更新时。网络中的漏洞应能轻松无缝地修复，无需进行任何会导致部分网络不兼容的硬分叉。区块链服务的去中心化特性创建了一个无单点故障的网络，结合冗余机制，可以提供独特的无停机体验。


    *   **低延迟：** 比特币区块链目前存在高延迟和验证延迟过长的问题。一个为数千用户服务的实用系统难以承受漫长的等待时间；因此，`EOS`上的服务必须在适用场景提供极其快速的验证和确认方法。一些有趣的新特性（如并行处理）可能会缓解交易确认缓慢的痛点。

    '
- fmt: "Let’s start with how EOS handles accounts and user permissions. In EOS, all\
    \ the accounts can be created with unique human-readable references. Additionally,\
    \ EOS provides a well-defined message-passing protocol between accounts with handlers\
    \ and automation rules. Every account on the network can send structured programmatic\
    \ messages to other accounts and define rules and scripts to handle incoming messages\
    \ when received. The scripts used to handle messages can also send messages in\
    \ response to a specific incoming action. Each account also has a private storage\
    \ that can be accessed by the message handlers to modify the account state. The\
    \ message-handling scripts along with rules form the smart-contract system deployed\
    \ by EOS. The design principles behind EOS smart contracts are analogous to well-studied\
    \ message-passing protocols describing how an operating system communicates with\
    \ peripherals and other hardware components. The contracts will be executed on\
    \ a virtual machine similar to an EVM. Existing smart contracts written in Solidity\
    \ or other contract-oriented languages can be ported and adapted to work with\
    \ a container on the EOS blockchain. The contracts will also inherit some EOS-specific\
    \ functions that allow communication with other EOS components.\n\n> **Note**\
    \  \n> Another advanced feature in EOS is the ability to communicate between the\
    \ EOS blockchain and external blockchains compatible with Merkel proofs. This\
    \ takes place on the client side by using the same fundamental cryptographic principles\
    \ (proof of message existence and proof of message sequence) to verify messages\
    \ transferring in/out of the blockchains.\n\nLet’s return to understanding how\
    \ user permissions work. In EOS, the application structure is such that the authentication\
    \ and permission modules are kept separate from the business logic. This allows\
    \ developers to design tools specific for permission management and streamline\
    \ apps to only contain code relevant to app-directed actions. EOS allows the user\
    \ to define the keys used to sign outgoing messages and the different keys used\
    \ for each separate service accessed by the user. For instance, a user can have\
    \ one key to sign messages sent to other users and a different key to access social\
    \ media accounts. It is possible to provide other accounts with permission to\
    \ act on a user’s behalf, without assigning any keys. This type of limited access\
    \ can give someone post-only permissions to your social media (with prior permission),\
    \ but the posts will retain their unique signature. This is accomplished by a\
    \ concept called permission mapping, which we will discuss next. A key idea in\
    \ permission mapping is multi-user control of a single account. This is considered\
    \ a high-level security measure for decentralized apps, and in EOS it is implemented\
    \ to reduce the risk of password or currency theft.\n\n> **Note**  \n> EOS can\
    \ be considered a generalized evolution of the blockchain-based social network\
    \ Steem created by Dan Larimer. Steem was built on the Graphene blockchain, and\
    \ permission mapping was originally implemented as a feature, but it was very\
    \ limited. While Steem was designed as a decentralized social platform, EOS is\
    \ an application development platform with a Turing-complete blockchain analogous\
    \ to Ethereum.\n\nTo understand permission mapping, let’s look at an example involving\
    \ three user roles: the account owner, an active user, and a social media user.\
    \ The social media permission allows only specific actions by the user, such as\
    \ voting and posting. On the other hand, active user permission allows almost\
    \ any action except for removing the owner. The owner can perform all available\
    \ actions, including withdrawal. In this example, permission mapping refers to\
    \ an account owner’s defining roles and mapping the associated permissions to\
    \ other accounts. EOS generalizes this example by allowing custom roles and custom\
    \ actions that can be mapped to different accounts. For instance, an account holder\
    \ can map the permissions for a social media app to a Friend user group. Now any\
    \ account added to the permission group (by the account holder) instantly has\
    \ access to the social media app. They can post, vote, and perform any other actions\
    \ available to the permission group, but their unique keys will be recorded. Therefore,\
    \ it is always be possible to identify which user performed an action. The concept\
    \ of permission mapping is illustrated in Figure [11-1](#430562_2_En_11_Chapter.xhtml#Fig1).\n\
    \n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig1_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig1_HTML.jpg)\n\
    \n**Figure 11-1** – Structure of custom permission mapping\n\nIn Figure [11-1](#430562_2_En_11_Chapter.xhtml#Fig1),\
    \ we can divide this representation into two components: the ownership and the\
    \ message itself. The ownership portion contains keys from the account holder,\
    \ who can perform all account functions including withdrawal of tokens. It also\
    \ contains keys from active users that act on behalf of the owner. The second\
    \ portion of this structure is the message, and here we continue to use an example\
    \ of social media. There are three social users mapped to this account by the\
    \ owner, and each user has a unique key. When a message is posted to the social\
    \ media, the posting user signs the message with their own unique key, so any\
    \ actions performed by the mapped users can be tracked. The message module here\
    \ can be replaced by other applications, with the account holder mapping custom\
    \ permissions to the app, providing limited functionality to the mapped users."
  raw: 'Let’s start with how EOS handles accounts and user permissions. In EOS, all
    the accounts can be created with unique human-readable references. Additionally,
    EOS provides a well-defined message-passing protocol between accounts with handlers
    and automation rules. Every account on the network can send structured programmatic
    messages to other accounts and define rules and scripts to handle incoming messages
    when received. The scripts used to handle messages can also send messages in response
    to a specific incoming action. Each account also has a private storage that can
    be accessed by the message handlers to modify the account state. The message-handling
    scripts along with rules form the smart-contract system deployed by EOS. The design
    principles behind EOS smart contracts are analogous to well-studied message-passing
    protocols describing how an operating system communicates with peripherals and
    other hardware components. The contracts will be executed on a virtual machine
    similar to an EVM. Existing smart contracts written in Solidity or other contract-oriented
    languages can be ported and adapted to work with a container on the EOS blockchain.
    The contracts will also inherit some EOS-specific functions that allow communication
    with other EOS components.


    Note


    Another advanced feature in EOS is the ability to communicate between the EOS
    blockchain and external blockchains compatible with Merkel proofs. This takes
    place on the client side by using the same fundamental cryptographic principles
    (proof of message existence and proof of message sequence) to verify messages
    transferring in/out of the blockchains.


    Let’s return to understanding how user permissions work. In EOS, the application
    structure is such that the authentication and permission modules are kept separate
    from the business logic. This allows developers to design tools specific for permission
    management and streamline apps to only contain code relevant to app-directed actions.
    EOS allows the user to define the keys used to sign outgoing messages and the
    different keys used for each separate service accessed by the user. For instance,
    a user can have one key to sign messages sent to other users and a different key
    to access social media accounts. It is possible to provide other accounts with
    permission to act on a user’s behalf, without assigning any keys. This type of
    limited access can give someone post-only permissions to your social media (with
    prior permission), but the posts will retain their unique signature. This is accomplished
    by a concept called permission mapping , which we will discuss next. A key idea
    in permission mapping is multi-user control of a single account. This is considered
    a high-level security measure for decentralized apps, and in EOS it is implemented
    to reduce the risk of password or currency theft.


    Note


    EOS can be considered a generalized evolution of the blockchain-based social network
    Steem created by Dan Larimer. Steem was built on the Graphene blockchain, and
    permission mapping was originally implemented as a feature, but it was very limited.
    While Steem was designed as a decentralized social platform, EOS is an application
    development platform with a Turing-complete blockchain analogous to Ethereum.


    To understand permission mapping, let’s look at an example involving three user
    roles: the account owner, an active user, and a social media user. The social
    media permission allows only specific actions by the user, such as voting and
    posting. On the other hand, active user permission allows almost any action except
    for removing the owner. The owner can perform all available actions, including
    withdrawal. In this example, permission mapping refers to an account owner’s defining
    roles and mapping the associated permissions to other accounts. EOS generalizes
    this example by allowing custom roles and custom actions that can be mapped to
    different accounts. For instance, an account holder can map the permissions for
    a social media app to a Friend user group. Now any account added to the permission
    group (by the account holder) instantly has access to the social media app. They
    can post, vote, and perform any other actions available to the permission group,
    but their unique keys will be recorded. Therefore, it is always be possible to
    identify which user performed an action. The concept of permission mapping is
    illustrated in Figure [11-1](#430562_2_En_11_Chapter.xhtml#Fig1).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig1_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Structure of custom permission mapping


    In Figure [11-1](#430562_2_En_11_Chapter.xhtml#Fig1), we can divide this representation
    into two components : the ownership and the message itself. The ownership portion
    contains keys from the account holder, who can perform all account functions including
    withdrawal of tokens. It also contains keys from active users that act on behalf
    of the owner. The second portion of this structure is the message, and here we
    continue to use an example of social media. There are three social users mapped
    to this account by the owner, and each user has a unique key. When a message is
    posted to the social media, the posting user signs the message with their own
    unique key, so any actions performed by the mapped users can be tracked. The message
    module here can be replaced by other applications, with the account holder mapping
    custom permissions to the app, providing limited functionality to the mapped users.'
  trans: "\n让我们从 EOS 如何处理账户和用户权限开始。在 EOS 中，所有账户都可以通过人类可读的唯一标识符创建。此外，EOS 在账户之间提供了一套定义良好的、带有处理器和自动化规则的消息传递协议。网络上的每个账户都可以向其他账户发送结构化的程序化消息，并定义处理接收消息的规则和脚本。用于处理消息的脚本也可以发送消息来响应特定的传入操作。每个账户还有一个私有存储空间，消息处理器可以访问它来修改账户状态。消息处理脚本与规则一同构成了\
    \ EOS 部署的智能合约系统。EOS 智能合约背后的设计原则，类似于经过充分研究的、描述操作系统如何与外部设备及其他硬件组件通信的消息传递协议。合约将在类似于\
    \ EVM 的虚拟机上执行。用 Solidity 或其他面向合约语言编写的现有智能合约可以移植并适配，以便在 EOS 区块链上的容器中运行。这些合约还将继承一些\
    \ EOS 特有的函数，使其能够与其他 EOS 组件通信。\n\n> **注**  \n> EOS 的另一个高级特性是能够在 EOS 区块链与兼容默克尔证明的外部区块链之间进行通信。这是通过使用相同的基本密码学原理（消息存在性证明和消息序列证明）在客户端完成的，用于验证进出区块链的消息。\n\
    \n让我们回到理解用户权限如何工作的话题。在 EOS 中，应用的结构使得身份验证和权限模块与业务逻辑保持分离。这允许开发者设计专门用于权限管理的工具，并精简应用，使其仅包含与应用导向操作相关的代码。EOS\
    \ 允许用户定义用于签名传出消息的密钥，以及用户访问的每个独立服务所使用的不同密钥。例如，一个用户可以拥有一个密钥用于签名发送给其他用户的消息，以及另一个不同的密钥用于访问社交媒体账户。也可以在不分配任何密钥的情况下，授予其他账户代表用户行事的权限。这种类型的受限访问可以让某人拥有对你社交媒体的“仅发布”权限（需事先获得许可），但这些帖子会保留其独特的签名。这是通过一个称为**权限映射**的概念来实现的，我们将在后面讨论。权限映射中的一个关键概念是单个账户的多用户控制。这被认为是去中心化应用的一种高级安全措施，并且在\
    \ EOS 中实现它是为了降低密码或代币被盗的风险。\n\n> **注**  \n> EOS 可以被视为由 Dan Larimer 创建的、基于区块链的社交网络\
    \ Steem 的广义进化版。Steem 构建在 Graphene 区块链上，权限映射最初作为一个功能实现，但功能非常有限。虽然 Steem 被设计为一个去中心化的社交平台，但\
    \ EOS 是一个应用开发平台，拥有一个类似于以太坊的图灵完备区块链。\n\n为了理解权限映射，让我们看一个涉及三个用户角色的例子：账户所有者、活跃用户和社交媒体用户。社交媒体权限只允许用户执行特定操作，例如投票和发帖。另一方面，活跃用户权限允许执行除移除所有者之外的几乎所有操作。所有者可以执行所有可用操作，包括提款。在这个例子中，权限映射指的是账户所有者定义角色并将相关权限映射到其他账户。EOS\
    \ 通过允许自定义角色和自定义操作（这些可以被映射到不同账户）来推广这个例子。例如，一个账户持有者可以将某个社交媒体应用的权限映射到一个“朋友”用户组。现在，任何被（账户持有者）添加到该权限组的账户都可以立即访问该社交媒体应用。他们可以发帖、投票以及执行该权限组可用的任何其他操作，但他们的唯一密钥会被记录下来。因此，始终可以识别出是哪个用户执行了操作。权限映射的概念如图\
    \ 11-1 所示。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig1_HTML.jpg](img/430562_2_En_11_Fig1_HTML.jpg)\n\
    \n**图 11-1** – 自定义权限映射的结构\n\n在图 11-1 中，我们可以将这个表示图分成两个部分：所有权和消息本身。所有权部分包含来自账户持有者的密钥，持有者可以执行所有账户功能，包括提取代币。它还包含代表所有者行事的活跃用户的密钥。这个结构的第二部分是消息，这里我们继续使用社交媒体的例子。有三个由所有者映射到该账户的社交媒体用户，每个用户都有一个唯一密钥。当一条消息发布到社交媒体时，发布者使用他们自己的唯一密钥对消息进行签名，因此可以追踪到映射用户执行的任何操作。这里的消息模块可以被其他应用替换，账户持有者将自定义权限映射到该应用，为映射用户提供受限的功能。\n"
- fmt: "### Delegated Proof-of-Stake (DPoS)\n\nEOS uses a new consensus mechanism\
    \ called Delegated Proof-of-Stake (DPoS). It is a variant of the Proof-of-Stake\
    \ algorithm with a focus on efficiency and fair access, giving smaller wallets/accounts\
    \ a candid chance to produce blocks and earn the reward. The difference between\
    \ a traditional Proof-of-Stake algorithm and DPoS can be compared to the difference\
    \ between a direct and a representative democracy. In traditional Proof-of-Stake\
    \ (PoS) algorithms, any user with a wallet can participate in the process of validating\
    \ transactions, forming consensus, and earning a part of the mining reward. However,\
    \ it may be unprofitable for users with small wallets, or a smaller \"stake.\"\
    \ In DPoS, every wallet across the network with any amount of coins can vote for\
    \ delegates who perform the functions of validation and appending blocks to the\
    \ blockchain. Ultimately, there are two main players in a DPoS network:\n\n- **Stakeholders:**\
    \ An account in the EOS network that holds a wallet with a balance. Having tokens\
    \ allows you to vote for block producers.\n- **Block producers:** Also known as\
    \ delegates, these entities drive the consensus mechanism of DPoS. Block producers\
    \ are the DPoS equivalent of traditional miners. They validate transactions on\
    \ the network, sign blocks, and earn a reward for adding a block to the blockchain.\n\
    \nLet's briefly review the mechanism of consensus and the need for global state\
    \ updates before diving deep into DPoS. Recall that a blockchain can be modeled\
    \ as a state machine with a consistent history of updates. This state machine\
    \ is acted upon by transactions, and consensus is the process of network-wide\
    \ agreement on the order in which transactions will update the global state. The\
    \ updates occur at specific increments as new transactions are included in blocks,\
    \ and as the rapid frequency of updates filters out invalid or double-spend transactions.\
    \ The goal of DPoS is to make block production evenly distributed among the most\
    \ people and ensure that a democratic, fair process elects the block producers.\
    \ Regular PoS networks require full consensus to validate, whereas in a DPoS system\
    \ a limited number of delegated nodes (delegates) can provably validate transactions\
    \ and reach consensus.\n\n> **Note:**  \n> In the current schedule, EOS allows\
    \ blocks to be produced every three seconds by a singular block producer. By default,\
    \ the blocks are produced in multiple series, with each series containing twenty-one\
    \ block producers.\n\nThe DPoS algorithm has two major operational roles: electing\
    \ a group of block producers and scheduling production of blocks. Each account\
    \ on the network is allowed at least one vote per delegate (miner) in a process\
    \ known as approval voting. However, accounts with a larger \"stake\" in the network\
    \ follow the principle of one vote per delegate per token, and can vote for more\
    \ than one delegate. The block producers (delegates) are considered a minimally\
    \ trusted party on the blockchain, being elected through a real-time voting process.\
    \ The delegates can take turns (in a series) adding transactions to a block and\
    \ signing blocks to be added to the blockchain. As such, the use of a trusted\
    \ party prohibits malicious parties' adding invalid transactions to the blockchain.\
    \ It should be noted that delegates don't have the ability to change transaction\
    \ or block details; they are only able to either add or not add a transaction\
    \ to a block. This group of delegates is randomly assigned for block production\
    \ based on some variation of a weighted fair queueing algorithm. The goal is to\
    \ efficiently schedule block producers based on two criteria: the number of votes\
    \ they received and the time a delegate has been waiting to produce a block. Delegates\
    \ with more votes are more likely to be scheduled next to produce a block. On\
    \ the other hand, delinquent delegates can be voted out quickly without affecting\
    \ any significant transaction volume. Let's summarize the main roles of delegates:\n\
    \n- **Block production:** The most important function of delegates is to create\
    \ blocks at a fixed schedule of every three seconds. This involves validating\
    \ transactions and signing blocks across multiple series.\n- **Network support:**\
    \ Each time delegates produce a block, they are paid a reward for forging the\
    \ block. The pay rate is set by the stakeholders; however, some delegates may\
    \ accept a lower pay rate in order to get more votes from the network. Additionally,\
    \ instead of taking lower pay rates, delegates may offer additional services such\
    \ as marketing and legal work to the stakeholders.\n\nFigure [11-2](#430562_2_En_11_Chapter.xhtml#Fig2)\
    \ shows representative block production used in DPoS consensus algorithms.\n\n\
    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig2_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig2_HTML.jpg)\n\
    \n**Figure 11-2** — Block production in DPoS\n\nStakeholders on the network vote\
    \ and elect delegates, who in turn validate transactions and produce blocks. This\
    \ is illustrated in Figure [11-2](#430562_2_En_11_Chapter.xhtml#Fig2). From the\
    \ highest-voted delegates, twenty-one are elected to participate in multiple series\
    \ and produce blocks. The delegates are assigned to a schedule for producing blocks,\
    \ and this assignment is made using a round-robin algorithm. A block is considered\
    \ invalid if a block producer forged outside of their scheduled timeslot. After\
    \ a block has been signed by the delegate, the final block can be appended to\
    \ the blockchain, as seen on the right-hand side of the figure. If a block producer\
    \ fails to be on schedule, the next delegate's block will be larger and include\
    \ the previous transactions. At the same time, if a block producer fails repeatedly,\
    \ they will be voted out of the series.\n\n> **Tip:**  \n> It is interesting to\
    \ note that DPoS blockchains do not have a tendency to fork. This is because block\
    \ producers cooperate to produce blocks, rather than competing as in a PoW system.\
    \ In the event that a fork does occur, the consensus automatically switches to\
    \ the longest chain."
  raw: '### Delegated Proof-of-Stake (DPoS)


    EOS uses a new consensus mechanism called Delegated Proof-of-Stake (DPoS). It
    is a variant of the Proof-of-Stake algorithm with a focus on efficiency and fair
    access, giving smaller wallets/accounts a candid chance to produce blocks and
    earn the reward. The difference between a traditional Proof-of-Stake algorithm
    and DPoS can be compared to the difference between a direct and a representative
    democracy. In traditional Proof-of-Stake (PoS) algorithms, any user with a wallet
    can participate in the process of validating transactions, forming consensus,
    and earning a part of the mining reward. However, it may be unprofitable for users
    with small wallets, or a smaller “stake.” In DPoS, every wallet across the network
    with any amount of coins can vote for delegates who perform the functions of validation
    and appending blocks to the blockchain. Ultimately, there are two main players
    in a DPoS network:


    *   **Stakeholders:** An account in the EOS network that holds a wallet with a
    balance. Having tokens allows you to vote for block producers.


    *   **Block producers** **:** Also known as delegates, these entities drive the
    consensus mechanism of DPoS. Block producers are the DPoS equivalent of traditional
    miners. They validate transactions on the network, sign blocks, and earn a reward
    for adding a block to the blockchain.


    Let’s briefly review the mechanism of consensus and the need for global state
    updates before diving deep into DPoS. Recall that a blockchain can be modeled
    as a state machine with a consistent history of updates. This state machine is
    acted upon by transactions, and consensus is the process of network-wide agreement
    on the order in which transactions will update the global state. The updates occur
    at specific increments as new transactions are included in blocks, and as the
    rapid frequency of updates filters out invalid or double-spend transactions. The
    goal of DPoS is to make block production evenly distributed among the most people
    and ensure that a democratic, fair process elects the block producers. Regular
    PoS networks require full consensus to validate, whereas in a DPoS system a limited
    number of delegated nodes (delegates) can provably validate transactions and reach
    consensus.


    Note


    In the current schedule, EOS allows blocks to be produced every three seconds
    by a singular block producer. By default, the blocks are produced in multiple
    series, with each series containing twenty-one block producers.


    The DPoS algorithm has two major operational roles: electing a group of block
    producers and scheduling production of blocks. Each account on the network is
    allowed at least one vote per delegate (miner) in a process known as approval
    voting. However, accounts with a larger “stake” in the network follow the principle
    of one vote per delegate per token, and can vote for more than one delegate. The
    block producers (delegates) are considered a minimally trusted party on the blockchain,
    being elected through a real-time voting process. The delegates can take turns
    (in a series) adding transactions to a block and signing blocks to be added to
    the blockchain. As such, the use of a trusted party prohibits malicious parties’
    adding invalid transactions to the blockchain. It should be noted that delegates
    don’t have the ability to change transaction or block details; they are only able
    to either add or not add a transaction to a block. This group of delegates is
    randomly assigned for block production based on some variation of a weighted fair
    queueing algorithm. The goal is to efficiently schedule block producers based
    on two criteria: the number of votes they received and the time a delegate has
    been waiting to produce a block. Delegates with more votes are more likely to
    be scheduled next to produce a block. On the other hand, delinquent delegates
    can be voted out quickly without affecting any significant transaction volume.
    Let’s summarize the main roles of delegates:


    *   **Block production** **:** The most important function of delegates is to
    create blocks at a fixed schedule of every three seconds. This involves validating
    transactions and signing blocks across multiple series.


    *   **Network support** **:** Each time delegates produce a block, they are paid
    a reward for forging the block. The pay rate is set by the stakeholders; however,
    some delegates may accept a lower pay rate in order to get more votes from the
    network. Additionally, instead of taking lower pay rates, delegates may offer
    additional services such as marketing and legal work to the stakeholders.


    Figure [11-2](#430562_2_En_11_Chapter.xhtml#Fig2) shows representative block production
    used in DPoS consensus algorithms.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig2_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Block production in DPoS


    Stakeholders on the network vote and elect delegates, who in turn validate transactions
    and produce blocks. This is illustrated in Figure [11-2](#430562_2_En_11_Chapter.xhtml#Fig2).
    From the highest-voted delegates, twenty-one are elected to participate in multiple
    series and produce blocks. The delegates are assigned to a schedule for producing
    blocks, and this assignment is made using a round-robin algorithm. A block is
    considered invalid if a block producer forged outside of their scheduled timeslot.
    After a block has been signed by the delegate, the final block can be appended
    to the blockchain, as seen on the right-hand side of the figure. If a block producer
    fails to be on schedule, the next delegate’s block will be larger and include
    the previous transactions. At the same time, if a block producer fails repeatedly,
    they will be voted out of the series.


    Tip


    It is interesting to note that DPoS blockchains do not have a tendency to fork.
    This is because block producers cooperate to produce blocks, rather than competing
    as in a PoW system. In the event that a fork does occur, the consensus automatically
    switches to the longest chain.'
  trans: "\n### 委托权益证明（DPoS）\n\nEOS 采用了一种名为委托权益证明（DPoS）的新型共识机制。它是权益证明算法的一个变种，专注于提高效率并确保公平访问，为小额钱包/账户提供了生产区块并赚取奖励的公平机会。传统权益证明算法与\
    \ DPoS 之间的区别，可以类比为直接民主与代议制民主之间的差异。在传统的权益证明（PoS）算法中，任何拥有钱包的用户都可以参与验证交易、达成共识，并获取部分挖矿奖励的过程。然而，对于持有小钱包或“权益”较少的用户来说，这可能是无利可图的。在\
    \ DPoS 中，网络中任何持有任意数量代币的钱包都可以投票选举代表，由这些代表负责验证交易并将区块追加到区块链上。最终，DPoS 网络中有两个主要参与者：\n\
    \n-   **利益相关者：** EOS 网络中的账户，持有带有余额的钱包。拥有代币使你能够投票选举区块生产者。\n-   **区块生产者：** 也称为代表，这些实体驱动着\
    \ DPoS 的共识机制。区块生产者相当于 DPoS 体系中的传统矿工。他们在网络上验证交易、签名区块，并因将区块添加到区块链而获得奖励。\n\n在深入探讨\
    \ DPoS 之前，让我们简要回顾一下共识机制以及全局状态更新的必要性。回顾一下，区块链可以被建模为一个具有一致更新历史的状态机。交易作用于这个状态机，而共识则是网络范围内就交易更新全局状态的顺序达成一致的过程。随着新交易被纳入区块，以及频繁的更新过滤掉无效或双花交易，状态更新会以特定的增量进行。DPoS\
    \ 的目标是让区块生产尽可能平均地分布在最多人群之中，并确保通过民主、公平的流程选举出区块生产者。常规的 PoS 网络需要完全共识才能进行验证，而在 DPoS\
    \ 系统中，有限数量的委托节点（代表）可以可验证地完成交易验证并达成共识。\n\n> **注意：**  \n> 在当前的时间表中，EOS 允许由单一的区块生产者每三秒生产一个区块。默认情况下，区块以多个轮次的形式生产，每个轮次包含二十一个区块生产者。\n\
    \nDPoS 算法有两个主要的操作角色：选举一组区块生产者以及调度区块生产。网络中每个账户在称为批准投票的过程中，至少允许为每个代表（矿工）投一票。然而，在网络中持有更大“权益”的账户遵循每代币每代表一票的原则，并且可以为多个代表投票。区块生产者（代表）被视为区块链上最小化信任的方，通过实时投票过程选举产生。这些代表可以轮流（按轮次）将交易添加到区块中，并对要添加到区块链的区块进行签名。因此，使用可信的方可以防止恶意方将无效交易添加到区块链中。需要注意的是，代表没有能力更改交易或区块的详细信息；他们只能选择将交易添加到区块中或不添加。这组代表基于某种加权公平队列算法的变体，被随机分配进行区块生产。其目标是基于两个标准高效地调度区块生产者：他们获得的票数以及代表等待生产区块的时间。获得更多选票的代表更有可能被安排下一个生产区块。另一方面，失职的代表可以被迅速投票淘汰，而不会影响任何显著的交易量。让我们总结一下代表的主要角色：\n\
    \n-   **区块生产：** 代表最重要的功能是按照每三秒一次的固定时间表创建区块。这包括在多个轮次中验证交易和签名区块。\n-   **网络支持：**\
    \ 每次代表生产一个区块时，他们都会因锻造该区块而获得奖励。薪酬率由利益相关者设定；然而，一些代表可能为了从网络中获得更多选票而接受较低的薪酬率。此外，代表们可能会通过提供诸如营销和法律工作等额外服务来取代接受较低薪酬率。\n\
    \n图 11-2 展示了 DPoS 共识算法中使用的代表性区块生产过程。\n\n![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig2_HTML.jpg](img/430562_2_En_11_Fig2_HTML.jpg)\n\
    \n**图 11-2** — DPoS 中的区块生产\n\n网络上的利益相关者投票选举代表，这些代表反过来验证交易并生产区块。这一点如图 11-2 所示。从得票最高的代表中，选出二十一名参与多个轮次并生产区块。这些代表被分配到一个生产区块的时间表中，此分配使用轮询算法进行。如果区块生产者在计划的时间段之外进行锻造，则该区块被视为无效。在代表对区块进行签名后，最终的区块就可以被追加到区块链上，如图右侧所示。如果某个区块生产者未能按时生产，则下一个代表的区块将更大，并包含之前的事务。同时，如果某个区块生产者反复失败，他们将被投票淘汰出该轮次。\n\
    \n> **提示：**  \n> 有趣的是，DPoS 区块链不易产生分叉。这是因为区块生产者相互合作生产区块，而不是像在 PoW 系统中那样相互竞争。万一发生分叉，共识会自动切换到最长的链上。\n"
- fmt: '### Parallel Execution


    In Ethereum, the execution of instructions (for instance, from a smart contract)
    is done in a deterministic and synchronous manner across the network. EOS offers
    a very interesting upgrade for parallel execution of applications without the
    use of any locking primitives. In this case, there must be a mechanism inherent
    to the blockchain ensuring that each account only updates its own database. Incoming
    instructions update the account state; therefore, they must be applied sequentially
    such that the `n`+1 instruction updates the account only after `n`th instruction.
    There is an exception to this general rule in the case of binary yes/no–type instructions.
    Some account handlers can process binary instructions as read-only and reply back
    without any changes to their internal state.


    Fundamentally, parallel execution in EOS relies on delivering messages generated
    from different sources within an account to independent threads so that they can
    be executed in parallel. Ultimately, the final state of an account only depends
    on the messages delivered to it. A block producer organizes the delivery of messages
    to independent threads. Even though a block producer is on schedule for validating
    blocks, message delivery is done on a more rapid and custom schedule to take advantage
    of parallelism. Often times, the sources of these messages are scripts running
    on the blockchain or automatic account handlers sending messages. Due to the parallel
    nature of EOS, when a message is generated, it does not get delivered immediately.
    Instead, there is a period of delay between message generation and delivery referred
    to as latency. The rationale behind introducing latency is because instantaneous
    delivery could interfere with a receiver already modifying its internal state
    due to a previous message. Lockless messaging is achieved by scheduling the message
    to be delivered in the following cycle.


    So, what is a cycle? Under normal circumstances, to avoid message collision, an
    account would have to wait until the next block to send a second message or to
    receive a reply. A block is created every three seconds; therefore, accounts can
    expect at least a three-second wait between sending more messages. To remove this
    wait time between messages, EOS divides a block into multiple cycles and further
    subdivides those cycles as follows:


    * Each cycle is divided into threads.

    * Each thread contains a list of transactions.

    * Each transaction contains a set of messages that will be delivered.


    Figure [11-3](#430562_2_En_11_Chapter.xhtml#Fig3) shows the subdivisions and structure
    of a cycle within a block.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig3_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig3_HTML.jpg)


    Figure 11-3 Block structure for messages in EOS


    Each block is divided into a cycle that forms the basis of rapid communication
    within a single block. If no two transactions within a block modify the same account,
    all the transactions from one cycle can be executed in parallel. For each transaction
    that takes place between users, any automated handlers preset by the receiver
    are notified of incoming instructions.


    Block producers keep adding new cycles to a block until a time limit is reached
    or no new transactions have been generated. Transactions generated during the
    time window of one cycle can also be added to a subsequent cycle or the next block.
    Once a block is finalized, we can ask the following question: Given a block cycle,
    are there two threads that contain transactions that modify the same account?
    If not, then any given block can be processed by executing all the threads in
    parallel. An exchange application developer runs full nodes for the purpose of
    displaying the exchange state to its users. This exchange application has no need
    for the state associated with social media applications. EOS.io software allows
    any full node to pick any subset of applications to run. Messages delivered to
    other applications are safely ignored because an application’s state is derived
    entirely from the messages that are delivered to it. There are two important take-home
    points that need to be reiterated from this section:


    * An application’s internal state is derived from the messages delivered specifically
    to that app.

    * Any changes to an account’s internal state happen via messages passed between
    accounts, and are included in transactions on the blockchain.


    Dan Larimer commented on the parallel nature of EOS as a massive advantage for
    building applications on the blockchain:


    > *Parallel processing capabilities bring continuous scalability and a reliable
    high performance foundation for your applications. Existing single-threaded capabilities
    force every application to share the capacity and performance of one single-threaded
    blockchain, create hard scaling limits, and eventually suffer from network congestion
    that may result in platform-wide downtime.*


    Note


    EOS.io recently had an ICO to raise funds for development, and CryptoPortfolio
    reviewed the ICO, making a few points worth considering. The first point is that
    profit generation comes from the value appreciation of EOS tokens. The more users
    and developers, the more valuation. The second point is that there are no transaction
    fees on EOS, so accounts and DApps need tokens to work. Holding a certain amount
    of tokens is like having bought a percentage in EOS computational power. The third
    point is that since there is going to be free usage of the platform, you only
    need tokens on your balance to operate on this blockchain. Finally, the last point
    is that users demand a fast response from services they use, so EOS will try to
    make transaction confirmation happen in less than 1.5 seconds.'
  raw: '### Parallel Execution


    In Ethereum, the execution of instructions (for instance, from a smart contract)
    is done in a deterministic and synchronous manner across the network. EOS offers
    a very interesting upgrade for parallel execution of applications without the
    use of any locking primitives. In this case, there must be a mechanism inherent
    to the blockchain ensuring that each account only updates its own database. Incoming
    instructions update the account state; therefore, they must be applied sequentially
    such that the *n*+1 instruction updates the account only after *n*th instruction.
    There is an exception to this general rule in the case of binary yes/no–type instructions.
    Some account handlers can process binary instructions as read-only and reply back
    without any changes to their internal state.


    Fundamentally, parallel execution in EOS relies on delivering messages generated
    from different sources within an account to independent threads so that they can
    be executed in parallel. Ultimately, the final state of an account only depends
    on the messages delivered to it. A block producer organizes the delivery of messages
    to independent threads. Even though a block producer is on schedule for validating
    blocks, message delivery is done on a more rapid and custom schedule to take advantage
    of parallelism. Often times, the sources of these messages are scripts running
    on the blockchain or automatic account handlers sending messages. Due to the parallel
    nature of EOS, when a message is generated, it does not get delivered immediately.
    Instead, there is a period of delay between message generation and delivery referred
    to as latency. The rationale behind introducing latency is because instantaneous
    delivery could interfere with a receiver already modifying its internal state
    due to a previous message. Lockless messaging is achieved by scheduling the message
    to be delivered in the following cycle.


    So, what is a cycle? Under normal circumstances, to avoid message collision, an
    account would have to wait until the next block to send a second message or to
    receive a reply. A block is created every three seconds; therefore, accounts can
    expect at least a three-second wait between sending more messages. To remove this
    wait time between messages, EOS divides a block into multiple cycles and further
    subdivides those cycles as follows:


    *   Each cycle is divided into threads.


    *   Each thread contains a list of transactions.


    *   Each transaction contains a set of messages that will be delivered.


    Figure [11-3](#430562_2_En_11_Chapter.xhtml#Fig3) shows the subdivisions and structure
    of a cycle within a block.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig3_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Block structure for messages in EOS


    Each block is divided into a cycle that forms the basis of rapid communication
    within a single block. If no two transactions within a block modify the same account,
    all the transactions from one cycle can be executed in parallel. For each transaction
    that takes place between users, any automated handlers preset by the receiver
    are notified of incoming instructions.


    Block producers. keep adding new cycles to a block until a time limit is reached
    or no new transactions have been generated. Transactions generated during the
    time window of one cycle can also be added to a subsequent cycle or the next block.
    Once a block is finalized, we can ask the following question: Given a block cycle,
    are there two threads that contain transactions that modify the same account?
    If not, then any given block can be processed by executing all the threads in
    parallel. An exchange application developer runs full nodes for the purpose of
    displaying the exchange state to its users. This exchange application has no need
    for the state associated with social media applications. EOS.io software allows
    any full node to pick any subset of applications to run. Messages delivered to
    other applications are safely ignored because an application’s state is derived
    entirely from the messages that are delivered to it. There are two important take-home
    points that need to be reiterated from this section:


    *   An application’s internal state is derived from the messages delivered specifically
    to that app.


    *   Any changes to an account’s internal state happen via messages passed between
    accounts, and are included in transactions on the blockchain.


    Dan Larimer commented on the parallel nature of EOS as a massive advantage for
    building applications on the blockchain:


    > *Parallel processing capabilities bring continuous scalability and a reliable
    high performance foundation for your applications. Existing single-threaded capabilities
    force every application to share the capacity and performance of one single-threaded
    blockchain, create hard scaling limits, and eventually suffer from network congestion
    that may result in platform-wide downtime.*


    Note


    EOS.io recently had an ICO to raise funds for development, and CryptoPortfolio
    reviewed the ICO, making a few points worth considering. The first point is that
    profit generation comes from the value appreciation of EOS tokens. The more users
    and developers, the more valuation. The second point is that there are no transaction
    fees on EOS, so accounts and DApps need tokens to work. Holding a certain amount
    of tokens is like having bought a percentage in EOS computational power. The third
    point is that since there is going to be free usage of the platform, you only
    need tokens on your balance to operate on this blockchain. Finally, the last point
    is that users demand a fast response from services they use, so EOS will try to
    make transaction confirmation happen in less than 1.5 seconds.'
  trans: '

    ### 并行执行


    在以太坊中，指令（例如来自智能合约的指令）的执行是以确定性和同步的方式在整个网络中完成的。EOS 提供了一项非常有趣的升级，可以在不使用任何锁原语的情况下并行执行应用程序。在这种情况下，区块链本身必须有一种机制来确保每个账户只更新自己的数据库。传入的指令会更新账户状态；因此，它们必须按顺序应用，以便第
    `n`+1 条指令只有在第 `n` 条指令之后才能更新该账户。对于二元的是/否类型指令，这一通用规则存在一个例外。某些账户处理程序可以将二元指令作为只读指令处理并回复，而无需对其内部状态进行任何更改。


    从根本上说，EOS 中的并行执行依赖于将来自一个账户内不同来源生成的消息分派到独立的线程，以便它们可以并行执行。最终，一个账户的最终状态仅取决于传递给它的消息。区块生产者负责将消息分派到独立的线程。即使区块生产者按计划进行区块验证，消息的分派也会按照更快速和定制的计划进行，以利用并行性的优势。通常，这些消息的来源是区块链上运行的脚本或自动发送消息的账户处理程序。由于
    EOS 的并行特性，当消息生成时，它不会立即被传递。相反，在消息生成和传递之间会有一段时间间隔，称为延迟。引入延迟的原因在于，即时传递可能会干扰正在因前一条消息而修改自身内部状态的接收方。无锁消息传递是通过将消息调度到下一个周期中传递来实现的。


    那么，什么是周期？在正常情况下，为了避免消息冲突，一个账户必须等到下一个区块才能发送第二条消息或接收回复。每三秒生成一个区块；因此，账户在发送更多消息之间至少需要等待三秒。为了消除消息之间的等待时间，EOS
    将一个区块划分为多个周期，并进一步将这些周期细分如下：


    * 每个周期被分为多个线程。

    * 每个线程包含一个交易列表。

    * 每个交易包含一组将被传递的消息。


    图 11-3 展示了区块内周期的细分结构和组织结构。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig3_HTML.jpg](img/430562_2_En_11_Fig3_HTML.jpg)


    图 11-3 EOS 中消息的区块结构


    每个区块被划分为一个周期，这构成了单个区块内快速通信的基础。如果一个区块内的两个交易没有修改同一个账户，那么一个周期内的所有交易都可以并行执行。对于发生在用户之间的每个交易，接收方预设的任何自动处理程序都会收到传入指令的通知。


    区块生产者不断向区块添加新的周期，直到达到时间限制或没有生成新的交易。在一个周期的时间窗口内生成的交易也可以添加到后续周期或下一个区块中。一旦区块最终确定，我们可以提出以下问题：给定一个区块周期，是否存在两个线程包含修改同一个账户的交易？如果没有，那么任何给定的区块都可以通过并行执行所有线程来处理。一个交易所应用程序开发者会运行全节点，目的是向其用户展示交易所状态。这个交易所应用程序不需要与社交媒体应用相关的状态。EOS.io
    软件允许任何全节点选择运行任意应用程序子集。传递给其他应用程序的消息会被安全地忽略，因为一个应用程序的状态完全源自传递给它的消息。本节有两个重要的要点需要重申：


    * 一个应用程序的内部状态源于专门传递给该应用程序的消息。

    * 对账户内部状态的任何更改都通过账户之间传递的消息发生，并包含在区块链的交易中。


    Dan Larimer 评论了 EOS 的并行特性，认为这是在区块链上构建应用程序的巨大优势：


    > *并行处理能力为您的应用程序带来了持续的可扩展性和可靠的高性能基础。现有的单线程能力迫使每个应用程序共享单一单线程区块链的容量和性能，造成了严格的扩展限制，最终可能导致网络拥塞，进而可能引发平台范围的停机。*


    注意


    EOS.io 最近进行了一次 ICO 为其开发筹集资金，CryptoPortfolio 对该 ICO 进行了审查，提出了一些值得考虑的观点。首先，利润产生来自于
    EOS 代币的价值增值。用户和开发者越多，估值就越高。其次，EOS 上没有交易费用，因此账户和 DApp 需要代币才能运行。持有一定数量的代币就像购买了 EOS
    计算能力的百分比份额。第三，由于平台将免费使用，你只需要在账户余额中持有代币即可在这个区块链上操作。最后，用户要求他们使用的服务有快速响应，因此 EOS 将努力使交易确认时间少于
    1.5 秒。

    '
- fmt: "### Scheduling\n\nThe last topic that we want to tackle in this section is\
    \ that of best-effort scheduling. Recall from our previous discussion of computational\
    \ marketplaces that a Turing-complete virtual machine (similar to EVM) on the\
    \ blockchain determined the cost of execution for the instructions contained in\
    \ a contract. The customer requesting a given task paid for each step of the instruction\
    \ with `gas`, and if the number of steps exceeded the EVM gas limit, the task\
    \ would not execute. In EOS, the delegates take over the role of making global\
    \ decisions about eligibility to execute, instead of a VM. The block producer\
    \ (delegates) makes a subjective measurement of the complexity (number of instruction\
    \ steps) and time required to process the instructions contained within a transaction\
    \ and deliver a message. This subjective measurement of processing costs is analogous\
    \ to `gas` in an Ethereum system. A delegate-based instruction-counting and costs-determining\
    \ mechanism simplifies the addition of new features and optimizations to the blockchain,\
    \ without any concern about breaking the cost calculations. It also allows us\
    \ to categorize the network functionally: blockchain and virtual machines for\
    \ execution and nodes or block producers for calculating resource allocation and\
    \ management.\n\nTo bill for computational runtime, each block producer calculates\
    \ resource utilization using its customizations to the EOS algorithms. Across\
    \ the network, each step has an execution time limit and is charged a fixed bandwidth-usage\
    \ cost regardless of whether the computation took 1ms or the full time. A crucial\
    \ point to note is that in EOS all resource usage constraints are subjective and\
    \ are ultimately enforced by block producers. As a collective, the block producers\
    \ have agreed on the following criteria on the EOS network:\n\n- For a block producer,\
    \ there are two options available: include a transaction (a set of instructions)\
    \ or reject it from being included in a block.\n- If a block producer concludes\
    \ that a given account has consumed an unreasonable amount of the computational\
    \ bandwidth, they simply reject transactions from that account when producing\
    \ their own block.\n- As long as one block producer considers a transaction valid,\
    \ and under the resource usage limits, all other block producers will also accept\
    \ it. However, this transaction will take longer to confirm on the network.\n\
    - If a block producer includes transactions that are well beyond the limits of\
    \ resources, another producer might reject the block and a third producer will\
    \ be needed as the tie-breaker.\n\nThere would be a delay in propagation of the\
    \ tie-breaker block, giving the stakeholders and other delegates ample time to\
    \ pin-point the source of resource violation. Over time, if a malicious block\
    \ producer keeps approving blocks that are over the limits, she will be voted\
    \ out from the list of delegates. The block producers perform the role of a “best-effort”\
    \ scheduler in EOS: fair scheduling of tasks for maximum throughput or rejecting\
    \ tasks from being executed on the network.\n\n**Note**\n\n`EOS.io Core` is currently\
    \ in 2.0.5 release with new stability updates and features. The `Quickstart IDE`\
    \ is a web-based development tool for building blockchain applications using `EOS.io\
    \ 2.0`. It enables rapid prototyping of smart contracts and setting up of quick\
    \ deployment within a few minutes. This simplifies the app development process,\
    \ especially for new developers, without any extensive setup needed.\n\n## Chain\
    \ Core\n\n`Chain` is a contract-oriented programming language designed to manage\
    \ assets on a blockchain. `Chain` is no longer in active development. However,\
    \ the conceptual framework and design of a programming language for managing assets\
    \ is immensely valuable for you, the reader, to understand. As a result, we have\
    \ retained this section in the new edition. The following is an excellent summary\
    \ of the Chain platform by their team:\n\n> *The key characteristic that makes\
    \ a Chain blockchain a shared ledger, rather than simply a distributed database,\
    \ is that it is designed to track and control value — i.e., units of one or more\
    \ assets. Unlike data, value is scarce: once issued, it cannot be copied, only\
    \ transferred.*\n> \n> *We gain new capabilities when the underlying format of\
    \ a financial instrument becomes a cryptographically-issued digital asset, one\
    \ of the most notable of which is the ability to write programs that control the\
    \ asset. These programs are known as contracts.*\n> \n> *All value on a Chain\
    \ blockchain is secured by such contracts. Each contract controls, or locks, some\
    \ specific value — i.e., some number of units of an asset — and enforces the conditions\
    \ that must be satisfied before that value can be unlocked. From the simplest\
    \ custodial account to the most complex derivative instrument, contracts define\
    \ the rules for asset movement on a Chain blockchain network. And Ivy lets you\
    \ compose those rules.*\n> \n> *When designing Ivy we had a single goal: making\
    \ it easy to write safe, secure, and simple programs to control the movement of\
    \ value on a blockchain. Nothing more, nothing less.*\n\nAt Consensus 2017 (a\
    \ major blockchain development conference), Chain announced a set of more sophisticated\
    \ upgrades to the core programming language, making it easier to write contracts\
    \ that manage assets. `Ivy Playground` was the result of this effort to make the\
    \ developer experience as smooth as possible. A core concept that Chain and Ivy\
    \ have embraced in designing contracts is to limit the amount of information in\
    \ the blockchain: only state-updating logic and consensus-maintaining variables.\
    \ This design rationale is explained by the Chain team as follows:\n\n> *As much\
    \ as possible, the business logic of blockchain solutions should be executed off-chain,\
    \ in the “application layer” — programs written in traditional languages, that\
    \ interact with Chain Core through its SDK. The only logic that needs to be part\
    \ of the “smart contract” layer is the set of rules that secure and transfer assets.*\n\
    > \n> *Some blockchain platforms are marketed as workflow automation tools, as\
    \ a global database for shared state, or as a platform for building software-as-a-service\
    \ applications. We believe that these goals make the wrong tradeoff, by effectively\
    \ shifting computation and logic from traditional servers, where computation is\
    \ cheap and information is private, to the blockchain, where every computation\
    \ must be redundantly executed on every node in the network.*"
  raw: '### Scheduling


    The last topic that we want to tackle in this section is that of best-effort scheduling.
    Recall from our previous discussion of computational marketplaces that a Turing-complete
    virtual machine (similar to EVM) on the blockchain determined the cost of execution
    for the instructions contained in a contract. The customer requesting a given
    task paid for each step of the instruction with gas, and if the number of steps
    exceeded the EVM gas limit, the task would not execute. In EOS, the delegates
    take over the role of making global decisions about eligibility to execute, instead
    of a VM. The block producer (delegates) makes a subjective measurement of the
    complexity (number of instruction steps) and time required to process the instructions
    contained within a transaction and deliver a message. This subjective measurement
    of processing costs is analogous to gas in an Ethereum system. A delegate-based
    instruction-counting and costs-determining mechanism simplifies the addition of
    new features and optimizations to the blockchain, without any concern about breaking
    the cost calculations. It also allows us to categorize the network functionally:
    blockchain and virtual machines for execution and nodes or block producers for
    calculating resource allocation and management.


    To bill for computational runtime, each block producer calculates resource utilization
    using its customizations to the EOS algorithms. Across the network, each step
    has an execution time limit and is charged a fixed bandwidth-usage cost regardless
    of whether the computation took 1ms or the full time. A crucial point to note
    is that in EOS all resource usage constraints are subjective and are ultimately
    enforced by block producers. As a collective, the block producers have agreed
    on the following criteria on the EOS network:


    *   For a block producer, there are two options available: include a transaction
    (a set of instructions) or reject it from being included in a block.


    *   If a block producer concludes that a given account has consumed an unreasonable
    amount of the computational bandwidth, they simply reject transactions from that
    account when producing their own block.


    *   As long as one block producer considers a transaction valid, and under the
    resource usage limits, all other block producers will also accept it. However,
    this transaction will take longer to confirm on the network.


    *   If a block producer includes transactions that are well beyond the limits
    of resources, another producer might reject the block and a third producer will
    be needed as the tie-breaker.


    There would be a delay in propagation of the tie-breaker block, giving the stakeholders
    and other delegates ample time to pin-point the source of resource violation.
    Over time, if a malicious block producer keeps approving blocks that are over
    the limits, she will be voted out from the list of delegates. The block producers
    perform the role of a “best-effort” scheduler in EOS: fair scheduling of tasks
    for maximum throughput or rejecting tasks from being executed on the network.


    Note


    EOS.io Core is currently in 2.0.5 release with new stability updates and features.
    The Quickstart IDE is a web-based development tool for building blockchain applications
    using EOS.io 2.0\. It enables rapid prototyping of smart contracts and setting
    up of quick deployment within a few minutes. This simplifies the app development
    process, especially for new developers, without any extensive setup needed.


    ## Chain Core


    Chain is a contract-oriented programming language designed to manage assets on
    a blockchain. Chain is no longer in active development. However, the conceptual
    framework and design of a programming language for managing assets is immensely
    valuable for you, the reader, to understand. As a result, we have retained this
    section in the new edition. The following is an excellent summary of the Chain
    platform by their team:


    > *The key characteristic that makes a Chain blockchain a shared ledger, rather
    than simply a distributed database, is that it is designed to track and control
    value — i.e., units of one or more assets. Unlike data, value is scarce: once
    issued, it cannot be copied, only transferred.*


    > *We gain new capabilities when the underlying format of a financial instrument
    becomes a cryptographically-issued digital asset, one of the most notable of which
    is the ability to write programs that control the asset. These programs are known
    as contracts.*


    > *All value on a Chain blockchain is secured by such contracts. Each contract
    controls, or locks, some specific value — i.e., some number of units of an asset — and
    enforces the conditions that must be satisfied before that value can be unlocked.
    From the simplest custodial account to the most complex derivative instrument,
    contracts define the rules for asset movement on a Chain blockchain network. And
    Ivy lets you compose those rules.*


    > *When designing Ivy we* *had a single goal: making it easy to write safe, secure,
    and simple programs to control the movement of value on a blockchain. Nothing
    more, nothing less.*


    At Consensus 2017 (a major blockchain development conference), Chain announced
    a set of more sophisticated upgrades to the core programming language, making
    it easier to write contracts that manage assets. Ivy Playground was the result
    of this effort to make the developer experience as smooth as possible. A core
    concept that Chain and Ivy have embraced in designing contracts is to limit the
    amount of information in the blockchain: only state-updating logic and consensus-maintaining
    variables. This design rationale is explained by the Chain team as follows:


    > *As much as possible, the business logic of blockchain solutions should be executed
    off-chain, in the “application layer” — programs written in traditional languages,
    that interact with Chain Core through its SDK. The only logic that needs to be
    part of the “smart contract” layer is the set of rules that secure and transfer
    assets.*


    > *Some blockchain platforms are marketed as workflow automation tools, as a global
    database for shared state, or as a platform for building software-as-a-service
    applications. We believe that these goals make the wrong tradeoff, by effectively
    shifting computation and logic from traditional servers, where computation is
    cheap and information is private, to the blockchain, where every computation must
    be redundantly executed on every node in the network.*'
  trans: "\n### 调度\n\n本节中我们要讨论的最后一个主题是尽力而为调度。回顾之前关于计算市场的讨论，区块链上类似 EVM 的图灵完备虚拟机决定了合约中指令的执行成本。请求特定任务的客户为指令的每一步支付`gas`，如果步数超过\
    \ EVM 的 gas 限制，任务将不会执行。在 EOS 中，代表取代了虚拟机，负责对执行资格做出全局决策。区块生产者（代表）对处理交易内指令并传递消息的复杂度（指令步数）和所需时间进行主观评估。这种处理成本的主观评估类似于以太坊系统中的`gas`。基于代表的指令计数和成本确定机制简化了为区块链添加新功能和优化的过程，无需担心破坏成本计算。它还允许我们对网络进行功能性分类：用于执行的区块链和虚拟机，以及用于计算资源分配和管理的节点或区块生产者。\n\
    \n为了对计算运行时间计费，每个区块生产者使用其对 EOS 算法的自定义配置来计算资源利用率。在整个网络中，每个步骤都有执行时间限制，并且无论计算耗时 1\
    \ 毫秒还是完整时间，都会收取固定的带宽使用成本。需要注意的关键点是，在 EOS 中，所有资源使用约束都是主观的，最终由区块生产者强制执行。作为集体，区块生产者已在\
    \ EOS 网络上达成以下标准：\n\n- 对于区块生产者，有两种选择：包含一笔交易（一组指令）或拒绝将其包含在区块中。\n- 如果区块生产者判定某个账户消耗了不合理的计算带宽，他们在生产自己的区块时将拒绝来自该账户的交易。\n\
    - 只要有一个区块生产者认为交易有效且符合资源使用限制，所有其他区块生产者也会接受它。但该交易在网络上的确认时间会更长。\n- 如果一个区块生产者包含了远超资源限制的交易，另一个生产者可能会拒绝该区块，此时需要第三个生产者作为决策者。\n\
    \n决策区块的传播会存在延迟，这给了利益相关者和其他代表充足的时间来定位资源违规的源头。随着时间的推移，如果某个恶意区块生产者持续批准超出限制的区块，她将被投票从代表名单中除名。区块生产者在\
    \ EOS 中扮演“尽力而为”调度器的角色：公平调度任务以最大化吞吐量，或拒绝任务在网络上的执行。\n\n**注意**\n\n`EOS.io Core` 目前为\
    \ 2.0.5 版本，包含新的稳定性更新和功能。`Quickstart IDE` 是一个基于网页的开发工具，用于使用`EOS.io 2.0`构建区块链应用。它能在几分钟内实现智能合约的快速原型设计和快速部署。这简化了应用开发流程，尤其对新手开发者而言，无需进行大量配置。\n\
    \n## 链核心（Chain Core）\n\n`Chain` 是一种面向合约的编程语言，专为管理区块链上的资产而设计。`Chain` 目前已不再活跃开发。然而，用于管理资产的编程语言的概念框架和设计对读者您来说具有巨大的学习价值。因此，我们在新版中保留了本节内容。以下是对\
    \ Chain 平台由他们团队的精彩总结：\n\n> *使 Chain 区块链成为共享账本（而非简单分布式数据库）的关键特征，在于它被设计用于追踪和控制价值——即一个或多个资产的单位。与数据不同，价值是稀缺的：一旦发行，便无法复制，只能转移。*\n\
    > \n> *当金融工具的基础格式转变为加密发行的数字资产时，我们获得了新的能力，其中最显著的一点是能够编写控制资产的程序。这些程序被称为合约。*\n> \n\
    > *Chain 区块链上的所有价值都由这类合约保护。每个合约控制或锁定某些特定价值——即一定数量的资产单位——并强制执行解锁该价值前必须满足的条件。从最简单的托管账户到最复杂的衍生工具，合约定义了\
    \ Chain 区块链网络上资产转移的规则。而 Ivy 让您能够组合这些规则。*\n> \n> *在设计 Ivy 时，我们只有一个目标：让编写安全、可靠且简单的程序来控制区块链上的价值流动变得容易。仅此而已。*\n\
    \n在 2017 年共识大会（一场重要的区块链开发会议）上，Chain 宣布了对核心编程语言的一系列更复杂的升级，使编写管理资产的合约更加容易。`Ivy Playground`\
    \ 就是这项旨在尽可能优化开发者体验的成果。Chain 和 Ivy 在设计合约时采纳的核心概念是限制区块链中的信息量：仅包含状态更新逻辑和维持共识的变量。Chain\
    \ 团队对这一设计原理的解释如下：\n\n> *应尽可能在链下（即“应用层”）执行区块链解决方案的业务逻辑——使用传统语言编写程序，通过其 SDK 与 Chain\
    \ Core 交互。需要纳入“智能合约”层的唯一逻辑，是那些保护并转移资产的一系列规则。*\n> \n> *某些区块链平台被宣传为工作流自动化工具、共享状态的全球数据库，或构建软件即服务应用的平台。我们认为这些目标做出了错误的权衡，因为它们有效地将计算和逻辑从计算成本低廉、信息私密的传统服务器，转移到了每个计算都必须在网络每个节点上冗余执行的区块链上。*\n"
- fmt: 'The key to understanding Chain’s design is that traditional services can’t
    be transitioned to a blockchain; instead, they need to be redesigned for a new
    architecture. For starters, additional parameters involving consensus are introduced
    in an application. The programmatic routines need to distinguish between the business
    logic that should remain outside of the blockchain and state variables that need
    to be updated on the blockchain. Therefore, new design decisions are needed. Additionally,
    traditional services have some inherent redundancies that are normally not a problem
    for servers in a data center, but become amplified in a decentralized network
    where each node must update the state of accounts in the same order for every
    step of computation (replicated state machines).


    To illustrate how Chain works, we will do a walkthrough of Chain Core with Ivy.
    The main objectives of this walkthrough are to understand how to create HSM cryptographic
    keys, how to create accounts, and how to trade assets. The layout will be very
    similar to Aragon, which we covered in a previous chapter. Pay close attention
    to how information regarding an asset flows through Chain Core (Figure [11-4](#430562_2_En_11_Chapter.xhtml#Fig4)).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig4_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig4_HTML.jpg)


    Figure 11-4


    ## Configuring Chain Core


    For our walkthrough, we will be joining a test net, which behaves like a blockchain
    but all the data is reset weekly. The test net helps in understanding how to interact
    with a blockchain properly and how to manage assets in Chain.


    Clicking “Join Network” should take you to the dashboard of Chain Core. Here,
    you are presented with an option to do a tutorial. We will cover the basics of
    that tutorial here, adding more information about the main concepts in Chain.
    To the left of the dashboard is a navigation menu that we will be using heavily
    throughout the walkthrough. It is shown in Figure [11-5](#430562_2_En_11_Chapter.xhtml#Fig5).
    The nav menu is split into three parts. The top part deals with data related to
    accounts, assets, and transactions. The middle part deals with private–public
    keys, which are required to interact with the blockchain. And the bottom part
    provides some developer services; we will be talking about Ivy Playground later
    in the chapter. To begin interacting with the test net, we first need to create
    keys. Chain uses hardware security module (HSM)–backed key management, and this
    key becomes your gateway to the network. To create a key, go to the nav menu and
    click on `MockHSM` under `Services`.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig5_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig5_HTML.jpg)


    Figure 11-5


    ### Nav Menu Layout on Chain Dashboard


    The nav menu in Figure [11-5](#430562_2_En_11_Chapter.xhtml#Fig5) is split into
    three pieces: the core data, which comprises accounts, assets, and transactions;
    the services where we can create HSM keys; and finally a few developer tools.
    We will be using the `MockHSM` tab to create a set of keypairs.


    So, why do we need an HSM keypair? This keypair will be used to create new classes
    of assets, issue new assets, and create new accounts. The default view for the
    Chain dashboard is that of Transactions. Click on `MockHSM`, and you will see
    a screen saying, “There are no MockHSM keys,” which stands to reason given that
    we haven’t made any keys. So let’s start by clicking "New MockHSM keys," and you
    should see Figure [11-6](#430562_2_En_11_Chapter.xhtml#Fig6). Type an alias for
    the key, and that name will be used throughout Chain.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig6_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig6_HTML.jpg)


    Figure 11-6


    ### Creating a New HSM Key


    On the test net, the key data from Figure [11-6](#430562_2_En_11_Chapter.xhtml#Fig6)
    will be erased in a week. After clicking Submit, you should see a confirmation
    for the key that you just created, shown in Figure [11-7](#430562_2_En_11_Chapter.xhtml#Fig7).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig7_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig7_HTML.jpg)


    Figure 11-7


    ## Creating Assets


    Now that we have a keypair, we can use it to create assets. Click on the `Assets`
    tab under `Core Data`, and you should see some default assets (at the time of
    writing, Chain Core had two defaults), shown in Figure [11-8](#430562_2_En_11_Chapter.xhtml#Fig8).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig8_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig8_HTML.jpg)


    Figure 11-8


    ### Creating a New Asset


    We can create new assets by clicking the "New asset" button on the top right-hand
    corner of the screen. You should see the following asset creation screen, shown
    in Figure [11-9](#430562_2_En_11_Chapter.xhtml#Fig9).


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig9_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig9_HTML.jpg)


    Figure 11-9


    #### Asset Creation and Signing


    The process of asset creation in Figure [11-9](#430562_2_En_11_Chapter.xhtml#Fig9)
    requires two steps. First is the asset information, including any identifiers
    or definitions assigned to an asset in JSON format. The second step is signing
    the asset with your public key. Here, we are naming the asset *Silver*.


    Once you have completed the asset information, you need to scroll down and sign
    the asset with the HSM key that we just created. Figure [11-10](#430562_2_En_11_Chapter.xhtml#Fig10)
    shows the signing process. The Chain documentation provides an example for why
    a user might want multi-key authentication (shown in Figure [11-10](#430562_2_En_11_Chapter.xhtml#Fig10)):


    > *In simple cases, an asset or an account will define a single key required for
    issuance or for transfers. But it’s possible to define multiple keys for different
    usage patterns or to achieve different levels of security. For example, a high-value
    asset may be defined with two signing keys, requiring two separate parties to
    sign each issuance transaction. A joint account may also be defined with two signing
    keys, requiring only one, from either party, to sign each transfer. The threshold
    number of signatures required is called a quorum.*


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig10_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig10_HTML.jpg)


    Figure 11-10


    ### Signing an Asset


    There are a few parameters to consider in Figure [11-10](#430562_2_En_11_Chapter.xhtml#Fig10).
    By default, a new asset can be created with a signature from one key. The number
    of signatures required to approve the new asset is referred to as Quorum, and
    we will use the defaults here. Finally, we have to sign the asset using the key
    we created. After you click Submit, you should see a confirmation screen with
    the *Silver* asset created on the test net.


    ## Issuing Assets and Creating Accounts


    Now that we have an asset, we need to issue it. In Chain, all assets are managed
    and controlled by users; therefore, the asset we issue would have to be controlled
    by an account. We don’t yet have any accounts on the network, so let’s take care
    of that by clicking on “Accounts” on the nav menu. This brings us to the Accounts
    view. There may be some sample accounts on the test net, such as Alice or Bob,
    but on the right-hand corner of the Accounts screen is the option to create a
    new account. Click on that, and you will see an interface very similar to that
    for creating an asset. In fact, most of the steps are exactly the same here, such
    as filling out the account information and then providing an HSM key to sign it.
    The New Account view is presented in Figure [11-11](#430562_2_En_11_Chapter.xhtml#Fig11).'
