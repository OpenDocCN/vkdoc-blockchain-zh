  trans: '

    **约翰：** 别误会我的意思……美国的医疗体系已经取得了显著的成功。死于老年疾病的人数远多于传染病。我们在处理急症护理和急性伤病的治疗方面已成为专家。我们的制药业在极短的时间内就研发出了针对寨卡病毒的疫苗。我不会说我们的体系已经崩坏或需要推倒重来。它正按照我们当初设计的方式运作。它是我们为系统开发者所描绘的用户故事与需求的体现。世界各地的人们都前来美国接受世界级的医疗。同时，我们也正迅速将我们的（好与坏的）专业知识输出到世界其他地方。


    显而易见的是，我们已经不再物有所值。美国医疗支出即将达到 5 万亿美元，其中三分之一是浪费。医疗差错是继心脏病和癌症之后的第三大死因。在美国和世界各地，有大量人群难以获得良好的医疗服务。我们都生活在不健康的影响因素和行为已被制度化的环境中。我们过去建立的体系，并非为应对如今已成为成本和质量问题主要诱因的那些行为而设计。我们意识到，在原有设计体系之上添加新应用是无法解决这些问题的。我们必须重建，既要利用我们已有的成功经验，又要针对当今的社会和经济现实进行优化。


    **维克拉姆：** *那么，重建后的体系会是什么样子？新的用户故事和需求是什么？谁会成为这个新系统的开发者？能信任当前的企业利益集团去重新设计未来的平台吗？我们如何从现在走到那一步？*


    **约翰：** Hashed Health 将区块链视为下一代医疗解决方案的协议。通过将信任置于协议层，我们为更敏捷的护理交付模式、支付系统、价值链和消费者体验奠定了基础。它并非这些问题的终极答案，但它能让创新者摆脱当今的种种限制因素，开启全新的对话。当与物联网、机器学习、人工智能、加密货币、设计思维及其他工具相结合时，区块链便成为实现真正颠覆的配方。


    医疗领域真正变革的路径是通过消费者。区块链之所以能成为医疗颠覆的推动因素，其潜力之一在于它能改变消费者与现有健康与医疗体系的关系。它为当今以企业为中心、已成为社会限制因素的环境提供了另一种选择。用户将通过其移动设备与这种新模式交互，这些设备将利用“钱包”软件，且该软件随着时间的推移会变得越来越自主。消费者将成为“产消者”，能够控制自己的健康资产。患者在连续的护理过程中，将不再被要求加入一系列孤立的患者门户。这为个人相关的健康、保健、社交和社会经济事件提供了一种更全面的方法。我们已经认识到，一个人的健康远不止临床就诊中那
    5%的碎片化信息。患者将被赋予对其信息的掌控权，并能够按自己的意愿捐赠或变现其记录。随着时间的推移，医疗记录数据的蜜罐将被去中心化和分布式化，使用户信息更不易被盗取。


    **维克拉姆：** *按照许多标准来看，医疗 IT 的发展如同一个缓慢的庞然大物。这可能是设计使然，但您能否详细谈谈，为什么在医疗 IT 乃至更广泛的医疗领域，我们没有一个直接的消费者对提供者的关系？*


    **约翰：** 面向消费者的医疗 IT 方面很复杂。医疗的“消费化”多年来一直是个流行词，但事实证明它难以实现。有几个重要原因可以解释这一点。首先，在许多层面上，医疗与其他市场不同。医疗不是一种可以购买的传统商品或服务。即使消费者完全有能力这么做（更多内容见下文），他们也无法对购买医疗做出最佳判断，这要么是因为医疗治疗的复杂性，要么是因为寻求护理的紧迫性。此外，与几乎所有其他产品或服务不同，消费者无法总是预测医疗消费的结果。例如，购买汽车会产生可预测的结果：拥有具有规定功能且符合法规的交通工具。相比之下，给定的治疗可能无法充分解决疾病或状况。


    除了这些经济基本面，医疗体系本身的配置也使消费化变得复杂。将医疗“优步化”的驱动力一头撞上了美国支付和交付系统这堵墙。消费者不了解服务的价格。提供者自己也常常无法提前给出定价。此外，消费者并非定价协议的一方，因为合同关系建立在提供者和（代表消费者的）支付方之间。这些都是与美国医疗相关的众所周知、甚至老生常谈的问题。仅凭这些，并不会妨碍有可能有用的消费者工具的创建。相反，要发挥效用，消费者工具需要“接入”提供和支付医疗服务的系统。考虑到令人眼花缭乱的支付方、医生和服务提供者，以及他们时常相互矛盾的动机，消费者工具常常因控制着医疗市场的企业不愿配合而受阻。医疗的消费化难以实现——不是因为缺乏工具，而是因为缺乏一个开放的平台。


    随着消费者群体以传统和创新方式组织或聚集起来，这些群体将为未来的市场代表新的重心。社区或团体（无论你如何定义——村庄、雇主、基于价值观的团体、疗养院等）也将通过组织、聚合和分享的能力而被赋予权力。同样，卖方市场上的提供者群体也将组织（或被聚集）成传统或创新的新群体，以比当今臃肿的市场结构下所能提供的更好、更快、更经济合理的方式提供护理。


    **维克拉姆：** *您认为大型企业（提供者集团和保险公司）将如何演变，以应对像区块链这样的新机遇？*


    **约翰：** 随着时间的推移，企业将受到市场结构变化所带来的新机遇和挑战的影响。这种影响将波及当今医疗价值链的各个环节，例如供应链、收入周期、索赔生命周期、临床研究、保险/福利以及临床事件。审计与合规活动将让位于自动化。合同、返利、管理费以及折扣方案，将通过使用不可篡改、透明的共享分类账而消失或转型。像电子病历（EMR）、企业资源规划（ERP）和物料管理系统这样的封闭关系型数据库，将随着其会计职能的性质向市场层面转变而演变。临床试验项目将通过信息共享和简化的行政流程得到优化。安全性将得到增强，并且随着时间的推移，数据蜜罐将让位于去中心化的结构。'
- fmt: '# 区块链在医疗健康领域的未来：对话与洞察


    企业不会轻易放弃其现有数据库（至少一开始不会）。首先，这些遗留系统将通过API与区块链进行交易，然后，随着时间的推移，我们将开始看到新的、灵活的、从零开始构建的系统出现。这些系统将改变我们当前对健康、数据、临床和金融资产在市场中的流动方式的思考。


    机器也将在健康与 wellness 领域发挥更大的作用。我们已经看到联网健康机器、可穿戴设备以及大量支持网络功能的监控设备正在发挥作用。区块链为更安全、可扩展的健康物联网（IoT）环境提供了基础。使用区块链作为共享账本，可以更可扩展地注册和验证设备。因此，来自这些机器的信息可以被信任。资产所有权的转移也能更容易地被追踪，设备的运营生命周期也可以被记录。也许最有趣的是，设备本身可以被赋予一个钱包和一组智能合约，使其能够执行命令、转移资产，并以推动临床和金融价值的方式运行，无论是为消费者还是为机器本身！


    这种关于消费者、社区、企业和机器的愿景具有真正的颠覆性。同时，这也是一个充满诸多技术与非技术挑战的愿景。


    **Vikram:** *我们如何到达你所描述的那个未来？通往消费者驱动型未来的道路是什么？我们如何创建能够证明技术价值的演示？我们如何让更多人参与进来？*


    **John:** 医疗健康领域是一个快速追随者。由于监管方面的考量、复杂性以及对风险的规避，它在历史上对平台化和“优步化”持抵制态度。区块链技术是全新的。中本聪于2009年发布了比特币白皮书。以太坊创建于2015年夏季。其他正在被考虑用于医疗健康项目的协议，如`Hyperledger
    Fabric`、`Tendermint`等，则更加新颖。`EOS`、`Tezos`和`NEO`刚刚出现，带来了它们创纪录的代币销售以及关于治理、共识和可扩展性的新理念。智能合约仍然不够智能，甚至更不安全。五年到十年后谁会是赢家，这谁也说不准。如果有选择的话，医疗健康领域这个“机构厨房”里的“大厨们”更愿意袖手旁观，看着技术“腌渍”一段时间。


    真正的限制因素实际上可能在于非技术方面的担忧。首先，要使区块链解决方案有效，你需要一个协作性的参与者网络。这就是为什么你会读到这么多关于联盟和区块链的内容。没有联盟或最小可行参与者网络，企业级的区块链努力仅仅是昂贵的学术练习。即使拥有所需的网络，成功的治理也可能十分棘手。这些协作概念需要一些人去适应，对大多数人来说则是一种范式转变。其次，对于某些用例，存在着严重的监管问题，使有效利用变得复杂。许多伟大的想法将受到从未想象过去中心化市场的监管框架的限制。第三，市场仍需要进行大量的教育和组织工作。在运营我们的联盟一年后，市场中的大多数参与者仍然需要咨询，以了解什么是区块链、它将如何影响他们的市场结构，以及为什么网络是成功的关键。第四，我们相信，建立区块链和分布式账本技术作为可行解决方案的早期努力，需要简单的价值演示。这些早期的演示不会旨在改变世界。它们将解决当今医疗体系中简单、不引人注目的问题。因此，早期会有抱怨称这些产品未能实现区块链最初承诺的价值。


    理清这些问题需要一些时间。对于我们这些早期涉足医疗健康区块链领域的人来说，这些都是我们面临的复杂现实。真正的问题是时机。


    **Vikram:** *那么，关于时机，你认为区块链需要多长时间才能成为主流？我们如何能加速跨越这个鸿沟？*


    **John:** 我常对人说，创办`Hashed Health`是我职业生涯中最兴奋也是最害怕的时刻。从创新者的角度来看，区块链医疗健康领域是一个梦想。没有模板。一切都是崭新的。技术是新的且不成熟。协作式创新商业模式是新的。“胖协议”的概念是新的。我们不仅要构建产品……我们还要构建一个市场。我们正在从各个角度进行创新。每一天都是一场三维国际象棋比赛。这是高风险、高回报的研究与开发。对于`Hashed`来说，这是可以想象到的最激动人心的机会。


    我们选择协作式商业模式，是因为它符合区块链的精神，并且在我们2016年创办公司时，它似乎是通往成功的唯一路径。与之前的初创公司不同，这不是一个“构建产品，销售产品”的模式。尽管我们手头有许多强有力的用例，但我们知道不能把所有的赌注都押在一个上。市场还没有准备好。我们知道我们需要事半功倍。协作模式允许我们与行业思想领袖联合起来，他们可以为我们的共享价值生态系统做出贡献。通过与使用我们产品的公司一起参与几个成功的项目，我们增加了产品获得有效使用的几率。同时，我们也降低了客户的风险，增加了他们的回报。这是唯一的方法，尤其在一个全新且复杂的市场中。


    一旦我们做出这个决定，我们就很快被贴上了“联盟”的标签。我们从未对这个标签感到自在，尽管我们努力想出一个更好的说法。我们更像是一个网状网络或产品工作室。归根结底，`Hashed
    Health`是一家产品公司，其产品组合中有许多成功的解决方案。从许多方面来看，任何构建区块链产品的公司如果想要成功，都会成为一个联盟。网络往往比产品本身更重要。我们在两者之间的关系上投入了大量精力，因为成功就在于此。


    **Vikram:** *那么，我们如何开始构建网络？目前，医疗健康领域对区块链技术缺乏认识和理解。我们如何让服务提供商跟上进度并[让他们]产生兴趣？*


    **John:** 首先，我们知道需要做大量的思想领导工作来教育和组织这个行业。我们深入研究了这项技术，并将外部发生的事情与我们自身的专业和个人医疗保健经验联系起来。我们大力投资于研究。过了一段时间，我们开始了思想领导工作。我们写博客、撰写新闻简报、在会议上发表演讲。我们倾听收到的反馈，并对我们的想法和早期产品进行迭代。我们利用这些早期产品来招募最初的成员。起初，我们制定了非常复杂的合同，然后我们简化了它们，以便更容易地入门。我们逐渐发展出一种结构，可以根据工作组和产品的需要，灵活调整治理、业务和技术要求。这使我们能够满足客户的实际需求，而不是强迫他们走上可能令人生畏或不舒服的合同路径。我们从较大的组织开始，现在我们正在向更早期的公司、大学、企业家和思想领袖开放会员资格和工作组活动，以便我们能够将更多的贡献者带入新兴网络。'
  raw: 'Companies will not throw away their existing databases (at least not at first).
    First, these legacy systems will transact with the blockchain through APIs and
    then, over time, we will begin to see new, nimble, ground-up systems emerge. These
    systems will transform how we currently think about the movement of health, data,
    clinical, and financial assets across a market.


    Machines will also begin to play a larger role in health and wellness. We already
    see a role for connected health machines, wearables, and a host of web-enabled
    monitoring devices. Blockchain provides the foundation for a more secure and scalable
    health IoT environment. Devices can be registered and validated more scalably
    using the blockchain as a shared ledger. As a result, information from these machines
    can be trusted. Transfer of ownership can also be tracked more easily, and the
    operational lifecycle of the device can be recorded. Perhaps most interestingly,
    the device itself can be given a wallet and a set of smart contracts that allow
    it to execute commands, transfer assets, and operate in ways that drive clinical
    and financial value for consumers or for the machines themselves!


    This vision of the consumer, the community, the enterprise, and the machine is
    truly disruptive. It’s also a vision with many technical and non-technical challenges.


    **Vikram:** *How do we get to the future that you described? What is the path
    to the consumer-driven future? How do we create demonstrations that prove the
    value of the technology? How do we get people on board?*


    **John:** Healthcare is a fast-follower. It is historically resistant to platforms
    and “uberization” because of regulatory considerations, complexity, and aversion
    to risk. Blockchain technology is new. Satoshi Nakamoto released the Bitcoin whitepaper
    in 2009\. Ethereum was created in the summer of 2015\. Other protocols being considered
    for healthcare projects, such as Hyperledger Fabric, Tendermint, and other protocols,
    are even newer. EOS, Tezos, and NEO just arrived on the scene with their record-setting
    token sales and new ideas around governance, consensus, and scalability. Smart
    contracts are still not very smart and are even less secure. It’s anyone’s guess
    who the winners will be in five to ten years. If given the choice, the chefs in
    healthcare’s institutional kitchen would prefer to sit back and watch the technology
    marinate for a while.


    The real limiting factor may actually be the non-technical concerns. First, for
    blockchain solutions to be effective you need a collaborative network of participants.
    This is why you read so much about consortia and blockchain. Without the consortium
    or the minimally viable network of participants, enterprise blockchain efforts
    are merely expensive academic exercises. And even if you have the network required,
    successful governance can be tricky. These collaborative concepts require some
    getting used to for some, a paradigm shift for most. Secondly, for certain use
    cases there are serious regulatory concerns that complicate productive use. Many
    great ideas will be limited by a regulatory framework that never imagined the
    decentralized marketplace. Third, there is still a significant amount of education
    and organization of the market required. After a year of operating our consortium,
    the majority of the market still needs consulting on what blockchain is, how it
    could affect their market structure, and why networks are key to success. Fourth,
    we believe that the early efforts to establish blockchain and distributed ledger
    technologies as a viable solution will require simple demonstrations of value.
    These early demonstrations will not be designed to change the world. They will
    solve simple, unsexy problems in today’s health system. As a result, there will
    be early complaints that these products do not deliver the value that blockchain
    had originally promised.


    It will take some time to sort things out. For those of us who are early in the
    healthcare blockchain space, these are the complicated realities we face. The
    real question is timing.


    **Vikram:** *So, about the timing, how long do you think it will take for blockchain
    to become mainstream? How can we accelerate the time it takes to cross the chasm?*


    **John:** I often tell people that starting Hashed Health is the most excited
    and the most scared I have been in my professional career. From an innovator’s
    perspective, the blockchain healthcare space is a dream. There is no template.
    Everything is new. The technology is new and immature. The collaborative innovation
    business model is new. The concept of “fat protocols” is new. We have to not only
    build products . . . we also have to build a market. We are innovating from every
    angle. Every day is a 3D chess match. It’s high-risk, high-reward research and
    development. For Hashed, it’s the most exciting opportunity imaginable.


    We chose the collaborative business model because it is in line with the spirit
    of the blockchain and it seemed like the only path to success when we started
    the company in 2016\. Unlike previous startups, this was not a “build a product,
    sell a product” model. Though we had many strong use cases in the queue, we knew
    we could not place all our bets on one. The market wasn’t ready. We knew we needed
    to do more with less. The collaborative model allows for us to join together with
    industry thought leaders who can contribute to our ecosystems of shared value.
    By being a part of several successful projects with the companies who are using
    the products, we increase our odds that our products will gain productive use.
    We also lower the risks and increase the rewards for our customers. It was the
    only way, especially in a new and complex market.


    Once we made this decision, we were quickly branded a consortium. We have never
    been comfortable with this label, though we struggled to come up with anything
    better. We are more like a mesh network or a product studio. At the end of the
    day Hashed Health is a products company with many successful solutions in our
    portfolio. In many ways, any company building blockchain products is a consortium
    if they want to be successful. The network is often more important than the product
    itself. It’s the relationship between the two where we spend a lot of our energy,
    because that’s where success lies.


    **Vikram:** *So, how do we start building the network? Currently, there is a lack
    of awareness and understanding in the healthcare space about blockchain technology.
    How do we bring the providers up to speed and [get them] interested?*


    **John:** To begin, we knew we needed to do a lot of thought-leadership work to
    educate and organize the industry. We researched the technology heavily and we
    connected what was happening outside healthcare to our professional and personal
    healthcare experience. We invested heavily into research. After a time, we began
    our thought-leadership work. We blogged, wrote newsletters, spoke at conferences.
    We listened to the feedback we received, and we iterated on our ideas and early
    products. We used those early products to recruit the initial members. At first,
    we developed really complicated contracts, and then we simplified them to make
    getting started as easy as possible. We evolved into a structure that can flex
    governance, business, and technical requirements as needed based on the workgroup
    and the product. This allows us to meet a customer where they are, rather than
    forcing them down a contractual pathway that may be scary or uncomfortable. We
    started with larger organizations, and we are now opening membership and workgroup
    activities up to earlier stage companies, universities, entrepreneurs, and thought
    leaders so that we can bring more contributors into the emerging networks.'
