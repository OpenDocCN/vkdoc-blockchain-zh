- fmt: '# Ethereum Virtual Machine


    Formally, Ethereum Virtual Machine (`EVM`) is the run-time environment for smart
    contracts in Ethereum. Contracts are written in a higher-level language (for instance,
    Solidity) and then compiled into `bytecode` using an interpreter in `EVM`. This
    `bytecode` is then uploaded to the blockchain using an Ethereum client. Contracts
    live on the blockchain in this executable `bytecode` form. The `EVM` is designed
    to be completely isolated from the environment and the rest of the network. The
    code running inside the `EVM` has no access to the network or any other processes;
    only after being compiled to `bytecode` do contracts have access to the external
    world and other contracts.


    From an operational standpoint, the `EVM` behaves as a large, decentralized computer
    with millions of objects (accounts) that have the ability to maintain an internal
    database, execute code, and talk to each other through message-passing. This model
    is not yet complete, however. In Ethereum, this concept is often referred to as
    the idea of a “world computer.” Let’s return to the topic of code execution on
    `EVM` and how it is intimately linked to consensus. `EVM` allows any user on the
    network to execute arbitrary code in a trustless environment where the outcome
    is fully deterministic and the execution can be guaranteed. In a simple contract
    that executes a read function, no account edits happen, and the state of all the
    accounts remains the same. However, as we mentioned before, any user can trigger
    an action by sending a transaction from an external account. We can have two outcomes
    here: if the receiver is another external account, then the transaction will transfer
    some ether but nothing else happens. However, if the receiver is a contract, then
    the contract becomes activated and executes the code within. Executing code within
    the network takes time, and the process is relatively slow and costly. For every
    step of executable instructions, the user is charged `gas`. When a user initiates
    an execution through a transaction, they commit an upper-limit for the maximum
    currency that they are willing to pay as `gas` for that contract or code.


    **Tip**


    Ethereum has recently begun the process of migrating over to a Just-In-Time VM,
    which offers some optimizations in `gas` usage and performance.


    What does it mean for the outcome of `EVM` to be deterministic? It is essential
    for every node to reach an identical final state given the same input to a contract
    code. Otherwise, each node that executes the contract code to validate the transaction
    would end up with different results and no consensus would be possible. This is
    the deterministic nature of `EVM` that allows every node to reach consensus on
    the execution of a contract and the same final state of accounts. The nodes executing
    a contract are similar to cogs synchronized to move inside of a clock; they work
    in a harmonious fashion and reach a matching final state. A contract can also
    refer to other contracts, but it can’t directly access the internal storage of
    another contract. Every contract runs in a dedicated and private instance of the
    `EVM` where it only has access to some input data, its internal storage, the code
    of other contracts on the blockchain, and various blockchain parameters such as
    recent block hashes.


    Every full node on the network executes the contract code simultaneously for each
    transaction. When a node is validating a block, transactions are executed sequentially,
    in the order specified by the block. This is necessary because a block might contain
    multiple transactions that call upon the same contract, and the current state
    of a contract might depend on state modified by previous references during the
    code execution. Executing contract code is relatively expensive, so when nodes
    receive a block, they only do a basic check on the transactions: Does the sending
    account have enough ether to pay for `gas`? Does the transaction have a valid
    signature? Then, mining nodes perform the relatively expensive task of executing
    the transaction, include it in a block, and collect the transaction fee as a reward.
    When a full node receives a block, it executes the transactions in the block to
    independently verify the security and integrity of the transactions to be included
    in the blockchain. Let’s look at the `EVM` visually in Figure [4-4](#430562_2_En_4_Chapter.xhtml#Fig4).


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig4_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig4_HTML.jpg)


    **Figure 4-4** Four instances of Ethereum Virtual Machines running on four different
    nodes


    In Figure [4-4](#430562_2_En_4_Chapter.xhtml#Fig4), the four `EVM`s are synchronously
    executing a contract’s instructions and will arrive at an identical account state
    once the execution has been completed. This is due to the deterministic nature
    of the `EVM`, which allows the contract to reach consensus across the network
    at every step of instructions. The `EVM` has a very straightforward rationale:
    it has a single run loop that will attempt to execute the instruction one step
    at a time. Within this loop, the `gas` is calculated for each instruction and
    the allocated memory is expanded if necessary. The loop will continue until the
    VM either receives an exit code indicating successful execution or throws an exception
    such as `out-of-gas`.'
  raw: '## Ethereum Virtual Machine


    Formally, Ethereum Virtual Machine (EVM) is the run-time environment for smart
    contracts in Ethereum. Contracts are written in a higher-level language (for instance,
    Solidity) and then compiled into bytecode using an interpreter in EVM. This bytecode
    is then uploaded to the blockchain using an Ethereum client. Contracts live on
    the blockchain in this executable bytecode form. The EVM is designed to be completely
    isolated from the environment and the rest of the network. The code running inside
    the EVM has no access to the network or any other processes; only after being
    compiled to bytecode do contracts have access to the external world and other
    contracts.


    From an operational standpoint, the EVM behaves as a large, decentralized computer
    with millions of objects (accounts) that have the ability to maintain an internal
    database, execute code, and talk to each other through message-passing. This model
    is not yet complete, however. In Ethereum, this concept is often referred to as
    the idea of a “world computer.” Let’s return to the topic of code execution on
    EVM and how it is intimately linked to consensus. EVM allows any user on the network
    to execute arbitrary code in a trustless environment where the outcome is fully
    deterministic and the execution can be guaranteed. In a simple contract that executes
    a read function, no account edits happen, and the state of all the accounts remains
    the same. However, as we mentioned before, any user can trigger an action by sending
    a transaction from an external account. We can have two outcomes here: if the
    receiver is another external account, then the transaction will transfer some
    ether but nothing else happens. However, if the receiver is a contract, then the
    contract becomes activated and executes the code within. Executing code within
    the network takes time, and the process is relatively slow and costly. For every
    step of executable instructions, the user is charged gas. When a user initiates
    an execution through a transaction, they commit an upper-limit for the maximum
    currency that they are willing to pay as gas for that contract or code.


    Tip


    Ethereum has recently begun the process of migrating over to a Just-In-Time VM,
    which offers some optimizations in gas usage and performance.


    What does it mean for the outcome of EVM to be deterministic? It is essential
    for every node to reach an identical final state given the same input to a contract
    code. Otherwise, each node that executes the contract code to validate the transaction
    would end up with different results and no consensus would be possible. This is
    the deterministic nature of EVM that allows every node to reach consensus on the
    execution of a contract and the same final state of accounts. The nodes executing
    a contract are similar to cogs synchronized to move inside of a clock; they work
    in a harmonious fashion and reach a matching final state. A contract can also
    refer to other contracts, but it can’t directly access the internal storage of
    another contract. Every contract runs in a dedicated and private instance of the
    EVM where it only has access to some input data, its internal storage, the code
    of other contracts on the blockchain, and various blockchain parameters such as
    recent block hashes.


    Every full node on the network executes the contract code simultaneously for each
    transaction. When a node is validating a block, transactions are executed sequentially,
    in the order specified by the block. This is necessary because a block might contain
    multiple transactions that call upon the same contract, and the current state
    of a contract might depend on state modified by previous references during the
    code execution. Executing contract code is relatively expensive, so when nodes
    receive a block, they only do a basic check on the transactions: Does the sending
    account have enough ether to pay for gas? Does the transaction have a valid signature?
    Then, mining nodes perform the relatively expensive task of executing the transaction,
    include it in a block, and collect the transaction fee as a reward. When a full
    node receives a block, it executes the transactions in the block to independently
    verify the security and integrity of the transactions to be included in the blockchain.
    Let’s look at the EVM visually in Figure [4-4](#430562_2_En_4_Chapter.xhtml#Fig4).


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig4_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Four instances of Ethereum Virtual Machines running on four different nodes


    In Figure [4-4](#430562_2_En_4_Chapter.xhtml#Fig4), the four EVMs are synchronously
    executing a contract’s instructions and will arrive at an identical account state
    once the execution has been completed. This is due to the deterministic nature
    of the EVM, which allows the contract to reach consensus across the network at
    every step of instructions. The EVM has a very straightforward rationale: it has
    a single run loop that will attempt to execute the instruction one step at a time.
    Within this loop, the gas is calculated for each instruction and the allocated
    memory is expanded if necessary. The loop will continue until the VM either receives
    an exit code indicating successful execution or throws an exception such as out-of-gas.'
  trans: '

    # 以太坊虚拟机


    从形式上讲，以太坊虚拟机（`EVM`）是以太坊中智能合约的运行时环境。合约使用高级语言（例如 Solidity）编写，然后通过`EVM`中的解释器编译成`字节码`。随后，该`字节码`通过以太坊客户端上传至区块链。合约便以此可执行的`字节码`形式存在于区块链上。`EVM`被设计为与外界环境及网络其余部分完全隔离。在`EVM`内部运行的代码无法访问网络或任何其他进程；只有编译为`字节码`后，合约才能与外部世界及其他合约进行交互。


    从运行的角度来看，`EVM`就像一个大型的去中心化计算机，拥有数百万个能够维护内部数据库、执行代码并通过消息传递相互通信的对象（账户）。然而，这个模型并非尽善尽美。在以太坊中，这个概念常被称为“世界计算机”的理念。我们回到`EVM`上代码执行的话题，以及它如何与共识机制紧密相连。`EVM`允许网络上的任何用户在一个无需信任的环境中执行任意代码，在此环境中结果完全确定，且执行过程可被保证。在仅执行读取功能的简单合约中，不会发生任何账户编辑，所有账户的状态保持不变。但正如之前所述，任何用户都可以通过从外部账户发送交易来触发一个操作。这里可能产生两种结果：如果接收方是另一个外部账户，那么该交易将仅转移一些以太币，不会发生其他操作。然而，如果接收方是一个合约，那么该合约将被激活并执行其内部代码。在网络内执行代码需要时间，并且这个过程相对缓慢且成本高昂。对于可执行指令的每一步，用户都需要支付`gas`。当用户通过一笔交易发起一次执行时，他们需要承诺一个为该合约或代码支付`gas`的货币上限。


    **提示**


    以太坊近期已开始迁移至即时编译虚拟机（Just-In-Time VM），这将在`gas`消耗和性能方面提供一些优化。


    `EVM`的结果具有确定性意味着什么？其关键在于，对于同一个合约代码的相同输入，每个节点都必须达到完全相同的最终状态。否则，执行合约代码以验证交易的每个节点最终会得到不同的结果，共识便无法达成。正是`EVM`的这种确定性本质，使得每个节点都能就合约的执行结果及账户的相同最终状态达成共识。执行合约的节点就像钟表内部同步运动的齿轮，它们和谐运作，最终达到匹配的最终状态。一个合约也可以引用其他合约，但不能直接访问其他合约的内部存储。每个合约都在一个专用的、私有的`EVM`实例中运行，该实例只能访问某些输入数据、其内部存储、区块链上其他合约的代码，以及各种区块链参数，例如最近的区块哈希。


    网络上的每个全节点都会为每笔交易同步执行合约代码。当一个节点正在验证一个区块时，交易会按照区块指定的顺序依次执行。这是必要的，因为一个区块可能包含多个调用同一合约的交易，而该合约的当前状态可能依赖于代码执行过程中先前引用所修改的状态。执行合约代码相对昂贵，因此当节点收到一个区块时，它们只会对交易进行基本检查：发送账户是否有足够的以太币来支付`gas`？交易签名是否有效？然后，挖矿节点会执行成本相对较高的交易处理任务，将其包含在区块中，并收取交易费作为奖励。当一个全节点收到一个区块时，它会执行该区块中的交易，以独立验证这些待包含至区块链的交易的安全性和完整性。让我们通过图
    4-4 直观地了解一下`EVM`。


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig4_HTML.jpg](img/430562_2_En_4_Fig4_HTML.jpg)


    **图 4-4** 运行在四个不同节点上的四个以太坊虚拟机实例


    在图 4-4 中，四个`EVM`同步执行一个合约的指令，并且一旦执行完成，将到达完全相同的账户状态。这是由于`EVM`的确定性本质所致，这使得合约能够在每一指令步骤上跨越整个网络达成共识。`EVM`的运行逻辑非常直观：它有一个唯一的运行循环，该循环会尝试逐步执行指令。在此循环内，会为每条指令计算`gas`，并在必要时扩展已分配的内存。该循环将持续运行，直到虚拟机要么收到指示成功执行的退出代码，要么抛出异常（例如`out-of-gas`）。

