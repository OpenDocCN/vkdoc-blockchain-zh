    Swarm storage protocol: chunks, references, and manifests. Chunks are the fundamental
    unit of storage and retrieval in Swarm: pieces of data that have a maximum size
    of 4K, linked to an address. References are unique identifiers of a file that
    can be used by a frontend client to retrieve the contents. Finally, a manifest
    is a data structure that describes a file collection along with paths and corresponding
    hashes to retrieve content. Using Swarm makes it possible to distribute data across
    the network and to replicate redundancy in a decentralized fashion (using nodes)
    without having to host a centralized server. Multiple nodes in the network can
    be incentivized to replicate chunks and use manifests to reference the data, much
    like a RAID configuration, eliminating the need for hosting centralized servers.


    *   Smart contracts: The final major pillar of the Ethereum platform. Provide
    programmatic access to the blockchain and provides the logical framework to power
    applications that will eventually run on the world computer.


    In Figure [4-5](#430562_2_En_4_Chapter.xhtml#Fig5), we see a tiered approach to
    the world computer model. User accounts (or simply users) on the world computer
    are fundamental entities, therefore they are the first tier. The second tier is
    the blockchain, which serves as a communication serial bus between the different
    components in the network; this is the second tier. The third tier is the logical
    framework called smart contracts that lives on the blockchain and provides the
    computational capabilities to the world computer. Some of these contracts may
    require external storage for output and use Swarm to coordinate storage; this
    is the fourth layer. Finally, looking back at the first tier, we have the message-passing
    protocol called Whisper to facilitate user-to-user or application-to-application
    communication. More than a philosophical vision or a technological blueprint,
    the concept of a world computer and Internet 3.0 has some far-reaching implications
    for how content is controlled and distributed across the Web. Taylor Gerring from
    Ethereum talks very eloquently ([`https://blog.ethereum.org/2014/08/18/building-decentralized-web/`](https://blog.ethereum.org/2014/08/18/building-decentralized-web/))
    about building this dream:


    > *As economics of the Ethereum ecosystem mature such that open contracts for
    lowest-rate storage develop, a free market of content hosting could evolve. Given
    the nature and dynamics of P2P applications, popular content will readily scale
    as the swarm shares, rather than suffering from the buckling load of siloed servers.
    The net result is that popular content is delivered faster, not slower.*


    > *This metamorphosis will offer developers an opportunity to build the next-generation
    of decentralized, private, secure, censorship-resistant platforms that return
    control to creators and consumers of the next best idea. Anyone with a dream is
    free to build on this new class of next-generation decentralized web services
    without owning a credit card or signing up for any accounts.*


    > *Although we are not told to or expected to, we have an imperative to cherish
    and improve the very shared resources that some wish to disturb, manipulate, and
    control. Just as no single person fully understands the emerging internet collective
    intelligence, we should not expect any single entity to fully understand or maintain
    perfectly aligned motives. Rather, we should rely on the internet to solve the
    problems of the internet.*


    ### Layer 2 Upgrades


    The classic Ethereum protocol and network described in this chapter so far belongs
    to Layer 1\. To reach the ideal world computer model, scalability and security
    upgrades are needed so that more applications can interact with blockchain and
    complex code can be executed. These upgrades are all part of Layer 2, which will
    begin rolling out in 2020. There are four components of Layer 2 that we discuss
    here: sharding, beacon chain, state channels, and plasma. The explanation for
    each component will lead to the next one in order.'
  trans: '

    ### 世界计算机模型


    以太坊项目怀揣着一个宏伟愿景：成为由数百万账户驱动的共享世界计算机，这些账户由区块链提供支持，而区块链则成为通信“智能日志”的后端，提供待执行去中心化逻辑的合约，以及充当执行平台的
    EVM。但计算和处理能力并不足够；一台计算机还必须能够存储信息，并允许应用程序之间建立通信机制。这台世界计算机将运行在互联网 3.0 时代，由于信息流的去中心化特性，服务器将不再被需要。在这个雄心勃勃的尝试中，以太坊区块链只是世界计算机模型的四分之一。让我们介绍其他三个组成部分：


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig5_HTML.jpg](img/430562_2_En_4_Fig5_HTML.jpg)


    图 4-5


    以太坊世界计算机模型的分层方法


    -   **Whisper**：一种安全的消息传递协议，允许区块链上的去中心化应用程序相互通信。此协议依赖于混淆和匿名化，类似于 Tor 项目（提供匿名网页浏览），其中有关消息内容、发送者和接收者的详细信息都会被隐藏。此外，这些信息无法通过数据包分析来收集。Whisper
    协议建立在`RLPx`传输协议之上，这是一种基于 TCP 的传输协议，由以太坊节点内部用于通信。在许多情况下，DApp 需要通过消息总线进行通信；例如，宣布虚拟资产的限时抢购。Whisper
    通过使用信封（由 Whisper 节点发送和接收的加密数据包）来实现轻松广播。为此，为避免垃圾信息，Whisper 节点必须使用工作量证明函数来发送消息。完成的工作量与所发送广播的大小成正比。最终，Whisper
    将为用户账户之间或代表用户账户运作的应用之间提供自动化的通信手段，如图 4-5 所示。


    -   **Swarm**：一种去中心化的存储和分发服务，用于 DApp 代码、用户数据、区块链数据和状态数据，可供以太坊区块链使用。未来，Swarm 将能够提供
    Web 3.0 服务，如媒体流、去中心化数据库和状态通道。Swarm 试图解决的主要问题是，目前在区块链上存储大量数据的成本仍然非常高昂。这就是为何任何需要存储的
    DApp 都使用链下替代方案。Swarm 背后的理念很简单：利用协作节点的点对点网络来汇集资源。这个 P2P 网络充当一个分布式云存储系统，具有充足的数据冗余机会。该网络是自我维持的，因为相关的区块链可以根据资源交易来激励节点以获得报酬。Swarm
    存储协议有三个主要组成部分：数据块、引用和清单。数据块是 Swarm 中存储和检索的基本单位：最大容量为 4K 的数据片段，链接到一个地址。引用是文件的唯一标识符，前端客户端可以使用它来检索内容。最后，清单是一种数据结构，它描述了一个文件集合以及用于检索内容的路径和相应哈希值。使用
    Swarm 可以在网络间分布数据，并以去中心化的方式（使用节点）复制冗余数据，而无需托管集中式服务器。可以激励网络中的多个节点复制数据块并使用清单来引用数据，这很像
    RAID 配置，从而消除了托管集中式服务器的需要。


    -   **智能合约**：以太坊平台的最后一个主要支柱。提供对区块链的编程式访问，并提供逻辑框架来驱动最终将在世界计算机上运行的应用程序。


    在图 4-5 中，我们看到了世界计算机模型的分层方法。世界计算机上的用户账户（或简称为用户）是基本实体，因此它们是第一层。第二层是区块链，它充当网络中不同组件之间的通信串行总线；这是第二层。第三层是称为智能合约的逻辑框架，它存在于区块链上，为世界计算机提供计算能力。其中一些合约可能需要外部存储来输出结果，并使用
    Swarm 来协调存储；这是第四层。最后，回顾第一层，我们有名为 Whisper 的消息传递协议，用于促进用户对用户或应用对应用的通信。世界计算机和互联网
    3.0 的概念不仅仅是哲学愿景或技术蓝图，它对于内容如何在网络上被控制和分发具有深远影响。以太坊的 Taylor Gerring 非常雄辩地（[`https://blog.ethereum.org/2014/08/18/building-decentralized-web/`](https://blog.ethereum.org/2014/08/18/building-decentralized-web/)）讲述了构建这个梦想：


    > *随着以太坊生态系统的经济性日益成熟，使得针对最低费率存储的开放合约得以发展，内容托管的自由市场可能会演变。鉴于 P2P 应用的性质和动态，热门内容将随着群体共享而轻松扩展，而不是遭受孤立服务器的不堪重负。最终结果是热门内容的传输速度更快，而非更慢。*


    > *这种蜕变将为开发者提供机会，去构建下一代去中心化、私密、安全、抗审查的平台，将控制权交还给下一个伟大创意的创造者和消费者。任何有梦想的人都可以自由地在这一类新型的下一代去中心化网络服务之上进行构建，而无需拥有信用卡或注册任何账户。*


    > *尽管没有人告知或期望我们这样做，但我们有责任珍惜并改善那些某些人试图扰乱、操纵和控制的共享资源。正如没有人能完全理解新兴的互联网集体智慧一样，我们也不应期望任何单一实体能够完全理解或维持完美一致的动机。相反，我们应该依靠互联网来解决互联网的问题。*


    ### 第 2 层升级


    本章迄今为止描述的经典以太坊协议和网络属于第 1 层。为了达到理想的世界计算机模型，需要可扩展性和安全性升级，以便更多应用程序可以与区块链交互，并且可以执行复杂代码。这些升级都属于第
    2 层，将于 2020 年开始推出。我们在此讨论第 2 层的四个组成部分：分片、信标链、状态通道和 Plasma。对各组成部分的解释将按顺序引出下一个组成部分。

    '
- fmt: '#### Sharding


    There are three pillars absolutely necessary for blockchain protocols to operate:
    decentralization (defined as the lack of a central validating authority), scalability
    (defined as the ability to process more transactions and have high throughput),
    and security (broadly defined as all nodes running on the same copy of the network).
    All blockchain implementations suffer from a phenomenon called the scalability
    trilemma, which claims that only two out of the three pillars can be successfully
    deployed. Layer 2.0 updates are necessary to Ethereum in order to enable scalability
    and overcome the trilemma.


    Presently, in all known blockchain protocols, every node has to store the entire
    network state (data describing account balances and contract code), and every
    node has to process all of the transactions. This provides a large amount of consistency,
    but also a bottleneck that limits scalability: a blockchain cannot process more
    transactions than a single node. This has practical consequences; for instance,
    Bitcoin is limited to three to seven transactions per second. In an attempt to
    remove this bottleneck, we are faced with the following question: Can we design
    mechanisms where only a small subset of nodes verifies transactions and still
    keep the overall network secure? The idea is to split up transaction processing
    amongst smaller groups of nodes that can verify each transaction in parallel.
    Even though each group of nodes validates one transaction at a time, the parallel
    execution can offer incredible scalability benefits.


    Sharding is an attempt to answer this design problem. In this solution, the state
    and history of Ethereum are split into smaller partitions that we call shards.
    Essentially, in sharding, a large database (or blockchain in this case) is partitioned
    into smaller, more efficient shards, making the whole network more scalable. A
    shard is a self-managing partition and has its own transaction history. In simple
    forms of sharding, the transactions contained in a shard are limited to that shard
    only. For instance, one DApp can map a set of addresses to one whole shard, so
    all transactions related to that DApp will remain on that shard. As a result,
    a whole set of business verticals and applications can run on one shard.


    #### Beacon Chain


    Hsiao-Wei Wang has provided an overall architecture diagram for the Ethereum 2.0
    system, which is shown in Figure [4-6](#430562_2_En_4_Chapter.xhtml#Fig6).


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig6_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig6_HTML.jpg)


    Figure 4-6 Architectural organization of Ethereum 2.0


    - **PoW Chain**: This is the part of Ethereum that is currently online and operational.
    In the Ethereum 2.0 system, this layer will continue to work as-is, and new layers
    will be added on top.

    - **Beacon Chain**: The proof-of-stake deployment in Ethereum 2.0. Currently under
    development and will be the first component to be delivered.

    - **Shards**: Shard chain is a composite of the shard along with all transactions
    belonging to the shard. This enables scalability in the beacon chain. Initially,
    a limited run-time will begin where the shards will aggregate transactions and
    reach a consensus on the order of transactions, without executing them.

    - **Virtual Machines**: A VM layer will provide for computation and execution
    abilities for contracts and transactions on the Ethereum 2.0 platform.


    Why do we need a beacon chain? The main function of the beacon chain is to implement
    and manage the proof-of-stake protocol for the Ethereum blockchain, and for all
    the shards attached to the blockchain (the shard chains, to be specific). To do
    this, the beacon chain needs to manage the following aspects: managing validators,
    nominating block proposer for each shard, organizing validators into committees
    to vote on proposed blocks, and finally, apply rewards and penalties to validators.
    The name beacon chain originates from a NIST random beacon generator that provides
    a source of randomness; we will shortly see why randomness as a property is important
    to the network.


    ##### Managing Validators


    In a traditional PoW algorithm, any user can use their hardware to become a miner.
    However, in Ethereum 2.0, users will stake their ether (ETH) to activate validators.
    It is important to note that validators are virtual and activated by a staker
    who puts forth ether. For every 32 ETH staked (put forward), one validator is
    activated. A major function of the beacon chain is to maintain a set of validators:
    nodes that have staked the required 32 ETH and are now responsible for running
    the Ethereum 2.0 protocol.


    A node can join the validator set by sending its stake to a contract running on
    the proof-of-work chain (the current Ethereum blockchain). After an initial check
    for validity, the stake put forth is frozen and the contract broadcasts an announcement
    that can be received by all beacon chain clients. At this point, the node is said
    to have been inducted into the validator set on the beacon chain. Once a node
    is active, the validator can participate in the Ethereum 2.0 protocol by proposing
    blocks when chosen by the beacon chain and join committees that vote for the blocks.


    ##### Block Proposers


    In a proof-of-work protocol, the node that first solves the mining challenge gets
    to assemble/mine the next block. However, in a proof-of-stake, there is no mining
    involved. A block proposer is essentially a validator selected pseudo-randomly
    to build a block. A source of this randomness is necessary to select validators,
    hence the name beacon chain.


    The beacon chain provides a rhythm for the entire Ethereum 2.0 network. It generates
    blocks every sixteen seconds on the network, as opposed to a proof-of-work protocol
    that generates a block irregularly, roughly averaging every fifteen seconds. The
    sixteen-second periods are called slots, and each slot is a chance for a block
    to be added to the beacon chain. For every slot, a chosen block proposer from
    the beacon chain gathers all the votes from the validator set for previous blocks,
    forges the block itself, and publishes it on the blockchain. In the future, each
    shard will have its own proposer at the beginning of a slot. This shard-block
    proposer will gather up all the transactions for that shard and form them into
    a block for voting to commence.


    ##### Committees


    For this new proof-of-stake protocol in the Ethereum 2.0 blockchain, a crucial
    source of security is the committees that vote on which blocks will get added
    to the blockchain and form the true history of the chain. The beacon chain relies
    on counting the votes (also known as attestations) from its own committee in order
    to reach consensus over blocks and add them to the blockchain. This committee
    comprises validators in the system, and their collected attestations create the
    history of the beacon chain. In the future, there will be provisions for creating
    smaller subcommittees that only govern one shard at a time. This will allow the
    sub-committees to confirm the block proposers from the shard and keep a consistent
    history.


    ##### Rewards and Penalties


    An important administrative job of the beacon chain is to track and update the
    deposit that validators stake upon joining the validator set. To that end, validators
    receive rewards for maintaining network consensus and acting in good faith, which
    incentivizes them to participate in block committees. If the validators refuse
    to follow the rules set forth by the validator set, they can be issued a penalty:
    their initial stake of 32 ETH is slashed, or the validator can be ejected from
    the system. Additionally, if a validator''s balance falls below 16 ETH, the beacon
    chain will remove it from the validator set.'
