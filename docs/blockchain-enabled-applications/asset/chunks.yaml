  trans: '

    让我们讨论一个利用区块链提高临床试验透明度的典型解决方案。我们将使用彩色币（colored coins）的实现，将来自临床试验的补充数据上链。`Bitcoin-core`
    的脚本语言允许将少量元数据附加到区块链上。彩色币正是利用了这一特性，通过将静态元数据附加到区块链上，来代表具有现实世界价值的资产。从这个意义上说，彩色币利用了区块链存储虚拟资产的能力。我们将使用彩色币作为一种机制，引入稀缺性，并激励网络用户上传辅助临床数据并提供定期更新。就我们的目的而言，有三个组件使彩色币与众不同：


    - **着色方案（Coloring scheme）：** 在区块链上对彩色币数据进行编码或解码的编码方法。

    - **资产元数据（Asset metadata）：** 附加到彩色币交易并存储在区块链中的实际元数据；接下来我们将看一个例子。新的彩色币协议允许通过使用
    torrent 密钥（提供去中心化方式共享和存储数据）将潜在无限量的元数据附加到彩色币交易中。

    - **规则引擎（Rule engine）：** 过去，元数据仅包含添加到彩色币的静态信息。但最近，新增了一个规则部分，该部分对由[规则引擎](https://github.com/Colored-Coins/Colored-Coins-Protocol-Specification/wiki/Rules)支持的额外逻辑层进行编码，从而为彩色币解锁了智能合约功能。目前，支持四种类型的规则，我们将对此进行讨论。


    以下是可添加到彩色币交易中的元数据的通用语法：


    ```

    {

    metadata: {...静态数据放在这里...},

    rules: {...规则定义放在这里...}

    }

    ```


    在我们的解决方案中，我们将使用规则引擎中的两条规则：过期规则和铸币者规则。过期规则用于借出资产，它规定了资产的生命周期。到期时，资产将返还给最后一个拥有有效到期日的输出（一个有效的比特币地址）。铸币者规则授予接收方发行更多相同资产的权利。因此，收到彩色币的铸币者可以进一步向网络上的其他人发行更多彩色币。在此区块链经济实例中，这两条规则在引入稀缺性方面都发挥着重要作用。稀缺性扮演什么角色？要理解这一点，我们需要介绍另一条规则：持有者规则。当发行资产时，持有者将在资产发行规则集中被描述为允许持有该资产的地址。


    图 8-2 直观地描述了研究人员和铸币者之间的互动流程。研究人员注册一项临床试验并提供定期更新，而铸币者则确认更新，发行新的彩色币，并在试验进入下一阶段时请求未来的合作。让我们一步一步地讲解图
    8-2。临床试验始于我们的研究人员注册该试验，这启动了一笔从铸币者到持有者（我们的研究人员）的创始交易。这笔交易附带了一条过期规则，从某种意义上说，这是为给定临床试验的多个阶段之一提交相关数据的截止日期。研究人员必须向铸币者发送一笔彩色币交易，其中包含指向包含更新或新数据的元数据的
    URL。当铸币者收到这笔交易时，系统会评估资产是否已过期，并输出评估结果。我们将在下一节中回到这个结果。在这笔返回交易之后，铸币者为下一阶段向持有者发行更多彩色币，并且循环重复。试验的每个阶段都会导致更多数据
    URL 被附加到持有者发送的元数据中，作为持续更新的标志。


    **提示**


    彩色币协议的规则引擎也是不直接存储在区块链上的元数据的一部分；相反，它使用 torrents 以纯 JSON 格式存储。[Torrents](https://en.wikipedia.org/wiki/BitTorrent)
    提供了一种去中心化的数据共享机制，并使规则能够与区块链外部的对象进行交互。我们在这里将铸币者抽象为一个预言机；然而，实际的实现将涉及自动评估器和智能合约的混合体。


    图 8-2 中可视化的整个过程可以被类比为构成我们浏览器中安全客户端-服务器交互和对称加密基础的 `SSL-handshake`。也许在未来，我们可以推断，如果这种类型的交互变得常见，它可能成为彩色币钱包的一个功能。对铸币者收到的数据的评估可以公开进行，使用一个将结果返回给钱包软件的附加组件。未来，这种模块化附加组件设计将使新的协议能够集成到钱包客户端中。


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig2_HTML.jpg](img/430562_2_En_8_Fig2_HTML.jpg)


    图 8-2

    铸币者与持有者之间的互动


    图 8-2 所示的过程可以通过强制执行到期来人为地制造稀缺性。持有者（研究人员）必须返回一笔包含对应更新的数据 URL 的彩色币交易。铸币者对持有者的状态进行评估，然后确认收到更新。为下一轮更新发行新的彩色币，整个循环重新开始。评估器结果被输出，并用于构建声誉系统，我们将在稍后对此进行讨论。


    既然我们已经讨论了彩色币的交互，让我们看一下图 8-3 中的整个临床试验系统。


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig3_HTML.jpg](img/430562_2_En_8_Fig3_HTML.jpg)


    图 8-3

    区块链整合到临床试验工作流程的总结


    在图 8-3 中，流程从注册和提交一份关于临床试验将涉及的内容、使用的方法以及预期数据/结果的概要开始。在试验开始前，概要信息连同经批准的方案被附加到区块链上。这完成了注册过程。

    '
- fmt: '# Colored Coins and Rules Engine


    `Colored coins` and the rules engine are used to manage updates from researchers.
    These updates are appended to the blockchain after going through a light privacy-protection
    check. Once the clinical data is on a common backend, the most important benefit
    is perhaps the shift of focus from backend clients that hold databases to simply
    developing frontend clients that can read the blockchain. The management of data
    will happen automatically within the blockchain—all we need is a mechanism to
    read the tags or breadcrumbs left over in the metadata to know what to pull from
    an external location for further processing. An example of this is the post-processing
    unit shown in Figure [8-3](#430562_2_En_8_Chapter.xhtml#Fig3). This unit contains
    the appropriate public–private keypair and permissions to read the blockchain
    and access the external locations. The same script that appended data updates
    to the blockchain also contains a segment for post-processing that tells the post-processing
    unit how to integrate data from various third-party locations into one local collection.


    After that, post-analysis statistical methods are used to determine the quality
    of the data appended, and an automated report can be generated that summarizes
    the progress of the trial at given intervals. The intervals at which data updates
    should be required from researchers, along with instructions on how to process
    that data once made available, are coded in a script made available to the post-processing
    unit.


    ## Reputation System


    Let’s revisit the notion of scarcity. It was crucial for us to build the clinical
    trials system; however, the introduction of `colored coins` with the expiration
    rule also allows us to build another component: the reputation system. The premise
    of reputation is simply tracking adherence to the expiration rule. Recall that
    we built an export feature in the evaluator function, and here we can use the
    export function as a counting mechanism to reward researchers (or holder addresses
    in the colored coin protocol) who have been proactive in sending periodic updates.
    In a practical application, this export counter would become added to the metadata
    by the minter after periodic updates have been established. From here, establishing
    reputation is a straightforward task: higher export counter corresponds to better
    reputation.


    It is important to note that for our clinical trials system, reputation simply
    emerged as a property of the design, but it has some far-reaching implications
    concerning reproducibility. High reputation indicates the commitment of an institution
    or a research group to quality control. Once a reputation mechanism is implemented
    network-wide on a blockchain, it can be referenced externally: third-party services
    can request the reputation score associated with a particular colored wallet.
    This can be as simple as an API call to return the `rep_score` of a wallet. Why
    would this be useful? Earlier in our discussion, we mentioned the Data Discovery
    Index (`DDI`), and here we want to expand the notion of `DDI` from just being
    a data repository to being a repository with `rep_score` tags. This can provide
    another layer of granularity into `DDI`: a tag of reputation scores (high or low)
    on data sets linked to clinical trials that are available to the public. Keep
    in mind that within this design, all the data from clinical trials or updates
    resides in the `DDI` repositories; however, the `rep_score` lives in the blockchain
    metadata through colored coin transactions. Figure [8-4](#430562_2_En_8_Chapter.xhtml#Fig4)
    describes the sequential evaluation happening with each periodic update and the
    incremental addition of reputation in `rep_score`.


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig4_HTML.jpg](images/430562_2_En_8_Chapter/430562_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Overview of `rep_score` increasing with each periodic update


    The evaluator function checks for the expiration rule and if the colored coin
    transactions made by the holder contain the URLs corresponding to updates in the
    metadata. If those two conditions are met, the `rep_score` is updated for the
    holder’s wallet. This slow increase allows for the reputation to build over time,
    and the `rep_score` parameter can be referenced in a blockchain-agnostic manner
    from external services. API calls can become the default manner of attaching an
    up-to-date `rep_score` to databases deposited at `DDI`.


    Now that we have a better understanding of the `rep_score` mechanism, let’s look
    at the complete reputation system. Figure [8-5](#430562_2_En_8_Chapter.xhtml#Fig5)
    provides a comprehensive depiction of a reputation system, as well as its consequences
    for members network-wide.


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig5_HTML.jpg](images/430562_2_En_8_Chapter/430562_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    The reputation system'
