  trans: '

    ### Ambrosus、Numerai 与 SWARM


    另一家新生公司的例子是瑞士区块链公司 `Ambrosus`。这家公司成立的目的是利用智能合约追踪食品质量。运用区块链技术的创新正在各地涌现。


    `Numerai` 是一种由数据科学家网络构建的新型对冲基金。`Numerai` 是一个为机器学习专家打造的众包对冲基金。据 Tech Crunch 报道，在成立的第一年，就有
    7500 名数据科学家在 `Numerai` 平台上创造算法。`Numerai` 宣布推出 `Numeraire`，这是一种加密货币代币，旨在激励全球的数据科学家贡献人工智能。据
    `Numerai` 报道，`Numerai` 的智能合约已部署到以太坊，并向全球 19000 名数据科学家发送了超过 120 万枚代币。^(³⁴)


    初创公司 `Swarm` 将几项新概念推向了市场，并处于众筹和加密货币这两个新兴概念的前沿，同时在一个法规复杂且不断变化的市场中创建了一家初创公司。其理念是改变创业者筹集资金的方式。`Swarm`
    创造了一个名为 `crypto-equity` 的新概念，这是一种代表你项目成功与否的代币。


    `Swarm` 建立在以下三个组成部分之上：


    *   加密股权 (Crypto-equity)

    *   众包尽职调查 (Crowdsourced due diligence)

    *   币分配给所有 Swarm 持有者。对 Swarm 最好的描述是，它像一个通过币提供的 `crypto-Kickstarter`。

    *   通过币提供的加密版 Kickstarter


    `KICKCO` 是一家拥有独特模式的新公司。他们的网站声明：


    > *KICKCO 处于两个新兴产业的交汇点：区块链和众筹。KICKCO 将众筹从 Kickstarter 等中心化平台迁移到基于以太坊的智能合约上。这不仅使我们能够以去中心化的方式实现众筹模式——显著降低管理成本——还提供了一种机制来保护支持者免受项目失败的影响——用基于区块链的代币（称为
    KickCoins）来保障他们的投资。KICKCO 将为用户提供一个强大、便捷且最新的平台，用于 ICO 和众筹活动。KICKCO 是一个自动化和独立的 ICO、Pre-ICO
    及众筹活动的网站，所有这些活动都构建在以太坊上并由加密货币提供资金。KICKCO 的目标是解决上述问题，并创建一个统一的平台，将 ICO 和众筹活动的创建者与支持者联合起来，形成一个活跃且与时俱进社区。*^(³⁵)


    上述描述的公司展示了围绕区块链模型运作的一些创新和创造性思维。区块链持续为金融市场提升效率推进着令人振奋的新方式。


    ### Stellar


    `Stellar` 是一个基于分布式账本技术（DLT）的支付协议，它能够通过使用区块链锚点，在任何形式的货币之间执行快速的跨平台交易。`Stellar` 区块链和支付操作由其网络原生货币
    `Lumen` 提供动力。该网络作为一个连接金融机构和用户的平台，提供高吞吐量和快速交易确认能力，并支持各种货币之间进行小额的无缝兑换。


    在 `Stellar` 中，锚点是能够持有存款并根据请求在双重支付参数范围内向用户发行信用的实体。锚点充当了 `Stellar` 网络上不同货币之间的桥梁。除了网络原生货币
    `XLM` 之外，所有其他外部交易都以锚点发行的信用形式进行。货币兑换机制通过 `Stellar` 网络上预先定义的报价执行。报价是一种按固定汇率将一种货币兑换为信用的可信承诺。通过这种方式，`Stellar`
    充当了一个市场，买方可以在此创建信用报价，卖方则可以使用信用报价进行兑换。所有货币兑换的报价都记录在一个订单簿中，该订单簿在网络中所有货币中保持一致性。为了说明
    `Stellar` 支付系统，让我们通过 Bob 和 Alice 之间的一个示例交易来演示。


    Bob 住在美国，他想寄 5000 美元给住在英国的 Alice。Bob 在美国的 A 银行有一个账户，Alice 在英国的 B 银行有一个账户。假设两家银行都通过锚点连接到了
    `Stellar` 网络。Bob 通过 A 银行将他的交易发送到 `Stellar` 网络，在资金验证后，B 银行可以从 Bob 的账户中扣除该金额。这笔钱被转入
    A 银行的集合账户，并以 `XLM` 的形式转移到 `Stellar` 网络。一旦资金进入 `Stellar`，就会使用一个兑换报价将 `XLM` 转换为
    Alice 的本国货币。兑换完成后，金额被转入 B 银行的账户并记入 Alice 名下。通过这种方式，锚点帮助资金在 `Stellar` 上的银行之间流动，而报价则允许网络内部进行货币兑换，其成本仅为传统机制的一小部分。


    ### 投资机会民主化


    区块链可以帮助世界上最贫穷的人们。一篇世界经济论坛的文章描述了如何以低成本且透明的方式记录交易，从而允许人们无需担忧欺诈或盗窃即可进行资金兑换。区块链智能合约、国际汇款、降低成本、保险服务、帮助小企业、人道主义援助以及基于区块链的身份识别系统，仅仅是区块链能够帮助许多人的一部分方式。对于那些没有护照、出生证明、手机或电子邮件的人来说，区块链记录可以加快处理流程，为许多人带来更好的生活方式。


    通过众筹小额投资和许多新的资本形成项目，那些过去没有机会参与不断增长的金融市场经济的个人也能够参与其中。区块链有助于金融民主化，并以新的方式影响人们的生活。

    '
- fmt: '### Regulatory Updates in 2020


    The 2020 and beyond regulatory view of financial markets in the United States
    is best illustrated by the SEC’s “FINHUB,” a “Strategic Hub for Innovation and
    Financial Technology.”^([^(36)](#fn36)) The SEC states on their website, “The
    SEC has joined the Global Financial Innovation Network” and additionally have
    added tools to “help market participants assess whether the federal securities
    laws apply to the offer, sale, or resale of a particular digital asset.” These
    proactive actions and efforts illustrate market growth and maturity. The SEC has
    also sponsored public forums related to distributed ledger technology [DLT] and
    RegTech. In the last few years, there has been advanced growth in many areas related
    to regulatory issues around digital assets implementation, education, and guidance.


    The SEC has focused on issues related to the blockchain and distributed ledger
    technology. Blockchains are often used to issue and transfer ownership of digital
    assets that may be securities, depending on the facts and circumstances. Additional
    focus has been involved with the digital marketplace, which generally refers to
    financing methods that do not use traditional financial institutions as intermediaries,
    such as crowdfunding, online market lending, and funding portals and platforms.^([^(37)](#fn37))


    Major changes and innovations have also taken place in the banking industry in
    mid-2020. The Office of the Comptroller of the Currency [an independent bureau
    of the US Department of the Treasury] “has clarified that national banks and federal
    savings associations can provide cryptocurrency custodial services for customers.
    The OCC sees banks providing crypto services as a modern form of traditional bank
    activities related to custody services.”^([^(38)](#fn38)) This reaffirms the OCC
    position that “national banks may provide permissible banking services to any
    lawful business they choose, including cryptocurrency business, so long as they
    manage the risks and comply with the applicable law.”


    Blockchain technology is advancing a new era of operational efficiency in the
    capital markets. There are many innovations that can help financial institutions
    adopt and capitalize on digital asset processes and innovation. Areas that are
    innovating with new solutions include asset management, capital markets, decentralized
    finance, global trade and commerce, and payments and money. Some of the benefits
    of this capital market innovation are faster access to capital, increased solvency,
    new financial instruments, transparent and real-time data, reduced counterparty
    risk, and lower operating costs.


    ### DeFi


    A technological revolution in financial capital markets is decentralized finance
    (DeFi), defined as “open finance.” ConsenSys refers to DeFi as “the economic paradigm
    shift enabled by decentralized technologies, particularly blockchain networks.
    From peer-to-peer payment systems to automated loans to USD-pegged stablecoins,
    DeFi has emerged as one of the most active sectors in the blockchain space, with
    a range of use cases for developers, individuals, and institutions.” Decentralized
    finance leverages three key principals of the Ethereum blockchain to unlock liquidity
    and growth opportunities, increase financial security and transparency, and support
    an integrated and standardized economic system.”^([^(39)](#fn39))


    DeFi’s three key principals are as follows:


    *   **Programmability:** Highly programmable smart contracts automate execution
    and enable the creation of new financial instruments and digital assets.

    *   **Immutability:** Tamper-proof data coordination across a blockchain’s decentralized
    architecture increases security and auditability.

    *   **Interoperability:** Ethereum’s composable software stack ensures that DeFi
    protocols and applications are built to integrate and complement one another.


    The innovative use cases of decentralized finance as described by ConsenSys are
    as follows:


    *   **Know Your Transaction (KYT):** Similar to a process of verifying the identities
    of customers and counterparties (KYC), blockchain-based DeFi solutions now enable
    businesses to easily monitor, analyze, and verify transaction details to prevent
    fraud and meet regulatory requirements.

    *   **DeFi Data and Analytics:** Track the value locked in DeFi protocols, borrow
    and supply APRs, exchange volumes, and more with our comprehensive and customizable
    data platform.

    *   **Token Utilization:** Programmable “proof of use” standards for token networks
    align incentives during network launches and minimize speculation, ensuring that
    tokens end up in the hands of actual users.

    *   **Eth 2 Staking:** Our staking-as-a-service platform helps qualified validators
    earn rewards and avoid penalties for attesting blocks on the Eth2 Beacon Chain.^([^(40)](#fn40))


    The innovations and possibilities of blockchain innovations are driving rapid
    change in the US and global financial markets. Many products and solutions are
    being aligned as never before. Regulations, banking, capital markets, and innovation
    are creating a new world of finance.


    ## Summary


    The future is for creation, innovation, change, and global impact as crowdfunding
    enables blockchain on a global scale. Reports from both EY and Innovate Finance
    delve into the capital markets landscape. Chris Skinner, in his blog, “Fintech
    and the World of Investment Banking,” stated that “there is a raft of new technologies
    that are architecting the landscape of capital markets and hundreds of start-ups
    leveraging these new technologies to both assist and attack the inefficiencies
    in the investment banking world. Rather than ignoring these changes the biggest
    banks are investing in them.”^([^(41)](#fn41))


    Goldman Sachs, Citicorp, JPMorgan, Morgan Stanley, Wells Fargo, and Bank of America
    are just some of the large banks and investment bankers investing millions in
    FinTech, blockchain, and other technology innovations.


    Disruption in the capital markets is moving at a rapid pace. A recent *Forbes*
    article indicated that there are more than 900 cryptocurrencies in existence now,
    with more being added each day. The ICO market is drawing significant amounts
    of capital, comparable to venture capital market over the last few years, as of
    mid-2017. There will be many future market fluctuations, with new regulations
    coming to the market, and many changes on the way as we experience technological
    revelations and financial capital changing rapidly.


    A special salute goes to the innovators, dreamers, individuals, and groups that
    are in the marketplace and see the future of a better financial world for everyone.
    The incredible commitment of incubators, accelerators, universities, and investment
    firms working toward blockchain efficiencies and innovation will change the way
    the world views financial capital.


    Examples of innovation are everywhere. Goldman Sachs, JPMorgan, Nasdaq, and special
    alternative investment firms such as Triloma Securities offer unique products,
    services, innovation, and capital. What is occurring in many local markets is
    a collaboration of groups working together for common goals in the technology
    area. One unique group in the Orlando and central Florida area has come together
    to help startups and advance blockchain research and applications. This group
    comprises various organizations, including Florida Angel Nexus, Merging Traffic,
    StartUp Nations Ventures, Institute of Simulation & Training, METIL (Mixed Emerging
    Technology Integration Lab), the Medical Tourism Association, and many others,
    all working in a robust public–private partnership ecosystem that drives change
    for the good of all in the marketplace.


    Blockchain will bring about a unique technological revolution in financial capital.'
