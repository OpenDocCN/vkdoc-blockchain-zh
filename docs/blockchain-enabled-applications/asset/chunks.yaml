    applications built on the blockchain could assist in maintaining personal protective
    equipment (PPE) inventory and even therapeutics such as vaccines. We hope you
    find the information in this book useful as well as enjoyable as you explore the
    fundamentals, current best practices, and future potential of blockchain-enabled
    applications. We welcome your feedback at `info@metil.org`.


