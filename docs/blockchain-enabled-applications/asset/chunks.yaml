- fmt: '### Enterprise Ethereum Alliance Roadmap


    Above all other objectives， EEA aims to be a specification and a standard for
    building enterprise-grade Ethereum applications. A recent *Cointelegraph* article
    by Helen Partz emphasizes the moves made by the project in this direction:


    > The Enterprise Ethereum Alliance (EEA) is setting up a technical group working
    on collaboration between the mainnet and enterprises.

    >

    > The working group， called the EEA Mainnet Initiative， intends to accelerate
    and lead cooperation between the EEA’s enterprise and startup members， as well
    as those who work on the mainnet’s technology and interoperability solutions，
    according to a press release shared with Cointelegraph on Aug. 6.

    >

    > **EEA Mainnet Initiative to work on interoperability and scalability solutions**

    >

    > The Mainnet Initiative will seek to improve its knowledge about how public network
    components match the commercial market requirements needed to boost adoption of
    Ethereum， the press release notes. The EEA will hold interactive discussions on
    Mainnet Initiative as a part of the Ethereum Foundation’s major developer conference，
    `Devcon5`.


    The following three figures (Figure [11-24](#430562_2_En_11_Chapter.xhtml#Fig24)，
    Figure [11-25](#430562_2_En_11_Chapter.xhtml#Fig25)， Figure [11-26](#430562_2_En_11_Chapter.xhtml#Fig26))
    are taken from an update to the EEA provided by Bob Summerwill.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig26_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig26_HTML.jpg)


    Figure 11-26


    Three areas of focus for EEA in the near future


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig25_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig25_HTML.jpg)


    Figure 11-25


    A new protocol stack for Ethereum modified to handle enterprise-grade transactions


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig24_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig24_HTML.jpg)


    Figure 11-24


    Brief overview of the Enterprise Ethereum Alliance


    In this example， privacy is important， and most miners (nodes) are known and trusted.
    Notice that the enterprise protocols sit on top of a shared public–private blockchain
    with necessary modifications to preserve privacy. The public clients share the
    same storage and virtual machines， whereas private or enterprise clients would
    be given isolated storage and VMs that execute encrypted payloads of instructions.
    More broadly speaking， enterprise Ethereum is a bigger movement than simply `Quorum`
    being developed by the EEA. Let’s take a step back and talk about why an enterprise
    version was needed. Jeremy Miller from `ConsenSys` provides three main reasons:


    *   Ethereum was developed initially for public chain deployment， where trustless
    transaction requirements outweigh absolute performance. The current public chain
    consensus algorithms (notably， proof-of-work) are overkill for networks with trusted
    actors and high throughput requirements.


    *   Public chains by definition have limited (at least initially) privacy and
    permissioning requirements. Although Ethereum does enable permissioning to be
    implemented within the smart contract and network layers， it is not readily compatible
    “out of the box” with traditional enterprise security and identity architectures
    nor data privacy requirements.


    *   Naturally， the current [Ethereum improvement process](https://github.com/ethereum/EIPs)
    (dominated by Ethereum Improvement Proposals) is largely dominated by public chain
    matters， and it has previously been challenging for enterprise IT requirements
    to be clarified and prioritized within it.


    What are the main technical objectives for EEA in the near future? Figure [11-26](#430562_2_En_11_Chapter.xhtml#Fig26)
    provides three main focal points in the context of `Quorum` development.


    The largest focus for EEA is the development of enterprise reference specifications
    and implementation standards that can be used industry-wide. On the other hand，
    the major focus for development in `Quorum` is toward providing a high level of
    privacy (identified by `JPMorgan` as a major roadblock) that can be configured
    for transactions and smart contracts executed by users. A hybrid public–private
    chain can become the perfect model for consortium-type settings. The next focus
    is on creating a pluggable consensus model where transactions and complex situations
    can choose the best consensus mechanism applicable to the use case. Finally， high-volume
    performance is crucial for `Quorum` to succeed; therefore， developing better benchmarking
    tools to measure and improve will become the key to wide adoption.'
