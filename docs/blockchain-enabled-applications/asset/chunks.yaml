- fmt: '**Vikram:** *Can you talk a bit more about how the Hashed Health model benefits
    the members? What’s the current structure of Hashed Health?*


    **John:** Our goal with our members is to build community and products that make
    meaningful use of the strengths of blockchain and distributed ledger technologies.
    We seek out members who will contribute to a project and a conversation, not just
    look to extract value from the group. We consider ourselves a healthcare company
    first, so the projects we work on must have the patient’s best interest in mind.


    Our members usually engage as general members who need some consulting before
    they are ready to build. The level of business and technical expertise inside
    healthcare institutions is very weak, so a consultative approach is required.
    Members usually have a concept or two that they believe they’d like to tackle,
    but they always require some guidance and some preparation prior to development.
    By providing healthcare expertise and blockchain expertise, we are able to deliver
    a unique product that drives productive use-case concepts forward in a more efficient
    manner. By creating collaborative agreements, we can build incentives that support
    accomplishing rational milestones on the pathway from concept to productive use.


    Each of our networks has its own constituents, cadence, business plan, technical
    plan, governance structure, and personality. Each is focused on solving a specific
    business problem, and we choose the protocol that fits the business need. Currently,
    we have built products and demos on `Hyperledger Fabric`, `Ethereum`, a commercial
    platform called `BitSE`, and `Tendermint` and `Ethermint`. We are currently researching
    other protocols and various middleware products, including `Gem`, `Bloq`, `Nuco`,
    `Stratumn`, `Tezos`, `EOS`, and `IOTA`. The workgroups all share common learnings
    and best practices that translate across projects. We have experts (either in-house
    or contracted) who can support any discussion (technical, business, legal, regulatory)
    required to advance a product.


    In order to cross the chasm, we feel it is important to begin with simple demonstrations
    of value. The simpler the better. We prefer projects that are not highly political,
    that do not require protected information, and that solve a problem in today’s
    environment while laying the foundation for our vision of the future.


    **Vikram:** *Let’s get into the portfolio of operational working groups within
    Hashed Health and the current target areas. Can you elaborate on some of the use
    cases for us and how they’re using the blockchain?*


    **John:** At the time of writing, Hashed Health has five active enterprise groups:


    1. Provider Identity

    2. Patient Identity

    3. Payments

    4. Supply Chain IoT

    5. Clinical IoT (Wearables)


    We are also in the process of forming several new enterprise groups, which we
    expect to have operational soon, including:


    1. Disease Registries

    2. Clinical Trials

    3. Medical Records

    4. Pharma Revenue Cycle

    5. Enterprise Resource Management Systems


    These are areas where the Hashed team has both expertise and customer interest.
    The general membership dues support the initial business case and technical research.
    Once there is a decision to build, customers are required to enter a secondary
    development agreement specific to the project.


    Perhaps the most popular example of our work is Decentralized Physician Identity.
    Provider identity and its related data is foundational to the delivery of care
    today and in the future. From graduate medical education to stat licensing, medical
    staff credentialing, and payer contracting, the ready availability and reliability
    of data about a provider’s identity, credentials, and reputation are paramount
    to ensuring patient safety and high-quality care. Globally, the world is facing
    a shortage of qualified health workers. That shortage is estimated to be 7.9 million
    [and] is expected to grow to 12.9 million health workers by 2035. A crucial challenge
    amidst this shortage is the ability to identify, locate, and communicate with
    workers in remote locations. The single provider’s identity is a complex tangle
    of data points. There are multiple elements held by multiple disparate stakeholders,
    such as medical schools, state licensing boards, and more. Some elements remain
    static over time (such as graduate degree), and others are dynamic over time (such
    as licensure, affiliation, residence, and contact information).


    In this use case, we treat data fields as individual data assets. Providers and
    credentialing stakeholders jointly manage a distributed provider profile registry.
    Cryptographic signatures ensure primary source verification of essential credentials
    and certifications, allowing distributed networks to share real-time updates of
    crucial data. This process significantly reduces time, expense, and wasteful manual
    processes that happen today. This use case is attractive because it is fairly
    straightforward technically, it is not political, the data is not sensitive, and
    no key stakeholder has a competitive interest. We would argue that it is a good
    blockchain use case because provider identity is not centralized and there are
    currently trust and incentive issues that need to be overcome. Although there
    are current efforts underway to centralize this information, the various data
    elements are not centrally granted, administered or consumed. An easily auditable
    market-level data structure will deliver trust and efficiency in a market that
    currently has neither.


    In this example, you can see how Hashed Health has seeded a market with a simple
    product built upon a simple, yet impactful use case. Blockchain allows us to tackle
    this problem in a way that was not previously imaginable.


    We are equally excited about our other foundational use cases. We are working
    with providers on patient registration authority products. We are working with
    a multi-constituent workgroup on an exciting payments model that links payments
    to benefits and behavior. We are working with government institutions on public
    health surveillance and clinical trials decentralization. We have begun an exciting
    journey that continues to pick up momentum, new ideas, and additional expertise
    in both blockchain and specific healthcare subject matter.


    **Vikram:** *One major problem with blockchain integration into healthcare is
    concerns about privacy. Blockchain was designed to be anonymized, but for health
    data, we need this interesting combination of trusted miners, completely private
    transactions, and yet network consensus on the blockchain. What are your thoughts
    on the evolution of privacy?*'
