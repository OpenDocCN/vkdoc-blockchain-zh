    # 比特币交易与钱包机制


    在图 3-4 中，Alice 从她的钱包发起交易，该钱包包含多个地址。每个地址都拥有一定数量的比特币余额（即与该地址关联的所有 `UTXO` 的总和），这些余额可用于创建新交易。随后，使用
    Alice 的私钥对交易进行签名，交易进入挖矿阶段，并被封装至一个候选区块中。挖矿结束后，获胜的矿工在网络中广播该区块，区块随之被添加到区块链中。交易随后传播至
    Bob，他现在可以使用自己的私钥解锁交易输出金额并加以使用。借助 `UTXO`、签名以及脚本锁定/解锁的概念，我们能够更深入地理解区块链作为去中心化账本是如何维持内部一致性的。


    在图 3-4 中，我们引入了一个新概念——钱包，它可以用来发起交易。简单来说，钱包本质上是一个**比特币地址加上用于解锁该地址的私钥**。钱包如今已成为比特币核心代码的标准组成部分，主要为用户提供三种用途：


    *   **创建交易**：用户可通过钱包的图形界面轻松创建交易。

    *   **维护余额**：钱包软件会追踪与某一地址关联的所有 `UTXO`，并向用户显示最终余额。

    *   **维护多个地址**：在钱包内，用户可以拥有多个地址，每个地址可与特定的交易相关联。


    从某种意义上说，地址是比特币网络中确立所有权的唯一方式。`UTXO` 与特定地址关联（作为账户余额），用户可以创建任意数量的地址。我们在图 3-4 中看到，Alice
    的钱包中包含三个地址，每个地址均可配合她的私钥使用。除了软件钱包之外，还有其他类型的钱包。图 3-4 中展示的是软件钱包，但其他两种钱包类型（移动钱包和冷存储物理钱包）的操作流程与此类似。


    移动钱包主要以便利性为设计目标，同时也是通往使用比特币等加密货币进行移动支付世界的大门。这些钱包通常充当完整钱包的独立但简化版本，允许用户随时随地访问余额并进行交易。这类钱包应用通常是在开源环境中设计的，因此它们也有助于将开发者和高级用户聚集到社区中。冷存储钱包则是一种更长期的比特币存储方法。曾发生过钱包软件损坏，或用户无法记住解锁钱包的密钥，从而导致其账户余额实际上变得不可用的情况。钱包密码没有直接的恢复机制。物理存储的理念是创建一个新钱包，并向该钱包上的一个新地址发送一笔交易。接下来，可以将这个新钱包进行备份并保存到如
    U 盘等物理设备上，并安全存放。一旦该交易在区块链上得到确认，你的比特币便可随时从 U 盘中安全取回。这样做可以防范任何意外情况，并将你的货币与你用于日常交易或挖矿的主钱包分离开来。一些开发者更进一步，创建了纸钱包，其中地址被编码为二维码，而该特定钱包的私钥则以另一个二维码的形式打印在纸上。


    **注意**


    如何在不自行编写脚本或代码的情况下，实际见证你的交易在比特币网络上进行？在比特币（以及大多数加密货币）中，有一种称为区块链浏览器的功能，它通常是一个网站，其上显示所有来自比特币网络的交易。你可以获取关于交易的各类详细信息，例如交易来源、金额、区块哈希以及收到的确认次数。


    ## 简单支付验证（SPV）


    到目前为止，我们已经讨论了区块的结构、交易列表、交易如何在用户之间发生，以及它们如何被记录在区块链上。区块本质上是链接在区块链上的数据结构，而交易则可以视为该数据结构的属性。更准确地说，在区块链的语境下，交易被表示为默克尔树的叶子节点。哈希值在比特币协议中被用作维护数据一致性的方法，因为哈希值非常容易验证，且几乎无法逆向还原。基于这些特性，我们可以解决区块链上一个非常棘手的技术挑战：如何验证某一特定交易是否属于某个区块？对一个包含
    *N* 个项目的列表进行检查，其效率极为低下；因此，我们无法简单地对区块链中（可能包含数百万个区块）的每一笔交易逐一检查以进行验证。这正是默克尔树提供速度和效率的关键所在。


    要直观理解默克尔树，请参考图 3-5。它由区块中的交易构建而成，以便快速访问并进行验证。让我们按照图 3-5 中的示例进行操作。在这个例子中，一个区块中收集了八笔交易，并以默克尔树的形式呈现。最底层是交易本身，通过将两笔交易进行哈希运算并得到一个输出哈希，它们被抽象到更高一层。这个哈希随后与第二个哈希结合，并再次进行哈希运算，从而抽象到更高一层。此过程重复进行，直到仅剩下两个哈希值。请注意，每一层都包含了其下一层的信息，最终，最顶层持有包含整棵树信息的哈希值。这个哈希被称为默克尔根。那么，默克尔根如何帮助查找交易呢？让我们通过图
    3-6 中的示例，来尝试从默克尔树中找到交易 6。首先，默克尔根允许我们跳过树的另一半，此时我们的搜索范围被限制在交易 5 到 8 之间。哈希值进一步引导搜索，使我们仅需三步就能抵达（找到）交易
    6。相比之下，如果遍历整棵树，进入每一层并逐一比较每笔交易来确认它是否确实是交易 6，这个过程在步骤数量和所需时间上将复杂得多；若搜索范围扩展到数百万笔交易，这将会变得异常繁重。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig5_HTML.jpg](img/430562_2_En_3_Fig5_HTML.jpg)


    图 3-5 — 构建默克尔根

