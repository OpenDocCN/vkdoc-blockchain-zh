    \ 6-1 中三个新术语的简要词汇表：\n\n- **DA**：去中心化代理（Decentralized agents），本质上是开发者为实现特定任务而编程的机器人。DA\
    \ 与 DAO 的主要区别在于后者拥有内部资本。\n- **DC**：去中心化公司（Decentralized corporations），本质上是介于不运营内部资本的论坛与完全自动化的去中心化代理之间的一种媒介。\n\
    - **DO**：去中心化组织（Decentralized organizations），本质上是介于传统公司与完全自治的 DAO 之间的一种媒介。\n\n\
    ## 团队\n\n在区块链世界中，常出现的情况是，对于没有员工的 DAO 与编写并维护了 The DAO 代码的人类之间的关系性质，存在着许多混淆。就 The\
    \ DAO 而言，这些人类由 Slock.it 的高层领导，这是一家德国公司，旨在通过他们称之为“通用共享网络”（USN）的技术来颠覆共享经济。\n\nSlock.it\
