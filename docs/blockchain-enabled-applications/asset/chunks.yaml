  trans: '

    **约翰：** 我们在令牌化方面也积累了专业知识，并且相信我们的一款或多款产品将采用有意义的、以令牌为核心的架构。令牌发行的概念令人兴奋，因为它有潜力为公共卫生领域的基础设施概念提供资金。如果设计得当，令牌还能助力实现医疗领域智能价值交换的承诺。可编程支付是一个绝佳的机会，可以改善当今医疗领域的资金流动方式，创建更好的激励结构，从而实现我们长期以来一直缺失的协调一致性，尤其是在医生和患者的行为方面。Rasu
    Shrestha 博士说得好：“归根结底，创新实际上关乎行为改变，无论是医生下医嘱、放射科医生对某个发现做出具体诊断或判断，还是患者决定吃那个松饼而不是选择沙拉。创新就是关于行为改变。”
    [详见 `https://www.healthcare-informatics.com/article/upmc-s-rasu-shrestha-innovation-about-behavior-change-technology-should-be-invisible`。]


    我们并不急于投身 ICO 热潮，而是倾向于花时间确保令牌机制与产品融为一体，并且令牌销售的方式既能满足各方的利益，又能确保令牌最终落到真正会使用它的人手中。没人能忽视这项创新的力量。世界任何地方的工程师团队都能开发出一个安全的金融系统，其优势明显优于现有系统。这种模式使得传统系统和传统资助的初创公司难以竞争。


    我们有信心，我们的几个应用案例和待定合作都存在令牌化的机会。我们认为，令牌是一种比现有方式更新、更好的容器。我们对医疗行业中公司与令牌之间新兴的关系非常感兴趣，也感到兴奋。我们同样有兴趣看看是否可以将我们的协作原则应用到令牌分发理念中，尤其是在治理和协调模式方面。


    在目前的市场和产品构建阶段，Hashed Health 所提供的价值简单且必要。我们首先是一家医疗公司，这意味着患者是我们的首要考量。我们团队成员平均拥有十五年的医疗技术经验。我们了解医疗行业，并且能够将医疗挑战与区块链的可能性联系起来。这意味着我们非常擅长医疗领域的区块链应用案例。其次，在一个技术快速变化的世界里，我们不会将客户锁定在特定的技术上。并非每种协议或中间件解决方案都完美适用于特定的业务问题。在
    Hashed，协议服务于问题。第三，我们的协作方式降低了项目风险，提高了成功概率。“只要建好，自有人来”的模式会导致昂贵且脱离实际的学术练习。存在一条更好的路径，你可以将成本和回报分布在围绕成功而组织起来的协作者网络中。我们创建了一家符合我们所构建的去中心化医疗解决方案精神的公司和商业模式。我们将共同创新，共同加速有意义的生产性应用，并实现区块链在医疗领域的潜力。


    ## 区块链即服务


    在前一章中，我们讨论了使用精益方法论来发现集成区块链是否是正确选择；我们还介绍了通过 Hyperledger 可用的开源 DLT 作为一种开源途径。本章将我们之前的讨论扩展到区块链即服务：一种在云端测试区块链部署和智能合约的更沉浸式环境。


    区块链即服务（BaaS）是一种基于云的区块链服务，它为客户提供了一个开发环境，用于编写智能合约、快速构建区块链应用原型，并轻松部署基于区块链的联盟。它消除了进入壁垒，特别是部署区块链网络所需的大额前期硬件成本和专业知识成本。这使得初创公司甚至试图尝试区块链的大型公司能够更好地理解将区块链集成到现有商业模式中的财务问题。BaaS
    提供商的作用类似于传统的网络托管商。提供商管理基础设施、执行硬件升级，并保持网络运行，以便客户能够构建依赖区块链的复杂业务应用程序。在维护方面，提供商依靠网络工具进行资源的合理分配，管理带宽，并为其他托管需求提供支持。使用
    BaaS 服务有助于区块链技术的大规模采用，因为客户可以专注于他们的应用和核心开发，同时避免了创建区块链网络以及处理相关基础设施支持问题的技术复杂性。


    BaaS 现象帮助实现大规模采用的一个非常有趣的国际例子是区块链服务网络（BSN）：这是一个针对区块链开发量身定制的、提供云端托管支持的基础设施。BSN 是中国本地对云基础设施有既得利益的区块链公司之间大规模合作的成果。BSN
    已经集成了六条公有链，包括 Tezos、NEO、Nervos、EOS、IRISnet 和 Ethereum。该项目旨在不久的将来纳入超过十条公有链，并通过技术服务提供更多安全特性，使开发者能够简化开发流程。


    在本章中，我们研究来自四个提供商（云区块链世界的三个主要玩家和一家 ConsenSys 支持的初创公司）的区块链即服务（BaaS）产品：Microsoft
    Azure、Amazon Web Services、Oracle 和 Kaleido。我们的主要关注点将是 BaaS 提供商的独特之处，以及每个提供商如何支持云端新组织/初创公司的成长。

