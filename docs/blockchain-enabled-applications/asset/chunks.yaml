    Introduction


    Blockchain technology is poised to fundamentally change our online world. Bitcoin
    was the first implementation of the blockchain; however, it has ushered in a fundamental
    shift for the offline world by allowing the transfer of value across the World
    Wide Web without the need for a centralized authority. Digitization and democratization
    of trust via the blockchain is enabling a new class of applications and companies
    to grow. Marc Andreessen famously authored a piece in the *Wall Street Journal*
    describing the theme of “software eating the world,” where numerous industries
    are undergoing a rapid transformation after being consumed by software. To that
    end, we hope that our book provides an outlook to the world as blockchain actively
    transforms enterprises and creates entirely new verticals.


    The fundamental shift that blockchain technology represents is a method for moving
    away from having a central trusted authority in a massively distributed network.
    Instead, it allows for having multiple sources of trust that must all agree, based
    on an algorithm, that this transaction can be trusted as valid. Furthermore, most
    blockchain solutions offer an immutable and enduring record of a transaction that
    is hard for any source, trusted or not, to change or modify. This presents a completely
    new level of security, privacy, and trust to our online world. As you will see
    throughout this book, a variety of uses, protocols, and standards make up the
    current blockchain ecosystem.


    We also strive to strike the perfect balance between being a technical reference
    and a how-to handbook that shows practical examples of both current- and future-state
    use cases. While not comprehensive, we do select several high-promise areas where
    blockchain technology is beginning to enable applications for entirely new industry
    segments. We hope this book will inform you and provide a roadmap to your success
    in leveraging blockchain technology to enable new applications for your business.


    Throughout the book, you will see many examples of applications to reinforce key
    points. Early examples extend beyond financial transactions to cover other aspects
    of FinTech, RegTech (regulation), InsuranceTech, GovTech (eVoting, licensing,
    records, and certification), HealthTech, and many others.


    In order to understand these early examples, it is necessary to explore blockchain’s
    history; fundamentals of distributed trust; consensus; hardware; software; and
    encryption in the early chapters. Next, you’ll learn about the network transactions
    and simplified payments in blockchain fundamentals. We’ll compare this with the
    extended capabilities of Ethereum and specific characteristics like how gas works
    and DApps, along with examples of Blockchain-as-a-Service. To further extend these
    capabilities, two chapters are devoted to DAO/Decentralized Organizations and
    the details and examples in these areas. In Chapter [7](#430562_2_En_7_Chapter.xhtml),
    Ethereum tokens are highlighted for value creation, with various technology and
    business-sector examples that highlight the power of smart contracts to allow
    multiple sources of value and rules to be directly embedded in the transactions.
    The next three chapters—[8](#430562_2_En_8_Chapter.xhtml), [9](#430562_2_En_9_Chapter.xhtml),
    and [10](#430562_2_En_10_Chapter.xhtml)—provide updates on blockchain in science
    and blockchain in healthcare, and details on the structure of the Hyperledger
    Project, respectively. Chapter [11](#430562_2_En_11_Chapter.xhtml) focuses on
    many recent developments, such as the EOS blockchain, Enterprise Ethereum Alliance,
    Quorum, R3, and Corda. Chapter [12](#430562_2_En_12_Chapter.xhtml) focuses particularly
    on ICOs and their effect on financial markets and processes. The next chapter
    is a conversation between the authors and John Bass from Hashed Health on building
    a healthcare consortium. Chapter [14](#430562_2_En_14_Chapter.xhtml) highlights
    the new cloud-blockchain computing landscape with an emphasis on Blockchain-as-a-Service.
    The following four chapters—[15](#430562_2_En_15_Chapter.xhtml), [16](#430562_2_En_16_Chapter.xhtml),
    [17](#430562_2_En_17_Chapter.xhtml), and [18](#430562_2_En_18_Chapter.xhtml)—are
    interviews with prominent figures from the blockchain world discussing the transforming
    roles of blockchain in education, artificial intelligence, machine learning, and
    quantum simulations.'
