    ## 监管技术：RegChain


    监管技术是一个具有巨大前景的创新领域。Investopedia 将监管技术定义为“监管与技术的合成词”，旨在通过创新技术解决金融服务领域的监管挑战。监管技术由一群公司组成，这些公司利用技术帮助企业高效、低成本地遵守法规。


    安永（一家税务咨询机构）在其出版物《监管技术创新》中的总结阐述了监管技术带来的若干好处：


    -   支持创新。

    -   提供分析。

    -   降低合规成本。


    还有一些短期好处：


    -   降低成本

    -   可持续且可扩展的解决方案

    -   高级数据分析

    -   无缝连接的控制与风险平台


    长期好处包括以下内容：


    -   积极的客户体验

    -   增强市场稳定性

    -   改善治理

    -   增强监管报告能力^(²⁹)


    德勤创建的一个监管技术模型的当前创新经验是`RegChain`：


    > 德勤与爱尔兰基金及其成员合作，推进了“灯塔项目”，以评估区块链技术服务监管报告要求的能力。该项目测试了一个平台的以下能力：为基金管理人提供独立节点以存储和分析基金数据，同时将监管报告要求编码到智能合约中，用于执行和数据验证。此外，还促成了一个监管节点，允许公司与监管机构之间进行安全可靠的数据交换，并提高整体报告效率和市场透明度。除了技术设计和开发之外，还进行了一项比较业务分析，以审查拟议区块链解决方案的成本效益分析。

    >

    > `RegChain`是使用德勤的快速原型设计流程开发的，该流程采用了实验驱动的敏捷方法。关键阶段包括：解决方案愿景、设计和测试参数的定义、开发冲刺，以及与来自基金管理人和基金管理行业的参与者组成的行业小组委员会进行的持续审查。

    >

    > 该项目的一个关键考量与基石是确保技术人员与来自运营、监管团队和高级管理层的行业代表之间的协作。这被认为是实现全面概念验证设计所必需的，而且更重要的是，有助于定义未来生产解决方案如何实现。^(³⁰)


    使用区块链技术是因为其众多特性和功能可以增强满足报告要求的整体能力：


    -   数据完整性

    -   可靠性

    -   存储与速度

    -   分析

    -   概念验证


    该概念验证创建了`RegChain`，这是一个基于区块链的平台，通过充当安全存储和审查大量监管数据的中央存储库，简化了传统的监管报告流程。`RegChain`已在市场中成功应用于多个案例，并给未来更广泛地采用和享受该模式的好处带来了希望。


    # 新的区块链公司与理念


    《哈佛商业评论》的一篇文章指出：“许多企业尚未从工业时代跃入信息时代，技术变革与组织变革之间的鸿沟正在扩大。”^(³¹)


    高盛在数字创新和区块链应用领域采取了一系列大胆果断的步骤。高盛已投资了`Circle`和`Digital Assets Holdings`等基于区块链技术的公司。此外，2016
    年 10 月，高盛推出了一个在线平台，向消费者提供无担保个人贷款。


    ## Homechain 与 SALT


    另一家新公司是`Homechain`，被描述为贷款发起和监管合规的未来。其商业理念是将住房贷款发起和监管合规流程从 42 天缩短到 5 天。`RegChain`支持向监管机构报告合规情况。目前，区块链技术正处于互联网
    1992 年所处的发展阶段，它正在开启大量新的可能性，有望为金融、医疗、教育、音乐、艺术、政府等众多行业增加价值。^(³²)


    `SALT`借贷平台允许区块链持有者将其持有的资产作为现金贷款的抵押品。`SALT`是第一个基于资产的借贷平台，让区块链资产持有者无需出售其代币即可获得流动性。`SALT`通过一个完全抵押的债务工具，为投资者提供了针对高增长资产类别进行借贷的创新且安全的机会。`SALT`是由非传统抵押品担保的传统贷款。


    每个`SALT`代币都代表`SALT`借贷平台的一个会员资格。该代币是一个`ERC20`智能合约。


    区块链技术正在许多行业掀起波澜。各个行业的公司都在创新，利用区块链创建新应用并创办颠覆性公司。埃森哲的一份报告显示了全球八家最大投资银行的成本数据，并指出到
    2025 年，区块链技术每年可为投资银行节省高达 120 亿美元的成本。投资银行使用区块链技术有多重好处，包括数据传输更安全以及由于数字化媒介带来的管理成本降低。^(³³)

    '
- fmt: '### Ambrosus, Numerai, and SWARM


    Another example of a new company is the Swiss blockchain company, `Ambrosus`.
    This company was launched to employ smart contracts to track food quality. Innovation
    using blockchain technology is happening everywhere.


    `Numerai` is a new kind of hedge fund built by a network of data scientists. `Numerai`
    is a crowdsourced hedge fund for machine learning experts. In the first year of
    collection, 7,500 data scientists created algorithms on the `Numerai` platform,
    as reported by Tech Crunch. `Numerai` announced `Numeraire`, a cryptocurrency
    token to incentivize data scientists around the world to contribute AI. The `Numerai`
    smart contract was deployed to Ethereum, and more than 1.2 million tokens were
    sent to 19,000 data scientists around the world, as reported by `Numerai`.^([^(34)](#fn34))


    The startup company `Swarm` advanced several new concepts into the marketplace
    and was at the leading edge of two emerging concepts, crowdfunding and cryptocurrency,
    while creating a startup in a market with complex and evolving regulations. The
    idea was to transform the way entrepreneurs raise money. `Swarm` created a new
    idea called `crypto-equity`, a token that represents the success of your project.


    `Swarm` was built on the following three components:


    *   Crypto-equity

    *   Crowdsourced due diligence

    *   Coins distributed to all Swarm holders. The best description of Swarm is like
    a `crypto-Kickstarter` offered via coins.

    *   Crypto-Kickstarter offered via coins


    `KICKCO` is a new company with a unique model. Their website states:


    > *KICKCO sits at the intersection of two young industries: blockchain and crowdfunding.
    KICKCO moves crowdfunding from centralized platforms such as Kickstarter, to Ethereum-based
    smart contracts. This not only allows us to implement the crowdfunding model in
    a decentralized way—significantly reducing overhead—it also provides a mechanism
    to protect backers from failed projects—guaranteeing their investment with blockchain-based
    tokens called KickCoins. KICKCO will provide users with a powerful, convenient,
    and up to date platform for both ICO and crowdfunding campaigns. KICKCO is a site
    for automated and independent ICOs, pre-ICOs, and crowdfunding campaigns built
    on Ethereum and funded by cryptocurrencies. The purpose of KICKCO is to solve
    the aforementioned problems* *and create a single platform that will unite the
    creators and backers of ICO and crowdfunding campaigns to form an active up to
    date community.*^([^(35)](#fn35))


    The companies that have been described show some of the innovation and creative
    thought that works around the blockchain models. The blockchain continues to advance
    new and exciting ways for financial markets to become more efficient.


    ### Stellar


    `Stellar` is a DLT-based payment protocol that can perform rapid cross-platform
    transactions between any form of currency by using blockchain anchors. The `Stellar`
    blockchain and payment operations are powered by `Lumen`, the native currency
    of the network. The network serves as a platform to connect financial institutions
    to users, offers a high throughput with rapid transaction approval, and provides
    frictionless conversion between various currencies with micro-transactions.


    In `Stellar`, anchors are entities that can hold a deposit and issue credit to
    users based on the request and within double-spending parameters. An anchor serves
    as a bridge between the different currencies on the `Stellar` network. Besides
    the network-native currency `XLM`, all other external transactions happen in the
    form of credit issued by anchors. The currency exchange mechanism happens through
    pre-defined offers on the `Stellar` network. An offer is a trusted commitment
    to exchange a currency for credit at a fixed rate. In this manner, `Stellar` acts
    as a marketplace for buyers to create credit offers, and for sellers to exchange
    using a credit offer. All the offers for currency exchange are recorded in an
    orderbook that remains consistent across the network for all currencies. To illustrate
    the `Stellar` payment system, let’s work through an example transaction between
    Bob and Alice.


    Bob lives in the United States and wants to send $5,000 to Alice, who lives in
    the United Kingdom. Bob has an account with a bank A in the United States, and
    Alice has an account with bank B in the United Kingdom. Let’s assume that both
    banks are linked to the `Stellar` network through anchors. Bob sends his transaction
    through bank A to the `Stellar` network, and after verification of funds, bank
    B can deduct the amount from Bob’s account. The money is transferred to bank A’s
    pool account and moved into the `Stellar` network in the form of `XLM`. Once the
    money is in `Stellar`, an offer for exchange is used to convert the `XLM` into
    Alice’s native currency. Once the conversion is done, the amount is transferred
    into bank B’s account and credited to Alice. In this manner, the anchors help
    move money between banks on `Stellar`, and offers allow for intranetwork currency
    exchange at a fraction of the cost compared to traditional mechanisms.


    ### Democratizing Investment Opportunities


    Blockchain can help the world’s poorest people. A World Economic Forum article
    described the way that transactions can be recorded in an inexpensive and transparent
    way, allowing for money to be exchanged without fear, fraud, or theft. Blockchain
    smart contracts, sending money internationally, reducing costs, insurance services,
    helping small businesses, humanitarian aid, and blockchain-powered identity systems
    are just some of the ways blockchain can help many people. For those without passports,
    birth certificates, phones, or email, blockchain records can speed processing,
    allowing for a better way of life for many people.


    Through crowdfunding smaller investment amounts and many new capital formation
    ventures, people who have previously not had the opportunity for sharing in the
    economies of a growing financial market can participate. Blockchain helps to democratize
    finance and affect lives in new ways.'
