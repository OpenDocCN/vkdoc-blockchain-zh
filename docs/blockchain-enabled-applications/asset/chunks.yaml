    # 你需要区块链吗？


    区块链技术的热潮像野火一样席卷了企业界。各类企业和公司都组建了小型区块链开发团队，研究如何从使用区块链中受益。热潮之下，区块链世界已出现非常严肃的技术发展迹象，其中许多内容都被收录在本书中。然而，我们仍处于起步阶段。支持区块链应用的业务优势的现实在于，它们可以简化业务流程并显著减少摩擦。在本节中，我们将介绍三种决策模型，它们可以帮助你批判性地分析，将区块链集成到你的项目/公司中是否确实是合适的技术解决方案：


    *   **IBM 模型：** 一种突出区块链关键特性如何融入业务流程和应用的区块链模型。

    *   **Birch-Brown-Parulava 模型：** 一个帮助你在分布式账本的许可型与无许可型实现之间做出选择的模型。由 Consult Hyperion
    的开发人员设计。

    *   **Wüst-Gervais 模型：** 一个结合了前两个模型优点的简化模型。由苏黎世联邦理工学院的两位研究人员设计。


    > **注**

    > 我们为什么选择这三种模型？网上有多种综合性的决策树可帮助企业判断哪些应用场景需要区块链。在本节中，我们选择了最简单的模型来说明将区块链集成到现有基础设施中更重要的设计原则。


    在深入探讨每个模型的细节之前，这三个模型有哪些共同的一般原则？你可以将这些共同的设计作为标准来评估你的业务需求，然后基于一些简单的想法和问题创建针对你业务的特定模型：


    *   **数据库：** 你需要首先理解你的业务为何要使用数据库。区块链使用一个所有参与者都能看到的共享数据库。你是否乐意在你的应用中使用共享账本？数据库会通过网络上的交易持续更新；你的应用能否与一个持续更新的数据库交互？

    *   **写入者：** 数据库通过多个写入它的交易进行更新。区块链的设计允许多个写入者；即，多个实体生成并验证发布到账本的交易。

    *   **无需信任：** 验证写入者身份对你的应用重要吗？这可能会改变你部署的账本实现。区块链的默认设置是，向账本写入的各方之间无需信任。这对你的应用来说足够吗？你网络上的各方是利益冲突还是动机相似？如果他们有相似的兴趣，一些管理信任的区块链构造就可以安全地移除。

    *   **去中介化：** 区块链从网络中移除了一个中心化权威，因此交易被认为是去中心化的。这些交易由网络上的每个节点独立验证和处理。你想要或需要这种去中介化吗？针对你特定的应用场景，拥有一个把关者是否有任何显著的缺点？倾向于选择基于区块链的数据库的良好理由可能包括更低的成本、更快的流程、自动结算或监管影响。

    *   **交易互依性：** 区块链最适合处理那些由写入者发布到区块链时相互依赖的交易。互依性部分指的是交易清算；例如，如果 A 向 B 发送资金，然后 B
    向 C 发送资金，第一个交易未通过前，第二个交易就无法清算。区块链确保了写入者发布的交易有序且快速的处理。换句话说，当维护一个涉及多个用户、具有长历史的交易日志时，区块链才真正大放异彩。


    让我们开始看看决策模型；第一个如图 10-3 所示。


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig3_HTML.jpg](img/430562_2_En_10_Fig3_HTML.jpg)


    **图 10-3** Birch-Brown-Parulava 模型，显示了与账本类型对应的共识算法


    此模型引导用户决策是部署许可型账本还是无许可型账本。这可能导致决定软件基础时产生深刻变化；例如，在以太坊和 Quorum 之间选择。下一个模型来自 IBM，如图
    10-4 所示。


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig4_HTML.jpg](img/430562_2_En_10_Fig4_HTML.jpg)


    **图 10-4** IBM 关于何时使用区块链的决策图


    此流程图中一个需要强调的重要特征是，某些决策如何与区块链固有的特性相关联。例如，合同关系可以通过使用智能合约在区块链上得到良好处理。此图可以作为初步检查，判断区块链与你的项目的兼容性，并了解区块链启用的功能。


    我们在此考虑的最后一个决策模型如图 10-5 所示。它由 Karl Wüst 和 Arthur Gervais（均为区块链研究员）在一篇题为“你需要区块链吗？”的论文中创建，对我们来说，它按顺序集成了前两个模型的概念。


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig5_HTML.jpg](img/430562_2_En_10_Fig5_HTML.jpg)


    **图 10-5** Wüst-Gervais 模型


    该模型试图为两种部署选项以及你是否应该考虑区块链来提供答案。这里的概念与之前的模型相似；然而，此流程图更侧重于网络本身的属性。


    ## Hyperledger 项目


    既然我们已经提供了一个框架来确定组织是否需要区块链，接下来我们将介绍 Hyperledger，这是一个开源项目，也是一套用于部署区块链的工具。Hyperledger
    本质上是 Linux 基金会的一个伞式项目，提供了用于建立、部署和管理开源区块链的底层框架、操作标准、最佳实践或指南以及开发人员工具。这个开源项目组织良好，并得到了一个由数百名贡献者、一个管理委员会和一个技术指导委员会监督的社区的支持。目前，Hyperledger
    框架是一个活跃的研究领域，用于为组织或特定应用的联盟构建企业级区块链。在本节中，我们将讨论七个 Hyperledger 框架和六个开发人员工具。


    > **注**

    > 本节提供了 Hyperledger 项目的广泛概述。有关最新、准确的功能列表，请参考项目网站 [`www.hyperledger.org`](http://www.hyperledger.org)。此外，术语*账本*和区块链在本节中将互换使用。

    '
- fmt: "# Hyperledger Fabric\n\n`Hyperledger Fabric` is a permissioned blockchain\
    \ infrastructure, and was the first proposal for a codebase under the Hyperledger\
    \ umbrella. This project was originally designed as a foundation for building\
    \ blockchain apps on top of distributed ledgers. It featured a collaboration between\
    \ IBM and Digital Holdings, and was eventually incubated into Hyperledger. `Fabric`\
    \ supplies a unique modular architecture wherein core components such as consensus\
    \ mechanism (called configurable consensus) and membership services are plug-and-play.\
    \ In addition, there is a clear delineation of user privileges between nodes in\
    \ the network, and as a result the execution of smart contracts occurs differently\
    \ based on permissions.\n\nA notable feature in `Fabric` is the ability for members\
    \ to conduct private transactions that only pass through a subset of verified\
    \ nodes, without being broadcasted to the whole network. This is done while maintaining\
    \ the integrity of the network, and without needing a centralized authority. Essentially,\
    \ a private transaction involves two components: the use of sub-channels and a\
    \ few nodes with different properties than the rest of the network. Once broadcasted,\
    \ only nodes with higher access privileges can execute and verify the transactions.\
    \ All the other nodes simply “skip” the transactions.\n\nBriefly, there are two\
    \ sets of nodes in `Fabric`: peer nodes that execute smart contracts (called chain\
    \ code), endorse (validate) transactions, and interface the blockchain with applications\
    \ built on top; and executive or orderer nodes that are responsible for maintaining\
    \ the internal consistency of global state across the network. `Orderer` nodes\
    \ ultimately create a block and deliver it to all the members of the network.\
    \ Because of this division of labor between nodes, `Fabric` can support permissioned\
    \ deployments, unlike Bitcoin.\n\n# Hyperledger Burrow\n\n`Burrow` is a fully\
    \ modular blockchain node with a permissioned smart contract execution engine.\
    \ Essentially, it’s a distributed database system that can interpret and execute\
    \ code. The smart contract execution engine functions as a built-in interpreter\
    \ with specifications of an `Ethereum Virtual Machine`. As a result, `Burrow`\
    \ can execute `EVM` smart contract code written in `Solidity` on a containerized\
    \ virtual machine. `Burrow` uses a proof-of-stake consensus algorithm called `Tendermint`\
    \ that allows a high transaction throughput and synchronization that scales with\
    \ increasing network size. Presently, `Burrow` includes a consensus engine that\
    \ maintains network integrity and order of transactions, a smart contract application\
    \ that integrates business logic, an API that interfaces with external applications,\
    \ and an `Application Blockchain Interface` that connects the consensus engine\
    \ to the smart contract app.\n\n# Hyperledger Indy\n\n`Indy` is a distributed\
    \ ledger designed for building applications with a component of decentralized\
    \ identity. The ledger comes with a set of libraries, testing tools, and modular\
    \ components that can be reused to create private digital identities on a blockchain.\
    \ Ultimately, `Indy` aims to create identity specifications and standards that\
    \ are blockchain-agnostic and can work interoperably across any distributed ledger\
    \ that is compatible with the specs. The private information of a user is not\
    \ stored on the ledger itself; instead, `Indy` enables third-party apps to quickly\
    \ verify that trusted organizations have issued private credentials to a member.\
    \ This allows users to have more control over their private data and use the blockchain\
    \ as an authentication gateway to safeguard their information. The use of blockchain\
    \ architecture increases the overall security profile of an application and provides\
    \ an effective safeguard against ransomware.\n\n# Hyperledger Sawtooth\n\n`Sawtooth`\
    \ is an Intel project designed to be a modular blockchain framework for building\
    \ and deploying distributed enterprise-grade blockchains. The project is designed\
    \ with a security architecture that isolates the core blockchain network from\
    \ the smart contracts’ execution such that a bad actor is unable to escalate privileges\
    \ to affect the blockchain. In addition, `Sawtooth` has hot-swapping enabled for\
    \ core components such as the consensus algorithm. The nature of dynamic consensus\
    \ is such that the network can swap consensus algorithms on the fly based on the\
    \ size of the network.\n\nBy default, `Sawtooth` uses `Proof-of-Elapsed-Time`\
    \ as the consensus that provides scalability without high energy consumption.\
    \ As such, `Sawtooth` allows both permissioned and permissionless deployments.\
    \ `Sawtooth` has a parallel scheduler for processing and executing transactions,\
    \ with a safety mechanism to prevent double-spending. This enables multiple updates\
    \ to the same global state and delivers better performance in transaction execution\
    \ compared to traditional models. The first implementation of `Sawtooth` is an\
    \ Intel project called `Sawtooth Lake`. It provides supply-chain management to\
    \ prove the lineage of various goods, particularly fish, and to track the goods\
    \ throughout the shipment.\n\n> **Note**  \n> `Sawtooth` has recently made strides\
    \ in cross-platform compatibility by adding a transaction processor known as `Seth`\
    \ that is based on a `Burrow EVM`. This allows `Seth` to execute `Ethereum` smart\
    \ contracts written in `Solidity` on a `Sawtooth` ledger.\n\n# Hyperledger Grid\n\
    \n`Grid` is a supply-chain implementation by Hyperledger. One of the major enterprise\
    \ use cases for Hyperledger has been supply-chain management. Some of the contributing\
    \ organizations identified a strong proof-of-concept for distributed ledgers in\
    \ this use case, and `Grid` was designed as a specification to solve supply-chain\
    \ problems. From an architecture perspective, `Grid` is not a blockchain framework.\
    \ Instead, it is a collection of frameworks and libraries that allows developers\
    \ to select the appropriate components for building business-specific supply-chain\
    \ applications. The main advantages of having a generalized framework like `Grid`\
    \ include having reference models for implementing members with specific roles\
    \ on the network and nodes, smart contracts that implement common types of business\
    \ logic, and decentralized data structures that are shared by industry partners.\n\
    \n# Hyperledger Iroha\n\n`Iroha` is designed as a mobile application development\
    \ framework that can be incorporated into larger blockchain projects to provide\
    \ a mobile end-point. `Iroha` provides client libraries for application development\
    \ in Android and iOS, enabling rapid prototyping. `Iroha` apps will be cross-compatible\
    \ with `Fabric` and `Sawtooth` ledgers, and the development environment is written\
    \ in `C++` to capture a broader audience of contributors. IoT applications enabled\
    \ with `Iroha` will extend blockchain-based data management to peripheral devices\
    \ and create semi-autonomous networks of connected devices."
  raw: '### Hyperledger Fabric


    Hyperledger Fabric is a permissioned blockchain infrastructure, and was the first
    proposal for a codebase under the Hyperledger umbrella. This project was originally
    designed as a foundation for building blockchain apps on top of distributed ledgers.
    It featured a collaboration between IBM and Digital Holdings, and was eventually
    incubated into Hyperledger. Fabric supplies a unique modular architecture wherein
    core components such as consensus mechanism (called configurable consensus) and
    membership services are plug-and-play. In addition, there is a clear delineation
    of user privileges between nodes in the network, and as a result the execution
    of smart contracts occurs differently based on permissions. A notable feature
    in Fabric is the ability for members to conduct private transactions that only
    pass through a subset of verified nodes, without being broadcasted to the whole
    network. This is done while maintaining the integrity of the network, and without
    needing a centralized authority. Essentially, a private transaction involves two
    components: the use of sub-channels and a few nodes with different properties
    than the rest of the network. Once broadcasted, only nodes with higher access
    privileges can execute and verify the transactions. All the other nodes simply
    “skip” the transactions. Briefly, there are two sets of nodes in Fabric: peer
    nodes that execute smart contracts (called chain code), endorse (validate) transactions,
    and interface the blockchain with applications built on top; and executive or
    orderer nodes that are responsible for maintaining the internal consistency of
    global state across the network. Orderer nodes ultimately create a block and deliver
    it to all the members of the network. Because of this division of labor between
    nodes, Fabric can support permissioned deployments, unlike Bitcoin.


    ### Hyperledger Burrow


    Burrow is a fully modular blockchain node with a permissioned smart contract execution
    engine. Essentially, it’s a distributed database system that can interpret and
    execute code. The smart contract execution engine functions as a built-in interpreter
    with specifications of an Ethereum Virtual Machine. As a result, Burrow can execute
    EVM smart contract code written in Solidity on a containerized virtual machine.
    Burrow uses a proof-of-stake consensus algorithm called Tendermint that allows
    a high transaction throughput and synchronization that scales with increasing
    network size. Presently, Burrow includes a consensus engine that maintains network
    integrity and order of transactions, a smart contract application that integrates
    business logic, an API that interfaces with external applications, and an Application
    Blockchain Interface that connects the consensus engine to the smart contract
    app.


    ### Hyperledger Indy


    Indy is a distributed ledger designed for building applications with a component
    of decentralized identity. The ledger comes with a set of libraries, testing tools,
    and modular components that can be reused to create private digital identities
    on a blockchain. Ultimately, Indy aims to create identity specifications and standards
    that are blockchain-agnostic and can work interoperably across any distributed
    ledger that is compatible with the specs. The private information of a user is
    not stored on the ledger itself; instead, Indy enables third-party apps to quickly
    verify that trusted organizations have issued private credentials to a member.
    This allows users to have more control over their private data and use the blockchain
    as an authentication gateway to safeguard their information. The use of blockchain
    architecture increases the overall security profile of an application and provides
    an effective safeguard against ransomware.


    ### Hyperledger Sawtooth


    Sawtooth is an Intel project designed to be a modular blockchain framework for
    building and deploying distributed enterprise-grade blockchains. The project is
    designed with a security architecture that isolates the core blockchain network
    from the smart contracts’ execution such that a bad actor is unable to escalate
    privileges to affect the blockchain. In addition, Sawtooth has hot-swapping enabled
    for core components such as the consensus algorithm. The nature of dynamic consensus
    is such that the network can swap consensus algorithms on the fly based on the
    size of the network. By default, Sawtooth uses Proof-of-Elapsed-Time as the consensus
    that provides scalability without high energy consumption. As such, Sawtooth allows
    both permissioned and permissionless deployments. Sawtooth has a parallel scheduler
    for processing and executing transactions, with a safety mechanism to prevent
    double-spending. This enables multiple updates to the same global state and delivers
    better performance in transaction execution compared to traditional models. The
    first implementation of Sawtooth is an Intel project called Sawtooth Lake. It
    provides supply-chain management to prove the lineage of various goods, particularly
    fish, and to track the goods throughout the shipment.


    Note


    Sawtooth has recently made strides in cross-platform compatibility by adding a
    transaction processor known as Seth that is based on a Burrow EVM. This allows
    Seth to execute Ethereum smart contracts written in Solidity on a Sawtooth ledger.


    ### Hyperledger Grid


    Grid is a supply-chain implementation by Hyperledger. One of the major enterprise
    use cases for Hyperledger has been supply-chain management. Some of the contributing
    organizations identified a strong proof-of-concept for distributed ledgers in
    this use case, and Grid was designed as a specification to solve supply-chain
    problems. From an architecture perspective, Grid is not a blockchain framework.
    Instead, it is a collection of frameworks and libraries that allows developers
    to select the appropriate components for building business-specific supply-chain
    applications. The main advantages of having a generalized framework like Grid
    include having reference models for implementing members with specific roles on
    the network and nodes, smart contracts that implement common types of business
    logic, and decentralized data structures that are shared by industry partners.


    ### Hyperledger Iroha


    Iroha is designed as a mobile application development framework that can be incorporated
    into larger blockchain projects to provide a mobile end-point. Iroha provides
    client libraries for application development in Android and iOS, enabling rapid
    prototyping. Iroha apps will be cross-compatible with Fabric and Sawtooth ledgers,
    and the development environment is written in C++ to capture a broader audience
    of contributors. IoT applications enabled with Iroha will extend blockchain-based
    data management to peripheral devices and create semi-autonomous networks of connected
    devices.'
  trans: "\n# Hyperledger Fabric\n\n`Hyperledger Fabric` 是一个许可型区块链基础设施，也是 Hyperledger\
    \ 伞状项目下首个代码库提案。该项目最初设计为在分布式账本上构建区块链应用的基础框架。它由 IBM 与 Digital Holdings 合作开发，并最终孵化成为\
    \ Hyperledger 项目。`Fabric` 提供了独特的模块化架构，其中诸如共识机制（称为可配置共识）和成员服务等核心组件均可即插即用。此外，网络中节点之间的用户权限有明确划分，因此智能合约的执行会根据权限不同而有所区别。\n\
    \n`Fabric` 的一个显著特点是，成员能够进行仅通过部分已验证节点传递的私有交易，而无需向整个网络广播。这一过程在保持网络完整性的同时，无需中央权威机构。本质上，私有交易包含两个组成部分：使用子通道，以及几个属性与网络中其他节点不同的节点。一旦广播，只有拥有更高访问权限的节点才能执行和验证交易。所有其他节点则会简单地“跳过”这些交易。\n\
    \n简而言之，`Fabric` 中有两组节点：负责执行智能合约（称为链码）、背书（验证）交易、并将区块链与基于其上构建的应用进行对接的 peer 节点；以及负责维护网络中全局状态内部一致性的执行或排序节点。`Orderer`\
    \ 节点最终创建区块并将其交付给网络中的所有成员。正是由于节点间的这种分工，`Fabric` 才能支持许可型部署，这与比特币不同。\n\n# Hyperledger\
    \ Burrow\n\n`Burrow` 是一个完全模块化的区块链节点，带有一个许可型智能合约执行引擎。本质上，它是一个能够解释和执行代码的分布式数据库系统。该智能合约执行引擎作为一个内置的解释器，其规格遵循\
    \ `Ethereum Virtual Machine` 的标准。因此，`Burrow` 可以在容器化的虚拟机上执行用 `Solidity` 编写的 `EVM`\
    \ 智能合约代码。`Burrow` 使用名为 `Tendermint` 的权益证明共识算法，该算法支持高交易吞吐量，并能随网络规模扩大而同步扩展。目前，`Burrow`\
    \ 包含一个维护网络完整性和交易顺序的共识引擎、一个集成业务逻辑的智能合约应用、一个与外部应用交互的 API，以及一个将共识引擎与智能合约应用连接起来的 `Application\
    \ Blockchain Interface`。\n\n# Hyperledger Indy\n\n`Indy` 是一个分布式账本，专为构建包含去中心化身份组件的应用而设计。该账本附带了一套库、测试工具和模块化组件，这些组件可被复用在区块链上创建私有数字身份。最终，`Indy`\
    \ 旨在创建与区块链无关的身份规范和标准，并能在任何兼容这些规范的分布式账本上实现互操作。用户的隐私信息不存储在账本本身；相反，`Indy` 使第三方应用能够快速验证受信任的组织是否已向成员颁发了私有凭证。这使得用户能更好地控制自己的私有数据，并将区块链用作身份验证网关来保护其信息。使用区块链架构提高了应用的整体安全水平，并提供了针对勒索软件的有效防护。\n\
    \n# Hyperledger Sawtooth\n\n`Sawtooth` 是一个英特尔项目，被设计成一个模块化的区块链框架，用于构建和部署分布式企业级区块链。该项目采用了一种安全架构，将核心区块链网络与智能合约的执行隔离开来，使得恶意行为者无法提升权限以影响区块链。此外，`Sawtooth`\
    \ 支持对共识算法等核心组件进行热插拔。动态共识的特性使得网络能够根据网络规模动态地切换共识算法。\n\n默认情况下，`Sawtooth` 使用 `Proof-of-Elapsed-Time`\
    \ 作为共识算法，该算法在实现可扩展性的同时不会造成高能耗。因此，`Sawtooth` 同时支持许可型和非许可型部署。`Sawtooth` 拥有一个并行调度器来处理和执行交易，并配备了一种防止双重支付的安全机制。这使得对同一全局状态的多次更新成为可能，并且在交易执行性能上优于传统模型。`Sawtooth`\
    \ 的第一个实现是英特尔名为 `Sawtooth Lake` 的项目。它提供供应链管理，用于证明各种商品（尤其是鱼类）的来源，并跟踪货物在整个运输过程中的状态。\n\
    \n> **注意**  \n> `Sawtooth` 最近通过添加一个名为 `Seth` 的交易处理器，在跨平台兼容性方面取得了进展，该处理器基于 `Burrow\
    \ EVM`。这使得 `Seth` 能够在 `Sawtooth` 账本上执行用 `Solidity` 编写的 `Ethereum` 智能合约。\n\n# Hyperledger\
    \ Grid\n\n`Grid` 是 Hyperledger 的一个供应链实现方案。Hyperledger 的主要企业用例之一就是供应链管理。一些贡献组织在这一用例中识别出了分布式账本的强大概念验证，于是\
    \ `Grid` 被设计为解决供应链问题的规范。从架构角度来看，`Grid` 并非一个区块链框架。相反，它是一整套框架和库的集合，允许开发者选择适当的组件来构建特定业务的供应链应用。拥有像\
    \ `Grid` 这样的通用框架的主要优势包括：为在网络和节点上实现具有特定角色的成员提供参考模型、实现常见业务逻辑类型的智能合约，以及由行业合作伙伴共享的去中心化数据结构。\n\
    \n# Hyperledger Iroha\n\n`Iroha` 被设计成一个移动应用开发框架，可以整合到更大的区块链项目中，以提供移动端接口。`Iroha`\
    \ 提供了用于在 Android 和 iOS 平台上进行应用开发的客户端库，支持快速原型开发。`Iroha` 应用将与 `Fabric` 和 `Sawtooth`\
    \ 账本实现交叉兼容，其开发环境使用 `C++` 编写，以吸引更广泛的贡献者群体。借助 `Iroha` 实现的物联网应用，将把基于区块链的数据管理扩展到外围设备，并创建半自主的互联设备网络。\n"
- fmt: '### Hyperledger Besu


    `Hyperledger Besu`是一个基于Java的开源以太坊客户端，它实现了企业以太坊联盟（EEA）规范。`Besu`可以在以太坊主网、Rinkeby等测试网络，甚至兼容规范的私有许可网络上运行。它包含多种共识算法，包括工作量证明与权威证明。此外，其权限模型旨在让`Besu`适用于联盟链环境。EEA规范为开发者构建运行于以太坊区块链上的应用建立了一套通用接口。组件的标准化使得来自开源和闭源项目的开发团队无需依赖于特定于供应商的应用元素。`Besu`实现了所有符合EEA规范的企业级特性。下面我们来了解`Besu`的三个关键特性：


    - **以太坊虚拟机（EVM）：** `Besu`通过EEA规范实现了完整的EVM，能够通过主网上的交易执行智能合约。

    - **共识：** `Besu`为不同任务实现了多种共识算法；例如，区块验证通过权威证明（PoA）算法完成。这是一种参与者彼此熟识并具有一定信任基础的共识算法。`IBFT
    2.0`是`Besu`采用的PoA算法，其中交易和区块由一组称为验证者的受信任账户进行验证。这些验证者轮流创建下一个区块，现有验证者可以投票添加或移除其他验证者。此外，由于验证者的可信性质，所有区块都添加到主链上，即不存在分叉。

    - **隐私与许可账本：** `Hyperledger Besu`提供了在参与方之间保持交易私密性的能力。所有其他方无法访问私有交易的内容、发起方地址或收件人列表。这是通过`Besu`的私有交易管理器实现的。此外，私有交易支持许可网络，只有预先指定的账户才能参与特定交易或交易负载。所有其他没有适当访问权限的节点仅会传递交易，而无法访问任何细节。


    为了提供更全面的开发环境，七个Hyperledger框架还附带以下六种开发者工具（还有更多工具正在积极开发中）：


    1.  **Hyperledger Explorer：** `Explorer`是一个区块链模块，旨在构建与账本交互的Web应用。它可用于查看基本网络信息、新创建的区块或交易地址，或查询交易数据及其他公开的区块参数。

    2.  **Hyperledger Caliper：** `Caliper`是一个为区块链实现计算性能数据的报告工具。使用`Caliper`，您可以选择预定义的用例，并获得关于交易延迟、资源利用率以及账本上每秒交易数等性能因素的报告。`Caliper`能为计划采用分布式账本的组织辅助商业决策。

    3.  **Hyperledger Composer：** `Composer`是一个基于UI的快速原型开发工具和开发框架，用于创建区块链应用和智能合约。此外，`Composer`还提供了一个用于部署应用的测试网络。该开发环境对用户友好，依托于`Node.js`和`NPM`等广泛熟悉的框架。`Composer`还附带打包了示例业务抽象，这些抽象模拟了常见的业务应用，并提供了部署脚本，以便在沙盒中进行实时测试。下一节我们将再次讨论`Composer`的快速原型开发方面。

    4.  **Hyperledger Quilt：** `Quilt`是跨账本协议（ILP）的Java实现，它支持以区块链无关的方式，在包括法定货币在内的任何去中心化网络上进行支付。`Quilt`提供了发送和接收交易所需的核心库和数据类型。这些库被抽象出来，作为开发者可用于构建应用的支付逻辑。使用`Quilt`构建的应用可以请求认证并访问其他账本或任何与Interledger兼容的支付系统。

    5.  **Hyperledger Cello：** `Cello`是一个区块链供应仪表盘，可以减少设置、管理和使用分布式账本所需的管理工作量。对于系统管理员而言，`Cello`有助于维护区块链网络的生命周期，支持自定义区块链参数，并扩展传统的监控和日志工具，以报告区块链网络的运行状况。最终，`Cello`将成为通过`Hyperledger`设置区块链的前端界面。此外，`Cello`中的高级部署功能使其成为一个用于生成和维护按需区块链的区块链即服务平台。这项链服务与多种基础设施跨平台兼容，包括虚拟机（VSphere）和容器平台（Docker,
    Kubernetes）。

    6.  **Hyperledger Ursa：** `Ursa`是一个共享功能的密码学库，它标准化了`Hyperledger`的安全功能。这使得开发者能够精简代码，降低漏洞风险，并提升网络的整体安全水平。值得注意的是，`Ursa`包含一个用于创建零知识证明的通用库，该库将可供任何与`Ursa`兼容的账本实现使用。'
  raw: '### Hyperledger Besu


    Hyperledger Besu is an open source, Java-based Ethereum client that implements
    the Enterprise Ethereum Alliance (EEA) specification. Besu can run on the Ethereum
    main net, test networks such as Rinkeby, and even private permissioned networks
    that are compatible with the specs. It includes multiple consensus algorithms,
    including proof-of-work and proof-of-authority. In addition, the permissioning
    schema is designed to allow Besu in a consortia setting. EEA spec establishes
    a set of common interfaces for developers building applications that run on the
    Ethereum blockchain. The standardization of components allows developer teams
    from both open source and closed projects to not rely on vendor-specific application
    elements. Besu implements all enterprise-grade features in alignment with the
    EEA spec. Let’s go over three key features of Besu:


    *   **Ethereum Virtual Machine (EVM):** Besu implements a full EVM through EEA
    specifications that allows execution of a smart contract through transactions
    on the Ethereum main net.


    *   **Consensus:** Besu implements multiple consensus algorithms for different
    tasks; for instance, block validation is done via a Proof-of-Authority (PoA) algorithm.
    This is a consensus algorithm where the participants are known to each other and
    have an established level of trust. IBFT 2.0 is the choice of PoA implemented
    by Besu where transactions and blocks are verified by a set of trusted accounts
    called validators. These validators take turns creating the next block, and existing
    validators can vote to add or remove other validators. In addition, due to the
    trusted nature of validators, all blocks are added to the main chain; i.e., there
    are no forks.


    *   **Privacy and permissioned ledger:** Hyperledger Besu provides the ability
    to keep transactions private between parties. All other parties cannot access
    the content of a private transaction, originating address, or list of recipients.
    This is implemented through a Private Transaction Manager by Besu. In addition,
    private transactions allow for a permissioned network where only pre-specified
    accounts can participate in certain transactions or transactional payload. All
    other nodes without proper access privileges simply pass along the transaction
    without accessing any details.


    For a more comprehensive development environment, the seven Hyperledger frameworks
    are accompanied by the following six developer tools (with many more in active
    development):


    1.  **Hyperledger Explorer:** Explorer is a blockchain module designed for making
    web applications that interface with a ledger. It can be used for viewing basic
    network information, newly created blocks, or transaction addresses; or for querying
    transaction data and other block parameters that are made publicly available.


    2.  **Hyperledger Caliper:** Caliper is a reporting tool created to compute performance
    data for blockchain implementations. With Caliper, you can choose predefined use
    cases and get a report on performance factors, including transaction latency,
    resource utilization, and transactions per second on your ledger. Caliper can
    provide help in making business decisions for an organization that is planning
    to incorporate a distributed ledger.


    3.  **Hyperledger Composer:** Composer is a UI-based rapid-prototyping tool and
    a development framework to create blockchain apps and smart contracts. In addition,
    Composer provides a test network on which to deploy your applications. The development
    environment is user friendly, relying on widely familiar frameworks such as Node.js
    and NPM. Composer also comes packaged with sample business abstractions that model
    common business applications and deployment scripts to make it easier for live-testing
    in a sandbox. We will return to the rapid-prototyping aspect of Composer later
    in the next section.


    4.  **Hyperledger Quilt:** Quilt is a Java implementation of the Interledger Protocol
    (ILP) that enables payments in a blockchain-agnostic manner across any decentralized
    network, including fiat. Quilt provides the core libraries and data types necessary
    for sending and receiving transactions. The libraries are abstracted and provided
    as payment logic that developers can use for building applications. The apps built
    with Quilt can request authentication and access other ledgers or any payment
    system compatible with Interledger.


    5.  **Hyperledger Cello:** Cello is a blockchain-provisioning dashboard that reduces
    the administrative workload required for setting up, managing, and using distributed
    ledgers. For system administrators, Cello can be helpful for maintaining the lifecycle
    of blockchain networks, supporting customized blockchain parameters, and extending
    traditional monitoring and logging tools to report on a blockchain network’s health.
    Eventually, Cello will become the frontend for setting up blockchains through
    Hyperledger. In addition, the advanced deployment features in Cello make it function
    as a Blockchain-as-a-Service platform for generating and maintaining on-demand
    blockchains. This chain service is cross-compatible with multiple infrastructures,
    including virtual machines (VSphere) and container platforms (Docker, Kubernetes).


    6.  **Hyperledger Ursa:** Ursa is a cryptographic library of shared functions
    that standardizes security functions for Hyperledger. This allows developers to
    streamline the code, reducing chances of vulnerabilities and increasing the overall
    security profile of the network. Notably, Ursa contains a generic library for
    creating zero-knowledge proofs, and this library will be available to any ledger
    implementation that is compatible with Ursa.'
  trans: '

    ### Hyperledger Besu


    `Hyperledger Besu` 是一个基于 Java 的开源以太坊客户端，它实现了企业以太坊联盟（EEA）规范。`Besu` 可以在以太坊主网、Rinkeby
    等测试网络，甚至兼容规范的私有许可网络上运行。它包含多种共识算法，包括工作量证明与权威证明。此外，其权限模型旨在让 `Besu` 适用于联盟链环境。EEA
    规范为开发者构建运行于以太坊区块链上的应用建立了一套通用接口。组件的标准化使得来自开源和闭源项目的开发团队无需依赖于特定于供应商的应用元素。`Besu` 实现了所有符合
    EEA 规范的企业级特性。下面我们来了解 `Besu` 的三个关键特性：


    - **以太坊虚拟机（EVM）：** `Besu` 通过 EEA 规范实现了完整的 EVM，能够通过主网上的交易执行智能合约。

    - **共识：** `Besu` 为不同任务实现了多种共识算法；例如，区块验证通过权威证明（PoA）算法完成。这是一种参与者彼此熟识并具有一定信任基础的共识算法。`IBFT
    2.0` 是 `Besu` 采用的 PoA 算法，其中交易和区块由一组称为验证者的受信任账户进行验证。这些验证者轮流创建下一个区块，现有验证者可以投票添加或移除其他验证者。此外，由于验证者的可信性质，所有区块都添加到主链上，即不存在分叉。

    - **隐私与许可账本：** `Hyperledger Besu` 提供了在参与方之间保持交易私密性的能力。所有其他方无法访问私有交易的内容、发起方地址或收件人列表。这是通过
    `Besu` 的私有交易管理器实现的。此外，私有交易支持许可网络，只有预先指定的账户才能参与特定交易或交易负载。所有其他没有适当访问权限的节点仅会传递交易，而无法访问任何细节。


    为了提供更全面的开发环境，七个 Hyperledger 框架还附带以下六种开发者工具（还有更多工具正在积极开发中）：


    1.  **Hyperledger Explorer：** `Explorer` 是一个区块链模块，旨在构建与账本交互的 Web 应用。它可用于查看基本网络信息、新创建的区块或交易地址，或查询交易数据及其他公开的区块参数。

    2.  **Hyperledger Caliper：** `Caliper` 是一个为区块链实现计算性能数据的报告工具。使用 `Caliper`，您可以选择预定义的用例，并获得关于交易延迟、资源利用率以及账本上每秒交易数等性能因素的报告。`Caliper`
    能为计划采用分布式账本的组织辅助商业决策。

    3.  **Hyperledger Composer：** `Composer` 是一个基于 UI 的快速原型开发工具和开发框架，用于创建区块链应用和智能合约。此外，`Composer`
    还提供了一个用于部署应用的测试网络。该开发环境对用户友好，依托于 `Node.js` 和 `NPM` 等广泛熟悉的框架。`Composer` 还附带打包了示例业务抽象，这些抽象模拟了常见的业务应用，并提供了部署脚本，以便在沙盒中进行实时测试。下一节我们将再次讨论
    `Composer` 的快速原型开发方面。

    4.  **Hyperledger Quilt：** `Quilt` 是跨账本协议（ILP）的 Java 实现，它支持以区块链无关的方式，在包括法定货币在内的任何去中心化网络上进行支付。`Quilt`
    提供了发送和接收交易所需的核心库和数据类型。这些库被抽象出来，作为开发者可用于构建应用的支付逻辑。使用 `Quilt` 构建的应用可以请求认证并访问其他账本或任何与
    Interledger 兼容的支付系统。

    5.  **Hyperledger Cello：** `Cello` 是一个区块链供应仪表盘，可以减少设置、管理和使用分布式账本所需的管理工作量。对于系统管理员而言，`Cello`
    有助于维护区块链网络的生命周期，支持自定义区块链参数，并扩展传统的监控和日志工具，以报告区块链网络的运行状况。最终，`Cello` 将成为通过 `Hyperledger`
    设置区块链的前端界面。此外，`Cello` 中的高级部署功能使其成为一个用于生成和维护按需区块链的区块链即服务平台。这项链服务与多种基础设施跨平台兼容，包括虚拟机（VSphere）和容器平台（Docker,
    Kubernetes）。

    6.  **Hyperledger Ursa：** `Ursa` 是一个共享功能的密码学库，它标准化了 `Hyperledger` 的安全功能。这使得开发者能够精简代码，降低漏洞风险，并提升网络的整体安全水平。值得注意的是，`Ursa`
    包含一个用于创建零知识证明的通用库，该库将可供任何与 `Ursa` 兼容的账本实现使用。

    '
- fmt: '# Rapid Prototyping with Hyperledger Composer


    Hyperledger Composer is a suite of high-level application abstractions to model
    your business. Once you decide that your business might benefit from using a blockchain,
    you can use Composer to create a blockchain-based prototype of your application.
    The following is an outline of the process involved in making a prototype:


    - Install Hyperledger Composer Tools or try Composer online in the Playground.

    - Define business network, assets, and transactions.

    - Implement any transaction processors.

    - Test the business network within Composer-UI.

    - Deploy business network to a live Hyperledger Fabric blockchain instance.

    - Create a sample application on top of the low-level abstraction.

    - Connect other applications to this deployment through RESTful API or Node.js.


    The functional output of Composer is called a business network archive (`BNA`),
    which can then be deployed to a test net or a live Fabric blockchain. A business
    network contains participants that are connected via a role/identity, assets that
    propagate over the network, transactions that describe asset exchanges, contracts
    that serve as rules that underpin transactions, and finally the ledger that records
    all transactions. Aside from modeling components of a business network, the `BNA`
    also contains transaction processors, access control lists, and query definitions.
    A transaction processor (written in JavaScript) implements and enforces business
    logic on these model elements. The access control lists describe rules that allow
    fine-tuned control over which participants can have access to what assets in the
    business network after satisfying certain conditions. The language used to describe
    these access lists is very sophisticated and can capture complex ownership statements.
    Keeping access control separate from transaction processor logic allows the developers
    to maintain and update the two components rapidly, without any fears about compatibility
    or breaking functionality.


    **Note**


    In this section, our focus is on presenting the fundamentals of Hyperledger Composer
    so that an interested reader can pick up on Composer’s modeling language quicker
    from the reference material. Designing a full business network model would be
    beyond the scope of this book.


    Let’s go through the modeling language and discuss the foundations of Composer
    in depth:


    - **Assets:** Represent the resources being exchanged between users on the network.
    Formally, the description scheme used to define assets is done in the order of
    `keyword - class - identifier - properties - relationships`. Other optional fields
    may be added here as well, but this general scheme is followed throughout the
    modeling language. Assets are defined with the keyword `asset` and have a domain-relevant
    class name associated with them. For instance, a car can be identified by VIN
    as: `asset Vehicle identified by vin`. The assets have a set of properties that
    define them; in the case of a vehicle, it can be a description stored as a `string
    String` description. Additionally, the assets can have relationships to other
    resources in the modeling language, such the user that owns the car, denoted by
    `--> User owner`. All the assets are stored in an asset registry available to
    the network.


    - **Participants:** Represent the users (or counterparties) in the network. Participants
    are key to all interactions happening on the network, and they are described the
    same way as an asset. Participants are represented using the `participant` keyword,
    and they also have a class name relevant to their domain, such as buyer or seller.
    A full description may be given as `participant Buyer identified by email` and
    a property of `String firstName`. All the participants are stored in a participant
    registry, which may not be available to the users of the network.


    - **Transactions:** Represent the movement of assets across the network, and the
    lifecycle of assets as they are exchanged. Transactions are described in the same
    way as participants or assets, and a sale offer from a participant may be defined
    as `transaction Offer identified by transactionid` and with a property of `Double
    saleprice`.


    - **Concepts:** Concepts are abstract classes that don’t belong to assets, participants,
    or transactions. Concepts are often used to add specifiers to an asset or transaction
    and typically are contained by one of the three. For instance, a concept of address
    can be described as `Concept Address` with properties of `String street` and `String
    city_default ="Orlando"`. Now an asset can use this concept to specify an address
    property.


    - **Transaction processors:** Represents the business logic to perform state changes
    and global updates to the blockchain as a result of transactions’ being broadcasted
    to the network. Essentially, these processors provide an implementation for transactions
    to act on the model. They are written in a separate js file and utilize the definitions
    from the business network model.


    These components are shown graphically in Figure 10-6.


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig6_HTML.jpg](images/430562_2_En_10_Chapter/430562_2_En_10_Fig6_HTML.jpg)


    **Figure 10-6** Components of the business network archive


    ## Summary


    In this chapter, we studied three distinct areas relevant to blockchain research
    and development: using lean startup methodology to develop high-risk research
    ideas into products that customers want; how to determine if your organization
    needs a blockchain; and an overview of Hyperledger Project—an open source effort
    to build enterprise-grade blockchains. The lean methodology was broken down into
    the business-model canvas by Alexander Osterwalder and the chasm of product-market
    fit by Geoffrey Moore. These models helped us better understand how products can
    be designed to capture the market. Then, we presented three models to determine
    if your project or company can benefit from using a blockchain and how to decide
    on the type of deployment. Finally, we briefly reviewed the Hyperledger Project,
    which provides highly customizable blockchain implementations that capture business
    logic in templates. We hope that our readers can take away practical and applicable
    tips from this chapter to help bring their own ideas forward.'
