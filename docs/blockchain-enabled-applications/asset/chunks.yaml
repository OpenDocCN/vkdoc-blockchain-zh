- fmt: "### Aragon for Social Good: Fundraising App\n\n`Aragon` has made it easier\
    \ to create a `DAO`, and the addition of a fundraising app enables social entrepreneurship\
    \ use cases to be built. In this section, we briefly describe how fundraising\
    \ campaigns work in `Aragon` and the new potential for blockchain-based social\
    \ ventures.\n\nRaising a round of funding on the `Aragon` blockchain is very different\
    \ from traditional fundraising. Currently, there are two options for fundraising\
    \ implemented in `Aragon`. The first one involves raising a round from a specific\
    \ investor in return for a stake in your company. The second option is to do a\
    \ crowdsale where any participant of the network can buy stock in your company.\
    \ The core idea is simple: once your `DAO` is operational, you can issue shares,\
    \ and then you can offer a class of those shares to an investor in return for\
    \ `ether`. These shares can be offered either to an individual investor or more\
    \ broadly to any participant in the network during a crowdsale. There are significant\
    \ differences between traditional fundraising and the fundraising done through\
    \ a `DAO`. Let’s take a look at a few of these differences.\n\nFundraising on\
    \ a `DAO` requires more structure so as to remain decentralized in decision-making.\
    \ The project team leading the fundraiser is represented as the council in a `DAO`.\
    \ The council members have a separate token and enforce their decisions through\
    \ voting that resembles a multisig account (multiple signatures needed to perform\
    \ an action). It is important to note that the privileges of council members are\
    \ limited by design to reduce their influence over the `DAO` members, and over\
    \ the fundraiser. The council has four main responsibilities: deciding who should\
    \ be included in the council, opening up the pre-sale campaign, transferring assets\
    \ owned by the `DAO` into the vault, and opening votes for `DAO` members to pass\
    \ resolutions that affect the organization.\n\n> **Note**  \n> There is a distinction\
    \ between council members and *regular* `DAO` members. This concept is confusing\
    \ to describe in abstract terms, so let us work with this example: the Council\
    \ members will be represented by a token called `High Table (HTBL)`, and `HTBL`\
    \ will be used in transactions to designate all council responsibilities. `DAO`\
    \ members use tokens that are purchased during the pre-sale (opening event for\
    \ the fundraiser). These members, also known as token holders, will be represented\
    \ by a separate token, `Continental (CTL)`, and `CTL` will be used to influence\
    \ the `DAO` and its daily activities.\n\n`DAO` members are defined as non-council\
    \ token holders that provide input toward the overall direction and decision-making\
    \ of the `DAO`; enjoy a variety of privileges, including redeeming tokens bought\
    \ in pre-sale and exchanging them for `ETH`; deciding which apps are installed\
    \ and what permissions are updated; deciding how much of the funds gets transferred\
    \ by the council into the vault; and deciding how the fundraising fees and collateralization\
    \ setting should be updated.\n\nPre-sale marks the beginning of a fundraiser and\
    \ is a crucial event with a goal of selling a pre-specified number of tokens (following\
    \ our example, we would sell `CTL` tokens). During pre-sale, anyone on the `Ethereum`\
    \ network can purchase `CTL` tokens by first buying `DAI`. `DAI` is a `Stablecoin`\
    \ on `Ethereum` that attempts to maintain a value of `$1.00 USD`. In pre-sale\
    \ setup, an organization can set a price for their new tokens in `DAI`, and buyers\
    \ will convert their `DAI` to purchase this new token. If the pre-sale event reaches\
    \ the pre-specified goal, it is considered successful, and now the trading period\
    \ can begin for the new token. Otherwise, the fundraiser is considered to have\
    \ failed and all invested capital is returned to involved parties. More advanced\
    \ options on token trading, such as cliff vesting, are available in the `Fundraising`\
    \ app; however, this is beyond the scope of this chapter.\n\n## Identity Management\
    \ Use Case\n\nThe identity management use case in `Aragon` is no longer under\
    \ active development, which was explained by `Aragon` devs as having been a bridge\
    \ until they could extend and generalize more existing features:\n\n> *Although\
    \ Aragon previously integrated with Keybase, the existence of ENS now allows us\
    \ to build an identity system that avoids relying on a centralized 3rd party.\
    \ In doing so, we lost a number of features that were previously provided by Keybase,\
    \ such as off-chain storage (e.g., profile photos or other service identifiers).\
    \ In the future, we plan to integrate Aragon ID with decentralized off-chain storage\
    \ services, such as Swarm or IPFS, to provide such functionality.*\n\n> *In light\
    \ of this, Aragon ID is a simple identity system to bridge the gap until such\
    \ projects are ready. It leverages the existing ENS infrastructure to securely\
    \ provide two-way, first-in-first-served mappings of addresses to* `<name>.aragonid.eth`\
    \ *identifiers. Afterwards, users will be able to resolve and reverse-resolve\
    \ any* `<name>.aragonid.eth` *to an address and trust that their name registrations\
    \ are safely in their own control.*\n\n> **Editor Note**  \n> We decided to keep\
    \ this use case because it provides value in highlighting the thinking behind\
    \ an approach toward identity and building a hybrid organization where users are\
    \ identified, yet the organization is powered by smart contracts.\n\nThe concept\
    \ of identity is a conundrum for crypto-technologies because it requires a certain\
    \ level of trust to be inherent in the network architecture. Most generalized\
    \ approaches toward integrating identity in a consensus-based system usually involve\
    \ some variation of cryptographic proofs and signatures. In `Aragon`, an external\
    \ service called `Keybase` along with a registry contract were used to establish\
    \ a “trustless” two-way verification scheme. The logic behind this scheme is very\
    \ straightforward: establish that a particular address belongs to you, and then\
    \ verify that your username owns the address. How do these two statements reconcile\
    \ in a functional setting?\n\nLet’s introduce the two components that made a two-way\
    \ bridge possible. In simple terms, `Keybase` is a public–private keypair management\
    \ service with `OAuth` integrations that allow a user to authenticate and verify\
    \ accounts. `Keybase` can serve as a centralized hub for a user to link and verify\
    \ external accounts. For instance, after creating an account on `Keybase`, the\
    \ public profile of a user can display all their linked social media accounts,\
    \ establishing their legitimacy and connection. The second component is a registry\
    \ contract that provides an account-to-address association mechanism from within\
    \ the `Aragon` network. The two-way bridge is formed from using the address (linked\
    \ to an account on the network) to cryptographically sign a file that can then\
    \ be hosted on `Keybase` (linked to user identity through various social media\
    \ integrations).\n\n> **Note**  \n> It is crucial to keep in mind that in `Aragon`,\
    \ identity is an opt-in feature. The breadth of use cases developed for `Aragon`\
    \ range from providing complete anonymity, such as in the case of a `DAO`, to\
    \ full usernames integrating `Keybase` for a next-generation blockchain company.\n\
    \nSo, how would a user make their identity available to the two-way verification\
    \ scheme? The workflow in `Keybase Registry 2.0` was simplified to one simple\
    \ step: upload the signed proof to `KBFS`. This introduces a few new components,\
    \ as follows:\n\n- **Keybase filesystem (KBFS)** : A cryptographically secure\
    \ local and cloud storage directory. `KBFS` only allows the owner of the directory\
    \ to add new files, and these files are made available publicly. In `KBFS`, every\
    \ file added to the directory is automatically signed by the owner’s private key,\
    \ and the signature can be verified by anyone through `Keybase`."
  raw: '### Aragon for Social Good: Fundraising App


    Aragon has made it easier to create a DAO, and the addition of a fundraising app
    enables social entrepreneurship use cases to be built. In this section, we briefly
    describe how fundraising campaigns work in Aragon and the new potential for blockchain-based
    social ventures.


    Raising a round of funding on the Aragon blockchain is very different from traditional
    fundraising. Currently, there are two options for fundraising implemented in Aragon.
    The first one involves raising a round from a specific investor in return for
    a stake in your company. The second option is to do a crowdsale where any participant
    of the network can buy stock in your company. The core idea is simple: once your
    DAO is operational, you can issue shares, and then you can offer a class of those
    shares to an investor in return for ether. These shares can be offered either
    to an individual investor or more broadly to any participant in the network during
    a crowdsale. There are significant differences between traditional fundraising
    and the fundraising done through a DAO. Let’s take a look at a few of these differences.


    Fundraising on a DAO requires more structure so as to remain decentralized in
    decision-making. The project team leading the fundraiser is represented as the
    council in a DAO. The council members have a separate token and enforce their
    decisions through voting that resembles a multisig account (multiple signatures
    needed to perform an action). It is important to note that the privileges of council
    members are limited by design to reduce their influence over the DAO members,
    and over the fundraiser. The council has four main responsibilities: deciding
    who should be included in the council, opening up the pre-sale campaign, transferring
    assets owned by the DAO into the vault, and opening votes for DAO members to pass
    resolutions that affect the organization.


    Note


    There is a distinction between council members and *regular* DAO members . This
    concept is confusing to describe in abstract terms, so let us work with this example:
    the Council members will be represented by a token called High Table (HTBL), and
    HTBL will be used in transactions to designate all council responsibilities. DAO
    members use tokens that are purchased during the pre-sale (opening event for the
    fundraiser). These members, also known as token holders, will be represented by
    a separate token, Continental (CTL), and CTL will be used to influence the DAO
    and its daily activities.


    DAO members are defined as non-council token holders that provide input toward
    the overall direction and decision-making of the DAO; enjoy a variety of privileges,
    including redeeming tokens bought in pre-sale and exchanging them for ETH; deciding
    which apps are installed and what permissions are updated; deciding how much of
    the funds gets transferred by the council into the vault; and deciding how the
    fundraising fees and collateralization setting should be updated.


    Pre-sale marks the beginning of a fundraiser and is a crucial event with a goal
    of selling a pre-specified number of tokens (following our example, we would sell
    CTL tokens). During pre-sale, anyone on the Ethereum network can purchase CTL
    tokens by first buying DAI. DAI is a Stablecoin on Ethereum that attempts to maintain
    a value of $1.00 USD. In pre-sale setup, an organization can set a price for their
    new tokens in DAI, and buyers will convert their DAI to purchase this new token.
    If the pre-sale event reaches the pre-specified goal, it is considered successful,
    and now the trading period can begin for the new token. Otherwise, the fundraiser
    is considered to have failed and all invested capital is returned to involved
    parties. More advanced options on token trading, such as cliff vesting, are available
    in the Fundraising app; however, this is beyond the scope of this chapter.


    ## Identity Management Use Case


    The identity management use case in Aragon is no longer under active development,
    which was explained by Aragon devs as having been a bridge until they could extend
    and generalize more existing features:


    > *Although Aragon previously integrated with Keybase, the existence of ENS now
    allows us to build an identity system that avoids relying on a centralized 3rd
    party. In doing so, we lost a number of features that were previously provided
    by Keybase, such as off-chain storage (e.g., profile photos or other service identifiers).
    In the future, we plan to integrate Aragon ID with decentralized off-chain storage
    services, such as Swarm or IPFS, to provide such functionality.*


    > *In light of this, Aragon ID is a simple identity system to bridge the gap until
    such projects are ready. It leverages the existing ENS infrastructure to securely
    provide two-way, first-in-first-served mappings of addresses to* *<name>.aragonid.eth*
    *identifiers. Afterwards, users will be able to resolve and reverse-resolve any*
    *<name>.aragonid.eth* *to an address and trust that their name registrations are
    safely in their own control.*


    Editor Note


    We decided to keep this use case because it provides value in highlighting the
    thinking behind an approach toward identity and building a hybrid organization
    where users are identified, yet the organization is powered by smart contracts.


    The concept of identity is a conundrum for crypto-technologies because it requires
    a certain level of trust to be inherent in the network architecture. Most generalized
    approaches toward integrating identity in a consensus-based system usually involve
    some variation of cryptographic proofs and signatures. In Aragon, an external
    service called Keybase along with a registry contract were used to establish a
    “trustless” two-way verification scheme. The logic behind this scheme is very
    straightforward: establish that a particular address belongs to you, and then
    verify that your username owns the address. How do these two statements reconcile
    in a functional setting?


    Let’s introduce the two components that made a two-way bridge possible. In simple
    terms, Keybase is a public–private keypair management service with OAuth integrations
    that allow a user to authenticate and verify accounts. Keybase can serve as a
    centralized hub for a user to link and verify external accounts. For instance,
    after creating an account on Keybase, the public profile of a user can display
    all their linked social media accounts, establishing their legitimacy and connection.
    The second component is a registry contract that provides an account-to-address
    association mechanism from within the Aragon network. The two-way bridge is formed
    from using the address (linked to an account on the network) to cryptographically
    sign a file that can then be hosted on Keybase (linked to user identity through
    various social media integrations).


    Note


    It is crucial to keep in mind that in Aragon, identity is an opt-in feature. The
    breadth of use cases developed for Aragon range from providing complete anonymity,
    such as in the case of a DAO, to full usernames integrating Keybase for a next-generation
    blockchain company.


    So, how would a user make their identity available to the two-way verification
    scheme? The workflow in Keybase Registry 2.0 was simplified to one simple step:
    upload the signed proof to KBFS. This introduces a few new components, as follows:


    *   **Keybase filesystem (KBFS)** **:** A cryptographically secure local and cloud
    storage directory. KBFS only allows the owner of the directory to add new files,
    and these files are made available publicly. In KBFS, every file added to the
    directory is automatically signed by the owner’s private key, and the signature
    can be verified by anyone through Keybase.'
  trans: "\n### Aragon 的社会公益：筹款应用\n\n`Aragon` 让创建 `DAO` 变得更简单，而筹款应用的加入则使得构建社会创业用例成为可能。在本节中，我们将简要描述筹款活动如何在\
    \ `Aragon` 中运作，以及基于区块链的社会企业所蕴含的新潜力。\n\n在 `Aragon` 区块链上进行一轮融资与传统筹款方式截然不同。目前，`Aragon`\
    \ 中实现了两种筹款选项。第一种是向特定投资者进行一轮融资，以换取对方公司的一部分股权。第二种是进行公开销售，网络中的任何参与者都可以购买你公司的股票。其核心思想很简单：一旦你的\
    \ `DAO` 开始运作，你就可以发行股份，然后你可以向投资者提供其中一个类别的股份以换取 `ether`。这些股份可以提供给单个投资者，也可以在公开销售期间更广泛地提供给网络中的任何参与者。传统筹款与通过\
    \ `DAO` 进行的筹款之间存在显著差异。让我们来看看其中的一些不同之处。\n\n在 `DAO` 上进行筹款需要更结构化的方式，以便在决策过程中保持去中心化。领导筹款活动的项目团队在\
    \ `DAO` 中表现为理事会。理事会成员拥有一个独立的代币，并通过类似于多重签名账户（执行操作需要多个签名）的投票来执行其决策。需要注意的是，理事会成员的权限在设计上受到限制，以减少他们对\
    \ `DAO` 成员以及筹款活动的影响力。理事会有四项主要职责：决定谁应该被纳入理事会、开启预售活动、将 `DAO` 拥有的资产转入金库，以及开启投票让 `DAO`\
    \ 成员通过影响组织的决议。\n\n> **注意**  \n> 理事会成员与*普通* `DAO` 成员之间存在区别。用抽象术语描述这个概念容易令人困惑，所以我们用这个例子来说明：理事会成员将由一种名为\
    \ `High Table (HTBL)` 的代币代表，而 `HTBL` 将用于指定所有理事会职责的交易。`DAO` 成员则使用在预售（筹款活动的开场活动）期间购买到的代币。这些成员，也被称为代币持有者，将由另一种独立的代币\
    \ `Continental (CTL)` 代表，而 `CTL` 将用于影响 `DAO` 及其日常活动。\n\n`DAO` 成员的定义是：为 `DAO` 的整体方向和决策提供意见的非理事会代币持有者；他们享有多项特权，包括赎回在预售中购买的代币并将其兑换为\
    \ `ETH`；决定安装哪些应用以及更新哪些权限；决定理事会应将多少资金转入金库；以及决定如何更新筹款费用和抵押设置。\n\n预售标志着筹款活动的开始，是一个关键事件，其目标是销售预先指定数量的代币（沿用我们的例子，我们将销售\
    \ `CTL` 代币）。在预售期间，`Ethereum` 网络上的任何人都可以通过先购买 `DAI` 来购买 `CTL` 代币。`DAI` 是 `Ethereum`\
    \ 上的一种 `Stablecoin`（稳定币），旨在维持 `$1.00 USD` 的价值。在预售设置中，一个组织可以为其新代币设定一个以 `DAI` 计价的价格，购买者将转换他们的\
    \ `DAI` 来购买这种新代币。如果预售活动达到了预设目标，则视为成功，新代币的交易期即可开始。否则，筹款活动被视为失败，所有投入的资金将返还给相关方。`Fundraising`\
    \ 应用中提供了更高级的代币交易选项，例如分期归属，但这超出了本章的范围。\n\n## 身份管理用例\n\n`Aragon` 中的身份管理用例已不再积极开发，`Aragon`\
    \ 开发者解释说，这曾是一个过渡方案，直到他们能够扩展和泛化更多现有功能：\n\n> *尽管 Aragon 之前与 Keybase 进行了集成，但 ENS\
    \ 的存在使我们能够构建一个避免依赖中心化第三方的身份系统。在此过程中，我们失去了之前由 Keybase 提供的许多功能，例如链下存储（例如，个人资料照片或其他服务标识符）。未来，我们计划将\
    \ Aragon ID 与去中心化的链下存储服务（如 Swarm 或 IPFS）集成，以提供此类功能。*\n\n> *鉴于此，Aragon ID 是一个简单的身份系统，用以弥合差距，直到此类项目准备就绪。它利用现有的\
    \ ENS 基础设施，安全地提供地址到 `<name>.aragonid.eth` 标识符的双向、先到先得映射。之后，用户将能够解析和反向解析任何 `<name>.aragonid.eth`\
    \ 到地址，并相信他们的名称注册安全地掌握在自己手中。*\n\n> **编者按**  \n> 我们决定保留这个用例，因为它有助于突出显示身份处理方法的思路，以及构建一个混合型组织的价值——在该组织中，用户身份被识别，但组织由智能合约驱动。\n\
    \n身份概念对于加密技术来说是一个难题，因为它要求网络架构中固有一定程度的信任。大多数将身份集成到基于共识的系统的通用方法，通常都涉及密码学证明和签名的某种变体。在\
    \ `Aragon` 中，一个名为 `Keybase` 的外部服务与一个注册合约一起被用来建立一个“无需信任的”双向验证方案。该方案背后的逻辑非常简单：证明某个特定地址属于你，然后验证你的用户名拥有该地址。这两个陈述如何在功能设置中协调一致？\n\
    \n让我们介绍构成双向桥梁的两个组件。简单来说，`Keybase` 是一个公私钥对管理服务，具有 `OAuth` 集成功能，允许用户进行认证和验证帐户。`Keybase`\
    \ 可以作为一个中心枢纽，供用户链接和验证外部账户。例如，在 `Keybase` 上创建帐户后，用户的公共资料可以显示所有他们关联的社交媒体账户，从而建立其合法性和连接性。第二个组件是一个注册合约，它从\
    \ `Aragon` 网络内部提供账户到地址的关联机制。双向桥梁是通过使用地址（关联到网络上的账户）对文件进行加密签名，然后将该文件托管在 `Keybase`\
    \ 上（通过各种社交媒体集成关联到用户身份）而形成的。\n\n> **注意**  \n> 务必牢记，在 `Aragon` 中，身份认证是一项可选功能。为 `Aragon`\
    \ 开发的用例范围之广，从提供完全匿名（例如 `DAO` 的情况），到为下一代区块链公司集成 `Keybase` 的完整用户名系统，不一而足。\n\n那么，用户如何让他们的身份可供双向验证方案使用呢？`Keybase\
    \ Registry 2.0` 中的工作流程简化到了一个简单的步骤：将已签名的证明上传到 `KBFS`。这引入了几个新组件，如下所示：\n\n- **Keybase\
    \ 文件系统（KBFS）**：一个加密安全的本地和云存储目录。`KBFS` 只允许目录的所有者添加新文件，并且这些文件会被公开。在 `KBFS` 中，添加到目录的每个文件都会自动由所有者的私钥签名，任何人都可以通过\
    \ `Keybase` 验证该签名。\n"
- fmt: '- **Signed proof:** Aragon uses a standard proof of identity signed by the
    user and uploaded to the KBFS public directory. There are four components of this
    proof: the username on Keybase, the Ethereum account address owned by the user,
    a string or comment by the user, and finally the public key of the signature.
    Anyone who wishes to verify an identity can obtain this proof file and use a function
    such as `getUsername(args)` to perform a username reverse lookup given the account
    address in the proof.


    - **Oraclize:** The reverse lookup is an on-chain verification process performed
    through the registry contract within the Aragon network. For Keybase lookup, a
    data carrier service called Oraclize is utilized. Oraclize requests the signature
    for a given Keybase username and creates a mapping of the username to an Ethereum
    account address. The signature on this proof file should validate with the user’s
    public key on the network. Oraclize performs an on-chain check to verify the proof
    signature and ensure that the mapping is legitimate. The party initiating this
    verification on behalf of another user also has to pay for the steps, including
    Oraclize reference calls.


    - **Keybase Resolver:** The Ethereum Name Service (ENS) allows us to resolve human-readable
    links into Ethereum addresses. Recently, Aragon has begun testing a Keybase resolver
    that will map callbacks to usernames into addresses such that `john.keybase.eth
    -> 0x99...cx88`. This simplifies the reverse lookups and username references throughout
    the network.


    Now that we have a basic understanding of Aragon, the components that make a DAO,
    and how fundraising works, the remainder of this chapter will focus on a walkthrough
    of how to create and manage a DAO on Aragon.


    ## DAO / Company Walkthrough


    In this section, we will go through the process of creating a DAO and becoming
    familiar with the main DAO-focused operations in Aragon. For the sake of simplicity,
    we will only have two entities (accounts) participating in this DAO. This walkthrough
    is split into three topics:


    - **Setting up the DAO environment:** We will introduce the participants of this
    DAO, see how to create a wallet with MetaMask, and get familiar with the interface.


    - **Setting up the DAO:** After MetaMask is set up, we will connect the account
    to the Ethereum test net and use it to set up a DAO.


    - **Daily operations:** Once the DAO is set up, we will walk through basic operations
    such as minting new tokens, voting, and making withdrawals. Then, we will dive
    into more advanced features, such as DAO finances and adding new app permissions
    that offer a whole new level of fine-tuning for governance of your company.


    ### Topic 1: Setting Up the DAO Environment


    Aragon can be used to create DAOs completely online (without downloading a client)
    through the website ([`https://aragon.org/`](https://aragon.org/)). Currently,
    there are two components to Aragon: a DAO-maker (Aragon Core) and a wallet (MetaMask).
    The DAO-maker component of Aragon turns into a full-fledged dashboard for managing
    the DAO, and all operations related to the DAO can be carried out on the apps
    available through the dashboard. The second component is MetaMask: a digital wallet
    designed as a plug-in for Chrome or Firefox browsers to interface with the Ethereum
    blockchain and make it accessible to pragmatic daily users. MetaMask is one of
    the four wallet options available that can integrate with the Aragon UI, and we
    will be using it throughout this chapter as it requires minimal setup time. Let’s
    begin with setting up MetaMask, followed by connecting Aragon to MetaMask and
    then connecting to the faucet (that can disperse test coins). The first steps
    involve adding the MetaMask extension to Chrome. Once installed, the opening screen
    should look like Figure 5-1.


    > **Note:** Ad blockers and pop-up blockers will interfere with MetaMask. For
    the reader to follow along with this tutorial, you may need to disable them for
    the Aragon website and the faucet.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig1_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig1_HTML.jpg)


    **Figure 5-1** The MetaMask opening screen


    MetaMask will ask you to set up a wallet before using the add-on. Click on (1)
    to begin; this will bring you to the setup screen shown in Figure 5-2. There are
    two options available: create a new wallet (the option we will choose) or import
    a wallet (used in the instance where you already have a MetaMask wallet, or if
    you want to import the wallet from a different browser). Click on (2) as shown
    in Figure 5-2, and this will bring you to creating a password for the wallet.
    The password comes with a backup phrase that you can use to recover your wallet
    in case you lose your password.


    > **Note:** This secret phrase is also required if you want to import your wallet
    into MetaMask.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig2_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig2_HTML.jpg)


    **Figure 5-2** Setup screen. Select (2) to set up a password for your MetaMask
    wallet


    After creating a wallet password, you’ll be taken to the secret phrase screen.
    This phrase is used for wallet recovery in case you lose your password. Click
    on (3) to reveal the secret phrase as shown in Figure 5-3, and then write this
    down. On the next screen, you will be required to re-enter your secret phrase,
    and then you will get a confirmation that your wallet has been set up. After setup,
    you can click on the MetaMask icon to see the full wallet view, as shown in Figure
    5-4.


    > **Note:** As previously mentioned, there are ways to connect with Aragon and
    Ethereum blockchain through hardware wallets that offer superior-grade security
    and do not require a secret phrase. A more comprehensive review is provided elsewhere
    in the references.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig3_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig3_HTML.jpg)


    **Figure 5-3** Secret phrase for password recovery. Click on (3) to reveal the
    phrase and write it down. Click on (4) to continue'
