  trans: "\n# 5. 去中心化组织\n\n比特币可以被视为首个原型**去中心化自治组织（DAO）**。它创建了一个基于网络的参与者生态系统，大家为同一个目标贡献算力。在比特币中，底层协议创建了一种金融服务，通过奖励提供验证服务的矿工，这种机制成为了一种基础的去中心化组织。在本章中，我们将重点介绍在区块链上使用\
    \ Aragon 创建的更复杂的组织。Aragon 是一个去中心化应用程序（DApp），它允许任何人创建和管理以太坊区块链上的各类组织（如非政府组织、非营利机构、基金会）。在以太坊早期，要创建一个\
    \ DAO 并实现哪怕是最基本的功能，都需要编写复杂的智能合约和 Solidity 代码。Aragon 简化了此过程。它将组织的基本功能集成在一个基础模板中，每当用户实例化一个公司时，该模板就会被部署。像股权结构表、投票功能、筹款和会计等大多数传统功能，在\
    \ Aragon 模板中都作为运行在区块链上的去中心化对等体提供。此外，一个 Aragon 公司可以进行非常精细化的定制，并通过添加新模块来扩展其现有的智能合约。Aragon\
    \ 使得不同类型的组织能够控制其内置的信任级别。\n\n本章首先介绍去中心化组织的概念。我们将依据拉尔夫·默克尔的理论框架，描述 DAO 运作所需的条件，以及\
    \ Aragon 如何将所有理论构造作为应用程序实现。然后，我们将介绍驱动 Aragon 的技术栈以及正在开发的衍生框架。在更好地理解 Aragon 之后，我们将介绍一个使用\
    \ Aragon 进行筹款和社会风险投资的特殊案例。这引出了本章的核心内容：全面讲解如何在 Aragon 上创建、设置、部署和管理一个 DAO。本教程包含三个主题。第一个主题向读者展示如何设置\
    \ MetaMask——一个用于连接 Aragon 的钱包。第二个主题介绍组织模板，以及如何创建和部署一个 DAO。最后一个主题讲解了如何在 DAO 中执行日常操作以及高级功能。本章遵循从概念背景到实践操作建议的结构。我们希望，在完成本教程后，您能够熟练地设置钱包，并在以太坊测试网上用您自己的\
    \ DAO 进行实验。\n\n## Aragon 技术栈与 Aragon 网络代币（ANT）\n\nAragon 是一个为基于以太坊的去中心化组织构建治理系统的生态系统。从技术角度看，Aragon\
    \ 是一个用于构建和管理去中心化组织的全栈式服务平台，它将组织视为在操作系统上并发运行的多个进程。尽管 Aragon 上同时运行着成千上万个去中心化自治组织（DAO），但我们在此只聚焦于一个单一的\
    \ DAO。在深入探讨 Aragon 之前，让我们用更简单的语言来描述 DAO 的概念。DAO 是一个建立在成员共识决策基础上的区块链实体。DAO 扩展了区块链固有的共识概念，将拥有\
    \ DAO 权益（通常以 DAO 代币形式体现）的成员所做的决策和选择也纳入其中。因此，DAO 的核心是自动化，外围是成员，他们依靠基于多数投票的共识来为组织做决策。虽然这种理解\
    \ DAO 的方式是一个通用的描述，但它并不完整。或许定义 DAO 的更好方法是通过它所执行的功能。DAO 的概念最初源自比特币，而比特币可以被视为第一个\
    \ DAO 原型。\n\n**注释**\n\nAragon 网络上最简单的功能单元是 DAO，因此我们的大部分讨论将围绕一个最小用例展开。Aragon 提供了一个可用于设置\
    \ DAO 的基础模板，您可以修改此模板来建立一套自定义规则。其他类型的组织（如非政府组织或非营利机构）则是在此基础模板上进行重大修改后构建的，从而允许新的运作模式。此外，在本章后续内容中，术语“DAO”、“公司”或“组织”可能会互换使用，以表示同一概念。\n\
    \n拉尔夫·默克尔将 DAO 描述为一个拥有内部有价值财产、能够更新其内部状态、对成员负责并运行智能合约的实体。这些是任何 DAO 都应能执行的最基本功能；然而，目前对于\
    \ DAO 并没有类似于代币的`ERC20`那样的合规标准。Aragon 通过一个在 DAO 日常运营中具有特定功能的“器官”系统来实现默克尔的思想。每个\
    \ DAO 模型的核心是一个内核。内核再通过一组器官来执行大部分日常活动。让我们回顾一下 Aragon 实现的这些器官：\n\n- **内核：** DAO\
    \ 中所有其他组件的协调者。为此，内核仅提供两个功能：可升级性和权限管理。\n  - 从长远来看，Aragon 上的组织需要具备安全性和模块化，以便能够通过新功能进行扩展。为\
    \ Aragon 上的任何组织提供自身升级机制（包括内核本身）至关重要。因此，内核具备升级自身以及任何依赖它的应用的能力。\n\n- 内核需要跟踪所有参与\
    \ DAO 的地址、分配给它们的权限，以及这些地址可以执行的操作。这个授权系统也称为访问控制列表（ACL），它保护 DAO 的用户免受权限提升攻击。\n\n\
    - **元器官：** 这是一个具有自我意识（就内部状态而言）并能自我行动的器官，负责根据成员的行动或外部事件在内部更新 DAO。该器官还负责维护在内核中运行的器官的全局注册表。\n\
    \n- **金库器官：** 金库器官充当 DAO 的集体钱包。它以代币形式存储 DAO 拥有的资金，并批准任何支出请求。\n"
- fmt: '- **Token organ（令牌器官）：** 令牌器官专门处理分配给 DAO 成员的治理令牌。该器官还包含用于添加新型令牌或替换/移除旧令牌的操作逻辑。


    - **Dispatch organ（调度器官）：** 一个验证器官，用于确定是否可代表请求者执行请求的操作或交易。这可以通过预言机或基于特定标准过滤请求的编程逻辑来完成。调度器官的输出结果为简单的“通过”或“失败”。如果操作失败，则不会执行。但如果操作或交易通过，它将被分派到更合适的器官进行处理或执行。调度器官还维护每个请求的优先级列表，以便进行分类和适当引导。


    - **Applications organ（应用器官）：** 在 DAO 核心运行的智能合约集合。该器官中运行的应用与组织的其余部分进行沙箱隔离，但大部分业务逻辑驻留在此器官中。Aragon
    提供了一组负责默认操作的基本以太坊合约，但此器官是可扩展的。可以向组织添加新的应用或模块，以增加功能来满足特定用例。


    > **注意**

    >

    > 所描述的器官本质上是理论构造，应由模块化且可扩展的 DAO 实现。这些器官作为应用的正式实现，将在 DAO 教程部分中更好地展示。


    本章稍后对 DAO 的逐步演示将展示这些器官在实践中如何应用。在本节的剩余部分，我们将概述 Aragon 技术栈。以下是该生态系统中所有使 DAO 得以快速开发和原型设计的组件：


    - **`aragonCLI`：** Aragon 的命令行界面。提供设置和部署 DAO 所需的所有功能，并可对模板的全局参数进行更精细的控制。此外，还可以使用更高级的功能，例如部署自定义令牌、与
    IPFS 集成以及访问包管理器。


    - **Aragon 客户端：** 用于将 Aragon 呈现给用户，以便创建 DAO 并将其部署到以太坊区块链的 Web 客户端。所有日常管理和操作都在此客户端中进行。此外，所有应用、权限和投票均可通过
    Aragon 客户端访问。该客户端本质上是以终端用户形式提供的所有 Aragon 服务。


    - **`aragonPM`：** Aragon 的包管理器，用于连接社区构建的仓库、启用可升级性以及分发构成 Aragon 客户端的最新版本包。在不久的将来，通过
    `aragonPM` 进行的更新将允许核心组件和智能合约代码在运行时动态更新，而不会对 DAO 的服务造成任何中断。它还连接到 `aragonCLI`，并允许使用传统的基于
    CLI 的方法来安装包，类似于 Linux 发行版中的包管理器。


    - **`aragonUI`：** 为 Aragon 上运行的所有应用标准化的设计语言。开发者和设计人员可以采用此 UI 方案和设计语言，使其应用看起来像是
    Aragon 的原生应用。主题引擎和 UI 组件在 `aragonUI` 指南（[`https://ui.aragon.org/`](https://ui.aragon.org/)）中有详细说明。


    - **App Center（应用中心）：** 一个供开发者发布应用的 marketplace（市场），这些应用可供任何 DAO 使用。这些应用通常是开源的；然而，由于与区块链绑定并具有代币经济，DAO
    可以为访问实施新颖的支付机制。


    - **Access Control List（访问控制列表）：** 一个包含 DAO 中每个地址所有权限和操作的主列表。包含在内核（kernel）中。


    - **Aragon Court（Aragon 法庭）：** 一个仲裁层，用于处理 Aragon 平台上发生的主观争议和冲突。法庭处理复杂度较高、需要以陪审员形式进行人工干预的案件。陪审员需要质押一种名为
    `ANJ`（Aragon Network Jurors）的特殊令牌，方可加入陪审团。成功裁决冲突会获得网络费用形式的奖励，该费用与质押的 `ANJ` 成正比。


    - **Meta-DAO（元 DAO）：** Aragon 项目本身作为 DAO 运行，其令牌 `ANT` 存在于以太坊区块链上。用户可以购买 `ANT`
    的份额，从而影响 Aragon 本身的发展方向。Aragon 为其上运行的 DAO 提供的所有功能，也同样适用于 Meta-DAO 本身，只是规模更大。'
  raw: '*   **Token organ:** The token organ specifically deals with governance tokens
    allocated to the members of the DAO. This organ also contains the operational
    logic for adding new types of tokens or replacing/removing older tokens.


    *   **Dispatch organ:** A validator organ that determines whether a requested
    action or a transaction can be carried out on behalf of the requestor. This can
    be done through an oracle, or programmed logic that filters requests based on
    specific criteria. The outcome of the dispatch organ is a simple pass or fail.
    If an action fails, it will not be carried out. However, if an action or transaction
    passes, it will be dispatched to a more apt organ for processing or execution.
    The dispatch organ also maintains a list of priorities for each request to be
    triaged and directed appropriately.


    *   **Applications organ** **:** The smart contract collective that operates at
    the core of a DAO. The applications running in this organ are sandboxed from the
    remainder of the organization, but most of the business logic resides in this
    organ. Aragon provides a basic set of Ethereum contracts responsible for default
    actions, but this organ is extensible. New applications or modules can be added
    to the organization to increase functionality to satisfy specific use cases.


    Note


    The organs described are essentially theoretical constructs that should be implemented
    by a DAO that is modular and extensible. The formal implementation of these organs
    as apps will be better demonstrated during the DAO tutorial section.


    The walkthrough of a DAO presented later in this chapter will demonstrate how
    these organs are applied in practice. In the remainder of this section, we will
    provide an overview of the Aragon technology stack. The following are all components
    of the ecosystem that have enabled rapid development and prototyping of DAOs:


    *   **aragonCLI:** Command-line interface to Aragon. Provides all the functionality
    needed to set up and deploy a DAO with more granular control over the global parameters
    of the template. In addition, more-advanced features such as deploying custom
    tokens, integration with IPFS, and accessing the package manager are available.


    *   **Aragon client:** The web client that brings Aragon to the user for creating
    and deploying DAOs to the Ethereum blockchain. All the day-to-day management and
    operations occur within this client. Additionally, all the apps, permissions,
    and voting are accessible through the Aragon client. This client is essentially
    all of Aragon’s services offered to the end user.


    *   **aragonPM:** A package manager for Aragon that connects to community-built
    repositories, enables upgradability, and distributes the latest versions of packages
    that form the Aragon client. In the near future, updates through aragonPM will
    allow for the core components and smart contract code to be updated on the fly,
    without any disruptions in service for the DAO. It also connects with the aragonCLI
    and allows for a traditional CLI-based approach to installing packages, similar
    to package managers in Linux distributions.


    *   **aragonUI:** The design language standardized for all apps running on Aragon.
    Developers and designers can adopt this UI scheme and design language to make
    their apps appear native to Aragon. The theming engine and the UI components are
    detailed in the aragonUI guide ([`https://ui.aragon.org/`](https://ui.aragon.org/)).


    *   **App Center:** A marketplace for developers to publish apps that can be used
    by any DAO. These are usually open source; however, being tied to the blockchain
    and having a token economy, novel payment mechanisms can be implemented by DAOs
    for access.


    *   **Access Control List:** A master list of all permissions and actions assigned
    to every address in a DAO. Contained within the kernel.


    *   **Aragon Court:** An arbitration layer that deals with subjective disputes
    and conflicts occurring on the Aragon platform. The court handles cases with higher
    complexity that require human intervention in the form of jurors. The jurors stake
    a special token called ANJ (Aragon Network Jurors), which allows them to join
    a jury. Successfully adjudicating a conflict results in a reward in the form of
    network fees proportional to ANJ staked.


    *   **Meta-DAO:** The Aragon project itself is run as a DAO, with the token ANT
    on the Ethereum blockchain. Users can purchase a stake in ANT and influence the
    direction of Aragon itself. All the features afforded by Aragon to the DAOs running
    on it also apply to the Meta-DAO itself, only at a much larger scale.'
  trans: '

    -   **令牌器官（Token organ）：** 令牌器官专门处理分配给 DAO 成员的治理令牌。该器官还包含用于添加新型令牌或替换/移除旧令牌的操作逻辑。


    -   **调度器官（Dispatch organ）：** 一个验证器官，用于确定是否可代表请求者执行请求的操作或交易。这可以通过预言机或基于特定标准过滤请求的编程逻辑来完成。调度器官的输出结果为简单的“通过”或“失败”。如果操作失败，则不会执行。但如果操作或交易通过，它将被分派到更合适的器官进行处理或执行。调度器官还维护每个请求的优先级列表，以便进行分类和适当引导。


    -   **应用器官（Applications organ）：** 在 DAO 核心运行的智能合约集合。该器官中运行的应用与组织的其余部分进行沙箱隔离，但大部分业务逻辑驻留在此器官中。Aragon
    提供了一组负责默认操作的基本以太坊合约，但此器官是可扩展的。可以向组织添加新的应用或模块，以增加功能来满足特定用例。


    > **注意**

    >

    > 所描述的器官本质上是理论构造，应由模块化且可扩展的 DAO 实现。这些器官作为应用的正式实现，将在 DAO 教程部分中更好地展示。


    本章稍后对 DAO 的逐步演示将展示这些器官在实践中如何应用。在本节的剩余部分，我们将概述 Aragon 技术栈。以下是该生态系统中所有使 DAO 得以快速开发和原型设计的组件：


    -   **`aragonCLI`：** Aragon 的命令行界面。提供设置和部署 DAO 所需的所有功能，并可对模板的全局参数进行更精细的控制。此外，还可以使用更高级的功能，例如部署自定义令牌、与
    IPFS 集成以及访问包管理器。


    -   **Aragon 客户端：** 用于将 Aragon 呈现给用户，以便创建 DAO 并将其部署到以太坊区块链的 Web 客户端。所有日常管理和操作都在此客户端中进行。此外，所有应用、权限和投票均可通过
    Aragon 客户端访问。该客户端本质上是以终端用户形式提供的所有 Aragon 服务。


    -   **`aragonPM`：** Aragon 的包管理器，用于连接社区构建的仓库、启用可升级性以及分发构成 Aragon 客户端的最新版本包。在不久的将来，通过
    `aragonPM` 进行的更新将允许核心组件和智能合约代码在运行时动态更新，而不会对 DAO 的服务造成任何中断。它还连接到 `aragonCLI`，并允许使用传统的基于
    CLI 的方法来安装包，类似于 Linux 发行版中的包管理器。


    -   **`aragonUI`：** 为 Aragon 上运行的所有应用标准化的设计语言。开发者和设计人员可以采用此 UI 方案和设计语言，使其应用看起来像是
    Aragon 的原生应用。主题引擎和 UI 组件在 `aragonUI` 指南（[`https://ui.aragon.org/`](https://ui.aragon.org/)）中有详细说明。


    -   **App Center（应用中心）：** 一个供开发者发布应用的 marketplace（市场），这些应用可供任何 DAO 使用。这些应用通常是开源的；然而，由于与区块链绑定并具有代币经济，DAO
    可以为访问实施新颖的支付机制。


    -   **Access Control List（访问控制列表）：** 一个包含 DAO 中每个地址所有权限和操作的主列表。包含在内核（kernel）中。


    -   **Aragon Court（Aragon 法庭）：** 一个仲裁层，用于处理 Aragon 平台上发生的主观争议和冲突。法庭处理复杂度较高、需要以陪审员形式进行人工干预的案件。陪审员需要质押一种名为
    `ANJ`（Aragon Network Jurors）的特殊令牌，方可加入陪审团。成功裁决冲突会获得网络费用形式的奖励，该费用与质押的 `ANJ` 成正比。


    -   **Meta-DAO（元 DAO）：** Aragon 项目本身作为 DAO 运行，其令牌 `ANT` 存在于以太坊区块链上。用户可以购买 `ANT`
    的份额，从而影响 Aragon 本身的发展方向。Aragon 为其上运行的 DAO 提供的所有功能，也同样适用于 Meta-DAO 本身，只是规模更大。

