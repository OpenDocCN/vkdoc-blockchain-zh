- fmt: '# Tokens App


    To begin, click on the `Tokens` app in the left sidebar; you should see the Token
    review screen, as shown in Figure [5-16](#430562_2_En_5_Chapter.xhtml#Fig16).
    Here, the tokens we minted during the DAO setup process are represented as the
    balance (1) assigned to the wallet address we provided. On the right-hand side
    is basic information about our tokens, including the total supply of tokens (the
    amount of tokens minted thus far), whether the tokens can be transferred, and
    the token name (2). We can create tokens that are not transferrable, and this
    can be used to designate a rare asset. Currently, this DAO only has one member,
    so by default, that member has 100 percent of the token ownership (3). We can
    mint new tokens, and to begin that process, click (4), *Add tokens*.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig16_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Tokens review screen


    To mint new tokens, we also have to assign them to a new address, as shown in
    Figure [5-17](#430562_2_En_5_Chapter.xhtml#Fig17). This process also adds an additional
    member to the DAO, where membership is defined as having a stake in the DAO. But
    now that the DAO is online, this will go through a vote. As a general rule, any
    major change to DAO operations will go through a vote based on the voting parameters
    we set in the previous section.


    > **Note**

    > Newly minted tokens can be assigned to any address; here, adding a new address
    concomitantly allows us to add a new member with a stake in the DAO.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig17_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Minting ten new tokens and assigning them to a new address


    Clicking on *Add tokens* will lead you down a four-step process:


    *   Create a transaction that implements the minting function.

    *   Create a vote that will decide whether the minting of new tokens is approved
    by the DAO.

    *   Use the DAO smart contract to deploy these two functions to the Ethereum test
    net.

    *   Create a transaction that uses the minting function to mint new tokens.


    This general process remains the same for most of the actions taken through apps
    in Aragon; the first step is shown in Figure [5-18](#430562_2_En_5_Chapter.xhtml#Fig18).
    (5) ascertains that you can only mint for new tokens after a vote has taken place.
    (6) informs us that after a vote is successful, this transaction will mint new
    tokens. Clicking on *Create transaction* will require MetaMask to pay for gas
    and sign.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig18_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig18_HTML.jpg)


    Figure 5-18


    Creating a vote and a transaction to mint new tokens


    Navigate to the `Voting` tab, and you should see an open vote with the action
    from (6) in Figure [5-18](#430562_2_En_5_Chapter.xhtml#Fig18) listed as the vote
    title. These votes are created automatically by the DAO. Clicking on the vote
    will take you to the voting screen. Select *yes* and sign the transaction to vote
    on your decision. The confirmation is shown in notifications, as seen in Figure
    [5-19](#430562_2_En_5_Chapter.xhtml#Fig19).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig19_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig19_HTML.jpg)


    Figure 5-19


    Notifications for voting: (7) refers to the transaction that will mint ten new
    tokens, and (8) refers to the vote being carried out


    The vote summary page is shown in Figure [5-20](#430562_2_En_5_Chapter.xhtml#Fig20).
    This represents the voting outcome. (9) is the description of this vote; as this
    was the first vote of our DAO, it was assigned to be Vote #0. Additionally, the
    description and vote creator are mentioned. For now, our DAO only has one member,
    so the voting outcome was decided by one voter who has the majority stake of 100
    BST tokens (10). On the right-hand side is the resolution of the vote (which passed),
    along with some information about support needed and the minimum approval (11).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig20_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig20_HTML.jpg)


    Figure 5-20


    Vote summary page


    Now that the vote has passed, let’s look at the changes it brought to our DAO,
    shown in Figure [5-21](#430562_2_En_5_Chapter.xhtml#Fig21). (12) is the first
    major change; the ten new tokens that we minted are now assigned to a new wallet
    (account) on the DAO. The total supply of tokens has increased from 100 to 110
    (13), and this also changes the ownership dynamics. The new account now has a
    9 percent stake in decision making for the DAO by owning 10 tokens (14).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig21_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig21_HTML.jpg)


    Figure 5-21


    Minted tokens appear in our DAO


    # Voting App


    Voting is an integral part of every major DAO operation. As such, we used the
    `Voting` app to authorize minting ten new tokens. In a similar manner, we can
    use it to propose questions, going through the same process. Let’s share a brief
    example. Navigate to the `Voting` tab, and click on *New vote* to get started.
    Enter the question you would like to propose to the DAO, as shown in Figure [5-22](#430562_2_En_5_Chapter.xhtml#Fig22).
    For instance, prior to minting new tokens, the issue can be discussed as a simple
    vote. Once a question is entered, the voting begins for the DAO based on pre-set
    rules.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig22_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Creating a voting question


    The `Voting` view is shown in Figure [5-23](#430562_2_En_5_Chapter.xhtml#Fig23).
    This shows the current resolutions that are being actively voted on, and the closed
    resolutions that have passed or failed. Our new vote on creating tokens is shown
    as open, and it will be available to the DAO members for the next twenty-four
    hours.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig23_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Voting view'
