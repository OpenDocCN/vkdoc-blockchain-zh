    # 8. 科学中的区块链


    基于证据的临床科学目前正面临一场令人瘫痪的可重复性危机。从临床心理学到癌症生物学，最近的元研究表明，研究人员无法重复其同行发表的研究成果的情况有所增加。这个问题不仅限于实验室中发生的实验台工作；它还困扰着从实验台到临床的转化研究。治疗方法、测试和技术从简单的实验室实验转变为影响数百人的
    FDA 批准的设备和检测方法。因此，可重复性对于将科学突破转化为实用的补救措施至关重要。


    区块链技术在新兴的开放获取科学领域中的主要作用是提高这些流程的透明度。为此，本章介绍了三个用例和应用：第一个涉及临床试验数据的保存，第二个涉及可以为致力于开放研究的科研人员和机构开发的声誉系统，第三个涉及用于追踪假药的供应链管理应用。在这些用例中，我们提供了大量正在进行的工作示例，这些工作将极大地塑造区块链在科学领域的世界。我们将首先讨论当前的研究方法范式和负面数据的重要性；我们的重点将主要局限于临床科学。然后，我们将讨论目前用于衡量已发表研究影响力的传统指标和替代指标系统。这将使我们能够过渡到补充传统指标的用例，并扩展它们以使开放科学成为一个基本特征。最后，我们将通过审视将区块链融入现有研究基础设施的持续努力来结束我们的讨论。

    '
- fmt: '# Reproducibility Crisis


    Let’s begin our discussion with what *reproducibility* means in the context of
    scientific discourse and investigation. One of the major cornerstones in research
    is the ability to follow written protocols from a study, using the documented
    methods to carry out experiments and arrive at the same conclusions as those given
    by that study. In other words, a published study can be independently verified
    by other researchers, and replicated to achieve the same results. Recent meta-research
    in clinical sciences demonstrates that more and more published works are not rigorous
    experimentally so as to be replicated with ease. Leonard P. Freedman and colleagues
    estimate that over 50 percent of pre-clinical research cannot be translated from
    animal models to human clinical trials, thereby placing the approximate annual
    cost of irreproducibility at $28 billion in the United States alone. Consequently,
    as pre-clinical findings in animal models are rarely repeated in clinical trials,
    drug discovery has slowed down its pace, and the costs have risen dramatically.
    The economic costs are very debilitating, as close to $200 billion is wasted annually
    because the discovered targets cannot be reproduced. These problems are often
    inherent to the design of a particular study, or due to very genuine intricacies
    and complications that arise in experiments on differing cell lines. To understand
    why, we have to look for answers in meta-research, which is a branch of investigation
    that statistically evaluates the claims, results, and experiments performed in
    a study.


    A multitude of factors in academia are creating a vicious culture of “bad science,”
    as Dr. Ben Goldacre refers to it: A vanishing funding landscape, a culture of
    “publish or perish,” and an incredible amount of pressure on young researchers
    to get tenured pushes them to follow erroneous methods that lead to non-reproducible
    publications. In some cases, the slipshod research methods and manipulations have
    led to fraud and eventual retractions with serious consequences to the researcher.


    **Note**


    `Retraction Watch` is a blog that recently came about to report on scientific
    misconduct happening at all levels, from editors working with journals to individual
    researchers at universities. The blog also tracks papers that have been retracted
    from journals due to fraudulent data or manipulation of experimental evidence.
    The interested reader can follow their website, which posts about 500 to 600 retractions
    per year.


    Academic journals are also partly to blame for this mess, though there are signs
    of real change and improvement in the works. Over the past few years, it has been
    easier to publish studies with positive findings in journals regarding potential
    drug targets or effectiveness of a particular drug. But negative findings from
    experiments, such as a drug target not working even though it was expected to
    work, have been incredibly difficult to publish. On face value, it seems to make
    sense: Why would someone want to know if an experiment failed? Negative data usually
    gets ignored because of similar reasoning, and from a marketing standpoint, a
    journal claiming that *X* didn''t work as expected isn’t a highlight that would
    sell. Let’s take a closer look at positive and negative data in the context of
    how journals have shaped their use and publication.


    Positive data is simply the confirmation of an initial hypothesis, where a researcher
    predicted a finding and the data validated it. On the other hand, negative data
    comes from the cases where the expected or wanted effect was not observed. If
    an experiment showed that no difference existed between the null and alternative
    hypotheses, the data and results would likely end up buried in the pile of unpublished
    results of the lab group. Figure [8-1](#430562_2_En_8_Chapter.xhtml#Fig1) provides
    a very simplified overview of an erroneous research method for dealing with positive
    and negative data, a method that results from the pressures in academia. Replication
    is sacrificed in pursuit of highly demanding and attractive drug targets, which
    ultimately do not translate well into clinical trials and lead to more economic
    waste.


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig1_HTML.jpg](images/430562_2_En_8_Chapter/430562_2_En_8_Fig1_HTML.jpg)


    **Figure 8-1** Overview of positive and negative data in the context of publishing
    a study


    In Figure [8-1](#430562_2_En_8_Chapter.xhtml#Fig1), we see a simple demonstration
    of hypothesis testing that leads to the publication of “flukes,” which are non-replicable
    in translational research or scaled clinical trials. Due to the nature of publishing
    in academic journals, positive data usually implies that you’re done. Most researchers
    will stop here and not bother to follow up with any appreciable fraction of all
    the data that was collected or generated while conducting the experiments. This
    could include potential negative data regarding an avenue of thought that didn’t
    work, or information that was omitted due to feedback from reviewers. Once a research
    paper has been accepted, the authors of a publication have no further incentives
    to release more data or put in more time to clean up and make available other
    results. This turns out to have some detrimental consequences, which we will discuss
    later in the chapter.


    These trends have been observed by journals internationally, and publishers are
    beginning to take some action. A plethora of new initiatives are raising the standards
    for the data that can be included in a publication, as well as the design considerations
    that must be fulfilled to ensure replication. Let’s talk about three of those
    efforts here:


    - **Minimum Publishing Standards:** Print journals have specific requirements
    for space where only a certain number of pages can be allocated to each section
    of a research paper. In such scenarios, researchers focus more on making bold
    claims and showing data that provides evidence for their conjectures. Usually,
    this comes at the expense of the methods section, which provides instructions
    for other researchers to follow in order to replicate an experiment. Recently,
    most journals have moved online and space is a non-issue; however, supplemental
    materials are still lacking in quality even when they are made available. `BioMed
    Central` has released a checklist of minimum standards that must be met before
    a paper can be published. The purpose of this checklist is to provide a level
    of standardization so that researchers can write papers with specific criteria
    in mind that can enhance reproducibility. If all the standards are met, there
    is a high likelihood that a published study can be replicated to a greater degree.


    **Note** More prominent journals have added data-sharing disclosures that specify
    where data sets will be available and what type of data is being shared. For instance,
    `Cell Press` created a new journal to publish peer-reviewed, reproducible, and
    transparent research methods called `STAR protocols`. Similarly, the `EQUATOR`
    network has created structured guidelines for quality standards for data being
    published in a scientific report.'
