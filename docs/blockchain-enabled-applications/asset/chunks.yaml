- fmt: "# Waste Management: Capital One, Ark Invest, Gem\n\nA webinar hosted by `Gem`,\
    \ `Capital One`, and `Ark Invest` outlined the issues of economic costs and overheads\
    \ plaguing the healthcare system. This economic waste was highlighted in the context\
    \ of claims processing from the perspective of payers (insurance companies). However,\
    \ the lessons learned here can be broadly applied to other industries processing\
    \ claims, such as auto insurance. As an example, `Gem` announced a partnership\
    \ with `Toyota` to port applications it has been developing for the healthcare\
    \ insurance industry to car insurance. The aspiration is to automate most of the\
    \ insurance-claim process using a blockchain. Here, we will summarize the key\
    \ findings outlined by the panelists. In the following discussion, each problem\
    \ raised by the panelists is represented by a `[P]`, and a proposed solution is\
    \ represented with a `[B]`:\n\n![images/430562_2_En_9_Chapter/430562_2_En_9_Fig5_HTML.jpg](images/430562_2_En_9_Chapter/430562_2_En_9_Fig5_HTML.jpg)\n\
    \n**Figure 9-5** Continuum of care. This image shows the comprehensive array of\
    \ health services spanning all levels of care providers and community services.\
    \ This picture was taken from a presentation done by `Eccovia` on accountable\
    \ care organizations, with permission.\n\n- `[P]` For every dollar collected by\
    \ healthcare providers, 15 cents go toward claims processing, facilitating payments\
    \ between parties, and manual labor costs. Imagine the 15 cents adding up for\
    \ a $3 trillion industry.\n- `[P]` Providers respond by increasing reimbursement\
    \ rates, and payers (insurance companies) respond by increasing premiums.\n- `[P]`\
    \ Hospitals are acting as banks by giving loans to patients for out-of-pocket\
    \ payments and lack the infrastructure to support and absorb inefficient payment\
    \ frequencies.\n- `[P]` Hospitals only have a collection rate of 5 percent on\
    \ patient out-of-pocket payments that were provided as loans.\n- `[P]` These gross\
    \ inefficiencies are leading to hospitals’ charging up to 45 percent more premiums\
    \ on top of the base rate for services.\n- `[S]` On the bright side, reducing\
    \ the time it takes to process claims from providers can offer $23 billion in\
    \ savings.\n- `[S]` Decreasing the volatility of collections in the billing cycle\
    \ from out-of-pocket charges can offer $7 billion in savings.\n- `[S]` Using the\
    \ blockchain to track transactions with history can significantly decrease rate\
    \ of fraud, saving insurance companies approximately $300 billion.\n- `[P]` Claims\
    \ clearing houses have to spend days, and sometimes weeks, to process claims,\
    \ adding significant overheads.\n- `[P]` Providers are using multiple third-party\
    \ software tools to manage claims. Instead of the technology being assistive,\
    \ clinics are experiencing more fragmentation and using manual labor to integrate\
    \ different software.\n- `[S]` The blockchain can track the entire continuum of\
    \ care and the billing cycle to reduce friction between the involved parties.\n\
    - `[S]` On a decentralized ledger, transactions and claims can be tracked very\
    \ efficiently, leading to claims resolution almost instantaneously, if not in\
    \ a few minutes.\n- `[S]` Public ledgers such as the Bitcoin blockchain can’t\
    \ be used, `HIPAA` laws limit how patient information can be transferred across\
    \ digital channels. The eventual solution would be to use a permissioned ledger\
    \ with verified nodes. This will lead to restricted access by permissioned users\
    \ to medical records being tracked by public and private keys usage.\n- `[S]`\
    \ Smart contracts responsible for coordinating permissions and access roles on\
    \ the blockchain between various parties requesting medical records. Not every\
    \ party can see the entire record, as permissioned access allows for only relevant\
    \ exposure.\n- `[P]` Providers are not IT professionals, and don’t have enough\
    \ time to provide training for new systems; therefore, interoperability remains\
    \ a major issue.\n- `[P]` Lack of interoperability spans to:\n    - Patient registration\
    \ in a medical system\n    - Authorization of procedures\n    - Medical records\n\
    \    - Co-pay collection\n    - Claims submission\n    - Patient billing\n   \
    \ - Accounting of claims and bills\n- `[P]` Functionality and partitioning—Should\
    \ claims and medical records be on the same blockchain? The panelists talked about\
    \ a scenario at `Aetna`, which receives about a million faxes a year from providers\
    \ regarding claims information. This adds a massive administrative overhead to\
    \ manage the paperwork. Ideally, both claims and records go hand in hand. A procedure\
    \ done on a patient uploaded to the blockchain should trigger a claim to be processed.\
    \ Ultimately, with proper partitioning, having both on the blockchain would be\
    \ more efficient.\n- `[S]` The concept of pegged sidechains may become more relevant\
    \ for coordinated care involving multiple parties, as shown in Figure [9-5](#fig5).\
    \ A domain-specific sidechain could facilitate the transfer of access better,\
    \ and then sync with the main blockchain. A very basic schematic of a sidechain\
    \ is presented in Figure [9-6](#fig6).\n\nBlockchain can streamline the flow of\
    \ information for medical records as it switches hands across multiple parties,\
    \ and in this section we summarized some of the key findings of economic waste\
    \ discovered by `Ark Invest` and `Capital One`. Even though sidechains are still\
    \ very early in development, a simple graphic is presented in Figure [9-6](#fig6).\n\
    \n![images/430562_2_En_9_Chapter/430562_2_En_9_Fig6_HTML.jpg](images/430562_2_En_9_Chapter/430562_2_En_9_Fig6_HTML.jpg)\n\
    \n**Figure 9-6** A simple sidechain performing off-chain transactions. This process\
    \ can be useful for rapidly granting permissioned access and privileges; eventually\
    \ these transactions sync with the upstream."
