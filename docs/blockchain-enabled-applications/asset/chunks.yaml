- fmt: '# Preferred stock (Class B)


    Preferred stock is a special kind of stock issued to investors that have a significant
    stake in the company. This stock has a few financial advantages over common stock,
    making it a safer investment. In terms of dividends, preferred stock is cashed
    before common and as a result receives a larger share of a company’s profits.
    Moreover, common stock can vary in terms of dividends paid out, but preferred
    stock has fixed returns to the shareholders. The process of codifying this type
    of an asset into a DAO requires `aragon-cli` (command-line interface). Essentially,
    we use the `aragon-cli` to create a clone of the generic ERC20 token called `MiniMeToken`
    for our DAO and import it using `Agent`. This allows for a novel asset to be imported
    and used in our DAO.


    # Founder stock (Class F)


    Class F shares are an exclusive kind of preferred stock issued to founders of
    a company. These shares come with greater voting rights; for instance, one founder
    stock can count for ten votes. In comparison, one common stock would only count
    for one vote. Founder stock grants super voting rights and is normally used to
    retain control of a company’s decision-making process when a large number of entities
    are involved.


    **Note**


    Using `aragon-cli` is beyond the scope of this chapter; however, it allows for
    very powerful integrations. For instance, a novel imported token can be voted
    on by the DAO as a payment collection asset, letting the holders collect yearly
    payments in return for investing in the DAO.


    ## Summary


    In this chapter, we discussed the concept of decentralized organizations. We started
    with a presentation of Aragon in the context of decentralized organizations built
    on the blockchain. We talked about the definition of a DAO and the organs that
    Aragon implements. Then, we had an in-depth discussion about the Aragon token,
    and the emergence of a social campaign use case with a DAO. Finally, the heart
    of this chapter was the walkthrough of how to set up, manage, and operate a DAO,
    including all its basic functions. This chapter has provided the foundation for
    creating your own DAO.


    # 6. The DAO Hacked


    In Chapter [5](#430562_2_En_5_Chapter.xhtml), we discussed the concept of decentralized
    organizations and the modus operandi of a DAO. Here, we want to highlight a historic
    moment leading to the creation of the first DAO, and how it eventually got hacked.
    Our discussion begins with a fresh perspective on decentralized organizations
    from Buterin, and leads into the story of Slock.it, the company at the heart of
    the DAO revolution. Then, we present some code that made The DAO dysfunctional:
    pieces of the smart contract relevant to the vulnerability, the conditions that
    allowed repetitive withdrawals from The DAO, and the exploit itself. We conclude
    the chapter by talking about the consequences of this hack: the debate about hard
    versus soft forks, and the creation of Ethereum Classic.


    ## Introduction


    Discourse in the global blockchain community has been characterized by idealism
    going back to Satoshi Nakamoto’s early writings on Bitcoin as a response to central
    banking. The line of reasoning is that systems that are vulnerable to corruption,
    or in any case cater to the wishes of a select few, could be made more accountable
    if they were governed by code. If that code lives on the blockchain, then it is
    impervious to biased intervention by minority parties. Following that tradition,
    in a September 2013 blog post for *Bitcoin Magazine*, Vitalik Buterin explored
    the notion of the DAO. The article began as follows:


    > *Corporations, US presidential candidate Mitt Romney reminds us, are people.
    Whether or not you agree with the conclusions that his partisans draw from that
    claim, the statement certainly carries a large amount of truth. What is a corporation,
    after all, but a certain group of people working together under a set of specific
    rules? When a corporation owns property, what that really means is that there
    is a legal contract stating that the property can only be used for certain purposes
    under the control of those people who are currently its board of directors—a designation
    itself modifiable by a particular set of shareholders. If a corporation does something,
    it’s because its board of directors has agreed that it should be done. If a corporation
    hires employees, it means that the employees are agreeing to provide services
    to the corporation’s customers under a particular set of rules, particularly involving
    payment. When a corporation has limited liability, it means that specific people
    have been granted extra privileges to act with reduced fear of legal prosecution
    by the government—a group of people with more rights than ordinary people acting
    alone, but ultimately people nonetheless. In any case, it’s nothing more than
    people and contracts all the way down.*

    >

    > *However, here a very interesting question arises: do we really need the people?*
    ^([¹](#fn1))


    Three years after Buterin’s article was first published, The DAO came into existence
    as a smart contract written in Solidity, perhaps the purest manifestation of this
    idealism. Despite its canonical label, The DAO was not the first—or the last—decentralized
    autonomous organization. In fact, by May 2016 when the leadership at Slock.it
    kicked off The DAO’s record-breaking initial coin offering (ICO), DAOs were well
    established as the third wave of the increasingly mainstream blockchain phenomenon.^([²](#fn2))


    To better understand the DAO terminology, please refer to the Ethereum developer
    blog (`https://blog.ethereum.org/2014/05/06/daos-dacs-das-and-more-an-incomplete-terminology-guide/`)
    describing this at great length. Although many people consider Bitcoin to be the
    very first DAO, there were drastic differences in the natures of the two services.
    Although it is true that Bitcoin was governed by code shared by every miner in
    the network, Bitcoin doesn’t have an internal balance sheet, only functions by
    which its users can exchange value. Although other DAOs at the time did have a
    concept of asset ownership, what made The DAO unique was that central to its code
    were the radically democratic processes that defined how The DAO would deploy
    its resources. It was a realization of Buterin’s concept of a corporation that
    could conduct business without having a single employee, let alone a CEO.


    From the DAO white paper:


    > *This paper illustrates a method that for the first time allows the creation
    of organizations in which (1) participants maintain direct real-time control of
    contributed funds and (2) governance rules are formalized, automated and enforced
    using software. Specifically, standard smart contract code has been written that
    can be used to form a Decentralized Autonomous Organization (DAO) on the Ethereum
    blockchain.*'
