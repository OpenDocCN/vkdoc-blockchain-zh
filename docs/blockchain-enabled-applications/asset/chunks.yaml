  trans: '

    # 优先股（B 类）


    优先股是向在公司持有重大股份的投资者发行的一种特殊股票。与普通股相比，这种股票具有若干财务优势，投资风险更低。在股息方面，优先股在普通股之前兑付，因此能获得公司利润中更大份额的分配。此外，普通股的股息支付可能有所变动，但优先股对股东有固定回报。将此类资产编入
    DAO 的过程需要使用 `aragon-cli`（命令行界面）。具体来说，我们利用 `aragon-cli` 为 DAO 创建一个名为 `MiniMeToken`
    的通用 ERC20 代币的克隆，并通过 `Agent` 导入。这使得一种新型资产得以导入并在我们的 DAO 中使用。


    # 创始人股（F 类）


    F 类股是向公司创始人发行的专属优先股。这类股票拥有更大的投票权；例如，一股创始人股可以算作十票。相比之下，一股普通股仅算作一票。创始人股授予超级投票权，通常用于在涉及大量实体时保持对公司决策过程的控制。


    **注意**


    使用 `aragon-cli` 超出了本章的讨论范围；然而，它允许实现非常强大的集成。例如，DAO 可以就一种新导入的代币进行投票，将其作为收款资产，让持有者通过向
    DAO 投资而每年获得付款回报。


    ## 总结


    在本章中，我们讨论了去中心化组织的概念。我们首先在基于区块链构建的去中心化组织背景下介绍了 Aragon。我们讨论了 DAO 的定义以及 Aragon 所实现的组织机构。然后，我们深入探讨了
    Aragon 代币，以及借助 DAO 开展社交活动的用例的出现。最后，本章的核心内容是逐步讲解如何建立、管理和运营一个 DAO，包括其所有基本功能。本章为创建你自己的
    DAO 奠定了基础。


    # 6. DAO 遭黑客攻击


    在第 5 章中，我们讨论了去中心化组织的概念以及 DAO 的运作方式。在此，我们希望强调一个导致第一个 DAO 创立的历史性时刻，以及它最终如何被黑客攻击。我们的讨论从
    Buterin 对去中心化组织的新颖视角开始，进而引出 Slock.it 的故事——这家公司处于 DAO 革命的核心。然后，我们展示了一些导致 The DAO
    功能失常的代码：与漏洞相关的智能合约片段、允许从 The DAO 重复提取资金的条件，以及攻击本身。最后，我们通过讨论这次黑客攻击的后果来结束本章：关于硬分叉与软分叉的争论，以及以太坊经典（Ethereum
    Classic）的诞生。


    ## 引言


    全球区块链社区的讨论始终带有理想主义色彩，这可以追溯到中本聪早期关于比特币作为对中央银行业务的回应而撰写的文章。其核心思路是：容易腐败，或无论如何只迎合少数人意愿的系统，如果由代码来治理，可能会变得更负责任。如果该代码存在于区块链上，那么它就不会受到少数派有偏见干预的影响。秉承这一传统，在
    2013 年 9 月为《比特币杂志》撰写的一篇博客文章中，Vitalik Buterin 探讨了 DAO 的概念。文章开头如下：


    > *米特·罗姆尼提醒我们，公司也是人。无论你是否同意他的党派支持者从这一主张中得出的结论，这句话确实含有大量真理。毕竟，公司除了是一群按照特定规则共同工作的人之外，还能是什么呢？当一家公司拥有财产时，这实际上意味着存在一份法律合同，规定该财产仅可被用于当前董事会控制下的特定目的——而董事会本身又可由特定股东群体修改。如果一家公司做了某事，那是因为其董事会已同意应当这样做。如果一家公司雇佣员工，这意味着员工同意按照一套特定的规则（特别是涉及薪酬的规则）为公司的客户提供服务。当一家公司拥有有限责任时，这意味着特定的人被授予了额外特权，可以减少被政府法律起诉的担忧——这是一群比单独行动的普通人拥有更多权利，但最终仍是普通人的人。无论如何，归根结底，这不过是人与合同罢了。*

    >

    > *然而，这里出现了一个非常有趣的问题：我们真的需要这些人吗？* ^(¹)


    在 Buterin 的文章首次发表三年后，The DAO 作为一个用 Solidity 编写的智能合约诞生了，这或许是这种理想主义最纯粹的体现。尽管有着典范性的标签，The
    DAO 并非第一个——也非最后一个——去中心化自治组织。事实上，到 2016 年 5 月，当 Slock.it 的领导层启动 The DAO 创纪录的首次代币发行（ICO）时，DAO
    已被公认为日益主流的区块链现象的第三波浪潮。^(²)


    为了更好地理解 DAO 术语，请参阅以太坊开发者博客（`https://blog.ethereum.org/2014/05/06/daos-dacs-das-and-more-an-incomplete-terminology-guide/`），该博客对此进行了详细描述。尽管许多人认为比特币是第一个
    DAO，但这两种服务的性质存在巨大差异。虽然比特币确实由网络中每个矿工共享的代码治理，但比特币没有内部资产负债表，只有用户可以用来交换价值的函数。尽管当时其他的
    DAO 确实有资产所有权的概念，但 The DAO 的独特之处在于其代码核心是极其民主的过程，这些过程定义了 The DAO 将如何部署其资源。这是 Buterin
    关于一个可以在没有一名员工（更不用说 CEO）的情况下开展业务的公司的理念的实现。


    摘自 DAO 白皮书：


    > *本文阐述了一种方法，该方法首次允许创建这样的组织，其中 (1) 参与者保持对贡献资金的直接实时控制，并且 (2) 治理规则通过软件被形式化、自动化并强制执行。具体来说，已经编写了标准的智能合约代码，可用于在以太坊区块链上组建一个去中心化自治组织（DAO）。*

    '
- fmt: "Buterin 谈到了在区分去中心化组织与传统公司时，自动化与资本之间的平衡。来自 ConsenSys 的 Paul Kohlhaas 展示了图 [6-1](#430562_2_En_6_Chapter.xhtml#Fig1)，用以说明\
    \ DAO 在自治组织谱系中的位置。请注意，此图显示了不同类型的自治组织分布在从自动化到人工控制的谱系上，例如简单的去中心化组织（DO）和传统的去中心化公司（DC）。\n\
    \n![../images/430562_2_En_6_Chapter/430562_2_En_6_Fig1_HTML.jpg](images/430562_2_En_6_Chapter/430562_2_En_6_Fig1_HTML.jpg)\n\
    \n**图 6-1**  \n作为由自动化驱动决策、并有人类参与的实体——DAO\n\n本质上，DAO 是一次范式转变，它颠覆了以往不包含资本的自动化实体。通过使用区块链，我们可以注入资本，并构建混合商业模式，从而针对特定用例精细调整自动化的程度。以下是图\
    \ [6-1](#430562_2_En_6_Chapter.xhtml#Fig1) 中三个新术语的简要词汇表：\n\n- **DA**：去中心化代理（Decentralized\
    \ agents），本质上是开发者为实现特定任务而编程的机器人。DA 与 DAO 的主要区别在于后者拥有内部资本。\n- **DC**：去中心化公司（Decentralized\
    \ corporations），本质上是介于不运营内部资本的论坛与完全自动化的去中心化代理之间的一种媒介。\n- **DO**：去中心化组织（Decentralized\
    \ organizations），本质上是介于传统公司与完全自治的 DAO 之间的一种媒介。\n\n## 团队\n\n在区块链世界中，常出现的情况是，对于没有员工的\
    \ DAO 与编写并维护了 The DAO 代码的人类之间的关系性质，存在着许多混淆。就 The DAO 而言，这些人类由 Slock.it 的高层领导，这是一家德国公司，旨在通过他们称之为“通用共享网络”（USN）的技术来颠覆共享经济。\n\
    \nSlock.it 的首席执行官 Christopher Jentzsch 和首席运营官 Stephan Tual，在创立 Slock.it 之前，曾在以太坊基金会担任高级职务（分别是首席测试员和首席商务官）。Jentzsch\
    \ 是 The DAO 代码的主要开发者，而 Tual 则通过博客文章、会议演讲和论坛贡献成为了 The DAO 的代言人。那么，他们现在的公司会如何从创建基于以太坊的无领导者风险投资基金中受益呢？要理解他们的动机，我们必须审视\
    \ Slock.it 将区块链连接到物理世界的愿景。\n\n在构建 USN 的过程中，Slock.it 旨在物联网技术的主流普及中扮演核心角色。通过提供一种从世界任何地方与网络设备进行交互的方式，USN\
