  trans: '

    **维克拉姆：** *能否请您再多谈谈 Hashed Health 模式如何使成员受益？该组织目前的结构是怎样的？*


    **约翰：** 我们对成员的目标是构建社区和产品，以有意义的方式利用区块链和分布式账本技术的优势。我们寻找的是能为项目和对话做出贡献的成员，而不仅仅是试图从这个团体中获取价值。我们认为自己首先是一家医疗公司，因此我们开展的项目必须始终以患者的最大利益为考量。


    我们的成员通常以普通成员的身份参与，他们在准备开始构建之前需要一些咨询。医疗机构内部的业务和技术专业知识水平非常薄弱，因此需要采取咨询式的方法。成员们通常有一两个他们相信自己想要解决的概念，但在开发之前，他们总是需要一些指导和准备。通过提供医疗专业知识和区块链专业知识，我们能够交付独特的产品，以更高效的方式推动有实际应用价值的概念向前发展。通过创建合作协议，我们可以构建激励措施，以支持在从概念到实际应用的道路上完成合理的里程碑。


    我们的每个网络都有其自身的参与者、节奏、商业计划、技术计划、治理结构和特性。每个网络都专注于解决特定的业务问题，我们选择适合业务需求的协议。目前，我们已经在`Hyperledger
    Fabric`、`Ethereum`、一个名为`BitSE`的商业平台以及`Tendermint`和`Ethermint`上构建了产品和演示。我们正在研究其他协议和各种中间件产品，包括`Gem`、`Bloq`、`Nuco`、`Stratumn`、`Tezos`、`EOS`和`IOTA`。各工作组共享跨项目通用的经验教训和最佳实践。我们拥有（内部或外包的）专家，可以支持推进产品所需的任何讨论（技术、商业、法律、法规）。


    为了跨越鸿沟，我们认为从简单的价值演示开始非常重要。越简单越好。我们更倾向于那些不高度政治化、不需要受保护信息、能在当今环境中解决问题，同时为我们未来的愿景奠定基础的项目。


    **维克拉姆：** *让我们深入了解一下 Hashed Health 内部运营工作组的组合以及当前的目标领域。您能否为我们详细阐述一些案例，以及它们是如何使用区块链的？*


    **约翰：** 在撰写本文时，Hashed Health 有五个活跃的企业工作组：


    1.  提供者身份

    2.  患者身份

    3.  支付

    4.  供应链物联网

    5.  临床物联网（可穿戴设备）


    我们还在组建几个新的企业工作组，预计很快就能投入运营，包括：


    1.  疾病登记

    2.  临床试验

    3.  医疗记录

    4.  制药收入周期

    5.  企业资源管理系统


    这些是 Hashed 团队既具备专业知识又有客户兴趣的领域。通用会员费支持初步的商业案例和技术研究。一旦决定开始构建，客户需要签订针对特定项目的二次开发协议。


    我们最广为人知的例子或许是去中心化医生身份。提供者身份及其相关数据是当前和未来医疗服务交付的基础。从研究生医学教育到州立执照、医务人员资质认证以及支付方合同，关于提供者身份、资质和声誉的数据可及性和可靠性对于确保患者安全和高质量护理至关重要。全球范围内，世界正面临合格卫生工作者的短缺。据估计，这一短缺数量为
    790 万，并预计到 2035 年将增长至 1290 万。在这一短缺中，一个关键的挑战是如何识别、定位并与偏远地区的工作者进行沟通。单一提供者的身份是一个复杂的数据点集合。医学院、州执照委员会等多个不同利益相关方持有多种元素。有些元素随时间保持静态（如研究生学位），而其他元素则是动态变化的（如执照、隶属关系、居住地和联系方式）。


    在这个案例中，我们将数据字段视为独立的数据资产。提供者和认证利益相关方共同管理一个分布式提供者档案注册表。加密签名确保了对基本资质和认证的主要来源验证，允许分布式网络共享关键数据的实时更新。这个过程极大地减少了当前存在的时间、金钱和浪费人力的人工流程。这个案例之所以有吸引力，是因为它在技术上相当直接，不涉及政治，数据不敏感，并且没有关键利益相关方具有竞争利益。我们认为这是一个很好的区块链应用案例，因为提供者身份并非中心化，目前存在需要克服的信任和激励问题。尽管目前有尝试将这类信息集中化的努力，但各种数据元素并非集中授予、管理或消费。一个易于审计的市场级数据结构将在一个目前既缺乏信任也缺乏效率的市场中带来信任和效率。


    在这个例子中，你可以看到 Hashed Health 如何用一个基于简单但影响深远的案例构建的简单产品，为一个市场播下了种子。区块链使我们能够以一种以前无法想象的方式来解决这个问题。


    我们对其他基础性案例也同样感到兴奋。我们正在与提供者合作开发患者注册授权产品。我们正在与一个多方工作组合作，开发一个将支付与福利和行为联系起来的令人兴奋的支付模式。我们正在与政府机构合作，开展公共卫生监测和临床试验去中心化项目。我们已经开始了一段激动人心的旅程，并在区块链和特定医疗主题领域不断获得动力、新想法和额外的专业知识。


    **维克拉姆：** *将区块链整合到医疗中的一个主要问题是隐私担忧。区块链本质上设计为匿名，但对于健康数据，我们需要这种有趣的组合：受信任的矿工、完全私密的交易，以及同时在区块链上达成网络共识。您对隐私的演变有何看法？*

    '
- fmt: '# John 的访谈


    **John:** 我们首先承认，医疗健康领域才刚刚起步，在这个早期阶段，一切并不完美。这种不成熟的一个明显例子体现在我们围绕公有链与私有链的讨论中。关键区别在于，虽然许可链仅仅是*分布式*解决方案，但开放区块链提供了真正的*去中心化*。从技术角度来看，我们根据要解决的问题来选择协议。我们接受这样一个概念：所谓的“区块链”实际上代表了一系列基于信任的交易系统，范围从开放、去中心化到私有、分布式。我们相信，行业将朝着开放和公有链的方向发展，但这可能需要时间才能实现。医疗健康企业，就像金融服务和其他企业一样，看重更高程度的控制权，或许最重要的是，看重目前在开放、真正去中心化的区块链上无法实现的机密性。无可争议的是，对于一系列商业用例，许可链是理想的选择。我们相信，企业需要时间来适应更传统的区块链模型，即便这些模型显然提供了最高的安全性。


    重要的是要批判性地审视这种对控制的偏好何时会变成一种具有破坏性和自我挫败的偏见。开放和去中心化的区块链正持续爆发式地涌现。仅排名前两位的加密货币就占据了650亿美元的市场资本。此外，“首次代币发行”（ICO）这一较新的趋势已通过众筹吸引了超过10亿美元，主要面向开源、去中心化的区块链平台。对这些开放平台的巨大兴趣和资金支持不容忽视，也不应被忽视。它们预示着个人和企业都有巨大的机会去重新思考所有权、网络控制权以及为支持公共福祉的基础设施进行融资等概念。这在资助那些挑战当前“企业统治”的平台时可能至关重要。在医疗健康领域，我们可以资助大型公共基础设施项目，将健康与
    wellness 的权力交到真正的客户手中。这非常强大，而且很难想象通过传统方式如何能获得这样的资金。


    撇开区块链上机密交易和受保护健康信息的技术问题不谈，医疗健康企业运营在开放网络上的前景对许多企业来说确实令人生畏。几十年来，尤其是自《平价医疗法案》实施以来，医疗健康网络的集中化、整合和日益扩大的控制权一直是该行业的主导商业战略。医疗健康领域的商业成功主要来自于对价值链（聚焦于参保人群、药品、理赔、专科网络、门诊设施和物资）进行越来越大的控制。显然，如今价值链参与者攫取的价值过多。开放的区块链解决方案会暴露这些关系，并迫使更轻量、更敏捷、能增加价值的参与者进行“再中介化”。区块链技术向医疗健康行业提出的一个棘手问题是，开放、去中心化的网络为真正有价值的医疗服务提供了非传统但切实可行的机遇。


    **Vikram:** *随着区块链的成熟，你认为主要价值会在哪里创造？我们之前谈到过“胖协议”在架构层面创造和捕获价值，但网络层面呢？*


    **John:** 在当今的医疗健康行业，拥有和运营网络是最终的商业目标。医疗服务的消费者几乎没有市场权力，他们的选择受限于定义当今医疗网络的那些晦涩且不透明的合同关系。他们无法自行组建由医疗服务提供者和服务构成的网络；他们无法就价格或其他增值服务进行谈判。消费者反而被“引导”。但是，一个开放、去中心化的医疗服务市场将使消费者能够自由地做出理性的经济决策。但一个开放的网络必须摆脱那些限制选择并驱使患者被“引导”的不良激励。现状与去中心化网络承诺之间的本质区别在于：运营一个去中心化网络本身并不是一门生意。


    到目前为止，医疗健康领域一直抵制平台化运动。在很短的时间内，我们已经看到 Uber、Airbnb 等公司颠覆了几个传统行业。医疗健康行业的领导者们目睹了这些市场的变化，同时对自己现有的医疗健康价值链过于复杂、监管过于严格、对失败的容忍度太低这一现实感到些许安慰。依靠这些假设可能是一个错误。成本正变得不可持续，消费者正要求另一扇门。


    开放区块链平台是医疗健康领域需要认识和接受的一个新现实。Hashed Health 计划朝这个方向迈进，并将继续推广开放解决方案。这些系统、协议和工具正在迅速成熟，并且不会消失。它们正在证明自己的经济可行性。平台本身基于开源软件构建。像非盈利基金会这样的组织现在有办法筹集足够的资金来启动这些平台。可以实施激励和费用结构来为持续运营提供资金，使平台真正自给自足。去中心化网络支持通用交易系统的核心区块链创新，可以防止平台受到任何单一实体的集中控制。开放治理模型正在不断完善。


    开放网络上的价值完全由所提供服务的经济基本面决定。相比之下，医疗健康行业的封闭生态系统似乎通过限制选择来扭曲真实价值，从而得以繁荣。巨大的成本和昂贵的行政低效率在某种意义上是为了集中对网络本身控制权而设计的必需品。通过放弃对基本平台本身的控制权，医疗健康企业可以通过提供有价值的服务，并以低得多的管理费用和行政成本负担，获得经济上的回报。


    最重要的一点是，尽管存在隐私和监管方面的担忧，开放、去中心化的网络与医疗健康领域并非根本不相容。技术壁垒很快就会让位于诸如“零知识证明”和其他执行机密区块链交易的手段等创新。真正的障碍是一种根深蒂固的商业思维模式，这种模式终将过时。问题不在于开放医疗健康网络是否会扎根，而在于何时扎根。短期内，我们需要私有网络来展示价值并推动对话向前发展。Hashed
    将成为开发这些网络的领导者，将其作为逐步迈向最终现实的步骤，即开放区块链将带来最具颠覆性和最有效的解决方案。正是那些能够放弃对网络死死控制的企业，才能收获最大的机遇。


    **Vikram:** *最后，我必须问问你关于最近的 ICO 热潮。每家区块链公司都试图进行 ICO——这让我想起了 90 年代末的环境。Hashed Health
    会进行 ICO 吗？代币将用于什么以及如何使用？*'
  raw: '**John:** We are the first to admit that healthcare is just getting started
    and things are not perfect at this early stage. A good example of the immaturity
    is evident in the conversations we have around public versus private blockchains.
    The key distinction being that while permissioned blockchains are merely *distributed*
    solutions, open blockchains offer real *decentralization*. From a technical perspective,
    we choose the protocol based on the problem we are solving. We are comfortable
    with the concept of the “blockchain” actually representing a spectrum of trust-based
    transactional systems ranging from open and decentralized to private and distributed.
    We believe that the industry will move towards open and public blockchains, but
    it may take time to get there. Healthcare enterprises, much like financial services
    and other enterprises, value greater levels of control and, perhaps most importantly,
    levels of confidentiality that currently are not possible on open, truly decentralized
    blockchains. It is undisputable that for a range of business use cases, permissioned
    blockchains are an ideal fit. We believe it will take time for companies to become
    comfortable with the more traditional blockchain models, even though it’s clear
    those models offer the greatest security.


    It is important to critically examine where this preference for control can become
    a damaging and self-defeating prejudice. Open and decentralized blockchains are
    continuing to explode onto the scene. The top two cryptocurrencies alone account
    for $65B in market capitalization. Further, the newer trend of “Initial Coin Offerings”
    (ICOs) has attracted over $1B via crowdfunding for mostly open source, decentralized
    blockchain platforms. The overwhelming level of interest and financial backing
    for these open platforms cannot be ignored, nor should they be. They signal a
    massive opportunity for both individuals and businesses to think differently about
    the concepts of ownership, control of the network, and funding for infrastructure
    that supports the common good. This could be very important in funding platforms
    that challenge the current corporatocracy. In healthcare, we could fund massive
    public infrastructure projects that put the power of health and wellness in the
    hands of the true customers. That’s powerful, and it’s hard to imagine how that
    would get funded through traditional means.


    Setting aside technical issues of confidential transactions and PHI on blockchains,
    the prospect of healthcare businesses operating on open networks is truly daunting
    to many businesses. Centralization, consolidation, and ever-widening control of
    healthcare networks has been the dominant business strategy for the industry for
    decades, especially since the introduction of the Affordable Care Act. Business
    success in healthcare has primarily come from ever greater control of value chains
    focusing on covered lives, pharmaceuticals, claims, specialty networks, outpatient
    facilities, and supplies. It is clear that too much value is being extracted by
    value-chain participants today. An open blockchain solution exposes these relationships
    and forces re-intermediation with lighter, more nimble value-adding actors. The
    uncomfortable question that blockchain technology poses for the healthcare industry
    is the unconventional yet tangible opportunities that open, decentralized networks
    offer for true value-added healthcare services.


    **Vikram:** *As the blockchain matures, where do you see the main value being
    created? We spoke earlier about the fat protocols creating and capturing value
    at the architecture level, but what about the network?*


    **John:** In today’s healthcare industry, owning and operating the network is
    the ultimate business goal. The consumers of healthcare services have very little
    market power with choices limited by arcane and opaque contractual relationships
    which define today’s healthcare networks. They cannot assemble their own networks
    of providers and services; they cannot negotiate on price or other value-added
    services. Instead consumers are “steered.” But an open, decentralized market for
    healthcare services would enable the consumer to be free to make the rational
    economic decisions. But an open network has to be free of the perverse incentives
    that constrain choice and drive patient steerage. The essential difference between
    the status quo and the promise of decentralized networks is this: running a decentralized
    network is not a business in and of itself.


    So far healthcare has resisted the platform movement. In a short period of time
    we have watched as Uber, Airbnb, and others have disrupted several traditional
    industries. Healthcare leaders have watched those markets change with some comfort
    in the reality that their existing healthcare value chains are too complex, too
    regulated, too sensitive to failure. Resting on these assumptions may be a mistake.
    The costs are becoming unsustainable, and consumers are demanding another door.


    Open blockchain platforms are a new reality that healthcare needs to recognize
    and embrace. Hashed Health plans to move in this direction and will continue to
    promote open solutions. These systems, protocols, and tools are maturing rapidly
    and will not go away. They are proving their economic viability. The platform
    itself is built upon open source software. Organizations such as non-profit foundations
    now have the means to raise sufficient funds to launch these platforms. Incentive
    and fee structures can be implemented to fund ongoing operations, making the platform
    truly self-sufficient. The core blockchain innovation of decentralized networks
    supporting common transactional systems can keep the platform the centralized
    control of any single entity. Open governance models continue to be refined.


    Value on open networks is defined purely by economic fundamentals of the services
    being offered. By contrast, the closed ecosystems of the healthcare industry seem
    to thrive on distorting true value by constraining choices. Tremendous cost and
    expensive administrative inefficiencies are in some sense a necessity designed
    to amass control over the network itself. By giving up control of the basic platform
    itself, healthcare enterprises can be economically rewarded by providing valued
    services with much lower burden of overhead and administrative cost.


    The most important point is that open, decentralized networks are not fundamentally
    incompatible with healthcare, despite privacy and regulatory concerns. Technical
    barriers will soon give way to innovations such as “zero-knowledge proofs” and
    other means of executing confidential blockchain transactions. The true barrier
    is an entrenched business mindset that will become obsolete in time. It is not
    a matter of if, but when open healthcare networks will take root. In the short
    term, we need private networks to demonstrate value and move the conversation
    forward. Hashed will be a leader in developing these networks as a step-wise approach
    to the eventual reality that open blockchains will deliver the most disruptive
    and effective solutions. It is those enterprises which can give up white-knuckled
    control of the networks that will reap the greatest opportunity.


    **Vikram:** *Lastly, I have to ask you about the recent ICO craze. Every blockchain
    company is trying to do an ICO—reminds me of the late nineties environment. Is
    Hashed Health going to do an ICO? What/how will the tokens be used for?*'
