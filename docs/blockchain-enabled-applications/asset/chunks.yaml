  trans: '

    **VD：** 本章的核心在于您的联盟模型。请详细介绍一下这个联盟提案。为什么选择联盟路线是最优方案？成员在该联盟模型下能获得哪些益处？


    **KK：** 如您所知，我们创建了 `Health Nexus`，这是一个公私合作、面向医疗健康领域的安全区块链协议。*公共*意味着您无需成为联盟成员也能访问区块链网络。而私有方面则涉及更多内容。在网络中运行节点需要满足两个要求：您必须是经过批准和认证的联盟成员，此外，还必须运行一台符合
    HIPAA 标准的服务器。


    我们选择这条路线有着非常实际的原因。区块链是一项新技术，您需要向 IT 安全团队以及企业高管解释，即便您提供的是基于区块链的工具，您的技术也是安全的。最终，您必须阐明去中心化的含义，并且您的客户必须对您的系统感到放心。如果客户无法理解去中心化协议的优势，或者健康数据与基础设施交互时的安全性，那就不可能赢得客户信任。理解区块链基础的陡峭学习曲线，使得对[网络]缺乏信任在许多行业，尤其是在医疗健康领域，成为了一个难以逾越的障碍。教授区块链基础知识会引出关于服务器的问题。如果您提到服务器可以位于世界任何地方，您就必须以一种客户能理解的方式解释为什么这并非安全风险。


    因此，对现有去中心化区块链协议的普遍看法促使我们决定创建 `Health Nexus`。`比特币` 一直面临立法和认知上的挑战，特别是其交易所有与“丝绸之路”活动相关的历史。试图在曾与非法活动挂钩的平台上构建医疗保健应用，本身就是行不通的——它使得与客户决策者的对话无法进行。`以太坊`
    是真正意义上的公共模型：世界上任何国家、任何地点的任何用户都可以运行节点。我们预计，任何基于我们协议构建的公司，都必须回答医疗保健 IT 部门提出的“谁在运行网络”的问题。如果答案是“我不确定”或“看起来是其他国家的用户”——包括那些在联邦制裁名单上的国家——这就会造成一个死局，而使用
    `以太坊` 就会出现这种情况。此外，需要向 IT 部门深入解释这一点，会延长本已漫长的医疗保健应用销售周期。再次强调，这两个问题都基于现有认知，但仅仅是这一点就已经影响了应用落地。不得不解释“丝绸之路”或位于
    OFAC 制裁名单国家的服务器问题，增加了不必要的复杂性。


    能够描述一个由已知节点运行者组成的网络，这些运行者必须维护一台符合 HIPAA 标准的服务器来运行基于治理的区块链，这比 `比特币` 或 `以太坊` 更能体现医疗健康的语言特性；因此，这也是
    `Health Nexus` 核心基础设施和设计理念的由来。我们网络的私有接口有两个方面：没有您的私钥，任何人都无法访问您的医疗数据；其次，我们知道网络中节点的运行者是谁。所有服务器都符合
    HIPAA 标准，您的受保护健康信息数据并不存储在区块链本身之上。我们仅使用账本在区块中传播元数据链接以及仅能用私钥解密的交易。在这个协议上，各方可以达成平起平坐的共识。这就是我们称之为“医疗安全”的原因。


    我们选择联盟路线的原因正是为了创建这种公私接口。我们希望创建一个公共网络，但它不能是完全无需许可的。因此，我们设计了一个验证流程，任何运行网络的人都可以验证并确认潜在的联盟成员是否确实在运行一台符合
    HIPAA 标准的服务器。您可以对此服务收取费用，就像任何符合 HIPAA 标准的公司每季度付费给第三方来测试其系统并维护其 HIPAA 合规性一样。


    成为联盟成员有技术要求，验证过程是二维的：您必须首先得到一位现有联盟成员（验证者）的验证，然后必须通过投票表决被接纳。新成员需经过涉及整个联盟的正式投票流程，并且必须确保其节点始终保持可用。在投票过程中，新成员必须说明为何想加入联盟、在区块链和医疗健康领域的过往经验、以及他们作为联盟成员保持积极角色的兴趣和承诺。随后，联盟投票决定是否接纳新成员。所有成员（包括我们公司）拥有平等的投票权，所有与成员相关的操作投票都会被记录在链上。为此，任何成员都可能因恶意行为被踢出，并且对风险行为或不活跃状态的容忍门槛很低。过去，我们曾通过投票移除了一名因不活跃而无法履行职责的联盟成员。这一流程将治理理念植入了联盟区块链，也有助于维护医疗健康实体的保护性质。该治理流程如下图
    15-1 所示。


    **VD：** *总的来说，创建一家区块链公司很困难，但您成功克服了几个障碍。主要挑战是什么？融资过程如何？请谈谈您获得的 NSF 资助。有什么让您感到非常兴奋的新功能或新想法吗？*


    **KK：** 寻找早期联盟成员出乎意料地容易，因为我们已经有庞大的网络可以联系。最困难的部分是，在缺乏像其他老牌区块链网络（如 `以太坊`）那样的货币激励的情况下，如何保持成员的参与度（例如，参与挖矿）。尽管我们的技术自
    2017 年秋季就已准备就绪，但由于主网上线所需经历的昂贵且冗长的 SEC（美国证券交易委员会）流程，我们目前只能发布测试网。我们很感激，到目前为止，一些成员是出于善意以及他们对于区块链在医疗健康领域长期影响的奉献精神在运行我们的网络。不幸的是，就目前而言，在美国，真正的医疗健康区块链应用非常困难，尤其是受立法环境所限。未来必要的政策转变将为所有行业的数字资产创造一个更开放的环境。


    有趣的是，在 2020 年，每个人都对 DeFi 感到兴奋，感觉区块链又“火”了，我们终于可以真正谈论区块链了。从 2018 年到 2019 年，几乎所有人都在谴责区块链技术。在医疗健康领域创新极具挑战性，而在医疗健康领域使用像区块链这样的新技术进行创新则更加困难。我们的成功恰恰源于我们战略性地聚焦于保持技术尽可能简单（从一个基本的审计追踪开始），并以一种为医疗健康领域创建安全应用落地的方式构建（专注于公私协议并强调治理）。

    '
- fmt: 'With regard to fundraising, of course it has been challenging, but particularly
    due to systemic biases that drive decision making. Right now, women receive only
    3 percent of all fundraising dollars. In comparison, `WeWork` received more investment
    funds than all the female founders combined in 2019, and we all saw how that turned
    out. Fundraising can be an uphill battle, and is increasingly more challenging
    depending on your gender, race, and ethnicity. While we did manage to get the
    investment we needed in 2017, it was an arduous journey.


    However, through grants and loans, the federal government has been much more supportive
    in funding our company than investors. Specifically, we received a highly competitive
    Phase I Small Business Technology Transfer (STTR) grant from the National Science
    Foundation for our research implementation of `Graphene` on our `Health Nexus`
    protocol. Our university partners were Dr. Brian Levine and his postdoc student
    Dr. George Bissias of the University of Massachusetts–Amherst. Dr. Levine is the
    director of the Cybersecurity Institute in the [College of Information & Computer
    Sciences](https://www.cics.umass.edu/), where he focuses on security in the context
    of the internet and mobile systems, including child rescue, privacy, blockchains,
    cellular networks, and peer-to-peer networking. Drs. Levine and Bissias had successfully
    implemented `Graphene` on the `Bitcoin` blockchain. Our goal, which we achieved,
    was to similarly leverage this block propagation technology on `Health Nexus`
    to compress block size, improving blockchain performance. As the industry continues
    to wrestle with the complexities of decentralized systems such as speed, energy
    consumption, and efficiency (including cost), we are proud to have proven that
    `Graphene` is an effective tool in making a blockchain more efficient. Using the
    least amount of bandwidth and latency as possible has numerous advantages for
    a decentralized blockchain, and we are confident [it] will contribute to necessary
    innovation and efficiency in healthcare.


    ![../images/430562_2_En_15_Chapter/430562_2_En_15_Fig1_HTML.jpg](images/430562_2_En_15_Chapter/430562_2_En_15_Fig1_HTML.jpg)


    Figure 15-1 Governance cycle in Health Nexus


    # 16. The Art of the Newly Possible: Transforming Health with Emerging Technology
    and Federated Learning


    This chapter is derived from a presentation, “The Art of the Newly Possible: How
    5 Emerging Technologies Will Transform Health,” delivered by the authors (Heather
    Flannery, Jonathon Passerat-Palmbah PhD, and Sean T. Manion, and edited by Vikram
    Dhillon) at the online ConsenSys Health COVID-19 Veterans Health Summit on August
    26, 2020.


    ## Introduction


    Not since the dawn of the commercial internet have we experienced such a viable
    convergence of disruptive and transforming technologies as we do now in the world
    of healthcare. Our earliest attempts to revolutionize healthcare technology, unfortunately,
    were not fully inclusive, leaving providers, patients, and payers in an increasingly
    dire situation. We ended up with a massive digital divide with a worsening of
    disparities, a crisis in physician suicide due to the dehumanization of the art
    of medicine, and an array of other global problems. For the first time, we have
    innovations—with extraordinary positive potential for humanity—as significant
    as the obviously hypothetical, simultaneous debut of the Gutenberg printing press,
    the steam engine, the integrated circuit, and the internet. Of course, as with
    any disruptive technology, extraordinary risks and reasons for circumspection
    and ethically intentional consideration are paramount as we approach these changes
    that can transform healthcare. The overture to a new era is playing, and the time
    is now.


    This transformation of healthcare is an achievable reality through the implementation
    of three key areas of technology:


    1. **Blockchain** – including optional **tokenization**

    2. **Decentralized Artificial Intelligence (AI)** – primarily **machine learning**

    3. **Privacy-in-Depth** – including **zero-knowledge cryptography** and **verifiable
    and confidential computing**


    The largest healthcare enterprises in the world have been working on applied R&D,
    experimentation, planning, and business development regarding new models of blockchain
    technology in recent years. For example, the `Synaptic Health Alliance` was announced
    in April 2018 as a blockchain-focused healthcare industry consortium that includes
    industry leaders such as United Healthcare, Optum, Quest Diagnostics, Aetna, and
    other key stakeholders. The `Synaptic Health Alliance` has led the way not only
    in technology implementation but also in methods of governance, methods of capital
    formation, and methods of examining how different aspects of what we do in our
    industry can be removed from the basis of competition and mutualized.'
