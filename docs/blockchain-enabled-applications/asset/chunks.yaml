    \n现在我们已经讨论了共识，让我们看看是什么让节点接受私有交易。在以太坊中，所有交易都是公开的，并且默认情况下，节点只接受公开广播的交易。要使 `Quorum`\
    \ 工作，必须进行以下更改：\n\n*   POW 共识算法已被基于投票的 `QuorumChain` 所取代。最终目标是让多个共识算法以“可插拔共识”的模式在区块链上运行。\n"
- fmt: '- 经过修改的连接层，其中连接到许可账本的节点已被识别并注册。

    - 状态树已被拆分为两棵树：公共状态树和私有状态树。

    - 区块可以使用包含私有交易的新逻辑进行验证。

    - 交易可以通过将部分数据替换为加密哈希来创建，以在需要时保护隐私。


    私有交易和合约是如何在网络中传播的？私有数据的流向又是如何处理的？首先，以太坊交易模型中引入了一个新的可选参数`privateFor`，它可以接受多个地址。`Quorum`将来自此参数的地址视为网络中的私有地址。引入了一种新的交易类型`IsPrivate`，用于将某些交易标记为私有。然而，使私有交易传播成为可能的主要工具是`Constellation`：一种点对点加密消息交换系统。以下是`Constellation`在`Quorum`中提供隐私的基本工作原理：在私有交易传播到`Quorum`网络之前，消息（包含在交易中）和标头会被替换为从`Constellation`收到的加密负载的哈希值。网络中的某些参与者的公钥已被`Constellation`包含在负载中；当这些用户收到负载时，他们可以使用自己的`Constellation`实例进行解密。其他所有参与者只会看到一个加密的哈希值，并跳过该交易。涉及的参与者将解密负载并将其发送给`EVM`执行，从而相应地更新其内部状态。


    `Constellation`中有两个组件在维护隐私方面发挥着重要作用：交易管理器（`transaction manager`）和飞地（`enclave`）。交易管理器存储加密的交易数据，促进参与者之间加密负载的交换，并在满足条件时管理私有交易的传播。它还调用`Quorum`中的其他模块，特别是调用飞地执行加密功能。在许多方面，交易管理器像一个中央枢纽，控制着消息在`Quorum`的各个组件之间的流动。飞地是`Quorum`的加密核心。交易管理器本身无权访问任何敏感信息或密钥，它将对称密钥生成、数据加密和解密等加密任务委托给飞地。飞地还持有网络中账户的私钥。交易管理器和飞地都与其它组件隔离，以增强安全性。


    ## zk-SNARKs


    零知识证明，或称零知识简洁非交互式知识论证（`zk-SNARK`），是一种源自`ZCash`的新技术，旨在维护区块链上交易的隐私和匿名性。最近，`EEA`宣布，`ZCash`背后的团队将帮助为`Quorum`实现一个`zk-SNARK`层，以增强区块链上交易的隐私和安全性。零知识证明是如何工作的？`zk-SNARK`技术通常用于复杂的支付场景。让我们看一个例子：假设如果发生`X`、`Y`或`Z`中的任何一个事件，Alice就可以从智能合约中收到资金。现在，任何一种情况（`X`、`Y`、`Z`）都可能与Alice的健康状况或她不想向公众透露的商业决策有关。这正是`zk-SNARK`的用武之地，它可以为智能合约创建一个证明，表明三个条件（`X`、`Y`、`Z`）中有一个发生了，但不揭示具体是哪个条件发生了。更正式地说，来自`ConsenSys`的`Christian
    Lundkvist`将零知识证明描述如下：


    > “零知识证明的目标是让验证者能够说服自己，证明者拥有某个秘密参数（称为证据）的知识，该参数满足某些关系，同时不向验证者或任何其他人透露该证据。”


    在我们之前的例子中，Alice的三个选择构成了一个证据，她必须向智能合约证明其中之一发生了，但不需要透露具体情况。来自`ZCash`的`Paige Peterson`证实，`zk-SNARK`作为结算层将被引入`Quorum`，为交易提供增强的隐私和安全性。最终目标（在2017年共识大会上描述）是使零知识证明与区块链无关，并将结算层作为一种服务来实现。未来与零知识证明的集成可能成为许可账本处理企业级交易的一个范式转变。吸取一些经验教训并拥有更好的结算层后，在医疗保健领域保护患者数据和维护隐私方面将出现一些极好的应用机会。


    > **注意**

    >

    > `ZoKrates`是一个高级编程工具包，可用于以开发者友好的语言编写零知识证明。这些证明编译成兼容以太坊的`zk-SNARK`并在链上执行。此外，`ZoKrates`可以将可验证计算扩展到`DApp`，例如，可以在链下为某个任务执行计算证明，并将其提交到以太坊区块链进行验证。


    ## Review of Quorum Whitepaper


    图[11-21](#430562_2_En_11_Chapter.xhtml#Fig21)、[11-22](#430562_2_En_11_Chapter.xhtml#Fig22)和[11-23](#430562_2_En_11_Chapter.xhtml#Fig23)摘自Quorum白皮书（已获许可），以图形方式提供了Quorum的高级概述，强调了新的技术组件和私有交易。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig23_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig23_HTML.jpg)

    图 11-23：公共状态与私有状态的划分


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig22_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig22_HTML.jpg)

    图 11-22：隐私与私有交易在Quorum网络中传播的概述


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig21_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig21_HTML.jpg)

    图 11-21：Quorum概述及其关键创新


    注意图[11-21](#430562_2_En_11_Chapter.xhtml#Fig21)右上角Quorum的架构设计，正如我们之前描述的所有主要组件一样。此外，图[11-23](#430562_2_En_11_Chapter.xhtml#Fig23)展示了全局状态在Quorum网络上是如何维护的：公共状态在所有网络节点之间保持一致并保持同步，而私有状态则基于权限而变化。从这些幻灯片中最重要的收获是私有交易在Quorum网络中传播时的详细工作流程。我们没有机会详细说明这个流程，因此包含这些幻灯片将增强您对私有交易和加密负载在Quorum中如何工作的理解。'
  raw: '*   A modified connection layer where nodes connected to the permissioned
    ledgers are identified and registered.


    *   The state tree has been split into two trees: a public state tree and a private
    state tree.


    *   Blocks can be validated with new logic containing private transactions.


    *   Transactions can be created with some data replaced with encrypted hashes
    to preserve privacy where required.


    What propagates private transactions and contracts through the network and how
    is the flow of private data handled? For starters, there is a new optional parameter
    in the Ethereum Transaction Model called privateFor, and it can take multiple
    addresses. Quorum treats the addresses from this parameter as private in the network.
    A new transaction type IsPrivate has been introduced to mark certain transactions
    as private. However, the main tool making the propagation of private transactions
    possible is Constellation: a peer-to-peer encrypted message exchange. Here’s the
    basics of how Constellation works within Quorum to provide privacy: before a private
    transaction is propagated to the Quorum network, the message (contained within
    the transaction) and headers are replaced with the hash of an encrypted payload
    received from Constellation. Some participants in the network have had their public
    key included in the payload by Constellation; when those users receive the payload,
    they can decrypt it using their own instance of Constellation. Every other participant
    will only see an encrypted hash, and skip the transaction. The participants who
    are involved will decrypt the payload and send it to an EVM for execution, updating
    their internal state as a result.


    There are two components in Constellation that play an important role in maintaining
    privacy: transaction manager and the enclave. The transaction manager stores encrypted
    transaction data, facilitates the exchange of encrypted payloads between participants,
    and manages the propagation of private transactions if the satisfying conditions
    have been met. It also makes function calls to other modules in Quorum, especially
    the enclave for cryptographic functions. In many ways, the transaction manager
    behaves like a central hub, controlling the flow of messages from one component
    of Quorum to another. Enclave is the cryptographic core of Quorum. The transaction
    manager itself doesn’t have access to any sensitive information or the keys, and
    it delegates cryptographic tasks such as symmetric key generation and data encryption
    and decryption to the enclave. It also holds the private keys for accounts in
    the network. Both the transaction manager and enclave are isolated from other
    components to enhance security.


    ### zk-SNARKs


    Zero-knowledge proofs, or Zero Knowledge Succinct Non-interactive Arguments of
    Knowledge (zk-SNARK) , are a new technology native to ZCash where privacy and
    anonymity are maintained throughout the transactions happening on the blockchain.
    Recently, the EEA announced that the team behind ZCash would be helping implement
    a zk-SNARK layer for Quorum to enhance the privacy and security of transactions
    on the blockchain. How do zero-knowledge proofs work? The use of zk-SNARK technology
    is usually employed in complex payout situations. Let’s look at an example: Say
    that Alice receives money from a smart contract if either X, Y, or Z happen. Now
    any of those situations (X, Y, Z) may be sensitive to Alice’s health, or perhaps
    a business decision that she doesn’t want to reveal to the public. This is where
    zk-SNARK can shine, as it can create a proof for the smart contract that one of
    the three conditions (X, Y, Z) occurred, but not reveal which exact condition
    occurred. More formally, Christian Lundkvist from ConsenSys describes zero-knowledge
    proofs as follows:


    > *The goal of zero-knowledge proofs is for a verifier to be able to convince
    herself that a prover possesses knowledge of a secret parameter, called a witness,
    satisfying some relation, without revealing the witness to the verifier or anyone
    else.*


    In our previous example, the three choices for Alice constituted a witness, and
    she had to prove that one of those occurred to the smart contract, but didn’t
    need to reveal the specific circumstances. Paige Peterson from ZCash confirmed
    that zk-SNARK would be coming to Quorum as a settlement layer, proving enhanced
    privacy and security to transactions. The eventual goal (described at Consensus
    2017) is to make zero-knowledge proofs blockchain agnostic, and implement a settlement
    layer as a service. The future of integration with zero-knowledge proofs can be
    a paradigm shift for permissioned ledgers to carry out enterprise-level transactions.
    With some lessons learned, and a better settlement layer, there are some incredible
    opportunities for applications in healthcare to protect patient data and maintain
    privacy.


    Note


    ZoKrates is a higher-level programming toolkit that can be used to write zero-knowledge
    proofs in a developer-friendly language. These proofs compile to Ethereum-compatible
    zk-SNARKs and execute on-chain. In addition, ZoKrates can extend verifiable computations
    to DApps, where, for instance, a proof-of-computation can be performed off-chain
    for a task and submitted to the Ethereum blockchain for verification.


    ### Review of Quorum Whitepaper


    Figures [11-21](#430562_2_En_11_Chapter.xhtml#Fig21), [11-22](#430562_2_En_11_Chapter.xhtml#Fig22),
    and [11-23](#430562_2_En_11_Chapter.xhtml#Fig23) are taken from the Quorum, whitepaper
    (with permission) and provide a high-level summary of Quorum graphically, emphasizing
    the new technical components and private transactions.


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig23_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig23_HTML.jpg)


    Figure 11-23


    Segmentation of public and private states


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig22_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig22_HTML.jpg)


    Figure 11-22


    Overview of privacy and private transactions propagating the Quorum network


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig21_HTML.jpg](images/430562_2_En_11_Chapter/430562_2_En_11_Fig21_HTML.jpg)


    Figure 11-21


    Overview of Quorum and its key innovations


    Note the architectural design of Quorum in the top-right corner of Figure [11-21](#430562_2_En_11_Chapter.xhtml#Fig21),
    just as we described all the major components earlier. In addition, Figure [11-23](#430562_2_En_11_Chapter.xhtml#Fig23)
    demonstrates how the global state is maintained on the Quorum network: the public
    state maintains consensus and remains synchronized across all nodes on the network,
    whereas the private state varies based on permissions. The most important take-home
    point from these slides is the detailed workflow of a private transaction as it
    propagates through the Quorum network. We did not have an opportunity to illustrate
    this workflow, so including the slides enhances your understanding of how private
    transactions and encrypted payloads work in Quorum.'
