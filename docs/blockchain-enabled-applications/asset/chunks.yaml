  trans: '

    # 3. 区块链的基础


    `区块链`是一种去中心化的数据结构，其内部一致性通过所有用户对网络当前状态达成的共识来维持。这是一项解决拜占庭将军问题的赋能技术（该问题描述的是在三位将军之间建立信任，以便协调进攻击败敌人；更多内容见第
    1 章），并为无需信任的交易和信息交换的应用开发开辟了全新的可能性。如果说互联网实现了点对点信息交换的民主化，那么区块链则实现了点对点价值交换的民主化。本章将从探讨比特币网络上用户之间的交易如何运作开始，这涉及对区块结构和交易结构的技术性讨论。接着，我们将深入探讨钱包和用户地址的作用。在讨论钱包之后，我们将把重点转向比特币网络中实现的简单支付验证（SPV）。通过
    SPV，我们将理解为何区块具有特殊结构，更重要的是，比特币网络如何在高速扩展中保持效率。最后，我们将通过讨论区块链中的硬分叉和软分叉来结束本章，并阐述分叉对运行比特币核心代码的商家和用户在向前兼容性方面的影响。尽管在技术发展的"寒武纪大爆发"阶段，区块链存在众多变体，但其核心原则始终如一。


    ## 交易工作流程


    比特币协议的核心目标是允许用户之间以去中心化方式通过网络进行交易。到目前为止，我们一直在讨论协议的零散片段以构建背景知识。现在，我们可以将这些概念整合到一个统一框架中，并探索区块链。挖矿的最终结果是随着网络随时间演进，区块数量不断增加。要理解两个用户（Alice
    和 Bob）之间的交易如何发生，我们首先需要了解承载交易的区块结构。简单来说，区块链是由两个主要原则约束的区块集合：


    - **内部一致性**：每个区块的运行遵循若干固有设计原则，使区块链保持内部一致性。例如，每个区块都链接到链中的前一个区块，并带有创建时间戳。区块链中的此类机制使其成为内部一致的数据结构，能够稳定记录交易。


    - **交易共识**：上一章描述的挖矿概念仅仅是验证交易的一种实现方式；还存在其他不涉及暴力哈希计算的机制。然而，在所有这些实现中，都存在一种方案，用于在网络某一个`x`时间间隔内发生的交易达成共识。我们可以通过使用`工作量证明`或其他将交易汇集后由网络参与者验证的协议，来泛化这种去中心化系统中的交易验证。


    交易本质上作为区块的一个属性——一种通过网络传播的数据结构——被承载，但这是如何发生的呢？为了更好地理解这一过程，让我们观察图 3-1 所示的更完整的区块结构。每个区块至少包含两个独特组件：包含唯一标识该区块的哈希值（称为默克尔根）的区块头，以及包含来自交易池的新交易的交易列表。请注意，每个区块的列表中包含的交易数量相同，但用户之间的具体交易内容不同。这是因为每十分钟只有一个区块能在区块链上赢得挖矿竞赛。在我们的简化模型中，区块仅有另外两个组件：在整个网络中保持一致性的区块大小，以及每个区块中交易数量的计数器。在此，我们将重点关注区块头和交易列表。


    区块头包含几个标准组件，例如之前讨论过的难度目标和`随机数`。它还包含获胜矿工运行的比特币核心代码的版本号。时间戳也是每个区块的独特特征，它明确标识网络中的某个特定区块。区块头还包含链中前一个区块的哈希值，以及标识本区块的特殊哈希值，称为默克尔根。我们将在本章后续讨论这种特殊哈希值是如何构建的。


    ### 生存证明


    最近有传言称维基解密创始人朱利安·阿桑奇已经去世。阿桑奇最近在 Reddit 上举办了一场"问我任何事"活动，并通过读取区块链上最新的区块哈希值来回应这些谣言，以此证明他还活着。该区块仅是在十分钟前创建的，因此这不可能是预先录制的，从而毫无悬念地证明了阿桑奇健在。这是区块哈希值首次在流行文化语境中发挥作用，阿桑奇称之为`生存证明`。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig1_HTML.jpg](img/430562_2_En_3_Fig1_HTML.jpg)


    **图 3-1** 区块结构的简化概览


    红色文字显示每个区块中保持唯一的两个组件。我们进一步分解这两个组件如下。区块头由几个更小的部分组成，其中最特别的是默克尔根，它是唯一标识一个区块的哈希值。区块头包含前一个区块的哈希值、用于创建该特定区块的`随机数`以及网络难度，这些是我们之前讨论过的标准挖矿组件。如前所述，每个区块还包含一个交易列表。除了实际的交易之外，交易列表还包含对区块如何接受交易至关重要的几个组件。例如，锁定时间延迟规定了交易何时能被纳入区块。最后，该列表包含所有被此区块接受的交易，这些交易以一系列签名的输入和输出形式呈现，确保比特币从发送方转移到接收方。

    '
- fmt: '### Components of Transaction List


    There are several new terms and concepts introduced here, and we will go through
    all of them now. We already talked about the block header and the concepts of
    the timestamp on a block, the Merkle root, and a hash from the previous block.
    Now we will focus on the components of the transaction list, and let’s begin with
    the delay. The full technical term is lock time delay, which refers to the time
    after which a transaction can be accepted into a block. The precise mechanism
    involves the use of a parameter called `blockheight`, which increases as more
    blocks are added to the blockchain. A given transaction remains locked and unverified
    until the `blockheight` specified for that transaction is exceeded.


    Next, we need to talk about the concept of transaction inputs and outputs. These
    two parameters guide the flow of transactions across the whole network and remain
    deeply integrated with the concept of spending power. As a currency, the fundamental
    unit of spending power on the Bitcoin blockchain is called an Unspent Transaction
    Output (`UTXO`), which has a value given in satoshis. One Bitcoin can be further
    broken down into one hundred million satoshis, analogous to a dollar’s being broken
    down into 100 cents. The network records the entire Bitcoin economy as transactions
    that have been either spent or unspent. During a transactional event, all of the
    buyer’s Bitcoins are applied toward purchasing an item, and this yields two outputs:
    a spent transaction that is locked for the buyer, and the remaining Bitcoins that
    are put into an unspent transaction. These unspent transactions are returned to
    the buyer and grant spending power toward future transactions. For an end user,
    keeping track of unspent transactions has been automated by the use of wallets.
    The idea of an account balance is created for a user by the wallet software that
    searches the blockchain and collects all the `UTXO` belonging to a particular
    address. Essentially, the Bitcoins belonging to a user result from `UTXO`s generated
    across several transaction events. We will discuss the concepts of wallets and
    addresses shortly.


    To understand `UTXO` practically, we need to talk about the concept of change
    and change addresses. The idea is very simple actually—think about the last time
    you bought groceries and paid with cash. Your transaction had two components:
    you paid for what you purchased and that payment was designated to the merchant,
    and you received some change back that was left over from your payment. `UTXO`s
    are the change you receive back. This change goes to a Bitcoin address (called
    change address) that you own; refer to Figure [3-2](#430562_2_En_3_Chapter.xhtml#Fig2)
    for a graphical depiction of this process and follow along. Every transaction
    is split into two parts: a portion that is spent and locked (or assigned) to the
    merchant, and a portion that is returned back to the buyer. The returned portion
    is the unspent transaction output that can be used for future transactions. In
    a transaction, `UTXO`s that are consumed by the transaction are called the inputs,
    and the `UTXO`s left over or created from a transaction are called the outputs.
    Only transaction outputs (the `UTXO`s owned by a user) can be spent in future
    transactions. The example in Figure [3-2](#430562_2_En_3_Chapter.xhtml#Fig2) illustrates
    a similar scenario, where Bob wants to send 1 BTC to Alice, but in the process,
    the 10 BTC owned by Bob are split into two parts: the 1 BTC sent to Alice, which
    is now assigned to her, and the 9 BTC that are returned to Bob in the form of
    `UTXO`. Both of these components are recorded on the blockchain because they are
    a part of a transaction, as shown in Figure [3-2](#430562_2_En_3_Chapter.xhtml#Fig2).


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig2_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig2_HTML.jpg)


    **Figure 3-2** – Format of a UTXO in the transaction list


    In this example, Bob wants to send 1 BTC to Alice, and the figure shows how this
    transaction occurs. The BTC owned by Bob are used as the input of the transaction,
    and the output is in two parts, one sent to Alice for 1 BTC and the second one
    returned as change back to Bob. It should be noted here that the initial transaction,
    newly assigned transaction, and the change are recorded on the blockchain as the
    input and output.


    Now that we have a better grasp of `UTXO`s, let’s talk about how transactions
    are assigned from one user to the other. This involves the use of private–public
    keypairs that lock and unlock the transactions. The process works as follows:


    - A user, Alice, initiates a transaction that she wants to send to Bob.

    - Alice uses her private key to sign the transaction.

    - The transaction is broadcasted on the network, and anyone can use Alice’s public
    key to verify that the transaction originated from her.

    - Bob receives the transaction after it has been verified on the network and propagated
    to him.

    - Bob unlocks the transaction using his private key. The transaction was signed
    with a script such that only the recipient could unlock the transaction and assign
    it to themselves.


    We mention that the transaction locking and unlocking mechanisms use a script,
    so what is this script? The Bitcoin protocol uses a minimal, bare-bones, and Turing-incomplete
    programming language to manage transactions. Satoshi’s intention was to keep the
    programming logic very simple and largely off the blockchain whenever possible.
    A script is attached to every transaction and contains instructions on how the
    user receiving Bitcoins can access them. Essentially, the sender needs to provide
    a public key that anyone on the network can use to determine that the transaction
    did indeed originate from the address contained in the script, and a signature
    to show that the transaction was signed using the sender’s private key. Without
    the private–public keypair authorization, transactions between users would not
    occur. Let’s complete the picture that we started to create with the `UTXO`s,
    shown in Figure [3-3](#430562_2_En_3_Chapter.xhtml#Fig3).


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig3_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig3_HTML.jpg)


    **Figure 3-3** – Propagation of transactions on the blockchain


    Conceptually, it might be bizarre to consider spent transactions as locked, and
    unspent transactions on the network as `UTXO`s spread across hundreds of blocks,
    but this process is exactly how transactions are propagated across the network.
    In our example shown in Figure [3-3](#430562_2_En_3_Chapter.xhtml#Fig3), Bob first
    initiated the transaction that was sent to Alice, and 1 BTC was assigned to Alice.
    He received 9 BTC in change as the unspent output. Alice further sends 0.5 BTC
    to another user, and in doing so, she receives 0.5 back in change from her transaction.
    Notice that the first transaction was signed by Bob, who initiated the transaction,
    and then Alice signed the second transaction. In a sense, the output from the
    first transaction became an input for the second, so Bob’s signature was retained
    as proof of the first transaction, and Alice’s signature now serves as the unlocking
    mechanism. This is how transactions can be tracked across the Bitcoin network
    from the origin to the final owner (final address). By using network addresses,
    the network retains a level of pseudonymity.


    Now that we have talked about `UTXO`s, signatures, scripts, and how transactions
    are recorded, let’s integrate these concepts and review the workflow of a transaction
    between Alice and Bob, shown in Figure [3-4](#430562_2_En_3_Chapter.xhtml#Fig4).


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig4_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig4_HTML.jpg)


    **Figure 3-4** – Overview of a transaction on the network'
