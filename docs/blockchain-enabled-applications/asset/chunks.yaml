    ### 2020 年监管动态


    美国证券交易委员会（SEC）设立的“金融科技创新中心”（FINHUB）——“创新与金融科技战略中心”，最能阐释 2020 年及以后美国金融市场的监管格局。^(³⁶)
    SEC 在其官网上表示：“SEC 已加入全球金融创新网络”，并额外增加了工具，以“帮助市场参与者评估联邦证券法是否适用于特定数字资产的发行、销售或转售”。这些积极主动的行动和努力，充分体现了市场的成长与成熟。SEC
    还赞助了与分布式账本技术（DLT）和监管科技（RegTech）相关的公开论坛。在过去几年中，围绕数字资产实施、教育和指导的监管相关问题，在众多领域都取得了长足进展。


    SEC 重点关注了与区块链和分布式账本技术相关的问题。区块链常被用于发行和转让数字资产的所有权，这些资产根据具体事实和情况，可能被认定为证券。此外，SEC
    的关注点还涉及数字市场，这通常指不通过传统金融机构作为中介的融资方式，例如众筹、在线市场借贷以及融资门户和平台。^(³⁷)


    2020 年年中，银行业也发生了重大变革与创新。美国货币监理署（OCC）——美国财政部下属的独立机构——“已明确表示，国民银行和联邦储蓄协会可以为客户提供加密货币托管服务。OCC
    认为银行提供加密服务是传统银行托管业务的一种现代形式。”^(³⁸) 这重申了 OCC 的立场，即“国民银行可以为其选择的任何合法业务（包括加密货币业务）提供合规的银行服务，只要它们管理好相关风险并遵守适用法律。”


    区块链技术正在推动资本市场进入运营效率的新时代。许多创新成果可以帮助金融机构采纳并充分利用数字资产流程与创新。正在推出新解决方案进行创新的领域包括：资产管理、资本市场、去中心化金融、全球贸易与商业、以及支付与货币。资本市场创新带来的部分好处包括：更快的资本获取速度、更高的偿付能力、新型金融工具、透明且实时的数据、降低的交易对手风险以及更低的运营成本。


    ### 去中心化金融（DeFi）


    金融资本市场的一场技术革命是去中心化金融（DeFi），它被定义为“开放式金融”。ConsenSys 将 DeFi 描述为：“由去中心化技术，特别是区块链网络所推动的经济范式转变。从点对点支付系统到自动化贷款，再到与美元挂钩的稳定币，DeFi
    已成为区块链领域最活跃的领域之一，为开发者、个人和机构提供了广泛的用例。去中心化金融利用以太坊区块链的三个关键原则，以释放流动性和增长机会，提高金融安全性和透明度，并支持一个集成且标准化的经济体系。”^(³⁹)


    DeFi 的三个关键原则如下：


    *   **可编程性：** 高度可编程的智能合约可自动执行，并促成新型金融工具和数字资产的创建。

    *   **不可篡改性：** 区块链去中心化架构提供的防篡改数据协调，增强了安全性和可审计性。

    *   **可组合性：** 以太坊的可组合软件栈确保 DeFi 协议和应用程序旨在相互集成和补充。


    ConsenSys 描述的去中心化金融创新用例包括：


    *   **了解你的交易（KYT）：** 类似于验证客户和交易对手身份（KYC）的流程，基于区块链的 DeFi 解决方案现使企业能够轻松监控、分析和验证交易细节，以防止欺诈并满足监管要求。

    *   **DeFi 数据与分析：** 通过我们全面且可定制的数据平台，跟踪锁定在 DeFi 协议中的价值、借贷的年化利率、交易量等信息。

    *   **代币效用：** 代币网络的可编程“使用证明”标准，在网络启动期间协调激励机制并最大程度减少投机行为，确保代币最终落入实际用户手中。

    *   **以太坊 2.0 质押：** 我们的“质押即服务”平台帮助合格的验证者在以太坊 2.0 信标链上验证区块时获得奖励并避免惩罚。^(⁴⁰)


    区块链创新的种种成果与可能性，正在推动美国及全球金融市场的快速变革。众多产品与解决方案以前所未有的方式相互协同。监管、银行业、资本市场与创新共同塑造着一个全新的金融世界。


    ## 总结


    随着众筹在全球范围内赋能区块链，未来关乎创造、创新、变革与全球影响。来自安永（EY）和 Innovate Finance 的报告均深入探讨了资本市场格局。克里斯·斯金纳（Chris
    Skinner）在其博客“金融科技与投行业界”中指出：“有一大批新技术正在重塑资本市场格局，成百上千的初创公司利用这些新技术，既辅助投资银行业务，又冲击其低效之处。规模最大的银行非但未忽视这些变革，反而纷纷投资其中。”^(⁴¹)


    高盛、花旗集团、摩根大通、摩根士丹利、富国银行和美国银行，仅仅是投资数百万美元于金融科技、区块链及其他技术创新的众多大型银行和投资银行中的一部分。


    资本市场的颠覆正在快速推进。近期《福布斯》的一篇文章指出，目前已有超过 900 种加密货币存在，并且每天都有新的加密货币加入。截至 2017 年年中，ICO
    市场吸引的资金规模已相当可观，堪比过去几年的风险投资市场。随着新技术启示的到来和金融资本的快速变化，未来市场将经历诸多波动，新法规将陆续出台，种种变革也在酝酿之中。


    我们向那些身处市场之中、憧憬为所有人创造更美好金融未来的创新者、梦想家、个人和团体，致以特别的敬意。孵化器、加速器、大学和投资公司为实现区块链的效率和创新而做出的巨大承诺，将改变世界看待金融资本的方式。


    创新的例子比比皆是。高盛、摩根大通、纳斯达克以及像 Triloma Securities 这样的特殊另类投资公司，都提供独特的产品、服务、创新和资本。在许多地方市场中，正在出现不同团体为技术领域的共同目标而协作的现象。在奥兰多和佛罗里达中部地区，一个独特的团体已经成立，旨在帮助初创企业并推动区块链研究和应用。该团体由多个组织组成，包括佛罗里达天使投资网络（Florida
    Angel Nexus）、汇流（Merging Traffic）、StartUp Nations Ventures、模拟与培训研究所（Institute of
    Simulation & Training）、METIL（混合新兴技术集成实验室）、医疗旅游协会（Medical Tourism Association）等，所有组织都在一个强大的公私合作伙伴关系生态系统中共同努力，为市场整体利益而推动变革。


    区块链将在金融资本领域掀起一场独特的技术革命。

