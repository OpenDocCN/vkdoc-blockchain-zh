  trans: '

    # 可验证数据审计


    谷歌的 DeepMind 正在开发一项有趣的类区块链服务，用于为使用其健康服务辅助临床诊断的医院提供审计日志。这些医院将敏感的患者数据传输至 DeepMind
    的机器学习和 AI 服务以进行临床预测，而该项目旨在确保数据的使用符合患者的知情同意。我们联系了 DeepMind 询问相关进展，经许可后，在此转载对“可验证数据审计”的概述。


    > *数据可以成为推动社会进步的强大力量，帮助最重要的机构改善其服务社区的方式。随着城市、医院和交通系统找到理解人们需求的新方法，它们也发现了改变当前工作方式的机遇，并识别出面向未来的激动人心的构想。*


    > *只有获得社会的信任和信心，数据才能造福社会，而我们在这方面都面临着挑战。既然数据可用于如此多的用途，人们不仅会问“谁在持有信息”以及“信息是否安全存放”，他们还想更确切地了解数据究竟被用来做什么。*


    > *在这种背景下，可审计性成为一项日益重要的品质。任何构建良好的数字工具都会记录其如何使用数据，并在受到质疑时展示和证明这些日志。但我们让审计过程越强大、越安全，就越容易建立起对数据实际使用方式的真正信心。*


    > *想象一项服务，它能对每一条个人数据的处理情况提供数学上的保证，且不可能被伪造或遗漏。想象能够实时检查该系统的内部运作，确保数据仅被用于应有的用途。想象支撑这一切的基础设施是免费开源的，这样世界上任何组织都可以按需构建自己的版本。*


    > *这个项目的暂定名称是“可验证数据审计”，我们非常兴奋能分享更多关于我们计划构建的细节！*


    ## 面向 DeepMind 健康的可验证数据审计


    > *今年内，我们将开始为* [*DeepMind 健康*](https://deepmind.com/applied/deepmind-health/)
    *构建可验证数据审计系统——这是我们为医疗服务提供技术，帮助临床医生预测、诊断和预防严重疾病的努力，也是 DeepMind 将技术用于社会公益使命的关键部分。*


    > *鉴于健康数据的敏感性，我们始终认为，在治理方面应像在技术本身一样力求创新。我们已经通过任命一个由不领薪水的* [*独立评审员*](https://deepmind.com/applied/deepmind-health/transparency-independent-reviewers/independent-reviewers/)
    *小组来对 DeepMind 健康进行额外监督，他们负责审查我们的医疗工作、委托审计，并发布年度报告公布其发现。*


    > *我们认为可验证数据审计是对这种监督的有力补充，为我们的合作医院提供额外的实时且经过全面验证的机制，来检查我们如何处理数据。考虑到个人医疗数据的敏感性，以及每次数据交互都需要适当授权并符合患者同意规则，我们相信这种方法在医疗领域将特别有用。例如，持有健康数据的组织不能简单地决定对用于提供护理的患者记录进行研究，或者将研究数据集用于其他未经批准的用途。换句话说：重要的不仅是数据存在哪里，更是数据被用来做什么。我们希望首次实现这一点能够被实时验证和审计。*


    > *那么，它将如何运作？我们作为数据处理者为合作医院服务，这意味着我们的角色是根据医院的指令提供安全的数据服务，而医院始终保留完全控制权。目前，每当我们的系统接收或接触这些数据时，我们都会创建一条交互日志，以便日后需要时进行审计。*


    > *通过可验证数据审计，我们将在此基础上更进一步。每次与数据进行交互时，我们都将向一个特殊的数字账本中添加一条记录。该记录会记载特定数据被使用的事实，以及使用的原因——例如，某项血液检测数据曾与英国国家医疗服务体系（NHS）的国家算法进行比对，以检测可能的急性肾损伤。*


    > *这个账本及其中的记录将共享* [*区块链*](https://en.wikipedia.org/wiki/Blockchain_%2528database%2529)
    *的部分特性——这也是比特币和其他项目背后的理念。与区块链一样，账本只能追加，因此一旦添加了数据使用记录，就不能事后删除。而且与区块链一样，该账本将使得第三方能够验证没有人篡改过任何记录。*


    > *但它也会在几个重要方面与区块链有所不同。区块链是去中心化的，因此任何账本的验证都由广泛参与者群体通过共识决定。为防止滥用，大多数区块链要求参与者反复执行复杂的计算，并承担巨大的相关成本（据某些估计，区块链参与者的总能耗可能相当于*
    [*塞浦路斯的电力消耗*](https://www.ft.com/content/384a349a-32a5-11e4-93c6-00144feabdc0)
    *）。这在医疗服务中并非必要，因为我们已经有值得信赖的机构，如医院或国家级机构，可以依靠它们来验证账本的完整性，从而避免了区块链的某些浪费。*


    > *我们还可以通过用树状结构替代区块链中的链式结构来提高效率（如果您想了解更多关于默克尔树的信息，英国政府数字服务部的开发* [*博客*](https://technology.blog.gov.uk/2015/10/13/guaranteeing-the-integrity-of-a-register/)
    *是一个不错的起点）。总体效果大同小异。每次我们向账本添加记录时，都会生成一个称为“加密哈希”的值。这个哈希过程的特殊之处在于，它不仅总结了最新记录，还总结了账本中所有先前的值。这使得任何人都无法回头悄悄修改其中一条记录，因为这不仅会改变该记录的哈希值，还会改变整棵树的哈希值。*


    > *简单来说，你可以将其想象成叠叠乐游戏的最后一步移动。你可能试图轻轻取出或移动其中一块积木——但由于整体结构，最终会引发巨大的声响！*


    > *因此，我们现在拥有了一个改进版的简易审计日志：一个完全可信、高效的账本，我们知道它能捕捉所有与数据的交互，并且可以由医疗界内信誉良好的第三方进行验证。我们该如何利用它呢？*


    > *简而言之：大幅改进这些记录的审计方式。我们将构建一个专用的在线界面，供合作医院的授权工作人员实时检查 DeepMind 健康数据使用的审计追踪记录。它将允许持续验证我们的系统是否按预期运行，并使合作伙伴能够轻松查询账本以检查特定类型的数据使用。我们还希望让合作伙伴能够运行自动查询，从而有效地设置警报，一旦发生任何异常情况便会触发。而且，随着时间的推移，我们甚至可以给合作伙伴提供选项，允许其他人（如个别患者或患者群体）检查我们的数据处理过程。*

    '
- fmt: '### The Technical Challenges Ahead


    > *Building this is going to be a major undertaking, but given the importance
    of the issue we think it’s worth it. Right now, three big technical challenges
    stand out.*


    > *No blind spots*. For this to be provably trustworthy, it can’t be possible
    for data use to take place without being logged in the ledger—otherwise, the concept
    falls apart. As well as designing the logs to record the time, nature and purpose
    of any interaction with data, we’d also like to be able to prove that there’s
    no other software secretly interacting with data in the background. As well as
    logging every single data interaction in our ledger, we will also need to use
    [formal methods](https://en.wikipedia.org/wiki/Formal_methods) as well as code
    and data center audits by experts, to prove that every data access by every piece
    of software in the data center is captured by these logs. We’re also interested
    in efforts to guarantee the trustworthiness of the hardware on which these systems
    run—an active topic of computer science research!


    > *Different uses for different groups*. The core implementation will be an interface
    to allow our partner hospitals to provably check in real-time that we’re only
    using patient data for approved purposes. If these partners wanted to extend that
    ability to others, like patients or patient groups, there would be complex design
    questions to resolve.


    > *A long list of log entries may not be useful to many patients, and some may
    prefer to read a consolidated view or rely on a trusted intermediary instead.
    Equally, a patient group may not have the authority to see identified data, which
    would mean allowing our partners to provide some form of system-wide information
    - for example, whether machine learning algorithms have been run on particular
    datasets - without unintentionally revealing patient data.*


    > *For technical details on how we could provide verified access to subsets or
    summaries of the data, see the open source [Trillian](https://github.com/google/trillian)
    project, which we will be using, and this [paper explaining how it works](https://github.com/google/trillian/blob/master/docs/VerifiableDataStructures.pdf).*


    > *Decentralized data and logs, without gaps*. There’s no single patient identified
    information database in the UK, and so the process of care involves data travelling
    back and forth between healthcare providers, IT systems, and even patient-controlled
    services like wearable devices. There’s a lot of work going into making these
    systems interoperable (our mobile product, [Streams, is built to interoperable
    standards](https://deepmind.com/applied/deepmind-health/working-nhs/how-were-helping-today/))
    so they can work safely together. It would be helpful for these standards to include
    auditability as well, to avoid gaps where data becomes unauditable as it passes
    from one system to another.


    > *This doesn’t mean that a data processor like DeepMind should see data or audit
    logs from other systems. Logs should remain decentralized, just like the data
    itself. Audit interoperability would simply provide additional reassurance that
    this data can’t be tampered with as it travels between systems.*


    > *This is a significant technical challenge, but we think it should be possible.
    Specifically, there’s an emerging open standard for interoperability in healthcare
    called FHIR, which could be extended to include auditability in useful ways.*


    ### Building in the Open


    > *We’re hoping to be able to implement the first pieces of this later this year,
    and are planning to blog about our progress and the challenges we encounter as
    we go. We recognize this is really hard, and the toughest challenges are by no
    means the technical ones. We hope that by sharing our process and documenting
    our pitfalls openly, we’ll be able to partner with and get feedback from as many
    people as possible, and increase the chances of this kind of infrastructure being
    used more widely one day, within healthcare and maybe even beyond.*


    ## Summary


    This chapter focused on the emerging role of blockchain in payments processing
    and how that can be applied to healthcare. We began the discussion with a description
    of the centralized payer–provider–patient model and how that model will change
    in the near future. Then, we discussed how to build a simplistic electronic health
    record system using the blockchain. After that, we presented how a patient workflow
    can be recorded on the blockchain. This led to a brief discussion of a physician
    credentialing use case. Finally, we talked about the economic wastes in healthcare
    discussed by Ark Invest and Gem and how the blockchain can alleviate some of those
    strains in the near future.


    # 10. Lean Blockchain


    For developers interested in building blockchain products, simply investing time
    in the technology is not enough. The blockchain stack comprises business logic
    integrated deeply into the technology models. As a result, an introductory level
    of familiarity with frameworks that formally describe the components of a startup
    and how to build a company around a product is necessary. This chapter begins
    with lean methodology, a model created by Eric Ries that relies on three core
    principles:


    1. Transform the most basic version of your idea into a product that a customer
    can interact with.

    2. Talk to your potential customers early and often.

    3. Iterate over that basic model with feedback from your customer to achieve a
    full product that aligns with customer needs.


    And we keep in mind this quote from Eric: “As you consider building your own minimum
    viable product, let this simple rule suffice: remove any feature, process, or
    effort that does not contribute to the learning you seek.” Then, we present the
    business-model canvas that breaks down lean methodology into nine applicable components.
    In addition, we talk about Geoffrey Moore’s approach to product-market fit for
    high-risk, high-reward technologies. Following this discussion, we present three
    models to help determine whether your organization can benefit from using a blockchain.
    Once a decision has been reached on using a blockchain, the Hyperledger Project
    provides multiple options for enterprise-grade blockchains that can be customized
    and deployed. Finally, we end the chapter with a brief overview of Hyperledger
    Composer and the templates it provides for capturing business logic.'
  raw: '### The Technical Challenges Ahead


    > *Building this is going to be a major undertaking, but given the importance
    of the issue we think it’s worth it. Right now, three big technical challenges
    stand out.*


    > *No blind spots* *. For this to be provably trustworthy, it can’t be possible
    for data use to take place without being logged in the ledger—otherwise, the concept
    falls apart. As well as designing the logs to record the time, nature and purpose
    of any interaction with data, we’d also like to be able to prove that there’s
    no other software secretly interacting with data in the background. As well as
    logging every single data interaction in our ledger, we will also need to use*
    [*formal methods*](https://en.wikipedia.org/wiki/Formal_methods) *as well as code
    and data center audits by experts, to prove that every data access by every piece
    of software in the data center is captured by these logs. We’re also interested
    in efforts to guarantee the trustworthiness of the hardware on which these systems
    run—an active topic of computer science research!*


    > *Different uses for different groups. The core implementation will be an interface
    to allow our partner hospitals to provably check in real-time that we’re only
    using patient data for approved purposes. If these partners wanted to extend that
    ability to others, like patients or patient groups, there would be complex design
    questions to resolve.*


    > *A long list of log entries may not be useful to many patients, and some may
    prefer to read a consolidated view or rely on a trusted intermediary instead.
    Equally, a patient group may not have the authority to see identified data, which
    would mean allowing our partners to provide some form of system-wide information
    - for example, whether machine learning algorithms have been run on particular
    datasets - without unintentionally revealing patient data.*


    > *For technical details on how we could provide verified access to subsets or
    summaries of the data, see the open source* [*Trillian*](https://github.com/google/trillian)
    *project, which we will be using, and this* [*paper explaining how it works*](https://github.com/google/trillian/blob/master/docs/VerifiableDataStructures.pdf)*.*


    > *Decentralized data* *and logs, without gaps. There’s no single patient identified
    information database in the UK, and so the process of care involves data travelling
    back and forth between healthcare providers, IT systems, and even patient-controlled
    services like wearable devices. There’s a lot of work going into making these
    systems interoperable (our mobile product,* [*Streams, is built to interoperable
    standards*](https://deepmind.com/applied/deepmind-health/working-nhs/how-were-helping-today/)*)
    so they can work safely together. It would be helpful for these standards to include
    auditability as well, to avoid gaps where data becomes unauditable as it passes
    from one system to another.*


    > *This doesn’t mean that a data processor like DeepMind should see data or audit
    logs from other systems. Logs should remain decentralized, just like the data
    itself. Audit interoperability would simply provide additional reassurance that
    this data can’t be tampered with as it travels between systems.*


    > *This is a significant technical challenge, but we think it should be possible.
    Specifically, there’s an emerging open standard for interoperability in healthcare
    called FHIR, which could be extended to include auditability in useful ways.*


