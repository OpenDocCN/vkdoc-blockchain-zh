  trans: '

    - **签名证明：** Aragon 使用由用户签名并上传至 KBFS 公共目录的标准身份证明。此证明包含四个组成部分：Keybase 上的用户名、用户拥有的以太坊账户地址、用户输入的字符串或评论，以及最终的签名公钥。任何希望验证身份的人都可以获取此证明文件，并使用诸如
    `getUsername(args)` 之类的函数，根据证明中的账户地址执行用户名反向查找。


    - **Oraclize：** 反向查找是一个链上验证过程，通过 Aragon 网络内的注册合约执行。对于 Keybase 查找，采用了一种名为 Oraclize
    的数据载体服务。Oraclize 请求给定 Keybase 用户名的签名，并创建该用户名到以太坊账户地址的映射。此证明文件上的签名应与网络上用户的公钥验证一致。Oraclize
    执行链上检查以验证证明签名，并确保映射是合法的。代表其他用户发起此验证的一方也需要支付相关步骤的费用，包括 Oraclize 的引用调用。


    - **Keybase 解析器：** 以太坊名称服务（ENS）允许我们将人类可读的链接解析为以太坊地址。最近，Aragon 已开始测试一个 Keybase
    解析器，该解析器将回调映射到用户名，从而得到地址，例如 `john.keybase.eth -> 0x99...cx88`。这简化了整个网络中的反向查找和用户名引用。


    现在我们对 Aragon、构成 DAO 的组件以及募资机制有了基本了解，本章的剩余部分将重点介绍如何在 Aragon 上创建和管理一个 DAO 的详细步骤。


    ## DAO / 公司操作指南


    在本节中，我们将逐步创建 DAO，并熟悉 Aragon 中与 DAO 相关的主要操作。为简化起见，我们将仅有两个实体（账户）参与此 DAO。本指南分为三个主题：


    - **设置 DAO 环境：** 我们将介绍此 DAO 的参与者，了解如何使用 MetaMask 创建钱包，并熟悉界面。


    - **设置 DAO：** 在 MetaMask 设置完成后，我们将把账户连接到以太坊测试网，并使用它来创建一个 DAO。


    - **日常操作：** DAO 创建完成后，我们将逐步进行基本操作，例如铸造新代币、投票和提款。然后，我们将深入探讨更高级的功能，例如 DAO 财务管理以及添加新的应用权限，这为管理您的公司提供了一种全新的精细化治理层面。


    ### 主题 1：设置 DAO 环境


    Aragon 可用于通过网站（[`https://aragon.org/`](https://aragon.org/)）完全在线创建 DAO（无需下载客户端）。目前，Aragon
    有两个组件：DAO 创建器（Aragon Core）和一个钱包（MetaMask）。Aragon 的 DAO 创建器组件会变成一个用于管理 DAO 的完整仪表盘，所有与
    DAO 相关的操作都可以通过仪表盘上的应用进行。第二个组件是 MetaMask：一个设计为 Chrome 或 Firefox 浏览器插件的数字钱包，用于与以太坊区块链交互，使其对实用的日常用户来说易于访问。MetaMask
    是可以与 Aragon UI 集成的四个钱包选项之一，我们在本章中将使用它，因为它所需的设置时间最少。让我们从设置 MetaMask 开始，然后将 Aragon
    连接到 MetaMask，再连接到水龙头（可发放测试代币）。第一步涉及将 MetaMask 扩展程序添加到 Chrome。安装完成后，启动屏幕应如图 5-1
    所示。


    > **注意：** 广告拦截器和弹出窗口拦截器会干扰 MetaMask。为了让读者能跟随本教程操作，您可能需要为 Aragon 网站和水龙头禁用它们。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig1_HTML.jpg](img/430562_2_En_5_Fig1_HTML.jpg)


    **图 5-1** MetaMask 启动屏幕


    MetaMask 会要求您在使用此插件前先设置一个钱包。点击（1）开始；这将带您进入图 5-2 所示的设置屏幕。有两个选项可用：创建新钱包（我们将选择的选项）或导入钱包（适用于您已有
    MetaMask 钱包，或想要从其他浏览器导入钱包的情况）。点击图 5-2 中的（2），这将带您创建钱包密码。密码附带一个备份短语，您可以用它来在丢失密码时恢复您的钱包。


    > **注意：** 如果您想将钱包导入 MetaMask，也需要此秘密短语。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig2_HTML.jpg](img/430562_2_En_5_Fig2_HTML.jpg)


    **图 5-2** 设置屏幕。选择（2）为您的 MetaMask 钱包设置密码


    创建钱包密码后，您将进入秘密短语屏幕。此短语用于在您丢失密码时恢复钱包。点击（3）显示图 5-3 所示的秘密短语，然后将其记下来。在下一个屏幕上，您将被要求重新输入秘密短语，然后您会收到钱包已设置成功的确认信息。设置完成后，您可以点击
    MetaMask 图标查看完整的钱包视图，如图 5-4 所示。


    > **注意：** 如前所述，还有其他方式可以通过提供高安全性且无需秘密短语的硬件钱包连接到 Aragon 和以太坊区块链。更全面的介绍见参考文献中的其他部分。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig3_HTML.jpg](img/430562_2_En_5_Fig3_HTML.jpg)


    **图 5-3** 用于密码恢复的秘密短语。点击（3）显示短语并记下。点击（4）继续

