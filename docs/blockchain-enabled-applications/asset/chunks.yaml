    \n图 4-1：比特币和以太坊作为计算平台的概览\n\n聚焦于图 4-1，在比特币协议中，地址映射了从发送方到接收方的交易。区块链上运行的唯一程序是转账程序；给定地址和密钥签名，该程序可以将资金从一个用户转移到另一个用户。以太坊通过在每个节点上部署\
    \ EVM（以太坊虚拟机）来泛化这一概念，使得可验证代码能够在区块链上执行。在此，通用方案是外部账户将参数传递给一个函数，EVM 将该调用定向到相应的合约并执行该函数，前提是提供了足够的以太币和`gas`。因此，以太坊中的每一笔交易都可以被视为一个函数调用。\n\
    \n## 以太坊中的账户\n\n账户是以太坊中的元结构，也是区块链的基本操作单元。所有以太坊交易都需要一个账户。此外，账户也作为模型来存储和跟踪网络中用户的信息。网络上有两种类型的账户：\n\
    \n*   **用户账户：** 这些是用户控制的账户，也称为外部账户。这些账户拥有以太币余额，由公私钥对控制，可以发送交易，但没有关联的代码。以太坊网络中的所有操作都由外部账户发起的交易触发。在比特币协议中，我们称这些仅为地址。账户与地址之间的关键区别在于以太坊中能够包含和执行通用代码。\n\
    \n*   **合约：** 这本质上是由其自身代码控制的账户。合约账户是驻留在区块链上的以太坊功能程序单元。该账户拥有以太币余额，关联有代码，可以在收到来自其他账户的交易时执行代码，并能操作其自身的持久化存储。(区块链上的每个合约都有其唯一可以写入的存储空间；这被称为合约的状态)。网络上的任何成员都可以创建包含任意规则的应用，并将其定义为一个合约。\n\
    \n如果账户扮演如此关键的角色，它们在区块链上是如何表示的呢？账户成为默克尔树（Merkle trees）的一个元素，而默克尔树又成为每个区块头的一个元素。以太坊使用了一种修改版的二叉默克尔树，称为默克尔-帕特里夏树（Merkle-Patricia\
    \ trees）。对默克尔-帕特里夏树（[`http://www.emsec.rub.de/media/crypto/attachments/files/2011/04/becker_1.pdf`](http://www.emsec.rub.de/media/crypto/attachments/files/2011/04/becker_1.pdf)）的完整解释已超出本文范围；然而，图\
    \ 4-2 提供了一个图形摘要。\n\n> **注意**  \n> 这里解释的双账户系统可能不会在以太坊中长期存在。最近，越来越多地推动采用单一账户模型，即通过合约来实现用户账户。\n\
    \n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig2_HTML.jpg](img/430562_2_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2：区块 A 和区块 B 的区块头及默克尔-帕特里夏树概览\n\n在图 4-2 中，区块头包含一些标准定义，用于广播网络的状态。此外，以太坊中的每个区块头都包含三个针对不同对象的默克尔-帕特里夏树：交易（函数调用）、收据（函数调用的结果，记录每个交易的效果）以及状态对象。二叉树在管理交易历史方面很有用；然而，状态有多个需要更频繁更新的组件。图中所示的默克尔-帕特里夏树包含一个状态根，进一步记录多个账户对象。其中一个深层分支指向一个虚线框，其中包含定义账户的四个参数。根据这些参数，账户余额和网络中的随机数经常被更新。因此，需要一种更合适的数据结构，使我们能在插入、更新、编辑或删除操作后快速计算出新的树根，而无需重新计算整棵树。这种修改后的默克尔树允许快速查询诸如以下问题：此账户是否存在？此交易是否已包含在特定区块中？我账户的当前余额是多少？值得注意的是，余额仅与外部账户相关，同样，`codehash`（包含可执行代码）仅适用于合约。`Storage\
    \ root`是最后一个参数，包含用户上传到区块链的数据，或作为合约可用的内部存储空间。此内部存储空间可以由合约在执行阶段更新。接下来我们深入讨论这些账户参数。\n"
- fmt: '### State, Storage, and Gas


    We briefly mentioned that a contract can manipulate its own storage and update
    the state, so what is a *state*? Recall that in the Bitcoin protocol, data on
    users and transactions is framed and stored in the context of UTXOs (Unspent Transaction
    Outputs). Ethereum employs a different design strategy of using a state object.
    Essentially, the state stores a list of accounts, where each account has a balance,
    as well as blockchain-specific information (code and data storage). A transaction
    is considered valid if the sending account has enough balance to pay for it (avoiding
    double spending), therefore the sending account is debited, and the receiving
    account is credited with the value. If the receiving account has code associated
    with it, the code will run when the transaction is received. The execution of
    a contract or the code associated with an account can have different effects on
    the state: internal storage may also be changed, or the code may even create additional
    transactions to other accounts.


    Ethereum makes a distinction between state and history in the network. The state
    is essentially a snapshot of current information regarding network state and accounts
    at a given time. On the other hand, history is a compilation of all the events
    that have taken place on the blockchain such as function calls (transactions)
    and the changes brought about as a result (receipts). Most nodes in the Ethereum
    network keep a record of the state. More formally, the state is a data-structure
    that contains key value maps (KVMs) in order to map addresses onto account objects.
    Each account object contains four values:


    - Current nonce value

    - Account balance (in ethers)

    - Code hash, which contains code in the case of contracts, but remains empty for
    external accounts

    - Storage tree root, which is the root of the Merkle-Patricia tree that contains
    code and data stored on the blockchain


    Next, let’s talk about gas in Ethereum. Gas is the internal unit for keeping track
    of execution cost in Ethereum. In other words, it is a micro-transaction fee for
    performing a computation on the blockchain. For a computational platform like
    Ethereum, this becomes crucial when running code because of the Halting problem:
    one cannot tell whether a program will run indefinitely, or just has a long run-time.
    Gas puts a limiter on the run-time as the user has to pay for executing step-by-step
    instructions of a contract. The nature of microtransactions allows steps to be
    executed very inexpensively, but even those transactions will add up for very
    long run-times. Once the gas supplied for a contract exhausts, the user would
    have to pay for more to continue. Special gas fees are also applied to operations
    that take up storage.


    Operations like storage, memory, and processing all cost gas in the Ethereum network.
    So, let’s talk about storage next. In Ethereum, external accounts can store data
    on the blockchain using contracts. A contract would manage the upload and storage
    process; however, the data types that can be stored currently are very limited.
    Then, a natural question becomes: What are the limits on uploading content and
    information to the Ethereum blockchain? What would prevent the bloating of the
    blockchain? As it turns out, there are currently two mechanisms in place preventing
    a data overload:


    - Gas limits per block that dictate how much gas can be spent per block on storage/computational
    operations

    - Amount of money a user would have to spend to purchase the gas needed to store
    data


    The second limitation is usually a deterrent for users to store directly on the
    blockchain. Instead it becomes much more efficient and economic to use a third-party
    decentralized service like STORJ or IPFS for the storage and hash the location
    in Ethereum to include it in a contract. In the future, new distributed storage
    applications will allow for all sorts of data files to be uploaded and included
    in contracts on the blockchain.


    Let’s summarize what we have discussed so far. We started with the differences
    between Bitcoin and Ethereum regarding using accounts, charging gas for operations,
    storing data directly on the blockchain, allowing executable code on the blockchain,
    state objects, and Merkle-Patricia trees. Figure [4-3](#430562_2_En_4_Chapter.xhtml#Fig3)
    provides a simplified functional overview of the processes occurring in Ethereum.


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig3_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig3_HTML.jpg)


    Figure 4-3


    A simplified overview of the Ethereum network


    In Figure [4-3](#430562_2_En_4_Chapter.xhtml#Fig3), there are roughly three Ethereum
    components to discuss: the API, the network, and the blockchain. The Ethereum
    JavaScript API (also known as `web3.js`) provides a large feature set for functionality
    such as constructing transactions and contracts, referring to functions, and storing
    receipts. An enhanced wallet client for Ethereum such as Mist can take over several
    of these functions with a GUI. Once a candidate block is constructed, it is broadcasted
    to the network by the Ethereum client. The validators on the network determine
    if the transactions are valid, and if any code (in the block) associated with
    a transaction or a contract is valid. Once the validation is complete, the validators
    execute the associated code and apply it to the current state. The block is broadcasted
    to the network, and a miner will “forge” the block; the verified block is then
    added to the blockchain. This step will also create transaction receipts for every
    transaction included in the block. The new block also provides updates to the
    state objects and relational links for the state tree from the current block to
    a new block.


    > **Note**

    >

    > What will prevent the Ethereum network from being bloated by small, unused contracts?
    Currently, there are no mechanisms to control the lifespan of a contract; however,
    there are a few proposals in the air about temporary subscription-based contracts.
    In the future, there might be two different types of contracts—one that has a
    permanent lifespan (which is significantly more expensive to create and compute),
    and the other one that operates till its subscription expires (cheaper and temporary,
    self-destructs after subscription runs out to prevent cluttering).'
