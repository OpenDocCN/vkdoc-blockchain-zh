    \ Proof-of-Stake ）作为主要的共识算法。有关此算法的更多细节将在本章后面提供。\n\n以下是以太坊社区开发者撰写的关于权益证明（PoS）的简要总结（[`https://docs.ethhub.io/ethereum-roadmap/ethereum-2.0/proof-of-stake/`](https://docs.ethhub.io/ethereum-roadmap/ethereum-2.0/proof-of-stake/)）:\n\
    \n> **权益证明（PoS）是一类依赖验证者在网络中的经济权益的公有区块链共识算法**。在基于工作量证明（PoW）的公有区块链（例如比特币和当前以太坊实现）中，算法奖励那些通过解决密码学难题来验证交易并创建新区块（即挖矿）的参与者。在基于权益证明（PoS）的公有区块链（例如以太坊即将推出的`Casper`实现）中，一组验证者轮流提议并对下一个区块进行投票，每个验证者投票的权重取决于其存款（即权益）的大小。PoS\
