  trans: '

    ## 去中心化应用


    我们在讨论 Whisper 时曾提及去中心化应用（或 DApp），但此处将进行更深入的探讨。去中心化应用是一种无服务器应用，运行在以太坊技术栈上，并通过能够调用后端技术栈的
    HTML/JavaScript 前端与最终用户交互。传统上，移动或网页应用的后端运行在中心化的专用服务器上；然而，DApp 的后端代码则运行在去中心化的点对点网络上。图
    4-7 展示了一个 DApp 在区块链上运行的简化模型。


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig7_HTML.jpg](img/430562_2_En_4_Fig7_HTML.jpg)


    图 4-7. DApp 的结构


    如图 4-7 所示，用户界面通常用 HTML 或 JavaScript 编写，是加载在用户设备上的唯一组件。该界面向后端发起调用，以执行特定合约，并在需要外部存储或应用需要与其他应用通信时，调用如
    Swarm 或 Whisper 等后端资源。如果说传统应用由前端和运行后端服务的服务器组成，那么运行在以太坊技术栈上的 DApp 则由前端和运行在区块链上的合约构成。DApp
    通常在区块链上拥有自己的一套相关合约，用于编码业务逻辑并持久化存储其共识关键状态。回顾一下，以太坊技术栈上的所有代码都在一个 `EVM` 内运行，它会跟踪每一步操作，并向合约所有者收取燃料费。这防止了
    DApp 开发者在区块链上执行过多操作，或因直接在区块链上存储数据而导致其膨胀。


    **注意：** 简单回顾一下，DApp 技术栈依赖去中心化存储（由类似 Swarm 的架构提供）来存储用户数据或应用数据，依赖区块链来处理合约逻辑和交易操作，并依赖前端来服务最终用户。前端界面根据用户操作，向区块链上运行去中心化应用的特定合约发起调用。


    DApp 的后端如何为前端拉取静态内容（例如从以太坊技术栈获取 JS 到静态内容），并从区块链接收更新的全局状态？让我们看一个使用 IPFS 作为存储的示例，以理解这些后端调用（图
    4-8）：


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig8_HTML.jpg](img/430562_2_En_4_Fig8_HTML.jpg)


    图 4-8. DApp 后端调用的简单示意图


    - 后端代码本质上是一个合约，在给予适当资源的情况下在区块链上执行。

    - 某些应用需要使用持久化数据库来托管应用中使用的静态内容；我们可以依赖 IPFS，它存储静态文件，并通过网络上的多个节点进行托管。

    - 来自 IPFS 的哈希值被传递给 DApp，合约的执行会更新全局状态，然后从以太坊技术栈传递给 DApp。


    在图 4-8 中，区块链可以将内容存入某个节点上类似 IPFS 的系统，并使这些哈希值可供应用在必要时检索。应用可以向区块链请求全局状态的更新，因为这会影响在设备上运行的应用。最后，根据需要，应用可以从去中心化存储中检索并将完整内容下载到用户设备。以这种方式划分角色可以实现更具创新性的用户界面，因为开发者可以更换前端而无需更改后端。


    ### Geth 与 Mist


    我们还需要简要讨论另外两个在 DApp 开发中发挥作用的工具。`Geth` 是用于在以太坊网络上运行全节点的命令行界面（用 Go 语言编写）。通过使用 `Geth`，你可以与以太坊区块链交互并执行以下任务：


    - 在网络中挖取以太币

    - 在地址之间转账

    - 创建合约并发送交易

    - 使用 DApps API


    `Geth` 附带了两个用于开发的接口：包含 `web3.js` 库的 JavaScript 控制台，以及 `JSON-RPC` 服务器。让我们简要谈谈这两种技术。`Geth`
    可以启动一个交互式控制台，它提供 JS 运行时环境，让你与节点交互。这个运行时环境包含 `web3` 库，可以构建要传播到节点的合约和交易。`JSON-RPC`
    服务器是一种远程过程调用（RPC）协议，用于促进节点与其客户端之间的数据交换（JSON 是一种节点用来与客户端通信的数据交换格式）。更准确地说，RPC 是一组方法和规则，定义了数据（命令和输出）如何在节点和客户端之间传输。JavaScript
    API 使用 `web3.js` 库来提供使用 RPC 方法的便捷接口。


    **提示：** 对于当今大多数以太坊应用来说，`Geth` 是作为命令行工具安装的先决条件。通常在安装过程中，`Geth` 会作为附加组件提供，这样用户就不必单独下载并安装它。


    `Mist` 是官方的以太坊钱包应用。在早期讨论中，`Mist` 被设想为 DApp 的独立应用商店式浏览器，但这一愿景已经演变。为了与以太坊区块链交互，我们需要一个像
    `Geth` 这样的区块链客户端。该客户端负责向网络广播交易、挖取以太币、签署交易和部署智能合约。大多数最终用户不习惯使用命令行界面，因此创建了如 `Mist`
    这样的包装器作为前端界面。`Mist` 在后台连接到 `Geth`，并作为钱包软件与用户之间的接口。此外，`Mist` 还提供了编写和部署智能合约或 DApp
    的接口。钱包软件无缝集成了部署合约所需的支付功能。


    最终，使用 `Geth` 和 `Mist` 在以太坊网络上最强大的实体将是去中心化自治组织（DAO），它们本质上是由运行在以太坊网络上的智能合约驱动的自动化公司。我们在此结束对以太坊的探索之旅，并在下一章继续讨论
    DAO。


    ### 总结


    在本章中，我们介绍了以太坊，这是与比特币竞争的最大替代货币之一。近年来，它受到了开发者和投资者的广泛关注。我们首先通过广泛概述以太坊与比特币的对比开始了讨论。我们讨论了作为以太坊基础的账户和函数调用。然后，我们更深入地阐述了账户作为区块链上实体的概念。之后，我们讨论了以太坊上用于智能合约执行的燃料费使用情况，内部存储如何适配默克尔-帕特里夏树，以及账户的内部状态概念。接着，我们探讨了
    `EVM` 以及智能合约如何在区块链上执行。然后，我们讨论了使用 Solidity 和 Vyper 编写智能合约的模型，以及用于快速原型开发智能合约的开发者资源。这引出了对世界计算机模型及其在以太坊组件（如
    IPFS 和 Whisper）中应用的讨论。最后，本章的主要技术焦点是正在为以太坊网络推出的 Layer 2 升级。我们以对 DApp 和区块链即服务模型的简短回顾结束了讨论，我们将在后续章节中对此进行扩展。

    '
- fmt: "# 5. Decentralized Organizations\n\nBitcoin can be thought of as the first\
    \ prototypical Decentralized Autonomous Organization (DAO). It created a network-based\
    \ ecosystem of participants who contribute computational power toward a singular\
    \ goal. In Bitcoin, the underlying protocol created a financial service that rewards\
    \ miners for providing verification services, and this setup became a rudimentary\
    \ decentralized organization. In this chapter, we will focus on more-complex organizations\
    \ created on the blockchain with Aragon. Aragon is a decentralized application\
    \ (DApp) that lets anyone create and manage different kinds of organizations (NGOs,\
    \ non-profits, foundations) on the Ethereum blockchain. In the early days of Ethereum,\
    \ creating a DAO and implementing even the most basic functions required complicated\
    \ smart contracts and Solidity code. Aragon has simplified this process. It implements\
    \ the basic features of an organization in a base template that gets deployed\
    \ whenever a user instantiates a company. Most of the traditional features such\
    \ as a cap table, voting abilities, fundraising, and accounting are offered in\
    \ the Aragon template as a decentralized counterpart running on the blockchain.\
    \ In addition, an Aragon company can be customized in a very granular fashion\
    \ and extended with new modules that can be added to a company’s existing smart\
    \ contracts. Aragon enables different organizations to control the level of trust\
    \ built into them.\n\nWe begin this chapter by introducing the concept of a decentralized\
    \ organization. We rely on Ralph Merkle’s framework to describe what a DAO requires\
    \ to operate and how Aragon implements all the theoretical constructs as apps.\
    \ Then, we introduce the technology stack that powers Aragon and the derivative\
    \ frameworks under development. After obtaining a better understanding of Aragon,\
    \ we present a special case of fundraising and social venture development with\
    \ Aragon. This brings us to the heart of this chapter: a thorough walkthrough\
    \ of how to create, set up, deploy, and manage a DAO on Aragon. In this tutorial,\
    \ we have three topics. The first topic shows the reader how to set up MetaMask,\
    \ a wallet for connecting to Aragon. The second topic introduces templates for\
    \ organizations and how you can create and deploy a DAO. The final topic provides\
    \ a run-through of how to perform day-to-day operations in a DAO, as well as advanced\
    \ features. This chapter follows the structure of a conceptual background leading\
    \ to practical implementation advice. We hope that by the end of the walkthrough\
    \ you feel comfortable setting up a wallet and experimenting on the Ethereum test\
    \ net with your own DAO.\n\n## Aragon Stack and Aragon Network Token (ANT)\n\n\
    Aragon is an ecosystem for building a governance system for Ethereum-based decentralized\
    \ organizations. From a technical perspective, Aragon is a full-service stack\
    \ for building and managing decentralized organizations, and it treats them as\
    \ multiple processes running concurrently on an operating system. Even though\
    \ Aragon has thousands of decentralized autonomous organizations (DAOs) running\
    \ at a time, here, we will keep our focus limited to just one DAO. Before we delve\
    \ deeper into Aragon, let’s describe the concept of a DAO in simpler terms. A\
    \ DAO is a blockchain entity built on a consensus of decisions by its members.\
    \ A DAO widens the concept of consensus inherent to the blockchain to include\
    \ decisions and choices made by members of a DAO that have a stake in it (usually\
    \ in the form of DAO tokens). As such, a DAO is built with automation at its core\
    \ and members at the periphery that rely on a majority-vote-based consensus to\
    \ make decisions for the organization. Although this approach to understanding\
    \ a DAO is a general descriptor, it is incomplete. Perhaps a better approach to\
    \ defining a DAO would be through the functions it performs. The concept for a\
    \ DAO was originally derived from Bitcoin, which might be viewed as the first\
    \ prototype for a DAO.\n\n**Note**\n\nThe simplest functional unit on the Aragon\
    \ network is a DAO, and therefore the majority of our discussion is focused around\
    \ a minimal use case. Aragon provides a base template that can be used to set\
    \ up a DAO, and you can modify this template to set up a custom set of rules.\
    \ Other types of organizations (such as NGOs or non-profits) are built on the\
    \ base template with significant modifications that allow new modus operandi.\
    \ Additionally, throughout the remainder of this chapter, the terms DAO, Company,\
    \ or Organization may be used interchangeably to represent the same concept.\n\
    \nRalph Merkle talks about a DAO as an entity that owns internal property that\
    \ has value, can update its internal state, is responsive to the members, and\
    \ runs smart contracts. These are some of the most basic functions that any DAO\
    \ should be able to perform; however, currently there are no compliance standards\
    \ (like the `ERC20` for tokens) for DAOs. Aragon implements Merkle’s ideas through\
    \ a system of organs that have specific functions in the day-to-day operation\
    \ of a DAO. At the core of every DAO model is a kernel. The kernel then uses a\
    \ set of organs to carry out most of the daily activities. Let us review the organs\
    \ implemented by Aragon:\n\n- **Kernel:** Coordinator of all other components\
    \ in the DAO. To that end, the kernel only provides two features, upgradeability\
    \ and authorization.\n  - Taking a long-term view, organizations on Aragon need\
    \ to be secure and modular so that they can be extended with new features. It\
    \ is essential to provide a mechanism for any organization on Aragon to upgrade\
    \ itself, including the kernel. As such, the kernel has the ability to upgrade\
    \ itself and any other apps that rely on it.\n\n- The kernel needs to keep track\
    \ of all the addresses involved in the DAO, the permissions assigned to them and,\
    \ in turn, the actions that can be performed by those addresses. This authorization\
    \ system is also called an Access Control List (ACL), and it protects the users\
    \ of a DAO against privilege escalation attacks.\n\n- **Meta organ:** A self-aware\
    \ (in terms of internal state) and self-actionable organ that is responsible for\
    \ updating the DAO internally in response to actions by the members, or externally.\
    \ This organ also maintains a global registry of organs operating within the kernel.\n\
    \n- **Vault organ:** The vault organ serves as a collective wallet for the DAO.\
    \ It stores the funds owned by the DAO as tokens and approves any spending requests."
