  trans: '

    ## 创业故事


    在本节中，我们将重点介绍几个比特币"淘金热"时期（从 2013 年中期持续到 2014 年末）的故事。这里涵盖的初创公司遵循的策略是销售略微过时的挖矿硬件以获取利润，但有些公司则更进一步。我们要谈的第一家初创公司是**蝴蝶实验室**。这是一家来自密苏里州的公司，成立于
    2011 年末，承诺销售能够以远超竞争对手的速度挖矿的技术。据称，其专用集成电路（`ASICs`）挖矿速度比单台计算机快一千倍，并且在 2012 年首次发布后不久就开放了预售。矿工们蜂拥购买这些承诺在同年
    12 月交付的硬件。据美国联邦贸易委员会（`FTC`）报告，蝴蝶实验室通过预售筹集了约 2000 万至 3000 万美元。发货大约在 2013 年 4 月开始，但只有少数客户收到货，而大多数客户又等了一年才收到他们的挖矿设备。当客户实际收到机器时，它们已经过时了，有人指控蝴蝶实验室在交付前先使用这些硬件为自己挖矿。尽管无法完成最初的订单，蝴蝶实验室又开始提供一种新的、功能强大得多的矿机，并开启了预售。最终，该公司成为比特币社区最受憎恨的公司之一，`FTC`不得不介入并将其关闭。


    我们要讨论的第二家公司是**CoinTerra**。这是一个更复杂的案例，因为该初创公司由一支在该领域拥有深厚专业知识的团队创立。首席执行官拉维·艾扬格此前曾是三星的
    CPU 架构师，公司董事会中还有许多其他该领域的领导者。最初，他们获得了风险投资，资金充足，并于 2013 年宣布了他们的首款产品：**TerraMiner
    IV**，预计同年 12 月发货。该公司未能按时发货，最终推迟了日期。矿机在 2014 年仍未到货，最终 CoinTerra 向客户道歉，并提供了一些补偿，但补偿也大幅延迟，进一步激怒了客户。该公司似乎正试图转向云挖矿服务，但他们已经失去了大部分客户群的信任。


    我们的最后一个案例将聚焦一家名为 **HashFast** 的初创公司。与前两个例子类似，HashFast 提供了一款名为 **Baby Jet** 的矿机产品，预计
    2013 年 12 月交付。HashFast 的团队过度承诺了功能，但在挖矿难度飙升的时期却未能兑现。该公司很可能动用了早期采用者的资金来资助自身发展，当他们遇到困难时，客户要求退款。当时的问题是比特币价格持续上涨，因此公司没有足够的资金偿还客户。他们面临多起诉讼，现金储备迅速耗尽。最终，在
    2014 年 5 月，一名法官裁定允许拍卖该公司拥有的所有资产，以偿还债权人和投资者。


    这些公司的一个共同点是，它们常常无法在承诺的时间交付挖矿硬件，并且严重延迟或拒绝向客户退款。我们可以从这里介绍的案例以及其他同样失败的`ASIC`初创公司中，归纳出一个通用的运营模式：


    -   以极高的价格开放预售，并虚假宣传高得离谱的哈希率和巨大的投资回报。

    -   将所有预售资金投入`ASICs`和定制硬件的研发。

    -   一旦从海外制造商处获得挖矿硬件，就在内部不间断地挖矿数月。

    -   通过社交媒体向客户广播，声称制造过程比预期耗时更长。

    -   仅向那些威胁要起诉的客户交付硬件，作为发货已开始的早期证据。

    -   当`ASIC`硬件已经严重过时时，才交付给其他客户。

    -   客户投诉并提起诉讼，公司最终分崩离析，面临巨额罚款。


    ## 新的共识


    我们将以与本章开头相同的理念——**共识**——来结束本章。本章的核心思想是，在比特币中，挖矿用于达成共识，以防止用户双重支付并验证所有交易。然而，自比特币问世以来，其他共识算法也被开发出来。我们将比特币原始协议中用于达成共识的工作量证明算法称为**中本聪共识**。最近流行起来的一种新共识算法被称为**权益证明**，其中参与者主要扮演验证者的角色。在比特币中，持有欺诈交易的不良行为者必须面对矿工网络的严格审批和验证过程。在权益证明（`PoS`）中，参与者以货币形式在网络中拥有权益（因此得名）。因此，他们希望网络成功，信任就产生于由验证者投入最大权益币量的区块中。此外，恶意验证者会因其不当行为而被削减其权益。我们将在本书后面深入探讨`PoS`的技术细节，以及它与`PoW`机制的比较。我们的旅程在本章以共识结束，我们将在下一章继续讨论比特币网络和区块链。


    ## 总结


    在本章中，我们讨论了挖矿的概念，并介绍了理解矿工如何验证区块所需的技术背景。我们深入探讨了比特币挖矿的核心 —— `PoW`，并且在本书的其余部分，我们将介绍其他共识机制。然后，我们描述了比特币挖矿中为生产最佳硬件而展开的军备竞赛，这导致了难度的巨大提升，以及那个时期初创公司的失败。最后，我们以提及`PoS`结束了本章，我们将在后面的章节中再次回到这个话题。

    '
- fmt: '# 3. Foundations of a Blockchain


    A `blockchain` is a decentralized data structure with internal consistency maintained
    through consensus reached by all the users on the current state of the network.
    It is an enabling technology that resolved the Byzantine Generals Problem (described
    as a problem of establishing trust between three generals such that a coordinated
    strike can take down an enemy; more in Chapter [1](#430562_2_En_1_Chapter.xhtml))
    and opened a new horizon of possibilities for application development with trustless
    transactions and exchange of information. If the internet democratized the peer-to-peer
    exchange of information, then the blockchain has democratized the peer-to-peer
    exchange of value. We will begin this chapter by exploring how transactions work
    between users on the Bitcoin network. This will entail a technical discussion
    of the structures of a block and a transaction. Then, we will dive into the role
    of wallets and user addresses. After talking about wallets, we will shift our
    focus to Simple Payment Verification (SPV), which is implemented in the Bitcoin
    network. SPV will allow us to understand why blocks have a peculiar structure
    and, more important, how the Bitcoin network can retain efficiency despite the
    network’s scaling at a high rate. Finally, we will end our discussion by talking
    about hard and soft forks in the Blockchain. We will present the implications
    of forks in the context of forward compatibility for merchants and users involved
    in running the Bitcoin core code. Even though there are numerous variations of
    blockchain during this “Cambrian explosion” phase of tech development, the core
    principles remain the same.


    ## Transaction Workflow


    The central purpose of the Bitcoin protocol is to allow transactions to occur
    over the network between users in a decentralized manner. Thus far, we have been
    talking about small fragments of the protocol to build up a background. Now, we
    can integrate those concepts into a single framework and explore the blockchain.
    The ultimate result of mining is an increase in the number of blocks as the network
    evolves over time. To understand how transactions occur between two users (Alice
    and Bob), we first need to understand the structure of the blocks that hold the
    transactions. In the simplest terms, the blockchain is a collection of blocks
    bound by two main principles:


    - Internal consistency: There are a few design principles inherent to the functioning
    of each block that make the blockchain internally consistent. For instance, each
    block links to the previous one in the chain and has a timestamp of creation.
    Such mechanisms in the blockchain allow it to be an internally coherent data structure
    that can keep a stable record of transactions.


    - Consensus of transactions: The concept of mining described in the previous chapter
    is just one implementation for verifying transactions; there are other mechanisms
    where no brute-force hashing is involved. However, in every one of these implementations,
    there is a scheme for reaching consensus on the transactions that have transpired
    during some *x* interval on the network. We can generalize this verification of
    transactions in a decentralized system by using either `proof-of-work` or another
    protocol that pools transactions that are then checked by participants of a network.


    A transaction is essentially carried as a property of the block, a data structure
    propagated through the network, but how does this happen? To better understand
    the process, let’s look at a more complete structure of a block, shown in Figure
    [3-1](#430562_2_En_3_Chapter.xhtml#Fig1). Each block has at least two unique components:
    the block header containing a hash (called the Merkle root) that uniquely identifies
    a block, and the transaction list, which contains new transactions from the pool.
    Note that each block contains the same amount of transactions in the list, but
    the precise transactions between users are different. This is because only one
    block wins the mining race every ten minutes on the blockchain. In our simplified
    model, there are only two other components of a block: the block size, which is
    kept consistent for the entire network, and a counter for the number of transactions
    in each block. Here, we will be focusing more on the block header and the transaction
    list.


    The block header contains a few standard components, such as difficulty target
    and the `nonce` discussed previously. It also contains the version number of the
    Bitcoin core code that the winning miner is running. The timestamp is also a unique
    feature of every block; it unequivocally identifies one particular block in the
    network. The header also contains a hash from the previous block in the chain,
    and a special hash that identifies this block, called the Merkle root. We will
    discuss how this special hash is constructed later in this chapter.


    ### Proof-of-life


    Recently, there were rumors that Julian Assange, the WikiLeaks founder, had died.
    Assange recently did an Ask-Me-Anything session on Reddit and responded to the
    rumors by reading the most recent block hash from the blockchain to prove that
    he was indeed alive. The block had been created only ten minutes previously, so
    this could not have been a pre-recording, thus proving beyond any shadow of the
    doubt that Assange was alive. This was the first time the block hash had found
    a use in a sense of popular culture, and Assange called it a `proof-of-life`.


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig1_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig1_HTML.jpg)


    **Figure 3-1** Simplified overview of the structure of a block


    The text in red shows the two components that stay unique to every block. We break
    down these two components further as follows. The block header is made from several
    smaller parts, the most peculiar of which is the Merkle root, which is a hash
    that uniquely identifies a block. The header contains the hash of the previous
    block, the `nonce` used to create that particular block, and the difficulty of
    the network. These are standard mining components that we discussed previously.
    As mentioned earlier, each block also contains a list of transactions. Aside from
    the actual transactions, the transaction list also contains a few components that
    are crucial to how a block will accept the transaction. For instance, the lock
    time delay dictates when a transaction can be accepted into a block. Finally,
    the list contains all the transactions accepted into this block as a series of
    signed inputs and outputs that ensure the transfer of Bitcoins from the senders
    to the receivers.'
