  trans: '

    # 可重复性危机


    让我们首先讨论在科学论述和研究中*可重复性*的含义。研究领域的重要基石之一，是能够遵循某项研究中记录的实验方案，使用其中记录的方法进行实验，并得出与该研究结果相同的结论。换句话说，一项已发表的研究可以被其他研究人员独立验证，并重复获得相同结果。近期临床科学的元研究表明，越来越多已发表的研究在实验上不够严谨，以至于难以被轻松重复。Leonard
    P. Freedman 及其同事估计，超过 50%的临床前研究无法从动物模型转化到人体临床试验，因此仅在美国，不可重复性造成的年成本就约为 280 亿美元。其后果是，由于动物模型中的临床前发现很少能在临床试验中重现，药物发现的步伐已经放缓，成本急剧上升。经济成本十分沉重，因为每年有近
    2000 亿美元因无法重现已发现的靶点而被浪费。这些问题通常源于特定研究的设计，或是在不同细胞系实验中出现的非常复杂的、难以避免的纠纷。要理解其原因，我们必须到元研究中寻找答案。元研究是一个研究分支，它通过统计方法评估一项研究中的主张、结果和所进行的实验。


    学术界众多因素正共同催生一种博士 Ben Goldacre 所称的“不良科学”的恶性文化：研究资金日益匮乏、“不发表就出局”的文化潮流，以及年轻研究人员在获取终身教职方面面临的巨大压力，这些都迫使他们采用错误的方法，最终导致不可重复的论文发表。在某些情况下，草率的研究方法和数据篡改甚至导致了欺诈和论文最终被撤回，给研究人员本人带来严重后果。


    **注意**


    `Retraction Watch` 是一个近期出现的博客，旨在报道各个层面发生的科研不端行为，从与期刊合作的编辑到大学的个别研究人员。该博客还追踪那些因数据造假或实验证据篡改而从期刊上被撤稿的论文。感兴趣的读者可以访问他们的网站，该网站每年会发布约
    500 至 600 条撤稿信息。


    学术期刊也对这一乱象负有一部分责任，尽管有迹象表明相关工作正迎来真正的改变和改善。在过去几年里，在期刊上发表关于潜在药物靶点或特定药物有效性的阳性结果研究变得相对容易了。然而，来自实验的阴性结果，例如一个药物靶点尽管预期有效但实际上并未起作用，却极难发表。从表面上看，这似乎有道理：谁会想知道实验失败了？基于类似的理由，阴性数据通常会被忽略。而从市场营销的角度看，一家期刊宣称某种疗法未达预期，并非吸引读者的卖点。让我们更仔细地审视阳性与阴性数据在期刊塑造其使用与发表方式中的背景。


    阳性数据只是对初始假设的证实，即研究者预测了某个发现，而数据验证了它。另一方面，阴性数据则来自未观察到预期或期望效果的情况。如果一个实验显示零假设和备择假设之间没有差异，那么这些数据和结果很可能最终会被埋没在实验室小组未发表的结果堆中。图
    8-1 非常简略地展示了一种处理阳性与阴性数据的错误研究方法，这种方法正是学术界压力下的产物。为了追求高需求、有吸引力的药物靶点，重复性被牺牲了，而这些靶点最终往往无法很好地转化为临床试验，并导致更多的经济损失。


    ![../images/430562_2_En_8_Chapter/430562_2_En_8_Fig1_HTML.jpg](img/430562_2_En_8_Fig1_HTML.jpg)


    **图 8-1** 研究发表背景下阳性与阴性数据概述


    在图 8-1 中，我们看到了假设检验的一个简单演示，它导致了“侥幸结果”的发表，这些结果在转化研究或大规模临床试验中是无法复制的。由于在学术期刊上发表论文的性质，阳性数据通常意味着你的工作完成了。大多数研究人员会在此止步，而不会费心去跟进在实验过程中收集或生成的数据中那些可观的部分。这可能包括关于某个不奏效的想法的潜在阴性数据，或因评审反馈而被省略的信息。一旦研究论文被接收，论文作者就没有进一步的动力去发布更多数据或投入更多时间来整理并提供其他结果。这最终导致了一些有害的后果，我们将在本章后面讨论。


    国际上的期刊已经观察到了这些趋势，出版商们开始采取行动。大量新的倡议正在提高出版物中可包含数据的标准，以及为确保可重复性而必须满足的设计考量。我们在此讨论其中三项努力：


    - **最低发表标准：** 印刷期刊对版面有特定要求，研究论文的每个部分只能分配有限的页数。在这种情况下，研究人员更侧重于提出大胆的主张，并展示能为其假设提供证据的数据。这通常是以牺牲“方法”部分为代价的，而该部分正为其他研究人员提供遵循以复现实验的指导。最近，大多数期刊已转向线上，版面已不成问题；然而，即使提供了补充材料，其质量仍然欠缺。`BioMed
    Central` 发布了一份清单，列出了论文发表前必须满足的最低标准。这份清单的目的是提供一定程度的标准化，以便研究人员在撰写论文时能考虑特定标准，从而提高可重复性。如果满足所有标准，那么已发表的研究在更大程度上被重复的可能性就很高。


    **注意** 更多知名期刊增加了数据共享声明，以说明数据集将在何处提供以及共享何种类型的数据。例如，`Cell Press` 创办了一份新期刊，用于发表经过同行评审、具有可重复性且方法透明的研究成果，名为
    `STAR protocols`。同样，`EQUATOR` 网络也为科学报告中发表的数据制定了关于质量标准的结构化指南。

    '
- fmt: "### Data Discovery Index\nOne of the major problems mentioned earlier was\
    \ the lack of incentives for researchers to make supplemental data available.\
    \ The National Institutes of Health (NIH) has sought to create a new measure to\
    \ credit researchers for uploading additional experimental data, called the Data\
    \ Discovery Index. This is a citable data repository where researchers can make\
    \ additional data points available related to their studies. For academic researchers,\
    \ a huge incentive is to elicit additional citations for their work, which in\
    \ turn becomes a measure of impact for a published study. By making the database\
    \ citable, NIH created this new incentive for researchers to dedicate additional\
    \ time and resources to upload unpublished databases.\n\n### Reproducibility Project\n\
    The Center for Open Science in collaboration with Science Exchange will be looking\
    \ at high-impact studies in cancer biology from 2010–2012 and replicating each\
    \ one with help from members of Science Exchange. Full-length reports on the attempts\
    \ at replicating experiments, discovering drug targets, and more will be made\
    \ openly available along with detailed methods. This project is being done in\
    \ two phases; the first phase culminates in a registered report that documents\
    \ standardized protocols to carry out certain experiments. The second phase involves\
    \ one of the member institutes of Science Exchange conducting the experiment using\
    \ the registered report and documenting the results. Ultimately, both the reports\
    \ and the data will be peer reviewed by reviewers at the *eLife* journal and made\
    \ available online.\n\nThese three initiatives are examples of a large-scale coordinated\
    \ effort to enhance reproducibility, and many more are on the horizon. So far,\
    \ we have discussed the problems in the academic environment leading to differing\
    \ treatment of negative and positive data, the core of the reproducibility crisis,\
    \ and the difficulties that arise as a result. Next, we will begin talking about\
    \ the more serious consequences of data manipulation in the case of drug trials.\
    \ The data points from clinical trials decide the fate of medications that will\
    \ affect thousands of lives. Obtaining all relevant data is crucial not only for\
    \ accurately prescribing medication, but also to avoid pitfalls and avenues already\
    \ tackled in the past.\n\n> **Note**  \n> Dr. Ben Goldacre gave a TED talk in\
    \ which he told the story of the drug lorcainide, released in the 1980s. It was\
    \ meant to be an anti-arrhythmic drug that could prevent abnormal heart rhythms\
    \ in people who have had heart attacks. A small clinical trial was conducted in\
    \ under one hundred patients, and unfortunately ten of them died. The drug was\
    \ regarded as a failure, and commercial development stopped. The data from this\
    \ failed clinical trial was never published. Over the next few years, other drug\
    \ companies had similar ideas for anti-arrhythmic drugs, which were brought to\
    \ market. It is approximated that 100,000 people died because these new drugs\
    \ also caused an increased instance of death. In 1993, the researchers who conducted\
    \ the original 1980 study came forth and wrote an apology mentioning that they\
    \ had attributed the increased death rate to chance in the initial trials, and\
    \ that had the data from this failed trial been published, it could have provided\
    \ early warnings and prevented future deaths. This is just one example of the\
    \ very serious consequences of publication bias. We’ll tackle a generalized version\
    \ of this scenario in the next section.\n\n## Clinical Trials\n\nWe have already\
    \ described a few complications that can arise due to flawed data reporting from\
    \ clinical trials, and here we will begin outlining a potential solution. In this\
    \ section, we will focus on three specific issues and provide a use case for the\
    \ integration of blockchain technology in each one:\n\n### Trial Registration\n\
    Registering clinical trials when they begin, providing timely updates, and depositing\
    \ the relevant results in a public database are crucial for offering clinical\
    \ trials for new possible medications to patients for whom the standard drugs\
    \ aren’t effective. Even though large-scale clinical trials involving human participants\
    \ should be registered, more often than not, these trials remain missing in action.\
    \ The only indications of data coming from the unregistered trial is a publication\
    \ or perhaps a few papers that contain experiments and results highly tailored\
    \ toward proving the effectiveness of the drug candidate being proposed. This\
    \ type of publication bias can mislead clinicians in a dangerous manner; therefore\
    \ we need to incentivize investigators to send regular updates from registered\
    \ clinical trials on progress and any relevant clinical protocols.\n\n### Comparing\
    \ Drug Efficacies\nToday, in most clinical settings, multiple drug options are\
    \ increasingly becoming available to clinicians, but there is often a lack of\
    \ evidence from head-to-head clinical trials that allows for direct comparison\
    \ of the efficacy or safety of one drug over another. Computational models allow\
    \ for parallel processing of large data sets in a type of analysis called Mixed\
    \ Treatment Comparisons (MTCs). These models use Bayesian statistics to incorporate\
    \ available data for a drug and generate an exploratory report comparing the drugs.\
    \ This can become the foundation for automated comparisons as more data is liberated\
    \ from unpublished or unavailable information silos. Recently, there has been\
    \ more interest in using umbrella protocols for clinical trials. These protocols\
    \ test multiple treatment interventions simultaneously for one disease and gather\
    \ massive amounts of comparative data.\n\n### Post-Processing\nIn some cases,\
    \ when a trial is registered, and it does provide some supplemental data that\
    \ goes along with a publication, the registry acts more like a data dump than\
    \ an organized data deposit. Recently, we have seen more carefully prepared and\
    \ published post-analysis summaries; however, this is often an exception, not\
    \ the rule. The key here is that once clinical-trial data is linked up to the\
    \ blockchain, it becomes available to be included in an automation workflow, and\
