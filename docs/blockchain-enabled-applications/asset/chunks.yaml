    on the stake that an account has in the network. Therefore, if you have a higher
    stake in the network, you have a higher chance of being selected as a validator.
    The validator will then “forge” the next block and get a reward from the network.
    Here, the validator is truly forging a block (in the blacksmith sense of the term)
    instead of mining, because in PoS, the idea of hardware-based mining is replaced
    by a virtual stake. One rationale behind using PoS was to circumvent the high
    power consumption and energy requirements of PoW-mining algorithms that translated
    to higher electricity bills and became a frequent complaint. Peercoin was the
    first cryptocurrency to launch with PoS; however, recently more prominent PoS
    implementations can be seen in ShadowCash, Nxt, and Qora. The main differences
    between Bitcoin and Ethereum as protocols are highlighted in Figure [4-1](#430562_2_En_4_Chapter.xhtml#Fig1).


    Note'
  trans: '

    # 4. 解析以太坊


    以太坊是一个开源的、去中心化的区块链平台，具备计算能力，它通过脚本语言将基本的货币兑换重构为用户之间的价值转移。以太坊被广泛认为是比特币协议的后继者，它泛化了原始概念，使得更多样化的应用能够构建在区块链技术之上。以太坊包含两个核心组成部分。首先，是一个图灵完备的虚拟处理器，能够计算所需的计算资源并执行脚本，被称为以太坊虚拟机（`EVM`）。第二个组成部分是一种价值代币，称为以太币，它是网络中的货币，用于用户之间的交易或对网络矿工的补偿。在本章中，我们将首先概览以太坊的架构，并将其与比特币进行比较，重点关注`EVM`和图灵完备性特性。架构部分之后，会简要讨论以太坊中的账户模型以及使用默克尔-帕特里夏树（Merkle-Patricia
    Trees）进行的账户表示。这将引导我们进入以太坊全局状态表示、账户存储以及 Gas（一种网络中的垃圾信息预防机制）等主题。接着，我们解析`EVM`所支持的智能合约概念、围绕沙盒化可执行代码的安全问题，以及`EVM`如何将可执行代码（字节码）推送到区块链上。之后，我们将介绍
    Solidity 和 Vyper——两种用于在以太坊中编写智能合约的编程语言。我们将探讨 Solidity 和 Vyper 的语法，以及当前流行的集成开发环境（`IDE`），并提供一份关键开发者资源的简要清单。接下来，我们聚焦于以太坊中提出的世界计算机模型，并介绍诸如`IPFS`和`Whisper`等支持的分布式技术。然后，我们将审视去中心化应用（`DApps`）的状态，以及以太坊中名为
    Mist 的发布平台。这使我们能够过渡到讨论以太坊的第二层更新——这是本章以及 2020 年以太坊生态系统的主要技术焦点。最后，我们以对企业侧的简要讨论来结束本章。在此，我们将介绍一个特别值得关注的进展：由微软在
    Azure 云上部署的区块链即服务（`BaaS`）。


    ## 以太坊概览


    大约在 2013 年中，大部分比特币社区开始对区块链上除货币之外的应用想法产生兴趣。很快，在线论坛上涌现了大量新想法的讨论。一些流行的例子包括域名注册、资产保险、投票，甚至物联网（`IoT`）。当这股热潮开始消退后，对比特币协议更深入的分析揭示了可以在其之上构建的潜在应用的严重局限性。


    一个关键的争论点是：是否应该允许在区块链上使用完整的脚本语言，还是应该构建逻辑驻留在区块链之外的应用。有两个关键问题引发了这场辩论：


    - 比特币协议中的脚本语言和操作码（OPCODES）在设计上功能非常有限。

    - 比特币协议本身不具有通用性。虽然有过尝试；例如，Namecoin 是为一个特定任务（域名注册）设计的。当时最大的问题是：如何将协议通用化，使其能够向前兼容我们尚不了解的未来应用？


    最终，关于脚本出现了两种思想流派。传统上，中本聪的白皮书提出将脚本语言的功能限制得十分有限。这将避免区块链中存在可执行代码所带来的安全隐患。从某种意义上说，区块链的可执行代码仅限于更新分布式状态所需的一些必要原语。第二种思想流派由维塔利克·布特林（Vitalik
    Buterin）倡导，他认为区块链不仅仅是一个账本。他设想区块链是一个计算平台，可以使用合约和参数来执行定义明确的函数。这通过以太坊虚拟机（`EVM`）得以实现。`EVM`允许将可执行代码完全隔离，并安全地执行构建在区块链上的应用。我们将在本章稍后部分更详细地讨论这一点。让我们从以太坊背后的核心设计原则开始。


    ### 核心理念


    以太坊不是构建一个支持特定应用的区块链平台，而是要构建一个原生编程语言，该语言具有可扩展性，能够使用该语言在区块链平台上实现业务逻辑。


    我们稍后回来理解这一原则的含义。与此同时，让我们讨论一下以太坊的另一个显著特征：共识算法。我们在之前的章节中讨论过共识的概念。在基于工作量证明（`PoW`）的加密货币（如比特币）中，网络奖励那些解决加密难题以验证交易并挖掘新区块的矿工。以太坊提出了一种不同的共识算法，称为权益证明（`PoS`）。在`PoS`算法中，下一个区块的验证者/创建者是基于账户在网络中的权益，以伪随机方式选出的。因此，如果你在网络中的权益越高，被选为验证者的机会就越大。然后，验证者将“锻造”下一个区块，并从网络中获得奖励。在这里，验证者确实是（从铁匠锻铁的意义上）“锻造”一个区块，而不是“挖矿”，因为在`PoS`中，基于硬件的挖矿概念被虚拟权益所取代。使用`PoS`的一个理由是规避`PoW`挖矿算法的高功耗和高能耗要求，这些要求转化为更高的电费，并成为一个常见的抱怨。Peercoin
    是第一个采用`PoS`推出的加密货币；然而，最近在 ShadowCash、Nxt 和 Qora 中可以看到更突出的`PoS`实现。图 4-1 突出了比特币和以太坊作为协议之间的主要区别。

    '
- fmt: "以太坊的当前实现（也称为以太坊1.0）使用工作量证明（Proof-of-Work）作为共识算法。然而，以太坊的2.0层升级计划将过渡到权益证明（Proof-of-Stake）作为主要的共识算法。有关此算法的更多细节将在本章后面提供。\n\
    \n以下是以太坊社区开发者撰写的关于权益证明（PoS）的简要总结（[`https://docs.ethhub.io/ethereum-roadmap/ethereum-2.0/proof-of-stake/`](https://docs.ethhub.io/ethereum-roadmap/ethereum-2.0/proof-of-stake/)）:\n\
    \n> **权益证明（PoS）是一类依赖验证者在网络中的经济权益的公有区块链共识算法**。在基于工作量证明（PoW）的公有区块链（例如比特币和当前以太坊实现）中，算法奖励那些通过解决密码学难题来验证交易并创建新区块（即挖矿）的参与者。在基于权益证明（PoS）的公有区块链（例如以太坊即将推出的`Casper`实现）中，一组验证者轮流提议并对下一个区块进行投票，每个验证者投票的权重取决于其存款（即权益）的大小。PoS的显著优势包括**安全性、降低的中心化风险以及能源效率**。\n\
    \n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig1_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig1_HTML.jpg)\n\
    \n图4-1：比特币和以太坊作为计算平台的概览\n\n聚焦于图[4-1](#430562_2_En_4_Chapter.xhtml#Fig1)，在比特币协议中，地址映射了从发送方到接收方的交易。区块链上运行的唯一程序是转账程序；给定地址和密钥签名，该程序可以将资金从一个用户转移到另一个用户。以太坊通过在每个节点上部署EVM（以太坊虚拟机）来泛化这一概念，使得可验证代码能够在区块链上执行。在此，通用方案是外部账户将参数传递给一个函数，EVM将该调用定向到相应的合约并执行该函数，前提是提供了足够的以太币和`gas`。因此，以太坊中的每一笔交易都可以被视为一个函数调用。\n\
    \n## 以太坊中的账户\n\n账户是以太坊中的元结构，也是区块链的基本操作单元。所有以太坊交易都需要一个账户。此外，账户也作为模型来存储和跟踪网络中用户的信息。网络上有两种类型的账户：\n\
    \n*   **用户账户：** 这些是用户控制的账户，也称为外部账户。这些账户拥有以太币余额，由公私钥对控制，可以发送交易，但没有关联的代码。以太坊网络中的所有操作都由外部账户发起的交易触发。在比特币协议中，我们称这些仅为地址。账户与地址之间的关键区别在于以太坊中能够包含和执行通用代码。\n\
    \n*   **合约：** 这本质上是由其自身代码控制的账户。合约账户是驻留在区块链上的以太坊功能程序单元。该账户拥有以太币余额，关联有代码，可以在收到来自其他账户的交易时执行代码，并能操作其自身的持久化存储。(区块链上的每个合约都有其唯一可以写入的存储空间；这被称为合约的状态)。网络上的任何成员都可以创建包含任意规则的应用，并将其定义为一个合约。\n\
    \n如果账户扮演如此关键的角色，它们在区块链上是如何表示的呢？账户成为默克尔树（Merkle trees）的一个元素，而默克尔树又成为每个区块头的一个元素。以太坊使用了一种修改版的二叉默克尔树，称为默克尔-帕特里夏树（Merkle-Patricia\
    \ trees）。对默克尔-帕特里夏树（[`http://www.emsec.rub.de/media/crypto/attachments/files/2011/04/becker_1.pdf`](http://www.emsec.rub.de/media/crypto/attachments/files/2011/04/becker_1.pdf)）的完整解释已超出本文范围；然而，图[4-2](#430562_2_En_4_Chapter.xhtml#Fig2)提供了一个图形摘要。\n\
    \n> **注意**  \n> 这里解释的双账户系统可能不会在以太坊中长期存在。最近，越来越多地推动采用单一账户模型，即通过合约来实现用户账户。\n\n![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig2_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig2_HTML.jpg)\n\
    \n图4-2：区块A和区块B的区块头及默克尔-帕特里夏树概览\n\n在图[4-2](#430562_2_En_4_Chapter.xhtml#Fig2)中，区块头包含一些标准定义，用于广播网络的状态。此外，以太坊中的每个区块头都包含三个针对不同对象的默克尔-帕特里夏树：交易（函数调用）、收据（函数调用的结果，记录每个交易的效果）以及状态对象。二叉树在管理交易历史方面很有用；然而，状态有多个需要更频繁更新的组件。图中所示的默克尔-帕特里夏树包含一个状态根，进一步记录多个账户对象。其中一个深层分支指向一个虚线框，其中包含定义账户的四个参数。根据这些参数，账户余额和网络中的随机数经常被更新。因此，需要一种更合适的数据结构，使我们能在插入、更新、编辑或删除操作后快速计算出新的树根，而无需重新计算整棵树。这种修改后的默克尔树允许快速查询诸如以下问题：此账户是否存在？此交易是否已包含在特定区块中？我账户的当前余额是多少？值得注意的是，余额仅与外部账户相关，同样，`codehash`（包含可执行代码）仅适用于合约。`Storage\
    \ root`是最后一个参数，包含用户上传到区块链的数据，或作为合约可用的内部存储空间。此内部存储空间可以由合约在执行阶段更新。接下来我们深入讨论这些账户参数。"
  raw: 'The current implementation of Ethereum (also known as Ethereum 1.0) uses Proof-of-Work
    as the consensus algorithm. However, the Layer 2.0 updates to Ethereum plan for
    a transition to Proof-of-Stake as the main consensus algorithm. More details regarding
    this algorithm are provided later in the chapter.


    The following is a brief summary of PoS written by Ethereum community developers
    ([`https://docs.ethhub.io/ethereum-roadmap/ethereum-2.0/proof-of-stake/`](https://docs.ethhub.io/ethereum-roadmap/ethereum-2.0/proof-of-stake/)):


    > ***Proof of Stake (PoS)*** ***is a category of consensus algorithms for public
    blockchains that depend on a validator’s economic stake in the network**. In proof
    of work (PoW) based public blockchains (e.g. Bitcoin and the current implementation
    of Ethereum), the algorithm rewards participants who solve cryptographic puzzles
    in order to validate transactions and create new blocks (i.e. mining). In PoS-based
    public blockchains (e.g. Ethereum’s upcoming Casper implementation), a set of
    validators take turns proposing and voting on the next block, and the weight of
    each validator’s vote depends on the size of its deposit (i.e. stake). Significant
    advantages of PoS include* ***security, reduced risk of centralization, and energy
    efficiency*** *.*


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig1_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Overview of Bitcoin and Ethereum as computational platforms


    Focusing on Figure [4-1](#430562_2_En_4_Chapter.xhtml#Fig1), in the Bitcoin protocol
    addresses map the transactions from sender to receiver. The only program that
    runs on the blockchain is the transfer program; given the addresses and the key
    signature, this program can transfer money from one user to another. Ethereum
    generalizes this concept by placing an EVM at every node so that verifiable code
    can be executed on the blockchain. Here, the general scheme is that an external
    account will pass arguments to a function, and the EVM will direct that call to
    the appropriate contract and execute the function, granted the appropriate amount
    of ether and gas are supplied. As a consequence, every transaction in Ethereum
    can be considered a function call.


    ### Accounts in Ethereum


    Accounts are a meta-structure in Ethereum and the fundamental operational unit
    of the blockchain. All Ethereum transactions require an account. Alternatively,
    accounts also serve as a model to store and track information on the users in
    the network. There are two types of accounts available on the network:


    *   **User accounts:** These are user-controlled accounts, also known as external
    accounts. These accounts have an ether balance, are controlled by public–private
    keypairs, and can send transactions, but have no associated code. All actions
    in the Ethereum network are triggered by transactions initiated by external accounts.
    In the Bitcoin protocols, we referred to these simply as addresses. The key difference
    between accounts and addresses is the ability to contain and execute generalized
    code in Ethereum.


    *   **Contracts:** This is essentially an account controlled by its own code.
    A contract account is the functional programmatic unit in Ethereum that resides
    on the blockchain. This account has an ether balance, has associated code, can
    execute code when triggered by transactions received from other accounts, and
    can manipulate its own persistent storage. (Every contract on the blockchain has
    its own storage only it can write to; this is known as the contract’s state).
    Any member on the network can create an application with some arbitrary rules,
    defining it as a contract.


    If accounts play such a key role, how are they represented on the blockchain?
    Accounts become an element of the Merkle trees, which in turn are an element of
    every block header. Ethereum uses a modified form of the binary Merkle trees called
    Merkle-Patricia trees. A complete explanation of the Merkle-Patricia tree ([`http://www.emsec.rub.de/media/crypto/attachments/files/2011/04/becker_1.pdf`](http://www.emsec.rub.de/media/crypto/attachments/files/2011/04/becker_1.pdf))
    would be beyond the scope of this text; however, a graphical synopsis is provided
    in Figure [4-2](#430562_2_En_4_Chapter.xhtml#Fig2).


    Note


    The two-account system explained here may not remain in Ethereum for the long
    term. Recently, there has been more push toward a one-account model, where user
    accounts are implemented by using contracts.


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig2_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Overview of block headers and Merkle-Patricia trees for Blocks A and B


    In Figure [4-2](#430562_2_En_4_Chapter.xhtml#Fig2), the block header contains
    a few standard definitions that broadcast the status of the network. Additionally,
    every block header in Ethereum has three Merkle-Patricia trees for three different
    objects: Transactions (function calls), Receipts (the results of a function call,
    recording the effect of each transaction), and State objects. Binary trees are
    useful in managing transaction histories; however, the state has multiple components
    that need to be updated more frequently. The Merkle-Patricia tree shown contains
    a state root that further records multiple account objects. One of the deep branches
    points to a dashed box containing the four parameters that define an account.
    From these parameters, the balance of an account and the nonce for the network
    are often updated. Therefore, a more suitable data structure is necessary where
    we can rapidly calculate a new tree root after an insert, update, edit, or delete
    operation without needing to recompute the entire tree. This modified Merkle tree
    allows for rapid queries to questions such as the following: Does this account
    exist? Has this transaction been included in a particular block? What is the current
    balance of my account? Of note, the balance is only relevant for an external account,
    and similarly, the codehash (which holds executable code) is only applicable to
    contracts. Storage root is the final parameter and contains data uploaded by a
    user to the blockchain or serves as internal storage available to a contract.
    This internal storage can be updated by the contract during the execution phase.
    Let’s talk about these account parameters in depth.'
