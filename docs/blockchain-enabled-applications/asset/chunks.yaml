- fmt: '一个通用的调度和高效的匹配算法允许在高性能计算（HPC）领域对核心区块链技术进行非常有趣的升级。一个显著的例子是使用特定领域的区块链（或侧链）。侧链是一种可适应的区块链，旨在满足特定基础设施需求，用于运行那些在通用环境中性能不佳的应用程序。此类区块链的目标是最大化性能并最小化执行之间的时间延迟。通常情况下，应用程序会经过标准区块链；然而，在提交大量任务的情况下，部分任务可以被卸载到侧链进行追踪。侧链将追踪在宿主机上花费的时间，并将信息报告回网络，这种卸载可以减少通用区块链上的流量。需要开发一个先进的智能合约系统来实现这种切换。图
    [7-12](#430562_2_En_7_Chapter.xhtml#Fig13) 提供了 iEx.ec 架构的可视化说明。


    ![''../images/430562_2_En_7_Chapter/430562_2_En_7_Fig13_HTML.jpg''](images/430562_2_En_7_Chapter/430562_2_En_7_Fig13_HTML.jpg)


    **图 7-12** iEx.ec 架构概览


    在图 [7-12](#430562_2_En_7_Chapter.xhtml#Fig13) 中，最顶层是一个面向消费者的应用程序 `E-Fast`。这是 iEx.ec
    的第一个用例，它提供了在分布式大规模环境中以极低成本运行复杂金融预测算法的基础设施。其下层是以太坊区块链层，它为网络提供共识，并为矿工的补偿提供任务追踪。该区块链还充当智能合约系统的平台，该系统最终将在网络中运行。需要注意的是，区块链层并不与
    iEx.ec 的每一层都交互。分布式云层通过一个名为 `XtremWeb-HEP` 的中间件进行更直接的管理。这是一个资源管理层，由任务调度器和经过验证的数据存储库组成。调度器负责协调区块链与将任务分配给宿主机上工作节点之间的活动。数据存储库包含来自金融和基因组学等不同领域的大型数据集，这些数据集可供买方想要执行的应用程序访问。买方连接到资源管理层，并提供任务描述以及数据源。此信息也会记录在区块链上。中间件的两个组件都连接到已部署的工作节点，使用该描述并执行任务。最终结果由中间件收集，并在支付记录到区块链后提供给买方。最后一层是分布式的矿工云。请注意，这里我们不需要主模块，因为中间件执行该功能。任务在容器或虚拟机中执行，结果报告回资源层。这降低了网络的整体复杂性，因为在宿主机上运行的唯一代码就在容器中。


    ### 总结


    在本章中，我们从 HPC 应用的角度审视了以太坊代币。我们首先介绍了将代币作为以太坊应用引入的市场效用和基本原理。然后，我们讨论了一种名为 `ECM` 的原型
    HPC 代币。该代币执行在计算市场中所需的所有基本功能，在该市场中，客户可以从由专用买方运营的集群购买计算能力。该代币允许在一个透明的计算能力市场中进行争议解决和链上验证。接着，我们深入探讨了更复杂的计算代币，例如
    `Golem` 和 `SONM`。我们详细描述了这两者，涵盖了主要的技术进步以及这两个代币彼此之间的差异。最后，我们通过介绍基于经过多年测试的分布式云计算软件的
    iEx.ec 来结束本章。`iEx.ec` 团队实现了一个去中心化版本的 `Xtreme-Web HPC`，以执行与 `Golem` 和 `SONM` 相同的任务，并启用一个计算市场。


    # 8. 科学中的区块链


    基于证据的临床科学目前正面临一场令人瘫痪的可重复性危机。从临床心理学到癌症生物学，最近的元研究表明，研究人员无法重复其同行发表的研究成果的情况有所增加。这个问题不仅限于实验室中发生的实验台工作；它还困扰着从实验台到临床的转化研究。治疗方法、测试和技术从简单的实验室实验转变为影响数百人的
    FDA 批准的设备和检测方法。因此，可重复性对于将科学突破转化为实用的补救措施至关重要。


    区块链技术在新兴的开放获取科学领域中的主要作用是提高这些流程的透明度。为此，本章介绍了三个用例和应用：第一个涉及临床试验数据的保存，第二个涉及可以为致力于开放研究的科研人员和机构开发的声誉系统，第三个涉及用于追踪假药的供应链管理应用。在这些用例中，我们提供了大量正在进行的工作示例，这些工作将极大地塑造区块链在科学领域的世界。我们将首先讨论当前的研究方法范式和负面数据的重要性；我们的重点将主要局限于临床科学。然后，我们将讨论目前用于衡量已发表研究影响力的传统指标和替代指标系统。这将使我们能够过渡到补充传统指标的用例，并扩展它们以使开放科学成为一个基本特征。最后，我们将通过审视将区块链融入现有研究基础设施的持续努力来结束我们的讨论。'
  raw: 'A versatile schedule and efficient matchmaking algorithm allow for very interesting
    upgrades to the core blockchain technology in the context of HPC. One remarkable
    example is the ability to use domain-specific blockchains (or sidechains). A sidechain
    is an adaptable blockchain designed to meet specific infrastructure requirements
    for running applications that would underperform in a generalized environment.
    The goal of such a blockchain is to maximize performance and minimize any time
    delays between executions. Normally, an application would go through the standard
    blockchain; however, in cases where a large amount of tasks are submitted, some
    of the tasks can be offloaded to a sidechain for tracking. The sidechain will
    track the amount of time spent on host machines and report the information back
    to the network, and this offloading can reduce the traffic on the generalized
    blockchain. An advanced system of smart contracts will need to be developed to
    enable this switch. Figure [7-12](#430562_2_En_7_Chapter.xhtml#Fig13) provides
    a visual companion to the iEx.ec architecture.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig13_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig13_HTML.jpg)


    Figure 7-12


    Overview of iEx.ec architecture


    In Figure [7-12](#430562_2_En_7_Chapter.xhtml#Fig13), the top-most layer is a
    consumer-facing application, E-Fast. It is the first use case of iEx.ec that provides
    the infrastructure to run sophisticated financial prediction algorithms in a massively
    distributed setting for a fraction of the cost. Underneath is the Ethereum blockchain
    layer that provides consensus for the network and task-tracking for reimbursement
    of miners. The blockchain also acts as a platform for the smart-contract system
    that will eventually run in the network. It is important to note that the blockchain
    layer does not interact with every level of iEx.ec. The distributed cloud level
    is managed more directly through a middleware called XtremWeb-HEP. This is the
    resource management layer comprising a task scheduler and a verified data repository.
    The scheduler coordinates between the blockchain and assigning tasks to workers
    on host machines. The repository contains large data sets from various fields
    such as finance and genomics that are made accessible to applications that buyers
    want to execute. The buyer connects to the resource management layer and provides
    a description of the task along with the source of data. This information is also
    recorded on the blockchain. Both components of the middleware connect to the deployed
    workers, use the description, and execute the task. The final results are collected
    by the middleware and made available to the buyer after a payment is recorded
    on the blockchain. The last layer is a distributed cloud of miners. Notice here
    that we don’t need a master module, because the middleware performs that function.
    The tasks are executed in containers or virtual machines, and the results are
    reported back to the resource layer. This reduces the overall complexity of the
    network as the only code running on host machines is in the containers.


    ### Summary


    In this chapter, we looked at Ethereum tokens from the perspective of HPC applications.
    We first introduced the market utility and rationale behind introducing tokens
    as apps on Ethereum. Then, we discussed the prototype HPC token called ECM. This
    token performs all the basic functions that would be needed in a computational
    market where customers can purchase computational power from clusters run by dedicated
    buyers. The token allows for dispute resolution and on-chain verification in a
    transparent computational power market. We then delved into the more complex computational
    tokens, such as Golem and SONM. We described both in heavy detail, covering the
    major technical advancements and how those two tokens differ from each other.
    Finally, we concluded by covering iEx.ec, which is built on distributed cloud
    computing software that has been tested for years. The iEx.ec team implemented
    a decentralized version of Xtreme-Web HPC to perform the same task as Golem and
    SONM and enable a computational market.


    # 8. Blockchain in Science


    Evidence-based clinical sciences are currently suffering from a paralyzing reproducibility
    crisis. From clinical psychology to cancer biology, recent meta-research indicates
    a rise in researchers’ failing to replicate studies published by their peers.
    This problem is not just limited to bench-work that happens in a lab; it also
    plagues translational research where the transformation from bench to bedside
    happens. Treatments, tests, and technologies are converted from simple lab experiments
    to FDA-approved devices and assays that affect hundreds of lives. Therefore, replicability
    is crucial to converting scientific breakthroughs into pragmatic remedies.


    The primary role of blockchain technology in the emerging landscape of open-access
    science is increasing the amount of transparency into these processes. To that
    end, three use cases and applications are presented in this chapter: the first
    one involving deposition of data in clinical trials, the second one involving
    a reputation system that can be developed for researchers and institutes committed
    to open research, and the third one involving the application of supply-chain
    management for tracking counterfeit drugs. In these use cases, we provide ample
    examples of ongoing work that will come to drastically shape the world of blockchain
    in science. We will begin by discussing the current paradigms of the research
    method and the importance of negative data; our focus will mostly remain limited
    to the clinical sciences. Then, we will talk about traditional metrics and altmetrics
    systems presently implemented to measure the impact of published research. This
    will allow us to transition into the use cases that supplement traditional metrics
    and expand them to make open science a fundamental feature. Finally, we will end
    our discussion by looking at ongoing efforts to incorporate blockchain into the
    existing research infrastructure.'
