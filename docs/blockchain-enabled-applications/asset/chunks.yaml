- fmt: '# Do You Need a Blockchain?


    The hype of blockchain technology has spread like wildfire through the corporate
    world. All sorts of enterprises and companies have created small blockchain-development
    teams to investigate how they can benefit from using the blockchain. Beneath the
    hype, there are signs of very serious technological development in the blockchain
    world, many of which are cataloged in this book. However, we are still in the
    nascent stages. The reality of the business advantages of blockchain-enabled applications
    is they can simplify business processes and reduce friction significantly. In
    this section, we will present three decision models that can help you critically
    analyze whether integrating a blockchain into your project/company is indeed the
    appropriate technical solution:


    * **IBM model:** A blockchain model that highlights how the key features of blockchain
    fit into business processes and applications.

    * **Birch-Brown-Parulava model:** A model helping you pick between permissioned
    and permission-less implementations of a distributed ledger. Designed by developers
    at Consult Hyperion.

    * **Wüst-Gervais model:** A simplified model combining the best from both the
    previous models. Designed by two researchers from ETH Zurich.


    > **Note**

    > Why did we pick these three models? There are several comprehensive decision
    trees available online to help a business decide which application scenarios would
    require a blockchain. In this section, we picked the simplest models to illustrate
    the more important design principles of integrating a blockchain into existing
    infrastructure.


    Before we dive into the specifics of each model, what general principles are shared
    by all three? You can use the shared designs as criteria to evaluate your business
    needs, and then create a model specific to your business based on a few simple
    ideas and questions:


    * **Database:** You need to begin by understanding why your business is using
    a database. Blockchains use a shared database that is visible to all the participants.
    Are you comfortable with using a shared ledger for your application? The database
    is constantly updated by transactions that happen over the network; can your application
    interface with a database that is constantly updated?

    * **Writers:** The database is updated by multiple transactions writing to it.
    Blockchain is designed to have multiple writers; i.e., multiple entities that
    are generating and verifying the transactions that are published to the ledger.

    * **No trust:** Does verifying the identity of writers matter for your application?
    This could change the ledger implementation that you deploy. The default setting
    for a blockchain is no trust between parties writing to the ledger. Is that sufficient
    for your application? Do the parties on your network have competing interests
    or similar motivations? If they have similar interests, some of the blockchain
    constructs managing trust can be safely removed.

    * **Disintermediation:** Blockchains remove a centralized authority from the network,
    and the transactions are therefore considered decentralized. These transactions
    are independently verified and processed by every node on the network. Do you
    want or need this disintermediation? Given your application-specific use case,
    are there any significant shortcomings to having a gatekeeper? Good reasons to
    prefer a blockchain-based database might include lower costs, faster workflows,
    automatic settlements, or regulatory influences.

    * **Transactional interdependence:** A blockchain is best for handling transactions
    that build on each other as they are published to the blockchain by writers. The
    interdependence part refers to transaction clearing; for instance, if A sends
    funds to B, and then B sends funds to C, the second transaction can’t be cleared
    until the first one passes through. Blockchain ensures the orderly and rapid processing
    of transactions published by writers. In other words, a blockchain truly shines
    when keeping a log of transactions with a long history involving multiple users.


    Let’s start looking at decision models; the first one is shown in Figure 10-3.


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig3_HTML.jpg](images/430562_2_En_10_Chapter/430562_2_En_10_Fig3_HTML.jpg)


    **Figure 10-3** The Birch-Brown-Parulava model showing the consensus algorithm
    that corresponds to a ledger type


    This model walks a user through making the decision of whether to deploy a permissioned
    ledger or a permissionless ledger. This may lead to profound changes for deciding
    the software base; for instance, between Ethereum and Quorum. The next model is
    by IBM, shown in Figure 10-4.


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig4_HTML.jpg](images/430562_2_En_10_Chapter/430562_2_En_10_Fig4_HTML.jpg)


    **Figure 10-4** IBM’s decision chart for when to use a blockchain


    An important feature to highlight in this flowchart is how certain decisions are
    associated with features inherent to the blockchain. For instance, contractual
    relationships can be handled well on the blockchain by using smart contracts.
    This chart can become a decent preliminary check for blockchain compatibility
    with your project, and to see the features that are enabled by the blockchain.


    The final decision model that we are considering here is shown in Figure 10-5.
    It was made by Karl Wüst and Arthur Gervais (both blockchain researchers) in a
    paper titled “Do You Need a Blockchain?” and for us, it sequentially integrates
    concepts from both the previous models.


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig5_HTML.jpg](images/430562_2_En_10_Chapter/430562_2_En_10_Fig5_HTML.jpg)


    **Figure 10-5** The Wüst-Gervais model


    This model tries to answer for both deployment options and whether you should
    be considering a blockchain or not. The concepts here are similar to the previous
    models; however, this flowchart is focused more on properties of the network itself.


    ## The Hyperledger Project


    Now that we have provided a framework by which to determine whether an organization
    needs a blockchain, we will get an introduction to Hyperledger, which is an open
    source project and set of tools for deploying blockchains. Hyperledger is essentially
    an umbrella project by the Linux Foundation that offers underlying frameworks,
    operational standards, best practices or guidelines, and developer tools to set
    up, deploy, and manage open source blockchains. The open source project is well
    organized and backed by a community of hundreds of contributors, a governing board,
    and oversight from a technical steering committee. Presently, Hyperledger frameworks
    are an active area of study being used to build enterprise-grade blockchains for
    an organization or for application-specific consortia. In this section, we want
    to discuss seven Hyperledger frameworks and six developer tools.


    > **Note**

    > This section provides a broad overview of the Hyperledger project. For an accurate
    and up-to-date list of features, please refer to the project website at [`www.hyperledger.org`](http://www.hyperledger.org).
    Additionally, the terms *ledger* and blockchain will be used interchangeably in
    this section.'
