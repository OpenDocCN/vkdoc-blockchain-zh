    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig11_HTML.jpg](img/430562_2_En_11_Fig11_HTML.jpg)


    **图 11-11** 创建新账户


    创建账户包含两个步骤：提供账户信息与密钥签名。第一步如图所示，第二步与签署资产的操作完全相同。提供账户信息后，使用你的 `HSM` 密钥签署账户，随后会看到刚创建的账户的确认界面。接下来，为了演示账户间的交易，我们需要两个账户。因此，请创建第二个账户，别名设为
    "Team Rocket"，最终结果应如图 11-12 所示。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig12_HTML.jpg](img/430562_2_En_11_Fig12_HTML.jpg)


    **图 11-12** 账户摘要


    图 11-12 中测试网络上的两个账户将允许我们演示交易、锁定和解锁操作。现在我们有了两个账户，就可以在它们之间进行资产交易了。需要注意的是，在 Chain
    Core 中，资产仅能执行四种操作：发行、花费、转移（控制）或移除（销毁）。通常，这些操作的组合可实现用户间的交易。我们将在此处探讨两种交易类型：一种是向某个账户发行新资产，另一种是将该资产交易给我们创建的第二个账户。最后，我们将通过观察这些操作在
    Ivy Playground 中的演变来结束本次操作指南。首先，导航到 `Transactions` 选项卡并点击“New Transaction”。这会将你带到“New
    Transaction”视图，如图 11-13 所示。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig13_HTML.jpg](img/430562_2_En_11_Fig13_HTML.jpg)


    **图 11-13** 新交易视图


    交易只能依据我们前面提到的四种操作之一来执行。每种操作都有一组关联参数，需要提供这些参数才能完成交易。在图 11-13 中，我们想要发行一种新资产，因此应选择“Issue”。点击“Issue”后，会出现另一个屏幕，询问你要发行的资产参数，如图
    11-14 所示。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig14_HTML.jpg](img/430562_2_En_11_Fig14_HTML.jpg)


    **图 11-14** 创建资产


    图 11-14 中的发行操作首先要求我们输入要创建的资产名称，然后是想要发行的数量。回想一下，在 Chain 中，资产不能凭空发行；新资产的创建与账户对资产的控制是相结合的。一旦资产发行完成，我们会将其分配给我们创建的第一个账户。图
    11-15 显示了资产控制权转移到新账户的过程。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig15_HTML.jpg](img/430562_2_En_11_Fig15_HTML.jpg)


    **图 11-15** 将资产分配给账户


    如图 11-15 所示的资产分配，在 Chain 中也被称为 *控制到账户*。一百单位的银被转移到我们创建的第一个账户。填写完分配信息后，即可提交此交易。它将被添加到测试网络，确认信息如图
    11-16 所示。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig16_HTML.jpg](img/430562_2_En_11_Fig16_HTML.jpg)


    **图 11-16** 交易验证


    图 11-16 中的摘要显示，一百单位的银资产被发行，然后分配给了 Vikram 的账户。或者换句话说，资产被发行后，由我们创建的第一个账户控制。这是我们在
    Chain 上能执行的最简单的交易；现在，让我们进入下一个涉及两个用户之间交易的步骤。这次，我们必须使用 *花费* 操作来使资产可用，并使用 *控制* 操作来转移资产。从侧边栏回到
    `Transactions` 视图并点击“New Transaction”，但这次我们不使用发行操作，而是选择“spend from account”，如图
    11-17 所示。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig17_HTML.jpg](img/430562_2_En_11_Fig17_HTML.jpg)


    **图 11-17** 从账户发起花费操作以开始交易


    现在，我们需要指定要转移多少银（图 11-18）。这第一步只是让资产变为可用状态，它仍然需要被认领。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig18_HTML.jpg](img/430562_2_En_11_Fig18_HTML.jpg)


    **图 11-18** 从 Vikram 账户中取出十个单位的银用于交易


    现在银已可用，让我们将所有权从第一个账户切换到第二个账户（图 11-19）。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig19_HTML.jpg](img/430562_2_En_11_Fig19_HTML.jpg)


    **图 11-19** 将所有权从一个账户转移到第二个账户（此处为 Team Rocket）


    就像发行资产一样，交易资产涉及一个账户使资产可用，另一个账户控制这些已释放的资产。为了确认交易已发生，我们可以回到 `Transactions` 视图，然后查看最近的交易；点击它将会展开该交易（图
    11-20）。


    ![../images/430562_2_En_11_Chapter/430562_2_En_11_Fig20_HTML.jpg](img/430562_2_En_11_Fig20_HTML.jpg)


    **图 11-20** 最近交易的摘要


    注意在图 11-20 中，十个单位的资产由第一个账户（Vikram）花费，然后十个单位的资产由第二个账户（Team Rocket）控制，从而完成了我们的交易。


    到目前为止，我们已经讨论了交易的两个关键操作，它们是 Chain Core 的核心。还有一些其他可用选项，例如销毁资产，这仅意味着将给定数量的资产从流通中移除。其效果是增加网络上的稀缺性。现在我们理解了操作的概念，在
    Chain 中我们还能做什么呢？编写复杂的脚本来管理和移动 Chain 中的资产会变得有点复杂。Ivy Playground 的引入是为了围绕区块链上的锁定和解锁资产开发一种正式的脚本语言。开发者可以向脚本添加条件，并编写更复杂的合约来保护价值和资产。Ivy
    的主要目标是通过一组描述资产解锁条件的子句来锁定资产的价值。Chain 团队讨论了在 Chain 上合约与诸如以太坊等其他分布式计算平台有何不同：


    > *Chain 区块链上的合约是不可变的。合约不能被更新，只能被花费——即从区块链中移除，并替换为一个或多个锁定相同价值的新合约。*


    > *这种不可变的状态模型将我们的方法与（例如）以太坊和 Fabric 区分开来。在以太坊中，合约可以相互发送消息和价值，并且可以根据这些消息更新自己的状态。*

