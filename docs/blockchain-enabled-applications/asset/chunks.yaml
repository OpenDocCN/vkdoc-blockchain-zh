    \n*   **Privacy-in-Depth**\n    *   Zero-Knowledge Proof Cryptography (ZKPs)\n\
    \n*   Trusted Execution Environments (TEEs)\n\n*   Secure Encrypted Virtualization\
    \ (SEV)\n\n*   Verifiable Computation\n\n*   Secure Multi-Party Computation\n\n\
    *   Blind Computation\n\n*   Differential Privacy\n\n*   Homomorphic Encryption\n\
    \n*   Quantum-Resistant Encryption\n\n## Source and Derived Health Data\n\nNow\
    \ that we’ve had a high-level discussion of these three game-changing technologies,\
    \ let’s consider a paradigm shift in value creation—moving copies of data is no\
    \ longer the *only* way to create value from data.\n\nIn health, source data is\
    \ enterprise data that lives behind firewalls, or the patient’s self-sovereign\
    \ data, the volume of which has been exploding in scale. Source data in health\
    \ has been expanding exponentially for the last fifteen years, and this will continue\
    \ with the widespread availability of 5G wireless connectivity, the internet of\
    \ medical things, and the growing understanding of social determinant data *as\
    \ health data*. Currently, most of our strategies have to do with copying and\
    \ moving source data from place to place: trying to centralize larger and larger\
    \ bodies of source data.\n\nLet’s define **source data**:\n\n1.  **Enterprise**\
    \ data is behind firewalls – *at rest,* not *in motion*\n\n2.  **Patient** self-sovereign\
    \ data – *within cloud storage infrastructures or at the edge on devices*\n\n\
    **Source data** has been **expanding exponentially** for the last fifteen years.\
    \ As **data** grows, we are reaching the logistic extremes of data lakes and other\
    \ centralization strategies. The statistics demonstrate the magnitude:\n\n*  \
    \ 1100 Terabytes (TB) per lifetime of exogenous data (behavior, socioeconomic,\
    \ environmental, etc.) representing roughly 60 percent of the determinants of\
    \ an individual’s health\n\n*   6 TB per lifetime of genomics/epigenomics data\
    \ representing roughly 30 percent of the determinants of an individual’s health\n\
    \n*   0.4 TB per lifetime of clinical data representing roughly 10 percent of\
    \ the determinants of an individual’s health\n\nAnother consideration is associated\
    \ metadata, which are descriptions of the source data. Finally, there is the product\
    \ of the attempts to create value out of source data, which we call derived data,\
    \ composed of analytical findings and insights. As such, the current centralized\
    \ system is a sunsetting paradigm. It is slow, labor intensive, error prone, and\
    \ untrusted. Decentralization with a blockchain framework is the emerging paradigm.\
    \ It will be rapid, automated, quality controlled, and trusted.\n\nToday, we have\
    \ to copy and move data everywhere. Analysis can only be performed on that of\
    \ which we can secure custody. Often, we make compromises by de-identifying data,\
    \ which introduces a huge spectrum of new challenges and risks. In this emerging\
    \ paradigm source, data will be able to remain at rest in enterprise infrastructures\
    \ or in patient self-sovereign infrastructures. Most of the time, it will become\
    \ the exception instead of the rule that the data has to be exchanged for a workflow\
    \ to occur. Analysis will frequently be performed in federated analytics models\
    \ across network participants and the source data. Further, source data will be\
    \ able to remain fully identified and clinically actionable without ever exposing\
    \ it, sharing it, or transferring ownership.\n\nIn this new paradigm, normalization\
    \ and analysis will change substantially. Normalization will occur by distributing\
    \ rule sets and automating that normalization: operating on the data where it\
    \ resides at its source. The analysis will be also performed where it resides\
    \ at its source, and only that derived data will be shared. The aggregated findings\
    \ will be shareable and, importantly, also cryptographically verified.\n\nThe\
    \ new paradigm is a shift to a new person-centered health data architecture as\
    \ part of this healthcare industry transformation. This includes five architectural\
    \ components, all of which are interdependent and necessary:\n\n1.  The individual’s\
    \ self-sovereign identity\n\n2.  The individual’s verifiable credentials\n\n3.\
    \  The diametric workflows that connect the individual represented to the physical\
    \ person it represents\n\n4.  A self-sovereign data lake where all of an individual’s\
    \ data can be brought together—and where *N* equals one, for that individual alone,\
    \ so that it is not a giant target for hackers.\n\n5.  Finally, the ability to\
    \ transact with a tokenized value, to earn, to trade, and to hold all forms of\
    \ a tokenized value\n\nAll of this will require privacy-preserving technologies,\
    \ primarily for health-focused, decentralized machine learning. This is what we\
    \ call **federated learning**."
  trans: "\n除了深度隐私，还有一个重要方面，那就是安全推断的概念。推断是机器学习模型进行预测的功能。模型经过训练并开始执行其既定任务后，理论上会做出可能指导临床决策的预测。它可能指导患者行为，可能指导就医途径，也可能指导这些技术在我们行业中应用的任何环节。至关重要的是，由此产生的数据无法被逆向工程，或不当用于推导出关于数据来源的信息。模型仅能产生预期中的推断结果。\n\
    \n对于希望进一步研究这三项技术的人，请考虑以下内容：\n\n- **区块链**\n  - 去中心化应用（“DApps”）—— *Web3 用户体验*\n\
    \  - 可选代币化—— *创建数字稀缺性*\n  - 智能合约—— *跨组织边界的安全自动化*\n  - 区块链网络—— *公有、私有和混合*\n- **去中心化人工智能**\n\
    \  - 区块链网络中的联邦学习\n  - 训练数据溯源、激励和安全推断的新范式\n  - 基于智能体的仿真与自动化\n- **深度隐私**\n  - 零知识证明密码学\n\
    \  - 可信执行环境\n  - 安全加密虚拟化\n  - 可验证计算\n  - 安全多方计算\n  - 盲计算\n  - 差分隐私\n  - 同态加密\n\
    \  - 抗量子加密\n\n## 源健康数据与衍生健康数据\n\n在对这三项颠覆性技术进行高层级讨论之后，让我们思考一个价值创造方面的范式转变——数据拷贝不再是*唯一*能利用数据创造价值的方式。\n\
    \n在健康领域，源数据是指存在于防火墙之后的企业数据，或是患者自主拥有的数据，其规模正在爆炸式增长。过去十五年来，健康领域的源数据呈指数级增长，并且随着 5G\
    \ 无线连接的普及、医疗物联网的发展以及将社会决定因素数据*视为健康数据*的理解加深，这一趋势将持续下去。目前，我们的大多数策略都与复制和迁移源数据有关：试图集中化越来越庞大的源数据体系。\n\
    \n我们来定义一下**源数据**：\n\n1. **企业**数据位于防火墙之后——*静态*，而非*动态*\n2. **患者**自主拥有的数据——*位于云存储基础设施或边缘设备上*\n\
    \n过去十五年来，**源数据**一直呈**指数级增长**。随着**数据**的增长，我们正触及数据湖及其他集中化策略的物流极限。统计数据表明了其规模：\n\n\
    - 每人一生产生 1100 太字节（TB）的外源性数据（行为、社会经济、环境等），约占个人健康决定因素的 60%\n- 每人一生产生 6 TB 的基因组/表观基因组数据，约占个人健康决定因素的\
    \ 30%\n- 每人一生产生 0.4 TB 的临床数据，约占个人健康决定因素的 10%\n\n另一个考虑因素是相关的元数据，即对源数据的描述。最后，是试图从源数据中创造价值的产品，我们称之为衍生数据，由分析结果和见解组成。因此，当前的集中式系统是一个日落范式。它速度慢、劳动密集、容易出错且不可信。基于区块链框架的去中心化是新兴范式。它将快速、自动化、质量可控且可信。\n\
    \n今天，我们必须到处复制和移动数据。分析只能在我们能够安全保管的数据上进行。我们常常通过去标识化数据来做出妥协，这又引入了一系列新的挑战和风险。在这种新兴范式中，源数据将能够静态驻留在企业基础设施或患者自主拥有基础设施中。在大多数情况下，为了工作流程而必须交换数据将成为例外而非规则。分析将经常在网络参与者和源数据之间以联邦分析模型的形式进行。此外，源数据将能够保持完全标识且具有临床可操作性，而无需暴露、共享或转移所有权。\n\
    \n在这个新范式中，标准化和分析将发生重大变化。标准化将通过分发规则集并使其自动化来实现：在数据所在的源头上对其操作。分析也将在数据所在的源头上进行，只有那些衍生数据会被共享。汇总后的发现结果可以共享，而且重要的是，还可以进行加密验证。\n\
    \n新范式是向以人为中心的健康数据架构的转变，这是医疗行业转型的一部分。这包括五个架构组件，它们相互依赖且必不可少：\n\n1. 个体的自主主权身份\n2.\
    \ 个体的可验证凭证\n3. 连接个体数字身份与其所代表的真实人物的对应工作流\n4. 一个自主主权数据湖，所有个人数据均可汇聚于此——且*N*等于一，仅针对该个体本身，因此不会成为黑客的巨大目标。\n\
    5. 最后，能够与代币化价值进行交易，以赚取、交易和持有各种形式的代币化价值\n\n所有这些都需要隐私保护技术，主要针对以健康为重点的去中心化机器学习。这就是我们所说的**联邦学习**。\n"
- fmt: '# Federated Learning


    What does it look like to combine federated or decentralized machine learning
    with a blockchain infrastructure and privacy-in-depth? What is the heart of the
    value proposition for doing that technically? The synergy between blockchain and
    decentralized AI comes into play as we implement access control and content management
    of data, including data sharing. This is merely the low-hanging fruit for initial
    implementation.


    If we just manage consent and access on the blockchain, but still rely on the
    old primitives of moving data around, we come back to the paradigm of copying
    and creating multiple copies of data. And, therein lies the problem of not being
    able to create digital scarcity. As such, we are unable to increase the value
    of the data, but we do increase its vulnerability. For example, we become the
    victims of data breaches that are totally out of our control—even though we have
    recorded our access—and have been denied specific access to our own data.


    If you could access data in a decentralized model—as opposed to our strategies
    today, where sourcing training data is the single greatest inhibitor to performing
    machine learning functions—greater use of the data would be possible. The reality
    is that it is very difficult for data scientists and machine learning practitioners
    to obtain the data they need to create models. In this decentralized approach,
    we can turn the scarcity and the behavioral economics of that dynamic completely
    upside-down and gain/allow access to vast datasets without ever having to centralize
    them. Could this make a difference in the amount of total data available and the
    degree to which we could trust that data and its provenance in this new blockchain-facilitated
    decentralized AI?


    If you look at most of the studies that are being run on healthcare data, it is
    rare to reach very large scales in terms of data, unless we are speaking of very
    carefully crafted datasets, and that is a complex and costly endeavor to put into
    place. Whereas, if you flip the paradigm around, everyone is able to contribute
    their personal data, healthcare data, or data that is only secondarily related
    to their health. You could contribute data from, for example, smartphone applications
    that receive requests from a clinical trial project. In this example, the project
    would be just using your data and not transferring your data, or owning your data,
    or being aware of its content while it’s being used. It is only giving the project/party
    permission to use it. That party cannot see it, doesn’t know what it is, and is
    never going to know what it is. This will create an incentive to come back and
    request more data to be used—and only that which is needed—instead of accumulating
    and stashing all of the data somewhere on an infrastructure—maybe securely and
    maybe not—with the hope of potentially using it someday.


    We are shifting away from the old logic, which goes something like this:


    - You can rarely monetize your data.

    - Monetizing your data requires that you literally sell your data once and for
    all.

    - Use of your data involves creating a whole new copy.


    So, what we are discussing here with all this decentralization business is switching
    from data selling to data lending/leasing, and only providing the key elements.


    Along with privacy-in-depth, there’s one other important aspect, and that’s the
    notion of secure inference. Inference is the function of a machine learning model
    making a prediction. After a model has been trained and is doing what it’s meant
    to do, it is theoretically making a prediction that might guide clinical decision
    making. It might guide patient behavior. It might guide access to care. It might
    guide anything where these technologies are implemented in our industry.


    ## Conclusion


    The combination of blockchain, decentralized AI, and privacy-in-depth is the data
    holy grail that has been missing from the fragmented, firewalled, and siloed systems
    that are currently in place in healthcare. We can free up more data for research
    and evidence-based medicine, get more expert eyes on all aspects of health, and
    allow more access to data without sharing and copying that data endlessly. This
    will allow more medical discovery and improved health outcomes without the exposure
    of people’s personal data and the risk of massive hacks and data breaches. When
    you layer these three areas of emerging technology together, you now have the
    complete technology stack that is both necessary and sufficient for the needs
    of the healthcare industry.'
