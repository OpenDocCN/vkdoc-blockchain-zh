  trans: '

    # 识别并构建适当的 MVP


    识别并构建适当的 MVP 可能极具挑战性。史蒂夫·布兰克在博客上分享了一个绝佳案例，说明这项任务有多困难且容易产生误导：


    > 我在斯坦福大学遇到一家小型初创公司，他们想用搭载[高光谱相机](http://www.microimages.com/documentation/Tutorials/hyprspec.pdf)的无人机在农田上空飞行，采集[高光谱图像](http://en.wikipedia.org/wiki/Hyperspectral_imaging)。这些图像能够告诉农民：作物长势如何、是否存在病虫害、肥料是否充足、水分是否足够。（相机的分辨率足以看清每株植物。）掌握这些信息意味着农场可以更准确地预测田地产量、决定是否需要对特定区域进行虫害治理，并且只在需要的地方施用水肥。

    >

    > （无人机比卫星更有优势，因为分辨率更高，且能更频繁地飞越农田；同时因为成本更低，也比飞机更有优势。）

    >

    > 所有这些信息都将帮助农民提高产量（增加收入），并通过仅在需要的地方施用减少用水和化肥/化学品的使用，从而降低成本。

    >

    > 他们的计划是成为一项名为"[精准农业](http://en.wikipedia.org/wiki/Precision_agriculture)"的新兴业务中的数据服务提供商。他们将每周前往农民的田地，操作无人机飞行、采集并处理数据，然后以易于理解的形式将数据提供给农民。


    ## 在农场进行客户探索


    > 我不知道斯坦福大学是怎么回事，但这已经是我在精准农业领域看到的第四或第五家使用无人机、[机器人](http://bluerivert.com)、高科技传感器等的初创公司了。当他们说"让我们给您讲讲我们与潜在客户的对话"时，这家团队引起了我的注意。我认真听着他们描述客户访谈的过程，似乎他们发现——是的，农民确实认识到无法详细了解田间情况是个问题——而且——理论上，拥有这样的数据确实很棒。

    >

    > 于是团队断定，这感觉像是一个他们想要真正去做的生意。而现在他们正在筹集资金，以构建一个原型最小可行产品。一切都很好。聪明团队，真正的高光谱成像、无人机设计领域专家，客户探索起步良好，并开始思考产品/市场契合度等等。


    ## 精益不是工程流程


    > 他们向我展示了下一步的目标和预算。他们想要的是，找到一位能够认识到数据价值、并愿意成为产品布道者的早期满意客户。这是个很棒的目标。

    >

    > 他们得出结论：获得早期满意客户的唯一途径，就是构建一个最小可行产品。他们认为 MVP 需要：1) 演示无人机飞行，2) 确保软件能将所有田块图像拼接在一起，3)
    以农民能使用的方式向他们呈现数据。

    >

    > 他们合乎逻辑地推断，实现这一目标的方法是购买一架无人机、购买一台[高光谱相机](http://www.spectralcameras.com/aisa)、购买图像处理软件、花费数月工程时间集成相机、平台和软件等等。他们向我展示了完成这一切的底限预算。非常合乎逻辑。

    >

    > 但这是错误的。


    ## 聚焦核心目标


    > 团队混淆了 MVP 的目标（看看能否找到愿意为数据付费的满意农民）与实现目标的过程。他们目标正确，但用来测试目标的 MVP 却是错误的。原因如下：

    >

    > 团队的假设是：他们能够提供农民愿意付费的可执行数据。仅此而已。既然这家初创公司将自身定位为数据服务公司，那么归根结底，只要数据能及时提供信息，农民根本不在乎这些数据是来自卫星、飞机、无人机还是魔法。

    >

    > 这意味着，所有关于购买无人机、相机、软件以及花时间整合这些资源的工作，都是在浪费时间和精力——在现阶段如此。他们根本还不需要测试这些。（[低成本无人机能够搭载相机](http://www.dji-innovations.com/)已有大量实例证明。）他们定义错了应该优先测试的
    MVP。他们需要花时间做的，首先是测试农民是否在意这些数据。

    >

    > 于是我问道："租一台相机和一架飞机或直升机，飞越农田，手工处理数据，然后看看农民是否愿意为此付费——这样是不是更便宜？难道你不能在一两天内，用你预算十分之一的钱完成这件事吗？"


    ## 说明


    本文摘自史蒂夫·布兰克的博客，在此分享是为了说明策划定义 MVP 所需阶段的重要性。错误的 MVP 将消耗更多资源，并产生无法直接验证你的假设的无关数据。另一方面，一个恰当构建的
    MVP 将使你能够快速验证核心假设，而无需动用大量资源。


    这里讨论的精益原则，描述了产品如何通过多个阶段逐渐、迭代地成熟并捕获市场。产品-市场契合度是所有阶段中最重要的，组织理论家杰弗里·摩尔将其描述为产品必须跨越的一道鸿沟，才能进入大规模采用阶段。图
    10-1 总结了产品可以捕获的不同客户细分阶段。我们在此简要回顾其中的五个：


    - **创新者：** 这个细分群体由高级用户组成——这类客户具有一定背景，并在产品所属垂直领域拥有有限的专业知识。财务稳健是该群体的关键特征，低风险承受能力使他们能够采用最终可能失败的技术，而稳定的财务资源有助于吸收失败。这类客户渴望尝试新产品，并能提供宝贵的技术见解，因为他们与新产品能否成功息息相关。


    - **早期采用者：** 这个细分群体与创新者联系紧密，拥有最高的社会资本来影响公众舆论。他们在采用新技术时更为审慎，并利用这一地位表明对新兴趋势的信心。早期采用者在帮助产品吸引更广泛受众、实现产品-市场契合度方面发挥着巨大作用。


    - **鸿沟：** 大量初创企业失败，从未跨越这道鸿沟。它们开发的产品始终未能实现产品-市场契合度，最终初创公司耗尽资金。成功跨越鸿沟的公司则已准备好进入主流市场。


    - **早期大众：** 这是主流务实消费者的第一个细分群体。尽管在这个层面上投入的社会资本较少，但口碑有助于产品广泛传播。


    - **晚期大众：** 这个细分群体对创新持高度怀疑态度。较低的财务稳健性是其主要特征，虽然接受得晚，但新产品的采用仍会在社会平均水平成员之后很久才发生。

    '
- fmt: 'There are two sides of applying lean principles. The first is an entrepreneur
    building out a product from scratch based on lean and customer-discovery methodology,
    and the second is an entrepreneur within a large organization trying to spin out
    a smaller company with potential resources and support for innovation. These two
    scenarios are drastically different in terms of resource allocation; however,
    the goal for a starting point is building an `MVP`. This should be done in such
    a way that minimizes resources used, and therefore not be a cost-prohibitive experiment.
    Both examples also have varying degrees of flexibility in terms of how an entrepreneur
    operates and the culture of the larger organization. The core principles involving
    iterations of `MVP`s and customer interviews remain the same in both scenarios.


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig1_HTML.jpg](images/430562_2_En_10_Chapter/430562_2_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Chasm of product-market fit and customer segments. This figure was originally
    illustrated by Shah Mohammed from Prototypr


    ## Business-Model Canvas


    Alexander Osterwalder, a Swiss business theorist and entrepreneur, examined the
    structure of hundreds of companies and discovered that every company could be
    broken down into a model of nine basic components. To that end, new startups can
    be built following lean methodologies that take the form of a canvas with these
    nine components, called a business-model canvas. The idea is to work on a one-page
    canvas, frequently updating hypotheses about your business/product, and use customer
    interviews to fill out the nine components. This is opposed to the traditional
    model of creating lengthy business plans with projections on key metrics and user
    adoption without any validation from the customer. The canvas has two sides: the
    left side focuses on your product/business and the right side focuses on the customer.
    The two sides converge on the value propositions, defined as the key points of
    value provided to the customer by your business or product. Let us go over each
    of the nine components here, followed by a visual representation of the business-model
    canvas in Figure [10-2](#430562_2_En_10_Chapter.xhtml#Fig2):


    - **Customer segments:** This section lists the personas or archetypes of customers
    who will buy your product. In addition, this section should address the reasons
    why customers would want to buy from your company specifically. As such, it is
    your responsibility to interview customers belonging to each archetype and record
    how they interact with your products.


    - **Value propositions:** This section contains the pain points that your customer
    is experiencing. Often times, the customer will try to solve a particular problem
    on their own with a patched-up solution. This method is usually inconvenient for
    a user, a “headache,” so to speak, but a major source of value for the entrepreneur.
    Building a simpler process to solve that very problem will serve as an instant
    “painkiller” and help your product appeal to the masses easier.


    - **Channels:** This section defines the medium that you can use to communicate
    your value propositions to customers, make new sales, and obtain customer feedback
    from each of your customer segments. The output of this section is connecting
    each persona with the appropriate channel to reach them.


    - **Customer relationships:** This section describes how you will interact with
    your customers and how your customers can reach you. This can be done through
    social media accounts, dedicated personal service, or forum communities.


    - **Key activities:** The section represents the work you must perform to interact
    with your customers to deliver your value proposition. You need to create a list
    of key activities linked to your value proposition. It may include product distribution,
    research and development, strategy, etc.


    - **Key resources:** The assets needed to build your value proposition and deliver
    it to your customers. This includes any equipment, software, and intellectual
    property in terms of proprietary knowledge, maintaining good relationships with
    your customers, and defining potential new revenue streams. The key resources
    should be mapped to your key activities in order to provide a clear roadmap of
    how to create value for your customers.


    - **Key partnerships:** The key external actors that you need to rely on for carrying
    out all of the key activities. Without these partnerships, you will not be able
    to deliver on your value propositions. The output from this section is a list
    of partners and how they tie into your key activities.


    - **Revenue streams:** The core financial feature covered by the business-model
    canvas, answering a simple question of how your business will generate revenue.
    Traditional startups rely on three key revenue streams, including product sale,
    subscription fees, or licensing. Most blockchain companies have used the subscription
    fee model with a free tier, which allows users to try the platform before using
    it for any serious projects. The output of this section is to link customer segments
    with a potential revenue stream through value propositions.


    - **Cost structure:** This section lists all the costs associated with keeping
    your startup running. Additionally, with careful planning, this section can help
    track the key activities or resources that are most expensive.


    These nine components are arranged on the business-model canvas, split into a
    left side and a right side, as shown in Figure [10-1](#430562_2_En_10_Chapter.xhtml#Fig1),
    connected by the value propositions.


    ![../images/430562_2_En_10_Chapter/430562_2_En_10_Fig2_HTML.jpg](images/430562_2_En_10_Chapter/430562_2_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Overview of business-model canvas with nine core components, taken from Strategyzer'
