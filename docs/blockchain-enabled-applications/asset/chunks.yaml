- fmt: '在`Figure [3-5](#430562_2_En_3_Chapter.xhtml#Fig5)`中，最底层由交易构成，总体思路是不断将两个元素进行哈希运算，并保留下一层的部分信息。最终，我们仅剩下两个元素，它们被哈希在一起形成`Merkle`根。那么，何时搜索交易会有所帮助呢？对于刚开始使用标准`Bitcoin`钱包客户端的新用户，每个用户都必须下载整个区块链。随着时间的推移，区块链的下载量不断增加，最近已达到数千兆字节。这可能会吓到新用户，因为他们无法在区块链下载完成前使用钱包，从而可能打消其积极性。为了解决必须下载包含历史交易的臃肿区块链的问题，`Satoshi`提出了一种名为简单支付验证（`SPV`）的解决方案。`SPV`的原理是创建一个钱包客户端，只下载区块头而非整个区块链。这种新型轻量级客户端可以利用区块头中的`Merkle`根来验证特定交易是否存在于某个区块中。其精确机制要求钱包依赖`Merkle`分支，并最终定位到具体交易，这与`Figure
    [3-6](#430562_2_En_3_Chapter.xhtml#Fig6)`中所示的示例非常相似。目前，对于`Bitcoin`，有一种名为`Electrum`的替代钱包客户端实现了`SPV`，允许新用户免去下载整个区块链的麻烦。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig6_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig6_HTML.jpg)


    图3-6：使用`Merkle`根查找交易


    在`Figure [3-6](#430562_2_En_3_Chapter.xhtml#Fig6)`中，根使我们能够在搜索过程中跳过一半的树，而下一层则进一步缩小搜索范围。使用`Merkle`根，我们只需三步即可找到交易，这在当前的`Bitcoin`网络上实现了极高的操作效率。到达交易6的路径也被称为`Merkle`分支——它连接了根与叶节点。


    ## 区块链分叉


    这里有一个有趣的情景需要考虑：多个矿工正竞争解决工作量证明（`PoW`）并创建区块。巧合的是，两名矿工在几秒钟内相继找到了一个有效哈希，并将区块广播到网络。接下来会发生什么？这种情况被称为分叉，这是`Bitcoin`网络中完全正常的事件，尤其是在网络规模扩大并包含数千名矿工时。为了解决分叉，网络上存在一些称为共识规则的规则。平局会创建出区块链的两个版本，当下一个区块被发现时，这个平局会被打破。一些节点（`peers`）会在区块链的一个版本上工作，而其他节点则在第二个版本上工作。当下一个区块被发现时，由于包含了这个新区块，其中一条链会变得更长。这条链随即成为活跃链，所有节点将汇聚到这条新链上。这个过程如图`Figure
    [3-7](#430562_2_En_3_Chapter.xhtml#Fig7)`所示。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig7_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig7_HTML.jpg)


    图3-7：链上的分叉


    在`Figure [3-7](#430562_2_En_3_Chapter.xhtml#Fig7)`所示的示例中，区块4被两名矿工同时发现，但当下一个区块在分支B上被发现时，平局得以解决。该分支随即成为活跃链，所有节点汇聚到使用分支B作为新的活跃链。区块链上的普通分叉并不可怕，因为它们通常会在几分钟内解决。但软分叉和硬分叉则完全是另一回事。这些可能发生在`Bitcoin`核心代码升级时，此时未升级的节点（无法验证任何新创建的区块）与已升级并开始遵循新共识规则创建区块的节点之间会发生永久性分裂。网络上开始出现两种完全不同的区块，网络无法汇聚到单一的活跃链上，直到所有节点都升级到新规则为止。


    在这种情况下，有两种可能的结果：一种是网络中的大部分节点切换到新规则（软分叉），新规则允许沿用部分有效的旧区块。或者，第二种情况是，旧区块对新区块来说仍然无效，新区块不接收网络上的任何旧区块。这就是硬分叉，不存在向前兼容性，旧区块将不再被新区块所接受。所有矿工和节点都必须升级到新软件，以便其区块在新规则下被视为有效。硬分叉可能引发混乱，并对那些已创建依赖旧规则进行交易的处理终端和接口的用户和商家造成问题。他们必须升级后端软件，以兼容新规则，并确保新比特币的顺利接收。然而，`Bitcoin`网络近期不会进行硬分叉，因为开发者们已经开始研究这一过程的复杂性。我们在此结束对区块链分叉的讨论，但很快就会再次回到这个话题。在接下来的章节中，我们将研究在下一代`Bitcoin`协议中，硬分叉可能在哪些情况下变得必要。


    ### 总结


    在本章中，我们将挖矿的概念整合到了整个区块链网络中。我们描述了什么是区块链以及它在技术层面是如何运作的。然后，我们描述了交易的流程以及追踪未花费交易输出。我们讨论了交易是如何被组装并在区块链上传播的，以及诸如钱包和挖矿客户端等挖矿软件。之后，我们将挖矿置于一个恰当的网络环境中，展示了交易从被包含在一个区块中到被传播的过程。接着，我们讨论了`SPV`的概念以及`Merkle`哈希和根在`Bitcoin`中的重要性。我们以讨论区块链分叉及其对网络的影响结束了本章，我们将在本书后面重新讨论这个主题。'
  raw: 'In Figure [3-5](#430562_2_En_3_Chapter.xhtml#Fig5), the lowest level is formed
    from the transactions, and the general idea is to keep hashing two elements together
    and retain some information about the level below. Ultimately, we are left with
    only two elements that are hashed together to form the Merkle root. So, when would
    searching for a transaction be helpful? For new users to get started with the
    standard Bitcoin wallet-client, every user has to download the entire blockchain.
    Over time, the blockchain has increased in download size and recently reached
    a few gigabytes. This can be intimidating to new users, who can’t use their wallets
    until the blockchain download has finished, and it might turn them away. To solve
    the problem of having to download a bloated blockchain with historic transactions,
    Satoshi came up with a solution called Simple Payment Verification (SPV). The
    rationale in SPV is to create a wallet client that only downloads the block headers
    instead of the entire blockchain. This new lightweight client can use the Merkle
    root in the block headers to verify if a particular transaction resides in a given
    block. The precise mechanism requires the wallet to rely on a Merkle branch and
    reach the specific transaction, much like the example shown in Figure [3-6](#430562_2_En_3_Chapter.xhtml#Fig6).
    Currently, for Bitcoin, there is an alternative wallet client known as Electrum
    that implements SPV and allows new users to avoid the hassle of downloading the
    entire blockchain.


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig6_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Finding a transaction using the Merkle root


    In Figure [3-6](#430562_2_En_3_Chapter.xhtml#Fig6), the root allows us to skip
    half of the tree during our search, and the next level narrows down the search
    even further. Using the Merkle root, we can reach the transaction in just three
    steps, which allows for very high operational efficiency that we need on the current
    Bitcoin network. The path to reaching transaction 6 is also known as a Merkle
    branch—connecting the root to a leaf.


    ## Blockchain Forks


    Here’s an interesting scenario to consider: Several miners are competing to solve
    the PoW and create a block. Incidentally, two miners find a valid hash within
    just a few seconds of each other and broadcast the blocks to the network. What
    happens now? This situation is known as a fork, and this is a completely normal
    occurrence on the Bitcoin network, especially as the network starts to scale and
    includes thousands of miners. To resolve the fork, there are a few rules in place
    on the network called the consensus rules. The tie creates two versions of the
    blockchain, and this tie is resolved when the next block is discovered. Some of
    the peers will be working on one version of the blockchain, and others work on
    the second version. When the next block is discovered, one of the chains will
    become longer due to the inclusion of this new block. This chain now becomes the
    active chain and the nodes will converge to the new chain. This process is visually
    illustrated in Figure [3-7](#430562_2_En_3_Chapter.xhtml#Fig7).


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig7_HTML.jpg](images/430562_2_En_3_Chapter/430562_2_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Fork in the chain


    In the example shown in Figure [3-7](#430562_2_En_3_Chapter.xhtml#Fig7), block
    4 is discovered at the same time by two miners, but the tie is resolved when the
    next block is discovered on Branch B. This branch now becomes the active chain,
    and all the nodes converge to using Branch B as the new active chain. Normal forks
    on the blockchain are not a concerning event, because they are usually resolved
    within a matter of minutes. But soft and hard forks are an entirely different
    matter. These can occur in the case of upgrades to the Bitcoin core code, where
    a permanent split happens between non-upgraded nodes that can’t validate any newly
    created blocks and upgraded nodes that have begun creating blocks following the
    new consensus rules. Two entirely different types of blocks being to appear on
    the network, and the network is unable to converge on a single active chain until
    the nodes are upgraded to the new rules.


    In this case, there are two possible outcomes: in one, the majority of the network
    switches over to the new rules (a soft fork), and the new rules allow for the
    carryover of some portion of the valid old blocks. Or, the second alternative
    is that the old blocks remain invalid for the new nodes, and no old blocks are
    accepted in the network by the new nodes. This is a hard fork, where no forward
    compatibility exists and the old blocks will no longer be accepted by the new
    nodes. All the miners and nodes have to upgrade to the new software so that their
    blocks can be considered valid under the new rules. A hard fork can be chaotic
    and a problem for users and merchants that have created payment terminals and
    interfaces relying on the old rules for transactions. They have to upgrade their
    backend software in order to be compatible with the new rules and ensure the smooth
    transition of incoming Bitcoins. A hard fork is not upcoming for the Bitcoin network,
    however, as developers have begun researching just how complex the process might
    be. We will end our discussion of blockchain forks here, but we will return to
    it soon. In the next chapters, we will take a look at circumstances where a hard
    fork may become necessary in the next generation of Bitcoin protocols.


    ### Summary


    In this chapter, we integrated the concept of mining into the whole blockchain
    network. We described what a blockchain is and how it functions at a technical
    level. Then, we described the workflow of a transaction and tracking unspent transaction
    outputs. We talked about how transactions are put together and propagated on the
    blockchain and also mining software such as a wallet and mining client. Then,
    we put mining in the context of a proper network and showed how a transaction
    goes from being included in a block to being propagated. After that, we talked
    about the concept of SPV and the importance of Merkle hashes and roots in Bitcoin.
    We ended the chapter with a discussion of blockchain forks and how they influence
    the network, a topic we will revisit later in the book.'
  trans: '在`Figure 3-5`中，最底层由交易构成，总体思路是不断将两个元素进行哈希运算，并保留下一层的部分信息。最终，我们仅剩下两个元素，它们被哈希在一起形成`Merkle`根。那么，何时搜索交易会有所帮助呢？对于刚开始使用标准`Bitcoin`钱包客户端的新用户，每个用户都必须下载整个区块链。随着时间的推移，区块链的下载量不断增加，最近已达到数千兆字节。这可能会吓到新用户，因为他们无法在区块链下载完成前使用钱包，从而可能打消其积极性。为了解决必须下载包含历史交易的臃肿区块链的问题，`Satoshi`提出了一种名为简单支付验证（`SPV`）的解决方案。`SPV`的原理是创建一个钱包客户端，只下载区块头而非整个区块链。这种新型轻量级客户端可以利用区块头中的`Merkle`根来验证特定交易是否存在于某个区块中。其精确机制要求钱包依赖`Merkle`分支，并最终定位到具体交易，这与`Figure
    3-6`中所示的示例非常相似。目前，对于`Bitcoin`，有一种名为`Electrum`的替代钱包客户端实现了`SPV`，允许新用户免去下载整个区块链的麻烦。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig6_HTML.jpg](img/430562_2_En_3_Fig6_HTML.jpg)


    图 3-6：使用`Merkle`根查找交易


    在`Figure 3-6`中，根使我们能够在搜索过程中跳过一半的树，而下一层则进一步缩小搜索范围。使用`Merkle`根，我们只需三步即可找到交易，这在当前的`Bitcoin`网络上实现了极高的操作效率。到达交易
    6 的路径也被称为`Merkle`分支——它连接了根与叶节点。


    ## 区块链分叉


    这里有一个有趣的情景需要考虑：多个矿工正竞争解决工作量证明（`PoW`）并创建区块。巧合的是，两名矿工在几秒钟内相继找到了一个有效哈希，并将区块广播到网络。接下来会发生什么？这种情况被称为分叉，这是`Bitcoin`网络中完全正常的事件，尤其是在网络规模扩大并包含数千名矿工时。为了解决分叉，网络上存在一些称为共识规则的规则。平局会创建出区块链的两个版本，当下一个区块被发现时，这个平局会被打破。一些节点（`peers`）会在区块链的一个版本上工作，而其他节点则在第二个版本上工作。当下一个区块被发现时，由于包含了这个新区块，其中一条链会变得更长。这条链随即成为活跃链，所有节点将汇聚到这条新链上。这个过程如图`Figure
    3-7`所示。


    ![../images/430562_2_En_3_Chapter/430562_2_En_3_Fig7_HTML.jpg](img/430562_2_En_3_Fig7_HTML.jpg)


    图 3-7：链上的分叉


    在`Figure 3-7`所示的示例中，区块 4 被两名矿工同时发现，但当下一个区块在分支 B 上被发现时，平局得以解决。该分支随即成为活跃链，所有节点汇聚到使用分支
    B 作为新的活跃链。区块链上的普通分叉并不可怕，因为它们通常会在几分钟内解决。但软分叉和硬分叉则完全是另一回事。这些可能发生在`Bitcoin`核心代码升级时，此时未升级的节点（无法验证任何新创建的区块）与已升级并开始遵循新共识规则创建区块的节点之间会发生永久性分裂。网络上开始出现两种完全不同的区块，网络无法汇聚到单一的活跃链上，直到所有节点都升级到新规则为止。


    在这种情况下，有两种可能的结果：一种是网络中的大部分节点切换到新规则（软分叉），新规则允许沿用部分有效的旧区块。或者，第二种情况是，旧区块对新区块来说仍然无效，新区块不接收网络上的任何旧区块。这就是硬分叉，不存在向前兼容性，旧区块将不再被新区块所接受。所有矿工和节点都必须升级到新软件，以便其区块在新规则下被视为有效。硬分叉可能引发混乱，并对那些已创建依赖旧规则进行交易的处理终端和接口的用户和商家造成问题。他们必须升级后端软件，以兼容新规则，并确保新比特币的顺利接收。然而，`Bitcoin`网络近期不会进行硬分叉，因为开发者们已经开始研究这一过程的复杂性。我们在此结束对区块链分叉的讨论，但很快就会再次回到这个话题。在接下来的章节中，我们将研究在下一代`Bitcoin`协议中，硬分叉可能在哪些情况下变得必要。


    ### 总结


    在本章中，我们将挖矿的概念整合到了整个区块链网络中。我们描述了什么是区块链以及它在技术层面是如何运作的。然后，我们描述了交易的流程以及追踪未花费交易输出。我们讨论了交易是如何被组装并在区块链上传播的，以及诸如钱包和挖矿客户端等挖矿软件。之后，我们将挖矿置于一个恰当的网络环境中，展示了交易从被包含在一个区块中到被传播的过程。接着，我们讨论了`SPV`的概念以及`Merkle`哈希和根在`Bitcoin`中的重要性。我们以讨论区块链分叉及其对网络的影响结束了本章，我们将在本书后面重新讨论这个主题。'
- fmt: '# 4. Unpacking Ethereum


    Ethereum is an open source, decentralized blockchain platform with computational
    capabilities that reconstruct an elementary currency exchange into a transfer
    of value between users via a scripting language. Ethereum is widely recognized
    as a successor to the Bitcoin protocol, generalizing the original ideas and enabling
    a more diverse array of applications to be built on top of the blockchain technology.
    Ethereum has two essential components. First, there is a Turing-complete virtual
    processor that can calculate the necessary computational resources and execute
    scripts called the Ethereum Virtual Machine (`EVM`). The second component is a
    token of value called ether, which is the currency of the network and is used
    for user-to-user transactions or compensation to miners of the network. In this
    chapter, we begin our journey with an overview of Ethereum’s architecture in comparison
    to Bitcoin, focusing on the `EVM` and Turing-completeness properties. Following
    the architecture section, there is a short discussion of the accounts model in
    Ethereum and account representation with Merkle-Patricia Trees. This will lead
    us to the topics of global state representation in Ethereum, account storage,
    and gas, which is a spam-prevention mechanism in the network. Then, we deconstruct
    the notion of a smart contract enabled by `EVM`, the security concerns revolving
    around sandboxing executable code, and how the `EVM` pushes executable code (bytecode)
    to the blockchain. After that, we provide an introduction to Solidity and Vyper,
    two programming languages used for writing smart contracts in Ethereum. We explore
    the syntax of Solidity and Vyper, as well as the popular integrated development
    environments (`IDEs`) being used, and provide a brief list of key developer resources.
    Next, we focus on the World Computer model proposed in Ethereum and introduce
    supporting decentralized technologies such as `IPFS` and `Whisper`. Then, we look
    at the state of decentralized apps (`DApps`) along the publishing platform called
    Mist available in Ethereum. This allows us to transition into talking about the
    Layer 2 updates to Ethereum—the major technical focus of this chapter and the
    Ethereum ecosystem in 2020. Finally, we conclude the chapter with a brief discussion
    of the enterprise side. Here, we introduce a particularly noteworthy development
    of Blockchain-as-a-Service (`BaaS`) deployed on the Azure cloud by Microsoft.


    ## Overview of Ethereum


    It was around mid-2013 when a majority of the Bitcoin community was starting to
    flirt with idea of applications beyond currency on the blockchain. Fairly soon,
    there was a flood of new ideas being discussed in online forums. A few popular
    examples included domain registration, asset insurance, voting, and even Internet
    of Things (`IoT`). After the hype started to fade away, a more serious analysis
    of the Bitcoin protocol revealed severe limitations of potential applications
    that can be built on top of the blockchain.


    A crucial point of debate was whether a full scripting language should be allowed
    on the blockchain, or whether we should build applications with logic residing
    outside of the blockchain. There were two key issues that sparked this debate:


    - The scripting language and OPCODES in the Bitcoin protocol were designed to
    be very limited in functionality.

    - The Bitcoin protocol itself was not generalizable. There were attempts; for
    instance, Namecoin was designed for one specific task (domain name registration).
    The big question at the time was: How can a protocol be generalized such that
    it becomes forward-compatible with future applications that we know nothing about?


    Eventually, two schools of thought emerged regarding scripting. Traditionally,
    Satoshi’s paper proposed to keep the scripting language very limited in functionality.
    This would avoid the security concerns of having executable code in the blockchain.
    In a sense, the blockchain’s executable code is limited to a handful of necessary
    primitives that update the distributed states. The second school of thought was
    championed by Vitalik Buterin, who thought of the blockchain as more than just
    a ledger. He envisioned the blockchain as a computational platform that could
    execute well-defined functions using contracts and arguments. This is made possible
    by the Ethereum Virtual Machine (`EVM`). The `EVM` allows for complete isolation
    of the executable code and safe execution of the applications built on the blockchain.
    We will return to discuss this at greater length later in the chapter. Let’s begin
    with the core design principle behind Ethereum.


    ### Core Idea


    Instead of building a blockchain platform to support specific applications, in
    Ethereum we will build a native programming language with extensibility to implement
    business logic on the blockchain platform using the language.


    We will return shortly to understand the implications of this principle. In the
    meantime, let’s talk about another distinguishing feature in Ethereum: the consensus
    algorithm. We discussed the concept of consensus in earlier chapters. In Proof-of-Work
    (`PoW`)–based cryptocurrencies such as Bitcoin, the network awards miners who
    solve cryptographic puzzles to validate transactions and mine new blocks. Ethereum
    proposes a different consensus algorithm called Proof-of-Stake (`PoS`). In a `PoS`
    algorithm, the validator/creator of the next block is chosen in a pseudo-random
    manner based on the stake that an account has in the network. Therefore, if you
    have a higher stake in the network, you have a higher chance of being selected
    as a validator. The validator will then “forge” the next block and get a reward
    from the network. Here, the validator is truly forging a block (in the blacksmith
    sense of the term) instead of mining, because in `PoS`, the idea of hardware-based
    mining is replaced by a virtual stake. One rationale behind using `PoS` was to
    circumvent the high power consumption and energy requirements of `PoW`-mining
    algorithms that translated to higher electricity bills and became a frequent complaint.
    Peercoin was the first cryptocurrency to launch with `PoS`; however, recently
    more prominent `PoS` implementations can be seen in ShadowCash, Nxt, and Qora.
    The main differences between Bitcoin and Ethereum as protocols are highlighted
    in Figure [4-1](#430562_2_En_4_Chapter.xhtml#Fig1).'
