  trans: '

    ### 状态通道


    状态通道是一种通用模型，用于思考区块链上发生但可以在不影响网络安全性的情况下转移至链下的交互。比特币中一个经过充分研究的状态通道实例是支付通道：双方之间即时、无摩擦的支付交易，无需等待比特币区块链上漫长的确认周期。广义而言，状态通道的概念可应用于区块链协议上任何改变状态的交互。在不削弱安全性的前提下，将部分交易或区块链交互转移至链下，可以显著提升网络速度。


    状态通道包含三个基本组件：


    - **锁定机制**：区块链状态的一部分通过多重签名智能合约锁定，使得特定的一组用户必须完全同意该合约才能更新它。

    - **链下操作**：链下用户通过签署交易并构建可提交至主区块链的区块来更新本地状态。这些交易在支付状态通道中聚合并本地更新。

    - **解锁机制**：参与者将支付通道的聚合状态提交至区块链，若满足合约条件，则根据第一步在区块链上解锁该状态。


    在此，第一和第三组件用于锁定和解锁全局状态的一个分区，被视为区块链操作。然而，第二组件可以完全在链下完成，并可能涉及大量交易/更新。这些更新可以快速进行，并在支付通道上保持内部一致性，而无需涉及区块链。这一步提供了可扩展性和巨大的性能优势。通过这种方式，只有第一和第三步需要发布到网络并在区块链上确认。中间的交易则可以在状态通道上以更快的速度执行。


    ### Plasma


    `Plasma` 是一个框架，用于在链下进行交易，同时利用以太坊区块链的共识和安全机制来同步这些交易。`Plasma` 链是部分独立的子链，它们注册到以太坊主区块链上。这些子链可以将交易批量提交至以太坊主区块链。通过这种方式，主区块链对计算能力的部分交易需求得以缓解。节点现在可以将这些计算能力用于合约和其他更高层次的任务。`Plasma`
    更进一步扩展了支付通道的概念，允许创建依附于以太坊主区块链的子区块链。这些子链又可以衍生出更多的子链。本质上，`Plasma` 是一个框架，用于链接到一条主区块链（此处是以太坊区块链）的多条分支区块链。


    在安全性方面，基于 plasma 的链依赖以太坊主区块链来实现共识和一致性机制。用户可以依赖以太坊网络所提出的安全措施，来赎回在子链上决定的任何资产。`Plasma`
    链使用 `MapReduce` 结合默克尔树结构来确保交易验证并检测欺诈。此外，在 plasma 链中持有权益的成员会进行自我监管和监控。如果出现任何争议，他们可以向以太坊主区块链提交时间戳或恶意行为证明以供解决。`Plasma`
    链还包含另一种防欺诈机制，称为回滚。当双花类活动导致支付或交易失败时，该功能会被激活。当此功能激活时，所有资金都会恢复到网络在试图欺诈之前的状态。在提议的实现中，对于父级以太坊区块链而言，回滚过程在计算上非常廉价，并能提供巨大的安全性。


    ## 区块链即服务


    微软近期宣布与以太坊基金会合作，在其云平台 `Azure` 上推出基于区块链的服务。这种采用基础设施即服务的方式来提供快速简便的区块链实现，将使开发者能够以更低的成本试验新功能并部署
    `DApps`。来自 `Azure` 区块链工程团队的 Marley Grey 描述了 `区块链即服务`（`BaaS`）将如何培育一个 `DApps` 生态系统：


    > *微软和 ConsenSys 正在合作，在 Microsoft Azure 上提供* *以太坊区块链即服务 (E-BaaS)* *，使企业客户和开发者能够拥有一个一键式的云端区块链开发者环境。初始产品包含两个工具，支持基于智能合约的应用的快速开发：Ether.Camp——一个集成的开发者环境，以及
    BlockApps——一个私有的、半私有的以太坊区块链环境，可部署到公共以太坊环境中。*

    >

    > *“由 Microsoft Azure 和 ConsenSys 提供的以太坊区块链即服务”允许金融服务客户和合作伙伴在一个现成的开发/测试/生产环境中低成本地进行试验、学习和快速失败。它将使他们能够利用行业领先的框架非常快速地创建私有、公有和联盟链环境，并通过
    Azure 的全球分布式（私有）平台分发他们的区块链产品。这使得 Azure 成为区块链应用的极佳开发/测试/生产环境。周边的功能如 Cortana 分析（机器学习）、Power
    BI、Azure Active Directory、O365 和 CRMOL 可以集成到应用中，从而催生新一代去中心化的跨平台应用。*


    关于 `BaaS` 的初步更新是在 2015 年底提供的，目前，一个完整的区块链实验室生态系统正在 `Azure DevTest` 社区中蓬勃发展。`DevTest
    Labs` 允许用户和开发者探索并测试为特定用例设计的模板。此外，该平台最初从以太坊区块链起步，但最近有更多初创公司开始基于 `Azure` 进行构建，提供诸如
    `Emercoin` 的新服务（它提供了 `SSH` 服务），以及 `PokiDot` 及其面向医疗保健的区块链 `Dokchain`。随着时间的推移，越来越多的初创公司将
    `Azure` 作为运行区块链并在其上构建应用的标准。随着诸如 `Cortana` 等智能服务的集成，开发能够签署来自外部数据流（如物联网设备）的输入数据并提供一定完整性级别的预言机可能会变得更加容易。


    **注意**


    微软在 `BaaS` 领域的两项进展在此值得关注。第一项是引入了 `Cryptlets`，这是一种用于与外部事件交互以构建企业级智能合约的安全中间件。第二项进展是
    `Coco` 框架，这是一个用于在区块链之上构建高吞吐量网络的开源系统，其中的节点和参与者被明确声明和控制。根据设计，`Coco` 与任何账本协议兼容，并允许企业构建生产就绪的区块链网络。关于微软平台的更多内容将在后续章节中介绍。

    '
- fmt: '## Decentralized Applications


    We alluded to decentralized applications (or DApps) in our discussion of Whisper,
    but we will talk about them in more depth here. A decentralized app is a serverless
    application that runs on the Ethereum stack and interfaces with the end user via
    an HTML/JavaScript frontend that can make calls to the backend stack. Classically,
    a mobile or web app has a backend running on centralized dedicated servers; however,
    a DApp has its backend code running on a decentralized peer-to-peer network. A
    simplistic model of how a DApp operates on the blockchain is shown in Figure [4-7](#430562_2_En_4_Chapter.xhtml#Fig7).


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig7_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig7_HTML.jpg)


    Figure 4-7. Structure of a DApp


    As seen in Figure [4-7](#430562_2_En_4_Chapter.xhtml#Fig7), the user interface
    is often written in HTML or JavaScript and is the only component loaded on a user
    device. The interface makes backend calls to the blockchain in order to execute
    a particular contract and also to the backend resources such as Swarm or Whisper
    if external storage is needed or when the application needs to communicate with
    other apps. If a traditional app comprises a frontend and a server running the
    backend, then a DApp running on the Ethereum stack would be made from a frontend
    and contracts running on the blockchain. DApps usually have their own set of associated
    contracts on the blockchain that are used to encode business logic and allow persistent
    storage of their consensus-critical state. Recall that all code on the Ethereum
    stack runs within an `EVM`, which keeps track of step-by-step operations and charges
    gas to the owner of a contract. This prevents DApp developers from running too
    many operations on the blockchain or bloating it by storing data directly on the
    blockchain.


    **Note:** To briefly review, the DApp stack relies on decentralized storage (provided
    by Swarm-like architecture) for user data or app data, on the blockchain for contract
    logic and transactional operations, and on the frontend for the end user. The
    frontend interface makes calls to the blockchain to specific contracts running
    the decentralized application based on user actions.


    How does the backend of a DApp pull static content for the frontend, such as JS
    from the Ethereum stack to static content and receive the updated global state
    from the blockchain? Let’s look at an example using IPFS as storage to understand
    these backend calls (Figure [4-8](#430562_2_En_4_Chapter.xhtml#Fig8)):


    ![../images/430562_2_En_4_Chapter/430562_2_En_4_Fig8_HTML.jpg](images/430562_2_En_4_Chapter/430562_2_En_4_Fig8_HTML.jpg)


    Figure 4-8. A simple schematic of backend calls made by a DApp


    - The backend code is essentially a contract that executes on the blockchain given
    the appropriate amount of resources.

    - Some application needs to use a persistent database to host static content used
    in the app; we can rely on IPFS that stores static files, hosted throughout the
    network on several nodes.

    - Hashes from IPFS are delivered to the DApp, and the contract’s execution updates
    the global state, which is delivered to the DApp from the Ethereum stack.


    In Figure [4-8](#430562_2_En_4_Chapter.xhtml#Fig8), the blockchain can deposit
    content to an IPFS-like system on one of the nodes, and the hashes can be made
    available to the app for retrieval when necessary. The app can request updates
    from the blockchain on the global state as it affects the app running on a device.
    Finally, as needed, the app can retrieve and download the full content from the
    decentralized storage to the user device. Splitting up roles in this manner allows
    for more-innovative user interfaces as a developer can switch it out without having
    to change the backend at all.


    ### Geth and Mist


    There are two more tools we need to discuss briefly that play a role in DApp development.
    `Geth` is the command-line interface (written in Go-lang) for running a full node
    on the Ethereum network. Using `Geth`, you can interact with the Ethereum blockchain
    and perform tasks such as the following:


    - Mine ether on the network

    - Transfer funds between addresses

    - Create contracts and send transactions

    - Use the DApps API


    `Geth` comes with two interfaces that are used in development: the JavaScript
    console with `web3.js` library, and the `JSON-RPC` server. Let’s talk about both
    technologies briefly. `Geth` can be launched with an interactive console that
    provides the JS run-time environment for you to interact with a node. This run-time
    environment includes the `web3` library, which can construct contracts and transactions
    to be propagated to the node. The `JSON-RPC` server is a remote procedure call
    (RPC) protocol that facilitates data exchange between the node and its clients
    (JSON is a data-exchange format that nodes use to communicate with clients). More
    precisely, RPC is a collection of methods and rules that define how data (commands
    and output) can be transferred between a node and a client. The JavaScript API
    uses the `web3.js` library to offer a convenient interface for using the RPC methods.


    **Tip:** For most Ethereum applications today, `Geth` is a prerequisite for installation
    as a command-line tool. Often, during the installation, `Geth` is provided as
    an add-on so that a user doesn’t have to download and install it separately.


    `Mist` is the official Ethereum wallet application. In early discussions, `Mist`
    was conceptualized to be a standalone app store–type browser for DApps, but that
    vision has evolved. In order to interact with the Ethereum blockchain, we need
    a blockchain client like `Geth`. This client is responsible for broadcasting transactions
    to the network, mining ether, signing transactions and deploying smart contracts.
    Most end users are not comfortable with using a command-line interface, so a wrapper
    such as `Mist` was made to be the frontend interface. `Mist` connects to `Geth`
    in the background and serves as an interface for the wallet software to the user.
    Additionally, `Mist` provides an interface for writing and deploying smart contracts,
    or DApps. The wallet software integrates payments seamlessly for contract deployment.


    Eventually, the most powerful entities on the Ethereum network using `Geth` and
    `Mist` will be decentralized autonomous organizations (DAOs), which are essentially
    automated companies powered by smart contracts that run on the Ethereum network.
    We will end our journey of exploring Ethereum here and pick up our discussion
    of DAOs in the following chapter.


    ### Summary


    In this chapter, we introduced Ethereum, one of the biggest alternate currencies
    competing against Bitcoin. In recent years, it has gained a lot of attention from
    developers and investors. We began our discussion with a broad overview of what
    Ethereum is in comparison to Bitcoin. We talked about accounts and function calls
    as being foundational to Ethereum. We then provided some more depth to the ideas
    of accounts as entities on the blockchain. After that, we discussed the use of
    gas on Ethereum for smart contract execution, how internal storage is adapted
    to work with Merkle-Patricia trees, and the concept of internal state for an account.
    After that, we talked about `EVM` and how smart contracts are executed on the
    blockchain. Then, we discussed a model for writing smart contracts using Solidity
    and Vyper, along with developer resources to rapidly prototype smart contracts.
    This led to a discussion about the world computer model as it applies to Ethereum
    components such as IPFS and Whisper. Finally, the major technical focus of this
    chapter was the Layer 2 upgrades that are being rolled out for the Ethereum network.
    We ended the discussion with a short review of DApps and the Blockchain-as-a-Service
    model, which we will expand on in a later chapter.'
