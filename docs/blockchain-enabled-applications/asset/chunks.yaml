- fmt: "### Solidity and Vyper Programming Languages\n\n`Solidity` is a higher-level,\
    \ contract-oriented programming language for writing smart contracts in Ethereum.\
    \ Any code written in `Solidity` can be executed on the `EVM` after being compiled\
    \ into bytecode, which is an instruction set for the `EVM`. How does the bytecode\
    \ encode references to other functions and contracts that are called during execution?\
    \ This is done by using an Application Binary Interface (`ABI`). In general, an\
    \ `ABI` is the interface between two program modules: machine-level instructions\
    \ and a human-readable higher-level programming language. Let’s break down this\
    \ answer into three components:\n\n*   **Contract**: A contract is simply higher-level\
    \ code defined in a formal language such as `Solidity`.\n*   **Compiled contract**:\
    \ The contract is converted to bytecode to be executed on the Ethereum Virtual\
    \ Machine (`EVM`), adhering to the compiler’s specifications. Note that function\
    \ names and input parameters get hashed and obfuscated during compilation. Therefore,\
    \ for another account to call a function, it must have access to the given function\
    \ name and arguments, and we need another layer that interfaces encoding into\
    \ and out of the bytecode.\n*   **Application Binary Interface (`ABI`)**: An `ABI`\
    \ is a list of the contract’s function definition and arguments in JSON format.\
    \ The function definitions and input arguments are hashed into the `ABI`. This\
    \ is included in the data of a transaction and interpreted by the `EVM` at the\
    \ target account. An `ABI` is necessary so that you can specify which function\
    \ in the contract to invoke, as well as get a guarantee that the function will\
    \ return data in the format you are expecting.\n\n`Solidity` has a plugin available\
    \ for Visual Studio to help write smart contracts in a powerful IDE and deploy\
    \ them to the Ethereum network. Our discussion of `Solidity` here will not cover\
    \ advanced implementations or definitions. Instead, we will be limiting the upcoming\
    \ discussion to the fundamentals such as storing variables and creating a simple\
    \ contract. Let’s get started:\n\n```\n/* defining a contract */\ncontract ExampleStorage\
    \ {\n    uint storedNumber; //unsigned integer (uint) used to declare a state\
    \ variable\n    /* Function set can modify the value of the state variable */\n\
    \    function set(uint x) {\n        storedNumber = x;\n    }\n    /* Function\
    \ get can retrieve the value of state variable  */\n    function get() constant\
    \ returns (uint retVal) {\n        return storedData;\n    }\n}\n```\n\nThis storage\
    \ contract allows a user to store an integer as a state variable `storedNumber`\
    \ and then modify or retrieve its value using the `get()` and `set()` functions.\
    \ `Solidity` also offers several advanced features available in modern programming\
    \ languages, such as inheritance (for contracts), function overloading, and class\
    \ interfaces. Next, let’s look at a more complex example of a contract. This time\
    \ we will create a simple bank contract using `Solidity`:\n\n```\n// This bank\
    \ contract allows deposits, withdrawals, and checking the balance\n// 'contract'\
    \ is a keyword to declare class, similar to any other OOP\ncontract SimpleBank\
    \ {\n    // 'mapping' is a dictionary that maps address objects to balances\n\
    \    // 'private' means that other contracts can't directly query balances\n \
    \   mapping (address => uint) private balances;\n    // 'public' makes externally\
    \ readable by users or contracts on the blockchain\n    address public owner;\n\
    \    // Events trigger messages throughout the Ethereum network\n    event LogDepositMade(address\
    \ accountAddress, uint amount);\n    // Constructor\n    function SimpleBank()\
    \ {\n        // msg provides details about the message that's sent to the contract\n\
    \        // msg.sender is the address of contract creator\n        owner = msg.sender;\n\
    \    }\n    // Deposit ether into the bank\n    // Returns the balance of the\
    \ user after a deposit is made\n    function deposit() public returns (uint) {\n\
    \        // Add the value being deposited to the account balance\n        balances[msg.sender]\
    \ += msg.value;\n        // Log the deposit that was just made\n        LogDepositMade(msg.sender,\
    \ msg.value);\n        // Return the balance after the deposit\n        return\
    \ balances[msg.sender];\n    }\n    // Withdraw ether from bank\n    // withdrawAmount\
    \ is the amount you want to withdraw\n    // Returns the balance remaining for\
    \ the user\n    function withdraw(uint withdrawAmount) public returns (uint remainingBal)\
    \ {\n        /* If the account balance is greater than amount requested for withdrawal,\
    \ subtract it from the balance */\n        if(balances[msg.sender] >= withdrawAmount)\
    \ {\n            balances[msg.sender] -= withdrawAmount;\n            // Increment\
    \ the balance back to the original account on fail\n            if (!msg.sender.send(withdrawAmount))\
    \ {\n                balances[msg.sender] += withdrawAmount;\n            }\n\
    \        }\n        // Return the remaining balance after withdrawl\n        return\
    \ balances[msg.sender];\n    }\n    // Return the balance of the user\n    //\
    \ 'constant' prevents function from editing state variables;\n    function balance()\
    \ constant returns (uint) {\n        return balances[msg.sender];\n    }\n}\n\
    ```\n\nAlthough this contract has plenty of moving parts, it has a straightforward\
    \ schematic. We start by declaring state variables, and here we use an advanced\
    \ data-type called a mapping. Then, we declare an address variable used throughout\
    \ the contract, and an event logger. The constructor prepares the owner object\
    \ to be usable, and we attach the owner object to receive messages in the form\
    \ of return types from functions. There are three functions that follow the constructor,\
    \ which allow for the basic functions of a bank. The `deposit` function adds the\
    \ argument amount to the balance. The `withdrawal` function checks whether the\
    \ requested amount is lower than the balance available for an account. If this\
    \ is the case, the withdrawal is confirmed and the argument amount is subtracted\
    \ from the balance. If there is not enough balance, the amount that was supposed\
    \ to be withdrawn is added back to the account and the final balance is returned\
    \ to the user. Finally, the last function allows us to return the balance of an\
    \ account at a given time as requested by the contract. Now that we have a better\
    \ grasp of `Solidity`, let’s shift our focus to `Vyper`."
  raw: '### Solidity and Vyper Programming Languages


    Solidity is a higher-level, contract-oriented programming language for writing
    smart contracts in Ethereum. Any code written in Solidity can be executed on the
    EVM after being compiled into bytecode, which is an instruction set for the EVM.
    How does the bytecode encode references to other functions and contracts that
    are called during execution? This is done by using an Application Binary Interface
    (ABI). In general, an ABI is the interface between two program modules: machine-level
    instructions and a human-readable higher-level programming language. Let’s break
    down this answer into three components:


    *   Contract: A contract is simply higher-level code defined in a formal language
    such as Solidity.


    *   Compiled contract: The contract is converted to bytecode to be executed on
    the Ethereum Virtual Machine (EVM), adhering to the compiler’s specifications.
    Note that function names and input parameters get hashed and obfuscated during
    compilation. Therefore, for another account to call a function, it must have access
    to the given function name and arguments, and we need another layer that interfaces
    encoding into and out of the bytecode.


    *   Application Binary Interface (ABI): An ABI is a list of the contract’s function
    definition and arguments in JSON format. The function definitions and input arguments
    are hashed into the ABI. This is included in the data of a transaction and interpreted
    by the EVM at the target account. An ABI is necessary so that you can specify
    which function in the contract to invoke, as well as get a guarantee that the
    function will return data in the format you are expecting.


    Solidity has a plugin available for Visual Studio to help write smart contracts
    in a powerful IDE and deploy them to the Ethereum network. Our discussion of Solidity
    here will not cover advanced implementations or definitions. Instead, we will
    be limiting the upcoming discussion to the fundamentals such as storing variables
    and creating a simple contract. Let’s get started:


    ```

    /* defining a contract */

    contract ExampleStorage {

    uint storedNumber; //unsigned integer (uint) used to declare a state variable

    /* Function set can modify the value of the state variable */

    function set(uint x) {

    storedNumber = x;

    }

    /* Function get can retrieve the value of state variable  */

    function get() constant returns (uint retVal) {

    return storedData;

    }

    }

    ```


    This storage contract allows a user to store an integer as a state variable `storedNumber`
    and then modify or retrieve its value using the `get()` and `set()` functions.
    Solidity also offers several advanced features available in modern programming
    languages, such as inheritance (for contracts), function overloading, and class
    interfaces. Next, let’s look at a more complex example of a contract. This time
    we will create a simple bank contract using Solidity:


    ```

    // This bank contract allows deposits, withdrawals, and checking the balance

    // ''contract'' is a keyword to declare class, similar to any other OOP

    contract SimpleBank {

    // ''mapping'' is a dictionary that maps address objects to balances

    // ''private'' means that other contracts can''t directly query balances

    mapping (address => uint) private balances;

    // ''public'' makes externally readable by users or contracts on the blockchain

    address public owner;

    // Events trigger messages throughout the Ethereum network

    event LogDepositMade(address accountAddress, uint amount);

    // Constructor

    function SimpleBank() {

    // msg provides details about the message that''s sent to the contract

    // msg.sender is the address of contract creator

    owner = msg.sender;

    }

    // Deposit ether into the bank

    // Returns the balance of the user after a deposit is made

    function deposit() public returns (uint) {

    // Add the value being deposited to the account balance

    balances[msg.sender] += msg.value;

    // Log the deposit that was just made

    LogDepositMade(msg.sender, msg.value);

    // Return the balance after the deposit

    return balances[msg.sender];

    }

    // Withdraw ether from bank

    // withdrawAmount is the amount you want to withdraw

    // Returns the balance remaining for the user

    function withdraw(uint withdrawAmount) public returns (uint remainingBal) {

    /* If the account balance is greater than amount requested for withdrawal, subtract
    it from the balance */

    if(balances[msg.sender] >= withdrawAmount) {

    balances[msg.sender] -= withdrawAmount;

    // Increment the balance back to the original account on fail

    if (!msg.sender.send(withdrawAmount)) {

    balances[msg.sender] += withdrawAmount;

    }

    }

    // Return the remaining balance after withdrawl

    return balances[msg.sender];

    }

    // Return the balance of the user

    // ''constant'' prevents function from editing state variables;

    function balance() constant returns (uint) {

    return balances[msg.sender];

    }

    }

    ```


    Although this contract has plenty of moving parts, it has a straightforward schematic.
    We start by declaring state variables, and here we use an advanced data-type called
    a mapping. Then, we declare an address variable used throughout the contract,
    and an event logger. The constructor prepares the owner object to be usable, and
    we attach the owner object to receive messages in the form of return types from
    functions. There are three functions that follow the constructor, which allow
    for the basic functions of a bank. The deposit function adds the argument amount
    to the balance. The withdrawal function checks whether the requested amount is
    lower than the balance available for an account. If this is the case, the withdrawal
    is confirmed and the argument amount is subtracted from the balance. If there
    is not enough balance, the amount that was supposed to be withdrawn is added back
    to the account and the final balance is returned to the user. Finally, the last
    function allows us to return the balance of an account at a given time as requested
    by the contract. Now that we have a better grasp of Solidity, let’s shift our
    focus to Vyper.'
  trans: "\n### Solidity 与 Vyper 编程语言\n\n`Solidity` 是一种高级的、面向合约的编程语言，用于在以太坊上编写智能合约。任何用\
    \ `Solidity` 编写的代码，在编译为字节码（即 `EVM` 的指令集）后，都可以在 `EVM` 上执行。字节码如何编码执行过程中调用的其他函数和合约的引用？这是通过应用程序二进制接口（`ABI`）实现的。通常，`ABI`\
    \ 是两个程序模块之间的接口：机器级指令与人类可读的高级编程语言。我们来将这个答案拆解为三个部分：\n\n*   **合约**：合约就是用形式语言（如 `Solidity`）定义的高级代码。\n\
    *   **编译后的合约**：合约被转换为字节码，以便在以太坊虚拟机（`EVM`）上执行，并遵循编译器的规范。请注意，函数名和输入参数在编译过程中会被哈希和混淆。因此，要让另一个账户调用某个函数，该账户必须能访问给定的函数名和参数，我们需要另一层接口来对接进入和离开字节码的编码过程。\n\
    *   **应用程序二进制接口（`ABI`）**：`ABI` 是以 JSON 格式列出的合约函数定义及其参数列表。函数定义和输入参数会被哈希处理并纳入 `ABI`\
    \ 中。它被包含在交易的数据中，并由目标账户的 `EVM` 进行解释。`ABI` 是必要的，通过它，你既可以指定要调用合约中的哪个函数，也能确保该函数将返回你期望格式的数据。\n\
    \n`Solidity` 为 Visual Studio 提供了一个插件，帮助你在这个强大的 IDE 中编写智能合约，并将其部署到以太坊网络上。我们在这里对\
    \ `Solidity` 的讨论不会涉及高级的实现或定义。相反，我们将把后续的讨论限制在基础内容上，例如存储变量和创建简单的合约。让我们开始吧：\n\n```\n\
    /* 定义一个合约 */\ncontract ExampleStorage {\n    uint storedNumber; // 无符号整数（uint）用于声明状态变量\n\
    \    /* set 函数可以修改状态变量的值 */\n    function set(uint x) {\n        storedNumber\
    \ = x;\n    }\n    /* get 函数可以检索状态变量的值 */\n    function get() constant returns\
    \ (uint retVal) {\n        return storedData;\n    }\n}\n```\n\n这个存储合约允许用户将一个整数作为状态变量\
    \ `storedNumber` 进行存储，然后使用 `get()` 和 `set()` 函数修改或检索其值。`Solidity` 还提供了现代编程语言中可用的若干高级特性，例如（合约的）继承、函数重载和类接口。接下来，让我们看一个更复杂的合约示例。这次我们将使用\
    \ `Solidity` 创建一个简单的银行合约：\n\n```\n// 这个银行合约允许存款、取款和查询余额\n// 'contract' 是用于声明类的关键字，类似于其他面向对象编程语言\n\
    contract SimpleBank {\n    // 'mapping' 是一个将地址对象映射到余额的字典\n    // 'private' 意味着其他合约不能直接查询余额\n\
    \    mapping (address => uint) private balances;\n    // 'public' 使其对区块链上的用户或合约外部可读\n\
    \    address public owner;\n    // 事件会在整个以太坊网络中触发消息\n    event LogDepositMade(address\
    \ accountAddress, uint amount);\n    // 构造函数\n    function SimpleBank() {\n  \
    \      // msg 提供了发送给合约的消息的详细信息\n        // msg.sender 是合约创建者的地址\n        owner\
    \ = msg.sender;\n    }\n    // 向银行存款以太币\n    // 返回用户存款后的余额\n    function deposit()\
    \ public returns (uint) {\n        // 将存入的金额加到账户余额中\n        balances[msg.sender]\
    \ += msg.value;\n        // 记录刚刚进行的存款操作\n        LogDepositMade(msg.sender, msg.value);\n\
    \        // 返回存款后的余额\n        return balances[msg.sender];\n    }\n    // 从银行提取以太币\n\
    \    // withdrawAmount 是你想要提取的金额\n    // 返回用户剩余的余额\n    function withdraw(uint\
    \ withdrawAmount) public returns (uint remainingBal) {\n        /* 如果账户余额大于或等于请求提取的金额，则从余额中减去该金额\
    \ */\n        if(balances[msg.sender] >= withdrawAmount) {\n            balances[msg.sender]\
    \ -= withdrawAmount;\n            // 如果发送失败，则将金额加回原账户余额\n            if (!msg.sender.send(withdrawAmount))\
    \ {\n                balances[msg.sender] += withdrawAmount;\n            }\n\
    \        }\n        // 返回提取后的剩余余额\n        return balances[msg.sender];\n    }\n\
    \    // 返回用户的余额\n    // 'constant' 防止函数修改状态变量；\n    function balance() constant\
    \ returns (uint) {\n        return balances[msg.sender];\n    }\n}\n```\n\n尽管这个合约有很多移动部件，但其结构是直截了当的。我们首先声明状态变量，这里我们使用了一种叫做映射（mapping）的高级数据类型。然后，我们声明了一个在合约中各处使用的地址变量，以及一个事件记录器。构造函数准备好可用的所有者对象，并附加上所有者对象来接收函数返回类型的消息。构造函数之后有三个函数，它们实现了银行的基本功能。`deposit`函数将传入的金额添加到余额中。`withdrawal`函数会检查请求的金额是否低于账户的可用余额。如果是这种情况，则确认取款，并从余额中减去请求的金额。如果余额不足，则本应提取的金额被加回账户，并将最终余额返回给用户。最后，最后一个函数允许我们根据合约请求，在给定时间返回某个账户的余额。现在，我们对\
    \ `Solidity` 有了更好的理解，让我们把注意力转向 `Vyper`。\n"
- fmt: 'Vyper is also a general-purpose, contract-oriented programming language that
    compiles down to the EVM (Ethereum Virtual Machine) bytecode, much like `Solidity`.
    The main design benefit in using `Vyper` is that it removes numerous barriers
    in the process of writing smart contracts and presents the contracts in an easy-to-understand
    manner. As a general principle, any code that needs to run on the EVM must be
    very efficient to minimize the gas needed for the smart contract to execute. It
    must be noted that a poorly written contract will cost more ether to execute,
    and it can become so prohibitively expensive to run that the EVM will terminate
    the contract. To that end, `Vyper` follows the same logic as `Solidity` for writing
    contracts but removes the need for object-oriented programming paradigms. `Vyper`
    focuses on a limited set of definitions that are applied solely to programming
    micro-transactions on the blockchain. Let’s discuss the main features of `Vyper`:


    - `Vyper` does not contain most of the object-oriented programming constructs
    that programmers are familiar with: class inheritance, function overloading, and
    recursion capabilities have been removed. These features are not necessary for
    Turing-completeness and pose a security threat by increasing code complexity.
    Code reviews are essential to assess smart contracts; however, the added complexity
    can further make the audit process more difficult. Simplification leads to more
    reliable audits.


    - Writing code that is easier to follow also reduces the likelihood of errors.
    In the sense that `Vyper` offers more security than `Solidity`, the added security
    layer is enforced in the coding practices of developers. Even with restricting
    features such as creating upper limits for gas usage and overflow checks, smart
    contracts written with `Vyper` shine in terms of readability, auditability, and
    simplicity (and therefore security).


    - `Vyper` offers a set of built-in functions to write smart contracts, and although
    reviewing all of them is beyond the scope of this chapter, we want to highlight
    the `assert` function. `assert()` throws an error if a certain condition is not
    met. It is used at the beginning of methods to check if particular criteria are
    met for the method to process. If not, the transaction is reverted, and the contract
    terminates. For instance, imagine a crowd-funding scenario where `assert()` can
    be used to revert a contract by checking for a timestamp. If the timestamp of
    the current block in the Ethereum blockchain is greater than the deadline of the
    campaign, the contract should be terminated because the campaign has ended. In
    this way, `assert()` is a very clean function with which to apply conditions on
    contract code.


    ## Developer Resources


    As Ethereum has evolved in the past few years, so too has the interest of developers
    in using the platform for making applications. In this section, we will cover
    a few developer resources available for rapid prototyping in the Ethereum ecosystem:


    - `Remix`: A web-based IDE for writing and testing smart contracts faster on Ethereum.
    It has built-in support for writing contracts using `Solidity` and `Vyper`, a
    plugin manager for extending functionality, unit testing, and a blockchain virtual
    machine.


    - `Ethereum Studio`: Another web-based IDE suited for new developers to learn
    how to build and deploy smart contracts. `Ethereum Studio` has project templates,
    transaction logger, and a built-in Ethereum Virtual Machine for rapid prototyping
    on the Ethereum platform.


    - `OpenZeppelin SDK`: A smart contract toolkit to help build, compile, and deploy
    smart contracts and interact with them once deployed.


    - `Embark`: A developer platform for building DApps and smart contracts. Has a
    command-line interface for deploying contracts, plugin system, transaction explorer,
    and an active development community.


    - `ConsenSys Academy`: A self-paced, online Ethereum developer course that is
    open year-round for enrollment. More on educational resources in a later chapter.


    - `Ethereum Stackexchange`: A community to ask any Ethereum-related questions
    ranging from platform development to getting started.


    - `Chainshot`: An invited bootcamp for blockchain development that focuses on
    Ethereum smart contracts with a curriculum focused on practical applications.'
