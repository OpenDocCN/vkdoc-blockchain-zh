  trans: '

    # 代币应用


    首先，点击左侧边栏中的 `Tokens` 应用；你会看到代币审核界面，如图 5-16 所示。在此界面中，我们在 DAO 设置过程中铸造的代币以余额 (1)
    的形式显示，并分配给我们提供的钱包地址。右侧是我们的代币基本信息，包括代币总供应量（截至目前铸造的代币数量）、代币是否可转让以及代币名称 (2)。我们可以创建不可转让的代币，这可用于指定稀有资产。目前，此
    DAO 只有一位成员，因此默认情况下，该成员拥有 100% 的代币所有权 (3)。我们可以铸造新代币，要开始此过程，请单击 (4)，*添加代币*。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig16_HTML.jpg](img/430562_2_En_5_Fig16_HTML.jpg)


    **图 5-16**


    代币审核界面


    要铸造新代币，我们还需要将其分配给一个新地址，如图 5-17 所示。此过程还会向 DAO 添加一位新成员，其中成员资格定义为在 DAO 中拥有权益。但既然
    DAO 已上线，此操作将需要通过投票。通常，对 DAO 操作的任何重大更改都将根据我们在上一节中设置的投票参数进行投票。


    > **注意**

    > 新铸造的代币可以分配给任何地址；在这里，添加新地址同时允许我们添加一位在 DAO 中拥有权益的新成员。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig17_HTML.jpg](img/430562_2_En_5_Fig17_HTML.jpg)


    **图 5-17**


    铸造十个新代币并将其分配给一个新地址


    单击 *添加代币* 将引导您完成四个步骤：


    *   创建执行铸造功能的交易。

    *   创建一个投票，决定 DAO 是否批准铸造新代币。

    *   使用 DAO 智能合约将这两个功能部署到以太坊测试网。

    *   创建一个使用铸造功能来铸造新代币的交易。


    此通用流程适用于通过 Aragon 中的大多数应用执行的操作；第一步如图 5-18 所示。(5) 确认你只能在投票后才能铸造新代币。(6) 告知我们，投票成功后，此交易将铸造新代币。单击
    *创建交易* 将需要 MetaMask 支付 gas 费并签名。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig18_HTML.jpg](img/430562_2_En_5_Fig18_HTML.jpg)


    **图 5-18**


    创建投票和交易以铸造新代币


    导航到 `Voting` 选项卡，你应该会看到一个公开投票，其标题为图 5-18 中来自 (6) 的操作。这些投票由 DAO 自动创建。单击该投票将带你进入投票界面。选择
    *是* 并签署交易以对你的决定进行投票。确认信息显示在通知中，如图 5-19 所示。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig19_HTML.jpg](img/430562_2_En_5_Fig19_HTML.jpg)


    **图 5-19**


    投票通知：(7) 指的是将铸造十个新代币的交易，(8) 指的是正在进行的投票


    投票摘要页面如图 5-20 所示。这代表了投票结果。(9) 是该投票的描述；作为我们 DAO 的第一次投票，它被分配为投票 #0。此外，还提到了描述和投票创建者。目前，我们的
    DAO 只有一位成员，因此投票结果由一位持有大部分权益（100 个 BST 代币）的投票者决定 (10)。右侧是投票决议（已通过），以及有关所需支持率和最低批准率的信息
    (11)。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig20_HTML.jpg](img/430562_2_En_5_Fig20_HTML.jpg)


    **图 5-20**


    投票摘要页面


    现在投票已通过，让我们看看它为我们的 DAO 带来了哪些变化，如图 5-21 所示。(12) 是第一个主要变化；我们铸造的十个新代币现已分配给 DAO 上的一个新钱包（账户）。代币总供应量从
    100 增加到 110 (13)，这也改变了所有权结构。新账户通过拥有 10 个代币 (14)，在 DAO 的决策中获得了 9% 的权益。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig21_HTML.jpg](img/430562_2_En_5_Fig21_HTML.jpg)


    **图 5-21**


    铸造的代币出现在我们的 DAO 中


    # 投票应用


    投票是每个重大 DAO 操作中不可或缺的一部分。因此，我们使用了 `Voting` 应用来授权铸造十个新代币。类似地，我们可以使用它来提出议题，并经历相同的过程。让我们分享一个简短的例子。导航到
    `Voting` 选项卡，单击 *新投票* 开始。输入你想要向 DAO 提出的问题，如图 5-22 所示。例如，在铸造新代币之前，可以作为一个简单投票来讨论此议题。一旦输入问题，DAO
    将根据预设规则开始投票。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig22_HTML.jpg](img/430562_2_En_5_Fig22_HTML.jpg)


    **图 5-22**


    创建投票问题


    `Voting` 视图如图 5-23 所示。这显示了当前正在积极投票的决议，以及已通过或失败的已关闭决议。我们关于创建代币的新投票显示为开放状态，将在接下来的二十四小时内对
    DAO 成员可用。


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig23_HTML.jpg](img/430562_2_En_5_Fig23_HTML.jpg)


    **图 5-23**


    投票视图

