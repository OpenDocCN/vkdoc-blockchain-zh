    #### 备份（摘自 Oracle 支持文档）


    - 对等节点容器分布在多个虚拟机中，以确保在其中一台虚拟机不可用或正在修补时仍能保持弹性

    - `Orderers`、`fabric-ca`、`console` 和 `REST proxy` 节点在所有虚拟机中均有复制，实现透明接管以避免服务中断。

    - 为客户链码执行容器提供隔离的虚拟机环境，以实现更高的安全性和稳定性

    - 所有组件中均设有自主监控与恢复代理，利用所有配置更新和账本块的动态对象存储备份实现自主恢复


    ### Kaleido


    `Kaleido` 是一家由 `ConsenSys` 支持的初创公司，它创建了两项主要的区块链产品：一个可在亚马逊云上运行、用于简化区块链应用开发的基于以太坊的软件包，以及一个名为
    `Kaleido Core` 的全托管区块链即服务云平台。在本节中，我们将讨论 `Kaleido` 的两个主要方面。


    #### 网络治理（摘自 Kaleido BaaS 博客）


    在托管的 `Kaleido` 服务中，一个主要主题是创建专用于常见治理任务的模板，并通过简单的用户界面将其提供给用户。这包括一个新成员入职流程，只需点击几下即可设置新成员和对等节点。此外，一旦新成员入职并熟悉网络，他们将拥有其节点和密钥数据的所有权。这允许对节点设置进行更精细的控制，并在选择退出可选网络功能时提供更大的灵活性。`Kaleido`
    还提供了一个全网地址簿，列出了所有用户及其（在联盟内的）隶属关系和访问权限。为了获得更透明的交易和网络活动历史记录，BaaS 中还包含一个标准区块浏览器和代币浏览器，用于运行在
    BaaS 中的账本。最后，一个原生智能合约管理器被嵌入到网络治理中。这包括常见的智能合约任务，例如安全工作流、防火墙保护、版本控制以及将合约部署到账本。


    #### 高可用性与灾难恢复（摘自 Kaleido BaaS 博客）


    托管在云端的区块链网络需要具备适应性，以便在流量或交易负载激增时仍能保持网络在线。为此，高可用性对于共识算法至关重要，尤其是在去中心化网络中。这对于配置新节点尤为重要；例如，如果五个新节点加入一个网络，它们应该被动态添加到共识算法中，以防止网络过载。`Kaleido`
    的托管区块链还提供了针对新的/未经测试的共识算法的网络保护，以提供一定程度的灾难恢复支持。在不久的将来，这将允许开发者部署和热切换新的共识算法，并收集该算法在高交易量时期表现的数据。


    ## 总结


    在本章中，我们回顾了区块链即服务平台的基本概念，并讨论了四个主要的平台。我们讨论了每个产品的主要特性、每个提供商提供的托管支持，以及区块链公司完全在云端发展的机会。


    # 15. 区块链联盟的兴起


    本章内容整理自 Tamarin Health 的 `Vikram Dhillon` (VD) 与 `Katherine Kuzmeskas` (KK) 之间的一场对话，内容涉及她创建区块链公司的历程、途中遇到的挑战、联盟不断演变的性质以及她公司的未来。


    **VD:** *您创立公司时试图解决的主要客户痛点是什么？这些痛点是如何随时间演变的？区块链在其中扮演了什么角色？您能给我们一个大致的时间线吗？*


    **KK:** 我们刚开始的时候，专注于价值导向型医疗。这是医疗保健的一个领域，医生根据他们提供的治疗结果获得补偿，而不是根据他们提供的服务数量。这种做法自
    2008 年就已存在，最初由 Medicare（通过医疗保险和医疗补助服务中心 [CMS]）发起，随后私人支付方也纷纷效仿。我在耶鲁纽黑文健康系统担任医院管理员时了解到了价值导向型医疗，当时我需要更好的工具来管理患者出院后的情况（或者换句话说，出院后管理）。这非常具有挑战性，因为一旦患者离开医院，他们的数据在很大程度上就无法访问了，而后续随访产生的新健康数据则存在于由众多不可互操作的临床应用程序造成的数据孤岛中。我们希望成为患者、他们的护理过程以及他们的数据的纵向连接器。作为一个连接器，我们可以访问患者护理数据，无论其临床地点如何，这为我们和我们的提供商客户提供了可据此采取行动的信息，并根据
    CMS 设定的目标价格提供实时的节约或罚款估算。目标价格基本上就是 Medicare 允许报销的总成本；因此，这是提供商应将总护理成本控制在之下的数值。


    我们在 2017 年初成立公司时就提出了这个想法。与区块链的关联最初是作为一种为我们平台上的所有纵向数据创建审计追踪的方式。自从我们在 2016 年确定了如何利用区块链以来，我们的重点就是有意从简单、基础的区块链实现开始：为跨越不同环境的价值导向型医疗的护理交接信息和保险报销创建审计追踪。一旦创建了这个审计追踪，它就不能被删除或修改，这在价值导向型医疗中非常重要，因为患者在不同诊所间流转，数据存在于不同位置，而在此之前，唯一拥有完整视图的实体是通过其索赔数据查看的
    Medicare。如果你无法信任或验证信息来源，那么回顾并协调患者的护理过程就会非常困难。我们想解决这个问题，即在整个护理过程中连接患者，并提供不可变的数据审计追踪，从而提高数据的可靠性和可信度。我们的计划始终是在证明这一核心概念后，再逐步增加功能。我们希望先在市场上测试我们的基础，一旦区块链技术变得更加可扩展、被广泛采用，并且人们对其更加熟悉，我们就可以发展壮大，其在医疗保健领域的应用机会将变得无穷无尽。


    除了审计追踪，我们一直专注于通过公私钥对系统，以有意义的方式提供管理数据访问的能力。这两个概念——审计追踪和公私钥对系统——引导着我们从价值导向型医疗走向未来，在那个未来里，患者可以通过简单的点击分享他们的数据并从中受益。

    '
- fmt: '除了允许患者管理对其数据的访问权限之外，我们关注的另一个领域是保险报销。许多基于价值的护理项目目前是追溯性的，意味着回顾过去进行报销，但利用区块链，您可以使该系统成为前瞻性的。虽然仍需要人工流程，但我们可以为系统创造显著的效率，包括利用智能合约自动分配资金。凭借我们的基础平台`Health
    Nexus`（一个医疗保健安全区块链协议）、管理数据访问的密钥对系统，以及我们可以基于`Health Nexus`协议构建的所有智能合约，更多前瞻性的基于价值的护理项目在不久的将来或许能够实现。


    编者按


    与区块链交互的医疗保健特定应用程序受快速变化的监管环境影响，这使得相关讨论极具挑战性。作者在此纯粹以学术方式分享他们的观点。


    我们方法上的演变在COVID-19早期阶段加速了。疫情开始后，我对于因COVID相关压力给医疗设施造成的医院入院情况，将如何影响基于价值的患者护理感到担忧。最终，我做出了一个非常艰难的决定，退出联邦医疗保险计划。这一转变背后的原因源于医疗保险和医疗补助服务中心（CMS）沟通的延迟，以及CMS基于价值的护理系统的设置方式——特别是我们主要支持的捆绑支付项目。目前，医生提供者在患者出院后九十天内负责其护理，无论患者去向何方，也基本不关心患者后续发生什么。这个九十天患者护理费用池几乎没有什么例外。例如，在九十天内任何再入院，如果其费用将总护理费用推高至目标价格以上，都可能导致罚款。这意味着，如果一名患者因髋关节置换术入院，然后在九十天内跌倒导致手臂骨折，那么手臂骨折的费用将计入髋部骨折的总护理费用中——即使它们毫不相关。这不是一个理想的情况，在疫情这种患者出现肺炎、心脏问题或使用呼吸机等严重并发症的情况下尤其不理想。


    根据时间线：第一次公共卫生紧急状态是1月31日；到3月13日，白宫宣布联邦进入紧急状态；3月18日，联邦医疗保险宣布所有择期手术应推迟，以便医生能够专注于COVID-19病例和紧急护理。在非疫情期间，基于价值的护理运作方式大致类似于保险计划，医院系统完成的择期手术可以产生报销，以平衡高成本的紧急病例。这场疫情改变了报销的动态，因为几乎只关注高成本的重症监护、延长住院时间和紧张的医疗资源。尽管有上述时间线以及所有医生正在经历的困境，但联邦医疗保险直到6月28日才提供指导。早期的指导仅限于联邦医疗保险表示他们正在制定相关方案，并将“很快”发布。


    当我决定暂停我们在联邦医疗保险基于价值护理方面的重点时，我更加批判性地审视了我们的技术栈。我们有一个现有平台，可以跟踪个体在不同护理模式间的过渡，并记录他们的病历。因此，我们开始专注于如何帮助任何行业的雇主，在COVID-19疫情重新开放阶段安全地聚集员工。我们的平台能够整合外部信息来源，例如健康调查、检测协调以及公众健康意识/知识。区块链继续发挥着关键作用，通过一个非常简单的、有目的性的审计追踪，为责任保护和报销提供必要的资源。我们在平台上收集的信息，从症状调查到检测结果，都会被哈希处理并成为审计追踪的一部分。如同我们的平台通过不同的基于价值护理模式跟踪患者一样，雇主可以使用我们的新服务进行数据收集，以核实员工是否完成了调查并对调查内容进行了确认；这样一来，员工可以根据公共卫生指南安全地聚集。此外，企业主可以从责任角度记录其工作场所的安全性。拥有验证数据的审计追踪可以减轻监管合规的负担。这就是我们目前的状况。


    这一转变加速了我们向公司愿景另一重要组成部分的演进：用户拥有的健康档案。自2017年以来，我们创建了一个平台，使医疗数据在各参与方之间无缝流动，一个由高水平、专注于基于价值护理的医生组成的网络，以及现在的一个用户拥有的健康档案网络。每位用户都拥有自己的医疗信息并随身携带，从基本的健康信息到更复杂的数据，如手术和药物。随着时间的推移，数据的价值会增长，用户能够将其贡献给我们的数据市场，这也是不断发展的生态系统的关键组成部分。有了这个基础设施，您将能够找到专门致力于基于价值护理的医疗保健提供者和服务，您将从您的数据中获得价值，并且无限的机会正等待着我们去创建一个自我维持的、以价值为基础的生态系统。


    我们用户拥有的健康档案的下一步是增加游戏化元素。针对COVID-19的重点，游戏化将奖励那些会变得平凡但必须遵守的安全规程，例如每日症状调查。我们将首先从礼品卡开始，但我们的长期目标是将系统代币化，因为底层基础设施是`Health
    Nexus`，它需要节点运行者和验证者。代币化的核心理念是在这个新生态系统中激励提供者和患者的群体行为。由于代币只能在系统内使用，这就是生态系统将如何随着时间的推移自我维持。然而，由于当前的监管环境，这变得非常棘手；任何关于代币化的讨论都将成为与美国证券交易委员会（SEC）进行昂贵且漫长的过程。`Pocketful
    of Quarters`，一家尝试使用代币进行区块链游戏的组织，已经经历了这一点，他们与SEC进行了长达一年多的讨论以获得无异议函，才得以启动他们的网络。医疗保健领域本就充满法规；引入区块链和代币只会增加另一层复杂性，并且，虽然可行，但将耗费大量时间和显著成本。


    注


    在当前的法律环境下，代币化概念几乎不可能实现。`Pocketful of Quarters`已经证明启动网络是可能的，但代价和成本高昂。全球概念理解中的代币化与美国目前可行的做法大相径庭。'
  raw: 'In addition to allowing patients to govern access to their data, another area
    of interest for us is insurance reimbursement. Many value-based-care programs
    are presently retroactive, meaning you look back to reimburse, but with blockchain,
    you can make this system prospective. While there will still be human processes
    needed, there are exceptional efficiencies we can create for the system, including
    leveraging smart contracts to distribute funds automatically. With our base foundation
    Health Nexus (a healthcare safe blockchain protocol), the keypair system that
    governs access to data, and all the smart contracts that we can build on top of
    our Health Nexus protocol, more prospective value-based-care programs may be possible
    in the not-too-distant future.


    Editor’s Note


    Healthcare-specific applications that interface with a blockchain are subject
    to a rapidly changing regulatory landscape, which makes the discussion very challenging.
    The authors are sharing their viewpoints here in a purely academic manner.


    The evolution in our approach accelerated during the early phase of COVID-19\.
    Once the pandemic started, I became nervous about how value-based patient care
    would be impacted in regards to hospital admissions due to COVID-related strain
    on healthcare facilities. Eventually, I made a very difficult decision to withdraw
    from the Medicare program. My reasoning behind this pivot was rooted in the delay
    in communication from CMS, and based on how the CMS value-based care systems are
    set up—specifically bundled payments, which is the main program we support. Presently,
    a physician provider is responsible for the care of a patient over a ninety-day
    period after discharge from the hospital regardless of where the patient goes,
    and largely regardless of what happens to the patient. There are very few exceptions
    to this ninety-day patient care cost bucket. For example, any readmission during
    the ninety-day period can result in a penalty if the cost of the readmission pushes
    the total cost of care over the target price. Meaning, if a patient came to the
    hospital for a hip replacement, and then had a fall leading to a fracture in the
    arm within the ninety-day period, the cost of the arm fracture falls into the
    total cost of care for the *hip fracture*—even though they are unrelated. This
    is not an ideal situation, and certainly not ideal in a pandemic situation where
    patients developed severe complications such as pneumonia, cardiac issues, or
    were put on ventilators.


    To give a timeline: The first public health emergency was January 31; by March
    13 the White House declared a federal emergency; on March 18, Medicare declared
    that all elective cases should be postponed so that physicians [could] remain
    focused on COVID-19 cases and emergency care. In a non-pandemic setting, value-based
    care roughly operates similar to an insurance program, where the elective cases
    done by a hospital system can provide reimbursement to balance out high-cost emergent
    cases. This pandemic shifted the dynamics of reimbursement because of the near
    sole focus on high-cost critical care, extended hospital stays, and strained healthcare
    resources. Despite the timeline above and the struggle that all physicians were
    going through, Medicare provided no guidance until June 28\. Earlier guidance
    was limited to Medicare saying they [were] working on something and would release
    it “soon.”


    When I made the decision to pause our Medicare value-based-care focus, I looked
    at our technology stack more critically. We had an existing platform where we
    could follow individuals as they transitioned through different modalities of
    care and tracked their records. So, we began to focus on how we [could] help employers
    across any industry gather safely during the reopening phases of [the] COVID-19
    pandemic. Our platform is able to consolidate external sources of information
    such as those through health surveys, testing coordination, and general public
    health awareness/knowledge. Blockchain continues to play a key role with the very
    simple, intentional audit trail that can be a necessary resource for liability
    protection and reimbursement. The information we gather on our platform, from
    symptom surveys to test results, is hashed and becomes a part of the audit trail.
    In the same way that our platform tracked patients through different modalities
    of value-based care, an employer can use our new service for data collection to
    verify that an employee completed a survey and attested to what they put in the
    survey; as a result, the employees can safely gather in accordance with public
    health guidelines. Additionally, business owners can document the safety of their
    workplace from a liability standpoint. Having an audit trail that verifies data
    reduces the burden of regulatory compliance. That’s where we are now.


    This shift accelerated our evolution to another significant component of our company
    vision: user-owned health profiles. Since 2017, we have created a platform where
    healthcare data flows seamlessly between parties, a network of high-performing,
    value-based-care-focused physicians, and now a network of user-owned health profiles.
    Every user owns their healthcare information and carries it, from basic health
    information to more complex data such as procedures and medications. Over time,
    the value of the data grows and the user is able to contribute it to our data
    marketplace, also a key component of the growing ecosystem. With this infrastructure,
    you will be able to find healthcare providers and services that are dedicated
    solely to value-based care, you will derive value from your data, and the opportunities
    are endless in finding ways to create a self-sustaining, value-based-focused ecosystem.


    Up next in our user-owned health profiles is adding gamification. For the COVID-19
    focus, gamification rewards what will become mundane but required safety protocols
    such as daily symptom surveys. We will start first with gift cards, but our long-term
    goal is to tokenize the system, since the base infrastructure is Health Nexus,
    which requires node runners and validators. The whole idea with tokenization is
    to incentivize group behavior for providers and patients in this new ecosystem.
    Because tokens can only be used within the system, this is how the ecosystem will
    be self-sustaining over time. However, this gets very tricky due to the current
    regulatory environment; any discussion of tokenization becomes an expensive and
    lengthy process with the SEC. Pocketful of Quarters, an organization attempting
    blockchain gaming with tokens, already experienced this in their more-than-a-year-long
    discussion with the SEC to obtain a No Action Letter, which allowed them to launch
    their network. Healthcare is already laden with regulations; introducing blockchain
    and tokens only adds another layer of complexity, and, while doable, will take
    time and significant expense.


    Note


    The tokenization concept is near impossible in the current legal environment.
    Pocketful of Quarters has demonstrated that launching a network is possible. But
    not without significant cost and time. Tokenization as globally understood in
    concept is very different from what is currently possible in the United States.'
