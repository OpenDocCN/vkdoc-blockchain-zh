- fmt: '## R3 and Corda


    R3 is another consortium similar to Hyperledger or EEA and the driving force behind
    Corda, a unique permissioned blockchain platform. Corda is different from other
    DLTs in a number of ways explained in a blogpost by Nick Avramov:


    > *There are three main concepts you need to know to master your knowledge in
    Corda. Here they are:*


    > *State — or, state object. It’s a building block of Corda and it represents
    a specific agreement or contract, like a real-world contract. This is the one
    thing the consensus should be achieved about — the exact state object, not a state
    of the entire ledger. It’s important and will be described in detail later.*


    > *Flow — a small multi-party sub-protocols that are used to share transaction
    data (state objects) with relevant involved parties. It’s opposite to what we
    can observe in public blockchains like Bitcoin and Ethereum where transaction
    data is globally broadcasted.*


    > *Notary — An entity that provides transaction ordering and timestamping services.
    The thing is, Corda doesn’t organize transactions into blocks, so, it’s not a
    blockchain.*


    > *Unlike Bitcoin and Ethereum*, Corda is a permission-based network where you
    have to be granted access. It’s specified in flow API — yes, the flow I introduced
    earlier. It also can be considered as a tribe or something that imposes certain
    requirements on your identity and you cannot join the specific flow unless you
    satisfy it. The consensus is achieved on a transaction level (instead of ledger
    level as in Bitcoin or Ethereum), thus there’s no need for all network nodes to
    verify and approve the transaction.*


    > *Indeed, the important thing about Corda is its agility to using different consensus
    algorithms. As it has no exact one, the notaries can actually use different ones
    — BFT, Raft, maybe some others. Running ahead it can be said that Corda develops
    a metanetwork for all these sub-networks or flows. Imagine that there are auditing
    companies, banks, cleaning companies that serve these banks. All of them have
    their internal cuisine of bookkeeping, subcontractors, various other financial
    and non-financial relations. In a way Corda aims to develop a system for all their
    interactions, both within a single company and with others, using the same protocol.*


    > *It’s worth mentioning that the developers of Corda from the very beginning
    claim that they are creating an architecture that will model and automate real-world
    transactions in a legally enforceable manner. This is a common pitfall of many
    blockchains that the transactions they store do not have a legal value. Instead,
    smart contracts in Corda have not only transaction information, but also legal
    prose.*


    > *Unlike other DLTs, where the ledger is shared across every organization, in
    Corda, the transaction is shared only within the sub-network or flow. In that
    sense, there’s a direct communication instead of a global broadcast, and privacy
    is preserved.*


    > *No entity has an entire history of all the transactions in the network. But
    there are notaries that know the current states of this particular piece of the
    network. They serve as validators of the transactions. And the typical transaction
    looks as follows:*


    > *A new transaction A turns (“spend” in Corda terminology) a state X to create
    a state Y.*


    > *You send transaction A to the notary that knows about state X.*


    > *The notary checks that state X is still valid and signs transaction A. State
    X is now invalid, with state Y taking its place.*


    > *If state X above were not valid when the transaction was proposed, the notary
    would respond that state X had already been spent.*


    > *Thus, Corda* *has transmitted the responsibilities of knowing the world state
    and seeing all transactions from the entire network onto a special notary service.
    Members of the network don’t need to trust everyone, just the organizations that
    run the notary. There can also be multiple notaries, each trusted for a different
    purpose.*


    ## Summary


    In this chapter, we talked about the Blockchain 3.0 paradigm of advanced on-chain
    execution of applications from three different angles: EOS.io with sophisticated
    message passing and parallel processing, Chain Core as a model for the future
    of asset management on a blockchain, and enterprise Ethereum. The enterprise adoption
    of Ethereum is being guided by consortia formed from companies that want to solve
    domain-specific problems such as Hyperledger, EEA, and R3. An open source community
    is behind each of the enterprise efforts, making the codebase more secure, efficient,
    and practical for large-scale deployments.


    # 12. Technological Revolutions and Financial Capital Markets


    Global financial markets are undergoing a drastic change that makes it clear that
    without innovation most business and financial models could soon become obsolete.
    A recent overview of the global financial system described the current system
    as a


    > *[s]ystem that moves trillions of dollars a day and serves billions of people,
    but the system is rife with problems, adding cost through fees and delays, creating
    friction through redundant and onerous paperwork, and opening up opportunities
    for fraud and crime.*


    > *To the best of our knowledge, 45 percent of financial intermediaries, such
    as payment networks, stock exchanges, and money transfer services, suffer from
    economic crime every year; the number is 37 percent for the entire economy and
    only 20 percent and 27 percent for the professional services and technology sectors
    respectively. It’s no small wonder that regulatory costs continue to climb and
    remain a top concern for bankers. This all adds cost, with consumers ultimately
    bearing the burden.*^([^(11)](#fn11))


    Dan Tapscott, the author of Blockchain Revolution, pointed out that our financial
    system is inefficient for a multitude of reasons:


    > *First, because it’s antiquated, a kludge of industrial technologies and paper-based
    processes dressed up in a digital wrapper. Second, because it’s centralized, which
    makes it resistant to change and vulnerable to systems failures and attacks. Third,
    it’s exclusionary, denying billions of people access to basic financial tools.
    Bankers have largely dodged the sort of creative destruction that, while messy,
    is critical to economic vitality and progress.”*^([^(12)](#fn12))


    We begin this chapter with issues related to the global financial markets and
    why blockchain can be an innovative solution for efficiencies therein. Then we
    move to the topics of venture capital, ICOs, cryptocurrencies, tokens, and exchanges.
    We address the significant ICO market impact, state of regulation, Securities
    and Exchange Commission (SEC) involvement, unique technologies, business models,
    RegTech, and related issues. As we review these concepts and issues, there are
    several questions and thoughts to keep in mind:


    *   How does crowdfunding scale blockchain applications?


    *   How can new companies and lending platforms be created?


    *   Can RegTech answer the need in the market for efficient compliance?


    *   What is the market impact of FinTech for banking and investment banking?


    *   What is the state of ICO fundraising and the ICO bubble?


    *   How can people of all levels of wealth participate in financial markets as
    technology helps democratize financial opportunities?


    We close the chapter with the state of multiple large financial groups and their
    state of involvement in blockchain, FinTech, and other financial technologies.'
