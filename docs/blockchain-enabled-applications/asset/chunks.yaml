    在融资方面，这无疑充满挑战，尤其源于驱动决策的系统性偏见。目前，女性仅能获得全部融资资金的 3%。相比之下，`WeWork`在 2019 年获得的投资额超过了所有女性创始人融资的总和，而此后的结果大家有目共睹。融资是一场艰苦的战斗，且根据性别、种族和族裔的不同，难度日益增加。尽管我们确实在
    2017 年设法获得了所需的投资，但过程异常艰辛。


    然而，通过补助金和贷款，联邦政府在资助我们公司方面比投资者更为支持。具体而言，我们从美国国家科学基金会获得了一项竞争激烈的第一阶段小企业技术转让（STTR）补助金，用于在`Health
    Nexus`协议上研究实施`Graphene`。我们的大学合作伙伴是马萨诸塞大学阿默斯特分校的 Brian Levine 博士及其博士后 George Bissias
    博士。Levine 博士是[计算机与信息科学学院](https://www.cics.umass.edu/)网络安全研究所的主任，专注于互联网和移动系统背景下的安全研究，包括儿童救援、隐私、区块链、蜂窝网络以及点对点网络。Levine
    博士和 Bissias 博士已成功在`Bitcoin`区块链上实施了`Graphene`。我们的目标（并已实现）是类似地在`Health Nexus`上利用这种区块传播技术来压缩区块大小，从而提升区块链性能。随着行业持续应对去中心化系统在速度、能耗和效率（包括成本）方面的复杂性，我们自豪地证明了`Graphene`是提高区块链效率的有效工具。以尽可能少的带宽和延迟进行操作，对去中心化区块链具有诸多优势，我们相信它将有助于医疗健康领域实现必要的创新和效率提升。


