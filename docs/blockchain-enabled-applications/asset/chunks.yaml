  trans: '

    # 联邦学习


    将联邦学习或去中心化机器学习与区块链基础设施及深度隐私保护相结合，会呈现出怎样的形态？从技术角度而言，这种结合的核心价值主张又是什么？当我们实现数据（包括数据共享）的访问控制和内容管理时，区块链与去中心化人工智能的协同效应便得以显现。这仅仅是初期实施中最易实现的部分。


    如果我们仅仅在区块链上管理同意和访问权限，却仍依赖移动数据这类传统原始方法，就会再次陷入复制并创建数据副本的范式。而这正是无法创造数字稀缺性的问题所在。如此一来，我们既无法提升数据的价值，反而增加了其脆弱性。例如，我们会成为完全不受控制的数据泄露事件的受害者——即便我们记录了自己的访问——甚至被拒绝访问自己的特定数据。


    如果你能以去中心化模式访问数据——而非像我们如今的策略那样，将获取训练数据视为执行机器学习功能的最大障碍——那么数据就能得到更广泛的应用。现实情况是，数据科学家和机器学习从业者很难获得创建模型所需的数据。在这种去中心化方法中，我们可以彻底颠覆数据稀缺性及其行为经济学动态，在不集中存储数据的情况下获得/允许访问海量数据集。这是否能改变可用数据的总量，以及我们在这类由区块链促成的全新去中心化人工智能中，对数据及其来源的信任程度？


    如果你观察大多数医疗健康数据研究，除了非常精心构建的数据集外，很难在数据规模上达到非常庞大的量级，而构建这类数据集本身既复杂又成本高昂。然而，如果反转这种范式，每个人都能贡献自己的个人数据、健康数据，或仅与健康间接相关的数据。例如，你可以通过智能手机应用程序贡献数据——这些应用接收来自临床试验项目的请求。在这个例子中，项目仅会使用你的数据，而不会传输、拥有你的数据，也不会在数据使用过程中知晓其内容。它只是授予项目/方使用数据的权限。该方无法查看数据、不知道数据内容，也永远不会知道数据是什么。这将激励各方回头请求更多所需数据——且仅请求所需的数据——而不是将所有数据累积并存储在某处的基础设施中（或许安全，或许不安全），寄希望于未来某天可能用到。


    我们正在摒弃旧的逻辑，其大致如下：


    -   你几乎无法将数据变现。

    -   数据变现要求你一次性彻底出售数据。

    -   使用你的数据需要创建一个全新的副本。


    因此，我们在此讨论的所有去中心化业务，实质上是将数据出售转变为数据出借/租赁，并且仅提供关键要素。


    除了深度隐私保护，还有一个重要方面，即安全推断的概念。推断是机器学习模型进行预测的功能。模型经过训练并开始执行其预定任务后，理论上会做出预测，这些预测可能指导临床决策、影响患者行为、指引医疗服务的获取，或指导该技术在行业内的任何应用场景。


    ## 结论


    区块链、去中心化人工智能和深度隐私保护的结合，正是医疗领域当前碎片化、受防火墙和孤岛式系统所缺失的数据“圣杯”。我们可以释放更多数据用于研究和循证医学，吸引更多专家关注健康的方方面面，并在无需无休止地共享和复制数据的情况下，允许更广泛的数据访问。这将促进更多医学发现、改善健康结果，同时避免暴露个人数据并防范大规模黑客攻击和数据泄露的风险。当这三项新兴技术领域叠加在一起时，我们便拥有了满足医疗行业需求的、既必要又充分的全套技术堆栈。

    '
- fmt: '# 17. Formal Blockchain Research and Education


    This chapter is based on an interview between Vikram Dhillon and Tory Cenaj, in
    which Tory talks about her journey toward creating a formal educational space
    to study blockchain when most of the work was still being done informally and
    disseminated largely through developer blogs. *Blockchain in Healthcare Today*
    is a prominent peer-reviewed journal today in the blockchain space, with an editorial
    board that has a very broad spectrum of experiences.


    **VD**: *What was your inspiration for starting the journal? What pushed you to
    think about the need for rigorous scientific process to evaluate blockchain technology?*


    **TC**: My entire career has focused on or included evidence-based research output,
    publication planning, medical publishing, research consulting, medical education,
    and disseminating research data. I headed a portfolio of international multispecialty
    journals and society peer-reviewed publications. For me, publishing and communications
    always presented a creative outlet for new and breakthrough innovations. Communicating
    with a trusted evidence-based journal elevates both research and dissemination
    of the work and/or discovery.


    I learned about the crypto sector from a friend. He was launching an asset that
    rewarded the use of solar energy, and I began mining it. As I learned more about
    the technology, I thought about potential applications in healthcare.


    At the time, the financial marketplace was a swirling cesspool wrought with nefarious
    actors more concerned with swindling the public and making a quick buck versus
    creating a safe environment where regulation and a new world market could be created.


    Since my background was healthcare and focused on publishing, it made perfect
    sense to me to launch a new peer-reviewed journal creating a market for blockchain
    technology in healthcare.


    As founder and publisher, I opted to launch a traditional scholarly peer-reviewed
    journal, anticipating the unfamiliar territory of the editorial mission. The healthcare
    sector, at large, had to build familiarity and confidence with the technology
    and understand its vast applications. *Blockchain in Healthcare Today* peer-reviewed
    journal provided the broadest, most rapid adoption to scale proficiency and agility
    with the technology for leadership, early adopters, and, ultimately, all stakeholders
    to fill in blanks and learn more.


    My thought was [that] conforming with traditional scholarly outlets at the outset
    would engender acceptance for both journal and use of the technology faster. Those
    that understood and engaged with research understood this. Those that were new
    to the market struggled with communicating and writing acceptable papers. There
    were some arrogant skeptics, of course, but the journal has proven its value to
    and for the market in that it validated the technology for healthcare, gave it
    credibility with a peer-reviewed journal, and today it both shapes and reflects
    market growth and innovation. We are read in over seventy countries and just launched
    licensed editions of the journal in the Gulf Cooperation Council (GCC) and Egypt.
    I’m quite happy with the growth trajectory. To learn more about the journal’s
    inaugural edition, you can always read my publisher’s letter at [`https://doi.org/10.30953/bhty.v1.25`](https://doi.org/10.30953/bhty.v1.25).


    **VD**: *What sort of resources did it take to start the journal? I know you’ve
    been involved with crypto-communities in the past; talk to us about your past
    experience and how that helped you with starting the journal.*


    **TC**: From the get-go, I stayed away from crypto, wouldn’t publish anything
    related to it, and only addressed it at conferences since there was such hoopla
    around it. I have always maintained unless it has real monetary value, it may
    as well, and usually is, used as a behavior modification tool in our market.


    Every once in a while I will ask a physician what they think of blockchain technology.
    The answers I receive are related to investment opportunities, so I know a deep
    disconnect still exists. That’s why we’ve developed a new medical education program
    for doctors and pharmacists (CME) and are looking for sponsors now.


    **VD**: *You have managed to put together such a diverse group of editors/reviewers.
    What sort of expertise were you looking for when you put together this board?
    How did you figure out the right group of people to bring on?*


    **TC**: The caliber of our board is stellar, and it is because all these individuals
    are extremely passionate about changing healthcare and legacy systems. They are
    curious virtuosos and experts that push the envelope, have no fear, and are comfortable
    taking risks. The editors on our board had their name attached to a journal (BHTY)
    that was still relatively unknown and they all risked their reputations with the
    affiliation. I am very cognizant of this. *BHTY* aims to lead the market as the
    premier and preeminent journal in the sector.


    I have always believed that everyone brings a different perspective to the table.
    I look for the best, from all corners of the world, to bring new facets to the
    journal and our audience as *BHTY* matures in the marketplace. It is a volunteer
    position, and their time is a reflection of the quality of the journal. It is
    a team effort, and we are all proud of our collective efforts.


    **VD**: *What kinds of studies are you most excited to receive for publication
    in the journal and why? How has building the journal for the past [little] while
    changed your mind about the direction that blockchain technology is headed?*


    **TC**: We typically summarize trends we see in the market in our annual “Blockchain
    Predictions” article, inviting board members and conference speakers to participate
    to share their predictions for the technology [in the] short and long term. It
    is a popular article that receives a lot of media attention.


    I am excited to see blockchain technology being adopted across every industry
    and not just healthcare. We have seen an uptick in US government initiatives and
    have published papers reflecting these initiatives. What I want to see is broad
    adoption, popular understanding of the technology in that it is an underlying
    and connective mechanism and platform to use to link disparate parts in a new
    era of tech, but am still waiting for realization of the cost efficiencies for
    the US market. We see this abroad. In addition, there is a general assumption
    [that] blockchain is expensive and difficult to implement due to coding. This
    must also be overcome as it is not true.


    **VD**: *What are the new avenues (or verticals) in terms of content that you
    are exploring as a journal and for publication? Being tied to a cutting-edge technology
    like the blockchain allows for some room to experiment [in the] editorial process—any
    blockchain-based editorial activities planned in near future?*


    **TC**: I can share we are the first health science journal to timestamp articles
    on the blockchain and provide a blockchain-based ledger of record for research
    in collaboration with ARTiFACTS, where we provide authors a custom dashboard to
    share and amplify work and ensure provenance and reproducibility in [the] scientific
    community. We tell authors to use repositories for work and are also working on
    a global initiative for research communities. We have launched a University Council,
    Ambassador chapters around the world, and are always on the lookout for new and
    reputable partners and collaborators to work with. Drop us a note.'
  raw: '# 17. Formal Blockchain Research and Education


    This chapter is based on an interview between Vikram Dhillon and Tory Cenaj, in
    which Tory talks about her journey toward creating a formal educational space
    to study blockchain when most of the work was still being done informally and
    disseminated largely through developer blogs. *Blockchain in Healthcare Today*
    is a prominent peer-reviewed journal today in the blockchain space, with an editorial
    board that has a very broad spectrum of experiences.


    **VD**: *What was your inspiration for starting the journal? What pushed you to
    think about the need for rigorous scientific process to evaluate blockchain technology?*


    **TC**: My entire career has focused on or included evidence-based research output,
    publication planning, medical publishing, research consulting, medical education,
    and disseminating research data. I headed a portfolio of international multispecialty
    journals and society peer-reviewed publications. For me, publishing and communications
    always presented a creative outlet for new and breakthrough innovations. Communicating
    with a trusted evidence-based journal elevates both research and dissemination
    of the work and/or discovery.


    I learned about the crypto sector from a friend. He was launching an asset that
    rewarded the use of solar energy, and I began mining it. As I learned more about
    the technology, I thought about potential applications in healthcare.


    At the time, the financial marketplace was a swirling cesspool wrought with nefarious
    actors more concerned with swindling the public and making a quick buck versus
    creating a safe environment where regulation and a new world market could be created.


    Since my background was healthcare and focused on publishing, it made perfect
    sense to me to launch a new peer-reviewed journal creating a market for blockchain
    technology in healthcare.


    As founder and publisher, I opted to launch a traditional scholarly peer-reviewed
    journal, anticipating the unfamiliar territory of the editorial mission. The healthcare
    sector, at large, had to build familiarity and confidence with the technology
    and understand its vast applications. *Blockchain in Healthcare Today* peer-reviewed
    journal provided the broadest, most rapid adoption to scale proficiency and agility
    with the technology for leadership, early adopters, and, ultimately, all stakeholders
    to fill in blanks and learn more.


    My thought was [that] conforming with traditional scholarly outlets at the outset
    would engender acceptance for both journal and use of the technology faster. Those
    that understood and engaged with research understood this. Those that were new
    to the market struggled with communicating and writing acceptable papers. There
    were some arrogant skeptics, of course, but the journal has proven its value to
    and for the market in that it validated the technology for healthcare, gave it
    credibility with a peer-reviewed journal, and today it both shapes and reflects
    market growth and innovation. We are read in over seventy countries and just launched
    licensed editions of the journal in the Gulf Cooperation Council (GCC) and Egypt.
