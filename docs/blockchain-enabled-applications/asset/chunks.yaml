- fmt: '#### Finance App


    The Finance app acts as an internal bank recording all financial activities taking
    place within the DAO. In this topic, we will go over how to make deposits and
    withdrawals using the Finance app. To start with banking operations, let’s request
    some test tokens. Navigate to `Permissions` under the `System` tab and scroll
    down to see the *Request test tokens* section. This will allow us to get some
    test currency, as shown in Figure [5-24](#430562_2_En_5_Chapter.xhtml#Fig24).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig24_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig24_HTML.jpg)


    Figure 5-24 – Requesting tokens for the DAO


    The Finance app now displays the transaction that just took place; the updated
    view is shown in Figure [5-25](#430562_2_En_5_Chapter.xhtml#Fig25). (15) shows
    the twenty Aragon tokens (ANT) that we received upon requesting test tokens. (16)
    lists the transaction that transferred into our DAO.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig25_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig25_HTML.jpg)


    Figure 5-25 – Finance app showing an incoming transaction


    One easy way to make a deposit into your DAO is by using the connected wallet.
    We can deposit by initiating a new transfer in the Finance app. The settings are
    shown in Figure [5-26](#430562_2_En_5_Chapter.xhtml#Fig26). We first need to select
    the currency that we’re transferring. Our MetaMask wallet only contains ETH, so
    that’s what we will bring into the DAO (17). Next, we need to enter the deposit
    amount of 0.02 ETH (18). Finally, we can add an optional message to the incoming
    transaction (19).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig26_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig26_HTML.jpg)


    Figure 5-26 – Transferring currency into our DAO from the MetaMask wallet


    Withdrawal of funds from the DAO follows a very similar sequence of steps. Select
    withdrawal as shown in Figure [5-26](#430562_2_En_5_Chapter.xhtml#Fig26) and enter
    the Ethereum address that will receive the withdrawn funds. Then, enter the amount
    and currency to withdraw. As an exercise, try to withdraw 0.01 ETH to a MetaMask
    wallet address. This process should result in the Finance tab’s showing what is
    seen in Figure [5-27](#430562_2_En_5_Chapter.xhtml#Fig27). (20) shows the balance
    remaining in the DAO at any given time. (21) is the test tokens we requested from
    the faucet. (22) is the 0.02 ETH deposit we made from the MetaMask wallet, and,
    finally, (23) should show the 0.01 ETH withdrawn. As more transactions happen,
    the Finance app becomes an in-house tracker for the DAO.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig27_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig27_HTML.jpg)


    Figure 5-27 – Financial overview of the DAO


    **Note:** Aragon has an application called `Agent` that allows for a DAO to interact
    with any other smart contract on the Ethereum blockchain. This enables an organization
    to use the `Agent` app as an intermediary for sending funds externally or importing
    them. The resulting transfers will be recorded on the financial overview page
    with references to `Agent`.


    #### App Permissions


    The DAO comes with a set of standard app permissions that allow for specific functionality.
    To extend the functionality of an app, or to add new general features to the DAO,
    new permissions must be voted on and added. Navigate to the sidebar, under `System
    ➤ Permissions`. This opens the default `Permissions` view, as shown in Figure
    [5-28](#430562_2_En_5_Chapter.xhtml#Fig28). The DAO allows you to change permissions
    for the apps, and at the system level for the DAO. We will only be focusing on
    the app permissions (24). The apps currently installed are available right below
    in (25). These apps were available with the template and pre-installed. (26) lists
    out the actions that are available to the apps on our DAO (27). These actions
    are assigned to an app, as shown in (28), which denotes the flow of actions from
    the action being requested on the app to the approval from the assigned app. In
    the majority of cases, the `Voting` app will oversee any new actions, as we have
    discussed. (29) is the manager that can reassign actions to apps that are installed
    on our DAO.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig28_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig28_HTML.jpg)


    Figure 5-28 – Permissions overview for our DAO


    On the right-hand side in Figure [5-28](#430562_2_En_5_Chapter.xhtml#Fig28), click
    on *New permission* to begin adding new permissions. Our goal here will be to
    add a permission allowing any account in the DAO to burn tokens. This replaces
    the default limiting the action of burn tokens to only the `Voting` app. The `Add
    Permissions` view is shown in Figure [5-29](#430562_2_En_5_Chapter.xhtml#Fig29).
    First, select the app to which you want to add a new permission and then assign
    a new entity. Here, we will be assigning any accounts to the action that will
    follow, which is burning tokens. Once you click on *Add permission*, you will
    be taken to a vote. As with any major changes to the DAO, once the resolution
    is approved by the DAO, the functionality will become available.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig29_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig29_HTML.jpg)


    Figure 5-29 – Adding a new permission


    As noted previously, we will need to vote on this resolution prior to adding the
    permission. Clicking on *Add permission* in Figure [5-29](#430562_2_En_5_Chapter.xhtml#Fig29)
    will take you to the voting screen, shown in Figure [5-30](#430562_2_En_5_Chapter.xhtml#Fig30).


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig30_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig30_HTML.jpg)


    Figure 5-30 – Voting confirmation for adding new permission


    Once the voting is successful, the permission is applied to the DAO and is now
    visible under the `Permissions` tab. This is shown in Figure [5-31](#430562_2_En_5_Chapter.xhtml#Fig31).
    This concludes our tutorial, providing a basic overview of how to set up a DAO
    on Aragon.


    ![../images/430562_2_En_5_Chapter/430562_2_En_5_Fig31_HTML.jpg](images/430562_2_En_5_Chapter/430562_2_En_5_Fig31_HTML.jpg)


    Figure 5-31 – Updated permissions view for burn tokens action


    Before we finish our discussion, let’s briefly look at the topic of codifying
    stocks as protected/limited assets in a DAO. Non-transferrable tokens can be used
    as rare assets and have greater voting power. Traditionally, there are three types
    of stocks issued by a public company:


    - **Common stock (Class A):** This is what people normally refer to when they
    mention stocks. Common stock is issued by a company and is usually available through
    stock exchanges such as `Nasdaq`. The main advantages of common stock are payment
    in dividends and trade in an exchange. A dividend is typically a sum of money
    paid to the shareholders of a company at the end of a quarter out of the profits
    generated in that quarter. Common stock can also be traded or sold at any time
    on an accredited exchange. These can be codified as newly minted tokens issued
    to members of a DAO once the organization has been set up.'
