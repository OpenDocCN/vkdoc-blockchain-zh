    Foundation for our research implementation of Graphene on our Health Nexus protocol.
    Our university partners were Dr. Brian Levine and his postdoc student Dr. George
    Bissias of the University of Massachusetts–Amherst. Dr. Levine is the director
    of the Cybersecurity Institute in the [`College of Information & Computer Sciences`](https://www.cics.umass.edu/),
    where he focuses on security in the context of the internet and mobile systems,
    including child rescue, privacy, blockchains, cellular networks, and peer-to-peer
    networking. Drs. Levine and Bissias had successfully implemented Graphene on the
    Bitcoin blockchain. Our goal, which we achieved, was to similarly leverage this
    block propagation technology on Health Nexus to compress block size, improving
    blockchain performance. As the industry continues to wrestle with the complexities
    of decentralized systems such as speed, energy consumption, and efficiency (including
    cost), we are proud to have proven that Graphene is an effective tool in making
    a blockchain more efficient. Using the least amount of bandwidth and latency as
    possible has numerous advantages for a decentralized blockchain, and we are confident
    [it] will contribute to necessary innovation and efficiency in healthcare.


