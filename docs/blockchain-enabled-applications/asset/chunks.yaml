- fmt: '# State of the Blockchain Industry


    The state of the blockchain industry indicated massive growth in the last 3 years,
    since the second quarter of 2017. According to Smith & Crown, one of the most
    prominent cryptofinancial research companies, this has proven to be a period of
    immense growth across the blockchain industry. The cryptotokens markets are rising,
    doubling and tripling in value over the span of a few weeks. The Smith & Crown
    Index (`SCI`) has reflected a bull market for cryptotokens, more than doubling
    in value since 2017. The growth of capitalization in cryptotoken markets was accompanied
    by a frenzy of activity in the token sale market. By all accounts, the second
    quarter of 2017 was the beginning of a record-setting period.^([^(13)](#fn13))


    ## Blockchain Solution


    As we have stated in previous chapters, blockchain is an innovative solution for
    disrupting the inefficiencies in the financial system. Kastelein, the Chief Marketing
    Officer of Humaniq, noted that there are five basic principles underlying blockchain
    technology that allow blockchain to change how financial market transactions are
    created. It’s worth repeating the five basic principles underlying the technology:


    - **Distributed database:** Each party on a blockchain has access to the entire
    database and its complete history. No single party controls the data or the information.
    Every party can verify the records of its transaction partners directly, without
    an intermediary.

    - **Peer-to-peer transmission:** Communication occurs directly between peers instead
    of through a central node. Each node stores and forwards information to all other
    nodes.

    - **Transparency with pseudonymity:** Every transaction and its associated value
    is visible to anyone with access to the system. Each node, or user, on a blockchain
    has a unique thirty-plus-character alphanumeric address that identifies it. Users
    can choose to remain anonymous or provide proof of their identity to others. Transactions
    occur between blockchain addresses.

    - **Irreversibility of records:** Once a transaction is entered in the database
    and the accounts are updated, the records cannot be altered, because they’re linked
    to every transaction record that came before them (hence the term *chain*). Various
    computational algorithms and approaches are deployed to ensure that the recording
    on the database is permanent, chronologically ordered, and available to all others
    on the network.

    - **Computational logic:** The digital nature of the ledger means that blockchain
    transactions can be tied to computational logic and in essence be programmed.
    Users can therefore set up algorithms and rules that automatically trigger transactions
    between nodes.^([^(14)](#fn14))


    Tapscott stated:


    > *For the first time in human history, two or more parties, be they businesses
    or individuals who may not even know each other, can forge agreements, make transactions,
    and build value without relying on intermediaries (such as banks, rating agencies,
    and government bodies such as the US Department of State) to verify their identities,
    establish trust or perform the critical business logic—contracting, clearing,
    settling, and record-keeping tasks, that are foundational to all forms of commerce.*^([^(15)](#fn15))


    Blockchain applications can reduce transaction costs for all participants in an
    economy via peer-to-peer transactions and collaboration. Blockchain is truly a
    game-changing financial-markets solution using new technology and empowered by
    thought leadership.


    ## Venture Capital and ICOs


    The real question is this: Will ICOs supplant traditional venture capital as a
    fundraising model? Few could ever have imagined that within one year the venture
    capital industry could be so outpaced and changed by the new innovative methods
    of fundraising called ICOs. ICOs, also known as token sales, came together as
    blockchain technology, crowdfunding, innovative wealth ideas, and cryptocurrencies
    investing developed new models. ICOs are both a threat and an opportunity for
    the venture capital industry.


    The traditional venture capitalist sees opportunities in ICOs for profits from
    cryptocurrency, blockchain investments, liquidity, and potential for faster financial
    gains. There might be a disruption in the way traditional venture capitalists
    operate and in their position in the market. This is a great concern and time
    of change in the financial markets driven by technological innovation. The SEC
    recently asserted in a letter that ICOs are subject to security laws. The certainty
    that the SEC will act on cryptocurrency issues and ICOs clears up one big question.
    However, it is unclear how individuals, groups, and offerings become SEC compliant.
    The process will take time to resolve and for rules and precedents to be established.'
