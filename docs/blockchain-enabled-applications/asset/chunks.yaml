  trans: '

    ### 前方的技术挑战


    > *构建这一系统将是一项艰巨的任务，但鉴于其问题的重要性，我们认为值得投入。目前，三大技术挑战尤为突出。*


    > *无盲点监控*：系统若要实现可验证的信任，就必须确保所有数据使用行为均被记录在账本中——否则概念便不成立。除了设计日志记录数据交互的时间、性质和目的，我们还希望能证明后台没有其他软件秘密操作数据。除了记录账本中每一次数据交互，我们还需要通过[形式化方法](https://en.wikipedia.org/wiki/Formal_methods)以及专家对代码和数据中心的审计，来证明数据中心内每个软件对数据的每次访问都被这些日志所捕获。此外，我们也在关注如何保证运行这些系统的硬件可信度——这是计算机科学研究中的一个活跃课题！


    > *针对不同群体的差异化用途*：核心实现是一个接口，允许合作医院实时可验证地确认我们仅将患者数据用于经批准的目的。若这些合作伙伴希望将此能力扩展至其他人（如患者或患者群体），则需解决复杂的设计问题。


    > *对于许多患者而言，长长的日志条目可能不实用，有些人可能更倾向于阅读汇总视图或依赖可信的中介。同样，患者群体可能无权查看可识别身份的数据，这意味着需要允许我们的合作伙伴提供某种形式的系统级信息——例如，机器学习算法是否在特定数据集上运行过——同时避免无意中泄露患者数据。*


    > *关于如何提供对数据子集或摘要的可验证访问的技术细节，请参见我们即将使用的开源项目 [Trillian](https://github.com/google/trillian)
    以及这篇[解释其工作原理的论文](https://github.com/google/trillian/blob/master/docs/VerifiableDataStructures.pdf)。*


    > *去中心化的数据与日志，不留缺口*：英国不存在单一的患者身份信息数据库，因此医疗流程涉及数据在医疗服务提供者、IT 系统乃至可穿戴设备等患者自控服务之间来回传输。目前已有大量工作致力于实现这些系统的互操作性（我们的移动产品
    [Streams 即按互操作标准构建](https://deepmind.com/applied/deepmind-health/working-nhs/how-were-helping-today/)），以确保它们能安全协同工作。若这些标准能同时纳入可审计性，将有助于避免数据在系统间传输时出现审计盲区。


    > *这并不意味着像 DeepMind 这样的数据处理方应查看其他系统的数据或审计日志。日志应像数据本身一样保持去中心化。审计互操作性仅旨在额外确保数据在系统间传输时无法被篡改。*


    > *这是一项重大的技术挑战，但我们认为应当可以实现。具体而言，医疗互操作性领域正出现一种名为 FHIR 的开放标准，它有望通过有益的方式扩展以纳入可审计性。*


    ### 开放式构建


    > *我们希望能在今年晚些时候实施首批组件，并计划通过博客公开分享进展与途中遇到的挑战。我们深知这非常艰难，而最严峻的挑战绝非技术层面。我们希望通过公开分享流程、坦诚记录失误，能与尽可能多的人合作并获取反馈，从而提升此类基础设施未来在医疗领域乃至更广范围得到更广泛应用的几率。*


    ## 总结


    本章聚焦区块链在支付处理中的新兴角色及其如何应用于医疗领域。讨论以描述中心化的支付方-提供方-患者模型以及该模型在不远的将来将如何变化作为开端。随后，我们探讨了如何利用区块链构建一个简易的电子健康记录系统，继而展示了如何将患者工作流记录在区块链上。这引出了对医生资质认证用例的简要讨论。最后，我们探讨了
    Ark Invest 和 Gem 提出的医疗领域经济浪费问题，以及区块链如何在不久的将来缓解部分压力。


    # 10. 精益区块链


    对于有兴趣构建区块链产品的开发者而言，单纯投入时间研究技术是不够的。区块链堆栈包含深度融入技术模型的业务逻辑。因此，有必要初步熟悉那些正式描述初创企业组件以及如何围绕产品打造公司的框架。本章以精益方法论开篇，该模式由埃里克·莱斯创立，基于三大核心原则：


    1. 将你的想法中最基础的版本转化为客户可互动的产品。

    2. 尽早并经常与潜在客户沟通。

    3. 根据客户反馈迭代基础模型，以实现完全符合客户需求的最终产品。


    同时，我们铭记埃里克的这句话：“在构建最小可行产品时，请遵循这条简单规则：移除任何对你想获取的认知无贡献的功能、流程或努力。”随后，我们介绍了将精益方法论分解为九个可应用组件的商业模式画布。此外，我们探讨了杰弗里·摩尔针对高风险、高回报技术提出的产品-市场契合方法。接着，我们提出了三种模型，以帮助判断你的组织是否适合使用区块链。一旦决定采用区块链，超级账本项目提供了多个可定制部署的企业级区块链选项。最后，本章以对超级账本
    Composer 及其用于捕获业务逻辑的模板的简要概述作为收尾。

    '
- fmt: "# Lean Methodology\n\nLean methodology is a set of principles for developing\
    \ products that aims to iteratively question whether a proposed business model\
    \ solves a problem that the customers actually want, rather than planning for\
    \ a product without any end-point customer in mind. This is accomplished by shorter\
    \ product development cycles followed by multiple releases to get customer feedback,\
    \ business hypothesis experimentation, and validated learning. `Eric Ries` is\
    \ the founder of lean methodology. It provides a framework for bringing high-risk,\
    \ high-reward technologies like the blockchain to market. For any organization\
    \ trying to incorporate blockchain or experiment with new services that can be\
    \ offered on blockchain, a rigorous framework is necessary to assess whether the\
    \ organization will benefit from a blockchain. The practical application of lean\
    \ methodologies will provide such a toolset, and in this section we want to introduce\
    \ the fundamentals of lean to the reader:\n\n- **Minimum viable product (MVP):**\
    \ Arguably the most important aspect of lean methodology. A minimum viable product\
    \ is the earliest version of a product with a limited number of features designed\
    \ only to draw in early adopters for the purpose of obtaining data and feedback\
    \ on the core concept. MVPs must be designed with the least amount of effort directed\
    \ into assembly and yield the most amount of data about your product and ideas.\
    \ For instance, a service offering custom stickers does not need to spend months\
    \ designing intricate stickers. Instead, a simple landing page with a few sticker\
    \ designs is enough to ask the more important question: Do customers want those\
    \ stickers? A landing page can test this hypothesis, and our MVP can provide guidance\
    \ on how to update the product such that it aligns with the needs of our customers.\
    \ The features packed in MVPs are rudimentary, but the purpose here is not to\
    \ showcase unique features, but rather to get in front of customers as soon as\
    \ possible. Carefully defining an MVP to be actionable and mining for customer\
    \ data is the first step in successfully bringing a high-risk, high-reward product\
    \ to market.\n\n- **Pivot:** During the iterative development of an MVP, customer\
    \ interactions will provide valuable guidance on new features and updates to build.\
    \ However, some customer interactions may point to deficiencies in your product\
    \ and the need for fundamental changes to your core concept. At this point, you\
    \ have two choices: either pivot or persevere. A pivot is the idea of changing\
    \ a very limited set of product attributes and generating a new MVP to prove that\
    \ your core concept is evolving in sync with the demands of your customer. Having\
    \ a limited number of changes allows you to examine the direct effect that maximizes\
    \ your reach to the customer. On the other hand, a persevere approach is a bold\
    \ risk that further experimentation and tweaking of your product will satisfy\
    \ the customer. `Eric Ries` suggests that a metric of bandwidth for a startup\
    \ is not necessarily capital, but the number of pivots it can make before the\
    \ product is ready for mass adoption. Decisions to pivot are crucial branch points\
    \ and therefore pose risks. The use of split-testing can greatly help stratify\
    \ and reduce the risk.\n\n- **Product-market fit:** This is a stage in your iterative\
    \ design when the MVP has become feature-rich and the early adopters are convincing\
    \ more pragmatic users to try your product. Product-market fit places your product\
    \ just at the cusp of reaching mass adoption. At this stage, you have validated\
    \ all the hypotheses regarding your product, and the product is in sync with what\
    \ the market needs. However, your product needs additional support from marketing\
    \ and sales engines to capture the market and generate revenue. Essentially, the\
    \ other services in a startup need to be built and deployed.\n\n- **Business hypothesis\
    \ experimentation:** Assumptions are ingrained in product development (especially\
    \ when developing a high-risk, high-reward idea), and each assumption carries\
    \ a risk of failure. Lean reframes the assumptions as hypotheses that need to\
    \ be proven or disproven before the cycle of product development can progress\
    \ further. This reduces the cumulative risk by ensuring that our assumptions are\
    \ internally consistent and validated by the customer. A popular technique for\
    \ hypothesis testing in lean startup is called split-testing (or A/B testing).\
    \ In A/B testing, we present two different design decisions to end users wherein\
    \ half of the early adopters are shown one design feature, and the other half\
    \ are shown a different feature. Data is collected from both user groups to help\
    \ determine which design choice was better appreciated by users. In addition,\
    \ this data collection provides opportunities for direct customer interviews to\
    \ gain more insight into how the user interacted with the new functionality. There\
    \ are two major benefits to using this approach. First, you can directly gauge\
    \ the impact of your work on users. As developers, we may obsess over writing\
    \ more-sophisticated code or developing interesting features that end users ultimately\
    \ may not care about. Secondly, A/B testing eliminates conflicts around the priority\
    \ of feature development—new features can be added to the MVP with each iteration\
    \ and followed up with A/B testing. We can let data inform us about the features\
    \ that a user considers relevant. In this manner, if a limited number of changes\
    \ are made to the MVP, gathering data can reflect whether the changes translate\
    \ to increased user retention and other parameters.\n\n- **Validated learning:**\
    \ A/B testing is helpful only if you and your team have the discipline to analyze\
    \ the experiments rigorously and learn from them. `Eric Ries` talks about three\
    \ properties that contribute to validated learning, summarized as the three A's:\
    \ actionable, accessible, and auditable.\n  - Actionable: Well-designed experiments\
    \ will reveal a causal relationship between changes made to an MVP and new users\
    \ acquired. These experiments generate data that is actionable as they provide\
    \ a direction for future development.\n  - Accessible: The data collected and\
    \ metrics used must be simple and accessible to every member on the team. In particular,\
    \ metrics can become very misleading to anyone collecting the data. As such, what\
    \ we’re trying to measure and the importance of those data points should be stated\
    \ in the simplest possible terms, and be open to comments from any member of the\
    \ team.\n  - Auditable: This is analogous to an independent review of your validated\
    \ learning and experimental design process. Anyone should be able to go through\
    \ the raw data and trace the metrics to reach the same recommendations for each\
    \ iteration of your MVP. This builds rigor in the lean startup model and adds\
    \ data-based justifications for pivot or persevere decisions.\n\n**Note**\n\n\
    Lean startup was adopted and transformed by the National Science Foundation into\
    \ a formal curriculum for university-based researchers who want to commercialize\
    \ their technology. The Innovation Corps Program (I-Corps) trains teams of researchers\
    \ and entrepreneurs for twelve weeks and equips them with the customer discovery\
    \ skills. Every week is an iteration of the MVP based strictly on customer interviews,\
    \ and the teams receive feedback from a panel of experts at the site hosting the\
    \ I-Corps program. Each team comprises a technical lead, an entrepreneurship lead,\
    \ and an I-Corps mentor. The teams are required to log weekly customer interviews\
    \ and present updates to their business model canvas (which we discuss next).\
    \ Major decisions such as pivot points are made based on documented data trends\
    \ from interviews, making the whole customer-interview process very rigorous."
