- fmt: '# Patient Workflow


    Our workflow begins with Jane visiting her primary care physician (PCP) for a
    checkup following gastric discomfort after eating certain foods. Her physician
    suspects a viral infection and orders lab work to be performed. She is further
    referred to a specialist, who makes the final diagnosis and works with her to
    develop a treatment plan. Every step of this workflow is recorded on the blockchain
    as a part of Jane’s medical record, with appropriate permissions regarding access
    rights and ownership. Additionally, Jane’s records would also contain a history
    of every checkout and check-in, including the edits and additions that were made
    to the medical record. Closely tracking how the ownership changes helps us transition
    between the different points of care provided to Jane, and she has instant access
    to her medical records at each step as a more comprehensive picture of her health
    begins to emerge.


    The main objective of this workflow is to demonstrate the concept of how blockchain
    handles permissions and transfer of ownership between multiple unrelated parties.
    The use of user signatures using cryptographic keys is leveraged in creating this
    rudimentary medical record system. We can understand the attributes and permissions
    within our workflow better using the terminology of version control systems. Just
    as `Git` or `SVN` have commit messages and code commits, every check-in of new
    data to the medical record will contain commit messages about what changes were
    made. The blockchain becomes a remote repository of sorts (like `GitHub`) to which
    `Git` can push new changes. There are also locking mechanisms to protect the data:
    once a document from the medical record is checked out to a user (a doctor or
    a nurse), it will get locked, and no other user can check-in new changes to the
    same document until the original user checks in their edits, unlocking the document.
    Figures [9-2](#430562_2_En_9_Chapter.xhtml#Fig2), [9-3](#430562_2_En_9_Chapter.xhtml#Fig3),
    and [9-4](#430562_2_En_9_Chapter.xhtml#Fig4) guide us through this workflow.


    ![../images/430562_2_En_9_Chapter/430562_2_En_9_Fig2_HTML.jpg](images/430562_2_En_9_Chapter/430562_2_En_9_Fig2_HTML.jpg)


    Figure 9-2 — Initial patient visit


    In Figure [9-2](#430562_2_En_9_Chapter.xhtml#Fig3), the workflow begins with Jane
    visiting her general physician for a regular checkup. The physician takes a history
    and records any symptoms that stand out from a review of her body systems. He
    adds this information to a very standard method of documenting patient history
    called a `SOAP` note. The note will be added to the blockchain with a unique ID
    called the `hash`. Along with the `hash`, the physician will add permission and
    user-group roles for accessing the medical record. Initially, only the physician
    and the patient would have access, but this can be expanded easily. Finally, the
    note is signed using the physician’s key to denote the initial commit of Jane’s
    medical record to the blockchain. Once Jane’s records are pushed to the blockchain,
    she can also instantly access them.


    ![../images/430562_2_En_9_Chapter/430562_2_En_9_Fig3_HTML.jpg](images/430562_2_En_9_Chapter/430562_2_En_9_Fig3_HTML.jpg)


    Figure 9-3 — Jane undergoing some lab testing ordered by the physician


    In Figure [9-3](#430562_2_En_9_Chapter.xhtml#Fig2), Jane’s physician ordered some
    lab tests to be performed, so two days later, she visits a lab. The tests have
    been entered into her medical record along with the permissions to let a nurse
    at the lab access the details. The physician can easily set the access permissions
    and add new upload privileges for the nurse on the medical record. This workflow
    begins before Jane’s arrival, when the nurse retrieves her record and begins preparing
    for the tests. As Jane arrives, they have a consult, and the nurse informs her
    of the tests she will be going through. After performing the tests, a report is
    generated and appended to Jane’s records on the blockchain. We can see this on
    the right side where Jane’s general record now has a new add-on for the lab tests
    recently performed. All these results are instantly available to Jane as they
    are uploaded.


    ![../images/430562_2_En_9_Chapter/430562_2_En_9_Fig4_HTML.jpg](images/430562_2_En_9_Chapter/430562_2_En_9_Fig4_HTML.jpg)


    Figure 9-4 — Jane being referred to a specialist


    In Figure [9-4](#430562_2_En_9_Chapter.xhtml#Fig4), a new step is added to the
    workflow: Jane decides to visit a specialist to better understand the lab results.
    Two days later, she shares her medical records up to now with a specialist. At
    this point, the specialist has two choices: she can examine Jane’s records and
    have a diagnosis along with a treatment plan prepared for her without even needing
    a visit. Or, Jane can go in for a consult and work with the specialist to adopt
    the treatment plan. The first option may help reduce the cost of visits and services
    received for Jane, as ultimately the treatment plan and diagnosis will both be
    made available to her on the blockchain. This completes the workflow from her
    initial visit to the point that she received a diagnosis. Every step of this workflow
    from the original notes to the final treatment plan were recorded on the blockchain.
    However, in the case of a patient with a chronic disease, the records from this
    point would be transferred to a chronic care facility that can check up on Jane
    regularly and help her maintain good health.


    ## Hot Switching


    `Hot switching` is a design principle enabled by the blockchain to create networks
    where components can be swapped out, while the system as a whole is running with
    minimal latency in operations. The purpose of hot switching is to re-route the
    flow of information, and this concept is only made possible due to the decentralized
    nature of the blockchain; i.e., there is no single point of failure. Why do we
    need a new concept such as hot switching at all? Traditional schedulers perform
    this job fairly well. An operational blockchain-based medical records system will
    require both live and off-chain components that are synced to the blockchain.
    IT infrastructure in hospitals should be very stable with minimal downtime, but
    hot switching can enable isolated system upgrades without disruptions, and gradually
    transition the legacy systems that are still active to be compatible with the
    blockchain.


    There are two early implementations of hot switching available: the lightning
    network and pluggable consensus. So, what is this lightning network? The alpha
    version of lightning offers a mechanism to send transactions over new micropayment
    channels (sub-channels). This transfer of value occurs off-chain, thereby making
    transactions instantaneous. These channels ultimately sync upstream with the blockchain
    and preserve the data integrity of the overall network. In a similar fashion,
    off-chain channels can replicate and temporarily store the intermittent requests
    for access and release medical records based on pre-approved access controls.
    After some defined period, the lightning channel can sync the intermediate changes
    with the blockchain and become inactive. The second application of hot switching
    is pluggable consensus, which refers to the idea that you can swap out your consensus
    algorithm based on the types of transactions being handled on the blockchain.
    For instance, private transactions carried out on a public–private partitioned
    blockchain may require a different consensus mechanism than general-purpose transactions.
    Therefore, multiple consensus algorithms are allowed on a blockchain. We will
    discuss the implementation of pluggable consensus in more detail in a later chapter.


    Note


    Payment channels are one implementation of the hot switching concept in Ethereum
    2.0\. Modularity in designing blockchains offers significant advantages toward
    building complex applications and interacting with external infrastructure (such
    as an oracle or a data source).'
