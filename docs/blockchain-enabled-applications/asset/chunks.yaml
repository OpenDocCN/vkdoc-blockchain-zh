- fmt: "由于 gas 成本，在链上验证计算本质上是一项昂贵的任务。`ECM` 的设计使得链下计算比在 `EVM` 中运行任务更便宜。从技术角度来看，有两种类型的链上执行实现：无状态计算和有状态计算。图\
    \ [7-4](#430562_2_En_7_Chapter.xhtml#Fig4) 展示了这两种实现之间的对比。\n\n如果一项计算是自给自足的，即不需要任何外部数据源，则该可执行合约是无状态的。本质上，前一步的返回值被用作下一步的输入。`Piper\
    \ Merriam`（`ECM` 的创建者）提出，无状态可执行合约优于有状态实现，主要原因有两个：编写算法时开销更低，以及由于计算周期是自持的，降低了复杂性。`Piper`\
    \ 强调的一个例子是斐波那契数列，它被编写为一个无状态实现，算法将最新的斐波那契数列作为下一执行周期的输入。以无状态形式编写此算法的开销非常小，并且没有引入本地存储的额外复杂性。\n\
    \n> **提示**\n> 对于无状态合约，执行合约与作为计算请求发送到市场进行计算的算法是相同的。在这里，链上验证将运行执行合约一个周期，而主机将运行它所需的尽可能多的周期以获得最终答案。\n\
    \n如果一项计算不是自给自足的，即需要额外的数据源以及前一步的返回值，则该可执行合约是有状态的。这个额外的数据源通常是一个持有本地存储的数据结构。让我们回到斐波那契数列的例子，现在让它变得有状态。为此，算法会将每个计算出的数字存储在合约存储中，并且只将最新的数字返回给算法以进行下一执行周期。执行的每一步都需要算法搜索最后存储的数字，以便计算下一个数字。通过包含存储，算法现在必须搜索已保存的结果，并输出任何已计算出的所需斐波那契序列。对本地状态的依赖使得这个合约实例成为有状态。有状态合约支持新的复杂功能，例如使用查找表和搜索，但也导致编写的算法复杂性增加。\n\
    \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig4_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig4_HTML.jpg)\n\
    \n**图 7-4**  \n以太坊计算市场中的工厂执行合约的两种模型\n\n在图 [7-4](#430562_2_En_7_Chapter.xhtml#Fig4)\
    \ 的链上验证过程中，将执行执行合约的一个周期。然而，无状态形式的自包含合约将高效地执行，且没有任何额外的复杂性。在无状态合约中，在 `EVM` 内部执行的每一步都是基本的，因此它在那个虚拟机的\
    \ `gas` 限制之内。另一方面，由于执行的复杂性，一些合约需要额外的存储。在这种情况下，会执行有状态合约，其中本地存储在链上验证期间绑定到 `EVM`。此存储是临时的，仅在链上处理期间存在。\n\
    \n## Golem 网络\n\n`Golem` 是一个去中心化的通用超级计算网络。除了作为计算资源租用市场之外，`Golem` 还旨在为微服务提供动力并允许异步任务执行。作为一个技术栈，`Golem`\
    \ 通过去中心化的区块链栈为开发者提供了基础设施即服务（`IaaS`）和平台即服务（`PaaS`）。在 `Golem` 中，有三个组件作为去中心化市场的支柱：\n\
    \n*   **去中心化农场：** 一种发送、组织和执行来自个体用户（称为请求者）和主机（称为提供者，提供计算资源）的计算任务的机制。这为用户提供了竞争性价格，用于诸如\
    \ `CGI` 渲染和网络访问上的机器学习等任务。\n\n*   **交易框架：** `Golem` 拥有一个自定义支付框架，供开发者将开发并运行在去中心化网络上的服务和软件货币化。此框架可以定制，以通过新颖创新的方式捕获价值，例如在以太坊区块链上的托管、保险和审计证明。\n\
    \n*   **应用注册表：** 开发者可以创建利用 `Golem` 作为分发渠道和拥有新颖独特货币化方案的市场（针对特定任务）的应用程序。这些应用可以发布到应用注册表，该注册表本质上作为该网络的`应用商店`。\n\
    \n`Golem` 构建市场的前提是并非所有成员都会一直需要额外的资源进行大量计算。因此，请求者可以成为提供者，出租自己的硬件以赚取额外费用。图 [7-5](#430562_2_En_7_Chapter.xhtml#Fig5)\
    \ 概述了 `Golem` 中的三个组件如何协同工作。目前，`Golem` 从以太坊继承其完整性（拜占庭容错）和共识机制，用于任务的部署、执行和验证。然而，最终\
    \ `Golem` 将使用完全功能的微支付通道来运行构建在 `Layer 2.0` 升级之上的微服务。这将允许用户以完全去中心化的方式运行服务，例如笔记应用、托管网站，甚至大规模流媒体应用。在\
    \ `Golem` 达到该成熟度水平之前，还需要进行一些优化；目前，最紧迫的发展涉及任务的执行。在执行通用任务之前，我们需要确保计算发生在一个没有特权的隔离环境中，类似于\
    \ `EVM`，但扩展了更多功能。我们还需要应用注册表中认可的白名单和黑名单机制以及数字签名，这允许提供者建立信任网络，并允许用户运行由可信开发者进行加密签名的应用程序。此外，需要一个网络范围的信誉系统来奖励在计算任务中参与最多的提供者，同时检测恶意节点并有效地缓解任务。\n\
    \n> **注意**\n> 第一个版本，称为 `Brass Golem`，只允许一种类型的任务在网络上执行——`CGI` 渲染。此版本的主要目标是验证任务注册表并拥有一个基本的任务定义方案。开发者希望集成\
    \ `IPFS` 用于去中心化存储、为相关提供者建立基本的信誉系统，以及在网络中集成 `Docker`。后续版本增加了本节后面讨论的新功能。\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig5_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5**  \n`Golem` 技术栈"
  raw: 'On-chain verification of a computation is by nature an expensive task due
    to gas costs. ECM is designed such that off-chain computation would be cheaper
    than running a task in EVM. From a technical standpoint, there are two types of
    on-chain execution implementations: stateless and stateful computations. Figure
    [7-4](#430562_2_En_7_Chapter.xhtml#Fig4) shows a contrast between the two implementations.


    An executable contract is stateless if the computation is self-sufficient in that
    it does not require any external sources of data. Essentially, the return value
    from a previous step is used as the input for the next step. Piper Merriam (the
    creator of ECM) proposes that stateless executable contracts are superior to stateful
    implementations for two main reasons: lower overhead while writing the algorithm
    and reduced complexity because the computation cycles are self-sustaining. An
    example highlighted by Piper is the Fibonacci sequence written as a stateless
    implementation with the algorithm returning the latest Fibonacci numbers as the
    input for the next cycle of execution. The overhead of writing this in a stateless
    form is very minor, and there is no additional complexity of introducing local
    storage.


    Tip


    For stateless contracts, the execution contract is identical to the algorithm
    sent as a request to the marketplace for computation. Here, on-chain verification
    would run the execution contract for one cycle, and hosts would run it for as
    many cycles necessary to obtain the final answer.


    An executable contract is stateful if the computation is not self-sufficient in
    that it requires an additional data source and the return values from the previous
    step. This additional data source is often in the form of a data structure holding
    local storage. Let’s go back to our example of the Fibonacci sequence, and now
    let’s make it stateful. To do this, the algorithm would store each computed number
    in the contract storage and only return the latest number to the algorithm for
    the next cycle of execution. Every step of execution would require the algorithm
    to search for the last number stored in order to compute the next number. By including
    storage, the algorithm must now search through saved results and print out any
    desired Fibonacci sequence that has been computed. This reliance on local state
    is what makes this instance of the contract stateful. Stateful contracts enable
    new and complex features such as using lookup tables and search, but also cause
    an increase in the complexity of the written algorithm.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig4_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Two models for factory execution contracts in Ethereum Comptuational Markets


    During on-chain verification in Figure [7-4](#430562_2_En_7_Chapter.xhtml#Fig4),
    a single cycle of the execution contract will be executed. However, a self-contained
    contract in stateless form will be executed efficiently and without any additional
    complexity. In stateless contracts, each step executed inside an EVM is elementary,
    so it falls within the gas limits of that virtual machine. On the other hand,
    some contracts require additional storage due to the complexity of execution.
    In such cases, a stateful contract is executed where local storage is bound to
    the EVM during the on-chain verification. This storage is temporary and only exists
    through the duration of the on-chain processing.


    ## Golem Network


    Golem is a decentralized general-purpose supercomputing network. In addition to
    being a marketplace for renting computational resources, Golem aims to power microservices
    and allow asynchronous task execution. As a technology stack, Golem offers both
    Infrastructure-as-a-Service (IaaS) and Platform-as-a-Service (PaaS) through a
    decentralized blockchain stack for developers. In Golem, there are three components
    that function as the backbone of a decentralized market:


    *   **Decentralized farm:** A mechanism to send, organize, and execute computation
    tasks from individual users known as requesters and hosts known as providers (of
    computational resources). This provides the users competitive prices for tasks
    such as CGI rendering and machine learning on network access.


    *   **Transaction framework:** Golem has a custom payment framework for developers
    to monetize services and software developed to run on the decentralized network.
    This framework can be customized to capture value in new and innovative methods,
    such as escrows, insurance, and audit proofs, on the Ethereum blockchain.


    *   **Application registry:** Developers can create applications (for particular
    tasks) that take advantage of Golem as a distribution channel and a marketplace
    with new and unique monetization schemes. These applications can be published
    to the application registry, which essentially functions as an app store for the
    network.


    Golem’s premise in building the marketplace is that not all members will request
    additional resources for extensive computation at all times. As such, the requesters
    can become providers and rent their own hardware to earn extra fees. Figure [7-5](#430562_2_En_7_Chapter.xhtml#Fig5)
    provides an overview of how the three components in Golem work in sync. Currently,
    Golem inherits the integrity (Byzantine fault tolerance) and consensus mechanisms
    from Ethereum for the deployment, execution, and validation of tasks. However,
    eventually Golem will use fully functional micropayment channels for running microservices
    built on Layer 2.0 upgrades. This will allow users to run services like a note-taking
    app or hosting websites and even large-scale streaming applications in a completely
    decentralized manner. Several more optimizations are needed before Golem reaches
    that level of maturity; currently, the most pressing developments concern the
    execution of tasks. Before Golem can execute general-purpose tasks, we need to
    ensure that the computation takes place in an isolated environment without privileges,
    similar to an EVM but expanded with more features. We also need whitelist and
    blacklist mechanisms along with digital signatures recognized in the application
    registry, which allow providers to build a trust network and allow users to run
    applications cryptographically signed by trusted developers. Additionally, a network-wide
    reputation system is necessary to reward the providers that have participated
    the most during computation tasks and also to detect a malicious node and mitigate
    tasks efficiently.


    Note


    The first release, dubbed Brass Golem, only allows one type of task to be executed
    on the network—CGI rendering. The main goals of this release are to validate the
    task registry and to have a basic task definition scheme. The developers want
    to integrate IPFS for decentralized storage, a basic reputation system for the
    providers involved, and Docker integration in the network. Future releases have
    added new features discussed later in this section.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig5_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig5_HTML.jpg)


    Figure 7-5


    The Golem technology stack'
  trans: "\n由于 gas 成本，在链上验证计算本质上是一项昂贵的任务。`ECM` 的设计使得链下计算比在 `EVM` 中运行任务更便宜。从技术角度来看，有两种类型的链上执行实现：无状态计算和有状态计算。图\
    \ 7-4 展示了这两种实现之间的对比。\n\n如果一项计算是自给自足的，即不需要任何外部数据源，则该可执行合约是无状态的。本质上，前一步的返回值被用作下一步的输入。`Piper\
    \ Merriam`（`ECM` 的创建者）提出，无状态可执行合约优于有状态实现，主要原因有两个：编写算法时开销更低，以及由于计算周期是自持的，降低了复杂性。`Piper`\
    \ 强调的一个例子是斐波那契数列，它被编写为一个无状态实现，算法将最新的斐波那契数列作为下一执行周期的输入。以无状态形式编写此算法的开销非常小，并且没有引入本地存储的额外复杂性。\n\
    \n> **提示**\n> 对于无状态合约，执行合约与作为计算请求发送到市场进行计算的算法是相同的。在这里，链上验证将运行执行合约一个周期，而主机将运行它所需的尽可能多的周期以获得最终答案。\n\
    \n如果一项计算不是自给自足的，即需要额外的数据源以及前一步的返回值，则该可执行合约是有状态的。这个额外的数据源通常是一个持有本地存储的数据结构。让我们回到斐波那契数列的例子，现在让它变得有状态。为此，算法会将每个计算出的数字存储在合约存储中，并且只将最新的数字返回给算法以进行下一执行周期。执行的每一步都需要算法搜索最后存储的数字，以便计算下一个数字。通过包含存储，算法现在必须搜索已保存的结果，并输出任何已计算出的所需斐波那契序列。对本地状态的依赖使得这个合约实例成为有状态。有状态合约支持新的复杂功能，例如使用查找表和搜索，但也导致编写的算法复杂性增加。\n\
    \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig4_HTML.jpg](img/430562_2_En_7_Fig4_HTML.jpg)\n\
    \n**图 7-4**  \n以太坊计算市场中的工厂执行合约的两种模型\n\n在图 7-4 的链上验证过程中，将执行执行合约的一个周期。然而，无状态形式的自包含合约将高效地执行，且没有任何额外的复杂性。在无状态合约中，在\
    \ `EVM` 内部执行的每一步都是基本的，因此它在那个虚拟机的 `gas` 限制之内。另一方面，由于执行的复杂性，一些合约需要额外的存储。在这种情况下，会执行有状态合约，其中本地存储在链上验证期间绑定到\
    \ `EVM`。此存储是临时的，仅在链上处理期间存在。\n\n## Golem 网络\n\n`Golem` 是一个去中心化的通用超级计算网络。除了作为计算资源租用市场之外，`Golem`\
    \ 还旨在为微服务提供动力并允许异步任务执行。作为一个技术栈，`Golem` 通过去中心化的区块链栈为开发者提供了基础设施即服务（`IaaS`）和平台即服务（`PaaS`）。在\
    \ `Golem` 中，有三个组件作为去中心化市场的支柱：\n\n*   **去中心化农场：** 一种发送、组织和执行来自个体用户（称为请求者）和主机（称为提供者，提供计算资源）的计算任务的机制。这为用户提供了竞争性价格，用于诸如\
    \ `CGI` 渲染和网络访问上的机器学习等任务。\n\n*   **交易框架：** `Golem` 拥有一个自定义支付框架，供开发者将开发并运行在去中心化网络上的服务和软件货币化。此框架可以定制，以通过新颖创新的方式捕获价值，例如在以太坊区块链上的托管、保险和审计证明。\n\
    \n*   **应用注册表：** 开发者可以创建利用 `Golem` 作为分发渠道和拥有新颖独特货币化方案的市场（针对特定任务）的应用程序。这些应用可以发布到应用注册表，该注册表本质上作为该网络的`应用商店`。\n\
    \n`Golem` 构建市场的前提是并非所有成员都会一直需要额外的资源进行大量计算。因此，请求者可以成为提供者，出租自己的硬件以赚取额外费用。图 7-5 概述了\
    \ `Golem` 中的三个组件如何协同工作。目前，`Golem` 从以太坊继承其完整性（拜占庭容错）和共识机制，用于任务的部署、执行和验证。然而，最终 `Golem`\
    \ 将使用完全功能的微支付通道来运行构建在 `Layer 2.0` 升级之上的微服务。这将允许用户以完全去中心化的方式运行服务，例如笔记应用、托管网站，甚至大规模流媒体应用。在\
    \ `Golem` 达到该成熟度水平之前，还需要进行一些优化；目前，最紧迫的发展涉及任务的执行。在执行通用任务之前，我们需要确保计算发生在一个没有特权的隔离环境中，类似于\
    \ `EVM`，但扩展了更多功能。我们还需要应用注册表中认可的白名单和黑名单机制以及数字签名，这允许提供者建立信任网络，并允许用户运行由可信开发者进行加密签名的应用程序。此外，需要一个网络范围的信誉系统来奖励在计算任务中参与最多的提供者，同时检测恶意节点并有效地缓解任务。\n\
    \n> **注意**\n> 第一个版本，称为 `Brass Golem`，只允许一种类型的任务在网络上执行——`CGI` 渲染。此版本的主要目标是验证任务注册表并拥有一个基本的任务定义方案。开发者希望集成\
    \ `IPFS` 用于去中心化存储、为相关提供者建立基本的信誉系统，以及在网络中集成 `Docker`。后续版本增加了本节后面讨论的新功能。\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig5_HTML.jpg](img/430562_2_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5**  \n`Golem` 技术栈\n"
- fmt: "Three main components of the Golem stack are shown in Figure [7-5](#430562_2_En_7_Chapter.xhtml#Fig5).\
    \ Software developers create applications that automate routine tasks and publish\
    \ them on the application registry. For instance, a time-limited rendering application\
    \ can eliminate the need for any complicated transactions or task-tracking. The\
    \ buyer will simply make a single-use deposit and use the application until the\
    \ time is up. When buyers use applications from the registry, the revenue generated\
    \ is used to compensate the developers for their app. The registry contains two\
    \ types of applications in it: verified apps from trusted developers and new applications\
    \ from unconfirmed developers. Eventually, verifiers pool in the newly uploaded\
    \ applications and track them closely for any suspicious activity. After a few\
    \ uses, the new applications also get a verified status. The developers also receive\
    \ minor compensation from the execution of these applications on the provider\
    \ nodes. Providers requisition the hardware for apps, and a lion’s share of revenue\
    \ generated from running a task is given back to the providers (miners). The transaction\
    \ mechanism assures the proper delivery of funds to the appropriate party, and\
    \ the buyer is charged for task execution by the same mechanism.\n\n### Application\
    \ Registry\n\nThe application registry provides requesters with a massive repository\
    \ to search for specific tools or applications fitting their needs. The registry\
    \ is an Ethereum smart contract between three entities: authors, validators, and\
    \ providers. What’s the design rationale behind adding these three entities? For\
    \ general-purpose computing, the code is isolated in a sandbox and then executed\
    \ with the bare-minimum privileges. But potential software bugs could wreak havoc\
    \ in a provider’s sandbox, executing malicious code in a virtual machine with\
    \ the intention of escalating privileges, or even taking over the machine. That’s\
    \ why sandboxing alone is not enough for Golem. One could ask whether the code\
    \ can be evaluated automatically for safety and security. Theoretically, this\
    \ is not plausible. We cannot determine the outcome of a complex algorithm before\
    \ executing it due to the halting problem.\n\n> **Note**  \n> The halting problem\
    \ is the problem of determining whether a program will finish running or continue\
    \ to run forever given an arbitrary computer program and an input.\n\nTo enable\
    \ secure and trusted code execution on host machines, the application registry\
    \ is split between three parties that are responsible for maintaining the integrity\
    \ of the network. Authors publish decentralized applications to the registry,\
    \ validators review and certify DApps as safe by creating a whitelist, and providers\
    \ maintain blacklists of problematic DApps. Validators also maintain blacklists\
    \ by marking applications as malicious or spam, and providers often end up using\
    \ a blacklist from validators. Similarly, providers can pre-approve certain Golem-specific\
    \ applications (certified by validators) to execute on their nodes.\n\nProviders\
    \ can also elect to curate their own whitelists or blacklists. The default option\
    \ for Golem is to run using a whitelist of trusted applications. The first set\
    \ of apps will be verified by the developers to kickstart Golem; however, after\
    \ the initial distribution, the network will rely on validators. On the other\
    \ hand, providers can also take the approach of relying only on blacklists. This\
    \ approach has the advantage of maximizing the reach of a provider (to the marketplace)\
    \ and offering a wide range of applications that can be executed on a node. Eventually,\
    \ providers will become specialized and fine-tune their nodes to be incredibly\
    \ efficient at running one kind of task. This allows the providers more control\
    \ over what runs on their nodes and custom hardware options for a computing farm.\
    \ Ultimately, this option is available to developers who want to maximize their\
    \ profits and are willing to run dedicated machines with bleeding-edge software.\n\
    \nIn a decentralized network like Golem, we will see a divide between traditional\
    \ and vanguard validators. Traditional validators will maintain a set of stable\
    \ applications that perform very routine tasks. For instance, a request for a\
    \ complex 3D rendering can launch a preemptible rendering instance on a provider’s\
    \ nodes. Once the job is complete, the instance will terminate to free up memory\
    \ and send the output to the requester. On the other hand, vanguard validators\
    \ will include and approve software that pushes the boundaries of what is possible\
    \ with Golem. Running new and experimental software on a provider’s node will\
    \ require better sandboxing and hardening of the virtual machine. But these features\
    \ can be a premium add-on running on special nodes offered by a provider. Monetizing\
    \ the premium add-ons will also disincentivize scammers and malicious entities.\
    \ Overall, this design approach makes the network more inclusive, costly for scammers,\
    \ and innovative for developers."
  raw: 'Three main components of the Golem stack are shown in Figure [7-5](#430562_2_En_7_Chapter.xhtml#Fig5).
    Software developers create applications that automate routine tasks and publish
    them on the application registry. For instance, a time-limited rendering application
    can eliminate the need for any complicated transactions or task-tracking. The
    buyer will simply make a single-use deposit and use the application until the
    time is up. When buyers use applications from the registry, the revenue generated
    is used to compensate the developers for their app. The registry contains two
    types of applications in it: verified apps from trusted developers and new applications
    from unconfirmed developers. Eventually, verifiers pool in the newly uploaded
    applications and track them closely for any suspicious activity. After a few uses,
    the new applications also get a verified status. The developers also receive minor
    compensation from the execution of these applications on the provider nodes. Providers
    requisition the hardware for apps, and a lion’s share of revenue generated from
    running a task is given back to the providers (miners). The transaction mechanism
    assures the proper delivery of funds to the appropriate party, and the buyer is
    charged for task execution by the same mechanism.


    ### Application Registry


    The application registry provides requesters with a massive repository to search
    for specific tools or applications fitting their needs. The registry is an Ethereum
    smart contract between three entities: authors, validators, and providers. What’s
    the design rationale behind adding these three entities? For general-purpose computing,
    the code is isolated in a sandbox and then executed with the bare-minimum privileges.
    But potential software bugs could wreak havoc in a provider’s sandbox, executing
    malicious code in a virtual machine with the intention of escalating privileges,
    or even taking over the machine. That’s why sandboxing alone is not enough for
    Golem. One could ask whether the code can be evaluated automatically for safety
    and security. Theoretically, this is not plausible. We cannot determine the outcome
    of a complex algorithm before executing it due to the halting problem.


    Note


    The halting problem is the problem of determining whether a program will finish
    running or continue to run forever given an arbitrary computer program and an
    input.


    To enable secure and trusted code execution on host machines, the application
    registry is split between three parties that are responsible for maintaining the
    integrity of the network. Authors publish decentralized applications to the registry,
    validators review and certify DApps as safe by creating a whitelist, and providers
    maintain blacklists of problematic DApps. Validators also maintain blacklists
    by marking applications as malicious or spam, and providers often end up using
    a blacklist from validators. Similarly, providers can pre-approve certain Golem-specific
    applications (certified by validators) to execute on their nodes.


    Providers can also elect to curate their own whitelists or blacklists. The default
    option for Golem is to run using a whitelist of trusted applications. The first
    set of apps will be verified by the developers to kickstart Golem; however, after
    the initial distribution, the network will rely on validators. On the other hand,
    providers can also take the approach of relying only on blacklists. This approach
    has the advantage of maximizing the reach of a provider (to the marketplace) and
    offering a wide range of applications that can be executed on a node. Eventually,
    providers will become specialized and fine-tune their nodes to be incredibly efficient
    at running one kind of task. This allows the providers more control over what
    runs on their nodes and custom hardware options for a computing farm. Ultimately,
    this option is available to developers who want to maximize their profits and
    are willing to run dedicated machines with bleeding-edge software.


    In a decentralized network like Golem, we will see a divide between traditional
    and vanguard validators. Traditional validators will maintain a set of stable
    applications that perform very routine tasks. For instance, a request for a complex
    3D rendering can launch a preemptible rendering instance on a provider’s nodes.
    Once the job is complete, the instance will terminate to free up memory and send
    the output to the requester. On the other hand, vanguard validators will include
    and approve software that pushes the boundaries of what is possible with Golem.
    Running new and experimental software on a provider’s node will require better
    sandboxing and hardening of the virtual machine. But these features can be a premium
    add-on running on special nodes offered by a provider. Monetizing the premium
    add-ons will also disincentivize scammers and malicious entities. Overall, this
    design approach makes the network more inclusive, costly for scammers, and innovative
    for developers.'
  trans: "\nGolem 堆栈的三个主要组件如图 7-5 所示。软件开发人员创建自动化日常任务的应用程序，并将其发布到应用程序注册表中。例如，一个限时渲染应用程序可以消除对任何复杂交易或任务跟踪的需求。买方只需支付一次性押金，并在时间结束前使用该应用程序。当买方使用注册表中的应用程序时，所产生的收入将用于补偿开发人员的应用程序。该注册表包含两种类型的应用：经认证的开发者发布的已验证应用，以及来自未确认开发者的新应用。最终，验证者会将新上传的应用集中起来，并密切跟踪它们是否有任何可疑活动。经过几次使用后，新应用也会获得已验证状态。开发人员还会因这些应用在提供者节点上执行而获得少量报酬。提供者申请硬件用于运行应用，而运行任务产生的大部分收入将返还给提供者（矿工）。交易机制确保资金正确交付给相应的参与方，买方也通过同一机制为任务执行付费。\n\
    \n### 应用程序注册表\n\n应用程序注册表为请求者提供了一个庞大的仓库，用于搜索符合其需求的特定工具或应用。该注册表是一个以太坊智能合约，涉及三个实体：作者、验证者和提供者。添加这三个实体背后的设计原理是什么？对于通用计算而言，代码被隔离在沙箱中，并以最低权限执行。但潜在的软件漏洞可能会在提供者的沙箱中造成严重破坏，在虚拟机中执行恶意代码，意图提升权限，甚至接管机器。这就是为什么仅靠沙箱隔离对\
    \ Golem 来说是不够的。有人可能会问，是否可以对代码进行自动化的安全评估？理论上，这是不可行的。由于停机问题，我们无法在执行复杂算法之前确定其结果。\n\
    \n> **注意**  \n> 停机问题是：给定任意计算机程序及其输入，判断该程序是最终会停止运行，还是无限期继续运行下去的问题。\n\n为了确保在主机上安全可信地执行代码，应用程序注册表被划分为三个负责维护网络完整性的参与方。作者将去中心化应用发布到注册表，验证者通过创建白名单来审查和认证\
    \ DApp 为安全的，而提供者则维护问题 DApp 的黑名单。验证者还会通过将应用标记为恶意或垃圾信息来维护黑名单，而提供者通常最终会使用验证者提供的黑名单。类似地，提供者可以预先批准某些特定的\
    \ Golem 应用（经认证者认证）在其节点上执行。\n\n提供者也可以选择自行策划其白名单或黑名单。Golem 的默认选项是使用受信应用的白名单来运行。第一组应用将由开发人员验证，以启动\
    \ Golem；然而，在初始分发之后，网络将依赖于验证者。另一方面，提供者也可以采取仅依赖黑名单的方法。这种方法的优势在于能最大化提供者的覆盖范围（面向市场），并提供可在节点上执行的广泛应用。最终，提供者将变得专业化，并对其节点进行微调，使其在执行某一类任务时极其高效。这使提供者能更好地控制其节点上运行的内容，并为计算农场提供自定义硬件选项。最终，这一选项可供那些希望最大化利润并愿意运行搭载前沿软件的专用机器的开发者使用。\n\
    \n在像 Golem 这样的去中心化网络中，我们将看到传统验证者和先锋验证者之间的分化。传统验证者将维护一组执行非常常规任务的稳定应用。例如，一个复杂的 3D\
    \ 渲染请求可以在提供者的节点上启动一个可抢占的渲染实例。一旦任务完成，该实例将终止以释放内存，并将输出发送给请求者。另一方面，先锋验证者将纳入并批准那些突破\
    \ Golem 能力边界的新软件。在提供者的节点上运行新的实验性软件需要更好的虚拟机沙箱隔离和加固。但这些功能可以作为运行于提供者提供的特殊节点上的高级附加组件。将高级附加组件货币化也将阻止诈骗者和恶意实体。总体而言，这种设计方法使网络更具包容性，让诈骗者付出更高成本，并为开发者带来更多创新。\n"
- fmt: '### Transaction Framework


    The transaction framework can be considered analogous to Stripe: an API for monetizing
    applications running on Golem. After the crowdsale, the network will use `GNT`
    (Golem Network Token) for all transactions between users, to compensate software
    developers and computation resource providers. The transaction framework is built
    on top of Ethereum; therefore, it inherits the underlying payment architecture
    and extends it to implement advanced payment schemes such as nanopayment mechanisms
    and transaction batching. Both innovations mentioned here are unique to Golem,
    so let’s talk about why they are necessary to the network.


    To power microservices, Golem will have to process a very high volume of small
    transactions. The value of a single payment is very low; these payments are also
    known as nanopayments. However, there is one caveat while using nanopayments:
    the transaction fees cannot be larger than the nanopayment itself. To solve this
    problem, Golem uses transaction batching. This solution aggregates nanopayments
    and sends them at once as a single Ethereum transaction to reduce the applied
    transaction fees. For instance, Golem developers note that the cost of ten payments
    processed in a single transaction is approximately half of the value of ten payments
    processed in ten transactions. By batching multiple transactions, a significantly
    lower transaction fee will be passed on to a user paying for per-unit usage (per-node
    or per-hour) of a microservice.


    > **Note**

    > For providers, another model to power microservices is credit-based payment
    for per-unit hosting. Here, the requester makes a deposit of timelocked `GNT`,
    and at the end of the day the provider automatically deducts the charges for usage.
    The remaining credits are released back to the requester.


    In Golem, nanopayments work in the context of one-to-many micropayments from a
    requester to many providers that assist in completing the computational tasks.
    The payments carried out for microservices are on the scale of $0.01, and for
    such small sums, the transaction fees are relatively large even on Ethereum. The
    idea here is that instead of making individual transactions of $0.01, the requester
    (payer) issues a lottery ticket for a lottery for a $1 prize with 1/100 chance
    of winning. The value of such ticket is $0.01 for the requester and the advantage
    is that on average only one ticket in 100 will lead to an actual transaction.
    This is a probabilistic mechanism to allow nano-transactions, but it does not
    guarantee that one given Golem node will be compensated adequately if the number
    of tasks computed is small. Bylica et al. provide the mathematical background
    to assuring fair distribution of income from this lottery system as the network
    expands, adding more requesters and providers. Essentially, as the number of tasks
    offered by requesters increases, the income a node generates from probabilistic
    lottery rewards will approach the amount it would receive being paid with individual
    transactions.


    The lottery system to be implemented in Golem is much more predictable for the
    providers than a completely probabilistic scheme. The provider is assured that
    among the tickets issued to reward the providers of a single task, there are no
    hash collisions and only one ticket is a winning one. Moreover, if there are 100
    providers participating in the lottery payment, then the nanopayment protocol
    guarantees that the task will only have to be paid out once. Bylica and collaborators
    discuss a few counterclaim mechanisms in place to prevent malicious entities from
    claiming to be lottery winners and cashing out. A brief sketch of the lottery
    process is provided in Figure [7-6](#430562_2_En_7_Chapter.xhtml#Fig6). After
    a task has been completed, the payer initiates a new lottery to pay out the participating
    providers. The payer creates a lottery description `L`, which contains a unique
    lottery identifier, and calculates its hash `h(L)`. The hash is written to the
    Ethereum contract storage. The payer also announces the lottery description `L`
    to the Golem network, so that every participating node can verify that the payment
    has the correct value and check that `h(L)` is indeed written to the Ethereum
    storage. The winner of a lottery payout can be uniquely determined by cross-referencing
    a given description `L` and a random value `R` that is unknown to all parties
    except the lottery smart contract. After a certain amount of time, if the reward
    has not been claimed, the smart contract computes the winning provider’s address
    (given the `L` and `R`) and transfers the reward from the contract’s associated
    storage to the winner. The hash of the lottery `h(L)` is also removed from the
    contract storage, and a new lottery payout cycle can now begin.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig6_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig6_HTML.jpg)


    **Figure 7-6** Nanopayment-based lottery payout system


    On a macro scale, Andrzej Regulski wrote a post describing some of the economic
    principles behind `GNT` and the long-term appreciation in value of the token enabled
    by this transaction framework ([`https://blog.golemproject.net/the-economics-of-the-golem-network-token/`](https://blog.golemproject.net/the-economics-of-the-golem-network-token/)).
    The most pertinent items from his post are quoted here:


    > *GNT will be necessary to interact with the Golem network. At first, its sole
    role is to enable the transfer of value from requestors to providers, and to software
    developers. Later on, the Transaction Framework will make it possible to assign
    additional attributes to the token, so that, for example, it is required to store
    deposits in GNT.*


    > *The number of GNT (i.e., the supply) is going to be indefinitely fixed at the
    level created during the Golem crowdfunding. No GNT is going to be created afterwards.*


    > *A depreciation or appreciation of the token is neutral to the operations of
    the network, because users are free to set any ask/bid prices for compute resources
    in Golem, thus accommodating any fluctuations in GNT value.*


    > *The constant amount of tokens will have to accommodate a growing number of
    transactions, hence increasing the demand for GNT. With a reasonable assumption
    that the velocity of the token (i.e., the number of transactions per unit of the
    token in a specific period) is constant over time, this conclusion can be drawn
    from the quantity theory of money. This, in turn, means that the overall success
    and growth of the Golem network implies a long-run appreciation of the GNT.*'
