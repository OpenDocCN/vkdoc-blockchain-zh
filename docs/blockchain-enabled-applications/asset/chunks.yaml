    *   9 月 29 日：金融市场崩盘，`道琼斯工业平均指数`暴跌 777.68 点，整个体系濒临崩溃

    *   10 月 3 日：美国政府授权 7000 亿美元用于银行救助


    这次救助带来了巨大的经济后果，但更重要的是，它创造了一种有利于比特币蓬勃发展的环境。2008 年 11 月，一篇白皮书（[`https://bitcoin.org/bitcoin.pdf`](https://bitcoin.org/bitcoin.pdf)）被发布在密码学与密码政策邮件列表中，标题为“[比特币：一种点对点的电子现金系统](https://bitcoin.org/bitcoin.pdf)”，作者署名是中本聪。这篇白皮书详细描述了比特币协议，并附带了比特币早期版本的原始代码。从某种意义上说，这份白皮书是对刚刚发生的经济危机的回应，但这场技术革命还需要一段时间才能流行起来。一些开发者担心这种电子现金系统在站稳脚跟之前就会失败，而他们担忧的是可扩展性问题，如图
    1-1 所示。


    那么，中本聪是谁？他有什么背景？简单直接的答案是：我们不知道。事实上，假设他实际上是一个“他”也是武断的。中本聪这个名字在很大程度上是一个化名，而“他”可能是一位“她”，甚至是一个庞大的团队。一些记者和新闻媒体投入了大量时间和精力进行数字取证，以缩小候选人范围并找出真正的中本聪，但迄今为止所有的努力都徒劳无功（[`https://www.technologyreview.com/s/527051/the-man-who-really-built-bitcoin/`](https://www.technologyreview.com/s/527051/the-man-who-really-built-bitcoin/)）。在这种情况下，社区开始意识到中本聪是谁或许并不重要，因为开源的本质几乎使其无关紧要。比特币社区最受尊敬的开发者之一杰夫·加齐克这样描述道：“中本聪发布一个开源系统的目的，就是让你不必知道他是谁、信任他是谁，或关心他的知识。”开源精神的真谛在于代码本身就能说明一切，无需创建者/开发者的任何干预。


    ![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig1_HTML.jpg](img/430562_2_En_1_Fig1_HTML.jpg)


    图 1-1


    比特币协议的初步反响。对比特币可扩展性和现实前景的担忧


    ## 技术栈


    中本聪在创建比特币协议时真正的天才之处在于解决了拜占庭将军问题。该解决方案通过借鉴密码朋克社区的组件和思想，被推广到金融交易中。我们将简要讨论其中三个想法，这些组件如何工作，以及它们如何帮助比特币协议：用于工作量证明的哈希现金，用于去中心化网络的拜占庭容错，以及用于消除对中心化信任或中央机构需求的区块链。让我们从哈希现金开始，逐一深入探讨。


    `哈希现金`由亚当·巴克在 90 年代末设计，旨在通过首创的工作量证明算法来限制垃圾邮件。`哈希现金`背后的原理是为发送电子邮件附加一定的计算成本。垃圾邮件发送者的商业模式依赖于发送大量邮件，而每封邮件的成本极低。然而，如果每封发送的垃圾邮件都有哪怕很小的成本，那么成千上万封邮件的成本就会成倍增加，他们的生意就会变得无利可图。`哈希现金`依赖于加密哈希函数的概念——一种哈希函数（在比特币中，它是`SHA1`），它接收输入并将其转换为字符串，生成消息摘要，如图
    1-2 所示。哈希函数被设计成具有一种称为单向函数的属性，这意味着可以很容易地通过哈希函数验证潜在输入是否与摘要匹配，但从摘要反推输入是不可行的。重新创建输入的唯一可能方法是使用暴力搜索来找到合适的输入字符串。在实践中，这是`哈希现金`计算密集型元素，并已被引入比特币。这一原理已成为支撑当今比特币及大多数加密货币的工作量证明算法的基础。比特币的工作量证明更为复杂，并涉及新组件，我们将在后面的章节中详细讨论。


    ![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig2_HTML.jpg](img/430562_2_En_1_Fig2_HTML.jpg)


    图 1-2


    加密哈希函数的机制。它接收一个输入，并持续将其转换为一个输出摘要字符串


    接下来我们需要讨论的是拜占庭将军问题。这是一个将军群体之间的共识问题，每位将军指挥着拜占庭军队的一部分，准备攻击一座城市。这些将军需要制定进攻城市的策略，并充分相互沟通。重要的任务是每位将军必须朝着相同的行动努力，因为少数将军的软弱攻击还不如协同进攻或协同撤退。问题的关键在于，有些将军是叛徒。他们可能会投票欺骗其他将军，最终导致次优策略。让我们看一个例子：在奇数位将军的情况下，比如七位，三位支持进攻，三位支持撤退。第七位将军可能向支持撤退的将军表示同意，并向其他将军表示同意进攻，从而导致整个计划崩溃。进攻部队将无法攻占城市，因为没有内在的中央权威能够验证所有七位将军之间是否存在信任。

    '
- fmt: "In this scenario, Byzantine fault tolerance can be achieved if all the loyal\
    \ generals can communicate effectively to have an indisputable agreement on their\
    \ strategy. If so, the misleading (faulty) vote by the traitorous general would\
    \ be revealed and would fail to perturb the system as a whole. In the Bitcoin\
    \ protocol, Satoshi’s key innovation in enabling Byzantine fault tolerance was\
    \ to create a peer-to-peer network with a ledger that could record and verify\
    \ a majority approval, thereby revealing any false (traitorous) transactions.\
    \ This ledger provides a consistent means of communication and further allows\
    \ for the removal of trust from the whole system. The ledger is also known as\
    \ the blockchain. With blockchain attached, Bitcoin became the first digital currency\
    \ to solve the double-spending problem network-wide. In the remainder of this\
    \ chapter, we will present a broad overview of the technology, and of the concept\
    \ of a blockchain-enabled application.\n\nA blockchain is primarily a recording\
    \ ledger that provides all involved parties with a secure and synchronized record\
    \ of transactions from start to end. A blockchain can record hundreds of transactions\
    \ very rapidly, and has several cryptographic measures intrinsic to its design\
    \ for data security, consistency, and validation. Similar transactions on the\
    \ blockchain are pooled together into a functional unit called a `block` and then\
    \ sealed with a timestamp (a cryptographic fingerprint) that links the current\
    \ block to the one preceding it. This creates an irreversible and tamper-evident\
    \ string of blocks connected together by timestamps, conveniently called a blockchain.\
    \ The architecture of blockchain is such that every transaction is very rapidly\
    \ verified by all members of the network. Members also contain an up-to-date copy\
    \ of the blockchain locally, which allows for consensus to be reached within the\
    \ decentralized network. Features such as immutable record-keeping and network-wide\
    \ consensus can be integrated into a stack to develop new types of applications\
    \ called decentralized apps (DApps). Let’s look at a prototype of a DApp in Figure\
    \ [1-3](#430562_2_En_1_Chapter.xhtml#Fig3), in the context of the Model-View-Controller\
    \ (MVC) framework. The Model-View-Controller framework is a software design concept\
    \ that separates an application into three components: The model (that contains\
    \ the data-related logic), the view (UI component that customers often interface\
    \ with), and the controller (an interface that interacts between the model and\
    \ the view). This framework is frequently used to design traditional web applications\
    \ that are extensible and scalable. Here, we want to extend an industry standard\
    \ and use it to explain a DApp.\n\n> **Note**\n> \n> The first block of the blockchain\
    \ is called the `Genesis block`. This block is unique in that it does not link\
    \ to any blocks preceding it. Satoshi added a bit of historical information to\
    \ this block as context for the current financial environment in the United Kingdom,\
    \ “*The Times 03/Jan/2009 Chancellor on brink of second bailout for banks*.” This\
    \ block not only proves that no Bitcoins existed before January 3, 2009, but also\
    \ gives a little insight into the mind of the creators.\n\n![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig3_HTML.jpg](images/430562_2_En_1_Chapter/430562_2_En_1_Fig3_HTML.jpg)\n\
    \n**Figure 1-3** This figure presents a simple prototype of a decentralized application\
    \ that interacts with the end user at the final steps\n\nThe model and controller\
    \ here rely on the blockchain for data (data integrity and security) and accordingly\
    \ update the view for the end user. The secret sauce in this prototype is the\
    \ API, which works to pull information from the blockchain and provides it to\
    \ the model and controller. This API provides opportunities to extend business\
    \ logic and add it to the blockchain, along with basic operations that take blocks\
    \ as input and provide answers to binary questions. The blockchain may eventually\
    \ have more features such as oracles that can verify external data and timestamp\
    \ it on the blockchain itself. To better understand the concept of blockchain-enabled\
    \ applications, we have to appreciate the full stack of services that could power\
    \ an end-user application; this is demonstrated in Figure [1-4](#430562_2_En_1_Chapter.xhtml#Fig4).\n\
    \n![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig4_HTML.jpg](images/430562_2_En_1_Chapter/430562_2_En_1_Fig4_HTML.jpg)\n\
    \n**Figure 1-4** The blockchain-enabled application stack\n\n## Summary\n\nIn\
    \ this chapter, we started talking about the history of Bitcoin and the financial\
    \ environment around the time it came to exist. We will continue our discussion\
    \ of blockchain and specific features of the peer-to-peer network, such as miners\
    \ and more, in the upcoming chapters.\n\n# 2. The Gold Rush: Mining Bitcoin\n\n\
    Mining is a key operational concept in understanding how the Bitcoin protocol\
    \ functions. It refers to a decentralized review process performed on every block\
    \ of the blockchain to reach consensus, without the need for a central authority\
    \ to provide trust. In other words, mining is the computational equivalent of\
    \ peer review in a decentralized environment where neither party involved trusts\
    \ the other. We will continue our discussion of the hash function here in more\
    \ depth, as it refers to mining and solving proof-of-work functions. Then, we\
    \ will integrate the concepts of block target values and network difficulty with\
    \ mining and how mining has evolved to keep up with the increasing network difficulty.\
    \ This will lead us further into talking about the different types of hardware\
    \ mining that have been developed recently. We will end the chapter with an analysis\
    \ of startups that began selling dedicated hardware for mining, leading to the\
    \ Bitcoin mining arms race and the startups’ eventual failure."
  raw: 'In this scenario, Byzantine fault tolerance can be achieved if all the loyal
    generals can communicate effectively to have an indisputable agreement on their
    strategy. If so, the misleading (faulty) vote by the traitorous general would
    be revealed and would fail to perturb the system as a whole. In the Bitcoin protocol,
    Satoshi’s key innovation in enabling Byzantine fault tolerance was to create a
    peer-to-peer network with a ledger that could record and verify a majority approval,
    thereby revealing any false (traitorous) transactions. This ledger provides a
    consistent means of communication and further allows for the removal of trust
    from the whole system. The ledger is also known as the blockchain. With blockchain
    attached, Bitcoin became the first digital currency to solve the double-spending
    problem network-wide. In the remainder of this chapter, we will present a broad
    overview of the technology, and of the concept of a blockchain-enabled application.


    A blockchain is primarily a recording ledger that provides all involved parties
    with a secure and synchronized record of transactions from start to end. A blockchain
    can record hundreds of transactions very rapidly, and has several cryptographic
    measures intrinsic to its design for data security, consistency, and validation.
    Similar transactions on the blockchain are pooled together into a functional unit
    called a **block** and then sealed with a timestamp (a cryptographic fingerprint)
    that links the current block to the one preceding it. This creates an irreversible
    and tamper-evident string of blocks connected together by timestamps, conveniently
    called a blockchain. The architecture of blockchain is such that every transaction
    is very rapidly verified by all members of the network. Members also contain an
    up-to-date copy of the blockchain locally, which allows for consensus to be reached
    within the decentralized network. Features such as immutable record-keeping and
    network-wide consensus can be integrated into a stack to develop new types of
    applications called decentralized apps (DApps). Let’s look at a prototype of a
    DApp in Figure [1-3](#430562_2_En_1_Chapter.xhtml#Fig3), in the context of the
    Model-View-Controller (MVC) framework. The Model-View-Controller framework is
    a software design concept that separates an application into three components:
    The model (that contains the data-related logic), the view (UI component that
    customers often interface with), and the controller (an interface that interacts
    between the model and the view). This framework is frequently used to design traditional
    web applications that are extensible and scalable. Here, we want to extend an
    industry standard and use it to explain a DApp.


    Note


    The first block of the blockchain is called the Genesis block. This block is unique
    in that it does not link to any blocks preceding it. Satoshi added a bit of historical
    information to this block as context for the current financial environment in
    the United Kingdom, “*The Times 03/Jan/2009 Chancellor on brink of second bailout
    for banks*.” This block not only proves that no Bitcoins existed before January
    3, 2009, but also gives a little insight into the mind of the creators.


    ![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig3_HTML.jpg](images/430562_2_En_1_Chapter/430562_2_En_1_Fig3_HTML.jpg)


    Figure 1-3


    This figure presents a simple prototype of a decentralized application that interacts
    with the end user at the final steps


    The model and controller here rely on the blockchain for data (data integrity
    and security) and accordingly update the view for the end user. The secret sauce
    in this prototype is the API, which works to pull information from the blockchain
    and provides it to the model and controller. This API provides opportunities to
    extend business logic and add it to the blockchain, along with basic operations
    that take blocks as input and provide answers to binary questions. The blockchain
    may eventually have more features such as oracles that can verify external data
    and timestamp it on the blockchain itself. To better understand the concept of
    blockchain-enabled applications, we have to appreciate the full stack of services
    that could power an end-user application; this is demonstrated in Figure [1-4](#430562_2_En_1_Chapter.xhtml#Fig4).


    ![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig4_HTML.jpg](images/430562_2_En_1_Chapter/430562_2_En_1_Fig4_HTML.jpg)


    Figure 1-4


    The blockchain-enabled application stack


    ## Summary


    In this chapter, we started talking about the history of Bitcoin and the financial
    environment around the time it came to exist. We will continue our discussion
    of blockchain and specific features of the peer-to-peer network, such as miners
    and more, in the upcoming chapters.


    # 2. The Gold Rush: Mining Bitcoin


    Mining is a key operational concept in understanding how the Bitcoin protocol
    functions. It refers to a decentralized review process performed on every block
    of the blockchain to reach consensus, without the need for a central authority
    to provide trust. In other words, mining is the computational equivalent of peer
    review in a decentralized environment where neither party involved trusts the
    other. We will continue our discussion of the hash function here in more depth,
    as it refers to mining and solving proof-of-work functions. Then, we will integrate
    the concepts of block target values and network difficulty with mining and how
    mining has evolved to keep up with the increasing network difficulty. This will
    lead us further into talking about the different types of hardware mining that
    have been developed recently. We will end the chapter with an analysis of startups
    that began selling dedicated hardware for mining, leading to the Bitcoin mining
    arms race and the startups’ eventual failure.'
  trans: "\n在这种场景下，若要实现拜占庭容错，所有忠诚的将军必须能够有效沟通，就作战策略达成无可争议的共识。如此一来，叛徒将军所投的误导性（错误）票就会被揭露，并且无法扰乱整个系统。在比特币协议中，中本聪实现拜占庭容错的关键创新在于创建了一个点对点网络，并配有一本能够记录和验证多数人批准的账本，从而揭露任何虚假（叛徒）交易。这本账本提供了一致的通信方式，并进一步使得整个系统无需信任。这本账本也被称为区块链。有了区块链的加持，比特币成为首个在整个网络范围内解决双重支付问题的数字货币。在本章剩余部分，我们将对该技术及支持区块链的应用程序概念进行广泛概述。\n\
    \n区块链主要是一种记录账本，它为所有相关方提供从始至终的安全且同步的交易记录。区块链能够非常快速地记录数百笔交易，并且其设计本身包含多种用于数据安全、一致性和验证的密码学措施。区块链上相似的交易被汇集到一个称为`区块`的功能单元中，然后用一个时间戳（一种加密指纹）进行封存，该时间戳将当前区块与前一个区块连接起来。这就创建了一条由时间戳连接而成、不可逆且防篡改的区块链条，方便地称之为区块链。区块链的架构使得每一笔交易都能被网络中的所有成员非常快速地验证。成员本地还存有区块链的最新副本，这使得在去中心化网络内能够达成共识。诸如不可变的记录保存和全网共识等功能可以被集成到一个技术栈中，以开发新型应用，即去中心化应用（DApps）。让我们在图\
    \ 1-3 中，在模型-视图-控制器（MVC）框架的背景下，来看一个 DApp 的原型。模型-视图-控制器框架是一种软件设计概念，它将应用程序分为三个组件：模型（包含与数据相关的逻辑）、视图（客户经常交互的\
    \ UI 组件）和控制器（在模型和视图之间进行交互的接口）。该框架常被用于设计可扩展且可伸缩的传统网络应用程序。在这里，我们想扩展一个行业标准，并用它来解释\
    \ DApp。\n\n> **注意**\n> \n> 区块链的第一个区块被称为`创世区块`。这个区块的独特之处在于它不链接到任何前序区块。中本聪在这个区块中添加了一点历史信息，作为对英国当前金融环境的背景说明：“*《泰晤士报》2009\
    \ 年 1 月 3 日，财政大臣即将为银行进行第二轮纾困*。”这个区块不仅证明了在 2009 年 1 月 3 日之前不存在任何比特币，而且还为我们窥见创造者的思想提供了一点线索。\n\
    \n![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig3_HTML.jpg](img/430562_2_En_1_Fig3_HTML.jpg)\n\
    \n**图 1-3** 该图展示了一个去中心化应用的简单原型，它在最后步骤与最终用户进行交互\n\n这里的模型和控制器依赖区块链获取数据（数据完整性和安全性），并相应地更新视图以呈现给最终用户。这个原型中的秘密武器是\
    \ API，它负责从区块链中提取信息，并提供给模型和控制器。这个 API 提供了扩展业务逻辑并将其添加到区块链的机会，此外还包含一些基本操作，这些操作以区块为输入，并提供对二元问题的答案。区块链未来可能还会拥有更多功能，例如可以验证外部数据并在区块链本身上为其打上时间戳的预言机。为了更好地理解支持区块链的应用程序这一概念，我们必须欣赏能够支撑最终用户应用程序的完整服务栈；这在图\
    \ 1-4 中进行了展示。\n\n![../images/430562_2_En_1_Chapter/430562_2_En_1_Fig4_HTML.jpg](img/430562_2_En_1_Fig4_HTML.jpg)\n\
    \n**图 1-4** 支持区块链的应用程序栈\n\n## 小结\n\n在本章中，我们开始讨论比特币的历史以及它诞生前后的金融环境。我们将在接下来的章节中继续讨论区块链以及点对点网络的具体特性，例如矿工等。\n\
    \n# 2. 淘金热：挖掘比特币\n\n挖矿是理解比特币协议功能的一个关键操作概念。它指的是对区块链的每个区块执行的一种去中心化审查过程，以达成共识，而无需一个中央权威机构来提供信任。换句话说，在参与双方互不信任的去中心化环境中，挖矿在计算上等同于同行评审。我们将在此更深入地继续讨论哈希函数，因为它涉及到挖矿和解决工作量证明函数。然后，我们将把区块目标值和网络难度的概念与挖矿结合起来，并探讨挖矿是如何发展以跟上不断增加的网络难度的。这将引导我们进一步讨论最近开发出的不同类型的硬件挖矿。本章将以分析那些开始销售专用挖矿硬件、从而引发比特币挖矿军备竞赛并最终失败的初创公司作为结尾。\n"
- fmt: "# Reaching Consensus\n\nMining is central to the Bitcoin protocol and has\
    \ two primary motivations: add new Bitcoins to the overall economy and verify\
    \ transactions. In this chapter, we will look at the mechanisms behind these two\
    \ processes. Essentially, mining is the appropriate solution to the double-spending\
    \ problem that we discussed previously. To remove the need for a central authority,\
    \ individuals running the Bitcoin client on their own machines (called miners)\
    \ participate in the network and verify that transactions taking place between\
    \ two parties are not fraudulent. Mining is actually a computationally intensive\
    \ activity, but what incentive does anyone have to help mine for new Bitcoins?\
    \ The key incentive for miners is getting a reward in the form of Bitcoins for\
    \ their participation. Let’s look at a simplified view of the mining process in\
    \ Figure [2-1](#430562_2_En_2_Chapter.xhtml#Fig1).\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig1_HTML.jpg](images/430562_2_En_2_Chapter/430562_2_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1  \nA simplified overview of the mining process\n\nUnpackaged transactions\
    \ that have occurred recently on the Bitcoin network remain in the transaction\
    \ pool (also known as the `mempool`, where all valid transactions wait to be confirmed\
    \ by the Bitcoin network) until they are picked up by a miner to be packaged into\
    \ a block. A miner selects transactions from the transaction pool and packages\
    \ them in a block. After the block has been created, it needs a header before\
    \ it can be accepted by the blockchain. Think of this as shipping a package: once\
    \ the package has been created, it needs to be stamped so that it can be shipped.\
    \ A miner uses the header of the most recent block in the blockchain to construct\
    \ a new header for this current block. The block header also contains other elements\
    \ such as a timestamp, version of the Bitcoin client, and an ID corresponding\
    \ to the previous block in the chain. The resulting block is called a candidate\
    \ block, and it can now be added to the blockchain if a few other conditions are\
    \ satisfied.\n\nThe process of mining is very involved, and Figure [2-1](#430562_2_En_2_Chapter.xhtml#Fig1)\
    \ only served to paint a broad picture regarding the participation of miners in\
    \ the protocol. Next, we will explore the technical aspects of the stamp (in the\
    \ analogy just referenced) and the mechanism of stamping a package. Keep in mind\
    \ that mining is a competitive process. Figure [2-1](#430562_2_En_2_Chapter.xhtml#Fig1)\
    \ only describes this process for one miner, but in reality, a very large number\
    \ of miners from the network participate simultaneously. The miners compete with\
    \ each other to find a stamp for the package (block) that they created, and the\
    \ first miner to discover the stamp wins. The race between miners to find a stamp\
    \ is concluded within ten minutes, and a new race begins in the next ten minutes.\
    \ Once the stamp is discovered, the miner can complete the block and announce\
    \ it to the network. Now the block can be added to the blockchain. Let’s take\
    \ a look at the process behind searching for the stamp, better known as a block\
    \ header, in Figure [2-2](#430562_2_En_2_Chapter.xhtml#Fig2).\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig2_HTML.jpg](images/430562_2_En_2_Chapter/430562_2_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2  \nGenerating a block header by solving proof-of-work (PoW)\n\nThe\
    \ package created by a miner is almost a block, but it is missing a header. It’s\
    \ called a candidate block and can only be added to the blockchain after the stamp,\
    \ or the header, is added. The header from the most recent block in the blockchain\
    \ is retrieved and combined with a 32-bit value called `nonce`. This combination\
    \ is directed to the hash function (`SHA-256`) as an input. The hash function\
    \ computes a new resulting hash as an output. This generated hash is then compared\
    \ to the target value of the network (at the given time). If the hash value is\
    \ larger than the target value, then the `nonce` is readjusted and a new input\
    \ is sent to the hash function to obtain a new potential output. The problem of\
    \ finding the appropriate hash value that is smaller than the target value is\
    \ at the heart of PoW, and it can only be solved using brute force. Once a hash\
    \ value smaller than the target value is discovered by a miner, this hash can\
    \ now be used in the block header for the candidate block. The first miner to\
    \ discover the hash is considered the winner. The winning miner has shown proof\
    \ of work that she did to discover the hash; therefore, the transactions contained\
    \ within the block are now considered valid. This block can now be added to the\
    \ blockchain. Additionally, the winning miner also wins a reward for solving the\
    \ PoW problem, which is a certain number of Bitcoins. This whole process from\
    \ packaging transactions into a block, to finding the hash and announcing the\
    \ block to the Bitcoin network, repeats itself approximately every ten minutes.\n\
    \nWe introduced some new terminology in Figure [2-2](#430562_2_En_2_Chapter.xhtml#Fig2);\
    \ let’s describe them here properly for the sake of completion:\n\n* **Candidate\
    \ block:** An incomplete block, created as a temporary construct by a miner to\
    \ store transactions from the transaction pool. It becomes a complete block after\
    \ the header is completed by solving the proof-of-work problem.\n\n* **PoW:**\
    \ The problem of discovering a new hash that can be used in the block header of\
    \ the candidate block. A computationally intensive process that involves evaluating\
    \ a hash taken from the most recent block and appending a `nonce` to it against\
    \ the target value of the network. This problem can only be solved using brute\
    \ force; i.e., multiple trials of using the hash (from most recent block header)\
    \ and `nonce`’s being adjusted each time are necessary to solve the PoW problem.\n\
    \n* **Nonce:** A 32-bit value that is concatenated to the hash from the most recent\
    \ block header. This value is continuously updated and adjusted for each trial,\
    \ till a new hash below target value is discovered.\n\n* **Hash function:** A\
    \ function used to compute a hash. In the Bitcoin protocol, this function is the\
    \ `SHA-256`.\n\n* **Hash value:** The resulting hash output from a hash function.\n\
    \n* **Target value:** A 256-bit number that all Bitcoin clients share. It is determined\
    \ by the difficulty, which will be discussed shortly.\n\n* **Coinbase transaction:**\
    \ The first transaction that is packaged into a block. This is a reward for the\
    \ miner to mine the PoW solution for the candidate block.\n\n* **Block header:**\
    \ The header of a block, which contains many features such as a timestamp, PoW,\
    \ and more. We will describe the block header in more detail in the following\
    \ chapter.\n\n> **Note:**  \n> After going over the terms defined, revisit Figures\
    \ [2-1](#430562_2_En_2_Chapter.xhtml#Fig1) and [2-2](#430562_2_En_2_Chapter.xhtml#Fig2).\
    \ Some concepts that were abstracted out will become clear now, and the information\
    \ will integrate better."
  raw: '## Reaching Consensus


    Mining is central to the Bitcoin protocol and has two primary motivations: add
    new Bitcoins to the overall economy and verify transactions. In this chapter,
    we will look at the mechanisms behind these two processes. Essentially, mining
    is the appropriate solution to the double-spending problem that we discussed previously.
    To remove the need for a central authority, individuals running the Bitcoin client
    on their own machines (called miners) participate in the network and verify that
    transactions taking place between two parties are not fraudulent. Mining is actually
    a computationally intensive activity, but what incentive does anyone have to help
    mine for new Bitcoins? The key incentive for miners is getting a reward in the
    form of Bitcoins for their participation. Let’s look at a simplified view of the
    mining process in Figure [2-1](#430562_2_En_2_Chapter.xhtml#Fig1).


    ![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig1_HTML.jpg](images/430562_2_En_2_Chapter/430562_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    A simplified overview of the mining process


    Unpackaged transactions that have occurred recently on the Bitcoin network remain
    in the transaction pool (also known as the mempool, where all valid transactions
    wait to be confirmed by the Bitcoin network) until they are picked up by a miner
    to be packaged into a block. A miner selects transactions from the transaction
    pool and packages them in a block. After the block has been created, it needs
    a header before it can be accepted by the blockchain. Think of *this* as shipping
    a package: once the package has been created, it needs to be stamped so that it
    can be shipped. A miner uses the header of the most recent block in the blockchain
    to construct a new header for *this* current block. The block header also contains
    other elements such as a timestamp, version of the Bitcoin client, and an ID corresponding
    to the previous block in the chain. The resulting block is called a candidate
    block, and it can now be added to the blockchain if a few other conditions are
    satisfied.


    The process of mining is very involved, and Figure [2-1](#430562_2_En_2_Chapter.xhtml#Fig1)
    only served to paint a broad picture regarding the participation of miners in
    the protocol. Next, we will explore the technical aspects of the stamp (in the
    analogy just referenced) and the mechanism of stamping a package. Keep in mind
    that mining is a competitive process. Figure [2-1](#430562_2_En_2_Chapter.xhtml#Fig1)
    only describes this process for one miner, but in reality, a very large number
    of miners from the network participate simultaneously. The miners compete with
    each other to find a stamp for the package (block) that they created, and the
    first miner to discover the stamp wins. The race between miners to find a stamp
    is concluded within ten minutes, and a new race begins in the next ten minutes.
    Once the stamp is discovered, the miner can complete the block and announce it
    to the network. Now the block can be added to the blockchain. Let’s take a look
    at the process behind searching for the stamp, better known as a block header,
    in Figure [2-2](#430562_2_En_2_Chapter.xhtml#Fig2).


    ![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig2_HTML.jpg](images/430562_2_En_2_Chapter/430562_2_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Generating a block header by solving proof-of-work (PoW)


    The package created by a miner is almost a block, but it is missing a header.
    It’s called a candidate block and can only be added to the blockchain after the
    stamp, or the header, is added. The header from the most recent block in the blockchain
    is retrived and combined with a 32-bit value called nonce. This combination is
    directed to the hash function (SHA-256) as an input. The hash function computes
    a new resulting hash as an output. This generated hash is then compared to the
    target value of the network (at the given time). If the hash value is larger than
    the target value, then the nonce is readjusted and a new input is sent to the
    hash function to obtain a new potential output. The problem of finding the appropriate
    hash value that is smaller than the target value is at the heart of PoW, and it
    can only be solved using brute force. Once a hash value smaller than the target
    value is discovered by a miner, this hash can now be used in the block header
    for the candidate block. The first miner to discover the hash is considered the
    winner. The winning miner has shown proof of work that she did to discover the
    hash; therefore, the transactions contained within the block are now considered
    valid. This block can now be added to the blockchain. Additionally, the winning
    miner also wins a reward for solving the PoW problem, which is a certain number
    of Bitcoins. This whole process from packaging transactions into a block, to finding
    the hash and announcing the block to the Bitcoin network, repeats itself approximately
    every ten minutes.


    We introduced some new terminology in Figure [2-2](#430562_2_En_2_Chapter.xhtml#Fig2);
    let’s describe them here properly for the sake of completion:


    *   **Candidate block** **:** An incomplete block, created as a temporary construct
    by a miner to store transactions from the transaction pool. It becomes a complete
    block after the header is completed by solving the proof-of-work problem.


    *   **PoW** **:** The problem of discovering a new hash that can be used in the
    block header of the candidate block. A computationally intensive process that
    involves evaluating a hash taken from the most recent block and appending a nonce
    to it against the target value of the network. This problem can only be solved
    using brute force; i.e., multiple trials of using the hash (from most recent block
    header) and nonce’s being adjusted each time are necessary to solve the PoW problem.


    *   **Nonce** **:** A 32-bit value that is concatenated to the hash from the most
    recent block header. This value is continuously updated and adjusted for each
    trial, till a new hash below target value is discovered.


    *   **Hash function** **:** A function used to compute a hash. In the Bitcoin
    protocol, this function is the SHA-256.


    *   **Hash value** **:** The resulting hash output from a hash function.


    *   **Target value** **:** A 256-bit number that all Bitcoin clients share. It
    is determined by the difficulty, which will be discussed shortly.


    *   **Coinbase transaction** **:** The first transaction that is packaged into
    a block. This is a reward for the miner to mine the PoW solution for the candidate
    block.


    *   **Block header** **:** The header of a block, which contains many features
    such as a timestamp, PoW, and more. We will describe the block header in more
    detail in the following chapter.


    Note


    After going over the terms defined, revisit Figures [2-1](#430562_2_En_2_Chapter.xhtml#Fig1)
    and [2-2](#430562_2_En_2_Chapter.xhtml#Fig2). Some concepts that were abstracted
    out will become clear now, and the information will integrate better.'
  trans: "\n# 达成共识\n\n挖矿是比特币协议的核心，主要有两个目的：向整个经济体注入新的比特币，以及验证交易。在本章中，我们将探讨这两个过程背后的机制。本质上，挖矿是解决我们之前讨论过的双重支付问题的恰当方案。为了消除对中央权威机构的需求，个人在自己的机器上运行比特币客户端（称为矿工），他们参与网络并验证双方之间的交易是否具有欺诈性。挖矿实际上是一项计算密集型活动，但是人们有什么动力去帮助挖掘新的比特币呢？矿工的主要动力是他们通过参与获得比特币形式的奖励。让我们通过图\
    \ 2-1 来简要了解挖矿过程。\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig1_HTML.jpg](img/430562_2_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1  \n挖矿过程的简化概览\n\n近期在比特币网络上发生但尚未打包的交易，会留在交易池（也称为 `mempool`，所有有效交易都在这里等待比特币网络确认）中，直到被矿工选取并打包进一个区块。矿工从交易池中选择交易，并将其打包成一个区块。区块创建完成后，它需要一个区块头才能被区块链接受。可以把它想象成邮寄包裹：包裹打包好后，需要贴上邮票才能寄出。矿工使用区块链中最新区块的区块头，为当前区块构建一个新的区块头。区块头还包含其他元素，例如时间戳、比特币客户端版本，以及与链中上一个区块对应的\
    \ ID。由此产生的区块称为候选区块，如果满足其他几个条件，它就可以被添加到区块链中。\n\n挖矿过程非常复杂，图 2-1 仅概述了矿工参与协议的宏观画面。接下来，我们将探讨“邮票”（沿用刚才的类比）的技术细节以及给包裹贴邮票的机制。请记住，挖矿是一个竞争过程。图\
    \ 2-1 只描述了一个矿工的过程，但实际上，网络中大量的矿工会同时参与进来。矿工们相互竞争，为他们创建的包裹（区块）寻找邮票，最先找到邮票的矿工获胜。矿工之间寻找邮票的竞赛大约每十分钟结束一次，接下来的十分钟又会开始新的竞赛。一旦找到邮票，矿工就可以完成该区块，并向网络公布。现在，该区块就可以被添加到区块链中了。让我们通过图\
    \ 2-2 来看看寻找邮票（更广为人知的说法是区块头）的过程。\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig2_HTML.jpg](img/430562_2_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2  \n通过解决工作量证明（PoW）生成区块头\n\n矿工创建的包裹几乎就是一个区块，只是缺少一个区块头。它被称为候选区块，只有在添加了邮票（即区块头）之后才能被添加到区块链中。它将从区块链中最新区块获取的区块头与一个\
    \ 32 位值（称为 `nonce`）结合起来。这个组合作为输入被送入哈希函数（`SHA-256`）。哈希函数计算出一个新的哈希值作为输出。然后，将这个生成的哈希值与网络的（给定时间点的）目标值进行比较。如果哈希值大于目标值，则调整\
    \ `nonce`，并将新的输入发送给哈希函数，以获取新的潜在输出。找到小于目标值的合适哈希值这一问题，是工作量证明的核心，并且只能通过暴力破解来解决。一旦矿工找到了一个小于目标值的哈希值，这个哈希就可以用于候选区块的区块头。第一个找到该哈希的矿工被认为是获胜者。获胜的矿工已经证明了她为找到该哈希所付出的工作量；因此，该区块中包含的交易现在被认为是有效的。这个区块现在可以被添加到区块链中。此外，获胜的矿工还会因解决工作量证明问题而获得奖励，奖励是特定数量的比特币。从将交易打包进区块，到找到哈希并向比特币网络公布该区块，整个过程大约每十分钟重复一次。\n\
    \n我们在图 2-2 中引入了一些新的术语；为了内容的完整性，我们来对它们进行适当的描述：\n\n*   **候选区块：** 一个不完整的区块，由矿工创建作为临时结构，用于存储来自交易池的交易。在通过解决工作量证明问题完成区块头后，它就变成了一个完整的区块。\n\
    \n*   **工作量证明（PoW）：** 发现可用于候选区块区块头的新哈希值的问题。这是一个计算密集型过程，涉及对取自最新区块的哈希值进行评估，并向其附加一个\
    \ `nonce`，然后与网络的目标值进行比较。该问题只能通过暴力破解来解决；也就是说，需要多次尝试使用（来自最新区块头的）哈希值，并且每次都需要调整 `nonce`，才能解决工作量证明问题。\n\
    \n*   **Nonce：** 一个 32 位的值，它与来自最新区块头的哈希值连接。这个值在每次尝试中不断更新和调整，直到发现一个低于目标值的新哈希。\n\
    \n*   **哈希函数：** 用于计算哈希值的函数。在比特币协议中，此函数是 `SHA-256`。\n\n*   **哈希值：** 哈希函数计算出的结果输出。\n\
    \n*   **目标值：** 一个所有比特币客户端共享的 256 位数字。它由难度决定，稍后会讨论。\n\n*   **币基交易：** 被打包进区块的第一笔交易。这是对矿工为候选区块挖掘工作量证明解决方案的奖励。\n\
    \n*   **区块头：** 区块的头部，包含许多特征，例如时间戳、工作量证明等。我们将在下一章更详细地描述区块头。\n\n> **注意：**  \n> 在了解了上述术语的定义之后，请重新审视图\
    \ 2-1 和图 2-2。之前一些抽象的概念现在会变得清晰，信息也会更好地整合起来。\n"
- fmt: "Now that we have a better idea of how mining works, let’s take a look at mining\
    \ difficulty and target values. These two concepts are similar to knobs that are\
    \ adjusted over the course of time for the network, and all Bitcoin clients get\
    \ updated to follow the latest values. So, what is mining difficulty? Essentially,\
    \ it can be defined as the difficulty of finding a hash below the target value\
    \ as a miner is solving the proof-of-work problem. An increase in difficulty corresponds\
    \ to a longer time needed to discover the hash and solve the PoW, also known as\
    \ mining time. The ideal mining time is set by the network to be approximately\
    \ ten minutes, which implies that a new block is announced on the network every\
    \ ten minutes. The mining time is dependent on three factors: the target value,\
    \ number of miners in the network, and mining difficulty. Let’s look at how these\
    \ factors are interconnected:\n\n1.  An increase in mining difficulty causes a\
    \ decrease in the target value to compensate for the mining time.\n\n2.  An increase\
    \ in the number of miners joining the network causes an increase in the rate at\
    \ which PoW is solved, decreasing the mining time. To adjust for this, mining\
    \ difficulty increases and the block-creation rate returns to normal.\n\n3.  The\
    \ target value is recalculated and adjusted every 2016 blocks created, which happens\
    \ in approximately two weeks.\n\nAs we can see, there is a common theme of self-correction\
    \ in the Bitcoin network that allows it to be very resilient. Miners are the heartbeat\
    \ of the Bitcoin network, and they have two main incentives for participation:\n\
    \n*   The first transaction to be packaged in a block is called the coinbase transaction.\
    \ This transaction is the reward that the winning miner receives after mining\
    \ the block and announcing it on the network.\n\n*   The second reward comes in\
    \ the form a fee charged to the users of the network for sending transactions.\
    \ The fee is given to the miners for including the transactions in a block. This\
    \ fee can also be considered a miner’s income because as more and more Bitcoins\
    \ are mined, this fee will become a significant portion of their income.\n\nNow\
    \ we can put these concepts together in the form of another flowchart in Figure\
    \ [2-3](#430562_2_En_2_Chapter.xhtml#Fig3). This will help solidify the process\
    \ of mining in the context of difficulty and target values.\n\n![../images/430562_2_En_2_Chapter/430562_2_En_2_Fig3_HTML.jpg](images/430562_2_En_2_Chapter/430562_2_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\n\nSolving the PoW problem\n\nMiners across the network compete to\
    \ solve the problem, and the winning miner announces the block to the network,\
    \ which then gets incorporated in the blockchain. To solve the PoW, a miner has\
    \ to keep generating new hash values (through the hash function) using the incremented\
    \ `nonce` until a hash below the target value is discovered. In this case, notice\
    \ that the `nonce` is the only adjustable value. This is a simplified PoW scheme,\
    \ and there are small differences in its implementation versus reality.\n\n> **Note**\
    \  \n> The term *mining* came about because the process is similar to the mining\
    \ of rare metals. It is very resource intensive and makes new currency available\
    \ at a slow rate, just like the miners in the Bitcoin protocol getting rewarded.\n\
    \nWe talked about the self-correction properties of the Bitcoin network and how\
    \ they allow the network to adapt. Next, we will take a look at an unexpected\
    \ consequence of getting a very large number of miners in the network as Bitcoin\
    \ gained popularity. This led to an arms race of sorts, and it had far-reaching\
    \ consequences. But first we need to talk about the new types of mining hardware\
    \ that emerged.\n\n## Mining Hardware\n\nAs Bitcoin started to gain more popularity\
    \ and acceptance with merchants, more miners joined the network in hopes of getting\
    \ the rewards. Miners began to get more creative with how they approached mining,\
    \ such as using specialized hardware that can generate more hashes. In this section,\
    \ we will discuss the evolution of mining hardware as Bitcoin started to spread\
    \ globally.\n\n*   **CPU mining:** The earliest form of mining available through\
    \ the Bitcoin clients. It became the norm for mining in the early versions of\
    \ the Bitcoin client but was removed in the later updates due to better options’\
    \ being accessible.\n\n*   **GPU mining:** The next wave of mining advancements.\
    \ It turns out that mining with a GPU is far more powerful because it can generate\
    \ hundreds of times more hashes than a CPU. This is now the standard for mining\
    \ in most cryptocurrencies.\n\n*   **FPGAs and ASICs:** FPGA stands for Field-Programmable\
    \ Gated Array and is an integrated circuit designed for a specific use case. In\
    \ this case, the FPGAs were designed for mining Bitcoins. The FPGAs are written\
    \ with very specific hardware language that allows them to perform one task very\
    \ efficiently in terms of power usage and output efficiency. Shortly after the\
    \ introduction of FPGAs, a more optimized, mass-producible, and commercial design\
    \ came out in the form of ASICs (Application-Specific Integrated Circuits). The\
    \ ASICs have a lower per unit cost, so the units can be mass produced. The ASIC-based\
    \ devices are also compact in form, therefore more can be integrated in a single\
    \ device. The ability of ASICs to be combined in arrays at a low price point made\
    \ a very convincing case for accelerating the rate of mining.\n\n*   **Mining\
    \ pools:** As the mining difficulty went up due to the rise of ASICs, miners realized\
    \ that individually, it was not financially wise to continue mining. It was just\
    \ taking too long, and the reward did not match the resources that went into mining.\
    \ So the miners organized themselves into groups called pools to combine the computational\
    \ resources of all the members and mine as one unit. Today, joining a pool is\
    \ very common to get started with mining in almost every crpytocurrency.\n\n*\
    \   **Mining cloud services:** These are simply contractors who have specialized\
    \ mining rigs. They rent their services to a miner according to a contract for\
    \ a given price to mine for a specific time.\n\nIt is easy to see how ASICs completely\
    \ changed the mining game after developers and hardware hobbyists realized that\
    \ custom arrays of ASICs could be made at a fairly cheap price point. It was the\
    \ beginning of a kind of arms race in Bitcoin hardware, and developers began designing\
    \ new chips and buying new equipment for mining rigs that could allow them to\
    \ mine the most Bitcoin. This initial push driven by profit accelerated Bitcoin’s\
    \ reach and created a golden era for the alternative currency. More developers\
    \ and enthusiasts joined in on buying custom hardware to maximize their profits.\
    \ The network responded by increasing the difficulty as the number of miners increased.\
    \ Within a short span of time, the bubble could not sustain itself for the miners\
    \ because of the self-correcting features present in the protocol, and the difficulty\
    \ kept rising. In some cases, the hardware that miners purchased could no longer\
    \ mine profitably by the time it arrived from the factory. A significant investment\
    \ of capital was required up-front to make any appreciable returns. Most of the\
    \ ASIC hardware is now historic, and even Bitcoin mining pools are not profitable\
    \ for the average miner. The startups and companies that commercialized ASICs\
