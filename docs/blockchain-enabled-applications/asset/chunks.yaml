    credentials verified. This includes a review of board certifications, education,
    work history, and more. A shift in mindset that enabled this use case was a realization
    by entrepreneurs that credentialing can be maintained as a canonical entity, independent
    from a hospital system. When needed, a physician can simply transfer records under
    a smart contract to a new hospital, and fulfilling the smart contract would result
    in validation. This process is frictionless, and using the blockchain can also
    accelerate payments and validation. Here’s an excerpt from a PWC report ([`https://www.pwc.com/us/en/industries/health-industries/library/blockchain-could-accelerate-credentialing.html`](https://www.pwc.com/us/en/industries/health-industries/library/blockchain-could-accelerate-credentialing.html))
    that provides insight into the inefficiencies present in the current system:


    *   > *The inefficient credentialing process is costly to providers and payers.
    The Council for Affordable Quality Healthcare estimates that payers spend more
    than $2 billion a year maintaining provider databases, 75 percent of which could
    be eliminated by establishing a single source of truth, such as a blockchain.*


    *   > *Each physician in a practice submits an average of 18 applications for
    credentialing each year. That requires 80 minutes—including 69 minutes of staff
    time and 11 of physician time—per physician. Payers then spend time and money
    verifying these claims.*


    *   > *The* *National Association of Medical Staff Services (NAMSS)* *estimates
    that most physician credentialing takes more than 120 days, while health plan
    enrollment takes 60 to 180 days.*


    *   > *Those costs don’t even take into account another system-wide burden that
    blockchain could simplify: Credentialing and directory updates to list locations
    where a physician sees patients and whether a physician is enrolled with a certain
    insurer or is taking new patients. NAMSS estimates that 12 to 18 percent of provider
    directories are out of date or incorrectly list a provider as participating in
    a plan.*


    *   > *A recent CMS audit of Medicare Advantage online provider directories found
    that 52.2 percent contained inaccuracies. According to CMS’ 2019 call letter,
    it will begin taking enforcement actions against some Medicare Advantage organizations
    that don’t correct serious provider directory deficiencies.*


    ProCredEx ([`https://hashedhealth.com/blockchain-healthcare-solutions/professional-credentials-exchange/`](https://hashedhealth.com/blockchain-healthcare-solutions/professional-credentials-exchange/))
    is a Hashed Health partner currently implementing this use case by developing
    the Professional Credentials Exchange: a blockchain-based information exchange
    for physician credentialing. More information about the implementation is available
    on the Hashed Health services page. Here, let’s briefly focus on the concept of
    a generalized credentialing exchange and how it provides value in the context
    of providers and payers:


    *   Physicians join an exchange and have their credentials verified. The resulting
    verification is stored on a blockchain, and the exchange starts to build a repository
    of credentials. The exchange starts to evolve into a physician directory over
    time, and payers can make rapid queries about insurance enrollment and other practice-specific
    details. A micro-transaction cost associated with making queries becomes rewards
    for maintainers of the blockchain network. This incentivization can be paired
    with tokens to provide a multiplier, and in a sense, this guarantees an accurate
    response.


    *   Providers become partners of the exchange, and request to verify the credentials
    of a new physician under a smart contract. The exchange automates this process,
    and the resulting smart contract is fulfilled frictionlessly on the blockchain,
    resulting in a rapid turnover. A layer of network verifiers is rewarded upon the
    completion of the smart contract.


    *   Similarly, payers can partner with an exchange as it grows to have a critical
    mass of physicians. This allows for more fluid queries into services offered by
    a physician and contracts with insurers, and could pave the way for frictionless
    prior authorization.'
  trans: '

    # 医师资质认证


    资质认证是对医师专业档案进行整理和核验的过程。任何加入诊所或医师网络的医生都必须通过资质验证，这包括审查其委员会认证、教育背景、工作履历等信息。推动该应用场景实现的思维转变在于：企业家们意识到资质认证可以作为独立于医院系统的规范实体进行维护。当需要时，医师只需通过智能合约将档案转移至新医院，合约履行即完成验证。这一流程毫无摩擦，而区块链的应用还能加速支付与验证流程。以下是普华永道报告（`https://www.pwc.com/us/en/industries/health-industries/library/blockchain-could-accelerate-credentialing.html`）中揭示现有系统效率低下的摘录：


    > *低效的资质认证流程给医疗机构和支付方都造成了高昂成本。优质医疗可负担性委员会（CAQH）估计，支付方每年维护医疗机构数据库的费用超过 20 亿美元，其中
    75%可通过建立单一可信来源（如区块链）予以消除。*


    > *每家诊所的每位医师平均每年需提交 18 份资质认证申请。每份申请耗时 80 分钟——包括员工工作时间 69 分钟和医师本人时间 11 分钟。支付方随后还需花费时间和金钱核验这些申请材料。*


    > *全美医疗人员服务协会（NAMSS）估计，大多数医师资质认证耗时超过 120 天，而健康计划注册则需要 60 至 180 天。*


    > *这些成本甚至尚未计入区块链可简化的另一项全系统负担：更新医师接诊地址及是否与特定保险公司签约或接收新患者的资质认证与名录维护。NAMSS 估计，12%至
    18%的医疗机构目录已过时，或错误地将某机构列为参与计划方。*


    > *CMS 最近对联邦医疗保险优势计划在线医疗机构目录的审计发现，其中 52.2%的目录存在不准确信息。根据 CMS 2019 年度函件，其将对未纠正严重目录缺陷的联邦医疗保险优势计划组织启动执法行动。*


    ProCredEx（`https://hashedhealth.com/blockchain-healthcare-solutions/professional-credentials-exchange/`）是
    Hashed Health 的合作伙伴，目前正通过开发专业资质认证交易所来实践这一应用场景：这是一个基于区块链的医师资质认证信息交换平台。关于实施方案的更多信息可查阅
    Hashed Health 服务页面。此处我们简要探讨通用资质认证交易所的概念及其在医疗机构与支付方场景中的价值：


    - 医师加入交易所并通过资质核验。核验结果存储于区块链上，交易所逐步建立资质数据库。随着时间推移，交易所将演变为医师名录，支付方即可快速查询保险签约状况及其他执业详情。查询产生的微量交易成本将成为区块链网络维护者的奖励。这种激励机制可与代币结合产生倍增效应，从某种意义上确保了响应的准确性。


    - 医疗机构成为交易所合作伙伴，通过智能合约申请核验新入职医师资质。交易所自动化处理该流程，智能合约在区块链上无摩擦地完成履行，实现快速周转。网络验证者层将在智能合约完成后获得奖励。


    - 同理，随着交易所扩展至拥有足够规模的医师群体，支付方也可与之建立合作。这将促使医师服务项目及保险公司合同的查询更加流畅，并为实现无摩擦预授权铺平道路。

