- fmt: "### Superglobal Operation System for Network Architecture (SOSNA)\n\nSo, how\
    \ does a buyer know whether a miner satisfies the required dependencies to compile\
    \ and run an application that the buyer requested? How does a buyer know what\
    \ applications are compatible with a miner’s setup? These questions are handled\
    \ by the operating system for SONM. A World Computer is not complete without an\
    \ operating system to power it, and the OS for SONM is called `SOSNA`.\n\n**Note**\
    \  \nIn this chapter, we have discussed SONM only in the context of buyers and\
    \ providers for HPC services; however, the first use cases for early versions\
    \ of SONM will focus on running a *Quake* server in a completely decentralized\
    \ manner. The roadmap includes the message-passing protocols and the payout app.\n\
    \nThe problem of dependency management and compatibility for compilers will be\
    \ handled by using containers on host machines. A container is simply a minimal\
    \ virtual machine that can load any specified configuration, from new libraries\
    \ to standard tools such as the GNU compiler toolchain. The container runs in\
    \ a minimal isolated environment on the host system. This is done in order to\
    \ prevent any escalation-of-privilege attacks by malicious programs running within\
    \ the container. `SOSNA` can be divided into three main components: the blockchain\
    \ layer comprising the smart contract system, a grid core, and a layer of consumer-facing\
    \ applications. We already discussed the blockchain layer and API (enabled by\
    \ the smart contracts) in detail. Let’s shift our focus to the grid core. In SONM,\
    \ any grid-compatible PaaS stack can be plugged in to work with the network, such\
    \ as BOINC (Berkeley Open Infrastructure for Network Computing) or Yandex.Cocaine.\n\
    \nA simplified implementation of grid architecture involves two units: multiple\
    \ worker/slave modules and a master module. These two units form a computing cloud,\
    \ and a fog computing cloud extends this idea to hundreds of instances deployed\
    \ across all types of machines. What defines a grid network as such is that a\
    \ master machine manages workers distributed across a distance to different geographic\
    \ locations. The master essentially behaves like a hub, managing the execution\
    \ of applications on miners’ machines, balancing load, scheduling tasks, and collecting\
    \ the results. More generally, we can suggest that a master module works like\
    \ a traditional miner pool.\n\nAny application executing inside a container is\
    \ referred to as a service. Technically, all services in SONM are RPC-based and\
    \ accept a specific set of messages to execute directives. Each service has a\
    \ list of functions that can be referenced by sending messages to that service\
    \ after a connection has been established. This set of functions is called a service\
    \ protocol. A protocol can be dynamically obtained from a service once it becomes\
    \ active by resolving the service name using a locator. The use of a locator can\
    \ be thought of as similar to host-name resolution using DNS. We’ll return to\
    \ the locator service shortly. On startup, a node loads the settings specified\
    \ in a configuration file, including all the services that are to start on this\
    \ particular node. The services lack the ability to communicate code over the\
    \ network; they can only receive messages in this state. To allow access to the\
    \ network and RPC-compatible communication, the node will start a special service\
    \ called the locator. Every other service running in the container becomes attached\
    \ to the locator for receiving and sending messages. Once the locator service\
    \ is activated, it binds to a public endpoint in the network and broadcasts the\
    \ connection to the blockchain. So, what steps does a buyer need to perform to\
    \ access a particular service for their task? Using the locator service, a buyer\
    \ needs to go through the following five steps:\n\n- Connect to locator endpoint\
    \ on a public port.\n- Send a resolve request with the name of a service to the\
    \ locator.\n- Receive a message back from the locator with information about the\
    \ endpoint container, the protocol description, and function calls.\n- Receive\
    \ a confirmation message indicating that the request for information was completed.\n\
    - Request a specific miner with the endpoint information that matches the locator\
    \ message and call the required service for task execution/processing.\n\nA visual\
    \ companion to the components of SOSNA is provided in Figure [7-11](#430562_2_En_7_Chapter.xhtml#Fig12).\n\
    \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig12_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig12_HTML.jpg)\n\
    \n**Figure 7-11** Overview of SOSNA architecture\n\nIn Figure [7-11](#430562_2_En_7_Chapter.xhtml#Fig12),\
    \ we start at the blockchain layer, which provides the consensus framework to\
    \ the network, along with the smart contract system for governance. Next is the\
    \ messaging bus layer, which serves as a two-way communication channel between\
    \ the various components of the World Computer and users in the network. This\
    \ layer also exists on both sides, allowing the blockchain to communicate to the\
    \ consumer-facing applications and the grid-core to coordinate task execution.\
    \ On the very top, we have a consumer application layer, which is where buyers\
    \ can access the network and post requests for services. The `RegApp` is an early\
    \ example of consumer applications that buyers would interact with in the future.\
    \ Eventually, the consumer layer would split into more verticals with features\
    \ such as trusted-runtime skipping the verification stages for users with a high\
    \ reputation in the network. On the opposite end, at the very bottom, we have\
    \ the grid core. This is the heart of SONM, where the fog cloud computing takes\
    \ place. The grid is essentially a parallel implementation of several hundred\
    \ master and slave modules. The slave modules run containers where services execute,\
    \ and these services are connected to a locator. The locator runs on a public\
    \ port accessible to the buyer through the consumer-apps layer.\n\nThree notable\
    \ updates to the SONM platform have happened as the project has evolved from an\
    \ early alpha. The first is an installation image of `SONM-OS` available for devices\
    \ so they can connect with the SONM marketplace and start mining right away in\
    \ an out-of-the-box fashion. The resources accumulated are tracked, and the renter\
    \ is awarded for lending their computational resources. The second is a use case\
    \ for a machine learning implementation on devices running SONM to handle `TensorFlow`,\
    \ `Apache Spark`, and `Theano` applications on a decentralized fog-computing platform.\
    \ The final update to note is the CDN use case for off-loading images and media\
    \ onto SONM devices and retrieving them from fog-computing-based CDN, which is\
    \ significantly cheaper than traditional web services and offers comparable performance.\
    \ A pricing calculator for SONM services is provided on the website."
  raw: '### Superglobal Operation System for Network Architecture (SOSNA)


    So, how does a buyer know whether a miner satisfies the required dependencies
    to compile and run an application that the buyer requested? How does a buyer know
    what applications are compatible with a miner’s setup? These questions are handled
    by the operating system for SONM. A World Computer is not complete without an
    operating system to power it, and the OS for SONM is called SOSNA.


    Note


    In this chapter, we have discussed SONM only in the context of buyers and providers
    for HPC services; however, the first use cases for early versions of SONM will
    focus on running a *Quake* server in a completely decentralized manner. The roadmap
    includes the message-passing protocols and the payout app.


    The problem of dependency management and compatibility for compilers will be handled
    by using containers on host machines. A container is simply a minimal virtual
    machine that can load any specified configuration, from new libraries to standard
    tools such as the GNU compiler toolchain. The container runs in a minimal isolated
    environment on the host system. This is done in order to prevent any escalation-of-privilege
    attacks by malicious programs running within the container. SOSNA can be divided
    into three main components: the blockchain layer comprising the smart contract
    system, a grid core, and a layer of consumer-facing applications. We already discussed
    the blockchain layer and API (enabled by the smart contracts) in detail. Let’s
    shift our focus to the grid core. In SONM, any grid-compatible PaaS stack can
    be plugged in to work with the network, such as BOINC (Berkeley Open Infrastructure
    for Network Computing) or Yandex.Cocaine.


    A simplified implementation of grid architecture involves two units: multiple
    worker/slave modules and a master module. These two units form a computing cloud,
    and a fog computing cloud extends this idea to hundreds of instances deployed
    across all types of machines. What defines a grid network as such is that a master
    machine manages workers distributed across a distance to different geographic
    locations. The master essentially behaves like a hub, managing the execution of
    applications on miners’ machines, balancing load, scheduling tasks, and collecting
    the results. More generally, we can suggest that a master module works like a
    traditional miner pool.


    Any application executing inside a container is referred to as a service. Technically,
    all services in SONM are RPC-based and accept a specific set of messages to execute
    directives. Each service has a list of functions that can be referenced by sending
    messages to that service after a connection has been established. This set of
    functions is called a service protocol. A protocol can be dynamically obtained
    from a service once it becomes active by resolving the service name using a locator.
    The use of a locator can be thought of as similar to host-name resolution using
    DNS. We’ll return to the locator service shortly. On startup, a node loads the
    settings specified in a configuration file, including all the services that are
    to start on this particular node. The services lack the ability to communicate
    code over the network; they can only receive messages in this state. To allow
    access to the network and RPC-compatible communication, the node will start a
    special service called the locator. Every other service running in the container
    becomes attached to the locator for receiving and sending messages. Once the locator
    service is activated, it binds to a public endpoint in the network and broadcasts
    the connection to the blockchain. So, what steps does a buyer need to perform
    to access a particular service for their task? Using the locator service, a buyer
    needs to go through the following five steps:


    *   Connect to locator endpoint on a public port.


    *   Send a resolve request with the name of a service to the locator.


    *   Receive a message back from the locator with information about the endpoint
    container, the protocol description, and function calls.


    *   Receive a confirmation message indicating that the request for information
    was completed.


    *   Request a specific miner with the endpoint information that matches the locator
    message and call the required service for task execution/processing.


    A visual companion to the components of SOSNA is provided in Figure [7-11](#430562_2_En_7_Chapter.xhtml#Fig12).


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig12_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig12_HTML.jpg)


    Figure 7-11


    Overview of SOSNA architecture


    In Figure [7-11](#430562_2_En_7_Chapter.xhtml#Fig12), we start at the blockchain
    layer, which provides the consensus framework to the network, along with the smart
    contract system for governance. Next is the messaging bus layer, which serves
    as a two-way communication channel between the various components of the World
    Computer and users in the network. This layer also exists on both sides, allowing
    the blockchain to communicate to the consumer-facing applications and the grid-core
    to coordinate task execution. On the very top, we have a consumer application
    layer, which is where buyers can access the network and post requests for services.
    The RegApp is an early example of consumer applications that buyers would interact
    with in the future. Eventually, the consumer layer would split into more verticals
    with features such as trusted-runtime skipping the verification stages for users
    with a high reputation in the network. On the opposite end, at the very bottom,
    we have the grid core. This is the heart of SONM, where the fog cloud computing
    takes place. The grid is essentially a parallel implementation of several hundred
    master and slave modules. The slave modules run containers where services execute,
    and these services are connected to a locator. The locator runs on a public port
    accessible to the buyer through the consumer-apps layer.


    Three notable updates to the SONM platform have happened as the project has evolved
    from an early alpha. The first is an installation image of SONM-OS available for
    devices so they can connect with the SONM marketplace and start mining right away
    in an out-of-the-box fashion. The resources accumulated are tracked, and the renter
    is awarded for lending their computational resources. The second is a use case
    for a machine learning implementation on devices running SONM to handle TensorFlow,
    Apache Spark, and Theano applications on a decentralized fog-computing platform.
    The final update to note is the CDN use case for off-loading images and media
    onto SONM devices and retrieving them from fog-computing-based CDN, which is significantly
    cheaper than traditional web services and offers comparable performance. A pricing
    calculator for SONM services is provided on the website.'
  trans: "\n### 超级全局网络操作系统（SOSNA）\n\n那么，买家如何知道矿工是否满足编译和运行其所请求应用所需的依赖项？买家又如何知道哪些应用与矿工的系统设置兼容？这些问题由\
    \ SONM 的操作系统处理。没有操作系统的驱动，世界计算机是不完整的，而 SONM 的操作系统被称为 `SOSNA`。\n\n**注意**  \n在本章中，我们仅在\
    \ HPC 服务的买家和提供商背景下讨论了 SONM；然而，早期版本 SONM 的首批用例将专注于以完全去中心化的方式运行 *Quake* 服务器。路线图包括消息传递协议和支付应用。\n\
    \n依赖管理和编译器兼容性问题将通过在主机器上使用容器来解决。容器本质上是一个最小的虚拟机，能够加载任何指定的配置，从新的库到标准工具（如 GNU 编译器工具链）。容器在主机系统上一个最小的隔离环境中运行。这样做是为了防止容器内运行的恶意程序发起权限提升攻击。`SOSNA`\
    \ 可分为三个主要组件：包含智能合约系统的区块链层、一个网格核心以及面向消费者的应用层。我们已经详细讨论了区块链层和 API（由智能合约启用）。现在，让我们把焦点转向网格核心。在\
    \ SONM 中，任何网格兼容的 PaaS 堆栈都可以接入网络工作，例如 BOINC（伯克利开放式网络计算基础设施）或 Yandex.Cocaine。\n\n\
    一个简化的网格架构实现包含两个单元：多个工作/从属模块和一个主控模块。这两个单元构成一个计算云，而雾计算云将这一想法扩展到部署在所有类型机器上的数百个实例。网格网络的定义在于，主控机器管理分布在不同地理位置的工作机器。主控模块本质上像一个中心枢纽，管理矿工机器上应用的执行、平衡负载、调度任务并收集结果。更一般地说，我们可以认为主控模块的工作方式类似于传统的矿池。\n\
    \n在容器内执行的任何应用都被称为服务。从技术上讲，SONM 中的所有服务都基于 RPC，并接受一组特定的消息来执行指令。每个服务都有一个函数列表，在建立连接后，可以通过向该服务发送消息来引用这些函数。这组函数被称为服务协议。一旦服务通过定位器解析其名称而激活，就可以动态地获取该协议。定位器的使用可以类比于使用\
    \ DNS 进行主机名解析。我们稍后将回到定位器服务。启动时，节点会加载配置文件中指定的设置，包括所有需要在此特定节点上启动的服务。服务没有能力通过网络传输代码；在这种状态下，它们只能接收消息。为了允许访问网络并实现\
    \ RPC 兼容的通信，节点会启动一个名为定位器的特殊服务。容器中运行的所有其他服务都会附接到定位器，以接收和发送消息。一旦定位器服务被激活，它会绑定到网络中的一个公共端点，并将连接广播到区块链。那么，买家需要执行哪些步骤才能为其任务访问特定服务呢？使用定位器服务，买家需要执行以下五个步骤：\n\
    \n- 连接到公共端口上的定位器端点。\n- 向定位器发送一个包含服务名称的解析请求。\n- 从定位器接收一条消息，其中包含端点容器、协议描述和函数调用的信息。\n\
    - 接收一条确认消息，表明信息请求已完成。\n- 使用与定位器消息匹配的端点信息请求特定的矿工，并调用所需服务来执行/处理任务。\n\nSOSNA 各组件的可视化辅助图见图\
    \ 7-11。\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig12_HTML.jpg](img/430562_2_En_7_Fig12_HTML.jpg)\n\
    \n**图 7-11** SOSNA 架构概览\n\n在图 7-11 中，我们从区块链层开始，它为网络提供共识框架以及用于治理的智能合约系统。接下来是消息总线层，它充当世界计算机各个组件与网络用户之间的双向通信信道。这一层也存在于两侧，允许区块链与面向消费者的应用通信，以及让网格核心协调任务执行。在最顶层，我们有一个消费者应用层，买家可以在此访问网络并发布服务请求。`RegApp`\
    \ 是未来买家将与之交互的消费者应用的一个早期例子。最终，消费者层将分裂成更多垂直领域，例如为网络中信誉度高的用户提供免去验证阶段的可信运行时功能。在另一端的最底层，我们有网格核心。这是\
    \ SONM 的心脏，雾计算在此进行。网格本质上是数百个主控和从属模块的并行实现。从属模块运行执行服务的容器，这些服务连接到定位器。定位器运行在一个公共端口上，买家可以通过消费者应用层访问该端口。\n\
    \n随着项目从早期 Alpha 版本演进，SONM 平台发生了三项值得注意的更新。第一个是 `SONM-OS` 的安装镜像，可用于设备，使其能够立即连接 SONM\
    \ 市场并开箱即用地开始挖矿。积累的资源会被跟踪，出借其计算资源的租户将获得奖励。第二个是在运行 SONM 的设备上实现机器学习的用例，以在去中心化的雾计算平台上处理\
    \ `TensorFlow`、`Apache Spark` 和 `Theano` 应用。最后一项更新是 CDN 用例，用于将图像和媒体卸载到 SONM 设备上，并从基于雾计算的\
    \ CDN 中检索它们，这比传统的网络服务便宜得多，并提供可比的性能。SONM 服务的定价计算器可在网站上找到。\n"
- fmt: '# iEx.ec


    We will conclude this chapter with a short discussion of the iEx.ec platform,
    which is also a distributed HPC token using a domain-specific blockchain. iEx.ec
    is built on a mature set of research technologies called XtremWeb, which was developed
    for desktop grid computing by INRIA. So, what is a desktop grid? The idea behind
    desktop grid computing is to collect the computation resources of idle machines
    connected to the network to execute intensive parallel applications, at a very
    small cost (or free, in the case of a volunteer desktop grid) compared to a traditional
    supercomputer. `XtremWeb-HEP` is a decentralized version of its predecessor, designed
    to execute tasks that require intensive computing resources in a marketplace of
    miners. This open source desktop grid stack belongs to the “Cycle Stealing” family
    that uses idle resources on machines connected to the network for executing data-intensive
    applications. `XtremWeb-HEP` implements most of the features necessary in a HPC
    token that we’ve previously seen: fault-tolerance, hybrid public–private infrastructure,
    deployment of virtual images (containers), load balancing, and a payment mechanism
    for the miners. The DApps running on the network will rely on the iEx.ec architecture
    to automatically search for all the computing resources needed to run the app,
    provision resources, and release funds to the appropriate parties.


    Using a well-established and well-tested software stack offers three main advantages:


    - **Resilience:** If one computation node fails, the task can be reassigned to
    other working nodes and continue with minimal downtime.

    - **Efficiency:** The base performance of applications across the network is high,
    despite hardware configuration changes that occur for workers from one node to
    another.

    - **Pluggable nodes:** New nodes can be added to the network without any special
    configuration, and nodes become integrated after a quick setup.


    In iEx.ec, any actions that happen externally or off-chain are referred to as
    a contribution. For instance, providing a data set, transferring files and performing
    a computation are all actions that would require token transactions between the
    relevant parties. How do we know whether the action actually took place correctly?
    How can a particular transaction or set of transactions be associated with a particular
    action that was performed off-chain? A new protocol is needed to verify that a
    contribution took place and which transactions correspond to it. iEx.ec has proposed
    `proof-of-contribution` as a new consensus mechanism for off-chain contributions.
    This new mechanism also plays a role in enabling an enterprise feature in iEx.ec
    called Service Level Agreement (SLA). Using an SLA allows for resource utilization
    tracking and trusted computing resource orders from the customer to a provider.
    The iEx.ec team predicts that content distribution to parties on the network will
    be a tremendously important function of DApps using the iEx.ec blockchain. The
    buyers will have access to complex data sets on the blockchain through a smart
    contract, and to a simple payment structure for running their application. Using
    `proof-of-contribution`, iEx.ec can guarantee that the content providers are actually
    giving access to data sets, and that the file was accessible during processing.
    For payment purposes, the duration of access can also be recorded to protect the
    buyer against overcharging. In addition, iEx.ec will have several countermeasures
    against malicious entities that claim file transfers failed in order to reduce
    their data charges.


    The first few releases of iEx.ec will focus on consolidating the core features
    as well as on a financial trading use case that requires HPC. This service, called
    `eFast`, will employ sophisticated computational prediction methods to allow small
    investors to make better trading decisions. The objective is to create diverse
    portfolios using cluster analysis of different stocks, but the computational complexity
    of such an analysis is so immense that only large financial institutions can afford
    it. A decentralized service like iEx.ec can reduce the processing cost to a tenth
    of what it would traditionally cost on a computation farm.


    **Note**


    Golem and iEx.ec share similar goals for product development; however, they differ
    in business approach. Golem aims to build the core infrastructure of the network
    and attract HPC and cloud customers. iEx.ec first focuses on building DApps that
    will run on the network to attract regular cloud customers that have a need for
    those applications at a cheaper rate.


    So, how do tasks get assigned and executed on iEx.ec? There are two algorithms
    that manage this process: a matchmaking algorithm for execution and a scheduler
    for assignment. Let’s briefly talk about both of them.


    A matchmaking algorithm is used in distributed systems to match pairs of resource
    providers and potential buyers according to the description of the resource provided
    by the buyer. Recall that in SONM, this task was taken over by a load balancer;
    however, in iEx.ec, an algorithm performs resource provisioning. The developers
    propose to eventually store smart contracts on the blockchain that describe the
    availability of computational resources and the resources required to run a task.
    This can include information such as available RAM, processor/CPU, disk space,
    and the type of GPU. For a host machine, the tasks would be deployed to a virtual
    machine instance or a hypervisor, and the buyer would specify the runtime instructions.
    The matchmaking algorithm can implement more-intricate policies beyond a simple
    one-to-one match, and iEx.ec can monetize the more-complex matches. There are
    several design choices for the matchmaking algorithm, but iEx.ec will be using
    a language called `ClassAd`, which has been well tested in the scientific literature.


    The second algorithm is the scheduler, which is critical to any distributed computing
    system. The performance and scalability of a network depends on the effectiveness
    of its scheduler. The design challenge for iEx.ec is to create a scheduler enabled
    with multiple-criteria decision analysis (MCDA) that can select optimal computing
    resources for each task and schedule it appropriately to fit the buyer’s criteria.
    MCDA is a branch of operations research that evaluates how to optimize decisions
    in the setting of multiple conflicting options. MCDA-based solutions might fit
    a customer’s needs, especially based on the cost-versus-performance benchmarks.
    A customer might want to minimize the price of computation even if it takes longer,
    while another might want to minimize the time required—these are the types of
    scenarios that will be handled by a scheduler in iEx.ec.'
