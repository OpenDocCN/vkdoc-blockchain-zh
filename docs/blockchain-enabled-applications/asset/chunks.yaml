- fmt: '### State Channels


    State channels are a general model to think about interactions that occur on the
    blockchain, but can be shifted off-chain without compromising the security of
    the network. A well-studied example of a state channel in Bitcoin is a payment
    channel: instant, friction-less transaction of payment between two parties, without
    having to wait for the long confirmation periods on the Bitcoin blockchain. Broadly
    speaking, the idea of a state channel can be applied to any state-altering interaction
    happening on a blockchain protocol. Moving a subset of transactions or blockchain
    interactions off-chain without undermining security can lead to significant improvements
    in network speed.


    There are three basic components of a state channel:


    - **Locking mechanism**: A segment of the blockchain state is locked by a multi-signature
    smart contract such that a specific set of users must completely agree with the
    contract in order to update it.

    - **Off-chain actions**: The off-chain users update a local state by signing transactions
    and constructing blocks that can be submitted to the main blockchain. These transactions
    are aggregated and updated locally in the payment state channel.

    - **Unlocking mechanism**: The participants submit the aggregate state from the
    payment channel to the blockchain, and if the contract is satisfied, the state
    is unlocked on the blockchain from the first step.


    Here, the first and third components lock and unlock a partition of the global
    state and are considered blockchain operations. However, the second component
    can be done completely off-chain and can involve a large number of transactions/updates.
    These updates can be made rapidly and retain internal consistency on the payment
    channel, without needing to involve the blockchain. This step provides scalability
    and immense performance benefits. In this manner, only the first and the third
    steps need to be published to the network and confirmed on the blockchain. The
    transactions in the middle can be carried out at a much faster rate on a state
    channel.


    ### Plasma


    `Plasma` is a framework for conducting off-chain transactions while using the
    consensus and security mechanisms from the Ethereum blockchain to sync these transactions.
    `Plasma` chains are partially independent sub-chains that are registered with
    the main Ethereum blockchain. These sub-chains can commit transactions to the
    main Ethereum blockchain in a batch. In this manner, some of the transactional
    demand for computational power is relieved from the main blockchain. The nodes
    can now dedicate this computational power to contracts and other higher-level
    tasks. `Plasma` takes the concept of payment channels even further by allowing
    for the creation of child blockchains attached to the main Ethereum blockchain.
    These child chains can in turn spawn even more child chains. Essentially, `Plasma`
    is a framework for many branching blockchains linked to one main blockchain (the
    Ethereum blockchain in this case).


    In terms of security, plasma-based chains rely on the main Ethereum blockchain
    for consensus and consistency mechanisms. Users can rely on security measures
    put forth by the Ethereum network in order to redeem any assets decided on the
    child chain. `Plasma` chains use `MapReduce` along with a Merkle tree construct
    to ensure transactional verification and detect fraud. Additionally, members with
    a stake in the plasma chain will self-police and monitor the chain. If any disputes
    arise, they can submit a timestamp or proof of malicious behavior to the main
    Ethereum blockchain for resolution. `Plasma` chains include another fraud-prevention
    mechanism called roll-back. This feature is activated when a double-spending-type
    activity causes a payment or transaction to fail. When this feature is active,
    all funds are returned to the state of the network before the attempted fraud.
    In the proposed implementation, the roll-back process is very cheap computationally
    for the parent Ethereum blockchain and offers enormous security.


    ## Blockchain-as-a-Service


    Microsoft recently announced a partnership with the Ethereum Foundation to launch
    a blockchain-based service on their cloud platform `Azure`. This Infrastructure-as-a-Service
    approach to offering fast and easy implementations of blockchain will allow developers
    to experiment with new features and deploy `DApps` at reduced costs. Marley Grey
    from the `Azure` Blockchain Engineering team describes how `Blockchain-as-a-Service`
    (`BaaS`) will foster an ecosystem of `DApps`:


    > *Microsoft and ConsenSys are partnering to offer* *Ethereum Blockchain as a
    Service (E-BaaS)* *on Microsoft Azure so Enterprise clients and developers can
    have a single click cloud based blockchain developer environment. The initial
    offering contains two tools that allow for rapid development of SmartContract
    based applications: Ether.Camp—An integrated developer environment, and BlockApps—a
    private, semi-private Ethereum blockchain environment, can deploy into the public
    Ethereum environment.*

    >

    > *“Ethereum Blockchain as a Service” provided by Microsoft Azure and ConsenSys
    allows for financial services customers and partners to play, learn, and fail
    fast at a low cost in a ready-made dev/test/production environment. It will allow
    them to create private, public and consortium based Blockchain environments using
    industry leading frameworks very quickly, distributing their Blockchain products
    with Azure’s World Wide distributed (private) platform. That makes Azure a great
    Dev/Test/Production Environment for Blockchain applications. Surrounding capabilities
    like Cortana Analytics (machine learning), Power BI, Azure Active Directory, O365
    and CRMOL can be integrated into apps launching a new generation of decentralized
    cross platform applications.*


    This initial update on `BaaS` was provided at the end of 2015, and currently a
    whole ecosystem of Blockchain Labs is flourishing within the `Azure DevTest` community.
    The `DevTest Labs` allow users and developers to explore and test a template designed
    for a specific use case. In addition, the platform began with Ethereum blockchains,
    but recently more startups have started to build on `Azure`, offering new services
    such as `Emercoin`, which offered a `SSH` service, `PokiDot`, with their healthcare-oriented
    blockchain called `Dokchain`. Over time, more startups have begun using `Azure`
    as the standard to run a blockchain and build applications on top. With the integration
    of intelligence services such as `Cortana`, it may become easier to develop oracles
    that can sign incoming data from external streams (such as IoT devices) and provide
    a level of integrity.


    **Note**


    Two developments from Microsoft in the `BaaS` space are noteworthy here. The first
    is the introduction of `Cryptlets`, a secure middleware to interface with external
    events for building enterprise smart contracts. The second development is the
    `Coco` framework, an open source system for building a high-throughput network
    on top of a blockchain, where nodes and actors are explicitly declared and controlled.
    By design, `Coco` is compatible with any ledger protocol, and would allow enterprises
    to build production-ready blockchain networks. More about Microsoft’s platform
    will be presented in a later chapter.'
