- fmt: "在 [Figure 7-8](#430562_2_En_7_Chapter.xhtml#Fig8) 中，你可以看到通信总线构成了该架构的骨干，在每个层级都与世界计算机的组件相连。通过\
    \ SONM 的请求工作流始于买家请求计算资源。该请求被广播到区块链和串行总线上，以便其他组件能够验证特定请求是否合法。矿工接受任务，负载均衡器将任务分发到雾计算云中执行。如有必要，负载均衡器还可以通过插件板将任务分配给与\
    \ SONM 兼容的特定应用网格网络。雾云还拥有一个去中心化服务的本地存储，例如`Storj`或`IPFS`，可按需使用。最后，负载均衡器还有两个更重要的角色：跟踪任务结果和整体网络健康状况。负载均衡器（`Hub`）在任务完成后收集结果，并将其发送回买家。健康指标向负载均衡器和网络报告世界计算机中每个组件的状态，以便在任务分配/执行方面做出更优决策。\n\
    \nSONM 中的智能合约系统是一组用于区块链治理和网络上去中心化应用管理的协议（智能合约）。该智能合约系统维护着网络的完整性，并提供了若干针对恶意实体的对策，我们将在后面讨论。此外，SONM\
    \ 使用形式化定义和严格证明来展示买家与提供商之间通信的安全性（加密安全的消息传递）。网络中各参与方之间的交互使用一种名为`pi-calculus`的高级数学框架进行建模。该框架是一种形式化语言，用于描述在多参与方系统中通过定义良好的信道进行的安全并发交互。SONM\
    \ 中的治理原型包括一个去中心化自治组织（DAO）、一个法院合约、一个网络范围的中继注册表，以及一个用于将新应用部署到 SONM 网络（例如，白名单、中继工厂和中继钱包）的工厂合约。该模型进行了扩展，包含了管理网络上运行的\
    \ DApp 所必需的一些新元素（由工厂部署）。目前，购买计算资源的过程在网络中看起来非常分散。然而，在未来的版本中，买家将填写一份预购计算表单，以指明他们的硬件选择、要使用的\
    \ DApp 以及任何特殊的执行参数。让我们更深入地了解当前 SONM“区块链政府”中使用的完整智能合约集合：\n\n- **SONM 代币：** 网络的默认货币。该代币用于奖励提供计算资源的矿工，以及网络内的用户交易。\n\
    - **DAO：** SONM 的监管机构，授予用户投票权和管理去中心化应用的行政权限。网络上的 DApp 需要支付 *税收* 才能被纳入 DAO 并获得法院访问权限。DAO\
    \ 还拥有执行特权，可以执行诸如封禁中继、释放和锁定资金以确保矿工获得适当报酬，以及暂停或禁止中继等操作。\n    > 注意：法院将作为一个可通过 DAO\
    \ 访问的争议解决智能合约来实现。它将为市场中的不公平买家或提供商提供保护，并在对解决方案提出质疑时提供结果验证。\n\n- **中继工厂：** 一个中继在智能合约系统中有两个扩展：一个工厂和一个钱包。钱包只能由中继钱包工厂创建。工厂创建一个新的钱包合约，然后将此合约注册到白名单中。\n\
    - **中继钱包：** 中继钱包是一个接收买家付款并促进向矿工支付服务代币的合约。钱包由工厂创建，可以处于四种可能状态之一：已创建、已注册、空闲、疑似/已惩罚。最初，所有钱包都处于已创建状态，并有一定数量的冻结资金。在已创建状态下，合约可以在白名单上注册。该合约随后切换到已注册状态，并有权访问高级功能，例如转账和发薪。现在，该钱包可以在一个称为发薪期的指定时间内开始向矿工（但不向自己）付款。在发薪期结束后，钱包可以使用`payday`函数将剩余资金转移到所有者的钱包。如果发现关联的中继存在恶意行为，DAO\
    \ 可以将其列入黑名单并没收冻结资金。根据情况，DAO 可以进一步决定将钱包状态更改为疑似或已惩罚。\n- **白名单：** 白名单是一种注册类型的合约，包含网络中中继的详细信息，包括其状态。所有由工厂创建的钱包都在此白名单合约中注册。最初，此白名单作为经\
    \ SONM 开发者验证为安全可靠的可信中继注册表。最终，此功能将扩展到开放对新涌现中继的评级。\n- **RegApp：** 一个使用`React.js`制作的简单\
    \ Web 应用，用于中继节点注册。该应用程序将一个节点添加到白名单合约中。需要注意的是，`RegApp`与语言无关，只需要一个 Web 界面来注册节点。在此示例中使用了`React.js`，但其他\
    \ Web 编程语言也同样适用。\n- **PayOut 应用：** 一个在 SONM 网络上运行的支付应用程序，用于支付和处理给予矿工服务报酬的代币。该应用程序是工厂合约将部署的\
    \ DApp 类型的一个示例。\n\n[Figure 7-9](#430562_2_En_7_Chapter.xhtml#Fig9) 为刚刚讨论的智能合约系统提供了直观的补充说明。来自\
    \ Chain Cloud 的 Anthony Akentiev 审阅了 SONM 白皮书，并就未来版本中使用 SONM 代币为开发此智能合约架构提供资金的众筹工作提供了一些评论（[`https://medium.com/chain-cloud-company-blog/sonm-whitepaper-review-353ca2713ba9`](https://medium.com/chain-cloud-company-blog/sonm-whitepaper-review-353ca2713ba9)）：\n\
    \n> *众筹分为两个阶段——预售和 ICO。所有资金的 19% 和 20% 作为奖励发送给团队。开发和营销需要等额的資金：预售后，34% 用于开发，32%\
    \ 用于营销；ICO 后，30% 用于开发，33% 用于营销。这看起来很好且公平。*\n>\n> *结论——45/60*\n>\n> *这是我读过的最好的白皮书之一。大项目。大目标。预售和\
    \ ICO 将会很盛大。*\n\n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig9_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig9_HTML.jpg)\n\
    \n**图 7-9** SONM 智能合约系统概览"
  raw: 'In Figure [7-8](#430562_2_En_7_Chapter.xhtml#Fig8), you can see that the communication
    bus forms the backbone of this architecture, connecting at every level to the
    components of the World Computer. The workflow of a request through SONM begins
    with a buyer requesting computational resources. This request is broadcasted on
    the blockchain and the serial bus so that other components can verify if a particular
    request is legitimate. The miners accept the task, and the load balancer distributes
    the task to be executed in the fog computing cloud. If necessary, the load balancer
    can also assign a task to run on an application-specific grid network compatible
    with SONM through the plug-ins board. The fog cloud also has a local storage in
    the form of a decentralized service such as Storj or IPFS that is used as necessary.
    Finally, the load balancer also has two more important roles: to follow up with
    the task results and with the overall network health. The load balancer (Hub)
    collects the results of a task after it has been completed and sends it back to
    the buyer. A health indicator reports on the status of every component in the
    World Computer to the load balancer and the network in order to make better decisions
    regarding task assignment/execution.


    The smart contract system in SONM is a set of protocols (smart contracts) for
    blockchain governance and management of decentralized applications implemented
    on the network. This system of smart contracts maintains the integrity of the
    network and provides several countermeasures against malicious entities, which
    we will discuss later. Furthermore, SONM uses formal definitions and rigorous
    proofs to demonstrate the security of communication (cryptographically secure
    message passing) between buyers and providers. The interactions between various
    parties on the network are modeled using a high-level mathematical framework called
    pi-calculus. This framework is a formal language for describing secure and concurrent
    interactions within a multi-party system over well-defined channels. The governance
    prototype in SONM includes a Decentralized Autonomous Organization (DAO), a court
    contract, a network-wide registry of hubs, and a factory contract to deploy new
    applications to the SONM network (for instance the whitelist, hub factory, and
    hub wallet). This model is extended to include some new elements (deployed by
    the factory) necessary for the management of DApps that run on the network. Currently,
    the process of buying computational resources appears very fragmented on the network.
    However, in future releases, buyers will complete a pre-purchase computing form
    to indicate their hardware selection, the DApps they want to use, and any special
    execution parameters. Let’s look at the complete set of smart contracts used in
    the current SONM “blockchain government” in more depth:


    *   **SONM Token:** Default currency of the network. The token is used to reward
    miners for providing computational resources and for user transactions within
    the network.


    *   **DAO:** The regulatory body of SONM that grants users voting rights and administrative
    actions to manage decentralized applications. DApps on the network are required
    to pay *taxes* to be included in the DAO and gain access to the court. The DAO
    also has executive privileges to perform actions such as blacklisting a hub, releasing
    and locking funds to ensure proper payout for miners, and suspending or banning
    a hub.


    Note


    The court will be implemented as a dispute-resolution smart contract accessible
    through the DAO. It will offer protection against unfair buyers or providers in
    the market, along with result verification in case of challenges toward a solution.


    *   **Hub factory:** A hub has two extensions in the smart contract system, a
    factory and a wallet. The wallet can only be created by a hub wallet factory.
    The factory creates a new wallet contract and then registers this contract in
    the whitelist.


    *   **Hub wallet:** The hub wallet is a contract that receives payments from buyers
    and facilitates the payout of tokens to miners for services. The wallet is created
    by a factory and can exist in one of four possible states: created, registered,
    idle, suspected/punished. Initially, all wallets exist in the created state and
    have a fixed amount of frozen funds. In the created state, a contract can be registered
    on the whitelist. This contact now switches to the registered state, and has access
    to advanced functions such as transfer and payday. Now this wallet can begin to
    pay out miners (but not itself) within a specified amount of time called the payout
    period. After the end of payout period, the wallet can transfer the remaining
    money to the owner’s wallet using the payday function. If a connected hub is caught
    performing malicious behavior, the DAO can blacklist the hub and seize the frozen
    funds. The DAO can further decide to change the state of the wallet to suspected
    or punished depending on the case.


    *   **Whitelist:** The whitelist is a registry-type contract that contains detailed
    information about hubs across the network, including their status. All wallets
    created by the factory are registered in this whitelist contract. Initially, this
    whitelist serves as a registry for trusted hubs verified by SONM developers to
    be safe and secure. Eventually, this functionality will be expanded to open ratings
    for new and emerging hubs.


    *   **RegApp:** A simple web app made with React.js used for hub-node registration.
    This application adds a node to the whitelist contract. It should be noted that
    the RegApp is language agnostic and only needs a web interface to register the
    node. In this instance, React.js was used; however, other web programming languages
    can work just as well.


    *   **PayOut app:** A payment application that runs on the SONM network to pay
    and process the tokens given to miners for their services. This application is
    an example of the types of DApps that a factory contract would deploy.


    Figure [7-9](#430562_2_En_7_Chapter.xhtml#Fig9) provides a visual companion to
    the smart contract system just discussed. Anthony Akentiev from Chain Cloud reviewed
    the SONM whitepaper and provided some comments regarding the crowdfunding efforts
    using the SONM token to fund the development of this smart contracts architecture
    in future releases ([`https://medium.com/chain-cloud-company-blog/sonm-whitepaper-review-353ca2713ba9`](https://medium.com/chain-cloud-company-blog/sonm-whitepaper-review-353ca2713ba9)):


    > *The crowdfunding is divided into 2 stages — the presale and the ICO. 19% and
    20% of all funds are sent to the team as a reward. Development and marketing will
    require equal amounts of money: 34% for the development and 32% for marketing
    after the presale; 30% for the development and 33% for marketing after the ICO.
    It looks good and fair.*


    > *Conclusion — 45/60*


    > *One of the best Whitepapers that I have read. Big project. Big goals. The presale
    and ICO are gonna be big.*


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig9_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Overview of the smart contract system in SONM'
