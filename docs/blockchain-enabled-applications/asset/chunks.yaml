    # 7. High-Performance Computing


    In the Ethereum ecosystem, the transfer of value between users is often realized
    by the use of tokens that represent digital assets. `Ether` is the default token
    and the de facto currency used for transactions and for initializing smart contracts
    on the network. Ethereum also supports the creation of new kinds of tokens that
    can represent any commonly traded commodities as digital assets. All tokens (for
    instance `ANT` or `GLM`, explained later in the chapter) are implemented using
    the standard protocol, so the tokens are compatible with any Ethereum wallet on
    the network. The tokens are distributed to users interested in the given specific
    use case through an Initial Coin Offering (`ICO`). In this chapter, we will focus
    our attention on tokens created for a very specific use case: high-performance
    computing (HPC). More precisely, we will discuss a model of distributed HPC where
    miners offer computational resources for a task and get rewarded in some form
    of Ethereum token.


    We will begin our discussion with an overview of the lifecycle of a token in the
    network. Then, we will dive into the first token, Ethereum Computation Market
    (`ECM`), which is the most generalized and comprehensive distributed processing
    system. `ECM` will be our standard model for HPCs that use tokens, and we will
    introduce concepts such as dispute resolution (firm and soft) and verifiability
    of off-chain processing with on-chain rewards. The second token we will cover
    is `Golem`, which posits itself as the Airbnb for unused CPU cycles. At the time
    of writing, the latest version, called `Clay Golem`, will allow distributed rendering
    of 3D objects using `Blender`. Future releases will enable more advanced functionality
    such as processing big-data analytics. The third token we will present is Supercomputing
    Organized by Network Mining (`SONM`), which extends the idea of fog computing
    (a decentralizing computational processing model) to create an Ethereum-powered
    machine economy and marketplace. `SONM` has published a technically oriented roadmap
    focused on neural networks and artificial intelligence. The initial use case will
    be to provide decentralized hosting to run a *Quake* server. The final token we
    will talk about in this chapter is `iEx.ec`, which leverages well-developed desktop
    grid computing software along with a proof-of-computation protocol that allows
    for off-chain consensus and monetization of resources offered. We will end the
    chapter by examining the implications of tokens in a post-blockchain economy and
    the nimble development of sidechains.'
