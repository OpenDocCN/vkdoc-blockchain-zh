    for final resolution. TrueBit is a smart contract–based dispute-resolution layer
    built for Ethereum. It integrates as an add-on on top of the existing architecture
    for Ethereum projects such as Golem. The design principle for TrueBit is to rely
    on the only trusted resource in the network to resolve a dispute: the miners.
    A hard resolution using TrueBit relies on a verification subroutine involving
    limited-resource verifiers known as judges.


    In TrueBit’s verification game, there are three main players: a solver, a challenge,
    and judges. The solver presents a solution for a task, a challenger contests the
    presented answer, and the judge decides whether the challenger or the solver is
    correct. The purpose of using the verification subroutine is to reduce the complexity
    of on-chain computation. This is done as the game proceeds in rounds, where each
    round narrows down the scope of computation until only a trivial step remains.
    This last step is executed on-chain by a smart contract (judge), which makes the
    final verdict on which party is correct. Note that the judges in this scheme are
    constrained in terms of computational power. Therefore, only very simplistic computations
    are ultimately carried out on-chain for the judge to make a ruling. A visual guide
    to the verification game is provided in Figure [7-7](#430562_2_En_7_Chapter.xhtml#Fig7).


    Note


    The verification game works iteratively, with a reward structure benefiting the
    verifiers (challengers) who diligently search for errors. Accurate detection and
    eventual verification of errors results in challengers’ being rewarded with a
    substantial jackpot.


    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig7_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Verification game


    To begin the first round of this game, the solver must commit to a segment of
    steps (computations) performed over a specific time window. The solver selects
    computation steps equally spaced in time across the provided window and creates
    a Merkle-tree mapping to the full internal state of the network. The Merkle roots
    of these trees are broadcasted to the blockchain. The challenger now performs
    a binary search through the Merkle trees until she discovers the first instance
    that mismatches with her own expectations. That is to say, she finds a step *i*
    where the Merkle root is not updated as the state transitions from step *i* to
    *i*+1\. Given step *i*, the challenger can request a Merkle proof for memory access
    before and after this step. In this context, a Merkle proof is a path from the
    step *i* to the Merkle root together with all the siblings (capturing the state
    of the network at step *i*). Note that the siblings are identical before and after
    (siblings at steps *i* and *i*+1); only the data for step *i* will change. At
    this point, the judge can run step *i* and check whether updating the state to
    *i*+1 also updates the Merkle root correctly. The judge can provably discover
    which party is wrong in this step and broadcast the verdict. In the end, either
    the cheating solver will be punished, or the challenger will pay for the resources
    consumed by the false alarm.


    TrueBit is an advanced on-chain execution mechanism compared to the on-chain verification
    implemented in ECM. It offers the ability to verify computations at a lower cost
    than running the full instruction because only one step is executed on-chain.
    By using TrueBit as a dispute-resolution layer for off-chain computations, smart
    contracts can enable third-party programs to execute well-documented routines
    in a trustless manner. Even for advanced machine learning applications such as
    deep learning that require terabytes of data, as long as the root hash of the
    training data is encoded in the smart contract, it can be used to verify the integrity
    of off-chain computations. The reason TrueBit works for large datasets is simply
    due to the Merkle roots’ mapping the state of the network at a given time *t*,
    and a challenger’s ability to perform a binary search. For a project like Golem
    aiming to achieve HPC toward a variety of use cases, TrueBit can enable large
    datasets to be used off-chain with an on-chain guarantee of accurate outputs.


    Note


    Off-chain task execution raises concerns about network integrity. Layer 2.0 upgrades
    to Ethereum are raising overall network security and enabling trustless off-chain
    task execution. To that end, TrueBit is being considered as a candidate for Layer
    2.0 upgrades.


    There are three new use cases being considered with the release of Clay Golem:


    *   **gWasm:** Webassembly (Wasm) is an operating-system-agnostic format for distributing
    binary files that execute with near-native performance on various platforms. gWasm
    is a wrapper for integrating new applications into the Golem network. The premise
    of gWasm is that if an app can be compiled to Wasm, it can be distributed to the
    Golem network. In early development.


    *   **gLAMBDA:** An upcoming scientific use case for Golem. Applying parallelization
    to perform RASPA simulations on the Golem network (in a decentralized fashion).
    RASPA is a general-purpose simulation package that can be used in simulations
    of molecules in gases, fluids, and carbon nanotubes.


    *   **Video transcoding:** Another upcoming use case for Golem. Focuses on digital
    conversion of large video files from one format to another.'
  trans: "\n此支付框架也可用作冲突解决的备用机制。如果某个任务挑战在经历传统 Golem 机制后仍悬而未决，我们将需要一种硬性解决方法（如我们在“Ethereum\
    \ 计算市场”部分所见）。此时，我们可以使用类 TrueBit 风格的“审判”来进行最终裁决。TrueBit 是一个基于智能合约的、为 Ethereum 构建的争议解决层。它作为附加组件集成在现有\
    \ Ethereum 项目（如 Golem）的架构之上。TrueBit 的设计原则是依赖网络中唯一可信的资源——矿工——来解决争议。使用 TrueBit 进行硬性解决依赖于一个涉及有限资源验证者（称为法官）的验证子程序。\n\
    \n在 TrueBit 的验证游戏中，有三个主要角色：求解者、质询者和法官。求解者提交任务的解决方案，质询者对提交的答案提出异议，法官则判定质询者或求解者哪一方正确。使用验证子程序的目的是降低链上计算的复杂度。这是通过游戏分轮次进行来实现的：每一轮都会缩小计算范围，直到只剩下一个简单的步骤。这最后一步由智能合约（法官）在链上执行，并最终裁定哪一方正确。请注意，这个方案中的法官在算力上是受限的。因此，最终只会将极其简单的计算放到链上供法官裁决。验证游戏的直观指南如图\
    \ 7-7 所示。\n\n> **注意**\n> \n> 验证游戏以迭代方式运作，其奖励结构有利于那些勤奋查找错误的验证者（质询者）。准确检测并最终验证错误后，质询者将获得丰厚的累积奖金作为奖励。\n\
    \n![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig7_HTML.jpg](img/430562_2_En_7_Fig7_HTML.jpg)\n\
    \n**图 7-7** 验证游戏\n\n要开始此游戏的第一轮，求解者必须提交在特定时间窗口内执行的一系列步骤（计算）。求解者选择在该时间窗口内时间间隔相等的计算步骤，并创建一个映射到网络完整内部状态的\
    \ Merkle 树。这些树的 Merkle 根被广播到区块链上。随后，质询者会通过 Merkle 树执行二分查找，直到发现第一个与自身预期不符的实例。也就是说，她找到一个步骤\
    \ *i*，在该步骤中，当状态从步骤 *i* 转换到步骤 *i*+1 时，Merkle 根并未更新。给定步骤 *i*，质询者可以请求获取该步骤前后内存访问的\
    \ Merkle 证明。在此上下文中，Merkle 证明是从步骤 *i* 到 Merkle 根的路径，以及所有兄弟节点（它们捕捉了步骤 *i* 时的网络状态）。请注意，步骤\
    \ *i* 和 *i*+1 前后的兄弟节点完全相同；只有步骤 *i* 的数据会发生变化。此时，法官可以执行步骤 *i*，并检查将状态更新到 *i*+1 是否也正确更新了\
    \ Merkle 根。法官可以据此确凿地发现哪一方在此步骤中是错误的，并广播裁决结果。最终，要么作弊的求解者受到惩罚，要么质询者为此误报所消耗的资源买单。\n\
    \n与 ECM 中实现的链上验证相比，TrueBit 是一种先进的链上执行机制。它能够以低于运行完整指令集的成本来验证计算，因为只有一步是在链上执行的。通过将\
    \ TrueBit 用作链下计算的争议解决层，智能合约可以使第三方程序以无需信任的方式执行文档完善的例程。即使是需要 TB 级数据的先进机器学习应用（如深度学习），只要训练数据的根哈希被编码在智能合约中，就能用其验证链下计算的完整性。TrueBit\
    \ 之所以能够处理大型数据集，原因很简单：Merkle 根映射了网络在给定时间点 *t* 的状态，并且质询者能够执行二分查找。对于像 Golem 这样旨在面向多种用例实现高性能计算（HPC）的项目，TrueBit\
    \ 可以支持在链下使用大型数据集，同时通过链上机制保证输出结果的准确性。\n\n> **注意**\n> \n> 链下任务执行引发了对网络完整性的担忧。Ethereum\
    \ 的 Layer 2.0 升级正在提升整体网络安全，并实现无需信任的链下任务执行。为此，TrueBit 正被考虑作为 Layer 2.0 升级的候选方案。\n\
    \nClay Golem 的发布带来了三个正在考虑的新用例：\n\n*   **gWasm：** WebAssembly (Wasm) 是一种独立于操作系统的格式，用于分发能在各种平台上以接近原生性能执行的二进制文件。`gWasm`\
    \ 是一个用于将新应用集成到 Golem 网络的封装器。`gWasm` 的前提是：如果一个应用能编译为 Wasm，它就能被分发给 Golem 网络。目前处于早期开发阶段。\n\
    \n*   **gLAMBDA：** Golem 即将推出的一个科学用例。应用并行化在 Golem 网络上（以去中心化方式）执行 RASPA 模拟。RASPA\
    \ 是一个通用模拟包，可用于气体、流体和碳纳米管中分子的模拟。\n\n*   **视频转码：** Golem 另一个即将推出的用例。专注于将大型视频文件从一种格式数字转换为另一种格式。\n"
- fmt: '# SONM (Supercomputer Organized by Network Mining)


    `SONM` is a decentralized implementation of the fog computing concept using a
    blockchain. To understand how `SONM` works within the framework of fog computing,
    we first need to define two networking concepts: `IoT` and `IoE`. The European
    Commission defines the Internet of Things (`IoT`) architecture as a pervasive
    network of objects that have IP addresses and can transfer data over the network.
    `IoT` lends itself to the broader concept of Internet of Everything (`IoE`), which
    provides a seamless communication bus and contextual services between objects
    in both the real world and the virtual world. `IoE` is defined by Cisco as follows:


    > *The networked connection of people, process, data, and things. The benefit
    of `IoE` is derived from the compound impact of connecting people, process, data,
    and things, and the value this increased connectedness creates as “everything”
    comes online.*


    While `IoT` traditionally refers to devices connected to each other or cloud services,
    `IoE` is an umbrella term for a heavier focus on “people” as an essential component
    attached to the business logic for generating revenue. From an engineering standpoint,
    `IoT` is the messaging layer focusing on device-to-device communication and `IoE`
    is the monetization layer allowing startups to capitalize on the interaction between
    people and their devices. A staggering amount of data is generated from devices
    connected in an `IoT` network. Transferring this data to the cloud for processing
    requires enormous network bandwidth, and there are delays between when the data
    is generated, processing this data, and receiving the results (from hours to days).
    A major limitation of `IoT` technology is that transfer delay period. Recently,
    a growing concern has been the loss of value of actionable data due to the transfer
    and processing stages. By the time we receive those processed results, it is too
    late to act on that data.


    One solution presented by Ginny Nichols from Cisco is called fog computing. Fog
    computing reduces the transfer delay by shifting the processing stage to lower
    levels of the network. Instead of processing a task by off-loading it to a centralized
    cloud, fog computing pushes high-priority tasks to be processed by a node closest
    to the device actually generating the data. For a device to participate in the
    fog, it must be capable of processing tasks, have local storage, and have some
    network connectivity. The concept of fog computing is a metaphor for the fact
    that fog forms close to the ground. Therefore, fog computing extends the cloud
    closer to the devices (ground) that produce `IoT` data to enable faster action.
    In fog computing, data processing is said to be concentrated at the edge (closer
    to the devices generating data) rather than existing centrally in the cloud. This
    allows us to minimize latency and enable faster response to time-sensitive tasks
    or reduce the time within which an action can be taken on data. `SONM` makes this
    layer of fog computing available to a decentralized network of participants for
    processing computationally intensive tasks.


    **Note**


    The need for faster response time to data (or business analytics) collected by
    large enterprises stimulated the development of real-time computational processing
    tools such as `Apache Spark`, `Storm`, and `Hadoop`. These tools allow for pre-processing
    of data as it is being collected and transferred. In a similar manner, fog computing
    seems to be an extension of `IoT` developed in response to the need for rapid
    data triage/processing.


    `SONM` is built on top of `Yandex.Cocaine` (Configurable Omnipotent Custom Applications
    Integrated Network Engine). `Cocaine` is an open source `PaaS` stack for creating
    custom cloud hosting engines for applications, similar to `Heroku`. `SONM` has
    a complex architecture designed to resemble the World Computer model of Ethereum.
    The `SONM` team designed this world computer with components that are parallel
    to a traditional personal computer, with one major difference—the components are
    connected to a decentralized network.


    - **CPU/Processor (Load Balancer):** In `SONM`’s architecture, the processor (Hub)
    serves as a load balancer and task scheduler. The entire network can be represented
    as a chain of Hub nodes (or Hubs) that distribute tasks, gather results from a
    computing fog, pay miners for services, and provide status updates on the overall
    health of the network. Each hub node is analogous to a processor’s core, and the
    number of cores (or Hub nodes) can be extended or reduced on the network as necessary.
    In a personal computer, the cores are locally accessible to the processor; however,
    in `SONM`, the cores are decentralized by nature. The hubs provide support to
    the whole network for coordinating the execution of tasks. More specifically,
    hubs provide the ability to process and parallelize high-load computations on
    the fog computing cloud.


    - **BIOS (Blockchain):** For `SONM`, the `BIOS` is the Ethereum blockchain. Ethereum
    offers a reliable backbone for network consensus and payment mechanisms, which
    `SONM` can inherit. However, the base Ethereum implementation lacks a load balancer,
    and high gas costs have inspired alternatives on top of the blockchain, such as
    `SONM`.


    - **Graphics Processing Unit:** The `GPU` for `SONM` is the fog computing cloud.
    More specifically, this fog comprises the miners in the `SONM` network that are
    making computational resources available to buyers.


    - **Connected peripherals:** The buyers in `SONM` are equivalent to peripheral
    devices. The buyers connect to the network and pay for any resources they use.
    The requests are broadcasted on the blockchain, and miners select what they want
    to execute on their machines. Then, the load balancer dictates the execution of
    tasks.


    - **Hard disk:** Storage in `SONM` will be implemented using well-established
    decentralized storage solutions such as `IPFS` or `Storj`.


    - **Serial bus:** A communication module used for message passing and data transfer
    within the network between the sender (a node) and working machines. This serial
    bus is based on `Ethereum Whisper` and enables broadcast and listen functions
    for messages on the network.


    - **Plug-ins circuit board:** A plug-ins board can be thought of as an expansion
    pack for the network. It allows `SONM` to expand its processing capabilities by
    seamlessly integrating compatible networks and computation farms.


    Figure [7-8](#430562_2_En_7_Chapter.xhtml#Fig8) provides a visual representation
    of the World Computer’s components.


    ```

    ![../images/430562_2_En_7_Chapter/430562_2_En_7_Fig8_HTML.jpg](images/430562_2_En_7_Chapter/430562_2_En_7_Fig8_HTML.jpg)

    ```


    **Figure 7-8** World Computer implemented in `SONM`'
