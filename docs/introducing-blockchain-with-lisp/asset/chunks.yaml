    # 1. 区块链简介\n\n![../images/510363_1_En_1_Chapter/510363_1_En_1_Figa_HTML.jpg](img/510363_1_En_1_Figa_HTML.jpg)\n\
    \n*区块链集市，D. Bozhinovski 绘*\n\n本章介绍一些重要的区块链定义和示例。我们将看到区块链具备哪些特性、它能让我们做什么，以及它的用途。\n\
    \n![../images/510363_1_En_1_Chapter/510363_1_En_1_Figb_HTML.gif](img/510363_1_En_1_Figb_HTML.gif)\
    \  \n**定义 1-1**  \n**区块链**是一种在通过点对点网络连接的多个计算机之间维护交易记录的系统。^(¹)\n\n我们将给出一个示例作为引子，同时定义什么是加密和哈希技术，以及它们如何帮助我们构建系统。\n\
    \n请注意，本章中我们将对一些技术细节进行简略处理，因为它作为入门材料。技术细节将在后续构建区块链时逐步揭示。"
- fmt: '# Motivation and Basic Definitions


    Let’s assume that you and your friends exchange money often, for example, when
    paying for dinner or drinks. It can be inconvenient to exchange cash all the time.


    One possible solution is to keep records of all the bills that you and your friends
    have. This is called a *ledger* and is depicted in Figure [1-1](#510363_1_En_1_Chapter.xhtml#Fig1).


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig1_HTML.jpg](images/510363_1_En_1_Chapter/510363_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    A ledger and a set of connected friends (peers)


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figc_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figc_HTML.gif)
    Definition 1-2


    A **ledger** is a book that contains a record of transactions.


    Further, at the end of every day, you all sit together and refer to the ledger
    to do the calculations to settle up. Let’s imagine that there is a pot, which
    is the place where all of the money is kept. If you spent more than you received,
    you put money into the pot; otherwise, you take money out.


    We want to design a system that functions similarly to a regular bank account.
    A holder of a wallet (the bank account) should only be able to send money from
    their wallet to other wallets. Thus, every person in the system will have a *wallet*
    of a kind, which can also be used to determine their balance. Note that with the
    current setup using a ledger, we have to go through all existing records to determine
    the balance of a specific wallet.


    If we want to avoid going through all existing records, there is a way we can
    optimize this, using *unspent transaction outputs* (UTXOs), as we will see in
    Section 3.5.


    A problem that may arise is the so-called *double-spending* problem, where Bob
    can try to send all of his money to Alice and you at the same time. This would
    effectively double the money he sends in relation to what he has. There are several
    ways this can be resolved, and the solution that we will provide will be a simple
    check of the sum of the inputs and the sum of the outputs (UTXO).


    Another problem that might appear with this kind of system is that anyone can
    add a transaction. For example, Bob can add a transaction in which Alice pays
    him a few dollars without Alice’s approval. We need to rethink our system so that
    each transaction will be verified/signed.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figd_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figd_HTML.gif)
    Definition 1-3


    A **digital signature** is a way to verify the authenticity of digital messages
    and documents.


    To sign and verify transactions, we will rely on digital signatures (Figure [1-2](#510363_1_En_1_Chapter.xhtml#Fig2)).
    For now, let’s assume that anyone who adds information to the ledger also adds
    a signature with each record, and others have no way to modify the signature,
    but can only verify it. We will cover the technical details in Section 1.2.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig2_HTML.jpg](images/510363_1_En_1_Chapter/510363_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Our ledger now contains signatures


    Now let’s assume that Bob is keeping the ledger to himself, and everybody agrees
    to this. The ledger is now stored in what is called a *centralized place*. If
    Bob is unavailable at the end of the day when everybody gathers to settle up,
    nobody will be able to refer to the ledger.


    We need to find a way to decentralize the ledger, so that at any given time, anyone
    can make a transaction. For this, every person involved will keep a copy of the
    ledger to themselves, and when they meet at the end of the day, they will sync
    their ledgers.


    You are connected to your friends, and so are they to you. Informally, this makes
    it a peer-to-peer network.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fige_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Fige_HTML.gif)
    Definition 1-4


    A **peer-to-peer network** is formed when two or more computers are connected
    to each other.


    For example, when you are accessing a web page on the Internet using a browser,
    your browser is the “client” and the web page you’re accessing is hosted by a
    “server.” This represents a centralized system since every user is getting the
    information from a single place—the “server.”


    In contrast, in a peer-to-peer network—which represents a decentralized system—the
    distinction between a “client” and a “server” is blurred. Every peer is both a
    “client” and a “server” at the same time.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig3_HTML.jpg](images/510363_1_En_1_Chapter/510363_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    A decentralized ledger


    With a decentralized system (see Figure [1-3](#510363_1_En_1_Chapter.xhtml#Fig3)),
    as the list of peers (persons) grows, we might run into a problem of *trust*.
    When everybody meets at the end of the day to sync their ledgers, how can they
    believe that the transactions listed in other people’s ledgers are true? Even
    if everybody trusts everybody else’s ledger, what if a new person wants to join
    this network? It’s natural for existing users to ask this newcomer to prove that
    they can be trusted. We need to modify our system to support this kind of trust.
    One way to achieve that is through a *proof of work*, which we introduce next.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figf_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figf_HTML.gif)
    Definition 1-5


    A **proof of work** is data that is time-consuming to calculate, and easy for
    others to verify.


    For each record we will also include a special number (or a hash) that will represent
    *proof of work*, in that it will provide proof that the transaction is valid.
    We will cover the technical details in Section 1.3.


    At the end of the day, we agree that we will trust the ledger of the person who
    has put most of the work in it. If Bob has some errands to run, he can catch up
    the next day by trusting the rest of the peers in the network.


    In addition to all this, we want the transactions to have an order, so every record
    will also contain a link to the previous record. This represents the actual blockchain,
    as depicted in Figure [1-4](#510363_1_En_1_Chapter.xhtml#Fig4).


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig4_HTML.jpg](images/510363_1_En_1_Chapter/510363_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    A chain of blocks, aptly called a blockchain


    If everybody agreed to use this ledger as a source of truth, there would be no
    need to exchange physical money at all. Everybody can just use the ledger to put
    money in or retrieve it.


    To understand the technical bits of digital signatures and proof of work, we will
    be looking at encryption and hashing, respectively. Fortunately for us, the programming
    language that we will be using has built-in functionalities for encryption and
    hashing. We don’t have to dig too deep into how hashing and encryption and decryption
    work, because a basic understanding will be sufficient.


    Observe how we started with a simple definition of a ledger and gradually built
    up to a complex system. We will use the same approach in programming.


    ## Encryption


    We will start by defining encryption and decryption.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figg_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figg_HTML.gif)
    Definition 1-6


    **Encryption** is a method of encoding values so that only authorized persons
    can view the original content. **Decryption** is a method of decoding encrypted
    values.


    Note that in this section we will mostly talk about numbers, but characters and
    letters can also be encrypted/decrypted using the same methods, by using the ASCII^([²](#fn2))
    values for the characters.


    Before we talk about encryption, we first have to recall what *functions* are,
    since encoding/decoding values is achieved by using functions.'
