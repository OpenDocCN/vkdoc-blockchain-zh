    ### 2.3.7 Recursive Procedures


    Procedures, just like data structures (e.g., trees), can be recursive. We already
    saw an example with the factorial procedure, in that it called itself to make
    a computation or a loop.


    For example, here’s how we could define a factorial in Racket:


    ```

    1   (define (fact n)

    2     (if (= n 0)

    3         1

    4         (* n (fact (- n 1)))))

    ```


    Calling it will produce the following:


    ```

    1   > (fact 3)

    2   6

    3   > (fact 0)

    4   1

    ```


    For a more advanced example, we will define a procedure that calculates the length
    (number of elements) of a list:


    ```

    1   (define (list-length x)

    2     (cond ((eq? x ''()) 0)

    3           (else (+ 1 (list-length (cdr x))))))

    ```


    We defined a procedure called `list-length` that accepts a single argument `x`
    and the body of the procedure has the condition:


    1. For the empty list, just return `0` since the length of an empty list is `0`.

    2. Otherwise, return the value of one plus (`list-length (cdr x))`.


    Testing it with a few values:


    ```

    1   > (list-length ''(1 2 3))

    2   3

    3   > (list-length ''())

    4   0

    5   > (list-length ''(1))

    6   1

    ```


    Recall that lists are represented in terms of pairs:


    ```

    1   > (car ''(1 2 3))

    2   1

    3   > (cdr ''(1 2 3))

    4   ''(2 3)

    5   > (car (cdr ''(1 2 3)))

    6   2

    7   > (cdr (cdr ''(1 2 3)))

    8   ''(3)

    ```


    In other words, `cdr` of a list will return that same list without the first element.
    Here is how Racket evaluates `(list-length ''(1 2 3))`:


    ```

    1   (list-length ''(1 2 3))

    2   = (+ 1 (list-length ''(2 3)))

    3   = (+ 1 (+ 1 (list-length ''(3))))

    4   = (+ 1 (+ 1 (+ 1 (list-length ''()))))

    5   = (+ 1 (+ 1 (+ 1 0)))

    6   = (+ 1 (+ 1 1))

    7   = (+ 1 2)

    8   = 3

    ```


    We just saw an example of a recursive behavior, since the recursive cases were
    reduced to the base case to get a result. With this example, we can see the power
    of recursion and how it allows us to process values in a repeating manner.


    There is another way that we can write `list-length`:


    ```

    1   > (define (list-length-iter x n)

    2       (cond ((eq? x ''()) n)

    3             (else (list-length-iter (cdr x) (+ n 1)))))

    4   > (list-length-iter ''(1 2  3) 0)

    5   3

    ```


    Here’s how it evaluates:


    ```

    1   (list-length-iter ''(1 2 3) 0)

    2   = (list-length-iter ''(2 3) 1)

    3   = (list-length-iter ''(3) 2)

    4   = (list-length-iter  ''() 3)

    5   = 3

    ```


    Both procedures are recursive, in that they generate the same result. However,
    the nature of the evaluation is very different.


    **Definition 2-7**


    Recursive procedures can generate an **iterative** or a **recursive** process:


    1. A recursive process is one where the current state of calculation is not captured
    by the arguments, and so it relies on “deferred” evaluations.

    2. An iterative process is where the current state of calculation is captured
    completely by its arguments.


    In the previous examples, `list-length` generates a recursive process since it
    needs to go down to the base case and then build its way back up to do the calculations
    that were “deferred.” In contrast, `list-length-iter` generates an iterative process,
    since the results are captured in the arguments.


    This distinction is important because the very different nature of evaluation
    implies a few things. For example, iterative processes evaluate faster than recursive
    ones.


    In contrast, some algorithms cannot be written using iterative processes, as we
    will see later with left and right folds.


    **Exercise 2-12**


    The way we implemented `fact` represents a recursive procedure that generates
    a recursive process. Rework it so that it is still a recursive procedure and generates
    an iterative process.'
  raw: '### 2.3.6 Conditional Procedures


    There are useful built-in procedures such as checking whether a value is a number,
    whether one number is greater than another, and so on.


    ```

    1   > (number? 1)

    2   #t

    3   > (number? "hello")

    4   #f

    5   > (character? #\A)

    6   #t

    7   > (string? "hello")

    8   #t

    9   > (byte? 72)

    10   #t

    11   > (bytes? #"Hello")

    12   #t

    13   > (procedure? add-one)

    14   #t

    15   > (symbol? (quote hey))

    16   #t

    17   > (symbol? 1)

    18   #f

    19   > (> 1 2)

    20   #f

    21   > (= 1 2)

    22   #f

    23   > (= 1 1)

    24   #t

    ```


    `if` is a built-in syntax that allows the evaluation of expressions based on the
    *truthiness* of some predicate. It accepts three arguments:


    *   Conditional to check


    *   Expression to evaluate if the conditional is true


    *   Expression to evaluate if the conditional is false


    Here’s example usage:


    ```

    1   > (if (= 1 1) "It is true" "It is not true")

    2   "It is true"

    3   > (if (= 1 2) "It is true" "It is not true")

    4   "It is not true"

    ```


    The more general syntax for `if` is `cond`:


    ```

    1   (cond (test-1 action-1)

    2         (test-2 action-2)

    3         ...

    4         (test-n action-n))

    ```


    Optionally, the last test can be an `else` to use the specific action if none
    of the conditions match.


    As an example, here is one way to use `cond` in a definition:


    ```

    1   (define (is-large x)

    2     (cond ((> x 10) #t)

    3           (else #f)))

    ```


    Interacting with it:


    ```

    1   > (is-large 5)

    2   #f

    3   > (is-large 10)

    4   #f

    5   > (is-large 11)

    6   #t

    ```


    As we’ve seen, `=` is an equality predicate that checks whether two numbers are
    equal. However, it only works on numbers, and it will raise an error if we use
    it on anything else :


    ```

    1   > (= 1 2)

    2   #f

    3   > (= 3.14 3.14)

    4   #t

    5   > (= ''() ''())

    6   =: contract violation

    ```


    There are three other important equality predicates:


    *   `eq?` checks whether two arguments refer to the same object in memory.


    *   `eqv?` is the same as `eq?`, except that it can also be used for primitive
    types (e.g. numbers, strings).


    *   `equal?` is the same as `eqv?`, except that it can also be used to check if
    the arguments have the same recursive structure (e.g. lists).


    Note that there’s only one empty list `''()` in memory,^([⁶](#fn6)) so all three
    predicates will return the same value when checking against empty lists.


    To show where `eq?` fails, we will use a built-in procedure called `integer->char`
    that converts a number to a character , per ASCII.


    ```

    1   > (integer->char 65)

    2   #\A

    3   > (eq? ''() ''())

    4   #t

    5   > (eq? (integer->char 65) (integer->char 65))

    6   #f

    7   > (eq? ''(1) ''(1))

    8   #f

    ```


    As expected, this will return true for the empty list but cannot compare objects
    that aren’t referring to the same memory location or lists that actually have
    elements.


    Note how `eqv?` differs in this case:


    ```

    1   > (eqv? ''() ''())

    2   #t

    3   > (eqv? (integer->char 65) (integer->char 65))

    4   #t

    5   > (eqv? ''(1) ''(1))

    6   #f

    ```


    Finally, `equal?` will compare structures recursively, supporting lists :


    ```

    1   > (equal? ''() ''())

    2   #t

    3   > (equal? (integer->char 65) (integer->char 65))

    4   #t

    5   > (equal? ''(1) ''(1))

    6   #t

    ```


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figq_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figq_HTML.gif)
    Exercise 2-10


    We already defined `is-large` using the `cond` syntax. Represent it using the
    `if` syntax.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figr_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figr_HTML.gif)
    Exercise 2-11


    Represent the following logic using `cond`: return `''foo` if the value is a string
    or a number, and `''bar` otherwise.


    ### 2.3.7 Recursive Procedures


    Procedures, just like data structures (e.g. trees), can be recursive. We already
    saw an example with the factorial procedure, in that it called itself to make
    a computation or a loop.


    For example, here’s how we could define a factorial in Racket:


    ```

    1   (define (fact n)

    2     (if (= n 0)

    3         1

    4         (* n (fact (- n 1)))))

    ```


    Calling it will produce the following:


    ```

    1   > (fact 3)

    2   6

    3   > (fact 0)

    4   1

    ```


    For a more advanced example, we will define a procedure that calculates the length
    (number of elements) of a list:


    ```

    1   (define (list-length x)

    2     (cond ((eq? x ''()) 0)

    3           (else (+ 1 (list-length (cdr x))))))

    ```


    We defined a procedure called `list-length` that accepts a single argument `x`
    and the body of the procedure has the condition :


    1.  For the empty list, just return `0` since the length of an empty list is `0`.


    2.  Otherwise, return the value of one plus (`list-length (cdr x))`.


    Testing it with a few values:


    ```

    1   > (list-length ''(1 2 3))

    2   3

    3   > (list-length ''())

    4   0

    5   > (list-length ''(1))

    6   1

    ```


    Recall that lists are represented in terms of pairs:


    ```

    1   > (car ''(1 2 3))

    2   1

    3   > (cdr ''(1 2 3))

    4   ''(2 3)

    5   > (car (cdr ''(1 2 3)))

    6   2

    7   > (cdr (cdr ''(1 2 3)))

    8   ''(3)

    ```


    In other words, `cdr` of a list will return that same list without the first element
    . Here is how Racket evaluates `(list-length ''(1 2 3))`:


    ```

    1   (list-length ''(1 2 3))

    2   = (+ 1 (list-length ''(2 3)))

    3   = (+ 1 (+ 1 (list-length ''(3))))

    4   = (+ 1 (+ 1 (+ 1 (list-length ''()))))

    5   = (+ 1 (+ 1 (+ 1 0)))

    6   = (+ 1 (+ 1 1))

    7   = (+ 1 2)

    8   = 3

    ```


    We just saw an example of a recursive behavior, since the recursive cases were
    reduced to the base case to get a result. With this example, we can see the power
    of recursion and how it allows us to process values in a repeating manner.


    There is another way that we can write `list-length`:


    ```

    1   > (define (list-length-iter x n)

    2       (cond ((eq? x ''()) n)

    3             (else (list-length-iter (cdr x) (+ n 1)))))

    4   > (list-length-iter ''(1 2  3) 0)

    5   3

    ```


    Here’s how it evaluates:


    ```

    1   (list-length-iter ''(1 2 3) 0)

    2   = (list-length-iter ''(2 3) 1)

    3   = (list-length-iter ''(3) 2)

    4   = (list-length-iter  ''() 3)

    5   = 3

    ```


    Both procedures are recursive, in that they generate the same result. However,
    the nature of the evaluation is very different.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figs_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figs_HTML.gif)
    Definition 2-7


    Recursive procedures can generate an **iterative** or a **recursive** process:


    1.  A recursive process is one where the current state of calculation is not captured
    by the arguments, and so it relies on “deferred” evaluations


    2.  An iterative process is where the current state of calculation is captured
    completely by its arguments


    In the previous examples, `list-length` generates a recursive process since it
    needs to go down to the base case and then build its way back up to do the calculations
    that were “deferred.” In contrast, `list-length-iter` generates an iterative process,
    since the results are captured in the arguments.


    This distinction is important because the very different nature of evaluation
    implies a few things. For example, iterative processes evaluate faster than recursive
    ones.


    In contrast, some algorithms cannot be written using iterative processes, as we
    will see later with left and right folds.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figt_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figt_HTML.gif)
