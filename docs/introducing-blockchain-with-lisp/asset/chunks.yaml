- fmt: '### 2.3.10 Packages


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figz_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figz_HTML.gif)
    **Definition 2-9**


    一个**包**（`package`）在 Racket 中类似于某人为其他人使用而编写的一组定义。


    例如，如果我们想使用哈希过程，我们会选择一个实现了这些功能的包并使用它。这使我们能够专注于系统设计，而不是从头开始定义一切。


    包可以在[`https://pkgs.racket-lang.org`](https://pkgs.racket-lang.org/) 上浏览。它们可以通过
    DrRacket 的图形界面安装。当我们尝试使用一个包时，只要它在包仓库中可用，我们就会获得安装它的选项。或者，也可以通过命令行使用 `raco pkg install
    <package_name>` 来安装包。我们将在后续内容中利用这些包。


    为了从包中导出对象（变量、过程等），我们使用 `provide` 语法。例如，让我们创建几个过程，然后将其定义保存到一个名为 `utils.rkt` 的文件中，方法是通过顶部菜单选择
    `File > Save Definitions`。


    ```

    1   (define (sum-list l) (foldl + 0 l))

    2   (define (add-one x) (+ x 1))


    4   (provide sum-list)

    ```


    我们将在与 `utils.rkt` 相同的文件夹中创建另一个名为 `test.rkt` 的文件。我们将使用 `require` 语法：


    ```

    1   (require "utils.rkt")


    3   (define (add-two x) (+ x 2))

    ```


    现在我们可以与 `test.rkt` 进行交互：


    ```

    1   > (sum-list ''(1 2 3))

    2   6

    3   > (add-two 1)

    4   3

    5   > (add-one 1)

    6   add-one: undefined;

    ```


    请注意，`add-one` 是未定义的，因为只有我们在特殊语法 `(provide ...)` 中提供的过程才可供那些需要该包的人使用。


    ### 2.3.11 作用域


    首先，让我们考虑以下定义：


    ```

    1   (define my-number 123)

    2   (define (add-to-my-number x) (+ my-number x))

    ```


    我们创建了一个名为 `my-number` 的变量，并将数字 `123` 赋值给它。我们还创建了一个名为 `add-to-my-number` 的过程，它将一个作为参数传入的数字与
    `my-number` 相加。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figaa_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figaa_HTML.gif)
    **Definition 2-10**


    **作用域**（`Scope`）指的是某些特定定义的可见性，或者说程序的哪些部分可以使用这些定义。


    `my-number` 与 `add-to-my-number` 定义在同一个“层级”，因此它在 `add-to-my-number` 的作用域内。但是 `add-to-my-number`
    中的 `x` 仅在过程定义的主体中可访问，而不能被其外部的任何内容访问。


    使用 `let` 语法，我们可以引入仅在某个特定部分可见的变量：


    ```

    1   (let ([var-1 value-1]

    2         [var-2 value-2])

    3   ... our code ...)

    ```


    这会创建变量 `var-1` 和 `var-2`，它们仅在 `our code` 部分可见。


    ```

    1   > (let ((x 1) (y 2)) (+ x y))

    2   3

    3   > x

    4   . . x: undefined;

    5   > y

    6   . . y: undefined;

    ```


    `letrec` 语法与 `let` 非常相似，区别在于变量在自身的变量作用域内也是可见的：


    ```

    1   > (letrec ((x 1) (y (+ x 1))) y)

    2   2

    ```


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figab_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figab_HTML.gif)
    **Definition 2-11**


    **变量“遮蔽** **”**（`Variable “shadowing”`）发生在一个作用域内定义的变量与外部作用域中定义的变量同名时。


    例如，比较以下两个求值的结果：


    ```

    1   > (let ((x 1)) x)

    2   1

    3   > (let ((x 1)) (let ((x 2)) x))

    4   2

    ```


    在第二个例子中，我们有一个 `let` 嵌套在另一个 `let` 中。内部的 `let` 定义了一个 `x`，外部的 `let` 也定义了一个 `x`。然而，内部
    `let` 中的 `x` 将在内部 `let` 的主体中使用。


    最后，让我们考虑另一个例子：


    ```

    1   (define a-number 3)

    2   (define (test-1 x) (+ a-number x))

    3   (define (test-2 a-number) (+ a-number a-number))

    ```


    交互结果：


    ```

    1   > (test-1 4)

    2   7

    3   > (test-2 4)

    4   8

    ```


    `test-1` 使用了全局作用域中的 `a-number`。`test-2` 对 `my-number` 使用了变量遮蔽，因此它等同于 `(define
    (test-2 x) (+ x x))`。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figac_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figac_HTML.gif)
    **Exercise 2-17**


    使用 DrRacket 的“跟随定义”功能来检查 `test-1` 和 `test-2`。


    ### 2.3.12 突变


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figad_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figad_HTML.gif)
    **Definition 2-12**


    **突变**（`Mutation`）允许用不同的值重新定义变量。


    突变可以通过使用 `set!` 语法来实现。考虑以下定义：


    ```

    1   (define x 123)

    2   x

    3   (define x 1234)

    4   x

    ```


    该定义会产生一个错误，提示 `module: identifier already defined in: x`。然而，下一个定义：


    ```

    1   (define x 123)

    2   x

    3   (set! x 1234)

    4   x

    ```


    会顺利打印出 `123` 后跟 `1234`。


    尽管突变看起来很强大，但良好的 Lisp 实践建议尽可能避免使用突变。原因是突变会导致副作用，而副作用会使程序的推理变得更加困难。为了说明这个问题，请考虑以下定义：


    ```

    1   (define some-number 123)


    3   (define (add-one)

    4     (+ 1 some-number))


    6   (define (add-one-mutation)

    7     (begin

    8       (set! some-number (+ 1 some-number))

    9       some-number))

    ```


    `begin` 允许我们将多个表达式按顺序组合执行。


    现在让我们与它进行交互：


    ```

    1   > (add-one)

    2   124

    3   > (add-one)

    4   124

    ```


    到目前为止，一切正常。没有副作用，因为每次调用 `add-one` 都会返回相同的值。然而：


    ```

    1   > (add-one-mutation)

    2   124

    3   > (add-one-mutation)

    4   125

    5   > (add-one)

    6   126

    ```


    这就是使程序难以推理的原因——当某些值被修改时，某些过程可能会对相同的输入返回不同的值。因此，在使用突变时必须谨慎。不过，我们稍后会在点对点（peer-to-peer）实现中使用突变，这将使事情稍微简单一些。'
  raw: '### 2.3.10 Packages


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figz_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figz_HTML.gif)
    Definition 2-9


    A **package** in Racket resembles a set of definitions someone has written for
    others to use.


    For example, if we want to use hashing procedures, we would pick a package that
    implements these and use them. This allows us to put our focus on the system design
    instead of defining everything from scratch.


    Packages can be browsed at [`https://pkgs.racket-lang.org`](https://pkgs.racket-lang.org/).
    They can be installed from the DrRacket GUI. When we try to use a package, we
    will be provided with an option to install it, given it is available in the packages
    repository. Alternatively, packages can be installed using `raco pkg install <package_name>`
    from the command line. We will take advantage of packages later.


    To export objects (variables, procedures, etc.) from a package, we use the `provide`
    syntax. As an example, let’s create a few procedures and then save their definitions
    in a file called `utils.rkt` by choosing `File > Save Definitions` from the top
    menu.


    ```

    1   (define (sum-list l) (foldl + 0 l))

    2   (define (add-one x) (+ x 1))


    4   (provide sum-list)

    ```


    We will create another file called `test.rkt` in the same folder as `utils.rkt`.
    We will use the `require` syntax:


    ```

    1   (require "utils.rkt")


    3   (define (add-two x) (+ x 2))

    ```


    We can now interact with `test.rkt`:


    ```

    1   > (sum-list ''(1 2 3))

    2   6

    3   > (add-two 1)

    4   3

    5   > (add-one 1)

    6   add-one: undefined;

    ```


    Note that `add-one` was undefined because only the procedures we provide in the
    special syntax `(provide ...)` will be available for use by those that require
    the package .


    ### 2.3.11 Scope


    As a start, let’s consider the following definitions:


    ```

    1   (define my-number 123)

    2   (define (add-to-my-number x) (+ my-number x))

    ```


    We created a variable called `my-number` and assigned the number `123` to it.
    We also created a procedure called `add-to-my-number`, which adds a number (that’s
    passed to it as an argument) to `my-number`.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figaa_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figaa_HTML.gif)
    Definition 2-10


    **Scope** refers to the visibility of some specific definitions, or to which parts
    of the program can use these definitions.


    `my-number` is defined at the same “level” as `add-to-my-number`, so it is in
    the scope of `add-to-my-number`. But the `x` in `add-to-my-number` is only accessible
    in the body of the procedure definition and not accessible to anything outside
    it.


    Using the `let` syntax, we can introduce variables that are visible only in a
    certain section:


    ```

    1   (let ([var-1 value-1]

    2         [var-2 value-2])

    3   ... our code ...)

    ```


    This creates variables `var-1` and `var-2`, which are visible only in the `our
    code` part.


    ```

    1   > (let ((x 1) (y 2)) (+ x y))

    2   3

    3   > x

    4   . . x: undefined;

    5   > y

    6   . . y: undefined;

    ```


    The `letrec` syntax which is very similar to `let`, where in addition the variables
    will be visible in the variable scope:


    ```

    1   > (letrec ((x 1) (y (+ x 1))) y)

    2   2

    ```


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figab_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figab_HTML.gif)
    Definition 2-11


    **Variable “shadowing** **”** occurs when a variable defined in scope has the
    same name as a variable defined in an outer scope.


    For example, compare the result of these two evaluations:


    ```

    1   > (let ((x 1)) x)

    2   1

    3   > (let ((x 1)) (let ((x 2)) x))

    4   2

    ```


    In the second example, we have a `let` within a `let`. The inner `let` is defining
    an `x` and so is the outer `let`. However, the `x` within the inner `let` will
    be used in the inner `let`’s body.


    Finally, let’s consider another example:


    ```

    1   (define a-number 3)

    2   (define (test-1 x) (+ a-number x))

    3   (define (test-2 a-number) (+ a-number a-number))

    ```


    Interacting:


    ```

    1   > (test-1 4)

    2   7

    3   > (test-2 4)

    4   8

    ```


    `test-1` is using `a-number` from the global scope. `test-2` is using variable
    shadowing for `my-number`, so it is the same as saying `(define (test-2 x) (+
    x x))`.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figac_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figac_HTML.gif)
    Exercise 2-17


    Use DrRacket’s feature to follow definitions on `test-1` and `test-2`.


    ### 2.3.12 Mutation


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figad_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figad_HTML.gif)
    Definition 2-12


    **Mutation** allows a variable to be redefined with a different value.


    Mutation can be achieved using the `set!` syntax. Consider the following definition:


    ```

    1   (define x 123)

    2   x

    3   (define x 1234)

    4   x

    ```


    This definition will produce an error that says `module: identifier already defined
    in: x`. However, the next definition:


    ```

    1   (define x 123)

    2   x

    3   (set! x 1234)

    4   x

    ```


    Will happily print `123` followed by `1234`.


    Even though mutation looks powerful, good Lisp practice says to avoid mutation
    when possible. The reason for that is that mutation causes side effects, and side
    effects make reasoning about programs harder. To demonstrate this issue, consider
    this definition:


    ```

    1   (define some-number 123)


    3   (define (add-one)

    4     (+ 1 some-number))


    6   (define (add-one-mutation)

    7     (begin

    8       (set! some-number (+ 1 some-number))

    9       some-number))

    ```


    `begin` allows us to sequence multiple expressions, executing them in order .


    Now let’s interact with it:


    ```

    1   > (add-one)

    2   124

    3   > (add-one)

    4   124

    ```


    So far, so good. No side effects, since `add-one` returns the same value every
    time it’s called. However:


    ```

    1   > (add-one-mutation)

    2   124

    3   > (add-one-mutation)

    4   125

    5   > (add-one)

    6   126

    ```


    This is what makes it hard to reason about programs—when some of the values are
    modified, some procedures might return different values for the same inputs. Thus,
    care must be taken when using mutation. However, we will use mutation in the peer-
    to-peer implementation later, which will make things slightly simpler .'
