    ## 1.3 哈希


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figm_HTML.gif](img/510363_1_En_1_Figm_HTML.gif)


    **定义 1-8**


    `哈希`是一种单向函数，它能够对文本进行编码，但无法通过编码结果还原原始值。


    哈希比之前描述的加密方案更简单。哈希函数的一个例子是返回字符长度——`H`("abc") = 3，但`H`("bcd") 也等于 3。这意味着，除了使用返回值
    3 之外，我们无法还原原始值。


    正如我们之前提到的，使用这种技术的原因在于它拥有一些有趣的特性，例如能够为我们提供工作量证明。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fign_HTML.gif](img/510363_1_En_1_Fign_HTML.gif)


    **定义 1-9**


    `挖矿`是验证交易的过程。成功挖矿的矿工会因此获得货币作为奖励。


    `Hashcash` 是一种工作量证明系统^(³)，我们将用它来实现挖矿。我们将在后续章节实现该算法时，详细了解其工作原理。


    哈希函数还有另一个有用的特性：它允许我们将两个或多个不同的区块连接起来，方法是在每个区块中包含当前区块的哈希值（`当前哈希`）和前一个区块的哈希值（`前一个哈希`）。例如，`block-1`
    的哈希可能是 123456，而 `block-2` 的哈希可能是 345678。那么，`block-2` 的 `前一个哈希` 就会是 `block-1` 的
    `当前哈希`，即 123456。这样，我们就将这两个区块连接起来，实际上创建了一个包含交易账本区块的链表。这种连接关系如图 1-4 所示。


    区块的哈希值基于区块本身的数据，因此要验证一个哈希值，我们只需对区块数据进行哈希运算，然后将其与`当前哈希`进行比较即可。


    两个或多个相连的区块（或交易）构成一个区块链。区块链的有效性取决于每笔交易的有效性。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figo_HTML.gif](img/510363_1_En_1_Figo_HTML.gif)


    **练习 1-5**


    设计你自己的哈希函数。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figp_HTML.gif](img/510363_1_En_1_Figp_HTML.gif)


    **练习 1-6**


    图 1-4 中描述的链表如何遍历？这种特性有什么意义？


    ## 1.4 智能合约


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figq_HTML.gif](img/510363_1_En_1_Figq_HTML.gif)


    **定义 1-10**


    `智能合约`是一种自执行合约，其中买方和卖方之间协议的条件直接由代码行表达。


    如果交易条件本身可以由用户编程，那么区块链就是可编程的。例如，用户（不一定是程序员）可以编写一个脚本，在汇款前添加必须满足的要求。它可能看起来像这样：


    ```

    1   if (用户拥有超过 10 货币)

    2      then 批准交易

    3      else 拒绝交易

    ```


    智能合约作为在区块链上执行的计算来实现。我们将在后续章节中实现智能合约的非常基础的功能。


    ## 1.5 比特币


    比特币是世界上第一个区块链实现。2008 年 11 月，中本聪撰写的题为“比特币：一种点对点电子现金系统”的论文在密码学邮件列表中发布。比特币的白皮书共九页，但主要是对设计的理论解释，因此对于新手来说可能有点难以理解。


    比特币软件是开源代码，于 2009 年 1 月在 SourceForge 上发布。比特币的设计包括去中心化网络（点对点网络）、区块（`挖矿`）、区块链、交易和钱包，本书将详细介绍每一项。


    尽管存在许多区块链模型，且每个模型在实现细节上各有不同，但我们在本书中将要构建的区块链将与比特币非常相似，只是部分内容进行了简化。


    ## 1.6 工作流程示例


    我们将列出系统将要使用的几个重要工作流程。


    *挖矿*（即创建新区块）使用 `Hashcash` 计算区块的 `当前哈希`。它还包含 `前一个哈希`，这是对区块链中前一个区块的链接。


    *检查 A 的钱包余额*首先会筛选区块链中的所有区块（发送方 = A 或接收方 = A），然后将它们汇总以计算余额。随着区块链的增长，此操作所需的时间也会增加。为此，我们将使用未花费交易输出（UTXO）模型。该模型是一个交易列表，包含有关所有者和货币金额的信息。因此，每笔交易都将消耗此列表中的元素。


    *向区块链添加区块*包括将货币从 A 发送到 B。一个前提是 A 有足够的货币。我们使用钱包余额工作流程来检查这一点。然后，我们创建一笔交易（发送方 = A，接收方
    = B）并对其进行签名。接着，我们使用这笔交易挖掘一个区块，并使用奖励更新 UTXO。


    ## 1.7 总结


    本章的目的是提供我们将要实现的系统的大致概念。在实现章节（第 3 章）中，一切都会变得更加清晰，那时我们必须明确定义每个组件。


    以下是本章所学内容的简要总结：


    *   系统的核心组件是区块。

    *   一个区块包含（除其他数据外）交易。

    *   我们有一个账本，它是所有有效区块的有序列表（即区块链）。

    *   每个涉及账本的参与者都有一个钱包。

    *   账本中的每条记录都由所有者签名，并且可以由公众验证（数字签名）。

    *   账本位于去中心化的位置，即每个人都有一个副本。

    *   信任基于工作量证明（挖矿）。


    脚注 1 2 3


    # 2. Racket 编程语言


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figa_HTML.jpg](img/510363_1_En_2_Figa_HTML.jpg)


    *结构，作者：D. Bozhinovski*


    既然我们已经粗略解释了什么是区块链以及它的用途，那么下一步很自然的就是在计算机上实现这些计算，以便它们能自动执行。在本章中，我们将介绍一种工具，它将使我们能够精确地实现这些计算。

    '
- fmt: '## 2.1 Introduction to Lisp


    `Lisp`, originating from 1958, stands for *LIST Processing* and is a family of
    programming languages. Unlike standard programming languages, it has a fully parenthesized
    prefix notation. For example, instead of writing `1 + 2`, one would write `(+
    1 2)`.


    There are many `Lisp` implementations in the `Lisp` family. One such implementation
    is `Racket`, and we will use it in this book since this implementation is particularly
    easy for entry-level programmers. The language is used in a variety of contexts
    such as research, computer science education, and general-purpose programming.
    It has also been used for commercial projects. One notable example is the Hacker
    News^([⁴](#fn4)) website, which runs on `Arc`, a programming language developed
    in `Racket`.


    `Lisp` implementations are quite known for their minimalism. Due to this minimalism,
    building a blockchain (or anything, for that matter) in `Lisp` will imply that
    you can do the same in most other programming languages with ease. `Lisps` favor
    function composition—chaining two functions together—for example, given *f*(*x*)
    and *g*(*x*), one composition is *f*(*g*(*x*)). Further in the book, we will see
    the interesting properties that composition offers and how easily we can maintain
    and extend our code.


    ### 2.1.1 Data Structures and Recursion


    There are three important notions in a `Lisp`:


    - *Primitives* or axioms (starting points or building blocks). As an example,
    the numbers 1, 2, and so on, are something we do not have to implement ourselves
    since they are already included in the programming language. Another example is
    operations on numbers, such as `+` and `*`.

    - *Composition* or a way to compose primitives to do complex calculations. For
    example, we can combine `+` and `*` as follows: `1 + (2 * 3)` or in prefix (`Lisp`)
    notation: `(+ 1 (* 2 3))`.

    - *Abstraction* or capturing the composition of primitives. For example, if we
    find ourselves doing a calculation over and over again, it would be good to capture
    (abstract, or wrap) it in a function that can be easily reused.


    We will rely on these concepts repeatedly throughout the book, as they allow us
    to build complex structures.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figb_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figb_HTML.gif)
    Definition 2-1


    A **data structure** is a collection of values, the relationships among them,
    and the functions or operations that can be applied to these values.


    An example of a data structure is numbers together with the plus and multiplication
    functions.


    From the motivation in the previous chapter we can see the need of forming such
    a data structure, where, for example, a block is a structure that contains a hash,
    an owner, and transaction amount.


    There are many data structures. An ordered list is one example, representing the
    numbers (1, 2, 3) in that order. Further, there are operations on lists, such
    as counting the number of elements, merging two lists, and so on.


    We used the numbers 1, 2, and 3 in the previous example of a list—these elements
    are *primitives*. A list, together with its operations, represents an *abstraction*.
    Chaining several list operations together represents a *composition*.


    Now that we can transform some data structure (by applying operations on it),
    it would be good to be able to repeatedly transform a data structure according
    to some specific rules. For example, if we have a blockchain data structure we
    may want to come up with a way to transform it such that, for example, a new block
    is inserted in it. This might require applying the same operation several times.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figc_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figc_HTML.gif)
    Definition 2-2


    In mathematics and computer science, functions exhibit **recursive** behavior
    when they can be defined by two properties:


    1. A simple base case (or cases)—a terminating case that returns a value without
    using recursion

    2. A rule (or rules) that reduces toward the base case


    The most common example of a recursive function is the factorial function, defined
    as follows:


    ```

    fact(n) = { 1, if n = 0; n * fact(n-1), otherwise }

    ```


    For example, using substitution we can see that `fact(3)` evaluates to 3 ⋅ `fact(2)`,
    which is 3 ⋅ 2 ⋅ `fact(1)`, and finally 3 ⋅ 2 ⋅ 1 ⋅ `fact(0)`, which is just 6.


    The recursion we just discussed applies the same operation multiple times, and
    gives the motivation for the next definition.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figd_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figd_HTML.gif)
    Definition 2-3


    A **tree** is a hierarchical, recursive data structure that can have two possible
    values:


    1. An empty value

    2. A single value, coupled with another two subtrees


    A family tree is one example of a tree. Another example of a tree is a binary
    tree, whereby the left subtree’s value is less than the current value and the
    right subtree’s value is greater than the current value:


    ```

    1     2

    2    / \

    3   1   3

    ```


    Trees are important in `Lisps`, as they are used to represent a program’s structure.
    We will discuss this more in the next section.'
