    channels) for sending and receiving data between peers:


    ```

    1   (struct peer-info-io

    2     (peer-info input-port output-port)

    3     #:prefab)

    ```


    The reason we separate `peer-info` and `peer-info-io` is that later in `main-p2p.rkt`,
    we won’t have the context of input/output ports (before a connection to a peer
    is established), so it gives us a nice way to reuse the structure.


    Finally, `peer-context-data` contains all the information needed for a single
    peer, that is:


    *   List of valid peers


    *   List of connected peers


    *   A reference to the blockchain


    ```

    1   (struct peer-context-data

    2     (name

    3      port

    4      [valid-peers #:mutable]

    5      [connected-peers #:mutable]

    6      [blockchain #:mutable])

