    18       (kill-thread t)))

    ```


    The following procedure is the entry point, where everything is launched together:


    ```

    1   (define (run-peer peer-context)

    2     (begin

    3       (peers/serve peer-context)

    4       (peers/connect peer-context)

    5       (peers/sync-data peer-context)))

