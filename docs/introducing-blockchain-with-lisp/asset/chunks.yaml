- fmt: '# 2.3.13 Structures


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figae_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figae_HTML.gif)
    Definition 2-13


    A **structure** is a composite data type that defines a grouped list of variables
    to be placed under one name.


    In Racket, the special syntax `struct` allows us to capture data structures and
    come up with a new kind of abstraction. In a sense, we already know how we can
    capture abstractions with `car`, `cons`, and `cdr`. However, `struct` is much
    more convenient since it automatically provides procedures to construct a data
    type and retrieve its values.


    Consider the following example code:


    ```

    1   (struct document (author title content))

    2   (define a-document

    3     (document

    4      "Boro Sitnikovski"

    5      "Introducing Blockchain with Lisp"

    6      "Hello  World"))

    ```


    From the expression on line 1, we automatically get the following procedures:


    *   `document-author`, `document-title`, `document-content` extracts values from
    objects.

    *   `document` constructs an object of such type.

    *   `document?` checks whether a given object is of such type.


    Then, using `document` on line 3, we can construct an object that is using this
    data structure.


    Next, we can use the automatically generated procedures to extract values from
    objects that are using this data structure:


    ```

    1   > (document-author a-document)

    2   "Boro Sitnikovski"

    3   > (document-title a-document)

    4   "Introducing Blockchain with Lisp"

    5   > (document-content a-document)

    6   "Hello World"

    7   > (document? a-document)

    8   #t

    9   > (document? "test")

    10   #f

    ```


    There is also a way to declare mutable structures as follows:


    ```

    1   (struct document (author title content) #:mutable)

    ```


    The `#:mutable` keyword will automatically generate `set-<field>!` procedures
    for every property in the structure.


    Now we can interact as follows:


    ```

    1   > (document-author a-document)

    2   "Boro Sitnikovski"

    3   > (set-document-author! a-document "Boro")

    4   > (document-author a-document)

    5   "Boro"

    ```


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figaf_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figaf_HTML.gif)
    Exercise 2-18


    Create a person structure that contains a first name, last name, and age.


    ## 2.3.14 Threads


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figag_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figag_HTML.gif)
    Definition 2-14


    A **thread** is a sequence of instructions that can execute in parallel.


    Racket has a built-in procedure `thread` that accepts a procedure that will run
    in parallel without blocking the next instruction in order.


    We will show an example of demonstrating threads. We will implement a procedure
    called `detailed-fact` that will be similar to `fact`, but also print whatever
    it is currently processing.


    ```

    1   (define (detailed-fact n)

    2     (begin

    3       (display "Calculating factorial of ")

    4       (displayln n)

    5       (if (= n 0)

    6           1

    7           (* n (detailed-fact (- n 1))))))

    ```


    `display` is a procedure that prints some text, and `displayln` is the same, but
    it also prints a newline.


    ```

    1   > (begin (detailed-fact 1) (detailed-fact 2))

    2   Calculating factorial of 1

    3   Calculating factorial of 0

    4   Calculating factorial of 2

    5   Calculating factorial of 1

    6   Calculating factorial of 0

    ```


    This code represents a sequential execution and the results make sense. However,
    we now turn to parallel execution to see what will happen:


    ```

    1   > (begin (thread (lambda () (detailed-fact 1))) (thread (lambda ()

    2     (detailed-fact 2))))

    3   Calculating factorial of 2

    4   Calculating factorial of 1

    5   Calculating factorial of 0

    6   Calculating factorial of 1

    7   Calculating factorial of 0

    ```


    Note how we used `(thread (lambda () ...))` instead of just `(thread ...)`. As
    we said, `thread` expects a procedure, but at the end of the evaluation, there
    would be the output of factorial of some number (for example 3), so `(thread 3)`
    does not make sense.


    In this parallel execution, the output is not ordered as it was in the previous
    case. This means that the `lambda`s within `thread` are being executed in parallel,
    so the order of execution cannot be guaranteed.


    We will use threads for parallel processing in the peer-to-peer implementation
    later, where we will have one thread per peer so that when we are serving one
    peer we don’t block the serving of other peers.


    ## 2.4 Creating an Executable


    The idea behind producing an executable is so that you can run it on other computers
    without requiring a DrRacket installation, and also without having to share the
    original code. In the later chapters, we will create an executable so that the
    blockchain can be used and shared by others.


    To create an example executable, we start with the following code:


    ```

    1   #lang racket

    2   (print "Hello")

    3   (read-bytes-line)

    ```


    This code will just print the text `Hello`. The `print` procedure prints some
    text (similar to `display`), and `read-bytes-line` waits for user input. If we
    did not use `read-bytes-line`, it would just print and exit right away, before
    we could read the text.


    Next, we choose `Racket > Create Executable`. Select `Distribution` and choose
    `Create`. After doing that, the executable should be created in the target folder.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig10_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig10_HTML.jpg)


