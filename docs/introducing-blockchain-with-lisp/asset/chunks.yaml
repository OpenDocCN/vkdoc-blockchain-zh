- fmt: '### 4.1.2 Updating Existing Code


    Now that we have implemented the logic for smart contracts, the next thing we
    need to address is the front-end—how users can use its functionality. For that
    matter, we will update the implementation to support contracts by reading from
    a file. If a file named `contract.script` exists, we will read and parse it (with
    `read`) and then run the code.


    We will rewrite the money sending procedure in `blockchain.rkt` to accept contracts.
    It’s the same procedure except that we use `valid-transaction-contract?` instead
    of `valid-transaction?`.


    ```

    1   (define (send-money-blockchain b from to value c)

    2     (letrec ([my-ts

    3               (filter (lambda (t) (equal? from (transaction-io-owner t)))

    4                       (blockchain-utxo b))]

    5               [t (make-transaction from to value my-ts)])

    6       (if (transaction? t)

    7           (let ([processed-transaction (process-transaction t)])

    8             (if (and

    9                  (>= (balance-wallet-blockchain b from) value)

    10                  (valid-transaction-contract? processed-transaction c))

    11                  (add-transaction-to-blockchain b processed-transaction)

    12                  b))

    13           (add-transaction-to-blockchain b ''()))))

    ```


    Next, we will update `utils.rkt` to add this helper procedure for reading contracts:


    ```

    1   (define (file->contract file)

    2     (with-handlers ([exn:fail? (lambda (exn) ''())])

    3       (read (open-input-file file))))

    ```


    Here, we used `with-handlers`, which accepts a procedure that handles the case
    when something may fail—in this case, `read` or `open-input-file`.


    Finally, make sure to add `file->contract` to the list of `provide`s in `utils.rkt`.
    Additionally, in `main.rkt` update every use of `send-money-blockchain` to additionally
    send `(file->contract "contract.script")` as an argument so that the contract
    processed is the one read from `contract.script`.


    We will also need to update `blockchain.rkt` and `main.rkt` because they now rely
    on a procedure implemented in the smart contracts package. We will add `(require
    "smart-contracts.rkt")` to them.


    ![../images/510363_1_En_4_Chapter/510363_1_En_4_Figb_HTML.gif](images/510363_1_En_4_Chapter/510363_1_En_4_Figb_HTML.gif)**Exercise
    4-1**


    Come up with a few valid expressions and evaluate them using `eval-contract`.


    ![../images/510363_1_En_4_Chapter/510363_1_En_4_Figc_HTML.gif](images/510363_1_En_4_Chapter/510363_1_En_4_Figc_HTML.gif)**Exercise
    4-2**


    Repeat the previous exercise, but use the `contract.script` file.


    **Hint**: This exercise might require you to create an executable.


    ## 4.2 Peer-to-Peer Implementation


    In Section 3.6.2, we used DrRacket to execute the blockchain implementation. That’s
    okay for testing purposes. However, if we wanted to share that implementation
    with other users and ask them to execute it, it will be kind of inconvenient because
    there’s no way to share data between different users.


    In this section, we will implement peer-to-peer support so that users who are
    interested in our implementation can join the system/community.


    Before we dive into the implementation, Figure [4-1](#510363_1_En_4_Chapter.xhtml#Fig1)
    shows a high overview of the architecture that we will build.


    ![../images/510363_1_En_4_Chapter/510363_1_En_4_Fig1_HTML.jpg](images/510363_1_En_4_Chapter/510363_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** Peer-to-peer architecture


    Every peer node (user connected to the system) list will consist of the following:


    - **Peer context data**: Information such as relations with other peers, list
    of connected peers, and so on.

    - **Generic handler**: Transforms the peer context data.


    Further, there will be two ways to establish communication with other peers:


    - A peer will accept new connections from other peers.

    - A peer will try to connect/make new connections to other peers.


    Whenever a connection is established, peers will communicate with each other through
    the generic handler, parsing and evaluating commands such as syncing/updating
    the blockchain, updating the list of peers, and so on.


    Consider this example scenario: Assume there are three peers—Peer 1, Peer 2, and
    Peer 3. Peer 1 and Peer 2 are online, and Peer 3 is offline at the moment. Peer
    1 has the following list of valid peers: (Peer 1, Peer 2, Peer 3). Peer 2’s list
    of peers is empty. According to the diagram, Peer 1 will accept new connections
    and try to connect to peers. So, Peer 1 will try to connect to Peer 2. This connection
    will be successful, and the next step is for Peer 1 to send some data to Peer
    2 (e.g., the list of valid peers).


    Peer 2’s list of peers was empty, but now it will be merged with Peer 1, so it
    will become (Peer 1, Peer 2, Peer 3). Peer 1 and Peer 2 are connected to each
    other, and they will keep trying to connect to Peer 3. Once Peer 3 becomes available,
    the same algorithm will be executed and Peer 3 will join the network.


    With this approach, the goal is to build a system similar to the high-level description
    shown in Figures [1-1](#510363_1_En_4_Chapter.xhtml#Fig1) and [1-3](#510363_1_En_1_Chapter.xhtml#Fig3)
    (Chapter [1](#510363_1_En_1_Chapter.xhtml)).


    Building communication systems of this type is naturally complex. It is suggested
    you consult the Racket manuals (by pressing the F1 key) for every procedure that
    you will be using.


    ### 4.2.1 The `peer-to-peer.rkt` File


    To start, we will add dependencies for the block implementation and rely on serialization
    to send data to other peers:


    ```

    1   (require "blockchain.rkt")

    2   (require "block.rkt")

    3   (require racket/serialize)

    ```


    #### 4.2.1.1 Peer Context Structure


    We will implement structures that hold information about the peers so that we
    have a reference to send data to the correct destinations. The `peer-info` structure
    contains an IP address and a port of a peer. Think of an IP address and a port
    similar to a street address and a number, respectively.


    ```

    1   (struct peer-info

    2     (ip port)

    3     #:prefab)

    ```


    The `peer-info-io` structure additionally contains IO ports (think communication
    channels) for sending and receiving data between peers:


    ```

    1   (struct peer-info-io

    2     (peer-info input-port output-port)

    3     #:prefab)

    ```


    The reason we separate `peer-info` and `peer-info-io` is that later in `main-p2p.rkt`,
    we won’t have the context of input/output ports (before a connection to a peer
    is established), so it gives us a nice way to reuse the structure.


    Finally, `peer-context-data` contains all the information needed for a single
    peer, that is:


    - List of valid peers

    - List of connected peers

    - A reference to the blockchain


    ```

    1   (struct peer-context-data

    2     (name

    3      port

    4      [valid-peers #:mutable]

    5      [connected-peers #:mutable]

    6      [blockchain #:mutable])

    7     #:prefab)

    ```


    The list of valid peers will be updated depending on the information retrieved
    from the connected peers. The list of connected peers will be a (not necessarily
    strict) subset of `valid-peers`. The blockchain will be updated with the data
    combined from all peers. We make them mutable because it provides an easy way
    to update the data.'
