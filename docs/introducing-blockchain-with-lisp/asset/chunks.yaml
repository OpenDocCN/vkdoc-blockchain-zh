    ### 2.1.2 语言与语法


    在本节中，我们将快速了解 Lisp 的基础知识，这将为你提供一个有关 Lisp 背后思想的高层次概述。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fige_HTML.gif](img/510363_1_En_2_Fige_HTML.gif)
    定义 2-4


    一种**语言**包含：


    1.  符号，可以组合成句子

    2.  语法，它是一组规则，告诉我们哪些句子是结构良好的


    这个关于语言的定义同样体现在编程语言中，编程语言拥有一种特殊的语法结构。例如，C 编程语言就有特殊的语法——你在编写程序语句时必须遵循特定的规则。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figf_HTML.gif](img/510363_1_En_2_Figf_HTML.gif)
    定义 2-5


    **抽象语法树** 是用于呈现用编程语言编写的源代码的抽象语法结构的树状表示。


    当你用编程语言编写程序时，会有一个中间步骤来解析程序的源代码并派生出抽象语法树。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig1_HTML.jpg](img/510363_1_En_2_Fig1_HTML.jpg)


    图 2-1


    示例 1：抽象语法树


    例如，图 2-1 中的图片展示了以下伪代码的抽象语法树：


    ```

    1   while (a > b) {

    2       a = a - 1;

    3       b = b * 2;

    4   }

    ```


    另一个例子，图 2-2 中的图片展示了以下伪代码：


    ```

    1   if (a == b && b == c) {

    2       a = a - 1;

    3       b = b * 2;

    4   } else a = a * b * 2;

    ```


    理解这些代码的功能并不重要，重要的是要理解这类程序在编程语言内部是如何表示的。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig2_HTML.jpg](img/510363_1_En_2_Fig2_HTML.jpg)


    图 2-2


    示例 2：抽象语法树


    Lisp 并不像 C 那样受限于特殊的语法。我们编写的代码本身就是实际的抽象语法树。这就是 Lisp 依赖前缀表示法的原因。我们会看到 Lisp 是如何基于极简主义设计的，因为我们不会遇到其他许多语言那种具有特殊语法、有时甚至功能重叠所带来的额外负担。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figg_HTML.gif](img/510363_1_En_2_Figg_HTML.gif)
    定义 2-6


    Lisp 中的语法元素是符号**表达式**，或 S-表达式。一个 S-表达式可以是以下之一：


    1.  一个符号（一串字符）

    2.  一个由 S-表达式组成的结构良好的列表（括号匹配）


    例如，`hello` 是一个合法的 S-表达式，`(hello there)` 也是一个合法的 S-表达式。但 `(hello(` 不是一个合法的 S-表达式，因为括号不匹配。在构建
    S-表达式时，空格很重要。注意，`h ello` 不同于 `hello`。


    一个 S-表达式当且仅当其抽象语法树是平衡的时，才是结构良好的。


    与其他语言相比，语法在 Lisp 中有特殊的含义。借助作为核心语言一部分的宏，可以扩展这种语法^(⁵)。S-表达式构成了 Lisp 的语法。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figh_HTML.gif](img/510363_1_En_2_Figh_HTML.gif)
    练习 2-1


    我们曾将数值和加号函数视为一种数据结构。试想一下另一种数据结构。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figi_HTML.gif](img/510363_1_En_2_Figi_HTML.gif)
    练习 2-2


    给定以下定义，计算 `sum(3)`，`sum(5)` 和 `sum(1)` 的值：


    ![$$ sum(n)=\left\{\begin{array}{l}0,\mathrm{if}\ n=0\\ {}n+ sum\left(n-1\right),\mathrm{otherwise}\end{array}\right.
    $$](img/510363_1_En_2_Chapter_TeX_IEq1.png)


    那 `sum(−1)` 呢？


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figj_HTML.gif](img/510363_1_En_2_Figj_HTML.gif)
    练习 2-3


    以下哪些 S-表达式是合法的？


    1. `hello`

    2. `123`

    3. `(hello 123)`

    4. `(hello (123)`

    5. `(+ 1 (* 2 3))`

    6. `(+ (* 3 2) (/ 6 2))`


    **提示**：为每个表达式绘制抽象语法树，可能会更清楚地看出哪个表达式合法，哪个不合法。


    ## 2.2 配置与安装


    Racket 可通过 [`https://download.racket-lang.org`](https://download.racket-lang.org/)
    下载并安装。它提供了适用于 Windows、Linux 和 Mac 的二进制文件。本书撰写时使用的是 Racket 版本 7，但其他版本可能也能正常使用。下载并安装完整软件包后，我们就可以运行
    DrRacket。如果出现如图 2-3 所示的界面，那么恭喜你！这意味着安装成功。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig3_HTML.jpg](img/510363_1_En_2_Fig3_HTML.jpg)


    图 2-3


    DrRacket


    屏幕上方的文本区域是定义区，我们通常在这里编写定义。而下方则是交互区，我们在这里与定义进行交互。


    **帮助台**（Help Desk）位于顶部菜单的 `Help > Help Desk` 下，其中包含快速介绍、参考手册和示例等有用信息。


    使用 Racket 主要有两种方式：


    *   使用图形用户界面（GUI），这是推荐的方式，也是本书通篇采用的方式

    *   使用命令行工具（`racket` 是解释器/编译器，`raco` 是包管理器），这适用于高级用户

