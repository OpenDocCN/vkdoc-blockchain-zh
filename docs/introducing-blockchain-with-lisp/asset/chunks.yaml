- fmt: '### 3.4.2.2 Processing Transactions


    Next, we implement a procedure for processing transactions which will:


    - Sum all the inputs within `inputs-sum`.

    - Calculate the `leftover`, which is the difference between `inputs-sum` and the
    current transaction''s `value`.

    - Generate new outputs based on the transaction''s `value` and `leftover`.

    - Combine the old outputs (`outputs`) and new outputs (`new-outputs`) to the newly
    generated transaction (inputs remain unchanged and will be used by the UTXO implementation
    later).

    - Use `foldr + 0 l` to calculate the sum of a list of numbers, `l`.


    In other words, based on some transaction inputs, the procedure will create transaction
    outputs that contain the transaction''s `value` and `leftover` money:


    ```

    1   (define (process-transaction t)

    2     (letrec

    3         ([inputs (transaction-inputs t)]

    4          [outputs (transaction-outputs t)]

    5          [value (transaction-value t)]

    6          [inputs-sum

    7           (foldr + 0 (map (lambda (i) (transaction-io-value i)) inputs))]

    8          [leftover (- inputs-sum value)]

    9          [new-outputs

    10           (list

    11            (make-transaction-io value (transaction-to t))

    12            (make-transaction-io leftover (transaction-from t)))])

    13       (transaction

    14        (sign-transaction (transaction-from t)

    15                          (transaction-to t)

    16                          (transaction-value t))

    17        (transaction-from t)

    18        (transaction-to t)

    19        value

    20        inputs

    21        (append new-outputs outputs))))

    ```


    We will also need a procedure that checks a transaction signature:


    ```

    1   (define (valid-transaction-signature? t)

    2     (let ([pubkey (wallet-public-key (transaction-from t))])

    3       (digest/verify

    4        (datum->pk-key (hex-string->bytes pubkey) ''SubjectPublicKeyInfo)

    5        ''sha1

    6        (bytes-append

    7         (string->bytes/utf-8 (~a (serialize (transaction-from t))))

    8         (string->bytes/utf-8 (~a (serialize (transaction-to t))))

    9         (string->bytes/utf-8 (number->string (transaction-value t))))

    10         (hex-string->bytes (transaction-signature t)))))

    ```


    `digest/verify` is the opposite of `digest/sign`, in that instead of signing,
    it determines if a signature is valid.


    Lastly, we will need a procedure that determines transaction validity under the
    following conditions:


    - Its signature is valid: `valid-transaction-signature?`

    - All outputs are valid: `valid-transaction-io?`

    - The sum of the inputs is greater than or equal to the sum of the outputs: `>=
    sum-inputs sum-outputs`. This resolves the problem of double-spending.


    ```

    1   (define (valid-transaction? t)

    2     (let ([sum-inputs

    3            (foldr + 0 (map (lambda (t) (transaction-io-value t))

    4                            (transaction-inputs t)))]

    5           [sum-outputs

    6            (foldr + 0 (map (lambda (t) (transaction-io-value t))

    7                            (transaction-outputs t)))])

    8       (and

    9        (valid-transaction-signature? t)

    10        (true-for-all? valid-transaction-io? (transaction-outputs t))

    11        (>= sum-inputs sum-outputs))))

    ```


    The `(and ...)` syntax will return `#t` if all values passed to it are `#t`, and
    it will return `#f` otherwise. In contrast, `(or ...)` will return `#t` if at
    least one value passed to it is `#t`, and `#f` otherwise.


    Finally, we export the following:


    ```

    1   (provide (all-from-out "transaction-io.rkt")

    2            (struct-out transaction)

    3            make-transaction process-transaction valid-transaction?)

    ```


    The `all-from-out` syntax specifies all objects that we import (and that are exported)
    from the target. In this case, besides the file exporting the `transaction` structure
    with a couple of procedures, it also exports everything from `transaction-io.rkt`.


    In addition to wallets and blocks, our implementation also supports the creation
    and processing of transactions.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figm_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figm_HTML.gif)


    **Exercise 3-8**


    Create a transaction, process it, and verify it using the procedures above.


    **Hint**: Use `make-transaction`, `process-transaction`, and `valid-transaction?`,
    respectively.


    ## 3.5 The blockchain.rkt File


    We will now implement the final component—the blockchain. We''ll need to `require`
    a bunch of stuff:


    ```

    1   (require "block.rkt")

    2   (require "transaction.rkt")

    3   (require "utils.rkt")

    4   (require "wallet.rkt")

    ```


    Recall that UTXO is just a list of `transaction-io` objects, where it represents
    unspent transaction outputs. In a way, it resembles the initial balance of wallets.
    Thus, the structure will contain a list of blocks and UTXO:


    ```

    1   (struct blockchain

    2     (blocks utxo)

    3     #:prefab)

    ```


    ### 3.5.1 Initialization


    We will need a procedure for the initialization of the blockchain. It should accept
    the genesis transaction, genesis hash, and UTXO:


    ```

    1   (define (init-blockchain t seed-hash utxo)

    2     (blockchain (cons (mine-block (process-transaction t) seed-hash) ''())

    3                 utxo))

    ```


    One way to initialize a blockchain is as follows:


    ```

    1   > (define coin-base (make-wallet))

    2   > (define wallet-a (make-wallet))

    3   > (define genesis-t (make-transaction coin-base wallet-a 100  ''()))

    4   > (define utxo (list

    5   >              (make-transaction-io 100 wallet-a)))

    6   > (define blockchain (init-blockchain genesis-t "1337cafe"  utxo))

    ```


    ### 3.5.2 Rewards


    In the original Bitcoin implementation, the block reward starts at 50 coins for
    the first block and halves on every 210000 blocks. This means that every block
    up until block 210000 will reward 50 coins, while block 210001 will reward 25.
    In other words, the reward is calculated using the following formula, where *b*
    is the number of blocks.


    ![$$ \frac{2^{\left\lfloor \frac{b}{210000}\right\rfloor }}{50} $$](images/510363_1_En_3_Chapter/510363_1_En_3_Chapter_TeX_Equa.png)


    We follow the same algorithm. We start with 50 coins initially and halve them
    on every 210000 blocks.


    ```

    1   (define (mining-reward-factor blocks)

    2     (/ 50 (expt 2 (floor (/ (length blocks) 210000)))))

    ```'
