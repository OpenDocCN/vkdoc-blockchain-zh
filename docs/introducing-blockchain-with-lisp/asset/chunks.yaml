- fmt: '#### 4.2.1.2 Generic Handler


    The generic handler will be a `handler` procedure that will be used both by the
    server (the “accepting new connections” part of the diagram) and the client (the
    “connecting to new peers” part of the diagram). It will be a procedure that accepts
    commands (commands similar in nature to the smart contracts’ `eval-contract` implementation)
    and then does something depending on the command.


    Here’s a list of commands that peers will send to each other:


    | **Request** | **Response** | **Notes** |

    | --- | --- | --- |

    | `get-valid-peers` | `valid-peers:X` | A peer may request a list of valid peers.
    The response will be X – valid peers. Note that this response should automatically
    trigger the `valid-peers` command. |

    | `get-latest-blockchain` | `latest-blockchain:X` | A peer may request the latest
    blockchain from another peer. The response will be X - the latest version of the
    blockchain. This should trigger the `latest-blockchain` command. |

    | `latest-blockchain:X` | | When a peer gets this request, it will update the
    blockchain, given it is valid. |

    | `valid-peers:X` | | When a peer gets this request, it will update the list of
    valid peers. |


    The commands in this table will allow the peers to sync data with each other.
    We will now provide the handler implementation. It accepts a `peer-context` and
    input/output ports. Given these, it will read the input (command) and send the
    appropriate output (evaluated command) back to the peer:


    ```

    1   (define (handler peer-context in out)

    2     (flush-output out)

    3     (define line (read-line in))

    4     (when (string? line) ; it can be eof

    5       (cond [(string-prefix? line "get-valid-peers")

    6              (fprintf out "valid-peers:~a\n"

    7                       (serialize

    8                        (set->list

    9                         (peer-context-data-valid-peers peer-context))))

    10              (handler peer-context in out)]

    11             [(string-prefix? line "get-latest-blockchain")

    12              (fprintf out "latest-blockchain:")

    13              (write

    14               (serialize (peer-context-data-blockchain peer-context)) out)

    15              (handler peer-context in out)]

    16             [(string-prefix? line "latest-blockchain:")

    17              (begin (maybe-update-blockchain peer-context line)

    18                     (handler peer-context in out))]

    19             [(string-prefix? line "valid-peers:")

    20              (begin (maybe-update-valid-peers peer-context line)

    21                     (handler peer-context in out))]

    22             [(string-prefix? line "exit")

    23              (fprintf out "bye\n")]

    24             [else (handler peer-context in out)])))

    ```


    We used some new procedures here:


    *   An output buffer (output communication channel with a peer) is usually filled
    with bytes. We need to flush (empty) this buffer every time we want to send a
    message, to avoid resending the previous messages. We achieve this using `flush-output`.

    *   `read-line` is similar to `read` except that it will stop reading once a newline
    is reached.

    *   `string-prefix?` checks to see if a string starts with some other string.

    *   `fprintf` is similar to `printf` except that we can also supply the first
    argument to specify where this message should be sent.

    *   `set->list` converts a set to a list.


    There’s a little trick involved in the `latest-blockchain` case—we used `write`
    instead of `(fprintf out "latest-blockchain:~a\n")`. The reason for that is that
    `print` (and thus `printf` and `fprintf`) cannot be relied on for output that
    needs to be formatted in a specific way. For example, `print` prints strings with
    quotation marks (to make the printed data more legible to the user), and this
    will be messed up when we try to deserialize the data we received, so we want
    to send the data in its “raw” format.


    The next step is to implement procedures for updating the blockchain and the list
    of valid peers, under the conditions that the blockchain is valid and it has higher
    effort than ours.


    ```

    1   (define (maybe-update-blockchain peer-context line)

    2     (let ([latest-blockchain

    3            (trim-helper line #rx"(latest-blockchain:|[\r\n]+)")]

    4           [current-blockchain

    5            (peer-context-data-blockchain peer-context)])

    6       (when (and (valid-blockchain? latest-blockchain)

    7                   (> (get-blockchain-effort latest-blockchain)

    8                      (get-blockchain-effort current-blockchain)))

    9         (printf "Blockchain updated for peer ~a\n"

    10                 (peer-context-data-name peer-context))

    11         (set-peer-context-data-blockchain! peer-context

    12                                            latest-blockchain))))

    ```


    We used `#rx"..."` for the first time—this specifies a regular expression. Think
    of it as a way to define a search pattern in some string.


    For example, `#rx"(latest-blockchain:|[\r\n]+)"` matches the following strings:


    *   `latest-blockchain:a\n`

    *   `latest-blockchain:b\n`

    *   In general, `latest-blockchain:...\n`


    The previous procedure will update the blockchain only when it is valid and the
    effort is higher than the current one. We define the effort as the sum of all
    blocks’ `nonce`s:


    ```

    1   (define (get-blockchain-effort b)

    2     (foldl + 0 (map block-nonce (blockchain-blocks b))))

    ```


    To update the list of valid peers is to merge the current list of valid peers
    with the newly received list, thus mutating the `peer-context` structure:


    ```

    1   (define (maybe-update-valid-peers peer-context line)

    2     (let ([valid-peers (list->set

    3                         (trim-helper line #rx"(valid-peers:|[\r\n]+)"))]

    4           [current-valid-peers (peer-context-data-valid-peers

    5                                 peer-context)])

    6       (set-peer-context-data-valid-peers!

    7        peer-context

    8        (set-union current-valid-peers valid-peers))))

    ```


    We also used this procedure, which is just a helper one that will remove a command
    (prefix) from a string, allowing us to focus on the input. For example, when we
    receive `valid-peers:X`, it will remove `valid-peers:`, allowing us to retrieve
    `X` easily.


    ```

    1   (define (trim-helper line x)

    2     (deserialize

    3      (read

    4       (open-input-string

    5        (string-replace line x "")))))

    ```


    This concludes the `handler` implementation. Now there is a procedure that can
    be used by peers to accept commands and update the list of peers and the blockchain.
    In the next section, we will implement the communication between the peers—they
    should communicate with each other using these commands that we implemented.'
