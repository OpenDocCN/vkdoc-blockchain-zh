- fmt: "### 3.6.1 The `main-helper.rkt` File\n\nThis file will import everything from\
    \ `blockchain.rkt` and `utils.rkt` and will provide some printing procedures.\n\
    \n```\n(require \"blockchain.rkt\")\n(require \"utils.rkt\")\n```\n\nThe next\
    \ procedure will convert a transaction object to a printable string. It will use\
    \ `substring` to only print a subset of the hash (since it may be too big), and\
    \ it will also use `format`, which is a string-formatting procedure that replaces\
    \ every `~a` in a string with the passed argument in order.\n\n```\n(define (format-transaction\
    \ t)\n  (format \"...~a... sends ...~a... an amount of ~a.\"\n          (substring\
    \ (wallet-public-key (transaction-from t)) 64 80)\n          (substring (wallet-public-key\
    \ (transaction-to t)) 64 80)\n          (transaction-value t)))\n```\n\nThe next\
    \ procedure will print the details of a block. `printf` is similar to `print`,\
    \ except that it can be used like `format`:\n\n```\n(define (print-block bl)\n\
    \  (printf \"Block information\\n=================\nHash:\\t~a\\nHash_p:\\t~a\\\
    nStamp:\\t~a\\nNonce:\\t~a\\nData:\\t~a\\n\"\n      (block-current-hash bl)\n\
    \      (block-previous-hash bl)\n      (block-timestamp bl)\n      (block-nonce\
    \ bl)\n      (format-transaction (block-transaction bl))))\n```\n\nBesides using\
    \ recursion explicitly, there is a built-in `for` syntax that also allows repetitive\
    \ computations. To print a blockchain, we will use the `for` syntax to go through\
    \ all blocks, print them to the standard output, and then use `newline` to add\
    \ a newline character to make the separation of every block obvious:\n\n```\n\
    (define (print-blockchain b)\n  (for ([block (blockchain-blocks b)])\n    (print-block\
    \ block)\n    (newline)))\n```\n\nWe print wallets similarly:\n\n```\n(define\
    \ (print-wallets b wallet-a wallet-b)\n  (printf \"\\nWallet A balance: ~a\\nWallet\
    \ B balance: ~a\\n\\n\"\n          (balance-wallet-blockchain b wallet-a)\n  \
    \        (balance-wallet-blockchain b wallet-b)))\n```\n\nAnd export the procedures:\n\
    \n```\n(provide (all-from-out \"blockchain.rkt\")\n         (all-from-out \"utils.rkt\"\
    )\n         format-transaction print-block print-blockchain print-wallets)\n```\n\
    \n![../images/510363_1_En_3_Chapter/510363_1_En_3_Figr_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figr_HTML.gif)\n\
    \n**Exercise 3-13**\n\nCreate a transaction and use `format-transaction` to see\
    \ what it outputs. Repeat the same for a block (`print-block`), blockchain (`print-blockchain`),\
    \ and wallets (`print-wallets`).\n\n### 3.6.2 The `main.rkt` File\n\nThis is where\
    \ we will put all the components together and use them. We start by checking if\
    \ the `blockchain.data` file exists by using `file-exists?`. This file will contain\
    \ contents from a previous blockchain if it exists. If it doesn’t, we will just\
    \ create a fresh blockchain.\n\n```\n(require \"main-helper.rkt\")\n\n(when (file-exists?\
    \ \"blockchain.data\")\n  (begin\n    (printf \"Found 'blockchain.data', reading...\\\
    n\")\n    (print-blockchain (file->struct \"blockchain.data\"))\n    (exit)))\n\
    ```\n\nWe used `when`, which is similar to `if`, except that the `else` branch\
    \ is omitted.\n\nNext, we initialize wallets:\n\n```\n(define coin-base (make-wallet))\n\
    (define wallet-a (make-wallet))\n(define wallet-b (make-wallet))\n```\n\nWe initialize\
    \ transactions by creating the genesis transaction:\n\n```\n(printf \"Making genesis\
    \ transaction...\\n\")\n(define genesis-t (make-transaction coin-base wallet-a\
    \ 100 '()))\n```\n\nWe initialize the unspent transactions—the genesis transaction:\n\
    \n```\n(define utxo (list\n              (make-transaction-io 100 wallet-a)))\n\
    ```\n\nFinally, we initiate the blockchain by mining the genesis transaction:\n\
    \n```\n(printf \"Mining genesis block...\\n\")\n(define blockchain (init-blockchain\
    \ genesis-t \"1337cafe\" utxo))\n(print-wallets blockchain wallet-a wallet-b)\n\
    ```\n\nMaking a second transaction:\n\n```\n(printf \"Mining second transaction...\\\
    n\")\n(set! blockchain (send-money-blockchain blockchain wallet-a wallet-b 2))\n\
    (print-wallets blockchain wallet-a wallet-b)\n```\n\nMaking a third transaction:\n\
    \n```\n(printf \"Mining third transaction...\\n\")\n(set! blockchain (send-money-blockchain\
    \ blockchain wallet-b wallet-a 1))\n(print-wallets blockchain wallet-a wallet-b)\n\
    ```\n\nAttempting to make a fourth transaction:\n\n```\n(printf \"Attempting to\
    \ mine fourth (not-valid) transaction...\\n\")\n(set! blockchain (send-money-blockchain\
    \ blockchain wallet-b wallet-a 3))\n(print-wallets blockchain wallet-a wallet-b)\n\
    ```\n\nChecking blockchain validity:\n\n```\n(printf \"Blockchain is valid: ~a\\\
    n\\n\" (valid-blockchain? blockchain))\n```\n\nPrinting every block from the blockchain:\n\
    \n```\n(for ([block (blockchain-blocks blockchain)])\n  (print-block block)\n\
    \  (newline))\n```\n\nAnd exporting the blockchain to `blockchain.data`, which\
    \ can be reused later.\n\n```\n(struct->file blockchain \"blockchain.data\")\n\
    (printf \"Exported blockchain to 'blockchain.data'...\\n\")\n```\n\nOnce we create\
    \ `main.rkt`, we run it from the `Racket > Run` menu. It should show the following\
    \ output:\n\n```\nMaking genesis transaction...\nMining genesis block...\n\nWallet\
    \ A balance: 100\nWallet B balance: 0\n\nMining second transaction...\n\nWallet\
    \ A balance: 130\nWallet B balance: 20\n\nMining third transaction...\n\nWallet\
    \ A balance: 140\nWallet B balance: 60\n\nAttempting to mine fourth (not-valid)\
    \ transaction...\n\nWallet A balance: 140\nWallet B balance: 60\n\nBlockchain\
    \ is valid: #t\n\nBlock information\n=================\nHash:   e720bb198279a76057280bdf8eb667fe1883d0ae263c5d5d1be08697a2f534d1\n\
    Hash_p: 38200563c1f807be2a5d10ec42dd53acae1f6f804b4c93016b87c974817f065d\nStamp:\
    \  1529923610574\nNonce:  216\nData:   ...bb6... sends ...896... an amount of\
    \ 10.\n\nBlock information\n=================\nHash:   38200563c1f807be2a5d10ec42dd53acae1f6f804b4c93016b87c974817f065d\n\
    Hash_p: 6a20fbe4038bb3b83090e7f767bb24af5164218bba5c751a1858262df2a2a847\nStamp:\
    \  1529923610405\nNonce:  752\nData:   ...896... sends ...bb6... an amount of\
    \ 20.\n\nBlock information\n=================\nHash:   6a20fbe4038bb3b83090e7f767bb24af5164218bba5c751a1858262df2a2a847\n\
    Hash_p: 7365656467656e65736973\nStamp:  1529923610332\nNonce:  220\nData:   ...58d...\
    \ sends ...896... an amount of 100.\n\nExported blockchain to 'blockchain.data'...\n\
    ```\n\n### 3.7 Summary\n\nWe built every component one by one, gradually. Some\
    \ components are *orthogonal*—they are independent of one another. For example,\
    \ the `wallet` implementation does not call any procedures from `block`, and a\
    \ `block` can be used independently of a `wallet`. When we combine all of the\
    \ components, we get a blockchain system.\n\nThis design allows us to easily extend\
    \ our system. In the next chapter, we will extend the system with peer-to-peer\
    \ and smart contracts functionalities without having to change the basic components.\n\
    \n**Footnotes**\n\n[1](#510363_1_En_3_Chapter.xhtml#Fn1_source)\n\n# 4. Extending\
    \ the Blockchain\n\n![../images/510363_1_En_4_Chapter/510363_1_En_4_Figa_HTML.jpg](images/510363_1_En_4_Chapter/510363_1_En_4_Figa_HTML.jpg)\n\
    \n*Extensions, by D. Bozhinovski*\n\nIn the previous chapter, we implemented blockchain’s\
    \ basic components. In this chapter, we will extend the blockchain with smart\
    \ contracts and peer-to-peer support."
  raw: '### 3.6.1 The main-helper.rkt File


    This file will import everything from `blockchain.rkt` and `utils.rkt` and will
    provide some printing procedures.


    ```

    1   (require "blockchain.rkt")

    2   (require "utils.rkt")

    ```


    The next procedure will convert a transaction object to a printable string. It
    will use `substring` to only print a subset of the hash (since it may be too big),
    and it will also use `format`, which is a string-formatting procedure that replaces
    every ∼`a` in a string with the passed argument in order.


    ```

    1   (define (format-transaction t)

    2     (format "...~a... sends ...~a... an amount of ~a."

    3             (substring (wallet-public-key (transaction-from t)) 64 80)

    4             (substring  (wallet-public-key  (transaction-to  t)) 64  80)

    5             (transaction-value t)))

    ```


    The next procedure will print the details of a block. `printf` is similar to `print`,
    except that it can be used like `format`:


    ```

    1   (define (print-block bl)

    2     (printf "Block information\n=================

    3   Hash:\t~a\nHash_p:\t~a\nStamp:\t~a\nNonce:\t~a\nData:\t~a\n"

    4         (block-current-hash bl)

    5         (block-previous-hash bl)

    6         (block-timestamp bl)

    7         (block-nonce bl)

    8         (format-transaction (block-transaction bl))))

    ```


    Besides using recursion explicitly, there is a built-in `for` syntax that also
    allows repetitive computations. To print a blockchain, we will use the `for` syntax
    to go through all blocks, print them to the standard output, and then use `newline`
    to add a newline character to make the separation of every block obvious:


    ```

    1   (define (print-blockchain b)

    2     (for ([block (blockchain-blocks b)])

    3       (print-block block)

    4       (newline)))

    ```


    We print wallets similarly:


    ```

    1   (define (print-wallets b wallet-a wallet-b)

    2     (printf "\nWallet A balance: ~a\nWallet B balance: ~a\n\n"

    3             (balance-wallet-blockchain b wallet-a)

    4             (balance-wallet-blockchain b wallet-b)))

    ```


    And export the procedures:


    ```

    1   (provide (all-from-out "blockchain.rkt")

    2            (all-from-out "utils.rkt")

    3            format-transaction print-block print-blockchain print-wallets)

    ```


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figr_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figr_HTML.gif)Exercise
    3-13


    Create a transaction and use `format-transaction` to see what it outputs. Repeat
    the same for a block (`print-block`), blockchain (`print-blockchain`), and wallets
    (`print-wallets`).


    ### 3.6.2 The main.rkt File


    This is where we will put all the components together and use them. We start by
    checking if the `blockchain.data` file exists by using `file-exists?`. This file
    will contain contents from a previous blockchain if it exists. If it doesn’t,
    we will just create a fresh blockchain.


    ```

    1   (require "main-helper.rkt")


    3   (when (file-exists? "blockchain.data")

    4     (begin

    4       (printf "Found ''blockchain.data'', reading...\n")

    6       (print-blockchain (file->struct "blockchain.data"))

    7       (exit)))

    ```


    We used `when`, which is similar to `if`, except that the `else` branch is omitted.


    Next, we initialize wallets:


    ```

    1   (define coin-base (make-wallet))

    2   (define wallet-a (make-wallet))

    3   (define wallet-b (make-wallet))

    ```


    We initialize transactions by creating the genesis transaction:


    ```

    1   (printf "Making genesis transaction...\n")

    2   (define genesis-t (make-transaction coin-base wallet-a 100 ''()))

    ```


    We initialize the unspent transactions—the genesis transaction:


    ```

    1   (define utxo (list

    2                 (make-transaction-io 100 wallet-a)))

    ```


    Finally, we initiate the blockchain by mining the genesis transaction:


    ```

    1   (printf "Mining genesis block...\n")

    2   (define blockchain (init-blockchain genesis-t "1337cafe" utxo))

    3   (print-wallets blockchain wallet-a wallet-b)

    ```


    Making a second transaction:


    ```

    1   (printf "Mining second transaction...\n")

    2   (set! blockchain (send-money-blockchain blockchain wallet-a wallet-b 2))

    3   (print-wallets blockchain wallet-a wallet-b)

    ```


    Making a third transaction:


    ```

    1   (printf "Mining third transaction...\n")

    2   (set! blockchain (send-money-blockchain blockchain wallet-b wallet-a 1))

    3   (print-wallets blockchain wallet-a wallet-b)

    ```


    Attempting to make a fourth transaction:


    ```

    1   (printf "Attempting to mine fourth (not-valid) transaction...\n")

    2   (set! blockchain (send-money-blockchain blockchain wallet-b wallet-a 3))

    3   (print-wallets blockchain wallet-a wallet-b)

    ```


    Checking blockchain validity:


    ```

    1   (printf "Blockchain is valid: ~a\n\n" (valid-blockchain? blockchain))

    ```


    Printing every block from the blockchain:


    ```

    1   (for ([block (blockchain-blocks blockchain)])

    2     (print-block block)

    3     (newline))

    ```


    And exporting the blockchain to `blockchain.data`, which can be reused later.


    ```

    1   (struct->file blockchain "blockchain.data")

    2   (printf "Exported blockchain to ''blockchain.data''...\n")

    ```


    Once we create `main.rkt`, we run it from the `Racket > Run` menu. It should show
    the following output:


    ```

    1   Making genesis transaction...

    2   Mining genesis block...


    4   Wallet A balance: 100

    5   Wallet B balance: 0


    7   Mining second transaction...


    9   Wallet A balance: 130

    10   Wallet B balance: 20


    12   Mining third transaction...


    14   Wallet A balance: 140

    15   Wallet B balance: 60


    17   Attempting to mine fourth (not-valid) transaction...


    19   Wallet A balance: 140

    20   Wallet B balance: 60


    22   Blockchain is valid: #t


    24   Block information

    25   =================

    26   Hash:   e720bb198279a76057280bdf8eb667fe1883d0ae263c5d5d1be08697a2f534d1

    27   Hash_p: 38200563c1f807be2a5d10ec42dd53acae1f6f804b4c93016b87c974817f065d

    28   Stamp:  1529923610574

    29   Nonce:  216

    30   Data:   ...bb6... sends ...896... an amount of 10.


    32   Block information

    33   =================

    34   Hash:   38200563c1f807be2a5d10ec42dd53acae1f6f804b4c93016b87c974817f065d

    35   Hash_p: 6a20fbe4038bb3b83090e7f767bb24af5164218bba5c751a1858262df2a2a847

    36   Stamp:  1529923610405

    37   Nonce:  752

    38   Data:   ...896... sends ...bb6... an amount of 20.


    40   Block  information

    41   =================

    42   Hash:   6a20fbe4038bb3b83090e7f767bb24af5164218bba5c751a1858262df2a2a847

    43   Hash_p: 7365656467656e65736973

    44   Stamp:  1529923610332

    45   Nonce:  220

    46   Data:   ...58d... sends ...896... an amount of 100.


    48   Exported blockchain to ''blockchain.data''...

    ```


    ## 3.7 Summary


    We built every component one by one, gradually. Some components are *orthogonal*—they
    are independent of one another. For example, the `wallet` implementation does
    not call any procedures from `block`, and a `block` can be used independently
    of a `wallet`. When we combine all of the components, we get a blockchain system.


    This design allows us to easily extend our system. In the next chapter, we will
    extend the system with peer-to-peer and smart contracts functionalities without
    having to change the basic components.


    Footnotes [1](#510363_1_En_3_Chapter.xhtml#Fn1_source)


    # 4. Extending the Blockchain


    ![../images/510363_1_En_4_Chapter/510363_1_En_4_Figa_HTML.jpg](images/510363_1_En_4_Chapter/510363_1_En_4_Figa_HTML.jpg)


    *Extensions, by D. Bozhinovski*


    In the previous chapter, we implemented blockchain’s basic components. In this
    chapter, we will extend the blockchain with smart contracts and peer-to-peer support.'
