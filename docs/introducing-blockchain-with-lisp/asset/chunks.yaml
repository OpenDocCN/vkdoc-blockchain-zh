- fmt: '# 2.3 Introduction to Racket


    The first thing that Lisp newcomers notice is that there are too many parentheses
    in Lisp programs. This is true, but it is a direct consequence of the fact that
    we are writing our abstract syntax tree in a language that has no special syntax.


    As we go through this book, we will see the power of expressiveness we get as
    a result. For example, one advantage is that there is no need for a special order
    of operations. In high school, we had to remember that `*` and `/` had to be evaluated
    before `+` and `-`. This is not the case with Lisps, as the order of evaluation
    is obvious by the way we’ve written our program.


    Let’s consider the expression `(+ 1 (* 2 3))`. As we mentioned, whitespace is
    an important part of S-expressions, so `(+1 (* 2 3))` is different from `(+ 1
    (* 2 3))`. To convert this to a more familiar notation in our mind, we could swap
    the operators so that they are in *infix* notation instead of *prefix*: `(+ 1
    (* 2 3))` is the same as `(1 + (2 * 3))`. We now see that the value of this expression
    is 7.


    Next, let’s write this expression followed by the return key (Enter) in the interactions
    area (the bottom text area) of the DrRacket editor:


    ```

    1   > (+ 1 (* 2 3))

    2   7

    ```


    The `>` sign indicates that the command that follows it must be input into the
    interactions area.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig4_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    DrRacket first calculation


    We get 7 as a result, as depicted in Figure [2-4](#510363_1_En_2_Chapter.xhtml#Fig4).
    We’ve done our first calculation in Racket.


    After finishing an evaluation, DrRacket again waits for a new command. This is
    because in the interactions area, we are in REPL mode, which stands for Read-Evaluate-Print-Loop.
    That is, the interactions area will read what we write, try to evaluate it (come
    up with a result), print the result, and loop back to reading again.


    Lisp evaluation is very similar to substitution in mathematics. For example, one
    way `(+ 1 (* 2 3))` can be evaluated is as follows:


    1.  `(+ 1 (* 2 3))`


    2.  `(+ 1 6)`


    3.  `7`


    That is, in each step, we reduce the expression until no further reductions are
    possible. We immediately notice how powerful substitution as a concept is.


    ## 2.3.1 Primitive Types


    In the evaluation above, we got a number as a result—the value 7 has a type of
    number. While types of values are implicit in Racket, we still have a way to check
    what the type of a value is, as we will see later with the help of predicates.


    Racket has some primitive (built-in) types, such as:


    - Symbols, such as `hello, world`

    - Lists, such as `(1, 2, 3)`

    - Functions, such as `f(x) = x + 1`

    - Numbers, such as `1, 2, 3.14`

    - Booleans, such as `#t` (for True) and `#f` (for False)

    - Characters or single letters: `#\A, #\B, #\C`

    - Strings or lists of characters: `"Hello", "World"`

    - Bytes: Per ASCII code, we can represent characters in terms of a number (e.g.
    `72` is `H`)

    - Bytes, as a list of byte: `#"Hello", #"World"`


    ```

    1   > 123

    2   123

    3   > #t

    4   #t

    5   > #f

    6   #f

    7   > #\A

    8   #\A

    9   > "Hello  World"

    10   "Hello World"

    11   > (bytes 72 101 108 108 111)

    12   #"Hello"

    ```


    Each evaluation has a specific type attached to the produced value:


    1.  The first evaluation (`123`) has a type of number.

    2.  The second (`#t`) and third (`#f`) evaluations have a type of boolean.

    3.  The fourth evaluation (`#\A`) has a type of character.

    4.  The fifth evaluation (`"Hello World"`) has a type of string.

    5.  The sixth evaluation (`(bytes 72 101 108 108 111)`) has a type of bytes and
    is using the ASCII table for letters.


    We cover symbols, lists, and functions in the following sections.


    ## 2.3.2 Lists, Evaluation, and Quotes


    In order to produce the ordered list `(1, 2, 3)`, we can ask DrRacket to evaluate
    `(list 1 2 3)` in the interactions area:


    ```

    1   > (list 1 2 3)

    2   ''(1 2 3)

    ```


    `list` is a built-in function, just like `+`, which we already used. `list` accepts
    any number of arguments, and as a result, returns a list generated from them.
    The returned expression `''(1 2 3)` is just a fancy notation, which is equivalent
    to the expression `(quote (1 2 3))`, where we tell Racket to return the actual
    list `(1 2 3)` instead of evaluating it.


    We notice how parentheses are used to denote a function call, or evaluation. In
    general, the code `(f a_1 a_2 ... a_n)` makes a function call to `f`, passing
    `n` arguments in that order. For example, for the function `f(x) = x + 1`, one
    example evaluation is `f(1)` and we write `(f 1)`, where as a return value we
    get 2.


    Note that `(list 1 2 3)` returned `''(1 2 3)` as a result. Let’s try to understand
    what happened here. If `(list 1 2 3)` had returned `(1 2 3)`, this wouldn’t have
    made much sense since (as we discussed) this notation would try to call the (nonexistent)
    function 1 with arguments 2 and 3. Instead, it returned a *quoted* list: `''(1
    2 3)`.


    To understand how this affects evaluation, let’s consider an example where you
    say either of these statements to someone:


    - Say your name

    - Say “your name”


    In the first example, you expect the person to tell you their name. In the second
    example, you expect them to say the words “your name,” rather than their actual
    name.


    Similar to this example, there is a built-in syntax called `quote`, and we can
    use it on any set of symbols:


    ```

    1   > (quote hello)

    2   ''hello

    ```


    This allows for the creation of new symbols and is especially important for the
    creation of macros. There is a special list, called the *empty list,* and is denoted
    as `(list)`, or `(quote ())`, or simply `''()`. We will later see why this list
    is special when we start using recursion.


    For additional information on `list` (or any other function), you can click the
    word using the mouse and press the F1 button. This will open Racket’s manuals
    screen, which will allow you to pick a function that you want information about.
    Usually, it’s the first match on this list. Clicking it should show something
    similar to Figure [2-5](#510363_1_En_2_Chapter.xhtml#Fig5).


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig5_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Racket manual for `list`


    In Racket, parentheses, brackets, and braces have the same effect. Thus, `(list
    1 2 3)` is the same as `[list 1 2 3]` and `{list 1 2 3}`. This visual distinction
    may be useful to group evaluations when there are a lot of parentheses.


    Recall that S-expressions can be either a symbol or a list. Since we discussed
    evaluation, lists, and symbols in this section, at this point in the book we have
    covered what makes the core of a Lisp.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figk_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figk_HTML.gif)
    Exercise 2-4


    Create a list in Racket that contains a mixture of different types (numbers, strings).
    The list should have at least two elements.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figl_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figl_HTML.gif)
    Exercise 2-5


    Note that `list` is a function and `quote` is a syntax. Read the manual for both
    using the F1 key.'
  raw: '## 2.3 Introduction to Racket


    The first thing that Lisp newcomers notice is that there are too many parentheses
    in Lisp programs. This is true, but it is a direct consequence of the fact that
    we are writing our abstract syntax tree in a language that has no special syntax.


    As we go through this book, we will see the power of expressiveness we get as
    a result. For example, one advantage is that there is no need for a special order
    of operations. In high school, we had to remember that `*` and `/` had to be evaluated
    before `+` and `-.` This is not the case with Lisps, as the order of evaluation
    is obvious by the way we’ve written our program.


    Let’s consider the expression `(+ 1 (* 2 3))`. As we mentioned, whitespace is
    an important part of S-expressions, so `(+1 (* 2 3))` is different from `(+ 1
    (* 2 3))`. To convert this to a more familiar notation in our mind, we could swap
    the operators so that they are in *infix* notation instead of *prefix*: `(+ 1
    (* 2 3))` is the same as `(1 + (2 * 3))`. We now see that the value of this expression
    is 7.


    Next, let’s write this expression followed by the return key (Enter) in the interactions
    area (the bottom text area) of the DrRacket editor:


    ```

    1   > (+ 1 (* 2 3))

    2   7

    ```


    The `>` sign indicates that the command that follows it must be input into the
    interactions area.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig4_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    DrRacket first calculation


    We get 7 as a result, as depicted in Figure [2-4](#510363_1_En_2_Chapter.xhtml#Fig4).
    We’ve done our first calculation in Racket.


    After finishing an evaluation, DrRacket again waits for a new command. This is
    because in the interactions area, we are in REPL mode, which stands for Read-Evaluate-Print-Loop.
    That is, the interactions area will read what we write, try to evaluate it (come
    up with a result), print the result, and loop back to reading again.


    Lisp evaluation is very similar to substitution in mathematics. For example, one
    way `(+ 1 (* 2 3))` can be evaluated is as follows:


    1.  `(+ 1 (* 2 3))`


    2.  `(+ 1 6)`


    3.  `7`


    That is, in each step, we reduce the expression until no further reductions are
    possible. We immediately notice how powerful substitution as a concept is.


    ### 2.3.1 Primitive Types


    In the evaluation above , we got a number as a result—the value 7 has a type of
    number. While types of values are implicit in Racket, we still have a way to check
    what the type of a value is, as we will see later with the help of predicates.


    Racket has some primitive (built-in) types, such as:


    *   Symbols, such as `hello, world`


    *   Lists, such as `(1, 2, 3)`


    *   Functions, such as `f(x) = x + 1`


    *   Numbers, such as `1, 2, 3.14`


    *   Booleans, such as `#t` (for True) and `#f` (for False)


    *   Characters or single letters: `#\A, #\B, #\C`


    *   Strings or lists of characters: `"Hello", "World"`


    *   Bytes: Per ASCII code, we can represent characters in terms of a number (e.g.
    `72` is `H`)


    *   Bytes, as a list of byte: `#"Hello", #"World"`


    ```

    1   > 123

    2   123

    3   > #t

    4   #t

    5   > #f

    6   #f

    7   > #\A

    8   #\A

    9   > "Hello  World"

    10   "Hello World"

    11   > (bytes 72 101 108 108 111)

    12   #"Hello"

    ```


    Each evaluation has a specific type attached to the produced value :


    1.  The first evaluation (`123`) has a type of number.


    2.  The second (`#t`) and third (`#f`) evaluations have a type of boolean.


    3.  The fourth evaluation (`#\A`) has a type of character.


    4.  The fifth evaluation (`"Hello World"`) has a type of string.


    5.  The sixth evaluation ((`bytes 72 101 108 108 111`)) has a type of bytes and
    is using the ASCII table for letters.


    We cover symbols, lists, and functions in the following sections .


    ### 2.3.2 Lists, Evaluation, and Quotes


    In order to produce the ordered list (`1, 2, 3)`, we can ask DrRacket to evaluate
    `(list 1 2 3)` in the interactions area:


    ```

    1   > (list 1 2 3)

    2   ''(1 2 3)

    ```


    `list` is a built-in function, just like `+`, which we already used. `list` accepts
    any number of arguments, and as a result, returns a list generated from them.
    The returned expression `''(1 2 3)` is just a fancy notation, which is equivalent
    to the expression `(quote (1 2 3))`, where we tell Racket to return the actual
    list `(1 2 3)` instead of evaluating it.


    We notice how parentheses are used to denote a function call, or evaluation. In
    general, the code `(f a_1 a_2 ... a_n)` makes a function call to `f`, passing
    `n` arguments in that order. For example, for the function `f(x) = x + 1`, one
    example evaluation is `f(1)` and we write `(f 1)`, where as a return value we
    get 2.


    Note that `(list 1 2 3)` returned `''(1 2 3)` as a result. Let’s try to understand
    what happened here. If `(list 1 2 3)` had returned `(1 2 3)`, this wouldn’t have
    made much sense since (as we discussed) this notation would try to call the (nonexistent)
    function 1 with arguments 2 and 3\. Instead, it returned a *quoted* list: ‘`(1
    2 3)`.


    To understand how this affects evaluation, let’s consider an example where you
    say either of these statements to someone:


    *   Say your name


    *   Say “your name”


    In the first example, you expect the person to tell you their name. In the second
    example, you expect them to say the words “your name,” rather than their actual
    name.


    Similar to this example, there is a built-in syntax called `quote` , and we can
    use it on any set of symbols:


    ```

    1   > (quote hello)

    2   ''hello

    ```


    This allows for the creation of new symbols and is especially important for the
    creation of macros. There is a special list, called the *empty list,* and is denoted
    as `(list)`, or `(quote ())`, or simply `''()`. We will later see why this list
    is special when we start using recursion.


    For additional information on `list` (or any other function), you can click the
    word using the mouse and press the F1 button. This will open Racket’s manuals
    screen, which will allow you to pick a function that you want information about.
    Usually, it’s the first match on this list. Clicking it should show something
    similar to Figure [2-5](#510363_1_En_2_Chapter.xhtml#Fig5).


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig5_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Racket manual for `list`


    In Racket, parentheses, brackets, and braces have the same effect. Thus, `(list
    1 2 3)` is the same as `[list 1 2 3]` and `{list 1 2 3}`. This visual distinction
    may be useful to group evaluations when there are a lot of parentheses.


    Recall that S-expressions can be either a symbol or a list. Since we discussed
    evaluation, lists, and symbols in this section, at this point in the book we have
    covered what makes the core of a Lisp.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figk_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figk_HTML.gif)
    Exercise 2-4


    Create a list in Racket that contains a mixture of different types (numbers, strings).
    The list should have at least two elements.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figl_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figl_HTML.gif)
    Exercise 2-5


    Note that `list` is a function and `quote` is a syntax. Read the manual for both
    using the F1 key.'
  trans: '

    # 2.3 Racket 简介


    Lisp 新手注意到的第一件事就是 Lisp 程序中有太多括号了。确实如此，但这直接源于我们正在用一种没有特殊语法规则的语言编写抽象语法树。


    随着本书的深入学习，我们将体会到由此带来的强大表达能力。例如，一个优势是不需要特殊的运算顺序。在中学时，我们必须记住 `*` 和 `/` 要先于 `+` 和
    `-` 求值。而在 Lisp 中则没有这种情况，因为求值顺序由我们编写程序的方式一目了然。


    让我们来看表达式 `(+ 1 (* 2 3))`。正如我们提到的，空白字符是 S 表达式的重要组成部分，因此 `(+1 (* 2 3))` 与 `(+ 1
    (* 2 3))` 是不同的。为了在脑海中将其转换为更熟悉的表示法，我们可以交换运算符，使其变成*中缀*表示法而非*前缀*表示法：`(+ 1 (* 2 3))`
    等价于 `(1 + (2 * 3))`。现在我们看到这个表达式的值是 7。


    接下来，让我们在 DrRacket 编辑器的交互区（下方文本区域）中输入这个表达式，然后按回车键：


    ```

    1   > (+ 1 (* 2 3))

    2   7

    ```


    `>` 符号表示其后的命令需要在交互区中输入。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig4_HTML.jpg](img/510363_1_En_2_Fig4_HTML.jpg)


    图 2-4


    DrRacket 第一次计算


    我们得到结果 7，如图 2-4 所示。我们在 Racket 中完成了第一次计算。


    完成一次求值后，DrRacket 会再次等待新的命令。这是因为在交互区中，我们处于 REPL 模式，即读取-求值-打印-循环模式。也就是说，交互区会读取我们书写的内容，尝试对其进行求值（得出结果），打印结果，然后循环回到读取状态。


    Lisp 的求值与数学中的替换非常相似。例如，`(+ 1 (* 2 3))` 的一种求值方式如下：


    1.  `(+ 1 (* 2 3))`


    2.  `(+ 1 6)`


    3.  `7`


    也就是说，在每一步中，我们都对表达式进行规约，直到无法进一步规约为止。我们立刻就能注意到替换作为一个概念有多么强大。


    ## 2.3.1 基本类型


    在上述求值中，我们得到了一个数字作为结果——值 7 的类型是数字。虽然 Racket 中的值类型是隐式的，但我们仍然有办法检查值的类型，稍后我们将借助谓词来了解这一点。


    Racket 有一些基本（内置）类型，例如：


    -   符号，如 `hello, world`

    -   列表，如 `(1, 2, 3)`

    -   函数，如 `f(x) = x + 1`

    -   数字，如 `1, 2, 3.14`

    -   布尔值，如 `#t`（表示真）和 `#f`（表示假）

    -   字符或单个字母：`#\A, #\B, #\C`

    -   字符串或字符列表：`"Hello", "World"`

    -   字节：根据 ASCII 码，我们可以用数字表示字符（例如 `72` 代表 `H`）

    -   字节串，作为字节的列表：`#"Hello", #"World"`


    ```

    1   > 123

    2   123

    3   > #t

    4   #t

    5   > #f

    6   #f

    7   > #\A

    8   #\A

    9   > "Hello  World"

    10   "Hello World"

    11   > (bytes 72 101 108 108 111)

    12   #"Hello"

    ```


    每个求值结果都附带一个特定的类型：


    1.  第一个求值结果（`123`）的类型是数字。

    2.  第二个（`#t`）和第三个（`#f`）求值结果的类型是布尔值。

    3.  第四个求值结果（`#\A`）的类型是字符。

    4.  第五个求值结果（`"Hello World"`）的类型是字符串。

    5.  第六个求值结果（`(bytes 72 101 108 108 111)`）的类型是字节串，并且使用了 ASCII 表来表示字母。


    我们将在后续章节中讨论符号、列表和函数。


    ## 2.3.2 列表、求值和引号


    为了生成有序列表 `(1, 2, 3)`，我们可以让 DrRacket 在交互区中求值 `(list 1 2 3)`：


    ```

    1   > (list 1 2 3)

    2   ''(1 2 3)

    ```


    `list` 是一个内置函数，就像我们已经用过的 `+` 一样。`list` 接受任意数量的参数，并返回由这些参数生成的列表。返回的表达式 `''(1 2
    3)` 只是一种特殊的表示法，它等价于表达式 `(quote (1 2 3))`，意思是告诉 Racket 返回实际的列表 `(1 2 3)`，而不是对其进行求值。


    我们注意到括号是如何用来表示函数调用或求值的。通常，代码 `(f a_1 a_2 ... a_n)` 会按顺序向 `f` 传递 `n` 个参数进行函数调用。例如，对于函数
    `f(x) = x + 1`，一个求值示例是 `f(1)`，我们写成 `(f 1)`，返回值为 2。


    注意，`(list 1 2 3)` 返回了 `''(1 2 3)` 作为结果。让我们试着理解这里发生了什么。如果 `(list 1 2 3)` 返回了 `(1
    2 3)`，那将毫无意义，因为（正如我们讨论过的）这种表示法会试图以 2 和 3 作为参数调用一个（不存在的）函数 1。相反，它返回了一个*被引用的*列表：`''(1
    2 3)`。


    为了理解这如何影响求值，让我们考虑一个例子：你对某人说以下两句话之一：


    -   说出你的名字

    -   说“你的名字”


    在第一个例子中，你期望对方告诉你他们的名字。在第二个例子中，你期望他们说出“你的名字”这个词语，而不是他们的实际名字。


    与这个例子类似，有一个名为 `quote` 的内置语法结构，我们可以将其用于任何一组符号：


    ```

    1   > (quote hello)

    2   ''hello

    ```


    这允许创建新的符号，并且对于宏的创建尤其重要。有一个特殊的列表，称为*空列表*，表示为 `(list)`，或 `(quote ())`，或简写为 `''()`。我们将在开始使用递归后理解为什么这个列表很特别。


    要获取关于 `list`（或任何其他函数）的更多信息，你可以用鼠标点击该单词，然后按 F1 键。这将打开 Racket 的手册屏幕，允许你选择要了解信息的函数。通常，它是列表中的第一个匹配项。点击它应该会显示类似于图
    2-5 的内容。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig5_HTML.jpg](img/510363_1_En_2_Fig5_HTML.jpg)


    图 2-5


    关于 `list` 的 Racket 手册


    在 Racket 中，圆括号、方括号和花括号具有相同的效果。因此，`(list 1 2 3)` 等同于 `[list 1 2 3]` 和 `{list 1
    2 3}`。这种视觉上的区别可能有助于在括号很多时对求值进行分组。


    回想一下，S 表达式可以是符号或列表。由于我们在本节中讨论了求值、列表和符号，至此本书已经涵盖了构成 Lisp 核心的内容。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figk_HTML.gif](img/510363_1_En_2_Figk_HTML.gif)
    练习 2-4


    在 Racket 中创建一个列表，其中包含不同类型的混合元素（数字、字符串）。该列表至少应包含两个元素。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figl_HTML.gif](img/510363_1_En_2_Figl_HTML.gif)
    练习 2-5


    注意 `list` 是一个函数，而 `quote` 是一种语法结构。使用 F1 键阅读它们两者的手册。

