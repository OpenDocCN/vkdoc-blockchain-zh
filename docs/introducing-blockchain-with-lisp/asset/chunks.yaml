    Next, we will implement a procedure that calculates a block’s hash. We will use
    the SHA hashing algorithm.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figg_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figg_HTML.gif)


    **Definition 3-3**


    **SHA** is a hashing algorithm that takes an input and produces a hash value.


    Here’s how the procedure looks:


    ```

    1   (define (calculate-block-hash previous-hash timestamp transaction nonce)

    2     (bytes->hex-string (sha256 (bytes-append

    3              (string->bytes/utf-8 previous-hash)

    4              (string->bytes/utf-8 (number->string timestamp))

    5              (string->bytes/utf-8 (~a (serialize transaction)))

    6              (string->bytes/utf-8 (number->string nonce))))))

    ```


    There are a few things to note here:


    *   We expect every field in the structure to be of type `string`. This will make
    things much easier later, e.g., when we want to store the blockchain in a data
    file.

    *   If you check the manuals for `sha256`, you will notice it accepts bytes. That
    means we have to convert every field to bytes using `string->bytes/utf-8` and
    then append all these bytes together before hashing them.

    *   `number->string` converts a number to a string, so for example `3 -> "3"`
    and `~a` does the same thing but it can also convert objects to string.

    *   We use `serialize` on a transaction. This procedure accepts an object and
    returns an S-expression containing the same contents. Not all objects can be serialized;
    however, in this case, we use `#:prefab` which additionally makes structures serializable.

    *   Finally, we store the hash as a hex string. Think of hex as a way to store
    a string from readable characters to numbers, e.g. `"Hello" -> "0102030304"`.


    As an example, this is how we calculate the hash of our earlier example block:


    ```

    1   >  (calculate-block-hash  "234"  1  (transaction  "BoroS"  "Boro"  "You"

    2   "a book") 1)

    3   "5e2889a76a464ea19a493a74d2da991a78626fc1fa9070340c2284ad92f4dd17"

    ```


    Now that we have a way to calculate a block’s hash, we also need a way to verify
    it. To do that, we just hash the block’s contents again and compare this hash
    to the one stored in the block:


    ```

    1   (define (valid-block? bl)

    2     (equal? (block-current-hash bl)

    3             (calculate-block-hash (block-previous-hash bl)

    4                                   (block-timestamp bl)

    5                                   (block-transaction bl)

    6                                   (block-nonce bl))))

    ```


    ### 3.2.3 Hashcash Algorithm


    At this point, we have everything we need to implement the Hashcash algorithm.


    ```

    1   (define difficulty 2)

    2   (define target (bytes->hex-string (make-bytes difficulty 32)))

    ```


    We set the `difficulty` to `2`, and thus the `target` will contain a `difficulty`
    number of bytes using the built-in procedure called `make-bytes`.


    A block will be considered mined if the hash matches the target, given the difficulty:


    ```

    1   (define (mined-block? block-hash)

    2     (equal? (subbytes (hex-string->bytes block-hash) 1 difficulty)

    3             (subbytes (hex-string->bytes target) 1 difficulty)))

    ```


    A couple of things to note here:


    *   `hex-string->bytes` is just a way to convert a hex string, e.g. `"0102030304"
    -> #"\1\2\3\3\4"`.

    *   `subbytes` takes a list of bytes, a start, and an end point and returns that
    sublist.

    *   Thus, given a random hash, we consider it to be valid if its first two (in
    this case, per `difficulty`) bytes match the `target`.


    The actual Hashcash procedure is as follows:


    ```

    1   (define (make-and-mine-block

    2             previous-hash timestamp transaction nonce)

    3     (let ([current-hash (calculate-block-hash

    4                   previous-hash timestamp transaction nonce)])

    5       (if (mined-block? current-hash)

    6           (block current-hash previous-hash transaction timestamp nonce)

    7           (make-and-mine-block

    8            previous-hash timestamp transaction (+ nonce 1)))))

    ```


    This procedure keeps increasing the `nonce` until a block is valid, at which point
    it is returned. That is, we continuously change the `nonce` until `sha256` produces
    a hash that matches the target. This defines the foundations of mining (proof
    of work).


    For example, here’s how we can mine the earlier block we gave as an example:


    ```

    1   > (define mined-block (make-and-mine-block "234" 1 (transaction "BoroS"

    2     "Boro" "You" "a book") 1))

    3   > (block-nonce mined-block)

    4   337

    5   > (block-previous-hash mined-block)

    6   "234"

    7   > (block-current-hash mined-block)

    8   "e920d627196658b64e349c1d3d6f2de1ab308d98d1c48130ee36df47ef25ee9a"

    ```


    Note that `nonce` had to go up to `337` for the mining conditionals to be fulfilled.
    This is the amount of “work” that was required. In some cases, it will be smaller,
    and in others, it will be larger.


    Lastly, we need a small helper procedure:


    ```

    1   (define (mine-block transaction previous-hash)

    2     (make-and-mine-block

    3      previous-hash (current-milliseconds) transaction 1))

    ```


    `current-milliseconds` returns the current time in milliseconds since midnight
    UTC, January 1, 1970.


    We provide these structures and procedures:


    ```

    1   (provide (struct-out block) mine-block valid-block? mined-block?)

    ```


    And make sure we require all the necessary packages:


    ```

    1   (require (only-in file/sha1 hex-string->bytes))

    2   (require (only-in sha sha256))

    3   (require (only-in sha bytes->hex-string))

    4   (require racket/serialize)

    ```


    The `only-in` syntax imports only specific objects from a package that we specify,
    instead of importing everything.


    At this point, besides being able to create and sign wallets, we now also have
    the necessary procedures to create and mine a block.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figh_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figh_HTML.gif)


    **Exercise 3-4**


    Create a block (with a transaction) using `block` (and `transaction`) and store
    it in a variable using `define`. Then, calculate its hash using `calculate-block-hash`.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figi_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figi_HTML.gif)


    **Exercise 3-5**


    Use `make-and-mine-block` on a block you generated. What’s the `nonce` count,
    i.e., how much “work” (processing) did it take to mine that block?


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figj_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figj_HTML.gif)


    **Exercise 3-6**


    Use `valid-block?` on the block in the previous exercise. Now use `valid-block?`
    on that block where its `nonce` is `1`.


    **Hint**: To generate a “new” block out of an existing one called `bl`, you can
