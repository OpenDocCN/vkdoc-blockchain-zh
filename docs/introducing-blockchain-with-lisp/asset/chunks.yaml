    We need to modify `main-helper.rkt` to include the peer-to-peer implementation:


    ```

    1   ; ...

    2   (require "peer-to-peer.rkt")

    3   ; ...

    5   (provide (all-from-out "blockchain.rkt")

    6             (all-from-out "utils.rkt")

    7             (all-from-out "peer-to-peer.rkt")

    8             format-transaction print-block print-blockchain print-wallets)

    ```'
  raw: '#### 4.2.1.3 Server Implementation


    When a peer connects to another peer (a server), here’s what should happen:


    1.  The server should wait for the incoming peer to send some command.


    2.  The server should use the `handler` procedure to handle the necessary data.


    3.  The server should send the transformed data back to the incoming peer.


    However, if more than one peer connects, then the procedure will “block,” in the
    sense that the second peer will have to wait for the first one to be served, the
    third will have to wait for the second, and so on.


    To resolve this issue, we turn to threads. `accept-and-handle` is the main procedure
    that will serve the incoming peers. The procedure accepts a connection (listener
    object) and a peer context and launches `handler` in a thread for every incoming
    connection:


    ```

    1   (define (accept-and-handle listener peer-context)

    2     (define-values (in out) (tcp-accept listener))

    3     (thread

    4      (lambda ()

    5        (handler peer-context in out)

    6        (close-input-port in)

    7        (close-output-port out))))

    ```


    We used a new procedure called `tcp-accept` that accepts a connection and returns
    the input (to read data) and the output ports (to send data). Using the `define-values`
    syntax, we store both of these values.


    `peers/serve` is the main server listener. This is straight copy-pasted from the
    Racket documentation, and the curious reader can navigate to the documentation
    and read more about the implementation details. In short, a *custodian* is a kind
    of container that ensures there are no bogus threads or input/output ports in
    the memory and takes care of this for us.


    ```

    1   (define (peers/serve peer-context)

    2     (define main-cust (make-custodian))

    3     (parameterize ([current-custodian main-cust])

    4       (define listener

    5         (tcp-listen (peer-context-data-port peer-context) 5 #t))

    6       (define (loop)

    7         (accept-and-handle listener peer-context)

    8         (loop))

    9       (thread loop))

    10     (lambda ()

    11       (custodian-shutdown-all main-cust)))

    ```


    The `tcp-listen` procedure keeps listening to a specific port for new incoming
    connections.


    #### 4.2.1.4 Client Implementation


