  trans: '

    ## 2.1 Lisp 简介


    `Lisp` 语言源于 1958 年，代表 *列表处理*，是一个编程语言家族。与标准编程语言不同，它采用完全括号化的前缀表示法。例如，不写成 `1 + 2`，而是写成
    `(+ 1 2)`。


    在 `Lisp` 家族中有许多 `Lisp` 实现。其中一种实现是 `Racket`，本书将使用它，因为该实现对于入门级程序员来说特别容易上手。这种语言被用于多种场景，例如研究、计算机科学教育和通用编程。它也曾用于商业项目。一个著名的例子是
    Hacker News^(⁴) 网站，该网站运行于 `Arc` 之上，而 `Arc` 是一种用 `Racket` 开发的编程语言。


    `Lisp` 的实现以其简洁性而闻名。由于这种简洁性，在 `Lisp` 中构建区块链（或任何东西）意味着你可以轻松地在大多数其他编程语言中完成同样的工作。`Lisp`
    语言倾向于函数组合——将两个函数链接在一起——例如，给定 *f*(*x*) 和 *g*(*x*)，一种组合是 *f*(*g*(*x*))。在本书后续内容中，我们将看到组合所带来的有趣特性，以及我们如何轻松地维护和扩展代码。


    ### 2.1.1 数据结构与递归


    在 `Lisp` 中有三个重要的概念：


    -   *原语* 或公理（起点或构建块）。例如，数字 1、2 等等，是我们无需自行实现的内容，因为它们已包含在编程语言中。另一个例子是对数字的操作，例如 `+`
    和 `*`。

    -   *组合* 或组合原语以执行复杂计算的方法。例如，我们可以按如下方式组合 `+` 和 `*`：`1 + (2 * 3)` 或使用前缀（`Lisp`）表示法：`(+
    1 (* 2 3))`。

    -   *抽象* 或捕获原语的组合。例如，如果我们发现自己反复进行某项计算，那么将其捕获（抽象或封装）到一个易于重用的函数中会是个好主意。


    我们在本书中会反复依赖这些概念，因为它们使我们能够构建复杂的结构。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figb_HTML.gif](img/510363_1_En_2_Figb_HTML.gif)
    定义 2-1


    **数据结构** 是一个值的集合、它们之间的关系，以及可应用于这些值的函数或操作。


    数据结构的一个例子是数字及其加法和乘法函数。


    从上一章的动机中，我们可以看到形成这样一个数据结构的必要性，例如，一个区块就是一个包含哈希值、所有者和交易金额的结构。


    存在许多数据结构。有序列表就是一个例子，它按顺序表示数字（1、2、3）。此外，还有针对列表的各种操作，例如计算元素数量、合并两个列表等等。


    我们在之前的列表示例中使用了数字 1、2 和 3——这些元素是*原语*。一个列表及其相关操作代表了一个*抽象*。将多个列表操作链接在一起则代表了*组合*。


    现在我们已经可以转换某些数据结构（通过对其应用操作），能够根据某些特定规则重复转换一个数据结构将会很有用。例如，如果我们有一个区块链数据结构，我们可能想出一种方法来转换它，例如，在其中插入一个新块。这可能需要对同一个操作应用多次。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figc_HTML.gif](img/510363_1_En_2_Figc_HTML.gif)
    定义 2-2


    在数学和计算机科学中，当函数可以由以下两个属性定义时，它们表现出**递归**行为：


    1.  一个简单的基准情形（或多个情形）——一个终止情形，该情形返回一个值而不使用递归

    2.  一个（或多个）规则，能够逐步简化至基准情形


    递归函数最常见的例子是阶乘函数，其定义如下：


    ```

    fact(n) = { 1, 如果 n = 0; n * fact(n-1), 其他情况 }

    ```


    例如，通过代入法我们可以看到 `fact(3)` 求值为 3 ⋅ `fact(2)`，即 3 ⋅ 2 ⋅ `fact(1)`，最终为 3 ⋅ 2 ⋅ 1 ⋅
    `fact(0)`，结果就是 6。


    我们刚才讨论的递归将同一个操作应用了多次，这引出了下一个定义。


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figd_HTML.gif](img/510363_1_En_2_Figd_HTML.gif)
    定义 2-3


    **树** 是一种层次化的递归数据结构，它可以有两种可能的值：


    1.  空值

    2.  一个单一值，并附带有另外两个子树


    家谱是树的一个例子。树的另一个例子是二叉树，其中左子树的值小于当前节点的值，右子树的值大于当前节点的值：


    ```

    1     2

    2    / \

    3   1   3

    ```


    树在 `Lisp` 语言中很重要，因为它们被用来表示程序的结构。我们将在下一节中对此进行更多讨论。

    '
- fmt: '### 2.1.2 Languages and Syntax


    In this section, we take a quick look at the foundations of a Lisp, which will
    provide a high overview of the ideas behind Lisps.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fige_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Fige_HTML.gif)
    Definition 2-4


    A **language** consists of:


    1.  Symbols, which can be combined into sentences

    2.  Grammar, which is a set of rules that tells us which sentences are well-formed


    This definition of a language is also reflected in programming languages, which
    have a special grammar called the syntax. For example, the C programming language
    has a special syntax—you have to follow specific rules when writing program statements.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figf_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figf_HTML.gif)
    Definition 2-5


    An **abstract syntax tree** is a tree representation of the abstract syntactic
    structure of source code written in a programming language.


    When you write a program in a programming language, there’s an intermediate step
    that parses the program’s source code and derives an abstract syntax tree.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig1_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Example 1: Abstract syntax tree


    For example, the image in Figure [2-1](#510363_1_En_2_Chapter.xhtml#Fig1) represents
    an abstract syntax tree for the following pseudocode:


    ```

    1   while (a > b) {

    2       a = a - 1;

    3       b = b * 2;

    4   }

    ```


    As another example, the image in Figure [2-2](#510363_1_En_2_Chapter.xhtml#Fig2)
    represents the following pseudocode:


    ```

    1   if (a == b && b == c) {

    2       a = a - 1;

    3       b = b * 2;

    4   } else a = a * b * 2;

    ```


    It is not important to understand what these codes do, rather understand how such
    programs are represented internally in programming languages.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig2_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Example 2: Abstract syntax tree


    Lisps do not have the restriction of a special syntax like C has, for example.
    The code that we will write will be the actual abstract syntax tree. This is why
    Lisps rely on prefix notation. We see how Lisps are based on a minimalistic design,
    as we do not get the overhead of many other languages that have special syntax
    and sometimes functionalities that overlap.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figg_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figg_HTML.gif)
    Definition 2-6


    The syntactic elements in Lisp are symbolic **expressions** or S-expressions.
    An S-expression can be one of:


    1.  A symbol (a string of characters)

    2.  A well-formed list (balanced parentheses) of S-expressions


    For example, `hello` is a valid S-expression, and so is `(hello there)`. But `(hello(`
    is not a valid S-expression, because the parentheses are not balanced. Whitespace
    is important in constructing S-expressions. Note that `h ello` is different from
    `hello`.


    An S-expression is well-formed if and only if the abstract syntax tree is balanced.


    Syntax has a special meaning in Lisps compared to other languages. With macros
    as part of the core language, it’s possible to extend this syntax.^([⁵](#fn5))
    S-expressions form the syntax of a Lisp.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figh_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figh_HTML.gif)
    Exercise 2-1


    We treated numbers with the plus function as a data structure. Think of another
    data structure.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figi_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figi_HTML.gif)
    Exercise 2-2


    Evaluate `sum(3)`, `sum(5)`, and `sum(1)` given the following definition:


    ![$$ sum(n)=\left\{\begin{array}{l}0,\mathrm{if}\ n=0\\ {}n+ sum\left(n-1\right),\mathrm{otherwise}\end{array}\right.
    $$](images/510363_1_En_2_Chapter/510363_1_En_2_Chapter_TeX_IEq1.png)


    What about `sum(−1)`?


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figj_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figj_HTML.gif)
    Exercise 2-3


    Which of the following S-expressions is valid?


    1. `hello`

    2. `123`

    3. `(hello 123)`

    4. `(hello (123)`

    5. `(+ 1 (* 2 3))`

    6. `(+ (* 3 2) (/ 6 2))`


    **Hint**: Drawing an abstract syntax tree for each of the expressions might make
    it more obvious why one is or isn’t valid.


    ## 2.2 Configuration and Installation


    Racket can be downloaded and installed via [`https://download.racket-lang.org`](https://download.racket-lang.org/).
    There are binaries available for Windows, Linux, and Mac. This book was written
    using Racket version 7, but it may work as well with other versions. After downloading
    and installing the complete package, we can run DrRacket. If you get to the screen
    shown in Figure [2-3](#510363_1_En_2_Chapter.xhtml#Fig3), congratulations! It
    means that the installation was successful.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig3_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    DrRacket


    The upper text area part of the screen is the definitions area, where we usually
    write the definitions. Alternatively, the lower part is the interactions area,
    where we interact with the definitions.


    The Help Desk, found under `Help > Help Desk` on the top menu, contains useful
    information such as a quick introduction, reference manuals, and examples.


    There are two main approaches to working with Racket:


    *   Using the graphical user interface (GUI), which is the recommended way and
    what we use throughout this book

    *   Using the command-line utilities (`racket` is the interpreter/compiler and
    `raco` is the package manager), which is for more advanced users'
