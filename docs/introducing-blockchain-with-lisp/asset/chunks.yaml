    2     (begin

    3       (define-values (in out)

    4         (tcp-connect (peer-info-ip peer)

    5                      (peer-info-port peer)))


    7       (define current-peer-io (peer-info-io peer in out))


    9       (set-peer-context-data-connected-peers!

    10        peer-context

    11        (cons current-peer-io

    12              (peer-context-data-connected-peers peer-context)))


    14        (thread

    15         (lambda ()

    16           (handler peer-context in out)

    17           (close-input-port in)

    18           (close-output-port out)


    20           (set-peer-context-data-connected-peers!

    21            peer-context

    22            (set-remove

    23             (peer-context-data-connected-peers peer-context)

    24             current-peer-io))))))

    ```


    This procedure is quite long so it deserves some unpacking:


    1.  The `tcp-connect` procedure tries to make a connection to a specific IP address
    and port (values that we extract from the `peer-info` structure).


    2.  When the connection is successful, `tcp-connect` will return the input and
    output ports, which we can use to read data from and write data to, respectively.


    3.  Next, the specific list of connected peers for the current context will be
    updated.


    4.  Finally, we launch a thread, using `handler` to handle the communication.
    When the connection is finished, we do a cleanup and remove the peer from the
