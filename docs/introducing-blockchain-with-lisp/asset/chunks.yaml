- fmt: '### 4.2.3 The `main-p2p.rkt` File


    This is where we will put all the components together and use them. We want this
    implementation to accept some input arguments, such as the blockchain database
    file and the IP and port addresses of each peer.


    Once we create an executable, we have a way to pass input to it by using the command-line
    arguments. For example, if our executable is named `blockchain`, we can pass additional
    data to it by running `./blockchain <param1> <param2> <...>`. Racket provides
    a built-in procedure called `current-command-line-arguments`, which will read
    these arguments into a vector (similar to a list), and we then use `vector->list`
    to convert it to a list for further processing.


    ```

    1   (require "main-helper.rkt")


    3   (define args (vector->list  (current-command-line-arguments)))


    5   (when (not (= 3 (length args)))

    6     (begin

    7       (printf "Usage: main-p2p.rkt db.data port ip1:port1,ip2:port2...")

    8       (newline)

    9       (exit)))

    ```


    `string-to-peer-info` is a helper procedure that does additional parsing for the
    peers’ information:


    ```

    1   (define (string-to-peer-info s)

    2     (let ([s (string-split s ":")])

    3       (peer-info (car s) (string->number (cadr s)))))

    ```


    We proceed by parsing the arguments:


    ```

    1   (define db-filename (car args))

    2   (define port (string->number (cadr args)))

    3   (define valid-peers

    4     (map string-to-peer-info (string-split (caddr args) ",")))

    ```


    We then proceed with checking if the database file exists using `file-exists?`.
    This file will contain contents from a previous blockchain if it exists. If the
    file doesn’t exist, we will proceed to create one.


    ```

    1   (define db-blockchain

    2     (if (file-exists? db-filename)

    3         (file->struct db-filename)

    4         (initialize-new-blockchain)))

    ```


    We provide the functionality for creating a new blockchain:


    ```

    1   (define wallet-a (make-wallet))


    3   (define (initialize-new-blockchain)

    4     (begin

    5       (define coin-base (make-wallet))


    7       (printf "Making genesis transaction...\n")

    8       (define genesis-t (make-transaction coin-base wallet-a 100 ''()))


    10       (define utxo (list

    11                      (make-transaction-io 100 wallet-a)))


    13       (printf "Mining genesis block...\n")

    14       (define b (init-blockchain genesis-t "1337cafe" utxo))

    15       b))

    ```


    Next is the code for initialization of the current peer—it is named `Test peer`,
    and it contains data from the parsed command-line arguments (the port, valid peers,
    etc.).


    ```

    1   (define peer-context

    2     (peer-context-data "Test peer"

    3                        port

    4                        (list->set valid-peers)

    5                        ''()

    6                        db-blockchain))

    7   (define (get-blockchain) (peer-context-data-blockchain peer-context))


    9   (run-peer peer-context)

    ```


    We keep exporting the database to have up-to-date information whenever a user
    quits the app.


    ```

    1   (define (export-loop)

    2     (begin

    3       (sleep 10)

    4       (struct->file (get-blockchain) db-filename)

    5       (printf "Exported blockchain to ''~a''...\n" db-filename)

    6       (export-loop)))


    8   (thread export-loop)

    ```


    Finally, we create a procedure to keep mining empty blocks. Note that the peer-to-peer
    implementation runs in threaded mode, so there will be no blocking if we keep
    running this procedure.


    ```

    1   (define (mine-loop)

    2     (let ([newer-blockchain

    3            (send-money-blockchain (get-blockchain)

    4                                   wallet-a

    5                                   wallet-a

    6                                   1

    7                                   (file->contract "contract.script"))])

    8       (set-peer-context-data-blockchain! peer-context newer-blockchain)

    9       (printf "Mined a block!")

    10       (sleep 5)

    11       (mine-loop)))


    13   (mine-loop)

    ```


    We can proceed by creating an executable and share it with our friends. If we
    know their IP addresses (or they know ours), we can make a connection and thus
    form a system.


    ### 4.3 Summary


    Congratulations! As part of this chapter, we added two new important features
    to the blockchain implementation: smart contracts and peer-to-peer support. This
    concludes the blockchain implementation of this book.


