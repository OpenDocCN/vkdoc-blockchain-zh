- fmt: '### 4.1 Smart Contracts Implementation


    Bitcoin’s blockchain is programmable, which means that the transaction conditions
    themselves can be programmed by users. For example, users can write *scripts*
    (short pieces of code) to add requirements that must be satisfied before making
    a transaction.


    In Section 2.4, we created an executable that we can send to our friends, but
    they cannot change the executable because they don’t have the original code. And
    even if they did have the original code, not all users have programming skills.


    The point of smart contracts is to allow non-programmers to adjust the behavior
    of the transactional process without having to change the original code.


    #### 4.1.1 The `smart-contracts.rkt` File


    The idea is to implement a small language, which users can consume. Our implementation
    will depend on transactions:


    ```racket

    1   (require "transaction.rkt")

    ```


    We have to extend the original `valid-transaction?` so that it will also consider
    contracts when calculating validity:


    ```racket

    1   (define (valid-transaction-contract? t c)

    2     (and (eval-contract t c)

    3          (valid-transaction? t)))

    ```


    We will now implement a procedure that will accept a transaction, a contract,
    a scripting language (which is really just an S-expression), and return some value.
    The returned value can be true, false, a number, or a string.


    ```racket

    1   (define (eval-contract t c)

    2     (match c

    3       [(? number? x) x]

    4       [(? string? x) x]

    5       [`() #t]

    6       [`true #t]

    7       [`false #f]

    8       [`(if ,co ,tr ,fa) (if co tr fa)]

    9       [`(+ ,l ,r) (+ l r)]

    10      [else #f]))

    ```


    We used new syntax here, called `match`. It is similar to `cond`, except that
    it can directly compare the structure of an object. For example, `? <expr> <pat>`
    matches when `<expr>` is true and stores the value in `<pat>`. In the previous
    code, if we pass a number, it will return that same number. Additionally, if we
    pass the value `true` (i.e., `c` matches `true`), then it will return `#t`. Another
    example is if `c` matches a structure of the form `(if X Y Z)` (quoted^([⁸](#fn8))),
    then it will return the evaluation of `(if X Y Z)`.


    Here are a few example uses:


    ```racket

    1   > (define test-transaction (transaction "BoroS" "Boro" "You" "a book"

    2     ''() ''()))

    3   > (eval-contract test-transaction 123)

    4   123

    5   > (eval-contract test-transaction "Hi")

    6   "Hi"

    7   > (eval-contract test-transaction ''())

    8   #t

    9   > (eval-contract test-transaction ''true)

    10  #t

    11  > (eval-contract test-transaction ''false)

    12  #f

    13  > (eval-contract test-transaction ''(if #t "Hi" "Hey"))

    14  "Hi"

    15  > (eval-contract test-transaction ''(if #f "Hi" "Hey"))

    16  "Hey"

    17  > (eval-contract test-transaction ''(+ 1 2))

    18  3

    ```


    However, we still haven’t used any of the transaction’s values in our language.
    Let’s extend it with a few more commands:


    ```racket

    1   ...

    2        [`from (transaction-from t)]

    3        [`to (transaction-to t)]

    4        [`value (transaction-value t)]

    5   ...

    ```


    Now we can do something like this:


    ```racket

    1   > (eval-contract test-transaction ''from)

    2   "Boro"

    3   > (eval-contract test-transaction ''to)

    4   "You"

    5   > (eval-contract test-transaction ''value)

    6   "a book"

    ```


    We will implement a few more operators so that the scripting language becomes
    more expressive:


    ```racket

    1   ...

    2        [`(* ,l ,r) (* l r)]

    3        [`(- ,l ,r) (- l r)]

    4        [`(= ,l ,r) (equal? l r)]

    5        [`(> ,l ,r) (> l r)]

    6        [`(< ,l ,r) (< l r)]

    7        [`(and ,l ,r) (and l r)]

    8        [`(or ,l ,r) (or l r)]

    9   ...

    ```


    However, there is a problem in the language implementation. Consider the evaluations
    of `(+ 1 2)` and `(+ (+ 1 2) 3)`:


    ```racket

    1   > (eval-contract test-transaction ''(+ 1 2))

    2   3

    3   > (eval-contract test-transaction ''(+ (+ 1 2) 3))

    4   . . +: contract violation

    ```


    The problem happens in the matching clause `` [`(+ ,l ,r) (+ l r)]``. When we
    match against `''(+ (+ 1 2) 3))`, we end up with `(+ ''(+ 1 2) 3)`, and Racket
    cannot sum a quoted list with a number. The solution to this problem is to *recursively*
    evaluate every subexpression. So the match turns from ``[`(+ ,l ,r) (+ l r)]``
    to ``[`(+ ,l ,r) (+ (eval-contract t l) (eval-contract t r))]``.


    In this case, the evaluation will happen as follows:


    ```racket

    1   (eval-contract t ''(+ (+ 1 2) 3))

    2   = (eval-contract t (list ''+ (eval-contract t ''(+ 1 2))

    3                               (eval-contract t 3)))

    4   = (eval-contract t (list ''+ (+ 1 2) 3))

    5   = (eval-contract t (list ''+ 3 3))

    6   = (eval-contract t ''(+ 3 3))

    7   = (eval-contract t 6)

    8   = 6

    ```


    It is important to remember the distinction between a quoted list and a non-quoted
    one; the latter will attempt evaluation. In this case, we juggled the quotations
    to produce the desired results.


    We will have to rewrite all of the operators:


    ```racket

    1   ...

    2        [`(+ ,l ,r) (+ (eval-contract t l) (eval-contract t r))]

    3        [`(* ,l ,r) (* (eval-contract t l) (eval-contract t r))]

    4        [`(- ,l ,r) (- (eval-contract t l) (eval-contract t r))]

    5        [`(= ,l ,r) (= (eval-contract t l) (eval-contract t r))]

    6        [`(> ,l ,r) (> (eval-contract t l) (eval-contract t r))]

    7        [`(< ,l ,r) (< (eval-contract t l) (eval-contract t r))]

    8        [`(and ,l ,r) (and (eval-contract t l) (eval-contract t r))]

    9        [`(or ,l ,r) (or (eval-contract t l) (eval-contract t r))]

    10   ...

    ```


    The `if` implementation in the language has the same problem. So we will also
    change it:


    ```racket

    1   ...

    2        [`(if ,co ,tr ,fa) (if (eval-contract t co)

    3                           (eval-contract t tr)

    4                           (eval-contract t fa))]

    5   ...

    ```


    Thus, the final procedure becomes:


    ```racket

    1   (define (eval-contract t c)

    2     (match c

    3       [(? number? x) x]

    4       [(? string? x) x]

    5       [`() #t]

    6       [`true #t]

    7       [`false #f]

    8       [`(if ,co ,tr ,fa) (if (eval-contract t co)

    9                              (eval-contract t tr)

    10                             (eval-contract t fa))]

    11      [`(+ ,l ,r) (+ (eval-contract t l) (eval-contract t r))]

    12      [`from (transaction-from t)]

    13      [`to (transaction-to t)]

    14      [`value (transaction-value t)]

    15      [`(+ ,l ,r) (+ (eval-contract t l) (eval-contract t r))]

    16      [`(* ,l ,r) (* (eval-contract t l) (eval-contract t r))]

    17      [`(- ,l ,r) (- (eval-contract t l) (eval-contract t r))]

    18      [`(= ,l ,r) (= (eval-contract t l) (eval-contract t r))]

    19      [`(> ,l ,r) (> (eval-contract t l) (eval-contract t r))]

    20      [`(< ,l ,r) (< (eval-contract t l) (eval-contract t r))]

    21      [`(and ,l ,r) (and (eval-contract t l) (eval-contract t r))]

    22      [`(or ,l ,r) (or (eval-contract t l) (eval-contract t r))]

    23      [else #f]))

    ```


    Users can now supply scripting code, such as `(if (= (+ 1 2) 3) from to)`:


    ```racket

    1   > (eval-contract test-transaction ''(if (= (+ 1 2) 3) from to))

    2   "Boro"

    3   > (eval-contract test-transaction ''(if (= (+ 1 2) 4) from to))

    4   "You"

    ```


    Finally, we provide the output, which is just the transaction validity check:


    ```racket

    1   (provide valid-transaction-contract?)

    ```'
