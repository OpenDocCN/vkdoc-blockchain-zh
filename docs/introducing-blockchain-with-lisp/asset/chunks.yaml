    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figa_HTML.jpg](images/510363_1_En_3_Chapter/510363_1_En_3_Figa_HTML.jpg)


    *Gateway to abstractions, by D. Bozhinovski*


    Now that we have equipped ourselves with the ability to write computer programs,
    we will implement the components (data structures and operations) of the blockchain.
    Throughout this chapter, we will be using some new procedures. For some of them,
    we will give a brief explanation. For others, if you are curious, you can get
    additional details from Racket’s manuals.


    Every section in this chapter is hands-on, meaning that you will have to implement
    it as we go through. Exercises are provided to make sure you understand how the
    procedures we build will be used. Before we start, recall that at the top of every
    file you have to prepend `#lang racket`, as we mentioned in the previous chapter.


    As before, code snippets that start with a `>` are to be evaluated in the REPL.
    Don’t save their definitions in the actual target file.


    We start by defining serialization. We will rely on it heavily in the next chapter,
    when peers will send information to each other. Think of it as a neat way to transform
    data structures to some object that’s easy to transfer between peers.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figb_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figb_HTML.gif)Definition
    3-1


    **Serialization** is the process of converting an object into a stream of bytes
    to store the object or transmit it to memory, a database, or a file. **Deserialization**
    is the opposite process—converting a stream of bytes into an object.


    ## 3.1 The wallet.rkt File


    In this section, we will implement wallets. They will be used by transactions
    later to determine the source and the destination of sending/receiving money.


    As we discussed earlier, a wallet is a structure that contains a public and a
    private key. Wallets have this form:


    ```

    1   (struct wallet

    2     (private-key public-key)

    3     #:prefab)

    ```


    The `#:` operator represents an **optional keyword argument**—it’s basically an
    argument whose value can be set by referring to this argument’s name. In contrast,
    for ordinary arguments, we have to rely on their order to set their values. For
    example, in `(lambda (x y z) ...)`, we have to pass values for `x` and `y` before
    we can pass a value for `z`.


    The `#:prefab` part is new. A prefab (“previously fabricated”) structure type
    is a built-in type that is known to the Racket printer. We can print/display the
    structure and all of its contents. In addition, we can serialize/deserialize these
    kinds of structures.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figc_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figc_HTML.gif)Definition
    3-2


    **RSA** is an asymmetric-key algorithm used to encrypt and decrypt messages, similar
    in nature to the one described in Section 1.2.2.


    We will make a procedure that creates a wallet by generating random public and
    private keys, and it will rely on the RSA algorithm.


    ```

    1   (define (make-wallet)

    2     (letrec ([rsa-impl (get-pk ''rsa libcrypto-factory)]

    3              [privkey (generate-private-key rsa-impl ''((nbits 512)))]

    4              [pubkey (pk-key->public-only-key privkey)])

    5       (wallet (bytes->hex-string

    6                (pk-key->datum privkey ''PrivateKeyInfo))

    7               (bytes->hex-string

    8                (pk-key->datum pubkey ''SubjectPublicKeyInfo)))))

    ```


    All of the procedures we’re using come from the `crypto` package:


    *   `get-pk` returns the RSA implementation algorithm.

    *   `generate-private-key` generates a private key given algorithm (in this case,
    RSA).

    *   `pk-key->public-only-key` returns a public key given public/private key.

    *   `pk-key->datum` returns a public/private key so that it is easily serializable
    by the next procedure in this list.

    *   `bytes->hex-string` converts a hex string (think numbers for example) to bytes,
    e.g. `"0102030304" -> "Hello"`.


    We need to require the necessary packages:


    ```

    1   (require crypto)

    2   (require crypto/all)

    ```


    And we export everything so that this procedure can be used as a package.


    ```

    1   (provide (struct-out wallet) make-wallet)

    ```


    The `struct-out` syntax is exporting the `struct` together with the procedures
    it generates.


    Here’s an example of a generated wallet:


    ```

    1   > (make-wallet)

    2   ''#s(wallet

    3       "3082015502010030..."

    4       "305c300d06092a86...")

    ```


    We now have a way to create wallets for our blockchain.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figd_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figd_HTML.gif)Exercise
    3-1


    Create a wallet using `make-wallet` and store it in a variable using `define`.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Fige_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Fige_HTML.gif)Exercise
    3-2


    Extract the private and the public key of the previously created wallet. The code
    should look something like `(wallet-?? (make-wallet))`.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figf_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figf_HTML.gif)Exercise
    3-3


    Get yourself briefly introduced to the procedures used in the `crypto` package
    by reading the manuals.


    **Hint**: If your local documentation does not contain information about the `crypto`
    package, refer to [`https://docs.racket-lang.org`](https://docs.racket-lang.org/).


    ## 3.2 The block.rkt File


    Recall that a blockchain is simply a list of blocks, as depicted in Figure 1-4
    (Chapter 1). Thus, a block is the building block of a blockchain, and in this
    section, we will provide an implementation of blocks.


    ### 3.2.1 Construction


    A block should contain the current hash, the previous hash, the data, and the
    timestamp that it was generated:


    ```

    1   > (struct block

    2   (current-hash previous-hash data timestamp)

    3   #:prefab)

    ```


    Using a hashing algorithm will allow us to confirm that the block is valid.


    In general, blocks can contain any data, not just transactions, but we are limiting
    them to transactions for now. We will also add a `nonce` field for the Hashcash
    algorithm. We will see the purpose of this field in a moment:


    ```

    1   (struct block

    2     (current-hash previous-hash transaction timestamp nonce)

    3     #:prefab)

    ```


    Our block also contains a transaction that is roughly of the following form:


    ```

    1   > (struct transaction

    2     (signature from to value)

    3     #:prefab)

    ```


    We will implement transactions in details later.


    Here’s one way to generate a block:


    ```

    1   > (block "123456" "234" (transaction "BoroS" "Boro" "You" 123) 1 1)

    2   ''#s(block "123456" "234" #s(transaction "BoroS" "Boro" "You" 123)

    3   1 1)

    ```


    For example, this block makes a transaction from `"Boro"` to `"You"` with the
    value of `123`, and with a timestamp and a `nonce` of `1`.'
