- fmt: '### 1.2.1 Functions


    Figure [1-5](#510363_1_En_1_Chapter.xhtml#Fig5) shows a visual representation
    of a function. An input goes in the function and an output is produced.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig5_HTML.jpg](images/510363_1_En_1_Chapter/510363_1_En_1_Fig5_HTML.jpg)


    Figure 1-5 — A function


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figh_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figh_HTML.gif)
    Definition 1-7


    **Functions** are mathematical entities that assign unique outputs to given inputs.


    For example, you might have a function that accepts as input a person and then
    returns the person’s age or name as the output. Another example is the function
    `f(x) = x + 1`. There are many inputs this function can accept: 1, 2, and 3.14.
    For example, when we input 2 it gives us an output of 3, since `f(2) = 2 + 1 =
    3`.


    One simple way to think of functions is in the form of tables. For a function
    `f(x)` accepting a single argument *x*, we have a two-column table where the first
    column is the input and the second column is the output. For a function `f(x,
    y)` that’s accepting two arguments *x* and *y*, we have a three-column table where
    the first and second columns represent the input, and the third column is the
    output. Thus, to display the function discussed above in the form of a table,
    it would look like this:


    | **x** | ***f*(*x*)** |

    | --- | --- |

    | 1 | 2 |

    | 2 | 3 |

    | … | … |


    ### 1.2.2 Symmetric-Key Algorithm


    We can assume that there exist functions `E(x)` and `D(x)` for encryption and
    decryption, respectively. We want these functions to have the following properties:


    *   `E(x) ≠ x`, meaning that the encrypted value should not be the same as the
    original value.

    *   `E(x) ≠ D(x)`, meaning that the encryption and decryption functions produce
    different values.

    *   `D(E(x)) = x`, meaning that the decryption of an encrypted value should return
    the original value.


    For example, let’s assume there’s some kind of an encryption scheme, say `E("Boro")
    = 426f726f`. We can “safely” communicate the value `426f726f` without actually
    exposing our original value, and only those who know the decryption scheme `D(x)`
    will be able to see that `D(426f726f) = "Boro"`.


    Another example of an encryption scheme is for `E(x)` to shift every character
    in *x* forward, and for `D(x)` to shift every character in *x* backward. This
    scheme is known as the *Caesar cipher*. To encrypt the text `"abc"` we have `E("abc")
    = "bcd"`, and to decrypt it, we have `D("bcd") = "abc"`.


    However, this scheme makes a *symmetric algorithm*, as shown in Figure [1-6](#510363_1_En_1_Chapter.xhtml#Fig6),
    meaning that we have to share the functions `E` and `D` with the parties involved.
    That makes it open to attacks.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig6_HTML.jpg](images/510363_1_En_1_Chapter/510363_1_En_1_Fig6_HTML.jpg)


    Figure 1-6 — Symmetric-key algorithm


    ### 1.2.3 Asymmetric-Key Algorithm


    To solve the problems that arise with symmetric-key algorithms, we will use what
    is called an *asymmetric algorithm* or *public-key cryptography* (Figure [1-7](#510363_1_En_1_Chapter.xhtml#Fig7)).
    In this scheme, we have two kinds of keys: public and private. We share the public
    key with the world and keep the private one to ourselves.


    This algorithm scheme has a neat property in which only the private key can decode
    a message, and only the public key can encode a message.


    We have two functions that should have the same properties as those for the symmetric-key
    algorithm:


    *   `E(x, p)` encrypts a message *x* given a public key *p*

    *   `D(x'', s)` decrypts an encrypted message *x''* given a private (secret) key
    *s*


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig7_HTML.jpg](images/510363_1_En_1_Chapter/510363_1_En_1_Fig7_HTML.jpg)


    Figure 1-7 — Asymmetric-key algorithm


    In our example, we will rely on the modulo operation. Recall, from high school,
    that *a* mod *b* represents the remainder when *a* is divided by *b*. For example,
    `4 mod 2 = 0` because there is no remainder when dividing 4 by 2, however, `5
    mod 2 = 1`.


    Here’s one example of a basic encryption algorithm based on addition and modulo
    operations:


    1.  Pick one random number, for example 100. This will represent a common, publicly
    available key.

    2.  Pick another random number in the range (1, 100), for example, 97. This will
    represent the private key *s*.

    3.  The public key *p* is obtained by subtracting the common key from the private
    one: `100 - 97 = 3`.

    4.  To encrypt data, add it to the public key and the take modulo 100. `E(x, p)
    = (x + p) mod 100`.

    5.  To decrypt data, we use the same logic but with our private key, so `D(x'',
    s) = (x'' + s) mod 100`.


    For example, suppose we want to encrypt 5. Then `E(5, 3) = (5 + 3) mod 100 = 8`.
    To decrypt 8, we have `D(8, 97) = (8 + 97) mod 100 = 105 mod 100 = 5`.


    This example uses a very simple generation pair: `(x + y) mod c`. But, in practice,
    the pair-generation algorithm is much more complex and harder for attackers to
    break. After all, the complexity of the algorithm’s computation is what makes
    it hard to break.


    We can use a similar algorithm for digital signatures:


    *   `S(x, s)` signs a message *x* given a private key *s* (encryption).

    *   `V(x'', sig, p)` verifies a signed message *x''*, given signature `sig` and
    public key *p* (decryption).


    As we said earlier, each record will also include a special number (or a hash).
    This hash will be what is produced by `S(x, s)` (encryption), and it can be verified
    by using the verify function to confirm a record’s ownership (decryption).


    The wallet will contain a pair of public and private keys. These keys will be
    used to receive or send money. With the private key, it is possible to write new
    blocks (or transactions) to the blockchain, effectively spending money. With the
    public key, others can use it to send money to the wallet and verify signatures.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figi_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figi_HTML.gif)
    Exercise 1-1


    Come up with a table of functions such that:


    1.  The input is a number and the output is a number.

    2.  The input is a number and the output is the name of an employee in a company
    given that number.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figj_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figj_HTML.gif)
    **Exercise 1-2**


    Check the three properties for a symmetric-key algorithm to ensure that the Caesar
    cipher is compatible with them.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figk_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figk_HTML.gif)
    **Exercise 1-3**


    Come up with an encryption scheme, based on mathematical substitution.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figl_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figl_HTML.gif)
    **Exercise 1-4**


    Use the asymmetric-key algorithm we defined to sign a message and verify it.


    **Hint**: This is similar to the encryption/decryption example that we showed.'
