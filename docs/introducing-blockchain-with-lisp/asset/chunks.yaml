    \n```\n(require \"blockchain.rkt\")\n(require \"utils.rkt\")\n```\n\n接下来这个过程会将一个交易对象转换为可打印的字符串。它会使用`substring`仅打印哈希值的一部分（因为哈希可能太长），同时也会使用`format`，这是一个字符串格式化过程，它会按顺序将字符串中的每个`~a`替换为传入的参数。\n\
