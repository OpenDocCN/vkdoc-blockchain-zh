    Here’s one example of a basic encryption algorithm based on addition and modulo
    operations:


    1.  Pick one random number, for example 100\. This will represent a common, publicly
    available key.


    2.  Pick another random number in the range (1, 100), for example, 97. This will
    represent the private key *s*.


    3.  The public key *p* is obtained by subtracting the common key from the private
    one: 100 − 97 = 3.


    4.  To encrypt data, add it to the public key and the take modulo 100. *E*(*x*,
    *p*) = (*x* + *p*) mod 100.


    5.  To decrypt data, we use the same logic but with our private key, so *D*(*x*′,
    *s*) = (*x*′ + *s*) mod 100.


    For example, suppose we want to encrypt 5\. Then *E*(5, 3) = (5 + 3) mod 100 =
    8\. To decrypt 8, we have *D*(8, 97) = (8 + 97) mod 100 = 105 mod 100 = 5.


    This example uses a very simple generation pair: (*x* + *y*) mod *c*. But, in
    practice, the pair-generation algorithm is much more complex and harder for attackers
    to break. After all, the complexity of the algorithm’s computation is what makes
    it hard to break.


    We can use a similar algorithm for digital signatures:


    *   *S*(*x*, *s*) signs a message *x* given a private key *s* (encryption).


    *   *V*(*x*′, *sig*, *p*) verifies a signed message *x*′, given signature sig
    and public key *p* (decryption).


    As we said earlier, each record will also include a special number (or a hash).
    This hash will be what is produced by *S*(*x*, *s*) (encryption), and it can be
    verified by using the verify function to confirm a record’s ownership (decryption).


    The wallet will contain a pair of public and private keys. These keys will be
    used to receive or send money. With the private key, it is possible to write new
    blocks (or transactions) to the blockchain, effectively spending money. With the
    public key, others can use it to send money to the wallet and verify signatures.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figi_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figi_HTML.gif)
    Exercise 1-1


    Come up with a table of functions such that:


    1.  The input is a number and the output is a number.


    2.  The input is a number and the output is the name of an employee in a company
    given that number.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figj_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figj_HTML.gif)**Exercise
    1-2**


    Check the three properties for a symmetric-key algorithm to ensure that the Caesar
    cipher is compatible with them.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figk_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figk_HTML.gif)**Exercise
    1-3**


    Come up with an encryption scheme, based on mathematical substitution.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figl_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figl_HTML.gif)**Exercise
    1-4**


    Use the asymmetric-key algorithm we defined to sign a message and verify it.


    **Hint**: This is similar to the encryption/decryption example that we showed.'
  trans: '

    ### 1.2.1 函数


    图 1-5 展示了函数的可视化表示。输入值进入函数，并产生一个输出值。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig5_HTML.jpg](img/510363_1_En_1_Fig5_HTML.jpg)


    图 1-5 — 一个函数


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figh_HTML.gif](img/510363_1_En_1_Figh_HTML.gif)
    定义 1-7


    **函数** 是将给定输入映射到唯一输出的数学实体。


    例如，你可能会有一个函数，它接受一个人作为输入，然后返回这个人的年龄或姓名作为输出。另一个例子是函数 `f(x) = x + 1`。这个函数可以接受许多输入：1、2
    和 3.14。例如，当我们输入 2 时，它给出的输出是 3，因为 `f(2) = 2 + 1 = 3`。


    理解函数的一个简单方法是将其视为表格。对于一个接受单个参数 *x* 的函数 `f(x)`，我们有一个两列的表格，第一列是输入，第二列是输出。对于一个接受两个参数
    *x* 和 *y* 的函数 `f(x, y)`，我们有一个三列的表格，其中第一列和第二列代表输入，第三列是输出。因此，将上面讨论的函数以表格形式展示出来，会是这样：


    | **x** | ***f*(*x*)** |

    | --- | --- |

    | 1 | 2 |

    | 2 | 3 |

    | … | … |


    ### 1.2.2 对称密钥算法


    我们可以假设存在函数 `E(x)` 和 `D(x)`，分别用于加密和解密。我们希望这些函数具有以下特性：


    *   `E(x) ≠ x`，这意味着加密后的值不应与原始值相同。

    *   `E(x) ≠ D(x)`，这意味着加密和解密函数会产生不同的值。

    *   `D(E(x)) = x`，这意味着加密值的解密应返回原始值。


    例如，假设存在某种加密方案，比如 `E("Boro") = 426f726f`。我们可以“安全地”传递值 `426f726f`，而不会暴露我们的原始值，并且只有知道解密方案
    `D(x)` 的人才能看到 `D(426f726f) = "Boro"`。


    加密方案的另一个例子是让 `E(x)` 将 *x* 中的每个字符向后移动，而 `D(x)` 则将 *x* 中的每个字符向前移动。这种方案被称为*凯撒密码*。要加密文本
    `"abc"`，我们有 `E("abc") = "bcd"`，要解密它，我们有 `D("bcd") = "abc"`。


    然而，这种方案构成了一个*对称算法*，如图 1-6 所示，这意味着我们必须与相关方共享函数 `E` 和 `D`。这使得它容易受到攻击。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig6_HTML.jpg](img/510363_1_En_1_Fig6_HTML.jpg)


    图 1-6 — 对称密钥算法


    ### 1.2.3 非对称密钥算法


    为了解决对称密钥算法带来的问题，我们将使用所谓的*非对称算法*或*公钥密码学*（图 1-7）。在这种方案中，我们有两种密钥：公钥和私钥。我们将公钥分享给世界，并将私钥留给自己。


    该算法方案有一个巧妙的特性：只有私钥可以解密消息，只有公钥可以加密消息。


    我们有两个函数，它们应具有与对称密钥算法相同的特性：


    *   `E(x, p)` 使用公钥 *p* 加密消息 *x*。

    *   `D(x'', s)` 使用私钥 *s* 解密已加密的消息 *x''*。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fig7_HTML.jpg](img/510363_1_En_1_Fig7_HTML.jpg)


    图 1-7 — 非对称密钥算法


    在我们的例子中，我们将依赖模运算。回忆一下高中知识，*a* mod *b* 表示 *a* 除以 *b* 的余数。例如，`4 mod 2 = 0`，因为 4
    除以 2 没有余数，而 `5 mod 2 = 1`。


    以下是一个基于加法和模运算的基本加密算法的例子：


    1.  选择一个随机数，例如 100。这代表一个公共的可公开密钥。

    2.  在 (1, 100) 范围内再选一个随机数，例如 97。这将代表私钥 *s*。

    3.  公钥 *p* 通过从公共密钥中减去私钥得到：`100 - 97 = 3`。

    4.  要加密数据，将其加上公钥，然后取模 100。`E(x, p) = (x + p) mod 100`。

    5.  要解密数据，我们使用相同的逻辑，但使用我们的私钥，所以 `D(x'', s) = (x'' + s) mod 100`。


    例如，假设我们要加密 5。那么 `E(5, 3) = (5 + 3) mod 100 = 8`。要解密 8，我们有 `D(8, 97) = (8 + 97)
    mod 100 = 105 mod 100 = 5`。


    这个例子使用了一个非常简单的生成对：`(x + y) mod c`。但实际上，密钥对的生成算法要复杂得多，攻击者也更难破解。毕竟，算法计算的复杂性才是使其难以被攻破的关键。


    我们可以使用类似的算法进行数字签名：


    *   `S(x, s)` 使用私钥 *s* 对消息 *x* 进行签名（加密）。

    *   `V(x'', sig, p)` 使用签名 `sig` 和公钥 *p* 验证已签名的消息 *x''*（解密）。


    正如我们之前所说，每条记录还将包含一个特殊的数字（或哈希）。这个哈希就是由 `S(x, s)`（加密）产生的，并且可以通过使用验证函数来确认记录的所有权（解密）。


    钱包将包含一对公私钥。这些密钥将用于收款或发送货币。使用私钥，可以向区块链写入新的区块（或交易），从而有效地花费货币。使用公钥，其他人可以将其用于向该钱包发送货币并验证签名。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figi_HTML.gif](img/510363_1_En_1_Figi_HTML.gif)
    练习 1-1


    设计一个函数表，使其满足：


    1.  输入是一个数字，输出是一个数字。

    2.  输入是一个数字，输出是该数字对应的公司员工姓名。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figj_HTML.gif](img/510363_1_En_1_Figj_HTML.gif)
    **练习 1-2**


    检查对称密钥算法的三个属性，以确保凯撒密码与它们兼容。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figk_HTML.gif](img/510363_1_En_1_Figk_HTML.gif)
    **练习 1-3**


    基于数学替换，设计一个加密方案。


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figl_HTML.gif](img/510363_1_En_1_Figl_HTML.gif)
    **练习 1-4**


    使用我们定义的非对称密钥算法来签名一条消息并验证它。


    **提示**：这类似于我们展示的加密/解密示例。

    '
- fmt: '## 1.3 Hashing


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figm_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figm_HTML.gif)


    **Definition 1-8**


    `Hashing` is a one-way function in that it encodes text without a way to retrieve
    the original value.


    Hashing is simpler than the previously described encryption schemes. One example
    of a hashing function is to return the length of characters - `H`("abc") = 3,
    but also `H`("bcd") = 3. This means that we don’t have a way to retrieve the original
    value other than by using the return value 3.


    As we mentioned earlier, the reason to use such a technique is that it has some
    interesting properties, such as providing us with proof of work.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Fign_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Fign_HTML.gif)


    **Definition 1-9**


    `Mining` is the process of validating transactions. For this effort, successful
    miners obtain money as a reward.


    `Hashcash` is one kind of a proof of work system.^([³](#fn3)) We will use it to
    implement mining. We will see how this algorithm works in detail in the later
    chapters, when we implement it.


    Hashing functions have another useful property that allows us to connect two or
    more distinct blocks by having the information about the current block’s hash
    (`current-hash`) and the previous block’s hash (`previous-hash`) in each block.
    For example, `block-1` may have a hash such as 123456 and `block-2` may have a
    hash such as 345678. Now, `block-2`’s `previous-hash` will be `block-1`’s `current-hash`,
    that is, 123456. Here, we linked these two blocks, effectively creating a linked
    list of blocks containing ledgers with transactions. This linking is depicted
    in Figure [1-4](#510363_1_En_1_Chapter.xhtml#Fig4).


    The hash of the block is based on the block’s data itself, so to verify a hash,
    we can just hash the block’s data and compare it to `current-hash`.


    Two or more blocks (or transactions) that are connected form a blockchain. The
    validity of the blockchain will depend on the validity of each transaction.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figo_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figo_HTML.gif)


    **Exercise 1-5**


    Come up with your own hashing function.


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figp_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figp_HTML.gif)


    **Exercise 1-6**


    How can the linked list depicted in Figure [1-4](#510363_1_En_1_Chapter.xhtml#Fig4)
    be traversed? What are the implications of this property?


    ## 1.4 Smart Contracts


    ![../images/510363_1_En_1_Chapter/510363_1_En_1_Figq_HTML.gif](images/510363_1_En_1_Chapter/510363_1_En_1_Figq_HTML.gif)


    **Definition 1-10**


    A `smart contract` is a self-executing contract in which the conditions of an
    agreement between a buyer and a seller are directly expressed by lines of code.


    A blockchain is programmable if the transaction conditions themselves can be programmed
    by users. For example, users (not necessarily programmers) can write a script
    to add requirements that must be satisfied before sending money. It could look
    something like this:


    ```

    1   if (user has more than 10 money)

    2      then approve transaction

    3      else reject transaction

    ```


    Smart contracts are implemented as a computation that takes place on the blockchain.
    We will implement a very basic functionality of smart contracts in the later chapters.


    ## 1.5 Bitcoin


    Bitcoin was the world’s first implementation of a blockchain. In November 2008,
    a paper authored by Satoshi Nakamoto, entitled “Bitcoin: A Peer-to-Peer Electronic
    Cash System,” was published on a cryptography mailing list. Bitcoin’s whitepaper
    is nine pages, however, it is a mostly theoretical explanation of the design,
    and as such may be a bit overwhelming to newcomers.


    The Bitcoin software is open-source code and was released in January 2009 on SourceForge.
    The design of a Bitcoin includes a decentralized network (peer-to-peer network),
    block (`mining`), blockchain, transactions, and wallets, each of which we will
    look at in detail in this book.


    Although there are many blockchain models and each differs in implementation details,
    the blockchain we will be building upon in this book will look pretty similar
    to Bitcoin, with some parts simplified.


    ## 1.6 Example Workflows


    We will list a few important workflows that our system will use, among others.


    *Mining a block* creates a new block, using `Hashcash` to calculate the `current-hash`
    of the block. It also contains `previous-hash`, which is a link to the previous
    block in the blockchain.


    *Checking a wallet balance* for person A will first filter all blocks in the blockchain
    (sender = A or receiver = A) and then sum them to calculate the balance. The more
    our blockchain grows, the longer this operation will take. For that purpose, we
    will use the unspent transaction outputs (UTXO) model. This model is a list of
    transactions containing information about the owner and the amount of money. Thus,
    every transaction will consume elements from this list.


    *Adding a block to a blockchain* consists of sending money from A to B. One prerequisite
    is that A has enough money. We check this using the wallet balance workflow. We
    proceed by creating a transaction (sender = A, receiver = B) and signing it. Then
    we mine a block using this transaction and update the UTXO with the rewards.


    ## 1.7 Summary


    The point of this chapter is to provide a vague idea of how the system that we
    will implement looks. Things will become much clearer in the implementation chapter
    (Chapter [3](#510363_1_En_3_Chapter.xhtml)), where we have to be explicit about
    the definitions of every component.


    Here’s briefly what we learned in this chapter:


    *   The core component of the system is a block.

    *   A block contains (among other data) transactions.

    *   We have a ledger that is an ordered list of all valid blocks (a blockchain).

    *   Every peer involved with the ledger has a wallet.

    *   Every record in the ledger is signed by the owner and can be verified by the
    public (digital signatures).

    *   The ledger is in a decentralized location, that is, everybody has a copy of
    it.

    *   Trust is based on proof of work (mining).


    Footnotes [1](#510363_1_En_1_Chapter.xhtml#Fn1_source) [2](#510363_1_En_1_Chapter.xhtml#Fn2_source)
    [3](#510363_1_En_1_Chapter.xhtml#Fn3_source)


    # 2. Racket Programming Language


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figa_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Figa_HTML.jpg)


    *Structure, by D. Bozhinovski*


    Now that we have vaguely explained what a blockchain is and how it is useful,
    the next obvious step is to implement these calculations in a computer, so that
    they are automatically performed. In this chapter, we introduce a tool that will
    allow us to implement these calculations exactly.'
