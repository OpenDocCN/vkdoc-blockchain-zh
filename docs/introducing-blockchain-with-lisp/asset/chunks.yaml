    <package_name>` 来安装包。我们将在后续内容中利用这些包。


    为了从包中导出对象（变量、过程等），我们使用 `provide` 语法。例如，让我们创建几个过程，然后将其定义保存到一个名为 `utils.rkt` 的文件中，方法是通过顶部菜单选择
    `File > Save Definitions`。


    ```

    1   (define (sum-list l) (foldl + 0 l))

    2   (define (add-one x) (+ x 1))


