    you will be using.


    ### 4.2.1 The peer-to-peer.rkt File


    To start, we will add dependencies for the block implementation and rely on serialization
    to send data to other peers:


    ```

    1   (require "blockchain.rkt")

    2   (require "block.rkt")

    3   (require racket/serialize)

    ```


    #### 4.2.1.1 Peer Context Structure


    We will implement structures that hold information about the peers so that we
    have a reference to send data to the correct destinations. The `peer-info` structure
    contains an IP address and a port of a peer. Think of an IP address and a port
