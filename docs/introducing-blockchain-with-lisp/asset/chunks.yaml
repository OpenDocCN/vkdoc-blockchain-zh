- fmt: '### Dotted Pairs


    Another built-in function is `cons`, which stands for *construct*. This function
    accepts only two arguments, and as a result, it returns a (quoted) pair:


    ```

    1   > (cons 1 2)

    2   ''(1 . 2)

    ```


    Think of `''(1 . 2)` as a sequence of two numbers: 1 and 2.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig6_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    The (`cons ''some-value ''nil) pair`


    There are two other built-in functions, called `car` and `cdr`, which are used
    to retrieve the first and the second element of a pair, respectively:


    ```

    1   > (car (cons 1 2))

    2   1

    3   > (cdr (cons 1 2))

    4   2

    5   > (car ''(1 . 2))

    6   1

    7   > (cdr ''(1 . 2))

    8   2

    ```


    Note how we used function composition here, namely, we “composed” `car` and `cons`
    in the first example, and `cdr` and `cons` in the second example.


    Pairs are so important that we can encode any data structure with them. In fact,
    lists are a special kind of pair, where `(list 1 2 3)` is equal to `(cons 1 (cons
    2 (cons 3 ''())))`. See Figure [2-7](#510363_1_En_2_Chapter.xhtml#Fig7).


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig7_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    An example of a list


    The motivation for using a list is that it will allow us, for example, to link
    several blocks together to make a blockchain.


    Racket also supports sets. In a list/pair there can be repeated elements, but
    in a set all elements are unique. Additionally, there are operations that we can
    use on sets, such as union (merges two sets), subtraction (removes the elements
    in set 1 that are found in set 2), and so on.


    For example, consider the following code where the built-in functions `list->set`,
    `set-union`, and `set-subtract` are used:


    ```

    1   > (list->set ''(1 2 3 4 4))

    2   (set 1 3 2 4)

    3   > ''(1 2 3 4 4)

    4   ''(1 2 3 4 4)

    5   > (set-union (list->set ''(1 2 3)) (list->set ''(3 4 5)))

    6   (set 1 5 3 2 4)

    7   > (set-subtract (list->set ''(1 2 3)) (list->set ''(3 4 5)))

    8   (set 1 2)

    ```


    We notice how in Lisp, depending only on a few primitive notions (function calls,
    pairs, and quote), we can capture abstraction. We will talk more about this in
    Section 2.3.13.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figm_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figm_HTML.gif)
    Exercise 2-6


    Represent the same list you created in Exercise 2-4 using `cons`.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fign_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Fign_HTML.gif)
    Exercise 2-7


    Use a combination of `car` and `cdr` for the list in Exercise 2-6 to get the second
    element in the list.


    ### Adding Definitions


    So far we’ve worked only with the interactions area in DrRacket. Let’s try to
    do something useful with the definitions area.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig8_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Adding definitions in DrRacket


    We can notice a couple of things in the screenshot in Figure [2-8](#510363_1_En_2_Chapter.xhtml#Fig8):


    *   In the definitions area, we added some code. We notice that we used another
    built-in syntax named `define` to attach a value (`123`) to a symbol/variable
    (`a-number`).


    *   In the interactions area, we interacted with something that was already defined
    in the definitions area. In this case, the interaction was to just display the
    definition’s value by referring to its symbol.


    In this book, every Racket program will start with `#lang racket`. This means
    that we will be dealing with Racket’s ordinary syntax. There are different values
    this can accept; for example, we can work with a language specialized in drawing
    graphics, but that is out of context for this book.


    Everything that we write in the definitions area we can also write in the interactions
    area and vice versa. To have the definitions available in the interactions area,
    we need to run the program by choosing `Racket > Run` from the top menu. Note
    that when we run a program, the interactions area gets cleared.


    If our definitions have references to other definitions, we can hover over the
    symbol’s name using the mouse and DrRacket will draw a line pointing to the definition
    of that reference (Figure [2-9](#510363_1_En_2_Chapter.xhtml#Fig9)). For big and
    complex programs, this will be useful for uncovering details of a function.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig9_HTML.jpg](images/510363_1_En_2_Chapter/510363_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Following references in DrRacket


    Definitions can be saved to a file for later usage by choosing `File > Save Definitions`
    from the top menu.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figo_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figo_HTML.gif)
    Exercise 2-8


    Store the list from Exercise 2-7 in the definitions area and then use `car` and
    `cdr` on that list in the interactions area.


    ### Procedures and Functions


    In Lisp, a procedure is essentially a mathematical function. When called, it returns
    some data. However, unlike mathematical functions, some Lisp expressions and procedures
    have side effects.


    For example, consider two functions: `add-1` increases a number by one and `get-current-weather`
    gets the current weather from an external service. The first function will always
    return the same value at any point in time, whereas the second “function” can
    return different values at different points in time.


    Thus Lisp procedures are not always functions in the “pure” sense of mathematics,
    but in practice, they are frequently referred to as “functions” anyway (even those
    that may have side effects), to emphasize that a computed result is always returned.


    Given the reasoning in the previous paragraph, from this point, we will refrain
    from using the word “function” and stick with “procedure.”


    There is special built-in syntax called `lambda`, which accepts two arguments
    and produces a procedure as a result. The first argument is a list of arguments
    that the procedure will accept, and the second argument is an expression (body)
    that acts on the arguments from the list.


    For example, `(lambda (x) (+ x 1))` returns a procedure that accepts a single
    argument `x`, such that when this procedure is called with an argument, it increases
    this argument’s value by one: `(+ x 1)`.


    Evaluating this expression gives us:


    ```

    1   > (lambda (x) (+ x 1))

    2   #

    ```


    In order to call the procedure, we can try to pass an argument:


    ```

    1   > ((lambda (x) (+ x 1)) 1)

    2   2

    ```


    Of course, writing and evaluating procedures this way is hard. Instead, we can
    define the procedure in the definitions area and then interact with it in the
    interactions area:


    ```

    1   (define add-one (lambda (x) (+ x 1)))

    ```


    Interaction:


    ```

    1   > (add-one 1)

    2   2

    3   > (add-one 2)

    4   3

    5   > (add-one (add-one 1))

    6   3

    ```


    To make things a little bit easier, Racket has special syntax for defining procedures,
    so these two are equivalent:


    ```

    (define add-one (lambda (x) (+ x 1)))  (define (add-one x) (+ x 1))

    ```


    Procedures can also take more than one argument:


    ```

    (define add (lambda (x y) (+ x y)))  (define (add x y) (+ x y))

    ```


