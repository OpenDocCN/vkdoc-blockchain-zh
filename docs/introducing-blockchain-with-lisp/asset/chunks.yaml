    ## 4.2 Peer-to-Peer Implementation


    In Section 3.6.2, we used DrRacket to execute the blockchain implementation. That’s
    okay for testing purposes. However, if we wanted to share that implementation
    with other users and ask them to execute it, it will be kind of inconvenient because
    there’s no way to share data between different users.


