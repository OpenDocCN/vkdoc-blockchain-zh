  raw: '### 2.3.8 Procedures That Return Procedures


    We can construct procedures that return other procedures as a result. For example:


    ```

    1   > (define (f x) (lambda (y) (+ x y)))

    2   > f

    3   #

    4   > (f 1)

    5   #

    6   > ((f 1) 2)

    7   3

    ```


    Note the new syntax on line 3\. It states that the return value of the expression
    on the previous line is a procedure named `f`. However, on line 4, when we execute
    `(f 1)`, we get an unnamed procedure. That is because lambdas are anonymous functions
    without a name.


    This concept is so powerful that we can implement our own `cons`, `car`, and `cdr`:


    ```

    1   (define (my-cons x y) (lambda (z) (if (= z 1) x y)))

    2   (define (my-car z) (z 1))

    3   (define (my-cdr z) (z 2))

    ```


    Evaluating:


    ```

    1   > (my-cons 1 2)

    2   #

    3   > (my-car (my-cons 1 2))

    4   1

    5   > (my-cdr (my-cons 1 2))

    6   2

    ```


    Note how we define `my-cons` to return another procedure that accepts an argument
    `z`, and then based on that argument’s value, we return either the first or the
    second element.


    Using the substitution method, `(my-cons 1 2)` evaluates to `(lambda (z) (if (=
    z1 2))`. So, this lambda (procedure) “captures” data in a sense. Then, when we
    call `my-car` or `my-cdr` on this procedure, we just pass 1 or 2 to get the first
    or the second value, respectively.


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figu_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figu_HTML.gif)
    Exercise 2-13


    Implement a procedure so that when it’s evaluated, it returns a procedure that
    returns a constant number.


    **Hint**: `(lambda () 1)` is a procedure that accepts no arguments and returns
    a constant number.


    ### 2.3.9 General Higher-Order Procedures


    With the example above, we’ve seen how Racket can return procedures as return
    values (output). However, it can also accept procedures as arguments (input).


    ![../images/510363_1_En_2_Chapter/510363_1_En_2_Figv_HTML.gif](images/510363_1_En_2_Chapter/510363_1_En_2_Figv_HTML.gif)
    Definition 2-8


    A **higher-order procedure** takes one or more procedures as arguments or returns
    a procedure as a result.


    There are three common built-in higher-order procedures: `map`, `filter` and `fold`.


    For the purpose of this example, we will rely on these definitions:


    ```

    1   (define my-test-list ''(1 2 3))

    2   (define (add-one x) (+ x 1))

    3   (define (gt-1 x) (> x 1))

    ```


    `map` takes as input a procedure with a single argument and a list, and it returns
    a list where all members of the list have this procedure applied to them:


    ```

    1   > (map (lambda (x) (+ x 1)) my-test-list)

    2   ''(2 3 4)

    3   > (map  add-one  my-test-list)

    4   ''(2 3 4)

    ```


    If we use substitution on (`map add-one my-test-list`), we get `(list (add-one
    1) (add-one 2) (add-one 3))`. However, it is best to implement these procedures
    ourselves to understand how they work. `map` takes a transformation procedure
    `f`, together with a list `l`. We have two cases to cover:


    *   For the empty list, we just return the empty list.


    *   Otherwise, we extract the first element, apply the transformation procedure,
    and reconstruct the list by recursively mapping the remainder of the elements.


    ```

    1   (define (my-map f l)

    2     (cond ((eq? l ''()) ''())

    3           (else (cons (f (car l)) (my-map f (cdr l))))))

    ```


    Another higher-order procedure, `filter`, takes as input a predicate with a single
    argument and a list, and it only returns those members in the list whose predicate
    evaluates to true :


    ```

    1   > (filter gt-1 my-test-list)

    2   ''(2 3)

    ```


    To reimplement `filter`, note that it takes a predicate `p`, together with a list
    `l`. There are three cases:


    *   For the empty list, just as before, we just return the empty list.


    *   Otherwise, if a predicate matches the current element, we include it in the
    generation of the new list, recursively filtering the remainder of the elements.


    *   Otherwise, we recursively filter the remainder of the elements, skipping the
    addition of the current one to the list.


    ```

    1   (define (my-filter p l)

    2     (cond ((eq? l ''()) ''())

    3           ((p (car l)) (cons (car l) (my-filter p (cdr l))))

    4           (else (my-filter p (cdr l)))))

    ```


    Finally, `fold` takes as input a combining procedure that accepts two arguments
    (the current value and accumulator), an initial value, and a list. `fold` then
    returns a value combined with this procedure. There are two types of folds, a
    right and a left one, which combine from the right and the left respectively :


    ```

    1   > (foldr cons ''() ''(1 2 3))

    2   ''(1 2 3)

    3   > (foldl cons ''() ''(1 2 3))

    4   ''(3 2 1)

    ```


    `foldr` takes a combining operator (procedure) `op`, together with an initial
    value `i` and list `l`. The two cases we need to cover are as follows:


    *   For the empty list, we return the initial value.


    *   Otherwise, we use the combining operator to the current element, applied to
    the folded remainder of the list.


    ```

    1   (define (my-foldr op i l)

    2     (cond ((eq? ''() l) i)

    3           (else (op (car l)

    4                     (my-foldr op i (cdr l))))))

    ```


    `foldl` is a bit different. We start by defining a procedure that has two cases:


    *   For the empty list, we return the initial value.


    *   Otherwise, we call the fold again, changing the initial value to be combined
    with the current element and the remainder of the list.


    ```

    1   (define (my-foldl op i l)

    2     (cond ((eq? ''() l) i)

    3           (else (my-foldl op (op (car l) i) (cdr l)))))

    ```


    This procedure works in a similar way to `foldr`, except that the result is captured
    in the procedure’s argument. For example, here’s how it unfolds for `(my-foldl
    + 0 ''(1 2 3))`:


    ```

    1   (my-foldl + 0 ''(1 2 3))

    2   = (my-foldl + 1 ''(2 3))

    3   = (my-foldl + 3 ''(3))

    4   = (my-foldl + 6 ''())

    5   = 6

    ```


    Note that the right fold exhibits a recursive process (think `my-length`), while
    the left one exhibits an iterative process (think `my-length-iter`).


