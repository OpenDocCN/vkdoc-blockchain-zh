- fmt: '### 3.5.3 Adding a Transaction


    The next procedure will add a transaction to the blockchain. It should:


    1. Mine a block.

    2. Create a new `UTXO` based on the processed transaction outputs, inputs, and
    the current `UTXO`.

    3. Generate a new list of blocks by adding the newly mined block.

    4. Calculate the rewards based on the current `UTXO`.


    Additionally, `UTXO` will be treated as a set so that we can easily remove specific
    inputs and append new transactions using set operations.


    ```

    1   (define (add-transaction-to-blockchain b t)

    2     (letrec ([hashed-blockchain

    3               (mine-block t

    4                (block-current-hash (car (blockchain-blocks b))))]

    5              [processed-inputs (transaction-inputs t)]

    6              [processed-outputs (transaction-outputs t)]

    7              [utxo (set-union processed-outputs

    8                               (set-subtract (blockchain-utxo b)

    9                                             processed-inputs))]

    10              [new-blocks (cons hashed-blockchain (blockchain-blocks b))]

    11              [utxo-rewarded (cons

    12                              (make-transaction-io

    13                               (mining-reward-factor new-blocks)

    14                               (transaction-from t))

    15                              utxo)])

    16        (blockchain

    17         new-blocks

    18         utxo-rewarded)))

    ```


    There is another thing about `add-transaction-to-blockchain`: given a blockchain
    and a transaction, it returns a new, updated blockchain. This newly returned blockchain
    will be the latest that should be used, since the previous one will not contain
    this new transaction. This way, we avoid mutating the previous blockchain.


    Next, we will create a procedure that will determine the balance of a wallet—the
    sum of all unspent transactions for the matching owner:


    ```

    1   (define (balance-wallet-blockchain  b  w)

    2     (letrec ([utxo (blockchain-utxo b)]

    3              [my-ts (filter

    4                      (lambda (t) (equal? w (transaction-io-owner t)))

    5                      utxo)])

    6       (foldr + 0 (map (lambda (t) (transaction-io-value t)) my-ts))))

    ```


    We will also need a procedure that will send money from one wallet to another
    by initiating a transaction and then adding it to the blockchain for processing.
    `my-ts` will contain the current receiver’s transaction inputs. Finally, we add
    the transaction to the blockchain only if it is valid.


    ```

    1   (define (send-money-blockchain b from to value)

    2     (letrec ([my-ts

    3               (filter (lambda (t) (equal? from (transaction-io-owner t)))

    4                       (blockchain-utxo b))]

    5               [t (make-transaction from to value my-ts)])

    6       (if (transaction? t)

    7           (let ([processed-transaction (process-transaction t)])

    8             (if (and

    9                  (>= (balance-wallet-blockchain b from) value)

    10                  (valid-transaction? processed-transaction))

    11                 (add-transaction-to-blockchain b processed-transaction)

    12                 b))

    13           (add-transaction-to-blockchain b ''()))))

    ```


    ### 3.5.4 Verification


    We will now introduce a procedure that determines blockchain validity under the
    following conditions:


    - All blocks are valid using `valid-block?`.

    - Previous hashes are matching using the `equal?` check by comparing the previous
    hash of all blocks (except the last) to the current hash of all blocks (except
    the first).

    - All transactions are valid using `valid-transaction?`.

    - All blocks are mined using `mined-block?`.


    ```

    1   (define (valid-blockchain? b)

    2     (let ([blocks (blockchain-blocks b)])

    3       (and

    4        (true-for-all? valid-block? blocks)

    5        (equal? (drop-right (map block-previous-hash blocks) 1)

    6                (cdr (map block-current-hash blocks)))

    7        (true-for-all?

    8         valid-transaction? (map

    9                            (lambda (block) (block-transaction block))

    10                            blocks))

    11         (true-for-all?

    12         mined-block? (map block-current-hash blocks)))))

    ```


    Finally, we export everything:


    ```

    1   (provide (all-from-out "block.rkt")

    2            (all-from-out "transaction.rkt")

    3            (all-from-out "wallet.rkt")

    4            (struct-out blockchain)

    5            init-blockchain send-money-blockchain

    6            balance-wallet-blockchain valid-blockchain?)

    ```


    We now have all the necessary components: managing wallets, blocks, transactions,
    and finally the blockchain.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Fign_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Fign_HTML.gif)
    Exercise 3-9


    Create two sets and use `set-subtract`, `set-union`, and `set-intersect` on them.
    Observe the results.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figo_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figo_HTML.gif)
    Exercise 3-10


    Initialize a blockchain with `init-blockchain` and add a transaction to it using
    `add-transaction-to-blockchain`.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figp_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figp_HTML.gif)
    Exercise 3-11


    Use `valid-blockchain?` on the blockchain in the previous exercise (do this before
    adding the new transaction, and again after adding the new transaction).


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figq_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figq_HTML.gif)
    Exercise 3-12


    Make a transfer in a blockchain using `send-money-blockchain`.


    ## 3.6 Integrating Components


    In this section, we will combine all the various parts into a single point and
    show how they can be easily used.'
