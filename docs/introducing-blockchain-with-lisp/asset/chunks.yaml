    ### 3.4.2 The transaction.rkt File


    This file will contain procedures for signing and verifying transactions. It will
    also use transaction inputs and outputs and store them in a single transaction.


    Here’s everything that we will need to `require`:


    ```

    1   (require "transaction-io.rkt")

    2   (require "utils.rkt")

    3   (require (only-in file/sha1 hex-string->bytes))

    4   (require "wallet.rkt")

    5   (require crypto)

    6   (require crypto/all)

    7   (require racket/serialize)

    ```


    A transaction contains a signature, sender, receiver, value, and a list of inputs
    and outputs (`transaction-io` objects).


    ```

    1   (struct transaction

    2     (signature from to value inputs outputs)

    3     #:prefab)

    ```


