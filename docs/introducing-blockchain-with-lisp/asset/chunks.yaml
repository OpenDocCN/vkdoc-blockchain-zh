    Peer-to-peer architecture


    Every peer node (user connected to the system) list will consist of the following:


    *   *Peer context data* *:* Information such as relations with other peers, list
    of connected peers, and so on.


    *   *Generic handler:* Transforms the peer context data.


    Further, there will be two ways to establish communication with other peers:


    *   A peer will accept new connections from other peers.


    *   A peer will try to connect/make new connections to other peers.


    Whenever a connection is established, peers will communicate with each other through
    the generic handler, parsing and evaluating commands such as syncing/updating
    the blockchain, updating the list of peers, and so on.


    Consider this example scenario: Assume there are three peers—Peer 1, Peer 2, and
    Peer 3\. Peer 1 and Peer 2 are online, and Peer 3 is offline at the moment. Peer
    1 has the following list of valid peers: (Peer 1, Peer 2, Peer 3). Peer 2’s list
    of peers is empty. According to the diagram, Peer 1 will accept new connections
    and try to connect to peers. So, Peer 1 will try to connect to Peer 2\. This connection
    will be successful, and the next step is for Peer 1 to send some data to Peer
    2 (e.g., the list of valid peers).


    Peer 2’s list of peers was empty, but now it will be merged with Peer 1, so it
    will become (Peer 1, Peer 2, Peer 3). Peer 1 and Peer 2 are connected to each
    other, and they will keep trying to connect to Peer 3. Once Peer 3 becomes available,
    the same algorithm will be executed and Peer 3 will join the network.


    With this approach, the goal is to build a system similar to the high-level description
    shown in Figures [1-1](#510363_1_En_4_Chapter.xhtml#Fig1) and [1-3](#510363_1_En_1_Chapter.xhtml#Fig3)
    (Chapter [1](#510363_1_En_1_Chapter.xhtml)).


    Building communication systems of this type is naturally complex. It is suggested
