    to one. This procedure is dual to `peers/serve`, and `tcp-connect` is dual to
    `tcp-accept`. We use `sleep` to wait for a few seconds before processing again
    in order to make the process more performant.


    ```

    1   (define (peers/connect peer-context)

    2     (define main-cust (make-custodian))

    3     (parameterize ([current-custodian main-cust])

    4       (define (loop)

    5         (let ([potential-peers (get-potential-peers peer-context)])

    6           (for ([peer potential-peers])

    7             (with-handlers ([exn:fail? (lambda (x) #t)])

    8               (connect-and-handle peer-context peer))))

    9         (sleep 10)

    10         (loop))

    11       (thread loop))

    12     (lambda ()

    13       (custodian-shutdown-all main-cust)))

    ```


    To implement `get-potential-peers`, we first get the list of connected and valid
