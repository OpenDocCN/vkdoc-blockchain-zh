- fmt: '### 3.3 The `utils.rkt` File


    This file will contain common procedures that will be used by other components.


    A procedure that we will use often is `true-for-all?`. It returns true if a predicate
    satisfies all members of the list, and false otherwise:


    ```

    1   (define (true-for-all? pred list)

    2     (cond

    3       [(empty? list) #t]

    4       [(pred (car list)) (true-for-all? pred (cdr list))]

    5       [else #f]))

    ```


    Here’s an example how we can use it:


    ```

    1   > (true-for-all? (lambda (x) (> x 3)) ''(1 2 3))

    2   #f

    3   > (true-for-all? (lambda (x) (> x 3)) ''(4 5 6))

    4   #t

    ```


    Next, we’ll have a need for a procedure to export a `struct` into a file:


    ```

    1   (define (struct->file object file)

    2     (let ([out (open-output-file file #:exists ''replace)])

    3       (write (serialize object) out)

    4       (close-output-port out)))

    ```


    `open-output-file` returns an object in memory, which we can then write to using
    `write`. When we do that, it will write to the opened file. `close-output-port`
    closes this object in memory. This procedure will serialize a `struct` and then
    will write the serialized contents to a file.


    The following procedure is the opposite of `struct->file`: given a file, it will
    return a `struct` by opening the file, reading its contents, and deserializing
    its contents.


    ```

    1   (define (file->struct file)

    2     (letrec ([in (open-input-file file)]

    3              [result (read in)])

    4       (close-input-port in)

    5       (deserialize result)))

    ```


    A few notes here:


    - `read` will read and return data from `in` (the opposite of `write`).

    - `open-input-file` is similar to `open-output-file`, except that it is used to
    read from a file using `read`.

    - `deserialize` is the opposite of `serialize`.


    We provide these procedures:


    ```

    1   (provide true-for-all? struct->file file->struct)

    ```


    And make sure we require all the necessary packages:


    ```

    1   (require racket/serialize)

    ```


    Now we have a way to write our blockchain data into the filesystem (and read it
    from the filesystem). This way, our blockchain data can persist.


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figk_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figk_HTML.gif)
    Exercise 3-7


    Use `struct->file` on some block to store it in a file. Then, use `file->struct`
    on that same file. Did you get the same block? Next, use a text editor to open
    the file you created. What do the file contents look like?


    ### 3.4 Transactions


    In this section, we will implement the procedures for signing and verifying transactions,
    as depicted in Figure 1-2 (Chapter [1](#510363_1_En_1_Chapter.xhtml)).


    #### 3.4.1 The `transaction-io.rkt` File


    The `transaction` structure will consist of a `transaction-io` structure (transaction
    input/output). The transaction input will represent the blockchain address from
    which the money was sent, and the transaction output will represent the blockchain
    address to which the money was sent.


    This structure contains a hash so that we’re able to verify its validity. It also
    has a value, an owner, and a timestamp.


    ```

    1   (struct transaction-io

    2     (transaction-hash value owner timestamp)

    3     #:prefab)

    ```


    Similarly to a block, we will use the same code for creating a hash and also rely
    on serialization:


    ```

    1   (define (calculate-transaction-io-hash value owner timestamp)

    2     (bytes->hex-string  (sha256  (bytes-append

    3              (string->bytes/utf-8 (number->string value))

    4              (string->bytes/utf-8 (~a (serialize owner)))

    5              (string->bytes/utf-8  (number->string  timestamp))))))

    ```


    `make-transaction-io` is a helper procedure that will initialize `timestamp` as
    well:


    ```

    1   (define (make-transaction-io value owner)

    2     (let ([timestamp (current-milliseconds)])

    3       (transaction-io

    4        (calculate-transaction-io-hash value owner timestamp)

    5        value

    6        owner

    7        timestamp)))

    ```


    A `transaction-io` structure is valid if its hash is equal to the hash of the
    value, owner, and the timestamp:


    ```

    1   (define (valid-transaction-io? t-in)

    2     (equal? (transaction-io-transaction-hash t-in)

    3             (calculate-transaction-io-hash

    4              (transaction-io-value t-in)

    5              (transaction-io-owner t-in)

    6              (transaction-io-timestamp  t-in))))

    ```


    Here’s an example usage:


    ```

    1   > (make-transaction-io 123 "Some person")

    2   ''#s(transaction-io "df652a3c15feba2eb9071cfdd810130c971f7fe7494a4710ee62

    3   2fca11f0d83e" 123 "Some person" 1573765357289)

    4   > (valid-transaction-io? (transaction-io "df652a3c15feba2eb9071cfdd81013

    5   0c971f7fe7494a4710ee622fca11f0d83e" 123 "Some person" 1573765357289))

    6   #t

    7   > (valid-transaction-io? (transaction-io "badhash" 123 "Some person"

    8   1573765357289))

    9   #f

    ```


    Finally, we import the necessary packages and export the procedures:


    ```

    1   (require (only-in sha sha256))

    2   (require (only-in sha bytes->hex-string))

    3   (require racket/serialize)

    4

    5   (provide (struct-out transaction-io)

    6             make-transaction-io valid-transaction-io?)

    ```


    Now that we have a way to store transaction inputs/outputs, we can proceed with
    the actual transaction implementation.


    #### 3.4.2 The `transaction.rkt` File


    This file will contain procedures for signing and verifying transactions. It will
    also use transaction inputs and outputs and store them in a single transaction.


    Here’s everything that we will need to `require`:


    ```

    1   (require "transaction-io.rkt")

    2   (require "utils.rkt")

    3   (require (only-in file/sha1 hex-string->bytes))

    4   (require "wallet.rkt")

    5   (require crypto)

    6   (require crypto/all)

    7   (require racket/serialize)

    ```


    A transaction contains a signature, sender, receiver, value, and a list of inputs
    and outputs (`transaction-io` objects).


    ```

    1   (struct transaction

    2     (signature from to value inputs outputs)

    3     #:prefab)

    ```


    ![../images/510363_1_En_3_Chapter/510363_1_En_3_Figl_HTML.gif](images/510363_1_En_3_Chapter/510363_1_En_3_Figl_HTML.gif)


    **Definition 3-4**


    In Racket, a **crypto factory** consists of specific implementations of cryptographic
    algorithms.


    In addition to the code, we need to use all crypto factories. They will allow
    us to use some procedures, for example `hex<->pk-key`:


    ```

    1   (use-all-factories!)

    ```


    We will need a procedure that makes an empty, unsigned, and unprocessed (no input
    outputs) transaction. This procedure will be used later when we send money or
    create the first (genesis) transaction.


    ```

    1   (define (make-transaction from to value inputs)

    2     (transaction

    3      ""

    4      from

    5      to

    6      value

    7      inputs

    8      ''()))

    ```


    ##### 3.4.2.1 Digital Signatures


    Next, we need a procedure to sign a transaction. It is similar to the procedures
    we wrote earlier where we used hashing, in that we get all bytes from the structure
    and append them. The difference, in this case, is that we will be using digital
    signatures for signing and verifying data.


    To create a digital signature, we use a hashing procedure (in this case, it is
    using the SHA algorithm). The private key is then used to encrypt the produced
    hash. The encrypted hash will represent the digital signature.


    ```

    1   (define (sign-transaction from to value)

    2     (let ([privkey (wallet-private-key from)]

    3           [pubkey (wallet-public-key from)])

    4       (bytes->hex-string

    5        (digest/sign

    6         (datum->pk-key (hex-string->bytes privkey) ''PrivateKeyInfo)

    7         ''sha1

    8         (bytes-append

    9          (string->bytes/utf-8 (~a (serialize from)))

    10          (string->bytes/utf-8 (~a (serialize to)))

    11          (string->bytes/utf-8 (number->string value)))))))

    ```


    `digest/sign` is the procedure that does the hashing and encryption. It accepts
    a private key, an algorithm,^([⁷](#fn7)) and bytes, and it returns encrypted data.'
