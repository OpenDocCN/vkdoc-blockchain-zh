  ### 点对


  另一个内置函数是 `cons`，意为*构造*。该函数仅接受两个参数，并返回一个（引用的）对：


  ```

  1   > (cons 1 2)

  2   ''(1 . 2)

  ```


  可以将 `''(1 . 2)` 理解为包含两个数字（1 和 2）的序列。


  ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig6_HTML.jpg](img/510363_1_En_2_Fig6_HTML.jpg)


  图 2-6


  `(cons ''some-value ''nil)` 对


  另外两个名为 `car` 和 `cdr` 的内置函数分别用于获取对的第一个和第二个元素：


  ```

  1   > (car (cons 1 2))

  2   1

  3   > (cdr (cons 1 2))

  4   2

  5   > (car ''(1 . 2))

  6   1

  7   > (cdr ''(1 . 2))

  8   2

  ```


  注意我们在这里使用了函数组合，即在第一个例子中将 `car` 和 `cons`“组合”，在第二个例子中将 `cdr` 和 `cons`“组合”。


  点对非常重要，我们可以用它们来编码任何数据结构。事实上，列表是一种特殊的点对，其中 `(list 1 2 3)` 等价于 `(cons 1 (cons 2 (cons
  3 ''())))`。参见图 2-7。


  ![../images/510363_1_En_2_Chapter/510363_1_En_2_Fig7_HTML.jpg](img/510363_1_En_2_Fig7_HTML.jpg)


  图 2-7


  一个列表的示例


  使用列表的动机在于，它允许我们，例如，将多个区块链接在一起以构成区块链。


  Racket 也支持集合。在列表/点对中元素可以重复，但在集合中所有元素都是唯一的。此外，我们还可以对集合进行操作，例如并集（合并两个集合）、差集（移除在集合
  2 中也出现的集合 1 中的元素）等。


  例如，考虑以下使用了内置函数 `list->set`、`set-union` 和 `set-subtract` 的代码：


  ```

  1   > (list->set ''(1 2 3 4 4))

  2   (set 1 3 2 4)

  3   > ''(1 2 3 4 4)

  4   ''(1 2 3 4 4)

  5   > (set-union (list->set ''(1 2 3)) (list->set ''(3 4 5)))

  6   (set 1 5 3 2 4)

  7   > (set-subtract (list->set ''(1 2 3)) (list->set ''(3 4 5)))

  8   (set 1 2)

  ```


  我们注意到在 Lisp 中，仅依赖于少数几个原始概念（函数调用、点对和引号），就能实现抽象。我们将在第 2.3.13 节中进一步讨论这一点。


