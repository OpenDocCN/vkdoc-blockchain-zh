  ```\n\n## 3.7 小结\n\n我们一步步地逐个构建了每个组件。有些组件是*正交*的——它们彼此独立。例如，`钱包`的实现不会调用来自`区块`的任何过程，并且`区块`可以不依赖于`钱包`而独立使用。当我们将所有组件组合在一起时，就得到了一个区块链系统。\n\
