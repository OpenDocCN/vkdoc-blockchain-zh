    # 第三代区块链正在解决这些问题。区块链 3.0 项目引入了可扩展性、快速处理、更低费用、互操作性，以及当今世界极为重要的——更低的能耗。


    我们看到了新的应用场景，其中许多聚焦于将一切事物代币化的概念——从艺术品到房地产。


    第四代区块链融合了混合区块链和企业级区块链，以满足特定业务的需求，并提供可扩展性、许可访问和专门的共识机制。这一阶段预示着主流采用的前景，为 Web3 和元宇宙奠定基础，并推动工业
    4.0 的发展。我们将在后续章节中深入探讨这些主题。


    图 1-1 总结了区块链的演进及各阶段的主要发展。


    ![](img/542012_1_En_1_Fig1_HTML.jpg)


    一幅插图以太空飞船为背景解释了区块链的演进过程。从底部到顶部依次为：1.0 加密货币，2.0 智能合约，3.0 DAPP 和 NFT，4.0 Web 3.0
    和工业 3.0。


    图 1-1

    四代区块链（来源：作者）


    如你所见，区块链的演进历经数年。最初，它只是一种基于复杂密码学的传统货币替代方案，如今已成为一项基础性技术，能够赋能物联网或人工智能等其他能力。


    我知道这些信息量很大，所以在下一章中，我们将进行拆解，并涵盖所有重要方面——区块链的架构及其特性和特征。


    正如我在开头提到的，我的目标是创建一份关于区块链生态系统的简易指南。我想帮助你在这片星系中航行，因此我们会在一些乍看之下与你的业务领域并不直接相关的地方稍作停留，例如共识机制。共识机制定义了信任如何在区块链上建立。你需要了解细节吗？不需要。但当你与科技公司讨论基于区块链的项目时，我希望你能听懂他们在说什么。


    脚注 1 2 3 4


    # 2. 揭开区块链的神秘面纱


    人们常常声称区块链是一项非常复杂的技术，需要极其专业的技能。确实，区块链开发者和架构师必须掌握广泛的编程知识；理解所有协议、网络、安全和加密经济学；学习如何创建
    dApp 等等。正因如此，区块链开发者才是一份高薪工作。


    作为酒店业专业人士，你可以只关注区块链的业务层面。在大多数情况下，你将由外部合作伙伴提供技术解决方案。他们会介绍自己的方案，并抛出大量令人困惑的表述和术语。如果你决定推进项目，他们会要求你明确或签署业务需求。


    为了确保你对此有所准备，在本章中，我们将深入区块链宇宙的核心，审视其关键组成部分和基础模块。了解这项技术的工作原理，将为你提供理解其能力所需的知识。


    然而，更重要的是，本章的目标是引导你了解诸如共识机制或区块链网络类型等主题，并为你提供在做出关于区块链项目的战略商业决策时所需要的信息。


    ## 什么是区块链？


    区块链是一种在计算机网络中共享的分布式数据库。这意味着这个数据库可以同时在全球数万台计算机上被访问和存储。


    没有中央权力或权威机构控制区块链。它是一种基于参与者共识的点对点模型。区块链的架构建立在信任之上，无需像银行或政府这样的中介机构来授权交易。


    作为一种数据库，区块链以数字格式将信息电子化地存储在分布在全球各地的数十万台计算机上。如果你想象一个典型的数据库，它可能看起来像一个带有行和列的数据表格。


    区块链则不同——在这里，数据以被称为“区块”的组进行结构化。这些区块有一定的存储容量。当一个区块被填满后，它就会被关闭并链接到前一个区块，形成一条数据链，即区块链。区块一旦被填满，便成为定局。链中的每个区块在被添加到链上时都会被赋予一个精确的时间戳。所有新信息都会被编译到一个新形成的区块中，待其填满后也会被添加到链上。没有人可以删除或编辑区块中的交易；它是防篡改的。交易的数据和历史是不可逆且透明的。


    每个区块都包含一个基于其前一个区块的唯一识别码——所谓的“哈希”——以增强数据追踪的准确性并确保数据安全。当有人想要更改区块中的交易或数据时，这就会改变该区块的哈希码，以及所有随后创建的区块（包括链中的最后一个区块）的哈希码。


    现在，由于网络中的每个人都拥有该区块链的副本，因此很容易检测到谁在未经整个点对点群体同意的情况下更改了它，并将其废弃。数据经过加密，因此只有记录的所有者才能解密以揭示其身份。这意味着区块链的用户可以在保持透明的同时保持匿名。


    ## 区块


    现在让我们更深入地探讨区块链的工作原理。简而言之，每当用户发起一笔交易（例如加密货币转账）时，就会创建一个区块来存储它。数据经过密码学保护，并与账本中的前一个区块相链接。该块在网络中广播，网络节点（计算机）对其进行验证。一旦区块和交易验证成功，它就会被添加到现有区块链的顶端。结果，该交易便成为永久记录。


    一个区块存储数据。图 2-1 展示了区块的关键组成部分。


    ![](img/542012_1_En_2_Fig1_HTML.jpg)


    一个立方体解释了区块链的结构。立方体的正面展示了区块头的两个层级，以及交易计数器与交易 A 到 C。区块头包含 6 个部分，即：区块版本、默克尔树根哈希、前一个区块哈希、nBits、随机数和时间戳。


    图 2-1

    一个区块的结构（来源：作者）


    除了交易列表和计数器，它还包括一个区块头。区块头包含的元素有：区块大小、区块版本、时间戳、前一个区块哈希（前一个区块头的加密编号）、当前区块的哈希（所谓的“默克尔树根哈希”）、随机数（矿工必须求解以验证区块并关闭它的加密数字或谜题），以及
    nbits（加密谜题的难度）。


    区块由矿工使用一种名为“工作量证明”的共识机制创建和验证。矿工们竞相求解一个密码学谜题——找到当前区块的目标哈希。获胜者将把该区块添加到区块链中并获得奖励。这种共识机制被比特币所采用。

    '
- fmt: '# Consensus Mechanisms


    The consensus mechanism describes how all network participants agree on the state
    of a blockchain.


    If you’re dealing with a centralized system, there’s typically a central authority
    or administrator, who manages and maintains it. Blockchain, however, is decentralized.
    Hundreds of thousands of participants – peers – work on the verification and authentication
    of transactions happening on the network.


    A consensus mechanism regulates how these participants work together and agree
    on which transactions are legitimate, verified, and added to the blockchain. Because
    the status of blockchain is changing dynamically, a set of rules is necessary
    to ensure ledgers are updated in an efficient, real-time, reliable, and secure
    way.


    There are many different consensus mechanisms. We’re going to glance over the
    most popular ones now.


    ## Proof of Work (`PoW`)


    In the `Proof of Work` consensus mechanism, miners compete to solve a mathematical
    problem based on a cryptographic hash algorithm. When the puzzle is solved, a
    block is published to the network for other miners to verify.


    Miners receive transaction fees that incentivize them to do the work. And it is
    a lot of work. The chances of winning the race to discover the solution to the
    math puzzle and completing a block are dependent on the mining power. That’s because
    miners have to basically guess a random number (a hash) that is less than or equal
    to the target hash and there are trillions of possible guesses. So what a miner
    needs to win this race is a lot of computing power. We will talk about a bit more
    in Chapter [3](#542012_1_En_3_Chapter.xhtml).


    `Proof of Work` is the original consensus mechanism used in popular cryptocurrencies,
    including Bitcoin, Litecoin, and Ethereum 1.0. Unfortunately, the high computing
    power required to execute it translates into high energy consumption and longer
    processing times. Its disadvantages inspired the search for more efficient and
    environmentally friendly options, such as `Proof of Stake` (`PoS`).


    ## Proof of Stake


    In `Proof of Stake`, miners are replaced by validators. Miners can create a new
    block – or a new token. It can be compared to minting a currency. Every new block
    adds to the total market liquidity.


    In `Proof of Stake`, market liquidity is created at the beginning, and it doesn’t
    change. The participants generally don’t create new blocks but validate the transactions
    in them.


    To become a validator, users need to stake capital in the form of crypto tokens,
    a minimum of 32 `ETH` (around 43,000 dollars as of today) in the case of Ethereum.
    The selection of validators is done by the network randomly, depending on their
    stake. The stake also acts as a form of collateral, and it can be destroyed if
    the validator is dishonest.


    Validators earn by taking transaction fees; they’re not rewarded with newly minted
    coins like in the `PoW` scenario. The advantage of `PoS` lies in energy efficiency,
    which is naturally a very important aspect and concern. Because `PoS` doesn’t
    require huge computing power and expensive hardware, it’s also easier to join
    the network.


    Table [2-1](#542012_1_En_2_Chapter.xhtml#Tab1) shows a simple comparison between
    these two most popular consensus mechanisms.


    **Table 2-1**


    Comparison of `PoW` and `PoS` consensus mechanisms


    |   | `Proof of Work` | `Proof of Stake` |

    | --- | --- | --- |

    | Consensus mechanism | Miners compete to solve mathematical puzzles | Validators
    are chosen based on the number of coins staked |

    | Block validation | Verified by miners after solving puzzles | Verified by validators
    based on their stake |

    | Energy consumption | High | Lower |

    | Processing time | Longer processing time | Faster transaction processing time
    |

    | Economic incentives | Miners rewarded with newly minted coins and transaction
    fees | Validators earn transaction fees and rewards |

    | Security | Relies on computational power and majority rule – to hack a `PoW`
    blockchain, you would need a computer more powerful than 51% of the network |
    Relies on economic incentives and stake – to hack the `PoS` blockchain, you would
    need 51% of all the cryptocurrency in the network |

    | Environmental impact | High carbon footprint and energy usage | Reduced carbon
    footprint and energy usage |'
