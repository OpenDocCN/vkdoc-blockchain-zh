    # 2. Demystifying Blockchain


    People frequently claim that blockchain is a very complex technology that requires
    very specific skills. Indeed, blockchain developers and architects must develop
    extensive programming knowledge; understand all protocols, networks, security,
    and cryptonomics; learn how to create dApps; and so on. That’s why being a blockchain
    developer is such a highly paid job.


    As a hospitality professional, you can focus on the business aspects of blockchain
    only. In most cases, you will have external partners providing technology solutions.
    They will present their solutions and throw a lot of very confusing statements
    and terms at you, and if you decide to go forward with the project, they will
    ask you to specify or sign off on the business requirements.


    To ensure that you’re prepared for that, in this chapter, we’re going to travel
    to the core of the blockchain universe and examine its key components and building
    blocks. Learning how this technology works will equip you with the knowledge necessary
    to understand its capabilities.


    More importantly, however, the goal of this part is to walk you through the topics
    like consensus mechanisms or types of blockchain networks and to give you the
    information you are going to need when making strategic business decisions regarding
    blockchain projects.


    ## What Is Blockchain?


    Blockchain is a distributed database that is shared within the computer network.
    What it means is that this database can be accessed and stored in tens of thousands
    of computers all over the world simultaneously.


    There is no central power or authority that controls the blockchain. It’s a peer-to-peer
    model based on participants’ consensus. The architecture of a blockchain is based
    on trust, with no need for intermediaries, such as banks or governments who authorize
    the transactions.


    As a database, blockchain stores information electronically in digital format
    on hundreds of thousands of computers distributed around the globe. If you imagine
    a typical database, it probably looks like a table with columns and rows of data.


    Blockchain is different – here, data is structured in groups, known as blocks.
    These blocks have certain storage capacities. When the block is filled, it’s closed
    and linked to the previous block, forming a chain of data known as the blockchain.
    When a block is filled, it is set in stone. Each block in the chain is given an
    exact timestamp when it is added to the chain. All new information is compiled
    into a newly formed block that will then also be added to the chain once filled.
    No one can delete or edit a transaction in a block; it’s tamper-proof. The data
    and history of the transactions are irreversible and transparent.


    Every block contains a unique identifying code – the so-called “hash” – based
    on its preceding block to enhance accuracy in data tracking and ensure data security.
    When someone wants to change a transaction or data in the block, that changes
    the hash code and all hash codes of all blocks that were created more recently,
    including the last block in the chain.


    Now, because everyone in the network has a copy of that blockchain, it’s easy
    to detect who changed it without the consent of the whole peer-to-peer group and
    to dismiss it. The data is encrypted so only the owner of a record can decrypt
    it to reveal their identity. This means that users of blockchain can remain anonymous
    while keeping transparency.


    ## Blocks


    Let’s delve a little deeper now to see how blockchain works. In a nutshell, anytime
    a user sends a transaction (a transfer of cryptocurrency for example), a block
    is created to store it. Data is cryptographically secured and linked to the previous
    block in the ledger. The block is broadcasted in the network, and network nodes
    (computers) validate it. Once the validation of the block and the transactions
    is successful, it is added on top of the existing blockchain. As a result, the
    transaction becomes permanent.


    A block stores data. Figure [2-1](#542012_1_En_2_Chapter.xhtml#Fig1) shows the
    key components of the block.


    ![](images/542012_1_En_2_Chapter/542012_1_En_2_Fig1_HTML.jpg)


    A cube explains the structure of a blockchain. The front face of the cube features
    2 layers for the header, and transaction counter with transactions A to C. The
    header has 6 groups namely, block version, Merkel tree root hash, previous block
    hash, N bits, nonce, and timestamp.


    Figure 2-1


    Structure of a block (source: author)


    Aside from the transactions list and counter, it consists of a block header. Block
    header contains elements like block size, block version, timestamp, previous block
    hash (encrypted number of the previous block’s header), a hash of the current
    block (so-called “Merkle tree root hash”), nonce (the encrypted number or a puzzle
    that a miner must solve to verify the block and close it), and nbits (the difficulty
    of the cryptographic puzzle).


    Blocks are created and validated by miners using a consensus mechanism called
    Proof of Work. Miners compete to solve a cryptographic puzzle – find the target
    hash for the current block. The one that wins adds that block to the blockchain
    and receives a reward. This type of consensus mechanism is used in Bitcoin.'
