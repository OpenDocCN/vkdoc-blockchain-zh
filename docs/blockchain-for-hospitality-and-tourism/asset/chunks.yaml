- fmt: '# 1. The Blockchain Promise


    By now, you have probably heard of blockchain. People say it’s one of the new,
    most innovative technologies, but it’s not new. In fact, it was developed nearly
    15 years ago.


    `Bitcoin`, the most famous cryptocurrency with the highest market capitalization
    (as of the time of writing), was the first practical application of blockchain.
    Created in 2008 by the mysterious Satoshi Nakamoto, `Bitcoin` was designed to
    disrupt and reshape financial institutions.^([²](#fn2)) It’s no coincidence that
    `Bitcoin` was brought to life at this time. The international financial crisis,
    which started with the fall of Lehman Brothers, created a global lack of trust
    in the traditional banking system.


    `Bitcoin` was positioned as a safe and secure digital currency that can be transferred
    between peers without a central authority and intermediaries, such as banks. All
    transactions were verified and secured by cryptography on the public distributed
    ledger – blockchain. We will cover the blockchain architecture and all its features
    in the next chapter.


    In the beginning, `Bitcoin` (`BTC`) had little value. The first time it was actually
    used to buy something tangible was on May 22, 2010. On that day, now celebrated
    in the crypto world as *Bitcoin Pizza Day*, one crypto-enthusiast spent 10,000
    `Bitcoins` on two pizzas worth 30 USD. Obviously, no one at that time knew that
    one day, 12 years later, `Bitcoin` will reach 65,000 USD per 1 `BTC`, or that
    it will crash later.


    The price of `Bitcoin` was slowly rising. Press articles, especially stories alerting
    of the cryptocurrency appeal in the illegal online activity, put a match to its
    growing popularity. Controversies started arising. Anonymous money transfers with
    no central supervision could be used to facilitate money laundering, drug and
    human trafficking, and other criminal activities.


    The theme was picked up by movie script writers. We’ve all seen movies with hackers,
    arms dealers, and other villains being paid in `Bitcoin` or another cryptocurrency
    for their services.


    New digital coins started popping out, more controversies and scams followed,
    the first exchanges collapsed, and embezzlement charges were filed. But the crypto-market
    growth continued.


    In 2015, `Ethereum` entered the market with a new blockchain project that introduced
    smart contracts and created foundations for various use cases beyond cryptocurrencies.
    `Ether` quickly became the number 2 cryptocurrency, competing successfully with
    `Bitcoin`.


    Now, this book is not about the history of `Bitcoin`, but I think it’s important
    to give you this background story and perspective. Blockchain is often perceived
    through the lens of cryptocurrencies. In fact, many people identify blockchain
    with `Bitcoin`. When I interviewed hospitality managers, I heard a lot of statements
    like this one:


    > *“Have I heard about blockchain? Yes, everybody talks about Bitcoin, you’ve
    seen what’s happening in the news, right? People are losing money. It’s scary.”*


    Crypto-market volatility drew a lot of attention over the last two years. In 2021,
    `Tesla` invested 1.5 billion USD in `Bitcoin`, which attracted a lot of investors,
    and the price skyrocketed to 69,000 USD per coin in November 2021. By now, it
    has dropped by around 70%. Other cryptocurrencies are not doing well either. Most
    of them are worth next to nothing today, and only investors with strong nerves
    (and deep pockets) are staying in the game.


    The vision of crypto-market crash attracted a lot of media attention in 2022.
    Horror stories about scams, “get-rich-quick” schemes, hacker attacks, and evaporating
    life savings made headlines. Sadly, few stories of how blockchain technology works
    in other capacities, beyond infamous cryptocurrencies, have been published. They’re
    just not very media worthy, I guess. But over the last ten years, the vision of
    what blockchain may bring to enterprises has grown and evolved. While it’s undoubtedly
    driving a change in the financial ecosystem, its applications go way beyond payments
    and deposits.


    `PWC` names blockchain a “trillion-dollar opportunity” for global economy and
    estimates that by 2025 majority of businesses will be using this technology in
    some form.^([³](#fn3))


    Blockchain’s potential is compared to the impact that the creation of the Internet
    had on the economy. Dan Tapscott^([⁴](#fn4)) even calls it the second generation
    of the Internet, which enables not only transfer but also the creation of value.
    As a secure, tamper-proof distributed ledger, it is poised to revolutionize supply
    chains, identity services, accounting, and essentially any industry that relies
    on the authentication of documents.


    Experts, researchers, and consulting firms have compiled a long list of industries
    that could benefit from blockchain technology. This includes anything from infrastructure
    and waste management to environmental monitoring, emergency services, healthcare,
    and even agriculture. In fact, according to some, the use cases for a transparent,
    verifiable register of transaction data are practically endless – especially since
    blockchains operate through a decentralized platform that doesn’t require central
    supervision and is resistant to fraud.^([⁵](#fn5))


    Now, you may wonder – if it’s such a fantastic tool, with so many business applications,
    why has it not been popularized yet? Why am I hearing only about cryptocurrencies?


    Well, there are a few key reasons, such as complexity, scalability, and performance
    issues and regulatory uncertainty, that hindered the progress of this technology
    adoption.


    Blockchain, like many emerging technologies, has gone through various stages of
    development and only now is gradually approaching a maturity stage that will lead
    to mass adoption.


    The first generation of Blockchain was focusing solely on cryptocurrencies with
    `Bitcoin` being the original one. Blockchain was used as a decentralized ledger
    for recording and verifying transactions. In this stage, fundamental concepts
    of consensus, cryptographic security, and immutability were established.


    Smart contracts and emergence of `Ethereum` marked the second generation of blockchain.
    People realized that the potential of blockchain goes beyond financial transactions.


    > **Note**

    >

    > A smart contract is essentially a self-executing and self-enforcing digital
    agreement between two or more parties based on a blockchain platform. Because
    it’s programmed within the blockchain platform, it can be available to any interested
    party but cannot be changed, amended, or edited.


    Smart contracts found traction in insurance and supply chain management, for instance,
    enabling automation of payments to claimants and suppliers based on pre-agreed
    conditions coded in the agreement. `Ethereum` also allowed developers to use their
    platform to build their own projects and applications – the so-called `dApps`.
    `dApps` are decentralized applications, which means they run on decentralized
    system – that is, blockchain. They can operate autonomously, based on smart contracts,
    without human intervention. What’s more, they’re not owned by a single, central
    entity.


    This concept was leveraged in many areas, from decentralized finance (`DeFi`)
    to gaming, insurance, energy, and healthcare. First, `NFTs` came to life. The
    user base started to grow and with it – scalability became a challenge. Transaction
    speed and fees increased with the user traffic.'
