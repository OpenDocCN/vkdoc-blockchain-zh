- fmt: '### Use Cases in the Hospitality and Tourism Industry


    It may surprise you, but the hospitality and tourism industry is quite ripe with
    potential applications for non-fungible tokens, especially the utility NFTs that
    we discussed earlier. NFTs are one of the trends you should consider if you’re
    looking to enhance customer experiences or promote brand loyalty. The digital
    assets space is rapidly growing, and we see many use cases that go beyond marketing.
    We’ll explore a selection of them now.


    ### Souvenirs and Experiences


    Virtual tours and experiences present a unique opportunity for NFTs to be used
    in hospitality and tourism, as they offer a new way for people to experience destinations,
    attractions, and events.


    NFTs can be used to create unique and exclusive virtual experiences that people
    can access from anywhere in the world. They can be used to promote destinations,
    attractions, and historical sites or offer access to private properties that are
    not open to public. This concept has already been used by some museums^([^(39)](#fn39))
    and destinations. For instance, The Royal Museums of Fine Arts of Belgium created
    an NFT collection named “The Next Rembrandt” that showcases a digital reproduction
    of a Rembrandt painting. The NFT also includes access to a virtual tour of the
    museum’s collection.^([^(40)](#fn40))


    In the hospitality space, we have a few examples of hotels and destinations that
    have partnered with artists to create digital artworks and experiences in the
    form of NFTs. Such NFT can be inspired by the hotel’s location or design and sold
    as a collectible or used as a souvenir and offered to guests as a special memento
    of their stay. In many instances, NFT projects now focus on promoting unique niche
    creators, local traditions, and heritage and elevating the hospitality brand’s
    corporate social responsibility.


    Marriott International was most likely the first big hotel brand to leverage the
    NFT hospitality marketing approach. They’ve teamed up with three well-known digital
    artists (TXREK, JVY, and Erick Nicolay) to create their own NFTs. The campaign,
    called the “Power of Travel,” was launched for the first time at the Art Basel
    Miami Beach event in December 2021, and the unique NFTs were awarded to competition
    winners attending the event (along with 200,000 Marriott Bonvoy points).


    Pullman Hotels & Resorts in Australia, on the other hand, decided to host a traveling
    and immersive NFT (non-fungible token) art exhibition, titled Digital E/SCAPES
    by Pullman, featuring four emerging and Indigenous female artists from Australia
    and overseas. The exhibition comprises 16 NFT artworks displayed in the lobby
    on LED screens. Proceeds from the auction will be split between the artists and
    their selected local charities. The purpose of this project, according to the
    Pullman press release, is to celebrate emerging artists. Pullman is also aiming
    to become a community destination where people can experience the Artist Playground
    atmosphere of Pullman properties and learn about NFTs and how they contribute
    to the metaverse.


    Hilton, on the other hand, launched a new digital art and NFT pilot program^([^(41)](#fn41))
    that will showcase rotating exhibitions of curated works created by some of the
    well-known digital artists in the world at a couple of the hotel chain’s New York
    City locations. Hilton will install digital artwork in guest rooms and public
    spaces at New York Hilton Midtown and Conrad New York Midtown properties through
    a partnership with Niio Art NFT company. Hotel guests will be able to admire digital
    artworks on screens in common areas and rooms and will have the opportunity to
    take home some of the works as part of a gift art streaming subscription service
    or NFT giveaway.


    NFTs are being used as souvenirs to commemorate special events and milestones.
    The Atlantis Resort in the Bahamas created an NFT to celebrate its 25th anniversary.
    The NFT features an underwater scene with marine life and is available for purchase
    on the `Rarible` marketplace. American Airlines, on the other hand, used NFT as
    a souvenir for their Concierge Key Members along with the traditional box of chocolates
    and a model of Boeing 787-9 with the member’s name engraved on it.


    But they also can be used to enhance brand engagement, allowing to create unique
    experiences, promote the brand, and increase guests’ loyalty.


    This approach was adopted by SEM9 Senai in Malaysia, an esports hotel geared toward
    gamers. SEM9 issued a “99LIVES”^([^(42)](#fn42)) collection of NFTs that came
    with additional perks for buyers. NFT owners enjoyed benefits such as access to
    a free hotel night at SEM9 Senai, limited edition SEM9 merchandise, an invitation
    to participate in physical and digital events, special access to SEM9 and esports
    behind the scenes, and the latest information on all upcoming SEM9 projects.


    Hospitality marketing managers start recognizing that the utility power behind
    NFT is far bigger than the collectible.


    In November 2022, InterContinental Hotels & Resorts Group announced the launch
    of its first collection of ten exclusive NFTs developed in partnership with British
    artist Claire Luxton. The initiative features one-of-a-kind artwork, is linked
    to premium travel advantages, and promotes the introduction of a new property,
    the InterContinental Rome Ambasciatori Palace, which will open in 2023.


    In addition to the custom digital collectibles celebrating the brand’s heritage
    and travel, the NFTs grant owners access to exclusive benefits, such as


    * Ownership of an NFT featuring a 1-of-10 custom artwork valued between £3,000
    and £5,000 per item

    * InterContinental Ambassador status

    * A one-night stay at the new InterContinental Rome Ambasciatori Palace


    Five of the NFTs will be available exclusively to `IHG One Rewards` members through
    a bidding process via the `IHG One Rewards` auction platform.


    IHG’s VP of Global Marketing for Luxury Brands explained that “this collaboration
    enables a unique experience that encapsulates the forward-thinking approach of
    InterContinental Hotels & Resorts.”^([^(43)](#fn43))


    ### Loyalty Programs


    Loyalty programs are an essential part of the hospitality and tourism industry,
    aimed at retaining customers and incentivizing repeat business. The use of non-fungible
    tokens can add a new level of engagement and exclusivity to loyalty programs,
    creating a unique and memorable experience for customers. NFT-based loyalty programs
    can increase customer loyalty, create buzz and exposure for the brand, and provide
    a more sustainable and digital option for rewards and membership cards.


    As an immutable record on blockchain, NFT can securely store information about
    clients’ requirements and preferences, which can be further used to personalize
    their stay. All travel or property-related information can also be coded into
    an NFT. Acting as a membership card, NFT can increase the customer LTV and provide
    a great source of information about loyal clients.'
