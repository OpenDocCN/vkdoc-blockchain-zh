  trans: '

    # 共识机制


    共识机制描述了所有网络参与者如何就区块链的状态达成一致。


    如果你处理的是一个中心化系统，通常会有中央管理机构或管理员来管理和维护它。然而，区块链是去中心化的。成千上万的参与者——也就是对等节点——共同负责验证和认证网络上发生的交易。


    共识机制规定了这些参与者如何协作，并就哪些交易是合法的、已验证的以及应添加到区块链中达成一致。由于区块链的状态是动态变化的，因此需要一套规则来确保账本能够以高效、实时、可靠且安全的方式进行更新。


    共识机制有很多种。现在我们简要了解一下最流行的几种。


    ## 工作量证明（`PoW`）


    在**工作量证明**共识机制中，矿工们竞相解决基于密码哈希算法的数学难题。当难题被解决后，一个新块会被发布到网络中，供其他矿工验证。


    矿工通过收取交易费获得激励，促使他们完成这项工作。而这项工作量非常大。赢得解决数学难题并完成一个区块的竞赛的几率取决于算力。这是因为矿工基本上需要猜测一个随机数（哈希值），这个数要小于或等于目标哈希值，而可能的猜测有数万亿种。因此，矿工赢得这场竞赛需要大量的计算能力。我们将在第
    3 章中更详细地讨论这一点。


    **工作量证明**是应用于流行加密货币（包括比特币、莱特币和以太坊 1.0）中的原始共识机制。不幸的是，执行它所需的高计算能力导致了高能耗和较长的处理时间。它的缺点促使人们寻找更高效、更环保的方案，例如**权益证明**（`PoS`）。


    ## 权益证明


    在**权益证明**中，矿工被验证者取代。矿工可以创建新区块或新代币。这可以类比为铸造货币。每增加一个新区块都会增加市场流动性总量。


    在**权益证明**中，市场流动性在一开始就创建好了，并且不会改变。参与者通常不创建新区块，而是验证其中的交易。


    要成为验证者，用户需要以加密代币的形式质押资本，对于以太坊来说，最低需要质押 32 个`ETH`（按目前价格约合 43000 美元）。验证者的选择是由网络根据其质押量随机进行的。质押量也起到一种抵押品的作用，如果验证者行为不诚实，其质押的代币可能会被销毁。


    验证者通过收取交易费获得收益；与`PoW`模式不同，他们不会获得新铸造的币作为奖励。`PoS`的优势在于其能源效率，这自然是一个非常重要的方面和关注点。由于`PoS`不需要巨大的计算能力和昂贵的硬件，加入网络也更容易。


    表 2-1 简单比较了这两种最流行的共识机制。


    **表 2-1**


    `PoW`和`PoS`共识机制对比


    |  | **工作量证明** | **权益证明** |

    | --- | --- | --- |

    | 共识机制 | 矿工竞相解决数学难题 | 根据质押的代币数量选择验证者 |

    | 区块验证 | 解决难题后由矿工验证 | 由验证者根据其质押进行验证 |

    | 能源消耗 | 高 | 较低 |

    | 处理时间 | 处理时间较长 | 交易处理时间更快 |

    | 经济激励 | 矿工获得新铸造的币和交易费作为奖励 | 验证者赚取交易费和奖励 |

    | 安全性 | 依赖计算能力和多数原则——要攻击一个`PoW`区块链，你需要一台算力超过网络 51%的计算机 | 依赖经济激励和质押——要攻击`PoS`区块链，你需要拥有网络中
    51%的加密货币 |

    | 环境影响 | 高碳足迹和高能耗 | 降低的碳足迹和能耗 |

    '
- fmt: '### Other Consensus Mechanisms


    While `Proof of Work` and `Proof of Stake` are the most popular ways to achieve
    consensus in the blockchain world, there are many other types and iterations in
    use. We will briefly discuss a couple of them to give you an overview of different
    approaches and methods.


    `Delegated Proof of Stake` (`DPoS`) is a modified version of the `Proof of Stake`
    consensus mechanism. Here, your stake gives you voting power. You vote to select
    the “witnesses” who validate and add blocks to the chain. The more tokens you
    stake in the network, the higher power your vote has. The witnesses with the highest
    number of votes earn the right to validate transactions, and if they’re successful,
    they receive a reward. This reward is usually shared with those who voted for
    them.


    Witnesses can be “fired” if they’re acting strange; for instance, if there’s a
    suspicion of malicious activity, the votes can be withdrawn. This type of mechanism
    is deemed to be more democratic and financially inclusive than the `PoS`.


    `Proof of Activity` (`PoA`) is essentially a hybrid of `PoW` and `PoS` – the process
    starts with mining like in `Proof of Work`, where miners are competing to solve
    a mathematical problem. But when the block is mined, it switches to `PoS` mode.
    A randomly selected group of validators work to validate the transactions that
    are then added to the blockchain. The rewards are split between the validator
    and the miner.


    Another consensus mechanism is `Proof of Authority` – here, the validators are
    selected based on their personal reputation instead of coins at stake. The anonymity
    is removed and therefore, the validators are incentivized to maintain a good quality
    of work. It doesn’t require a lot of computing power and is one of the most cost-efficient
    options, leveraged in private networks (e.g., `J.P. Morgan` bank uses it for their
    `JPM` coin).


    `Proof of Capacity` is based on the amount of space available in a miner’s hard
    drive. To put it simply, the larger the hard drive, the higher the chance the
    miner will solve the puzzle and win the reward.


    `Proof of Importance`, on the other hand, selects miners based on a number of
    factors, for instance, the number and size of transactions in the past, amount
    of vested currency, network activity, etc. These factors contribute to the importance
    score. Participants with higher scores have higher chance of being chosen to mine
    (or “harvest” in this scenario) a block and receive a transaction fee.


    `Proof of Elapsed Time` (`PoET`) is typically used on permissioned blockchain
    networks. We will discuss them in the next section in detail, but for now – permissioned
    blockchain requires participants to identify themselves. `PoET` is a time lottery–based
    mechanism that randomly assigns different waiting times to every node (participant)
    in the network. The one with the shortest assigned waiting time gets to mine.


    There are also `Practical Byzantine Fault Tolerance`, `Proof of Burn`, `Proof
    of History`, `Proof of Weight`, and a couple of other, less common mechanisms.


    You don’t need to know all of them. However, when you’re joining a blockchain
    network or project, you need to understand which protocol is used, because it
    is going to determine how safe and resilient the network is and how fast the transactions
    are executed.


    A wrong choice of consensus mechanism can lead to low performance and delays in
    processing. It may also increase the vulnerability of the chain and increase the
    risk of blockchain forks, where a single chain diverges into two or more chains
    and operates in an unpredictable manner. Finally, if the mechanism is not appropriate,
    the consensus may fail, making the whole effort futile.


    The choice of the consensus mechanism will depend on the type of blockchain network,
    its application, and its requirements.


    Generally, there are three types of blockchain networks: permissionless, permissioned,
    and consortium blockchain. We will discuss them in the next section. But before
    we jump into that, let’s summarize the key features of blockchain.


    ### Blockchain Characteristics


    **Blockchain uses decentralized technology** – there is no central governing authority
    that manages a blockchain network. It’s a distributed ledger that can store digitized
    assets – cryptocurrencies, documents, contracts – in a tokenized form. Users have
    control – they don’t have to rely on a third party.


    Decentralization means the network is more secure and less likely to break down.
    Think about it that way – a centralized database stored on a server is an easy
    target for hackers. In order to attack a blockchain network, a huge amount of
    computational power and resources is required (at least 51% of all power in the
    network). Blockchain doesn’t rely on third parties; it’s maintained by the network
    participants.


    **Blockchain is immutable and transparent** – when the data on the network is
    recorded, it becomes visible to other participants and cannot be changed. All
    blocks are connected to each other. No one can delete, edit, revise, rewrite,
    update, or undo any of them. Every node (participant) of the network has a copy
    of the digital ledger. Adding new transactions requires validation, following
    an agreed consensus mechanism.


    **Blockchain is secure** – both decentralization and cryptography make blockchain
    networks very secure compared to traditional digital ledgers. Data in the blockchain
    is protected through cryptographic hashing. Because every block has its own hash
    and is linked and contains the previous block hash, it’s difficult to tamper with
    it and easy to spot an issue.


    **Blockchain is available 24/7/365** – unlike traditional systems, blockchain
    networks don’t have downtimes, because they’re decentralized and distributed.


    **Blockchain is fast and cost-efficient** – since there are no intermediaries
    and transactions happening on a decentralized network between peers, the processing
    is much faster when compared to traditional cross-border payments. Ultimately,
    speed and transaction fees depend on the blockchain network and consensus type.
    As mentioned, `Proof of Work` can be slower and more expensive than `Proof of
    Stake`. Big blockchain platforms have also faced congestion and latency issues
    in the past, which is the reason why `Ethereum`, for example, has decided to move
    to the `Proof of Stake` mechanism.


    There are, however, some drawbacks as well. I mentioned energy consumption already.
    Scalability is one of the major challenges as well – as the number of transactions
    increases, the size of the blockchain grows and the processing time needed for
    validating transactions increases. The network becomes slower and less efficient.


    **Note**


    The blockchain trilemma, also known as the scalability-security-decentralization
    trilemma, is a concept that highlights the trade-offs between three desirable
    blockchain technology characteristics: scalability, security, and decentralization.
    According to the trilemma, it is difficult to acquire all three of these traits
    at the same time, because optimizing one often comes at the expense of the others.


    Other blockchain challenges, especially around storage requirements, upgradability
    and interoperability, and user experience, are subject of constant research and
    development efforts. They also do not apply universally to every blockchain platform,
    but you need to be aware that they may exist and – if you are embarking on a blockchain
    project – you need to ask your provider about their strategy to mitigate these
    risks.


    ### Types of Blockchain


    There are three types of blockchain networks: public, private, and consortium
    blockchain.'
