  trans: '

    ### 以太坊


    以太坊是最早的基于区块链的开源平台之一，创建于 2013 年。它是包括 DeFi 和 NFT 在内的许多流行应用的基础平台。


    `以太币（ETH）` —— 以太坊的原生货币 —— 如今在市值上仅次于比特币。此外，其他加密货币也利用了以太坊代币标准（`ERC-20`）。


    以太坊是首个引入智能合约功能的平台，这对许多行业来说是一项颠覆性的发展。


    以下公司正在使用以太坊：PayPal、亚马逊、NVIDIA、麦当劳和可口可乐。


    **注意**


    2022 年 9 月，以太坊完成了从工作量证明到权益证明共识机制的切换，后者能效更高。根据以太坊基金会的说法，这一转变使以太坊的能源消耗降低了 99.95%。这一事件被称为“合并”。你可以在此处了解更多信息：[`https://ethereum.org/en/upgrades/merge/`](https://ethereum.org/en/upgrades/merge/)。


    ### Hyperledger Fabric


    Hyperledger Fabric 是一个开源的模块化区块链框架，作为创建基于区块链的应用和解决方案的基础。它由 IBM 为企业级应用设计，并于 2016
    年由 Linux 基金会推出。


    Hyperledger Fabric 是私有的且经过许可的；因此，它适用于需要身份管理和访问控制功能的企业。由于它是私有的，并且所有参与成员的身份都是已知且经过验证的，Hyperledger
    Fabric 无需依赖复杂的共识机制；因此，其性能高于以太坊网络等平台。


    **注意**


    访问 [`www.hyperledger.org/learn/case-studies`](http://www.hyperledger.org/learn/case-studies)，了解日立、博世、沃尔玛、霍尼韦尔等公司如何利用
    Hyperledger Fabric 改造其业务流程。


    ### Hyperledger Sawtooth


    与 Hyperledger Fabric 类似，Hyperledger Sawtooth 是一个开源项目，允许企业创建和运营分布式账本应用。


    这两个平台的主要区别在于，Hyperledger Sawtooth 同时支持许可访问和无许可（公开）访问。这些特性使其成为一种非常通用的选择，并且对于两种用例都适用的公司来说，它是一个很好的解决方案。


    **注意**


    前往 [`https://101blockchains.com/hyperledger-sawtooth-vs-fabric/`](https://101blockchains.com/hyperledger-sawtooth-vs-fabric/)
    探索 Hyperledger Fabric 和 Hyperledger Sawtooth 之间的异同。


    ### IBM 区块链


    IBM 这家科技巨头主要关注企业的利益。IBM 的区块链平台基于前面提到的 Hyperledger Fabric 构建，允许企业加入现有网络并创建新网络。


    IBM 区块链已被全球许多企业成功实施，并在多种场景中被证明是有效的工具，包括供应链管理、贸易融资、石油和天然气以及代理投票。


    **注意**


    要了解更多关于 IBM 区块链的信息，请访问 [`www.ibm.com/blockchain`](http://www.ibm.com/blockchain)。


    ### Corda


    Corda 由一家名为 R3 的公司创建，是一个专注于金融现代化的平台。它以私有和许可平台的形式运行，其大多数用例源于金融服务行业。


    Corda 没有原生货币。相反，它促进了去中心化金融、银行间支付和结算以及中央银行数字货币的创建。除了金融用例，Corda 区块链还成功部署在医疗保健、供应链管理、电信、建筑等许多其他行业。


    如今，超过 400 家组织正在使用 Corda，包括安联、汇丰银行、ING、微软、甲骨文和埃森哲^(⁷)。


    ### Quorum


    Quorum 是由摩根大通专家基于以太坊开发的一个项目。它旨在支持私有网络的用例，即访问需要经过许可。


    Quorum 可以通过两种方式运行：单个实体拥有所有节点（单公司区块链网络），或多个成员拥有网络的一定比例或部分（联盟）。Quorum 最初是为银行使用而设计的，非常重视交易的速度、隐私和安全性。


    2021 年，ConsenSys 收购了 Quorum 的知识产权，并在进行相关微调后，推出了 Quorum 区块链服务，该服务面向各个行业，能够简化企业应用的开发流程。该平台是当今顶级企业最常使用的区块链平台之一。它被用于各种场景，从为
    LVMH 提供的奢侈品追踪和溯源服务，到房屋租赁和能源交易^(⁸)。


    **注意**


    摩根大通首席执行官杰米·戴蒙公开批评加密货币。在 2022 年 9 月美国众议院金融服务委员会的听证会^(⁹)上，他称比特币和其他代币是“去中心化的庞氏骗局”，助长了盗窃、洗钱、性交易和其他犯罪行为。然而，与此同时，他明确区分了加密货币和区块链技术，他认为后者具有颠覆许多行业的真正潜力。


    #### Ripple


    Ripple 主要以其快速、高效的去中心化金融平台而闻名。作为一个数字支付网络，它促进交易的结算，主要面向银行设计。事实上，Ripple 的共识机制是基于银行服务器的通信。


    Ripple 几乎可以即时结算跨境交易，比传统的电汇方式快得多。Ripple 自己的加密货币——`XRP`——是市场上最有价值的货币之一，它通过促进货币之间的快速兑换，本质上充当了其他货币的桥梁。


    #### Solana


    Solana 是世界上最快的（如果不是最快的话）区块链平台之一。它还提供较低的交易费用，并因使用节能的共识机制（`历史证明`，这是一种`权益证明`机制）而被认为是环保的。


    Solana 凭借其功能和效率获得了极大的关注，并以托管去中心化应用而闻名。然而，由于其多次故障、黑客攻击以及 2022 年 7 月因误导投资者而被提起的集体诉讼，其声誉正在恶化。

    '
- fmt: '# What to Consider When Looking for a Blockchain Platform for Your Business?


    Selecting the right solution can be a very difficult and time-consuming process.
    Hospitality and tourism companies typically rely on external software and vendors.
    Their in-house IT is focusing mainly on network maintenance and security, rather
    than development. Finding the right partner is therefore crucial.


    If you are looking for blockchain solutions, don’t limit your search to your typical
    *hoteltech* or *proptech* vendors. My research shows that very few of them have
    readily available solutions.


    The beauty of blockchain lies in its versatility – at the end of the day, it’s
    a distributed ledger, and developers can build whatever they want on top of it.
    Some applications are very specialized – like DeFi. But there are also many Web3
    startups that focus on tokenization and different NFT applications. Many of them
    have become quite successful, even though they’ve been on the market for a relatively
    short time. Don’t be afraid to experiment with these startups; Web3 is their playground,
    and they’re far more advanced, agile, and nimble than traditional hospitality
    technology providers.


    If I were you, I would check what the competition is doing and what providers
    they’re using. In the next chapters of this book we delve into many use cases
    and success stories and mention some of the tech companies and vendors involved
    – treat it as the first step in your research.


    But let’s go back to the big question – how to pick a blockchain platform? Well,
    first, ask yourself – and your team – do we need a blockchain platform? What are
    we expecting out of it? If we’re talking about a business-wide digital transformation
    project, then the answer is probably yes, you need a blockchain platform that
    will enable secure and reliable data sharing and immutability. You will have to
    define your business requirements, including the number of users, interactions
    with the external world, processes, etc.


    However, if your use case is more narrow - for instance you only want to upscale
    your customer loyalty program by adding an NFT element, then the answer would
    be “no.” There are companies on the market that offer easy-to-integrate off-the-shelf
    solutions that will help you achieve your goal in a relatively fast and cost-efficient
    way. You don’t have to build it on your own.


    Assuming you are considering shifting your company onto the blockchain, here are
    the most important considerations you should start with:


    *   **Type of a blockchain**: As we said, there are two main types of blockchain:
    public and private. The public is open to everyone and provides transparency.
    Typically, all users have the same rights, and they are anonymous. Access to private
    blockchain platforms is limited to users with permissions granted by the administrator
    or other central authority. You would see these types of platforms used by companies
    that want to allow only their employees and partners to join and act on their
    ledger. If you’re transforming your organization into a smart hotel that leverages
    IoT-enabled devices and runs on blockchain – private blockchain platform would
    be a good choice. There are also consortium blockchains that you may be invited
    to join in the future. We will discuss a couple of examples, including participation
    in digital identity schemes, in the next chapters of this book.


    *   **Platform scalability and speed**: Blockchain platform speed is measured
    in `TPS`. `TPS` is the number of transactions that the network can process per
    second. Some blockchain platforms can be very efficient – for instance, `Solana`
    claims it can process 65,000 transactions per second. This result is similar with
    the big payment providers such as `Visa`. Other platforms, however, are much slower.
    Interestingly, `Bitcoin`, the world’s number 1 cryptocurrency, can only process
    seven transactions. `TPS` results tell you how scalable and efficient the platform
    is. You may not need the fastest solution, however. Your choice will be dependent
    on the use case, the number of users, and the type of data that is going to be
    processed.


    *   **Platform security**: Data security is one of the main concerns of every
    IT department around the world. Blockchain platforms, due to their design, are
    much more secure than traditional legacy solutions. Hacking a blockchain network
    requires substantial effort and resources. It’s difficult but not impossible.
    When you are selecting a blockchain platform, make sure you understand all security
    features, including cryptographic methods and frequency of updates.


    *   **Functionality**: Different platforms will offer different options and be
    suitable for different use cases. You will likely want to focus on enterprise
    blockchains that allow you to build and deploy smart contracts for example (like
    `Ethereum`), rather than those that are built for the cryptocurrencies and decentralized
    finance (`Bitcoin`, `Ripple`).


    Type of a blockchain platform, speed, security, and functionality are the four
    most important aspects that you should take into consideration when selecting
    a solution for your business. If an organization has in-house developers, there
    are other details, like coding languages that the team is comfortable with. This,
    however, is an unlikely scenario in the hospitality and tourism industries. These
    sectors will rather benefit from the solutions created by external companies that
    are easy to integrate.


    ## Users


    Blockchain platforms and applications can be used by both individuals and companies.
    Let’s look at some data and key characteristics of individual blockchain users
    first and, in the second part of this section, focus on businesses and industries
    that are already in the blockchain game.'
