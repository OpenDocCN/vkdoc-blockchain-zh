    \ the past, and as it stands, there are few solutions in the market that could\
    \ deliver user experience and speed similar to traditional card payments for example."
  raw: '## The Phenomenon of Cryptocurrencies


    Digital currencies secured by cryptography and based on a distributed network
    consisting of a large number of computers are the most popular application of
    blockchain technology.


    In the first chapter, we shed light on the origin of Bitcoin, by far the most
    popular and valuable cryptocurrency in the world. Today, there are thousands of
    cryptocurrencies, also known as “cryptocoins” or “altcoins”; many of them disappear
    as fast as they launch.


    Why has the concept of cryptocurrencies gained popularity? They have, by design,
    a couple of advantages over a traditional banking system:


    *   The infrastructure: Cryptocurrencies are based on a distributed and decentralized
    network, without the involvement of banks. It’s an attractive concept to those
    who don’t trust big institutions that have been behind the big financial crises
    around the world. On the other hand, and what’s probably more important to most,
    it means there are no downtimes and no risk of a single point of failure.


    *   The security: Once the transaction occurs, it’s recorded on blockchain and
    cannot ever be erased. It’s secured by cryptography and highly immune to hacks,
    fraud, and counterfeits.


    *   The availability: The market is always open for cryptocurrency trading. Payments
    can be executed around the clock, irrespective of time zone differences. The traditional
    financial system relies on banks and clearing and settlement systems that have
    set business hours and cut-off times for payment execution. Cryptocurrencies bypass
    intermediaries and settle directly between two parties, without involvement of
    banks or credit card companies.


    *   The speed: If you want to send $100 from your bank account in London to your
    friend’s bank in New York, your payment will likely take two or three days. If
    you send it on Thursday, your friend will see it on Monday, because traditional
    payments are not settled over the weekends. Additionally, you have to remember
    about your bank’s cut-off times for cross-border transactions. If you send it
    before the cut-off time, which let’s say is 2 p.m. for US dollars, you’re transaction
    execution will start today. But if you send it after 2 p.m., your payment will
    sit in the queue for next-day processing. Next, your bank will ship it off to
    its correspondent bank, and that bank will send it to the next correspondent bank
    who finally will send it to your friend’s bank. Typically, the cross-border transaction
    involves three to four banks. And that’s for the US dollar, which is the most
    accessible currency in the world. Transfers in other, less popular currencies
    may involve even more intermediaries. As cryptocurrencies do not require intermediaries,
    transfers are executed directly between the sender and the receiver and can happen
    in close to real-time.


    *   The cost: Because of the lack of intermediaries, the cost of cryptocurrency
    payments is substantially lower. Every bank in the scenario earlier will charge
    for the transaction processing. If you’ve ever sent money abroad, you know that
    these are hefty fees, averaging, according to the World Bank analysis,^([^(20)](#fn20))
    6.3% of the amount sent. Payment using cryptocurrency is sent directly to the
    recipient, which makes the whole process cheaper.


    A promise of speed, decentralization, 24/7 global availability, and cost-effectiveness
    are naturally very compelling. However, you need to remember that unlike traditional
    (fiat) currencies that are backed by governments and central banks, cryptocurrencies
    are unregulated, and their prices are driven mainly by the supply and demand dynamics.


    The prices can spike and crash within hours because the cryptocurrency markets
    are highly speculative. Sometimes, all it takes is a tweet from Elon Musk, and
    the price of the cryptocurrency that he’s tweeting about skyrockets or plunges.
    Because the market is not regulated, it’s very prone to manipulation.


    Note


    The phenomenon of Elon Musk’s effect on the value of Bitcoin and Dogecoin is called
    “The Musk Effect.” You can read more about it here: [`www.vox.com/recode/2021/5/18/22441831/elon-musk-bitcoin-dogecoin-crypto-prices-tesla`](http://www.vox.com/recode/2021/5/18/22441831/elon-musk-bitcoin-dogecoin-crypto-prices-tesla).


    Let’s discuss some of the risks and challenges of cryptocurrencies now.


    ### Lack of Regulations


    At the time of writing this book, only two countries in the world – El Salvador
    and Central African Republic – accept Bitcoin as a legal tender. Many countries
    are working on appropriate regulatory frameworks; however, most of them define
    cryptocurrency as a financial asset and investment tool. This is in line with
    the current usage pattern – most of the cryptocurrencies around the world are
    not used to make payments in fact.


    In 2022, we’ve witnessed a couple of huge crypto-market scandals, including the
    fall of one of the biggest crypto exchange – FTX. FTX filed for bankruptcy in
    November 2022 after an investigation found that CEO Sam Bankman-Fried had misused
    customer funds, with an estimated loss of $1–$2 billion in customer funds. These
    events are bound to have an impact on the regulations imposed on this market.


    An important thing to note here is that some regulators may react fast, and they
    may be very strict, even blocking the transactions, making it very difficult to
    sell cryptocurrencies, or causing the market prices to drop dramatically.


    On the other hand, governments and central banks acknowledge that crypto payments
    trend and the advantages of payments executed on blockchain cannot be ignored.
    In fact, nine out of ten Central Banks currently are working on Central Bank Digital
    Currencies (CBDCs) – new forms of government-backed digital money. China and India
    are among the few early adopters, with live pilots of Digital Yuan and Digital
    Rupee. Wide implementation of CBDCs is likely to take some time, but when it happens
    and when they become recognized as legal tenders, CBDCs may impact the usage of
    cryptocurrencies.


    CBDCs are expected to bring advantages such as stability and regulatory oversight
    and government backing that will attract businesses and individuals who are more
    risk averse. On the other hand, they may not be able to replicate some unique
    features of crypto, such as decentralization or global accessibility. It is therefore
    possible that these two types of digital money will coexist and simply serve different
    purposes.


    Note


    Stablecoins can be a good alternative to highly volatile cryptocurrencies. Their
    price is more *stable*, because it’s tied to another currency, commodity, or financial
    instrument and due to the fact that they maintain reserve assets. Some of the
    most popular stablecoins include Tether (USDT), USD Coin (USDC), and Binance USD
    (BUSD).


    ### Price Volatility


    As mentioned, cryptocurrency prices are extremely volatile. There are a couple
    of reasons for that. First, the price is influenced by demand and supply. The
    supply is typically limited (for instance, there can only ever be 21 million Bitcoins
    in circulation), and so if more people want to buy – the price goes up. On the
    other hand, significant fluctuations can be observed when so-called “crypto whales”
    (large holders of cryptocurrencies) decide to sell their assets and flood the
    market with coins. Another huge factor is hype – I already mentioned the Elon
    Musk effect. Crypto prices are highly susceptible to influencers’ and trend makers’
    opinions. Crypto markets will also react quickly to any new regulations.


    ### Scalability


    Even though by design cryptocurrency transactions should be happening in close
    to real-time, many of them struggle with performance and high-volume processing.
    As we already discussed, some blockchain networks have experienced issues and
    congestion in the past, and as it stands, there are few solutions in the market
    that could deliver user experience and speed similar to traditional card payments
    for example.'
  trans: "\n# 加密货币现象\n\n基于密码学保障、依托由大量计算机组成的分布式网络的数字货币，是区块链技术最受欢迎的应用。\n\n在第一章中，我们将揭示迄今为止全球最流行、最具价值的加密货币——`比特币`的起源。如今，已有数千种加密货币，它们也被称为“加密币”或“山寨币”；其中许多币种从诞生到消亡的速度一样快。\n\
    \n为何加密货币的概念会风靡一时？就其设计而言，它们相比传统银行体系具有若干优势：\n\n-   **基础设施**：加密货币基于分布式和去中心化的网络，无需银行介入。对于那些不信任曾引发全球重大金融危机的庞大机构的群体而言，这是一个颇具吸引力的概念。另一方面，对大多数人来说或许更重要的是，这意味着没有停机时间，也不存在单点故障的风险。\n\
    \n-   **安全性**：交易一旦发生，即被记录在区块链上，且永远无法抹除。它受到密码学的保护，对黑客攻击、欺诈和伪造具有很高的免疫力。\n\n-   **可用性**：加密货币交易市场全天候开放。支付可以不受时区差异影响，在任何时间进行。传统金融体系依赖设有固定营业时间和支付截止时间的银行及清算结算系统。而加密货币绕过了中介，直接在双方之间结算，无需银行或信用卡公司参与。\n\
    \n-   **速度**：如果你想将`100 美元`从你在伦敦的银行账户汇到朋友在纽约的银行，你的付款可能需要两到三天时间。如果你在周四汇款，你的朋友要到周一才能看到，因为传统支付在周末不进行结算。此外，你还得留意银行关于跨境交易的截止时间。如果你在截止时间（比如美元是`下午\
    \ 2 点`）之前汇款，交易当天就会开始处理。但如果你在`下午 2 点`之后汇款，你的付款就会在队列中等待次日处理。接着，你的银行会将其发送给它的代理行，然后这家代理行再发送给下一家代理行，最终才能到达你朋友的银行。通常，一笔跨境交易会涉及三到四家银行。而这还只是针对美元——全球最易获取的货币。如果转账涉及其他不太流行的货币，涉及的中介机构可能会更多。由于加密货币不需要中介，转账直接在发送方和接收方之间进行，几乎可以实时完成。\n\
    \n-   **成本**：由于缺少中介，加密货币的支付成本显著降低。在上述场景中，每一家银行都会对交易处理收费。如果你曾经向国外汇款，你就知道这些费用相当高昂。根据世界银行的分析^(²⁰)，平均费用占汇款金额的`6.3%`。使用加密货币支付直接发送给收款人，这使得整个过程更加便宜。\n\
    \n对速度、去中心化、`24/7`全天候全球可用性和成本效益的承诺，自然极具吸引力。然而，你需要记住，与由政府及中央银行背书的传统（法定）货币不同，加密货币是不受监管的，其价格主要受供需动态驱动。\n\
    \n由于加密货币市场具有高度投机性，价格可能在数小时内暴涨或暴跌。有时，仅仅一条埃隆·马斯克的推文，就能让他提到的加密货币价格飙升或暴跌。由于市场不受监管，它非常容易受到操纵。\n\
    \n> **注意**  \n> 埃隆·马斯克对`比特币`和`狗狗币`价值产生影响的现象被称为“马斯克效应”。你可以在此处了解更多信息：[`www.vox.com/recode/2021/5/18/22441831/elon-musk-bitcoin-dogecoin-crypto-prices-tesla`](http://www.vox.com/recode/2021/5/18/22441831/elon-musk-bitcoin-dogecoin-crypto-prices-tesla)。\n\
    \n现在我们来讨论一些加密货币的风险和挑战。\n\n## 缺乏监管\n\n在撰写本书时，全球只有两个国家——萨尔瓦多和中非共和国——接受`比特币`作为法定货币。许多国家正在制定适当的监管框架；然而，大多数国家将加密货币定义为金融资产和投资工具。这与当前的使用模式相符——实际上，全球大多数加密货币并非用于支付。\n\
    \n2022 年，我们目睹了几起巨大的加密货币市场丑闻，包括最大的加密货币交易所之一`FTX`的倒闭。在调查发现首席执行官山姆·班克曼-弗里德滥用客户资金，导致约`10\
    \ 亿至 20 亿美元`客户资金损失后，`FTX`于 2022 年 11 月申请破产。这些事件势必会对该市场的监管产生影响。\n\n这里值得注意的重要一点是，一些监管机构可能反应迅速，并且可能非常严厉，甚至封锁交易，使得出售加密货币变得极其困难，或导致市场价格大幅下跌。\n\
    \n另一方面，各国政府和央行承认，加密支付的趋势以及基于区块链的支付优势不容忽视。事实上，目前十分之九的央行正在研究央行数字货币（`CBDC`）——一种政府支持的新型数字货币。中国和印度是少数几个早期采用者之一，正在进行数字人民币和数字卢比的试点。`CBDC`的广泛实施可能需要一段时间，但一旦实施并成为公认的法定货币，`CBDC`可能会影响加密货币的使用。\n\
    \n预计`CBDC`将带来稳定、监管监督和政府支持等优势，这将吸引更厌恶风险的企业和个人。另一方面，它们可能无法复制加密货币的某些独特特征，如去中心化或全球可访问性。因此，这两种类型的数字货币有可能共存，并服务于不同的目的。\n\
    \n> **注意**  \n> 稳定币可以成为高波动性加密货币的良好替代品。它们的价格更*稳定*，因为它与另一种货币、大宗商品或金融工具挂钩，并且它们持有储备资产。一些最受欢迎的稳定币包括\
    \ `Tether (USDT)`、`USD Coin (USDC)` 和 `Binance USD (BUSD)`。\n\n## 价格波动性\n\n如前所述，加密货币价格波动性极大。造成这种情况的原因有几个。首先，价格受供需影响。供应量通常是有限的（例如，`比特币`的总流通量上限仅为`2100\
    \ 万`枚），因此，如果更多人想购买，价格就会上涨。另一方面，当所谓的“加密巨鲸”（持有大量加密货币的人）决定出售其资产并向市场抛售大量代币时，会出现显著的波动。另一个重要因素是炒作——我已经提到了埃隆·马斯克效应。加密价格极易受到影响者和潮流引领者观点的影响。加密市场也会对任何新的监管政策迅速做出反应。\n\
    \n## 可扩展性\n\n尽管按设计，加密货币交易应该近乎实时地发生，但许多交易在处理高性能和高交易量方面存在困难。正如我们已经讨论过的，一些区块链网络过去曾遇到过问题和拥堵，就目前而言，市场上几乎没有解决方案能够提供类似于传统卡片支付那样的用户体验和速度。\n"
- fmt: '### Security and Convenience


    Again, by design, cryptocurrencies are deemed to be safe and secure. In order
    to purchase them, however, you need to use a digital wallet and an exchange, and
    these turn out to be relatively vulnerable. You have probably seen many headlines
    about hacker attacks and millions of dollars lost. Every month we see a new crypto-scam,
    costing investors a lot of money and destroying public trust in the cryptocurrency
    space. In order to be safe and protected, crypto-wallet creators employ various
    security mechanisms, which, on the one hand, is great but, on the other hand,
    makes crypto payments even less accessible to the public.


    ### Cryptocurrencies in Hospitality and Tourism


    Cryptocurrencies are becoming relatively popular, especially among the young and
    hip Millennials and Gen Z demographic. Undoubtedly, the fact that cryptocurrency
    has no borders and foreign exchange rates makes it easier and may seem more cost-efficient.


    Let’s now take a closer look at different areas of the hospitality and tourism
    industry, where cryptocurrencies are slowly getting traction.


    #### Aviation


    Cryptocurrencies have become quite a popular payment method in the private aviation
    business. Companies like Fast Private Jet, Monarch Air, LunaJets, or JetFinder
    introduced cryptocurrencies as a payment method for private jet charters, air
    taxis, helicopters, and other luxury transportation services.


    PrivateFly recently stated that around one-fifth of its annual revenue now comes
    from digital currency payments. Fast Private Jet has also declared that a third
    of all transactions from its customers now happen through innovative crypto services.


    In fact, according to research,^([^(21)](#fn21)) 20% of private jet users would
    like to use cryptocurrency to pay for a charter, and private aviation companies
    admit that the demand for this payment option is growing. This could be correlated
    with the number of crypto millionaires that have accumulated a lot of money in
    the past few years in this market.


    One of the main reasons for cryptocurrencies’ popularity in this space is the
    24/7 availability – as we discussed previously, digital currencies are not constrained
    by the traditional banking operating hours. It’s especially useful in emergency
    situations and for last-minute bookings that happen, for instance, over the weekend.
    The transaction is executed typically within a couple of minutes, which – compared
    to one or two days at best in case of bank transfers – is a massive advantage.
    Additionally, as there are no transaction limits and there payments are typically
    high value, it’s much easier to execute it compared to a card payment for instance,
    where transactions above a certain limit will trigger fraud alerts and may result
    in temporary blocks. Transaction fees are also relatively low compared to card
    and bank transfer charges for high-value payments.


    Commercial airlines seem to be much more skeptical regarding cryptocurrency acceptance,
    which is likely related to price volatility and potentially limited customer demand.
    Some airlines, like Polish LOT, started accepting Bitcoin as early as 2015, when
    its price was increasing. This payment option, however, was removed some time
    later, when the crypto market experienced its next massive crash.


    Latvian airline *airBaltic* has become the world’s first airline to accept Bitcoin
    as payment for its tickets via BitPay – a crypto-payments processor. Interestingly,
    according to the airBaltic website, this payment option is available only for
    lower-tier (cheapest) tickets for flights booked at least five days ahead of the
    scheduled departure. At the end of 2021, the airline said that the number of bookings
    made using crypto had increased 44% year on year and that more than 1,000 customers
    had used them as a method of payment.


    In October 2021, El Salvador’s President announced^([^(22)](#fn22)) the low-cost
    airline Volaris would accept Bitcoin. This move was not surprising given El Salvador’s
    sentiment toward Bitcoin, but that plan has not yet been implemented.


    More recently, Vueling unveiled that, similar to airBaltic, it teamed up with
    BitPay and starting from 2023 will accept payments in the 13 most prominent cryptocurrencies,
    including Bitcoin, Dogecoin, Ethereum, and Litecoin.


    In May 2022, Emirates Airlines made a big announcement revealing its plans to
    recruit employees focusing on big blockchain-related projects, including crypto-payments
    acceptance.^([^(23)](#fn23)) The details and timeline were, however, not provided.


    In 2018, IATA published a “Blockchain in Aviation” White Paper, exploring potential
    applications of this technology, which has been identified as one of those that
    will have a major impact on the future of aviation. The document mentioned that
    blockchain may bring a lot of opportunities for different stakeholders in this
    industry, also in the payments and distribution space. At the same time, IATA
    pointed out that cryptocurrency volatility is a big challenge, and to address
    it, the IATA Coin concept was introduced. The concept of the IATA Coin, as outlined
    in the White Paper, aimed to address the challenge of cryptocurrency volatility
    by fixing its exchange rate to the US dollar. This approach would allow airlines
    to buy into the system and receive digital coins of a value equivalent to their
    fiat currency payments. These coins would then be usable within the IATA ecosystem
    among participating members, eliminating transaction costs and currency conversion
    fees.


    Travelers who are determined to pay for plane tickets in cryptocurrencies may,
    however, use other options; for instance, they can book through a crypto-friendly
    online travel agency like Alternative Airlines. Alternative Airlines doesn’t shy
    away from crypto, offering the possibility to pay in many quite exotic and niche
    cryptocoins. In the interview for BTN Europe,^([^(24)](#fn24)) the Alternative
    Airlines Managing Director said that currently crypto payments account for 3%
    of its total order volume and he expects that figure to be close to 30% by 2025\.
    These are typically high-value transactions for long-haul, premium products done
    by affluent customers.'
  raw: '### Security and Convenience


    Again, by design, cryptocurrencies are deemed to be safe and secure. In order
    to purchase them, however, you need to use a digital wallet and an exchange, and
    these turn out to be relatively vulnerable. You have probably seen many headlines
    about hacker attacks and millions of dollars lost. Every month we see a new crypto-scam,
    costing investors a lot of money and destroying public trust in the cryptocurrency
    space. In order to be safe and protected, crypto-wallet creators employ various
    security mechanisms, which, on the one hand, is great but, on the other hand,
    makes crypto payments even less accessible to the public.


    ### Cryptocurrencies in Hospitality and Tourism


    Cryptocurrencies are becoming relatively popular, especially among the young and
    hip Millennials and Gen Z demographic. Undoubtedly, the fact that cryptocurrency
    has no borders and foreign exchange rates makes it easier and may seem more cost-efficient.


    Let’s now take a closer look at different areas of the hospitality and tourism
    industry, where cryptocurrencies are slowly getting traction.


    #### Aviation


    Cryptocurrencies have become quite a popular payment method in the private aviation
    business. Companies like Fast Private Jet, Monarch Air, LunaJets, or JetFinder
    introduced cryptocurrencies as a payment method for private jet charters, air
    taxis, helicopters, and other luxury transportation services.


    PrivateFly recently stated that around one-fifth of its annual revenue now comes
    from digital currency payments. Fast Private Jet has also declared that a third
    of all transactions from its customers now happen through innovative crypto services.


    In fact, according to research,^([^(21)](#fn21)) 20% of private jet users would
    like to use cryptocurrency to pay for a charter, and private aviation companies
    admit that the demand for this payment option is growing. This could be correlated
    with the number of crypto millionaires that have accumulated a lot of money in
    the past few years in this market.


    One of the main reasons for cryptocurrencies’ popularity in this space is the
    24/7 availability – as we discussed previously, digital currencies are not constrained
    by the traditional banking operating hours. It’s especially useful in emergency
    situations and for last-minute bookings that happen, for instance, over the weekend.
    The transaction is executed typically within a couple of minutes, which – compared
    to one or two days at best in case of bank transfers – is a massive advantage.
    Additionally, as there are no transaction limits and there payments are typically
    high value, it’s much easier to execute it compared to a card payment for instance,
    where transactions above a certain limit will trigger fraud alerts and may result
    in temporary blocks. Transaction fees are also relatively low compared to card
    and bank transfer charges for high-value payments.


    Commercial airlines seem to be much more skeptical regarding cryptocurrency acceptance,
    which is likely related to price volatility and potentially limited customer demand.
    Some airlines, like Polish LOT, started accepting Bitcoin as early as 2015, when
    its price was increasing. This payment option, however, was removed some time
    later, when the crypto market experienced its next massive crash.


    Latvian airline *airBaltic* has become the world’s first airline to accept Bitcoin
    as payment for its tickets via BitPay – a crypto-payments processor. Interestingly,
    according to the airBaltic website, this payment option is available only for
    lower-tier (cheapest) tickets for flights booked at least five days ahead of the
    scheduled departure. At the end of 2021, the airline said that the number of bookings
    made using crypto had increased 44% year on year and that more than 1,000 customers
    had used them as a method of payment.


    In October 2021, El Salvador’s President announced^([^(22)](#fn22)) the low-cost
    airline Volaris would accept Bitcoin. This move was not surprising given El Salvador’s
    sentiment toward Bitcoin, but that plan has not yet been implemented.


    More recently, Vueling unveiled that, similar to airBaltic, it teamed up with
    BitPay and starting from 2023 will accept payments in the 13 most prominent cryptocurrencies,
    including Bitcoin, Dogecoin, Ethereum, and Litecoin.


    In May 2022, Emirates Airlines made a big announcement revealing its plans to
    recruit employees focusing on big blockchain-related projects, including crypto-payments
    acceptance.^([^(23)](#fn23)) The details and timeline were, however, not provided.


    In 2018, IATA published a “Blockchain in Aviation” White Paper, exploring potential
    applications of this technology, which has been identified as one of those that
    will have a major impact on the future of aviation. The document mentioned that
    blockchain may bring a lot of opportunities for different stakeholders in this
    industry, also in the payments and distribution space. At the same time, IATA
    pointed out that cryptocurrency volatility is a big challenge, and to address
    it, the IATA Coin concept was introduced. The concept of the IATA Coin, as outlined
    in the White Paper, aimed to address the challenge of cryptocurrency volatility
    by fixing its exchange rate to the US dollar. This approach would allow airlines
    to buy into the system and receive digital coins of a value equivalent to their
    fiat currency payments. These coins would then be usable within the IATA ecosystem
    among participating members, eliminating transaction costs and currency conversion
    fees.


    Travelers who are determined to pay for plane tickets in cryptocurrencies may,
    however, use other options; for instance, they can book through a crypto-friendly
    online travel agency like Alternative Airlines. Alternative Airlines doesn’t shy
    away from crypto, offering the possibility to pay in many quite exotic and niche
    cryptocoins. In the interview for BTN Europe,^([^(24)](#fn24)) the Alternative
    Airlines Managing Director said that currently crypto payments account for 3%
    of its total order volume and he expects that figure to be close to 30% by 2025\.
    These are typically high-value transactions for long-haul, premium products done
    by affluent customers.'
  trans: '

    ### 安全性与便利性


    同样，根据设计原理，加密货币被认为安全可靠。然而，要购买加密货币，你需要使用数字钱包和交易所，而这些渠道实际上相对脆弱。你可能见过不少关于黑客攻击和数百万美元损失的新闻头条。每个月我们都能看到新的加密货币骗局，让投资者损失惨重，并破坏公众对加密货币领域的信任。为了确保安全，加密钱包开发者采用了各种安全机制，一方面这固然很好，但另一方面却让加密货币支付对公众而言更加难以普及。


    ### 酒店与旅游业的加密货币


    加密货币正变得越来越流行，尤其是在年轻时尚的千禧一代和 Z 世代人群中。毋庸置疑，加密货币无国界、无汇率的特性使其更加便捷，并且似乎更具成本效益。


    现在，让我们仔细审视酒店与旅游业中加密货币正逐渐获得关注的各个领域。


    #### 航空业


    加密货币在私人航空业务中已成为一种相当流行的支付方式。像 Fast Private Jet、Monarch Air、LunaJets 或 JetFinder
    这样的公司，已将加密货币作为私人包机、空中出租车、直升机及其他豪华交通服务的支付方式。


    PrivateFly 近期表示，其年收入中约五分之一现在来自数字货币支付。Fast Private Jet 也宣布，其客户中三分之一的交易现在通过创新的加密服务完成。


    事实上，根据研究，^(²¹) 20%的私人飞机用户希望使用加密货币支付包机费用，而私人航空公司承认，对这种支付选项的需求正在增长。这可能与过去几年该市场涌现出大量加密百万富翁有关。


    加密货币在该领域受欢迎的主要原因之一是全天候可用性——正如我们之前讨论过的，数字货币不受传统银行营业时间的限制。这在紧急情况以及例如周末发生的最后一刻预订中尤其有用。交易通常在几分钟内完成，与银行转账至少需要一两天相比，这是一个巨大的优势。此外，由于没有交易限额，且支付金额通常很高，与信用卡支付相比，执行起来要容易得多——例如，超过特定限额的信用卡交易会触发欺诈警报，并可能导致临时冻结。对于高额支付，其交易费用也相对低于信用卡和银行转账费用。


    商业航空公司对接受加密货币似乎持怀疑态度，这可能与价格波动和潜在的客户需求有限有关。一些航空公司，如波兰 LOT 航空公司，早在 2015 年比特币价格上涨时就开始接受它。然而，当加密市场经历下一次大规模崩盘时，这个支付选项在不久后被取消了。


    拉脱维亚的*波罗的海航空*成为世界上首家通过加密支付处理器 BitPay 接受比特币支付机票的航空公司。有趣的是，根据波罗的海航空网站的信息，这个支付选项仅适用于在计划起飞前至少五天预订的最低等级（最便宜）机票。2021
    年底，该航空公司表示，使用加密货币的预订数量同比增长了 44%，并且超过 1000 名客户使用了这种支付方式。


    2021 年 10 月，萨尔瓦多总统宣布^(²²) 廉价航空公司 Volaris 将接受比特币。考虑到萨尔瓦多对比特币的态度，此举并不令人意外，但该计划尚未实施。


    最近，伏林航空透露，与波罗的海航空类似，他们已与 BitPay 合作，从 2023 年开始将接受包括比特币、狗狗币、以太坊和莱特币在内的 13 种最知名的加密货币支付。


    2022 年 5 月，阿联酋航空发布重大声明，透露计划招聘专注于大型区块链相关项目（包括接受加密支付）的员工。^(²³) 然而，并未提供详细信息和时间表。


    2018 年，国际航空运输协会发布了一份《航空业中的区块链》白皮书，探讨了这项技术的潜在应用，该技术已被确定为将对航空业未来产生重大影响的技术之一。文件提到，区块链可能为该行业的不同利益相关者带来许多机遇，在支付和分销领域也是如此。同时，国际航空运输协会指出，加密货币的波动性是一个巨大的挑战，为了解决这个问题，他们引入了
    IATA Coin 的概念。正如白皮书所概述，IATA Coin 的概念旨在通过将其汇率与美元挂钩来解决加密货币的波动性问题。这种方法将允许航空公司购买该系统的数字代币，其价值相当于他们用法定货币支付的金额。这些代币随后可在
    IATA 生态系统中的参与成员之间使用，从而消除交易成本和货币兑换费用。


    然而，决心用加密货币购买机票的旅行者可能还有其他选择；例如，他们可以通过像 Alternative Airlines 这样支持加密货币的在线旅行社进行预订。Alternative
    Airlines 并不回避加密货币，提供用许多相当小众和冷门的加密货币支付的可能性。在接受 BTN Europe 采访时，^(²⁴) Alternative
    Airlines 的总经理表示，目前加密货币支付占其总订单量的 3%，他预计到 2025 年这一数字将接近 30%。这些通常是富裕客户为长途、高端产品进行的高价值交易。

    '
- fmt: '#### 接受加密货币支付的酒店


    与航空公司类似，目前仍然只有少数酒店允许客人使用加密货币进行直接预订。我在此整理了其中大部分信息：


    - 马尔代夫和泰国的`Soneva^([^(25)](#fn25))`酒店与加密货币支付提供商`TripleA`合作，在其所有度假村（包括`Soneva Villa
    Ownership`计划）中接受比特币和以太坊支付。`Soneva`还与支付平台`Pomelo Pay`合作，通过使用安全的二维码和名为“支付链接”（payment
    link）的技术，让顾客更轻松地使用加密货币支付。


    - `Stella Stays^([^(26)](#fn26))`，一家阿联酋酒店品牌，通过其网站接受比特币、以太坊以及其他35种数字货币和加密货币。使用`Stella
    Stays`进行的交易，会以一种与美元按1:1汇率交易且能缓解汇率波动的、以美元计价的稳定币结算。


    - 位于迪拜阿尔富尔詹社区的`The Manor Hotel by JA`可进行加密货币支付，这些交易由运营全球最大加密货币交易所的公司`Binance`提供支持。


    - `Palazzo Versace Dubai`也决定使用`Binance`支付平台，为其多项服务（包括餐饮、住宿、水疗体验以及会议和活动）接受加密货币支付。这家奢华时尚的酒店接受客人通过其在线商务平台购买礼品券时，使用比特币、以太坊及其他加密货币支付。


    - 为促进加密货币交易，位于瑞士阿尔卑斯山的`Chedi Andermatt`与加密货币提供商`Worldline`和`Bitcoin Suisse`建立了合作关系。该酒店接受比特币和以太坊支付房费，最低支付金额设定为`CHF
    200.00`。`Worldline Switzerland`通过`Bitcoin Suisse`实现加密货币支付，且自身不承担波动风险。这是因为加密货币交易在确认后，会立即兑换成瑞士法郎。


    - 总部位于迪拜的酒店公司`FIVE Hotels and Resorts`于2022年6月开始接受加密货币支付，当时其在苏黎世开设了首家国际酒店。此举得益于瑞士支持加密货币的立法。向数字资产的转变反映了该酒店集团客户年轻化的特点，因为78%的客人年龄在35岁以下，这有助于他们与市场上新兴的年轻客群建立联系。首席执行官`Aloki
    Batra`声称，有一部分客户更愿意使用加密货币钱包支付，这些客户“因此宁愿选择我们的酒店，也不愿被迫使用传统方式支付。”这家娱乐酒店接受客人使用比特币和以太坊支付客房预订费用。


    - 拥有120多年历史的瑞士著名酒店`The Dolder Grand Hotel`与`BitLux private jets`合作，推出了全球首个基于加密货币的豪华旅行合作伙伴关系。这一安排使客人不仅能够用数字货币支付航班费用，还能支付酒店住宿费用。这家拥有苏黎世湖和阿尔卑斯山壮丽景色的超豪华酒店，已与瑞士金融科技公司`Inacta
    AG`合作，实现比特币交易支付。


    - `The Pavilions Hotels & Resorts`成为全球首家接受加密货币支付酒店预订的精品酒店集团。客人可以使用比特币、以太坊以及其他40种虚拟货币，在任何`Pavilions`酒店支付预订费用。该连锁酒店与全球领先的加密货币支付网关`Coindirect`建立了合作关系，以便客户通过基于电子邮件的预订中心进行加密货币支付。该集团旗下不少度假村提供金融投资机会，您可以使用加密货币来支付这些机会的费用。


    - 美国豪华酒店集团`Kessler Collection`于2021年3月宣布，客人现在可以使用比特币、比特币现金、以太坊和狗狗币等加密货币，以及`USDC`、`Binance
    USD`、`Gemini Dollar`和`PAX`等稳定币支付预订费用。`Kessler Collection`酒店会向客人提供电子发票，客人可在其`BitPay`钱包内进行支付。根据一份新闻稿，`Kessler
    Collection`是“美国第一家接受加密货币作为支付方式的豪华酒店集团。”


    - 2021年10月，`S Hotels and Resorts`与平台`FTX`建立合作伙伴关系，以便其客户能够使用加密货币在马尔代夫的两家酒店（`SAii
    Lagoon Maldives`和`Hard Rock Hotel Maldives`）进行支付。据一份新闻稿称，客户可以使用美元硬币（`USDC`）和泰达币（`USDT`）支付，并预计不久将增加更多加密货币。在`FTX`倒闭后，加密货币的接受情况如何仍不清楚。


    - 普吉岛的`Sri Panwa Phuket`度假村是另一家接受多种加密货币的豪华场所，包括比特币、以太坊、`USDT`和`USDC`。它们还在`Sri
    Panwa`的其他物业（例如位于泰国华欣和那泰的`Baba Beach Clubs`）接受加密货币交易。


    如您所见，接受加密货币支付的酒店数量仍然相对有限。毫不意外的是，当我与酒店管理者交谈时，他们的大部分担忧都集中在加密货币市场的不可预测性和波动性上。


    基于研究，许多酒店经营者承认他们正在关注加密货币的趋势。可以理解的是，加密货币对于那些专注于创新和吸引年轻、富裕客户的酒店集团来说将具有吸引力。因为入住豪华家庭度假村和面向商务旅客的酒店的人，不太可能对比特币支付感兴趣，所以这类酒店不太可能朝这个方向发展。


    ### 商务旅行


    在加密货币方面，商务旅行领域表现得更为谨慎。2019年，`Corporate Traveler`在与`BitPay`建立合作后，成为第一家接受加密货币支付的差旅管理公司（TMC），旨在“引领商务旅行领域的加密货币支付”。`Kuoni
    Business Travel`也采取了类似举措。然而，到目前为止，市场并未追随他们的步伐。


    据商务旅行协会首席执行官`Clive Wratten^([^(27)](#fn27))`称，目前商务旅行行业几乎没有使用加密货币支付的需求，这可以用缺乏需求来解释。虽然相当多的大公司已为其客户开通了加密货币支付功能，但企业对企业（B2B）的资金流动仍以传统货币进行管理。'
  raw: '#### Hotels Accepting Crypto Payments


    Similarly to airlines, there’s still only a handful of hotels that allow guests
    to make direct reservations using cryptocurrency. I’ve gathered most of them here:


    *   Soneva^([^(25)](#fn25)) hotels in the Maldives and Thailand partnered with
    TripleA, a crypto-payment provider, to accept Bitcoin and Ethereum across their
    resorts, including the Soneva Villa Ownership program. Soneva is also collaborating
    with the payment platform Pomelo Pay to make it easier for customers to pay with
    cryptocurrencies by utilizing secure QR codes and technology known as payment
    link.


    *   Stella Stays,^([^(26)](#fn26)) a UAE hospitality brand, accepts Bitcoin, Ethereum,
    and 35 other digital coins and cryptocurrencies via their website. Transactions
    made using Stella Stays are settled using a USD-denominated stablecoin that trades
    at a rate of 1:1 with the US dollar and mitigates the rate fluctuations.


    *   Cryptocurrency payments can be made at The Manor Hotel by JA in Dubai’s Al
    Furjan community, and these transactions are powered by Binance, the company that
    operates the most significant cryptocurrency exchange in the world.


    *   Palazzo Versace Dubai also decided to use Binance payment platform to accept
    crypto payments for a variety of services, including dining, room stays, spa experiences,
    as well as meetings and events. The opulent, high-fashion hotel is accepting Bitcoin,
    Ethereum, and other cryptocurrencies from guests who purchase gift vouchers through
    its online commerce platforms.


    *   To facilitate cryptocurrency transactions, the Chedi Andermatt, which is located
    in the Swiss Alps, has formed partnerships with the cryptocurrency providers Worldline
    and Bitcoin Suisse. Both Bitcoin and Ethereum are accepted forms of payment for
    room rates, with the minimum required payment set at CHF 200.00\. Worldline Switzerland
    is enabling payments with cryptocurrencies through Bitcoin Suisse without exposing
    itself to the risk of volatility. This is possible because cryptocurrency transactions
    are immediately converted into Swiss Francs after confirmation.


    *   Dubai-based hospitality company FIVE Hotels and Resorts began accepting cryptocurrency
    payments in June 2022, when it opened its first international property in Zurich.
    The move was prompted by Switzerland’s pro-crypto legislation. This shift toward
    digital assets reflects the hotel group’s young clientele, as 78% of guests are
    under the age of 35, and it helps them relate to a new demographic of guests who
    are just emerging in the market. CEO Aloki Batra claims that there is a segment
    of customers who would much rather pay with their cryptocurrency wallets, and
    these customers “would therefore rather choose our hotel over being forced to
    pay by traditional means.” The entertainment hotel accepts payments in Bitcoin
    and Ethereum from guests for room reservations.


    *   The renowned Dolder Grand Hotel in Switzerland, established over 120 years
    ago, collaborated with BitLux private jets to launch the world’s first crypto-based
    luxury travel partnership. This arrangement made it possible for guests to pay
    not only for their flights but also their hotel stays using digital currency.
    This ultra-luxury property, featuring incredible views of Lake Zurich and the
    Alps, has partnered with the Swiss financial technology company Inacta AG to enable
    transactions using Bitcoin.


    *   The Pavilions Hotels & Resorts became the first global boutique hotel group
    in the world to accept payments in cryptocurrency for hotel reservations. Guests
    are able to pay for bookings at any Pavilions residence using Bitcoin, Ethereum,
    and 40 other virtual currencies. The hotel chain has formed a partnership with
    Coindirect, a leading global cryptocurrency payment gateway, so that customers
    can make crypto payments through an email-based booking center. A good number
    of the resorts provide opportunities for financial investments, and you can pay
    for these opportunities with cryptocurrencies.


    *   The luxury US hotel group Kessler Collection made an announcement in March
    2021 that guests could now pay for bookings with cryptocurrencies such as Bitcoin,
    Bitcoin cash, Ether, and Dogecoin as well as stablecoins such as USDC, Binance
    USD, Gemini Dollar, and PAX. The Kessler Collection hotels provide their guests
    with an electronic invoice that can be paid from within their BitPay wallets.
    According to a press release, The Kessler Collection is the “first U.S. luxury
    hotel group to accept cryptocurrency as a form of payment.”


    *   In October 2021, S Hotels and Resorts formed a partnership with the platform
    FTX in order to provide its customers with the ability to use cryptocurrencies
    to make payments at two of its properties located in the Maldives. These properties
    are the SAii Lagoon Maldives and the Hard Rock Hotel Maldives. According to a
    press release, customers can pay with both USD Coins (USDC) and Tether tokens
    (USDT), and more cryptocurrencies were expected to be added in the near future.
    What happened with the cryptocurrency acceptance after the collapse of FTX remains
    unclear.


    *   Sri Panwa Phuket resort is another luxury establishment taking a variety of
    cryptocurrencies, including Bitcoin, Ethereum, USDT, and USDC. They also accept
    cryptocurrency transactions at other Sri Panwa properties, such as the Baba Beach
    Clubs in Hua Hin and Natai, both of which are located in Thailand.


    As you can see, the number of hotels that accept cryptocurrency payments is still
    relatively limited. Unsurprisingly, when I talk to hospitality managers, the majority
    of their concerns center on unpredictability and the volatility of the cryptocurrencies
    market.


    Based on research, many hoteliers admit they’re keeping an eye on the cryptocurrency
    trend. Understandably, cryptocurrencies will be interesting to these hotel groups
    that focus on innovation and attracting younger, affluent clientele. Because the
    people staying at luxury family resorts and hotels that cater to business travelers
    aren’t likely to be interested in paying with Bitcoin, these types of establishments
    are less likely to move in that direction.


    ### Corporate Travel


    When it comes to cryptocurrencies, the business travel sector exercises an even
    greater degree of caution. In 2019, Corporate Traveler became the first travel
    management company (TMC) to accept cryptocurrency payments after entering into
    a partnership with BitPay designed to “spearhead cryptocurrency payments in the
    business travel sector.” Kuoni Business Travel made a similar move. The market,
    however, did not follow their lead so far.


    According to Clive Wratten,^([^(27)](#fn27)) chief executive of the Business Travel
    Association, there is currently little to no appetite for making payments using
    cryptocurrencies in the business travel industry, which can be explained by a
    lack of demand. While there’s a decent number of big corporations that have enabled
    cryptocurrency payments for their clients, the business-to-business flows are
    still managed in traditional currencies.'
  trans: '

    #### 接受加密货币支付的酒店


    与航空公司类似，目前仍然只有少数酒店允许客人使用加密货币进行直接预订。我在此整理了其中大部分信息：


    -   马尔代夫和泰国的`Soneva^(²⁵)`酒店与加密货币支付提供商`TripleA`合作，在其所有度假村（包括`Soneva Villa Ownership`计划）中接受比特币和以太坊支付。`Soneva`还与支付平台`Pomelo
    Pay`合作，通过使用安全的二维码和名为“支付链接”（payment link）的技术，让顾客更轻松地使用加密货币支付。


    -   `Stella Stays^(²⁶)`，一家阿联酋酒店品牌，通过其网站接受比特币、以太坊以及其他 35 种数字货币和加密货币。使用`Stella Stays`进行的交易，会以一种与美元按
    1:1 汇率交易且能缓解汇率波动的、以美元计价的稳定币结算。


    -   位于迪拜阿尔富尔詹社区的`The Manor Hotel by JA`可进行加密货币支付，这些交易由运营全球最大加密货币交易所的公司`Binance`提供支持。


    -   `Palazzo Versace Dubai`也决定使用`Binance`支付平台，为其多项服务（包括餐饮、住宿、水疗体验以及会议和活动）接受加密货币支付。这家奢华时尚的酒店接受客人通过其在线商务平台购买礼品券时，使用比特币、以太坊及其他加密货币支付。


    -   为促进加密货币交易，位于瑞士阿尔卑斯山的`Chedi Andermatt`与加密货币提供商`Worldline`和`Bitcoin Suisse`建立了合作关系。该酒店接受比特币和以太坊支付房费，最低支付金额设定为`CHF
    200.00`。`Worldline Switzerland`通过`Bitcoin Suisse`实现加密货币支付，且自身不承担波动风险。这是因为加密货币交易在确认后，会立即兑换成瑞士法郎。


    -   总部位于迪拜的酒店公司`FIVE Hotels and Resorts`于 2022 年 6 月开始接受加密货币支付，当时其在苏黎世开设了首家国际酒店。此举得益于瑞士支持加密货币的立法。向数字资产的转变反映了该酒店集团客户年轻化的特点，因为
    78%的客人年龄在 35 岁以下，这有助于他们与市场上新兴的年轻客群建立联系。首席执行官`Aloki Batra`声称，有一部分客户更愿意使用加密货币钱包支付，这些客户“因此宁愿选择我们的酒店，也不愿被迫使用传统方式支付。”这家娱乐酒店接受客人使用比特币和以太坊支付客房预订费用。


    -   拥有 120 多年历史的瑞士著名酒店`The Dolder Grand Hotel`与`BitLux private jets`合作，推出了全球首个基于加密货币的豪华旅行合作伙伴关系。这一安排使客人不仅能够用数字货币支付航班费用，还能支付酒店住宿费用。这家拥有苏黎世湖和阿尔卑斯山壮丽景色的超豪华酒店，已与瑞士金融科技公司`Inacta
    AG`合作，实现比特币交易支付。


    -   `The Pavilions Hotels & Resorts`成为全球首家接受加密货币支付酒店预订的精品酒店集团。客人可以使用比特币、以太坊以及其他
    40 种虚拟货币，在任何`Pavilions`酒店支付预订费用。该连锁酒店与全球领先的加密货币支付网关`Coindirect`建立了合作关系，以便客户通过基于电子邮件的预订中心进行加密货币支付。该集团旗下不少度假村提供金融投资机会，您可以使用加密货币来支付这些机会的费用。


    -   美国豪华酒店集团`Kessler Collection`于 2021 年 3 月宣布，客人现在可以使用比特币、比特币现金、以太坊和狗狗币等加密货币，以及`USDC`、`Binance
    USD`、`Gemini Dollar`和`PAX`等稳定币支付预订费用。`Kessler Collection`酒店会向客人提供电子发票，客人可在其`BitPay`钱包内进行支付。根据一份新闻稿，`Kessler
    Collection`是“美国第一家接受加密货币作为支付方式的豪华酒店集团。”


    -   2021 年 10 月，`S Hotels and Resorts`与平台`FTX`建立合作伙伴关系，以便其客户能够使用加密货币在马尔代夫的两家酒店（`SAii
    Lagoon Maldives`和`Hard Rock Hotel Maldives`）进行支付。据一份新闻稿称，客户可以使用美元硬币（`USDC`）和泰达币（`USDT`）支付，并预计不久将增加更多加密货币。在`FTX`倒闭后，加密货币的接受情况如何仍不清楚。


    -   普吉岛的`Sri Panwa Phuket`度假村是另一家接受多种加密货币的豪华场所，包括比特币、以太坊、`USDT`和`USDC`。它们还在`Sri
    Panwa`的其他物业（例如位于泰国华欣和那泰的`Baba Beach Clubs`）接受加密货币交易。


    如您所见，接受加密货币支付的酒店数量仍然相对有限。毫不意外的是，当我与酒店管理者交谈时，他们的大部分担忧都集中在加密货币市场的不可预测性和波动性上。


    基于研究，许多酒店经营者承认他们正在关注加密货币的趋势。可以理解的是，加密货币对于那些专注于创新和吸引年轻、富裕客户的酒店集团来说将具有吸引力。因为入住豪华家庭度假村和面向商务旅客的酒店的人，不太可能对比特币支付感兴趣，所以这类酒店不太可能朝这个方向发展。


    ### 商务旅行


    在加密货币方面，商务旅行领域表现得更为谨慎。2019 年，`Corporate Traveler`在与`BitPay`建立合作后，成为第一家接受加密货币支付的差旅管理公司（TMC），旨在“引领商务旅行领域的加密货币支付”。`Kuoni
    Business Travel`也采取了类似举措。然而，到目前为止，市场并未追随他们的步伐。


    据商务旅行协会首席执行官`Clive Wratten^(²⁷)`称，目前商务旅行行业几乎没有使用加密货币支付的需求，这可以用缺乏需求来解释。虽然相当多的大公司已为其客户开通了加密货币支付功能，但企业对企业（B2B）的资金流动仍以传统货币进行管理。

