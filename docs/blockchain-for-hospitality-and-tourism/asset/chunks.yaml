    # 6. Decentralized Booking Platforms


    Decentralized booking platforms have the potential to disrupt the traditional
    model of booking travel through Global Distribution Systems (GDS) and Online Travel
    Agencies (OTAs). Some industry experts claim that regaining direct access to travelers
    and bypassing intermediaries, which can be achieved through blockchain-based platforms,
    will generate major savings for the whole hospitality and tourism industry.


    In this chapter, we will uncover the advantages and opportunities that decentralized
    booking platforms powered by blockchain can offer to the hospitality and tourism
    industry. We will explore how these platforms can disrupt the traditional model
    of booking travel through GDS and OTAs and the potential savings they can generate
    for industry stakeholders.


    ## The Challenges of Traditional Booking Model


    Global Distribution Systems and Online Travel Agencies play a significant role
    in the industry. Both enable travel booking. GDSs like `Amadeus` or `Sabre` are
    used by travel agents and travel management companies as reservation systems.
    OTAs, such as `Booking.com`, are online platforms that allow customers to book
    a trip directly with the service provider. Today, it’s difficult to imagine how
    the industry would operate without them. But they also come with some challenges.


    High commissions are one of the main issues. Every airline ticket purchase comes
    with an extra charge of approx. 12 USD. Hotels are often required to pay 15–25%
    fee for booking made through an OTA. Preferential listing will cost you around
    3% more. Naturally, this can eat into your profits and be a substantial burden,
    especially if you run a small business.


    Another challenge is lack of control over pricing and inventory. The intermediaries
    have the power to set prices and offer discounts and promotions, and service providers
    actually have little say in the matter. Additionally, GDS and OTAs may require
    service providers to meet certain criteria, such as minimum room rates, in order
    to be listed on their platform, which can limit the options available to consumers.


    Moreover, GDS and OTAs have access to valuable customer data, which they may or
    may not share with the providers. You effectively lose the opportunity to gain
    important insights and ability to provide personalized experiences. You may not
    even have access to customer’s email or booking history, which will naturally
    limit your ability to engage with the guest directly.


    Transparency is also an issue. GDS and OTAs often lack transparency in the pricing
    and commission fees they charge, which can lead to mistrust and confusion among
    service providers and consumers. The booking systems may, for instance, prioritize
    certain service providers over others (these are the preferential listings that
    you see on top of the booking website), making it difficult for consumers to find
    the best options for their needs.


    All these challenges led to the development of decentralized booking platforms.'
