    '
- fmt: '| New channel for marketing and promotion | The Metaverse also has the potential
    to revolutionize the travel industry by providing a new platform for travel planning,
    booking, and experiences. The travel industry is already embracing digital transformation,
    with the rise of online travel agencies, mobile apps, and social media influencing
    travel decision-making. The Metaverse offers a new level of engagement and interactivity,
    allowing travelers to explore destinations and experiences in a more immersive
    and interactive way, leading to higher conversion rates. Hotels and resorts can
    create virtual environments that simulate real-world destinations, allowing potential
    guests to experience the property before they book. Broadly speaking, the Metaverse
    can fundamentally change the way that travelers engage and purchase. Hotel brands
    and travel operators will be able to deploy new services and enhance their marketing
    activities, offer essential information about property features, personalize rooms
    and itineraries, and enable seamless booking experience to cater to guest expectations,
    respond quickly to new trends, and grow the revenue. Thanks to the Metaverse,
    travelers will be able to access destinations and places otherwise unattainable.
    For some, it would be the Moon or the bottom of the ocean, for others – Hegra’s
    Tomb of Lihyan in Saudi Arabia’s AlUla.^([^(78)](#fn78))


    **Note**: In fact, the 2021 global survey by Statista^([^(79)](#fn79)) found that
    39% of respondents listed the ability of the metaverse to help users overcome
    obstacles, such as disabilities, as the most important benefit of this technology.
    Other benefits mentioned in the survey included the ability to explore new places
    and experiences (33%), the ability to socialize and connect with others (29%),
    and the ability to work and collaborate with others (26%). The survey also found
    that younger people were more likely to see the metaverse as an important development,
    with 59% of those aged 18–24 saying they were excited about its potential.


    | New revenue sources | Hotels and resorts can create virtual experiences and
    activities that complement their physical offerings, such as virtual surfing,
    scuba diving, or skydiving. Tour operators can offer virtual tours of historical
    sites, museums, or natural landmarks. This creates new revenue streams as guests
    can pay to participate in these virtual experiences, even if they are not physically
    present on the property. Virtual events, such as concerts, trade shows, and conferences,
    can also be hosted in the Metaverse, allowing hotels and resorts to generate revenue
    from event rental fees, sponsorships, and ticket sales.


    | Enhanced guest experience | Hotels can create virtual concierge services, where
    guests can interact with virtual assistants to book services, order room service,
    or request information about the property or surrounding area. Virtual concierge
    services can provide a more personalized and convenient experience for guests,
    as they can access the service from their mobile devices or in-room tablets. Digital
    twins^([^(80)](#fn80)) and 3D virtual tours can mimic the experience of hotel
    rooms, features, and amenities and create a higher level of confidence about property
    selection that will lead to higher conversion rates of bookings. It’s a typical
    “try it before you buy it” approach. It creates a new level of engagement and
    excitement, as guests can explore the property and its surroundings in a more
    immersive and interactive way.


    | Personalization | The Metaverse can help the hospitality and travel industry
    provide more personalized experiences in several ways. First, the Metaverse allows
    large-scale data collection and analysis of travelers’ preferences and behaviors.
    Travel companies can learn about clients’ preferences, interests, and behaviors
    from their virtual interactions. This data can be used to tailor travel recommendations
    to individual requirements and preferences. Second, the Metaverse enhances virtual
    customization. Travelers can personalize their Metaverse experiences with virtual
    settings and avatars. This can make trips more immersive and personalized. Third,
    the Metaverse improves traveler-travel company cooperation. Travelers can create
    virtual experiences and assets on decentralized networks. This engages travelers
    and gives travel businesses valuable customer feedback. The Metaverse improves
    virtual-physical integration. Travel firms may offer more unified and personalized
    experiences by integrating physical and virtual encounters. A hotel business may
    use the Metaverse to provide travelers virtual tours of their properties before
    they book, giving them a more personalized and engaging experience.


    | New model for the MICE industry | Digital twins and virtual tours can also be
    used as a planning tool for travel agents and event planners, who can preview
    and book properties for their clients without the need for physical visits. Offering
    interactive site inspection can be a game changer for the MICE industry. Imagine
    you’re an event planner. Today, you have to spend a lot of time and money to visit
    the event space, check the floor plan and amenities, and maybe plan the seating
    or decorations and lighting. In the Metaverse, you’ll be able to do it through
    your avatar, saving time and money on travel. You will likely be more inclined
    to book a venue you can easily visit and experience in a virtual way because it’s
    much more efficient. For hotels that rely on the MICE business, having a digital
    twin and humanoid chatbots that can lead the sales process will be a must. In
    fact, there are already properties that experiment with metaverse digital twins
    and spaces. Madrid Marriott Auditorium Hotel and Atlantis in Dubai work with a
    company called Randezverse that delivers virtual site inspection app and headsets
    specifically to cater for MICE purposes.


    | Optimized operations | Digital twins can be used to optimize hotel operations,
    for example, by predicting maintenance needs and energy usage. Data from various
    systems such as HVAC, lighting, and security systems can be used to create a virtual
    replica of the hotel’s physical assets, which can help predict maintenance needs
    and energy usage. For example, if the digital twin identifies that a particular
    HVAC unit is not functioning correctly, it can alert maintenance staff to address
    the issue before it becomes a more significant problem. Similarly, if the digital
    twin predicts high energy usage during peak hours, hotel management can adjust
    energy consumption to reduce costs. Digital twins can also help optimize staffing
    levels by predicting guest arrival times, enabling hotel management to adjust
    staffing levels accordingly.


    | Training | Training is another important application of the Metaverse technologies
    in the hospitality and travel industry. Digital twins along with VR and AR can
    be used to create realistic simulations to train, for instance, housekeeping staff
    on the proper cleaning procedures. Similarly, airlines can use digital twins to
    create virtual replicas of aircrafts, which can be used to train flight attendants
    on emergency procedures. Training in the metaverse has several advantages over
    traditional training methods. It allows trainees to experience situations in a
    safe and controlled environment, without the risk of injury or damage to physical
    assets. It also allows trainees to practice skills repeatedly until they are comfortable
    and confident in performing them. In addition, training in the metaverse is more
    cost-effective than traditional training methods, as it eliminates the need for
    physical assets and equipment.


    | New partnerships and collaborations | Hotels and travel companies can partner
    with other businesses and organizations to create immersive experiences that complement
    their offerings. For example, a hotel could partner with a local tour operator
    to create a virtual tour of nearby attractions, or with a restaurant to offer
    a virtual cooking class. This creates new opportunities for cross-promotion and
    collaboration, as well as new revenue streams for the businesses involved.'
  raw: '| New channel for marketing and promotion | The Metaverse also has the potential
    to revolutionize the travel industry by providing a new platform for travel planning,
    booking, and experiences. The travel industry is already embracing digital transformation,
    with the rise of online travel agencies, mobile apps, and social media influencing
    travel decision-making. The Metaverse offers a new level of engagement and interactivity,
    allowing travelers to explore destinations and experiences in a more immersive
    and interactive way, leading to higher conversion rates.Hotels and resorts can
    create virtual environments that simulate real-world destinations, allowing potential
    guests to experience the property before they book. Broadly speaking, the Metaverse
    can fundamentally change the way that travelers engage and purchase. Hotel brands
    and travel operators will be able to deploy new services and enhance their marketing
    activities, offer essential information about property features, personalize rooms
    and itineraries, and enable seamless booking experience to cater to guest expectations,
    respond quickly to new trends, and grow the revenue. Thanks to the Metaverse,
    travelers will be able to access destinations and places otherwise unattainable.
    For some, it would be the Moon or the bottom of the ocean, for others – Hegra’s
    Tomb of Lihyan in Saudi Arabia’s AlUla.^([^(78)](#fn78))**Note** In fact, the
    2021 global survey by Statista^([^(79)](#fn79)) found that 39% of respondents
    listed the ability of the metaverse to help users overcome obstacles, such as
    disabilities, as the most important benefit of this technology. Other benefits
    mentioned in the survey included the ability to explore new places and experiences
    (33%), the ability to socialize and connect with others (29%), and the ability
    to work and collaborate with others (26%). The survey also found that younger
    people were more likely to see the metaverse as an important development, with
    59% of those aged 18–24 saying they were excited about its potential. |

    | New revenue sources | Hotels and resorts can create virtual experiences and
    activities that complement their physical offerings, such as virtual surfing,
    scuba diving, or skydiving. Tour operators can offer virtual tours of historical
    sites, museums, or natural landmarks. This creates new revenue streams as guests
    can pay to participate in these virtual experiences, even if they are not physically
    present on the property. Virtual events, such as concerts, trade shows, and conferences,
    can also be hosted in the Metaverse, allowing hotels and resorts to generate revenue
    from event rental fees, sponsorships, and ticket sales. |

    | Enhanced guest experience | Hotels can create virtual concierge services, where
    guests can interact with virtual assistants to book services, order room service,
    or request information about the property or surrounding area. Virtual concierge
    services can provide a more personalized and convenient experience for guests,
    as they can access the service from their mobile devices or in-room tablets. Digital
    twins^([^(80)](#fn80)) and 3D virtual tours can mimic the experience of hotel
    rooms, features, and amenities and create a higher level of confidence about property
    selection that will lead to higher conversion rates of bookings. It’s a typical
    “try it before you buy it” approach. It creates a new level of engagement and
    excitement, as guests can explore the property and its surroundings in a more
    immersive and interactive way. |

    | Personalization | The Metaverse can help the hospitality and travel industry
    provide more personalized experiences in several ways.First, the Metaverse allows
    large-scale data collection and analysis of travelers’ preferences and behaviors.
    Travel companies can learn about clients’ preferences, interests, and behaviors
    from their virtual interactions. This data can be used to tailor travel recommendations
    to individual requirements and preferences.Second, the Metaverse enhances virtual
    customization. Travelers can personalize their Metaverse experiences with virtual
    settings and avatars. This can make trips more immersive and personalized.Third,
    the Metaverse improves traveler-travel company cooperation. Travelers can create
    virtual experiences and assets on decentralized networks. This engages travelers
    and gives travel businesses valuable customer feedback.The Metaverse improves
    virtual-physical integration. Travel firms may offer more unified and personalized
    experiences by integrating physical and virtual encounters. A hotel business may
    use the Metaverse to provide travelers virtual tours of their properties before
    they book, giving them a more personalized and engaging experience. |

    | New model for the MICE industry | Digital twins and virtual tours can also be
    used as a planning tool for travel agents and event planners, who can preview
    and book properties for their clients without the need for physical visits. Offering
    interactive site inspection can be a game changer for the MICE industry. Imagine
    you’re an event planner. Today, you have to spend a lot of time and money to visit
    the event space, check the floor plan and amenities, and maybe plan the seating
    or decorations and lighting. In the Metaverse, you’ll be able to do it through
    your avatar, saving time and money on travel. You will likely be more inclined
    to book a venue you can easily visit and experience in a virtual way because it’s
    much more efficient. For hotels that rely on the MICE business, having a digital
    twin and humanoid chatbots that can lead the sales process will be a must. In
    fact, there are already properties that experiment with metaverse digital twins
    and spaces. Madrid Marriott Auditorium Hotel and Atlantis in Dubai work with a
    company called Randezverse that delivers virtual site inspection app and headsets
    specifically to cater for MICE purposes. |

    | Optimized operations | Digital twins can be used to optimize hotel operations,
    for example, by predicting maintenance needs and energy usage. Data from various
    systems such as HVAC, lighting, and security systems can be used to create a virtual
    replica of the hotel’s physical assets, which can help predict maintenance needs
    and energy usage. For example, if the digital twin identifies that a particular
    HVAC unit is not functioning correctly, it can alert maintenance staff to address
    the issue before it becomes a more significant problem. Similarly, if the digital
    twin predicts high energy usage during peak hours, hotel management can adjust
    energy consumption to reduce costs. Digital twins can also help optimize staffing
    levels by predicting guest arrival times, enabling hotel management to adjust
    staffing levels accordingly. |

    | Training | Training is another important application of the Metaverse technologies
    in the hospitality and travel industry. Digital twins along with VR and AR can
    be used to create realistic simulations to train, for instance, housekeeping staff
    on the proper cleaning procedures. Similarly, airlines can use digital twins to
    create virtual replicas of aircrafts, which can be used to train flight attendants
    on emergency procedures. Training in the metaverse has several advantages over
    traditional training methods. It allows trainees to experience situations in a
    safe and controlled environment, without the risk of injury or damage to physical
    assets. It also allows trainees to practice skills repeatedly until they are comfortable
    and confident in performing them. In addition, training in the metaverse is more
    cost-effective than traditional training methods, as it eliminates the need for
    physical assets and equipment. |

    | New partnerships and collaborations | Hotels and travel companies can partner
    with other businesses and organizations to create immersive experiences that complement
    their offerings. For example, a hotel could partner with a local tour operator
    to create a virtual tour of nearby attractions, or with a restaurant to offer
    a virtual cooking class. This creates new opportunities for cross-promotion and
    collaboration, as well as new revenue streams for the businesses involved. |'
  trans: '

    | 市场营销与推广新渠道 | 元宇宙还有潜力通过为旅行规划、预订和体验提供新平台，彻底改变旅游业。随着在线旅行社、移动应用和社交媒体影响旅行决策，旅游业已经在拥抱数字化转型。元宇宙提供了更高层次的参与感和互动性，让旅行者能够以更具沉浸感和互动性的方式探索目的地与体验，从而提高转化率。酒店和度假村可以创建模拟真实目的地的虚拟环境，让潜在客人在预订前就能体验物业。从广义上讲，元宇宙可以从根本上改变旅行者互动和购买的方式。酒店品牌和旅游运营商将能够部署新服务、增强营销活动、提供关于物业特色的重要信息、个性化定制客房和行程，并实现无缝的预订体验，以满足客人期望、快速响应新趋势并增加收入。得益于元宇宙，旅行者将能够访问原本无法企及的目的地和地点。对一些人来说，可能是月球或海底，对另一些人来说，则可能是沙特阿拉伯埃尔奥拉的李西安之墓。^(⁷⁸)


    **注意**：事实上，Statista^(⁷⁹) 2021 年的全球调查发现，39%的受访者将元宇宙帮助用户克服障碍（如残疾）的能力列为该技术最重要的益处。调查中提到的其他益处包括探索新地点和体验的能力（33%）、社交和与他人联系的能力（29%），以及与他人工作和协作的能力（26%）。调查还发现，年轻人更倾向于将元宇宙视为重要发展，在
    18-24 岁年龄段中，有 59%的人表示对其潜力感到兴奋。


    | 新收入来源 | 酒店和度假村可以创建补充其实体服务的虚拟体验和活动，例如虚拟冲浪、水肺潜水或跳伞。旅游运营商可以提供历史遗址、博物馆或自然地标的虚拟游览。这创造了新的收入来源，因为客人即使不在物业现场，也可以付费参与这些虚拟体验。虚拟活动，如音乐会、贸易展和会议，也可以在元宇宙中举办，使酒店和度假村能够通过活动场地租赁费、赞助费和门票销售来创收。


    | 增强的宾客体验 | 酒店可以创建虚拟礼宾服务，让客人可以与虚拟助手互动来预订服务、点客房送餐或查询物业及周边地区信息。虚拟礼宾服务可以为客人提供更个性化和便捷的体验，因为他们可以通过移动设备或客房内的平板电脑访问该服务。数字孪生^(⁸⁰)和
    3D 虚拟游览可以模拟酒店客房、特色设施和配套，从而增强客人对物业选择的信心，进而提高预订转化率。这是一种典型的“先试后买”方法。它创造了更高层次的参与感和兴奋感，因为客人可以以更具沉浸感和互动性的方式探索物业及其周边环境。


    | 个性化 | 元宇宙可以通过多种方式帮助酒店和旅游业提供更个性化的体验。首先，元宇宙允许大规模收集和分析旅行者的偏好与行为。旅游公司可以从客户的虚拟互动中了解他们的偏好、兴趣和行为。这些数据可用于根据个人需求和偏好定制旅行推荐。其次，元宇宙增强了虚拟定制功能。旅行者可以通过虚拟设置和头像个性化自己的元宇宙体验。这可以使旅行更具沉浸感和个性化。第三，元宇宙改善了旅行者与旅游公司之间的合作。旅行者可以在去中心化网络上创建虚拟体验和资产。这既吸引了旅行者，又为旅游企业提供了宝贵的客户反馈。元宇宙还促进了虚实融合。通过整合实体和虚拟接触点，旅游公司可以提供更统一、更个性化的体验。例如，酒店企业可以利用元宇宙在客人预订前提供物业的虚拟游览，从而为他们带来更个性化、更具吸引力的体验。


    | 会展行业新模式 | 数字孪生和虚拟游览也可作为旅行社和活动策划者的规划工具，他们无需实地考察即可为客户预览和预订物业。提供互动式场地考察可能会改变会展行业的游戏规则。想象一下，你是一名活动策划者。如今，你必须花费大量时间和金钱去实地考察活动场地、检查平面图和设施，也许还要规划座位、装饰和灯光。而在元宇宙中，你将能够通过你的化身完成这一切，节省出差的时间和金钱。你可能会更倾向于预订一个你能轻松通过虚拟方式访问和体验的场地，因为这效率高得多。对于依赖会展业务的酒店来说，拥有数字孪生和能主导销售流程的人形聊天机器人将是必备条件。事实上，已经有物业在尝试元宇宙数字孪生和空间。马德里万豪酒店大礼堂和迪拜的亚特兰蒂斯酒店正在与一家名为
    Randezverse 的公司合作，该公司专门提供用于会展目的的虚拟场地考察应用和头戴设备。


    | 优化运营 | 数字孪生可用于优化酒店运营，例如通过预测维护需求和能源使用情况。来自暖通空调、照明和安防等系统的数据可用于创建酒店实物资产的虚拟副本，这有助于预测维护需求和能源使用。例如，如果数字孪生识别出某个暖通空调机组运行不正常，它可以提醒维护人员在问题变得更严重之前进行处理。同样，如果数字孪生预测到高峰时段的能源使用量过高，酒店管理层可以调整能源消耗以降低成本。数字孪生还可以通过预测客人抵达时间来帮助优化人员配置水平，使酒店管理层能够相应调整员工数量。


    | 培训 | 培训是元宇宙技术在酒店和旅游业中的另一个重要应用。数字孪生以及虚拟现实（VR）和增强现实（AR）可用于创建逼真的模拟场景，例如培训客房服务人员掌握正确的清洁程序。同样，航空公司可以利用数字孪生创建飞机的虚拟副本，用于培训乘务员应对紧急程序。在元宇宙中进行培训相比传统培训方法具有多项优势。它允许受训者在安全、受控的环境中体验各种情况，没有受伤或损坏实物资产的风险。它还允许受训者反复练习技能，直到他们能够熟练、自信地操作。此外，在元宇宙中进行培训比传统培训方法更具成本效益，因为它无需实物资产和设备。


    | 新的伙伴关系与合作 | 酒店和旅游公司可以与其他企业及组织合作，创建沉浸式体验，以补充其自身服务。例如，一家酒店可以与当地旅游运营商合作创建附近景点的虚拟游览，或者与一家餐厅合作提供虚拟烹饪课程。这为交叉推广与合作创造了新的机会，也为参与的企业带来了新的收入来源。

    '
- fmt: Let’s now look at examples of hotels that have started exploring different
    applications of the Metaverse.
  raw: Let’s now look at examples of hotels that have started exploring different
    applications of the Metaverse.
  trans: "  \n现在，让我们来看一些已经开始探索元宇宙不同应用场景的酒店示例。  \n"
- fmt: '| 虚拟导览与体验 | 喜来登酒店及度假村与宏达国际电子股份有限公司（HTC VIVE）合作推出了一项名为“喜来登增强现实（Sheraton AR）”的虚拟现实体验，让客人能够探索并与其酒店的数字版本进行互动。该体验包括客房、大堂及其他酒店空间的虚拟导览。
    |

    | 雅高酒店集团创建了一个名为“雅高酒店展示平台（AccorHotels Showcase）”的虚拟现实平台，供客人在虚拟环境中探索并预订客房、查看设施以及进行预订。该平台可在桌面端和移动设备上使用。
    |

    | 万豪国际集团创建了一个名为“虚拟客房服务（VRoom Service）”的虚拟现实旅行体验，让客人在预订前就能探索不同的目的地和体验。该项目在全球部分酒店提供。
    |

    | 希尔顿酒店集团推出了一项名为“客房视图（Room View）”的虚拟现实体验，让客人在抵达前即可预览并定制自己的房间。该体验包括房间的虚拟导览，并允许客人选择房间特色和设施。
    |

    | 洲际酒店集团（IHG）与腾讯合作，在微信应用中创建了一个虚拟酒店，让客人在虚拟环境中探索并预订客房、查看设施以及进行预订。 |

    | 数字孪生 | 香港半岛酒店实施了数字孪生系统，以提高运营效率并提供更好的宾客体验。该系统使用传感器和其他物联网（IoT）设备来收集酒店各方面的数据，例如入住率、能耗和宾客偏好。这些数据随后被用于创建酒店的数字孪生，以优化运营并个性化宾客体验。
    |

    | 万豪国际集团与房地产科技公司`BuildingMinds`合作，为其酒店开发数字孪生系统。该系统使用物联网传感器收集酒店各方面的数据，例如能耗、温度和湿度。随后利用这些数据创建酒店的数字孪生，以优化运营并改善宾客体验。万豪还与虚拟活动平台`Hopin`合作，为其客户打造虚拟和混合活动体验。该平台包括虚拟大堂、社交休息室和分组讨论室等功能，所有设计都旨在复制参加线下活动的体验。
    |

    |   | 洲际酒店及度假村品牌正在利用数字孪生来增强宾客体验并改善酒店运营。例如，该公司开发了其悉尼酒店的数字孪生，使客人能够在抵达前虚拟探索酒店的客房和设施。该数字孪生还允许酒店员工监控和调整能源使用，优化房间布局和家具陈设，并识别可能需要维护的区域。
    |

    | 丽笙酒店集团正利用数字孪生技术提高其酒店的能效和可持续性。通过创建其物业的数字副本，该公司可以分析能源使用模式，并确定可以改进的领域。例如，数字孪生可能会揭示某些房间或区域的能耗高于其他房间或区域，从而使酒店能够采取有针对性的措施来减少消耗和降低成本。
    |

    | 拉斯维加斯永利酒店已为其整个物业（包括酒店客房、餐厅和赌场楼层）实施了数字孪生。该数字孪生使酒店能够实时监控和优化其运营，并追踪客人和员工在酒店内的移动情况。这些信息用于改善宾客体验，并确保酒店内所有人的安全。
    |

    | 佛罗里达州萨拉索塔的丽思卡尔顿酒店已为其客房实施了数字孪生。该数字孪生包含每个房间布局、家具和陈设的详细信息，以及窗户、门和电源插座等关键功能的位置。这些信息用于优化酒店客房部的运营，确保以最高效的方式清洁和准备每个房间，迎接下一位客人。其他丽思卡尔顿酒店物业，包括东京和阿斯塔纳，则利用包含房间
    3D 复制品和互动功能（例如可以调节房间灯光和温度）的虚拟导览，让客人更好地感受入住酒店的真实体验，并展示丽思卡尔顿品牌闻名遐迩的独特设施和便利条件。 |

    | 虚拟会议和活动 | 拉斯维加斯威尼斯人度假村与一家名为`Event Farm`的公司合作，创建了一个名为“威尼斯人度假村数字活动”的虚拟活动平台。该平台允许活动组织者在元宇宙环境中创建沉浸式、互动性强的活动，配备虚拟展位、社交机会和直播功能。该平台旨在为活动参与者提供更具吸引力和互动性的体验，同时为活动组织者提供更大的灵活性和对活动体验的控制力。
    |

    | 凯悦酒店集团推出了一个名为“凯悦携手（Hyatt Together）”的新平台，该平台利用元宇宙技术促进虚拟会议和活动。该平台允许活动组织者创建自定义虚拟空间，配备互动功能，如
    3D 头像、虚拟白板和视频会议功能。其目标是为活动参与者提供更具吸引力和沉浸感的体验，同时使活动组织者更容易管理和协调虚拟活动。 |

    | 希尔顿酒店集团与一家名为`MeetinVR`的公司合作，创建了一个名为“希尔顿随时准备活动与清洁承诺（Hilton EventReady with CleanStay）”的虚拟活动平台。该平台允许活动组织者在元宇宙环境中创建虚拟活动，配备互动功能，如虚拟现实分组讨论会、3D
    头像和直播功能。该平台旨在为活动参与者提供更具吸引力和沉浸感的体验，同时为活动组织者提供更大的灵活性和对活动体验的控制力。 |

    | 万豪国际集团推出了一个名为“万豪旅享家活动（Marriott Bonvoy Events）”的虚拟会议平台，允许活动策划者使用元宇宙平台举办虚拟活动。该平台包括虚拟大堂、展厅和会议空间等功能，以及用于管理参会者注册和互动的工具。万豪旅享家活动在全球超过
    30 家万豪酒店物业提供。 |

    | 雅高集团的虚拟活动平台名为“全部互联（All Connect）”，它利用元宇宙技术为参与者创造沉浸式体验。该平台使活动策划者能够创建包含虚拟社交休息室、互动活动展位和
    3D 活动空间等功能的虚拟和混合活动。 |

    | 洲际酒店集团与活动技术公司`Bizzabo`合作，创建了一个名为“自信会面（Meet with Confidence）”的虚拟活动平台。该平台利用元宇宙技术创建虚拟和混合活动，使参与者能够在虚拟空间中彼此互动以及与数字对象互动。该平台包括虚拟大堂、分组讨论室和虚拟活动展位等功能。
    |

    |   | 差旅管理公司为应对全球疫情推出了虚拟活动解决方案。例如，美国运通全球商务旅行（GBT）与`Hopin`合作创建了`GBT Virtual`，而嘉信力旅运公司推出了`CWT
    easy meetings`，商旅管理公司则引入了`SolutionSource® Meetings & Events`。这些平台为企业举办虚拟活动提供了机会，并配备了虚拟展位、实时聊天和分组讨论等互动功能，为不断变化的世界提供了创新解决方案。
    |

    | 培训 | 希尔顿酒店集团开发了一个名为“希尔顿全球大学（Hilton Worldwide University）”的虚拟现实培训项目，允许员工在模拟的酒店环境中练习各种场景并与虚拟客人互动。该项目旨在通过提供更具互动性和吸引力的培训体验，改善客户服务并提高员工参与度。该项目使用虚拟现实头戴设备创建模拟的酒店环境，员工可以在此练习各种场景并与虚拟客人互动。虚拟环境包括酒店大堂、客房、餐厅以及酒店的其他区域。这些场景旨在帮助员工培养客户服务和解决问题的技能，包括与可能有不同需求和偏好的虚拟客人进行互动。该项目还允许员工接收关于他们表现的实时反馈，并提供改进建议。该反馈基于希尔顿制定的一套客户服务标准，旨在确保世界各地希尔顿酒店的所有客人都能获得一致且高质量的体验。
    |

    | 万豪国际集团正在使用虚拟现实培训来教育员工了解其忠诚度计划“万豪旅享家（Marriott Bonvoy）”。该项目包括互动场景和模拟，帮助员工更好地了解该计划的益处和特点。“虚拟客房（VRoom）”项目旨在通过提供更具沉浸感和互动性的培训体验，提高员工敬业度和客户服务水平。员工使用虚拟现实头戴设备，这些设备能创建一个模拟的酒店环境，允许他们练习各种场景并与虚拟客人互动。该项目提供全面的培训模块，涵盖客户服务、客房部和前台运营等关键主题。这些模块旨在为员工提供互动场景和模拟，让他们在虚拟环境中练习技能。例如，客户服务模块模拟了典型的客户服务情景，包括客人入住、处理投诉以及推荐当地景点和餐厅。相比之下，客房部模块使员工能够练习清洁不同布局和场景的房间，而前台模块则包括办理入住和退房手续的模拟。
    |

    |   | 四季酒店已实施了一项虚拟现实培训项目，以教育其员工如何提供奢华的酒店体验。该项目提供互动模拟，使员工能够更好地理解品牌的服务标准和期望。该项目采用虚拟现实头戴设备来创建模拟环境，酒店员工可以在其中与虚拟客人互动并练习各种场景。
    |

    | 达美航空推出了一项名为“预备，出发（Ready, Set, Jet）”的创新增强现实培训项目，以加强员工培训和敬业度。该项目提供了一种关于安全程序和应急规程的实践性和互动式学习方法。通过使用移动设备将数字图像叠加到现实世界的物体上，员工可以获得更具沉浸感的培训体验。“预备，出发”包括各种培训模块，涵盖安全程序、应急规程和飞机操作等关键主题。每个模块都包含互动模拟和场景，让员工能够以更实际的方式练习技能。例如，安全程序模块模拟了常见的安全场景，如使用灭火器、疏散飞机和施行急救。应急规程模块模拟了不同的紧急情况，包括医疗紧急情况或发动机故障，以及如何恰当地处理这些情况。飞机操作模块提供了不同飞机系统和过程（例如操作驾驶舱控制装置）的模拟。
    |

    | 为确保乘客的安全和满意，英国航空公司为其乘务员、工程师和地勤人员实施了一项创新的培训项目。该项目整合了虚拟现实技术，以提供各种场景和紧急情况的沉浸式互动模拟，使员工能够在虚拟环境中练习并做出相应反应。该项目包括多个模块，涉及客户服务、应急程序和飞机操作。每个模块都包含互动模拟和场景，例如欢迎乘客、处理投诉、提供餐食和饮料、处理火灾和医疗紧急情况以及使用驾驶舱控制装置。
    |

    |   | 阿联酋航空使用虚拟现实技术为其乘务员提供互动且沉浸式的培训体验。该培训项目包含多个模块，涵盖安全程序、紧急情况、客户服务和机上服务。每个模块都包含互动模拟和场景，使员工能够在虚拟环境中磨练自己的技能。例如，安全程序模块包括各种安全场景的模拟，如处理火灾紧急情况、应对医疗事件以及使用安全设备。紧急情况模块包含不同紧急场景的模拟，如飞机撤离、失压和水上迫降。客户服务和机上服务模块包括不同客户互动的模拟，如欢迎乘客、提供餐食和饮料以及处理投诉。该项目受到员工好评，并帮助提高了阿联酋航空整个机队的客户服务和安全标准。该项目还获得了行业认可，包括
    2019 年航空乘客体验协会（APEX）颁发的“最佳客舱创新奖”。 |'
  raw: '| Virtual tours and experiences | Sheraton Hotels & Resorts in partnership
    with HTC Vive launched a virtual reality experience called “Sheraton AR” that
    allows guests to explore and interact with virtual versions of their hotels. The
    experience includes virtual tours of guest rooms, lobbies, and other hotel spaces.
    |

    | Accor Hotels has created a virtual reality platform called “AccorHotels Showcase”
    that allows guests to explore and book rooms, view amenities, and make reservations
    in a virtual environment. The platform is available on desktop and mobile devices.
    |

    | Marriott has created a virtual reality travel experience called “VRoom Service”
    that allows guests to explore different destinations and experiences before making
    a booking. The program is available in select hotels around the world. |

    | Hilton launched a virtual reality experience called “Room View” that allows
    guests to preview and customize their rooms before arrival. The experience includes
    virtual tours of rooms and allows guests to select room features and amenities.
    |

    | IHG has partnered with Tencent to create a virtual hotel in the WeChat app,
    which allows guests to explore and book rooms, view amenities, and make reservations
    in a virtual environment. |

    | Digital twins | The Peninsula Hotel in Hong Kong has implemented a digital twin
    system to improve the efficiency of its operations and provide a better guest
    experience. The system uses sensors and other IoT devices to collect data on various
    aspects of the hotel, such as occupancy, energy consumption, and guest preferences.
    This data is then used to create a digital twin of the hotel, which can be used
    to optimize operations and personalize the guest experience. |

    | Marriott International partnered with the real estate tech firm BuildingMinds
    to develop a digital twin system for its hotels. The system uses IoT sensors to
    collect data on various aspects of the hotel, such as energy consumption, temperature,
    and humidity. This data is then used to create a digital twin of the hotel, which
    can be used to optimize operations and improve the guest experience. Marriott
    has also partnered with the virtual event platform Hopin to create virtual and
    hybrid event experiences for its customers. The platform includes features such
    as virtual lobbies, networking lounges, and breakout rooms, all of which are designed
    to replicate the experience of attending an in-person event. |

    |   | The InterContinental Hotels & Resorts brand is using digital twins to enhance
    guest experiences and improve hotel operations. For example, the company has developed
    a digital twin of its Sydney hotel, which enables guests to explore the hotel’s
    rooms and amenities virtually before they arrive. The digital twin also allows
    hotel staff to monitor and adjust energy usage, optimize room layouts and furnishings,
    and identify areas where maintenance may be needed. |

    | The Radisson Hotel Group is using digital twins to improve energy efficiency
    and sustainability at its hotels. By creating digital replicas of its properties,
    the company can analyze energy usage patterns and identify areas where improvements
    can be made. For example, the digital twin may reveal that certain rooms or areas
    are using more energy than others, enabling the hotel to take targeted measures
    to reduce consumption and lower costs. |

    | The Wynn Las Vegas hotel has implemented a digital twin of its entire property,
    which includes its hotel rooms, restaurants, and casino floor. The digital twin
    allows the hotel to monitor and optimize its operations in real time, as well
    as track the movements of guests and employees throughout the property. This information
    is used to improve guest experiences and ensure the safety and security of everyone
    on the property. |

    | The Ritz-Carlton hotel in Sarasota, Florida, has implemented a digital twin
    of its guest rooms. The digital twin includes detailed information about the layout,
    furnishings, and amenities of each room, as well as the location of key features
    such as windows, doors, and electrical outlets. This information is used to optimize
    the hotel’s housekeeping operations, ensuring that each room is cleaned and prepared
    for the next guest in the most efficient way possible. Other Ritz- Carlton properties,
    including Tokyo and Almaty, leverage virtual tours with 3D replicas of the room
    and interactive features such as the ability to adjust the room’s lighting and
    temperature to give guests a better feel of what it’s like to stay at the hotel
    and to showcase the unique features and amenities that the Ritz-Carlton brand
    is known for. |

    | Virtual meetings and events | The Venetian Resort in Las Vegas has partnered
    with a company called Event Farm to create a virtual event platform called “The
    Venetian Resort Digital Events.” This platform allows event organizers to create
    immersive, interactive events in a metaverse environment, complete with virtual
    booths, networking opportunities, and live streaming capabilities. The platform
    is designed to provide a more engaging and interactive experience for event attendees
    while also giving event organizers more flexibility and control over the event
    experience. |

    | Hyatt Hotels has launched a new platform called “Hyatt Together” that uses metaverse
    technologies to facilitate virtual meetings and events. The platform allows event
    organizers to create custom virtual spaces, complete with interactive features
    such as 3D avatars, virtual whiteboards, and video conferencing capabilities.
    The goal is to provide a more engaging and immersive experience for event attendees
    while also making it easier for event organizers to manage and coordinate virtual
    events. |

    | Hilton Hotels has partnered with a company called MeetinVR to create a virtual
    event platform called “Hilton EventReady with CleanStay.” This platform allows
    event organizers to create virtual events in a metaverse environment, complete
    with interactive features such as virtual reality breakout sessions, 3D avatars,
    and live streaming capabilities. The platform is designed to provide a more engaging
    and immersive experience for event attendees while also giving event organizers
    more flexibility and control over the event experience. |

    | Marriott International has launched a virtual meetings platform called Marriott
    Bonvoy Events, which allows event planners to host virtual events using a metaverse
    platform. The platform includes features such as virtual lobbies, exhibit halls,
    and meeting spaces, as well as tools for managing attendee registration and engagement.
    Marriott Bonvoy Events is available at more than 30 Marriott properties worldwide.
    |

    | Accor’s virtual event platform called “All Connect” uses metaverse technologies
    to create immersive experiences for attendees. The platform enables event planners
    to create virtual and hybrid events that include features such as virtual networking
    lounges, interactive event booths, and 3D event spaces. |

    | IHG has partnered with the event technology company Bizzabo to create a virtual
    event platform called “Meet with Confidence.” The platform uses metaverse technologies
    to create virtual and hybrid events that enable attendees to interact with each
    other and with digital objects in a virtual space. The platform includes features
    such as virtual lobbies, breakout rooms, and virtual event booths. |

    |   | Corporate travel companies launched virtual event solutions in response
    to the global pandemic. For instance, American Express Global Business Travel
    (GBT) partnered with Hopin to create GBT Virtual, while CWT launched “CWT easy
    meetings” and BCD Travel introduced “SolutionSource® Meetings & Events.” These
    platforms offer companies the chance to host virtual events, complete with interactive
    features like virtual booths, live chat, and breakout sessions, providing innovative
    solutions for the changing world. |

    | Training | Hilton has developed a virtual reality training program called “Hilton
    Worldwide University” that allows staff to practice scenarios and interact with
    virtual guests in a simulated hotel environment. The program is designed to improve
    customer service and increase employee engagement by providing a more interactive
    and engaging training experience. The program uses virtual reality headsets to
    create a simulated hotel environment where staff can practice scenarios and interact
    with virtual guests.The virtual environment includes a hotel lobby, guest room,
    restaurant, and other areas of the hotel. The scenarios are designed to help staff
    develop their customer service and problem-solving skills and include interactions
    with virtual guests who may have different needs and preferences.The program also
    allows staff to receive real-time feedback on their performance and provides recommendations
    for improvement. The feedback is based on a set of customer service standards
    developed by Hilton, which are designed to ensure that all guests receive a consistent
    and high-quality experience at Hilton hotels around the world. |

    | Marriott is using virtual reality training to teach employees about its loyalty
    program, Marriott Bonvoy. The program includes interactive scenarios and simulations
    that help employees better understand the benefits and features of the program.The
    “VRoom” program was designed to improve employee engagement and customer service
    by providing a more immersive and interactive training experience. Employees use
    virtual reality headsets that create a simulated hotel environment allowing to
    practice scenarios and interact with virtual guests.The program offers comprehensive
    training modules that cover essential topics like customer service, housekeeping,
    and front desk operations. These modules are designed to provide employees with
    interactive scenarios and simulations, allowing them to practice their skills
    in a virtual environment. For instance, the customer service module features simulations
    of typical customer service situations, including guest check-ins, handling complaints,
    and recommending local attractions and restaurants. In contrast, the housekeeping
    module enables employees to practice cleaning various room layouts and scenarios,
    while the front desk module includes simulations of check-in and check-out procedures.
    |

    |   | Four Seasons has implemented a virtual reality training program to educate
    its staff on providing a luxurious hotel experience. The program offers interactive
    simulations that enable employees to comprehend the brand’s service standards
    and expectations better. The program employs virtual reality headsets to create
    simulated environments where hotel staff can interact with virtual guests and
    practice scenarios. |

    | Delta has launched an innovative augmented reality training program called “Ready,
    Set, Jet” to enhance employee training and engagement. This program offers a hands-on
    and interactive approach to learning about safety procedures and emergency protocols.
    By using mobile devices to overlay digital images on real-world objects, employees
    can have a more immersive training experience.“Ready, Set, Jet” comprises various
    training modules that cover essential topics such as safety procedures, emergency
    protocols, and aircraft operations. Each module features interactive simulations
    and scenarios, allowing employees to practice their skills in a more practical
    way. For instance, the safety procedures module includes simulations of common
    safety scenarios such as using a fire extinguisher, evacuating an aircraft, and
    performing first aid. The emergency protocols module involves simulations of different
    emergency scenarios, including medical emergencies or engine failures, and how
    to handle them appropriately. The aircraft operations module provides simulations
    of different aircraft systems and processes, such as operating cockpit controls.
    |

    | To ensure the safety and satisfaction of its passengers, British Airways has
    implemented an innovative training program for its cabin crew, engineers, and
    ground staff. This program incorporates virtual reality technology to provide
    immersive and interactive simulations of various scenarios and emergencies, enabling
    staff to practice and respond accordingly in a virtual environment.The program
    comprises several modules, including customer service, emergency procedures, and
    aircraft operations. Each module includes interactive simulations and scenarios,
    such as welcoming passengers, handling complaints, serving meals and drinks, handling
    fires and medical emergencies, and using cockpit controls. |

    |   | Emirates provides interactive and immersive training experiences for its
    cabin crew members using virtual reality technology. The training program comprises
    various modules that cover safety procedures, emergency situations, customer service,
    and inflight service. Each module incorporates interactive simulations and scenarios
    that enable employees to hone their skills in a virtual environment.For example,
    the safety procedures module includes simulations of various safety scenarios,
    such as handling fire emergencies, responding to medical incidents, and utilizing
    safety equipment. The emergency situations module comprises simulations of different
    emergency scenarios, such as aircraft evacuation, decompression, and ditching.
    The customer service and inflight service modules include simulations of different
    customer interactions, such as welcoming passengers, serving meals and drinks,
    and handling complaints.The program has been well-received by employees and has
    helped to improve customer service and safety standards across Emirates’ fleet.
    It has also earned industry recognition, including the 2019 Airline Passenger
    Experience Association (APEX) Award for Best Cabin Innovation. |'
  trans: '

    | 虚拟导览与体验 | 喜来登酒店及度假村与宏达国际电子股份有限公司（HTC VIVE）合作推出了一项名为“喜来登增强现实（Sheraton AR）”的虚拟现实体验，让客人能够探索并与其酒店的数字版本进行互动。该体验包括客房、大堂及其他酒店空间的虚拟导览。
    |

    | 雅高酒店集团创建了一个名为“雅高酒店展示平台（AccorHotels Showcase）”的虚拟现实平台，供客人在虚拟环境中探索并预订客房、查看设施以及进行预订。该平台可在桌面端和移动设备上使用。
    |

    | 万豪国际集团创建了一个名为“虚拟客房服务（VRoom Service）”的虚拟现实旅行体验，让客人在预订前就能探索不同的目的地和体验。该项目在全球部分酒店提供。
    |

    | 希尔顿酒店集团推出了一项名为“客房视图（Room View）”的虚拟现实体验，让客人在抵达前即可预览并定制自己的房间。该体验包括房间的虚拟导览，并允许客人选择房间特色和设施。
    |

    | 洲际酒店集团（IHG）与腾讯合作，在微信应用中创建了一个虚拟酒店，让客人在虚拟环境中探索并预订客房、查看设施以及进行预订。 |

    | 数字孪生 | 香港半岛酒店实施了数字孪生系统，以提高运营效率并提供更好的宾客体验。该系统使用传感器和其他物联网（IoT）设备来收集酒店各方面的数据，例如入住率、能耗和宾客偏好。这些数据随后被用于创建酒店的数字孪生，以优化运营并个性化宾客体验。
    |

    | 万豪国际集团与房地产科技公司`BuildingMinds`合作，为其酒店开发数字孪生系统。该系统使用物联网传感器收集酒店各方面的数据，例如能耗、温度和湿度。随后利用这些数据创建酒店的数字孪生，以优化运营并改善宾客体验。万豪还与虚拟活动平台`Hopin`合作，为其客户打造虚拟和混合活动体验。该平台包括虚拟大堂、社交休息室和分组讨论室等功能，所有设计都旨在复制参加线下活动的体验。
    |

    |   | 洲际酒店及度假村品牌正在利用数字孪生来增强宾客体验并改善酒店运营。例如，该公司开发了其悉尼酒店的数字孪生，使客人能够在抵达前虚拟探索酒店的客房和设施。该数字孪生还允许酒店员工监控和调整能源使用，优化房间布局和家具陈设，并识别可能需要维护的区域。
    |

    | 丽笙酒店集团正利用数字孪生技术提高其酒店的能效和可持续性。通过创建其物业的数字副本，该公司可以分析能源使用模式，并确定可以改进的领域。例如，数字孪生可能会揭示某些房间或区域的能耗高于其他房间或区域，从而使酒店能够采取有针对性的措施来减少消耗和降低成本。
    |

    | 拉斯维加斯永利酒店已为其整个物业（包括酒店客房、餐厅和赌场楼层）实施了数字孪生。该数字孪生使酒店能够实时监控和优化其运营，并追踪客人和员工在酒店内的移动情况。这些信息用于改善宾客体验，并确保酒店内所有人的安全。
    |

    | 佛罗里达州萨拉索塔的丽思卡尔顿酒店已为其客房实施了数字孪生。该数字孪生包含每个房间布局、家具和陈设的详细信息，以及窗户、门和电源插座等关键功能的位置。这些信息用于优化酒店客房部的运营，确保以最高效的方式清洁和准备每个房间，迎接下一位客人。其他丽思卡尔顿酒店物业，包括东京和阿斯塔纳，则利用包含房间
    3D 复制品和互动功能（例如可以调节房间灯光和温度）的虚拟导览，让客人更好地感受入住酒店的真实体验，并展示丽思卡尔顿品牌闻名遐迩的独特设施和便利条件。 |

    | 虚拟会议和活动 | 拉斯维加斯威尼斯人度假村与一家名为`Event Farm`的公司合作，创建了一个名为“威尼斯人度假村数字活动”的虚拟活动平台。该平台允许活动组织者在元宇宙环境中创建沉浸式、互动性强的活动，配备虚拟展位、社交机会和直播功能。该平台旨在为活动参与者提供更具吸引力和互动性的体验，同时为活动组织者提供更大的灵活性和对活动体验的控制力。
    |

    | 凯悦酒店集团推出了一个名为“凯悦携手（Hyatt Together）”的新平台，该平台利用元宇宙技术促进虚拟会议和活动。该平台允许活动组织者创建自定义虚拟空间，配备互动功能，如
    3D 头像、虚拟白板和视频会议功能。其目标是为活动参与者提供更具吸引力和沉浸感的体验，同时使活动组织者更容易管理和协调虚拟活动。 |

    | 希尔顿酒店集团与一家名为`MeetinVR`的公司合作，创建了一个名为“希尔顿随时准备活动与清洁承诺（Hilton EventReady with CleanStay）”的虚拟活动平台。该平台允许活动组织者在元宇宙环境中创建虚拟活动，配备互动功能，如虚拟现实分组讨论会、3D
    头像和直播功能。该平台旨在为活动参与者提供更具吸引力和沉浸感的体验，同时为活动组织者提供更大的灵活性和对活动体验的控制力。 |

    | 万豪国际集团推出了一个名为“万豪旅享家活动（Marriott Bonvoy Events）”的虚拟会议平台，允许活动策划者使用元宇宙平台举办虚拟活动。该平台包括虚拟大堂、展厅和会议空间等功能，以及用于管理参会者注册和互动的工具。万豪旅享家活动在全球超过
    30 家万豪酒店物业提供。 |

    | 雅高集团的虚拟活动平台名为“全部互联（All Connect）”，它利用元宇宙技术为参与者创造沉浸式体验。该平台使活动策划者能够创建包含虚拟社交休息室、互动活动展位和
    3D 活动空间等功能的虚拟和混合活动。 |

    | 洲际酒店集团与活动技术公司`Bizzabo`合作，创建了一个名为“自信会面（Meet with Confidence）”的虚拟活动平台。该平台利用元宇宙技术创建虚拟和混合活动，使参与者能够在虚拟空间中彼此互动以及与数字对象互动。该平台包括虚拟大堂、分组讨论室和虚拟活动展位等功能。
    |

    |   | 差旅管理公司为应对全球疫情推出了虚拟活动解决方案。例如，美国运通全球商务旅行（GBT）与`Hopin`合作创建了`GBT Virtual`，而嘉信力旅运公司推出了`CWT
    easy meetings`，商旅管理公司则引入了`SolutionSource® Meetings & Events`。这些平台为企业举办虚拟活动提供了机会，并配备了虚拟展位、实时聊天和分组讨论等互动功能，为不断变化的世界提供了创新解决方案。
    |

    | 培训 | 希尔顿酒店集团开发了一个名为“希尔顿全球大学（Hilton Worldwide University）”的虚拟现实培训项目，允许员工在模拟的酒店环境中练习各种场景并与虚拟客人互动。该项目旨在通过提供更具互动性和吸引力的培训体验，改善客户服务并提高员工参与度。该项目使用虚拟现实头戴设备创建模拟的酒店环境，员工可以在此练习各种场景并与虚拟客人互动。虚拟环境包括酒店大堂、客房、餐厅以及酒店的其他区域。这些场景旨在帮助员工培养客户服务和解决问题的技能，包括与可能有不同需求和偏好的虚拟客人进行互动。该项目还允许员工接收关于他们表现的实时反馈，并提供改进建议。该反馈基于希尔顿制定的一套客户服务标准，旨在确保世界各地希尔顿酒店的所有客人都能获得一致且高质量的体验。
    |

    | 万豪国际集团正在使用虚拟现实培训来教育员工了解其忠诚度计划“万豪旅享家（Marriott Bonvoy）”。该项目包括互动场景和模拟，帮助员工更好地了解该计划的益处和特点。“虚拟客房（VRoom）”项目旨在通过提供更具沉浸感和互动性的培训体验，提高员工敬业度和客户服务水平。员工使用虚拟现实头戴设备，这些设备能创建一个模拟的酒店环境，允许他们练习各种场景并与虚拟客人互动。该项目提供全面的培训模块，涵盖客户服务、客房部和前台运营等关键主题。这些模块旨在为员工提供互动场景和模拟，让他们在虚拟环境中练习技能。例如，客户服务模块模拟了典型的客户服务情景，包括客人入住、处理投诉以及推荐当地景点和餐厅。相比之下，客房部模块使员工能够练习清洁不同布局和场景的房间，而前台模块则包括办理入住和退房手续的模拟。
    |

    |   | 四季酒店已实施了一项虚拟现实培训项目，以教育其员工如何提供奢华的酒店体验。该项目提供互动模拟，使员工能够更好地理解品牌的服务标准和期望。该项目采用虚拟现实头戴设备来创建模拟环境，酒店员工可以在其中与虚拟客人互动并练习各种场景。
    |

    | 达美航空推出了一项名为“预备，出发（Ready, Set, Jet）”的创新增强现实培训项目，以加强员工培训和敬业度。该项目提供了一种关于安全程序和应急规程的实践性和互动式学习方法。通过使用移动设备将数字图像叠加到现实世界的物体上，员工可以获得更具沉浸感的培训体验。“预备，出发”包括各种培训模块，涵盖安全程序、应急规程和飞机操作等关键主题。每个模块都包含互动模拟和场景，让员工能够以更实际的方式练习技能。例如，安全程序模块模拟了常见的安全场景，如使用灭火器、疏散飞机和施行急救。应急规程模块模拟了不同的紧急情况，包括医疗紧急情况或发动机故障，以及如何恰当地处理这些情况。飞机操作模块提供了不同飞机系统和过程（例如操作驾驶舱控制装置）的模拟。
    |

    | 为确保乘客的安全和满意，英国航空公司为其乘务员、工程师和地勤人员实施了一项创新的培训项目。该项目整合了虚拟现实技术，以提供各种场景和紧急情况的沉浸式互动模拟，使员工能够在虚拟环境中练习并做出相应反应。该项目包括多个模块，涉及客户服务、应急程序和飞机操作。每个模块都包含互动模拟和场景，例如欢迎乘客、处理投诉、提供餐食和饮料、处理火灾和医疗紧急情况以及使用驾驶舱控制装置。
    |

    |   | 阿联酋航空使用虚拟现实技术为其乘务员提供互动且沉浸式的培训体验。该培训项目包含多个模块，涵盖安全程序、紧急情况、客户服务和机上服务。每个模块都包含互动模拟和场景，使员工能够在虚拟环境中磨练自己的技能。例如，安全程序模块包括各种安全场景的模拟，如处理火灾紧急情况、应对医疗事件以及使用安全设备。紧急情况模块包含不同紧急场景的模拟，如飞机撤离、失压和水上迫降。客户服务和机上服务模块包括不同客户互动的模拟，如欢迎乘客、提供餐食和饮料以及处理投诉。该项目受到员工好评，并帮助提高了阿联酋航空整个机队的客户服务和安全标准。该项目还获得了行业认可，包括
    2019 年航空乘客体验协会（APEX）颁发的“最佳客舱创新奖”。 |

    '
- fmt: '# 旅游公司拥抱虚拟世界，为客户提供创新体验


    - `Expedia`已与虚拟现实游戏公司`Sandbox VR`合作，打造虚拟现实旅行体验`ExploreVR`。该体验允许用户以虚拟方式探索世界各地的多个目的地，并可选择与环境进行互动。`Expedia`计划将此技术集成到其旅行预订平台，让客户在预订行程前能够预览目的地。


    - `Hopper`（一款旅行预订应用）推出了`Hopper VR`功能，让用户通过虚拟现实探索目的地。这种沉浸式体验使用360度视频和虚拟现实技术，允许用户体验巴黎或东京等不同目的地。`Hopper`旨在通过让用户在预订行程前虚拟探索不同目的地，帮助他们做出更明智的旅行决策。


    - `皇家加勒比`（Royal Caribbean）已与`Magic Leap`合作，为其邮轮上的宾客开发混合现实体验`Ocean Compass`。该体验利用增强现实技术、可穿戴设备以及数字礼宾和游戏等虚拟元素，为宾客提供关于船舶和活动的实时信息。


    - `荷兰皇家航空`（KLM）推出了`KLM Flight Upgrader`，这是一种虚拟现实体验，允许乘客利用虚拟现实技术虚拟探索并将其座位升级至商务舱。`汉莎航空`（Lufthansa）的`VR
    World`为乘客提供探索不同旅行目的地和体验的机会，其配套的虚拟现实头显还可用于培训乘务员。


    目的地及目的地管理公司也在大力探索元宇宙与虚拟体验的概念，将其作为推广旅游、展示文化与景点，并以新颖创新的方式与潜在游客互动的工具。


    下表总结了该领域的一些案例。


    | 虚拟景点与导览 | 新加坡旅游局与虚拟现实内容创作者合作，打造了该国顶级旅游景点的虚拟现实体验。该体验允许用户以沉浸式和互动的方式探索并了解新加坡的地标和文化。许多目的地正在创建其景点、地标和自然奇观的虚拟版本，游客可通过虚拟现实或增强现实体验进行探索。例如，大英博物馆推出了虚拟导览，让游客能够从世界任何地方探索博物馆的展厅和展品。同样，西班牙巴塞罗那市在社交虚拟现实平台`Second
    Life`中创建了其著名景点`古埃尔公园`的虚拟版本。该虚拟公园允许用户探索和体验公园独特的建筑和艺术品，为推广城市及其文化产品提供了独特方式。巴黎市推出了一种虚拟现实体验，带领游客穿越城市历史，从罗马定居点的起源到现代。迪拜则创建了名为`Mission
    828`的虚拟现实体验，允许游客探索世界最高建筑哈利法塔，并在此过程中解谜。 |

    | --- | --- |

    | 虚拟活动 | 一些目的地正利用元宇宙举办虚拟活动和节日。例如，苏格兰爱丁堡市在2020年推出了其著名边缘艺术节的虚拟版本。该虚拟节日包含一系列表演和活动，用户可从世界任何地方参与，使该市即使在疫情期间也能推广其文化产品并吸引游客。里约热内卢创建了其著名狂欢节庆典的虚拟版本，让世界各地的人们无需离家即可体验节庆盛况。
    |

    | 城市数字孪生 | 伦敦、纽约、东京、首尔和圣莫尼卡等多个城市已采用元宇宙技术创建数字孪生，预计将有更多城市效仿。元宇宙城市带来诸多益处，如降低能耗、解决可扩展性和安全问题，并彻底革新城市规划理念。它们提供了令人惊叹的基于位置的增强现实体验，创建可在当地零售商处兑换的数字收藏品和奖励，提高对数字资产的认知，并为城市及其居民带来多项好处。数字孪生可以促进战略决策和城市规划，改善交通，减少排放，或针对突发事件甚至灾难进行模拟，为不同情况做好准备。例如，新加坡是2018年最早实施数字孪生的城市之一，其项目名为`Virtual
    Singapore`。这是一个3D平台，提供关于城市建筑、基础设施和公共空间的实时数据，以协助城市规划和灾害管理。迪拜为城市整体基础设施创建了数字孪生，即`Dubai
    Pulse`平台。该平台包含交通、能源、水务和废物管理数据，以及社会和经济指标信息。纽约市为其建筑和基础设施系统创建了数字孪生，即`Virtual NYC`平台。该平台包含建筑、道路和公用设施系统的3D模型，用于监控和优化城市的运营与服务。阿姆斯特丹则为其运河创建了数字孪生，名为`Digital
    Twin Water`。该数字孪生利用实时数据监控水质、水位和天气状况，用于优化城市水系统管理。 |


    我确信你会同意，所有这些例子都展示了元宇宙在提升宾客体验、为酒店和旅游公司创造新收入来源方面的潜力。通过利用虚拟和增强现实技术，酒店和旅游企业可以打造沉浸式且引人入胜的体验，让客人能够以新颖迷人的方式发现并参与其产品。


    随着技术的进步，我们可以预见酒店和旅游行业中将有更多品牌探索并尝试元宇宙，整合数字孪生系统，并推出沉浸式体验，以保持竞争力，为客人提供更加个性化的服务。'
  raw: 'Travel companies have embraced the virtual world, offering innovative experiences
    for customers.


    *   Expedia has collaborated with Sandbox VR, a virtual reality gaming company,
    to create “ExploreVR,” a virtual reality travel experience. This allows users
    to explore various destinations around the world virtually, with the option to
    interact with the environment. Expedia plans to integrate this technology into
    its travel booking platform, giving customers the ability to explore destinations
    before booking their trips.


    *   Hopper, a travel booking app, has launched “Hopper VR,” a feature that lets
    users explore destinations in virtual reality. This immersive experience uses
    360-degree video and virtual reality technologies, allowing users to experience
    different destinations like Paris or Tokyo. Hopper aims to help users make better
    travel decisions by offering them the chance to virtually explore different destinations
    before booking their trips.


    *   Royal Caribbean has partnered with Magic Leap to develop “Ocean Compass,”
    a mixed reality experience for guests on its cruise ships. This experience uses
    augmented reality technology, a wearable device, and virtual elements such as
    a digital concierge and games to provide guests with real-time information on
    the ship and activities.


    *   KLM has launched “KLM Flight Upgrader,” a virtual reality experience that
    allows passengers to virtually explore and upgrade their seats to business class
    using virtual reality technology. Lufthansa’s “VR World” offers passengers the
    chance to explore different travel destinations and experiences, with a virtual
    reality headset that can also be used to train flight attendants.


    The concept of Metaverse and virtual experiences is also heavily investigated
    by destinations and destination management companies as a tool to promote tourism,
    showcase culture and attractions, and engage with potential visitors in new and
    innovative ways.


    The following table summarizes some of the examples in this space.


    | Virtual attractions and tours | The Singapore Tourism Board partnered with VR
    content creators to create a virtual reality experience of some of the city-state’s
    top tourist attractions. The experience allows users to explore and learn about
    Singapore’s landmarks and cultural offerings in an immersive and interactive way.Many
    destinations are creating virtual versions of their attractions, landmarks, and
    natural wonders that visitors can explore through virtual reality or augmented
    reality experiences. For example, the British Museum has created a virtual tour
    that allows visitors to explore the museum’s galleries and exhibits from anywhere
    in the world.Similarly, the Spanish city of Barcelona created a virtual version
    of its famous Park Güell in the social VR platform Second Life. The virtual park
    allows users to explore and experience the park’s unique architecture and artwork,
    providing a unique way to promote the city and its cultural offerings.The city
    of Paris created a virtual reality experience that takes visitors on a journey
    through the city’s history, from its origins as a Roman settlement to the present
    day. Dubai created a virtual reality experience called “Mission 828,” which allows
    visitors to explore the Burj Khalifa, the world’s tallest building, and solve
    puzzles along the way. |

    | Virtual events | Some destinations are using the metaverse to create virtual
    events and festivals. For example, the city of Edinburgh in Scotland launched
    a virtual version of its famous Fringe Festival in 2020\. The virtual festival
    included a range of performances and events that users could attend from anywhere
    in the world, allowing the city to promote its cultural offerings and attract
    visitors even during the pandemic. Rio de Janeiro created a virtual version of
    its famous Carnival celebration, which allowed people from all over the world
    to experience the festivities without leaving their homes. |

    | Digital twins of the cities | Several cities, such as London, New York, Tokyo,
    Seoul, and Santa Monica, have embraced Metaverse technology to create a digital
    twin, and many more cities are expected to follow suit. Metaverse cities offer
    several benefits like reducing energy consumption, addressing scalability and
    security issues, and revolutionizing the entire concept of urban planning. They
    provide incredible location-based AR experiences, create digital collectibles
    and rewards that can be redeemed at local retailers, promote awareness about digital
    assets, and offer several benefits for both the cities and their residents.Digital
    twins can facilitate strategic decision-making and urban planning, implement better
    transportation, reduce emissions, or run simulations of unforeseen events and
    even disasters to prepare for different situations.Singapore, for example, was
    one of the first cities to implement a digital twin in 2018, called Virtual Singapore.
    It is a 3D platform that provides real-time data about the city’s buildings, infrastructure,
    and public spaces to assist with urban planning and disaster management.Dubai
    has created a digital twin of the city’s entire infrastructure, called the Dubai
    Pulse platform. The platform includes data on transportation, energy, water, and
    waste management, as well as information on social and economic indicators.New
    York City has created a digital twin of the city’s buildings and infrastructure
    systems, called the Virtual NYC platform. The platform includes 3D models of buildings,
    roads, and utility systems and is used to monitor and optimize the city’s operations
    and services.Amsterdam, on the other hand, has created a digital twin of the city’s
    canals, called Digital Twin Water. The digital twin uses real-time data to monitor
    water quality, water levels, and weather conditions and is used to optimize the
    management of the city’s water systems. |


    I’m sure you’ll agree with me that all these examples demonstrate the potential
    of the metaverse to enhance the guest experience and create new revenue streams
    for hotels and travel companies. By leveraging virtual and augmented reality technologies,
    hospitality and tourism companies can create immersive and captivating experiences
    that enable guests to discover and engage with their offerings in novel and attractive
    ways.


    As technology advances, we can anticipate more brands in the hospitality and travel
    industry exploring and experimenting with the metaverse, incorporating digital
    twin systems, and launching immersive experiences to stay competitive and provide
    more personalized services to their guests.'
  trans: '

    # 旅游公司拥抱虚拟世界，为客户提供创新体验


    - `Expedia`已与虚拟现实游戏公司`Sandbox VR`合作，打造虚拟现实旅行体验`ExploreVR`。该体验允许用户以虚拟方式探索世界各地的多个目的地，并可选择与环境进行互动。`Expedia`计划将此技术集成到其旅行预订平台，让客户在预订行程前能够预览目的地。


    - `Hopper`（一款旅行预订应用）推出了`Hopper VR`功能，让用户通过虚拟现实探索目的地。这种沉浸式体验使用 360 度视频和虚拟现实技术，允许用户体验巴黎或东京等不同目的地。`Hopper`旨在通过让用户在预订行程前虚拟探索不同目的地，帮助他们做出更明智的旅行决策。


    - **皇家加勒比**（Royal Caribbean）已与**Magic Leap**合作，为其邮轮上的宾客开发混合现实体验`Ocean Compass`。该体验利用增强现实技术、可穿戴设备以及数字礼宾和游戏等虚拟元素，为宾客提供关于船舶和活动的实时信息。


    - **荷兰皇家航空**（KLM）推出了`KLM Flight Upgrader`，这是一种虚拟现实体验，允许乘客利用虚拟现实技术虚拟探索并将其座位升级至商务舱。**汉莎航空**（Lufthansa）的`VR
    World`为乘客提供探索不同旅行目的地和体验的机会，其配套的虚拟现实头显还可用于培训乘务员。


    目的地及目的地管理公司也在大力探索元宇宙与虚拟体验的概念，将其作为推广旅游、展示文化与景点，并以新颖创新的方式与潜在游客互动的工具。


    下表总结了该领域的一些案例。


    | 虚拟景点与导览 | 新加坡旅游局与虚拟现实内容创作者合作，打造了该国顶级旅游景点的虚拟现实体验。该体验允许用户以沉浸式和互动的方式探索并了解新加坡的地标和文化。许多目的地正在创建其景点、地标和自然奇观的虚拟版本，游客可通过虚拟现实或增强现实体验进行探索。例如，大英博物馆推出了虚拟导览，让游客能够从世界任何地方探索博物馆的展厅和展品。同样，西班牙巴塞罗那市在社交虚拟现实平台`Second
    Life`中创建了其著名景点**古埃尔公园**的虚拟版本。该虚拟公园允许用户探索和体验公园独特的建筑和艺术品，为推广城市及其文化产品提供了独特方式。巴黎市推出了一种虚拟现实体验，带领游客穿越城市历史，从罗马定居点的起源到现代。迪拜则创建了名为`Mission
    828`的虚拟现实体验，允许游客探索世界最高建筑哈利法塔，并在此过程中解谜。 |

    | --- | --- |

    | 虚拟活动 | 一些目的地正利用元宇宙举办虚拟活动和节日。例如，苏格兰爱丁堡市在 2020 年推出了其著名边缘艺术节的虚拟版本。该虚拟节日包含一系列表演和活动，用户可从世界任何地方参与，使该市即使在疫情期间也能推广其文化产品并吸引游客。里约热内卢创建了其著名狂欢节庆典的虚拟版本，让世界各地的人们无需离家即可体验节庆盛况。
    |

    | 城市数字孪生 | 伦敦、纽约、东京、首尔和圣莫尼卡等多个城市已采用元宇宙技术创建数字孪生，预计将有更多城市效仿。元宇宙城市带来诸多益处，如降低能耗、解决可扩展性和安全问题，并彻底革新城市规划理念。它们提供了令人惊叹的基于位置的增强现实体验，创建可在当地零售商处兑换的数字收藏品和奖励，提高对数字资产的认知，并为城市及其居民带来多项好处。数字孪生可以促进战略决策和城市规划，改善交通，减少排放，或针对突发事件甚至灾难进行模拟，为不同情况做好准备。例如，新加坡是
    2018 年最早实施数字孪生的城市之一，其项目名为`Virtual Singapore`。这是一个 3D 平台，提供关于城市建筑、基础设施和公共空间的实时数据，以协助城市规划和灾害管理。迪拜为城市整体基础设施创建了数字孪生，即`Dubai
    Pulse`平台。该平台包含交通、能源、水务和废物管理数据，以及社会和经济指标信息。纽约市为其建筑和基础设施系统创建了数字孪生，即`Virtual NYC`平台。该平台包含建筑、道路和公用设施系统的
    3D 模型，用于监控和优化城市的运营与服务。阿姆斯特丹则为其运河创建了数字孪生，名为`Digital Twin Water`。该数字孪生利用实时数据监控水质、水位和天气状况，用于优化城市水系统管理。
    |


    我确信你会同意，所有这些例子都展示了元宇宙在提升宾客体验、为酒店和旅游公司创造新收入来源方面的潜力。通过利用虚拟和增强现实技术，酒店和旅游企业可以打造沉浸式且引人入胜的体验，让客人能够以新颖迷人的方式发现并参与其产品。


    随着技术的进步，我们可以预见酒店和旅游行业中将有更多品牌探索并尝试元宇宙，整合数字孪生系统，并推出沉浸式体验，以保持竞争力，为客人提供更加个性化的服务。

