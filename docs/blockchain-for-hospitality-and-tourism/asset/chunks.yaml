  trans: '

    # 如前所述


    如前所述，如果行业能够接纳去中心化自治组织的理念，真正的去中心化是可能实现的。我可以想象，酒店和旅游服务提供商（可能在一个国家或地区）联合起来，创建一个预订平台，让所有利益相关者共同拥有它，并参与决策过程。这样的平台将由来自参与组织的个人管理，决策将基于共识机制，更加透明和民主。这是一个未来的愿景，我敢说——是一个遥远的未来。


    与此同时，我们也不要忘记直接预订的力量。酒店和其他服务提供商在通过直接预订推动销售方面投入了大量精力。当前的数字营销工具和趋势、社交媒体活动、Instagram
    和 TikTok，以及网红营销，都被证明是非常有效的。酒店品牌利用其优化后的网站提供有竞争力的价格和套餐，并投资于忠诚度计划，为直接预订的客人提供独家折扣和奖励。再次强调，基于区块链的创新技术（例如
    NFT）可以极大地增强这一过程，并激励客人绕过预订引擎。


    我们现在正进入本书的下一章节，这一章旨在揭开我们之前开始触及的一些话题的神秘面纱。在接下来的页面中，你将读到在过去几个月里变得火爆的 NFT 和元宇宙。


    脚注 1 2 3 4


    # 7. 非同质化代币


    区块链的世界充满了令人困惑的术语和缩写词。坦率地说，我相信这些行话是这项技术普及相对缓慢的原因之一。在本章中，我们将解读一个热门流行词——“NFT”。


    非同质化代币的兴起是数字世界中最引人入胜的发展之一。在相对较短的时间内，NFT 从艺术界和科技行业都获得了巨大的关注和人气。


    本章将深入探讨 NFT 对酒店和旅游业的影响，探索这些数字资产如何改变人们体验旅游和酒店服务的方式。我们将研究 NFT 在这些行业中的用例及其潜在的利弊。


    ## 什么是 NFT？


    非同质化代币，简称 NFT，是一种独特的数字资产，最初在区块链网络（以太坊是用于此目的最流行的网络）上创建和存储，该网络记录其所有权并证明其真实性。


    通常，NFT 代表图像、视频或音频。与可互换资产（例如货币）不同，NFT 不能被复制或分割。它是不可替代的，独一无二的，因此具有稀缺性。每个 NFT 都易于识别，并且可以在专门的市场（例如
    OpenSea）上出售或交易。为此，你需要创建一个数字钱包（例如，`MetaMask` 或 `Coinbase` 钱包）并获取相应数量的加密货币。目前很少有
    NFT 市场提供使用传统支付方式购买 NFT 的可能性；不过，我预计这种情况在不久的将来会改变。


    NFT 热潮始于大约五年前，源于一款名为 `CryptoKitties` 的游戏，但全世界都听说 NFT 是在最著名的拍卖行之一佳士得在一次在线拍卖中以 6930
    万美元的价格出售了一张 NFT 图像之后。


    自那以后，NFT 市场爆发了。在相对较短的时间内，NFT 从艺术界和科技行业获得了巨大的关注和人气。NFT 已成为创作者将其数字作品货币化以及收藏家投资数字艺术、收藏品和其他独特数字资产的一种新方式。在数字化转型时代，NFT
    为创作者、投资者和企业 alike 开启了一个全新的可能性世界。此外，NFT 实现独特和个性化体验的能力，使其对各个行业的品牌和公司具有吸引力，导致其用例多样化，超越了单纯的数字艺术。


    像 `Bored Ape Yacht Club`^(³⁶) 或 `CryptoPunks`^(³⁷) 这样的项目在极短时间内赚取了数百万美元。NFT 市场疯狂增长，从体育到时尚等领域的巨头，如
    NFL、F1、Adidas、Nike、Prada、McDonald''s、Tiffany''s 等等，纷纷加入了 NFT 的行列。


    尽管 NFT 令人兴奋，但它们也面临批评，一些专家将市场比作经济泡沫或庞氏骗局。2022 年第二季度，市场开始崩溃，销售额大幅下降，比特币和其他加密货币也经历了相当戏剧性的贬值。事实上，许多著名的
    NFT 如今已一文不值。


    然而，在这些剧烈的市场变化中，我们可以观察到对 NFT 价值认知的一个重要转变。虽然数字收藏品无疑是 NFT 的一个重要用例，但许多品牌现在正在探索 NFT
    背后的真正效用，投资于所谓的“数字实体”和有意义品牌互动项目，在这些项目中，NFT 作为价值的促成者而非最终产品。


    ## 效用 NFT


    效用 NFT 是一种数字资产，授予所有者获得普通公众无法获得的特殊优势、奖励或特权的权利。想象一张记录在防篡改数字账本上的活动门票，让你能够访问额外的独家内容；或者一张会员卡，为你提供与忠诚度相关的额外福利。它比传统卡片更安全（前提是你保持良好的网络安全卫生习惯）。只有你可以领取与之相关的奖励。它很难被复制，并且你的所有权可以轻松验证。另一方面，如果你愿意，你可能被允许在安全市场上交易它。


    效用 NFT 可用于多种行业，包括游戏、社交媒体和电子商务等。例如，游戏生态系统中的效用 NFT 可能提供对独家游戏内物品或功能的访问权限，而社交媒体平台可能提供允许用户访问优质内容或工具的
    NFT。


    效用 NFT 在众多行业中正变得越来越流行。例如，阿迪达斯与 `Bored Ape Yacht Club` 合作发行了他们的第一个 NFT 系列，该系列在几分钟内售罄，收入超过
    2300 万美元。这些 NFT 让幸运买家能够获得虚拟和现实生活中的独家阿迪达斯服装系列。星巴克也引入了一个基于 NFT 的奖励系统，称为 `Starbucks
    Odyssey`，允许用户通过在星巴克忠诚度应用中进行活动来赚取 NFT，并可通过信用卡购买限量版 NFT 系列。这些效用 NFT 提供独家福利，例如虚拟课程和体验，更侧重于创造独特体验而非传统奖励。随着
    NFT 在各行业的应用扩展，企业有机会以新的创新方式与客户互动。


    根据 Moonblock 的“2022 年品牌 NFT 状况报告”，^(³⁸)去年约有 160 个代表 15 个行业的品牌发行了品牌 NFT 系列。这项技术现在正转向新的用例，包括数字实体、忠诚度计划和代币门控内容。时尚行业在这场竞赛中处于领先地位，其次是娱乐和媒体，以及——你可能会有点惊讶——食品和饮料。诸如
    Taco Bell、Stella Artois 或 Dunkin'' Donuts 等公司很早就涉足 NFT 业务，利用这些数字资产在其营销活动中吸引客户，并将
    NFT 销售所得用于支持慈善事业。


    酒店和旅游业如何从这一趋势中受益？现在让我们来探讨一下。

