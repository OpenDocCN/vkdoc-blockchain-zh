    lot of compatibility issues.


    The IT infrastructure, especially in the hotel industry, often resembles a bowl
    of spaghetti, it can be very complex and convoluted. Various systems and applications,
    added over the years, interconnect and overlap with each other. It’s a tangled
    web of connections and dependencies. You’ll have a property management system
    (PMS) that manages room reservations, a point-of-sale (POS) system for food and
    beverage sales, a customer relationship management (CRM) system for guest data,
    and a revenue management system (RMS) for pricing and inventory optimization.
    Each of these systems may have its own database, user interface, and business
    rules, and they may be hosted on different servers or in the cloud. And they need
    to talk to each other in real time.


    Adding blockchain into this mix can prove to be a huge project if you’re thinking
    about the whole architecture change. You’ll need people with significant technical
    expertise and a deep understanding of both blockchain and existing systems to
    ensure the process is efficient and doesn’t cause too many disruptions.


    Moreover, the user experience of blockchain interfaces is still evolving, making
    it less intuitive for nontechnical users. This unfamiliarity, coupled with the
    need for additional steps in authentication and verification, creates barriers
    to user adoption.


    However, there are ways to overcome these challenges. Organizations can invest
    in training programs to upskill their workforce and cultivate in-house blockchain
    expertise. Collaborating with technology providers and engaging in pilot projects
    can offer valuable hands-on experience and insights into blockchain implementation.


    Prioritizing user-centric design by simplifying processes and streamlining blockchain
    interactions for end users is also essential. By providing clear instructions,
    intuitive interfaces, and seamless integration with existing systems, organizations
    can ensure a smooth and constructive implementation of blockchain technology.


    #### Finding the Right Partner


    The hospitality industry relies heavily on technology providers to stay innovative,
    but keeping up with the latest trends can be a challenge for in-house IT departments.
    Instead of focusing on new developments, they often spend their time on maintenance.


    This is where external technology providers come in, as they specialize in developing
    and implementing complex solutions, providing the necessary expertise and resources.
    Good providers not only sell platforms but also help address and mitigate potential
    risks. Surprisingly, there aren’t many blockchain applications and services on
    display at the big hotel trade shows. For instance, there were no companies showcasing
    their blockchain-based loyalty programs or payment gateways at The Hotel Show
    in Dubai in 2022, despite Dubai’s reputation for innovation and blockchain-friendly
    environment. This may be due to the hospitality industry’s cautious approach to
    technology innovations. Nevertheless, this book has highlighted numerous technology
    providers as supporters of various hospitality and travel organizations in implementing
    different blockchain applications. So use them as a starting point when searching
    for a technology partner.


    ### Lack of Standardization and Interoperability


    The current blockchain landscape is very fragmented. In the context of the hospitality
    industry, the lack of standardization and interoperability means that different
    companies and organizations in the value chain may use different blockchain platforms,
    protocols, and standards. This can create barriers to communication and collaboration,
    making it difficult for different systems to work together seamlessly.


    After all, the value of a secure network allowing to reliably communicate and
    process orders and data lies in the number of participants that can and wants
    to participate in it.


    Let’s go back to our example of cross-industry collaboration, where airlines,
    airport immigration staff, hotels, and car rental agencies communicate and share
    the traveler’s trip progress and updates. If the blockchain platforms they’re
    using are not able to exchange information, the whole system is useless and user
    experience is fragmented.


    To address this challenge, efforts are being made to establish standards and develop
    open source blockchain platforms that can be utilized across different industries.


    Chain4Travel^([^(97)](#fn97)) is an example of standardization and interoperability
    as it aims to provide a common platform for the travel and hospitality industry.
    It’s an open source blockchain that enables a wide range of services, including
    booking and payments, loyalty programs, and data sharing capabilities compliant
    with the General Data Protection Regulation (GDPR). Chain4Travel is a facilitator
    of Camino Network,^([^(98)](#fn98)) which connects travel and hospitality organizations
    with travelers directly, eliminating the need for intermediaries.


    Furthermore, technologies that are used to deal with sensitive, high-value data
    are typically expected to be certified by an external body.


    Certification brings confidence and attests to the reliability of a tool or adherence
    to a certain level of standards. This approach would be a welcome development
    by hospitality managers, who are concerned about information security and compliance
    aspects.


    In the pursuit of standardization, organizations and initiatives such as the Hospitality
    Technology Next Generation (HTNG) have formed blockchain workgroups to develop
    industry standards and best practices. Although these efforts have resulted in
    general reports on blockchain technology,^([^(99)](#fn99)) achieving widespread
    standardization within the hospitality industry remains a challenge that requires
    continued collaboration and industry-wide cooperation.'
  trans: '

    ### 区块链应用的感知复杂性


    区块链技术被视为复杂、精密且难以实施。这种感知上的复杂性是阻碍该技术在酒店业采用的最大障碍之一。


    区块链领域技术专长和技能的稀缺也加剧了这一困难。将区块链与现有 IT 基础设施及遗留系统整合，需要投入大量精力和资源才能确保无缝对接。


    将基于区块链的解决方案与现有系统集成，可能是酒店业面临的重大挑战。多数企业仍在沿用数十年前开发的遗留系统。技术架构上的差异会引发大量兼容性问题。


    酒店业的 IT 基础设施常如一团乱麻般复杂混乱。多年累积的各类系统与应用相互交织重叠，形成盘根错节的连接与依赖关系。你会看到管理客房预订的物业管理系统（`PMS`）、处理餐饮销售的销售点系统（`POS`）、储存宾客数据的客户关系管理系统（`CRM`），以及负责定价与库存优化的收益管理系统（`RMS`）。每个系统都可能有独立数据库、用户界面和业务规则，并部署在不同服务器或云端，却又需要实时互联互通。


    若考虑整体架构变更，将区块链加入这个体系将是一项浩大工程。需要聘请兼具深厚区块链知识与现有系统经验的技术专家，才能确保流程高效且不会造成过多干扰。


    此外，区块链界面的用户体验仍在发展中，对非技术用户不够直观。这种陌生感加上额外的认证验证步骤，形成了用户采用的门槛。


    但克服这些挑战并非无计可施。企业可投资培训项目提升员工技能，培养内部区块链专家。与技术供应商合作并开展试点项目，能为区块链实施提供宝贵的实践经验与洞察。


    以用户为中心的设计至关重要——简化流程、优化区块链交互体验。通过清晰的指引、直观的界面以及与现有系统的无缝融合，企业可确保区块链技术得到平稳有效的应用。


    #### 寻找合适的合作伙伴


    酒店业高度依赖技术供应商保持创新，但内部 IT 部门往往疲于应对最新趋势，将大量时间花费在系统维护而非新开发上。


    这正是外部技术供应商的价值所在——他们专精于复杂解决方案的开发与实施，能提供必要的专业知识和资源。优秀的供应商不仅销售平台，更会协助识别和规避潜在风险。令人惊讶的是，大型酒店贸易展上鲜少出现区块链应用与服务展示。例如，尽管迪拜以创新精神和区块链友好环境著称，但
    2022 年迪拜酒店展上竟没有企业展示基于区块链的会员计划或支付网关。这或许源于酒店业对技术创新的审慎态度。不过，本书已列举众多技术供应商，他们正在支持各类酒店旅游组织落地区块链应用。不妨以此作为寻找技术合作伙伴的起点。


    ### 标准化与互操作性缺失


    当前区块链领域高度碎片化。就酒店业而言，标准化与互操作性的缺失意味着价值链各环节的企业可能采用不同的区块链平台、协议和标准。这会造成沟通协作障碍，使不同系统难以无缝协同工作。


    毕竟，一个能可靠传递订单与数据的加密网络，其价值完全取决于可参与且愿参与的节点数量。


    让我们回到跨行业协作的例子：航空公司、机场移民局、酒店和租车公司需要共享旅客行程动态。如果各方使用的区块链平台无法交换信息，整个系统将形同虚设，用户体验支离破碎。


    为应对这一挑战，业界正努力建立标准并开发跨行业的开源区块链平台。


    `Chain4Travel`^(⁹⁷) 正是标准化与互操作性的典范，致力于为旅游业提供通用平台。这个开源区块链支持预订支付、会员计划、符合通用数据保护条例（`GDPR`）的数据共享等多元化服务。`Chain4Travel`
    作为 `Camino Network`^(⁹⁸) 的推动者，能将酒店旅游企业与游客直接连接，消除中间环节。


    此外，处理敏感高价值数据的技术通常需要获得外部机构认证。


    认证能带来信心，证明工具的可靠性或符合特定标准水平。对于关注信息安全和合规性的酒店管理者而言，这无疑是值得欢迎的进展。


    在推进标准化的进程中，酒店技术下一代（`HTNG`）等组织成立了区块链工作组，致力于制定行业标准与最佳实践。虽然这些努力已产出区块链技术综合报告^(⁹⁹)，但在酒店业实现广泛标准化仍需持续协作与全行业共同努力。

