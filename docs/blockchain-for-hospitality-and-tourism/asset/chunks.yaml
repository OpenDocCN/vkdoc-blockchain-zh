    forget or misplace your private key, all your digital assets are lost.


    ## Applications


    Digital applications that run on blockchain networks are called decentralized
    applications (dApps).


    Traditional web applications, like Facebook, are owned and managed by a single
    company that has the power to modify and moderate content and set the participation
    rules.


    dApps operate in a decentralized environment, with no single authority, no censorship,
    and no intermediaries.


    They are developed by blockchain software developers and may serve a variety of
    purposes – from gaming to finance.


    ## Projects and Platforms


    As we mentioned earlier, blockchain technology is entering a new stage; it’s becoming
    more mature, scalable, and interoperable.


    The development of new projects and platforms has never been faster. While cryptocurrencies
    are still enjoying the most attention, many distributed ledger platforms now have
    broader capabilities and allow developers to build various applications that “sit”
    on top of their blockchains.


    In this section, we will focus primarily on the top enterprise blockchain platforms.
    First, I’m going to give you a quick overview of those platforms that are most
    popular among corporate users; then we’ll spend a minute on the selection criteria.
    If you are considering joining a blockchain project or building a solution for
    your business, there are a couple of things you should consider. We will examine
    them.'
  trans: '

    # 3. 区块链生态系统


    正如我们在本书开头所说，对于新手来说，区块链世界可能有些令人困惑。在本章中，我们将更仔细地审视这个生态系统中的一些最重要元素——从创建区块的矿工，到构建应用程序、为区块链个人和商业用户带来实用价值的开发者。


    我们还将快速浏览最重要的区块链项目和平台，特别关注那些在酒店和旅游业具有潜在商业应用价值的平台。你应该知道，尽管这项技术相对较新，但区块链平台市场已经非常庞大。网络上充斥着各种排名和比较。如果你正在考虑实施基于区块链的解决方案，选择可能并不容易。然而，在与你的团队和供应商讨论满足你需求的最佳方案时，有一些考量因素你应该牢记。我们将在本章中讨论这些内容。


    关于数字资产交易所的部分，旨在让你更接近这个主题，并简要解释中心化交易所和去中心化交易所之间的区别。


    最后，如果没有用户概览，区块链生态系统概述将是不完整的，这将帮助我们了解当今区块链的采用情况。


    ## 矿工


    矿工是区块链网络的参与者——可以是人或机器——他们执行挖矿。我们在前一章中讨论过挖矿。这是一个在使用工作量证明共识机制的分布式账本上验证和记录交易的过程。


    矿工们竞相解决创建新区块所需的密码学难题。胜出者将新区块添加到链上并获得奖励——目前是 6.25 个比特币（按当前汇率约为 75,000 美元）。


    挖矿奖励并非固定不变；它每四年会经历一个称为"减半"的过程，奖励减半。减半被编程到比特币协议中，以调节新比特币的发行并维持稳定的供应。当比特币在 2009
    年首次被挖出时，每个区块的挖矿奖励是 50 BTC，到 2024 年 5 月，它将再次减半至 3.125 BTC。挖矿是增加新比特币的唯一途径——从这个角度来看，它可以与铸造法定货币相提并论。根据其创造者中本聪制定的规则，同一时间只能存在
    2100 万个比特币，而超过 90% 的比特币已被挖出。


    过去，挖矿是由个人使用相当标准的 CPU 完成的。随着计算难度的增加，更强大的处理能力成为必需。如今，要搭建一个挖矿设备，你会使用性能强大得多的 GPU 或
    ASIC（专用集成电路）。一些矿工还决定与他人联合以提高成功几率——这被称为矿池挖矿。自然，他们必须与其他矿池成员分享奖励。


    ## 开发者


    区块链开发包含多种职能，可以概括为利用区块链技术设计、构建和维护系统及应用。


    核心开发者创建区块链，并添加功能和共识机制。这是软件开发者在其之上构建去中心化应用的基础。


    成为一名区块链开发者需要精通编程语言、数据结构、数据库和密码学。


    此外，个人还必须对区块链、不同的平台、智能合约和工具有深入的理解。然而，所有这些努力都是值得的，因为对区块链开发者的需求正在快速增长。


    如果你正在寻找经验丰富的团队来领导你的区块链项目，美国、印度和英国将是最大的市场，拥有最多的熟练专业人员。然而有趣的是，东欧国家，尤其是波兰和乌克兰，也以其在这一领域拥有一些最优秀的开发者而闻名。


    ### 交易所


    如果你想交易加密货币，你必须使用加密货币交易所。


    中心化加密货币交易所（CEX）由一家公司运营——例如，`Coinbase`、`Crypto.com`、`FTX` 或 `Binance`。这家公司制定交易规则和费用，并通过移动应用或网页浏览器为用户提供访问权限。


    如果你想在选定的中心化交易所开始交易加密货币，你必须在平台上创建一个账户并验证你的身份。这是因为 CEX 必须遵守适用的法律法规，特别是关于反洗钱和反恐融资的规定。一旦你的验证完成，你就可以连接你偏好的资金来源（例如，你的信用卡），然后就可以开始交易了。


    去中心化加密货币交易所（DEX）是一种允许点对点交易的软件——我们可以将其比作一个在线市场，人们可以在其中直接进行交易，无需任何中间人。如果你想参与 DEX，你只需要将你的钱包连接到交易所应用即可。一些最流行的去中心化交易所包括
    `Uniswap`、`PancakeSwap` 和 `Curve`。


    去中心化交易所提供种类繁多的加密货币——既有知名且经过审查的，也有完全随机且高风险的。我会把它们留给专家，因为用户体验稍具挑战性。你需要做大量的研究并且技艺相当高超，因为这里没有客户服务。去中心化交易所不受监管。如果你在
    DEX 上交易，你是匿名的，与 CEX 不同，他们不验证你的身份。另一个区别是，在 CEX，你开立一个名为"托管钱包"的账户。这样，拥有并运营 CEX 的公司会记录你的交易并代表你存储加密货币。如果你丢失了账户登录信息，CEX
    会帮助你恢复。DEX 则不同——在这里，你没有账户，而是使用你的加密货币钱包。如果你忘记或丢失了你的私钥，你所有的数字资产都将丢失。


    ## 应用程序


    在区块链网络上运行的数字应用程序被称为去中心化应用（`dApps`）。


    传统的网络应用程序，如 `Facebook`，由单一公司拥有和管理，该公司有权修改和审核内容，并制定参与规则。


    `dApps` 在去中心化环境中运行，没有单一权威机构，没有审查制度，也没有中间人。


    它们由区块链软件开发者构建，可用于多种目的——从游戏到金融。


    ## 项目与平台


    正如我们之前提到的，区块链技术正进入一个新阶段；它变得更加成熟、可扩展和可互操作。


    新项目和平台的发展从未如此迅速。虽然加密货币仍然吸引着最多的关注，但许多分布式账本平台现在拥有更广泛的能力，允许开发者构建各种"位于"其区块链之上的应用程序。


    在本节中，我们将主要关注顶级企业区块链平台。首先，我将快速概述那些在企业用户中最受欢迎的平台；然后我们会花一点时间讨论选择标准。如果你正在考虑加入一个区块链项目或为你的业务构建一个解决方案，有几件事你应该考虑。我们将对此进行探讨。

    '
- fmt: '### Ethereum


    Ethereum is one of the “original” open source blockchain-based platforms, created
    in 2013. It’s a baseline for many popular applications, including DeFi and NFTs.


    `Ether (ETH)` – Ethereum’s native currency – is today second only to Bitcoin in
    market capitalization. Additionally, the Ethereum Token standard (`ERC-20`) is
    leveraged by other cryptocurrencies.


    Ethereum was the first platform to introduce smart contracts functionality, which
    is a game-changing development for many industries.


    The following are companies using Ethereum: PayPal, Amazon, NVIDIA, McDonald’s,
    and Coca-Cola.


    **Note**


    In September 2022, Ethereum completed the switch from a Proof of Work to a Proof
    of Stake consensus mechanism that is much more energy efficient. According to
    the Ethereum Foundation, this transition reduces Ethereum’s energy consumption
    by 99.95%. This event was called “The Merge.” You can read more about it here:
    [`https://ethereum.org/en/upgrades/merge/`](https://ethereum.org/en/upgrades/merge/).


    ### Hyperledger Fabric


    Hyperledger Fabric is an open source, modular blockchain framework that operates
    as a basis for the creation of blockchain-based applications and solutions. It
    was designed by IBM for enterprise use and launched by the Linux Foundation in
    2016.


    Hyperledger Fabric is private and permissioned; therefore, it’s suitable for businesses
    that require identity management and access control features. Because it’s private
    and all participating members’ identities are known and authenticated, Hyperledger
    Fabric doesn’t have to rely on complex consensus mechanisms; therefore, performance
    is higher than, for example, in the case of the Ethereum network.


    **Note**


    Go to [`www.hyperledger.org/learn/case-studies`](http://www.hyperledger.org/learn/case-studies)
    to learn how Hitachi, Bosch, Walmart, Honeywell, and other companies are using
    Hyperledger Fabric to transform their business processes.


    ### Hyperledger Sawtooth


    Similar to Hyperledger Fabric, Hyperledger Sawtooth is an open source project
    that allows enterprises to create and operate distributed ledger applications.


    The main difference between these two platforms is that Hyperledger Sawtooth supports
    both permissioned and permissionless access (public). These characteristics make
    it a very versatile option and can prove to be a great solution for companies
    with use cases for both.


    **Note**


    Head over to [`https://101blockchains.com/hyperledger-sawtooth-vs-fabric/`](https://101blockchains.com/hyperledger-sawtooth-vs-fabric/)
    to explore the differences and similarities between Hyperledger Fabric and Hyperledger
    Sawtooth.


    ### IBM Blockchain


    IBM tech giant focuses primarily on the benefits of enterprises. IBM’s blockchain
    platform is built on the Hyperledger Fabric mentioned previously and allows corporates
    to join existing networks and create new ones.


    IBM Blockchain has been successfully implemented by many enterprises globally
    and has proven to be an efficient tool in various scenarios, including supply
    chain management, trade finance, oil and gas, and proxy voting.


    **Note**


    To learn more about IBM Blockchain, go to [`www.ibm.com/blockchain`](http://www.ibm.com/blockchain).


    ### Corda


    Corda was created by a company called R3 as a platform focusing on the modernization
    of finance. It is run as a private and permissioned platform and derives most
    of its use cases from the financial services industry.


    Corda doesn’t have a native currency. Instead, it facilitates decentralized finance,
    interbank payments and settlements, and Central Bank Digital Currencies creation.
    Aside from financial use cases, Corda blockchain is successfully deployed in healthcare,
    supply chain management, telecommunications, construction, and many other industries.


    Corda is used nowadays by over 400 organizations, including Allianz, HSBC, ING,
    Microsoft, Oracle, and Accenture.^([⁷](#fn7))


    ### Quorum


    Quorum is a project developed by the JPMorgan Chase experts based on Ethereum.
    It is designed to support private network use cases, where access is permissioned.


    Quorum can operate in two ways – a single entity may own all the nodes (single-company
    blockchain network), or multiple members own a percentage or part of the network
    (consortium). Originally designed for bank use, Quorum puts a lot of emphasis
    on speed, privacy, and security of transactions.


    In 2021, ConsenSys acquired Quorum’s intellectual property rights and, following
    relevant fine-tuning, introduced Quorum Blockchain Service that targets various
    industries and enables streamlined development of enterprise applications. This
    platform is one of the most popular among top businesses using blockchain today.
    It’s being leveraged in various scenarios, from luxury product tracking and tracing
    services for LVMH to home rental and energy trading.^([⁸](#fn8))


    **Note**


    Jamie Dimon, the CEO of JPMorgan openly criticizes cryptocurrencies. During the
    hearing at the US House Financial Services Committee^([⁹](#fn9)) in September
    2022, he called Bitcoin and other tokens “decentralized Ponzi schemes” that facilitate
    theft, money laundering, sex trafficking, and other crimes. At the same time,
    however, he draws a clear line between cryptocurrencies and blockchain technology,
    which he thinks has a real potential to disrupt many industries.


    #### Ripple


    Ripple is primarily known for being a fast and efficient decentralized finance
    platform. As a digital payment network, it facilitates settlement of transactions
    and is designed mainly for banks. In fact, Ripple’s consensus mechanism is based
    on bank servers’ communication.


    Ripple is able to settle a cross-border transaction almost instantly, much faster
    compared to traditional wire transfers. Ripple’s own cryptocurrency – `XRP` –
    is one of the most valuable in the market and essentially acts as a bridge to
    other currencies by facilitating quick conversion between those currencies.


    #### Solana


    Solana is one of the world’s fastest – if not the fastest – blockchain platforms.
    It also offers low transaction fees and is deemed to be eco-friendly due to the
    use of an energy-efficient consensus mechanism (`Proof of History`, which is a
    type of a `Proof of Stake` mechanism).


    Solana gained a lot of traction due to its functionality and efficiency and is
    popular for hosting decentralized applications. Its reputation, however, is deteriorating
    due to many failures, hacks, and a class action lawsuit over misleading investors
    filed against Solana in July 2022.'
