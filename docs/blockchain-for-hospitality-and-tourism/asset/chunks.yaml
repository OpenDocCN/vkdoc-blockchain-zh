- fmt: "# The Phenomenon of Cryptocurrencies\n\nDigital currencies secured by cryptography\
    \ and based on a distributed network consisting of a large number of computers\
    \ are the most popular application of blockchain technology.\n\nIn the first chapter,\
    \ we shed light on the origin of `Bitcoin`, by far the most popular and valuable\
    \ cryptocurrency in the world. Today, there are thousands of cryptocurrencies,\
    \ also known as “cryptocoins” or “altcoins”; many of them disappear as fast as\
    \ they launch.\n\nWhy has the concept of cryptocurrencies gained popularity? They\
    \ have, by design, a couple of advantages over a traditional banking system:\n\
    \n- **The infrastructure**: Cryptocurrencies are based on a distributed and decentralized\
    \ network, without the involvement of banks. It’s an attractive concept to those\
    \ who don’t trust big institutions that have been behind the big financial crises\
    \ around the world. On the other hand, and what’s probably more important to most,\
    \ it means there are no downtimes and no risk of a single point of failure.\n\n\
    - **The security**: Once the transaction occurs, it’s recorded on blockchain and\
    \ cannot ever be erased. It’s secured by cryptography and highly immune to hacks,\
    \ fraud, and counterfeits.\n\n- **The availability**: The market is always open\
    \ for cryptocurrency trading. Payments can be executed around the clock, irrespective\
    \ of time zone differences. The traditional financial system relies on banks and\
    \ clearing and settlement systems that have set business hours and cut-off times\
    \ for payment execution. Cryptocurrencies bypass intermediaries and settle directly\
    \ between two parties, without involvement of banks or credit card companies.\n\
    \n- **The speed**: If you want to send `$100` from your bank account in London\
    \ to your friend’s bank in New York, your payment will likely take two or three\
    \ days. If you send it on Thursday, your friend will see it on Monday, because\
    \ traditional payments are not settled over the weekends. Additionally, you have\
    \ to remember about your bank’s cut-off times for cross-border transactions. If\
    \ you send it before the cut-off time, which let’s say is `2 p.m.` for US dollars,\
    \ your transaction execution will start today. But if you send it after `2 p.m.`,\
    \ your payment will sit in the queue for next-day processing. Next, your bank\
    \ will ship it off to its correspondent bank, and that bank will send it to the\
    \ next correspondent bank who finally will send it to your friend’s bank. Typically,\
    \ the cross-border transaction involves three to four banks. And that’s for the\
    \ US dollar, which is the most accessible currency in the world. Transfers in\
    \ other, less popular currencies may involve even more intermediaries. As cryptocurrencies\
    \ do not require intermediaries, transfers are executed directly between the sender\
    \ and the receiver and can happen in close to real-time.\n\n- **The cost**: Because\
    \ of the lack of intermediaries, the cost of cryptocurrency payments is substantially\
    \ lower. Every bank in the scenario earlier will charge for the transaction processing.\
    \ If you’ve ever sent money abroad, you know that these are hefty fees, averaging,\
    \ according to the World Bank analysis,^([^(20)](#fn20)) `6.3%` of the amount\
    \ sent. Payment using cryptocurrency is sent directly to the recipient, which\
    \ makes the whole process cheaper.\n\nA promise of speed, decentralization, `24/7`\
