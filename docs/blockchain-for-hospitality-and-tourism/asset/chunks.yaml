    ### 加密旅游


    即便您的住所没有加密货币支付网关，也并不意味着加密爱好者就不会选择入住。


    旅行者可以使用用加密货币购买的礼品卡来预订房间，这类礼品卡可以在`Hotels.com`等热门旅游网站上兑换。


    此外，旅行者还可以在众多“支持加密货币”的预订平台上预订住宿，例如`Winding Tree`或`Travala.com`。我们将在本书的下一章中更详细地探讨这个话题。


    旅游生态系统正逐渐接受将加密货币作为支付方式的想法。例如，全球体验平台`GetYourGuide`是与`BitPay`合作的公司之一，这使得游客能够使用加密货币支付本地旅行、短途游和探险项目。


    加密旅游是一个相对较新且小众的趋势，其目标是吸引加密货币爱好者。最常见的两种加密旅游形式包括：(1) 可使用加密货币购买的度假套餐，以及(2) 将休闲活动与加密货币相关活动、讲座、社交机会和研讨会相结合的行程。这些项目专为“加密富豪与名流”设计，可能出于特定目的而组织，例如推广一种新的加密货币的发布。


    过去由一家名为`Coinsbank`的苏格兰公司组织的“`区块链游轮`”^(²⁸)就是一个很好的例子。第四届时共有来自加密货币社区的一千多人参加了这场收官之旅，该届于
    2019 年在`皇家加勒比海洋绿洲号`上举行。参会者包括大巴哈马总督、维基百科联合创始人，以及大量加密货币创造者、投资者和新闻媒体。


    注意


    有趣的是，术语`cryptotourism`也被用来描述另一种小众旅行——寻找像尼斯湖水怪这样的神秘生物。有趣的事实：尼斯湖水怪每年吸引约 50 万游客，并为苏格兰经济增加近
    5400 万美元。^(²⁹)


    还有一些对加密货币爱好者更友好的目的地，例如迪拜，您可以在那里租车，并在几家餐厅用加密货币支付餐费^(³⁰)。


    事实上，迪拜政府建立了一个非常支持区块链的生态系统，这导致大量区块链企业、投资者、交易员和加密爱好者迁往迪拜。众多区块链活动，例如“`区块链经济周`”或“`加密博览会`”，吸引了来自世界各地的数千名游客。诸如著名的“`世界区块链峰会`”等会议，在棕榈岛上豪华的“`亚特兰蒂斯酒店`”举办，也为酒店业带来了巨额收入。毫不奇怪，迪拜的一些豪华酒店正在开通加密支付网关，因为加密货币交易实际上已经发生在海滩酒吧和泳池躺椅旁。


    萨尔瓦多是另一个有趣的案例。尽管国际货币基金组织（IMF）表示担忧，比特币现已在萨尔瓦多被正式承认为法定货币。自 2019 年以来，比特币一直被用作萨尔瓦多沿海村庄的交换媒介，其中一个名为埃尔宗特（El
    Zonte）的城镇正将自己重新打造为“比特币海滩”，成为世界上首个以比特币为中心的经济体。^(³¹)


    另一方面，马耳他则被称为“区块链岛”。由于有利的区块链和金融科技友好法规，马耳他已成为越来越多接受加密货币支付的企业的家园。


    在拥有世界上第一台比特币自动取款机的温哥华，您会发现超过 50 家企业接受加密货币支付。类似地，捷克首都布拉格也被认为是一个非常支持加密的城市。甚至连历史悠久且深受游客喜爱的
    42 路有轨电车现在也接受加密货币付款。拥有硅谷和大量加密及科技初创公司的加利福尼亚州，自然是加密爱好者的理想目的地。


    ### 为什么酒店业企业要接受加密货币？


    如果您想知道为什么酒店、航空公司和其他企业决定涉足数字货币市场，请思考我们本章前面讨论过的主要优势。


    首先，接受加密货币为客户提供了另一种支付选择，这可以增加销售额并提高客户满意度。其次，加密货币支付处理速度快，且与传统支付方式相比，通常交易费用更低。第三，它们不受地理边界限制，这使得它们更易于使用。第四，加密货币交易由加密技术保护，可以防止欺诈和拒付。


    接受加密货币支付的企业通常专注于富有的、数字原生的客户。这是展示品牌创造力、对新技术的开放性以及前瞻性思维的一种方式。拥抱加密货币是提供给酒店客人的体验的一部分。


    然而，另一方面，根据我的研究，接受加密货币支付的酒店承认，使用这种支付方式的预订目前仍不常见。


    如今，加密货币主要被用作投资工具，而非支付方式。那些将比特币和以太币存放在数字钱包里的人，是为了等待更好的时机，期望“加密寒冬”结束，因为他们的资产价值在最近几个月里大幅下跌。在过去一年的加密世界丑闻之后，人们对数字货币的信任度有所下降，我预计不会听到太多关于酒店业企业进入加密货币领域的消息。尽管加密货币市场的价值在增长，但这并不一定意味着主流采用和接受正在临近。

    '
- fmt: '### How Can You Start Accepting Cryptocurrency Payments As a Hospitality Business?


    As you evaluate the pros and cons of crypto, treat Table [5-1](#542012_1_En_5_Chapter.xhtml#Tab1)
    as a quick summary that will help you make up your mind.


    **Table 5-1** Pros and cons of crypto payments from a merchant point of view


    | Pros | Cons |

    | --- | --- |

    | Global accessibility | Price volatility |

    | Lower transaction fees | Limited adoption |

    | Access to customers who prefer crypto | Regulatory uncertainty |

    | No chargebacks – every payment is final | No fraud protection |

    |   | May involve a level of technical complexity with integration |


    Think about current payment methods that your business supports. You’re likely
    heavily relying on credit cards; depending on the location and clientele, you
    may also be accepting cash, electronic transfers, and other forms of payment.


    Now, when it comes to processing costs, cryptocurrencies are generally deemed
    more efficient than credit cards. Fees, depending on the tool and network used,
    vary but shouldn’t exceed 1% of the transaction (compared to 3% and more applied
    in credit card processing). Overall efficiency is amplified by the fact that there
    are no chargebacks and chargeback fees. Once the payment is initiated, it becomes
    irreversible. Customers may dispute the transaction outside of the payment rails.


    In the cross-border space, crypto payments will be cheaper than electronic transfers.
    In case of local payments, many bank providers offer collections for free, which
    means there’s no cost advantage.


    If you want to take cryptocurrency payments at your establishment, you will need
    to form a partnership with a payment gateway provider such as `BitPay`, `Worldline`,
    `CoinGate`, or `Binance`. These are just a few examples.


    Some of the providers will cover both traditional and digital currencies. Consider
    the cryptocurrency selection carefully. Pick those that are relatively safe and
    popular. Providing support for dozens of alternative cryptocurrencies is a difficult
    move that offers very little value. `Bitcoin` and `Ethereum`, in addition to `stablecoins`,
    which are significantly less susceptible to price swings, will most likely be
    viable options.


    Your Finance and Revenue Management teams will need to evaluate the process from
    the risk management perspective in order to make a decision whether to keep the
    cryptocurrency you collect or perhaps immediately convert it to fiat currency.
    Consider tax regulations as well; in some jurisdictions, crypto is deemed to be
    a taxable digital asset.


    ## Summary


    This chapter explored the topic of cryptocurrencies and their impact on the hospitality
    and travel industry. We’ve discussed both the advantages and the challenges associated
    with cryptocurrencies.


    Unfortunately, the world has witnessed spectacular crypto-market crashes and scandals
    over the years, including the collapse of `FTX`. These events impacted the global
    trust in cryptocurrencies, and many companies, including hospitality firms mentioned
    in this chapter, decided to quietly suspend operations in `Bitcoin` and other
    digital coins.


    Irrespective of what your view on this topic is, you need to stay up to date with
    the developments in this field. New forms of digital money are rapidly evolving.
    As mentioned, central banks all over the world are investigating the topic of
    digital currencies. It is likely that we will see significant changes in the financial
    landscape in the coming years.


    In the next chapter, we will delve into another exciting development made possible
    by the decentralized nature of blockchain technology – decentralized booking platforms.


