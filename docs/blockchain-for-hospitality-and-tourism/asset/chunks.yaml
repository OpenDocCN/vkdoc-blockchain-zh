    \ there can only ever be `21 million` Bitcoins in circulation), and so if more\
    \ people want to buy – the price goes up. On the other hand, significant fluctuations\
    \ can be observed when so-called “crypto whales” (large holders of cryptocurrencies)\
    \ decide to sell their assets and flood the market with coins. Another huge factor\
    \ is hype – I already mentioned the Elon Musk effect. Crypto prices are highly\
    \ susceptible to influencers’ and trend makers’ opinions. Crypto markets will\
    \ also react quickly to any new regulations.\n\n## Scalability\n\nEven though\
    \ by design cryptocurrency transactions should be happening in close to real-time,\
    \ many of them struggle with performance and high-volume processing. As we already\
