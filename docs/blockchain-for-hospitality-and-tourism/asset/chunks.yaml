  trans: '

    # 元宇宙的现状


    如果你觉得难以理解或想象元宇宙将如何运作，别担心——你不是一个人。不过，你可能还记得史蒂文·斯皮尔伯格导演的一部著名电影《*头号玩家*》。该片改编自欧内斯特·克莱因
    2011 年出版的科幻小说。故事设定在 2045 年，人们为了逃避地球上的问题，在名为“绿洲”的虚拟天堂中生活，通过化身和触觉服与环境互动。


    但元宇宙并非克莱因所创。这个术语实际上是在大约 30 年前，即 1992 年，由科幻作家尼尔·斯蒂芬森创造的。他在小说《雪崩》中用该词将元宇宙描述为一个虚拟现实空间，人们可以在一个共享的在线世界中彼此互动，并与数字对象交互。


    克莱因和马克·扎克伯格是近年来元宇宙最积极的倡导者。事实上，扎克伯格关于社交媒体和虚拟现实未来的声明，已帮助将元宇宙的概念带入主流，并引发了对其潜在应用和影响的讨论。


    游戏行业多年来一直在探索沉浸式虚拟世界的概念。事实上，有些人将《模拟人生》—— 一款生活模拟电子游戏，你可以在其中创建虚拟人物、建造房屋、建立关系并选择职业
    —— 与元宇宙体验相比。不过，这可能有点夸张。另一方面，《精灵宝可梦 Go》（你很可能听说过它，但以防万一——这款游戏于 2016 年发布，迅速成为一种现象和文化热潮，全球数百万人追逐、训练并在现实环境中与虚拟生物对战）可能是首个可与元宇宙相提并论、且易于上手、富有创新的增强现实与虚拟现实技术应用。


    另一些人声称，元宇宙的概念已在另一款模拟游戏《第二人生》中引入。《第二人生》是一个更先进的平台，拥有 3D 在线世界，用户化身可以与其他用户互动、会面、娱乐，并使用《第二人生》自己的虚拟货币“林登币”购买虚拟房产和物品。2006
    年，《第二人生》处于人气巅峰，全球用户超过一百万，并吸引了一些认识到其营销潜力的大品牌。可口可乐、阿迪达斯、华纳音乐和丰田等公司在该平台上创建了虚拟据点。亚马逊、思科、IBM
    和哈佛大学则利用《第二人生》举办活动和开展虚拟课程。可惜这并未转化为大众化产品。由于众多技术问题和高复杂性等原因，这一概念最终以失败告终。


    **注意**：如果你想了解更多关于《第二人生》及其失败原因的信息，请查看这篇博客：`https://productmint.com/what-happened-to-second-life`


    事实上，元宇宙仍处于早期阶段。不过，已经有一些平台在基于区块链技术创建虚拟世界方面处于领先地位。其中一些（如《堡垒之夜》或《罗布乐思》）专注于游戏和游戏创作，而其他平台（如
    Decentraland 或 The Sandbox）则实现了资产的去中心化所有权和交易。


    -   Decentraland 是最受欢迎的元宇宙平台之一，其虚拟世界完全由其用户拥有和构建。该平台采用去中心化的治理模式，用户可以对决定项目方向的提案进行投票。Decentraland
    也有自己的加密货币 MANA，用作虚拟资产和服务的交换媒介。

    -   Somnium Space 是另一个专注于创建沉浸式交互式虚拟世界的元宇宙平台。该平台利用区块链技术实现虚拟土地和资产的数字所有权，并使用加密货币进行交易。Somnium
    Space 还为用户提供创建自定义虚拟体验（如游戏和社交活动）的工具。

    -   The Sandbox 是一个专注于游戏和用户生成内容的元宇宙平台。该平台利用区块链技术实现虚拟资产和游戏的创建与所有权，并使用加密货币进行交易。The
    Sandbox 还与雅达利、史克威尔艾尼克斯等主要品牌建立了合作伙伴关系，并计划推出虚拟房地产交易市场。


    这些平台不同于传统的在线游戏和社交媒体平台。它们实质上允许在元宇宙内创造一种新经济，用户可以通过创建和销售虚拟商品与服务来赚取收入。它们提供了更沉浸、更具交互性的体验，用户能够在三维空间中自由移动并实时互动。最后，它们赋予了用户更高程度的控制和定制能力，用户可以创建和塑造自己的虚拟世界和体验。


    如你所见，如今即便使用传统的游戏主机、个人电脑或智能手机，也有途径和平台让你一窥元宇宙的风貌。如果你想获得真正沉浸式的体验，就需要某种形式的虚拟现实或增强现实技术。


    这可能包括 VR 或 AR 眼镜或头显，它们通过将数字图像叠加在现实世界之上，或创建完全虚拟的环境，让用户沉浸在虚拟世界中。你可以花几百美元买到 Oculus
    Quest 2（Meta 的一款 VR 头显）或微软 HoloLens 2（一款将数字图像叠加到现实世界、实现混合现实体验的 AR 头显）。许多用户抱怨现在的元宇宙设备太过笨重和不适，但请放心——世界各地的创新实验室正在投入大量精力和资金，致力于让它们变得超轻便且价格亲民。有传言称，苹果正在研发可能彻底改变这一市场的
    AR 眼镜。


    除了 VR 和 AR 设备，还有触觉手套和触觉服，它们通过向用户提供触觉反馈，可以增强元宇宙的沉浸感。触觉手套和触觉服利用传感器和执行器模拟触感，使用户能够与数字对象交互，并在虚拟世界中感受到存在感。一些受欢迎的触觉手套和触觉服包括：


    -   HaptX Gloves：这些手套采用微流控技术来模拟逼真的触感，并提供高精度和高控制力。

    -   Teslasuit：这款全身触觉服通过结合触觉反馈、温度控制和动作捕捉来提供感官反馈。

    -   SenseGlove Nova：这些手套提供逼真的触觉反馈，专为培训和模拟应用而设计。


    触觉反馈具有革命性意义，在培训中可以证明非常有用。想象一下客户互动的模拟。通过使用触觉手套或触觉服，受训者可以体验模拟场景，这些场景复制了真实互动中的身体感觉，例如握手或端着一盘饮料。这有助于受训者为工作中的身体需求做好准备，并让他们更真实地感受到在接待环境中与客户互动是怎样的体验。

    '
- fmt: '触觉反馈还可以用于模拟工作的其他方面，例如处理玻璃器皿等精致或易碎物品。通过使用触觉手套或触觉服，受训者可以体验处理易碎物品的感觉，而无需承担打碎它们的风险，从而练习技巧并建立信心。触觉反馈通过提供更身临其境和逼真的培训体验，可以成为培训酒店业员工的有价值工具。通过模拟真实生活中的互动和体验，受训者可以更好地理解工作的体能要求，并培养提供卓越客户服务所需的技能和信心。我们将在本章下一部分讨论培训及其他元宇宙应用。


    现阶段，这个概念仅仅是一个概念。很难预测它将如何发展。根据我们目前在市场上看到的情况——不会有一个单一的全球元宇宙，而会是互联平台的多元宇宙。你会在网上找到很多预测，从怀疑论者认为元宇宙将保持小众，主要用于游戏和娱乐，到设想该概念将被希望控制它的超级企业滥用的人，再到那些看到动态增长和大规模采用，最终导致现实与虚拟生活无缝融合的人。


    ## 元宇宙机遇


    自2021年以来，元宇宙已吸引了大品牌、媒体和名人的关注。像`Nike`、`Samsung`、`PwC`甚至大型银行（`HSBC`）等公司都在`Decentraland`或`Sandbox`中购买了虚拟土地，用以建造商店和场所，让个人可以在此使用他们的服务、游玩、购买和互动。同时，还出现了第一批酒店、高尔夫球场、会议中心和音乐会场馆，大型虚拟活动、节日、时装秀甚至婚礼都在这里举办。


    事实上，元宇宙在多个行业都提供了许多机遇和用例，包括广告、时尚、娱乐、教育、医疗、房地产等。以下是一些已经开始在该领域进行尝试的公司示例：


    - **广告**：元宇宙为广告和品牌体验提供了新的机遇。像`Verizon`和`Nike`这样的公司已经创建了虚拟体验，允许用户在元宇宙环境中与他们的产品进行互动。


    - **时尚**：时尚行业正在探索利用元宇宙创建虚拟时装秀的潜力，使设计师无需举办实体活动即可向全球观众展示其作品。像`Balenciaga`和`Gucci`这样的公司已经尝试了虚拟时装秀，而像`DressX`这样的初创公司则在创建可在元宇宙体验中穿着的虚拟服装。


    - **娱乐**：元宇宙为观众创造了沉浸式体验的机会，例如虚拟音乐会、电影放映和艺术展览。像`Wave`和`Decentraland`这样的公司已经开始创建虚拟娱乐场所和体验。流行歌手如`Ariana
    Grande`、`Justin Bieber`和`Travis Scott`曾在元宇宙空间为数百万虚拟观众表演。


    - **教育**：元宇宙可用于创建模拟现实生活情境的互动式教育体验，使学习者能够练习和完善他们的技能。像`Engage VR`和`Virbela`这样的公司已经提供虚拟教室和培训模拟。


    - **医疗**：元宇宙可用于提供虚拟医疗服务，例如远程医疗和远程会诊。像`XRHealth`和`Virti`这样的公司已经利用VR和AR技术提供虚拟医疗服务。


    - **房地产**：元宇宙为虚拟房地产的所有权和开发提供了机会，允许个人和企业买卖虚拟土地并建造虚拟房产。像`Decentraland`和`Somnium
    Space`这样的公司已经建立了虚拟房地产市场。


    许多公司和名人已在元宇宙中购买了虚拟土地，要么作为投机性投资，要么作为在崭露头角的虚拟世界中建立影响力的更广泛战略的一部分。以下是一些值得注意的例子：


    - `Nike`：这家运动服装巨头于2019年在`Decentraland`元宇宙中购买了虚拟土地，并在那里开设了一家虚拟快闪店。

    - `Atari`：这家经典视频游戏公司在`Decentraland`和`Sandbox`元宇宙中都购买了虚拟土地，计划在那里开发虚拟游戏体验，并通过非同质化代币（NFTs）实现盈利。

    - `Binance`：这家加密货币交易所于2021年在`Sandbox`元宇宙中购买了虚拟土地，计划在那里建造一个虚拟游戏厅和其他与加密货币相关的体验。

    - `Mark Cuban`：这位亿万富翁企业家和投资者投资了多个与元宇宙相关的项目，包括虚拟房地产平台`Virtual Land`和虚拟世界`Decentraland`。

    - `Snoop Dogg`：这位说唱歌手和媒体人物于2020年在`Sandbox`元宇宙中购买了虚拟土地，计划在那里开设一个虚拟音乐场馆。

    - `Paris Hilton`：这位名人社交名流和企业家于2021年在`Sandbox`元宇宙中购买了虚拟土地，计划在那里开发虚拟时尚和美容体验。

    - `Deadmau5`：这位电子音乐人和制作人在`Second Life`和`Decentraland`中都购买了虚拟土地，并在其中创建了虚拟音乐场馆和其他体验。


    ## 元宇宙中的酒店与旅游


    现在，让我们更仔细地看看酒店和旅游行业。


    批评者认为，酒店和旅游业务关乎的是无法在虚拟世界中替代或复制的亲身实感体验。对于商业模式也存在担忧——毕竟客人和游客是在现场为实际服务付费的，比如食物、便利设施和体验。虚拟旅行会扼杀旅游业吗？你又如何将虚拟会议货币化？


    然而，支持者声称，元宇宙有潜力通过创造沉浸式体验、全球协作和数字所有权的新机遇，在诸多方面彻底改变酒店和旅游行业。事实上，我们可以说，这个行业在利用元宇宙方面具有得天独厚的优势，因为它本身就在从事提供体验和创建将客人运送到新世界的“目的地”这项业务。


    以下是酒店业中用例和关键元宇宙应用的总结：'
  raw: 'Tactile feedback can also be used to simulate other aspects of the job, such
    as the handling of delicate or fragile items like glassware. By using haptic gloves
    or suits, trainees can experience the sensation of handling fragile items without
    the risk of breaking them, allowing them to practice their technique and build
    confidence. Tactile feedback can be a valuable tool in training hospitality staff
    by providing a more immersive and realistic training experience. By simulating
    real-life interactions and experiences, trainees can gain a better understanding
    of the physical demands of the job and develop the skills and confidence needed
    to provide excellent customer service. We’ll talk about training and other Metaverse
    applications in the next section of this chapter.


    At this stage, this concept is just a concept. It’s difficult to predict how it
    is going to evolve. Based on what we’re seeing in the market now – there will
    be no single global metaverse, but rather a multiverse of interconnected platforms.
    You’ll find a lot of predictions online, from skeptics saying the Metaverse will
    remain a niche, used mainly for gaming and entertainment, those that envision
    the concept to be abused by mega-corporations who will want to control it, to
    those that see dynamic growth and mass adoption, leading to seamless integration
    of real and virtual lives.


    ## Metaverse Opportunities


    Since 2021, the Metaverse has captured attention of big brands, media, and celebrities.
    Companies like Nike, Samsung, PwC, and even big banks (HSBC) acquired virtual
    land in Decentraland or Sandbox to build stores and venues where individuals can
    use their services, play, purchase, and interact. There are also first hotels,
    golf courses, conference centers, and concert arenas, where big virtual events,
    festivals, fashion shows, and even weddings are being organized.


    In fact, the metaverse presents many opportunities and use cases across various
    industries, including advertising, fashion, entertainment, education, healthcare,
    real estate, and more. Here are some examples of companies that have started experimenting
    in this space:


    *   Advertising: The metaverse offers new opportunities for advertising and brand
    experiences. Companies like Verizon and Nike have created virtual experiences
    that allow users to interact with their products in a metaverse environment.


    *   Fashion: The fashion industry is exploring the potential of the metaverse
    to create virtual fashion shows, allowing designers to showcase their work to
    a global audience without the need for physical events. Companies like Balenciaga
    and Gucci have already experimented with virtual fashion shows, while startups
    like DressX are creating virtual clothing that can be worn in metaverse experiences.


    *   Entertainment: The metaverse provides an opportunity to create immersive experiences
    for audiences, such as virtual concerts, movie screenings, and art exhibitions.
    Companies such as Wave and Decentraland have already begun to create virtual entertainment
    venues and experiences. Pop stars like Ariana Grande, Justin Bieber, and Travis
    Scott have performed in the Metaverse space for millions of virtual spectators.


    *   Education: The metaverse can be used to create interactive educational experiences
    that simulate real-life situations, allowing learners to practice and refine their
    skills. Companies such as Engage VR and Virbela are already offering virtual classrooms
    and training simulations.


    *   Healthcare: The metaverse can be used to provide virtual healthcare services,
    such as telemedicine and remote consultations. Companies such as XRHealth and
    Virti are already offering virtual healthcare services using VR and AR technology.


    *   Real estate: The metaverse provides an opportunity for virtual real estate
    ownership and development, allowing individuals and businesses to buy and sell
    virtual land and build virtual properties. Companies such as Decentraland and
    Somnium Space have already established virtual real estate markets.


    Many companies and celebrities have purchased virtual land in the metaverse, either
    as a speculative investment or as part of a broader strategy to establish a presence
    in the emerging virtual world. Here are some notable examples:


    *   Nike: The sportswear giant purchased virtual land in the Decentraland metaverse
    in 2019, where it opened a virtual pop-up store.


    *   Atari: The classic video game company has purchased virtual land in both Decentraland
    and the Sandbox metaverses, where it plans to develop virtual gaming experiences
    and monetize them through non-fungible tokens (NFTs).


    *   Binance: The cryptocurrency exchange purchased virtual land in the Sandbox
    metaverse in 2021, where it plans to build a virtual gaming arcade and other crypto-related
    experiences.


    *   Mark Cuban: The billionaire entrepreneur and investor has invested in several
    metaverse-related projects, including the virtual real estate platform Virtual
    Land and the virtual world Decentraland.


    *   Snoop Dogg: The rapper and media personality purchased virtual land in the
    Sandbox metaverse in 2020, where he plans to launch a virtual music venue.


    *   Paris Hilton: The celebrity socialite and entrepreneur purchased virtual land
    in the Sandbox metaverse in 2021, where she plans to develop virtual fashion and
    beauty experiences.


    *   Deadmau5: The electronic musician and producer has purchased virtual land
    in both Second Life and Decentraland, where he has created virtual music venues
    and other experiences.


    ## Hospitality and Travel in the Metaverse


    Let’s now take a closer look at the hospitality and travel Industry.


    Critics say that the hospitality and travel business is about in-person experiences
    that cannot be replaced or replicated in the virtual world. There are also concerns
    about business models – after all guests and tourists spend money on site for
    the actual service – food, amenities, and experiences. Is virtual travel going
    to kill tourism? And how can you monetize virtual conferences?


    Proponents however claim that the Metaverse has the potential to revolutionize
    the hospitality and travel industry in many ways by creating new opportunities
    for immersive experiences, global collaboration, and digital ownership. In fact,
    we could say that this sector is uniquely positioned to take advantage of the
    Metaverse, because it is already in the business of providing experiences and
    creating destinations that transport guests to new worlds.


    The following is a summary of use cases and key Metaverse applications in the
    hospitality industry:'
