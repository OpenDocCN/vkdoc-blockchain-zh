- fmt: "#### Travala.com\n\n`Travala.com` was founded in 2017 with a vision “to align\
    \ travel booking with the ethos of decentralised technology. That being, promote\
    \ accessibility to anyone, anywhere, offer censorship resistant and peer-to-peer\
    \ transactions, and build open-source technology controlled by software and governed\
    \ by users.”\n\nToday, it’s one of the biggest decentralized booking platforms,\
    \ with over two million hotels and other travel service providers around the world,\
    \ offering customers a wide range of options for booking travel accommodations.\
    \ The platform also has a strong focus on sustainability, with a commitment to\
    \ using eco-friendly travel options and reducing carbon emissions. `Travala.com`\
    \ has received widespread recognition for its innovative approach to travel booking,\
    \ including being named one of the “World’s Most Innovative Companies” by `Fast\
    \ Company` in 2020.\n\nOne of the unique features of `Travala.com` is its native\
    \ cryptocurrency, `AVA`, which can be used to book accommodations and receive\
    \ discounts on the platform. The `AVA` token also provides users with additional\
    \ benefits, such as access to loyalty rewards and exclusive promotions. Besides\
    \ `AVA`, the platform supports multitude of other payment methods, including traditional\
    \ credit cards and a variety of cryptocurrencies.\n\nIn addition to its decentralized\
    \ booking model, `Travala.com` also offers a hybrid model that allows users to\
    \ book accommodations from traditional Online Travel Agencies (`OTAs`) like `Booking.com`\
    \ and `Expedia`. This hybrid model provides users with access to a wider range\
    \ of accommodations while still offering the benefits of blockchain technology\
    \ and cryptocurrency payments. Additionally, the company developed a Business\
    \ Booking Engine with Smart Management Dashboard and around-the-clock support\
    \ to facilitate corporate travel.\n\n`Travala.com` is one of the most innovative\
    \ platforms, exploring emerging Web3 use cases such as NFT Travel Tiger Club.\
    \ We will explore this further in the next chapter.\n\n**Note**  \nSimilar blockchain-based\
    \ platforms offering hotel, short-term rental services, and transportation tickets\
    \ include, for example, `Concierge`, `Crowdvilla`, `CryptoCribs`, `Deskbellchain`,\
    \ `Further`, `Travelchain`, `Travel Block`, `Trippki`, and `Trip.io`. Most of\
    \ them either issue or accept cryptocurrencies as travel tokens that can be used\
    \ to make bookings.\n\nTraditional travel companies are also exploring applications\
    \ of blockchain in property management and reservations systems. `TUI Group`,\
    \ for example, is already using blockchain technology to manage the distribution\
    \ of its inventories and assets and handle internal processes.^([^(33)](#fn33))\
    \ Blockchain helps tackle lack of transparency about the hotel’s capacities, different\
    \ rates at different source markets, manual communications, and loss of information.\
    \ `TUI` is also trialing smart contracts with small suppliers to generate more\
    \ efficiency in third-party relationships.\n\n#### Summary: Will Decentralized\
    \ Booking Platforms Disrupt the Travel Market?\n\nAs discussed earlier in this\
    \ chapter, decentralized booking platforms offer numerous benefits to participating\
    \ service providers. We operate in a highly competitive industry with clear dominance\
    \ of Global Distribution Systems and Online Travel Agencies. These intermediaries\
    \ control a significant share of the market and charge high fees for their services.\n\
    \nDecentralized platforms promise substantial cost reduction and increased transparency.\
    \ They have the potential to empower smaller and independent providers who today\
    \ struggle to compete with larger providers who have greater marketing and distribution\
    \ capabilities.\n\nDecentralized platforms can level the playing field by providing\
    \ these providers with greater visibility and access to a wider customer base.\
    \ This can result in increased competition and diversity in the industry, ultimately\
    \ benefiting both customers and service providers. These platforms can also enable\
    \ new business models and revenue streams through innovations such as smart contracts,\
    \ tokens, and NFTs that a participating hotel can benefit from but doesn’t have\
    \ to develop on its own. This creates new opportunities for service providers\
    \ to differentiate themselves and offer unique value propositions to customers.\n\
    \nAll these benefits sound great, right? But there are also challenges that are\
    \ related to adoption and scalability, legal and regulatory uncertainty, and fierce\
    \ competition from the established players.\n\nParticipation in a decentralized\
    \ booking platform requires some level of blockchain knowledge, which can be a\
    \ barrier for many users. Additionally, there’s a problem of trust. Large OTAs\
    \ have significant brand recognition and marketing budgets. They’ve been around\
    \ for some time and gained a high level of adoption already. They’re also innovative\
    \ and offer great and seamless end-user experience. Similarly, Global Distribution\
    \ Systems developed many integrations and processes that are suited for corporate\
    \ travel management for instance.\n\nEmerging decentralized booking platforms\
    \ lack that business connectivity and experiences in many instances. Additionally,\
    \ these established players may have exclusive agreements with hotels and other\
    \ accommodation providers that make it challenging for decentralized platforms\
    \ to access the same inventory.\n\nOn the other hand, we’ve seen some examples\
    \ of collaboration and partnerships between traditional and decentralized platforms.\
    \ `Travala.com`, for instance, partnered with `Booking.com`^([^(34)](#fn34)) and\
    \ more recently with `Expedia`^([^(35)](#fn35)) to extend their offering and enable\
    \ cryptocurrency payments for travel packages.\n\nAnother challenge that should\
    \ be considered when partnering with a blockchain-based booking platform is that\
    \ they operate today in a largely unregulated space. They should comply with existing\
    \ regulations around data privacy or financial transactions monitoring, so be\
    \ sure to verify that if you’re a member or thinking about participating in one\
    \ of them.\n\nWhat must be said is that these platforms have many benefits. They\
    \ will help you reach the crypto community in an easy way, if this is your target\
    \ market and at the same time you don’t want to invest time and resources in direct\
    \ integration with crypto-payments gateways. Most of the challenges that we discussed\
    \ are not insurmountable.\n\nI would risk a statement that decentralized booking\
    \ platforms have the potential to transform the hospitality industry. They can\
    \ do it by creating a more transparent, efficient, and competitive marketplace.\
    \ Does it mean that traditional players will lose a significant market share or\
    \ even cease to exist? Absolutely not. But as blockchain-based innovations mature\
    \ and we start the transition to Web3 (we’ll talk about it more in the next chapter),\
    \ their business model is likely to change."
  raw: '#### Travala.com


    Travala.com was founded in 2017 with a vision “to align travel booking with the
    ethos of decentralised technology. That being, promote accessibility to anyone,
    anywhere, offer censorship resistant and peer-to-peer transactions, and build
    open-source technology controlled by software and governed by users.”


    Today, it’s one of the biggest decentralized booking platforms, with over two
    million hotels and other travel service providers around the world, offering customers
    a wide range of options for booking travel accommodations. The platform also has
    a strong focus on sustainability, with a commitment to using eco-friendly travel
    options and reducing carbon emissions. Travala.com has received widespread recognition
    for its innovative approach to travel booking, including being named one of the
    “World’s Most Innovative Companies” by Fast Company in 2020.


    One of the unique features of Travala.com is its native cryptocurrency, AVA, which
    can be used to book accommodations and receive discounts on the platform. The
    AVA token also provides users with additional benefits, such as access to loyalty
    rewards and exclusive promotions. Besides AVA, the platform supports multitude
    of other payment methods, including traditional credit cards and a variety of
    cryptocurrencies.


    In addition to its decentralized booking model, Travala.com also offers a hybrid
    model that allows users to book accommodations from traditional Online Travel
    Agencies (OTAs) like Booking.com and Expedia. This hybrid model provides users
    with access to a wider range of accommodations while still offering the benefits
    of blockchain technology and cryptocurrency payments. Additionally, the company
    developed a Business Booking Engine with Smart Management Dashboard and around-the-clock
    support to facilitate corporate travel.


    Travala.com is one of the most innovative platforms, exploring emerging Web3 use
    cases such as NFT Travel Tiger Club. We will explore this further in the next
    chapter.


    Note


    Similar blockchain-based platforms offering hotel, short-term rental services,
    and transportation tickets include, for example, Concierge, Crowdvilla, CryptoCribs,
    Deskbellchain, Further, Travelchain, Travel Block, Trippki, and Trip.io. Most
    of them either issue or accept cryptocurrencies as travel tokens that can be used
    to make bookings.


    Traditional travel companies are also exploring applications of blockchain in
    property management and reservations systems. TUI Group, for example, is already
    using blockchain technology to manage the distribution of its inventories and
    assets and handle internal processes.^([^(33)](#fn33)) Blockchain helps tackle
    lack of transparency about the hotel’s capacities, different rates at different
    source markets, manual communications, and loss of information. TUI is also trialing
    smart contracts with small suppliers to generate more efficiency in third-party
    relationships.


    #### Summary: Will Decentralized Booking Platforms Disrupt the Travel Market?


    As discussed earlier in this chapter, decentralized booking platforms offer numerous
    benefits to participating service providers. We operate in a highly competitive
    industry with clear dominance of Global Distribution Systems and Online Travel
    Agencies. These intermediaries control a significant share of the market and charge
    high fees for their services.


    Decentralized platforms promise substantial cost reduction and increased transparency.
    They have the potential to empower smaller and independent providers who today
    struggle to compete with larger providers who have greater marketing and distribution
    capabilities.


    Decentralized platforms can level the playing field by providing these providers
    with greater visibility and access to a wider customer base. This can result in
    increased competition and diversity in the industry, ultimately benefiting both
    customers and service providers. These platforms can also enable new business
    models and revenue streams through innovations such as smart contracts, tokens,
    and NFTs that a participating hotel can benefit from but doesn’t have to develop
    on its own. This creates new opportunities for service providers to differentiate
    themselves and offer unique value propositions to customers.


    All these benefits sound great, right? But there are also challenges that are
    related to adoption and scalability, legal and regulatory uncertainty, and fierce
    competition from the established players.


    Participation in a decentralized booking platform requires some level of blockchain
    knowledge, which can be a barrier for many users. Additionally, there’s a problem
    of trust. Large OTAs have significant brand recognition and marketing budgets.
    They’ve been around for some time and gained a high level of adoption already.
    They’re also innovative and offer great and seamless end-user experience. Similarly,
    Global Distribution Systems developed many integrations and processes that are
    suited for corporate travel management for instance.


    Emerging decentralized booking platforms lack that business connectivity and experiences
    in many instances. Additionally, these established players may have exclusive
    agreements with hotels and other accommodation providers that make it challenging
    for decentralized platforms to access the same inventory.


    On the other hand, we’ve seen some examples of collaboration and partnerships
    between traditional and decentralized platforms. Travala.com, for instance, partnered
    with Booking.com^([^(34)](#fn34)) and more recently with Expedia^([^(35)](#fn35))
    to extend their offering and enable cryptocurrency payments for travel packages.


    Another challenge that should be considered when partnering with a blockchain-based
    booking platform is that they operate today in a largely unregulated space. They
    should comply with existing regulations around data privacy or financial transactions
    monitoring, so be sure to verify that if you’re a member or thinking about participating
    in one of them.


    What must be said is that these platforms have many benefits. They will help you
    reach the crypto community in an easy way, if this is your target market and at
    the same time you don’t want to invest time and resources in direct integration
    with crypto-payments gateways. Most of the challenges that we discussed are not
    insurmountable.


    I would risk a statement that decentralized booking platforms have the potential
    to transform the hospitality industry. They can do it by creating a more transparent,
    efficient, and competitive marketplace. Does it mean that traditional players
    will lose a significant market share or even cease to exist? Absolutely not. But
    as blockchain-based innovations mature and we start the transition to Web3 (we’ll
    talk about it more in the next chapter), their business model is likely to change.'
  trans: "#### Travala.com\n\n`Travala.com` 成立于 2017 年，其愿景是“将旅行预订与去中心化技术的精神相结合，即促进任何人、任何地点的可访问性，提供抗审查的点对点交易，并构建由软件控制、用户治理的开源技术。”\n\
    \n如今，它是最大的去中心化预订平台之一，拥有全球超过两百万家酒店和其他旅行服务提供商，为客户提供丰富的旅行住宿预订选择。该平台还高度重视可持续性，致力于采用环保旅行选择并减少碳排放。`Travala.com`\
    \ 因其在旅行预订领域的创新方法而获得广泛认可，包括在 2020 年被 `Fast Company` 评为“世界最具创新力公司”之一。\n\n`Travala.com`\
    \ 的独特之处之一在于其原生加密货币 `AVA`，可用于预订住宿并在平台上享受折扣。`AVA` 代币还为用户提供额外福利，例如获得忠诚度奖励和独家促销活动。除了\
    \ `AVA`，该平台还支持多种其他支付方式，包括传统信用卡和各种加密货币。\n\n除了去中心化预订模式，`Travala.com` 还提供一种混合模式，允许用户从传统在线旅行社（`OTA`），如\
    \ `Booking.com` 和 `Expedia`，预订住宿。这种混合模式让用户可以访问更广泛的住宿选择，同时仍能享受区块链技术和加密货币支付的优势。此外，该公司还开发了一个带有智能管理仪表板和全天候支持的企业预订引擎，以方便企业差旅。\n\
    \n`Travala.com` 是最具创新性的平台之一，正在探索新兴的 Web3 应用场景，例如 NFT 旅行老虎俱乐部。我们将在下一章中进一步探讨这一点。\n\
    \n**注**  \n类似基于区块链、提供酒店、短租服务和交通票务的平台包括，例如 `Concierge`、`Crowdvilla`、`CryptoCribs`、`Deskbellchain`、`Further`、`Travelchain`、`Travel\
    \ Block`、`Trippki` 和 `Trip.io`。它们中的大多数要么发行旅行代币，要么接受加密货币作为可用于预订的代币。\n\n传统旅行公司也在探索区块链在物业管理和预订系统中的应用。例如，`TUI\
    \ Group` 已经在使用区块链技术来管理其库存和资产的分配，并处理内部流程。^(³³) 区块链有助于解决酒店容量不透明、不同源市场不同价格、手动沟通以及信息丢失等问题。`TUI`\
    \ 还在与小供应商测试智能合约，以提高第三方合作关系的效率。\n\n#### 总结：去中心化预订平台会颠覆旅行市场吗？\n\n正如本章前面所讨论的，去中心化预订平台为参与的旅行服务提供商带来了诸多好处。我们身处一个竞争激烈的行业，其中全球分销系统和在线旅行社占据主导地位。这些中间商控制了相当大的市场份额，并对其服务收取高额费用。\n\
    \n去中心化平台承诺大幅降低成本并提高透明度。它们有潜力赋能那些如今难以与拥有更强营销和分销能力的大型供应商竞争的中小型独立供应商。\n\n去中心化平台可以通过为这些供应商提供更高的曝光度和更广泛的客户群体来创造公平的竞争环境。这可以促进行业的竞争和多样性，最终使客户和服务提供商双方受益。这些平台还可以通过智能合约、代币和\
    \ NFT 等创新技术，催生新的商业模式和收入来源，参与其中的酒店可以从中获益，而无需自行开发。这为服务提供商创造了新的机会，使其能够脱颖而出，并为客户提供独特的价值主张。\n\
    \n所有这些好处听起来都很棒，对吧？但同时也存在挑战，包括采用和可扩展性、法律和监管的不确定性，以及来自现有巨头的激烈竞争。\n\n参与去中心化预订平台需要一定的区块链知识，这对许多用户来说可能是一个障碍。此外，还存在信任问题。大型在线旅行社拥有显著的品牌知名度和营销预算。它们已经存在了一段时间，并获得了很高的采用率。它们也富有创新精神，能够提供出色且无缝的最终用户体验。同样，全球分销系统也开发了许多适用于例如企业差旅管理的集成和流程。\n\
    \n新兴的去中心化预订平台在许多情况下缺乏这种业务连接性和经验。此外，这些现有玩家可能与酒店及其他住宿供应商签订了独家协议，这使得去中心化平台难以获得相同的库存资源。\n\
    \n另一方面，我们也看到了一些传统平台与去中心化平台合作与伙伴关系的例子。例如，`Travala.com` 曾与 `Booking.com`^(³⁴) 合作，最近又与\
    \ `Expedia`^(³⁵) 合作，以扩展其服务范围，并为旅行套餐启用加密货币支付。\n\n与基于区块链的预订平台合作时应考虑的另一个挑战是，它们目前在一个基本不受监管的领域中运营。它们应遵守现有的关于数据隐私或金融交易监控的法规，因此，如果您是其成员或考虑参与其中，请务必核实这一点。\n\
    \n必须指出的是，这些平台具有许多优势。如果您的目标市场是加密社区，并且您不想投入时间和资源进行加密货币支付网关的直接集成，它们将帮助您轻松触达该群体。我们讨论的大多数挑战并非不可克服。\n\
    \n我敢断言，去中心化预订平台有潜力通过创造一个更透明、高效和竞争的市场来改变酒店业。这是否意味着传统玩家将失去大量市场份额甚至不复存在？绝对不会。但随着基于区块链的创新不断成熟，并且我们开始向\
    \ Web3 过渡（我们将在下一章中详细讨论），它们的商业模式很可能会发生变化。"
- fmt: '# As Previously Mentioned


    As previously mentioned, true decentralization is possible if the industry embraces
    the concept of Decentralized Autonomous Organizations. I can imagine hospitality
    and travel service providers (maybe in a country or a region) assembling to create
    a booking platform that allows all stakeholders to co-own it and participate in
    the decision-making process. Such a platform would be managed by individuals from
    participating organizations, and decisions would be made based on a consensus
    mechanism, more transparently and democratically. It’s a vision of the future
    and dare I say – a distant future.


    At the same time let’s not forget about the power of direct bookings. Hotels and
    other service providers put a lot of effort into driving sales through direct
    bookings. Current digital marketing tools and trends, social media campaigns,
    Instagram and TikTok, and influencer marketing are proving to be very efficient.
    Hospitality brands use their optimized websites to offer competitive rates and
    packages and invest in loyalty programs with exclusive discounts and rewards for
    those who book directly. Again – blockchain-based innovations, such as NFTs, can
    greatly enhance this process and incentivize guests to bypass booking engines.


    We are now moving into the next chapter of this book, which aims to demystify
    some of the topics we started touching on earlier. In the next pages, you’ll read
    about the NFTs and the Metaverse that have become viral in the last months.


    Footnotes [1](#542012_1_En_6_Chapter.xhtml#Fn1_source) [2](#542012_1_En_6_Chapter.xhtml#Fn2_source)
    [3](#542012_1_En_6_Chapter.xhtml#Fn3_source) [4](#542012_1_En_6_Chapter.xhtml#Fn4_source)


    # 7. Non-fungible Tokens


    The world of blockchain is full of confusing terms and acronyms. Frankly, I believe
    this jargon is one of the reasons behind the relatively slow adoption of this
    technology. In this chapter, we will decipher one of the big buzzwords – the “NFT.”


    The rise of non-fungible tokens (NFTs) has been one of the most fascinating developments
    in the digital world. In a relatively short span of time, NFTs have gained immense
    popularity and attention from both the art world and the tech industry.


    This chapter will delve into the impact of NFTs on the hospitality and tourism
    industries, exploring how these digital assets are changing the way people experience
    travel and hospitality services. We will examine the use cases of NFTs in these
    industries and their potential benefits and drawbacks.


    ## What Are NFTs?


    A non-fungible token, or an NFT, is a unique digital asset, originally created
    and stored on a blockchain network (Ethereum is the most popular one used for
    this purpose) that records its ownership and certifies its authenticity.


    Typically, NFT represents an image, video, or audio. Unlike fungible assets (for
    instance, money), NFT cannot be copied or subdivided. It’s nonreplaceable, one
    of a kind, and therefore scarce. Every NFT is easily identifiable and can be sold
    or traded in a dedicated marketplace (e.g., OpenSea). In order to do that, you
    will be required to create a digital wallet (for instance, a `MetaMask` or `Coinbase`
    wallet) and acquire the relevant amount of cryptocurrency. Very few NFT marketplaces
    today offer the possibility to buy NFTs using traditional means of payment; however,
    I would expect this to change in the near future.


    The NFT boom started around five years ago with a game called `CryptoKitties`,
    but the whole world heard about NFTs when Christie’s, one of the most renowned
    Auction Houses, sold an NFT image for 69.3 million dollars in an online auction.


    Since then, the NFT market exploded. In a relatively short span of time, NFTs
    have gained immense popularity and attention from both the art world and the tech
    industry. NFTs have become a new way for creators to monetize their digital work
    and for collectors to invest in digital art, collectibles, and other unique digital
    assets. In the era of digital transformation, NFTs have opened up a whole new
    world of possibilities for creators, investors, and businesses alike. Furthermore,
    the ability of NFTs to enable unique and personalized experiences has made them
    attractive to brands and companies in various industries, leading to a diversification
    of the use cases beyond just digital art.


    Projects like `Bored Ape Yacht Club`^([^(36)](#fn36)) or `CryptoPunks`^([^(37)](#fn37))
    made millions in a very short amount of time. The NFT market grew like crazy,
    and big names from sports to fashion, such as NFL, F1, Adidas, Nike, Prada, McDonald’s,
    Tiffany’s, and so on and so on jumped on the NFT bandwagon.


    Despite the excitement surrounding NFTs, they have also faced criticism, with
    some experts likening the market to an economic bubble or Ponzi scheme. In the
    second quarter of 2022, the market began to collapse, with a huge drop in sales
    and quite dramatic devaluation of Bitcoin and other cryptocurrencies. In fact,
    many of the famed NFTs are worthless today.


    Amidst these dramatic market changes however, we can observe an important shift
    in the perception of the NFTs value. While digital collectibles are undoubtedly
    a significant use case for NFTs, many brands are now exploring the real utility
    behind NFT, investing in so-called “phygitals” and meaningful brand engagement
    projects, where NFTs serve as an enabler of value rather than the final product.


    ## Utility NFT


    A utility NFT is a type of digital asset that grants the owner access to special
    advantages, rewards, or privileges not available to the general public. Imagine
    a ticket to an event that’s recorded on a tamper-proof digital ledger and gives
    you access to additional exclusive content, or a membership card that gives you
    loyalty-related perks. It’s safer than traditional cards (provided you maintain
    a cybersecurity hygiene). Only you can claim the rewards associated with it. It’s
    very difficult to copy, and your ownership can be easily verified. On the other
    hand, you may be allowed to trade it, if you wish so, on a secure marketplace.


    Utility NFTs can be used in a variety of industries, including gaming, social
    media, and e-commerce, among others. For example, a utility NFT in a gaming ecosystem
    might provide access to exclusive in-game items or features, while a social media
    platform might offer NFTs that give users access to premium content or tools.


    Utility NFTs are becoming increasingly popular in a variety of industries. Adidas,
    for example, partnered with the `Bored Ape Yacht Club` to issue their first NFT
    collection, which sold out in minutes and made over $23 million in revenue. The
    NFTs gave lucky buyers access to virtual and real-life exclusive Adidas clothes
    collections. Starbucks also introduced an NFT-based reward system called `Starbucks
    Odyssey`, allowing users to earn NFTs by engaging in activities in the Starbucks
    loyalty app, with limited-edition NFT collections available for purchase with
    a credit card. These utility NFTs provide exclusive benefits, such as virtual
    classes and experiences, that focus more on creating unique experiences rather
    than traditional rewards. As the use of NFTs expands across industries, businesses
    have an opportunity to engage with their customers in new and innovative ways.


    According to Moonblock’s “State of the Brand NFT 2022 Report,”^([^(38)](#fn38))
    last year around 160 brands representing 15 industries issued brand NFT collections.
    This technology is now moving to new use cases, including phygitals, loyalty programs,
    and token-gated content. The fashion industry is leading this race, followed by
    entertainment and media and – here, you may be a bit surprised – food and beverage.
    Companies like Taco Bell, Stella Artois, or Dunkin’ Donuts got involved in the
    NFT business pretty early, leveraging these digital assets in their marketing
    campaigns to engage their customers and support charitable causes with the proceeds
    from NFT sales.


    How can the hospitality and tourism industry benefit from that trend? Let’s explore
    it now.'
