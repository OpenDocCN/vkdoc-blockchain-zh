    # 9. Blockchain and Industry 4.0: The Path to a Smart Hotel


    Now that we discussed NFTs and Metaverse it’s time to get down to earth…


    The current stage of industry and technological development is referred to as
    the fourth industrial revolution, or Industry 4.0\. It expands on the first, second,
