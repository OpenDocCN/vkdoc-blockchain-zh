- fmt: '### Launching an NFT Project: First Steps


    I hope that after reading this chapter you see that NFTs can be a great way to
    engage with customers in an innovative way and unlock new revenue streams. If
    you feel inspired by some of the examples we covered, you may be wondering how
    to get started on your own NFT project, whether or not it would be difficult,
    and how much it will cost.


    First, we need to start with your goals and assets. Do you want to sell experiences,
    such as access to a private chef’s table, or a behind-the-scenes tour of the hotel?
    Or maybe you’d like to use photographs and videos as souvenirs for your guests?
    There are plenty of possibilities, and the next steps will be dependent on these
    answers.


    You will likely need a partner, who will help you create the NFT and put it on
    the right platform such as `OpenSea`, `Rarible`, or `SuperRare`. For more complex
    projects, such as loyalty program overhaul or property tokenization, you’ll want
    to collaborate with a company that has experience in the hospitality and tourism
    industry and proptech. Digital souvenirs and collectibles will require less specialized
    knowledge and significantly smaller budget.


    Speaking of costs – the costs of NFT projects can vary greatly depending on many
    factors, including the complexity of the project, the type of assets involved,
    and platform used to create and sell the NFTs. Most NFT platforms charge a fee
    for each NFT created and sold. These fees can vary depending on the platform but
    typically range from 2.5% to 10% of the sale price. The cost of creating the asset
    being sold as an NFT can vary depending on the type of asset. For example, creating
    a unique piece of art or music can be more expensive than creating a photograph
    or video. Depending on the complexity of the NFT project, you may need to hire
    a developer to create the smart contract and code required for the project. On
    top of that, you will have to also consider marketing costs.


    Given these factors, it is difficult to estimate a specific budget and a timeline
    for an NFT project. Souvenirs and collectibles will obviously be much more budget-friendly
    than big loyalty program changes. Joining an ongoing project or a marketplace
    may also prove to be cost-efficient and bring many benefits with great ROI.


    ### The Challenges


    While there’s no doubt in my mind that NFTs offer exciting opportunities for enhancing
    customer engagement and generating additional revenue in the hospitality business,
    their adoption also requires careful analysis of potential risks and downsides.


    First, NFTs are tradable digital assets. This means that they’re susceptible to
    cybersecurity threats. NFT issuers must ensure relevant measures to secure blockchain
    network and related assets and transactions are in place.


    Second, the NFT legal frameworks are still in development phase, so in many instances,
    you’ll face uncertainty and lack of clarity.


    Third, most of the NFTs today are purchased with cryptocurrencies. The market
    may therefore face liquidity risk and be subject to the crypto challenges that
    we discussed in Chapter [5](#542012_1_En_5_Chapter.xhtml). If you’re thinking
    about launching your NFT collection or project, consider partnering with providers
    and marketplaces that enable purchasing with fiat currency.


    And finally, the most important thing – environmental impact. Remember the WWF
    case? Your guests and investors may be concerned about the greenhouse gas emissions
    generated in the process of NFT creation. Make sure to select a platform that
    has minimal impact and investigate environmentally friendly options. As mentioned
    earlier, following the Merge, Ethereum’s network energy consumption was reduced
    by 99.9%. Polygon claims it’s carbon neutral. The Algorand network has made substantial
    efforts to become carbon negative as well. The blockchain ecosystem understands
    that sustainability is an imperative and develops in an eco-friendly way.^([^(66)](#fn66))


    ### Summary


    If you’re in a hospitality or travel business, you know how important it is to
    provide unique and personalized experiences for your guests and how competitive
    the market is today. NFTs offer a new and exciting opportunity to differentiate
    your business and generate added value.


    In this chapter, we discussed different applications of non-fungible tokens –
    from digital souvenirs and collectibles to the creation of unique travel experiences,
    redesign of loyalty programs, Room Night Tokens, and cause-driven projects that
    align business with ESG. We spoke about numerous benefits as well. NFTs can help
    with improving customer engagement, increase brand loyalty, generate additional
    revenue for the business, and provide a secure and transparent record of ownership
    and authenticity.


    The NFT space experienced massive growth and then experienced a major setback
    as the crypto markets collapsed. While many of the over-hyped projects lost a
    lot of value, utility NFTs are here to stay, and as the technology continues to
    evolve, hospitality and tourism professionals should keep an eye on developments
    in this space. In the Web3 ecosystem, NFTs will play a key role in being a tool
    for users to own and trade digital assets. They will also be an important component
    of the metaverse – a topic which we will discuss next.


