  trans: '

    ### 热钱包与冷钱包


    硬件钱包和纸钱包也被称为冷钱包，而连接互联网的钱包则被称为热钱包。


    表 2-3 总结了它们的主要特征。


    **表 2-3** 热钱包与冷钱包对比


    | 热钱包 | 冷钱包 |

    | --- | --- |

    | 连接互联网 | 硬件设备和纸张 |

    | 安全性较低 | 安全性较高 |

    | 灵活且全天候可用 | 依赖设备访问 |

    | 更易于使用 | 支持的币种有限 |

    | 免费 | 成本高昂 |

    | 例如：Coinbase、MetaMask、Blockchain.info | 例如：Trezor、Ledger |


    ### 公钥与私钥


    在上一节中，我提到数字钱包中存储了在区块链上进行交易所需的公钥和私钥。那么，这些密钥到底是什么呢？


    在加密货币世界中，虚拟代币的所有权和控制权是通过数字密钥和地址来实现的。地址就像电子邮件或银行账号——它是一串由字母和数字组成的特殊序列。


    私钥就像密码一样。它是一个随机生成的大数字，通常表示为字母数字字符串，极难记忆。事实上，正因为如此困难，许多钱包使用一种称为“助记词”或“秘密恢复短语”的替代方案。本质上，它是由
    12 到 24 个随机单词组成的字符串，用于访问你的钱包。你必须将它们安全地记在某个地方，因为这些单词本身毫无意义。助记词无法恢复或更改，因此一旦丢失，你将失去对钱包及其资产的控制权。


    如前所述，以通过 Binance 或 Coinbase 等加密货币交易所打开的网络钱包为例，这些公司为用户保管私钥。


    私钥用于解密消息、签署交易并证明对区块链地址的所有权。公钥是通过复杂的加密技术从私钥中生成的，然后用于生成收款地址。任何人都可以使用它，它对公众开放——它基本上充当接收资金的地址。


    这两种密钥都存储在钱包中。如果你丢失了公钥，可以使用私钥重新生成。然而，私钥是无法重新生成的。


    当用户发起向另一用户发送加密代币的交易时，该交易会被广播到网络中。网络参与者会验证其有效性，然后记录在区块链上。


    交易由发送者使用其私钥进行签名。提供签名是为了证明对私钥的所有权，但签名过程不会泄露私钥。验证签名时，会使用公钥。


    一旦交易被验证并包含在区块中，资金就会被发送到接收者的公钥地址。该地址由公钥生成。接收者可以使用自己的私钥访问这些资金。


    ### 智能合约


    想象一下，你正在买房子。这是一个复杂的过程，通常涉及多方、大量文书工作，并且可能需要数周甚至数月的时间。我们有买方、卖方、银行、评估师、律师、检查员等等；此外还有许多条件、复杂的文件和额外费用。


    现在，想象一下所有这一切都可以通过更便宜、更快速的方式完成，而且无需律师参与。这就是智能合约背后的理念。


    智能合约本质上是一种以自动化方式运行的程序或数字代码。它允许在没有中介的情况下交换资产，并且可以持有资金。一旦各方就规则达成一致，智能合约就会启动，并在条件满足时自动执行。你可以包含积极和消极两种条件——例如，“如果评估结果为正，则将文件发送给银行”或“支付首付款”。智能合约还会在事件发生时通知所有相关方，尽管不需要他们采取行动。一切都是自动化的，全天候可用，并且通过记录在区块链上的不可篡改副本确保安全。


    智能合约是最重要的区块链工具之一，在各行各业都有多种应用。智能合约是去中心化应用（dApps）的基础，在去中心化金融（DeFi）、支付和供应链管理中尤其流行。它们在保险、医疗保健、政府服务以及当然还有房地产领域也获得了极大的关注。


    > **注意：** 监管机构正在密切关注智能合约的发展。例如，英国政府已要求法律委员会审查法律问题并提出改革建议，以使现有法律适应包括智能合约在内的区块链驱动变革。该委员会得出结论，现有的法律框架足够灵活，可以支持和促进智能合约的使用。然而，在某些情况下，还需要进一步的工作来适应智能合约。同样，许多国家现在正在制定数字资产法规和法律体系改革，以接纳智能合约并消除关于可执行性的不确定性。


    以太坊区块链是最流行的通用智能合约平台，它允许程序员使用一种名为 `Solidity` 的语言编写智能合约。以太坊上的所有合约都是不可篡改和去中心化的。除以太坊外，还有
    Cardano、Tezos、IOS 和 TRON 等多个平台也支持智能合约的创建。


    总而言之，智能合约有很多好处——它们完全自动化、无需信任（即参与智能合约的各方无需明确信任对方即可确保合约的安全性和有效性）、快速、安全、透明且成本效益高。可重用性是另一个重要特征——同一份合约可以在多个场景中使用，避免了额外的法律工作。然而，这并不意味着智能合约是完美的。它们存在一些风险和挑战，包括软件漏洞、协议变更以及无法传达至区块链的意外现实世界事件。另一个重要的考量因素是监管状况和税务影响——这些在全球范围内各不相同，并且需要一段时间规则才能变得清晰。


    > **注意：** 如果你想了解更多关于智能合约的信息，可以查看 YouTube 上的“Code Is Law?”视频（`www.youtube.com/watch?v=pWGLtjG-F5c`）和以太坊的网站（`https://ethereum.org/en/smart-contracts/`）。


    ### 章节总结


    本章有点像区块链的新兵训练营——我们从最基础的部分开始，介绍了最重要的设计元素。这应该能让你很好地理解区块链的工作原理，这在当今世界向 Web3 迈进以及数字化转型影响着各行各业的企业时是至关重要的。


    如前所述，作为一名酒店业专业人士，你不需要深究区块链的细微之处——那是你的供应商的工作。但如果你想参与一个区块链项目，了解区块链交易如何达成共识，或共识机制意味着什么，至少会很有帮助。


    在下一章中，我们将跳转到区块链宇宙的不同层面，探索其“居民”，从已经多次提及的矿工开始。

    '
- fmt: '# 3. Blockchain Ecosystem


    As we said at the beginning of this book, the blockchain world can be a bit confusing
    for newcomers. In this chapter, we will take a closer look at some of the most
    important elements of this ecosystem – starting from the miners, who create blocks,
    and developers building applications that bring utility to both individual and
    business users of blockchain.


    We will also have a quick overview of the most important blockchain projects and
    platforms, focusing especially on those that support business applications with
    potential in the hospitality and tourism industry. You should know that even though
    the technology is relatively new, the market of blockchain platforms is huge.
    The Web is full of rankings and comparisons. If you are thinking about implementing
    a blockchain-based solution, the choice may not be easy. There are, however, a
    couple of considerations you should keep in mind when talking to your teams and
    vendors about optimal solutions for your needs. We will address them in this chapter
    as well.


    The section on digital asset exchanges aims to bring you closer to the topic and
    provides a brief explanation of the differences between centralized and decentralized
    exchanges.


    Finally, the blockchain ecosystem overview wouldn’t be complete without the user
    base snapshot that will help us understand how blockchain adoption looks like
    today.


    ## Miners


    Miners are the blockchain network participants – people or machines – that perform
    mining. We spoke about mining in the previous chapter. It’s the process of validating
    and recording transactions on a distributed ledger that uses a Proof of Work consensus
    mechanism.


    Miners compete to solve the cryptographic puzzle needed to create a new block.
    A winner adds a new block to the chain and receives a reward – currently, it’s
    6.25 Bitcoins (around 75,000 USD as of today).


    Mining reward is not fixed; it is reduced by half in a process called "halving"
    every four years. The halving is programmed into the Bitcoin protocol to regulate
    the issuance of new Bitcoins and maintain stable supply. When Bitcoin was first
    mined in 2009, mining was incentivized with 50 BTC per block, and in May 2024,
    it will be reduced again to 3.125 BTC. Mining is the only way to add new Bitcoins
    – from that perspective, it can be compared to minting currency. Only 21 million
    Bitcoins can exist at the same time according to the rules established by its
    creator, Satoshi Nakamoto, and over 90% of all coins have already been minted.


    In the past, mining was done by individuals using pretty standard CPUs. With the
    creased difficulty of calculations, greater processing power became a necessity.
    Today, in order to set up a mining rig, you would use a GPU or ASIC (Application
    Specific Integrated Circuits) that are much more powerful. Some miners also decide
    to join forces with others to increase their chances – it’s called pool mining.
    Naturally, they have to share the reward with other miners in the pool.


    ## Developers


    Blockchain development includes a couple of functions that can be summed up as
    designing, building, and maintaining systems and applications leveraging blockchain
    technology.


    Core developers create blockchains and add functionality and consensus mechanisms.
    It’s a foundation on top of which software developers will build decentralized
    applications.


    Becoming a blockchain developer requires proficiency in programming languages,
    data structures, databases, and cryptography.


    Further, an individual has to develop a deep understanding of blockchain, different
    platforms, smart contracts, and tools. All this effort, however, pays off, as
    the demand for blockchain developers is growing at a rapid pace.


    If you are looking for an experienced team to lead your blockchain project, the
    United States, India, and the UK will be the biggest markets with the highest
    number of skilled professionals. Interestingly, however, Eastern European countries,
    especially Poland and Ukraine, are also very well known for being home to some
    of the best developers in this area.


    ### Exchanges


    If you want to trade cryptocurrencies, you will have to use a crypto exchange.


    A centralized crypto exchange (CEX) is run by one company – for instance, `Coinbase`,
    `Crypto.com`, `FTX`, or `Binance`. This company sets the exchange rules and fees
    and offers users access through a mobile app or web browser.


    If you want to start trading cryptocurrencies on a selected centralized crypto
    exchange, you have to create an account on the platform and verify your identity.
    This is because CEX has to comply with applicable laws and regulations, especially
    regarding money laundering and terrorist financing. Once your verification is
    completed, you can connect your preferred source of funds (i.e., your credit card),
    and you can start trading.


    A decentralized crypto exchange (DEX) is a software that allows peer-to-peer trading
    – we can compare it to an online marketplace where people can make transactions
    directly, without any intermediaries. If you want to participate in DEX, all you
    need is to connect your wallet with the exchange app. Some of the most popular
    decentralized exchanges are `Uniswap`, `PancakeSwap`, and `Curve`.


    Decentralized exchanges offer a vast variety of cryptocurrencies – both well known
    and vetted and those completely random and risky. I would leave them to experts,
    as the user experience is slightly more challenging. You need to do a lot of research
    and be pretty advanced because there’s no customer service. Decentralized exchanges
    are not regulated. If you are trading on DEX, you are anonymous, they don’t verify
    your identity, unlike CEX. Another difference is with CEX you open an account
    that is called a "custodial wallet." This way, the company that owns and runs
    CEX keeps track of your transactions and stores crypto on your behalf. If you
    lose login to your account, CEX will help you recover it. DEX is different – here,
    you don’t have an account, but instead, you use your crypto wallet. In case you
    forget or misplace your private key, all your digital assets are lost.


    ## Applications


    Digital applications that run on blockchain networks are called decentralized
    applications (`dApps`).


    Traditional web applications, like `Facebook`, are owned and managed by a single
    company that has the power to modify and moderate content and set the participation
    rules.


    `dApps` operate in a decentralized environment, with no single authority, no censorship,
    and no intermediaries.


    They are developed by blockchain software developers and may serve a variety of
    purposes – from gaming to finance.


    ## Projects and Platforms


    As we mentioned earlier, blockchain technology is entering a new stage; it’s becoming
    more mature, scalable, and interoperable.


    The development of new projects and platforms has never been faster. While cryptocurrencies
    are still enjoying the most attention, many distributed ledger platforms now have
    broader capabilities and allow developers to build various applications that "sit"
    on top of their blockchains.


    In this section, we will focus primarily on the top enterprise blockchain platforms.
    First, I’m going to give you a quick overview of those platforms that are most
    popular among corporate users; then we’ll spend a minute on the selection criteria.
    If you are considering joining a blockchain project or building a solution for
    your business, there are a couple of things you should consider. We will examine
    them.'
