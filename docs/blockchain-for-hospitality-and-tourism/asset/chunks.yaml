  trans: '

    ### 酒店与旅游行业的应用场景


    你可能会感到惊讶，但酒店与旅游行业对于非同质化代币（NFT），尤其是我们之前讨论过的功能型 NFT，其实蕴藏着大量潜在应用。如果你想提升客户体验或增强品牌忠诚度，NFT
    是你值得考虑的潮流之一。数字资产领域正在迅速发展，我们看到许多超越传统营销范畴的应用案例。现在，我们将探讨其中一部分。


    ### 纪念品与体验


    虚拟游览和体验为 NFT 在酒店与旅游行业的应用提供了独特机遇，因为它们为人们体验目的地、景点和活动提供了一种全新方式。


    NFT 可用于创造独特且专属的虚拟体验，人们可以从世界任何地方访问。它们可以用来推广目的地、景点和历史遗迹，或提供对不向公众开放的私有物业的访问权。这一概念已被一些博物馆^(³⁹)和目的地所采用。例如，比利时皇家美术博物馆创建了一个名为“下一个伦勃朗”的
    NFT 系列，展示了伦勃朗画作的数字复制品。该 NFT 还包含对博物馆馆藏虚拟导览的访问权限。^(⁴⁰)


    在酒店领域，我们有一些酒店和目的地与艺术家合作，以 NFT 形式创作数字艺术品和体验的例子。这类 NFT 的灵感可能源自酒店的地理位置或设计，可以作为收藏品出售，或作为纪念品赠送给客人，作为他们住宿的特别纪念。在许多情况下，现在的
    NFT 项目专注于推广独特的利基创作者、当地传统和文化遗产，并提升酒店品牌的企业社会责任。


    万豪国际很可能是最早采用 NFT 酒店营销方法的大型酒店品牌。他们与三位知名数字艺术家（TXREK、JVY 和 Erick Nicolay）合作，创作了自己的
    NFT。这项名为“旅行的力量”的活动于 2021 年 12 月在迈阿密海滩巴塞尔艺术展上首次启动，独特的 NFT 被授予参加活动的竞赛获胜者（同时还有 200,000
    点万豪旅享家积分）。


    另一方面，澳大利亚的铂尔曼酒店及度假村决定举办一场名为“铂尔曼数字 E/SCAPES”的巡回沉浸式 NFT 艺术展，展出四位来自澳大利亚及海外的新兴和原住民女性艺术家的作品。展览包括
    16 件 NFT 艺术品，在大堂的 LED 屏幕上展示。拍卖所得将在艺术家及其选定的当地慈善机构之间分配。据铂尔曼新闻稿称，该项目的目的是为了庆祝新兴艺术家。铂尔曼还旨在成为一个社区目的地，让人们可以体验铂尔曼物业的艺术家游乐场氛围，并了解
    NFT 及其如何为元宇宙做出贡献。


    另一方面，希尔顿推出了一项新的数字艺术和 NFT 试点计划^(⁴¹)，将在该连锁酒店位于纽约市的几家酒店展出由全球知名数字艺术家创作的精选作品的轮换展览。希尔顿通过与
    Niio Art NFT 公司合作，将在纽约希尔顿中城酒店和纽约康莱德中城酒店的客房和公共空间安装数字艺术品。酒店客人将能够在公共区域和房间的屏幕上欣赏数字艺术品，并有机会将部分作品作为礼物艺术流媒体订阅服务或
    NFT 赠品带回家。


    NFT 正被用作纪念品来纪念特别活动和里程碑。巴哈马的天堂岛度假村创建了一个 NFT 以庆祝其成立 25 周年。该 NFT 以水下海洋生物场景为特色，可在
    `Rarible` 市场上购买。另一方面，美国航空将 NFT 作为纪念品赠予其礼宾关键会员，同时还有传统的巧克力礼盒和印有会员姓名的波音 787-9 模型。


    但它们也可用于增强品牌互动，能够创造独特体验、推广品牌并提高客人忠诚度。


    马来西亚的 SEM9 Senai 采用了这种方法，这是一家面向游戏玩家的电子竞技酒店。SEM9 发行了“99LIVES”^(⁴²) NFT 系列，为购买者提供额外福利。NFT
    所有者可享受诸如 SEM9 Senai 一晚免费住宿、限量版 SEM9 商品、受邀参加线下和数字活动、特殊访问 SEM9 及电子竞技幕后花絮，以及所有即将进行的
    SEM9 项目的最新信息等权益。


    酒店营销经理们开始认识到 NFT 背后的功能价值远大于其收藏价值。


    2022 年 11 月，洲际酒店及度假村集团宣布推出其首个系列，包含十个与英国艺术家 Claire Luxton 合作开发的独家 NFT。这一举措以独一无二的艺术品为特色，与高级旅行优惠相关联，并推广将于
    2023 年开业的新物业——罗马大使宫洲际酒店。


    除了这些庆祝品牌传统和旅行的定制数字收藏品外，NFT 还赋予所有者享受独家福利的权限，例如：


    * 拥有一件定制艺术品（共 10 件之一）的 NFT，每件价值在 3,000 至 5,000 英镑之间

    * 洲际大使身份

    * 在新开业的罗马大使宫洲际酒店住宿一晚


    其中五个 NFT 将仅限 `IHG One Rewards` 会员通过 `IHG One Rewards` 拍卖平台进行竞价获取。


    洲际酒店集团奢侈品品牌全球营销副总裁解释说：“这次合作实现了一种独特的体验，浓缩了洲际酒店及度假村的前瞻性思维。”^(⁴³)


    ### 忠诚度计划


    忠诚度计划是酒店和旅游行业的重要组成部分，旨在留住客户并激励重复消费。非同质化代币的使用可以为忠诚度计划增加新的互动水平和专属感，为客户创造独特而难忘的体验。基于
    NFT 的忠诚度计划可以提高客户忠诚度，为品牌制造话题和曝光度，并为奖励和会员卡提供更可持续、更数字化的选择。


    作为区块链上不可篡改的记录，NFT 可以安全地存储有关客户要求和偏好的信息，这些信息可进一步用于个性化他们的住宿。所有与旅行或物业相关的信息也可以编码到 NFT
    中。作为会员卡，NFT 可以提高客户终身价值，并提供关于忠实客户的重要信息来源。

    '
- fmt: '### NFT-Based Rewards Programs


    NFTs can be used as rewards for loyal customers in a variety of ways. For example,
    a hotel or airline can offer NFTs as a reward for reaching a certain level of
    loyalty, such as a certain number of stays or flights. These NFTs can be exclusive,
    limited-edition items that provide customers with a sense of status and achievement.


    `NFT` membership programs are based on a premise that each member is issued an
    `NFT`, which has a permanent and unique blockchain record. This `NFT` then serves
    as the customer’s proof of being part of the programs, and relevant data about
    visits and discounts can be handled digitally too. Blockchain technology guarantees
    automated and error-free reconciliation of points and perks and streamlines the
    back-office processes.


    One way to reimagine the loyalty program is to partner with a blockchain company
    that will support conversion of points into cryptocurrency like in the Wyndham
    Hotels case.


    Aiming to “create new and more meaningful ways for 87 million Wyndham Rewards
    members around the world to seamlessly engage with the program” and to “elevate
    the value of the program for existing members while engaging and enrolling new
    travelers,” Wyndham Hotels^([^(44)](#fn44)) teamed up with a startup called Bakkt
    in 2021. The rewards program allows users to convert loyalty points to cash, Bitcoin,
    and gift cards that guests can redeem at a number of merchants.


    ### VIP Access NFTs and Membership Programs


    NFTs can also be used to provide customers with VIP access to exclusive experiences
    or events. For example, a hotel can offer an `NFT` that grants access to a private
    rooftop party, or an airline can offer an `NFT` that grants access to a VIP lounge.
    These NFTs can be highly sought after and can help create a sense of exclusivity
    and prestige for the loyalty program members. We can now also observe an emerging
    number of properties launching `NFT` membership programs, providing personalized
    and exclusive experiences to their guests.


    The Dream Hollywood Hotel,^([^(45)](#fn45)) for instance, launched a Social Club,
    where you can become a member by purchasing an `NFT`. Your VIP membership gives
    you (and your guest) access to exclusive events, pools, concierge services, and
    many other benefits.


    Viceroy Los Cabos, a luxury resort in Mexico, launched a Digital & Art Dinner
    Club in partnership with `Leales NFT`, a crypto-consultancy company. Members of
    the art and loyalty program get to support the local art scene while also having
    access to hybrid events. Guests can join the Club by purchasing an `NFT` of featured
    artists’ work, with three membership tiers (Charter, Gold, and VIP) to choose
    from. Additional benefits include discounts, complimentary drinks and meals, and
    entry into giveaways for hotel stays.


    OYA Resorts introduced an option for 1,500 members to purchase a lifetime membership
    in their exclusive and members-only resorts. Customers who decide to buy one of
    the lifetime membership NFTs will receive unique experiences not available for
    “traditional” members.


    The membership NFTs are divided into two tiers: `Local` one (priced at 1,000 USD)
    grants unlimited access to one OYA location, whereas a `Global` one (5,000 USD)
    opens up stays in all OYA properties.


    ### NFT Stays and Room Night Tokens


    `NFT` stays and packages represent a new model of booking where hotels provide
    guests with access to exclusive or discounted rooms or packages that are not available
    through traditional booking channels. This allows guests to secure unique experiences
    or add-ons and enables hotels to create loyalty and attract new customers.


    `Room Night Tokens` (`RNTs`) are an emerging trend. They can be purchased directly
    from hotels or from third-party platforms. From the hotel perspective, `Room Night
    Tokens` can help to increase occupancy rates, reduce distribution costs, and improve
    cash flow. They can prove to be an important new revenue stream and a great marketing
    tool, attracting tech-savvy customers. For guests, `RNTs` offer a more flexible
    and convenient way of booking rooms, as they can be easily traded or resold on
    blockchain-based marketplaces. Additionally, `RNTs` may offer exclusive access
    to certain room categories or hotel amenities, as well as discounted rates or
    other special offers.


    Casa de Campo Resort & Villas is a good example of this model. The property partnered
    with `Pinktada`, a membership-based hotel marketing and reservation platform that
    allows guests to reserve rooms with transferable `Room Night Tokens` (`RNTs`)
    using blockchain technology. Guests can purchase `RNTs` and use them to book their
    stays at the resort, providing them with access to exclusive rooms and packages
    that are not available through other booking channels.


    The use of NFTs in this model allows for greater flexibility and personalization,
    as guests can transfer or resell their `RNTs` to others who can then use them
    to book their own stays.


    NoMo SoHo^([^(46)](#fn46)) launched “NFTStays” offering that includes three to
    six night stays at the Manhattan property and grants access to guest rooms at
    a special rate, late check-out, complimentary breakfast, and many other exclusive
    benefits. What’s important is that these packages can be redeemed within 12 months
    of purchase, rather than on a specific date, which gives guests more flexibility.


    The R Collection Hotels Group^([^(47)](#fn47)) pursued a similar concept launching
    the “Lake Como Dream NFT” for their Grand Hotel Victoria property. The NFT (sold
    for 1.5 ETH, which at that time was worth around $3,200 USD) included one-night
    stay and exclusive benefits. The difference between the NFT rate and a standard
    booking was primarily in the fact that the NFT stay could be resold until the
    day before the check-in at the resale price set by the customer.


    The concept of `RNT` is similar to the `NFT` flight ticket introduced by Air Europa.
    Air Europa was the first airline that issued `NFT` flight tickets.^([^(48)](#fn48))
    Their “NFTicket” was sold for astonishing one million dollars and included business
    class flight and invitation to an art show in Miami, among other perks. In 2022,
    Air Europa announced the launch of an `NFT` ticketing platform that will sell
    regular flight bookings as NFTs, alongside traditional ticketing options. When
    booking a flight with the NFT path, passengers gain the option to change the name
    on their booking as many times as they want until 72 hours prior to departure,
    with the airline taking a cut each time the name is changed.


    Meanwhile, airBaltic used NFTs to redesign its frequent flyer program, starting
    with City Collection NFTs that offered limited benefits and then introducing `Planies`,^([^(49)](#fn49))
    which are collectibles that grant various travel-related benefits of the `airBaltic
    Club` loyalty program, including loyalty points, vouchers, and other exclusive
    privileges. As part of its loyalty transformation, airBaltic promises to extend
    participation to non-airBaltic frequent flyers, enable point trading, and detach
    frequent flyer status from individuals.'
