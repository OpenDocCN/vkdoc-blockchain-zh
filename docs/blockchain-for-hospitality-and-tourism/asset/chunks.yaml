    # 5. Cryptocurrencies


    In this chapter, you will read about cryptocurrencies. You might have heard about
    hospitality and travel industry first movers enabling room bookings using crypto-payments
    gateways. We’ll take a look at these examples and briefly discuss other forms
    of money on blockchain to ensure you have a full picture in case you’d like to
    consider adding blockchain payments as an alternative payment method for your
    business.'
  trans: '

    | 去中心化预订平台和旅游市场 | `Web3` 提供了一个创建去中心化预订平台的机会，该平台可直接连接房东与房客。去中心化平台消除了如`Expedia`、`Booking.com`和`Airbnb`等中介机构。取而代之的是，房东和旅行者可以直接联系，无需中心化机构即可完成预订。我们将在第
    5 章详细讨论此用例。 |

    | 忠诚度计划 | `区块链`技术支持安全、透明且去中心化的忠诚度计划管理。基于`区块链`技术的酒店或航空公司忠诚度计划，可以作为一个更安全、更可靠的系统来追踪客户忠诚度奖励。除了增强客户体验、降低成本和流程效率外，正如`阿联酋航空`案例所证明的那样，将忠诚度计划迁移至`区块链`平台还可能有助于标准化合作伙伴的接入流程并解锁更多益处。^(¹⁸)
    事实上，许多酒店业组织现在正在探索将`NFT`（非同质化代币）应用于其忠诚度计划。我们将在第 7 章深入探讨此话题。|

    | `加密货币`支付 | 近年来，`加密货币`获得了显著关注和普及，酒店旅游业也不例外。一些酒店和航空公司已开始接受`加密货币`支付，从而无需银行等中介即可进行快速、安全的交易。客户现在可以使用诸如`比特币`和`以太坊`等数字货币来支付航班和房间费用。我们将在第
    5 章探讨`加密货币`的优势和挑战。 |

    | 去中心化旅游评论平台 | 在线评论欺诈和虚假评论是酒店旅游业面临的一个主要问题。如今的旅行者严重依赖在线评论，互联网上分享的负面意见可能对企业造成极大损害。我们都知道，一位不满客户的负面评价可能会影响
    10 到 15 个人；而一旦放到网上，我们所谈论的则是成百上千的人会因此不会选择你的餐厅或酒店。像`Tripadvisor`这样的传统旅游评论平台因允许误导旅行者的欺诈性评论而受到批评。事实上，`Tripadvisor`报告^(¹⁹)称，在
    2020 年提交到该网站的 3000 万条评论中，约有 4.4%被认定为欺诈性评论。`Tripadvisor`成功阻止了其中三分之二的评论上线。虚假评论可能与有组织的诈骗有关，也可能是由企业自身生成的，方式包括强迫员工发布正面评论或使用虚假评论生成服务。这可能会为企业创造不公平的优势，并误导潜在客户。基于`区块链`技术构建的去中心化旅游评论平台提供了消除虚假评论的机会。评论和评级存储在公共账本上，一旦写入便无法编辑或删除。这为用户创造了透明度和信任。验证凭证也可用于防止虚假评论被添加到平台上。|

    | 个性化旅行体验 | `Web3`支持个性化旅行体验，用户可创建自己的行程、预订体验并管理自己的旅行安排。去中心化旅游平台可以利用`区块链`技术安全地存储用户数据和偏好，从而实现更个性化和高效的旅行体验。|

    | 用于预订和支付的智能合约 | 智能合约是自动执行的合约，其协议条款直接写入代码中。在酒店旅游业背景下，智能合约可用于自动化预订和支付流程。例如，可以在酒店和客户之间创建智能合约，其中预订条款被写入代码，一旦条款得到履行，付款便会自动转给酒店。|

    | 酒店资产代币化 | `Web3`技术还可用于对酒店资产（如酒店房间或度假屋）进行代币化。代币化是将实物资产转换为`区块链`上的数字代币的过程。代币化允许对资产进行分式所有权，并使个人更容易投资于酒店资产。例如，酒店可以将其房间代币化，允许投资者购买房间的一部分并分享收入。我们将在第
    7 章详细讨论分式所有权。|

    | 虚拟和增强现实体验 | `Web3`是元宇宙的基础设施，能够支持创建和存在沉浸式的虚拟和增强现实旅行体验。例如，在元宇宙中，用户可以使用虚拟现实头显探索不同目的地，并感受身临其境的感觉。当用户实际身处某地时，增强现实可用于提供该目的地的实时信息，例如历史和文化事实。本书第
    8 章将深入探讨元宇宙。|

    | 验证凭证 | `Web3`技术可用于创建安全且可验证的数字身份和凭证，有助于防止欺诈并提高酒店旅游业的安全性。|

    | 去中心化供应链管理 | `Web3`技术可用于创建去中心化供应链管理系统，以提高酒店旅游业的透明度和可追溯性。|


    ## 总结


    在本章中，我们探讨了`Web3`的概念，这是基于去中心化技术（以`区块链`为核心）构建的下一代互联网。


    我们讨论了`Web3`如何颠覆传统商业实践，并成为我们经济和社会基础设施的重要组成部分。`Web3`赋予人们更高的自主权，增强信任，并消除了点对点交易中对中间商的需求。


    在探究`Web3`在酒店旅游业中的优势和可能性时，我们初步了解了未来趋势，突出了`区块链`在这些行业应用的各种可能性。


    展望未来，我们将在下一章更深入地探索虚拟货币的世界。`Web3`生态系统在很大程度上依赖于像`比特币`和`以太币`这样的`加密货币`，以安全、去中心化的方式进行交易。我们将研究`加密货币`的主要特征及其对旅游和酒店等行业的影响方式。`加密货币`为我们了解驱动`Web3`的机制提供了一扇窗口，并在年轻一代中引起了广泛关注；因此，理解它们有助于我们认识到其变革潜力。


    脚注 1   2   3   4   5


    # 5. 加密货币


    在本章中，你将读到关于`加密货币`的内容。你可能听说过酒店旅游业的先行者，他们允许通过加密货币支付网关预订房间。我们将审视这些例子，并简要讨论`区块链`上的其他货币形式，以确保在你想考虑将`区块链`支付作为你业务的替代支付方式时，能有一个全面的认识。

