    effort and resources. It’s difficult but not impossible. When you are selecting
    a blockchain platform, make sure you understand all security features, including
    cryptographic methods and frequency of updates.


    *   Functionality: Different platforms will offer different options and be suitable
    for different use cases. You will likely want to focus on enterprise blockchains
    that allow you to build and deploy smart contracts for example (like Ethereum),
    rather than those that are built for the cryptocurrencies and decentralized finance
    (Bitcoin, Ripple).


    Type of a blockchain platform, speed, security, and functionality are the four
    most important aspects that you should take into consideration when selecting
    a solution for your business. If an organization has in-house developers, there
    are other details, like coding languages that the team is comfortable with. This,
    however, is an unlikely scenario in the hospitality and tourism industries. These
    sectors will rather benefit from the solutions created by external companies that
    are easy to integrate.


    ## Users


    Blockchain platforms and applications can be used by both individuals and companies.
    Let’s look at some data and key characteristics of individual blockchain users
    first and, in the second part of this section, focus on businesses and industries
    that are already in the blockchain game.'
