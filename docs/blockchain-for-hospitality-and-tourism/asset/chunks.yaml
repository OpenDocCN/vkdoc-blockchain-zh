- fmt: '# Introduction


    This book is like a *Hitchhiker’s guide to the galaxy*. A guide to the universe
    built on blockchain. This universe is vast and unknown and can be tricky or unwelcoming
    to new visitors. For a newcomer, especially with no technical background, it can
    be difficult to navigate.


    You’ll see a lot of unusual things and unconventional approaches. You’ll see people
    investing millions of dollars in funny digital images and big brands buying virtual
    land that exists only somewhere in the cloud. You’ll hear a completely different
    language, full of abbreviations and nonsense terms that may mean nothing to you.
    You’ll be asked to create avatars, open digital wallets, and share your keys.
    Some will tempt you to invest in their projects and get their coins, and they’ll
    throw in a lot of promises. They will say that their blockchain is the best, the
    most secure, and the most sustainable. That their project has the best ROI. You’ll
    hear that the old world is coming to an end and the only way to survive is to
    move with the blockchain and Web3 tide. But then there will be others, screaming
    that it’s all a fad, a gimmick or a Ponzi scheme. How do you make sense of it?
    As your guide, I’m going to help you navigate this world and show you where to
    go and how to get there.


    As a tourism or hospitality professional, you may wonder how all of this is relevant
    to you. Why would you even want to enter this new galaxy? This book will hopefully
    make it very clear. We’re going to walk through different aspects and dimensions
    of blockchain and learn how it can be leveraged in your business. We will cover
    different applications and capabilities to ensure you have a full picture of the
    landscape. I will show you examples of different applications of blockchain –
    from crypto payments to provenance tracking and cause-driven NFTs. You will discover
    solutions implemented by some of the biggest brands, including your competitors,
    and explore ideas that may prove to be game changers for the hospitality and tourism
    business.


    Hospitality especially is not perceived as the most innovative industry. Technology
    is becoming an important and strategic asset for hospitality organizations, especially
    after the COVID-19 pandemic; however, the industry is perceived as a slow adopter
    of innovations.


    Research^([¹](#fn1)) suggests that the main challenges lie in inadequate education
    and training, limited technological skills, lack of strategic planning, and lack
    of economies of scale.


    The reliance on closed IT architectures and proprietary, specialized technological
    solutions is a major contributor to these issues. As a result, there is an even
    greater need for uniform technological practices. A lack of technical knowledge
    and insufficient ROI analysis are other common obstacles to the widespread adoption
    of innovative technologies.


    Many hotels and other hospitality businesses run on an IT system consisting of
    numerous, independently installed programs from a variety of vendors. These programs
    are often incompatible with one another since they use various platforms and databases.


    New technology adoption is one of the biggest management challenges that requires
    a complex decision-making process. My academic study of perceptions of hospitality
    managers in Dubai, UAE, on blockchain technology confirmed these observations
    and inspired me to write this book. The goal is to equip you with the knowledge
    that will support your strategic business decisions. After reading this book,
    you will have enough data to create and analyze different use cases and proposals
    and to discuss the topics of blockchain, NFT projects, or the Metaverse within
    your organization and with your vendors and suppliers.


    ## Who Is This Book For?


    *   Hospitality leaders and professionals: Hotel managers, general managers, revenue
    management directors, operations directors, hotel IT managers, asset managers,
    brand and strategy managers, marketing managers.

    *   Hospitality vendors, proptech companies, consulting, metaverse, and blockchain
    startups that want to understand the blockchain opportunity in the hospitality
    and tourism space.

    *   Hospitality students: This book aims to showcase the potential of blockchain
    technology and its impact on various aspects of the service organization. If you’re
    a hospitality student, you need to understand how different trends, including
    emerging technologies, are going to impact the industry you will be working in.
    Learning about blockchain at this stage should be, in my view, one of your priorities
    if you want to develop an innovative mindset that will help you excel in your
    future roles.


    ## What Are You Going to Learn?


    *   Blockchain: Foundations, features, benefits, types of blockchain, platforms,
    smart contracts

    *   Blockchain-based innovations: Cryptocurrencies, NFTs, Web3, Metaverse

    *   Applications of blockchain in selected industries

    *   Blockchain use cases in hospitality and tourism: Payments acceptance, disintermediation
    of OTAs, customer loyalty programs, supply chain management, identity services,
    guest preferences tracking, IoT/smart hotel applications, Metaverse

    *   How to start a blockchain project'
