    \ investigation found that CEO Sam Bankman-Fried had misused customer funds, with\
    \ an estimated loss of `$1–$2` billion in customer funds. These events are bound\
    \ to have an impact on the regulations imposed on this market.\n\nAn important\
    \ thing to note here is that some regulators may react fast, and they may be very\
    \ strict, even blocking the transactions, making it very difficult to sell cryptocurrencies,\
    \ or causing the market prices to drop dramatically.\n\nOn the other hand, governments\
    \ and central banks acknowledge that crypto payments trend and the advantages\
    \ of payments executed on blockchain cannot be ignored. In fact, nine out of ten\
    \ Central Banks currently are working on Central Bank Digital Currencies (`CBDCs`)\
    \ – new forms of government-backed digital money. China and India are among the\
    \ few early adopters, with live pilots of Digital Yuan and Digital Rupee. Wide\
    \ implementation of `CBDCs` is likely to take some time, but when it happens and\
    \ when they become recognized as legal tenders, `CBDCs` may impact the usage of\
    \ cryptocurrencies.\n\n`CBDCs` are expected to bring advantages such as stability\
    \ and regulatory oversight and government backing that will attract businesses\
    \ and individuals who are more risk averse. On the other hand, they may not be\
    \ able to replicate some unique features of crypto, such as decentralization or\
    \ global accessibility. It is therefore possible that these two types of digital\
    \ money will coexist and simply serve different purposes.\n\n> **Note**  \n> Stablecoins\
    \ can be a good alternative to highly volatile cryptocurrencies. Their price is\
    \ more *stable*, because it’s tied to another currency, commodity, or financial\
    \ instrument and due to the fact that they maintain reserve assets. Some of the\
    \ most popular stablecoins include `Tether (USDT)`, `USD Coin (USDC)`, and `Binance\
    \ USD (BUSD)`.\n\n## Price Volatility\n\nAs mentioned, cryptocurrency prices are\
    \ extremely volatile. There are a couple of reasons for that. First, the price\
