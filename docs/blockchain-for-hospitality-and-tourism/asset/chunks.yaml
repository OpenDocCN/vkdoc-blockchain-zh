- fmt: "### Individual Users\n\nThe adoption of blockchain-based solutions among individual\
    \ users is driven today mainly by cryptocurrencies and NFTs.\n\nAround 10% of\
    \ all Internet users globally, based on GWI data, owns cryptocurrency, with the\
    \ highest concentration of users in countries with high inflation and volatile\
    \ national currency. Other estimates talk about over 420 million crypto users\
    \ worldwide.\n\nCryptocurrencies are mostly used for investment purposes; however,\
    \ there’s a strong trend toward payments, especially in the remittances space.\
    \ In fact, according to the World Economic Forum and Statista Global Consumer\
    \ Survey, cryptocurrencies are the most popular in Africa, Southeast Asia, and\
    \ Latin America, where they serve as an important alternative to traditional banking\
    \ system for peer-to-peer and cross-border payments.\n\nAs per Chainalysis 2022\
    \ Crypto Adoption Index, global adoption of crypto has leveled off in the past\
    \ year, after steadily increasing since mid-2019. Out of top 20 countries in the\
    \ Chainalysis ranking, vast majority is categorized as lower or upper middle income.\
    \ Users in these countries rely on crypto to send and receive remittances and\
    \ protect their life savings against fiat currency volatility. Only two countries\
    \ in this ranking – United States and UK – are categorized as high income.\n\n\
    Not surprisingly, blockchain, cryptocurrencies, and NFTs are popular among young\
    \ adults. In fact, most of the crypto investments (two-thirds) are in the hands\
    \ of Millennials and Gen Z.^([^(10)](#fn10)) This age group is also more willing\
    \ to use cryptocurrencies for payments.\n\n**Note**\n\nDo you know who owns 1.5%\
    \ of all BTC in the world? The answer may surprise you – it’s the FBI. The first\
    \ big batch of Bitcoins was seized back in 2013 after the Bureau shut down the\
    \ darknet marketplace called the Silk Road. Contrary to the popular belief, it\
    \ is possible to trace Bitcoins and seize the assets of criminals, and law enforcement\
    \ agencies report successful crypto busts relatively often. In order to probe\
    \ illegal actions using cryptocurrency, law enforcement agencies and cybersecurity\
    \ companies have developed a wide range of methods and technologies. The ability\
    \ to trace illegal activity involving crypto is rapidly improving as a result\
    \ of continual improvements in blockchain analytics and growing cooperation between\
    \ law enforcement agencies and industry partners.\n\n### Businesses\n\nAlthough\
    \ blockchain technology is often primarily seen as a medium for financial transactions\
    \ and cryptocurrencies, there are many other applications that may be leveraged\
    \ by businesses in different industries.\n\nIn fact, blockchain technology today\
    \ is used by almost half of the top 100 companies, mainly from the tech, media,\
    \ and telecom sectors, followed by consumer and retail and basic materials and\
    \ industrials sectors.^([^(11)](#fn11)) Blockchain has proved to be useful in\
    \ industries that rely on the secure transfer of records and gains a lot of traction\
    \ in healthcare as well as in the public sector and government services. Implementation\
    \ examples include almost if not every possible industry – from luxury retailers\
    \ to education and agriculture.\n\nWe will explore different blockchain use cases\
    \ in Chapter [5](#542012_1_En_5_Chapter.xhtml), focusing primarily on those that\
    \ have the potential to spill over to hospitality and tourism.\n\nAccording to\
    \ Blockdata research, the majority of the top 100 companies using blockchain today\
    \ choose Hyperledger Fabric. Ethereum and Quorum are in the top three most popular\
    \ enterprise blockchain platforms.\n\nAnother common denominator here is the size\
    \ of the enterprise. The companies that moved to distributed ledger technology\
    \ can be characterized as large, multinational entities or conglomerates. This\
    \ can be explained by a couple of factors.\n\nFirst – the size of a company typically\
    \ implies complexity; multiple systems, processes, and participants are involved\
    \ in thousands of interactions with convoluted procedures, requiring audit trails\
    \ and enhanced controls. Blockchain in this environment has the potential to solve\
    \ many pain points, and building a business case for the implementation is not\
    \ going to be a challenge. Imagine that Walmart Canada distribution, for example,\
    \ can reduce invoice disputes rate from 70% to 1%, substantially reduce operating\
    \ costs, and increase their partner satisfaction by implementing blockchain-based\
    \ freight system.^([^(12)](#fn12)) The efficiency that this technology may bring\
    \ to a company is tremendous.\n\nSecond – in the case of a large corporation,\
    \ the threat of cyberattacks is naturally very high. The hospitality industry\
    \ is not immune to those threats, which can damage the business’s reputation and\
    \ cost millions of dollars. As a custodian of personal data, hotels have to ensure\
    \ their networks are protected. It is, however, an increasingly difficult task,\
    \ and we’ve seen examples of the biggest chains being hacked in the past, including\
    \ attacks on Marriott and the InterContinental Hotels Group.^([^(13)](#fn13))\
    \ In fact, when we look at the statistics, hospitality and retail seem to be the\
    \ criminals’ prime targets. Aside from phishing and stolen credit card data, ransomware\
    \ and distributed denial of service are the most popular attacks, costing the\
    \ industry on average 2.94 million USD.^([^(14)](#fn14))\n\nWith the growing popularity\
    \ of the Internet of Things, these attacks are expected to grow rapidly. Blockchain,\
    \ although not fully hacker-proof, brings the opportunity to redesign cybersecurity\
    \ and make criminal activity more difficult. Strong encryption, the immutability\
    \ of records, and distributed nature remove some of the key vulnerabilities and\
    \ mitigate the risks associated with the central storage of data.\n\nThe scale\
    \ of the business is key when we’re discussing blockchain implementation. If you\
    \ manage a smaller property, for instance, you’ll likely find building a business\
    \ case for migration to blockchain technology difficult. There are, however, ways\
    \ and tools that small enterprises can leverage to get the benefits of blockchain\
    \ without jumping into the full-blown platform transition. If you would like to\
    \ test the waters, consider joining an NFT project or issuing your own loyalty\
    \ NFT. We will discuss these topics in more detail in Chapter [7](#542012_1_En_7_Chapter.xhtml).\n\
    \n### Summary\n\nA first look at the blockchain ecosystem may be baffling if you’re\
    \ new to the topic. This chapter aimed to bring you closer to some of the key\
    \ elements of this world, provide guidance regarding blockchain platforms selection\
    \ criteria, and summarize the adoption progress among businesses and individuals.\n\
    \nIn the next chapter, we are going to explore the transformative potential of\
    \ blockchain technology and its role as the foundation of Web3. In the context\
    \ of the hospitality and tourism industries, Web3 offers various opportunities\
    \ and benefits. These may include enhanced data privacy for travelers, direct\
    \ peer-to-peer transactions without intermediaries, improved supply chain transparency,\
    \ decentralized review and reputation systems, and the ability to tokenize and\
    \ trade unique travel experiences or assets.\n\nAs the book progresses, specific\
    \ applications of Web3 in the hospitality and tourism sectors, such as crypto\
    \ payments, non-fungible tokens (NFTs), and decentralized marketplaces, will be\
    \ explored in more detail, providing a deeper understanding of their potential\
    \ impact and implications.\n\n**Footnotes**  \n[1](#542012_1_En_3_Chapter.xhtml#Fn1_source)\
    \  \n[2](#542012_1_En_3_Chapter.xhtml#Fn2_source)  \n[3](#542012_1_En_3_Chapter.xhtml#Fn3_source)\
    \  \n[4](#542012_1_En_3_Chapter.xhtml#Fn4_source)  \n[5](#542012_1_En_3_Chapter.xhtml#Fn5_source)\
    \  \n[6](#542012_1_En_3_Chapter.xhtml#Fn6_source)  \n[7](#542012_1_En_3_Chapter.xhtml#Fn7_source)\
    \  \n[8](#542012_1_En_3_Chapter.xhtml#Fn8_source)  \n[9](#542012_1_En_3_Chapter.xhtml#Fn9_source)"
  raw: '### Individual Users


    The adoption of blockchain-based solutions among individual users is driven today
    mainly by cryptocurrencies and NFTs.


    Around 10% of all Internet users globally, based on GWI data, owns cryptocurrency,
    with the highest concentration of users in countries with high inflation and volatile
    national currency. Other estimates talk about over 420 million crypto users worldwide.


    Cryptocurrencies are mostly used for investment purposes; however, there’s a strong
    trend toward payments, especially in the remittances space. In fact, according
    to the World Economic Forum and Statista Global Consumer Survey, cryptocurrencies
    are the most popular in Africa, Southeast Asia, and Latin America, where they
    serve as an important alternative to traditional banking system for peer-to-peer
    and cross-border payments.


    As per Chainalysis 2022 Crypto Adoption Index, global adoption of crypto has leveled
    off in the past year, after steadily increasing since mid-2019\. Out of top 20
    countries in the Chainalysis ranking, vast majority is categorized as lower or
    upper middle income. Users in these countries rely on crypto to send and receive
    remittances and protect their life savings against fiat currency volatility. Only
    two countries in this ranking – United States and UK – are categorized as high
    income.


    Not surprisingly, blockchain, cryptocurrencies, and NFTs are popular among young
    adults. In fact, most of the crypto investments (two-thirds) are in the hands
    of Millennials and Gen Z.^([^(10)](#fn10)) This age group is also more willing
    to use cryptocurrencies for payments.


    Note


    Do you know who owns 1.5% of all BTC in the world? The answer may surprise you
    – it’s the FBI. The first big batch of Bitcoins was seized back in 2013 after
    the Bureau shut down the darknet marketplace called the Silk Road. Contrary to
    the popular belief, it is possible to trace Bitcoins and seize the assets of criminals,
    and law enforcement agencies report successful crypto busts relatively often.
    In order to probe illegal actions using cryptocurrency, law enforcement agencies
    and cybersecurity companies have developed a wide range of methods and technologies.
    The ability to trace illegal activity involving crypto is rapidly improving as
    a result of continual improvements in blockchain analytics and growing cooperation
    between law enforcement agencies and industry partners.


    ### Businesses


    Although blockchain technology is often primarily seen as a medium for financial
    transactions and cryptocurrencies, there are many other applications that may
    be leveraged by businesses in different industries.


    In fact, blockchain technology today is used by almost half of the top 100 companies,
    mainly from the tech, media, and telecom sectors, followed by consumer and retail
    and basic materials and industrials sectors.^([^(11)](#fn11)) Blockchain has proved
    to be useful in industries that rely on the secure transfer of records and gains
    a lot of traction in healthcare as well as in the public sector and government
    services. Implementation examples include almost if not every possible industry
    – from luxury retailers to education and agriculture.


    We will explore different blockchain use cases in Chapter [5](#542012_1_En_5_Chapter.xhtml),
    focusing primarily on those that have the potential to spill over to hospitality
    and tourism.


    According to Blockdata research, the majority of the top 100 companies using blockchain
    today choose Hyperledger Fabric. Ethereum and Quorum are in the top three most
    popular enterprise blockchain platforms.


    Another common denominator here is the size of the enterprise. The companies that
    moved to distributed ledger technology can be characterized as large, multinational
    entities or conglomerates. This can be explained by a couple of factors.


    First – the size of a company typically implies complexity; multiple systems,
    processes, and participants are involved in thousands of interactions with convoluted
    procedures, requiring audit trails and enhanced controls. Blockchain in this environment
    has the potential to solve many pain points, and building a business case for
    the implementation is not going to be a challenge. Imagine that Walmart Canada
    distribution, for example, can reduce invoice disputes rate from 70% to 1%, substantially
    reduce operating costs, and increase their partner satisfaction by implementing
    blockchain-based freight system.^([^(12)](#fn12)) The efficiency that this technology
    may bring to a company is tremendous.


    Second – in the case of a large corporation, the threat of cyberattacks is naturally
    very high. The hospitality industry is not immune to those threats, which can
    damage the business’s reputation and cost millions of dollars. As a custodian
    of personal data, hotels have to ensure their networks are protected. It is, however,
    an increasingly difficult task, and we’ve seen examples of the biggest chains
    being hacked in the past, including attacks on Marriott and the InterContinental
    Hotels Group.^([^(13)](#fn13)) In fact, when we look at the statistics, hospitality
    and retail seem to be the criminals’ prime targets. Aside from phishing and stolen
    credit card data, ransomware and distributed denial of service are the most popular
    attacks, costing the industry on average 2.94 million USD.^([^(14)](#fn14))


    With the growing popularity of the Internet of Things, these attacks are expected
    to grow rapidly. Blockchain, although not fully hacker-proof, brings the opportunity
    to redesign cybersecurity and make criminal activity more difficult. Strong encryption,
    the immutability of records, and distributed nature remove some of the key vulnerabilities
    and mitigate the risks associated with the central storage of data.


    The scale of the business is key when we’re discussing blockchain implementation.
    If you manage a smaller property, for instance, you’ll likely find building a
    business case for migration to blockchain technology difficult. There are, however,
    ways and tools that small enterprises can leverage to get the benefits of blockchain
    without jumping into the full-blown platform transition. If you would like to
    test the waters, consider joining an NFT project or issuing your own loyalty NFT.
    We will discuss these topics in more detail in Chapter [7](#542012_1_En_7_Chapter.xhtml).


    ### Summary


    A first look at the blockchain ecosystem may be baffling if you’re new to the
    topic. This chapter aimed to bring you closer to some of the key elements of this
    world, provide guidance regarding blockchain platforms selection criteria, and
    summarize the adoption progress among businesses and individuals.


    In the next chapter, we are going to explore the transformative potential of blockchain
    technology and its role as the foundation of Web3\. In the context of the hospitality
    and tourism industries, Web3 offers various opportunities and benefits. These
    may include enhanced data privacy for travelers, direct peer-to-peer transactions
    without intermediaries, improved supply chain transparency, decentralized review
    and reputation systems, and the ability to tokenize and trade unique travel experiences
    or assets.


    As the book progresses, specific applications of Web3 in the hospitality and tourism
    sectors, such as crypto payments, non-fungible tokens (NFTs), and decentralized
    marketplaces, will be explored in more detail, providing a deeper understanding
    of their potential impact and implications.


    Footnotes [1](#542012_1_En_3_Chapter.xhtml#Fn1_source)   [2](#542012_1_En_3_Chapter.xhtml#Fn2_source)
      [3](#542012_1_En_3_Chapter.xhtml#Fn3_source)   [4](#542012_1_En_3_Chapter.xhtml#Fn4_source)
      [5](#542012_1_En_3_Chapter.xhtml#Fn5_source)   [6](#542012_1_En_3_Chapter.xhtml#Fn6_source)
      [7](#542012_1_En_3_Chapter.xhtml#Fn7_source)   [8](#542012_1_En_3_Chapter.xhtml#Fn8_source)
      [9](#542012_1_En_3_Chapter.xhtml#Fn9_source)'
  trans: "\n### 个人用户\n\n如今，个人用户采用基于区块链的解决方案，主要受加密货币和 NFT 的推动。\n\n根据 GWI 的数据，全球约 10%\
    \ 的互联网用户拥有加密货币，其中用户最集中的是高通胀和本国货币波动剧烈的国家。其他估算称，全球有超过 4.2 亿加密货币用户。\n\n加密货币主要用于投资目的；然而，在支付领域，尤其是在汇款领域，呈现出强劲的增长趋势。事实上，根据世界经济论坛和\
    \ Statista 全球消费者调查的数据，加密货币在非洲、东南亚和拉丁美洲最为流行，在这些地区，它们作为传统银行系统的重要替代方案，用于点对点和跨境支付。\n\
    \n根据 Chainalysis 2022 年加密货币采用指数，全球加密货币的采用率在自 2019 年年中稳步增长后，在过去一年趋于平稳。在 Chainalysis\
    \ 排名前 20 的国家中，绝大多数属于中低收入或中高收入国家。这些国家的用户依赖加密货币来收发汇款，并保护他们的毕生积蓄免受法定货币波动的冲击。在此排名中，只有两个国家——美国和英国——被归类为高收入国家。\n\
    \n毫不奇怪，区块链、加密货币和 NFT 在年轻人中很受欢迎。事实上，大部分加密货币投资（三分之二）掌握在千禧一代和 Z 世代手中。^(¹⁰) 这个年龄段也更愿意使用加密货币进行支付。\n\
    \n**注**\n\n你知道谁拥有全球 1.5% 的比特币吗？答案可能会让你吃惊——是美国联邦调查局（FBI）。第一批大量比特币是在 2013 年该局关闭名为“丝绸之路”的暗网市场后被查获的。与普遍看法相反，追踪比特币并没收犯罪分子资产是可行的，执法机构报告成功破获加密货币案件的频率相对较高。为了调查利用加密货币的非法行为，执法机构和网络安全公司已经开发了多种方法和技术。由于区块链分析技术的持续改进以及执法机构与行业伙伴之间合作的加强，追踪涉及加密货币的非法活动的能力正在迅速提高。\n\
    \n### 企业\n\n尽管区块链技术通常主要被视为金融交易和加密货币的媒介，但还有许多其他应用可以由不同行业的企业加以利用。\n\n事实上，如今近一半的百强企业正在使用区块链技术，主要来自科技、媒体和电信行业，其次是消费品和零售、基础材料和工业行业。^(¹¹)\
    \ 区块链已被证明在依赖安全记录传输的行业中非常有用，并在医疗保健以及公共部门和政府服务领域获得了极大的关注。实施案例几乎涵盖了每一个可能的行业——从奢侈品零售商到教育和农业。\n\
    \n我们将在第 5 章探讨不同的区块链用例，重点关注那些有可能扩展到酒店和旅游业的用例。\n\n根据 Blockdata 的研究，如今大多数使用区块链的百强企业选择\
    \ Hyperledger Fabric。以太坊和 Quorum 在最受欢迎的企业级区块链平台中位列前三。\n\n这里的另一个共同点是企业的规模。迁移到分布式账本技术的公司可以被描述为大型跨国实体或企业集团。这可以通过几个因素来解释。\n\
    \n首先——公司的规模通常意味着复杂性；多个系统、流程和参与者参与其中，涉及数千次带有复杂程序的互动，需要审计追踪和加强控制。区块链在这种环境下有潜力解决许多痛点，并且为实施构建商业案例不会成为挑战。想象一下，例如，沃尔玛加拿大分销公司可以通过实施基于区块链的货运系统，将发票争议率从\
    \ 70% 降低到 1%，大幅降低运营成本，并提高其合作伙伴满意度。^(¹²) 这项技术可能为公司带来的效率是巨大的。\n\n其次——对于大型企业而言，网络攻击的威胁自然非常高。酒店业也无法幸免于这些威胁，这些威胁可能会损害企业的声誉并造成数百万美元的损失。作为个人数据的保管者，酒店必须确保其网络受到保护。然而，这是一项日益艰巨的任务，我们过去曾看到大型连锁酒店被黑客攻击的例子，包括对万豪和洲际酒店集团的攻击。^(¹³)\
    \ 事实上，当我们查看统计数据时，酒店和零售业似乎是犯罪分子的主要目标。除了网络钓鱼和被盗的信用卡数据，勒索软件和分布式拒绝服务是最常见的攻击，平均每年给该行业造成\
    \ 294 万美元的损失。^(¹⁴)\n\n随着物联网的日益普及，这些攻击预计将快速增长。区块链虽然并非完全不受黑客攻击，但它带来了重新设计网络安全并使犯罪活动更加困难的机会。强大的加密、记录的不可篡改性和分布式特性消除了某些关键漏洞，并减轻了与中心化数据存储相关的风险。\n\
    \n当我们讨论区块链实施时，企业的规模是关键。例如，如果你管理一个较小的物业，你可能会发现为迁移到区块链技术构建商业案例很困难。然而，有一些方法和工具可以让小型企业利用区块链的好处，而无需全面启动平台转换。如果你想试水，可以考虑加入一个\
    \ NFT 项目或发行你自己的忠诚度 NFT。我们将在第 7 章更详细地讨论这些主题。\n\n### 总结\n\n如果你对这个话题不熟悉，初次审视区块链生态系统可能会让人感到困惑。本章旨在让你更接近这个世界的某些关键元素，提供关于区块链平台选择标准的指导，并总结企业和个人的采用进展。\n\
    \n在下一章中，我们将探讨区块链技术的变革潜力及其作为 Web3 基础的角色。在酒店和旅游业的背景下，Web3 提供了各种机会和优势。这些可能包括为旅行者增强数据隐私、无需中介的直接点对点交易、改进的供应链透明度、去中心化的评论和声誉系统，以及将独特的旅行体验或资产代币化并进行交易的能力。\n\
    \n随着本书的深入，我们将更详细地探讨 Web3 在酒店和旅游行业的具体应用，例如加密货币支付、非同质化代币（NFT）和去中心化市场，从而更深入地理解其潜在影响和意义。\n\
    \n**脚注**  \n1  \n2  \n3  \n4  \n5  \n6  \n7  \n8  \n9\n"
- fmt: '# 4. Into the Web3


    Consulting firms and industry experts have been paying close attention to the
    rise of blockchain technology because of its potential to shake up many different
    industries. Blockchain was even called the most disruptive technology of our time
    because of its potential to upend current economic structures.


    Blockchain’s ability to enable decentralized, transparent, and secure transactions
    in domains as diverse as finance, supply chain management or healthcare holds
    the possibility of revolutionizing established industries. By eliminating middlemen
    and allowing direct interactions between users, blockchain has the potential to
    improve efficiency, decrease prices, and strengthen security of business interactions.


    Blockchain is also considered as a foundational technology. New forms of trust,
    value exchange, and governance could be established, allowing for the development
    of more robust economic and social institutions. By virtue of its decentralized
    nature, the technology can be used to create new kinds of decentralized applications,
    DeFi (decentralized financial infrastructure), ID systems, and more.


    Starting from this chapter, we’ll be focusing on specific applications and developments
    enabled by blockchain. You may be surprised, but this technology is indeed a foundation
    for many innovations that make the headlines today. In fact, blockchain is the
    backbone of Web3 – the new generation of the Internet that’s built on decentralized
    ledgers.


    We will begin by defining Web3 and providing a brief history of its development.
    We will then take a helicopter view of how Web3 can be used in the hospitality
    and tourism industries, emphasizing the benefits and opportunities it offers.
    Treat this part of the book as an introduction, a lay of the land. Many of the
    Web3 elements, like the crypto payments or the NFTs, will be covered separately
    in the next chapters because we already have a lot of developments in this space
    and so they deserve a deeper investigation.


    ## What Is Web3


    The rise and evolution of the Internet have brought great changes in the hospitality
    and tourism industries. In the last two decades, the sector has seen a shift in
    how customers engage with businesses and make travel reservations. With the advent
    of Web3, the sector must prepare for yet another huge transformation. Web3 is
    characterized by decentralization, transparency, and security. It provides a variety
    of opportunities for hospitality and tourism organizations, from enabling safe
    transactions to the creation of unique and personalized consumer experiences.


    As the name suggests, Web3 is the third generation of the Internet. The first
    generation, Web 1.0, began in the early 1990s when the World Wide Web was introduced.
    You may still remember it. It was clunky, static, and read-only. You could consume
    information, but you couldn’t interact with it.


    Things changed dramatically in the 2000s, with the rise of social media, mobile
    devices, and cloud computing. Web 2.0 is characterized by interactivity, user-generated
    content, and personalization and is dominated by centralized services and platforms
    like Facebook, Google, or Amazon. Most of us can’t really imagine life without
    convenient and powerful online tools provided by these companies. There are, however,
    also a lot of controversies around the amount of data that they collect from their
    uses, concerns about privacy, censorship, and the concentration of power in the
    hands of a few large corporations.


    Web3 is expected to change this and level the playing field. The Harvard Business
    Review article^([^(15)](#fn15)) defines Web3 as “a decentralized internet, in
    which users own and control their data, and digital assets are traded directly
    between peers.” Users can have greater control over their data and online experiences.
    Blockchain-based social networks and marketplaces enable users to engage directly
    with each other, without the need for intermediaries or centralized authorities.
    This model also allows for improved privacy and security, because consumers can
    control their own data and protect themselves from the risk of having it stolen
    or misused by centralized companies.


    Dr. Gavin Wood, one of Ethereum’s co-founders, first described the notion of Web3
    in his 2014 white paper^([^(16)](#fn16)) titled “Ethereum: A Next-Generation Smart
    Contract and Decentralized Application Platform.”


    Wood envisioned a new sort of Internet, one that would allow the development of
    decentralized applications (dApps) that run on blockchain networks rather than
    centralized servers. Wood’s idea was to build an Internet in which users could
    deal with one another without the need for intermediaries, utilizing smart contracts
    that automatically implement transaction conditions.


    Web3 has been a popular word in the technology world since the publication of
    Wood’s white paper. Web3 has the potential to disrupt numerous industries, including
    finance, healthcare, and government, according to a Deloitte analysis,^([^(17)](#fn17))
    by enabling new business models and increased efficiency. Some claim it’s not
    just a new technology but rather a completely new way for how we, as individuals
    and customers, interact with the Internet. The main rule of Web3 is user control
    – you own and manage your data. You can decide who can access it. You can monetize
    your data and your digital assets. In Web3, users participate in decentralized
    governance models and have a say in how the systems and applications are developed
    and operated. This is very different to Web2 where we act only as consumers of
    content with little or no control over our data and online experiences.


    This shift is enabled by a couple of core key elements constituting the new world
    of the Internet:


    *   Decentralized technologies, such as blockchain, that remove the need for intermediaries
    and central authorities and make peer-to-peer transactions possible

    *   Interoperability protocols, such as Ethereum or Polkadot, that enable communication
    between different blockchain networks

    *   Cryptography, including digital signatures and key encryption (see previous
    chapters), to secure data and transactions


    Web3 relies heavily on new technologies like artificial intelligence, 3D graphics,
    and virtual and augmented reality. We’ll discuss their importance and applications
    in the next chapters.


    Let’s now look at the potential implications of the Web3 introduction for the
    hospitality and tourism industry.


    ## Web3 Opportunities for the Hospitality and Tourism Industry


    At this point, you may be wondering why we’re talking about Web3 and how this
    topic is relevant to the hospitality and tourism industry. Let’s pause here for
    a moment and think about the importance of the Internet and the changes it has
    brought to the industry over the last two decades. We’ve all seen a major shift
    in the way businesses operate and engage with customers. Everything moved to “online,”
    and the world suddenly became a much smaller and much more accessible place. You
    can’t imagine a hotel without a website, an online booking platform, online payments,
    and social media accounts.


    Now, as we gradually move to Web3, hospitality needs to prepare for another huge
    transformation. Blockchain-enabled innovations bring solutions to many challenges
    facing the hospitality and tourism industry. Some of them, however, have a game-changing
    potential and may have a profound impact on how the industry is going to evolve.


    It’s time now to start translating technology into business and use cases. In
    Table [4-1](#542012_1_En_4_Chapter.xhtml#Tab1), you’ll find a couple of blockchain
    and Web3 applications. Note this list is not exhaustive and will likely evolve
    as the technology matures.


    Table 4-1


    Overview of blockchain applications in the hospitality industry'
