- fmt: '### Hot and Cold Wallets


    Hardware and paper wallets are also known as cold wallets, whereas those that
    connect to the Internet are called hot wallets.


    Table [2-3](#542012_1_En_2_Chapter.xhtml#Tab3) summarizes their key features.


    **Table 2-3** Comparison of hot and cold wallets


    | Hot Wallets | Cold Wallets |

    | --- | --- |

    | Connected to the Internet | Hardware devices and paper |

    | Lower security | Higher security |

    | Flexibility and 24/7 availability | Reliance on access to a device |

    | More user-friendly | Support a limited variety of coins |

    | Free of charge | Expensive |

    | Examples: Coinbase, MetaMask, Blockchain.info | Examples: Trezor, Ledger |


    ### Public and Private Keys


    In the previous section, I’ve mentioned that digital wallets store public and
    private keys that you need to perform a transaction on the blockchain. So what
    are those keys?


    In a crypto world, ownership and control of virtual tokens happen through digital
    keys and addresses. The address is like an email or a bank account number – it’s
    a special sequence of letters and numbers.


    A private key is like a password. It’s a large, randomly generated number, usually
    represented as a string of alphanumeric characters, impossible to remember. In
    fact, because it’s so difficult, many wallets use an alternative called a "seed
    phrase" or a "secret recovery phrase." Essentially, it’s a string of 12–24 random
    words that you use to access your wallet. You will have to note them down somewhere
    safe as they make absolutely no sense. There’s no way to recover a seed phrase
    or change it, so if it’s lost – you lose access to your wallet and your assets.


    As mentioned earlier, in the case of web wallets, for example, opened with a crypto
    exchange like Binance or Coinbase, the companies hold private keys for the users.


    The private key is used to decrypt the message – to sign transactions and prove
    ownership of a blockchain address. The public key is created from the private
    key using complex cryptography. It is then used to generate a receiving address.
    Anyone can use it; it’s available to the public – it basically works as the address
    for receiving funds.


    Both keys are stored in a wallet. If you lose your public key, it can be recreated
    using the private key. Recreation of the private key is, however, not possible.


    When a user initiates a transaction to send crypto tokens to another user, it
    is broadcasted to the network. The participants check the validity, and it is
    recorded on the blockchain.


    The transaction is signed by the sender using their private key. The signature
    is provided to prove the ownership of the private key, but it does not disclose
    the private key. To verify the signature, the public key is used.


    Once the transaction is validated and included in the block, the funds are sent
    to the recipient’s public address. This address is generated from the public key.
    The receiver can access the funds using their private key.


    ### Smart Contracts


    Imagine you’re buying a house. It’s a complicated process that typically involves
    a couple of parties and a lot of paperwork and can take weeks if not months. We’ve
    got the buyer, the seller, the bank, the appraiser, the solicitor, the inspector,
    etc.; then there are a lot of conditions, convoluted documentation, and additional
    fees.


    Now, imagine that all of this can be done in a much cheaper and faster way, with
    no lawyers involved. This is the idea behind smart contracts.


    A smart contract is essentially a program or digital code that operates in an
    automated manner. It allows to exchange assets without the need for intermediaries
    and can hold funds. Once the rules are agreed upon between the parties, the smart
    contract goes live and executes automatically when the conditions are met. You
    can include both positive and negative conditions – for instance, "If the appraisal
    is positive, send the documents to the bank" or "Send the first instalment." The
    smart contract will also notify all involved parties if an event occurs, although
    it doesn’t require them to act. Everything is automated, available 24/7, and secure
    with immutable copies recorded on blockchain.


    Smart contracts are one of the most important blockchain tools with various applications
    across a wide range of industries. Smart contracts are the foundation for decentralized
    applications (dApps), especially popular in decentralized finance (DeFi), payments,
    and supply chain management. They’re also gaining a lot of traction in insurance,
    healthcare, government services, and, naturally, real estate.


    > **Note:** Regulators are keeping a close eye on smart contract developments.
    The UK government, for instance, has asked the Law Commission to review legal
    issues and suggest reforms that will adapt existing law to the blockchain-driven
    changes that include smart contracts. The Commission concluded that the existing
    legal framework is flexible enough to support and facilitate the use of smart
    contracts. In some instances, however, further work will be required to accommodate
    smart contracts. Similarly, many countries are now working on digital asset regulations
    and legal system reforms that would embrace smart contracts and remove uncertainties
    regarding enforceability.


    Ethereum blockchain is the most popular general-purpose smart contract platform
    that allows programmers to write smart contracts in a language called `Solidity`.
    All contracts on Ethereum are immutable and decentralized. Aside from Ethereum,
    there are several other platforms like Cardano, Tezos, IOS, and TRON that facilitate
    smart contract creation.


    To summarize, smart contracts have a lot of benefits – they’re fully automated,
    trustless (i.e. the parties involved in smart contracts do not have to trust each
    other explicitly to ensure the security and validity of the contract), fast, secure,
    transparent, and cost-efficient. Reusability is another important feature – the
    same contract can be used in many instances, avoiding additional legal work. This
    doesn’t mean, however, that smart contracts are perfect. There are some risks
    and challenges, including software bugs, protocol changes, and unexpected real-world
    events that wouldn’t be communicated onto the blockchain. Another important consideration
    is the regulatory status and tax implications – these vary across the globe, and
    it will take some time before the rules become clear.


    > **Note:** If you would like to learn more about smart contracts, check out the
    "Code Is Law?" video on YouTube (`www.youtube.com/watch?v=pWGLtjG-F5c`) and the
    Ethereum’s website (`https://ethereum.org/en/smart-contracts/`).


    ### Summary


    Well, this chapter was a bit like a blockchain boot camp – we went through the
    most important design elements, starting from the very foundations. This should
    give you a good understanding of how blockchain works, which is essential nowadays,
    as the world moves to Web3 and digital transformation affects businesses from
    every industry and sector.


    As mentioned, being a hospitality professional, you don’t need to get to the nitty-gritty
    of blockchain – it’s your vendors’ job. But if you want to get involved in a blockchain
    project, understanding how blockchain transactions are concluded or what consensus
    mechanisms mean will be helpful, to say the least.


    In the next chapter, we will jump to a different level of our blockchain universe
    and explore its inhabitants, starting with miners, already mentioned a couple
    of times.'
