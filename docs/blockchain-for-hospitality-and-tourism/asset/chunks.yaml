- fmt: '### Public Blockchain


    Public blockchains are permissionless – you can access and participate in the
    network without any consent, authorization, or permission. There’s full decentralization.
    Your identity is fully protected.


    Complex cryptography rules and consensus mechanisms are used to safeguard the
    data. They’re not 100% secure though. Public blockchains employ cryptographic
    techniques to protect the data, but there are vulnerabilities that can be exploited
    by the criminals.


    This type of blockchain networks may be quite inefficient because a significant
    amount of computing power is required to operate them, which leads to high energy
    consumption and longer processing times. They’re often also challenged with scalability
    that’s impacted by large volumes of transactions.


    ### Private Blockchain


    Private blockchains are managed by a single entity. This single entity acts as
    a central authority, granting access to the network. Permissions may have different
    levels – not every user will have the same rights. For instance, only selected
    users will be able to read or write transaction data, and only parties involved
    in a contract will be able to access it. A private blockchain can still be distributed
    but loses the decentralized factor.


    ### Consortium Blockchain


    The third type of blockchain network is a consortium blockchain (also known as
    federated blockchain). It is private and requires permissions, similar to the
    private one, but they are managed by a consortium of organizations rather than
    a single entity. Entities become members of the consortium blockchain based on
    prior approval or voting. Permissions can be granted to individuals or a group
    of companies. There’s no central entity that manages the network. Consortium blockchains
    can be leveraged in many industries, facilitating effective cooperation between
    multiple parties in supply chain management, financial services, and even in tourism
    and hospitality.


    Let’s look at a simple comparison of these three types of blockchain networks,
    summarized in Table [2-2](#542012_1_En_2_Chapter.xhtml#Tab2).


    **Table 2-2** Types of blockchain networks


    |   | **Public** | **Private** | **Consortium** |

    | --- | --- | --- | --- |

    | Access | Open to anyone and permissionless | Granted by single entity and requiring
    permissions | Granted by consortium and requiring permissions |

    | Participants | Anonymous | Known identity | Known identity |

    | Security | Achieved through consensus mechanism and complex cryptography (`PoW`
    and `PoS`) | Preapproved participants. Consensus based on voting | Preapproved
    participants. Consensus based on voting |

    | Speed/Performance | Slower, more computing/resources power required | Faster
    and more efficient | Faster and more efficient |


    #### Hybrid Blockchain


    The hybrid blockchain is essentially a combination of private and public blockchain
    features. Here, the members of the network decide on which part is private and
    which is available to the public. Transactions can remain in the private layer.


    A hybrid blockchain is ideal for closed ecosystems. It protects privacy as the
    identity of the users is only revealed to the parties they’re dealing with. At
    the same time, however, it maintains a secure channel to communicate with the
    external world.


    From the management perspective, flexibility in terms of governing rules changes
    is an important feature. Here, changes in decentralization level or transparency
    are dictated by a company demand, and many rules can be changed relatively easily.


    Hybrid blockchains are typically also faster and more cost-efficient than public
    and private networks due to simplified rules of transaction validation.


    ## Transactions on the Blockchain


    How do transactions happen on the blockchain? First, it’s important to understand
    that a transaction is defined as any transfer of value or data in the blockchain
    world. It can be a payment, a transfer of medical records, a smart contract, or
    a record of origin – there are plenty of use cases which we will discuss in the
    next chapters of this book.


    The transaction process can be described in four stages:


    1. **Initiation of transaction proposal**: Transaction is created and signed using
    the public and private keys by the initiating party.

    2. **Transaction broadcasting**: Transaction is broadcasted to the network by
    the wallet application and is waiting to be picked up by the miner (or validator).
    It sits in the so-called `mempool` (storage that holds all unconfirmed transactions
    that are waiting to be included in the chain) and waits for the miner who can
    then pick it up and perform validation.

    3. **Verification**: Transaction is validated based on a set of rules agreed upon
    for a specific blockchain. If it’s valid, it’s included in a block and sent to
    the network for other nodes to verify.

    4. **Commitment**: The block with validated transactions is added to the blockchain.
    It is permanent and can’t be modified. The transaction is completed and becomes
    irreversible and permanent.


    Figure [2-2](#542012_1_En_2_Chapter.xhtml#Fig2) will help you visualize the transaction
    process.


    ![](images/542012_1_En_2_Chapter/542012_1_En_2_Fig2_HTML.jpg)


    A roadmap of the blockchain transaction flow. First, the transaction is created,
    it is broadcasted to the network followed by participants validating and approving
    it, and lastly, the transaction is completed once the nodes verify the transaction,
    and it is bundled up with others into a block.


    **Figure 2-2** Simplified blockchain transaction process


    ## Wallets


    A digital wallet enables users to buy, sell, and monitor the balance of the digital
    currency or assets they own. It’s your primary tool in the blockchain world.


    Unlike a traditional wallet, a digital wallet doesn’t actually hold funds. Instead,
    it holds public and private keys of a user that are required to perform a transaction.


    There are three types of wallets: software, hardware, and paper wallets.


    ### Software Wallets


    **Software wallets** can be divided further into:

    - Desktop

    - Web

    - Mobile wallets


    **Desktop wallets** can be downloaded to a PC or a laptop. They limit your flexibility
    because access is possible only through this device. The application generates
    a data file that holds the keys. The user can create a password protecting access,
    but the risk of physical damage, malware, or virus infection is considerable.


    **Web wallets** are maintained in the cloud. You can access the wallet through
    a web browser, without any additional software, using any device. It gives you
    more flexibility; however, a third party that owns and operates the website will
    have control over the cloud that stores your private keys, which is always a risk.


    **Mobile wallets** are available as mobile phone applications. They’re the most
    popular category of crypto wallets. Mobile wallets offer bigger flexibility and
    ease of use – you can trade cryptocurrencies, pay using QR codes, or buy digital
    assets like the `NFTs`.


    ### Hardware Wallets


    **Hardware wallets** store private keys offline on a physical device – typically
    a USB drive. They’re very safe and easy to use – you just have to connect the
    device with your laptop or PC that has access to the Internet and provide the
    PIN. The wallet requests the transaction details and provides validation. The
    private key never leaves the device.


    ### Paper Wallets


    **Paper wallets** can also be very secure. A paper wallet is just a piece of paper
    where you note down all details needed to access your digital assets – addresses,
    keys, etc. It’s secure because it’s offline, so no one can hack it. On the other
    hand, however, if you lose this piece of paper, the chances of recovering access
    are rather slim.'
