    # 5. Cryptocurrencies


    In this chapter, you will read about `cryptocurrencies`. You might have heard
    about hospitality and travel industry first movers enabling room bookings using
    crypto-payments gateways. We’ll take a look at these examples and briefly discuss
    other forms of money on `blockchain` to ensure you have a full picture in case
    you’d like to consider adding `blockchain` payments as an alternative payment
    method for your business.'
