- '# 2. 揭开区块链的神秘面纱


  人们常常声称区块链是一项非常复杂的技术，需要极其专业的技能。确实，区块链开发者和架构师必须掌握广泛的编程知识；理解所有协议、网络、安全和加密经济学；学习如何创建
  dApp 等等。正因如此，区块链开发者才是一份高薪工作。


  作为酒店业专业人士，你可以只关注区块链的业务层面。在大多数情况下，你将由外部合作伙伴提供技术解决方案。他们会介绍自己的方案，并抛出大量令人困惑的表述和术语。如果你决定推进项目，他们会要求你明确或签署业务需求。


  为了确保你对此有所准备，在本章中，我们将深入区块链宇宙的核心，审视其关键组成部分和基础模块。了解这项技术的工作原理，将为你提供理解其能力所需的知识。


  然而，更重要的是，本章的目标是引导你了解诸如共识机制或区块链网络类型等主题，并为你提供在做出关于区块链项目的战略商业决策时所需要的信息。


  ## 什么是区块链？


  区块链是一种在计算机网络中共享的分布式数据库。这意味着这个数据库可以同时在全球数万台计算机上被访问和存储。


  没有中央权力或权威机构控制区块链。它是一种基于参与者共识的点对点模型。区块链的架构建立在信任之上，无需像银行或政府这样的中介机构来授权交易。


  作为一种数据库，区块链以数字格式将信息电子化地存储在分布在全球各地的数十万台计算机上。如果你想象一个典型的数据库，它可能看起来像一个带有行和列的数据表格。


  区块链则不同——在这里，数据以被称为“区块”的组进行结构化。这些区块有一定的存储容量。当一个区块被填满后，它就会被关闭并链接到前一个区块，形成一条数据链，即区块链。区块一旦被填满，便成为定局。链中的每个区块在被添加到链上时都会被赋予一个精确的时间戳。所有新信息都会被编译到一个新形成的区块中，待其填满后也会被添加到链上。没有人可以删除或编辑区块中的交易；它是防篡改的。交易的数据和历史是不可逆且透明的。


  每个区块都包含一个基于其前一个区块的唯一识别码——所谓的“哈希”——以增强数据追踪的准确性并确保数据安全。当有人想要更改区块中的交易或数据时，这就会改变该区块的哈希码，以及所有随后创建的区块（包括链中的最后一个区块）的哈希码。


  现在，由于网络中的每个人都拥有该区块链的副本，因此很容易检测到谁在未经整个点对点群体同意的情况下更改了它，并将其废弃。数据经过加密，因此只有记录的所有者才能解密以揭示其身份。这意味着区块链的用户可以在保持透明的同时保持匿名。


  ## 区块


  现在让我们更深入地探讨区块链的工作原理。简而言之，每当用户发起一笔交易（例如加密货币转账）时，就会创建一个区块来存储它。数据经过密码学保护，并与账本中的前一个区块相链接。该块在网络中广播，网络节点（计算机）对其进行验证。一旦区块和交易验证成功，它就会被添加到现有区块链的顶端。结果，该交易便成为永久记录。


  一个区块存储数据。图 2-1 展示了区块的关键组成部分。


  ![](img/542012_1_En_2_Fig1_HTML.jpg)


  一个立方体解释了区块链的结构。立方体的正面展示了区块头的两个层级，以及交易计数器与交易 A 到 C。区块头包含 6 个部分，即：区块版本、默克尔树根哈希、前一个区块哈希、nBits、随机数和时间戳。


  图 2-1

  一个区块的结构（来源：作者）


  除了交易列表和计数器，它还包括一个区块头。区块头包含的元素有：区块大小、区块版本、时间戳、前一个区块哈希（前一个区块头的加密编号）、当前区块的哈希（所谓的“默克尔树根哈希”）、随机数（矿工必须求解以验证区块并关闭它的加密数字或谜题），以及
  nbits（加密谜题的难度）。


  区块由矿工使用一种名为“工作量证明”的共识机制创建和验证。矿工们竞相求解一个密码学谜题——找到当前区块的目标哈希。获胜者将把该区块添加到区块链中并获得奖励。这种共识机制被比特币所采用。




  ## 共识机制


  共识机制描述了所有网络参与者如何就区块链的状态达成一致。


  如果你处理的是一个中心化系统，通常会有中央管理机构或管理员来管理和维护它。然而，区块链是去中心化的。成千上万的参与者——也就是对等节点——共同负责验证和认证网络上发生的交易。


  共识机制规定了这些参与者如何协作，并就哪些交易是合法的、已验证的以及应添加到区块链中达成一致。由于区块链的状态是动态变化的，因此需要一套规则来确保账本能够以高效、实时、可靠且安全的方式进行更新。


  共识机制有很多种。现在我们简要了解一下最流行的几种。


  ## 工作量证明（`PoW`）


  在**工作量证明**共识机制中，矿工们竞相解决基于密码哈希算法的数学难题。当难题被解决后，一个新块会被发布到网络中，供其他矿工验证。


  矿工通过收取交易费获得激励，促使他们完成这项工作。而这项工作量非常大。赢得解决数学难题并完成一个区块的竞赛的几率取决于算力。这是因为矿工基本上需要猜测一个随机数（哈希值），这个数要小于或等于目标哈希值，而可能的猜测有数万亿种。因此，矿工赢得这场竞赛需要大量的计算能力。我们将在第
  3 章中更详细地讨论这一点。


  **工作量证明**是应用于流行加密货币（包括比特币、莱特币和以太坊 1.0）中的原始共识机制。不幸的是，执行它所需的高计算能力导致了高能耗和较长的处理时间。它的缺点促使人们寻找更高效、更环保的方案，例如**权益证明**（`PoS`）。


  ### 权益证明


  在**权益证明**中，矿工被验证者取代。矿工可以创建新区块或新代币。这可以类比为铸造货币。每增加一个新区块都会增加市场流动性总量。


  在**权益证明**中，市场流动性在一开始就创建好了，并且不会改变。参与者通常不创建新区块，而是验证其中的交易。


  要成为验证者，用户需要以加密代币的形式质押资本，对于以太坊来说，最低需要质押 32 个`ETH`（按目前价格约合 43000 美元）。验证者的选择是由网络根据其质押量随机进行的。质押量也起到一种抵押品的作用，如果验证者行为不诚实，其质押的代币可能会被销毁。


  验证者通过收取交易费获得收益；与`PoW`模式不同，他们不会获得新铸造的币作为奖励。`PoS`的优势在于其能源效率，这自然是一个非常重要的方面和关注点。由于`PoS`不需要巨大的计算能力和昂贵的硬件，加入网络也更容易。


  表 2-1 简单比较了这两种最流行的共识机制。


  **表 2-1**


  `PoW`和`PoS`共识机制对比


  |  | **工作量证明** | **权益证明** |

  | --- | --- | --- |

  | 共识机制 | 矿工竞相解决数学难题 | 根据质押的代币数量选择验证者 |

  | 区块验证 | 解决难题后由矿工验证 | 由验证者根据其质押进行验证 |

  | 能源消耗 | 高 | 较低 |

  | 处理时间 | 处理时间较长 | 交易处理时间更快 |

  | 经济激励 | 矿工获得新铸造的币和交易费作为奖励 | 验证者赚取交易费和奖励 |

  | 安全性 | 依赖计算能力和多数原则——要攻击一个`PoW`区块链，你需要一台算力超过网络 51%的计算机 | 依赖经济激励和质押——要攻击`PoS`区块链，你需要拥有网络中
  51%的加密货币 |

  | 环境影响 | 高碳足迹和高能耗 | 降低的碳足迹和能耗 |




  #### 其他共识机制


  虽然`工作量证明`和`权益证明`是区块链世界中最流行的达成共识的方式，但还有许多其他类型和迭代版本也在使用中。我们将简要讨论其中几种，让你对不同的路径和方法有一个概览。


  `委托权益证明`（`DPoS`）是`权益证明`共识机制的一个修改版本。在这里，你的权益赋予你投票权。你通过投票来选择验证并向链上添加区块的“见证人”。你在网络中质押的代币越多，你的投票权就越重。获得最多票数的见证人赢得验证交易的权力，如果他们成功，就会获得奖励。这笔奖励通常也会与投票给他们的用户分享。


  如果见证人行为异常，他们可能会被“解雇”；例如，如果怀疑有恶意行为，他们的票数可以被收回。这种机制被认为比`PoS`更民主且更具金融包容性。


  `活动证明`（`PoA`）本质上是`PoW`和`PoS`的混合体——这个过程始于像`工作量证明`那样的挖矿方式，矿工们竞相解决一个数学问题。但当区块被挖出后，它就会切换到`PoS`模式。一个随机选择的验证者组负责验证交易，然后将它们添加到区块链中。奖励在验证者和矿工之间分配。


  另一种共识机制是`权威证明`——在这里，验证者是根据其个人声誉而非抵押的代币来选择的。匿名性被移除，因此验证者有动力保持高质量的工作。它不需要大量的计算能力，是成本效益最高的选择之一，常用于私有网络（例如，`摩根大通`银行将其用于他们的`JPM`币）。


  `容量证明`基于矿工硬盘中可用的空间量。简而言之，硬盘越大，矿工解决谜题并赢得奖励的机会就越大。


  另一方面，`重要性证明`根据一系列因素来选择矿工，例如过去的交易数量和规模、已归属货币的数量、网络活动等。这些因素共同构成了重要性评分。得分越高的参与者，被选中挖掘（或在此场景中称为“收割”）一个区块并获得交易费的机会就越大。


  `消逝时间证明`（`PoET`）通常用于许可型区块链网络。我们将在下一节详细讨论它们，但就目前而言——许可型区块链要求参与者表明身份。`PoET`是一种基于时间彩票的机制，它随机为网络中的每个节点（参与者）分配不同的等待时间。获得最短等待时间的节点有权进行挖矿。


  还有`实用拜占庭容错`、`燃烧证明`、`历史证明`、`权重证明`以及其他一些不太常见的机制。


  你不需要了解所有机制。然而，当你加入一个区块链网络或项目时，你需要理解使用的是哪种协议，因为它将决定网络的安全性和弹性如何，以及交易执行的速度有多快。


  选择错误的共识机制可能导致性能低下和处理延迟。它还可能增加链的脆弱性，并增加区块链分叉的风险——即单条链分裂成两条或多条链并以不可预测的方式运行。最后，如果机制不合适，共识可能会失败，使得所有努力付诸东流。


  共识机制的选择将取决于区块链网络的类型、其应用场景及其需求。


  通常，有三种类型的区块链网络：非许可链、许可链和联盟链。我们将在下一节讨论它们。但在深入之前，让我们先总结一下区块链的关键特性。


  #### 区块链特性


  **区块链使用去中心化技术**——没有一个中央管理机构来管理区块链网络。它是一个分布式账本，能够以代币化的形式存储数字化资产——加密货币、文档、合同。用户拥有控制权——他们不必依赖第三方。


  去中心化意味着网络更安全，更不容易崩溃。可以这样理解——存储在服务器上的中心化数据库是黑客的容易攻击目标。而要攻击一个区块链网络，则需要巨大的算力和资源（至少需要网络中所有算力的
  51%）。区块链不依赖第三方，而是由网络参与者维护。


  **区块链是不可篡改且透明的**——当网络上的数据被记录后，它对其他参与者可见，并且无法更改。所有区块都相互连接。没有人可以删除、编辑、修订、重写、更新或撤销其中的任何区块。网络中的每个节点（参与者）都有一份数字账本的副本。添加新交易需要按照约定的共识机制进行验证。


  **区块链是安全的**——与传统的数字账本相比，去中心化和密码学都使得区块链网络非常安全。区块链中的数据通过加密哈希来保护。由于每个区块都有自己的哈希值，并且相互链接并包含前一个区块的哈希值，因此很难篡改它，并且容易发现问题。


  **区块链是 7x24 小时全年无休的**——与传统系统不同，区块链网络没有停机时间，因为它们是去中心化和分布式的。


  **区块链既快速又具有成本效益**——由于没有中介机构，交易发生在对等网络上的去中心化网络中，因此与传统跨境支付相比，处理速度要快得多。最终，速度和交易费用取决于区块链网络和共识类型。如前所述，`工作量证明`可能比`权益证明`更慢且更昂贵。大型区块链平台在过去也曾面临拥塞和延迟问题，这就是为什么例如`以太坊`决定转向`权益证明`机制的原因之一。


  然而，也存在一些缺点。我已经提到过能源消耗问题。可扩展性也是主要挑战之一——随着交易数量的增加，区块链的规模会增长，验证交易所需的处理时间也会增加。网络会变得缓慢且效率低下。


  **注意**


  区块链三难困境，也称为可扩展性-安全性-去中心化三难困境，是一个概念，它强调了区块链技术三个理想特性之间的权衡：可扩展性、安全性和去中心化。根据这个三难困境，很难同时获得所有这三个特性，因为优化其中一个特性往往要以牺牲其他特性为代价。


  其他区块链挑战，特别是在存储需求、可升级性、互操作性和用户体验方面，是持续研究和开发的主题。它们也并非普遍适用于每个区块链平台，但你需要意识到它们可能存在——并且，如果你正在着手一个区块链项目，你需要向你的供应商询问他们缓解这些风险的策略。


  #### 区块链的类型


  有三种类型的区块链网络：公有链、私有链和联盟链。




  #### 公有区块链


  公有区块链是无需许可的——您无需任何同意、授权或许可即可访问并参与网络。它具有完全的去中心化特性，您的身份将得到充分保护。


  它使用复杂的密码学规则和共识机制来保护数据安全，但并非 100%安全。公有区块链采用密码学技术来保护数据，但仍存在可能被犯罪分子利用的漏洞。


  这类区块链网络可能效率较低，因为运行它们需要大量计算能力，这会导致高能耗和处理时间延长。它们也常因大量交易而面临可扩展性方面的挑战。


  #### 私有区块链


  私有区块链由单一实体管理。该实体作为中央权威机构，授予网络访问权限。权限可能具有不同级别——并非所有用户都拥有相同权利。例如，只有被选定的用户才能读取或写入交易数据，只有合约相关方才能访问该合约。私有区块链仍然可以是分布式的，但失去了去中心化特性。


  #### 联盟区块链


  第三种区块链网络是联盟区块链（也称为联合区块链）。它与私有区块链类似，是私有的且需要权限，但管理方并非单一实体，而是由多个组织组成的联盟。实体需经过事先批准或投票才能成为联盟区块链的成员。权限可以授予个人或公司团体。网络中没有中央管理机构。联盟区块链可用于多个行业，在供应链管理、金融服务，甚至是旅游和酒店业中促进多方之间的有效合作。


  让我们通过表 2-2 对这三种区块链网络进行简单对比。


  **表 2-2** 区块链网络类型


  |   | **公有链** | **私有链** | **联盟链** |

  | --- | --- | --- | --- |

  | 访问权限 | 对任何人开放，无需许可 | 由单一实体授予，需要许可 | 由联盟授予，需要许可 |

  | 参与者 | 匿名 | 身份已知 | 身份已知 |

  | 安全性 | 通过共识机制和复杂密码学实现（`PoW` 和 `PoS`） | 参与者需预先批准。基于投票的共识 | 参与者需预先批准。基于投票的共识 |

  | 速度/性能 | 较慢，需要更多计算/资源 | 更快，效率更高 | 更快，效率更高 |


  ##### 混合区块链


  混合区块链本质上是私有链和公有链特性的结合。在此模式下，网络成员决定哪些部分是私有的，哪些对公众开放。交易可以保留在私有层中。


  混合区块链非常适合封闭生态系统。它能保护隐私，因为用户的身份只向与其交易的对手方披露。同时，它也维护了一个与外部世界进行通信的安全通道。


  从管理角度来看，治理规则变更的灵活性是一个重要特性。在这里，去中心化程度或透明度的变更由企业需求决定，许多规则可以相对容易地更改。


  由于交易验证规则简化，混合区块链通常也比公有链和私有链更快、更具成本效益。


  ## 区块链上的交易


  交易在区块链上是如何发生的？首先，重要的是要理解，在区块链世界中，交易被定义为任何价值或数据的转移。它可以是一次支付、一次医疗记录转移、一份智能合约或一个来源记录——本书后续章节将讨论诸多用例。


  交易过程可以分为四个阶段：


  1.  **交易提案的发起**：发起方使用公钥和私钥创建并签署交易。

  2.  **交易广播**：交易由钱包应用广播到网络中，并等待矿工（或验证者）拾取。它停留在所谓的 `mempool`（用于存储所有等待被纳入区块链的未确认交易的内存池）中，等待矿工拾取并执行验证。

  3.  **验证**：根据特定区块链约定的规则集验证交易。如果交易有效，它将被包含在一个区块中，并发送到网络供其他节点验证。

  4.  **提交确认**：包含已验证交易的区块被添加到区块链上。该区块是永久性的，无法修改。交易至此完成，变得不可逆转且永久有效。


  图 2-2 将帮助您直观理解交易过程。


  ![](img/542012_1_En_2_Fig2_HTML.jpg)


  区块链交易流程路线图。首先，发起交易并广播到网络；接着，参与者进行验证和批准；最后，节点验证交易后，交易与其他交易打包成区块，至此交易完成。


  **图 2-2** 简化的区块链交易过程


  ## 钱包


  数字钱包使用户能够购买、出售和监控其拥有的数字货币或数字资产的余额。它是您在区块链世界中的主要工具。


  与传统钱包不同，数字钱包实际上并不持有资金。相反，它持有用户执行交易所需的公钥和私钥。


  钱包有三种类型：软件钱包、硬件钱包和纸钱包。


  ### 软件钱包


  **软件钱包**可进一步分为：

  - 桌面钱包

  - 网页钱包

  - 移动钱包


  **桌面钱包**可以下载到个人电脑或笔记本电脑上。这限制了您的灵活性，因为只能通过该设备访问。应用程序会生成一个包含密钥的数据文件。用户可以创建密码来保护访问权限，但物理损坏、恶意软件或病毒感染的风险相当大。


  **网页钱包**在云端维护。您可以通过任何设备的网络浏览器访问钱包，无需额外软件。这提供了更大的灵活性；然而，拥有并运营该网站的第三方将控制存储您私钥的云端，这始终是一个风险。


  **移动钱包**以手机应用程序的形式提供。它们是最受欢迎的加密货币钱包类别。移动钱包提供了更大的灵活性和易用性——您可以使用 `NFTs` 等交易加密货币、通过二维码付款或购买数字资产。


  ### 硬件钱包


  **硬件钱包**将私钥离线存储在物理设备上——通常是 USB 驱动器。它们非常安全且易于使用——您只需将设备连接到可以访问互联网的笔记本电脑或 PC 上，并提供
  PIN 码。钱包会请求交易详情并提供验证。私钥永远不会离开该设备。


  ### 纸钱包


  **纸钱包**也可以非常安全。纸钱包仅仅是一张纸，您可以在上面记下访问数字资产所需的所有详细信息——地址、密钥等。它很安全，因为它是离线的，所以没有人能破解它。但另一方面，如果您丢失了这张纸，恢复访问的可能性就相当渺茫了。




  ### 热钱包与冷钱包


  硬件钱包和纸钱包也被称为冷钱包，而连接互联网的钱包则被称为热钱包。


  表 2-3 总结了它们的主要特征。


  **表 2-3** 热钱包与冷钱包对比


  | 热钱包 | 冷钱包 |

  | --- | --- |

  | 连接互联网 | 硬件设备和纸张 |

  | 安全性较低 | 安全性较高 |

  | 灵活且全天候可用 | 依赖设备访问 |

  | 更易于使用 | 支持的币种有限 |

  | 免费 | 成本高昂 |

  | 例如：Coinbase、MetaMask、Blockchain.info | 例如：Trezor、Ledger |


  ### 公钥与私钥


  在上一节中，我提到数字钱包中存储了在区块链上进行交易所需的公钥和私钥。那么，这些密钥到底是什么呢？


  在加密货币世界中，虚拟代币的所有权和控制权是通过数字密钥和地址来实现的。地址就像电子邮件或银行账号——它是一串由字母和数字组成的特殊序列。


  私钥就像密码一样。它是一个随机生成的大数字，通常表示为字母数字字符串，极难记忆。事实上，正因为如此困难，许多钱包使用一种称为“助记词”或“秘密恢复短语”的替代方案。本质上，它是由
  12 到 24 个随机单词组成的字符串，用于访问你的钱包。你必须将它们安全地记在某个地方，因为这些单词本身毫无意义。助记词无法恢复或更改，因此一旦丢失，你将失去对钱包及其资产的控制权。


  如前所述，以通过 Binance 或 Coinbase 等加密货币交易所打开的网络钱包为例，这些公司为用户保管私钥。


  私钥用于解密消息、签署交易并证明对区块链地址的所有权。公钥是通过复杂的加密技术从私钥中生成的，然后用于生成收款地址。任何人都可以使用它，它对公众开放——它基本上充当接收资金的地址。


  这两种密钥都存储在钱包中。如果你丢失了公钥，可以使用私钥重新生成。然而，私钥是无法重新生成的。


  当用户发起向另一用户发送加密代币的交易时，该交易会被广播到网络中。网络参与者会验证其有效性，然后记录在区块链上。


  交易由发送者使用其私钥进行签名。提供签名是为了证明对私钥的所有权，但签名过程不会泄露私钥。验证签名时，会使用公钥。


  一旦交易被验证并包含在区块中，资金就会被发送到接收者的公钥地址。该地址由公钥生成。接收者可以使用自己的私钥访问这些资金。


  ### 智能合约


  想象一下，你正在买房子。这是一个复杂的过程，通常涉及多方、大量文书工作，并且可能需要数周甚至数月的时间。我们有买方、卖方、银行、评估师、律师、检查员等等；此外还有许多条件、复杂的文件和额外费用。


  现在，想象一下所有这一切都可以通过更便宜、更快速的方式完成，而且无需律师参与。这就是智能合约背后的理念。


  智能合约本质上是一种以自动化方式运行的程序或数字代码。它允许在没有中介的情况下交换资产，并且可以持有资金。一旦各方就规则达成一致，智能合约就会启动，并在条件满足时自动执行。你可以包含积极和消极两种条件——例如，“如果评估结果为正，则将文件发送给银行”或“支付首付款”。智能合约还会在事件发生时通知所有相关方，尽管不需要他们采取行动。一切都是自动化的，全天候可用，并且通过记录在区块链上的不可篡改副本确保安全。


  智能合约是最重要的区块链工具之一，在各行各业都有多种应用。智能合约是去中心化应用（dApps）的基础，在去中心化金融（DeFi）、支付和供应链管理中尤其流行。它们在保险、医疗保健、政府服务以及当然还有房地产领域也获得了极大的关注。


  > **注意：** 监管机构正在密切关注智能合约的发展。例如，英国政府已要求法律委员会审查法律问题并提出改革建议，以使现有法律适应包括智能合约在内的区块链驱动变革。该委员会得出结论，现有的法律框架足够灵活，可以支持和促进智能合约的使用。然而，在某些情况下，还需要进一步的工作来适应智能合约。同样，许多国家现在正在制定数字资产法规和法律体系改革，以接纳智能合约并消除关于可执行性的不确定性。


  以太坊区块链是最流行的通用智能合约平台，它允许程序员使用一种名为 `Solidity` 的语言编写智能合约。以太坊上的所有合约都是不可篡改和去中心化的。除以太坊外，还有
  Cardano、Tezos、IOS 和 TRON 等多个平台也支持智能合约的创建。


  总而言之，智能合约有很多好处——它们完全自动化、无需信任（即参与智能合约的各方无需明确信任对方即可确保合约的安全性和有效性）、快速、安全、透明且成本效益高。可重用性是另一个重要特征——同一份合约可以在多个场景中使用，避免了额外的法律工作。然而，这并不意味着智能合约是完美的。它们存在一些风险和挑战，包括软件漏洞、协议变更以及无法传达至区块链的意外现实世界事件。另一个重要的考量因素是监管状况和税务影响——这些在全球范围内各不相同，并且需要一段时间规则才能变得清晰。


  > **注意：** 如果你想了解更多关于智能合约的信息，可以查看 YouTube 上的“Code Is Law?”视频（`www.youtube.com/watch?v=pWGLtjG-F5c`）和以太坊的网站（`https://ethereum.org/en/smart-contracts/`）。


  ### 章节总结


  本章有点像区块链的新兵训练营——我们从最基础的部分开始，介绍了最重要的设计元素。这应该能让你很好地理解区块链的工作原理，这在当今世界向 Web3 迈进以及数字化转型影响着各行各业的企业时是至关重要的。


  如前所述，作为一名酒店业专业人士，你不需要深究区块链的细微之处——那是你的供应商的工作。但如果你想参与一个区块链项目，了解区块链交易如何达成共识，或共识机制意味着什么，至少会很有帮助。


  在下一章中，我们将跳转到区块链宇宙的不同层面，探索其“居民”，从已经多次提及的矿工开始。




  '
- '# 3. 区块链生态系统


  正如我们在本书开头所说，对于新手来说，区块链世界可能有些令人困惑。在本章中，我们将更仔细地审视这个生态系统中的一些最重要元素——从创建区块的矿工，到构建应用程序、为区块链个人和商业用户带来实用价值的开发者。


  我们还将快速浏览最重要的区块链项目和平台，特别关注那些在酒店和旅游业具有潜在商业应用价值的平台。你应该知道，尽管这项技术相对较新，但区块链平台市场已经非常庞大。网络上充斥着各种排名和比较。如果你正在考虑实施基于区块链的解决方案，选择可能并不容易。然而，在与你的团队和供应商讨论满足你需求的最佳方案时，有一些考量因素你应该牢记。我们将在本章中讨论这些内容。


  关于数字资产交易所的部分，旨在让你更接近这个主题，并简要解释中心化交易所和去中心化交易所之间的区别。


  最后，如果没有用户概览，区块链生态系统概述将是不完整的，这将帮助我们了解当今区块链的采用情况。


  ## 矿工


  矿工是区块链网络的参与者——可以是人或机器——他们执行挖矿。我们在前一章中讨论过挖矿。这是一个在使用工作量证明共识机制的分布式账本上验证和记录交易的过程。


  矿工们竞相解决创建新区块所需的密码学难题。胜出者将新区块添加到链上并获得奖励——目前是 6.25 个比特币（按当前汇率约为 75,000 美元）。


  挖矿奖励并非固定不变；它每四年会经历一个称为"减半"的过程，奖励减半。减半被编程到比特币协议中，以调节新比特币的发行并维持稳定的供应。当比特币在 2009 年首次被挖出时，每个区块的挖矿奖励是
  50 BTC，到 2024 年 5 月，它将再次减半至 3.125 BTC。挖矿是增加新比特币的唯一途径——从这个角度来看，它可以与铸造法定货币相提并论。根据其创造者中本聪制定的规则，同一时间只能存在
  2100 万个比特币，而超过 90% 的比特币已被挖出。


  过去，挖矿是由个人使用相当标准的 CPU 完成的。随着计算难度的增加，更强大的处理能力成为必需。如今，要搭建一个挖矿设备，你会使用性能强大得多的 GPU 或 ASIC（专用集成电路）。一些矿工还决定与他人联合以提高成功几率——这被称为矿池挖矿。自然，他们必须与其他矿池成员分享奖励。


  ## 开发者


  区块链开发包含多种职能，可以概括为利用区块链技术设计、构建和维护系统及应用。


  核心开发者创建区块链，并添加功能和共识机制。这是软件开发者在其之上构建去中心化应用的基础。


  成为一名区块链开发者需要精通编程语言、数据结构、数据库和密码学。


  此外，个人还必须对区块链、不同的平台、智能合约和工具有深入的理解。然而，所有这些努力都是值得的，因为对区块链开发者的需求正在快速增长。


  如果你正在寻找经验丰富的团队来领导你的区块链项目，美国、印度和英国将是最大的市场，拥有最多的熟练专业人员。然而有趣的是，东欧国家，尤其是波兰和乌克兰，也以其在这一领域拥有一些最优秀的开发者而闻名。


  ### 交易所


  如果你想交易加密货币，你必须使用加密货币交易所。


  中心化加密货币交易所（CEX）由一家公司运营——例如，`Coinbase`、`Crypto.com`、`FTX` 或 `Binance`。这家公司制定交易规则和费用，并通过移动应用或网页浏览器为用户提供访问权限。


  如果你想在选定的中心化交易所开始交易加密货币，你必须在平台上创建一个账户并验证你的身份。这是因为 CEX 必须遵守适用的法律法规，特别是关于反洗钱和反恐融资的规定。一旦你的验证完成，你就可以连接你偏好的资金来源（例如，你的信用卡），然后就可以开始交易了。


  去中心化加密货币交易所（DEX）是一种允许点对点交易的软件——我们可以将其比作一个在线市场，人们可以在其中直接进行交易，无需任何中间人。如果你想参与 DEX，你只需要将你的钱包连接到交易所应用即可。一些最流行的去中心化交易所包括
  `Uniswap`、`PancakeSwap` 和 `Curve`。


  去中心化交易所提供种类繁多的加密货币——既有知名且经过审查的，也有完全随机且高风险的。我会把它们留给专家，因为用户体验稍具挑战性。你需要做大量的研究并且技艺相当高超，因为这里没有客户服务。去中心化交易所不受监管。如果你在
  DEX 上交易，你是匿名的，与 CEX 不同，他们不验证你的身份。另一个区别是，在 CEX，你开立一个名为"托管钱包"的账户。这样，拥有并运营 CEX 的公司会记录你的交易并代表你存储加密货币。如果你丢失了账户登录信息，CEX
  会帮助你恢复。DEX 则不同——在这里，你没有账户，而是使用你的加密货币钱包。如果你忘记或丢失了你的私钥，你所有的数字资产都将丢失。


  ## 应用程序


  在区块链网络上运行的数字应用程序被称为去中心化应用（`dApps`）。


  传统的网络应用程序，如 `Facebook`，由单一公司拥有和管理，该公司有权修改和审核内容，并制定参与规则。


  `dApps` 在去中心化环境中运行，没有单一权威机构，没有审查制度，也没有中间人。


  它们由区块链软件开发者构建，可用于多种目的——从游戏到金融。


  ## 项目与平台


  正如我们之前提到的，区块链技术正进入一个新阶段；它变得更加成熟、可扩展和可互操作。


  新项目和平台的发展从未如此迅速。虽然加密货币仍然吸引着最多的关注，但许多分布式账本平台现在拥有更广泛的能力，允许开发者构建各种"位于"其区块链之上的应用程序。


  在本节中，我们将主要关注顶级企业区块链平台。首先，我将快速概述那些在企业用户中最受欢迎的平台；然后我们会花一点时间讨论选择标准。如果你正在考虑加入一个区块链项目或为你的业务构建一个解决方案，有几件事你应该考虑。我们将对此进行探讨。




  ### 以太坊


  以太坊是最早的基于区块链的开源平台之一，创建于 2013 年。它是包括 DeFi 和 NFT 在内的许多流行应用的基础平台。


  `以太币（ETH）` —— 以太坊的原生货币 —— 如今在市值上仅次于比特币。此外，其他加密货币也利用了以太坊代币标准（`ERC-20`）。


  以太坊是首个引入智能合约功能的平台，这对许多行业来说是一项颠覆性的发展。


  以下公司正在使用以太坊：PayPal、亚马逊、NVIDIA、麦当劳和可口可乐。


  **注意**


  2022 年 9 月，以太坊完成了从工作量证明到权益证明共识机制的切换，后者能效更高。根据以太坊基金会的说法，这一转变使以太坊的能源消耗降低了 99.95%。这一事件被称为“合并”。你可以在此处了解更多信息：[`https://ethereum.org/en/upgrades/merge/`](https://ethereum.org/en/upgrades/merge/)。


  ### Hyperledger Fabric


  Hyperledger Fabric 是一个开源的模块化区块链框架，作为创建基于区块链的应用和解决方案的基础。它由 IBM 为企业级应用设计，并于 2016 年由
  Linux 基金会推出。


  Hyperledger Fabric 是私有的且经过许可的；因此，它适用于需要身份管理和访问控制功能的企业。由于它是私有的，并且所有参与成员的身份都是已知且经过验证的，Hyperledger
  Fabric 无需依赖复杂的共识机制；因此，其性能高于以太坊网络等平台。


  **注意**


  访问 [`www.hyperledger.org/learn/case-studies`](http://www.hyperledger.org/learn/case-studies)，了解日立、博世、沃尔玛、霍尼韦尔等公司如何利用
  Hyperledger Fabric 改造其业务流程。


  ### Hyperledger Sawtooth


  与 Hyperledger Fabric 类似，Hyperledger Sawtooth 是一个开源项目，允许企业创建和运营分布式账本应用。


  这两个平台的主要区别在于，Hyperledger Sawtooth 同时支持许可访问和无许可（公开）访问。这些特性使其成为一种非常通用的选择，并且对于两种用例都适用的公司来说，它是一个很好的解决方案。


  **注意**


  前往 [`https://101blockchains.com/hyperledger-sawtooth-vs-fabric/`](https://101blockchains.com/hyperledger-sawtooth-vs-fabric/)
  探索 Hyperledger Fabric 和 Hyperledger Sawtooth 之间的异同。


  ### IBM 区块链


  IBM 这家科技巨头主要关注企业的利益。IBM 的区块链平台基于前面提到的 Hyperledger Fabric 构建，允许企业加入现有网络并创建新网络。


  IBM 区块链已被全球许多企业成功实施，并在多种场景中被证明是有效的工具，包括供应链管理、贸易融资、石油和天然气以及代理投票。


  **注意**


  要了解更多关于 IBM 区块链的信息，请访问 [`www.ibm.com/blockchain`](http://www.ibm.com/blockchain)。


  ### Corda


  Corda 由一家名为 R3 的公司创建，是一个专注于金融现代化的平台。它以私有和许可平台的形式运行，其大多数用例源于金融服务行业。


  Corda 没有原生货币。相反，它促进了去中心化金融、银行间支付和结算以及中央银行数字货币的创建。除了金融用例，Corda 区块链还成功部署在医疗保健、供应链管理、电信、建筑等许多其他行业。


  如今，超过 400 家组织正在使用 Corda，包括安联、汇丰银行、ING、微软、甲骨文和埃森哲^(⁷)。


  ### Quorum


  Quorum 是由摩根大通专家基于以太坊开发的一个项目。它旨在支持私有网络的用例，即访问需要经过许可。


  Quorum 可以通过两种方式运行：单个实体拥有所有节点（单公司区块链网络），或多个成员拥有网络的一定比例或部分（联盟）。Quorum 最初是为银行使用而设计的，非常重视交易的速度、隐私和安全性。


  2021 年，ConsenSys 收购了 Quorum 的知识产权，并在进行相关微调后，推出了 Quorum 区块链服务，该服务面向各个行业，能够简化企业应用的开发流程。该平台是当今顶级企业最常使用的区块链平台之一。它被用于各种场景，从为
  LVMH 提供的奢侈品追踪和溯源服务，到房屋租赁和能源交易^(⁸)。


  **注意**


  摩根大通首席执行官杰米·戴蒙公开批评加密货币。在 2022 年 9 月美国众议院金融服务委员会的听证会^(⁹)上，他称比特币和其他代币是“去中心化的庞氏骗局”，助长了盗窃、洗钱、性交易和其他犯罪行为。然而，与此同时，他明确区分了加密货币和区块链技术，他认为后者具有颠覆许多行业的真正潜力。


  #### Ripple


  Ripple 主要以其快速、高效的去中心化金融平台而闻名。作为一个数字支付网络，它促进交易的结算，主要面向银行设计。事实上，Ripple 的共识机制是基于银行服务器的通信。


  Ripple 几乎可以即时结算跨境交易，比传统的电汇方式快得多。Ripple 自己的加密货币——`XRP`——是市场上最有价值的货币之一，它通过促进货币之间的快速兑换，本质上充当了其他货币的桥梁。


  #### Solana


  Solana 是世界上最快的（如果不是最快的话）区块链平台之一。它还提供较低的交易费用，并因使用节能的共识机制（`历史证明`，这是一种`权益证明`机制）而被认为是环保的。


  Solana 凭借其功能和效率获得了极大的关注，并以托管去中心化应用而闻名。然而，由于其多次故障、黑客攻击以及 2022 年 7 月因误导投资者而被提起的集体诉讼，其声誉正在恶化。




  '
- '# 为你的企业寻找区块链平台时需要考虑什么？


  选择合适的方案可能是一个非常困难且耗时的过程。酒店和旅游公司通常依赖外部软件和供应商。他们内部的 IT 部门主要专注于网络维护和安全，而非开发。因此，找到合适的合作伙伴至关重要。


  如果你正在寻找区块链解决方案，不要将搜索范围局限于传统的*酒店科技*或*房地产科技*供应商。我的研究表明，他们中很少有现成的解决方案。


  区块链的妙处在于其多功能性——归根结底，它是一个分布式账本，开发者可以在其之上构建任何他们想要的东西。有些应用非常专业化——比如 DeFi。但也有许多 Web3
  初创公司专注于代币化和不同的 NFT 应用。即使它们进入市场的时间相对较短，其中许多也已经非常成功。不要害怕与这些初创公司合作；Web3 是它们的游乐场，它们比传统的酒店技术提供商更先进、更敏捷、更灵活。


  如果我是你，我会查看竞争对手在做什么，以及他们使用了哪些供应商。在本书接下来的章节中，我们将深入探讨许多用例和成功案例，并提及一些相关的科技公司和供应商——请将其视为你研究的第一步。


  但让我们回到这个大问题——如何选择区块链平台？嗯，首先，问问你自己和你的团队——我们真的需要一个区块链平台吗？我们期望从中得到什么？如果我们谈论的是一个全业务范围的数字化转型项目，那么答案可能是“是的”，你需要一个能够实现安全可靠数据共享和不可篡改性的区块链平台。你必须定义你的业务需求，包括用户数量、与外部世界的交互、流程等。


  然而，如果你的用例范围更窄——例如，你只想通过添加一个 NFT 元素来升级你的客户忠诚度计划，那么答案就是“不需要”。市场上有一些公司提供易于集成的现成解决方案，可以帮助你以相对快速且经济高效的方式实现目标。你不需要自己构建。


  假设你正在考虑将你的公司迁移到区块链上，以下是你应该首先考虑的最重要事项：


  *   **区块链类型**：正如我们所说，区块链主要有两种类型：公有链和私有链。公有链对所有人开放，并提供透明度。通常，所有用户拥有相同的权利，并且是匿名的。私有区块链平台的访问权限仅限于获得管理员或其他中心化机构授权的用户。你会看到这类平台被那些只希望其员工和合作伙伴加入并操作其账本的公司所使用。如果你正在将你的组织转型为一家利用物联网设备并在区块链上运行的智慧酒店——私有区块链平台将是一个不错的选择。还有联盟链，未来你可能会被邀请加入。我们将在本书的后续章节讨论一些例子，包括参与数字身份方案。


  *   **平台可扩展性与速度**：区块链平台的速度以`TPS`衡量。`TPS`是指网络每秒可以处理的交易数量。一些区块链平台可能非常高效——例如，`Solana`声称它每秒可处理
  65,000 笔交易。这个结果与`Visa`等大型支付提供商的结果相似。然而，其他平台则慢得多。有趣的是，世界排名第一的加密货币`比特币`每秒只能处理七笔交易。`TPS`结果告诉你该平台的可扩展性和效率如何。然而，你可能并不需要最快的解决方案。你的选择将取决于用例、用户数量以及将要处理的数据类型。


  *   **平台安全性**：数据安全是全球每个 IT 部门的主要关注点之一。由于其设计特点，区块链平台比传统的传统解决方案要安全得多。入侵一个区块链网络需要付出巨大的努力和资源。这很困难，但并非不可能。当你选择区块链平台时，请确保你了解所有的安全特性，包括加密方法和更新频率。


  *   **功能性**：不同的平台将提供不同的选项，并适用于不同的用例。你可能更希望关注那些允许你构建和部署智能合约（例如 `Ethereum`）的企业级区块链，而不是那些专为加密货币和去中心化金融（`Bitcoin`、`Ripple`）构建的区块链。


  区块链平台类型、速度、安全性和功能性，是你在为你的企业选择解决方案时应考虑的四个最重要的方面。如果组织内部有开发者，还有其他细节，比如团队熟悉的编程语言。然而，这在酒店和旅游行业不太可能出现。这些行业反而会更受益于来自外部公司且易于集成的解决方案。


  ## 用户


  区块链平台和应用可以被个人和公司使用。让我们先来看一些个人区块链用户的数据和关键特征，然后在本节的第二部分，重点关注那些已经涉足区块链领域的商业和行业用户。




  ### 个人用户


  如今，个人用户采用基于区块链的解决方案，主要受加密货币和 NFT 的推动。


  根据 GWI 的数据，全球约 10% 的互联网用户拥有加密货币，其中用户最集中的是高通胀和本国货币波动剧烈的国家。其他估算称，全球有超过 4.2 亿加密货币用户。


  加密货币主要用于投资目的；然而，在支付领域，尤其是在汇款领域，呈现出强劲的增长趋势。事实上，根据世界经济论坛和 Statista 全球消费者调查的数据，加密货币在非洲、东南亚和拉丁美洲最为流行，在这些地区，它们作为传统银行系统的重要替代方案，用于点对点和跨境支付。


  根据 Chainalysis 2022 年加密货币采用指数，全球加密货币的采用率在自 2019 年年中稳步增长后，在过去一年趋于平稳。在 Chainalysis
  排名前 20 的国家中，绝大多数属于中低收入或中高收入国家。这些国家的用户依赖加密货币来收发汇款，并保护他们的毕生积蓄免受法定货币波动的冲击。在此排名中，只有两个国家——美国和英国——被归类为高收入国家。


  毫不奇怪，区块链、加密货币和 NFT 在年轻人中很受欢迎。事实上，大部分加密货币投资（三分之二）掌握在千禧一代和 Z 世代手中。^(¹⁰) 这个年龄段也更愿意使用加密货币进行支付。


  **注**


  你知道谁拥有全球 1.5% 的比特币吗？答案可能会让你吃惊——是美国联邦调查局（FBI）。第一批大量比特币是在 2013 年该局关闭名为“丝绸之路”的暗网市场后被查获的。与普遍看法相反，追踪比特币并没收犯罪分子资产是可行的，执法机构报告成功破获加密货币案件的频率相对较高。为了调查利用加密货币的非法行为，执法机构和网络安全公司已经开发了多种方法和技术。由于区块链分析技术的持续改进以及执法机构与行业伙伴之间合作的加强，追踪涉及加密货币的非法活动的能力正在迅速提高。


  ### 企业


  尽管区块链技术通常主要被视为金融交易和加密货币的媒介，但还有许多其他应用可以由不同行业的企业加以利用。


  事实上，如今近一半的百强企业正在使用区块链技术，主要来自科技、媒体和电信行业，其次是消费品和零售、基础材料和工业行业。^(¹¹) 区块链已被证明在依赖安全记录传输的行业中非常有用，并在医疗保健以及公共部门和政府服务领域获得了极大的关注。实施案例几乎涵盖了每一个可能的行业——从奢侈品零售商到教育和农业。


  我们将在第 5 章探讨不同的区块链用例，重点关注那些有可能扩展到酒店和旅游业的用例。


  根据 Blockdata 的研究，如今大多数使用区块链的百强企业选择 Hyperledger Fabric。以太坊和 Quorum 在最受欢迎的企业级区块链平台中位列前三。


  这里的另一个共同点是企业的规模。迁移到分布式账本技术的公司可以被描述为大型跨国实体或企业集团。这可以通过几个因素来解释。


  首先——公司的规模通常意味着复杂性；多个系统、流程和参与者参与其中，涉及数千次带有复杂程序的互动，需要审计追踪和加强控制。区块链在这种环境下有潜力解决许多痛点，并且为实施构建商业案例不会成为挑战。想象一下，例如，沃尔玛加拿大分销公司可以通过实施基于区块链的货运系统，将发票争议率从
  70% 降低到 1%，大幅降低运营成本，并提高其合作伙伴满意度。^(¹²) 这项技术可能为公司带来的效率是巨大的。


  其次——对于大型企业而言，网络攻击的威胁自然非常高。酒店业也无法幸免于这些威胁，这些威胁可能会损害企业的声誉并造成数百万美元的损失。作为个人数据的保管者，酒店必须确保其网络受到保护。然而，这是一项日益艰巨的任务，我们过去曾看到大型连锁酒店被黑客攻击的例子，包括对万豪和洲际酒店集团的攻击。^(¹³)
  事实上，当我们查看统计数据时，酒店和零售业似乎是犯罪分子的主要目标。除了网络钓鱼和被盗的信用卡数据，勒索软件和分布式拒绝服务是最常见的攻击，平均每年给该行业造成
  294 万美元的损失。^(¹⁴)


  随着物联网的日益普及，这些攻击预计将快速增长。区块链虽然并非完全不受黑客攻击，但它带来了重新设计网络安全并使犯罪活动更加困难的机会。强大的加密、记录的不可篡改性和分布式特性消除了某些关键漏洞，并减轻了与中心化数据存储相关的风险。


  当我们讨论区块链实施时，企业的规模是关键。例如，如果你管理一个较小的物业，你可能会发现为迁移到区块链技术构建商业案例很困难。然而，有一些方法和工具可以让小型企业利用区块链的好处，而无需全面启动平台转换。如果你想试水，可以考虑加入一个
  NFT 项目或发行你自己的忠诚度 NFT。我们将在第 7 章更详细地讨论这些主题。


  '
- "# 总结\n\n如果你对这个话题不熟悉，初次审视区块链生态系统可能会让人感到困惑。本章旨在让你更接近这个世界的某些关键元素，提供关于区块链平台选择标准的指导，并总结企业和个人的采用进展。\n\
  \n在下一章中，我们将探讨区块链技术的变革潜力及其作为 Web3 基础的角色。在酒店和旅游业的背景下，Web3 提供了各种机会和优势。这些可能包括为旅行者增强数据隐私、无需中介的直接点对点交易、改进的供应链透明度、去中心化的评论和声誉系统，以及将独特的旅行体验或资产代币化并进行交易的能力。\n\
  \n随着本书的深入，我们将更详细地探讨 Web3 在酒店和旅游行业的具体应用，例如加密货币支付、非同质化代币（NFT）和去中心化市场，从而更深入地理解其潜在影响和意义。\n\
  \n**脚注**  \n1  \n2  \n3  \n4  \n5  \n6  \n7  \n8  \n9\n\n\n\n"
- '# 4. 踏入 Web3


  咨询公司和行业专家一直在密切关注区块链技术的崛起，因为它有潜力颠覆众多不同的行业。区块链甚至被称为我们这个时代最具颠覆性的技术，因为它有可能彻底改变当前的经济结构。


  区块链能够在金融、供应链管理或医疗保健等不同领域实现去中心化、透明且安全的交易，这为革新传统行业提供了可能。通过消除中间商并允许用户之间直接互动，区块链有潜力提高效率、降低价格并增强业务交互的安全性。


  区块链也被视为一项基础性技术。它可以建立新型的信任、价值交换和治理模式，从而催生更强大的经济和社会机构。凭借其去中心化的特性，该技术可用于创建新型的去中心化应用、DeFi（去中心化金融基础设施）、身份识别系统等。


  从本章开始，我们将重点关注区块链所带来的具体应用和发展。你可能会感到惊讶，但这项技术确实是当今许多热门创新的基础。事实上，区块链是 Web3 的支柱——这是建立在去中心化账本之上的新一代互联网。


  我们将首先定义 Web3，并简要介绍其发展历史。然后，我们将从宏观角度审视 Web3 如何应用于酒店和旅游业，着重强调它所带来的益处和机遇。请将本书的这一部分视为一个引言、一个概览。许多
  Web3 元素，例如加密货币支付或 NFT，将在后续章节中单独介绍，因为该领域已有诸多发展，值得深入探讨。


  ## 什么是 Web3


  互联网的兴起和演变为酒店和旅游业带来了巨大的变化。在过去二十年里，该行业见证了客户与企业互动以及进行旅行预订方式的转变。随着 Web3 的到来，该行业必须为又一次巨大的变革做好准备。Web3
  以去中心化、透明化和安全性为特征。它为酒店和旅游组织提供了各种机会，从实现安全交易到创造独特且个性化的消费者体验。


  顾名思义，Web3 是互联网的第三代。第一代互联网，Web 1.0，始于 20 世纪 90 年代初万维网问世之时。你可能还记得它：笨重、静态、只读。你可以消费信息，但无法与之互动。


  情况在 21 世纪发生了巨大变化，随着社交媒体、移动设备和云计算的兴起。Web 2.0 以交互性、用户生成内容和个性化为特征，并由 Facebook、谷歌或亚马逊等中心化服务和平台主导。我们大多数人真的无法想象没有这些公司提供的便捷强大的在线工具的生活。然而，围绕它们从用户那里收集的数据量、对隐私和审查的担忧，以及权力集中在少数大型企业手中，也存在着诸多争议。


  Web3 有望改变这一切，创造公平的竞争环境。《哈佛商业评论》的一篇文章^(¹⁵)将 Web3 定义为“一个去中心化的互联网，用户在其中拥有并控制自己的数据，数字资产在点对点之间直接交易。”用户可以对自己的数据和在线体验拥有更大的控制权。基于区块链的社交网络和市场使用户能够直接相互交流，无需中间商或中心化权威机构。这种模式也提供了更好的隐私和安全性，因为消费者可以控制自己的数据，并保护自己免受中心化公司窃取或滥用数据的风险。


  以太坊的联合创始人之一加文·伍德博士在他 2014 年的白皮书^(¹⁶)《以太坊：下一代智能合约和去中心化应用平台》中首次描述了 Web3 的概念。


  伍德设想了一种新型的互联网，一种允许开发去中心化应用（dApps）的互联网，这些应用运行在区块链网络上，而不是中心化服务器上。伍德的想法是构建一个互联网，用户可以在其中无需中间商就能相互交易，并利用自动执行交易条件的智能合约。


  自伍德的白皮书发表以来，Web3 一直是科技界的热词。根据德勤的分析^(¹⁷)，Web3 有潜力颠覆包括金融、医疗保健和政府在内的众多行业，因为它能够实现新的商业模式并提高效率。有些人声称它不仅仅是一项新技术，更是我们作为个人和客户与互联网互动的一种全新方式。Web3
  的主要规则是用户控制——你拥有并管理自己的数据。你可以决定谁能访问它。你可以将自己的数据和数字资产货币化。在 Web3 中，用户参与去中心化治理模式，并对系统和应用的开发与运营方式拥有发言权。这与
  Web2 截然不同，在 Web2 中，我们仅仅扮演内容消费者的角色，对我们的数据和在线体验几乎没有或根本没有控制权。


  这种转变是由构成互联网新世界的几个核心关键元素促成的：


  *   **去中心化技术**，例如区块链，消除了对中间商和中心化权威的需求，使点对点交易成为可能

  *   **互操作性协议**，例如以太坊或波卡（Polkadot），使得不同区块链网络之间能够通信

  *   **密码学**，包括数字签名和密钥加密（参见前几章），用以保护数据和交易安全


  Web3 在很大程度上依赖于人工智能、3D 图形以及虚拟和增强现实等新技术。我们将在接下来的章节中讨论它们的重要性和应用。


  现在，让我们来看看引入 Web3 对酒店和旅游业可能产生的影响。


  ## Web3 为酒店和旅游业带来的机遇


  此时，你可能会想，我们为什么要讨论 Web3，以及这个话题与酒店和旅游业有何关联。让我们在此稍作停顿，思考一下互联网的重要性以及过去二十年它给这个行业带来的变化。我们都看到了企业运营和与客户互动方式的重大转变。一切都转移到了“线上”，世界突然变得小得多，也更易于访问。你无法想象一家没有网站、在线预订平台、在线支付和社交媒体账户的酒店。


  现在，随着我们逐步迈向 Web3，酒店业需要为另一次巨大的变革做好准备。基于区块链的创新为酒店和旅游业面临的许多挑战提供了解决方案。然而，其中一些具有改变游戏规则的潜力，可能会对该行业的发展方式产生深远影响。


  现在是时候开始将技术转化为商业和用例了。在表 4-1 中，你将看到几个区块链和 Web3 的应用。请注意，此列表并未详尽无遗，并可能会随着技术的成熟而演变。


  表 4-1


  区块链在酒店业的应用概览




  | 去中心化预订平台和旅游市场 | `Web3` 提供了一个创建去中心化预订平台的机会，该平台可直接连接房东与房客。去中心化平台消除了如`Expedia`、`Booking.com`和`Airbnb`等中介机构。取而代之的是，房东和旅行者可以直接联系，无需中心化机构即可完成预订。我们将在第
  5 章详细讨论此用例。 |

  | 忠诚度计划 | `区块链`技术支持安全、透明且去中心化的忠诚度计划管理。基于`区块链`技术的酒店或航空公司忠诚度计划，可以作为一个更安全、更可靠的系统来追踪客户忠诚度奖励。除了增强客户体验、降低成本和流程效率外，正如`阿联酋航空`案例所证明的那样，将忠诚度计划迁移至`区块链`平台还可能有助于标准化合作伙伴的接入流程并解锁更多益处。^(¹⁸)
  事实上，许多酒店业组织现在正在探索将`NFT`（非同质化代币）应用于其忠诚度计划。我们将在第 7 章深入探讨此话题。|

  | `加密货币`支付 | 近年来，`加密货币`获得了显著关注和普及，酒店旅游业也不例外。一些酒店和航空公司已开始接受`加密货币`支付，从而无需银行等中介即可进行快速、安全的交易。客户现在可以使用诸如`比特币`和`以太坊`等数字货币来支付航班和房间费用。我们将在第
  5 章探讨`加密货币`的优势和挑战。 |

  | 去中心化旅游评论平台 | 在线评论欺诈和虚假评论是酒店旅游业面临的一个主要问题。如今的旅行者严重依赖在线评论，互联网上分享的负面意见可能对企业造成极大损害。我们都知道，一位不满客户的负面评价可能会影响
  10 到 15 个人；而一旦放到网上，我们所谈论的则是成百上千的人会因此不会选择你的餐厅或酒店。像`Tripadvisor`这样的传统旅游评论平台因允许误导旅行者的欺诈性评论而受到批评。事实上，`Tripadvisor`报告^(¹⁹)称，在
  2020 年提交到该网站的 3000 万条评论中，约有 4.4%被认定为欺诈性评论。`Tripadvisor`成功阻止了其中三分之二的评论上线。虚假评论可能与有组织的诈骗有关，也可能是由企业自身生成的，方式包括强迫员工发布正面评论或使用虚假评论生成服务。这可能会为企业创造不公平的优势，并误导潜在客户。基于`区块链`技术构建的去中心化旅游评论平台提供了消除虚假评论的机会。评论和评级存储在公共账本上，一旦写入便无法编辑或删除。这为用户创造了透明度和信任。验证凭证也可用于防止虚假评论被添加到平台上。|

  | 个性化旅行体验 | `Web3`支持个性化旅行体验，用户可创建自己的行程、预订体验并管理自己的旅行安排。去中心化旅游平台可以利用`区块链`技术安全地存储用户数据和偏好，从而实现更个性化和高效的旅行体验。|

  | 用于预订和支付的智能合约 | 智能合约是自动执行的合约，其协议条款直接写入代码中。在酒店旅游业背景下，智能合约可用于自动化预订和支付流程。例如，可以在酒店和客户之间创建智能合约，其中预订条款被写入代码，一旦条款得到履行，付款便会自动转给酒店。|

  | 酒店资产代币化 | `Web3`技术还可用于对酒店资产（如酒店房间或度假屋）进行代币化。代币化是将实物资产转换为`区块链`上的数字代币的过程。代币化允许对资产进行分式所有权，并使个人更容易投资于酒店资产。例如，酒店可以将其房间代币化，允许投资者购买房间的一部分并分享收入。我们将在第
  7 章详细讨论分式所有权。|

  | 虚拟和增强现实体验 | `Web3`是元宇宙的基础设施，能够支持创建和存在沉浸式的虚拟和增强现实旅行体验。例如，在元宇宙中，用户可以使用虚拟现实头显探索不同目的地，并感受身临其境的感觉。当用户实际身处某地时，增强现实可用于提供该目的地的实时信息，例如历史和文化事实。本书第
  8 章将深入探讨元宇宙。|

  | 验证凭证 | `Web3`技术可用于创建安全且可验证的数字身份和凭证，有助于防止欺诈并提高酒店旅游业的安全性。|

  | 去中心化供应链管理 | `Web3`技术可用于创建去中心化供应链管理系统，以提高酒店旅游业的透明度和可追溯性。|


