- "# 6. 去中心化预订平台\n\n去中心化预订平台有潜力颠覆通过全球分销系统（GDS）和在线旅行社（OTA）进行旅行预订的传统模式。一些行业专家声称，通过基于区块链的平台重新获得与旅行者的直接联系并绕过中间商，将为整个酒店和旅游业节省大量成本。\n\
  \n在本章中，我们将揭示由区块链驱动的去中心化预订平台能为酒店和旅游业带来的优势和机遇。我们将探讨这些平台如何颠覆通过 GDS 和 OTA 进行旅行预订的传统模式，以及它们能为行业利益相关者节省的潜在成本。\n\
  \n## 传统预订模式的挑战\n\n全球分销系统和在线旅行社在行业内扮演着重要角色。两者都支持旅行预订。像 `Amadeus` 或 `Sabre` 这样的 GDS\
  \ 被旅行代理和差旅管理公司用作预订系统。而诸如 `Booking.com` 的 OTA 则是允许客户直接向服务提供商预订行程的在线平台。如今，很难想象没有它们，行业将如何运作。但它们也带来了一些挑战。\n\
  \n高佣金是主要问题之一。每购买一张机票都会额外收取大约 12 美元的费用。酒店通过 OTA 完成的预订通常需要支付 15%–25% 的手续费。优先列表则会让你额外多花约\
  \ 3% 的费用。自然而然地，这会侵蚀你的利润，并成为一个沉重的负担，特别是如果你经营的是小企业。\n\n另一个挑战是对定价和库存缺乏控制。中间商有权设定价格并提供折扣和促销活动，而服务提供商实际上对此几乎没有发言权。此外，GDS\
  \ 和 OTA 可能要求服务提供商满足某些标准（例如最低房价）才能在其平台上列示，这可能会限制消费者可用的选择。\n\n此外，GDS 和 OTA 可以访问宝贵的客户数据，他们可能会也可能不会与提供商分享这些数据。你实际上失去了获得重要见解和提供个性化体验的能力。你可能甚至无法获取客户的电子邮件或预订历史，这自然限制了你直接与客人互动的能力。\n\
  \n透明度也是一个问题。GDS 和 OTA 在定价和收取的佣金费用方面往往缺乏透明度，这可能导致服务提供商和消费者之间的不信任和困惑。例如，预订系统可能优先考虑某些服务提供商而非其他（这就是你在预订网站顶部看到的优先列表），使得消费者难以找到最适合自己需求的选项。\n\
  \n所有这些挑战促使了去中心化预订平台的发展。\n\n\n\n## 去中心化预订平台的概念与优势\n\n基于区块链技术的去中心化预订平台，让客户能够直接向酒店、航空公司和旅行社等服务提供商预订旅行，无需通过全球分销系统（GDS）和在线旅行社（OTA）等中介机构。\n\
  \n消除中介环节可带来诸多切实可见的好处。首先，服务提供商能够降低佣金成本、增加利润，并直接向消费者提供折扣和促销活动。这些平台为旅行预订提供了一个透明且安全的系统，所有交易均有不可篡改的记录。\n\
  \n服务提供商可以自行设定价格、主动管理库存、直接与客户互动，并能获取客户数据以提升客户服务质量和忠诚度。\n\n通过运用区块链技术处理交易，去中心化预订平台无需支付中介机构，从而缩短了处理支付和预订所需的时间。\n\
  \n这带来简化的预订流程，以及服务提供商和消费者双方体验的提升。最后，去中心化预订平台提高了安全性，并能降低欺诈和黑客攻击的风险。\n\n所有这些优势都可通过区块链技术实现，该技术用于创建平台上所有交易的分布式账本。这个账本存储在一个计算机网络中，并实时持续更新。它提供了所有交易的安全且透明的记录，可供所有相关方查阅。智能合约是另一个重要元素——它们包含条款与条件，当特定条件满足时会自动执行。在这种情况下，智能合约用于自动化预订流程，并确保所有参与方履行其义务。\n\
  \n一些去中心化平台利用代币化来促进交易——代币，例如数字货币，可用于支付酒店客房或机票，或作为参与平台赚取奖励的一种方式。\n\n我们称这些平台为去中心化，是因为它们依赖分布式计算机网络来管理交易和数据存储，这意味着没有像\
  \ GDS 或 OTA 这样的中央权威机构来控制它。不过，它们由商业公司管理。\n\n正因这种去中心化性质，管理去中心化预订平台的商业公司并不能完全控制该平台。虽然它们可能对平台的管理规则和协议有一定影响力，但未经构成平台的节点网络同意，它们不能单方面更改这些规则。这确保了平台对所有参与方保持透明、公平和安全。\n\
  \n然而，值得注意的是，这里需要考虑一些风险。例如，即使底层技术是去中心化的，管理和决策权可能仍集中在运营该平台的公司手中。这家公司也可能有权访问用户数据和交易信息，并将其用于自身目的。可能还会出现其他挑战，如缺乏透明度、利益冲突问题、用户参与治理有限以及公司的财务稳定性，用户在加入此类平台前应仔细评估这些因素。\n\
  \n在去中心化预订平台中，构成平台的计算机网络协同工作，以验证交易、维护交易账本，并确保平台的管理规则和协议得到遵守。网络上的每个节点都能执行这些功能，因此不存在可被利用的单点故障。\n\
  \n此外，由于去中心化预订平台依赖节点网络来管理交易和数据存储，它们天生比中心化平台更能抵御攻击和系统故障。这是因为不存在一个单点故障就能使整个平台瘫痪。相反，即使部分节点受损或失效，节点网络仍能继续运行。\n\
  \n你可能还会问——如果这些平台实际上由一家商业公司管理——那它们不就是另一个中介吗？这是个好问题。确实如此。但要彻底消除中介，唯一的方法是创建一个由行业共同拥有的去中心化自治组织，并配以一套协议来管理它。我们最终可能会达到一个点，即整个旅游服务提供商生态系统会创建这样一个组织，但这将需要大量的时间和精力。当前的去中心化预订平台确实在充当中介角色，但与传统的\
  \ GDS 或 OTA 相比，它们的费用要低得多，而且网络是开源的，这意味着参与者可以访问、使用、协作和创新。\n\n## 实际运作中的去中心化旅行预订平台案例\n\
  \n去中心化预订平台因其在降低成本、提高透明度和提升效率方面的潜力，在旅游行业日益普及。在本节中，我们将探讨一些去中心化预订平台的案例研究及其对行业的影响。\n\
  \n首先，让我们看看这个市场中几个新进入者的例子。\n\n### Winding Tree\n\nWinding Tree（[`https://windingtree.com`](https://windingtree.com)）是全球最受欢迎的去中心化旅行预订平台之一。它利用区块链技术将酒店、航空公司和其他旅行服务提供商与客户直接连接起来。\n\
  \nWinding Tree 旨在让客户的旅行更便宜，让服务提供商的利润更高。通过消除中介需求，Winding Tree 降低了佣金费用，并让服务提供商对其定价和库存拥有更多控制权。Winding\
  \ Tree 允许服务提供商自主管理库存和定价，这使得他们能够提供更具竞争力的价格，并为客户创建定制套餐。此外，该平台提供了一个安全、透明的交易流程，消除了欺诈性预订的可能性，并降低了数据泄露的风险。\n\
  \nWinding Tree 已与汉莎航空、法航-荷航集团和阿提哈德航空等行业巨头合作，探索区块链技术在旅游行业的应用。2021 年，美国航空^(³²)决定与\
  \ Winding Tree 合作，开发一个更高效、更具成本效益的机票分销系统。作为合作的一部分，美国航空向 Winding Tree 开放了其航班库存，两家公司将共同开发一个基于区块链的旅行预订平台的概念验证。\n\
  \n### LockTrip\n\nLockTrip（[`https://locktrip.com`](https://locktrip.com)）是另一个去中心化预订平台，客户可以直接从服务提供商那里预订旅行住宿。客户可以使用\
  \ LockTrip 用户友好的界面搜索和预订旅行服务，该界面提供实时可用性、定价和预订确认。\n\n除了预订平台，LockTrip 还开发了自己的加密货币，称为\
  \ LockTrip Token（LOC），客户可以用它在平台上支付旅行服务。使用加密货币为客户提供了额外的安全性和匿名性，同时也实现了更快、更具成本效益的交易。\n\
  \nLockTrip 的商业模式基于向服务提供商收取每笔通过平台完成的预订的固定费用，而非传统 OTA 使用的基于佣金的模式。这种方法使服务提供商对其定价和库存拥有更大的控制权，同时也使他们能够为客户提供有竞争力的价格。\n\
  \n\n#### Travala.com\n\n`Travala.com` 成立于 2017 年，其愿景是“将旅行预订与去中心化技术的精神相结合，即促进任何人、任何地点的可访问性，提供抗审查的点对点交易，并构建由软件控制、用户治理的开源技术。”\n\
  \n如今，它是最大的去中心化预订平台之一，拥有全球超过两百万家酒店和其他旅行服务提供商，为客户提供丰富的旅行住宿预订选择。该平台还高度重视可持续性，致力于采用环保旅行选择并减少碳排放。`Travala.com`\
  \ 因其在旅行预订领域的创新方法而获得广泛认可，包括在 2020 年被 `Fast Company` 评为“世界最具创新力公司”之一。\n\n`Travala.com`\
  \ 的独特之处之一在于其原生加密货币 `AVA`，可用于预订住宿并在平台上享受折扣。`AVA` 代币还为用户提供额外福利，例如获得忠诚度奖励和独家促销活动。除了\
  \ `AVA`，该平台还支持多种其他支付方式，包括传统信用卡和各种加密货币。\n\n除了去中心化预订模式，`Travala.com` 还提供一种混合模式，允许用户从传统在线旅行社（`OTA`），如\
  \ `Booking.com` 和 `Expedia`，预订住宿。这种混合模式让用户可以访问更广泛的住宿选择，同时仍能享受区块链技术和加密货币支付的优势。此外，该公司还开发了一个带有智能管理仪表板和全天候支持的企业预订引擎，以方便企业差旅。\n\
  \n`Travala.com` 是最具创新性的平台之一，正在探索新兴的 Web3 应用场景，例如 NFT 旅行老虎俱乐部。我们将在下一章中进一步探讨这一点。\n\
  \n**注**  \n类似基于区块链、提供酒店、短租服务和交通票务的平台包括，例如 `Concierge`、`Crowdvilla`、`CryptoCribs`、`Deskbellchain`、`Further`、`Travelchain`、`Travel\
  \ Block`、`Trippki` 和 `Trip.io`。它们中的大多数要么发行旅行代币，要么接受加密货币作为可用于预订的代币。\n\n传统旅行公司也在探索区块链在物业管理和预订系统中的应用。例如，`TUI\
  \ Group` 已经在使用区块链技术来管理其库存和资产的分配，并处理内部流程。^(³³) 区块链有助于解决酒店容量不透明、不同源市场不同价格、手动沟通以及信息丢失等问题。`TUI`\
  \ 还在与小供应商测试智能合约，以提高第三方合作关系的效率。\n\n#### 总结：去中心化预订平台会颠覆旅行市场吗？\n\n正如本章前面所讨论的，去中心化预订平台为参与的旅行服务提供商带来了诸多好处。我们身处一个竞争激烈的行业，其中全球分销系统和在线旅行社占据主导地位。这些中间商控制了相当大的市场份额，并对其服务收取高额费用。\n\
  \n去中心化平台承诺大幅降低成本并提高透明度。它们有潜力赋能那些如今难以与拥有更强营销和分销能力的大型供应商竞争的中小型独立供应商。\n\n去中心化平台可以通过为这些供应商提供更高的曝光度和更广泛的客户群体来创造公平的竞争环境。这可以促进行业的竞争和多样性，最终使客户和服务提供商双方受益。这些平台还可以通过智能合约、代币和\
  \ NFT 等创新技术，催生新的商业模式和收入来源，参与其中的酒店可以从中获益，而无需自行开发。这为服务提供商创造了新的机会，使其能够脱颖而出，并为客户提供独特的价值主张。\n\
  \n所有这些好处听起来都很棒，对吧？但同时也存在挑战，包括采用和可扩展性、法律和监管的不确定性，以及来自现有巨头的激烈竞争。\n\n参与去中心化预订平台需要一定的区块链知识，这对许多用户来说可能是一个障碍。此外，还存在信任问题。大型在线旅行社拥有显著的品牌知名度和营销预算。它们已经存在了一段时间，并获得了很高的采用率。它们也富有创新精神，能够提供出色且无缝的最终用户体验。同样，全球分销系统也开发了许多适用于例如企业差旅管理的集成和流程。\n\
  \n新兴的去中心化预订平台在许多情况下缺乏这种业务连接性和经验。此外，这些现有玩家可能与酒店及其他住宿供应商签订了独家协议，这使得去中心化平台难以获得相同的库存资源。\n\
  \n另一方面，我们也看到了一些传统平台与去中心化平台合作与伙伴关系的例子。例如，`Travala.com` 曾与 `Booking.com`^(³⁴) 合作，最近又与\
  \ `Expedia`^(³⁵) 合作，以扩展其服务范围，并为旅行套餐启用加密货币支付。\n\n与基于区块链的预订平台合作时应考虑的另一个挑战是，它们目前在一个基本不受监管的领域中运营。它们应遵守现有的关于数据隐私或金融交易监控的法规，因此，如果您是其成员或考虑参与其中，请务必核实这一点。\n\
  \n必须指出的是，这些平台具有许多优势。如果您的目标市场是加密社区，并且您不想投入时间和资源进行加密货币支付网关的直接集成，它们将帮助您轻松触达该群体。我们讨论的大多数挑战并非不可克服。\n\
  \n我敢断言，去中心化预订平台有潜力通过创造一个更透明、高效和竞争的市场来改变酒店业。这是否意味着传统玩家将失去大量市场份额甚至不复存在？绝对不会。但随着基于区块链的创新不断成熟，并且我们开始向\
  \ Web3 过渡（我们将在下一章中详细讨论），它们的商业模式很可能会发生变化。\n\n\n"
