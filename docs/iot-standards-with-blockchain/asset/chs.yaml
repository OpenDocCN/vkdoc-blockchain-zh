  \ 可以带来 30% 到 200% 的潜在投资回报率——而这仅仅是第一年。^(²²) 如此规模的节省将令人难以抗拒。去年，德勤发现，虽然只有 9% 的受访公司实施了\
  \ RPA，但近 74% 的公司计划在未来 12 个月内研究这项技术。\n\nRPA 的局限性在于，它们以静态方式模仿人类行为，缺乏人类适应变化的能力或智能。人工智能是下一项重大技术，它通过使机器能够在学习和解决问题等功能上模仿人类，从而补充了\
  \ RPA。与只能执行重复性任务的 RPA 相比，人工智能可以从过去的数据中学习，并以更智能的方式执行任务。\n\nRPA 和人工智能正在融合，其所带来的成本节约和收益对企业来说极具吸引力，不容忽视。例如，机器人流程自动化（RPA）可以捕获并解释现有业务流程应用程序（如理赔处理或客户支持）的操作。一旦\"\
  机器人软件\"理解了这些任务，它就可以接管它们的运行，并且其速度、准确性和持久性远超任何人类。用 AI 算法补充 RPA 可以带来额外的好处，即机器人可以从数据和自身错误中学习，从而随着时间的推移提高其准确性和性能。\n\
  \nRPA 和 AI 结合的应用范围可以扩展到降低成本以及为企业带来新的洞察，从而做出明智的决策。RPA 和人工智能的结合可以为企业提供最大程度的自动化能力，是数字化转型过程中需要考虑的最重要因素之一。这些优势在物联网环境中会进一步放大，我们将在后续章节中讨论。将物联网与人工智能相结合，可以创造出\"\
  智能机器\"，它们模拟智能行为，在很少或无需人工干预的情况下做出明智的决策。其结果是加速创新，从而显著提高相关企业的生产力。物联网和人工智能市场正在同步快速发展。\n\
  \n## 机器人流程自动化\n\n如前所述，机器人流程自动化（RPA）是一种技术，它允许配置计算机软件或\"机器人\"来模拟和整合人类在与数字系统交互时的操作，以执行业务流程。RPA\
  \ 利用用户界面来捕获数据并操作应用程序，就像人类所做的那样。它们进行解释、触发响应并与其他系统通信，以执行大量重复性任务。\n\n许多企业正在转向 RPA 以简化企业运营并降低成本。通过\
  \ RPA，企业可以自动化基于规则的单调业务流程，使业务用户能够将更多时间用于服务客户或其他更高价值的工作。被称为虚拟 IT 支持团队的 RPA 机器人正在取代人类处理重复单调的流程。企业还通过将机器学习、语音识别和自然语言处理等认知技术注入\
  \ RPA，进一步增强其自动化能力，实现过去需要人类感知和判断能力的高阶任务的自动化。这被称为人工智能。\n\n区分 RPA 与业务流程管理（BPM）等企业自动化工具的关键区别在于，RPA\
  \ 使用软件或认知机器人来执行和优化流程操作，而不是人工操作员。与 BPM 不同，RPA 是一种快速且高效的解决方案，无需侵入式集成或更改底层系统，使组织能够主要通过用软件\"\
  机器人\"替代人类来快速实现效率和成本节约。\n\nRPA 非常适合自动化，但仍需注意其局限性。例如，由于 RPA 通常与用户界面交互，即使这些界面的微小变化也可能导致流程中断。\n\
  \n\n## 人工智能\n\n人工智能（AI）是“让机器变聪明的科学”。如今，我们可以教机器像人类一样行事，赋予它们看、听、说、写和移动的能力。\n\n人工智能是一个涵盖众多子领域的广义术语，这些子领域旨在构建能够完成人类需要智能才能完成的任务的机器。这些子领域如图\
  \ 10-1 所示，并列举如下：\n\n![../images/517610_1_En_10_Chapter/517610_1_En_10_Fig1_HTML.jpg](img/517610_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1  \n人工智能子领域\n\n**机器学习** – 机器学习使系统能够自动从经验中学习和改进，而无需进行显式编程。它专注于开发能够访问数据并利用数据自行学习的计算机程序。机器学习是计算机系统通过接触数据来提升性能的能力，无需遵循显式编程指令。这是一个自动从海量数据中发现模式的过程，这些模式随后可用于进行预测。\n\
  \n**深度学习** – 这是一种相对较新且非常强大的技术，涉及一系列算法，这些算法在深度“神经”网络中处理信息，其中一层的输出成为下一层的输入。神经网络是受构成动物大脑的生物神经网络启发而设计的计算系统。神经网络的数据结构和功能旨在模拟联想记忆。深度学习算法已被证明在例如检测癌细胞或预测疾病方面非常成功，但有一个重要的前提：无法确定深度学习程序依据哪些因素得出其结论。\n\
  \n**计算机视觉** – 这是计算机识别图像中物体、场景和活动的能力，它使用技术将分析图像的任务分解为可管理的部分，检测图像中物体的边缘和纹理，并将图像与已知物体进行比较以进行分类。\n\
  \n**自然语言/语音处理** – 这是计算机像人类一样处理文本和语言的能力，例如从文本/语音中提取含义，甚至生成可读、风格自然且语法正确的文本。\n\n**认知计算**\
  \ – 这是一个相对较新的术语，受到 IBM 的青睐。认知计算应用认知科学的知识来构建包含多个人工智能子系统的架构，包括机器学习、自然语言处理、视觉和人机交互，旨在模拟人类思维过程，从而在复杂情境中做出高级决策。根据\
  \ IBM 的说法，其目的是帮助人类做出更好的决策，而不是替他们做决策。\n\n### 数据科学\n\n物联网的概念在过去几年中已经成熟，并且仍在继续成熟。人们越来越关注安全性、边缘分析以及其他对物联网项目成功至关重要的技术和平台的重要性。然而，物联网用例取得成果所需的最重要元素之一是数据。事实上，“物联网”这个短语中缺失的一个关键元素，或许是整个拼图中最重要的一块——数据本身。\n\
  \n物联网的核心就是数据。几乎所有企业都在收集海量数据，并基于这些数据做出业务决策。企业拥有的数据越多，就能产生越多的业务洞察。利用数据科学，企业可以发现数据中那些甚至未曾知晓存在的模式。例如，人们可以根据前方车辆发送的数据，发现自己面临事故风险。在这样的场景中，数据科学被广泛应用。企业利用数据科学构建推荐引擎、预测机器行为等等。这一切只有在企业拥有足够数量的数据时才有可能实现，从而可以在这些数据上应用各种算法，以获得更准确的结果。数据科学的核心就是利用机器学习算法，在庞大的数据集上应用人工智能，进行预测并发现数据中的模式。\n\
  \n### 人工智能与数据科学之间的联系\n\n正如我们之前讨论的，数据科学与人工智能之间的联系是一一对应的。这意味着数据科学通过关联相似的数据以供将来使用，帮助人工智能找出问题的解决方案。从根本上说，数据科学使人工智能能够更快、更高效地从那些庞大的数据池中找到恰当且有价值的信息。没有数据科学，人工智能便不复存在。人工智能是一系列技术的集合，这些技术擅长从大量数据集中提取洞察和模式，然后基于这些信息进行预测。\n\
  \n一个例子是 Facebook 的面部识别系统，它会随着时间的推移收集大量现有用户的数据，并将相同的技术应用于新用户的面部识别。另一个例子是谷歌的无人驾驶汽车，它实时收集周围环境的数据，并处理这些数据以在道路上做出智能决策。\n\
  \n一个典型的非人工智能系统，如同会计软件一样，依赖人工输入来工作。系统通过手动硬编码规则。然后，它严格遵循这些规则来帮助处理税务。系统只有在人类程序员改进它时才能得到提升。但机器学习工具可以自我提升。这种提升源于机器根据新数据评估自身性能。\n\
  \n\n\n#### 高质量数据的重要性\n\n人工智能成功的关键在于拥有高质量的数据。只有当人工智能能从与企业使用 AI 自动化的用例高度相关的优质且高质量的数据中学习时，才能提供卓越的结果。例如，要解决一个物理问题，如果你向人工智能系统提供与数学相关的数据，那么结果可能并不理想。你的系统会学到一些东西，但这些努力可能无法帮助系统正确回答你的测试问题。再举一个例子，如果你用人行道被错误标记为街道的图像来训练用于自动驾驶车辆的计算机视觉系统，结果可能是灾难性的。为了利用机器学习算法得出准确的结果，你需要高质量的训练数据。要生成高质量的数据，你需要熟练的标注员仔细标注你计划在算法中使用的信息。\n\
  \n如果数据质量不佳，人工智能将无法提供预期的结果，因为人工智能通过机器学习从数据中学习，因此企业需要高质量的数据。如果数据不好，人工智能系统就无法很好地学习，从而也就无法给出良好的结果。这意味着使用人工智能的组织必须投入大量资源，以确保拥有足够数量的高质量数据，从而使他们的人工智能工具能够产生预期结果。但这并不一定意味着企业需要一个功能齐全的企业级大数据平台来开启其人工智能之旅。人工智能可以针对特定用例的质量数据子集进行工作，企业可以创建一个能够满足该特定用例需求的数据存储库，并使用这些数据来训练系统。\n\
  \n如今，市场上几乎所有产品，无论其工具专长是什么，都声称工具内置了人工智能功能，这在技术市场上造成了很大的困惑，即对于人工智能驱动的用例应该使用哪些工具。然而，需要理解的是，几乎所有主要工具能力并非人工智能或机器学习的产品，只提供通用的人工智能能力，并且只能执行非常有限的人工智能任务。如果某公司需要在其内部跨广泛的物联网用例应用人工智能，那么他们需要寻找能够针对该特定用例对物联网数据执行人工智能的物联网云平台。Azure\
  \ IoT Platform 就是这样一个例子。\n\n### 人工智能与物联网\n\n我们在前面的章节中讨论过，RPA 使用预定义的规则来执行活动，并且在过去几年中，RPA\
  \ 在多个用例中取得了巨大成功。即使我们考虑像 NASA 这样的组织解决的一些世界上最大的问题，也是通过传统的规则或理论实现的。例如，为了从地球飞往火星，NASA\
  \ 的目标不是火星当前的位置，而是要找出火星九个月后将在哪里，因为宇航员从地球飞到火星需要九个月时间。NASA 用于预测火星九个月后位置的规则是基于已有 300\
  \ 年历史的牛顿运动定律。牛顿定律适用于我们太阳系中的所有行星，除了水星。水星是另一个故事，因为它离太阳太近等等，还有其他原因。股票市场也有类似的情况。像“如果股票的短期均线上穿长期均线，则买入股票”这样的预定义规则，效果相当不错。在过去几年，当人工智能还不是企业战略一部分时，这类预定义规则曾是常态，但现在已经不是这样了。人工智能正成为大多数组织的主流，并且有越来越多的用例证明了人工智能的好处。由于这种广为人知的关注，企业已经开始摆脱对传统规则和基于规则的系统的思考。新的常态是——给我数据，我将通过从数据中学习来创建模型，我学得越多，创建的模型就越好。这就是人工智能的全部意义所在。对于物联网用例，人工智能正在将收益放大到企业能够超越其利润率的程度，而同时许多其他企业正在进入他们过去从未想过的新业务领域。\n\
  \n物联网会产生大量数据。设备以高速发送大量且种类繁多的信息，这使得物联网数据管理非常复杂。我们将在第`11`章详细讨论物联网中的数据管理。管理如此复杂的物联网数据需要强大且量身定制的数据架构、策略、实践和程序，以恰当地满足物联网数据生命周期的需求。传统的大数据方法和基础架构是不够的，企业在评估过程中需要验证物联网云平台或物联网网关是如何解决物联网特定数据挑战的。\n\
  \n当涉及到物联网数据时，可扩展性和敏捷性是最大的担忧之一。物联网数据流量的庞大规模及其即时性使得物联网用例的数据管理变得复杂。物联网云平台或物联网网关需要从物联网数据角度解决的一些关键挑战如下所列：\n\
  \n*   考虑到物联网设备的数量会随着时间的推移而增加，比如说从 40 个增加到 40 万个，物联网数据架构将如何适应这种变化？\n\n*   大多数物联网数据的保质期很短——这意味着需要在设备生成数据后立即采取行动。例如，如果设备记录到熔炉温度极高，则需要立即关闭熔炉，并且只有在该时间点采取行动时，这个温度数据才有用。企业需要了解物联网产品供应商提供的用于实时处理和分析的物联网解决方案。\n\
  \n*   一旦接收到物联网数据，将如何存储它，以确保为新信息留出足够的空间？\n\n*   输入和输出将如何在设备中流动而不会发生堵塞？\n\n*   对于需要将设备数据与非设备数据（例如，关于用户和密码的元数据）结合起来的物联网用例，存在哪些解决方案可以结合这些不同的数据以使数据有意义？\n\
  \n#### 在物联网用例中应用人工智能的经验教训（应用物联网）\n\n人工智能高度依赖高质量的数据来做出正确的预测。一旦企业拥有足够的高质量数据，人工智能的工作方式是：向机器学习模型提供一组数据。利用这第一组数据，模型执行计算并预测一个结果。如果结果错误，它会重新调整规则，并将该规则应用于第二组数据并预测结果。这个循环持续进行，直到结果正确为止。一旦结果正确，数据会被多次输入以确定结果的准确性。在将规则应用于数千个数据集并消耗海量数据之后，一个能够做出正确预测的模型就被创建出来了。这就是机器学习的本质。\n\
  \n在物联网用例中应用人工智能并非一件非常简单的事情，并可能导致若干挑战。如果规划不当，应用物联网项目很多时候可能会变成一个繁琐而漫长的工程。我个人在应用物联网用例中学到了四个关键的经验教训，如图`10-2`所示。\n\
  \n![../images/517610_1_En_10_Chapter/517610_1_En_10_Fig2_HTML.jpg](img/517610_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2\n\n应用物联网用例的重点领域\n\n\n\n-   **POC 未成功，除非它能扩展**\n\n第一条规则是，不能仅凭概念验证就认为一个概念已经成功。只有当概念验证能够扩展时，这个概念才算成功。\n\
  \n让我用一个案例研究来解释这一点。美国一家拥有 2000 多家零售店的顶级奢侈品牌希望我们利用机器学习创建一个人工智能工具，该工具能够在任何名人光顾其门店时，在五秒内向门店经理发出警报。门店经理随后将能够迎接名人，并给予他们热情的欢迎。我们开发了应用人工智能用例，并使用\
  \ 400 个摄像头在阿拉斯加的五家门店进行了部署，结果令人鼓舞，成功率超过 95%。我们使用面部识别技术和机器学习模式，基于数百万数据集对大约 5000 位名人实施了概念验证。它在阿拉斯加表现非常出色。\n\
  \n我们在密歇根州和其他城市使用了相同的技术，部署了 10000 个摄像头，但结果并不理想。我们错过了进入密歇根州和底特律门店的 32% 的名人，因为所使用的数据不足以识别该地区的所有名人。这个案例研究教会我们，如果一个概念验证证明它能在五秒内用\
  \ 400 个摄像头和 5000 位名人正常工作，并不意味着它能在 40000 个摄像头和 50000 位名人场景下正常工作。因此，第一个教训是，除非概念验证被证明能够扩展，否则它不算成功。\n\
  \n-   **人工智能需要足够的数据和时间来学习**\n\n为了预测并提供准确结果，人工智能模型需要大量的数据和时间。一个中等复杂度的应用人工智能用例需要至少六到九个月的学习时间才能达到\
  \ 95% 的准确率。一家名为`Seagate`的制造业客户要求我们在其整个生产线上部署多个设备，以实时了解其生产线故障情况，因为传统上如果某个设备出现故障，整个生产线就会停止，这可能导致数百美元的损失。但客户的关键要求是，我们不能过早或过晚告知他们这些故障；他们需要在任何事故即将发生之前得到通知。为了实现这种近乎实时的故障警报，我们需要海量的数据，并且模型需要几个月的时间学习才能预测故障。在将数百万物联网数据集输入机器学习模型超过九个月后，该模型能够在大约\
  \ 85% 的情况下预测故障。\n\n-   **明确要实现的目标**\n\n如果给人工智能分配一个特定的、狭窄的任务，它就会非常有效。\n\n我们被叫到一家医院，该城市肺结核发病率很高。政府决定对该市所有\
  \ 40 岁以上的人进行肺结核检测。虽然全市正在大规模进行扫描检查，但医院面临的挑战是，在拍摄胸部 X 光片后，医生需要两周时间才能确认一个人是肺结核阳性还是阴性。对于阳性病例，在这两周内，存在感染者将疾病传播给周围其他人的风险。人工智能被用来解决这个问题。我们请医生分享所有患者的\
  \ X 光片，并将它们分为两类：肺结核阳性与肺结核阴性。肺结核阳性是感染了肺结核的患者，其余的被归类为肺结核阴性。机器学习模型对从全市实验室提取的数千张 X 光片进行了训练。模型基于阳性和阴性报告反复训练。在学习了数百万张\
  \ X 光片后，最终的人工智能模型能够在一秒钟内根据 X 光片预测一个人是肺结核阳性还是阴性。该算法达到了 95% 的成功率。\n\n因此，从这个案例研究中得到的关键教训是，企业需要非常明确他们希望从人工智能中实现（预测）什么。在医院的案例研究中，我们仅使用\
  \ X 光片作为预测患者肺结核的手段——我们没有使用`MRI`或`CT`扫描。\n\n-   **如果模型工作正常，就付诸行动，而不是追求做更多的人工智能**\n\
  \n如果一个模型工作良好，强烈建议根据用例将模型付诸行动。\n\n我们在哥本哈根时，有人向我展示了一个移动应用。这个移动应用显示，在我位置周围 100 公里范围内，有多少家食品店在接下来的两天内有即将过期的食品。利用这些数据，商店对即将过期的食品提供\
  \ 50% 到 70% 的折扣。我发现从我酒店周围 7 公里范围内有大约 2000 种食品，一旦我点击某个特定商店，它就会列出该商店所有即将过期的商品。我还可以点击某个特定商品，应用会告诉我附近所有有该过期商品出售的商店。这是一个简单的应用，不需要人工智能来完成工作，一些简单的规则就足够了。开发这个应用的公司最初立志要使用人工智能算法，但他们很快意识到这个应用并不需要人工智能，一些简单的规则就足以从食品中提取过期日期信息并分享给用户。这意味着，一旦你花足够的时间收集数据并看到结果，最好实施这些规则，而不是强迫自己去做应用人工智能。\n\
  \n从这个例子中学到的教训是，企业并不总是需要强迫自己用收集到的数据去做人工智能，即使他们获得了资金支持。如果你已经能够使用预定义规则很好地利用现有数据，那么就请使用这些规则来实现业务成果。\n\
  \n## 总结\n\n在本章中，我们讨论了机器人流程自动化与人工智能之间的关键区别。我们还讨论并理解了人工智能内部的不同子领域，如机器学习、深度学习、计算机视觉、自然语言/语音处理和认知计算，这些领域旨在构建能够做事情的机器。\n\
  \n大数据在人工智能中的重要性在本章中得到了清晰的阐述。数据科学通过链接相似数据以供将来使用，帮助人工智能找出问题的解决方案。从根本上说，数据科学使人工智能能够更快、更有效地从海量数据池中找到合适且有意义的信息。不言而喻，企业只有在拥有高质量数据并能够以正确方式使用数据的情况下，才能成功地将人工智能应用于物联网用例。\n\
  \n在物联网用例中应用人工智能并非一项非常直接的工作，如果规划不当，可能会导致若干挑战。我们讨论了应用物联网用例场景中的四个关键经验：\n\n1.  物联网不能仅仅因为概念验证成功就被视为成功；概念验证必须能够扩展，这是第一条法则。\n\
  \n2.  第二条法则是给人工智能模型足够的数据和时间去学习。\n\n3.  第三条法则是为人工智能模型设定一个明确的目标。\n\n4.  第四条是，如果人工智能模型已经产生结果，就应开始使用它们，而不是追求做更多人工智能。\n\
  \n企业必须确保选择支持人工智能的正确智能物联网网关和物联网云平台。其次，需要谨慎选择人工智能可以发挥作用的物联网用例。\n\n在下一章中，我们将讨论数据和数据分析在物联网生态系统中的重要性，之后我们将讨论大数据参考模型。\n\
  \n脚注 1\n\n\n\n"
- '# 第四部分：物联网实施要点


  ## 物联网实施要点


  在本部分中，我们将讨论围绕大数据与分析、产品组织以及物联网产品团队的物联网实施执行层面。


  '
- '# 11. 大数据与分析


  20 世纪 90 年代初，信息时代兴起。联网计算机和数字通信使企业能够收集并利用客户数据来开发新的商业模式。这带来了更高效的客户互动，而在线服务的兴起则为许多行业开辟了全新的工作方式。过去
  20 年间，数据战略已成为基石，数字化转型如今在很大程度上依赖于数据。


  数字化转型不仅仅是将渠道数字化或简单地以数字方式完成更多工作；其范围要广泛得多。数字化转型关乎改善客户体验、更好地理解客户与竞争对手，并利用技术满足业务需求。另一方面，企业也可以通过数字化实现运营效率。要实现这些目标，企业需要洞察力，而这种洞察力完全来自数据。这也是数据变得如此重要的核心原因之一，因此"数据优先"理念变得如此流行。数据优先实质上意味着，对于任何企业而言，在做出任何业务决策时，数据是首要考虑因素。


  获取更好的数据是消除数字化转型中不确定性的关键。正如首席数据官罗布·罗伊在 Sprint 公司所解释的那样，领导者呼吁"建立一种将数据放在首位的新公司文化"。^(²³)


  拥有数据优先思维是至关重要的第一步；然而，企业确实需要建立相应的流程和能力，以便能够以最及时、最高效的方式收集数据并使其可用。数据还需要以足够快的速度提供，使企业能够做出正确的决策，并从数据生成的洞察中获益。


  随着技术的发展，近年来数据在类型、数量和速度方面都发生了巨大变化。过去我们有固定电话，而现在我们有了智能手机——它们让我们的生活以及手机本身都更加智能。过去我们用软盘存储数据，而现在我们用云存储数
  TB 的数据。过去我们通过电话交谈，而现在我们通过`WhatsApp`发送短信、图片并进行视频通话。随着技术的进步，我们产生了海量的数据，这就是所谓的大数据。大数据是一个术语，描述的是从结构化、半结构化到非结构化数据的大规模数据集合。


  结构化数据是组织成格式化存储库（通常是数据库）的数据。它涉及所有可以以行和列的表格形式存储在数据库中的数据。它具有关系键，并且可以轻松映射到预先设计的字段中，例如关系型数据。


  半结构化数据是不存在于关系型数据库中，但具有某些使其更易于分析的属性的信息。通过某些处理，可以将它们存储在关系型数据库中，例如`XML`数据。


  非结构化数据是指未以预定义方式组织或没有预定义数据模型的数据，例如`Word`、`PDF`、文本、媒体日志。


  对于大数据而言，关键在于这些数据并非传统数据库系统所能处理的格式。除此之外，数据量也非常庞大，传统数据库系统同样无法处理。这催生了大数据平台的出现，这些平台为任何类型的数据提供海量存储、强大的处理能力，以及处理几乎无限并发任务或作业以及任何类型数据（结构化、半结构化和非结构化）的能力。然而，大数据环境下存在若干挑战，四大挑战（Big
  4 Cs）描述如下：




  ## 大数据挑战


  大数据需要大量的存储空间，组织必须不断扩展其硬件和软件，以适应数据的增长。随着这些数据集随时间呈指数级增长，处理它们变得极其困难。


  第二个挑战是数据的**高速性**。这意味着新数据的生成速度非常快，组织需要拥有能够实时响应的解决方案。


  第三个挑战是数据的**多样性**。数据以多种不同的格式存在，例如文本、图像、视频和电子表格。将这些数据整合起来，理解其含义并生成报告，是一项需要解决的艰巨任务。


  企业面临大数据的第四个关键挑战是**安全性**。保护海量数据集是大数据平台面临的严峻挑战之一。


  市场上存在许多成熟的解决方案来应对上述挑战，但在将其引入企业之前，需要仔细评估这些方案。


  ## 工业 4.0 与物联网数据


  工业 4.0，也称为第四次工业革命，是我们在过去几年里在物联网背景下经常听到的术语。该术语围绕传统制造业和工业实践中的自动化和人工智能，以及 IT 和 OT 行业正在发生的整体技术创新。第四次工业革命也正扩展到其他更广泛的行业，并通过使机器变得更智能、能力更强大来改变商业格局，而这一切都依赖于这些机器注入的海量数据。随着物联网引领数字化转型，管理数据的复杂性增加了数倍，因为到目前为止我们谈论的还是
  TB（太字节）和 PB（拍字节）级别的数据，而有了物联网，我们将要处理的是 ZB（泽字节）级别的数据。物联网数据的大小对所有“四大 C”特性（可能指容量、速度、多样性和价值等）都产生重大影响，因此需要一种非常优雅的解决方案来处理和管理物联网数据。


  一兆字节（`MB`）等于 1024 千字节。一千兆字节（`GB`）等于 1024 兆字节，一太字节（`TB`）等于 1024 千兆字节，一拍字节等于 1000
  太字节，而 1 泽字节等于 1,000,000 拍字节，以此类推。仅举一例，所有美国学术研究图书馆的总存储量约为 2 拍字节。


  数据管理是一个管理过程，包括获取、验证、存储、保护和处理必要的数据，以确保其用户能够访问数据，并保证数据的可靠性和及时性。


  数据延迟是指数据从一个地方传输到另一个地方所需的时间。


  ## 物联网数据的关键考量


  一方面，许多企业正在推出各种平台、工具和解决方案来实现物联网用例；另一方面，企业却在努力理解来自设备的海量数据，导致他们无法从物联网用例中获取价值。在数据层面，物联网中需要解决的关键点是：理解如何存储如此海量的数据、将这些数据存储在哪里（设备端、智能物联网网关还是物联网云平台）、如何处理数据，以及随后如何以及何时分析这些数据。从概念上看，这似乎相当简单，但事实并非如此，因为需要有非常强大的解决方案来应对每项针对物联网数据的具体挑战，并非所有传统的大数据解决方案都能满足物联网数据的需求。


  图 11-1 描绘了企业需要从数据角度验证的八项关键能力。^(²⁴) 根据具体用例，企业应决定这些能力需要存在于何处，即是在智能物联网网关端还是物联网云平台端，并据此购买相应的产品。


  ![../images/517610_1_En_11_Chapter/517610_1_En_11_Fig1_HTML.jpg](img/517610_1_En_11_Fig1_HTML.jpg)


  **图 11-1** 在决定数据平台时需要验证的八项能力


  ## 调试能力


  在物联网用例中，有大量设备被连接，每个设备都会发送海量数据。物联网实施过程中一项紧迫的挑战就是调试。这意味着，如果整个物联网架构中出现问题（例如物联网用例的性能问题，或设备故障导致无法发送正确数据），则需要有强大的解决方案，可以是在物联网网关层面，也可以是在物联网云平台层面，来帮助调试问题。问题可能出现在设备层、网络层、智能物联网网关层或物联网平台层，而定位问题所在极其困难。企业需要寻找拥有合适解决方案的供应商来解决此问题。


  ## 数据的及时性与准确性


  物联网最重要的方面之一是数据需要及时和准确。这意味着来自不同设备和系统的相关数据需要同时汇集，并实时关联起来，以便理解数据。例如，如果我们从一个与环境相关的传感器读取温度数据，同时某个设备发生故障，那么必须将确切的故障时间与确切的温度数据关联起来，才能从数据中得出有意义的洞察。如果我们无法关联这两个数据点，那么收集这些数据就毫无意义，甚至毫无价值。这意味着来自不同设备的数据必须以最小或零延迟到达，否则这些数据后续就没有价值。除了数据的及时性和准确性之外，企业还需要寻找能够恰好在关键时刻将这两个数据点汇集在一起的解决方案，以确保能够根据从数据中生成的洞察采取行动。


  这引出了企业在选择任何物联网平台或网关之前需要验证的另一个重要解决方案——哪家供应商拥有最佳解决方案，能够精准地汇集实时数据，并在恰当时机从数据中生成洞察，以便及时采取行动。


  ## 数据管理与洞察应在何处进行


  企业在开启物联网之旅时需要关注的第三个领域，是确定复杂的数据管理过程在何处进行。一旦从传感器获取数据，数据就会被摄入智能物联网网关，在某些情况下，还会被发送到物联网云平台，在那里进行数据清洗和转换，然后从数据中生成洞察。这究竟需要在智能物联网网关层面、物联网云平台层面，还是在设备自身进行？这个问题需要根据具体用例来回答，并据此选择适当的解决方案。这样的决策取决于正在开发的用例本身以及所属行业。例如，在智慧农业用例中，如果某株植物没有得到足够的水分，我们可以第二天再去给它浇水。即使稍后采取行动，或者分析出错，也不会产生重大影响——在所有这类情况下，由物联网云平台进行数据管理在经济上仍然是可行的，因为数据延迟不会对该物联网用例产生重大影响。然而，在诸如采矿等行业中，我们需要实际控制从管道中流出的原油，就必须能够在正确的时间将原油分流到正确的单元进行处理，否则企业可能会遭受巨大损失。此外，在自动驾驶汽车用例中，延迟可能导致死亡或事故。对于所有这类时间至关重要的用例，数据管理和洞察必须在物联网网关层面进行，并且要求这些网关必须部署在靠近设备的位置。在某些情况下，数据管理和洞察甚至需要由设备本身来执行。




  ## 数据存储考量（哪些数据需要存储，哪些需要丢弃）


  我们讨论过，物联网用例会产生海量数据。然而，重要的是要明白，并非设备生成的所有数据都对企业有价值，这引出了一些企业需要从数据角度验证的关键点，具体如下：


  - 哪些数据需要存储

  - 哪些数据需要丢弃，何时丢弃

  - 哪些数据需要短期保留

  - 哪些数据需要长期保留


  在企业开始开发物联网用例之前，所有这些都需从数据角度得到解决，否则将导致物联网实施失败。智能物联网网关或物联网云平台的硬件和存储规格，是根据存储需求、数据处理与数据清洗能力需求以及计算与分析能力来确定的。更具体地说，根据短期和长期数据存储需求，企业可以确定其所需的智能物联网网关和物联网云平台。


  ## 存储的快速配置是另一项关键需求


  在过去，当数据从卫星上收集时，我们常常要等待卫星运行到我们国家上空。我们收集数据的时间窗口和带宽都非常有限，在此期间，会尽可能多地收集所需数据，然后释放存储空间以准备下一轮卫星数据收集。然而，当时所需的敏捷性并非达到分钟或微秒级别。如今，物联网用例对敏捷性的要求要高得多。数据在秒级甚至亚秒级传输并需要被收集，在许多用例中，数据仅在那一刻有价值，例如温度数据。因此，企业需要能够在接收到数据后立即进行处理、执行分析并采取行动，然后丢弃数据，释放存储空间以接收下一组数据。这引出了物联网用例在数据方面的一个关键期望，即平台支持快速配置存储的能力。企业需要能够在需要时扩展存储、任务完成后缩减存储的解决方案。


  ## 利用雾计算进行数据管理


  由于物联网生态系统中每个设备都会产生海量数据，单个智能物联网网关将无法处理这样的负载，尤其是在大规模物联网用例中，例如制造业或石油天然气行业。对于所有这些用例，需要从数百万台设备收集数据，并基于数据产生的洞察及时采取行动。需要部署由多个物联网网关构成的集群以实现物联网用例的目标。这就是雾计算发挥作用的地方。雾计算或雾网络，也称为雾化，是一种架构，它利用边缘设备或物联网网关在本地执行大量的计算、存储和通信，并通过互联网骨干网进行路由。


  企业需要寻找能够处理此类复杂架构的数据解决方案，在这种架构中，数据和数据分析需要在多个系统之间进行。


  ## 自动化数据决策


  我们讨论过，企业需要确定哪些数据需要存储、哪些需要丢弃、哪些需要短期保留以及哪些需要长期保留。目前，管理和存储所有这些数据是手动完成的，市场上很少有能够自动执行此任务的解决方案。更准确地说，企业需要寻找能够自动在智能物联网网关或物联网云平台上执行数据存储和删除操作的解决方案。利用人工智能可以完成这项任务，机器可以学习企业过去如何管理数据，并预测未来应如何管理数据。已有公司开始研究此类解决方案，但距离完美的解决方案还很远。


  ## 数据安全与隐私仍是各行各业在物联网领域的重大关切


  从数据角度理解物联网环境下的安全解决方案至关重要。企业需要寻找高效的方案，以对数据加密，使除接收方之外的任何人都无法读取数据。需要有强大的数据保护解决方案，因为大量数据将存储在物联网网关或物联网平台上。企业需要寻找能够解决数据清除问题的方案，并且清除后的数据无法恢复，因为企业数据始终非常敏感。另一个类似的领域是数据隐私。从数据角度出发，企业需要寻找解决方案，确保一个部门用户的数据不被其他用户访问。


  ## （大）数据优先参考模型


  任何组织成功的关键在于，如何在其内部充分利用大数据来制定业务决策。为了做出正确的决策，企业需要在正确的时间将正确且相关的数据送达业务部门。这也是“数据优先”这一术语变得如此突出的原因之一。数据优先策略是我们如何使企业走向数据驱动型组织，让每一个重大业务决策都源于从数据中获得的洞察。为了实现数据优先策略，需要巧妙地管理数据旅程。在物联网领域，数据优先策略是强制性的，因为物联网用例将数据作为成功的主要载体。


  尽管企业理解数据的重要性并已尝试开启数据之旅，但其中许多都遭遇了失败。如果没有完全实现的数据平台和标准架构，组织就不能指望拥有完善的数据规范实践来帮助他们取得成功。图
  11-2 展示了数据优先参考模型的概览，企业可以利用该模型定义一个标准的运营模型，从而帮助他们在物联网用例的数据之旅中取得成功。


  ![../images/517610_1_En_11_Chapter/517610_1_En_11_Fig2_HTML.jpg](img/517610_1_En_11_Fig2_HTML.jpg)


  **图 11-2** 数据优先参考架构


  第一个模块是数据源，来自外部和内部源的数据在此到达企业。在物联网生态系统中，物联网数据将来自设备，其他数据集将来自外部流、数据馈送、大型机系统、数字孪生或简单的
  Excel 文件等源。这些数据有时直接存储在数据湖中，或者经过处理后存储在数据湖中。


  第二个模块是数据存储和数据处理发生的地方。数据在此被获取（数据提取层），然后被清洗和提炼以使其可用。然后，这些数据以适当的格式可供消费。数据管理是一个包括获取、验证、存储和处理数据的过程，以确保数据对其用户的可用性、可靠性和及时性。


  第三个模块是数据治理，它是基于控制数据使用的内部数据标准和策略，管理企业系统中数据的可用性、可用性、完整性和安全性的过程。


  第四个模块称为消费层，数据在此被不同的参与者消费，例如分析平台、报告工具，或者直接由数据科学家或业务用户使用。




  ### 数据源


  数据源简言之就是数据进入企业的地方。它可以是结构化数据，包含模式易于搜索的明确定义的数据类型；也可以是非结构化数据，即“其他所有”，包含通常不易搜索的数据，包括音频、视频和社交媒体帖子等格式；或是半结构化数据。作为物联网生态的一部分，除了常规来源的数据，还有大量由设备发送的机器数据，这些数据被称为**被动数据**、**主动数据**或**动态数据**。


  被动数据由带有传感器的设备发送，这些传感器不会主动通信。它们必须先被激活才能传输数据，并且仅在被请求时才会产生数据。例如，测量地下水饱和度的传感器仅在调用 API
  时才会产生当前数据。在被动数据收集中，由于需要管理传感器，应用程序必须承担相应的逻辑。这类传感器通常是低功耗的，并且位于偏远地区。


  主动数据（也称为流式数据）意味着传感器持续传输数据，例如来自联网汽车或温度传感器的数据。与被动数据不同，这些传感器会按预定义的时间间隔持续发送数据。对于所有此类设备，物联网网关必须能够近乎实时地接收数据，应用程序则需要具备复杂的物联网数据通信能力。数据不能丢失，必须及时从流中正确解析，并以正确的格式存储和处理，以便根据生成的洞察采取行动。


  动态数据是最复杂的数据，由与物联网应用程序动态通信（双向）的设备（传感器）发送，例如智能恒温器。这类设备与物联网应用程序进行“对话”。这使得其具备一系列功能，包括能够更改生成的数据、更改数据格式、更改频率，甚至处理安全问题，并提供自动化的软件更新以动态处理问题。


  如今为物联网用例制造的大多数新型物联网设备都是为了处理动态数据而设计的。


  在企业的物联网实施中，我们当前所有的物联网用例都可能会处理所有三种类型的物联网数据——被动数据、主动数据和动态数据。


  数据管理模块是数据从数据源到达企业的位置。制定数据策略的首要步骤之一，是评估企业在数据源中拥有什么，以及物联网网关是否具备从所有类型的设备及其他来源中检索三种类型数据（即主动数据、被动数据和动态数据）的能力。


  ### 数据存储层


  数据存储层是从不同来源和设备收集数据后，企业数据存放的位置。它从各种数据源接收数据，并以最适合组织需求的特定方式进行存储。根据用例，在某些情况下，来自来源的数据会直接存储在存储中（称为**原始数据**），而在其他情况下，数据会经过转换后再存储到数据存储中（称为**黄金数据**）。


  如图 11-1 所示，数据存储层位于参考模型的底部。这些技术用于存储来自传统来源（如在线事务处理 (OLTP) 数据库）和海量原始数据，以及来自结构较弱的来源（如日志文件、传感器、网络分析、文档和媒体档案）的数据。


  越来越多的存储发生在云端或虚拟化的本地资源上。企业正从传统存储转向商品化硬件，最近又转向亚马逊 (Amazon) 等公司提供的托管服务，例如 Amazon S3。


  随着公司生成和存储的数据量开始激增，复杂而易于访问的系统和工具正在被开发出来。


  ### 数据提取层与数据处理层


  数据提取是将由组织外部来源创建的相关数据导入进来的过程。物联网数据，尤其是来自物联网设备的流式数据，无法通过传统的数据提取方案处理。企业需要寻找能够有效提取主动、被动和动态物联网数据的解决方案。例如，微软
  Azure 的 Stream Analytics 可以执行物联网数据的提取。


  数据处理是为企业使用而清理和精炼数据的过程。对于任何类型的数据，当它进入一个组织时（在大多数情况下，存在多个数据源），它很可能是不干净的，或者其格式无法被组织内外的用户直接报告或分析。因此，首先需要进行数据处理，这通常包括数据清洗、标准化、转换和聚合。Apache
  Spark、PostgreSQL 和 Amazon Redshift 是能够执行此任务的工具的好例子。


  ### 数据消费层


  该层消费数据处理层提供的输出。企业可以使用众多高级工具之一来运行查询，以回答业务提出的问题，对数据进行切片和切块，构建仪表板，并创建可视化图表。在某些情况下，该层的数据由组织内的用户以及组织外部的实体（如客户、供应商、合作伙伴和提供商）直接消费。


  在物联网用例中，基于数据消费层生成的洞察采取行动。例如，如果某台特定机器的温度超出一定范围，消费层内的工具会实时检测到此类事件，并向物联网设备发送命令以关闭机器。


  物联网用例需要先在每个设备级别执行基于时间的分析，然后聚合成总体数字，以提供设备集群整体状态的视图。这是一个跨设备资产进行汇总的复杂案例。例如，在某些情况下，一个单一的温度数据就可能触发一个动作；而在某些用例中，一段时间内的平均温度对于执行一项任务则变得至关重要。市场上有多种分析工具，例如
  AWS IoT Analytics 和 AWS IoT SiteWise，它们可以基于物联网数据执行特定操作。




  ### 数据治理


  数据治理是基于内部数据标准及控制数据使用的策略，对企业系统中数据的可用性、可用性、完整性和安全性进行管理的过程。有效的数据治理能确保数据一致、可信且不被滥用。随着组织面临新的数据隐私法规，并越来越依赖数据分析来优化运营和驱动业务决策，数据治理变得日益关键。


  数据管理是数据管理与治理中的一个职能角色，负责确保企业内数据策略和标准得到执行与遵守。


  数据完整性是指在整个数据生命周期中维护并确保数据的准确性和一致性，这是任何存储、处理或检索数据的系统在设计、实施和使用过程中的关键方面。


  一个设计良好的数据治理项目通常包括一个治理团队、一个作为治理机构的指导委员会，以及一组数据管理员。他们共同制定数据治理的标准和策略，以及主要由数据管理员执行和落实的流程。大数据环境的搭建与治理应在企业层面而非业务部门孤岛中进行——这是企业成功的必要条件。


  虽然数据治理是整体数据管理战略的核心组成部分，但组织应关注治理项目期望达成的业务成果，而非数据本身。没有有效的数据治理，组织内不同系统中的数据不一致问题将无法解决。例如，客户名称在销售、物流和客户服务系统中可能以不同方式列出。这会增加数据集成的复杂性，并产生数据完整性问题，影响企业报告和分析应用的准确性。此外，数据错误可能无法被识别和修复，进一步影响分析精度。


  不良的数据治理还会阻碍合规举措，这可能给需要遵守新数据隐私和保护法律（如欧盟《通用数据保护条例》及美国《加州消费者隐私法案》）的公司带来问题。企业数据治理项目通常会形成适用于所有业务系统的通用数据定义和标准数据格式，从而提升业务和合规两方面数据的一致性。


  数据治理的一个关键目标是打破组织中的数据孤岛。当各个业务部门在没有集中协调或企业数据架构的情况下部署独立系统时，此类孤岛通常就会出现。数据治理旨在通过一个协作流程——有来自各业务部门的利益相关者参与——来协调这些系统中的数据。


  数据治理的另一个目标是确保数据得到合理使用，既要避免将数据错误引入系统，又要防止客户个人数据及其他敏感信息被滥用。这可以通过制定统一的数据使用策略，并辅以持续监控使用情况、执行策略的流程来实现。此外，数据治理有助于在数据收集实践与隐私要求之间取得平衡。


  除了更精准的分析和更强的法规遵从性，数据治理提供的好处还包括提升[数据质量](https://searchdatamanagement.techtarget.com/definition/data-quality)、降低数据管理成本，以及让数据科学家、分析师和业务用户更便捷地获取所需数据。


  最终，数据治理能通过为管理层提供更优质的信息来帮助改善业务决策。


  ## 总结


  在本章中，我们讨论了“数据优先”思维模式，这是企业成功运用物联网的关键要素之一。企业需要建立相应的流程和能力，以便能够收集数据，并以最及时、最高效的方式让物联网用例能够使用这些数据。数据还需要以足够的速度可用，使企业能够做出正确的决策，并从数据生成的洞察中获益。


  我们还讨论了在物联网的数据语境中需要解决的关键领域，即围绕如何存储大数据集、数据应存储在哪里（设备、智能物联网网关或物联网云平台）、如何处理数据，以及如何以及何时分析数据来定义解决方案。


  我们讨论了企业需要从数据角度验证的八项关键能力，如下所列。根据具体用例，企业应决定这些能力需要在哪些层面存在（即智能物联网网关还是物联网云平台），并据此采购相应的产品。


  1.  平台的调试能力

  2.  来自设备数据的时效性和准确性

  3.  决定数据管理和分析应在何处进行

  4.  数据存储考量

  5.  数据的快速供应

  6.  雾计算能力

  7.  自动化数据决策能力（哪些数据需要在短期和长期内存储或丢弃）

  8.  数据安全解决方案


  最后，在最后一节中，我们讨论了数据优先参考模型，该模型由四个模块构成。第一个模块是数据源，来自外部和内部的数据进入企业。第二个模块是数据存储和数据处理发生的地方。在此处，数据被获取（数据提取层），然后被清洗和精炼以使其可用。第三个模块是数据治理，即管理企业系统中数据的可用性、可用性、完整性和安全性的过程；第四个模块称为消费层，数据在此被不同方消费，例如分析平台、报告工具，或直接由数据科学家或业务用户使用。


  从基于项目的组织转变为基于产品的组织，对于企业成功实施物联网至关重要，我们将在下一章讨论这一点。我们将讨论为实现物联网用例而转型为产品化组织及其相关益处。


