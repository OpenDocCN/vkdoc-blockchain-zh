  trans: '

    ### 全栈物联网平台


    全栈物联网平台旨在通过强大的数据分析引擎和机器学习机制，存储、处理和分析海量数据，以获得更深入的洞察。它是一个用于创建和管理应用程序、运行分析、以及存储和保护企业物联网数据的平台。一些企业选择在物联网平台层面执行设备管理，这取决于所考虑的用例，而在所有此类情况下，都需要选择能够支持此功能的正确物联网平台。


    目前市场上存在多种物联网平台，并且大多数平台都支持设备管理。有针对特定行业的平台，例如商业地产和家庭健康。有些平台专注于单一类型的设备：例如，至少有几个平台专注于增强现实头戴设备。还有一些平台专注于特定功能，如制造业，以及某些专注于医疗保健领域。


    不存在一种放之四海而皆准的全栈物联网平台，可以跨任何行业使用或解决任何业务问题；因此，要选择正确的物联网平台，需要从充分理解企业物联网战略、企业试图通过物联网解决的问题和机遇（以及相应的用例）、以及企业的主要行业（如制造业、零售业或医疗保健）开始。基于此，需要选择一个物联网平台。


    任何物联网平台都应能够跟踪数据从设备收集（使用智能物联网网关）到从数据中生成洞察的整个过程。将设备数据转换为物联网平台数据的关键，始于来自特定机器工业协议或医疗设备的高度特定数据，当数据被摄入平台后，会经过处理、规范化和标准化，形成非常适合分析平台生成洞察的结构。这也是需要选择一个具有强大数据和分析能力的物联网平台的原因之一，该平台能够支持从设备涌入的海量数据中生成正确的洞察。


    ### 人工智能是物联网平台执行的一项重要功能，在某些情况下也在物联网网关层面（称为边缘 IT）执行


    人工智能构成了物联网标准参考模型中最重要的特性之一。


    人工智能是指机器对人类智能的模拟，这些机器被编程为像人类一样思考并模仿其行为。该术语也可应用于任何表现出与人类思维相关的特质（如学习和解决问题）的机器。


    机器学习是人工智能的一个子集，它利用数据并运用统计技术来帮助其“学习”如何逐渐更好地完成一项任务，而无需专门针对该任务进行编程。随着大数据成为物联网架构的一部分，人工智能在物联网背景下已变得相当强大。


    作为物联网生态系统一部分的设备会产生海量数据。借助大数据，我们拥有了存储 PB 级数据的数据湖。关键点在于理解如何利用这些数据并使其价值最大化。这就是人工智能发挥作用的地方，它可以执行诸如异常检测、根本原因分析等多种功能。


    人工智能非常适合工业自动化和预测性维护的场景。在传统老旧的物联网实现中，架构中有一个执行重复性任务的规则引擎，例如，如果传感器数据达到某个设定阈值，它就会执行一个特定的预设任务。例如，如果熔炉温度超过
    70 摄氏度，它就会关闭熔炉。然而，所有这些规则和数值都是硬编码的。随着人工智能引入物联网架构，企业不再需要硬编码这些规则，而是可以部署一个模型，让系统在一段时间内进行训练，从而无需硬编码业务逻辑或规则。借助人工智能，我们让机器从一段时间内的模式中学习，以便能够基于这些学习成果执行操作。这有助于多种用例，例如预测性维护。例如，我们为一家大型汽车制造商部署了基于物联网的预测性维护解决方案，该方案能够预测主轴损坏，以及识别旋转设备的开裂和剥落、齿轮和电机缺陷。结果，他们将诊断时间缩短了高达
    70%，维修时间缩短了超过 20%，从而提高了整体设备效率(OEE)。这为企业增加了巨大价值。


    我在物联网人工智能方面遇到的一个挑战是，有大量数据需要发送到云端，而在许多行业中，基于人工智能算法执行命令所需时间太长，因为数据需要在云端来回传输以供机器学习。我遇到的另一个挑战是，一些受监管行业的企业认为数据敏感，不宜发送到云端。为了克服这个挑战，企业需要让人工智能算法在靠近数据生成的设备附近执行。这意味着此类任务需要由智能物联网网关执行，这也被称为边缘人工智能。但并非所有智能网关都具备在边缘运行人工智能算法的计算能力。已经有一些企业推出了能够在设备附近运行人工智能算法的智能物联网网关。


    企业在物联网架构中启用人工智能会采用不同的模式。在某些情况下，人工智能直接由智能物联网网关使用来自设备的数据执行，这称为边缘人工智能。在某些情况下，当设备产生海量数据时，部分人工智能在智能物联网网关层面执行，其余部分在全栈物联网平台层面执行。而在另一些情况下，企业选择在全栈物联网平台层面执行人工智能。企业需要根据数据和正在实施的用例来选择执行人工智能的最佳位置。对于一家制造公司，我们使用了亚马逊
    AWS Snowball Edge 在靠近物联网设备（即智能物联网网关）的位置执行重型计算操作。Snowball Edge 能够在物联网网关上运行完整的机器学习模型。其工作方式是，你在公有云中训练模型，然后将模型带至物联网网关并运行它。当它检测到预测不够准确时，它会返回到托管在全栈物联网平台层面的数据湖进行进一步训练，然后再次部署到物联网网关，这个循环会持续进行，直到算法能够以
    100%的准确率执行操作。


    借助物联网中的人工智能和机器学习，静态规则引擎被动态的机器学习规则所取代，这意味着被动维护被预测性维护所取代。


    物联网与人工智能的整体融合为物联网实现卓越性能开辟了许多途径。例如，当我们谈论车联网时，联网汽车实际上就是一个带轮子的边缘计算设备。它拥有强大的计算能力，能够实时处理传入的数据。这就是带轮子的边缘计算的一个经典例子，同样地，飞机也在运行边缘计算，未来，许多车辆和工业设备都将运行边缘计算。

    '
- fmt: '# Typical Activities Performed by the Smart IoT Gateway and Full Stack IoT
    Platform


    We discussed about the importance of Smart IoT Gateways and the Full Stack IoT
    Platform. Vendors have developed products in these two areas with several similarities
    in functionality, and many times these products perform the same activities as
    the other. Therefore, it becomes very confusing for enterprises to decide which
    process needs to be performed at which layer. The following is a typical guide
    that splits the responsibilities between the Smart IoT Gateway and the Full Stack
    IoT Platform.


    | Smart IoT Gateway | Full Stack IoT Platform |

    | --- | --- |

    | Basic data visualization | Complex analytics |

    | Basic data analytics and short-term data historian features | Big data mining
    |

    | Data caching, buffering, and streaming | Sources of business logic |

    | Data preprocessing, cleansing, filtering, and optimization | Machine learning
    rules |

    | Some data aggregation | Advanced visualizations |

    | Device-to-device communications/M2M | Long-term data storage/warehousing |

    | Artificial Intelligence (Edge AI) | Artificial Intelligence |


    # Security


    Security in an IoT environment needs to be looked at across all the three layers
    within the IoT Standards Reference Model – the first is security at the device
    level, second is security at the Smart Gateway level, and third at the IoT Platform
    level. Apart from security at the hardware and software level within these three
    layers, security at the network level becomes of the utmost importance and needs
    to be foolproof since communications between the three layers in an IoT Standards
    Reference Model happen over the Internet.


    IoT security has become the subject of scrutiny after a number of high-profile
    incidents where a common IoT device was used to infiltrate and attack the larger
    network. Implementing security measures is critical to ensuring the safety of
    networks and IoT devices connected to them.


    We are going to discuss the role of a security advisor in Chapter [13](#517610_1_En_13_Chapter.xhtml),
    as part of the IoT core team. This role needs to ensure that the right devices,
    platforms, Gateways, and networks are chosen that satisfy the security postures
    of an enterprise. In an IoT environment, device, Gateway, and platform security
    is the most important aspect to consider apart from application security.


    ## Device Security


    On the device side of security in an IoT ecosystem, enterprises need to ensure
    that they deploy devices in their OT estate which have security built into the
    device, and this is a must. Not only security needs to be built into the device
    but there should be a way to fix any security issues as they come up via software
    updates or upgrades.


    One issue related to traditional IoT devices is that they are often resource constrained
    and do not contain the compute resources necessary to implement strong security.
    As such, many devices do not offer advanced security features. For example, most
    sensors that monitor humidity or temperature cannot handle advanced encryption
    or other security measures. Traditionally, numerous IoT devices are built to be
    placed in the field or on a machine and left until end of life, and they hardly
    ever receive security updates or patches. Therefore, from some enterprise’s viewpoint,
    building security from the start can be costly and would slow down development.
    However, for enterprises aspiring to adopt IoT for their business, building security
    in the devices is a must. However, the level of security required in devices also
    depends on the use cases and industry. As an example, a hacker will be less interested
    to break into an agriculture IoT device and more keen to break into a manufacturing
    plant.


    Enterprises also need to make sure that access to the devices and all the data
    that is produced through these devices is controlled by the authorized users or
    systems. And any data that are stored on the devices or transmitted across the
    communication pathways are all encrypted and secure.


    ## Smart IoT Gateway Security


    Gateways are an important part of an IoT ecosystem but are a vulnerable, single
    point of hackability. IoT Gateways are often the first ones to be attacked because
    they have higher processing power for running more intensive applications. More
    power means better software, and better software means more vulnerabilities for
    a hacker to exploit. Another key reason why IoT Gateways become a hotspot for
    many hackers is because of its location as an edge device between the Internet
    and the intranet. The Gateway is typically the first point of entry for any security
    threat (as well as a system’s first line of defense).


    There are many matured IoT Gateways that are existing in the market, and a careful
    selection needs to be made, keeping security in mind. Some factors to be considered
    while making an IoT Gateway selection are listed in the following.


    **Message security**: An IoT Gateway needs to have strong end-to-end encryption
    methodologies. Messages should be encrypted and can only be decrypted by the recipient
    using cryptographic keys. This allows a Gateway device to still accept and pass
    on data, but it will not be able to read the data. Thus, in the case of a security
    compromise, the hacker will not be able to parse and read the data from the Gateway
    device.


    **Device onboarding security**: Device onboarding occurs when a new device is
    added within the IoT ecosystem. Key management practices, and how keys are exchanged
    when new devices are accepted, are a large security vulnerability. Physical tampering
    can also lead to private keys being extracted. It is important to understand how
    the Gateway manufacturer handles security at the device onboarding level.


    **Integration security**: IoT API security is an important consideration. IoT
    systems transmit and receive large volumes of data and information, and it is
    important to be able to have secure data movement between devices, Gateways, and
    back-end databases. Because integrations are vulnerable, one must continuously
    scan and test to ensure integrity of data within the system.


    **Over-the-air security updates**: Firmware updates need to happen within an IoT
    ecosystem, and it is necessary to understand how these updates are taking place
    and how an IoT Gateway is handling them securely.


    ## IoT Platform Security


    An IoT platform is the hub where all the IoT data resides and, in many cases,
    Device Management is performed, which is an important part of an IoT ecosystem.
    Security at an IoT Platform level is extremely important; however, the good news
    is that a lot has been done by different product vendors in this space on security.
    Almost all large platform vendors, such as Amazon, Microsoft, and Google, offer
    services for all layers of security including preventive security mechanisms like
    encryption and access control to device data along with services to continuously
    monitor and audit configurations.'
