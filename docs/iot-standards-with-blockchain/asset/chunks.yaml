  trans: '

    # 利用区块链保障物联网安全


    区块链是一种分布式账本，类似于数据库，但其并非由中心化权威机构（例如谷歌这样的公司、小型企业或个人）控制，而是分散在多台计算机上，这些计算机可以遍布全球，任何有网络连接的人都可以运行。


    我们将在第 9 章中探讨如何从创造商业影响力的角度（而非网络安全角度）运用区块链。然而，区块链也为物联网安全提供了一种引人入胜的解决方案。区块链具备强大的数据篡改防护能力，能锁定对物联网设备的访问权限，并允许关闭物联网网络中受损的设备。不过，物联网-区块链技术目前仍处于初级阶段，少数几家大型科技公司已开始在这一领域寻求机遇。例如，IBM
    区块链平台允许企业将区块链扩展到认知物联网——这是一套融合了物联网与认知计算的技术。


    由于技术问题和运营挑战，物联网-区块链技术的采用尚未普及。在维护大型中心化账本的区块链系统中，可扩展性和存储是主要问题。将账本存储在边缘节点上被认为是低效的，因为设备目前尚无法存储大量数据或处理相对较高的计算需求。这些因素是将物联网网络迁移到区块链平台所面临的部分挑战。


    尽管该概念仍处于萌芽阶段，但在未来几年可能会产生巨大影响。标准安全规则和法规的实施将推动物联网-区块链技术的采用。通过引入数据隐私和对等通信的新标准，区块链可以为联网设备增加新的安全层级。对等通信指的是两个对等设备或系统之间通过网络进行的传输。


    基于这些原因，已开启物联网之旅的企业应采用内置安全设计原则来保护其物联网生态系统，而非使用区块链。


    ## 总结


    本章内容围绕安全展开。我们讨论了传统运营技术系统在设计和实施其系统时，通常未考虑网络安全。然而，随着物联网的出现，信息技术和运营技术系统正在融合，因此，同时保障信息技术和运营技术的网络安全变得极为重要。


    我们谈到了物联网中安全设计（即安全设计原则、技术和治理贯穿物联网之旅的每个阶段以及物联网标准参考模型的所有层级）的重要性。


    安全设计的首要方面是采购具备安全功能的设备，例如多因素认证或生物识别技术。第二个要素是保护应用程序编程接口——对于企业而言，保护从物联网设备发送到智能物联网网关、物联网云平台或后端系统的数据完整性至关重要，并要确保只有经授权的设备和应用程序才能与
    API 通信。使用标准的安全 API 网关是保护 API 的最佳方式之一。我们讨论的最后一个方面是，企业应部署具有万无一失安全控制的智能物联网网关，并且网关至少应具备端点安全控制功能，例如身份与访问控制、空中升级以及威胁检测特性。同样地，企业需要部署内置安全功能的物联网云平台。


    在下一章中，我们将详细了解区块链，以及它如何为物联网应用场景带来益处。我们还将讨论企业可用于其物联网应用场景实施的不同区块链模式。


    # 第三部分：人工智能与区块链：物联网的赋能者


    人工智能与区块链：物联网的赋能者


    本书的这一部分讨论了人工智能和区块链对于物联网应用场景的重要性。


    我们将探讨在物联网应用场景中使用私有区块链的重要性，以及五种物联网-区块链实施模式，企业可利用这些模式实现物联网设备、智能物联网网关和物联网平台与区块链之间的无缝通信。


    人工智能是物联网标准参考模型中非常重要的特性之一。该参考模型建议应用人工智能模式，从数据中生成洞察，并自动采取相应行动。本章还将就如何在物联网环境中应用人工智能以及何时应用提供一些观点。'
- fmt: '# 9. Blockchain with IoT


    `Blockchain` is one of the interesting topics in the technology circles which
    is currently revolutionizing the way enterprises will do business in the future.
    Though the technology is still in the experimental stage, there are a lot of benefits
    which many enterprises are already achieving in part from the technology. Discussing
    the basics, `Blockchain` was developed as a technology to exchange money by some
    young mathematicians, and now this has come to the center stage where almost every
    business transaction can be executed securely and cost-effectively. Blockchains
    promise to bring collaboration between companies, enabling the sharing of both
    factual data and business logic across an ecosystem in a standardized, structured,
    and secure manner.


    `Blockchain` is a shared cryptographically unalterable ledger for recording the
    history of transactions. `Cryptography` is associated with the process of converting
    ordinary plain text into unintelligible text and vice versa. It is a method of
    storing and transmitting data in a particular form so that only those for whom
    it is intended can read and process it.


    `Blockchain` is not centralized, which is the most interesting part – what this
    means is that it is not owned by one party or person. It is democratized, which
    is the important thing, and because of this it increases trust between parties
    because no single entity owns the blockchain. It increases accountability (since
    every authorized party is part of the decision-making process) and above all transparency
    (since every authorized party can see each and every transaction). With such transparency
    and accountability, the technology enables a much lower friction.


    Let me explain about blockchain in a simple language.


    You can consider blockchain as a book. A book has many pages, and all pages are
    glued with a binder. The book is owned by one person or in some cases owned by
    multiple people. Each page has multiple entries or transactions – such as person
    A holds X value, person B has Y value – and each of these transactions is used
    to compute a unique value, which is called a unique identifier, for the page.
    So this means that if any value in the page changes, the unique identifier will
    also change.


    In blockchain language, a book is called a ledger, pages are called the blocks,
    and the binder is the chain of a blockchain. If the book is owned and managed
    by one person, it is called a centralized ledger management, and if the book is
    owned and managed by multiple people, it is called a distributed ledger management.
    The unique identifier is called the hash. If anything in the block changes, the
    hash value changes since the hash is generated using each entry in the block.
    One of the important features of a blockchain is immutability, which means that
    any transaction once recorded cannot be altered. If someone tries to tamper or
    change the content of an existing block, the changes will reflect only in their
    copy, and the rest will still continue to see the untampered version of the block,
    which means the blockchain is immutable. This makes a blockchain tamper-proof
    and highly secure. Now adding a new block to a blockchain is similar to adding
    a new page to the book. This is what blockchain is all about.


    There are two variants of blockchain. One is called the Public Blockchain, and
    another is called the Private Blockchain.


    ## Public Blockchain


    A public blockchain is a blockchain network where anyone can join whenever they
    want. Basically, there are no restrictions when it comes to participation. More
    so, anyone can see the ledger and take part in the process. For example, `Ethereum`
    is one of the public blockchain platforms.


    If enterprises are looking for a fully decentralized network system, then public
    blockchain is the way to go. However, a public blockchain can become very problematic
    when enterprises try to incorporate a public blockchain network with the enterprise
    internal blockchain process.


    The best part about public blockchains is the concept which says that all the
    participants have equal rights. Everyone can see the ledger as well, thus maintaining
    transparency at all times. However, public blockchains do come with their fair
    share of flaws as well. In reality, these platforms are slower than usual; they
    are less secure and many times violate data privacy laws. Furthermore, it can
    attract malicious people using the platform for illegal activities because of
    the anonymous nature.


    Though public blockchains have their own share of benefits, enterprises typically
    tend to adopt private blockchains to run their businesses. More importantly in
    an IoT and AI context, private blockchains are the most popular and recommended
    model.


    So in simple terms, a public blockchain follows a distributed ledger management
    instead of a centralized ledger. In a centralized ledger, one person or entity
    is in charge of the blockchain, and in a distributed ledger, all individuals or
    entities who participate in the blockchain get a copy of the complete ledger and
    are responsible for the ledger.


    In a public blockchain environment, anyone can add a new block to a blockchain,
    but they have to solve a very complex puzzle. The issue with this approach is
    that solving a puzzle consumes a lot of compute power.


    ## Private Blockchain


    A private blockchain is a special type of blockchain technology where only a single
    organization or a consortium of organizations has authority over the network.
    The network is not open for the public people to join in. All the private blockchain
    solutions will have some form of authorization scheme to identity which entity
    is entering the platform.


    A private blockchain network requires an invitation and must be validated by either
    the network starter or by a set of rules put in place by the network starter.
    Businesses that set up a private blockchain will generally set up a permissioned
    network. This places restrictions on who is allowed to participate in the network
    and who can perform which transaction. Participants need to obtain an invitation
    or permission to join. The access control mechanism could vary – existing participants
    could decide future entrants, or a regulatory authority could issue licenses for
    participation, or a consortium could make the decisions instead. Once an entity
    has joined the network, it will play a role in maintaining the blockchain in a
    decentralized manner.


    In a private blockchain environment, enterprises do not need to spend compute
    power to add a new block to the blockchain since the network starter or business
    owner can add a block to the blockchain.


    In a typical scenario, if we look at any enterprise business end to end, it is
    an amalgamation of multiple parties communicating with each other to complete
    a business transaction or a business process as depicted in Figure 9-1.


    ![../images/517610_1_En_9_Chapter/517610_1_En_9_Fig1_HTML.jpg](images/517610_1_En_9_Chapter/517610_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Example of a typical business transaction


    There are producers, the finance, regulators, transport agencies, and retailers,
    and each of these parties uses their own systems to maintain their records and
    communicates with others based on these records. As this communication and recording
    process becomes complex, there can be several disagreements, and to prove correctness
    of their own data and records, enterprises spend millions of dollars on intermediaries,
    audits and compliance, and so on. This is the reality of today, which means an
    inefficient system, and the main reason for this inefficiency is because each
    entity within our economy maintains their own records, and in many cases these
    records are not shared or are made transparent with other entities. Private Blockchain
    is a solution to address this inefficiency in the current economy for businesses
    to transact and communicate with each other.'
  raw: '# 9. Blockchain with IoT


    Blockchain is one of the interesting topics in the technology circles which is
    currently revolutionizing the way enterprises will do business in the future.
    Though the technology is still in the experimental stage, there are a lot of benefits
    which many enterprises are already achieving in part from the technology. Discussing
    the basics, Blockchain was developed as a technology to exchange money by some
    young mathematicians, and now this has come to the center stage where almost every
    business transaction can be executed securely and cost-effectively. Blockchains
    promise to bring collaboration between companies, enabling the sharing of both
    factual data and business logic across an ecosystem in a standardized, structured,
    and secure manner.


    Blockchain is a shared cryptographically unalterable ledger for recording the
    history of transactions. Cryptography is associated with the process of converting
    ordinary plain text into unintelligible text and vice versa. It is a method of
    storing and transmitting data in a particular form so that only those for whom
    it is intended can read and process it.


    Blockchain is not centralized, which is the most interesting part – what this
    means is that it is not owned by one party or person. It is democratized, which
    is the important thing, and because of this it increases trust between parties
    because no single entity owns the blockchain. It increases accountability (since
    every authorized party is part of the decision-making process) and above all transparency
    (since every authorized party can see each and every transaction). With such transparency
    and accountability, the technology enables a much lower friction.


    Let me explain about blockchain in a simple language.


    You can consider blockchain as a book. A book has many pages, and all pages are
    glued with a binder. The book is owned by one person or in some cases owned by
    multiple people. Each page has multiple entries or transactions – such as person
    A holds X value, person B has Y value – and each of these transactions is used
    to compute a unique value, which is called a unique identifier, for the page.
    So this means that if any value in the page changes, the unique identifier will
    also change.


    In blockchain language, a book is called a ledger, pages are called the blocks,
    and the binder is the chain of a blockchain. If the book is owned and managed
    by one person, it is called a centralized ledger management, and if the book is
    owned and managed by multiple people, it is called a distributed ledger management.
    The unique identifier is called the hash. If anything in the block changes, the
    hash value changes since the hash is generated using each entry in the block.
    One of the important features of a blockchain is immutability, which means that
    any transaction once recorded cannot be altered. If someone tries to tamper or
    change the content of an existing block, the changes will reflect only in their
    copy, and the rest will still continue to see the untampered version of the block,
    which means the blockchain is immutable. This makes a blockchain tamper-proof
    and highly secure. Now adding a new block to a blockchain is similar to adding
    a new page to the book. This is what blockchain is all about.


    There are two variants of blockchain. One is called the Public Blockchain, and
    another is called the Private Blockchain.


    ## Public Blockchain


    A public blockchain is a blockchain network where anyone can join whenever they
    want. Basically, there are no restrictions when it comes to participation. More
    so, anyone can see the ledger and take part in the process. For example, Ethereum
    is one of the public blockchain platforms.


    If enterprises are looking for a fully decentralized network system, then public
    blockchain is the way to go. However, a public blockchain can become very problematic
    when enterprises try to incorporate a public blockchain network with the enterprise
    internal blockchain process.


    The best part about public blockchains is the concept which says that all the
    participants have equal rights. Everyone can see the ledger as well, thus maintaining
    transparency at all times. However, public blockchains do come with their fair
    share of flaws as well. In reality, these platforms are slower than usual; they
    are less secure and many times violate data privacy laws. Furthermore, it can
    attract malicious people using the platform for illegal activities because of
    the anonymous nature.


    Though public blockchains have their own share of benefits, enterprises typically
    tend to adopt private blockchains to run their businesses. More importantly in
    an IoT and AI context, private blockchains are the most popular and recommended
    model.


    So in simple terms, a public blockchain follows a distributed ledger management
    instead of a centralized ledger. In a centralized ledger, one person or entity
    is in charge of the blockchain, and in a distributed ledger, all individuals or
    entities who participate in the blockchain get a copy of the complete ledger and
    are responsible for the ledger.


    In a public blockchain environment, anyone can add a new block to a blockchain,
    but they have to solve a very complex puzzle. The issue with this approach is
    that solving a puzzle consumes a lot of compute power.


    ## Private Blockchain


    A private blockchain is a special type of blockchain technology where only a single
    organization or a consortium of organizations has authority over the network.
    The network is not open for the public people to join in. All the private blockchain
    solutions will have some form of authorization scheme to identity which entity
    is entering the platform.


    A private blockchain network requires an invitation and must be validated by either
    the network starter or by a set of rules put in place by the network starter.
    Businesses that set up a private blockchain will generally set up a permissioned
    network. This places restrictions on who is allowed to participate in the network
    and who can perform which transaction. Participants need to obtain an invitation
    or permission to join. The access control mechanism could vary – existing participants
    could decide future entrants, or a regulatory authority could issue licenses for
    participation, or a consortium could make the decisions instead. Once an entity
    has joined the network, it will play a role in maintaining the blockchain in a
    decentralized manner.


    In a private blockchain environment, enterprises do not need to spend compute
    power to add a new block to the blockchain since the network starter or business
    owner can add a block to the blockchain.


    In a typical scenario, if we look at any enterprise business end to end, it is
    an amalgamation of multiple parties communicating with each other to complete
    a business transaction or a business process as depicted in Figure [9-1](#517610_1_En_9_Chapter.xhtml#Fig1).


    ![../images/517610_1_En_9_Chapter/517610_1_En_9_Fig1_HTML.jpg](images/517610_1_En_9_Chapter/517610_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Example of a typical business transaction


    There are producers, the finance, regulators, transport agencies, and retailers,
    and each of these parties uses their own systems to maintain their records and
    communicates with others based on these records. As this communication and recording
    process becomes complex, there can be several disagreements, and to prove correctness
    of their own data and records, enterprises spend millions of dollars on intermediaries,
    audits and compliance, and so on. This is the reality of today, which means an
    inefficient system, and the main reason for this inefficiency is because each
    entity within our economy maintains their own records, and in many cases these
    records are not shared or are made transparent with other entities. Private Blockchain
    is a solution to address this inefficiency in the current economy for businesses
    to transact and communicate with each other.'
  trans: '

    # 9. 区块链与物联网


    `Blockchain` 是科技界最热门的话题之一，它正在彻底改变未来企业的商业模式。尽管该技术仍处于实验阶段，但许多企业已经从中获得了诸多益处。从基础讲起，`Blockchain`
    最初是由一些年轻数学家开发的一种用于交换货币的技术，如今它已走到舞台中央，几乎所有商业交易都可以安全、经济地执行。区块链有望促成企业间的协作，能够以标准化、结构化和安全的方式，在整个生态系统中共享事实数据和业务逻辑。


    `Blockchain` 是一个共享的、经加密且不可篡改的账本，用于记录交易历史。`Cryptography`（密码学）与将普通明文转换为无法理解的文本（以及反向过程）相关联。它是一种以特定形式存储和传输数据的方法，只有预期对象才能读取和处理这些数据。


    `Blockchain` 并非中心化的，这是最有趣的部分——这意味着它不归某一方或个人所有。它是民主化的，这一点很重要，正因如此，它增加了各方的信任，因为没有单一实体拥有该区块链。它提高了问责性（因为每个授权方都参与决策过程），最重要的是提高了透明度（因为每个授权方都能看到每一笔交易）。有了这种透明度和问责性，该技术得以大幅减少摩擦。


    让我用简单的语言解释一下区块链。


    你可以把区块链看作一本书。一本书有很多页，所有页面都用装订线粘合在一起。这本书归一人所有，或在某些情况下归多人共有。每一页都有多个条目或交易——例如，A 持有
    X 值，B 持有 Y 值——并且每个交易都用于计算该页的一个唯一值，这个值被称为唯一标识符。这意味着，如果页面中的任何值发生改变，唯一标识符也会随之改变。


    用区块链的语言来说，一本书被称为账本，页面被称为区块，装订线就是区块链的链。如果这本书由一人拥有和管理，则称为中心化账本管理；如果由多人拥有和管理，则称为分布式账本管理。唯一标识符被称为哈希。如果区块中的任何内容发生变化，哈希值就会改变，因为哈希是通过使用区块中的每个条目生成的。区块链的一个重要特性是不可变性，这意味着任何交易一旦记录便无法更改。如果有人试图篡改或更改现有区块的内容，这些更改只会反映在他们自己的副本中，而其他人看到的仍是未经篡改的区块版本，这意味着区块链是不可变的。这使得区块链具有防篡改性和高度安全性。现在，向区块链添加新区块类似于向书中添加新页面。这就是区块链的全部要义。


    区块链有两种变体。一种称为公有区块链，另一种称为私有区块链。


    ## 公有区块链


    公有区块链是一种任何人在任何时间都可以加入的区块链网络。基本上，参与没有限制。更重要的是，任何人都可以查看账本并参与流程。例如，`Ethereum` 就是一个公有区块链平台。


    如果企业寻求完全去中心化的网络系统，那么公有区块链是一条可行的道路。然而，当企业试图将公有区块链网络与企业内部的区块链流程整合时，公有区块链可能会变得非常棘手。


    公有区块链的最大优点在于其所有参与者都拥有平等权利的理念。每个人也能查看账本，从而始终保持透明度。然而，公有区块链也同样存在相当的缺陷。实际上，这些平台比通常情况更慢；安全性较低，且常常违反数据隐私法。此外，由于其匿名特性，可能会吸引恶意人士利用该平台进行非法活动。


    尽管公有区块链有其自身的优势，但企业通常倾向于采用私有区块链来运营业务。更重要的是，在物联网和人工智能的背景下，私有区块链是最受欢迎且被推荐的模式。


    所以简单来说，公有区块链遵循的是分布式账本管理，而非中心化账本。在中心化账本中，由一个人或实体负责管理区块链；而在分布式账本中，所有参与区块链的个人或实体都会获得完整账本的一份副本，并共同对账本负责。


    在公有区块链环境中，任何人都可以向区块链添加新区块，但他们必须解决一个非常复杂的难题。这种方法的问题在于，解决难题会消耗大量的算力。


    ## 私有区块链


    私有区块链是一种特殊类型的区块链技术，其中只有单一组织或组织联盟对网络拥有管理权。网络不向公众开放加入。所有私有区块链解决方案都会采用某种形式的授权方案来识别进入平台的实体。


    私有区块链网络需要邀请，并且必须由网络发起者或由网络发起者制定的一套规则进行验证。建立私有区块链的企业通常会建立一个许可网络。这限制了谁有权参与网络以及谁可以执行哪种交易。参与者需要获得邀请或许可才能加入。访问控制机制可能有所不同——现有参与者可以决定未来的进入者，或者监管机构可以发放参与许可，又或者由联盟来做决定。一旦实体加入网络，它将在以去中心化方式维护区块链的过程中发挥作用。


    在私有区块链环境中，企业无需花费算力来向区块链添加新区块，因为网络发起者或业务所有者可以直接将区块添加到区块链中。


    在一个典型的场景中，如果我们审视任何企业业务的端到端流程，会发现它是多个参与方相互沟通以完成一笔商业交易或一个业务流程的集合，如图 9-1 所示。


    ![../images/517610_1_En_9_Chapter/517610_1_En_9_Fig1_HTML.jpg](img/517610_1_En_9_Fig1_HTML.jpg)


    图 9-1


    典型商业交易示例


    这里有生产商、财务部门、监管机构、运输机构和零售商，每个参与方都使用自己的系统来维护记录，并基于这些记录与其他方沟通。随着这种沟通和记录过程变得复杂，可能会出现许多分歧，为了证明自身数据和记录的正确性，企业在中介、审计和合规等方面花费了数百万美元。这就是当今的现实，意味着一个低效的系统，而这种低效的主要原因在于，我们经济中的每个实体都维护着自己的记录，并且在许多情况下，这些记录并未与其他实体共享或公开透明。私有区块链正是为解决当前经济中企业间交易和沟通的低效问题而提供的一种方案。

    '
- fmt: '### Hyperledger


    区块链是一个与每个直接或间接关联的企业共享的单一数据库，每个企业都拥有区块链上所有交易的相同副本。


    在谈论区块链时，一个经常出现的概念是`Hyperledger`。`Hyperledger`是一个开源区块链及相关工具的伞式项目，于2015年12月由Linux基金会发起，并获得了IBM、英特尔和SAP的贡献，以支持基于区块链的分布式账本的协作开发。


    `Hyperledger`是一个全球性的企业区块链项目，提供必要的框架、标准、指南和工具，用于构建开源区块链及相关应用，并适用于各个行业。`Hyperledger`是一个专为使用区块链进行业务的企业而设计的许可链。在该环境中，同意加入许可链联盟的每一方都能看到其拥有权限的所有数据，从而能够查看区块链上记录的所有允许交易。例如，零售商能够看到其产品的位置；即使产品由第三方物流公司配送，他们也能找到货物或产品的运输位置、状况等信息。由于链不由单一方控制，因此不会有分歧，也没有人能篡改数据——只有一种真实状态，该状态在全体成员间分布式且透明地共享，每个成员在数据和交易方面拥有同等的优先级和问责权。一旦输入的任何内容都将永久保存，这意味着数据的准确性不存在争议或疑问。


    广义上，加密货币是一种以代币或“硬币”形式存在，并由区块链驱动的分布式去中心化账本支持的货币。


    智能合约是一种自动执行的合约，买卖双方之间的协议条款直接写入代码行。代码及其包含的协议存在于分布式、去中心化的区块链网络中。


    ### 区块链如今几乎惠及所有行业


    尽管其最初目的是作为加密货币的底层机制，但如今的区块链技术已远远超越了仅为比特币交易提供动力的范畴。区块链是一种强大且安全的技术，正渗透到几乎所有行业，从银行业、医药业甚至到政府部门。结合物联网，区块链正在重新定义未来企业开展业务的方式。


    例如，在航运和物流领域，我们考虑一个贸易场景：从生产点开始，到通过船舶或卡车运输，最终到达仓库再送至商店，每件物品都变得可追踪。如果供应链中的每个企业，如物品生产商、负责运输的货运管理公司、存储产品的仓库以及最终销售产品的零售商，都能随时追踪物品的位置、状况以及当前负责人，这将使整个端到端的供应链变得非常透明和高效。


    让我们讨论另一个案例，关于食物如何从农场到达餐桌，以及区块链如何成为一项颠覆性技术，使其更安全、更可持续。


    你可能听说过2018年在美国发生的沙门氏菌污染事件，由一家名为“美国花生公司”的企业引发，导致9人死亡，46个州报告了超过700例沙门氏菌中毒病例。这家公司在美国生产的花生酱产量非常小，仅占全美产量的2%。花生酱是许多产品中使用的原料。由于许多产品使用这种花生酱，在疫情爆发期间，几乎所有使用该原料的产品都被视为受到污染。连锁反应是，任何含有来自任何供应商的花生颗粒的产品都被召回，产品范围包括饼干、巧克力棒、冰淇淋，甚至宠物食品。总共有3913种不同的食品被召回，而这仅仅是因为一家生产了2%花生酱的小制造商发货了受沙门氏菌污染的花生酱。该公司首席执行官斯图尔特·帕内尔因此被判多年监禁。其中一些召回事件在最初疫情被检测到后，长达两个月才发生。你能想象吗？受污染的产品在货架上放置了两个月，因为人们不知道他们的产品中含有受污染的原料！这种情况不仅限于美国，亚洲和欧洲也发生过多次类似的疫情。


    关键在于了解存在哪些解决方案可以克服此类灾难——物联网与区块链的结合就是解决方案。我们需要一个能够提供完全透明且数字化视图的食品系统，基于此，在前述案例中，只有受影响的产品才需要被召回。


    让我们再举一个从农场到餐桌的例子，比如一个简单的切片芒果或苹果。芒果通常由中美洲或南美洲的小农户种植。


    芒果树从种子种起，需要五到八年才能结果。一旦树木结果，通常在果实完全成熟前的一到两周内进行采摘。果实成熟后，芒果通过空运、陆运或海运运输，在许多情况下会跨国运输，经过海关清关，然后被运送到零售商店的加工设施，在那里进行清洗，最后切片并摆上零售商的货架进行销售。'
  raw: '### Hyperledger


    A blockchain is a single database that is shared with every enterprise which is
    directly or indirectly connected to the business, and every enterprise has an
    identical copy of every transaction that is part of the blockchain.


    One of the concepts that comes up often when we speak about blockchains is Hyperledger.
    Hyperledger is an umbrella project of open source blockchains and related tools,
    started in December 2015 by the Linux Foundation, and has received contributions
    from IBM, Intel, and SAP to support the collaborative development of blockchain-based
    distributed ledgers.


    Hyperledger is a global enterprise blockchain project that offers the necessary
    framework, standards, guidelines, and tools to build open source blockchains and
    related applications for use across various industries. Hyperledger is a permissioned
    blockchain which is designed specifically for enterprises to do business using
    a blockchain. It is an environment in which every one of the parties who agreed
    to be part of the consortium in the permission chain gets visibility to all of
    the data that they have permission, which gives them the ability to see every
    allowed transaction that is registered on the blockchain. As an example, a retailer
    will be able to see where their products are; even though it is delivered by a
    third-party logistic company, they can find the location, condition of their shipments
    or products, and so on. Since the chain is not controlled by one person, there
    would be no disagreements, and no one can tamper the data – there is just one
    state of truth which is distributed and transparent across every member, and every
    member has the same priority and accountability as others on the data and transactions.
    And whatever has been entered once becomes permanent, which means there is no
    debate or question on the accuracy of the data.


    A cryptocurrency, broadly defined, is a currency that takes the form of tokens
    or “coins” and exists on a distributed and decentralized ledger powered by Blockchain.


    A smart contract is a self-executing contract with the terms of the agreement
    between the buyer and the seller being directly written into lines of code. The
    code and the agreements contained therein exist across a distributed, decentralized
    blockchain network.


    ### Blockchain Benefits Almost Every Industry Today


    With an initial purpose of a mechanism behind cryptocurrencies , today the blockchain
    technology has stepped far beyond just powering the bitcoin transactions. Blockchain
    is a powerful and secure technology that is getting into almost every industry,
    from banking or medicine to even the government sector. Combined with IoT, blockchain
    is redefining the way in which enterprises can do business in future.


    For example, in shipping and logistics, let us consider one of the trade scenarios
    where each item becomes trackable starting from the point of production to delivery
    via ships or trucks and finally reaching the warehouse and then to the store.
    If every enterprise part of the supply chain, such as the producer of the item,
    the freight management company which is transporting the products, the warehouse
    which stores the products, and the retailer who finally sells the products, is
    able to track where the items are at any point in time, the condition of the items,
    and who is currently in charge, it makes the whole end-to-end supply chain very
    transparent and effective.


    Let us discuss another case study, about how food moves from farm to fork and
    how blockchain could be a disruptive technology to make that safer and sustainable.


    You might have heard of a salmonella-tainted outbreak that occurred in 2018 in
    the United States by a company called Peanut Corporation of America which has
    killed 9 people and more than 700 reported cases of salmonella poisoning in 46
    states. This company produced a very small volume of peanut paste in the United
    States, tune to just 2%. Peanut paste is an ingredient that is used in a lot of
    products. Because a lot of products use this butter, during the outbreak almost
    every product which uses this ingredient was deemed contaminated. The chain reaction
    was that anything that had granulated peanut from any supplier got recalled, and
    the products ranged from crackers, chocolate bars and cookies, ice creams, and
    even pet food products. There were a total of 3913 different food products that
    had to be recalled, and this was just because a small manufacturer that produced
    2% of peanut butter shipped salmonella-tainted peanut butter. The CEO of the company
    Stewart Parnell was awarded several years of imprisonment for doing that. Some
    of these recalls that happened took as long as two months after the initial outbreak
    was detected. Can you imagine for two months contaminated products sitting on
    shelves, because people did not know that a contaminated ingredient was in their
    products? And this is not unique to the United States, there are several such
    outbreaks in Asia and Europe as well.


    The key is to understand what solutions exist that can overcome such kind of fiascos
    – IoT combined with blockchain is the solution. There is a need to have a system
    in place that can provide a fully transparent and digitized view on the food system,
    based on which in the preceding case study only those products that get affected
    could be recalled.


    Let us take another example of farm to fork for a simple sliced mango or apple.
    Mangoes are generally grown by small farmers somewhere in Central or South America.


    A mango tree is planted from seed and requires five to eight years before it will
    bear fruits. Once a tree bears some fruit, they are harvested before they are
    fully ripened, which takes one to two weeks. Once they are ripened, mangoes get
    transported by air, land, or sea, and in many cases, they are transported cross
    country where they are cleared by customs, and then mangoes are brought to the
    processing facility of the retail stores where they are cleaned and then finally
    sliced and put on the shelves for sales by retailers.'
  trans: '

    ### Hyperledger


    区块链是一个与每个直接或间接关联的企业共享的单一数据库，每个企业都拥有区块链上所有交易的相同副本。


    在谈论区块链时，一个经常出现的概念是`Hyperledger`。`Hyperledger`是一个开源区块链及相关工具的伞式项目，于 2015 年 12 月由
    Linux 基金会发起，并获得了 IBM、英特尔和 SAP 的贡献，以支持基于区块链的分布式账本的协作开发。


    `Hyperledger`是一个全球性的企业区块链项目，提供必要的框架、标准、指南和工具，用于构建开源区块链及相关应用，并适用于各个行业。`Hyperledger`是一个专为使用区块链进行业务的企业而设计的许可链。在该环境中，同意加入许可链联盟的每一方都能看到其拥有权限的所有数据，从而能够查看区块链上记录的所有允许交易。例如，零售商能够看到其产品的位置；即使产品由第三方物流公司配送，他们也能找到货物或产品的运输位置、状况等信息。由于链不由单一方控制，因此不会有分歧，也没有人能篡改数据——只有一种真实状态，该状态在全体成员间分布式且透明地共享，每个成员在数据和交易方面拥有同等的优先级和问责权。一旦输入的任何内容都将永久保存，这意味着数据的准确性不存在争议或疑问。


    广义上，加密货币是一种以代币或“硬币”形式存在，并由区块链驱动的分布式去中心化账本支持的货币。


    智能合约是一种自动执行的合约，买卖双方之间的协议条款直接写入代码行。代码及其包含的协议存在于分布式、去中心化的区块链网络中。


    ### 区块链如今几乎惠及所有行业


    尽管其最初目的是作为加密货币的底层机制，但如今的区块链技术已远远超越了仅为比特币交易提供动力的范畴。区块链是一种强大且安全的技术，正渗透到几乎所有行业，从银行业、医药业甚至到政府部门。结合物联网，区块链正在重新定义未来企业开展业务的方式。


    例如，在航运和物流领域，我们考虑一个贸易场景：从生产点开始，到通过船舶或卡车运输，最终到达仓库再送至商店，每件物品都变得可追踪。如果供应链中的每个企业，如物品生产商、负责运输的货运管理公司、存储产品的仓库以及最终销售产品的零售商，都能随时追踪物品的位置、状况以及当前负责人，这将使整个端到端的供应链变得非常透明和高效。


    让我们讨论另一个案例，关于食物如何从农场到达餐桌，以及区块链如何成为一项颠覆性技术，使其更安全、更可持续。


    你可能听说过 2018 年在美国发生的沙门氏菌污染事件，由一家名为“美国花生公司”的企业引发，导致 9 人死亡，46 个州报告了超过 700 例沙门氏菌中毒病例。这家公司在美国生产的花生酱产量非常小，仅占全美产量的
    2%。花生酱是许多产品中使用的原料。由于许多产品使用这种花生酱，在疫情爆发期间，几乎所有使用该原料的产品都被视为受到污染。连锁反应是，任何含有来自任何供应商的花生颗粒的产品都被召回，产品范围包括饼干、巧克力棒、冰淇淋，甚至宠物食品。总共有
    3913 种不同的食品被召回，而这仅仅是因为一家生产了 2%花生酱的小制造商发货了受沙门氏菌污染的花生酱。该公司首席执行官斯图尔特·帕内尔因此被判多年监禁。其中一些召回事件在最初疫情被检测到后，长达两个月才发生。你能想象吗？受污染的产品在货架上放置了两个月，因为人们不知道他们的产品中含有受污染的原料！这种情况不仅限于美国，亚洲和欧洲也发生过多次类似的疫情。


    关键在于了解存在哪些解决方案可以克服此类灾难——物联网与区块链的结合就是解决方案。我们需要一个能够提供完全透明且数字化视图的食品系统，基于此，在前述案例中，只有受影响的产品才需要被召回。


    让我们再举一个从农场到餐桌的例子，比如一个简单的切片芒果或苹果。芒果通常由中美洲或南美洲的小农户种植。


    芒果树从种子种起，需要五到八年才能结果。一旦树木结果，通常在果实完全成熟前的一到两周内进行采摘。果实成熟后，芒果通过空运、陆运或海运运输，在许多情况下会跨国运输，经过海关清关，然后被运送到零售商店的加工设施，在那里进行清洗，最后切片并摆上零售商的货架进行销售。

    '
- fmt: 'When a customer enters a store, they are not aware of the lengthy process
    of who harvested the mangoes, in what conditions the mangoes were transported,
    and how they arrived at the store. It is a complicated journey. However, from
    a food safety perspective, it is very important to know each and every step in
    the process starting from farm to fork, especially when something like the peanut
    butter fiasco happens. Today, it takes days to trace any food product from a grocery
    cart to the farm, and most of this traceability today is achieved using disparate
    methods across the life cycle, and in many cases, this is recorded on paper.


    A combination of IoT and Blockchain can overcome this traditional challenge by
    bringing in a full traceability into the process, and such level of traceability
    can be achieved in minutes. The solution can move beyond traceability to transparency,
    which is one of the most important aspects in a food safety–regulated industry.


    Traceability has the following attributes: the three Ws – what, when, and where.
    This is a mango, where did this come from, where did this go and at what time,
    where was it in on these dates, and so on. Using the current systems, one can
    never achieve an end-to-end view of the complete farm to fork system.


    What is envisioned with transparency is that enterprises can have an entire interconnected
    view of that system. Transparency attributes are how was it produced, were any
    pesticides used to harvest the product or was it organically grown, and so on.


    With IoT and blockchain, enterprises can achieve both transparency and traceability
    together. There can be IoT sensors that can be deployed at the farms, at the packaging
    houses, and at the distribution centers that can track and trace the items from
    farm to fork, and all this data can be secured using blockchain technology where
    all parties who are part of the supply chain can participate in the process. Using
    this model, enterprises can go to an extent where customers will be able to scan
    a QR code on a package and know where that product came from, how it was preserved
    and at what temperature, how much chemicals were used during production, and any
    other attributes that they choose.


    And lastly, such a system brings in a lot of customer trust on companies and the
    whole food systems.


    ## IoT Blockchain Implementation Patterns


    So far, we have spoken about the importance of blockchain and the different use
    cases which make blockchain a powerful technology in an IoT context. However,
    with different challenges we have in IoT, such as legacy devices and protocols,
    enormous data generated by these devices, along with a wide variety of IoT tools
    and technologies in the market, applying blockchain in IoT use cases needs to
    be carefully planned.


    The Industrial Internet Consortium (IIC) was formed to accelerate the development,
    adoption, and widespread use of interconnected machines and devices and intelligent
    analytics. IIC has defined four patterns^([^(21)](#fn21)) of communication between
    IoT devices, Smart IoT Gateways, and IoT platforms to blockchain based on certain
    simple guidelines as depicted in Figure 9-2. A fifth pattern has been added as
    part of IoT Standards that helps achieve interoperability when applying Blockchain
    to IoT.


    ![../images/517610_1_En_9_Chapter/517610_1_En_9_Fig2_HTML.jpg](images/517610_1_En_9_Chapter/517610_1_En_9_Fig2_HTML.jpg)


    *Figure 9-2 IoT Blockchain patterns*


    ### Pattern 1: Device ➤ IoT Cloud Platform ➤ Blockchain


    This pattern focuses on the IoT devices that have Wi-Fi and/or cellular connectivity
    and are able to directly communicate with the IoT cloud platform using various
    IoT data protocols. In this pattern, the IoT cloud manages all the device data,
    and the blockchain serves as the data integrity layer. The IoT cloud platform
    chooses which data and events will be stored in the blockchain.


    ### Pattern 2: Device ➤ IoT Gateway ➤ IoT Cloud Platform ➤ Blockchain


    This pattern is defined specifically for resource-constrained IoT devices (e.g.,
    sensors, RFIDs, smart meters, etc.) that can only connect to an IoT Gateway via
    low-power wireless communication protocols (e.g., Zigbee, Z-Wave, LoRa, etc.),
    which then forward the collected data to the IoT cloud platform. The blockchain
    in this pattern plays the same role as that in pattern 1.


    ### Pattern 3: Device ➤ IoT Gateway ➤ Blockchain


    This pattern is aimed for heavy edge computing use cases where the IoT Gateway
    directly handles the connection, storage, processing, and analysis in a distributed
    manner. In this pattern, the blockchain replaces the IoT cloud platform for controlling
    and managing IoT devices and Gateways to realize various asset-related core functionalities.


    ### Pattern 4: Device ➤ Blockchain


    This pattern mainly targets machine-to-machine communication and payment scenarios,
    where the IoT devices, which are equipped with Wi-Fi/cellular modules, need to
    communicate with others in a decentralized manner. Smart contracts are extensively
    utilized in this pattern to define the interaction rules and policies between
    IoT devices. The IoT devices monitor the specific events on the blockchain and
    take actions accordingly.


    ### Pattern 5: Device ➤ IoT Gateway ➤ IoT Platform


    Pattern 5 has been introduced as part of the IoT Standards Reference Model which
    does not include communication with blockchain. This is a pattern which mandatory
    needs to coexist with one of the four patterns we discussed about for any IoT
    use case implementation following the IoT Standards Reference Model. The reason
    why this pattern is introduced is to make enterprises understand that not every
    transaction and not every data generated by the IoT device needs to be recorded
    on the blockchain, else there would be a massive data explosion. There are very
    few use cases where patterns 1–4 can be applied in silos, and such use cases need
    to be identified very carefully.'
