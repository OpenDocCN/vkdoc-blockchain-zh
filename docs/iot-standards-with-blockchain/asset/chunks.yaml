  trans: '# 数据量与数据分析


    第三大障碍在于数据量及分析复杂性。物联网数据的激增带来了巨大的经济价值，预计到 2025 年将达到约 11 万亿美元。但海量数据也带来了重大挑战，使得数据整合和数据分析变得复杂，导致难以从物联网用例中快速、轻松地提取战略价值。


    物联网数据的主要挑战在于其实时性。根据 IDC^(¹⁸)数据，到 2025 年，30%的数据将是实时数据，其中物联网占比近 95%；20%的数据将是关键数据，10%的数据将是超关键数据。企业要从中获益，就必须进行实时分析。虽然物联网显然会产生海量数据，但这并非主要挑战。关键问题在于，许多企业尚未建立数据驱动文化——这意味着企业在内部尚未建立成熟的大数据管理流程。挑战不在于数据量，而在于：我该从哪里获取数据？如何将数据整合起来形成有价值的见解？如何管理和维护这些数据？如何以最恰当的方式做到这一切？第`11`章将讨论大数据平台，帮助确保选择正确的平台和工具来有效管理和治理数据。


    # 缺乏标准通信（数据）协议


    第四个挑战源于企业内部存在大量传统设备，每种设备都有自己的协议，这使得物联网标准参考模型中不同层之间的通信变得非常困难。我们将在后续章节讨论物联网网关如何解决这一挑战。


    # 产品与平台的多样性


    第五大挑战是构成完整物联网生态系统的多元化产品和平台。如果任何供应商或服务商声称无需合作伙伴生态即可部署端到端物联网解决方案，那么他们的解决方案一定存在根本性问题。物联网解决方案需要庞大的生态系统支撑——从设备供应商到物联网网关制造商，再到物联网云服务提供商——才能构成完整的解决方案。企业需要在每个领域寻找最佳解决方案，从而使整体解决方案既具成本效益又高效。


    # 投资回报率


    最近出现的最后一个挑战是关于投资回报率。企业内部围绕物联网的讨论已从 IT 层面（首席信息官层面）转向财务层面（首席财务官层面）。CFO 对物联网实施的投资回报率提出了明确要求，这需要认真思考和明确阐述。毕竟，物联网需要先进行资本支出投资，随后再进行运营支出投资。


    资本支出指的是长期开销，而运营支出则是公司的日常开支。资本支出通常是任何项目启动时所需的成本，而运营支出则分摊到项目周期中。


    数据中心是指一栋建筑、建筑内的专用空间或一组建筑，用于在企业场所内安置计算机系统及相关组件。它是通过本地网络连接的计算和存储资源网络，能够提供共享软件应用程序和数据的交付。


    云数据服务（简称云服务或云）是数据中心的远程版本，位于企业实体场所之外的某处，使企业能够通过互联网访问其数据。传统数据中心指的是部署在企业内部的服务器硬件，通过本地网络存储和访问数据。


    企业在踏上物联网之旅时，需要仔细分析上述每个挑战。此外，企业还需明白，不存在一种可以作为物联网实施指南的通用架构。企业需要根据自身身份（即所属行业）、业务内容（即制造产品、研发药物还是销售杂货）、连接对象及连接方式来定制物联网架构——这些都是决定物联网架构的巨大依赖因素。


    企业需要在物联网生态系统中连接多种设备，而这些设备并非它们自己制造。但如果你看看这些现场设备的多样性，就不难发现它们使用多种不同的协议进行通信，导致物联网生态系统极为复杂。我们目前讨论的大多数挑战，都可以通过将（智能）物联网网关引入物联网标准参考模型来解决。'
- fmt: '# IoT Gateways


    There is a lot of complexity with devices and their protocols. As discussed in
    Chapter [5](#517610_1_En_5_Chapter.xhtml), devices use several protocols, such
    as Zigbee, Z-Wave, Wi-Fi, Bluetooth, and so on. On the other hand, there are several
    standard bodies and consortia that are all creating new standards and new protocols
    on a daily basis. This is where IoT Gateways come into the picture.


    An IoT Gateway is a solution for enabling IoT communications, usually device-to-device
    communications or device-to-cloud communications. At its simplest form, a traditional
    IoT Gateway is a piece of hardware or software to collect and aggregate data from
    multiple I/O devices using multiple communication protocols. The Gateway then
    communicates the data to servers either in local data centers or in the cloud.
    In such a simplified context, the Gateway functions as a “broker.” In this context,
    the Gateway either directly connects to IoT field equipment (sensors, actuators,
    etc.) or through programmable logic controllers (PLCs) or supervisory control
    and data acquisition systems (SCADA) which aggregate field data. These Gateways
    support a wide variety of I/O interfaces, including wired and wireless connections.


    In such scenarios, Gateways serve two main objectives:


    1. Allow more devices to connect to the Internet at an industrial scale

    2. Support disparate protocols – from Zigbee to Wi-Fi to 4G/5G


    A programmable logic controller or programmable controller is an industrial digital
    computer that has been ruggedized and adapted for the control of manufacturing
    processes, such as assembly lines, robotic devices, or any activity that requires
    high reliability, ease of programming, and process fault diagnosis.


    Supervisory control and data acquisition (SCADA) is a control system architecture
    comprising computers, networked data communications, and graphical user interfaces
    (GUI) for high-level process supervisory management.


    However, in a marketplace where Gartner expects 20 billion IoT devices to go live
    by 2020, a traditional Gateway has a lot of challenges because if all data needs
    to be sent from IoT devices to the cloud or data center, we are talking about
    a significant amount of data per second which in some use cases can range from
    a few terabytes to even petabytes of data transfer per minute. There is an enormous
    amount of raw data that IoT devices generate, and if this data is directly sent
    from IoT Gateways to the cloud, it introduces a lot of inefficiencies because
    data transfer from a device to the cloud causes latency and high costs and also
    can many times clog the network connectivity apart from inducing data privacy
    issues in some cases. So though Gateways are built to connect the unconnected,
    the other main task Gateways are expected to perform is to start the analytics
    process at the Gateway level. This is where edge computing has disrupted the market.


    Edge computing is a distributed computing model that brings computation and data
    storage closer to the location where it is needed, to improve response times and
    save bandwidth. In edge computing, critical data processing occurs at the data
    source rather than in a centralized cloud-based location. Edge computing resolves
    the challenge of inefficient data transfer architecture by performing important
    tasks at the IoT Gateway itself. Gateways built using edge computing techniques
    are called Smart IoT Gateways.


    So in essence on the OT side as we speak more about Smart IoT Gateways, it is
    really about managing millions of devices as easily as managing one thing apart
    from consuming all data from the devices, deriving insights, and then performing
    actions based on the insights. With Smart IoT Gateways, it is all about managing
    perishable data at the edge and only moving to the IoT Cloud platform data what
    is actually needed to store from a long-term perspective or to perform analytics
    on a very specialized data.


    ## Smart IoT Gateways


    One of the reasons why edge computing has gained prominence is because it can
    avoid high latency and sometimes can even reduce costs of storage.


    There are use cases that deal with the life and death of individuals, such as
    in healthcare, and in such use cases, people’s lives, safety, and high finances
    are at stake. These are examples where enterprises look at almost near to zero
    latency, and therefore there is no appetite to pass all the data back to the cloud
    for processing. Enterprises need to process data right at the source as quickly
    as possible by using Smart IoT Gateways. Smart IoT Gateways should be capable
    of giving the same type of high power and performance and low latency that we
    would traditionally expect from IoT Platforms in the cloud or a data center.


    Smart IoT Gateways should be able to perform the tasks to manage OT from the outside
    and IT from the inside. What this means is that there are different types of devices
    that enterprises deal with in an IoT use case, and every industry uses different
    devices. Devices used in building management are very different from those used
    in an automotive industry or in a pharmaceutical setting. These devices use multiple
    protocols and inputs/outputs, and they are going to be there with us for the next
    many years. It is essential that IoT solutions coexist with these devices and
    protocols. What this means is that Smart IoT Gateways should be capable of supporting
    and communicating with the magnitude of such OT devices so that enterprises can
    retrieve all data from these devices – so the first feature expected from Smart
    IoT Gateways is the ability to have the right connectivity to be able to connect
    and communicate with any type of device.


    The second aspect is that these Smart IoT Gateways are not going to sit in the
    data centers or under desks or home environment. These are devices which will
    need to be very rugged as they may have to sit in windmills or boiler rooms under
    high temperatures, which are not a very easy environment to be, and at the same
    time, they have to last a long time and have to operate efficiently under these
    conditions. Often, Gateways become a mission-critical piece of an IoT architecture
    since most enterprises using IoT will depend on the devices to predict the future,
    so any downtime with these Gateways can lead to a business problem.


    So in summary, when enterprises are shortlisting IoT Gateways, they need to first
    look at the protocols Gateways support based on the devices they have within their
    enterprise. IoT Gateways should be capable of connecting with multiple types of
    devices (including legacy) within the enterprise setting, and secondly they need
    to be robust enough such that enterprises can deploy these IoT Gateways in tough
    and rough environments, such as at locations with high temperatures or dust.


    Some IoT use cases need Gateways to connect to the devices continuously apart
    from being able to make time-sensitive and real-time decisions based on data received
    from these devices. In such case, introducing latency is not an option, which
    typically is caused when data moves back and forth to the cloud. This means that
    IoT Gateways should be capable of performing analytics and real-time decisions.


    And finally, the most important thing is security. Many industries, such as healthcare,
    pharma, banking, and financial services, are regulated, and for all such enterprises,
    it is essential that data is kept on-site, and hence IoT Gateways should have
    the capability to store data.'
