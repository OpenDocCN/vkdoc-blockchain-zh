    -   **POC 未成功，除非它能扩展**


    第一条规则是，不能仅凭概念验证就认为一个概念已经成功。只有当概念验证能够扩展时，这个概念才算成功。


    让我用一个案例研究来解释这一点。美国一家拥有 2000 多家零售店的顶级奢侈品牌希望我们利用机器学习创建一个人工智能工具，该工具能够在任何名人光顾其门店时，在五秒内向门店经理发出警报。门店经理随后将能够迎接名人，并给予他们热情的欢迎。我们开发了应用人工智能用例，并使用
    400 个摄像头在阿拉斯加的五家门店进行了部署，结果令人鼓舞，成功率超过 95%。我们使用面部识别技术和机器学习模式，基于数百万数据集对大约 5000 位名人实施了概念验证。它在阿拉斯加表现非常出色。


    我们在密歇根州和其他城市使用了相同的技术，部署了 10000 个摄像头，但结果并不理想。我们错过了进入密歇根州和底特律门店的 32% 的名人，因为所使用的数据不足以识别该地区的所有名人。这个案例研究教会我们，如果一个概念验证证明它能在五秒内用
    400 个摄像头和 5000 位名人正常工作，并不意味着它能在 40000 个摄像头和 50000 位名人场景下正常工作。因此，第一个教训是，除非概念验证被证明能够扩展，否则它不算成功。


    -   **人工智能需要足够的数据和时间来学习**


    为了预测并提供准确结果，人工智能模型需要大量的数据和时间。一个中等复杂度的应用人工智能用例需要至少六到九个月的学习时间才能达到 95% 的准确率。一家名为`Seagate`的制造业客户要求我们在其整个生产线上部署多个设备，以实时了解其生产线故障情况，因为传统上如果某个设备出现故障，整个生产线就会停止，这可能导致数百美元的损失。但客户的关键要求是，我们不能过早或过晚告知他们这些故障；他们需要在任何事故即将发生之前得到通知。为了实现这种近乎实时的故障警报，我们需要海量的数据，并且模型需要几个月的时间学习才能预测故障。在将数百万物联网数据集输入机器学习模型超过九个月后，该模型能够在大约
    85% 的情况下预测故障。


    -   **明确要实现的目标**


    如果给人工智能分配一个特定的、狭窄的任务，它就会非常有效。


    我们被叫到一家医院，该城市肺结核发病率很高。政府决定对该市所有 40 岁以上的人进行肺结核检测。虽然全市正在大规模进行扫描检查，但医院面临的挑战是，在拍摄胸部
    X 光片后，医生需要两周时间才能确认一个人是肺结核阳性还是阴性。对于阳性病例，在这两周内，存在感染者将疾病传播给周围其他人的风险。人工智能被用来解决这个问题。我们请医生分享所有患者的
    X 光片，并将它们分为两类：肺结核阳性与肺结核阴性。肺结核阳性是感染了肺结核的患者，其余的被归类为肺结核阴性。机器学习模型对从全市实验室提取的数千张 X 光片进行了训练。模型基于阳性和阴性报告反复训练。在学习了数百万张
    X 光片后，最终的人工智能模型能够在一秒钟内根据 X 光片预测一个人是肺结核阳性还是阴性。该算法达到了 95% 的成功率。


    因此，从这个案例研究中得到的关键教训是，企业需要非常明确他们希望从人工智能中实现（预测）什么。在医院的案例研究中，我们仅使用 X 光片作为预测患者肺结核的手段——我们没有使用`MRI`或`CT`扫描。


    -   **如果模型工作正常，就付诸行动，而不是追求做更多的人工智能**


    如果一个模型工作良好，强烈建议根据用例将模型付诸行动。


    我们在哥本哈根时，有人向我展示了一个移动应用。这个移动应用显示，在我位置周围 100 公里范围内，有多少家食品店在接下来的两天内有即将过期的食品。利用这些数据，商店对即将过期的食品提供
    50% 到 70% 的折扣。我发现从我酒店周围 7 公里范围内有大约 2000 种食品，一旦我点击某个特定商店，它就会列出该商店所有即将过期的商品。我还可以点击某个特定商品，应用会告诉我附近所有有该过期商品出售的商店。这是一个简单的应用，不需要人工智能来完成工作，一些简单的规则就足够了。开发这个应用的公司最初立志要使用人工智能算法，但他们很快意识到这个应用并不需要人工智能，一些简单的规则就足以从食品中提取过期日期信息并分享给用户。这意味着，一旦你花足够的时间收集数据并看到结果，最好实施这些规则，而不是强迫自己去做应用人工智能。


    从这个例子中学到的教训是，企业并不总是需要强迫自己用收集到的数据去做人工智能，即使他们获得了资金支持。如果你已经能够使用预定义规则很好地利用现有数据，那么就请使用这些规则来实现业务成果。


    ## 总结


    在本章中，我们讨论了机器人流程自动化与人工智能之间的关键区别。我们还讨论并理解了人工智能内部的不同子领域，如机器学习、深度学习、计算机视觉、自然语言/语音处理和认知计算，这些领域旨在构建能够做事情的机器。


