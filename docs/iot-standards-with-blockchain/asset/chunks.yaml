  trans: '

    ### 设备（传感器与执行器）


    作为每个物联网系统的基础，联网设备或联网对象负责提供数据，而数据正是物联网的核心。为了获取外部世界或物体自身的物理参数，设备需要传感器。


    从根本上说，物联网设备由硬件和软件组成，包括操作系统、计算单元、存储和连接功能。设备与计算机之间的主要区别在于，物联网设备的输入和输出与传统计算机截然不同。设备由传感器和执行器构成。


    传感器可以嵌入设备内部，也可以作为独立对象来测量和收集遥测数据。例如，农业传感器的任务是测量空气和土壤温湿度、土壤 pH 值或作物光照时长等参数。


    并非所有物联网设备都有输出功能。具备输出功能的设备可以对事件执行操作，比如通过蜂鸣器告知有人按下了按钮，或者按下按钮后液压升降机可以提升数吨重物。


    该层的另一个组成部分是执行器。执行器与传感器紧密配合，将设备生成的数据转化为物理动作。例如，设想一个配备了所有必要传感器的智能灌溉系统。根据传感器提供的输入，设备实时分析情况，并命令执行器打开位于土壤湿度低于设定值区域的选定水阀。阀门保持开启状态，直到传感器报告数值恢复正常。


    设备必须保持连接，以便传输和接收数据并执行指令。


    在新的联网设备世界中，设备之间相互通信以收集和共享信息，并实时协作以发挥整个物联网部署的价值，这一点也至关重要。然而，由于企业中许多旧式设备资源受限且依靠电池供电，实现这一目标并非总是可行，需要创建变通方案——设备间的通信需要大量资源，如计算能力、能量和带宽，而这些正是旧式设备所面临的挑战。除了这些限制，每种设备使用不同的语言（称为协议）进行通信，因此设备之间直接相互通信并不总是容易。这就是智能物联网网关得以发挥作用的主要原因，它是任何设备（无论是现代还是旧式）以最安全、最优的方式与其他设备通信的变通方案。


    ### 智能物联网网关


    智能物联网网关通常执行如图 4-2 所示的三大主要功能。^(¹⁵)


    ![../images/517610_1_En_4_Chapter/517610_1_En_4_Fig2_HTML.jpg](img/517610_1_En_4_Fig2_HTML.jpg)


    图 4-2


    智能物联网网关的功能


    首先，它充当数据采集层，使设备能够相互通信并共享数据，并能与物联网架构中的其他系统进行通信；其次，它执行物联网设备的管理功能。物联网网关之所以被称为智能，是因为它们还执行另一项重要功能：对从物联网设备接收的数据进行预处理和分析，这也被称为边缘
    IT 或边缘分析。


    并非所有物联网网关都是智能的。标准物联网网关仅执行第一个功能，即实现设备通信。一些网关制造商使其网关能够执行设备管理。而智能网关则在网关层面执行数据处理和分析，减少了向物联网平台发送和接收数据的开销。它将计算和数据存储置于更靠近设备所在的位置，以缩短响应时间并节省网络带宽。


    需要明确的是，并非所有物联网架构都需要配备智能物联网网关。企业需要根据自身需求和物联网用例，选择合适的网关。


    #### 设备通信是网关的首要功能


    在物联网生态系统中，企业会拥有多种设备，所有这些设备都需要连接并交换信息。并非所有设备都能直接相互通信，因为每种设备使用不同的语言（即通信协议），因此物联网（智能）网关变得至关重要。物联网网关的功能是使物联网架构中的设备能够相互通信，无论它们使用何种通信协议。我们将在第
    6 章中详细讨论通信协议。


    物联网（智能）网关表示该网关可以是物联网网关或智能物联网网关。


    物联网网关意味着该网关不具备智能特性，即没有数据存储、数据预处理和分析能力。


    通信协议是一套规则系统，允许通信系统中的两个或多个实体传输信息。


    物联网（智能）网关是实现物联网通信的解决方案，通常用于设备到设备或设备到云的通信。物联网网关是执行以下功能的设备：协议转换至通用标准、数据处理、数据存储、数据过滤和设备安全。


    鉴于数百万设备产生的海量输入和输出，数据的聚合、选择和传输能力至关重要。作为联网事物与云端及分析系统之间的中介，网关充当数据采集系统，并提供必要的连接点，将剩余各层连接在一起。物联网网关通过将传感器数据转换为易于传输且可供其他系统组件使用的格式，促进传感器与其余系统之间的通信。


    #### 设备管理是某些网关执行的另一项基本功能


    设备管理是指对物联网设备进行自动且安全地配置、认证、设置、控制、监控和维护的过程。一些企业选择通过物联网（智能）网关执行设备管理，而另一些企业则根据其目标实现的具体用例，倾向于使用全栈物联网平台来执行设备管理。

    '
- fmt: '# Edge Computing Is the Third Important Function for Smart IoT Gateways


    Edge computing is a distributed computing paradigm that brings together computation
    and data storage closer to the location where it is needed, to improve response
    times and save bandwidth.


    Edge computing is transforming the way data is being handled, processed, and delivered
    from millions of devices around the world. The explosive growth of Internet-connected
    devices – the IoT – along with new applications that require real-time computing
    power, continues to drive edge computing systems.


    Faster networking technologies, such as [5G](https://www.networkworld.com/article/3330603/5g-versus-4g-how-speed-latency-and-application-support-differ.html)
    wireless, are allowing for edge computing to accelerate the creation or support
    of real-time applications, such as video processing and analytics, self-driving
    cars, Artificial Intelligence, and robotics, to name a few.


    ## Definitions


    `Workloads` is a term used within this book which is a combination of applications,
    connectivity, and data either in full or in parts.


    In a network, latency measures the time it takes for some data to get to its destination
    across the network. It is usually measured as a round-trip latency, which is the
    time taken for information to get to its destination and back again to the source.


    Gartner defines edge computing as “a part of a distributed computing topology
    in which information processing is located close to the edge, where things and
    people produce or consume that information.” At a basic level, edge computing
    brings computation and data storage closer to the devices where it is being gathered,
    rather than relying on a central location that can be thousands of miles away.
    This means that data, especially real-time data, is processed by the Smart IoT
    Gateways which are hosted near to the location where devices reside. Because of
    this, enterprises do not face latency issues since data is shared back and forth
    and processed near to the devices. In addition, with Smart IoT Gateways, companies
    can save money because processing is carried out locally which reduces the amount
    of data that needs to be sent and processed in a centralized or cloud-based location.


    Smart IoT Gateways which are enabled with edge computing have gained a lot of
    importance due to the exponential growth of IoT devices, which connect to the
    Internet for either receiving information from the cloud or delivering data back
    to the cloud. Many IoT devices generate enormous amounts of data during the course
    of their operations. Smart IoT Gateways are primarily about moving processing
    away from the cloud, closer to the end device or end user. This also incorporates
    latency for time-sensitive applications, such as those within IoT which need real-time
    responses.


    The key drivers of edge computing with Smart IoT Gateways are:


    - Network and bandwidth – Edge computing can minimize the cost of moving large
    amounts of data, plus reducing reliance on the network.

    - Data privacy and security – Edge computing helps organizations comply with data
    sovereignty laws and makes sure intellectual property remains on-premises.

    - Adoption of edge computing is also being driven by a desire to make local computing
    – on devices or on-premises.

    - On round-trip latency issues, edge computing has disrupted the complete market.
    The cloud is all about accessing systems on the Internet, which means data and
    communication need to be moved back and forth over the Internet. With edge computing,
    data resides with the Smart IoT Gateway which mitigates the network latency issues.


    Though one may not see an edge device as part of every IoT architecture, this
    is one of the most important element that will determine the future success of
    any IoT implementation done today for specific enterprises and use cases. Edge
    computing brings significant benefits especially to large-scale IoT implementations.


    ## Challenges with Smart Gateways


    Smart IoT Gateways are enabled with edge computing that provides data storage
    and compute power. They perform processing of data at the Gateway itself, but
    there is a limit to the amount of data and compute that can be done at the Gateway
    level. Enterprises that have millions of devices connected to the Gateways and
    that need massive compute capabilities need to make choices on what data need
    to be processed at the Smart IoT Gateway level, and the rest of the data and processing
    needs to be performed by the Full Stack IoT Platform which typically resides in
    the cloud.


    To overcome the limitation on data storage and compute at the IoT Edge Gateway
    level, there are enterprises that are experimenting specialized models to provide
    limitless compute capability near to the Smart IoT Gateways or devices. These
    companies are trying to maintain and manage servers regionally that will ensure
    that enterprises do not need to move the workload back and forth on the Internet,
    thereby committing the latency which the application and the business teams within
    an enterprise are looking from the cloud. In addition, these companies are going
    further and allowing to connect applications and data spread across multiple cloud
    providers (e.g., `AWS`, `Azure`, or `Google Cloud`) and across private and public
    clouds. This is especially important for larger enterprises that choose to set
    up their own private cloud in a colocation environment for mission-critical or
    sensitive applications and data, and move the rest to a public cloud. The need
    to collaborate and communicate between the private cloud and the public cloud
    is enabled by these companies. One such example is `Cloud Interconnect Fabric`
    by `Equinix`.


    A number of private and public cloud providers are highly engaged in making limitless
    edge computing a success.


    `Siemens` have come up with the concept of industrial edge. Industrial edge solution
    allows enterprises to analyze all the data at the machine and at the same time
    to preprocess the data quickly and instantly. The optimized data points can then
    be transferred to the cloud where enterprises have access to more computing power
    and larger storage capacities.'
