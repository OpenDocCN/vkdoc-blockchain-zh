  trans: '

    # 平台互操作性


    物联网中的平台互操作性问题源于设备与数据所涉及的多样化操作系统（OS）、编程语言、数据结构、架构以及访问机制。目前有许多专为物联网设备开发的操作系统，例如
    `Contiki`、`RIOT`、`TinyOS` 和 `OpenWSN`，每个系统都有多个版本。此外，物联网平台提供商，如 Apple HomeKit、Google
    Brillo、Amazon AWS IoT 和 IBM Watson，也提供了不同的操作系统、编程语言和数据结构。例如，Apple HomeKit 支持其自身的开源语言
    `Swift`，Google Brillo 使用 `Weave`，而 Amazon AWS IoT 则为嵌入式 C 和 `Node.js` 提供了 SDK。这种不统一性给应用开发者开发跨平台、跨领域的物联网应用造成了障碍，也导致企业陷入供应商锁定困境。


    目前，还没有单一的解决方案可以解决平台互操作性问题。然而，`BIG IoT`（弥合物联网互操作性差距）项目旨在定义一种标准化的物联网生态系统，作为欧洲平台倡议的一部分。作为该项目的一部分，研究人员已经设计出一种物联网生态系统架构以实现平台互操作性，并且我们可以预期在未来几年内，将有一些符合该架构的平台被开发出来。在当前局限下，企业需要选择一个能为自身行业的特定用例提供全面解决方案的平台。


    ## 总结


    本章我们讨论了物联网是数字化转型的最大推动因素之一。物联网的核心在于通过网络连接设备，使它们能够相互通信，并能与众多不同的系统、应用程序等进行交互。构成物联网生态系统的四个核心元素是：


    1.  **数据收集** – 这是从设备中提取数据的过程。

    2.  **设备集成** – 这指的是整合所有设备的数据。

    3.  **实时分析** – 这指的是具备实时分析数据的能力。

    4.  **应用与流程扩展** – 这指的是将物联网数据与其它应用程序进行集成。


    我们还讨论了物联网项目失败的三个主要原因。第一个原因是缺乏针对物联网项目实施的商业战略，另外两个原因是缺乏对安全性和互操作性的周全考虑。尽管过去几年已为解决物联网领域的这三个挑战付出了大量努力，但我们距离完美状态仍然相差甚远。因此，企业在开启物联网之旅时，必须在可能的情况下部署特定解决方案，尽最大努力解决这些问题。在本章中，我们还讨论了工业物联网（IIoT），它涉及制造业中设备的自动化与数据交换，并包含信息物理系统、物联网和云计算。我们还讨论了医疗物联网（IoMT）。IoMT
    是一个由医疗设备、软件应用程序以及健康系统和服务组成的互联基础设施。在下一章中，我们将讨论制定成功商业战略的重要性，以及像物联网这样强大的技术如何帮助实现这一战略。


    脚注 1 2 3 4


    # 2. 物联网商业战略


    市场上存在着技术的演进，如移动、分析、云计算、物联网等，每一项技术都在以各自的方式重新定义着“数字化”的内涵。有趣的是，如果这些技术一次只实施一项，实现它们并不算什么难事。这些技术都很不错，并为企业创造了一些新的机遇，但任何企业踏上数字化转型之旅的主要原因，都是为了被人们视为一家伟大的公司。而要成为一家伟大的公司，它们需要打好基础，然后利用这些新技术让自己变得更加卓越。因此，在技术演进的过程中，每个人都必须明白，让一家企业变得伟大或与众不同的并非某一项单独的技术，而是这些技术的融合，为企业创造了改变以往商业模式、并在未来更具竞争力的机会。凭借当今市场上的技术，我们过去所面临的技术限制已被消除，因此企业可以更高效地运营。


    我观察到许多公司对待技术的方式是，它们发现了一项新技术，就认为自己可以制定一个新战略。于是，企业推出了移动战略、大数据战略、社交媒体战略、物联网战略、云计算战略和认知计算战略，这也是许多公司至今在每项技术上各自为政的运作方式，这是一个非常糟糕的想法。说它糟糕，并非因为这些企业想要采用新技术，而是因为在这些技术背后缺乏一个商业战略作为支撑——例如，一个移动战略并不能让一家企业取得成功。


    要让一家企业取得成功，需要一个商业战略，并且这个战略应该与技术战略相结合，而技术战略必须对该企业及其业务最有意义。例如，一个商业战略目标是提高客户满意度的零售商，可能会使用物联网解决方案来改善店内整体客户体验。


    数字化转型的核心在于改变企业传统的业务运营方式。这种变革源于数字技术的应用，无论是来自市场新进入者还是既有竞争对手——而这些竞争对手可能根本不是你以前的竞争者。这可能意味着，一家杂货店进入了服装行业，或者同一家杂货店进入了截然不同的业务领域，例如云计算，就像亚马逊那样。这类竞争对手会削弱你产品或服务组合的生存能力，或者你的市场进入策略。换句话说，它们通过为客户提供新的关系类型、新的产品或服务组合，或者比您更好的客户体验，来让你的客户比你更满意。这被称为业务颠覆。


    这意味着，企业若要在市场中保持相关性，就需要制定一个由强大技术驱动的综合性商业战略，以便能够对不断变化的市场做出反应，而物联网正是这样一种强大的技术。为了实现这一目标，每个企业都需要采用初创公司的心态，并基于此开始思考与当前不同的战略。这能使企业持续应对不断变化的市场状况。

