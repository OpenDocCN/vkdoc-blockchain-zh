- fmt: "# 7. IoT Cloud Platform\n\nA platform is a combination of software and hardware\
    \ which includes an operating environment, storage, computing power, security,\
    \ development tools, and many other common functions. Platforms abstract a lot\
    \ of common functions away from the specific application logic. For example, regardless\
    \ of whether you are trying to write an application to optimize fuel consumption\
    \ or a classroom space, a lot of the underlying technology needs are essentially\
    \ the same. Enterprises just need to focus on the specific problem they are solving\
    \ and use common capabilities for computing power or storage or security. A good\
    \ platform dramatically reduces the cost of developing and maintaining applications.\
    \ Like an operating system for a laptop, a platform does a lot of things in the\
    \ background that makes life easier and less expensive for developers, managers,\
    \ and users.\n\nA platform built for creating IoT solutions is called an IoT Platform.\
    \ IoT platforms enable enterprises to build IoT solutions faster, cheaper, and\
    \ better. There are IoT platforms of every shape and size. There are platforms\
    \ for specific industries like commercial real estate and family health. Some\
    \ focus on one type of devices; for example, there are at least a few platforms\
    \ that focus on creating IoT solutions for augmented reality headsets, and some\
    \ focus on a particular function, like manufacturing. There is a need for disparate\
    \ IoT devices to connect seurely, efficiently and interoperate with each other.\
    \ IoT platforms addresses this need and therfore have become a backbone of IoT\
    \ deployments. Though on one side the importance of IoT Platforms has increased\
    \ significantly, there are a huge number of IoT platforms that are emerging in\
    \ the market. By the end of 2019, there were around 620 publicly known IoT platforms,\
    \ which was more than twice as many as in 2015. With such an increase in the number\
    \ of IoT platforms, it becomes essential for enterprises to select the right platform\
    \ that can support them in their industry-specific use cases and at the same time\
