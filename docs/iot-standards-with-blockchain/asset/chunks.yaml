  trans: '# 10. 物联网世界中的人工智能（应用型物联网）


    自动化是指将机器应用于以前由人类执行的任务。虽然"机械化"一词通常用于指单纯用机器替代人力，但"自动化"通常意味着将机器整合到一个自主运行的系统中。自动化已经彻底改变了它所引入的领域，现代生活的方方面面几乎都受其影响。


    数字化转型与自动化相辅相成。数字化转型是指将业务流程与当前基于自动化的技术相协调，使跨企业工作流的全貌变得便捷、优化且错误更少。换言之，它将原本孤立、部门专属、手工完成的任务转变为流程化、可普遍访问且战略性自动化的模式。它通过向现有系统引入新软件来实现这一点。该软件作为已有系统的扩展，执行许多重复单调的功能，而这些功能以前需要跨多个部门的多个员工来完成。这正是业务流程滞后时间和瓶颈产生的主要原因，因为工作流的某些部分在部门队列之间停滞不前。然而，借助数字化转型技术，员工无需再花费大量时间以"旧方式"做事。在自动化技术和简化的跨部门软件的支持下，企业现在可以将注意力转移到更高层次、更高阶的工作上，从而形成精细调整的企业工作流流程，最大限度地减少浪费，并最大限度地提高资源生产力。


    世界正在走向自动化，企业在多大程度上实现自动化并没有技术上的限制。然而，在做出决策之前，始终需要分析自动化带来的收益与所付出的成本。简单来说，高度重复性的任务需要自动化。


    有多种工具和技术可以实现自动化。机器人流程自动化（RPA）就是其中之一，该术语用于指代那些部分或完全自动化人类活动中那些手动、基于规则且重复性工作的软件工具。它们通过模拟真实人类与一个或多个软件应用程序交互的动作来执行任务，例如数据输入、处理标准交易或响应简单的客户服务查询。


    机器人流程自动化工具并非要取代底层业务应用程序；相反，它们只是将人类员工的已有手动任务自动化。


    机器人流程自动化的一大关键优势在于，这些工具不会改变现有系统或基础设施。传统的自动化工具和技术使用应用程序编程接口（API）与系统交互，这意味着需要编写代码，而这可能会引发关于质量保证、代码维护以及应对底层应用程序变更的担忧。


    使用机器人流程自动化，需要对重复性任务进行脚本编写或编程，这需要一位了解如何手动完成工作的主题专家（SME）。此外，数据源和目标必须高度结构化且保持不变——机器人流程自动化工具无法运用智能来处理错误或异常情况。但即便如此，机器人流程自动化仍能带来切实、具体的益处。伦敦政治经济学院的研究表明，RPA
    可以带来 30% 到 200% 的潜在投资回报率——而这仅仅是第一年。^(²²) 如此规模的节省将令人难以抗拒。去年，德勤发现，虽然只有 9% 的受访公司实施了
    RPA，但近 74% 的公司计划在未来 12 个月内研究这项技术。


    RPA 的局限性在于，它们以静态方式模仿人类行为，缺乏人类适应变化的能力或智能。人工智能是下一项重大技术，它通过使机器能够在学习和解决问题等功能上模仿人类，从而补充了
    RPA。与只能执行重复性任务的 RPA 相比，人工智能可以从过去的数据中学习，并以更智能的方式执行任务。


    RPA 和人工智能正在融合，其所带来的成本节约和收益对企业来说极具吸引力，不容忽视。例如，机器人流程自动化（RPA）可以捕获并解释现有业务流程应用程序（如理赔处理或客户支持）的操作。一旦"机器人软件"理解了这些任务，它就可以接管它们的运行，并且其速度、准确性和持久性远超任何人类。用
    AI 算法补充 RPA 可以带来额外的好处，即机器人可以从数据和自身错误中学习，从而随着时间的推移提高其准确性和性能。


    RPA 和 AI 结合的应用范围可以扩展到降低成本以及为企业带来新的洞察，从而做出明智的决策。RPA 和人工智能的结合可以为企业提供最大程度的自动化能力，是数字化转型过程中需要考虑的最重要因素之一。这些优势在物联网环境中会进一步放大，我们将在后续章节中讨论。将物联网与人工智能相结合，可以创造出"智能机器"，它们模拟智能行为，在很少或无需人工干预的情况下做出明智的决策。其结果是加速创新，从而显著提高相关企业的生产力。物联网和人工智能市场正在同步快速发展。


    ## 机器人流程自动化


    如前所述，机器人流程自动化（RPA）是一种技术，它允许配置计算机软件或"机器人"来模拟和整合人类在与数字系统交互时的操作，以执行业务流程。RPA 利用用户界面来捕获数据并操作应用程序，就像人类所做的那样。它们进行解释、触发响应并与其他系统通信，以执行大量重复性任务。


    许多企业正在转向 RPA 以简化企业运营并降低成本。通过 RPA，企业可以自动化基于规则的单调业务流程，使业务用户能够将更多时间用于服务客户或其他更高价值的工作。被称为虚拟
    IT 支持团队的 RPA 机器人正在取代人类处理重复单调的流程。企业还通过将机器学习、语音识别和自然语言处理等认知技术注入 RPA，进一步增强其自动化能力，实现过去需要人类感知和判断能力的高阶任务的自动化。这被称为人工智能。


    区分 RPA 与业务流程管理（BPM）等企业自动化工具的关键区别在于，RPA 使用软件或认知机器人来执行和优化流程操作，而不是人工操作员。与 BPM 不同，RPA
    是一种快速且高效的解决方案，无需侵入式集成或更改底层系统，使组织能够主要通过用软件"机器人"替代人类来快速实现效率和成本节约。


    RPA 非常适合自动化，但仍需注意其局限性。例如，由于 RPA 通常与用户界面交互，即使这些界面的微小变化也可能导致流程中断。'
- fmt: "# Artificial Intelligence\n\nArtificial Intelligence (AI) is the “science\
    \ of making machines smart.” Today, we can teach machines to be like humans. We\
    \ can give them the ability to see, hear, speak, write, and move.\n\nAI is a broad\
    \ term that covers many subfields that aim to build machines that can do things\
    \ which require intelligence when done by humans. These subfields are depicted\
    \ in Figure [10-1](#517610_1_En_10_Chapter.xhtml#Fig1) and are listed as follows:\n\
    \n![../images/517610_1_En_10_Chapter/517610_1_En_10_Fig1_HTML.jpg](images/517610_1_En_10_Chapter/517610_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1  \nAI subfields\n\n**Machine learning** – Machine learning provides\
    \ systems the ability to automatically learn and improve from experience without\
    \ being explicitly programmed. It focuses on the development of computer programs\
    \ that can access data and use it to learn for themselves. Machine learning is\
    \ the ability of computer systems to improve their performance by exposure to\
    \ data without the need to follow explicitly programmed instructions. It is the\
    \ process of automatically spotting patterns in large amounts of data that can\
    \ then be used to make predictions.\n\n**Deep learning** – This is a relatively\
    \ new and hugely powerful technique that involves a family of algorithms that\
    \ processes information in deep “neural” networks where the output from one layer\
    \ becomes the input for the next one. Neural networks are computing systems vaguely\
    \ inspired by the biological neural networks that constitute animal brains. The\
    \ data structures and functionality of neural networks are designed to simulate\
    \ associative memory. Deep learning algorithms have proved hugely successful in,\
    \ for example, detecting cancerous cells or forecasting disease but with one huge\
    \ caveat: there is no way to identify which factors the deep learning program\
    \ uses to reach its conclusion.\n\n**Computer vision** – It is the ability of\
    \ computers to identify objects, scenes, and activities in images using techniques\
    \ to decompose the task of analyzing images into manageable pieces, detecting\
    \ the edges and textures of objects in an image, and comparing images to known\
    \ objects for classification.\n\n**Natural language/speech processing** – It is\
    \ the ability of computers to work with text and language the way humans do, for\
    \ instance, extracting meaning from text/speech or even generating text that is\
    \ readable, stylistically natural, and grammatically correct.\n\n**Cognitive computing**\
    \ – A relatively new term, favored by IBM, cognitive computing applies knowledge\
    \ from cognitive science to build an architecture of multiple AI subsystems, including\
    \ machine learning, natural language processing, vision, and human-computer interaction,\
    \ to simulate human thought processes with the aim of making high-level decisions\
    \ in complex situations. According to IBM, the aim is to help humans make better\
    \ decisions, rather than making the decisions for them.\n\n## Data Science\n\n\
    IoT concepts have matured in the last few years and are continuing to mature.\
    \ There has been a growing focus on the importance of security, analytics at the\
    \ edge, and other technologies and platforms that are necessary to make IoT projects\
    \ successful. However, one of the most important elements that is necessary for\
    \ an IoT use case to deliver results is data. In fact, one important element that\
    \ is missing from the phrase “Internet of Things” is perhaps the most important\
    \ piece of the puzzle – the data itself.\n\nIoT is all about data. Almost all\
    \ enterprises are out there collecting huge amounts of data to make business decisions\
    \ based on this data. The more data enterprises have, the more business insights\
    \ they can generate. Using data science, enterprises uncover patterns in data\
    \ that they did not even know existed. For example, one can discover that they\
    \ are at risk of an accident based on the data which another car in front of them\
    \ sends. Data science is being used extensively in such scenarios. Enterprises\
    \ are using data science to build recommendation engines, predict machine behavior,\
    \ and much more. All of this is only possible when enterprises have enough amount\
    \ of data so that various algorithms could be applied on that data to give more\
    \ accurate results. Data science is all about applying Artificial Intelligence\
    \ using machine learning algorithms on huge data sets to make predictions and\
    \ also to discover patterns in the data.\n\n## The Link Between Artificial Intelligence\
    \ and Data Science\n\nThe link between data science and Artificial Intelligence\
    \ is a one-to-one mapping as we discussed earlier. This means that data science\
    \ helps AIs figure out solutions to problems by linking similar data for future\
    \ use. Fundamentally, data science allows AIs to find appropriate and meaningful\
    \ information from those huge pools of data faster and more efficiently. Without\
    \ data science, AI does not exist. AI is a collection of technologies that excel\
    \ at extracting insights and patterns from large sets of data, then making predictions\
    \ based on that information.\n\nAn example is Facebook’s facial recognition system\
    \ which, over time, gathers a lot of data about existing users and applies the\
    \ same techniques for facial recognition with new users. Another example is Google’s\
    \ self-driving car which gathers data from its surroundings in real time and processes\
    \ this data to make intelligent decisions on the road.\n\nA typical non-AI system\
    \ relies on human inputs to work just like an accounting software. The system\
    \ is hardcoded with rules manually. Then, it follows those rules exactly to help\
    \ do the taxes. The system only improves if human programmers improve it. But\
    \ machine learning tools can improve on their own. This improvement comes from\
    \ a machine assessing its own performance based on new data."
  raw: '## Artificial Intelligence


    Artificial Intelligence (AI) is the “science of making machines smart.” Today,
    we can teach machines to be like humans. We can give them the ability to see,
    hear, speak, write, and move.


    AI is a broad term that covers many subfields that aim to build machines that
    can do things which require intelligence when done by humans. These subfields
    are depicted in Figure [10-1](#517610_1_En_10_Chapter.xhtml#Fig1) and are listed
    as follows:


    ![../images/517610_1_En_10_Chapter/517610_1_En_10_Fig1_HTML.jpg](images/517610_1_En_10_Chapter/517610_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    AI subfields


    **Machine learning** – Machine learning provides systems the ability to automatically
    learn and improve from experience without being explicitly programmed. It focuses
    on the development of computer programs that can access data and use it to learn
    for themselves. Machine learning is the ability of computer systems to improve
    their performance by exposure to data without the need to follow explicitly programmed
    instructions. It is the process of automatically spotting patterns in large amounts
    of data that can then be used to make predictions.


    **Deep learning** – This is a relatively new and hugely powerful technique that
    involves a family of algorithms that processes information in deep “neural” networks
    where the output from one layer becomes the input for the next one. Neural networks
    are computing systems vaguely inspired by the biological neural networks that
    constitute animal brains. The data structures and functionality of neural networks
    are designed to simulate associative memory. Deep learning algorithms have proved
    hugely successful in, for example, detecting cancerous cells or forecasting disease
    but with one huge caveat: there is no way to identify which factors the deep learning
    program uses to reach its conclusion.


    **Computer vision** – It is the ability of computers to identify objects, scenes,
    and activities in images using techniques to decompose the task of analyzing images
    into manageable pieces, detecting the edges and textures of objects in an image,
    and comparing images to known objects for classification.


    **Natural language/speech processing** – It is the ability of computers to work
    with text and language the way humans do, for instance, extracting meaning from
    text/speech or even generating text that is readable, stylistically natural, and
    grammatically correct.


    **Cognitive computing** – A relatively new term, favored by IBM, cognitive computing
    applies knowledge from cognitive science to build an architecture of multiple
    AI subsystems, including machine learning, natural language processing, vision,
    and human-computer interaction, to simulate human thought processes with the aim
    of making high-level decisions in complex situations. According to IBM, the aim
    is to help humans make better decisions, rather than making the decisions for
    them.


    ### Data Science


    IoT concepts have matured in the last few years and are continuing to mature.
    There has been a growing focus on the importance of security, analytics at the
    edge, and other technologies and platforms that are necessary to make IoT projects
    successful. However, one of the most important elements that is necessary for
    an IoT use case to deliver results is data. In fact, one important element that
    is missing from the phrase “Internet of Things” is perhaps the most important
    piece of the puzzle – the data itself.


    IoT is all about data. Almost all enterprises are out there collecting huge amounts
    of data to make business decisions based on this data. The more data enterprises
    have, the more business insights they can generate. Using data science, enterprises
    uncover patterns in data that they did not even know existed. For example, one
    can discover that they are at risk of an accident based on the data which another
    car in front of them sends. Data science is being used extensively in such scenarios.
    Enterprises are using data science to build recommendation engines, predict machine
    behavior, and much more. All of this is only possible when enterprises have enough
    amount of data so that various algorithms could be applied on that data to give
    more accurate results. Data science is all about applying Artificial Intelligence
    using machine learning algorithms on huge data sets to make predictions and also
    to discover patterns in the data.


    ### The Link Between Artificial Intelligence and Data Science


    The link between data science and Artificial Intelligence is a one-to-one mapping
    as we discussed earlier. This means that data science helps AIs figure out solutions
    to problems by linking similar data for future use. Fundamentally, data science
    allows AIs to find appropriate and meaningful information from those huge pools
    of data faster and more efficiently. Without data science, AI does not exist.
    AI is a collection of technologies that excel at extracting insights and patterns
    from large sets of data, then making predictions based on that information.


    An example is Facebook’s facial recognition system which, over time, gathers a
    lot of data about existing users and applies the same techniques for facial recognition
    with new users. Another example is Google’s self-driving car which gathers data
    from its surroundings in real time and processes this data to make intelligent
    decisions on the road.


    A typical non-AI system relies on human inputs to work just like an accounting
    software. The system is hardcoded with rules manually. Then, it follows those
    rules exactly to help do the taxes. The system only improves if human programmers
    improve it. But machine learning tools can improve on their own. This improvement
    comes from a machine assessing its own performance based on new data.'
  trans: "\n# 人工智能\n\n人工智能（AI）是“让机器变聪明的科学”。如今，我们可以教机器像人类一样行事，赋予它们看、听、说、写和移动的能力。\n\n\
    人工智能是一个涵盖众多子领域的广义术语，这些子领域旨在构建能够完成人类需要智能才能完成的任务的机器。这些子领域如图 10-1 所示，并列举如下：\n\n![../images/517610_1_En_10_Chapter/517610_1_En_10_Fig1_HTML.jpg](img/517610_1_En_10_Fig1_HTML.jpg)\n\
    \n图 10-1  \n人工智能子领域\n\n**机器学习** – 机器学习使系统能够自动从经验中学习和改进，而无需进行显式编程。它专注于开发能够访问数据并利用数据自行学习的计算机程序。机器学习是计算机系统通过接触数据来提升性能的能力，无需遵循显式编程指令。这是一个自动从海量数据中发现模式的过程，这些模式随后可用于进行预测。\n\
    \n**深度学习** – 这是一种相对较新且非常强大的技术，涉及一系列算法，这些算法在深度“神经”网络中处理信息，其中一层的输出成为下一层的输入。神经网络是受构成动物大脑的生物神经网络启发而设计的计算系统。神经网络的数据结构和功能旨在模拟联想记忆。深度学习算法已被证明在例如检测癌细胞或预测疾病方面非常成功，但有一个重要的前提：无法确定深度学习程序依据哪些因素得出其结论。\n\
    \n**计算机视觉** – 这是计算机识别图像中物体、场景和活动的能力，它使用技术将分析图像的任务分解为可管理的部分，检测图像中物体的边缘和纹理，并将图像与已知物体进行比较以进行分类。\n\
    \n**自然语言/语音处理** – 这是计算机像人类一样处理文本和语言的能力，例如从文本/语音中提取含义，甚至生成可读、风格自然且语法正确的文本。\n\n\
    **认知计算** – 这是一个相对较新的术语，受到 IBM 的青睐。认知计算应用认知科学的知识来构建包含多个人工智能子系统的架构，包括机器学习、自然语言处理、视觉和人机交互，旨在模拟人类思维过程，从而在复杂情境中做出高级决策。根据\
    \ IBM 的说法，其目的是帮助人类做出更好的决策，而不是替他们做决策。\n\n## 数据科学\n\n物联网的概念在过去几年中已经成熟，并且仍在继续成熟。人们越来越关注安全性、边缘分析以及其他对物联网项目成功至关重要的技术和平台的重要性。然而，物联网用例取得成果所需的最重要元素之一是数据。事实上，“物联网”这个短语中缺失的一个关键元素，或许是整个拼图中最重要的一块——数据本身。\n\
    \n物联网的核心就是数据。几乎所有企业都在收集海量数据，并基于这些数据做出业务决策。企业拥有的数据越多，就能产生越多的业务洞察。利用数据科学，企业可以发现数据中那些甚至未曾知晓存在的模式。例如，人们可以根据前方车辆发送的数据，发现自己面临事故风险。在这样的场景中，数据科学被广泛应用。企业利用数据科学构建推荐引擎、预测机器行为等等。这一切只有在企业拥有足够数量的数据时才有可能实现，从而可以在这些数据上应用各种算法，以获得更准确的结果。数据科学的核心就是利用机器学习算法，在庞大的数据集上应用人工智能，进行预测并发现数据中的模式。\n\
    \n## 人工智能与数据科学之间的联系\n\n正如我们之前讨论的，数据科学与人工智能之间的联系是一一对应的。这意味着数据科学通过关联相似的数据以供将来使用，帮助人工智能找出问题的解决方案。从根本上说，数据科学使人工智能能够更快、更高效地从那些庞大的数据池中找到恰当且有价值的信息。没有数据科学，人工智能便不复存在。人工智能是一系列技术的集合，这些技术擅长从大量数据集中提取洞察和模式，然后基于这些信息进行预测。\n\
    \n一个例子是 Facebook 的面部识别系统，它会随着时间的推移收集大量现有用户的数据，并将相同的技术应用于新用户的面部识别。另一个例子是谷歌的无人驾驶汽车，它实时收集周围环境的数据，并处理这些数据以在道路上做出智能决策。\n\
    \n一个典型的非人工智能系统，如同会计软件一样，依赖人工输入来工作。系统通过手动硬编码规则。然后，它严格遵循这些规则来帮助处理税务。系统只有在人类程序员改进它时才能得到提升。但机器学习工具可以自我提升。这种提升源于机器根据新数据评估自身性能。\n"
- fmt: '#### Importance of Quality Data


    The key to AI success is having a high-quality data. AI can provide superior results
    only if it can learn from superior and high-quality data very specific to the
    use case enterprises are automating using AI. As an example, to solve a physics
    problem, if you provide mathematics-related data to an AI system, then results
    would not be encouraging. Your systems will learn something, but efforts probably
    would not help the system answer your test questions correctly. Another example,
    if you train a computer vision system for autonomous vehicles with images of sidewalks
    mislabeled as streets, the results could be disastrous. In order to develop accurate
    results using machine learning algorithms, you will need high-quality training
    data. To generate high-quality data, you will need skilled annotators to carefully
    label the information you plan to use with your algorithm.


    If data is not good, then AI will fail in providing the desired results, because
    AI uses machine learning to learn from the data, and therefore enterprises need
    quality data. If data is not good, AI systems will not learn good and therefore
    will not give good results. This means that organizations using AI must devote
    huge amounts of resources to ensuring they have sufficient amounts of high-quality
    data so that their AI tools are giving desired results. This does not necessarily
    mean that enterprises need a fully functional enterprise-level big data platform
    to embark their journey on Artificial Intelligence. Artificial Intelligence can
    work on a subset of quality data specific to the use case, and enterprises can
    create a data store that can cater to the specific use case and use this data
    to train systems.


    Today, almost all products available in the market, irrespective of what the tool
    specializes in, claim to have AI features built in the tool, which has caused
    a lot of confusion in the technology market on which tools to use for AI-driven
    use cases. However, one needs to understand that almost all tools whose primary
    tool capability is not AI or machine learning provide only generic AI capabilities
    and can perform very limited AI tasks. If one needs to apply Artificial Intelligence
    within their enterprises across a broad spectrum of IoT use cases, then they need
    to look at IoT Cloud Platforms that can perform AI on IoT data for that specific
    use case. Azure IoT Platform is one such example.


    ## Artificial Intelligence and IoT


    We discussed in previous sections that RPA uses predefined rules to perform activities,
    and since the last few years, RPA has been highly successful for several use cases.
    Even if we consider some of the world’s largest problems solved by organizations
    like NASA, it had been achieved with traditional rules or theories. As an example,
    for flying from Earth to Mars, NASA does not aim for where Mars is currently,
    it aims to find out where Mars will be nine months later, since it takes nine
    months for astronauts to travel from Earth to Mars. The rule which NASA applies
    to predict the location of Mars after nine months is based on the 300-year-old
    Newton’s law of motion. Newton’s theory works for all planets in our solar system,
    except Mercury. Mercury is another story anyways because it is too close to the
    sun, etc., and other reasons. A similar case is with the stock market. A predefined
    rule such as “buy stocks if the short-term average of the stock cuts over the
    long-term average of the stock” works quite well. Such predefined rules used to
    be the norm in the last few years when AI was not part of the enterprise strategy,
    which is not the case anymore. AI is becoming mainstream for most organizations,
    and there are more and more use cases that are proving the benefits of AI. Because
    of this renowned focus, enterprises have started moving away thinking about traditional
    rules and rule-based systems. The new norm is – give me data and I will create
    models by learning from the data, and the more I learn, the better the models
    I will create. This is what Artificial Intelligence is all about. For IoT use
    cases, Artificial Intelligence is amplifying benefits to such an extent that enterprises
    are able to exceed their profit margins, while many other enterprises are entering
    into new business domains which they never had thought about in the past.


    IoT creates a lot of data. Devices send large volumes and varieties of information
    at high speed, which makes IoT data management very complex. We are going to discuss
    in detail about data management in IoT in Chapter `11`. Managing such complex
    IoT data requires robust and tailored data architectures, policies, practices,
    and procedures that properly meet the IoT data life cycle needs. Traditional big
    data approaches and infrastructure are not sufficient, and enterprises need to
    validate how IoT Cloud Platforms or IoT Gateways are addressing IoT-specific data
    challenges during the evaluation process.


    Scalability and agility is one of the biggest concerns when it comes to IoT data.
    The sheer size of IoT data traffic and its immediacy make data management complex
    for IoT use cases. Some of the key challenges which IoT Cloud Platforms or IoT
    Gateways need to address from an IoT data perspective are listed as follows:


    *   Given that the number of IoT devices will increase with time, say from 40
    to 400,000 devices, how will IoT data architecture accommodate this?


    *   Most of the IoT data has a short shelf life – this means that actions need
    to be taken right after devices generate the data. As an example, if a device
    records very high temperature in a furnace, the furnace needs to be immediately
    switched off, and this temperature data is useful only if actions are taken at
    that point in time. Enterprises need to understand the IoT solutions provided
    by IoT product vendors for real-time processing and analysis.


    *   Once IoT data is received, how will it be stored ensuring enough space for
    new information?


    *   How will inputs and outputs flow through devices without becoming clogged?


    *   For IoT use cases where device data need to be combined with non-device data
    (e.g., metadata about users and passwords), what solutions exist that can combine
    such disparate data to make the data meaningful?


    ### Lessons Learned in Applying AI in IoT Use Cases (Applied IoT)


    Artificial Intelligence is highly dependent on quality data to make right predictions.
    Once enterprises have the enough quality data, the way AI works is that a machine
    learning model is given a set of data. With this first set of data, the model
    performs computations and predicts an outcome. If the outcome is wrong, it readjusts
    the rule and applies the rule on the second set of data and predicts the outcome.
    This cycle goes on until the outcome is correct. Once the outcome is correct,
    data is fed multiple times again to determine the accuracy of the outcome. After
    applying the rule on thousands of data sets and consuming loads and loads of data,
    a model that does the right predictions is created. This is what machine learning
    is all about.


    Applying AI in IoT use cases is not a very straightforward exercise and can lead
    into several challenges. Several times, Applied IoT can become a tedious and lengthy
    project if not planned well. There are four key lessons that I have personally
    learned in Applied IoT use cases, which are depicted in Figure `10-2`.


    ![../images/517610_1_En_10_Chapter/517610_1_En_10_Fig2_HTML.jpg](images/517610_1_En_10_Chapter/517610_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Applied IoT use case focus areas'
  raw: '#### Importance of Quality Data


    The key to AI success is having a high-quality data. AI can provide superior results
    only if it can learn from superior and high-quality data very specific to the
    use case enterprises are automating using AI. As an example, to solve a physics
    problem, if you provide mathematics-related data to an AI system, then results
    would not be encouraging. Your systems will learn something, but efforts probably
    would not help the system answer your test questions correctly. Another example,
    if you train a computer vision system for autonomous vehicles with images of sidewalks
    mislabeled as streets, the results could be disastrous. In order to develop accurate
    results using machine learning algorithms, you will need high-quality training
    data. To generate high-quality data, you will need skilled annotators to carefully
    label the information you plan to use with your algorithm.


    If data is not good, then AI will fail in providing the desired results, because
    AI uses machine learning to learn from the data, and therefore enterprises need
    quality data. If data is not good, AI systems will not learn good and therefore
    will not give good results. This means that organizations using AI must devote
    huge amounts of resources to ensuring they have sufficient amounts of high-quality
    data so that their AI tools are giving desired results. This does not necessarily
    mean that enterprises need a fully functional enterprise-level big data platform
    to embark their journey on Artificial Intelligence. Artificial Intelligence can
    work on a subset of quality data specific to the use case, and enterprises can
    create a data store that can cater to the specific use case and use this data
