    # 物联网中的安全


    企业中的 OT 系统就如同收银机——无论是发电机组、汽车制造单元、炼油厂还是化学研发，OT 系统都在为企业创造财富。因此，传统上所有关注点都集中在确保生产最终产品的
    OT 系统设计得极其安全、高效且具备"长生命周期任务"的生产力上。长生命周期任务意味着关键基础设施的 OT 系统需要全年无休、每天 24 小时连续运行数十年。由于这种需求，重大的补丁或升级周期可能多年都不会发生，因此系统中存在的漏洞类型会长期存在。


    在 IT 时代，我们已遭遇过多次安全事件。每当出现新漏洞，制造商就会推送补丁进行修复。这是一种被动响应方式——每次新攻击发生后，企业通过取证调查，最终打补丁并持续监控以防止问题重现。然而，这种方法在
    OT 世界中行不通。一个小事故不仅可能导致工厂停产造成数百万美元损失，还可能因网络攻击导致人员伤亡和意外事故。另一方面，OT 控制系统中常加载着需要保护的商业机密（如配方）。这也是为什么
    OT 安全在物联网安全关注度中处于最高优先级的原因之一。与 IT 世界不同，OT 系统存在以下特点：


    *   未从网络攻击中吸取教训

    *   不像 IT 系统那样进行升级

    *   基础设施更陈旧、控制措施更少，因为 OT 系统从未被设计成暴露于外部世界

    *   缺少为应对网络攻击而开发的工具和系统


    这是 OT 世界当前面临的最大挑战。显然，在 IT-OT 融合之后，网络攻击者将试图通过 IT 系统进入 OT 系统。这是当今物联网行业面临的最大挑战。


    过去我们见证了 IT 与 OT 融合的仓促做法。一个例子是 2008-2011 年的智能电表支付浪潮。当时行业大量投资于运营侧的新型技术。无线系统使得收集信息以降低运营成本成为可能，从而实现了运营效率。在此期间，OT
    系统的安全性被搁置，随后行业便出现了针对智能电表的网络攻击。例如，有人通过在电表上放置大型磁铁来改变智能电表设置，使读数不再增加。这就是物联网演化过程中网络安全被视为次要需求的案例，一些公用事业提供商因此损失了数百万美元。


    你在启动物联网之旅时，可以选择一开始就考虑网络安全，也可以以后再做。不幸的是，事后补救可能会导致灾难性局面，比如完全关闭业务，因为无疑会有许多不可预见的后果最终导致灾难。


    目前行业对物联网的安全意识水平仍然差异很大。根据我与多家 OT 企业的交流经验，近 40%的企业认为与外部威胁隔离就是安全的解决方案，因此它们倾向于与外部世界断开连接。这些企业将隔离视为防范网络风险的策略，因此从未能够利用市场上现有的技术。它们面临着失去业务的风险，因为存在更优、更便宜的运营方式，而竞争对手很可能已经采用了这些方式。


    在光谱的另一端，有少数企业（约 10%）对 IT 行业的进步具有认知并保持警惕，它们年复一年地提升网络安全态势，以领先于新兴威胁。还有一些组织介于这两类之间——它们属于受监管行业，必须在使命中满足合规要求。它们提升网络安全态势仅仅是为了满足合规需求。由于这些企业没有考虑合规之外的网络安全问题，它们极易沦为网络攻击的受害者。


    IT 世界拥有成熟的网络安全实践，随着物联网在过去几年中的普及，这些实践在 OT 世界中也日趋成熟。因此，当今物联网领域的网络安全实践能够解决许多复杂问题，保护物联网世界中的关键基础设施和数据。


    物联网是未来的现实。企业若想达到更高成熟度、实现更高生产力、交付更好更快的成果并降低成本，将物联网应用于其商业模式是唯一选择。许多企业已经认识到这一事实；然而，在一个从未从网络安全角度思考过
    OT 系统的互联世界中，企业面临最高程度的风险。我经常遇到两类企业——一类是通过牺牲安全来追求生产力成果，另一类则根本不想向物联网迈进。这两种选择都不正确。唯一的选择是正视网络安全，采取行动同时保护
    IT 和 OT，这是每个企业的使命。


    在大多数针对 OT 系统的网络攻击案例中，黑客通过反复试验来破解系统。他们只是看看能远程访问什么，并试图找到进入运营系统的方法。我也见过相反的情况——在某些案例中，攻击从
    OT 侧发起，然后被攻破的系统被用来获取 IT 系统的访问权限。我称之为"枢纽攻击"，这类攻击正呈上升趋势。


    正如我们迄今所讨论的，物联网中的安全不能将 IT 和 OT 割裂开来。它们需要协同运作以防止网络攻击，这就引出了下一个问题：保护物联网系统安全意味着什么？如图
    8-1 所示，有效保护物联网生态系统中的关键基础设施需要三个主要组件。


    ![../images/517610_1_En_8_Chapter/517610_1_En_8_Fig1_HTML.jpg](img/517610_1_En_8_Fig1_HTML.jpg)


    **图 8-1** 保护 OT 基础设施的组件


    **工业思维**——在物联网中，工业思维排在首位。这意味着踏上物联网之旅的企业需要考虑 OT 系统的使命等因素，这些使命通常围绕零停机时间和安全性作为实践。它还关注工程纪律和质量焦点——这通常是设计这些工业系统时的核心考量，并认识到这些系统是企业的"收银机"。

