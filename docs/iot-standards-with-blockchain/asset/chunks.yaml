  trans: '

    # 设备维护


    设备维护涉及提升设备性能或消除设备技术问题的流程。这包括远程安装软件补丁或修复程序，或在无需人工干预的情况下，同时向所有物联网设备推送升级。


    设备维护还涉及在设备故障时推荐或执行修复操作。当设备停机时，可从不同来源实时收集、聚合和分析故障数据，物联网平台可自动触发修复操作，或在必要时向技术人员提出行动建议。企业需要验证物联网平台提供商在这方面所提供解决方案的完备性。


    对于资产密集型行业而言，在确保关键任务工厂和设备以最高效率和最长正常运行时间运行，并履行客户服务承诺方面，面临着诸多挑战，因为即使是服务中最微小的中断也可能导致高昂的罚款，甚至更糟的是客户流失。企业需要了解其产品和资产的运行状况，以便优化其使用并更好地预测问题和故障。这就是远程监控和维护在物联网生态系统中发挥重要作用的主要原因。监控和诊断不仅使企业能够更好地监控其产品和工厂机械的正常运行，还能防止代价高昂的故障和维修，并改善客户服务。


    ## 应用使能平台（具有卓越应用开发能力的物联网平台）


    物联网平台所需的一个非常重要的特性是支持开发者轻松创建物联网应用的能力。企业需要选择一个具有卓越应用开发能力的物联网平台，该平台应能提供在最短时间内启动并运行物联网应用所需的全套工具。该平台应具备使开发者能够快速创建、测试和部署物联网应用或服务的解决方案。平台应提供预编写的应用程序，开发者可用其来加速开发。这些平台通常应包括软件和设备，以及更易于启动和运行物联网应用的开发和部署解决方案。其好处在于，此类平台负责通常由开发者完成的开发、网络配置和安装工作，这有可能节省大量的时间和开发精力。


    选择一个具有卓越应用开发能力的物联网平台，可以通过缩短创建物联网解决方案或产品所需的时间并降低总拥有成本，从而简化物联网用例实现中的许多复杂性。


    选择物联网平台时需验证的另一个重要方面是平台连接和集成其他企业应用程序的能力，例如 ERP（企业资源规划）或 MES（制造执行系统）应用。制造执行系统是制造过程中用于跟踪和记录原材料转变为成品过程的计算机化系统。ERP
    是一个自动化生产、销售报价和会计等业务功能的系统。


    物联网平台中的应用开发能力影响价值实现。需要谨慎选择物联网平台，同时考虑到开发者使用该平台进行开发的便捷性。除了开发的便捷性和与其他应用集成的能力外，可扩展性也至关重要。例如，该平台应能支持开发者创建固定应用，如基于
    Web 的应用以及移动或桌面应用。


    选择具有卓越开发能力的平台可以缩短上市时间并降低开发风险。有许多成熟的物联网平台供应商提供有价值的服务，可简化物联网应用的开发。它们为运动传感器等流行设备提供了预构建模型，同时为独特用例的自定义模块设计提供了平台。与传统自定义编码相比，使用这些平台，开发者可以轻松连接不同的物联网设备和服务，确定它们的交互方式，并更快地构建物联网应用。


    总而言之，选择平台时，三个主要的应用考量因素是：


    1.  开箱即用提供哪些应用程序？

    2.  应用开发环境如何？

    3.  有哪些常见的企业应用接口？


    许多平台将包含一个或多个可能具有开箱即用价值的应用程序，例如 iPhone 附带的股票市场或天气应用程序。有时，最简单的应用程序是最受欢迎和最有效的。一位商店经理告诉我们：“如果能有一个应用程序，只需告诉我商店里哪些设备是开启或关闭的，我就很高兴了。”


    ## 可扩展性


    可扩展性是每个企业在选择物联网平台时需要彻底验证的另一个重要特性。在物联网平台的背景下，可扩展性主要来自三个方面。


    首先是物联网平台接入大量使用不同连接协议的设备的能力，其次是物联网平台存储海量数据的能力，第三是执行大规模分析处理的能力。这三个要素共同构成了物联网项目成功的核心。


    ### （大规模）设备接入能力


    如果企业决定通过物联网平台进行设备接入，那么选择一个能够根据需要接入尽可能多设备的平台至关重要，其上限可由企业业务及其所在行业决定。例如，特斯拉在 2004
    年有数千台物联网设备，但如今其单位内拥有超过一百万台设备，任何像特斯拉这样规模的公司都会有类似数量的设备。为此类行业选择的物联网平台应具备一次扩展并连接数百万台设备的能力。再举一个例子，智能建筑可能需要数千个小型的物联网设备（如智能灯泡）接入物联网平台，而在工厂环境中，许多用例可能需要数百个大型物联网设备。


    如今，许多商业级物联网平台都能灵活地在其平台上按需接入尽可能多的设备。


    除了在平台上接入多个物联网设备的能力之外，执行设备管理的便捷性也是选择物联网平台时需要验证的关键因素。

    '
- fmt: '# Data Storage and IoT Analytics


    From a scalability perspective, another most important and mandatory capability
    that is expected from an IoT Platform is the scalability of data storage. Scalability
    is key to handling the explosive growth in data since IoT is all about data generated
    by devices which is huge. IoT platforms must have superior data storage and analytic
    capabilities. The objective of IoT analytics is to gain value from large volumes
    of data generated by devices connected via the Internet of Things (IoT).


    With the cloud, data storage is available on demand, and hence enterprises need
    to be least bothered about data storage. Almost all IoT Platform providers use
    the cloud for data storage, and therefore by default there will be enough storage
    to collect and process massive IoT data streams.


    A `data lake` is a centralized repository that allows you to store all your structured
    and unstructured data at any scale.


    `Data swamp` is data which is of limited use.


    However, in an IoT ecosystem, storage is not a challenge, but the ability of IoT
    Platforms to have solutions that can store the right data in the right way is
    essential. In an IoT architecture, there are thousands of sensors collecting huge
    volumes of both structured and unstructured data, such as temperature reading
    as well as video and audio footage. Almost all IoT Platforms use data lakes to
    store this raw data. The benefits of data lakes are that they can grow indefinitely,
    integrate with many processing and analytics tools, and provide a relatively low
    cost of storage. However, to enable analytics on IoT data, organizations need
    to plan their storage carefully. Just dumping data into a data lake with no prior
    treatment can create a data swamp. Enterprises need to ensure that they save only
    the required data to a data lake, and secondly data should be stored in a format
    that enables analysis without the need to perform heavy corrections on the data.
    The IoT Platform should be able to support such a need.


    Though we speak about data storage at the IoT Platform level, it is not always
    necessary that enterprises should transfer all data (processing work) to the cloud.
    In many scenarios, a combination of the IoT Platform in the cloud and the Smart
    IoT Gateway is put to action to strike the right balance between scale, cost,
    latency, and data privacy. There may be some data storage and analytics processes
    that need to happen at Smart Gateways and the rest in the cloud or vice versa.
    With that in mind, enterprises need to make sure that they have connected systems
    that can support such hybrid workflows to enable seamless migration from the edge
    (Smart IoT Gateway) to the cloud (IoT Cloud Platform).


    Irrespective of where data storage and analytics happen (i.e., at an IoT Gateway
    level or IoT Platform level), an IoT platform needs a robust data processing engine
    (pipeline) that can perform data curation (cleaning, enrichment, transformation)
    functions on streaming data. The data pipeline needs to be well balanced in its
    ability to sustain a continuous flow of streaming data. It must also be able to
    handle situations such as a temporary surge in the data, performance issues, and
    disruptions in downstream systems.


    ## Proof of Concept (POC)


    After shortlisting a platform vendor, it is essential that enterprises run a few
    proofs of concepts (POCs) to test the platform performance and capabilities using
    different technical criteria, such as the amount and quality of functionalities,
    tools and services, usability, security, and interoperability. The cost of the
    platform should also be validated in this step.


    Instead of asking platform vendors to present some hypothetical capabilities,
    enterprises should implement POCs after setting up a real-world testbed which
    resembles their actual product or production process and contains actual data
    sets from their products or factories.


    In essence, enterprises need to create POCs to explore and “play” with the platforms
    to see how they work and what advantages they can get from them based on real
    usage scenarios.


    ## Summary


    This chapter primarily discussed about choosing the right IoT Cloud Platform for
    enterprises to be successful in their IoT journey. Though there is no easy answer
    to which IoT cloud platform to choose, this chapter provided a guidance toward
    the same based on the six general characteristics and four core capabilities:


    *   The six general characteristics to be validated while shortlisting an IoT
    Cloud Platform include reliability, availability, and scalability plus the ability
    of the cloud provider to support disaster recovery. Security is another important
    element to be validated. The pricing model and the certification and standards
    possessed by the platform are the other two areas to be validated.


    *   The four core capabilities that guide enterprises in choosing an IoT platform
    are connectivity, Device Management, application enablement platform, and scalability
    (device level, data storage, and analytics).


    Based on the preceding guidance, enterprises can choose the right IoT Cloud Platform.


    In the next chapter, we will discuss about the importance of security and its
    applicability at each layer in an IoT Standards Reference Model.


