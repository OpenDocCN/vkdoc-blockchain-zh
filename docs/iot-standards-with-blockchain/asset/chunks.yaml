  trans: '

    ### API 安全


    应用程序（或编程）接口（API）将设备与整个物联网生态系统连接起来。物联网 API 是物联网设备与互联网和/或物联网网络内其他元素及系统之间的交互点。


    API 安全关注的是通过连接至互联网的 API 进行数据传输的过程。企业必须保护从物联网设备发送到智能物联网网关、再到物联网云平台或后端系统的数据完整性，并确保仅有经过授权的设备和应用程序才能与
    API 通信。


    以下列出了企业寻求加强 API 安全性时最常见的几种方式示例：


    *   **使用令牌** – 建立可信身份，然后通过分配给这些身份的令牌来控制对服务和资源的访问。

    *   **使用加密和签名** – 使用 TLS 等方法对数据进行加密。传输层安全是一种密码协议，旨在为计算机网络提供通信安全。带有签名的设备将确保正确的用户在解密和修改数据。

    *   **升级与漏洞识别** – 企业需要定期升级其操作系统、网络、驱动程序和 API 组件。他们需要了解所有组件如何协同工作，并识别可能被用于入侵 API
    的薄弱环节。一些企业使用嗅探器来检测安全问题并追踪数据泄露。嗅探是监控和捕获通过特定网络的所有数据包的过程。

    *   **使用配额和限流** – 企业通常需要设置 API 可被调用的频率配额，并追踪其历史使用情况。API 调用次数过多可能表明其正在被滥用。这也可能是编程错误，例如在无限循环中调用
    API。企业需要制定限流规则，以保护 API 免受流量激增和拒绝服务攻击。

    *   **使用 API 网关** – 建议将 API 网关作为 API 流量执行的主要节点。一个好的网关将能够认证流量，同时控制和分析 API 的使用方式。


    ### 智能物联网网关安全


    物联网网关是一种解决方案，能够实现与设备的通信，无论其协议如何；同时，它还能作为资源受限的物联网设备、传感器和执行器的安全代理，这些设备因缺乏处理复杂加密安全功能（如安全访问认证和加密）所需的
    CPU 算力、电池续航和存储空间而需要保护。然而，在物联网环境中，不仅设备本身，网关自身也容易受到各种安全威胁，因为网关暴露于互联网。如果网关不安全，一旦网关被攻破，所有配套的安全技术都将变得毫无用处。企业需要确保部署的智能物联网网关具有万无一失的安全控制措施，并且至少具备端点安全控制功能，例如身份与访问控制、无线升级以及威胁检测功能。


    #### 身份与访问控制 (IAC)


    身份管理和访问控制是管理对企业资源访问权限、确保系统和数据安全的规程。作为安全架构的关键组成部分，IAC 有助于在授予设备或用户对系统和数据的适当访问级别之前，验证其身份。


    网关在参与数据交换之前，需要有一个信任根来在网络中标识自身。网关应被设计为信任锚点，并配备基于密钥的访问控制，以授权经过授权的用户和设备进行访问。为了保护秘密（密钥和证书），应实施安全存储。


    通常情况下，网关暴露于极端的室外环境。防篡改硬件可以保护其免受物理损坏。


    #### 无线升级与安全启动


    无线升级可确保网关运行的是最新的软件和固件，且无常见漏洞和风险。安全启动使网关能够启动其完整性和真实性已通过加密验证的固件映像。此预防措施可防止网关使用恶意固件启动。


    #### 可视性与威胁检测


    细粒度的事件日志记录为网关中运行的程序提供了足够的可视性，这对于安全审计非常有用，并且还能自动进行威胁检测和故障排除。在访问可能受限的物联网环境中，使用机器学习或人工智能来自动化威胁检测更为实用。机器学习使企业能够识别行为基线，并检测甚至预防异常情况，在选择物联网网关之前，应对此类功能进行验证。


    ### 补丁管理/持续软件更新


    提供通过网络连接或自动化方式更新设备和软件的方法至关重要。协调漏洞披露对于尽快更新设备也很重要。同时还应考虑设备生命终结策略。


    ### 硬件安全


    端点加固包括使设备具有防篡改或篡改可察觉的特性。当设备将在恶劣环境中使用或无法进行物理监控时，这一点尤其重要。


    ### 物联网平台安全


    几乎所有大型物联网平台供应商，如 AWS、Google 或 Azure，都已通过最全面的安全态势保护其平台，并在平台层面内置了保护功能。这些平台构建于安全且经过验证的云基础设施之上，并且可以扩展以支持数十亿台设备和数万亿条消息。


    使用这些产品的企业需要确保充分利用这些供应商提供的安全功能，来服务于其物联网生态系统。

    '
- fmt: '# Securing IoT Using Blockchain


    A blockchain is a distributed ledger, similar to a database, but rather than being
    controlled by a central authority (i.e., a firm like Google, small company, or
    individual), the ledger is dispersed across multiple computers, which can be located
    all over the world and run by anyone with an Internet connection.


    We will discuss in Chapter [9](#517610_1_En_9_Chapter.xhtml) about using blockchain
    for making a business impact rather than from a cyber security angle. However,
    Blockchain does offer an intriguing solution for IoT security as well. Blockchain
    contains strong protections against data tampering, locking access to Internet
    of Things devices, and allowing compromised devices in an IoT network to be shut
    down. However, IoT-blockchain technology is now in its initial stages, and a few
    major technology companies have begun to seek opportunities in this space. For
    example, the IBM Blockchain Platform allows enterprises to extend blockchain into
    cognitive IoT, a set of technologies that combines IoT and cognitive computing.


    The adoption of IoT-blockchain technology is not yet widespread due to technical
    concerns and operational challenges. Scalability and storage are major issues
    in blockchain systems that maintain a large centralized ledger, and storing the
    ledger on edge nodes is considered inefficient since devices are not yet capable
    of storing large volumes of data or handling relatively large amounts of computational
    power. These factors are some of the challenges for shifting IoT networks onto
    blockchain platforms.


    Though the concept is still in its infancy, it is likely to have a massive impact
    in the coming years. The implementation of standard security rules and regulations
    will encourage the adoption of IoT-blockchain technology. By introducing new standards
    of data privacy and peer-to-peer communication, blockchain can add a new degree
    of security to the Internet-enabled devices. Peer-to-peer communication refers
    to the transmission between two peer devices or systems over a network.


    Because of these reasons, enterprises that have embarked on their IoT journey
    should adopt security by design principles to secure their IoT ecosystem rather
    than using blockchain.


    ## Summary


    This chapter is about security. We discussed that traditionally OT systems have
    not considered cyber security while designing and implementing their systems.
    However, with IoT, IT and OT systems are coming together, and hence cyber securing
    both IT and OT becomes extremely important.


    We spoke about the importance of security by design in IoT, which is the inclusion
    of security design principles, technology, and governance at every stage of the
    IoT journey and within all layers of the IoT Standards Reference Model.


    The first aspect of security by design is to procure devices which are built with
    security features such as multifactor authentication or biometrics. The second
    element is securing the application programming interfaces (APIs) – it is essential
    for enterprises to protect the integrity of data being sent from IoT devices to
    Smart IoT Gateways and the IoT Cloud Platform or back-end systems and ensure only
    authorized devices and applications communicate with APIs. Using a standard secured
    API Gateway is one of the best ways to secure APIs. The last aspect we discussed
    is that enterprises should deploy Smart IoT Gateways, which have foolproof security
    controls, and at a minimum the Gateways have endpoint security controls such as
    identity and access control, over-the-air updates, and threat detection feature.
    Similarly, enterprises need to deploy the IoT Cloud Platform with built-in security
    features.


    In the next chapter, we will understand about Blockchain in detail and how it
    is beneficial for IoT use cases. We will also discuss about the different blockchain
    patterns that enterprises can utilize for their IoT use case implementation.


    # Part III: AI and Blockchain As Enablers for IoT


    AI and Blockchain As Enablers for IoT


    This part of the book discusses about the importance of Artificial Intelligence
    and Blockchain for IoT use cases.


    We will discuss the importance of using a private blockchain for IoT use cases
    along with the five IoT-Blockchain implementation patterns, using which enterprises
    can enable seamless communication between IoT devices, Smart IoT Gateways, and
    IoT platforms to blockchain.


    Artificial Intelligence is one of the very important features within an IoT Standards
    Reference Model. The reference model recommends applying AI patterns to generate
    insights from data and take appropriate actions automatically. The chapter will
    also provide a perspective on how and when to apply AI in an IoT context.'
