- fmt: '### The Cost Implications of a Traditional Pyramid


    In a traditional triangle pyramid, juniors fall at the bottom which constitute
    50%–60% of the team, mediors fall in the middle quadrant which constitute 30%–40%
    of the team, and the rest are seniors which constitute roughly 10% of the team.


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig5_HTML.jpg](images/517610_1_En_13_Chapter/517610_1_En_13_Fig5_HTML.jpg)


    Figure 13-5


    Productivity levels for a traditional pyramid


    This model has existed for decades, and typically organizations start at a low-cost
    baseline since it is considered as a highly optimized pyramid. Due to the large
    number of juniors in this mix, the initial level productivity during the first
    few months is always low since the learning curve tends to be high. In addition,
    during my 20+ years of experience, I have seen that a minimum of roughly 20%–30%
    of the team gets replaced in the first six months due to a mismatch of individual
    competencies against project demands. Due to this, I personally have found that
    it takes somewhere between three and five months for a team of 20–30 resources
    to stabilize and deliver a reasonable level of productivity.


    Figure [13-5](#517610_1_En_13_Chapter.xhtml#Fig5) provides a view on how productivity
    levels increase and stabilize over a period of time within a traditional pyramid
    structure. It is clear from Figure [13-5](#517610_1_En_13_Chapter.xhtml#Fig5)
    that the initial productivity levels are quite low and mature gradually to a stable
    state. This implies that the cost of the product team is higher during the initial
    stages when compared to the value or productivity they deliver.


    In contrast to a traditional pyramid, the diamond structure depicted in Figure
    [13-6](#517610_1_En_13_Chapter.xhtml#Fig6) provides guaranteed higher productivity
    results from the first month. This is due to the fact that only competent resources
    that fit the job are introduced into the product team from the start.


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig6_HTML.jpg](images/517610_1_En_13_Chapter/517610_1_En_13_Fig6_HTML.jpg)


    Figure 13-6


    Productivity levels of a diamond structure


    In summary, the cost of the diamond structure will not be higher than a traditional
    triangle pyramid once enterprises start measuring the productivity of the team
    over time.


    My personal experience with more than six enterprises that have transitioned from
    a traditional pyramid to a diamond structure has demonstrated that using a diamond
    structure is over 30% cheaper than a traditional pyramid. This data was measured
    for a 12-month period in these case studies.


    By adopting the diamond structure as described earlier, enterprises will reap
    better results in terms of the cost of the average resource compared to a traditional
    pyramid. Results need to be measured for a minimum of 12 months period in the
    following areas:


    - Ramp-up costs – Any new resource inducted into the product team will incur ramp-up
    costs, such as increased wages compared to existing resources, cost of transition
    from an old resource to a new resource, time taken to understand the new product,
    and so on.

    - Productivity of individuals within the team.


    The diamond structure is mandatory for enterprises embarking on their IoT journey.
    It is essential that a motivated and competent product engineering team is identified
    that will develop the best product for an enterprise in the most agile and cost-effective
    manner. The Hackfest model assists in identifying the right product engineering
    teams, which will be discussed in more detail in the following.


    ### Hackfest Model to Identify Product Development Teams


    `Hackfest` is a model which provides an approach on how IoT product development
    teams need to be identified. `Hackfest` follows a step-by-step approach starting
    from shortlisting individuals for the product organization to the identification
    of competent resources until the time they are trained and deployed into individual
    product development teams.


    The `Hackfest` model evaluation and selection process moves away from subjective-based
    evaluation to being fully objective based. Therefore, the chances of recruiting
    a motivated and skilled resource double compared to traditional hiring processes.


    The four phases of the `Hackfest` model are depicted in Figure [13-7](#517610_1_En_13_Chapter.xhtml#Fig7).


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig7_HTML.jpg](images/517610_1_En_13_Chapter/517610_1_En_13_Fig7_HTML.jpg)


    Figure 13-7


    Four phases of the Hackfest model


    Each enterprise needs to tailor the `Hackfest` model based on their organizational
    landscape following the guideline as described in the following.


    #### Shortlisting


    The first phase is the shortlisting phase, where all potential individuals of
    the IoT product team are evaluated comprehensively on their core skills. Enterprises
    need to be prepared with a technical assessment kit that can support the shortlisting
    of individuals for the next phase. Alternatively, there are a lot of industry-leading
    platforms such as `Codility`, `CodeSignal`, and `HackerRank` that can help enterprises
    in the shortlisting of resources through online coding tests specific to IoT.


    #### Product-Focused Evaluation


    The second phase is the product-focused evaluation where individuals are evaluated
    on their technical skills by asking them to develop proofs of concepts that are
    specific to the actual IoT use case. During the shortlisting phase, individuals
    are assessed on their core skills based on industry standards; however, during
    the product-focused evaluation, individuals are assessed on how they will perform
    during real-time situations, specific to the product. Enterprises need to ensure
    that an end-to-end IoT platform is made available with all tools and technologies
    that replicate the actual live environment of the IoT product development team.
    Such a platform is known as a product-focused evaluation (PFE) platform.


    For one of the enterprises I worked with, named ABC Corporation, we developed
    a `PFE` platform with a replica of the actual product development environment
    where devices were connected to the `IoT Gateway` and `IoT Platform`. A full-fledged
    data platform was also made available to evaluate the data team and data scientists.


    It is recommended that a `PFE` platform is created replicating the actual environment
    on which the product team will be working. Such a platform will aid in evaluating
    how well individuals will deliver productivity once they are deployed into the
    product team. Individuals need to perform development for the IoT use cases utilizing
    the complete `PFE` platform. Once development is completed by individuals, an
    evaluation is performed on:


    - Code quality

    - Design quality

    - Level of security considered in the code

    - How well code has been written from a maintainability perspective

    - How well code has been written from a reliability perspective and so on

    - Reports/insights generated for the IoT use case


    There are several tools available in the market which can perform the preceding
    validation. In the preceding case study for ABC Corporation, tools such as `SonarQube`
    were used for static code quality analysis; `jDepend` was used to validate design
    quality with respect to maintainability, performance, and reliability; and `AppScan`
    was used for code security.'
