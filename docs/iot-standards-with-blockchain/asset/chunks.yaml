    A mesh topology is a network setup where each computer and network device is interconnected
    with one another. This topology setup allows for most transmissions to be distributed
    even if one of the connections goes down. It is a topology commonly used for wireless
    networks. Infotainment, also called soft news, is a type of media, usually television,
    that provides a combination of information and entertainment.


    ### Radio Frequency (RF) Networks


    Radio frequency communications are probably the easiest form of communications
    between devices. Protocols like Zigbee or Z-Wave use a low-power RF radio embedded
    or retrofitted into electronic devices and systems.


    Zigbee is a short-range, low-power, wireless standard. Compared to LPWAN, Zigbee
    provides higher data rates, but at the same time much less power efficiency.


    Because of their physical short range, Zigbee and similar protocols such as Z-Wave,
    Thread, etc. are best suited for medium-range IoT applications with an even distribution
    of nodes in close proximity. Typically, Zigbee is suitable for various home automation
    use cases like smart lighting, HVAC (Heating, Ventilation, and Air Conditioning)
    controls, security, and energy management, leveraging home sensor networks.'
  trans: '

    ### 小物件（1 类设备）


    小物件（亦称 1 类设备）指的是可连接至互联网的物体，例如带有小型传感器的设备。这些设备内存较小，能耗和网络带宽消耗极低，且通常通过`SIM`卡进行连接。其数据模型简单，多数情况下依靠电池供电。


    小物件的典型例子包括智能灯泡和智能门锁。一个智能灯泡并无成千上万个参数需要控制，它仅具备开关、调光功能，部分型号还能发送功耗数据。


    ### 大物件（2 类设备）


    大物件可能指重型机械或工业`IoT`联网汽车等设备。这些设备拥有充足的电力供应、稳定的互联网连接，在大多数情况下能够接入互联网。尽管它们具备连接 IoT 网络的全部必要条件，但其数据模型极其复杂，包含成千上万个待控制参数。这些参数涵盖基于特定事件做出复杂决策以及执行复杂算法等功能。


    ### 复杂物件（3 类设备）


    第三类也是最为有趣的设备是 3 类设备，即所谓的“复杂物件”。复杂物件虽被称为 IoT 设备，但实际上并非真正的物联网设备，因为其缺少“`IoT`”中的“互联网（`I`）”部分。此类设备包括
    Philips Hue、Amazon Echo Plus（集成 Alexa 语音控制）、Honeywell 恒温器等。3 类设备通过非互联网协议（如`Zigbee`和`Z-Wave`）进行通信，因此无法直接连接互联网。然而在物联网领域，所有设备（无论类型）都必须能够联网。制造或医疗行业的大多数企业生态系统中都存在若干复杂物件。企业内复杂物件数量越多，其物联网部署的难度就越大。


    ## 通信协议


    物联网领域的通信协议可分为七大标准类别，下文将逐一介绍。每种标准各有其优缺点，并适用于特定的应用场景与行业。


    ### LPWAN（低功耗广域网）


    `LPWAN`是一种通信协议，能够在体积小巧、价格低廉且续航数年的电池上实现远距离通信。该技术系列专为支持覆盖大型工业和商业园区的大规模物联网网络而设计。


    `LPWANs`可连接各类物联网传感器——支持从资产追踪、环境监测、设施管理到占用检测和耗材监控等多种应用。


    `LPWAN`的缺点在于其仅能以低速率发送小块数据，因此采用`LPWAN`连接的设备更适合无需高带宽且对时延不敏感的应用场景。


    `LPWAN`适用于多种应用，包括智能计量、智能停车、智能电网控制、智能安防、智慧城市、智慧农业、资产追踪、智能家居自动化、关键基础设施监控、个人物联网应用、物流等。


    `LPWAN`包含两个变体：授权频段与非授权频段。授权频段`LPWAN`运行于公共蜂窝网络之上，可由多家电信移动运营商运营管理。它支持漫游，因此不存在互操作性问题，同时由于每个连接使用专属频率，其安全性和可靠性也更高。


    非授权频段`LPWAN`使用非授权频谱，每个连接不占用专属频率，任何人都可自由使用。这意味着非授权频谱可能导致使用相同无线电频谱的设备之间产生干扰，且不适用于高速连接。非授权`LPWAN`技术包括`LoRaWAN`、`Sigfox`等。


    ### 卫星通信网络（3G/4G/5G）


    卫星通信使手机等设备能够与约 10-15 英里外的下一个基站进行通信。在物联网语境中，这种通信形式通常被称为“M2M”（机器对机器），因为它允许手机等设备通过蜂窝网络发送和接收数据。卫星通信网络提供可靠的宽带通信，支持多种语音通话和视频流应用。但其缺点在于运营成本极高且功耗需求大。


    虽然蜂窝网络对于大多数由电池供电的传感器网络 IoT 应用而言并不可行，但它们非常适合特定的工业物联网应用场景，例如制造工厂、联网汽车或交通运输与物流领域的车队管理。


    例如，车载信息娱乐系统、交通路线规划、高级驾驶辅助系统（`ADAS`）以及车队远程信息处理和追踪服务，都可以依赖高带宽的蜂窝连接。


    支持高速移动性和超低延迟的下一代 5G 蜂窝网络被定位为自动驾驶汽车和增强现实的未来技术。5G 还有望在未来实现公共安全领域的实时视频监控、互联健康领域的医疗数据集实时移动传输，以及多种对时延敏感的工业自动化应用。


    **注：** 网格拓扑是一种网络设置方式，其中每台计算机和网络设备都相互连接。这种拓扑设置允许即使其中一个连接出现故障，大部分传输仍能分布进行。它是无线网络常用的拓扑结构。信息娱乐（亦称软新闻）是一种媒体形式（通常是电视），提供信息与娱乐的结合。


    ### 射频网络


    射频通信或许是设备之间最简单的通信形式。`Zigbee`或`Z-Wave`等协议使用嵌入或改造到电子设备和系统中的低功耗射频无线电。


    `Zigbee`是一种短距离、低功耗的无线标准。与`LPWAN`相比，`Zigbee`提供更高的数据传输速率，但同时能效更低。


    由于其物理距离短，`Zigbee`以及`Z-Wave`、`Thread`等类似协议最适用于节点分布均匀且距离较近的中程 IoT 应用。通常，`Zigbee`适用于各种家庭自动化场景，如智能照明、HVAC（供暖、通风和空调）控制、安防和能源管理，并借助家庭传感器网络实现这些功能。

    '
- fmt: '### Bluetooth


    `Bluetooth` is a wireless technology standard used for exchanging data between
    fixed and mobile devices over short distances.


    `Bluetooth Classic` was originally intended for point-to-point or point-to-multipoint
    data exchange among consumer devices. Optimized for power consumption, `Bluetooth
    Low Energy` (`BLE`) was later introduced to address small-scale consumer IoT applications.


    `BLE`-enabled devices are mostly used in conjunction with electronic devices,
    typically smartphones that serve as a hub for transferring data to the cloud.
    Nowadays, `BLE` is widely integrated into fitness and medical wearables (e.g.,
    smartwatches, glucose meters, pulse oximeters, etc.) as well as smart home devices
    (e.g., door locks), whereby data is conveniently communicated to and visualized
    on smartphones.


    `Beacons` are small, wireless transmitters that use low-energy Bluetooth technology
    to send signals to other smart devices nearby. Put simply, they connect and transmit
    information to smart devices, making location-based searching and interaction
    easier and more accurate.


    The release of new specifications called `Bluetooth Mesh` in 2017 aimed to enable
    a more scalable deployment of `BLE` devices, particularly in retail contexts.
    `BLE` beacons have been used to unlock new service innovations like in-store navigation,
    personalized promotions, and content delivery.


    ### Wi-Fi


    `Wi-Fi` is a wireless local area network (`WLAN`) that provides Internet access
    to devices that are within the range (about 66 feet from the access point).


    In the IoT space, `Wi-Fi`’s major limitations in coverage, scalability, and power
    consumption make the technology much less prevalent. Imposing high energy requirements,
    `Wi-Fi` is often not a feasible solution for large networks of battery-operated
    IoT sensors, especially in industrial IoT and smart building scenarios. Instead,
    it more pertains to connecting devices that can be conveniently connected to a
    power outlet like smart home gadgets and appliances, digital signages, or security
    cameras.


    `Wi-Fi 6` is the newest `Wi-Fi` generation and brings in greatly enhanced network
    bandwidth to improve data throughput per user in congested environments. The `Wi-Fi
    6` standard is transforming customer experience with new digital mobile services
    in retail and mass entertainment sectors. Also, in-car networks for infotainment
    and onboard diagnostics are expected to be the most game-changing use cases for
    `Wi-Fi 6`.


    ### RFID


    `Radio Frequency Identification` (`RFID`) uses radio waves to transmit small amounts
    of data from an `RFID` tag to a reader within a very short distance. Till now,
    the technology has facilitated a major revolution in retail and logistics.


    By attaching an `RFID` tag to products and equipment, businesses can track their
    inventory and assets in real time, allowing for better stock and production planning
    as well as optimized supply chain management. Alongside increasing IoT adoption,
    `RFID` continues to be entrenched in the retail sector, enabling new IoT applications
    like smart shelves, self-checkout, and smart mirrors.


    ### The Wired Networks


    A wired network uses an Ethernet cable to connect to the network. The Ethernet
    cable is in turn connected to a `Digital Subscriber Line` (`DSL`) or to the Internet
    Gateway. The wired networks are mature technology, and it is easy to get plugged
    into since enterprises already have phone lines, power lines, and coaxial cable
    lines.


    Even in the case of wireless networks, those networks are usually connected to
    a wired network at some point; hence, the most commonly used network is a hybrid
    of both wired and wireless network connectivity.


    As an example, `PROFINET` is one of the industry technical standards for data
    communication over Industrial Ethernet, designed for collecting data from and
    controlling equipment in industrial systems. `PROFINET` is based on standard Ethernet
    and can connect seamlessly with any wireless standard such as `WLAN` or `Bluetooth`.


    Another example is the `Modbus` protocol. `Modbus` is a serial communication protocol
    for use with programmable logic controllers (`PLCs`). `PLCs` are used in manufacturing
    processes and are typically used to transmit signals from instrumentation and
    control devices back to a main controller or data gathering system, for example,
    a system that measures temperature and humidity and communicates the results to
    a computer.


    `DSL` is a type of connection that transmits data over a telephone network through
    a telephone cable.


    `Coax`, short for coaxial, is a type of cable used to transmit data, the Internet,
    video, and voice communications.


    A programmable logic controller or programmable controller is an industrial digital
    computer that has been ruggedized and adapted for the control of manufacturing
    processes, such as assembly lines, robotic devices, or any activity that requires
    high reliability, ease of programming, and process fault diagnosis.


    ### Choosing the Right Smart IoT Gateway for Industry Use Cases


    Each industry vertical has its own unique set of network requirements. Smart IoT
    Gateways connect devices to other layers within the IoT Standards Reference Model,
    and therefore choosing the right Smart IoT Gateway means accurately weighing criteria
    in terms of what type of devices are used within that specific industry domain
    and then getting down into the specifics of what devices the enterprise is looking
    to connect for their specific use cases. Table [5-1](#517610_1_En_5_Chapter.xhtml#Tab1)
    provides a view on the communication protocols most widely used across industries.


    **Table 5-1 Protocols Vs Industry Specific Use Cases**


    | IoT Verticals | LPWAN | Satellite Networks | RFID | Radio Networks | Bluetooth/BLE
    | Wi-Fi | Wired |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | Industrial IoT | ▸ | ⊳ |   | ⊳ |   |   | ▸ |

    | Smart meter | ▸ |   |   |   |   |   | ▸ |

    | Smart city | ▸ |   |   |   |   |   | ⊳ |

    | Smart building | ▸ |   |   |   | ⊳ |   | ⊳ |

    | Smart home |   |   |   | ▸ | ▸ | ▸ |   |

    | Wearables | ⊳ |   |   |   | ▸ |   |   |

    | Connected car |   |   |   |   |   | ⊳ |   |

    | Connected health |   | ▸ |   |   | ▸ |   | ⊳ |

    | Smart retail |   | ⊳ | ▸ |   | ▸ | ⊳ |   |

    | Logistics and asset tracking | ⊳ | ▸ | ▸ |   |   |   |   |

    | Smart agriculture | ▸ |   |   |   |   |   |   |


    ⊳ Moderately applicable  ▸ Highly applicable


    For one of the industrial equipment manufacturing companies called Company A,
    we deployed `Edge Gateway 5000` from Dell as their Smart IoT Gateway. Company
    A’s requirement was to place their Smart IoT Gateway at a location that can withstand
    high temperature and higher levels of humidity and should be able to operate 24/7.
    On the other side, being a manufacturing company, there were several devices that
    the Smart IoT Gateway needs to connect, such as their `PLC` systems (which run
    on `Modbus`), apart from connecting to devices that were using `Zigbee` and `6LoWPAN`
    protocols. Based on this need, `Edge Gateway 5000` was selected for this enterprise.


    **Key Points**


    *   Small things, also called type 1 devices, are things which are connectable
    to the Internet, such as devices with small sensors.

    *   Big things could be something such as heavy machinery or industrial IoT connected
    cars. These are devices that have enough power supply, ample Internet connectivity,
    and in most cases are able to connect to the Internet.

    *   Complex things, though called IoT devices, are not really IoT because they
    do not have the Internet (I from the IoT) part in them.'
