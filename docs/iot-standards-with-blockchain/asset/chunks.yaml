  trans: '

    #### 互操作性


    医疗行业在物联网设备方面面临的最大挑战之一，是大多数设备无法与其他设备互操作。这是在实施医疗物联网用例时需要考量的关键因素。`FHIR` 正成为医疗保健领域的通用标准，它提供了一种在多个医院系统间共享数据的标准化方式；然而，该标准仍在发展中，且许多旧式设备尚未采用此标准。在此场景下，模式
    25 可能是一个合适的选择。


    #### 数据延迟到达


    我在医疗物联网用例中遇到的主要挑战之一，是来自设备（例如可穿戴设备）的数据延迟到达，因为大多数此类设备都通过网关（例如智能手机）连接互联网。这些设备会持续收集数据数小时甚至数天，一旦建立互联网连接，数据便会发送到后端系统。因此，此类场景下的第一个挑战是系统应能处理数据突发，第二个挑战是系统应能理解数据并将其与正确的时间段关联起来。


    目前，对于设备应如何发送数据，尚未定义真正的标准，因此每个设备制造商都定义了自己的标准。所以，如果设备正在离线收集数据，有些设备可能先发送最新数据，而有些可能先发送旧数据。这意味着医疗物联网解决方案需要应对这一挑战。这使得模式
    1 效率极低，因为需要重写设备软件来嵌入此类标准。在此场景下，模式 25 和 35 最为适用。


    #### 数据重复


    在医疗物联网背景下遇到的第二大挑战是数据重复。由于没有定义标准，在预期故障期间，不同设备选择重新发送数据的方式各不相同。有些设备选择再次重新发送完整数据，因为它们是在传输数据中途失去连接，或者未收到特定数据块已成功接收的确认。无论原因如何，由于每台设备在没有标准机制的情况下独立运行，当大量不同设备汇集在一起时，这就成了一项挑战。在此场景下，模式
    25 和 35 最为适用。


    #### 数据格式


    除了数据重复和延迟到达，物联网设备还有自己表示数据的方式，且缺乏清晰的标准化。物联网设备捕获的数据以多种数据格式混合产生，包括结构化、半结构化和非结构化数据。


    鉴于物联网设备在医疗行业带来的巨大标准化挑战，如果企业试图使用模式 1 在设备层面创建解决方案，那么管理和维护这些设备显然不仅会带来大量的运营支出成本，还会产生巨大的资本支出成本。资本支出成本将用于使设备适应标准化的操作方式，这可能意味着重写或升级这些设备上的软件。运营支出成本则用于补丁和升级。成本只是一方面，但还有其他挑战，例如设备使用不同的通信协议与外部世界通信，这需要一种解决方案。所有这些挑战使得模式
    1 在医疗物联网场景中不合适。通过使用模式 35，设备可以保持原样，而物联网网关将在网关层面解决这些挑战。已有多种商业级物联网网关解决了这些问题，因此在大规模医疗物联网用例中，模式
    35 被认为是最合适的。


    ## 总结


    区块链是一种共享的、加密不可篡改的分类账，用于记录交易历史。在本章中，我们了解了区块链的工作原理以及不同类型的区块链，例如私有区块链和公有区块链：


    *   私有区块链是一种仅由单个组织或组织联盟拥有网络权限的技术。该网络不向公众开放加入，是物联网用例的首选。


    *   公有区块链是一种任何人都可以随时加入的区块链网络。参与没有任何限制。


    随后，我们通过几个示例和案例研究，讨论了区块链如何利用五种区块链物联网模式（企业可根据自身用例进行选择）来赋能物联网用例：


    1.  在第一种模式中，设备与物联网云平台通信，后者再与区块链通信。


    2.  在第二种模式中，设备与智能物联网网关通信。网关随后与物联网云平台通信，后者再与区块链通信。


    3.  第三种模式是设备直接与智能物联网网关通信，网关再与区块链通信。


    4.  在第四种模式中，设备直接与区块链通信。


    5.  在第五种模式中，设备与智能物联网网关通信。网关随后与物联网云平台通信。此模式中无区块链交互。


    在下一章中，我们将讨论如何在物联网中应用人工智能。


