- fmt: '#### Interoperability


    One of the biggest challenges in the health industry with IoT devices is that
    most of the devices do not interoperate with others. This is the key factor that
    needs to be accounted for when implementing use cases in IoMT. `FHIR` is becoming
    a common standard across the healthcare sector and provides a standardized way
    of sharing data across multiple hospital systems; however, the standard is still
    evolving, and not many legacy devices have adopted this standard. Pattern 25 could
    be the right choice here.


    #### Late Arrival of Data


    One of the major challenges I have come across in IoMT use cases is the late arriving
    data from devices (as an example with wearable devices), since most of these devices
    use a Gateway for Internet connection, for example, smartphones. These devices
    collect data for hours or even days sometimes, and once an Internet connectivity
    is established, data is then sent to the back-end systems. So, the first challenge
    in such a scenario is that systems should be able to handle the burst of data,
    and the second is that the systems should be able to make sense of the data and
    associate it with the right time period.


    So far, there is no real standard that has been defined on how the devices should
    send data, and therefore each device manufacturer has defined their own standards.
    So, if a device is collecting data offline, some may send the most recent data
    first, and some may send old data first. This means that the IoMT solutions should
    address this challenge. This makes pattern 1 highly inefficient since device software
    needs to be rewritten to embed such standards. Patterns 25 and 35 are most relevant
    in this scenario.


    #### Data Duplication


    The second major challenge faced in an IoMT context is data duplication. The way
    in which devices choose to resend data during anticipated failures is different
    for different devices since there is no standard defined. Some devices choose
    to resend complete data again because they were in the middle of transmitting
    data when a connection was lost, or they did not get an acknowledgment that a
    particular piece of data was successfully received. Irrespective of the reasons,
    since each device operates differently without a standard mechanism, it becomes
    a challenge when a multitude of different devices come together. Patterns 25 and
    35 are the most relevant in this scenario.


    #### Data Formats


    In addition to data duplication and late data arrival, IoT devices have their
    own way of representing data, and there is no clear standardization. The data
    captured by IoT devices is produced in a mix of data formats, including structured,
    semistructured, and unstructured data.


    With the magnitude of standardization challenges that IoT devices pose in the
    medical industry, if enterprises try to create solutions at the device level using
    pattern 1, it is obvious that managing and maintaining these devices not only
    brings in a lot of OPEX costs but there will be massive CAPEX costs. CAPEX costs
    will be toward making the devices adapt to a standard way of operations, and this
    may mean rewriting or upgrading software on these devices. OPEX costs will be
    for patches and upgrades. Cost is one part, but there are other challenges, such
    as devices using different communication protocols to talk to the external world,
    which will need a solution. All these challenges make pattern 1 inappropriate
    in an IoMT context. By using pattern 35, devices can be left as it is, and an
    IoT Gateway will address these challenges at the Gateway level. There are several
    commercial-grade IoT Gateways that have already addressed these challenges, and
    therefore pattern 35 is considered the most appropriate in large-scale IoMT use
    cases.


    ## Summary


    Blockchain is a shared cryptographically unalterable ledger for recording the
    history of transactions. In this chapter, we understood how blockchain works and
    the different types of blockchains, such as private and public blockchains :


    *   A private blockchain is a technology where only a single organization or a
    consortium of organizations has authority over the network. The network is not
    open for the public people to join in and is the preferred one for IoT use cases.


    *   A public blockchain is a blockchain network where anyone can join whenever
    they want. There are no restrictions when it comes to participation.


    We subsequently discussed how Blockchain powers IoT use cases with several examples
    and case studies by utilizing the five types of Blockchain IoT patterns which
    enterprises can choose based on their use cases:


    1.  In the first pattern, devices communicate with the IoT Cloud Platform which
    in turn communicates with Blockchain.


    2.  In the second pattern, devices communicate with the Smart IoT Gateway. The
    Gateway then communicates with the IoT Cloud Platform which in turn communicates
    with Blockchain.


    3.  The third pattern is where devices communicate directly with the Smart IoT
    Gateway which in turn communicates with Blockchain.


    4.  In the fourth pattern, devices communicate directly with Blockchain.


    5.  In the fifth pattern, devices communicate with the Smart IoT Gateway. The
    Gateway then communicates with the IoT Cloud Platform. No blockchain interaction
    in this pattern.


    In the next chapter, we will discuss about applying Artificial Intelligence in
    IoT.


    Footnotes [1](#517610_1_En_9_Chapter.xhtml#Fn1_source)'
  raw: '#### Interoperability


    One of the biggest challenges in the health industry with IoT devices is that
    most of the devices do not interoperate with others. And this is the key factor
    that needs to be accounted for when implementing use cases in IoMT. FHIR is becoming
    a common standard across the healthcare sector and provides a standardized way
    of sharing data across multiple hospital systems; however, the standard is still
    evolving, and not many legacy devices have adopted this standard. Pattern 25 could
    be the right choice here.


    #### Late Arrival of Data


    One of the major challenges I have come across in IoMT use cases is the late arriving
    data from devices (as an example with wearable devices), since most of these devices
    use a Gateway for Internet connection, for example, smartphones. These devices
    collect data for hours or even days sometimes, and once an Internet connectivity
    is established, data is then sent to the back-end systems. So, the first challenge
    in such a scenario is that systems should be able to handle the burst of data,
    and second is that the systems should be able to make sense of the data and associate
    it with the right time period.


    So far, there is no real standard that has been defined on how the devices should
    send data, and therefore each device manufacturer has defined their own standards.
    So, if a device is collecting data offline, some may send the most recent data
    first, and some may send old data first. This means that the IoMT solutions should
    address this challenge. This makes pattern 1 highly inefficient since device software
    needs to be rewritten to embed such standards. Patterns 25 and 35 are most relevant
    in this scenario.


    #### Data Duplication


    The second major challenge faced in an IoMT context is data duplication. The way
    in which devices choose to resend data during anticipated failures is different
    for different devices since there is no standard defined. Some devices choose
    to resend complete data again because they were in the middle of transmitting
    data when a connection was lost, or they did not get an acknowledgment that a
    particular piece of data was successfully received. Irrespective of the reasons,
    since each device operates differently without a standard mechanism, it becomes
    a challenge when a multitude of different devices come together. Patterns 25 and
    35 are the most relevant in this scenario.


    #### Data Formats


    In addition to data duplication and late data arrival, IoT devices have their
    own way of representing data, and there is no clear standardization. The data
    captured by IoT devices is produced in a mix of data formats, including structured,
    semistructured, and unstructured data.


