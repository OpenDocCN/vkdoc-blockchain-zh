- fmt: '### Cyber Security


    The second key aspect is to have cyber security expertise when enterprises deal
    with OT systems. Cyber security personnel need to understand the similarities
    and differences between IT and OT and should be experts in this particular field.
    The types of technologies that are used in some layers of OT or critical infrastructure
    are very similar to IT. There are workstations, standard software stacks, or standard
    applications, but as we reach deeper into the OT system, there are different kinds
    of technology stacks, embedded equipment such as real-time operating systems,
    and industrial proprietary protocols that are used to connect these systems together.
    Cyber security experts need to understand the differences in the technology and
    the differences in the vulnerabilities that OT systems have since these are legacy
    products with long-lived missions and bring in the right solutions to address
    these challenges. The consequences of a compromise can mean a danger to life.


    ### Purpose-Built Technology


    The third area that needs focus is purpose-built technology. This means that enterprises
    need to look at technologies that are built to provide deep visibility and protection
    specifically for industrial connected systems that will be part of IoT implementations.
    Cyber experts need to look at the specific nature of the risk at each layer of
    the OT system and make sure that the protective measure that will be employed
    inside that system is going to support each particular mission. They will need
    to deeply understand the protocols that are used to connect these systems together,
    speed of data, and information transferred and not introduce any unintended latency
    or jitter as such inefficiencies can bring the OT systems down. As an example,
    the patching cycles often tend to be more rapid on the IT side than they are on
    the OT side of the house. Many OT systems may take years or months to put a patch
    or protection in place simply because of the operational mission of the particular
    OT system. From a purpose-built technology perspective, the main difference we
    see here is that there is a whole host of standardized protocols on the IT side.
    In the OT side, there are a lot of pieces of equipment that have been built around
    proprietary technology and proprietary protocols which glue the OT systems together
    and connect them to allow machine-to-machine interaction. The protective measures
    that are employed in an IT world are often based on standardized protocols, whereas
    on the OT side, we will get into all kinds of esoteric and proprietary protocols
    that are the systems used to communicate with each other. It is essential for
    enterprises to utilize security technologies and platforms that are built purposefully
    for all such OT systems.


    ## Secure by Design (Securing the Whole IoT Ecosystem)


    Security by design is the inclusion of security design principles, technology,
    and governance at every stage of the IoT journey and within all layers of the
    IoT Standards Reference Model. When an organization looks at creating, deploying,
    and leveraging connected technology to drive business, security must be integrated
    into every component, tier, and application to preserve the integrity of the IoT
    solution and minimize the risk of cyber threats.


    IoT systems are highly complex, requiring end-to-end security solutions that span
    cloud and connectivity layers, and should be able to support resource-constrained
    IoT devices that often are not powerful enough to support traditional security
    solutions. There is no single silver bullet, and security must be comprehensive
    at each layer within an IoT ecosystem, or attackers can simply exploit the weakest
    link. Though traditional Information Technology (IT) systems drive and handle
    data from IoT devices, IoT devices themselves will have unique additional security
    needs that need to be handled.


    IoT security needs to be considered starting from device procurement (buy devices
    with security built in), device protection, API security, Smart IoT Gateway security,
    patch management, hardware security, and IoT Cloud Platform security.


    These foundations can be combined to form powerful and easy-to-deploy security
    foundations in an IoT ecosystem to mitigate the vast majority of security threats
    to the Internet of Things, including advanced and sophisticated threats. However,
    enterprises need to understand that there is no single solution that can cover
    IoT security in full. Each use case and every industry (automotive, energy, manufacturing,
    healthcare, financial services, government, retail, logistics, aviation, consumer,
    and beyond) is unique, and a security solution needs to be decided based on the
    use case and the threats pertaining to a particular industry and use case.


    ### Buy Devices with Built-in Security


    Device manufacturers need to ensure that security is built into the devices, and
    enterprises procuring new devices should carefully select the ones that have built-in
    security. Another aspect while purchasing new devices is to understand that devices
    which have hardcoded credentials are not ideal candidates for an enterprise IoT
    ecosystem. Enterprises should be able to update the default credentials before
    the device is put into action. Devices need to be updated using a strong password
    or multifactor authentication or biometrics where possible.


    Technologies such as elliptic curve cryptography have revolutionized the industry
    especially for security-related to resource-constrained devices, and enterprises
    need to ensure that such security-enabled devices become part of their IoT ecosystem.
    Symantec which is a leading Certificate Authority (CA) has already embedded such
    security features into more than a billion IoT devices, helping mutually authenticate
    a wide range of devices, including cellular base stations, televisions, and more.


    Identity management for devices is quite essential in an IoT context. Each IoT
    device needs to have a unique identifier to understand what the device is, how
    it behaves, the other devices it interacts with, and the proper security measures
    that should be taken for that device.


    Not all enterprises can deploy new IoT devices, and they need to coexist with
    existing devices and equipment, many of which are legacy. Many of such legacy
    devices and equipment still need to be connected to the IoT ecosystem. There is
    no single solution to secure such devices, and enterprises need to develop security
    solutions based on the devices and equipment that are being connected to the Internet.


    Table `8-1` provides a generic view on the traditional IT and OT security solutions
    and how a combination of these two can secure enterprises after IT-OT integration.
    This is a partial list which provides a starting point for enterprises to manage
    their security posters in an IT-OT-integrated world. Each enterprise needs to
    tailor their own cyber security solutions based on the operational systems in
    use currently.


    **Table 8-1**


    Traditional IT and OT Security Solutions'
