  trans: '

    ### 蓝牙


    `Bluetooth` 是一种无线技术标准，用于在短距离内的固定设备和移动设备之间交换数据。


    `Bluetooth Classic` 最初旨在实现消费类设备之间的点对点或点对多点数据交换。为了优化功耗，后来推出了`低功耗蓝牙`（`BLE`），以应对小型消费级物联网应用。


    支持`BLE`的设备大多与电子设备（通常是作为数据传输至云端枢纽的智能手机）配合使用。如今，`BLE`已广泛应用于健身和医疗可穿戴设备（例如智能手表、血糖仪、脉搏血氧仪等）以及智能家居设备（例如门锁），数据能便捷地传输到智能手机上并实现可视化呈现。


    `Beacon`（信标）是一种小型无线发射器，利用低功耗蓝牙技术向附近的其它智能设备发送信号。简而言之，它们与智能设备连接并传输信息，使基于位置的搜索和交互更加便捷和精确。


    2017 年发布的名为`蓝牙 Mesh`的新规范，旨在支持`BLE`设备更可扩展的部署，尤其是在零售场景中。`BLE`信标已被用于解锁新的服务创新，如店内导航、个性化促销和内容推送。


    ### Wi-Fi


    `Wi-Fi` 是一种无线局域网（`WLAN`），可为覆盖范围（距接入点约 66 英尺）内的设备提供互联网接入。


    在物联网领域，`Wi-Fi` 在覆盖范围、可扩展性和功耗方面的主要局限性使其普及度大大降低。由于能耗要求高，`Wi-Fi` 通常不适用于由电池供电的物联网传感器组成的大型网络，尤其是在工业物联网和智能建筑场景中。相反，它更适用于连接那些可以方便地接入电源插座的设备，如智能家居小工具和电器、数字标牌或安防摄像头。


    `Wi-Fi 6`是最新一代的`Wi-Fi`技术，它带来了大幅增强的网络带宽，以提高拥塞环境下每位用户的数据吞吐量。`Wi-Fi 6`标准正在通过零售和大众娱乐领域的全新数字移动服务改变客户体验。此外，用于信息娱乐和车载诊断的车载网络有望成为`Wi-Fi
    6`最具颠覆性的应用场景。


    ### RFID


    `射频识别`（`RFID`）利用无线电波在极短距离内将少量数据从`RFID`标签传输到读取器。迄今为止，该技术已在零售和物流领域引发了一场重大革命。


    通过在产品及设备上粘贴`RFID`标签，企业可以实时追踪其库存和资产，从而实现更优的库存和生产规划以及优化的供应链管理。随着物联网应用的日益普及，`RFID`在零售领域持续扎根，催生了诸如智能货架、自助结账和智能试衣镜等新的物联网应用。


    ### 有线网络


    有线网络使用以太网电缆连接到网络。以太网电缆又连接到`数字用户线`（`DSL`）或互联网网关。有线网络技术成熟，且易于接入，因为企业通常已铺设电话线、电力线和同轴电缆线。


    即使在无线网络的情况下，这些网络通常也会在某个点连接到有线网络；因此，最常用的是有线和无线网络连接的混合体。


    例如，`PROFINET`是用于工业以太网数据通信的行业技术标准之一，旨在收集工业系统设备的数据并对其进行控制。`PROFINET`基于标准以太网，可与任何无线标准（如`WLAN`或`Bluetooth`）无缝连接。


    另一个例子是`Modbus`协议。`Modbus`是一种串行通信协议，用于可编程逻辑控制器（`PLC`）。`PLC`用于制造过程，通常用于将来自仪器仪表的信号传输回主控制器或数据采集系统，例如，一个测量温湿度并将结果传送到计算机的系统。


    `DSL`是一种通过电话电缆在电话网络上传输数据的连接类型。


    `Coax`是同轴电缆的简称，是一种用于传输数据、互联网、视频和语音通信的电缆类型。


    可编程逻辑控制器或可编程控制器是一种工业数字计算机，经过加固和适配，用于控制制造过程，例如装配线、机器人设备，或任何需要高可靠性、易于编程和过程故障诊断的活动。


    ### 为行业应用案例选择合适的智能物联网网关


    每个垂直行业都有其独特的网络需求集。智能物联网网关将设备连接到物联网标准参考模型中的其它层，因此选择合适的智能物联网网关意味着要准确权衡该特定行业领域内使用何种类型的设备，然后深入到企业针对其特定应用案例想要连接哪些设备的具体细节。表
    5-1 提供了各行业最常用的通信协议概览。


    **表 5-1 协议与特定行业应用案例对照**


    | 物联网垂直领域 | LPWAN | 卫星网络 | RFID | 无线网络 | 蓝牙/BLE | Wi-Fi | 有线网络 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 工业物联网 | ▸ | ⊳ |   | ⊳ |   |   | ▸ |

    | 智能电表 | ▸ |   |   |   |   |   | ▸ |

    | 智慧城市 | ▸ |   |   |   |   |   | ⊳ |

    | 智能楼宇 | ▸ |   |   |   | ⊳ |   | ⊳ |

    | 智能家居 |   |   |   | ▸ | ▸ | ▸ |   |

    | 可穿戴设备 | ⊳ |   |   |   | ▸ |   |   |

    | 网联汽车 |   |   |   |   |   | ⊳ |   |

    | 互联健康 |   | ▸ |   |   | ▸ |   | ⊳ |

    | 智能零售 |   | ⊳ | ▸ |   | ▸ | ⊳ |   |

    | 物流与资产追踪 | ⊳ | ▸ | ▸ |   |   |   |   |

    | 智慧农业 | ▸ |   |   |   |   |   |   |


    ⊳ 中等适用  ▸ 高度适用


    对于一家名为 A 公司的工业设备制造企业，我们部署了戴尔的`Edge Gateway 5000`作为其智能物联网网关。A 公司的需求是将其智能物联网网关安置在一个能够承受高温、高湿度并能全天候运行的位置。另一方面，作为一家制造企业，智能物联网网关需要连接多种设备，例如其运行在`Modbus`协议上的`PLC`系统，此外还要连接使用`Zigbee`和`6LoWPAN`协议的设备。基于这一需求，为该企业选择了`Edge
    Gateway 5000`。


    **要点**


    *   小型物体，也称为类型 1 设备，是指可连接到互联网的物体，例如带有小型传感器的设备。

    *   大型物体可以是像重型机械或工业物联网网联汽车这样的东西。这些设备具有足够的电源、充足的互联网连接，并且在大多数情况下能够连接到互联网。

    *   复杂物体，虽然被称为物联网设备，但实际上并非真正的物联网，因为它们缺少其中的“互联网”部分。'
- fmt: '# Summary


    In this chapter, we discussed about the three types of devices, which are called
    the small things which are simple Internet-enabled devices, the big things such
    as heavy machinery, and complex things which are devices that are not Internet
    enabled.


    - Small things, also called type 1 devices, are things which are connectable to
    the Internet, such as devices with small sensors.

    - Big things could be something such as heavy machinery or industrial IoT connected
    cars. These are devices that have enough power supply, ample Internet connectivity,
    and in most cases are able to connect to the Internet.

    - Complex things, though called IoT devices, are not really IoT because they do
    not have the Internet (I from the IoT) part in them.


    We then discussed about the different communication protocols that these devices
    use along with a guidance on which Smart IoT Gateway to choose based on the devices
    that need to connect with the IoT ecosystem.


    In the next chapter, we will discuss about the Smart IoT Gateway, which is a system
    to connect multiple devices (using varied protocols) to the IoT ecosystem.


    # 6. The Smart IoT Gateway


    Organizations implementing IoT are increasingly focusing on the business outcomes
    using technology, and IoT initiatives are no longer being driven by the sole purpose
    of internal operational improvement. IT and business stakeholders are working
    together to align IoT projects with business outcomes for improving revenue and
    customer experience, but they are facing challenges because of the legacy systems
    and approaches. Legacy is not going to go away, and this is the fact, but there
    are enablers that are helping enterprises in overcoming these challenges – the
    Smart IoT Gateway is one such enabler.


    Tech analyst company IDC predicts that in total there will be 41.6 billion connected
    IoT devices by 2025, or "things." It also suggests industrial and automotive equipment
    represent the largest opportunity of connected "things," but it also sees a strong
    adoption of smart home and wearable devices in the near term. Another tech analyst,
    Gartner,^([^(16)](#fn16)) predicts that the enterprise and automotive sectors
    will account for 5.8 billion devices this year, up almost a quarter in 2019. Utilities
    will be the highest user of IoT with the rollout of smart meters. Security devices,
    in the form of intruder detection and web cameras, will be the second biggest
    use case of IoT devices. Building automation like connected lighting will be the
    fastest growing sector, followed by automotive (connected cars) and healthcare
    (monitoring of chronic conditions). This is a clear indication that though there
    are numerous challenges enterprises are facing, IoT is going to be the future
    for enterprises to do business, and organizations with high levels of IoT maturity
    achieve higher rates of success in their IoT adoption.


    IoT is all about making life and work easier and trustworthy for individuals and
    enterprises – it could be about securing home using home security devices or automatically
    switching the air conditioning and heating units in a large building, or it could
    be about predictive maintenance to reduce the downtime in factories. In a mining
    industry, IoT can help avoid sending technicians on a truck or a helicopter every
    month to go and see if an equipment is working fine. With IoT, enterprises can
    predict the cycles of breakage and technicians can reach the mining spots when
    there is a real maintenance required because an equipment is about to break in
    the next one- or two-week time. This not only saves cost for enterprises but enables
    them to become much more efficient.


    In an IoT world, there are two departments that need to come along which traditionally
    and culturally have not spent a lot of time together so far – these are the Information
    Technology (IT) and the Operational Technology (OT) departments. A typical IT
    department is measured on system uptime, availability of applications and IT infrastructure,
    number of security breaches, and reducing costs of IT. On the other side, the
    OT department constitutes of the factory managers, production managers, and even
    agriculture farmers. These are the folks who produce food, control the oil and
    gas process, pump oil from the ground, or are folks who are responsible for maintaining
    the fleet of the company trucks. An OT department is measured on entirely different
    success criteria, such as what is the yield of the crop, how much water is being
    used to create that yield, what is the production uptime of the factory, what
    is being done to save fuel in a fleet of hundreds of trucks, how can safety of
    drivers be increased, how to stop people from stealing the contents out of the
    trucks or stores, and so on.


    IT and OT departments are two different worlds, and each department is measured
    very different on success. With IoT, both these departments need to come together,
    and this is where connecting people becomes equally important along with connecting
    things. In an IoT world, both IT and OT absolutely have to come together to be
    able to work on these projects, and then enterprises also need to bring in support
    functions, such as finance, marketing, and sales departments, and all of these
    departments together will be able to make best-of-breed IoT solutions. This is
    one of the major aspects among several others that enterprises need to address
    before embarking on an IoT journey at the enterprise level.


    A few years back when there were discussions around IoT, experts used to explain
    about the basics of IoT and its associated benefits. On the other side, there
    were enterprises where IT and OT staff were meeting for the first time. Fast forward
    to today, it would be very rare for an IoT discussion to start where one needs
    to explain about the basics of IoT, and secondly we see more and more synergies
    coming together between IT and OT teams.


    However, the barriers are still high, and there are still several challenges for
    enterprises embarking on an IoT journey. The top six challenges which enterprises
    need to address in an enterprise-wide IoT implementation are described in Figure
    [6-1](#517610_1_En_6_Chapter.xhtml#Fig1).^([^(17)](#fn17))


    ![../images/517610_1_En_6_Chapter/517610_1_En_6_Fig1_HTML.jpg](images/517610_1_En_6_Chapter/517610_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    IoT challenges


    ## Security


    The first challenge that is always on the top priority for every enterprise in
    an IoT context is security. As part of the IoT implementation, enterprises are
    exposing devices (things) such as machinery and sensors to the Internet, which
    primarily were not designed for Internet-enabled communications, and hence cyber
    security was never thought about in these devices. We are trying to make each
    and every device within an Operational Technology world accessible over the Internet,
    which means we have opened the surface area of attack incredibly wide. Though
    a lot has been done in this area, security still remains the number one challenge.
    We are going to discuss in detail about security and how to address this concern
    in Chapter [8](#517610_1_En_8_Chapter.xhtml).


    ## IT-OT Team Integration


    The second challenge is bringing IT and OT staff together to achieve the IoT vision.
    Though this team is coming together lately, it is very essential for enterprises
    to make sure that this team is fully aligned on one single objective to make the
    IoT use case successful. We will discuss about the IoT core team in Chapter [13](#517610_1_En_13_Chapter.xhtml)
    and try to address this challenge.'
