    # 5. IoT Devices and Their Communication


    IoT devices are the nonstandard computing devices that connect wirelessly to a
    network and have the ability to transmit data. IoT involves extending Internet
    connectivity beyond standard devices, such as desktops, laptops, smartphones,
    and tablets, to non-Internet-enabled physical devices and everyday objects. Embedded
    with technology, these devices can communicate and interact over the Internet.
    They can also be remotely monitored and controlled.


    IoT devices, also called connected devices, talk to other related devices in an
    environment to automate home and industry tasks. Devices are typically categorized
    into three main groups: consumer, enterprise, and industrial.


    Consumer-connected devices include smart TVs, smart speakers, toys, wearables,
    and smart appliances. Smart meters, commercial security systems, smart city technologies,
    and manufacturing automation are examples of industrial and enterprise IoT devices.
    Other technologies, including smart air conditioning, smart thermostats, smart
    lighting, and smart security, span across home, enterprise, and industrial uses.


    In a smart home, for example, once a user arrives home, their car communicates
    with the garage to open the door. Once inside the home, the thermostat is already
    adjusted to their preferred temperature, and the lighting is set to a lower intensity
    and color, as their pacemaker data indicates it has been a stressful day.


    In the enterprise, smart sensors located in a conference room can help an employee
    locate and schedule an available room for a meeting, ensuring the proper room
    type, size, and features are available. When meeting attendees enter the room,
    the temperature will adjust according to the occupancy, the lights will dim as
    the appropriate PowerPoint loads on the screen, and the speaker can directly begin
    their presentation.


    On a plant floor, an assembly line machine fitted with sensors will provide sensor
    data to the plant operator, informing them of anomalies and predicting when parts
    will need to be replaced. Such information can prevent unexpected downtime, along
    with lost productivity and profits.


    There are several such use cases for every industry, and the IoT market is gaining
    a lot of popularity. IoT has already provided rise to several applications that
    are used by businesses, including factory automation, smart cities, smart homes,
    connected cars, and ehealth.


    The adoption of IoT across enterprises is increasing at a very fast pace; however,
    challenges are also enormous. One such challenge the IoT industry is facing is
    with device connectivity. Device connectivity is one of the biggest challenges
    in an IoT implementation, and this is because there are several legacy devices
    that an IoT ecosystem needs to integrate, and each one operates using different
    and unique wired and wireless protocols. IoT devices are split into three categories,
    which are discussed in the following.


    ## Device Types


    Figure [5-1](#517610_1_En_5_Chapter.xhtml#Fig1) depicts the three types of IoT
    devices that exist in an IoT ecosystem. The first type of devices is the small
    things, the second is called the big things, and the third is the complex things.


    ![../images/517610_1_En_5_Chapter/517610_1_En_5_Fig1_HTML.jpg](images/517610_1_En_5_Chapter/517610_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Types of devices'
  trans: '

    区块链解决了信任这一基本要素。然而，对于任何企业而言，端到端交易的核心问题在于，交易涉及多种不同利益的相关方和企业，他们需要订阅同一个区块链模型才能完成交易，但这并非强制性的。如果并非所有参与方都从行业视角订阅该模型，企业将无法获得该技术的全部价值。因此，制造商、运输公司、零售商和物流公司都订阅该模型至关重要。


    假设各方都订阅了该模型，由于有如此多的参与方来支持一笔端到端交易，那么明确以下问题就非常关键：谁拥有数据所有权、谁拥有区块链上运行的业务逻辑、谁可以在现有区块链上添加新服务，以及谁来决定谁能加入或退出网络。这引出了区块链治理中最重要的元素，而这一元素需要在将区块链解决方案集成到`IoT`标准参考模型时予以解决。


    公有区块链是无许可的。任何人都可以加入网络，并在区块链内进行读取、写入或参与操作。公有区块链是去中心化的，没有一个单一实体控制网络。公有区块链上的数据是安全的，因为一旦数据在区块链上得到验证，就不可修改或更改。


    私有区块链是一种许可链。私有区块链基于访问控制进行工作，这些控制限制了可以参与网络的人员。网络由一个或多个实体控制，这导致交易依赖于第三方。在私有区块链中，只有参与交易的实体才能知晓交易信息，而其他实体无法访问。


    `IoT`与区块链的结合，能够在完全安全的前提下实现端到端的业务洞察。然而，值得注意的是，在`IoT`的背景下，私有区块链最为适合，因为`IoT`以行业和企业为中心，公众通常不被允许参与其中。


    ## 总结


    在本章中，我们讨论了`IoT`标准参考模型，该模型大致分为三个水平服务和两个垂直服务。


    水平服务包括全栈`IoT`平台、智能`IoT`网关和设备：


    -   设备层是物理对象所在的车间层。

    -   智能`IoT`网关负责从设备收集数据，并将其传输给系统的其他部分。在许多场景中，智能`IoT`网关会对从设备收集的数据（包括分析数据）进行预处理。智能`IoT`网关的另一个功能是设备管理。一些企业选择在智能`IoT`网关层面进行设备管理，而另一些企业则更倾向于在下一环节，即全栈`IoT`平台层面进行设备管理。

    -   全栈`IoT`平台是将通过智能`IoT`网关从设备发来的`IoT`数据，与其他非`IoT`数据结合，利用分析系统或应用程序生成有用洞察的场所。


    两个垂直服务是区块链和安全：


    -   尽管区块链在`IoT`背景下仍在发展中，但企业在决定其`IoT`架构时必须规划此功能，因为区块链将成为未来企业借助`IoT`取得成功的最重要元素。

    -   设备、智能`IoT`网关和全栈`IoT`平台都需要得到安全保障，这是`IoT`标准参考模型的关键隐性需求之一。


    在下一章，我们将讨论不同的`IoT`设备及其通信协议，包括它们的局限性和挑战。


