- fmt: '# Product Organization


    A product organization is all about delivering business outcomes or business value
    in shorter intervals, keeping in mind the market changes or changes within the
    enterprise and adapting immediately to these changes. Forrester defines an outcome
    as an achieved end state that can be verified through measurable results.^([^(25)](#fn25))
    An outcome could be additional revenues, higher customer satisfaction, new customer
    acquisition, and so on.


    An example of an outcome is listed as follows:


    *By July 2022, we aim to increase the sales of clothing by 25% by making the checkout
    process faster and more transparent for shoppers who are frustrated with the time
    it takes to purchase our product.*


    Once we define an outcome we want to achieve, it probably may be too much to do
    in a short timeframe, so we have to really ask what is the highest possible value
    and what is the minimum viable product that can be shipped in shortest possible
    time so that it can be released to the market to validate the acceptance of the
    feature or product.


    An example of the highest possible value and minimum viable product outcome is
    listed as follows:


    *In the next three months, we aim to increase the sales of kids clothing by 60%
    by adding a quick checkout option available to shoppers. This can be enabled by
    installing IoT devices to kiosk and supporting with contactless options.*


    Many enterprises are still operating in project mode. Transforming from a project
    to a product (outcome based) thinking organization is the need for any enterprise
    to be successful.


    It is very easy to talk about business outcomes and transforming from a project
    to a product organization. But the ground realities are very different, especially
    for many enterprises that are in business from the last several decades.


    When we talk about making the change from a project to a product, there are four
    impediments that every enterprise is challenged with:


    - IT is disconnected from business and vision – This means that having IT and
    OT to work with business is the biggest hurdle with almost all enterprises.

    - Executives are tracking activities and not business results – This is clearly
    driven by the fact that the success of an IT manager in an enterprise is determined
    by how many tasks are completed as against the plan.

    - Project funding is broken – This is one of the major issues especially with
    large enterprises. Projects are still funded on an annual funding cycle, which
    usually are for a 12–18-month cycle.

    - The business feels IT is solving its own problems – This is because of the fact
    that IT is generally focused on making developers more productive, reducing defects,
    ensuring business continuity is maintained, and so on, none of which delivers
    business outcomes.


    Most of the enterprises these days want to switch from linear-based projects to
    more products and product developments. When I speak about product organization,
    I remember a CIO asking me on how unicorns such as Google, Amazon, and Microsoft
    do long-term planning despite being so big. The answer is that these companies
    never do long-term planning, and their budget cycles are three to six months.
    What this means is that the board comes together every three to six months to
    allocate budgets based on the market needs, and they operate with a product-centric
    mindset.


    It is really hard to respond to any changing market or internal enterprise needs
    with a lengthy budgeting cycle such as 12 months or 18 months. And if anyone has
    to do and achieve success with such a lengthy cycle, they need to have an absolute
    forecasting ability to determine what they need to do for the next 18 months,
    and this is an ability no one possesses. Therefore, enterprises are bound to be
    disappointed with the results.


