  trans: '

    # 智能物联网网关与全栈物联网平台的典型活动


    我们已讨论了智能物联网网关和全栈物联网平台的重要性。供应商在这两个领域开发的产品在功能上有诸多相似之处，且很多时候这些产品执行的活动与其他产品相同。因此，企业往往难以判断某个流程应在哪一层执行。以下是一份典型的职责划分指南，明确了智能物联网网关与全栈物联网平台之间的分工。


    | 智能物联网网关 | 全栈物联网平台 |

    | --- | --- |

    | 基础数据可视化 | 复杂分析 |

    | 基础数据分析与短期数据历史记录功能 | 大数据挖掘 |

    | 数据缓存、缓冲与流式处理 | 业务逻辑来源 |

    | 数据预处理、清洗、过滤与优化 | 机器学习规则 |

    | 部分数据聚合 | 高级可视化 |

    | 设备间通信/机器对机器通信 | 长期数据存储/数据仓库 |

    | 人工智能（边缘 AI） | 人工智能 |


    # 安全


    物联网环境中的安全性需从物联网标准参考模型的所有三个层面进行审视——第一层是设备级安全，第二层是智能网关级安全，第三层是物联网平台级安全。除了这三个层面的硬件和软件安全外，网络级安全也至关重要，并且必须做到万无一失，因为物联网标准参考模型中三个层面之间的通信均通过互联网进行。


    在数起引人注目的事件中，普通物联网设备被用于渗透和攻击更大规模的网络，此后物联网安全便成为关注的焦点。实施安全措施对于确保网络及其连接的物联网设备的安全至关重要。


    我们将在第 13 章中，作为物联网核心团队的一部分，讨论安全顾问的角色。该角色需确保选择正确的设备、平台、网关和网络，以满足企业的安全态势。在物联网环境中，除了应用安全外，设备、网关和平台安全是最重要的考量因素。


    ## 设备安全


    在物联网生态系统的设备安全方面，企业需确保在其运营技术（OT）资产中部署的设备内置了安全功能，这一点必不可少。不仅设备本身需要内置安全功能，还应有通过软件更新或升级来修复任何安全问题的途径。


    与传统物联网设备相关的一个问题是，它们通常资源受限，不具备实施强安全性所需的计算资源。因此，许多设备无法提供高级安全功能。例如，大多数监测湿度或温度的传感器无法处理高级加密或其他安全措施。传统上，大量物联网设备被设计为安装于现场或机器上，直至生命周期结束，几乎从未接收过安全更新或补丁。因此，从某些企业的角度看，从一开始就构建安全性成本高昂，且会拖慢开发进度。然而，对于希望将物联网应用于业务的企业而言，在设备中构建安全性是必须的。不过，设备所需的安全级别也取决于用例和行业。例如，黑客对入侵农业物联网设备的兴趣较低，而更倾向于入侵制造工厂。


    企业还需确保对设备的访问以及通过这些设备产生的所有数据，均受授权用户或系统的控制。存储在设备上或通过通信路径传输的任何数据，都必须是加密且安全的。


    ## 智能物联网网关安全


    网关是物联网生态系统的重要组成部分，但却是一个脆弱的单点攻击入口。物联网网关通常是首先被攻击的目标，因为它们拥有更强的处理能力来运行更密集的应用程序。更强的处理能力意味着更复杂的软件，而更复杂的软件则意味着黑客有更多漏洞可利用。物联网网关成为众多黑客攻击热点的另一个关键原因，在于其作为连接互联网与内部网的边缘设备位置。网关通常是任何安全威胁的首要入口点（同时也是系统的第一道防线）。


    市场上存在许多成熟的物联网网关，需要谨慎选择，并始终将安全性牢记于心。以下是选择物联网网关时需考虑的一些因素。


    **消息安全**：物联网网关需要具备强大的端到端加密方法。消息应经过加密，且只能由接收方使用加密密钥解密。这允许网关设备仍然接收和转发数据，但无法读取数据内容。因此，即使安全受到破坏，黑客也无法从网关设备解析和读取数据。


    **设备接入安全**：设备接入发生在物联网生态系统中新增设备时。密钥管理实践以及新设备接入时密钥的交换方式，是一个重大的安全漏洞。物理篡改也可能导致私钥泄露。了解网关制造商在设备接入层面如何处理安全性至关重要。


    **集成安全**：物联网应用程序接口（API）安全是一个重要考量。物联网系统传输和接收大量数据和信息，确保设备、网关和后端数据库之间的数据安全移动至关重要。由于集成环节较为脆弱，必须持续扫描和测试，以确保系统内数据的完整性。


    **空中安全更新**：物联网生态系统内需要进行固件更新，有必要了解这些更新的具体方式以及物联网网关如何安全地处理它们。


    ## 物联网平台安全


    物联网平台是所有物联网数据汇集的核心，在许多情况下，设备管理也在其中进行，这是物联网生态系统的重要组成部分。物联网平台层面的安全性极其重要；不过，好消息是，在这一领域，众多产品供应商已在安全方面做了大量工作。几乎所有大型平台供应商，如亚马逊、微软和谷歌，都提供涵盖所有安全层面的服务，包括预防性安全机制（如加密和对设备数据的访问控制），以及持续监控和审计配置的服务。

    '
- fmt: '# Blockchain


    Trust is the most critical component to a human exchange. Trust is always a key
    component and is the ability for one person to effectively deal with others and
    for enterprises to perform business and to build civilization as well. We traditionally
    have centralized institutions that manage the trust part for every transaction.
    As an example, in a money exchange transaction, since we do not trust unknown
    individuals or businesses, an intermediary, such as a bank which we trust, sits
    in the middle and coordinates payments for us. This is a model that allows us
    to think about resolving the problem of trust so that we can confidently enter
    into exchange with others. However, intermediaries add a lot of friction and costs
    along with several transactional challenges. Blockchain technology is trying to
    solve this problem of trust in a much secure and cheaper way without anyone needing
    to depend on an intermediary. This is not only limited to banks but applies to
    public utilities and institutional controls where there is some form of exchange
    between parties.


    A blockchain is a decentralized and distributed digital ledger consisting of records
    called blocks that is used to record transactions across many computers so that
    any involved block cannot be altered retroactively, without the alteration of
    all subsequent blocks. It is a distributed ledger technology (DLT) that allows
    data to be stored globally on thousands of servers while letting anyone on the
    network see everyone else’s entries in near real time. That makes it difficult
    for one user to gain control or change the network.


    Blockchain is a system of recording information in a way that makes it difficult
    or impossible to change or hack the system. A blockchain is essentially a digital
    ledger of transactions that is duplicated and distributed across the entire network
    of computer systems on the blockchain. Each block in the chain contains a number
    of transactions, and every time a new transaction occurs on the blockchain, a
    record of that transaction is added to every (participant’s) ledger.


    There is a lot of debate around blockchain trying to solve every marketplace problem,
    but blockchain is a technology that is tailored to address a few problems only.
    In terms of costs, the fundamental thing which blockchain will address is reducing
    cost of transaction. As an example, person A wakes up and authenticates themselves,
    buys something online, and engages in some sort of digital transaction. Every
    such transaction needs to be verified, such as who is involved, the amounts exchanged,
    and so on, and the society spends a lot of resources and money to making sure
    that those attributes (transactions and actors) are correct and that transactions
    are executed without problems. Currently, there are several intermediaries as
    part of each such transaction. Blockchain is a technology that drastically reduces
    the cost to verify that a specific attribute is true and genuine.


    In simple terms, blockchain is a new decentralized distributed way of managing
    information across parties who do not necessarily trust each other but have an
    interest in a common outcome.


    As an example, a common outcome of a “farm to fork” process in a food chain starts
    from agricultural production to selling the product by the retailer to consumption
    by a consumer. In such a setup, there are different actors involved such as farmers
    who produce fruits and vegetables, freight management companies that transport
    these products from the farm to the stores using the right temperature-controlled
    fridges, retailers who sell these products, and consumers who buy and consume
    these products. Managing information across all these actors in a transparent
    and tamper-proof way is the most important element in this use case. The common
    outcome of this use case is that the consumers can trust the quality of the products
    and buy these products so that each actor in the supply chain makes profits, and
    this can be enabled with IoT and blockchain technology. This is the main reason
    why Blockchain has become an integral part of the IoT Standards Reference Model.


    On one side, there are several examples where IoT has created tremendous value
    from blockchain, and there are opposite examples where blockchain has added a
    lot of value to IoT.


    Let me explain this with a food safety case study. If you walk into a Walmart
    store and buy some fruits, as a consumer how do we currently determine the quality
    of the product? We just based our quality assumption on the trust we have on Walmart.
    We do not know who has produced the fruit and how much chemicals have been used
    during farming, whether the fruits have been transported using the right temperatures
    and within a certain timeframe, and where the fruits have been packed, tested,
    and processed. With blockchain and IoT, the entire sequence of steps from farm
    to fork can be made transparent to the customer without depending on any intermediaries,
    and therefore this can be considered a great technology to explore.


    The key aspect in the case study is to determine how we ensure that that information
    that is getting into the blockchain is accurate and trusted. As long as there
    are humans that are sending information, such as the temperature in which a product
    is stored, data can be tampered. If it is coming from a tamper-proof endpoint,
    such as an IoT device sending the temperature information on a periodic basis
    to the blockchain, it adds much more trust to the blockchain-based traceability
    solution. This is one of the examples where IoT contributes tremendous value to
    blockchain-based solutions.


    Another example where blockchain adds a lot of value to IoT is in the pharma industry.
    The pharmaceutical counterfeit drug problem is a $200 billion problem which can
    be addressed qualitatively with Blockchain and IoT. If all transactions starting
    from procuring raw materials to drug manufacturing till transporting and handing
    over the drug to the customer can be recorded using blockchain using a tamper-proof
    tag, the counterfeit issue can be addressed. With blockchain, besides traceability
    there is added trust since none of the transactions can be changed in the blockchain
    world.


    Conversely, let us take an example of connected cars. We have heard about multiple
    cases where some third-party fraudsters figured out a way to break in the car
    while we are driving. In almost 70% of the cases, this is caused during a software
    upgrade where hackers try to gain entry into the car systems posing as genuine
    actors and take control of the systems. If such a coordination of software upgrades
    can be mediated through a blockchain, enterprises can ensure that the right actors
    who have the right permissions are the only ones who are able to send the transaction
    to the car systems apart from making sure that software that is sent is signed
    and is not tampered. Such an approach begins to see blockchain adding value to
    an IoT-based solution.'
