  trans: '

    ### 传统金字塔模式的成本影响


    在传统的三角形金字塔结构中，初级人员位于底部，占团队的 50%-60%；中级人员位于中部，占团队的 30%-40%；其余为高级人员，约占团队的 10%。


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig5_HTML.jpg](img/517610_1_En_13_Fig5_HTML.jpg)


    图 13-5


    传统金字塔模式的生产力水平


    这种模式已存在数十年，企业通常从低成本基线起步，因为它被认为是高度优化的金字塔结构。由于这种结构中初级人员占比较大，最初几个月的初始生产力水平往往较低，因为学习曲线通常较高。此外，根据我
    20 多年的经验，我观察到在头六个月内，至少有约 20%-30%的团队成员会因个人能力与项目需求不匹配而被替换。正因如此，我个人发现一个 20 到 30 人的团队通常需要三到五个月才能稳定下来，并交付合理水平的生产力。


    图 13-5 展示了在传统金字塔结构中，生产力水平如何随时间推移而提高并趋于稳定。从图 13-5 可以清楚地看出，初始生产力水平相当低，然后逐渐成熟至稳定状态。这意味着，与团队所交付的价值或生产力相比，产品团队在初始阶段的成本更高。


    与传统金字塔结构相反，图 13-6 所示的菱形结构从第一个月起就能保证更高的生产力水平。这是因为从一开始，只有胜任工作的合格人才被引入产品团队。


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig6_HTML.jpg](img/517610_1_En_13_Fig6_HTML.jpg)


    图 13-6


    菱形结构的生产力水平


    总而言之，一旦企业开始衡量团队随时间推移的生产力，菱形结构的成本并不会高于传统的三角形金字塔。


    根据我亲身经历的多家从传统金字塔结构转型为菱形结构的企业（超过六家），事实证明，采用菱形结构的成本比传统金字塔结构可节省超过 30%。这些数据是在为期 12
    个月的案例研究中测量得出的。


    通过采用如前所述的菱形结构，与传统的金字塔结构相比，企业在平均资源成本方面将获得更佳的效果。需要在以下领域进行至少 12 个月的成果衡量：


    -   磨合成本 – 任何新引入产品团队的资源都会产生磨合成本，例如相比现有资源增加的工资、新旧资源交接的成本、了解新产品所需的时间等。

    -   团队内个人的生产力。


    对于正在踏上物联网之旅的企业来说，菱形结构是必不可少的。关键在于要识别出一个积极主动且能力出众的产品工程团队，该团队将以最敏捷且最具成本效益的方式为企业开发出最佳产品。而
    Hackfest 模式有助于识别合适的产品工程团队，这将在后续内容中详细讨论。


    ### 用于识别产品开发团队的 Hackfest 模式


    `Hackfest`是一种模式，它提供了一种关于如何识别物联网产品开发团队的方法。`Hackfest`遵循一种循序渐进的方法，从为产品组织初选个人，到识别具备能力的人才，直至他们接受培训并被部署到各个产品开发团队。


    `Hackfest`模式评估和选拔过程摒弃了主观评价，完全基于客观标准。因此，与传统的招聘流程相比，招募到积极主动且技能娴熟的人才的机会翻倍。


    `Hackfest`模式的四个阶段如图 13-7 所示。


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig7_HTML.jpg](img/517610_1_En_13_Fig7_HTML.jpg)


    图 13-7


    Hackfest 模式的四个阶段


    每个企业都需要根据自身的组织架构，按照下文所述的指导方针来定制`Hackfest`模式。


    #### 初选


    第一阶段是初选阶段，在此阶段，物联网产品团队的所有潜在人选都将基于其核心技能进行全面评估。企业需要准备一个技术评估工具包，以支持为下一阶段筛选人选。此外，有许多行业领先的平台，如`Codility`、`CodeSignal`和`HackerRank`，可以通过针对物联网的在线编码测试帮助企业筛选资源。


    #### 产品聚焦评估


    第二阶段是产品聚焦评估，此阶段通过要求个人开发针对实际物联网用例的概念验证，来评估其技术技能。在初选阶段，个人是根据行业标准对其核心技能进行评估的；而在产品聚焦评估阶段，则是在特定于产品的实时场景中评估个人的表现。企业需要确保提供一个端到端的物联网平台，该平台配备所有能复制物联网产品开发团队实际工作环境的技术和工具。这样的平台被称为产品聚焦评估（PFE）平台。


    在我曾合作过的一家名为 ABC Corporation 的企业，我们开发了一个`PFE`平台，该平台复制了实际的产品开发环境，设备连接到`IoT Gateway`和`IoT
    Platform`。同时还提供了一个完整的数据平台，用于评估数据团队和数据科学家。


    建议创建一个`PFE`平台，用以复制产品团队将要工作的实际环境。这样的平台有助于评估个人一旦被部署到产品团队后，能够交付多高的生产力。个人需要利用完整的`PFE`平台为物联网用例进行开发。一旦个人完成开发，将对以下方面进行评估：


    -   代码质量

    -   设计质量

    -   代码中考量的安全级别

    -   从可维护性角度看代码编写的好坏程度

    -   从可靠性角度看代码编写的好坏程度等

    -   为物联网用例生成的报告/洞察


    市场上有多种工具可以执行上述验证。在 ABC Corporation 前述的案例研究中，使用了诸如`SonarQube`等工具进行静态代码质量分析；使用`jDepend`来验证设计质量（涉及可维护性、性能和可靠性）；并使用`AppScan`进行代码安全性分析。

    '
- fmt: '#### Behavioral Evaluation


    All applicants who successfully complete a product-focused evaluation are further
    assessed on their behavioral skills. Behavioral evaluation is a process to discover
    how interviewees act in specific employment-related situations. The logic on how
    one behaved in the past will likely predict how that individual will behave in
    the future, that is, past performance predicts future performance. There are several
    tools available in the market such as the `Chally Assessment` which assesses individuals
    on their behavioral skills that can be utilized, or specific in-house evaluation
    mechanisms can be created by enterprises themselves.


    #### Trainings


    Once an individual successfully completes the behavioral evaluation, the next
    step in the `Hackfest` model is to prepare individuals for deployment to the product
    team. To ensure that there is the right level of productivity achieved from day
    one, individuals need to be supported with training on their supporting skills,
    if required. Individuals should be trained to a level that they will be able to
    utilize the supporting skill with minimal supervision required from their superiors
    and peers.


    *Core skills are those which the job or task cannot be carried out without having.*


    *A supporting skill is a variant of a core skill. It means that an individual
    will need to have this as a mandatory skill; however, they can be a beginner level
    in this skill, and this skill can be acquired with training or on-the-job learning.
    As an example, in the context of a `Java` developer, core skills are `Java` and
    `J2EE`. Supporting skills can be an experience in the `C++` programming language,
    knowledge in a specific security tool, expertise on an operating system on cloud
    infrastructure, installing a tool on cloud infrastructure, monitoring infrastructure,
    and so on. Every product team should define core skills and supporting skills
    specific to the product requirement, and only individuals who possess these skills
    should be inducted into the product engineering team.*


    The `Hackfest` model may look like a lengthy four-stage interview process, but
    if you understood the nuances of this model, there is just one round of comprehensive
    evaluation in each area. With such an evaluation, a 360-degree assessment can
    be performed on each individual. As an example, with product-focused evaluations
    an individual is assessed on their development skills from several angles, such
    as code quality, security, reliability, and maintainability. This clearly articulates
    the coding style of an individual and provides a view on their strengths and weaknesses,
    based on which decisions can be made. This implies that projects will be far more
    successful if the right resources can be introduced in the product development
    teams.


    With the `Hackfest` model, enterprises can assess hundreds of resources in one
    go, providing necessary infrastructure such as a `PFE` platform is available at
    scale. My own personal experience has demonstrated that a well-planned `Hackfest`
    can be completed in two days for around 200 applicants, which is quite an attractive
    prospect for large-scale resource requirements with tight deadlines to meet.


    ## Summary


    In this chapter, we discussed the key roles required for an `IoT` product team,
    which are listed as follows:


    1.  `IoT` champion – Who leads the complete IoT program

    2.  Operational Technology lead – Who can bring the shop floor expertise

    3.  Security advisor – Across IT and OT systems

    4.  Product development team – Constitutes of the `DevSecOps` team which is a
    team of application developers, application security experts, and the operations
    team

    5.  Information Technology lead – Who is conversant with the IT systems and also
    understands the nuances of OT systems

    6.  Big data lead – Who sets up and chooses the data platform


    As we now understand the key roles that need to be part of the product team for
    IoT implementation, the next step is to identify a high-performing IoT team. We
    discussed that enterprises need to follow a diamond structure in contrast to a
    traditional triangle pyramid and subsequently use the `Hackfest` model to identify
    product teams. The `Hackfest` model has four phases, namely, the shortlisting
    phase, product-focused evaluation phase, behavioral evaluation phase, and the
    training phase. With the `Hackfest` model, enterprises move away from subjective-based
    evaluation process to fully objective based.


    Following the principles and models laid out in this chapter, any enterprises
    will be able to create a high-performing product team.'
