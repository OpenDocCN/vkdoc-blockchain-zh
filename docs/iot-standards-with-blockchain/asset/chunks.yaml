    | ![](img/517610_1_En_8_Figv_HTML.gif) |


    ### 保护设备


    保护设备免受攻击需要同时采用代码签名和运行时保护。


    代码签名是对可执行文件和脚本进行数字签名的过程，用于确认软件作者身份，并保证代码在签名后未被篡改或损坏。运行时自保护（RSP）是一种安全解决方案，旨在为设备上运行的应用程序提供个性化保护。它利用对应用程序内部数据和状态的洞察，使其能够在运行时识别其他安全解决方案可能忽略的威胁。代码签名通过加密方式确保代码在被“签名”为设备安全后未被篡改。所有关键设备，无论是传感器还是集线器，都应配置为仅运行已签名的代码，绝不运行未签名的代码。尽管如此，在代码开始运行后很长一段时间内，设备仍然需要受到保护。基于主机的防护在此发挥作用。基于主机的安全性是一种运行在连接到网络的个人计算机或设备上的防火墙软件。这类防火墙是一种精细化的方式，用于保护单个主机免受病毒和恶意软件的侵害，并控制这些有害感染在网络中的传播。


    基于主机的防护为各种物联网设备提供了加固、锁定、白名单、沙箱、面向网络的入侵防御以及许多此类安全功能。'
- fmt: '### API Security


    The application program (or programming) interface, or API, ties devices and the
    complete IoT ecosystem together. IoT APIs are the points of interaction between
    an IoT device and the Internet and/or other elements and systems within the IoT
    network.


    API security is concerned with the transfer of data through APIs that are connected
    to the Internet. It is essential for enterprises to protect the integrity of data
    being sent from IoT devices to Smart IoT Gateways to the IoT Cloud Platform or
    back-end systems and ensure only authorized devices and applications communicate
    with APIs.


    Some examples of the most common ways for enterprises looking to strengthen their
    API security are listed as follows:


    * **Use tokens** – Establish trusted identities and then control access to services
    and resources by using tokens assigned to those identities.

    * **Use encryption and signatures** – Encrypt data using a method like TLS. Transport
    Layer Security is a cryptographic protocol designed to provide communications
    security over a computer network. Devices with signatures will ensure that the
    right users are decrypting and modifying the data.

    * **Upgrades and vulnerability identification** – Enterprises need to upgrade
    their operating systems, networks, drivers, and API components periodically. They
    need to know how everything works together and identify weak spots that could
    be used to break into APIs. Some enterprises use sniffers to detect security issues
    and track data leaks. Sniffing is a process of monitoring and capturing all data
    packets passing through a given network.

    * **Use quotas and throttling** – Often, enterprises need to set quotas on how
    often their API can be called and track its use over history. More calls on an
    API may indicate that it is being abused. It could also be a programming mistake,
    such as calling the API in an endless loop. Enterprises need to make rules for
    throttling to protect APIs from spikes and denial-of-service attacks.

    * **Use an API Gateway** – It is also recommended to have an API Gateway as the
    major point of enforcement for API traffic. A good Gateway will allow to authenticate
    traffic as well as control and analyze how APIs are used.


    ### Smart IoT Gateway Security


    IoT Gateways are a solution to enable communication with devices irrespective
    of their protocols and also act as security agents for resource-constrained IoT
    devices, sensors, and actuators that lack the CPU horsepower, battery life, and
    storage to handle complex cryptographic security functions, such as secured access
    authentication and encryption. However, in an IoT environment, not only the devices
    but the Gateway itself is prone to various security threats since Gateways are
    exposed to the Internet. If the Gateway is not secured, all accompanying security
    technologies would become useless if the Gateways are compromised. Enterprises
    need to ensure that they deploy Smart IoT Gateways, which have foolproof security
    controls, and at a minimum the Gateways have endpoint security controls such as
    identity and access control, over-the-air updates, and threat detection feature.


    #### Identity and Access Control (IAC)


    Identity management and access control is the discipline of managing access to
    enterprise resources to keep systems and data secure. As a key component of the
    security architecture, IAC helps verify device or user identities before granting
    them the right level of access to systems and data.


    The Gateway needs a root of trust to identify itself on the network before it
    can participate in data exchange. A Gateway should be designed as a trust anchor
    and equipped with key-based access control to grant access to authorized users
    and devices. To protect the secrets (keys and certificates), secured storage should
    be implemented.


    Often, Gateways are exposed to extreme outdoor environments. Tamper-resistant
    hardware can protect them from physical damage.


    #### Over-the-Air Updates and Secure Boot


    Over-the-air updates ensure that the Gateway is running the latest software and
    firmware free from common vulnerabilities and exposures. Secure boot enables the
    Gateway to boot firmware images whose integrity and authenticity have been cryptographically
    verified. This precaution prevents booting the Gateway with malicious firmware.


    #### Visibility and Threat Detection


    Fine-grained event logging provides sufficient visibility into the processes running
    in the Gateway, which is useful for security audits and also automates threat
    detection and troubleshooting. In IoT environments, where accessibility could
    be constrained, it is more practical to automate threat detection by using machine
    learning or Artificial Intelligence. Machine learning enables enterprises to identify
    behavioral baselines and detect or even prevent anomalies, and such features should
    be validated before choosing an IoT Gateway.


    ### Patch Management/Continuous Software Updates


    Providing means of updating devices and software either over network connections
    or through automation is critical. Having a coordinated disclosure of vulnerabilities
    is also important to updating devices as soon as possible. Consider end-of-life
    strategies as well.


    ### Hardware Security


    Endpoint hardening includes making devices tamper-proof or tamper evident. This
    is especially important when devices will be used in harsh environments or where
    they will not be monitored physically.


    ### IoT Platform Security


    Almost all large IoT Platform vendors, such as AWS, Google, or Azure, have secured
    their platforms with the most comprehensive security postures and have built-in
    protection at the platform level. These platforms are built on a secure and proven
    cloud infrastructure and scale to billions of devices and trillions of messages.


    Enterprises utilizing these products need to ensure that security features provided
    by these vendors are fully utilized to serve their IoT ecosystem.'
