    #### 行为评估


    所有成功完成产品导向评估的申请者，都将进一步接受其行为技能的评估。行为评估是一种探索面试者在特定工作相关情境中如何表现的过程。个人过去的行为逻辑很可能预测其未来的行为方式，即过去的表现预示未来的表现。市场上有多种工具可供使用，例如用于评估个人行为技能的
    `Chally Assessment`，企业也可以自行创建特定的内部评估机制。


    #### 培训


    一旦个人成功完成行为评估，`Hackfest` 模型的下一步就是为个人部署到产品团队做好准备。为了确保从第一天起就能达到预期的生产力水平，如有需要，应通过支持技能培训为个人提供支持。个人应被培训至能够在极少需要上级和同事监督的情况下运用支持技能的水平。


    *核心技能是指完成工作或任务所不可或缺的技能。*


    *支持技能是核心技能的一种变体。这意味着个人需要将其作为一项必备技能；然而，他们在这项技能上可以处于初级水平，并且这项技能可以通过培训或在职学习来获得。例如，在
    `Java` 开发人员的背景下，核心技能是 `Java` 和 `J2EE`。支持技能可以包括 `C++` 编程语言经验、特定安全工具的知识、云基础设施操作系统的专业知识、在云基础设施上安装工具、监控基础设施等。每个产品团队都应根据产品需求定义核心技能和支持技能，只有具备这些技能的个人才应被引入产品工程团队。*


    `Hackfest` 模型可能看起来是一个冗长的四阶段面试流程，但如果你理解了这个模型的细微差别，就会发现每个领域实际上只有一轮全面的评估。通过这种方式，可以对每个个人进行
    360 度评估。例如，通过产品导向的评估，可以从代码质量、安全性、可靠性和可维护性等多个角度评估个人的开发技能。这清晰地阐述了个人的编码风格，并展示了他们的优势和劣势，从而可以据此做出决策。这意味着，如果能为产品开发团队引入合适的人才，项目将会成功得多。


    借助 `Hackfest` 模型，企业可以一次性评估数百名人才，前提是能按需提供必要的配套基础设施，例如 `PFE` 平台。我个人的经验表明，一次精心策划的
    `Hackfest` 可以在两天内完成对大约 200 名申请者的评估，这对于需要在紧迫期限内满足大规模人才需求的情况来说，是一个极具吸引力的前景。


    ## 总结


    在本章中，我们讨论了一个 `IoT` 产品团队所需的关键角色，列举如下：


    1.  `IoT` 负责人 – 领导整个物联网项目

    2.  运营技术负责人 – 能够带来车间专业知识

    3.  安全顾问 – 涵盖 IT 和 OT 系统

    4.  产品开发团队 – 由 `DevSecOps` 团队构成，该团队包括应用程序开发人员、应用程序安全专家和运维团队

    5.  信息技术负责人 – 熟悉 IT 系统并理解 OT 系统的细微差别

    6.  大数据负责人 – 搭建并选择数据平台


    既然我们了解了实施物联网所需的产品团队中的关键角色，下一步就是识别一个高绩效的物联网团队。我们讨论了企业需要遵循钻石形结构（而非传统的三角金字塔形结构），并随后使用
    `Hackfest` 模型来识别产品团队。`Hackfest` 模型包含四个阶段，即：初选阶段、产品导向评估阶段、行为评估阶段和培训阶段。通过 `Hackfest`
    模型，企业从基于主观的评估过程转变为完全基于客观的评估。


    遵循本章阐述的原则和模型，任何企业都将能够创建高绩效的产品团队。

    '
- fmt: '# Summary of the Book


    Overall, this book is about business-driven digital transformation using `IoT`.
    A business-driven digital transformation means that business goals define the
    technology road map and not vice versa. The Internet of Things (`IoT`) is one
    such technology that enables digital transformation for enterprises.


    The Internet of Things (`IoT`) is all about connecting devices and factory equipment
    over the Internet to derive insights that enterprises can use to become competitive
    in the market or do operations in a highly optimized and cost-effective way.


    In the first part of this book, we introduced readers to the generic industry
    perspective on digital transformation using `IoT`. We also discussed about the
    three business strategies for enterprises to adopt and remain relevant in the
    marketspace – the Customer Engagement Strategy, the Business Transformation Strategy,
    and the Business Productivity Improvement Strategy. It is necessary that enterprises
    choose a business strategy to ensure that a clear mission and vision is established
    based on which `IoT` road map can be defined. Subsequently, all business processes
    pertaining to the chosen business strategy are investigated to define use cases
    where `IoT` can be adopted to achieve the business strategy.


    In the second part, we discussed about the `IoT Standards Reference Model` which
    is an abstract framework consisting of an interlinked set of clearly defined components,
    using which enterprises can successfully implement an `IoT` solution. The `IoT
    Standards Reference Model` can be applied for `IoT` use cases across any industries
    and is kept abstract in order to enable many, potentially different, `IoT` architectures
    to be implemented based on the `IoT Standards Reference Model`.


    In this part, we also discussed about the challenges faced by enterprises while
    implementing `IoT` use cases and how to overcome those using the `IoT Standards
    Reference Model`. The challenges range from device diversity and their communication
    protocols to the `IoT Gateways` that connect these `IoT` devices together followed
    by the `IoT Cloud Platform` that enterprises use for storing big data and performing
    analytics.


    The third part of the book discussed about the importance of Artificial Intelligence
    and `Blockchain` for `IoT` use cases.


    `Blockchain` is one of the interesting topics in the technology circles, which
    is currently revolutionizing the way enterprises will do business in the future.
    We discussed the importance of using private `blockchain` for `IoT` use cases
    along with the five `IoT-Blockchain` implementation patterns, using which enterprises
    can enable seamless communication between `IoT` devices, `Smart IoT Gateways`,
    and `IoT` platforms to `blockchain`. These patterns will help achieve trust, interoperability,
    and extendibility, which is one of the major challenges faced by enterprises in
    `IoT` implementation today.


    Artificial Intelligence (`AI`) is the next topic and is the art of making machines
    smart by teaching them to be like humans. Artificial Intelligence is one of the
    very important features within the `IoT Standards Reference Model`. The reference
    model recommends applying `AI` patterns to generate insights from data and take
    appropriate actions automatically. A perspective on how and when to apply `AI`
    in an `IoT` context is also provided.


    In the final part of the book, we discussed about the execution aspects of `IoT`,
    centered around big data and analytics, product organization, and the `IoT` product
    team.


    With `IoT` at the helm of digital transformation, the complexity of managing data
    has increased several folds because until now we are talking about terabytes and
    petabytes of data, and with `IoT` we will be dealing with zettabytes of data.
    In this part, we discussed how to set up an efficient data platform using the
    `Data First Reference Model` that will enable enterprises to spend less money
    and efforts toward managing their data platform and focus more on actual insights
    and actions. We also discussed about the key capabilities that enterprises need
    to validate from a data perspective, based on which they can choose the right
    products for their `IoT` use cases.


    Subsequently, we also discussed about product organization to implement `IoT`
    use cases. It is very essential for enterprises to move from a project-based thinking
    to a product organization to reap the benefits from `IoT` use cases. However,
    this is a very complex transformation and involves a massive shift to the human
    resource function of an enterprise. In this part, we discussed about how enterprises
    can transform themselves to a product-based organization and how a human resource
    function within an enterprise needs to change. Finally, in this part, we discussed
    about the `IoT` product team that will be responsible for making `IoT` use case
    implementation successful. We discussed about the different roles required for
    `IoT` implementation and how `IT` and `OT` teams need to come together to make
    `IoT` use cases successful.


    Overall, this book defined an enterprise digital transformation framework for
    `IoT`, called `IoT Standards`, that will enable enterprises to do business better
    and achieve operational benefits using `IoT`.'
