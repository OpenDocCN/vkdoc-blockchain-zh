  trans: '

    # 大数据挑战


    大数据需要大量的存储空间，组织必须不断扩展其硬件和软件，以适应数据的增长。随着这些数据集随时间呈指数级增长，处理它们变得极其困难。


    第二个挑战是数据的**高速性**。这意味着新数据的生成速度非常快，组织需要拥有能够实时响应的解决方案。


    第三个挑战是数据的**多样性**。数据以多种不同的格式存在，例如文本、图像、视频和电子表格。将这些数据整合起来，理解其含义并生成报告，是一项需要解决的艰巨任务。


    企业面临大数据的第四个关键挑战是**安全性**。保护海量数据集是大数据平台面临的严峻挑战之一。


    市场上存在许多成熟的解决方案来应对上述挑战，但在将其引入企业之前，需要仔细评估这些方案。


    ## 工业 4.0 与物联网数据


    工业 4.0，也称为第四次工业革命，是我们在过去几年里在物联网背景下经常听到的术语。该术语围绕传统制造业和工业实践中的自动化和人工智能，以及 IT 和 OT
    行业正在发生的整体技术创新。第四次工业革命也正扩展到其他更广泛的行业，并通过使机器变得更智能、能力更强大来改变商业格局，而这一切都依赖于这些机器注入的海量数据。随着物联网引领数字化转型，管理数据的复杂性增加了数倍，因为到目前为止我们谈论的还是
    TB（太字节）和 PB（拍字节）级别的数据，而有了物联网，我们将要处理的是 ZB（泽字节）级别的数据。物联网数据的大小对所有“四大 C”特性（可能指容量、速度、多样性和价值等）都产生重大影响，因此需要一种非常优雅的解决方案来处理和管理物联网数据。


    一兆字节（`MB`）等于 1024 千字节。一千兆字节（`GB`）等于 1024 兆字节，一太字节（`TB`）等于 1024 千兆字节，一拍字节等于 1000
    太字节，而 1 泽字节等于 1,000,000 拍字节，以此类推。仅举一例，所有美国学术研究图书馆的总存储量约为 2 拍字节。


    数据管理是一个管理过程，包括获取、验证、存储、保护和处理必要的数据，以确保其用户能够访问数据，并保证数据的可靠性和及时性。


    数据延迟是指数据从一个地方传输到另一个地方所需的时间。


    ## 物联网数据的关键考量


    一方面，许多企业正在推出各种平台、工具和解决方案来实现物联网用例；另一方面，企业却在努力理解来自设备的海量数据，导致他们无法从物联网用例中获取价值。在数据层面，物联网中需要解决的关键点是：理解如何存储如此海量的数据、将这些数据存储在哪里（设备端、智能物联网网关还是物联网云平台）、如何处理数据，以及随后如何以及何时分析这些数据。从概念上看，这似乎相当简单，但事实并非如此，因为需要有非常强大的解决方案来应对每项针对物联网数据的具体挑战，并非所有传统的大数据解决方案都能满足物联网数据的需求。


    图 11-1 描绘了企业需要从数据角度验证的八项关键能力。^(²⁴) 根据具体用例，企业应决定这些能力需要存在于何处，即是在智能物联网网关端还是物联网云平台端，并据此购买相应的产品。


    ![../images/517610_1_En_11_Chapter/517610_1_En_11_Fig1_HTML.jpg](img/517610_1_En_11_Fig1_HTML.jpg)


    **图 11-1** 在决定数据平台时需要验证的八项能力


    ## 调试能力


    在物联网用例中，有大量设备被连接，每个设备都会发送海量数据。物联网实施过程中一项紧迫的挑战就是调试。这意味着，如果整个物联网架构中出现问题（例如物联网用例的性能问题，或设备故障导致无法发送正确数据），则需要有强大的解决方案，可以是在物联网网关层面，也可以是在物联网云平台层面，来帮助调试问题。问题可能出现在设备层、网络层、智能物联网网关层或物联网平台层，而定位问题所在极其困难。企业需要寻找拥有合适解决方案的供应商来解决此问题。


    ## 数据的及时性与准确性


    物联网最重要的方面之一是数据需要及时和准确。这意味着来自不同设备和系统的相关数据需要同时汇集，并实时关联起来，以便理解数据。例如，如果我们从一个与环境相关的传感器读取温度数据，同时某个设备发生故障，那么必须将确切的故障时间与确切的温度数据关联起来，才能从数据中得出有意义的洞察。如果我们无法关联这两个数据点，那么收集这些数据就毫无意义，甚至毫无价值。这意味着来自不同设备的数据必须以最小或零延迟到达，否则这些数据后续就没有价值。除了数据的及时性和准确性之外，企业还需要寻找能够恰好在关键时刻将这两个数据点汇集在一起的解决方案，以确保能够根据从数据中生成的洞察采取行动。


    这引出了企业在选择任何物联网平台或网关之前需要验证的另一个重要解决方案——哪家供应商拥有最佳解决方案，能够精准地汇集实时数据，并在恰当时机从数据中生成洞察，以便及时采取行动。


    ## 数据管理与洞察应在何处进行


    企业在开启物联网之旅时需要关注的第三个领域，是确定复杂的数据管理过程在何处进行。一旦从传感器获取数据，数据就会被摄入智能物联网网关，在某些情况下，还会被发送到物联网云平台，在那里进行数据清洗和转换，然后从数据中生成洞察。这究竟需要在智能物联网网关层面、物联网云平台层面，还是在设备自身进行？这个问题需要根据具体用例来回答，并据此选择适当的解决方案。这样的决策取决于正在开发的用例本身以及所属行业。例如，在智慧农业用例中，如果某株植物没有得到足够的水分，我们可以第二天再去给它浇水。即使稍后采取行动，或者分析出错，也不会产生重大影响——在所有这类情况下，由物联网云平台进行数据管理在经济上仍然是可行的，因为数据延迟不会对该物联网用例产生重大影响。然而，在诸如采矿等行业中，我们需要实际控制从管道中流出的原油，就必须能够在正确的时间将原油分流到正确的单元进行处理，否则企业可能会遭受巨大损失。此外，在自动驾驶汽车用例中，延迟可能导致死亡或事故。对于所有这类时间至关重要的用例，数据管理和洞察必须在物联网网关层面进行，并且要求这些网关必须部署在靠近设备的位置。在某些情况下，数据管理和洞察甚至需要由设备本身来执行。

    '
- fmt: '# Data Storage Considerations (What Data Needs to Be Stored and What Needs
    to Be Discarded)


    We discussed that IoT use cases generate a massive amount of data. However, it
    is important to understand that not all data generated by the devices are relevant
    for the enterprises, and this brings in a few important points that enterprises
    need to validate from a data perspective, which are listed as follows:


    - What data needs to be stored

    - What data needs to be discarded and when

    - Which data needs to be retained for short-term purposes

    - Which data needs to be retained for long-term purposes


    All these need to be addressed from a data perspective before enterprises embark
    on their IoT use case development journey, else it will lead to failed IoT implementation.
    Hardware and storage specifications of Smart IoT Gateways or IoT Cloud Platforms
    are determined based on the storage requirements, data processing and data cleansing
    capability requirements, and computing and analytics capability. More specifically
    based on the short-term and long-term data storage needs, enterprises can determine
    the Smart IoT Gateway and IoT Cloud Platform required for their enterprise.


    # Rapid Provisioning of Storage Is Another Key Requirement


    In the old days when data was collected from the satellites, we used to wait for
    the satellite to come over to our country. We had a very short window and bandwidth
    to collect the data, and during this period required data used to be collected
    to the extent possible, and then storage was made free for the next round of the
    satellite data collection. However, the agility required was not really to the
    level of minutes or microseconds. Today, IoT use cases have far higher demands
    on agility. Data is transmitted and needs to be collected at second levels or
    sometimes subsecond levels, and in many use cases, data would be relevant for
    that moment of time, such as temperature data. So enterprises need to be able
    to process the data as soon as they receive it, perform analytics and take actions,
    and then discard the data and keep storage free for the next set of data to come
    in. This brings in a key expectation from a data perspective in IoT use cases,
    which is the ability of the platforms to support rapid provisioning of storage.
    Enterprises need solutions that can scale up storage when required and scale down
    when the task is completed.


    # Data Management with Fog Computing


    With the massive amount of data coming from each device in the IoT ecosystem,
    a single Smart IoT Gateway will not be able to handle the load especially for
    large-scale IoT use cases, such as in manufacturing or oil and gas industries.
    For all such use cases, there is a need to collect data from millions of devices
    and take actions just in time based on the insights generated from the data. A
    conglomerate of multiple IoT Gateways needs to be deployed to achieve the goals
    of the IoT use case. This is where fog computing comes into play. Fog computing
    or fog networking, also known as fogging, is an architecture that uses edge devices
    or IoT Gateways to carry out a substantial amount of computation, storage, and
    communication locally and routed over the Internet backbone.


    Enterprises need to look at data solutions that will address such a complex architecture
    where data and analytics need to be performed across multiple systems.


    # Automated Data Decisions


    We discussed that enterprises need to determine what data needs to be stored,
    what data needs to be discarded, which data needs to be retained for short-term
    purposes, and which data needs to be retained for long-term purposes. Managing
    and storing all such data is currently manual, and there are very few solutions
    in the market that can perform this task automatically. To be more precise, enterprises
    need to look for automated solutions to perform the activity of storing and deleting
    the data either in Smart IoT Gateways or on IoT Cloud Platforms. Using Artificial
    Intelligence, this task can be performed, where machines can learn how enterprises
    had been managing their data in the past and predict how data needs to be managed
    in the future. There are companies that have started working on such solutions,
    but we are far from an elegant solution.


    # Data Security and Privacy Remains to Be a Big Concern Across Industries in IoT


    It is quite important to understand the security solutions from a data perspective
    in an IoT context. Enterprises need to look at efficient solutions for encrypting
    the data in a way that nobody else can read data except the recipient. There need
    to be strong solutions for data protection, because a lot of data will be stored
    at the IoT Gateway or IoT Platform. Enterprises need to look at solutions that
    address how data is purged, and that purged data cannot be recovered again because
    enterprise data is always very sensitive. Another area in a similar context is
    the data privacy. From a data perspective, enterprises need to look at solutions
    where the data of one user of a department is not accessible to others.


    # (Big) Data-First Reference Model


    The key to success for any organization is how well big data is being used in
    the organization to make business decisions. To make the right decisions, enterprises
    need to get the correct and relevant data at the right time to the business. This
    is one of the reasons why the "data first" terminology has become so prominent.
    The strategy of data first is how we enable enterprises to move toward a data-driven
    organization where each and every major business decision is made from insights
    received from data. To make a data-first strategy come true, data journeys need
    to be smartly managed. With IoT, a data-first strategy is a mandate since IoT
    use cases use data as the primary vehicle to succeed.


    Though enterprises understand the importance of data and have tried to embark
    on a data journey, many of them have seen failed results. Without a fully implemented
    data platform and a standard architecture, organizations cannot expect to have
    sound data hygiene practices in place that will help them to be successful. Figure
    [11-2](#517610_1_En_11_Chapter.xhtml#Fig2) provides an overview on the data-first
    reference model, using which enterprises can define a standard operating model
    that can help them succeed in their data journey for IoT use cases.


    ![../images/517610_1_En_11_Chapter/517610_1_En_11_Fig2_HTML.jpg](images/517610_1_En_11_Chapter/517610_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2** Data-first reference architecture


    The first block is the data source, where data from external and internal sources
    arrive at the enterprise. In the IoT ecosystem, IoT data will arrive from devices,
    and other sets of data will come from sources such as external streams, feeds,
    mainframe systems, digital twins, or simple Excel files. This data is sometimes
    directly stored in the data lake or is processed and then stored in the data lake.


    The second block is where data storage and data processing happen. This is where
    data is acquired (data extraction layer) and then cleaned and refined to make
    it usable. This data is then made available for consumption in the appropriate
    format. Data management is a process that includes acquiring, validating, storing,
    and processing data to ensure the accessibility, reliability, and timeliness of
    the data for its users.


    The third block is data governance, which is the process of managing the availability,
    usability, integrity, and security of the data in enterprise systems, based on
    internal data standards and policies that also control data usage.


    The fourth block is called the consumption layer where data is consumed by different
    parties such as analytics platforms, reporting tools, or directly by data scientists
    or business users.'
