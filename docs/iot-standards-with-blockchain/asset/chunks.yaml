- fmt: '# Specific Capabilities


    So far, we discussed about the basic six capabilities that help enterprises in
    prescreening the cloud platform providers. In my experience with these basic six
    features, enterprises can filter their IoT Platform providers to less than ten.
    Though this is the good first milestone achieved, it is quite essential to understand
    that the most important step for any enterprise to succeed in IoT is to choose
    a platform based on the provider specialization and capabilities in IoT. An IoT
    Platform should have enough breadth and depth of capabilities specific to IoT
    solutions, based on the enterprise business and use cases. If this step goes wrong,
    enterprises risk themselves toward failed IoT projects.


    Today, there is no one-size-fits-all platform for an IoT solution. Choosing a
    platform should start with a good understanding of the enterprise IoT strategy.
    It is essential to identify the kinds of problems an enterprise is trying to solve
    using IoT, get a short list of likely solutions and use cases, and try to determine
    where you will need specialization and depth. If enterprises have an idea of what
    kind of business problem they are solving and where the biggest challenges are,
    you will be able to quickly come to a short list of platforms.


    The good news is that, with the introduction of the IoT Gateway in the IoT Standards
    Reference Model, some of the core features are handled at this level, and a reminder
    of the capabilities is required in an IoT Platform. This makes a lot of sense
    since such an architecture brings in autonomy within the architecture. Based on
    the specific needs, enterprises can choose which capabilities are required at
    the IoT Gateway level and which ones are required at an IoT Platform level.


    The four core capabilities that guide enterprises in choosing an IoT platform
    are depicted in Figure [7-2](#517610_1_En_7_Chapter.xhtml#Fig2) and listed as
    follows:


    ![../images/517610_1_En_7_Chapter/517610_1_En_7_Fig2_HTML.jpg](images/517610_1_En_7_Chapter/517610_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Four core capabilities while choosing a cloud platform


    1. Connectivity

    2. Device Management

    3. Application enablement platform

    4. Scalability (device level, data storage, and analytics)


    ## Connectivity


    The first one is the connectivity. In most of the use cases, the Smart IoT Gateway
    manages the communication with the IoT devices. The IoT Platform should be capable
    of communicating with the Smart IoT Gateway in a seamless manner and sending and
    receiving data both in real time and in batch.


    Batch data processing is a model of processing high volumes of data where a group
    of transactions is collected over a period of time and transferred to an IoT Platform
    in a batch. In contrast, real-time data processing involves a continual input,
    process, and output of data from Smart IoT Gateways to the IoT Platform. Data
    must be processed in a small time period (or near real time).


    ## Device Management


    Device Management is a very important function in an IoT Standards Reference Model
    and refers to the processes of provisioning and authenticating, configuring, maintaining,
    monitoring, and diagnosing connected devices operating as part of an IoT ecosystem.
    Some enterprises choose the IoT Gateway to perform Device Management, and some
    prefer to do it at an IoT Platform level. Appropriate decisions need to be made
    based on enterprise business and the use cases. Device Management broadly has
    three different functions as depicted in Figure [7-3](#517610_1_En_7_Chapter.xhtml#Fig3).


    ![../images/517610_1_En_7_Chapter/517610_1_En_7_Fig3_HTML.jpg](images/517610_1_En_7_Chapter/517610_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Device Management functions


    ### Device Onboarding and Provisioning


    Many enterprises follow a manual process where devices are activated in the field,
    configured on the network using IT, and registered with a device owner in an IoT
    platform. This is a time-intensive process and at the same time can lead to security
    breaches as demonstrated by recent large-scale attacks where device manufacturers
    have shipped default credentials that were compromised by hackers using botnet-style
    attacks. A botnet is a collection of Internet-connected devices infected by malware
    that allow hackers to control them. Cybercriminals use botnets to instigate botnet
    attacks, which include malicious activities such as credential leaks, unauthorized
    access, data theft, and DoS attacks.


    A denial-of-service (DoS) attack is a cyber-attack in which the perpetrator seeks
    to make a machine or network resource unavailable to its intended users by temporarily
    or indefinitely disrupting services.


    Some enterprises have claimed that manually adding one device can take over 30
    minutes per device. Imagine a factory installing 10,000 smart light bulbs, all
    of which needs to be onboarded on an IoT platform. Effectively, this means that
    in a manual way an enterprise will need to spend 300,000 person hours to complete
    the installation. The key demand of many enterprises today is to reduce the onboard
    time for IoT devices on the platform. In an Industrial IoT case study, an enterprise
    has tens of thousands of devices to onboard, and in such a large setting, manual
    processes lead to significant costs and efforts. While choosing an IoT Platform,
    enterprises need to look for IoT platforms which can bring down installation time
    and get IoT devices online faster and in a secured and automated way. There are
    IoT platforms available in the market which have created a zero-touch approach,
    making it possible for IoT devices to dynamically discover the IoT platform at
    power-on for automatic registration. Not all enterprises will need such features,
    and careful analytics needs to be performed based on which IoT platform needs
    to be chosen.


    When adding an IoT device, enterprises need to ensure that only trusted devices
    are added to the enterprise IoT ecosystem. Device authentication is therefore
    very essential and is the act of securely establishing the identity of the device
    and ensuring that it can be trusted. With device authentication, enterprises can
    be assured that the device is genuine and is running trusted software and is working
    on behalf of a trusted user.


    Enterprises need to ensure that they choose a platform that can support automatic
    and secure device onboarding. As an example, once a new device on the field is
    powered on, the IoT Platform should be able to locate the device and automatically
    onboard the device on the IoT platform in a completely secured way using methods
    such as public key encryption. Public key encryption, also known as asymmetric
    encryption, uses two separate keys instead of one shared one: a public key and
    a private key. Public key encryption is an important technology for Internet security.


    ### Device Configuration


    As soon as a device gets onboarded, device configuration comes into play. Device
    configuration is the process of fine-tuning the onboarded devices beyond their
    default settings, such as changing password or upgrading with latest firmware.
    A flexible and intuitive configuration mechanism should be available with the
    IoT platform that can enable enterprises to design the behavior of their smart
    fleet not only in times when devices perform as planned but also to react on the
    fly in case of any failures that come along the way. A summation of all the IoT
    device part of an enterprise IoT ecosystem is referred to as smart fleet.'
