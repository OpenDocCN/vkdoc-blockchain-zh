  raw: 'Blockchain resolves the fundamental element of trust. However, the core issue
    in an end-to-end transaction for any enterprise is that there are a variety of
    actors and enterprises with different interests that need to subscribe to the
    same blockchain model to complete a transaction, and it is not always mandatory
    that all of them will do so. If not all parties subscribe to the model from an
    industry perspective, enterprises will not get the full value of applying the
    technology. So it is really important that the manufacturers and the transportation
    companies and the retailers and the delivery companies subscribe to the model.


    Assuming everyone subscribes to the mode, with so many actors to enable an end-to-end
    transaction, it is essential to understand who owns the data, who owns the business
    logic that runs on the blockchain, who can add new services on top of the existing
    blockchain, and who will decide who can join the network and who can leave the
    network. This brings in the most important element of blockchain governance which
    needs to be addressed while the blockchain solution is implemented in an IoT Standards
    Reference Model.


    A public blockchain is permissionless. Anyone can join the network and read, write,
    or participate within the blockchain. A public blockchain is decentralized and
    does not have a single entity which controls the network. Data on a public blockchain
    are secure as it is not possible to modify or alter data once they have been validated
    on the blockchain.


    A private blockchain is a permissioned blockchain. Private blockchains work based
    on access controls which restrict the people who can participate in the network.
    There are one or more entities which control the network, and this leads to reliance
    on third parties to transact. In a private blockchain, only the entities participating
    in a transaction will have knowledge about it, whereas the others will not be
    able to access it.


    A combination of IoT and Blockchain enables end-to-end business insights with
    complete security. However, it is essential to note that as part of the IoT landscape,
    a private blockchain is best suited since IoT is industry- and enterprise-centric,
    and the general public is not allowed to be part of this initiative.


    ## Summary


    In this chapter, we discussed about the IoT Standards Reference Model, which is
    broadly split into three horizontal services and two vertical services.


    The horizontal services are the Full Stack IoT Platform, Smart IoT Gateway, and
    Devices:


    *   The device layer is where the physical objects are located on the shop floors.


    *   The Smart IoT Gateway is responsible for collecting data from devices and
    relaying it to the rest of the systems. In many scenarios, the Smart IoT Gateway
    performs the preprocessing of the data collected from devices including analytics.
    Another feature the Smart IoT Gateway performs is Device Management. Some enterprises
    choose to perform Device Management at the Smart IoT Gateway level, but others
    prefer to perform Device Management in the next block which is at the Full Stack
    IoT Platform level.


    *   The Full Stack IoT Platform is where the IoT data coming from devices via
    the Smart IoT Gateway is combined with other non-IoT data to derive useful insights
    using analytics systems or applications.


    The two vertical services are Blockchain and security:


    *   Though Blockchain is currently evolving in the context of IoT, it is quite
    essential that enterprises plan this function while deciding their IoT architecture
    as Blockchain is going to become the most important element for enterprises to
    succeed with IoT in the future.


    *   The devices, Smart IoT Gateways, and Full Stack IoT Platform need to be secured,
    which is one of the key implicit requirements of the IoT Standards Reference Model.


    In the next chapter, we will discuss about the different IoT devices and their
    communication protocols, including their limitations and challenges.


