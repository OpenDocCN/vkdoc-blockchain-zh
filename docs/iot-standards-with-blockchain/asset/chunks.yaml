    \  \n\n本 Apress 印记由 Springer Nature 旗下的注册公司 APress Media, LLC 出版。  \n注册公司地址为：1\
    \ New York Plaza, New York, NY 10004, U.S.A.  \n\n## 引言\n\n数字化转型是指对业务和组织活动、流程、能力及模式进行变革，以战略性地、按优先顺序充分利用数字技术组合带来的机遇及其跨行业的加速影响，同时考虑到当前和未来的变化。\
    \  \n\n数字化转型并非关乎技术本身，而是企业以不同方式开展业务和运营，从而在市场中保持竞争力并具有颠覆性的一种途径。为实现这一变革，技术得以运用。数字化要求企业愿意重新审视其整个业务模式，理解新价值前沿所在，以及技术如何能更快地带来这种价值。在实践中，端到端客户体验优化、运营灵活性和创新是数字化转型的关键驱动因素和目标，同时还包括开发新的收入来源及信息驱动的价值生态系统，从而带来业务转型和新型数字化流程。\
    \  \n\n物联网（IoT）是讨论最广泛的数字技术之一，有望为企业带来诸多益处。物联网的核心是通过互联网连接设备和工厂设备。换言之，它是运营技术（OT）与信息技术（IT）的融合。\
    \  \n\n运营技术涉及（重型）机械、人员安全等方面。它对停机时间、错误和安全几乎零容忍。这也是运营技术始终以高度规避风险的方式运作的核心原因之一。运营技术的另一个方面是，工厂中部署的机械无法像\
    \ IT 系统那样以相同的速度升级或更换，这些设备一旦购入将使用多年。这成为在这些机械上部署创新理念以提高其效率的障碍。从人员角度来看，IT 和 OT 这两个部门在传统和文化上并未投入太多时间共同协作。典型的\
    \ IT 部门以系统正常运行时间、应用程序和 IT 基础设施的可用性、安全漏洞数量以及降低 IT 成本来衡量绩效。另一方面，OT 部门由工厂经理、生产经理甚至农业农民组成。他们是生产食品、控制石油和天然气流程或从地下抽取石油的人员。OT\
    \ 部门以完全不同的成功标准来衡量，例如作物产量、生产该产量所用的水量、工厂的生产正常运行时间等。  \n\nIT 和 OT 部门是两个不同的世界，每个部门的成功衡量标准截然不同。借助物联网，这两个部门需要协同工作，这正是连接人与连接事物同等重要之处。成功的物联网用例为企业带来了诸多益处，例如开辟新的商业机会、增加收入，同时使企业能够更高效地运营、更具生产力、更有保障以及更有利可图。一个典型的例子是智能冰箱。利用物联网，冰箱可以告诉我们牛奶用完了，如果其内部摄像头检测到没有牛奶了，或者牛奶盒已过保质期，就会给我们发短信。如果应用得当，物联网对企业的益处是巨大的，这也是物联网如此受欢迎的原因之一。然而，物联网仍处于非常早期的成熟阶段，为了给物联网项目带来标准化，仍有许多指导原则和工作方式正在定义中。\
    \  \n\n尽管对许多企业而言，物联网是一个相对较新的领域，但这并不能阻止我们迈向物联网卓越之旅。好消息是，已经有许多指导原则、成熟实践、工具和技术被开发出来，通过谨慎选择合适的方法，企业可以在物联网方面取得成功。本书正是朝着标准化端到端物联网实施方法迈出的一步，它基于过去跨多个行业在物联网领域取得的多项最佳实践和成功经验。\
    \  \n\n本书为企业定义了一个面向物联网的数字化转型框架，称为 IoT Standards，它将使企业能够更好地开展业务，并利用物联网实现运营效益。 \
    \ \n\n本书面向所有以业务为核心驱动力、意图成功开启以物联网为主导的数字化转型之旅的首席执行官、技术领导者和业务领导者。  \n\n本书是我在过去几年中领导的多个成功物联网项目的成果。最后，本书也是我和同事们从失败的物联网项目中汲取教训的结晶——这些经验的结合帮助我定义了一套扎实的方法论，用于执行大规模企业级物联网用例实施。\
    \  \n\n在正式向市场发布此方法论之前，IoT Standards 已在多家组织中得到实施。与当今行业中任何其他指导方案相比，该方法论已展现出卓越的优势。书中描述的几个案例研究均来自真实公司的经验，但为隐藏其身份，名称已做更改。\
    \  \n\n**关于作者**  \n**关于技术审校**  \n\n## 第一部分：物联网业务战略\n\n物联网业务战略  \n\n本部分将阐述企业利用物联网进行数字化转型的重要性，并介绍过去几年许多企业在数字化转型中取得的成功与失败。\
    \  \n\n我们还将讨论企业应采纳的业务战略，以便在市场中保持相关性，并据此制定利用物联网的数字化转型路线图。\n"
- fmt: '# 1. Getting Started


    Technology has been in existence for many years, and over the course of time,
    new age technologies have completely revolutionized the IT industry.


    The modern age is referred to as the “digital age” since more and more technologies
    are stacking onto each other and developing into something greater. Consumers
    and businesses alike are expecting to see more opportunities for growth as future
    technology develops further.


    For some enterprises, being digital is solely concerned with technology. For others,
    being digital is a new way of engaging with customers, whereas for a small minority
    it represents an entirely new way of doing business. Although all these definitions
    of digital are correct in their own sense, often such diverse perspectives trip
    up leadership teams since they reflect a lack of alignment and common vision regarding
    the direction their business needs to go. This often results in piecemeal initiatives
    or misguided efforts that lead to missed opportunities, lackluster performance,
    or even false starts.


    Enterprises and business executives need to have a clear and common understanding
    of exactly what digital means to them and what they want to achieve. As a result
    of this, they need to understand what it means to their business based upon which
    digital strategies or digital transformation initiatives should be defined to
    drive business performance. Digital transformation is all about doing business
    better or bringing efficiencies in their operating model using modern technologies.


    Although digital is becoming mainstream for many enterprises, it is essential
    to understand that for many enterprises legacy is going to remain and cannot be
    completely eliminated. Digital is all about using modern technologies (also called
    as digital technologies) and integrating it with legacy to make modern and legacy
    work together coherently to deliver business results. As an example, legacy machinery
    are there to live in the factories for the next several decades, and using digital
    technology, enterprises should be able to bring value by applying modern technologies
    alongside these legacy machinery with minimal changes.


    Being digital requires enterprises to be open to reexamining their entire way
    of doing business and understanding where the new frontiers of value are and how
    technology can play a key role in showcasing this value faster.


    Digital for enterprises is all about rethinking how to use new capabilities, tools,
    and technologies to improve how customers are served while at the same time reducing
    IT costs and overall working more efficiently.


    To understand how to better serve the customers as an example, one needs to understand
    each step of a customer’s purchasing journey – regardless of channel – and think
    about how digital capabilities can design and deliver the best possible experience,
    across all parts of the business. For example, the supply chain is critical to
    developing the flexibility, efficiency, and speed to deliver the right product
    in a way the customer wants. By the same token, data and metrics can focus on
    delivering insights about customers that in turn drive marketing and sales decisions.


    To improve efficiency, enterprises can use digital technologies to understand
    their current operations and bring in automation. As an example, real-time monitoring
    of energy using the Internet of Things allows manufacturers to detect off-hours
    consumption, optimize manufacturing production schedules, identify anomalies,
    and capitalize on opportunities for savings. In another example, by benchmarking
    similar pieces of equipment or comparable locations, manufacturers uncover systems
    that are not functioning properly to detect hidden operational inefficiencies
    and energy waste.


    On reducing the cost of IT, enterprises need to understand how the existing IT
    landscape stacks up on value vs. cost and what drivers in the market exist that
    can reduce their CAPEX and OPEX costs, with cloud, for example, being the biggest
    opportunity to do just this. Aside from cost reduction, automation plays a pivotal
    role in ensuring that operational efficiencies are improving over a period of
    time. As more and more automation is enabled (be it in customer journeys, business
    process flow automation, operations, or development), enterprises will see increased
    efficiency in their business and reduction of the total cost of ownership. There
    will be lesser defects due to human errors, and enterprises will move away from
    active monitoring to active auditing. Ultimately, this means there will be less
    efforts spent in day-to-day monitoring of services by humans, and to ensure things
    are going right, more time will be spent in auditing.


    ## Definitions


    - `Active monitoring` means that there is a full-time team who continuously monitors
    for errors. In contrast to active monitoring, `active auditing` means that checks
    are performed at certain predefined intervals for errors. `Active auditing` does
    not need a dedicated team since most of the checks are automated and performed
    by machines. If an error is identified, resolution is automated so that the same
    error does not occur in future.


    - `Development` is the process of creating a new software or product or an infrastructure.
    This goes through a process of planning, creating, testing, and deploying an information
    system.


    - `Maintenance` or `Operations` is the process of maintaining the developed software
    or product or infrastructure. Operations is not just about fixing defects but
    modifying a software product or an infrastructure after delivery to correct faults,
    as well as to improve performance. Small enhancements are also performed as part
    of operations.


    Digital is not about delivering a one-off customer journey or a one-off improvement
    in total cost of ownership. It is about continuous improvements where processes
    and capabilities are constantly evolving based on inputs from the industry or
    the customer. This fosters ongoing product or service loyalty, and to enable this,
    enterprises need to create the right digital foundation that will allow the organization
    to achieve their business goals.


    Digital foundation is all about utilizing technology and organizational processes
    that allow an enterprise to do their business with full agility.'
