- fmt: '### Small Things (Type 1 Devices)


    Small things, also called type 1 devices, are things which are connectable to
    the Internet, such as devices with small sensors. These devices have smaller memory,
    and they consume minimal power and Internet bandwidth and many times are connected
    over a `SIM` card. Their data model is simple, and most of the times they operate
    on batteries.


    An example of small things is the smart light bulb and smart door locks. A smart
    light bulb does not have thousands of parameters to control. There is on and off
    and dimming functionality, and in some cases, a bulb may send data on how much
    power is being consumed.


    ### Big Things (Type 2 Devices)


    Big things could be something such as heavy machinery or industrial `IoT` connected
    cars. These are devices that have enough power supply, ample Internet connectivity,
    and in most cases are able to connect to the Internet. Though these devices have
    all the required features to connect to an IoT network, the data model is very
    complex, and it constitutes of thousands of parameters to be controlled. These
    parameters range from making complex decisions based on a certain event and executing
    some complex algorithms.


    ### Complex Things (Type 3 Devices)


    The third and most interesting devices are type 3 devices which are called the
    complex things. Complex things, though called IoT devices, are not really IoT
    because they do not have the Internet (`I` from the `IoT`) part in them. These
    are devices such as Philips Hue, Amazon Echo Plus (with Alexa for voice controls),
    and Honeywell thermostats. Type 3 devices communicate using non-Internet-enabled
    protocols, such as `Zigbee` and `Z-Wave`, and therefore they cannot connect to
    the Internet. However, in the IoT world, it is essential that all devices, irrespective
    of their type, connect to the Internet. Most enterprises in manufacturing or medical
    industries will have several complex things in their ecosystem. The more complex
    things existing in an enterprise, the more difficult it becomes for IoT implementation
    in these enterprises.


    ## Communication Protocols


    The communication protocols in the IoT world are classified into seven broad standards,
    which are described in the following. Each standard has its own benefits and challenges
    and is applicable to specific use cases and industries.


    ### LPWAN (Low-Power Wide Area Network)


    `LPWAN` is a protocol which provides long-range communication on small and inexpensive
    batteries that last for years. This family of technologies is purpose-built to
    support large-scale IoT networks sprawling over vast industrial and commercial
    campuses.


    `LPWANs` can connect all types of IoT sensors – facilitating numerous applications
    from asset tracking, environmental monitoring, and facility management to occupancy
    detection and consumables monitoring.


    The drawback with `LPWAN` is that it can only send small blocks of data at a low
    rate, and therefore devices using `LPWAN` connectivity are better suited for use
    cases that do not require high bandwidth and are not time sensitive.


    `LPWAN` is used for different applications, such as smart metering, smart parking,
    smart grid control, smart security, smart city, smart agriculture, asset tracking,
    smart home automation, critical infrastructure monitoring, personal IoT applications,
    logistics, and so on.


    `LPWAN` has two variants, namely, licensed and unlicensed. The licensed version
    of `LPWAN` runs on public cellular networks and can be operated and managed by
    several telecom mobile operators. It supports roaming and hence there is no issue
    of interoperability apart from being secure and reliable as it uses exclusive
    frequency per connection.


    The unlicensed version of `LPWAN` uses unlicensed frequency spectrum and does
    not use exclusive frequency for each connection and can be used by anyone without
    any exclusivity. This means that the unlicensed spectrum may lead to interference
    among devices using the same radio spectrum and cannot be used for high-speed
    connections. Unlicensed `LPWAN` technologies include `LoRaWAN`, `Sigfox`, etc.


    ### Satellite Communications Networks (3G/4G/5G)


    Satellite communications enable cellphone communications from devices such as
    phones to the next antenna of about 10–15 miles. In the Internet of Things language,
    this form of communication is mostly referred to as "M2M" (machine-to-machine)
    because it allows devices such as a phone to send and receive data through the
    cell network. Satellite communications networks offer reliable broadband communication
    supporting various voice calls and video streaming applications. On the downside,
    they impose very high operational costs and power requirements.


    While cellular networks are not viable for the majority of IoT applications powered
    by battery-operated sensor networks, they fit well in specific Industrial IoT
    use cases such as in manufacturing plants, connected cars, or fleet management
    in transportation and logistics.


    For example, in-car infotainment, traffic routing, advanced driver assistance
    systems (`ADAS`) alongside fleet telematics and tracking services can all rely
    on high bandwidth cellular connectivity.


    Cellular next-generation 5G with high-speed mobility support and ultra-low latency
    is positioned to be the future of autonomous vehicles and augmented reality. 5G
    is also expected to enable real-time video surveillance for public safety, real-time
    mobile delivery of medical data sets for connected health, and several time-sensitive
    industrial automation applications in the future.


    A mesh topology is a network setup where each computer and network device is interconnected
    with one another. This topology setup allows for most transmissions to be distributed
    even if one of the connections goes down. It is a topology commonly used for wireless
    networks. Infotainment, also called soft news, is a type of media, usually television,
    that provides a combination of information and entertainment.


    ### Radio Frequency (RF) Networks


    Radio frequency communications are probably the easiest form of communications
    between devices. Protocols like `Zigbee` or `Z-Wave` use a low-power RF radio
    embedded or retrofitted into electronic devices and systems.


    `Zigbee` is a short-range, low-power, wireless standard. Compared to `LPWAN`,
    `Zigbee` provides higher data rates, but at the same time much less power efficiency.


    Because of their physical short range, `Zigbee` and similar protocols such as
    `Z-Wave`, `Thread`, etc. are best suited for medium-range IoT applications with
    an even distribution of nodes in close proximity. Typically, `Zigbee` is suitable
    for various home automation use cases like smart lighting, HVAC (Heating, Ventilation,
    and Air Conditioning) controls, security, and energy management, leveraging home
    sensor networks.'
