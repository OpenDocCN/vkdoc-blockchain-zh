    在物联网用例中应用人工智能并非一项非常直接的工作，如果规划不当，可能会导致若干挑战。我们讨论了应用物联网用例场景中的四个关键经验：


    1.  物联网不能仅仅因为概念验证成功就被视为成功；概念验证必须能够扩展，这是第一条法则。


    2.  第二条法则是给人工智能模型足够的数据和时间去学习。


    3.  第三条法则是为人工智能模型设定一个明确的目标。


    4.  第四条是，如果人工智能模型已经产生结果，就应开始使用它们，而不是追求做更多人工智能。


