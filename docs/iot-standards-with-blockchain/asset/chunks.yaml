    # ABC 零售早在 2014 年就意识到通过`Instagram`进行销售的机遇，并且该公司不断围绕移动端和社交媒体增加更多功能以提升客户体验。他们利用`物联网`、大数据和分析技术分析大量客户数据，打造个性化客户体验。其供应链不仅延伸至自有门店，还覆盖合作伙伴。这得益于他们构建的能力，即所选择的客户互动与业务生产力提升这两大商业战略的效力。


    ## 总结


    本章讨论了企业为在市场中保持相关性而应采用的三项商业战略：第一是客户互动战略，第二是业务转型战略，第三是业务生产力提升战略：


    * 客户互动战略，也称为市场进入战略，重点完全在于加强与客户的关系。

    * 业务转型战略意味着企业不应仅局限于所销售的产品和服务。他们需要考虑客户的需求与问题，并通过重新定义业务来寻求解决方案，必要时还需进入新领域或业务范畴。

    * 业务生产力提升战略意味着在企业任何环节寻找提升效率的机会，例如通过优化现有运营或生产线来削减成本，或通过减少人工干预来改善当前运营。


    一旦选定商业战略，企业便会应用`物联网`来实现业务目标。`物联网`路线图通过识别特定业务流程来制定，这些流程要么能让企业在市场中（与竞争对手）形成差异化，要么能改善企业与客户的互动，或帮助企业提高效率。


    下一章，我们将讨论业务转型模型，利用该模型，将选择那些对业务战略产生影响的业务流程，并运用`物联网`进行转型。


    脚注 1 2


    # 3. 物联网标准业务转型模型


    几十年来，成本优化一直是 IT 行业的驱动因素，大多数企业都在寻找方法，在不牺牲服务质量的前提下，尽最大努力降低成本。如今，随着数字化的兴起，企业不仅实现了成本优化目标，还能提升交付速度并超越客户体验。


    成本优化是企业考虑数字化转型的驱动因素之一，而`物联网`确实在其中扮演着重要角色。然而，重要的是要认识到，数字化转型之旅不应仅仅为了优化企业成本而开启。数字化转型的启动，源于企业需要以不同的方式开展业务，并以最敏捷的方式适应不断变化的业务需求。业务转型意味着改变企业与客户或业务的互动方式，同时改进运营，使其变得更快、成本更低。


    随着数字技术深刻重塑各行各业，许多企业正在推行大规模变革，以抓住这些趋势带来的红利，或者仅仅为了在市场中生存。拥抱动态格局至关重要，因为对于需要快速构建并扩展稳健环境的组织来说，新的经济机遇不断涌现。彻底转型企业的整个运营极其复杂，如果执行不当，可能会带来巨大风险。缺乏正确的指导和经验，很容易只专注于技术采纳来推动数字化转型战略的成功实施，而忽视了变革将对组织其他部分产生的影响。其结果是实施成本高昂、项目截止日期延误，且无法看到投资回报。本书阐述的概念，为企业提供了通过利用`物联网`引领技术转型来实现商业战略所必需的知识和方向。它基于企业所需的业务转型，提供了分步且实用的解决方案，以克服涉及人员、流程和技术的复杂问题。


    `物联网标准`是一种模型，它使企业能够以`物联网`为杠杆，创建新的或修改现有的业务流程、文化和客户体验，以满足不断变化的业务和市场需求。这种在数字时代对业务的重新构想，就是数字化转型。


    众多 IT 服务公司声称，能够利用`物联网`将签约组织转型为数字化企业。零散的数字化转型相当危险，因为它们通常最终会增加新的复杂性，从而使 IT 环境变得更加繁琐。另一方面，许多企业将数字化转型视为纯粹的技术事务，而数字化转型的真正定义是思考一个组织应如何利用现代技术、人员和流程，从根本上改变业务绩效。


    数字化转型之旅是自上而下而非自下而上的方法，并且只有在企业层面进行才能成功。这并不意味着组织需要开启数字化转型之旅，并对其现有的 IT 和 OT 系统、工具和流程进行大刀阔斧的改变。它真正的含义是，数字化转型应通过运用一套明确定义的企业级数字化转型方法论来开启。没有企业级方法论，企业就无法在数字化转型的努力中取得成功，而`物联网标准`正是为了解决这一问题。`物联网标准`是一个企业级的数字化转型模型，它使各类组织能够利用`物联网`开启数字化转型之旅，从而让企业能够首先理解转型背后的业务驱动因素，然后通过`物联网`实现转型，进而充分获得大规模数字化带来的全部好处。实施`物联网标准`的结果是：在整个组织中实现更大的一致性并提高可见性，将业务战略与执行联系起来，以更高的可预测性和质量、更低的运营成本，更快地实现更好的业务成果。


    在企业内部实施`物联网标准`的最终结果，能带来以下几个方面的益处：


    * 改善客户体验和业务满意度

    * 提升机器和车间员工的效率

    * 加强预测和预测性维护

    * 提升产品质量

    * 减少停机时间

    * 更快速、更明智的决策

    * 加快产品上市速度

    * 能够基于数据做出业务决策

    * 降低运营支出和资本支出（通过自动化）

    * 提高业务开展的便捷性和速度

    '
- fmt: '# What''s Next After Business Strategy Is Chosen


    After a business strategy is chosen, the next step is to identify existing core
    business processes of the enterprise which impact the business strategy. Potential
    problems and opportunities within these business processes determine the transformation
    journey required for these business processes. It is not always necessary that
    `IoT` is a solution to address every business problem or opportunity. There will
    be many instances where `IoT` needs to be complemented with other technology solutions
    to address the business problem or opportunity.


    Figure [3-1](#517610_1_En_3_Chapter.xhtml#Fig1) depicts the two quadrants of the
    Business Transformation (BT) Model. Each of the business processes is classified
    into the `IT Zone` or the `IoT Zone`, after which problems and opportunities within
    the business processes are identified.


    A problem is a gap or an inefficiency within the business process which needs
    to be resolved or overcome. Problems can be impacting the business process currently
    or may impact in future and may prevent the business process from working efficiently
    to achieve the desired business process goals. In some cases, problems also threaten
    the long-term survival of the business.


    An opportunity in a business process is improvements that can enhance the business
    process to perform much more efficiently. An opportunity that can help to meet
    the business process goals for increasing profits, reducing costs, or enhancing
    customer experience and accelerating innovation.^([⁷](#fn7))


    ![../images/517610_1_En_3_Chapter/517610_1_En_3_Fig1_HTML.jpg](images/517610_1_En_3_Chapter/517610_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** — Business Transformation Model dual quadrants


    The core business process that does not need `IoT` to address the problems and
    opportunities identified within the business processes is placed in the `IT Zone`.


    As an example, Mart A is a retailer corporation that operates a chain of hypermarkets,
    discount department stores, and grocery stores. The two core IT business processes
    for Mart A are listed as follows:


    - Business process 1 – Placing orders from ecommerce systems via a web application

    - Business process 2 – Processing order information


    An opportunity is identified within business process 1. The opportunity is to
    develop a new channel (e.g., mobile) to enhance customer engagement. Currently,
    there is only one channel (Web) for customer to place an order.


    A problem is identified within business process 2. The problem states that there
    are too many manual interventions required to complete an order. This is because
    multiple applications were built using different technologies which do not integrate
    with each other. In simple terms, the output of one application needs to be manually
    fed into other applications to complete the order processing business process.


    The problem and opportunity identified for business process 1 and business process
    2 can be addressed without the need for `IoT` and therefore are placed in the
    `IT Zone`. In other words, the problems and opportunities within these business
    processes can be addressed with Information Technology or pure IT solutions and
    therefore are not considered part of the `IoT` road map.


    The core business process that aligns to the chosen business strategy and which
    will use `IoT` to address the problems and opportunities is placed in the `IoT
    Zone`.


    Let me explain this with a case study. A large fleet management company tasked
    us to define a digital transformation road map for their organization. The company
    chose Business Transformation and Business Productivity Improvement as their core
    business strategy. One of the core business processes identified for transformation
    is called "on-time delivery of quality products at optimal costs." The company
    business is to deliver fresh groceries for US retail stores, such as Walmart and
    Aldi. This business process depicts that goods are shipped from product manufacturer
    locations to retail stores using trucks fitted with diesel-fired fridge units
    to keep the products fresh. The level 1 business process is further broken down
    into use cases as follows:


    - Track transit time and routes to deliver goods from source to destination (UC1)

    - Monitor refrigerators to keep the products fresh (UC2)

    - Track and manage fuel consumption from source to destination (UC3)

    - Manage operations of the trucks (UC4) and so on…


    Problems (P) and opportunities (O) are identified within each use case, a few
    of which are stated as follows:


    - A problem within use case 2 or P-UC2 – Drivers need to periodically check and
    control the temperature of the refrigerators. There had been instances where products
    have lost quality due to mismanagement of the refrigerators.

    - P-UC3 and P-UC4 – Low tire pressure and faulty engines have led to excess fuel
    consumption between 5% and 20%, including increasing maintenance costs of trucks.

    - P-UC4 – There is no proper mechanism to track and trace trucks.


    `IoT` solutions are identified to address the problems and opportunities for the
    use cases. The following `IoT` solutions (high-level view) were defined for problems
    and opportunities identified for each of the use cases:


    - Monitor refrigerators (e.g., temperature with each compartment) by installing
    temperature sensors that can be monitored and controlled from a central location
    without any manual action required by the driver. This will address the product
    freshness problem.

    - Monitor engines and tires to improve fuel efficiency and truck ROI by installing
    sensors both at the engine level and the tire level.

    - Install a track-and-trace `IoT` solution to optimize logistic operations.


    This is a simple case study on how a business strategy is achieved with `IoT`
    use cases based on the problems and opportunities identified within the business
    processes.'
