    # 12. 面向物联网用例实现的产品思维


    数字化转型对不同企业可能意味着不同的事情。对某些企业而言，数字化转型是采用人工智能、机器人流程自动化或大数据等技术。对其他组织来说，数字化转型是利用新兴技术而非传统技术，来构建可扩展的
    IT 环境。还有一种解读是，数字化转型意味着达到组织将新功能推向市场所需的理想速度。


    上述所有定义在其各自的语境中都是正确的；然而，数字化转型的本质在于从整体上（而非局部地）实现速度、敏捷性、可靠性和成本效益，以达成业务成果。借助物联网，所有这些优势都能以更快的速度和更卓越的方式实现，因此物联网已成为企业最广泛尝试的数字化转型举措之一。


    在本章中，我们将探讨以产品为中心的企业与以项目为中心的企业的不同之处，以及为什么以产品为中心的运营模式对于开启物联网之旅的企业来说是必不可少的。


    ## 什么是项目或项目型组织？


    简单来说，项目是一个容器，用于容纳所有按顺序排列的活动。我们先规划，然后分析、设计、实施，最后测试所有内容。最终，交付所有运行良好的成果。一个项目有三个相互依赖的主要约束条件，即时间、成本和范围。这也被称为项目管理三角，如图
    12-1 所示。


    ![../images/517610_1_En_12_Chapter/517610_1_En_12_Fig1_HTML.jpg](img/517610_1_En_12_Fig1_HTML.jpg)


    图 12-1


    项目管理金字塔


    这意味着要交付一个项目，需要先确定固定的范围，然后根据范围决定固定的成本和工期。作为一名优秀的项目经理，你的目标是在时间、范围和预算内交付项目。


    一个典型项目的运行周期在六个月到几年之间。如果在项目执行过程中，项目基线（例如需求）不会发生变化，那么基于项目的方法会运作良好。但在物联网背景下，基线是不断变化的——例如，今天可能需要连接
    100 台设备，明天可能就变成了一万台。这就是为什么采用项目模式实施物联网用例的组织，即使能够在成本、时间和范围内完成交付，也仍然会失败的原因之一。在物联网环境下，范围是无法长期固定的。


    不仅在物联网背景下，即使在普通的软件开发项目中，基于项目的方法也已被证明是行不通的。在讨论这一点时，我想起了前大型手机制造商 ABC Mobile（其业务被竞争对手苹果公司夺走）CEO
    的一句话。他说他并没有做错什么，但不知何故却输了。他公司正在进行的项目都运行良好，他们采用了敏捷方法论，并且在手机开发方面有着辉煌的业绩记录。但就在 ABC
    Mobile 以项目方式开发手机时，市场发生了变化，人们不再购买该公司正在销售的手机类型，他们的整个用户基础流失到了另一家公司（苹果）。


    这就是以项目为中心的组织面临的最大挑战。项目经理制定出关于范围、进度和预算的计划，该计划获得指导委员会批准后，几周后项目启动，然后执行，其唯一目标就是基于既定范围交付项目，而忽略了市场动态。等到项目交付时，市场已经变了。


    以上是关于 ABC Mobile 的一种观点。与前述讨论相反，关于 ABC Mobile 的另一个有趣的观点是，他们在一年前就已经意识到手机行业将发生根本性变革。他们知道将会出现带有大玻璃屏幕的手机，并且苹果公司将推出一款名为
    iPhone 的产品。据此，ABC Mobile 意识到手机的用户体验将主要由软件驱动（通过小部件和应用商店），而不再是物理按键。


    很多人认为 ABC Mobile 未能认识到需要大玻璃屏幕，从而错失了革命性的机遇。然而，事实是他们在一年前就已经预见到行业将向软件驱动型手机转变。意识到这一点后，他们聘请了一些顶尖的顾问，招聘了更多的开发人员，并认识到自己需要成为软件创新者，并以更迭代的方式进行开发——他们确实这么做了。他们采用了敏捷方法论来开发手机。我记得在
    2009 年，ABC Mobile 是采用敏捷方法论的典范，他们的员工接受了敏捷培训，每个人都开始使用敏捷方法论进行开发。当时 ABC Mobile 的主要精力集中在敏捷培训和拥抱敏捷方法论上。这就是
    ABC Mobile 所谓的转型。在公司内部，开发人员接受了敏捷培训，他们使用敏捷工具、敏捷方法，并开发手机，但一切进展并没有加快。CEO 通过这些指标来衡量转型是否成功：员工是否接受了敏捷培训，是否使用了敏捷工具包。基于这些指标，高管层认为整个转型进展顺利。


    但实际上，这种工作方式并未解决他们的核心问题。ABC Mobile 的核心问题在于他们的软件架构。他们的操作系统无法有效适配大屏幕，也无法支持应用商店。等他们意识到这一差距时，iPhone
    已经发布，ABC Mobile 也随之退出市场。ABC Mobile 采用了基于项目的结构，尽管他们采用了敏捷方法，但这正是其失败的主要原因。他们以项目制结构运作，拥有固定的范围、时间和成本（使用敏捷方法），结果导致他们在衡量敏捷性以及价值在组织中的实际流动方式方面出现了严重脱节。


    从上述讨论中可以非常清楚地看出，技术或流程无法解决业务问题。理解市场并适应变化是所有企业成功的秘诀，而这些在基于项目的结构中是无法实现的。

