  trans: '

    # 数据存储考量（哪些数据需要存储，哪些需要丢弃）


    我们讨论过，物联网用例会产生海量数据。然而，重要的是要明白，并非设备生成的所有数据都对企业有价值，这引出了一些企业需要从数据角度验证的关键点，具体如下：


    - 哪些数据需要存储

    - 哪些数据需要丢弃，何时丢弃

    - 哪些数据需要短期保留

    - 哪些数据需要长期保留


    在企业开始开发物联网用例之前，所有这些都需从数据角度得到解决，否则将导致物联网实施失败。智能物联网网关或物联网云平台的硬件和存储规格，是根据存储需求、数据处理与数据清洗能力需求以及计算与分析能力来确定的。更具体地说，根据短期和长期数据存储需求，企业可以确定其所需的智能物联网网关和物联网云平台。


    # 存储的快速配置是另一项关键需求


    在过去，当数据从卫星上收集时，我们常常要等待卫星运行到我们国家上空。我们收集数据的时间窗口和带宽都非常有限，在此期间，会尽可能多地收集所需数据，然后释放存储空间以准备下一轮卫星数据收集。然而，当时所需的敏捷性并非达到分钟或微秒级别。如今，物联网用例对敏捷性的要求要高得多。数据在秒级甚至亚秒级传输并需要被收集，在许多用例中，数据仅在那一刻有价值，例如温度数据。因此，企业需要能够在接收到数据后立即进行处理、执行分析并采取行动，然后丢弃数据，释放存储空间以接收下一组数据。这引出了物联网用例在数据方面的一个关键期望，即平台支持快速配置存储的能力。企业需要能够在需要时扩展存储、任务完成后缩减存储的解决方案。


    # 利用雾计算进行数据管理


    由于物联网生态系统中每个设备都会产生海量数据，单个智能物联网网关将无法处理这样的负载，尤其是在大规模物联网用例中，例如制造业或石油天然气行业。对于所有这些用例，需要从数百万台设备收集数据，并基于数据产生的洞察及时采取行动。需要部署由多个物联网网关构成的集群以实现物联网用例的目标。这就是雾计算发挥作用的地方。雾计算或雾网络，也称为雾化，是一种架构，它利用边缘设备或物联网网关在本地执行大量的计算、存储和通信，并通过互联网骨干网进行路由。


    企业需要寻找能够处理此类复杂架构的数据解决方案，在这种架构中，数据和数据分析需要在多个系统之间进行。


    # 自动化数据决策


    我们讨论过，企业需要确定哪些数据需要存储、哪些需要丢弃、哪些需要短期保留以及哪些需要长期保留。目前，管理和存储所有这些数据是手动完成的，市场上很少有能够自动执行此任务的解决方案。更准确地说，企业需要寻找能够自动在智能物联网网关或物联网云平台上执行数据存储和删除操作的解决方案。利用人工智能可以完成这项任务，机器可以学习企业过去如何管理数据，并预测未来应如何管理数据。已有公司开始研究此类解决方案，但距离完美的解决方案还很远。


    # 数据安全与隐私仍是各行各业在物联网领域的重大关切


    从数据角度理解物联网环境下的安全解决方案至关重要。企业需要寻找高效的方案，以对数据加密，使除接收方之外的任何人都无法读取数据。需要有强大的数据保护解决方案，因为大量数据将存储在物联网网关或物联网平台上。企业需要寻找能够解决数据清除问题的方案，并且清除后的数据无法恢复，因为企业数据始终非常敏感。另一个类似的领域是数据隐私。从数据角度出发，企业需要寻找解决方案，确保一个部门用户的数据不被其他用户访问。


    # （大）数据优先参考模型


    任何组织成功的关键在于，如何在其内部充分利用大数据来制定业务决策。为了做出正确的决策，企业需要在正确的时间将正确且相关的数据送达业务部门。这也是“数据优先”这一术语变得如此突出的原因之一。数据优先策略是我们如何使企业走向数据驱动型组织，让每一个重大业务决策都源于从数据中获得的洞察。为了实现数据优先策略，需要巧妙地管理数据旅程。在物联网领域，数据优先策略是强制性的，因为物联网用例将数据作为成功的主要载体。


    尽管企业理解数据的重要性并已尝试开启数据之旅，但其中许多都遭遇了失败。如果没有完全实现的数据平台和标准架构，组织就不能指望拥有完善的数据规范实践来帮助他们取得成功。图
    11-2 展示了数据优先参考模型的概览，企业可以利用该模型定义一个标准的运营模型，从而帮助他们在物联网用例的数据之旅中取得成功。


    ![../images/517610_1_En_11_Chapter/517610_1_En_11_Fig2_HTML.jpg](img/517610_1_En_11_Fig2_HTML.jpg)


    **图 11-2** 数据优先参考架构


    第一个模块是数据源，来自外部和内部源的数据在此到达企业。在物联网生态系统中，物联网数据将来自设备，其他数据集将来自外部流、数据馈送、大型机系统、数字孪生或简单的
    Excel 文件等源。这些数据有时直接存储在数据湖中，或者经过处理后存储在数据湖中。


    第二个模块是数据存储和数据处理发生的地方。数据在此被获取（数据提取层），然后被清洗和提炼以使其可用。然后，这些数据以适当的格式可供消费。数据管理是一个包括获取、验证、存储和处理数据的过程，以确保数据对其用户的可用性、可靠性和及时性。


    第三个模块是数据治理，它是基于控制数据使用的内部数据标准和策略，管理企业系统中数据的可用性、可用性、完整性和安全性的过程。


    第四个模块称为消费层，数据在此被不同的参与者消费，例如分析平台、报告工具，或者直接由数据科学家或业务用户使用。

    '
- fmt: '### The Data Source


    A data source is simply the point where data enters the organization. It can be
    structured data which comprises clearly defined data types whose pattern makes
    them easily searchable, or unstructured data which is “everything else” and comprises
    data that is usually not as easily searchable, including formats like audio, video,
    and social media postings, or semistructured data. As part of the IoT ecosystem
    apart from data from regular sources, there are a lot of machine data that are
    sent by devices, which are called passive, active, or dynamic data.


    Passive data is sent by devices which have sensors that do not actively communicate.
    These are sensors that must be activated before they can transmit data, and they
    only produce data when asked to do so. For example, a sensor that measures groundwater
    saturation only produces current data when the API is invoked. In a passive data
    collection, since the sensors need to be managed, the application must take on
    the logic needed to do so. These are typically sensors that are low power and
    exist in remote locations.


    Active data (also called streaming data) means that sensors are continuously streaming
    data such as from connected cars or temperature sensors. Unlike passive data,
    these sensors constantly send the data at predefined intervals. For all such kind
    of devices, it is essential that IoT Gateways are able to absorb the data in near
    real time, and the applications need sophisticated IoT data communications capabilities.
    Data cannot be lost, it must be correctly parsed from the stream just in time
    and placed in the correct format for storage and processing so that actions can
    be taken based on the insights generated.


    Dynamic data is the most sophisticated data that is sent by devices (sensors)
    that communicate dynamically (bidirectional) with IoT applications, such as a
    smart thermostat. These types of devices carry out a conversation with IoT applications.
    This allows a full range of capabilities, including the ability to change the
    data that is produced, change the format of the data, change the frequency, and
    even deal with security issues and provide automated software updates to dynamically
    deal with issues.


    Most of the new IoT devices that are being manufactured these days for IoT use
    cases are built for dynamic data.


    In an enterprise-level IoT implementation, we all will be dealing with all the
    three types of IoT data – passive, active, and dynamic – in any of our current
    IoT use cases.


    The data management block is where the data arrives at the enterprise from data
    sources. One of the first steps in setting up a data strategy is assessing what
    enterprises have in the data source and whether the IoT Gateway has the capability
    to retrieve data from all types of devices and other sources across all three
    types of data (i.e., active, passive, and dynamic).


    ### The Data Storage Layer


    The data storage layer is where enterprise data lives once it is gathered from
    different sources and devices. It receives data from the various data sources
    and stores it in the most appropriate manner that is specific to the organization
    needs. Based on the use cases, in some instances data from sources are directly
    stored in the storage (called raw data), and in other cases data are transformed
    and then stored in the data storage (called gold data).


    As depicted in Figure [11-1](#517610_1_En_11_Chapter.xhtml#Fig1), the data storage
    layer sits at the bottom of the reference model. These are the technologies that
    store masses of raw data which come from traditional sources, such as online transaction
    processing (OLTP) databases, and less structured sources, such as log files, sensors,
    web analytics, documents, and media archives.


    Increasingly, storage is taking place in the cloud or on virtualized local resources.
    Organizations are moving away from legacy storage toward commoditized hardware
    and more recently to managed services offered by the likes of Amazon, such as
    Amazon S3.


    As the volume of data generated and stored by companies has started to explode,
    sophisticated but accessible systems and tools are being developed.


    ### Data Extraction Layer and Data Processing Layer


    Data extraction is the process of bringing in relevant data that has been created
    by a source outside the organization. IoT data, especially streaming data coming
    from IoT devices, cannot be handled by traditional data extraction solutions,
    and enterprises need to look at solutions that can effectively extract active,
    passive, and dynamic IoT data. As an example, Microsoft Azure has Stream Analytics
    that can perform extraction of IoT data.


    Data processing is the process of cleaning and refining the data for enterprise
    use. For any type of data, when it enters an organization (in most cases, there
    are multiple data sources), it is most likely either not clean or not in the format
    that can be reported or analyzed directly by users inside or outside of the organization.
    Data processing is therefore needed first, which usually includes data cleansing,
    standardization, transformation, and aggregation. Apache Spark, PostgreSQL, and
    Amazon Redshift are good examples of tools which can carry out this job.


    ### Data Consumption Layer


    This layer consumes the output provided by the data processing layer. Enterprises
    can run queries to answer questions the business is asking, slice and dice the
    data, build dashboards, and create visualizations, using one of many advanced
    tools. In some cases, data in this layer is directly consumed by users within
    the organization and by entities external to the organization, such as customers,
    vendors, partners, and suppliers.


    In IoT use cases, actions are taken based on the insights generated in the data
    consumption layer. As an example, if the temperature of a specific machinery goes
    beyond a certain range, tools within the consumption layer detect such an event
    in real time, and they send a command to the IoT device to shut down the machine.


    IoT use cases requires time-based analytics to be performed first at the per-device
    level and then aggregated into overall numbers to provide a view on the overall
    state of the cluster of devices. This is a complex case of aggregation across
    the device estate that needs to be rolled up. As an example, in some instances
    a single temperature data can trigger an action, and in some use cases, an average
    temperature over time becomes crucial to perform a task. There are several analytic
    tools available in the market such as AWS IoT Analytics and AWS IoT SiteWise that
    can perform specific actions based on IoT data.'
  raw: '### The Data Source


    A data source is simply the point where data enters the organization. It can be
    structured data which comprises clearly defined data types whose pattern makes
    them easily searchable, or unstructured data which is “everything else” and comprises
    data that is usually not as easily searchable, including formats like audio, video,
    and social media postings, or semistructured data. As part of the IoT ecosystem
    apart from data from regular sources, there are a lot of machine data that are
    sent by devices, which are called passive, active, or dynamic data.


    Passive data is sent by devices which have sensors that do not actively communicate.
    These are sensors that must be activated before they can transmit data, and they
    only produce data when asked to do so. For example, a sensor that measures groundwater
    saturation only produces current data when the API is invoked. In a passive data
    collection, since the sensors need to be managed, the application must take on
    the logic needed to do so. These are typically sensors that are low power and
    exist in remote locations.


    Active data (also called streaming data) means that sensors are continuously streaming
    data such as from connected cars or temperature sensors. Unlike passive data,
    these sensors constantly send the data at predefined intervals. For all such kind
    of devices, it is essential that IoT Gateways are able to absorb the data in near
    real time, and the applications need sophisticated IoT data communications capabilities.
    Data cannot be lost, it must be correctly parsed from the stream just in time
    and placed in the correct format for storage and processing so that actions can
    be taken based on the insights generated.


    Ddynamic data is the most sophisticated data that is sent by devices (sensors)
    that communicate dynamically (bidirectional) with IoT applications, such as a
    smart thermostat. These types of devices carry out a conversation with IoT applications.
    This allows a full range of capabilities, including the ability to change the
    data that is produced, change the format of the data, change the frequency, and
    even deal with security issues and provide automated software updates to dynamically
    deal with issues.


    Most of the new IoT devices that are being manufactured these days for IoT use
    cases are built for dynamic data.


    In an enterprise-level IoT implementation, we all will be dealing with all the
    three types of IoT data – passive, active, and dynamic – in any of our current
    IoT use cases.


    The data management block is where the data arrives at the enterprise from data
    sources. One of the first steps in setting up a data strategy is assessing what
    enterprises have in the data source and whether the IoT Gateway has the capability
    to retrieve data from all types of devices and other sources across all three
    types of data (i.e., active, passive, and dynamic).


    ### The Data Storage Layer


    The data storage layer is where enterprise data lives once it is gathered from
    different sources and devices. It receives data from the various data sources
    and stores it in the most appropriate manner that is specific to the organization
    needs. Based on the use cases, in some instances data from sources are directly
    stored in the storage (called raw data), and in other cases data are transformed
    and then stored in the data storage (called gold data).


    As depicted in Figure [11-1](#517610_1_En_11_Chapter.xhtml#Fig1), the data storage
    layer sits at the bottom of the reference model. These are the technologies that
    store masses of raw data which come from traditional sources, such as online transaction
    processing (OLTP) databases, and less structured sources, such as log files, sensors,
    web analytics, documents, and media archives.


    Increasingly, storage is taking place in the cloud or on virtualized local resources.
    Organizations are moving away from legacy storage toward commoditized hardware
    and more recently to managed services offered by the likes of Amazon, such as
    Amazon S3.


    As the volume of data generated and stored by companies has started to explode,
    sophisticated but accessible systems and tools are being developed.


    ### Data Extraction Layer and Data Processing Layer


    Data extraction is the process of bringing in relevant data that has been created
    by a source outside the organization. IoT data, especially streaming data coming
    from IoT devices, cannot be handled by traditional data extraction solutions,
    and enterprises need to look at solutions that can effectively extract active,
    passive, and dynamic IoT data. As an example, Microsoft Azure has Stream Analytics
    that can perform extraction of IoT data.


    Data processing is the process of cleaning and refining the data for enterprise
    use. For any type of data, when it enters an organization (in most cases, there
    are multiple data sources), it is most likely either not clean or not in the format
    that can be reported or analyzed directly by users inside or outside of the organization.
    Data processing is therefore needed first, which usually includes data cleansing,
    standardization, transformation, and aggregation. Apache Spark, PostgreSQL, and
    Amazon Redshift are good examples of tools which can carry out this job.


    ### Data Consumption Layer


    This layer consumes the output provided by the data processing layer. Enterprises
    can run queries to answer questions the business is asking, slice and dice the
    data, build dashboards, and create visualizations, using one of many advanced
    tools. In some cases, data in this layer is directly consumed by users within
    the organization and by entities external to the organization, such as customers,
    vendors, partners, and suppliers.


    In IoT use cases, actions are taken based on the insights generated in the data
    consumption layer. As an example, if the temperature of a specific machinery goes
    beyond a certain range, tools within the consumption layer detect such an event
    in real time, and they send a command to the IoT device to shut down the machine.


    IoT Use cases requires time-based analytics to be performed first at the per-device
    level and then aggregated into overall numbers to provide a view on the overall
    state of the cluster of devices. This is a complex case of aggregation across
    the device estate that needs to be rolled up. As an example, in some instances
    a single temperature data can trigger an action, and in some use cases, an average
    temperature over time becomes crucial to perform a task. There are several analytic
    tools available in the market such as AWS IoT Analytics and AWS IoT SiteWise that
    can perform specific actions based on IoT data.'
  trans: '

    ### 数据源


    数据源简言之就是数据进入企业的地方。它可以是结构化数据，包含模式易于搜索的明确定义的数据类型；也可以是非结构化数据，即“其他所有”，包含通常不易搜索的数据，包括音频、视频和社交媒体帖子等格式；或是半结构化数据。作为物联网生态的一部分，除了常规来源的数据，还有大量由设备发送的机器数据，这些数据被称为**被动数据**、**主动数据**或**动态数据**。


    被动数据由带有传感器的设备发送，这些传感器不会主动通信。它们必须先被激活才能传输数据，并且仅在被请求时才会产生数据。例如，测量地下水饱和度的传感器仅在调用
    API 时才会产生当前数据。在被动数据收集中，由于需要管理传感器，应用程序必须承担相应的逻辑。这类传感器通常是低功耗的，并且位于偏远地区。


    主动数据（也称为流式数据）意味着传感器持续传输数据，例如来自联网汽车或温度传感器的数据。与被动数据不同，这些传感器会按预定义的时间间隔持续发送数据。对于所有此类设备，物联网网关必须能够近乎实时地接收数据，应用程序则需要具备复杂的物联网数据通信能力。数据不能丢失，必须及时从流中正确解析，并以正确的格式存储和处理，以便根据生成的洞察采取行动。


    动态数据是最复杂的数据，由与物联网应用程序动态通信（双向）的设备（传感器）发送，例如智能恒温器。这类设备与物联网应用程序进行“对话”。这使得其具备一系列功能，包括能够更改生成的数据、更改数据格式、更改频率，甚至处理安全问题，并提供自动化的软件更新以动态处理问题。


    如今为物联网用例制造的大多数新型物联网设备都是为了处理动态数据而设计的。


    在企业的物联网实施中，我们当前所有的物联网用例都可能会处理所有三种类型的物联网数据——被动数据、主动数据和动态数据。


    数据管理模块是数据从数据源到达企业的位置。制定数据策略的首要步骤之一，是评估企业在数据源中拥有什么，以及物联网网关是否具备从所有类型的设备及其他来源中检索三种类型数据（即主动数据、被动数据和动态数据）的能力。


    ### 数据存储层


    数据存储层是从不同来源和设备收集数据后，企业数据存放的位置。它从各种数据源接收数据，并以最适合组织需求的特定方式进行存储。根据用例，在某些情况下，来自来源的数据会直接存储在存储中（称为**原始数据**），而在其他情况下，数据会经过转换后再存储到数据存储中（称为**黄金数据**）。


    如图 11-1 所示，数据存储层位于参考模型的底部。这些技术用于存储来自传统来源（如在线事务处理 (OLTP) 数据库）和海量原始数据，以及来自结构较弱的来源（如日志文件、传感器、网络分析、文档和媒体档案）的数据。


    越来越多的存储发生在云端或虚拟化的本地资源上。企业正从传统存储转向商品化硬件，最近又转向亚马逊 (Amazon) 等公司提供的托管服务，例如 Amazon
    S3。


    随着公司生成和存储的数据量开始激增，复杂而易于访问的系统和工具正在被开发出来。


    ### 数据提取层与数据处理层


    数据提取是将由组织外部来源创建的相关数据导入进来的过程。物联网数据，尤其是来自物联网设备的流式数据，无法通过传统的数据提取方案处理。企业需要寻找能够有效提取主动、被动和动态物联网数据的解决方案。例如，微软
    Azure 的 Stream Analytics 可以执行物联网数据的提取。


    数据处理是为企业使用而清理和精炼数据的过程。对于任何类型的数据，当它进入一个组织时（在大多数情况下，存在多个数据源），它很可能是不干净的，或者其格式无法被组织内外的用户直接报告或分析。因此，首先需要进行数据处理，这通常包括数据清洗、标准化、转换和聚合。Apache
    Spark、PostgreSQL 和 Amazon Redshift 是能够执行此任务的工具的好例子。


    ### 数据消费层


    该层消费数据处理层提供的输出。企业可以使用众多高级工具之一来运行查询，以回答业务提出的问题，对数据进行切片和切块，构建仪表板，并创建可视化图表。在某些情况下，该层的数据由组织内的用户以及组织外部的实体（如客户、供应商、合作伙伴和提供商）直接消费。


    在物联网用例中，基于数据消费层生成的洞察采取行动。例如，如果某台特定机器的温度超出一定范围，消费层内的工具会实时检测到此类事件，并向物联网设备发送命令以关闭机器。


    物联网用例需要先在每个设备级别执行基于时间的分析，然后聚合成总体数字，以提供设备集群整体状态的视图。这是一个跨设备资产进行汇总的复杂案例。例如，在某些情况下，一个单一的温度数据就可能触发一个动作；而在某些用例中，一段时间内的平均温度对于执行一项任务则变得至关重要。市场上有多种分析工具，例如
    AWS IoT Analytics 和 AWS IoT SiteWise，它们可以基于物联网数据执行特定操作。

    '
- fmt: '### Data Governance


    Data governance (DG) is the process of managing the availability, usability, integrity,
    and security of the data in enterprise systems, based on internal data standards
    and policies that also control data usage. Effective DG ensures that data is consistent
    and trustworthy and does not get misused. It is increasingly critical as organizations
    face new data privacy regulations and rely more and more on data analytics to
    help optimize operations and drive business decision-making.


    Data stewardship is a functional role in data management and governance, with
    the responsibility of ensuring that data policies and standards are implemented
    and followed within the enterprise.


    Data integrity is the maintenance of, and the assurance of, data accuracy and
    consistency over its entire life cycle and is a critical aspect to the design,
    implementation, and usage of any system that stores, processes, or retrieves data.


    A well-designed DG program typically includes a governance team, a steering committee
    that acts as the governing body, and a group of data stewards. They work together
    to create the standards and policies for governing data as well as implementation
    and enforcement procedures that are primarily carried out by the data stewards.
    The big data setup and governance should be performed at the enterprise level
    rather than in business unit silos – this is mandatory for enterprises to succeed.


    While data governance is a core component of an overall data management strategy,
    organizations should focus on the desired business outcomes of a governance program
    instead of the data itself. Without effective DG, data inconsistencies in different
    systems across an organization might not be resolved. For example, customer names
    may be listed differently in sales, logistics, and customer service systems. This
    could complicate data integration efforts and create data integrity issues that
    affect the accuracy of enterprise reporting and analytics applications. In addition,
    data errors might not be identified and fixed, further affecting analytics accuracy.


    Poor DG can also hamper regulatory compliance initiatives, which could cause problems
    for companies that need to comply with new data privacy and protection laws, such
    as the European Union''s General Data Protection Regulation (GDPR) and the California
    Consumer Privacy Act (CCPA). An enterprise DG program typically results in the
    development of common data definitions and standard data formats that are applied
    in all business systems, boosting data consistency for both business and compliance
    uses.


    A key goal of DG is to break down data silos in an organization. Such silos commonly
    build up when individual business units deploy separate systems without centralized
    coordination or an enterprise data architecture. DG aims to harmonize the data
    in those systems through a collaborative process, with stakeholders from the various
    business units participating.


    Another DG goal is to ensure that data is used properly, both to avoid introducing
    data errors into systems and to block potential misuse of personal data about
    customers as well as other sensitive information. This can be accomplished by
    creating uniform policies on the use of data, along with procedures to monitor
    usage and enforce the policies on an ongoing basis. In addition, DG can help to
    strike a balance between data collection practices and privacy mandates.


    Besides more accurate analytics and stronger regulatory compliance, the benefits
    that DG provides include improved [data quality](https://searchdatamanagement.techtarget.com/definition/data-quality),
    lower data management costs, and increased access to needed data for data scientists,
    analysts, and business users.


    Ultimately, DG can help improve business decision-making by giving executives
    better information.


    ## Summary


    In this chapter we have discussed about the data-first mindset, which is one of
    the most important elements for enterprises to be successful using IoT. Enterprises
    need to put in place the processes and capabilities to be able to collect and
    make the data available in a way that it can be used in the most timely and efficient
    manner by IoT use cases. The data also needs to be available at a speed that will
    enable businesses to make the right decisions and benefit from the insights generated
    from the data.


    We also discussed that the key area to address in IoT from the data context is
    to define solutions around how to store large data sets, where to store this data
    (device, Smart IoT Gateway, or IoT Cloud Platform), how to process the data, and
    then how and when to analyze the data.


    We discussed about the eight key capabilities that enterprises need to validate
    from the data perspective, which are listed in the following. Based on the use
    cases, enterprises should decide where these capabilities need to exist, that
    is, at the Smart IoT Gateway or the IoT Cloud Platform, and accordingly products
    need to be purchased.


    1.  Debugging capabilities of the platform

    2.  Timeliness and accuracy of data coming from the devices

    3.  Deciding on where data management and analytics need to happen

    4.  Data storage considerations

    5.  Rapid provisioning of data

    6.  Fog computing capabilities

    7.  Automated data decision capabilities (what data to store or discard for the
    short and the long term)

    8.  Data security solutions


    Finally, in the last section we discussed about the data-first reference model,
    which constitutes of four blocks. The first block is the data source, where data
    from external and internal sources arrives at the enterprise. The second block
    is where data storage and data processing happen. This is where data is acquired
    (data extraction layer) and then cleaned and refined to make it usable. The third
    block is data governance, which is the process of managing the availability, usability,
    integrity, and security of the data in enterprise systems; and the fourth block
    is called the consumption layer, where data is consumed by different parties,
    such as analytics platforms, reporting tools, or directly by data scientists or
    business users.


    Moving from a project-based to a product-based organization is essential for enterprises
    to succeed with IoT, which we will discuss in the next chapter. We will discuss
    about transforming to a product organization for IoT use case implementation and
    associated benefits.


    Footnotes [1](#517610_1_En_11_Chapter.xhtml#Fn1_source)   [2](#517610_1_En_11_Chapter.xhtml#Fn2_source)'
