- fmt: "### Heterogeneous IoT Transform\n\nThe Heterogeneous IoT Transform is applied\
    \ on use cases where an IoT solution will alone not be sufficient to achieve the\
    \ business results. In other words, there would be a need for IT Application transformation\
    \ of an existing legacy application along with implementing the IoT solution to\
    \ achieve the business outcome from the use case.\n\nAn IT Application transformation\
    \ means that applications surrounding the IoT use cases need to be digitally transformed\
    \ to achieve the results. Examples of IT Application transformation could be that\
    \ an application on the legacy platform needs to be refactored (rewritten) using\
    \ modern technology stacks to address the problems or opportunities identified\
    \ within the business process based on which the use cases have been defined.\n\
    \n#### Definition\n\nA **legacy system** is an old method, technology, computer\
    \ system, or application program. The implication is that the system is out of\
    \ date or in need of replacement. Typical characteristics of a legacy system are\
    \ the following:\n\n1.  Skills are hard to find in the market.\n2.  Technology\
    \ is not in use for new developments.\n3.  The system is hard to extend with new\
    \ features and takes a long time to develop a new feature.\n4.  Limited built-in\
    \ automation capabilities.\n\n**Refactoring**, also called **rewriting** or **modernizing**,\
    \ means that the complete applications need to be redesigned and rebuilt. Often,\
    \ it means that you may have to rewrite the application logic completely and develop\
    \ the cloud-native version from scratch.\n\nA large retail customer in Europe\
    \ named XYZ Retail came to us with smart store use cases, out of which one was\
    \ for their scan-and-go application.^([⁹](#fn9)) A scan-and-go is a modern shopping\
    \ technique where a customer can scan items as they shop using their mobile phones\
    \ or a specific device provided by the store and then do self-checkout without\
    \ the need of a store cashier.\n\nCustomers may be drawn to the autonomy and time\
    \ savings scan-and-go checkout promises, but distractions such as rambunctious\
    \ kids increase the chance that customers forget to scan products and walk out\
    \ of the store with free merchandise, potentially costing grocers a lot of losses.\
    \ Retailers employ various safeguards, including front-end audits, but these all\
    \ too often fail to flag unscanned items.\n\n[In an analysis](https://www.researchgate.net/publication/330214157_SELF-CHECKOUT_IN_RETAIL_MEASURING_THE_LOSS)\
    \ published last year of more than 140 million scan-and-go transactions across\
    \ 13 major retailers in the United States and the UK,^([^(10)](#fn10)) it was\
    \ found that there were product losses of as much as 10 basis points for every\
    \ 1% of sales in the scan-and-go side. That means if a store did 10% of their\
    \ sales through scan-and-go, product losses could go up an additional 1%. According\
    \ to the [National Retail Federation](https://nrf.com/media-center/press-releases/retail-shrink-tops-50-billion-cyber-threats-become-more-priority),^([^(11)](#fn11))\
    \ retailers currently lose around 1.4% of their product stock each year through\
    \ theft, employee error, and other factors, equaling more than $50 billion. Considering\
    \ the already thin margins grocers operate, an additional loss of up to 1% could\
    \ be a significant blow.\n\nThe use case we implemented for XYZ Retail is to detect\
    \ thefts with customers using scan-and-go by introducing an IoT-led intervention\
    \ solution at the self-serve checkout. As part of the solution, we adopted video\
    \ analytics for cashier checkouts to be applied to self-checkouts as well. The\
    \ video analytics solution proactively monitors the self-checkouts to detect the\
    \ various forms of theft specific to self-checkouts and alert store personnel\
    \ over their mobile in case it recognizes an irregular pattern.\n\nThe common\
    \ types of irregular patterns that were addressed as part of the self-checkout\
    \ kiosk use case include\n\n- Direct to bag – The customer moves the item directly\
    \ into the shopping bag, but avoids the bag weight scale.\n- Price look-up (PLU)\
    \ abuse – Miskeyed PLU codes.\n- Unscanned items left in the cart/basket.\n- Bypassing\
    \ the belt.\n- Involving the attendant.\n\nThough the video analytics solution\
    \ using IoT was a very impressive solution, the legacy mobile application named\
    \ `Alerting App` which the store personnel use to receive alerts was not capable\
    \ of receiving real-time alerts. This defeats the whole idea of implementing this\
    \ use case, and therefore an IT Application modernization was performed on the\
    \ `Alerting App` in parallel to implementing an IoT solution. The `Alerting App`\
    \ was rewritten using modern technology stack, thereby enabling real-time alerts\
    \ to store personnel.\n\nThis is called the Heterogeneous IoT Transform. In the\
    \ Heterogeneous IoT Transform, apart from using IoT solutions to implement the\
    \ use case, IT applications are also digitally transformed (rewritten) to achieve\
    \ the desired benefits from the use case.\n\n### Homogeneous IoT Transform\n\n\
    The Homogeneous IoT Transform is applied on use cases where an IoT solution is\
    \ self-sufficient to achieve the business results from the use case. In the preceding\
    \ scan-and-go case study for XYZ Retail, if an IT Application modernization of\
    \ the `Alerting App` would not have been required, it would be called a Homogeneous\
    \ IoT Transform.\n\n## Summary\n\nAfter a business strategy is chosen, the next\
    \ step is to identify existing core business processes of the enterprise which\
    \ impact the business strategy. Potential problems and opportunities within these\
    \ business processes determine the transformation road map for the enterprise.\n\
    \nIn this chapter, we discussed about the Business Transformation (BT) Model where\
    \ every business process is classified into one of the two zones, that is, the\
    \ IT Zone or the IoT Zone, after which problems and opportunities within the business\
    \ processes are identified, and IoT is then applied on business processes that\
    \ are part of the IoT Zone.\n\nWe also discussed about the IoT Use Case Reference\
    \ (UCR) Model which is a model to enable enterprises to make the right prioritization\
    \ of implementing an IoT solution. Subsequently, we discussed about the two IoT\
    \ treatment models, namely, the Heterogeneous IoT Transform and the Homogeneous\
    \ IoT Transform. The Heterogeneous IoT Transform is applied on use cases where\
    \ an IoT solution will alone not be sufficient to achieve the business results.\
    \ The Homogeneous IoT Transform is applied on use cases where an IoT solution\
    \ is self-sufficient to achieve the business results from the use case.\n\nIn\
    \ the next chapter, we will discuss about the IoT Standard Reference Model which\
    \ is a technical framework for implementing IoT use cases.\n\nFootnotes [1](#517610_1_En_3_Chapter.xhtml#Fn1_source)\
    \   [2](#517610_1_En_3_Chapter.xhtml#Fn2_source)   [3](#517610_1_En_3_Chapter.xhtml#Fn3_source)\
    \   [4](#517610_1_En_3_Chapter.xhtml#Fn4_source)   [5](#517610_1_En_3_Chapter.xhtml#Fn5_source)\n\
    \n# Part II  \nThe IoT Standards Reference Model\n\n## The IoT Reference Model\n\
    \nIn this part, we will discuss about the IoT Standards Reference Model which\
    \ is an abstract framework consisting of an interlinked set of clearly defined\
    \ components, using which enterprises can successfully implement an IoT solution.\n\
    \nWe will also discuss the challenges faced by enterprises while implementing\
    \ IoT use cases and how to overcome those using the IoT Standards Reference Model.\
    \ Subsequently, we will discuss the specific principles based on which enterprises\
    \ can choose appropriate devices, Smart IoT Gateway, and IoT Cloud Platform for\
    \ their IoT use cases and mitigate these challenges."
  raw: '#### Heterogeneous IoT Transform


    The Heterogeneous IoT Transform is applied on use cases where an IoT solution
    will alone not be sufficient to achieve the business results. In other words,
    there would be a need for IT Application transformation of an existing legacy
    application along with implementing the IoT solution to achieve the business outcome
    from the use case.


    An IT Application transformation means that applications surrounding the IoT use
    cases need to be digitally transformed to achieve the results. Examples of IT
    Application transformation could be that an application on the legacy platform
    needs to be refactored (rewritten) using modern technology stacks to address the
    problems or opportunities identified within the business process based on which
    the use cases have been defined.


    Definition


    *A* ***legacy system*** *is an old method, technology, computer system, or application
    program. The implication is that the system is out of date or in need of replacement.
    Typical characteristics of a legacy system are the following:*


    *1\. Skills are hard to find in the market.*


    *2\. Technology is not in use for new developments.*


    *3\. The system is hard to extend with new features and takes a long time to develop
    a new feature.*


    *4\. Limited built-in automation capabilities.*


    ***Refactoring**, also called* ***rewriting*** *or* ***modernizing**, means that
    the complete applications need to be redesigned and rebuilt. Often, it means that
    you may have to rewrite the application logic completely and develop the cloud-native
    version from scratch.*


    A large retail customer in Europe named XYZ Retail came to us with smart store
    use cases, out of which one was for their scan-and-go application.^([⁹](#fn9))
    A scan-and-go is a modern shopping technique where a customer can scan items as
    they shop using their mobile phones or a specific device provided by the store
    and then do self-checkout without the need of a store cashier.


    Customers may be drawn to the autonomy and time savings scan-and-go checkout promises,
    but distractions such as rambunctious kids increase the chance that customers
    forget to scan products and walk out of the store with free merchandise, potentially
    costing grocers a lot of losses. Retailers employ various safeguards, including
    front-end audits, but these all too often fail to flag unscanned items.


    [In an analysis](https://www.researchgate.net/publication/330214157_SELF-CHECKOUT_IN_RETAIL_MEASURING_THE_LOSS)
    published last year of more than 140 million scan-and-go transactions across 13
    major retailers in the United States and the UK,^([^(10)](#fn10)) it was found
    that there were product losses of as much as 10 basis points for every 1% of sales
    in the scan-and-go side. That means if a store did 10% of their sales through
    scan-and-go, product losses could go up an additional 1%. According to the [National
    Retail Federation](https://nrf.com/media-center/press-releases/retail-shrink-tops-50-billion-cyber-threats-become-more-priority),^([^(11)](#fn11))
    retailers currently lose around 1.4% of their product stock each year through
    theft, employee error, and other factors, equaling more than $50 billion. Considering
    the already thin margins grocers operate, an additional loss of up to 1% could
    be a significant blow.


    The use case we implemented for XYZ Retail is to detect thefts with customers
    using scan-and-go by introducing an IoT-led intervention solution at the self-serve
    checkout. As part of the solution, we adopted video analytics for cashier checkouts
    to be applied to self-checkouts as well. The video analytics solution proactively
    monitors the self-checkouts to detect the various forms of theft specific to self-checkouts
    and alert store personnel over their mobile in case it recognizes an irregular
    pattern.


    The common types of irregular patterns that were addressed as part of the self-checkout
    kiosk use case include


    *   Direct to bag – The customer moves the item directly into the shopping bag,
    but avoids the bag weight scale.


    *   Price look-up (PLU) abuse – Miskeyed PLU codes.


    *   Unscanned items left in the cart/basket.


    *   Bypassing the belt.


    *   Involving the attendant.


    Though the video analytics solution using IoT was a very impressive solution,
    the legacy mobile application named “Alerting App” which stores the personnel
    use to receive alerts was not capable of receiving real-time alerts. This defeats
    the whole idea of implementing this use case, and therefore an IT Application
    modernization was performed on the Alerting App in parallel to implementing an
    IoT solution. The Alerting App was rewritten using modern technology stack, thereby
    enabling real-time alerts to store personnel.


    This is called the Heterogeneous IoT Transform. In the Heterogeneous IoT Transform,
    apart from using IoT solutions to implement the use case, IT applications are
    also digitally transformed (rewritten) to achieve the desired benefits from the
    use case.


    #### Homogeneous IoT Transform


    The Homogeneous IoT Transform is applied on use cases where an IoT solution is
    self-sufficient to achieve the business results from the use case. In the preceding
    scan-and-go case study for XYZ Retail, if an IT Application modernization of the
    Alerting App would not have been required, it would be called a Homogeneous IoT
    Transform.


    ## Summary


    After a business strategy is chosen, the next step is to identify existing core
    business processes of the enterprise which impact the business strategy. Potential
    problems and opportunities within these business processes determine the transformation
    road map for the enterprise.


    In this chapter, we discussed about the Business Transformation (BT) Model where
    every business process is classified into one of the two zones, that is, the IT
    Zone or the IoT Zone, after which problems and opportunities within the business
    processes are identified, and IoT is then applied on business processes that are
    part of the IoT Zone.


    We also discussed about the IoT Use Case Reference (UCR) Model which is a model
    to enable enterprises to make the right prioritization of implementing an IoT
    solution. Subsequently, we discussed about the two IoT treatment models, namely,
    the Heterogeneous IoT Transform and the Homogeneous IoT Transform. The Heterogeneous
    IoT Transform is applied on use cases where an IoT solution will alone not be
    sufficient to achieve the business results. The Homogeneous IoT Transform is applied
    on use cases where an IoT solution is self-sufficient to achieve the business
    results from the use case.


    In the next chapter, we will discuss about the IoT Standard Reference Model which
    is a technical framework for implementing IoT use cases.


    Footnotes [1](#517610_1_En_3_Chapter.xhtml#Fn1_source)   [2](#517610_1_En_3_Chapter.xhtml#Fn2_source)
      [3](#517610_1_En_3_Chapter.xhtml#Fn3_source)   [4](#517610_1_En_3_Chapter.xhtml#Fn4_source)
      [5](#517610_1_En_3_Chapter.xhtml#Fn5_source)


    # Part IIThe IoT Standards Reference Model


    The IoT Reference Model


    In this part, we will discuss about the IoT Standards Reference Model which is
    an abstract framework consisting of an interlinked set of clearly defined components,
    using which enterprises can successfully implement an IoT solution.


    We will also discuss the challenges faced by enterprises while implementing IoT
    use cases and how to overcome those using the IoT Standards Reference Model. Subsequently,
    we will discuss the specific principles based on which enterprises can choose
    appropriate devices, Smart IoT Gateway, and IoT Cloud Platform for their IoT use
    cases and mitigate these challenges.'
  trans: "\n### 异构物联网转型\n\n当一个物联网解决方案本身不足以实现业务成果时，便会采用异构物联网转型。换言之，除了实施物联网解决方案外，还需要对现有遗留应用进行\
    \ IT 应用转型，才能从用例中获得业务成果。\n\nIT 应用转型意味着围绕物联网用例的应用需要经过数字化转型才能实现目标。IT 应用转型的例子包括：需要基于已定义用例的业务流程中识别出的问题或机遇，使用现代技术栈对遗留平台上的应用进行重构（重写）。\n\
    \n#### 定义\n\n**遗留系统**是指旧的方法、技术、计算机系统或应用程序。其含义是该系统已经过时或需要更换。遗留系统的典型特征如下：\n\n1.\
    \  市场上很难找到相关技能人才。\n2.  该技术已不用于新开发项目。\n3.  系统难以扩展新功能，开发新功能耗时漫长。\n4.  内置自动化能力有限。\n\
    \n**重构**，也称为**重写**或**现代化**，意味着需要重新设计和构建整个应用。通常，这意味着您可能需要完全重写应用逻辑，并从头开发云原生版本。\n\
    \n一位名叫 XYZ Retail 的欧洲大型零售客户向我们提出了智能商店用例，其中之一涉及他们的\"即扫即走\"应用。^(⁹) \"即扫即走\"是一种现代购物技术，顾客在购物时可以使用手机或商店提供的特定设备扫描商品，然后自助结账，无需收银员。\n\
    \n顾客可能被\"即扫即走\"结账方式所承诺的自主性和节省时间所吸引，但诸如顽皮小孩之类的干扰会增加顾客忘记扫描商品、带着未付款商品走出商店的可能性，这可能会给杂货店造成巨大损失。零售商采用了包括前端审计在内的各种保障措施，但这些措施往往难以发现未扫描的物品。\n\
    \n[去年发表的一项分析](https://www.researchgate.net/publication/330214157_SELF-CHECKOUT_IN_RETAIL_MEASURING_THE_LOSS)对美国和英国\
    \ 13 家主要零售商的超过 1.4 亿笔\"即扫即走\"交易进行了研究，^(¹⁰)发现\"即扫即走\"方面每产生 1%的销售额，商品损耗就高达 10 个基点。这意味着，如果一家商店通过\"\
    即扫即走\"方式完成 10%的销售额，商品损耗可能会额外增加 1%。根据[美国全国零售联合会](https://nrf.com/media-center/press-releases/retail-shrink-tops-50-billion-cyber-threats-become-more-priority)的数据，^(¹¹)零售商每年因盗窃、员工失误和其他因素损失的库存约占其总库存的\
    \ 1.4%，相当于超过 500 亿美元。考虑到杂货商的利润空间已经很薄，额外高达 1%的损失可能是一个重大打击。\n\n我们为 XYZ Retail 实施的用例是，通过在自助结账处引入物联网主导的干预解决方案，来检测使用\"\
    即扫即走\"功能的顾客的盗窃行为。作为该解决方案的一部分，我们将原本用于收银台结账的视频分析技术也应用于自助结账。视频分析解决方案主动监控自助结账，检测针对自助结账的各种盗窃形式，并在识别出异常模式时通过手机提醒商店员工。\n\
    \n作为自助结账终端用例的一部分，我们解决的常见异常模式包括：\n\n-   直接装袋 – 顾客将商品直接放入购物袋，但避开袋子重量秤。\n-   价格查询（PLU）滥用\
    \ – 输错 PLU 代码。\n-   未扫描商品留在购物车/购物篮中。\n-   绕过传送带。\n-   寻求店员帮助。\n\n尽管使用物联网的视频分析解决方案令人印象深刻，但商店员工用于接收警报的名为`Alerting\
    \ App`的遗留移动应用却无法接收实时警报。这违背了实施此用例的初衷，因此，在实施物联网解决方案的同时，对`Alerting App`进行了 IT 应用现代化改造。`Alerting\
    \ App`使用现代技术栈进行了重写，从而能够向商店员工发送实时警报。\n\n这就是所谓的异构物联网转型。在异构物联网转型中，除了使用物联网解决方案来实施用例外，还需要对\
    \ IT 应用进行数字化转型（重写），以实现用例的预期收益。\n\n### 同构物联网转型\n\n当一个物联网解决方案足以独立实现用例的业务成果时，便会采用同构物联网转型。在上述\
    \ XYZ Retail 的\"即扫即走\"案例研究中，如果不需要对`Alerting App`进行 IT 应用现代化改造，那么这就叫同构物联网转型。\n\n\
    ## 总结\n\n在选择了业务战略之后，下一步是识别企业中影响该战略的核心业务流程。这些业务流程中的潜在问题与机遇决定了企业的转型路线图。\n\n在本章中，我们讨论了业务转型（BT）模型。在该模型中，每个业务流程都被归入两个区域之一，即\
    \ IT 区域或 IoT 区域。之后，我们识别出业务流程中的问题与机遇，并将物联网应用于属于 IoT 区域的业务流程。\n\n我们还讨论了物联网用例参考（UCR）模型，该模型旨在帮助企业正确确定实施物联网解决方案的优先级。随后，我们讨论了两种物联网处理模型，即异构物联网转型和同构物联网转型。异构物联网转型适用于物联网解决方案本身不足以实现业务成果的用例。同构物联网转型适用于物联网解决方案本身足以实现业务成果的用例。\n\
    \n在下一章中，我们将讨论物联网标准参考模型，这是一个用于实施物联网用例的技术框架。\n\n脚注 1   2   3   4   5\n\n# 第二部分 \
    \ \n物联网标准参考模型\n\n## 物联网参考模型\n\n在本书这一部分，我们将讨论物联网标准参考模型。该模型是一个抽象框架，包含一组相互关联、定义明确的组件，企业可以利用它成功实施物联网解决方案。\n\
    \n我们还将讨论企业在实施物联网用例时面临的挑战，以及如何利用物联网标准参考模型克服这些挑战。随后，我们将讨论企业可根据其具体原则为其物联网用例选择合适的设备、智能物联网网关和物联网云平台，并缓解这些挑战。\n"
- fmt: '# 4. The IoT Standards Reference Model


    The number of devices connected to the Internet, including the machines, sensors,
    and cameras that make up the Internet of Things (IoT), continues to grow at a
    steady pace.^([^(12)](#fn12)) A new forecast from IDC estimates that there will
    be 41.6 billion connected IoT devices, or “things,” generating 79.4 zettabytes
    (ZB) of data in 2025.


    As the number of connected IoT devices grows, the amount of data generated by
    these devices also grows. Some of this data is small and bursty, indicating a
    single metric of a machine’s health, while large amounts of data are generated
    by several other devices such as video surveillance cameras using computer vision
    to analyze crowds of people, for example.


    There is an obvious direct relationship between all the “things” and the data
    these things create. IDC projects that the amount of data created by these connected
    IoT devices will see a compound annual growth rate (CAGR) of 28.7% over the 2018–2025
    forecast period. Most of the data is being generated by video surveillance applications,
    but other categories such as industrial and medical will increasingly generate
    more data over time.


    As the market continues to mature, IoT increasingly becomes the fabric enabling
    the exchange of information from “things,” people, and processes. Data becomes
    the common denominator – as it is captured, processed, and used from the nearest
    and farthest edges of the network to create value for industries, governments,
    and individuals’ lives.


    The domain of the Internet of Things encompasses a wide range of technologies,
    and therefore a single architecture cannot be used for all possible IoT implementations.
    An IoT implementation differs from enterprise to enterprise. As an example, IoT
    for manufacturing (IIoT) is different from an IoT implementation in the healthcare
    sector (IoMT). In fact, IoT is like an umbrella around all possible Internet and
    non-Internet-enabled devices and computers around us. Therefore, the IoT architecture
    needs to be open enough with open protocols to support a variety of existing network
    applications and use cases. Additionally, middleware for scalability, security,
    and semantic representation should also be included to promote devices and data
    integration from various devices.


    In this chapter, the IoT Standards Reference Model is defined which is an abstract
    framework or domain-specific ontology consisting of an interlinked set of clearly
    defined components, using which enterprises can successfully implement an IoT
    solution. The IoT Standards Reference Model can be applied for IoT use cases across
    any industries. The IoT Standards Reference Model is kept abstract in order to
    enable many, potentially different, IoT architectures to be implemented based
    on the IoT Standards Reference Model.


    ## The IoT Standards Reference Model


    To embark on an IoT journey, enterprises need to choose the right devices that
    will be part of the IoT implementation along with choosing the right networks
    to use, the right IoT platforms, and so on. And then finally integration needs
    to be done in the most secured way. The good news is that by paying attention
    to security early, enterprises can design security up front, rather than act reactively.


    Figure [4-1](#517610_1_En_4_Chapter.xhtml#Fig1) depicts the IoT Standards Reference
    Model, which is broadly split into three horizontal services.^([^(13)](#fn13))
    Security is a vertical service which is applied across all the horizontal services
    and is one of the most important aspects to be considered while making decisions
    about devices, Smart IoT Gateways, or Full Stack IoT Platforms. Device Management
    and Artificial Intelligence (AI) are two specific services that are either part
    of the Smart IoT Gateway or Full Stack IoT Platform. The choice of where these
    services should reside is dependent on the IoT use cases and is therefore considered
    as a vertical within the reference model. Finally, Blockchain is an overarching
    function that powers the complete IoT Standards Reference Model and is a horizontal
    service that spans across all horizontal and vertical services.


    ![../images/517610_1_En_4_Chapter/517610_1_En_4_Fig1_HTML.jpg](images/517610_1_En_4_Chapter/517610_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** IoT Standards Reference Model


    The first horizontal service is the device layer, which consists of the physical
    objects that are located on the shop floors.


    The second is the Smart IoT Gateway, which is responsible for collecting data
    from devices and relaying it to the rest of the systems. In many scenarios, the
    Smart IoT Gateway performs the preprocessing of the data collected from devices
    including analytics. Another feature the Smart IoT Gateway performs is Device
    Management. Some enterprises choose to perform Device Management at the Smart
    IoT Gateway level, but others prefer to perform Device Management in the next
    block which is at the Full Stack IoT Platform level. Device Management, which
    is discussed in detail in subsequent sections, refers to the processes involving
    the provisioning and authenticating, configuring, maintaining, monitoring, and
    diagnosing of devices operating as part of an IoT environment.


    The Full Stack IoT Platform is like the nervous system of enterprise business
    where the IoT data coming from devices via the Smart IoT Gateway is combined with
    other non-IoT data to derive useful insights using analytics systems or applications.^([^(14)](#fn14))
    Artificial Intelligence (AI) is another function in an IoT Standards Reference
    Model which enables enterprises to create intelligent machines that simulate smart
    behavior and support in decision-making with little or no human interference.
    Some enterprises choose to apply AI models at the Smart IoT Gateway level, and
    some choose to do it at the Full Stack IoT Platform level, while a few others
    choose to perform AI at both places. Making these choices is dependent on the
    IoT use cases that enterprises choose to implement.


    The devices, Smart IoT Gateways, and Full Stack IoT Platform need to be secured,
    which is one of the key implicit requirements of the IoT Standards Reference Model.
    Enterprises need to ensure that tools and platforms which are chosen as part of
    the IoT Standards Reference Model are validated on security thoroughly.


    Finally, the IoT Standards Reference Model is powered by Blockchain as a technology.
    Though Blockchain is currently evolving in the context of IoT, it is quite essential
    that enterprises plan the function while deciding their IoT architecture as Blockchain
    is going to become the most important element for enterprises to succeed with
    IoT in the future.


    We are going to discuss in detail each of these functions in subsequent chapters,
    and a quick preview is provided as follows.'
