    # 为未来设计业务


    在评估业务转型战略时，有四个关键支柱对于指导组织的思考至关重要。它们如下所示：


    - **正确的商业模式** – 实现数字化并非简单地将现有产品或客户互动及体验迁移到线上。在数字经济中取得持久成功意味着从根本上重新思考当今的业务运作方式。组织通过集中化目录将产品推向市场，并转向提供全新的消费模式（例如普及的数字服务和订阅，而非一次性购买），再加上消费者如今购买和使用产品的方式，这些都是基础性的变革。


    - **正确的合作伙伴** – 与跨行业边界的数字伙伴合作的企业，在不断变化的数字世界中能实现远超任何单个企业独自所能达成的成就。为了实现这一点，企业现在必须与众多现有系统和第三方系统集成，精简并简化业务流程，并开发能降低运营风险和支出的高效改进措施。共享知识和独特经验以开发新的应用程序、产品和服务将变得至关重要。


    - **正确的技术** – 并非所有平台生来平等，那些未能明智而勇敢地做出选择的企业将痛苦地认识到这一点。当数字竞争对手以极低的成本运营时，遗留系统基础设施的维护、集成和运营成本将变得高得令人望而却步。然而，并非所有遗留系统都能被替换，每个企业都需要在遗留系统与数字系统之间找到恰当的平衡点。


    - **正确的心态** – 无论客户是谁，从消费者到供应商再到合作伙伴，提供不断演进的客户体验对于数字化成功至关重要，但这只是成功的一半。为了生存并（最重要的是）蓬勃发展，数字文化必须融入组织的各个层级，以灌输数字经济所要求的敏捷性和持续学习的心态。这需要改变企业员工队伍和运营模式。


    数字化转型没有放之四海而皆准的方法；每个组织的战略都将是独一无二的。然而，专注于在这四个支柱之间平衡活动，为成功转型提供了指南针。


    # 物联网作为数字化推动力


    物联网（IoT）是讨论最广泛的数字技术之一，它承诺为企业带来巨大价值。物联网的核心是通过互联网连接设备，使它们能够相互通信，并与众多不同的系统、应用程序等进行交互。一个典型的例子是智能冰箱。利用物联网，冰箱可以告诉我们牛奶没了，如果其内置摄像头看到没牛奶了或牛奶盒已过保质期，它还可以发短信通知我们。所有这些都通过物联网成为可能，这也是物联网日益普及的原因之一。当我们谈论物联网时，它涉及到硬件和软件之间的相互通信。


    物联网系统中使用的硬件包括用于远程仪表盘的设备、用于控制的设备、服务器、路由设备和传感器。这些设备管理关键任务和功能，如系统激活、动作规范、安全性、通信和检测，以支持特定的目标和行动。


    物联网中使用的软件包括从硬件设备收集数据的系统。物联网软件通过平台、嵌入式系统和中间件来处理网络和行动的关键领域。这些单独的应用程序负责数据收集、设备集成、实时分析以及物联网网络内的应用程序和流程扩展。它们利用与关键业务系统（例如，订单系统）的集成来执行相关任务。这些术语将在后面进一步解释。


    工业物联网（IIoT）和医疗物联网（IoMT）是物联网领域另外两个最广泛使用的术语。IIoT 是制造业技术中自动化和数据交换的当前趋势。它包括信息物理系统、物联网和云计算。工业
    4.0 创造了所谓的“智能工厂”。IoMT 则是指医疗物联网。IoMT 是一个由医疗设备、软件应用程序以及健康系统和服务组成的互联基础设施。


    无论我们谈论的是 IIoT 还是 IoMT，将 IT 系统与运营技术整合总是首要任务。简言之，这被称为 IT-OT 融合。


    高德纳咨询公司（Gartner, Inc.）预测，企业和汽车物联网市场^(¹) 将在 2020 年增长至 58 亿个端点，比 2019 年增长 21%。到
    2019 年底，预计将有 48 亿个端点投入使用，比 2018 年增长 21.5%。从物联网的角度来看，端点是一种物理计算设备，它作为互联网连接产品或服务的一部分执行某项功能或任务。例如，端点可以是可穿戴健身设备、工业控制系统、汽车远程信息处理单元，甚至是个人无人机单元。


    公用事业将是物联网端点的最大用户，2019 年总计达到 11.7 亿个端点，并在 2020 年增长 17%，达到 13.7 亿个端点。据预测，住宅和商业领域的智能电表将推动物联网在公用事业中的应用。物理安全将成为
    2020 年第二大物联网应用场景，其中建筑入侵检测和室内监控的用例将驱动其数量增长。^(²)


    构成物联网生态系统的四个核心要素如图 1-1 所示。


    ![../images/517610_1_En_1_Chapter/517610_1_En_1_Fig1_HTML.jpg](img/517610_1_En_1_Fig1_HTML.jpg)


    图 1-1


    物联网生态系统中的四个核心要素


    **数据收集** – 这是从传感器等来源检索数据的过程。它使用某些协议来帮助传感器连接实时、机器对机器网络。然后，它从多个设备收集数据，并根据设置进行分发。它也反向运作，将数据分发到设备上，系统最终将所有收集的数据传输到中央服务器。

    '
- fmt: '**Device integration** – Device integration software brings all the devices
    together to create a consortium of the IoT systems. It ensures the necessary cooperation
    and stable networking between devices.


    **Real-time analytics** – These applications take data or input from various devices
    and convert it into viable actions or clear patterns for human analysis. They
    analyze information based on various settings and designs, after which certain
    actions are taken either manually or automatically.


    **Application and process extension** – Applications extend the reach of existing
    systems and software to allow a wider, more effective system. They integrate predefined
    devices for specific purposes such as allowing certain mobile devices or engineering
    instruments access. It supports improved productivity and more accurate data collection.


    From the preceding discussion, it is clear that IoT is not just about devices.
    It is an integration between Information Technology and Operational Technology.


    ## Definition


    `Shop floor` is the area of a factory, machine shop, etc. where people work on
    machines, or the space in a retail establishment where goods are sold to consumers.


    Operational Technology (OT) is about managing, monitoring, and controlling industrial
    operations with a focus on the physical devices and processes used in the shop
    floor where the production of goods takes place.


    IT includes the use of computers, storage, networking devices, other physical
    devices and infrastructure, as well as processes to create, process, store, secure,
    and exchange all forms of electronic data.


    ### Operational Technology – A Preview


    OT is about (heavy) machineries, safety of people, and so on. There is almost
    zero tolerance toward downtime, errors, and safety. This is one of the core reasons
    why OT has always operated in a highly risk-averse manner. Another aspect of OT
    is that the machineries deployed at the factories cannot be upgraded or replaced
    at the same pace as IT systems, and these are the ones that will remain for years
    once purchased. This becomes a hurdle to deploy new innovative ideas on these
    machineries to make them more efficient. On the other hand, most of the machineries
    operate 24/7 and 365 days a year, and stopping these machineries for any desired
    upgrades or modification is an almost impossible task.


    In the consumer-facing OT world in the last few years, there have been tremendous
    advancements made. As an example, in the older days we were carrying analogue
    phones, and now almost everybody uses a smartphone. We were also previously driving
    manual cars although many of us have now made the switch to electric or automatic.


    The nonconsumer-facing OT world however has not changed at all – in the mining
    industry, for example, several decades ago hammers, chisels, pickaxes, and shovels
    were being used, and still are to this day. Similarly, in the manufacturing industry
    years back, they were using conveyor belts, painting robots, welding robots, and
    so on. Fast forward to today, and we have the same equipment. The three key reasons
    why changes have not occurred is because


    * **Safety** – Safety is to prevent or lessen the risk of workplace injury, illness,
    and death and therefore is of paramount importance in the OT world. Safety is
    keeping people away from physical harm, and there is zero tolerance toward safety
    compromises.

    * **Reliability** – Reliability is defined as the probability that a component
    (or an entire system) will perform its function for a specified period of time,
    when operating in its design environment.

    * **Cost and risk to change or upgrades** – The cost of change to machinery is
    quite high, and with almost zero downtime expected on machineries, upgrades are
    also hard to manage. Secondly, an error from upgrading can lead to reliability
    issues. This is one of the reasons why in the OT world there is a tendency to
    avoid quick patches, software updates, etc., because they may result in safety
    or reliability concerns.


    There are several challenges in making changes to the OT systems, such as manufacturing
    or mining equipment. However, with more and more benefits that enterprises are
    gaining because of IoT, they have the desire to change, but an uncompromised requirement
    is safety and security. A poorly planned change (even as simple as an antivirus
    update) can introduce enough risk of disruption to an industrial network that
    OT experts are scared about as people’s lives may be at risk because of a badly
    managed change.


    IT/OT convergence or IT-OT integration is the integration of Information Technology
    (IT) systems with Operational Technology (OT) systems. IT systems are used for
    data-centric computing; OT systems monitor events, processes, and devices and
    make adjustments in enterprise and industrial operations.


    The main difference between OT and IT devices is that OT devices control the physical
    world, while IT systems manage data.


    The IT team is the Information Technology team and constitutes of roles such as
    data analysts, data scientists, developers, and testers. An OT team could be factory
    managers, production managers, and even agriculture farmers. These are the folks
    who produce food, control the oil and gas process, pump oil from the ground, or
    who are responsible for maintaining the fleet of company trucks.


    In the long term, not making necessary changes, such as upgrading, and not adopting
    to IoT may lead to an increased risk of a deliberate disruption by a hacker. A
    well-known example of such a disruption was the Stuxnet attack in Iran. In January
    2010, inspectors with the International Atomic Energy Agency visiting the Natanz
    uranium enrichment plant in Iran noticed that filters used to enrich uranium gas
    were failing at an unprecedented rate. The cause was a complete mystery, and Iranian
    technicians replaced the filters. Five months later, a seemingly unrelated event
    occurred. A computer security firm in Belarus was called in to troubleshoot a
    series of computers in Iran that were crashing and rebooting repeatedly. The researchers
    found a handful of malicious files on one of the systems and discovered the Stuxnet
    virus. Another more recent event occurred last year in Germany, where hackers
    used malware to gain access to the control system of a steel mill, which they
    disrupted to such a degree that it could not be shut down. Thankfully, there was
    no damage to human life. These two examples highlight that OT systems are not
    fully secured and need to be upgraded at regular intervals. On the other side,
    IT-OT integration is mandatory for all enterprises that wish to be relevant in
    the market.'
