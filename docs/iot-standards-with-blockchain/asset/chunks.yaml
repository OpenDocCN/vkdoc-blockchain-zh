  trans: '

    **设备集成** – 设备集成软件将所有设备整合在一起，形成物联网系统的联合体。它确保了设备间的必要协作与稳定联网。


    **实时分析** – 这些应用程序从各种设备获取数据或输入，并将其转化为可执行的操作或清晰的人类可分析模式。它们基于多种设置与设计分析信息，随后手动或自动执行相应操作。


    **应用与流程扩展** – 应用程序扩展了现有系统和软件的范围，以实现更广泛、更高效的系统。它们为特定目的集成预定义设备，例如允许某些移动设备或工程仪器接入。这有助于提升生产力并实现更精确的数据采集。


    根据以上讨论，不难看出物联网不仅涉及设备本身，更是信息技术与运营技术的融合。


    ## 定义


    `车间` 是指工厂、机加工车间等场所中人们操作机器的区域，或是零售场所中商品销售给消费者的空间。


    运营技术（OT）侧重于对工业运营进行管理、监控与控制，重点关注车间中用于产品生产的实体设备与流程。


    信息技术（IT）涵盖计算机、存储、网络设备及其他实体设备与基础设施的使用，以及用于创建、处理、存储、安全保护和交换各类电子数据的流程。


    ### 运营技术概述


    OT 关注的是（重型）机械、人员安全等方面。对于停机、错误和安全问题几乎采取零容忍态度。这也是 OT 始终以高度规避风险方式运行的核心原因之一。OT 的另一个特点是工厂部署的机械设备无法像
    IT 系统那样以相同速度升级或更换，一旦购买便会使用多年。这成为在这些机械上部署创新理念以提升效率的阻碍。另一方面，大多数机械设备全年无休、每天 24 小时运行，为了升级或改造而停机几乎是不可能完成的任务。


    在面向消费者的 OT 领域，过去几年取得了巨大进步。例如，过去我们使用模拟手机，现在几乎人人都在用智能手机。以前我们开手动挡汽车，而现在许多人已改用电动车或自动挡汽车。


    然而，非面向消费者的 OT 领域几乎毫无改变——例如在采矿业，几十年前人们使用锤子、凿子、镐头和铁锹，至今依然如此。同样，在制造业，多年前使用传送带、喷漆机器人、焊接机器人等设备，时至今日仍是同样的设备。变革未能发生的三个关键原因是：


    * **安全性** – 安全是为了预防或降低工伤、疾病和死亡风险，因此在 OT 领域至关重要。安全意味着让人们免受身体伤害，对安全妥协零容忍。

    * **可靠性** – 可靠性定义为组件（或整个系统）在其设计环境中运行时，在规定时间内执行其功能的概率。

    * **变更或升级的成本与风险** – 机械变更成本相当高，且由于机械设备几乎不容许停机，升级也难以管理。其次，升级失误可能导致可靠性问题。这也是 OT 领域倾向于避免快速补丁、软件更新等操作的原因之一，因为它们可能引发安全或可靠性隐患。


    对 OT 系统（如制造业或采矿设备）进行改造面临诸多挑战。然而，随着企业从物联网中获益越来越多，他们渴望变革，但安全和安保是不可妥协的要求。一个规划不当的变更（甚至简单如杀毒软件更新）都可能给工业网络带来足够大的中断风险，令
    OT 专家胆战心惊，因为管理不当的变革可能危及人员生命。


    IT/OT 融合或 IT-OT 集成是指信息技术（IT）系统与运营技术（OT）系统的整合。IT 系统用于以数据为中心的计算；OT 系统则监控事件、流程和设备，并对企业和工业运营进行调整。


    OT 设备与 IT 设备的主要区别在于：OT 设备控制物理世界，而 IT 系统管理数据。


    IT 团队即信息技术团队，由数据分析师、数据科学家、开发人员和测试人员等角色构成。OT 团队则可能是工厂经理、生产经理，甚至农业从业者。他们是生产食物、控制石油与天然气流程、从地下抽取石油，或负责维护公司卡车车队的人员。


    从长远来看，不进行必要的变革（如升级）且不采用物联网，可能会增加黑客蓄意破坏的风险。一个著名的破坏案例是伊朗的震网（Stuxnet）攻击。2010 年 1
    月，国际原子能机构的检查人员在参观伊朗纳坦兹铀浓缩工厂时，发现用于浓缩铀气体的过滤器以前所未有的速度出现故障。原因完全是个谜，伊朗技术人员更换了过滤器。五个月后，一起看似无关的事件发生了。白俄罗斯一家计算机安全公司被请来排查伊朗一系列反复崩溃和重启的计算机。研究人员在其中一台系统上发现了一些恶意文件，并发现了震网病毒。另一个更近期的案例发生在去年（原文指
    2014 年）的德国，黑客利用恶意软件入侵了一家钢铁厂的控制系统，并对其造成严重破坏，导致无法正常关闭。幸好没有造成人员伤亡。这两个例子表明 OT 系统并非完全安全，需要定期升级。另一方面，对于所有希望在市场上保持竞争力的企业而言，IT-OT
    集成是必不可少的。

    '
- fmt: '### The IT-OT Integration


    Until today, `OT` has very limited integration with the `IT`. The reason behind
    this is that `OT` is all about machinery, safety of people, and the creation of
    products. Today, more and more organizations are embracing IoT technologies such
    as smart meters and self-monitoring transformers. We are also seeing production
    lines and farm equipment outfitted with sensors.


    The rise of these new technologies has created a need for organizations to optimize
    how machines, applications, and infrastructure collect, transmit, and process
    data. Done right, IT-OT convergence gives businesses the ability to fix critical
    issues faster, make informed business decisions, and scale processes across both
    physical and virtual systems. Figure [1-2](#517610_1_En_1_Chapter.xhtml#Fig2)
    depicts a simple block diagram on how an IoT ecosystem works.


    ![../images/517610_1_En_1_Chapter/517610_1_En_1_Fig2_HTML.jpg](images/517610_1_En_1_Chapter/517610_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    IT-OT integration reference diagram


    The first two blocks are the Information Technology layers where enterprise resource
    planning suites sit, such as customer relationship management and sales applications.
    Data from these tools and software is routed to the data and reporting layer for
    reporting purposes. The bottom two layers are the Operational Technology layers.
    The monitoring and control equipment (`MCE`) layer is where the actual production
    of goods or processing takes place. This is where, as an example, cars are manufactured
    or mining occurs, and all these are controlled and monitored by supervisory control
    and data acquisition (`SCADA`) systems. `SCADA` is a system of software and hardware
    elements that allows industrial organizations to


    - Control industrial processes locally or at remote locations

    - Monitor, gather, and process real-time data

    - Directly interact with devices such as sensors, valves, pumps, motors, and more
    through human-machine interface (`HMI`) software

    - Record events into a log file


    Along with `SCADA`, product life cycle management tools form part of the `MCE`
    layer. Product life cycle management (`PLM`) refers to the management of data
    and processes used in the design, engineering, manufacturing, sales, and service
    of a product across its entire life cycle and across the supply chain.


    As part of IoT, all four layers integrate with each other, thereby enabling a
    seamless data and information exchange between IT and OT.


    ## The Triple Challenges in IoT


    There are several reasons why IoT projects fail, one of them is lack of a business
    strategy toward IoT project implementation. Another reason is the lack of a well-thought
    approach toward security and interoperability. Though there had been a lot of
    efforts made since the last few years to address these three challenges for IoT,
    a point to be noted is that we are still far away from perfection in these areas.


    ### Business Strategy


    Several enterprises have embarked in their IoT journey by identifying IoT use
    cases and choosing a technology to implement those use cases. Such piecemeal IoT
    implementations are a definite path to failure. An IoT implementation is not a
    technology initiative. It is a business initiative that is achieved using technology.
    A business initiative is derived using a business strategy.


    ### IoT Security


    IoT means integrating IT and OT which is an emerging trend in the IT industry
    and is becoming more popular each and every day. Over the next few years, IoT
    is going to become the standard for everyone. Security and privacy are however
    the biggest challenges being faced today as IoT deals with a lot of devices and
    sensors that collect a lot of personal data about people and enterprises which
    is then passed to the IT systems. As an example, a smart meter knows when a person
    is home and what electronics individuals are using and when. All this information
    is shared with other devices and held in databases by companies. Some experts
    argue that not enough is being done to build security and privacy into the IoT
    ecosystem at these early stages. To prove their point further, some have even
    hacked a host of devices, from [connected baby monitors](https://www.yahoo.com/parenting/nanny-freaks-as-baby-monitor-is-hacked-109405425022.html)
    to [automated lighting](http://www.bbc.co.uk/news/technology-28208905) and [smart
    fridges](http://www.theguardian.com/technology/2014/jan/21/fridge-spam-security-phishing-campaign),
    as well as citywide systems such as traffic signals.


    A research in 2018 shows that 55% of IT professionals list security in an IoT
    world as their top priority. This is according to a survey conducted by 451 Research.^([³](#fn3))
    From corporate servers to cloud storage, cybercriminals are finding ways to exploit
    information at many points within an IT-OT ecosystem. As of 2021, many of the
    security challenges mentioned by these IT professionals have been addressed, but
    still there is a long way to go.


    Definition


    `Critical infrastructure` is the body of systems, networks, and assets that are
    so essential that their continued operation is required to ensure the security
    of a given enterprise, its economy, and employee’s health and/or safety.


    The interesting part is that hackers have not spent much time or effort so far
    in hacking OT devices since there are not many enterprises or people who are using
    IoT fully, and hence it is not worth the effort for them. This is however going
    to be a new area of focus for cybercriminals as enterprises start utilizing IoT
    in their day-to-day business. Security is one of the most important elements that
