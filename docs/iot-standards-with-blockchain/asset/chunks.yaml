    # 特定能力


    到目前为止，我们讨论了帮助企业预筛选云平台提供商的基本六大能力。根据我对这六项基本功能的经验，企业可以将其物联网平台提供商筛选到不足十家。虽然这是达到的第一个良好里程碑，但必须理解，任何企业在物联网领域取得成功的最关键步骤，是基于提供商在物联网领域的专业性和能力来选择平台。一个物联网平台应当具备足够的广度和深度，以涵盖针对物联网解决方案的特定能力，这些能力需基于企业的业务和用例。如果这步出错，企业将面临物联网项目失败的风险。


    如今，不存在一种“一刀切”的物联网解决方案平台。选择平台应始于对企业物联网战略的充分理解。识别企业试图通过物联网解决哪类问题、列出可能的解决方案和用例的短名单，并尝试确定你在哪些方面需要专业性和深度，这些都至关重要。如果企业清楚自己正在解决哪种业务问题以及最大的挑战在哪里，你就能快速筛选出少量候选平台。


    好消息是，随着物联网标准参考模型中引入了物联网网关，一些核心功能在该层级得到处理，而物联网平台所需的其他能力则得到提醒。这种架构很有意义，因为它带来了架构内部的自主性。根据特定需求，企业可以选择哪些能力需要在物联网网关层面实现，哪些需要在物联网平台层面实现。


    指导企业选择物联网平台的四大核心能力如图 7-2 所示，并列举如下：


    ![../images/517610_1_En_7_Chapter/517610_1_En_7_Fig2_HTML.jpg](img/517610_1_En_7_Fig2_HTML.jpg)


    图 7-2

    选择云平台时的四大核心能力


    1.  连接性

    2.  设备管理

    3.  应用使能平台

    4.  可扩展性（设备层面、数据存储和分析）


    ## 连接性


    第一个是连接性。在大多数用例中，智能物联网网关管理着与物联网设备的通信。物联网平台应能够与智能物联网网关无缝通信，并以实时和批处理两种方式收发数据。


    批处理是一种处理大量数据的模式，即在一段时间内收集一组事务，然后批量传输到物联网平台。相比之下，实时数据处理涉及数据从智能物联网网关到物联网平台的持续输入、处理和输出。数据必须在很短的时间内（或接近实时地）得到处理。


    ## 设备管理


    设备管理是物联网标准参考模型中一个非常重要的功能，它涉及对作为物联网生态系统一部分运行的连接设备进行配置和认证、配置、维护、监控和诊断的过程。一些企业选择由物联网网关来执行设备管理，而另一些则更倾向于在物联网平台层面进行。需要根据企业业务和用例做出适当的决策。设备管理大致包含三个不同的功能，如图
    7-3 所示。


    ![../images/517610_1_En_7_Chapter/517610_1_En_7_Fig3_HTML.jpg](img/517610_1_En_7_Fig3_HTML.jpg)


    图 7-3

    设备管理功能


    ### 设备接入与配置


    许多企业遵循手动流程：在现场激活设备，使用 IT 手段在网络中进行配置，并在物联网平台上向设备所有者注册。这是一个耗时密集的过程，同时可能导致安全漏洞，正如近期的大规模攻击所证明的那样——设备制造商出厂时设置了默认凭证，这些凭证被黑客利用僵尸网络攻击所攻破。僵尸网络是受恶意软件感染的联网设备集合，允许黑客控制它们。网络犯罪分子利用僵尸网络发起攻击，包括凭证泄露、未授权访问、数据窃取和拒绝服务攻击等恶意活动。


    拒绝服务（DoS）攻击是一种网络攻击，攻击者试图通过暂时或无限期地中断服务，使机器或网络资源对其预期用户不可用。


    一些企业声称，手动添加一台设备每台可能需要超过 30 分钟。想象一下，一个工厂安装了 10,000 个智能灯泡，所有这些都需要在物联网平台上进行接入。这意味着，通过手动方式，企业将需要花费
    300,000 个工时来完成安装。如今，许多企业的关键需求是减少物联网设备在平台上的接入时间。在一个工业物联网案例研究中，某企业需要接入数万台设备，在如此大规模的环境下，手动流程会导致巨大的成本和努力。在选择物联网平台时，企业需要寻找那些能够缩短安装时间、让物联网设备以安全且自动化的方式更快上线的平台。市场上已有一些物联网平台采用了零接触方法，使得物联网设备在通电时能够动态发现物联网平台并进行自动注册。并非所有企业都需要此类功能，需要根据实际情况进行仔细分析，以选择适合的物联网平台。


    在添加物联网设备时，企业需要确保只有受信任的设备才能加入企业的物联网生态系统。因此，设备认证至关重要，它是安全建立设备身份并确保其可被信任的行为。通过设备认证，企业可以确信设备是正品，运行着受信任的软件，并且代表受信任的用户工作。


    企业需要确保他们选择的平台能够支持自动、安全的设备接入。例如，现场的一台新设备通电后，物联网平台应能定位该设备，并采用公钥加密等方法，以完全安全的方式自动将设备接入到物联网平台。公钥加密，也称为非对称加密，使用两个独立的密钥（公钥和私钥）而不是一个共享密钥。公钥加密是保障互联网安全的一项重要技术。


    ### 设备配置


    一旦设备成功接入，设备配置就开始发挥作用。设备配置是调整已接入设备超出其默认设置的过程，例如更改密码或升级到最新固件。物联网平台应提供灵活直观的配置机制，使企业不仅能在设备按计划运行时设计其智能设备群的行为，还能在出现故障时即时做出反应。企业中所有作为物联网生态系统一部分的物联网设备的总和被称为智能设备群。'
- fmt: '# Device Maintenance


    Device maintenance deals with the process of improving device performance or eliminating
    technical issues in the devices. This includes installing software fixes or patches
    remotely or pushing upgrades to all devices in the fleet of all IoT devices at
    the same time without manual intervention.


    Device maintenance also deals with recommending or performing repair actions when
    a device is down. When equipment goes down, failure data from various sources
    can be gathered, aggregated, and analyzed in real time, and repair actions can
    be initiated automatically by the IoT Platform, or actions can be recommended
    to the technician if necessary. Enterprises need to validate the exhaustiveness
    of the solutions offered by IoT Platform providers in this respect.


    Asset-intensive industries face a range of challenges when it comes to ensuring
    mission-critical plants and equipment operate at maximum efficiency and uptime,
    and customer service commitments are met, as even the smallest disruption to service
    can lead to costly penalties or, worse, churn. Enterprises need to understand
    how their products and assets are performing so that they can optimize their use
    and better anticipate issues and failures. This is the main reason why remote
    monitoring and maintenance has an important role to play in an IoT ecosystem.
    Monitoring and diagnosing includes not only giving enterprises the ability to
    better monitor the proper functioning of their products and plant machinery but
    also enabling them to prevent costly breakdown and fixes and improve customer
    service.


    ## Application Enablement Platforms (IoT Platform with Superior Application Development
    Capabilities)


    A very important feature required in an IoT Platform is the ability to support
    developers in creating IoT applications with ease. Enterprises need to select
    an IoT platform that has superior application development capabilities which can
    offer the full range of tools needed to get an IoT application up and running
    in the shortest time possible. The platform should have solutions enabling developers
    to rapidly create, test, and deploy an IoT application or service. The platform
    should have prewritten applications that developers can use to speed up their
    development. These platforms typically should include software and devices, along
    with development and deployment solutions that make it easier to get an IoT application
    up and running. The benefit is that such platforms take care of the development,
    network configuration, and installation typically done by developers, which potentially
    saves a lot of time and development efforts.


    Choosing an IoT Platform with superior application development capabilities simplifies
    a lot of the complexity in the IoT use case realization by reducing the time needed
    to create an IoT solution or a product with lower cost of ownership.


    Another important aspect to validate when choosing an IoT platform is the capability
    of the platform to connect and integrate with other enterprise applications such
    as the ERP (enterprise resource planning) or MES (manufacturing execution systems)
    application. Manufacturing execution systems are computerized systems used in
    manufacturing to track and document the transformation of raw materials to finished
    goods. ERP is a system that automates business functions like production, sales
    quoting, and accounting.


    Application development capabilities in an IoT Platform impact the value realization.
    An IoT platform needs to be carefully chosen, keeping in mind the developer’s
    ease of using the platform to perform development. Apart from the ease of development
    and capability to integrate with other applications, scalability is very essential.
    As an example, the platform should be able to support developers in creating fixed
    applications, such as web-based applications as well as mobile or desktop applications.


    Choosing a platform with superior development capabilities reduces the time to
    market and risk of development. There are several matured IoT Platform vendors
    that provide valuable services that simplify the development of IoT applications.
    They have prebuilt models for popular devices like motion sensors and at the same
    time provide a platform for designing a custom module for a unique use case. Using
    these platforms, developers can easily connect different IoT devices and services,
    determine their interactions, and build IoT applications faster compared to traditional
    custom coding.


    So in summary, the three main application considerations when choosing a platform
    are:


    1. What applications are available out of the box?

    2. What is the application development environment like?

    3. What are the common enterprise application interfaces?


    Many platforms will include one or more applications that may be of value out
    of the box, like the stock market or weather apps that ship with iPhones. Sometimes,
    very simple applications are the most popular and effective. One manager in a
    store told us, “I’d be delighted to have an app that just tells me which units
    in my shop are switched on or off.”


    ## Scalability


    Scalability is another important feature which every enterprise needs to thoroughly
    validate while choosing an IoT Platform. In an IoT platform context, scalability
    comes majorly from three different perspectives.


    The first one is the ability of the IoT platform to onboard a magnitude of devices
    with different connectivity protocols, second is the ability of the IoT Platform
    to store massive amount of data, and third is the capability to perform massive
    analytics processes. All these three elements form the core to succeed in an IoT
    project.


    ### (Large-Scale) Device Onboarding Capabilities


    If an enterprise decides to perform device onboarding by an IoT Platform, it is
    essential that they choose a platform that is capable of onboarding as many devices
    as required, and the upper limit can be decided by the enterprise business and
    the industry they operate. As an example, Tesla had thousands of IoT devices in
    2004, but today it has more than one million devices in their units, and any company
    as big as Tesla will have similar number of devices. An IoT platform chosen for
    such industries should have the ability to scale and connect to millions of devices
    at once. In another example, a smart building may need thousands of small IoT
    devices such as smart bulbs to be onboarded on the IoT platform, whereas in a
    factory setting, many require a few hundreds of large IoT devices for their use
    cases.


    Many commercial-grade IoT Platforms today have the flexibility to onboard as many
    devices as necessary on their platform.


    Apart from the capability of onboarding multiple IoT devices on the platform,
    the ease of performing Device Management is a critical factor to be validated
    while choosing an IoT Platform.'
