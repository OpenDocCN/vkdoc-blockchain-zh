  trans: '

    # 产品组织


    产品组织旨在以更短的周期交付业务成果或业务价值，同时关注市场变化或企业内部变化，并立即适应这些变化。Forrester 将成果定义为可通过可衡量的结果加以验证的最终状态。^(²⁵)
    成果可能包括额外营收、更高的客户满意度、新客户获取等。


    成果示例如下：


    *到 2022 年 7 月，我们旨在通过为因购买产品耗时过长而感到沮丧的购物者提供更快捷、更透明的结账流程，将服装销售额提高 25%。*


    一旦我们定义了想要达成的成果，在短时间内可能难以全部实现，因此我们必须真正思考：哪些是最高优先级的价值，以及能在最短时间内交付的最小可行产品是什么，以便能发布到市场上验证该功能或产品的接受度。


    最高优先级价值与最小可行产品成果示例如下：


    *在未来三个月内，我们旨在通过为购物者增加快速结账选项，将儿童服装销售额提高 60%。这可以通过在自助服务亭安装物联网设备并支持非接触式支付选项来实现。*


    许多企业仍在以项目模式运作。从项目型组织转型为成果导向的产品型组织，是企业获得成功的必要条件。


    谈论业务成果以及从项目型组织转型为产品型组织很容易。但现实情况却大相径庭，尤其是对于许多已运营数十年的企业而言。


    当我们谈论从项目到产品的转变时，每个企业都面临四大阻碍：


    -   **IT 与业务和愿景脱节** —— 这意味着让 IT 和运营技术与业务协同工作，几乎是所有企业面临的最大障碍。

    -   **高管追踪的是活动而非业务成果** —— 这显然是因为企业中 IT 经理的成功与否，是由其完成任务的数量与计划相比来决定的。

    -   **项目资金机制存在缺陷** —— 这是大型企业面临的主要问题之一。项目仍按年度资金周期进行资助，通常周期为 12 到 18 个月。

    -   **业务部门认为 IT 在解决自身问题** —— 这是因为 IT 通常专注于提高开发人员生产力、减少缺陷、确保业务连续性等，而这些都无法直接交付业务成果。


    如今，大多数企业都希望从线性项目转向更多的产品和产品开发。当我谈及产品组织时，我记得一位首席信息官问我，像谷歌、亚马逊和微软这样的独角兽公司，规模如此庞大，是如何进行长期规划的。答案是这些公司从不做长期规划，它们的预算周期是
    3 到 6 个月。这意味着董事会每 3 到 6 个月就会根据市场需求聚集在一起分配预算，并以产品为中心的心态运作。


    要应对变化的市场或内部企业需求，采用 12 个月或 18 个月这样冗长的预算周期是极其困难的。如果有人试图在如此长的周期内取得成功，他们必须具备绝对的预测能力，以确定未来
    18 个月需要做什么，而没有人拥有这种能力。因此，企业注定会对结果感到失望。


    在产品组织中，企业会资助一个假设；这个假设被转化为原型，在市场上进行测试，一旦市场反应积极，就会进行进一步的改进，并在非常短的周期内将功能发布到市场。这个概念被称为“从假设到变现”。我们将在后续章节讨论“从假设到变现”及其对物联网用例的重要性。为了使“从假设到变现”的概念成为现实，业务和
    IT 需要协同工作，并共享业务成果这一共同目标。IT 需要开始与业务部门就业务成果进行对话，并使技术解决方案与这些业务成果保持一致。企业需要摆脱业务与 IT
    之间的合同关系，转向单一团队模式。单一团队模式是指 IT 和业务拥有相同的目标——这就是产品组织的全部内涵。


    这样的转型不可能在一两周或一两个月内完成；它需要时间，并且业务和 IT 团队都需要接受这种模式。在产品组织模式中，业务部门起主导作用，IT 团队与业务部门合作以实现业务成果。从技术角度来看，IT
    团队引入能够更快交付结果的方法。在物联网背景下，IT 团队是指 IT 和运营技术在一起组成的团队，也称为物联网团队。


    在物联网术语中，一个产品就是一个物联网用例。与普通的产品组织一样，物联网产品组织也具有可衡量的成果，能提供更快的业务结果、改善的客户体验、提升的效率、减少组织内部摩擦以及更高的灵活性。所有这些都能增加整个业务部门的信任度，因为每个物联网用例都有其自身的可衡量业务收益。以产品为中心的架构允许物联网团队与业务部门之间实现更好的互动和完全的所有权，因为来自业务方的产品负责人是端到端交付物联网用例团队的一部分。在基于产品的组织中，每项功能增强或新业务功能的可衡量成果，取决于新功能发布到市场的速度、新功能能够吸引多少新客户，以及为整体产品添加新功能后客户满意度是否得到提升。或者，如果开发物联网用例是为了提高运营效率，那么成果的衡量标准是产品为业务带来了多少收益，例如在制造业环境中减少机器停机时间或提高机器利用率，或在医疗保健环境中准确自动检测疾病。这种衡量方式与项目组织中的传统指标形成对比，在项目组织中，对于每项新业务功能的开发，团队是根据生产中的缺陷数量、资源质量等来衡量的。产品组织中的传统指标并未消失，而是被视为产品成功的次要衡量标准。

    '
- fmt: '# IoT Product Life Cycle with Product Mindset


    So far, we discussed about product organization. In an IoT world, enterprises
    will not be developing products, they will be developing IoT use cases. It is
    essential to think about IoT use case development with a product mindset rather
    than a project mindset. What this means is that the product life cycle needs to
    be followed for IoT use case development, and all principles of product development
    need to be applied. A product mindset means that IoT use cases are developed as
    similar to any new products. In an IoT world, products are replaced with IoT use
    cases.


    An IoT use case life cycle constitutes of five phases as similar to the product
    life cycle: introduction, growth, maturity, decline, and stabilization. This is
    depicted in Figure [12-2](#517610_1_En_12_Chapter.xhtml#Fig2).


    ![../images/517610_1_En_12_Chapter/517610_1_En_12_Fig2_HTML.jpg](images/517610_1_En_12_Chapter/517610_1_En_12_Fig2_HTML.jpg)


    Figure 12-2 IoT use case life cycle


    *   The first phase is the introduction phase. During this phase, an IoT use case
    is launched with minimal features. This is where IoT proofs of concepts are developed.
    The IoT use case is put into live, and users are encouraged to start measuring
    the benefits from the use case.


    *   After a period of time, the IoT use case starts demonstrating measurable benefits
    to the enterprise business, and then the use case enters the growth phase where
    new features are added. During the growth phase, users are delighted with more
    enriched functionalities that make the IoT use case more and more attractive.
    Depending on the use cases, IoT can either increase revenue for the enterprise
    or improve efficiency of the enterprise, such as making the manufacturing equipment
    reduce downtime or enable predictive maintenance for the equipment.


    *   In the maturity phase, new features that can bring value to the enterprise
    are added, but each feature is validated thoroughly from the benefit perspective.
    This is because, in this phase, sales or efficiency remains fairly constant, and
    therefore for every new feature that is added to the use case, there need to be
    measurable benefits.


    *   After a while, the IoT use case becomes business as usual. No additional features
    to the use case can bring further value to the enterprise. This is the decline
    phase where the IoT use case product team is ramped down to the bare minimum.


    *   The final stage is the stabilize phase where development is frozen for the
    use case, and only the operations team remains for the specific use case. The
    operations team manages the day-to-day operations of the use case, and any new
    enhancements to the use case are thoroughly validated from a cost-benefit perspective
    before being undertaken by the team.


    ## Hypothesis to Cash


    Introduction, growth, and maturity are the three phases where most IoT use case
    development and enhancement happens, and this is where the Hypothesis to Cash
    model is applied for each new feature that is added to a use case.


    The Hypothesis to Cash model has four phases as depicted in Figure [12-3](#517610_1_En_12_Chapter.xhtml#Fig3).
    It is mandatory that business, IT, and OT teams work together in all phases of
    the IoT use case development.


    ![../images/517610_1_En_12_Chapter/517610_1_En_12_Fig3_HTML.jpg](images/517610_1_En_12_Chapter/517610_1_En_12_Fig3_HTML.jpg)


    Figure 12-3 Hypothesis to Cash


    **Hypothesis** – This is a phase in which a new idea of a use case or an enhancement
    is brainstormed. A hypothesis in an IoT product organization is an idea (or more
    precisely a use case) that is proposed so that it can be tested to validate if
    it has a potential to generate value for the enterprise.


    **Funding** – This is a phase in which funding is approved based on the acceptance
    of the hypothesis.


    **Develop and test** – Once funding is approved, the idea is converted into a
    prototype (proof of concept). A prototype is an early sample, model, or release
    of an IoT use case built to test the hypothesis. The IoT use case needs to be
    built with reasonable functionality so that benefits can be validated.


    **Release to the production (and generate value)** – Once developed, the prototype
    is released into production to validate acceptance of the idea from users and
    associated benefits. Based on the benefits delivered, Hypothesis to Cash is applied
    to enhance the feature with full functionality.


    As you can see, an IoT use case has its own life cycle, and, with product thinking,
    an enterprise business can be broken down into multiple IoT use cases. A cumulation
    of all these use cases forms the enterprise operating model.


    ## Agile Software Development Methodology in IoT Use Case Development


    Project and product management has existed for decades, as have many different
    software development life cycle models. Over time, people developed what have
    become today’s standards, which are treated as the guiding principles in the IT
    industry. In the modern world, technical challenges and customer requirements
    have revolutionized the need for better life cycle models to keep pace with changing
    demands. Modern practices and principles differ from those of the past.


    Traditional software methodologies have lost their appeal almost a decade back
    due to limitations in their ability to accommodate changing needs and to control
    large, complex projects.


    Anyone who has been in the industry for a while and worked on a large development
    project has probably experienced the “big design up front” (BDUF) approach to
    software development, which is highly risky because it does not support change.
    Most people are unable to describe exactly how the entire system should behave
    up front. More often than not, the business thinks they have got it right at first,
    but begin to change their minds as more analysis is performed and they get closer
    to the details. While traditional methodologies have worked for some organizations
    in the past, and may still work in some circumstances, for many organizations
    they only add to the frustration caused by unmanageable changing requirements,
    ultimately leading to unpredictable project outcomes.


    The current and rapidly changing environment imposes constraints on quality, time,
    and costs, as well as legal, cultural, and logical parameters. In addition, several
    principles are being modernized to keep pace with the industry. Agile is one such
    methodology which has moved from the so-called “emerging methodology” to the mainstream
    “development methodology,” especially in product developments. This is providing
    value to the customer by providing better transparency, better requirements trade-offs,
    faster time to market, reduced defects, and enabling the building of a mature,
    quality product.


    Agile is a software development methodology in which systems are built in increments,
    where requirements and solutions evolve through a collaboration between cross-functional
    teams and over a period of time. Agile methods generally promote a lightweight
    product management process that includes frequent monitoring and adapting to changes
    quickly that encourages teamwork, self-organizing, and self-accountability. In
    addition, there is a set of good practices that allows for rapid delivery of high-quality
    products, as well as a business approach that aligns development with business
    needs and the organization’s goals. Scrum is one such Agile methodology where
    software is built in smaller increments called sprints. A sprint is a short, timeboxed
    period when a scrum team works to complete a set amount of work. Sprints are at
    the very heart of Scrum and Agile methodologies. A combination of multiple sprints
    is called a release.'
