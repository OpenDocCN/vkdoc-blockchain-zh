  trans: '

    # 概述


    在本章中，我们讨论了三种类型的设备，分别称为：小型设备（即简单的支持互联网的设备）、大型设备（如重型机械）以及复杂设备（即不支持互联网的设备）。


    -   小型设备，也称为第一类设备，是指能够连接互联网的物件，例如带有小型传感器的设备。

    -   大型设备可能是重型机械或工业物联网连接的汽车等。这些设备拥有充足的电力供应、良好的互联网连接性，并且在大多数情况下能够连接到互联网。

    -   复杂设备虽然被称为物联网设备，但并非真正的物联网设备，因为它们不具备“物联网”中的“互联网”部分。


    接着，我们讨论了这些设备使用的不同通信协议，并提供了关于如何根据需要与物联网生态系统连接的设备来选择合适的智能物联网网关的指南。


    在下一章中，我们将讨论智能物联网网关，这是一种将多种设备（使用不同协议）连接到物联网生态系统的系统。


    # 6. 智能物联网网关


    实施物联网的组织正日益关注利用技术带来的业务成果，物联网计划不再仅仅是为了内部运营改进而驱动。IT 部门和业务利益相关者正在合作，将物联网项目与提升收入和改善客户体验的业务成果相结合。但由于遗留系统和方法的限制，他们正面临挑战。遗留系统不会消失，这是一个事实，但有一些赋能因素正在帮助企业克服这些挑战——智能物联网网关就是这样的一个赋能因素。


    技术分析公司 IDC 预测，到 2025 年，总共将有 416 亿个连接的物联网设备，即“物”。它还指出，工业和汽车设备代表了连接“物”的最大机遇，但同时也预见短期内智能家居和可穿戴设备将被广泛采用。另一家技术分析公司
    Gartner^(¹⁶)预测，今年企业和汽车领域将拥有 58 亿台设备，比 2019 年增长近四分之一。随着智能电表的推广，公用事业将成为物联网的最大用户。以入侵探测和网络摄像头形式存在的安防设备，将成为物联网设备的第二大用例。楼宇自动化（如智能照明）将是增长最快的领域，其次是汽车（联网汽车）和医疗保健（慢性病监测）。这清楚表明，尽管企业面临诸多挑战，但物联网将成为企业开展业务的未来，物联网成熟度高的组织在其物联网采用过程中将取得更高的成功率。


    物联网的核心在于让个人和企业的工作与生活更轻松、更可信赖——它可能涉及使用家庭安防设备保护住宅，或自动切换大型建筑内的空调和供暖系统，也可能涉及预测性维护以减少工厂停机时间。在采矿业，物联网可以帮助避免每月派遣技术人员乘坐卡车或直升机去检查设备是否运行正常。借助物联网，企业可以预测设备故障周期，当设备预计在未来一两周内发生故障、真正需要维护时，技术人员可及时到达采矿点。这不仅为企业节省了成本，而且使他们能够变得更加高效。


    在物联网世界中，有两个部门需要协同合作，而传统和文化上它们迄今并未过多共事——即信息技术（IT）部门和运营技术（OT）部门。典型的 IT 部门考核指标是系统正常运行时间、应用程序和
    IT 基础设施的可用性、安全漏洞数量以及 IT 成本降低。另一方面，OT 部门由工厂经理、生产经理甚至农业种植者组成。他们是生产食物、控制油气流程、从地下抽取石油，或负责维护公司卡车车队的人。OT
    部门的考核标准则完全不同，例如作物产量、创造该产量所消耗的水量、工厂的生产运行时间、如何为数百辆卡车的车队节省燃料、如何提高驾驶员的安全性、如何阻止人们从卡车或仓库中偷窃物品等等。


    IT 和 OT 部门是两个不同的世界，每个部门的成功衡量标准差异巨大。随着物联网的到来，这两个部门必须走到一起，这正是连接人与连接物同等重要的地方。在物联网世界中，IT
    和 OT 绝对必须共同协作才能开展这些项目，然后企业还需要引入支持职能部门，如财务、营销和销售部门。所有这些部门合力才能打造出最佳的物联网解决方案。这是企业在踏上企业级物联网之旅前需要解决的众多关键方面之一。


    几年前，当物联网的讨论刚刚兴起时，专家们通常会解释物联网的基础知识及其相关益处。另一方面，一些企业的 IT 和 OT 人员是初次会面。时至今日，在物联网讨论中需要从头解释基础知识的情况已经非常罕见；其次，我们看到
    IT 和 OT 团队之间的协同效应越来越多。


    然而，障碍依然存在，企业在踏上物联网之旅时仍面临诸多挑战。在企业级物联网实施中，企业需要应对的六大挑战如图 6-1^(¹⁷) 所示。


    ![../images/517610_1_En_6_Chapter/517610_1_En_6_Fig1_HTML.jpg](img/517610_1_En_6_Fig1_HTML.jpg)


    图 6-1


    物联网面临的挑战


    ## 安全性


    在物联网背景下，每个企业始终优先考虑的首要挑战就是安全性。作为物联网实施的一部分，企业正将原本并非为互联网通信设计的机器和传感器等设备暴露在互联网上，因此在设计这些设备时从未考虑过网络安全问题。我们正试图让运营技术领域中的每一个设备都能通过互联网访问，这意味着我们极大地拓宽了攻击面。尽管在这方面已做了很多工作，但安全性仍然是第一大挑战。我们将在第
    8 章详细讨论安全性以及如何解决这个问题。


    ## IT-OT 团队整合


    第二大挑战是让 IT 和 OT 员工协同合作，以实现物联网愿景。尽管这两个团队最近开始走到一起，但确保该团队完全围绕一个共同目标——使物联网用例取得成功——对企业来说至关重要。我们将在第
    13 章讨论物联网核心团队，并尝试解决这一挑战。

    '
- fmt: '# Data Volume and Analytics


    The third major barrier is the data volume and analytics complexity. The surge
    of IoT data comes with a lot of economic value, estimated at around $11 trillion
    by 2025. But it also comes with some significant challenges due to huge volumes
    of data, which make data aggregation and data analytics complex. This leads to
    difficulties in quickly and easily extracting strategic value from IoT use cases.


    The primary challenge of IoT data is its real-time nature. According to IDC^([^(18)](#fn18)),
    by 2025, 30% of all data will be real time, with IoT accounting for nearly 95%
    of it, 20% of all data will be critical, and 10% of all data will be hypercritical.
    Analytics will have to happen in real time for companies to benefit from these
    types of data. Though it is clear that IoT generates an enormous amount of data,
    this is not the main challenge. The key issue is that not many enterprises have
    a data-driven culture – what this means is that enterprises have still not created
    a mature process to manage big data in their enterprise. The challenge is not
    about the data volumes, but it is more about where do I get the data, how I stitch
    the data together to make meaningful insights, how do I manage and maintain this
    data, and how do I do this in the most appropriate way. Chapter `11` will discuss
    about the big data platform that will help ensure that the right platform and
    tools are chosen to manage and govern data meaningfully.


    # Lack of Standard Communication (Data) Protocols


    The fourth challenge comes from the fact that there are enormous legacy devices
    within an enterprise, and each device has its own protocols that make communication
    between the different layers of an IoT Standards Reference Model very difficult.
    We will discuss in subsequent chapters how IoT Gateways can solve this challenge.


    # Diversity of Products and Platforms


    The fifth major challenge is the diversified products and platforms that form
    the complete IoT ecosystem. If any vendor or service provider says that they can
    deploy an end-to-end IoT solution without requiring any partner ecosystem, then
    there is something fundamentally wrong with their solution. An IoT solution requires
    a huge ecosystem starting from device vendors to IoT Gateway manufacturers to
    IoT Cloud providers that makes the complete solution, and enterprises need to
    look at the best-of-breed solution in each of these areas that can make the whole
    solution cost-effective and efficient.


    # Return on Investment


    The final challenge that is coming up lately is on return on investments. The
    discussion in an IoT context within an enterprise has moved away from an IT level
    (Chief Information Officer level) to a finance level (Chief Financial Officer
    level), and there are clear asks from the CFO on the return on investments for
    an IoT implementation, which needs to be clearly thought of and articulated. After
    all, IoT will require the CAPEX investment followed by the OPEX investment.


    Capital expenditures (CAPEX) are long-term expenses, while operating expenses
    (OPEX) are a company''s day-to-day expenses. CAPEX typically are costs required
    at the start of any project, while in OPEX costs are spread across the project
    duration.


    A data center is a building, a dedicated space within a building, or a group of
    buildings used to house computer systems and associated components within the
    enterprise premises. It is a network of computing and storage resources connected
    using local networks, enabling the delivery of shared software applications and
    data.


    A cloud data service (referred to as a cloud service or cloud) is a remote version
    of a data center, located somewhere away from your company''s physical premises,
    that lets enterprises access their data through the Internet. A data center traditionally
    refers to server hardware on your premises to store and access data through your
    local network.


    Each of the challenges discussed earlier needs to be analyzed carefully while
    an enterprise embarks on their IoT journey. Apart from these challenges, enterprises
    need to understand that there is no single architecture that they can use as a
    guide toward an IoT implementation. Enterprises need to tailor their IoT architecture
    based on who they are (i.e., the industry they are in), what they do (i.e., manufacture
    products, create medicines, or sell groceries), what and how they are trying to
    connect things, and all these are massive dependencies that determine an IoT architecture.


    There are multiple devices which enterprises need to connect in an IoT ecosystem,
    and these are devices which they do not manufacture. But if you look at the diversity
    of these devices on the field, one can easily understand these are devices that
    communicate using multiple different protocols, leading to a very complex IoT
    ecosystem. Most of the challenges we discussed so far can be addressed by bringing
    in a (Smart) IoT Gateway into the IoT Standards Reference Model.'
