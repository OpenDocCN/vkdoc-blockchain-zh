  trans: '

    # 选定业务战略后下一步做什么


    选定业务战略后，下一步是识别企业当前影响该战略的核心业务流程。这些业务流程中的潜在问题与机遇，决定了业务流程所需的转型路径。`IoT` 并非解决所有业务问题或机遇的唯一方案。在许多情况下，需要将
    `IoT` 与其他技术方案结合，才能应对业务问题或机遇。


    图 3-1 展示了业务转型（BT）模型的两个象限。每个业务流程被划分为`IT 区`或`IoT 区`，随后识别其中的问题与机遇。


    **问题**是指业务流程中需要解决或克服的差距或低效环节。问题可能当前已影响业务流程，也可能在未来产生影响，并可能阻碍业务流程高效运作以实现预期目标。在某些情况下，问题甚至威胁企业的长期生存。


    **机遇**是指能够提升业务流程效率的改进点，有助于实现增加利润、降低成本、提升客户体验或加速创新等业务目标。^(⁷)


    ![../images/517610_1_En_3_Chapter/517610_1_En_3_Fig1_HTML.jpg](img/517610_1_En_3_Fig1_HTML.jpg)


    **图 3-1** — 业务转型模型的双象限


    对于无需借助 `IoT` 解决已识别问题与机遇的核心业务流程，将其归入`IT 区`。


    举例来说，Mart A 是一家经营连锁大卖场、折扣百货商店和杂货店的零售企业。其两大核心 IT 业务流程如下：


    - 业务流程 1 – 通过 Web 应用从电子商务系统下订单

    - 业务流程 2 – 处理订单信息


    在业务流程 1 中识别出一个机遇：开发新渠道（如移动端）以增强客户互动。目前客户仅能通过 Web 渠道下单。


    在业务流程 2 中发现一个问题：完成一笔订单需要过多人工干预。这是因为多个应用程序采用不同技术构建，彼此无法集成。简而言之，一个应用的输出需手动输入其他应用才能完成订单处理流程。


    业务流程 1 和 2 识别的问题与机遇无需 `IoT` 即可解决，因此归入`IT 区`。换句话说，这些业务流程中的问题与机遇可通过信息技术或纯 IT 方案解决，因此不被视为
    `IoT` 路线图的一部分。


    与选定业务战略一致且需利用 `IoT` 解决问题与机遇的核心业务流程，则归入`IoT 区`。


    以下通过案例说明。一家大型车队管理公司委托我们为其制定数字化转型路线图。该公司将业务转型与业务生产力提升作为核心战略。其中一个需要转型的核心业务流程是“以最优成本准时交付优质产品”。该公司的业务是为沃尔玛、奥乐齐等美国零售店配送生鲜杂货。该流程描述的是：货物从生产商仓库运至零售店，货车配备柴油冷藏机组以保持产品新鲜。该一级流程进一步分解为以下用例：


    - 追踪货物从出发地到目的地的运输时间与路线（UC1）

    - 监控冷藏设备以保持产品新鲜（UC2）

    - 追踪并管理全程燃油消耗（UC3）

    - 管理货车运营（UC4）等……


    每个用例中识别出问题（P）与机遇（O），部分列举如下：


    - 用例 2 中的问题（P-UC2）——驾驶员需定期检查并控制冷藏设备温度。曾因冷藏设备管理不当导致产品变质。

    - P-UC3 与 P-UC4 ——胎压不足及发动机故障导致燃油消耗额外增加 5%至 20%，并推高了货车的维护成本。

    - P-UC4 ——缺乏有效的货车追踪与定位机制。


    针对这些用例的问题与机遇，确定了相应的 `IoT` 解决方案。以下是为各用例问题与机遇定义的高级 `IoT` 解决方案：


    - 安装温度传感器监控冷藏设备（如各隔间温度），通过中央平台远程监控与控制，无需驾驶员手动操作。这将解决产品新鲜度问题。

    - 在发动机和轮胎层级安装传感器，监控发动机与轮胎状态以提高燃油效率及货车投资回报率。

    - 部署追踪与定位 `IoT` 方案以优化物流运营。


    以上是一个简单案例，展示了如何基于业务流程中识别的问题与机遇，通过 `IoT` 用例实现业务战略。

    '
- fmt: '### The IoT Use Case Reference Model (IoT UCR Model)


    As a best practice, it is essential to implement IoT solutions for a use case
    based on the impact it delivers to the enterprise. A model called the IoT Use
    Case Reference (UCR) Model is defined as depicted in Figure [3-2](#517610_1_En_3_Chapter.xhtml#Fig2)
    to enable enterprises to make the right prioritization of implementing an IoT
    solution.


    After use cases are identified for each of the business processes, each of these
    use cases is assessed from a complexity and impact perspective and plotted in
    one of the four quadrants of the IoT UCR Model.^([⁸](#fn8))


    ![../images/517610_1_En_3_Chapter/517610_1_En_3_Fig2_HTML.jpg](images/517610_1_En_3_Chapter/517610_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** IoT Use Case Reference Model


    Use cases which have high impact on the business strategy with low implementation
    cost and complexity are placed in the **Hot zone**. These are use cases that can
    be implemented for faster business results and are ideal candidates for pilots.
    My advice for young enterprises (less than 15 years in business) is to first implement
    use cases in the **Hot zone** to gain faster business and board confidence on
    the success that IoT can generate to their business. Use cases which have high
    impact on the business strategy but come with high implementation cost and complexity
    are placed in the **Warm zone**. For large or legacy enterprises, a combination
    of use cases in **Hot** and **Warm zones** is recommended for implementation to
    gain business and board confidence on the success of IoT to their business. This
    is because for large enterprises, there will be very limited use cases that can
    fit into the **Hot zone**.


    Many companies become frustrated when they do not see early signs of transformative
    impact from an IoT pilot. We all need to understand that a single use case just
    would not prove the benefits of IoT. It has to be implemented at scale both in
    terms of the number of use cases and the breadth to demonstrate the impact. More
    widespread implementation of IoT use cases forces a cultural shift and provides
    new perspectives to the board and business on the benefits of IoT. In a ripple
    effect, this momentum often also exposes weakness in technology along with gaps
    in talent, both in terms of in-house IoT skill levels and the numbers of experts
    needed to implement IoT at scale. The “go big” approach may seem counterintuitive,
    particularly among enterprises that have fewer resources to deploy and feel more
    comfortable focusing on a small number of use cases. While a smaller scale may
    be good for very early days, there is a clear learning curve that companies achieve
    as they add use cases, and the sooner the learnings are achieved, the better it
    is for the enterprise. I have personally experienced that a greater number of
    use cases correlate with economic success regardless of the use case or type of
    company.


    As soon as leaders are able to appreciate the benefits that IoT can bring to their
    enterprise, the next set of use cases that form part of the **Warm zone** will
    prove the worth of IoT if implemented at scale. As discussed, use cases that are
    complex but at the same time have high impact to achieve the business objective
    are placed in the **Warm zone**. Complexity may be complemented with an increasing
    cost, but at the same time these are use cases that have much higher impact on
    the business strategy.


    At one of the large manufacturing companies, it was a cherishing moment that the
    board level executives supported me when I realized and told them that the IoT
    deployment strategy which we originally designed is not bold enough. We initially
    decided to deploy IoT with six use cases (called minimum viable products or MVPs
    in this organization) from the **Hot zone**, but soon I realized that this narrow
    focus will not improve performance as much as expected, neither will we be able
    to achieve the outcomes that the board will appreciate. A few leaders from across
    the enterprise pushed against voices of caution and expanded the number of MVPs
    to 15, and we went to an extent to select a few MVPs from the **Warm zone**. Executives
    also found that giving managers a larger number of IoT use cases to oversee focused
    their attention on creating a bias to make IoT a success. That momentum built
    on itself as the company’s best talent wanted to be part of the innovative push
    using IoT. A strong base of 21 IoT scrum teams was formed for these 15 MVPs which
    helped loosen bureaucratic decision-making rules. Finally, unexpected efficiencies
    turned up as engineers were able to reuse similar data architectures for multiple
    MVPs and found numerous synergies with each other. At the end, such an aggressive
    IoT use case strategy produced new revenue streams as well as improved the business
    process efficiencies between 60% and 80% and reduced costs between 28% and 67%
    for the specific business processes that these 15 MVPs were part of.


    The **Cold zone** is a zone where low impact and low complex use cases are placed.
    Enterprises typically choose uses cases from this zone for implementation once
    they have implemented all use cases within the **Hot zone** and the **Warm zone**.
    Some use cases that have dependencies on use cases from the **Hot** and **Warm
    zones** are also placed in this zone which are called the use case subsets. With
    a combination of the use cases in the **Hot** and **Warm zones**, the use case
    subsets (i.e., dependent use case) in the **Cold zone** can generate additional
    value to enterprises.


    Use cases which deliver minimum value but carry high complexity are placed in
    the **Parking zone**, and these are the ones which are not candidates for IoT
    implementations.


    ### Applying IoT Treatments on Use Cases


    Using the IoT UCR Model, we have identified use cases that form part of the IoT
    journey by categorizing them into the IoT Zone. IoT Standards recommends two types
    of treatments to the use cases that are placed in the IoT Zone. The first treatment
    is called the “Heterogeneous IoT Transform,” and the second is the “Homogeneous
    IoT Transform.”'
  raw: '### The IoT Use Case Reference Model (IoT UCR Model)


    As a best practice, it is essential to implement IoT solutions for a use case
    based on the impact it delivers to the enterprise. A model called the IoT Use
    Case Reference (UCR) Model is defined as depicted in Figure [3-2](#517610_1_En_3_Chapter.xhtml#Fig2)
    to enable enterprises to make the right prioritization of implementing an IoT
    solution.


    After use cases are identified for each of the business processes, each of these
    use cases is assessed from a complexity and impact perspective and plotted in
    one of the four quadrants of the IoT UCR Model.^([⁸](#fn8))


    ![../images/517610_1_En_3_Chapter/517610_1_En_3_Fig2_HTML.jpg](images/517610_1_En_3_Chapter/517610_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    IoT Use Case Reference Model


    Use cases which have high impact on the business strategy with low implementation
    cost and complexity are placed in the Hot zone. These are use cases that can be
    implemented for faster business results and are ideal candidates for pilots. My
    advice for young enterprises (less than 15 years in business) is to first implement
    use cases in the Hot zone to gain faster business and board confidence on the
    success that IoT can generate to their business. Use cases which have high impact
    on the business strategy but come with high implementation cost and complexity
    are placed in the Warm zone. For large or legacy enterprises, a combination of
    use cases in Hot and Warm zones is recommended for implementation to gain business
    and board confidence on the success of IoT to their business. This is because
    for large enterprises, there will be very limited use cases that can fit into
    the Hot zone.


    Many companies become frustrated when they do not see early signs of transformative
    impact from an IoT pilot. We all need to understand that a single use case just
    would not prove the benefits of IoT. It has to be implemented at scale both in
    terms of the number of use cases and the breadth to demonstrate the impact. More
    widespread implementation of IoT use cases forces a cultural shift and provides
    new perspectives to the board and business on the benefits of IoT. In a ripple
    effect, this momentum often also exposes weakness in technology along with gaps
    in talent, both in terms of in-house IoT skill levels and the numbers of experts
    needed to implement IoT at scale. The “go big” approach may seem counterintuitive,
    particularly among enterprises that have fewer resources to deploy and feel more
    comfortable focusing on a small number of use cases. While a smaller scale may
    be good for very early days, there is a clear learning curve that companies achieve
    as they add use cases, and the sooner the learnings are achieved, the better it
    is for the enterprise. I have personally experienced that a greater number of
    use cases correlate with economic success regardless of the use case or type of
    company.


    As soon as leaders are able to appreciate the benefits that IoT can bring to their
    enterprise, the next set of use cases that form part of the Warm zone will prove
    the worth of IoT if implemented at scale. As discussed, use cases that are complex
    but at the same time have high impact to achieve the business objective are placed
    in the Warm zone. Complexity may be complemented with an increasing cost, but
    at the same time these are use cases that have much higher impact on the business
    strategy.


    At one of the large manufacturing companies, it was a cherishing moment that the
    board level executives supported me when I realized and told them that the IoT
    deployment strategy which we originally designed is not bold enough. We initially
    decided to deploy IoT with six use cases (called minimum viable products or MVPs
    in this organization) from the Hot zone, but soon I realized that this narrow
    focus will not improve performance as much as expected, neither will we be able
    to achieve the outcomes that the board will appreciate. A few leaders from across
    the enterprise pushed against voices of caution and expanded the number of MVPs
    to 15, and we went to an extent to select a few MVPs from the Warm zone. Executives
    also found that giving managers a larger number of IoT use cases to oversee focused
    their attention on creating a bias to make IoT a success. That momentum built
    on itself as the company’s best talent wanted to be part of the innovative push
    using IoT. A strong base of 21 IoT scrum teams was formed for these 15 MVPs which
    helped loosen bureaucratic decision-making rules. Finally, unexpected efficiencies
    turned up as engineers were able to reuse similar data architectures for multiple
    MVPs and found numerous synergies with each other. At the end, such an aggressive
    IoT use case strategy produced new revenue streams as well as improved the business
    process efficiencies between 60% and 80% and reduced costs between 28% and 67%
    for the specific business processes that these 15 MVPs were part of.


    The Cold zone is a zone where low impact and low complex use cases are placed.
    Enterprises typically choose uses cases from this zone for implementation once
    they have implemented all use cases within the Hot zone and the Warm zone. Some
    use cases that have dependencies on use cases from the Hot and Warm zones are
    also placed in this zone which are called the use case subsets. With a combination
    of the use cases in the Hot and Warm zones, the use case subsets (i.e., dependent
    use case) in the Cold zone can generate additional value to enterprises.


    Use cases which deliver minimum value but carry high complexity are placed in
    the Parking zone, and these are the ones which are not candidates for IoT implementations.


    ### Applying IoT Treatments on Use Cases


    Using the IoT UCR Model, we have identified use cases that form part of the IoT
    journey by categorizing them into the IoT Zone. IoT Standards recommends two types
    of treatments to the use cases that are placed in the IoT Zone. The first treatment
    is called the “Heterogeneous IoT Transform,” and the second is the “Homogeneous
    IoT Transform.”'
  trans: '

    ### 物联网用例参考模型（IoT UCR 模型）


    作为最佳实践，根据用例为企业带来的影响来实施物联网解决方案至关重要。图 3-2 中定义了一种名为物联网用例参考（UCR）模型的模型，旨在帮助企业正确确定实施物联网解决方案的优先顺序。


    在确定了每个业务流程的用例之后，每个用例都将从复杂性和影响的角度进行评估，并划分到物联网 UCR 模型的四个象限之一。^(⁸)


    ![../images/517610_1_En_3_Chapter/517610_1_En_3_Fig2_HTML.jpg](img/517610_1_En_3_Fig2_HTML.jpg)


    **图 3-2** 物联网用例参考模型


    那些对业务战略影响大但实施成本和复杂性低的用例被置于**热点区域**。这些用例可以快速实施以取得业务成果，是试点项目的理想候选。我对年轻企业（成立少于 15
    年）的建议是，首先实施**热点区域**中的用例，以更快地获得业务和董事会对物联网能为企业带来成功的信心。那些对业务战略影响大但实施成本和复杂性高的用例被置于**温点区域**。对于大型或传统企业，建议结合实施**热点区域**和**温点区域**的用例，以赢得业务和董事会对物联网在业务中取得成功的信心。这是因为对于大型企业而言，能够适合**热点区域**的用例非常有限。


    许多公司在未能从物联网试点项目中看到变革性影响的早期迹象时感到沮丧。我们都需要明白，单个用例无法证明物联网的益处。它必须在用例数量和广度上实现规模化，才能展示其影响。更广泛地实施物联网用例会推动文化转变，并为董事会和业务部门提供关于物联网益处的新视角。这种势头如同涟漪效应，通常还会暴露技术弱点以及人才缺口，包括内部物联网技能水平和实施大规模物联网所需的专家数量。“做大做强”的方法可能看似违反直觉，尤其是在那些资源部署较少、更专注于少量用例的企业中。虽然小规模在早期阶段可能不错，但随着公司增加用例，会存在一个清晰的学习曲线，而公司越早完成学习，对其越有利。我个人经验表明，无论用例类型或公司类型如何，更多的用例数量与经济成功呈正相关。


    一旦领导者能够认识到物联网能为企业带来的益处，作为**温点区域**一部分的下一组用例，如果能够规模化实施，将证明物联网的价值。如前所述，那些复杂但对实现业务目标具有高影响力的用例被置于**温点区域**。复杂性可能伴随着成本的增加，但同时，这些用例对业务战略的影响要大得多。


    在一家大型制造公司，我向董事会级别的执行人员意识到并告诉他们，我们最初设计的物联网部署策略不够大胆，这得到了他们的支持，那是一个令人欣慰的时刻。我们最初决定从**热点区域**部署包含六个用例（在此组织中称为最小可行产品或
    MVP）的物联网，但我很快意识到，这种狭隘的关注点不会像预期那样提高绩效，也无法取得能获得董事会认可的结果。公司内部的一些领导者顶住了谨慎的声音，将 MVP
    数量扩大到 15 个，并且我们甚至从**温点区域**挑选了几个 MVP。执行人员还发现，让管理者监督更多的物联网用例，会促使他们将注意力集中在创造使物联网成功的偏向上。这种势头不断自我强化，因为公司最优秀的人才都希望成为利用物联网进行创新推动的一部分。为了这
    15 个 MVP，我们组建了强大的 21 个物联网 Scrum 团队基础，这有助于打破官僚式的决策规则。最后，意想不到的效率出现了，工程师们能够为多个 MVP
    重用相似的数据架构，并发现了彼此之间的众多协同效应。最终，这种激进的物联网用例策略不仅带来了新的收入流，还使这 15 个 MVP 所涉及的具体业务流程效率提高了
    60% 到 80%，成本降低了 28% 到 67%。


    **冷点区域**是放置低影响和低复杂度用例的区域。企业通常在实施完**热点区域**和**温点区域**中的所有用例后，才会选择该区域的用例进行实施。一些依赖于**热点区域**和**温点区域**用例的用例也会被放置在此区域，这些被称为用例子集。通过结合**热点区域**和**温点区域**的用例，**冷点区域**中的用例子集（即依赖性用例）可以为企业创造额外价值。


    提供最低价值但具有高复杂性的用例被置于**搁置区域**，这些用例不适合进行物联网实施。


    ### 对用例应用物联网处理方式


    利用物联网 UCR 模型，我们通过将用例分类到不同的物联网区域，确定了构成物联网旅程的组成部分。物联网标准推荐对放置在物联网区域中的用例采取两种处理方式。第一种处理方式称为“异构物联网转型”，第二种称为“同构物联网转型”。

