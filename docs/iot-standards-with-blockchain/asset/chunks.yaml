  raw: '### The IT-OT Integration


    Until today, OT has very limited integration with the IT. The reason behind this
    is that OT is all about machinery, safety of people, and the creation of products.
    Today, more and more organizations are embracing IoT technologies such as smart
    meters and self-monitoring transformers. We are also seeing production lines and
    farm equipment outfitted with sensors.


    The rise of these new technologies has created a need for organizations to optimize
    how machines, applications, and infrastructure collect, transmit, and process
    data. Done right, IT-OT convergence gives businesses the ability to fix critical
    issues faster, make informed business decisions, and scale processes across both
    physical and virtual systems. Figure [1-2](#517610_1_En_1_Chapter.xhtml#Fig2)
    depicts a simple block diagram on how an IoT ecosystem works.


    ![../images/517610_1_En_1_Chapter/517610_1_En_1_Fig2_HTML.jpg](images/517610_1_En_1_Chapter/517610_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    IT-OT integration reference diagram


    The first two blocks are the Information Technology layers where enterprise resource
    planning suites sit, such as customer relationship management and sales applications.
    Data from these tools and software is routed to the data and reporting layer for
    reporting purposes. The bottom two layers are the Operational Technology layers.
    The monitoring and control equipment (MCE) layer is where the actual production
    of goods or processing takes place. This is where, as an example, cars are manufactured
    or mining occurs, and all these are controlled and monitored by supervisory control
    and data acquisition (SCADA) systems. SCADA is a system of software and hardware
    elements that allows industrial organizations to


    *   Control industrial processes locally or at remote locations


    *   Monitor, gather, and process real-time data


    *   Directly interact with devices such as sensors, valves, pumps, motors, and
    more through human-machine interface (HMI) software


    *   Record events into a log file


    Along with SCADA, product life cycle management tools form part of the MCE layer.
    Product life cycle management (PLM) refers to the management of data and processes
    used in the design, engineering, manufacturing, sales, and service of a product
    across its entire life cycle and across the supply chain.


    As part of IoT, all four layers integrate with each other, thereby enabling a
    seamless data and information exchange between IT and OT.


    ## The Triple Challenges in IoT


    There are several reasons why IoT projects fail, one of them is lack of a business
    strategy toward IoT project implementation. Another reason is the lack of a well-thought
    approach toward security and interoperability. Though there had been a lot of
    efforts made since the last few years to address these three challenges for IoT,
    a point to be noted is that we are still far away from perfection in these areas.


    ### Business Strategy


    Several enterprises have embarked in their IoT journey by identifying IoT use
    cases and choosing a technology to implement those use cases. Such piecemeal IoT
    implementations are a definite path to failure. An IoT implementation is not a
    technology initiative. It is a business initiative that is achieved using technology.
    A business initiative is derived using a business strategy.


    ### IoT Security


    IoT means integrating IT and OT which is an emerging trend in the IT industry
    and is becoming more popular each and every day. Over the next few years, IoT
    is going to become the standard for everyone. Security and privacy are however
    the biggest challenges being faced today as IoT deals with a lot of devices and
    sensors that collect a lot of personal data about people and enterprises which
    is then passed to the IT systems. As an example, a smart meter knows when a person
    is home and what electronics individuals are using and when. All this information
    is shared with other devices and held in databases by companies. Some experts
    argue that not enough is being done to build security and privacy into the IoT
    ecosystem at these early stages. To prove their point further, some have even
    hacked a host of devices, from [connected baby monitors](https://www.yahoo.com/parenting/nanny-freaks-as-baby-monitor-is-hacked-109405425022.html)
    to [automated lighting](http://www.bbc.co.uk/news/technology-28208905) and [smart
    fridges](http://www.theguardian.com/technology/2014/jan/21/fridge-spam-security-phishing-campaign),
    as well as citywide systems such as traffic signals.


    A research in 2018 shows that 55% of IT professionals list security in an IoT
    world as their top priority. This is according to a survey conducted by 451 Research.^([³](#fn3))
    From corporate servers to cloud storage, cybercriminals are finding ways to exploit
    information at many points within an IT-OT ecosystem. As of 2021, many of the
    security challenges mentioned by these IT professionals have been addressed, but
    still there is a long way to go.


    Definition


    ***Critical infrastructure*** *is the body of systems, networks, and assets that
    are so essential that their continued operation is required to ensure the security
    of a given enterprise, its economy, and employee’s health and/or safety.*


    The interesting part is that hackers have not spent much time or effort so far
    in hacking OT devices since there are not many enterprises or people who are using
    IoT fully, and hence it is not worth the effort for them. This is however going
    to be a new area of focus for cybercriminals as enterprises start utilizing IoT
    in their day-to-day business. Security is one of the most important elements that
    needs to be addressed in an IoT implementation. The good news is that there are
    several mature practices that have been developed in this area. We are going to
    discuss about these in greater detail in subsequent chapters.'
  trans: '

    ### 信息技术与运营技术融合


    时至今日，`OT`（运营技术）与`IT`（信息技术）的集成程度依然非常有限。其根本原因在于，`OT`主要关注机械、人员安全以及产品制造。如今，越来越多的组织开始采用物联网技术，例如智能电表和自监控变压器。我们也看到生产线和农业设备都配备了传感器。


    这些新技术的兴起，使得组织需要优化机器、应用程序和基础设施收集、传输及处理数据的方式。如果实施得当，IT-OT 融合将使企业能够更快地解决关键问题，做出明智的商业决策，并在物理和虚拟系统中扩展流程。图
    1-2 描绘了一个物联网生态系统如何工作的简单框图。


    ![../images/517610_1_En_1_Chapter/517610_1_En_1_Fig2_HTML.jpg](img/517610_1_En_1_Fig2_HTML.jpg)


    图 1-2


    IT-OT 融合参考图


    前两个模块是信息技术层，企业资源规划套件（如客户关系管理和销售应用程序）位于此处。来自这些工具和软件的数据被路由到数据与报告层，用于报告目的。底部两层是运营技术层。在监控与控制设备（`MCE`）层，实际的产品生产或加工过程发生。例如，汽车制造或采矿作业就在此进行，所有这些过程都由监控与数据采集（`SCADA`）系统控制。`SCADA`是一个由软件和硬件元素组成的系统，它允许工业组织：


    -   在本地或远程地点控制工业流程

    -   监控、收集和处理实时数据

    -   通过人机界面（`HMI`）软件直接与传感器、阀门、泵、电机等设备交互

    -   将事件记录到日志文件中


    与`SCADA`一起，产品生命周期管理工具也是`MCE`层的一部分。产品生命周期管理（`PLM`）指的是在产品整个生命周期及供应链中，管理用于设计、工程、制造、销售和服务过程中的数据与流程。


    作为物联网的一部分，所有四个层面相互集成，从而实现 IT 与 OT 之间无缝的数据和信息交换。


    ## 物联网面临的三大挑战


    物联网项目失败的原因有几个，其中之一是缺乏针对物联网项目实施的业务战略。另一个原因是对安全性和互操作性缺乏周密的考量。尽管自过去几年以来，为解决物联网这三大挑战已做出了大量努力，但值得注意的是，我们在这些领域距离完美还有很长的路要走。


    ### 业务战略


    一些企业通过识别物联网用例并选择技术来实现这些用例，从而开启了物联网之旅。这种零敲碎打的物联网实施方式注定会失败。物联网实施并非一项技术举措，而是一项利用技术实现的业务举措。业务举措源自业务战略。


    ### 物联网安全


    物联网意味着融合 IT 和 OT，这是 IT 行业的一个新兴趋势，并且日益普及。在未来几年内，物联网将成为每个人的标准。然而，安全性和隐私性是当今面临的最大挑战，因为物联网涉及大量设备和传感器，这些设备和传感器收集了大量关于个人和企业的个人数据，然后将这些数据传递给
    IT 系统。例如，智能电表可以知道一个人何时在家，以及个人正在使用哪些电子设备及使用时间。所有这些信息都会与其他设备共享，并由公司保存在数据库中。一些专家认为，在物联网生态系统发展的早期阶段，在构建安全性和隐私性方面做得还不够。为了进一步证实他们的观点，一些人甚至入侵了一系列设备，从[联网婴儿监视器](https://www.yahoo.com/parenting/nanny-freaks-as-baby-monitor-is-hacked-109405425022.html)到[自动照明系统](http://www.bbc.co.uk/news/technology-28208905)和[智能冰箱](http://www.theguardian.com/technology/2014/jan/21/fridge-spam-security-phishing-campaign)，乃至全市范围的系统，如交通信号灯。


    2018 年的一项研究表明，55%的 IT 专业人士将物联网世界中的安全性列为首要任务。这是根据 451 Research 进行的一项调查得出的结论^(³)。从企业服务器到云存储，网络犯罪分子正在
    IT-OT 生态系统中的许多节点寻找利用信息的方法。截至 2021 年，这些 IT 专业人士提到的许多安全挑战已得到解决，但仍有很长的路要走。


    定义


    `关键基础设施`是指那些至关重要的系统、网络和资产集合，其持续运行对于确保特定企业、其经济以及员工的健康和/或安全是必需的。


    有趣的是，到目前为止，黑客并未花费太多时间或精力来破解 OT 设备，因为还没有太多企业或个人完全使用物联网，因此这对他们来说不值得付出努力。然而，随着企业开始在日常业务中利用物联网，这将成为网络犯罪分子的一个新关注领域。安全性是物联网实施中需要解决的最重要要素之一。好消息是，在这一领域已经发展出了几种成熟的做法。我们将在后续章节中更详细地讨论这些内容。

    '
- fmt: '### IoT Interoperability


    `Interoperability` is a characteristic of a product or system to work with other
    products or systems, at present or in the future, in either implementation or
    access, without any restrictions.


    `Interoperability` continues to be one of the major challenges in the `IoT` world.
    The interoperability issues in `IoT` can be seen from different perspectives due
    to heterogeneity. Heterogeneity is not a new concept nor restricted to a domain.
    Even in the physical world, there are many types of heterogeneities, for example,
    people speak dissimilar languages, but they can still communicate with each other
    through a translator (human/tools) or by using a common language. Likewise, the
    diverse elements comprising `IoT` (devices, communications, services, applications,
    etc.) should seamlessly cooperate and communicate with each other to realize the
    full potential of the `IoT` ecosystem.


    `Interoperability` in the `IoT` context starts from device interoperability to
    network interoperability, syntactic interoperability, semantic interoperability,
    and platform interoperability. Though there are several solutions by `IoT` vendors
    to solve these interoperability issues, we are far from perfection, and the challenge
    still continues.


    The industry attempts to address `IoT` interoperability challenges through standardization.
    Several efforts have emerged to establish standards for providing interoperability
    between `IoT` devices, networks, services, and data formats owned by different
    providers. The European Union has also recently funded several research projects
    under the `H2020` program focusing on the federation of `IoT` platforms. However,
    it may take a long time before the related standards are fully agreed upon and
    accepted, if ever.


    However, the good news is that if an `IoT` project is well planned, interoperability
    issues can be resolved, thereby ensuring that solutions built now can be future-proofed.
    To set expectations right, interoperability should be aspired specific to an industry
    rather than cross industries, else it will lead to disasters in `IoT` implementation.
    What this means is that the different hardware and software that are part of the
    `IoT` architecture should be interoperable to implement use cases within an industry
    domain such as manufacturing or retail or pharmaceutical. As an example, `Gateways`
    built for `IoMT` (Internet of Medical Things) should be able to communicate with
    sensors and devices built for hospitals and are not required to interoperate with
    sensors and devices used in manufacturing.


    #### Device Interoperability


    `IoT` is composed of a variety of devices, even more than the traditional Internet.
    These devices, which are called “smart objects/things,” may consist of high-end
    devices or low-end devices. The high-end `IoT` devices have enough resources and
    computational capabilities such as smartphones. On the other hand, the low-end
    `IoT` devices are resource constrained in terms of energy, processing power, and
    communication capabilities than typical hosts such as `RFID` tags and tiny and
    low-cost sensors, to name a few.


    The key interoperability challenge with these devices stems from the various communication
    protocols that these devices use. Some devices use `Wi-Fi` technologies and `3G/4G`
    cellular communications to communicate, while other devices such as wearables
    use `Bluetooth`, and others such as environmental sensors use `Zigbee` standard.


    #### Network Interoperability


    Network interoperability is the continuous ability to send and receive data among
    the interconnected networks, providing the quality level expected by the end user
    without any negative impact to the sending and receiving networks.


    The networks that `IoT` devices will be operating on will continue to be heterogeneous,
    multiservice, multivendor, and largely distributed. Different from desktop computers,
    `IoT` devices generally rely on various short-ranged wireless communication and
    networking technologies, which are rather more intermittent and unreliable.


    Network-level interoperability deals with mechanisms to enable seamless message
    exchange between systems through different networks (networks of networks) for
    end-to-end communication. To make systems interoperable, each system should be
    able to exchange messages with other systems through various types of networks.
    Due to the dynamic and heterogeneous network environment in `IoT`, the network
    interoperability level should handle issues such as addressing, routing, resource
    optimization, security, `QoS`, and mobility support.


    #### Semantic Interoperability


    Semantic interoperability means that different agents, services, and applications
    are enabled to exchange information, data, and knowledge in a meaningful way,
    on and off the Web.^([⁴](#fn4))


    The data generated by `IoT` devices are in different formats which hinders the
    interoperability of applications and platforms since they cannot interpret the
    data generated by others.


    To be more precise, the data generated by things about the environment may have
    a defined data format (e.g., `JSON`, `XML`, or `CSV`), but the data formats of
    other devices are usually dissimilar and not always compatible. This is the biggest
    challenge with `IoT` systems.


    In this context, there had been a major need for using common vocabularies capable
    of describing the meaning of data in this environment. In order to implement solutions
    that minimize the interoperability problems found in the `IoT` environment, several
    standards, languages, and approaches are being defined such as by the Semantic
    Web. These standards will ensure that the exchange of information is meaningful
    and with understandable meanings. These include semantics in data by adding self-described
    information packages. Semantic interoperability is used to ensure that `IoT` devices
    from different vendors are interoperable.


    Though the adoption of the Internet of Things is gradually increasing, there remains
    a significant obstacle that hinders its adoption as a truly ubiquitous technology:
    the ability of devices to unambiguously exchange data with shared meaning. In
    this respect, the World Wide Web Consortium has developed the Web of Things architecture
    to provide semantic data exchange. However, such an architecture does not cover
    all possible use cases and still has important limitations.


    Many platforms still do not address semantic interoperability, and it is one of
    the important areas for enterprises to validate before choosing an `IoT` solution.


    #### Syntactic Interoperability


    Syntactic interoperability refers to the packaging and transmission mechanisms
    for data.


    With semantic interoperability, the data is not only exchanged between two or
    more systems but also understood by each system. Syntactic interoperability may
    be considered as a subset of semantic interoperability, which allows two or more
    systems to communicate and exchange data; however, the interface and programming
    languages may be different and need not be understood by one another.


    Syntactic interoperability refers to the interoperation of the format as well
    as the data structure used in any exchanged information or service between heterogeneous
    `IoT` system entities. An interface needs to be defined for each resource, exposing
    some structure according to some schema. `WSDL` and `REST` `APIs` are examples.
    The content of the messages need to be serialized to be sent over the channel
    and the format to do so (such as `XML` or `JSON`). The message sender encodes
    data in a message using syntactic rules, specified in some grammar. The message
    receiver decodes the received message using syntactic rules defined in the same
    or some other grammar. Syntactic interoperability problems arise when the sender’s
    encoding rules are incompatible with the receiver’s decoding rules, which leads
    to mismatching message parse trees.'
