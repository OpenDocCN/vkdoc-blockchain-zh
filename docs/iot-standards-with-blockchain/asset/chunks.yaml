    # 边缘计算是智能物联网网关的第三大重要功能


    边缘计算是一种分布式计算范式，它将计算和数据存储更紧密地集中到需要的位置附近，以改善响应时间并节省带宽。


    边缘计算正在改变全球数百万设备处理、传输数据的方式。互联网连接设备（即物联网）的爆炸式增长，以及对实时计算能力的新应用需求，持续推动着边缘计算系统的发展。


    更快的网络技术，例如 [5G](https://www.networkworld.com/article/3330603/5g-versus-4g-how-speed-latency-and-application-support-differ.html)
    无线技术，使得边缘计算能够加速创建或支持实时应用，例如视频处理与分析、自动驾驶汽车、人工智能和机器人技术等。


    ## 定义


    `工作负载` 是本书中使用的一个术语，指应用程序、连接性和数据的组合（可以是全部或部分）。


    在网络中，延迟衡量的是某些数据通过网络到达目的地所需的时间。它通常以往返延迟来衡量，即信息到达目的地并返回源点所需的时间。


    Gartner 将边缘计算定义为"分布式计算拓扑的一部分，其中信息处理位于靠近边缘的位置，即事物和人产生或消费这些信息的地方。" 在基本层面上，边缘计算将计算和数据存储更靠近收集数据的设备，而不是依赖于可能远在数千英里之外的中心位置。这意味着数据（尤其是实时数据）由位于设备附近的智能物联网网关进行处理。因此，企业不会面临延迟问题，因为数据在设备附近来回共享和处理。此外，借助智能物联网网关，公司可以节省资金，因为处理在本地进行，这减少了需要发送到集中式或基于云的位置进行处理的数据量。


    由于连接到互联网以从云端接收信息或将数据传回云端的物联网设备呈指数级增长，支持边缘计算的智能物联网网关变得非常重要。许多物联网设备在其运行过程中会产生大量数据。智能物联网网关主要致力于将处理工作从云端移出，更靠近终端设备或最终用户。这也涉及对时间敏感型应用的延迟问题，例如需要实时响应的物联网应用。


    智能物联网网关边缘计算的主要驱动因素包括：


    -   网络和带宽 – 边缘计算可以最大限度地降低移动大量数据的成本，并减少对网络的依赖。

    -   数据隐私与安全 – 边缘计算帮助组织遵守数据主权法律，并确保知识产权保留在本地。

    -   推动边缘计算采用的另一个因素是希望在设备或本地实现本地计算。

    -   在往返延迟问题上，边缘计算已经颠覆了整个市场。云技术完全涉及在互联网上访问系统，这意味着数据和通信需要在互联网上来回移动。而借助边缘计算，数据驻留在智能物联网网关中，从而减轻了网络延迟问题。


    尽管人们可能不会将边缘设备视为每个物联网架构的一部分，但它是决定当前为特定企业和用例实施的任何物联网未来成功与否的最重要元素之一。边缘计算带来了显著的好处，尤其是对于大规模物联网实施而言。


    ## 智能网关面临的挑战


    智能物联网网关搭载了边缘计算，可提供数据存储和计算能力。它们在网关本身进行数据处理，但在网关级别可处理的数据量和计算量是有限的。拥有数百万设备连接到网关且需要大规模计算能力的企业，需要就哪些数据需要在智能物联网网关级别进行处理做出选择，而其余数据和流程则需要由通常驻留在云端的全栈物联网平台来执行。


    为了克服物联网边缘网关级别在数据存储和计算方面的限制，一些企业正在尝试采用专门的模型，以在智能物联网网关或设备附近提供无限的计算能力。这些公司正试图在区域层面维护和管理服务器，以确保企业无需在互联网上来回迁移工作负载，从而保持企业的应用和业务团队期望从云端获得的延迟水平。此外，这些公司更进一步，允许连接跨多个云提供商（例如
    `AWS`、`Azure` 或 `Google Cloud`）以及跨私有云和公有云的应用程序和数据。这对于那些选择在托管环境中建立自己的私有云来处理关键任务或敏感应用及数据，并将其余部分迁移到公有云的大型企业尤其重要。这些公司实现了私有云和公有云之间协作与通信的需求。`Equinix`
    的 `Cloud Interconnect Fabric` 就是这样一个例子。


    许多私有云和公有云提供商都积极参与，致力于使无限边缘计算取得成功。


    `西门子` 提出了工业边缘的概念。工业边缘解决方案允许企业在机器上分析所有数据，同时快速、即时地对数据进行预处理。然后，优化后的数据点可以被传输到云端，在那里企业可以获得更强大的计算能力和更大的存储容量。

    '
- fmt: '### Full Stack IoT Platform


    The Full Stack IoT Platform is designed to store, process, and analyze large volumes
    of data for deeper insights using powerful data analytics engines and machine
    learning mechanisms. It is a platform to create and manage applications, run analytics,
    and store and secure enterprise IoT data. Some enterprises choose to perform Device
    Management at the IoT Platform level, which depends on the use case being considered,
    and in all such cases, the right IoT Platform needs to be chosen that can support
    this feature.


    There are multiple IoT platforms that are existing in the market today, and most
    of these platforms support Device Management. There are platforms for specific
    industries like commercial real estate and family health. Some focus on one type
    of device: for example, there are at least a couple of platforms focused on augmented
    reality headsets. Some are focused on a particular function, like manufacturing,
    and some for healthcare.


    There is no one-size-fits-all Full Stack IoT Platform that can be used across
    any industry or can solve any business problem; therefore, to choose the right
    IoT platform, one needs to start with a good understanding of the enterprise IoT
    strategy, the kinds of problems and opportunities enterprises are trying to address
    via IoT (and respective use cases), and the primary industry of the enterprise
    such as manufacturing, retail, or healthcare. Based on this, an IoT platform needs
    to be chosen.


    Any IoT platform should be able to follow data through the journey starting from
    gathering data from devices (using the Smart IoT Gateways) to generating insights
    from the data. The key to transform data from a device into an IoT platform begins
    with very specific data that comes from a machine-specific industrial protocol
    or healthcare device, and as it ingested into the platform, data is processed,
    normalized, and standardized to a structure that is well suited for the analytics
    platform to generate insights. This is one of the reasons an IoT Platform with
    a very strong data and analytics capability needs to be chosen that can support
    generating the right insights from the vast data that is pumped from the devices.


    ### AI (Artificial Intelligence) Is an Important Function Performed by the IoT
    Platform and in Some Cases Performed at the IoT Gateway Level (Called Edge IT)


    Artificial Intelligence forms one of the most important features in an IoT Standards
    Reference Model.


    Artificial Intelligence (AI) refers to the simulation of human intelligence in
    machines that are programmed to think like humans and mimic their actions. The
    term may also be applied to any machine that exhibits traits associated with a
    human mind such as learning and problem-solving.


    Machine learning which is a subset of AI feeds on data and uses statistical techniques
    to help it “learn” how to get progressively better at a task, without having been
    specifically programmed for that task. With big data being part of the IoT architecture,
    Artificial Intelligence has become quite powerful in the IoT context.


    Devices as part of the IoT ecosystem generate huge amounts of data. With big data,
    we have data lakes which store petabytes of data. The key aspect is to understand
    how we use this data and make best use of it. This is where Artificial Intelligence
    comes into play, where AI can perform a lot of functions such as anomaly detection,
    root cause analysis, and so on.


    AI fits in very well in the context of industrial automation and predictive maintenance.
    In the old and traditional IoT implementations, the architecture had a rules engine
    that performs repetitive tasks, such as if a sensor data hits a defined threshold,
    it does a specific predefined task. As an example, if the temperature of a furnace
    goes beyond 70 degree Celsius, it shuts down the furnace. However, all these rules
    and values are hardcoded. With the introduction of AI in the IoT architecture,
    instead of having these rules hardcoded, enterprises can now deploy a model and
    get systems trained over a period of time, so that there is no hardcoding of business
    logic or rules. With AI, we are letting the machine learn from the patterns over
    a period of time so that actions can be performed based on the learnings. This
    helps in several use cases such as predictive maintenance. For example, we deployed
    an IoT-based predictive maintenance solution for a large car manufacturer that
    predicts spindle damages as well as identifies cracking and spalling of rotating
    equipment, gearing, and motor defects. As a result, they improved the Overall
    Equipment Effectiveness (OEE) by reducing diagnostic times by up to 70% and repair
    times by more than 20%. This adds a lot of value to enterprises.


    One challenge that I have faced with AI in IoT is that there is a lot of data
    that needs to be sent to the cloud, and in many industries, the time it takes
    to execute a command based on the AI algorithms is too long since data needs to
    be transferred back and forth to the cloud for machines to learn from data. The
    other challenge which I have encountered is that a few enterprises from regulated
    industries consider data to be sensitive to be sent to the cloud. To overcome
    this challenge, enterprises need AI algorithms to be executed near to the devices
    where data is being generated. This means that such tasks need to be performed
    by the Smart IoT Gateways, which is also called AI at the edge. But not all Smart
    Gateways will have such compute power to run AI algorithms on the edge. There
    are several enterprises that have come up with Smart IoT Gateways which are capable
    of running AI algorithms near to the devices.


    There are different models that enterprises adopt to enable AI in an IoT architecture.
    In some cases, AI is performed directly by Smart IoT Gateways using the data from
    the devices called AI on the edge. In some cases where enormous data is pumped
    from the devices, part of the AI happens at the Smart IoT Gateway level and the
    rest at the Full Stack IoT Platform level, and in some cases enterprises choose
    to perform AI at the Full Stack IoT Platform level. Enterprises need to choose
    the best place to perform AI based on the data and the use cases it is implementing.
    For one of the manufacturing companies, we used Amazon AWS Snowball Edge to perform
    heavy compute operations near to the IoT devices, that is, Smart IoT Gateway.
    Snowball Edge is capable of running a full-blown machine learning model at the
    IoT Gateway. The way this works is that you train the model in the public cloud,
    and then you bring the model to the IoT Gateway and run it. And when it detects
    that the predictions are not very accurate, it goes back to the data lake which
    is hosted at the Full Stack IoT Platform level to get further trained and again
    gets deployed to the IoT Gateway, and this cycle continues until the algorithm
    is performing actions with 100% accuracy.


    With AI and machine learning in IoT, the static rules engine is replaced with
    dynamic and machine learning rules which means that reactive maintenance is replaced
    with predictive maintenance.


    The whole convergence of IoT and Artificial Intelligence is opening a lot of avenues
    for excellence in IoT. For example, when we get into connected cars, the connected
    car is literally an edge computing on wheels. It has a lot of compute power that
    is actually processing the data as it comes in. And that is one classic example
    of edge computing on wheels and similarly aircrafts run edge computing and a lot
    of vehicles will run and industrial equipment will in future.'
