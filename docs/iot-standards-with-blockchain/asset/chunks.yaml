  trans: '

    ### 产品开发团队


    物联网产品开发团队由 DevSecOps 团队组成，该团队包括应用开发人员、应用安全专家以及运维团队。


    `DevOps` 是一种软件开发方法，它通过使用自动化来加速构建生命周期（旧称发布工程）。`DevOps` 专注于软件的持续集成和[持续交付](https://en.wikipedia.org/wiki/Continuous_delivery)，通过利用按需
    IT 资源（基础设施即代码）以及自动化代码的集成、测试和部署来实现。这种软件开发（`Dev`）与 IT 运维（`Ops`）的融合缩短了部署时间、降低了产品上市时间、最大限度减少了缺陷，并缩短了解决问题所需的时间。通过在
    `DevOps` 周期中引入安全控制措施，企业可以在提升安全性的同时实现开发速度，这种做法被称为 `DevSecOps`。


    使用 [DevSecOps](https://en.wikipedia.org/wiki/DevOps)，领先的公司已经能够将其产品发布周期从几个月缩短到（毫不夸张地说）几天。这使它们得以在快节奏的新兴市场中成长并保持领先，而物联网正是
    [DevSecOps](https://en.wikipedia.org/wiki/DevOps) 带来巨大价值的领域之一。像 Google、Amazon
    等许多公司现在每天都会多次发布软件。通过提高产品发布的质量和周期，并在 `DevOps` 中引入安全性，`DevSecOps` 日益流行，并已在许多企业的物联网产品开发中取得了巨大成功。传统上，在旧式开发模式中，开发人员编写代码后将其交给质量保证或测试团队，他们测试代码、识别错误，然后再将代码交回给开发人员。开发人员修复代码后再次提交测试，之后才交给运维团队进行产品的支持和维护。这是瀑布式开发方法中常见的做法。敏捷软件开发流程也部分遵循此模型，区别在于开发周期内的开发人员和测试人员协同工作，无交接，但测试完成后仍会将代码交接给运维团队进行部署。这清楚地表明开发、测试和部署团队之间缺乏协作，最终导致开发和部署周期缓慢。`DevSecOps`
    完全消除了这一挑战，因为开发、安全和运维同属一个团队，因此不存在交接。


    物联网“始终在线”的特性意味着，组织可以使用 `DevSecOps`，根据来自连接设备的反馈，以安全的方式持续更新软件。日常生活中，人们使用联网车辆和机器人；企业正在部署联网工厂，并在生产车间使用物联网。如果来自连接设备有反馈意见，那么在
    `DevSecOps` 环境中解决该反馈相当容易。这意味着企业可以在问题出现时立即修复。


    ### DevSecOps 实现更快的交付速度


    `DevOps` 的主要原则是自动化、持续交付和快速的反馈周期，旨在使物联网产品开发过程更快、更安全、更高效。作为敏捷方法论的演进延伸，`DevSecOps`
    利用自动化确保产品开发流程的顺畅。通过促进协作文化，它提供了快速持续反馈的空间，以便及时修复任何故障，并更快地完成发布。


    ### DevSecOps 管理规模并具备主动安全性


    对于物联网用例，必须保护来自设备和装置的信息安全，以防止其遭到破坏。所有物联网系统都必须在几分钟内修补软件漏洞，并保持主动安全。此外，它们应该在几周内从少量设备（试点阶段）快速扩展到数千台设备（生产阶段）；因此，系统设计应能管理这种负载。一旦企业在物联网用例中启用了
    `DevSecOps`，该配置便可扩展到任意数量的用例和设备。此外，物联网 `DevSecOps` 通过实时自动化发布、漏洞和补丁管理，并在不中断用户体验的情况下安装补丁和更新，来帮助开发人员、测试人员、QA
    以及物联网运维团队。


    ### 管理严格的互操作性测试并确保可用性


    物联网应用在解决方案中可能包含多种软件和硬件配置。对数百万台设备测试其安全性、性能、连接性以及众多参数并非易事。在部署到生产环境之前，需要对这些不同的配置和属性进行测试。作为
    `DevSecOps` 实施的一部分所采用的自动化测试方法，可确保 QA 流程在这些不同的配置和属性上具有相当的测试覆盖率。


    ### 信息技术主管


    信息技术主管来自 IT 组织。在物联网背景下，信息技术主管不仅熟悉 IT 系统，还能清晰理解作为物联网用例一部分的 OT 系统的细微差别。信息技术主管需要与
    OT 主管合作，并能够为 IT 与 OT 的集成定义技术路线图。该角色需要全面掌握 IT 合规性、治理、安全、数据中心或云需求、企业内部使用的 IT 系统类型及其集成等。


    信息技术主管需要具备的另一项重要能力是理解端到端的物联网标准参考模型。除了定义包括 `DevSecOps` 流水线在内的端到端开发平台之外，他们还应能够帮助企业筛选和选择合适的智能物联网网关和物联网云平台。在大多数情况下，信息技术主管会带领一个由资深架构师组成的团队，以实现其角色期望的目标。


    ### 大数据主管


    大数据主管是物联网实施中最重要的角色之一。只有以能够为企业决策提供有用见解的方式捕获、过滤和分析来自设备或 OT 系统的数据，物联网用例才能成功。因此，大数据主管是物联网实施核心团队的一部分，他们与信息技术主管共同决定特定用例的数据管理和分析应在何处进行，并据此选择智能物联网网关和物联网云平台。


    数据主管负责引入专业知识，以定义大数据存储需求以及数据应如何存储和管理。大数据主管还组建数据科学团队，使企业能够基于从物联网设备收集的数据获得洞察。


    ### 定义


    `工业控制系统 (ICS)` 是一个通用术语，涵盖用于[工业过程控制](https://en.wikipedia.org/wiki/Process_control)的几种类型的[控制系统](https://en.wikipedia.org/wiki/Control_system)及相关[仪器仪表](https://en.wikipedia.org/wiki/Instrumentation)。


    此类系统的规模范围可以从几个模块化面板安装式控制器，到拥有数千个现场连接的大型互联交互式分布式控制系统。

    '
- fmt: '### IoT Champion


    The IoT champion is the product director to achieve enterprise vision on IoT.
    This is an individual who is able to communicate with and relate to both IT and
    OT groups. The IT-OT integration champion understands how to convey information
    in a way that encourages cooperation and collaboration between all the parties
    involved in the integration, including OT leads and shop floor staff. It is an
    important role which is about defining and redefining the goals and success criteria
    of OT departments to foster collaboration. The challenge is that IT and OT have
    different goals, philosophies, and working cultures. The IT-OT integration champion
    is the one who brings all these goals and people together to achieve a common
    objective of IT-OT integration success.


    ### IoT Product Team Identification


    Until now, we discussed about different roles that need to be part of the product
    team for IoT implementation. In this section, we are going to discuss about identifying
    a high-performing IoT team.


    A high-performing team delivers exceptional results time and time again, irrespective
    of the challenges they encounter. We will discuss about creating a high-performing
    IoT team with a framework that attracts individuals who are of the right caliber
    to support an enterprise in their digital transformation journey using IoT.


    Traditionally, enterprises follow a triangle pyramid as depicted in Figure [13-2](#517610_1_En_13_Chapter.xhtml#Fig2)
    where juniors are placed at the bottom of the pyramid and seniors at the top.
    This is how traditional enterprises have operated, and it was indeed the right
    model since technology was stable with little unknowns. Project execution was
    quite methodical in nature with little to medium level of automation in project
    life cycles.


    Referring to Figure [13-2](#517610_1_En_13_Chapter.xhtml#Fig2), section C consists
    of resources with fewer than three years of experience and typically also includes
    a percentage of recent college graduates. This is called the *bottom* of the pyramid.
    These are typically junior developers and testers.


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig2_HTML.jpg](images/517610_1_En_13_Chapter/517610_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    A typical pyramid for project execution consisting of resources with different
    experience levels


    Section B consists of resources with mid-level experience (three to six years),
    also known as mediors. These are typically IoT developers and testers along with
    some junior designers, senior developers, and senior testers. This is also referred
    to as the *bottom +1* of the pyramid.


    Section A consists of highly experienced technical, functional, and managerial
    resources, including product directors, enterprise architects, Operational Technology
    leads, senior designers, and senior developers and testers. This section is typically
    referred to as the *top –1* of the pyramid. Section A also consists of a scrum
    master and product manager, including enterprise and business architects, referred
    to as the *top* of the pyramid.


    Over time, this pyramid structure has rooted into the competency of resources
    within an enterprise. As depicted in Figure [13-3](#517610_1_En_13_Chapter.xhtml#Fig3),
    this means that a small portion of high-performing individuals exist within a
    team, and these are the ones depicted at the top of the pyramid.


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig3_HTML.jpg](images/517610_1_En_13_Chapter/517610_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    A typical pyramid with competency levels


    Section D consists of elite performers who are the core for the success of any
    enterprise or engagement. These are individuals who are good at what they do and
    can go the extra mile to learn and adapt to any new changes within the industry
    or enterprise, be it from a technological or business side. They have a high appetite
    to learn and contribute to the overall product and enterprise success.


    Section E consists of resources who are high performers and are important to the
    product team. These are individuals who are good at what they do and support the
    enterprise in their area of expertise and contribute to the overall product success.


    Section F consists of resources with medium competency. These are individuals
    who are good at what they do but do not necessarily go the extra mile to support
    the program or project, not because they are not willing to but because they do
    not have the technical competency to do so.


    Section G consists of resources who are low performers. Though many organizations
    will disagree with this statement, it is a well-known fact that almost all enterprises
    during their annual appraisal or performance review cycle fire employees in Section
    G from the organization.


    Several enterprises are still operating in the traditional pyramid structure described
    earlier and at the same time are aspiring to transform their whole organization
    and make profits. The traditional pyramid is not the right model for enterprises
    that are aspiring to succeed in their digital transformation journey using technologies
    such as IoT.


    It is essential that enterprises change their structures to ensure success in
    their IoT journey. A product organization need to move to a diamond structure
    in contrast to the traditional pyramid. Enterprises also need to move away from
    measuring competency of resources based on their experience level. The only measure
    in a diamond-based structure is the competency of individuals, which are categorized
    into one of the three quadrants as depicted in Figure [13-4](#517610_1_En_13_Chapter.xhtml#Fig4).
    There is no place for low performers in a diamond structure.


    ![../images/517610_1_En_13_Chapter/517610_1_En_13_Fig4_HTML.jpg](images/517610_1_En_13_Chapter/517610_1_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Diamond structure with competency levels


    Section A consists of elite performers. Section B consists of competent and high-performing
    resources, and Section C has resources with medium competency.


    Across the diamond structure in all the three sections, individuals with all variety
    of roles can be found, such as agile coaches, a scrum master, product managers,
    enterprise and business architects, and product engineering teams.'
