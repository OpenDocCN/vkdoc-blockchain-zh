  trans: '

    ### IoT 互操作性


    `互操作性` 是指产品或系统在现在或未来，无论是在实现方式还是访问方式上，能够与其他产品或系统不受限制地协同工作的特性。


    `互操作性` 仍然是 `IoT` 世界中的主要挑战之一。由于异构性，`IoT` 中的互操作性问题可以从不同角度来审视。异构性并非新概念，也不局限于某个领域。即使在物理世界中也存在多种异构性，例如，人们说着不同的语言，但仍然可以通过翻译（人或工具）或使用通用语言进行交流。同样，构成
    `IoT` 的多种元素（设备、通信、服务、应用等）应无缝协作并相互通信，以充分发挥 `IoT` 生态系统的潜力。


    `IoT` 环境下的`互操作性`涵盖从设备互操作性到网络互操作性、语法互操作性、语义互操作性和平台互操作性。尽管 `IoT` 供应商提供了多种解决这些互操作性问题的方案，但我们距离完美还很远，挑战依然存在。


    业界试图通过标准化来应对 `IoT` 互操作性挑战。已经出现了多项努力，旨在建立标准，以提供不同提供商拥有的 `IoT` 设备、网络、服务和数据格式之间的互操作性。欧盟近期也在
    `H2020` 计划下资助了多个专注于 `IoT` 平台联合的研究项目。然而，相关标准要完全达成共识并被接受（如果能够实现的话），可能需要很长时间。


    好消息是，如果一个 `IoT` 项目规划得当，互操作性问题是可以解决的，从而确保当前构建的解决方案能够适应未来发展。为了设定合理的期望，互操作性应针对特定行业而非跨行业，否则将导致
    `IoT` 实施的灾难。这意味着，属于 `IoT` 架构一部分的不同硬件和软件，应能在特定行业领域（如制造业、零售业或制药业）内实现互操作，以实施用例。例如，为
    `IoMT`（医疗物联网）构建的`网关`应能与为医院构建的传感器和设备通信，而无需与制造业使用的传感器和设备互操作。


    #### 设备互操作性


    `IoT` 由各种设备组成，甚至比传统互联网还多。这些被称为“智能对象/物品”的设备，可能包含高端设备或低端设备。高端 `IoT` 设备拥有充足的资源和计算能力，例如智能手机。另一方面，低端
    `IoT` 设备在能源、处理能力和通信能力方面资源受限，例如 `RFID` 标签以及微型低成本传感器等。


    这些设备的关键互操作性挑战源于它们使用的各种通信协议。一些设备使用 `Wi-Fi` 技术和 `3G/4G` 蜂窝通信进行通信，而其他设备（如可穿戴设备）使用
    `蓝牙`，还有像环境传感器一类的设备则使用 `Zigbee` 标准。


    #### 网络互操作性


    网络互操作性是指在互连网络之间持续发送和接收数据的能力，提供最终用户期望的质量水平，且不对发送和接收网络产生任何负面影响。


    `IoT` 设备将要运行的网络将继续保持异构、多业务、多厂商且高度分布的特点。与台式计算机不同，`IoT` 设备通常依赖各种短距离无线通信和网络技术，这些技术更不稳定、更不可靠。


    网络级互操作性涉及用于通过不同网络（网络的网络）实现系统间无缝消息交换以实现端到端通信的机制。为了使系统具有互操作性，每个系统都应能通过各种类型的网络与其他系统交换消息。由于
    `IoT` 中动态且异构的网络环境，网络互操作性层面应处理诸如寻址、路由、资源优化、安全、`QoS` 和移动性支持等问题。


    #### 语义互操作性


    语义互操作性意味着不同的代理、服务和应用能够在 Web 上或 Web 之外以有意义的方式交换信息、数据和知识。^(⁴)


    `IoT` 设备生成的数据格式各异，这阻碍了应用程序和平台的互操作性，因为它们无法解释其他设备生成的数据。


    更准确地说，关于环境的有形资产生成的数据可能有定义好的数据格式（例如 `JSON`、`XML` 或 `CSV`），但其他设备的数据格式通常不同且不总是兼容。这是
    `IoT` 系统面临的最大挑战。


    在此背景下，迫切需要能够描述该环境中数据含义的通用词汇。为了实施能够最大程度减少 `IoT` 环境中互操作性问题的解决方案，正在定义多种标准、语言和方法，例如语义网所定义的。这些标准将确保信息交换是有意义的且含义可理解。这包括通过添加自描述信息包来实现数据中的语义。语义互操作性用于确保来自不同供应商的
    `IoT` 设备具有互操作性。


    尽管物联网的采用正在逐渐增加，但阻碍其成为真正普适技术的一个重大障碍仍然存在：设备能明确无误地以共享含义交换数据的能力。在这方面，万维网联盟开发了 Web
    的物架构以提供语义数据交换。然而，这种架构并未涵盖所有可能的用例，并且仍然存在重要局限性。


    许多平台仍未解决语义互操作性问题，这是企业在选择 `IoT` 解决方案之前需要验证的重要领域之一。


    #### 语法互操作性


    语法互操作性指的是数据的封装和传输机制。


    与语义互操作性相比，数据不仅要在两个或多个系统之间交换，还要能被每个系统理解。语法互操作性可被视为语义互操作性的一个子集，它允许两个或多个系统进行通信和交换数据；然而，接口和编程语言可能不同，并且彼此之间无需理解对方。


    语法互操作性指的是异构 `IoT` 系统实体之间交换的任何信息或服务中所用格式和数据结构的互操作。需要为每个资源定义一个接口，根据某种模式公开某些结构。`WSDL`
    和 `REST` `API` 就是例子。消息内容需要序列化才能通过信道发送，并需要确定序列化格式（如 `XML` 或 `JSON`）。消息发送方使用某种语法规则（在某种语法中指定）将数据编码到消息中。消息接收方使用相同或另一种语法中定义的语法规则对接收到的消息进行解码。当发送方的编码规则与接收方的解码规则不兼容时，就会出现语法互操作性问题，导致消息解析树不匹配。

