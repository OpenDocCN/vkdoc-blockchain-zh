- fmt: '# Security in IoT


    OT systems in an enterprise are the cash registers – whether it is a power generation
    unit, car manufacturing unit, oil refining, or chemical development, OT systems
    generate money for enterprises. All focus has therefore traditionally been placed
    on making sure that the OT systems that produce the end products have been designed
    in a way that they are very safe, highly efficient, and productive with "long-lived
    missions." A long-lived mission means that an OT system of critical infrastructure
    is expected to run 24/7 and 365 days a year for several decades. Due to such a
    need, major patching or upgrading cycles do not happen for years, and therefore
    the types of vulnerabilities that exist live a very long time in those systems.


    In the IT era, we have now come across several security incidents. Each and every
    time there is a new bug, the manufacturer pushes a patch to address it. It is
    a reactive approach, as with every new attack, enterprises respond with forensic
    investigations that ultimately lead to patching and ongoing monitoring to stop
    the problem from reappearing. However, such an approach is not possible in the
    OT world. A small incident can not only cause the plant to shut down leading to
    millions of dollars losses, but there is also the chance of human losses and accidents
    due to cyber-attacks. On the other hand, there are trade secrets such as recipes
    that are often loaded on the OT control systems that need to be protected. This
    is one of the reasons why OT security is at the very top of security concerns
    in IoT. Unlike the IT world, OT systems have:


    * Not learned from cyber-attacks

    * Not undergone upgrades like IT systems

    * More aged infrastructure that have less controls since OT systems were never
    built to be exposed to the outside world

    * Tools and systems that have not been developed to solve cyber-attacks


    This is the biggest challenge which is existing in the OT world, and it is clear
    that after IT-OT integration, cyber-attackers will try to enter the OT system
    via the IT systems. This is the biggest challenge in the IoT industry today.


    We have seen in the past a rushed approach for IT and OT integration. One example
    is the smart metering payday of 2008–2011. This was the time when there was a
    lot of investment in the industry for new kinds of technology on the operational
    side of the house. Wireless systems were making it possible to gather information
    to reduce operational costs, thereby achieving operational efficiency. During
    this time, security in OT systems took a backseat, and after some time the industry
    saw cyber-attacks on smart meters. As an example, some smart meter settings were
    changed by individuals so that meter readings did not go up, by placing large-sized
    magnets on the meters. This was the evolution of IoT where cyber security was
    thought of as a secondary requirement, and because of this some utility providers
    lost millions of dollars.


    You can either think about cyber security at the start while embarking in an IoT
    journey or you can do it later. The effect of doing it later could unfortunately
    lead to dire situations such as shutting down the business entirely, as there
    are undoubtedly a number of unforeseen consequences that could ultimately lead
    to disasters.


    The current level of security awareness in the industry toward IoT is still quite
    diverse. From my experience speaking to several enterprises in the OT world, nearly
    40% of enterprises believe that being isolated from external threats is a solution
    to being secure, and therefore they tend to be disconnected from the outside world.
    These enterprises consider isolation as a strategy to protect themselves against
    cyber risks and therefore have never been able to take advantage of the technology
    existing in the market. These are the ones who are at risk of losing business
    since there are better and cheaper ways to conduct it, which their competitors
    have likely already adopted.


    On the other end of the spectrum, there are fewer enterprises, say 10% of them,
    that are aware and are diligent on the advancements in the IT industry and have
    increased their cyber security posture year after year to stay ahead of emerging
    threats. There are other organizations that are in the middle of both these categories;
    these are the ones that are in the regulated industries and have a compliance
    aspect in their mandate. They enhance their cyber security posture to simply meet
    their compliance requirements. Since these enterprises have not thought of cyber
    security beyond compliance, they are at a high risk of falling prey to cyber-attacks.


    There are matured cyber security practices in the IT world, which are maturing
    in the OT world as well, with the popularity IoT has gained in the last few years.
    Due to this, cyber security practices in existence today for IoT are able to address
    many of the complex issues of protecting critical infrastructure and data in an
    IoT world.


    IoT is the reality of the future. For enterprises to reach the next level of maturity,
    to achieve higher productivity and to deliver better and faster outcomes and be
    cheaper applying IoT to their business model is the only option. Many enterprises
    have already realized this fact; however, being connected in a world where OT
    has never been thought of from a cyber security perspective poses the highest
    degree of risk to enterprises. Often, I have come across two types of enterprises
    – the ones that are striving for this productivity outcome by compromising security,
    and others that do not want to move toward IoT. Neither of these are the right
    option. The only option is to address cyber security and take actions to secure
    both IT and OT, which is a mandate for every enterprise.


    In most cyber-attack cases on OT systems, it is a trial and error process to hack
    the system. Hackers are just looking to see what they can access remotely and
    trying to find ways to get into an operational system. I have also seen the opposite
    – in some cases, there have been situations where attacks have been launched on
    the OT side, and these hacked systems were then used to gain access to the IT
    systems. This is what I call a pivotal attack, and these types of attacks are
    on the rise.


    As we have discussed so far, security cannot be centered around IT and OT in silos
    in IoT. They need to be operating together to prevent cyber-attacks, which takes
    us into the next question: what does it mean to secure the IoT systems? There
    are three main components, as depicted in Figure 8-1, that are necessary in order
    to effectively secure critical infrastructure in an IoT ecosystem.


    ![../images/517610_1_En_8_Chapter/517610_1_En_8_Fig1_HTML.jpg](images/517610_1_En_8_Chapter/517610_1_En_8_Fig1_HTML.jpg)


    **Figure 8-1** Components to secure OT infrastructure


    **Industrial mindset** – The industrial mindset comes first in IoT. This means
    enterprises on an IoT journey need to take into account things such as the missions
    of the OT systems, which are often focused around zero downtime and safety as
    a practice. It is also concerned with the engineering discipline and the quality
    focus that typically goes into designing these industrial systems and recognizing
    that these systems are the cash registers of the business.'
