    # 4. 物联网标准参考模型


    连接至互联网的设备数量（包括构成物联网的机器、传感器和摄像头）持续稳定增长。^(¹²) 根据 IDC 的最新预测，到 2025 年，将有 416 亿台物联网连接设备（即“物”）产生
    79.4 泽字节的数据。


    随着物联网连接设备数量的增长，这些设备产生的数据量也在增加。其中一些数据具有小型突发性特点，仅反映机器健康状况的单一指标；而另一些设备（例如使用计算机视觉分析人群的视频监控摄像头）则会产生大量数据。


    所有“物”与这些物所创造的数据之间存在明显的直接关系。IDC 预测，在 2018 年至 2025 年的预测期内，这些物联网连接设备所创造的数据量将实现 28.7%的年复合增长率。大部分数据由视频监控应用生成，但工业、医疗等其他类别随着时间的推移也将产生越来越多的数据。


    随着市场日趋成熟，物联网正逐步成为支撑“物”、人员和流程之间信息交换的基石。数据成为共同的主线——通过在网络最近端和最远端进行捕获、处理和使用，为行业、政府和个人生活创造价值。


    物联网领域涵盖了广泛的技术，因此无法用单一架构适用于所有可能的物联网实施方案。不同企业的物联网实施方式也各不相同。例如，制造业物联网与医疗保健领域的物联网实施方案就存在差异。事实上，物联网就像一把大伞，覆盖了我们周围所有可能支持或不支持互联网的设备和计算机。因此，物联网架构需要具备足够的开放性，并采用开放协议，以支持各种现有的网络应用和用例。此外，还应包含用于可扩展性、安全性和语义表示的中间件，以促进来自不同设备的设备与数据集成。


    本章定义了物联网标准参考模型，它是一个抽象的框架或特定领域的本体论，由一组相互关联、定义明确的组件组成，企业可以借此成功实施物联网解决方案。物联网标准参考模型可应用于任何行业的物联网用例。该模型保持抽象性，以便基于它实现多种可能的不同物联网架构。


    ## 物联网标准参考模型


    要开启物联网之旅，企业需要选择合适的设备作为物联网实施的一部分，同时选择合适的网络、物联网平台等。最后，需要以最安全的方式进行集成。好消息是，通过尽早关注安全性，企业可以主动进行安全设计，而不是事后被动应对。


    图 4-1 描绘了物联网标准参考模型，该模型大致分为三个水平服务。^(¹³) 安全是一个垂直服务，贯穿所有水平服务，是在决策设备、智能物联网网关或全栈物联网平台时需要考虑的最重要方面之一。设备管理和人工智能是两个特定的服务，它们要么是智能物联网网关的一部分，要么是全栈物联网平台的一部分。这些服务应位于何处取决于物联网用例，因此在参考模型中被视为一个垂直功能。最后，区块链是一个支撑整个物联网标准参考模型的总体功能，它是一个跨越所有水平和垂直服务的水平服务。


    ![../images/517610_1_En_4_Chapter/517610_1_En_4_Fig1_HTML.jpg](img/517610_1_En_4_Fig1_HTML.jpg)


    **图 4-1** 物联网标准参考模型


    第一个水平服务是设备层，由位于生产车间的物理对象组成。


    第二个是智能物联网网关，负责从设备收集数据并将其转发给其他系统。在许多场景中，智能物联网网关会对从设备收集的数据进行预处理，包括分析。智能物联网网关的另一项功能是设备管理。一些企业选择在智能物联网网关层级进行设备管理，但另一些企业则更倾向于在下一个模块——全栈物联网平台层级进行设备管理。设备管理将在后续章节详细讨论，它涉及作为物联网环境一部分运行的设备的配置与认证、配置、维护、监控和诊断等流程。


    全栈物联网平台就像企业业务的神经系统，来自设备并通过智能物联网网关传输的物联网数据，会与其他非物联网数据相结合，利用分析系统或应用得出有价值的见解。^(¹⁴)
    人工智能是物联网标准参考模型中的另一个功能，它使企业能够创建模拟智能行为并在极少或无需人为干预的情况下支持决策的智能机器。一些企业选择在智能物联网网关层级应用人工智能模型，一些选择在全栈物联网平台层级，而另一些则选择在两个地方都进行人工智能应用。这些选择取决于企业选择实施的物联网用例。


    设备、智能物联网网关和全栈物联网平台都需要得到安全保障，这是物联网标准参考模型的一个关键隐含要求。企业需要确保作为物联网标准参考模型一部分而选择的工具和平台在安全性方面经过了彻底验证。


    最后，物联网标准参考模型以区块链为技术驱动。尽管区块链在物联网领域的应用仍在发展之中，但企业在决定其物联网架构时规划该功能至关重要，因为区块链将成为企业未来通过物联网取得成功的最重要元素。


    我们将在后续章节详细讨论上述每一项功能，以下先进行简要预览。

    '
- fmt: '### Devices (the Sensors and Actuators)


    As the basis for every IoT system, connected devices or connected objects are
    responsible for providing data, which is the essence of the Internet of Things.
    To pick up physical parameters in the outside world or within the object itself,
    devices need sensors.


    Fundamentally, an IoT device is composed of hardware and software with an operating
    system, a compute, storage, and connectivity. The big difference between a device
    and a computer is that the inputs and outputs for an IoT device are very different
    from a traditional computer. Devices constitute of sensors and actuators.


    Sensors are either embedded in the devices themselves or implemented as stand-alone
    objects to measure and collect telemetry data. For an example, the task of agricultural
    sensors is to measure parameters such as air and soil temperature and humidity,
    soil pH levels, or crop exposure to sunlight.


    Not all IoT devices are going to have outputs. The ones that have outputs can
    perform actions for an event, such as letting somebody know something has happening
    for a buzzer press or an output can be a hydraulic lift lifting several tons once
    a button is pressed.


    Another element of this layer is the actuators. Working in close collaboration
    with the sensors, actuators transform the data generated by devices into physical
    action. As an example, imagine a smart watering system with all the necessary
    sensors in place. Based on the input provided by the sensors, the device analyzes
    the situation in real time and commands the actuators to open selected water valves
    located in places where soil humidity is below the set value. The valves are kept
    open until the sensors report that the values are restored to default.


    It is essential for devices to remain connected so that they can transmit and
    receive data and execute instructions.


    In the new connected devices’ world, it is also essential that devices talk to
    other devices to gather and share information and collaborate in real time to
    leverage the value of the whole IoT deployment. It is not always possible to achieve
    this objective, and workarounds need to be created, since there are many legacy
    devices in enterprises which are resource constrained and battery operated – the
    communication of one device to others requires lots of resources such as computing
    power, energy, and bandwidth, which these legacy devices are challenged with.
    In addition to these constraints, each device communicates in a different language
    (called a protocol), and therefore it is not always easy for devices to directly
    talk to each other. This is the main reason why Smart IoT Gateways have come into
    play and are the workaround for any device, be it modern or legacy, to communicate
    with other devices in the most secure and optimal fashion.


    ### Smart IoT Gateways


    Smart IoT Gateways typically perform three major functions as depicted in Figure
    [4-2](#517610_1_En_4_Chapter.xhtml#Fig2).^([^(15)](#fn15))


    ![../images/517610_1_En_4_Chapter/517610_1_En_4_Fig2_HTML.jpg](images/517610_1_En_4_Chapter/517610_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Functions of a Smart IoT Gateway


    Firstly, it acts as the data acquisition layer and enables devices to communicate
    and share data with each other and with the rest of the systems in an IoT architecture,
    and secondly it performs the management of IoT devices. The reason why IoT Gateways
    are called Smart is because they perform another important function which is the
    preprocessing of the data received from IoT devices and analytics which is also
    referred as Edge IT or Analytics at the edge.


    Not all IoT Gateways are smart. A standard IoT Gateway is one which just performs
    the first function which is to enable device communication. Some Gateway manufacturers
    enable their Gateways to perform Device Management. A Smart Gateway performs data
    processing and analytics at the Gateway level, reducing overhead of sending and
    receiving data to the IoT Platform. It brings computation and data storage closer
    to the location where devices reside, to improve response times and save network
    bandwidth.


    It is essential to understand that not all IoT architecture will need to have
    Smart IoT Gateways. Based on enterprise needs and the IoT use cases, a selection
    of the right Gateway needs to be performed.


    #### Device Communication Is the First Function of the Gateway


    In an IoT ecosystem, there will be several devices that an enterprise will have,
    and all these devices need to connect and exchange information. Not all devices
    can directly talk to others because each speaks a different language (aka communication
    protocol), and therefore IoT (Smart) Gateways become very essential. IoT Gateways
    perform the function of enabling devices to communicate with others in the IoT
    architecture irrespective of the communication protocols they use. We will discuss
    more about communication protocols in Chapter [6](#517610_1_En_6_Chapter.xhtml).


    The IoT (Smart) Gateway indicates that the Gateway could be an IoT Gateway or
    an Smart IoT Gateway.


    The IoT Gateway means that the Gateway does not have the smart features, that
    is, it does not have the data storage, data preprocessing, and analytics capabilities.


    A communication protocol is a system of rules that allow two or more entities
    of a communications system to transmit information.


    An IoT (Smart) Gateway is a solution for enabling IoT communications, usually
    device-to-device communications or device-to-cloud communications. IoT Gateways
    are devices that perform functions such as protocol translation to a common standard,
    data processing, data storage, data filtering, and device security.


    Given the massive volume of input and output that millions of devices generate,
    capabilities for the aggregation, selection, and transportation of data are very
    essential. As intermediaries between the connected things and the cloud and analytics,
    Gateways act as data acquisition systems and provide the necessary connection
    points that tie the remaining layers together. IoT Gateways facilitate communications
    between the sensors and the rest of the systems by converting the sensor data
    into formats that are easily transferable and usable for other system components.


    #### Device Management Is Another Essential Function Performed by Some Gateways


    Device Management is the process of automatically and securely provisioning, authenticating,
    configuring, controlling, monitoring, and maintaining the IoT devices. Some enterprises
    choose to perform Device Management by an IoT (Smart) Gateway, and some prefer
    to use the Full Stack IoT Platform to perform Device Management based on the specific
    use cases which enterprises target to implement.'
