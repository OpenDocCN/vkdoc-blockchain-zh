    \ to operate efficiently under these conditions. Often, Gateways become a mission-critical\
    \ piece of an IoT architecture since most enterprises using IoT will depend on\
    \ the devices to predict the future, so any downtime with these Gateways can lead\
    \ to a business problem.\n\nSo in summary, when enterprises are shortlisting IoT\
    \ Gateways, they need to first look at the protocols Gateways support based on\
    \ the devices they have within their enterprise. IoT Gateways should be capable\
    \ of connecting with multiple types of devices (including legacy) within the enterprise\
    \ setting, and secondly they need to be robust enough such that enterprises can\
    \ deploy these IoT Gateways in tough and rough environments, such as at locations\
    \ with high temperatures or dust.\n\nSome IoT use cases need Gateways to connect\
    \ to the devices continuously apart from being able to make time-sensitive and\
    \ real-time decisions based on data received from these devices. In such case,\
    \ introducing latency is not an option, which typically is caused when data moves\
    \ back and forth to the cloud. This means that IoT Gateways should be capable\
    \ of performing analytics and real-time decisions.\n\nAnd finally, the most important\
    \ thing is security. Many industries, such as healthcare, pharma, banking, and\
    \ financial services, are regulated, and for all such enterprises, it is essential\
    \ that data is kept on-site, and hence IoT Gateways should have the capability\
    \ to store data."
  trans: '# IoT 网关


    设备和其协议存在诸多复杂性。正如第 5 章所述，设备使用多种协议，例如 Zigbee、Z-Wave、Wi-Fi、蓝牙等。另一方面，多个标准组织和联盟每天都在制定新的标准和协议。IoT
    网关正是在此背景下应运而生。


    IoT 网关是一种用于实现 IoT 通信（通常是设备到设备通信或设备到云通信）的解决方案。在最简单的形式下，传统的 IoT 网关是一种硬件或软件，用于使用多种通信协议从多个
    I/O 设备收集和聚合数据。然后，网关将数据通信到本地数据中心或云中的服务器。在这种简化的背景下，网关充当“代理”的角色。在此背景下，网关直接连接到 IoT
    现场设备（传感器、执行器等），或通过可编程逻辑控制器（PLC）或监控与数据采集系统（SCADA）连接，这些系统负责聚合现场数据。这些网关支持多种 I/O 接口，包括有线和无线连接。


    在此类场景中，网关服务于两个主要目标：


    1.  允许更多设备在工业规模上连接到互联网

    2.  支持不同的协议——从 Zigbee 到 Wi-Fi 再到 4G/5G


    可编程逻辑控制器或可编程控制器是一种工业数字计算机，经过加固和适配，用于控制制造过程，例如装配线、机器人设备，或任何需要高可靠性、易于编程和过程故障诊断的活动。


    监控与数据采集系统（SCADA）是一种控制系统架构，由计算机、网络化数据通信和图形用户界面（GUI）组成，用于高级过程监督管理。


    然而，在 Gartner 预计到 2020 年将有 200 亿台 IoT 设备投入使用的市场中，传统网关面临着诸多挑战。因为如果所有数据都需要从 IoT 设备发送到云端或数据中心，我们谈论的是每秒大量的数据，在某些用例中，每分钟的数据传输量可达数太字节甚至拍字节。IoT
    设备会产生海量的原始数据，如果这些数据直接从 IoT 网关发送到云端，会引入许多低效问题，因为从设备到云端的数据传输会导致延迟和高成本，并且除了在某些情况下引发数据隐私问题外，还容易堵塞网络连接。因此，尽管网关是为了连接未连接设备而构建的，但网关需要执行的另一项主要任务是在网关层面启动分析过程。这就是边缘计算颠覆市场之处。


    边缘计算是一种分布式计算模型，它将计算和数据存储带到更靠近需要它们的位置，以改善响应时间并节省带宽。在边缘计算中，关键数据处理发生在数据源，而不是集中的云端位置。边缘计算通过在
    IoT 网关自身执行重要任务来解决数据传输架构的低效难题。采用边缘计算技术构建的网关被称为智能 IoT 网关。


    因此，从本质上讲，在 OT 端，当我们更多地谈论智能 IoT 网关时，它实际上就像管理一件事一样轻松地管理数百万台设备，此外还要消费来自设备的所有数据，提炼洞察，然后基于这些洞察执行操作。对于智能
    IoT 网关而言，关键在于管理边缘的易失数据，并且仅将那些从长期来看实际需要存储或用于在非常专业的数据上执行分析的数据移动到 IoT 云平台。


    ## 智能 IoT 网关


    边缘计算获得重视的原因之一是因为它可以避免高延迟，有时甚至可以降低存储成本。


    有些用例涉及个人的生死，例如在医疗保健领域，在这些用例中，人们的生命、安全和巨额资金都处于风险之中。这些是企业寻求几乎零延迟的例子，因此没有意愿将所有数据传回云端进行处理。企业需要通过使用智能
    IoT 网关，尽可能快地在数据源处处理数据。智能 IoT 网关应能够提供我们传统上期望从云端或数据中心的 IoT 平台获得的那种高功率、高性能和低延迟。


    智能 IoT 网关应能够执行从外部管理 OT 和从内部管理 IT 的任务。这意味着，在一个 IoT 用例中，企业需要处理多种不同类型的设备，并且每个行业使用不同的设备。楼宇管理中所用的设备与汽车行业或制药环境中使用的设备截然不同。这些设备使用多种协议和输入/输出，并且它们将在未来许多年中与我们共存。IoT
    解决方案必须与这些设备和协议共存。这意味着智能 IoT 网关应能够支持并与此类海量 OT 设备进行通信，以便企业能够从这些设备中检索所有数据——因此，智能
    IoT 网关的第一个预期特性是具备正确的连接能力，以便能够连接并与任何类型的设备进行通信。


    第二个方面是，这些智能 IoT 网关不会放置在数据中心、办公桌下或家庭环境中。这些设备需要非常坚固耐用，因为它们可能必须放置在高温环境下的风车或锅炉房中，这些环境并不十分友好，同时，它们必须使用寿命长，并在此类条件下高效运行。通常，网关会成为
    IoT 架构中任务关键的部分，因为大多数使用 IoT 的企业将依赖这些设备来预测未来，因此这些网关的任何停机都可能导致业务问题。


    总之，当企业在筛选 IoT 网关时，他们需要首先根据其企业内拥有的设备来查看网关支持的协议。IoT 网关应能够连接企业环境中的多种类型设备（包括旧式设备），其次，它们需要足够坚固，以便企业能够在苛刻和恶劣的环境中部署这些
    IoT 网关，例如高温或多尘的地点。


    一些 IoT 用例需要网关持续连接设备，并且能够根据从这些设备接收的数据做出时间敏感和实时的决策。在这种情况下，引入延迟是不可接受的，而延迟通常发生在数据往返于云端传输时。这意味着
    IoT 网关应能够执行分析和做出实时决策。


    最后，也是最重要的一点是安全性。许多行业，如医疗保健、制药、银行和金融服务，都受到监管，对于所有这些企业而言，数据必须保持在场内，因此 IoT 网关应具备存储数据的能力。'
- fmt: '市场上有大量的物联网网关，根据企业的特定需求选择正确的网关对于物联网之旅的成功至关重要。物联网网关对物联网解决方案的成功部署有重大影响。由于网关选择不当，相当高比例的物联网项目会面临实施和可扩展性问题。因此，需要根据企业希望实现的物联网用例，仔细评估并选择合适的网关。


    ## 选择正确的智能物联网网关


    选择正确的网关取决于多个因素，并基于企业选择实施的用例。七个关键考量因素如图[6-2](#517610_1_En_6_Chapter.xhtml#Fig2)所示。


    ![../images/517610_1_En_6_Chapter/517610_1_En_6_Fig2_HTML.jpg](images/517610_1_En_6_Chapter/517610_1_En_6_Fig2_HTML.jpg)


    图6-2

    选择智能物联网网关的七个考量因素


    ### 数据大小与存储能力


    许多工业物联网用例需要部署数百个传感器，在某些情况下，一个地点可能部署超过一万个传感器，每个传感器每秒采集并传输数百次读数。分析数据量是网关选择过程中的重要一步。其次，许多网关供应商对可加载到物联网网关上的设备数量有限制，安装多个物联网网关来实现规模化可能并非最明智的解决方案。


    部署在工厂中的工业网关通常每秒钟收集多个传感器读数。然而，可能会出现网络故障等情况，因此网关需要在网络问题修复期间将数据本地存储。


    目前市场上大多数网关型号都具有存储能力，但在典型工业环境中安装的网关需要能够存储大量数据，并且存储时间更长。因此，建议选择允许扩展存储的网关。


    ### 物联网网关级别的数据处理能力是另一项要求


    我们曾讨论过，传统的物联网网关处理从传感器或物联网设备收集的数据的能力非常有限。许多传统网关制造商会开发不具备数据处理或数据存储能力的网关，这意味着所有数据都需要发送到数据中心或云端进行处理。现在，随着物联网用例的新需求，边缘端的数据处理已成为一项要求，因此智能物联网网关成为常态。


    在大多数物联网解决方案中，并非所有来自传感器的数据都需要发送到云端进行处理。网关需要在将数据发送到云端进行大规模分析处理或数据存储之前，对从传感器获取的数据执行一些预处理操作。


    需要根据企业需求选择合适的网关。


    ### 物联网网关的坚固性


    一些企业需要将网关安装在暖通空调（HVAC）机组或高海拔地区，因此网关需要足够坚固，能够在极端条件下运行。


    某些网关型号设计用于在严苛条件下运行，例如温度范围为 –30°C 到 70°C，海拔范围为 15 米到 5000 米，并能承受高冲击和振动情况。企业需要确保选择适合其运行环境的网关。


    ### 互操作性（连接性要求）


    许多物联网平台利用近距离连接选项，例如蓝牙和以太网，而 Wi-Fi 和无线局域网则用于更远距离的连接需求。随着物联网在工业环境中的兴起，几乎所有企业都选择使用智能手机远程监控其工厂或车间的运营。有一些智能物联网网关型号确实支持更广范围的连接选项，以连接到移动设备。然而，并非所有物联网网关在这方面都同样出色，一般来说，网关价格越低，提供的连接选项就越少，这是一个需要考虑的重要因素。


    作为一般规则，网关除了支持企业内设备使用的协议外，还应支持标准协议，如`TCP/IP`和`HTTP`。更具体地说，在工业物联网背景下，除了协议连接外，网关还必须能够与以下系统进行集成和互操作：


    *   企业资产管理（EAM）

    *   计算机化维护管理系统（CMMS）

    *   车队管理

    *   基于状态的维护（CBM）

    *   制造执行系统（MES）

    *   维护、维修和大修（MRO）

    *   产品生命周期管理（PLM）

    *   应用组合管理（APM）

    *   现场服务管理（FSM）

    *   楼宇管理系统（BMS）


    ### 安全性


    保护网关安全对于整个物联网平台[至关重要](https://www.techrepublic.com/article/9-best-practices-to-improve-security-in-industrial-iot/)。虽然大多数现代网关都内置了安全选项，但仍需检查网关使用的加密标准、网关是否提供强认证过程，以及网关是否能检测篡改。此外，选择在物联网网关级别进行设备管理的企业需要了解产品在设备管理方面提供的安全解决方案。诸如空中升级（`SOTA`）或安全的`DTLS`数据加密等功能是设备管理中必须具备的特性。


    空中升级（`SOTA`）更新是一种通过无线方式安全地向设备交付新软件、固件或其他数据的方式。数据报传输层安全（`DTLS`）使企业能够加密在设备和智能物联网网关之间发送的数据包。


    ### 遗留设备集成


    许多企业拥有无法替换的遗留设备，这在制造业和医疗保健行业等工业环境中尤为普遍。


    遗留设备基于传统的连接方式运行，因此需要选择能够与这些遗留设备通信的合适网关。


    工厂使用的遗留设备和机械寿命较长。为了直接连接到互联网而升级或替换这些设备，在经济上通常不可行或不可能。在这些情况下，网关应能够连接这些遗留设备，以确保来自工厂的所有数据都能被集成。


    ### 可扩展性


    可扩展性将是应对物联网（IoT）爆发式增长的关键。智能物联网网关必须能够在不降低服务质量的前提下，支持不断增长的连接设备数量、用户数量、应用特性和分析能力。'
  raw: 'There are loads of IoT Gateways that are in the market, and choosing the right
    Gateway based on the enterprise-specific needs is extremely important to be successful
    in an IoT journey. An IoT Gateway has a major impact on the successful deployment
    of an IoT solution. A significant percentage of IoT projects face implementation
    and scalability issues due to the incorrect choice of Gateway. There is a need
    to carefully evaluate the right Gateway based on the IoT use cases enterprises
    desire to implement.


    ## Choosing the Right Smart IoT Gateway


    Choosing the right Gateway depends on several factors and is based on the use
    cases enterprises choose to implement. The seven key considerations are depicted
    in Figure [6-2](#517610_1_En_6_Chapter.xhtml#Fig2).


    ![../images/517610_1_En_6_Chapter/517610_1_En_6_Fig2_HTML.jpg](images/517610_1_En_6_Chapter/517610_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Seven considerations for choosing a Smart IoT Gateway


    ### Data Size and Storage Capability


    Many industrial IoT use cases require the deployment of hundreds of sensors, and
    in some cases there may be over ten thousand sensors at one location, and each
    sensor takes and transmits hundreds of readings per second. Analyzing the data
    volumes is an important step in the Gateway selection process. Secondly, many
    Gateway vendors have a limit to the number of devices that can be loaded on an
    IoT Gateway, and installing multiple IoT Gateways to achieve the scale may not
    be the wisest solution.


    Industrial Gateways deployed in factories usually collect multiple sensor readings
    every second. However, situations such as network failures may arise, and as a
    result the Gateway will need to store this data locally while the network issues
    are being remedied.


    Most Gateway models currently available on the market have storage capabilities,
    but a Gateway installed in the typical industrial setting needs to be able to
    store a significant amount of data and for longer periods of time. It is advisable
    therefore to choose a Gateway that allows for expansion of storage.


    ### Data Processing Capability at the IoT Gateway Level Is Another Mandate


    We discussed that traditional IoT Gateways had very limited capabilities to process
    data that is collected from the sensors or IoT devices. Many traditional Gateway
    manufacturers have developed their Gateways with zero processing or data storage
    capability at the Gateway, which means that all data need to be sent to the data
    centers or cloud for processing. Now with the new demands from IoT use cases,
    data processing at the edge is a mandate, and hence Smart IoT Gateways become
    the norm.


    In most IoT solutions, not all the data from the sensors is required to be sent
    to the cloud for processing. It is required that a Gateway performs some preprocessing
    operations on the data obtained from the sensors before it sends the data to the
    cloud either for large-scale analytical processing or for data storage.


    Based on the enterprise need, appropriate Gateways need to be selected.


    ### Ruggedness of the IoT Gateway


    Some enterprises need Gateways to be installed in an HVAC (Heating, Ventilation,
    and Air Conditioning) unit or at high altitudes, and, as a result, the Gateways
    would need to be robust and able to operate in extreme conditions.


    Some Gateway models are designed to operate in harsh conditions of temperature
    ranges of –30° C to 70° C, altitude ranges of 15 m to 5000 m, and allow for high
    shock and vibration situations. Enterprises need to ensure that they select a
    Gateway that is suitable for their operating environment.


    ### Interoperability (Connectivity Requirement)


    Many IoT platforms utilize close-range connectivity options, such as Bluetooth
    and Ethernet, while Wi-Fi and Wireless LAN are used for longer-range connectivity
    needs. With the surge of IoT in industrial settings, almost all enterprises are
    choosing to monitor operations in their factories or plants remotely using their
    smartphones. There are Smart IoT Gateway models which do accommodate wider-range
    connectivity options to connect to mobile devices. However, not all IoT Gateways
    are created equal in this respect, and, generally, the less expensive the Gateway,
    the fewer connectivity options are provided, which is an important factor to consider.


    As a general rule, standard protocols such as TCP/IP and HTTP should be supported
    by the Gateways in addition to the protocols which are used by devices within
    the enterprise. More specifically in an Industrial IoT context, apart from protocol
    connectivity, the Gateways must be able to integrate and interoperate with systems
    such as


    *   Enterprise asset management (EAM)


    *   Computerized maintenance management systems (CMMSs)


    *   Fleet management


    *   Condition-based maintenance (CBM)


    *   Manufacturing execution systems (MES)


    *   Maintenance, repair, and operations (MRO)


    *   Product life cycle management (PLM)


    *   Application portfolio management (APM)


    *   Field service management (FSM)


    *   Building management systems (BMSs)


    ### Security


    Securing Gateways is [critical](https://www.techrepublic.com/article/9-best-practices-to-improve-security-in-industrial-iot/)
    for the entire IoT platform. While most modern Gateways have built-in security
    options, it is still required to check the encryption standards the Gateway is
    using, whether the Gateway provides strong authentication processes as well as
    whether the Gateway can detect tampering. In addition, enterprises which choose
    to perform Device Management at the IoT Gateway level need to understand the security
    solutions the product offers from a Device Management perspective. Functionalities
    such as over-the-air software upgrades (SOTA) or secure DTLS data encryption are
    must-have features in Device Management.


    An over-the-air (SOTA) update is the secured wireless delivery of new software,
    firmware, or other data to devices. Datagram Transport Layer Security (DTLS) enables
    enterprises to encrypt data packets that are sent between devices and Smart IoT
    Gateways.


    ### Legacy Device Integration


    Many enterprises have legacy devices that cannot be replaced, and these are true
    especially in an industrial setting such as manufacturing and in the healthcare
    industry.


    Legacy devices operate on legacy connectivity, and the right Gateway needs to
    be chosen that can communicate with legacy devices.


    Factories use legacy equipment and machinery with long life spans. It is often
    not economically viable or possible to upgrade or replace these devices in order
    to connect to the Internet directly. In these cases, the Gateway should be able
    to connect with this legacy equipment in order to ensure that all the data from
    the factory is integrated.


    ### Scalability


    Scalability will be key to handling the explosive growth in the Internet of Things
    (IoT). Smart IoT Gateways must have the ability to support an increasing number
    of connected devices, users, application features, and analytics capabilities,
    without any degradation in the quality of service.'
  trans: '

    市场上有大量的物联网网关，根据企业的特定需求选择正确的网关对于物联网之旅的成功至关重要。物联网网关对物联网解决方案的成功部署有重大影响。由于网关选择不当，相当高比例的物联网项目会面临实施和可扩展性问题。因此，需要根据企业希望实现的物联网用例，仔细评估并选择合适的网关。


    ## 选择正确的智能物联网网关


    选择正确的网关取决于多个因素，并基于企业选择实施的用例。七个关键考量因素如图 6-2 所示。


    ![../images/517610_1_En_6_Chapter/517610_1_En_6_Fig2_HTML.jpg](img/517610_1_En_6_Fig2_HTML.jpg)


    图 6-2

    选择智能物联网网关的七个考量因素


    ### 数据大小与存储能力


    许多工业物联网用例需要部署数百个传感器，在某些情况下，一个地点可能部署超过一万个传感器，每个传感器每秒采集并传输数百次读数。分析数据量是网关选择过程中的重要一步。其次，许多网关供应商对可加载到物联网网关上的设备数量有限制，安装多个物联网网关来实现规模化可能并非最明智的解决方案。


    部署在工厂中的工业网关通常每秒钟收集多个传感器读数。然而，可能会出现网络故障等情况，因此网关需要在网络问题修复期间将数据本地存储。


    目前市场上大多数网关型号都具有存储能力，但在典型工业环境中安装的网关需要能够存储大量数据，并且存储时间更长。因此，建议选择允许扩展存储的网关。


    ### 物联网网关级别的数据处理能力是另一项要求


    我们曾讨论过，传统的物联网网关处理从传感器或物联网设备收集的数据的能力非常有限。许多传统网关制造商会开发不具备数据处理或数据存储能力的网关，这意味着所有数据都需要发送到数据中心或云端进行处理。现在，随着物联网用例的新需求，边缘端的数据处理已成为一项要求，因此智能物联网网关成为常态。


    在大多数物联网解决方案中，并非所有来自传感器的数据都需要发送到云端进行处理。网关需要在将数据发送到云端进行大规模分析处理或数据存储之前，对从传感器获取的数据执行一些预处理操作。


    需要根据企业需求选择合适的网关。


    ### 物联网网关的坚固性


    一些企业需要将网关安装在暖通空调（HVAC）机组或高海拔地区，因此网关需要足够坚固，能够在极端条件下运行。


    某些网关型号设计用于在严苛条件下运行，例如温度范围为 –30°C 到 70°C，海拔范围为 15 米到 5000 米，并能承受高冲击和振动情况。企业需要确保选择适合其运行环境的网关。


    ### 互操作性（连接性要求）


    许多物联网平台利用近距离连接选项，例如蓝牙和以太网，而 Wi-Fi 和无线局域网则用于更远距离的连接需求。随着物联网在工业环境中的兴起，几乎所有企业都选择使用智能手机远程监控其工厂或车间的运营。有一些智能物联网网关型号确实支持更广范围的连接选项，以连接到移动设备。然而，并非所有物联网网关在这方面都同样出色，一般来说，网关价格越低，提供的连接选项就越少，这是一个需要考虑的重要因素。


    作为一般规则，网关除了支持企业内设备使用的协议外，还应支持标准协议，如`TCP/IP`和`HTTP`。更具体地说，在工业物联网背景下，除了协议连接外，网关还必须能够与以下系统进行集成和互操作：


    *   企业资产管理（EAM）

    *   计算机化维护管理系统（CMMS）

    *   车队管理

    *   基于状态的维护（CBM）

    *   制造执行系统（MES）

    *   维护、维修和大修（MRO）

    *   产品生命周期管理（PLM）

    *   应用组合管理（APM）

    *   现场服务管理（FSM）

    *   楼宇管理系统（BMS）


    ### 安全性


    保护网关安全对于整个物联网平台[至关重要](https://www.techrepublic.com/article/9-best-practices-to-improve-security-in-industrial-iot/)。虽然大多数现代网关都内置了安全选项，但仍需检查网关使用的加密标准、网关是否提供强认证过程，以及网关是否能检测篡改。此外，选择在物联网网关级别进行设备管理的企业需要了解产品在设备管理方面提供的安全解决方案。诸如空中升级（`SOTA`）或安全的`DTLS`数据加密等功能是设备管理中必须具备的特性。


    空中升级（`SOTA`）更新是一种通过无线方式安全地向设备交付新软件、固件或其他数据的方式。数据报传输层安全（`DTLS`）使企业能够加密在设备和智能物联网网关之间发送的数据包。


    ### 遗留设备集成


    许多企业拥有无法替换的遗留设备，这在制造业和医疗保健行业等工业环境中尤为普遍。


    遗留设备基于传统的连接方式运行，因此需要选择能够与这些遗留设备通信的合适网关。


    工厂使用的遗留设备和机械寿命较长。为了直接连接到互联网而升级或替换这些设备，在经济上通常不可行或不可能。在这些情况下，网关应能够连接这些遗留设备，以确保来自工厂的所有数据都能被集成。


    ### 可扩展性


    可扩展性将是应对物联网（IoT）爆发式增长的关键。智能物联网网关必须能够在不降低服务质量的前提下，支持不断增长的连接设备数量、用户数量、应用特性和分析能力。

    '
- fmt: '# IoT Gateway Comparisons


    There are several companies existing in the market today that specialize in Smart
    IoT Gateways. In the context of this book, we will be discussing about commercial
    and Industrial IoT vendors.


    Commercial IoT targets our daily environment outside of the home (consumer IoT).
    There is a set of applications that can be deployed in places we frequently visit,
    such as commercial office buildings, supermarkets, stores, hotels, healthcare
    facilities, or entertainment venues.


    Industrial IoT Gateways are rugged by design and intended for critical systems
    and industrial environments.


    Almost all industrial and commercial IoT solutions require Smart IoT Gateways
    because many IoT devices like sensors and actuators cannot connect to IT infrastructure.
    Device constraints such as small physical size, legacy protocols, extreme environmental
    conditions, remote locations, battery power, fast response time, and low cost
    require fit-for-purpose Smart IoT Gateways to perform protocol translations and
    enable data communication between devices. Another important function which Smart
    IoT Gateways perform is local analytics at the Gateway level, thereby shortening
    response times, improving reliability, and reducing upstream bandwidth. Another
    most crucial function required in Smart IoT Gateways is security. Very few IoT
    devices have enterprise-grade security, and especially legacy devices were never
    built keeping cyber security in view. Smart IoT Gateways should enable firewall
    protection that can insulate these vulnerable devices from enterprise assets and
    also from threats on the open Internet.


    While the IoT market is still evolving, Dell and HPE have the most powerful commercial
    Smart IoT Gateways and are currently considered the market leaders. These Gateways
    are most relevant for enterprises that are looking for a lot of computation and
    bandwidth, such as implementing video surveillance. Dell has recently launched
    a bundle package around video surveillance. In general, any Gateway that can handle
    a video’s density of data points can also handle factory automation, as well as
    predictive analytics. Some versions of Dell and HP IoT Gateways accommodate AI
    and machine learning as well.


    ## Hewlett Packard Enterprise


    Recognizing the commoditization of the IoT Gateway market at the low end, HPE
    has reserved its `Edgeline` brand for its self-sufficient Converged Edge Systems.
    These Gateways aggregate sensor data, convert it, and send it to the cloud for
    further processing. These Gateways also perform automated decision-making, storage,
    and control at the Gateway level. HPE’s `EL1000` and `EL4000` Converged Edge Systems
    are examples of Gateways offered by HPE.


    ## Dell


    Dell offers the `Edge Gateway 5000 Series`, a ruggedized Gateway with a dual-core
    Atom processor for local analytics. An Atom processor is an ultra-low-voltage
    microprocessor by Intel Corporation designed to reduce electric consumption and
    power dissipation in comparison with ordinary processors of the Intel Core series.


    `Edge Gateway 5000 Series` are engineered for industrial ranges of temperature,
    dust, and humidity. They are offered with operating systems such as Linux 0, Ubuntu
    Snappy, or Windows 10.


    Though Dell and HP lead the IoT Gateway space, there are other mid-range IoT Gateway
    vendors who specialize in specific industries and use cases, some examples of
    which are mentioned in the following.


    ## AAEON


    AAEON offers four IoT Gateways for outdoor applications supporting low-power LoRa
    wireless networking as well as 4G and LTE cellular.


    With wide operating temperatures, waterproof connectors, and resistance to dust,
    AAEON Gateways are aimed at energy metering, transportation, and other outdoor
    applications.


    ## Digi International


    Digi International is an American Industrial Internet of Things technology company
    headquartered in Hopkins, Minnesota.


    Gateways such as `SmartSense` from Digi International are developed for specific
    verticals, such as food service and hospitality, facilities management, education,
    healthcare, transportation and logistics, and retail. For these verticals, `SmartSense`
    Gateways work well with protocols such as Wi-Fi and Bluetooth Low Energy.


    ## Huawei


    Huawei has specialized Gateways that cater to the video surveillance and smart
    city applications, such as streetlights and metering.


    # Summary


    In this chapter, we started by discussing about the challenges which enterprises
    face while embarking on the IoT journey and how these can be mitigated – these
    are challenges such as security, data volumes, diverse products and platforms,
    challenges with IT and OT integration, and lack of standardized communication
    protocols and methodology to derive ROI for IoT projects.


    We then discussed the seven factors that play a major role in selecting the right
    Smart IoT Gateway for IoT use cases, which are listed as follows:


    1. Data size and storage


    2. Data processing capability of the IoT Gateway


    3. Ruggedness of the IoT Gateway


    4. Interoperability


    5. Security


    6. Gateway integration capabilities with legacy devices


    7. Scalability


    We then discussed that Smart IoT Gateways should be capable of supporting the
    magnitude of OT devices so that enterprises can retrieve data from all devices
    that are part of the enterprise OT ecosystem. Apart from the scale, while most
    modern Gateways have built-in security options, it is still required to check
    the encryption standards the Gateway uses – whether the Gateway provides strong
    authentication processes as well as whether the Gateway can detect tampering.
    Very few IoT devices have enterprise-grade security, and since legacy devices
    were never built keeping cyber security in view, Smart IoT Gateways should have
    firewall protection that can insulate these vulnerable devices from enterprise
    assets and also from threats on the open Internet.


    In the next chapter, we will discuss about the IoT Cloud Platform, which is the
    heart of the IoT Standards Reference Model.


    Footnotes [1](#517610_1_En_6_Chapter.xhtml#Fn1_source)   [2](#517610_1_En_6_Chapter.xhtml#Fn2_source)   [3](#517610_1_En_6_Chapter.xhtml#Fn3_source)'
