- "# 7. 星际文件系统\n\n星际文件系统^(²³)（IPFS）是一种协议和点对点网络，允许在分布式文件系统中存储和共享数据。IPFS 采用内容寻址来区分一个连接所有计算设备的全局命名空间中的每个文件。\n\
  \n在本章结束时，你将能够执行以下操作：\n\n- 安装 IPFS 节点包并初始化一个节点\n- 查看 IPFS 节点对等点\n- 测试和探索 IPFS 节点\n\
  - 向 IPFS 添加文件\n- 在控制台上查看文件内容并在 Web UI 中检查文件\n- 直接在浏览器中查看文件内容\n- 安装 IPFS 浏览器扩展\n\
  - 配置 IPFS 节点类型并启动一个节点\n- 将文件导入 IPFS 节点\n- 启动本地 IPFS 节点并向其添加文件\n- 检查已添加的文件并验证文件是否已被固定\n\
  - 手动固定文件\n- 在 Pinata 上设置 API 密钥\n- 将 Pinata 设置为远程服务\n- 将文件固定到远程 IPFS 节点，并解除固定\n\
  - 登录 Fleek\n- 克隆现有仓库\n- 安装并初始化 Fleek 包\n- 将站点部署到 Fleek\n\n\n\n## 创建您的 IPFS 节点\n\n\
  现在，让我们使用命令行创建一个 IPFS 节点，并上传您的第一个文件。\n\n### 安装节点\n\n使用 Choco 包管理器安装 IPFS。^((24))\
  \ `go-ipfs` 包是用 Go 语言实现的 IPFS 版本。\n\n```\n$ choco install go-ipfs\n```\n\n### 配置节点\n\
  \n初始化 IPFS 本地仓库。\n\n```\n$ ipfs init\n```\n\n启动 IPFS 本地服务器。`daemon` 命令会在 `127.0.0.1:5001`\
  \ 上启动一个 IPFS 本地服务器。\n\n```\n$ ipfs daemon\n```\n\n### 测试节点\n\n您可以通过显示与您的节点直接连接的对等点来测试\
  \ IPFS 节点。\n\n```\n$ ipfs swarm peers\n```\n\n您还可以使用 `cat` 命令并将哈希值作为参数传递来查看一些 IPFS\
  \ 文件内容（图 7-1）。\n\n![](img/521550_1_En_7_Fig1_HTML.jpg)\n\n这是一张 IPFS 命令输出的截图，显示已打开的终端标签页并附带了链接。下方文字显示“Hello\
  \ and Welcome to IPFS”，其中 IPFS 字体较大且样式化。底部文字显示“If you're seeing this, you have successfully\
  \ installed IPFS and are now interfacing with the ipfs merkledag”。\n\n**图 7-1**\
  \ IPFS `cat` 命令的输出\n\n```\n$ ipfs cat\n```\n\n### 探索您的 IPFS 节点\n\n打开浏览器，访问 Web UI\
  \ 地址 `http://127.0.0.1:5002/`。您的节点已连接到 IPFS！现在，点击“Files”并注意，这里还没有任何文件（图 7-2）。\n\n\
  点击“Explore”，然后点击“Peers”。这些是您连接到的对等点。最后，点击“Settings”。您可以在该界面看到节点设置。\n\n![](img/521550_1_En_7_Fig2_HTML.png)\n\
  \n这是一张 IPFS Web UI 的截图，包含以下图标：Status、Files（鼠标悬停在此）、Explore、Peers 和 Settings。在 Files\
  \ 窗口中，显示一条提示：“No files here yet! Add files to your local IPFS node by clicking the\
  \ Import button above.”。右上角区域包含导入按钮及其他详细信息。\n\n**图 7-2** IPFS Web UI\n\n## 向 IPFS\
  \ 添加文件\n\n运行 IPFS 的计算机可以向其连接的所有对等点询问它们是否拥有具有特定哈希值的文件，如果某个对等点拥有该文件，则该对等点会发回整个文件。如果没有一个简短且唯一的标识符（例如加密哈希值），这是不可能实现的。\n\
  \n### 添加文件\n\n启动 IPFS 本地服务器。`daemon` 命令会在 `127.0.0.1:5001` 上启动一个 IPFS 本地服务器。\n\n\
  ```\n$ ipfs daemon\n```\n\n现在，使用 `echo` 命令创建一个名为 `hello.txt` 的新文件。该命令会将给定的文本输出到一个新文件中。\n\
  \n```\n$ echo \"test\" hello.txt\n```\n\n使用 `ipfs add` 命令将新创建的文件添加到您的本地 IPFS 节点。\n\
  \n```\n$ ipfs add hello.txt\n```\n\n该文件已添加到 IPFS，并生成一个哈希标识符。\n\n### 在控制台上查看文件内容\n\
  \n您可以使用 `ipfs cat` 命令加上哈希值来查看这个新添加文件的内容。为此，请将 `<your_hash>` 代码片段替换为上一步中通过命令“`ipfs\
  \ add hello.txt`”生成的结果哈希标识符。\n\n```\n$ ipfs cat\n```\n\n运行此命令后，文件内容将显示在终端上。\n\n\
  ### 在 Web UI 中检查文件\n\n转到 `http://127.0.0.1:5001/webui` 并点击“Files”。然后，点击“Pins”并复制哈希值。使用此哈希值进行搜索，您将看到该哈希值已存在。\n\
  \n### 在浏览器中查看文件内容\n\n打开一个新标签页，访问 `ipfs://<your_hash>`。现在您可以在浏览器中看到您的文件内容。再次提醒，请将\
  \ `<your_hash>` 代码片段替换为通过命令“`ipfs cat <your_hash>`”为您的文件生成的结果哈希标识符。\n\n## 设置 IPFS\
  \ 浏览器扩展\n\nIPFS Companion 扩展^((25)) 允许您在首选浏览器内本地运行一个 IPFS 节点，支持 `ipfs://` 地址、网站和文件路径的自动\
  \ IPFS 网关加载、简单的 IPFS 文件导入和共享等功能。\n\n### 安装浏览器扩展\n\n访问 IPFS Companion 扩展^((26)) 页面，然后点击“Add\
  \ to Brave”或您浏览器的名称。点击“Add extension”，然后点击“Extensions”图标。最后，将 IPFS Companion 扩展固定在扩展栏上。\n\
  \n### 配置节点类型\n\n点击 IPFS Companion 图标，然后点击齿轮图标。对于“IPFS Node Type”，选择“External”。\n\
  \n### 启动外部节点\n\n打开 Visual Studio Code，并新建一个终端。启动一个新的 IPFS 本地服务器。\n\n```\n$ ipfs\
  \ daemon\n```\n\n### 导入文件\n\n点击 IPFS Companion 图标，然后点击“Import”。点击“Pick a file”并从本地磁盘中选择一个文件。该文件将存储在您的\
  \ IPFS 节点中。\n\n## 在本地节点上固定和取消固定 IPFS 文件\n\n数据可以固定到一个或多个 IPFS 节点，以确保它保留在 IPFS 上，并且在垃圾回收期间不会被删除。固定文件可以让您管理存储空间和数据保留策略。因此，您应该固定任何您希望永久保留在\
  \ IPFS 上的内容。IPFS 的默认行为是将文件固定到您的本地 IPFS 节点。\n\n### 启动本地节点\n\n启动 IPFS 本地服务器。`daemon`\
  \ 命令会在 `127.0.0.1:5001` 上启动一个 IPFS 本地服务器。\n\n```\n$ ipfs daemon\n```\n\n### 向节点添加文件\n\
  \n现在，使用 `echo` 命令创建一个名为 `hello.txt` 的新文件。该命令会将给定的文本输出到一个新文件中。\n\n```\n$ echo \"\
  world\" hello.txt\n```\n\n使用 `ipfs add` 命令将新创建的文件添加到您的本地 IPFS 节点。\n\n```\n$ ipfs\
  \ add hello.txt\n```\n\n该文件已添加到 IPFS，并生成一个哈希标识符。当您添加文件时，它会自动固定到您的本地节点。\n\n### 检查文件是否已添加\n\
  \n要检查文件是否已添加，您可以使用 `ipfs cat` 命令将文件内容输出到终端。\n\n```\n$ ipfs cat your_file_hash\n\
  ```\n\n### 验证文件已固定\n\n转到 `http://127.0.0.1:5001/webui`，点击“Files”，然后点击“Pins”。您的文件就在那里！\n\
  \n### 取消固定文件\n\n您可以使用以下命令简单地取消文件中您在本地 IPFS 节点的固定：\n\n```\n$ ipfs pin rm\n```\n\n\
  ### 手动固定文件\n\n您可以使用以下命令手动固定文件。请记住，您需要复制文件的哈希值才能固定或取消固定它。\n\n```\n$ ipfs pin add\n\
  ```\n\n完成！您的文件已再次被固定。\n\n\n\n## 使用 Pinata 在远程节点上固定与取消固定文件\n\n您还可以将文件固定到远程固定服务。这些第三方服务允许您将文件固定到它们运营的节点上，而非您自己的本地节点。您无需担心自己节点的磁盘空间或运行时间。\n\
  \n虽然您可以使用远程固定服务自身的图形用户界面、命令行或其他开发工具来管理固定到该服务的 IPFS 文件，但您也可以利用本地 IPFS 安装直接与固定服务交互，从而无需学习固定服务特有的\
  \ API 或其他工具。\n\n### 在 Pinata 上设置 API 密钥\n\n登录您的 Pinata 账户，进入 API 密钥页面。点击“新建密钥”，然后勾选“管理员”框。输入\
  \ `admin-cli` 作为密钥名称，最后点击“创建密钥”。系统将为您生成一个新密钥。请从此窗口中复制 JWT 值。\n\n### 在终端中将 Pinata\
  \ 设置为远程服务\n\n将 Pinata 添加为远程固定服务。将您的 JWT 粘贴到 `<your_jwt_key>` 部分中。\n\n```\n$ ipfs\
  \ pin remote service add pinata https://api.pinata.cloud/psa \n```\n\n列出所有现有的远程服务，并确认\
  \ Pinata 已包含在内。\n\n```\n$ ipfs pin remote service ls\n```\n\n### 向本地 IPFS 节点添加新文件\n\
  \n向您的 IPFS 本地节点添加一个新文件。\n\n```\n$ echo \"world\" > hello.txt\n$ ipfs add hello.txt\n\
  ```\n\n复制将文件添加到本地节点后生成的哈希标识符。\n\n### 将文件固定到远程 IPFS 节点\n\n使用以下命令固定您的文件。将文件哈希粘贴到 `<your_file_hash>`\
  \ 部分中。\n\n```\n$ ipfs pin remote add --service=pinata -name=hello.txt \n```\n\n\
  返回 Pinata 网站，点击“固定管理器”。您的文件将出现在此页面上！\n\n### 从远程 IPFS 节点取消固定文件\n\n使用以下命令取消固定您的文件。将文件哈希粘贴到\
  \ `<your_file_hash>` 部分中。\n\n```\n$ ipfs pin remote rm --service=pinata -name=hello.txt\
  \ \n```\n\n返回 Pinata 网站，点击“固定管理器”。您的文件将不再出现在此页面上；这意味着您的文件已被取消固定。\n\n## 使用 Fleek\
  \ 在 IPFS 上托管您的网站\n\nFleek 使您能够基于开放 Web 协议创建基础层架构。在无需信任、无需许可、开放的技术上创建并托管您的网站、应用、去中心化应用和其他服务，这些技术旨在实现用户控制、加密、私密、点对点的体验。\n\
  \n### 登录 Fleek\n\n访问 `https://fleek.co` 并使用您的账户登录；然后进入您的 VS Code 编辑器。\n\n### 克隆您现有的仓库\n\
  \n克隆一个包含示例代码的现有仓库。\n\n```\n$ git clone https://github.com/johnnymatthews/random-planet-facts\n\
  ```\n\n### 安装 Fleek\n\n安装 Fleek 命令行工具。\n\n```\n$ npm install -g @fleekhq/fleek-cli\n\
  ```\n\n登录到您的 Fleek 账户（系统将提示您在浏览器中完成流程）。\n\n```\n$ fleek login\n```\n\n### 初始化 Fleek\n\
  \n在当前目录中初始化 Fleek 站点。\n\n```\n$ fleek site:init\n```\n\n系统会要求您选择要使用的团队（使用方向键进行选择）。同时，选择要使用的站点。最后，选择用于部署的公共目录。\n\
  \n### 部署您的站点\n\n在您的 `publish` 目录中部署更改。\n\n```\n$ fleek site:deploy\n```\n\n返回 Fleek\
  \ 网站，点击“托管”，然后点击“在 IPFS 上验证”。这就是您在 IPFS 上托管的站点。您现在可以在线查看已部署的站点。\n\n返回“托管”并点击 `your-site.on.fleek.co`。这是您站点主机的友好地址（如图\
  \ 7-3 所示）。\n\n![截图展示了托管节点下打开的 frosty-hyphen-frog-8-1-5-8 文件夹。下方有两点：本地已部署和在 IPFS\
  \ 上验证。下一部分打开了概览选项卡，提供了两点：1. 站点已部署。2. 设置带 SSL 的自定义域名。](img/521550_1_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3** Fleek 托管概览\n\n## 总结\n\n在本章中，您学习了如何安装和创建 IPFS 节点，以及如何使用此协议管理文件。\n\n在下一章中，您将学习如何创建一个\
  \ Filecoin 项目。\n\n"
- '# 8. Filecoin


  发明并维护 IPFS 的同一家公司——协议实验室，创建了 Filecoin。它通过建立一个开源的去中心化存储网络扩展了 IPFS 的概念，并激励用户将数据固定到
  IPFS。


  Filecoin 的优越之处在于它提供了一种去中心化的存储解决方案，无需依赖大型的中心化存储方案。与纯基于 IPFS 的解决方案不同，Filecoin 节点有经济激励来保持活跃。


  在此示例中，我们将使用一个名为 `Lotus` 的 Filecoin 实现。它验证网络交易，管理 FIL 钱包，并可以执行存储和检索交易。


  在本章结束时，您将能够执行以下操作：


  - 创建一个 Filecoin 项目

  - 配置 Truffle 以使用 Filecoin 端点

  - 启动本地 Filecoin 服务器

  - 添加要保存在 Filecoin 上的图像




  ## 如何在 Filecoin 本地节点上保存文件


  为了在 Filecoin 中保存文件，你将学习如何从零开始创建一个项目并配置 Truffle，使其指向正确的地址。你将启动本地端点，最后通过命令行将一张图片添加到
  Filecoin。


  ### 创建项目


  在终端中，点击“新建终端”。现在，创建一个新文件夹来启动你的项目。


  ```

  $ mkdir create filecoin

  ```


  ### 配置 Truffle


  创建 `truffle-config.js` 文件。


  ```

  $ touch truffle-config.js

  ```


  在该文件中，配置 IPFS 和 Filecoin lotus 服务器的文件设置。设置以下值：


  *   将 IPFS 地址设置为 `http://127.0.0.1:5001`。

  *   将 Filecoin 地址设置为 `http://localhost:7777/rpc/v0`。


  稍后你将使用 Ganache Filecoin 来启动这些端点。


  ```

  module.exports = {

  environments: {

  development: {

  ipfs: {

  address: "http://127.0.0.1:5001",

  },

  filecoin: {

  address: "http://localhost:7777/rpc/v0",

  storageDealOptions: {

  epochPrice: "2500",

  duration: 518400,

  }

  },

  }

  }

  };

  ```


  ### 添加要保存的图片


  创建 `badge` 文件夹。


  ```

  $ mkdir badge

  ```


  进入 `badge` 根文件夹。


  ```

  $ cd badge

  ```


  下载你将用于保存到 Filecoin 的图片。你也可以在此文件夹中复制并粘贴一张现有图片。`curl` 命令用于通过 URL 语法传输数据。


  ```

  $ curl https://planouhost.z15.web.core.windows.net/badge.png > badge-image.png

  ```


  ### 安装依赖项


  使用 Filecoin 标签安装基础 Ganache 包。


  ```

  $ npm install ganache@filecoin

  ```


  安装 Filecoin 对等依赖包。


  ```

  $ npm install @ganache/filecoin

  ```


  使用 Ganache 启动 Lotus 和 IPFS 本地服务器。它还会创建 10 个开发账户，每个账户拥有 100 Filecoins (FIL)。


  ### 启动本地端点


  在本地启动 Ganache Filecoin。


  ```

  $ npx ganache filecoin

  ```


  ### 将文件保存到 Filecoin


  打开一个新的终端，保存 `badge` 文件夹。


  ```

  $ truffle preserve ./badge/ --filecoin

  ```


  如果一切顺利，输出将如下所示：


  ```

  Preserving target: ./badge/

  ===========================

  Warning: multiple plugins found that output the label "ipfs-cid".

  ✓ Loading target...

  ✓ Reading directory ./badge/...

  ✓ Opening ./badge\badge-image.png...

  ✓ Preserving to IPFS...

  ✓ Connected to IPFS node at http://127.0.0.1:5001

  ✓ Uploading...

  Root CID: QmNjGGACAMpm718WjeM7oN3WJ5ntXKgwurH4mMivU6JXoS

  ./badge-image.png: QmemrBxhPpg8Hw9sPpAUTWRq3kNAFhCPKUDhMnc5U9KptS

  ✓ Preserving to Filecoin...

  ✓ Connected to Filecoin node at http://localhost:7777/rpc/v0

  ✓ Retrieving miners...

  ✓ Proposing storage deal...

  Deal CID: bafyreidrt2pvuh44umo7vzebnxnw46qzntneyojah6oym4ximokyzvwxgq

  ✓ Waiting for deal to finish...

  Deal State: StorageDealActive

  ```


  现在，你的图片已保存在本地 Filecoin 节点中！


  ## 总结


  在本章中，你学习了如何使用 Filecoin 保存文件。


  在下一章中，你将学习什么是 ENS 以及如何使用它。


  '
- '# 以太坊名称服务


  以太坊名称服务 (ENS) 允许用户使用简单名称而非冗长复杂的字母数字序列来发送和接收以太币，以及访问特定网站。


  在本章结束时，你将能够完成以下任务：


  *   在 ENS 网络上搜索域名

  *   注册一个可用的域名

  *   管理一个 ENS 注册名称

  *   检查 ENS 名称解析


  ## 注册你的 ENS 以在钱包中接收加密货币、代币或 NFT


  让我们在 ENS 中搜索一个可用的域名并注册它。接下来，你将通过注册页面管理地址。最后，你将检查域名是否正确地解析到已配置的地址。


  ### 搜索你的域名


  前往 ENS Domains^(²⁷) 页面，然后点击“启动应用程序”。搜索你想要注册的域名（例如，`planou.eth`）。检查注册期限（例如，至少一年）和注册价格。


  ### 注册你的名称


  点击“请求注册”。将打开一个 MetaMask 通知以确认交易。点击“确认”并等待交易在区块链上被确认。一旦确认，点击“注册”。将出现一个新的 MetaMask
  通知。再次点击“确认”并等待交易在区块链上被确认。


  ### 管理你的注册名称


  点击“管理名称”并向下滚动到“地址”。注意，ETH 地址被设置为了创建该域名的钱包，在本例中就是你的钱包（图 9-1）。


  ![](img/521550_1_En_9_Fig1_HTML.jpg)


  网页截图显示标题为“planou 点 e t h”，描述为“了解如何管理您的名称”。父字段设置为“e t h”，注册者和控制器设置为以 0 开头的字母数字字符串，过期日期设置为某个日期和时间，解析器设置为一个字母数字字符串。记录表列出了地址。


  **图 9-1** ENS 域名注册页面


  ### 检查名称解析


  点击你的 MetaMask 钱包，然后点击“发送”。输入你的 ENS 名称（例如，`planou.eth`）。注意，该名称已解析为一个钱包地址（图 9-2）。


  ![](img/521550_1_En_9_Fig2_HTML.jpg)


  “添加接收人”窗口的截图，顶部有 Rinkeby 测试网络下拉菜单。下方是“输入接收人”区域，其中输入了“planou 点 e t h”，光标悬停在下拉选项上以选择“planou
  点 e t h”，并显示部分十六进制代码。


  **图 9-2** MetaMask ENS 解析名称


  现在，你可以在交易中使用 ENS 名称作为接收方，而无需使用钱包的哈希地址。


  ## 总结


  在本章中，你了解了配置 ENS 域名是多么简单，并且学会了如何立即开始使用它。


  在下一章中，你将开始学习如何通过 Chainlink 使用预言机获取链下数据。


