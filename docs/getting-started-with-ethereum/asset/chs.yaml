  \ Gas 成本，该成本根据您在智能合约内部使用的指令来计算。这意味着您需要的机器处理越多，执行此合约的 Gas 成本就越高。您可以在[以太坊黄皮书](https://ethereum.github.io/yellowpaper/paper.pdf)中找到关于如何计算此费用的更详细解释。\n\
  \n### 在 PolygonScan 上验证智能合约\n\n复制部署中创建的合约地址（该地址将在 `truffle migrate` 运行完毕后显示在控制台中），然后前往\
