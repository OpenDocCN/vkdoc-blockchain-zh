  \ `100 E T H`。\n\n图 1-3  \n由 `Ganache` 生成的账户\n\n## 安装并设置 MetaMask 钱包\n\n`MetaMask`⁹\
  \ 是一款浏览器扩展，可让你访问支持以太坊的分布式应用（又称 DApps）。该扩展将以太坊 `Web3 API`¹⁰ 注入到每个网站的 `JavaScript`\
  \ 上下文中，从而使 DApps 能够从区块链读取数据。¹¹\n\n当 DApp 想要进行交易并将其发布到区块链时，`MetaMask` 会为用户提供一个安全界面，以便用户通过私钥、本地客户端钱包以及\
  \ `Trezor` 等硬件钱包批准或拒绝交易前对其进行评估。¹²\n\n### 安装钱包\n\n访问 [`https://metamask.io`](https://metamask.io)\
  \ 并点击“安装 MetaMask”。点击“添加到 Brave”或你的浏览器名称，然后点击“添加扩展”。最后，点击“开始使用”。\n\n### 配置钱包\n\n\
  点击“创建钱包”，然后点击“不，谢谢”（如果你愿意，也可以点击“我同意”）。定义用于打开钱包的密码，然后确认密码。同意使用条款。最后，点击“创建”。现在您可以备份您的秘密短语（也可以稍后操作）。暂时点击“稍后提醒我”。您的钱包就创建完成了！\n\
