  ## 在 OpenSea 上出售你的艺术品 NFT


  OpenSea 是一个数字商品市场，例如收藏品、游戏物品、数字艺术以及其他由以太坊等区块链支持的数字资产。你可以在 OpenSea 上与世界上任何人购买、出售和交易这些物品。


  ### 连接到 OpenSea


  前往 OpenSea^(²⁰)，确保你已连接到包含该 NFT 的钱包，并且你正在使用 Rinkeby 测试网络。


  ### 查看你的徽章


  前往**我的个人资料**。点击**活动**，然后点击徽章标题。这些就是你的徽章详细信息。详情页面允许你查看与徽章交易相关的各种信息。


  ### 挂牌出售你的徽章


  点击**出售**，然后点击**设置价格**。在**价格**中，设置你期望出售该 NFT 的价格。在此页面，你可以设置徽章的定价方式，并安排其在未来某个日期上架（图
  5-9）。


  ![](img/521550_1_En_5_Fig9_HTML.jpg)


  **唯一资产，我的徽章截图。** 它有*选择出售方式*的三个选项，分别为**设置价格**、**最高出价**和**捆绑**。它们下方是一个价格输入选项。**包含结束价格**、**安排在未来时间**和**隐私**带有开关选项。


  **图 5-9** OpenSea：徽章定价页面


  点击**发布你的清单**。你将被重定向到**摘要**页面（图 5-10）。在此页面，你可以看到出售徽章时将扣除的总费用。


  ![](img/521550_1_En_5_Fig10_HTML.jpg)


  **摘要页面截图。** 有 3 个部分：**清单**、**赏金**和**费用**。**清单**部分有**发布你的清单**以及一个可选选项。**赏金**和**费用**部分包含有关联盟客的说明和详细信息。**赏金**旁边有一个**编辑**按钮，**费用**下方有一个**了解更多**的链接。


  **图 5-10** OpenSea：徽章的摘要页面


  `MetaMask` 将被打开以验证交易（图 5-11）。点击**确认**。在此步骤中，你需要批准交易，该交易将确认你的徽章在平台上挂牌出售。


