  \ 3-16 所示。\n\n![](img/521550_1_En_3_Fig16_HTML.jpg)\n\nRopsten 测试网络中“安全与隐私”窗口的屏幕截图。屏幕上的短语显示“显示助记词”，并有一个带有光标的长按钮，上面也写着“显示助记词”。\n\
