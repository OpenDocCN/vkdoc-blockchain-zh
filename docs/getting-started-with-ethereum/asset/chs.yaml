  \n点击“显示助记词”并输入您的钱包密码以继续。复制私钥。\n\n返回 VS Code（在 `ganache-cli` 终端视图中）并创建一个名为 `.secret`\
  \ 的新文件。将私密的恢复短语粘贴到此文件中。\n\n### 部署智能合约\n\n运行 `migrate` 命令将合约部署到 `matic_testnet` 网络。\n\
  \n```\n$ truffle migrate --network matic_testnet\n```\n\n如果在终端上遇到此错误，您需要先从水龙头获取测试\
