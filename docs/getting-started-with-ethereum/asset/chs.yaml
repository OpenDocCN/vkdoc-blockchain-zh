- "# 3. ERC-20：同质化代币\n\n同质化代币是指每个单位都具有相同价值的代币，这与法定货币类似。这意味着您可以将一个单位的这种货币兑换成另一个单位的相同价值的货币。为了在区块链上复制这种行为，Fabian\
  \ Vogelsteller 和 Vitalik Buterin 于 2015 年 11 月提议创建 `ERC-20`，即“以太坊意见征求稿 20”，旨在为基于以太坊的代币创建一个简单的格式。这些代币在以太坊区块链内运作，并能够与网络上的其他加密货币进行交互。在本章中，您将创建遵循\
  \ `ERC-20` 标准的简单合约，并学习如何将它们部署到测试网和生产网络。\n\n在本章结束时，您将能够完成以下操作：\n\n- 编写一个遵循 `ERC-20`\
  \ 标准的简单合约。\n- 编写一个固定供应量的合约。\n- 使用 `OpenZeppelin` 继承关键实现。\n- 使用 `Truffle` 编译合约。\n\
  - 使用 `Ganache` 启动一个本地主机区块链。\n- 将现有合约部署到 `Ganache`。\n- 配置 `MetaMask` 以连接到 `Ganache`。\n\
  - 将已部署的代币合约添加到您的 `MetaMask` 钱包中。\n- 将合约迁移到 `Ganache`。\n- 在账户之间转移代币。\n- 将 `Polygon\
  \ Mumbai` 添加到 `MetaMask` 网络。\n- 在 `Infura` 上激活 `Polygon` 插件。\n- 配置私钥以签署合约。\n- 在\
  \ `Polygon Mumbai` 上部署智能合约。\n- 将 `Polygon 主网` 添加到 `MetaMask` 网络。\n- 配置网络以使用 `Polygon\
  \ 主网`。\n- 在 `Polygon 主网` 上部署智能合约。\n- 在 `Polygon 主网` 上验证智能合约。\n\n\n\n## 使用 OpenZeppelin\
  \ 编写一个简单的 ERC-20 代币\n\n让我们使用 `Truffle` 来开发一个简单的 ERC-20 以太坊智能合约，然后导入 `OpenZeppelin`\
  \ 合约库。\n\n`OpenZeppelin` 是一个开源且可审计的库，它允许你复用常见实现中的代码，从而作为一个始终如一的基础代码库。使用 `OpenZeppelin`\
  \ 可以让你更专注于编码业务需求，而不是重复编写不必要的代码。\n\n我们将在本示例以及本书的后续章节中使用 `OpenZeppelin` 库。\n\n代币在以太坊中可以代表几乎任何东西，例如：\n\
  \n- 在线平台中的声望值\n- 游戏中角色的技能\n- 彩票\n- 金融资产，如公司股票\n- 法定货币，如美元\n- 一盎司黄金\n\n### 准备环境\n\
  \n使用以下命令初始化 `Truffle`：\n\n```\n$ truffle init\n```\n\n现在，初始化项目文件夹。\n\n```\n$ npm\
  \ init\n```\n\n最后，安装 `OpenZeppelin` 合约包。\n\n```\n$ npm install @openzeppelin/contracts\n\
  ```\n\n### 编写合约\n\n在 `contracts` 文件夹下创建一个名为 `ERC20MinerReward.sol` 的新文件。添加许可证指令，定义\
  \ `Solidity` 最低版本，并导入 `OpenZeppelin` ERC-20 合约库。最后，定义合约类、合约构造函数、合约名称和合约符号。\n\n```solidity\n\
  // SPDX-License-Identifier: MIT\npragma solidity ⁰.8.0;\nimport \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
  ;\ncontract ERC20MinerReward is ERC20 {\nconstructor() ERC20(\"MinerReward\", \"\
  MRW\"){}\n}\n```\n\n### 设置 Solidity 编译器版本\n\n复制此合约中使用的 `Solidity` 版本，然后打开 `truffle-config.js`。取消注释\
  \ `solc` 块，并通过粘贴复制的值来设置 `Solidity` 版本。\n\n```javascript\ncompilers: {\nsolc: {\n\
  version: \"0.8.0\",\ndocker: true,\nsettings: {\noptimizer: {\nenabled: false,\n\
  runs: 200\n},\nevmVersion: \"byzantium\"\n}\n}\n},\n```\n\n### 编译合约\n\n现在是编译合约的时候了。\n\
  \n```\n$ truffle compile\n```\n\n合约编译成功！\n\n### 验证结果\n\n注意，创建了一个新的 `build/contract`\
  \ 文件夹（图 3-1）。新合约就在那里！\n\n![图 3-1 Truffle 编译结果](img/521550_1_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1** Truffle 编译结果\n\n## 将 ERC-20 代币部署到 Ganache 开发区块链\n\n以太坊 `Ganache` 是一个本地的内存区块链，专为开发和测试而设计。它模拟真实以太坊网络的特性，包括提供多个带有测试以太币的账户。\n\
  \n这是在将合约迁移到主网之前进行部署的一种好方法。使用开发区块链，你可以专注于实现，而无需担心花费真金白银来部署合约。\n\n### 准备迁移\n\n在 `migrations`\
  \ 文件夹下创建一个名为 `2_deploy_contracts.js` 的新迁移文件。在第一行中添加对智能合约的引用，并添加一个导出函数来部署智能合约（图 3-2）。\n\
  \n![图 3-2 新迁移文件](img/521550_1_En_3_Fig2_HTML.jpg)\n\n**图 3-2** 新迁移文件\n\n### 启动区块链\n\
  \n打开一个新终端并启动 `Ganache` 区块链。\n\n```\n$ ganache-cli\n```\n\n一个新的 `Ganache` 区块链正在 `127.0.0.1:8545`\
  \ 上监听。\n\n### 配置区块链网络\n\n打开 `truffle-config.js` 并从 `networks` 中取消注释 `development`\
  \ 块。确保 `host` 和 `port` 是正确的（图 3-3）。\n\n![图 3-3 开发网络](img/521550_1_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3** 开发网络\n\n### 部署合约\n\n使用以下命令编译合约：\n\n```\n$ truffle compile\n```\n\n使用以下命令迁移合约：\n\
  \n```\n$ truffle migrate\n```\n\n合约已部署到 `Ganache` 区块链，并创建了一个合约地址（图 3-4）。\n\n![图\
  \ 3-4 Truffle 迁移合约](img/521550_1_En_3_Fig4_HTML.jpg)\n\n**图 3-4** Truffle 迁移合约\n\
  \n### 将 Ganache 添加到 MetaMask 网络\n\n打开 `MetaMask` 扩展程序，然后点击网络下拉菜单。选择 `Custom RPC`\
  \ 选项并设置以下字段，如图 3-5 所示：\n\n![图 3-5 MetaMask 网络配置](img/521550_1_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5** MetaMask 网络配置\n\n- 将网络名称设置为 `Localhost 8545`。\n- 将 RPC URL 设置为 `http://localhost:8545`。\n\
  - 将链 ID 设置为 `1337`。\n- 将货币符号设置为 `ETH`。\n\n### 将代币添加到钱包\n\n转到 Brave 浏览器（或任何与 `MetaMask`\
  \ 兼容的浏览器），然后选择 `Localhost 8585` 网络。\n\n点击“添加代币”，然后点击“自定义代币”。复制合约地址。将其粘贴到“代币合约地址”字段。\n\
  \n“代币符号”和“精度位数”字段会自动填充。点击“下一步”，然后点击“添加代币”。代币已添加到 `MetaMask` 钱包中。代币就在那里！\n\n## 创建具有固定供应量的\
  \ ERC-20 代币\n\n智能合约中允许的代币总数由 ERC-20 固定供应量代币定义。一旦合约部署到区块链上，你就无法再更新它。这意味着你的代币在部署后将拥有固定的数量，并且你之后将无法再增发更多代币。\n\
  \n### 创建项目\n\n初始化一个新的空以太坊项目。\n\n```\n$ truffle init\n```\n\n为你的项目创建一个 `package.json`\
  \ 文件。\n\n```\n$ npm init\n```\n\n安装 `OpenZeppelin` 合约包。它包含了用 `Solidity` 编写的可复用智能合约。\n\
  \n```\n$ npm install @openzeppelin/contracts\n```\n\n\n\n### 编写固定供应合约\n\n创建一个新的\
  \ Solidity 文件，并执行以下操作：\n\n1.  包含许可证声明（这是强制性的）。\n2.  定义 Solidity 的最低版本。\n3.  导入 OpenZeppelin\
  \ 的 `ERC-20` 合约库。\n4.  定义固定供应合约类，继承自 `ERC20`。\n5.  调用构造函数，传入代币名称和符号。\n6.  将总供应量分配给发送方地址（即合约创建者）。\n\
  7.  重写 `decimals` 函数。\n8.  设置该代币的小数位数。\n\n```solidity\n// SPDX-License-Identifier:\
  \ MIT\npragma solidity ⁰.8.0;\nimport \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
  ;\ncontract ERC20FixedSupply is ERC20 {\nconstructor() ERC20(\"Fixed\", \"FIX\"\
  ){\n_mint(msg.sender, 1000);\n}\nfunction decimals() public view virtual override\
  \ returns (uint8){\nreturn 0;\n}\n}\n```\n\n前往 `truffle-config.js` 文件，取消注释 `solc`\
  \ 代码块（快捷键 Ctrl+;）。然后，更新 Solidity 版本号。\n\n```javascript\ncompilers: {\nsolc: {\n\
  version: \"0.8.0\",\ndocker: true,\nsettings: {\noptimizer: {\nenabled: false,\n\
  runs: 200\n},\nevmVersion: \"byzantium\"\n}\n}\n},\n```\n\n在 `migrations` 文件夹下创建一个新文件。将其命名为\
  \ `2_deploy_contracts.sol`。\n\n```bash\n$ touch migrations/2_deploy_contracts.sol\n\
  ```\n\n在该文件中，将所需的方法指向你的合约文件，并导出一个用于部署合约的函数。\n\n```javascript\nvar ERC20FixedSupply\
  \ = artifacts.require(\"./ERC20FixedSupply.sol\");\nmodule.exports = function(deployer){\n\
  deployer.deploy(ERC20FixedSupply);\n}\n```\n\n### 编译合约\n\n现在是时候编译合约了。\n\n```bash\n\
  $ truffle compile\n```\n\n合约已成功编译！\n\n### 启动 Ganache 开发区块链\n\n拆分终端视图。然后，在 `127.0.0.1:8545`\
  \ 上启动 Ganache 开发区块链。\n\n```bash\n$ ganache-cli\n```\n\n前往 `truffle-config.js` 文件，在\
  \ `networks` 下取消注释 `development` 代码块。\n\n```javascript\nnetworks: {\ndevelopment:\
  \ {\nhost: \"127.0.0.1\",\nport: 8545,\nnetwork_id: \"*\"\n},\n}\n```\n\n### 将合约迁移至\
  \ Ganache\n\n运行 `migrate` 命令来部署合约，如图 3-6 所示。\n\n![](img/521550_1_En_3_Fig6_HTML.jpg)\n\
  \n一张显示 `truffle compile` 结果的截图，左侧菜单栏选中了 `truffle-config.js`。在屏幕主要部分有四个标签页：问题、输出、终端和调试控制台，其中终端标签页被选中。终端文本显示“正在编译你的合约。”\
  \ 它已编译完成并等待输入。\n\n**图 3-6** VS Code：使用 truffle 命令行迁移项目\n\n```bash\n$ truffle migrate\n\
  ```\n\n在进入下一部分之前，请复制部署代币的账户私钥。\n\n### 配置 MetaMask\n\n打开 MetaMask。点击你的账户，然后点击“导入账户”。在此步骤中，粘贴账户私钥。点击“导入”，如图\
  \ 3-7 所示。\n\n![](img/521550_1_En_3_Fig7_HTML.jpg)\n\n一张“导入账户”页面的截图。在“导入账户”标题下方，有一条信息显示“导入的账户将不会与你最初创建的\
  \ MetaMask 账户关联。” 下方，“选择类型”字段已选中“私钥”。再下方，用于输入私钥字符串的字段有一条虚线。底部的“导入”按钮被高亮显示。\n\n**图\
  \ 3-7** MetaMask：使用助记词导入现有钱包\n\n点击网络列表，然后点击 `Localhost:8545`。使用 localhost 网络意味着你将把钱包指向你的本地开发区块链，如图\
  \ 3-8 所示。\n\n![](img/521550_1_En_3_Fig8_HTML.jpg)\n\n一张“网络”页面的截图。顶部文字显示“显示或隐藏测试网络”，右侧有一个“关闭”按钮。列出的一些可见网络如下：Polygon\
  \ Mumbai、Ropsten 测试网络、Kovan 测试网络、Rinkeby 测试网络等。Ropsten 测试网络左侧有一个勾选标记。底部的“添加网络”按钮。\n\
  \n**图 3-8** MetaMask：网络选择列表\n\n### 将代币添加到 MetaMask\n\n点击“添加代币”，然后选择“自定义代币”。粘贴代币合约地址并点击“下一步”。\n\
  \n添加代币就是添加所创建代币的合约公共地址。之后 MetaMask 会自动读取代币符号和小数位数。确保你得到的结果如图 3-9 所示。\n\n![](img/521550_1_En_3_Fig9_HTML.jpg)\n\
  \n一张“添加代币”窗口的截图，有两个标签页：搜索和自定义代币。自定义代币标签页被选中。下方，“代币合约地址”栏显示地址，“代币符号”栏显示 `FIX`，“小数位数”栏显示\
  \ `0`。\n\n**图 3-9** MetaMask：添加自定义代币\n\n点击“添加代币”。代币符号以及你的余额将显示在此屏幕上（图 3-10）。\n\n\
  ![](img/521550_1_En_3_Fig10_HTML.jpg)\n\n一张“添加代币”窗口的截图，显示问题“是否要添加这些代币？”左侧是“代币”字样和一个标有\
  \ `FIX` 的彩色圆形图标。右侧是“余额”字样，显示 `1000 FIX`。\n\n**图 3-10** MetaMask：新自定义代币概览\n\n现在，回到\
  \ VS Code（参见图 3-6 中的 `ganache-cli` 终端视图）并复制另一个账户私钥。返回 MetaMask，重复你对第一个账户执行的操作，包括添加代币。\n\
  \n### 在账户之间转移代币\n\n现在，切换到第一个导入的账户（即拥有所有代币的账户）。点击“发送”，然后点击“在我的账户之间转账”。选择第二个创建的账户。输入\
  \ `115 FIX` 作为转账金额，然后点击“下一步”。最后，点击“确认”。\n\n交易已发送，但处于待处理状态。稍等片刻等待交易被确认。一旦确认完成，代币总数将被更新。选择第二个导入的账户；现在这个账户有了\
  \ `115 FIX`！\n\n\n\n## 使用 Infura 将 ERC-20 代币部署到测试网\n\n`Infura` 可用于将智能合约部署到 Ropsten、Kovan、Rinkeby、Goerli\
  \ 等测试网络以及主网。对于测试网，你需要在 `Infura` 上创建一个新项目，并获取用于部署合约的钱包私钥。为了执行合约创建交易，该钱包必须拥有以太币余额。\n\
  \n### 安装先决条件\n\n打开一个新终端，安装 `fs` 包。安装此包可提供用于访问和与文件系统交互的有用功能。\n\n```\n$ npm install\
  \ fs\n```\n\n现在，安装钱包提供程序 `hdwallet` 包。它用于为从 12 或 24 个单词的助记词派生的地址签署交易。\n\n```\n$\
  \ npm install @truffle/hdwallet-provider@1.2.3\n```\n\n### 设置你的 Infura 项目\n\n访问\
  \ `http://infura.io` 并进入你的仪表盘。点击“以太坊”，然后点击“创建项目”。定义项目名称。请注意，你可以连接不同的测试网以及主网。复制项目\
  \ ID 并保存更改。\n\n#### 设置你的智能合约\n\n打开 Visual Studio Code 并编辑 `truffle-config.js`。取消四个常量（`hdwalletprovider`、`infurakey`、`fs`\
  \ 和 `mnemonic`）的注释。将项目 ID 粘贴为 `infurakey` 常量的值。取消 `ropsten` 块的注释。确保你在 `ropsten`\
  \ 端点中使用了正确的项目 ID。\n\n```\nconst HDWalletProvider = require('@truffle/hdwallet-provider');\n\
  const infuraKey = \"fj4jll3k.....\";\nconst fs = require('fs');\nconst mnemonic\
  \ = fs.readFileSync(\".secret\").toString().trim();\n```\n\n### 配置私钥\n\n在浏览器中打开已连接到\
  \ Infura 网络的 MetaMask 钱包。点击“你的账户”，然后点击“设置”，最后点击“安全与隐私”（图 3-11）。\n\n你可以选择查看种子短语，但请注意此信息非常敏感，如果有人获得访问权限，他们将能够恢复你的钱包并使用你的资金。\n\
  \n![](img/521550_1_En_3_Fig11_HTML.jpg)\n\nRopsten 测试网络中“安全与隐私”窗口的截图。屏幕上显示“显示种子短语”文字，并带有一个光标悬停的按钮，按钮上也显示“显示种子短语”。\n\
  \n图 3-11 MetaMask：显示种子短语\n\n点击“显示种子短语”并输入你的钱包密码以继续；然后复制私钥。\n\n返回 Visual Studio Code（图\
  \ 3-6）并创建一个名为 `.secret` 的新文件。将私钥粘贴到此文件中。你也可以使用命令行创建此文件（图 3-12）。\n\n![](img/521550_1_En_3_Fig12_HTML.jpg)\n\
  \n截图显示在 Solidity 块下选中了 migrations 文件夹。命令提示符显示为“美元符号 touch 空格 dot secret”。\n\n图 3-12\
  \ Secret 文件\n\n```\n$ touch .secret\n```\n\n### 部署智能合约\n\n打开终端并运行 `migrate` 命令，以将合约部署到\
  \ Ropsten 网络。\n\n```\n$ truffle migrate --network ropsten\n```\n\n### 检查你的钱包余额\n\
  \n再次进入你的 MetaMask 钱包，注意你的余额已经减少。\n\n### 在 Etherscan 上验证智能合约\n\n打开一个新窗口，复制在部署阶段创建的合约地址。访问\
  \ `https://ropsten.etherscan.io`，将合约地址粘贴到搜索字段中。点击“查找”按钮。智能合约就在那里！\n\n代币已被创建并转移到创建合约的钱包中。点击“Fixed\
  \ (FIX)”代币链接。在这里你可以看到新创建代币的概述。\n\n## 将 ERC-20 代币部署到 Polygon 测试网（第 2 层）\n\nPolygon\
  \ 是一个用于构建和连接兼容以太坊的区块链网络的协议和框架。你可以在以太坊上聚合可扩展的解决方案，以支持多链以太坊生态系统。\n\n`MATIC`，Polygon\
  \ 的原生代币，是一种在以太坊区块链上运行的 ERC-20 代币。该代币用于 Polygon 上的支付服务，并作为在 Polygon 生态系统中运营的用户之间的结算货币。\n\
  \n### 安装先决条件\n\n打开一个新终端，如果尚未安装，请安装 `fs` 包。此包提供了许多有用的功能来访问和与文件系统交互。\n\n```\n$ npm\
  \ install fs\n```\n\n现在，如果尚未安装，请安装钱包提供程序 `hdwallet` 包。它用于为从 12 或 24 个单词的助记词派生的地址签署交易。\n\
  \n```\n$ npm install @truffle/hdwallet-provider@1.4.0\n```\n\n### 将 Polygon Mumbai\
  \ 添加到 MetaMask 网络\n\n打开 MetaMask 扩展程序并点击网络下拉菜单。然后选择“自定义 RPC”选项。设置以下值，如图 3-13 所示：\n\
