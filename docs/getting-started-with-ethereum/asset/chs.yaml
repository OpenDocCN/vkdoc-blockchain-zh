- "# Chainlink\n\nChainlink^(²⁸) 是一个由节点组成的去中心化网络，它使用预言机将数据从区块链外源传输到区块链上的智能合约中。在本章中，你将学习如何使用\
  \ Kovan 测试网上的 ETH/USD 价格信息，在智能合约中访问最新的加密货币价格。\n\n在本章结束时，你将能够完成以下任务：\n\n*   创建一个用于价格消费的简单智能合约\n\
  *   设置一个 Infura 项目\n*   配置签署交易的私钥\n*   在 Kovan 网络上部署智能合约\n*   从 Kovan 网络上的智能合约获取价格信息\n\
  \n## 使用 Chainlink 预言机在智能合约内获取加密货币价格\n\n让我们从创建一个新项目开始，然后安装 Chainlink 合约包。你将使用一个现有的合约地址，该地址会告诉你\
  \ ETH/USD 交易对的价格，然后你将能够看到该价格被你的智能合约返回。\n\n### 创建项目\n\n前往“终端”菜单，点击“新建终端”，并初始化一个新的\
  \ Truffle 项目。\n\n```\n$ truffle init\n```\n\n现在，初始化项目文件夹。\n\n```\n$ npm init\n```\n\
  \n最后，安装 Chainlink 合约包。^(²⁹)\n\n```\n$ npm install @chainlink/contracts@0.1.9\n```\n\
  \n\n\n### 创建智能合约\n\n为价格消费创建一个新的智能合约。\n\n```\n$ touch contracts/PriceConsumer.sol\n\
  ```\n\n打开 `PriceConsumer.sol` 文件（图 10-1）。\n\n![](img/521550_1_En_10_Fig1_HTML.jpg)\n\
  \nVS Code 合约文件夹的截图，其中 `PriceConsumer.sol` 标签页已打开。左侧的“资源管理器”面板包含其他部分：“Contracts”下存在\
  \ `Migrations.sol` 和 `PriceConsumer.sol`（已选中），以及 `migrations`、`node_modules`、`test`\
  \ 文件夹和两个 `.json` 文件与一个 `.js` 文件。\n\n图 10-1 VS Code 合约文件夹\n\n在 `PriceConsumer.sol`\
  \ 文件中，定义 Solidity 版本，然后导入 Chainlink 合约接口。之后，定义合约名称和合约构造函数。\n\n```\n// SPDX-License-Identifier:\
  \ MIT\npragma solidity ⁰.8.0;\nimport \"@chainlink/contracts/src/v0.6/interfaces/AggregatorV3Interface.sol\"\
  ;\ncontract PriceConsumer {\n    AggregatorV3Interface internal priceFeed;\n   \
  \ constructor() {\n        priceFeed = AggregatorV3Interface();\n    }\n}\n```\n\
  \n访问 [`https://docs.chain.link/docs/ethereum-addresses`](https://docs.chain.link/docs/ethereum-addresses)\
  \ 并向下滚动到 Kovan 部分。复制“ETH/USD”行上的代理地址（图 10-2）。\n\n![](img/521550_1_En_10_Fig2_HTML.jpg)\n\
  \nChainlink 价格供给的截图，左侧列出了“Using Price Feeds”。其下有多个选项，其中“Contact Addresses”已被选中。在其下，“Ethereum\
  \ Price Feeds”已被选中。右侧是一个包含 3 列的表格，显示了价格供给的详细信息。\n\n图 10-2 Chainlink 价格供给\n\n将该地址粘贴到\
  \ `AggregatorV3Interface` 构造函数中。之后，创建用于获取价格的函数。\n\n```\n// SPDX-License-Identifier:\
  \ MIT\npragma solidity ⁰.8.0;\nimport \"@chainlink/contracts/src/v0.6/interfaces/AggregatorV3Interface.sol\"\
  ;\ncontract PriceConsumer {\n    AggregatorV3Interface internal priceFeed;\n   \
  \ constructor() {\n        priceFeed = AggregatorV3Interface(0x9326BFA02ADD2366b30bacB125260Af641031331);\n\
  \    }\n    function getThePrice() public view returns (int) {\n        (\n    \
  \        uint80 roundID,\n            int price,\n            uint startedAt,\n\
  \            uint timeStamp,\n            uint80 answeredInRound\n        ) = priceFeed.latestRoundData();\n\
  \        return price;\n    }\n}\n```\n\n### 创建迁移\n\n在 `migrations` 文件夹中创建迁移文件。\n\
  \n```\n$ touch migrations/2_deploy_contracts.sol\n```\n\n编写用于部署 `PriceConsumer`\
  \ 智能合约的代码（图 10-3）。\n\n![](img/521550_1_En_10_Fig3_HTML.jpg)\n\nVS Code migrations\
  \ 文件夹的截图，其中 `2_deploy_contracts.js` 标签页已打开。窗口上显示数字 1。\n\n图 10-3 VS Code migrations\
  \ 文件夹\n\n```\nconst PriceConsumer = artifacts.require(\"PriceConsumer\");\nmodule.exports\
  \ = function(deployer) {\n    deployer.deploy(PriceConsumer);\n};\n```\n\n### 设置你的\
  \ Infura 项目\n\n访问 [`https://infura.io`](https://infura.io) 并进入你的仪表盘。点击 Ethereum，然后点击“Create\
  \ a project”。最后，定义项目名称并复制项目 ID（图 10-4）。请注意，你可以连接到不同的测试网以及主网。\n\n![](img/521550_1_En_10_Fig4_HTML.jpg)\n\
  \nInfura 设置的截图，左侧有一个仪表盘。顶部的栏标题为“ethereum”。“Settings”标签页已打开。需要在主屏幕上输入项目详情。第一部分是名称为“ethereum”的“Name”（必填字段），第二部分是“Keys”，显示了项目\
  \ ID。\n\n图 10-4 Infura 设置\n\n现在，点击 Save Changes。\n\n### 配置钱包以签署交易\n\n安装文件系统 `fs`\
  \ 包。该包提供了许多有用的功能来访问和与文件系统交互。\n\n```\n$ npm install fs\n```\n\n安装钱包提供程序 `hdwallet`\
  \ 包。这也会安装支持 HD 钱包的 Web3 提供程序，用于为从 12 或 24 词助记词派生的地址签署交易。\n\n```\n$ npm install @truffle/hdwallet-provider@1.2.3\n\
  ```\n\n打开 `truffle-config.js` 文件并取消注释 `HDWalletProvider` 代码部分。\n\n```\nconst HDWalletProvider\
  \ = require('@truffle/hdwallet-provider');\nconst infuraKey = '';\nconst fs = require('fs');\n\
  const mnemonic = fs.readFileSync(\".secret\").toString().trim();\n```\n\n将你的 Infura\
  \ 项目 ID 粘贴为变量 `infuraKey` 的值。\n\n### 配置网络\n\n在 `truffle-config.js` 中，取消注释 `ropsten`\
  \ 网络部分并更改以下值：\n\n- 将 `ropsten` 更改为 `kovan`。\n- 将 Ropsten Infura URL 更改为 `kovan`。\n\
  - 将 `YOUR-PROJECT-ID` 更改为 `${infuraKey}`。\n- 将 `network_id` 更改为 `42`。\n\n```\nkovan:\
  \ {\n    provider: () => new HDWalletProvider(mnemonic, `https://kovan.infura.io/v3/${infuraKey}`),\n\
  \    network_id: 42,\n    gas: 5500000,\n    confirmations: 2,\n    timeoutBlocks:\
  \ 200,\n    skipDryRun: true\n},\n```\n\n### 配置 Solidity 编译器\n\n仍在 `truffle-config.js`\
  \ 中，取消注释 `compilers` 部分并将版本更改为 `0.8.0`。\n\n```\ncompilers: {\n    solc: {\n    \
  \    version: \"0.8.0\",\n        docker: true,\n        settings: {\n         \
  \   optimizer: {\n                enabled: false,\n                runs: 200\n \
  \           },\n            evmVersion: \"byzantium\"\n        }\n    }\n},\n```\n\
  \n### 配置私钥\n\n按如下方式创建秘密文件：\n\n```\n$ touch .secret\n```\n\n前往浏览器，打开连接到 Infura 网络的\
  \ MetaMask 钱包。点击“Your Account”，然后点击“Settings”。最后，点击“Security & Privacy”（图 10-5）。\n\
  \n![](img/521550_1_En_10_Fig5_HTML.jpg)\n\n安全与隐私窗口的截图，显示了“Reveal Seed Phrase”设置。其中文字显示“Reveal\
  \ Seed Phrase”，下方有一个相同文字的按钮，光标悬停于此。\n\n图 10-5 MetaMask：揭示助记词\n\n你可以查看你的助记词，但请注意，此信息非常敏感，如果有人能够访问它，他们就能恢复你的钱包并使用你的资金。\n\
  \n点击 Reveal Seed Phrase 并输入你的钱包密码以继续。复制私钥。返回 Visual Studio Code 并将私密恢复短语粘贴到 `.secret`\
  \ 文件中。\n\n### 编译智能合约\n\n使用 Truffle 编译合约。\n\n```\n$ truffle compile\n```\n\n### 部署智能合约\n\
  \n使用 Truffle 将合约部署到 Kovan 网络。`migrate` 命令运行迁移，以在 Kovan 网络上部署合约。\n\n```\n$ truffle\
  \ migrate --network kovan\n```\n\n等待合约部署完成且交易在区块链上得到确认。现在，检查已创建的合约地址（图 10-6）。\n\n\
  ![](img/521550_1_En_10_Fig6_HTML.jpg)\n\nVS Code 部署合约输出窗口的截图，包含“Problems”、“Output”、“Terminal”和“Debug\
  \ console”标签页。代码显示在“Terminal”标签页中，包含交易、区块、合约地址、区块号和时间戳、账户、余额、已用 Gas、Gas 价格、发送值和总成本的详细信息。\n\
  \n图 10-6 VS Code 部署合约输出\n\n\n\n#### 从智能合约获取价格信息\n\n使用 Truffle 控制台实例化合约。该控制台命令会打开一个基础交互式控制台，该控制台连接到\
  \ Kovan 网络上的以太坊客户端：\n\n```\n$ truffle console --network kovan\n```\n\n现在，使用 `deployed`\
  \ 命令返回在 Kovan 网络上已部署的合约实例，如下所示：\n\n```\ntruffle(kovan) let instance = await PriceConsumer.deployed()\n\
  ```\n\n调用 `getThePrice` 方法。`let` 命令将方法结果存储在变量 `price` 中，`await` 命令将异步执行该方法。\n\n\
  ```\ntruffle(kovan) let price = await instance.getThePrice()\n```\n\n最后，将结果输出为数字。方法\
  \ `toNumber()` 将大数对象转换为常规数字。\n\n```\ntruffle(kovan) price.toNumber()\n```\n\n就这样，你刚刚创建了一个智能合约并使用了\
  \ Chainlink 价格馈送预言机！\n\n## 总结\n\n在本章中，你学习了如何创建一个简单的智能合约，以使用 Chainlink 从 Chainlink\
  \ 预言机获取价格信息。\n\n在下一章中，你将学习 Nethereum，一个用于以太坊的 .NET 库。\n\n"
- '# Nethereum


  Nethereum 是一个用于以太坊的开源 .NET 集成库，它简化了智能合约的维护以及与公共和私有以太坊节点的交互。该框架暴露了一个 `Web3` 类，通过它可以与钱包或智能合约的方法进行交互。在本章你将看到的示例中，你将使用钱包的
  `GetBalance` 方法来查询其余额。


  在本章结束时，你将能够做到以下几点：


  -   使用 `dotnet` 创建一个新的控制台项目

  -   创建一个使用 Nethereum 获取钱包余额的方法

  -   在控制台中显示结果


  ## 使用 Nethereum 获取你的以太币余额


  让我们从创建一个新的控制台项目并将 Nethereum 的 `Web3` 包添加到我们的应用程序开始。然后，你将创建获取特定钱包地址余额的方法。最后，你将把以
  wei 和 ether 为单位的信息打印到控制台。


  ### 创建项目


  进入终端并点击“新建终端”。如下所示创建一个新的 `dotnet` 控制台项目。此命令根据指定的模板创建一个新项目、配置文件或解决方案：


  ```

  $ dotnet new console -o sample

  ```


  进入项目的根目录。


  ```

  $ cd sample

  ```


  ### 安装 Web3


  安装 Nethereum 的 `Web3` 包。此命令向项目文件添加包引用：


  ```

  $ dotnet add package Nethereum.Web3

  ```


  还原所有项目包。此命令还原项目的依赖项和工具：


  ```

  $ dotnet restore

  ```


  ### 创建方法


  打开 `Program.cs` 文件，添加线程和 `Web3` 的引用。现在，添加一个用于获取账户余额的新方法，然后实例化一个新的 `Web3` 对象。


  进入你的 Infura 项目设置并选择 Ropsten 网络。复制 Ropsten 的 `https` 端点（图 11-1）。


  ![](img/521550_1_En_11_Fig1_HTML.jpg)


  Infura 项目密钥的截图，左上角是项目 ID，右上角是项目密钥和栏，端点上选择了 Ropsten 选项，下方提供了 2 个链接，旁边有可点击的复制图标。


  图 11-1：Infura 项目密钥


  将此端点作为 `Web3` 对象构造函数的参数。在 `Program.cs` 文件中，使用你的钱包公钥作为参数从 `Web3` 获取余额。编写代码以 wei 为单位输出余额，然后将
  wei 余额转换为 ether。最后，编写以 ether 为单位输出余额的代码。现在，修改你的 main 方法来调用 `GetAccountBalance()`。


  ```

  using System;

  using System.Threading.Tasks;

  using Nethereum.Web3;

  namespace NethereumSample

  {

  class Program

  {

  static void Main(string[] args)

  {

  GetAccountBalance().Wait();

  Console.ReadLine();

  }

  static async Task GetAccountBalance()

  {

  var web3 = new Web3("https://ropsten.infura.io/v3/39180531508b4b659780ef7a36426a86");

  var balance = await web3.Eth.GetBalance.SendRequestAsync("0x03d1b3162DBFaB4A175038eAa4EA4b39423d5A6F");

  Console.WriteLine($"Balance in Wei: {balance.Value}");

  var etherAmount = Web3.Convert.FromWei(balance.Value);

  Console.WriteLine($"Balance in Ether: {etherAmount}");

  }

  }

  }

  ```


  ### 获取余额


  构建项目。此命令构建项目及其所有依赖项：


  ```

  $ dotnet build

  ```


  运行项目。此命令运行源代码，无需任何显式的编译或启动命令：


  ```

  $ dotnet run

  ```


  检查终端输出，确保你得到如图 11-2 所示的结果。


  ![](img/521550_1_En_11_Fig2_HTML.jpg)


  VS Code 中 wei 和 ether 余额的截图。已选中 `Program.cs` 文件，终端选项卡已打开。其详细信息，即 wei 余额和 ether 余额显示在命令“$
  dotnet run”下方的窗口中。命令中的 dot 和 net 之间没有空格。


  图 11-2：VS Code 中 wei 和 ether 的余额


  ## 总结


  在本章中，你学习了如何创建一个使用 Nethereum 获取钱包余额的控制台项目。




