    ### 编写固定供应合约


    创建一个新的 Solidity 文件，并执行以下操作：


    1.  包含许可证声明（这是强制性的）。

    2.  定义 Solidity 的最低版本。

    3.  导入 OpenZeppelin 的 `ERC-20` 合约库。

    4.  定义固定供应合约类，继承自 `ERC20`。

    5.  调用构造函数，传入代币名称和符号。

    6.  将总供应量分配给发送方地址（即合约创建者）。

    7.  重写 `decimals` 函数。

    8.  设置该代币的小数位数。


    ```solidity

    // SPDX-License-Identifier: MIT

    pragma solidity ⁰.8.0;

    import "@openzeppelin/contracts/token/ERC20/ERC20.sol";

    contract ERC20FixedSupply is ERC20 {

    constructor() ERC20("Fixed", "FIX"){

    _mint(msg.sender, 1000);

    }

    function decimals() public view virtual override returns (uint8){

    return 0;

    }

    }

    ```


    前往 `truffle-config.js` 文件，取消注释 `solc` 代码块（快捷键 Ctrl+;）。然后，更新 Solidity 版本号。


    ```javascript

    compilers: {

    solc: {

    version: "0.8.0",

    docker: true,

    settings: {

    optimizer: {

    enabled: false,

    runs: 200

    },

    evmVersion: "byzantium"

    }

    }

    },

    ```


    在 `migrations` 文件夹下创建一个新文件。将其命名为 `2_deploy_contracts.sol`。


    ```bash

    $ touch migrations/2_deploy_contracts.sol

    ```


    在该文件中，将所需的方法指向你的合约文件，并导出一个用于部署合约的函数。


    ```javascript

    var ERC20FixedSupply = artifacts.require("./ERC20FixedSupply.sol");

    module.exports = function(deployer){

    deployer.deploy(ERC20FixedSupply);

    }

    ```


    ### 编译合约


    现在是时候编译合约了。


    ```bash

    $ truffle compile

    ```


    合约已成功编译！


    ### 启动 Ganache 开发区块链


    拆分终端视图。然后，在 `127.0.0.1:8545` 上启动 Ganache 开发区块链。


    ```bash

    $ ganache-cli

    ```


    前往 `truffle-config.js` 文件，在 `networks` 下取消注释 `development` 代码块。


    ```javascript

    networks: {

    development: {

    host: "127.0.0.1",

    port: 8545,

    network_id: "*"

    },

    }

    ```


    ### 将合约迁移至 Ganache


    运行 `migrate` 命令来部署合约，如图 3-6 所示。


    ![](img/521550_1_En_3_Fig6_HTML.jpg)


    一张显示 `truffle compile` 结果的截图，左侧菜单栏选中了 `truffle-config.js`。在屏幕主要部分有四个标签页：问题、输出、终端和调试控制台，其中终端标签页被选中。终端文本显示“正在编译你的合约。”
    它已编译完成并等待输入。


    **图 3-6** VS Code：使用 truffle 命令行迁移项目


    ```bash

    $ truffle migrate

    ```


    在进入下一部分之前，请复制部署代币的账户私钥。


    ### 配置 MetaMask


    打开 MetaMask。点击你的账户，然后点击“导入账户”。在此步骤中，粘贴账户私钥。点击“导入”，如图 3-7 所示。


    ![](img/521550_1_En_3_Fig7_HTML.jpg)


    一张“导入账户”页面的截图。在“导入账户”标题下方，有一条信息显示“导入的账户将不会与你最初创建的 MetaMask 账户关联。” 下方，“选择类型”字段已选中“私钥”。再下方，用于输入私钥字符串的字段有一条虚线。底部的“导入”按钮被高亮显示。


    **图 3-7** MetaMask：使用助记词导入现有钱包


