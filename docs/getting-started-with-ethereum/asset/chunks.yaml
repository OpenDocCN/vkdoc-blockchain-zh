- fmt: "# Pin and Unpin Files on a Remote Node Using Pinata\n\nYou can also pin your\
    \ files to a remote pinning service. These third-party services allow you to pin\
    \ files to nodes that they operate rather than your own local node. You don't\
    \ have to be concerned about your own node's disk space or uptime.\n\nWhile you\
    \ can manage IPFS files pinned to a remote pinning service using its own GUI,\
    \ CLI, or other dev tools, you can also work directly with pinning services using\
    \ your local IPFS installation, eliminating the need to learn a pinning service's\
    \ unique API or other tooling.\n\n## Setting Up API Keys on Pinata\n\nLog in on\
    \ your Pinata account and go to API Keys. Click New Key and then check the Admin\
    \ box. Enter `admin-cli` as your key name and finally click Create Key. A new\
    \ key will be generated for you. Copy the JWT value from this window.\n\n## Setting\
    \ Up Pinata as a Remote Service on Your Terminal\n\nAdd Pinata as a pinning remote\
    \ service. Paste your JWT inside the `<your_jwt_key>` chunk.\n\n```\n$ ipfs pin\
    \ remote service add pinata https://api.pinata.cloud/psa \n```\n\nList all the\
    \ existing remote services and check that Pinata is there.\n\n```\n$ ipfs pin\
    \ remote service ls\n```\n\n## Adding a New File to Your Local IPFS Node\n\nAdd\
    \ a new file to your IPFS local node.\n\n```\n$ echo \"world\" > hello.txt\n$\
    \ ipfs add hello.txt\n```\n\nCopy the hash identifier generated after adding the\
    \ file to the local node.\n\n## Pinning Your File to the Remote IPFS Node\n\n\
    Pin your file using the following command. Paste the file hash inside the `<your_file_hash>`\
    \ chunk.\n\n```\n$ ipfs pin remote add --service=pinata -name=hello.txt \n```\n\
    \nGo back to the Pinata website and click Pin Manager. Your file will appear on\
    \ this page!\n\n## Unpinning Your File from the Remote IPFS Node\n\nUnpin your\
    \ file using the following command. Paste the file hash inside your `<your_file_hash>`\
    \ chunk.\n\n```\n$ ipfs pin remote rm --service=pinata -name=hello.txt \n```\n\
    \nGo back to the Pinata website and click Pin Manager. Your file will no longer\
    \ appear on this page; that means your file was unpinned.\n\n# Host Your Site\
    \ on IPFS Using Fleek\n\nFleek enables you to create a base-layer architecture\
    \ based on Open Web protocols. Create and host your sites, apps, DApps, and other\
    \ services on trustless, permissionless, and open technologies that are geared\
    \ toward enabling user-controlled, encrypted, private, peer-to-peer experiences.\n\
    \n## Logging In on Fleek\n\nGo to `https://fleek.co` and log in with your account;\
    \ then go to your VS Code editor.\n\n## Cloning Your Existing Repository\n\nClone\
    \ an existing repository with some sample code.\n\n```\n$ git clone https://github.com/johnnymatthews/random-planet-facts\n\
    ```\n\n## Installing Fleek\n\nInstall the Fleek command line.\n\n```\n$ npm install\
    \ -g @fleekhq/fleek-cli\n```\n\nLog in to your Fleek account (you will be prompted\
    \ to complete the flow in your browser).\n\n```\n$ fleek login\n```\n\n## Initializing\
    \ Fleek\n\nInitialize the Fleek site in your current directory.\n\n```\n$ fleek\
    \ site:init\n```\n\nYou will be asked to select which team you want to use (use\
    \ the arrow keys for selecting). Also, select which site you want to use. Finally,\
    \ select the public directory for deployment.\n\n## Deploying Your Site\n\nDeploy\
    \ the changes in your `publish` directory.\n\n```\n$ fleek site:deploy\n```\n\n\
    Go back to the Fleek site and click Hosting; then click Verify on IPFS. This is\
    \ your site hosted on IPFS. You can now see your deployed site online.\n\nGo back\
    \ to Hosting and click `your-site.on.fleek.co`. This is your site host's friendly\
    \ address (Figure 7-3).\n\n![A screenshot where the frosty hyphen frog hyphen\
    \ 8 1 5 8 folder under the Hosting node is open. Below there are 2 points that\
    \ read deployed locally and verify on IPFS. The next part has the overview tab\
    \ open where there are 2 points provided. 1. Site is deployed. 2. Set up a custom\
    \ domain with SSL.](images/521550_1_En_7_Chapter/521550_1_En_7_Fig3_HTML.jpg)\n\
    \n**Figure 7-3** Fleek hosting overview\n\n# Summary\n\nIn this chapter, you learned\
    \ how to install and create an IPFS node, as well as manage files with this protocol.\n\
    \nIn the next chapter, you will learn how to create a Filecoin project.\n\n# 8.\
    \ Filecoin\n\nProtocol Labs, the same company that invented and maintains IPFS,\
    \ created Filecoin. It expands the IPFS concept by establishing an open source\
    \ decentralized storage network and incentivizes users to keep data pinned to\
    \ IPFS.\n\nFilecoin is great because it offers a decentralized storage solution\
    \ that does not require reliance on bigger centralized storage solutions. Unlike\
    \ pure IPFS-based solutions, Filecoin nodes have financial incentives to stay\
    \ active.\n\nWe will use a Filecoin implementation named `Lotus` in this example.\
    \ It verifies network transactions, manages an FIL wallet, and can execute storage\
    \ and retrieval deals.\n\nAt the end of this chapter, you will be able to do the\
    \ following:\n\n- Create a Filecoin project\n- Configure Truffle to use Filecoin\
    \ endpoints\n- Start the local Filecoin server\n- Add images to be preserved on\
    \ Filecoin"
