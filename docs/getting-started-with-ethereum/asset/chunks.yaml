  trans: '

    # 4. 智能合约的单元测试


    单元测试用于检验代码执行场景，确保其表现符合预期。最关键的是，单元测试允许你重构代码、进行新修改，同时不破坏现有功能。


    在智能合约中，单元测试更为重要，因为合约一旦部署，除非部署新合约，否则无法修复。因此，将单元测试纳入你编写的所有智能合约，并尽可能追求高覆盖率，这一点至关重要。


    在本章中，你将学习如何使用 `Mocha` 作为测试运行器、`Chai` 作为断言库来编写单元测试。


    学完本章，你将能够实现以下目标：


    - 创建单元测试文件

    - 为智能合约编写单元测试

    - 编写测试断言

    - 运行单元测试

    - 检查单元测试结果


    ## 为 ERC-20 智能合约编写单元测试


    `Truffle` 默认包含一个自动化测试框架，这大大简化了合约测试工作。该框架允许你通过多种方式创建基本且易于管理的测试。让我们开始编写第一个单元测试。


    ### 创建新的单元测试文件


    打开一个新终端，执行以下命令：


    ```

    $ truffle create test erc20FixedSupply

    ```


    ### 为总供应量合约编写测试


    在 `ERC20FixedSupply.js` 文件中，编写一个新的测试，以断言合约创建时拥有 1,000 枚固定供应的代币。


    ```

    const erc20FixedSupply = artifacts.require("erc20FixedSupply");

    contract("erc20FixedSupply", function () {

    it("should assert true", async function() {

    let token = await erc20FixedSupply.deployed();

    let name = await token.name();

    assert.equal(name, ''Fixed'');

    });

    it("should return total supply of 1000", async function() {

    const instance = await erc20FixedSupply.deployed();

    const totalSupply = await instance.totalSupply();

    assert.equal(totalSupply, 1000);

    });

    });

    ```


    使用以下命令进行测试：


    ```

    $ truffle test --network development

    ```


    确保测试能够通过。


    ### 为余额合约编写测试断言


    在 `ERC20FixedSupply.js` 文件中，再添加一个测试，用于断言在两个账户之间进行新转账后，余额是否正确。


    ```

    it("should transfer 150 FIX", async function(){

    const instance = await erc20FixedSupply.deployed();

    await instance.transfer(account[1], 150);

    const balanceAccount0 = await instance.balanceOf(accounts[0]);

    const balanceAccount1 = await instance.balanceOf(accounts[1]);

    assert.equal(balanceAccount0.toNumber(), 850);

    assert.equal(balanceAccount1.toNumber(), 150);

    });

    ```


    ### 运行单元测试


    现在，再次执行测试。


    ```

    $ truffle test --network development

    ```


    再次确保所有测试都通过。如果单元测试通过，将出现一个绿色勾选标记；否则，将出现一个红色 x 符号。


    ### 检查单元测试结果


    确保你得到与图 4-1 相同的输出。


    ![](img/521550_1_En_4_Fig1_HTML.jpg)


    VS Code 的屏幕截图显示以下输出。`Contract: erc20FixedSupply.` 勾选标记：should assert true，72 毫秒。勾选标记：should
    return total supply of 1000，83 毫秒。勾选标记：should transfer 150 FIX，494 毫秒，3 个通过，776
    毫秒。


    **图 4-1**


    VS Code：单元测试结果成功


    尝试更改一些值，例如账户余额，并观察结果如何从通过变为失败，如图 4-2 所示。


    ![](img/521550_1_En_4_Fig2_HTML.jpg)


    VS Code 的屏幕截图显示以下输出。`Contract: erc20FixedSupply;` 勾选标记：should assert true：51 毫秒；勾选标记：should
    return total supply of 1000，51 毫秒；1，should transfer 150 FIX。下一部分显示测试期间发出的事件及其详细信息和解释。


    **图 4-2**


    VS Code：单元测试结果失败


    ```

    it("should transfer 150 FIX", async function(){

    const instance = await erc20FixedSupply.deployed();

    await instance.transfer("account[1]", 150);

    const balanceAccount0 = await instance.balanceOf(accounts[0]);

    const balanceAccount1 = await instance.balanceOf(accounts[1]);

    assert.equal(balanceAccount0.toNumber(), 750);

    assert.equal(balanceAccount1.toNumber(), 250);

    });

    ```


    ## 本章小结


    在本章中，你了解了为智能合约编写单元测试的重要性，并编写了你的第一个单元测试。


    下一章，我们将探讨 ERC-721 代币标准及其与 ERC-20 的区别。此外，你还将学习如何创建和部署该标准下的合约。


    # 5. ERC-721 同质化代币


    非同质化代币是一种数字资产，它代表了实物对象，例如艺术品、音乐、游戏内物品和视频。在本章中，我将向你展示如何创建一个 NFT ERC-721 并将其部署到以太坊测试网，以及如何将其添加到你的
    `MetaMask` 移动钱包。


    学完本章，你将能够实现以下目标：


    - 创建新的 NFT 项目

    - 配置部署到 `Ganache` 的网络

    - 配置私钥

    - 创建徽章图像

    - 将徽章添加到本地 `IPFS`

    - 将徽章固定到远程 `IPFS`

    - 创建徽章元数据

    - 部署智能合约

    - 将徽章授予你的钱包

    - 在 `Etherscan` 上查看徽章

    - 将徽章添加到你的移动钱包


    ## 使用 Ganache 和 OpenZeppelin 创建你的艺术 NFT


    让我们使用 `OpenZeppelin` 库配置你的第一个 NFT，并创建用于存储代币信息的元数据，然后将其部署到测试网络。最后，你将在钱包中查看该代币。


    ### 创建项目


    使用 `Truffle` 创建一个新项目。


    ```

    $ truffle init

    ```


    安装 `OpenZeppelin` 合约。


    ```

    $ npm install @openzeppelin/contracts

    ```


    创建一个新的 `Solidity` 智能合约。


    ```

    $ touch contracts/UniqueAsset.sol

    ```


    打开 `UniqueAsset.sol` 文件，导入 `ERC721URIStorage.sol` 扩展和 `Counters.sol` 工具。创建一个继承自
    `ERC721URIStorage` 的新类。声明计数器变量，并声明构造函数，传入代币名称和代码。


    创建一个名为 `awardItem` 的新方法。在该新方法内部，递增代币 ID。使用 `_tokenIds.current()` 获取新的代币编号。


    使用 `_mint` 方法铸造一个新项目。最后，使用 `_setTokenURI` 方法设置传入元数据的代币 URI。


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ⁰.8.0;

    import "@openzeppelin/contracts/token/ERC721/extensions/ERC721URIStorage.sol";

    import "@openzeppelin/contracts/utils/Counters.sol";

    contract UniqueAsset is ERC721URIStorage {

    using Counters for Counters.Counter;

    Counters.Counter private _tokenIds;

    constructor() ERC721("UniqueAsset", "UNA") {}

    function awardItem(address recipient, string memory metadata)

    public

    returns (uint256)

    {

    _tokenIds.increment();

    uint256 newItemId = _tokenIds.current();

    _mint(recipient, newItemId);

    _setTokenURI(newItemId, metadata);

    return newItemId;

    }

    }

    ```


    使用 `touch` 命令创建一个新的迁移文件。此命令会在 `migrations` 文件夹中创建一个新文件。


    ```

    $ touch migrations/2_deploy_contracts.sol

    ```


    在 `2_deploy_contracts.js` 文件中，在迁移文件中导出智能合约。


    ```

    const UniqueAsset = artifacts.require("UniqueAsset");

    module.exports = function (deployer) {

    deployer.deploy(UniqueAsset);

    }

    ```

