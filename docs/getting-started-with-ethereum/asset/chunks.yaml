- fmt: '# Configuring the Wallet to Sign Transactions


    Install the file system `fs` package.


    ```

    $ npm install fs

    ```


    Install the wallet provider `hdwallet` package.


    ```

    $ npm install @truffle/hdwallet-provider@1.2.3

    ```


    Open the `truffle-config.js` file and uncomment the `HDWalletProvider` code section.


    ```

    const HDWalletProvider = require(''@truffle/hdwallet-provider'');

    const infuraKey = '''';

    const fs = require(''fs'');

    const mnemonic = fs.readFileSync(".secret").toString().trim();

    ```


    Paste your Infura project ID as a value for the variable `infuraKey`.


    ## Configuring the Network


    Inside the `truffle-config.js` file, uncomment the `ropsten` network section and
    make the following changes:


    * Change `ropsten` to `rinkeby`.

    * Change the Ropsten Infura URL to `rinkeby`.

    * Change `YOU-PROJECT-ID` to `${infuraKey}`.

    * Change `network_id` to `42`.


    ```

    rinkeby: {

    provider: () => new HDWalletProvider(mnemonic, `https://rinkeby.infura.io/v3/${infuraKey}`),

    network_id: 42,

    gas: 5500000,

    confirmations: 2,

    timeoutBlocks: 200,

    skipDryRun: true

    },

    ```


    ## Configuring the Solidity Compiler


    Also, inside the `truffle-config.js` file, uncomment the `compilers` section and
    change the version to 0.8.0.


    ```

    compilers: {

    solc: {

    version: "0.8.0",

    docker: true,

    settings: {

    optimizer: {

    enabled: false,

    runs: 200

    },

    evmVersion: "byzantium"

    }

    }

    },

    ```


    ## Configuring the Private Key


    Go to your browser and open your MetaMask wallet connected to the Infura network.
    Click your account and then click "settings." Finally, click "security & privacy"
    (Figure [5-1](#521550_1_En_5_Chapter.xhtml#Fig1)).


    You have the option to view your seed phrase, but be aware that this information
    is sensitive, and if someone has access to it, they will be able to restore your
    wallet and make use of your funds.


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig1_HTML.jpg)


    A screenshot of the Security and Privacy window in the Ropsten test network. A
    phrase on the screen reads reveal seed phrase. A button with the cursor on it
    is at the bottom, which also reads reveal seed phrase.


    Figure 5-1


    MetaMask: revealing the seed phrase


    Click Reveal Seed Phrase and enter your wallet password to continue. Copy the
    private key.


    Go back to Visual Studio Code and create a new file named `.secret`. Paste the
    private secret recovery phrase on this file.


    ## Creating the Badge Image


    Create the `badge` folder.


    ```

    $ mkdir badge

    ```


    Now, go to the `badge` root folder.


    ```

    $ cd badge

    ```


    Download the image that you will use as a badge from the Internet. You can also
    copy and paste an existing image into this folder. The `curl` command is used
    for transferring data via URL syntax.


    ```

    $ curl https://planouhost.z15.web.core.windows.net/badge.png > badge-image.png

    ```


    ## Adding the Badge to Your Local IPFS


    Initialize your local IPFS node. This command will start an IPFS local server
    on 127.0.0.1:5001.


    ```

    $ ipfs daemon

    ```


    Add your badge image to IPFS.


    ```

    $ ipfs add badge-image.png

    ```


    Running this command, you will receive a hash. This hash is your image address
    in IPFS. Make sure that you see the output shown in Figure [5-2](#521550_1_En_5_Chapter.xhtml#Fig2).


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig2_HTML.jpg)


    A screenshot of the IPFS output after adding a file. It reads: dollar, ipfs add
    badge-image dot png. Further details of the file are presented in the next few
    lines, with the file size and a progress bar.


    Figure 5-2


    IPFS output after adding a file


    ## Pinning the Badge to a Remote IPFS Node


    Pin your badge using Pinata as a remote IPFS service.


    ```

    ipfs pin remote add --service=pinata --name=badge-image.png QmZPxKJWqJTdudyaZUyf6uBzwwAT41QQyxhTHmMZWB9yx4

    ```


    You will get a response indicating the file was pinned successfully.


    ```

    CID: QmZPxKJWqJTdudyaZUyf6uBzwwAT41QQyxhTHmMZWB9yx4

    Name: badge-image.png

    Status: pinned

    ```


    ## Creating the Badge Metadata


    Create the badge metadata JSON file.


    ```

    touch badge-metadata.json

    ```


    Open the file `badge-metadata.json` and set the badge name, description, and image
    address. For the last one, you can use an IPFS gateway for the image to be displayed
    on any wallet that supports this badge type; otherwise, you will depend on the
    destination wallet support displaying images from IPFS hashes directly.


    ```

    {

    "name": "My badge",

    "description": "My badge description",

    "image": "https://ipfs.io/ipfs/QmZPxKJWqJTdudyaZUyf6uBzwwAT41QQyxhTHmMZWB9yx4"

    }

    ```


    Add your badge metadata to IPFS.


    ```

    $ ipfs add badge-metadata.json

    ```


    Pin your badge metadata using a remote IPFS service.


    ```

    $ ipfs pin remote add --service=pinata --name=badge-metadata.json QmRzcwAtLWBeYqyaZUyf6uBzwwAT41QQyxhTHmMZWBfUTa

    ```


    ## Compiling the Smart Contract


    Compile the contract using Truffle.


    ```

    $ truffle compile

    ```


    ## Migrating the Smart Contract


    Migrate the contract to the Rinkeby network using Truffle.


    ```

    $ truffle migrate --network rinkeby

    ```


    ## Instantiate the Smart Contract


    Instantiate the contract using the Truffle console.


    ```

    $ truffle console --network rinkeby

    ```


    Get the instance of the deployed contract.


    ```

    truffle(rinkeby) let instance = await UniqueAsset.deployed()

    ```


    ## Awarding a Badge to a Wallet


    Call the method `awardItem` and pass the Ethereum address as a first parameter
    and the IPFS address for the badge metadata. Make sure that the IPFS address corresponds
    to your badge metadata.


    ```

    truffle(rinkeby) let result = await instance.awardItem("0x62761466bB3A3Da83B408B5F5fE00ac7b2a5A996","https://ipfs.io/ipfs/QmRzcwAtLWBeYqUx3ba1BkYKubSDLNTHCuiUB7WAmdfUTa")

    ```


    ## Checking a Badge on Etherscan


    Once your contract is deployed, you will be able to see the public address of
    your contract. Find in the terminal the contract address created and copy it.


    Go to [`https://rinkeby.etherscan.io`](https://rinkeby.etherscan.io) and paste
    the contract address in the search bar (Figure [5-3](#521550_1_En_5_Chapter.xhtml#Fig3)).
    You can use the Rinkeby Testnet Explorer tool to view the details of the created
    smart contract.


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig3_HTML.jpg)


    A screenshot of Rinkeby Testnet Explorer. On the top, the heading is Rinkeby Testnet
    Explorer. Below the heading is a drop-down option labeled all filters and an input
    bar with a random alphanumeric address.


    Figure 5-3


    Rinkeby Testnet Explorer: searching for a smart contract


    Click the search icon. Now you can see that the contract was deployed successfully
    (Figure [5-4](#521550_1_En_5_Chapter.xhtml#Fig4)). On this details page, you can
    view data such as transactions.


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig4_HTML.jpg)


    A screenshot of a page titled contract. The top left and top right are labeled
    contract overview and more info, respectively. At the bottom, there are 3 options
    labeled transactions, contract, and events out of which the first tab transaction
    is selected.


    Figure 5-4


    Rinkeby Testnet Explorer: viewing smart contract transactions


    You can also realize that the last transaction made was for awarding a new item.'
