    ## Sell Your Art NFT on OpenSea


    OpenSea is a marketplace for digital goods such as collectibles, gaming items,
    digital art, and other digital assets backed by a blockchain such as Ethereum.
    You can purchase, sell, and trade any of these things with anyone in the world
    on OpenSea.


    ### Connecting to OpenSea


    Go to OpenSea^([^(20)](#fn20)) and make sure that you are connected to the wallet
    that contains the NFT and that you are using the Rinkeby test network.


    ### Viewing Your Badge


    Go to **My Profile**. Click **Activity** and then click the badge title. These
    are your badge details. The details page allows you to view various information
    regarding the negotiation of your badge.


    ### Listing Your Badge for Sale


    Click **Sell** and then click **Set Price**. In **Price**, set the price that
    you desire to sell the NFT. On this page you can set the badge pricing method
    as well as schedule it to be listed at a future date (Figure [5-9](#521550_1_En_5_Chapter.xhtml#Fig9)).


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig9_HTML.jpg)


    **A screenshot of unique asset, my badge.** It has three options for *select your
    sell method*, they are **Set Price**, **Highest Bid**, and **Bundle**. Below them
    is a price input option. **Include ending price**, **Schedule for a future time**,
    and **Privacy** are with switch options.


    **Figure 5-9** OpenSea: badge pricing page


    Click **Post Your Listing**. You will be redirected to the **Summary** page (Figure
    [5-10](#521550_1_En_5_Chapter.xhtml#Fig10)). On this page you can see the total
    fees that will be deducted when selling your badge.


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig10_HTML.jpg)


    **A screenshot of the summary page.** There are 3 sections: **Listing**, **Bounties**,
    and **Fees**. **Listing** has **Post your listing** with a selectable option.
    **Bounties** and **Fees** have instructions and details about affiliates. There
    is an **Edit** button next for **Bounties** and there is a link to **Learn more**
    under **Fees**.


    **Figure 5-10** OpenSea: badge’s Summary page


    `MetaMask` will be open in order to validate the transaction (Figure [5-11](#521550_1_En_5_Chapter.xhtml#Fig11)).
    Click **Confirm**. In this step you need to approve the transaction that will
    confirm the listing of your badge for sale on the platform.


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig11_HTML.jpg)


    **A screenshot of the Metamask notification window.** On the top is *Rinkeby Test
    Network, account 1 rightward arrow 0 x 3301 ellipsis f 83 A*. Below them is a
    link and a button for *set approval for all*. 2 tabs **Details** and **Data**
    in which **Data** is selected and it displays gas fee and total. The **Reject**
    and **Confirm** buttons are at the bottom.


    **Figure 5-11** MetaMask: confirm OpenSea transaction


    Now you will need to provide some more details about you, such as your email and
    nickname. You will be asked to provide additional information after the transaction
    is approved (Figure [5-12](#521550_1_En_5_Chapter.xhtml#Fig12)).


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig12_HTML.jpg)


    **A screenshot of a window titled listing successful.** The screenshot contains
    input options for **Email** (*asterisk*) and **Nickname** (*asterisk*), **Send
    me occasional updates about Opensea** is selected, and **Save** button on the
    bottom left.


    **Figure 5-12** OpenSea: additional information


    Click **Save**. Now, OpenSea will list your NFT for you!


    ### Exploring Listing Details


    Scroll down to **Trading History** (Figure [5-13](#521550_1_En_5_Chapter.xhtml#Fig13));
    as you can see, a new event was created named **List** and with **Price** set
    at US 10\. On this page you can see all the badge trading history on the platform.


    ![](images/521550_1_En_5_Chapter/521550_1_En_5_Fig13_HTML.jpg)


    **A screenshot of the page titled trading history.** There is an option named
    **Filter** on the top. At the bottom, there are columns named **Event**, **Price**,
    **From**, and **To**. Under **Event**, there are three heads, namely, **List**,
    **Transfer**, and **Created**.


    **Figure 5-13** OpenSea: trading history


    Click the **Share** icon. You can copy the link or share it on your social networks.


    ## Summary


    In this chapter, you learned how to create tokens in the `ERC-721` standard, pin
    the image in `IPFS`, and import it in `OpenSea` and put it up for sale.


    In the next chapter, we will find out how to use faucets and why they are important
    in testnets.


    Footnotes [1](#521550_1_En_5_Chapter.xhtml#Fn1_source)


    # Faucets


    You can use faucets to test smart contracts on the test network with no need to
    use real ether for this purpose (because ether from the mainnet is not valid in
    testnets, and vice versa). Ether in a test network has no real value except for
    testing purposes in smart contracts development.


    At the end of this chapter, you will be able to do the following:


    - Access the faucet on the `Ropsten` network

    - Access the faucet on the `Rinkeby` network

    - Access the faucet on the `Polygon Mumbai` test network

    - Access the faucet on the `Polygon` main network

    - Send test ether to your wallet

    - Send test `MATIC` to your wallet

    - Check the updated balance in your wallet'
