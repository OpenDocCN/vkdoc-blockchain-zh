    is struck out.


    Figure 3-14


    Infura: Polygon PoS activation page


    After activating it, you will be redirected to the summary page. The free layer
    is limited to 100,000 requests a day. You will be asked to provide a credit card
    in order to confirm; as the total cost is zero, you will not be charged. If you
    agree, click Get Started Now. You should see a page similar to the one shown in
    Figure [3-15](#521550_1_En_3_Chapter.xhtml#Fig15).


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig15_HTML.jpg)


    A screenshot of the Summary window lists the order total as $0 per month, total
    requests as 100,000 per day, core tier of 100,000 requests per day as $0 per month,
    add-ons of Polygon PoS as $0 per month. There is a discount code that can be applied.
    Below there is a checkout section with a credit card already saved.


    Figure 3-15


    Infura: Summary page order after adding the Polygon PoS plugin


    ### Setting Up Your Infura Project


    Make sure that you have a project already set up on Infura. If you haven’t already,
    please follow the steps in Chapter [1](#521550_1_En_1_Chapter.xhtml).'
  trans: '

    # 使用 Infura 将 ERC-20 代币部署到测试网


    `Infura` 可用于将智能合约部署到 Ropsten、Kovan、Rinkeby、Goerli 等测试网络以及主网。对于测试网，你需要在 `Infura`
    上创建一个新项目，并获取用于部署合约的钱包私钥。为了执行合约创建交易，该钱包必须拥有以太币余额。


    ## 安装先决条件


    打开一个新终端，安装 `fs` 包。安装此包可提供用于访问和与文件系统交互的有用功能。


    ```

    $ npm install fs

    ```


    现在，安装钱包提供程序 `hdwallet` 包。它用于为从 12 或 24 个单词的助记词派生的地址签署交易。


    ```

    $ npm install @truffle/hdwallet-provider@1.2.3

    ```


    ## 设置你的 Infura 项目


    访问 `http://infura.io` 并进入你的仪表盘。点击“以太坊”，然后点击“创建项目”。定义项目名称。请注意，你可以连接不同的测试网以及主网。复制项目
    ID 并保存更改。


    ## 设置你的智能合约


    打开 Visual Studio Code 并编辑 `truffle-config.js`。取消四个常量（`hdwalletprovider`、`infurakey`、`fs`
    和 `mnemonic`）的注释。将项目 ID 粘贴为 `infurakey` 常量的值。取消 `ropsten` 块的注释。确保你在 `ropsten`
    端点中使用了正确的项目 ID。


    ```

    const HDWalletProvider = require(''@truffle/hdwallet-provider'');

    const infuraKey = "fj4jll3k.....";

    const fs = require(''fs'');

    const mnemonic = fs.readFileSync(".secret").toString().trim();

    ```


    ## 配置私钥


    在浏览器中打开已连接到 Infura 网络的 MetaMask 钱包。点击“你的账户”，然后点击“设置”，最后点击“安全与隐私”（图 3-11）。


    你可以选择查看种子短语，但请注意此信息非常敏感，如果有人获得访问权限，他们将能够恢复你的钱包并使用你的资金。


    ![](img/521550_1_En_3_Fig11_HTML.jpg)


    Ropsten 测试网络中“安全与隐私”窗口的截图。屏幕上显示“显示种子短语”文字，并带有一个光标悬停的按钮，按钮上也显示“显示种子短语”。


    图 3-11 MetaMask：显示种子短语


    点击“显示种子短语”并输入你的钱包密码以继续；然后复制私钥。


    返回 Visual Studio Code（图 3-6）并创建一个名为 `.secret` 的新文件。将私钥粘贴到此文件中。你也可以使用命令行创建此文件（图
    3-12）。


    ![](img/521550_1_En_3_Fig12_HTML.jpg)


    截图显示在 Solidity 块下选中了 migrations 文件夹。命令提示符显示为“美元符号 touch 空格 dot secret”。


    图 3-12 Secret 文件


    ```

    $ touch .secret

    ```


    ## 部署智能合约


    打开终端并运行 `migrate` 命令，以将合约部署到 Ropsten 网络。


    ```

    $ truffle migrate --network ropsten

    ```


    ## 检查你的钱包余额


    再次进入你的 MetaMask 钱包，注意你的余额已经减少。


    ## 在 Etherscan 上验证智能合约


    打开一个新窗口，复制在部署阶段创建的合约地址。访问 `https://ropsten.etherscan.io`，将合约地址粘贴到搜索字段中。点击“查找”按钮。智能合约就在那里！


    代币已被创建并转移到创建合约的钱包中。点击“Fixed (FIX)”代币链接。在这里你可以看到新创建代币的概述。


    # 将 ERC-20 代币部署到 Polygon 测试网（第 2 层）


    Polygon 是一个用于构建和连接兼容以太坊的区块链网络的协议和框架。你可以在以太坊上聚合可扩展的解决方案，以支持多链以太坊生态系统。


    `MATIC`，Polygon 的原生代币，是一种在以太坊区块链上运行的 ERC-20 代币。该代币用于 Polygon 上的支付服务，并作为在 Polygon
    生态系统中运营的用户之间的结算货币。


    ## 安装先决条件


    打开一个新终端，如果尚未安装，请安装 `fs` 包。此包提供了许多有用的功能来访问和与文件系统交互。


    ```

    $ npm install fs

    ```


    现在，如果尚未安装，请安装钱包提供程序 `hdwallet` 包。它用于为从 12 或 24 个单词的助记词派生的地址签署交易。


    ```

    $ npm install @truffle/hdwallet-provider@1.4.0

    ```


    ## 将 Polygon Mumbai 添加到 MetaMask 网络


    打开 MetaMask 扩展程序并点击网络下拉菜单。然后选择“自定义 RPC”选项。设置以下值，如图 3-13 所示：


    ![](img/521550_1_En_3_Fig13_HTML.jpg)


    MetaMask 网络配置页面的截图内容如下。网络名称：Matic Testnet。新 RPC URL 下方输入了链接。链 ID：80001；货币符号（可选）：MATIC。最后一行显示区块浏览器
    URL（可选），并提供了链接。


    图 3-13 MetaMask：网络配置页面


    *   将网络名称设置为 **Matic Testnet**。

    *   将 RPC URL 设置为 `https://rpc-mumbai.maticvigil.com`。

    *   将链 ID 设置为 `80001`。

    *   将货币符号设置为 **MATIC**。

    *   将区块浏览器 URL 设置为 `https://explore-mumbai.maticvigil.com`。


    ## 在 Infura 上激活 Polygon 附加组件


    访问 `https://infura.io/upgrade`，然后在“网络附加组件”下的“Polygon PoS”中点击“选择附加组件”，如图 3-14 所示。Polygon
    PoS 目前在 Infura 上处于 beta 版本，你需要激活它。


    ![](img/521550_1_En_3_Fig14_HTML.jpg)


    “网络附加组件”窗口的截图将 Polygon PoS 描述为一种以太坊主网的混合 Plasma 权益证明侧链，它利用了 Tendermint 共识验证器层和用于区块生产的
    Plasma 侧链。“选择附加组件”和“即将推出更多”按钮显示在下方。每月 200 美元的价格已被划掉。


    图 3-14 Infura：Polygon PoS 激活页面


    激活后，你将被重定向到摘要页面。免费层限制为每天 100,000 个请求。你将需要提供信用卡以确认；由于总费用为零，你不会被收费。如果你同意，请点击“立即开始”。你应该会看到类似于图
    3-15 所示的页面。


    ![](img/521550_1_En_3_Fig15_HTML.jpg)


    摘要窗口的截图列出了订单总额为每月 0 美元，总请求数为每天 100,000 次，核心层级（每天 100,000 次请求）为每月 0 美元，Polygon
    PoS 附加组件为每月 0 美元。可以应用折扣代码。下方是结账区域，已保存信用卡。


    图 3-15 Infura：添加 Polygon PoS 插件后的订单摘要页面


    ## 设置你的 Infura 项目


    确保你已经在 Infura 上设置了一个项目。如果尚未设置，请按照第 1 章中的步骤进行操作。

