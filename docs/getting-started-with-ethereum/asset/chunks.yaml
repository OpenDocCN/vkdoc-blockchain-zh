    ### 将 NFT 代币添加到你的钱包


    在你的手机上打开 MetaMask 钱包，然后点击**收藏品**（图 5-5）。请注意，收藏品仅在移动版本中可用。


    ![](img/521550_1_En_5_Fig5_HTML.jpg)


    **MetaMask 钱包截图。** 顶部是标题 *钱包，Rinkeby 测试网络*。标题下方是 *Account 2，8548.21009 美元，0 x
    6276 省略号 A 996*。底部有**接收**、**发送**和**兑换**选项。


    **图 5-5** MetaMask：收藏品标签页


    点击**添加收藏品**。在此处粘贴代币合约地址（与你之前复制的那一个相同），并输入代币 ID（由于这是你的第一个代币，请输入 `1`）。


    点击**添加**，等待几秒钟（图 5-6）。NFT 代币已添加成功！


    ![](img/521550_1_En_5_Fig6_HTML.jpg)


    **MetaMask 钱包截图。** 页面标题为 *Wallet，Rinkeby 测试网络*。标题下方是 *Account 2，8548.21009 美元，0
    x 6276 省略号 A996*。**接收**、**发送**和**兑换**选项。底部有两个标签页：**代币**和**收藏品**。**收藏品**标签页被选中，标签页下方有一个名为
    *0 U N A* 的唯一资产选项。


    **图 5-6** MetaMask：添加智能合约后，它将在此处显示


    点击**UniqueAsset**。现在你可以看到你获得的所有徽章（图 5-7）。你可以拥有来自同一个智能合约的多个代币，每个代币将通过唯一的标识符进行区分。


    ![](img/521550_1_En_5_Fig7_HTML.jpg)


    **MetaMask 唯一资产截图。** 页面标题为 *unique asset，Rinkeby 测试网络*。标题下方是一个标有 *1 unique asset*
    的图标，以及**发送**、**添加**和**信息**选项。底部有一个标有 *my badge，hashtag 1* 的图标，带有可选选项。


    **图 5-7** MetaMask：徽章列表


    点击**我的徽章**。现在你可以看到徽章的详细信息！此外，你还有一个**发送**按钮，可以将徽章发送到另一个钱包（图 5-8）。


    ![](img/521550_1_En_5_Fig8_HTML.jpg)


    **MetaMask 唯一资产截图。** 页面标题为 *unique asset，Rinkeby 测试网络*。标题下方是一个标有 *M E S T R E*
    的徽章。底部是文本 *my badge hashtag 1* 和一个**发送**按钮。


    **图 5-8** MetaMask：徽章展示


    就是这样！你刚刚创建了你的第一个 NFT 代币！


    ## 在 OpenSea 上出售你的艺术品 NFT


    OpenSea 是一个数字商品市场，例如收藏品、游戏物品、数字艺术以及其他由以太坊等区块链支持的数字资产。你可以在 OpenSea 上与世界上任何人购买、出售和交易这些物品。


    ### 连接到 OpenSea


    前往 OpenSea^(²⁰)，确保你已连接到包含该 NFT 的钱包，并且你正在使用 Rinkeby 测试网络。


    ### 查看你的徽章


    前往**我的个人资料**。点击**活动**，然后点击徽章标题。这些就是你的徽章详细信息。详情页面允许你查看与徽章交易相关的各种信息。


    ### 挂牌出售你的徽章


    点击**出售**，然后点击**设置价格**。在**价格**中，设置你期望出售该 NFT 的价格。在此页面，你可以设置徽章的定价方式，并安排其在未来某个日期上架（图
    5-9）。


    ![](img/521550_1_En_5_Fig9_HTML.jpg)


    **唯一资产，我的徽章截图。** 它有*选择出售方式*的三个选项，分别为**设置价格**、**最高出价**和**捆绑**。它们下方是一个价格输入选项。**包含结束价格**、**安排在未来时间**和**隐私**带有开关选项。


    **图 5-9** OpenSea：徽章定价页面


    点击**发布你的清单**。你将被重定向到**摘要**页面（图 5-10）。在此页面，你可以看到出售徽章时将扣除的总费用。


    ![](img/521550_1_En_5_Fig10_HTML.jpg)


    **摘要页面截图。** 有 3 个部分：**清单**、**赏金**和**费用**。**清单**部分有**发布你的清单**以及一个可选选项。**赏金**和**费用**部分包含有关联盟客的说明和详细信息。**赏金**旁边有一个**编辑**按钮，**费用**下方有一个**了解更多**的链接。


    **图 5-10** OpenSea：徽章的摘要页面


    `MetaMask` 将被打开以验证交易（图 5-11）。点击**确认**。在此步骤中，你需要批准交易，该交易将确认你的徽章在平台上挂牌出售。


    ![](img/521550_1_En_5_Fig11_HTML.jpg)


    **MetaMask 通知窗口截图。** 顶部是 *Rinkeby 测试网络，account 1 右箭头 0 x 3301 省略号 f 83 A*。它们下方是一个链接和一个用于*设置全局批准*的按钮。有
    **详情** 和 **数据** 两个标签页，其中**数据**被选中，并显示了 gas 费用和总计。底部有**拒绝**和**确认**按钮。


    **图 5-11** MetaMask：确认 OpenSea 交易


    现在，你需要提供一些关于你自己的更多详细信息，例如你的电子邮件和昵称。交易被批准后，系统会要求你提供额外信息（图 5-12）。


    ![](img/521550_1_En_5_Fig12_HTML.jpg)


    **标题为“清单创建成功”的窗口截图。** 截图包含**电子邮件**（*星号*）和**昵称**（*星号*）的输入选项，**向我发送有关 Opensea 的最新消息（非定期）**
    已被选中，并且左下角有**保存**按钮。


    **图 5-12** OpenSea：额外信息


    点击**保存**。现在，OpenSea 将为你列出你的 NFT！


    ### 探索清单详情


    向下滚动到**交易历史**（图 5-13）；如你所见，创建了一个名为**清单**的新事件，其**价格**设置为 10 美元。在此页面，你可以查看该徽章在平台上的所有交易历史记录。


    ![](img/521550_1_En_5_Fig13_HTML.jpg)


    **标题为“交易历史”的页面截图。** 顶部有一个名为**筛选器**的选项。底部有名为**事件**、**价格**、**来自**和**至**的列。在**事件**列下，有三个标题，分别是**清单**、**转移**和**创建**。


    **图 5-13** OpenSea：交易历史


    点击**分享**图标。你可以复制链接或将其分享到你的社交网络。


    ## 本章小结


    在本章中，你学习了如何创建 `ERC-721` 标准的代币，在 `IPFS` 中固定图像，并将其导入 `OpenSea` 并挂牌出售。


    在下一章中，我们将了解如何使用水龙头以及它们为什么在测试网络中很重要。


    脚注 1


    # 水龙头


    你可以使用水龙头在测试网络上测试智能合约，而无需为此使用真正的以太币（因为主网上的以太币在测试网络中无效，反之亦然）。测试网络中的以太币除了用于智能合约开发的测试目的外，没有实际价值。


    在本章结束时，你将能够执行以下操作：


    -   访问 `Ropsten` 网络上的水龙头

    -   访问 `Rinkeby` 网络上的水龙头

    -   访问 `Polygon Mumbai` 测试网络上的水龙头

    -   访问 `Polygon` 主网络上的水龙头

    -   将测试以太币发送到你的钱包

    -   将测试 `MATIC` 发送到你的钱包

    -   检查钱包中的更新余额

