    after that. Make sure you get the same result as shown in Figure [3-9](#521550_1_En_3_Chapter.xhtml#Fig9).


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig9_HTML.jpg)


    A screenshot of the Add Tokens window has 2 tabs, Search and Custom Token. Custom
