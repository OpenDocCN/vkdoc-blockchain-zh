    \ price feeds.\n\nFigure 10-2 Chainlink price feeds\n\nPaste the address into\
    \ the `AggregatorV3Interface` constructor. After that, create the function to\
    \ get the price.\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8.0;\n\
    import \"@chainlink/contracts/src/v0.6/interfaces/AggregatorV3Interface.sol\"\
    ;\ncontract PriceConsumer {\n    AggregatorV3Interface internal priceFeed;\n \
    \   constructor() {\n        priceFeed = AggregatorV3Interface(0x9326BFA02ADD2366b30bacB125260Af641031331);\n\
    \    }\n    function getThePrice() public view returns (int) {\n        (\n  \
    \          uint80 roundID,\n            int price,\n            uint startedAt,\n\
    \            uint timeStamp,\n            uint80 answeredInRound\n        ) =\
    \ priceFeed.latestRoundData();\n        return price;\n    }\n}\n```\n\n### Creating\
    \ the Migration\n\nCreate the migration file in the `migrations` folder.\n\n```\n\
    $ touch migrations/2_deploy_contracts.sol\n```\n\nWrite code to deploy the `PriceConsumer`\
    \ smart contract (Figure [10-3](#521550_1_En_10_Chapter.xhtml#Fig3)).\n\n![](images/521550_1_En_10_Chapter/521550_1_En_10_Fig3_HTML.jpg)\n\
    \nA screenshot of the VS Code migrations folder has the `2_deploy_contracts.js`\
    \ tab open. The number 1 is displayed on the window.\n\nFigure 10-3 VS Code migrations\
    \ folder\n\n```\nconst PriceConsumer = artifacts.require(\"PriceConsumer\");\n\
    module.exports = function(deployer) {\n    deployer.deploy(PriceConsumer);\n};\n\
    ```\n\n### Setting Up Your Infura Project\n\nGo to [`https://infura.io`](https://infura.io)\
    \ and access your dashboard. Click Ethereum and then click \"Create a project\"\
    . Finally, define the project name and copy the project ID (Figure [10-4](#521550_1_En_10_Chapter.xhtml#Fig4)).\
    \ Notice that you can connect with different testnets and also to the mainnet.\n\
    \n![](images/521550_1_En_10_Chapter/521550_1_En_10_Fig4_HTML.jpg)\n\nA screenshot\
