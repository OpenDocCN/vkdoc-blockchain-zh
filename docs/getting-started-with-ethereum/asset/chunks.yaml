  trans: '

    # 创建您的 IPFS 节点


    现在，让我们使用命令行创建一个 IPFS 节点，并上传您的第一个文件。


    ## 安装节点


    使用 Choco 包管理器安装 IPFS。^((24)) `go-ipfs` 包是用 Go 语言实现的 IPFS 版本。


    ```

    $ choco install go-ipfs

    ```


    ## 配置节点


    初始化 IPFS 本地仓库。


    ```

    $ ipfs init

    ```


    启动 IPFS 本地服务器。`daemon` 命令会在 `127.0.0.1:5001` 上启动一个 IPFS 本地服务器。


    ```

    $ ipfs daemon

    ```


    ## 测试节点


    您可以通过显示与您的节点直接连接的对等点来测试 IPFS 节点。


    ```

    $ ipfs swarm peers

    ```


    您还可以使用 `cat` 命令并将哈希值作为参数传递来查看一些 IPFS 文件内容（图 7-1）。


    ![](img/521550_1_En_7_Fig1_HTML.jpg)


    这是一张 IPFS 命令输出的截图，显示已打开的终端标签页并附带了链接。下方文字显示“Hello and Welcome to IPFS”，其中 IPFS
    字体较大且样式化。底部文字显示“If you''re seeing this, you have successfully installed IPFS and
    are now interfacing with the ipfs merkledag”。


    **图 7-1** IPFS `cat` 命令的输出


    ```

    $ ipfs cat

    ```


    ## 探索您的 IPFS 节点


    打开浏览器，访问 Web UI 地址 `http://127.0.0.1:5002/`。您的节点已连接到 IPFS！现在，点击“Files”并注意，这里还没有任何文件（图
    7-2）。


    点击“Explore”，然后点击“Peers”。这些是您连接到的对等点。最后，点击“Settings”。您可以在该界面看到节点设置。


    ![](img/521550_1_En_7_Fig2_HTML.png)


    这是一张 IPFS Web UI 的截图，包含以下图标：Status、Files（鼠标悬停在此）、Explore、Peers 和 Settings。在 Files
    窗口中，显示一条提示：“No files here yet! Add files to your local IPFS node by clicking the
    Import button above.”。右上角区域包含导入按钮及其他详细信息。


    **图 7-2** IPFS Web UI


    # 向 IPFS 添加文件


    运行 IPFS 的计算机可以向其连接的所有对等点询问它们是否拥有具有特定哈希值的文件，如果某个对等点拥有该文件，则该对等点会发回整个文件。如果没有一个简短且唯一的标识符（例如加密哈希值），这是不可能实现的。


    ## 添加文件


    启动 IPFS 本地服务器。`daemon` 命令会在 `127.0.0.1:5001` 上启动一个 IPFS 本地服务器。


    ```

    $ ipfs daemon

    ```


    现在，使用 `echo` 命令创建一个名为 `hello.txt` 的新文件。该命令会将给定的文本输出到一个新文件中。


    ```

    $ echo "test" hello.txt

    ```


    使用 `ipfs add` 命令将新创建的文件添加到您的本地 IPFS 节点。


    ```

    $ ipfs add hello.txt

    ```


    该文件已添加到 IPFS，并生成一个哈希标识符。


    ## 在控制台上查看文件内容


    您可以使用 `ipfs cat` 命令加上哈希值来查看这个新添加文件的内容。为此，请将 `<your_hash>` 代码片段替换为上一步中通过命令“`ipfs
    add hello.txt`”生成的结果哈希标识符。


    ```

    $ ipfs cat

    ```


    运行此命令后，文件内容将显示在终端上。


    ## 在 Web UI 中检查文件


    转到 `http://127.0.0.1:5001/webui` 并点击“Files”。然后，点击“Pins”并复制哈希值。使用此哈希值进行搜索，您将看到该哈希值已存在。


    ## 在浏览器中查看文件内容


    打开一个新标签页，访问 `ipfs://<your_hash>`。现在您可以在浏览器中看到您的文件内容。再次提醒，请将 `<your_hash>` 代码片段替换为通过命令“`ipfs
    cat <your_hash>`”为您的文件生成的结果哈希标识符。


    # 设置 IPFS 浏览器扩展


    IPFS Companion 扩展^((25)) 允许您在首选浏览器内本地运行一个 IPFS 节点，支持 `ipfs://` 地址、网站和文件路径的自动 IPFS
    网关加载、简单的 IPFS 文件导入和共享等功能。


    ## 安装浏览器扩展


    访问 IPFS Companion 扩展^((26)) 页面，然后点击“Add to Brave”或您浏览器的名称。点击“Add extension”，然后点击“Extensions”图标。最后，将
    IPFS Companion 扩展固定在扩展栏上。


    ## 配置节点类型


    点击 IPFS Companion 图标，然后点击齿轮图标。对于“IPFS Node Type”，选择“External”。


    ## 启动外部节点


    打开 Visual Studio Code，并新建一个终端。启动一个新的 IPFS 本地服务器。


    ```

    $ ipfs daemon

    ```


    ## 导入文件


    点击 IPFS Companion 图标，然后点击“Import”。点击“Pick a file”并从本地磁盘中选择一个文件。该文件将存储在您的 IPFS
    节点中。


    # 在本地节点上固定和取消固定 IPFS 文件


    数据可以固定到一个或多个 IPFS 节点，以确保它保留在 IPFS 上，并且在垃圾回收期间不会被删除。固定文件可以让您管理存储空间和数据保留策略。因此，您应该固定任何您希望永久保留在
    IPFS 上的内容。IPFS 的默认行为是将文件固定到您的本地 IPFS 节点。


    ## 启动本地节点


    启动 IPFS 本地服务器。`daemon` 命令会在 `127.0.0.1:5001` 上启动一个 IPFS 本地服务器。


    ```

    $ ipfs daemon

    ```


    ## 向节点添加文件


    现在，使用 `echo` 命令创建一个名为 `hello.txt` 的新文件。该命令会将给定的文本输出到一个新文件中。


    ```

    $ echo "world" hello.txt

    ```


    使用 `ipfs add` 命令将新创建的文件添加到您的本地 IPFS 节点。


    ```

    $ ipfs add hello.txt

    ```


    该文件已添加到 IPFS，并生成一个哈希标识符。当您添加文件时，它会自动固定到您的本地节点。


    ## 检查文件是否已添加


    要检查文件是否已添加，您可以使用 `ipfs cat` 命令将文件内容输出到终端。


    ```

    $ ipfs cat your_file_hash

    ```


    ## 验证文件已固定


    转到 `http://127.0.0.1:5001/webui`，点击“Files”，然后点击“Pins”。您的文件就在那里！


    ## 取消固定文件


    您可以使用以下命令简单地取消文件中您在本地 IPFS 节点的固定：


    ```

    $ ipfs pin rm

    ```


    ## 手动固定文件


    您可以使用以下命令手动固定文件。请记住，您需要复制文件的哈希值才能固定或取消固定它。


    ```

    $ ipfs pin add

    ```


    完成！您的文件已再次被固定。

