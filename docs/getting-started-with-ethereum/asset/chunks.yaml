  trans: '

    # 从智能合约获取价格信息


    使用 Truffle 控制台实例化合约。该控制台命令会打开一个基础交互式控制台，该控制台连接到 Kovan 网络上的以太坊客户端：


    ```

    $ truffle console --network kovan

    ```


    现在，使用 `deployed` 命令返回在 Kovan 网络上已部署的合约实例，如下所示：


    ```

    truffle(kovan) let instance = await PriceConsumer.deployed()

    ```


    调用 `getThePrice` 方法。`let` 命令将方法结果存储在变量 `price` 中，`await` 命令将异步执行该方法。


    ```

    truffle(kovan) let price = await instance.getThePrice()

    ```


    最后，将结果输出为数字。方法 `toNumber()` 将大数对象转换为常规数字。


    ```

    truffle(kovan) price.toNumber()

    ```


    就这样，你刚刚创建了一个智能合约并使用了 Chainlink 价格馈送预言机！


    ## 总结


    在本章中，你学习了如何创建一个简单的智能合约，以使用 Chainlink 从 Chainlink 预言机获取价格信息。


    在下一章中，你将学习 Nethereum，一个用于以太坊的 .NET 库。


    # Nethereum


    Nethereum 是一个用于以太坊的开源 .NET 集成库，它简化了智能合约的维护以及与公共和私有以太坊节点的交互。该框架暴露了一个 `Web3` 类，通过它可以与钱包或智能合约的方法进行交互。在本章你将看到的示例中，你将使用钱包的
    `GetBalance` 方法来查询其余额。


    在本章结束时，你将能够做到以下几点：


    -   使用 `dotnet` 创建一个新的控制台项目

    -   创建一个使用 Nethereum 获取钱包余额的方法

    -   在控制台中显示结果


    ## 使用 Nethereum 获取你的以太币余额


    让我们从创建一个新的控制台项目并将 Nethereum 的 `Web3` 包添加到我们的应用程序开始。然后，你将创建获取特定钱包地址余额的方法。最后，你将把以
    wei 和 ether 为单位的信息打印到控制台。


    ### 创建项目


    进入终端并点击“新建终端”。如下所示创建一个新的 `dotnet` 控制台项目。此命令根据指定的模板创建一个新项目、配置文件或解决方案：


    ```

    $ dotnet new console -o sample

    ```


    进入项目的根目录。


    ```

    $ cd sample

    ```


    ### 安装 Web3


    安装 Nethereum 的 `Web3` 包。此命令向项目文件添加包引用：


    ```

    $ dotnet add package Nethereum.Web3

    ```


    还原所有项目包。此命令还原项目的依赖项和工具：


    ```

    $ dotnet restore

    ```


    ### 创建方法


    打开 `Program.cs` 文件，添加线程和 `Web3` 的引用。现在，添加一个用于获取账户余额的新方法，然后实例化一个新的 `Web3` 对象。


    进入你的 Infura 项目设置并选择 Ropsten 网络。复制 Ropsten 的 `https` 端点（图 11-1）。


    ![](img/521550_1_En_11_Fig1_HTML.jpg)


    Infura 项目密钥的截图，左上角是项目 ID，右上角是项目密钥和栏，端点上选择了 Ropsten 选项，下方提供了 2 个链接，旁边有可点击的复制图标。


    图 11-1：Infura 项目密钥


    将此端点作为 `Web3` 对象构造函数的参数。在 `Program.cs` 文件中，使用你的钱包公钥作为参数从 `Web3` 获取余额。编写代码以 wei
    为单位输出余额，然后将 wei 余额转换为 ether。最后，编写以 ether 为单位输出余额的代码。现在，修改你的 main 方法来调用 `GetAccountBalance()`。


    ```

    using System;

    using System.Threading.Tasks;

    using Nethereum.Web3;

    namespace NethereumSample

    {

    class Program

    {

    static void Main(string[] args)

    {

    GetAccountBalance().Wait();

    Console.ReadLine();

    }

    static async Task GetAccountBalance()

    {

    var web3 = new Web3("https://ropsten.infura.io/v3/39180531508b4b659780ef7a36426a86");

    var balance = await web3.Eth.GetBalance.SendRequestAsync("0x03d1b3162DBFaB4A175038eAa4EA4b39423d5A6F");

    Console.WriteLine($"Balance in Wei: {balance.Value}");

    var etherAmount = Web3.Convert.FromWei(balance.Value);

    Console.WriteLine($"Balance in Ether: {etherAmount}");

    }

    }

    }

    ```


    ### 获取余额


    构建项目。此命令构建项目及其所有依赖项：


    ```

    $ dotnet build

    ```


    运行项目。此命令运行源代码，无需任何显式的编译或启动命令：


    ```

    $ dotnet run

    ```


    检查终端输出，确保你得到如图 11-2 所示的结果。


    ![](img/521550_1_En_11_Fig2_HTML.jpg)


    VS Code 中 wei 和 ether 余额的截图。已选中 `Program.cs` 文件，终端选项卡已打开。其详细信息，即 wei 余额和 ether
    余额显示在命令“$ dotnet run”下方的窗口中。命令中的 dot 和 net 之间没有空格。


    图 11-2：VS Code 中 wei 和 ether 的余额


    ## 总结


    在本章中，你学习了如何创建一个使用 Nethereum 获取钱包余额的控制台项目。

