- fmt: '# 4. Unit Tests for Smart Contracts


    Unit tests are used to test code execution scenarios and ensure that they behave
    as expected. Crucially, unit tests allow you to refactor code and make new changes
    without breaking existing behaviors.


    In smart contracts, unit tests are even more important, as once the contract is
    deployed, it is no longer possible to fix it unless you deploy a new contract.
    Because of this, it is of fundamental importance that you incorporate unit tests
    into all the smart contracts you write, looking for as much coverage as possible.


    In this chapter, you will learn how to write unit tests using `Mocha` as the test
    runner and `Chai` as the assertion library.


    At the end of this chapter, you will be able to do the following:


    - Create a unit test file

    - Write unit tests for the smart contract

    - Write test assertions

    - Run the unit tests

    - Check the unit test results


    ## Writing Unit Tests for ERC-20 Smart Contracts


    `Truffle` has an automated testing framework by default, making it considerably
    easier to test your contracts. This framework allows you to create basic and manageable
    tests in a variety of ways. Let’s start coding our first unit test.


    ### Creating a New Unit Test File


    Open a new terminal and execute the following command:


    ```

    $ truffle create test erc20FixedSupply

    ```


    ### Writing a Test for the Total Supply Contract


    In the file `ERC20FixedSupply.js`, write a new test to assert that the contract
    was created with a fixed supply of 1,000 coins.


    ```

    const erc20FixedSupply = artifacts.require("erc20FixedSupply");

    contract("erc20FixedSupply", function () {

    it("should assert true", async function() {

    let token = await erc20FixedSupply.deployed();

    let name = await token.name();

    assert.equal(name, ''Fixed'');

    });

    it("should return total supply of 1000", async function() {

    const instance = await erc20FixedSupply.deployed();

    const totalSupply = await instance.totalSupply();

    assert.equal(totalSupply, 1000);

    });

    });

    ```


    Test using the following command:


    ```

    $ truffle test --network development

    ```


    Make sure that the test will pass.


    ### Writing Test Assertions for the Balance Contract


    In the file `ERC20FixedSupply.js`, add one more test to assert that the balance
    is correct after a new transfer is made between two accounts.


    ```

    it("should transfer 150 FIX", async function(){

    const instance = await erc20FixedSupply.deployed();

    await instance.transfer(account[1], 150);

    const balanceAccount0 = await instance.balanceOf(accounts[0]);

    const balanceAccount1 = await instance.balanceOf(accounts[1]);

    assert.equal(balanceAccount0.toNumber(), 850);

    assert.equal(balanceAccount1.toNumber(), 150);

    });

    ```


    ### Running the Unit Tests


    Now, execute the test again.


    ```

    $ truffle test --network development

    ```


    Once again, make sure that all the tests pass. If the unit test has passed, a
    green check mark will appear; otherwise, a red x symbol will appear.


    ### Checking the Unit Test Results


    Make sure you get the same output as shown in Figure [4-1](#521550_1_En_4_Chapter.xhtml#Fig1).


    ![](images/521550_1_En_4_Chapter/521550_1_En_4_Fig1_HTML.jpg)


    A screenshot of the VS Code presents the following output. `Contract: erc20FixedSupply.`
    Check mark for: should assert true, 72 milliseconds. Check mark for: should return
    total supply of 1000, 83 milliseconds. Check mark for: should transfer 150 FIX,
    494 milliseconds, 3 passing, 776 milliseconds.


    **Figure 4-1**


    VS Code: unit test results succeed


    Try to change some values like the account balance and see how the results change
    from pass to fail, as shown in Figure [4-2](#521550_1_En_4_Chapter.xhtml#Fig2).


    ![](images/521550_1_En_4_Chapter/521550_1_En_4_Fig2_HTML.jpg)


    A screenshot of the VS Code presents the following output. `Contract: erc20FixedSupply;`
    Check mark for: should assert true: 51 milliseconds; Check mark for: should return
    total supply of 1000, 51 milliseconds; 1, should transfer 150 FIX. The next section
    reads Events emitted during test with details and an explanation for them.


    **Figure 4-2**


    VS Code: unit test results failed


    ```

    it("should transfer 150 FIX", async function(){

    const instance = await erc20FixedSupply.deployed();

    await instance.transfer("account[1]", 150);

    const balanceAccount0 = await instance.balanceOf(accounts[0]);

    const balanceAccount1 = await instance.balanceOf(accounts[1]);

    assert.equal(balanceAccount0.toNumber(), 750);

    assert.equal(balanceAccount1.toNumber(), 250);

    });

    ```


    ## Summary


    In this chapter, you learned the importance of writing unit tests for smart contracts
    and wrote your first unit test.


    In the next chapter, we will explore the ERC-721 token standard and how it differs
    from ERC-20. In addition, you’ll learn to create and deploy contracts in this
    standard.


    # 5. ERC-721 Nonfungible Tokens


    A nonfungible token (NFT) is a digital asset that represents physical objects
    such as art, music, in-game items, and videos. In this chapter, I’ll show you
    how to create an NFT ERC-721 and deploy it to the Ethereum testnet network, as
    well as how to add it to your `MetaMask` mobile wallet.


    At the end of this chapter, you will be able to do the following:


    - Create a new NFT project

    - Configure the network to deploy on `Ganache`

    - Configure the private key

    - Create the badge image

    - Add the badge to the local `IPFS`

    - Pin the badge to a remote `IPFS`

    - Create the badge metadata

    - Deploy the smart contract

    - Award the badge to your wallet

    - Check the badge on `Etherscan`

    - Add the badge to your mobile wallet


    ## Create Your Art NFT Using Ganache and OpenZeppelin


    Let’s configure your first NFT using the `OpenZeppelin` library and create the
    metadata that will store the token information and then deploy it to a test network.
    Finally, you will view the token in your wallet.


    ### Creating the Project


    Create a new project using `Truffle`.


    ```

    $ truffle init

    ```


    Install the `OpenZeppelin` contracts.


    ```

    $ npm install @openzeppelin/contracts

    ```


    Create a new `Solidity` smart contract.


    ```

    $ touch contracts/UniqueAsset.sol

    ```


    Open the `UniqueAsset.sol` file and import the `ERC721URIStorage.sol` extension
    and `Counters.sol` utility. Create a new class extending `ERC721URIStorage`. Declare
    the counters variable and declare the constructor passing the coin name and the
    code.


    Create a new method named `awardItem`. Inside the new method, increment the token
    ID. Get the new token number using `_tokenIds.current()`.


    Mint a new item using the method `_mint`. Finally, set the token URI passing the
    metadata using the method `_setTokenURI`.


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8.0;

    import "@openzeppelin/contracts/token/ERC721/extensions/ERC721URIStorage.sol";

    import "@openzeppelin/contracts/utils/Counters.sol";

    contract UniqueAsset is ERC721URIStorage {

    using Counters for Counters.Counter;

    Counters.Counter private _tokenIds;

    constructor() ERC721("UniqueAsset", "UNA") {}

    function awardItem(address recipient, string memory metadata)

    public

    returns (uint256)

    {

    _tokenIds.increment();

    uint256 newItemId = _tokenIds.current();

    _mint(recipient, newItemId);

    _setTokenURI(newItemId, metadata);

    return newItemId;

    }

    }

    ```


    Create a new migration file using the `touch` command. This command creates a
    new file in the `migrations` folder.


    ```

    $ touch migrations/2_deploy_contracts.sol

    ```


    Inside the `2_deploy_contracts.js` file, export the smart contract in the migration
    file.


    ```

    const UniqueAsset = artifacts.require("UniqueAsset");

    module.exports = function (deployer) {

    deployer.deploy(UniqueAsset);

    }

    ```'
