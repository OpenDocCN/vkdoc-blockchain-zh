- fmt: '# Deploy the ERC-20 Token to a Testnet Using Infura


    `Infura` can be used to deploy smart contracts to test networks such as Ropsten,
    Kovan, Rinkeby, Goerli, and also the mainnet. For the testnet, you will need to
    create a new project on `Infura` and have access to the wallet’s private key,
    which you will use to deploy the contracts. To execute the contract creation transaction,
    this wallet must have an ether balance.


    ## Installing the Prerequisites


    Open a new terminal and install the `fs` package. Installing this package provides
    useful functionality to access and interact with the file system.


    ```

    $ npm install fs

    ```


    Now, install the wallet provider `hdwallet` package. This is used to sign transactions
    for addresses derived from a 12- or 24-word mnemonic.


    ```

    $ npm install @truffle/hdwallet-provider@1.2.3

    ```


    ## Setting Up Your Infura Project


    Go to `http://infura.io` and access your dashboard. Click “Ethereum” and then
    click “Create a Project”. Define the project name. Notice that you can connect
    with different testnets and also to the mainnet. Copy the project ID and save
    the changes.


    ## Setting Up Your Smart Contract


    Go to Visual Studio Code and open `truffle-config.js`. Uncomment the four constants:
    `hdwalletprovider`, `infurakey`, `fs`, and `mnemonic`. Paste the project ID as
    a value for the `infurakey` constant. Uncomment the `ropsten` block. Make sure
    you are using the correct project ID in the `ropsten` endpoint.


    ```

    const HDWalletProvider = require(''@truffle/hdwallet-provider'');

    const infuraKey = "fj4jll3k.....";

    const fs = require(''fs'');

    const mnemonic = fs.readFileSync(".secret").toString().trim();

    ```


    ## Configuring the Private Key


    Go to the browser and open your MetaMask wallet connected to the Infura network.
    Click “your account” and then click “settings,” and finally click “security &
    privacy” (Figure 3-11).


    You have the option to view your seed phrase, but be aware that this information
    is sensitive and if someone has access to it, they will be able to restore your
    wallet and make use of your funds.


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig11_HTML.jpg)


    A screenshot of the Security and Privacy window in the Ropsten Test Network. A
    phrase on the screen reads Reveal Seed Phrase, with a button with the cursor on
    it, which also reads Reveal Seed Phrase.


    Figure 3-11 MetaMask: revealing the seed phrase


    Click “Reveal Seed Phrase” and enter your wallet password to continue; then copy
    the private key.


    Go back to Visual Studio Code (Figure 3-6) and create a new file named `.secret`.
    Paste the private key into this file. You can also create this file using the
    command line (Figure 3-12).


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig12_HTML.jpg)


    A screenshot has the migrations folder selected under the Solidity block. The
    command prompt reads dollar sign touch space dot secret.


    Figure 3-12 Secret file


    ```

    $ touch .secret

    ```


    ## Deploying the Smart Contract


    Open the terminal and run the `migrate` command to deploy the contracts on the
    Ropsten network.


    ```

    $ truffle migrate --network ropsten

    ```


    ## Checking Your Wallet Balance


    Go to your MetaMask wallet again and notice now that your balance has been reduced.


    ## Verifying the Smart Contract on Etherscan


    Open a new window and copy the contract address that was created in the deploy
    stage. Go to `https://ropsten.etherscan.io` and paste the contract address into
    the search field. Click the Find button. The smart contract is there!


    The tokens were created and transferred to the wallet that created the contract.
    Click the Fixed (FIX) token link. Here you can see an overview of your newly created
    token.


    # Deploy the ERC-20 Token to the Polygon Testnet (Layer 2)


    Polygon is a protocol and framework for building and connecting Ethereum-compatible
    blockchain networks. You can aggregate scalable solutions on Ethereum to support
    a multichain Ethereum ecosystem.


    `MATIC`, the native token of Polygon, is an ERC-20 token running on the Ethereum
    blockchain. The tokens are used for payment services on Polygon and as a settlement
    currency between users who operate within the Polygon ecosystem.


    ## Installing the Prerequisites


    Open a new terminal and install the `fs` package, if you haven’t already done
    so. This package provides a lot of useful functionality to access and interact
    with the file system.


    ```

    $ npm install fs

    ```


    Now, install the wallet provider `hdwallet` package, if you haven’t already done
    so. It is used to sign transactions for addresses derived from a 12- or 24-word
    mnemonic.


    ```

    $ npm install @truffle/hdwallet-provider@1.4.0

    ```


    ## Adding Polygon Mumbai to MetaMask Networks


    Open the MetaMask extension and click the Network drop-down. Then select the Custom
    RPC option. Set the following values, as shown in Figure 3-13:


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig13_HTML.jpg)


    A screenshot of the MetaMask network configuration page reads as follows. Network
    Name, Matic Testnet. New R P C U R L has the link entered below. Chain I D with
    8 0 0 0 1; Currency Symbol, optional with MATIC. The last line reads Block Explorer
    U R L, optional, with the provided link.


    Figure 3-13 MetaMask: network configuration page


    *   Set the network name to **Matic Testnet**.

    *   Set the RPC URL to `https://rpc-mumbai.maticvigil.com`.

    *   Set the chain ID to `80001`.

    *   Set the currency symbol to **MATIC**.

    *   Set the Block Explorer URL to `https://explore-mumbai.maticvigil.com`.


    ## Activating the Polygon Add-on on Infura


    Go to `https://infura.io/upgrade` and click Select Addon in the Polygon PoS under
    Network Add-ons, as shown in Figure 3-14. The Polygon PoS is currently in beta
    version on Infura, and you need to activate it.


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig14_HTML.jpg)


    A screenshot of the Network Add-Ons window describes the polygon PoS as a hybrid
    Plasma Proof-of-Stake sidechain to Ethereum''s mainnet which utilizes a Tendermint
    consensus validator layer and a Plasma sidechain for block production. Select
    AddOn and More coming soon buttons are shown below. The pricing of $200 per month
    is struck out.


    Figure 3-14 Infura: Polygon PoS activation page


    After activating it, you will be redirected to the summary page. The free layer
    is limited to 100,000 requests a day. You will be asked to provide a credit card
    in order to confirm; as the total cost is zero, you will not be charged. If you
    agree, click Get Started Now. You should see a page similar to the one shown in
    Figure 3-15.


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig15_HTML.jpg)


    A screenshot of the Summary window lists the order total as $0 per month, total
    requests as 100,000 per day, core tier of 100,000 requests per day as $0 per month,
    add-ons of Polygon PoS as $0 per month. There is a discount code that can be applied.
    Below there is a checkout section with a credit card already saved.


    Figure 3-15 Infura: Summary page order after adding the Polygon PoS plugin


    ## Setting Up Your Infura Project


    Make sure that you have a project already set up on Infura. If you haven’t already,
    please follow the steps in Chapter 1.'
