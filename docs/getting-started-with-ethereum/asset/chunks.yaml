    \ Uncomment the four constants: `hdwalletprovider`, `infurakey`, `fs`, and `mnemonic`\
    \ and paste the project ID as a value for `infurakey` constant.\n\n```javascript\n\
    const HDWalletProvider = require('@truffle/hdwallet-provider');\nconst infuraKey\
    \ = \"fj4jll3k.....\";\nconst fs = require('fs');\nconst mnemonic = fs.readFileSync(\"\
    .secret\").toString().trim();\n```\n\n### Configuring the Network (Using the Matic\
    \ Endpoint)\n\nThe first way to connect to a Polygon network is using the Matic\
    \ network. Now, create a `matic_testnet` configuration under `networks` in the\
    \ `truffle-config.js` file and set the following values:\n\n- Set the wallet URL\
    \ to `https://rpc-mumbai.maticvigil.com`.\n- Set `network_id` to `80001`.\n\n\
    ```javascript\nmatic_testnet: {\n  provider: () => new HDWalletProvider(mnemonic,\
    \ `https://rpc-mumbai.maticvigil.com`),\n  network_id: 80001,\n  confirmations:\
    \ 2,\n  timeoutBlocks: 200,\n  skipDryRun: true\n},\n```\n\n### Configuring the\
    \ Network (Using the Infura Endpoint)\n\nAnother way to connect to the Polygon\
    \ network is using the Infura endpoint. Create a `matic_testnet` configuration\
    \ under `networks` and set the following values:\n\n- Set the wallet URL to `https://polygon-mumbai.infura.io/v3/${infuraKey}`.\n\
    - Set `network_id` to `80001`.\n\n```javascript\nmatic_testnet: {\n  provider:\
    \ () => new HDWalletProvider(mnemonic, `https://polygon-mumbai.infura.io/v3/${infuraKey}`),\n\
    \  network_id: 80001,\n  confirmations: 2,\n  timeoutBlocks: 200,\n  skipDryRun:\
    \ true,\n  chainId: 80001,\n  networkCheckTimeout: 1000000\n},\n```\n\nTo use\
    \ the Polygon network, you will need to activate the network add-on.\n\n### Configuring\
    \ the Private Key\n\nGo to the browser and open your MetaMask wallet connected\
    \ to the Infura network. Click \"your account\" and then click \"settings.\" Finally,\
    \ click \"security & privacy,\" as you can see in Figure [3-16](#521550_1_En_3_Chapter.xhtml#Fig16).\n\
    \n![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig16_HTML.jpg)\n\nA screenshot\
    \ of the Security and Privacy window in the Ropsten Test Network. A phrase on\
    \ the screen reads Reveal Seed Phrase, with a long button with the cursor on it,\
    \ which also reads Reveal Seed Phrase.\n\n**Figure 3-16** MetaMask: revealing\
    \ the seed phrase\n\nYou have the option to view your seed phrase, but be aware\
    \ that this information is sensitive, and if someone has access to it, they will\
    \ be able to restore your wallet and make use of your funds.\n\nClick Reveal Seed\
    \ Phrase and enter your wallet password to continue. Copy the private key.\n\n\
    Go back to VS Code (on the `ganache-cli` terminal view) and create a new file\
    \ named `.secret`. Paste the private secret recovery phrase on this file.\n\n\
    ### Deploying the Smart Contract\n\nRun the `migrate` command to deploy contracts\
    \ to the `matic_testnet` network.\n\n```\n$ truffle migrate --network matic_testnet\n\
    ```\n\nIf you get this error on the terminal, you will need to get the test MATIC\
    \ from Faucet first.\n\n```\n1_initial_migration.js\n======================\n\
    Deploying 'Migrations'\n\nError:  *** Deployment Failed ***\n\"Migrations\" --\
    \ insufficient funds for gas * price + value.\n```\n\n### Checking Your Wallet\
    \ Balance\n\nGo to your MetaMask wallet again and notice that your balance has\
    \ been reduced. This happens because you need to pay for each contract deployment.\
    \ It has an equivalent cost in gas, and that cost is calculated according to the\
    \ instructions you use inside a smart contract. This means that the more machine\
    \ processing you need, the higher the gas cost for you to execute this contract.\
    \ You can find a more detailed explanation of how this is calculated in the [Ethereum\
    \ yellow paper](https://ethereum.github.io/yellowpaper/paper.pdf).\n\n### Verifying\
    \ the Smart Contract on PolygonScan\n\nCopy the contract address that was created\
    \ in the deploy (this address will be shown in the console after `truffle migrate`\
    \ has finished running) and go to `https://mumbai.polygonscan.com`. Paste the\
    \ contract address in the search field and click the Find button. The smart contract\
    \ is there!\n\nThe tokens were created and transferred to the wallet that created\
    \ the contract. Now, click the Fixed (FIX) token link, and here you can see the\
    \ overview of your newly created token!\n\n## Deploy the ERC-20 Token to the Polygon\
    \ Mainnet (Layer 2)\n\nThe mainnet network is used for real transactions, while\
    \ testnets are used for testing smart contracts and decentralized applications\
    \ (DApps). Polygon is used as a second layer and gained popularity because of\
    \ the transaction cost that are lower than the mainnet.\n\n### Adding the Polygon\
    \ Mainnet to MetaMask Networks\n\nOpen the MetaMask extension, click the Network\
    \ drop-down, and then select the Custom RPC option. Set the following values as\
    \ shown in Figure [3-17](#521550_1_En_3_Chapter.xhtml#Fig17):\n\n![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig17_HTML.jpg)\n\
    \nA screenshot of the network configuration page has the following fields filled\
    \ in. Network name, Matic Mainnet. New R P C U R L, with the link. Chain I D,\
    \ 1 3 7. Currency symbol, optional. Matic. Block Explorer U R L. optional, with\
    \ the link added.\n\n**Figure 3-17** MetaMask: network configuration page\n\n\
    - Set the network name to Matic Mainnet.\n- Set the RPC URL to `https://rpc-mainnet.maticvigil.com`.\n\
    - Set the chain ID to `137`.\n- Set the currency symbol to MATIC.\n- Set the Block\
    \ Explorer URL to `https://explore-mainnet.maticvigil.com`.\n\n### Configuring\
    \ the Network (Using the Infura Endpoint)\n\nAnother way to connect to the Polygon\
    \ network is to use the Infura endpoint. Create a `matic_mainnet` configuration\
    \ under `networks` and set the following values:\n\n- Set the wallet URL to `https://polygon-mainnet.infura.io/v3/${infuraKey}`.\n\
    - Set `network_id` to `137`.\n\n```javascript\nmatic_mainnet: {\n  provider: ()\
    \ => new HDWalletProvider(mnemonic, `https://polygon-mainnet.infura.io/v3/${infuraKey}`),\n\
    \  network_id: 137,\n  gasPrice: 100000000,\n  confirmations: 2,\n  timeoutBlocks:\
    \ 200,\n  skipDryRun: true,\n  chainId: 137,\n  networkCheckTimeout: 1000000\n\
    },\n```\n\n### Deploying the Smart Contract\n\nRun the `migrate` command to deploy\
    \ contracts to the `matic_mainnet` network.\n\n```\n$ truffle migrate --network\
    \ matic_mainnet\n```\n\n### Checking Your Wallet Balance\n\nGo to your MetaMask\
    \ wallet again and notice that your balance has been reduced.\n\n### Verifying\
    \ the Smart Contract on PolygonScan\n\nCopy the contract address that was created\
    \ in the deployment and go to PolygonScan.^([(19)](#fn19)) Paste the contract\
    \ address in the search field and click the Find button. The smart contract is\
    \ there!\n\nThe tokens were created and transferred to the wallet that created\
    \ the contract. Now, click the Fixed (FIX) token link, and here you can see the\
    \ overview of your newly created token.\n\n## Summary\n\nIn this chapter, you\
    \ learned what the ERC-20 token standard is and learned how to create and deploy\
    \ fungible tokens to Ganache to the testnet and mainnet networks on the Ethereum\
    \ and Polygon blockchains.\n\nIn the next chapter, you will explore unit tests\
    \ on smart contracts and learn how to write your first unit test.\n\nFootnotes\
    \ [1](#521550_1_En_3_Chapter.xhtml#Fn1_source) [2](#521550_1_En_3_Chapter.xhtml#Fn2_source)"
  raw: '### Setting Up Your Smart Contract


    Go to Visual Studio Code and open `truffle-config.js`*.* Uncomment the four constants:
    `hdwalletprovider`, `infurakey`, `fs`, and `mnemonic` and *p*aste the project
    ID as a value for `infurakey` constant.


    ```

    const HDWalletProvider = require(''@truffle/hdwallet-provider'');

    const infuraKey = "fj4jll3k.....";

    const fs = require(''fs'');

    const mnemonic = fs.readFileSync(".secret").toString().trim();

    ```


    ### Configuring the Network (Using the Matic Endpoint)


    The first way to connect to a Polygon network is using the Matic network. Now,
    create a `matic_testnet` configuration under `networks` in the `truffle-config.js`
    file and set the following values:


    *   Set the wallet URL to [`https://rpc-mumbai.maticvigil.com`](https://rpc-mumbai.maticvigil.com).


    *   Set `network_id` to `80001`.


    ```

    matic_testnet: {

    provider: () => new HDWalletProvider(mnemonic, `https://rpc-mumbai.maticvigil.com`),

    network_id: 80001,

    confirmations: 2,

    timeoutBlocks: 200,

    skipDryRun: true

    },

    ```


    ### Configuring the Network (Using the Infura Endpoint)


    Another way to connect to the Polygon network is using the Infura endpoint. Create
    a `matic_testnet` configuration under `networks` and set the following values:


    *   Set the wallet URL to [`https://polygon-mumbai.infura.io/v3/${infuraKey}`](https://polygon-mumbai.infura.io/v3/%2524%257binfuraKey%257d).


    *   Set `network_id` to `80001`.


    ```

    matic_testnet: {

    provider: () => new HDWalletProvider(mnemonic, `https://polygon-mumbai.infura.io/v3/${infuraKey}`),

    network_id: 80001,

    confirmations: 2,

    timeoutBlocks: 200,

    skipDryRun: true,

    chainId: 80001,

    networkCheckTimeout: 1000000

    },

    ```


    To use the Polygon network, you will need to activate the network add-on.


    ### Configuring the Private Key


    Go to the browser and open your MetaMask wallet connected to the Infura network.
    Click “*your account*” and then click “settings.” Finally, click “security & privacy,”
    as you can see in Figure [3-16](#521550_1_En_3_Chapter.xhtml#Fig16).


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig16_HTML.jpg)


    A screenshot of the Security and Privacy window in the Ropsten Test Network. A
    phrase on the screen reads Reveal Seed Phrase, with a long button with the cursor
    on it, which also reads Reveal Seed Phrase.


    Figure 3-16


    MetaMask: revealing the seed phrase


    You have the option to view your seed phrase, but be aware that this information
    is sensitive, and if someone has access to it, they will be able to restore your
    wallet and make use of your funds.


    Click Reveal Seed Phrase and enter your wallet password to continue. Copy the
    private key.


    Go back to VS Code (on the `ganache-cli` terminal view) and create a new file
    named `.secret`. Paste the private secret recovery phrase on this file.


    ### Deploying the Smart Contract


    Run the `migrate` command to deploy contracts to the `matic_testnet` network.


    ```

    $ truffle migrate --network matic_testnet

    ```


    If you get this error on the terminal, you will need to get the test MATIC from
    Faucet first.


    ```

    1_initial_migration.js

    ======================

    Deploying ''Migrations''


    Error:  *** Deployment Failed ***

    "Migrations" -- insufficient funds for gas * price + value.

    ```


    ### Checking Your Wallet Balance


    Go to your MetaMask wallet again and notice that your balance has been reduced.
    This happens because you need to pay for each contract deployment. It has an equivalent
    cost in gas, and that cost is calculated according to the instructions you use
    inside a smart contract. This means that the more machine processing you need,
    the higher the gas cost for you to execute this contract. You can find a more
    detailed explanation of how this is calculated in the [Ethereum yellow paper](https://ethereum.github.io/yellowpaper/paper.pdf).


    ### Verifying the Smart Contract on PolygonScan


    Copy the contract address that was created in the deploy (this address will be
    shown in the console after `truffle migrate` has finished running) and go to [`https://mumbai.polygonscan.com`](https://mumbai.polygonscan.com).
    Paste the contract address in the search field and click the Find button. The
    smart contract is there!


    The tokens were created and transferred to the wallet that created the contract.
    Now, click the Fixed (FIX) token link, and here you can see the overview of your
    newly created token!


    ## Deploy the ERC-20 Token to the Polygon Mainnet (Layer 2)


    The mainnet network is used for real transactions, while testnets are used for
    testing smart contracts and decentralized applications (DApps). Polygon is used
    as a second layer and gained popularity because of the transaction cost that are
    lower than the mainnet.


    ### Adding the Polygon Mainnet to MetaMask Networks


    Open the MetaMask extension, click the Network drop-down, and then select the
    Custom RPC option. Set the following values as shown in Figure [3-17](#521550_1_En_3_Chapter.xhtml#Fig17):


    ![](images/521550_1_En_3_Chapter/521550_1_En_3_Fig17_HTML.jpg)


    A screenshot of the network configuration page has the following fields filled
    in. Network name, Matic Mainnet. New R P C U R L, with the link. Chain I D, 1
    3 7\. Currency symbol, optional. Matic. Block Explorer U R L. optional, with the
    link added.


    Figure 3-17


    MetaMask: network configuration page


    *   Set the network name to **Matic Mainnet**.


    *   Set the RPC URL to [**https://rpc-mainnet.maticvigil.com**](https://rpc-mainnet.maticvigil.com).


    *   Set the chain ID to **137**.


    *   Set the currency symbol to **MATIC**.


    *   Set the Block Explorer URL to [**https://explore-mainnet.maticvigil.com**](https://explore-mainnet.maticvigil.com).


    ### Configuring the Network (Using the Infura Endpoint)


    Another way to connect to the Polygon network is to use the Infura endpoint. Create
    a `matic_mainnet` configuration under `networks` and set the following values:


    *   Set the wallet URL to [`https://polygon-mainnet.infura.io/v3/${infuraKey}`](https://polygon-mumbai.infura.io/v3/%2524%257binfuraKey%257d).


    *   Set `network_id` to `137`.


    ```

    matic_mainnet: {

    provider: () => new HDWalletProvider(mnemonic, `https://polygon-mainnet.infura.io/v3/${infuraKey}`),

    network_id: 137,

    gasPrice: 100000000,

    confirmations: 2,

    timeoutBlocks: 200,

    skipDryRun: true,

    chainId: 137,

    networkCheckTimeout: 1000000

    },

    ```


    ### Deploying the Smart Contract


    Run the `migrate` command to deploy contracts to the `matic_mainnet` network.


    ```

    $ truffle migrate --network matic_mainnet

    ```


    ### Checking Your Wallet Balance


    Go to your MetaMask wallet again and notice that your balance has been reduced.


    ### Verifying the Smart Contract on PolygonScan


    Copy the contract address that was created in the deployment and go to PolygonScan.^([^(19)](#fn19))
    Paste the contract address in the search field and click the Find button. The
    smart contract is there!


    The tokens were created and transferred to the wallet that created the contract.
    Now, click the Fixed (FIX) token link, and here you can see the overview of your
    newly created token.


    ## Summary


    In this chapter, you learned what the ERC-20 token standard is and learned how
    to create and deploy fungible tokens to Ganache to the testnet and mainnet networks
    on the Ethereum and Polygon blockchains.


    In the next chapter, you will explore unit tests on smart contracts and learn
    how to write your first unit test.


