    \n```\n$ npm install @truffle/hdwallet-provider@1.2.3\n```\n\nOpen the `truffle-config.js`\
    \ file and uncomment the `HDWalletProvider` code section.\n\n```\nconst HDWalletProvider\
    \ = require('@truffle/hdwallet-provider');\nconst infuraKey = '';\nconst fs =\
    \ require('fs');\nconst mnemonic = fs.readFileSync(\".secret\").toString().trim();\n\
    ```\n\nPaste your Infura project ID as a value for the variable `infuraKey`.\n\
    \n### Configuring the Network\n\nIn `truffle-config.js`, uncomment the `ropsten`\
    \ network section and change the following values:\n\n- Change `ropsten` to `kovan`.\n\
    - Change the Ropsten Infura URL to `kovan`.\n- Change `YOUR-PROJECT-ID` to `${infuraKey}`.\n\
    - Change `network_id` to `42`.\n\n```\nkovan: {\n    provider: () => new HDWalletProvider(mnemonic,\
    \ `https://kovan.infura.io/v3/${infuraKey}`),\n    network_id: 42,\n    gas: 5500000,\n\
    \    confirmations: 2,\n    timeoutBlocks: 200,\n    skipDryRun: true\n},\n```\n\
    \n### Configuring the Solidity Compiler\n\nStill in `truffle-config.js`, uncomment\
    \ the `compilers` section and change the version to `0.8.0`.\n\n```\ncompilers:\
    \ {\n    solc: {\n        version: \"0.8.0\",\n        docker: true,\n       \
    \ settings: {\n            optimizer: {\n                enabled: false,\n   \
    \             runs: 200\n            },\n            evmVersion: \"byzantium\"\
    \n        }\n    }\n},\n```\n\n### Configuring the Private Key\n\nCreate the secret\
    \ file as follows:\n\n```\n$ touch .secret\n```\n\nGo to the browser and open\
