  trans: "\n# 使用 Pinata 在远程节点上固定与取消固定文件\n\n您还可以将文件固定到远程固定服务。这些第三方服务允许您将文件固定到它们运营的节点上，而非您自己的本地节点。您无需担心自己节点的磁盘空间或运行时间。\n\
    \n虽然您可以使用远程固定服务自身的图形用户界面、命令行或其他开发工具来管理固定到该服务的 IPFS 文件，但您也可以利用本地 IPFS 安装直接与固定服务交互，从而无需学习固定服务特有的\
    \ API 或其他工具。\n\n## 在 Pinata 上设置 API 密钥\n\n登录您的 Pinata 账户，进入 API 密钥页面。点击“新建密钥”，然后勾选“管理员”框。输入\
    \ `admin-cli` 作为密钥名称，最后点击“创建密钥”。系统将为您生成一个新密钥。请从此窗口中复制 JWT 值。\n\n## 在终端中将 Pinata\
    \ 设置为远程服务\n\n将 Pinata 添加为远程固定服务。将您的 JWT 粘贴到 `<your_jwt_key>` 部分中。\n\n```\n$ ipfs\
    \ pin remote service add pinata https://api.pinata.cloud/psa \n```\n\n列出所有现有的远程服务，并确认\
    \ Pinata 已包含在内。\n\n```\n$ ipfs pin remote service ls\n```\n\n## 向本地 IPFS 节点添加新文件\n\
    \n向您的 IPFS 本地节点添加一个新文件。\n\n```\n$ echo \"world\" > hello.txt\n$ ipfs add hello.txt\n\
    ```\n\n复制将文件添加到本地节点后生成的哈希标识符。\n\n## 将文件固定到远程 IPFS 节点\n\n使用以下命令固定您的文件。将文件哈希粘贴到\
    \ `<your_file_hash>` 部分中。\n\n```\n$ ipfs pin remote add --service=pinata -name=hello.txt\
    \ \n```\n\n返回 Pinata 网站，点击“固定管理器”。您的文件将出现在此页面上！\n\n## 从远程 IPFS 节点取消固定文件\n\n使用以下命令取消固定您的文件。将文件哈希粘贴到\
    \ `<your_file_hash>` 部分中。\n\n```\n$ ipfs pin remote rm --service=pinata -name=hello.txt\
    \ \n```\n\n返回 Pinata 网站，点击“固定管理器”。您的文件将不再出现在此页面上；这意味着您的文件已被取消固定。\n\n# 使用 Fleek\
    \ 在 IPFS 上托管您的网站\n\nFleek 使您能够基于开放 Web 协议创建基础层架构。在无需信任、无需许可、开放的技术上创建并托管您的网站、应用、去中心化应用和其他服务，这些技术旨在实现用户控制、加密、私密、点对点的体验。\n\
    \n## 登录 Fleek\n\n访问 `https://fleek.co` 并使用您的账户登录；然后进入您的 VS Code 编辑器。\n\n## 克隆您现有的仓库\n\
    \n克隆一个包含示例代码的现有仓库。\n\n```\n$ git clone https://github.com/johnnymatthews/random-planet-facts\n\
    ```\n\n## 安装 Fleek\n\n安装 Fleek 命令行工具。\n\n```\n$ npm install -g @fleekhq/fleek-cli\n\
    ```\n\n登录到您的 Fleek 账户（系统将提示您在浏览器中完成流程）。\n\n```\n$ fleek login\n```\n\n## 初始化 Fleek\n\
    \n在当前目录中初始化 Fleek 站点。\n\n```\n$ fleek site:init\n```\n\n系统会要求您选择要使用的团队（使用方向键进行选择）。同时，选择要使用的站点。最后，选择用于部署的公共目录。\n\
    \n## 部署您的站点\n\n在您的 `publish` 目录中部署更改。\n\n```\n$ fleek site:deploy\n```\n\n返回 Fleek\
    \ 网站，点击“托管”，然后点击“在 IPFS 上验证”。这就是您在 IPFS 上托管的站点。您现在可以在线查看已部署的站点。\n\n返回“托管”并点击 `your-site.on.fleek.co`。这是您站点主机的友好地址（如图\
    \ 7-3 所示）。\n\n![截图展示了托管节点下打开的 frosty-hyphen-frog-8-1-5-8 文件夹。下方有两点：本地已部署和在 IPFS\
    \ 上验证。下一部分打开了概览选项卡，提供了两点：1. 站点已部署。2. 设置带 SSL 的自定义域名。](img/521550_1_En_7_Fig3_HTML.jpg)\n\
    \n**图 7-3** Fleek 托管概览\n\n# 总结\n\n在本章中，您学习了如何安装和创建 IPFS 节点，以及如何使用此协议管理文件。\n\n\
    在下一章中，您将学习如何创建一个 Filecoin 项目。\n\n# 8. Filecoin\n\n发明并维护 IPFS 的同一家公司——协议实验室，创建了\
    \ Filecoin。它通过建立一个开源的去中心化存储网络扩展了 IPFS 的概念，并激励用户将数据固定到 IPFS。\n\nFilecoin 的优越之处在于它提供了一种去中心化的存储解决方案，无需依赖大型的中心化存储方案。与纯基于\
    \ IPFS 的解决方案不同，Filecoin 节点有经济激励来保持活跃。\n\n在此示例中，我们将使用一个名为 `Lotus` 的 Filecoin 实现。它验证网络交易，管理\
    \ FIL 钱包，并可以执行存储和检索交易。\n\n在本章结束时，您将能够执行以下操作：\n\n- 创建一个 Filecoin 项目\n- 配置 Truffle\
    \ 以使用 Filecoin 端点\n- 启动本地 Filecoin 服务器\n- 添加要保存在 Filecoin 上的图像\n"
- fmt: '# How to Preserve Files on the Filecoin Local Node


    To preserve files in Filecoin, you will learn how to create a project from scratch
    and configure Truffle so that it points to the correct address. You will start
    the local endpoints and finally add an image to Filecoin using the command line.


    ## Creating the Project


    Go to the terminal and click New Terminal. Now, create a new folder to start your
    project.


    ```

    $ mkdir create filecoin

    ```


    ## Configuring Truffle


    Create the `truffle-config.js` file.


    ```

    $ touch truffle-config.js

    ```


    In this file, configure the file setting for the IPFS and Filecoin lotus servers.
    Set the following values:


    *   Set the IPFS address to `http://127.0.0.1:5001`.

    *   Set the Filecoin address to `http://localhost:7777/rpc/v0`.


    You will use Ganache Filecoin to start these endpoints later.


    ```

    module.exports = {

    environments: {

    development: {

    ipfs: {

    address: "http://127.0.0.1:5001",

    },

    filecoin: {

    address: "http://localhost:7777/rpc/v0",

    storageDealOptions: {

    epochPrice: "2500",

    duration: 518400,

    }

    },

    }

    }

    };

    ```


    ## Adding an Image to Be Preserved


    Create the `badge` folder.


    ```

    $ mkdir badge

    ```


    Go to the `badge` root folder.


    ```

    $ cd badge

    ```


    Download the image that you will use to preserve on Filecoin. You can also copy
    and paste an existing image in this folder. The `curl` command is used for transferring
    data with a URL syntax.


    ```

    $ curl https://planouhost.z15.web.core.windows.net/badge.png > badge-image.png

    ```


    ## Installing Dependencies


    Install the base Ganache package with a Filecoin tag.


    ```

    $ npm install ganache@filecoin

    ```


    Install the Filecoin peer dependency package.


    ```

    $ npm install @ganache/filecoin

    ```


    Start the Lotus and IPFS local servers using Ganache. It also creates 10 development
    accounts with 100 Filecoins (FIL) each.


    ## Starting Local Endpoints


    Start Ganache Filecoin locally.


    ```

    $ npx ganache filecoin

    ```


    ## Preserving Files to Filecoin


    Open a new terminal and preserve the folder `badge`.


    ```

    $ truffle preserve ./badge/ --filecoin

    ```


    If everything went well, the output will be as follows:


    ```

    Preserving target: ./badge/

    ===========================

    Warning: multiple plugins found that output the label "ipfs-cid".

    ✓ Loading target...

    ✓ Reading directory ./badge/...

    ✓ Opening ./badge\badge-image.png...

    ✓ Preserving to IPFS...

    ✓ Connected to IPFS node at http://127.0.0.1:5001

    ✓ Uploading...

    Root CID: QmNjGGACAMpm718WjeM7oN3WJ5ntXKgwurH4mMivU6JXoS

    ./badge-image.png: QmemrBxhPpg8Hw9sPpAUTWRq3kNAFhCPKUDhMnc5U9KptS

    ✓ Preserving to Filecoin...

    ✓ Connected to Filecoin node at http://localhost:7777/rpc/v0

    ✓ Retrieving miners...

    ✓ Proposing storage deal...

    Deal CID: bafyreidrt2pvuh44umo7vzebnxnw46qzntneyojah6oym4ximokyzvwxgq

    ✓ Waiting for deal to finish...

    Deal State: StorageDealActive

    ```


    Now you have the image preserved in your local Filecoin node!


    ## Summary


    In this chapter, you learned how to preserve files using Filecoin.


    In the next chapter, you will learn what ENS is and how to use it.


    # Ethereum Name Service


    The Ethereum Name Service (ENS) allows users to send and receive Ethereum as well
    as access special websites by using simple names rather than long, complex sequences
    of letters and numbers.


    At the end of this chapter, you will be able to do the following:


    *   Search for a domain name on the ENS network

    *   Register an available domain

    *   Manage an ENS registration name

    *   Check an ENS name resolution


    ## Register Your ENS to Receive Crypto, Tokens, or NFTs in Your Wallet


    Let’s search for an available domain name in ENS and register it. Next, you will
    manage the address through a registration page. Finally, you’ll check if the domain
    is resolving correctly to the address that is configured.


    ### Searching for Your Domain Name


    Go to the ENS Domains^([^(27)](#fn27)) page and click Launch App. Search for the
    domain name that you want to register (for example, `planou.eth`). Check the registration
    period (for example, a minimum of one year) and the registration price.


    ### Registering Your Name


    Click Request to Register. A MetaMask notification will open to confirm the transaction.
    Click Confirm and wait for the transaction to be confirmed on the blockchain.
    Once it’s confirmed, click Register. A new MetaMask notification will appear.
    Click Confirm once again and wait for the transaction to be confirmed on the blockchain.


    ### Managing Your Registration Name


    Click “Manage name” and scroll down to Addresses. Realize that the ETH address
    is set to the wallet that created the domain, in this case, your wallet (Figure
    [9-1](#521550_1_En_9_Chapter.xhtml#Fig1)).


    ![](images/521550_1_En_9_Chapter/521550_1_En_9_Fig1_HTML.jpg)


    A screenshot of the webpage titled ''planou dot e t h'' has the description, Learn
    how to manage your name. The Parent field is set to e t h, registrant and controller
    to an alphanumeric string starting with 0, expiration date to a date and time,
    and resolver to an alphanumeric string. The Records table lists addresses.


    **Figure 9-1** ENS domain registration page


    ### Checking the Name Resolution


    Click your MetaMask wallet and click Send. Type your ENS name (for example, `planou.eth`).
    Note that the name has resolved to a wallet address (Figure [9-2](#521550_1_En_9_Chapter.xhtml#Fig2)).


    ![](images/521550_1_En_9_Chapter/521550_1_En_9_Fig2_HTML.jpg)


    A screenshot of the Add Recipient window has Rinkeby Test Network dropdown on
    top. Below there is a section for typing Add recipient where planou dot e t h
    is typed, with the cursor hovering over the drop-down option to select planou
    dot e t h with part of a hexadecimal code visible.


    **Figure 9-2** MetaMask ENS resolution name


    Now you can use the ENS name as a recipient instead of using the wallet hash address
    for your transactions.


    ## Summary


    In this chapter, you learned how simple configuring an ENS domain is, and you
    learned how to start using it right away.


    In the next chapter, you will start learning about how to get off-chain data with
    oracles using Chainlink.


    # Chainlink


    Chainlink^([^(28)](#fn28)) is a decentralized network of nodes that uses oracles
    to transfer data and information from off-blockchain sources to on-blockchain
    smart contracts. In this chapter, you will learn how to use the ETH/USD price
    feed on the Kovan testnet to access the most recent cryptocurrency price inside
    smart contracts.


    At the end of this chapter, you will be able to do the following:


    *   Create a simple smart contact for price consumption

    *   Set up an Infura project

    *   Configure the private key to sign transactions

    *   Deploy the smart contract on the Kovan network

    *   Get price information from the smart contact on the Kovan network


    ## Get Crypto Prices Inside Smart Contracts Using Chainlink Oracles


    Let’s start by creating a new project and then installing the Chainlink contracts
    package. You will use an existing contract address that tells you the price of
    the ETH/USD pair, and then you will be able to see that price being returned by
    your smart contact.


    ### Creating the Project


    Go to the Terminal menu, click New Terminal, and initialize a new Truffle project.


    ```

    $ truffle init

    ```


    Now, initialize the project folder.


    ```

    $ npm init

    ```


    Finally, install the Chainlink contracts package.^([^(29)](#fn29))


    ```

    $ npm install @chainlink/contracts@0.1.9

    ```'
  raw: '## How to Preserve Files on the Filecoin Local Node


    To preserve files in Filecoin, you will learn how to create a project from scratch
    and configure Truffle so that it points to the correct address. You will start
    the local endpoints and finally add an image to Filecoin using the command line.


    ### Creating the Project


    Go to the terminal and click New Terminal. Now, create a new folder to start your
    project.


    ```

    $ mkdir create filecoin

    ```


    ### Configuring Truffle


    Create the `truffle-config.js` file.


    ```

    $ touch truffle-config.js

    ```


    In this file, configure the file setting for the IPFS and Filecoin lotus servers.
    Set the following values:


    *   Set the IPFS address to `http://127.0.0.1:5001`.


    *   Set the Filecoin address to `http://localhost:7777/rpc/v0`.


    You will use Ganache Filecoin to start these endpoints later.


    ```

    module.exports = {

    environments: {

    development: {

    ipfs: {

    address: "http://127.0.0.1:5001",

    },

    filecoin: {

    address: "http://localhost:7777/rpc/v0",

    storageDealOptions: {

    epochPrice: "2500",

    duration: 518400,

    }

    },

    }

    }

    };

    ```


    ### Adding an Image to Be Preserved


    Create the `badge` folder.


    ```

    $ mkdir badge

    ```


    Go to the `badge` root folder.


    ```

    $ cd badge

    ```


    Download the image that you will use to preserve on Filecoin. You can also copy
    and paste an existing image in this folder. The `curl` command is used for transferring
    data with a URL syntax.


    ```

    $ curl https://planouhost.z15.web.core.windows.net/badge.png > badge-image.png

    ```


    ### Installing Dependencies


    Install the base Ganache package with a Filecoin tag.


    ```

    $ npm install ganache@filecoin

    ```


