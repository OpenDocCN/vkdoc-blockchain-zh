- fmt: "# Getting Test Ether from the Faucet on the Ropsten Network\n\nThis Ethereum\
    \ test faucet^([^(21)](#fn21)) drips 1 ether every five seconds. You have a request\
    \ limit of 1 eth for every 24 hours to avoid network spam.\n\n## Accessing the\
    \ Faucet\n\nGo to the Ropsten Ethereum (rETH) Faucet^([^(22)](#fn22)) and copy\
    \ your wallet address (make sure the network selected is Ropsten). Paste your\
    \ contract address in the form field. Click \"Send Ropsten ETH\", as shown in\
    \ Figure [6-1](#521550_1_En_6_Chapter.xhtml#Fig1).\n\n![](images/521550_1_En_6_Chapter/521550_1_En_6_Fig1_HTML.jpg)\n\
    \nA screenshot of the Ropsten Faucet home page has 'Ropsten Ethereum r E T H Faucet'\
    \ at the centre. Below, the text reads 'Receive 1 r E T H' per request. A section\
    \ below is provided for entering a Ropsten Address, followed by a captcha and\
    \ a button labelled Send Ropsten E T H.\n\n**Figure 6-1**  \nRopsten faucet home\
    \ page\n\n## Waiting for the Transaction\n\nClick the transaction hash (which\
    \ opens a new window) and wait for the transaction to be completed. Once the transaction\
    \ has successfully completed, go to your MetaMask wallet, and you will see that\
    \ you now have 1 ether!\n\n# Getting Test Ether from the Faucet on the Rinkeby\
    \ Testnet\n\nThis ether faucet is connected to the Rinkeby network. Requests are\
    \ tied to common third-party social network accounts to prevent malicious actors\
    \ from exhausting all the available funds or accumulating enough ether to mount\
    \ long-running spam attacks. Anyone with a Twitter or Facebook account may request\
    \ funds up to the allowed limits.\n\n## Preparing for Funding\n\nOpen your MetaMask\
    \ wallet and copy your wallet address to clipboard. Go to your Twitter account\
    \ and paste in your wallet address. Click your tweet and copy your tweet address\
    \ (the URL in the address bar).\n\n## Funding Your Wallet\n\nGo to `https://faucet.rinkeby.io`\
    \ and paste your tweet address in the text field, as shown in Figure [6-2](#521550_1_En_6_Chapter.xhtml#Fig2).\
    \ Click \"Give me Ether\" and select one of the options available (for example,\
    \ 3 Ethers / 8 hours). The request will be funded in a few seconds.\n\nIt is important\
    \ to note that there are varieties of faucets available. Periodically some of\
    \ them may be empty, or over time they may run out of activity. Or, new faucets\
    \ may even be created. If any of them become unavailable, you can search for new\
    \ ones on the Internet.\n\n![](images/521550_1_En_6_Chapter/521550_1_En_6_Fig2_HTML.jpg)\n\
    \nA screenshot of the Rinkeby Faucet homepage reads Funding request accepted for\
    \ techtip 9 3 6 1 1 5 8 3 into, followed by the Ropsten address. At the centre,\
    \ the text reads Rinkeby Authenticated Faucet, with a Twitter link and an option\
    \ of Give me Ether. There are several codes and other task details provided below.\n\
    \n**Figure 6-2**  \nRinkeby faucet home page\n\n## Checking Your Wallet\n\nWait\
    \ a few moments and check your MetaMask wallet. You will get 3 ether in your wallet\
    \ account!\n\n# Getting Test MATIC from the Faucet on the Mumbai Testnet\n\nThis\
    \ faucet transfers TestToken/MATIC-ETH on Matic testnets and the corresponding\
    \ parent chain.\n\n## Preparing for Funding\n\nOpen your MetaMask wallet and copy\
    \ your wallet address to the clipboard.\n\n## Funding Your Wallet\n\nGo to `https://faucet.matic.network`.\
    \ For the token, select MATIC Token, and for the network, select Mumbai. Paste\
    \ your tweet address in the text field and click Submit (Figure [6-3](#521550_1_En_6_Chapter.xhtml#Fig3)).\
    \ The confirmation details will be provided for you. Click Confirm. The request\
    \ will be funded in a few seconds.\n\n![](images/521550_1_En_6_Chapter/521550_1_En_6_Fig3_HTML.jpg)\n\
    \nA screenshot of the Matic Faucet webpage reads, Login to Discord widget to report\
    \ any issues with this Faucet. Beside Select token, there are many options provided\
    \ with checking in options. Below there is a section for Select Network where\
    \ 3 options are provided. At the bottom there is a bar to enter the account address\
    \ and submit the data.\n\n**Figure 6-3**  \nMatic faucet home page\n\n## Checking\
    \ Your Wallet\n\nWait a few moments and check your MetaMask wallet. You will get\
    \ 0.1 MATIC in your wallet account!\n\n# Getting the Test MATIC from the Faucet\
    \ on the Mainnet\n\nThis faucet transfers TestToken/MATIC-ETH on Polygon testnets\
    \ and the corresponding parent chain.\n\n## Preparing for Funding\n\nOpen your\
    \ MetaMask wallet and copy your wallet address to the clipboard.\n\n## Funding\
    \ Your Wallet\n\nGo to `https://matic.supply` and click \"Connect\" to connect\
    \ to your MetaMask wallet (Figure [6-4](#521550_1_En_6_Chapter.xhtml#Fig4)). Make\
    \ sure your MetaMask wallet is connected to the Matic mainnet. Click \"I am human\"\
    \ and solve the captcha.\n\n![](images/521550_1_En_6_Chapter/521550_1_En_6_Fig4_HTML.jpg)\n\
    \nA screenshot of the Polygon Faucet home page has the logo and name on top and\
    \ a large Receive button in the centre. Below the button, there is a checkbox\
    \ with a captcha.\n\n**Figure 6-4**  \nPolygon faucet home page\n\n## Checking\
    \ Your Wallet\n\nWait a few moments and check your MetaMask wallet. You have just\
    \ received 0.001 MATIC in your wallet!\n\n# Summary\n\nIn this chapter, you learned\
    \ how to get test ether from faucets on the Internet. This will be very useful\
    \ for deploying contracts on test networks so you don't have to spend real ether.\n\
    \nFootnotes [1](#521550_1_En_6_Chapter.xhtml#Fn1_source) [2](#521550_1_En_6_Chapter.xhtml#Fn2_source)\n\
    \n# 7. InterPlanetary File System\n\nThe InterPlanetary File System^([^(23)](#fn23))\
    \ (IPFS) is a protocol and peer-to-peer network that allows data to be stored\
    \ and shared in a distributed file system. IPFS employs content addressing to\
    \ distinguish each file in a global namespace that connects all computing devices.\n\
    \nAt the end of this chapter, you will be able to do the following:\n\n- Install\
    \ the IPFS node package and initialize a node\n- View the IPFS node peers\n- Test\
    \ and explore the IPFS node\n- Add files to IPFS\n- View the file content on the\
    \ console and check the file in the web UI\n- View the file content directly in\
    \ a browser\n- Install the IPFS browser extension\n- Configure the IPFS node type\
    \ and start a node\n- Import a file into the IPFS node\n- Start a local IPFS node\
    \ and add files to it\n- Check the files added and verify whether a file has been\
    \ pinned\n- Pin the files manually\n- Set up API keys on Pinata\n- Set up Pinata\
    \ as a remote service\n- Pin your file to the remote IPFS node and also unpin\
    \ it\n- Log in to Fleek\n- Clone an existing repository\n- Install and initialize\
    \ the Fleek package\n- Deploy a site to Fleek"
  raw: '## Getting Test Ether from the Faucet on the Ropsten Network


    This Ethereum test faucet^([^(21)](#fn21)) drips 1 ether every five seconds. You
    have a request limit of 1 eth for every 24 hours to avoid network spam.


    ### Accessing the Faucet


    Go to the Ropsten Ethereum (rETH) Faucet^([^(22)](#fn22)) and copy your wallet
    address (make sure the network selected is Ropsten). Paste your contract address
    in the form field. Click “Send Ropsten ETH”, as shown in Figure [6-1](#521550_1_En_6_Chapter.xhtml#Fig1).


    ![](images/521550_1_En_6_Chapter/521550_1_En_6_Fig1_HTML.jpg)


    A screenshot of the Ropsten Faucet home page has ''Ropsten Ethereum r E T H Faucet''
    at the centre. Below, the text reads ''Receive 1 r E T H'' per request. A section
    below is provided for entering a Ropsten Address, followed by a captcha and a
    button labelled Send Ropsten E T H.


    Figure 6-1


    Ropsten faucet home page


    ### Waiting for the Transaction


    Click the transaction hash (which opens a new window) and wait for the transaction
    to be completed. Once the transaction has successfully completed, go to your MetaMask
    wallet, and you will see that you now have 1 ether!


    ## Getting Test Ether from the Faucet on the Rinkeby Testnet


    This ether faucet is connected to the Rinkeby network. Requests are tied to common
    third-party social network accounts to prevent malicious actors from exhausting
    all the available funds or accumulating enough ether to mount long-running spam
    attacks. Anyone with a Twitter or Facebook account may request funds up to the
    allowed limits.


    ### Preparing for Funding


    Open your MetaMask wallet and copy your wallet address to clipboard. Go to your
    Twitter account and paste in your wallet address. Click your tweet and copy your
    tweet address (the URL in the address bar).


    ### Funding Your Wallet


    Go to [`https://faucet.rinkeby.io`](https://faucet.rinkeby.io) and paste your
    tweet address in the text field, as shown in Figure [6-2](#521550_1_En_6_Chapter.xhtml#Fig2).
    Click “Give me Ether” and select one of the options available (for example, 3
    Ethers / 8 hours). The request will be funded in a few seconds.


    It is important to note that there are varieties of faucets available. Periodically
    some of them may be empty, or over time they may run out of activity. Or, new
    faucets may even be created. If any of them become unavailable, you can search
    for new ones on the Internet.


    ![](images/521550_1_En_6_Chapter/521550_1_En_6_Fig2_HTML.jpg)


    A screenshot of the Rinkeby Faucet homepage reads Funding request accepted for
    techtip 9 3 6 1 1 5 8 3 into, followed by the Ropsten address. At the centre,
    the text reads Rinkeby Authenticated Faucet, with a Twitter link and an option
    of Give me Ether. There are several codes and other task details provided below.


    Figure 6-2


    Rinkeby faucet home page


    ### Checking Your Wallet


    Wait a few moments and check your MetaMask wallet. You will get 3 ether in your
    wallet account!


    ## Getting Test MATIC from the Faucet on the Mumbai Testnet


    This faucet transfers TestToken/MATIC-ETH on Matic testnets and the corresponding
    parent chain.


    ### Preparing for Funding


    Open your MetaMask wallet and copy your wallet address to the clipboard.


    ### Funding Your Wallet


    Go to [`https://faucet.matic.network`](https://faucet.matic.network). For the
    token, select MATIC Token, and for the network, select Mumbai. Paste your tweet
    address in the text field and click Submit (Figure [6-3](#521550_1_En_6_Chapter.xhtml#Fig3)).
    The confirmation details will be provided for you. Click Confirm. The request
    will be funded in a few seconds.


    ![](images/521550_1_En_6_Chapter/521550_1_En_6_Fig3_HTML.jpg)


    A screenshot of the Matic Faucet webpage reads, Login to Discord widget to report
    any issues with this Faucet. Beside Select token, there are many options provided
    with checking in options. Below there is a section for Select Network where 3
    options are provided. At the bottom there is a bar to enter the account address
    and submit the data.


    Figure 6-3


    Matic faucet home page


    ### Checking Your Wallet


    Wait a few moments and check your MetaMask wallet. You will get 0.1 MATIC in your
    wallet account!


    ## Getting the Test MATIC from the Faucet on the Mainnet


    This faucet transfers TestToken/MATIC-ETH on Polygon testnets and the corresponding
    parent chain.


    ### Preparing for Funding


    Open your MetaMask wallet and copy your wallet address to the clipboard.


    ### Funding Your Wallet


    Go to [`https://matic.supply`](https://matic.supply) and click “Connect” to connect
    to your MetaMask wallet (Figure [6-4](#521550_1_En_6_Chapter.xhtml#Fig4)). Make
    sure your MetaMask wallet is connected to the Matic mainnet. Click “I am human”
    and solve the captcha.


    ![](images/521550_1_En_6_Chapter/521550_1_En_6_Fig4_HTML.jpg)


    A screenshot of the Polygon Faucet home page has the logo and name on top and
    a large Receive button in the centre. Below the button, there is a checkbox with
    a captcha.


    Figure 6-4


    Polygon faucet home page


    ### Checking Your Wallet


    Wait a few moments and check your MetaMask wallet. You have just received 0.001
    MATIC in your wallet!


    ## Summary


    In this chapter, you learned how to get test ether from faucets on the Internet.
    This will be very useful for deploying contracts on test networks so you don’t
    have to spend real ether.


    Footnotes [1](#521550_1_En_6_Chapter.xhtml#Fn1_source)   [2](#521550_1_En_6_Chapter.xhtml#Fn2_source)


    # 7. InterPlanetary File System


    The InterPlanetary File System^([^(23)](#fn23)) (IPFS) is a protocol and peer-to-peer
    network that allows data to be stored and shared in a distributed file system.
    IPFS employs content addressing to distinguish each file in a global namespace
    that connects all computing devices.


    At the end of this chapter, you will be able to do the following:


    *   Install the IPFS node package and initialize a node


    *   View the IPFS node peers


    *   Test and explore the IPFS node


    *   Add files to IPFS


    *   View the file content on the console and check the file in the web UI


    *   View the file content directly in a browser


    *   Install the IPFS browser extension


    *   Configure the IPFS node type and start a node


    *   Import a file into the IPFS node


    *   Start a local IPFS node and add files to it


    *   Check the files added and verify whether a file has been pinned


    *   Pin the files manually


    *   Set up API keys on Pinata


    *   Set up Pinata as a remote service


    *   Pin your file to the remote IPFS node and also unpin it


    *   Log in to Fleek


    *   Clone an existing repository


    *   Install and initialize the Fleek package


    *   Deploy a site to Fleek'
  trans: "\n# 从 Ropsten 网络的水龙头获取测试以太币\n\n这个以太坊测试水龙头^(²¹)每五秒滴出 1 个以太币。出于防止网络滥用的考虑，你每\
    \ 24 小时至多只能请求 1 个以太币。\n\n## 访问水龙头\n\n前往 Ropsten 以太坊（rETH）水龙头^(²²)并复制你的钱包地址（确保所选网络为\
    \ Ropsten）。将你的合约地址粘贴到表单字段中。点击“发送 Ropsten ETH”，如图 6-1 所示。\n\n![](img/521550_1_En_6_Fig1_HTML.jpg)\n\
    \nRopsten 水龙头主页截图，中央显示“Ropsten Ethereum r E T H Faucet”。其下方文字为“每次请求可接收 1 r E T\
    \ H”。再下方提供了一个用于输入 Ropsten 地址的区域，其后是验证码和一个标有“Send Ropsten E T H”的按钮。\n\n**图 6-1**\
    \  \nRopsten 水龙头主页\n\n## 等待交易\n\n点击交易哈希（将打开一个新窗口），等待交易完成。一旦交易成功完成，前往你的 MetaMask\
    \ 钱包，你会看到自己现在拥有了 1 个以太币！\n\n# 从 Rinkeby 测试网的水龙头获取测试以太币\n\n这个以太币水龙头连接到 Rinkeby\
    \ 网络。请求与常见的第三方社交网络账户绑定，以防止恶意行为者耗尽所有可用资金或积累足够的以太币来发动长期垃圾攻击。任何拥有 Twitter 或 Facebook\
    \ 账户的人都可以在限额内请求资金。\n\n## 准备充值\n\n打开你的 MetaMask 钱包并将钱包地址复制到剪贴板。前往你的 Twitter 账户并粘贴你的钱包地址。点击你的推文并复制推文地址（地址栏中的\
    \ URL）。\n\n## 为钱包充值\n\n访问`https://faucet.rinkeby.io`，在文本字段中粘贴你的推文地址，如图 6-2 所示。点击“Give\
    \ me Ether”并选择可用的选项之一（例如，3 个以太币 / 8 小时）。请求将在几秒钟内完成充值。\n\n需要注意的是，可用的水龙头有多种多样。其中一些可能会不时枯竭，或者随着时间的推移停止运作。甚至可能会有新的水龙头出现。如果其中任何一个无法使用，你可以在互联网上搜索新的。\n\
    \n![](img/521550_1_En_6_Fig2_HTML.jpg)\n\nRinkeby 水龙头主页截图显示“Funding request accepted\
    \ for techtip 9 3 6 1 1 5 8 3 into”，后面跟着 Ropsten 地址。中央文字为“Rinkeby Authenticated\
    \ Faucet”，带有一个 Twitter 链接和一个“Give me Ether”选项。下方提供了几个代码和其他任务细节。\n\n**图 6-2** \
    \ \nRinkeby 水龙头主页\n\n## 检查你的钱包\n\n稍等片刻，检查你的 MetaMask 钱包。你的钱包账户将收到 3 个以太币！\n\n\
    # 从 Mumbai 测试网的水龙头获取测试 MATIC\n\n此水龙头在 Matic 测试网及对应的主链上转移 TestToken/MATIC-ETH。\n\
    \n## 准备充值\n\n打开你的 MetaMask 钱包并将钱包地址复制到剪贴板。\n\n## 为钱包充值\n\n访问`https://faucet.matic.network`。对于代币，选择\
    \ MATIC Token，对于网络，选择 Mumbai。在文本字段中粘贴你的钱包地址并点击提交（图 6-3）。将为你提供确认详情。点击确认。请求将在几秒钟内完成充值。\n\
    \n![](img/521550_1_En_6_Fig3_HTML.jpg)\n\nMatic 水龙头网页截图显示：“Login to Discord widget\
    \ to report any issues with this Faucet”。在“Select token”旁边，提供了许多选项并带有勾选选项。下方有一个“Select\
    \ Network”部分，提供了 3 个选项。底部有一个输入账户地址并提交数据的栏。\n\n**图 6-3**  \nMatic 水龙头主页\n\n## 检查你的钱包\n\
    \n稍等片刻，检查你的 MetaMask 钱包。你的钱包账户将收到 0.1 个 MATIC！\n\n# 从主网的水龙头获取测试 MATIC\n\n此水龙头在\
    \ Polygon 测试网及对应的主链上转移 TestToken/MATIC-ETH。\n\n## 准备充值\n\n打开你的 MetaMask 钱包并将钱包地址复制到剪贴板。\n\
    \n## 为钱包充值\n\n访问`https://matic.supply`并点击“Connect”以连接你的 MetaMask 钱包（图 6-4）。确保你的\
    \ MetaMask 钱包已连接到 Matic 主网。点击“I am human”并解决验证码。\n\n![](img/521550_1_En_6_Fig4_HTML.jpg)\n\
    \nPolygon 水龙头主页截图，顶部有标志和名称，中央有一个大大的“Receive”按钮。按钮下方是一个带有验证码的复选框。\n\n**图 6-4**\
    \  \nPolygon 水龙头主页\n\n## 检查你的钱包\n\n稍等片刻，检查你的 MetaMask 钱包。你的钱包刚刚收到了 0.001 个 MATIC！\n\
    \n# 总结\n\n在本章中，你学习了如何从互联网上的水龙头获取测试以太币。这对于在测试网络上部署合约非常有用，因为你无需花费真正的以太币。\n\n脚注 1\
    \ 2\n\n# 7. 星际文件系统\n\n星际文件系统^(²³)（IPFS）是一种协议和点对点网络，允许在分布式文件系统中存储和共享数据。IPFS 采用内容寻址来区分一个连接所有计算设备的全局命名空间中的每个文件。\n\
    \n在本章结束时，你将能够执行以下操作：\n\n- 安装 IPFS 节点包并初始化一个节点\n- 查看 IPFS 节点对等点\n- 测试和探索 IPFS 节点\n\
    - 向 IPFS 添加文件\n- 在控制台上查看文件内容并在 Web UI 中检查文件\n- 直接在浏览器中查看文件内容\n- 安装 IPFS 浏览器扩展\n\
    - 配置 IPFS 节点类型并启动一个节点\n- 将文件导入 IPFS 节点\n- 启动本地 IPFS 节点并向其添加文件\n- 检查已添加的文件并验证文件是否已被固定\n\
    - 手动固定文件\n- 在 Pinata 上设置 API 密钥\n- 将 Pinata 设置为远程服务\n- 将文件固定到远程 IPFS 节点，并解除固定\n\
    - 登录 Fleek\n- 克隆现有仓库\n- 安装并初始化 Fleek 包\n- 将站点部署到 Fleek\n"
- fmt: '# Create Your IPFS Node


    Now, let’s create an IPFS node using the command line and upload your first file.


    ## Installing the Node


    Install the IPFS using the Choco package manager.^([(24)](#fn24)) The package
    `go-ipfs` is an IPFS implementation in Go.


    ```

    $ choco install go-ipfs

    ```


    ## Configuring the Node


    Initiate the IPFS local repository.


    ```

    $ ipfs init

    ```


    Start the IPFS local server. The `daemon` command starts an IPFS local server
    on `127.0.0.1:5001`.


    ```

    $ ipfs daemon

    ```


    ## Testing the Node


    You can test the IPFS node showing the peers that are directly connected to your
    node.


    ```

    $ ipfs swarm peers

    ```


    You can also view some IPFS file content by using the `cat` command and passing
    the hash as a parameter (Figure [7-1](#521550_1_En_7_Chapter.xhtml#Fig1)).


    ![](images/521550_1_En_7_Chapter/521550_1_En_7_Fig1_HTML.jpg)


    A screenshot of the IPFS command output has the terminal tab open with links provided.
    The text below reads Hello and Welcome to IPFS, where IPFS is large and stylized.
    Text at the bottom reads If you''re seeing this, you have successfully installed
    IPFS and are now interfacing with the ipfs merkledag.


    **Figure 7-1** IPFS `cat` command output


    ```

    $ ipfs cat

    ```


    ## Exploring Your IPFS Node


    Go to a browser and access the web UI at `http://127.0.0.1:5002/`. Your node is
    now connected to IPFS! Now, click Files and notice that are no files here yet
    (Figure [7-2](#521550_1_En_7_Chapter.xhtml#Fig2)).


    Click “Explore” and then click “Peers”. These are the peers that you are connected
    to. Finally, click “Settings”. This is where you can see your node settings.


    ![](images/521550_1_En_7_Chapter/521550_1_En_7_Fig2_HTML.png)


    A screenshot of the IPFS Web UI has the following icons: Status, Files, where
    the cursor lies, Explore, Peers, and Settings. In the Files window, a note reads,
    No files here yet! Add files to your local IPFS node by clicking the Import button
    above. A section containing the import button along with other details is at the
    top right.


    **Figure 7-2** IPFS Web UI


    # Add Files to the IPFS


    A computer running IPFS can ask all the peers to which it is connected if they
    have a file with a specific hash, and if one of them does, that peer sends back
    the entire file. That would not be possible without a short, unique identifier,
    such as a cryptographic hash.


    ## Adding the File


    Start the IPFS local server. The `daemon` command starts an IPFS local server
    on `127.0.0.1:5001`.


    ```

    $ ipfs daemon

    ```


    Now, create a new file called `hello.txt` using the `echo` command. This command
    outputs the given text to a new file.


    ```

    $ echo "test" hello.txt

    ```


    Add the newly created file to your local IPFS node using the `ipfs add` command.


    ```

    $ ipfs add hello.txt

    ```


    The file was added to IPFS, resulting in a hash identifier.


    ## Viewing the File Content on the Console


    You can see the file content of this newly added file simply using the `ipfs cat`
    command followed by the hash. For that, replace the `<your_hash>` code snippet
    by the result hash identifier generated in the previous step by the command “`ipfs
    add hello.txt`”.


    ```

    $ ipfs cat

    ```


    After running this command, the file content will be displayed on the terminal.


    ## Checking the File in the Web UI


    Go to `http://127.0.0.1:5001/webui` and click “Files”. Now, click “Pins” and copy
    the hash. Search by using this hash, and you will see that this hash is there.


    ## Viewing the File Content in a Browser


    Open a new tab and go to `ipfs://<your_hash>`. Now you can see your file content
    in the browser. Here again, replace the `<your_hash>` code snippet by the result
    hash identifier generated for your file with the command “`ipfs cat <your_hash>`”.


    # Set Up the IPFS Browser Extension


    The IPFS Companion Extension^([(25)](#fn25)) allows you to run an IPFS node locally
    inside your preferred browser, providing support for `ipfs://` addresses, automatic
    IPFS gateway loading of websites and file paths, simple IPFS file import and sharing,
    and more.


    ## Installing the Browser Extension


    Go to the IPFS Companion Extension^([(26)](#fn26)) and click “Add to Brave” or
    the name of your browser. Click “Add extension” and then click the “Extensions”
    icon. Finally, pin the IPFS Companion Extension to the extensions bar.


    ## Configuring the Node Type


    Click the IPFS Companion icon and then click the gear icon. For IPFS Node Type,
    select External.


    ## Starting an External Node


    Go to Visual Studio Code and open a new terminal. Start a new IPFS local server.


    ```

    $ ipfs daemon

    ```


    ## Importing a File


    Click the IPFS Companion icon and then click “Import”. Click “Pick a file” and
    select a file from your local disc. The file will be stored in your IPFS node.


    # Pin and Unpin IPFS Files on the Local Node


    Data can be pinned to one or more IPFS nodes to ensure that it remains on IPFS
    and is not removed during garbage collection. Pinning allows you to manage storage
    space and data retention. Therefore, you should go ahead pin any content that
    you want to keep on IPFS indefinitely. IPFS’s default behavior is to pin files
    to your local IPFS node.


    ## Starting Your Local Node


    Start the IPFS local server. The `daemon` command starts an IPFS local server
    on `127.0.0.1:5001`.


    ```

    $ ipfs daemon

    ```


    ## Adding a File to Your Node


    Now, create a new file called `hello.txt` using the `echo` command. This command
    outputs the given text to a new file.


    ```

    $ echo "world" hello.txt

    ```


    Add the newly created file to your local IPFS node using the `ipfs add` command.


    ```

    $ ipfs add hello.txt

    ```


    The file was added to IPFS, resulting in a hash identifier. When you add a file,
    this is automatically pinned to your local node.


    ## Checking the File Was Added


    To check that your file was added, you can use the `ipfs cat` command to output
    the file content to the terminal.


    ```

    $ ipfs cat your_file_hash

    ```


    ## Verifying Your File Was Pinned


    Go to `http://127.0.0.1:5001/webui`, click Files, and then click Pins. Your file
    is there!


    ## Unpinning Your File


    You can unpin the file from your local IPFS node simply by using the following
    command:


    ```

    $ ipfs pin rm

    ```


    ## Pinning Your File Manually


    You can pin files manually using the following command. Remember that you need
    to copy the hash of your file to pin or unpin it.


    ```

    $ ipfs pin add

    ```


    You’re done; your file was pinned again!'
