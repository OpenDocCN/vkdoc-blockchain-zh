- fmt: "# Installing Docker\n\n`Docker`² is a free and open platform for creating,\
    \ delivering, and executing applications. `Docker` allows you to decouple your\
    \ apps from your infrastructure, allowing you to deploy software more quickly.\
    \ `Docker` allows you to manage your infrastructure in the same manner that you\
    \ control your apps. By utilizing `Docker`’s techniques for fast shipping, testing,\
    \ and deploying code, you may substantially shorten the time between developing\
    \ code and executing it in production. You will need `Docker` to be started before\
    \ compiling using `Truffle`.\n\n# Installing the Blockchain Dev Kit Extension\
    \ on VS Code\n\nThe Blockchain Developer Kit for Ethereum³ was designed for both\
    \ new users of Ethereum and those who are already familiar with the process. One\
    \ of the primary goals is to assist users in creating a project structure for\
    \ these smart contracts; it also helps users compile and build the assets, deploy\
    \ the assets to blockchain endpoints, and perform contract debugging.⁴\n\n## Installing\
    \ the Extension\n\nGo to Extensions and search for *Blockchain Development Kit\
    \ for Ethereum*. Click the extension created by Microsoft; it will usually be\
    \ the first one (Figure 1-1).\n\n![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig1_HTML.jpg)\n\
    \nA screenshot of the Extensions window of the marketplace. The search bar displays\
    \ Blockchain Development Kit for Ethereum. The blockchain development extension\
    \ is the first one and is selected. The properties of this extension include development,\
    \ deployment, debugging, and management.\n\nFigure 1-1  \nInstalling the Blockchain\
    \ Development Kit for Ethereum\n\nClick Install and wait for the installation\
    \ to finish. That’s done!\n\n# Installing Truffle\n\n`Truffle`⁵ is an Ethereum\
    \ development environment, testing framework, and asset pipeline that aims to\
    \ make life easier for Ethereum developers. We will use this tool throughout the\
    \ book.⁶\n\n## Installing Truffle\n\nGo to the terminal window and install the\
    \ `Truffle` package.\n\n```\n$ npm install -g truffle\n```\n\n## Checking Truffle\
    \ Installation\n\nNow you can check whether the installation completed successfully.\
    \ If you see the result shown in Figure 1-2, the installation was successful.\n\
    \n![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig2_HTML.jpg)\n\nA screenshot\
    \ of the `truffle` command output has details of installation on top, followed\
    \ by `Truffle v 5 point 2 point 6`, a development framework for Ethereum. Further\
    \ below, the usage details are provided and there is a long list of commands and\
    \ their functions.\n\nFigure 1-2  \n`Truffle` command output result\n\n```\n$\
    \ truffle\n```\n\n# Installing the Ganache CLI\n\n`Ganache`⁷ is a personal blockchain\
    \ that allows for the rapid development of the Ethereum and Corda distributed\
    \ applications. `Ganache` can be used throughout the development cycle, allowing\
    \ you to develop, deploy, and test your DApps in a secure and deterministic environment.⁸\n\
    \n## Installing Ganache\n\nGo to the terminal window and install the `Ganache`\
    \ command line.\n\n```\nnpm install -g ganache-cli\n```\n\n## Starting Ganache\
    \ Locally\n\nStart the `Ganache CLI` on `127.0.0.1:8545` using the following command:\n\
    \n```\nganache-cli\n```\n\nUsing this command, in addition to starting `Ganache`\
    \ locally, it will generate ten accounts with their respective public and private\
    \ keys so that you can use them for test purposes (Figure 1-3).\n\n![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig3_HTML.jpg)\n\
    \nA screenshot of the available accounts generated by `Ganache`. Details of installation\
    \ are displayed on top, followed by `Ganache C L 1 v 6. point 12 point 2`, `ganache-core:\
    \ 2 point 13 point 2`. Further below, there is a list of available accounts, with\
    \ long codes and `100 E T H` within parentheses with each code.\n\nFigure 1-3\
    \  \nAccounts generated by `Ganache`\n\n# Installing and Setting Up MetaMask Wallet\n\
    \n`MetaMask`⁹ is a browser extension that allows you to access Ethereum-enabled\
    \ distributed applications, or DApps. The add-on injects the Ethereum `Web3 API`¹⁰\
    \ into the `JavaScript` context of every website, allowing DApps to read from\
    \ the blockchain.¹¹\n\nWhen a DApp wants to make a transaction and publish it\
    \ to the blockchain, `MetaMask` gives the user a secure interface to evaluate\
    \ the transaction before approving or rejecting it through private keys, local\
    \ client wallets, and hardware wallets like `Trezor`.¹²\n\n## Installing the Wallet\n\
    \nGo to [`https://metamask.io`](https://metamask.io) and click Install MetaMask.\
    \ Click Add to Brave or your browser name and then click “Add extension.” Finally,\
    \ click “Get started.”\n\n## Configuring the Wallet\n\nClick “Create a wallet”\
    \ and then click “No thanks” (if you prefer, click “I agree” instead). Define\
    \ the password that you will use to open your wallet and then confirm the password.\
    \ Agree to the terms of use. Finally, click Create. Now you can back up your secret\
    \ phrase (you can also do it later). For now, click “Remind me later.” Your wallet\
    \ is done!\n\n## Accessing Your Wallet\n\nClick Extensions and pin MetaMask to\
    \ your bar. Now, click the MetaMask icon, and your wallet will be shown.\n\n##\
    \ Discovering Your Wallet Address\n\nClick the three dots on the upper-right side\
    \ and then click “Account details.” Notice that you can see your wallet address\
    \ in hash format and in QR code format. You can also copy your wallet address\
    \ by clicking the account name. That’s it!\n\n# Create an Account on Infura\n\n\
    `Infura`¹³ delivers the tools and infrastructure that enable developers to rapidly\
    \ transition their blockchain application from testing to scaled deployment, all\
    \ while maintaining simple, dependable access to Ethereum and IPFS. A well-known\
    \ use case that uses `Infura` as a data interface is `Uniswap`.¹⁴,¹⁵\n\n## Creating\
    \ a New Account\n\nGo to [`Infura`](https://infura.io/)¹⁶ and click “Get started\
    \ for free.” Enter your email and password and then click “Sign up.” A verification\
    \ email will be sent to your address (Figure 1-4).\n\n![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig4_HTML.jpg)\n\
    \nA screenshot of the `Infura` welcome page has Etherium and Filecoin on the left.\
    \ The window reads, Let's get started. Our `E t h 2 A P I` is live. Request access\
    \ to our private beta now. Building with Filecoin? Join the waitlist for the Infura\
    \ Filecoin A P I. Get started and create your first project to access the Ethereum\
    \ network exclamation mark.\n\nFigure 1-4  \nThe `Infura` welcome page you will\
    \ see after logging in\n\nCheck your email and confirm your account by clicking\
    \ the verification link. After that, you will be redirected to your dashboard.\
    \ Click the Ethereum tab in the left menu.\n\nNow that your account is created,\
    \ you can start setting up a new project (Figure 1-5).\n\n![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig5_HTML.jpg)\n\
    \nThe project's homepage has Etherium and Filecoin on the left, where Ethereum\
    \ is chosen. The window reads, Instant access over `H T T P S` and Web Sockets\
    \ to the Ethereum network. Below the text, the `Create a project` button is shown.\n\
    \nFigure 1-5  \nClicking Ethereum takes you to the project’s home page"
  raw: '## Installing Docker


    Docker^([²](#fn2)) is a free and open platform for creating, delivering, and executing
    applications. Docker allows you to decouple your apps from your infrastructure,
    allowing you to deploy software more quickly. Docker allows you to manage your
    infrastructure in the same manner that you control your apps. By utilizing Docker’s
    techniques for fast shipping, testing, and deploying code, you may substantially
    shorten the time between developing code and executing it in production. You will
    need Docker to be started before compiling using Truffle.


    ## Installing the Blockchain Dev Kit Extension on VS Code


    The Blockchain Developer Kit for Ethereum^([³](#fn3)) was designed for both new
    users of Ethereum and those who are already familiar with the process. One of
    the primary goals is to assist users in creating a project structure for these
    smart contracts; it also helps users compile and build the assets, deploy the
    assets to blockchain endpoints, and perform contract debugging.^([⁴](#fn4))


    ### Installing the Extension


    Go to Extensions and search for *Blockchain Development Kit for Ethereum*. Click
    the extension created by Microsoft; it will usually be the first one (Figure [1-1](#521550_1_En_1_Chapter.xhtml#Fig1)).


    ![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig1_HTML.jpg)


    A screenshot of the Extensions window of the marketplace. The search bar displays
    Blockchain Development Kit for Ethereum. The blockchain development extension
    is the first one and is selected. The properties of this extension include development,
    deployment, debugging, and management.


    Figure 1-1


    Installing the Blockchain Development Kit for Ethereum


    Click Install and wait for the installation to finish. That’s done!


    ## Installing Truffle


    Truffle^([⁵](#fn5)) is an Ethereum development environment, testing framework,
    and asset pipeline that aims to make life easier for Ethereum developers. We will
    use this tool throughout the book.^([⁶](#fn6))


    ### Installing Truffle


    Go to the terminal window and install the Truffle package.


    ```

    $ npm install -g truffle

    ```


    ### Checking Truffle Installation


    Now you can check whether the installation completed successfully. If you see
    the result shown in Figure [1-2](#521550_1_En_1_Chapter.xhtml#Fig2), the installation
    was successful.


    ![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig2_HTML.jpg)


    A screenshot of the truffle command output has details of installation on top,
    followed by Truffle v 5 point 2 point 6, a development framework for Ethereum.
    Further below, the usage details are provided and there is a long list of commands
    and their functions.


    Figure 1-2


    Truffle command output result


    ```

    $ truffle

    ```


    ## Installing the Ganache CLI


    Ganache^([⁷](#fn7)) is a personal blockchain that allows for the rapid development
    of the Ethereum and Corda distributed applications. Ganache can be used throughout
    the development cycle, allowing you to develop, deploy, and test your DApps in
    a secure and deterministic environment.^([⁸](#fn8))


    ### Installing Ganache


    Go to the terminal window and install the Ganache command line.


    ```

    npm install -g ganache-cli

    ```


    ### Starting Ganache Locally


    Start the Ganache CLI on 127.0.0.1:8545 using the following command:


    ```

    ganache-cli

    ```


    Using this command, in addition to starting Ganache locally, it will generate
    ten accounts with their respective public and private keys so that you can use
    them for test purposes (Figure [1-3](#521550_1_En_1_Chapter.xhtml#Fig3)).


    ![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig3_HTML.jpg)


    A screenshot of the available accounts generated by Ganache. Details of installation
    are displayed on top, followed by Ganache C L 1 v 6. point 12 point 2, ganache-core:
    2 point 13 point 2\. Further below, there is a list of available accounts, with
    long codes and 100 E T H within parentheses with each code.


    Figure 1-3


    Accounts generated by Ganache


    ## Installing and Setting Up MetaMask Wallet


    MetaMask^([⁹](#fn9)) is a browser extension that allows you to access Ethereum-enabled
    distributed applications, or DApps. The add-on injects the Ethereum Web3 API^([^(10)](#fn10))
    into the JavaScript context of every website, allowing DApps to read from the
    blockchain.^([^(11)](#fn11))


    When a DApp wants to make a transaction and publish it to the blockchain, MetaMask
    gives the user a secure interface to evaluate the transaction before approving
    or rejecting it through private keys, local client wallets, and hardware wallets
    like Trezor.^([^(12)](#fn12))


    ### Installing the Wallet


    Go to [`https://metamask.io`](https://metamask.io) and click Install MetaMask.
    Click Add to Brave or your browser name and then click “Add extension.” Finally,
    click “Get started.”


    ### Configuring the Wallet


    Click “Create a wallet” and then click “No thanks” (if you prefer, click “I agree”
    instead). Define the password that you will use to open your wallet and then confirm
    the password. Agree to the terms of use. Finally, click Create. Now you can back
    up your secret phrase (you can also do it later). For now, click “Remind me later.”
    Your wallet is done!


    ### Accessing Your Wallet


    Click Extensions and pin MetaMask to your bar. Now, click the MetaMask icon, and
    your wallet will be shown.


    ### Discovering Your Wallet Address


    Click the three dots on the upper-right side and then click “Account details.”
    Notice that you can see your wallet address in hash format and in QR code format.
    You can also copy your wallet address by clicking the account name. That’s it!


    ### Create an Account on Infura


    Infura^([^(13)](#fn13)) delivers the tools and infrastructure that enable developers
    to rapidly transition their blockchain application from testing to scaled deployment,
    all while maintaining simple, dependable access to Ethereum and IPFS. A well-known
    use case that uses Infura as a data interface is Uniswap.^([^(14)](#fn14),[^(15)](#fn15))


    ### Creating a New Account


    Go to [Infura](https://infura.io/)^([^(16)](#fn16)) and click “Get started for
    free.” Enter your email and password and then click “Sign up.” A verification
    email will be sent to your address (Figure [1-4](#521550_1_En_1_Chapter.xhtml#Fig4)).


    ![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig4_HTML.jpg)


    A screenshot of the Infura welcome page has Etherium and Filecoin on the left.
    The window reads, Let''s get started. Our E t h 2 A P I is live. Request access
    to our private beta now. Building with Filecoin? Join the waitlist for the Infura
    Filecoin A P I. Get started and create your first project to access the Ethereum
    network exclamation mark.


    Figure 1-4


    The Infura welcome page you will see after logging in


    Check your email and confirm your account by clicking the verification link. After
    that, you will be redirected to your dashboard. Click the Ethereum tab in the
    left menu.


    Now that your account is created, you can start setting up a new project (Figure
    [1-5](#521550_1_En_1_Chapter.xhtml#Fig5)).


    ![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig5_HTML.jpg)


    The project''s homepage has Etherium and Filecoin on the left, where Ethereum
    is chosen. The window reads, Instant access over H T T P S and Web Sockets to
    the Ethereum network. Below the text, the Create a project button is shown.


    Figure 1-5


    Clicking Ethereum takes you to the project’s home page'
  trans: "\n# 安装 Docker\n\n`Docker`² 是一个用于创建、交付和运行应用程序的免费开放平台。`Docker` 允许你将应用与基础设施解耦，从而更快速地部署软件。`Docker`\
    \ 让你能以管理应用的方式来管理基础设施。通过利用 `Docker` 的快速交付、测试和部署代码技术，你可以大幅缩短从编写代码到在生产环境中执行代码之间的时间。在使用\
    \ `Truffle` 编译之前，你需要先启动 `Docker`。\n\n# 在 VS Code 上安装区块链开发套件扩展\n\n适用于以太坊³ 的区块链开发者工具包既面向以太坊新手用户，也面向已熟悉相关流程的用户。其主要目标之一是帮助用户为这些智能合约创建项目结构；此外，它还能帮助用户编译和构建资产、将资产部署到区块链端点，并执行合约调试。⁴\n\
    \n## 安装该扩展\n\n转到扩展，搜索 *Blockchain Development Kit for Ethereum*。点击由 Microsoft\
    \ 创建的扩展，它通常是第一个（图 1-1）。\n\n![](img/521550_1_En_1_Fig1_HTML.jpg)\n\n市场扩展窗口的截图。搜索栏显示“Blockchain\
    \ Development Kit for Ethereum”。区块链开发扩展位于首位并被选中。该扩展的属性包括开发、部署、调试和管理。\n\n图 1-1\
    \  \n安装适用于以太坊的区块链开发套件\n\n点击“安装”并等待安装完成。就这么简单！\n\n# 安装 Truffle\n\n`Truffle`⁵ 是一个以太坊开发环境、测试框架和资产管道，旨在让以太坊开发者的工作更轻松。我们将在本书中全程使用这个工具。⁶\n\
    \n## 安装 Truffle\n\n打开终端窗口并安装 `Truffle` 包。\n\n```\n$ npm install -g truffle\n```\n\
    \n## 检查 Truffle 安装\n\n现在你可以检查安装是否成功完成。如果你看到如图 1-2 所示的结果，则表示安装成功。\n\n![](img/521550_1_En_1_Fig2_HTML.jpg)\n\
    \n`truffle` 命令输出的截图，顶部显示安装详情，随后是 `Truffle v 5 point 2 point 6`，一个适用于以太坊的开发框架。再往下是使用说明，以及一长串命令及其功能列表。\n\
    \n图 1-2  \n`Truffle` 命令输出结果\n\n```\n$ truffle\n```\n\n# 安装 Ganache CLI\n\n`Ganache`⁷\
    \ 是一个个人区块链，支持以太坊和 Corda 分布式应用的快速开发。`Ganache` 可在整个开发生命周期中使用，让你能在安全且确定性的环境中开发、部署和测试你的\
    \ DApp。⁸\n\n## 安装 Ganache\n\n打开终端窗口并安装 `Ganache` 命令行工具。\n\n```\nnpm install -g\
    \ ganache-cli\n```\n\n## 在本地启动 Ganache\n\n使用以下命令在 `127.0.0.1:8545` 上启动 `Ganache\
    \ CLI`：\n\n```\nganache-cli\n```\n\n除了在本地启动 `Ganache` 之外，此命令还会生成十个账户，并附有各自的公钥和私钥，以便你可以将其用于测试目的（图\
    \ 1-3）。\n\n![](img/521550_1_En_1_Fig3_HTML.jpg)\n\n由 `Ganache` 生成的可用账户截图。顶部显示安装详情，接着是\
    \ `Ganache C L 1 v 6. point 12 point 2`，`ganache-core: 2 point 13 point 2`。再往下是一系列可用账户，每个账户都带有长代码和括号内的\
    \ `100 E T H`。\n\n图 1-3  \n由 `Ganache` 生成的账户\n\n# 安装并设置 MetaMask 钱包\n\n`MetaMask`⁹\
    \ 是一款浏览器扩展，可让你访问支持以太坊的分布式应用（又称 DApps）。该扩展将以太坊 `Web3 API`¹⁰ 注入到每个网站的 `JavaScript`\
    \ 上下文中，从而使 DApps 能够从区块链读取数据。¹¹\n\n当 DApp 想要进行交易并将其发布到区块链时，`MetaMask` 会为用户提供一个安全界面，以便用户通过私钥、本地客户端钱包以及\
    \ `Trezor` 等硬件钱包批准或拒绝交易前对其进行评估。¹²\n\n## 安装钱包\n\n访问 [`https://metamask.io`](https://metamask.io)\
    \ 并点击“安装 MetaMask”。点击“添加到 Brave”或你的浏览器名称，然后点击“添加扩展”。最后，点击“开始使用”。\n\n## 配置钱包\n\n\
    点击“创建钱包”，然后点击“不，谢谢”（如果你愿意，也可以点击“我同意”）。定义用于打开钱包的密码，然后确认密码。同意使用条款。最后，点击“创建”。现在您可以备份您的秘密短语（也可以稍后操作）。暂时点击“稍后提醒我”。您的钱包就创建完成了！\n\
    \n## 访问您的钱包\n\n点击扩展并将 MetaMask 固定到工具栏。现在，点击 MetaMask 图标，您的钱包就会显示出来。\n\n## 查找您的钱包地址\n\
    \n点击右上角的三个点，然后点击“账户详情”。请注意，您可以查看哈希格式和二维码格式的钱包地址。您还可以通过点击账户名称来复制您的钱包地址。大功告成！\n\n\
    # 在 Infura 上创建账户\n\n`Infura`¹³ 提供工具和基础设施，使开发者能够快速将其区块链应用从测试阶段过渡到规模化部署阶段，同时保持对以太坊和\
    \ IPFS 的简单、可靠访问。一个使用 `Infura` 作为数据接口的知名应用案例是 `Uniswap`。¹⁴、¹⁵\n\n## 创建新账户\n\n访问\
    \ [`Infura`](https://infura.io/)¹⁶ 并点击“免费开始”。输入您的电子邮件和密码，然后点击“注册”。一封验证邮件将发送到您的地址（图\
    \ 1-4）。\n\n![](img/521550_1_En_1_Fig4_HTML.jpg)\n\n`Infura` 欢迎页面的截图，左侧显示以太坊和 Filecoin。窗口显示：“让我们开始吧。我们的\
    \ `E t h 2 A P I` 已上线。立即申请访问我们的私人测试版。正在使用 Filecoin 进行构建？加入 Infura Filecoin A P\
    \ I 的等待名单。开始使用并创建您的第一个项目以访问以太坊网络！”\n\n图 1-4  \n登录后您将看到的 `Infura` 欢迎页面\n\n检查您的电子邮件，并通过点击验证链接确认您的账户。之后，您将被重定向到您的仪表板。点击左侧菜单中的“以太坊”选项卡。\n\
    \n现在您的账户已创建，您可以开始设置一个新项目（图 1-5）。\n\n![](img/521550_1_En_1_Fig5_HTML.jpg)\n\n项目主页的截图，左侧有以太坊和\
    \ Filecoin，其中以太坊被选中。窗口显示：“通过 `H T T P S` 和 Web Sockets 即时访问以太坊网络”。文字下方显示了“创建项目”按钮。\n\
    \n图 1-5  \n点击以太坊将跳转到项目主页\n"
- fmt: "### Setting Up Your Infura Project\n\nAccess your dashboard and click `Ethereum`.\
    \ Then click “Create a project” and define the project name. Notice that you can\
    \ connect with different testnets and also to the mainnet. Save the changes.\n\
    \nAfter the project is created, information about the `ID`, `secret`, and `endpoint`\
    \ for the connection is provided (Figure [1-6](#521550_1_En_1_Chapter.xhtml#Fig6)).\n\
    \n![](images/521550_1_En_1_Chapter/521550_1_En_1_Fig6_HTML.jpg)\n\nThe Infura\
    \ project page has project details on top and Keys below. There is a bar for name\
    \ and a button labelled save changes under the bar. Under keys, the sections are\
    \ `Project ID` with the displayed `ID`, `Project Secret` with a bar, and endpoints,\
    \ where Mainnet is entered. There are two links below.\n\nFigure 1-6  \nInfura\
    \ project details page\n\n## Summary\n\nIn this chapter, you learned what `Ethereum`\
    \ is and how to install the necessary software to begin developing smart contracts.\n\
    \nIn the next chapter, you will explore `Solidity` and learn how to set up your\
    \ first project in this language.\n\nFootnotes [1](#521550_1_En_1_Chapter.xhtml#Fn1_source)\
    \   [2](#521550_1_En_1_Chapter.xhtml#Fn2_source)   [3](#521550_1_En_1_Chapter.xhtml#Fn3_source)\
    \   [4](#521550_1_En_1_Chapter.xhtml#Fn4_source)   [5](#521550_1_En_1_Chapter.xhtml#Fn5_source)\
    \   [6](#521550_1_En_1_Chapter.xhtml#Fn6_source)   [7](#521550_1_En_1_Chapter.xhtml#Fn7_source)\
    \   [8](#521550_1_En_1_Chapter.xhtml#Fn8_source)   [9](#521550_1_En_1_Chapter.xhtml#Fn9_source)\
    \   [10](#521550_1_En_1_Chapter.xhtml#Fn10_source)   [11](#521550_1_En_1_Chapter.xhtml#Fn11_source)\
    \   [12](#521550_1_En_1_Chapter.xhtml#Fn12_source)   [13](#521550_1_En_1_Chapter.xhtml#Fn13_source)\
    \   [14](#521550_1_En_1_Chapter.xhtml#Fn14_source)   [15](#521550_1_En_1_Chapter.xhtml#Fn15_source)\
    \   [16](#521550_1_En_1_Chapter.xhtml#Fn16_source)\n\n# 2. Solidity\n\n`Solidity`\
    \ is an object-oriented, high-level programming language that is used to construct\
    \ smart contracts that automate blockchain transactions. The language was proposed\
    \ in 2014 by Gavin Wood and developed by participants of the Ethereum project.\
    \ `Solidity` was influenced by `C++`, `Python`, and `JavaScript`, so you will\
    \ find similar language structures as in those languages. The language is primarily\
    \ used to build smart contracts on the Ethereum blockchain, but it can also be\
    \ used to create smart contracts on other blockchains.\n\n`Solidity`, being a\
    \ high-level language, eliminates the need to type code in ones and zeros. It\
    \ makes it much easier for people to create programs in a form that they can comprehend,\
    \ by combining letters and numbers.\n\nBecause `Solidity` is statically typed,\
    \ each variable must be specified by the user. Data types enable the compiler\
    \ to validate variable usage. `Solidity` data types are often divided into two\
    \ categories: value types and reference types.\n\nThe Ethereum ecosystem is distinctive\
    \ in that it can be used by a wide range of cryptocurrencies and decentralized\
    \ apps. On Ethereum, smart contracts enable the creation of solutions for all\
    \ types of enterprises and organizations.\n\nAt the end of this chapter, you will\
    \ be able to do the following:\n\n- Create a basic `Solidity` project using the\
    \ `VS Code` extension\n- Compile the contract\n- Deploy the contract to a local\
    \ blockchain\n\n## Getting Started with the Solidity Project on VS Code\n\nEthereum\
    \ is the most often utilized platform for smart contracts. Ethereum is the first\
    \ programmable blockchain in the world. It enables the creation of smart contracts\
    \ to aid in the transfer of digital assets such as ether.\n\n`Solidity`^([^(17)](#fn17))\
    \ is the language you will use to build contracts; it is Turing-complete, which\
    \ means that it allows you to build complex contracts in a well-defined and coded\
    \ manner.\n\n### Creating a New Project\n\nSelect “View ➤ Command Palette” and\
    \ then click “Blockchain: New Solidity Project” (Figure [2-1](#521550_1_En_2_Chapter.xhtml#Fig1)).\
    \ Finally, click “Create basic project” (Figure [2-2](#521550_1_En_2_Chapter.xhtml#Fig2)).\n\
