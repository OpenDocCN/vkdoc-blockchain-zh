    \nFigure 10-4 Infura settings\n\nNow, click Save Changes.\n\n### Configuring the\
    \ Wallet to Sign Transactions\n\nInstall the file system `fs` package. This package\
    \ provides a lot of useful functionality to access and interact with the file\
    \ system.\n\n```\n$ npm install fs\n```\n\nInstall the wallet provider `hdwallet`\
    \ package. This also installs the HD wallet-enabled Web3 provider, which is used\
