    \ Code and paste the private secret recovery phrase in the file `.secret`.\n\n\
    ### Compiling the Smart Contract\n\nCompile the contract using Truffle.\n\n```\n\
    $ truffle compile\n```\n\n### Deploying the Smart Contract\n\nDeploy the contract\
