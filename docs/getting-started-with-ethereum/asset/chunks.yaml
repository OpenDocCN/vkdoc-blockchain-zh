  raw: '### Creating the Smart Contract


    Create a new smart contract for price consumption.


    ```

    $ touch contracts/PriceConsumer.sol

    ```


    Open the file `PriceConsumer.sol` (Figure [10-1](#521550_1_En_10_Chapter.xhtml#Fig1)).


    ![](images/521550_1_En_10_Chapter/521550_1_En_10_Fig1_HTML.jpg)


    A screenshot of the V S code contracts folder has the Price Consumer dot s o l
    tab open. The left pane ''Explorer'' has other sections: Contracts under which
    Migrations dot s o l and Price Consumer dot s o l (which is selected) is present,
    migrations, node underscore modules, test and two dot j s o n and one dot j s
    file.


    Figure 10-1


    VS Code contracts folder


    In the `PriceConsumer.sol` file, define the Solidity version and then import the
    Chainlink contract interface. After that, define the contract name and the contract
    constructor.


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8.0;

    import "@chainlink/contracts/src/v0.6/interfaces/AggregatorV3Interface.sol";

    contract PriceConsumer {

    AggregatorV3Interface internal priceFeed;

    constructor(){

    priceFeed = AggregatorV3Interface()

    }

    }

    ```


    Go to [`https://docs.chain.link/docs/ethereum-addresses`](https://docs.chain.link/docs/ethereum-addresses)
    and scroll down to the Kovan section. Copy the Proxy address on the line “ETH/USD”
    (Figure [10-2](#521550_1_En_10_Chapter.xhtml#Fig2)).


    ![](images/521550_1_En_10_Chapter/521550_1_En_10_Fig2_HTML.jpg)


    A screenshot of the chainlink price feeds has ''Using Price Feeds'' listed on
    the left. There are multiple options under ''Using Price Feeds'', one of them
    being ''Contact Addresses'' which is selected. Under it, ''Etherium Price Feeds''
    is selected. On the right, there is a table with 3 columns with details of the
    price feeds.


    Figure 10-2


    Chainlink price feeds


    Paste the address into the `AggregatorV3Interface` constructor. After that, create
    the function to get the price.


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8.0;

    import "@chainlink/contracts/src/v0.6/interfaces/AggregatorV3Interface.sol";

    contract PriceConsumer {

    AggregatorV3Interface internal priceFeed;

    constructor(){

    priceFeed = AggregatorV3Interface(0x9326BFA02ADD2366b30bacB125260Af641031331);

    }

    function getThePrice() public view returns (int){

    (

    uint80 roundID,

    int price,

    uint startedAt,

    uint timeStamp,

    uint80 answeredInRound

    ) = priceFeed.latestRoundData();

    return price;

    }

    }

    ```


    ### Creating the Migration


    Create the migration file in the `migrations` folder.


    ```

    $ touch migrations/2_deploy_contracts.sol

    ```


    Write code to deploy the `PriceConsumer` smart contract (Figure [10-3](#521550_1_En_10_Chapter.xhtml#Fig3)).


    ![](images/521550_1_En_10_Chapter/521550_1_En_10_Fig3_HTML.jpg)


    A screenshot of the V S code migrations folder has the 2 underscore deploy underscore
    contracts dot j s tab open. The number 1 is displayed on the window.


    Figure 10-3


    VS Code migrations folder


    ```

    const PriceConsumer = artifacts.require("PriceConsumer");

    module.exports = function(deployer){

    deployer.deploy(PriceConsumer);

    };

    ```


    ### Setting Up Your Infura Project


    Go to [`https://infura.io`](https://infura.io) and access your dashboard. Click
    Ethereum and then click “Create a project”. Finally, define the project name and
    copy the project ID (Figure [10-4](#521550_1_En_10_Chapter.xhtml#Fig4)). Notice
    that you can connect with different testnets and also to the mainnet.


    ![](images/521550_1_En_10_Chapter/521550_1_En_10_Fig4_HTML.jpg)


    A screenshot of the Infura settings has a dashboard on the left. The bar on top
    has the title ethereum. The Settings tab is open. The Project Details have to
    be entered on the main screen. The first section has Name with ''ethereum'' entered,
    which is a required field, and the second section has Keys with the Project I
    D displayed.


    Figure 10-4


    Infura settings


    Now, click Save Changes.


    ### Configuring the Wallet to Sign Transactions


    Install the file system `fs` package. This package provides a lot of useful functionality
    to access and interact with the file system.


    ```

    $ npm install fs

    ```


    Install the wallet provider `hdwallet` package. This also installs the HD wallet-enabled
    Web 3 provider, which is used to sign transactions for addresses derived from
    a 12- or 24-word mnemonic.


    ```

    $ npm install @truffle/hdwallet-provider@1.2.3

    ```


    Open the `truffle-config.js` file and uncomment the `HDWalletProvider` code section.


    ```

    const HDWalletProvider = require(''@truffle/hdwallet-provider'');

    const infuraKey = '''';

    const fs = require(''fs'');

    const mnemonic = fs.readFileSync(".secret").toString().trim();

    ```


    Paste your Infura project ID as a value for the variable `infuraKey`.


    ### Configuring the Network


    In `truffle-config.js`, uncomment the `ropsten` network section and change the
    following values:


    *   Change `ropsten` to `kovan`.


    *   Change the Ropsten Infura URL to `kovan`.


    *   Change `YOUR-PROJECT-ID` to `${infuraKey}`.


    *   Change `network_id t`o `42`.


    ```

    kovan: {

    provider: () => new HDWalletProvider(mnemonic, `https://kovan.infura.io/v3/${infuraKey}`),

    network_id: 42,

    gas: 5500000,

    confirmations: 2,

    timeoutBlocks: 200,

    skipDryRun: true

    },

    ```


    ### Configuring the Solidity Compiler


    Still in `truffle.config.js`, uncomment the `compilers` section and change the
    version to `0.8.0`.


    ```

    compilers: {

    solc: {

    version: "0.8.0",

    docker: true,

    settings: {

    optimizer: {

    enabled: false,

    runs: 200

    },

    evmVersion: "byzantium"

    }

    }

    },

    ```


    ### Configuring the Private Key


    Create the secret file as follows:


    ```

    $ touch .secret

    ```


    Go to the browser and open your MetaMask wallet connected to the Infura network.
    Click “Your Account” and then click “Settings”. Finally, click “Security & Privacy”
    (Figure [10-5](#521550_1_En_10_Chapter.xhtml#Fig5)).


    ![](images/521550_1_En_10_Chapter/521550_1_En_10_Fig5_HTML.jpg)


    A screenshot of the Security and Privacy window for the Reveal Seed Phrase setting.
    There is text that reads ''Reveal Seed Phrase'' and a button below with the same
    text, where the cursor is placed.


    Figure 10-5


    MetaMask: revealing the seed phrase


    You have the option to view your seed phrase, but be aware that this information
    is sensitive, and if someone has access to it, they will be able to restore your
    wallet and make use of your funds.


    Click Reveal Seed Phrase and enter your wallet password to continue. Copy the
    private key. Go back to Visual Studio Code and paste the private secret recovery
    phrase in the file `.secret`.


    ### Compiling the Smart Contract


    Compile the contract using Truffle.


    ```

    $ truffle compile

    ```


    ### Deploying the Smart Contract


    Deploy the contract to the Kovan network using Truffle. The `migrate` command
    runs migrations to deploy contracts on the Kovan network.


    ```

    $ truffle migrate --network kovan

    ```


    Wait for the contract to be deployed and the transactions to be confirmed on the
    blockchain. Now, check your contract address that was created (Figure [10-6](#521550_1_En_10_Chapter.xhtml#Fig6)).


    ![](images/521550_1_En_10_Chapter/521550_1_En_10_Fig6_HTML.jpg)


    A screenshot of the V S code deployed contract output window has Problems, Output,
    Terminal and Debug console tabs. The codes are displayed in the terminal tab,
    with details of transaction, blocks, contract address, block number and timestamp,
    account, balance, gas used, gas price, value sent, and total cost.


    Figure 10-6


    VS Code deployed contract output'
