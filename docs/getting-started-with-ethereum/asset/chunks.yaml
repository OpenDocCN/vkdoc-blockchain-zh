    ## Introduction


    This book is a step-by-step guide for everyone who wants to get started as an
    Ethereum developer. It was designed for those who have never programmed anything
    in the blockchain and want to get started.


    I will cover everything from the basic requirements of installation to writing,
    testing, and deploying smart contracts. I will also cover topics such as `IPFS`,
    `Filecoin`, `ENS`, `Chainlink`, `Truffle`, `Ganache`, `OpenZeppelin`, `Pinata`,
    `Fleek`, `Infura`, `MetaMask`, and `OpenSea`, among others.


    In Chapter [1](#521550_1_En_1_Chapter.xhtml), I will go through all the necessary
    requirements to start the activities described in this book. It covers software
    and tools such as `Docker`, `Truffle`, `Ganache`, `MetaMask`, and `Infura`.


    In Chapter [2](#521550_1_En_2_Chapter.xhtml), you will learn how to create a basic
    Solidity project using the VS Code extension and then compile and deploy the smart
    contract to a local blockchain.


    In Chapter [3](#521550_1_En_3_Chapter.xhtml), you will learn how to code smart
    contracts to create your own coin and deploy it to a local blockchain. Fungible
    tokens are interchangeable, so they are perfect to solve problems such as double
    spending. You will also be able to add this token to your own wallet and send
    it to different wallets, as well as send other coins that you already have.


    In Chapter [4](#521550_1_En_4_Chapter.xhtml), you will learn how to create a unit
    test file for a smart contract, as well as write test assertions, run the unit
    tests, and check the unit test results.


    In Chapter [5](#521550_1_En_5_Chapter.xhtml), you will be able to create smart
    contracts for badge tokens. You can use badge tokens, also known as `NFTs`, to
    represent physical things in the virtual world, such as digital collectibles,
    game items, digital art, etc. Each `NFT` token is unique and can have a unique
    value. In this chapter, you will learn how to code the smart contract with the
    help of the `OpenZeppelin` library. You will also create the badge and add it
    to `IPFS` node. After that, you will learn to pin it so it is available for everyone,
    everywhere. Next, you will learn how to migrate the contract to different environments
    such as a local blockchain using `Ganache` and testnets using `Infura`. Finally,
    you will learn how to sell your own `NFT` on `OpenSea`.


    In Chapter [6](#521550_1_En_6_Chapter.xhtml), we will cover different ways to
    fund your wallet using faucets. This part is important because you will need some
    ether in your wallet in order to pay for the transaction. Most of the examples
    will be deployed on testnets so you won’t need real money to execute them.


    In Chapter [7](#521550_1_En_7_Chapter.xhtml), you will learn how to create and
    save files on a decentralized file system. I also cover some tools such as a browser
    extension that will help you manage the node, as well as `Pinata` to help you
    pin your files remotely instead of keeping them locally. In addition, you will
    be able to host your own site on `IPFS` using `Fleek`.


    In Chapter [8](#521550_1_En_8_Chapter.xhtml), I will cover ways to preserve files
    on a local node. The idea behind `Filecoin` is the same of `IPFS`, with the difference
    that `Filecoin` has an incentive mechanism and incentive nodes to preserve files.
    `Filecoin` was built on top of `IPFS`.


    In Chapter [9](#521550_1_En_9_Chapter.xhtml), you will learn how to register a
    custom domain on the Ethereum Name System (`ENS`). You can use it to host a site
    under this domain name or even as a domain for your wallet to receive cryptos,
    tokens, or `NFTs`.


    In Chapter [10](#521550_1_En_10_Chapter.xhtml), I will cover use cases where you
    need to pull data from off-chain using oracles. You will learn how to use price
    feeds and then crypto prices inside smart contracts.


    In Chapter [11](#521550_1_En_11_Chapter.xhtml), you will learn how to create a
    simple project to connect to `Web3` using the `.NET` platform and how to retrieve
    data from the blockchain to display wallet balances.


    Chapter [12](#521550_1_En_12_Chapter.xhtml) concludes the book.


    ## About the Author About the Technical Reviewer


    # 1. Getting Started


    In this chapter, I’ll explain what Ethereum is and take you through the installations
    you’ll need to perform before you can start using it.


    ## What Is Ethereum?


    Ethereum solves problems that go beyond Bitcoin. When developing decentralized
    applications, we need a platform where we can code not only coins but a wide variety
    of solutions.


    Ethereum is a platform that allows you to code smart contracts in the Solidity
    language. Using it, you can compile your code into bytecode to be interpreted
    by the Ethereum Virtual Machine (`EVM`).


    This virtual machine will interpret the instructions contained in the bytecode
    of your smart contract and will create a new state based on the rules described
    in the contract. It’s like you have a state machine in your hand, where with every
    new state update, a new record is updated on the blockchain.


    A virtual machine like `EVM` consumes resources, so you need a mechanism that
    generates incentives for more people to be nodes on the network while also preventing
    spam attacks. Because of this, an element called `gas` is required for the actions
    to be executed.


    To secure `gas`, you must first have `ether`, which is the currency of the Ethereum
    network. You use `gas` to pay for computing, so think of it as the cost of using
    the system. You will need `gas` to perform most of the activities described in
    this book.


    The Ethereum platform allows you to build decentralized applications, which are
    applications where the source code is immutable and the data is impossible to
    change after writing. This opens up a range of new solutions, such as voting,
    supply chain, and decentralized finance, among others.


    The best way to learn is by coding, so let’s get started.


    ## Installing Visual Studio Code


    Before you can start using Ethereum, you’ll need to install some software. First
    is Visual Studio Code,^([¹](#fn1)) an open source code editor that includes features
    for debugging, task execution, and version management. It provides developers
    with only the tools they need for a fast code-build-debug cycle, leaving more
    complicated processes to full-featured IDEs like Visual Studio IDE.


    You can download it for free for different platforms like Windows, Linux, and
    Mac. All exercises in the book were based on the use of this tool.'
