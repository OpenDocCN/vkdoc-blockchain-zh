  \ WETH 被圈出。\n\n\n\n## 去中心化借贷\n\nDeFi 借贷协议与传统借贷平台类似。该协议使贷方能够将资产借给借方，借方则在归还资产时支付额外的利息费用。DeFi\
  \ 协议在区块链上运行，无需第三方参与，贷方和借方均为匿名状态。\n\n由于加密货币市场的波动性可能导致抵押资产价值突然下跌，借方通常需要超额抵押其贷款以增强信用，从而降低贷方的风险。正如我们在之前关于稳定币的章节中所见，DAI\
  \ 的工作原理是创建一个 Maker Vault，将超额抵押的价值锁定以抵御波动。借方通常需要始终保持其抵押品价值达到贷款价值的 150%，以避免无法还款。\n\
  \n以下是一些最受欢迎的 DeFi 借贷平台列表：Aave、Maker 和 Compound。\n\n我们已经在稳定币章节中讨论过 Maker 协议。在本节中，我们将探讨\
  \ Aave 的借贷功能。\n\n### DeFi 借贷平台概览——Aave\n\nAave 是一个 DeFi 货币市场协议，允许用户以浮动和固定利率借贷加密货币，而无需使用中介机构。2017\
  \ 年，Aave 的原始版本以 ETHLend 的名义推出。2020 年，ETHLend 更名为 Aave。\n\n#### Aave 代币\n\nAave 有两种代币：`AAVE`\
  \ 代币和 `aToken`。\n\n##### AAVE\n\nAave 借贷协议的原生代币是 `AAVE`，一种治理代币。与 Maker 的治理代币类似，`AAVE`\
  \ 允许持有者对 Aave 社区提交的提案进行投票。\n\n##### aToken\n\n`aToken` 代表已供应或已借出并产生利息的加密资产数量。`aToken`\
  \ 的价值与相应已供应资产的价值以 1:1 的比例挂钩。\n\n随着 Aave 流动性池的持续增长，`aToken` 的累计利息也会增加。`aToken` 持有者可以直接将质押奖励索取到他们的同一个钱包地址，或者将利息支付重定向到另一个以太坊地址。\n\
  \n例如，Alice 提供了 1 个 `aETH` 代币的供应，年化收益率为 5%。假设 1 ETH 价值 2000 美元。总资产价值为 2000 美元。Alice\
  \ 持有其 `aETH` 代币一年后，赎回了她所有的 `aETH`，假设此时 1 ETH 价值 3000 美元。`aETH` 的价值将为 `1 + 1 * 0.05\
  \ = 1.05 ETH`，换算成美元为 `1.05 * 3000 = 3150 美元`。此次投资的回报率为 57.5%。\n\n当贷方向流动性池提供加密资产时，Aave\
  \ 借贷池会向用户账户铸造 `aTokens`。当贷方决定提取其资产时，`aToken` 合约会调用带有计算利率的 `redeem()` 函数，将资产返还给贷方，并销毁相关的\
  \ `aTokens`。`aToken` 合约的赎回过程如图 8-16 所示。\n\n![](img/535492_1_En_8_Fig16_HTML.png)\n\
  \nA A V X 智能合约中的代币决策图，分块展示了代币合约赎回流程，`redeem` 函数按利率计算，最后将资产代币转移给用户。\n\n**图 8-16**\
  \ – 在 AAVX 智能合约中赎回 `aToken`\n\n### 如何在 Aave 上存款\n\n**第 1 步** – 访问 Aave 网站：[`https://aave.com/`](https://aave.com/)。点击启动应用程序按钮。然后选择并连接您的钱包到\
  \ Aave 平台。在我们接下来的分步指南中，我们将使用 `USDT` 代币。您可以从流行的加密货币交易所购买 `USDT`。\n\n![](img/535492_1_En_8_Figaf_HTML.png)\n\
