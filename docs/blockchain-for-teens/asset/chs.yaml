  3D 图像，尽管许多 `SuperRare` 的 `NFT` 在其他地方无法购得。每个 `NFT` 也都是单一版本。`SuperRare` 宣布了其自有代币。`SuperRare`
  的 `NFT` 可以在 `OpenSea` 上交易。`SuperRare` 的另一个独特之处在于，它允许艺术家上传 `NSFW`（即 `Not Safe for
