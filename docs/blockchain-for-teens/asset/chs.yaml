  \ 100 名玩家互相战斗，直到只剩一人站立。它使玩家能够与伙伴联系、建立社群并扩展社交网络，这是玩家持续玩游戏的最强动力之一。`Fortnite` 发布仅两周后，玩家就超过了\
  \ 1000 万。截至 2022 年 6 月，`Fortnite` 上仍有大约 300 万玩家。\n\n**电影——《头号玩家》（2018 年 3 月）**\n\
  \n史蒂文·斯皮尔伯格的《头号玩家》改编自欧内斯特·克莱因 2011 年的同名小说。故事设定在一个反乌托邦的未来，角色们大部分时间都生活在 `OASIS` 元宇宙中——包括在\
  \ `OASIS` 中上学、工作、玩耍和社交。`OASIS` 使用数字货币进行支付。角色只需进入传送门就可以传送到多个 `Metaverse` 世界。大多数人隐藏真实身份保持匿名。《头号玩家》常被视作未来\
