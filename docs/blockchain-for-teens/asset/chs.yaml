- "# 7. 元宇宙：重塑的世界\n\n1974 年，哲学家罗伯特·诺齐克讨论了一种体验机器，它可以刺激个体的大脑，使其获得与“现实”世界中体验难以区分的快乐体验。诺齐克提出了一个问题：“如果可以选择，我们会选择机器而不是现实吗？”1999\
  \ 年，科幻电影《黑客帝国》提出了一个类似的问题：红色药丸还是蓝色药丸？吞下红色药丸，在现实世界中醒来，发现世界只是矩阵创造的模拟；或者吞下蓝色药丸，传送到虚拟的矩阵情节中？元宇宙的概念类似于《黑客帝国》，在“互联网的未来版本”中，现实世界与虚拟世界融为一体。\n\
  \n虽然元宇宙仍处于早期阶段，但近年来它迅速进入了主流视野。元宇宙将是未来的 3D 互联网，它基于一系列新技术构建，包括虚拟现实（VR）、混合现实（MR）、增强现实（AR）、区块链、人工智能（AI）和物联网（IoT）。\n\
  \n本章将介绍元宇宙的基础知识。然后，我们将讨论 AR、VR、MR 和 XR 背后的概念和技术。通过探索元宇宙的不同层级，我们理解其结构。接着，我们讨论 NFT\
  \ 和加密游戏如何在元宇宙中运作。然后，通过一个详细的实践示例，我们了解如何在元宇宙世界中购买虚拟房地产资产。在本章末尾，我们将概述元宇宙的未来。\n\n在本章中，我们将介绍以下关于区块链的具体主题：\n\
  \n- 元宇宙简介\n- AR、VR、MR 和 XR\n- 理解元宇宙层级\n- 元宇宙中的加密游戏\n- 元宇宙中的虚拟房地产\n- 元宇宙的未来\n\n##\
  \ 元宇宙简介\n\n元宇宙是各行各业的火热话题，特别是当它与其他技术（如区块链和人工智能）相结合，以构建互联网的未来时。\n\n### 什么是元宇宙？\n\n\
  元宇宙在 2021 年成为顶尖技术和趋势之一，并且至今热度不减。元宇宙尚未到来，但许多大公司已经对元宇宙的开发投入巨资。最终，元宇宙将成为互联网的 3D 变体，并将虚拟现实体验提升到新的水平。它将使用户几乎能够做任何事情——从工作、休闲、社交、教育、购物，甚至通过数字头像购买土地——在一个纯粹的虚拟世界中完成。\n\
  \n\n\n### 元宇宙简史\n\n**“元宇宙”一词诞生（1982 年 6 月）**\n\n`Metaverse` 一词最初由美国作家尼尔·斯蒂芬森在其 1982\
  \ 年出版的科幻小说《*雪崩*》中创造。故事发生在 21 世纪全球金融崩溃多年后的洛杉矶。《*雪崩*》的主角是一位名叫“英雄·主角”的、手持武士刀的黑客，他在洛杉矶与一个名为\
  \ `Metaverse`（由希腊语前缀“Meta”（意为超越）和“verse”（意为宇宙）组合而成）的虚拟世界之间来回穿梭。\n\n在书中，`Metaverse`\
  \ 是一个由用户控制的化身所填充的三维环境。需要使用一种特殊的光滑护目镜（类似于今天的 VR 头显）才能进入。在斯蒂芬森的虚拟世界中，美元毫无价值，取而代之的是替代性的加密数字支付方式，例如\
  \ `Kongbucks`，类似于我们今天的加密货币。\n\n**第二人生——迈向元宇宙的一步（2003 年 6 月）**\n\n2003 年，在《*雪崩*》出版近二十年后，直接受《*雪崩*》中\
  \ `Metaverse` 启发的在线虚拟世界游戏 `Second Life` 发布。用户可以创建化身、建造家园并与他人交流。\n\n**Roblox——一个在线多人在线游戏平台（2006\
  \ 年 1 月）**\n\n`Roblox` 是一款多人在线视频游戏，使玩家能够编程游戏并游玩其他人制作的游戏。截至 2022 年 9 月，`Roblox` 拥有超过\
  \ 2.3 亿注册玩家，每日活跃玩家达 3000 万。\n\n**Decentraland——首个基于以太坊区块链的虚拟现实平台（2015 年 6 月）**\n\
  \n`Decentraland` 是一个基于以太坊的去中心化 3D 虚拟现实平台，由埃斯特班·奥尔达诺和阿里尔·梅利奇于 2015 年创建。2017 年，Decentraland\
  \ 团队进行了首次代币发行（ICO），筹集了 86,206 个以太坊资金。在 `Decentraland` 中，用户可以创建虚拟对象，如赌场、艺术画廊、实验室、农场和主题公园，然后向公众开放，并收费供其他玩家参观。`Decentraland`\
  \ 有两种代币。第一种代币是 `LAND`——一种治理型 NFT 代币；第二种是 `MANA`，一种 `Decentraland` 的原生加密货币代币，用于促进\
  \ `LAND` 的购买。\n\n`LAND` 管理着 `Decentraland` 中的流程，代表了其中可穿越的虚拟空间和资产。每个非同质化数字资产被划分为由\
  \ `LAND` 代币持有者拥有的 16 米 x16 米的地块，并包含 `Decentraland` 中虚拟商品和服务的所有权。\n\n**Pokémon Go——首款\
  \ AR 手游（2015 年 9 月）**\n\n`Pokémon Go` 是首款增强现实（AR）移动游戏，由 Niantic Labs 与任天堂及宝可梦公司合作开发。宝可梦被标注在真实的手机地图上，当玩家走到该地点时，他们使用摄像头在现实中检测宝可梦，然后捕捉它们。该游戏于\
  \ 2016 年 7 月发布，迅速风靡全球。发布仅七天后，`Pokemon Go` 的单日活跃玩家就超过了 2000 万。\n\n**堡垒之夜——具有社群的多人游戏（2017\
