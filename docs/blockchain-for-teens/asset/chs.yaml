  \n\n## 掌控你的第一个以太坊钱包\n\n在 Remix 中，当我们使用 Injected Provider 时，`Metamask` 是最广泛使用的钱包提供商之一。`MetaMask`\
  \ 于 2016 年由 Aaron Davis 和 Daniel Finlay 创立，目前隶属于 ConsenSys 公司。截至 2022 年 3 月，`Metamask`\
  \ 月活跃用户已超过 3000 万。作为 Chrome、Firefox、Brave 和 Edge 浏览器的免费扩展程序，`MetaMask` 能让你的普通浏览器变身为\
  \ Web3 浏览器，用于存储和交换加密货币，以及与以太坊 DApp 交互，而无需运行以太坊节点。简而言之，`MetaMask` 是一个你可以在浏览器中访问的移动加密钱包。要管理\
  \ `Metamask` 的访问权限，用户只需要一个密码和一个 12 个单词组成的恢复短语，也称为种子短语。种子短语可以由任何真实的单词组成，例如 dog、cat\
  \ 或 chicken。\n\n如果你忘记或丢失了钱包恢复短语，就无法恢复你的加密钱包密码。务必将这些种子短语备份在安全可靠的地方，比如硬盘、U 盘或纸上。不要将其存储在容易被盗的地方，例如电子邮件、在线存储等。\n\
  \n`MetaMask` 可能并非存储大量加密货币或高价值加密资产（例如 NFT）的最佳场所。在连接主网进行交易时，请确保 `MetaMask` 是该浏览器中唯一打开的标签页，并避免在同一浏览器中登录社交媒体账户——某些社交媒体网站拥有可能窃取你数据的插件。\n\
  \n从 [`https://metamask.io`](https://metamask.io) 安装 `MetaMask`。然后将 `MetaMask` 钱包软件下载到你选择的浏览器中。选择“创建钱包”选项，阅读条款和条件，然后创建密码。安装完成后，你会在浏览器右上角看到一只狐狸。打开\
  \ `MetaMask`，通过点击“设置”➜“高级”➜“显示测试网络”，然后选择“选择此项以在网络列表中显示测试网络”的按钮，来启用测试网络。测试网络上的交易仅用于模拟主网交易或真实的区块链交易。\n\
  \n![](img/535492_1_En_5_Fig15_HTML.png)\n\n一张 MetaMask 界面的截图，显示设置页面。已选中高级设置选项，并标有存储日志、与手机同步、重置账户、高级\
  \ Gas 控制、显示十六进制数据和网络等选项。\n\n**图 5-15** – 更新 `Metamask` 的测试网络设置\n\n现在，你可以从 `MetaMask`\
  \ 的网络列表设置中切换到 Goerli 测试网络。\n\n![](img/535492_1_En_5_Fig16_HTML.jpg)\n\n一张添加新网络到\
  \ Goerli 测试网络的截图。\n\n**图 5-16** – 将 `Metamask` 连接到 Goerli 测试网络\n\n你会看到账户 1 中有一个默认账户，但没有以太币。\n\
  \n我们将从 Goerli 测试网络获取一些免费的测试以太币。复制账户 1 的以太坊地址，并使用以下 Goerli 测试网水龙头之一，通过你的以太坊账户地址获取以太币：\n\
  \n- 官方 Goerli 测试网水龙头： [`https://goerli-faucet.slock.it/`](https://goerli-faucet.slock.it/)\n\
  - Starknet 水龙头： [`https://faucet.goerli.starknet.io/`](https://faucet.goerli.starknet.io/)\n\
  - Goerlifaucet： [`https://goerlifaucet.com/`](https://goerlifaucet.com/)\n\n> **注意：**\
  \ 大多数测试网络将在几个月后停用（截至 2022 年 7 月）。目前，Goerli 已确认会继续存在，因此该网络上的测试以太币通常需求旺盛。你可能需要多次尝试才能获取一些以太币。\n\
  \n成功提交水龙头请求后，你的账户中将获得一些以太币。\n\n![](img/535492_1_En_5_Fig17_HTML.jpg)\n\n一张 Goerli\
  \ 测试网络中账户 1 的截图，显示有 0.05 Goerli ETH。\n\n**图 5-17** – 从 Goerli 测试网络水龙头获取以太币\n\n有了这些以太币，你就完成了将智能合约变为现实的所有艰苦工作。现在是时候与世界分享你的第一个智能合约了！让我们从\
  \ Remix 中将我们的 `HelloWorld` 智能合约部署到 Goerli 测试网络。\n\n在 Remix 中，部署并运行交易模块，选择 Injected\
  \ Web3 环境。`Metamask` 会弹出一个窗口，要求连接到 Goerli 测试网络中的 `Metamask` 账户 1。\n\n![](img/535492_1_En_5_Fig18_HTML.png)\n\
  \n一张标有“部署并运行交易”的截图，右侧有一个标有“连接 Metamask”的界面，并且选中了一个账户。下方显示“取消”和“下一步”选项。\n\n**图 5-18**\
  \ – 将 Remix 连接到 Goerli 测试网络\n\n点击“下一步”并连接。它会将 Remix IDE 与 Goerli 测试网络中的 `Metamask`\
  \ 连接起来。如下截图所示，你应该会看到一个绿色的按钮显示已连接状态。\n\n![](img/535492_1_En_5_Fig19_HTML.png)\n\n\
  一张账户连接到测试网络的截图，显示有 0.05 Goerli ETH。\n\n**图 5-19** – 已连接 `Metamask` Goerli 测试网络\n\
  \n现在我们可以将我们的 `HelloWorld.sol` 部署到 Goerli 测试网络。在橙色部署按钮右侧，输入“Hello Solidity”作为初始消息。然后点击部署。`Metamask`\
  \ 将动态计算预估的 Gas 费用。在提交到测试网之前，你可以确认或拒绝此请求。让我们确认这笔部署交易。\n\n![](img/535492_1_En_5_Fig20_HTML.png)\n\
  \n一张标有“部署并运行交易”的截图，右侧显示了 MetaMask 的通知页面。\n\n**图 5-20** – 将合约部署到 Goerli 测试网络\n\n\
  在 Remix 控制台中，你会看到一条区块交易确认消息，其中包含交易哈希和其他交易信息。交易哈希如下：`0x7f773384290cff58ff6bb6e4f0411bfb625d3c1aa957208c6e8b8abeeed9d710`\n\
