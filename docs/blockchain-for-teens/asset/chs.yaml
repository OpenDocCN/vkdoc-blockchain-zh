  **第 2 步** – 在“可供应资产”面板中点击 `USDT` 供应按钮。将弹出一个窗口，要求您输入要供应的金额。在我们的示例中，我们使用 10 USDT。交易概览部分将为您提供供应年化收益率信息，对于本次供应示例，该收益率为\
  \ 1.24%。点击“批准以继续”按钮。确认 Metamask 交易确认信息。\n\n![](img/535492_1_En_8_Figag_HTML.png)\n\
