  \ 是一款基于 NFT 的在线视频游戏，玩家可以购买可收藏电子宠物的 NFT，并在对战中让它们相互匹配。`Axie Infinity` 元宇宙使该游戏具备了“边玩边赚”的设计（也称“付费游玩以赚取”模式），玩家在支付初始费用后，可以通过玩游戏赚取基于以太坊的游戏内代币（`SLP`）。玩家每十四天可以兑现一次代币。\n\
  \n**微软推出 Mesh（2021 年 4 月）**\n\n`Microsoft Mesh` 是一个完全虚拟的世界。作为一个 `Metaverse` 平台，用户可以通过任何支持\
  \ `Mesh` 的应用程序，在 `HoloLens 2`、虚拟现实头显、手机、平板电脑或 PC 上连接到 `Mesh`。\n\n**Facebook 更名为\
  \ Meta（2021 年 10 月）**\n\n2021 年 10 月 28 日，Facebook 宣布将公司名称更改为 `Meta`。该公司基于科幻术语 `Metaverse`\
  \ 踏入了新业务领域，并试图拥抱这个由虚拟现实构建的全新世界 `Metaverse`。\n\n图 7-1 总结了 `Metaverse` 的简要历史。\n\n\
  ![](img/535492_1_En_7_Fig1_HTML.png)\n\n一幅示意图描绘了从 1982 年到 2021 年的元宇宙历史。部分标签包括“元宇宙术语诞生”、“Roblox——一个在线多人在线游戏平台”、“Facebook\
  \ 更名为 Meta”和“微软推出 Mesh”。\n\n**图 7-1** 元宇宙简史\n\n### 元宇宙的特征\n\n在 `Metaverse` 中，只要你能够想象，你就可以成为你想成为的人，创造你偏爱的东西，在你想要的地方，以你想要的方式。这种对开发者的完全自由将带来一些有趣的特殊体验，同时对于开放的\
  \ `Metaverse` 运行也是必要的。开发者在构建 `Metaverse` 时应考虑几个特征，如图 7-2 所示。\n\n![](img/535492_1_En_7_Fig2_HTML.png)\n\
  \n一个圆形图描绘了元宇宙的特征。标签部分为：去中心化、沉浸式、虚拟经济、社交体验、持久性、无边界的互操作性。\n\n**图 7-2** 元宇宙的特征\n\n\
  - 互操作性\n- 去中心化\n- 沉浸式\n- 无边界\n- 虚拟经济\n- 持久性\n- 社交体验\n\n让我们回顾一下这些特征，以理解如何开发一个提供独特体验的开放\
  \ `Metaverse`。\n\n#### 互操作性\n\n`Metaverse` 的互操作性是指个人在不同虚拟世界中与其他各种用户进行交流的能力。用户还可以将自己的数据和数字资产从一个虚拟世界转移到另一个虚拟世界，并按照公开市场确定的市场价值将其交易给其他个人。`Metaverse`\
  \ 中的互操作性功能类似于区块链中的互操作性。用户只需一个钱包即可跨不同的 `Metaverse` 虚拟世界执行所有交易。\n\n### 去中心化\n\n虽然互操作性允许用户在虚拟世界之间交换资产，但去中心化是允许共享、开放的虚拟世界\
  \ `Metaverse` 的关键属性。用户可以生产自己具有经济价值的数字资产和体验。他们可以顺利地购买和出售它们，而无需依赖任何中央权威机构。通过去中心化，个人在\
  \ `Metaverse` 中获得了对其资产的完全控制权。这也意味着 `Metaverse` 并非由单一公司或平台拥有。它具有跨平台互操作性，并且其内部经济应该既稳健又具有竞争力。\n\
  \n\n\n#### 沉浸式\n\n增强现实、虚拟现实、混合现实与扩展现实等趋势被统称为沉浸式体验。沉浸式体验能带你进入一个由数字创建的、通常是三维的世界，在这里你可以与其他访客、虚拟物品以及你周围的环境进行互动。\n\
  \n元宇宙是沉浸式体验的一种形式。它在一个全面、共享、互动且始终在线的虚拟世界中，融合了物理世界与虚拟世界的体验，包含了虚拟经济中的游戏、购物、社交和工作等活动。大多数用户将主要在元宇宙的这个层面上进行互动。\n\
  \n#### 无边界\n\n元宇宙作为一个无限且始终在线的虚拟空间，消除了各种障碍。它对于可同时使用的人数、可运用的商业形态、可发生的活动类型等均没有限制。\n\
  \n#### 虚拟经济\n\n元宇宙中的个体可以参与由加密货币驱动的去中心化数字经济活动。这包括数字资产市场，个人可以在其中投资、订购、竞拍和交易各种商品和服务，例如虚拟形象、虚拟服装、房屋、NFT\
  \ 和活动门票。\n\n#### 持久性\n\n元宇宙是一个可以从全球任何地方随时访问的无限开放世界。与现实世界一样，即使你离开，一个持久的元宇宙也必须继续存在。你可以随时访问位于现实世界某个特定地点的虚拟商店，并能与真实的店铺销售人员交谈。你无需担心这些虚拟商店的机会消失——下次你再来时它依然存在，除非创建者将其删除。就像在现实世界中，实体店总是存在，只有经过所有者同意才能被移除。\n\
  \n#### 社交体验\n\n元宇宙的核心在于社交体验。作为一个社交平台，元宇宙是一个 3D 虚拟场所，用户可以在其中同时参与特定的活动/地点/事件，并相互会面。每个人都可以通过自己喜欢的数字角色来代表自己。这些个性化虚拟形象也为游戏化开启了全新可能，并强化了为用户提供协作和沉浸式体验的基础。\n\
  \n## AR、VR、MR 与 XR\n\n元宇宙的关键特征之一是沉浸式。沉浸式技术通过模拟现实来模仿真实世界，并营造环绕式的感官感受，从而创造出沉浸感，带来独特体验。多年来，沉浸式技术已被广泛应用于众多行业，包括电子游戏、考古学、艺术、医疗保健、电子商务、工业设计、教育和娱乐等领域。\n\
  \n通过沉浸式媒介，有多种方式可以从第一人称视角向用户呈现虚拟内容，包括增强现实（AR）、虚拟现实（VR）、混合现实（MR）和扩展现实（XR）。\n\n###\
  \ 增强现实（AR）\n\n2016 年夏天，Niantic 公司发布的 `Pokémon GO` 风靡全球。各个年龄段的玩家都试图通过手机摄像头在杂货店里捕捉皮卡丘，在家里捕捉伊布。这就是\
  \ AR，它允许虚拟元素在物理环境中显示。自那时起，AR 变得越来越流行。\n\n#### 什么是增强现实？\n\nAR 被定义为一种技术和方法，它通过在其上叠加声音、视频和其他细节，允许用户在真实的周围环境中，体验由生成的沉浸式和三维（3D）虚拟数字内容所带来的、被个人感知所增强的效果。\n\
  \n#### AR 的类型\n\nAR 有四种类型：无标记 AR、基于标记的 AR、基于投影的 AR 和基于叠加的 AR，如图 7-3 所示。\n\n![](img/535492_1_En_7_Fig3_HTML.png)\n\
  \n流程图描绘了增强现实的类型。标记出的 AR 类型是基于标记的，而无标记 AR 进一步细分为基于投影的、基于位置的和基于叠加的。\n\n图 7-3\n\nAR\
  \ 的类型\n\n##### 基于标记的 AR\n\n这种 AR，也称为基于识别的 AR 或图像识别，依赖于识别标记/用户定义的图像来工作。基于标记的 AR 通常需要用户安装一个软件应用程序。然后用户可以使用它来扫描具有独特图案（摄像头易于识别和处理）的标记。接着，应用程序会激活一个增强体验（无论是图像、文本、视频还是动画），使其显示在设备上。\n\
  \n**示例：** 增强现实二维码就是基于标记的 AR 的一个例子。\n\n##### 无标记 AR\n\n无标记 AR 指的是无需标记的 AR，它不需要任何特定的图像来显示其虚拟内容。无标记\
  \ AR 软件——即时定位与地图构建技术（SLAM）——依赖于设备的硬件，包括摄像头、GPS 以及其他传感器（如加速度计和指南针），来收集数据并创建合适的虚拟\
  \ 3D 对象。\n\n与基于标记的 AR 不同，即使扫描设备被移开，增强对象也会停留在同一位置。无标记增强现实在游戏（如 `Pokémon Go`）中非常流行，也用于现场活动和虚拟产品植入。\n\
  \n无标记 AR 有三种子类型：基于位置的 AR、基于投影的 AR 和基于叠加的 AR。\n\n##### 基于投影的 AR\n\n基于投影的 AR 投影技术会在一个表面上生成图形。因此，它不需要任何智能手机或屏幕。相反，一个或多个投影设备将光线投射到表面上，形成一个\
  \ 3D 模型。可以通过用手触摸投影的 3D 物体表面来与数字图像进行交互并创建输入。在基于投影的 AR 接收到信号后，它会通过更新投影的增强对象来作出响应。\n\
  \n**示例：** 耐克在其伦敦工作室举办了一场基于投影的 AR 活动，让感兴趣的消费者可以设计自己专属的耐克鞋款，并将其投影在一个完整的 3D 空间画廊中。\n\
  \n##### 基于位置的 AR\n\n基于位置的 AR，也称为基于地理位置的增强现实，其 AR 应用会读取设备的 GPS 位置来分析用户的位置。当该地点与预设位置匹配时，就会触发生成一个虚拟对象显示在该地点。\n\
  \n**示例：** 纽约现代艺术博物馆提供了一个基于位置 AR 的独特体验。\n\n##### 基于叠加的 AR\n\n这种 AR 会用人眼可看到、经过升级增强的\
  \ 3D 对象来替换原始对象的局部或全部视图。物体识别在其中扮演着至关重要的角色，这意味着如果一个应用无法识别某个物体，它就无法增强该物品的外观。\n\n**示例：**\
  \ `Dulux Visualizer` 应用是基于叠加的 AR 的一个例子。它允许用户从油漆颜色可视化工具中选择任何颜色，然后上传照片并虚拟地“重新粉刷”他们的房间或房屋，从而在实际粉刷墙壁之前看到效果。\n\
  \n\n\n### 增强现实的工作原理\n\n我们刚刚讨论过，同步定位与地图构建技术（`SLAM`）在无标记 AR 中扮演着关键角色。`SLAM`通过设备的硬件（如摄像机、GPS\
  \ 和其他传感器）从室内或室外环境收集数据来追踪设备的位置，然后创建合适的虚拟 3D 对象。\n\n`SLAM`技术广泛应用于各个行业，主要包括自动驾驶汽车、机器人和增强虚拟现实。\n\
  \n一个`SLAM`系统的架构包含两种用于完成`SLAM`的组件。第一种组件是传感器信号处理，包括前端处理，它主要依赖于所使用的传感器。\n\n第二种组件是位姿图优化，包括与传感器无关的后端处理。\n\
  \n有两种类型的`SLAM`可用于前端处理以收集数据：视觉`SLAM`和 LiDAR `SLAM`。视觉`SLAM`（`vSLAM`）使用摄像头捕捉或收集周围图像，并通过连续的摄像头帧追踪一组点，而\
  \ LiDAR `SLAM`则利用激光传感器读取数据。\n\n前端处理将传感器数据抽象成适合估计的模型，而后端则对前端产生的数据进行推理。因此，`SLAM`可以估计它们的\
  \ 3D 位置以创建地图。`SLAM`过程如图 7-4 所示。\n\n![](img/535492_1_En_7_Fig4_HTML.png)\n\n该示意图描绘了包含前端和后端的视觉`SLAM`系统。标注的部分依次为：摄像头、激光传感器、传感器数据、`SLAM`估计、抽象与处理传感器数据，以及地图估计。\n\
  \n**图 7-4** — 视觉`SLAM`系统中的前端和后端\n\n### 虚拟现实 (VR)\n\n“虚拟现实”一词最早出现在 1982 年澳大利亚著名科幻小说作家达米恩·布罗德里克的小说\
  \ *《犹大曼陀罗》* 中。\n\n“虚拟现实”作为 VR 技术在主流媒体中被广泛采用，这归功于 VR 开发者杰伦·拉尼尔——他设计了第一款商业级虚拟现实硬件——以及\
  \ 1992 年的电影 *《割草者》*，该片向更广泛的受众介绍了虚拟现实系统的使用。\n\n#### 什么是虚拟现实？\n\n虚拟现实是一种由计算机生成的环境，能让用户在其周围获得丰富、沉浸的体验。通过佩戴虚拟现实头显或相关应用，VR\
  \ 通过增加景深来生成计算机 3D 图像和视频。该系统还会重建静态 2D 图像之间的比例和距离，以模仿真实的视觉体验。VR 让用户能够沉浸于独特的模拟环境中，与之互动并探索，同时相信自己是真实世界中进行这些操作。\n\
  \n#### VR 的类型\n\nVR 系统主要分为三类：非沉浸式 VR、半沉浸式 VR 和完全沉浸式 VR，如图 7-5 所示。\n\n![](img/535492_1_En_7_Fig5_HTML.png)\n\
  \n该流程图描绘了虚拟现实的类型。标注的类型包括：非沉浸式 VR、半沉浸式 VR 和完全沉浸式 VR。\n\n**图 7-5** — VR 的类型\n\n#####\
  \ 非沉浸式 VR\n\n非沉浸式虚拟现实是一种通过计算机或游戏机在屏幕上显示虚拟内容的虚拟现实。它是所有 VR 类型中沉浸感最低且成本最低的。用户通过键盘、鼠标和控制器等计算机输入设备与非沉浸式\
  \ VR 进行交互。\n\n**示例：** 视频游戏是非沉浸式 VR 体验的一个很好的例子。\n\n##### 半沉浸式 VR\n\n半沉浸式虚拟体验为用户提供介于非沉浸式和完全沉浸式\
  \ VR 之间的部分虚拟环境。通过使用计算机屏幕或 VR 设备（如眼镜追踪传感器和投影系统），用户可以在虚拟环境中移动，但仍能看到自己。该系统不被视为完全沉浸式模拟器。\n\
  \n**示例：** 用于飞行员培训的飞行模拟器和虚拟导览是半沉浸式 VR 的良好例子。\n\n##### 完全沉浸式 VR\n\n沉浸式 VR 模拟是一种为用户提供最高级别完全沉浸式虚拟体验的技术，并且与现实世界完全隔绝。它允许参与者与由\
  \ VR 设备（如 VR 眼镜、手套和身体探测器）生成的立体 3D 对象进行交互，并建立逼真的虚拟体验。\n\n**示例：** 虚拟山地自行车是完全沉浸式 VR\
  \ 的一个例子。玩家佩戴 VR 头显骑乘室内自行车。他们可以在从未去过的地方骑行，获得激动人心的体验，并在虚拟环境中与其他玩家互动。\n\n#### 虚拟现实如何工作\n\
  \n真正沉浸式的虚拟现实可以欺骗人的大脑，使其相信它的存在，并将他们带到虚拟世界中的其他地方。然而，生成这些体验的背后涉及许多复杂的技术。\n\n##### 视场角\
  \ (FOV)\n\n人单眼的近似视场角（`FOV`）水平方向约为 135 度，垂直方向略高于 180 度。人类通常可以看到头部周围 200–220 度的弧线。人类左右眼对同一场景的重叠部分约为\
  \ 114 度，我们正是通过这个角度看到 3D 效果。这个`FOV`对于人脑计算深度感知是必要的。在虚拟现实中，`FOV`指的是参与者一次能同时看到周围虚拟世界的多少。VR\
  \ 头显的摄像头模拟人眼位置以及人们可以预期的特定`FOV`角度。头显还配备了陀螺仪传感器来追踪你的移动方式，调整你的视野，并让你能够探索 360 度场景。所有这些都将极大地提升完全沉浸式的体验。如今大多数\
  \ VR 头显通常支持 114 度的 3D 视觉空间来呈现虚拟内容。\n\n![](img/535492_1_En_7_Fig6_HTML.png)\n\n该图展示了人类在左、上、右、下不同视角下的虚拟现实视场。\n\
  \n**图 7-6** — 视场角 (FOV)\n\n##### 帧率 (FPS)\n\n帧率/FPS（每秒帧数）定义了图形处理单元（`GPU`）每秒处理图像的速度。帧率与分辨率相关，后者显示了图像随时间变化的细节量。例如，帧率为\
  \ 50 `FPS`时，你在一秒钟内会看到 50 个样本。在下一秒中，它会显示另外 50 个样本。假设一个物体随你的视野移动，你每秒只能看到这 50 个样本更新后的位置。在这些快照之间，其他样本对你来说是看不见的。如果将帧率提高到\
  \ 500 `FPS`，你每秒钟获得的样本量将增加十倍。结果将是更好的图像质量、更流畅的运动以及更沉浸的体验。较低的帧率通常会产生较差的影响。研究表明，任何低于\
  \ 60 `FPS`的帧率都会使用户感到迷失方向、恶心以及其他负面效应。VR 开发者通常以至少 60 `FPS`–90 `FPS`为目标。\n\n##### 位置与头部追踪\n\
  \n在沉浸式虚拟环境中，实时追踪用户头显的位置以确定位置和方向至关重要。用户可以在虚拟环境中移动，环境也会随其移动而调整。`SLAM` 在 VR 中广泛用于头部和眼部追踪。\n\
  \n##### 空间音频与音效\n\n空间音频提供多维且沉浸式的音频，跟随用户设备的移动而变化。设备密集处理用户的运动数据，生成声音的不同频率，并根据声音可能传来的每个方向进行不同的偏移。其结果创造出一种三维音效，为用户提供模拟真实生活中听声音方式的体验。\n\
  \n\n\n### 混合现实（MR）\n\n混合现实（MR）是一项新兴技术，它结合了虚拟现实（VR）与增强现实（AR）。MR 融合了物理世界与虚拟世界，创造出新的环境，使物理对象与数字对象能够实时交互。\n\
  \n**示例：** MR 工作站将不再局限于单个或两个物理显示器。这些工作站将根据需要在 3D 虚拟空间中包含多个屏幕。用户可以定义并创建无限数量的定制化工作站，并根据需要删除这些虚拟屏幕。此类工作环境将提升效率，并打造更愉快、舒适且健康的工作场所。\n\
  \n### 扩展现实（XR）\n\n扩展现实（XR）是一个总称，涵盖了真实与虚拟沉浸式技术的全谱系，包括 VR、AR 和 MR。为了总结我们目前关于 AR、VR\
  \ 和 MR 的讨论，表 7-1 展示了这些沉浸式技术之间的差异。\n\n**表 7-1** VR、AR 与 MR 的对比\n\n| 增强现实（AR） | 虚拟现实（VR）\
  \ | 混合现实（MR） |\n| --- | --- | --- |\n| 虚拟数字内容叠加在真实世界环境之上。 | 完全独立于真实世界的计算机生成沉浸式虚拟世界。\
  \ | 物理世界与虚拟世界相互融合。 |\n| 部分沉浸于虚拟环境。 | 完全沉浸于虚拟环境。 | 可与物理世界和虚拟世界进行交互与操控。 |\n| 技术已成熟且不断改进。\
  \ | 逼真的技术技能练习，可收集关键训练指标。 | 与远距离协作者进行实时信息与知识共享。 |\n| 可使用专用 AR 头显在小屏幕上显示虚拟内容。 | 可使用专用\
  \ VR 头显和手柄控制器增强体验。 | 可使用专用 AR 和 VR 设备创造混合体验。 |\n| 需要 3-7 年时间在不同领域采用 AR。 | 需要 2-4\
  \ 年时间在不同领域采用 VR。 | MR 的采用时间与 VR 相近。 |\n\n## 理解元宇宙的层级\n\n想象一下，元宇宙是一个并行的 3D 虚拟世界，提供各种产品或服务，甚至将与大部分物理世界集成并互动。作为一个模拟的数字环境，元宇宙融合了\
  \ AR、VR、物联网（IoT）、5G、大数据、边缘计算、人工智能（AI）和区块链等所有数字技术，为类似真实世界的社会社区构建虚拟场所。此外，它拥有一个由数字货币和不可替代代币（NFT）驱动的自给自足的虚拟经济。企业家兼游戏设计师乔恩·拉多夫将元宇宙世界划分为七个层级：体验、发现、创作者经济、空间计算、去中心化、人机界面，以及基础设施。这些层级涵盖了元宇宙领域中不同产品或服务的过去、现在和未来的发展形态。图\
  \ 7-7 展示了元宇宙中的这些层级。\n\n![](img/535492_1_En_7_Fig7_HTML.png)\n\n**图 7-7** 元宇宙层级\n\
  \n### 体验\n\n体验层是目前大多数元宇宙业务、公司和开发人员关注的焦点。该层的一个主要特征将是社区驱动的事件、社交互动、虚拟服务和数字资产，例如游戏、NFT、社交、电子竞技、会议、剧院、购物和活动。用户可以通过数字内容在虚拟环境中进行交互。在这一层，元宇宙最终将通过去物质化物理空间，创造出一个全新的虚拟世界维度。因此，元宇宙将为每个人提供前所未有的丰富体验。\n\
  \n游戏可能是展示元宇宙体验层许多功能最众所周知的平台：虚拟沉浸体验、化身身份、数字 NFT 市场、3D 产品展示和实时社交互动。该层还包括许多其他物理世界与数字世界融合交织的日常体验：Zoom\
  \ 办公 VR 会议、`HOLOFIT VR Fitness`、`Netflix VR`电影、`TvoriVR` UX 与 UI 原型设计。\n\n以下是该层中几个流行的元宇宙平台。\n\
  \n**示例：** Decentraland、Fortnite、Roblox、Sandbox、Spatial、Rove、动视暴雪、任天堂和 Xbox。\n\n\
  ### 发现\n\n发现层涉及信息的持续拉取和推送，将人们引向对不同新体验的学习。“拉”代表一个入站系统，用户在其中主动寻求关于新体验的信息。另一方面，“推”指的是一个出站系统，元宇宙体验在此等待用户并通知他们。\n\
  \n以下是入站和出站发现可能发生的一些例子。\n\n**入站：**\n\n- 搜索引擎\n- 实时在场\n- 社区驱动内容\n- 应用商店\n- 白皮书\n-\
  \ 案例研究\n- 赢得媒体\n\n**出站：**\n\n- 展示广告\n- 通知\n- 电子邮件和社交媒体\n\n社区驱动的内容有助于传播其概念、支持技术和体验的相关知识。NFT\
  \ 是自 2021 年以来最热门的话题之一。许多公司，如耐克、星巴克、可口可乐、麦当劳和路易威登，都将 NFT 数字资产作为营销工具来推广其产品或服务。这是提高社区参与度并在元宇宙中获得更多发现的好方法。\n\
  \n实时在场也将在改善交互式用户体验方面发挥关键作用。例如，PlayStation 和 Xbox 等视频游戏服务允许玩家实时查看朋友的活动。出站发现中最常见的方法是展示广告、通知、电子邮件和社交媒体。\n\
  \n**示例：** Unity、Google 商店、Apple 商店、Steam、PlayStation 和 Xbox。\n\n### 创作者经济\n\n在元宇宙的早期阶段，制作数字资源、生成沉浸式体验以及添加去中心化支付需要大量的专业技能和努力。这个阶段类似于早期版本的互联网。创作者需要大量的编程知识来设计和构建应用。如今，像`WordPress`这样的工具允许内容创作者无需代码，只需几次点击和拖放功能即可轻松构建带支付选项的网站，从而实现创作过程。随着元宇宙市场的增长，越来越多的商业软件工具将会出现。因此，元宇宙中设计师和创作者的数量呈指数级增长。例如，建立在去中心化区块链上的\
  \ NFT 等代币，为数字资产提供可证明的所有权，同时拥有独立的中心化平台。这种新模式将赋予创作者比传统创作者平台更大的影响力。创作者可以构建自己的元宇宙经济，向粉丝出售更多虚拟\
  \ NFT 物品，并有更多机会获得收入。\n\n**示例：** Roblox、Unity、Adobe、Polystream、Shopify、Decentraland\
  \ 和微软。\n\n\n\n### 空间计算\n\n空间计算指的是融合现实与虚拟世界，并减少两者间的界限。它广义上与扩展现实（`XR`）同义：\n\n- 这一层的各类技术解决方案能帮助我们操控并进入\
  \ 3D 元宇宙空间。以下列举了其中几个方面。\n- 用于显示几何图形和动画的 3D 引擎（`Unity` 和 `Unreal Engine`）。\n- 用于映射和解读现实与虚拟世界的地理空间映射与物体识别技术。\n\
  - `VR`、`AR`、`MR`、`XR`。\n- 语音与手势识别。\n- 用于整合设备数据的物联网。\n- 用于身份识别的人体生物特征识别技术。\n\n用户界面将与空间计算截然不同，并可以构建于实体空间之上。机器不再需要固定在某个位置，硬件也将变得不可见。国泰航空曾与`ER`广告平台`OmniVirt`合作，为客户提供虚拟观光体验。该产品使营销人员能够为目标旅客（尤其是那些尚未体验过该航空公司的旅客）提供“先试后买”的体验。它允许消费者虚拟游览旅客旅程的每一个环节，从选择座位、值机柜台到机舱内部——其工作原理类似于谷歌街景。通过启用机场贵宾室和飞行体验的\
  \ 360°视频单元，消费者可以点击视图中的特定热点区域获取更多信息。他们也可以在沉浸式虚拟环境中点击预订座位。最终，该举措使顾客的品牌好感度提升了 25%。\n\
  \n**示例：** `Alphabet`、`Microsoft`、`Meta`、`Deere`、`Matterport`、`Unity`、`Unreal`、`Epic\
  \ Games` 以及 `Nvidia`。\n\n### 去中心化\n\n元宇宙的关键特征之一是其去中心化。元宇宙中不存在单一的中央权威机构。实时生成的 3D\
  \ 虚拟世界构成了各种各样的元宇宙。每个元宇宙都由其自身的去中心化自治组织（`DAO`）管理，这是一个由社区主导、没有中央权威机构进行治理的组织。元宇宙能够自主运行，围绕区块链构建一个全新的生态系统。在一个真正去中心化的元宇宙环境中，创作者对其在任何虚拟世界中的创作成果和数字产品拥有所有权和完全控制权。由`NFT`驱动的加密资产无疑将在确保元宇宙内资产所有权不被篡改方面发挥关键作用。用户可以轻松地使用加密货币交易产品，并转移`NFT`的所有权。去中心化金融（`DeFi`）是一种通过去中心化区块链网络向元宇宙提供金融产品的方式。借助`DeFi`，用户可以完成传统中心化金融机构提供的大部分服务——借款、贷款、兑换、购买保险、交易衍生品、投资等。\n\
  \n最著名的去中心化元宇宙示例之一是`Decentraland`，这是一个在以太坊区块链上运行的去中心化 3D 虚拟世界。用户可以通过加密货币在平台上以`NFT`的形式购买虚拟土地，而游戏协议则由`DAO`管理，代币持有者拥有投票权。其他流行的去中心化元宇宙产品包括`Axie\
  \ Infinity`、`Sandbox`、`Bloktopia`、`Star Atlas`、`Polka City`、`Illuvium` 和 `Sorare`。\n\
  \n**示例：** `Ethereum`、`polygon`、`Cardano`、`Polkadot`、`Dapper`、`Ava Labs`、`OpenSea`、`SuperRare`\
  \ 以及 `Rally`。\n\n### 人机界面\n\n人们以多种不同的方式与世界互动。在元宇宙中，这被称为人机界面。它包含多种交互方式，例如手势、语音指令和神经接口。智能眼镜、手套、手表和其他服装等可穿戴设备也包含在人机界面的广义范畴之下。\n\
  \n目前使用的那些 VR 设备仍处于持续发展阶段。与此同时，许多用于访问元宇宙的新型设备也正在被发明和评估。这些都是旨在让此类改进更易于使用的尖端解决方案。此类工具的一个例子是\
  \ AR 隐形眼镜，它旨在让用户无需佩戴笨重的眼镜、耳机或护目镜就能观看数字世界。显然，该方案尚未经过广泛的公开测试和认可，但它可能预示着短期内这一领域将取得突破。\n\
  \n**示例：** `Xbox`、`Samsung`、`Oculus`、`HoloLens`、`PlayStation`、`Alexa`、`Neural Link`\
  \ 以及 `Magic leap`。\n\n### 基础设施\n\n第七层由使上述其他六层成为现实的技术构成。六类技术集群共同支撑着元宇宙的力量：\n\n**计算能力与网络**\
  \ – 需要具备 5G 和 6G 能力的基础设施，以增加网络带宽并减少网络拥塞和延迟。此外，设备还需要 GPU 服务器、半导体、微机电系统（`MEMS`）以及小巧耐用的电池等组件。\n\
  \n**人工智能（`AI`）** – 过去几年，人工智能已广泛应用于我们的日常生活。在元宇宙中，`AI`可用于改进不同情境下的非玩家角色（`NPC`）。NPC\
  \ 几乎存在于每款游戏的各个角落；它们属于为回应用户活动而创造的游戏设定。凭借 AI 的管理能力，NPC 可以被部署在 3D 空间中，以促进与用户进行逼真的对话或执行其他特定任务。\n\
  \n**空间计算、数字孪生与物联网（`IoT`）** – 空间计算或 3D 重建对于在元宇宙中创建逼真的空间至关重要。它有助于在元宇宙中维护建筑、物品和物理位置。数字孪生是元宇宙的重要组成部分。数字孪生是一个利用现实世界数据创建实时虚拟表示的计算机程序。它可以模拟现实世界的物理系统或过程（物理孪生），并预测产品或流程将如何表现。数字孪生整合了\
  \ AI、物联网和数据分析工具来增强输出。通过部署数字孪生，元宇宙创造者可以将精确的现实生活空间构建到虚拟镜像世界中。物联网是一个系统，它把我们现实世界中的任何事物通过传感器和设备连接到互联网。物联网在元宇宙中的功能之一是收集并提供来自物理世界的数据，从而提高数字对象的精确度。物联网设备可以无缝地将元宇宙连接到许多现实生活中的设备，并支持在元宇宙中生成实时模拟。为了进一步优化元宇宙环境，物联网可以与\
  \ AI 集成，以处理其收集的数据。\n\n**视频游戏技术** – 这将包括像 `Unreal Engine` 和 `Unity` 这样的 3D 游戏引擎。\n\
  \n**显示技术** – `AR`、`VR`、`MR` 和 `XR` 可以为用户提供沉浸式和引人入胜的 3D 体验。\n\n**区块链技术** – 区块链创新为数字所有权证明、`NFT`、`DeFi`、治理、`DAO`、匿名性和互操作性提供了去中心化和透明的特性。此外，加密货币使用户能够在\
  \ 3D 元宇宙中工作和社交时转移价值。\n\n**示例：** `Azure`、`Aws`、`Google cloud`、`Qualcomm`、`Intel`、`Nvidia`、`Verizon`、`AT&T`、`T-Mobile`。\n\
  \n虽然七层结构的解释有助于整体理解当前的元宇宙格局，但仍有许多需要学习的地方。元宇宙仍处于非常早期的阶段。未来将涌现许多新技术，这种分层结构也将持续演变。\n\
  \n\n\n## 元宇宙中的加密 NFT 游戏\n\n电子游戏自 20 世纪 50 年代初就已存在，最初诞生于科学家的研究实验室。如今，电子游戏已遍布全球各地的家庭。得益于年轻人口的持续增长、经济发展、移动设备用户增多以及高速互联网的普及，电子游戏行业在过去几年里蓬勃发展。据估计，2022\
  \ 年电子游戏收入将达到 2086 亿美元，到 2026 年市值将达 3210 亿美元。\n\n2022 年 2 月，微软首席执行官萨提亚·纳德拉接受《金融时报》采访，阐述了他对元宇宙的理解——“什么是元宇宙？元宇宙本质上就是创造游戏。”正如我们在上一节所讨论的，元宇宙的核心是在数字宇宙中创造虚拟体验。然而，游戏行业长期以来一直在运用类似的虚拟世界理念。玩家在多人在线游戏平台上玩\
  \ 3D 游戏时，能够获得接近真实的体验。玩家的游戏数据在游戏平台上是持续保存的，玩家登录后会从上次退出的地方继续游戏。这更接近元宇宙的持久性特征。\n\n###\
  \ 游戏行业的商业模式\n\n电子游戏商业模式是指游戏创作者用来为其应用获取收入的盈利策略。引入区块链、人工智能（AI）和虚拟现实（VR）等新技术，已成为推动游戏行业商业模式演变的主要趋势。\n\
  \n#### 付费游玩模式\n\n1972 年，首款面向消费者的电子视频游戏《乓》（Pong）问世。1978 年，《太空侵略者》（Space Invaders）宣告了街机黄金时代的开始。在\
  \ 20 世纪 70 年代和 80 年代，每款电子游戏都以街机形式构建，需要占用大量物理空间。玩家需要投币来换取游戏时间或生命值。这就是“付费游玩”商业模式。\n\
  \n`付费游玩`（`pay-to-play`），有时也称为`付钱游玩`（`pay-for-play`）或`P2P`，指的是玩家必须付费才能游玩的在线游戏。`P2P`游戏是标准的商业游戏模式，通常比免费游戏拥有更多功能、挑战和模式。例如，大多数在线赌博游戏都采用`P2P`模式，要求在线赌场玩家注册并存入真实货币后才能访问。`P2P`也常用于经典的`MMORPG`（大型多人在线角色扮演游戏），如《魔兽世界》和《无尽的任务》。\n\
  \n`付费游玩`模式要求玩家持续向游戏公司支付月费或年费，才能访问各种游戏内物品。如果未支付费用，玩家的账户将被暂停，无法访问或使用游戏。此外，订阅费用相当昂贵。在许多情况下，当玩家只是偶尔想玩游戏时，`免费游玩`（`free-to-play`）商业模式可能是一种选择。\n\
  \n#### 免费游玩模式\n\n第一款`免费游玩`电子游戏是 Nexon 公司于 1999 年 10 月发布、由李承灿开发的《QuizQuiz》。`免费游玩`游戏商业模式由韩国的\
  \ Nexon 公司创造。\n\n`免费游玩`（`free-to-play`），也称为`免费启动`（`free-to-start`）、`F2P`或`FtP`，指的是让玩家无需付费即可访问游戏并享受大部分内容的在线电子游戏。然而，游戏中通常还存在额外的功能，例如故事的高级部分、独特能力、特殊游戏物品和新角色。这些功能通常会鼓励玩家通过小额付费来获取访问权限。\n\
  \n流行的`免费游玩`游戏包括《Apex 英雄》、《英雄联盟》、《炉石传说》、《星战前夜》和《堡垒之夜》。\n\n`免费游玩`模式在商业上取得了巨大成功，并且在当前的游戏设计中非常流行。许多网络游戏都采用了这种模式。\n\
  \n在当今的电子游戏行业中，传统电子游戏公司在中心化服务器上构建游戏。他们完全控制玩家账户和游戏数据。平台管理员可以移除玩家的游戏物品或暂停玩家的账户。因此，即使玩家玩了好几年游戏并支付了费用，他们实际上并不拥有游戏物品或游戏内货币的价值。\n\
  \n上述问题正随着区块链技术的出现而得到解决。加密游戏利用了 Web 3.0 的创新，将加密货币和`NFT`引入电子游戏，并创造了一种新的商业模式——`边玩边赚`。\n\
  \n#### 边玩边赚模式\n\n`边玩边赚`（`play-to-earn`）是一种去中心化游戏，允许玩家收集或培育游戏代币和`NFT`。然后，玩家可以在市场上出售它们以赚取奖励。通过完成游戏任务、与其他玩家对战以及定期玩游戏，玩家可以赚取更多加密货币，并在加密货币交易所交易和转移其资产，兑换成法定货币作为收入。\n\
  \n`边玩边赚`游戏利用了区块链的创新，将加密货币和`NFT`带入了电子游戏世界。在加密游戏中，主要有三种方式让玩家通过游戏获得收入。\n\n##### 赚取或交易游戏内\
  \ NFT\n\n在游戏中，`NFT`代表独特的虚拟收藏品，属于游戏内资产。它们可以有各种不同的形式，例如武器、角色、皮肤、宠物、食物、工具和虚拟土地，作为游戏的一部分使用。玩家一旦收集到它们，就可以在游戏内与其他资产进行交换，或者在现实世界的\
  \ NFT 市场上出售以换取真实货币。玩家通过参与游戏内经济，为整个游戏系统创造价值。例如，在最热门的区块链游戏之一《Axie Infinity》中，存在着一种名为\
  \ Axie 的生物。Axie 是一种虚构的、凶猛好斗、喜欢建造和寻宝的生物。玩家可以收集、交易和培育 Axie，并利用它与其他玩家和敌人战斗。作为游戏资产的\
  \ Axie 被定义为`ERC-721` NFT 代币。玩家可以在市场（`https://app.axieinfinity.com/marketplace/`）上买卖他们的\
  \ Axie `NFT`。\n\n![](img/535492_1_En_7_Fig8_HTML.png)\n\n一张截图展示了 Axie Infinity 市场。标记的流程包括概览、市场、Axie\
  \ 藏品、土地、物品、捆绑包、符文、魅力、最近上架和最近售出，并附有部分插图。\n\n**图 7-8** Axie Infinity 市场\n\n##### 赚取游戏内加密货币\n\
  \n1.  **原生加密货币**\n\n    大多数加密游戏都拥有原生加密货币，其形式为由智能合约创建的游戏代币。例如，在《Axie Infinity》中，有两种原生加密货币——平滑爱情药水（SLP）和\
  \ Axie Infinity 碎片（AXS）。\n\n    **SLP**\n\n    `SLP`是一种用于培育 Axie 的`ERC-20`代币。当玩家在《Axie\
  \ Infinity》的竞技场模式中完成每日任务或与怪物及其他玩家战斗时，可以赚取游戏内货币`SLP`。\n\n    **AXS**\n\n    `AXS`是\
  \ Axie Infinity 生态系统的`ERC-20`治理代币。`AXS`代币旨在奖励参与 Axie Infinity 元宇宙的玩家。每个赛季结束后，排名靠前的玩家将获得奖励。`SLP`和`AXS`可以兑换成现实生活中的货币。一个`SLP`价值`0.000277\
  \ AXS`，即`$0.0034`，可以在许多加密货币交易所（如 Uniswap）买卖。`SLP`作为`边玩边赚`趋势的一部分而广为人知，它让玩家仅通过玩《Axie\
  \ Infinity》就能获得相对稳定的收益。\n\n2.  **现有加密货币**\n\n    一些加密游戏使用现有的加密货币（如比特币、以太坊等）作为对玩家的奖励。《加密猫》（CryptoKitties）就是一个例子，玩家在《加密猫》市场中使用以太币买卖猫咪。\n\
  \n![](img/535492_1_En_7_Fig9_HTML.png)\n\n四张加密猫图片展示了市场中的 NFT。标记的加密猫分别为钻石、镀金、紫水晶和青金石。\n\
  \n**图 7-9** 《加密猫》市场\n\n要积累足够数量的现有加密货币（如以太币）通常需要一段时间，但这些收益是真实的。\n\n\n\n##### 质押（Staking）\n\
  \n许多“边玩边赚”游戏允许玩家在游戏中锁定 NFT 或加密货币代币以赚取奖励。例如，`Axie Infinity`允许土地所有者质押其土地来赚取`Axie`代币`AXS`作为奖励。玩家可以在单笔交易中质押\
  \ 30 个土地地块，并根据所质押土地的稀有程度每天获得`AXS`奖励。\n\n图 7-10 展示了游戏行业在商业模式上的演变。\n\n![](img/535492_1_En_7_Fig10_HTML.png)\n\
  \n示意图描绘了游戏公司通过付费游玩、免费游玩和边玩边赚模式的演变过程。\n\n**图 7-10** 游戏行业商业模式的演变\n\n### “边玩边赚” NFT\
  \ 游戏示例\n\n#### The Sandbox\n\n`The Sandbox` 是一个社区驱动的元宇宙平台，创作者可以在其中构建、拥有并将其体素资产作为\
  \ NFT 进行货币化。该游戏体验使用以太坊区块链上的 `SAND` 代币。`The Sandbox` 项目最初由 `Pixowl`（后更名为 `TSB Gaming`）于\
  \ 2012 年在移动平台上开发，在 iOS 和 Android 上的下载量达 4000 万次。`The Sandbox` 拥有超过 200 万注册用户，由三个产品组成：`VoxEdit`、`Marketplace`\
  \ 和 `Game Maker`。\n\n##### VoxEdit\n\n`VoxEdit` 是一款基于云的 NFT 创作软件。它允许用户在元宇宙中创建、装配和制作基于\
  \ 3D 体素的 NFT 产品动画，例如人物、动物、家具和工具等物品。这些 NFT 的数字资产使用 `ERC-1155` 代币标准，能够在单次交易中高效传输同质化与非同质化代币。此外，玩家可以在\
  \ `The Sandbox` 的市场上出售这些 NFT，并探索新世界。\n\n##### Game Maker\n\n`Game Maker` 是一个工具箱，允许用户免费设计、测试和构建\
  \ 3D 游戏，且无需编写代码。使用 `Game Maker`，用户只需发挥想象力即可进行创作。\n\n##### Marketplace\n\n`The Sandbox`\
  \ 的 NFT 市场允许用户搜索和购买创作者使用 `VoxEdit` 制作的 NFT 资产。创作者可以首先将数字资产上传到 `IPFS`（星际文件系统）网络（一种去中心化存储），然后将相关资产与智能合约关联，并部署到区块链上以证明所有权。完成此步骤后，用于创作的\
  \ NFT 资产便可在 `The Sandbox` 市场中找到。\n\n为了在玩家之间建立一个封闭的经济系统，所有玩家将依赖于四种用户特定代币：`SAND`、`ASSET`、`LAND`\
  \ 和 `GAME`。用户将使用这些代币与平台互动：他们可能是玩家、创作者、策展人或土地所有者。另外两种代币是 `GEMs` 和 `CATALYSTs`，留作在\
  \ `VoxEdit` 中创建资产时使用。图 7-11 展示了沙盒游戏中的这六种代币。\n\n![](img/535492_1_En_7_Fig11_HTML.png)\n\
  \n六种代币图像描绘了 NFT 的“边玩游戏边赚钱”。标注的六种代币分别是 `ERC 20` 标准的 `SAND`、`ERC 721` 标准的 `LAND`、`ERC\
  \ 1155` 标准的 `ASSET`、`ERC 1155` 标准的 `GAME`、`ERC 20` 标准的 `GEMs` 以及 `ERC 20` 标准的 `CATALYST`。\n\
  \n**图 7-11** 沙盒游戏中的六种代币\n\n##### SAND\n\n`SAND` 是一种基于以太坊区块链构建的 `ERC-20` 实用代币，为 `The\
  \ Sandbox` 的所有交易和交互提供动力。`SAND` 代币是 `The Sandbox` 的原生代币。\n\n-   **访问 Sandbox 平台**\
  \ – 玩家花费 `SAND` 来玩游戏、购买装备或创建自己的虚拟化身角色。\n-   **治理** – `SAND` 是一种治理代币，允许代币持有者使用 DAO\
  \ 结构在平台上对治理决策进行投票。\n-   **质押** – `The Sandbox` 将允许土地所有者在其 `LAND` 上质押 `SAND`，质押收益将连同以\
  \ `SAND` 形式支付的收益一起返还给用户。\n\n##### LAND\n\n在 `The Sandbox` 元宇宙中，`LAND` 代币是 `ERC-721`\
  \ 标准，是一种 NFT 代币。`LAND` 代表一个数字土地地块，每个 `LAND` 在 `The Sandbox` 元宇宙中占地 96 x 96 米。总共有\
  \ 166,464 块不同尺寸的土地。`LAND` 代币持有者对平台上的特定空间拥有所有权，并允许土地所有者出租、购买、出售、质押、托管以及组成区域。拥有 `LAND`\
  \ 代币，用户可以通过 DAO 参与生态系统的治理。\n\n##### ASSET\n\n`ASSET` 代币是 `ERC-1155` 代币，代表游戏内物品，例如用于填充\
  \ `LAND` 的化身装备和创作物。这些资产可以在 `The Sandbox` 的市场中交易。一个资产有三种不同的类别：\n\n-   **实体**  \n\
  \    这些 NFT 指的是包含非玩家角色（NPC）的体验，用来让游戏或世界变得生动，例如农夫、树木、鸡、龙或宝藏猎人。\n\n-   **装备**  \n\
  \    装备是一种可以附加到玩家物品栏并帮助玩家完成游戏体验的 NFT。例如，一把剑、一把史诗级维京斧、一面盾牌、一顶头盔等等。\n\n-   **方块**\
  \  \n    除了现有的基础方块（如水、泥土和沙子）之外，玩家可以创建新的方块。这些方块可以带来独特的体验，例如彩色水和可爱的闪亮熔岩。\n\n#####\
  \ GAME\n\n`GAME` 代币是 `ERC-1155` 代币，它结合了资产和游戏编程以创造交互式体验。`GAME` 代币必须与 `LAND` 代币配对使用。\n\
  \n##### CATALYSTs\n\n`Catalysts` 是 `ERC-20` 代币。`Catalysts` 有四个空槽位，可以用宝石填充，以使玩家更强大。\n\
  \n##### GEMs\n\n`GEMS` 是 `ERC-20` 代币，用于定义玩家资产的属性。根据游戏需求，每颗宝石都有不同的功能，可以应用于资产，并增强整个元宇宙中的\
  \ `The Sandbox` 游戏体验。\n\n#### Decentraland\n\n`Decentraland` 是一个在以太坊网络上运行的“边玩边赚”3D\
  \ 虚拟世界元宇宙游戏。使用原生 `MANA` 加密货币，用户可以创建化身并购买数字资产，例如虚拟土地地块，称为“`LAND`”。用户在购买这些空间后将收到 NFT\
  \ `LAND` 代币。我们将在下一节中详细讨论。\n\n## 元宇宙中的虚拟房地产\n\n在现实生活中，房子是我们居住的地方。当人们购买房屋时，卖方会签署一份地契，这是一份用于证明我们拥有土地所有权的法律文件。元宇宙是互联网的未来，关乎虚拟现实世界中的沉浸式体验。在元宇宙中，我们发行\
  \ NFT 作为数字资产所有权的代表，并在区块链 NFT 中跟踪所有权记录，因为所有权证明在元宇宙内是可验证的。\n\n### 什么是虚拟土地？\n\n虚拟土地是\
  \ NFT 拥有的数字空间或土地地块，类似于物理房地产。虚拟土地平台创建大型土地地图，将其划分为小块，在市场上出售。虚拟土地地块是可编程的智能合约空间，允许人们在虚拟世界中购买、出售、出租、建造和探索。拥有虚拟土地类似于拥有物理房地产，所有者可以保留\
  \ NFT，也可以直接在市场上以约定价格将其出售给买家。买家可以直接使用加密货币支付，或通过抵押贷款购买土地。虚拟土地所有者将资产保留在自己的钱包中，然后出售房产，或在该土地上进行设计和建造。热门的\
  \ NFT 虚拟土地项目包括 `Decentraland`、`The Sandbox` 和 `Axie Infinity`。\n\n### Decentraland（案例研究）\n\
  \n`Decentraland` 是一个由以太坊区块链驱动的去中心化虚拟现实元宇宙平台。该平台使用户能够创建、购买和出售虚拟内容及数字房地产。土地地块是基于数字资产的\
  \ NFT。一旦你拥有了你的 `LAND`，你就可以随心所欲地处理它。每块土地的尺寸仅为 33 英尺 x 33 英尺，高度不限。这种地块设计允许用户通过合并相邻地块来更有效地组织他们的\
  \ `LAND`。\n\n\n\n#### Decentraland 中的三种原生代币\n\n在 Decentraland 中，有三种原生代币，包括两种 ERC-721\
  \ NFT 代币和一种 ERC-20 代币。\n\n用户进行交互和创作的数字土地地块被称为 `LAND`，这是一种 NFT 代币。每个地块为 1x1 的土地单元。Decentraland\
  \ 中共有 90,601 块土地。第二种 NFT 代币是 `ESTATE`，它允许用户通过市场将两块或更多相邻的 `LAND` 合并。庄园对于管理更大的 `LAND`\
  \ 资产非常有用。\n\n另一方面，`MANA` 是一种 ERC-20 代币，是 Decentraland 的官方原生加密货币。一块 `LAND` 可以用 1,000\
  \ `MANA` 购买。在 Decentraland 中，用户可以使用 `MANA` 进行以下操作：\n\n- 在虚拟世界中购买地块、数字商品和服务\n- 通过销毁\
  \ `MANA` 来认领 `LAND` 地块\n- 代币持有者有权通过 DAO 对平台政策进行投票\n\n### Decentraland 架构\n\nDecentraland\
  \ 协议由三个层次组成：\n\n#### 共识层\n\n每块 `LAND` 都是一个 NFT 代币，由 `LANDregistry` 智能合约定义。`EstateRegistry`\
  \ 合约定义了 `ESTATE` 代币。智能合约驱动共识层，并追踪土地地块及其内容的所有权。用户可以使用 `MANA` 代币购买新的 `LAND` 地块。并且\
  \ `LANDregistry` 合约在创建新的 `LAND` 时会销毁 `MANA`。\n\n#### 土地内容层\n\n土地内容存储文件内容哈希的引用。根据此引用，应用程序可以从\
  \ BitTorrent 或 IPFS 下载数字土地地块的数字内容。下载的文件包含渲染场景所需的图像、纹理、声音及其他元素的描述。\n\n![](img/535492_1_En_7_Fig12_HTML.png)\n\
  \n该示意图描绘了 Decentraland 协议的各个层次，按三个层次处理：实时层、土地内容层和共识层。它包括 Decentraland 客户端、附近客户端、P2P\
  \ 服务器、内容、土地、庄园智能合约以及 IPFS。\n\n图 7-12  \nDecentraland 协议层次\n\n#### 实时层\n\n实时层支持点对点连接，即用户之间相互通信的能力。这些连接对于构建社区社交互动是必要的。Decentraland\
  \ 还提供虚拟形象消息语音聊天。\n\n图 7-12 总结了 Decentraland 协议层次。\n\n### 在元宇宙中购买土地\n\n任何人都可以在官方\
  \ Decentraland 市场或像 OpenSea 这样的 NFT 市场上购买、出售或租赁土地。Decentraland 还提供抵押获取土地的选项。然而，在开始购买土地之前，请确保您完成以下步骤：\n\
  \n#### 第一步 – 选择元宇宙平台并登录\n\n在我们的案例中，我们将选择 Decentraland 平台（`https://market.decentraland.org/`）。\n\
  \n直接使用 Metamask 连接，或在 Decentraland 平台注册账户。推荐使用 Metamask 进行土地买卖：\n\n![](img/535492_1_En_7_Figa_HTML.png)\n\
  \n一张元宇宙平台和登录的截图。左侧标注的步骤为 Metamask、Formatic、Wallet Connect 和 Coinbase Wallet；右侧为账户\
  \ 1 的签名请求。\n\n登录后，选择“土地”选项卡，即可进入待售土地地块页面（见下图）：\n\n![](img/535492_1_En_7_Figb_HTML.png)\n\
  \n一张带有标题的插图，标题分别为概览、收藏品、土地和我的资产。“土地”一词下方用线条突出显示，以示意迷宫结构。\n\n#### 第二步 – 购买加密货币\n\n\
  大多数元宇宙平台和 NFT 市场要求您事先拥有原生加密代币。您可以在 Coinbase 和 Binance 等加密货币交易所购买这些货币，并将这些代币发送到您的钱包地址，例如\
  \ Metamask 或 Coinbase 钱包。\n\n#### 第三步 – 选择一块 LAND\n\n市场允许您以多种选项查看单个地块。选择“在售”选项。您可以查看附近的位置。在元宇宙购买土地之前需要考虑的主要事项有：\n\
  \n- 土地价格。\n- 虚拟土地面积的大小。\n- 区域：靠近热门景点（中心、商店、画廊、活动空间等）。\n- 土地卖家是谁。\n- 交易历史。\n- 用途潜力（画廊、活动空间、商店等）。\n\
  \n点击虚拟房产以了解更多详情，直到找到您想要购买的土地。土地价格以 `MANA` 标价，并列有所有者的详细信息：\n\n![](img/535492_1_En_7_Figc_HTML.png)\n\
  \n一张插图将地块分为三个过程：最便宜的闪购价为 4599，时尚街为 4640，admiralbulldo 为 3650。\n\n#### 第四步 – 购买房产\n\
  \n一旦您找到并选中了想要购买的房产，“购买”和“出价”按钮允许您下订单并完成购买交易。您可以使用以太币或 `MANA` 进行购买。\n\n点击“购买”按钮后，系统会要求您确认购买。交易完成需要几秒到几分钟的时间。现在您就拥有了这块虚拟元宇宙土地。\n\
  \n![](img/535492_1_En_7_Figd_HTML.png)\n\n一张插图描绘了房产的购买过程。标注的过程为 admiral bulldog\
  \ 的土地。\n\n您也可以在 OpenSea 上购买土地。点击“探索”➤“虚拟土地”。您将看到显示的 Decentraland 收藏品。\n\n![](img/535492_1_En_7_Fige_HTML.png)\n\
  \n一张插图描绘了在 OpenSea 上通过点击“探索”、“虚拟土地”，并看到显示的 6 块虚拟土地的 Decentraland 收藏品。\n\n点击 Decentraland。它将显示可供出售的土地。选择其中一块您想购买的土地以完成购买：\n\
  \n![](img/535492_1_En_7_Figf_HTML.png)\n\n一张截图显示了可供出售的土地；选择显示的 14 块土地中的任意一块进行购买，以在\
  \ OpenSea 上完成交易。\n\n## 元宇宙的未来\n\n当尼尔·斯蒂芬森在 1992 年的小说《雪崩》中首次描述元宇宙时，元宇宙还只是一个科幻概念。然而，自从\
  \ Facebook 于 2021 年 10 月更名为 Meta 以来，这个为新名称带来灵感的模糊概念便成为了热议话题，如下图所示。\n\n![](img/535492_1_En_7_Figg_HTML.png)\n\
  \n一张波浪图显示了随时间变化的元宇宙关注度。最高波浪值为 100，之后逐渐降至 40 以下。\n\n虽然元宇宙似乎无处不在，并且即将在不久的将来实现，但它可能需要数年时间才能完全落地。Meta\
  \ 首席执行官马克·扎克伯格估计，元宇宙的关键功能需要五到十年才能成为主流。\n\n未来的元宇宙将在许多方面类似于我们的现实生活，人们可以在虚拟世界中完成他们在现实中所做的一切：工作、学习、购物、娱乐和社交。\n\
  \n元宇宙的演进分为三个阶段。\n\n### 元宇宙第一阶段：兴起（2021–2030）\n\n在这一阶段，元宇宙将继续将各种创新技术与现有系统相结合，以重建其基础，从体验层到基础设施层。由于进入门槛相对较低，创作者经济和发现层可能会看到最活跃的活动。一个由大规模人类社会组成的虚拟世界，以完全数字化的方式呈现物理现实，将会出现。然而，现实与虚拟仍将作为两个平行的空间存在。\n\
  \n\n\n### 元宇宙发展阶段二：进阶期（2030–2050 年）\n\n物理世界与数字世界逐渐融合交汇。现实生活中的诸多元素，例如工作、学习、购物、社交、金融、娱乐以及现实世界中的其他服务，都与虚拟世界相连或迁移至其中。虚拟世界的人口和活动持续扩张，元宇宙已成为人类生活的重要组成部分。\n\
  \n### 元宇宙发展阶段三：成熟期（2050 年后）\n\n元宇宙成为一种持久且可自我维持的现实世界实体，并实现了 2018 年电影《头号玩家》中“绿洲”级别的虚拟宇宙图景。日本轻小说《刀剑神域》于\
  \ 2009 年首创的概念“完全潜入 VR”，描述了一种让人完全“沉浸”于虚拟世界并与现实物理世界断开连接的虚拟现实体验；从某种意义上说，这几乎如同瞬间传送。\n\
  \n到那时，虚拟世界与现实世界将难以区分，虚拟世界的人口和使用量将极为庞大。\n\n## 本章小结\n\n在本章中，你首先了解了元宇宙的概念，包括其历史与特征。接着，你探索了各种沉浸式技术，包括\
  \ AR、VR、MR 和 XR，并学习了这些技术的工作原理。随后，你学习了元宇宙的分层架构，以理解元宇宙格局中的不同产品或服务。此外，我们还讨论了 NFT 和加密游戏如何在元宇宙中发挥作用。最后，你进入了一个虚拟区块链世界购买虚拟土地，以体验当前阶段元宇宙中的虚拟房地产。\n\
  \n在本章末尾，我们讨论了元宇宙的未来。\n\n在下一章中，你将探索去中心化金融（DeFi），这是 2022 年加密领域最热门的话题之一。我们将概述 DeFi\
  \ 的核心概念与结构，并深入探讨各类 DeFi 产品，例如去中心化稳定币、去中心化交易所以及去中心化借贷。你还将看到一份实践操作 DeFi 产品的分步指南。本章将是你全面理解\
  \ DeFi 协议的绝佳机会。\n\n"
- "# 8. 去中心化金融（DeFi）：重塑金融服务\n\n全球金融体系由众多机构组成，例如银行、保险公司、证券交易所，以及监管这些机构的各类政府机关。传统金融服务是中心化的。中央机构发行货币，并控制着驱动经济发展的货币供给与分配。中心化金融机构通过中心化系统管理资产并执行交易，以减少欺诈行为。然而，这些流程也增加了系统内部的复杂性，导致了高昂的中介成本和缓慢的交易速度。此外，这些交易对所有参与方并非完全透明。\n\
  \n近年来，加密货币的普及速度迅猛加快，而在去中心化网络中交易数字资产的加密市场无需第三方中介。因此，这些市场的兴起正在重塑全球金融业。\n\n去中心化金融（DeFi）代表了一种重建传统金融服务的创新方式。金融产品围绕公有链或联盟链以及智能合约构建。用户在\
  \ DeFi 系统中进行交易时，可以控制自己的资产和个人数据。随着加密行业的成熟，将有更多投资用于构建 DeFi 解决方案。随之而来的是，全球去中心化金融市场自\
  \ 2020 年以来经历了巨大的增长。预计从 2022 年到 2030 年，该市场将以 43.8%的稳定复合年增长率（CAGR）增长。\n\nDeFi 生态系统包含广泛的产品，涵盖了基础设施、去中心化交易所（DEX）、借贷、稳定币、保险、支付、去中心化自治组织（DAO）以及托管服务。\n\
  \n本章旨在向你介绍 DeFi。我们将概述 DeFi 的核心概念与结构，并深入探讨 DeFi 中的特定产品，例如去中心化稳定币（如 MakerDAO 的 DAI）、去中心化交易所（如\
  \ Uniswap）以及去中心化借贷（如 Aave）。最后，通过提供实践操作 DeFi 产品的分步指南，本章将帮助你掌握进行现实世界 DeFi 投资和交易所必需的知识。\n\
  \n本章将帮助你理解以下实用主题：\n\n- 什么是去中心化金融（DeFi）？\n- DeFi 的结构\n- 去中心化稳定币\n- 去中心化交易所（DEX）\n\
  - 去中心化借贷\n- 去中心化保险\n\n\n\n## 什么是去中心化金融 (DeFi)？\n\n去中心化金融（简称 DeFi）利用加密货币和区块链技术，提供从日常支付、借贷到复杂衍生品和保证金交易的全方位金融产品与服务。\n\
  \n传统的中心化金融系统通过其中心化服务控制用户交易。由于涉及第三方参与交易流程以促进资金在各方之间转移并确保合规，这些服务会收取高昂的交易费用。2021 年，银行业在透支收入方面估计赚取了\
  \ 334 亿美元。\n\n用户必须信任中心化系统来管理他们的资金。金融服务要求客户在与银行及其他金融机构交易时提供个人信息以验证身份。这个过程源于政府法规，要求银行执行\
  \ KYC（了解你的客户）和 AML（反洗钱）等复杂的合规程序。金融机构利用 AML 来防止洗钱。\n\n然而，日益增加的银行要求使得保护客户数据的复杂性也随之增加。因此，金融行业必须维护和升级其系统，以确保业务服务正常运行，并保证客户数据在实施新技术时的安全性。\n\
  \n由于金融机构涉及保护客户的资金以及高度敏感的个人身份信息（PII），它们拥有非常高的保护标准，将安全性置于首位。此外，网络犯罪分子通常根据最大影响和利润来选择目标。金融行业完美契合这些条件，一直是网络攻击者进行有动机攻击的青睐目标。\n\
  \n现代软件系统通常非常复杂，涉及众多计算机基础设施、软件和组件，例如开源库、数据库、云生态系统、容器、网络、操作系统等。黑客使用漏洞搜索引擎，如 `Nmap`、`Ransomware`、`Trojans`\
  \ 和 `Worms`，来寻找易受攻击的计算机系统、软件、服务器等等。要将数据安全性维持在最高水平通常成本高昂且极具挑战性，许多金融机构不得不收紧 IT 支出预算。\n\
  \n全球大约有 44,000 家银行和信用合作社。不幸的是，并非每家公司都能充分保护其客户的数据。如今，银行和金融数据泄露事件频发。因此，银行和金融数据泄露屡见不鲜。\n\
  \n近年来，金融系统面临的网络安全风险有所增加。图 8-1 展示了 2018 年 1 月至 2022 年 6 月的金融数据泄露情况。\n\n![](img/535492_1_En_8_Fig1_HTML.png)\n\
  \n一张柱状图加折线图展示了 2018 年 1 月至 2022 年 4 月期间的数据泄露事件数量和受影响记录数。柱状图在 2020 年 10 月达到最高峰值，为\
  \ 37%。折线图在 2019 年 7 月至 2019 年 10 月期间达到最高值，为 1000 万。\n\n**图 8-1**  \n2018 年 1 月–2022\
  \ 年 4 月的金融数据泄露\n\n从 2018 年 1 月到 2022 年 6 月，共发生了 982 起金融数据泄露事件，影响了约 1.53 亿条个人记录。数据泄露事件从\
  \ 2019 年到 2020 年增加了 13%，从 2020 年到 2021 年增加了 11%。\n\n2019 年 3 月，超过 1 亿 Capital One\
  \ 银行客户的信用卡信息（包括*社会安全号码*、出生日期、信用卡号、信用评分、信用限额和余额）发生数据泄露。因此，该银行不得不支付 1.9 亿美元以和解一项集体诉讼。\n\
  \n在 DeFi 中，金融协议可以在智能合约中定义。这些金融服务运行在去中心化的区块链网络上，任何拥有互联网连接的人都可以访问。这里没有传统的中心化权威机构、中介和信任机制。用户可以在一个安全的数字钱包中完全掌控自己的资产，而不是在银行中管理它们。2022\
  \ 年 11 月 11 日，作为第二大加密货币交易所的 FTX（“期货交易所”）申请破产。该交易所在 2022 年 11 月初的估值超过 300 亿美元。作为一个中心化交易所，FTX\
  \ 持有用户的钱包和私钥，并管理用户资金。然而，该交易平台不当地将客户资金借给 Alameda Research，这导致了 FTX 陷入“流动性危机”时出现问题。FTX\
  \ 的崩盘提醒投资者“不是你的密钥，就不是你的币”，并激发了对去中心化金融平台日益增长的兴趣。\n\n由于公共区块链的透明特性，数据隐私已成为区块链中 DeFi\
  \ 系统日益关注的问题。区块链上已有许多专注于隐私的解决方案，包括安全多方计算（MPC）、零知识证明、联邦机器学习、链下数据存储等。\n\nDeFi 正在蓬勃发展。DeFi\
  \ 的总锁定价值（TVL）在过去两年中从 2020 年初的 6.01 亿美元飙升至 2022 年的 2390 亿美元，增长了近 40,000%。截至 2021\
  \ 年，全球金融服务市场规模价值 23.32 万亿美元，而 DeFi TVL 为 2400 亿美元。DeFi 仅占全球金融服务市场总额的 1%。它在这个领域仍处于非常早期的阶段，创新空间巨大。DeFi\
  \ TVL 在未来几年内应该会继续大幅增长。\n\n## DeFi 的结构\n\nDeFi 服务基于分层架构构建，该架构包含多个层级以及组件的逻辑分离。每个层级的组件与另一层级的组件进行通信以执行其功能。通信通过预定义的接口进行。\n\
  \nDeFi 生态系统由五个不同的层级组成，包括：聚合层、应用层、协议层、资产层和结算层，如图 8-2 所示。\n\n![](img/535492_1_En_8_Fig2_HTML.png)\n\
  \n一个包含 5 个层级的去中心化金融结构的示意图。它包括聚合、应用、协议、资产和结算。每个因素都包含了该层级所涉及的功能和流程。\n\n**图 8-2** \
  \ \nDeFi 的结构——五个层级\n\n### 第一层：结算层\n\n结算层为所有 DeFi 交易提供了基础——公共区块链及其原生加密货币构成了结算层。结算层的一个例子是以太坊及其原生代币以太币（ETH）。\n\
  \n区块链的交易数据永久存储在网络中。因此，任何资产所有权的状态变更都将遵守网络的共识机制、智能合约条件和其他规则，以确保交易执行仅按照既定协议进行。\n\n\
  由于这一层主要由用于去信任执行的区块链和分布式账本技术构成，它充当了结算层的角色。\n\n在撰写本文时，大多数 DeFi 应用都构建在以太坊网络上，该网络承载了超过\
  \ 25% 的去中心化金融协议。以太坊拥有 358.1 亿美元，占整个 DeFi TVL 623.2 亿美元的 58%。所有与 EVM 相关的 DeFi TVL\
  \ 价值 508.5 亿美元，约占整个 DeFi TVL 的 82%。图 8-3 展示了各区块链上排名靠前的 DeFi 协议及其 TVL。\n\n![](img/535492_1_En_8_Fig3_HTML.png)\n\
  \n饼状图和 3D 柱状图展示了各区块链 DeFi 协议的百分比以及以十亿美元计价的 TVL。饼状图数据如下：以太坊 25%，币安 20%，Polygon 13%，Fantom\
  \ 12%，Avalanche 11%，Arbitrum 5%，Cronos 和 Solana 各 4%，Optimism 和 Harmony 各 3%。柱状图中以太坊的值最高，约为\
  \ 35。\n\n**图 8-3**  \n各区块链排名靠前的 DeFi 协议和 TVL\n\n\n\n### 第二层：资产层\n\n资产层位于结算层之上。该层包含所有代币，包括像以太币这样的原生协议代币资产，以及在区块链上发行的任何其他代币，如\
  \ `ERC-20`、`NFT` 等。在这一层，值得一提的是稳定币。\n\n在第一章 1 中，我们了解到加密货币市场的高波动性给许多金融产品和日常消费带来了风险。稳定币通过提供稳定的价值，为投资者提供了一个避风港，以最大程度地减少价格波动。其价值与另一种波动性较低的资产（通常是美元或英镑等流行货币）挂钩。稳定币充当交换媒介，并广泛用作\
  \ DeFi 日常交易的货币。我们将在后面的去中心化稳定币部分进行更多讨论。以下是 DeFi 中一些流行的稳定币：Tether、USD Coin、Binance\
  \ USD、TrueUSD、DAI 和 Pax Dollar。\n\n### 第三层：协议层\n\n协议层为特定行业提供了一套参与者同意遵循的原则和规则。这些协议以智能合约的形式编写，用于管理\
  \ DeFi 交易，并能够在没有中心化机构或第三方干预的情况下，以预定义的方式自动执行。许多 DeFi 协议通常由去中心化自治组织（DAO）管理。\n\n去中心化自治组织（DAO）是一个没有中心化权威的组织——没有首席执行官，没有董事会，没有需要服从或服务的经理，是一种自治和自治理模式。决策自下而上做出，并分布在整个社区代币持有者之间，他们参与并投票。要成为代币持有者，用户必须购买加密货币才能成为成员。DAO\
  \ 的所有投票都发布在区块链上，使所有操作都可审计。智能合约制定了 DAO 的规则，并将在满足一组条件时自动执行。整个 DAO 流程是完全透明和自治的。\n\n\
  2020 年，DeFi 借贷协议 Aave 推出了自己的治理代币，以实现自治和去中心化治理。DAO 社区投票将决定 Aave 的市场政策和协议政策，这些政策以\
  \ Aave 改进提案（AIP）的形式正式确定。此后，其他 DeFi 项目也采用了这种模式，并向 DAO 转型。流行的 DeFi 项目使用 DAO，如 Uniswap、Maker\
  \ DAO、BitDAO、Aragon、Decred、0X、Dash、Compound 和 Curve DAO。\n\n在此层定义的所有协议都具有高度互操作性，可被任何同时构建的去中心化应用使用，并为\
  \ DeFi 生态系统提供流动性。该层的主要协议包括借贷、交易所、保险、资产管理等。我们将在 DeFi 产品部分提供详细的 DeFi 用例。\n\n### 第四层：应用层\n\
  \n应用层运行连接各个协议的用户特定应用程序。这些应用程序提供 DeFi 服务，通常构建去中心化应用以与协议层上一组智能合约的功能进行交互，例如资产管理、贷款和保险应用程序。\n\
  \n### 第五层：聚合层\n\n随着 DeFi 呈指数级增长，DeFi 生态系统中的新平台和协议数量迅速出现。因此，密切关注所有即将推出的 DeFi 产品变得日益具有挑战性。\n\
  \n聚合层利用应用层来聚合各种应用和协议，以提供更广泛的服务和工具，并允许用户通过连接多个协议和应用来高效执行复杂任务。DeFi 聚合平台提供了简单的一站式解决方案，允许用户使用单个聚合仪表盘来执行多种类型的\
  \ DeFi 交易。这些聚合平台在活跃的 DeFi 用户中变得非常流行。2020 年中期，大约 20% 的去中心化交易量是通过 DeFi 聚合器完成的。\n\n\
  顶级的 DeFi 聚合器示例之一是 `1inch`。它被设计为价格聚合器，提供工具来提取在多个去中心化交易所（DEX）上交易的各种代币的价格数据。`1inch`\
  \ 聚合器使用自定义的包装智能合约，以当前汇率包装/解包装代币。交易者可以在不同去中心化交易所之间探索和交易加密货币。聚合器支持在以太坊、币安智能链、Polygon、Optimistic\
  \ Ethereum、Arbitrum、Avalanche、Gnosis Chain 以及许多其他区块链上的流行去中心化交易所进行加密货币兑换。图 8-4 展示了\
  \ `1inch` 聚合器界面。\n\n![](img/535492_1_En_8_Fig4_HTML.png)\n\n两张 1inch 聚合器界面的截图，展示了选择代币界面，其中包含以太币和美元硬币。连接钱包选项包含条款，并列出了网络和钱包。\n\
  \n图 8-4\n\n1inch 聚合器界面\n\nDeFi 产品旨在通过提供各种去中心化金融服务（例如借贷、支付、保险、交易、信用、风险等多种金融产品）来重塑传统行业。这些产品在无需许可的点对点网络中消除了中心化的第三方公司。此外，DeFi\
  \ 产品采用模块化设计，使应用程序能够自由地将这些开放的 DeFi 服务集成到它们的产品中。\n\n## 去中心化稳定币\n\n加密行业仍处于起步阶段。与传统全球金融市场相比，数字资产的流动性仍然相对较小。此外，任何流动性低的新兴市场都伴随着波动性。\n\
  \n所有这些都导致了稳定币的兴起。稳定币是一种加密资产，旨在提供一种安全的数字资产以保持价值稳定。它将其价格与其他类型的货币挂钩，例如法定货币（如美元）或商品货币（如黄金或石油）。在过去几年中，稳定币的受欢迎程度显著提高，许多稳定币项目已在加密货币市场推出。\n\
  \n### 稳定币历史\n\n第一种稳定币 `bitUSD` 于 2014 年 7 月发行。`bitUSD` 与美元挂钩，可以在 BitShares 上自由交易。另一种稳定币\
  \ Tether（`USDT`）于 2014 年 10 月推出，与 `bitUSD` 一样，Tether 也与美元挂钩。如今，`USDT` 是市值领先的稳定币。\n\
  \n图 8-5 显示了主要稳定币在过去几年推出的时间线：\n\n![](img/535492_1_En_8_Fig5_HTML.png)\n\n一个主要稳定币推出的时间线图。bitUSD\
  \ 于 2014 年推出，之后 DAI 于 2017 年推出，TrueUSD 于 2018 年推出，BUSD 于 2019 年推出，FEI 于 2021 年推出，USDD\
  \ 于 2022 年推出。\n\n图 8-5\n\n稳定币时间线\n\n### 稳定币的类型\n\n稳定币分为几种类型。\n\n#### 商品抵押稳定币\n\n\
  商品支持稳定币是指使用黄金、石油和房地产等实物资产作为抵押的稳定币。最流行的商品抵押稳定币是 Tether Gold（`XAUT`）和 Paxos Gold（`PAXG`）。\n\
  \n#### 法定货币抵押稳定币\n\n法定货币抵押稳定币与法定货币（例如美元、欧元或英镑）的价值挂钩，这些法定货币是由政府发行的真实货币。最常见的是美元。例如，Tether（`USDT`）和\
  \ USD Coin（`USDC`）就是法定货币抵押稳定币的例子。\n\n#### 加密货币抵押稳定币\n\n加密货币抵押稳定币是指由现有数字加密货币（如 BTC\
  \ 或 ETH）支持的稳定币。其中一个例子是 MakerDAO 的稳定币 `DAI`。`DAI` 是一个 `ERC-20` 代币，与美元以 1:1 的比例挂钩，通过包含激励机制的智能合约在链上实现。该稳定币的供应量通过智能合约和\
  \ DAO 在链上进行调节。\n\n\n\n#### 非抵押型稳定币\n\n`非抵押型稳定币`指的是价格锚定`$1`、且不以任何资产作为抵押的稳定币。它通常通过智能合约中的算法来控制稳定币的供应量，从而实现价格稳定。铸造这类稳定币无需任何抵押物。\n\
  \n`Neutrino USD`和`USDD`是算法加密抵押型稳定币的典型例子。所有操作，包括发行、抵押、质押和奖励发放，都公开透明，并由智能合约和流动性池共同管理。\n\
  \n### 深入解析稳定币——Maker（DAI）\n\n让我们以一款著名的稳定币`Maker (DAI)`为例，来更深入地理解。`MakerDAO`是一个在`以太坊`区块链上运行的去中心化自治组织（DAO）。`MakerDAO`采用双代币模型设计——治理代币和稳定币。`Maker`平台共有三种代币：`Maker\
  \ 币 (MKR)`、`Sai (SAI)`和`DAI (DAI)`。\n\n`MKR`是一种治理代币，社区成员可凭其在`Maker`平台行使投票权。`MKR`本身不是稳定币。第二种代币是名为`DAI`的稳定币。`DAI`是多抵押`DAI`，可用于支付、抵押、资产交换、与众多协议集成，以及在`DeFi`生态系统中提供各种其他服务。`DAI`目前是由`以太坊\
  \ (ETH)`和`基本注意力代币 (BAT)`作为抵押支撑。第三种代币是`Sai`，这是一种单一抵押品类型，曾用于支撑`DAI`。`Sai`的抵押品只有`ETH`。\n\
  \n#### DAI 的工作原理\n\n`DAI`当前的市值为`69.3 亿美元`，供应量为`69 亿 DAI`。`DAI`的总供应量没有上限，其供应量根据`Maker\
  \ 金库`进行管理。在 2019 年 11 月多抵押`DAI (MCD)`发布之前，它被称为`抵押债务头寸 (CDP)`。\n\n`Maker 金库`是`MakerDAO`的核心智能合约组件，它为`Maker`系统持有抵押品（以太币）后即可创建`DAI`。一旦借出的`DAI`被归还，`Maker\
  \ 金库`便会释放锁定的抵押品并销毁这些`DAI`。\n\n`DAI`进行超额抵押以应对市场波动，需要锁定价值`150%`的抵押品来应对众所周知的剧烈波动。例如，如果你存入价值`100\
  \ 美元`的`以太币`，你将获得价值`50 美元`的`DAI`。假设`1 个以太币`价值`1439.685 DAI`。那么`100 DAI`是由`0.104 个以太币\
  \ (ETH)`作为抵押支撑的。\n\n让我们看一个类比示例来理解`Maker 金库`如何管理`DAI`与美元的锚定。\n\n一个想要借入`DAI`的投资者会创建一个`Maker\
  \ 金库`，并将`ETH`发送到该`Maker 金库`中。`Maker 金库`会生成相应数量的`DAI`，并将这些`ETH`抵押品以`合仓以太币 (PETH)`的形式锁定。生成的`DAI`数量取决于用户在`Maker\
  \ 金库`中存入的以太币数量。生成的`DAI`会存入用户的钱包，并随着时间推移产生利息，这称为`DAI 储蓄利率 (DSR)`。用户可以随时自由取回其存入的抵押品。他们需要向`Maker\
  \ 金库`归还`DAI`并支付一部分稳定费（`MKR`）。之后，这些`DAI`会被销毁，`Maker 金库`随即关闭。\n\n图 8-6 展示了整个`Maker\
  \ 金库`的流程。\n\n![](img/535492_1_En_8_Fig6_HTML.png)\n\n**图 8-6**\n*Maker 金库流程管理：DAI\
  \ 的创建与销毁*\n\n当抵押品价值下跌或`DAI`价格上涨时，可能导致`Maker 金库`中持有的以太币抵押品价值低于`DAI`最初的支撑价值。然而，由于`DAI`是通过超额抵押创建的，`Maker`协议会确保`Maker\
  \ 金库`持有足够的`以太币`来偿还`DAI`，并在账户风险过高时清算`Maker 金库`。例如，如果市场上的以太币价格跌破某个阈值，`Maker 金库`会锁定抵押品，直到用户偿还足够的`DAI`，或者将以太币拍卖给出价最高者。\n\
  \n#### Maker（MKR）币的供应\n\n`MakerDAO`最初发行时供应量为`100 万个 MKR`代币。截至 2022 年 9 月，`Maker`代币的流通供应量约为`977,631`个，市值超过`7.37\
  \ 亿美元`。`MKR`的总供应量是一个动态值，取决于市场价格和`Maker 协议`系统的整体健康状况。`Maker`系统通过发行和销毁`MKR`，运用复杂的机制来管理`DAI`的稳定性。\n\
  \n`DAI`的价值由存储在`Maker`金库中的`ETH`等抵押品保障。当`ETH`市场价格下跌时，`ETH`的价值变得不足以支撑相应数量`DAI`的`$1`锚定价格。在这种情况下，`Maker\
  \ 协议`会自动触发金库的清算。\n\n`Maker 协议`会创建新的`MKR`代币来增加总供应量。然后，这些新的`MKR`代币将被出售，以弥补剩余的价值损失。\n\
  \n另一方面，如果抵押品价格上涨，为了保持`DAI`的价值稳定，`Maker 协议`会回购并销毁`MKR`代币。通过这种方式，它将减少`MKR`的总供应量，从而导致多余的`DAI`被拍卖。\n\
  \n总体流程如图 8-7 所示。\n\n![](img/535492_1_En_8_Fig7_HTML.png)\n\n**图 8-7**\n*MKR 代币的流通*\n\
  \n#### MakerDAO 的治理\n\n正如我们所了解的，`MKR`是`DAI`的治理代币。`MKR`代币持有者对`MakerDAO`的任何决策都拥有投票权，包括：\n\
  \n*   添加新的抵押资产金库。\n*   调整现有金库的风险参数。\n*   修改`DAI 储蓄利率`。\n*   触发紧急关停。\n*   选择稳定费。\n\
  *   选择债务上限。\n*   设置预言机喂价集合。\n*   升级系统。\n\n`Maker 协议`支持链上治理和链下治理的规则。\n\n包括非`MKR`持有者在内的所有人都可以提出新的治理规则。首先，可以在公共`MakerDAO`论坛（[`https://forum.makerdao.com`](https://forum.makerdao.com)）上对提案进行非正式讨论和链下投票。然后，更正式地由`MKR`持有者在链上进行投票。\n\
  \n链上投票有两种形式：`治理民意调查`和`执行投票`。可以通过`Maker 基金会`的投票门户网站（[`https://vote.makerdao.com/`](https://vote.makerdao.com/)）进行链上投票。\n\
  \n#### 治理民意调查\n\n`治理民意调查`，也称为`提案调查`，用于衡量`MKR`持有者对某个提案的看法。它不会执行链上变更。`治理民意调查`必须在提案进入执行投票阶段之前进行。以下是过去提出的一些例子：\n\
  \n*   社区绿灯民意调查——Cabot\n*   抵押品上线基于项目的资金请求 (PFR)\n*   关于修改 DAI 基金会核心单位预算的批准投票\n*\
  \   哦不，这不应该在这里\n*   PPG——公开市场委员会提案\n\n![](img/535492_1_En_8_Figa_HTML.png)\n\n\n\
  \n### 执行投票\n\n执行投票对 Maker 协议进行技术性更改，并在区块链上更改协议或整个 DAO 的状态。以下是过去执行投票的一些示例：\n\n- 引入现实世界资产金库\n\
  - 参数更改\n- 核心单元预算分配\n- `MKR` 归属权转移\n- 就重要的社区目标和指标达成共识\n- 抵押品引入\n\n投票权由投票者拥有并提交的 `MKR`\
  \ 代币数量来衡量。\n\n例如，如果 100 位持有 100 个 `MKR` 的投票者投票给提案 A，而 50 位持有 1,000 个 `MKR` 的投票者投票给提案\
  \ B，那么提案 B 将获胜，因为它获得了更多 `MKR` 代币的支持。\n\n### 对提案进行投票\n\n接下来，我们将演示如何在 Maker 基金会的投票门户中对提案进行投票。\n\
  \n#### 步骤 1：获取你的 MKR 代币\n\n你可以找一个交易所来购买、出售和交易 `MKR`，例如 Coinbase、Binance、Kraken、`crypto.com`\
  \ 等。\n\n#### 步骤 2：使用钱包连接到以太坊主网\n\n点击 Maker 基金会投票门户中的 `connect wallet` 按钮，并通过选择一个钱包连接到以太坊：\n\
  \n![](img/535492_1_En_8_Figb_HTML.png)\n\n一张使用钱包连接到以太坊主网的屏幕截图显示了选择钱包的选项以及一个欢迎回来的界面。\n\
  \n#### 步骤 3：选择一项进行中的投票\n\n在投票门户中寻找一项进行中的投票，并选择投票选项：\n\n![](img/535492_1_En_8_Figc_HTML.png)\n\
  \n一张进行中投票界面的屏幕截图显示了某一特定的治理投票、你的投票区域、投票百分比明细以及系统信息。\n\n#### 步骤 4：审核并提交你的投票\n\n![](img/535492_1_En_8_Figd_HTML.png)\n\
  \n一张审核并提交投票界面的屏幕截图显示了该特定治理投票，其中包含你的投票和评论框、提交选项，并且还显示了包含以太坊主网详情的 MetaMask 通知。\n\n\
  #### 步骤 5：投票完成\n\n![](img/535492_1_En_8_Fige_HTML.png)\n\n一张投票完成界面的屏幕截图显示文本内容为：你已成功对\
  \ 1 项投票进行投票，并附有该投票的详细信息，以及分享你所有投票的选项。\n\n## 去中心化交易所 (DEXs)\n\n中心化交易所 (CEXs) 的工作方式类似于银行。买卖双方都信任这些交易平台来交易他们的资产。用户可以通过支付一定的交易费用，在交易所的中心化钱包中买入、卖出和交易数字资产，如比特币、以太币或其他加密货币，而交易所将通过内部系统控制这些资金以及加密货币交易的执行。然后代表用户在区块链上签署交易。\n\
  \n流动性是指你能在不影响其市场价格的情况下将资产兑换成现金的速度。由于中心化交易所受到高度监管，它们吸引了许多活跃用户。这些用户创造了更多的订单，带来了更高的交易量和更快的兑换速度，这意味着更高的流动性。\n\
  \n要创建一个中心化交易所账户，用户必须提供由政府颁发的有效身份证件、银行详细信息和其他个人信息。注册过程是法规要求的 KYC（了解你的客户）和 AML（反洗钱）实践的一部分。此外，它有助于交易所确定客户的风险等级，并防止洗钱和恐怖主义融资等犯罪活动。一旦中心化交易所验证并批准了身份，用户就可以通过电汇、ACH\
  \ 转账或存入比特币或以太币等加密货币，将资金存入交易所账户。然后，用户就可以开始交易了。\n\nCoinbase、Kraken、`Crypto.com` 和\
  \ Binance 是知名的中心化交易所例子。\n\n尽管中心化交易所 (CEXs) 目前处理了大部分的加密货币交易活动，但去中心化交易所 (DEXs) 正越来越受欢迎。DEXs\
  \ 与中心化加密货币交易所截然相反，后者管理交易所的代币所有权并持有用户的私钥。去中心化交易所 (DEXs) 是点对点交易平台，允许用户保持对其资金的控制权，并在没有中介控制交易过程的情况下购买或出售基于区块链的代币和加密货币。相反，用户控制着钱包的私钥。DEXs\
  \ 使用智能合约，这些合约定义了设定的条件来执行交易，并以较低的交易费用将每笔交易记录在区块链上。由于 DEXs 不涉及任何中心化机构，这意味着不需要 KYC/AML。任何人都可以开设账户参与\
  \ DeFi 生态系统进行交易。交易是完全匿名的。\n\n表 8-1 比较了中心化交易所和去中心化交易所的区别：\n\n**表 8-1** 中心化交易所与去中心化交易所比较\n\
  \n|                | CEXs                      | DEXs                       |\n\
  |----------------|---------------------------|----------------------------|\n| 控制权\
  \         | 交易所控制资金            | 用户控制资金               |\n| 费用           | 需要。交易费用较高\
  \        | 零费用或极低费用           |\n| 流动性         | 高流动性                  | 低流动性  \
  \                 |\n| 监管           | 需要 KYC/AML              | 不需要 KYC/AML    \
  \         |\n| 用户身份       | 非匿名                    | 匿名                       |\n\
  | 使用便捷性     | 易于使用（即使对初学者）  | 不易用，需要专业知识       |\n| 安全性         | 可能遭受黑客攻击和服务器宕机\
  \ | 无黑客攻击和服务器宕机问题 |\n\n### 去中心化交易所的类型\n\nDEXs 是去中心化金融 (DeFi) 的基础，它允许在自动化智能合约上进行数字资产交易。主要有三种类型的去中心化交易所：自动做市商、订单簿\
  \ DEXs 和 DEX 聚合器，如图 8-8 所示。\n\n![](img/535492_1_En_8_Fig8_HTML.png)\n\n一张组织结构图描绘了三种类型的去中心化交易所。这些类型是自动做市商、进一步细分为链上订单簿和链下订单簿的订单簿\
  \ DEXs，以及 DEX 聚合器。\n\n**图 8-8** 去中心化交易所的类型\n\n### 自动做市商 (AMMs)\n\n在传统的交易平台上，做市商通常是一家经纪公司、大型银行或机构，顾名思义，它们会“创造市场”。做市商通过用自己的账户买卖证券，为市场中的交易对创造流动性。买方和卖方对资产出价不同，做市商总是对特定资产报出双边市场。他们通过为投资者提供买卖解决方案，从买卖价差（资产的卖出价高于买入价）中赚取差价。\n\
  \n交易者 Alice 想以 19,600 美元的价格购买 1 个 BTC。交易所需要找到一位交易者 Bob，他愿意以 Alice 偏好的交易范围（例如 19,700\
  \ 美元）卖出 1 个 BTC。中心化交易所将充当 Alice 和 Bob 之间的中间人。假设 Bob 接受报价，交易所将向 Bob 出价 19,620 美元。然后，交易所将以\
  \ 19,660 美元的价格向 Alice 卖出 1 个 BTC。交易所将获得约 40 美元的利润。这个过程如图 8-9 所示。\n\n![](img/535492_1_En_8_Fig9_HTML.png)\n\
  \n一张关于 Alice 和 Bob 之间中心化交易所活动的示意图。Bob 想以 19,700 美元卖出 1 个 BTC，但 Alice 想以 19,600 美元买入。Alice\
  \ 想以 19,660 美元卖出 1 个 BTC，而 Bob 想以 19,620 美元买入。这些交易的利润是 40 美元。\n\n**图 8-9** 做市商活动\n\
  \n在自动做市商 (AMM)（有时称为主动做市商）的情况下，做市商被使用智能合约的自主协议所取代。AMM 中的智能合约始终在两个（或多个）资产之间提供报价，并确定数字资产的价格和提供流动性。\n\
  \n\n\n### AMM 基本概念\n\n与中心化交易所相比，去中心化交易所的买家和卖家数量仍然较少。因此，要找到足够多的买家和卖家以匹配价格进行资产交易将会很困难。AMM\
  \ 通过创建流动性池来解决这个问题。AMM 为流动性提供者提供了一种称为“流动性挖矿”的实践，通过向流动性池中添加适当比例的资产来赚取额外收益。流动性提供者将自动获得奖励代币，即基于以太坊的\
  \ ERC-20 代币，称为流动性提供者代币。这些 LP 代币代表了 LP 作为池提供者的所有权。当 LP 撤回存入的资金时，LP 代币将返还给 DeFi 系统。每当流动性池中发生交易时，该池都会收取交易费用。LP\
  \ 代币持有者将按比例获得流动性池增长的奖励，LP 可以定期领取这些奖励。例如，如果你向一个总市值为 1000 美元的 AMM DEX 池（例如 `Uniswap`）贡献了价值\
  \ 100 美元的代币，你将获得该池 10% 的 LP 代币。\n\n流动性池中的资产资金被锁定在智能合约中。通过 AMM，交易者可以利用流动性池在平台上无缝交易其资产，而无需中心化做市商。流动性提供者将获得其投资所产生的一部分费用和激励作为奖励。\n\
  \n交易的另一方没有特定的卖家或买家。相反，自动化算法决定了 AMM 智能合约中流动性池内代币的价格。AMM 中的智能合约算法将是自动化和优化的，能够调整价格以响应市场需求。\n\
  \n#### 现有 AMM 模型有哪些？\n\nAMM 使用数学公式，根据流动性池中的供应量以算法方式调整价格，以维持流动性池中资产的平衡。流行的 AMM 协议（如\
  \ `Uniswap`、`Bancor` 和 `Curve`）使用了多种恒定函数做市商。CFMM 包括恒定乘积做市商、恒定总和做市商和恒定均值做市商。\n\n\
  #### 恒定乘积做市商（CPMM）\n\nCPMM 由首个基于 AMM 的去中心化交易所 `Uniswap`、`Bancor` 以及市场上最流行的 AMM 推广开来。CPMM\
  \ 基于函数 `x*y=k`，其中 `x` 是流动性池中一种代币的数量，`y` 是另一种代币的数量。两种代币的价格范围取决于每种代币的可用流动性。当代币 X 的供应量增加时，代币\
  \ Y 的供应量必须减少以维持恒定乘积 K，反之亦然。\n\n例如（`Uniswap V2`），一个流动性池中有 50% 的 DAI 和 50% 的以太坊。假设一个以太坊为\
  \ 2000 美元，一个 DAI 为 1 美元。起初，该流动性池有 9 个以太坊和 18,000 个 DAI。在这种情况下，一个以太坊和 2,000 个 DAI\
  \ 配对的总价值为 4000 美元，计算方式为 `2000 + 1 * 2000 = 4,000`。\n\n一位流动性提供者投资了池资产的 10%——一个以太坊和\
  \ 2,000 个 DAI 进入该池。存入后，该池有 20,000 个 DAI 和 10 个以太坊，每种代币各占 50%。CPMM 常数 `x*y=k` 为 `20,000\
  \ * 10 = 200,000`。\n\n现在，一位流动性购买者想购买一个以太坊。根据以下公式，以太坊的价格为 2222 个 DAI：\n\n`(20,000\
  \ + x) * (10 - 1) = 200,000 → x = 2,222`\n\n购买者需要支付 2222 个 DAI 来获得一个以太坊。最终，该池将有\
  \ 9 个以太坊和 22,222 个 DAI。\n\n该过程如图 8-10 所示。\n\n![](img/535492_1_En_8_Fig10_HTML.png)\n\
  \n一个流程图展示了 AMM 恒定乘积做市商的示例。流动性提供者向池中存入 1 个以太坊和 2,000 个 DAI，流动性购买者购买了 1 个以太坊。交易前后的计算结果显示在顶部。\n\
  \n**图 8-10**\n\nAMM CPMM 示例\n\n使用 CPMM 的去中心化交易所示例包括 `Uniswap V1` 和 `V2`（`Uniswap\
  \ V3` 使用不同的函数）、`Bancor (V1)`、`Sushi Swap`、`Pancake swap` 及其他衍生品。\n\n#### 恒定总和做市商（CSMM）\n\
  \n恒定乘积的第二种变体是恒定总和做市商，它通过简单地将恒定乘积中的乘法替换为加法（`x + y = k`）来保持 X 和 Y 资产的总和不变。只要总和保持不变，变量可以多次变化。\n\
  \n这种设计使得价格预测更容易，但当其中一个代币流动性池被耗尽时，剩余的流动性就只剩一种资产，交易者将无法获得更多流动性。因此，CSMM 无法提供无限流动性，并且不盈利。因此，AMM\
  \ 很少使用 CSMM。\n\n#### 恒定均值做市商（CMMM）\n\n恒定均值做市商由 Balancer 协议首次引入，允许投资者处理超过两种代币，并维持\
  \ 50/50 以外的平均权重，满足以下等式：\n\n![](img/535492_1_En_8_Figf_HTML.jpg)\n\n`大写字母 Pi，下限 i\
  \ 等于 1 到 n，R 下标 i 的 w 下标 i 次幂，等于 K。`\n\n其中 `R[i]` 是每种资产的储备量，`W` 是每种资产的权重，`k` 是一个常数。\n\
  \n以三种锁定资产为例，CMMM 对流动性池使用的公式如下：\n\n`(x * y * z) ^ (1/3) = c`\n\n其中 `x`、`y` 和 `z`\
  \ 是选定的代币，`c` 是它们的恒定乘积。\n\n#### 混合恒定函数\n\n如果底层交易对的价格几乎稳定（例如，两个以美元计价的稳定币交易对 `DAI–USDC`\
  \ 进入 `Uniswap` 流动性池），恒定乘积函数可能不是最佳解决方案，因为滑点大且回报微乎其微。因此，Curve Finance 使用了 Stableswap\
  \ 不变量公式，它是恒定乘积和恒定总和公式的混合体，其函数如下所示：\n\n![](img/535492_1_En_8_Figg_HTML.png)\n\n`A\
  \ 乘以 n 的 n 次方，求和 x 下标 i 加上 D，等于 A D 乘以 n 的 n 次方，加上 D 的 n+1 次方除以 n 的 n 次方乘以联乘 x 下标\
  \ pi。`\n\n其中 `x` 是每种代币的储备量，`n` 是稳定币的数量，`D` 是代表储备中整个代币价值的不变量，`A` 是放大系数，它是一个可调常数，与资产的波动性成正比，去中心化自治组织可以调整该值。\n\
  \n在 Curve stableswap-paper 中，对 Stableswap 不变量与 `Uniswap`（恒定乘积）和恒定价格不变量进行了比较，如图 8-11\
  \ 所示。\n\n![](img/535492_1_En_8_Fig11_HTML.jpg)\n\n一个图表比较了以美元计价的 stableswap 不变量与\
  \ uniswap 和恒定价格不变量。Uniswap 曲线经过点 (20, 2)、(5, 5) 和 (1, 30)。Stableswap 曲线经过点 (19,\
  \ 0)、(5, 5) 和 (0, 30)。恒定线经过点 (10, 0)、(5, 5) 和 (0, 10)。所有数据均为近似值。\n\n**图 8-11**\n\
  \nStableswap 不变量与恒定乘积和恒定总和的比较（来自 Curve Stableswap-paper）\n\n当投资组合平衡时，Stableswap\
  \ 不变量表现为恒定总和，并为 DeFi 用户提供了一种更好的稳定币兑换工具。\n\n#### AMM 的局限性\n\n如前所述，与中心化交易所相比，去中心化交易所的流动性通常较低。因此，去中心化交易所必须吸引新用户贡献其资产以产生更多流动性。没有流动性提供者，交易所就无法提供交易服务。由于流动性较低，AMM\
  \ 通常存在两个主要问题：滑点和无常损失。\n\n\n\n#### 滑点\n\n简单来说，滑点是指交易的预期价格与执行价格之间的差异。沿用之前的 CPMM 示例（Uniswap\
  \ V2），恒定乘积`x*y=k`为`20,000 * 10 = 200,000`。假设一位流动性买家想购买三个以太币，每个以太币的价格为`8,571` DAI：\n\
  \n```\n(20,000 + x) * (10 - 3) = 200,000 → x = 8,571\n```\n\n在这个例子中，1 个 ETH 的实际价格为`2,000`\
  \ DAI，但在 AMM 中，用户需要为每个 ETH 支付`8,571` DAI。最终，流动性池将包含`7`个以太币和`28,571` DAI。这就是滑点。\n\
  \n如果 3 个 ETH 占 ETH 总储备量的 30%，那么滑点就是 42.9%：\n\n```\n(28,571 - 20,000 / 20,000) →\
  \ 42.9%\n```\n\n在这种情况下，没有人愿意多支付 42.9%的 DAI，而且实际上，DAI 与美元保持 1:1 的价值。\n\n#### 无常损失（IL）\n\
  \n当用户 Alice 作为流动性提供者时，她会将资产质押在流动性池（例如 Uniswap V2）中。当 Alice 想要从池中提取质押的代币时，如果这些加密资产的市场价格发生变化，就可能发生无常损失。流动性池会根据公式`x*y=k`自动调整代币价值。因此，提取时的美元价值可能低于其存入时的美元价值。如果\
  \ Alice 继续将资产留在池中，就不会产生实际损失。这就是它被称为\"无常损失\"的原因。根据市场走势，这种损失可能会减少、完全消失，甚至可能获利。让我们来看一个例子：\n\
  \n1.  当 ETH 价格为`$2,000`时，Alice 在 Uniswap V2 流动性池中质押了`10`个 ETH 和`20,000`个 DAI。加上新增流动性后的恒定乘积为`200,000`（`10\
  \ ETH * 20,000 DAI`），她质押代币的总美元价值为：\n\n    ```\n    10 ETH * $2,000 + 20,000 DAI\
  \ * $1 = $40,000\n    ```\n\n2.  现在假设 ETH 市场价格变为`1 ETH = $2,500`。原始代币价值将变为：\n\n\
  \    ```\n    10 ETH * $2,500 + 20,000 DAI * $1 = $45,000\n    ```\n\n3.  Alice\
  \ 想要计算她提取资金时的无常损失。假设流动性池开始调整和重新平衡代币价值。在这种情况下，如果池子希望保持 50%的 ETH 和 50%的 DAI，那么 DAI\
  \ 和 ETH 将各自价值`$22,500`。初始重新平衡价值为：\n\n    ```\n    ($20,000 + $25,000) / 2 = $22,500\n\
  \    ```\n\n4.  在这种情况下，ETH 的数量将为`22,500 / 2,500 = 9` ETH。应用`x*y = 9 ETH * 22,500\
  \ DAI = 202,500`。这个数字与原始常数`200,000`不同。因此，重新平衡将继续进行。\n\n然后可以使用以下公式计算每种资产的新分布：\n\n\
  ![](img/535492_1_En_8_Figh_HTML.jpg)\n\n`X_t`等于`k`除以`r_t`的平方根。`Y_t`等于`K * r_t`的平方根。\n\
  \n这里`r`是池中两种代币资产之间的价格，`t`是计算`r`的时间，`k`是 CPMM 常数（`x*y`）。\n\n让我们将这些公式应用于我们的示例，看看它是如何工作的。在\
  \ ETH 价格变化之前，`r`为`2,000`，`k`为`200,000`。\n\n![](img/535492_1_En_8_Figi_HTML.jpg)\n\
  \n`ETH X_t1`等于`200,000`除以`2,000`的平方根，等于`10`。`DAI Y_t1`等于`200,000 * 2,000`的平方根，等于`20,000`。\n\
  \n我们得到了池中代币对的原始状态——`10`个 ETH 和`20,000`个 DAI。几天后，当 ETH 价格变为`$2,500`时，`r`为`2,500`。让我们重新应用相同的公式进行计算：\n\
  \n![](img/535492_1_En_8_Figj_HTML.jpg)\n\n`ETH X_t2`等于`200,000`除以`2,500`的平方根，等于`8.94`。`DAI\
  \ Y_t2`等于`200,000`乘以`2,500`的平方根，等于`22,360.68`。\n\n公式得出，池中将包含约`8.94`个 ETH 和约`22,360.68`个\
  \ DAI。因此，我们可以验证它是否与常数`200,000`匹配：\n\n```\n8.94 * 22,360.68 = 199,904 ≈ 200,000\n\
  ```\n\n新的一对代币价值是正确的。如果 Alice 继续在池中持有代币，总 DAI 价值将为`$45,000`：\n\n```\n10 * 2,500 +\
  \ 20,000 = $45,000\n```\n\n投资回报率将为 12.5%：\n\n```\n45,000 - 40,000 / 40,000 = 12.5%\n\
  ```\n\n我们可以简单赚取`5,000`个 DAI（`45,000 – 40,000`）。\n\n使用这些数据，我们可以计算如果 Alice 提取代币所产生的无常损失：\n\
  \n```\n45,000 - (8.94 * 2,500 + 20,000) = $289.32\n289.32 / 45,000 = 0.64%\n```\n\
  \nAlice 的无常损失为 0.64%和`289.32`个 DAI。\n\n图 8-12 显示了无常损失的估算图。\n\n![](img/535492_1_En_8_Fig12_HTML.png)\n\
  \n一张以太币价格与美元的无常损失百分比图。y 轴显示-80.00 到 0.00，x 轴显示 100 到 500。曲线穿过点（-73，0）、（0，100）、（-20，400）、（-25，500）。所有数据均为近似值。\n\
  \n**图 8-12** 无常损失估算（来源：Bancor）\n\n以下是根据上述图表总结的与持有相比的损失情况：\n\n*   1.25 倍价格变化 = 损失\
  \ 0.6%\n*   1.50 倍价格变化 = 损失 2.0%\n*   1.75 倍价格变化 = 损失 3.8%\n*   2 倍价格变化 = 损失 5.7%\n\
  *   3 倍价格变化 = 损失 13.4%\n*   4 倍价格变化 = 损失 20.0%\n*   5 倍价格变化 = 损失 25.5%\n\n从我们的示例中，当价格从`$2,000`变为`$2,500`时，损失为\
  \ 0.64%。这是 1.25 倍的变化，与上述图表估算相符。\n\n有几种减少影响的解决方案，包括执行较小的交易、提高价格滑点容忍度以及增加流动性。\n\n\
  ### 订单簿去中心化交易所\n\n订单簿根据特定金融资产的当前列表价格水平，列出该资产的买入和卖出订单。资产的市场价格订单寻求的是最低的卖价或最高的买价。价格会不断更新，使交易者能够实时查看资产的未成交订单。一个订单簿通常由三个要素组成：\n\
  \n**买入订单或买单**——显示交易者下达的所有买入订单，包括购买数量和要价。\n\n**卖出订单或卖单**——显示交易者下达的所有卖出订单，包括卖出数量和出价。\n\
  \n**订单历史**——显示交易者过去下达的所有买入和卖出订单。\n\n图 8-13 展示了 Coinbase 中心化交易所和 dYdX 去中心化交易所的订单簿。\n\
  \n![](img/535492_1_En_8_Fig13_HTML.png)\n\n一组两个屏幕显示了 Coinbase CEX 和 dYdX DEX 的订单簿。除了更新的价格水平外，它还有三个组成部分：买入订单（也称为买单）、卖出订单（或卖单）以及订单历史。\n\
  \n**图 8-13** Coinbase CEX 和 dYdX DEX 订单簿\n\n目前，去中心化交易所有两种类型的订单簿——链上和链下。\n\n\n\n\
  #### 链上订单簿\n\n链上订单簿直接托管在底层区块链上，所有操作（包括订单提交、更新和取消）均在链上完成。区块链记录所有订单交易，从根本上消除了对中心化机构的依赖。但另一方面，每一笔订单都需提交至区块链，交易会被广播到所有区块链验证者/矿工节点进行验证。这导致订单簿交易速度慢且成本高昂。当价格剧烈波动时，交易者可能需要更新其链上订单。由于处理速度缓慢，矿工有可能在验证并确认这些交易前，先检查订单，然后操控并执行自己的订单。\n\
  \n以下是一些采用链上订单簿的去中心化交易所示例：`ViteX`、`Demex`、`Bitshares` 以及 `Stellar` 去中心化交易所。典型的链上订单簿流程如图\
  \ 8-14 所示。\n\n![](img/535492_1_En_8_Fig14_HTML.jpg)\n\n典型的做市商与吃单者之间的链上订单簿流程示意图。做市商和吃单者将资金存入智能合约，做市商在订单簿中下订单，吃单者选择一个订单，最终订单在智能合约中完成结算。\n\
  \n**图 8-14** *链上订单簿*\n\n做市商是提供买卖订单的一方，而吃单者是立即买入或成交该订单的一方。\n\n链上流程可描述为以下步骤：\n\n1.\
  \  做市商和吃单者将资金存入智能合约。\n2.  做市商在订单簿中放置订单。\n3.  吃单者随后选择一个订单。\n4.  订单在智能合约中完成结算。\n\n\
  #### 链下订单簿\n\n链下订单簿是托管并运行在区块链之外的订单簿应用程序。订单数据也存储在中心化实体中。一旦双边订单匹配成功，链下订单平台会向区块链智能合约发送一笔交易以完成结算。链下订单簿的优势在于订单管理速度更快，费用也更低。然而，链下与链上之间可能存在信息差，无法完全保证做市商的订单仍然有效，这可能会被利用来执行不利的订单。\n\
  \n链下订单簿的示例包括 `dYdX`、`0x Protocol`、`Loopring`、`AirSwap`、`EtherDelta`、`IDEX` 和 `Hydro`。\n\
  \n典型的链下订单簿流程如图 8-15 所示。\n\n![](img/535492_1_En_8_Fig15_HTML.png)\n\n做市商与吃单者之间的链下订单簿流程示意图。做市商和吃单者将资金存入智能合约，做市商在链下订单簿中下订单。然后吃单者选择一个订单，链下服务执行订单匹配，最后订单在智能合约中完成结算。\n\
  \n**图 8-15** *链下订单簿*\n\n链下流程可描述为以下步骤：\n\n1.  做市商和吃单者将资金存入智能合约。\n2.  做市商在链下订单簿中放置订单。\n\
  3.  吃单者随后接收订单。\n4.  链下服务运行订单匹配。\n5.  管理员将订单发送至链上智能合约并进行交易结算。\n\n### 去中心化交易所聚合器\n\
  \nDEX 聚合器使用多种不同的协议和方法来解决与流动性相关的问题。这些平台开发了工具，用于聚合来自多个中心化和去中心化加密货币交易所的流动性。当交易者因单一平台流动性不足而无法以预期价格进行加密货币交易时，就会发生滑点。通过聚合来自不同\
  \ DEX 的流动性，DEX 聚合器能够有效减少大额订单的滑点。加密货币交易者可以一个单一仪表盘访问各种交易池，并为特定的代币兑换选择具有优化费用的理想供应商。\n\
  \n以下是一些顶级的 DEX 聚合器：`1Inch`、`ParaSwap`、`Open Ocean`、`Orion Protocol` 和 `Matcha`。\n\
  \n到目前为止，我们已经学习了很多理论知识。在下一节中，我们将深入探讨流行的 DEX `Uniswap`，并学习如何创建流动性池、进行质押和兑换代币。\n\n\
  ### 深入剖析 AMM DEX——Uniswap\n\n`Uniswap` 是最受欢迎的 DEX 和 AMM。该平台于 2018 年 11 月推出。`v2`\
  \ 版本于 2020 年 5 月推出，当前版本是于 2021 年 5 月推出的 `v3`。\n\n`Uniswap` 平台的用户可以无缝兑换任意两种不同的 `ERC-20`\
  \ 代币，而不会产生太多滑点。此外，该协议运行在一系列智能合约之上，使得平台无需许可且去信任化。`Uniswap` 协议的原生代币是 `UNI`，它同时也作为治理代币，赋予代币持有者对协议变更的投票权。\n\
  \n目前，`UNI` 可在以下四个流动性挖矿池中使用：\n\n- `ETH/USDT`\n- `ETH/USDC`\n- `ETH/DAI`\n- `ETH/WBTC`\n\
  \n截至 2022 年 9 月，`Uniswap` 上有超过 50,000 个交易代币对，每个池都有对应的 LP 代币。每日交易量为 `11 亿美元`，总锁仓价值（TVL）为\
  \ `121.3 亿美元`。`Uniswap` 用户可以通过以下几种方式参与去中心化交易所：\n\n- **创建新池** – `Uniswap` 用户可以使用智能合约创建用于兑换新代币对的池子。\n\
  - **通过现有市场兑换资产** – `Uniswap` 中的代币兑换允许交易者直接将一种 `ERC-20` 代币兑换为另一种 `ERC-20` 代币。\n-\
  \ **提供流动性并赚取奖励** – 通过在 `Uniswap` 平台上质押资金，流动性提供者将获得 `UNI` 作为奖励。\n- **参与 Uniswap 治理**\
  \ – `UNI` 代币持有者可以治理并投票决定 `Uniswap` 平台的变更。\n\n#### 在 Uniswap DEX 上列出你自己的代币\n\n利用我们学到的\
  \ AMM 知识，让我们将理论转化为实践，创建一个 `ERC-20` 代币，并将其在 `Uniswap` DEX 上列出。\n\n#### 前置条件\n\n我们需要满足以下几个前置条件：\n\
  \n1.  创建一个 `ERC-20` 代币。\n2.  将其部署到以太坊网络。我们将使用 `Goerli` 测试网络。\n3.  将部署好的 ERC 代币添加到你的\
  \ `MetaMask` 钱包中。\n\n\n\n### 创建 ERC-20 代币\n\n在第 5 章，我们已经简要讨论了 ERC-20 代币。创建 ERC-20\
  \ 代币有多种方式。如果你是一名经验丰富的智能合约开发者，可以自行编写自己的 ERC-20 代币。为简化流程，我们将使用一套流行的开源安全智能合约框架 OpenZeppelin\
  \ 来创建 ERC-20 代币。这非常简单，仅需几行代码：\n\n**第 1 步 –** 在浏览器中打开 Remix IDE（[`https://remix.ethereum.org`](https://remix.ethereum.org)）。\n\
  \n**第 2 步 –** 创建一个名为 `DeFiTeenToken` 的智能合约。\n\n**第 3 步 –** 我们将从 OpenZeppelin 导入\
  \ ERC-20 代币合约。来自 OpenZeppelin 的 ERC-20 代币链接如下：\n\n[`https://github.com/OpenZeppelin/openzeppelincontracts/blob/master/contracts/token/ERC20/ERC20.sol`](https://github.com/OpenZeppelin/openzeppelincontracts/blob/master/contracts/token/ERC20/ERC20.sol)\n\
  \n**第 4 步 –** 在合约中，我们定义创建代币时 `DeFiTeenToken` 的初始供应量。合约名称为 `DeFiTeenToken`，符号为 `DFTT`。`msg.sender`\
  \ 是当前创建此合约的人。在我们的案例中，它将是一个选定的钱包账户地址，用于部署 `DeFiTeenToken` 合约。\n\n以下是我们的 `DeFiTeenToken`\
  \ 智能合约的样子。\n\n![](img/535492_1_En_8_Figk_HTML.png)\n\n去中心化金融代币智能合约的截图。它包含 9 行代码，包括导入、`DeFiTeenToken`\
  \ 合约和构造函数。\n\n你还可以从本书的 GitHub 仓库获取此合约——第 8 章：\n\n[`https://github.com/Apress/Blockchain-for-Teens.git`](https://github.com/Apress/Blockchain-for-Teens.git)\n\
