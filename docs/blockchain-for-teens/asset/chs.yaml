  ### DAO 攻击（2016 年 7 月）


  2016 年 5 月，一个去中心化自治组织（DAO）由开发人员在以太坊区块链上创建。该 DAO 使用智能合约进行自我治理并自动做出决策，无需传统的集中式管理结构。任何个人，无论身处何地，都有权参与和投票。首次
  DAO 众筹非常成功，筹集了创纪录的 1270 万枚以太币（当时价值约 1.5 亿美元）用于资助该项目。


  然而，在 2016 年 6 月 17 日，一名黑客利用了 DAO 智能合约中的某些漏洞。该黑客能够在智能合约更新其余额之前，多次调用 DAO 智能合约来退回以太币。黑客成功窃取了超过
  360 万枚以太币（当时价值约 5000 万美元）。


  由于 DAO 投资者损失了巨额资金，以太坊社区决定逆转该攻击以退还损失的资金，这导致以太坊分叉成两条区块链。一条是当前的以太坊区块链，代币持有者按 1 ETH
  兑换 100 DAO 代币的汇率进行了兑换，与初始发行的汇率相同。DAO 投资者损失的资金得以追回。2016 年 9 月，数字货币交易所将 DAO 代币下架。与此同时，部分以太坊社区成员不同意这次硬分叉，决定继续维护旧的区块链，这条链现在被称为以太坊经典。


  ### 以太坊 2.0（合并）


  近年来，以太坊社区开始从以太坊 1.0 迁移到以太坊 2.0，也称为 Eth2、The Merge 或 Serenity。以太坊 1.0 基于工作量证明区块链创建。与以太坊
  1.0 相比，2.0 有几个主要优势。表 4-1 展示了这些差异。


  **表 4-1** 以太坊 1.0 和 2.0 对比


  | | 以太坊 1.0 | 以太坊 2.0 |

  | --- | --- | --- |

  | 共识机制 | 使用工作量证明（PoW）共识。 | 使用权益证明（PoS）共识。 |

  | 速度 | 网络每秒可处理约 15 笔交易（15 TPS）；常导致网络拥堵和延迟。 | ETH 2.0 网络可扩展至潜在每秒 100,000 笔交易（100,000
  TPS），相比之下，Visa 为 30,000 TPS。 |

  | 能耗 | 工作量证明要求矿工消耗大量算力来解决复杂的数学难题。 | 以太坊 2.0 使用权益证明共识，通过质押代币作为抵押资产来检查和验证交易并添加区块。只需最低限度的硬件算力，比工作量证明共识减少
  99%的资源消耗。 |

  | 安全性 | 某些强大的矿工群体可能控制网络超过 50%的活动，这可能导致如 51%攻击等漏洞。 | 在以太坊 2.0 中，网络更加去中心化。网络需要大约 16,384
  个验证者。用户只需质押 32 个以太币即可参与验证以太坊网络。即使以太币较少，用户也可以加入矿池，使每个人都能共同质押并分享奖励。没有矿工控制区块链。 |

  | Gas 费（交易费） | 由于网络每秒只能处理有限数量的交易，导致交易费用高昂（称为“Gas”），且交易缓慢。通常，每笔交易的平均 Gas 费约为 12 美元。随着需求急剧上升，Gas
  费可能高得多，例如 100 美元。 | 以太坊 2.0 使用权益证明共识处理交易，几乎不需要 Gas 费。因此，它只收取一些基本费用，以防止网络上的恶意活动。
  |


  以太坊 2.0 的启动分为三个阶段，完全推出以太坊 2.0 将需要数年时间，如图 4-1 所示。


  ![](img/535492_1_En_4_Fig1_HTML.jpg)


  一张描绘以太坊 2.0 三个阶段的插图，展示了从阶段 0 的信标链，到阶段 1 的合并，最后到阶段 2 的分片链，从以太坊 1.0 到以太坊 2.0 的过程。


  **图 4-1** 以太坊 2.0 的三个阶段


  #### 阶段 0 – 信标链


  阶段 0 始于 2020 年 12 月信标链的正式启动。信标链基于权益证明（PoS）构建在以太坊网络中，并管理验证者的注册表。


  #### 阶段 1 – 合并


  以太坊主网在此阶段与信标链合并。它正式结束了网络上的工作量证明（POW）共识，并开始采用权益证明（PoS）。2022 年 9 月 15 日，以太坊从原有的工作量证明机制切换到了权益证明机制，这被称为“合并”。此次合并将以太坊的能源消耗降低了约
  99.95%。


  在信标链上质押以太坊的用户可以成为验证者。


  交易和去中心化应用（Dapps）将继续像以前一样运行。


  #### 阶段 2 – 分片链


  在此阶段，分片链将被引入网络。同时，以太坊主网络将被分割成 64 个分片。每个分片都可以运行功能完备的智能合约。该网络允许每个分片相互通信。


  ## 了解以太坊


  在比特币网络中，比特币是数字黄金，被设计为一种交换媒介和价值储存方式。比特币为人们提供了一种无需中央银行、以去中心化方式在彼此之间转移价值的支付方式。另一方面，以太坊网络被构建为一个图灵完备的区块链。该网络用一种名为
  Solidity 的图灵完备编程语言构建，该语言可以在以太坊虚拟机（EVM）上运行。用户可以在 EVM 中创建和运行去中心化应用程序（Dapps）。EVM 是所有以太坊账户和智能合约的所在地。作为以太坊区块链的原生货币，以太币（Ether）在以太坊网络内部由
  Dapp 用于处理交易。例如，当智能合约执行交易时，Dapp 必须向矿工支付 Gas 费（以太币）以执行挖矿工作。


  ### 以太币（单位）


  每条区块链都有自己的原生货币。与比特币类似，以太坊区块链中的原生货币被称为以太币（ETH）。


  以太币充当“燃料”，用于支付在 EVM 上执行智能合约的费用。当矿工解出计算难题时，他们会获得以太币作为货币奖励。以太币也可以用于支付，用户可以像付款一样将以太币发送给其他用户。


  就像美元有七种面额：1 美元、2 美元、5 美元、10 美元、20 美元、50 美元和 100 美元一样，以太币也被划分为若干单位。以太币的最小面额单位称为 Wei，以数字货币和密码学先驱戴伟（Wei
  Dai）的名字命名。戴伟创建了 Crypto++ 密码学库并发明了 B-money。其他单位还包括 Gwei、Mwei、Kwei、微以太（microether）和毫以太（milliether）。它们也有其他名称。例如，毫以太也被称为
  Finney，以另一位数字货币先驱小哈罗德·托马斯·芬尼（Harold Thomas Finney II）的名字命名，他在 2004 年比特币之前实施了世界上第一个可重复使用的工作量证明系统（RPOW）。2009
  年 1 月，芬尼成为了比特币网络第一笔交易的接收者。表 4-2 列出了以太币及其他单位的命名面额：


  **表 4-2** 以太币面额及单位名称


  | 单位名称 | 价值（以 Wei 计） | 以太币（Ether） |

  | --- | --- | --- |

  | Wei | 1 wei | 10^(-18) ETH |

  | Kilowei (Babbage) | 1,000 wei | 10^(-15) ETH |

  | Mwei (Lovelace) | 10⁶ wei | 10^(-12) ETH |

  | Gwei (Shannon) | 10⁹ wei | 10^(-9) ETH |

  | Microether (Szabo) | 10¹² wei | 10^(-6) ETH |

  | Millether (Finny) | 10¹⁵ wei | 0.001 ETH |

  | Ether | 10¹⁸ wei | 1 ETH |




  ### Gas、Gas 价格与 Gas 限额


  与比特币类似，以太坊目前采用工作量证明（PoW）共识机制。该机制要求矿工计算并解决复杂的数学难题，验证交易，并将交易打包成区块以添加到区块链中。矿工将获得以太币（ETH）作为奖励。当用户提交交易时，需要向矿工支付以太币以执行此类工作。


  根据`coinwarz.com`的数据，假设你使用一台算力为`750.00 MH/s`（每秒百万哈希）、功耗为`1350`瓦的机器，需要花费大约`$20,000`。假设电费为每千瓦时`$0.10`（根据地点不同，美国平均约为`$0.14/kWh`），挖出一个以太币大约需要`103`天。当前以太币价格约为`$1100`，因此需要一段时间才能实现盈利。图
  4-2 展示了以太坊挖矿计算器的计算结果。


  ![](img/535492_1_En_4_Fig2_HTML.jpg)


  三个径向仪表图分别显示挖矿收入、挖矿费用和电力成本，以及以太坊挖矿算力、功耗、电费、矿池费用和每小时/每日挖矿 ETH 数量的数值。


  **图 4-2** 以太坊挖矿计算器


  Gas 是指在以太坊上成功执行一笔交易所需支付的费用，即因处理交易而需要支付给矿工的费用。


  以太币的常用单位之一是 Gwei。它用于指定以太坊的 Gas 价格和支付交易费用。例如，1 Gwei 等于`0.000000001 ETH`。如果一笔交易费用为`0.000000050
  ETH`，我们可以说这笔费用是`50 Gwei`。


  在当前以太坊区块链中，标准交易费为`21,000 Gwei`。Gas 费用可以通过以下公式计算：


  ```

  总费用 = Gas 单位（限额） * （基础费用 + 小费）

  ```


  - **Gas 单位（限额）** – 这是指你愿意为执行一笔交易花费的最大 Gas 量。

  - **基础费用** – 这是指将用户交易纳入区块所需的最低 Gas 费用。基础费用金额会根据市场供需情况由以太坊自动动态计算。

  - **小费** – 也称为优先费或矿工小费。这是一项可选费用，由用户决定，并直接支付给矿工。优先费有助于你的交易被矿工优先选取并更快处理。


  我们以一个真实的以太坊区块链交易为例（见图 4-3，数据来自`etherscan.io`），计算当前一笔以太坊交易的成本。


  ![](img/535492_1_En_4_Fig3_HTML.png)


  一张图片展示了 ETH 交易成本，包含状态、区块、时间戳、价值、交易费、Gas 价格、Gas 限额和 Gas 费用等字段。


  **图 4-3** 以太坊交易成本（etherscan.io）


  从上述示例可以看出，一笔交易的 Gas 限额为`201,027`单位，基础费用为`33.529 Gwei`，优先费用为`1.101 Gwei`；执行这笔交易的总交易费将为`0.006961
  ETH`（`201,027 * (33.529 + 1.101) = 2,310,000 Gwei`）。在当前市场，1 个以太币约为`$1100`，因此这笔交易费约为`0.006961
  * 1100 = $7.65`。


  需要注意的是，如果你支付的费用低于所需交易费，交易将被回滚，并且你无法拿回 Gas 费，因为矿工已经为处理你的交易付出了相应的挖矿工作。即使交易失败，他们也会收取这笔费用。另一方面，如果你支付了更多的
  Gas 费，多出的部分将在交易完成后返还给你。在上述示例中，有一个“Usage by Txn”字段显示只使用了`40.21%`的 Gas 费，剩余费用将退还给用户（`500,000
  - 201,027 = 298,973`）。


  ### 以太坊账户


  每个以太坊账户都有一个以太坊地址。以太坊有两种类型的账户：**外部拥有账户（EOA）**和**合约账户**。


  #### 外部拥有账户（EOA）


  外部拥有账户由用户拥有的公钥/私钥对控制。在第 2 章中，我们学习了如何使用`Keccak-256`哈希算法从公钥推导出以太坊地址。每个以太坊地址都是 42 个十六进制字符串，以`0x`开头，表示十六进制格式。创建以太坊账户无需成本。外部拥有账户可用于转账（以太币）或向智能合约发送交易。你需要私钥才能访问自己的资金或向他人发送资金。


  #### 合约账户（CA）


  合约账户由以太坊虚拟机（EVM）执行的代码控制。这些代码通常被称为智能合约代码。创建合约账户成本较高，因为它会占用网络存储空间。合约账户可以进行以太币转账并创建智能合约账户。


