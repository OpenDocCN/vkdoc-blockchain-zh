  \n**图 5-24** – 在 `etherscan` 中已部署的合约\n\n太棒了！你已经将 `HelloWorld` 合约发布到 Goerli 测试网络，该网络对公众开放，并且可以从任何地方访问。接下来，让我们构建一个简单的\
  \ DApp 来与我们的智能合约交互。\n\n\n\n## 去中心化应用（Dapps）\n\n通常，Dapp 是一个三层应用，由三个主要组件构成：\n\n- **前端层**\
  \ – 一个包含 Web 服务器用于托管网页的浏览器。\n- **Web3 提供者层** – 位于前端和智能合约之间的中间层，即 Metamask 钱包。\n\
  - **后端（智能合约）** – 在区块链网络中运行的合约。\n\n图 5-25 展示了一个典型的 DApp 分层架构：\n\n![](img/535492_1_En_5_Fig25_HTML.jpg)\n\
  \nDapp 分层架构流程图示意，包含 Web 客户端、Web 提供者、智能合约和以太坊区块链。\n\n图 5-25：Dapp 分层架构\n\n在以太坊客户端部分，我们使用\
  \ `web3` API 从 `geth` 控制台查询一些区块链信息。在本节中，我们将探索另一个以太坊 JavaScript 开源库 — `Ethers.js`，它同样能使\
  \ Web 客户端与以太坊网络进行通信和交互。\n\n### 开始\n\n在继续本节内容之前，你需要安装以下内容：\n\n#### 安装 node.js\n\n\
  按照 Node 官方安装指南，下载并安装 `node.js`：\n\n<https://nodejs.org/en/download/>\n\n#### 安装\
  \ Git\n\n按照 Git 官方安装指南安装 Git：\n\n<https://git-scm.com/book/en/v2/Getting-Started-Installing-Git>\n\
  \n#### Git 克隆 HelloWorld Dapp 项目\n\n安装好 Node 和 Git 后，你需要访问本书的 Apress 网站，git 克隆第\
  \ 5 章的 HelloWorld Dapp 源代码：\n\n```\ngit clone https://github.com/Apress/Blockchain-for-Teens.git\n\
  ```\n\n#### 安装 HelloWorld Dapp 项目\n\n打开终端，导航到 helloworld 项目位置。运行 `npm install`：\n\
  \n![](img/535492_1_En_5_Figa_HTML.jpg)\n\nhelloworld 项目位置的截图。\n\n这将安装运行 HelloWorld\
  \ Dapp 所需的 node 库。\n\n项目结构应该与图 5-26 中展示的类似：\n\n![](img/535492_1_En_5_Fig26_HTML.jpg)\n\
  \n选择 `client.js` 后展示的项目结构文件夹截图。\n\n图 5-26：Dapp 项目结构\n\n注意，源代码指向 Goerli 测试网络的合约地址：\n\
  \n```\n0xe02cfad8b29d0aad478862facb2e6a9b1fed7bc9\n```\n\n你可以使用这个地址进行测试，或者将此地址修改为你自己部署的合约地址。\n\
  \n打开 `client.js`，更新第 3 行的地址为你自己的地址。如果你修改了合约并有不同的合约 ABI，请用你自己的合约 ABI 替换第 4 行。\n\n\
  ![](img/535492_1_En_5_Figb_HTML.png)\n\n自己合约地址的测试截图。\n\n#### 运行 HelloWorld Dapp\
  \ 项目\n\n在终端中，于 helloworld 文件夹下执行以下命令：\n\n```\nnode index.js\n```\n\n这将启动 Node 服务器来托管\
  \ HelloWorld Dapp。端口号为 3000。\n\n![](img/535492_1_En_5_Fig27_HTML.jpg)\n\nDapp 节点服务器地址截图。\n\
  \n图 5-27：启动 Dapp 节点服务器\n\n#### 从浏览器打开 HelloWorld Dapp\n\n现在，你可以通过在浏览器中输入 `http://localhost:3000`\
  \ 来打开 Dapp。你应该能看到 HelloWorld Dapp 页面。你可以看到右上角有一个连接按钮，用于连接 Metamask。页面中央有一个蓝色的消息按钮，可用于检索区块链消息。红色的更新按钮和一个消息输入框一起，用于更新合约消息内容。\n\
  \n![](img/535492_1_En_5_Fig28_HTML.png)\n\nE2E hello world dapp 页面的截图。页面中央有一个标题为\"\
  message update\"的方框。\n\n图 5-28：Dapp 初始页面\n\n### 连接到 Metamask\n\n`Ethers.js` 使用 `Web3Provider`\
  \ API 连接 Metamask 钱包：\n\n```\nethers.providers.Web3Provider(window.ethereum)\n```\n\
  \n点击连接按钮。如果你尚未登录，它会提示你登录：\n\n```\nawait provider.send(\"eth_requestAccounts\", []);\n\
  ```\n\n连接成功后，我们可以从提供者处获取用户钱包、网络和账户信息。`provider.getSigner()` 将从 Metamask 钱包获取以太坊账户。`provider.getNetwork()`\
  \ 返回钱包所连接的当前以太坊网络。\n\n以下是代码片段：\n\n![](img/535492_1_En_5_Figc_HTML.png)\n\n代码片段截图。\n\
  \n由于你是首次运行 Dapp，并且尚未连接到 Metamask，Dapp 页面的连接按钮将是橙色的。所以，让我们点击连接按钮来连接到 Metamask。再次强调，如果你尚未登录，你会看到\
  \ Metamask 弹出的登录请求。\n\n![](img/535492_1_En_5_Fig29_HTML.png)\n\n界面截图，标签为\"E2E hello\
  \ world dapp\"，以及一个请求登录信息的 Metamask 页面。\n\n图 5-29：Dapp 连接 Metamask\n\n登录 Metamask。页面将自动连接到\
