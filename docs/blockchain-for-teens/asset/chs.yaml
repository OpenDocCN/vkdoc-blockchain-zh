  \n一张 `Geth` 控制台运行 `eth.getBlock` 的图片，打开了一个新的 `Geth` 窗口。该命令将出现在控制台中。\n\n要退出 `Geth`\
  \ 控制台，只需运行 `exit` 或按 `CTRL-C`。\n\n\n\n#### 通过命令行使用 Geth JSON-RPC\n\n`cURL` 代表“客户端\
  \ URL”，是一个命令行工具，用于通过多种支持的协议（HTTP、IMAP、SCP、SFTP、SMTP、LDAP、FILE 等）传输数据。`curl` 的语法如下：\n\
  \n```\ncurl [选项] [URL...]\n```\n\n例如，你可以打开一个窗口或 macOS 终端，输入下面的 `curl` 命令，你将看到来自远程服务器的\
  \ HTTP 响应：\n\n```\ncurl -k www.apress.com/us\n```\n\n要以 HTTP 模式启动 `Geth`，你可以使用 `--http`\
  \ 标志，如下所示：\n\n```\ngeth –http\n```\n\n默认端口是 `8545`。一旦 `Geth` 节点启动，我们就可以运行 `curl`\
  \ 命令来查询一些有用的区块链信息。\n\n要获取 `web3` 客户端版本，请运行以下 `curl` 命令：\n\n```\ncurl -X POST -H\
  \ 'Content-Type: application/json' \\\n--data '{\"jsonrpc\":\"2.0\",\"method\":\"\
  web3_clientVersion\",\"params\":[],\"id\":11}' \\\nhttp://localhost:8545\n```\n\n\
  这里的 `id` - `11` 是区块链 ID。响应结果显示 `web3_clientVersion` 为 `Geth/v1.10.17-stable-25c9b49f/linux-amd64/gol.18`。\n\
  \n![](img/535492_1_En_4_Figh_HTML.jpg)\n\n要检查账户余额，我们在之前的 `Geth` 控制台示例中已经看到过，运行以下\
  \ `curl` 命令：\n\n```\ncurl -X POST \\\n-H 'Content-Type: application/json' \\\n--data\
  \ '{\"jsonrpc\":\"2.0\",\"method\":\"eth_getBalance\",\"params\":[\"0x88437244acbb6276de36175740a8d686a9531ba7\"\
  ,\"latest\"],\"id\":11}' \\\nhttp://localhost:8545\n```\n\n![](img/535492_1_En_4_Figi_HTML.jpg)\n\
  \n我们得到十六进制结果——`0x56bbc5d759fba6400`。\n\n通过将十六进制值转换为十进制（`www.binaryhexconverter.com/hex-to-decimal-converter`）：\n\
  \n![](img/535492_1_En_4_Figj_HTML.png)\n\n然后，我们将 Wei 转换为 Ether，并将十进制数除以 `10¹⁸`。最终结果是\
  \ `99.996902986 Ether`，这与我们在 `Geth` 控制台中运行得到的之前结果相符。\n\n#### Geth 文件夹结构\n\n一旦 `Geth`\
  \ 安装完成，它会根据操作系统将默认的 `Geth` 本地数据目录存储在以下位置：\n\n- **Mac**：`~/Library/Ethereum`\n- **Linux**：`~/.ethereum`\n\
  - **Windows**：`%LOCALAPPDATA%\\Ethereum`\n\n其结构如图 4-14 所示。\n\n`chaindata` – 已下载区块数据和\
  \ EVM 状态数据的目录。\n\n`ancient` – 当 `chaindata` 中的区块超过大约 10 万个时，较旧的区块会被移动到 `ancient`\
  \ 目录。\n\n`ethash` – `Ethash` 是以太坊的工作量证明哈希算法，此位置下的文件是以太坊挖矿计算的一部分。这些文件可以安全地重新生成和删除。\n\
  \n`lightchaindata` – 包含区块链的轻量版本，仅包含收据（不包括数据）和内容。\n\n`nodekey` – 公钥文件，用于其他公共对等节点连接或将对等节点添加到网络。\n\
  \n`nodes` – 包含对等节点连接数据，用于在启动时建立网络。\n\n`keystore` – 存储账户信息，账户密钥可以在 `keystore` 文件夹中找到。\n\
  \n`geth.ipc` – 用于 `Geth` 连接所使用的进程间通信的文件。\n\n默认情况下，`Geth` 使用 Google LevelDB 作为底层数据库实现来存储区块链数据，例如，在图\
  \ 4-14 的文件夹结构中 `chaindata` 文件夹下的 `000002.ldb` 和 `000011.ldb`。LevelDB 是一个开源的磁盘键值存储。\n\
  \n正如我们从第 2 章“密码学”中所了解的，每个以太坊账户都由一对私钥和公钥定义。账户地址是通过取公钥的最后 20 个字节派生出来的。当我们使用 `Geth`\
  \ 生成一个新账户时，新账户地址及对应的私钥对被编码在一个 JSON 文本文件（即密钥文件）中。由于它包含你账户的私钥，文件内容始终是加密的。此密钥文件可用于访问你的以太坊账户并转移资金。因此，你需要定期备份密钥文件，并确保此文件安全且不被他人访问。\n\
  \n让我们使用 `Geth` 控制台，通过运行命令 `personal.newAccount()` 并输入密码来生成一个新的账户地址：\n\n生成了账户地址 `0x0b1400031bea2def60a9d8f28fa373ab95d641f6`。现在检查\
  \ `keystore` 目录，会看到为此账户生成了一个新的 JSON 文本密钥文件：\n\n```\n└── keystore\n├── UTC--2022-06-28T04-14-13.945107969Z--0b1400031bea2def60a9d8f28fa373ab95d641f6\n\
  ```\n\n此密钥文件的内容是加密的，如下所示：\n\n我们现在已经学习了以太坊客户端——`Geth`，并阐明了远程客户端（命令行或 Web 应用程序）如何通过\
  \ web3j API 调用以太坊客户端并与以太坊区块链进行交互。\n\n\n\n### 以太坊网络\n\n通常，人们讨论以太坊网络和 ETH 价格时，指的是以太坊主网（mainnet）。主网是最主要的公共以太坊生产区块链。当我们向主网部署智能合约时，必须支付\
  \ Gas 费用，而这些 Gas 费是真实的金钱。由于连接在以太坊上的节点运行着一种协议，因此还有许多其他类似的、受控的公共环境运行着相同或相似的协议来模拟主网环境。合约开发者可以在这些类生产环境中运行和测试智能合约，以确保结果符合预期。这些公共网络我们称之为以太坊测试网（testnet）。\n\
  \n在测试网中，测试智能合约时你不会花费真实金钱。以太坊测试网提供免费的以太币（Ether），供你支付 Gas 费用。这些以太币只能在测试网中使用，不适用于任何其他环境，并且在现实世界中毫无价值。作为最佳实践，你应该先在测试网中测试智能合约代码，之后再部署到主网。\n\
  \n许多测试网采用权威证明（proof-of-authority）共识机制。少数节点被选为验证者（validator）来执行共识工作并创建新区块。测试网不会激励工作量证明（proof-of-work）挖矿。有几个以太坊测试网络可供使用，你可以选择自己喜欢的测试网。自\
  \ 2022 年 9 月 15 日以太坊 2.0 合并以来，少数公共工作量证明和权威证明测试网已转变为权益证明（proof-of-stake）。一些流行的测试网（如\
  \ Ropsten、Rinkeby 和 Kovan）即将被弃用。我们在此不讨论这些测试网。Goerli 测试网是一个权威证明测试网，它已合并为权益证明，并预计将作为权益证明测试网长期维护。\n\
  \nGörli 测试网络于 2019 年 3 月建立。它是一个采用以太坊 Clique 共识机制的权威证明测试网，最初由 Chainsafe 和 Afri Schoedon\
  \ 提出。你可以使用官方的 Goerli 测试网水龙头（[`https://goerli-faucet.slock.it/`](https://goerli-faucet.slock.it/)）获取免费\
  \ ETH。在后续章节中，我们将使用 Goerli 测试网将一些以太币存入我们的钱包。\n\n现在，我们已经涵盖了大部分以太坊基础知识。在下一节中，我们将探讨以太坊是如何工作的。\n\
  \n## 以太坊的工作原理\n\n正如我们之前所了解的，存在一个多阶段的升级，旨在从当前的工作量证明（PoW）共识机制切换到权益证明（PoS）模型。在 PoW\
  \ 中，矿工验证交易并将交易添加到新区块。新区块被广播到整个网络，验证者将进行验证并最终提交到以太坊网络。这个过程通常以 10 到 20 秒的恒定速率进行。在\
  \ ETH 2.0 的 PoS 中，网络处理能力可达每秒 10 万笔交易。\n\n在以太坊中，交易由用户的 EOA 账户发起并安全签名。例如，Alice 想向\
  \ Bob 发送一个以太币。Alice 将为此转账发起一笔交易。接着，以太坊网络传输该交易。一旦转账完成，Bob 的账户将增加一个以太币，而 Alice 的账户必须减少一个以太币。以太坊是一个单一的世界状态机。交易是唯一能触发变化并更新以太坊状态的事物。图\
  \ 4-15 描述了一笔交易中以太坊状态的变化。\n\n以太坊中有三种类型的交易：\n\n1.  在两个 EOA 之间转移资金的交易（例如，Alice 向 Bob\
  \ 发送一个以太币）。\n2.  部署合约的交易。\n3.  与已部署合约函数进行交互并执行的交易（例如，更新代币总供应量）。\n\n### 交易的结构\n\n\
  当用户提交交易时，区块链需要为矿工的挖矿和验证支付 Gas 费用。\n\n让我们使用 Geth 控制台提交一笔转账 0.05 以太币的交易，然后从返回的交易哈希中获取交易收据，如图\
  \ 4-16 所示。\n\n![](img/535492_1_En_4_Fig16_HTML.png)\n\n提交交易并获取收据的代码。代码包含字母数字字符。\n\
  \n图 4-16 提交交易并获取交易收据\n\n从 Geth 的日志中，我们可以看到交易已提交，并生成了一个交易哈希和一个随机数（nonce）：\n\n![](img/535492_1_En_4_Figm_HTML.png)\n\
  \n显示已提交的 Geth 交易及生成的交易哈希的图像，包含文本和字母。\n\n图 4-17 展示了来自 etherscan.io 的交易详情示例。\n\n![](img/535492_1_En_4_Fig17_HTML.png)\n\
  \n概述标签页的截图，列出了交易详情，如交易哈希、状态、区块、发送方和接收方以及价值。同时显示了状态和备注标签页。\n\n图 4-17 提交交易并获取交易收据\n\
  \n一笔交易详情包含以下数据：\n\n**From（发送方）** – 发送方的以太坊地址。  \n**To（接收方）** – 接收方的以太坊地址。  \n**Nonce（随机数）**\
  \ – 交易的序列号。Nonce 由发起交易的原始 EOA 发出。它是一个唯一数字，用于防止重放同一笔交易。  \n**Gas Price（Gas 价格）**\
  \ – 交易创建者支付的每单位 Gas 的交易费用（以 Gwei 为单位）。  \n**Gas Limit（Gas 限制）** – 该交易最多可消耗的 Gas\
  \ 量。  \n**Value（价值）** – 发送给接收方的以太币数量。  \n**Data（数据）** – 交易输入的二进制的载荷数据，仅用于发送消息调用和执行合约函数。\
  \  \n**Signature（签名）** – v, r, s。这是发送方的身份标识。发送方使用 EOA 通过其私钥对交易进行签名。它使用加密的 ECDSA\
  \ 数字签名。v、r 和 s 是交易签名的值。\n\n请花点时间阅读这个长列表。你不需要记住每一个字段。我们描述每个字段是为了帮助你理解它们的含义。当你在以太坊中进行更深入的工作时，这些术语可能会频繁出现。\n\
  \n### 交易收据\n\n在图 4-16 中，我们在运行 `web3.eth.getTransactionReceipt(transactionHash)`\
  \ 后看到了交易收据输出。当交易收据可用时，意味着该交易已被添加到一个区块中。当交易处于待处理（pending）状态时，收据返回 `null`。\n\n以下是交易收据包含的字段：\n\
  \n**BlockHash** – 包含该交易的区块的哈希。  \n**BlockNumber** – 该交易所在区块的编号。  \n**TransactionHash**\
  \ – 字符串，32 字节——交易的哈希。  \n**TransactionIndex** – 交易在区块中的索引位置。  \n**From** – 发送方的以太坊地址。\
  \  \n**To** – 接收方的以太坊地址。如果是合约创建交易，则为 `null`。  \n**CumulativeGasUsed** – 该笔交易以及同一区块中所有先前交易消耗的\
  \ Gas 总量。  \n**GasUsed** – 该笔特定交易消耗的 Gas 总量。  \n**ContractAddress** – 与该交易关联的合约地址。如果交易是合约创建，则返回合约地址，否则为\
  \ `null`。  \n**Logs** – 该交易的日志信息。  \n**Status** – `0x0` 表示交易失败，`0x1` 表示交易成功。\n\n\
  \n\n\n### Block\n\n如第 1 章所述，每个区块都有头部和体部。区块体包含一系列交易。这一点对比特币和以太坊都是成立的。以太坊的区块结构如图 4-18\
  \ 所示。\n\n![](img/535492_1_En_4_Fig18_HTML.jpg)\n\n图 4-18 展示了区块头部和区块体部的两个区块。区块体部包含两个子块：交易和叔块头部。\n\
  \n**图 4-18**  \n以太坊区块结构\n\n以太坊的区块体部还包含“ommer”块，通常被称为“uncle”块（叔块）。当多个区块解决方案被找到时，叔块会被创建，用于奖励矿工。\n\
  \n当多个矿工解出密码学难题并为链提议一个新块时，网络中只会接受其中一个块。由于其他矿工完成了相同的工作，网络会对他们进行奖励。这些被确认的区块将附加到新接受的区块上。我们称之为叔块，如图\
  \ 4-19 所示。\n\n![](img/535492_1_En_4_Fig19_HTML.jpg)\n\n图 4-19 展示了一个三层立方体的流程图，从顶部开始分别标记为\
  \ 1、2 和 3。第一层的立方体 1 指向第二层的两个立方体，分别标记为 2 A（Alice）和 2 B（Bob）。2 A 处有对钩，2 B 处有叉号。2 B\
  \ 立方体通过叔块（uncle）连接到第三层的立方体 3。\n\n**图 4-19**  \n以太坊叔块\n\n例如，在图 4-19 中，有两个区块分别由矿工\
  \ Alice 和矿工 Bob 提议。Alice 的区块（A）最终被接受并添加为新的 2 号区块。Bob 的区块（B）最终被拒绝。然后，网络中的一名矿工使用 Bob\
  \ 的区块（B）创建了一个 3 号区块，并指定 Alice 的区块为父区块，Bob 的区块为叔块/ommer 块。通过这种方式，Alice 将获得全部奖励，而\
  \ Bob 仍能获得部分奖励。\n\n如前所述，每个区块体部都包含一个交易列表。以下是来自`etherscan.io`的一个区块示例。我们可以看到该区块中有 374\
  \ 笔交易，如图 4-20 所示。\n\n![](img/535492_1_En_4_Fig20_HTML.png)\n\n图 4-20 是一个交易表格的截图，列标题包括：`Txn\
  \ hash`、`method`、`block`、`age`、`from`、`to`、`value`和`Txn fee`。该区块中共有 374 笔交易。\n\n\
  **图 4-20**  \n一个区块：交易列表\n\n区块编号为`15039689`。让我们再看看其他区块详情，如图 4-21 所示。\n\n![](img/535492_1_En_4_Fig21_HTML.png)\n\
  \n图 4-21 展示了以太坊区块的详细视图，包括概览和评论。概览是一个列表，包括交易详情、时间戳、难度、大小、Gas 限制和费用。\n\n**图 4-21**\
  \  \n以太坊区块详情\n\n区块头部包含关于以太坊区块的一些关键信息。每个区块头部都有以下重要字段：\n\n*   **区块编号** – 也称为区块高度。区块链祖先区块的长度。第一个区块（创世块）的编号为零。此数字代表链的高度。\n\
  \n*   **难度** – 表示通过哈希或权益证明努力挖掘一个区块的难度。\n\n*   **总难度** – 用一个整数值表示链接到指定区块的难度。\n\n\
  *   **时间戳** – 区块被挖掘时的 UNIX 时间戳。\n\n*   **Nonce** – 请查看“以太坊账户”部分。\n\n*   **父哈希**\
  \ – 也称为前一个哈希。来自前一个区块（或父区块）的哈希。每个区块都包含一个前一个哈希。通过这种方式，我们可以追溯到链中的第一个区块。\n\n*   **受益人**\
  \ – 也称为“Mined by”。这是接收挖矿奖励的受益人矿工地址。\n\n*   **Gas 价格** – 请查看“Gas、Gas Price 和 Gas\
  \ Limit”部分。\n\n*   **Gas 限制** – 请查看“Gas、Gas Price 和 Gas Limit”部分。\n\n*   **大小**\
  \ – 区块的大小，以字节为单位。\n\n*   **哈希** – 区块的唯一 Keccak 哈希值。\n\n*   **额外数据** – 一个包含区块附加数据的字段。当矿工创建区块时，他们可以在此字段中添加任何内容。\n\
  \n*   **状态根**：一种特殊 Merkle 树（存储整个网络状态，也称世界状态）的根节点哈希。它包含所有账户余额、合约存储、合约代码和账户 Nonce\
  \ 的 Keccak 哈希。如果任何数据发生改变，整个状态根的值也会随之改变。\n\n*   **交易根**：存储该区块体中所有交易的交易树（transactions\
  \ trie）的根节点哈希。\n\n*   **收据根**：存储该区块中所有交易收据的交易收据树（transactions receipt trie）的根节点哈希。\n\
  \n到目前为止，我们已经深入了解了以太坊的工作原理，特别是剖析了以太坊的区块、交易、账户和状态，以及这些以太坊区块结构之间的关系。让我们总结一下所学内容，并将其串联起来，如图\
  \ 4-22 所示的以太坊架构图。\n\n![](img/535492_1_En_4_Fig22_HTML.png)\n\n图 4-22 展示了以太坊架构的架构图，包括一个独立的区块中的头部和体部。世界状态树、交易树、收据树指向头部区块中各自的层级。账户状态表、交易表和交易收据表分别指向它们对应的树。账户存储树指向账户状态表。区块体部指向交易收据表。\n\
  \n**图 4-22**  \n以太坊架构：区块、状态、交易\n\n至此，我们已经介绍了以太坊大部分重要的概念。\n\n## 总结\n\n本章的主要目的是介绍以太坊的关键概念。我们从以太坊的历史开始学习，并了解了其背后的关键组件和元素，包括账户、合约和\
  \ Gas。现在，您已经掌握了以太坊账户如何工作的基础知识。我们介绍了以太坊节点和以太坊客户端——`geth`技术及一些示例。我们深入探讨了以太坊架构，理解了以太坊虚拟机（`EVM`）的工作原理，智能合约操作码（Opcode）如何在`EVM`内执行，以及`EVM`中区块、状态和交易的结构。至此，您应该已经准备好进入下一章，开始开发您的第一个智能合约和端到端的去中心化应用程序。我们将向您展示如何逐步构建它。敬请期待。\n\
  \n\n\n"
- "# 5. 智能合约与去中心化应用：从理论到实践\n\n计算机科学家布莱恩·克尼根（Brian Kernighan）于 1972 年为贝尔实验室内部使用的 B\
  \ 语言编写了第一个“Hello, World!”程序。布莱恩撰写了一本名为 *B 语言教程导论* 的手册，用以演示如何使用 B 语言。此后，这段广为人知的文本迅速传播开来。它曾被用于\
  \ 1974 年的贝尔实验室备忘录，以及 1978 年的 *C 程序设计语言* 一书。“Hello, World!”至今依然流行，并已成为新程序员编写第一个程序的标准范例。这段特定的代码能够证明你的代码语法正确、可以编译并执行，而且能持续生成期望的输出。“Hello,\
  \ World!”提供了超过 60 种编程语言的代码实现。\n\n在上一章中，我们从理论上解释了以太坊网络，包括以太坊的关键组件、以太坊虚拟机（EVM）和架构等。加深理解目前已学知识的最佳方法，就是开始动手实践，为以太坊区块链编写智能合约和`Dapps`。\n\
  \n通过使用在线的`Remix`工具，你将学习如何使用所有必需的语法，用`Solidity`编写`HelloWorld`代码。你将从头开始，逐行学习。你还会学习如何在本地编译和部署智能合约，以及部署在全球分布的测试网上。然后，我们将安装`Metamask`钱包并将其连接到测试网。在本地`Dapp`开发环境中设置好所有必要条件后，你将开始以最小的精力开发自己的`Dapp`，用以连接测试网上的合约。在本章结束时，通过掌控你的以太坊钱包，你应该能够运行一个完整的、端到端的`HelloWorld`\
  \ `Dapp`。\n\n本章将帮助你实现以下实际目标：\n\n-   介绍`Remix`\n-   编写你的第一个智能合约\n-   掌控你的第一个以太坊钱包\n\
  -   去中心化应用程序（`Dapps`）\n-   代币标准\n\n在最后一节中，我们将介绍代币标准，其中包含两种最重要的代币——`ERC-20`和`ERC-721`。`ERC-721`是\
  \ NFT 代币标准，我们将在下一章中讲解。\n\n这有助于你更加熟悉智能合约和`Dapps`。\n\n## 介绍 Remix\n\n加文·伍德（Gavin Wood）于\
  \ 2014 年 8 月提出了`Solidity`编程语言。亚历克斯·贝雷格萨斯（Alex Beregszaszi）、克里斯蒂安·雷特维森纳（Christian\
  \ Reitwiessner）以及其他以太坊核心贡献者共同创建了`Solidity`。它是一种受`JavaScript`、`C++`和`Python`启发的高级面向对象编程语言。`Solidity`的目的是在基于\
  \ EVM 的区块链网络上执行智能合约。\n\n有许多工具可用于创建和开发`Solidity`智能合约。`Remix`、`HardHat`、`Truffle`等是`Solidity`开发者常用的工具。`Remix`是一个强大的在线集成开发环境（IDE），用于使用`Solidity`编写、编译、测试和调试智能合约。除了你的网页浏览器，我们不需要安装任何其他特殊软件。\n\
  \n你可以在浏览器的 URL 框中输入以下网址来访问`Remix IDE`:\n\n[`https://remix.ethereum.org`](https://remix.ethereum.org)。然后你将被导航到`Remix`的首页，如图[5-1]所示。\n\
  \n![](img/535492_1_En_5_Fig1_HTML.png)\n\n一张带有工具栏的文件浏览器界面的截图。右侧显示主页，并带有标注为`Remix\
  \ IDE`的标题，其下方显示一条扫描警报消息。\n\n**图 5-1**\n\n`Remix` 首页\n\n你会注意到`Remix`屏幕左侧有一个工具栏菜单。当你点击每个菜单图标时，会看到提供的不同模块。\n\
  \n### 文件浏览器\n\n在`文件浏览器`模块中，你可以管理工作空间，并在工作空间下创建合约文件。当你在多个项目上工作时，工作空间可以帮助你组织不同项目工作空间中的文件。你可以创建智能合约文件、创建文件夹，并将本地文件上传到当前工作空间。它与其他基于云的浏览器工具非常相似，比如\
  \ Google Drive、Dropbox 等。在`contracts`文件夹下，`Remix`会为你创建三个默认合约。如果你不使用它们，可以将其删除。\n\n\
  ![](img/535492_1_En_5_Fig2_HTML.jpg)\n\n一个标注为“默认工作空间”的界面截图，展示了 3 个图标上的 3 个标记。这 3\
  \ 个标记分别是：创建新合约、创建新文件夹和加载本地文件到当前工作空间。\n\n**图 5-2**\n\n`Remix` 文件浏览器页面\n\n### Solidity\
  \ 编译器\n\n在`Solidity 编译器`模块中，你可以选择不同版本的`Solidity`编译器，编写本书时的当前版本是`0.8.7`。由于`Solidity`更新相当频繁，你需要密切关注选择所需的配置。一旦你创建了`Solidity`文件，你可以通过点击编译按钮来编译文件。`Remix`的合约区域将显示文件编译信息，例如错误和警告。`Remix`会持续每隔\
  \ 5 秒自动保存当前文件更改。\n\n![](img/535492_1_En_5_Fig3_HTML.jpg)\n\n一个标注为`Solidity Compiler`的界面截图，展示了带有文件选择和运行选项的高级配置。\n\
  \n**图 5-3**\n\n`Remix` Solidity 编译器页面\n\n### 部署与运行交易\n\n在你编译了智能合约之后，可以使用`部署与运行交易`模块来部署合约。如果你编译了多个合约，需要在`合约编辑器`中选择一个合约进行部署。\n\
  \n![](img/535492_1_En_5_Fig4_HTML.png)\n\n一张标注为`部署与运行交易`页面的截图，包含环境、账户、Gas 限制、数值和合约详情填写表单。下方部分展示了地址添加、交易记录和已部署合约区域。\n\
  \n**图 5-4**\n\n`Remix` 部署与运行交易模块\n\n该模块提供了多种 EVM 环境：\n\n**JavaScript VM** – JS VM\
  \ 拥有自己的沙盒区块链模拟环境，在你的浏览器中运行。它执行交易的速度非常快（无需挖矿）。当你执行交易时，数据仅临时保存在浏览器中。一旦你关闭或重新加载页面，所有交易数据都将丢失。你将不得不从头开始。这对于快速尝试和测试简单合约非常有用。\n\
  \n![](img/535492_1_En_5_Fig5_HTML.jpg)\n\n一张界面上标有`Environment`部分的截图。`Environment`有一个用于选择\
  \ JavaScript、Web Provider 和 Connect List 的框。\n\n**图 5-5**\n\n`Remix` EVM 环境\n\n\
  **注入提供者（Injected Provider）** – `Remix`将连接到注入到浏览器中的`web3`提供者（通常称为你钱包的浏览器扩展）。`Metamask`是目前最流行的`注入提供者`。你也可以使用其他流行的钱包，如`Coinbase`钱包、`Trust\
  \ Wallet`和`Ledger`。你可以通过该提供者连接到以太坊主网络或各种测试网。这使得`Remix`能够与真实网络进行交互。\n\n**Web3 提供者（Web3\
  \ Provider）** – `Remix`将连接到一个远程节点。你需要提供所选提供者的 URL。`Infura`、`Alchemy`和`QuikNode`是一些流行的`Web3`提供者。\n\
  \n### 其他模块\n\n我们已经介绍了我们通常经常使用的重要`Remix`模块。其他模式如插件模块允许你安装所需的插件，例如调试插件、`Solidity`静态分析模块、`Solidity`单元测试模块和设置模块。如果感兴趣，你可以参考`Remix`文档了解详情（[`remix-ide.readthedocs.io`](https://remix-ide.readthedocs.io)）。\n\
  \n在此阶段，我们应该已具备`Remix`的基本知识。\n\n现在，让我们通过编写“Hello, World!”智能合约来开始学习`Solidity`。\n\n\
  \n\n## 编写你的第一个智能合约\n\n根据 `dune.com` 的数据，2022 年第二季度创建的智能合约总数为 93 万个。而 2021 年第二季度，创建的智能合约数量接近\
  \ 600 万个，如图 5-6 所示。在当前的以太坊区块链中，大多数智能合约都使用 Solidity 编程语言。\n\n![](img/535492_1_En_5_Fig6_HTML.png)\n\
  \n智能合约创建柱状图截图，显示 2021 年第二季度合约创建数量最高。\n\n**图 5-6** 从 2021 年第一季度到 2022 年第二季度的智能合约创建数量\n\
  \n### 编写合约\n\n在 Remix 文件浏览器模块中，在 `contracts` 文件夹下，点击创建新合约图标（页面图标）或通过右键单击使用上下文菜单来添加我们的第一个合约。我们将第一个智能合约命名为\
  \ `HelloWorld.sol`。Solidity 智能合约的文件类型总是以 `.sol` 作为扩展名。\n\n#### 软件许可证\n\n在智能合约的第一行，你需要编写智能合约的许可证。SPDX\
  \ 许可证标识符指示相关的许可证信息。MIT 许可证授予任何使用该软件的人复制、修改、合并、分发等权利：\n\n```\n// SPDX-License-Identifier:\
  \ MIT\n```\n\n这里的注释（`//`）是一行出现在 Solidity 程序中但不由程序执行的文本。\n\n#### 编译器指令 (Pragmas)\n\
  \n第二行是像下面这样的编译器指令：\n\n```\npragma solidity ⁰.8.15;\n```\n\n`pragma` 关键字类似于 C 语言，它指定了当前的\
  \ Solidity 编译器。这里的 `0.8.15` 是 Solidity 编译器的版本号。`^` 符号表示此文件将仅支持从 `0.8.7` 版本开始，直到引入会导致此文件无法编译的重大变更为止。例如，`pragma\
  \ solidity >=0.4.0 <0.6.0` 这样的合约在 `0.6.0` 版本中无法编译，因为 Solidity 发生了重大变化。在这种情况下，你需要修改文件中的相关语法以使用新版本。\n\
  \n#### 定义合约\n\n为了让代码更清晰，通常在 `pragma` 条目后面留一个空行。然后，在接下来的代码行中，开始声明合约。在 Solidity 中，我们使用\
  \ `contract` 关键字，后跟合约的名称。在我们的例子中，是 `HelloWorld`。合约名称应与你创建的文件名匹配。合约的内容将包含在花括号 `{}`\
  \ 内：\n\n```\ncontract HelloWorld {\n}\n```\n\n到目前为止，合约应该看起来像图 5-7 所示。\n\n![](img/535492_1_En_5_Fig7_HTML.jpg)\n\
  \nSolidity 编译器配置和编译 Hello World 合约的截图。\n\n**图 5-7** HelloWorld 空合约\n\n#### 声明合约变量\n\
  \n在下一行，我们输入 `string public message`。\n\n这里，`string` 关键字是一种状态变量类型。状态变量是永久存储在合约存储中的值，用于维护合约的状态。\n\
  \n状态变量的可见性可以定义为 `public`、`private` 或 `internal`。在我们的例子中，因为我们将其可见性设置为 `public`，所以\
  \ `message` 字段可以在智能合约外部公开访问。\n\n#### 定义合约构造函数\n\n接下来要创建一个构造函数：\n\n```\nconstructor(string\
  \ memory initMessage) {\nmessage = initMessage;\n}\n```\n\n`HelloWorld.sol` 将看起来像图\
  \ 5-8 所示。\n\n![](img/535492_1_En_5_Fig8_HTML.jpg)\n\n包含消息的 Hello World 合约截图。\n\n\
  **图 5-8** HelloWorld 合约构造函数\n\n构造函数可以被比作一台工厂机器。一旦给出输入，它们就可以执行特定任务并返回结果。\n\n要声明一个构造函数，我们使用\
  \ `constructor` 关键字。一旦创建了构造函数，我们就可以使用同一个构造函数创建许多不同的合约。每当创建一个新合约时，系统会自动调用构造函数；它们只需要使用一次构造函数来创建该合约。如果没有显式定义构造函数，Solidity\
  \ 编译器将会创建一个不接受任何输入的默认构造函数。\n\n大多数情况下，你可能需要一个传递一个或多个参数的构造函数。在 `{}` 内，我们添加初始化逻辑。在我们的示例中，我们传递了\
  \ `string memory initMessage` 输入。这里使用的 `memory` 关键字表示我们希望 `initMessage` 参数是可变的，并且\
  \ `initMessage` 值被赋值给 `message` 变量，并在合约创建期间进行初始化。\n\n#### 定义函数\n\n`HelloWorld` 合约将有两个函数。一个用于更新消息，另一个用于获取消息：\n\
  \n1.  **更新合约消息函数**  \n    更新函数如下所示：\n\n    ```\n    function update(string memory\
  \ newMessage) public {\n    message = newMessage;\n    }\n    ```\n\n2.  **获取合约消息函数**\n\
  \n    ```\n    function getMessage() public view returns (string memory) {\n   \
  \ return message;\n    }\n    ```\n\nSolidity 函数使用 `function` 关键字定义，其后跟：\n\n*  \
  \ 函数的名称。这里 `update` 是函数名。\n*   用括号括起来并用逗号分隔的参数列表（`parameter1`， `parameter2`, ...）。也可以是空的\
  \ `()`。`(string memory newMessage)` 是 `HelloWorld` 函数中的参数。\n*   函数可见性 – `public`、`private`、`internal`\
  \ 和 `external`。\n*   函数行为 – `pure`、`view` 和 `payable`。\n*   其次是在函数有返回值时，可选的 `returns`\
  \ 关键字和返回值类型（`type1`， `type2`, ...）。在我们的 `update` 函数中，我们没有返回值。但在 `getMessage` 中，我们返回\
  \ `(string memory)`。\n*   一个定义函数功能的语句块，用花括号 `{...}` 括起来。\n\n##### 语法\n\n基本语法如下所示：\n\
  \n```\nfunction function_name(…) {internal|external|private|public} [pure |view|payable]\
  \ [returns(…)] {\n//statements\n}\n```\n\n##### 函数可见性\n\n函数的可见性范围可以通过以下四个修饰符之一来设置：\n\
  \n*   **Public** – 可以在内部或外部调用。\n*   **Internal** – 内部函数只能从当前合约及其相关的派生合约内部访问。\n*\
  \   **External** – 可以从其他外部合约调用，但不能在内部（当前合约内部）调用。\n*   **Private** – 类似于内部可见性，但无法从相关的派生合约中访问该函数。\n\
  \n##### 函数行为\n\n`pure`、`constant`、`view` 和 `payable` 关键字决定了 Solidity 函数的行为。\n\n\
  如果未指定函数行为，它将读取并修改区块链的状态。\n\n**纯函数 (Pure Functions)**：确保调用者无法读取或修改状态。\n\n**视图函数 (View\
  \ Functions)**：视图函数是只读函数，确保在调用它们后状态变量不会被修改。\n\n**可支付 (Payable)**：接收普通以太币转账时也会执行可支付的回退函数。\n\
  \n完成 `HelloWorld.sol` 后，你应该有 15 行代码，如图 5-9 所示。\n\n![](img/535492_1_En_5_Fig9_HTML.jpg)\n\
  \nHello World 合约完整代码截图。\n\n**图 5-9** HelloWorld 完成合约\n\n\n\n### 编译合约\n\n正如我们在 EVM\
  \ 部分所学，智能合约在部署到区块链之前需要被编译成`Bytecode`。在此步骤中，我们将编译我们的`HelloWorld`智能合约。\n\n`Remix IDE`\
  \ 允许我们直接从浏览器编译 Solidity 智能合约。点击导航栏中的编译器图标。在 Solidity 编译器页面上，选择`0.8.15`编译器版本；点击编译按钮编译`HelloWorld`智能合约。如果编译成功，您将在导航栏的编译器图标上看到一个绿色对勾。另请注意，编译后会出现带有`应用程序二进制接口（ABI）`和`Bytecode`的编译详情按钮。`ABI`包含\
  \ JSON 格式的数据，这些数据编码了 EVM 能理解的智能合约信息，并为 Dapp 与合约交互提供了标准方式。您可以点击该按钮查看编译详情，如图 5-10\
  \ 所示。结果将包含`Bytecode`、`Abi`、`Assembly (Opcode)`以及其他有用的已编译合约信息。您应将`abi`内容复制到某处；我们将在\
  \ Dapp 部分使用这个`abi`字符串来调用智能合约。\n\n![](img/535492_1_En_5_Fig10_HTML.png)\n\n“Hello\
  \ World”合约的快照，各个部分标记为：字节码、ABI、存储布局、Web3 部署、元数据哈希、函数哈希、Gas 估算、开发者文档、用户文档、运行时字节码和汇编。\n\
  \n**图 5-10** 已编译的 HelloWorld 合约\n\n### 部署并运行合约\n\n要部署我们的合约，请点击左侧菜单中的“部署并运行交易”模块。您会看到一个下拉菜单，列出“合约”标题下的所有可用智能合约，即`HelloWorld`。`HelloWorld.sol`将是默认选中的合约，其正下方有一个橙色的`Deploy`按钮。\n\
  \n![](img/535492_1_En_5_Fig11_HTML.png)\n\n部署并运行交易界面的截图，右侧显示 Hello World 代码。左侧展示了选择环境、账户、Gas\
  \ 上限、金额和合约的选项。\n\n**图 5-11** HelloWorld 合约部署\n\n到目前为止，合约尚未部署。因此，要部署`HelloWorld`，我们需要在`Deploy`按钮旁边提供字符串`initMessage`。\n\
  \n我们可以保留`Environment`为默认选中的`JavaScript VM`、默认选中的账户、`Gas limit`和`value`。让我们输入`Hello\
  \ Solidity`并点击`Deploy`按钮。\n\n![](img/535492_1_En_5_Fig12_HTML.png)\n\n一个标注为“部署并运行交易”的界面截图，左侧展示了\
  \ Hello World 合约输入项和已部署的合约，右侧展示了代码。\n\n**图 5-12** 已部署的 HelloWorld 合约\n\n内置终端控制台显示了部署信息。默认账户的金额因少量\
  \ Gas 费用（即交易费）而减少，从`100.00000 ETH`变为`99.99999 ETH`。\n\n在“已部署合约”面板下，您将看到已部署的`HelloWorld`合约及其合约地址。\n\
  \n如果您展开已部署的`HelloWorld`合约条目，它将显示智能合约中所有定义为`public`的合约项——状态变量或函数。\n\n在我们的示例中，我们可以看到`update`、`getMessage`函数以及`message`变量。\n\
