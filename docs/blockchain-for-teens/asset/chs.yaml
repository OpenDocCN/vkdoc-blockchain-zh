  ### 智能合约


  合约是两方或多方之间就执行特定事项达成的书面或口头协议。


  以下是我们日常生活中的几个例子：


  - **房屋租赁合同** – 房东将房产出租给租户以换取每月付款的租赁协议。

  - **景观美化合同** – 景观设计师与客户之间的义务约定。

  - **软件许可协议** – 软件公司与客户之间授予合法使用软件权利的协议。

  - **个人贷款协议** – 贷款人向借款人提供贷款以换取还款及利息的书面协议。


  一份有效的合同会详细说明正式要求、各方必须遵守的责任、合同事项应如何以及何时履行，以及当这些规则未被遵守时会发生什么。因此，合同对于期望按计划履行义务的每一方来说，都是一份可靠的文档。


  智能合约与此非常相似，但这些详细协议是通过使用计算机代码来实现的。它们一旦在去中心化的区块链网络中创建就无法更改。当条件满足时，智能合约将自动执行，而无需第三方介入。由于区块链是去中心化、不可篡改且透明的，网络中的每个人都可以公开验证智能合约的交易结果。


  尼克·萨博是第一个描述智能合约的人。他在 1997 年发表了一篇论文《智能合约的想法》。他设想将合约转换为代码，以实现无需各方之间信任的自动执行合约。为了说明他的概念，尼克使用自动售货机来解释智能合约的工作原理。当你将正确金额的钱投入机器时，你就会得到想要的产品。自动售货机内部的软件指令保证了合约将按预期履行。如今，这个想法已经传遍了全世界。


  以太坊是最流行的智能合约平台。任何人都可以在区块链上创建智能合约。代码是透明的且可公开验证。每个人都可以看到智能合约的执行逻辑是什么。以下是一个来自 `etherscan.io`
  的 SHIBA INU 示例。


  ![](img/535492_1_En_4_Fig7_HTML.png)


  以太坊 SHIBA INU 合约截图，展示了概览字段选择合约的代币应用和简介摘要。右上角有 4 个下拉图标。


  **图 4-7** 以太坊 SHIBA INU 合约示例


  在以太坊中，智能合约可以用多种编程语言编写，包括 `Solidity` 和 `Vyper`。`Solidity` 是以太坊中最流行的智能合约语言，我们将在后面的章节中进一步探讨。


  每个网络计算机节点都存储所有现有智能合约代码及其当前状态以及交易数据的副本。用户通常需要支付 gas 费来执行智能合约的功能，并将该交易包含在一个新区块中。


  ### 以太坊虚拟机（`EVM`）


  “虚拟机”或“VM”是一种模拟的计算机系统，可用于在物理计算机上运行软件。虚拟机实质上是在模拟计算机系统与运行中的操作系统（如 Windows、macOS 或
  Linux）之间建立了一个隔离层。例如，使用“Parallels Desktop for Mac”，你可以在苹果 Mac 电脑上运行 Windows，如图 4-8
  所示。


  ![](img/535492_1_En_4_Fig8_HTML.jpg)


  一张笔记本电脑图片，显示 Windows 在 Mac 笔记本上运行。菜单栏位于左上角，状态栏位于右上角。底部一行有 15 个图标。


  **图 4-8** 虚拟机示例 – Windows 在 Mac 上运行


  以太坊虚拟机（`EVM`）是一个图灵完备的虚拟机，允许 `EVM 字节码` 在隔离的沙盒运行时环境中运行。`字节码` 由高级智能合约编程语言（如 `Solidity`）编译而来。


  在以太坊上，智能合约通常用一种名为 `Solidity` 的高级编程语言编写。`Solidity` 编译器将智能合约编译为低级二进制机器码（`字节码`）。用户只需发送一条包含这些
  `字节码` 的以太坊交易，该交易无需指定任何接收者。一旦合约交易被提交到区块链，就会创建一个新的以太坊账户。合约账户存储了合约余额、合约 nonce、代码和数据。合约账户的存储哈希本质上是智能合约数据的哈希值。合约地址的创建是基于发送方的
  `EOA` 地址和 nonce 确定的。`RLP` 编码后的 nonce 和 `EOA` 地址数据使用 `keccak-256` 算法进行哈希处理。`RLP`（递归长度前缀）是一种对任意嵌套的二进制数据数组进行编码的方式。当你调用一个智能合约函数时，你是在与该合约地址进行交互，合约存储的
  `操作码` 将指示 `EVM` 执行该操作。合约部署过程如图 4-9 所示。


  ![](img/535492_1_En_4_Fig9_HTML.png)


  一个从人物图形流经 `EOA`、智能合约、`字节码` 和 `OPCODE`、合约地址，以及 `EVM` 区块图的流程图。


  **图 4-9** 智能合约部署


  合约编译后，编译器会生成 `Abi`、`字节码` 和 `操作码`。`ABI`（应用程序二进制接口）是一个 `JSON`（JavaScript 对象表示法）文件，描述了已部署的合约及其函数。它允许我们从外部调用合约函数。`字节码`
  和 `操作码`（operation code）是紧凑的二进制表示形式。它们存储在区块链上，并与合约地址相关联。


  `EVM` 运行时环境会将 `字节码` 解释为对应的一系列 `操作码` 指令集，并在用户调用智能合约时执行这些 `操作码`。图 4-10 显示了已编译合约的 `字节码`
  和 `操作码` 示例。


  ![](img/535492_1_En_4_Fig10_HTML.png)


  字节码和操作码。它们分别以“object”和“opcodes”开头。代码由数字和字母组成。


  **图 4-10** Solidity 编译后的 `字节码` 和 `操作码` 示例


  你可以从以太坊官网 ([`ethereum.org/en/developers/docs/evm/opcodes/`](https://ethereum.org/en/developers/docs/evm/opcodes/))
  找到每个 `字节码` 对应的 `操作码` 参考。大约有 148 个独特的 `操作码`，这使得 `EVM` 能够计算几乎任何任务，从而使其成为图灵完备的机器。


  `操作码` 可以分为以下几类：


  -   算术运算、比较和按位逻辑运算（`ADD`、`SUB`、`GT`、`LT`、`AND`、`OR` 等）

  -   执行上下文查询（`CALL`、`DELEGATECALL`、`CALLCODE` 等）

  -   栈、内存和存储访问（`POP`、`PUSH`、`UP`、`SWAP`、`LOAD`、`STORE`、`MSSTORE 8`、`M SIZE` 等）

  -   控制流操作（`STOP`、`RETURN`、`REVERT` 等）




  '
- "# 日志、调用及其他操作码（`LOG0`、`LOG1`、`LOG2` 等）\n\n让我们用前面的字节码示例来模拟 EVM 解释器。我们将重点关注合约字节码的前\
  \ 16 个字节：`6080604052348015`。根据操作码参考表，我们可以将字节码转换为操作码，如表 4-3 所示。\n\n**表 4-3** 字节码到操作码的转换（`6080604052348015`）\n\
  \n| 字节码 | 操作码 | 参考(`Opcode`, 名称) | 描述 | Gas |\n| --- | --- | --- | --- | --- |\n\
  | `60 80` | `PUSH1 0x80` | `0x60` = `PUSH1` | 复制第 1 个栈顶元素 | 3 |\n| `60 40` | `PUSH1\
  \ 0x40` | `0x60` = `PUSH1` | 复制第 1 个栈顶元素 | 3 |\n| `52` | `MSTORE` | `0x52` = `MSTORE`\
  \ | 将字保存到内存 | 3* |\n| `34` | `CALLVALUE` | `0x34` = `CALLVALUE` | 获取指令存入的价值 | 2\
  \ |\n| `80` | `DUP1` | `0x80` = `DUP1` | 复制第 1 个栈顶元素 | 3 |\n| `15` | `ISZERO` |\
  \ `0x15` = `ISZERO` | 简单的非运算符 | 3 |\n\nEVM 是一个简单的基于栈的执行机器，它会执行操作码指令。栈（有时称为“下推栈”）是一个线性的元素集合，新元素插入到最后一个位置（称为“栈顶”），而现有元素的移除总是在栈顶位置进行。它也被称为后进先出（LIFO）。在上述已解释的操作码示例中，我们期望\
  \ EVM 按顺序执行标准的栈操作：\n\n![](img/535492_1_En_4_Figa_HTML.jpg)\n\n一个逐步展示字节码到操作码转换流程的文本形式示意图。\n\
  \nEVM 栈的深度为 *1024* 个元素，每个元素包含一个 256 位（32 字节）的字，或者 32 个块，其中每个块的大小为 8 位（1 字节）。采用 256\
  \ 位的原因主要是为了将 Keccak-256 加密哈希函数应用于任意数量的输入，并将其转换为一个唯一的 256 位哈希值。在 EVM 中，合约可以存储和读取上述项目中的数据。EVM\
  \ 有三个可存储项目的地方——存储、内存和栈。\n\n内存是用来短期保存临时值的位置。在智能合约函数调用之间，它会被清除。\n\n当从内存读取数据时，EVM 会使用\
  \ `MLOAD`。要写入 32 字节（256 位）的数据，会使用操作码 `MSTORE`。当写入 1 字节（8 位）的数据时，EVM 会使用 `MSTORE8`。图\
  \ 4-11 展示了 EVM 如何使用操作码来读取和写入合约内存。\n\n![](img/535492_1_En_4_Fig11_HTML.png)\n\n一个由具有入栈和出栈操作的堆叠内存块组成的框图。它带有“E\
  \ V M 栈”标签。向内和向外的箭头分别标注为 `MSTORE` 和 `MLOAD`。\n\n**图 4-11** 操作码读取和写入合约内存\n\n存储是永久保存数据的地方。当在\
  \ EVM 中运行的智能合约使用永久存储时，这些数据将成为以太坊状态的一部分。你可以将存储视为一个数组，其中每个数组项的大小为 256 位（32 字节）。外部读取存储值是不需要费用的。然而，向存储写入数据的成本非常高，其操作码是\
  \ `SSTORE`，目前每个 32 字节字的成本是 20,000 Gas。让我们来看看成本是多少。\n\n首先，将 Gas（Gwei）转换为 ETH - `20,000\
  \ * 0.000000001 ETH = 0.00002 ETH`，\n\n然后，计算成本：`$1100 * 0.00002 = $0.022`。\n\n向存储写入的成本是向内存写入成本的\
  \ 6000 倍以上。\n\n在前面的表格（表 4-3）中，我们列出了操作码指令在 Gas 成本方面的前几个步骤，每个操作码都有其自己的基础 Gas 成本。所有以太坊合约的执行都是公开进行的。攻击者可以创建合约来执行大量、昂贵的操作（DDoS——分布式拒绝服务攻击）以拖慢以太坊网络。通过在每次\
  \ EVM 操作码执行中包含 Gas 成本，以太坊网络可以防止此类攻击。\n\n## 以太坊节点\n\n在互联网上，任何连接到网络的系统或设备也称为节点。区块链网络也是如此。当一个节点连接到以太坊网络时，它会下载一份区块链数据的副本，并参与网络通信，与其他节点进行交互。根据\
  \ `etherscan.io` 的数据，大约有 4,131,021 个节点连接到以太坊网络。\n\n节点有三种类型：全节点、归档节点和轻节点。每种类型的节点消耗数据的方式不同。\n\
  \n### 全节点\n\n全节点将存储所有最近的区块链数据，运行自己的 EVM 环境，并能执行 EVM 指令。它们在参与区块链交易验证和维护区块链当前状态时会很有帮助。当一个新区块中的交易不符合以太坊规范定义的规则时，它们将被丢弃。例如，如果\
  \ Alice 向 Bob 发送 50 ETH，但 Alice 的账户没有足够的以太币，或者在支付了非常少的 Gas 费用时，全节点在验证交易时会将其标记为无效并回滚。一个全节点可以直接部署智能合约，并与网络中的任何智能合约进行交互。\n\
  \n一个全节点会存储有限数量的最新区块。默认情况下是 128 个（如果使用快速同步选项，则为 64 个）。每个以太坊区块的大小通常约为 80KB，或者在十分钟内约为\
  \ 4 MB。这 128 个区块大约包含最近一周的跟踪数据。当你查询无法从全节点获取的历史区块数据时，通常会收到“缺失状态树节点”错误。这个错误意味着你需要一个归档节点。\n\
  \n当一个全节点首次连接到网络时，同步全节点数据可能非常耗时，可能需要数周才能完成同步！之后，节点需要保持在线以进行区块数据的升级和维护。否则，它必须重复完整的同步过程。创建一个新区块通常需要\
  \ 13 秒。当新数据到达时，全节点可能会删除旧的区块链数据以节省磁盘空间。\n\n运行一个使用快速同步的全节点的硬件要求：\n\n- 配备 4 核或更多核心的快速\
  \ CPU\n- 16 GB 或更大的内存\n- 至少 500 GB 可用空间的快速固态硬盘\n- 25 MBit/s 或更高的带宽\n\n### 归档节点\n\
  \n归档节点使用一种称为“归档模式”的特殊配置运行。归档节点会存储自创世区块以来的所有区块链数据。它还构建了一个历史状态的归档。\n\n当前归档型以太坊区块链的大小约为\
  \ 12 TB。\n\n通常，在大多数情况下，我们不需要归档节点数据。全节点可以提供大部分数据，例如检查账户余额、转账等。但有时，你可能需要查询去年的账户余额、你曾经拥有的资产或交易。全节点会定期修剪数据，只存储最近\
  \ 128 个区块的数据（大约 25 分钟）。节点必须重新同步才能获取更早的数据，这会导致数据提取速度过慢。归档节点本地拥有所有数据，可以快速获取过去的数据。\n\
  \n归档节点数据通常用于区块链服务，如区块浏览器、数据分析等。同步完整的归档节点数据将比全节点同步花费更长的时间。可能需要至少一个月。\n\n以下是运行一个完整归档节点的硬件要求：\n\
  \n- 配备 4 核或更多核心的快速 CPU。\n- 16 GB 或更大的内存。\n- 至少 6 TB+ 可用空间的快速固态硬盘。\n- 25 MBit/s 或更高的带宽。\n\
  \n### 轻节点\n\n轻节点仅下载最少的区块头信息，并通过检查区块头中的状态根来验证数据的有效性。轻节点被设计为以全节点作为中介进行交互，并依赖全节点来执行区块链操作，从请求账户余额到与智能合约交互。因此，轻节点无需保持在线状态，也无需在本地存储大量千兆字节的数据。轻节点对于在低内存和计算设备（如手机、物联网设备和笔记本电脑）上运行非常有用。\n\
  \n\n\n### 以太坊客户端\n\n正如我们刚刚学到的，轻客户端主要在移动设备上实现。虽然搭建全节点或归档节点需要很长时间来同步，但运行自己的节点有诸多好处：\n\
  \n1. 你的节点可以作为网络验证者来验证所有交易和区块。\n2. 你可以自行验证应用客户端的交易数据，无需第三方来验证交易——“勿信，请验证。”\n3. 你将拥有当前网络状态的一致视图，无需依赖那些数据可能延迟或不可信的其他公共节点或服务。\n\
  4. 你将拥有更高的数据隐私性。当你使用第三方软件或工具提交交易时，这些服务可能会读取你的 IP 地址以及账户信息。IP 地址会暴露你当前的位置。\n\n要同步并与以太坊网络通信，你需要安装以太坊客户端软件。最常用的以太坊客户端是\
  \ `Geth`。`etherscan.io` 显示，90.3% 的以太坊节点安装 `Geth` 作为客户端加入网络，并与其他节点建立 p2p 通信通道。图表\
  \ 4-12 展示了总体以太坊客户端使用情况。\n\n![](img/535492_1_En_4_Fig12_HTML.jpg)\n\n一个饼状图展示了整体以太坊客户端使用情况。最常用的以太坊客户端是\
  \ `Geth`，占比 90.3%。还估算了其他 8 种客户端的使用情况。\n\n**图 4-12** 总体以太坊客户端使用情况\n\n`Geth`（Go Ethereum）是一个开源命令行界面（cli），用于运行用谷歌编程语言\
  \ Go 编写的以太坊节点。\n\n以太坊社区构建并维护了 Go Ethereum。\n\n使用 `Geth`，节点可以执行交易、挖矿、账户间转账以太币，以及在以太坊区块链上部署和与智能合约交互。`Geth`\
  \ 可以直接从 `Geth` 的官方网站 [`https://geth.ethereum.org/downloads/`](https://geth.ethereum.org/downloads/)\
  \ 下载。该网站提供标准的安装指南。\n\n安装好 `Geth` 后，你可以以同步模式运行 `Geth`，成为全节点、轻节点或归档节点。\n\n同步全节点的 `Geth`\
  \ 命令：\n\n```\ngeth --syncmode full\n```\n\n当同步模式为全模式时，`Geth` 将下载所有区块并从创世区块重放所有交易。全节点的状态将在内存中保留最后的\
  \ 128 个区块。\n\n同步轻节点的 `Geth` 命令：\n\n```\ngeth --syncmode light\n```\n\n当同步模式为轻模式时，`Geth`\
  \ 将下载最新的 2300 个区块并重放相关交易。因此，轻模式的同步过程比全模式快得多。\n\n同步归档节点的 `Geth` 命令：\n\n```\nsyncmode\
  \ full --gcmode archive\n```\n\n`Geth` 将下载所有区块，从创世区块重放所有交易，并将所有中间状态写入归档磁盘。\n\n以太坊社区中还有许多其他可用的以太坊客户端。这些客户端由不同的团队开发，并使用不同的编程语言实现。所有这些客户端都在行业中被积极使用。表格\
  \ 4-4 总结了不同客户端的用途。\n\n**表 4-4** 以太坊客户端\n\n| 客户端 | 编程语言 | 磁盘空间（快速同步） | 磁盘空间（完整归档）\
  \ |\n| --- | --- | --- | --- |\n| `Geth` | Go | 400 GB+ | 6 TB+ |\n| `OpenEthereum`\
  \ | Rust | 280 GB+ | 6 TB+ |\n| `Besu` | Java | 750 GB+ | 5 TB+ |\n| `Nethermind`\
  \ | C#, .NET | 200 GB+ | 5 TB+ |\n\n`Geth` 拥有一个使用 `GoJa JS 虚拟机` 构建的 JavaScript 控制台。\n\
  \n`Geth` 拥有内置的 JavaScript 控制台，并支持所有标准的 `web3 JSON-RPC API`，称为 `web3.js`，它与 `ECMAScript\
  \ 5.1` 兼容。你可以使用 `JSON-RPC API` 与你的节点交互。`Geth` 支持多种方式让客户端应用向节点发送原始 JSON 对象。其中一种最广泛使用的协议称为基于\
  \ HTTP 的 JSON-RPC。JSON 代表 JavaScript 对象表示法。它是一种在服务器和 Web 应用之间传输数据的开放标准文件格式。在 JSON\
  \ 文件中，数据以键/值对的形式存在，并用逗号分隔。以下是一个示例：\n\n```json\n{\n'name': 'Alice',\n'gender': 'Female',\n\
  'account': 12345\n}\n```\n\nRPC 代表“远程过程调用”，用于其他远程系统进程。当客户端应用使用基于 HTTP 的 JSON-RPC\
  \ 向 `Geth` 发送 JSON 数据时，`Geth` 将执行区块链中由 `Web3 API` 提供的特定任务。Web3 运行在 RPC 层之上，如图 4-13\
  \ 所示。\n\n![](img/535492_1_En_4_Fig13_HTML.jpg)\n\n一个模式图描述了客户端应用、以太坊客户端、全节点 E V M\
  \ 和以太坊区块链之间的相互关系。\n\n**图 4-13** 通过 JSON-RPC 调用以太坊客户端\n\n#### Geth 控制台\n\n要启动 `Geth`\
  \ JavaScript 控制台，你可以运行 `Geth attach` 命令并配合 IPC。IPC（进程间通信）提供对所有 `Web3 API` 的无限制访问。当\
  \ `Geth` 控制台与 `Geth` 节点运行在同一台机器上时，你可以使用 IPC 进行连接。\n\n打开运行中的 `Geth` 实例的控制台，结果将如下所示：\n\
  \n![](img/535492_1_En_4_Figb_HTML.jpg)\n\n`Geth` JavaScript 控制台的代码。它包含以下标签：instance、coinbase、at\
  \ block、datadir、modules 和 exit\n\n要获取对 `Web3 API`（包括 `eth`、`personal`、`admin` 和\
  \ `miner`）的支持，`Geth` 控制台提供了 `web3` 命令。让我们来看看与 `eth` 相关的 API。在 `Geth` 控制台中输入 `eth`。它将显示所有支持的\
  \ `eth` 命令。\n\n![](img/535492_1_En_4_Figc_HTML.jpg)\n\n以 `eth.` 开头的 `eth` 命令列表。\n\
  \n要列出网络中你当前的所有账户，只需运行以下命令：\n\n```\neth.accounts.\n```\n\n列出的账户输出应该类似于以下内容：\n\n![](img/535492_1_En_4_Figd_HTML.jpg)\n\
  \n一段文本代表了控制台中 `eth.accounts` 的输出。它由数字和字母组成。\n\n要检查账户余额，并将 wei 转换为 ether，请运行以下命令：\n\
  \n```\neth.getBalance('0x88437244acbb6276de36175740a8d686a9531ba7') 以获取 wei 余额\n\
  ```\n\n或者，我们可以直接转换为 ether：\n\n```\nweb3.fromWei(eth.getBalance('0x88437244acbb6276de36175740a8d686a9531ba7'),'ether')\n\
  ```\n\n![](img/535492_1_En_4_Fige_HTML.jpg)\n\n一张图片包含从 `eth.getBalance` 开始并直接转换为\
  \ `web3` 的获取账户余额的代码。\n\n要获取区块链的最新区块编号，请运行以下命令：\n\n![](img/535492_1_En_4_Figf_HTML.jpg)\n\
  \n一张图片包含获取区块链区块编号的命令，运行命令 `>eth.blockNumber` 并显示 518560。\n\n然后，你可以通过调用以下命令显示匹配区块的摘要信息：\n\
