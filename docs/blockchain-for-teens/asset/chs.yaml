  \ 已部署合约及 Gas 费用\n\n当你点击“合约部署”时，会显示部署信息的详情。\n\n![](img/535492_1_En_5_Fig23_HTML.png)\n\
  \n一张标有“已确认”的合约部署状态和交易详情截图。\n\n**图 5-23** – 合约部署详情\n\n你可以点击“在区块浏览器中查看”。该链接将跳转到 `etherscan.io`\
