    \ completed contract"
  trans: "\n# 编写你的第一个智能合约\n\n根据 `dune.com` 的数据，2022 年第二季度创建的智能合约总数为 93 万个。而 2021 年第二季度，创建的智能合约数量接近\
    \ 600 万个，如图 5-6 所示。在当前的以太坊区块链中，大多数智能合约都使用 Solidity 编程语言。\n\n![](img/535492_1_En_5_Fig6_HTML.png)\n\
    \n智能合约创建柱状图截图，显示 2021 年第二季度合约创建数量最高。\n\n**图 5-6** 从 2021 年第一季度到 2022 年第二季度的智能合约创建数量\n\
    \n## 编写合约\n\n在 Remix 文件浏览器模块中，在 `contracts` 文件夹下，点击创建新合约图标（页面图标）或通过右键单击使用上下文菜单来添加我们的第一个合约。我们将第一个智能合约命名为\
    \ `HelloWorld.sol`。Solidity 智能合约的文件类型总是以 `.sol` 作为扩展名。\n\n### 软件许可证\n\n在智能合约的第一行，你需要编写智能合约的许可证。SPDX\
    \ 许可证标识符指示相关的许可证信息。MIT 许可证授予任何使用该软件的人复制、修改、合并、分发等权利：\n\n```\n// SPDX-License-Identifier:\
    \ MIT\n```\n\n这里的注释（`//`）是一行出现在 Solidity 程序中但不由程序执行的文本。\n\n### 编译器指令 (Pragmas)\n\
    \n第二行是像下面这样的编译器指令：\n\n```\npragma solidity ⁰.8.15;\n```\n\n`pragma` 关键字类似于 C 语言，它指定了当前的\
    \ Solidity 编译器。这里的 `0.8.15` 是 Solidity 编译器的版本号。`^` 符号表示此文件将仅支持从 `0.8.7` 版本开始，直到引入会导致此文件无法编译的重大变更为止。例如，`pragma\
    \ solidity >=0.4.0 <0.6.0` 这样的合约在 `0.6.0` 版本中无法编译，因为 Solidity 发生了重大变化。在这种情况下，你需要修改文件中的相关语法以使用新版本。\n\
    \n### 定义合约\n\n为了让代码更清晰，通常在 `pragma` 条目后面留一个空行。然后，在接下来的代码行中，开始声明合约。在 Solidity 中，我们使用\
    \ `contract` 关键字，后跟合约的名称。在我们的例子中，是 `HelloWorld`。合约名称应与你创建的文件名匹配。合约的内容将包含在花括号 `{}`\
    \ 内：\n\n```\ncontract HelloWorld {\n}\n```\n\n到目前为止，合约应该看起来像图 5-7 所示。\n\n![](img/535492_1_En_5_Fig7_HTML.jpg)\n\
    \nSolidity 编译器配置和编译 Hello World 合约的截图。\n\n**图 5-7** HelloWorld 空合约\n\n### 声明合约变量\n\
    \n在下一行，我们输入 `string public message`。\n\n这里，`string` 关键字是一种状态变量类型。状态变量是永久存储在合约存储中的值，用于维护合约的状态。\n\
    \n状态变量的可见性可以定义为 `public`、`private` 或 `internal`。在我们的例子中，因为我们将其可见性设置为 `public`，所以\
    \ `message` 字段可以在智能合约外部公开访问。\n\n### 定义合约构造函数\n\n接下来要创建一个构造函数：\n\n```\nconstructor(string\
    \ memory initMessage) {\nmessage = initMessage;\n}\n```\n\n`HelloWorld.sol` 将看起来像图\
    \ 5-8 所示。\n\n![](img/535492_1_En_5_Fig8_HTML.jpg)\n\n包含消息的 Hello World 合约截图。\n\
    \n**图 5-8** HelloWorld 合约构造函数\n\n构造函数可以被比作一台工厂机器。一旦给出输入，它们就可以执行特定任务并返回结果。\n\n\
    要声明一个构造函数，我们使用 `constructor` 关键字。一旦创建了构造函数，我们就可以使用同一个构造函数创建许多不同的合约。每当创建一个新合约时，系统会自动调用构造函数；它们只需要使用一次构造函数来创建该合约。如果没有显式定义构造函数，Solidity\
    \ 编译器将会创建一个不接受任何输入的默认构造函数。\n\n大多数情况下，你可能需要一个传递一个或多个参数的构造函数。在 `{}` 内，我们添加初始化逻辑。在我们的示例中，我们传递了\
    \ `string memory initMessage` 输入。这里使用的 `memory` 关键字表示我们希望 `initMessage` 参数是可变的，并且\
    \ `initMessage` 值被赋值给 `message` 变量，并在合约创建期间进行初始化。\n\n### 定义函数\n\n`HelloWorld`\
    \ 合约将有两个函数。一个用于更新消息，另一个用于获取消息：\n\n1.  **更新合约消息函数**  \n    更新函数如下所示：\n\n    ```\n\
    \    function update(string memory newMessage) public {\n    message = newMessage;\n\
    \    }\n    ```\n\n2.  **获取合约消息函数**\n\n    ```\n    function getMessage() public\
    \ view returns (string memory) {\n    return message;\n    }\n    ```\n\nSolidity\
    \ 函数使用 `function` 关键字定义，其后跟：\n\n*   函数的名称。这里 `update` 是函数名。\n*   用括号括起来并用逗号分隔的参数列表（`parameter1`，\
    \ `parameter2`, ...）。也可以是空的 `()`。`(string memory newMessage)` 是 `HelloWorld` 函数中的参数。\n\
    *   函数可见性 – `public`、`private`、`internal` 和 `external`。\n*   函数行为 – `pure`、`view`\
    \ 和 `payable`。\n*   其次是在函数有返回值时，可选的 `returns` 关键字和返回值类型（`type1`， `type2`, ...）。在我们的\
    \ `update` 函数中，我们没有返回值。但在 `getMessage` 中，我们返回 `(string memory)`。\n*   一个定义函数功能的语句块，用花括号\
    \ `{...}` 括起来。\n\n#### 语法\n\n基本语法如下所示：\n\n```\nfunction function_name(…) {internal|external|private|public}\
    \ [pure |view|payable] [returns(…)] {\n//statements\n}\n```\n\n#### 函数可见性\n\n\
    函数的可见性范围可以通过以下四个修饰符之一来设置：\n\n*   **Public** – 可以在内部或外部调用。\n*   **Internal** –\
    \ 内部函数只能从当前合约及其相关的派生合约内部访问。\n*   **External** – 可以从其他外部合约调用，但不能在内部（当前合约内部）调用。\n\
    *   **Private** – 类似于内部可见性，但无法从相关的派生合约中访问该函数。\n\n#### 函数行为\n\n`pure`、`constant`、`view`\
    \ 和 `payable` 关键字决定了 Solidity 函数的行为。\n\n如果未指定函数行为，它将读取并修改区块链的状态。\n\n**纯函数 (Pure\
    \ Functions)**：确保调用者无法读取或修改状态。\n\n**视图函数 (View Functions)**：视图函数是只读函数，确保在调用它们后状态变量不会被修改。\n\
    \n**可支付 (Payable)**：接收普通以太币转账时也会执行可支付的回退函数。\n\n完成 `HelloWorld.sol` 后，你应该有 15 行代码，如图\
    \ 5-9 所示。\n\n![](img/535492_1_En_5_Fig9_HTML.jpg)\n\nHello World 合约完整代码截图。\n\n\
    **图 5-9** HelloWorld 完成合约\n"
- fmt: '### Compile a Contract


    As we learned in the EVM section, the smart contract needs to be compiled to `Bytecode`,
    before it can be deployed to the blockchain. In this step, we will compile our
    `HelloWorld` smart contract.


    `Remix IDE` allows us to compile our Solidity smart contracts directly from our
    browser. Click on the compiler icon in the navigation. On the Solidity compiler
    page, select `0.8.15` compiler version; click the compile button to compile `HelloWorld`
    smart contract. If it compiles successfully, you will see a green checkmark on
    the compiler icon in the navigation. Notice also that compilation details button
    with `Application Binary Interface (ABI)` and `Bytecode` will show up after compiling.
    `ABI` contains JSON format data which encodes smart contract information that
    EVM understands and provides the standard way for Dapp to interact with contracts.
    You can check compilation detail by clicking the button, as shown in Figure [5-10](#535492_1_En_5_Chapter.xhtml#Fig10).
    The result will have `Bytecode`, `Abi`, `Assembly (Opcode)`, and other useful
    compiled contract information. You should copy `abi` content to some place; we
    will use this `abi` String in Dapp section to call with smart contract.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig10_HTML.png)


    Snapshot of the hello world contract with sections marked as bytecode, a b i,
    storage layout, web 3 deploy, meradata hash, function hashes, gasestimates, devdoc,
    userdoc, runtime bytecode, and assembly.


    **Figure 5-10** Compiled HelloWorld contract


    ### Deploy and Run a Contract


    To deploy our contract, click on deploy and run transactions module on the left
    menu. You should see a dropdown menu listing all the available smart contracts
    under the Contract Heading, `HelloWorld`. `HelloWorld.sol` will be the default
    selected contract, with an orange `Deploy` button directly beneath it.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig11_HTML.png)


    A screenshot of deploy and run transactions interface displaying hello world code
    on the right. The left side illustrates options for selecting environment, account,
    gas limit, value, and contract.


    **Figure 5-11** HelloWorld contract deployment


    So far the contract hasn’t been deployed yet. So, to deploy `HelloWorld`, we need
    to provide the string `initMessage` just beside the `Deploy` button.


    We can leave `Environment` as default selected `JavaScript VM`, default selected
    account, `Gas limit`, and `value`. Let’s enter `Hello Solidity` and click the
    `Deploy` button.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig12_HTML.png)


    A screenshot of an interface labeled deploy and run transactions illustrating
    hello world contract entry and deployed contracts on the left and the code on
    the right.


    **Figure 5-12** Deployed HelloWorld contract


    The built-in terminal console shows deployment information. The default account
    amount was reduced by a small amount of gas fee, or a transaction fee, from `100.00000
    ETH` to `99.99999 ETH`.


    Under deployed contracts panel, you will see deployed `HelloWorld` contract with
    the contract address.


    If you expand the deployed `HelloWorld` contract entry, it will show all contract
    items—state variables or functions—defined as `public` in your smart contract.


    We can see the `update`, `getMessage` function, and `message` variables in our
    case.


    When you click the `message` button, you should see `"Hello Solidity"` under the
    `message` button. The same thing happens when you click the `getMessage` button.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig13_HTML.jpg)


    A screenshot labeled as deployed contacts illustrates a section as hello world
    message deployed to contracts.


    **Figure 5-13** Call HelloWorld contract message


    To change the message, enter `"Hello Ethereum"` for the `update` function and
    then click the button to set the new value.


    You can validate that the `message` variable was updated by clicking on the `getMessage`
    function or `message` variable.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig14_HTML.jpg)


    A screenshot of the hello world message updated. The new message is hello ethereum.


    **Figure 5-14** Update HelloWorld contract message


    Congratulations! You have successfully written your very first Hello World smart
    contract in Solidity and deployed it to the blockchain. To learn more about Solidity,
    you can visit the Solidity Official Documentation (`https://docs.soliditylang.org/en/v0.8.15/contracts.xhtml`).'
