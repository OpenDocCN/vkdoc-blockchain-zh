  trans: '

    ### 第二层：资产层


    资产层位于结算层之上。该层包含所有代币，包括像以太币这样的原生协议代币资产，以及在区块链上发行的任何其他代币，如 `ERC-20`、`NFT` 等。在这一层，值得一提的是稳定币。


    在第一章 1 中，我们了解到加密货币市场的高波动性给许多金融产品和日常消费带来了风险。稳定币通过提供稳定的价值，为投资者提供了一个避风港，以最大程度地减少价格波动。其价值与另一种波动性较低的资产（通常是美元或英镑等流行货币）挂钩。稳定币充当交换媒介，并广泛用作
    DeFi 日常交易的货币。我们将在后面的去中心化稳定币部分进行更多讨论。以下是 DeFi 中一些流行的稳定币：Tether、USD Coin、Binance
    USD、TrueUSD、DAI 和 Pax Dollar。


    ### 第三层：协议层


    协议层为特定行业提供了一套参与者同意遵循的原则和规则。这些协议以智能合约的形式编写，用于管理 DeFi 交易，并能够在没有中心化机构或第三方干预的情况下，以预定义的方式自动执行。许多
    DeFi 协议通常由去中心化自治组织（DAO）管理。


    去中心化自治组织（DAO）是一个没有中心化权威的组织——没有首席执行官，没有董事会，没有需要服从或服务的经理，是一种自治和自治理模式。决策自下而上做出，并分布在整个社区代币持有者之间，他们参与并投票。要成为代币持有者，用户必须购买加密货币才能成为成员。DAO
    的所有投票都发布在区块链上，使所有操作都可审计。智能合约制定了 DAO 的规则，并将在满足一组条件时自动执行。整个 DAO 流程是完全透明和自治的。


    2020 年，DeFi 借贷协议 Aave 推出了自己的治理代币，以实现自治和去中心化治理。DAO 社区投票将决定 Aave 的市场政策和协议政策，这些政策以
    Aave 改进提案（AIP）的形式正式确定。此后，其他 DeFi 项目也采用了这种模式，并向 DAO 转型。流行的 DeFi 项目使用 DAO，如 Uniswap、Maker
    DAO、BitDAO、Aragon、Decred、0X、Dash、Compound 和 Curve DAO。


    在此层定义的所有协议都具有高度互操作性，可被任何同时构建的去中心化应用使用，并为 DeFi 生态系统提供流动性。该层的主要协议包括借贷、交易所、保险、资产管理等。我们将在
    DeFi 产品部分提供详细的 DeFi 用例。


    ### 第四层：应用层


    应用层运行连接各个协议的用户特定应用程序。这些应用程序提供 DeFi 服务，通常构建去中心化应用以与协议层上一组智能合约的功能进行交互，例如资产管理、贷款和保险应用程序。


    ### 第五层：聚合层


    随着 DeFi 呈指数级增长，DeFi 生态系统中的新平台和协议数量迅速出现。因此，密切关注所有即将推出的 DeFi 产品变得日益具有挑战性。


    聚合层利用应用层来聚合各种应用和协议，以提供更广泛的服务和工具，并允许用户通过连接多个协议和应用来高效执行复杂任务。DeFi 聚合平台提供了简单的一站式解决方案，允许用户使用单个聚合仪表盘来执行多种类型的
    DeFi 交易。这些聚合平台在活跃的 DeFi 用户中变得非常流行。2020 年中期，大约 20% 的去中心化交易量是通过 DeFi 聚合器完成的。


    顶级的 DeFi 聚合器示例之一是 `1inch`。它被设计为价格聚合器，提供工具来提取在多个去中心化交易所（DEX）上交易的各种代币的价格数据。`1inch`
    聚合器使用自定义的包装智能合约，以当前汇率包装/解包装代币。交易者可以在不同去中心化交易所之间探索和交易加密货币。聚合器支持在以太坊、币安智能链、Polygon、Optimistic
    Ethereum、Arbitrum、Avalanche、Gnosis Chain 以及许多其他区块链上的流行去中心化交易所进行加密货币兑换。图 8-4 展示了
    `1inch` 聚合器界面。


    ![](img/535492_1_En_8_Fig4_HTML.png)


    两张 1inch 聚合器界面的截图，展示了选择代币界面，其中包含以太币和美元硬币。连接钱包选项包含条款，并列出了网络和钱包。


    图 8-4


    1inch 聚合器界面


    DeFi 产品旨在通过提供各种去中心化金融服务（例如借贷、支付、保险、交易、信用、风险等多种金融产品）来重塑传统行业。这些产品在无需许可的点对点网络中消除了中心化的第三方公司。此外，DeFi
    产品采用模块化设计，使应用程序能够自由地将这些开放的 DeFi 服务集成到它们的产品中。


    ## 去中心化稳定币


    加密行业仍处于起步阶段。与传统全球金融市场相比，数字资产的流动性仍然相对较小。此外，任何流动性低的新兴市场都伴随着波动性。


    所有这些都导致了稳定币的兴起。稳定币是一种加密资产，旨在提供一种安全的数字资产以保持价值稳定。它将其价格与其他类型的货币挂钩，例如法定货币（如美元）或商品货币（如黄金或石油）。在过去几年中，稳定币的受欢迎程度显著提高，许多稳定币项目已在加密货币市场推出。


    ### 稳定币历史


    第一种稳定币 `bitUSD` 于 2014 年 7 月发行。`bitUSD` 与美元挂钩，可以在 BitShares 上自由交易。另一种稳定币 Tether（`USDT`）于
    2014 年 10 月推出，与 `bitUSD` 一样，Tether 也与美元挂钩。如今，`USDT` 是市值领先的稳定币。


    图 8-5 显示了主要稳定币在过去几年推出的时间线：


    ![](img/535492_1_En_8_Fig5_HTML.png)


    一个主要稳定币推出的时间线图。bitUSD 于 2014 年推出，之后 DAI 于 2017 年推出，TrueUSD 于 2018 年推出，BUSD 于 2019
    年推出，FEI 于 2021 年推出，USDD 于 2022 年推出。


    图 8-5


    稳定币时间线


    ### 稳定币的类型


    稳定币分为几种类型。


    #### 商品抵押稳定币


    商品支持稳定币是指使用黄金、石油和房地产等实物资产作为抵押的稳定币。最流行的商品抵押稳定币是 Tether Gold（`XAUT`）和 Paxos Gold（`PAXG`）。


    #### 法定货币抵押稳定币


    法定货币抵押稳定币与法定货币（例如美元、欧元或英镑）的价值挂钩，这些法定货币是由政府发行的真实货币。最常见的是美元。例如，Tether（`USDT`）和 USD
    Coin（`USDC`）就是法定货币抵押稳定币的例子。


    #### 加密货币抵押稳定币


    加密货币抵押稳定币是指由现有数字加密货币（如 BTC 或 ETH）支持的稳定币。其中一个例子是 MakerDAO 的稳定币 `DAI`。`DAI` 是一个
    `ERC-20` 代币，与美元以 1:1 的比例挂钩，通过包含激励机制的智能合约在链上实现。该稳定币的供应量通过智能合约和 DAO 在链上进行调节。

