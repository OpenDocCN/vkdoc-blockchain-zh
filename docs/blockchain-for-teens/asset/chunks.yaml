- fmt: "### The 51% Problem\n\nTo add a block to the network, proof of work requires\
    \ enough computational power to solve a puzzle. For a hacker to reverse a transaction's\
    \ hash, they need to control at least 51% of the mining power (hash rate) processing\
    \ transactions on the blockchain. This is very costly, so it is impossible that\
    \ a network can be hacked by a person.\n\nTable [1-3](#535492_1_En_1_Chapter.xhtml#Tab3)\
    \ shows the cost of PoW 51% attack for Bitcoin and Ethereum:\n\n**Table 1-3**\
    \  \n**Cost of PoW 51% attack**\n\n| Name | Hash rate | 1 hour attack cost |\n\
    | --- | --- | --- |\n| Bitcoin | 33,511 PH/s | $583K |\n| Ethereum | 216 PH/s\
    \ | $364K |\n\nHowever, if a group of powerful miners collaborate with each other\
    \ and control this majority, they then ultimately can control the entire network\
    \ and decide which transactions can be added to network. This is known as a 51%\
    \ attack.\n\nDue to these disadvantages, many other new consensus mechanisms have\
    \ been proposed and implemented over these years. The most popular one of these\
    \ is proof of stake (PoS).\n\n### Proof of Stake (PoS)\n\nProof of work is a *validation\
    \ competition* approach where miners verify transactions and get rewards by solving\
    \ cryptographic puzzles. The process consumes lots of energy on proof-of-work\
    \ computations. Miners exchange energy for profit. Think of it like \"one cpu,\
    \ one vote.\"\n\nThe proof-of-stake (PoS) mechanism seeks to reduce the scalability\
    \ and environmental sustainability concerns by substituting staking for computational\
    \ power. Scalability here refers to blockchain network which is able to handle\
    \ the increased requests in terms of more users and applications. Staking is similar\
    \ to the mining function in proof of work. The miner stakes their cryptocurrency\
    \ as collateral for the chance to validate blocks. These miners become \"validators.\"\
    \ The PoS algorithm selects validators to validate new transactions and add them\
    \ to the blockchain, and validators reward some crypto in exchange. The more cryptocurrency\
    \ miners stake, the better chance there is for the node to be chosen to participate\
    \ in network validation.\n\nIn order to solve the block transaction validation,\
    \ the calculation only depends on the staked amount of cryptocurrency owned by\
    \ the node. We may simplify it as \"one coin, one vote.\"\n\nThe network will\
    \ randomly select some validators and ask them to provide the \"correct\" transactions.\n\
    \nAn unverified transaction in the validator node as the input satisfies the following\
    \ conditions:\n\n`Hash(s, c) ≤ Ncoin∗ Tcoin`\n\n- `Ncoin` is current staked coins\
    \ amount in the nodes\n- `Tcoin` is the time accumulation for the coin\n\n`Ncoin*\
    \ Tcoin` represents the coin age of the node, and a larger coin age means more\
    \ chance to satisfy the conditions at the same difficulty level.\n\nPoS was first\
    \ mentioned back on July 11, 2011, when QuantumMechanic presented the concept\
    \ on the BitcoinTalk online forum. Sunny King and Scott Nadal published a paper\
    \ on this for the first time in 2012.\n\nHere is the process of proof of stake:\n\
    \n1.  Miner as \"validators\" lock up set amounts of cryptocurrency or crypto\
    \ tokens.\n2.  The network runs protocol formula `f(x)` to select a validator.\n\
    3.  Selected miner verifies the transactions and proposes a new block.\n4.  Miner\
    \ broadcasts the new block to all nodes.\n5.  Nodes attest the new block:\n  \
    \  - If block is valid, the new block is added to network. Miner gets reward.\n\
    \    - If block is invalid, nodes vote again the new block. Miner loses staked\
    \ coins.\n\nFigure [1-12](#535492_1_En_1_Chapter.xhtml#Fig12) visualizes the process\
    \ of proof of stake.\n\n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig12_HTML.png)\n\
    \nA workflow diagram for the process of stake. The label includes a miner staking\
    \ their coin, stating as a validator, the miner gets a reward, the miner losing\
    \ staked coins, and nodes at least the new block.\n\n**Figure 1-12**  \n**The\
    \ process of proof of stake**\n\nAs one of the most common consensus mechanisms,\
    \ PoS is adopted by many cryptocurrencies. Here is a list of popular cryptocurrencies\
    \ that supported proof-of-stake coins.\n\n1.  **ETH 2.0**  \n    Ethereum 2.0\
    \ switched the current PoW-based Ethereum blockchain 1.0 to PoS. In addition,\
    \ the Beacon Chain bring PoS to Ethereum 2.0.\n\n2.  **Cardano**  \n    Cardano,\
    \ created in 2017, runs on the proof-of-stake Ouroboros consensus protocol. The\
    \ cryptocurrency token in Cardano is called ADA.\n\n3.  **Avalanche**  \n    Avalanche\
    \ is one of the fastest smart contracts platform based on PoS.  \n    Avalanche\
    \ is a blockchain platform with the native token AVAX.\n\n4.  **Polygon**  \n\
    \    Polygon, formerly known as the Matic Network, is a \"layer two\" or \"sidechain\"\
    \ scaling solution blockchain network. The cryptocurrency token in Polygon is\
    \ called Matic.\n\n## The Evolution of Monetary System\n\nMoney is one of the\
    \ central parts of life, and many daily life activities depend on it. You can\
    \ give money, and in return receive food, toys, clothes, computers, cars, healthcare,\
    \ and other services. Money is typically used for purchasing goods and services\
    \ on markets, but occasionally, people may directly trade goods for goods without\
    \ using money. For example, in August 1984, Saudi Arabia pumped out $1 billion\
    \ dollars in oil in exchange for 10 Boeing 747 jumbo jets for their national airline.\
    \ This kind of trade is called direct exchange or barter.\n\n### A Barter System\n\
    \nA barter system is an ancient method of exchange. The system can be traced back\
    \ to 6000 BC, even before the invention of money. The Mesopotamians introduced\
    \ the system, and the Phoenicians adopted it. Later on, the Babylonians also improved\
    \ their bartering system, by paying Roman soldiers salt as their salaries, since\
    \ salt was so precious. Many things can be used for trade, including food, tea,\
    \ weapons, spices, and tools.\n\nThe barter system supported early economies for\
    \ millennia, but it can be inefficient and does not always work well.\n\n- **Time**\
    \  \n  For example, if a person has wheat and wants to exchange it for cloth,\
    \ then the person not only has to find someone who owns cloth, but have both sides\
    \ agree wheat for cloth is a fair trade. If this doesn't work, the person would\
    \ have to wait or find other people until someone agrees to the terms. These arrangements\
    \ take time.\n\n- **Goods that cannot be divided**  \n  Many goods cannot be divided\
    \ without losing value. Let's say the price of cloth is equal to five eggs. If\
    \ a person only has four eggs, the cloth needs to be divided or cut into pieces\
    \ to complete the transaction. But the cloth will lose some of its value.\n\n\
    - **Lack of standard units**  \n  There is a lack of a common unit of measurement\
    \ in the barter system, so every deal needs to be a bargain. This is very time-consuming\
    \ and inefficient. For instance, how many eggs are needed to trade for a cloth?\
    \ How about the size of the eggs? Is the cloth new? All these factors may not\
    \ be seen equally by both sides.\n\n- **Difficulty of deferred payment (payment\
    \ in future)**  \n  Some goods are time-sensitive. For instance, a fisherman wants\
    \ to sell fresh seafood for wheat, but the farmer can only provide wheat a few\
    \ weeks later. As time passes, the value of fish will decrease, so it is not possible\
    \ to make this exchange in the future.\n\n- **Difficulty of transportation of\
    \ value**  \n  It is risky to transport large amounts of delicate or valuable\
    \ items and animals to distant markets for exchange.\n\n- **Difficulty of storage\
    \ of large or very costly goods**  \n  In the barter system, some goods require\
    \ additional purchases to store, like cows, pigs, sheep, etc."
  raw: "#### The 51% Problem\n\nTo add a block to the network, proof of work requires\
    \ enough computational power to solve a puzzle. For a hacker to reverse a transaction’s\
    \ hash, they need to control at least 51% of the mining power (hash rate) processing\
    \ transactions on the blockchain. This is very costly, so it is impossible that\
    \ a network can be hacked by a person.\n\nTable [1-3](#535492_1_En_1_Chapter.xhtml#Tab3)\
    \ shows the cost of PoW 51% attack for Bitcoin and Ethereum:\n\nTable 1-3\n\n\
    Cost of PoW 51% attack\n\n| Name | Hash rate | 1 hour attack cost |\n| --- | ---\
    \ | --- |\n| Bitcoin | 33,511 PH/s | $583K |\n| Ethereum | 216 PH/s | $364K |\n\
    \nHowever, if a group of powerful miners collaborate with each other and control\
    \ this majority, they then ultimately can control the entire network and decide\
    \ which transactions can be added to network. This is known as a 51% attack.\n\
    \nDue to these disadvantages, many other new consensus mechanisms have been proposed\
    \ and implemented over these years. The most popular one of these is proof of\
    \ stake (PoS).\n\n### Proof of Stake (PoS)\n\nProof of work is a *validation competition*\
    \ approach where miners verify transactions and get rewards by solving cryptographic\
    \ puzzles. The process consumes lots of energy on proof-of-work computations.\
    \ Miners exchange energy for profit. Think of it like “one cpu, one vote.”\n\n\
    The proof-of-stake (PoS) mechanism seeks to reduce the scalability and environmental\
    \ sustainability concerns by substituting staking for computational power. Scalability\
    \ here refers to blockchain network which is able to handle the increased requests\
    \ in terms of more users and applications. Staking is similar to the mining function\
    \ in proof of work. The miner stakes their cryptocurrency as collateral for the\
    \ chance to validate blocks. These miners become “validators.” The PoS algorithm\
    \ selects validators to validate new transactions and add them to the blockchain,\
    \ and validators reward some crypto in exchange. The more cryptocurrency miners\
    \ stake, the better chance there is for the node to be chosen to participate in\
    \ network validation.\n\nIn order to solve the block transaction validation, the\
    \ calculation only depends on the staked amount of cryptocurrency owned by the\
    \ node. We may simplify it as “one coin, one vote.”\n\nThe network will randomly\
    \ select some validators and ask them to provide the “correct” transactions.\n\
    \nAn unverified transaction in the validator node as the input satisfies the following\
    \ conditions:\n\nHash(s, c) ≤ Ncoin∗ Tcoin\n\nNcoin is current staked coins amount\
    \ in the nodes\n\nTcoin is the time accumulation for the coin\n\nNcoin* Tcoin\
    \ represents the coin age of the node, and a larger coin age means more chance\
    \ to satisfy the conditions at the same difficulty level.\n\nPoS was first mentioned\
    \ back on July 11, 2011, when QuantumMechanic presented the concept on the BitcoinTalk\
    \ online forum. Sunny King and Scott Nadal published a paper on this for the first\
    \ time in 2012.\n\nHere is the process of proof of stake:\n\n1.  Miner as “validators”\
    \ lock up set amounts of cryptocurrency or crypto tokens.\n\n2.  The network runs\
    \ protocol formula f(x) to select a validator.\n\n3.  Selected miner verifies\
    \ the transactions and proposes a new block.\n\n4.  Miner broadcasts the new block\
    \ to all nodes.\n\n5.  Nodes attest the new block:\n    1.  If block is valid,\
    \ the new block is added to network. Miner gets reward.\n\n    2.  If block is\
    \ invalid, nodes vote again the new block. Miner loses staked coins.\n\nFigure\
    \ [1-12](#535492_1_En_1_Chapter.xhtml#Fig12) visualizes the process of proof of\
    \ stake.\n\n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig12_HTML.png)\n\n\
    A workflow diagram for the process of stake. The label includes a miner staking\
    \ their coin, stating as a validator, the miner gets a reward, the miner losing\
    \ staked coins, and nodes at least the new block.\n\nFigure 1-12\n\nThe process\
    \ of proof of stake\n\nAs one of the most common consensus mechanisms, PoS is\
    \ adopted by many cryptocurrencies. Here is a list of popular cryptocurrencies\
    \ that supported proof-of-stake coins.\n\n1.  ETH 2.0\n\n    Ethereum 2.0 switched\
    \ the current PoW-based Ethereum blockchain 1.0 to PoS. In addition, the Beacon\
    \ Chain bring PoS to Ethereum 2.0.\n\n2.  Cardano\n\n    Cardano, created in 2017,\
    \ runs on the proof-of-stake Ouroboros consensus protocol. The cryptocurrency\
    \ token in Cardano is called ADA.\n\n3.  Avalanche\n\n    Avalanche is one of\
    \ the fastest smart contracts platform based on PoS.\n\n    Avalanche is a blockchain\
    \ platform with the native token AVAX.\n\n4.  Polygon\n\n    Polygon, formerly\
    \ known as the Matic Network, is a “layer two” or “sidechain” scaling solution\
    \ blockchain network. The cryptocurrency token in Polygon is called Matic.\n\n\
    ## The Evolution of Monetary System\n\nMoney is one of the central parts of life,\
    \ and many daily life activities depend on it. You can give money, and in return\
    \ receive food, toys, clothes, computers, cars, healthcare, and other services.\
    \ Money is typically used for purchasing goods and services on markets, but occasionally,\
    \ people may directly trade goods for goods without using money. For example,\
    \ in August 1984, Saudi Arabia pumped out $1 billion dollars in oil in exchange\
    \ for 10 Boeing 747 jumbo jets for their national airline. This kind of trade\
    \ is called direct exchange or barter.\n\n### A Barter System\n\nA barter system\
    \ is an ancient method of exchange. The system can be traced back to 6000 BC,\
    \ even before the invention of money. The Mesopotamians introduced the system,\
    \ and the Phoenicians adopted it. Later on, the Babylonians also improved their\
    \ bartering system, by paying Roman soldiers salt as their salaries, since salt\
    \ was so precious. Many things can be used for trade, including food, tea, weapons,\
    \ spices, and tools.\n\nThe barter system supported early economies for millennia,\
    \ but it can be inefficient and does not always work well.\n\n*   Time\n\nFor\
    \ example, if a person has wheat and wants to exchange it for cloth, then the\
    \ person not only has to find someone who owns cloth, but have both sides agree\
    \ wheat for cloth is a fair trade. If this doesn’t work, the person would have\
    \ to wait or find other people until someone agrees to the terms. These arrangements\
    \ take time.\n\n*   Goods that cannot be divided\n\nMany goods cannot be divided\
    \ without losing value. Let’s say the price of cloth is equal to five eggs. If\
    \ a person only has four eggs, the cloth needs to be divided or cut into pieces\
    \ to complete the transaction. But the cloth will lose some of its value.\n\n\
    *   Lack of standard units\n\nThere is a lack of a common unit of measurement\
    \ in the barter system, so every deal needs to be a bargain. This is very time-consuming\
    \ and inefficient. For instance, how many eggs are needed to trade for a cloth?\
    \ How about the size of the eggs? Is the cloth new? All these factors may not\
    \ be seen equally by both sides.\n\n*   Difficulty of deferred payment (payment\
    \ in future)\n\nSome goods are time-sensitive. For instance, a fisherman wants\
    \ to sell fresh seafood for wheat, but the farmer can only provide wheat a few\
    \ weeks later. As time passes, the value of fish will decrease, so it is not possible\
    \ to make this exchange in the future.\n\n*   Difficulty of transportation of\
    \ value\n\nIt is risky to transport large amounts of delicate or valuable items\
    \ and animals to distant markets for exchange.\n\n*   Difficulty of storage of\
    \ large or very costly goods\n\nIn the barter system, some goods require additional\
    \ purchases to store, like cows, pigs, sheep, etc."
  trans: "\n### 51% 问题\n\n要将一个区块添加到网络中，工作量证明需要足够的算力来解决一个难题。对于想要逆转交易哈希值的黑客来说，他们需要控制处理区块链上交易的至少\
    \ 51%的挖矿算力（哈希率）。这成本非常高，因此个人黑客几乎不可能攻破一个网络。\n\n表 1-3 展示了对比特币和以太坊进行 PoW 51% 攻击的成本：\n\
    \n**表 1-3**  \n**PoW 51% 攻击成本**\n\n| 名称 | 哈希率 | 1 小时攻击成本 |\n| --- | --- | ---\
    \ |\n| 比特币 | 33,511 PH/s | $583K |\n| 以太坊 | 216 PH/s | $364K |\n\n然而，如果一群强大的矿工相互合作并控制了这多数算力，那么他们最终可以控制整个网络，并决定哪些交易可以被添加到网络中。这被称为\
    \ 51% 攻击。\n\n由于这些缺点，多年来许多其他新的共识机制被提出并实施。其中最流行的是权益证明（PoS）。\n\n### 权益证明（PoS）\n\n\
    工作量证明是一种*验证竞赛*方法，矿工通过解决加密难题来验证交易并获得奖励。这个过程在 PoW 计算上消耗了大量能源。矿工用能源换取利润。可以将其理解为“一\
    \ CPU，一票”。\n\n权益证明（PoS）机制旨在通过用质押来替代算力，从而解决可扩展性和环境可持续性问题。这里的可扩展性指的是区块链网络能够处理因更多用户和应用而增加的请求。质押类似于工作量证明中的挖矿功能。矿工将他们的加密货币作为抵押品进行质押，以获得验证区块的机会。这些矿工成为了“验证者”。PoS\
    \ 算法选择验证者来验证新交易并将其添加到区块链中，验证者会获得一些加密货币作为回报。矿工质押的加密货币越多，其节点被选中参与网络验证的机会就越大。\n\n\
    为了解决区块交易的验证问题，计算仅仅依赖于节点所拥有的质押加密货币数量。我们可以将其简化为“一币，一票”。\n\n网络会随机选择一些验证者，并要求他们提供“正确的”交易。\n\
    \n验证者节点中作为输入的一个未经确认的交易满足以下条件：\n\n`Hash(s, c) ≤ Ncoin∗ Tcoin`\n\n- `Ncoin` 是节点中当前质押的币数量\n\
    - `Tcoin` 是该币的时间累积量\n\n`Ncoin* Tcoin` 代表节点的币龄，币龄越大，在相同难度级别下满足条件的几率就越大。\n\nPoS\
    \ 最早于 2011 年 7 月 11 日被提及，当时 QuantumMechanic 在 BitcoinTalk 在线论坛上提出了这个概念。Sunny King\
    \ 和 Scott Nadal 在 2012 年首次就此发表了一篇论文。\n\n以下是权益证明的流程：\n\n1.  矿工作为“验证者”锁定一定数量的加密货币或加密代币。\n\
    2.  网络运行协议公式 `f(x)` 来选择一个验证者。\n3.  被选中的矿工验证交易并提出一个新区块。\n4.  矿工向所有节点广播新区块。\n5.\
    \  节点证明新区块：\n    - 如果区块有效，则新区块被添加到网络中。矿工获得奖励。\n    - 如果区块无效，节点将再次投票反对该新区块。矿工失去其质押的币。\n\
    \n图 1-12 直观地展示了权益证明的流程。\n\n![](img/535492_1_En_1_Fig12_HTML.png)\n\n权益证明流程的工作流示意图。标签包括矿工质押其币、成为验证者、矿工获得奖励、矿工失去质押的币，以及节点至少对新区块进行验证。\n\
    \n**图 1-12**  \n**权益证明的流程**\n\n作为最常见的共识机制之一，PoS 被许多加密货币所采用。以下是支持权益证明币种的流行加密货币列表。\n\
    \n1.  **ETH 2.0**  \n    以太坊 2.0 将当前基于 PoW 的以太坊区块链 1.0 切换到了 PoS。此外，信标链将 PoS 带入了以太坊\
    \ 2.0。\n\n2.  **Cardano**  \n    Cardano 创建于 2017 年，运行在权益证明的 Ouroboros 共识协议上。Cardano\
    \ 中的加密货币代币称为 ADA。\n\n3.  **Avalanche**  \n    Avalanche 是基于 PoS 的最快的智能合约平台之一。\
    \  \n    Avalanche 是一个区块链平台，其原生代币为 AVAX。\n\n4.  **Polygon**  \n    Polygon，原名\
    \ Matic Network，是一个“第二层”或“侧链”扩容解决方案的区块链网络。Polygon 中的加密货币代币称为 Matic。\n\n## 货币体系的演变\n\
    \n货币是生活的核心组成部分之一，许多日常活动都依赖于它。你可以付出金钱，并换回食物、玩具、衣服、电脑、汽车、医疗保健和其他服务。货币通常用于在市场上购买商品和服务，但偶尔，人们也可能在不使用货币的情况下直接进行商品交换。例如，1984\
    \ 年 8 月，沙特阿拉伯开采了价值 10 亿美元的石油，为其国家航空公司换取 10 架波音 747 大型喷气式客机。这种交易被称为直接交换或物物交换。\n\
    \n### 物物交换系统\n\n物物交换系统是一种古老的交换方式。该系统可以追溯到公元前 6000 年，甚至早在货币发明之前。美索不达米亚人引入了这个系统，腓尼基人采纳了它。后来，巴比伦人也改进了他们的物物交换系统，因为盐非常珍贵，他们用盐来支付罗马士兵的薪水。许多物品都可以用于交易，包括食物、茶叶、武器、香料和工具。\n\
    \n物物交换系统支撑了早期经济数千年，但它可能效率低下，并且并不总是运转良好。\n\n- **时间**  \n  例如，如果一个人有小麦并且想用它来交换布料，那么这个人不仅要找到一个拥有布料的人，还需要双方都同意用小麦换布料是公平交易。如果这行不通，这个人就必须等待或寻找其他人，直到有人同意这些条件。这些安排很耗时。\n\
    \n- **无法分割的商品**  \n  许多商品在分割后会失去价值。假设一块布料的价格等于五个鸡蛋。如果一个人只有四个鸡蛋，那么就需要分割或裁剪布料来完成交易。但布料会因此损失一些价值。\n\
    \n- **缺乏标准单位**  \n  物物交换系统中缺乏共同的计量单位，所以每笔交易都需要讨价还价。这非常耗时且效率低下。例如，需要多少个鸡蛋才能换一块布？鸡蛋的大小如何？布料是新的吗？所有这些因素在双方看来可能都不相同。\n\
    \n- **延期支付（未来支付）的困难**  \n  有些商品具有时效性。例如，一个渔民想卖新鲜的海鲜来换取小麦，但农民只能在几周后才能提供小麦。随着时间的推移，鱼的价值会下降，因此将来不可能进行这种交换。\n\
    \n- **价值运输的困难**  \n  将大量易碎或有价值的物品以及动物运送到遥远的市场进行交换是有风险的。\n\n- **大型或非常昂贵商品储存的困难**\
    \  \n  在物物交换系统中，有些商品需要额外花费来储存，比如牛、猪、羊等。\n"
- fmt: "### Commodity Money\n\nSalt gradually became a popular form of payment and\
    \ was accepted by society. Because trust in salt payment developed over the years,\
    \ an owner could use salt to trade for many other useful goods anytime. The word\
    \ `“salary”` comes from the Latin word `“salarium,”` meaning `“salt money.”`\n\
    \nWhen one type of commodity becomes a popular medium of exchange for trading\
    \ goods and services, it is trusted and has intrinsic value. The commodity becomes\
    \ a form of Money called `“commodity money.”` Various items have been used as\
    \ commodities money over history, such as salt, tobacco, cattle, cowry shells,\
    \ precious stones, and grain.\n\nThe Yap Islands, located in the Caroline group\
    \ of the central Pacific, has a very peculiar giant stone money known as `“Rai.”`\
    \ The Yapese made a stone in the shape of a disk with holes in the middle to help\
    \ transport them. The price of stones was determined by their scarcity and the\
    \ cost of bringing new stones to the island. Sometimes the stone doesn’t need\
    \ to move after the bargain; people just need to transfer the ownership of the\
    \ stone. It was used as currency for daily trade until the 1960s.\n\nHere are\
    \ few other examples of commodity money:\n\n**Tobacco leaves:**\n\nThroughout\
    \ the seventeenth century, Virginia, Maryland, and North Carolina used tobacco\
    \ as the official currency for taxes and trade all other transactions.\n\n**Cattle:**\n\
    \nFrom around 9,000 to 6,000 BC, the oldest form of money included cows, camels,\
    \ sheep, and other livestock. Cattle could be transported relatively easily transported\
    \ in ancient times as a commodity currency.\n\nAlthough commodity money greatly\
    \ helped the movement of goods and services in ancient times, people soon encountered\
    \ difficulties in this money form:\n\n- **Goods that cannot be divided:**\n\n\
    \  Some commodity money is difficult to divide or split into smaller units per\
    \ one’s needs. For example, cattle and cowry shells cannot be divided into smaller\
    \ pieces for daily purchases.\n\n- **Perishability:**\n\n  It is challenging to\
    \ keep the commodity’s value in the case of perishable commodities.\n\n  When\
    \ people use livestock as commodity money, these animals may be got sick, injured,\
    \ and even die during transportation. Commodity food items lose their value after\
    \ being stored for a long time.\n\n- **Lack of portability:**\n\n  Some commodities,\
    \ like the Yap stones, were difficult to transfer from one location to another.\n\
    \n- **No universal acceptability:**\n\n  The commodities were not standardized\
    \ across regions. This makes pricing difficult when trading with different commodities.\n\
    \nBut like barter, to overcome these difficulties, people shifted to metallic\
    \ coin as another type of money.\n\n#### Metallic Coin\n\nThe Kingdom of Lydia\
    \ (now part of modern-day Turkey) minted the first gold and silver coins around\
    \ 700 BC. The coin weight is close to a US nickel. A soldier’s salary was about\
    \ three coins per month. The Lydia coin was the first time the coinage concept\
    \ was issued by a central authority. Lydian coins were typically made from gold,\
    \ silver, or electrum (a mixture form of gold and silver) and engraved with pictures\
    \ of gods and emperors.\n\nSince the coins had a standard weight and size, they\
    \ became easier to carry and exchange. In addition, compared to commodity money,\
    \ metal coins are much more durable. Metal is divisible and fungible if you recollect\
    \ and melt it to build tools, weapons, and new coins. A coin can have the same\
    \ value for a very long time and also be difficult to counterfeit.\n\nMetallic\
    \ money has become the main form of money throughout recorded human money history.\
    \ Each coin has its own designed value and size. It is easy to use when dealing\
    \ with a small number of transactions. However, the exchange became problematic\
    \ once people needed to travel a long distance or carry out large transactions.\
    \ It is not safe nor convenient to carry a large number of coins.\n\nAnd because\
    \ of the scarcity of the metals, the supply of coins was limited. It took a large\
    \ amount of work to periodically gain more metal to satisfy the fast-growing economy.\n\
    \nIn Ancient Greece and the Roman Empire, most of the coins were made from gold,\
    \ silver, and electrum, but a small amount of coins were made using copper, bronze,\
    \ and alloys. These small coins were typically used for small transactions where\
    \ coin value has less intrinsic value than its face value. This initiated the\
    \ principle of token money.\n\nMohammad Bin Tughlaq ruled over the northern parts\
    \ of the Indian subcontinent and the Deccan from 1324 to 1351 AD. During this\
    \ time, there was a shortage of gold and silver. But Muhammad Bin Tughlaq understood\
    \ the nature of the token currency well and issued a copper currency named `Tanka`,\
    \ the world’s first token money. `Tanka`’s value was equal to a silver coin.\n\
    \nFor centuries, most countries minted their coins using gold, silver, and other\
    \ cheaper copper, zinc, and nickel. The coin value gradually became independent\
    \ of its metal and more represented by its marked value. This evolution led to\
    \ the invention of paper, marking a crucial stage in the development of money.\n\
    \n### Paper Money\n\nThe main problem with metallic money was that it was incredibly\
    \ inconvenient when dealing with large transactions with vendors or need long-distance\
    \ travel. To overcome this problem, the Chinese began using the first paper banknotes—`“flying\
    \ money”`—in exchange for goods and services in 118 BC. People could use banknotes\
    \ as letters of credit and transfer them over large distances. The success of\
    \ paper banknotes led to the beginning of paper currency.\n\nThe Song dynasty\
    \ issued the first true paper money in 1023, once Emperor Chen Tsung established\
    \ the Bureau of Exchange. The bureau printed and issued universal bills, which\
    \ circulated with merchants.\n\nThe paper bill can be used as a receipt for goods,\
    \ services, or labor, and be redeemed after the service is completed.\n\nPaper\
    \ banknotes are issued and backed by the government to be legal tender, not from\
    \ a traditional commodity such as gold or silver. This is the world’s first Fiat\
    \ money (from Latin: `fiat`, “let it be done”).\n\nAs the first country to adopt\
    \ banknotes in Europe, Stockholms Banco, Sweden’s first bank, issued the Swedish\
    \ banknote in 1661. The banknotes worked as bank deposit certificates. Because\
    \ paper money was easier to create, lighter, and more convenient to carry than\
    \ metallic coins, banknotes quickly became popular. By the 1600s, governments\
    \ and banks all over the world had started to issue paper money to their society.\n\
    \nMaking metallic coins required the raw material, refining, melting, casting,\
    \ and many other processes until they could be stamped and distributed. Compared\
    \ to metallic money, paper money could be printed much faster by the Bureau, and\
    \ the total supply would not be limited by the amount of metal.\n\nIn today’s\
    \ world, paper money is used everywhere in our daily life. It has undeniable benefits;\
    \ but, like the other types of money, cash has some disadvantages.\n\nOne of the\
    \ disadvantages of using cash is that you need to always carry cash. When you\
    \ purchase expensive goods, you need to bring a large amount of paper currency\
    \ from one place to another place.\n\nThe second disadvantage is you could lose\
    \ cash when you lose your wallet—or it is stolen. There is no way to guarantee\
    \ that the cash can be returned. And you hand cash over after the transaction\
    \ is done, so if the exchanged goods have an issue, there is no guarantee that\
    \ the money can be returned.\n\nThese drawbacks of paper currency led to bank\
    \ inventing plastic money like credit cards, which is becoming much more popular\
    \ in today’s payment."
  raw: '### Commodity Money


    Salt gradually became a popular form of payment and was accepted by society. Because
    trust in salt payment developed over the years, an owner could use salt to trade
    for many other useful goods anytime. The word “salary” comes from the Latin word
    “salarium,” meaning “salt money.”


    When one type of commodity becomes a popular medium of exchange for trading goods
    and services, it is trusted and has intrinsic value. The commodity becomes a form
    of Money called “commodity money.” Various items have been used as commodities
    money over history, such as salt, tobacco, cattle, cowry shells, precious stones,
    and grain.


    The Yap Islands, located in the Caroline group of the central pacific, has a very
    peculiar giant stone money known as “Rai.” The Yapese made a stone in the shape
    of a disk with holes in the middle to help transport them. The price of stones
    was determined by their scarcity and the cost of bringing new stones to the island.
    Sometimes the stone doesn’t need to move after the bargain; people just need to
    transfer the ownership of the stone. It was used as currency for daily trade until
    the 1960s.


    Here are few other examples of commodity money:


    Tobacco leaves:


    Throughout the seventeenth century, Virginia, Maryland, and North Carolina used
    tobacco as the official currency for taxes and trade all other transactions.


    Cattle:


    From around 9,000 to 6,000 BC, the oldest form of money included cows, camels,
    sheep, and other livestock. Cattle could be transported relatively easily transported
    in ancient times as a commodity currency.


    Although commodity money greatly helped the movement of goods and services in
    ancient times, people soon encountered difficulties in this money form:


    *   Goods that cannot be divided:


    Some commodity money is difficult to divide or split into smaller units per one’s
    needs. For example, cattle and cowry shells cannot be divided into smaller pieces
    for daily purchases.


    *   Perishability:


    It is challenging to keep the commodity’s value in the case of perishable commodities.


    When people use livestock as commodity money, these animals may be got sick, injured,
    and even die during transportation. Commodity food items lose their value after
    being stored for a long time.


    *   Lack of portability:


    Some commodities, like the Yap stones, were difficult to transfer from one location
    to another


    *   No universal acceptably:


    The commodities were not standardized across regions. This makes pricing difficult
    when trading with different commodities.


    But like barter, to overcome these difficulties, people shifted to metallic coin
    as another type of money.


    #### Metallic Coin


    The Kingdom of Lydia (now part of modern-day Turkey) minted the first gold and
    silver coins around 700 BC. The coin weight is close to a US nickel. A soldier’s
    salary was about three coins per month. The Lydia coin was the first time the
    coinage concept was issued by a central authority. Lydian coins were typically
    made from gold, silver, or electrum (a mixture form of gold and silver) and engraved
    with pictures of gods and emperors.


    Since the coins had a standard weight and size, they became easier to carry and
    exchange. In addition, compared to commodity money, metal coins are much more
    durable. Metal is divisible and fungible if you recollect and melt it to build
    tools, weapons, and new coins. A coin can have the same value for a very long
    time and also be difficult to counterfeit.


    Metallic money has become the main form of money throughout recorded human money
    history. Each coin has its own designed value and size. It is easy to use when
    dealing with a small number of transactions. However, the exchange became problematic
    once people needed to travel a long distance or carry out large transactions.
    It is not safe nor convenient to carry a large number of coins.


    And because of the scarcity of the metals, the supply of coins was limited. It
    took a large amount of work to periodically gain more metal to satisfy the fast-growing
    economy.


    In Ancient Greece and the Roman Empire, most of the coins were made from gold,
    silver, and electrum, but a small amount of coins were made using copper, bronze,
    and alloys. These small coins were typically used for small transactions where
    coin value has less intrinsic value than its face value. This initiated the principle
    of token money.


    Mohammad Bin Tughlaq ruled over the northern parts of the Indian subcontinent
    and the Deccan from 1324 to 1351 AD. During this time, there was a shortage of
    gold and silver. But Muhammad Bin Tughlaq understood the nature of the token currency
    well and issued a copper currency named Tanka, the world’s first token money.
    Tanka’s value was equal to a silver coin.


    For centuries, most countries minted their coins using gold, silver, and other
    cheaper copper, zinc, and nickel. The coin value gradually became independent
    of its metal and more represented by its marked value. This evolution led to the
    invention of paper, marking a crucial stage in the development of money.


    ### Paper Money


    The main problem with metallic money was that it was incredibly inconvenient when
    dealing with large transactions with vendors or need long-distance travel. To
    overcome this problem, the Chinese began using the first paper banknotes—”flying
    money”—in exchange for goods and services in 118 BC. People could use banknotes
    as letters of credit and transfer them over large distances. The success of paper
    banknotes led to the beginning of paper currency.


    The Song dynasty issued the first true paper money in 1023, once Emperor Chen
    Tsung established the Bureau of Exchange. The bureau printed and issued universal
    bills, which circulated with merchants.


    The paper bill can be used as a receipt for goods, services, or labor, and be
    redeemed after the service is completed.


    Paper banknotes are issued and backed by the government to be legal tender, not
    from a traditional commodity such as gold or silver. This is the world’s first
    Fiat money (from Latin: fiat, “let it be done”).


    As the first country to adopt banknotes in Europe, Stockholms Banco, Sweden’s
    first bank, issued the Swedish banknote in 1661\. The banknotes worked as bank
    deposit certificates. Because paper money was easier to create, lighter, and more
    convenient to carry than metallic coins, banknotes quickly became popular. By
    the 1600s, governments and banks all over the world had started to issue paper
    money to their society.


    Making metallic coins required the raw material, refining, melting, casting, and
    many other processes until they could be stamped and distributed. Compared to
    metallic money, paper money could be printed much faster by the Bureau, and the
    total supply would not be limited by the amount of metal.


    In today’s world, paper money is used everywhere in our daily life. It has undeniable
    benefits; but, like the other types of money, cash has some disadvantages.


    One of the disadvantages of using cash is that you need to always carry cash.
    When you purchase expensive goods, you need to bring a large amount of paper currency
    from one place to another place.


    The second disadvantage is you could lose cash when you lose your wallet—or it
    is stolen. There is no way to guarantee that the cash can be returned. And you
    hand cash over after the transaction is done, so if the exchanged goods have an
    issue, there is no guarantee that the money can be returned.


    These drawbacks of paper currency led to bank inventing plastic money like credit
    cards, which is becoming much more popular in today’s payment.'
  trans: "\n### 商品货币\n\n盐逐渐成为一种广为接受的支付形式，并被社会所认可。由于多年来人们对以盐作为支付手段的信任逐渐形成，物主可以随时用盐交换许多其他有用的物品。单词`“salary”`源自拉丁语`“salarium”`，意为`“盐钱”`。\n\
    \n当某种商品成为交换商品和服务的流行媒介时，它就具备了信任和内在价值。这种商品就演变成一种货币形式，称为`“商品货币”`。历史上，各种物品都曾被用作商品货币，例如盐、烟草、牛、货贝、宝石和谷物。\n\
    \n位于中太平洋加罗林群岛的雅浦岛，有一种非常独特的巨型石币，被称为`“Rai”`。雅浦人将石头制成圆盘状，中间穿孔以便运输。石头的价格由其稀缺性以及将新石头运到岛上的成本决定。有时交易完成后石头甚至无需移动，人们只需转移其所有权。这种石币一直作为日常交易的货币使用，直到\
    \ 20 世纪 60 年代。\n\n以下是其他几种商品货币的例子：\n\n**烟草叶：**\n\n在整个 17 世纪，弗吉尼亚、马里兰和北卡罗来纳州都将烟草作为所有交易（包括税收和贸易）的官方货币。\n\
    \n**牛：**\n\n大约从公元前 9000 年到公元前 6000 年，最古老的货币形式包括牛、骆驼、羊和其他牲畜。在古代，牛作为一种商品货币相对容易运输。\n\
    \n尽管商品货币极大地促进了古代商品和服务的流通，但人们很快也遇到了这种货币形式的困难：\n\n- **无法分割的商品：**\n\n  有些商品货币难以根据需求分割成更小的单位。例如，牛和货贝无法分割成小份用于日常购买。\n\
    \n- **易腐性：**\n\n  对于易腐烂的商品，保持其价值十分困难。\n\n  当人们使用牲畜作为商品货币时，这些动物可能在运输过程中生病、受伤甚至死亡。易腐食品在长期储存后会失去价值。\n\
    \n- **缺乏便携性：**\n\n  某些商品，例如雅浦石币，很难从一个地方转移到另一个地方。\n\n- **缺乏普遍接受性：**\n\n  各地区之间的商品没有标准化。这使得用不同商品进行交易时难以定价。\n\
    \n但是，如同以物易物一样，为了克服这些困难，人们转向了金属硬币作为另一种货币形式。\n\n#### 金属硬币\n\n吕底亚王国（今土耳其的一部分）大约在公元前\
    \ 700 年铸造了第一批金币和银币。一枚硬币的重量接近一枚美国五分镍币。一名士兵的月薪大约是三枚硬币。吕底亚硬币是第一次由中央权威机构发行硬币的概念。吕底亚硬币通常由金、银或琥珀金（金银的混合物）制成，并刻有神祇和帝王的图案。\n\
    \n由于硬币具有标准的重量和尺寸，它们变得更易于携带和交换。此外，与商品货币相比，金属硬币更加耐用。金属是可分割且可互换的，如果你将硬币回收熔化，可以制成工具、武器和新硬币。一枚硬币可以在很长时间内保持相同的价值，并且难以伪造。\n\
    \n在有记载的人类货币历史中，金属货币一直是主要的货币形式。每种硬币都有其设计好的面值和尺寸。在处理少量交易时，使用起来很方便。然而，一旦人们需要长途旅行或进行大额交易，交换就变得成问题。携带大量硬币既不安全也不方便。\n\
    \n而且，由于金属的稀缺性，硬币的供应量是有限的。要定期获取更多金属以满足快速增长的经济，需要付出巨大的努力。\n\n在古希腊和罗马帝国，大多数硬币由金、银和琥珀金制成，但也有少量硬币使用了铜、青铜和合金。这些小面值硬币通常用于小额交易，其硬币的内在价值低于面值。这开启了代币货币的原则。\n\
    \n穆罕默德·本·图格鲁克在公元 1324 年至 1351 年间统治着印度次大陆北部和德干高原。在此期间，金银短缺。但穆罕默德·本·图格鲁克深刻理解代币货币的本质，发行了一种名为`Tanka`的铜币，这是世界上第一种代币货币。`Tanka`的价值等同于一枚银币。\n\
    \n几个世纪以来，大多数国家都用金、银以及其他更便宜的铜、锌和镍来铸造硬币。硬币的价值逐渐与金属本身脱钩，更多地由其标注的面值来体现。这一演变最终导致了纸币的发明，标志着货币发展中的一个关键阶段。\n\
    \n### 纸币\n\n金属货币的主要问题在于，在与商家进行大额交易或需要长途旅行时，它极为不便。为克服这一问题，中国人于公元前 118 年首次使用纸币银行券——`“飞钱”`——来交换商品和服务。人们可以将银行券作为信用证使用，并在远距离范围内进行转让。纸币银行券的成功开启了纸币货币的先河。\n\
    \n宋真宗设立交子务后，宋朝于 1023 年发行了世界上第一种真正的纸币。交子务印刷并发行了统一流通的交子，在商人之间流通。\n\n纸币可以作为商品、服务或劳动的收据，并在服务完成后兑换。\n\
    \n纸币由国家政府发行并背书，作为法定货币，而非来自黄金或白银等传统商品。这是世界上第一种法币（来自拉丁语：`fiat`，意为“令其发生”）。\n\n作为欧洲第一个采用银行券的国家，瑞典的第一家银行——斯德哥尔摩银行于\
    \ 1661 年发行了瑞典银行券。这些银行券充当银行存款凭证。由于纸币比金属硬币更容易制造、更轻便、更易于携带，银行券迅速流行起来。到了 17 世纪，世界各地的政府和银行都开始向社会发行纸币。\n\
    \n制造金属硬币需要原料、精炼、熔炼、铸造以及许多其他工序，最终才能压制和发行。与金属货币相比，纸币可以通过官方机构更快地印刷，并且总供应量不受金属数量的限制。\n\
    \n在当今世界，纸币在我们的日常生活中无处不在。它具有不可否认的好处；但是，像其他类型的货币一样，现金也有一些缺点。\n\n使用现金的缺点之一是，你需要一直随身携带现金。当你购买昂贵的商品时，你需要将大量纸币从一个地方带到另一个地方。\n\
    \n第二个缺点是，当你丢失钱包或钱包被盗时，你可能会丢失现金。没有方法能保证现金能被退回。而且交易完成后你就将现金交给了对方，因此，如果交换的商品出现问题，也无法保证金钱能被追回。\n\
    \n纸币的这些缺点促使银行发明了信用卡等塑料货币，这在当今的支付方式中正变得越来越流行。\n"
- fmt: '# Plastic Money


    With the development of the Internet and computer technology, transactions can
    happen not only offline but also online, and are much quicker and easier. Today,
    credit card companies like `Mastercard`, `Visa`, `American Express`, and `Discover`
    are the most widely accepted payment type worldwide.


    `John Biggins`, a Brooklyn banker who worked for the `Flatbush National Bank`,
    invented the first credit card in 1946. The bank card was called the `“Charg-It”`
    card.


    The `Charge-It` card was only valid at local merchants within a two-block radius
    of his bank. The cardholder would have accounts in `Flatbush National Bank`. Instead
    of letting the cardholder pay the merchant directly, the bank will pay first after
    reviewing the bill of the cardholder’s purchase. The goal is to bring more loyal
    customers to the bank. This concept enables a customer to purchase products before
    payment because it is built on the trust that payment will be made in the future.


    In 1950, `Diners Club` created the first multipurpose charge card, allowing consumers
    to use it at various merchants.


    In 1958, `American Express` launched its first charge card—the `American Express
    Purple Card`, in the United States and Canada. It is the first plastic credit
    card that we know of today.


    In that same year, `Bank of America` launched its first nationally licensed credit
    card program and labeled it the `BankAmericard`. The credit card was sent out
    by `Bank of America` through the mail and was “dropped” into the mailboxes, which
    still occurs in this day.


    In 1960, `IBM` invented a magnetic stripe used on the back of the credit card.
    The magnetic stripe contains embedded cardholder information, including the cardholder
    name, card expiration date, and account number.


    In 1966, several banks in California decided to join together to form a new association
    of banks—the `Interbank Card Association (ICA)` and launch `Mastercard`.


    In 1976, `BankAmericard` expanded around the globe and eventually became known
    as `VISA`.


    In 1986, `Sears` launched its own credit card program for the first time, offering
    a “cash back” rewards program while selling more than products inside their stores.
    The credit card was called the `Discover Card`.


    Figure [1-13](#535492_1_En_1_Chapter.xhtml#Fig13) shows plastic money history.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig13_HTML.png)


    A flow-diagram illustrates plastic money history. The labeled flows are first
    credit card, first multi-purpose charge card, American Express, bank Ameri card,
    I B M magnetic stripe, master card, visa card, and discover card.


    **Figure 1-13** Plastic money history


    Credit cards have slowly but surely changed how we use and think about our “credit”
    and money.


    People deposit cash in their bank account and use the credit card (credit money
    or bank money) for daily purchases. It performs the same function as paper money.
    Plastic money largely reduced the need for carrying cash and brought an easier
    way to involve more and more complex modern payment systems.


    # Mobile Payments


    On August 6, 1991, `Berners-Lee` launched the world’s first website from a lab
    in the Swiss Alps. Today, more than two decades after its creation, there are
    nearly 1.9 billion websites that exist. Since then, eCommerce has evolved rapidly
    over the last few decades.


    On August 11, 1994, the world’s first online purchase occurred with an order for
    a pepperoni and mushroom pizza from `Pizza Hut`. `Visa` processed the first-ever
    online payment.


    In 1995, `Amazon` launched its online bookstore as one of the first eCommerce
    sites.


    In 1998, `Paypal` launched the first money transfer tool, which is considered
    the first digital wallet, that allowed a customer to make a secure online payment.


    In 1999, `Ericsson` and `Telenor Mobil` launched the first mobile wallet to purchase
    movie tickets using a phone.


    In 2003, 95 million mobile users worldwide made a purchase via their phone.


    In 2007, the `iPhone` and the `android` mobile operating systems were released.


    In 2022, around 7.26 billion people own smartphones, making up 91.54% of the world’s
    population. 79% of smartphone users have made their mobile payment in the last
    six months.


    Figure [1-14](#535492_1_En_1_Chapter.xhtml#Fig14) describes mobile payment history.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig14_HTML.png)


    A flow-diagram for the mobile payment history. The label flows are the first mobile,
    online mobile, amazon launched, PayPal launched, first mobile wallet, 95 million
    mobile purchase, iPhone & android O S, ad 7.26 billion mobile users.


    **Figure 1-14** Mobile payment history


    Some notable mobile wallets include `Apple Pay`, `Amazon Pay`, `Google Pay`, `Venmo`,
    `PayPal`, `WeChat Pay`, `Zelle`, and `Square`.'
