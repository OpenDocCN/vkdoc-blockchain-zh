- fmt: '# The Future of NFT


    NFTs have a large amount of potential and interest in the field is rapidly growing.
    However, there are still many concerns about NFTs.


    There is currently a debate over whether the NFT industry is a bubble waiting
    to be burst. As mentioned earlier, the value of NFTs is based on the market’s
    demand for them. In these years, people are willing to pay thousands and even
    millions for NFTs because they believe the value of NFTs will increase in the
    future. But if interest in NFTs decreases in the future, then the investments
    of now may not come back in the future. If too many people pull out of the market
    at the same time, then the market may crash. However, the field of NFTs may end
    up similar to the dot.com phenomenon of the early 2000s—there may be an initial
    apprehensiveness and a large amount of speculation toward NFTs, but eventually
    they will be more integrated into society. NFTs have already proven their value
    with billions of USD in sales and millions of buyers.


    Another issue is that NFTs also offer little protection against theft. While NFTs
    give proof of ownership, the fact that anyone can access the NFT being traded
    means that the digital goods are able to be copied and downloaded. In the future,
    as digital goods and copyright law continue to expand, we may begin to lessen
    this problem.


    Of course, one of the largest limitations of NFTs is that they are seen as harmful
    to the environment. According to the UK Renewable Energy Hub, each Ethereum transaction
    uses 48.14 kWh of energy. In comparison, the average kWh usage per day in a UK
    household is 8.5 to 10 kWh. However, environmental engineers and scientists have
    worked on reducing emissions from the crypto industry, such as using Proof of
    Stake (PoS) instead of Proof of Work (PoW) consensus. It is also worth mentioning
    that physical art often travels between exhibits by plane or truck, meaning physical
    art also makes a contribution to carbon footprints.


    Speaking of art, one of the most famous use cases of NFT currently is in digital
    art. As NFTs continue to give artists an opportunity to share their work digitally,
    it creates more opportunities for artists of all different backgrounds and experience.
    Artists will no longer have to rely on corporations, brands, and collectors, and
    will thus be able to explore their creative vision more and find an audience that
    supports them. NFTs can also encourage creativity, as digital work can come in
    many forms, from VR to work that can be used every day.


    In addition, NFTs can benefit the audience of an artist. NFTs increase accessibility
    of viewing art—viewers do not need to travel to the physical space the art is
    in, so people can explore galleries from anyplace, anytime. Patrons can also directly
    support artists and creators due to the direct nature of blockchain transactions.


    Another possible use case could be selling concert and event tickets via NFTs.
    A paper ticket comes with the risk of being misplaced or copied, while the Ethereum
    blockchain can provide an indestructible and authentic record of ownership.


    NFT and blockchain gaming may also see increasing popularity in the next couple
    of years. In-game items and currency being purchased and traded online is already
    common. NFTs can be the next step in securing the buyer’s ownership of digital
    assets.


    It is also worth mentioning that NFTs can also be used with the real estate market.
    An NFT could be issued as a proof of ownership of property. NFTs can also be used
    as a tool for verification—schools could give students NFTs as a proof of a degree
    completion.


    Of course, there is another concept that is also rapidly gaining traction among
    the tech sector and general public: the Metaverse. NFTs are based on websites
    and typically used for digital goods, while the Metaverse is a digital space and
    VR-based. Although they may seem different at a first glance, many companies see
    potential and have found ways to combine the two topics.


    ## Summary


    In this chapter, we learned that NFTs are nonfungible tokens, or individual tokens
    that are unique. NFTs are most commonly exchanged on the Ethereum network; digital
    signatures that show proof of ownership make it easy to transfer and purchase
    files. The next chapter will cover the basics of the Metaverse, a 3D internet
    based on new immersive technologies.


    # 7. Metaverse: The World Reimagined


    In 1974, philosopher Robert Nozick discussed an experience machine that would
    stimulate an individual’s brain with happy experiences indistinguishable from
    experiences in the “real” world. Nozick asked a question: “If given a choice,
    would we choose the machine over reality?” In 1999, the sci-fi movie Matrix raised
    a similar question: red pill or blue pill? Pop the red pill and wake up in the
    real world where you see the world is just a simulation created by the Matrix,
    or swallow the blue pill and teleport to the virtual Matrix plot? The Metaverse
    concept is similar to the Matrix, where the real and virtual worlds merge in the
    “future version of the Internet.”


    Although the Metaverse is still in its early stages, it has rapidly gained mainstream
    consciousness in recent years. The Metaverse will be a 3D Internet in the future
    that is built based on a collection of new technologies that include virtual reality
    (VR), mixed reality (MR), augmented reality (AR), Blockchain, artificial intelligence
    (AI), and the Internet of Things (IoT).


    This chapter will introduce the basics of the Metaverse. Then, we will discuss
    the concepts and technologies behind AR, VR, MR, and XR. By exploring the different
    layers of the Metaverse, we understand the structure of the Metaverse. Next, we
    discuss how NFT and crypto Games work in Metaverse. Then, with a detailed practical
    example, we understand how we can buy our virtual real estate assets in the Metaverse
    world. At the end of the chapter, we will provide an overview of the future of
    the Metaverse.


    In this chapter, we cover the following specific topics on blockchain:


    - Introduction to Metaverse

    - AR, VR, MR, and XR

    - Understanding Metaverse layers

    - Crypto games in the Metaverse

    - Virtual real estate in the Metaverse

    - The future of the Metaverse


    ## Introduction to Metaverse


    The Metaverse is a hot topic in various industries, especially when combined with
    other technologies, such as blockchain and AI, to build the future of the Internet.


    ### What Is the Metaverse?


    The Metaverse became one of the top technologies and trends in 2021 and continues
    to be as of date. The Metaverse is not here yet, but numerous big companies have
    already made large investments in the Metaverse development. Eventually, the Metaverse
    will be a 3D variation of the Internet and take the virtual reality experience
    to the next level. It will enable users to do almost everything—from work, leisure,
    socializing, education, shopping, and even purchasing land through digital avatars—in
    a purely virtual world.'
