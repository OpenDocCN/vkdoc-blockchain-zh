    platform. In the decentralized lending and borrowing platform, we demonstrate
    how to lend, withdraw, swap, borrow, and repay crypto assets in the Aave platform.
    We also discuss decentralized insurance.


    At the end of the book, Chapter [9](#535492_1_En_9_Chapter.xhtml), “The Future
    of Blockchain,” we will review topics from previous chapters in a discussion on
    the future of blockchain. You will learn about the evolution of the Internet and
    conclude with an overview of real-life examples of blockchain across various industries.


    It is assumed that you have little to no experience in a professional blockchain
    environment. This book provides a general introduction to critical aspects associated
    with blockchain. We will not provide too many technical details, such as writing
    an advanced smart contract and setting up a professional development environment.
    Instead, we will give you practical information on the most important and latest
    concepts within blockchain, which will give you a strong basis for entering the
    world of blockchain.


    Acknowledgments


    We thank everyone who made this book possible, including family and friends who
    supported us, colleagues who encouraged us, and reviewers and editors who polished
    our work.


    About the Authors About the Technical Reviewer


    # 1. Blockchain: A Groundbreaking Technology


    In recent years, there has been a rising number of Americans who own cryptocurrency.
    Even among those who don’t, most Americans have heard of cryptocurrencies—does
    “Bitcoin” sound familiar? If you have heard about blockchain, but you are unsure
    of how it works, then do not worry; you are not alone! Although blockchain may
    seem like an intimidating topic at first, we are here to help you become familiar
    with important concepts of blockchain.


    This chapter will begin with the basics of blockchain. Then, we will discuss how
    the blockchain works and gain a solid understanding of consensus algorithms. Next,
    we will learn about the evolution of the monetary system and how blockchain technology
    impacts money, business, and the modern world. Finally, at the end of the chapter,
    we will provide an overview of cryptocurrency.


    In this chapter, we cover the following specific topics on blockchain:


    *   What is blockchain?


    *   How the blockchain works


    *   Consensus algorithms


    *   The evolution of monetary system


    *   Understanding cryptocurrency


    ## What Is Blockchain?


    At the heart of all cryptocurrencies, we can find the revolutionary and decentralized
    technology known as blockchain. It’s important to be clear about what we mean
    by decentralization, as this concept is frequently used in blockchain. Let’s start
    by looking at the opposite of decentralization: centralization is when authority
    is held by a specific individual, organization, or location.


    Figure [1-1](#535492_1_En_1_Chapter.xhtml#Fig1) shows an example of a centralized
    organization.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig1_HTML.png)


    Two flow diagrams for the centralized organization. The label parts of the first
    diagram from top to bottom are C E O, engineering manager, marketing manager,
    engineer, and marketer. The second one is labeled centralized with arrows pointing
    outwards from the central structure.


    Figure 1-1


    Centralization example


    Think of a typical hierarchy within a company—the executives make all the critical
    decisions. Then, executives pass decisions down to managers, who are in charge
    of lower levels. They are expected to perform whatever tasks are assigned to them
    by the executives. Going one step further, the employees are expected to listen
    to their managers and complete assigned work. While a centralized company can
    make achieving objectives relatively quick and easy, employees often do not have
    visibility and communication with other departments and higher levels. Lack of
    such communication can cause issues and lead to failures, causing all levels to
    feel the consequences. Often, a flaw in any part of the company can compromise
    the goals, which is known as single point of failure.


    Another example of centralization is online service providers, such as Meta (Facebook),
    Amazon, Apple, and Google. These Internet services follow a client-server architecture.
    The user uses a client machine (known as remote processors—think web browser or
    mobile) to send remote requests to a centralized server machine (known as a host
    system). The user receives results for their service request from this single
    course of complex service providers. On the bright side, billions of people use
    these superb digital services for everyday tasks, such as online shopping, posting
    photos, and calling family and friends, all without charge. But there is an overlooked
    cost to these “free” services: these companies collect and store large amounts
    of valuable data on user behavior in their centralized servers. With big data
    analysis and machine learning algorithms, this user data is converted into a product
    and sold to a third party. With this data, companies can target the users in ads
    and services, increasing opportunities to be exposed to security risks—this is
    all out of the user’s control.


    Now that we have looked at centralization, we can explore decentralization, which
    refers to the distribution of equal power from a top authority or location to
    every unit. Unlike the previous examples we looked at, decision making is not
    concentrated in a central authority or power in a decentralized organization.
    Rather than collectively relying on one authority, each member is independent
    and can decide on organizational activity. With decentralization, all members
    are involved and working with each other to reach a goal. Everyone can vote for
    decisions based on the organization’s rules.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig2_HTML.png)


    Two blockchain diagrams depict the decentralization organization under marketing
    and engineering. The labeled flow position is C E O, manager, engineer, and marketer.


    Figure 1-2


    Decentralization example'
