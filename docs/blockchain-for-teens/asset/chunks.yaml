  trans: '

    ### 什么是加密货币波动性？


    金融市场中的`波动性`是指资产价格在特定时期内上涨或下跌的速率。它是理解、管理和量化投资风险的重要指标。通常，高波动性指价格快速波动，而低波动性指价格在小范围内缓慢变化，意味着价格相对稳定。


    高波动性通常意味着更高的风险，但也可能带来更高的回报。而低波动性通常意味着较低的风险和较低的回报，但这并非绝对。低波动性的一个例子是政府债券，它们完全由政府信用背书，通常被市场视为低风险资产。黄金是另一个例子，因其价格长期保持稳定。图
    1-18 展示了高波动性与低波动性。


    ![](img/535492_1_En_1_Fig18_HTML.jpg)


    *一张关于时间与价格的示意图，高波动性表现为大幅震荡的锯齿线，低波动性表现为小幅震荡的锯齿线。*


    **图 1-18** *高波动性与低波动性*


    许多人听说过加密货币市场的高波动性。一些加密货币的价格可能在极短时间内暴跌 90%。让我们来看几个例子。


    市场回调通常指从近期最高点下跌 10% 到 20%。表 1-4 列出了从 2013 年 11 月到 2020 年 3 月比特币回调的历史记录。对于加密货币新手来说，加密市场的崩盘可能相当可怕。然而，对于那些了解比特币历史的人来说，这种市场回调并不新鲜。尽管这些下跌让人们对比特币不稳定的价格感到相当沮丧，但其价格从
    2010 年的`0.0008 美元`起步，随着时间的推移，在 2022 年 6 月上涨到了`25000 美元`。


    **表 1-4** *比特币回调历史*


    | 日期 | 价格 | 跌幅 |

    | --- | --- | --- |

    | 2013 年 11 月 30 日–2016 年 1 月 14 日 | 1163 美元 - 152 美元 | -86.9% |

    | 2017 年 3 月 10 日–25 日 | 1350 美元–891 美元 | -34.0% |

    | 2017 年 5 月 25 日–27 日 | 2760 美元–1850 美元 | -33.0% |

    | 2017 年 6 月 12 日–7 月 17 日 | 2980 美元–1830 美元 | -38.6% |

    | 2017 年 9 月 2 日–15 日 | 4980 美元–2972 美元 | -40.3% |

    | 2017 年 11 月 8 日–12 日 | 7888 美元– 5555 美元 | -29.6% |

    | 2017 年 12 月 17 日–2018 年 12 月 15 日 | 19666 美元–3220 美元 | -83.6% |

    | 2019 年 6 月 26 日–2020 年 3 月 12 日 | 12867 美元– 5040 美元 | -60.8% |


    `Luna`（也称为`Terra`）是最初`Terra`区块链的原生代币，该区块链于 2018 年启动。当时，该代币的名称为`LUNA`。`Luna`是韩国公司`Terraform
    Labs`于 2018 年开发的一条区块链。该区块链旨在改造现代金融体系。


    2020 年，`Luna`开始出售名为`TerraUSD`的稳定币。`Luna`曾是市值排名前十的主要加密货币。但根据`CoinMarketCap`的数据，2022
    年 5 月 11 日，`LUNA`在 24 小时内跌至原价的 2%。`LUNA`的价格在一天内从`32.71 美元`跌至`0.08384 美元`。


    ![](img/535492_1_En_1_Fig19_HTML.jpg)


    *一张 Luna 市场价格波动示意图，其价值从 190.52719716、119.2518039、46.12450969、0.80000000 跌至 0.00007500。*


    **图 1-19** *加密货币市场波动性——Luna*


    `StepN`是一款“边运动边赚钱”的健身应用，引入了一种新的`Web3`生活方式应用。用户必须购买`NFT`运动鞋才能参与游戏。`STEPN`使用`GST`（`Green
    Satoshi Token`），这是一种基于`Solana`区块链的代币。用户可以通过在户外步行或跑步，利用手机`GPS`服务追踪用户运动轨迹来赚取`GST`，或者通过将自己的`NFT`运动鞋“出租”给其他用户来赚取代币。其中一些运动鞋在`NFT`市场上价值数千美元。`StepN`由`FindSatoshi
    Lab`于 2021 年 12 月推出。这一创新方案使`STEPN`迅速颠覆了健身行业，并获得了市场的广泛关注。


    加密货币市场于 2022 年 3 月 9 日开始上线`GMT(STEPN)`。起初价格为`0.01 美元`。到 4 月 28 日，价格飙升至`4.03 美元`——短短
    51 天内涨幅达 40200%（数据来自`coinmarketcap`）。但在整个加密货币市场下跌之后，其价格在 2022 年 6 月跌至`0.6317 美元`。图
    1-20 展示了加密货币市场的波动性——`STEPN`。该图表来自`CoinGecko`。


    ![](img/535492_1_En_1_Fig20_HTML.png)


    *一张来自 CoinGecko 的加密货币市场波动性示意图。5 月 2 日的最高波峰高于 5400。*


    **图 1-20** *加密货币市场波动性——Stepn（来自 CoinGecko）*


    ### 是什么导致了加密货币市场的高波动性？


    有多种因素会导致市场环境高度波动和不稳定。让我们探讨其中一些因素。


    ### 新兴市场


    与互联网的历史相比，加密货币仍处于非常早期的阶段——自加密货币问世以来仅十年时间。在此期间，加密货币市场呈指数级增长。


    全球加密货币市值达到约`1.25`万亿美元，而 2021 年全球股票市值约为 121 万亿美元。与全球股票市场相比，加密货币市场仍然相对较小，而波动性是任何新兴市场的固有特性。即使在互联网股票的早期，也如同今天的加密货币市场一样，存在高波动性。


    加密货币要实现大规模采用仍需很长时间。与股票、法定货币和其他传统金融产品不同，该行业仍在研究、理解并开发可靠的模型来确定加密货币的基本价值。这意味着在当前市场上，没有可靠的产品能够预测加密货币的价格。


    ### 新技术


    在前面的`LUNA`例子中，`LUNA`发明了`TerraUSD`（`UST`）的概念。这种稳定币由`Terra`算法控制，以发挥像美元一样的法定货币功能。它旨在与美元以`1:1`的比例挂钩，但与其他主要的稳定币不同，`UST`并非完全由抵押品支持。`LUNA`还赋予持有者对协议的投票权。该协议一直按预期运行，直到出现可扩展性问题。如果用户在市场上行时归还`UST`，`LUNA`协议需要通过向用户发行更多`UST`代币，将`UST`的价格拉回`1
    美元`。这导致`LUNA`的总代币供应量从 5 月 5 日的约 7.25 亿枚飙升至 5 月 13 日的约 7 万亿枚。稳定币的`1:1`比例再也无法维持。其价格从`1
    美元`跌至`0.009 美元`。


    ### 去中心化


    像比特币这样的加密货币，原生于区块链网络。与黄金这种现实物理世界中的实物资产相比，加密货币更像是一种“价值存储”。它没有任何实物商品或中心化货币作为支撑，仅以虚拟形式存在，因此它没有内在价值。其价格由市场的供需关系决定，但许多因素都可能导致价格波动。


    ### 市场情绪


    市场情绪，也称为投资者关注度，是投资者对某一特定资产价格预测的整体感受。许多事情都可能影响投资者对加密货币的关注度，从而引发一段时期内的剧烈波动。以下几点可供参考：治理、监管、供需关系、安全漏洞、竞争等。


    加密货币价格的波动性和难以预测性可能会让人感到沮丧，因此，管理风险、将加密货币分散投资于一系列不同的加密资产、进行研究和技术分析、投资你能承受损失的金额，并着眼于长期持有等，就显得尤为重要。

