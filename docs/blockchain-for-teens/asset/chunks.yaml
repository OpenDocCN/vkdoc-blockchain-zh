  trans: '

    # NFT 的示例


    谈到 NFT，不乏许多成功案例。以下是一些已售出的最具标志性的 NFT：


    **Bored Ape Yacht Club (BAYC)**


    区块链技术公司 `Yuga Labs` 创建了一个包含 10,000 个 "无聊猿" NFT 的系列。其中最贵的一个 `Bored Ape #2087` 以
    769 个 `ETH`（约合 230 万美元）售出。拥有一个无聊猿，会员即可享受专属福利，如社区活动、会员专属 `Discord` 服务器、名为 "The
    Bathroom" 的涂鸦板、空投等。无聊猿 NFT 的持有者甚至可以将他们的 NFT 租给 NFT 博物馆，或将其用于获取高额回报。许多名人都对 `BAYC`
    表现出了兴趣。


    **威廉·夏特纳的纪念品**


    威廉·夏特纳将其 60 年演艺生涯中的物品作为 NFT 系列出售。125,000 件物品在短短 9 分钟内售罄，其中包括他的大头照、一张夏特纳拥抱《星际迷航》演员伦纳德·尼莫伊的照片，以及一张他的牙齿
    X 光片。


    **Grimes WarNymph**


    创作型歌手 Grimes 以 389,000 美元的价格出售了一段名为 "Death of the Old" 的视频，该视频是她 10 件 NFT 藏品系列的一部分。总的来说，她通过出售该系列赚取了
    580 万美元。


    **Nyan Cat**


    克里斯·托雷斯于 2021 年 2 月在一场在线拍卖会上以 300 个 `ETH`（当时约合 60 万美元）的价格出售了原始的 Nyan Cat GIF。这位创作者表示，他
    "对成功感到非常惊讶"，但同时也 "很高兴知道（他）基本上为加密世界打开了一个全新迷因经济的大门"。


    **Twitter CEO 的第一条推文**


    Twitter 联合创始人杰克·多西将他于 2006 年 3 月 Twitter 上线时发布的第一条推文作为 NFT 出售，售价为 290 万美元。多西将这笔钱兑换成比特币，然后捐赠给了
    `GiveDirectly` 慈善组织。


    **NBA Top Shot**


    `Top Shot` 是一个 NFT 市场，用户可以在其中交易和购买 NBA 精彩集锦视频。2020 年 10 月，`NBA Top Shot` 的销售额估值超过
    3.38 亿美元。目前，`Top Shot` 上最有价值的资产是勒布朗·詹姆斯对阵休斯顿火箭队时扣篮的视频，该视频以 387,000 美元售出。


    **RTFKT 运动鞋**


    `RTFKT` 为在线游戏角色创作虚拟运动鞋，每双售价高达 10,000 美元。2021 年 3 月，`RTFKT` 与艺术家 `Fewocious` 合作，生产了一系列运动鞋，在几分钟内为他赚取了
    310 万美元。


    **Taco Bell GIF**


    快餐公司 Taco Bell 将其菜单上的食物相关的 GIF 系列作为 NFT 出售。几分钟内，这些 GIF 就销售一空，Taco Bell 随后将所有收益捐赠给了其慈善组织
    Taco Bell 基金会。


    **Reddit NFT 头像**


    Reddit，这个用户可以发帖和互动的在线社交平台，正在邀请艺术家创作 NFT 头像。这些 NFT 随后在官方网站上以 15 至 100 美元的价格出售，用户可以将这些
    NFT 用作自己的头像。


    **The NFT Magazine**


    `Cryptonomist` 有一个名为 `NFT Magazine` 的项目，允许人们阅读关于加密世界的各种见解，包括重要人物、市场趋势以及投资建议。但是，要阅读该杂志，用户必须收集
    NFT 杂志封面。


    # NFT 的卖点


    尽管某些 NFT 没有内在价值，但 NFT 确实提供了许多非 NFT 无法提供的优势。NFT 的成功可归因于多种因素，其中包括以下几点：


    ## 稀缺性


    创作者可以铸造数量有限的 NFT，这将提高单个资产的价值，并使人们更愿意购买。可获得的副本数量也是公开的。结合创作者的良好声誉和市场上对特定 NFT 的高需求，NFT
    可以获得数百万美元的市场价格。


    ## 真实性


    独特的数字签名使任何人都能验证 NFT 的原创性，并防止伪造，这是实体艺术品中常见的问题。它还有助于买家避免被骗，因为很容易看出 NFT 的创建者是谁，而且所有者无需担心证明作品是否是自己创作的。


    ## 易于与加密货币一起使用


    由于 NFT 存在于区块链上，因此可以轻松通过加密货币集成进行交易。迄今为止，最流行的加密货币是 `Ethereum` 网络上的 `ETH`，但也包括 `Solana`
    网络上的 `SOL` 加密货币和 `Cardano` 网络上的 `ADA`。


    ## 所有权


    NFT 使得所有权的转移变得容易。还可以共享 NFT 的所有权，这被称为 "部分所有权"。所有权也作为公共记录公开列出，因此无需中间人或实体文件来证明所有权。


    ## 永久性


    NFT 没有实体物品所具备的限制，并且不会随时间推移而损坏。实体物品会受到来自太阳的紫外线辐射、灰尘积聚、湿度损坏、金属生锈以及粗暴处理或其他事故的影响。但是，NFT
    的所有者可以永久销毁该 NFT（如果他们愿意的话），这被称为燃烧。


    ## 效率


    使用数字资产消除了第三方。买家和卖家可以直接互动，无需中间人。这有助于节省时间、防止沟通不畅，并帮助企业追踪其产品的到达地点。


    ## 版税


    在出售 NFT 后，每当其艺术品被转售时，原创艺术家都可以获得一部分利润。与当前艺术和音乐行业的做法相比，这是一个巨大的进步，因为在这些行业中，许多公司、流媒体服务和其他中间商攫取了大部分利润。NFT
    让创作者能够完全掌控自己的作品并管理自己的销售。


    ## 制造成本低廉


    虽然根据区块链的不同，Gas 费可能很高——特别是 `Ethereum` 的 Gas 费——但铸造一个 NFT 可以是免费的，或者仅需几美元。`Solana`、`Tezos`、`Avalanche`、`WAX`
    是更便宜的区块链，而 `Polygon` 则允许用户免费创建 NFT。

    '
- fmt: '# Creating Your Own NFT


    Getting started with your first NFT may seem daunting, but the options are endless.
    Many associate NFTs with only digital art, but you can mint anything that’s digital—from
    music to trading cards to memes to videos to tweets—as an NFT. Of course, it’s
    important to remember to abide by all ownership and copyright laws. Creating your
    own work and using that as an NFT will prevent you from getting into legal complications
    and attract supporters.


    A recommendation would be to start a collection. Making a collection can help
    you gain experience and can also help generate interest in traders. In the end
    though, no matter what you choose to create as an NFT, make it your own unique
    style.


    Be aware, however, that just because some people have met astounding success when
    dealing with NFTs, does not mean that anyone who creates an NFT will instantly
    generate millions. Analyze the market to see what is popular and what gets ignored.
    Also note that minting an NFT requires you to pay for service and gas fees. And
    be sure to price your NFTs fairly—sometimes, NFT are sold at a low value and the
    buyer will resell the NFT for a significantly higher price.


    Now, onto the actual process. If you haven’t already, setup a crypto wallet and
    create an account. Popular options to download include `MetaMask`, `WalletConnect`,
    and `Rainbow`. Setting up a crypto wallet is free, but you should know the different
    types of wallets available. There are hosted wallets and self-custody wallets.
    Hosted wallets are managed by a third party, similar to a bank. While there may
    be less functions related to managing cryptocurrency, your money will be more
    secure. Self-custody wallets, on the other hand, give the user complete control
    over their wallet, but is less secure. The best option depends on what you are
    looking to use your wallet for, but for minting and trading NFTs, a hosted wallet
    is better.


    No matter which option you choose, keep your password key safe—if you lose this
    key, you will lose access to your crypto assets. We also recommend purchasing
    a hardware or physical wallet.


    It is also important to note that different types of blockchains use different
    crypto wallets. The top blockchain for crypto is Ethereum as of 2022, but Binance,
    Smart Chain, and Polkadot are becoming more popular.


    Then, buy a form of cryptocurrency from a reputable trading platform, such as
    `CoinBase` or `Gemini`. `ETH` is the most popular cryptocurrency for NFT purchases,
    but `SOL` and `XTZ` are also notable options.


    After your wallet is set up, sign up on an NFT marketplace, such as `OpenSea`,
    and connect your cryptocurrency wallet to your account. If you need a walk-through
    setting up a wallet, you can refer back to Chapter [5](#535492_1_En_5_Chapter.xhtml)
    to set up a `MetaMask` wallet. We will cover different marketplaces in the next
    section.


    Now, you can upload your digital files and sell them either for a fixed amount
    or in an auction. Once they are moderated and approved, they will be listed for
    sale and buyers will be able to purchase the NFT. When a purchase is made or the
    auction concludes, the NFT owner will receive the top bid.


    Now that you know the general procedure, let us go through the steps:


    First, go to `testnets.opensea.io`. Note that we are using a testnet for our demo.
    Click on the create button.


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figa_HTML.png)


    Snapshot of the open sea website home page.


    Then, connect your wallet. We will be using `MetaMask` for our walk-through:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figb_HTML.png)


    Snapshot of connecting the wallet screen. Metamask is marked as a popular wallet
    among other wallets.


    Once you choose the wallet you want to connect, you should see the screen as follows:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figc_HTML.png)


    Snapshot of the account added to the wallet.


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figd_HTML.png)


    Snapshot of the address, transactions, and account balance permissions to the
    account.


    Great! You have now connected your wallet. Now, we can create our NFT. Upload
    your digital file and give your NFT a name:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Fige_HTML.png)


    Snapshot of creating a new N F T.


    If you want, feel free to add additional details to your NFT. Once you are satisfied,
    scroll to the bottom of the page and click on the create button:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figf_HTML.png)


    Snapshot of adding additional details for the N F T account.


    We have successfully created an NFT! You can now see different details about your
    NFT in an overview:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figg_HTML.png)


    Snapshot of the details of a tiger N F T.


    ## NFT Market Place


    The worth of an NFT at any given time is determined by what people are willing
    to pay for it. In general, however, NFTs tend to go for high prices because they
    are scarce and limited. In 2018, the market cap was $41 million. Just 2 years
    later, the market cap rose to $338 million. In Q3 of 2021, the sales rose to $10.7
    billion. Figure [6-1](#535492_1_En_6_Chapter.xhtml#Fig1) shows the amount of collections
    that exist in each chain.


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Fig1_HTML.png)


    A bar graph depicts the collection volume by chain. Ethereum has the highest collection
    volume.


    Figure 6-1


    Collection volume of NFTs by blockchain from DefiLlama


    To compare, we also have included a graph with the total amount of USD volume
    in each blockchain. Note that Ethereum is by far the most popular blockchain in
    collection volume and USD volume. According to this dataset by DefiLlama, Ethereum
    accounts for 98% of total USD volume in the NFT market.


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Fig2_HTML.png)


    A bar graph depicts the U S dollar volume by chain. Ethereum has the highest volume.


    Figure 6-2


    Collection volume of NFTs by blockchain from DefiLlama


    As you can see, most transactions and NFTs happen on the Ethereum blockchain.
    When considering trading or using NFT marketplaces, it is important to consider
    the number of trades happening on the blockchain. More trades on the blockchain
    means the network will have more users and be more stable and decentralized. However,
    it is also important to know that tokens from an EVM-based network, such as Ethereum,
    BSC, and Arbitrum cannot be used on non-EVM–based blockchains, such as Solana,
    Cardano, and ImmutableX.


    You can also see the success of NFTs just based on individual collections. We
    have taken the top 15 best-selling NFT collections from `cryptoslam.io` shown
    as in Figure [6-3](#535492_1_En_6_Chapter.xhtml#Fig3). These are some of the most
    well-known and successful NFTs collections of all time, with sales from the top
    seven collections surpassing billions of USD in sale volume. All of the collections
    also have thousands of buyers and tens of thousands of transactions. The most
    impressive collection is the Axie Infinity collection with 1.7 million buyers,
    17 million transactions, and 2.19 million owners. However, NBA Top Shot has an
    astonishing 21 million transactions on the network.


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Fig3_HTML.png)


    A chart depicts the N F T collection rankings by sales volume. Axie infinity has
    the highest sales value.


    Figure 6-3


    Top 15 NFT collections by sales volume from `cryptoslam.io`


    ### OpenSea.io


    The most popular marketplace is `OpenSea.io`, which supports over 150 payment
    tokens and is easy to use. Signing up and viewing digital assets is free, and
    it also allows creators to easily mint NFTs:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figh_HTML.png)


    A snapshot of the advantages and disadvantages of digital assets.'
