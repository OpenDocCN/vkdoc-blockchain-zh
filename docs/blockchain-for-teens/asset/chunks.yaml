    When you need to call state-changing methods, such as an update message, you must
    connect to the signer and pay a gas fee to send the state-changing transaction:


    ![A screenshot of the signer contract object input message to update contract.](images/535492_1_En_5_Chapter/535492_1_En_5_Figf_HTML.jpg)


    With the signer contract object, you can now pass input message to update contract:


    ![A screenshot of the a sync function update message.](images/535492_1_En_5_Chapter/535492_1_En_5_Figg_HTML.jpg)


    Let''s update our message, enter "Hello Ethereum."


    ![A screenshot of the reject and confirm transactions page in the E2E hello world
    dapp with the message hello ethereum.](images/535492_1_En_5_Chapter/535492_1_En_5_Fig32_HTML.png)


    **Figure 5-32** — Dapp update message


    Metamask will popup and ask to confirm transaction with an estimated gas fee.
    You review the transaction and submit. The block explorer allows you to view transactions.


    ![A screenshot of the update message and the details of transactions with a message
    confirmed and from and to information.](images/535492_1_En_5_Chapter/535492_1_En_5_Fig33_HTML.jpg)


    **Figure 5-33** — Dapp update message transaction detail


    Click view on block explorer to see your transaction in etherscan.


    ![A screenshot of the etherscan transaction details with a message success highlighted.](images/535492_1_En_5_Chapter/535492_1_En_5_Fig34_HTML.png)


    **Figure 5-34** — Dapp update message transaction in etherscan


    Once the transaction is confirmed, you will get transaction receipt in page popup.


    ![A screenshot of a transaction receipt with a message success at the right and
    a box communicating a localhost message with an option marked ok.](images/535492_1_En_5_Chapter/535492_1_En_5_Fig35_HTML.png)


    **Figure 5-35** — Dapp with response transaction receipt


    Finally, verify your updated message by clicking the message button. "Hello Ethereum"
    should show on the page.


    ![A screenshot of the update message saying hello Ethereum in the E2E hello world
    dapp interface.](images/535492_1_En_5_Chapter/535492_1_En_5_Fig36_HTML.png)


    **Figure 5-36** — Dapp verify updated message


    Congratulations, you have successfully published your first smart contract to
    the public testnet and built a Dapp to call and update the message content! You
    have now completed an end-to-end Dapp development cycle, which is a huge accomplishment.
    Pat yourself on the back, because that was a lot of work.


    Despite the fact that we have spent enough time exploring Ethereum Dapp and Solidity
    principles to get you to build a Dapp, this book only provides a basic introduction.
    There are a lot of good online documentation covering all aspects of Javascript,
    JQuery, express.js, and ether.js.


    Here are some useful links:


    - `ether.js`: the document can be found at [`https://docs.ethers.io/v5/`](https://docs.ethers.io/v5/)

    - `JQuery`: the document can be found at [`https://jquery.com/`](https://jquery.com/)

    - `express.js`: the document can be found at [`https://expressjs.com/en/starter/hello-world.xhtml`](https://expressjs.com/en/starter/hello-world.xhtml)

    - `Node.js`: the document can be found at [`https://nodejs.org/en/docs/guides/getting-started-guide/`](https://nodejs.org/en/docs/guides/getting-started-guide/)


    ## Tokens Standard


    In Chapter [1](#535492_1_En_1_Chapter.xhtml), we learned Mohammad Bin Tughlaq
    invented token money—Tanka, which used copper currency to represent the same value
    as a silver coin. In a blockchain, the coin represents the native currency. For
    instance, ether is the coin in Ethereum. And a token is created by a smart contract,
    which defines basic token properties, then builds and operates.


    A crypto token is a virtual currency token representing programmable assets or
    shared ownership with access rights to an entity with a specific value. The token
    is managed by a smart contract, which allows for the efficient and secure purchase
    or sale of an item such as an art collection, the exchange of token ownership,
    the transfer of token balance, the storage of token value, and the verification
    of transactions on the blockchain.


    To assist developers in standardizing token creation, the Ethereum community has
    developed many token standards through the Ethereum Improvement Proposal (EIP)
    process.


    EIPs contain standard technical specifications for potential new Ethereum features
    or processes, including core protocol specifications, improvements, client APIs,
    and contract standards. It acts as the "source of truth" for the community. Anyone
    can create an EIP by following standards guidelines in the EIP-1, published in
    2015 ([`https://eips.ethereum.org/EIPS/eip-1`](https://eips.ethereum.org/EIPS/eip-1)).
    As stated in EIP-1, Ethereum Request for Comment (ERC) is the application-level
    standards and conventions. If the specific ERC is approved in the Ethereum community,
    it becomes a new token standard rule which will be outlined in the document through
    a related smart contract.


    There are many token standards, including:


    - Standards of token (ERC-20, ERC-721, ERC-1155, ERC-777)

    - Name registries (ERC-26, ERC-137)

    - URI schemes (ERC-67)

    - Library/packet formats (EIP-82)

    - Wallet formats (EIP-75, EIP-85)


    There are many other tokens still in draft and review status. You can check all
    token ERC through this link: [`https://eips.ethereum.org/erc`](https://eips.ethereum.org/erc)


    Let''s take a look at the two most popular ERC standards, ERC-20 and ERC-721.'
