- fmt: '### Geth JSON-RPC via Command


    `cURL` stands for “Client URL” and is a command-line tool for transferring data
    using various supported protocols (HTTP, IMAP, SCP, SFTP, SMTP, LDAP, FILE, and
    many others). The `curl` syntax is:


    ```

    curl [options] [URL...]

    ```


    For example, you can open a window or mac terminal, type the below `curl` command,
    you will see HTTP response from the remote server:


    ```

    curl -k www.apress.com/us

    ```


    To start `Geth` in http mode, you can use the `--http` flag as follows:


    ```

    geth –http

    ```


    The default port is `8545`. Once the `Geth` node starts, we can run the `curl`
    command to query some useful blockchain information.


    To get the `web3` client version, run the following `curl` command:


    ```

    curl -X POST -H ''Content-Type: application/json'' \

    --data ''{''jsonrpc'':''2.0'',''method'':''web3_clientVersion'',''params'':[],''id'':11}''
    \

    http://localhost:8545

    ```


    Here `id` - `11` is blockchain Id. The response result shows that `web3_clientVersion`
    is `Geth/v1.10.17-stable-25c9b49f/linux-amd64/gol.18`.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figh_HTML.jpg)


    To check account balance, we saw in the previous `Geth` console example, running
    the following `curl` command:


    ```

    curl -X POST \

    -H ''Content-Type: application/json'' \

    --data ''{''jsonrpc'':''2.0'',''method'':''eth_getBalance'',''params'':[''0x88437244acbb6276de36175740a8d686a9531ba7'',''latest''],''id'':11}''
    \

    http://localhost:8545

    ```


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figi_HTML.jpg)


    We get hex result - `0x56bbc5d759fba6400`.


    By converting Hex value to decimal (`www.binaryhexconverter.com/hex-to-decimal-converter`):


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figj_HTML.png)


    And then, we convert Wei to Ether and divide the decimal number by `10^(18)`.
    The final result is `99.996902986 Ether`, which is matched to the previous result
    we run in `Geth` console.


    ### Geth Folder Structure


    Once `Geth` installed, it stores the default `Geth` local data directory based
    on operating systems:


    - **Mac**: `~/Library/Ethereum`

    - **Linux**: `~/.ethereum`

    - **Windows**: `%LOCALAPPDATA%\Ethereum`


    It is structured as shown in Figure 4-14.


    `chaindata` – Directory of the downloaded blocks data and EVM state data.


    `ancient` – When `chaindata` passes approximately 100k blocks, the past blocks
    are moved to the `ancient` directory.


    `ethash` – `Ethash` is Ethereum’s Proof of Work hashing algorithm, the files under
    this location are part of the Ethereum mining computation. It can be regenerated
    and deleted safely.


    `lightchaindata` – Contain a light version of the blockchain, just the receipts
    (not data) and content.


    `nodekey` – File of public key used for other public peer nodes to connect or
    add a peer node to network.


    `nodes` – Contains peer connection data, used to establish network at the start.


    `keystore` – Stores account information, the account key can be found in the `keystore`
    folder.


    `geth.ipc` – File for inter-process-communication as used by `Geth` connection.


    By default, the `Geth` uses Google LevelDB as the underlying database implementation
    to store blockchain data, for example, `000002.ldb` and `000011.ldb` under `chaindata`
    folder in the Figure 4-14 folder structure. LevelDB is an open source on-disk
    key-value storage.


    As we know from Chapter 2, “Cryptography,” every Ethereum account is defined by
    a private key and public key pair. The account’s address is derived from the public
    key by taking the last 20 bytes. When we use `Geth` to generate a new account,
    the new account address with the private key pair is encoded in a JSON text file
    as a keyfile. Since it contains your account’s private key, the file content is
    always encrypted. This keyfile can be used to access your Ethereum account and
    transfer fund. So, you need to back up your keyfiles regularly and make sure this
    file is secure and not accessible by others.


    Let''s use `Geth` console to generate a new account address by running command
    `personal.newAccount()` and enter a passphrase:


    The account address `0x0b1400031bea2def60a9d8f28fa373ab95d641f6` is generated.
    Now check `keystore` directory, there is a new JSON text keyfile generated for
    this account:


    ```

    └── keystore

    ├── UTC--2022-06-28T04-14-13.945107969Z--0b1400031bea2def60a9d8f28fa373ab95d641f6

    ```


    The content of this keyfile is encrypted, as displayed in the following:


    We have now learned Ethereum client—`Geth` and clarified how remote clients (command
    line or web app) can call the Ethereum client via web3j API and interact with
    the Ethereum blockchain.'
  raw: '#### Geth JSON-RPC via Command


    cURL stands for “Client URL” and is a command-line tool for transferring data
    using various supported protocols (HTTP, IMAP, SCP, SFTP, SMTP, LDAP, FILE, and
    many others). The curl syntax is


    ```

    curl [options] [URL...]

    ```


    For example, you can open a window or mac terminal, type the below curl command,
    you will see HTTP response from the remote server:


    ```

    curl -k www.apress.com/us

    ```


    To start Geth in http mode, you can use the --http flag as follows:


    ```

    geth –http

    ```


    The default port is 8545\. Once the Geth node starts, we can run the curl command
    to query some useful blockchain information.


    To get the web3 client version, run the following curl command:


    ```

    curl -X POST -H ''Content-Type: application/json'' \

    --data ''{''jsonrpc'':''2.0'',''method'':''web3_clientVersion'',''params'':[],''id'':11}''
    \

    http://localhost:8545

    ```


    Here id - 11 is blockchain Id. The response result shows that web3_clientVersion
    is Geth/v1.10.17-stable-25c9b49f/linux-amd64/gol.18


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figh_HTML.jpg)


    An image of a code to get a web3 client that runs the curl command in a console
    and web3_clientVersion is in the console. The code has numbers and letters.


    To check account balance, we saw in the previous Geth console example, running
    the following curl command:


    ```

    curl -X POST \

    -H ''Content-Type: application/json'' \

    --data ''{''jsonrpc'':''2.0'',''method'':''eth_getBalance'',''params'':[''0x88437244acbb6276de36175740a8d686a9531ba7'',''latest''],''id'':11}''
    \

    http://localhost:8545

    ```


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figi_HTML.jpg)


    An image of a code to check balance. It has texts in numbers and letters.


    We get hex result - 0x56bbc5d759fba6400


    By converting Hex value to decimal ([`www.binaryhexconverter.com/hex-to-decimal-converter`](http://www.binaryhexconverter.com/hex-to-decimal-converter)),


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figj_HTML.png)


    An image of a hex value and a decimal value box. At the bottom left there is the
    convert icon.


    And then, we convert Wei to Ether and divide the decimal number by 10^(18). The
    final result is 99.996902986 Ether, which is matched to the previous result we
    run in Geth console.


    #### Geth Folder Structure


    Once Geth installed, it stores the default Geth local data directory based on
    operating systems:


    *   Mac: ~/Library/Ethereum


    *   Linux: ~/.ethereum


    *   Windows: %LOCALAPPDATA%\Ethereum


    It is structured as shown in Figure [4-14](#535492_1_En_4_Chapter.xhtml#Fig14).


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig14_HTML.jpg)


    The structure of Geth folder consists of chain data, ancient, ethash, light chain
    data, node keys, nodes, Keystore, and geth.ipc.


    Figure 4-14


    Geth folder structure


    **chaindata** – Directory of the downloaded blocks data and EVM state data.


    **ancient** – When chaindata passes approximately 100k blocks, the past blocks
    are moved to the ancient directory.


    **ethash** – Ethash is Ethereum’s Proof of Work hashing algorithm, the files under
    this location are part of the Ethereum mining computation. It can be regenerated
    and deleted safely.


    **lightchaindata**– Contain a light version of the blockchain, just the receipts
    (not data) and content.


    **nodekey** – File of public key used for other public peer nodes to connect or
