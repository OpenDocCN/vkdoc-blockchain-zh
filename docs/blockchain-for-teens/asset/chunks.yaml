  trans: '

    # 5. 智能合约与去中心化应用：从理论到实践


    计算机科学家布莱恩·克尼根（Brian Kernighan）于 1972 年为贝尔实验室内部使用的 B 语言编写了第一个“Hello, World!”程序。布莱恩撰写了一本名为
    *B 语言教程导论* 的手册，用以演示如何使用 B 语言。此后，这段广为人知的文本迅速传播开来。它曾被用于 1974 年的贝尔实验室备忘录，以及 1978
    年的 *C 程序设计语言* 一书。“Hello, World!”至今依然流行，并已成为新程序员编写第一个程序的标准范例。这段特定的代码能够证明你的代码语法正确、可以编译并执行，而且能持续生成期望的输出。“Hello,
    World!”提供了超过 60 种编程语言的代码实现。


    在上一章中，我们从理论上解释了以太坊网络，包括以太坊的关键组件、以太坊虚拟机（EVM）和架构等。加深理解目前已学知识的最佳方法，就是开始动手实践，为以太坊区块链编写智能合约和`Dapps`。


    通过使用在线的`Remix`工具，你将学习如何使用所有必需的语法，用`Solidity`编写`HelloWorld`代码。你将从头开始，逐行学习。你还会学习如何在本地编译和部署智能合约，以及部署在全球分布的测试网上。然后，我们将安装`Metamask`钱包并将其连接到测试网。在本地`Dapp`开发环境中设置好所有必要条件后，你将开始以最小的精力开发自己的`Dapp`，用以连接测试网上的合约。在本章结束时，通过掌控你的以太坊钱包，你应该能够运行一个完整的、端到端的`HelloWorld`
    `Dapp`。


    本章将帮助你实现以下实际目标：


    -   介绍`Remix`

    -   编写你的第一个智能合约

    -   掌控你的第一个以太坊钱包

    -   去中心化应用程序（`Dapps`）

    -   代币标准


    在最后一节中，我们将介绍代币标准，其中包含两种最重要的代币——`ERC-20`和`ERC-721`。`ERC-721`是 NFT 代币标准，我们将在下一章中讲解。


    这有助于你更加熟悉智能合约和`Dapps`。


    ## 介绍 Remix


    加文·伍德（Gavin Wood）于 2014 年 8 月提出了`Solidity`编程语言。亚历克斯·贝雷格萨斯（Alex Beregszaszi）、克里斯蒂安·雷特维森纳（Christian
    Reitwiessner）以及其他以太坊核心贡献者共同创建了`Solidity`。它是一种受`JavaScript`、`C++`和`Python`启发的高级面向对象编程语言。`Solidity`的目的是在基于
    EVM 的区块链网络上执行智能合约。


    有许多工具可用于创建和开发`Solidity`智能合约。`Remix`、`HardHat`、`Truffle`等是`Solidity`开发者常用的工具。`Remix`是一个强大的在线集成开发环境（IDE），用于使用`Solidity`编写、编译、测试和调试智能合约。除了你的网页浏览器，我们不需要安装任何其他特殊软件。


    你可以在浏览器的 URL 框中输入以下网址来访问`Remix IDE`:


    [`https://remix.ethereum.org`](https://remix.ethereum.org)。然后你将被导航到`Remix`的首页，如图[5-1]所示。


    ![](img/535492_1_En_5_Fig1_HTML.png)


    一张带有工具栏的文件浏览器界面的截图。右侧显示主页，并带有标注为`Remix IDE`的标题，其下方显示一条扫描警报消息。


    **图 5-1**


    `Remix` 首页


    你会注意到`Remix`屏幕左侧有一个工具栏菜单。当你点击每个菜单图标时，会看到提供的不同模块。


    ### 文件浏览器


    在`文件浏览器`模块中，你可以管理工作空间，并在工作空间下创建合约文件。当你在多个项目上工作时，工作空间可以帮助你组织不同项目工作空间中的文件。你可以创建智能合约文件、创建文件夹，并将本地文件上传到当前工作空间。它与其他基于云的浏览器工具非常相似，比如
    Google Drive、Dropbox 等。在`contracts`文件夹下，`Remix`会为你创建三个默认合约。如果你不使用它们，可以将其删除。


    ![](img/535492_1_En_5_Fig2_HTML.jpg)


    一个标注为“默认工作空间”的界面截图，展示了 3 个图标上的 3 个标记。这 3 个标记分别是：创建新合约、创建新文件夹和加载本地文件到当前工作空间。


    **图 5-2**


    `Remix` 文件浏览器页面


    ### Solidity 编译器


    在`Solidity 编译器`模块中，你可以选择不同版本的`Solidity`编译器，编写本书时的当前版本是`0.8.7`。由于`Solidity`更新相当频繁，你需要密切关注选择所需的配置。一旦你创建了`Solidity`文件，你可以通过点击编译按钮来编译文件。`Remix`的合约区域将显示文件编译信息，例如错误和警告。`Remix`会持续每隔
    5 秒自动保存当前文件更改。


    ![](img/535492_1_En_5_Fig3_HTML.jpg)


    一个标注为`Solidity Compiler`的界面截图，展示了带有文件选择和运行选项的高级配置。


    **图 5-3**


    `Remix` Solidity 编译器页面


    ### 部署与运行交易


    在你编译了智能合约之后，可以使用`部署与运行交易`模块来部署合约。如果你编译了多个合约，需要在`合约编辑器`中选择一个合约进行部署。


    ![](img/535492_1_En_5_Fig4_HTML.png)


    一张标注为`部署与运行交易`页面的截图，包含环境、账户、Gas 限制、数值和合约详情填写表单。下方部分展示了地址添加、交易记录和已部署合约区域。


    **图 5-4**


    `Remix` 部署与运行交易模块


    该模块提供了多种 EVM 环境：


    **JavaScript VM** – JS VM 拥有自己的沙盒区块链模拟环境，在你的浏览器中运行。它执行交易的速度非常快（无需挖矿）。当你执行交易时，数据仅临时保存在浏览器中。一旦你关闭或重新加载页面，所有交易数据都将丢失。你将不得不从头开始。这对于快速尝试和测试简单合约非常有用。


    ![](img/535492_1_En_5_Fig5_HTML.jpg)


    一张界面上标有`Environment`部分的截图。`Environment`有一个用于选择 JavaScript、Web Provider 和 Connect
    List 的框。


    **图 5-5**


    `Remix` EVM 环境


    **注入提供者（Injected Provider）** – `Remix`将连接到注入到浏览器中的`web3`提供者（通常称为你钱包的浏览器扩展）。`Metamask`是目前最流行的`注入提供者`。你也可以使用其他流行的钱包，如`Coinbase`钱包、`Trust
    Wallet`和`Ledger`。你可以通过该提供者连接到以太坊主网络或各种测试网。这使得`Remix`能够与真实网络进行交互。


    **Web3 提供者（Web3 Provider）** – `Remix`将连接到一个远程节点。你需要提供所选提供者的 URL。`Infura`、`Alchemy`和`QuikNode`是一些流行的`Web3`提供者。


    ### 其他模块


    我们已经介绍了我们通常经常使用的重要`Remix`模块。其他模式如插件模块允许你安装所需的插件，例如调试插件、`Solidity`静态分析模块、`Solidity`单元测试模块和设置模块。如果感兴趣，你可以参考`Remix`文档了解详情（[`remix-ide.readthedocs.io`](https://remix-ide.readthedocs.io)）。


    在此阶段，我们应该已具备`Remix`的基本知识。


    现在，让我们通过编写“Hello, World!”智能合约来开始学习`Solidity`。

