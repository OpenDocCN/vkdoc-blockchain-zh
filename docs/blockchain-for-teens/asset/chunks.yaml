    ### 在 Uniswap 中创建新的流动性池


    **步骤 1 –** 访问 Uniswap 网站：[`https://app.uniswap.org/#/swap?chain=goerli`](https://app.uniswap.org/%2523/swap%253Fchain%253Dgoerli)。
    将出现以下屏幕，点击 `connect wallet` 按钮。 它会将你连接到 Goerli 测试网络。


    ![](img/535492_1_En_8_Figr_HTML.png)


    一组两个屏幕显示。 1. Uniswap 网站页面上的 `connect wallet` 按钮被高亮。 2. Goerli 测试网络页面显示 `cancel`
    按钮，以及 `next` 到 `cancel` 或 `connect with Metamask` 屏幕。


    **步骤 2 –** 连接成功后，Uniswap 将弹出一个屏幕，为你提供一个地址，并显示你在 Uniswap 平台上的所有代币交易。


    ![](img/535492_1_En_8_Figs_HTML.png)


    屏幕显示 Uniswap 平台，包含一个地址和所有代币交易详情列表，以及 `connect`、`disconnect`、`change` 和 `copy address`
    选项。


    **步骤 3 –** 选择“创建池子 (Create a pool)”。


    **步骤 4 –** 按下“选择代币 (Select a Token)”选项。


    **步骤 5 –** 在“搜索名称或地址 (Search Name or Address)”字段中输入你的代币地址，然后从下拉菜单中选择你的代币。


    **步骤 6 –** 点击“导入 (import)”按钮。


    **步骤 7 –** 将出现一个导入代币弹出窗口。忽略警告。点击“导入 (Import)”按钮。


    你将看到类似的过程（从步骤 3 到步骤 7），如下所示：


    ![](img/535492_1_En_8_Figt_HTML.png)


    4 个屏幕显示了创建池子的步骤。 1. 在池子平台上列出了 Create、move 和 V 2 流动性选项。 2. 创建池子页面高亮显示了 `select
    a token` 选项。 3. 第三个屏幕标题为 `add liquidity`，其中有一个 `import token` 的弹出窗口，包含一些详细信息。
    4. 在选择 `import token` 后的添加流动性页面。


    **步骤 8 –** 输入创建新流动性池所需的信息：


    1.  从 0.05%、0.3% 和 1% 中选择一个费用。我们选择 0.05%。

    2.  定义 DFTT 代币相对于当前 ETH 价格的比率。例如，输入 0.001。

    3.  设置价格范围。输入最低价格为 0.00001 ETH，最高价格为 1 ETH。

    4.  存入金额。我们将向此池存入 0.01 ETH。Uniswap 应用程序将自动计算 DFTT 的数量，即 0.000000978 DFTT。


    填写所有信息后，点击“批准 DFTT (Approve DFTT)”按钮。Metamask 将弹出并要求你确认交易。点击确认按钮。


    ![](img/535492_1_En_8_Figu_HTML.png)


    一组两个屏幕。 1. 添加流动性页面高亮显示了 `Approve DFTT` 按钮。其他选项包括 `select pairs` 和存入选项。 2. Metamask
    通知屏幕包含交易费用、一些其他详细信息、`reject` 和 `confirm` 按钮。


    **步骤 9 –** Uniswap 将显示一个预览页面。点击预览按钮。


    ![](img/535492_1_En_8_Figv_HTML.png)


    屏幕显示添加流动性页面。在 `select pair` 选项中高亮显示了“0.05% best for stable pairs”，并填写了存入金额。它包括设置最小和最高价格的价格范围选项，以及
    `approve DFTT` 按钮。


    **步骤 10 –** 将出现一个“添加流动性 (Add Liquidity)”弹出窗口。点击 `add` 按钮来添加流动性。Metamask 将显示确认弹出窗口，然后点击“确认
    (confirm)”按钮。


    ![](img/535492_1_En_8_Figw_HTML.png)


    一组两个屏幕。 1. 页面上的 `add liquidity` 弹出窗口中显示了 ETH/DFTT 价格范围以及一个 `add` 按钮。 2. `add liquidity`
    页面有 `waiting for confirmation` 弹出窗口，以及带有 `reject` 和 `confirm` 按钮的 Metamask 通知弹出窗口。


    **步骤 11 –** 一旦交易成功在区块链上被挖掘，你应该会在 Uniswap 平台上看到你的新流动性池，如下所示：


    ![](img/535492_1_En_8_Figx_HTML.png)


    一组两个屏幕。 1. 池子页面高亮显示了 `new positions` 和 `closed positions`。 2. Uniswap 页面显示 DFTT/ETH
    价格范围、价格范围最低值和最高值、当前价格等。


    ### 增加流动性池的资金


    增加流动性与创建流动性池的几个步骤非常相似。整个过程如下所示：


    ![](img/535492_1_En_8_Figy_HTML.png)


    5 个屏幕显示了增加流动性所涉及的步骤。 1. `Increase liquidity` 按钮被标记。显示了流动性、未领取费用等。 2. 带有一些详情的添加流动性页面，并标记了预览按钮。
    3. 标记了 `Add` 按钮。 4. 高亮显示了确认选项。 5. 包含价格详情的新流动性池页面。


    ### 在 Uniswap 中兑换代币


    **步骤 1 –** 选择 `Swap` 选项卡，然后选择代币对。你可以通过输入代币地址，从可用 ERC-20 代币的下拉菜单中搜索和选择。


    **步骤 2 –** 输入代币兑换数量。例如，我们将用 0.01 ETH 兑换 DFTT 代币。


    **步骤 3 –** 检查设置并确认兑换。


    ![](img/535492_1_En_8_Figz_HTML.png)


    一组 3 个屏幕显示了 Uniswap 平台上的代币兑换。 1. 高亮显示了选择代币选项。 2. 输入了代币兑换数量以及 `swap anyway` 选项。
    3. 高亮显示了 `Confirm swap` 选项。


    **步骤 4 –** 确认并兑换。你可以看到，为了创建兑换，钱包中扣除了总计 0.01 ETH。


    ![](img/535492_1_En_8_Figaa_HTML.png)


    4 个屏幕显示了兑换屏幕。 1. `Waiting for confirmation` 弹出窗口和 Metamask 通知页面。 2. 一个带有 `close`
    按钮的 `transaction submitted` 弹出窗口。 3. 显示了兑换前的 1.232 ETH 和兑换后的 1.222 ETH 的兑换页面。


    **注意：** 你可以从钱包地址查看所有最近的交易历史。要设置兑换交易设置，例如滑点容差等，你可以点击右上角的设置图标。


    ![](img/535492_1_En_8_Figab_HTML.png)


    一组两个屏幕。 1. 显示了右上角的兑换设置选项，包括滑点容差、交易截止时间和干扰设置。 2. 显示了包含最近交易信息的账户详情。


    使用类似的步骤，你可以兑换池中的任何代币，包括像 UNI 这样的流行代币。这是一个例子：


    ![](img/535492_1_En_8_Figac_HTML.png)


    5 个屏幕显示了在池中兑换代币的步骤。 1. 带有 ETH 和 UNI 范围的兑换选项。 2. 包含 ETH、UNI、价格更新选项等的确认兑换屏幕。 3.
    确认兑换弹出窗口高亮了 `confirm swap` 按钮。 4. 带有确认选项的 Metamask 通知页面的兑换屏幕。


    ### 从流动性池领取奖励


    最后，让我们看看作为流动性提供者 (LP) 如何领取奖励。


    **步骤 1 –** 点击 DEFT/ETH 池，在“未领取费用 (Unclaimed fees)”面板中有一个 `collect fee` 按钮。我们将选择
    WETH 作为返回地址。点击该按钮。


    **步骤 2 –** 将出现一个 `claim fees` 弹出窗口，然后点击 `collect` 按钮。


    **步骤 3 –** 接下来，Metamask 将要求确认交易。点击 `confirm` 按钮。


    **步骤 4 –** 这将完成你的领取奖励。


    ![](img/535492_1_En_8_Figad_HTML.png)


    4 个屏幕显示了领取奖励的步骤。 1. DFTT/ETH 池页面高亮显示了 `collect fee` 按钮。 2. 包含价格范围和 `collect` 按钮的领取费用页面。
    3. 带有 `reject` 和 `confirm` 按钮的 Metamask 通知页面。


    **步骤 5 –** 将 WETH 地址导入你的 Metamask。Goerli 网络中的 WETH 地址是 `0xB4FBF271143F4FBf7B91A5ded31805e42b2208d6`。你可以从互联网或
    Etherscan 检索到它。


    **步骤 6 –** 现在，你将看到你领取的奖励：


    ![](img/535492_1_En_8_Figae_HTML.png)


    两个屏幕显示了领取奖励的步骤。 1. Goerli 测试网络页面包含用于导入代币的选项。 2. 资产显示在 Goerli 测试网络页面上，其中 0.00001
    WETH 被圈出。

