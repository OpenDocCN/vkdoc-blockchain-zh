    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig19_HTML.png)


    A screenshot of an account connected in the test network labeled 0.05 goerli E
    T H.


    Figure 5-19


    Connected Metamask Goerli test network


    Now we can deploy our HelloWorld.sol to the Goerli test network. Enter “Hello
    Solidity” as the initial message to the right of the orange deploy button. Then
    click deploy. Metamask will dynamically calculate the estimated gas fee. You can
    confirm or reject this request before submitting to testnet. Let’s confirm this
