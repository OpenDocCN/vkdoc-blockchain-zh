- fmt: '# Decentralized Insurance


    In the real world, insurance is one way to protect your health and prevent the
    loss of valuable assets. It reduces the risk of financial suffering when unexpected
    things happen, such as a car accident, prolonged illness, fire, unemployment,
    injury, or death. Most people that pay for insurance will not suffer a loss, and
    insurance companies bet that an accident happens with a low chance that most people
    who pay for insurance will not suffer a loss. So, the amount they collect from
    individuals will cover the losses of people that have an. Anything left over is
    profit for the insurance companies.


    There are many different types of insurance available, such as financial insurance.
    It protects companies against various losses, including property damage, lawsuits,
    data breaches, massive drops in the values of stocks, or a business partner going
    bankrupt.


    The exponential growth in DeFi in recent years has been remarkable. As a relatively
    new approach to blockchain-powered finance, DeFi bypasses traditional centralization
    intermediaries and inefficiency. Nevertheless, at the same time, these also come
    with risks. These risks include:


    **Smart-contract risk** – DeFi projects are open source and typically build on
    complex smart contracts. Any smart contracts logic errors or bugs may cause the
    software to malfunction. Once contracts are deployed to the public blockchain,
    it is almost impossible to fix errors. Although the governance protocols can upgrade
    the protocol change, it typically takes time to complete the voting process before
    making any changes.


    **DeFi technology is very new** – DeFi protocol is quite complex, and fully understanding
    smart contract design is typically very challenging for investors. Therefore,
    the risk of DeFi products may not be understood until it happens.


    **Regulatory risk** – DeFi protocols have thrived without KYC and AML regulation.
    However, this also means users miss protection when things go wrong, and there
    are no finance laws enforcing capital reserves for DeFi providers. Also, the government
    might implement regulations of DeFi protocols in the future, which will affect
    DeFi investments.


    **Private key requirements** – In the blockchain, if you lose your wallet’s private
    key, you lose the funds in it. Therefore, users must secure their wallets to protect
    their cryptocurrency assets.


    **Impermanent loss** – we have discussed this in the DEXs section. It is caused
    by price volatility between tokens provided to the liquidity pool.


    With the DeFi industry’s fast growth and potential risk, they are needed for people
    who want to participate in DeFi while purchasing insurance against many of the
    potential risks they might encounter to protect their assets. Decentralized insurance
    acts as a safety net for the DeFi industry. This industry is still in the very
    early phase and is growing fast and improving its protocols. With decentralized
    insurance, users are not necessarily dealing with a centralized insurance company.
    Instead, a decentralized pool of coverage providers will provide policies by charging
    crypto service fees to protect against certain events. Some coverages are:


    *   Attacks on DeFi protocols

    *   Wallet protection

    *   Smart contract failures

    *   Crypto volatility and the flash crash

    *   DeFi deposit


    ### Popular DeFi Insurance Platform


    #### Nexus Mutual


    Nexus Mutual is a decentralized insurance platform that creates a mutual risk-sharing
    pool on the Ethereum blockchain. `NXM` is the native Nexus Mutual token and acts
    as the governance token in Nexus Mutual protocol. The protocol is driven by its
    community of `NXM` token holders.


    Every `NXM` token holder has membership rights. They have the right to do the
    following:


    *   Buy smart contract coverage.

    *   Deposit funds to the mutual and hold `NXM` tokens.

    *   Share risk with other members.

    *   Act as a Risk Assessor.

    *   Act as a Claims Assessor.

    *   Submit governance proposals.

    *   Vote on proposals.


    The primary Nexus Mutual product is smart contract insurance.


    There are three ways Nexus can protect digital assets:


    **Yield Token Cover** – This cover protects against token de-pegging. De-Peg refers
    to a stablecoin deviating from its intended peg, for example, a stablecoin pegged
    to USD as 1:1. When its value is lower than $1, the coin is said to be “de-pegged.”


    **Protocol Cover** – This cover protects against a protocol hack on a specific
    project.


    **Custody Cover** – This cover protects halted withdrawals and cuts on an investor’s
    funds stored on centralized exchanges.


    #### InsurAce Protocol


    InsurAce is a decentralized multichain protocol that provides insurance services
    for DeFi community members. The InsurAce protocol protects funds against various
    risks.


    InsurAce has developed a wide range of cryptocurrency insurance products that
    cover many protocols running on the Ethereum, Binance Chain (BSC), Polygon, and
    Avalanche blockchains.


    InsurAce protocol provides portfolio-based coverage with the following:


    **Smart contract vulnerability risk** – Hackers are exploiting vulnerabilities
    in smart contracts to steal funds.


    **Custodian risk** – Custodians lose at least 20% of their users’ funds because
    of crime, fraud, or similar circumstances or if they freeze withdrawals for at
    least 120 days without providing advanced notice.


    **IDO event risk** – Hackers steal funds from an IDO platform by exploiting vulnerabilities
    in its smart contract.


    **Stablecoin De-Peg risk** – The price of a stablecoin is below its pegged value.


    #### Etherisc


    Etherisc is a blockchain-based platform for building decentralized insurance products.
    Common infrastructure, product templates, and insurance license-as-a-service make
    it possible for community users to create their own insurance products without
    having to invest the time and money necessary to create them from scratch. Products
    built by the Etherisc community include:


    **Crop Insurance**


    When government agencies report drought or flood events, smart contract protocol
    triggers automated payouts to farmers with crop insurance through the platform.


    **FlightDelay Insurance**


    FlightDelay is a decentralized application that runs on the Gnosis Chain Mainnet.
    Smart contracts in the FlightDelay application utilize Chainlink oracle data feeds
    to autonomously issue and payout insurance policies for travelers who experience
    flight delays or cancellations. As a result, automated flight insurance policies
    are now settling faster, provisioning at lower costs because of reduced human
    and technical overhead and are more transparent because of their running on the
    blockchain network.'
