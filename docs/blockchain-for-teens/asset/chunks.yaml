    usually in high demand. You may need to try several times to obtain some ether.


    Once you have successfully submitted the faucet request, you will get some ether
    in your account.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig17_HTML.jpg)


    A screenshot of Account 1 in the goerli test network with 0.05 goerli E T H.


    Figure 5-17


    Get ether from Goerli test network faucet


    With these Ethers, you have done all the hard work of bringing your smart contract
    to life. Now it’s time to share your first smart contract with the world! Let’s
