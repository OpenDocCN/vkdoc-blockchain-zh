- fmt: '# BIP342

    `BIP342` – Introducing a new type of transaction script language called “Tapscript,”
    it allows Bitcoin nodes the combination of the Schnorr signature and `MAST` in
    a single transaction. In addition, it also provides Bitcoin smart contracts more
    flexibility and control by removing the 10,000-byte size limit.


    ## Bitcoin ETF (October 2021–July 2022)

    In June 2013, Cameron and Tyler Winklevoss cofounded cryptocurrency exchange `Gemini`.
    Best known for their battle with Mark Zuckerberg over the ownership of Facebook,
    the twins proposed creating a Bitcoin exchange-traded fund with securities regulators.
    However, in March 2017, `S.E.C.` rejected the Winklevoss brothers’ bid to create
    Bitcoin `ETF`.


    Nearly eight years later, with long-awaited development for the cryptocurrency
    industry, investors, and securities issuers, `S.E.C.` approved the first Bitcoin
    `ETF`—`BITO`. `BITO` start to trade on the New York Stock Exchange (`NYSE`). Legitimacy
    is a crucial concern for Bitcoin trading in the finance industry. Gaining approval
    from the U.S. Securities and Exchange Commission (`S.E.C.`) opens the door for
    Bitcoin’s acceptance as a mainstream digital currency. Since the first Bitcoin
    `ETF` was approved in October 2021, many other crypto `ETF`s have been approved
    by `S.E.C.` and are available to trade on the stock market. Here is the list of
    Bitcoin `ETF`s:


    Table 3-2


    SEC-approved Bitcoin ETF


    | Symbol | ETF Name | Asset Class |

    | --- | --- | --- |

    | `ARKW` | ARK Next Generation Internet ETF | Equity |

    | `BITO` | ProShares Bitcoin Strategy ETF | Currency |

    | `SPBC` | Simplify US Equity PLUS GBTC | ETF |

    | `BITQ` | Bitwise Crypto Industry Innovators ETF | Equity |

    | `BTF` | Valkyrie Bitcoin Strategy ETF | Currency |

    | `XBTF` | VanEck Bitcoin Strategy ETF | Currency |

    | `BITS` | Global X Blockchain & Bitcoin Strategy | ETF |

    | `RIGZ` | Viridi Bitcoin Miners ETF | Equity |

    | `SATO` | Invesco Alerian Galaxy Crypto Economy ETF | Equity |

    | `BLKC` | Invesco Alerian Galaxy Blockchain Users and Decentralized Commerce
    ETF | Equity |

    | `BTCR` | Volt Crypto Industry Revolution and Tech ETF | Equity |

    | `CRYP` | AdvisorShares Managed Bitcoin Strategy ETF | Multi-Asset |


    ## Getting to Know Bitcoin

    In a centralized economy, the currency issued by a central bank is supposed to
    match the economy’s growth and the number of goods exchanged at stable prices.
    A central bank controls the money supply, and there is no fixed formula to determine
    how much money a central bank should print. However, the money system may sometimes
    lose control.


    Bitcoin’s inventor, Satoshi Nakamoto, designed Bitcoin to resist inflation, limit
    its supply, and cap the number of coins at 21 million. As a result, the new number
    of Bitcoins is reduced by half every four years, and the last coins will be minted
    around 2140.


    Limited supply makes Bitcoin a scarce asset, which can boost the coin’s future
    price—one of the reasons Bitcoin is often referred to as “digital gold.”


    ### Bitcoin Unit

    Today, one Bitcoin is around $25,000, and the total market cap is 455B. Like major
    centralized world currencies such as the US dollar and the Euro can be broken
    down into smaller units such as cents, Bitcoins can also be broken down into Satoshi.
    Satoshi is the smallest unit of a Bitcoin.


    One Bitcoin equals 100 million Satoshi, divisible to the eighth decimal place.


    Table [3-3](#535492_1_En_3_Chapter.xhtml#Tab3) shows the Satoshi unit conversion
    in the Bitcoin system:


    Table 3-3


    Bitcoin denominations and unit name


    | Unit name | BTC |

    | --- | --- |

    | Satoshi | 0,00000001 BTC |

    | μBTC (Micro Bitcoin) | 0,00001 BTC |

    | MBTC (Milli Bitcoin) | 0,001 BTC |

    | cBTC (Centi Bitcoin) | 0,01 BTC |

    | dBTC (Bitcoin said) | 0,1 BTC |

    | BTC (Bitcoin) | 1 BTC |


    Consider the payment of 1 BTC for $23,798.46. One `MBTC` is $0.001 23.8, and 1
    `μBTC` is $0.24.


    ### Bitcoin Halving

    Bitcoin halving, also known as “the halvening,” is a pivotal event in Bitcoin’s
    history. Every four years, new Bitcoins are released into circulation, and the
    number of Bitcoin mining rewards is cut in half. The maximum total supply of Bitcoins
    is 21 million.


    Here is a brief Bitcoin halving process in the past and future:


    * 2009 – Bitcoin network rewarded miners, starting at 50 BTC per block every ten
    minutes.

    * 2012 – After 210,000 blocks were mined, the first Bitcoin halving, the reward
    went down to 25 BTC.

    * 2016 – After 420,000 blocks were mined, the second Bitcoin halving, the mining
    reward went down to 12.5 BTC.

    * 2020 – After 630,000 blocks were mined, the third Bitcoin halving, the mining
    rewards dropped to 6.25 BTC.

    * 2024 – The next Bitcoin halving will happen when 840,000 blocks are mined, and
    the mining reward will decrease to 3.125 BTC.

    * 2140 – The 64th and last halving will occur, and no new Bitcoin will be produced.


    Satoshi wrote the halving policy into Bitcoin’s mining algorithm to lower Bitcoin’s
    inflation rate by maintaining scarcity. When miners’ rewards go down and they
    have less to sell, limited supply positively impacts price when demand increases.


    ### Bitcoin Wallet

    “Not your keys, not your coins” is one of the crypto world’s most famous mantras.
    It means if you do not truly have control over your private keys, then you do
    not actually “own” your crypto/coins. In other words, if you lose your Bitcoin
    wallet’s private key, you lose the funds in it.


    In a traditional finance system, you have a wallet to store your cash. A Bitcoin
    wallet is similar to your regular wallet, but it is used for storing, sending,
    and receiving Bitcoins. It has two main functions:


    First, storing the user’s public and private keys, and second, performing transactions—for
    instance, receiving and sending Bitcoins.'
