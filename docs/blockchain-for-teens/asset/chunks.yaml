    The other solution (small blockers) is to remain at 1 MB block size and scale
    via layer-two solutions, giving end users the easy option to run a node. The solution
    includes SegWit soft fork Lighting Network. We will discuss this in more detail
    in a later section.


    **Bitcoin XT (August 2015)** – Bitcoin XT was one of the first notable hard forks
    of Bitcoin Core.


    On June 10, 2014, Mike Hearn published a Bitcoin Improvement Proposal (BIP 64)
    calling for “a small P2P protocol extension that performs UTXO lookups given a
    set of outpoints.”


    On June 22, 2015, Gavin Andresen published BIP 101, calling for “an increase in
    the maximum block size.”


    The changes would increase the block size from 1 MB to 8 MB and then double every
    two years until 2036\. The block size would eventually be around 8 GB.


    In August 2015, Bitcoin XT launched with an eight MB block size. In the first
    few months, more than 1,000 nodes ran in Bitcoin XT. However, the Bitcoin community
    hasn’t widely supported Bitcoin XT protocol. As a result, block size debates gained
    media attention and were seen on various social media channels—especially Reddit.
    It started to bring the scaling debate over the years.


    Many community members are worried that a larger block size will lead to Bitcoin’s
    centralization, which, as one critic quotes, is “against the ethics of Satoshi
    Nakamoto.” A few months later, the project lost users’ and node operators’ interest,
    essentially fell away, and was abandoned by its users.


    **The Lightning Network whitepaper (January 2016)** – Joseph Poon and Thaddeus
    Dryja published the Lightning Network white paper on January 16, 2016\. The white
    paper proposed a protocol called “the lightning network” that speeds up transactions
    by creating a second layer on top of the Bitcoin blockchain that uses user-generated
    micropayment channels to perform more efficient transactions. These transactions
    are very fast because no miners are involved, and transaction fees are much lower
    or even unnecessary without changing the block size. Small blockers support it
    as one of Bitcoin’s scalability solutions.


    **Bitcoin Classic (January 2016) –** In early 2016, a group of Bitcoin community
    members proposed increasing the maximum size of Bitcoin blocks from 1 MB to 2
    MB, which is less aggressive than what was proposed by Bitcoin XT—8 MB. As a result,
    a group of developers launched Bitcoin Classic. At the beginning of 2016, Bitcoin
    Classic had hard forks from Bitcoin. It had about 2,000 nodes initially operated
    on the network, but Bitcoin Classic never reached massive adoption from the community.
    A year later, there were no more than 100 nodes in the network. Although Bitcoin
    Classic is still alive today, compared to Bitcoin’s price today, $23,028, it is
    only valued at $0.027632.


    **The Hong Kong Agreement – SegWit proposal (February 2016)** – In February 2016,
    developer Peter Wuille presented an idea called “segregated witness and its impact
    on scalability” (SegWitness or SegWit) at Hong Kong’s Cyberport Bitcoin conference.
    Signature data is bulky compared to other transaction input and takes up 65% of
    the space. Therefore, it quickly filled up the block. SegWit is a mechanism that
    separates witness signature data from the input field of the block transaction
    by creating its own individual tree. It allows for the computation of transaction
    IDs without signatures, and light clients can skip the separated data entry entirely.
    Signatures will act as “witnesses” when needed to authorize transaction outputs
    from the original owners. Bitcoin includes a mechanism that validates these signatures
    using checkpoints. SegWit enables more transactions to be stored within a block.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig6_HTML.png)


    A block diagram classifies transaction before segwit and transaction after segwit.
    It includes input, output, and witness data.


    Figure 3-6


    Bitcoin SegWit


    SegWit immediately ignited a new discussion within the community. After the conference,
    the Bitcoin community agreed to use SegWit as a future soft-fork release and continue
    working on a safe hard fork based on SegWit improvements, including increasing
    the nonwitness data to be around 2 MB.


    **New York Agreement (NYA) (May 2017)** – On May 23, 2017, 58 Bitcoin companies
    across 22 countries representing over 85% of the network computing power held
    a meeting to decide the future of BTC. The meeting aimed to resolve Bitcoin’s
    scaling issues and the conflict by doing a soft and a hard fork. The NYA published
    a statement known as the SegWit2x upgrade (essentially the same as the Hong Kong
    agreement). The aims were:


    *   Activate Segregated Witness at an 80% threshold, signaling at bit 4


    *   Activate a 2 MB hard fork within six months


    The solution was to compromise between people wanting SegWit and others a hard
    fork.


    **SegWit Activated (August 2017) –** On August 8, 2017, 100% of the Bitcoin mining
    pools signaled support for SegWit. Segregated Witness was activated on August
    24, 2017\. According to buybitcoinworldwide.com data, around 84% Bitcoin nodes
    have adopted SegWit as of July 2022.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig7_HTML.png)'
  trans: '

    # 区块大小之争


    在比特币网络中，矿工通过工作量证明共识，每十分钟创建一个区块。比特币的区块大小被限制在 1 兆字节。随着比特币的广泛应用，交易量急剧增加，网络需要在 1 兆字节的限制内处理更多的交易。这导致交易处理速度变慢，高昂的交易手续费可能让用户每笔交易花费
    58-60 美元。然而，中本聪在 2010 年 7 月添加了 1 MB 的最大区块大小限制，但没有给出任何评论或解释（`https://sourceforge.net/p/bitcoin/code/103/`）。


    ![](img/535492_1_En_3_Fig5_HTML.png)


    一张表格显示了币值的数量和描述，其中突出显示了最大区块大小 1000000 的值。它代表了比特币最大区块大小为 1 MB。


    图 3-5 比特币最大区块大小为 1 MB


    这开启了一个备受争议的话题，即比特币社区中持续多年的“宪法危机”，甚至延续至今。在 2015 年至 2017 年间，比特币社区就增加比特币区块链区块大小的上限展开了激烈辩论。


    为了解决可扩展性问题，社区分裂成两大解决方案阵营：


    一方（大区块者解决方案）主张增加区块大小，允许每个区块容纳更多交易，从而降低交易成本。然而，更大的区块大小也意味着更长的传输时间，并且这只是一个临时解决方案。当网络中的用户持续增加时，新的区块大小将再次成为限制。这不是一个长期的解决方案。


    由于比特币是去中心化的，任何提议的共识变更都必须获得比特币社区的显著支持。当比特币社区无法就提案达成一致时，就会导致“分叉”。区块链有两种分叉——软分叉和硬分叉。软分叉将新实施的变更应用于现有区块链，且修改将支持向后兼容。大多数参与节点同意这些变更。旧节点将接受变更后的新节点。硬分叉对比特币协议进行了根本性改变，导致链一分为二。新链不需要支持向后兼容，原始链上的旧节点将不接受来自新链的新节点。硬分叉需要大多数矿工的长期支持——否则新网络将失败。


    大区块者解决方案导致了多次硬分叉——Bitcoin XT、Classic、Unlimited、Bitcoin Cash 和 SV。其中一些已经失败，而其他的则持续至今。


    另一方（小区块者解决方案）主张维持 1 MB 的区块大小，并通过二层解决方案进行扩展，为最终用户提供运行节点的简便选择。该解决方案包括 SegWit 软分叉和闪电网络。我们将在后续章节中更详细地讨论这一点。


    ## Bitcoin XT（2015 年 8 月）


    Bitcoin XT 是 Bitcoin Core 最早出现的著名硬分叉之一。


    2014 年 6 月 10 日，Mike Hearn 发布了一份比特币改进提案（`BIP 64`），呼吁“一个小的 P2P 协议扩展，用于根据一组输出点执行
    UTXO 查找”。


    2015 年 6 月 22 日，Gavin Andresen 发布了 `BIP 101`，呼吁“增加最大区块大小”。


    这些变更将区块大小从 1 MB 增加到 8 MB，然后每两年翻一番，直到 2036 年。区块大小最终将达到约 8 GB。


    2015 年 8 月，Bitcoin XT 以 8 MB 的区块大小启动。在最初的几个月里，有超过 1000 个节点运行在 Bitcoin XT 上。然而，比特币社区并未广泛支持
    Bitcoin XT 协议。结果，区块大小的辩论引起了媒体关注，并在各种社交媒体渠道上传播——尤其是 Reddit。这拉开了持续多年的扩容辩论的序幕。


    许多社区成员担心更大的区块大小会导致比特币的中心化，正如一位批评者所言，“违背了中本聪的理念”。几个月后，该项目失去了用户和节点运营商的兴趣，基本上销声匿迹，并被其用户放弃。


    ## 闪电网络白皮书（2016 年 1 月）


    Joseph Poon 和 Thaddeus Dryja 于 2016 年 1 月 16 日发布了闪电网络白皮书。该白皮书提出了一种名为“闪电网络”的协议，通过在比特币区块链之上创建第二层来加速交易，该层使用用户生成的微支付通道来执行更高效的交易。这些交易非常快，因为没有矿工参与，交易费用也低得多，甚至在无需改变区块大小的情况下无需费用。小区块者支持它作为比特币的可扩展性解决方案之一。


    ## Bitcoin Classic（2016 年 1 月）


    2016 年初，一群比特币社区成员提议将比特币区块的最大大小从 1 MB 增加到 2 MB，这比 Bitcoin XT 提议的 8 MB 要温和得多。因此，一群开发者推出了
    Bitcoin Classic。2016 年初，Bitcoin Classic 从比特币进行了硬分叉。最初网络上大约有 2000 个节点在运行，但 Bitcoin
    Classic 从未获得社区的广泛采用。一年后，网络中的节点不超过 100 个。尽管 Bitcoin Classic 至今仍然存在，但相比今天比特币的价格
    23,028 美元，其价值仅为 0.027632 美元。


    ## 香港共识 – SegWit 提案（2016 年 2 月）


    2016 年 2 月，开发者 Peter Wuille 在香港数码港的比特币会议上提出了一个名为“隔离见证及其对可扩展性的影响”（`SegWitness`
    或 `SegWit`）的想法。与其他交易输入相比，签名数据体积庞大，占用了 65%的空间。因此，它很快填满了区块。`SegWit` 是一种机制，通过创建自己独立的树形结构，将见证签名数据从区块交易的输入字段中分离出来。它允许在没有签名的情况下计算交易
    ID，轻客户端可以完全跳过分离的数据条目。当需要授权原始所有者的交易输出时，签名将充当“见证人”。比特币包含一种使用检查点验证这些签名的机制。`SegWit`
    使得一个区块内可以存储更多交易。


    ![](img/535492_1_En_3_Fig6_HTML.png)


    一个块状图分类了 segwit 之前的交易和 segwit 之后的交易。它包括输入、输出和见证数据。


    图 3-6 比特币 SegWit


    `SegWit` 立即在社区内引发了新的讨论。会议结束后，比特币社区同意将 `SegWit` 作为未来的软分叉版本发布，并继续致力于基于 `SegWit`
    改进的安全硬分叉，包括将非见证数据增加到约 2 MB。


    ## 纽约共识（NYA）（2017 年 5 月）


    2017 年 5 月 23 日，来自 22 个国家、代表超过 85%网络算力的 58 家比特币公司举行会议，以决定比特币的未来。会议旨在通过进行软分叉和硬分叉来解决比特币的扩展问题和冲突。NYA
    发布了一份被称为 `SegWit2x` 升级的声明（本质上与香港共识相同）。其目标是：


    * 在 80%的阈值下激活隔离见证，在第 4 位发信号

    * 在六个月内激活 2 MB 的硬分叉


    该解决方案是为了在希望实施 `SegWit` 的人和希望进行硬分叉的人之间达成妥协。


    ## SegWit 激活（2017 年 8 月）


    2017 年 8 月 8 日，100%的比特币矿池表示支持 `SegWit`。隔离见证于 2017 年 8 月 24 日激活。根据 `buybitcoinworldwide.com`
    的数据，截至 2022 年 7 月，大约 84%的比特币节点已经采用了 `SegWit`。


    ![](img/535492_1_En_3_Fig7_HTML.png)

