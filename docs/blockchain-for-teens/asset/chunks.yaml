    # 作为主流货币被接纳


    **CME 计划推出比特币期货（2017 年 12 月）** – 芝加哥商业交易所（`CME`）集团有限公司是一家从事期货和期权交易的美国全球市场公司。为响应投资者对不断发展的加密货币市场日益增长的兴趣，`CME`
    获得了美国商品期货委员会的批准，并于 2017 年 12 月 18 日推出了比特币期货合约交易。


    `CME` 比特币期货将允许投资者押注比特币的未来价格，而无需持有实际的比特币资产。


    期货合约是一种法律协议，买卖双方同意在预定的未来日期以预定价格买卖某种商品或资产。例如，7 月 1 日比特币价格为 22,000 美元。如果有人认为价格会走高，他们就会在一个月后以
    23,000 美元的价格买入一份比特币期货。到了 8 月 1 日，如果比特币市场价格是 23,500 美元，且期货合约到期，买方将获得 500 美元的差价。


    期货交易历史悠久。第一家现代期货交易所于 1710 年在日本大阪成立，而棉花期货大约在 1870 年左右在纽约棉花交易所开始交易。期货通常由专业投资者和公司进行交易。比特币期货可能为引入更多华尔街公司进入比特币及其他加密货币领域打开大门，并有助于降低基础比特币市场的波动性。


    **新西兰将加密货币薪资合法化（2019 年 9 月）** – 2019 年 9 月 1 日，新西兰税务局（`IRD`）正式宣布，员工可以使用比特币和以太币等加密货币领取薪水。这意味着，只要在雇佣协议中有规定，公司就可以直接用加密货币支付员工工资。因此，新西兰成为第一个将加密货币薪资支付选项合法化的国家，并将加密货币引入了日常支付方式。


    **MicroStrategy 购买比特币（2020 年 8 月）** – 2020 年 8 月 11 日，全球领先的商业智能公司 MicroStrategy
    Inc（`纳斯达克：MSTR`）宣布已购买了 21,454 枚比特币（当时价值 2.5 亿美元）。MicroStrategy 成为第一家将比特币作为合法投资资产购买并在公开市场上市的公司。MicroStrategy
    的购买行为标志着比特币正获得越来越多的合法性和主流采用。


    **PayPal 推出比特币支付服务（2020 年 10 月）** – 2020 年 10 月 21 日，PayPal 获得了纽约州金融服务部（`DFS`）颁发的附带条件的
    BitLicense。得到 `DFS` 批准后，2020 年 12 月 12 日，PayPal 推出了一项新的支付服务，允许 PayPal 用户购买、持有和出售加密货币。PayPal
    拥有近 3.5 亿用户，系统中活跃商户超过 2600 万。比特币获得 1 亿用户几乎花了十年时间。这家支付巨头的采纳意味着额外的 3 亿多用户可以开始使用比特币和其他加密货币作为支付手段。


    **加密货币用户超过 1 亿（2021 年 1 月）** – 在新冠肺炎疫情期间，全球加密货币用户快速增长。根据 Crypto.com 的一份报告，全球范围内首次有超过
    1 亿人在使用加密货币。


    **Coinbase 上市（2021 年 4 月）** – 2021 年 4 月 14 日，乘着整体加密货币市场繁荣的浪潮，作为华尔街最受期待的事件之一，Coinbase
    Global Inc. 在纳斯达克上市。Coinbase 是美国交易量最大、受监管最严格的加密货币交易所。作为在纳斯达克上市的第一家大型加密货币交易所，Coinbase
    为其他加密货币交易所树立了标杆，其上市是数字资产行业的分水岭时刻。Coinbase（`COIN`）开盘价约为每股 340 美元，估值达到 860 亿美元。


    **萨尔瓦多将比特币定为法定货币（2021 年 9 月）** – 2021 年 6 月，总统纳伊布·布克尔在迈阿密举办的“比特币 2021”大会上宣布了他的《比特币法》。


    2021 年 9 月 7 日，萨尔瓦多成为世界上第一个承认比特币与美元并列法定货币的国家。新法律要求企业接受比特币作为支付方式。政府还推出了一个基于闪电网络协议的国家级虚拟钱包，名为
    `chivo`，该钱包支持免手续费交易和快速支付。


    **美国首个比特币交易所交易基金（`ETF`）（2021 年 10 月）** – 交易所交易基金，或称 `ETF`，正如其名：一种可以在交易所进行交易的投资基金。当您投资于
    `ETF` 时，您可以像买卖公司股票一样在股票市场进行买卖。`ETF` 通常追踪某个特定指数——例如，`Spider` `ETF`（`SPDR S&P 500`
    – `SPY`）是最广为人知的追踪 `S&P 500` 指数的 `ETF`。`ETF` 是当今全球最受欢迎的投资选择之一。美国的第一只 `ETF`（`SPY`）于
    1993 年推出；iShares 于 2002 年推出了其首只债券 `ETF` `LQD`；`SPDR Gold Trust` `ETF` 是美国首只以黄金为支持的
    `ETF`。2021 年 10 月 19 日，美国首只比特币交易所交易基金（`ETF`）——ProShares Bitcoin Strategy `ETF`（`BITO`）开始交易。ProShares
    Bitcoin Strategy `ETF` 在交易的头两天内就吸引了超过 10 亿美元的资产。相比之下，黄金 `ETF` `GLD` 达到十位数（即 100
    亿美元）用了三天时间。`BITO` 成为市场历史上交易最活跃的 `ETF` 之一。


    ![](img/535492_1_En_3_Fig10_HTML.jpg)


    一张描述`NYSE`的图片。其中提到了`BITO`的 ProShares 比特币策略。包含收听、交易和数据、关于及洞察等内容。


    **图 3-10** 在纽约证券交易所上市的 `BITO`


    比特币 `ETF` 为机构投资者和散户投资者提供了一种方式，使他们能够在传统的股票市场交易所而非加密货币交易平台投资加密市场。因此，那些此前因交易技术复杂性或其他安全担忧而却步的投资者，无需创建新的加密货币钱包账户来持有代币，便可以通过间接方式投资比特币市场。


    **比特币价格突破 68,000 美元（2021 年 11 月）** – 2021 年 11 月 5 日，比特币价格创下 68,521 美元的历史新高。比特币价格的飙升将加密货币总市值推高至
    3 万亿美元以上。这表明比特币正成为一种领先的创新支付模式，并在主流中获得更广泛的采用。


    **Taproot – 比特币隐私更新（2021 年 11 月）** – 在 2017 年 8 月隔离见证（SegWit）激活以及三个月后 SegWit2x
    被取消之后，比特币已有四年未进行重大升级。最终，在 2021 年 11 月 14 日，比特币社区自 2017 年以来最期待的升级——Taproot——正式上线。这是比特币的一个里程碑，Taproot
    获得了矿工、开发者和用户近乎一致的支持。


    Taproot 是一项软分叉升级，最初由比特币核心开发者格雷戈里·麦克斯韦尔于 2018 年 1 月提出。自那时起，该提案在社区中经过了多轮审查、讨论和测试。


    虽然 SegWit 和闪电网络的主要目标是提高交易速度和降低费用，但 Taproot 旨在解决比特币的可扩展性、隐私性和透明度挑战。


    Taproot 升级包括三个主要改进点：


    *   `BIP340` – 通过用 Schnorr 签名取代传统的椭圆曲线数字签名算法（`ECDSA`）来升级比特币的底层密码学。Schnorr 公钥为
    32 字节，签名为 64 字节，相比之下，`ECDSA` 公钥为 33 字节，签名为 72 字节。此次升级使复杂的比特币交易更加安全、简洁且成本更低。


    *   `BIP-341` – 默克尔化替代脚本树（`MAST`），引入了 Taproot 的一项功能，旨在使比特币网络能够执行智能合约。它带来了用 BTC
    结合 Schnorr 签名来支持去中心化金融（`DeFi`）和 NFT 项目的潜力。

