- fmt: "### Blockchain in the Food Supply Chain Industry\n\nConsider how food can\
    \ be delivered from the supplier to the customer through each step of the traditional\
    \ supply chain.\n\nThe overall simplified process is shown in Figure [9-5](#535492_1_En_9_Chapter.xhtml#Fig5).\n\
    \n![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig5_HTML.png)\n\nA flow diagram\
    \ for a supply chain includes the raw food, packaging house, transportation, custom\
    \ crossing, food processing, food distribution center, supermarket, and customer.\n\
    \n**Figure 9-5** A traditional supply chain in the food industry\n\n1. **Supply\
    \ of Raw Materials**  \n   Raw materials could include seafood, meat, vegetables,\
    \ fruits, and other dairy products such as coffee and tea.\n\n2. **Food Packaging**\
    \  \n   Food packaging is required to provide basic information about the food\
    \ such as the product’s name, the quantity of content, nutrition details, and\
    \ the details of the manufacturer or distributor.\n\n3. **Food Transportation**\
    \  \n   Transportation needs to ensure food safety, minimal damage to goods, and\
    \ timely deliveries.\n\n4. **Customs or Board Crossing**  \n   Border crossing\
    \ will examine shipment items to ensure goods meet entry requirements before crossing.\n\
    \n5. **Food Unpacking and Processing**  \n   Food items are unpacked, processed,\
    \ and stored in a food storage center.\n\n6. **Food Distribution (Wholesale and\
    \ Retail)**  \n   The process of food distribution covers the transportation of\
    \ the food item from the suppliers to the wholesalers, retailers, and customers.\n\
    \n7. **Food in Retail Stores or the Market**  \n   The food item is delivered\
    \ to retail stores or supermarkets.\n\n8. **Consumer’s Purchase of the Food Item**\
    \  \n   The delivery of the food item marks the end of the food supply chain.\n\
    \n#### Bumble Bee Seafoods\n\nIn March 2019, Bumble Bee Seafoods, North America’s\
    \ premium seafood company, used System Applications and Products (SAP)’s `Cloud\
    \ Platform Blockchain` service to track and trace tuna from the Indonesian ocean\
    \ to local retailer stores and consumers’ dinner tables. Recently, consumers have\
    \ increasingly been demanding to know about the origins of their food and whether\
    \ their food is safe. The supply chain will start when tuna is caught in the ocean\
    \ by fish companies or fishers in the sea. Then, the company will provide related\
    \ information on the tuna caught, including on the fish number, supplier, fisherman,\
    \ weight, grade, date, and packs of Natural Blue^® by Anova fair trade™ stamped\
    \ with the blockchain-derived `QR` code.\n\nFrom the fishermen who caught the\
    \ fish from the sea to the packagers, transporters, distributors, and retailers,\
    \ the blockchain will store information on each step of the process. All these\
    \ blockchain data are visible to the fishermen and the buyers. The possibility\
    \ of traceability increases the consumer’s confidence. The consumer can scan the\
    \ barcode or enter the code on the Bumble Bee website to check tuna information.\
    \ The website will provide the supply chain information, including the date on\
    \ which the fish was caught, fishery location, vessel information, and process\
    \ information.\n\n![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig6_HTML.png)\n\
    \nA 4-part illustration includes entering can code, fishery location, vessel information,\
    \ and processing.\n\n**Figure 9-6** Bumble Bee Seafoods blockchain information\n\
    \n#### Keep Meat Cold: Golden State Foods\n\nEach year, contaminated food causes\
    \ an estimated 600 million foodborne diseases—almost one in ten people are affected\
    \ worldwide, and 420,000 deaths are caused. Significant growth in the number of\
    \ food safety incidents requires safe, healthy, and resilient food supply chains.\
    \ As the food business has become more complicated over recent years, there is\
    \ a need for improving tracking and detection for the entire supply chain. Moreover,\
    \ over the years, supply chains have adopted IoT and blockchain technology to\
    \ address their challenges.\n\nAs one of the largest produce suppliers to the\
    \ food service and retail industries, Golden State Foods (GSF), a food service\
    \ company located in Irvine, California, produces more than 160 million pounds\
    \ of meat products and billions of hamburger patties every year. In 2019, GSF\
    \ partnered with IBM (International Business Machines Corporation) on the `IBM\
    \ Food Trust` platform to use radio-frequency identification to track fresh beef’s\
    \ movement automatically. Using an `IoT` sensor, devices monitor food temperature\
    \ and log data automatically by sending them periodically (typically at 15-minute\
    \ intervals) to the cloud, which is integrated with the `Food Trust` platform.\
    \ On the `IBM Food Trust` platform, users can find out the food product or temperature\
    \ data in near real time from anywhere in the world by entering the product’s\
    \ `Global Trade Item Number (GTIN)` or `Global Location Number (GLN)`.\n\nThe\
    \ `IBM Food Trust` is a modular solution built on the open standard `Hyperledger\
    \ Fabric` blockchain. The platform integrates supply chain modules with blockchain\
    \ core functions to securely connect suppliers, processors, distributors, retailers,\
    \ and other ecosystem participants. The platform provides a provenance engine\
    \ to verify vendor products through immediate access to end-to-end data.\n\nMany\
    \ other large companies, such as Walmart, Nestlé, Driscoll’s, Kroger, Dole, and\
    \ Tyson, have joined the `IBM Food trust` network as partners.\n\n### Other Sectors\
    \ of Supply Chain Industries\n\nThe following are some other examples of the use\
    \ of blockchain in other sectors of supply chain industries.\n\n#### Brilliant\
    \ Earth—Blockchain-Enabled Diamonds\n\nIn May 2019, Brilliant Earth, a global\
    \ leader in ethically sourced fine jewelry, launched blockchain-enabled diamonds\
    \ on its website. Customers can track thousands of blockchain-enabled diamonds\
    \ along the transparent supply chain, including from their origins at the mining\
    \ operator, through responsible manufacturing for cutting and polishing, all the\
    \ way to the customer.\n\nBrilliant Earth uses the `Everledger` platform based\
    \ on the `Hyperledger Fabric` blockchain to build a transparent, traceable, and\
    \ trustworthy supply chain platform. Companies on the network have the ability\
    \ to apply smart contracts and share data securely with privacy protection.\n\n\
    ![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig7_HTML.png)\n\nA screenshot\
    \ of brilliant earth interface with characteristics and shapes of blockchain diamonds\
    \ on the left and block chain diamond journey note on the right.\n\n**Figure 9-7**\
    \ Brilliant Earth—Blockchain-Enabled Diamonds\n\n#### Mercedes-Benz—Acentrik Blockchain\
    \ Platform\n\nIn July 2022, Mercedes Benz launched a blockchain-based data sharing\
    \ platform `Acentrik`. `Acentrik` is a decentralized data marketplace built for\
    \ enterprise users. `Acentrik` has partnered with the `Ocean Protocol` since 2020,\
    \ with a proof of concept analyzing decentralized data orchestration for Mercedes-Benz.\
    \ The `Ocean Protocol` is an open source Web 3.0 platform for unlocking private\
    \ data using data tokens—the `OCEAN` token. Users will get redeemed tokens from\
    \ those who need access to the information. `Acentrik` uses an `NFT` to represent\
    \ each dataset. Transactions are executed on the public Ethereum Layer-2 scalability\
    \ platform—`Polygon` blockchains or the `Ethereum Rinkeby` test network, and enterprise\
    \ users can pay for data using fiat-pegged stablecoins.\n\n## Blockchain in Healthcare\n\
    \nBlockchain is gaining massive attention in the healthcare industry. In 2021,\
    \ blockchain in the healthcare market was valued at $1.5 billion and was projected\
    \ to reach $5.61 billion by 2025\\. It could save up to $100–150 billion annually\
    \ by 2025\\. Moreover, 40% of health executives see blockchain as a top-five priority."
