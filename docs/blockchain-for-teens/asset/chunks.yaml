- fmt: '### DAO Attack (July 2016)


    In May 2016, a Decentralised Anonymous Organisation (DAO) was created on the Ethereum
    blockchain by developers. The DAO uses a smart contract to self-govern and automate
    decisions without a typical centralized management structure. Anyone has the right
    to participate and vote regardless of their location. The first DAO crowd sale
    is very successful. It raised a record 12.7M Ether (worth around $150 million
    at the time) to fund the project.


    However, on June 17, 2016, a hacker exploited some vulnerabilities in the smart
    contract of the DAO. The hacker was able to invoke the DAO smart contract to give
    the Ether back multiple times before the smart contract could update its balance.
    The hackers managed to steal more than 3.6 million ETH (worth around $50 million
    at the time).


    Because of the huge amount of funds lost among DAO investors, the Ethereum community
    decided to reverse the attack to refund the lost money, which lead to Ethereum
    forked into two blockchains. One is the current Ethereum blockchain. The token
    owners were given an exchange rate of 1 ETH to 100 DAO tokens, the same rate as
    the initial offering. The lost funds of the DAO investors were recovered. In September
    2016, digital exchange currencies de-listed the DAO token. In the meantime, part
    of the Ethereum community did not agree with the hard fork and decided to continue
    to maintain the old blockchain, which is now known as Ethereum Classic.


    ### Ethereum 2.0 (The Merge)


    In recent years, the Ethereum community started to migrate from Ethereum 1.0 to
    Ethereum 2.0, also known as Eth2, The Merge, or Serenity. Ethereum 1.0 was created
    based on a proof-of-work blockchain. Compared to Ethereum 1.0, 2.0 has several
    major advantages. Table [4-1](#535492_1_En_4_Chapter.xhtml#Tab1) shows these differences.


    **Table 4-1** Comparing Ethereum 1.0 and 2.0


    | | Ethereum 1.0 | Ethereum 2.0 |

    | --- | --- | --- |

    | Consensus | Uses proof-of-work (PoW) consensus. | Uses proof-of-stake (PoS)
    consensus. |

    | Speed | The network can process around 15 transactions per second (15 TPS);
    it often causes network congestion and delay. | The ETH 2.0 network will scale
    up to a potential 100,000 TPS, compared to Visa, 30,000 TPS. |

    | Energy | Proof-of-Work requires miners to consume large amounts of computing
    power to solve a complex mathematical puzzle. | Ethereum 2.0 use PoS Consensus
    by staking its tokens as a collateral asset to check and validate the transactions
    and add block. It requires minimum hardware power, which can reduce 99% fewer
    resources than the proof of work consensus. |

    | Security | Some powerful group of miners could control more than 50% of the
    network’s activities which could lead to vulnerabilities like a 51% attack. |
    In Ethereum 2.0, it is more decentralized. The network requires around 16,384
    validators. The user just needs to stake 32 ethers to participate in validating
    the Ethereum network. Even with less ether, users can join a mining pool that
    enables everyone to stake together and share the rewards. There are no miners
    controlling the blockchain. |

    | Gas fee (transaction fees) | As the network can only handle a limited number
    of transactions per second, leading to high transaction fees known as “gas,” and
    slow transactions. Typically, avg gas fee per transaction is around $12. With
    demand rising sharply, the gas fee could be much higher, such as $100. | The Ethereum
    2.0 uses PoS consensus to process transactions that require a nearly zero gas
    fee. So, it just charges some basic fee to avoid malicious activities on the Network.
    |


    There are three phases to launching Ethereum 2.0, it will take several years to
    completely roll out Ethereum 2.0 as Figure [4-1](#535492_1_En_4_Chapter.xhtml#Fig1)
    shows.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig1_HTML.jpg)


    An illustration of three phases of Ethereum 2.0 depicts Ethereum 1.0 to Ethereum
    2.0 from phase 0 of beacon chain, to phase 1 of merge, and lastly phase 2 of shard
    chain.


    **Figure 4-1** Three phases of Ethereum 2.0


    #### Phase 0 – Beacon Chain


    Phase 0 started with the official launch of Beacon Chain in December 2020. Beacon
    Chain builds based PoS in the Ethereum network and manages the registry of validators.


    #### Phase 1 – Merge


    The Ethereum main net merged with the Beacon Chain in this phase. It officially
    ends the POW consensus on the network and starts with PoS. On September 15, 2022,
    Ethereum switched from the original proof-of-work mechanism to proof-of-stake,
    called “the merge.” The merge reduced Ethereum’s energy consumption by ~99.95%.


    Users who staked Ethereum on the Beacon Chain can become validators.


    Transactions and Dapps will continue to run the same behavior as before.


    #### Phase 2 – Shard Chain


    In this phase, Shard Chains will introduce to the network. At the same time, the
    Ethereum main network will be split into 64 shards. Each shard can run a fully
    functional smart contract. The network allows each shard to communicate with each
    other.


    ## Getting to Know Ethereum


    In the Bitcoin network, Bitcoin is digital gold, designed as a medium of exchange
    and a way to store value. Bitcoin provides a payment way for people who can transfer
    value from one to another using a decentralized way without a central bank. On
    the other hand, the Ethereum network is built as a Turing-complete blockchain.
    The network was built in a Turing-complete programming language called Solidity,
    which can run in the Ethereum Virtual Machine (EVM). Users can create and run
    decentralized applications (Dapps) in EVM. EVM is where all Ethereum accounts
    and smart contracts live. As the native currency in the Ethereum blockchain, Ether
    was used internally by Dapp in the Ethereum network to process transactions. For
    example, when a smart contract executes a transaction, Dapp must pay a gas fee
    (Ether) for the miner to perform mining work.


    ### Ether (Unit)


    Each blockchain has its own native currency. Similar to Bitcoin, the native currency
    is called Ether (ETH) in the Ethereum blockchain.


    Ether acts as the “fuel,” to pay for the execution of smart contracts on the EVM.
    When miners solve the computational puzzle, they will get Ether as a currency
    reward. Ether can also be used for payments and users can send ether to other
    users as payment.


    Like the US dollar, which come in seven denominations: $1, $2, $5, $10, $20, $50,
    and $100, Ether is broken into denominations. The smallest denomination unit of
    ether is called Wei, named after a digital money and cryptography pioneer, Wei
    Dai. Wei created Crypto++ cryptographic library and invented B-money. Other units
    include a Gwei, Mwei, Kwei, microether, and milliether. They are known by other
    names as well. For example, a milliether is also called Finney, named after another
    digital money pioneer, Harold Thomas Finney II, who in 2004 implemented the world’s
    first reusable proofs of work system (RPOW) before Bitcoin. In January 2009, Finney
    was the recipient of the Bitcoin network’s first transaction. Table [4-2](#535492_1_En_4_Chapter.xhtml#Tab2)
    lists the named denominations of Ether and other units:


    **Table 4-2** Ether denominations and unit name


    | Unit Name | Value (in Wei) | Ether |

    | --- | --- | --- |

    | Wei | 1 wei | 10^(-18) ETH |

    | Kilowei (Babbage) | 1,000 wei | 10^(-15) ETH |

    | Mwei (Lovelace) | 10⁶ wei | 10^(-12) ETH |

    | Gwei (Shannon) | 10⁹ wei | 10^(-9) ETH |

    | Microether (Szabo) | 10^(12) wei | 10^(-6) ETH |

    | Millether (Finny) | 10^(15) wei | 0.001 ETH |

    | Ether | 10^(18) wei | 1 ETH |'
