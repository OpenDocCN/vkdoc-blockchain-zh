- fmt: '### Executive Votes


    Executive Votes execute technical changes to the Maker Protocol and changes to
    the state of the protocol or the DAO as a whole in the blockchain. Here are some
    examples of an Executive Vote in the past:


    - Onboarding real-world asset vaults

    - Parameter changes

    - Core unit budget distributions

    - `MKR` vesting transfers

    - Form consensus on important community goals and targets

    - Collateral onboarding


    Voting power is measured by the number of `MKR` tokens voters own and present.


    For example, if 100 `MKR` holders with 100 `MKR` vote for Proposal A, while 50
    holders with 1,000 `MKR` vote for Proposal B, Proposal B wins because of support
    from more `MKR` tokens.


    ### Vote on a Proposal


    Next, we will demonstrate how to vote on a proposal in Maker Foundation’s voting
    portal.


    #### Step 1: Get Your MKR Token


    You can find an exchange to buy, sell and trade `MKR`, such as Coinbase, Binance,
    Kraken, `crypto.com`, and others.


    #### Step 2: Connect to Ethereum Mainnet with Wallet


    Click `connect wallet` button in Maker Foundation’s voting portal and connect
    to Ethereum by selecting a wallet:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figb_HTML.png)


    A screenshot of connecting to Ethereum Mainnet with Wallet displays the option
    of selecting a wallet along with a welcome back screen.


    #### Step 3: Select an Active Vote


    Find an active vote in the voting portal and choose vote options:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figc_HTML.png)


    A screenshot of the active vote screen displays one specific governance poll,
    your vote section, vote breakdown percentages, and system info.


    #### Step 4: Review and Submit Your Vote


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figd_HTML.png)


    A screenshot of the review and submit your vote screen displays the one specific
    governance poll with your vote and comment boxes, the submit option, and also
    displays the Microsoft notification that contains Ethereum mainnet details.


    #### Step 5: Vote Completed


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fige_HTML.png)


    A screenshot of the vote completed screen displays the text reads, you successfully
    voted on 1 poll with that poll details, and the option of sharing all your votes.


    ## Decentralized Exchanges (DEXs)


    Centralized exchanges (CEXs) work similarly to a bank. Both buyers and sellers
    trust these exchange platforms to trade their assets. Users can buy, sell, and
    trade digital assets such as Bitcoin, Ether, or other cryptocurrencies in the
    central wallet of the exchange by paying certain transaction fees, and exchanges
    will control those funds and execution of crypto trades through internal systems.
    Then sign the transaction in the blockchain on the user’s behalf.


    Liquidity means how quickly you can exchange an asset for cash without affecting
    its market price. Since centralized exchanges are highly regulated, they attract
    many active users. These users are creating more orders and lead to high trading
    volumes with a faster exchange rate, which means more liquidity.


    To create a centralized exchange account, the user must provide a valid government-issued
    ID, banking details, and other personal information. The signup process is part
    of KYC (Know Your Customer) and AML (Anti Money Laundering) practices required
    by regulations. In addition, it helps exchanges determine a customer risk level
    and prevent criminal activity like money laundering and the financing of terrorism.
    Once a centralized exchange verifies and approves identity, the user can deposit
    funds onto the exchange account via wire transfer, ACH transfer, or by depositing
    cryptocurrencies such as Bitcoin or Ether. Then, the user may begin trading.


    Coinbase, Kraken, `Crypto.com`, and Binance are the popular centralized exchanges
    examples.


    Although centralized exchanges (CEXs) currently handle the majority of cryptocurrency
    trading activity, decentralized exchanges (DEXs) are growing in popularity. DEXs
    are the direct opposite of centralized cryptocurrency exchanges, which manage
    token ownership of the exchange and hold user’s private keys. Decentralized exchanges
    (DEXs) are peer-to-peer trading platforms that allow users to keep control of
    their funds and purchase or sell blockchain-based tokens and coin cryptocurrencies
    without an intermediary to control the transaction process. Instead, the user
    controls the wallet’s private keys. DEXs use smart contracts, which define set
    conditions to execute and record every transaction on the blockchain with a low
    transaction fee. Since DEXs do not involve any centralized authority, meaning
    KYC/AML are not required. Anyone can open an account to attend the DeFi ecosystem
    to trade. The transaction is fully anonymous.


    Table [8-1](#535492_1_En_8_Chapter.xhtml#Tab1) compares the difference between
    centralized exchanges and decentralized exchanges:


    **Table 8-1** Comparing centralized and decentralized exchanges


    |                 | CEXs                        | DEXs                       |

    |-----------------|-----------------------------|----------------------------|

    | Control         | Exchange controls funds      | User controls funds        |

    | Fee             | Required. Higher transaction fees | Zero or very minimal fees  |

    | Liquidity       | High liquidity               | Low liquidity              |

    | Regulation      | KYC/AML required             | KYC/AML not required       |

    | User identity   | Not anonymous                | Anonymous                  |

    | Usage           | Easy to use (even for beginners) | Not user-friendly. Need
    professional knowledge |

    | Security        | Could be hacks and server downtime | No hacks and server downtime
    |


    ### Type of Decentralized Exchanges


    DEXs are a foundation of decentralized finance (DeFi), which allow the trading
    of digital assets on automated smart contracts. There are three primary types
    of decentralized exchanges: Automated market makers, Order books DEXs, and DEX
    aggregators described in Figure [8-8](#535492_1_En_8_Chapter.xhtml#Fig8).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig8_HTML.png)


    An organizational chart depicts the three types of decentralized exchange. The
    types are automated market makers, order book DEXs that is further subdivided
    into the on-chain and off-chain order books, and DEX aggregators.


    **Figure 8-8** Type of decentralized exchanges


    ### Automated Market Makers (AMMs)


    On a traditional exchange platform, a market maker is typically a brokerage house,
    large bank, or institution that will “create the market,” as the name suggests.
    Market makers create liquidity for trading pairs in the market by buying and selling
    securities for their own accounts. Buyers and sellers offer different prices for
    an asset, and market makers always quote two-sided markets for a particular asset.
    They compensate for the difference in the bid-ask spread—the asking price exceeds
    the bid price for an asset in the market by providing purchase and sale solutions
    for investors.


    Trader A, Alice, wants to buy 1 BTC at $19,600. The exchange needs to find a Trader
    B, Bob, willing to sell 1 BTC at Alice’s preferred exchange range, such as $19,700.
    The centralized exchange will act as a middleman between Alice and Bob. The exchange
    will offer $19,620 to Bob, assuming Bob accepts the offer. The exchange will then
    sell Alice 1 BTC at $19,660. The exchange will get a profit of about $40. The
    process is illustrated in Figure [8-9](#535492_1_En_8_Chapter.xhtml#Fig9).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig9_HTML.png)


    A schematic diagram of the activities of the centralized exchange between Alice
    and Bob. Bob wants to sell 1 BTC for 19,700 dollars, but Alice wants to buy it
    for 19,600 dollars. Alice wants to sell 1 BTC for 19,660 dollars, and Bob wants
    to buy it for 19,620 dollars. The profit from these exchanges is 40 dollars.


    **Figure 8-9** Market maker activities


    In the case of an automated market maker (AMM), sometimes called proactive market
    maker, a market maker is replaced with autonomous protocols using smart contracts.
    The smart contracts in AMM always keep a quote between two (or more) assets and
    determine the price of digital assets and provide liquidity.'
