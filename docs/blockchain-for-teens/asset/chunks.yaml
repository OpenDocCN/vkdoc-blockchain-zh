    \ sent from individual participants and utilizes [cryptographic](https://101blockchains.com/what-is-consensus-algorithm/)\
    \ consensus methods (we will take a look at this later) to make a decision. There\
    \ is no single authority to receive and respond to requests; the system still\
    \ functions even if some individuals do not participate in decision making.\n\n\
    Table [1-1](#535492_1_En_1_Chapter.xhtml#Tab1) provides a comparison of centralization\
    \ and decentralization.\n\nTable 1-1\n\nComparing centralization and decentralization\n\
    \n|   | Centralization | Decentralization |   |\n| --- | --- | --- | --- |\n|\
    \ Single point failure | Yes | No | The blockchain network is peer-to-peer, and\
    \ each node possesses a complete copy of the blockchain data. Therefore, when\
    \ a failure occurs, data will never be lost. |\n| Who is in control? | Centralized\
    \ authority | User | There is no centralized authority to control the blockchain\
    \ network. |\n\nNow we understand the difference between centralization and decentralization.\
    \ Still, what on earth is blockchain?\n\nOn an ancient island called Shell Island,\
    \ people frequently traded with each other to get the resources they needed or\
    \ wanted. In the beginning, the islanders trusted each other and only traded shells\
    \ and food; this works well for some time. After a while, the islanders traded\
    \ more elaborate goods, such as jewelry, clothes, and tools. As the trades became\
    \ more frequent and complex, it became harder to trace them. For example, someone\
    \ trades with 20 people every day, but trades different items with each person.\
    \ To address this, the leaders of the island hired a trusted “middle man” to record\
    \ all the transactions to keep things fair and auditable; this also works well\
    \ for some time. However, the “middle man” started charging extra fees for his\
    \ work and even began to accept bribes. With much unfair trade happening, corruption\
    \ spread throughout the island, and no one trusts the “middle man” anymore. Business\
    \ slowed down as a result of fewer trades. To help the people trade fairly again,\
    \ the leaders of the island dismissed the “middle man” and agreed to replace him\
    \ with a more efficient solution. In the center of the island is a giant rock,\
    \ which could clearly be seen by everyone on the island. The leaders propose that\
    \ the islanders can permanently mark every trade information sequentially on the\
    \ rock after the traders complete and prove the trade, which makes the system\
    \ verifiable. This rock is accessible to everyone, so anyone on the island can\
    \ view and verify these transactions, which means the system is transparent. If\
    \ any records are mismatched, the islanders can vote to verify the record, which\
    \ gives everyone equal participating power. The islanders also do not need to\
    \ trust each other for this system to work; they only need to visit the rock to\
    \ look at the records instead of relying on the “middle man,” which makes the\
    \ system trustless. The islanders agree to follow these rules that the leaders\
    \ proposed, and from then on, there was a happy ending for everyone, where fair\
    \ trade was possible for all.\n\nSimilar to the Shell Island trading system, blockchain\
    \ is a decentralized peer-to-peer network. In the blockchain network, participants\
    \ can submit and confirm transactions without a need for centralized authority.\
    \ Once the transaction data is saved in the network, it will be immutable, or\
    \ unable to be altered. Members or network nodes can directly interact with one\
    \ another on the network without a central authority or middleman to interfere\
    \ with the transaction process.\n\nBlockchain is also called distributed ledger\
    \ technology (DLT). DLT allows all data to be shared across computer networks\
    \ distributed across multiple entities or locations, referred to as nodes. Each\
    \ node keeps a copy of the same data of the blockchain ledger.\n\nBlockchain has\
    \ the following key characteristics:\n\n1.  Decentralization\n\nAs we learned,\
    \ blockchain decentralization means distributing the central power to all participating\
    \ users in the blockchain network, which eliminates the single point of failure.\
    \ It generally exists in a peer-to-peer network.\n\n2.  Consensus protocol\n\n\
    Distributed consensus is a crucial component of any blockchain network. All network\
    \ participants must reach a common agreement to add a transaction record to the\
    \ blockchain. This will enable a blockchain to present a single version of the\
    \ transactions. There are many consensus protocols, including:\n    *   Proof\
    \ of Work (PoW)\n\n*   Proof of Stake (PoS)\n\n*   Practical Byzantine Fault Tolerance\
    \ (PBFT)\n\n*   Delegated Proof of Stake (DPoS)\n\n*   Proof of Elapsed Time (PoET)\n\
    \n*   Proof of Authority (PoA)\n\n*   And more…\n\nWe will discuss some of these\
    \ consensus protocols in a later section.\n\n1.  Immutability\n\nBlockchain immutability\
    \ means that once data has been recorded in the blockchain, it is impossible to\
    \ manipulate, alter, or delete data. The blockchain data will stay there forever.\n\
    \n2.  Transparency\n\nAll blockchain transactions are publicly viewable by any\
    \ party or individual, which creates transparency.\n\n3.  Security\n\nSince blockchain’s\
    \ immutability and decentralization features eliminate the single point of failure,\
    \ the records in the blockchain cannot be tampered with. This makes blockchain\
    \ data extremely secure. When users transfer funds from blockchain wallets, they\
    \ are cryptographically signed by their wallet’s private key. We will explain\
    \ this in Chapter [2](#535492_1_En_2_Chapter.xhtml).\n\nFigure [1-3](#535492_1_En_1_Chapter.xhtml#Fig3)\
    \ shows blockchain key characteristics.\n\n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig3_HTML.png)\n\
    \nA flowchart of a blockchain with labeled characteristics. The labeled chain\
    \ flows are decentralization, immutability, security, transparency, and consensus.\n\
    \nFigure 1-3\n\nBlockchain key characteristics\n\nNow that we have a fair understanding\
    \ of the concept of blockchain, we’re going to take a look at how blockchain works."
  trans: "\n与中心化在线服务提供商不同，去中心化世界让用户完全控制自己的交易和数据。每个成员在决策时拥有平等权力。系统接收来自个体参与者的决策，并利用[加密](https://101blockchains.com/what-is-consensus-algorithm/)共识方法（我们稍后会探讨）来做出决定。没有单一的权威机构来接收和响应请求；即使某些个体不参与决策，系统依然能够运行。\n\
    \n表 1-1 提供了中心化与去中心化的对比。\n\n**表 1-1**\n**中心化与去中心化对比**\n\n|  | 中心化 | 去中心化 | 说明 |\n\
    | --- | --- | --- | --- |\n| 单点故障 | 是 | 否 | 区块链网络是点对点的，每个节点都拥有区块链数据的完整副本。因此，当发生故障时，数据永远不会丢失。\
    \ |\n| 谁在控制？ | 中心化权威 | 用户 | 没有中心化权威来控制区块链网络。 |\n\n现在我们理解了中心化与去中心化的区别。但区块链到底是什么呢？\n\
    \n在一个名为“贝壳岛”的古老岛屿上，人们为了获取所需或想要的资源而频繁地进行物物交换。起初，岛民们互相信任，只交换贝壳和食物；这在一段时间内运行良好。过了一段时间，岛民们开始交易更精致的商品，如珠宝、衣服和工具。随着交易变得更加频繁和复杂，追踪它们变得困难。例如，有人每天与\
    \ 20 个人交易，但和每个人交易的东西都不同。为了解决这个问题，岛上的首领雇佣了一个值得信赖的“中间人”来记录所有交易，以保证公平和可审计；这在一段时间内也运行良好。然而，这位“中间人”开始为自己的工作收取额外费用，甚至开始接受贿赂。随着大量不公平交易的发生，腐败在岛上蔓延，没有人再信任这个“中间人”。交易减少，商业活动也随之放缓。为了帮助人们再次公平交易，岛上的首领解雇了“中间人”，并同意用更高效的方案取而代之。在岛中心有一块巨大的岩石，岛上的每个人都能清楚地看到它。首领们提出，岛民们可以在交易完成并证明后，将每一笔交易信息按顺序永久地标记在这块岩石上，这使得系统具有可验证性。这块岩石对所有人开放，因此岛上的任何人都可以查看和验证这些交易，这意味着系统是透明的。如果任何记录不匹配，岛民们可以投票来验证该记录，这赋予了每个人平等的参与权。岛民们也不需要为了这个系统的运转而互相信任；他们只需要去看看岩石上的记录，而不用依赖“中间人”，这使得系统无需信任。岛民们同意遵守首领们提出的这些规则，从此以后，每个人都迎来了幸福的结局，公平交易成为了可能。\n\
    \n与贝壳岛的交易系统类似，区块链是一个去中心化的点对点网络。在区块链网络中，参与者可以在无需中心化权威机构的情况下提交和确认交易。一旦交易数据保存在网络中，它就是不可变的，或者说无法被更改。成员或网络节点可以在网络上直接相互交互，无需中心化权威或中间人干预交易过程。\n\
    \n区块链也被称为分布式账本技术（`DLT`）。`DLT`允许所有数据在跨多个实体或位置（称为节点）的计算机网络之间共享。每个节点都保存一份相同的区块链账本数据。\n\
    \n区块链具有以下关键特征：\n\n1.  **去中心化**  \n    正如我们所了解的，区块链的去中心化意味着将中心化权力分配给区块链网络中的所有参与用户，这消除了单点故障。它通常存在于点对点网络中。\n\
    \n2.  **共识协议**  \n    分布式共识是任何区块链网络的关键组成部分。所有网络参与者必须达成共同协议，才能将交易记录添加到区块链中。这使得区块链能够呈现交易的单一版本。共识协议有很多种，包括：\n\
    \    *   工作量证明（`PoW`）\n    *   权益证明（`PoS`）\n    *   实用拜占庭容错（`PBFT`）\n    *   委托权益证明（`DPoS`）\n\
    \    *   过去时间证明（`PoET`）\n    *   权威证明（`PoA`）\n    *   以及更多……\n\n    我们将在后面的章节中讨论其中一些共识协议。\n\
    \n3.  **不可篡改性**  \n    区块链的不可篡改性意味着，一旦数据被记录到区块链中，就无法操纵、更改或删除数据。区块链数据将永远保留在那里。\n\
    \n4.  **透明性**  \n    所有区块链交易都可由任何一方或个人公开查看，这创造了透明性。\n\n5.  **安全性**  \n    由于区块链的不可篡改性和去中心化特性消除了单点故障，区块链中的记录无法被篡改。这使得区块链数据极其安全。当用户从区块链钱包转移资金时，交易会由其钱包的私钥进行加密签名。我们将在第\
    \ 2 章中解释这一点。\n\n图 1-3 展示了区块链的关键特征。\n\n![](img/535492_1_En_1_Fig3_HTML.png)\n\n\
    一个带有标注特征的区块链流程图。标注的链条流向包括：去中心化、不可篡改性、安全性、透明性和共识。\n\n**图 1-3**\n**区块链关键特征**\n\n\
    现在我们对区块链的概念有了相当的理解，接下来我们将看看区块链是如何工作的。\n"
- fmt: '# How the Blockchain Works


    A blockchain is made up of an ordered chain of blocks. When a new block is generated,
    it connects to the previous block through a hashing mechanism. This way, the most
    recent data can be always added at the top of the chain.


    Imagine there is a daily wall calendar that covers a full year. The calendar initially
    starts on January 1. After the day is over, the owner of the calendar flips to
    the next page, which will be January 2. Because the numbers of the days follow
    a linear sequence, it is easy to tell if any page is missing or modified.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig4_HTML.png)


    A block diagram of the blockchain from block 1 to block n consider as T 1 to T
    n and includes the days 3, 4, 5, and today.


    **Figure 1-4** Block diagram of blockchain


    It is also important to know that a `bit` is a binary digit (either 0 or 1) and
    is the smallest unit of data that is stored on a computer. 8 bits make 1 `byte`.


    A `hash` is a unique identifier that uses a mathematical function to generate
    a fixed-length character string from the input text or data records. (We will
    explain the hash and encryption functions in more detail in Chapter 2.) The cryptographic
    hash function is designed to protect data against any alterations.


    The blockchain hashing algorithm `SHA-256`, or Secure Hashing Algorithm 256, generates
    a hash code of size 256 bits or 32 bytes. `SHA-256` is a one-way hash function,
    meaning that it is easy to compute but impractical to reverse the hash to find
    what the initial input was. Even the slightest change to the input message typically
    makes the output hash completely different. To crack hash results, the best way
    is through a brute-force strategy, which means to test every possible combination
    one by one. The approach is to guess what was the original value being hashed
    by applying the same hash function to see if the result matches. We need to process
    `2^(256)` variants of 256-bit string, which results in a total amount of `3.2
    * 10^(79)` possible combinations. The total calculation time would be more than
    a billion years.


    `SHA-256` hash is also deterministic, meaning that given same input (or file),
    the output will always deliver the same hash value.


    Table 1-2 shows examples of `SHA-256` hashing.


    **Table 1-2** `SHA-256` hash examples


    | `SHA-256` (Input) | Output |

    | --- | --- |

    | Hellohello | `185f8db32271fe25f561a6fc938b2e264306ec304eda518007d17648263819692cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824`
    |

    | blockchain for teens | `ae398c6f1d78e76d472c26e091869b9913f7624abea82901c00893a0015ccd50`
    |

    | Blockchain hash | `f067428fdeb5984a6eeff5dbbe39a60cdb9dbffecdb80f18830eeb1e91d3dde5`
    |


    You can see that the length of the input data does not affect output length—the
    output will always be 64-character text. Because of this, it is nearly impossible
    to guess the input from the output. Blockchain uses this `SHA-256` hash function
    to hash transaction data and ensure transactions cannot easily be altered. If
    someone wanted to tamper with a transaction, they would need to rehash it, which
    would completely change the output. So, when we say a hash, we are referring to
    the 64-character text output of a hashing algorithm.


    The structure of each block is separated into a block header and body, as shown
    in Figure 1-5.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig5_HTML.png)


    A diagram of a block includes a header and a body. The label parts of the header
    are version, previous block hash, timestamp, n bits, nonce, merkle root. The body
    has parts labeled as transactions and a box labeled transaction counter.


    **Figure 1-5** Blockchain block structure'
