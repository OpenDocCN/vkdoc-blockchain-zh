    have persisted for a long time. Blockchain technology is decentralized, secure,
    transparent, and immutable. Its revolutionary design and properties have enabled
    it to become a possible solution for the challenges of the global financial system,
    and the banking and financial industry is accelerating its adoption of digital
    blockchain technology. The global blockchain in the financial market is estimated
    to grow from $1.89 billion in 2022 to $94.58 billion in 2030, at an annual rate
    of 63.1%. In the following section, we will discuss a few use cases of the adoption
    of blockchain technology in the financial industry, including trade finance.'
  trans: '

    ## 金融领域的区块链


    金融服务是指金融行业为管理资金而提供的各种经济服务和产品。它们是国民经济最重要的驱动力之一。金融服务涵盖广泛的业务，包括以下主要服务类型：


    1.  **银行业** – 银行服务是金融服务业中最重要的服务之一。它提供各种服务，包括个人或企业银行业务（支票账户、储蓄账户、借记卡/信用卡等）以及贷款发放（个人贷款、商业贷款、住房贷款、汽车贷款等）。

    2.  **保险业** – 保险服务保护个人免受财务损失，并帮助他们从意外事故中恢复。大多数人都拥有某种保险，例如汽车保险、房屋保险或人寿健康保险。当个人购买保险时，他们会签订一份保单合同。随后，当他们遭遇保单承保范围内的损失并提出索赔时，保险公司会根据保单条款进行赔付。

    3.  **财富管理** – 财富管理或财富管理咨询，是指投资管理以及提供高水平专业财务建议，以满足从富裕人士到高净值及超高净值个人和家庭等广泛客户的需求。

    4.  **共同基金** – 共同基金服务允许个人与其他投资者将资金汇集在一起，投资于一系列证券，例如股票、债券、货币市场工具和其他资产。共同基金的价格，也称为其资产净值，由投资组合中证券的总价值除以流通在外的股份数量决定。

    5.  **专业咨询** – 金融专业咨询服务提供专业知识，帮助个人和公司做出财务决策并实现财务目标，包括教育储蓄规划、退休规划、风险管理、投资组合管理、保险和税务策略。

    6.  **股票市场** – 股票市场服务为买卖双方提供交易公司股票以及各种其他证券（如债券、期货和期权）的场所。

    7.  **债务工具** – 债务工具是用于获取资本的工具，包括贷款和债券。通常，债务偿还涉及根据合同条款在指定的还款计划内向贷款人或投资者支付固定款项。公司利用债务工具为其增长、投资和未来规划获取资金。

    8.  **税务/审计咨询** – 税务会计服务涉及金融专业人士提供准备纳税申报和缴纳税款的服务。财务审计，也称为财务报表审计，通过评估组织的会计和财务报表是否符合政府法律法规，提供合理保证。

    9.  **投资组合管理** – 投资组合管理是指管理个人的投资，例如股票、债券、现金、股份和交易所交易基金。通常，股票、债券和现金构成投资组合的核心。

    10. **信用评级** – 信用评级用于评估个人或公司的信用风险，根据其收入和过去的还款记录预测其偿还债务的能力。


    学者们估计，到`2022 年`，全球金融服务行业价值将达到`2.5 万亿美元`，年增长率约为`6%`。每天都有价值数万亿美元的交易发生。由于如此巨量的交易，金融行业面临着诸多挑战，包括过多的文书工作、数据泄露、繁琐的流程及随之而来的高成本、消费者缺乏信任以及长期存在的透明度不足等问题。区块链技术具有去中心化、安全、透明和不可篡改的特性。其革命性的设计和特性使其成为解决全球金融体系挑战的可能方案，银行和金融业正在加速采用数字区块链技术。据估计，全球金融市场的区块链将从`2022
    年`的`18.9 亿美元`增长到`2030 年`的`945.8 亿美元`，年增长率为`63.1%`。在下一节中，我们将讨论区块链技术在金融行业应用的一些案例，包括贸易金融。'
- fmt: '# Letters of Credit in Trade Finance


    Trade finance is the financing of instruments or services that are used to facilitate
    international trade and commerce between an importer and an exporter. The global
    trade finance market reached $1.7 trillion in June 2022.


    The types of trade finance include letters of credit (`LC`), purchase orders (`POs`),
    finance, stock finance, structured commodity finance, invoice finance (discounting
    and factoring), supply chain finance, and bonds and guarantees.


    In trade finance, the importer’s bank will provide an `LC` to the exporter. An
    `LC` is known as a draft, documentary credit, or banker’s commercial credit. It
    is a letter from an importer’s bank guaranteeing that an importer’s payment to
    an exporter will be received with a specified amount in an agreed currency and
    provides the exporter with a contract with defined terms and conditions, to be
    met within a fixed time frame. `LC` are most often used in international trade,
    particularly, in importing and exporting.


    Figure [9-3](#535492_1_En_9_Chapter.xhtml#Fig3) shows an example of an `LC` process,
    although an actual transaction could be much more complex.


    ![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig3_HTML.png)


    An illustration of the `LC` process, initial sale contract, request `LC`, issue
    `LC`, deliver goods, deliver document, payment of purchase and pay for the purchase.
    The image has 4 components at the edges connected with arrows.


    Figure 9-3


    The `LC` process


    1.  **Importer and exporter initiate a sale contract.**


    The importer (buyer) and exporter (seller) initialize and agree on a sale contract.
    A sale contract is a legal agreement between the exporter and the importer, in
    which the exporter agrees to sell and an importer agrees to buy under certain
    terms and conditions. The contents of the contract should consist of information
    on the company of the seller and the buyer, the goods, the total amount and unit
    price of the goods, delivery date, penalties for a late shipment, and others.


    2.  **Importer applies for an LC with their bank.**


    The importer goes to their bank and applies for an `LC` for a certain amount with
    the exporter as the beneficiary. The `LC` is obtained either through a standard
    loan process or funded with authorization to debit the customer’s account with
    an associated fee.


    3.  **The importer’s bank issues the LC and sends it to the exporter’s bank.**


    The importer’s bank prepares the `LC` and then sends a copy of the `LC` to the
    exporter’s bank. The importer’s bank instructs the exporter’s bank on whether
    to add its confirmation as per their customers’ contract.


    4.  **The exporter’s bank authenticates and advises on the LC.**


    The exporter bank forwards the `LC` to the beneficiary (exporter). The exporter
    should ensure that all terms and conditions in `LC` have been met in the sales
    contract.


    5.  **Goods are shipped to the importer.**


    The exporter starts to manufacture, assemble, and ship the goods.


    6.  **The exporter submits trade documents to the exporter’s bank.**


    The exporter prepares an invoice of shipment and all other documents, including
    a description of goods and shipment date. All these documents are required according
    to the `LC`.


    7.  **The exporter’s bank examines and delivers the document to the importer’s
    bank.**


    The exporter’s bank checks the trade documents presented by the exporter against
    the `LC`. Then, the exporter sends them to the importer’s bank, claiming reimbursement
    and payment for the seller.


    8.  **The importer pays the importer’s bank.**


    The importer’s bank notifies the importer with the exporter’s document, and the
    importer checks the document and pays the importer’s bank.


    9.  **The importer’s bank sends the payment to the exporter’s bank.**


    10.  **The exporter’s bank sends the payment to the exporter.**


    An `LC` from a bank guarantees that exporters will receive payment as long as
    they meet all the terms and conditions, and importers can obtain exporters’ trust
    via the use of an `LC`. Using an `LC` also reduces production risk. An `LC` also
    provides a way of payment when other payment options do not.


    Despite all the advantages of the `LC` contract, the `LC` process still has many
    issues.


    1.  **High service fees need to be paid.**


    Exporters and importers must pay their bank high service fees when using the `LC`
    as a payment option.


    2.  **It is a time-consuming process.**


    Using an `LC` means that bank professionals will need to possess the `LC` using
    traditional banking methods. The process of issuing an `LC` is very slow, normally
    taking around 15 days to a few months for an international trade transaction.
    Many copies are shared with different parties by telecommunications such as airmail,
    fax, phone call, or scans. The trade transactions depend on paper-based documents,
    known as documentary credits. Banks need to manually check the papers to prevent
    fraud, authenticate transactions, and verify the balance of the buyer and the
    seller.


    Many banks are starting to make use of blockchain technology to simplify the `LC`
    process and overcome its issues.


    By defining `LC` as a smart contract between all parties, including the bank,
    the importer, and the exporter, all `LC` contractual agreements and conditions
    statements are programmed as smart contract functions, such as buyer and seller
    information, shipping time, description, and amount of goods shipped and documentary
    evidence, and `LC` status. Through smart contracts, each step of the `LC` process
    can be verified automatically. Furthermore, the secure blockchain network shares
    all transaction data via a smart contract.


    Figure [9-4](#535492_1_En_9_Chapter.xhtml#Fig4) shows how an `LC` contract is
    defined in a Hyperledger Fabric blockchain.


    ![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig4_HTML.png)


    A screenshot of `LC` Contract with the participant type, assets, participants
    and concepts details.


    Figure 9-4


    An example of an `LC` contract


    In 2018, a Spanish multinational financial institution Banco Bilbao Vizcaya Argentaria
    (`BBVA`) completed a blockchain-based `LC` transaction as a substitute for traditional
    trade documents. The project was involved to importing 25 tons of frozen tuna
    from Pinsa Congelados, a manufacturer located in Mexico, to Spain. `BBVA` issued
    the `LC` for this project. By carrying out the `LC` process in an Ethereum blockchain,
    `BBVA` reduced the time required to send, verify, and authorize an international
    trade transaction from around 7 to 10 days to just 2.5 hours.


    In August 2019, the Hongkong and Shanghai Banking Corporation (`HSBC`), one of
    the world’s largest banks, completed its first blockchain-based `LC` transaction.
    The `LC` smart contracts were run on the blockchain to execute and record the
    import of 20,000 tons of fuel oil from Singapore by United Mymensingh Power Ltd.
    to Hong Kong for a power station. `HSBC` uses the `Voltron` platform, R3’s `Corda
    Enterprise` blockchain platform. `Voltron` is an open industry platform to create,
    exchange, approve, and issue `LC` on `Corda`.


    A review of a few real-world examples of blockchain-based `LC`s shows that blockchain
    provides an end-to-end digitalization life cycle from creating documents to making
    payments with increased security, transparency, and efficiency. As a result, blockchain
    technology can potentially redefine global trade processes and address the current
    trade finance bottlenecks.'
  raw: '## Letters of Credit in Trade Finance


    Trade finance is the financing of instruments or services that are used to facilitate
    international trade and commerce between an importer and an exporter. The global
    trade finance market reached $1.7 trillion in June 2022.


    The types of trade finance include letters of credit (LC), purchase orders (POs),
    finance, stock finance, structured commodity finance, invoice finance (discounting
    and factoring), supply chain finance, and bonds and guarantees.


    In trade finance, the importer’s bank will provide an LC to the exporter. An LC
    is known as a draft, documentary credit, or banker’s commercial credit. It is
    a letter from an importer’s bank guaranteeing that an importer’s payment to an
    exporter will be received with a specified amount in an agreed currency and provides
    the exporter with a contract with defined terms and conditions, to be met within
    a fixed time frame. LC are most often used in international trade, particularly,
    in importing and exporting.


    Figure [9-3](#535492_1_En_9_Chapter.xhtml#Fig3) shows an example of an LC process,
    although an actual transaction could be much more complex.


    ![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig3_HTML.png)


    An illustration of the LC process, initial sale contract, request LC, issue LC,
    deliver goods, deliver document, payment of purchase and pay for the purchase.
    The image has 4 components at the edges connected with arrows.


    Figure 9-3


    The LC process


    1.  **Importer and exporter initiate a sale contract.**


    The importer (buyer) and exporter (seller) initialize and agree on a sale contract.
    A sale contract is a legal agreement between the exporter and the importer, in
    which the exporter agrees to sell and an importer agrees to buy under certain
    terms and conditions. The contents of the contract should consist of information
    on the company of the seller and the buyer, the goods, the total amount and unit
    price of the goods, delivery date, penalties for a late shipment, and others.


    2.  **Importer applies for an LC with their bank.**


    The importer goes to their bank and applies for an LC for a certain amount with
    the exporter as the beneficiary. The LC is obtained either through a standard
    loan process or funded with authorization to debit the customer’s account with
    an associated fee.


    3.  **The importer’s bank issues the LC and sends it to the exporter’s bank.**


    The importer’s bank prepares the LC and then sends a copy of the LC to the exporter’s
    bank. The importer’s bank instructs the exporter’s bank on whether to add its
    confirmation as per their customers’ contract.


    4.  **The exporter’s bank authenticates and advises on the** **LC****.**


    The exporter bank forwards the LC to the beneficiary (exporter). The exporter
    should ensure that all terms and conditions in LC have been met in the sales contract.


    5.  **Goods are shipped to the importer.**


    The exporter starts to manufacture, assemble, and ship the goods.


    6.  **The exporter submits trade documents to the exporter’s bank.**


    The exporter prepares an invoice of shipment and all other documents, including
    a description of goods and shipment date. All these documents are required according
    to the LC.


    7.  **The exporter’s bank examines and delivers the document to the importer’s
    bank.**


    The exporter’s bank checks the trade documents presented by the exporter against
    the LC. Then, the exporter sends them to the importer’s bank, claiming reimbursement
    and payment for the seller.


    8.  **The importer pays the importer’s bank.**


    The importer’s bank notifies the importer with the exporter’s document, and the
    importer checks the document and pays the importer’s bank.


    9.  **The importer’s bank sends the payment to the exporter’s bank****.**


    10.  **The exporter’s bank sends the payment to the exporter.**


    An LC from a bank guarantees that exporters will receive payment as long as they
    meet all the terms and conditions, and importers can obtain exporters’ trust via
    the use of an LC. Using an LC also reduces production risk. An LC also provides
    a way of payment when other payment options do not.


    Despite all the advantages of the LC contract, the LC process still has many issues.


    1.  **High service fees need to be paid.**


    Exporters and importers must pay their bank high service fees when using the LC
    as a payment option.


    2.  **It is a time-consuming process.**


    Using an LC means that bank professionals will need to possess the LC using traditional
    banking methods. The process of issuing an LC is very slow, normally taking around
    15 days to a few months for an international trade transaction. Many copies are
    shared with different parties by telecommunications such as airmail, fax, phone
    call, or scans. The trade transactions depend on paper-based documents, known
    as documentary credits. Banks need to manually check the papers to prevent fraud,
    authenticate transactions, and verify the balance of the buyer and the seller.


    Many banks are starting to make use of blockchain technology to simplify the LC
    process and overcome its issues.


    By defining LC as a smart contract between all parties, including the bank, the
    importer, and the exporter, all LC contractual agreements and conditions statements
    are programmed as smart contract functions, such as buyer and seller information,
    shipping time, description, and amount of goods shipped and documentary evidence,
    and LC status. Through smart contracts, each step of the LC process can be verified
    automatically. Furthermore, the secure blockchain network shares all transaction
    data via a smart contract.


    Figure [9-4](#535492_1_En_9_Chapter.xhtml#Fig4) shows how an LC contract is defined
    in a Hyperledger Fabric blockchain.


    ![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig4_HTML.png)


    A screenshot of L C Contract with the participant type, assets, participants and
    concepts details.


    Figure 9-4


    An example of an LC contract


    In 2018, a Spanish multinational financial institution Banco Bilbao Vizcaya Argentaria
    (BBVA) completed a blockchain-based LC transaction as a substitute for traditional
    trade documents. The project was involved to importing 25 tons of frozen tuna
    from Pinsa Congelados, a manufacturer located in Mexico, to Spain. BBVA issued
    the LC for this project. By carrying out the LC process in an Ethereum blockchain,
    BBVA reduced the time required to send, verify, and authorize an international
    trade transaction from around 7 to 10 days to just 2.5 hours.


    In August 2019, the Hongkong and Shanghai Banking Corporation (HSBC), one of the
    world’s largest banks, completed its first blockchain-based LC transaction. The
    LC smart contracts were run on the blockchain to execute and record the import
    of 20,000 tons of fuel oil from Singapore by United Mymensingh Power Ltd. to Hong
    Kong for a power station. HSBC uses the Voltron platform, R3’s Corda Enterprise
    blockchain platform. Voltron is an open industry platform to create, exchange,
    approve, and issue LC on Corda.


    A review of a few real-world examples of blockchain-based LCs shows that blockchain
    provides an end-to-end digitalization life cycle from creating documents to making
    payments with increased security, transparency, and efficiency. As a result, blockchain
    technology can potentially redefine global trade processes and address the current
    trade finance bottlenecks.'
  trans: '

    # 贸易融资中的信用证


    贸易融资是指为促进进口商与出口商之间的国际贸易与商业往来而提供的票据或服务融资。2022 年 6 月，全球贸易融资市场规模达到 1.7 万亿美元。


    贸易融资的类型包括信用证（`LC`）、采购订单（`POs`）融资、存货融资、结构型商品融资、发票融资（贴现和保理）、供应链融资以及债券与担保。


    在贸易融资中，进口商的银行会向出口商提供一份`LC`。`LC`也被称为汇票、跟单信用证或银行商业信用证。它是进口商银行出具的一封信函，保证进口商向出口商的付款将以约定货币的指定金额收到，并为出口商提供一份包含明确条款与条件的合同，需在规定时间框架内满足。`LC`最常用于国际贸易，特别是进出口业务。


    图 9-3 展示了一个`LC`流程的示例，尽管实际交易可能复杂得多。


    ![](img/535492_1_En_9_Fig3_HTML.png)


    `LC`流程示意图：初始销售合同、申请`LC`、签发`LC`、交付货物、提交单据、支付货款。图片边缘有 4 个组件，通过箭头相互连接。


    图 9-3


    `LC`流程


    1.  **进口商与出口商签订销售合同。**


    进口商（买方）和出口商（卖方）启动并商定一份销售合同。销售合同是出口商与进口商之间的法律协议，出口商同意出售，进口商同意按特定条款和条件购买。合同内容应包括买卖双方公司信息、货物信息、货物总价和单价、交货日期、延迟装运的罚则等。


    2.  **进口商向银行申请信用证。**


    进口商前往其银行，以出口商为受益人，申请一定金额的`LC`。`LC`可以通过标准贷款流程获得，或通过授权从客户账户中扣除相关费用来提供资金。


    3.  **进口商银行签发信用证并将其发送给出口商银行。**


    进口商银行准备`LC`，然后将`LC`副本发送给出口商银行。进口商银行指示出口商银行是否根据其客户的合同添加其保兑。


    4.  **出口商银行对信用证进行认证并通知。**


    出口商银行将`LC`转发给受益人（出口商）。出口商应确保`LC`中的所有条款和条件均已满足销售合同的要求。


    5.  **货物被运送给进口商。**


    出口商开始制造、组装并运输货物。


    6.  **出口商向出口商银行提交贸易单据。**


    出口商准备装运发票以及所有其他单据，包括货物描述和装运日期。根据`LC`要求，所有这些单据都是必需的。


    7.  **出口商银行审核单据并将其交付给进口商银行。**


    出口商银行根据`LC`检查出口商提交的贸易单据。然后，出口商将其发送给进口商银行，要求为卖方补偿和付款。


    8.  **进口商向进口商银行付款。**


    进口商银行将出口商的单据通知进口商，进口商检查单据并向进口商银行付款。


    9.  **进口商银行将款项发送给出口商银行。**


    10.  **出口商银行将款项发送给出口商。**


    银行的`LC`保证，只要出口商满足所有条款和条件，就能收到付款；而进口商则可以通过使用`LC`获得出口商的信任。使用`LC`还可以降低生产风险。当其他付款方式不可行时，`LC`也提供了一种付款途径。


    尽管`LC`合同具有诸多优势，但其流程仍存在许多问题。


    1.  **需支付高额服务费。**


    当使用`LC`作为付款方式时，出口商和进口商必须向其银行支付高额服务费。


    2.  **这是一个耗时的过程。**


    使用`LC`意味着银行专业人员需要使用传统银行方法处理`LC`。签发`LC`的过程非常缓慢，一项国际贸易交易通常需要大约 15 天到几个月。许多副本通过航空邮件、传真、电话或扫描等电信方式与不同方共享。贸易交易依赖于纸质单据，即所谓的跟单信用证。银行需要人工核对文件以防止欺诈、验证交易并核实买卖双方的余额。


    许多银行开始利用区块链技术来简化`LC`流程并克服其问题。


    通过将`LC`定义为包括银行、进口商和出口商在内的所有各方之间的智能合约，所有`LC`的合同协议和条件声明都被编程为智能合约功能，例如买方和卖方信息、装运时间、描述、装运货物数量和单据证据，以及`LC`状态。通过智能合约，`LC`流程的每一步都可以自动验证。此外，安全的区块链网络通过智能合约共享所有交易数据。


    图 9-4 展示了如何在 Hyperledger Fabric 区块链中定义`LC`合同。


    ![](img/535492_1_En_9_Fig4_HTML.png)


    `LC`合同截图，显示了参与者类型、资产、参与者和概念细节。


    图 9-4


    一个`LC`合同的示例


    2018 年，西班牙跨国金融机构西班牙对外银行（`BBVA`）完成了一笔基于区块链的`LC`交易，以此替代传统的贸易单据。该项目涉及从位于墨西哥的制造商 Pinsa
    Congelados 进口 25 吨冷冻金枪鱼到西班牙。`BBVA`为该项目的`LC`进行签发。通过在以太坊区块链上执行`LC`流程，`BBVA`将发送、验证和授权国际贸易交易所需的时间从大约
    7 到 10 天缩短到了仅 2.5 小时。


    2019 年 8 月，全球最大银行之一的香港上海汇丰银行（`HSBC`）完成了其首笔基于区块链的`LC`交易。`LC`智能合约在区块链上运行，用于执行和记录
    United Mymensingh Power Ltd.从新加坡向香港进口 2 万吨燃料油用于发电厂的过程。`HSBC`使用了`Voltron`平台，该平台基于
    R3 的`Corda Enterprise`区块链平台。`Voltron`是一个开放的行业平台，用于在`Corda`上创建、交换、审批和签发`LC`。


    对几个基于区块链的`LC`真实案例的回顾表明，区块链提供了从创建单据到付款的端到端数字化生命周期，同时提高了安全性、透明度和效率。因此，区块链技术有潜力重新定义全球贸易流程，并解决当前贸易融资的瓶颈问题。

    '
- fmt: '# Blockchain in a Supply Chain


    A supply chain is a coordinated network comprising companies, facilities, and
    business activities that transform raw materials and components into a finished
    product and deliver it to the consumer. The entities involved in a supply chain
    include producers, vendors, wholesalers, transportation carriers, distribution
    centers, retailers, and customers.


    A traditional supply chain flow follows a linear, step-by-step progression, including
    planning, designing, sourcing the raw materials, product development, marketing,
    operations, distribution, finance, and customer service. The current step typically
    depends on the input of the previous step. Effective supply chain management can
    reduce a company’s overall costs and accelerate its production cycle. If any stage
    breaks, the entire linear chain will be disrupted, which can be costly. Currently,
    a supply chain oversees and integrates all the activities, including ordering,
    purchasing, manufacturing, transportation, and distribution, into a centralized
    platform.


    Having a centralized platform has made the entire supply chain more efficient.
    Its advantages range from reducing operational costs to facilitating software
    upgrades, database data management, etc. However, many challenges still remain,
    such as if the server went down, information could be lost. These will be examined
    in more detail in the following sections.


    ## Document Management


    The supply chain consists of all stages and directly or indirectly involves multiple
    business units, ranging from the manufacturer, transporters, and warehouses to
    end users. The entire chain can be spread across multiple countries too. Throughout
    the process, many documents are generated and must be maintained as proof. These
    documents could include purchase orders, customs paperwork, inspection reports,
    dealer/distributor agreements, manufacturer and product information, and the location
    of all supply chain intermediaries between the manufacturer and the contractor.


    The complexity of global industrial supply chains exponentially increases their
    risk of execution of entire chain. For example, automotive supply chains are one
    of the most complex in the world, with each vehicle requiring more than 30,000
    parts originating from thousands of different suppliers. Each of those parts is
    either manufactured in house or sourced from a third-party provider. This complexity
    of the supply chain often means that it suffers from inconsistencies, disconnects
    in the processes, an increasing number of errors, and high costs.


    Many transport and logistics organizations have already invested in digitizing
    and improving their documents with new technologies such as big data and the cloud
    computing. However, more than half of the companies worldwide are still experiencing
    issues with information verification and finding the data needed for customers
    due to a limited budget to upgrade new software systems. An efficient and lost-cost
    solution for connecting all components into a fully digital system has still not
    been found.


    ## Integration of Various Centralized IT Software Systems


    As a supply chain is complex, with many participants in the system, many suppliers
    have their own software systems for performing different processes under different
    standards. For example, some vendors allow process integration through an automated
    process via `HTTPS` and messaging technologies. Some vendors only support manual
    processes via email or paper invoices. Therefore, integrating and maintaining
    all disparate systems together will be complex, time-consuming, and costly.


    ## Lack of Transparency Regarding Data


    No easily accessible consolidated data source allows all suppliers to trace each
    step’s information for the entire supply chain. Each supplier can only see their
    own and related suppliers’ information. There is no natural and easy way to compile
    all this information and make it transparent. Integrating with other suppliers
    will be costly, with high maintenance effort on each side.


    Therefore, the industry needs to reinvent the supply chain process from the ground
    up and move toward a high-speed, more efficient future. As a decentralized peer-to-peer
    digital ledger system, a blockchain can transform traditional supply chain business
    by optimizing processes, reducing costs and risks, and increasing supply chain
    transparency. Some key potential benefits of adopting blockchain technologies
    are as follows:


    * **Increased supply chain transparency**


    High transparency in the supply chain network can help maintain the safety and
    quality of products and reduce costs. By generating a tamper-proof digital record
    in each step, blockchain enables traceability and trackability for supply chain
    procedures. The records in supply chain networks are transparent, and participants
    in the network obtain greater visibility across all supply chain activities. Consequently,
    when an incident occurs anywhere within the global supply chain, it will be considerably
    easier and less time-consuming to access and determine the root cause of the violation.
    As a result, all parties can spend more time delivering goods, improving quality,
    and reducing costs.


    * **A resilient supply chain**


    Smart contracts with predefined business conditions can automatically trigger
    the supply chain process when certain criteria are met. Moreover, they can reduce
    risks and prevent many unexpected events.


    * **Streamlined supplier onboarding**


    The supplier onboarding process, sometimes referred to as supplier onboarding,
    is time-consuming in many companies. For example, new supplier onboarding could
    take up to 30 days. Some processes need to be performed before onboarding a new
    supplier.


    1. The process starts after the requester’s purchase order has been opened. First,
    the central system must identify the new supplier and counterparty. Then, the
    internal approval process typically takes place over email. Sometimes, other related
    business managers need to get involved for document verification and approval.


    2. Once new suppliers get permission to enter the system, they need to complete
    a vendor onboarding form by providing relevant information, for example, financial
    information and the company’s profile. Multiple stakeholders also need to get
    involved to verify that the new supplier company is qualified and does business
    with existing vendors legally and securely.


    3. Once the new supplier submits the form, the finance team will check all the
    documents to ensure that the data provided are accurate and complete. Next, the
    finance team needs manually enter the form, which is typically more than 50 fields.
    It is a highly error-prone process and takes a long time. After this step, the
    new supplier can be onboarded.


    There are many challenges in the supplier onboarding process:


    1. The involved finance team do not have a history of suppliers information from
    the entire supply chain.


    2. Only the persons of contact of a business have direct contact with the new
    supplier.


    3. The supplier onboarding process lacks transparency.


    A blockchain-enabled supply chain can dramatically streamline this process. It
    can reduce the duration from 30 days to 2–5 days. The operational cost of onboarding
    can be reduced by around 50%.


    In traditional industries, supply chain models exist in several sectors: food
    supply chains, automobile sectors, manufacturing sectors, textile supply chains,
    energy, IT, electronics, and chemical. Next, we will discuss blockchain use cases
    in food supply chain industries.'
