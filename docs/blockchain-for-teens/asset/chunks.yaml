  trans: '

    ### 编译合约


    正如我们在 EVM 部分所学，智能合约在部署到区块链之前需要被编译成`Bytecode`。在此步骤中，我们将编译我们的`HelloWorld`智能合约。


    `Remix IDE` 允许我们直接从浏览器编译 Solidity 智能合约。点击导航栏中的编译器图标。在 Solidity 编译器页面上，选择`0.8.15`编译器版本；点击编译按钮编译`HelloWorld`智能合约。如果编译成功，您将在导航栏的编译器图标上看到一个绿色对勾。另请注意，编译后会出现带有`应用程序二进制接口（ABI）`和`Bytecode`的编译详情按钮。`ABI`包含
    JSON 格式的数据，这些数据编码了 EVM 能理解的智能合约信息，并为 Dapp 与合约交互提供了标准方式。您可以点击该按钮查看编译详情，如图 5-10
    所示。结果将包含`Bytecode`、`Abi`、`Assembly (Opcode)`以及其他有用的已编译合约信息。您应将`abi`内容复制到某处；我们将在
    Dapp 部分使用这个`abi`字符串来调用智能合约。


    ![](img/535492_1_En_5_Fig10_HTML.png)


    “Hello World”合约的快照，各个部分标记为：字节码、ABI、存储布局、Web3 部署、元数据哈希、函数哈希、Gas 估算、开发者文档、用户文档、运行时字节码和汇编。


    **图 5-10** 已编译的 HelloWorld 合约


    ### 部署并运行合约


    要部署我们的合约，请点击左侧菜单中的“部署并运行交易”模块。您会看到一个下拉菜单，列出“合约”标题下的所有可用智能合约，即`HelloWorld`。`HelloWorld.sol`将是默认选中的合约，其正下方有一个橙色的`Deploy`按钮。


    ![](img/535492_1_En_5_Fig11_HTML.png)


    部署并运行交易界面的截图，右侧显示 Hello World 代码。左侧展示了选择环境、账户、Gas 上限、金额和合约的选项。


    **图 5-11** HelloWorld 合约部署


    到目前为止，合约尚未部署。因此，要部署`HelloWorld`，我们需要在`Deploy`按钮旁边提供字符串`initMessage`。


    我们可以保留`Environment`为默认选中的`JavaScript VM`、默认选中的账户、`Gas limit`和`value`。让我们输入`Hello
    Solidity`并点击`Deploy`按钮。


    ![](img/535492_1_En_5_Fig12_HTML.png)


    一个标注为“部署并运行交易”的界面截图，左侧展示了 Hello World 合约输入项和已部署的合约，右侧展示了代码。


    **图 5-12** 已部署的 HelloWorld 合约


    内置终端控制台显示了部署信息。默认账户的金额因少量 Gas 费用（即交易费）而减少，从`100.00000 ETH`变为`99.99999 ETH`。


    在“已部署合约”面板下，您将看到已部署的`HelloWorld`合约及其合约地址。


    如果您展开已部署的`HelloWorld`合约条目，它将显示智能合约中所有定义为`public`的合约项——状态变量或函数。


    在我们的示例中，我们可以看到`update`、`getMessage`函数以及`message`变量。


    当您点击`message`按钮时，您应该会看到`message`按钮下方显示`"Hello Solidity"`。当您点击`getMessage`按钮时，也会出现同样的情况。


    ![](img/535492_1_En_5_Fig13_HTML.jpg)


    一个标注为“已部署合约”的截图，展示了已部署到合约的 Hello World 消息部分。


    **图 5-13** 调用 HelloWorld 合约消息


    要更改消息，请为`update`函数输入`"Hello Ethereum"`，然后点击按钮设置新值。


    您可以通过点击`getMessage`函数或`message`变量来验证`message`变量是否已更新。


    ![](img/535492_1_En_5_Fig14_HTML.jpg)


    Hello World 消息已更新的截图。新消息是 hello ethereum。


    **图 5-14** 更新 HelloWorld 合约消息


    恭喜！您已成功用 Solidity 编写了您的第一个 Hello World 智能合约，并将其部署到了区块链上。要了解更多关于 Solidity 的信息，您可以访问
    Solidity 官方文档（`https://docs.soliditylang.org/en/v0.8.15/contracts.xhtml`）。

    '
- fmt: '# Taking Control of Your First Ethereum Wallet


    In Remix, when we use Injected Provider, `Metamask` is one of the most widely
    used wallet providers. `MetaMask` was founded in 2016 by Aaron Davis and Daniel
    Finlay and is currently owned by ConsenSys. As of March 2022, `Metamask` has over
    30 million monthly active users. As a free browser extension for Chrome, Firefox,
    Brave, and Edge, `MetaMask` allows your regular browser to behave as a web3 browser
    for storing and exchanging cryptocurrencies, as well as interacting with Ethereum
    Dapps without running an Ethereum node. Simply put, `MetaMask` is a mobile crypto
    wallet you can access in your browser. To manage `Metamask` access, the user needs
    only a password and a 12-word recovery phrase, also known as a seed phrase. The
    seed phrase can be made up of any real words, such as dog, cat, or chicken.


    If you forget or lose wallet recovery phrase, there is no way to recover your
    crypto wallet password. It is very important that you back up these seed phrase
    in a safe and secure place, maybe a hard disk, USB drive, or paper. Don''t store
    it where it''ll be vulnerable, like an email, online storage, etc.


    `MetaMask` may not be the best place to store large amounts of crypto or valuable
    crypto assets, such as NFTs. When connecting to the mainnet for trading, use `MetaMask`
    as the only tab in that browser and avoid connecting to social media accounts
    in the same browser—some social media sites have plugins that can steal your data.


    Install `MetaMask` from [`https://metamask.io`](https://metamask.io). Then download
    the `MetaMask` wallet software onto your chosen browser. Select the "Create a
    Wallet" option, read the terms and conditions, and create a password. Once installed,
    you will see a fox on the top right of your browser. Open `MetaMask`, enable the
    test network, or testnet, by clicking Settings ➤ Advanced ➤ Show test networks
    and select on button for "Select this to show test networks in network list."
    Transactions on a testnet are meant to only simulate mainnet transactions, or
    real blockchain transactions.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig15_HTML.png)


    A screenshot of the meta mask interface with a settings page. The option advanced
    settings is selected and the options are labeled as storage logs, sync with mobile,
    reset account, advanced gas controls, show hex data and networks.


    **Figure 5-15** – Update `Metamask` setting for testnet


    Now you can switch to the Goerli test network from `MetaMask`''s network list
    settings.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig16_HTML.jpg)


    A screenshot of the goerli test networks adding new network.


    **Figure 5-16** – Connect `Metamask` with Goerli test network


    You will see there is default account in account 1 without any ether.


    We will get some free test ether from the Goerli test network. Copy account 1
    Ethereum address and use one of Goerli Testnet Faucet to get the ether through
    your Ethereum account address:


    - Official Goerli Testnet Faucet: [`https://goerli-faucet.slock.it/`](https://goerli-faucet.slock.it/)

    - Starknet Faucet: [`https://faucet.goerli.starknet.io/`](https://faucet.goerli.starknet.io/)

    - Goerlifaucet: [`https://goerlifaucet.com/`](https://goerlifaucet.com/)


