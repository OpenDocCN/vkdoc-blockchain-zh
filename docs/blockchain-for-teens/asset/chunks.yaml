- fmt: "与中心化在线服务提供商不同，去中心化世界让用户完全控制自己的交易和数据。每个成员在决策时拥有平等权力。系统接收来自个体参与者的决策，并利用[加密](https://101blockchains.com/what-is-consensus-algorithm/)共识方法（我们稍后会探讨）来做出决定。没有单一的权威机构来接收和响应请求；即使某些个体不参与决策，系统依然能够运行。\n\
    \n表[1-1](#535492_1_En_1_Chapter.xhtml#Tab1)提供了中心化与去中心化的对比。\n\n**表 1-1**\n**中心化与去中心化对比**\n\
    \n|  | 中心化 | 去中心化 | 说明 |\n| --- | --- | --- | --- |\n| 单点故障 | 是 | 否 | 区块链网络是点对点的，每个节点都拥有区块链数据的完整副本。因此，当发生故障时，数据永远不会丢失。\
    \ |\n| 谁在控制？ | 中心化权威 | 用户 | 没有中心化权威来控制区块链网络。 |\n\n现在我们理解了中心化与去中心化的区别。但区块链到底是什么呢？\n\
    \n在一个名为“贝壳岛”的古老岛屿上，人们为了获取所需或想要的资源而频繁地进行物物交换。起初，岛民们互相信任，只交换贝壳和食物；这在一段时间内运行良好。过了一段时间，岛民们开始交易更精致的商品，如珠宝、衣服和工具。随着交易变得更加频繁和复杂，追踪它们变得困难。例如，有人每天与20个人交易，但和每个人交易的东西都不同。为了解决这个问题，岛上的首领雇佣了一个值得信赖的“中间人”来记录所有交易，以保证公平和可审计；这在一段时间内也运行良好。然而，这位“中间人”开始为自己的工作收取额外费用，甚至开始接受贿赂。随着大量不公平交易的发生，腐败在岛上蔓延，没有人再信任这个“中间人”。交易减少，商业活动也随之放缓。为了帮助人们再次公平交易，岛上的首领解雇了“中间人”，并同意用更高效的方案取而代之。在岛中心有一块巨大的岩石，岛上的每个人都能清楚地看到它。首领们提出，岛民们可以在交易完成并证明后，将每一笔交易信息按顺序永久地标记在这块岩石上，这使得系统具有可验证性。这块岩石对所有人开放，因此岛上的任何人都可以查看和验证这些交易，这意味着系统是透明的。如果任何记录不匹配，岛民们可以投票来验证该记录，这赋予了每个人平等的参与权。岛民们也不需要为了这个系统的运转而互相信任；他们只需要去看看岩石上的记录，而不用依赖“中间人”，这使得系统无需信任。岛民们同意遵守首领们提出的这些规则，从此以后，每个人都迎来了幸福的结局，公平交易成为了可能。\n\
    \n与贝壳岛的交易系统类似，区块链是一个去中心化的点对点网络。在区块链网络中，参与者可以在无需中心化权威机构的情况下提交和确认交易。一旦交易数据保存在网络中，它就是不可变的，或者说无法被更改。成员或网络节点可以在网络上直接相互交互，无需中心化权威或中间人干预交易过程。\n\
    \n区块链也被称为分布式账本技术（`DLT`）。`DLT`允许所有数据在跨多个实体或位置（称为节点）的计算机网络之间共享。每个节点都保存一份相同的区块链账本数据。\n\
    \n区块链具有以下关键特征：\n\n1.  **去中心化**  \n    正如我们所了解的，区块链的去中心化意味着将中心化权力分配给区块链网络中的所有参与用户，这消除了单点故障。它通常存在于点对点网络中。\n\
    \n2.  **共识协议**  \n    分布式共识是任何区块链网络的关键组成部分。所有网络参与者必须达成共同协议，才能将交易记录添加到区块链中。这使得区块链能够呈现交易的单一版本。共识协议有很多种，包括：\n\
    \    *   工作量证明（`PoW`）\n    *   权益证明（`PoS`）\n    *   实用拜占庭容错（`PBFT`）\n    *   委托权益证明（`DPoS`）\n\
    \    *   过去时间证明（`PoET`）\n    *   权威证明（`PoA`）\n    *   以及更多……\n\n    我们将在后面的章节中讨论其中一些共识协议。\n\
    \n3.  **不可篡改性**  \n    区块链的不可篡改性意味着，一旦数据被记录到区块链中，就无法操纵、更改或删除数据。区块链数据将永远保留在那里。\n\
    \n4.  **透明性**  \n    所有区块链交易都可由任何一方或个人公开查看，这创造了透明性。\n\n5.  **安全性**  \n    由于区块链的不可篡改性和去中心化特性消除了单点故障，区块链中的记录无法被篡改。这使得区块链数据极其安全。当用户从区块链钱包转移资金时，交易会由其钱包的私钥进行加密签名。我们将在第[2](#535492_1_En_2_Chapter.xhtml)章中解释这一点。\n\
    \n图[1-3](#535492_1_En_1_Chapter.xhtml#Fig3)展示了区块链的关键特征。\n\n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig3_HTML.png)\n\
    \n一个带有标注特征的区块链流程图。标注的链条流向包括：去中心化、不可篡改性、安全性、透明性和共识。\n\n**图 1-3**\n**区块链关键特征**\n\
    \n现在我们对区块链的概念有了相当的理解，接下来我们将看看区块链是如何工作的。"
