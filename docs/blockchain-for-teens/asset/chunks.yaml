- fmt: '# ERC-20


    `ERC-20` is the most popular Ethereum token standard and was proposed on November
    19, 2015 by Fabian Vogelsteller. Most ICOs (Initial Coin Offering) that have issued
    their tokens on the Ethereum platform or EVM-based blockchain (like Binance) are
    `ERC-20` tokens. The ICO is cryptocurrency version of the IPO (initial public
    offering), which is used in the stock market to raise capital or participate in
    investment opportunities. There are around 508k `ERC-20` tokens in the Ethereum
    mainnet on March 2022. The total market cap of all `ERC-20` tokens is around $18.7
    billion, and there are more than 160K `ERC-20` in Binance.


    `20` is a unique identification number to distinguish the `ERC-20` standard from
    others.


    The `ERC-20` token has several optional fields such as `name` and `symbol` and
    defines the following rules in the smart contract:


    ```

    contract ERC20Interface {

    function totalSupply() public view returns (uint);

    function balanceOf(address tokenOwner) public view returns (uint balance);

    function allowance(address tokenOwner, address spender) public view returns (uint
    remaining);

    function transfer(address to, uint tokens) public returns (bool success);

    function approve(address spender, uint tokens) public returns (bool success);

    function transferFrom(address from, address to, uint tokens) public returns (bool
    success);

    event Transfer(address indexed from, address indexed to, uint tokens);

    event Approval(address indexed tokenOwner, address indexed spender, uint tokens);

    }

    ```


    `totalSupply()`: Gets the total number of token supply.


    `balanceOf()`: Gets the account balance for the specified address.


    `allowance()`: Returns the amount of tokens which the `spender` is allowed to
    withdraw from the `owner`.


    `transfer()`: Transfer the balance from the owner’s account to another specified
    address and must fire the `Transfer` event.


    `transferFrom()`: Send the amount of tokens from address `from` to address `to`.
    The `transferFrom` method is used for a withdraw workflow, allowing contracts
    to transfer tokens on your behalf.


    `approve()`: Allows `spender` to withdraw the specified amount of tokens from
    your account multiple times.


    If you ever find yourself working on a project that requires creating and deploying
    an `ERC-20` token, you can create a smart contract by implementing these `ERC-20`
    functions. Here is a simple example:


    ```

    MyToken is ERC20 {

    // implement the functions required by ERC20 interface standard

    // other functions...

    }

    ```


    In Etherscan, you can find many `ERC-20`-compliant tokens that have been deployed
    mainnet. Here is a real-world example of an `ERC-20` token transaction on the
    Etherscan.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig37_HTML.png)


    A screenshot of an interface labeled token kucoin token highlighting an overview,
    profile summary and transfer information with 34, 718 transactions found marked
    as transfer and transfer from.


    **Figure 5-37** ERC-20 example


    The screenshot shows the amount of `ERC-20` tokens being transferred from one
    address to another address by the `transfer` or `transferFrom` method.


    In `ERC-20` token, tokens are fungible, meaning that each token has exactly the
    same type and value as another token. If you swap one `ERC-20` for another, there
    will be no difference in authenticity or value; they are interchangeable and represent
    a single entity.


    For example, Tether (USDT) is an `ERC-20` Token. It is a stablecoin—a crypto asset
    value pegged to the US dollar at a 1 to 1 ratio and 100% backed by Tether’s equivalent
    reserves. These reserves are a mix of assets, including cash. USDT is similar
    to the ETH, meaning that 1 Token is and will always be equal to all the other
    USDT Tokens. They are the same type, represent the US dollar, and are mutually
    interchangeable. USDT is also divisible, which can be broken down into smaller
    units like cents.


    So fungible tokens have the following properties: interchangeable, uniform, and
    divisible.


    Next let’s talk about tokens that are not mutually interchangeable or, in other
    words, nonfungible.


    # ERC-721


    All `ERC-20` tokens (like USDT) are identical and provide the same value. So what
    matters is how many tokens you own in the wallet, not their individual identities.
    Nonfungible tokens (NFTs) can be uniquely identified; they are assets whose data
    is stored on blockchain networks. NFTs are not interchangeable with other NFTs
    because they are unique. Think of a unique work of art created by an artist, luxury
    brands item from fashion companies, and different videos.


    `ERC-721` is a standard interface for nonfungible tokens, also known as deeds,
    and is available at [`https://eips.ethereum.org/EIPS/eip-721`](https://eips.ethereum.org/EIPS/eip-721).
    The proposal for the creation of this new standard was created in Jan 2018, proposed
    by William Entriken, Dieter Shirley, Jacob Evans, and Nastassia Sachs. According
    to a Bloomberg report, NFT Market surpassed $40 Billion in 2021 and over $37 billion
    in NFT marketplaces in 2022 on May 1.


    Similar to the `ERC-20` token standard, the `ERC-721` specification provides details
    and defines functions and events that a derived contract should implement to develop
    an NFT, shown in the following code block:


    ```

    interface ERC721 {

    event Transfer(address indexed _from, address indexed _to, uint256 indexed _tokenId);

    event Approval(address indexed _owner, address indexed _approved, uint256 indexed
    _tokenId);

    event ApprovalForAll(address indexed _owner, address indexed _operator, bool _approved);

    function balanceOf(address _owner) external view returns (uint256);

    function ownerOf(uint256 _tokenId) external view returns (address);

    function safeTransferFrom(address _from, address _to, uint256 _tokenId, bytes
    data) external payable;

    function safeTransferFrom(address _from, address _to, uint256 _tokenId) external
    payable;

    function transferFrom(address _from, address _to, uint256 _tokenId) external payable;

    function approve(address _approved, uint256 _tokenId) external payable;

    function setApprovalForAll(address _operator, bool _approved) external;

    function getApproved(uint256 _tokenId) external view returns (address);

    function isApprovedForAll(address _owner, address _operator) external view returns
    (bool);

    }

    ```


    `balanceOf`: Gets the account balance for the specified address.


    `ownerOf`: The function returns the unique address of the owner of a token based
    on the provided `_tokenId`.


    `safeTransferFrom`: Transfers the ownership of an NFT from one address to another
    address. It is required that `msg.sender` is the current owner, an authorized
    operator, or the approved address for this NFT.


    `transferFrom()`: Send the amount of tokens from address `_from` to address `_to`.
    The `transferFrom` method is used for a withdraw workflow, allowing contracts
    to transfer tokens on your behalf.


    `approve()`: Allows `spender` to withdraw the specified amount of tokens from
    your account multiple times.


    `setApprovalForAll`: Assign or revoke approval rights for the given operator to
    manage all of `msg.sender`’s assets.


    `getApproved`: Get the approved address for a single NFT


    `isApprovedForAll`: Check if the given operator address has access right to operate
    for the given owner’s tokens.


    The most known example of `ERC-721` is the CryptoKitties game, the first NFT token.
    In the game, there are thousands of CryptoKittie. Each cat has their own profile,
    which includes unique genes, name, color, shape, price, and other profiles. The
    game player can collect and breed adorable kittens. As shown in Figure 5-38, each
    cryptoKittie as a collectible digital asset can be traded, sold, and bought by
    the player:


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig38_HTML.png)


    A screenshot of an animated cat and a label marked as kitty hash 1111 with information
    like owner, born, generation, block number, block hash, official profile, and
    attributes. On the lower side information is displayed under the label genes.


    **Figure 5-38** ERC-721 CryptoKitties example'
