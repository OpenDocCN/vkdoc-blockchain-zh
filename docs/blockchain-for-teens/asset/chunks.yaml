- fmt: '# Decentralized Lending and Borrowing


    A DeFi lending and borrowing protocol are similar to a traditional lending platform.
    The lending protocol enables lenders to lend their assets to borrowers, and borrowers
    return assets with extra interest fees to lenders. DeFi protocols run on the blockchain,
    eliminating the need for third-party involvement, and lenders and borrowers are
    anonymous.


    Because crypto market volatility can suddenly cause collateral assets to drop
    in value, borrowers often must over-collateralize their loans for credit enhancement,
    reducing lenders’ risk. As we have seen in the previous section on stablecoins,
    DAI works by creating a Maker Vault that locks over-collateralized value against
    volatility. Borrowers typically need to put 150% of their collateral against the
    ratio at all times in order to avoid failing to make payments.


    Here is a list of a few most popular DeFi lending and borrowing platforms: Aave,
    Maker, and Compound.


    We have discussed the Maker protocol in the stablecoin section. In this section,
    we will explore Aave lending and borrowing.


    ## An Overview of the DeFi Lending Platform—Aave


    Aave is a DeFi money market protocol that allows users to lend and borrow cryptocurrencies
    with both variable and stable interest rates without using an intermediary. In
    2017, the original version of Aave was launched as ETHLend. In 2020, ETHLend rebranded
    to become Aave.


    ### Aave Tokens


    Aave has two tokens, the `AAVE` token, and the `aToken`.


    #### AAVE


    The native token in the Aave lending protocol is `AAVE`, a governance token. Like
    Maker’s governance token, `AAVE` allows holders to vote on proposals submitted
    by the Aave community.


    #### aToken


    The `aToken` represents the number of crypto assets supplied or borrowed with
    interest. The value of `aToken` is pegged to the value of the corresponding supplied
    asset at a 1:1 ratio.


    As the Aave liquidity pool continues to grow, the accumulated interest of `aTokens`
    will increase. `aToken` holders can claim the staking reward directly to their
    same wallet address or redirect their interest payments to another Ethereum address.


    For example, Alice provides one `aETH` token supply with 5% APY (annual percentage
    yield). Assume 1 ETH is $2000. The total asset is worth $2000. After Alice held
    her `aETH` token for a year, she redeems all of her `aETH`, assuming the 1 ETH
    is $3000. The value of `aETH` will be `1 + 1 * 0.05 = 1.05 ETH`, convert to dollar
    will be `1.05 * 3000 = $3150`. The return on the investment gain will be 57.5%.


    When a lender supplies crypto assets in the liquidity pool, Aave lending pool
    will mint `aTokens` to user accounts. When the lender decides to withdraw their
    assets, `aToken` contract will call `redeem()` function with a calculated interest
    rate, return assets to the lender, and burn the related `aTokens`. The `aToken`
    contract redemption process is illustrated in Figure [8-16](#535492_1_En_8_Chapter.xhtml#Fig16).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig16_HTML.png)


    A decision-making diagram of tokens in A A V X smart contracts depicts the token
    contract redemption process in blocks, the `redeem` function calculated at an
    interest rate, and finally the token transfer of asset to the user.


    **Figure 8-16** – Redeem an `aTokens` in AAVX Smart Contracts


    ### How to Deposit on Aave


    **Step 1** – Go to the Aave website: [`https://aave.com/`](https://aave.com/).
    Click on the launch app button. Then select and connect your wallet to the Aave
    platform. In our following step-by-step guild, we will use the `USDT` token. You
    can purchase `USDT` from popular crypto exchanges.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figaf_HTML.png)


    A set of two screens display the connect wallet page in the Aave platform. It
    includes browser wallet, Coinbase options, etcetera. The Ethereum market page
    is presented with assets to supply, and assets to borrow options.


    **Step 2** – Click on the `USDT` Supply button in the “asset to supply” Panel.
    A popup will ask you to enter the amount to supply. In our example, we use 10
    USDT. The Transaction overview section will give you Supply APY information, which
    is 1.24% for this supply example. Click “approve to continue” button. Confirm
    the Metamask transaction confirmation.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figag_HTML.png)


    A set of two screens display the Ethereum market page presented with supply `USDT`
    details. 1. The supply `USDT` popup has an amount 10 entered in it, and approve
    to continue button. 2. Supply `USDT` preview page with Metamask notification to
    confirm.


    **Step 3** – Once the supply gets approved, “Supply USDT” button will be enabled.
    Click on it once the transaction is completed. An “All done” confirmation window
    will show up. Next, you will be asked to add `aToken`—`aUSDT` to your wallet.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figah_HTML.png)


    A set of two screens of Ethereum market. 1. It displays the supply `USDT` popup
    presented with all details, and the supply `USDT` option is enabled. 2. All done
    confirmation window, with some other details is presented.


    **Step 4** – Add the `aUSDT` token to your wallet.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figai_HTML.png)


    A set of two screens. 1. The Metamask notification page is displayed, along with
    the options to add suggested tokens, and the all done popup with add to wallet
    details and ok close button. 2. Assets are highlighted with `USDT` details in
    Ethereum Mainnet.


    **Step 5** – Close the “all done” window and return to the dashboard. The dashboard
    will show the supplied `USDT` information under the “your supplies” section. A
    withdraw button is enabled for supplied `USDT` assets:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figaj_HTML.png)


    A screen displays the dashboard with `USDT` information under your supplies and
    assets to supply section. A withdraw button is enabled for supplied `USDT` assets.
    A supply button is enabled for assets to supply.


    ### How to Withdraw on Aave


    **Step 1** – Continue with the above process. Next, click on Withdraw button from
    supplied `USDT` asset. Withdraw window will pop up. Enter the amount you want
    to withdraw. Then click on “Withdraw USDT” button. Confirm the Metamask transaction.


    **Step 2** – Once the transaction has completed, close the “all done” window and
    return to the dashboard. The dashboard will show updated `USDT` information:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figak_HTML.png)


    Three screens display the steps to withdraw on Aave. 1. The withdraw `USDT` window
    with the amount entered in the amount column, and the withdraw button is chosen.
    2. The withdraw `USDT` popup, and Metamask notification with confirmation. 3.
    The all done window with ok close button.'
