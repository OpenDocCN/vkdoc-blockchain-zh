  trans: "\n### 推导以太坊地址\n\n到目前为止，我们已经学习了密码学知识。现在，是时候进行一些实践，将所学知识应用到生成以太坊地址上。我们将使用多个在线工具来完成这个练习。当然，如果你找到了更好的工具，也可以选择不同的工具，甚至可以编写代码来实现相同的结果：\n\
    \n1.  创建一个随机私钥，并使用椭圆曲线（`secp256k1`）从该私钥推导出公钥。\n\n    私钥长度为 64 个十六进制字符（32 字节）。\n\
    \n    这里我们使用在线工具（[`​kjur.​github.​io/​jsrsasign/​sample/​sample-ecdsa.​html`](https://kjur.github.io/jsrsasign/sample/sample-ecdsa.xhtml)）来获取一对公私钥。生成的公私钥对如图\
    \ 2-19 所示。\n\n    ![](img/535492_1_En_2_Fig19_HTML.jpg)\n\n    一个算法展示了所选椭圆曲线名称支持的椭圆曲线，并生成了密钥对。该过程生成了两个密钥：EC\
    \ 私钥和 EC 公钥。\n\n    **图 2-19** 椭圆曲线生成公私钥\n\n    私钥： `8c2b80899dd44981d7f8b38c1f5b13dbf1fbb98c360d9d1cfd63a3aed0d7b498`\n\
    \n    公钥： `04502fa444861915b6a258c3daa2beaa41c9b912e6fd6cd526fa179c60362f602bd75e36cfe1513a1e460ca646476e54fab08aa42730068326ab0a8a2e57d2829b`\n\
    \n2.  从以下公钥推导出地址：\n\n    从公钥（128 个字符）开始，对公钥应用 `Keccak-256` 哈希。它将生成一个长度为 64 个字符（32\
    \ 字节）的字符串。让我们使用 `Keccak-256` 在线工具（[`​emn178.​github.​io/​online-tools/​keccak_​256.​html`](https://emn178.github.io/online-tools/keccak_256.xhtml)）查看哈希结果（见图\
    \ 2-20）。\n\n    ![](img/535492_1_En_2_Fig20_HTML.png)\n\n    两个算法展示了地址和 `Keccak-256`\
    \ 在线哈希函数的推导过程。标记的键分别是输入类型、哈希和自动更新。\n\n    **图 2-20** `Keccak-256` 哈希公钥示例\n\n \
    \   结果是 `db97247835ec1f9d0bd8b6ed***6a6d125cf3029f4ccbe72cc1b1a4c7a8c72467a3***`\n\
    \n3.  获取以太坊地址\n\n    取生成的哈希值的最后 20 个字节（40 个字符），并添加前缀 `0x` 以得到以太坊地址。`0x` 让其他人知道该地址是十六进制格式。加上\
    \ `0x` 前缀后，它变为 42 个字符长。因此，在我们的示例中，以太坊地址是\n\n    `0x6a6d125cf3029f4ccbe72cc1b1a4c7a8c72467a3`\n\
    \n4.  验证以太坊地址\n\n    我们使用一个在线以太坊地址验证工具（[`www.rfctools.com/ethereum-address-validator/`](http://www.rfctools.com/ethereum-address-validator/)）来验证我们新生成的以太坊地址。\n\
    \n    ![](img/535492_1_En_2_Fig21_HTML.png)\n\n    一个有效的以太坊地址验证器的截图。标记的 RFC 工具包括加密货币工具、4\
    \ 步工具、图像工具、JSON 工具和 HTML 工具。\n\n    **图 2-21** 验证生成的以太坊地址\n\n恭喜！我们刚刚利用密码学知识生成了一个有效的以太坊地址。通过这部分内容，你应该对区块链密码学的工作原理有了良好的理解。\n\
    \n### 本章小结\n\n密码学是保障区块链技术安全的重要机制。它用于保护区块链的共识机制、保障区块链数据安全、确保用户账户安全等。本章的主要目的是通过快速概述密码学的工作方式，让你对其有更透彻的理解。\n\
    \n尽管本章仅触及密码学技术的表面，但它将帮助你丰富对称密钥密码学和非对称密钥密码学的知识。更重要的是，我们现在知道了数字签名是如何工作的。我们介绍了哈希算法，并逐步讲解了椭圆曲线密码学来理解其工作原理。最后，我们学习了如何生成一个以太坊地址。\n\
    \n我们将继续我们的旅程，在下一章学习未来的货币——比特币。\n\n脚注 1 2\n\n## 比特币：未来的货币\n\n从发明硬币作为支付方式的古吕底亚人，到中国的第一张纸币，货币和支付已经经历了几个世纪的演变。2008\
    \ 年，一个化名为中本聪的匿名人士或团体发表了一篇题为《比特币：一种点对点的电子现金系统》的白皮书。自此，比特币（BTC）开启了去中心化数字货币和区块链技术的新纪元。因此，数字货币近年来人气爆棚。目前约有\
    \ 20,000 种加密货币，总市值接近 1.2 万亿美元。作为最早且最有价值的加密货币，比特币占据了整个加密货币市场约 45%的份额。第二大加密货币是以太坊，其市值占比为\
    \ 16%。比特币的价格多年来一直波动，但长期来看总体呈上涨趋势。2021 年 11 月，比特币达到了历史最高价 68,789.63 美元。\n\n作为一种新的支付技术发明，比特币是一种稀缺资源，因为区块链上总共只能挖出\
    \ 2100 万个比特币。这种稀缺性，加上供需等其他因素，赋予了比特币价值，并且比特币将继续作为所有加密货币中的数字黄金。\n\n前面的章节是介绍区块链基础知识的绝佳起点，我们涵盖了许多基本概念，如密码学、工作量证明共识算法以及区块链的工作原理。在本章中，我们将继续探索比特币。我们将涵盖以下具体主题：\n\
    \n*   比特币历史\n\n*   了解比特币\n\n*   交易\n\n*   闪电网络\n\n### 比特币历史\n\n截至 2022 年 7 月，比特币拥有超过\
    \ 1.06 亿持有者，每日确认的活跃交易量为 19.9 万笔。大约有 3400 万美国成年人和全球 10%的人口持有加密货币。近年来，加密货币的普及度飞速增长。然而，如果要说一种你必须首先了解的加密货币，那就是比特币，大多数人在谈论数字货币时通常指的就是它。作为世界上第一种加密货币，比特币并非首个试图创建全新数字货币金融体系的项目。在其诞生之前，许多项目都曾尝试构建数字货币和/或电子支付系统。其中，DigiCash\
    \ 和 HashCash 这两个项目对比特币的启发最大。\n"
- fmt: '### Early Attempts


    David Chaum published a paper called *Blind Signatures for Untraceable Payments*
    in CRYPTO 1982. Blind signature described how to protect digital cash users’ privacy
    using a new type of digital signature.


    To illustrate this blind signature process, David uses an electronic voting system
    as an example to show that an election voting center should verify all ballots.


    The voter’s selection privacy message must be protected during the verification
    process. No one except the voter knows his/her choice. The blind signature process
    is described as follows:


    1. The voter fills a completed anonymous blinded ballot into a carbon paper-lined
    envelope with the voter’s identification preprinted on the outside.

    2. Officials verify the documents’ credentials.

    3. Officials sign the blinded ballot without knowing the message’s content.

    4. Once the ballot is signed, the envelope is returned to the voter.

    5. The voter places the signed ballot into a new, unmarked, plain envelope.

    6. This way, the voter’s anonymity and privacy can be preserved.


    The process flow is presented in Figure [3-1](#535492_1_En_3_Chapter.xhtml#Fig1).


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig1_HTML.png)


    A diagram depicts 6 voting steps. Authentication with blinded vote, verify credential
    with blinded vote, signed on blinded vote, unblind vote, vote, and verify vote.


    **Figure 3-1** Blind signature example


    Seven years later, David Chaum launched a company, DigiCash, in Amsterdam. Digital
    cash, also called DigiCash, eCash, or EMoney, is the first digital, anonymous
    currency. In 1994, DigiCash proved that small payments could be sent across the
    Internet. Unfortunately, David Chaum and his company had many problems that led
    to the company filing for bankruptcy in 1998 and the end of their revolutionary
    *eCash*.


    As the Internet became more popular in the 1990s, many companies quickly recognized
    it as an excellent advertising tool. Even in later 1997, email spam was already
    becoming a serious concern to anyone with an email account. Anyone can send tens
    of millions of emails at almost no cost, and ad companies can use bulk email software
    to send a large number of emails every day. Email bombs, a denial-of-service attack
    (DoS) against an email server, started in the late 1990s and often cause network
    downtime.


    Adam Back created HashCash in 1997 and used proof-of-work (PoW) algorithms to
    prevent email spam and DoS attacks. It has a crucial influence on Bitcoin and
    is used in Bitcoin for transactions. In the Bitcoin white paper, Satoshi cited
    the HashCash system as a reference for the proof-of-work implementation in Bitcoin:


    > *To implement a distributed timestamp server on a peer-to-peer basis, we will
    need to use a proof-of-work system similar to Adam Back’s HashCash rather than
    newspaper or Usenet posts.*


    HashCash’s proof-of-work is relatively straightforward.


    First, the email server selects a difficulty level to specify how hard the PoW
    must be. The proof-of-work in HashCash-enabled SHA-1 hash digest starts with default
    20 zeros in binary.


    `SHA-1` is a cryptographic hash function that takes input and produces a 160-bit
    value. There are a total of possible `2^(160)` hash values. If we make the first
    30 bit 0, the sender has to try `2^(30)` different binary counters to find a hash
    with 30 leading zero bits. The more leading zero bit, the more difficult it is
    to find valid hash doubles, and it will take more time to solve.


    A single leading zero in hexadecimal is the same as four 0s in binary. We can
    use the online SHA-1 tool and a brute force approach to generate a single leading
    zero with `"Hashcash!"`. We start once from 0. Here is the result by trying different
    inputs.


    **Table 3-1** Generate a single leading zero in hexadecimal


    | Hexadecimal Value | Input Text |

    | --- | --- |

    | `64a0565c8ef97e847d444c6961086c2ccdad9052` | `Hashcash!00` |

    | `6e7072540d426f7bdc3d589dfd73aeac0e3050a9` | `Hashcash!01` |

    | `0e4895d7a9ef022e313d72a1c5636e51a2f8dca` | `Hashcash!02` |

    | `cf4d1b9d11cef8f1067e6e43b5593439fb412df9` | `Hashcash!03` |

    | `e2185e4362440d1a9f41f58f50032097f195aeb1` | `Hashcash!04` |

    | `05e82b6afcf3f6a4a81ba01cf9c6e44c2e16e244` | `Hashcash!05` |


    As we can see, we need to try six times to guess just one single leading zero.
    Imagining default at 20 and leading 0 at 5 (`2⁵`) require much more work.


    To solve this PoW, the sender needs to keep trying different inputs until they
    figure out the HashCash header with correct leading 0s. The sender can then send
    an email to a recipient.


    When a recipient receives an email, it first checks its valid HashCash header
    containing the required number of leading zero bits. The recipient only needs
    to compute the hash once and then save it to the database. When a new email is
    received, it just needs to compare the database’s previous header version. So,
    it takes much less time to verify a stamp than to find a valid one. If email verification
    fails, it will move to the spam folder.


    ### The Financial Crisis of 2008


    During the late 1990s and early 2000s, the American economy had strong and steady
    economic growth, a low unemployment rate, and a surging stock market. It was fueled
    by rapid technological changes and low central bank federal interest rates from
    6.5 to 1.75.


    The significant decrease in federal interest rates enabled banks and lending institutions
    to offer consumer credit at a lower price. Many creative lending products like
    subprime mortgages increased during this time. Banks and lending institutions
    offer low-interest rate mortgages to many homeowners with poor credit history,
    few assets, uncertain income, or other factors that negate them from receiving
    a traditional mortgage.


    With these high-risk (subprime) loans flooding in, lenders could then easily obtain
    the mortgages with all the risk, jeopardizing the entire banking system and global
    economy. With housing prices continuing to soar, subprime mortgages grew to an
    overwhelming degree, a large percentage of mortgages moved into default, and many
    banks and lending institutions began to face financial difficulties. In August
    2007, investment banking giant Lehman brothers’s stock fell sharply with the failure
    of two Bear Stearns hedge funds. In March 2008, Bear Stearns was broke, and six
    months later, Lehman filed for bankruptcy. The crisis led to the Great Recession,
    where housing prices dropped more than 30%, millions of people lost their jobs,
    and approximately 2.5 million businesses were closed. American households suffered
    worse, with an estimated $16 trillion in net worth loss.


    The financial crisis shook people’s faith and trust in the financial system, where
    people stored money with a central authority bank system. A central government
    authority could print more money, so there was no limit to the amount of money
    that the government could print. This will reduce the value of money already in
    circulation in the system. A central bank prints money based on the principles
    of modern monetary theory (MMT). The easy-money policies could sometimes lead
    to unpredictability and uncertainty regarding the decrease in the value of people’s
    money.


    People are starting to think about a new finance system to overcome regular currency
    shortcomings. The new system can demand a currency without depending on the trust
    of third parties, such as a central bank authority.'
