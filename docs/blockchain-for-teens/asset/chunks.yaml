  trans: '

    # 增强现实的工作原理


    我们刚刚讨论过，同步定位与地图构建技术（`SLAM`）在无标记 AR 中扮演着关键角色。`SLAM`通过设备的硬件（如摄像机、GPS 和其他传感器）从室内或室外环境收集数据来追踪设备的位置，然后创建合适的虚拟
    3D 对象。


    `SLAM`技术广泛应用于各个行业，主要包括自动驾驶汽车、机器人和增强虚拟现实。


    一个`SLAM`系统的架构包含两种用于完成`SLAM`的组件。第一种组件是传感器信号处理，包括前端处理，它主要依赖于所使用的传感器。


    第二种组件是位姿图优化，包括与传感器无关的后端处理。


    有两种类型的`SLAM`可用于前端处理以收集数据：视觉`SLAM`和 LiDAR `SLAM`。视觉`SLAM`（`vSLAM`）使用摄像头捕捉或收集周围图像，并通过连续的摄像头帧追踪一组点，而
    LiDAR `SLAM`则利用激光传感器读取数据。


    前端处理将传感器数据抽象成适合估计的模型，而后端则对前端产生的数据进行推理。因此，`SLAM`可以估计它们的 3D 位置以创建地图。`SLAM`过程如图 7-4
    所示。


    ![](img/535492_1_En_7_Fig4_HTML.png)


    该示意图描绘了包含前端和后端的视觉`SLAM`系统。标注的部分依次为：摄像头、激光传感器、传感器数据、`SLAM`估计、抽象与处理传感器数据，以及地图估计。


    **图 7-4** — 视觉`SLAM`系统中的前端和后端


    ## 虚拟现实 (VR)


    “虚拟现实”一词最早出现在 1982 年澳大利亚著名科幻小说作家达米恩·布罗德里克的小说 *《犹大曼陀罗》* 中。


    “虚拟现实”作为 VR 技术在主流媒体中被广泛采用，这归功于 VR 开发者杰伦·拉尼尔——他设计了第一款商业级虚拟现实硬件——以及 1992 年的电影 *《割草者》*，该片向更广泛的受众介绍了虚拟现实系统的使用。


    ### 什么是虚拟现实？


    虚拟现实是一种由计算机生成的环境，能让用户在其周围获得丰富、沉浸的体验。通过佩戴虚拟现实头显或相关应用，VR 通过增加景深来生成计算机 3D 图像和视频。该系统还会重建静态
    2D 图像之间的比例和距离，以模仿真实的视觉体验。VR 让用户能够沉浸于独特的模拟环境中，与之互动并探索，同时相信自己是真实世界中进行这些操作。


    ### VR 的类型


    VR 系统主要分为三类：非沉浸式 VR、半沉浸式 VR 和完全沉浸式 VR，如图 7-5 所示。


    ![](img/535492_1_En_7_Fig5_HTML.png)


    该流程图描绘了虚拟现实的类型。标注的类型包括：非沉浸式 VR、半沉浸式 VR 和完全沉浸式 VR。


    **图 7-5** — VR 的类型


    #### 非沉浸式 VR


    非沉浸式虚拟现实是一种通过计算机或游戏机在屏幕上显示虚拟内容的虚拟现实。它是所有 VR 类型中沉浸感最低且成本最低的。用户通过键盘、鼠标和控制器等计算机输入设备与非沉浸式
    VR 进行交互。


    **示例：** 视频游戏是非沉浸式 VR 体验的一个很好的例子。


    #### 半沉浸式 VR


    半沉浸式虚拟体验为用户提供介于非沉浸式和完全沉浸式 VR 之间的部分虚拟环境。通过使用计算机屏幕或 VR 设备（如眼镜追踪传感器和投影系统），用户可以在虚拟环境中移动，但仍能看到自己。该系统不被视为完全沉浸式模拟器。


    **示例：** 用于飞行员培训的飞行模拟器和虚拟导览是半沉浸式 VR 的良好例子。


    #### 完全沉浸式 VR


    沉浸式 VR 模拟是一种为用户提供最高级别完全沉浸式虚拟体验的技术，并且与现实世界完全隔绝。它允许参与者与由 VR 设备（如 VR 眼镜、手套和身体探测器）生成的立体
    3D 对象进行交互，并建立逼真的虚拟体验。


    **示例：** 虚拟山地自行车是完全沉浸式 VR 的一个例子。玩家佩戴 VR 头显骑乘室内自行车。他们可以在从未去过的地方骑行，获得激动人心的体验，并在虚拟环境中与其他玩家互动。


    ### 虚拟现实如何工作


    真正沉浸式的虚拟现实可以欺骗人的大脑，使其相信它的存在，并将他们带到虚拟世界中的其他地方。然而，生成这些体验的背后涉及许多复杂的技术。


    #### 视场角 (FOV)


    人单眼的近似视场角（`FOV`）水平方向约为 135 度，垂直方向略高于 180 度。人类通常可以看到头部周围 200–220 度的弧线。人类左右眼对同一场景的重叠部分约为
    114 度，我们正是通过这个角度看到 3D 效果。这个`FOV`对于人脑计算深度感知是必要的。在虚拟现实中，`FOV`指的是参与者一次能同时看到周围虚拟世界的多少。VR
    头显的摄像头模拟人眼位置以及人们可以预期的特定`FOV`角度。头显还配备了陀螺仪传感器来追踪你的移动方式，调整你的视野，并让你能够探索 360 度场景。所有这些都将极大地提升完全沉浸式的体验。如今大多数
    VR 头显通常支持 114 度的 3D 视觉空间来呈现虚拟内容。


    ![](img/535492_1_En_7_Fig6_HTML.png)


    该图展示了人类在左、上、右、下不同视角下的虚拟现实视场。


    **图 7-6** — 视场角 (FOV)


    #### 帧率 (FPS)


    帧率/FPS（每秒帧数）定义了图形处理单元（`GPU`）每秒处理图像的速度。帧率与分辨率相关，后者显示了图像随时间变化的细节量。例如，帧率为 50 `FPS`时，你在一秒钟内会看到
    50 个样本。在下一秒中，它会显示另外 50 个样本。假设一个物体随你的视野移动，你每秒只能看到这 50 个样本更新后的位置。在这些快照之间，其他样本对你来说是看不见的。如果将帧率提高到
    500 `FPS`，你每秒钟获得的样本量将增加十倍。结果将是更好的图像质量、更流畅的运动以及更沉浸的体验。较低的帧率通常会产生较差的影响。研究表明，任何低于
    60 `FPS`的帧率都会使用户感到迷失方向、恶心以及其他负面效应。VR 开发者通常以至少 60 `FPS`–90 `FPS`为目标。


    #### 位置与头部追踪


    在沉浸式虚拟环境中，实时追踪用户头显的位置以确定位置和方向至关重要。用户可以在虚拟环境中移动，环境也会随其移动而调整。`SLAM` 在 VR 中广泛用于头部和眼部追踪。


    #### 空间音频与音效


    空间音频提供多维且沉浸式的音频，跟随用户设备的移动而变化。设备密集处理用户的运动数据，生成声音的不同频率，并根据声音可能传来的每个方向进行不同的偏移。其结果创造出一种三维音效，为用户提供模拟真实生活中听声音方式的体验。

    '
- fmt: '### Mixed Reality (MR)


    Mixed reality (MR) is an emergent technology that combines virtual reality (VR)
    and augmented reality (AR). MR merges the physical and virtual worlds to create
    new environments where physical and digital objects can interact in real-time.


    **Example:** MR workstations will no longer be a single or dual physical monitor.
    The workstations will consist of multiple screens as desired in a 3D virtual space.
    The user can define and create an infinite number of customized workstations and
    delete these virtual screens as needed. Such working environments will improve
    efficiency and create a more enjoyable, comfortable, and healthier workplace.


    ### Extended Reality (XR)


    Extended reality (XR) is an umbrella term that covers the full spectrum of real
    and virtual immersive technologies, including VR, AR, and MR. To summarize what
    we have discussed so far for AR, MR, and MR, Table 7-1 displays the difference
    between these immersive technologies.


    **Table 7-1** A comparison Between VR, AR, and MR


    | Augmented reality (AR) | Virtual reality (VR) | Mixed reality (MR) |

    | --- | --- | --- |

    | Virtual digital content overlaid on a real-world environment. | Computer-generated
    immersive virtual worlds completely independent of the real world. | The physical
    and virtual worlds merged. |

    | Partial immersion in the virtual environment. | Complete immersion in the virtual
    environment. | Interaction with and manipulation of both physical and virtual
    world. |

    | Proven and improved technology. | Realistic technical skill practice allows
    collecting key training metrics. | Real-time information and knowledge sharing
    with collaborators over long distances. |

    | Special AR headsets can be used for displaying virtual content on a small display.
    | Special VR headsets and hand controllers can be used to enhance experience.
    | Special AR and VR devices can be used for creating mixed experiences. |

    | Needs 3-7 years to adopt AR in different fields. | Needs 2-4 years to adopt
    VR in different fields. | MR is having a similar time as VR for adoption |


    ## Understanding Metaverse Layers


    Imagine the Metaverse as a parallel 3D virtual world of existence that provides
    all kinds of products or services and will even come to integrate and interact
    with much of the physical world. As a simulated digital environment, Metaverse
    incorporates all digital technologies AR, VR, Internet of Things (IoT), 5G, big
    data, edge computing, artificial intelligence (AI), and blockchain to build virtual
    places for social communities that resemble the real world. Moreover, it has a
    self-contained virtual economy powered by digital currencies and nonfungible tokens
    (NFTs). Entrepreneur Jon Radoff, an author and a game designer, has divided the
    Metaverse world into seven layers: experiences, discovery, creator economy, spatial
    computing, decentralization, human interface, and infrastructure. These layers
    encompass the past, present, and future developments and forms of the different
    products or services in the Metaverse landscape. Figure 7-7 illustrates the layers
    in Metaverse.


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig7_HTML.png)


    **Figure 7-7** Layers in Metaverse


    ### Experience


    Experience is the layer on which most Metaverse businesses, companies, and developers
    are now focused at the moment. A large feature of this layer will be community-driven
    events, social interactions, virtual services, and digital assets, such as games,
    NFTs, social, e-sports, meetings, theater, shopping, and events. Users can interact
    in virtual environments through its digital content. In this layer, the Metaverse
    will eventually create a brand-new dimension of virtual worlds by dematerializing
    physical space. As a result, the Metaverse will offer everyone a wide variety
    of experiences they have never seen before.


    Gaming is perhaps the most commonly known platform to demonstrate many features
    of the Metaverse experience layer: virtual immersion experience, avatar identities,
    digital NFT marketplaces, 3D product presentations, and real-time social interactions.
    This layer also includes many other everyday experiences where the physical and
    digital worlds merge and blend: Zoom office VR meetings, `HOLOFIT VR Fitness`,
    or `Netflix VR` movie, `TvoriVR` UX and UI prototyping.


    Here are several popular Metaverse platforms in this layer.


    **Examples:** Decentraland, Fortnite, Roblox, Sandbox, Spatial, Rove, Activision
    Blizzard, Nintendo, and Xbox.


    ### Discovery


    The discovery layer is about the continuous pull and pulls of information that
    introduces people to learn about different new experiences. The pull represents
    an inbound system where the users actively seek information about a new experience.
    On the other hand, push means an outbound system where the Metaverse experiences
    await users and notify them.


    Here are some examples in which inbound and outbound discoveries can take place.


    **Inbound:**


    - Search engines

    - Real-time presence

    - Community-driven content

    - App stores

    - A whitepaper

    - A case studies

    - Earned media


    **Outbound:**


    - Display advertising

    - Notifications

    - Emails and social media


    Community-driven content can help spread knowledge about its concepts, supporting
    technologies, and experiences. NFTs are an example that has been one of the hottest
    topics since 2021. Many companies use NFT digital assets to brand their products
    or service as a marketing tool, such as Nike, Starbucks, Coca-Cola, McDonald’s,
    and Louis Vuitton. It is a great way to grow community engagement and rise much
    more discovery in the Metaverse.


    The real-time presence will also play a critical role in improving interactive
    user experiences. For example, video game services such as PlayStation and Xbox
    allow gamers to see what their friends do in real time. The most common approaches
    in outbound discovery are display advertising, notifications, emails, and social
    media.


    **Examples:** Unity, Google store, Apple store, Steam, PlayStation, and Xbox.


    ### Creator Economy


    At the early stage of the Metaverse, producing digital resources, generating immersive
    experiences, and adding decentralized payment required a lot of professional skill
    and effort. This stage is similar to earlier versions of the Internet. It requires
    a lot of programming knowledge for creators to design and build apps. Nowadays,
    a tool like `WordPress` can allow content creators to easily build a website with
    payment options without code, with just a few clicks and drag-and-drop capabilities
    to achieve the creation process. With the growing Metaverse market, more and more
    commerce software tools will appear. As a result, the number of designers and
    creators on the Metaverse is increasing exponentially. For example, tokens like
    NFTs, build on a decentralized blockchain and have provable ownership for the
    digital asset with independent centralized platforms. This new model will give
    creators more influence than the traditional creator platform. Creators can build
    their Metaverse economies, sell more virtual NFT items to fans, and have opportunities
    to get more income.


    **Examples:** Roblox, Unity, Adobe, Polystream, Shopify, Decentraland, and Microsoft.'
  raw: '### Mixed Reality (MR)


    Mixed reality (MR) is an emergent technology that combines virtual reality (VR)
    and augmented reality (AR) . MR merges the physical and virtual worlds to create
    new environments where physical and digital objects can interact in real-time.


    **Example:** MR workstations will no longer be a single or dual physical monitor.
    The workstations will consist of multiple screens as desired in a 3D virtual space.


    The user can define and create an infinite number of customized workstations and
    delete these virtual screens as needed. Such working environments will improve
    efficiency and create a more enjoyable, comfortable, and healthier workplace.


    ### Extended Reality (XR)


    Extended reality (XR) is an umbrella term that covers the full spectrum of real
    and virtual immersive technologies, including VR, AR, and MR.


    To summarize what we have discussed so far for AR, MR, and MR, Table [7-1](#535492_1_En_7_Chapter.xhtml#Tab1)
    displays the difference between these immersive technologies.


    Table 7-1


    A comparison Between VR, AR, and MR


    | Augmented reality (AR) | Virtual reality (VR) | Mixed reality (MR) |

    | --- | --- | --- |

    | Virtual digital content overlaid on a real-world environment. | Computer-generated
    immersive virtual worlds completely independent of the real world. | The physical
    and virtual worlds merged. |

    | Partial immersion in the virtual environment. | Complete immersion in the virtual
    environment. | Interaction with and manipulation of both physical and virtual
    world. |

    | Proven and improved technology. | Realistic technical skill practice allows
    collecting key training metrics. | Real-time information and knowledge sharing
    with collaborators over long distances. |

    | Special AR headsets can be used for displaying virtual content on a small display.
    | Special VR headsets and hand controllers can be used to enhance experience.
    | Special AR and VR devices can be used for creating mixed experiences. |

    | Needs 3-7 years to adopt AR in different fields. | Needs 2-4 years to adopt
    VR in different fields. | MR is having a similar time as VR for adoption |


