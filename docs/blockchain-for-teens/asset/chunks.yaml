  trans: '

    # 以太坊客户端


    正如我们刚刚学到的，轻客户端主要在移动设备上实现。虽然搭建全节点或归档节点需要很长时间来同步，但运行自己的节点有诸多好处：


    1. 你的节点可以作为网络验证者来验证所有交易和区块。

    2. 你可以自行验证应用客户端的交易数据，无需第三方来验证交易——“勿信，请验证。”

    3. 你将拥有当前网络状态的一致视图，无需依赖那些数据可能延迟或不可信的其他公共节点或服务。

    4. 你将拥有更高的数据隐私性。当你使用第三方软件或工具提交交易时，这些服务可能会读取你的 IP 地址以及账户信息。IP 地址会暴露你当前的位置。


    要同步并与以太坊网络通信，你需要安装以太坊客户端软件。最常用的以太坊客户端是 `Geth`。`etherscan.io` 显示，90.3% 的以太坊节点安装
    `Geth` 作为客户端加入网络，并与其他节点建立 p2p 通信通道。图表 4-12 展示了总体以太坊客户端使用情况。


    ![](img/535492_1_En_4_Fig12_HTML.jpg)


    一个饼状图展示了整体以太坊客户端使用情况。最常用的以太坊客户端是 `Geth`，占比 90.3%。还估算了其他 8 种客户端的使用情况。


    **图 4-12** 总体以太坊客户端使用情况


    `Geth`（Go Ethereum）是一个开源命令行界面（cli），用于运行用谷歌编程语言 Go 编写的以太坊节点。


    以太坊社区构建并维护了 Go Ethereum。


    使用 `Geth`，节点可以执行交易、挖矿、账户间转账以太币，以及在以太坊区块链上部署和与智能合约交互。`Geth` 可以直接从 `Geth` 的官方网站
    [`https://geth.ethereum.org/downloads/`](https://geth.ethereum.org/downloads/)
    下载。该网站提供标准的安装指南。


    安装好 `Geth` 后，你可以以同步模式运行 `Geth`，成为全节点、轻节点或归档节点。


    同步全节点的 `Geth` 命令：


    ```

    geth --syncmode full

    ```


    当同步模式为全模式时，`Geth` 将下载所有区块并从创世区块重放所有交易。全节点的状态将在内存中保留最后的 128 个区块。


    同步轻节点的 `Geth` 命令：


    ```

    geth --syncmode light

    ```


    当同步模式为轻模式时，`Geth` 将下载最新的 2300 个区块并重放相关交易。因此，轻模式的同步过程比全模式快得多。


    同步归档节点的 `Geth` 命令：


    ```

    syncmode full --gcmode archive

    ```


    `Geth` 将下载所有区块，从创世区块重放所有交易，并将所有中间状态写入归档磁盘。


    以太坊社区中还有许多其他可用的以太坊客户端。这些客户端由不同的团队开发，并使用不同的编程语言实现。所有这些客户端都在行业中被积极使用。表格 4-4 总结了不同客户端的用途。


    **表 4-4** 以太坊客户端


    | 客户端 | 编程语言 | 磁盘空间（快速同步） | 磁盘空间（完整归档） |

    | --- | --- | --- | --- |

    | `Geth` | Go | 400 GB+ | 6 TB+ |

    | `OpenEthereum` | Rust | 280 GB+ | 6 TB+ |

    | `Besu` | Java | 750 GB+ | 5 TB+ |

    | `Nethermind` | C#, .NET | 200 GB+ | 5 TB+ |


    `Geth` 拥有一个使用 `GoJa JS 虚拟机` 构建的 JavaScript 控制台。


    `Geth` 拥有内置的 JavaScript 控制台，并支持所有标准的 `web3 JSON-RPC API`，称为 `web3.js`，它与 `ECMAScript
    5.1` 兼容。你可以使用 `JSON-RPC API` 与你的节点交互。`Geth` 支持多种方式让客户端应用向节点发送原始 JSON 对象。其中一种最广泛使用的协议称为基于
    HTTP 的 JSON-RPC。JSON 代表 JavaScript 对象表示法。它是一种在服务器和 Web 应用之间传输数据的开放标准文件格式。在 JSON
    文件中，数据以键/值对的形式存在，并用逗号分隔。以下是一个示例：


    ```json

    {

    ''name'': ''Alice'',

    ''gender'': ''Female'',

    ''account'': 12345

    }

    ```


    RPC 代表“远程过程调用”，用于其他远程系统进程。当客户端应用使用基于 HTTP 的 JSON-RPC 向 `Geth` 发送 JSON 数据时，`Geth`
    将执行区块链中由 `Web3 API` 提供的特定任务。Web3 运行在 RPC 层之上，如图 4-13 所示。


    ![](img/535492_1_En_4_Fig13_HTML.jpg)


    一个模式图描述了客户端应用、以太坊客户端、全节点 E V M 和以太坊区块链之间的相互关系。


    **图 4-13** 通过 JSON-RPC 调用以太坊客户端


    ### Geth 控制台


    要启动 `Geth` JavaScript 控制台，你可以运行 `Geth attach` 命令并配合 IPC。IPC（进程间通信）提供对所有 `Web3
    API` 的无限制访问。当 `Geth` 控制台与 `Geth` 节点运行在同一台机器上时，你可以使用 IPC 进行连接。


    打开运行中的 `Geth` 实例的控制台，结果将如下所示：


    ![](img/535492_1_En_4_Figb_HTML.jpg)


    `Geth` JavaScript 控制台的代码。它包含以下标签：instance、coinbase、at block、datadir、modules 和
    exit


    要获取对 `Web3 API`（包括 `eth`、`personal`、`admin` 和 `miner`）的支持，`Geth` 控制台提供了 `web3`
    命令。让我们来看看与 `eth` 相关的 API。在 `Geth` 控制台中输入 `eth`。它将显示所有支持的 `eth` 命令。


    ![](img/535492_1_En_4_Figc_HTML.jpg)


    以 `eth.` 开头的 `eth` 命令列表。


    要列出网络中你当前的所有账户，只需运行以下命令：


    ```

    eth.accounts.

    ```


    列出的账户输出应该类似于以下内容：


    ![](img/535492_1_En_4_Figd_HTML.jpg)


    一段文本代表了控制台中 `eth.accounts` 的输出。它由数字和字母组成。


    要检查账户余额，并将 wei 转换为 ether，请运行以下命令：


    ```

    eth.getBalance(''0x88437244acbb6276de36175740a8d686a9531ba7'') 以获取 wei 余额

    ```


    或者，我们可以直接转换为 ether：


    ```

    web3.fromWei(eth.getBalance(''0x88437244acbb6276de36175740a8d686a9531ba7''),''ether'')

    ```


    ![](img/535492_1_En_4_Fige_HTML.jpg)


    一张图片包含从 `eth.getBalance` 开始并直接转换为 `web3` 的获取账户余额的代码。


    要获取区块链的最新区块编号，请运行以下命令：


    ![](img/535492_1_En_4_Figf_HTML.jpg)


    一张图片包含获取区块链区块编号的命令，运行命令 `>eth.blockNumber` 并显示 518560。


    然后，你可以通过调用以下命令显示匹配区块的摘要信息：


    ```

    eth.getBlock (blockNumber)

    ```


    ![](img/535492_1_En_4_Figg_HTML.png)


    一张 `Geth` 控制台运行 `eth.getBlock` 的图片，打开了一个新的 `Geth` 窗口。该命令将出现在控制台中。


    要退出 `Geth` 控制台，只需运行 `exit` 或按 `CTRL-C`。

