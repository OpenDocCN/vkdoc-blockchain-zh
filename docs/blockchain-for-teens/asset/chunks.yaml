    # 早期发展


    **比特币披萨日（2010 年 5 月）** – 2010 年 5 月 22 日，一位名叫拉斯洛·汉耶茨的比特币爱好者和程序员在加密货币论坛上发布了一条不同寻常的帖子，愿意用
    10,000 枚比特币（据称当时价值 40 美元）换取两份棒约翰披萨。加州学生杰里米·斯特迪文特注意到了这个有趣的请求，卖给了拉斯洛·汉耶茨两份披萨，换取了
    10,000 枚比特币。这是历史上第一笔用比特币进行的实物购买，每年的 5 月 22 日被定为比特币披萨日。


    ![](img/535492_1_En_3_Fig4_HTML.jpg)


    一张照片展示了两份棒约翰披萨。


    图 3-4：价值 10,000 枚比特币的两份棒约翰披萨


    **首个比特币交易所（2010 年 7 月）** – 2010 年 7 月，Mt. Gox 在东京推出了首个加密货币交易所，该交易所曾一度是世界上最大的比特币交易所。Mt.
    Gox 是“魔法风云会在线交易所”的缩写，有时也被称为`MtGox`或`Mt Gox`。在鼎盛时期，Mt. Gox 处理了超过 70%的比特币交易。


    **首个比特币矿池（2010 年 9 月）** – 在比特币早期，挖矿非常简单。你可以轻松地用个人电脑挖出 50 枚比特币。当更多参与者加入网络，一些人开始使用显卡挖矿时，区块的生成速度超出了预期。比特币网络会自动调整挖矿难度。为了使挖矿更具盈利性和效率，2010
    年 9 月，马雷克·帕拉蒂努斯（很多人称他为“slush”）推出了世界上第一个比特币矿池：Slush Pool，最初名为`Bitcoin.cz`。12 月
    16 日，该矿池在运营后的头 24 小时内挖出了三个区块。


    **首家比特币在线商店（2011 年 2 月）** – 2011 年 2 月，丝绸之路推出了第一家接受比特币付款的在线商店。丝绸之路也是首个现代暗网市场。暗网市场是提供毒品、被盗信息、武器和服务等非法商品的暗网黑市，通常使用加密货币作为支付手段。


    丝绸之路由罗斯·威廉·乌布利希创立，他因在丝绸之路中的角色于 2013 年被捕，目前正在监狱服两个无期徒刑。美国联邦调查局最终于 2013 年关闭了丝绸之路。


    **比特币与美元平价（2011 年 2 月）** – 2011 年 2 月 9 日是一个历史性日期，也是比特币信仰者们期待已久的时刻：比特币的价格达到了 1
    美元。这也是比特币论坛成员`jimbobway`在 2011 年 1 月 11 日的预测。他说：“当一枚比特币涨到 1 美元时，我们需要庆祝一下……我称之为‘平价派对’。你打算怎么庆祝你的派对？”


    **莱特币（2011 年 10 月）** – 2011 年 10 月，前谷歌工程师李启威创建了莱特币（LTC），这是一种从比特币区块链分叉出来的加密货币。莱特币最初的设计目标是通过更短的出块时间和更高的交易吞吐量来实现快速支付。与比特币每块
    10 分钟不同，莱特币每个区块大约需要 2.5 分钟。比特币使用 SHA-256 加密算法，而莱特币使用`Scrypt`——这是一种内存密集型算法，旨在通过需要大量内存来提高进行大规模硬件攻击的难度和成本。


    **比特币基金会（2012 年 9 月）** – 2012 年 9 月，比特币基金会成立。创始成员包括加文·安德森、查理·施雷姆、马克·卡佩莱斯、彼得·维森内斯、罗杰·韦尔和帕特里克·默克。基金会的使命是“致力于为全球用户的利益，标准化、保护并推广比特币加密数字货币的使用。”


    **首次比特币泡沫（2013 年 11 月）** – 在比特币诞生不到四年后，2013 年 11 月 28 日，比特币价格飙升至历史新高 1,217 美元，首次突破
    1,000 美元大关。流通中的比特币总市值约为 40 亿美元。这是第一次比特币泡沫。此后，价格逐渐下跌，到 2015 年 1 月跌至 172.15 美元。

    '
- fmt: '#### Moving Mainstream


    **`Overstock` Bitcoin payment (January 2014)** – `Overstock` (NASDAQ: `OSTK`)
    launched an international payment system to accept Bitcoin in January 2014 and
    became the first major online shopping store to accept cryptocurrency.


    **`Mt. Gox` hacked (Feb 2014)** – At the beginning of 2014, `Mt. Gox` was the
    world’s biggest Bitcoin exchange, handling over 70% of all Bitcoin transactions
    worldwide.


    On February 7, 2014, `Mt. Gox` suddenly stopped all Bitcoin withdrawals, claiming
    it was merely “unusual activity” on its Bitcoin wallets, and they “performed investigations
    during the past weeks.” Then, on February 24, 2014, the exchange suspended all
    trading and shut down the website.


    On February 28, `Mt. Gox` filed for bankruptcy protection. During the `Mt. Gox`
    problems, Bitcoin’s value declined by 40%, trigging a two-year bear market for
    Bitcoin. As the victim of a massive hack, `Mt. Gox` lost about 744,408 Bitcoins
    (6% of all Bitcoins in existence at the time) and an additional 100,000 Bitcoins
    as company liabilities. Although 200,000 Bitcoins were later found, the remaining
    650,000 have never been recovered.


    **Bitcoin taxable (March 2014)** – Since Bitcoin started its first public trade
    in 2009, Bitcoin holders have been nervous about the legalities of Bitcoin payment
    until the rule was announced by Internal Revenue Service (IRS). With the Bitcoin
    market’s explosive growth in 2013, in March 2014, the IRS issued `Notice 2014-21`,
    `2014-16 I.R.B. 938PDF`, explaining cryptocurrency holdings to be “property” for
    tax purposes and not a legitimate, state-backed currency. Therefore, any new Bitcoins
    mined will be treated as property for federal income tax purposes, in the same
    way as any other assets you own, like stocks, various real estate, or gold.


    **Microsoft Bitcoin payment (December 2014)** – In December 2014, Microsoft (NASDAQ:
    `MSFT`) became one of the first big tech companies to support Bitcoin. It announced
    its acceptance of the digital currency as a payment option to buy digital content
    from its stores like Windows, Windows Phone, Xbox Games, and Xbox Music. Microsoft’s
    payment system processes Bitcoin transactions when integrated with `BitPay`, which
    is a Bitcoin payment service provider founded in 2011.


    **NY BitLicense (June 2015)** – In June 2015, the New York State Department of
    Financial Services (DFS) issued its `BitLicense` regulation. The regulation requires
    that companies in the state engaged in a wide range of virtual currency transactions—including
    transmitting, mining, and buying and selling virtual currency—apply to DFS for
    a `BitLicense`. In September 2015, Boston-based Circle Internet Financial (a global
    crypto finance company) was granted the first `BitLicense`. After that, many firms
    received the license to run crypto businesses in New York, like PayPal, Coinbase,
    Ripple Labs, BitPay, Square, Robinhood, and NYDIG.


    **CFTC labels Bitcoin a commodity (September 2015)** – In September 2015, the
    United States Commodities Futures Trading Commission (CFTC) classified Bitcoin
    and other virtual currencies as commodities under the U.S. Commodity Exchange
    Act (the CEA). The CFTC is an independent U.S. federal agency established to regulate
    the U.S. derivatives markets, including the sale of commodity and financial futures
    and options. As a result, Bitcoin trading is the same as other commodities, like
    gold and oil, which must be regulated and supervised by the CFTC in the United
    States. Therefore, the new rule started restricting unregistered firms that trade
    cryptocurrency products.


    In January 2018, the CFTC filed a complaint against defendants Patrick McDonnell
    and his company, CabbageTech, Corp., for operating a deceptive and fraudulent
    virtual currency scheme to induce customers. A New York federal judge assessed
    and adopted the CFTC’s position that virtual currencies are commodities within
    the meaning of the Commodity Exchange Act. It is the first case testing the CFTC’s
    ability to curb alleged fraud in the cryptocurrency business.


    **EU classifies Bitcoin as a currency (October 2015)** – In October 2015, Europe’s
    top Court of Justice decided Bitcoin was considered a currency, the same as other
    currencies. As a result, Bitcoins are not exempt from Value Added Tax (VAT). VAT
    is a consumption tax on all goods and services in the EU.'
