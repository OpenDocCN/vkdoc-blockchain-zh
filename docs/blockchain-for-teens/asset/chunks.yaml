- fmt: '# Summary


    This chapter is designed to acquaint you with the popular DeFi products in its
    ecosystem, which you should know when involved in DeFi projects or investments.


    This chapter started with a discussion on concepts in decentralized finance. Then
    you were introduced to the five different layers of the DeFi services structure.
    Moreover, with a detailed introduction to the decentralized stablecoin, we took
    a deep dive into Maker stablecoin to understand how it works and demonstrates
    how to vote on a proposal in Maker Foundation’s voting portal. Next, in the Decentralized
    exchanges (DEXs) section, we discussed the different types of DEXs, particularly
    for automated market makers (AMMs). We learned many popular concepts in the DeFi
    world, including yield-farming, slippage, impermanent loss, and liquidity pool.
    Later, we also explored the most popular DEX—Uniswap. Finally, we provided a practical
    end-to-end guide to show you how to deploy your own `ERC-20` token in the public
    blockchain, create a liquidity pool, add liquidity, swap your custom token, and
    get a staking reward in the Uniswap platform.


    In the decentralized lending and borrowing section, we overviewed the most popular
    decentralized lending platform—Aave. Then we demonstrated how to lend, withdraw,
    swap, borrow, and repay crypto assets in the Aave platform.


    The chapter also discussed decentralized insurance. The next chapter will be our
    last; we will discuss the future of blockchain.


    # 9. The Future of Blockchain


    A blockchain is a global decentralized ledger technology consisting of a growing
    block list. These time-stamped, append-only blocks are linked together using cryptography.
    The data in the blocks are permanent, immutable, and impossible to tamper with.
    In the blockchain, anyone can carry out transactions directly and exchange any
    asset of value with another person without the need for middlemen. The blockchain
    establishes an alternative trust mechanism between two participants and enables
    a new era of Internet usage called the Internet of Value (IoV). In the IoV, digital
    assets can be exchanged with another person instantly in an automated, secure,
    and decentralized manner—from stocks to arts, medicine, intellectual property,
    and more. On today’s Internet, we can freely share information. Tomorrow, we will
    freely share value in the blockchain. Blockchain as a revolutionary technology
    is a marching phenomenon that will gradually impact business and reshape the world
    economy. Every industry, including finance, healthcare, education, real estate,
    and supply chain, could potentially be revolutionized with the help of blockchain
    technology.


    After completing the first eight chapters, you should have sufficient knowledge
    to think about how blockchain can resolve real-life problems. In this chapter,
    we are starting with an introduction to the evolution of the Internet from Web
    1.0 to Web 3.0. Throughout this chapter, we will discuss how blockchain is changing
    traditional industries. We will start by covering the following core topics:


    - The evolution of the Internet

    - Blockchain in finance

    - Blockchain in the supply chain

    - Blockchain in healthcare


    ## The Evolution of the Internet


    The Internet is the world’s most popular computer network, which connects billions
    of computers, and electronic devices. The Internet is being used by billions of
    people every day for sending emails, doing online shopping, connecting with friends
    on social media, or many other purposes. Life without Internet access seems quite
    hard to imagine.


    In 1958, the Advanced Research Projects Agency (ARPA), now known as the Defense
    Advanced Research Projects Agency (DARPA), was founded, which aimed to create
    a way to direct communications and share information between computers.


    In 1967, the ARPA created the first working model of computer network, ARPANET,
    which allowed numerous computers to communicate with each other on a single network.


    In 1969, ARPANET transferred the first message from one computer to another. Thus,
    it became the forerunner of the Internet.


    In 1983, ARPANET adopted open networking protocols called Transfer Control Protocol/Internetwork
    Protocol (TCP/IP), which later became today’s core Internet protocol.


    However, with more computers added to the network, network users needed to find
    an easier way to communicate with them. Thus, in the same year, Paul Mockapetris
    invented the Domain Name System (DNS), which provides an easier way to use computer
    names.


    In 1985, `symbolics.com` became the first registered domain.


    In 1989, the ARPANET was shut down. In the same year, Tim Berners-Lee invented
    the World Wide Web. Consequently, the world entered the Web 1.0 era.


    ### Web 1.0 (1989–2004)—World Wide Web


    The World Wide Web (W3 or WWW), commonly known as the Web, is a collection of
    websites or web pages hosted by web servers. Users can access and view digital
    content via web browsers from their computers. Web 1.0 refers to the early phases
    of the evolution of the World Wide Web. The period of Web 1.0 was roughly from
    1989 to 2005.


    In 1990, Tim Berners-Lee worked at the European Organization for Nuclear Research
    (CERN). There, he developed the first web client and server with three specified
    technologies: HyperText Markup Language (HTML), Uniform Resource Locators (URLs),
    and the Hypertext Transfer Protocol (HTTP).


    In Web 1.0, a website comprised only static web pages, which would be filled with
    mostly text and image content and linked to other static web pages. Websites in
    Web 1.0 didn’t allow users to engage with the site. That’s why Web 1.0 is called
    the “read-only” web. The following screenshot shows a typical Web 1.0 page:


    `![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig1_HTML.jpg)`


    A screenshot of the N C S A mosaic for M S windows page. The caption reads welcome
    to N C S A mosaic, an internet information browser and world wide web client.


    **Figure 9-1** Web 1.0 page


    A few of the characteristics that define Web 1.0 are as follows:


    - The pages are static (page content is not dynamic).

    - HTML forms are sent via email.

    - Web content is loaded from the web server’s file system.

    - Web page layouts used frames and tables.

    - GIF buttons and graphics could be used.

    - The website was read only and used as an “information portal.”'
  raw: '## Summary


    This chapter is designed to acquaint you with the popular DeFi products in its
    ecosystem, which you should know when involved in DeFi projects or investments.


    This chapter started with a discussion on concepts in decentralized finance. Then
    you were introduced to the five different layers of the DeFi services structure.
    Moreover, with a detailed introduction to the decentralized stablecoin, we took
    a deep dive into Maker stablecoin to understand how it works and demonstrates
    how to vote on a proposal in Maker Foundation’s voting portal. Next, in the Decentralized
    exchanges (DEXs) section, we discussed the different types of DEXs, particularly
    for automated market makers (AMMs). We learned many popular concepts in the DeFi
    world, including yield-farming, slippage, impermanent loss, and liquidity pool.
    Later, we also explored the most popular DEX—Uniswap. Finally, we provided a practical
    end-to-end guide to show you how to deploy your own ERC-20 token in the public
    blockchain, create a liquidity pool, add liquidity, swap your custom token, and
    get a staking reward in the Uniswap platform.


    In the decentralized lending and borrowing section, we overviewed the most popular
    decentralized lending platform—Aave. Then we demonstrated how to lend, withdraw,
    swap, borrow, and repay crypto assets in the Aave platform.


    The chapter also discussed decentralized insurance. The next chapter will be our
    last; we will discuss the future of blockchain.


    # 9. The Future of Blockchain


    A blockchain is a global decentralized ledger technology consisting of a growing
    block list. These time-stamped, append-only blocks are linked together using cryptography.
    The data in the blocks are permanent, immutable, and impossible to tamper with.
    In the blockchain, anyone can carry out transactions directly and exchange any
    asset of value with another person without the need for middlemen. The blockchain
    establishes an alternative trust mechanism between two participants and enables
    a new era of Internet usage called the Internet of Value (IoV). In the IoV, digital
    assets can be exchanged with another person instantly in an automated, secure,
    and decentralized manner—from stocks to arts, medicine, intellectual property,
    and more. On today’s Internet, we can freely share information. Tomorrow, we will
    freely share value in the blockchain. Blockchain as a revolutionary technology
    is a marching phenomenon that will gradually impact business and reshape the world
    economy. Every industry, including finance, healthcare, education, real estate,
    and supply chain, could potentially be revolutionized with the help of blockchain
    technology.


    After completing the first eight chapters, you should have sufficient knowledge
    to think about how blockchain can resolve real-life problems. In this chapter,
    we are starting with an introduction to the evolution of the Internet from Web
    1.0 to Web 3.0\. Throughout this chapter, we will discuss how blockchain is changing
    traditional industries. We will start by covering the following core topics:


    *   The evolution of the Internet


    *   Blockchain in finance


    *   Blockchain in the supply chain


    *   Blockchain in healthcare


    ## The Evolution of the Internet


    The Internet is the world’s most popular computer network, which connects billions
    of computers, and electronic devices. The Internet is being used by billions of
    people every day for sending emails, doing online shopping, connecting with friends
    on social media, or many other purposes. Life without Internet access seems quite
    hard to imagine.


    In 1958, the Advanced Research Projects Agency (ARPA), now known as the Defense
    Advanced Research Projects Agency (DARPA), was founded, which aimed to create
    a way to direct communications and share information between computers.


    In 1967, the ARPA created the first working model of computer network, ARPANET,
    which allowed numerous computers to communicate with each other on a single network.


    In 1969, ARPANET transferred the first message from one computer to another. Thus,
    it became the forerunner of the Internet.


    In 1983, ARPANET adopted open networking protocols called Transfer Control Protocol/Internetwork
    Protocol (TCP/IP), which later became today’s core Internet protocol.


    However, with more computers added to the network, network users needed to find
    an easier way to communicate with them. Thus, in the same year, Paul Mockapetris
    invented the Domain Name System (DNS), which provides an easier way to use computer
    names.


    In 1985, symbolics.com became the first registered domain.


    In 1989, the ARPANET was shut down. In the same year, Tim Berners-Lee invented
    the World Wide Web. Consequently, the world entered the Web 1.0 era.


    ### Web 1.0 (1989–2004)—World Wide Web


    The World Wide Web (W3 or WWW), commonly known as the Web, is a collection of
    websites or web pages hosted by web servers. Users can access and view digital
    content via web browsers from their computers. Web 1.0 refers to the early phases
    of the evolution of the World Wide Web. The period of Web 1.0 was roughly from
    1989 to 2005.


    In 1990, Tim Berners-Lee worked at the European Organization for Nuclear Research
    (CERN). There, he developed the first web client and server with three specified
    technologies: HyperText Markup Language (HTML), Uniform Resource Locators (URLs),
    and the Hypertext Transfer Protocol (HTTP).


    In Web 1.0, a website comprised only static web pages, which would be filled with
    mostly text and image content and linked to other static web pages. Websites in
    Web 1.0 didn’t allow users to engage with the site. That’s why Web 1.0 is called
    the “read-only” web. The following screenshot shows a typical Web 1.0 page:


    ![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig1_HTML.jpg)


    A screenshot of the N C S A mosaic for M S windows page. The caption reads welcome
    to N C S A mosaic, an internet information browser and world wide web client.


    Figure 9-1


    Web 1.0 page


    A few of the characteristics that define Web 1.0 are as follows:


    *   The pages are static (page content is not dynamic).


    *   HTML forms are sent via email.


    *   Web content is loaded from the web server’s file system.


    *   Web page layouts used frames and tables.


    *   GIF buttons and graphics could be used.


    *   The website was read only and used as an “information portal.”'
