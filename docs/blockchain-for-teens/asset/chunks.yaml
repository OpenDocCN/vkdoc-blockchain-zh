- fmt: '### Digital Real Estate


    Virtual property is a sector that will most likely grow in the future as the Metaverse
    becomes increasingly popular. Players can purchase property in a virtual world
    for them to “live” in or to sell at a greater profit later. NFTs make keeping
    track of the ownership of the virtual land simple and also prevent the need for
    a middleman—the buyer can directly buy the property from the marketplace. The
    record of purchase and information about the land will automatically be included
    in the blockchain instead of an office or paper document.


    Here are some examples of NFT real estate:


    - `Sandbox` is a virtual world where players can use building blocks to customize
    their gaming experience. Users can have complete control over their experience
    and can add assets on their land.

    - `Mars House` by `Krista Kim` was sold for `288` Ether, or `$514,557` at the
    time of selling. The home is completely virtual and is designed to be visited
    in the Metaverse.


    ### Trading Cards


    Trading cards have always been a physical phenomenon, but they have been gaining
    popularity in the world of NFTs. Storing the trading card as an NFT makes it easier
    to exchange cards and proves the authenticity of the card. Often, trading cards
    have no intrinsic value and most of their success comes from scarcity and a desire
    to collect.


    Here are some examples of NFT trading cards:


    - `Gods Unchained` is a blockchain-based multiplayer game that uses decks of trading
    cards. Players can earn in-game items as NFTs and sell them for real-world cash.

    - `Curio Cards` is a set of 30 trading cards. Each card has a varied amount of
    supply, but the total amount of cards minted was `29,700`.

    - `Candy Digital` is an NFT platform where players can trade and collect official
    Major League Baseball NFTs. The platform also includes signatures, jerseys, images,
    video content, and other exclusive items.


    ### Video Game Items


    Many video games let players to collect in-game items, such as equipment, consumables,
    and skins, to customize their experience and progress in the game. However, earning
    items may be time-consuming or difficult, which is why when game developers give
    players the option to purchase their gear, they often make large amounts of profit.


    Listing these in-game items as an NFT can help developers and players keep track
    of an item’s status and properties. This is especially beneficial because the
    owner can prove the item’s authenticity and the buyer can show their ownership.
    Creating in-game items as NFTs can also help players sell their items once they
    no longer need or want the item. It also eliminates the need for a secondary market,
    which often has scammers and may not always be allowed in the game.


    Here are some examples of NFT video game items:


    - `Genesis Land Plots` from `Axie Infinity` includes digital land in the game.
    `9` plots of land were bought for `$1.5 million USD`.

    - `Dragon Kitty` from `Crypto Kitties` is one of the unique Kitties available
    in the pet breeding game. The pet was sold for `600` Ethereum, or around `$1.3
    million USD`.

    - `Mobile Legends` is a mobile game that launched an NFT collection called `The
    Aspirants Mystery Box`. The collection has `12` boxes, and each box has a digital
    figure and animations of in-game characters.

    - `Summoners Aerna` is an MMORPG built on a blockchain. The heroes and in-game
    items are all NFTs.


    ### Fashion


    Individual designers and large brands alike have found interest in fashion NFTs.
    There has even been a Crypto Fashion Week and a Metaverse Fashion Week with virtual
    collections and digital clothing items. NFT fashion items can include wearables
    that users can wear in virtual environments or digital avatars, or digital models
    of physical fashion items.


    Here are some examples of NFT fashion:


    - `Balmain x Barbie` collaboration by `Balmain` and `Barbie` featured three dolls
    with pink garments. Purchasing a Barbie avatar gives the buyer ownership of the
    avatar and a real-life Barbie-sized outfit.

    - `MANGO` is a fashion group that created three NFTs for the Metaverse Fashion
    Week in `Decentraland`. The collection was displayed in a virtual space and uploaded
    to `OpenSea` but was not made for sale.


    ### 3D Models


    3D models can be designs or representations of abstract or real-world objects.
    The 3D model itself can be viewed, rotated, moved, and interacted with on a screen
    or with virtual or augmented reality headsets. The model itself can also be printed
    out with a 3D printer. 3D models are important to industries such as virtual and
    augmented reality, medicine, engineering, video games, scientific imaging, architecture,
    movies, advertising, and illustration.


    ### Text


    Text, such as ones in books, poems, articles, and quotes, has been branded and
    sold as NFTs.


    Here are some examples of NFT text:


    - `“Source Code for the WWW”` by Sir Tim Berners-Lee is `9,555` lines of code
    that created the original World Wide Web that was sold for `$5.4 million USD`.

    - `“Buy This Column on the Blockchain!”` by Kevin Roose is an article about NFTs
    that was auctioned off as an NFT itself. The article was sold for around `$560,000`
    at the auction.


    ### Domain Names


    A blockchain domain is an address you can purchase and own to allow someone to
    send crypto to an easy-to-remember address. For example, a typical Bitcoin address
    has `34` characters and an Ethereum address has `42`, so addresses may look something
    like `ac1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4`. Buying a blockchain domain
    allows users to simplify their address to `example.crypto` and will be easier
    to remember. And unlike website domains such as `.com` and `.org`, blockchain
    domains do not require an annual renewal fee to be paid.


    Now that we have covered the different usages of NFTs, let us review the highlights
    of each application of NFT in Table [6-2](#535492_1_En_6_Chapter.xhtml#Tab2).


    **Table 6-2** Comparing different applications of NFT


    | Application | Summary |

    | --- | --- |

    | Image | Images have no motionCan be photographs or artRaster vs. vector graphics
    |

    | Video | Can have audio and animationCan be very high resolution |

    | GIFs | Sequence of imagesAutomatically loopsLarge file sizes |

    | Audio | Sometimes requires a preview image |

    | 3D models | Can be viewed on a 2D screen or headsetsCan be interacted withEssential
    to many industries |

    | Text | Examples include books, poems, articles, and quotes |

    | Domain names | Allows users to simplify their blockchain domainDoes not require
    a renewal fee |

    | Real estate | Virtual property can increase in valueAdvantages over traditional
    real estate practices |

    | Trading cards | Easy to trade as NFTsCollected because of market value |

    | Video-game items | Help developers and players keep track of itemsAllows players
    to easily resell items |

    | Fashion | Can be virtual or have real-life valueCan be more useful in the future
    as the virtual world expands |'
