    **Step 1 –** Open Remix IDE in your browser ([`https://remix.ethereum.org`](https://remix.ethereum.org)).


    **Step 2 –** Create a smart contract named DeFiTeenToken.


    **Step 3 –** We will import the ERC-20 token contract from OpenZeppelin. The ERC-20
    token link from OpenZeppelin is here:


    [`https://github.com/OpenZeppelin/openzeppelincontracts/blob/master/contracts/token/ERC20/ERC20.sol`](https://github.com/OpenZeppelin/openzeppelincontracts/blob/master/contracts/token/ERC20/ERC20.sol)


    **Step 4 –** In the contract, we define the initial supply for the DeFiTeenToken,
    when creating a token. The contract name is DeFiTeenToken and the symbol is DFTT.
    “msg.sender” is the person who is currently creating this contract. In our case,
    it will be a selected wallet account address to deploy the DeFiTeenToken contract.


    Here is what our DeFiTeenToken smart contract looks like.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figk_HTML.png)


    A screenshot of the decentralized finance token smart contract. It contains 9
    lines of coding, including import, contract D e F i teen token, and constructor.


    You can also get this contract from the book’s GitHub repository—Chapter [8](#535492_1_En_8_Chapter.xhtml):


    [`https://github.com/Apress/Blockchain-for-Teens.git`](https://github.com/Apress/Blockchain-for-Teens.git)


    **Step 5 –** Compile the DeFiTeenToken.sol smart contract.


    **Step 6 –** Deploy the contract using Remix VM. We enter the initial supply as
    100,000,000.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figl_HTML.png)


    A screenshot of the decentralized finance token displays the deploy and run transaction.
    It contains account, contract, and deploy options on the left and a coding screen
    on the right.


    **Step 7 –** Conduct some quick tests under Remix “Deploy and run transactions”
    module.


    By clicking name, symbol, and total supply, you should see the related value show
    up:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figm_HTML.jpg)


    A screenshot displays the three options, name as decentralized finance teen token,
    symbol as D F T T, total supply as 100000000.


    **Step 8 –** Test transfer function. Copy the second account from the Account
    drop-down list. Enter this account address in the transfer function to the input
    field and give the transfer DFTT amount of 1000\. Once the transaction is completed,
    check the second account token by invoking the balanceOf function and entering
    the second account address. You should see the balance of the second account has
    1000 DFTT tokens. The following screen shows the process to test the transfer
    function:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fign_HTML.png)


    A set of three screenshots displays the screen for the multiple wallet accounts,
    transfer 1000 D F T T tokens to the second account, and verify the balance of
    the second account D F T T token is 1000.


    **Step 9 –** Now let us deploy the DeFiTeenToken contract to the Goerli test network.
    This time, we enter 1000000000000000000000 (22-digit number) since the token unit
    is 18\. Now it is time to deploy the contract. The Metamask will pop up for transaction
    confirmation. Click the confirm button.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figo_HTML.png)


    A screenshot of the decentralized finance teen token displays the deploy and run
    transaction screen. It has an account, contract, and deploy screen, as well as
    a meta mask notification on the left and the codes on the right.


    Note


    To get the test ETH token using Goerli, you can go to the below addresses to request
    or mine a few tokens:


    (1) [`https://goerlifaucet.com/`](https://goerlifaucet.com/); (2) [`https://goerli-faucet.pk910.de/`](https://goerli-faucet.pk910.de/);
    (3) [`https://goerlifaucet.com/`](https://goerlifaucet.com/)


    **Step 10 –** Once the contract is deployed, you can view the deployed contract
    from Etherscan via the link from MetaMask: activity ➤ contract deployment ➤ view
    on the block explorer. You can also verify the token name, symbol, and total supply
    in Remix IDE. You should see a similar result as follows:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figp_HTML.png)


    A set of three screen displays. 1\. Metamask page highlights contract deployment
    status. 2\. Verify in remix page highlights the transaction name, symbol and total
    supply. 3\. Etherscan for the contract page.


    Our deployed DeFiTeenToken address is 0xbc438759cef061b82abafd95be018128cc4693f5,
    the ether scan for this contract URL is


    [`https://goerli.etherscan.io/tx/0x242401f79c53764342645058dfa1b05b261deacab2e77267bcde5f0626116f48`](https://goerli.etherscan.io/tx/0x242401f79c53764342645058dfa1b05b261deacab2e77267bcde5f0626116f48)


    Since the contract is deployed in a public test network, it is accessible to everyone.


    **Step 11 –** Import the DFTT token into your MetaMask wallet. Client Asset tab
    in Metamask, select Import tokens. It will ask you to enter the token address.
    You can get the contract address from Etherscan. With entered contract address,
    you click the “Custom Token” button to import the DFTT token.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figq_HTML.png)


    A screenshot for importing the D F T T token displays the client asset tab in
    Metamask, token address details, and deployment of the D F T T token.


    After successfully deploying our DFTT token, it is now time to create a new pool
    in Uniswap DEXs.'
  trans: '

    ### 创建 ERC-20 代币


    在第 5 章，我们已经简要讨论了 ERC-20 代币。创建 ERC-20 代币有多种方式。如果你是一名经验丰富的智能合约开发者，可以自行编写自己的 ERC-20
    代币。为简化流程，我们将使用一套流行的开源安全智能合约框架 OpenZeppelin 来创建 ERC-20 代币。这非常简单，仅需几行代码：


    **第 1 步 –** 在浏览器中打开 Remix IDE（[`https://remix.ethereum.org`](https://remix.ethereum.org)）。


    **第 2 步 –** 创建一个名为 `DeFiTeenToken` 的智能合约。


    **第 3 步 –** 我们将从 OpenZeppelin 导入 ERC-20 代币合约。来自 OpenZeppelin 的 ERC-20 代币链接如下：


    [`https://github.com/OpenZeppelin/openzeppelincontracts/blob/master/contracts/token/ERC20/ERC20.sol`](https://github.com/OpenZeppelin/openzeppelincontracts/blob/master/contracts/token/ERC20/ERC20.sol)


    **第 4 步 –** 在合约中，我们定义创建代币时 `DeFiTeenToken` 的初始供应量。合约名称为 `DeFiTeenToken`，符号为 `DFTT`。`msg.sender`
    是当前创建此合约的人。在我们的案例中，它将是一个选定的钱包账户地址，用于部署 `DeFiTeenToken` 合约。


    以下是我们的 `DeFiTeenToken` 智能合约的样子。


    ![](img/535492_1_En_8_Figk_HTML.png)


    去中心化金融代币智能合约的截图。它包含 9 行代码，包括导入、`DeFiTeenToken` 合约和构造函数。


    你还可以从本书的 GitHub 仓库获取此合约——第 8 章：


    [`https://github.com/Apress/Blockchain-for-Teens.git`](https://github.com/Apress/Blockchain-for-Teens.git)


    **第 5 步 –** 编译 `DeFiTeenToken.sol` 智能合约。


    **第 6 步 –** 使用 Remix VM 部署合约。我们输入初始供应量为 `100,000,000`。


    ![](img/535492_1_En_8_Figl_HTML.png)


    去中心化金融代币的截图，显示了部署和运行交易。左边包含账户、合约和部署选项，右边是代码屏幕。


    **第 7 步 –** 在 Remix 的“部署和运行交易”模块下进行快速测试。


    通过点击 `name`、`symbol` 和 `totalSupply`，你应该能看到相关值显示出来：


    ![](img/535492_1_En_8_Figm_HTML.jpg)


    截图显示了三个选项，名称（name）为 decentralized finance teen token，符号（symbol）为 `DFTT`，总供应量（total
    supply）为 `100000000`。


    **第 8 步 –** 测试 `transfer` 函数。从账户下拉列表中复制第二个账户。在 `transfer` 函数的输入字段中输入此账户地址，并给予
    `1000` 个 `DFTT` 代币的转账数量。交易完成后，通过调用 `balanceOf` 函数并输入第二个账户地址来检查第二个账户的代币。你应该看到第二个账户余额有
    `1000` 个 `DFTT` 代币。以下屏幕展示了测试 `transfer` 函数的过程：


    ![](img/535492_1_En_8_Fign_HTML.png)


    一组三张截图显示多个钱包账户的屏幕、向第二个账户转账 `1000` 个 `DFTT` 代币，以及验证第二个账户 `DFTT` 代币余额为 `1000`。


    **第 9 步 –** 现在让我们将 `DeFiTeenToken` 合约部署到 Goerli 测试网络。这次，我们输入 `1000000000000000000000`（22
    位数字），因为代币单位是 18。现在可以部署合约了。MetaMask 将弹出确认交易窗口。点击确认按钮。


    ![](img/535492_1_En_8_Figo_HTML.png)


    去中心化金融青少年代币的截图，显示了部署和运行交易屏幕。它包含账户、合约和部署屏幕，左侧还有 MetaMask 通知，右侧是代码。


    > **注意**

    > 要使用 Goerli 获取测试 ETH 代币，你可以访问以下地址请求或挖掘一些代币：

    > (1) [`https://goerlifaucet.com/`](https://goerlifaucet.com/)；(2) [`https://goerli-faucet.pk910.de/`](https://goerli-faucet.pk910.de/)；(3)
    [`https://goerlifaucet.com/`](https://goerlifaucet.com/)


    **第 10 步 –** 合约部署后，你可以通过 MetaMask 的链接在 Etherscan 上查看已部署的合约：活动 ➤ 合约部署 ➤ 在区块浏览器上查看。你也可以在
    Remix IDE 中验证代币名称、符号和总供应量。你应该看到类似如下的结果：


    ![](img/535492_1_En_8_Figp_HTML.png)


    一组三个屏幕显示。1. MetaMask 页面突出显示合约部署状态。2. 在 Remix 页面验证突出显示交易名称、符号和总供应量。3. 合约的 Etherscan
    页面。


    我们部署的 `DeFiTeenToken` 地址是 `0xbc438759cef061b82abafd95be018128cc4693f5`，该合约的 Etherscan
    URL 是：


    [`https://goerli.etherscan.io/tx/0x242401f79c53764342645058dfa1b05b261deacab2e77267bcde5f0626116f48`](https://goerli.etherscan.io/tx/0x242401f79c53764342645058dfa1b05b261deacab2e77267bcde5f0626116f48)


    由于合约部署在公共测试网络上，任何人都可以访问它。


    **第 11 步 –** 将 `DFTT` 代币导入你的 MetaMask 钱包。在 MetaMask 的客户端资产选项卡中，选择导入代币。它会要求你输入代币地址。你可以从
    Etherscan 获取合约地址。输入合约地址后，点击“自定义代币”按钮导入 `DFTT` 代币。


    ![](img/535492_1_En_8_Figq_HTML.png)


    导入 `DFTT` 代币的截图，显示了 MetaMask 中的客户端资产选项卡、代币地址详细信息以及 `DFTT` 代币的部署。


    成功部署我们的 `DFTT` 代币后，现在该在 Uniswap DEX 中创建一个新的流动性池了。

    '
- fmt: '### Create a New Liquidity Pool in Uniswap


    **Step 1 –** Go to Uniswap website: [`https://app.uniswap.org/#/swap?chain=goerli`](https://app.uniswap.org/%2523/swap%253Fchain%253Dgoerli).
    The following screen will appear, and click `connect wallet` button. It will connect
    you to the Goerli test network.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figr_HTML.png)


    A set of two screen displays. 1. The `connect wallet` button on the Uniswap website
    page is highlighted. 2. The Goerli test network page displays buttons of `cancel`,
    and `next` to `cancel` or `connect with Metamask` screen.


    **Step 2 –** Once connected, Uniswap will pop up a screen and give you an address,
    showing all of your token transactions on the Uniswap platform.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figs_HTML.png)


    A screen displays the Uniswap platform with an address and list of all token transaction
    details along with `connect`, `disconnect`, `change` and `copy address` options.


    **Step 3 –** Select "Create a pool."


    **Step 4 –** Press the "Select a Token" option.


    **Step 5 –** Enter your token’s address in the "Search Name or Address" field
    and select your token from the dropdown.


    **Step 6 –** Click on the "import" button.


    **Step 7 –** An import token pop-up will show up. Ignore the warning. Click on
    the "Import" button.


    You’ll see a similar process (from step 3 to step 7) shown as follows:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figt_HTML.png)


    4 screens display the steps to create a pool. 1. Create, move, and V 2 liquidity
    options are listed on the pool platform. 2. Create a pool page has `select a token`
    option highlighted. 3. Third screen titled `add liquidity` has a popup window
    of `import token` with some details. 4. Add a liquidity page after selection of
    `import token`.


    **Step 8 –** Enter the required information to create a new pool:


    1.  Select a fee from 0.05%, 0.3%, and 1%. Let us choose 0.05%.

    2.  Define DFTT token price compared to the current ETH price. Enter 0.001, for
    example.

    3.  Set a price range. Enter min price as 0.00001 ETH and Max price as 1 ETH.

    4.  Deposit Amount. We will deposit 0.01 ETH in this pool. The Uniswap application
    will automatically calculate the amount of DFTT, which is 0.000000978 DFTT.


    With all information filled, click the "Approve DFTT" button. The Metamask will
    pop up and ask you to confirm the transaction. Click confirm button.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figu_HTML.png)


    A set of two screens. 1. Add Liquidity page has the `Approve DFTT` button highlighted.
    Some other options are `select pairs`, and deposit options. 2. The Metamask notification
    screen has transaction fee, some other details, `reject` and `confirm` buttons.


    **Step 9 –** The Uniswap will show a preview page. Click the preview button.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figv_HTML.png)


    A screen displays the add liquidity page. 0.05% best for stable pairs is highlighted
    in the `select pair` option, and the deposit amount is filled in. It includes
    price range setting options with minimum and maximum prices, and `approve DFTT`
    button.


    **Step 10 –** An "Add Liquidity" popup will show up. Click `add` button to add
    liquidity. Metamask will show confirm popup and click the "confirm" button.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figw_HTML.png)


    A set of two screens. 1. ETH/DFTT ranges are displayed along with an `add` button
    on the `add liquidity` popup in the page. 2. The `add liquidity` page has the
    `waiting for confirmation` popup, and Metamask notification popup with `reject`
    and `confirm` buttons.


    **Step 11 –** Once the transaction is successfully mined in the blockchain, you
    should see your new liquidity pool in the Uniswap platform, shown as follows:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figx_HTML.png)


    A set of two screens. 1. The Pool page highlights `new positions` and `closed
    positions`. 2. Uniswap page displays DFTT/ETH ranges, price range minimum and
    maximum, current price, etcetera.


    ### Add Liquidity in the Liquidity Pool


    Adding liquidity is very similar to several steps for creating a liquidity pool.
    The entire process is illustrated as follows:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figy_HTML.png)


    5 screens display the steps involved in increasing liquidity. 1. `Increase liquidity`
    button is marked. Liquidity, unclaimed fees, etcetera is displayed. 2. Add liquidity
    page with some details, and preview button marked. 3. `Add` button marked. 4.
    Confirm option highlighted. 5. New liquidity pool page with price details.


    ### Swap Tokens in Uniswap


    **Step 1 –** Select the `Swap` tab and choose the token pair. You can search and
    choose from a dropdown of available ERC-20 tokens by entering a token address.


    **Step 2 –** Enter the token swap amount. For example, we will swap ETH for DFTT
    tokens by 0.01 ETH.


    **Step 3 –** Review settings and confirm swap.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figz_HTML.png)


    A set of 3 screens display the swap tokens in Uniswap platform. 1. Select a token
    option is highlighted. 2. Token swap amount is entered along with the `swap anyway`
    option. 3. `Confirm swap` option is highlighted.


    **Step 4 –** Confirm and Swap. You can see ETH total amount taken 0.01 from the
    wallet to create a swap.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figaa_HTML.png)


    4 screens display the Swap screen. 1. `Waiting for confirmation` popup and the
    Metamask notification page. 2. A popup, `transaction submitted` with `close` button.
    3. Swap page before 1.232 ETH and after 1.222 ETH is presented.


    **Note:** You can see all recent transaction history from the wallet address.
    To set up the Swap transaction setting, such as Slippage tolerance, etc., you
    can click the top right corner setting icon.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figab_HTML.png)


    A set of two screens. 1. Swap setting options, right top corner is presented,
    including slippage tolerance, transaction deadlines and interference settings.
    2. Account details presented with recent transaction information.


    With similar steps, you can swap any token in the pool, including popular tokens
    like UNI. Here is an example:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figac_HTML.png)


    5 screens display the steps to swap tokens in the pool. 1. Swap option with ETH
    and UNI range. 2. Confirm swap screen with ETH, UNI, price update option, etcetera.
    3. Confirm Swap popup highlights `confirm swap` button. 4. Swap screen with Metamask
    notification page with confirm option.


    ### Claim the Reward from the Liquidity Pool


    Finally, let us look at how to claim a review as an LP holder.


    **Step 1 –** Click on the DEFT/ETH pool, and there is a `collect fee` button in
    the "Unclaimed fees" panel. We will select WETH as the return. Click the button.


    **Step 2 –** A `claim fees` popup will show up and click the `collect` button.


    **Step 3 –** Next, Metamask will ask to confirm the transaction. Click `confirm`
    button.


    **Step 4 –** It will complete your collection reward.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figad_HTML.png)


    4 screens display the steps to claim the reward. 1. DFTT/ETH pool page highlights
    `collect fee` button. 2. Claim fees page including price ranges and `collect`
    button. 3. Metamask notification page with `reject` and `confirm` buttons.


    **Step 5 –** Import the WETH address to your Metamask. The WETH address in the
    Goerli network address is `0xB4FBF271143F4FBf7B91A5ded31805e42b2208d6`. You can
    retrieve it from the Internet or Etherscan.


    **Step 6 –** Now, you will see your claimed reward:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figae_HTML.png)


    Two screens display the steps for claimed rewards. 1. Goerli test network page
    includes options for importing tokens. 2. The assets are displayed on the Goerli
    test network page with 0.00001 WETH circled.'
