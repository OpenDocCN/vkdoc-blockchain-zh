    # Diffie-Hellman 算法的工作原理


    Diffie-Hellman 算法基于一个数学原理，并使用以下公式：


    `g^a (mod p)`


    模运算是除法运算的余数。例如，`5 mod 3 = 2`，因为 2 是余数。模也可以用 `%` 表示。


    以 `p`、`g` 为质数，`g` 是模 `p` 的一个原根。`g` 和 `p` 是公开的，任何人都可以看到并使用。


    在数学中，如果一个整数 `g` 的幂次模 `n` 可以生成所有与 `n` 互质的整数，那么这个 `g` 就是模 `n` 的原根。


    例如，`2` 是模 `5` 的一个原根，所有与 `5` 互质的数是 `1`、`2`、`3` 和 `4`；而这些数（模 `5`）的结果就是它们自身，意味着 `2
    (mod 5) = 2`：


    *   `2⁰ = 1`，`1 (mod 5) = 1`，所以 `2⁰ ≡ 1`

    *   `2¹ = 2`，`2 (mod 5) = 2`，所以 `2¹ ≡ 2`

    *   `2³ = 8`，`8 (mod 5) = 3`，所以 `2³ ≡ 3`

    *   `2² = 4`，`4 (mod 5) = 4`，所以 `2² ≡ 4`


    现在，我们来看一下 Diffie-Hellman 算法是如何工作的。让我们用一个简单的例子来理解密钥交换算法。假设爱丽丝和鲍勃想要交换信息。现在，假设有一个名叫伊芙的黑客正在试图拦截消息。


    **步骤 1 –** 爱丽丝和鲍勃同意，所有消息都需要通过公式 `g^a (mod p)` 进行计算，其中使用模数 `p = 13` 和底数 `g = 6`。爱丽丝和鲍勃各自选择一个只有自己知道的秘密数字。然而，这个公式以及数字
    `g` 和 `p` 对所有人都是公开的。


    ![](img/535492_1_En_2_Fig5_HTML.png)


    爱丽丝和鲍勃商定的公共值示意图。模数 `p` 等于 13，底数 `g` 等于 6。


    图 2-5


    爱丽丝和鲍勃商定公共值


    **步骤 2 –** 爱丽丝选择一个秘密随机数（`a = 5`）作为她的私钥，鲍勃选择他的私钥（`b = 4`）。


    ![](img/535492_1_En_2_Fig6_HTML.png)


    爱丽丝和鲍勃的秘密私钥示意图。爱丽丝的随机秘密密钥 `a` 等于 5，鲍勃的随机秘密密钥 `b` 等于 4。


    图 2-6


    爱丽丝和鲍勃的秘密密钥


    **步骤 3 –** 然后，爱丽丝和鲍勃将使用该公式，利用 `p` 和 `g` 参数以及他们的私有值来计算公共值。


    爱丽丝将使用以下公式进行计算：


    ![](img/535492_1_En_2_Fig7_HTML.png)


    此示意图描述了爱丽丝和鲍勃的公共值计算。爱丽丝的公共值是 `6 的 5 次方` 等于 7776，模 13 等于 2；鲍勃的是 `6 的 4 次方` 等于 1296，模
    13 等于 9。


    图 2-7


    爱丽丝和鲍勃计算公共值


    `6⁵ (mod 13) = 7776 mod 13 = 2`


    鲍勃将使用以下公式进行计算：


    `6⁴ (mod 13) = 1296 mod 13 = 9`


    **步骤 4 –** 爱丽丝通过互联网将她的计算结果（`2`）发送给鲍勃。伊芙可以看到这个值。鲍勃将他的计算结果（`9`）发送给爱丽丝，伊芙也可以看到这个值。


    ![](img/535492_1_En_2_Fig8_HTML.png)


    此示意图描述了爱丽丝和鲍勃相互交换公钥。交换的密钥是来自鲍勃的 9 和来自爱丽丝的 2。


    图 2-8


    爱丽丝和鲍勃相互发送各自的结果


    **步骤 5 –** 爱丽丝和鲍勃都收到了对方的公共消息，他们通过公式 `g^a (mod p)` 计算出了共享密钥。


    在这一步中，`g` 是从对方收到的公共消息。


    爱丽丝将使用以下等式进行计算：


    ![](img/535492_1_En_2_Fig9_HTML.png)


    此示意图描述了爱丽丝和鲍勃的秘密计算。爱丽丝的计算是 `9 的 5 次方` 等于 59049，`59049 mod 13` 等于 3；鲍勃的计算是 `2 的
    4 次方` 等于 16，`16 mod 13` 等于 3。


    图 2-9


    爱丽丝和鲍勃得到相同的值


    `9⁵ (mod 13) = 59049 mod 13 = 3`


    鲍勃将使用以下等式进行计算：


    `2⁴ (mod 13) = 16 mod 13 = 3`


    爱丽丝和鲍勃都得到了相同的值。


    伊芙是一名黑客。她拦截了爱丽丝和鲍勃之间发送的消息。伊芙可以看到公共值（`g^a (mod p)`），`g` 是什么，她可以看到 `p` 是什么，并且她知道爱丽丝和鲍勃计算出的结果。然而，伊芙不知道爱丽丝和鲍勃选择的秘密数字，而且她很难找到这些数字。


    ![](img/535492_1_En_2_Fig10_HTML.png)


    此示意图描述了黑客伊芙不知道的爱丽丝和鲍勃的秘密值。这些值是：爱丽丝的 `a` 等于 5，鲍勃的 `b` 等于 4。爱丽丝和鲍勃商定 `g 的 a 次幂`，`模数
    p` 等于 13，底数 `g` 等于 6。


    图 2-10


    黑客伊芙不知道爱丽丝和鲍勃的秘密值


    从 Diffie 和 Hellman 的例子中，我们可以看到，爱丽丝和鲍勃都通过以下等式计算得到了相同的结果：


    `(g^a (mod p))^b mod p = (g^b (mod p))^a mod p`


    共享密钥是 `g^(ab)`。通常，`a`、`b` 和 `p` 的值会大得多。这是确保结果安全所必需的。


    在 Diffie 和 Hellman 最初的描述中，该算法不提供通信方的身份验证。这导致该算法容易受到中间人攻击。


    看下面的例子：


    伊芙拦截了爱丽丝和鲍勃之间的消息，并阻止他们之间的通信。


    伊芙拦截了爱丽丝的公共值（`g^a(mod p)`），并向爱丽丝发送她自己的公共值（`g^c(mod p)`）。


    伊芙拦截了鲍勃的公共值（`g^b(mod p)`），并向鲍勃发送她自己的公共值（`g^d(mod p)`）。


    爱丽丝和鲍勃都无法发现任何问题，他们可能都认为对方已经收到了自己的消息，但实际上，伊芙可以解密、读取、修改并重新加密他们的所有消息。


    ![](img/535492_1_En_2_Fig11_HTML.png)


    此图像描述了算法 `g 的 a 次幂 mod p` 容易受到中间人攻击。解释是黑客伊芙拦截了爱丽丝和鲍勃的消息，并阻断了他们之间的通信。


    图 2-11


    中间人攻击


    Diffie 和 Hellman 是第一个非对称密码学协议，并为许多认证协议（如现今广泛使用的椭圆曲线 Diffie-Hellman 非对称算法和 RSA）奠定了基础。加密技术、安全外壳协议（SSH）、安全套接层协议（SSL）、电子邮件和
    VPN 安全都基于这些非对称算法。


    ## 数字签名的工作原理


    如果爱丽丝想要通过互联网向鲍勃发送一条经过签名的消息，应遵循以下步骤：


    1.  我们从爱丽丝（发送方）的消息开始。

    2.  该算法基于文档的校验和生成消息的单向哈希值。

    3.  使用爱丽丝的私钥对该哈希值进行签名或加密。

    4.  将消息发送给鲍勃。

    5.  鲍勃接收消息。

    6.  鲍勃使用爱丽丝的公钥解密消息，并验证由爱丽丝签署的消息的认证性。

    7.  该算法重新生成消息的哈希值。

    8.  比较两个哈希值。如果它们相同，我们就能确保传输的文档自签名后未被篡改。


    数字签名的过程如图 2-12 所示。


    ![](img/535492_1_En_2_Fig12_HTML.png)


    此示意图描述了爱丽丝和鲍勃的数字签名过程。标记的过程是：原始文档，哈希值，签名/加密，私钥，公钥，解签/解密，原始文档，哈希值。


    图 2-12


    数字签名的过程

