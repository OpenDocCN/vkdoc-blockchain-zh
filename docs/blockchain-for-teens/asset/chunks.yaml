    爱丽丝想要向鲍勃发送支付，但她与鲍勃之间没有支付通道。爱丽丝与约翰有支付通道，而约翰又与鲍勃有支付通道。爱丽丝如何向鲍勃支付呢？


    鲍勃必须创建一个密码学密钥（key），使用 SHA-256 等哈希函数对其进行哈希运算，然后将哈希值发送给爱丽丝。鲍勃也将该哈希值分享给约翰。为简化这一文字说明，我们将用
    `V` 来表示该值。


    ![](img/535492_1_En_3_Figk_HTML.jpg)


    一幅图描绘了三个角色：爱丽丝、约翰和鲍勃。图中标注了 `V(8743 b)` 值以及一支笔和一把锁的符号。


    这个哈希值 `V` 就是锁；而密钥则是解锁 HTLC 的代码。


    爱丽丝与约翰创建了一个哈希时间锁定合约（HTLC），并告知约翰，如果他在两天内能提供 `V` 的原像，她就会向他支付。爱丽丝签署了一笔交易，其锁定时间设为广播后的两天。约翰在知晓
    `V` 后可以赎回该笔资金，之后，只有爱丽丝才能赎回。HTLC 允许爱丽丝向约翰做出有条件的承诺，同时确保如果约翰始终不知道 `V` 是什么，她的资金也不会意外损失。


    约翰也做了同样的事情，他与鲍勃创建了一个 HTLC，约定如果鲍勃能在一天内提供 `V`，他就会向鲍勃支付。然而，鲍勃实际上确实知道 `V`。因为鲍勃可以使用他的密钥从约翰那里提取所需金额，所以鲍勃可以认为来自爱丽丝的支付已完成。现在，他毫无保留地将
    `V` 告知约翰，以便他们也能收到各自的资金。


    鲍勃在一天内向约翰披露了他的密钥，鲍勃从而从约翰处获得支付。


    约翰在两天内向爱丽丝披露了他的密钥，约翰从而从爱丽丝处获得支付。


    ![](img/535492_1_En_3_Figl_HTML.jpg)


    一幅图描绘了三个角色：爱丽丝、约翰和鲍勃。图中指出了 1、2、3、4 BTC 的处理流程，并提及 `K = V`。


    在各方都配合完成后，所有这些交易都在闪电网络内部发生。每个人都以机械化的方式获得支付。闪电网络本质上是近乎原子化且双向的，这意味着要么每个人都得到支付，要么没人得到支付。


    在闪电网络中，当支付交易被广播时，所有单个交易都会先被验证，并且它们必须与交易历史记录匹配，以避免广播虚假或不正确的交易。对于欺诈交易还会施加惩罚，如果闪电网络检测到系统中有恶意行为者，他们会立即被收取罚金。通过这种方式，整个网络在抑制不良行为的同时，确保了可信度和一致性。


    ## 总结


    本章的主要目的是介绍比特币网络的基本概念。尽管这只是对比特币整个区块链的浅显涉猎，但本章为丰富你的比特币知识提供了机会。本章首先讨论了比特币的历史，然后我们学习了比特币的基本概念（包括比特币钱包和比特币网络）。接着，我们回顾了比特币交易，以帮助你熟悉比特币区块链背后的关键概念，这些概念构成了比特币网络的支柱。最后，我们还简要介绍了闪电网络的概念。


    在下一章中，我们将继续我们的学习之旅，探索以太坊：通往加密货币的门户。


    # 以太坊：通往加密货币的门户


    艾伦·图灵，数学家、逻辑学家和计算机科学家，被公认为计算机科学之父。20 世纪 30 年代，他发明了通用图灵机。假设有足够的内存，图灵机仅使用两个符号（0
    或 1）排列在潜在的无限一维序列中，就能计算出任何内容。这是第一台计算机的基础。因此，图灵完备性指的是任何可以在图灵完备环境中解决和实现的计算问题，无论其多么复杂。


    以太坊，仅次于比特币的第二大加密货币，被认为是一台分布式图灵机。它引入了一种内置的图灵完备编程语言——智能合约，可用于创建各种去中心化应用（也称为 Dapps）。


    上一章介绍了比特币，作为区块链技术的首次实现和世界上最流行的加密货币。


    在本章中，我们将继续探索以太坊区块链，它是作为图灵完备的区块链构建的。本章从以太坊的历史开始。接着，我们涵盖了许多以太坊的基本概念和基础操作，包括以太币、Gas
    和以太坊账户。然后，为了更深入、更全面地理解以太坊，我们概要性地概述了以太坊虚拟机（EVM）。我们还将了解重要的以太坊客户端和节点实现。最后，我们讨论以太坊如何工作，并探索其内部架构。


    本章的目标之一是帮助你掌握理解以太坊机制所需的技术背景，并让你准备好在下章开发你的第一个去中心化应用。


    本章围绕几个主要主题展开：


    -   以太坊的历史

    -   认识以太坊

    -   以太坊的工作原理


    ## 以太坊的历史


    维塔利克·布特林（Vitalik Buterin）是一位俄裔加拿大作家和程序员，自 2011 年（比特币诞生仅两年后）起便涉足比特币和加密货币领域。维塔利克成为一名作家，为《比特币杂志》网站每写一篇文章就能赚取
    5 个比特币。很快，他成为了《比特币杂志》的联合创始人。随着对比特币理解的加深，布特林成为了比特币专家，并意识到了比特币功能的局限性。2013 年，维塔利克用六个月时间环游世界，学习、会面并与比特币开发者交流。他认识到，通过在比特币的基础上进行迭代，他可以构建一个新的、可能更好的区块链版本。


    ### 白皮书发布（2013 年 11 月）


    2013 年 11 月，年仅 19 岁的维塔利克发表了一篇题为《以太坊：下一代智能合约和去中心化应用平台》的白皮书，阐述了以太坊的总体构想。


    这篇解释以太坊概念的白皮书包含以下内容：


    -   它提供了一种内置的图灵完备编程语言，可用于创建“智能合约”——一种在区块链上运行的自动执行程序。

    -   它在区块链中建立了点对点交易。该平台可以创建和构建智能合约和去中心化应用，允许任何人定义、创建和交换各种类型的价值：加密货币、股票以及许多其他资产。


    ### 黄皮书发布（2014 年 4 月）


    2014 年 4 月，加文·伍德博士发布了以太坊黄皮书，对以太坊协议给出了技术定义——《以太坊：一种安全的去中心化通用交易账本》，该黄皮书描述了以太坊协议的技术定义。


    ### 以太坊的诞生（2014 年 7 月）


    以太坊于 2014 年 1 月在迈阿密的北美比特币大会上公开宣布。作为非营利组织，以太坊基金会于 2014 年 7 月 6 日在瑞士楚格成立。以太坊的创始成员包括维塔利克·布特林、加文·伍德、查尔斯·霍斯金森、安东尼·迪·伊奥里奥、米哈伊·阿利塞和乔·鲁宾。


    ### 启动以太币销售（2014 年 7 月至 9 月）


    2014 年 7 月 20 日，以太坊基金会启动了一项为期 42 天的众筹活动。2014 年 9 月 2 日，公开众筹结束。以太坊基金会筹集了 31,591
    个比特币，在销售结束时价值约 1800 万美元。


    ### 以太坊发布（2015 年 6 月）


    在 2014 年和 2015 年期间，开发了许多概念验证。“Olympic”是第九个也是最后一个原型。2015 年 6 月 30 日，以太坊上线，并创建了第一个“创世区块”。

