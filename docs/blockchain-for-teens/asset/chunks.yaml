- fmt: '### Rarible


    `Rarible` is very similar to `OpenSea`—the platform allows users to buy, sell,
    and make art, videos, collectibles, and music. However, `Rarible` uses its own
    token (`CRYPTO:RARI`), which is also supported on `OpenSea`. `Yum! Brands'' (NYSE:YUM)`
    `Taco Bell` has listed art on `Rarible`, and cloud software company `Adobe (NASDAQ:ADBE)`
    has partnered with `Rarible`:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figi_HTML.png)


    A snapshot of the advantages and disadvantages of the `Rarible` platform.


    ### SuperRare


    Another marketplace for digital creators, similar to `OpenSea` and `Rarible`,
    is `SuperRare`. The site includes art, videos, and 3D images that can be purchased
    using `Ethereum`, although many `SuperRare` `NFTs` cannot be purchased anywhere
    else. Every `NFT` is also a single edition. `SuperRare` announced its own token.
    `SuperRare` `NFTs` can be traded on `OpenSea`. `SuperRare` is also unique in the
    fact that it allows artists to upload `NSFW`, which stands for `Not Safe for Work`.
    `NSFW` is content that depicts sexual content, nudity, violence, and other potentially
    triggering topics for viewers:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figj_HTML.png)


    A snapshot of the advantages and disadvantages of the `SuperRare` platform.


    ### Foundation


    `Foundation.app` is a place for auctioning and bidding on digital art using `Ethereum`.
    Over `$100` million worth of `NFTs` have been sold on the platform. However, creating
    an account on the platform requires an invite from an existing `Foundation` community
    member:


    ![](images/535492_1_En_6_Chapter/535492_1_En_6_Figk_HTML.png)


    A snapshot of the advantages and disadvantages of the `Foundation` app.


    ### Nifty Gateway


    `Nifty Gateway` has helped the sale of some of the most famous digital artists
    including `Beeple` and singer and songwriter `Grimes`. However, to get started,
    you must be an already established digital artist, celebrity, or brand and be
    approved to sell through an application process. The site is powered by the crypto
    exchange `Gemini`, and the `NFTs`, known as `Nifties`, are built on `Ethereum`.
    `Nifty Gateway` also hosts any `NFTs` purchased—meaning the `NFTs` aren''t stored
    in your own wallet but are actually stored in `Nifty Gateway`:


