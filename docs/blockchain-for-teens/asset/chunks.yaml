  trans: '

    #### 走向主流


    **`Overstock`接受比特币支付（2014 年 1 月）** – `Overstock`（纳斯达克：`OSTK`）于 2014 年 1 月推出国际支付系统以接受比特币，成为首家支持加密货币的大型在线购物商城。


    **`Mt. Gox`遭黑客攻击（2014 年 2 月）** – 2014 年初，`Mt. Gox`是全球最大的比特币交易所，处理了全球超过 70%的比特币交易。


    2014 年 2 月 7 日，`Mt. Gox`突然暂停所有比特币提现，声称其比特币钱包出现“异常活动”，并“在过去几周内进行了调查”。随后，2014 年
    2 月 24 日，该交易所暂停所有交易并关闭网站。


    2 月 28 日，`Mt. Gox`申请破产保护。在`Mt. Gox`事件期间，比特币价值下跌 40%，引发长达两年的熊市。作为大规模黑客攻击的受害者，`Mt.
    Gox`损失了约 744,408 枚比特币（占当时所有比特币的 6%），另有 100,000 枚比特币作为公司负债。尽管后来找回 20 万枚比特币，但剩余的
    65 万枚至今未能追回。


    **比特币纳税（2014 年 3 月）** – 自 2009 年首次公开交易以来，比特币持有者一直对比特币支付的合法性问题感到担忧，直到美国国税局（IRS）发布相关规定。随着
    2013 年比特币市场的爆发式增长，IRS 于 2014 年 3 月发布了`Notice 2014-21`、`2014-16 I.R.B. 938PDF`，明确将加密货币持有视为“财产”用于税收目的，而非合法的国家支持货币。因此，所有新挖出的比特币在联邦所得税层面将被视为财产，与股票、房地产或黄金等其他资产性质相同。


    **微软接受比特币支付（2014 年 12 月）** – 2014 年 12 月，微软（纳斯达克：`MSFT`）成为首批支持比特币的大型科技公司之一。该公司宣布接受数字货币作为支付选项，用于购买
    Windows、Windows Phone、Xbox 游戏和 Xbox 音乐等商店的数字内容。微软的支付系统通过与`BitPay`（一家成立于 2011 年的比特币支付服务提供商）集成来处理比特币交易。


    **纽约 BitLicense（2015 年 6 月）** – 2015 年 6 月，纽约州金融服务部（DFS）发布了`BitLicense`监管规定。该规定要求纽约州内从事虚拟货币交易（包括传输、挖矿及买卖虚拟货币）的公司向
    DFS 申请`BitLicense`。2015 年 9 月，总部位于波士顿的 Circle Internet Financial（一家全球加密金融公司）获得了首个`BitLicense`。此后，PayPal、Coinbase、Ripple
    Labs、BitPay、Square、Robinhood 和 NYDIG 等多家公司获得了在纽约运营加密业务的许可证。


    **CFTC 将比特币归类为大宗商品（2015 年 9 月）** – 2015 年 9 月，美国商品期货交易委员会（CFTC）根据《美国商品交易法》（CEA）将比特币及其他虚拟货币归类为大宗商品。CFTC
    是美国独立的联邦机构，负责监管美国衍生品市场，包括商品期货及金融期货与期权的销售。因此，比特币交易与黄金、石油等大宗商品一样，必须接受 CFTC 在美国境内的监管。新规开始限制未注册的公司交易加密货币产品。


    2018 年 1 月，CFTC 对被告 Patrick McDonnell 及其公司 CabbageTech, Corp.提起诉讼，指控其运营欺诈性虚拟货币计划诱导客户。纽约联邦法官认可并采纳了
    CFTC 的立场，即虚拟货币属于《商品交易法》定义范围内的大宗商品。这是首例测试 CFTC 遏制加密货币行业欺诈行为能力的案件。


    **欧盟将比特币归类为货币（2015 年 10 月）** – 2015 年 10 月，欧洲最高法院裁定比特币应被视为货币，与其他货币具有同等地位。因此，比特币不免征增值税（VAT）。VAT
    是欧盟对所有商品和服务征收的消费税。

    '
- fmt: '# The Block Size War


    In the Bitcoin network, miners use proof-of-work consensus to create a block every
    ten minutes. A block in Bitcoin is limited to one megabyte. As Bitcoin adoption
    became widespread, transaction volume dramatically increased, and more transactions
    needed to be processed in the network within a one-megabyte size limitation. It
    slowed down transaction processing speeds, and high amount transaction fees could
    cost a user $58-60 per transaction. However, Satoshi added a maximum block size
    limit of 1 MB in July 2010 without any comment or explanation (`https://sourceforge.net/p/bitcoin/code/103/`).


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig5_HTML.png)


    A table displays the number of coin values and a description with highlighted
    value max block size 1000000. It represents the bitcoin max block size 1 MB.


    Figure 3-5 Bitcoin max block size 1 MB


    It opened up a debated topic, "constitutional crisis," in the Bitcoin community
    over the years, even until today. During 2015 and 2017, a debate about increasing
    the limit size of Bitcoin''s blockchain blocks heavily took place in the Bitcoin
    community.


    To solve scalability issues, the community split into two major solutions:


    One side (big blockers solution) was to increase the block size, allowing more
    transactions to fit into each block and making transactions cheaper. However,
    a larger block size also requires higher transmission time, and it is just a temporary
    solution. When users continue to increase in the network, the new block size will
    become a limitation again. It is not a long-term solution.


    Because Bitcoin is decentralized, any proposed consensus changes must receive
    significant support from the Bitcoin community. When the Bitcoin community does
    not agree on the proposal, it will result in "forking." Blockchain has two kinds
    of forks—soft and hard. A soft fork applies newly implemented changes to an existing
    blockchain, and the modification will support backward compacity. The majority
    of the participating nodes agree on the changes. The old node will accept the
    new node after changes. Hard forks make a radical change to the Bitcoin protocol
    and lead to a chain splitting two ways. The new chain will not need backward support
    compacity, and the old node in the original chain will not accept the new node
    from the new chain. Hard fork requires a majority of miner support for the long
    term—otherwise, the new network will fail.


    Big blocker solutions lead to several hard forks—Bitcoin XT, Classic, Unlimited,
    Bitcoin Cash, and SV. Some of them have failed, and others are still around today.


    The other solution (small blockers) is to remain at 1 MB block size and scale
    via layer-two solutions, giving end users the easy option to run a node. The solution
    includes SegWit soft fork Lighting Network. We will discuss this in more detail
    in a later section.


    ## Bitcoin XT (August 2015)


    Bitcoin XT was one of the first notable hard forks of Bitcoin Core.


    On June 10, 2014, Mike Hearn published a Bitcoin Improvement Proposal (`BIP 64`)
    calling for "a small P2P protocol extension that performs UTXO lookups given a
    set of outpoints."


    On June 22, 2015, Gavin Andresen published `BIP 101`, calling for "an increase
    in the maximum block size."


    The changes would increase the block size from 1 MB to 8 MB and then double every
    two years until 2036. The block size would eventually be around 8 GB.


    In August 2015, Bitcoin XT launched with an eight MB block size. In the first
    few months, more than 1,000 nodes ran in Bitcoin XT. However, the Bitcoin community
    hasn''t widely supported Bitcoin XT protocol. As a result, block size debates
    gained media attention and were seen on various social media channels—especially
    Reddit. It started to bring the scaling debate over the years.


    Many community members are worried that a larger block size will lead to Bitcoin''s
    centralization, which, as one critic quotes, is "against the ethics of Satoshi
    Nakamoto." A few months later, the project lost users'' and node operators'' interest,
    essentially fell away, and was abandoned by its users.


    ## The Lightning Network whitepaper (January 2016)


    Joseph Poon and Thaddeus Dryja published the Lightning Network white paper on
    January 16, 2016. The white paper proposed a protocol called "the lightning network"
    that speeds up transactions by creating a second layer on top of the Bitcoin blockchain
    that uses user-generated micropayment channels to perform more efficient transactions.
    These transactions are very fast because no miners are involved, and transaction
    fees are much lower or even unnecessary without changing the block size. Small
    blockers support it as one of Bitcoin''s scalability solutions.


    ## Bitcoin Classic (January 2016)


    In early 2016, a group of Bitcoin community members proposed increasing the maximum
    size of Bitcoin blocks from 1 MB to 2 MB, which is less aggressive than what was
    proposed by Bitcoin XT—8 MB. As a result, a group of developers launched Bitcoin
    Classic. At the beginning of 2016, Bitcoin Classic had hard forks from Bitcoin.
    It had about 2,000 nodes initially operated on the network, but Bitcoin Classic
    never reached massive adoption from the community. A year later, there were no
    more than 100 nodes in the network. Although Bitcoin Classic is still alive today,
    compared to Bitcoin''s price today, $23,028, it is only valued at $0.027632.


    ## The Hong Kong Agreement – SegWit proposal (February 2016)


    In February 2016, developer Peter Wuille presented an idea called "segregated
    witness and its impact on scalability" (`SegWitness` or `SegWit`) at Hong Kong''s
    Cyberport Bitcoin conference. Signature data is bulky compared to other transaction
    input and takes up 65% of the space. Therefore, it quickly filled up the block.
    `SegWit` is a mechanism that separates witness signature data from the input field
    of the block transaction by creating its own individual tree. It allows for the
    computation of transaction IDs without signatures, and light clients can skip
    the separated data entry entirely. Signatures will act as "witnesses" when needed
    to authorize transaction outputs from the original owners. Bitcoin includes a
    mechanism that validates these signatures using checkpoints. `SegWit` enables
    more transactions to be stored within a block.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig6_HTML.png)


    A block diagram classifies transaction before segwit and transaction after segwit.
    It includes input, output, and witness data.


    Figure 3-6 Bitcoin SegWit


    `SegWit` immediately ignited a new discussion within the community. After the
    conference, the Bitcoin community agreed to use `SegWit` as a future soft-fork
    release and continue working on a safe hard fork based on `SegWit` improvements,
    including increasing the nonwitness data to be around 2 MB.


    ## New York Agreement (NYA) (May 2017)


    On May 23, 2017, 58 Bitcoin companies across 22 countries representing over 85%
    of the network computing power held a meeting to decide the future of BTC. The
    meeting aimed to resolve Bitcoin''s scaling issues and the conflict by doing a
    soft and a hard fork. The NYA published a statement known as the `SegWit2x` upgrade
    (essentially the same as the Hong Kong agreement). The aims were:


    * Activate Segregated Witness at an 80% threshold, signaling at bit 4

    * Activate a 2 MB hard fork within six months


    The solution was to compromise between people wanting `SegWit` and others a hard
    fork.


    ## SegWit Activated (August 2017)


    On August 8, 2017, 100% of the Bitcoin mining pools signaled support for `SegWit`.
    Segregated Witness was activated on August 24, 2017. According to `buybitcoinworldwide.com`
    data, around 84% Bitcoin nodes have adopted `SegWit` as of July 2022.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig7_HTML.png)'
