- fmt: "### Ethereum Network\n\nTypically, when people are discussing the Ethereum\
    \ network and ETH prices, they are talking about the Ethereum mainnet. The mainnet\
    \ is the primary public Ethereum production blockchain. When we deploy a smart\
    \ contract to mainnet, we have to pay gas fees, and these gas fees cost real money.\
    \ Since the nodes connected in Ethereum run a protocol, there are many other similar\
    \ controlled public environments that run the similar or same protocol to simulate\
    \ the mainnet environments. Contract developers can run and test smart contracts\
    \ in these production-like environments to ensure that the result is working as\
    \ expected. These public networks we call Ethereum testnet.\n\nIn testnet, you\
    \ don’t spend real money when testing your smart contracts. Ethereum testnet provides\
    \ free ethers you can use to pay for gas fees. These ethers can only use in testnet,\
    \ not for any other environments, and they have no value in the real world. As\
    \ the best practice, you should test your smart contract code in the testnet before\
    \ deploying it to the mainnet.\n\nMany testnets use a proof-of-authority consensus\
    \ mechanism. A smart number of nodes are chosen as a validator to do consensus\
    \ work and create new blocks. Testnets do not incentivize proof-of-work mining.\
    \ There are a few Ethereum test networks available. You can choose your own favorite\
    \ testnet. Since the Ethereum 2.0 merged on Sep 15, 2022, few public proof-of-work\
    \ and proof-of-authority testnets became proof-of-stake. Some popular testnet\
    \ will soon be deprecated, like Ropsten, Rinkeby, and Kovan. We will not discuss\
    \ these testnets here. Goerli testnet is a proof-of-authority testnet. It merged\
    \ to proof-of-stake and is expected to be maintained long-term as a proof-of-stake\
    \ testnet.\n\nThe Görli test network was established in March 2019. It is a Proof-of-Authority\
    \ testnet using the Clique consensus mechanism for Ethereum, originally proposed\
    \ by Chainsafe and Afri Schoedon. You can use the official Goerli Testnet Faucet\
    \ ([`https://goerli-faucet.slock.it/`](https://goerli-faucet.slock.it/)) to acquire\
    \ free ETH. In a later section, we will use Goerli Testnet to get some ether to\
    \ our wallet.\n\nNow, we have covered most of the basic Ethereum fundamentals.\
    \ In the next section, we will go over how Ethereum works.\n\n## How Ethereum\
    \ Works\n\nAs we learned earlier, there is a multi-phased upgrade that aims to\
    \ switch from a current proof-of-work (PoW) consensus mechanism to a proof-of-stake\
    \ (PoS) model. In PoW, the miner verified transactions and added transactions\
    \ to a new block. The new block is broadcast to the entire network, and validators\
    \ will verify and eventually commit to the Ethereum network. The process typically\
    \ takes at a constant rate of between 10 and 20 seconds. In ETH 2.0 PoS, the network\
    \ could speed up to 100,000 transactions per second capacity.\n\nIn Ethereum,\
    \ a transaction is initiated and securely signed by a user's EOA account. For\
    \ example, Alice wants to send one Ether to bob. Alice will initiate a transaction\
    \ for this transfer. Next, the Ethereum network transmits the transaction. Once\
    \ the transfer completes, Bob's account will be debited one Ether and Alice's\
    \ must be credited. Ethereum is a singleton world state machine. Transactions\
    \ are the only things that can trigger a change and update the state of Ethereum.\
    \ Figure [4-15](#535492_1_En_4_Chapter.xhtml#Fig15) depicts the changing state\
    \ of Ethereum in a transaction.\n\nThere are three types of transactions in Ethereum:\n\
    \n1. Transactions that transfer funds between two EOAs (e.g., Alice sends one\
    \ Ether to Bob).\n2. Transactions that deploy a contract.\n3. Transactions that\
    \ interact and execute a deployed contract function (e.g., update a total token\
    \ supply).\n\n### The Structure of a Transaction\n\nThe blockchain requires a\
    \ gas fee for miner mining and verifying when a user submits a transaction.\n\n\
    Let's use Geth console to submit one transaction by transfer 0.05 Ether and then,\
    \ get the transaction receipt from the returning transaction hash as shown in\
    \ Figure [4-16](#535492_1_En_4_Chapter.xhtml#Fig16).\n\n![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig16_HTML.png)\n\
    \nA code to submit a transaction and to get a receipt. The code contains alphanumeric\
    \ letters.\n\nFigure 4-16 Submit a transaction and get a transaction receipt\n\
    \nFrom logs of Geth, we can see that transaction is submitted, a transaction hash,\
    \ and a nonce is generated:\n\n![](images/535492_1_En_4_Chapter/535492_1_En_4_Figm_HTML.png)\n\
    \nAn image of the submitted Geth transaction and the transaction hash is generated\
    \ with text and letters.\n\nFigure [4-17](#535492_1_En_4_Chapter.xhtml#Fig17)\
    \ shows an example of the transaction detail from etherscan.io.\n\n![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig17_HTML.png)\n\
    \nA screenshot of overview tab that lists transaction details like transaction\
    \ hash, status, block, from and to, and value. State and comments tab are present.\n\
    \nFigure 4-17 Submit a transaction and get a transaction receipt\n\nA transaction\
    \ detail contains the following data:\n\n**From** – The sender's Ethereum address.\
    \  \n**To** – The receiver's Ethereum address.  \n**Nonce** – The sequence number\
    \ of a transaction. The Nonce is issued by the originating EOA, which initiates\
    \ the transaction. It is a unique number and prevents to replay of the same transaction.\
    \  \n**Gas Price** – The required transaction fee in the price of gas (in Gwei)\
    \ that the transaction creator pays.  \n**Gas Limit** – Maximum limit of gas that\
    \ would be consumed for the transaction.  \n**Value** – The amount of ether to\
    \ send to the recipient.  \n**Data** – Transaction input binary payload data that\
    \ is only used for sending a message call and executing functions of the contract.\
    \  \n**Signature** – v, r, s. It is the identification of the sender. The sender\
    \ uses EOA to sign the transaction via its private key. It uses a cryptographic\
    \ ECDSA digital signature. v, r, and s are the values for the transaction's signature.\n\
    \nTake your time to read this long list. You don't need to memorize each one of\
    \ the fields. We describe each field to help you to understand what they mean.\
    \ These terms may quite often appear when you work on more in Ethereum.\n\n###\
    \ Transaction Receipt\n\nIn Figure [4-16](#535492_1_En_4_Chapter.xhtml#Fig16),\
    \ we see the transaction receipt output after running `web3.eth.getTransactionReceipt(transactionHash)`.\
    \ When the transaction receipt becomes available, it means that the transaction\
    \ is added to a block. When a transaction is a pending status, the receipt returns\
    \ `null`.\n\nHere are the fields that the transaction receipt contains:\n\n**BlockHash**\
    \ – Hash of the block where this transaction was in.  \n**BlockNumber** – This\
    \ transaction block number.  \n**TransactionHash** – String, 32 Bytes—hash of\
    \ the transaction.  \n**TransactionIndex** – The transactions index position in\
    \ the block.  \n**From** – The sender's Ethereum address.  \n**To** – The receiver's\
    \ Ethereum address. `Null` when it's a contract creation transaction.  \n**CumulativeGasUsed**\
    \ – The total amount of gas used by this transaction and all previous transactions\
    \ in the same block.  \n**GasUsed** – The total amount of gas used by this specific\
    \ transaction.  \n**ContractAddress** – The contract address is associated with\
    \ this transaction. If the transaction was a contract creation, otherwise `null`.\
    \  \n**Logs** – Log information for this transaction.  \n**Status** – `0x0` indicates\
    \ transaction failure, `0x1` indicates transaction succeeded."
  raw: '### Ethereum Network


    Typically, when people are discussing the Ethereum network and ETH prices, they
    are talking about the Ethereum mainnet. The mainnet is the primary public Ethereum
    production blockchain. When we deploy a smart contract to mainnet, we have to
    pay gas fees, and these gas fees cost real money. Since the nodes connected in
    Ethereum run a protocol, there are many other similar controlled public environments
    that run the similar or same protocol to simulate the mainnet environments. Contract
    developers can run and test smart contracts in these production-like environments
    to ensure that the result is working as expected. These public networks we call
    Ethereum testnet.


    In testnet, you don’t spend real money when testing your smart contracts. Ethereum
    testnet provides free ethers you can use to pay for gas fees. These ethers can
    only use in testnet, not for any other environments, and they have no value in
    the real world. As the best practice, you should test your smart contract code
    in the testnet before deploying it to the mainnet.


    Many testnets use a proof-of-authority consensus mechanism. A smart number of
    nodes are chosen as a validator to do consensus work and create new blocks. Testnets
    do not incentivize proof-of-work mining. There are a few Ethereum test networks
    available. You can choose your own favorite testnet. Since the Ethereum 2.0 merged
    on Sep 15, 2022, few public proof-of-work and proof-of-authority testnets became
    proof-of-stake. Some popular testnet will soon be deprecated, like Ropsten, Rinkeby,
    and Kovan. We will not discuss these testnets here. Goerli testnet is a proof-of-authority
    testnet. It merged to proof-of-stake and is expected to be maintained long-term
    as a proof-of-stake testnet.


    The Görli test network was established in March 2019\. It is a Proof-of-Authority
    testnet using the Clique consensus mechanism for Ethereum, originally proposed
    by Chainsafe and Afri Schoedon. You can use the official Goerli Testnet Faucet
    ([`https://goerli-faucet.slock.it/`](https://goerli-faucet.slock.it/)) to acquire
    free ETH. In a later section, we will use Goerli Testnet to get some ether to
    our wallet.


    Now, we have covered most of the basic Ethereum fundamentals. In the next section,
    we will go over how Ethereum works.


    ## How Ethereum Works


    As we learned earlier, there is a multi-phased upgrade that aims to switch from
    a current proof-of-work (PoW) consensus mechanism to a proof-of-stake (PoS) model.
    In PoW, the miner verified transactions and added transactions to a new block.
    The new block is broadcast to the entire network, and validators will verify and
    eventually commit to the Ethereum network. The process typically takes at a constant
    rate of between 10 and 20 seconds. In ETH 2.0 PoS, the network could speed up
    to 100,000 transactions per second capacity.


    In Ethereum, a transaction is initiated and securely signed by a user’s EOA account.
    For example, Alice wants to send one Ether to bob. Alice will initiate a transaction
    for this transfer. Next, the Ethereum network transmits the transaction. Once
    the transfer completes, Bob’s account will be debited one Ether and Alice’s must
    be credited. Ethereum is a singleton world state machine. Transactions are the
    only things that can trigger a change and update the state of Ethereum. Figure
    [4-15](#535492_1_En_4_Chapter.xhtml#Fig15) depicts the changing state of Ethereum
    in a transaction.


    There are three types of transactions in Ethereum:


    1.  Transactions that transfer funds between two EOAs (e.g., Alice sends one Ether
    to Bob).


    2.  Transactions that deploy a contract.


    3.  Transactions that interact and execute a deployed contract function (e.g.,
    update a total token supply).


    ### The Structure of a Transaction


    The blockchain requires a gas fee for miner mining and verifying when a user submits
    a transaction.


    Let’s use Geth console to submit one transaction by transfer 0.05 Ether and then,
    get the transaction receipt from the returning transaction hash as shown in Figure
    [4-16](#535492_1_En_4_Chapter.xhtml#Fig16).


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig16_HTML.png)


    A code to submit a transaction and to get a receipt. The code contains alphanumeric
    letters.


    Figure 4-16


    Submit a transaction and get a transaction receipt


    From logs of Geth, we can see that transaction is submitted, a transaction hash,
    and a nonce is generated:


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figm_HTML.png)


    An image of the submitted Geth transaction and the transaction hash is generated
    with text and letters.


    Figure [4-17](#535492_1_En_4_Chapter.xhtml#Fig17) shows an example of the transaction
    detail from etherscan.io.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig17_HTML.png)


    A screenshot of overview tab that lists transaction details like transaction hash,
    status, block, from and to, and value. State and comments tab are present.


    Figure 4-17


    Submit a transaction and get a transaction receipt


    A transaction detail contains the following data:


    **From** – The sender’s Ethereum address.


    **To** – The receiver’s Ethereum address.


    **Nonce** – The sequence number of a transaction. The Nonce is issued by the originating
    EOA, which initiates the transaction. It is a unique number and prevents to replay
    of the same transaction.


    **Gas Price** – The required transaction fee in the price of gas (in Gwei) that
    the transaction creator pays.


    **Gas Limit** – Maximum limit of gas that would be consumed for the transaction.


    **Value** – The amount of ether to send to the recipient.


    **Data** – Transaction input binary payload data that is only used for sending
    a message call and executing functions of the contract.


    **Signature** – v, r, s. It is the identification of the sender. The sender uses
    EOA to sign the transaction via its private key. It uses a cryptographic ECDSA
    digital signature. v, r, and s are the values for the transaction’s signature.


    Take your time to read this long list. You don’t need to memorize each one of
    the fields. We describe each field to help you to understand what they mean. These
    terms may quite often appear when you work on more in Ethereum.


    ### Transaction Receipt


    In Figure [4-16](#535492_1_En_4_Chapter.xhtml#Fig16), we see the transaction receipt
    output after running web3.eth.getTransactionReceipt(transactionHash). When the
    transaction receipt becomes available, it means that the transaction is added
    to a block. When a transaction is a pending status, the receipt returns null.


    Here are the fields that the transaction receipt contains:


    **BlockHash** – Hash of the block where this transaction was in.


    **BlockNumber** – This transaction block number.


    **TransactionHash** – String, 32 Bytes—hash of the transaction.


    **TransactionIndex** – The transactions index position in the block.


    **From** – The sender’s Ethereum address.


    **To** – The receiver’s Ethereum address. Null when it’s a contract creation transaction.


    **CumulativeGasUsed** – The total amount of gas used by this transaction and all
    previous transactions in the same block.


    **GasUsed** – The total amount of gas used by this specific transaction.


    **ContractAddress** – The contract address is associated with this transaction.
    If the transaction was a contract creation, otherwise null.


    **Logs** – Log information for this transaction.


    **Status** – “0x0” indicates transaction failure, “0x1” indicates transaction
    succeeded.'
  trans: "\n### 以太坊网络\n\n通常，人们讨论以太坊网络和 ETH 价格时，指的是以太坊主网（mainnet）。主网是最主要的公共以太坊生产区块链。当我们向主网部署智能合约时，必须支付\
    \ Gas 费用，而这些 Gas 费是真实的金钱。由于连接在以太坊上的节点运行着一种协议，因此还有许多其他类似的、受控的公共环境运行着相同或相似的协议来模拟主网环境。合约开发者可以在这些类生产环境中运行和测试智能合约，以确保结果符合预期。这些公共网络我们称之为以太坊测试网（testnet）。\n\
    \n在测试网中，测试智能合约时你不会花费真实金钱。以太坊测试网提供免费的以太币（Ether），供你支付 Gas 费用。这些以太币只能在测试网中使用，不适用于任何其他环境，并且在现实世界中毫无价值。作为最佳实践，你应该先在测试网中测试智能合约代码，之后再部署到主网。\n\
    \n许多测试网采用权威证明（proof-of-authority）共识机制。少数节点被选为验证者（validator）来执行共识工作并创建新区块。测试网不会激励工作量证明（proof-of-work）挖矿。有几个以太坊测试网络可供使用，你可以选择自己喜欢的测试网。自\
    \ 2022 年 9 月 15 日以太坊 2.0 合并以来，少数公共工作量证明和权威证明测试网已转变为权益证明（proof-of-stake）。一些流行的测试网（如\
    \ Ropsten、Rinkeby 和 Kovan）即将被弃用。我们在此不讨论这些测试网。Goerli 测试网是一个权威证明测试网，它已合并为权益证明，并预计将作为权益证明测试网长期维护。\n\
    \nGörli 测试网络于 2019 年 3 月建立。它是一个采用以太坊 Clique 共识机制的权威证明测试网，最初由 Chainsafe 和 Afri\
    \ Schoedon 提出。你可以使用官方的 Goerli 测试网水龙头（[`https://goerli-faucet.slock.it/`](https://goerli-faucet.slock.it/)）获取免费\
    \ ETH。在后续章节中，我们将使用 Goerli 测试网将一些以太币存入我们的钱包。\n\n现在，我们已经涵盖了大部分以太坊基础知识。在下一节中，我们将探讨以太坊是如何工作的。\n\
    \n## 以太坊的工作原理\n\n正如我们之前所了解的，存在一个多阶段的升级，旨在从当前的工作量证明（PoW）共识机制切换到权益证明（PoS）模型。在 PoW\
    \ 中，矿工验证交易并将交易添加到新区块。新区块被广播到整个网络，验证者将进行验证并最终提交到以太坊网络。这个过程通常以 10 到 20 秒的恒定速率进行。在\
    \ ETH 2.0 的 PoS 中，网络处理能力可达每秒 10 万笔交易。\n\n在以太坊中，交易由用户的 EOA 账户发起并安全签名。例如，Alice 想向\
    \ Bob 发送一个以太币。Alice 将为此转账发起一笔交易。接着，以太坊网络传输该交易。一旦转账完成，Bob 的账户将增加一个以太币，而 Alice 的账户必须减少一个以太币。以太坊是一个单一的世界状态机。交易是唯一能触发变化并更新以太坊状态的事物。图\
    \ 4-15 描述了一笔交易中以太坊状态的变化。\n\n以太坊中有三种类型的交易：\n\n1.  在两个 EOA 之间转移资金的交易（例如，Alice 向\
    \ Bob 发送一个以太币）。\n2.  部署合约的交易。\n3.  与已部署合约函数进行交互并执行的交易（例如，更新代币总供应量）。\n\n### 交易的结构\n\
    \n当用户提交交易时，区块链需要为矿工的挖矿和验证支付 Gas 费用。\n\n让我们使用 Geth 控制台提交一笔转账 0.05 以太币的交易，然后从返回的交易哈希中获取交易收据，如图\
    \ 4-16 所示。\n\n![](img/535492_1_En_4_Fig16_HTML.png)\n\n提交交易并获取收据的代码。代码包含字母数字字符。\n\
    \n图 4-16 提交交易并获取交易收据\n\n从 Geth 的日志中，我们可以看到交易已提交，并生成了一个交易哈希和一个随机数（nonce）：\n\n![](img/535492_1_En_4_Figm_HTML.png)\n\
    \n显示已提交的 Geth 交易及生成的交易哈希的图像，包含文本和字母。\n\n图 4-17 展示了来自 etherscan.io 的交易详情示例。\n\n\
    ![](img/535492_1_En_4_Fig17_HTML.png)\n\n概述标签页的截图，列出了交易详情，如交易哈希、状态、区块、发送方和接收方以及价值。同时显示了状态和备注标签页。\n\
    \n图 4-17 提交交易并获取交易收据\n\n一笔交易详情包含以下数据：\n\n**From（发送方）** – 发送方的以太坊地址。  \n**To（接收方）**\
    \ – 接收方的以太坊地址。  \n**Nonce（随机数）** – 交易的序列号。Nonce 由发起交易的原始 EOA 发出。它是一个唯一数字，用于防止重放同一笔交易。\
    \  \n**Gas Price（Gas 价格）** – 交易创建者支付的每单位 Gas 的交易费用（以 Gwei 为单位）。  \n**Gas Limit（Gas\
    \ 限制）** – 该交易最多可消耗的 Gas 量。  \n**Value（价值）** – 发送给接收方的以太币数量。  \n**Data（数据）** –\
    \ 交易输入的二进制的载荷数据，仅用于发送消息调用和执行合约函数。  \n**Signature（签名）** – v, r, s。这是发送方的身份标识。发送方使用\
    \ EOA 通过其私钥对交易进行签名。它使用加密的 ECDSA 数字签名。v、r 和 s 是交易签名的值。\n\n请花点时间阅读这个长列表。你不需要记住每一个字段。我们描述每个字段是为了帮助你理解它们的含义。当你在以太坊中进行更深入的工作时，这些术语可能会频繁出现。\n\
    \n### 交易收据\n\n在图 4-16 中，我们在运行 `web3.eth.getTransactionReceipt(transactionHash)`\
    \ 后看到了交易收据输出。当交易收据可用时，意味着该交易已被添加到一个区块中。当交易处于待处理（pending）状态时，收据返回 `null`。\n\n以下是交易收据包含的字段：\n\
    \n**BlockHash** – 包含该交易的区块的哈希。  \n**BlockNumber** – 该交易所在区块的编号。  \n**TransactionHash**\
    \ – 字符串，32 字节——交易的哈希。  \n**TransactionIndex** – 交易在区块中的索引位置。  \n**From** – 发送方的以太坊地址。\
    \  \n**To** – 接收方的以太坊地址。如果是合约创建交易，则为 `null`。  \n**CumulativeGasUsed** – 该笔交易以及同一区块中所有先前交易消耗的\
    \ Gas 总量。  \n**GasUsed** – 该笔特定交易消耗的 Gas 总量。  \n**ContractAddress** – 与该交易关联的合约地址。如果交易是合约创建，则返回合约地址，否则为\
    \ `null`。  \n**Logs** – 该交易的日志信息。  \n**Status** – `0x0` 表示交易失败，`0x1` 表示交易成功。\n\
    \n"
- fmt: "### Block\n\n如第[1](#535492_1_En_1_Chapter.xhtml)章所述，每个区块都有头部和体部。区块体包含一系列交易。这一点对比特币和以太坊都是成立的。以太坊的区块结构如图[4-18](#535492_1_En_4_Chapter.xhtml#Fig18)所示。\n\
    \n![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig18_HTML.jpg)\n\n图4-18展示了区块头部和区块体部的两个区块。区块体部包含两个子块：交易和叔块头部。\n\
    \n**图 4-18**  \n以太坊区块结构\n\n以太坊的区块体部还包含“ommer”块，通常被称为“uncle”块（叔块）。当多个区块解决方案被找到时，叔块会被创建，用于奖励矿工。\n\
    \n当多个矿工解出密码学难题并为链提议一个新块时，网络中只会接受其中一个块。由于其他矿工完成了相同的工作，网络会对他们进行奖励。这些被确认的区块将附加到新接受的区块上。我们称之为叔块，如图[4-19](#535492_1_En_4_Chapter.xhtml#Fig19)所示。\n\
    \n![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig19_HTML.jpg)\n\n图4-19展示了一个三层立方体的流程图，从顶部开始分别标记为1、2和3。第一层的立方体1指向第二层的两个立方体，分别标记为2\
    \ A（Alice）和2 B（Bob）。2 A处有对钩，2 B处有叉号。2 B立方体通过叔块（uncle）连接到第三层的立方体3。\n\n**图 4-19**\
    \  \n以太坊叔块\n\n例如，在图[4-19](#535492_1_En_4_Chapter.xhtml#Fig19)中，有两个区块分别由矿工Alice和矿工Bob提议。Alice的区块（A）最终被接受并添加为新的2号区块。Bob的区块（B）最终被拒绝。然后，网络中的一名矿工使用Bob的区块（B）创建了一个3号区块，并指定Alice的区块为父区块，Bob的区块为叔块/ommer块。通过这种方式，Alice将获得全部奖励，而Bob仍能获得部分奖励。\n\
    \n如前所述，每个区块体部都包含一个交易列表。以下是来自`etherscan.io`的一个区块示例。我们可以看到该区块中有374笔交易，如图[4-20](#535492_1_En_4_Chapter.xhtml#Fig20)所示。\n\
    \n![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig20_HTML.png)\n\n图4-20是一个交易表格的截图，列标题包括：`Txn\
    \ hash`、`method`、`block`、`age`、`from`、`to`、`value`和`Txn fee`。该区块中共有374笔交易。\n\n\
    **图 4-20**  \n一个区块：交易列表\n\n区块编号为`15039689`。让我们再看看其他区块详情，如图[4-21](#535492_1_En_4_Chapter.xhtml#Fig21)所示。\n\
    \n![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig21_HTML.png)\n\n图4-21展示了以太坊区块的详细视图，包括概览和评论。概览是一个列表，包括交易详情、时间戳、难度、大小、Gas限制和费用。\n\
    \n**图 4-21**  \n以太坊区块详情\n\n区块头部包含关于以太坊区块的一些关键信息。每个区块头部都有以下重要字段：\n\n*   **区块编号**\
    \ – 也称为区块高度。区块链祖先区块的长度。第一个区块（创世块）的编号为零。此数字代表链的高度。\n\n*   **难度** – 表示通过哈希或权益证明努力挖掘一个区块的难度。\n\
    \n*   **总难度** – 用一个整数值表示链接到指定区块的难度。\n\n*   **时间戳** – 区块被挖掘时的UNIX时间戳。\n\n*   **Nonce**\
    \ – 请查看“以太坊账户”部分。\n\n*   **父哈希** – 也称为前一个哈希。来自前一个区块（或父区块）的哈希。每个区块都包含一个前一个哈希。通过这种方式，我们可以追溯到链中的第一个区块。\n\
    \n*   **受益人** – 也称为“Mined by”。这是接收挖矿奖励的受益人矿工地址。\n\n*   **Gas价格** – 请查看“Gas、Gas\
    \ Price和Gas Limit”部分。\n\n*   **Gas限制** – 请查看“Gas、Gas Price和Gas Limit”部分。\n\n*\
    \   **大小** – 区块的大小，以字节为单位。\n\n*   **哈希** – 区块的唯一Keccak哈希值。\n\n*   **额外数据** – 一个包含区块附加数据的字段。当矿工创建区块时，他们可以在此字段中添加任何内容。\n\
    \n*   **状态根**：一种特殊Merkle树（存储整个网络状态，也称世界状态）的根节点哈希。它包含所有账户余额、合约存储、合约代码和账户Nonce的Keccak哈希。如果任何数据发生改变，整个状态根的值也会随之改变。\n\
    \n*   **交易根**：存储该区块体中所有交易的交易树（transactions trie）的根节点哈希。\n\n*   **收据根**：存储该区块中所有交易收据的交易收据树（transactions\
    \ receipt trie）的根节点哈希。\n\n到目前为止，我们已经深入了解了以太坊的工作原理，特别是剖析了以太坊的区块、交易、账户和状态，以及这些以太坊区块结构之间的关系。让我们总结一下所学内容，并将其串联起来，如图4-22所示的以太坊架构图。\n\
    \n![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig22_HTML.png)\n\n图4-22展示了以太坊架构的架构图，包括一个独立的区块中的头部和体部。世界状态树、交易树、收据树指向头部区块中各自的层级。账户状态表、交易表和交易收据表分别指向它们对应的树。账户存储树指向账户状态表。区块体部指向交易收据表。\n\
    \n**图 4-22**  \n以太坊架构：区块、状态、交易\n\n至此，我们已经介绍了以太坊大部分重要的概念。\n\n## 总结\n\n本章的主要目的是介绍以太坊的关键概念。我们从以太坊的历史开始学习，并了解了其背后的关键组件和元素，包括账户、合约和Gas。现在，您已经掌握了以太坊账户如何工作的基础知识。我们介绍了以太坊节点和以太坊客户端——`geth`技术及一些示例。我们深入探讨了以太坊架构，理解了以太坊虚拟机（`EVM`）的工作原理，智能合约操作码（Opcode）如何在`EVM`内执行，以及`EVM`中区块、状态和交易的结构。至此，您应该已经准备好进入下一章，开始开发您的第一个智能合约和端到端的去中心化应用程序。我们将向您展示如何逐步构建它。敬请期待。"
  raw: '### Block


    As we learned from Chapter [1](#535492_1_En_1_Chapter.xhtml), each block has header
    and body. Block body contains a list of transactions. This is true for both Bitcoin
    and Ethereum. Ethereum block structure is shown in Figure [4-18](#535492_1_En_4_Chapter.xhtml#Fig18).


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig18_HTML.jpg)


    2 blocks of block header and block body. Block body contains 2 more blocks in
    it: transactions and uncle blocks headers.


    Figure 4-18


    Ethereum block structure


    Ethereum block body also contains “ommer” blocks, usually called “uncle” blocks.
    Uncle blocks are created to help reward miners when multiple block solutions are
    found.


    When there are multiple miners who solve a cryptographic puzzle and propose a
    new block for a chain, only one of the blocks will be accepted in the network.
    Since other miners did the same work, the network will reward them. Those stabled
    blocks will be attached to the new accepted block. We call it uncle block, as
    shown in Figure [4-19](#535492_1_En_4_Chapter.xhtml#Fig19).


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig19_HTML.jpg)


    A flow diagram of 3 layers of cubes labeled 1, 2, and 3 from the top. Cube 1 leads
    to 2 cubes in second layer that are labeled 2 A and 2 B for Alice and Bob labeled
    respectively. There is a tick for 2 A and cross for 2 B. Cube 2 B goes to cube
    3 through uncle for block 3.


    Figure 4-19


    Ethereum uncle block


    For example, in Figure [4-19](#535492_1_En_4_Chapter.xhtml#Fig19), there are two
    blocks that were proposed by miner Alice and miner Bob. Alice’s block (A) is eventually
    accepted and added as a new block #2\. Bob’s block (B) is ultimately rejected.
    Then, a miner in the network created a block (#3) using Bob’s block (B) and specified
    that Alice’s block is the parent block and Bob’s block is an uncle/ommer block.
    This way, Alice will get the full reward, but Bob still gets a partial reward.


    As we mentioned later, each block body contains the list of transactions, here
    is an example of a block from etherscan.io. We can see there are 374 transactions
    in this block as shown in Figure [4-20](#535492_1_En_4_Chapter.xhtml#Fig20).


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig20_HTML.png)


    A screenshot of a table of transactions with column headers: T x n hash, method,
    block, age, from, to, value, and t x n fee. There are 374 transactions in this
    block.


    Figure 4-20


    A block: a list of transactions


    The block number is 15039689\. Let’s take a look at other block detail as in Figure
    [4-21](#535492_1_En_4_Chapter.xhtml#Fig21).


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig21_HTML.png)


    An image of the ETM block in detail presents the overview and comments. An overview
    is a list of details of transactions, timestamps, difficulty, size, gas limit,
    and fees.


    Figure 4-21


    Ethereum block detail


    The Block Header contains some key information about an Ethereum block. Each block
    header has the following important fields:


    *   **Block number** – Also called block height. The length of the blockchain
    ancestor blocks. The first block (genesis block) has the number zero. This number
    represents the height of the chain.


    *   **Difficulty** – Indicating how hard for hashing or staking effort to mine
    a block.


    *   **Total difficulty** – Indicating how hard it was to chain up to a specified
    block by an integer value.


    *   **Timestamp** – A UNIX timestamp for when the block was mined.


    **Nonce** – Please check the Ethereum Account section.


    *   **Parent hash** – Also called previous hash. The hash came from the previous
    block (or the parent block). Each block contains a previous hash. By the way,
    we can link back to the first block in the chain.


    *   **Beneficiary** – Also called “Mined by.” It is the beneficiary miner address
    that receives a mining reward.


    *   **Gas price** – Please check the Gas, Gas Price, and Gas Limit section.


    *   **Gas limit** – Please check the Gas, Gas Price, and Gas Limit section.


    *   **Size** – The block size in bytes.


    *   **Hash** – A unique Keccak hash of the block.


    *   **Extra data** – A field containing additional data from a block. When miners
    are creating a block, they can add anything in this field.


    *   **State root**: Hash of the root node of a specialized kind of Merkle tree
    that stores the entire network state, also known as world state. It contains the
    Keccak hash of all account balances, contract storage, contract code, and account
    nonces. If any piece of the data changes, the entire state root value will also
    change.


    *   **Transactions root**: Hash of the root node of the transactions trie that
    stores all transactions in this block body.


    *   **Receipt root**: Hash of the root node of the transactions receipt trie that
    stores all transactions receipt in this block.


    At this stage, we have deep dive into how Ethereum works, and especially we are
    anatomizing Ethereum block, transaction, account, and state. The relation between
    these Ethereum block structures. Let’s summarize what we have learned and link
    it all together, as shown in the Ethereum architecture diagram (Figure [4-22](#535492_1_En_4_Chapter.xhtml#Fig22)).


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig22_HTML.png)


    A schema of ETM architecture consists of header and body in a separate block.
    The trie of world state, transaction, receipt points to their respective layers
    in the header block. Table for account state, transaction, and transaction receipt
    leads to their respective trio. Account storage trio leads to account state table.
    Body block leads to table of transaction receipt.


    Figure 4-22


    Ethereum architecture: block, state, transactions


    We’ve now described most of the important concepts about Ethereum.


    ## Summary


    The main purpose of this chapter was to introduce the key concepts of Ethereum.
    We’ve started to learn about the history of Ethereum as well as the key components
    and elements behind Ethereum, including accounts, contracts, and gas. So, now
    you know the fundamentals of how Ethereum account works. We went over Ethereum
    node and Ethereum clients—geth technologies with some examples. We delve into
    the Ethereum architecture, understand how the Ethereum Virtual Machine (EVM) works,
    how smart contract Opcode is executed within the EVM, the structure of the block,
    state, and transactions in EVM. At this stage, you should be ready to go for the
    next chapter and start with developing your first smart contracts and end-to-end
    decentralized applications. We will show you how to build it step-by-step. Stay
    tuned.'
  trans: "\n### Block\n\n如第 1 章所述，每个区块都有头部和体部。区块体包含一系列交易。这一点对比特币和以太坊都是成立的。以太坊的区块结构如图\
    \ 4-18 所示。\n\n![](img/535492_1_En_4_Fig18_HTML.jpg)\n\n图 4-18 展示了区块头部和区块体部的两个区块。区块体部包含两个子块：交易和叔块头部。\n\
    \n**图 4-18**  \n以太坊区块结构\n\n以太坊的区块体部还包含“ommer”块，通常被称为“uncle”块（叔块）。当多个区块解决方案被找到时，叔块会被创建，用于奖励矿工。\n\
    \n当多个矿工解出密码学难题并为链提议一个新块时，网络中只会接受其中一个块。由于其他矿工完成了相同的工作，网络会对他们进行奖励。这些被确认的区块将附加到新接受的区块上。我们称之为叔块，如图\
    \ 4-19 所示。\n\n![](img/535492_1_En_4_Fig19_HTML.jpg)\n\n图 4-19 展示了一个三层立方体的流程图，从顶部开始分别标记为\
    \ 1、2 和 3。第一层的立方体 1 指向第二层的两个立方体，分别标记为 2 A（Alice）和 2 B（Bob）。2 A 处有对钩，2 B 处有叉号。2\
    \ B 立方体通过叔块（uncle）连接到第三层的立方体 3。\n\n**图 4-19**  \n以太坊叔块\n\n例如，在图 4-19 中，有两个区块分别由矿工\
    \ Alice 和矿工 Bob 提议。Alice 的区块（A）最终被接受并添加为新的 2 号区块。Bob 的区块（B）最终被拒绝。然后，网络中的一名矿工使用\
    \ Bob 的区块（B）创建了一个 3 号区块，并指定 Alice 的区块为父区块，Bob 的区块为叔块/ommer 块。通过这种方式，Alice 将获得全部奖励，而\
    \ Bob 仍能获得部分奖励。\n\n如前所述，每个区块体部都包含一个交易列表。以下是来自`etherscan.io`的一个区块示例。我们可以看到该区块中有\
    \ 374 笔交易，如图 4-20 所示。\n\n![](img/535492_1_En_4_Fig20_HTML.png)\n\n图 4-20 是一个交易表格的截图，列标题包括：`Txn\
    \ hash`、`method`、`block`、`age`、`from`、`to`、`value`和`Txn fee`。该区块中共有 374 笔交易。\n\
    \n**图 4-20**  \n一个区块：交易列表\n\n区块编号为`15039689`。让我们再看看其他区块详情，如图 4-21 所示。\n\n![](img/535492_1_En_4_Fig21_HTML.png)\n\
    \n图 4-21 展示了以太坊区块的详细视图，包括概览和评论。概览是一个列表，包括交易详情、时间戳、难度、大小、Gas 限制和费用。\n\n**图 4-21**\
    \  \n以太坊区块详情\n\n区块头部包含关于以太坊区块的一些关键信息。每个区块头部都有以下重要字段：\n\n*   **区块编号** – 也称为区块高度。区块链祖先区块的长度。第一个区块（创世块）的编号为零。此数字代表链的高度。\n\
    \n*   **难度** – 表示通过哈希或权益证明努力挖掘一个区块的难度。\n\n*   **总难度** – 用一个整数值表示链接到指定区块的难度。\n\n\
    *   **时间戳** – 区块被挖掘时的 UNIX 时间戳。\n\n*   **Nonce** – 请查看“以太坊账户”部分。\n\n*   **父哈希**\
    \ – 也称为前一个哈希。来自前一个区块（或父区块）的哈希。每个区块都包含一个前一个哈希。通过这种方式，我们可以追溯到链中的第一个区块。\n\n*   **受益人**\
    \ – 也称为“Mined by”。这是接收挖矿奖励的受益人矿工地址。\n\n*   **Gas 价格** – 请查看“Gas、Gas Price 和 Gas\
    \ Limit”部分。\n\n*   **Gas 限制** – 请查看“Gas、Gas Price 和 Gas Limit”部分。\n\n*   **大小**\
    \ – 区块的大小，以字节为单位。\n\n*   **哈希** – 区块的唯一 Keccak 哈希值。\n\n*   **额外数据** – 一个包含区块附加数据的字段。当矿工创建区块时，他们可以在此字段中添加任何内容。\n\
    \n*   **状态根**：一种特殊 Merkle 树（存储整个网络状态，也称世界状态）的根节点哈希。它包含所有账户余额、合约存储、合约代码和账户 Nonce\
    \ 的 Keccak 哈希。如果任何数据发生改变，整个状态根的值也会随之改变。\n\n*   **交易根**：存储该区块体中所有交易的交易树（transactions\
    \ trie）的根节点哈希。\n\n*   **收据根**：存储该区块中所有交易收据的交易收据树（transactions receipt trie）的根节点哈希。\n\
    \n到目前为止，我们已经深入了解了以太坊的工作原理，特别是剖析了以太坊的区块、交易、账户和状态，以及这些以太坊区块结构之间的关系。让我们总结一下所学内容，并将其串联起来，如图\
    \ 4-22 所示的以太坊架构图。\n\n![](img/535492_1_En_4_Fig22_HTML.png)\n\n图 4-22 展示了以太坊架构的架构图，包括一个独立的区块中的头部和体部。世界状态树、交易树、收据树指向头部区块中各自的层级。账户状态表、交易表和交易收据表分别指向它们对应的树。账户存储树指向账户状态表。区块体部指向交易收据表。\n\
    \n**图 4-22**  \n以太坊架构：区块、状态、交易\n\n至此，我们已经介绍了以太坊大部分重要的概念。\n\n## 总结\n\n本章的主要目的是介绍以太坊的关键概念。我们从以太坊的历史开始学习，并了解了其背后的关键组件和元素，包括账户、合约和\
    \ Gas。现在，您已经掌握了以太坊账户如何工作的基础知识。我们介绍了以太坊节点和以太坊客户端——`geth`技术及一些示例。我们深入探讨了以太坊架构，理解了以太坊虚拟机（`EVM`）的工作原理，智能合约操作码（Opcode）如何在`EVM`内执行，以及`EVM`中区块、状态和交易的结构。至此，您应该已经准备好进入下一章，开始开发您的第一个智能合约和端到端的去中心化应用程序。我们将向您展示如何逐步构建它。敬请期待。\n"
- fmt: '# 5. Smart Contracts and Dapps: From Theory to Practice


    Brian Kernighan, a computer scientist, wrote the first “Hello, World!” program
    in 1972 for the language B to be used internally at Bell Labs. Brian wrote a manual
    titled *A Tutorial Introduction to the Language B* to demonstrate how to use B’s
    language. From there, this popular text spread quickly. It was used in a Bell
    Laboratories memo in 1974, as well as *The* *C Programming Language* in 1978.
    “Hello, World!” remains popular to this day. It became a standard for new programmers
    for their first program. This particular piece of code proves your code syntax,
    compiles, and executes to consistently produce the desired output. “Hello, World!”
    offers the code in more than 60 programming languages.


    In the previous chapter, we have theoretically explained the Ethereum network,
    including Ethereum key components, EVM, architecture, etc. The best way to better
    understand what we learned so far is to start practicing and writing a smart contract
    and `Dapps` for the Ethereum blockchain.


    By using the online `Remix` tool, you’ll learn how to write `HelloWorld` code
    in `Solidity` with all needed syntax. You’ll start from the very beginning, line
    by line. You will also learn how to compile and deploy your smart contract locally
    as well as on a globally distributed testnet. Then, we will install and connect
    our `Metamask` wallet to testnet. After setting up all that is required in your
    local `Dapp` development environment, you will start developing your own `Dapp`
    with minimal effort to connect the contract in testnet. By taking control of your
    Ethereum wallet at the end of this chapter, you should be able to run end-to-end
    `HelloWorld` `Dapp`.


    This chapter will help you to achieve the following practical goals:


    - Introducing `Remix`

    - Writing your first smart contract

    - Taking control of your first Ethereum wallet

    - Decentralized Applications (`Dapps`)

    - Tokens standard


    In the last section, we talk about token standards with the two most important
    tokens—`ERC-20` and `ERC-721`. `ERC-721` is the NFT token standard that we will
    go over in the next chapter.


    This will help make you more familiar with smart contracts and `Dapps`.


    ## Introducing Remix


    Gavin Wood proposed `Solidity` programming language in August 2014. Alex Beregszaszi,
    Christian Reitwiessner, and other Ethereum core contributors created `Solidity`.
    It is a high-level object-oriented programming language that is inspired by `JavaScript`,
    `C++`, and `Python`. The purpose of `Solidity` is to execute smart contracts on
    EVM-based blockchain networks.


    Many tools are available for creating and developing `Solidity` smart contracts.
    `Remix`, `HardHat`, `Truffle`, and others are popular tools used by `Solidity`
    developers. `Remix` is a powerful online integrated development environment (IDE)
    for coding, compiling, testing, and debugging smart contracts in `Solidity`. We
    don’t need to install any other special software, apart from your web browser.


    You can type the `Remix IDE` in your browser URL box using the following URL:


    [`https://remix.ethereum.org`](https://remix.ethereum.org). You’ll then be navigated
    to the `Remix` home page as shown in Figure [5-1](#535492_1_En_5_Chapter.xhtml#Fig1).


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig1_HTML.png)


    A screenshot of an interface labeled file explorers with toolbars. Homepage is
    displayed on the right with a caption labeled as `Remix IDE` and below it shows
    a scan alert message.


    Figure 5-1


    `Remix` home page


    You will notice that there is a left toolbar menu on the `Remix` screen. When
    you click each menu icon, you will see different modules provided.


    ### File Explorers


    On `File Explorer` module, you can manage your workspaces and create contract
    files under workspaces. When you work on multiple projects, workspaces can help
    organize your files in different project workspaces. You can create smart contract
    files, create folders, and upload local files to the current workspace. It is
    very similar to other cloud browser-based tools, like google drive, dropbox, etc.
    Under `contracts` folder, `Remix` creates three default contracts for you. If
    you don’t use, you can delete them.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig2_HTML.jpg)


    A screenshot of a interface labeled default workspace illustrates 3 markings for
    3 icons. The markings are create new contact, create new folder and load local
    file to current workspace.


    Figure 5-2


    `Remix` File explorer page


    ### Solidity Compiler


    On the `Solidity compiler` module, you can select a different version of the `Solidity`
    compiler, the current version at this writing is `0.8.7`. Since `Solidity` evolves
    quite frequently, you need to pay close attention to choosing the configuration
    you need. Once you create `Solidity` files, you can compile files by clicking
    the compile button. The `Remix` contract section will display a file compilation
    information, for example, error and warning. The `Remix` will auto-save the current
    file change continuously every 5 seconds.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig3_HTML.jpg)


    A screenshot of an interface labeled `Solidity Compiler` illustrating advanced
    configurations with file selection and run options.


    Figure 5-3


    `Remix` Solidity compiler page


    ### Deploy and Run Transactions


    After you have compiled a smart contract, you can use `deploy and run transactions`
    module to deploy the contract. You need to select one contract in the `Contract
    Editor` to deploy if you have multiple contracts compiled.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig4_HTML.png)


    A screenshot labeled `Deploy and Run Transactions` page with environment, account,
    gas limit, value and contract details filling form. Lower part illustrates address
    adding, transactions recorded, and deployed contacts section.


    Figure 5-4


    `Remix` Deploy and Run Transaction module


    This module provides multiple EVM Environments:


    **JavaScript VM** – JS VM has its own sandbox blockchain simulated Environment
    running in your browser. It runs transactions very fast (no mining). When you
    execute transactions, the data is only saved temporarily in the browser. Once
    you close or reload the page, all transaction data will be lost. You will have
    to start from scratch. It is very useful for a quick try and tests simple contracts.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig5_HTML.jpg)


    A screenshot of a section from an interface labeled `Environment`. `Environment`
    has a box for selection of Java Scripts, Web Providers and Connect List.


    Figure 5-5


    `Remix` EVM environments


    **Injected Provider** – `Remix` will connect to a `web3` provider injected in
    the browser (commonly known as a browser extension for your wallet). `Metamask`
    is currently the most popular `Injected Provider`. You can also use other popular
    wallets like `Coinbase` wallet, `Trust Wallet`, and `Ledger`. You can connect
    to Ethereum’s main network or various testnets through the provider. This allows
    the `Remix` to interact with a real network.


    **Web3 Provider** – `Remix` will connect to a remote node. You will need to provide
    the URL for the selected provider. `Infura`, `Alchemy`, and `QuikNode` are some
    popular `Web3` providers.


    ### Other Modules


    We have introduced the important `Remix` modules, which we typically use often.
    Other modes like plugin module allow you to install the needed plugin like debug
    plugin, `Solidity` static analysis module, `Solidity` Unit test module, and Settings
    module. If interested, you can refer to the `Remix` document for detail ([https://remix-ide.readthedocs.io](https://remix-ide.readthedocs.io)).


    At this stage, we should have the basic knowledge of `Remix`.


    Let’s start to learn `Solidity` by writing “Hello, World!” smart contract.'
