  trans: '

    # 日志、调用及其他操作码（`LOG0`、`LOG1`、`LOG2` 等）


    让我们用前面的字节码示例来模拟 EVM 解释器。我们将重点关注合约字节码的前 16 个字节：`6080604052348015`。根据操作码参考表，我们可以将字节码转换为操作码，如表
    4-3 所示。


    **表 4-3** 字节码到操作码的转换（`6080604052348015`）


    | 字节码 | 操作码 | 参考(`Opcode`, 名称) | 描述 | Gas |

    | --- | --- | --- | --- | --- |

    | `60 80` | `PUSH1 0x80` | `0x60` = `PUSH1` | 复制第 1 个栈顶元素 | 3 |

    | `60 40` | `PUSH1 0x40` | `0x60` = `PUSH1` | 复制第 1 个栈顶元素 | 3 |

    | `52` | `MSTORE` | `0x52` = `MSTORE` | 将字保存到内存 | 3* |

    | `34` | `CALLVALUE` | `0x34` = `CALLVALUE` | 获取指令存入的价值 | 2 |

    | `80` | `DUP1` | `0x80` = `DUP1` | 复制第 1 个栈顶元素 | 3 |

    | `15` | `ISZERO` | `0x15` = `ISZERO` | 简单的非运算符 | 3 |


    EVM 是一个简单的基于栈的执行机器，它会执行操作码指令。栈（有时称为“下推栈”）是一个线性的元素集合，新元素插入到最后一个位置（称为“栈顶”），而现有元素的移除总是在栈顶位置进行。它也被称为后进先出（LIFO）。在上述已解释的操作码示例中，我们期望
    EVM 按顺序执行标准的栈操作：


    ![](img/535492_1_En_4_Figa_HTML.jpg)


    一个逐步展示字节码到操作码转换流程的文本形式示意图。


    EVM 栈的深度为 *1024* 个元素，每个元素包含一个 256 位（32 字节）的字，或者 32 个块，其中每个块的大小为 8 位（1 字节）。采用 256
    位的原因主要是为了将 Keccak-256 加密哈希函数应用于任意数量的输入，并将其转换为一个唯一的 256 位哈希值。在 EVM 中，合约可以存储和读取上述项目中的数据。EVM
    有三个可存储项目的地方——存储、内存和栈。


    内存是用来短期保存临时值的位置。在智能合约函数调用之间，它会被清除。


    当从内存读取数据时，EVM 会使用 `MLOAD`。要写入 32 字节（256 位）的数据，会使用操作码 `MSTORE`。当写入 1 字节（8 位）的数据时，EVM
    会使用 `MSTORE8`。图 4-11 展示了 EVM 如何使用操作码来读取和写入合约内存。


    ![](img/535492_1_En_4_Fig11_HTML.png)


    一个由具有入栈和出栈操作的堆叠内存块组成的框图。它带有“E V M 栈”标签。向内和向外的箭头分别标注为 `MSTORE` 和 `MLOAD`。


    **图 4-11** 操作码读取和写入合约内存


    存储是永久保存数据的地方。当在 EVM 中运行的智能合约使用永久存储时，这些数据将成为以太坊状态的一部分。你可以将存储视为一个数组，其中每个数组项的大小为
    256 位（32 字节）。外部读取存储值是不需要费用的。然而，向存储写入数据的成本非常高，其操作码是 `SSTORE`，目前每个 32 字节字的成本是 20,000
    Gas。让我们来看看成本是多少。


    首先，将 Gas（Gwei）转换为 ETH - `20,000 * 0.000000001 ETH = 0.00002 ETH`，


    然后，计算成本：`$1100 * 0.00002 = $0.022`。


    向存储写入的成本是向内存写入成本的 6000 倍以上。


    在前面的表格（表 4-3）中，我们列出了操作码指令在 Gas 成本方面的前几个步骤，每个操作码都有其自己的基础 Gas 成本。所有以太坊合约的执行都是公开进行的。攻击者可以创建合约来执行大量、昂贵的操作（DDoS——分布式拒绝服务攻击）以拖慢以太坊网络。通过在每次
    EVM 操作码执行中包含 Gas 成本，以太坊网络可以防止此类攻击。


    ## 以太坊节点


    在互联网上，任何连接到网络的系统或设备也称为节点。区块链网络也是如此。当一个节点连接到以太坊网络时，它会下载一份区块链数据的副本，并参与网络通信，与其他节点进行交互。根据
    `etherscan.io` 的数据，大约有 4,131,021 个节点连接到以太坊网络。


    节点有三种类型：全节点、归档节点和轻节点。每种类型的节点消耗数据的方式不同。


    ### 全节点


    全节点将存储所有最近的区块链数据，运行自己的 EVM 环境，并能执行 EVM 指令。它们在参与区块链交易验证和维护区块链当前状态时会很有帮助。当一个新区块中的交易不符合以太坊规范定义的规则时，它们将被丢弃。例如，如果
    Alice 向 Bob 发送 50 ETH，但 Alice 的账户没有足够的以太币，或者在支付了非常少的 Gas 费用时，全节点在验证交易时会将其标记为无效并回滚。一个全节点可以直接部署智能合约，并与网络中的任何智能合约进行交互。


    一个全节点会存储有限数量的最新区块。默认情况下是 128 个（如果使用快速同步选项，则为 64 个）。每个以太坊区块的大小通常约为 80KB，或者在十分钟内约为
    4 MB。这 128 个区块大约包含最近一周的跟踪数据。当你查询无法从全节点获取的历史区块数据时，通常会收到“缺失状态树节点”错误。这个错误意味着你需要一个归档节点。


    当一个全节点首次连接到网络时，同步全节点数据可能非常耗时，可能需要数周才能完成同步！之后，节点需要保持在线以进行区块数据的升级和维护。否则，它必须重复完整的同步过程。创建一个新区块通常需要
    13 秒。当新数据到达时，全节点可能会删除旧的区块链数据以节省磁盘空间。


    运行一个使用快速同步的全节点的硬件要求：


    - 配备 4 核或更多核心的快速 CPU

    - 16 GB 或更大的内存

    - 至少 500 GB 可用空间的快速固态硬盘

    - 25 MBit/s 或更高的带宽


    ### 归档节点


    归档节点使用一种称为“归档模式”的特殊配置运行。归档节点会存储自创世区块以来的所有区块链数据。它还构建了一个历史状态的归档。


    当前归档型以太坊区块链的大小约为 12 TB。


    通常，在大多数情况下，我们不需要归档节点数据。全节点可以提供大部分数据，例如检查账户余额、转账等。但有时，你可能需要查询去年的账户余额、你曾经拥有的资产或交易。全节点会定期修剪数据，只存储最近
    128 个区块的数据（大约 25 分钟）。节点必须重新同步才能获取更早的数据，这会导致数据提取速度过慢。归档节点本地拥有所有数据，可以快速获取过去的数据。


    归档节点数据通常用于区块链服务，如区块浏览器、数据分析等。同步完整的归档节点数据将比全节点同步花费更长的时间。可能需要至少一个月。


    以下是运行一个完整归档节点的硬件要求：


    - 配备 4 核或更多核心的快速 CPU。

    - 16 GB 或更大的内存。

    - 至少 6 TB+ 可用空间的快速固态硬盘。

    - 25 MBit/s 或更高的带宽。


    ### 轻节点


    轻节点仅下载最少的区块头信息，并通过检查区块头中的状态根来验证数据的有效性。轻节点被设计为以全节点作为中介进行交互，并依赖全节点来执行区块链操作，从请求账户余额到与智能合约交互。因此，轻节点无需保持在线状态，也无需在本地存储大量千兆字节的数据。轻节点对于在低内存和计算设备（如手机、物联网设备和笔记本电脑）上运行非常有用。

