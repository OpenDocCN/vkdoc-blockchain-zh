    # ERC-20


    `ERC-20` 是最流行的以太坊代币标准，由 Fabian Vogelsteller 于 2015 年 11 月 19 日提出。大多数在以太坊平台或基于
    EVM 的区块链（如币安）上发行代币的 ICO（首次代币发行）项目，使用的都是 `ERC-20` 代币。ICO 是股票市场 IPO（首次公开募股）在加密货币领域的版本，用于筹集资金或参与投资机会。截至
    2022 年 3 月，以太坊主网上约有 50.8 万个 `ERC-20` 代币。所有 `ERC-20` 代币的总市值约为 187 亿美元，币安上则有超过 16
    万个 `ERC-20` 代币。


    `20` 是一个唯一的标识号，用于区分 `ERC-20` 标准与其他标准。


    `ERC-20` 代币有几个可选字段，例如 `name` 和 `symbol`，并在智能合约中定义了以下规则：


    ```

    contract ERC20Interface {

    function totalSupply() public view returns (uint);

    function balanceOf(address tokenOwner) public view returns (uint balance);

    function allowance(address tokenOwner, address spender) public view returns (uint
    remaining);

    function transfer(address to, uint tokens) public returns (bool success);

    function approve(address spender, uint tokens) public returns (bool success);

    function transferFrom(address from, address to, uint tokens) public returns (bool
    success);

    event Transfer(address indexed from, address indexed to, uint tokens);

    event Approval(address indexed tokenOwner, address indexed spender, uint tokens);

    }

    ```


    `totalSupply()`：获取代币的总供应量。


    `balanceOf()`：获取指定地址的账户余额。


    `allowance()`：返回允许 `spender` 从 `owner` 账户中提取的代币数量。


    `transfer()`：将余额从所有者账户转移到另一个指定地址，并且必须触发 `Transfer` 事件。


    `transferFrom()`：将指定数量的代币从 `from` 地址发送到 `to` 地址。`transferFrom` 方法用于提现工作流，允许合约代表你转移代币。


    `approve()`：允许 `spender` 多次从你的账户中提取指定数量的代币。


    如果你曾参与一个需要创建并部署 `ERC-20` 代币的项目，你可以通过实现这些 `ERC-20` 函数来创建一个智能合约。以下是一个简单的示例：


    ```

    MyToken is ERC20 {

    // implement the functions required by ERC20 interface standard

    // other functions...

    }

    ```


    在 Etherscan 上，你可以找到许多已部署在主网上、符合 `ERC-20` 标准的代币。以下是一个在 Etherscan 上 `ERC-20` 代币交易的真实示例。


    ![](img/535492_1_En_5_Fig37_HTML.png)


    一个界面截图的标签为：Kucoin Token，突出显示了概览、资料摘要以及转账信息。其中找到了 34,718 笔交易，标注为转账和转入。


    **图 5-37** ERC-20 示例


    该截图显示了 `ERC-20` 代币通过 `transfer` 或 `transferFrom` 方法从一个地址转移到另一个地址的金额。


    在 `ERC-20` 代币中，代币是可互换的，这意味着每个代币与其他代币的类型和价值完全相同。如果你用一个 `ERC-20` 代币交换另一个 `ERC-20`
    代币，其真实性或价值不会有任何差异；它们是可以互换的，并代表一个单一实体。


    例如，Tether (USDT) 是一种 `ERC-20` 代币。它是一种稳定币——一种价值以 1:1 的比例与美元挂钩，并完全由 Tether 的等值准备金支持的加密资产。这些准备金由多种资产组成，包括现金。USDT
    类似于 ETH，这意味着 1 个 USDT 代币与其他所有 USDT 代币始终是相等的。它们类型相同，都代表美元，并且可以相互交换。USDT 也是可分割的，可以分解为更小的单位，如分。


    因此，可互换代币具有以下属性：可互换、统一和可分割。


    接下来，我们来讨论那些不可互换的代币，或者换句话说，非同质化代币。


    # ERC-721


    所有 `ERC-20` 代币（如 USDT）都是相同的，并提供相同的价值。因此，重要的是你在钱包中拥有多少代币，而不是它们各自的独特性。非同质化代币（NFT）可以被唯一标识；它们是数据存储在区块链网络上的资产。NFT
    不能与其他 NFT 互换，因为它们是独一无二的。可以想想艺术家创作的独特艺术品、时装公司的奢侈品品牌商品以及不同的视频。


    `ERC-721` 是非同质化代币（也称为 deed）的标准接口，可在 [`https://eips.ethereum.org/EIPS/eip-721`](https://eips.ethereum.org/EIPS/eip-721)
    获取。这个新标准的创建提案于 2018 年 1 月提出，由 William Entriken、Dieter Shirley、Jacob Evans 和 Nastassia
    Sachs 共同发起。根据彭博社的一份报告，2021 年 NFT 市场价值超过 400 亿美元，截至 2022 年 5 月 1 日，NFT 市场在 2022
    年的价值超过 370 亿美元。


    与 `ERC-20` 代币标准类似，`ERC-721` 规范提供了详细信息，并定义了派生合约为了开发 NFT 而应实现的函数和事件，如下面的代码块所示：


    ```

    interface ERC721 {

    event Transfer(address indexed _from, address indexed _to, uint256 indexed _tokenId);

    event Approval(address indexed _owner, address indexed _approved, uint256 indexed
    _tokenId);

    event ApprovalForAll(address indexed _owner, address indexed _operator, bool _approved);

    function balanceOf(address _owner) external view returns (uint256);

    function ownerOf(uint256 _tokenId) external view returns (address);

    function safeTransferFrom(address _from, address _to, uint256 _tokenId, bytes
    data) external payable;

    function safeTransferFrom(address _from, address _to, uint256 _tokenId) external
    payable;

    function transferFrom(address _from, address _to, uint256 _tokenId) external payable;

    function approve(address _approved, uint256 _tokenId) external payable;

    function setApprovalForAll(address _operator, bool _approved) external;

    function getApproved(uint256 _tokenId) external view returns (address);

    function isApprovedForAll(address _owner, address _operator) external view returns
    (bool);

    }

    ```


    `balanceOf`：获取指定地址的账户余额。


    `ownerOf`：该函数根据提供的 `_tokenId` 返回该代币所有者的唯一地址。


    `safeTransferFrom`：将 NFT 的所有权从一个地址转移到另一个地址。要求 `msg.sender` 是当前所有者、授权的操作者或该 NFT
    的已批准地址。


    `transferFrom()`：将指定数量的代币从 `_from` 地址发送到 `_to` 地址。`transferFrom` 方法用于提现工作流，允许合约代表你转移代币。


    `approve()`：允许 `spender` 多次从你的账户中提取指定数量的代币。


    `setApprovalForAll`：为给定的操作者分配或撤销管理 `msg.sender` 所有资产的批准权限。


    `getApproved`：获取单个 NFT 的已批准地址。


    `isApprovedForAll`：检查给定的操作者地址是否有权为给定的所有者操作其代币。


    `ERC-721` 最著名的例子是 CryptoKitties 游戏，这是第一个 NFT 代币。在游戏中，有成千上万只 CryptoKitty。每只猫都有自己的资料，包括独特的基因、名字、颜色、形状、价格和其他信息。游戏玩家可以收集和繁殖可爱的小猫。如图
    5-38 所示，每只 CryptoKitty 作为一种可收藏的数字资产，可以被玩家交易、出售和购买：


    ![](img/535492_1_En_5_Fig38_HTML.png)


    一张动画猫咪截图，标签为：Kitty Hash 1111，并附有所有者、出生时间、世代、区块编号、区块哈希、官方资料和属性等信息。在下方，基因标签下显示了相关信息。


    **图 5-38** ERC-721 CryptoKitties 示例

    '
