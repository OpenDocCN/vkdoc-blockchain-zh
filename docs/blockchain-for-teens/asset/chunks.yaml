- fmt: "# How Bitcoin Wallets Work\n\nWe learned public and private keys in Chapter\
    \ [2](#535492_1_En_2_Chapter.xhtml), “Cryptography.” The chapter shows an example\
    \ of using asymmetric encryption to generate a pair of private and public keys.\
    \ After that, a blockchain address is derived from its public key.\n\nIn Bitcoin,\
    \ when you create a blockchain wallet, private and public keys are associated\
    \ with it. There is one private key per address. The Bitcoin address is publicly\
    \ visible, represents your account in the blockchain, and is used for receiving\
    \ and sending Bitcoins.\n\nA private key is kept secret. It is used to verify\
    \ transactions, account ownership, or spend the Bitcoins in your account. It can\
    \ have many forms:\n\n1.  A 256-character-long binary code. Example:\n\n    ```\n\
    \    1010111100111000000011110110001111010111101001010010001011001111011110100011000010100011111100100010100011110001110101000110011111110000101000110001010111010001010011111110101001010011110110110110000001101111010011000001110101101001000010001000010000100111\n\
    \    ```\n\n2.  A 64-digit hexadecimal code. Example:\n\n    ```\n    c2e44f51a0277e7bde2b244de3ac9afb62b528bf2f234f0a0a085e963ef7134e\n\
    \    ```\n\n    associated address: `1Ghftir7isD9MsJVH6qcTbm2nCBHTs3Csp`\n\n3.\
    \  A QR code. Example:\n\n    You can use an online Bitcoin QR code to generate\
    \ one by giving the Bitcoin address: [`www.bitcoinqrcodemaker.com/`](http://www.bitcoinqrcodemaker.com/).\n\
    \n    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig11_HTML.jpg)\n\n    An\
    \ image depicts the bitcoin web Q R code.\n\n    **Figure 3-11** Bitcoin QR code\n\
    \n4.  Mnemonic phrase. Example:\n\n    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig12_HTML.png)\n\
    \n    A text screenshot represents the mnemonic phrase bitcoin. It includes mnemonic\
    \ language and details about the bitcoin wallet.\n\n    **Figure 3-12** Mnemonic\
    \ phrase\n\nWhen Alice wants to send one Bitcoin from her wallet to Bob, the process\
    \ handled by the wallets can be described as follows:\n\n**Step 1 –** Alice collects\
    \ the transaction data to be sent. Once finalized, Alice uses Bob’s public key\
    \ to encrypt the transaction data.\n\n**Step 2 –** Alice then uses her private\
    \ key and signs the transaction as a digital signature. Alice then sends the transaction,\
    \ the digital signature, and her public key to Bob.\n\nBob receives the transaction\
    \ message. He must verify that the data sent from Alice has not been tampered\
    \ and must have been sent from Alice.\n\n**Step 3 –** Bob decrypts the transaction\
    \ data using his private key.\n\n**Step 4 –** Bob receives Alice’s public key\
    \ to verify the digital signature to ensure the message is from Alice.\n\nIf true,\
    \ Bob knows the data is not altered and good to go.\n\n![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig13_HTML.png)\n\
    \nA diagram illustrates the bitcoin wallet working. It includes the steps Alice,\
    \ transaction, Bob's public key, signing private key, public, hash, Alice's public\
    \ key, origin document, and Bob's private key.\n\n**Figure 3-13** How Bitcoin\
    \ wallet works\n\n# Types of Bitcoin Wallets\n\nThere are two categories of wallets:\
    \ hot and cold. The difference between the two is that hot wallets require an\
    \ Internet connection, while cold wallets store the crypto tokens offline.\n\n\
    Since hot wallets are always connected to the Internet, it is easy and convenient\
    \ to use, and it is useful for beginners to learn or for traders to make a quick\
    \ online payment. It is highly user-friendly. On the other hand, hot wallets are\
    \ generally less secure and more vulnerable to hacking and online attacks. Several\
    \ types of hot wallets are available; the most common are web wallets, mobile\
    \ wallets, and desktop wallets.\n\nCold wallets are not connected to the Internet.\
    \ It is highly secure. Stealing funds from cold wallets requires physical access\
    \ to the cold wallet with the owner’s passwords or PINS. It minimizes online hacker\
    \ attacks. At the same time, it is hard to access and less user-friendly, with\
    \ transactions taking longer. It is suitable for storing a large number of crypto\
    \ assets over a long period. Cold wallets include paper and hardware wallets.\n\
    \nFigure [3-14](#535492_1_En_3_Chapter.xhtml#Fig14) illustrates the two types\
    \ of Bitcoin wallets.\n\n![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig14_HTML.png)\n\
    \nA flowchart depicts the types of bitcoin wallets. It is divided into hot and\
    \ cold wallets. Hot wallet classifies into web, mobile, desktop wallet. Cold wallet\
    \ classifies as paper and hardware wallet.\n\n**Figure 3-14** Types of Bitcoin\
    \ wallets\n\n## Web Wallets\n\nAs the name implies, online wallets store your\
    \ private keys, which are managed entirely online by a third party, typically\
    \ centralized exchanges. Web wallet vendors are provided as a cloud service. The\
    \ user-friendly web interface makes users smoothly handle their wallets and perform\
    \ various operations, such as sending and receiving payments. You can access web\
    \ wallets from anywhere through a web browser. However, web wallets are frequently\
    \ targeted by hackers. Among hot wallets, web wallets are the least secure. Most\
    \ exchanges store the majority of customer funds offline in cold wallets. For\
    \ security reasons, users typically should not keep significant amounts of crypto\
    \ in hot wallets.\n\nAn example of a popular web wallet is [`www.exodus.com/`](http://www.exodus.com/)\
    \ or [`https://electrum.org/`](https://electrum.org/).\n\n## Desktop Wallets\n\
    \nDesktop wallets are downloaded computer software that runs on your desktop or\
    \ laptop device. This wallet software generates a data file to manage users’ keys.\
    \ The private keys are stored on your hard drive or solid-state drive (SSD).\n\
    \nCompared to other hot wallets, desktop wallets are the most secure and are an\
    \ excellent solution for trading small crypto transactions using a computer. When\
    \ using the wallet, users should create a strong password for accessing the keys.\n\
    \nSince the desktop wallet is connected to the Internet, it is also vulnerable\
    \ to malware or viruses. To protect your funds in your desktop wallet, you need\
    \ to secure your computer using a safe passphrase. It’s best practice to keep\
    \ most of your funds in cold storage.\n\n## Mobile Wallets\n\nLike the desktop\
    \ wallet, a mobile wallet is a mobile application installed on your mobile phone.\n\
    \n## Hardware Wallets\n\nA Bitcoin hardware wallet is the most commonly used form\
    \ of cold wallet and the most secure way of storing Bitcoins. The account’s private\
    \ keys are isolated from the Internet and stored in a secure physical device.\
    \ Similar to portable devices, hardware wallets can be connected to the computer\
    \ to make a transaction. The private key in the device will automatically sign\
    \ cryptocurrency transactions without requiring you to enter the key, which effectively\
    \ prevents hackers from stealing your private key.\n\nTrezor ([`https://trezor.io`](https://trezor.io))\
    \ and Ledger wallets ([`www.ledger.com`](http://www.ledger.com)) are two of the\
    \ most popular hardware wallet providers."
