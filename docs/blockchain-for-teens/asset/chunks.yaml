  trans: '

    #### 非抵押型稳定币


    `非抵押型稳定币`指的是价格锚定`$1`、且不以任何资产作为抵押的稳定币。它通常通过智能合约中的算法来控制稳定币的供应量，从而实现价格稳定。铸造这类稳定币无需任何抵押物。


    `Neutrino USD`和`USDD`是算法加密抵押型稳定币的典型例子。所有操作，包括发行、抵押、质押和奖励发放，都公开透明，并由智能合约和流动性池共同管理。


    ### 深入解析稳定币——Maker（DAI）


    让我们以一款著名的稳定币`Maker (DAI)`为例，来更深入地理解。`MakerDAO`是一个在`以太坊`区块链上运行的去中心化自治组织（DAO）。`MakerDAO`采用双代币模型设计——治理代币和稳定币。`Maker`平台共有三种代币：`Maker
    币 (MKR)`、`Sai (SAI)`和`DAI (DAI)`。


    `MKR`是一种治理代币，社区成员可凭其在`Maker`平台行使投票权。`MKR`本身不是稳定币。第二种代币是名为`DAI`的稳定币。`DAI`是多抵押`DAI`，可用于支付、抵押、资产交换、与众多协议集成，以及在`DeFi`生态系统中提供各种其他服务。`DAI`目前是由`以太坊
    (ETH)`和`基本注意力代币 (BAT)`作为抵押支撑。第三种代币是`Sai`，这是一种单一抵押品类型，曾用于支撑`DAI`。`Sai`的抵押品只有`ETH`。


    #### DAI 的工作原理


    `DAI`当前的市值为`69.3 亿美元`，供应量为`69 亿 DAI`。`DAI`的总供应量没有上限，其供应量根据`Maker 金库`进行管理。在 2019
    年 11 月多抵押`DAI (MCD)`发布之前，它被称为`抵押债务头寸 (CDP)`。


    `Maker 金库`是`MakerDAO`的核心智能合约组件，它为`Maker`系统持有抵押品（以太币）后即可创建`DAI`。一旦借出的`DAI`被归还，`Maker
    金库`便会释放锁定的抵押品并销毁这些`DAI`。


    `DAI`进行超额抵押以应对市场波动，需要锁定价值`150%`的抵押品来应对众所周知的剧烈波动。例如，如果你存入价值`100 美元`的`以太币`，你将获得价值`50
    美元`的`DAI`。假设`1 个以太币`价值`1439.685 DAI`。那么`100 DAI`是由`0.104 个以太币 (ETH)`作为抵押支撑的。


    让我们看一个类比示例来理解`Maker 金库`如何管理`DAI`与美元的锚定。


    一个想要借入`DAI`的投资者会创建一个`Maker 金库`，并将`ETH`发送到该`Maker 金库`中。`Maker 金库`会生成相应数量的`DAI`，并将这些`ETH`抵押品以`合仓以太币
    (PETH)`的形式锁定。生成的`DAI`数量取决于用户在`Maker 金库`中存入的以太币数量。生成的`DAI`会存入用户的钱包，并随着时间推移产生利息，这称为`DAI
    储蓄利率 (DSR)`。用户可以随时自由取回其存入的抵押品。他们需要向`Maker 金库`归还`DAI`并支付一部分稳定费（`MKR`）。之后，这些`DAI`会被销毁，`Maker
    金库`随即关闭。


    图 8-6 展示了整个`Maker 金库`的流程。


    ![](img/535492_1_En_8_Fig6_HTML.png)


    **图 8-6**

    *Maker 金库流程管理：DAI 的创建与销毁*


    当抵押品价值下跌或`DAI`价格上涨时，可能导致`Maker 金库`中持有的以太币抵押品价值低于`DAI`最初的支撑价值。然而，由于`DAI`是通过超额抵押创建的，`Maker`协议会确保`Maker
    金库`持有足够的`以太币`来偿还`DAI`，并在账户风险过高时清算`Maker 金库`。例如，如果市场上的以太币价格跌破某个阈值，`Maker 金库`会锁定抵押品，直到用户偿还足够的`DAI`，或者将以太币拍卖给出价最高者。


    #### Maker（MKR）币的供应


    `MakerDAO`最初发行时供应量为`100 万个 MKR`代币。截至 2022 年 9 月，`Maker`代币的流通供应量约为`977,631`个，市值超过`7.37
    亿美元`。`MKR`的总供应量是一个动态值，取决于市场价格和`Maker 协议`系统的整体健康状况。`Maker`系统通过发行和销毁`MKR`，运用复杂的机制来管理`DAI`的稳定性。


    `DAI`的价值由存储在`Maker`金库中的`ETH`等抵押品保障。当`ETH`市场价格下跌时，`ETH`的价值变得不足以支撑相应数量`DAI`的`$1`锚定价格。在这种情况下，`Maker
    协议`会自动触发金库的清算。


    `Maker 协议`会创建新的`MKR`代币来增加总供应量。然后，这些新的`MKR`代币将被出售，以弥补剩余的价值损失。


    另一方面，如果抵押品价格上涨，为了保持`DAI`的价值稳定，`Maker 协议`会回购并销毁`MKR`代币。通过这种方式，它将减少`MKR`的总供应量，从而导致多余的`DAI`被拍卖。


    总体流程如图 8-7 所示。


    ![](img/535492_1_En_8_Fig7_HTML.png)


    **图 8-7**

    *MKR 代币的流通*


    #### MakerDAO 的治理


    正如我们所了解的，`MKR`是`DAI`的治理代币。`MKR`代币持有者对`MakerDAO`的任何决策都拥有投票权，包括：


    *   添加新的抵押资产金库。

    *   调整现有金库的风险参数。

    *   修改`DAI 储蓄利率`。

    *   触发紧急关停。

    *   选择稳定费。

    *   选择债务上限。

    *   设置预言机喂价集合。

    *   升级系统。


    `Maker 协议`支持链上治理和链下治理的规则。


    包括非`MKR`持有者在内的所有人都可以提出新的治理规则。首先，可以在公共`MakerDAO`论坛（[`https://forum.makerdao.com`](https://forum.makerdao.com)）上对提案进行非正式讨论和链下投票。然后，更正式地由`MKR`持有者在链上进行投票。


    链上投票有两种形式：`治理民意调查`和`执行投票`。可以通过`Maker 基金会`的投票门户网站（[`https://vote.makerdao.com/`](https://vote.makerdao.com/)）进行链上投票。


    #### 治理民意调查


    `治理民意调查`，也称为`提案调查`，用于衡量`MKR`持有者对某个提案的看法。它不会执行链上变更。`治理民意调查`必须在提案进入执行投票阶段之前进行。以下是过去提出的一些例子：


    *   社区绿灯民意调查——Cabot

    *   抵押品上线基于项目的资金请求 (PFR)

    *   关于修改 DAI 基金会核心单位预算的批准投票

    *   哦不，这不应该在这里

    *   PPG——公开市场委员会提案


    ![](img/535492_1_En_8_Figa_HTML.png)

