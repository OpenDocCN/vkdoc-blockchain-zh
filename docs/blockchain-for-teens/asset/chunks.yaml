    test network. As shown in the following screenshot, you should see a green button
    showing a connected status.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig19_HTML.png)


    A screenshot of an account connected in the test network labeled 0.05 goerli E
    T H.


    **Figure 5-19** – Connected `Metamask` Goerli test network


    Now we can deploy our `HelloWorld.sol` to the Goerli test network. Enter "Hello
    Solidity" as the initial message to the right of the orange deploy button. Then
    click deploy. `Metamask` will dynamically calculate the estimated gas fee. You
    can confirm or reject this request before submitting to testnet. Let''s confirm
    this deployment transaction.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig20_HTML.png)


    A screenshot of an interface labeled deploy and run transactions the meta mask
    notification page is displayed at the right.


    **Figure 5-20** – Deploy contract to Goerli test network


    In the Remix console, you will see a block transaction confirmation message which
    returns the transaction hash and other transaction information. Here is the transaction
    hash: `0x7f773384290cff58ff6bb6e4f0411bfb625d3c1aa957208c6e8b8abeeed9d710`


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig21_HTML.png)


    A screenshot of an transaction receipt for hello world contact.


    **Figure 5-21** – Deployed contract with transaction receipt


    In `Metamask`, we can see a new contract deployment information is displayed under
    the Active tab. Notice that the account ether value was deducted by the transaction
    gas fee. The original value is 0.05 ETH. Now it is 0.0487 ETH.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig22_HTML.png)


    A screenshot of an interface labeled goerli test network with account 1 selected.
    At the centre 0.0487 goerli E T H displays buy, send, and swap option.


    **Figure 5-22** – Deployed contract with gas fee


    When you click Contract deployment, it will display details of deployment information.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig23_HTML.png)


    A screenshot of the contract deployment status and transactions details labeled
    confirmed.


    **Figure 5-23** – Contract deployment detail


    You can click the "View on the block explorer." The link will lead to the `etherscan.io`
    page and show this contract deployment detail. You can see that contract was deployed
    to address `0xe02cfad8b29d0aad478862facb2e6a9b1fed7bc9` (Note: it will display
    a different address number when you deploy it). This address is publicly accessible
    for everyone.


    Now that you have deployed your first blockchain smart contract, the transaction
    hash matches the value we see in the Remix console. You can search the address
    from the `etherscan` search bar.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig24_HTML.png)


    A screenshot of an interface for ether scan contract page illustrating transaction
    details marked success.


    **Figure 5-24** – Deployed contract in `etherscan`


    Great! You have published the `HelloWorld` contract in the Goerli test network,
    which is open to the public and accessible from anywhere. Next, let''s build a
    simple Dapp to interact with our smart contract.'
  raw: '## Taking Control of Your First Ethereum Wallet


    In Remix, when we use Injected Provider, Metamask is one of the most widely used
    wallet providers. MetaMask was founded in 2016 by Aaron Davis and Daniel Finlay
    and is currently owned by ConsenSys. As of March 2022, Metamask has over 30 million
    monthly active users. As a free browser extension for Chrome, Firefox, Brave,
    and Edge, MetaMask allows your regular browser to behave as a web3 browser for
    storing and exchanging cryptocurrencies, as well as interacting with Ethereum
    Dapps without running an Ethereum node. Simply put, MetaMask is a mobile crypto
    wallet you can access in your browser. To manage Metamask access, the user needs
    only a password and a 12-word recovery phrase, also known as a seed phrase. The
    seed phrase can be made up of any real words, such as dog, cat, or chicken.


    If you forget or lose wallet recovery phrase, there is no way to recover your
    crypto wallet password. It is very important that you back up these seed phrase
    in a safe and secure place, maybe a hard disk, USB drive, or paper. Don’t store
    it where it’ll be vulnerable, like an email, online storage, etc.


    MetaMask may not be the best place to store large amounts of crypto or valuable
    crypto assets, such as NFTs. When connecting to the mainnet for trading, use MetaMask
    as the only tab in that browser and avoid connecting to social media accounts
    in the same browser—some social media sites have plugins that can steal your data.


    Install MetaMask from [`https://metamask.io`](https://metamask.io). Then download
    the MetaMask wallet software onto your chosen browser. Select the “Create a Wallet”
    option, read the terms and conditions, and create a password. Once installed,
    you will see a fox on the top right of your browser. Open MetaMask, enable the
    test network, or testnet, by clicking Settings➤ Advanced ➤ Show test networks
    and select on button for “Select this to show test networks in network list.”
    Transactions on a testnet are meant to only simulate mainnet transactions, or
    real blockchain transactions.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig15_HTML.png)


    A screenshot of the meta mask interface with a settings page. The option advanced
    settings is selected and the options are labeled as storage logs, sync with mobile,
    reset account, advanced gas controls, show hex data and networks.


