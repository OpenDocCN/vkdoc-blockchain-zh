  trans: "\n# 比特币钱包的工作原理\n\n我们在第二章“密码学”中学习了公钥和私钥。那一章展示了如何使用非对称加密生成一对私钥和公钥的示例。之后，区块链地址会从其公钥中派生出来。\n\
    \n在比特币中，当你创建一个区块链钱包时，私钥和公钥会与之关联。每个地址对应一个私钥。比特币地址是公开可见的，代表了你在区块链中的账户，并用于接收和发送比特币。\n\
    \n私钥是保密的。它用于验证交易、账户所有权，或者花费你账户中的比特币。它可以有多种形式：\n\n1.  一个 256 字符长的二进制代码。示例：\n\n\
    \    ```\n    1010111100111000000011110110001111010111101001010010001011001111011110100011000010100011111100100010100011110001110101000110011111110000101000110001010111010001010011111110101001010011110110110110000001101111010011000001110101101001000010001000010000100111\n\
    \    ```\n\n2.  一个 64 位的十六进制代码。示例：\n\n    ```\n    c2e44f51a0277e7bde2b244de3ac9afb62b528bf2f234f0a0a085e963ef7134e\n\
    \    ```\n\n    关联地址：`1Ghftir7isD9MsJVH6qcTbm2nCBHTs3Csp`\n\n3.  一个二维码。示例：\n\n\
    \    你可以使用在线比特币二维码生成器，通过提供比特币地址来生成二维码：[`www.bitcoinqrcodemaker.com/`](http://www.bitcoinqrcodemaker.com/)。\n\
    \n    ![](img/535492_1_En_3_Fig11_HTML.jpg)\n\n    一幅描绘比特币网页二维码的图片。\n\n    **图\
    \ 3-11** 比特币二维码\n\n4.  助记词短语。示例：\n\n    ![](img/535492_1_En_3_Fig12_HTML.png)\n\
    \n    一个文本截图，展示了助记词短语比特币。它包括了助记词语言和关于比特币钱包的详细信息。\n\n    **图 3-12** 助记词短语\n\n当爱丽丝想要从她的钱包向鲍勃发送一个比特币时，由钱包处理的流程可以描述如下：\n\
    \n**第 1 步 –** 爱丽丝收集要发送的交易数据。一旦确定下来，爱丽丝使用鲍勃的公钥对交易数据进行加密。\n\n**第 2 步 –** 然后，爱丽丝使用她的私钥对交易进行签名，以产生数字签名。接着，爱丽丝将交易、数字签名以及她的公钥发送给鲍勃。\n\
    \n鲍勃接收到了交易消息。他必须验证从爱丽丝发送来的数据未被篡改，并且确实是由爱丽丝发送的。\n\n**第 3 步 –** 鲍勃使用他的私钥解密交易数据。\n\
    \n**第 4 步 –** 鲍勃接收爱丽丝的公钥来验证数字签名，以确保消息来自爱丽丝。\n\n如果验证通过，鲍勃就知道数据未被更改，可以继续处理。\n\n\
    ![](img/535492_1_En_3_Fig13_HTML.png)\n\n一个图示说明了比特币钱包的工作原理。它包含了爱丽丝、交易、鲍勃的公钥、签名私钥、公钥、哈希值、爱丽丝的公钥、原始文档以及鲍勃的私钥等步骤。\n\
    \n**图 3-13** 比特币钱包的工作原理\n\n# 比特币钱包的类型\n\n钱包分为两类：热钱包和冷钱包。两者的区别在于，热钱包需要互联网连接，而冷钱包则离线存储加密代币。\n\
    \n由于热钱包始终连接互联网，因此使用起来方便快捷，适合初学者学习，也适合交易者快速进行在线支付。它的用户友好度很高。另一方面，热钱包通常安全性较低，更容易受到黑客攻击和在线攻击。有几种常见的热钱包类型：网络钱包、移动钱包和桌面钱包。\n\
    \n冷钱包不连接互联网，安全性极高。从冷钱包中窃取资金需要物理接触该冷钱包，并且知道所有者的密码或 PIN 码。这最大限度地减少了在线黑客攻击。同时，它难以访问，用户友好度较低，交易耗时也更长。它适合长期存储大量加密资产。冷钱包包括纸钱包和硬件钱包。\n\
    \n图 3-14 展示了这两种比特币钱包的类型。\n\n![](img/535492_1_En_3_Fig14_HTML.png)\n\n一个流程图描绘了比特币钱包的类型。它被分为热钱包和冷钱包。热钱包细分为网络钱包、移动钱包、桌面钱包。冷钱包细分为纸钱包和硬件钱包。\n\
    \n**图 3-14** 比特币钱包的类型\n\n## 网络钱包\n\n顾名思义，在线钱包存储你的私钥，这些私钥完全由第三方在线管理，通常是中心化交易所。网络钱包供应商以云服务的形式提供。用户友好的网络界面使用户能够轻松管理钱包并执行各种操作，例如发送和接收付款。你可以通过网页浏览器从任何地方访问网络钱包。然而，网络钱包经常成为黑客攻击的目标。在热钱包中，网络钱包是最不安全的。大多数交易所将大部分客户资金离线存储在冷钱包中。出于安全考虑，用户通常不应在热钱包中存放大量加密货币。\n\
    \n流行的网络钱包示例有 [`www.exodus.com/`](http://www.exodus.com/) 或 [`https://electrum.org/`](https://electrum.org/)。\n\
    \n## 桌面钱包\n\n桌面钱包是下载到你的台式机或笔记本电脑设备上运行的计算机软件。这种钱包软件会生成一个数据文件来管理用户的密钥。私钥存储在你的硬盘驱动器或固态硬盘（SSD）上。\n\
    \n与其他热钱包相比，桌面钱包是最安全的，并且是使用计算机进行小额加密交易的绝佳解决方案。使用钱包时，用户应创建一个强密码来保护密钥。\n\n由于桌面钱包连接互联网，它也容易受到恶意软件或病毒的攻击。为了保护桌面钱包中的资金，你需要使用安全的密码短语来保护你的计算机。最佳做法是将大部分资金保存在冷存储中。\n\
    \n## 移动钱包\n\n与桌面钱包类似，移动钱包是安装在手机上的移动应用程序。\n\n## 硬件钱包\n\n比特币硬件钱包是最常用的冷钱包形式，也是最安全的比特币存储方式。账户的私钥与互联网隔离，并存储在一个安全的物理设备中。与便携式设备类似，硬件钱包可以连接到计算机进行交易。设备中的私钥会自动签署加密货币交易，无需你输入密钥，从而有效防止黑客窃取你的私钥。\n\
    \nTrezor（[`https://trezor.io`](https://trezor.io)）和 Ledger 钱包（[`www.ledger.com`](http://www.ledger.com)）是两个最流行的硬件钱包供应商。\n"
- fmt: '# Paper Wallets


    As the name implies, a paper wallet is a piece of paper containing a public and
    a private key associated with a wallet address. In addition, paper wallets are
    often printed in the form of QR codes, so you can quickly scan them to make a
    transaction.


    As a type of cold wallet, paper is pretty safe to store your cryptos since your
    keys are entirely offline and out of reach of online hackers. It is the cheapest
    cold wallet option. Compared to hardware wallets like Trezor Ledger, the cost
    may range between $50 and $300.


    Paper wallets are generated by downloading a wallet generator software.


    Once downloaded, you must check to ensure the software doesn’t contain malware.
    Then, to print out a paper wallet, you need to disable browser add-ons and extensions,
    disconnect from the Internet, and add a passphrase. Finally, follow the wallet
    generator instructions to complete the process, print the newly generated wallet,
    and delete the files. Just make sure no one is watching you create your wallet.


    Avoid using public printers, such as in schools and offices; the wallet information
    could store in the printer’s internal hard drive storage. A public unsecured Wi-Fi
    network could also leak your wallet information.


    A paper wallet is easily damaged or lost. In case the app is uninstalled, you
    will lose your funds. Also, when using a wallet to receive the fund, a paper wallet
    won’t tell you if you received Bitcoins and in what quantity; you will need to
    use another app to check.


    Due to many drawbacks of the paper wallet, it is not currently widespread in use.


    You can create your own Bitcoin paper wallet online from various service providers,
    such as [`https://bitcoinpaperwallet.com/`](https://bitcoinpaperwallet.com/),
    [`https://paperwallet.bitcoin.com/`](https://paperwallet.bitcoin.com/), or [`www.bitaddress.org/`](http://www.bitaddress.org/).


    ## Bitcoin Network


    Bitcoin is a peer-to-peer (P2P) network of nodes that operates on a proof-of-work
    protocol. Each node as a participant is simply a computer that runs the Bitcoin
    software. Nodes randomly select and connect with other peered nodes. Anyone can
    download and install the Bitcoin software to start a new Bitcoin node and join
    the network. The new nodes can come at any time, so the nodes in the network are
    dynamic and join and leave all the time.


    The transaction will be broadcast to other nodes and miners in the network when
    the sender sends Bitcoins to a receiver signed using a Bitcoin wallet. Miners
    use computation power to run the mathematical process to verify transactions and
    add them into a block. After, the miner will broadcast the new block to the network.
    The nodes that received the new node will verify that the miners are following
    the network rules and add a block to their node. Miners are rewarded with minted
    Bitcoin for their contributions to the network. With the confirmed transaction,
    the receiver receives the Bitcoin from the sender.


    There are different types of nodes on the Bitcoin network, of which there are
    three main types: full and super nodes, light nodes or SPV (Simple Payment Verification),
    and mining nodes.


    Let us explore the different nodes in detail.


    ### Full Nodes


    A full node runs Bitcoin software to validate transactions and blocks from other
    full nodes. It can validate transactions all the way back to the genesis block,
    then relay them to further full nodes. Full nodes store a copy of the entire blockchain’s
    history, including all blocks created. At the time of writing, running a Bitcoin
    full node requires at least 280 GB of free space.


    A new full node installs the client’s software and is connected to other peer
    nodes. The client’s software then embeds the “genesis” block—the first node in
    the blockchain—and the new node will send the “version” message that provides
    a block header with block height.


    The peer node will check block height by comparing it with its own copy of the
    entire blockchain data. If the new node block number is lower than its copy, the
    peer node will know how many blocks that new node is missing. The peer node can
    send the new node for the missing block to catch up with the latest block data.
    Each full node can have a maximum of 500 blocks per node connection.


    When setting up a new node as a full node connected to the Bitcoin network, it
    will start an Initial Block Download (IBD) process.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Full node Initial Block Download (IBD)


    IBD refers to downloading and validating all blocks from the genesis block to
    the current block in the blockchain. Depending on the speed of node connection
    and hardware configuration such as CPU and memory, the entire IBD could take several
    hours to days. During the IBD process, a full node will not accept or send transactions.


    **Increase privacy:** Connecting with a third-party node broadcasts your transactions.
    It could gather details about your transactions. Your transaction request is associated
    with your IP address, which can correlate to your name. To protect your privacy
    and stay truly anonymous, you need to connect to the full node you set up to broadcast
    and verify your own transactions.


    The benefits of running a full node are as follows:


    **Maintain decentralization:** By joining the Bitcoin network, you will help the
    network become more decentralized and secure. The full node will ensure that Bitcoin’s
    consensus is followed by rejecting blocks and transactions that don’t follow the
    consensus rule.


    **More security:** Running a full node allows users to create an unsigned transaction,
    called a Partially Signed Bitcoin Transaction (PSBT). You can choose one offline
    wallet to sign the transaction, then you can broadcast the transaction from your
    full node. Your private key is safe during the entire process.


    There are minimum requirements to run a full node, such as:


    - Updated versions of the operating software (i.e., Bitcoin Core)

    - A minimum of 2 GB of random access memory (RAM)

    - A minimum of six hours a day for your node to run

    - A fast Internet connection with a minimum speed of 400 kilobits (50 kilobytes)
    per second

    - A minimum of 280 GB of free storage space, with a minimum read/write speed of
    100 MB/sec.


    ### Light Nodes or SPV


    Light nodes or SPV (Simple Payment Verification) perform a similar function to
    full nodes but only download the block header of previous transactions and confirm
    the validity of the blockchain. Compared to full nodes, it saves a lot of storage
    space and allows for a faster and cheaper transaction. A block header is only
    1/1000 the size of a block. The total size of the Bitcoin blockchain is 280 GB,
    then the total size of the block headers would be around 280 MB. Many mobile photos
    are larger than this. It is an affordable size for a mobile phone or tablet.


    An SPV node or a wallet application needs to know about its user’s unspent transaction
    outputs (UTXO)—the amount of Bitcoin that remains after a transaction. Since the
    SPV nodes only contain the header and don’t have the full picture of all UTXOs
    available for spending, the SPV nodes must connect to other full nodes and query
    to find the related transactions by a given Bitcoin address. Once an SPV node
    gets all related transactions by a given Bitcoin address, the wallet application
    can find out the unspent transaction outputs.'
