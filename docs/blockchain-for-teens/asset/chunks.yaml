    *   Node.js: he document can be found at [https://nodejs.org/en/docs/guides/getting-started-guide/](https://nodejs.org/en/docs/guides/getting-started-guide/)


    ## Tokens Standard


    In Chapter [1](#535492_1_En_1_Chapter.xhtml), we learned Mohammad Bin Tughlaq
    invented token money—Tanka, which used copper currency to represent the same value
    as a silver coin. In a blockchain, the coin represents the native currency. For
    instance, ether is the coin in Ethereum. And a token is created by a smart contract,
    which defines basic token properties, then builds and operates.


    A crypto token is a virtual currency token representing programmable assets or
    shared ownership with access rights to an entity with a specific value. The token
    is managed by a smart contract, which allows for the efficient and secure purchase
    or sale of an item such as an art collection, the exchange of token ownership,
    the transfer of token balance, the storage of token value, and the verification
    of transactions on the blockchain.


    To assist developers in standardizing token creation, the Ethereum community has
    developed many token standards through the Ethereum Improvement Proposal (EIP)
    process.


    EIPs contain standard technical specifications for potential new Ethereum features
    or processes, including core protocol specifications, improvements, client APIs,
    and contract standards. It acts as the “source of truth” for the community. Anyone
    can create an EIP by following standards guidelines in the EIP-1, published in
    2015 ([`https://eips.ethereum.org/EIPS/eip-1`](https://eips.ethereum.org/EIPS/eip-1)).
    As stated in EIP-1, Ethereum Request for Comment (ERC) is the application-level
    standards and conventions. If the specific ERC is approved in the Ethereum community,
    it becomes a new token standard rule which will be outlined in the document through
    a related smart contract.


    There are many token standards, including:


    *   Standards of token (ERC-20, ERC-721, ERC-1155, ERC-777)


    *   Name registries (ERC-26, ERC-137)


    *   URI schemes (ERC-67)


    *   Library/packet formats (EIP-82)


    *   Wallet formats (EIP-75, EIP-85)


    There are many other tokens still in draft and review status. You can check all
    token ERC through this link: [`https://eips.ethereum.org/erc`](https://eips.ethereum.org/erc)


    Let’s take a look at the two most popular ERC standards, ERC-20 and ERC-721.'
