  trans: '

    ### 执行投票


    执行投票对 Maker 协议进行技术性更改，并在区块链上更改协议或整个 DAO 的状态。以下是过去执行投票的一些示例：


    - 引入现实世界资产金库

    - 参数更改

    - 核心单元预算分配

    - `MKR` 归属权转移

    - 就重要的社区目标和指标达成共识

    - 抵押品引入


    投票权由投票者拥有并提交的 `MKR` 代币数量来衡量。


    例如，如果 100 位持有 100 个 `MKR` 的投票者投票给提案 A，而 50 位持有 1,000 个 `MKR` 的投票者投票给提案 B，那么提案
    B 将获胜，因为它获得了更多 `MKR` 代币的支持。


    ### 对提案进行投票


    接下来，我们将演示如何在 Maker 基金会的投票门户中对提案进行投票。


    #### 步骤 1：获取你的 MKR 代币


    你可以找一个交易所来购买、出售和交易 `MKR`，例如 Coinbase、Binance、Kraken、`crypto.com` 等。


    #### 步骤 2：使用钱包连接到以太坊主网


    点击 Maker 基金会投票门户中的 `connect wallet` 按钮，并通过选择一个钱包连接到以太坊：


    ![](img/535492_1_En_8_Figb_HTML.png)


    一张使用钱包连接到以太坊主网的屏幕截图显示了选择钱包的选项以及一个欢迎回来的界面。


    #### 步骤 3：选择一项进行中的投票


    在投票门户中寻找一项进行中的投票，并选择投票选项：


    ![](img/535492_1_En_8_Figc_HTML.png)


    一张进行中投票界面的屏幕截图显示了某一特定的治理投票、你的投票区域、投票百分比明细以及系统信息。


    #### 步骤 4：审核并提交你的投票


    ![](img/535492_1_En_8_Figd_HTML.png)


    一张审核并提交投票界面的屏幕截图显示了该特定治理投票，其中包含你的投票和评论框、提交选项，并且还显示了包含以太坊主网详情的 MetaMask 通知。


    #### 步骤 5：投票完成


    ![](img/535492_1_En_8_Fige_HTML.png)


    一张投票完成界面的屏幕截图显示文本内容为：你已成功对 1 项投票进行投票，并附有该投票的详细信息，以及分享你所有投票的选项。


    ## 去中心化交易所 (DEXs)


    中心化交易所 (CEXs) 的工作方式类似于银行。买卖双方都信任这些交易平台来交易他们的资产。用户可以通过支付一定的交易费用，在交易所的中心化钱包中买入、卖出和交易数字资产，如比特币、以太币或其他加密货币，而交易所将通过内部系统控制这些资金以及加密货币交易的执行。然后代表用户在区块链上签署交易。


    流动性是指你能在不影响其市场价格的情况下将资产兑换成现金的速度。由于中心化交易所受到高度监管，它们吸引了许多活跃用户。这些用户创造了更多的订单，带来了更高的交易量和更快的兑换速度，这意味着更高的流动性。


    要创建一个中心化交易所账户，用户必须提供由政府颁发的有效身份证件、银行详细信息和其他个人信息。注册过程是法规要求的 KYC（了解你的客户）和 AML（反洗钱）实践的一部分。此外，它有助于交易所确定客户的风险等级，并防止洗钱和恐怖主义融资等犯罪活动。一旦中心化交易所验证并批准了身份，用户就可以通过电汇、ACH
    转账或存入比特币或以太币等加密货币，将资金存入交易所账户。然后，用户就可以开始交易了。


    Coinbase、Kraken、`Crypto.com` 和 Binance 是知名的中心化交易所例子。


    尽管中心化交易所 (CEXs) 目前处理了大部分的加密货币交易活动，但去中心化交易所 (DEXs) 正越来越受欢迎。DEXs 与中心化加密货币交易所截然相反，后者管理交易所的代币所有权并持有用户的私钥。去中心化交易所
    (DEXs) 是点对点交易平台，允许用户保持对其资金的控制权，并在没有中介控制交易过程的情况下购买或出售基于区块链的代币和加密货币。相反，用户控制着钱包的私钥。DEXs
    使用智能合约，这些合约定义了设定的条件来执行交易，并以较低的交易费用将每笔交易记录在区块链上。由于 DEXs 不涉及任何中心化机构，这意味着不需要 KYC/AML。任何人都可以开设账户参与
    DeFi 生态系统进行交易。交易是完全匿名的。


    表 8-1 比较了中心化交易所和去中心化交易所的区别：


    **表 8-1** 中心化交易所与去中心化交易所比较


    |                | CEXs                      | DEXs                       |

    |----------------|---------------------------|----------------------------|

    | 控制权         | 交易所控制资金            | 用户控制资金               |

    | 费用           | 需要。交易费用较高        | 零费用或极低费用           |

    | 流动性         | 高流动性                  | 低流动性                   |

    | 监管           | 需要 KYC/AML              | 不需要 KYC/AML             |

    | 用户身份       | 非匿名                    | 匿名                       |

    | 使用便捷性     | 易于使用（即使对初学者）  | 不易用，需要专业知识       |

    | 安全性         | 可能遭受黑客攻击和服务器宕机 | 无黑客攻击和服务器宕机问题 |


    ### 去中心化交易所的类型


    DEXs 是去中心化金融 (DeFi) 的基础，它允许在自动化智能合约上进行数字资产交易。主要有三种类型的去中心化交易所：自动做市商、订单簿 DEXs 和
    DEX 聚合器，如图 8-8 所示。


    ![](img/535492_1_En_8_Fig8_HTML.png)


    一张组织结构图描绘了三种类型的去中心化交易所。这些类型是自动做市商、进一步细分为链上订单簿和链下订单簿的订单簿 DEXs，以及 DEX 聚合器。


    **图 8-8** 去中心化交易所的类型


    ### 自动做市商 (AMMs)


    在传统的交易平台上，做市商通常是一家经纪公司、大型银行或机构，顾名思义，它们会“创造市场”。做市商通过用自己的账户买卖证券，为市场中的交易对创造流动性。买方和卖方对资产出价不同，做市商总是对特定资产报出双边市场。他们通过为投资者提供买卖解决方案，从买卖价差（资产的卖出价高于买入价）中赚取差价。


    交易者 Alice 想以 19,600 美元的价格购买 1 个 BTC。交易所需要找到一位交易者 Bob，他愿意以 Alice 偏好的交易范围（例如 19,700
    美元）卖出 1 个 BTC。中心化交易所将充当 Alice 和 Bob 之间的中间人。假设 Bob 接受报价，交易所将向 Bob 出价 19,620 美元。然后，交易所将以
    19,660 美元的价格向 Alice 卖出 1 个 BTC。交易所将获得约 40 美元的利润。这个过程如图 8-9 所示。


    ![](img/535492_1_En_8_Fig9_HTML.png)


    一张关于 Alice 和 Bob 之间中心化交易所活动的示意图。Bob 想以 19,700 美元卖出 1 个 BTC，但 Alice 想以 19,600 美元买入。Alice
    想以 19,660 美元卖出 1 个 BTC，而 Bob 想以 19,620 美元买入。这些交易的利润是 40 美元。


    **图 8-9** 做市商活动


    在自动做市商 (AMM)（有时称为主动做市商）的情况下，做市商被使用智能合约的自主协议所取代。AMM 中的智能合约始终在两个（或多个）资产之间提供报价，并确定数字资产的价格和提供流动性。

