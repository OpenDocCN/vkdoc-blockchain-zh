  raw: '#### Three Native Tokens in Decentraland


    In Decentraland, there are three native tokens , two ERC-721 NFT tokens, and one
    ERC-20 token.


    The parcels of digital land where a user interacts and creates are called LAND,
    an NFT token, Parcels are 1x1 land plots. There are a total of 90,601 parcels
    of land in Decentraland. The second NFT token is ESTATE, allowing the user to
    merge two or more adjacent parcels of LAND through the Marketplace. Estates are
    very useful for managing larger LAND holdings.


    On the other hand, MANA is an ERC-20 token that is the official native cryptocurrency
    of Decentraland. One LAND can be purchased for 1,000 MANA. In Decentraland, users
    can use MANA to do the following:


    To buy parcels, digital goods, and services in the virtual world


    To burn in order to claim LAND parcels


    The token holder has the right to vote on platform policies through the DAO


    #### Decentraland Architecture


    The Decentraland protocol is comprised of three layers :


    ##### Consensus Layer


    Each parcel of LAND is an NFT token, defined by LANDregistry smart contract. The
    EstateRegistry contracts define ESTATE tokens. Smart contracts power the consensus
    layer and track the ownership of land parcels and their content. Users can buy
    new parcels of LAND with the MANA token. And the LANDregistry contract burns MANA
    whenever it creates a new LAND.


    ##### Land Content Layer


    Land content stores the reference of a hash of the file’s content. From this reference,
    the application can download digital content of parcel of digital land from BitTorrent
    or IPFS. The downloaded file contains a description of the image, textures, sounds,
    and other elements needed to render the scene.


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig12_HTML.png)


    A schematic depicts the layers of the decentral and protocol, processed in 3 layers
    real-time, land content, and consensus. It includes decentral and client, nearby
    clients, P 2 P servers, content, land, estate smart contract, and I P F S.


    Figure 7-12


    Decentraland protocol layers


    ##### Real-time Layer


    The real-time layer enables peer-to-peer connection, or the ability for users
    to communicate with each other. These connections are necessary to build community
    social interaction. Decentraland also has an avatar messaging voice chat.


    Figure [7-12](#535492_1_En_7_Chapter.xhtml#Fig12) summarizes Decentraland protocol
    layers.


    #### Buy Land in the Metaverse


    Anyone can buy, sell, or rent land on the official Decentraland Marketplace or
    through an NFT marketplace like OpenSea . Decentraland also provides the mortgage
    option of obtaining land. However, before starting with the land purchase, make
    sure you go through the following steps:


    ##### Step 1 – Select a Metaverse Platform and Sign In


    In our case, we will select Decentraland platform ( [`https://market.decentraland.org/`](https://market.decentraland.org/)
    ).


    Directly use Metamask to connect or register an account at the Decentraland platform.
    Metamask is recommended to purchase and sell land:


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Figa_HTML.png)


    A screenshot of the metaverse platform and sign-in. The labeled steps on the left
    side are metamask, formatic, wallet connect, and coin base wallet and the right
    side are signature requests for account 1.


    Once signed in, select the “Land ” tab to be directed to the land parcels for
    sale (see the following image):


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Figb_HTML.png)


    An illustration with headers as an overview, collectibles, land, and my asset.
    The land is highlighted by a line under it to illustrate maze structures.


    ##### Step 2 – Buy Cryptocurrency


    Most Metaverse platforms . and NFT marketplaces require you to have a native crypto
    token beforehand. You can purchase these currencies on crypto exchanges such as
    Coinbase and Binance and send these tokens to your wallet address, for example,
    Metamask or Coinbase Wallets.


    ##### Step 3 – Choose a Plot of LAND


    The marketplace allows you to view individual parcels at various options. Select
    on sale option . You can examine nearby locations. The main things to consider
    before buying land in the Metaverse are:


    *   Land price.


    *   Size of the virtual land area.


    *   Area: Close to popular attractions (hubs, shops, galleries, event spaces,
    etc.).


    *   Who is the seller of the land.


    *   Transaction history.


    *   Utility potential (gallery, events space, shop, etc.).


    Click on a virtual property to learn more details until you find the land you
    want to purchase. The land prices are listed in MANA with the owner’s detail information:


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Figc_HTML.png)


    An illustration depicts the plot of land into 3 processes cheapest fash at 4599,
    fashion street at 4640, and admiralbulldo at 3650.


    ##### Step 4 – Purchase the Property


    Once you have found and selected the property that you want to buy, the “buy,”
    and “bid” buttons allow you to place an order and complete a purchasing transaction.
    You can use Ether or MANA to purchase .


    Once you click the “buy” button, you will be asked to confirm your purchase. It
    will take a few seconds to a few minutes until the transaction is complete. Now
    you owned the virtual Metaverse land.


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Figd_HTML.png)


    An illustration depicts the purchase of the property. The labeled process is admiral
    bulldog''s land.


    You can buy the land in Open Sea too. Click explore ➤ virtual land. You will see
    the Decentraland collections shows.


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Fige_HTML.png)


    An illustration depicts the land in the open sea by clicking explore, virtual
    land, and see the decentral and collection of 6 virtual lands displayed.


    Click in Decentraland . It will show you available land for sale. Pick one of
    these lands you want to buy to complete your purchase:


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Figf_HTML.png)


    A screenshot depicts the available land for sale and picks any one of these displayed
    14 lands you want to buy to complete your purchase in the open sea.


    ## The Future of the Metaverse


    When Neal Stephenson first described the Metaverse in his novel Snow Crash in
    1992, the Metaverse was simply a concept from science fiction. However, since
    Facebook rebranded as Meta in October 2021, the nebulous idea that inspired the
    new name has been a hot topic of discussion, shown in the following diagram.


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Figg_HTML.png)


    A wave graph depicts the metaverse interest over time. The highest wave level
    is 100 and gradually decreases to below 40.


    While it may seem that the Metaverse is everywhere and will happen in the near
    future, it may take several years before it is fully implemented. Mark Zuckerberg,
    the CEO of Meta, estimates it can take five to ten years before the key features
    of the Metaverse will become mainstream.


    The future Metaverse would be similar to our real life in many aspects where people
    can do everything they do in real life: work, study, shop, play, social in the
    virtual world.


    There are three stages of Metaverse evolution.


    ### Metaverse Stages 1: Emerging (2021–2030)


    In this stage, the Metaverse will continue to integrate various innovative technologies
    with existing systems to reconstruct its basis, from the experience layer to the
    infrastructure layer. With a relatively lower barrier for entry, the creator economy
    and discovery layer is likely to see the most activity. A virtual world consisting
    of a large-scale human society with a fully digital representation of the physical
    reality will appear. However, reality and virtuality stay as two parallel spaces.'
  trans: "\n# Decentraland 中的三种原生代币\n\n在 Decentraland 中，有三种原生代币，包括两种 ERC-721 NFT 代币和一种\
    \ ERC-20 代币。\n\n用户进行交互和创作的数字土地地块被称为 `LAND`，这是一种 NFT 代币。每个地块为 1x1 的土地单元。Decentraland\
    \ 中共有 90,601 块土地。第二种 NFT 代币是 `ESTATE`，它允许用户通过市场将两块或更多相邻的 `LAND` 合并。庄园对于管理更大的 `LAND`\
    \ 资产非常有用。\n\n另一方面，`MANA` 是一种 ERC-20 代币，是 Decentraland 的官方原生加密货币。一块 `LAND` 可以用\
    \ 1,000 `MANA` 购买。在 Decentraland 中，用户可以使用 `MANA` 进行以下操作：\n\n- 在虚拟世界中购买地块、数字商品和服务\n\
    - 通过销毁 `MANA` 来认领 `LAND` 地块\n- 代币持有者有权通过 DAO 对平台政策进行投票\n\n## Decentraland 架构\n\
    \nDecentraland 协议由三个层次组成：\n\n### 共识层\n\n每块 `LAND` 都是一个 NFT 代币，由 `LANDregistry`\
    \ 智能合约定义。`EstateRegistry` 合约定义了 `ESTATE` 代币。智能合约驱动共识层，并追踪土地地块及其内容的所有权。用户可以使用 `MANA`\
    \ 代币购买新的 `LAND` 地块。并且 `LANDregistry` 合约在创建新的 `LAND` 时会销毁 `MANA`。\n\n### 土地内容层\n\
    \n土地内容存储文件内容哈希的引用。根据此引用，应用程序可以从 BitTorrent 或 IPFS 下载数字土地地块的数字内容。下载的文件包含渲染场景所需的图像、纹理、声音及其他元素的描述。\n\
    \n![](img/535492_1_En_7_Fig12_HTML.png)\n\n该示意图描绘了 Decentraland 协议的各个层次，按三个层次处理：实时层、土地内容层和共识层。它包括\
    \ Decentraland 客户端、附近客户端、P2P 服务器、内容、土地、庄园智能合约以及 IPFS。\n\n图 7-12  \nDecentraland\
    \ 协议层次\n\n### 实时层\n\n实时层支持点对点连接，即用户之间相互通信的能力。这些连接对于构建社区社交互动是必要的。Decentraland 还提供虚拟形象消息语音聊天。\n\
    \n图 7-12 总结了 Decentraland 协议层次。\n\n## 在元宇宙中购买土地\n\n任何人都可以在官方 Decentraland 市场或像\
    \ OpenSea 这样的 NFT 市场上购买、出售或租赁土地。Decentraland 还提供抵押获取土地的选项。然而，在开始购买土地之前，请确保您完成以下步骤：\n\
    \n### 第一步 – 选择元宇宙平台并登录\n\n在我们的案例中，我们将选择 Decentraland 平台（`https://market.decentraland.org/`）。\n\
    \n直接使用 Metamask 连接，或在 Decentraland 平台注册账户。推荐使用 Metamask 进行土地买卖：\n\n![](img/535492_1_En_7_Figa_HTML.png)\n\
    \n一张元宇宙平台和登录的截图。左侧标注的步骤为 Metamask、Formatic、Wallet Connect 和 Coinbase Wallet；右侧为账户\
    \ 1 的签名请求。\n\n登录后，选择“土地”选项卡，即可进入待售土地地块页面（见下图）：\n\n![](img/535492_1_En_7_Figb_HTML.png)\n\
    \n一张带有标题的插图，标题分别为概览、收藏品、土地和我的资产。“土地”一词下方用线条突出显示，以示意迷宫结构。\n\n### 第二步 – 购买加密货币\n\
    \n大多数元宇宙平台和 NFT 市场要求您事先拥有原生加密代币。您可以在 Coinbase 和 Binance 等加密货币交易所购买这些货币，并将这些代币发送到您的钱包地址，例如\
    \ Metamask 或 Coinbase 钱包。\n\n### 第三步 – 选择一块 LAND\n\n市场允许您以多种选项查看单个地块。选择“在售”选项。您可以查看附近的位置。在元宇宙购买土地之前需要考虑的主要事项有：\n\
    \n- 土地价格。\n- 虚拟土地面积的大小。\n- 区域：靠近热门景点（中心、商店、画廊、活动空间等）。\n- 土地卖家是谁。\n- 交易历史。\n- 用途潜力（画廊、活动空间、商店等）。\n\
    \n点击虚拟房产以了解更多详情，直到找到您想要购买的土地。土地价格以 `MANA` 标价，并列有所有者的详细信息：\n\n![](img/535492_1_En_7_Figc_HTML.png)\n\
    \n一张插图将地块分为三个过程：最便宜的闪购价为 4599，时尚街为 4640，admiralbulldo 为 3650。\n\n### 第四步 – 购买房产\n\
    \n一旦您找到并选中了想要购买的房产，“购买”和“出价”按钮允许您下订单并完成购买交易。您可以使用以太币或 `MANA` 进行购买。\n\n点击“购买”按钮后，系统会要求您确认购买。交易完成需要几秒到几分钟的时间。现在您就拥有了这块虚拟元宇宙土地。\n\
    \n![](img/535492_1_En_7_Figd_HTML.png)\n\n一张插图描绘了房产的购买过程。标注的过程为 admiral bulldog\
    \ 的土地。\n\n您也可以在 OpenSea 上购买土地。点击“探索”➤“虚拟土地”。您将看到显示的 Decentraland 收藏品。\n\n![](img/535492_1_En_7_Fige_HTML.png)\n\
    \n一张插图描绘了在 OpenSea 上通过点击“探索”、“虚拟土地”，并看到显示的 6 块虚拟土地的 Decentraland 收藏品。\n\n点击 Decentraland。它将显示可供出售的土地。选择其中一块您想购买的土地以完成购买：\n\
    \n![](img/535492_1_En_7_Figf_HTML.png)\n\n一张截图显示了可供出售的土地；选择显示的 14 块土地中的任意一块进行购买，以在\
    \ OpenSea 上完成交易。\n\n## 元宇宙的未来\n\n当尼尔·斯蒂芬森在 1992 年的小说《雪崩》中首次描述元宇宙时，元宇宙还只是一个科幻概念。然而，自从\
    \ Facebook 于 2021 年 10 月更名为 Meta 以来，这个为新名称带来灵感的模糊概念便成为了热议话题，如下图所示。\n\n![](img/535492_1_En_7_Figg_HTML.png)\n\
    \n一张波浪图显示了随时间变化的元宇宙关注度。最高波浪值为 100，之后逐渐降至 40 以下。\n\n虽然元宇宙似乎无处不在，并且即将在不久的将来实现，但它可能需要数年时间才能完全落地。Meta\
    \ 首席执行官马克·扎克伯格估计，元宇宙的关键功能需要五到十年才能成为主流。\n\n未来的元宇宙将在许多方面类似于我们的现实生活，人们可以在虚拟世界中完成他们在现实中所做的一切：工作、学习、购物、娱乐和社交。\n\
    \n元宇宙的演进分为三个阶段。\n\n### 元宇宙第一阶段：兴起（2021–2030）\n\n在这一阶段，元宇宙将继续将各种创新技术与现有系统相结合，以重建其基础，从体验层到基础设施层。由于进入门槛相对较低，创作者经济和发现层可能会看到最活跃的活动。一个由大规模人类社会组成的虚拟世界，以完全数字化的方式呈现物理现实，将会出现。然而，现实与虚拟仍将作为两个平行的空间存在。\n"
- fmt: '### Metaverse Stages 2: Advanced (2030–2050)


    The physical and digital worlds gradually merge and blend. Many aspects of our
    real-life elements, such as work, study, shopping, social, finance, entertainment,
    and many other services in the real world, are connected or migrated to the virtual
    world. The population and activities of the virtual world continue to expand further,
    and the Metaverse has become an important part of human life.


    ### Metaverse Stages 3: Mature (After 2050)


    The Metaverse becomes a persistent and self-sustaining real-world reality, and
    achieves a virtual universe depicted at the “Oasis” level in the 2018 movie “Ready
    Player One.” The concept “Full dive VR” — a term coined by the Japanese light
    novel Sword Art Online in 2009 — describes a virtual reality experience where
    a person fully “dives in” to the virtual world and becomes disconnected from the
    actual physical reality; in a sense, it would almost be like teleportation.


    At that time, the virtual and real worlds will be indistinguishable, and the population
    and usage of the virtual world will be numerous.


    ## Summary


    In this chapter, you were first introduced to concepts of the Metaverse, including
    its history and characteristics. Then, you explore various immersive technologies,
    including AR, VR, MR, and XR, and learned how these technologies work. Next, you
    learned Metaverse layers to understand different products or services in the Metaverse
    landscape. Also, we discussed how NFTs and crypto games function in the Metaverse.
    Finally, you entered a virtual blockchain world to buy virtual land to experience
    the current stage of virtual real estate in the Metaverse.


    By the end of this chapter, we discussed the Future of the Metaverse.


    In the next chapter, you’ll explore decentralized finance, or DeFi, one of the
    most popular topics in the 2022 crypto space. We will give an overview of DeFi’s
    core concepts and structure and deep dive into DeFi products, such as decentralized
    stablecoins, decentralized exchanges, and decentralized Lending and Borrowing.
    You’ll also see a step-by-step guide to using DeFi products in practice. The chapter
    will be a good opportunity for you to understand DeFi protocol in general.


    # 8. Decentralized Finance (DeFi): Reinventing Financial Services


    The global financial system consists of many institutions, such as banks, insurance
    companies, stock exchanges, and various governmental agencies that regulate these
    institutions. The traditional finance service is centralized. Central authorities
    issue the currency and control the supply and distribution of money that fuels
    the economy. Centralized financial institutions manage the assets and carry out
    transactions through the centralized system to reduce fraud. However, these processes
    also increase complexity within the system and lead to high intermediary costs
    as well as slow transaction times. In addition, these transactions are not fully
    transparent to all parties involved.


    Cryptocurrency adoption has accelerated rapidly over recent years, and crypto
    markets that trade digital assets in decentralized networks require no third-party
    intermediary. As a result, the popularity of these markets is reshaping the global
    financial industry.


    Decentralized finance (DeFi) represents an innovative way to rebuild traditional
    financial services. Financial products are built around public or consortium blockchain
    and smart contracts. Users control their assets and personal data when transacting
    in the DeFi system. As the crypto industry matures, more investment will be going
    toward building DeFi solutions. Subsequently, the global decentralized finance
    market has experienced tremendous growth since 2020. It is expected to grow at
    a steady compound annual growth rate (CAGR) of 43.8% from 2022 to 2030.


    The DeFi ecosystem comprises a wide range of products, including infrastructure,
    decentralized exchanges (DEXs), lending and borrowing, stablecoins, insurance,
    payments, Decentralized Autonomous Organizations (DAO), and custodial services.


    The goal of this chapter is to introduce you to DeFi. We will provide an overview
    of DeFi’s core concepts and structure, as well as an in-depth look at specific
    products in DeFi, such as decentralized stablecoins (e.g., MakerDAO’s DAI), decentralized
    exchanges (e.g., Uniswap), and decentralized Lending and Borrowing (e.g., Aave).
    Finally, by providing a step-by-step guide to using DeFi products in practice,
    the chapter will help you gain the knowledge needed to make real-world DeFi investments
    and trades.


    This chapter will help you to understand the following practical topics:


    - What is decentralized finance (DeFi)?

    - The structure of DeFi

    - Decentralized stablecoin

    - Decentralized exchanges (DEXs)

    - Decentralized lending and borrowing

    - Decentralized insurance'
