  trans: '

    ### Rarible


    `Rarible` 与 `OpenSea` 非常相似——该平台允许用户购买、出售以及创作艺术、视频、收藏品和音乐。不过，`Rarible` 使用其自有代币（`CRYPTO:RARI`），该代币在
    `OpenSea` 上也得到支持。`Yum! Brands (NYSE:YUM)` 旗下的 `Taco Bell` 已在 `Rarible` 上架了艺术品，云软件公司
    `Adobe (NASDAQ:ADBE)` 也与 `Rarible` 建立了合作关系：


    ![](img/535492_1_En_6_Figi_HTML.png)


    `Rarible` 平台优缺点概览。


    ### SuperRare


    另一个面向数字创作者的、与 `OpenSea` 和 `Rarible` 相似的市场是 `SuperRare`。该网站提供可使用 `Ethereum` 购买的艺术、视频和
    3D 图像，尽管许多 `SuperRare` 的 `NFT` 在其他地方无法购得。每个 `NFT` 也都是单一版本。`SuperRare` 宣布了其自有代币。`SuperRare`
    的 `NFT` 可以在 `OpenSea` 上交易。`SuperRare` 的另一个独特之处在于，它允许艺术家上传 `NSFW`（即 `Not Safe for
    Work` 的缩写）。`NSFW` 是指包含性内容、裸露、暴力以及其他可能引发观众不适的内容：


    ![](img/535492_1_En_6_Figj_HTML.png)


    `SuperRare` 平台优缺点概览。


    ### Foundation


    `Foundation.app` 是一个使用 `Ethereum` 进行数字艺术品拍卖和竞标的场所。该平台上已售出价值超过 `1` 亿美元的 `NFT`。但是，在该平台创建账户需要获得现有
    `Foundation` 社区成员的邀请：


    ![](img/535492_1_En_6_Figk_HTML.png)


    `Foundation` 应用优缺点概览。


    ### Nifty Gateway


    `Nifty Gateway` 曾助力销售一些最著名数字艺术家的作品，包括 `Beeple` 以及歌手兼词曲作者 `Grimes`。然而，要上手使用，你必须已经是知名的数字艺术家、名人或品牌，并通过申请流程获得销售批准。该网站由加密货币交易所
    `Gemini` 提供技术支持，其被称为 `Nifties` 的 `NFT` 构建在 `Ethereum` 上。`Nifty Gateway` 也托管所有购买的
    `NFT`——这意味着这些 `NFT` 并非存储在你自己的钱包中，而是实际存储在 `Nifty Gateway` 中：


    ![](img/535492_1_En_6_Figl_HTML.png)


    `Nifty Gateway` 平台优缺点概览。


    ### Axie Marketplace


    `Axie Marketplace` 实际上是名为 `Axie Infinity` 的电子游戏的商店，用户可以在其中购买一种名为 `Axie` 的生物。玩家可以训练他们的
    `Axie` 并与其他 `Axies` 对战以获取奖励。用户还可以购买可在游戏中使用的土地和物品作为 `NFT`。`Axie Marketplace` 使用一种名为
    `Axie Shards` 的货币。该代币基于 `Ethereum` 区块链，并可在其他 `NFT` 市场和 `Coinbase` 全球平台上使用：


    ![](img/535492_1_En_6_Figm_HTML.png)


    `Axie Marketplace` 平台优缺点概览。


    ### NBA Top Shot Marketplace


    `NBA Top Shot` 是由 `National Basketball Association` 创建的市场。该市场收录了只能在平台内获取的 `NBA`
    比赛集锦视频和精彩片段收藏品。截至 2022 年 5 月，该市场销售额已突破 `10` 亿美元，并拥有超过 `40,000` 个 `NFT`：


    ![](img/535492_1_En_6_Fign_HTML.png)


    `NBA Top Shot Marketplace` 平台优缺点概览。


    ### Mintable


    `Mintable` 与 `OpenSea` 类似——你可以使用 `Ethereum` 买卖艺术品。该平台还允许创作者铸造（mint）他们的 `NFT`，以便将其作品作为数字资产出售：


    ![](img/535492_1_En_6_Figo_HTML.png)


    `Mintable` 平台优缺点概览。


    ### Larva Labs/CryptoPunks


    `Larva Labs` 拥有多个数字艺术和基于 `Ethereum` 的项目，但其中最著名的是他们的 `CryptoPunks` `NFT` 项目。`CryptoPunks`
    取得了惊人的成功——其作品曾以数百万美元的价格售出。目前，它们已售罄，只能从第三方市场购买。


    ![](img/535492_1_En_6_Figp_HTML.png)


    `Larva Labs` 与 `CryptoPunks` 平台优缺点概览。

