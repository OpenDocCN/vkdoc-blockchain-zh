- fmt: '### A Brief History of NFTs


    On December 4, 2021, a paper published by Meni Rosenfield introduced the concept
    of “Colored Coins.” The paper described colored coins as a `Bitcoin` but with
    a mark that allows people to prove ownership of and manage real-world assets.


    On May 3, 2014, Kevin McCoy created the first known “NFT,” which was known as
    `Quantum`. The artwork features an animation of a pulsing octagon that changes
    colors. In June 2021, `Quantum` was sold for $1.47 million at that time; NFTs
    were referred to as “monetized graphics.”


    In October 2015, the first NFT project built on `Ethereum` is launched at the
    `DEVCON 1` conference, which was three months after the `Ethereum` network was
    launched. Players can make real money from the virtual world.


    In September 2016, the first `Rare Pepes` were being sold and traded on `Counterparty`.
    `Pepe the Frog` is a character that became a popular meme across the Internet.


    In 2017, one of the most successful NFT collections of all time was launched by
    the `Larva Labs` studio. Each `CryptoPunk` is a 24x24 size and pixel-art image
    that was generated by an algorithm, with a total of 10,000 `CryptoPunks` minted.


    On November 28, 2017, `CryptoKitties` was launched. `CryptoKitties` is a virtual
    game that allows players to buy, breed, and trade cats.


    From 2018 to 2020, `Decentraland` became increasingly influential in both the
    Metaverse and NFT industries. `Decentraland` is a virtual world where users can
    buy parcels of land. After users own a plot of land, they can lease it out to
    other people or do whatever they want with the virtual environment, such as build
    structures in the land. The platform was launched in 2017, but was opened to the
    public on February 20, 2020.


    In 2020, `NBA Top Shot` launched, which is a marketplace for users to buy highlights
    and videos of NBA moments and players. Each moment is minted in a “pack,” similar
    to a trading card set. When users buy a `Top Shot` NFT, they gain access to `Top
    Shot` challenges and can win prizes and other items from the marketplace.


    In 2021, the most expensive NFT to date was sold. Mike Winkelmann, a digital artist
    known as Beeple, sold an NFT artwork file titled “EVERYDAYS: The first 5,000 days”
    for $69.3 million. It was sold at Christie’s, a major auction house that deals
    with NFTs, making it the first digital artwork to be sold at a major auction house.


    On April 22, 2022, `RTFKT` and `Nike` announced `Nike Cryptokicks`, which is a
    set of sneakers. `RTFKT` later released a set of skins that could upgrade the
    `Nike Dunk Genesis` and give them customizations.


    ## Applications of NFTs


    NFTs are very versatile. Generally, they can come in many different forms and
    be used for many different purposes, hence why NFTs are growing in popularity
    and creators are finding increasing uses for NFTs. Here are some possible ways
    to use NFTs.


    ### Images


    Most NFTs come in the form of still images which can be photographs or works of
    art. There are some NFT marketplaces that limit the size of the file that is being
    minted, but most of the time it is better to provide a higher-resolution image.
    There are two main types of images: raster, or bitmap images and vector graphics.
    Raster images are composed of pixels and support more depth of color than vector
    graphics, but lose their image quality as they are scaled up. On the other hand,
    vector graphics use equations to draw lines, curves, and points to create the
    photo, allowing the photo to scale without losing image quality.


    Here are some examples of NFT images:


    *   “Everydays: The First 5000 Days” by Beeple is a collage of the first 5000
    vector images and gifs created by Beeple for his Everydays series. The piece was
    sold for $69 million in Christie’s, a major auction house.

    *   “Doge” is a picture of a Shiba Inu dog that became popular across the Internet
    and became easily recognizable. The “Doge” picture was sold for $4 million.


    ### Videos


    NFTs can come in the form of videos, which are often very popular. YouTube is
    an established platform for uploading videos and allows its users to sell their
    videos as NFTs. Other popular places to look for NFT videos are NFT marketplaces,
    where users directly upload their files. The benefit of having video NFTs is that
    they can have audio, animation, and videos with very high quality and resolution.


    Here are some examples of NFT videos:


    *   `CROSSROAD` by Beeple is a 10-second video that was originally bought for
    $67,000 and was resold 5 months later for $6.6 million.

    *   “Earth” and “Mars” by Grimes are both short videos that were sold for $7500
    per video. In total, almost 700 videos were sold, generating $5.18 million in
    2 days.

    *   “Auction Winner Picks the Name” by 3LAU created an auction of an NFT music
    video before it was created. The winner of the auction brought the opportunity
    to name the music video for $1.33 million.

    *   “Charlie Bit Me” by Davies-Carr Family was a YouTube video from 2010 that
    was bought by 3F music for $760,999.

    *   “Lebron James ‘Cosmic’ Dunk” by NBA Top Shot was the largest sale on the NBA
    Top Shot marketplace. The video was bought for $387,600.


    ### GIFs


    Graphic Interchange Format, or `GIF`, is a type of file format that is used to
    create a short video that loops. The way `GIFs` work is that multiple images are
    stored in one file, allowing animations or still images—however, people prefer
    to use other file formats for still images like `PNG` and `JPEG`. A benefit of
    using `GIFs` is that unlike videos, which are displayed with a thumbnail and play
    button, `GIFs` automatically play and loop. `GIFs` are also easy to create and
    can play in most browsers.


    However, `GIFs` have existed since 1987 and do have some outdated properties.
    `GIFs` only support 256 colors and do not support audio. They also have larger
    file sizes, so many `GIFs` are usually only a few seconds, have a low frame rate
    (how many images are shown per second), or have small dimensions.


    Here are some examples of NFT GIFs:


    *   `Nyan Cat` by Chris Torres is a `GIF` of a cat that became widely recognized
    across the Internet. The original creator of the `GIF` sold the NFT for 300 ETH,
    or $583,464 on Foundation.

    *   `Finite` by Pak is a `GIF` of a spiraling coil that was sold for 444 ETH,
    which was $864,507 when the piece was sold on Foundation.

    *   `War Haul` by Jake is a `GIF` of barrels of oil being set on fire that was
    sold for 69 ETH, or $223,627 on SuperRare.

    *   `Lova Park` by OSF is a `GIF` of an amusement park where a roller coaster
    passes through a Ferris Wheel. The `GIF` was sold for 82 ETH, or $267,878 on SuperRare.

    *   `Welcome Home` by Coldie is a `GIF` of a man moving on a color-changing path
    toward a sign that says “Welcome.” The piece was sold for 75 ETH, or $242,761
    on SuperRare. This is the first time the NFT `GIF` piece was sold, it sold for
    only 6 ETH.


    ### Audio


    Many music artists have found success in selling music NFTs. Major and independent
    artists have posted their works as NFTs to sell their music and attract new audiences.
    Different audio types include `.mp3` files and `.wav`. In some marketplaces like
    `OpenSea`, audio NFTs require a preview image or `GIF`.


    Here are some examples of NFT music artists:


    *   Grimes has sold around $5.8 million in NFTs. Her main success came from selling
    thousands of copies of two short videos with music called “Earth” and “Mars,”
    as well as a video titled “Death of the Old” for $389,000.

    *   Steve Aoki said he has made more profit in one year from selling NFTs than
    streaming royalties for decade. Through selling NFT collections, he has made millions.

    *   Kings of Leon was a band that made over $2 million by selling tickets that
    gave their buyers front-row seats. They sold an album titled *When You See Yourself*
    as a collection of NFTs.'
