  trans: '

    # NFT 的未来


    NFT 拥有巨大潜力，且该领域的关注度正在迅速增长。然而，围绕 NFT 仍然存在许多担忧。


    目前，关于 NFT 行业是否是一个即将破裂的泡沫存在争议。如前所述，NFT 的价值基于市场对其的需求。近年来，人们愿意为 NFT 支付数千甚至数百万美元，因为他们相信
    NFT 的未来价值会增长。但如果未来人们对 NFT 的兴趣减退，那么现在的投资可能无法在未来获得回报。如果太多人同时退出市场，市场可能会崩盘。不过，NFT
    领域的最终结局可能与 21 世纪初的互联网现象类似——起初人们对 NFT 抱有疑虑并存在大量投机行为，但最终它们会更好地融入社会。NFT 已凭借数十亿美元的销售额和数百万买家证明了自己的价值。


    另一个问题是，NFT 在防盗方面提供的保护也很少。虽然 NFT 提供了所有权证明，但任何人都可以访问正在交易的 NFT，这意味着数字商品可以被复制和下载。未来，随着数字商品和版权法的不断发展，我们可能会开始缓解这个问题。


    当然，NFT 最大的限制之一是其被认为对环境有害。根据英国可再生能源中心的数据，每笔以太坊交易消耗 48.14 千瓦时的能源。相比之下，英国家庭的日均用电量为
    8.5 到 10 千瓦时。不过，环境工程师和科学家们已经在努力减少加密行业的排放，例如使用权益证明（PoS）而非工作量证明（PoW）共识。同样值得一提的是，实体艺术品经常通过飞机或卡车在展馆间运输，这意味着实体艺术也会增加碳足迹。


    说到艺术，NFT 目前最著名的应用场景之一就是数字艺术。随着 NFT 持续为艺术家提供数字分享作品的机会，它为不同背景和经验的艺术家创造了更多可能性。艺术家将不再需要依赖公司、品牌和收藏家，从而能够更自由地探索创作愿景，并找到支持自己的观众。NFT
    还能鼓励创意，因为数字作品可以有多种形式，从虚拟现实到可用于日常生活的作品。


    此外，NFT 也能惠及艺术家的观众。NFT 提高了观赏艺术的可及性——观众无需前往实体空间，因此人们可以随时随地探索画廊。由于区块链交易的直接性，赞助人也可以直接支持艺术家和创作者。


    另一个可能的用途是通过 NFT 销售音乐会和活动门票。纸质门票存在遗失或复制的风险，而以太坊区块链可以提供不可篡改且真实的所有权记录。


    NFT 和区块链游戏在未来几年也可能越来越受欢迎。在线购买和交易游戏内物品及货币已经很常见。NFT 可以成为保障买家数字资产所有权的下一步。


    同样值得一提的是，NFT 还可以用于房地产市场。可以发行 NFT 作为财产所有权的证明。NFT 也可以用作验证工具——学校可以向学生发放 NFT 作为学位完成的证明。


    当然，还有一个在科技界和公众中迅速获得关注的概念：元宇宙。NFT 基于网站，通常用于数字商品，而元宇宙是一个基于虚拟现实的数字空间。虽然乍看之下似乎不同，但许多公司看到了潜力，并找到了将两者结合的方法。


    ## 总结


    在本章中，我们了解到 NFT 是不可替代代币，或是独一无二的单个代币。NFT 最常在以太坊网络上交易；显示所有权证明的数字签名使得文件的转移和购买变得简单。下一章将介绍元宇宙的基础知识，这是一个基于新沉浸式技术的
    3D 互联网。


    # 7. 元宇宙：重塑的世界


    1974 年，哲学家罗伯特·诺齐克讨论了一种体验机器，它可以刺激个体的大脑，使其获得与“现实”世界中体验难以区分的快乐体验。诺齐克提出了一个问题：“如果可以选择，我们会选择机器而不是现实吗？”1999
    年，科幻电影《黑客帝国》提出了一个类似的问题：红色药丸还是蓝色药丸？吞下红色药丸，在现实世界中醒来，发现世界只是矩阵创造的模拟；或者吞下蓝色药丸，传送到虚拟的矩阵情节中？元宇宙的概念类似于《黑客帝国》，在“互联网的未来版本”中，现实世界与虚拟世界融为一体。


    虽然元宇宙仍处于早期阶段，但近年来它迅速进入了主流视野。元宇宙将是未来的 3D 互联网，它基于一系列新技术构建，包括虚拟现实（VR）、混合现实（MR）、增强现实（AR）、区块链、人工智能（AI）和物联网（IoT）。


    本章将介绍元宇宙的基础知识。然后，我们将讨论 AR、VR、MR 和 XR 背后的概念和技术。通过探索元宇宙的不同层级，我们理解其结构。接着，我们讨论 NFT
    和加密游戏如何在元宇宙中运作。然后，通过一个详细的实践示例，我们了解如何在元宇宙世界中购买虚拟房地产资产。在本章末尾，我们将概述元宇宙的未来。


    在本章中，我们将介绍以下关于区块链的具体主题：


    - 元宇宙简介

    - AR、VR、MR 和 XR

    - 理解元宇宙层级

    - 元宇宙中的加密游戏

    - 元宇宙中的虚拟房地产

    - 元宇宙的未来


    ## 元宇宙简介


    元宇宙是各行各业的火热话题，特别是当它与其他技术（如区块链和人工智能）相结合，以构建互联网的未来时。


    ### 什么是元宇宙？


    元宇宙在 2021 年成为顶尖技术和趋势之一，并且至今热度不减。元宇宙尚未到来，但许多大公司已经对元宇宙的开发投入巨资。最终，元宇宙将成为互联网的 3D 变体，并将虚拟现实体验提升到新的水平。它将使用户几乎能够做任何事情——从工作、休闲、社交、教育、购物，甚至通过数字头像购买土地——在一个纯粹的虚拟世界中完成。

