- fmt: '# Transactions


    A transaction refers to a single logical group of actions that need to be treated
    as a single action. The transaction request can be executed successfully or fail.
    The process will ensure data integrity in the system. In a blockchain, a transaction
    is a fundamental element to build block. Transaction data can include the asset,
    price, timestamp, and user account address.


    Now that we have learned the components in a block structure, let’s take a look
    at how blockchain process a transaction request submitted by a user. Alice wants
    to send Bob five Bitcoins (BTC) to the blockchain network; in order to join this
    network, Alice and Bob both need to have an account address. When Alice sends
    five BTC to Bob, the transaction request will be processed on a blockchain:


    1.  Alice sends five Bitcoin from her address to Bob’s Bitcoin address. A transaction
    request was created and authenticated (signed by Alice wallet’s private key).

    2.  A new block is created including this new transaction.

    3.  The new block is broadcast to every node in the network.

    4.  Each node verifies and approves new block transaction data. A node that received
    the transaction will verify the transaction data using blockchain consensus.

    5.  The new block is permanently added to the end of the existing blockchain.

    6.  All nodes update and include this new block.

    7.  The transaction is now complete.


    Figure [1-9](#535492_1_En_1_Chapter.xhtml#Fig9) depicts each step in the transaction
    process.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig9_HTML.png)


    A chain diagram of a block transaction process. The label parts include Alice
    sending a transaction request to bob, a new block being broadcast to every node
    in the network, and all nodes updating & include this new block.


    Figure 1-9


    Block transaction process


    ## Consensus Algorithms


    Consensus algorithms form the backbone of blockchain by helping all the nodes
    in the network reach the necessary agreement on the global state in the chain.
    The consensus validates transactions or data, then broadcasts it across the network.
    All the other nodes will receive a copy of the data and add it to the new block
    by verifying using the same rule.


    These are some important properties of the distributed consensus protocol:


    * **Fault tolerance** – Consensus protocol will ensure that the network continues
    operating smoothly, regardless of any failures.

    * **Unified agreement** – Since blockchain is decentralized in nature, every transaction
    data in the network needs to be validated and verified by the consensus rule.
    Consensus protocol requires reaching a unified agreement between network participants,
    ensuring that all processed data is valid and that the distributed ledger is up-to-date.
    This way, the network can be reliable and users can operate in a decentralized
    manner.

    * **Ensure fairness and equity** – The protocol will not perpetuate bias or discrimination
    in a decentralized network. Anyone will be able to access and join the network
    and attend consensus protocol, and each and every vote will be equal.

    * **Prevent double spending** – Only publicly verified and validated transactions
    can be added to the blockchain ledger. All nodes will agree on a single source
    of truth. This guarantees the different nodes have the same final result in the
    network.


    Each consensus algorithm possesses different features and properties to achieve
    the desired outcome. With the basics of blockchain consensus properties we just
    covered, let’s dive deeper into popular blockchain consensus algorithms in the
    current market.


    ### Proof of Work (PoW)


    Proof of work, also referred to as PoW, is one of the most common consensus algorithms
    used by blockchain and cryptocurrencies such as Bitcoin, Ethereum, Bitcoin Cash,
    ZCash, Litecoin, and others.


    The concept was first published by Cynthia Dwork and Moni Naor in 1993. The term
    “Proof of Work” or POW was used by Markus Jakobsson and Ari Juels in a 1999 paper.
    The first cryptocurrency, Bitcoin, was created by Satoshi Nakamoto in 2008. It
    was the first time that proof of work protocols were used as consensus in the
    blockchain.


    Proof of work describes a mechanism where computers in the network, called miners,
    race each other to be the first to solve complex math puzzles. When miners solve
    this “puzzle,” they are allowed to add a new block to the blockchain and receive
    rewards.


    In “How the Blockchain Works” section, we discussed that all blocks are connected
    through a previous block hash to form a block list. The miner needs to solve exceptionally
    difficult math problems to add a new block. To find a solution, miners have to
    guess a random number (aka nonce) using the brute-force approach till they find
    the solution. The nonce is a 32-bit (4-byte) field. Each block hash value was
    generated by SHA-256 (previous block hash), Merkel root, timestamp, nonce and
    the predefined value of the difficulty target. The difficulty target is shown
    by the leading zeros before the hash. More leading zeros before the hash value
    will make the whole process take more time and resources to compute. With computers’
    power growing, miners can solve these puzzles faster, and so the difficulty target
    of the blockchain will increase accordingly. Figure [1-10](#535492_1_En_1_Chapter.xhtml#Fig10)
    describes how to calculate a block hash in the proof of work.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig10_HTML.jpg)


    An algorithm illustrates the hash in proof of work. The label parts are nonce,
    timestamp, previous block hash, Merkle root, hash, and hash with difficulty target,


    Figure 1-10


    Hash in proof of work


    Here is an example of recent Bitcoin difficulty (there are 19 leading 0s):


    `0000000000000000000469f80aeb7bac1b440652a9ef729658c1010d23962a1cdi`


    It will take a powerful mining machine around ten minutes to mine each Bitcoin
    block. A solo miner will be rewarded around 1 BTC after successful mining.


    As we learned before, SHA-256 hash function is a one-way function, which means
    there is no way to revert to the original value. The fastest solution that we
    know is brute force. Miners need to try different nonce numbers to calculate hashes
    as fast as possible until they find a matching hash.


    Here is the process of proof of work:


    1.  New transactions are broadcasted to all nodes.

    2.  Each node collects the transactions into a candidate block.

    3.  Miner verifies the transactions and proposes a new block.

    4.  Miner competes to solve a difficult puzzle to find a solution of proof of
    work for its block.

    5.  When a miner finds a solution, the PoW is solved and broadcast across the
    block to all nodes.

    6.  Nodes verify that the transactions in the new block are valid and accept adding
    the new block.

    7.  Miner gets the reward.


    Figure [1-11](#535492_1_En_1_Chapter.xhtml#Fig11) visualizes the process of proof
    of work:


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig11_HTML.png)


    A flow illustrates the process of work consensus. The labels include new transactions
    that are broadcasted to all nodes, the miner verifies the transactions & purpose
    of a new block, and the miner gets the reward.


    Figure 1-11


    The process of proof of work


    #### Energy Consumption


    In 2008, you could easily mine one Bitcoin using your personal machine. Today,
    you’d need around 149.2PH/s to mine a Bitcoin. PH is one peta hash:


    `1 PH/s = 1,000,000,000,000,000 (one quadrillion) hashes per second`


    The process typically needs a room full of mining machines, which usually cost
    thousands of dollars, specially designed to improve hash rate ratings and optimize
    power consumption. A large amount of electricity is required to operate these
    mining nodes continuously. In 2022, global Bitcoin mining accounted for 0.12%
    (188 TW/h, Terawatt/hour) of the world’s energy production—which exceeds the energy
    consumption of Norway.'
  raw: '#### Transactions


    A transaction refers to a single logical group of actions that need to be treated
    as a single action. The transaction request can be executed successfully or fail.
    The process will ensure data integrity in the system. In a blockchain, a transaction
    is a fundamental element to build block. Transaction data can include the asset,
    price, timestamp, and user account address.


    Now that we have learned the components in a block structure, let’s take a look
    at how blockchain process a transaction request submitted by a user. Alice wants
    to send Bob five Bitcoins (BTC) to the blockchain network; in order to join this
    network, Alice and Bob both need to have an account address. When Alice sends
    five BTC to Bob, the transaction request will be processed on a blockchain:


    1.  Alice sends five Bitcoin from her address to Bob’s Bitcoin address. A transaction
    request was created and authenticated (signed by Alice wallet’s private key).


    2.  A new block is created including this new transaction.


    3.  The new block is broadcast to every node in the network.


    4.  Each node verifies and approves new block transaction data. A node that received
    the transaction will verify the transaction data using blockchain consensus.


    5.  The new block is permanently added to the end of the existing blockchain.


    6.  All nodes update and include this new block.


    7.  The transaction is now complete.


    Figure [1-9](#535492_1_En_1_Chapter.xhtml#Fig9) depicts each step in the transaction
    process.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig9_HTML.png)


    A chain diagram of a block transaction process. The label parts include Alice
    sending a transaction request to bob, a new block being broadcast to every node
    in the network, and all nodes updating & include this new block.


    Figure 1-9


    Block transaction process


    ## Consensus Algorithms


    Consensus algorithms form the backbone of blockchain by helping all the nodes
    in the network reach the necessary agreement on the global state in the chain.
    The consensus validates transactions or data, then broadcasts it across the network.
    All the other nodes will receive a copy of the data and add it to the new block
    by verifying using the same rule.


    These are some important properties of the distributed consensus protocol:


    *   **Fault tolerance** – Consensus protocol will ensure that the network continues
    operating smoothly, regardless of any failures.


    *   **Unified agreement** – Since blockchain is decentralized in nature, every
    transaction data in the network needs to be validated and verified by the consensus
    rule. Consensus protocol requires reaching a unified agreement between network
    participants, ensuring that all processed data is valid and that the distributed
    ledger is up-to-date. This way, the network can be reliable and users can operate
    in a decentralized manner.


    *   **Ensure fairness and equity** – The protocol will not perpetuate bias or
    discrimination in a decentralized network. Anyone will be able to access and join
    the network and attend consensus protocol, and each and every vote will be equal.


    *   **Prevent double spending** – Only publicly verified and validated transactions
    can be added to the blockchain ledger. All nodes will agree on a single source
    of truth. This guarantees the different nodes have the same final result in the
    network.


    Each consensus algorithm possesses different features and properties to achieve
    the desired outcome. With the basics of blockchain consensus properties we just
    covered, let’s dive deeper into popular blockchain consensus algorithms in the
    current market.


    ### Proof of Work (PoW)


    Proof of work, also referred to as PoW, is one of the most common consensus algorithms
    used by blockchain and cryptocurrencies such as Bitcoin, Ethereum, Bitcoin Cash,
    ZCash, Litecoin, and others.


    The concept was first published by Cynthia Dwork and Moni Naor in 1993\. The term
    “Proof of Work” or POW was used by Markus Jakobsson and Ari Juels in a 1999 paper.
    The first cryptocurrency, Bitcoin, was created by Satoshi Nakamoto in 2008\. It
    was the first time that proof of work protocols were used as consensus in the
    blockchain.


    Proof of work describes a mechanism where computers in the network, called miners,
    race each other to be the first to solve complex math puzzles. When miners solve
    this “puzzle,” they are allowed to add a new block to the blockchain and receive
    rewards.


    In “How the Blockchain Works” section, we discussed that all blocks are connected
    through a previous block hash to form a block list. The miner needs to solve exceptionally
    difficult math problems to add a new block. To find a solution, miners have to
    guess a random number (aka nonce) using the brute-force approach till they find
    the solution. The nonce is a 32-bit (4-byte) field. Each block hash value was
    generated by SHA-256 (previous block hash), Merkel root, timestamp, nonce and
    the predefined value of the difficulty target. The difficulty target is shown
    by the leading zeros before the hash. More leading zeros before the hash value
    will make the whole process take more time and resources to compute. With computers’
    power growing, miners can solve these puzzles faster, and so the difficulty target
    of the blockchain will increase accordingly. Figure [1-10](#535492_1_En_1_Chapter.xhtml#Fig10)
    describes how to calculate a block hash in the proof of work.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig10_HTML.jpg)


    An algorithm illustrates the hash in proof of work. The label parts are nonce,
    timestamp, previous block hash, Merkle root, hash, and hash with difficulty target,


    Figure 1-10


    Hash in proof of work


    Here is an example of recent Bitcoin difficulty (there are 19 leading 0s):


    0000000000000000000469f80aeb7bac1b440652a9ef729658c1010d23962a1cdi


    It will take a powerful mining machine around ten minutes to mine each Bitcoin
    block. A solo miner will be rewarded around 1 BTC after successful mining.


    As we learned before, SHA-256 hash function is a one-way function, which means
    there is no way to revert to the original value. The fastest solution that we
    know is brute force. Miners need to try different nonce numbers to calculate hashes
    as fast as possible until they find a matching hash.


    Here is the process of proof of work:


    1.  New transactions are broadcasted to all nodes.


    2.  Each node collects the transactions into a candidate block.


    3.  Miner verifies the transactions and proposes a new block.


    4.  Miner competes to solve a difficult puzzle to find a solution of proof of
    work for its block.


    5.  When a miner finds a solution, the PoW is solved and broadcast across the
    block to all nodes.


    6.  Nodes verify that the transactions in the new block are valid and accept adding
    the new block.


    7.  Miner gets the reward.


    Figure [1-11](#535492_1_En_1_Chapter.xhtml#Fig11) visualizes the process of proof
    of work:


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig11_HTML.png)


    A flow illustrates the process of work consensus. The labels include new transactions
    that are broadcasted to all nodes, the miner verifies the transactions & purpose
    of a new block, and the miner gets the reward.


    Figure 1-11


    The process of proof of work


    #### Energy Consumption


    In 2008, you could easily mine one Bitcoin using your personal machine. Today,
    you’d need around 149.2PH/s to mine a Bitcoin. PH is one peta hash:


    1 PH/s = 1,000,000,000,000,000 (one quadrillion) hashes per second


    The process typically needs a room full of mining machines, which usually cost
    thousands of dollars, specially designed to improve hash rate ratings and optimize
    power consumption. A large amount of electricity is required to operate these
    mining nodes continuously. In 2022, global Bitcoin mining accounted for 0.12%
    (188 TW/h, Terawatt/hour) of the world’s energy production—which exceeds the energy
    consumption of Norway.'
  trans: '

    # 交易


    交易是指需要被视为单一操作的、逻辑上属于同一组的一系列操作。交易请求可以成功执行，也可能会失败。该过程将确保系统中数据的完整性。在区块链中，交易是构建区块的基本元素。交易数据可以包括资产、价格、时间戳和用户账户地址。


    现在我们已经了解了区块结构中的组成部分，接下来看看区块链如何处理用户提交的交易请求。Alice 想要向区块链网络发送 5 个比特币给 Bob。为了加入这个网络，Alice
    和 Bob 都需要拥有一个账户地址。当 Alice 向 Bob 发送 5 个比特币时，该交易请求将在区块链上按以下步骤处理：


    1.  Alice 从她的地址向 Bob 的比特币地址发送 5 个比特币。创建了一个交易请求并进行身份验证（由 Alice 钱包的私钥签名）。

    2.  创建一个包含此新交易的新区块。

    3.  新区块被广播到网络中的每个节点。

    4.  每个节点验证并批准新区块的交易数据。接收到该交易的节点将使用区块链共识来验证交易数据。

    5.  新区块被永久添加到现有区块链的末端。

    6.  所有节点更新并包含这个新区块。

    7.  交易至此完成。


    图 1-9 描述了交易过程中的每一个步骤。


    ![](img/535492_1_En_1_Fig9_HTML.png)


    一个区块交易过程的链式示意图。标注部分包括：Alice 向 Bob 发送交易请求、新区块被广播到网络中的每个节点、以及所有节点更新并包含这个新区块。


    图 1-9


    区块交易过程


    ## 共识算法


    共识算法构成了区块链的基石，它帮助网络中的所有节点就链上的全局状态达成必要的共识。共识机制验证交易或数据，然后将其广播到整个网络。所有其他节点都会收到一份数据副本，并通过使用相同的规则进行验证，将其添加到新区块中。


    以下是分布式共识协议的一些重要特性：


    * **容错性** – 共识协议将确保无论出现任何故障，网络都能持续平稳运行。

    * **统一协议** – 由于区块链本质上是去中心化的，网络中的每笔交易数据都需要通过共识规则进行验证和确认。共识协议需要在网络参与者之间达成统一协议，确保所有处理过的数据都是有效的，并且分布式账本是最新的。这样，网络才能可靠，用户才能在去中心化的模式下操作。

    * **确保公平与公正** – 该协议不会在去中心化网络中导致偏见或歧视。任何人都能访问和加入网络并参与共识协议，每一票都是平等的。

    * **防止双重支付** – 只有经过公开验证和确认的交易才能被添加到区块链账本中。所有节点将就单一的事实来源达成一致。这保证了网络中不同节点拥有相同的最终结果。


    每种共识算法都具备不同的特性和属性，以实现期望的目标。基于我们刚刚介绍的区块链共识特性的基础知识，让我们深入探讨当前市场上主流的区块链共识算法。


    ### 工作量证明 (PoW)


    工作量证明，也称为 PoW，是区块链和加密货币（如比特币、以太坊、比特币现金、ZCash、莱特币等）最常用的共识算法之一。


    这个概念最早由 Cynthia Dwork 和 Moni Naor 在 1993 年提出。“工作量证明”或 POW 这一术语则是由 Markus Jakobsson
    和 Ari Juels 在 1999 年的一篇论文中使用的。第一种加密货币——比特币，由中本聪在 2008 年创建。这是工作量证明协议首次作为共识机制在区块链中使用。


    工作量证明描述了一种机制：网络中的计算机（称为矿工）相互竞争，看谁先解决复杂的数学难题。当矿工解决了这个“难题”后，他们就被允许向区块链添加一个新区块并获得奖励。


    在“区块链如何工作”一节中，我们讨论了所有区块通过前一个区块的哈希值连接起来，形成一个区块列表。矿工需要解决极其困难的数学问题才能添加新区块。为了找到解决方案，矿工必须使用暴力破解法猜测一个随机数（即
    nonce），直到找到答案。Nonce 是一个 32 位（4 字节）的字段。每个区块的哈希值由 SHA-256（前一个区块哈希值）、Merkle 根、时间戳、nonce
    以及预定义的难度目标值生成。难度目标由哈希值前面的前导零个数表示。哈希值前面的前导零越多，整个过程就需要更多的时间和计算资源。随着计算机算力的增长，矿工可以更快地解决这些难题，因此区块链的难度目标也会相应增加。图
    1-10 描述了如何在 PoW 中计算区块哈希。


    ![](img/535492_1_En_1_Fig10_HTML.jpg)


    一个算法示意图，展示了工作量证明中的哈希计算。标注部分包括：nonce、时间戳、前一个区块哈希值、Merkle 根、哈希值以及带难度目标的哈希值。


    图 1-10


    工作量证明中的哈希值


    以下是近期比特币难度的一个例子（有 19 个前导零）：


    `0000000000000000000469f80aeb7bac1b440652a9ef729658c1010d23962a1cdi`


    一台强大的矿机挖掘每个比特币区块大约需要十分钟。成功挖矿后，单个矿工将获得约 1 BTC 的奖励。


    正如我们之前所了解的，SHA-256 哈希函数是一个单向函数，这意味着无法反向推导出原始值。我们所知的最快的解决方案就是暴力破解。矿工需要尝试不同的 nonce
    数字，尽可能快地计算哈希值，直到找到匹配的哈希值。


    以下是工作量证明的过程：


    1.  新的交易被广播到所有节点。

    2.  每个节点将交易收集到一个候选区块中。

    3.  矿工验证交易并提出一个新区块。

    4.  矿工竞争解决一个难题，为其区块找到工作量证明的解决方案。

    5.  当矿工找到解决方案时，PoW 被解决，并随区块一起广播到所有节点。

    6.  节点验证新区块中的交易是否有效，并接受添加该新区块。

    7.  矿工获得奖励。


    图 1-11 直观展示了工作量证明的过程：


    ![](img/535492_1_En_1_Fig11_HTML.png)


    一个流程图，展示了工作量证明共识的过程。标签包括：新交易被广播到所有节点、矿工验证交易并提出新区块、以及矿工获得奖励。


    图 1-11


    工作量证明的过程


    #### 能源消耗


    在 2008 年，你可以轻松地使用个人电脑挖掘一个比特币。而如今，你需要大约 149.2 PH/s 的算力才能挖到一个比特币。PH 是 peta hash
    的缩写：


    `1 PH/s = 1,000,000,000,000,000 (一千万亿) 哈希每秒`


    该过程通常需要一整个房间的矿机，这些机器通常价值数千美元，专门设计用于提高哈希率等级和优化功耗。持续运行这些挖矿节点需要消耗大量的电力。2022 年，全球比特币挖矿消耗了世界能源产量的
    0.12%（188 TW/h，太瓦时）——超过了挪威的能源消耗量。

