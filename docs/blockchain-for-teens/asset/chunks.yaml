- fmt: '# Logging, Calling, and Other Operators (`LOG0`, `LOG1`, `LOG2`, etc.)


    Let’s use the preceding Bytecode example to simulate EVM interpreter. We will
    focus on the first 16 bytes of the contract Bytecode: `6080604052348015`. Based
    on Opcode reference, we can translate Bytecode to Opcode, as shown in Table [4-3](#535492_1_En_4_Chapter.xhtml#Tab3).


    **Table 4-3** Bytecode to Opcode conversion (`6080604052348015`)


    | Bytecode | Opcode | Reference(`Opcode`, Name) | Description | Gas |

    | --- | --- | --- | --- | --- |

    | `60 80` | `PUSH1 0x80` | `0x60` = `PUSH1` | Duplicate 1st stack item | 3 |

    | `60 40` | `PUSH1 0x40` | `0x60` = `PUSH1` | Duplicate 1st stack item | 3 |

    | `52` | `MSTORE` | `0x52` = `MSTORE` | Save word to memory | 3* |

    | `34` | `CALLVALUE` | `0x34` = `CALLVALUE` | Get deposited value by the instruction
    | 2 |

    | `80` | `DUP1` | `0x80` = `DUP1` | Duplicate 1st stack item | 3 |

    | `15` | `ISZERO` | `0x15` = `ISZERO` | Simple NOT operator | 3 |


    The EVM is a simple stack-based execution machine that will execute Opcode instructions.
    Stack (sometimes called a “push-down stack”) is a linear collection of items where
    the new element is inserted into the last position (referred to as the “top”),
    and the removal of existing items always takes place at the top position. It is
    also called Last In First Out (LIFO). In the preceding interpreted Opcode example,
    we will expect EVM will execute standard stack operations sequentially:


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figa_HTML.jpg)


    A flow diagram of bytecode to opcode conversion in a text-form with step-by-step
    process.


    EVM stack has a depth of *1024* items, each item contains a 256-bit (32 bytes)
    word or 32 chunks where each chunk is 8-bit (1 byte) size. The reason for 256
    bits is mainly to apply the Keccak-256 cryptographic hash function to any number
    of inputs and convert it to a unique 256 bits hash. In EVM, contract can store
    and read data in the above items. The EVM has three places where it can store
    items—storage, memory, and stack.


    Memory is the location to hold temporary values for the short term. It will be
    erased between smart contract function calls.


    When reading data from memory, EVM will use `MLOAD`. To write 32 bytes (256-bit)
    of data, Opcode `MSTORE` will be used. When writing 1 byte (8-bit) of data, EVM
    will use `MSTORE8`. Figure [4-11](#535492_1_En_4_Chapter.xhtml#Fig11) represents
    how EVM uses Opcode to read and write contract memory.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig11_HTML.png)


    A block diagram consists of stacked blocks of memory with push and pop. It has
    the label E V M stack. Inward and outward arrows label `MSTORE` and `MLOAD` respectively.


    **Figure 4-11** Opcode read and write contract memory


    Storage is where you save data permanently. When a smart contract running in EVM
    uses permanent storage, these data will be part of the Ethereum state. You can
    consider storage as an array in which each array item is 256 bits (32 bytes).
    There are no fees for externally reading the storage value. However, it is very
    expensive to write data into storage, Opcode is `SSTORE` and the current cost
    per one 32-byte word is 20,000 Gas. Let’s look at how much it costs.


    First, convert gas (Gwei) to ETH - `20,000 * 0.000000001 ETH = 0.00002 ETH`,


    Then, calculate cost: `$1100 * 0.00002 = $0.022`.


    Writing to storage is more than 6000x the cost compared to writing to memory.


    In the previous table (Table [4-3](#535492_1_En_4_Chapter.xhtml#Tab3)), we list
    the first few steps of Opcode instruction with gas cost, and every Opcode has
    its own base gas cost. All Ethereum contract executions are run publicly. Attackers
    could create a contract to perform massive, expensive operations (DDoS – Distributed
    Denial of Service attack) to slow down the Ethereum network. By including gas
    cost in each EVM Opcode execution, the Ethereum network can prevent such attacks.


    ## Ethereum Nodes


    On the Internet, any system or device connected to the network is also called
    a node. The same goes for a blockchain network. When a node is connected to the
    Ethereum network, it will download a copy of the blockchain data and participate
    in the network, communicating with other nodes. Based on `etherscan.io` data,
    around 4,131,021 nodes are connected to the Ethereum network.


    There are three types of nodes: full nodes, archive nodes, and light nodes. Each
    type of node consumes data differently.


    ### Full Node


    Full nodes will store all the recent blockchain data, run their own EVM environment,
    and can operate EVM instructions. They can be helpful when participating in blockchain
    transaction validation and maintaining the current state of the blockchain. When
    transactions in a new block do not comply with the rules defined in the Ethereum
    specifications, they will be discarded. For example, if Alice sends 50 ETH to
    Bob, but Alice’s account doesn’t have enough ether or pays a very little gas fee
    when a full node verifies transactions, it will mark this transaction as invalid
    and revert it. A full node can directly deploy a smart contract and interact with
    any smart contract in the network.


    A full node stores a limited number of most recent blocks. The default is 128
    (or 64 if you use the fast sync option). Each Ethereum block is typically around
    80KB in size or around 4 MB in ten minutes. The 128 blocks are about a recent
    one week of trace data. When you query historical block data that is not accessible
    from a full node, you will generally get the “Missing trie node” error. The error
    means you need an archive node.


    When a full node is the first time connected to the network, syncing full node
    data can be very time-consuming, it may take weeks to sync! After that node needs
    to stay online for block data upgrade and maintenance. Otherwise, it has to repeat
    the full synchronization process. It typically takes 13 seconds to create a new
    block. When new data arrives, a full node could delete old blockchain data to
    conserve disk space.


    Hardware requirements to run a full node with fast sync:


    - Fast CPU with 4+ cores

    - 16 GB+ RAM

    - Fast SSD with at least 500 GB of free space

    - 25+ MBit/s bandwidth


    ### Archive Node


    Archive nodes run with a special configuration called “archive mode.” Archive
    nodes will store all the blockchain data since the genesis block. It also builds
    an archive of historical states.


    Current archive Ethereum blockchain sizes are ~12 TB.


    Typically, in most cases, we don’t need archive node data. A full node can provide
    most data, such as check account balances, transfer funds, etc. But sometimes,
    you may need to check last year’s account balance, assets you owned, or transactions.
    The full node prunes data periodically and only stores the most recent 128 blocks
    of data (about 25 minutes). The node has to resync to get earlier data, which
    would be too slow to extract. The archive node has all data locally, which can
    quickly get past data.


    Archive node data are often used for blockchain services such as block explorers,
    data analysis, etc. Syncing full archive node data will be much longer than full
    node syncing. It may take at least one month.


    These are the hardware requirements to run a full archive node:


    - Fast CPU with 4+ cores.

    - 16 GB+ of RAM.

    - Fast SSD drive with at least 6 TB+ of space.

    - 25 MBit/s+ bandwidth.


    ### Light Node


    Light nodes only download the minimum block headers information and use it to
    verify the data validity by checking the state roots in the block headers. Light
    nodes are designed to interact with full nodes as intermediaries and rely on full
    nodes to perform blockchain operations, from requesting account balance to smart
    contract interaction. So, light nodes don’t need to keep running online and store
    large amounts of Gigabytes of data locally. Light nodes can be very useful for
    running on low memory and computational devices, like mobile, IoT devices, and
    laptops.'
