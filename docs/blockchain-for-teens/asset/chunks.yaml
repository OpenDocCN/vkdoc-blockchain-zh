  trans: '

    ### 链上订单簿


    链上订单簿直接托管在底层区块链上，所有操作（包括订单提交、更新和取消）均在链上完成。区块链记录所有订单交易，从根本上消除了对中心化机构的依赖。但另一方面，每一笔订单都需提交至区块链，交易会被广播到所有区块链验证者/矿工节点进行验证。这导致订单簿交易速度慢且成本高昂。当价格剧烈波动时，交易者可能需要更新其链上订单。由于处理速度缓慢，矿工有可能在验证并确认这些交易前，先检查订单，然后操控并执行自己的订单。


    以下是一些采用链上订单簿的去中心化交易所示例：`ViteX`、`Demex`、`Bitshares` 以及 `Stellar` 去中心化交易所。典型的链上订单簿流程如图
    8-14 所示。


    ![](img/535492_1_En_8_Fig14_HTML.jpg)


    典型的做市商与吃单者之间的链上订单簿流程示意图。做市商和吃单者将资金存入智能合约，做市商在订单簿中下订单，吃单者选择一个订单，最终订单在智能合约中完成结算。


    **图 8-14** *链上订单簿*


    做市商是提供买卖订单的一方，而吃单者是立即买入或成交该订单的一方。


    链上流程可描述为以下步骤：


    1.  做市商和吃单者将资金存入智能合约。

    2.  做市商在订单簿中放置订单。

    3.  吃单者随后选择一个订单。

    4.  订单在智能合约中完成结算。


    ### 链下订单簿


    链下订单簿是托管并运行在区块链之外的订单簿应用程序。订单数据也存储在中心化实体中。一旦双边订单匹配成功，链下订单平台会向区块链智能合约发送一笔交易以完成结算。链下订单簿的优势在于订单管理速度更快，费用也更低。然而，链下与链上之间可能存在信息差，无法完全保证做市商的订单仍然有效，这可能会被利用来执行不利的订单。


    链下订单簿的示例包括 `dYdX`、`0x Protocol`、`Loopring`、`AirSwap`、`EtherDelta`、`IDEX` 和 `Hydro`。


    典型的链下订单簿流程如图 8-15 所示。


    ![](img/535492_1_En_8_Fig15_HTML.png)


    做市商与吃单者之间的链下订单簿流程示意图。做市商和吃单者将资金存入智能合约，做市商在链下订单簿中下订单。然后吃单者选择一个订单，链下服务执行订单匹配，最后订单在智能合约中完成结算。


    **图 8-15** *链下订单簿*


    链下流程可描述为以下步骤：


    1.  做市商和吃单者将资金存入智能合约。

    2.  做市商在链下订单簿中放置订单。

    3.  吃单者随后接收订单。

    4.  链下服务运行订单匹配。

    5.  管理员将订单发送至链上智能合约并进行交易结算。


    ### 去中心化交易所聚合器


    DEX 聚合器使用多种不同的协议和方法来解决与流动性相关的问题。这些平台开发了工具，用于聚合来自多个中心化和去中心化加密货币交易所的流动性。当交易者因单一平台流动性不足而无法以预期价格进行加密货币交易时，就会发生滑点。通过聚合来自不同
    DEX 的流动性，DEX 聚合器能够有效减少大额订单的滑点。加密货币交易者可以一个单一仪表盘访问各种交易池，并为特定的代币兑换选择具有优化费用的理想供应商。


    以下是一些顶级的 DEX 聚合器：`1Inch`、`ParaSwap`、`Open Ocean`、`Orion Protocol` 和 `Matcha`。


    到目前为止，我们已经学习了很多理论知识。在下一节中，我们将深入探讨流行的 DEX `Uniswap`，并学习如何创建流动性池、进行质押和兑换代币。


    ### 深入剖析 AMM DEX——Uniswap


    `Uniswap` 是最受欢迎的 DEX 和 AMM。该平台于 2018 年 11 月推出。`v2` 版本于 2020 年 5 月推出，当前版本是于 2021
    年 5 月推出的 `v3`。


    `Uniswap` 平台的用户可以无缝兑换任意两种不同的 `ERC-20` 代币，而不会产生太多滑点。此外，该协议运行在一系列智能合约之上，使得平台无需许可且去信任化。`Uniswap`
    协议的原生代币是 `UNI`，它同时也作为治理代币，赋予代币持有者对协议变更的投票权。


    目前，`UNI` 可在以下四个流动性挖矿池中使用：


    - `ETH/USDT`

    - `ETH/USDC`

    - `ETH/DAI`

    - `ETH/WBTC`


    截至 2022 年 9 月，`Uniswap` 上有超过 50,000 个交易代币对，每个池都有对应的 LP 代币。每日交易量为 `11 亿美元`，总锁仓价值（TVL）为
    `121.3 亿美元`。`Uniswap` 用户可以通过以下几种方式参与去中心化交易所：


    - **创建新池** – `Uniswap` 用户可以使用智能合约创建用于兑换新代币对的池子。

    - **通过现有市场兑换资产** – `Uniswap` 中的代币兑换允许交易者直接将一种 `ERC-20` 代币兑换为另一种 `ERC-20` 代币。

    - **提供流动性并赚取奖励** – 通过在 `Uniswap` 平台上质押资金，流动性提供者将获得 `UNI` 作为奖励。

    - **参与 Uniswap 治理** – `UNI` 代币持有者可以治理并投票决定 `Uniswap` 平台的变更。


    #### 在 Uniswap DEX 上列出你自己的代币


    利用我们学到的 AMM 知识，让我们将理论转化为实践，创建一个 `ERC-20` 代币，并将其在 `Uniswap` DEX 上列出。


    #### 前置条件


    我们需要满足以下几个前置条件：


    1.  创建一个 `ERC-20` 代币。

    2.  将其部署到以太坊网络。我们将使用 `Goerli` 测试网络。

    3.  将部署好的 ERC 代币添加到你的 `MetaMask` 钱包中。

    '
- fmt: '### Create an ERC-20 Token


    In Chapter [5](#535492_1_En_5_Chapter.xhtml), we have briefly discussed the ERC-20
    token. There are many ways to create ERC-20 tokens. If you are an experienced
    smart contract developer, you can write your own ERC-20 token. To simplify, we
    will use a popular open source secure smart contract framework, OpenZeppelin,
    to create our ERC-20 token. It is really easy and just needs a few lines:


    **Step 1 –** Open Remix IDE in your browser ([`https://remix.ethereum.org`](https://remix.ethereum.org)).


    **Step 2 –** Create a smart contract named `DeFiTeenToken`.


    **Step 3 –** We will import the ERC-20 token contract from OpenZeppelin. The ERC-20
    token link from OpenZeppelin is here:


    [`https://github.com/OpenZeppelin/openzeppelincontracts/blob/master/contracts/token/ERC20/ERC20.sol`](https://github.com/OpenZeppelin/openzeppelincontracts/blob/master/contracts/token/ERC20/ERC20.sol)


    **Step 4 –** In the contract, we define the initial supply for the `DeFiTeenToken`,
    when creating a token. The contract name is `DeFiTeenToken` and the symbol is
    `DFTT`. `msg.sender` is the person who is currently creating this contract. In
    our case, it will be a selected wallet account address to deploy the `DeFiTeenToken`
    contract.


    Here is what our `DeFiTeenToken` smart contract looks like.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figk_HTML.png)


    A screenshot of the decentralized finance token smart contract. It contains 9
    lines of coding, including import, contract `DeFiTeenToken`, and constructor.


    You can also get this contract from the book’s GitHub repository—Chapter [8](#535492_1_En_8_Chapter.xhtml):


    [`https://github.com/Apress/Blockchain-for-Teens.git`](https://github.com/Apress/Blockchain-for-Teens.git)


    **Step 5 –** Compile the `DeFiTeenToken.sol` smart contract.


    **Step 6 –** Deploy the contract using Remix VM. We enter the initial supply as
    `100,000,000`.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figl_HTML.png)


    A screenshot of the decentralized finance token displays the deploy and run transaction.
    It contains account, contract, and deploy options on the left and a coding screen
    on the right.


    **Step 7 –** Conduct some quick tests under Remix “Deploy and run transactions”
    module.


    By clicking `name`, `symbol`, and `totalSupply`, you should see the related value
    show up:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figm_HTML.jpg)


    A screenshot displays the three options, name as decentralized finance teen token,
    symbol as `DFTT`, total supply as `100000000`.


    **Step 8 –** Test `transfer` function. Copy the second account from the Account
    drop-down list. Enter this account address in the `transfer` function to the input
    field and give the transfer `DFTT` amount of `1000`. Once the transaction is completed,
    check the second account token by invoking the `balanceOf` function and entering
    the second account address. You should see the balance of the second account has
    `1000` `DFTT` tokens. The following screen shows the process to test the `transfer`
    function:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fign_HTML.png)


    A set of three screenshots displays the screen for the multiple wallet accounts,
    transfer `1000` `DFTT` tokens to the second account, and verify the balance of
    the second account `DFTT` token is `1000`.


    **Step 9 –** Now let us deploy the `DeFiTeenToken` contract to the Goerli test
    network. This time, we enter `1000000000000000000000` (22-digit number) since
    the token unit is 18. Now it is time to deploy the contract. The Metamask will
    pop up for transaction confirmation. Click the confirm button.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figo_HTML.png)


    A screenshot of the decentralized finance teen token displays the deploy and run
    transaction screen. It has an account, contract, and deploy screen, as well as
    a meta mask notification on the left and the codes on the right.


    > **Note**

    > To get the test ETH token using Goerli, you can go to the below addresses to
    request or mine a few tokens:

    > (1) [`https://goerlifaucet.com/`](https://goerlifaucet.com/); (2) [`https://goerli-faucet.pk910.de/`](https://goerli-faucet.pk910.de/);
    (3) [`https://goerlifaucet.com/`](https://goerlifaucet.com/)


    **Step 10 –** Once the contract is deployed, you can view the deployed contract
    from Etherscan via the link from MetaMask: activity ➤ contract deployment ➤ view
    on the block explorer. You can also verify the token name, symbol, and total supply
    in Remix IDE. You should see a similar result as follows:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figp_HTML.png)


    A set of three screen displays. 1. Metamask page highlights contract deployment
    status. 2. Verify in remix page highlights the transaction name, symbol and total
    supply. 3. Etherscan for the contract page.


    Our deployed `DeFiTeenToken` address is `0xbc438759cef061b82abafd95be018128cc4693f5`,
    the ether scan for this contract URL is:


    [`https://goerli.etherscan.io/tx/0x242401f79c53764342645058dfa1b05b261deacab2e77267bcde5f0626116f48`](https://goerli.etherscan.io/tx/0x242401f79c53764342645058dfa1b05b261deacab2e77267bcde5f0626116f48)


    Since the contract is deployed in a public test network, it is accessible to everyone.


    **Step 11 –** Import the `DFTT` token into your MetaMask wallet. Client Asset
    tab in Metamask, select Import tokens. It will ask you to enter the token address.
    You can get the contract address from Etherscan. With entered contract address,
    you click the “Custom Token” button to import the `DFTT` token.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figq_HTML.png)


    A screenshot for importing the `DFTT` token displays the client asset tab in Metamask,
    token address details, and deployment of the `DFTT` token.


    After successfully deploying our `DFTT` token, it is now time to create a new
    pool in Uniswap DEXs.'
