    \n本 Apress 印记由注册公司 APress Media, LLC（Springer Nature 旗下）出版。  \n注册公司地址为：1 New York\
    \ Plaza, New York, NY 10004, U.S.A.\n\n# 引言\n\n*青少年区块链入门* 是一本面向初学者的指南，旨在帮助年轻人建立区块链技术的基础知识。与\
    \ 20 世纪 90 年代的互联网类似，区块链现在有望通过改革现有的商业模式来彻底改变世界。在这个新时代，经济将变得去中心化——一种每个个体都能为网络做出贡献并从中受益的概念。区块链的广泛吸引力源于其无需中央权威机构即可确保交易透明、安全且不可篡改的能力。本书通过清晰易懂的解释，涵盖了区块链、加密货币、密码学、Dapp（去中心化应用）、智能合约、NFT（非同质化代币）、DeFi（去中心化金融）和元宇宙等关键主题，将帮助读者培养多种技能，开启他们的区块链之旅。\n\
    \n第 1 章“区块链：一项颠覆性技术”将探讨区块链的基础知识。首先，我们将讨论当前货币体系的运作方式，以及区块链技术如何影响货币、商业和现代世界。接着，通过逐步讲解交易流程中的每个环节以及构成区块链支柱的\
    \ PoW 和 PoS 共识算法，深入了解区块链的工作原理。随后，我们将探讨货币体系的演变，从物物交换到加密货币。在本章结尾，我们将简要介绍加密货币和加密市场的一些基本概念。\n\
    \n第 2 章“密码学：区块链安全的基石”将更深入地介绍密码学。本章将帮助你丰富对称密钥密码学和公钥密码学方面的知识。你还将了解数字签名的工作原理。本章将涵盖哈希算法，并详细讲解椭圆曲线密码学，以理解其工作原理。在本章结尾，你将学习如何生成以太坊地址。\n\
    \n第 3 章“比特币：未来的货币”的主要目的是介绍比特币网络的基本概念。本章首先讨论比特币的历史。接着，我们将了解比特币钱包和比特币网络。然后，我们还将介绍比特币交易，帮助你熟悉比特币区块链背后的关键概念。最后，我们将简要介绍闪电网络。\n\
    \n以太坊是仅次于比特币的第二大加密货币，被视为一种分布式图灵机——你将在书中详细了解这意味着什么。在第 4 章“以太坊：通往加密货币的门户”中，你将学习以太坊的历史及其背后的关键组成部分。本章还将通过实例介绍以太坊节点和以太坊客户端。通过深入剖析以太坊架构，你将理解以太坊虚拟机（EVM）的工作原理、智能合约\
    \ `Opcode` 如何在 `EVM` 中执行，以及 `EVM` 中的区块、状态和交易的结构。\n\n理解以太坊智能合约工作原理的最佳途径是动手编写智能合约和\
    \ Dapp。第 5 章“智能合约与 Dapp：从理论到实践”将通过亲身体验让你熟悉智能合约和 Dapp。你将编写自己的第一个智能合约，并将其部署到公共以太坊网络。我们还将演示\
    \ Dapp 和 `web3.js` 的基础知识，以及 Dapp 如何通过连接 `Metamask` 钱包与智能合约进行交互。\n\nNFT，即非同质化代币，代表了数字收藏品和不断扩展的数字资源经济的未来。随着主流对\
    \ NFT 的兴趣持续增长，NFT 不仅将改变艺术，还将改变商业、金融和文化。第 6 章“NFT：作为收藏品的加密资产”将对你介绍 NFT 是什么。在此过程中，你将了解\
    \ NFT 的应用、同质化与非同质化物品的区别，以及 NFT 的卖点。我们还将提供 NFT 的示例，并介绍当前的 NFT 市场。在本章结尾，你将在 OpenSea\
    \ 市场中创建自己的 NFT。\n\n尽管元宇宙仍处于早期阶段，但近年来正在迅速获得更多关注。元宇宙将是一个基于虚拟现实（VR）、混合现实（MR）、增强现实（AR）、区块链、人工智能（AI）和物联网（IoT）等新技术的\
    \ 3D 互联网。第 7 章“元宇宙：重新构想的世界”将帮助你理解元宇宙的基础知识。我们还将讨论沉浸式技术。通过探索元宇宙的不同层次，我们将了解元宇宙领域中的不同产品或服务，包括\
    \ NFT 和加密货币。通过进入一个虚拟的区块链世界，你将体验元宇宙中虚拟房地产的当前阶段。在本章结尾，我们将对元宇宙的未来进行展望。\n"
- fmt: "# 排版后的内容\n\nDecentralized finance（DeFi）代表了一种重塑全球金融行业的创新方式。第 [8](#535492_1_En_8_Chapter.xhtml)\
    \ 章“去中心化金融（DeFi）：重塑金融服务”将向您介绍 DeFi 的核心概念与结构，并深入探讨 DeFi 中的具体产品。我们将讨论最流行的去中心化稳定币，并深入剖析\
    \ Maker 稳定币以理解其运作原理。随后，我们还将探索最流行的去中心化交易所（DEX）——Uniswap。最后，我们将提供完整的操作指南，教您如何在公有区块链上部署自己的`ERC-20`代币、创建流动性池、添加流动性、兑换自定义代币，并在\
    \ Uniswap 平台中获取质押奖励。在去中心化借贷与借款平台部分，我们将演示如何在 Aave 平台上进行借贷、提现、兑换、借款和偿还加密资产。我们还将讨论去中心化保险。\n\
    \n在本书末尾，第 [9](#535492_1_En_9_Chapter.xhtml) 章“区块链的未来”将在讨论区块链未来时回顾前几章的主题。您将了解互联网的演变，并最后概述区块链在各行各业的实际应用案例。\n\
    \n本书假设您几乎没有专业区块链环境的经验。本书提供区块链关键方面的通用介绍。我们不会提供太多技术细节，例如编写高级智能合约和搭建专业开发环境。相反，我们将为您提供区块链领域最重要和最新概念的实用信息，这为您进入区块链世界奠定了坚实基础。\n\
    \n## 致谢\n\n我们感谢所有使本书得以问世的人，包括支持我们的家人和朋友、鼓励我们的同事，以及打磨我们工作的审稿人和编辑。\n\n## 关于作者 |\
    \ 关于技术审稿人\n\n# 1. 区块链：一项颠覆性技术\n\n近年来，拥有加密货币的美国人数量持续上升。即使在没有持有加密货币的人群中，大多数美国人也听说过加密货币——“比特币”听起来是不是很熟悉？如果您听说过区块链，但不确定它是如何运作的，请不要担心；您并不孤单！尽管区块链乍看之下可能令人望而生畏，但我们将帮助您熟悉区块链的重要概念。\n\
    \n本章将从区块链的基础知识开始。然后，我们将讨论区块链如何运作，并深入理解共识算法。接下来，我们将学习货币体系的演变，以及区块链技术如何影响货币、商业和现代世界。最后，在本章末尾，我们将概述加密货币。\n\
    \n在本章中，我们将涵盖以下几个具体的区块链主题：\n\n*   什么是区块链？\n*   区块链如何运作\n*   共识算法\n*   货币体系的演变\n\
    *   理解加密货币\n\n## 什么是区块链？\n\n在所有加密货币的核心，我们可以找到被称为区块链的革命性去中心化技术。明确我们所说的“去中心化”的含义非常重要，因为这一概念在区块链中经常被使用。让我们先看看去中心化的对立面：中心化，即权力由特定的个人、组织或地点掌握。\n\
    \n图 [1-1](#535492_1_En_1_Chapter.xhtml#Fig1) 展示了一个中心化组织的示例。\n\n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig1_HTML.png)\n\
    \n两个中心化组织的流程图。第一个图从上到下的标签部分依次为：CEO、工程经理、市场经理、工程师和市场人员。第二个图标记为“中心化”，箭头从中央结构向外指向各方。\n\
    \n**图 1-1**  \n**中心化示例**\n\n想想公司中典型的层级结构——高管们做出所有关键决策。然后，高管将决策传达给经理，经理负责管理下级。下级员工被要求执行高管分配的任何任务。再往下，员工需要听从经理的指示并完成分配的工作。虽然中心化公司可以相对快速且轻松地实现目标，但员工通常无法与其他部门及高层进行沟通和了解情况。缺乏这种沟通可能导致问题甚至失败，使所有层级都感受到后果。通常，公司任何部分的缺陷都可能危及整体目标，这被称为“单点故障”。\n\
    \n另一个中心化的例子是在线服务提供商，例如 Meta（Facebook）、亚马逊、苹果和谷歌。这些互联网服务遵循客户端-服务器架构。用户使用客户端机器（称为远程处理器——例如网页浏览器或移动设备）向集中的服务器机器（称为主机系统）发送远程请求。用户从这一单一的复杂服务提供商处获得服务请求的结果。从好的方面看，数十亿人每天使用这些卓越的数字服务进行日常活动，如在线购物、发布照片和给家人朋友打电话，这些服务都是免费的。但这些“免费”服务有一个被忽视的成本：这些公司在其中心化服务器中收集并存储大量用户行为的宝贵数据。通过大数据分析和机器学习算法，这些用户数据被转化为产品并出售给第三方。利用这些数据，公司可以在广告和服务中精准定位用户，这增加了用户面临安全风险的可能性——而这一切都超出了用户的控制范围。\n\
    \n现在我们已经了解了中心化，接下来可以探讨去中心化。去中心化指的是将权力从某个最高权威或地点平等分配给每一个单元。与我们之前看的例子不同，在去中心化组织中，决策权并不集中在某个中央权威或权力机构。每个成员都是独立的，并且可以决定组织活动，而不是集体依赖一个权威。通过去中心化，所有成员都参与其中并相互协作以实现目标。每个人都可以根据组织规则对决策进行投票。\n\
    \n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig2_HTML.png)\n\n两个区块链图展示了在市场和工程部门下的去中心化组织。标记的流程位置依次为：CEO、经理、工程师和市场人员。\n\
    \n**图 1-2**  \n**去中心化示例**"
  raw: 'Decentralized finance (DeFi) represents an innovative way to reshape the global
    financial industry. Chapter [8](#535492_1_En_8_Chapter.xhtml), “Decentralized
