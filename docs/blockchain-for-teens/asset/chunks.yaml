- fmt: "### Web 2.0 (2004–Present)—Participative Social Web\n\nTim O’Reilly coined\
    \ the term `Web 2.0` in 2004 during a conference between O’Reilly and MediaLive\
    \ International. It refers to the second phase of the transformation of the World\
    \ Wide Web. Unlike the read-only `Web 1.0`, `Web 2.0`, also known as the participative\
    \ social web, allows users to interact and collaborate through the website and\
    \ social media platforms. Users can create profiles, connect with people, share\
    \ their viewpoints, leave comments, and publish videos. Apps such as `YouTube`,\
    \ `Facebook`, `Instagram`, `TikTok`, `LinkedIn`, `Netflix`, `Twitter`, and `Amazon`\
    \ are popular `Web 2.0` platforms and are visited by over 4 billion people worldwide.\n\
    \nThese applications have been built based on many modern and powerful web technologies,\
    \ greatly improving the end user’s experience.\n\nThe emergence of cloud computing,\
    \ big data, artificial intelligence (AI), the Internet of Things (IoT), mobile\
    \ technologies, and front-end technologies have enabled the provision of a better\
    \ user experience due to the ability of `Web 2.0` platforms to connect users in\
    \ real time. Mobile apps allow users to be online at all times. On the other hand,\
    \ platform providers also collect and control users’ data to analyze user activities\
    \ for business purposes. As a result, web platforms have become more centralized.\n\
    \nHere’s a list of `Web 2.0`’s typical characteristics:\n\n* Modern responsive\
    \ web applications are accessible from anywhere.\n* It provides a rich user experience\
    \ and is very user friendly.\n* It supports collaboration and information sharing\
    \ among participants.\n* Minimal programming knowledge is required to make platforms.\n\
    * It allows access via mobile and smart devices.\n* The emphasis is on social\
    \ networks and computing.\n* It encourages the social network effect: the greater\
    \ the contribution, the better the content and reward are.\n\n### Web 3.0—Decentralization\n\
    \nIn `Web 2.0`, large companies constantly upgrade products on platforms and create\
    \ new features to attract users to stay on their platforms. However, at the same\
    \ time, these applications act as centralized guardians. Therefore, the user needs\
    \ to follow their standards. Otherwise, their account can be banned from the platform.\n\
    \nMoreover, in `Web 2.0`, most popular applications can run on a mobile device,\
    \ for which the user’s phone will need to be always connected to the Internet.\
    \ Although all these popular apps are free, they are designed in such a way that\
    \ they target specific users and collect their data. From the moment the user\
    \ downloads these apps, the apps begin to collect their personal data, including\
    \ name, location, gender, and birthdate, as well as more abstract info such as\
    \ social network connections, job and employment history, recent purchases, past\
    \ vacation destinations, hobbies, and interests.\n\nWith a large amount of relevant\
    \ personal data, companies use powerful big data analysis and machine learning\
    \ (ML) technology to learn user data. They can not only discover more about their\
    \ users’ preferences but also predict users’ thoughts, feelings, and actions in\
    \ different situations. Farmed user data are hugely valuable to advertisers and\
    \ marketers, who can use these data to efficiently target ads to relevant consumers.\
    \ The users, in using those free centralized platforms, makes their personal data\
    \ as the product. Unfortunately, there is no way by which users can own and control\
    \ their personal data.\n\nAs time passed, the Internet started to enter `Web 3.0`.\
    \ In this phase, instead of a centralized database, decentralized, nearly anonymous\
    \ platforms are being built for applications and services. With blockchain’s decentralized\
    \ feature, every individual in the network is equal and can control their own\
    \ data. Users can keep their data private or share and sell their profiles. Data\
    \ become an asset for users.\n\n`Web 3.0` also leverages the latest technologies\
    \ such as AI, ML, and the IoT to construct networks. This will make the network\
    \ more intelligent and responsive to serve user needs, that is, more personalized.\n\
    \nIn traditional corporate structures, C-suite executives typically have the power\
    \ to make critical business decisions, often prioritizing shareholders and marketing\
    \ demand. With the commencement of `Web 3.0`, decentralized autonomous organizations\
    \ (DAOs) will invert centralized corporate governance processes and brings new\
    \ insights for organizing communities. There will be no central authority in the\
    \ organization, and its community members will make the decisions via proposals\
    \ and voting. As a result, everyone can participate in decisions and have a voice\
    \ in the DAO.\n\nIn `Web 3.0`, a three-dimensional (3D) design will be used widely\
    \ on the Internet. The `Metaverse` has become vital to opening up a whole new\
    \ world of economic prospects. In the `Metaverse`, all objects use 3D graphics.\
    \ People have their own 3D avatars and can visit the shopping center, attend a\
    \ conference, and play games. The `Metaverse` unlocks new ways of interacting,\
    \ learning, playing, working, and living by allowing users to join in a 3D digital\
    \ virtual world and experience it in reality. In this context, each digital asset\
    \ in the blockchain is given a unique, verifiable identity; this record is called\
    \ a nonfungible token (NFTs). NFTs represent 3D digital assets’ ownership and\
    \ can be traded in the `Metaverse` world.\n\nFigure `[9-2](#535492_1_En_9_Chapter.xhtml#Fig2)`\
    \ shows the evolution of the Internet (from `Web 1.0` to `3.0`).\n\n```\n![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig2_HTML.png)\n\
    ```\n\nA graphical illustration of the value created during the years from world\
    \ wide web as `web 1.0` to the participative social web as `web 2.0` and meta\
    \ verse as `web 3.0`.\n\n**Figure 9-2**  \n*The evolution of the Internet (Web\
    \ 1.0, 2.0, and 3.0)*"
  raw: '### Web 2.0 (2004–Present)—Participative Social Web


    Tim O’Reilly coined the term Web 2.0 in 2004 during a conference between O’Reilly
    and MediaLive International. It refers to the second phase of the transformation
    of the World Wide Web. Unlike the read-only Web 1.0, Web 2.0, also known as the
    participative social web, allows users to interact and collaborate through the
    website and social media platforms. Users can create profiles, connect with people,
    share their viewpoints, leave comments, and publish videos. Apps such as YouTube,
    Facebook, Instagram, TikTok, LinkedIn, Netflix, Twitter, and Amazon are popular
    Web 2.0 platforms and are visited by over 4 billion people worldwide.


    These applications have been built based on many modern and powerful web technologies,
    greatly improving the end user’s experience.


    The emergence of cloud computing, big data, artificial intelligence (AI), the
    Internet of Things (IoT), mobile technologies, and front-end technologies have
    enabled the provision of a better user experience due to the ability of Web 2.0
    platforms to connect users in real time. Mobile apps allow users to be online
    at all times. On the other hand, platform providers also collect and control users’
    data to analyze user activities for business purposes. As a result, web platforms
    have become more centralized.


    Here’s a list of Web 2.0’s typical characteristics:


    *   Modern responsive web applications are accessible from anywhere.


    *   It provides a rich user experience and is very user friendly.


    *   It supports collaboration and information sharing among participants.


    *   Minimal programming knowledge is required to make platforms.


    *   It allows access via mobile and smart devices.


    *   The emphasis is on social networks and computing.


    *   It encourages the social network effect: the greater the contribution, the
    better the content and reward are.


    ### Web 3.0—Decentralization


    In Web 2.0, large companies constantly upgrade products on platforms and create
    new features to attract users to stay on their platforms. However, at the same
    time, these applications act as centralized guardians. Therefore, the user needs
    to follow their standards. Otherwise, their account can be banned from the platform.


    Moreover, in Web 2.0, most popular applications can run on a mobile device, for
    which the user’s phone will need to be always connected to the Internet. Although
    all these popular apps are free, they are designed in such a way that they target
    specific users and collect their data. From the moment the user downloads these
    apps, the apps begin to collect their personal data, including name, location,
    gender, and birthdate, as well as more abstract info such as social network connections,
    job and employment history, recent purchases, past vacation destinations, hobbies,
    and interests.


    With a large amount of relevant personal data, companies use powerful big data
    analysis and machine learning (ML) technology to learn user data. They can not
    only discover more about their users’ preferences but also predict users’ thoughts,
    feelings, and actions in different situations. Farmed user data are hugely valuable
    to advertisers and marketers, who can use these data to efficiently target ads
    to relevant consumers. The users, in using those free centralized platforms, makes
    their personal data as the product. Unfortunately, there is no way by which users
    can own and control their personal data.


    As time passed, the Internet started to enter Web 3.0\. In this phase, instead
    of a centralized database, decentralized, nearly anonymous platforms are being
    built for applications and services. With blockchain’s decentralized feature,
    every individual in the network is equal and can control their own data. Users
    can keep their data private or share and sell their profiles. Data become an asset
    for users.


    Web 3.0 also leverages the latest technologies such as AI, ML, and the IoT to
    construct networks. This will make the network more intelligent and responsive
    to serve user needs, that is, more personalized.


    In traditional corporate structures, C-suite executives typically have the power
    to make critical business decisions, often prioritizing shareholders and marketing
    demand. With the commencement of Web 3.0, decentralized autonomous organizations
    (DAOs) will invert centralized corporate governance processes and brings new insights
    for organizing communities. There will be no central authority in the organization,
    and its community members will make the decisions via proposals and voting. As
    a result, everyone can participate in decisions and have a voice in the DAO.


    In Web 3.0, a three-dimensional (3D) design will be used widely on the Internet.
    The Metaverse has become vital to opening up a whole new world of economic prospects.
    In the Metaverse, all objects use 3D graphics. People have their own 3D avatars
    and can visit the shopping center, attend a conference, and play games. The Metaverse
    unlocks new ways of interacting, learning, playing, working, and living by allowing
    users to join in a 3D digital virtual world and experience it in reality. In this
    context, each digital asset in the blockchain is given a unique, verifiable identity;
    this record is called a nonfungible token (NFTs). NFTs represent 3D digital assets’
    ownership and can be traded in the Metaverse world.


    Figure [9-2](#535492_1_En_9_Chapter.xhtml#Fig2) shows the evolution of the Internet
    (from Web 1.0 to 3.0).


    ![](images/535492_1_En_9_Chapter/535492_1_En_9_Fig2_HTML.png)


    A graphical illustration of the value created during the years from world wide
    web as web 1.0 to the participative social web as web 2.0 and meta verse as web
    3.0.


    Figure 9-2


    The evolution of the Internet (Web 1.0, 2.0, and 3.0)'
  trans: "\n### Web 2.0（2004 年至今）——参与式社交网络\n\n蒂姆·奥莱利在 2004 年奥莱利与 MediaLive International\
    \ 的一次会议中首创了`Web 2.0`这一术语。它指的是万维网发展的第二阶段。与只读的`Web 1.0`不同，`Web 2.0`（也称为参与式社交网络）允许用户通过网站和社交媒体平台进行互动与协作。用户可以创建个人资料、与他人联系、分享观点、发表评论以及发布视频。诸如`YouTube`、`Facebook`、`Instagram`、`TikTok`、`LinkedIn`、`Netflix`、`Twitter`和`Amazon`等应用都是流行的`Web\
    \ 2.0`平台，全球有超过 40 亿人访问它们。\n\n这些应用基于众多现代且强大的网络技术构建，极大地提升了终端用户的体验。\n\n云计算、大数据、人工智能（AI）、物联网（IoT）、移动技术和前端技术的出现，使得`Web\
    \ 2.0`平台能够实时连接用户，从而提供更佳的用户体验。移动应用让用户可以随时在线。另一方面，平台提供商也收集并控制用户数据，以分析用户活动用于商业目的。因此，网络平台变得愈发中心化。\n\
    \n以下是`Web 2.0`的典型特征列表：\n\n* 现代响应式网络应用可从任何地点访问。\n* 提供丰富的用户体验，且非常用户友好。\n* 支持参与者之间的协作与信息共享。\n\
    * 创建平台所需的编程知识极少。\n* 允许通过移动设备和智能设备访问。\n* 重点在于社交网络与计算。\n* 鼓励社交网络效应：贡献越大，内容和回报就越好。\n\
    \n### Web 3.0——去中心化\n\n在`Web 2.0`中，大型公司不断在平台上升级产品并创造新功能，以吸引用户留在其平台。然而，与此同时，这些应用扮演着中心化守护者的角色。因此，用户需要遵循它们的标准，否则其账户可能会被平台封禁。\n\
    \n此外，在`Web 2.0`中，大多数流行应用可以在移动设备上运行，这要求用户的手机始终保持联网。尽管所有这些流行应用都是免费的，但它们的设计方式却是针对特定用户并收集其数据。从用户下载这些应用的那一刻起，应用就开始收集其个人数据，包括姓名、位置、性别和出生日期，以及更抽象的信息，如社交网络关系、工作和就业历史、近期购物记录、过去的度假目的地、爱好和兴趣。\n\
    \n凭借大量相关的个人数据，公司利用强大的大数据分析和机器学习（ML）技术来学习用户数据。他们不仅能更深入地了解用户偏好，还能预测用户在不同情境下的思想、情感和行为。被“驯化”的用户数据对广告商和营销人员极具价值，他们可以利用这些数据高效地向相关消费者投放定向广告。用户在使用这些免费的中心化平台时，实际上将自己的个人数据当作了商品。不幸的是，用户无法拥有和控制自己的个人数据。\n\
    \n随着时间的推移，互联网开始进入`Web 3.0`阶段。在此阶段，应用和服务将基于去中心化的、近乎匿名的平台构建，而非中心化数据库。凭借区块链的去中心化特性，网络中的每个个体都平等，并可以控制自己的数据。用户可以保持数据私密，也可以分享或出售自己的个人资料。数据成为用户的一项资产。\n\
    \n`Web 3.0`还利用了 AI、ML 和物联网等最新技术来构建网络。这将使网络更加智能、响应更快，以满足用户需求，即实现更个性化的服务。\n\n在传统的企业结构中，C\
    \ 级高管通常拥有做出关键业务决策的权力，且往往优先考虑股东和营销需求。随着`Web 3.0`的到来，去中心化自治组织（DAO）将颠覆中心化的企业治理流程，并为组织社区带来新思路。组织中不存在中央权威，其社区成员通过提案和投票做出决策。因此，在\
    \ DAO 中，每个人都可以参与决策并拥有发言权。\n\n在`Web 3.0`中，三维（3D）设计将在互联网上广泛应用。`Metaverse`对于开辟全新经济前景至关重要。在`Metaverse`中，所有物体都使用\
    \ 3D 图形。人们拥有自己的 3D 虚拟化身，可以访问购物中心、参加会议和玩游戏。`Metaverse`通过允许用户加入 3D 数字虚拟世界并亲身体验，解锁了交互、学习、娱乐、工作和生活的新方式。在此背景下，区块链中的每个数字资产都被赋予一个唯一、可验证的身份；这种记录被称为非同质化代币（NFT）。NFT\
    \ 代表了 3D 数字资产的所有权，并可以在`Metaverse`世界中进行交易。\n\n图`9-2`展示了互联网的演进（从`Web 1.0`到`3.0`）。\n\
    \n```\n![](img/535492_1_En_9_Fig2_HTML.png)\n```\n\n一幅图解，展示了从万维网作为`Web 1.0`，到参与式社交网络作为`Web\
    \ 2.0`，再到元宇宙作为`Web 3.0`的多年间所创造的价值。\n\n**图 9-2**  \n*互联网的演进（Web 1.0、2.0 和 3.0）*\n"
- fmt: '## Blockchain in Finance


    Financial services refer to a variety of economic services discharged and products
    provided by the finance industry to manage money. They are one of the most important
    drivers of a nation’s economy. Financial services cover a broad range of businesses,
    including the following major types of services:


    1. **Banking** – The banking service is one of the most important services in
    the financial services industry. It offers various services, including personal
    or business banking (checking accounts, savings accounts, debit/credit cards,
    etc.) and the provision of loans (personal loans, business loans, home loans,
    car loans, etc.).

    2. **Insurance** – Insurance services protect individuals against financial losses
    and help them recover from an accident. Most people have some sort of insurance,
    such as car insurance, house insurance, or life and health insurance. When an
    individual purchases insurance, they sign an insurance policy contract. Subsequently,
    when they encounter a loss covered by the policy and file a claim, the insurance
    company pays them based on the policy’s terms.

    3. **Wealth management** – Wealth management or wealth management advisory refers
    to investment management and the provision of high-level professional financial
    advice to address the needs of a wide array of clients ranging from affluent to
    high-net-worth and ultra-high-net-worth individuals and families.

    4. **Mutual funds** – Mutual fund services allow individuals to pool their money
    with other investors to invest in a collection of securities such as stocks, bonds,
    money market instruments, and other assets. The price of the mutual fund, also
    known as its net asset value, is determined by the total value of the securities
    in the portfolio divided by the number of shares outstanding.

    5. **Professional advisory** – A financial professional advisory service provides
    professional expertise to help individuals and firms to make financial decisions
    and achieve financial goals, including education saving planning, retirement planning,
    risk management, portfolio management, insurance, and tax strategies.

    6. **Stock market** – Stock market services provide buyers and sellers a place
    for trading companies’ shares and various other securities such as bonds, futures,
    and options.

    7. **Debt instruments** – Debt instruments are tools utilized to obtain capital,
    including loans and bonds. Usually, repayment of debt involves a fixed payment
    to the lender or investor under the terms of a contract within the specified payment
    schedule. Companies use debt instruments to obtain funds for their growth, investments,
    and future planning.

    8. **Tax/audit consulting** – Tax accounting services involve financial professionals
    providing services for preparing tax returns and payments. A financial audit,
    also referred to as a financial statement audit, provides reasonable assurance
    by evaluating whether an organization’s accounting and financial statements comply
    with government laws and regulations.

    9. **Portfolio management** – Portfolio management refers to managing an individual’s
    investment, such as stocks, bonds, cash, shares, and exchange-traded funds. Typically,
    stocks, bonds, and cash comprise the core of a portfolio.

    10. **Credit rating** – A credit rating evaluates a person or company’s credit
    risk, predicting their ability to pay back the debt based on income and past repayment
    histories.


    Scholars have estimated that the global financial services industry will be worth
    `USD 25 trillion` worldwide by `2022`, expanding at an annual growth rate of around
    `6%`. Trillions of dollars’ worth of transactions occur every single day. Due
    to such a high volume of transactions, the financial industry has encountered
    many challenges, including excessive paperwork, data breaches, tedious processes
    and consequent high costs, consumers’ lack of trust, and lack of transparency,
    which have persisted for a long time. Blockchain technology is decentralized,
    secure, transparent, and immutable. Its revolutionary design and properties have
    enabled it to become a possible solution for the challenges of the global financial
    system, and the banking and financial industry is accelerating its adoption of
    digital blockchain technology. The global blockchain in the financial market is
    estimated to grow from `$1.89 billion` in `2022` to `$94.58 billion` in `2030`,
    at an annual rate of `63.1%`. In the following section, we will discuss a few
    use cases of the adoption of blockchain technology in the financial industry,
    including trade finance.'
