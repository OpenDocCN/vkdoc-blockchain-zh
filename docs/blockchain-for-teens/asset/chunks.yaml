- fmt: '### AMM Basic Concepts


    Compared to CEXs, the number of buyers and sellers in DEXs are still small. Therefore,
    finding enough buyers and sellers to trade assets at matched prices will be hard.
    AMMs are creating liquidity pools to solve this problem. AMMs provide a practice
    called “yield farming” for liquidity providers (LP) to earn bonus yield by adding
    an appropriate balance of assets into a liquidity pool. LP will automatically
    obtain reward tokens, Ethereum-based ERC-20 tokens, known as liquidity provider
    (LP) tokens. These LP tokens represent LP ownership as a pool provider. When LPs
    withdraw deposited funds, LP tokens will return to the DeFi system. The pool will
    charge transaction fees when each trade occurs in the liquidity pool. LP token
    holders will be rewarded proportionately with the liquidity pool’s growth, and
    LP can claim those rewards regularly. For example, if you contribute $100 worth
    of tokens to an AMM DEXs pool (such as `Uniswap`) with a total market value of
    $1000, you will receive 10% of that pool’s LP tokens.


    Asset funds in a liquidity pool are locked in a smart contract. With AMM, traders
    can seamlessly trade their assets in the platform using the liquidity pools without
    needing a centralized market maker. LPs will be rewarded a fraction of the fees
    and incentives on their investments.


    There is no seller or buyer on the other side. Instead, an automated algorithm
    determines the price of the tokens in liquidity pools in the AMM smart contract.
    The smart contract algorithm in AMM will be automated and optimized, adjusting
    the price to react to market needs.


    #### What Are the Existing AMM Models?


    AMMs use a mathematical formula to adjust prices algorithmically based on supply
    in liquidity pools to maintain the balance of assets in the liquidity pool. Several
    constant function market makers (CFMMs) are utilized by popular AMM protocols
    such as `Uniswap`, `Bancor`, and `Curve`. The CFMMs include constant product market
    makers, constant sum market makers, and constant mean market makers.


    #### Constant Product Market Maker (CPMM)


    CPMM was popularized by the first AMM-based DEX, `Uniswap`, `Bancor`, and the
    most popular AMM in the market. CPMMs are based on the function `x*y=k`, where
    `x` is the amount of one token in the liquidity pool, and `y` is the amount of
    the other. The range of prices for two tokens depends on the available liquidity
    of each token. When the supply of token X increases, the token supply of Y must
    decrease in order to maintain the constant product K, and vice versa.


    For example (`Uniswap V2`), a liquidity poll has 50% DAI and 50% Ether. Assume
    one Ether is $2000 and one DAI is $1. In the beginning, the liquidity pool has
    9 Ether and 18,000 DAI. In this case, one Ether and 2,000 DAI pair have a total
    value of $4000, which can be calculated as `2000 + 1 * 2000 = 4,000`.


    A liquidity provider invests 10% of the pool assets—one Ether and 2,000 DAI in
    the pool. After the deposit, the pool has 20,000 DAI and 10 Ether, and each token
    has a 50% amount. The CPMM constant `x*y=k` is `20,000 * 10 = 200,000`.


    Now a liquidity buyer wants to purchase one Ether. The price for Ether is 2222
    DAI based on the following formula:


    `(20,000 + x) * (10 -1) = 200,000 → x = 2,222`


    The buyer will need to pay 2222 DAI to get one Ether. In the end, the pool will
    have 9 Ether and 22,222 DAI.


    The process is described in Figure [8-10](#535492_1_En_8_Chapter.xhtml#Fig10).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig10_HTML.png)


    A flow diagram depicts an example of A M M constant product marketer. The liquidity
    provider deposits 1 ether and 2,000 D A I into the pool, and the liquidity buyer
    purchases 1 ether. The before and after trade calculations are given at the top.


    **Figure 8-10**


    AMM CPMM example


    An example of a DEX that uses CPMM is `Uniswap V1` and `V2` (`Uniswap V3` uses
    a different function), `Bancor (V1)`, `Sushi Swap`, `Pancake swap`, and other
    derivatives.


    #### Constant Sum Market Maker (CSMM)


    The second variation of constant products is the constant sum market maker (CSMM),
    which holds the sum of the X and Y assets by simply replacing the multiplication
    in Constant Product with addition (`x + y = k`). The variables can change multiple
    times as long as the sum remains the same constant.


    This design makes it easier to predict price, but when one of the token liquidity
    pools is drained, the remaining liquidity is just one asset with no more liquidity
    for traders. As a result, CSMM cannot provide infinite liquidity and is not profitable.
    Therefore, CSMM is seldom used by AMMs.


    #### Constant Mean Market Maker (CMMM)


    A constant mean market maker (CMMM) was first introduced by Balancer Protocol
    and allowed investors to work with more than two tokens and maintain an average
    weight outside of 50/50, satisfying the following equation:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figf_HTML.jpg)


    `Uppercase pi, with the limit i equals 1 to n, R subscript i to the power of w
    subscript i, equals K.`


    where `R[i]` are the reserves of each asset, `W` is each asset weight, and `k`
    is for a constant.


    For the three locked assets example, CMMM utilizes the formula for a liquidity
    pool that would look as follows:


    `(x * y * z) ^ (1/3) = c`


    where `x`, `y`, and `z` are chosen tokens, `c` is a constant product of them.


    #### Hybrid Constant Function


    If underlying trading pairs’ prices are almost stable (e.g., two USD-denominated
    stablecoins trading pairs `DAI–USDC` into `Uniswap` liquidity pool), constant
    product function may not be the best solution because of the slippage and return
    is tiny. Therefore, curve finance uses the Stableswap Invariant formula, a hybrid
    of the constant product and constant sum formula, and the function is shown as
    follows:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figg_HTML.png)


    `A n to the power of n, summation x subscript i plus D, equals A D subscript n
    to the power of n, plus D to the power of n plus 1 over n powered n pi x subscript
    i.`


    where `x` is the reserves for each token, `n` is the number of stablecoins, `D`
    is an invariant representing the entire token value in the reserve, `A` is the
    amplification coefficient, which is a tunable constant that is directly proportional
    to asset’s volatility and the DAO can adjust the value.


    In the curve stableswap-paper, there is a comparison amount Stableswap invariant
    with `Uniswap` (constant-product) and constant price invariants, displayed in
    Figure [8-11](#535492_1_En_8_Chapter.xhtml#Fig11).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig11_HTML.jpg)


    A graph compares the stableswap invariant with the uniswap and constant price
    invariants in dollars. The uniwasp curve is plotted through (20, 2), (5, 5), and
    (1, 30). The stableswap curve is plotted through (19, 0), (5, 5), and (0, 30).
    The constant line is plotted through (10, 0), (5, 5), and (0, 10). All data are
    approximate.


    **Figure 8-11**


    Comparison of Stableswap invariant with constant product and constant sum (from
    Curve Stableswap-paper)


    The Stableswap invariant acts as a constant sum when the portfolio is balanced
    and provides a better tool for DeFi users to swap stablecoins.


    #### The Limitations of AMM


    As discussed in the previous section, DEXs often have low liquidity compared to
    CEXs. Therefore, DEXs must attract new users to contribute their assets and generate
    more liquidity. With LPs, the exchange cannot offer trading services. Since lower
    liquidity, AMM often has two main problems: slippage and Impermanent loss (IL).'
