  trans: "\n# 闪电网络\n\n2016 年 1 月，Joseph Poon 与 Thaddeus 发布了一份题为 *《比特币闪电网络：可扩展的链下即时支付》*\
    \ 的白皮书。闪电网络是在主比特币网络之外扩展比特币容量的解决方案。它是一个构建于比特币区块链之上的“第二层”去中心化支付协议，支持链下交易。交易过程只需在双方之间进行验证，无需作为一笔交易提交至比特币网络。随着比特币的普及，闪电网络已成为一种流行的比特币扩容方案。目前已有超过\
    \ 20,000 个活跃的闪电网络节点，拥有超过 83,000 条独立的支付通道。以下是闪电网络的一些优势：\n\n1. **即时支付：**  \n   比特币网络每秒大约能处理三到七笔交易。闪电网络建立了一个点对点的支付通道，其中两个参与节点通过加密协议建立双向支付连接，并从\
    \ 2-of-2 多重签名地址分配资金。通道内的双方可以直接提交交易并相互支付，而无需在比特币网络上创建链上交易供矿工验证——因此，在闪电网络内，支付过程几乎是即时的。\n\
    \n2. **可扩展性**  \n   闪电网络上的通道是“双向”的，双方参与者均可根据通道容量发送和接收支付。  \n   通道容量是指每个参与者在通道内持有的总余额。例如，Alice\
    \ 和 Bob 通过一笔 10 BTC 的交易开通了一个支付通道。如果 Alice 通过通道向 Bob 发送 10 BTC，那么她将无法再接收任何支付。Bob\
    \ 可以从 Alice 处接收 10 BTC，但无法发送任何支付。然而，如果 Alice 向 Bob 发送了 5 BTC，那么双方现在都可以在通道内发送和接收最多\
    \ 5 BTC。根据通道容量，链下支付通道内可发生大量交易，无需链上矿工参与，这有望达到每秒数百万笔交易的处理能力，从而极大地扩展比特币网络的容量。\n\n\
    3. **低成本**  \n   使用闪电网络几乎无需交易费用。一笔闪电网络手续费大约为 1 聪或 0.000233 美元。\n\n4. **跨区块链交易**\
    \  \n   只要区块链能够支持类似的加密哈希函数，闪电网络功能便可在多条区块链上使用。闪电网络有望实现终极的去中心化交易所。交易甚至可以跨越多条区块链进行，而无需第三方参与。\n\
    \n5. **隐私性**  \n   无需上链记录。个人闪电网络支付交易的详细信息不会直接公开记录在区块链上。支付可能通过许多连续的通道进行路由，每个节点运营者都能看到经过其通道的支付，但如果这些节点不相邻，他们将无法看到这些资金的来源或去向。\n\
    \n闪电网络的几个局限性：\n\n闪电网络由两个节点之间的双向支付通道组成，这些通道组合起来形成了智能合约。如果任何一方在任何时候关闭通道，该通道将关闭并在区块链上结算。\n\
    \n由于闪电网络争议机制的特性，要求所有参与者持续监控其通道并跟踪广播到网络的离线账本状态，因此催生了“瞭望塔”的概念。\n\n### 闪电网络的工作原理\n\
    \n最初，Alice 持有 `A1` 承诺交易，Bob 持有 `B1` 承诺交易。  \n`A1` 的撤销密钥 `K[A1]` 仅由 Alice 拥有。 \
    \ \n`B1` 的撤销密钥 `K[B1]` 仅由 Bob 拥有。\n\n假设 Alice 和 Bob 各有 5 BTC。Alice 想向 Bob 发送 2\
    \ BTC。\n\n![](img/535492_1_En_3_Figf_HTML.jpg)\n\n区块图表示出资交易。它显示了 5 BTC 的 2-of-2\
    \ 多重签名。密钥为 `A1 K a1`、`B1 K b1`。连接的两个角色是 Alice 和 Bob。\n\nAlice 和 Bob 通过将资金存入 2-of-2\
    \ 多重签名地址，并向比特币网络发送一笔交易（也称为出资交易或锚定交易），来在闪电网络上开通一个支付通道。这笔交易将被挖矿，从而创建通道。\n\nAlice\
    \ 和 Bob 各自存入等额资金——在本例中为 5 BTC——并各自对其加锁。\n\n支付通道建立后，双方即可开始签署和交换交易。这些交易被称为承诺交易，它们将改变通道内的初始状态。\n\
    \nAlice 创建了一笔新交易 `B2`，该交易分配 3 BTC 给 Alice，7 BTC 给 Bob。  \nAlice 签署 `B2` 并将其发送给\
    \ Bob。Bob 收到 `B2`，签署后保存。\n\n![](img/535492_1_En_3_Figg_HTML.jpg)\n\n区块图表示出资交易。它显示了\
    \ 3 BTC 和 7 BTC。密钥为 `A1 K a1`、`B1 K b1`。两个角色是 Alice 和 Bob。\n\nBob 创建了一笔新交易 `A2`，该交易分配\
    \ 3 BTC 给 Alice，7 BTC 给 Bob。  \nBob 签署 `A2` 并将其发送给 Alice。\n\n![](img/535492_1_En_3_Figh_HTML.jpg)\n\
    \n区块图表示出资交易。它显示了 3 BTC 和 7 BTC。并用笔标记指向 `A2` 和 `B2`。密钥为 `A1 K a1`、`B1 K b1`。两个角色是\
    \ Alice 和 Bob。\n\nAlice 收到 `A2`，签署后保存。  \nAlice 提供 `K[A1]`，使 `A1` 失效；然后她可以删除 `A1`。\n\
    \n![](img/535492_1_En_3_Figi_HTML.jpg)\n\n区块图表示出资交易。它显示了 3 BTC 和 7 BTC。密钥为 `A1\
    \ K a1`、`B1 K b1`。两个角色是 Alice 和 Bob。\n\nBob 提供 `K[B1]`，使 `B1` 失效；然后他可以删除 `B1`。\n\
    \n![](img/535492_1_En_3_Figj_HTML.jpg)\n\n区块图表示出资交易。它显示了 3 BTC 和 7 BTC。被忽略的密钥为\
    \ `A1 K a1`、`B1 K b1`。两个角色是 Alice 和 Bob。\n\n总结来说，支付通道为双方创建了一个资金池，然后以约定的方式转移池中资金的所有权承诺。\n\
    \n当 Alice 或 Bob 在某一时刻决定关闭支付通道时，他们可以签署一笔关闭交易。关闭通道意味着双方取回各自的资金，并结算双方之间的最终余额。这笔交易随后将在比特币网络中被挖矿。无论支付通道内执行了多少笔交易，比特币网络都只会挖矿两笔交易——即开通和关闭通道的交易。\n\
    \n哈希时间锁合约（HTLC），顾名思义，由两部分组成：哈希验证和时间到期验证。它是一种双方约定财务安排的支付方式，一方在截止日期前通过生成加密证明从另一方获得一定金额，否则资金将退还给付款方。支付通道默认带有时间锁。通过增加哈希锁，支付可以路由通过多个首尾相连的支付通道。交易可以在没有直接通道连接的双方之间发送，因此任何连接到闪电网络的人都属于一个单一、互联的全球金融体系。\n\
    \n让我们来看一个例子。\n"
- fmt: 'Alice wants to send payment to Bob, but she doesn’t have a payment channel
    with him. Alice has a payment channel with John, who has a payment channel with
    Bob. How can Alice pay Bob?


    Bob must create a cryptographic secret string (key), hash it using a hash function
    such as SHA-256, and then send it to Alice. Bob also shares that hash with John.
    To simplify this written illustration, we’ll represent value as `V`.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Figk_HTML.jpg)


    A figure depicts three characters, Alice, John, and Bob. It denotes `V(8743 b)`
    value and a pen and lock mark.


    This hash `V` is the lock; the key is the code to unlock the HTLCs.


    Alice creates a Hash Time-Locked Contract (HTLC) with John and tells him that
    she will pay him if he can produce the preimage of `V` within two days. Alice
    signs a transaction with a lock time of two days after it is broadcast. John can
    redeem it with knowledge of `V`, and afterward, it is redeemable only by Alice.
    HTLC allows Alice to make a conditional promise to John while ensuring that her
    funds will not be accidentally burned if John never knows what `V` is.


    John does the same, making an HTLC that will pay Bob if Bob can produce `V` within
    a day. However, Bob does, in fact, know `V`. Because Bob can pull the desired
    amount from John by using his key, Bob can consider the payment from Alice completed.
    Now, he has no problem telling `V` to John so that they can collect their funds
    too.


    Bob discloses his key to John within one day, and Bob gets paid by John.


    John discloses his key to Alice within two days, and John gets paid by Alice.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Figl_HTML.jpg)


    A figure depicts three characters, Alice, John, and Bob. It points out 1, 2, 3,
    4 BTC processes, and mentions `K = V`.


    After everyone cooperates, all of these transactions occur inside the Lightning
    Network. Everyone gets paid in a mechanical manner. The Lightning Network is almost
    atomic in nature and bidirectional, meaning that everyone gets paid or nobody
    gets paid.


    In the Lightning Network, when the payment transaction is broadcasted, all the
    individual transactions will be verified first, and they must match the transaction
    history to avoid broadcasting fake or incorrect transactions. There is also a
    penalty imposed on fraudulent transactions, where if the Lightning Network detects
    a bad actor in the system, they are immediately charged with a penalty. This way,
    the entire network ensures credibility and consistency while discouraging bad
    behavior.


    ## Summary


    The main purpose of this chapter was to present the basic concept of the Bitcoin
    network. Although it only scratches the surface of entire Bitcoin blockchain,
    this chapter was an opportunity to enrich your Bitcoin knowledge. The chapter
    started with a discussion on the history of Bitcoin, then we learned basic Bitcoin
    concepts (including Bitcoin wallet and Bitcoin network). Next, we went over Bitcoin
    transactions to familiarize you with the key concepts behind the Bitcoin blockchain,
    which form the backbone of the Bitcoin network. Lastly, we also briefly introduced
    Lightning Network concepts.


    In the next chapter, we will continue our learning journey with Ethereum: A Gateway
    to Cryptocurrency.


    # Ethereum: A Gateway to Cryptocurrency


    Alan Turing, a mathematician, logician, and computer scientist, is widely considered
    to be the father of computer science. In the 1930s, he invented the Universal
    Turing Machine. Assuming enough memory is available, the Turing Machine could
    calculate anything using only two symbols (0 or 1) arranged in a potentially infinite
    one-dimensional sequence. This is the basis for the first computer. Turing-completeness,
    therefore, refers to any computation problem that can be solved and implemented
    in a Turing-complete environment, no matter how complex.


    Ethereum, the second-largest cryptocurrency after Bitcoin, is considered a distributed
    Turing machine. It introduced a built-in Turing-complete programming language—smart
    contract, which can be used for creating various decentralized applications (also
    called Dapps).


    The previous chapter introduced Bitcoin as the first embodiment of blockchain
    technology and the world’s most popular cryptocurrency.


    In this chapter, we’ll continue exploring the Ethereum blockchain, built as a
    Turing-complete blockchain. The chapter begins with the history of Ethereum. From
    there, we cover many Ethereum basic concepts and elementary operations, including
    Ether, Gas, and Ethereum Account. Then, for a deeper and more comprehensive understanding
    of Ethereum, we explore a big-picture overview of the Ethereum Virtual Machine
    (EVM). We will also see the important Ethereum clients and node implementations.
    Finally, we discuss how Ethereum works and explores the internal Ethereum architecture.


    One of this chapter’s goals is to help you acquire the necessary technical background
    to understand Ethereum mechanics and get you ready to develop your first decentralized
    application in the next chapter.


    This chapter is organized around a few major topics:


    - The history of Ethereum

    - Getting to know Ethereum

    - How Ethereum works


    ## The History of Ethereum


    Vitalik Buterin is a Russian-Canadian writer and programmer who has been involved
    in Bitcoin and crypto since 2011 just two years after Bitcoin was created. Vitalik
    became a writer, earning 5 Bitcoins for every post for the Bitcoin Magazine website.
    Soon, he became the co-founder of *Bitcoin Magazine*. Having improved his understanding
    of Bitcoin, Buterin became a Bitcoin expert and realized the limited functionality
    of Bitcoin. In 2013, for six months, Vitalik traveled around the world to learn,
    meet, and speak with Bitcoin developers. He recognized that he could build a new,
    potentially better version of blockchain by iterating on the Bitcoin.


    ### Whitepaper Released (November 2013)


    In November 2013, Vitalik, just 19 years old, published a white paper entitled
    *Ethereum: A Next-Generation Smart Contract and Decentralized Application Platform*,
    exploring the general idea of Ethereum.


    The white paper explaining the concept of Ethereum that includes the following:


    - It provides a built-in Turing-complete programming language that can be used
    to create a “smart contract”—simply a self-executing program that runs on the
    blockchain.

    - It establishes peer-to-peer transactions in the blockchain. The platform can
    create and build a smart contract and decentralized application, allowing anyone
    to define, create, and exchange types of value: cryptocurrencies, shares, and
    many other assets.


    ### Yellow Paper Released (April 2014)


    In April 2014, Dr. Gavin Wood published the Ethereum yellow paper, giving a technical
    definition of the Ethereum protocol—*Ethereum: a secure decentralized generalized
    transaction ledger*, which describes a technical definition of the Ethereum protocol.


    ### The Birth of Ethereum (July 2014)


    Ethereum was publicly announced at the North American Bitcoin Conference in Miami
    in January 2014. The Ethereum Foundation, as a nonprofit organization, was formed
    on July 6th, 2014, in Zug, Switzerland. Ethereum’s founding members were Vitalik
    Buterin, Gavin Wood, Charles Hoskinson, Anthony Di Iorio, Mihai Alise, and Joe
    Lubin.


    ### Launching the Ether Sale (July–September 2014)


    On July 20th, 2014, the Ethereum Foundation launched a 42-day crowdfunding campaign.
    On September 2nd, 2014, the public crowd sale ended. The Ethereum Foundation raised
    31,591 Bitcoin, that’s about $18 million at the time of the sale’s close.


    ### Ethereum Released (June 2015)


    During 2014 and 2015, many proofs-of-concept were developed. “Olympic” was the
    ninth and last prototype. On June 30, 2015, Ethereum went live, and the first
    “genesis block” was created.'
