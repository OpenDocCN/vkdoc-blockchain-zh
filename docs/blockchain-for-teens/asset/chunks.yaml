  trans: '

    # 掌控你的第一个以太坊钱包


    在 Remix 中，当我们使用 Injected Provider 时，`Metamask` 是最广泛使用的钱包提供商之一。`MetaMask` 于 2016
    年由 Aaron Davis 和 Daniel Finlay 创立，目前隶属于 ConsenSys 公司。截至 2022 年 3 月，`Metamask`
    月活跃用户已超过 3000 万。作为 Chrome、Firefox、Brave 和 Edge 浏览器的免费扩展程序，`MetaMask` 能让你的普通浏览器变身为
    Web3 浏览器，用于存储和交换加密货币，以及与以太坊 DApp 交互，而无需运行以太坊节点。简而言之，`MetaMask` 是一个你可以在浏览器中访问的移动加密钱包。要管理
    `Metamask` 的访问权限，用户只需要一个密码和一个 12 个单词组成的恢复短语，也称为种子短语。种子短语可以由任何真实的单词组成，例如 dog、cat
    或 chicken。


    如果你忘记或丢失了钱包恢复短语，就无法恢复你的加密钱包密码。务必将这些种子短语备份在安全可靠的地方，比如硬盘、U 盘或纸上。不要将其存储在容易被盗的地方，例如电子邮件、在线存储等。


    `MetaMask` 可能并非存储大量加密货币或高价值加密资产（例如 NFT）的最佳场所。在连接主网进行交易时，请确保 `MetaMask` 是该浏览器中唯一打开的标签页，并避免在同一浏览器中登录社交媒体账户——某些社交媒体网站拥有可能窃取你数据的插件。


    从 [`https://metamask.io`](https://metamask.io) 安装 `MetaMask`。然后将 `MetaMask` 钱包软件下载到你选择的浏览器中。选择“创建钱包”选项，阅读条款和条件，然后创建密码。安装完成后，你会在浏览器右上角看到一只狐狸。打开
    `MetaMask`，通过点击“设置”➜“高级”➜“显示测试网络”，然后选择“选择此项以在网络列表中显示测试网络”的按钮，来启用测试网络。测试网络上的交易仅用于模拟主网交易或真实的区块链交易。


    ![](img/535492_1_En_5_Fig15_HTML.png)


    一张 MetaMask 界面的截图，显示设置页面。已选中高级设置选项，并标有存储日志、与手机同步、重置账户、高级 Gas 控制、显示十六进制数据和网络等选项。


    **图 5-15** – 更新 `Metamask` 的测试网络设置


    现在，你可以从 `MetaMask` 的网络列表设置中切换到 Goerli 测试网络。


    ![](img/535492_1_En_5_Fig16_HTML.jpg)


    一张添加新网络到 Goerli 测试网络的截图。


    **图 5-16** – 将 `Metamask` 连接到 Goerli 测试网络


    你会看到账户 1 中有一个默认账户，但没有以太币。


    我们将从 Goerli 测试网络获取一些免费的测试以太币。复制账户 1 的以太坊地址，并使用以下 Goerli 测试网水龙头之一，通过你的以太坊账户地址获取以太币：


    - 官方 Goerli 测试网水龙头： [`https://goerli-faucet.slock.it/`](https://goerli-faucet.slock.it/)

    - Starknet 水龙头： [`https://faucet.goerli.starknet.io/`](https://faucet.goerli.starknet.io/)

    - Goerlifaucet： [`https://goerlifaucet.com/`](https://goerlifaucet.com/)


    > **注意：** 大多数测试网络将在几个月后停用（截至 2022 年 7 月）。目前，Goerli 已确认会继续存在，因此该网络上的测试以太币通常需求旺盛。你可能需要多次尝试才能获取一些以太币。


    成功提交水龙头请求后，你的账户中将获得一些以太币。


    ![](img/535492_1_En_5_Fig17_HTML.jpg)


    一张 Goerli 测试网络中账户 1 的截图，显示有 0.05 Goerli ETH。


    **图 5-17** – 从 Goerli 测试网络水龙头获取以太币


    有了这些以太币，你就完成了将智能合约变为现实的所有艰苦工作。现在是时候与世界分享你的第一个智能合约了！让我们从 Remix 中将我们的 `HelloWorld`
    智能合约部署到 Goerli 测试网络。


    在 Remix 中，部署并运行交易模块，选择 Injected Web3 环境。`Metamask` 会弹出一个窗口，要求连接到 Goerli 测试网络中的
    `Metamask` 账户 1。


    ![](img/535492_1_En_5_Fig18_HTML.png)


    一张标有“部署并运行交易”的截图，右侧有一个标有“连接 Metamask”的界面，并且选中了一个账户。下方显示“取消”和“下一步”选项。


    **图 5-18** – 将 Remix 连接到 Goerli 测试网络


    点击“下一步”并连接。它会将 Remix IDE 与 Goerli 测试网络中的 `Metamask` 连接起来。如下截图所示，你应该会看到一个绿色的按钮显示已连接状态。


    ![](img/535492_1_En_5_Fig19_HTML.png)


    一张账户连接到测试网络的截图，显示有 0.05 Goerli ETH。


    **图 5-19** – 已连接 `Metamask` Goerli 测试网络


    现在我们可以将我们的 `HelloWorld.sol` 部署到 Goerli 测试网络。在橙色部署按钮右侧，输入“Hello Solidity”作为初始消息。然后点击部署。`Metamask`
    将动态计算预估的 Gas 费用。在提交到测试网之前，你可以确认或拒绝此请求。让我们确认这笔部署交易。


    ![](img/535492_1_En_5_Fig20_HTML.png)


    一张标有“部署并运行交易”的截图，右侧显示了 MetaMask 的通知页面。


    **图 5-20** – 将合约部署到 Goerli 测试网络


    在 Remix 控制台中，你会看到一条区块交易确认消息，其中包含交易哈希和其他交易信息。交易哈希如下：`0x7f773384290cff58ff6bb6e4f0411bfb625d3c1aa957208c6e8b8abeeed9d710`


    ![](img/535492_1_En_5_Fig21_HTML.png)


    一张 Hello World 合约的交易收据截图。


    **图 5-21** – 已部署合约及交易收据


    在 `Metamask` 中，我们可以在“活动”选项卡下看到新的合约部署信息。请注意，账户的以太币余额已扣除交易 Gas 费用。原始值是 0.05 ETH。现在是
    0.0487 ETH。


    ![](img/535492_1_En_5_Fig22_HTML.png)


    一张标有“Goerli 测试网络”的界面截图，并选中了账户 1。中间显示 0.0487 Goerli ETH，以及“买入”、“发送”和“兑换”选项。


    **图 5-22** – 已部署合约及 Gas 费用


    当你点击“合约部署”时，会显示部署信息的详情。


    ![](img/535492_1_En_5_Fig23_HTML.png)


    一张标有“已确认”的合约部署状态和交易详情截图。


    **图 5-23** – 合约部署详情


    你可以点击“在区块浏览器中查看”。该链接将跳转到 `etherscan.io` 页面，并显示此合约的部署详情。你可以看到合约已部署到地址 `0xe02cfad8b29d0aad478862facb2e6a9b1fed7bc9`（注意：当你部署时，会显示不同的地址）。该地址是公开的，所有人都可以访问。


    现在你已经部署了第一个区块链智能合约，交易哈希与我们在 Remix 控制台中看到的值一致。你可以从 `etherscan` 的搜索栏中搜索该地址。


    ![](img/535492_1_En_5_Fig24_HTML.png)


    一张 etherscan 合约页面的界面截图，显示了标有“成功”的交易详情。


    **图 5-24** – 在 `etherscan` 中已部署的合约


    太棒了！你已经将 `HelloWorld` 合约发布到 Goerli 测试网络，该网络对公众开放，并且可以从任何地方访问。接下来，让我们构建一个简单的 DApp
    来与我们的智能合约交互。

    '
- fmt: '# Decentralized Applications (Dapps)


    Generally, a Dapp is a three-tier application comprised of three main components:


    - **A front-end layer** – A web browser with web servers to host a web page.

    - **Web3 Provider layer** – The middle layer between the frontend and the smart
    contracts, that is, Metamask wallet.

    - **A backend (smart contract)** – Contracts run in the blockchain network.


    Figure [5-25](#535492_1_En_5_Chapter.xhtml#Fig25) shows a typical DApp layer architecture:


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig25_HTML.jpg)


    An illustration of the dapp layer architecture flow diagram, with web client,
    web provider, smart contract and ethereum block chain.


    Figure 5-25: Dapp layer architecture


    In the Ethereum client section, we use `web3` API to query some blockchain information
    from the `geth` console. In this section, we will explore another Ethereum JavaScript
    Open source library — `Ether.js`, which also enables web clients to communicate
    and interact with the Ethereum network.


    ## Getting Started


    Before proceeding with this section, you need to install the following:


    ### Installing node.js


    Follow the node office installation guide, download and install `node.js`:


    <https://nodejs.org/en/download/>


    ### Installing Git


    Follow the git office installation guide to install Git:


    <https://git-scm.com/book/en/v2/Getting-Started-Installing-Git>


    ### Git clone HelloWorld Dapp Project


    Once you install node and Git, you need go to this book’s Apress website, git
    clone chapter [5](#535492_1_En_5_Chapter.xhtml) HelloWorld Dapp source code:


    ```

    git clone https://github.com/Apress/Blockchain-for-Teens.git

    ```


    ### Install HelloWorld Dapp Project


    Open terminal, navigate to helloworld project location. Run `npm install`:


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Figa_HTML.jpg)


    A screenshot of the hello world project location.


    This will install node library needed to run HelloWorld Dapp.


    The project structure should be similar to the one shown in Figure [5-26](#535492_1_En_5_Chapter.xhtml#Fig26):


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig26_HTML.jpg)


    A screenshot of the project structure folders illustrating options after selecting
    `client.js`.


    Figure 5-26: Dapp project structure


    Note, the source code points to the Goerli test network contract address at:


    ```

    0xe02cfad8b29d0aad478862facb2e6a9b1fed7bc9

    ```


    You can use this address for testing or you modify this address to your own deployed
    contract address.


    Open `client.js`, update line 3 of your own address. If you modified the contract
    and have different contract abi, replace line 4 with your own contract abi.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Figb_HTML.png)


    A screenshot of the address testing for own contract address.


    ### Run HelloWorld Dapp Project


    Run the following command shown after the helloworld folder from terminal:


    ```

    node index.js

    ```


    This will bring up node server to host HelloWorld Dapp. The port number is 3000.


    ![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig27_HTML.jpg)


    A screenshot of the dapp node server address.


