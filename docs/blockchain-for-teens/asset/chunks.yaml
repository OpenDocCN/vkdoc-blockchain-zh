- fmt: '# Ethereum Clients


    As we just learned, Light Clients are mostly implemented on mobile devices. Although
    setting up a full node or archive node will take a long time to sync, there are
    multiple benefits to running your own node:


    1. Your node can be a network validator to verify all the transactions and blocks.

    2. You can verify your application client transaction data by yourself, without
    the need for a third party to verify a transaction—“Don’t Trust. Verify.”

    3. You will have a consistent view of the current network state and not need to
    rely on other public nodes or services where data could be delayed or untrusted.

    4. You have more data privacy. When you use third-party software or tool to submit
    a transaction, these services could read your IP address along with your account
    information. IP addresses will reveal your current location.


    To sync and communicate to the Ethereum network, you need to install Ethereum
    client software. The most used Ethereum clients are `Geth`. `etherscan.io` show
    that 90.3% of Ethereum node install `Geth` as an Ethereum client to join the network
    and establish a p2p communication channel with other nodes. Diagram [4-12](#535492_1_En_4_Chapter.xhtml#Fig12)
    shows overall Ethereum client usage.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig12_HTML.jpg)


    A pie chart consists of overall ETM client usage. The most used ETM clients are
    `Geth` at 90.3%. 8 other clients are estimated.


    **Figure 4-12** Overall Ethereum client usage


    `Geth` (Go Ethereum) is an open source command line interface (cli) for running
    an Ethereum node written in Google’s programming language Go.


    The Ethereum community built and maintained Go Ethereum.


    Using `Geth` allows the node to perform transactions, mining, transfer ether between
    accounts, and deploy and interact with smart contracts on the Ethereum blockchain.
    `Geth` can be directly downloaded from `Geth`’s official website—[`https://geth.ethereum.org/downloads/`](https://geth.ethereum.org/downloads/).
    The site provides a standard installation guide.


    Once installed `Geth`, you can run `Geth` in sync mode to become a full, light,
    archive node.


    `Geth` command to sync full node:


    ```

    geth --syncmode full

    ```


    When sync mode is a full mode, `Geth` will download all blocks and replay all
    transactions from the genesis block. The state for full nodes will keep the last
    128 blocks in memory.


    `Geth` command to sync light node:


    ```

    geth --syncmode light

    ```


    When sync mode is a light mode, `Geth` will download the most recent 2,300 blocks
    and replay related transactions. As a result, the sync process for light mode
    is much faster than in full mode.


    `Geth` command to sync archive node:


    ```

    syncmode full --gcmode archive

    ```


    `Geth` will download all blocks and replay all transactions from the genesis block
    and write all intermediate states to the archive disk.


    There are many other Ethereum clients that are available in the Ethereum community.
    These clients are developed by different teams and implemented in different programming
    languages. All of these clients are actively used in the industry. Table [4-4](#535492_1_En_4_Chapter.xhtml#Tab4)
    summarizes the different client’s usage.


    **Table 4-4** Ethereum clients


    | Client | Programing language | Disk size (fast sync) | Disk size (full archive)
    |

    | --- | --- | --- | --- |

    | `Geth` | Go | 400 GB+ | 6 TB+ |

    | `OpenEthereum` | Rust | 280 GB+ | 6 TB+ |

    | `Besu` | Java | 750 GB+ | 5 TB+ |

    | `Nethermind` | C#, .NET | 200 GB+ | 5 TB+ |


    `Geth` has a JavaScript console built using the `GoJa JS Virtual Machine`.


    `Geth` has a built-in JavaScript console and supports all standard `web3 JSON-RPC
    APIs`, called `web3.js`, which is compatible with `ECMAScript 5.1`. You can use
    `JSON-RPC APIs` to interact with your node. `Geth` supports multiple ways to let
    client applications send raw JSON objects to the node. One of the most widely
    used protocols is called JSON-RPC over HTTP. JSON stands for JavaScript Object
    Notation. It is an open standard file format that transmits data between a server
    and web application. The data are in key/value pairs separated by a comma in the
    JSON file. Here is an example:


    ```json

    {

    ''name'': ''Alice'',

    ''gender'': ''Female'',

    ''account'': 12345

    }

    ```


    RPC stands for “Remote Procedure Call” and is used for other remote system processes.
    When client applications use JSON-RPC over HTTP to send JSON data to `Geth`, `Geth`
    will execute specific tasks provided by `Web3 API` in the blockchain. Web3 is
    run on top of the RPC layer, as shown in Figure [4-13](#535492_1_En_4_Chapter.xhtml#Fig13).


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig13_HTML.jpg)


    A schema depicts the interrelation between the client app, Ethereum client, full
    node E V M, and Ethereum blockchain.


    **Figure 4-13** Call Ethereum client via JSON-RPC


    ### Geth Console


    To start `Geth` JavaScript console, you can run the command—`Geth attach` with
    IPC. IPC (Inter-Process Communication) provides unrestricted access to all `Web3
    APIs`. You can use IPC to connect when the `Geth` console is running on the same
    machine as the `Geth` node.


    They opened the console from the running `Geth` instance, the result will look
    like this:


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figb_HTML.jpg)


    A code for `Geth` JavaScript console. It contains the labels instance, coinbase,
    at block, datadir, modules, and exit


    To get support for `Web3 APIs` including `eth`, `personal`, `admin`, and `miner`,
    `Geth` console provide `web3` command. Let’s take a look at `eth` related API.
    Type `eth` in `Geth` console. It will show all supported `eth` commands.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figc_HTML.jpg)


    A list of `eth` commands which starts with `eth.`.


    To list all of your current accounts in the network, simply run the following:


    ```

    eth.accounts.

    ```


    The listed account output should be similar to the following:


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figd_HTML.jpg)


    A text represents `eth.account` outputs in the console. It consists of numbers
    and letters.


    To check the account balance, convert wei to ether, run the following command:


    ```

    eth.getBalance(''0x88437244acbb6276de36175740a8d686a9531ba7'') to get wei

    ```


    Or, we can directly convert to ether:


    ```

    web3.fromWei(eth.getBalance(''0x88437244acbb6276de36175740a8d686a9531ba7''),''ether'')

    ```


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fige_HTML.jpg)


    An image consists of a code to get the account balance it starts from `eth.getBalance`
    and directly convert to the `web3`.


    To get the latest block number of the blockchain, run the following command:


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figf_HTML.jpg)


    An image consists of a command to get the block number of the blockchain run command
    `>eth.blockNumber` and displays 518560.


    Then, you can display a matching block summary information by calling:


    ```

    eth.getBlock (blockNumber)

    ```


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Figg_HTML.png)


    An image of `eth` console of `eth.getBlock` opens a new window of `eth`. The command
    will appear in the console.


    To exit the `Geth` console, just simply run `exit` or press `CTRL-C`.'
  raw: '### Ethereum Clients


    As we just learned, Light Clients are mostly implemented on mobile devices. Although
    setting up a full node or archive node will take a long time to sync, there are
    multiple benefits to running your own node:


    1.  Your node can be a network validator to verify all the transactions and blocks.


    2.  You can verify your application client transaction data by yourself, without
    the need for a third party to verify a transaction—“Don’t Trust. Verify.”


    3.  You will have a consistent view of the current network state and not need
    to rely on other public nodes or services where data could be delayed or untrusted.


    4.  You have more data privacy. When you use third-party software or tool to submit
    a transaction, these services could read your IP address along with your account
    information. IP addresses will reveal your current location.


    To sync and communicate to the Ethereum network, you need to install Ethereum
    client software. The most used Ethereum clients are Geth. etherscan.io show that
    90.3% of Ethereum node install Geth as an Ethereum client to join the network
    and establish a p2p communication channel with other nodes. Diagram [4-12](#535492_1_En_4_Chapter.xhtml#Fig12)
