- fmt: "# What Is Decentralized Finance (DeFi)?\n\nDecentralized finance, also known\
    \ as DeFi, uses cryptocurrency and blockchain technology to provide a full spectrum\
    \ of financial products and services, from everyday payment, lending, and borrowing\
    \ to complicated derivatives and margin trading.\n\nTraditional, centralized financial\
    \ systems control user transactions using their centralized services. The services\
    \ charge a high transaction fee due to third parties involved transaction process\
    \ for facilitating money movement between parties and compliance. In 2021, the\
    \ banking industry earned an estimated $33.4 billion in overdraft revenues.\n\n\
    Users have to trust the centralized system to manage their funds. Finance services\
    \ require the customer to provide personal information to verify their identity\
    \ when doing business with banks and other financial institutions. The process\
    \ is due to government regulations that require the bank to perform KYC (Know\
    \ Your Customer) and AML (anti-money laundering) complex compliance. Financial\
    \ institutions use AML to prevent money laundering.\n\nHowever, increasing banking\
    \ requirements are adding complexity to protecting customer data. As a result,\
    \ the financial industry had to maintain and upgrade its system to make business\
    \ services functional and ensure customer data is safe for implementing new technology.\n\
    \nBecause financial institutions are involved in protecting customers’ money and\
    \ highly sensitive personally identifiable information (PII) information, they\
    \ have very high protection standards to take security most seriously. Furthermore,\
    \ cybercriminals typically pick their targets based on maximum impact and profit.\
    \ The financial industry perfectly meets these conditions and has always been\
    \ a favored target for incentivized attacks by cyber attackers.\n\nModern software\
    \ systems are typically very complex and involve many computer infrastructures,\
    \ software, and components, such as open source libraries, databases, cloud ecosystems,\
    \ containers, networks, operating systems, etc. Hackers use vulnerability search\
    \ engines, such as `Nmap`, `Ransomware`, `Trojans`, and `Worms`, to find vulnerable\
    \ computer systems, software, servers, and much more. To keep the highest level\
    \ of data security is often very expensive and challenging, and many financial\
    \ institutions have to tighten their budgets on IT spending.\n\nThere are around\
    \ 44,000 banks and credit unions around the world. Unfortunately, not every company\
    \ can adequately take care of user data for their customers. Today, banking and\
    \ finance data breaches often happen. Therefore, banking and finance data breaches\
    \ often occur.\n\nCybersecurity risks to the financial system have increased in\
    \ recent years. Figure [8-1](#535492_1_En_8_Chapter.xhtml#Fig1) shows financial\
    \ data breaches from January 2018 to June 2022.\n\n![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig1_HTML.png)\n\
    \nA bar and line graphs present the number of data breaches and affected records\
    \ between January 2018 and April 2022. The bar graph has the highest peak, at\
    \ 37 percent, on October 2020. The line graph has the highest value at 10 million\
    \ between July 2019 and October 2019.\n\n**Figure 8-1**  \nFinancial Data Breaches\
    \ in January 2018–April 2022\n\nThere were 982 financial data breaches from January\
    \ 2018 to June 2022, and these breaches affected around 153 million individual\
    \ records. Data breaches have increased by 13% from 2019 to 2020 and 11% from\
    \ 2020 to 2021.\n\nIn March 2019, more than 100 million Capital One banking customers’\
    \ credit card information, including *Social Security Numbers*, dates of birth,\
    \ credit card numbers, credit scores, credit limits, and balances, suffered a\
    \ data breach. As a result, the bank has to pay $190 million to settle a class-action\
    \ lawsuit.\n\nThe financial protocols can be defined in smart contracts in DeFi.\
    \ The financial services are running on the decentralized blockchain network,\
    \ which is available to anyone with an Internet connection. There are no traditional\
    \ centralized authorities, intermediaries, and trust mechanisms. Users can maintain\
    \ full control of their assets in a secure digital wallet instead of managing\
    \ them in a bank. On Nov. 11, 2022, FTX, “Futures Exchange,” as the second-largest\
    \ cryptocurrency exchange, filed for bankruptcy. The exchange was valued at more\
    \ than US$30 billion in early November 2022. As a centralized exchange, FTX held\
    \ users’ wallets and private keys and managed user funds. However, the exchanger\
    \ improperly loaned customer funds to Alameda Research which led to problems when\
    \ FTX ran into its “liquidity crisis.” FTX’s collapse reminds investors of ‘Not\
    \ Your Keys, Not Your Coins’ and has spurred a rising interest in decentralized\
    \ finance platforms.\n\nDue to the transparent nature of public blockchains, data\
    \ privacy has become a rising concern regarding DeFi systems in the blockchain.\
    \ There are already many privacy-focused solutions on the blockchain, including\
    \ secure Multi-Party Computation (MPC), zero-knowledge proofs, federated machine\
    \ learning, off-chain data storage, etc.\n\nDeFi is booming. DeFi’s total value\
    \ locked or TVL has dramatically grown nearly 40,000% in the last two years from\
    \ $601 million at the start of 2020 to $239 billion in 2022. The global financial\
    \ services market is worth $23.32 trillion, and DeFi TVL is 240 billion as of\
    \ 2021. DeFi is only 1% of the total global financial services market. It is still\
    \ in the very early stages in this space, with plenty of room for innovation.\
    \ DeFi TVL should continue to increase dramatically in the next few years.\n\n\
    ## The Structure of DeFi\n\nDeFi services are built based on layered architecture,\
    \ which comprises multiple layers and the logical separation of components. Each\
    \ layer’s components communicate with another layer’s components to execute its\
    \ function. Communication happens through predefined interfaces.\n\nThe DeFi ecosystem\
    \ consists of five different layers, which encompass the followings: aggregation,\
    \ application, protocol, asset, and settlement layers, as shown in Figure [8-2](#535492_1_En_8_Chapter.xhtml#Fig2).\n\
    \n![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig2_HTML.png)\n\nA schematic\
    \ representation of a decentralized finance structure with 5 layers. It includes\
    \ aggregation, application, protocol, asset, and settlement. Each factor includes\
    \ the functions and processes that are involved in the layers.\n\n**Figure 8-2**\
    \  \nThe structure of DeFi—five layers\n\n### Layer 1: The Settlement Layer\n\n\
    The settlement layer provides the foundation for all DeFi transactions—public\
    \ blockchain and its native cryptocurrency form the settlement layer. One example\
    \ of the settlement layer is Ethereum and its native token ether (ETH).\n\nThe\
    \ blockchain transaction data are permanently stored in the network. Therefore,\
    \ any asset ownership state changes will adhere to the network’s consensus mechanisms,\
    \ smart contract conditions, and other rules to ensure that transaction execution\
    \ will only happen in line with established protocols.\n\nSince this layer is\
    \ principally composed of blockchain and distributed ledger technologies for trustless\
    \ execution, it serves as a settlement layer.\n\nAt the time of writing, most\
    \ DeFi applications are built on the Ethereum network, which holds over 25% of\
    \ all decentralized finance protocols. Ethereum has 35.81 billion, which is 58%\
    \ of the $62.32 billion entire DeFi TVL. All EVM-related DeFi TVL is worth 50.85\
    \ billion, which is around 82% of the whole DeFi TVL. Figure [8-3](#535492_1_En_8_Chapter.xhtml#Fig3)\
    \ illustrates the blockchains’ top DeFi protocols and TVL.\n\n![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig3_HTML.png)\n\
    \nA pie chart and 3D bar graph present the blockchain of DeFi protocols in percent\
    \ and TVL in billions. The data from the pie chart are as follows. Ethereum, 25%.\
    \ Binance, 20%. Polygon, 13%. Fantom, 12%. Avalanche, 11%. Arbitrum, 5%. Cronos\
    \ and Solana, 4%. Optimism and Harmony, 3%. The bar graph has the highest value,\
    \ about 35, for Ethereum.\n\n**Figure 8-3**  \nBlockchains’ top DeFi protocols\
    \ and TVL"
  raw: '## What Is Decentralized Finance (DeFi)?


    Decentralized finance, also known as DeFi, uses cryptocurrency and blockchain
    technology to provide a full spectrum of financial products and services, from
    everyday payment, lending, and borrowing to complicated derivatives and margin
    trading.


    Traditional, centralized financial systems control user transactions using their
    centralized services. The services charge a high transaction fee due to third
    parties involved transaction process for facilitating money movement between parties
    and compliance. In 2021, the banking industry earned an estimated $33.4 billion
    in overdraft revenues.


    Users have to trust the centralized system to manage their funds. Finance services
    require the customer to provide personal information to verify their identity
    when doing business with banks and other financial institutions. The process is
    due to government regulations that require the bank to perform KYC (Know Your
    Customer) and AML (anti-money laundering) complex compliance. Financial institutions
    use AML to prevent money laundering.


    However, increasing banking requirements are adding complexity to protecting customer
    data. As a result, the financial industry had to maintain and upgrade its system
    to make business services functional and ensure customer data is safe for implementing
    new technology.


    Because financial institutions are involved in protecting customers’ money and
    highly sensitive personally identifiable information (PII) information, they have
    very high protection standards to take security most seriously. Furthermore, cybercriminals
    typically pick their targets based on maximum impact and profit. The financial
    industry perfectly meets these conditions and has always been a favored target
    for incentivized attacks by cyber attackers.


    Modern software systems are typically very complex and involve many computer infrastructures,
    software, and components, such as open source libraries, databases, cloud ecosystems,
    containers, networks, operating systems, etc. Hackers use vulnerability search
    engines, such as Nmap, Ransomware, Trojans, and Worms, to find vulnerable computer
    systems, software, servers, and much more. To keep the highest level of data security
    is often very expensive and challenging, and many financial institutions have
    to tighten their budgets on IT spending.


    There are around 44,000 banks and credit unions around the world. Unfortunately,
    not every company can adequately take care of user data for their customers. Today,
    banking and finance data breaches often happen. Therefore, banking and finance
    data breaches often occur.


    Cybersecurity risks to the financial system have increased in recent years. Figure
    [8-1](#535492_1_En_8_Chapter.xhtml#Fig1) shows financial data breaches from January
    2018 to June 2022.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig1_HTML.png)


    A bar and line graphs present the number of data breaches and affected records
    between January 2018 and April 2022\. The bar graph has the highest peak, at 37
    percent, on October 2020\. The line graph has the highest value at 10 million
    between July 2019 and October 2019.


    Figure 8-1


    Financial Data Breaches in January 2018–April 2022


    There were 982 financial data breaches from January 2018 to June 2022, and these
    breaches affected around 153 million individual records. Data breaches have increased
    by 13% from 2019 to 2020 and 11% from 2020 to 2021.


    In March 2019, more than 100 million Capital One banking customers’ credit card
    information, including *Social Security Numbers,* dates of birth, credit card
    numbers, credit scores, credit limits, and balances, suffered a data breach. As
    a result, the bank has to pay $190 million to settle a class-action lawsuit.


    The financial protocols can be defined in smart contracts in DeFi. The financial
    services are running on the decentralized blockchain network, which is available
    to anyone with an Internet connection. There are no traditional centralized authorities,
    intermediaries, and trust mechanisms. Users can maintain full control of their
    assets in a secure digital wallet instead of managing them in a bank. On Nov.
    11, 2022, FTX, “Futures Exchange,” as the second-largest cryptocurrency exchange,
    filed for bankruptcy. The exchange was valued at more than US$30 billion in early
    November 2022\. As a centralized exchange, FTX held users’ wallets and private
    keys and managed user funds. However, the exchanger improperly loaned customer
    funds to Alameda Research which led to problems when FTX ran into its “liquidity
    crisis.” FTX’s collapse reminds investors of ‘Not Your Keys, Not Your Coins’ and
    has spurred a rising interest in decentralized finance platforms.


    Due to the transparent nature of public blockchains, data privacy has become a
    rising concern regarding DeFi systems in the blockchain. There are already many
    privacy-focused solutions on the blockchain, including secure Multi-Party Computation
    (MPC), zero-knowledge proofs, federated machine learning, off-chain data storage,
    etc.


    DeFi is booming. DeFi’s total value locked or TVL has dramatically grown nearly
    40,000% in the last two years from $601 million at the start of 2020 to $239 billion
    in 2022\. The global financial services market is worth $23.32 trillion, and DeFi
    TVL is 240 billion as of 2021. DeFi is only 1% of the total global financial services
    market. It is still in the very early stages in this space, with plenty of room
    for innovation. DeFi TVL should continue to increase dramatically in the next
    few years.


    ## The Structure of DeFi


    DeFi services are built based on layered architecture, which comprises multiple
    layers and the logical separation of components. Each layer’s components communicate
    with another layer’s components to execute its function. Communication happens
    through predefined interfaces.


    The DeFi ecosystem consists of five different layers, which encompass the followings:
    aggregation, application, protocol, asset, and settlement layers, as shown in
    Figure [8-2](#535492_1_En_8_Chapter.xhtml#Fig2).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig2_HTML.png)


    A schematic representation of a decentralized finance structure with 5 layers.
    It includes aggregation, application, protocol, asset, and settlement. Each factor
    includes the functions and processes that are involved in the layers.


    Figure 8-2


    The structure of DeFi—five layers


    ### Layer 1: The Settlement Layer


    The settlement layer provides the foundation for all DeFi transactions—public
    blockchain and its native cryptocurrency form the settlement layer. One example
    of the settlement layer is Ethereum and its native token ether (ETH).


    The blockchain transaction data are permanently stored in the network. Therefore,
    any asset ownership state changes will adhere to the network’s consensus mechanisms,
    smart contract conditions, and other rules to ensure that transaction execution
    will only happen in line with established protocols.


    Since this layer is principally composed of blockchain and distributed ledger
    technologies for trustless execution, it serves as a settlement layer.


    At the time of writing, most DeFi applications are built on the Ethereum network,
    which holds over 25% of all decentralized finance protocols. Ethereum has 35.81
    billion, which is 58% of the $62.32 billion entire DeFi TVL. All EVM-related Defi
    TVL is worth 50.85 billion, which is around 82% of the whole DeFi TVL. Figure
    [8-3](#535492_1_En_8_Chapter.xhtml#Fig3) illustrates the blockchains’ top DeFi
    protocols and TVL.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig3_HTML.png)


    A pie chart and 3 D bar graph present the blockchain of DeFi protocols in percent
    and T V L in billions. The data from the pie chart are as follows. Ethereum, 25\.
    Binance, 20\. Polygon, 13\. Fantom, 12. Avalanche, 11\. Arbitrum, 5\. Cronos and
    solana, 4\. Optimism and hormony, 3\. The bar graph has the highest value, about
    35, for Ethereum.


    Figure 8-3


    Blockchains’ top DeFi protocols and TVL'
  trans: "\n# 什么是去中心化金融 (DeFi)？\n\n去中心化金融（简称 DeFi）利用加密货币和区块链技术，提供从日常支付、借贷到复杂衍生品和保证金交易的全方位金融产品与服务。\n\
    \n传统的中心化金融系统通过其中心化服务控制用户交易。由于涉及第三方参与交易流程以促进资金在各方之间转移并确保合规，这些服务会收取高昂的交易费用。2021\
    \ 年，银行业在透支收入方面估计赚取了 334 亿美元。\n\n用户必须信任中心化系统来管理他们的资金。金融服务要求客户在与银行及其他金融机构交易时提供个人信息以验证身份。这个过程源于政府法规，要求银行执行\
    \ KYC（了解你的客户）和 AML（反洗钱）等复杂的合规程序。金融机构利用 AML 来防止洗钱。\n\n然而，日益增加的银行要求使得保护客户数据的复杂性也随之增加。因此，金融行业必须维护和升级其系统，以确保业务服务正常运行，并保证客户数据在实施新技术时的安全性。\n\
    \n由于金融机构涉及保护客户的资金以及高度敏感的个人身份信息（PII），它们拥有非常高的保护标准，将安全性置于首位。此外，网络犯罪分子通常根据最大影响和利润来选择目标。金融行业完美契合这些条件，一直是网络攻击者进行有动机攻击的青睐目标。\n\
    \n现代软件系统通常非常复杂，涉及众多计算机基础设施、软件和组件，例如开源库、数据库、云生态系统、容器、网络、操作系统等。黑客使用漏洞搜索引擎，如 `Nmap`、`Ransomware`、`Trojans`\
    \ 和 `Worms`，来寻找易受攻击的计算机系统、软件、服务器等等。要将数据安全性维持在最高水平通常成本高昂且极具挑战性，许多金融机构不得不收紧 IT 支出预算。\n\
    \n全球大约有 44,000 家银行和信用合作社。不幸的是，并非每家公司都能充分保护其客户的数据。如今，银行和金融数据泄露事件频发。因此，银行和金融数据泄露屡见不鲜。\n\
    \n近年来，金融系统面临的网络安全风险有所增加。图 8-1 展示了 2018 年 1 月至 2022 年 6 月的金融数据泄露情况。\n\n![](img/535492_1_En_8_Fig1_HTML.png)\n\
    \n一张柱状图加折线图展示了 2018 年 1 月至 2022 年 4 月期间的数据泄露事件数量和受影响记录数。柱状图在 2020 年 10 月达到最高峰值，为\
    \ 37%。折线图在 2019 年 7 月至 2019 年 10 月期间达到最高值，为 1000 万。\n\n**图 8-1**  \n2018 年 1 月–2022\
    \ 年 4 月的金融数据泄露\n\n从 2018 年 1 月到 2022 年 6 月，共发生了 982 起金融数据泄露事件，影响了约 1.53 亿条个人记录。数据泄露事件从\
    \ 2019 年到 2020 年增加了 13%，从 2020 年到 2021 年增加了 11%。\n\n2019 年 3 月，超过 1 亿 Capital\
    \ One 银行客户的信用卡信息（包括*社会安全号码*、出生日期、信用卡号、信用评分、信用限额和余额）发生数据泄露。因此，该银行不得不支付 1.9 亿美元以和解一项集体诉讼。\n\
    \n在 DeFi 中，金融协议可以在智能合约中定义。这些金融服务运行在去中心化的区块链网络上，任何拥有互联网连接的人都可以访问。这里没有传统的中心化权威机构、中介和信任机制。用户可以在一个安全的数字钱包中完全掌控自己的资产，而不是在银行中管理它们。2022\
    \ 年 11 月 11 日，作为第二大加密货币交易所的 FTX（“期货交易所”）申请破产。该交易所在 2022 年 11 月初的估值超过 300 亿美元。作为一个中心化交易所，FTX\
    \ 持有用户的钱包和私钥，并管理用户资金。然而，该交易平台不当地将客户资金借给 Alameda Research，这导致了 FTX 陷入“流动性危机”时出现问题。FTX\
    \ 的崩盘提醒投资者“不是你的密钥，就不是你的币”，并激发了对去中心化金融平台日益增长的兴趣。\n\n由于公共区块链的透明特性，数据隐私已成为区块链中 DeFi\
    \ 系统日益关注的问题。区块链上已有许多专注于隐私的解决方案，包括安全多方计算（MPC）、零知识证明、联邦机器学习、链下数据存储等。\n\nDeFi 正在蓬勃发展。DeFi\
    \ 的总锁定价值（TVL）在过去两年中从 2020 年初的 6.01 亿美元飙升至 2022 年的 2390 亿美元，增长了近 40,000%。截至 2021\
    \ 年，全球金融服务市场规模价值 23.32 万亿美元，而 DeFi TVL 为 2400 亿美元。DeFi 仅占全球金融服务市场总额的 1%。它在这个领域仍处于非常早期的阶段，创新空间巨大。DeFi\
    \ TVL 在未来几年内应该会继续大幅增长。\n\n## DeFi 的结构\n\nDeFi 服务基于分层架构构建，该架构包含多个层级以及组件的逻辑分离。每个层级的组件与另一层级的组件进行通信以执行其功能。通信通过预定义的接口进行。\n\
    \nDeFi 生态系统由五个不同的层级组成，包括：聚合层、应用层、协议层、资产层和结算层，如图 8-2 所示。\n\n![](img/535492_1_En_8_Fig2_HTML.png)\n\
    \n一个包含 5 个层级的去中心化金融结构的示意图。它包括聚合、应用、协议、资产和结算。每个因素都包含了该层级所涉及的功能和流程。\n\n**图 8-2**\
    \  \nDeFi 的结构——五个层级\n\n### 第一层：结算层\n\n结算层为所有 DeFi 交易提供了基础——公共区块链及其原生加密货币构成了结算层。结算层的一个例子是以太坊及其原生代币以太币（ETH）。\n\
    \n区块链的交易数据永久存储在网络中。因此，任何资产所有权的状态变更都将遵守网络的共识机制、智能合约条件和其他规则，以确保交易执行仅按照既定协议进行。\n\n\
    由于这一层主要由用于去信任执行的区块链和分布式账本技术构成，它充当了结算层的角色。\n\n在撰写本文时，大多数 DeFi 应用都构建在以太坊网络上，该网络承载了超过\
    \ 25% 的去中心化金融协议。以太坊拥有 358.1 亿美元，占整个 DeFi TVL 623.2 亿美元的 58%。所有与 EVM 相关的 DeFi TVL\
    \ 价值 508.5 亿美元，约占整个 DeFi TVL 的 82%。图 8-3 展示了各区块链上排名靠前的 DeFi 协议及其 TVL。\n\n![](img/535492_1_En_8_Fig3_HTML.png)\n\
    \n饼状图和 3D 柱状图展示了各区块链 DeFi 协议的百分比以及以十亿美元计价的 TVL。饼状图数据如下：以太坊 25%，币安 20%，Polygon\
    \ 13%，Fantom 12%，Avalanche 11%，Arbitrum 5%，Cronos 和 Solana 各 4%，Optimism 和 Harmony\
    \ 各 3%。柱状图中以太坊的值最高，约为 35。\n\n**图 8-3**  \n各区块链排名靠前的 DeFi 协议和 TVL\n"
- fmt: '### Layer 2: The Asset Layer


    The asset layer sits on top of the settlement layer. This layer consists of all
    tokens, including native protocol token assets like Ether and any additional tokens
    such as `ERC-20`, `NFT`, etc., issued on the blockchain. In this layer, it is
    worth mentioning are stablecoins.


    In Chapter [1](#535492_1_En_1_Chapter.xhtml), we learned that the cryptocurrency
    market’s high volatility brings a risk for many financial products and general
    spending. Stablecoins provide investors with a safe harbor to minimize price volatility
    by providing stable value. Their value stays pegged to another less volatile asset,
    usually a popular currency like the US dollar or the British pound. Stablecoins
    act as the medium of exchange and are widely used as currency for daily transactions
    in DeFi. We will discuss more later in the decentralized stablecoin session. Here
    are some popular stablecoins in DeFi: Tether, USD Coin, Binance USD, TrueUSD,
    DAI, and Pax Dollar.


    ### Layer 3: The Protocol Layer


    The protocol layer provides a set of principles and rules in a given industry
    that participants have agreed to follow. The protocols are written in smart contracts
    to govern DeFi transactions and are self-executable in a predefined manner without
    a central authority or third party’s interference. Many DeFi protocols are typically
    governed by decentralized autonomous organizations (DAOs).


    A decentralized autonomous organization (DAO) is an organization without centralized
    authority—no CEO, no Board of Directors, no manager to obey or serve, and is the
    autonomy and self-governance model. Decisions get made from the bottom-up and
    distributed across community token holders who participate and cast votes. To
    become token holders, users must purchase cryptocurrency to become a member. All
    votes from the DAO are posted on a blockchain, making all actions auditable. Smart
    contracts establish the DAO’s rules and will automatically execute when a set
    of criteria are met. The entire DAOs process is fully transparent and autonomous.


    In 2020, a DeFi lending protocol Aave launched its own governance token toward
    autonomous and decentralized governance. DAO community votes will determine Aave
    Market Policies and Protocol Policies, formalized in Aave Improvement Proposals
    (AIPs). Other DeFi projects have since adapted the model and moving toward DAO.
    The Popular DeFi project use DAO like Uniswap, Maker DAO, BitDAO, Aragon, Decred,
    0X, Dash, Compound, and Curve DAO.


    All protocols defined at this layer are highly interoperable, which can be used
    by any Dapp built simultaneously and provide liquidity for the DeFi ecosystem.
    The main protocols in this layer are lending, exchange, insurance, asset management,
    and others. We will provide detailed DeFi use cases in the DeFi Products section.


    ### Layer 4: The Application Layer


    The application layer runs user-specific applications that connect to individual
    protocols. These applications serve as DeFi services which typically build Dapps
    to interact with a set of smart contracts functionality on the protocol layer,
    for example, asset management, loan, and insurance applications.


    ### Level 5: The Aggregation Layer


    As DeFi exponentially grows, the number of new platforms and protocols in the
    DeFi ecosystem appears quickly. Consequently, keeping an eye on all the upcoming
    DeFi products has become increasingly challenging.


    The aggregation layer utilizes the application layer to aggregate various applications
    and protocols to provide a broader service and tools and allow users to efficiently
    perform complex tasks by connecting to several protocols and applications. DeFi
    aggregator platforms provide simply a one-stop solution that allows users to use
    a single aggregator dashboard to execute multiple types of DeFi transactions.
    Those aggregator platforms have become very popular among active DeFi users. Around
    20% of decentralized trading volumes were through the DeFi aggregator in mid-2020.


    One of the top DeFi aggregator examples is `1inch`. It is designed as the price
    aggregator to provide tools that extract price data for various tokens traded
    on decentralized multiple exchanges (DEX). `1inch` aggregator uses custom wrapper
    smart contracts that wrap/unwrap tokens at the current exchange rate. Traders
    can explore and trade cryptocurrencies across DEXes. Aggregators support cryptocurrency
    exchange at popular DEXes on Ethereum, Binance Smart Chain, Polygon, Optimistic
    Ethereum, Arbitrum, Avalanche, Gnosis Chain, and many others blockchains. Figure
    [8-4](#535492_1_En_8_Chapter.xhtml#Fig4) shows a `1inch` aggregator interface.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig4_HTML.png)


    A pair of screenshots from the 1-inch aggregator interface depict the select a
    token screen with Ethereum and U S dollar coins. The connect wallet option has
    terms and lists the networks and wallets.


    Figure 8-4


    1inch Aggregator Interface


    The DeFi product aims to reshape the traditional industry by providing various
    decentralized financial services such as lending, payment, insurance, trading,
    credit, risk, and many other financial products. The products eliminate the centralized
    third-party firms within a permissionless peer-to-peer network. Furthermore, DeFi
    products are designed modularly, enabling applications much freedom to integrate
    these open DeFi services into their products.


    ## Decentralized Stablecoin


    The crypto industry is still in its infancy stage. Compared to the traditional
    global finance market, the liquidity of digital assets is still relatively small.
    Moreover, volatility comes with any emerging market with low liquidity.


    All of this led to the rise of stablecoins. A stablecoin is a crypto that aims
    to provide a safe digital asset to maintain stability in value. It is pegging
    the price to other types of money, such as a fiat currency, like the USD or commodity
    money like gold or oil. In the past few years, stablecoins have significantly
    gained popularity, and many stablecoin projects have been launched in the cryptocurrency
    market.


    ### Stablecoin History


    The first stablecoin, `bitUSD`, was issued back in July 2014\. `bitUSD` is pegged
    to USD and can be traded freely on BitShares. Another stablecoin, Tether (`USDT`),
    was launched in October 2014, and Like `bitUSD`, the tether is also pegged to
    USD. Today, `USDT` is the stablecoin leading in the market cap.


    Figure [8-5](#535492_1_En_8_Chapter.xhtml#Fig5) shows a timeline of the launches
    of primary stablecoins in the last few years:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig5_HTML.png)


    A timeline diagram of the launches of major stable coins. The bit U S dollar was
    introduced in 2014, followed by the D A I in 2017, the true U S dollar in 2018,
    the B U S D in 2019, the F E I in 2021, and the U S D D in 2022.


    Figure 8-5


    Stablecoin Timeline


    ### Types of Stablecoins


    Stablecoins are classified into several types.


    #### Commodity-Collateralized Stablecoins


    Commodity-backed stablecoins refer to stablecoins collateralized are backed using
    physical assets like gold, oil, and real estate. The most popular commodity collateralized
    stablecoins are Tether Gold (`XAUT`) and Paxos Gold (`PAXG`).


    #### Fiat-Collateralized Stablecoins


    Fiat-collateralized stablecoins are pegged to the value of fiat, such as USD,
    EUR, or GBP, which is real money issued by governments. Most often, fiat is USD.
    For example, Tether (`USDT`) and USD Coin (`USDC`) are examples of fiat-collateralized
    stablecoin.


    #### Crypto-Collateralized Stablecoins


    Crypto-collateralized stablecoins refer to stablecoins that are backed by existing
    digital cryptocurrencies such as BTC or ETH. One example is MakerDAO’s stablecoin,
    `DAI`. `DAI` is an `ERC-20` token pegged to USD with a ratio of 1:1 achieved on-chain
    via smart contracts with incentives. The stablecoins supply is regulated on-chain
    via smart contracts and DAOs.'
