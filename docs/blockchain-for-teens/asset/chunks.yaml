  trans: '

    # BIP342

    `BIP342`——引入了一种名为“Tapscript”的新型交易脚本语言，它允许比特币节点在单笔交易中结合 Schnorr 签名和 `MAST`。此外，它还移除了
    10,000 字节的大小限制，从而为比特币智能合约提供了更大的灵活性和控制力。


    ## 比特币 ETF（2021 年 10 月–2022 年 7 月）

    2013 年 6 月，卡梅隆·文克莱沃斯和泰勒·文克莱沃斯共同创立了加密货币交易所 `Gemini`。这对双胞胎因与马克·扎克伯格争夺 Facebook 所有权而闻名，他们曾向证券监管机构提议创建比特币交易所交易基金。然而，在
    2017 年 3 月，`美国证券交易委员会（S.E.C.）`拒绝了文克莱沃斯兄弟创建比特币 `ETF` 的申请。


    大约八年后，随着加密货币行业、投资者和证券发行人的长期期待，`S.E.C.` 批准了首个比特币 `ETF`——`BITO`。`BITO` 开始在纽约证券交易所（`NYSE`）交易。合法性是金融行业中比特币交易的关键问题。获得美国证券交易委员会（`S.E.C.`）的批准，为比特币被接受为主流数字货币打开了大门。自
    2021 年 10 月首个比特币 `ETF` 获批以来，许多其他加密 `ETF` 也已获得 `S.E.C.` 批准，并可在股票市场交易。以下是比特币 `ETF`
    的列表：


    表 3-2


    SEC 批准的比特币 ETF


    | 代码 | ETF 名称 | 资产类别 |

    | --- | --- | --- |

    | `ARKW` | ARK 下一代互联网 ETF | 股票 |

    | `BITO` | ProShares 比特币策略 ETF | 货币 |

    | `SPBC` | Simplify 美国股票 PLUS GBTC | ETF |

    | `BITQ` | Bitwise 加密行业创新者 ETF | 股票 |

    | `BTF` | Valkyrie 比特币策略 ETF | 货币 |

    | `XBTF` | VanEck 比特币策略 ETF | 货币 |

    | `BITS` | Global X 区块链与比特币策略 | ETF |

    | `RIGZ` | Viridi 比特币矿工 ETF | 股票 |

    | `SATO` | Invesco Alerian Galaxy 加密经济 ETF | 股票 |

    | `BLKC` | Invesco Alerian Galaxy 区块链用户与去中心化商业 ETF | 股票 |

    | `BTCR` | Volt 加密行业革命与技术 ETF | 股票 |

    | `CRYP` | AdvisorShares 管理型比特币策略 ETF | 多资产 |


    ## 了解比特币

    在中心化经济中，中央银行发行的货币本应以稳定的价格匹配经济增长和商品交换数量。中央银行控制着货币供应量，并没有固定的公式来决定中央银行应该印刷多少货币。然而，货币体系有时可能会失控。


    比特币的发明者中本聪设计比特币的目的是抵御通货膨胀、限制其供应量，并将硬币总数上限设为 2100 万。因此，新比特币的数量每四年减半，最后一批硬币将在 2140
    年左右被挖出。


    有限的供应使比特币成为一种稀缺资产，这可以推高币种的未来价格——这也是比特币常被称为“数字黄金”的原因之一。


    ### 比特币单位

    如今，一个比特币大约价值 25,000 美元，总市值为 4550 亿。像美元和欧元这样的主要中心化世界货币可以细分为更小的单位（如美分），比特币同样也可以细分为
    Satoshi。Satoshi 是比特币的最小单位。


    一个比特币等于 1 亿个 Satoshi，可精确到小数点后第八位。


    表 3-3 展示了比特币系统中的 Satoshi 单位换算：


    表 3-3


    比特币面额与单位名称


    | 单位名称 | BTC |

    | --- | --- |

    | Satoshi | 0.00000001 BTC |

    | μBTC（微比特币） | 0.00001 BTC |

    | mBTC（毫比特币） | 0.001 BTC |

    | cBTC（厘比特币） | 0.01 BTC |

    | dBTC（分比特币） | 0.1 BTC |

    | BTC（比特币） | 1 BTC |


    假设支付 1 BTC 相当于 23,798.46 美元。那么 1 `mBTC` 价值 0.001 * 23.8 美元，而 1 `μBTC` 价值 0.24
    美元。


    ### 比特币减半

    比特币减半，也称为“halvening”，是比特币历史上的一个关键事件。每四年，新的比特币会被释放到流通中，并且比特币挖矿奖励的数量会减半。比特币的最大总供应量为
    2100 万。


    以下是过去及未来比特币减半的简要过程：


    * 2009 年 – 比特币网络奖励矿工，开始时每十分钟产生一个区块，奖励 50 BTC。

    * 2012 年 – 在开采了 210,000 个区块后，第一次比特币减半，奖励降至 25 BTC。

    * 2016 年 – 在开采了 420,000 个区块后，第二次比特币减半，挖矿奖励降至 12.5 BTC。

    * 2020 年 – 在开采了 630,000 个区块后，第三次比特币减半，挖矿奖励降至 6.25 BTC。

    * 2024 年 – 下一次比特币减半将在开采了 840,000 个区块时发生，挖矿奖励将降至 3.125 BTC。

    * 2140 年 – 第 64 次也是最后一次减半将发生，届时将不再产生新的比特币。


    中本聪将减半政策写入比特币的挖矿算法中，旨在通过保持稀缺性来降低比特币的通胀率。当矿工的奖励减少并且他们出售的数量变少时，在需求增加的情况下，有限的供应量会对价格产生积极影响。


    ### 比特币钱包

    “不是你的钥匙，就不是你的币”是加密世界最著名的格言之一。这意味着如果你没有真正掌控你的私钥，那么你实际上并不“拥有”你的加密货币/硬币。换句话说，如果你丢失了比特币钱包的私钥，你就丢失了其中的资金。


    在传统金融体系中，你有一个钱包来存放现金。比特币钱包类似于你的普通钱包，但它用于存储、发送和接收比特币。它有两个主要功能：


    首先，存储用户的公钥和私钥；其次，执行交易——例如，接收和发送比特币。

