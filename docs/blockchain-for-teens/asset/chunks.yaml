- fmt: '### Gas, Gas Price, and Gas Limit


    Like Bitcoin, Ethereum currently uses a proof-of-work (PoW) consensus mechanism.
    It required miners to compute and solve complex mathematical puzzles, verify transactions,
    and create a block of transactions to be added to the blockchain. A miner is rewarded
    with Ether (ETH). When users submit transactions, they need to pay Ether for the
    miner to execute such work.


    According to `coinwarz.com`, assume you use a machine with a hash rate of `750.00
    MH/s` (Megahashes per second) and `1350` power consumption in watts. You need
    about `$20,000`. Assume the cost of electricity is `$0.10` per kWh (depending
    on your location, the average is `$0.14/kWh` in the United States). It will take
    up to around `103` days to mine one Ether. The current ether price is around `$1100`,
    it will take a while to become profitable. Figure [4-2](#535492_1_En_4_Chapter.xhtml#Fig2)
    shows the result of the Ethereum mining calculator.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig2_HTML.jpg)


    3 radial gauge of mining revenue, mining fees, and electricity costs along with
    values for Ethereum mining hashrate, power consumption, electricity costs, pool
    fees, and ETH mined per hour and day.


    **Figure 4-2** Ethereum mining calculator


    Gas refers to such fees required to execute a transaction on Ethereum successfully,
    that is, the fees that need to be paid to miners for processing transactions.


    One of the commonly used Ether units is Gwei. It is used to specify Ethereum gas
    prices and pay for transaction fees. For example, one Gwei is the same as `0.000000001
    ETH`. If a transaction cost is `0.000000050 ETH`, we can say that the cost was
    `50 Gwei`.


    In the current Ethereum blockchain, the standard transaction fee is `21,000 Gwei`.
    The gas fee can be calculated using the following formula:


    ```

    Total Fee = Gas unit (limits) * (Base fee + Tip)

    ```


    - **Gas units (limits)** – This refers to the maximum amount of gas you want to
    spend to execute a transaction.

    - **Base fee** – It refers to a minimum amount of gas fee that requires a user
    transaction to be included in a block. The base fee amount is automatically dynamic
    and calculated by Ethereum based on market demand at any given time.

    - **Tips** – Also known as a priority fee, a miner tip. It is an optional fee,
    determined by the user and directly paid to miners. The priority fee helps your
    transaction can be picked and processed faster by the miner.


    Let’s take a real Ethereum blockchain transaction as an example (see Figure [4-3](#535492_1_En_4_Chapter.xhtml#Fig3),
    the data is from `etherscan.io`) and calculate the cost of an Ethereum transaction
    today.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig3_HTML.png)


    An image represents the ETH transaction cost consisting of status, block, timestamp,
    value, transaction fees, gas price, gas limit, and gas fees.


    **Figure 4-3** Ethereum transaction cost (etherscan.io)


    From the preceding example, a transaction’s gas limit is `201,027` units, the
    base fee is `33.529 Gwei`, and the priority fee is `1.101 Gwei`; the total transaction
    fees to execute the transaction would be `0.006961 ETH` (`201,027 * (33.529 +
    1.101) = 2,310,000 Gwei`). In the current market, one Ether is around `$1100`
    so this transaction fee is about `0.006961 * 1100 = $7.65`.


    It’s important to note that if you pay less than the required transaction fee,
    the transaction will be reverted, and you won’t receive your gas fee back because
    the miners have done the amount of mining work to process your transaction. They
    would collect the fee for their work even if the transaction failed. On the other
    hand, if you pay more gas fees, the extra gas fee will return to you once the
    transaction is complete. In the preceding example, there is field “usage by Txn”
    indicated that only `40.21%` gas fee was used, the remaining fee will return to
    the user (`500,000 - 201,027 = 298,973`).


    ### Ethereum Account


    Each Ethereum account has an Ethereum address. Ethereum has two types of accounts:
    **Externally Owned Account (EOA)** and **Contract Account**.


    #### Externally Owned Account (EOA)


    An Externally Owned Account is controlled by a public/private key pair owned by
    a user. In Chapter [2](#535492_1_En_2_Chapter.xhtml), we have learned how the
    Ethereum address is derived from the public key using `Keccak-256` hashes. Each
    Ethereum addresses are 42 hex string characters starting with `0x`, representing
    a hexadecimal format. There is no cost to create an Ethereum account. The Externally
    Owned Account can be used for fund (Ether) transfer or send transactions to smart
    contracts. You need the private key to access your fund or send funds to other
    people.


    #### Contract Account (CA)


    A contract account is controlled by code executed by the Ethereum Virtual Machine
    (EVM). These codes are typically referred to as the smart contract code. Creating
    a contract account is costly because it will use network storage. A contract account
    can do Ether transfers and create Smart Contract accounts.


    Figure [4-4](#535492_1_En_4_Chapter.xhtml#Fig4) highlights the USDT token smart
    contract creator address, which is a contract account:


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig4_HTML.png)


    A screenshot of the USDT contract account with many fields. On left, contract
    overview lists values of balance, ether value, and token. On the right, more info
    lists status of My name tag, contract creator, and token tracker. On top right
    is 4 pop-up buttons.


    **Figure 4-4** USDT Contract account (etherscan.io)


    All accounts have four common fields:


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig5_HTML.png)


    Account storage trie has circular diagram with of root node divided into 2 blocks
    and those 2 blocks divided into 2 blocks. Root node leads to `storageRoot`.


    **Figure 4-5** Ethereum account `storageRoot`


    - **Nonce** – Each address has a nonce, which represents the transaction count
    of an account. Different account addresses can have the same nonce. The number
    used in nonce is unique to prevent double-spending situations.

    - **Balance** – It is the Ether owned by this account.

    - **Storage hash** – Sometimes it is called `storageRoot`. Each Ethereum contract
    account has its own storage trie (ordered tree data structure) where the contract
    data is present. `storageRoot` is a Merkle Patricia trie of the current contact
    state as a mapping between 32-byte integers. A 256-bit hash value is calculated
    based on these contract data. The hash value will change anytime when its state
    charges. It could be used to verify the past state. Storage hash is only for contract
    accounts. Figure [4-5](#535492_1_En_4_Chapter.xhtml#Fig5) represents Ethereum
    account `storageRoot`.

    - **Code hash** – It refers to your contract’s code under this account on the
    EVM. It’s immutable.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig6_HTML.png)


    A rectangular block of Ethereum account has blocks of account address 1 to n.
    Account address 1 leads to account state that has 4 text circles for nonce, balance,
    storage hash, and code hash. Storage and code hash leads to EVM account and code
    respectively.


    **Figure 4-6** Ethereum account structure'
