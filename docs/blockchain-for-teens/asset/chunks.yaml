    图表显示了月份与百分比的对比，并呈现上升趋势。


    **图 3-7**


    ## 比特币 SegWit 采用率


    **比特币现金（2017 年 8 月）** – 然而，纽约协议（NYA）并未满足所有人的需求。一些支持大区块的开发者对 SegWit 的改进感到不满，并认为该协议将会失败。一群比特币利益相关者、开发者和矿工开始讨论通过硬分叉将区块大小限制提高到
    8 MB 的新解决方案。2017 年 8 月，由企业家 Roger Ver 领导的比特币现金（`BCH`）从比特币分叉出来并推出。该网络每秒可处理 24 笔交易，成本约为
    0.18 美分，区块大小为 8 MB。


    2017 年 8 月 1 日，比特币现金开盘价约为 400 美元，而比特币的价值约为 7567 美元。2017 年 12 月 19 日，比特币现金达到历史最高点
    3923 美元。2022 年 7 月 23 日，比特币现金价格为 124 美元，而比特币价格为 22532 美元。


    **SegWit2x 被取消，NYA 瓦解** – 在 NYA 之后，许多维护和贡献比特币开源代码的核心开发者对 NYA 的开发计划感到愤怒，因为这个协议没有代表小区块开发者的利益，也没有让他们参与其中。他们强调比特币应该是一个开放的系统；因此，通过秘密邮件列表在闭门造车的情况下改变共识是不可接受的，他们考虑反对比特币，并声明这次硬分叉将偏离“真正的比特币”。


    即使隔离见证（Segregated Witness）在 2017 年 8 月上线后，比特币核心开发者仍然坚决拒绝妥协，他们认为 `SegWit2x` 计划不会成功。


    2017 年 8 月 18 日，比特币核心（`Bitcoin Core`）发布声明，不支持 `SegWit2x` 提案。


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig8_HTML.png)


    一张文本图片描述了关于“SegWit 2x”和“BTC 1”的错误信息更正，并包含“关于”、“下载”、“博客”、“版本”、“开发”和“联系方式”等内容。


    **图 3-8**


    来自 Bitcoin Core 的 SegWit2x 声明 [https://bitcoincore.org/en/2017/08/18/btc1-misleading-statements/](https://bitcoincore.org/en/2017/08/18/btc1-misleading-statements/)


    2017 年 11 月 8 日，`BitGo` 首席执行官 Mike Belshe 发送了一封由最初支持该协议的主要公司签署的电子邮件。声明意味着 `SegWit2x`
    硬分叉被取消，NYA 瓦解。在声明公布时，比特币价格飙升了 20% 或更多，反映出用户和投资者正在逃离。


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig9_HTML.png)


    一个文本页面解释了 SegWit 2x 的最终步骤，包含几个段落。


    **图 3-9**


    SegWit2x 取消 [https://lists.linuxfoundation.org/pipermail/bitcoin-segwit2x/2017-November/000685.html](https://lists.linuxfoundation.org/pipermail/bitcoin-segwit2x/2017-November/000685.xhtml)


    **闪电网络（2018 年 3 月）** – 2018 年 3 月 15 日，闪电实验室（`Lightning Labs`）宣布了比特币闪电网络的第一个 beta
    版本。推特 CEO Jack Dorsey 对该网络表示支持。比特币的闪电网络扩容解决方案持续增长，商业和用户采用率不断提高，但仍处于早期阶段。截至 2022
    年 4 月，闪电网络容量增长到约 3600 BTC，有超过 300 家公司、项目和应用程序在使用闪电生态系统。闪电网络的交易费用约为 1 聪（`Satoshi`）或
    0.000301142 美元。而链上费用在 2021 年高峰期曾接近 60 美元。


    **比特币 SV** – **算力大战（2018 年 11 月）** – 历史似乎在重演。2018 年 8 月，比特币现金提议对协议进行升级：引入非现金交易，以支持区块链上的智能合约和预言机（`oracle`）价格预测服务。


    同样，并非所有人都支持源代码中的这些更改，批评者认为，在一个他们认为应该只处理支付的区块链中优先考虑非现金交易是不合适的。比特币现金社区中，由 Craig
    Wright 和 Calvin Ayre 领导的一群人不认同源代码的这些更改，认为这次更新会损害中本聪（`Satoshi Nakamoto`）最初比特币白皮书中的愿景。相反，作为数字现金的比特币应该只处理支付，并且区块大小应该增加到
    128 MB，以应对未来的可扩展性问题。


    2018 年 11 月 15 日，比特币现金网络分裂为比特币现金 ABC（`BCH ABC`）和比特币 SV（`BCHSV`）。这两个竞争链之间的分裂充满了争议。两条链都试图通过成为拥有更多区块的最长链来赢得算力竞赛。由
    Craig Wright 和 Calvin Ayre 领导的比特币 SV 投入了大量算力对抗由 Roger Ver 和比特大陆（`Bitmain`）吴忌寒领导的比特币现金。这场激烈的算力竞赛持续了大约十天，最终以比特币
    SV 团队宣布与比特币现金永久分裂而告终。这段时期被称为“算力大战”。代价是，比特币现金矿工损失了 345 万美元，比特币 SV 矿工损失了 249 万美元。


    2018 年 11 月 15 日，比特币 SV 开盘价约为 122 美元，而比特币现金价值约为 388 美元。2021 年 4 月 15 日，它达到历史最高点
    441.39 美元。2022 年 7 月 23 日，比特币 SV 价格为 58 美元，而比特币现金为 124 美元。'
  raw: 'A graph compares month versus percentage and displays an increasing trend.


    Figure 3-7


    Bitcoin SegWit adoption


    **Bitcoin Cash (August 2017)** – However, the NYA does not satisfy everyone. Some
    large blockers are unhappy with SegWit improvement and feel that this agreement
    will fail. A group of Bitcoin stakeholders, developers, and miners started to
    discuss new solutions by increasing the block size limit to 8 MB through a hard
    fork. In August 2017, Bitcoin Cash (BCH), led by entrepreneur Roger Verand, was
    launched, forking from Bitcoin. The network can process 24 transactions per second,
    and the cost is much lower at around 0.18 cents. The block size is 8 MB.


    On August 1, 2017, Bitcoin Cash opened trading at about $400, while Bitcoin’s
    value sat at about $7567\. On December 19, 2017, it reached a historical high
    of $3,923, and Bitcoin Cash was $124 compared to Bitcoin’s $22,532 on July 23,
    2022.


    **SegWit2x canceled, NYA collapses** – After NYA, many of Bitcoin’s core developers,
    who maintain and contribute to Bitcoin’s open source code, were furious about
    the development plans for the NYA because there was no representation from the
    small blockers and didn’t involve them in this agreement. They highlighted that
    Bitcoin was supposed to be an open system; therefore, the changing consensus behind
    closed doors by a secret mailing list was a deal breaker, and they considered
    opposing Bitcoin, stating that the hard fork would deviate from the “real Bitcoin.”


    Even after Segregated Witness went live in August 2017, Bitcoin’s core developers
    steadfastly refused to compromise. They didn’t think the SegWit2x plan would succeed.


    On August 18, 2017, Bitcoin Core announced a statement not to support the SegWit2x
    proposal.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig8_HTML.png)


    A text depicts correcting misinformation on segwit 2 x and b t c 1 and includes
    about, download, blog, releases, development, and contact.


    Figure 3-8


    SegWit2x statement from Bitcoin Core [https://​bitcoincore.​org/​en/​2017/​08/​18/​btc1-misleading-statements/​](https://bitcoincore.org/en/2017/08/18/btc1-misleading-statements/)


    On November 8, 2017, BitGo CEO Mike Belshe sent an email signed by major companies
    originally supporting it. The statement meant a canceled SegWit2x hard fork, and
    NYA collapsed. At the time of the statement announcement, Bitcoin’s price surged
    by 20% or more to reflect users and investors fleeing.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig9_HTML.png)


