    \ have more features, challenges, and modes than their free player. For example,\
    \ most online gambling games are P2P models, which require online casino players’\
    \ registration and real-money deposit before accessing them. P2P is also commonly\
    \ used in classic MMORPGs (massively multiplayer online role-playing games) such\
    \ as World of Warcraft and Everquest.\n\nPay-to-play requires the player to continue\
    \ paying the game company a monthly or annual subscription fee to access various\
    \ in-game items. If the fee is not paid, the player’s account will be suspended,\
    \ and they cannot access nor use the game. Also, the subscription is quite expensive.\
    \ In many cases, free-to-play business models may be an option when players just\
    \ want to play games occasionally.\n\n#### Free-to-play\n\nThe first free-to-play\
    \ video game was Nexon’s QuizQuiz released in October 1999 and developed by Lee\
    \ Seungchan. The free-to-play game business model was created by Nexon in South\
    \ Korea.\n\nFree-to-play, also known as free-to-start, F2P, or FtP, refers to\
    \ online video games that give players access to the game to play and enjoy a\
    \ major part of the content without paying. However, there are always additional\
    \ game features, such as premium parts of the stories, unique abilities, special\
    \ game items, and new characters. These features typically encourage players to\
    \ pay microtransactions to get access.\n\nThe popular free-to-play games are Apex\
    \ Legends, League of Legends, Hearthstone, Eve Online, and Fortnite Battle Royale.\n\
    \nFree-to-play has been a great commercial success and is very popular in current\
    \ game design. Many online games follow this model .\n\nTraditional video game\
    \ companies build games on centralized servers in today’s video game industry.\
    \ They fully control player accounts and game data. Platform administrators can\
    \ remove a player’s game item or suspend players’ accounts. So even if players\
    \ play games and pay fees for years, they don’t really own the value of items\
    \ or in-game currency.\n\nThe above issues are being solved with the advent of\
    \ blockchain technologies. Crypto games take advantage of the innovations in Web\
    \ 3.0, which brings cryptocurrencies and NFTs into video games and creates a new\
    \ business model—Play-to-Earn.\n\n#### Play-to-Earn\n\nThe play-to-earn are decentralized\
    \ games that allow players to farm or collect game and NFTs tokens. Then, the\
    \ players can sell them on the market to earn rewards. By completing game tasks,\
    \ combating other players, and playing the game regularly, players can earn more\
    \ cryptocurrency to trade and transfer their assets in crypto exchange for fiat\
    \ currency as income.\n\nPlay-to-earn games take advantage of the innovations\
    \ in the blockchain, which brings cryptocurrencies and NFTs into the world of\
    \ video games. In crypto games, there are three main ways to let players earn\
    \ income through gameplay.\n\n##### Earning or Trading In-game NFTs\n\nIn the\
    \ game, NFTs represent a unique virtual collectible in-game asset. They can come\
    \ in all sorts of different forms, such as weapons, characters, skins, pets, food,\
    \ tools, and virtual land, to be used as part of the game. Once players have collected\
    \ them, they can be exchanged for other assets within the game or sold for actual\
    \ money on a real-world NFT marketplace. Players create value for the entire game\
    \ system by participating in the in-game economy. For example, in one of the most\
    \ popular blockchain games, Axie Infinity, there are creatures called Axis. Axis\
    \ is a fictional, fierce creature that loves to battle, build, and hunt for treasure.\
    \ The player can collect, trade, and raise Axis and use it to battle, other players\
    \ and enemies. The Axie as a game asset is defined as ERC-721 NFT tokens. Players\
    \ can buy and sell their Axie NFTs in the marketplace ( [`https://app.axieinfinity.com/marketplace/`](https://app.axieinfinity.com/marketplace/)\
    \ ).\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig8_HTML.png)\n\nA screenshot\
    \ depicts the axie infinity marketplace. The labeled process is an overview, marketplace,\
    \ collections of axies, lands, items, bundles, runes, charms, recently listed,\
    \ and recently sold with some illustration.\n\nFigure 7-8\n\nAxie Infinity marketplace\n\
    \n##### Earning In-game Cryptocurrency\n\n1.  **Native Cryptocurrency**\n\n  \
    \  Most crypto games have native cryptocurrency in the form of game tokens created\
    \ by smart contracts. For example, in Axie Infinity, there are two native cryptocurrencies—Smooth\
    \ Love Potion (SLP) and Axie Infinity Shards (AXS) .\n\n    **SLP**\n\n    SLP\
    \ is an ERC-20 token used to breed Axie. Players can earn SLP in-game currency\
    \ through the Arena Mode in Axie Infinity when they complete daily quests or battle\
    \ monsters and other players.\n\n    **AXS**\n\n    AXS is an ERC-20 governance\
    \ token for the Axie Infinity ecosystem. AXS token is intended to reward players\
    \ for participating in the Axie Infinity Metaverse. The top-ranking players will\
    \ be awarded after each season. SLPs and AXS can be converted to real-life currency.\
    \ One SLP is 0.000277 AXS, or $0.0034 and can be purchased and sold in many crypto\
    \ exchanges (i.e., Uniswap). SLP has been well known as part of the play-to-earn\
    \ trend, letting players earn relatively stable earnings just by playing Axie\
    \ Infinity.\n\n2.  **Existing Cryptocurrency**\n\n    Some crypto games use existing\
    \ cryptocurrencies, such as Bitcoin, Ethereum, etc., as a reward to players. CryptoKitties\
    \ is an example of using ether to buy and sell kitties in the CryptoKitties market.\n\
    \n![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig9_HTML.png)\n\nFour crypokitties\
    \ images depict the market N F T s. The labeled crypto is diamond, gilded, amethyst,\
    \ and lapis.\n\nFigure 7-9\n\nCryptoKitties market\n\nIt typically takes a while\
    \ to accumulate a significant amount for existing cryptocurrencies like ether,\
    \ but these others are real."
  trans: "\n# 元宇宙中的加密 NFT 游戏\n\n电子游戏自 20 世纪 50 年代初就已存在，最初诞生于科学家的研究实验室。如今，电子游戏已遍布全球各地的家庭。得益于年轻人口的持续增长、经济发展、移动设备用户增多以及高速互联网的普及，电子游戏行业在过去几年里蓬勃发展。据估计，2022\
    \ 年电子游戏收入将达到 2086 亿美元，到 2026 年市值将达 3210 亿美元。\n\n2022 年 2 月，微软首席执行官萨提亚·纳德拉接受《金融时报》采访，阐述了他对元宇宙的理解——“什么是元宇宙？元宇宙本质上就是创造游戏。”正如我们在上一节所讨论的，元宇宙的核心是在数字宇宙中创造虚拟体验。然而，游戏行业长期以来一直在运用类似的虚拟世界理念。玩家在多人在线游戏平台上玩\
    \ 3D 游戏时，能够获得接近真实的体验。玩家的游戏数据在游戏平台上是持续保存的，玩家登录后会从上次退出的地方继续游戏。这更接近元宇宙的持久性特征。\n\n\
    ## 游戏行业的商业模式\n\n电子游戏商业模式是指游戏创作者用来为其应用获取收入的盈利策略。引入区块链、人工智能（AI）和虚拟现实（VR）等新技术，已成为推动游戏行业商业模式演变的主要趋势。\n\
    \n### 付费游玩模式\n\n1972 年，首款面向消费者的电子视频游戏《乓》（Pong）问世。1978 年，《太空侵略者》（Space Invaders）宣告了街机黄金时代的开始。在\
    \ 20 世纪 70 年代和 80 年代，每款电子游戏都以街机形式构建，需要占用大量物理空间。玩家需要投币来换取游戏时间或生命值。这就是“付费游玩”商业模式。\n\
    \n`付费游玩`（`pay-to-play`），有时也称为`付钱游玩`（`pay-for-play`）或`P2P`，指的是玩家必须付费才能游玩的在线游戏。`P2P`游戏是标准的商业游戏模式，通常比免费游戏拥有更多功能、挑战和模式。例如，大多数在线赌博游戏都采用`P2P`模式，要求在线赌场玩家注册并存入真实货币后才能访问。`P2P`也常用于经典的`MMORPG`（大型多人在线角色扮演游戏），如《魔兽世界》和《无尽的任务》。\n\
    \n`付费游玩`模式要求玩家持续向游戏公司支付月费或年费，才能访问各种游戏内物品。如果未支付费用，玩家的账户将被暂停，无法访问或使用游戏。此外，订阅费用相当昂贵。在许多情况下，当玩家只是偶尔想玩游戏时，`免费游玩`（`free-to-play`）商业模式可能是一种选择。\n\
    \n### 免费游玩模式\n\n第一款`免费游玩`电子游戏是 Nexon 公司于 1999 年 10 月发布、由李承灿开发的《QuizQuiz》。`免费游玩`游戏商业模式由韩国的\
    \ Nexon 公司创造。\n\n`免费游玩`（`free-to-play`），也称为`免费启动`（`free-to-start`）、`F2P`或`FtP`，指的是让玩家无需付费即可访问游戏并享受大部分内容的在线电子游戏。然而，游戏中通常还存在额外的功能，例如故事的高级部分、独特能力、特殊游戏物品和新角色。这些功能通常会鼓励玩家通过小额付费来获取访问权限。\n\
    \n流行的`免费游玩`游戏包括《Apex 英雄》、《英雄联盟》、《炉石传说》、《星战前夜》和《堡垒之夜》。\n\n`免费游玩`模式在商业上取得了巨大成功，并且在当前的游戏设计中非常流行。许多网络游戏都采用了这种模式。\n\
    \n在当今的电子游戏行业中，传统电子游戏公司在中心化服务器上构建游戏。他们完全控制玩家账户和游戏数据。平台管理员可以移除玩家的游戏物品或暂停玩家的账户。因此，即使玩家玩了好几年游戏并支付了费用，他们实际上并不拥有游戏物品或游戏内货币的价值。\n\
    \n上述问题正随着区块链技术的出现而得到解决。加密游戏利用了 Web 3.0 的创新，将加密货币和`NFT`引入电子游戏，并创造了一种新的商业模式——`边玩边赚`。\n\
    \n### 边玩边赚模式\n\n`边玩边赚`（`play-to-earn`）是一种去中心化游戏，允许玩家收集或培育游戏代币和`NFT`。然后，玩家可以在市场上出售它们以赚取奖励。通过完成游戏任务、与其他玩家对战以及定期玩游戏，玩家可以赚取更多加密货币，并在加密货币交易所交易和转移其资产，兑换成法定货币作为收入。\n\
    \n`边玩边赚`游戏利用了区块链的创新，将加密货币和`NFT`带入了电子游戏世界。在加密游戏中，主要有三种方式让玩家通过游戏获得收入。\n\n#### 赚取或交易游戏内\
    \ NFT\n\n在游戏中，`NFT`代表独特的虚拟收藏品，属于游戏内资产。它们可以有各种不同的形式，例如武器、角色、皮肤、宠物、食物、工具和虚拟土地，作为游戏的一部分使用。玩家一旦收集到它们，就可以在游戏内与其他资产进行交换，或者在现实世界的\
    \ NFT 市场上出售以换取真实货币。玩家通过参与游戏内经济，为整个游戏系统创造价值。例如，在最热门的区块链游戏之一《Axie Infinity》中，存在着一种名为\
    \ Axie 的生物。Axie 是一种虚构的、凶猛好斗、喜欢建造和寻宝的生物。玩家可以收集、交易和培育 Axie，并利用它与其他玩家和敌人战斗。作为游戏资产的\
    \ Axie 被定义为`ERC-721` NFT 代币。玩家可以在市场（`https://app.axieinfinity.com/marketplace/`）上买卖他们的\
    \ Axie `NFT`。\n\n![](img/535492_1_En_7_Fig8_HTML.png)\n\n一张截图展示了 Axie Infinity\
    \ 市场。标记的流程包括概览、市场、Axie 藏品、土地、物品、捆绑包、符文、魅力、最近上架和最近售出，并附有部分插图。\n\n**图 7-8** Axie\
    \ Infinity 市场\n\n#### 赚取游戏内加密货币\n\n1.  **原生加密货币**\n\n    大多数加密游戏都拥有原生加密货币，其形式为由智能合约创建的游戏代币。例如，在《Axie\
    \ Infinity》中，有两种原生加密货币——平滑爱情药水（SLP）和 Axie Infinity 碎片（AXS）。\n\n    **SLP**\n\n\
    \    `SLP`是一种用于培育 Axie 的`ERC-20`代币。当玩家在《Axie Infinity》的竞技场模式中完成每日任务或与怪物及其他玩家战斗时，可以赚取游戏内货币`SLP`。\n\
    \n    **AXS**\n\n    `AXS`是 Axie Infinity 生态系统的`ERC-20`治理代币。`AXS`代币旨在奖励参与 Axie\
    \ Infinity 元宇宙的玩家。每个赛季结束后，排名靠前的玩家将获得奖励。`SLP`和`AXS`可以兑换成现实生活中的货币。一个`SLP`价值`0.000277\
    \ AXS`，即`$0.0034`，可以在许多加密货币交易所（如 Uniswap）买卖。`SLP`作为`边玩边赚`趋势的一部分而广为人知，它让玩家仅通过玩《Axie\
    \ Infinity》就能获得相对稳定的收益。\n\n2.  **现有加密货币**\n\n    一些加密游戏使用现有的加密货币（如比特币、以太坊等）作为对玩家的奖励。《加密猫》（CryptoKitties）就是一个例子，玩家在《加密猫》市场中使用以太币买卖猫咪。\n\
    \n![](img/535492_1_En_7_Fig9_HTML.png)\n\n四张加密猫图片展示了市场中的 NFT。标记的加密猫分别为钻石、镀金、紫水晶和青金石。\n\
    \n**图 7-9** 《加密猫》市场\n\n要积累足够数量的现有加密货币（如以太币）通常需要一段时间，但这些收益是真实的。\n"
- fmt: "#### Staking\n\nMany play-to-earn games allow players to lock up NFTs or cryptocurrency\
    \ tokens in-game to earn rewards. For instance, `Axie Infinity` allows landowners\
    \ to stake their land and earn the `Axie` token, `AXS`, as a reward. Players can\
    \ stake 30 land plots in one transaction and get `AXS` rewards per day based on\
    \ the rarity level of the staked land.\n\nFigure [7-10](#535492_1_En_7_Chapter.xhtml#Fig10)\
    \ shows the game industry’s evolution in the business model.\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig10_HTML.png)\n\
    \nA schematic depicts the game company's evolution by pay-to-play, free-to-play,\
    \ and play-to-earn.\n\nFigure 7-10 Game industry’s evolution in the business model\n\
    \n### Example of Play-to-Earn NFT Games\n\n#### The Sandbox\n\n`The Sandbox` is\
    \ a community-driven Metaverse platform where creators can build, own, and monetize\
    \ voxel assets as NFT. The gaming experience uses `SAND` Token on the Ethereum\
    \ blockchain. `The Sandbox` project was initially developed by `Pixowl` (later,\
    \ `TSB Gaming`) in 2012 on mobile platforms, with 40 million downloads across\
    \ iOS and Android. `The Sandbox` has more than two million registered users and\
    \ comprises three products: `VoxEdit`, `Marketplace`, and `Game Maker`.\n\n#####\
    \ VoxEdit\n\n`VoxEdit` is a cloud-based NFT creation software. It allows users\
    \ to create rig and animate 3D voxel-based NFTs products in the Metaverse, such\
    \ as people, animals, furniture, and tools, among other items. These NFTs’ digital\
    \ assets use the `ERC-1155` token standard, enabling the efficient transfer of\
    \ fungible and nonfungible tokens in a single transaction. Furthermore, a player\
    \ can sell these NFTs on `The Sandbox`'s marketplace and discover a new world.\n\
    \n##### Game Maker\n\n`Game Maker` is the toolbox that allows users to design,\
    \ test, and build 3D games for free, and no coding is required. With `Game Maker`,\
    \ users just need their imagination for their creations.\n\n##### Marketplace\n\
    \n`The Sandbox`'s NFT marketplace allows users to search and buy the creator’s\
    \ NFT assets made with `VoxEdit`. The creator can first upload the digital assets\
    \ into an `IPFS` (The InterPlanetary File System) network, which is decentralized\
    \ storage. Then associated assets with a smart contract and deployed onto the\
    \ blockchain to prove ownership. Once this is accomplished, this NFT asset for\
    \ creation can be found in `The Sandbox` marketplace.\n\nTo build an enclosed\
    \ economic system among players, all players will depend on four user-specific\
    \ tokens—`SAND`, `ASSET`, `LAND`, and `GAME`. Users will use these tokens to interact\
    \ with the platform: players, creators, curators, and landowners. The remaining\
    \ two tokens are `GEMs` and `CATALYSTs`, saved for use with `VoxEdit` when creating\
    \ assets. Figure [7-11](#535492_1_En_7_Chapter.xhtml#Fig11) shows these six tokens\
    \ in the sandbox games.\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig11_HTML.png)\n\
    \nSix token images depict the NFTs gameplay-to-earn. The labeled 6 tokens are\
    \ `SAND` of `ERC 20`, `LAND` of `ERC 721`, an `ASSET` of `ERC 1155`, the `GAME`\
    \ of `ERC 1155`, `GEMs` of `ERC 20`, and `CATALYST` of `ERC 20`.\n\nFigure 7-11\
    \ Six tokens in the sandbox game\n\n##### SAND\n\n`SAND` is an `ERC-20` utility\
    \ token built on the Ethereum blockchain and powers all of `The Sandbox`'s transactions\
    \ and interactions. `SAND` Token is `The Sandbox`'s native token.\n\n- **Access\
    \ the Sandbox platform** – Players spend `SAND` in order to play games, buy equipment,\
    \ or create their Avatar character.\n- **Governance** – `SAND` is a governance\
    \ token that allows token holders to vote in Governance decisions on the platform\
    \ using a DAO structure.\n- **Staking** – `The Sandbox` will allow landowners\
    \ to stake `SAND` on their `LANDs`, and Staking will be returned to users along\
    \ with yields paid out in `SAND`.\n\n##### LAND\n\nIn `The Sandbox` Metaverse,\
    \ a `LAND` token is the `ERC-721` standard and is an NFTs token. A `LAND` represents\
    \ a digital plot of land, and each `LAND` comprises 96 x 96 meters in `The Sandbox`\
    \ Metaverse. There’s a total of 166,464 Lands with different dimensions. `LAND`\
    \ token holders have ownership rights to a specific space on the platform and\
    \ allow the landowner to rent, buy, sell, stake, host, and form districts. With\
    \ a `LAND` token, the user can participate in the governance of the ecosystem\
    \ via DAO.\n\n##### ASSET\n\nThe `ASSET` token is the `ERC-1155` token representing\
    \ in-game items such as equipment for avatars and creations to populate `LAND`.\
    \ The assets can be traded in `The Sandbox`'s marketplace. An asset has three\
    \ different categories:\n\n- **Entity**  \n  These NFTs refer to an experience\
    \ with nonplayable characters (NPCs), which will bring a game or world to life,\
    \ such as a farmer, tree, chicken, dragon, or treasure hunter.\n\n- **Equipment**\
    \  \n  Equipment is an NFT that can be attached to the player’s inventory and\
    \ help the player to complete the game experience. For example, a sword, an epic\
    \ Viking axe, a shield, a helmet, and so on.\n\n- **Block**  \n  In addition to\
    \ the existing basic blocks, such as water, mud, and sand, players can create\
    \ new blocks. These blocks can bring unique experiences, for example, colorful\
    \ water and cute sparkly lava.\n\n##### GAME\n\nA `GAME` token is `ERC-1155` token,\
    \ combining assets and game programming to create an interactive experience. The\
    \ `GAME` token must be paired with a `LAND` token.\n\n##### CATALYSTs\n\n`Catalysts`\
    \ are `ERC-20` tokens. `Catalysts` have four empty sockets, which can be filled\
    \ with Gems to make a player more powerful.\n\n##### GEMs\n\n`GEMS` are the `ERC-20`\
    \ that defines player asset attributes. Depending on play’s need, every Gem has\
    \ a different function that can be applied to an asset and increase `The Sandbox`'s\
    \ game experiences throughout the Metaverse.\n\n#### Decentraland\n\n`Decentraland`\
    \ is a play-to-earn 3D virtual world Metaverse game running on the Ethereum network.\
    \ Using the native `MANA` cryptocurrency, users can create avatars and purchase\
    \ digital assets, such as parcels of virtual land, called \"`LAND`.\" The user\
    \ will receive the NFT `LAND` token after they buy these spaces. We will discuss\
    \ more detail in the next section.\n\n## Virtual Real Estate in the Metaverse\n\
    \nIn real life, a house is a place in which we live. When people buy a house,\
    \ the seller will sign a deed, which is a legal document used to prove ownership\
    \ of the land we own. The Metaverse is the future of the Internet and is about\
    \ the immersive experience in the virtual reality world. In the Metaverse, we\
    \ issue an NFT as representative of digital asset ownership and keep track of\
    \ ownership records in the blockchain NFT, as proof of ownership is verifiable\
    \ within Metaverse.\n\n### What Is Virtual Land?\n\nVirtual lands are NFT-ownable\
    \ digital spaces or land plots, similar to physical real estate. The virtual lands\
    \ platform creates large maps of land that is divided into small parcels to sell\
    \ on the market. Virtual plots of land are smart contract programmable spaces\
    \ that allow people to buy, sell, rent, construct, and explore in a virtual world.\
    \ Owning virtual land is similar to owning physical real estate, where the owner\
    \ can either keep the NFT or sell it directly to a buyer at an agreed-upon price\
    \ in marketplaces. Buyers can directly pay with cryptocurrency or use a mortgage\
    \ to purchase land. The virtual landowner will keep the assets in their wallet\
    \ and then either sell the property or design and build on the land. Popular NFT\
    \ virtual land projects include `Decentraland`, `The Sandbox`, and `Axie Infinity`.\n\
    \n### Decentraland (A Case Study)\n\n`Decentraland` is a decentralized, virtual\
    \ reality Metaverse platform powered by the Ethereum blockchain. The platform\
    \ enables users to create, buy, and sell virtual content and digital real estate.\
    \ Land parcels are NFTs based on digital assets. You can do whatever you like\
    \ with your `LAND` once you’ve owned it. Each plot of land can only be 33 feet\
    \ by 33 feet in size with unlimited height. This plot allows users to organize\
    \ their `LAND` more efficiently by merging adjacent parcels."
  raw: '#### Staking


    Many play-to-earn games allow players to lock up NFTs or cryptocurrency tokens
    in-game to earn rewards . For instance, Axie Infinity allows landowners to stake
    their land and earn the Axie token, AXS, as a reward. Players can stake 30 land
    plots in one transaction and get AXS rewards per day based on the rarity level
    of the staked land.


    Figure [7-10](#535492_1_En_7_Chapter.xhtml#Fig10) shows the game industry’s evolution
    in the business model.


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig10_HTML.png)


    A schematic depicts the game company''s evolution by pay-to-play, free-to-play,
    and play-to-earn.


    Figure 7-10


    Game industry’s evolution in the business model


    ### Example of Play-to-Earn NFT Games


    #### The Sandbox


    The Sandbox is a community-driven Metaverse platform where creators can build,
    own, and monetize voxel assets as NFT. The gaming experience uses SAND Token on
    the Ethereum blockchain. The Sandbox project was initially developed by Pixowl
    (later, TSB Gaming) in 2012 on mobile platforms, with 40 million downloads across
    iOS and Android. The Sandbox has more than two million registered users and comprises
    three products: VoxEdit, Marketplace, and Game Maker.


    ##### VoxEdit


    VoxEdit is a cloud-based NFT creation software. It allows users to create rig
    and animate 3D voxel-based NFTs products in the Metaverse, such as people, animals,
    furniture, and tools, among other items. These NFTs’ digital assets use the ERC-1155
    token standard, enabling the efficient transfer of fungible and nonfungible tokens
    in a single transaction. Furthermore, a player can sell these NFTs on the Sandbox’s
    marketplace and discover a new world .


    ##### Game Maker


    Game Maker is the toolbox that allows users to design, test, and build 3D games
    for free, and no coding is required. With Game Maker, users just need their imagination
    for their creations.


    ##### Marketplace


    The Sandbox’s NFT marketplace allows users to search and buy the creator’s NFT
    assets made with VoxEdit . The creator can first upload the digital assets into
    an IPFS (The InterPlanetary File System) network, which is decentralized storage.
    Then associated assets with a smart contract and deployed onto the blockchain
    to prove ownership. Once this is accomplished, this NFT asset for creation can
    be found in the Sandbox marketplace.


    To build an enclosed economic system among players, all players will depend on
    four user-specific tokens—SAND, ASSET, LAND, and GAME. Users will use these tokens
    to interact with the platform: players, creators, curators, and landowners. The
    remaining two tokens are GEMs and CATALYSTs, saved for use with VoxEdit when creating
    assets. Figure [7-11](#535492_1_En_7_Chapter.xhtml#Fig11) shows these six tokens
    in the sandbox games.


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig11_HTML.png)


    Six token images depict the N F T s gameplay-to-earn. The labeled 6 tokens are
    sand of E R C 20, land of E R C 721, an asset of E R C 1155, the game of E R C
    1155, G E Ms of E R C 20, and catalyst of E R C 20.


    Figure 7-11


    Six tokens in the sandbox game


    ##### SAND


    SAND is an ERC-20 utility token built on the Ethereum blockchain and powers all
    of the Sandbox’s transactions and interactions. SAND Token is Sandbox’s native
    token.


    **Access the Sandbox platform** – Players spend SAND in order to play games, buy
    equipment, or create their Avatar character.


    **Governance** – SAND is a governance token that allows token holders to vote
    in Governance decisions on the platform using a DAO structure.


    **Staking** – The Sandbox will allow landowners to stake SAND on their LANDs,
    and Staking will be returned to users along with yields paid out in SAND.


    ##### LAND


    In the Sandbox Metaverse, a LAND token is the ERC-721 standard and is an NFTs
    token. A LAND represents a digital plot of land, and each LAND comprises 96 x
    96 meters in the Sandbox Metaverse. There’s a total of 166,464 Lands with different
    dimensions. LAND token holders have ownership rights to a specific space on the
    platform and allow the landowner to rent, buy, sell, stake, host, and form districts.
    With a LAND token, the user can participate in the governance of the ecosystem
    via DAO.


    ##### ASSET


    The ASSET token is the ERC-1155 token representing in-game items such as equipment
    for avatars and creations to populate LAND. The assets can be traded in The Sandbox’s
    marketplace. An asset has three different categories:


    *   **Entity**


    These NFTs refer to an experience with nonplayable characters (NPCs) , which will
    bring a game or world to life, such as a farmer, tree, chicken, dragon, or treasure
    hunter.


    *   **Equipment**


    Equipment is an NFT that can be attached to the player’s inventory and help the
    player to complete the game experience. For example, a sword, an epic Viking axe,
    a shield, a helmet, and so on.


    *   **Block**


    In addition to the existing basic blocks, such as water, mud, and sand, players
    can create new blocks. These blocks can bring unique experiences, for example,
    colorful water and cute sparkly lava.


    ##### GAME


    A GAME token is ERC-1155 token, combining assets and game programming to create
    an interactive experience. The GAME token must be paired with a LAND token.


    ##### CATALYSTs


    Catalysts are ERC-20 tokens. Catalysts have four empty sockets, which can be filled
    with Gems to make a player more powerful.


    ##### GEMs


    GEMS are the ERC-20 that defines player asset attributes. Depending on play’s
    need, every Gem has a different function that can be applied to an asset and increase
    the Sandbox’s game experiences throughout the Metaverse.


    #### Decentraland


    Decentraland is a play-to-earn 3D virtual world Metaverse game running on the
    Ethereum network. Using the native MANA cryptocurrency, users can create avatars
    and purchase digital assets, such as parcels of virtual land, called “LAND.” The
    user will receive the NFT LAND token after they buy these spaces. We will discuss
    more detail in the next section.


    ## Virtual Real Estate in the Metaverse


    In real life, a house is a place in which we live. When people buy a house, the
    seller will sign a deed, which is a legal document used to prove ownership of
    the land we own. The Metaverse is the future of the Internet and is about the
    immersive experience in the virtual reality world. In the Metaverse, we issue
    an NFT as representative of digital asset ownership and keep track of ownership
    records in the blockchain NFT, as proof of ownership is verifiable within Metaverse.


    ### What Is Virtual Land?


    Virtual lands are NFT-ownable digital spaces or land plots, similar to physical
    real estate. The virtual lands platform creates large maps of land that is divided
    into small parcels to sell on the market. Virtual plots of land are smart contract
    programmable spaces that allow people to buy, sell, rent, construct, and explore
    in a virtual world. Owning virtual land is similar to owning physical real estate,
    where the owner can either keep the NFT or sell it directly to a buyer at an agreed-upon
    price in marketplaces. Buyers can directly pay with cryptocurrency or use a mortgage
    to purchase land. The virtual landowner will keep the assets in their wallet and
    then either sell the property or design and build on the land. Popular NFT virtual
    land projects include Decentraland, the Sandbox, and Axie Infinity.


    ### Decentraland (A Case Study)


    Decentraland is a decentralized, virtual reality Metaverse platform powered by
    the Ethereum blockchain. The platform enables users to create, buy, and sell virtual
    content and digital real estate. Land parcels are NFTs based on digital assets.
    You can do whatever you like with your LAND once you’ve owned it. Each plot of
    land can only be 33 feet by 33 feet in size with unlimited height. This plot allows
    users to organize their LAND more efficiently by merging adjacent parcels.'
  trans: "\n#### 质押（Staking）\n\n许多“边玩边赚”游戏允许玩家在游戏中锁定 NFT 或加密货币代币以赚取奖励。例如，`Axie Infinity`允许土地所有者质押其土地来赚取`Axie`代币`AXS`作为奖励。玩家可以在单笔交易中质押\
    \ 30 个土地地块，并根据所质押土地的稀有程度每天获得`AXS`奖励。\n\n图 7-10 展示了游戏行业在商业模式上的演变。\n\n![](img/535492_1_En_7_Fig10_HTML.png)\n\
    \n示意图描绘了游戏公司通过付费游玩、免费游玩和边玩边赚模式的演变过程。\n\n**图 7-10** 游戏行业商业模式的演变\n\n### “边玩边赚” NFT\
    \ 游戏示例\n\n#### The Sandbox\n\n`The Sandbox` 是一个社区驱动的元宇宙平台，创作者可以在其中构建、拥有并将其体素资产作为\
    \ NFT 进行货币化。该游戏体验使用以太坊区块链上的 `SAND` 代币。`The Sandbox` 项目最初由 `Pixowl`（后更名为 `TSB Gaming`）于\
    \ 2012 年在移动平台上开发，在 iOS 和 Android 上的下载量达 4000 万次。`The Sandbox` 拥有超过 200 万注册用户，由三个产品组成：`VoxEdit`、`Marketplace`\
    \ 和 `Game Maker`。\n\n##### VoxEdit\n\n`VoxEdit` 是一款基于云的 NFT 创作软件。它允许用户在元宇宙中创建、装配和制作基于\
    \ 3D 体素的 NFT 产品动画，例如人物、动物、家具和工具等物品。这些 NFT 的数字资产使用 `ERC-1155` 代币标准，能够在单次交易中高效传输同质化与非同质化代币。此外，玩家可以在\
    \ `The Sandbox` 的市场上出售这些 NFT，并探索新世界。\n\n##### Game Maker\n\n`Game Maker` 是一个工具箱，允许用户免费设计、测试和构建\
    \ 3D 游戏，且无需编写代码。使用 `Game Maker`，用户只需发挥想象力即可进行创作。\n\n##### Marketplace\n\n`The\
    \ Sandbox` 的 NFT 市场允许用户搜索和购买创作者使用 `VoxEdit` 制作的 NFT 资产。创作者可以首先将数字资产上传到 `IPFS`（星际文件系统）网络（一种去中心化存储），然后将相关资产与智能合约关联，并部署到区块链上以证明所有权。完成此步骤后，用于创作的\
    \ NFT 资产便可在 `The Sandbox` 市场中找到。\n\n为了在玩家之间建立一个封闭的经济系统，所有玩家将依赖于四种用户特定代币：`SAND`、`ASSET`、`LAND`\
    \ 和 `GAME`。用户将使用这些代币与平台互动：他们可能是玩家、创作者、策展人或土地所有者。另外两种代币是 `GEMs` 和 `CATALYSTs`，留作在\
    \ `VoxEdit` 中创建资产时使用。图 7-11 展示了沙盒游戏中的这六种代币。\n\n![](img/535492_1_En_7_Fig11_HTML.png)\n\
    \n六种代币图像描绘了 NFT 的“边玩游戏边赚钱”。标注的六种代币分别是 `ERC 20` 标准的 `SAND`、`ERC 721` 标准的 `LAND`、`ERC\
    \ 1155` 标准的 `ASSET`、`ERC 1155` 标准的 `GAME`、`ERC 20` 标准的 `GEMs` 以及 `ERC 20` 标准的\
    \ `CATALYST`。\n\n**图 7-11** 沙盒游戏中的六种代币\n\n##### SAND\n\n`SAND` 是一种基于以太坊区块链构建的\
    \ `ERC-20` 实用代币，为 `The Sandbox` 的所有交易和交互提供动力。`SAND` 代币是 `The Sandbox` 的原生代币。\n\
    \n-   **访问 Sandbox 平台** – 玩家花费 `SAND` 来玩游戏、购买装备或创建自己的虚拟化身角色。\n-   **治理** – `SAND`\
    \ 是一种治理代币，允许代币持有者使用 DAO 结构在平台上对治理决策进行投票。\n-   **质押** – `The Sandbox` 将允许土地所有者在其\
    \ `LAND` 上质押 `SAND`，质押收益将连同以 `SAND` 形式支付的收益一起返还给用户。\n\n##### LAND\n\n在 `The Sandbox`\
    \ 元宇宙中，`LAND` 代币是 `ERC-721` 标准，是一种 NFT 代币。`LAND` 代表一个数字土地地块，每个 `LAND` 在 `The Sandbox`\
    \ 元宇宙中占地 96 x 96 米。总共有 166,464 块不同尺寸的土地。`LAND` 代币持有者对平台上的特定空间拥有所有权，并允许土地所有者出租、购买、出售、质押、托管以及组成区域。拥有\
    \ `LAND` 代币，用户可以通过 DAO 参与生态系统的治理。\n\n##### ASSET\n\n`ASSET` 代币是 `ERC-1155` 代币，代表游戏内物品，例如用于填充\
    \ `LAND` 的化身装备和创作物。这些资产可以在 `The Sandbox` 的市场中交易。一个资产有三种不同的类别：\n\n-   **实体**  \n\
    \    这些 NFT 指的是包含非玩家角色（NPC）的体验，用来让游戏或世界变得生动，例如农夫、树木、鸡、龙或宝藏猎人。\n\n-   **装备**  \n\
    \    装备是一种可以附加到玩家物品栏并帮助玩家完成游戏体验的 NFT。例如，一把剑、一把史诗级维京斧、一面盾牌、一顶头盔等等。\n\n-   **方块**\
    \  \n    除了现有的基础方块（如水、泥土和沙子）之外，玩家可以创建新的方块。这些方块可以带来独特的体验，例如彩色水和可爱的闪亮熔岩。\n\n#####\
    \ GAME\n\n`GAME` 代币是 `ERC-1155` 代币，它结合了资产和游戏编程以创造交互式体验。`GAME` 代币必须与 `LAND` 代币配对使用。\n\
    \n##### CATALYSTs\n\n`Catalysts` 是 `ERC-20` 代币。`Catalysts` 有四个空槽位，可以用宝石填充，以使玩家更强大。\n\
    \n##### GEMs\n\n`GEMS` 是 `ERC-20` 代币，用于定义玩家资产的属性。根据游戏需求，每颗宝石都有不同的功能，可以应用于资产，并增强整个元宇宙中的\
    \ `The Sandbox` 游戏体验。\n\n#### Decentraland\n\n`Decentraland` 是一个在以太坊网络上运行的“边玩边赚”3D\
    \ 虚拟世界元宇宙游戏。使用原生 `MANA` 加密货币，用户可以创建化身并购买数字资产，例如虚拟土地地块，称为“`LAND`”。用户在购买这些空间后将收到\
    \ NFT `LAND` 代币。我们将在下一节中详细讨论。\n\n## 元宇宙中的虚拟房地产\n\n在现实生活中，房子是我们居住的地方。当人们购买房屋时，卖方会签署一份地契，这是一份用于证明我们拥有土地所有权的法律文件。元宇宙是互联网的未来，关乎虚拟现实世界中的沉浸式体验。在元宇宙中，我们发行\
    \ NFT 作为数字资产所有权的代表，并在区块链 NFT 中跟踪所有权记录，因为所有权证明在元宇宙内是可验证的。\n\n### 什么是虚拟土地？\n\n虚拟土地是\
    \ NFT 拥有的数字空间或土地地块，类似于物理房地产。虚拟土地平台创建大型土地地图，将其划分为小块，在市场上出售。虚拟土地地块是可编程的智能合约空间，允许人们在虚拟世界中购买、出售、出租、建造和探索。拥有虚拟土地类似于拥有物理房地产，所有者可以保留\
    \ NFT，也可以直接在市场上以约定价格将其出售给买家。买家可以直接使用加密货币支付，或通过抵押贷款购买土地。虚拟土地所有者将资产保留在自己的钱包中，然后出售房产，或在该土地上进行设计和建造。热门的\
    \ NFT 虚拟土地项目包括 `Decentraland`、`The Sandbox` 和 `Axie Infinity`。\n\n### Decentraland（案例研究）\n\
    \n`Decentraland` 是一个由以太坊区块链驱动的去中心化虚拟现实元宇宙平台。该平台使用户能够创建、购买和出售虚拟内容及数字房地产。土地地块是基于数字资产的\
    \ NFT。一旦你拥有了你的 `LAND`，你就可以随心所欲地处理它。每块土地的尺寸仅为 33 英尺 x 33 英尺，高度不限。这种地块设计允许用户通过合并相邻地块来更有效地组织他们的\
    \ `LAND`。\n"
- fmt: "# Three Native Tokens in Decentraland\n\nIn Decentraland, there are three\
    \ native tokens, two ERC-721 NFT tokens, and one ERC-20 token.\n\nThe parcels\
    \ of digital land where a user interacts and creates are called `LAND`, an NFT\
    \ token. Parcels are 1x1 land plots. There are a total of 90,601 parcels of land\
    \ in Decentraland. The second NFT token is `ESTATE`, allowing the user to merge\
    \ two or more adjacent parcels of `LAND` through the Marketplace. Estates are\
    \ very useful for managing larger `LAND` holdings.\n\nOn the other hand, `MANA`\
    \ is an ERC-20 token that is the official native cryptocurrency of Decentraland.\
    \ One `LAND` can be purchased for 1,000 `MANA`. In Decentraland, users can use\
    \ `MANA` to do the following:\n\n- To buy parcels, digital goods, and services\
    \ in the virtual world\n- To burn in order to claim `LAND` parcels\n- The token\
    \ holder has the right to vote on platform policies through the DAO\n\n## Decentraland\
    \ Architecture\n\nThe Decentraland protocol is comprised of three layers:\n\n\
    ### Consensus Layer\n\nEach parcel of `LAND` is an NFT token, defined by `LANDregistry`\
    \ smart contract. The `EstateRegistry` contracts define `ESTATE` tokens. Smart\
    \ contracts power the consensus layer and track the ownership of land parcels\
    \ and their content. Users can buy new parcels of `LAND` with the `MANA` token.\
    \ And the `LANDregistry` contract burns `MANA` whenever it creates a new `LAND`.\n\
    \n### Land Content Layer\n\nLand content stores the reference of a hash of the\
    \ file's content. From this reference, the application can download digital content\
    \ of parcel of digital land from BitTorrent or IPFS. The downloaded file contains\
    \ a description of the image, textures, sounds, and other elements needed to render\
    \ the scene.\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig12_HTML.png)\n\
    \nA schematic depicts the layers of the Decentraland protocol, processed in 3\
    \ layers: real-time, land content, and consensus. It includes Decentraland client,\
    \ nearby clients, P2P servers, content, land, estate smart contract, and IPFS.\n\
    \nFigure 7-12  \nDecentraland protocol layers\n\n### Real-time Layer\n\nThe real-time\
    \ layer enables peer-to-peer connection, or the ability for users to communicate\
    \ with each other. These connections are necessary to build community social interaction.\
    \ Decentraland also has an avatar messaging voice chat.\n\nFigure [7-12](#535492_1_En_7_Chapter.xhtml#Fig12)\
    \ summarizes Decentraland protocol layers.\n\n## Buy Land in the Metaverse\n\n\
    Anyone can buy, sell, or rent land on the official Decentraland Marketplace or\
    \ through an NFT marketplace like OpenSea. Decentraland also provides the mortgage\
    \ option of obtaining land. However, before starting with the land purchase, make\
    \ sure you go through the following steps:\n\n### Step 1 – Select a Metaverse\
    \ Platform and Sign In\n\nIn our case, we will select Decentraland platform (`https://market.decentraland.org/`).\n\
    \nDirectly use Metamask to connect or register an account at the Decentraland\
    \ platform. Metamask is recommended to purchase and sell land:\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Figa_HTML.png)\n\
    \nA screenshot of the metaverse platform and sign-in. The labeled steps on the\
    \ left side are Metamask, Formatic, Wallet Connect, and Coinbase Wallet; and the\
    \ right side are signature requests for account 1.\n\nOnce signed in, select the\
    \ \"Land\" tab to be directed to the land parcels for sale (see the following\
    \ image):\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Figb_HTML.png)\n\n\
    An illustration with headers as an overview, collectibles, land, and my asset.\
    \ The land is highlighted by a line under it to illustrate maze structures.\n\n\
    ### Step 2 – Buy Cryptocurrency\n\nMost Metaverse platforms and NFT marketplaces\
    \ require you to have a native crypto token beforehand. You can purchase these\
    \ currencies on crypto exchanges such as Coinbase and Binance and send these tokens\
    \ to your wallet address, for example, Metamask or Coinbase Wallets.\n\n### Step\
    \ 3 – Choose a Plot of LAND\n\nThe marketplace allows you to view individual parcels\
    \ at various options. Select the \"on sale\" option. You can examine nearby locations.\
    \ The main things to consider before buying land in the Metaverse are:\n\n- Land\
    \ price.\n- Size of the virtual land area.\n- Area: Close to popular attractions\
    \ (hubs, shops, galleries, event spaces, etc.).\n- Who is the seller of the land.\n\
    - Transaction history.\n- Utility potential (gallery, events space, shop, etc.).\n\
    \nClick on a virtual property to learn more details until you find the land you\
    \ want to purchase. The land prices are listed in `MANA` with the owner's detail\
    \ information:\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Figc_HTML.png)\n\
    \nAn illustration depicts the plot of land into 3 processes: cheapest flash at\
    \ 4599, fashion street at 4640, and admiralbulldo at 3650.\n\n### Step 4 – Purchase\
    \ the Property\n\nOnce you have found and selected the property that you want\
    \ to buy, the \"buy\" and \"bid\" buttons allow you to place an order and complete\
    \ a purchasing transaction. You can use Ether or `MANA` to purchase.\n\nOnce you\
    \ click the \"buy\" button, you will be asked to confirm your purchase. It will\
    \ take a few seconds to a few minutes until the transaction is complete. Now you\
    \ own the virtual Metaverse land.\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Figd_HTML.png)\n\
    \nAn illustration depicts the purchase of the property. The labeled process is\
    \ admiral bulldog's land.\n\nYou can buy the land in OpenSea too. Click Explore\
    \ ➤ Virtual Land. You will see the Decentraland collections shown.\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Fige_HTML.png)\n\
    \nAn illustration depicts the land in the open sea by clicking Explore, Virtual\
    \ Land, and seeing the Decentraland collection of 6 virtual lands displayed.\n\
    \nClick in Decentraland. It will show you available land for sale. Pick one of\
    \ these lands you want to buy to complete your purchase:\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Figf_HTML.png)\n\
    \nA screenshot depicts the available land for sale; pick any one of these displayed\
    \ 14 lands you want to buy to complete your purchase on OpenSea.\n\n## The Future\
    \ of the Metaverse\n\nWhen Neal Stephenson first described the Metaverse in his\
