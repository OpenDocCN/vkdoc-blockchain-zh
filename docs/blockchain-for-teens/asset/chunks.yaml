  trans: '

    ### 混合现实（MR）


    混合现实（MR）是一项新兴技术，它结合了虚拟现实（VR）与增强现实（AR）。MR 融合了物理世界与虚拟世界，创造出新的环境，使物理对象与数字对象能够实时交互。


    **示例：** MR 工作站将不再局限于单个或两个物理显示器。这些工作站将根据需要在 3D 虚拟空间中包含多个屏幕。用户可以定义并创建无限数量的定制化工作站，并根据需要删除这些虚拟屏幕。此类工作环境将提升效率，并打造更愉快、舒适且健康的工作场所。


    ### 扩展现实（XR）


    扩展现实（XR）是一个总称，涵盖了真实与虚拟沉浸式技术的全谱系，包括 VR、AR 和 MR。为了总结我们目前关于 AR、VR 和 MR 的讨论，表 7-1
    展示了这些沉浸式技术之间的差异。


    **表 7-1** VR、AR 与 MR 的对比


    | 增强现实（AR） | 虚拟现实（VR） | 混合现实（MR） |

    | --- | --- | --- |

    | 虚拟数字内容叠加在真实世界环境之上。 | 完全独立于真实世界的计算机生成沉浸式虚拟世界。 | 物理世界与虚拟世界相互融合。 |

    | 部分沉浸于虚拟环境。 | 完全沉浸于虚拟环境。 | 可与物理世界和虚拟世界进行交互与操控。 |

    | 技术已成熟且不断改进。 | 逼真的技术技能练习，可收集关键训练指标。 | 与远距离协作者进行实时信息与知识共享。 |

    | 可使用专用 AR 头显在小屏幕上显示虚拟内容。 | 可使用专用 VR 头显和手柄控制器增强体验。 | 可使用专用 AR 和 VR 设备创造混合体验。 |

    | 需要 3-7 年时间在不同领域采用 AR。 | 需要 2-4 年时间在不同领域采用 VR。 | MR 的采用时间与 VR 相近。 |


    ## 理解元宇宙的层级


    想象一下，元宇宙是一个并行的 3D 虚拟世界，提供各种产品或服务，甚至将与大部分物理世界集成并互动。作为一个模拟的数字环境，元宇宙融合了 AR、VR、物联网（IoT）、5G、大数据、边缘计算、人工智能（AI）和区块链等所有数字技术，为类似真实世界的社会社区构建虚拟场所。此外，它拥有一个由数字货币和不可替代代币（NFT）驱动的自给自足的虚拟经济。企业家兼游戏设计师乔恩·拉多夫将元宇宙世界划分为七个层级：体验、发现、创作者经济、空间计算、去中心化、人机界面，以及基础设施。这些层级涵盖了元宇宙领域中不同产品或服务的过去、现在和未来的发展形态。图
    7-7 展示了元宇宙中的这些层级。


    ![](img/535492_1_En_7_Fig7_HTML.png)


    **图 7-7** 元宇宙层级


    ### 体验


    体验层是目前大多数元宇宙业务、公司和开发人员关注的焦点。该层的一个主要特征将是社区驱动的事件、社交互动、虚拟服务和数字资产，例如游戏、NFT、社交、电子竞技、会议、剧院、购物和活动。用户可以通过数字内容在虚拟环境中进行交互。在这一层，元宇宙最终将通过去物质化物理空间，创造出一个全新的虚拟世界维度。因此，元宇宙将为每个人提供前所未有的丰富体验。


    游戏可能是展示元宇宙体验层许多功能最众所周知的平台：虚拟沉浸体验、化身身份、数字 NFT 市场、3D 产品展示和实时社交互动。该层还包括许多其他物理世界与数字世界融合交织的日常体验：Zoom
    办公 VR 会议、`HOLOFIT VR Fitness`、`Netflix VR`电影、`TvoriVR` UX 与 UI 原型设计。


    以下是该层中几个流行的元宇宙平台。


    **示例：** Decentraland、Fortnite、Roblox、Sandbox、Spatial、Rove、动视暴雪、任天堂和 Xbox。


    ### 发现


    发现层涉及信息的持续拉取和推送，将人们引向对不同新体验的学习。“拉”代表一个入站系统，用户在其中主动寻求关于新体验的信息。另一方面，“推”指的是一个出站系统，元宇宙体验在此等待用户并通知他们。


    以下是入站和出站发现可能发生的一些例子。


    **入站：**


    - 搜索引擎

    - 实时在场

    - 社区驱动内容

    - 应用商店

    - 白皮书

    - 案例研究

    - 赢得媒体


    **出站：**


    - 展示广告

    - 通知

    - 电子邮件和社交媒体


    社区驱动的内容有助于传播其概念、支持技术和体验的相关知识。NFT 是自 2021 年以来最热门的话题之一。许多公司，如耐克、星巴克、可口可乐、麦当劳和路易威登，都将
    NFT 数字资产作为营销工具来推广其产品或服务。这是提高社区参与度并在元宇宙中获得更多发现的好方法。


    实时在场也将在改善交互式用户体验方面发挥关键作用。例如，PlayStation 和 Xbox 等视频游戏服务允许玩家实时查看朋友的活动。出站发现中最常见的方法是展示广告、通知、电子邮件和社交媒体。


    **示例：** Unity、Google 商店、Apple 商店、Steam、PlayStation 和 Xbox。


    ### 创作者经济


    在元宇宙的早期阶段，制作数字资源、生成沉浸式体验以及添加去中心化支付需要大量的专业技能和努力。这个阶段类似于早期版本的互联网。创作者需要大量的编程知识来设计和构建应用。如今，像`WordPress`这样的工具允许内容创作者无需代码，只需几次点击和拖放功能即可轻松构建带支付选项的网站，从而实现创作过程。随着元宇宙市场的增长，越来越多的商业软件工具将会出现。因此，元宇宙中设计师和创作者的数量呈指数级增长。例如，建立在去中心化区块链上的
    NFT 等代币，为数字资产提供可证明的所有权，同时拥有独立的中心化平台。这种新模式将赋予创作者比传统创作者平台更大的影响力。创作者可以构建自己的元宇宙经济，向粉丝出售更多虚拟
    NFT 物品，并有更多机会获得收入。


    **示例：** Roblox、Unity、Adobe、Polystream、Shopify、Decentraland 和微软。

    '
- fmt: '### Spatial Computing


    Spatial computing refers to merging real and virtual worlds and reducing the boundaries
    between them. It is broadly synonymous with extended reality (`XR`):


    - Various aspects of the technology solutions in this layer help us manipulate
    and enter into 3D Metaverse spaces. Here is a list of a few of them.

    - 3D engines for displaying geometry and animation (`Unity` and `Unreal Engine`).

    - Geospatial mapping and object recognition for mapping and interpreting the real
    and virtual worlds.

    - `VR`, `AR`, `MR`, `XR`.

    - Voice and gesture recognition.

    - Internet of Things for data integration from devices.

    - Human biometrics for identification purposes.


    The UI will completely differ from spatial computing and can be built on physical
    space. The machines no longer need to be tied to a fixed location, and the hardware
    will be invisible. Cathay Pacific worked with `ER` ad platform `OmniVirt` to provide
    a visual tour for customers. The products enable marketers to give their target
    travelers, especially those who haven’t yet experienced the airline, a “try before
    you buy” experience. It allows consumers to virtually tour every aspect of the
    traveler’s journey, from selecting a seat and check-in desk to the cabin—similar
    to how Google Street View works. By enabling 360° video units of airport lounges
    and flight experiences, consumers can click on certain hotspots in the view to
    get more information. They can also click to reserve their seat in immerses virtual
    environment. The result increased customer brand favorability by 25%.


    **Examples:** `Alphabet`, `Microsoft`, `Meta`, `Deere`, `Matterport`, `Unity`,
    `Unreal`, `Epic Games`, and `Nvidia`.


    ### Decentralization


    One of the key features of the Metaverse is that it will be decentralized. There
    is no single central authority in Metaverse. The real-time generated 3D virtual
    worlds make up various Metaverses. Each Metaverse is governed by its own decentralized
    autonomous organization (`DAO`), a community-led organization with no central
    authority to govern them. Metaverse can operate autonomously, creating a new ecosystem
    built around blockchain. In a truly decentralized Metaverse environment, creators
    have ownership and full control of their creative work and digital products in
    any virtual world. `NFTs`-enabled crypto assets will certainly play a critical
    role in ensuring no asset ownership has tampered within the Metaverse. Users can
    easily trade the product using cryptocurrency and transfer `NFT` ownership. Decentralized
    finance (`DeFi`) is a way to provide financial products into the Metaverse via
    a decentralized blockchain network. With `DeFi`, users can do most of the things
    centralized financial institutions offer—borrow, lend, exchange, buy insurance,
    trade derivatives, invest, and more.


    One of the most well-known examples of the decentralized Metaverse is `Decentraland`,
    a decentralized 3D virtual world that runs on the Ethereum blockchain. Users may
    buy virtual plots of land on the platform as `NFTs` via cryptocurrency, and the
    game protocol is governed by a `DAO`, which the token holder votes. Other popular
    decentralized Metaverse products are `Axie Infinity`, `Sandbox`, `Bloktopia`,
    `Star Atlas`, `Polka City`, `Illuvium`, and `Sorare`.


    **Examples:** `Ethereum`, `polygon`, `Cardano`, `Polkadot`, `Dapper`, `Ava Labs`,
    `OpenSea`, `SuperRare`, and `Rally`.


    ### Human Interface


    People interact with the world in a variety of various ways. In the Metaverse,
    it’s called a human interface. It consists of multiple approaches, such as gestures,
    vocal commands, and neural interfaces. Wearable devices like smart glasses, gloves,
    watch, and other garments are also included under the larger banner of human interfaces.


    Those VR devices currently in use remain in a state of continuous development.
    At the same time, many new devices are also being invented and evaluated to access
    the Metaverse. These are cutting-edge solutions designed to make such improvements
    much easier to use. An example of such a tool is AR contact lenses, designed to
    allow the user to watch the digital world without putting on bulky glasses, earphones,
    or goggles. Clearly, this solution has yet to be widely publicly tested and approved,
    but it might indicate a breakthrough in this area in the short term.


    **Examples:** `Xbox`, `Samsung`, `Oculus`, `HoloLens`, `PlayStation`, `Alexa`,
    `Neural Link`, and `Magic leap`.


    ### Infrastructure


    The seventh layer consists of technologies that make everything the other six
    layers mentioned become real. Six technologies clusters the power of the Metaverse:


    **The computing power and network** – It requires a 5G and 6G capable infrastructure
    to increase network bandwidth and decrease network congestion and latency. In
    addition, the devices also need components like GPU servers, semiconductors, microelectromechanical
    systems (`MEMS`), and tiny, long-lasting batteries.


    **Artificial intelligence (`AI`)** – AI has been widely applied in our daily lives
    over the last few years. Within the Metaverse, `AI` can be used to improve nonplayer
    characters (`NPCs`) in different situations. NPCs exist everywhere in virtually
    every game; they belong to the gaming setting created to react and react to gamers’
    activities. With AI’s managing abilities, NPCs can be put across the 3D spaces
    to facilitate realistic conversations with users or perform other specific tasks.


    **Spatial computing, Digital Twin, and Internet of Things (`IoT`)** – Spatial
    computing or 3D reconstruction is crucial to create realistic spaces in the Metaverse.
    It helps to maintain buildings, items, and physical locations in the Metaverse.
    Digital Twin is an essential building block of Metaverse. A Digital Twin is a
    computer program that uses real-world data to create a real-time virtual representation.
    It can simulate a real-world physical system or process (a physical twin) and
    predict how a product or process will perform. Digital Twin integrates AI, IoT,
    and data analytics tools to enhance the output. By deploying digital twins, Metaverse
    creators can build precise real-life spaces into the virtual mirror world. IoT
    is a system that takes whatever is in our real world and connects them to the
    Internet via sensors and devices. One of the functions of IoT in the Metaverse
    is to collect and provide data from the physical world, improving the precision
    of digital objects. IoT devices can seamlessly connect the Metaverse to many real-life
    devices and enable the generation of real-time simulations in the Metaverse. To
    further optimize the Metaverse environment, IoT can integrate with AI to process
    the data it collects.


    **Video gaming technologies** – This will include 3D game engines like `Unreal
    Engine` and `Unity`.


    **Display technologies** – `AR`, `VR`, `MR`, and `XR` can give users an immersive
    and engaging 3D experience.


    **Blockchain technology** – Blockchain innovation provides a decentralized and
    transparent feature for digital proof of ownership, `NFT`, `DeFi`, governance,
    `DAO`, anonymity, and interoperability. Furthermore, cryptocurrencies enable users
    to transfer value while they work and socialize in the 3D Metaverse.


    **Example:** `Azure`, `Aws`, `Google cloud`, `Qualcomm`, `Intel`, `Nvidia`, `Verizon`,
    `AT&T`, `T-Mobile`.


    While seven layers structure explanation helps a general understanding current
    Metaverse landscape, there is still a lot to learn. The Metaverse is still in
    a very early stage. Many new technologies will emerge in the future, and this
    layered structure will continue to evolve.'
  raw: '### Spatial Computing


    Spatial computing refers to merging real and virtual worlds and reducing the boundaries
    between them. It is broadly synonymous with extended reality (XR) :


    *   Various aspects of the technology solutions in this layer help us manipulate
    and enter into 3D Metaverse spaces. Here is a list of a few of them.


    *   3D engines for displaying geometry and animation (Unity and Unreal Engine).


    *   Geospatial mapping and object recognition for mapping and interpreting the
    real and virtual worlds.


    *   VR, AR, MR, XR.


    *   Voice and gesture recognition.


    *   Internet of Things for data integration from devices.


    *   Human biometrics for identification purposes.


    The UI will completely differ from spatial computing and can be built on physical
    space. The machines no longer need to be tied to a fixed location, and the hardware
    will be invisible. Cathay Pacific worked with ER ad platform OmniVirt to provide
    a visual tour for customers. The products enable marketers to give their target
    travelers, especially those who haven’t yet experienced the airline, a “try before
    you buy” experience.


    It allows consumers to virtually tour every aspect of the traveler’s journey,
    from selecting a seat and check-in desk to the cabin—similar to how Google Street
    View works. By enabling 360° video units of airport lounges and flight experiences,
    consumers can click on certain hotspots in the view to get more information. They
    can also click to reserve their seat in immerses virtual environment. The result
    increased customer brand favorability by 25%.


    **Examples:** Alphabet, Microsoft, Meta, Deere, Matterport, Unity, Unreal, Epic
    Games, and Nvidia .


    ### Decentralization


    One of the key features of the Metaverse is that it will be decentralized. There
    is no single central authority in Metaverse. The real-time generated 3D virtual
    worlds make up various Metaverses. Each Metaverse is governed by its own decentralized
    autonomous organization (DAO) , a community-led organization with no central authority
    to govern them. Metaverse can operate autonomously, creating a new ecosystem built
    around blockchain. In a truly decentralized Metaverse environment, creators have
    ownership and full control of their creative work and digital products in any
    virtual world. NFTs-enabled crypto assets will certainly play a critical role
    in ensuring no asset ownership has tampered within the Metaverse. Users can easily
    trade the product using cryptocurrency and transfer NFT ownership. Decentralized
    finance (DeFi) is a way to provide financial products into the Metaverse via a
    decentralized blockchain network. With DeFi, users can do most of the things centralized
    financial institutions offer—borrow, lend, exchange, buy insurance, trade derivatives,
    invest, and more.


    One of the most well-known examples of the decentralized Metaverse is Decentraland,
    a decentralized 3D virtual world that runs on the Ethereum blockchain. Users may
    buy virtual plots of land on the platform as NFTs via cryptocurrency, and the
    game protocol is governed by a DAO, which the token holder votes.


    Other popular decentralized Metaverse products are Axie Infinity, Sandbox, Bloktopia,
    Star Atlas, Polka City, Illuvium, and Sorare.


    **Examples:** Ethereum, polygon, Cardano, Polkadot, Dapper, Ava Labs, OpenSea,
    SuperRare, and Rally.


    ### Human Interface


    People interact with the world in a variety of various ways. In the Metaverse,
    it’s called a human interface . It consists of multiple approaches, such as gestures,
    vocal commands, and neural interfaces. Wearable devices like smart glasses, gloves,
    watch, and other garments are also included under the larger banner of human interfaces.


    Those VR devices currently in use remain in a state of continuous development.
    At the same time, many new devices are also being invented and evaluated to access
    the Metaverse. These are cutting-edge solutions designed to make such improvements
    much easier to use. An example of such a tool is AR contact lenses, designed to
    allow the user to watch the digital world without putting on bulky glasses, earphones,
    or goggles. Clearly, this solution has yet to be widely publicly tested and approved,
    but it might indicate a breakthrough in this area in the short term.


    **Examples:** Xbox, Samsung, Oculus, HoloLens, PlayStation, Alexa, Neural Link,
    and Magic leap.


    ### Infrastructure


    The seventh layer consists of technologies that make everything the other six
    layers mentioned become real.


    Six technologies clusters the power of the Metaverse:


    **The computing power and network** – It requires a 5G and 6G capable infrastructure
    to increase network bandwidth and decrease network congestion and latency. In
    addition, the devices also need components like GPU servers, semiconductors, microelectromechanical
    systems (MEMS) , and tiny, long-lasting batteries


    **Artificial intelligence (AI)** – AI has been widely applied in our daily lives
    over the last few years. Within the Metaverse, AI can be used to improve nonplayer
    characters (NPCs) in different situations. NPCs exist everywhere in virtually
    every game; they belong to the gaming setting created to react and react to gamers’
    activities. With AI’s managing abilities, NPCs can be put across the 3D spaces
    to facilitate realistic conversations with users or perform other specific tasks.


    **Spatial computing, Digital Twin, and** **Internet of Things (IoT)** – Spatial
    computing or 3D reconstruction is crucial to create realistic spaces in the Metaverse.
    It helps to maintain buildings, items, and physical locations in the Metaverse.
    Digital Twin is an essential building block of Metaverse. A Digital Twin is a
    computer program that uses real-world data to create a real-time virtual representation.
    It can simulate a real-world physical system or process (a physical twin) and
    predict how a product or process will perform. Digital Twin integrates AI, IoT,
    and data analytics tools to enhance the output. By deploying digital twins, Metaverse
    creators can build precise real-life spaces into the virtual mirror world.


    IoT is a system that takes whatever is in our real world and connects them to
    the Internet via sensors and devices. One of the functions of IoT in the Metaverse
    is to collect and provide data from the physical world, improving the precision
    of digital objects. IoT devices can seamlessly connect the Metaverse to many real-life
    devices and enable the generation of real-time simulations in the Metaverse. To
    further optimize the Metaverse environment, IoT can integrate with AI to process
    the data it collects.


    **Video gaming technologies** – This will include 3D game engines like Unreal
    Engine and Unity.


    **Display technologies** – AR, VR, MR, and XR can give users an immersive and
    engaging 3D experience.


    **Blockchain technology** – Blockchain innovation provides a decentralized and
    transparent feature for digital proof of ownership, NFT, DeFi, governance, DAO,
    anonymity, and interoperability. Furthermore, cryptocurrencies enable users to
    transfer value while they work and socialize in the 3D Metaverse.


    **Example:** Azure, Aws, Google cloud, Qualcomm, Intel, Nvidia, Verizon, AT&T,
    T-Mobile.


    While seven layers structure explanation helps a general understanding current
    Metaverse landscape, there is still a lot to learn. The Metaverse is still in
    a very early stage. Many new technologies will emerge in the future, and this
    layered structure will continue to evolve.'
  trans: '

    ### 空间计算


    空间计算指的是融合现实与虚拟世界，并减少两者间的界限。它广义上与扩展现实（`XR`）同义：


    - 这一层的各类技术解决方案能帮助我们操控并进入 3D 元宇宙空间。以下列举了其中几个方面。

    - 用于显示几何图形和动画的 3D 引擎（`Unity` 和 `Unreal Engine`）。

    - 用于映射和解读现实与虚拟世界的地理空间映射与物体识别技术。

    - `VR`、`AR`、`MR`、`XR`。

    - 语音与手势识别。

    - 用于整合设备数据的物联网。

    - 用于身份识别的人体生物特征识别技术。


    用户界面将与空间计算截然不同，并可以构建于实体空间之上。机器不再需要固定在某个位置，硬件也将变得不可见。国泰航空曾与`ER`广告平台`OmniVirt`合作，为客户提供虚拟观光体验。该产品使营销人员能够为目标旅客（尤其是那些尚未体验过该航空公司的旅客）提供“先试后买”的体验。它允许消费者虚拟游览旅客旅程的每一个环节，从选择座位、值机柜台到机舱内部——其工作原理类似于谷歌街景。通过启用机场贵宾室和飞行体验的
    360°视频单元，消费者可以点击视图中的特定热点区域获取更多信息。他们也可以在沉浸式虚拟环境中点击预订座位。最终，该举措使顾客的品牌好感度提升了 25%。


    **示例：** `Alphabet`、`Microsoft`、`Meta`、`Deere`、`Matterport`、`Unity`、`Unreal`、`Epic
    Games` 以及 `Nvidia`。


    ### 去中心化


    元宇宙的关键特征之一是其去中心化。元宇宙中不存在单一的中央权威机构。实时生成的 3D 虚拟世界构成了各种各样的元宇宙。每个元宇宙都由其自身的去中心化自治组织（`DAO`）管理，这是一个由社区主导、没有中央权威机构进行治理的组织。元宇宙能够自主运行，围绕区块链构建一个全新的生态系统。在一个真正去中心化的元宇宙环境中，创作者对其在任何虚拟世界中的创作成果和数字产品拥有所有权和完全控制权。由`NFT`驱动的加密资产无疑将在确保元宇宙内资产所有权不被篡改方面发挥关键作用。用户可以轻松地使用加密货币交易产品，并转移`NFT`的所有权。去中心化金融（`DeFi`）是一种通过去中心化区块链网络向元宇宙提供金融产品的方式。借助`DeFi`，用户可以完成传统中心化金融机构提供的大部分服务——借款、贷款、兑换、购买保险、交易衍生品、投资等。


    最著名的去中心化元宇宙示例之一是`Decentraland`，这是一个在以太坊区块链上运行的去中心化 3D 虚拟世界。用户可以通过加密货币在平台上以`NFT`的形式购买虚拟土地，而游戏协议则由`DAO`管理，代币持有者拥有投票权。其他流行的去中心化元宇宙产品包括`Axie
    Infinity`、`Sandbox`、`Bloktopia`、`Star Atlas`、`Polka City`、`Illuvium` 和 `Sorare`。


    **示例：** `Ethereum`、`polygon`、`Cardano`、`Polkadot`、`Dapper`、`Ava Labs`、`OpenSea`、`SuperRare`
    以及 `Rally`。


    ### 人机界面


    人们以多种不同的方式与世界互动。在元宇宙中，这被称为人机界面。它包含多种交互方式，例如手势、语音指令和神经接口。智能眼镜、手套、手表和其他服装等可穿戴设备也包含在人机界面的广义范畴之下。


    目前使用的那些 VR 设备仍处于持续发展阶段。与此同时，许多用于访问元宇宙的新型设备也正在被发明和评估。这些都是旨在让此类改进更易于使用的尖端解决方案。此类工具的一个例子是
    AR 隐形眼镜，它旨在让用户无需佩戴笨重的眼镜、耳机或护目镜就能观看数字世界。显然，该方案尚未经过广泛的公开测试和认可，但它可能预示着短期内这一领域将取得突破。


    **示例：** `Xbox`、`Samsung`、`Oculus`、`HoloLens`、`PlayStation`、`Alexa`、`Neural Link`
    以及 `Magic leap`。


    ### 基础设施


    第七层由使上述其他六层成为现实的技术构成。六类技术集群共同支撑着元宇宙的力量：


    **计算能力与网络** – 需要具备 5G 和 6G 能力的基础设施，以增加网络带宽并减少网络拥塞和延迟。此外，设备还需要 GPU 服务器、半导体、微机电系统（`MEMS`）以及小巧耐用的电池等组件。


    **人工智能（`AI`）** – 过去几年，人工智能已广泛应用于我们的日常生活。在元宇宙中，`AI`可用于改进不同情境下的非玩家角色（`NPC`）。NPC
    几乎存在于每款游戏的各个角落；它们属于为回应用户活动而创造的游戏设定。凭借 AI 的管理能力，NPC 可以被部署在 3D 空间中，以促进与用户进行逼真的对话或执行其他特定任务。


    **空间计算、数字孪生与物联网（`IoT`）** – 空间计算或 3D 重建对于在元宇宙中创建逼真的空间至关重要。它有助于在元宇宙中维护建筑、物品和物理位置。数字孪生是元宇宙的重要组成部分。数字孪生是一个利用现实世界数据创建实时虚拟表示的计算机程序。它可以模拟现实世界的物理系统或过程（物理孪生），并预测产品或流程将如何表现。数字孪生整合了
    AI、物联网和数据分析工具来增强输出。通过部署数字孪生，元宇宙创造者可以将精确的现实生活空间构建到虚拟镜像世界中。物联网是一个系统，它把我们现实世界中的任何事物通过传感器和设备连接到互联网。物联网在元宇宙中的功能之一是收集并提供来自物理世界的数据，从而提高数字对象的精确度。物联网设备可以无缝地将元宇宙连接到许多现实生活中的设备，并支持在元宇宙中生成实时模拟。为了进一步优化元宇宙环境，物联网可以与
    AI 集成，以处理其收集的数据。


    **视频游戏技术** – 这将包括像 `Unreal Engine` 和 `Unity` 这样的 3D 游戏引擎。


    **显示技术** – `AR`、`VR`、`MR` 和 `XR` 可以为用户提供沉浸式和引人入胜的 3D 体验。


    **区块链技术** – 区块链创新为数字所有权证明、`NFT`、`DeFi`、治理、`DAO`、匿名性和互操作性提供了去中心化和透明的特性。此外，加密货币使用户能够在
    3D 元宇宙中工作和社交时转移价值。


    **示例：** `Azure`、`Aws`、`Google cloud`、`Qualcomm`、`Intel`、`Nvidia`、`Verizon`、`AT&T`、`T-Mobile`。


    虽然七层结构的解释有助于整体理解当前的元宇宙格局，但仍有许多需要学习的地方。元宇宙仍处于非常早期的阶段。未来将涌现许多新技术，这种分层结构也将持续演变。

