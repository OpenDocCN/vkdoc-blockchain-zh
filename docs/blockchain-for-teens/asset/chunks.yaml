  trans: '

    ### UTXO（未花费交易输出）


    每笔交易的输出，即未花费交易输出（UTXO），被用作下一笔已花费交易的输入。UTXO 在比特币网络中只能被花费一次，因此比特币交易输出可分为 UTXO 和已花费交易输出两类。由于比特币区块链不维护每个人的账户余额，比特币钱包应用可以查询区块链全节点数据，并汇总比特币钱包地址的总
    UTXO。类似区块链中区块的连接方式，每个交易输入都链接到前一笔交易的输出，而每个输出又指向后续交易的输入。


    假设爱丽丝在 2022 年 8 月 1 日至 2022 年 8 月 5 日期间收到了多笔付款。每笔交易包含不同数量的 BTC，如图 3-18 所示。


    ![](img/535492_1_En_3_Fig18_HTML.png)


    两张表格展示了输入聚合信息、交易、时间、输出和数值。其中提到了总输入和输出值及其差值，并指出了爱丽丝、鲍勃和矿工三个角色。


    图 3-18 聚合交易输入并生成输出


    爱丽丝的钱包地址是 `18AEg8g8VWxBfFGeWLqJURuw1DLKQne8jV`。爱丽丝想给鲍勃发送 0.005 BTC。她只需解锁 2022
    年 8 月 1 日至 2022 年 8 月 5 日期间的任意一笔交易即可，因为这些交易的 UTXO 金额都大于 0.005 BTC。但如果爱丽丝想给鲍勃发送
    0.13 BTC，她必须解锁所有这些交易。要支付 0.13 BTC，爱丽丝不能简单地只使用交易 1 到 4，而从交易 5 中取 0.03 BTC。换句话说，你永远不能部分使用
    UTXO；所有这些交易都需要被解锁并加总，才能在新交易中花费 0.16 BTC，支付 0.02 BTC 给矿工作为交易手续费，然后将剩余的 0.01 BTC
    返还给爱丽丝。


    一旦交易在比特币网络中被提交，该比特币交易就不可逆转，除非该支付的接收方发起一笔新交易并将比特币发回你的比特币地址。


    与传统账户不同，输入值可以略大于输出值。在前面的例子中，爱丽丝向鲍勃发送比特币。她需要聚合五笔不同的交易输入，并生成三个输出：一个支付给鲍勃，一个支付给矿工，剩余部分返还给爱丽丝。


    让我们来看一下最常见的几种比特币交易类型。


    #### 一个输入 – 两个输出


    ![](img/535492_1_En_3_Figa_HTML.png)


    一张文字截图展示了一个输入和两个输出及其数值，并标明了标题摘要。


    一笔交易有两个输出是最常见的比特币交易类型。例如，爱丽丝向鲍勃发送 8 BTC，但她的交易 UTXO 有 10 BTC。她将把剩余部分返还到自己的地址。这笔剩余金额将成为她地址下一笔交易的输入。


    #### 一个输入 – 多个输出


    ![](img/535492_1_En_3_Figb_HTML.png)


    一张文字截图包含一个输入和多个输出及其数值。


    一笔交易有多个输出，可能代表某人向多个接收方发送比特币。例如，如果该账户是企业账户，则可能是向其员工进行支付。


    #### 多个输入 – 一个或两个输出


    ![](img/535492_1_En_3_Figc_HTML.png)


    一张文字截图包含多个输入和一个或两个输出及其数值。


    当所有者拥有多个金额较小的不同钱包地址时，他们可以将这些资金转移到一个地址。另一种情况是企业账户接收公开的比特币付款。


    ### 交易池


    在交易被添加到区块之前，它们会先被放入一个公共交易池。这些交易是“未确认的”。交易池也称为内存池，包含所有已验证但尚未被挖出的未确认交易。


    矿工随后根据手续费以及交易在池中的排序位置，从交易池中选取未确认交易。手续费越高的交易被选中的机会越大。


    一旦交易被挖出或添加到区块链中，交易池就会被清空。然后，矿工向网络广播新区块。每个网络节点都拥有交易池的副本。当节点收到更新时，它会调整自己的交易池。


    ### 交易手续费


    交易手续费作为对矿工的激励奖励，鼓励他们验证区块中的用户交易并维护网络安全。从数学上讲，交易手续费是比特币交易输入金额与输出金额之间的差额。


    当比特币钱包发送交易时，通常会显示一个选项，用于选择以每单位聪计费的手续费率，缩写为 `sats/vByte`。交易手续费将根据交易数据大小乘以该费率计算得出。一个比特币区块最多可包含
    4 MB 数据，交易越大，占用的区块空间就越多。因此，较大的交易需要支付更多手续费。如果你想加快交易验证过程并减少等待时间，则需要在交易中包含更高的手续费率，这使其更有可能被包含在下一个区块中。然而，如果你不介意等待，则可以支付最低手续费，例如
    2 `sats/vByte`。交易通常会在一天或一周内得到确认。一个简单的公式可以表示为：


    ```

    手续费 = 输入总额 – 输出总额

    ```


    一笔比特币交易在高层级上包含三个主要组成部分：元数据（包括头部）、输入和输出。上述三个组成部分各自有特定的大小。交易的总大小将是这些组成部分大小的总和，如下所示：


    ![](img/535492_1_En_3_Figd_HTML.jpg)


    一张表格包含三列：交易输入、交易输出和元数据。


    假设一笔交易具有以下近似大小，且网络手续费率为每 vbyte 10 聪：


    *   每个输入 120 vbyte


    *   每个输出 58 vbyte


    *   元数据 22 vbyte


    ![](img/535492_1_En_3_Fige_HTML.jpg)


    一个区块图将其分为输入 0（120 v 字节）和输出 0（58 v 字节），并提及 22 v 字节。


    对于每笔交易，总交易大小为：


    ```

    120（输入）+ 58（输出）+ 22（元数据）= 200 字节

    ```


    如果交易手续费率为 `10 聪/vByte`，那么发送 200 字节需要 2000 聪。


    1 聪等于 `0.00000001 BTC`；2000 聪等于 `0.00002 BTC`。


    撰写本文时，BTC 价格为 `$23,147.80`，因此总交易手续费为：


    ```

    $23,147.80 * 0.00002 = $0.462956

    ```


    你需要为上述交易支付 `$0.462956`。

