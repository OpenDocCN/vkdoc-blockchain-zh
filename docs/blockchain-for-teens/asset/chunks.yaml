  trans: '

    # 纸钱包


    顾名思义，纸钱包是一张包含与钱包地址相关联的公钥和私钥的纸张。此外，纸钱包通常以二维码形式打印，方便您快速扫描进行交易。


    作为一种冷钱包，纸张在存储加密货币方面相当安全，因为您的密钥完全离线，网络黑客无法触及。它是最便宜的冷钱包选择。与 Trezor Ledger 等硬件钱包相比，成本可能在
    50 美元到 300 美元之间。


    纸钱包是通过下载钱包生成器软件来创建的。


    下载后，您必须检查以确保该软件不包含恶意软件。然后，要打印纸钱包，您需要禁用浏览器插件和扩展，断开网络连接，并添加一个密码短语。最后，按照钱包生成器的说明完成整个流程，打印新生成的钱包，并删除文件。请务必确保没有人在您创建钱包时偷看。


    避免使用公共打印机，例如学校和办公室的打印机；钱包信息可能会存储在打印机的内部硬盘中。不安全的公共 Wi-Fi 网络也可能泄露您的钱包信息。


    纸钱包很容易损坏或丢失。如果应用被卸载，您将损失资金。此外，使用钱包接收资金时，纸钱包无法告知您是否收到比特币以及数量；您需要使用其他应用来查看。


    由于纸钱包存在诸多缺点，目前并未广泛使用。


    您可以通过各种在线服务提供商创建自己的比特币纸钱包，例如 [`https://bitcoinpaperwallet.com/`](https://bitcoinpaperwallet.com/)、[`https://paperwallet.bitcoin.com/`](https://paperwallet.bitcoin.com/)
    或 [`www.bitaddress.org/`](http://www.bitaddress.org/)。


    ## 比特币网络


    比特币是一个基于工作量证明协议运行的节点对等（P2P）网络。每个作为参与者的节点只是一台运行比特币软件的计算机。节点随机选择并与其他对等节点连接。任何人都可以下载并安装比特币软件来启动新的比特币节点并加入网络。新节点可以随时加入，因此网络中的节点是动态的，并且随时都有节点加入和离开。


    当发送方使用比特币钱包签署后向接收方发送比特币时，交易将被广播到网络中的其他节点和矿工。矿工使用计算能力执行数学过程来验证交易并将它们添加到一个区块中。之后，矿工将新区块广播到网络。接收到新区块的节点将验证矿工是否遵循网络规则，并将该区块添加到自己的节点中。矿工会因其对网络的贡献获得新铸造的比特币作为奖励。交易确认后，接收方即可从发送方收到比特币。


    比特币网络上有不同类型的节点，其中主要有三种类型：全节点和超级节点、轻节点或 SPV（简单支付验证）以及挖矿节点。


    让我们详细了解不同类型的节点。


    ### 全节点


    全节点运行比特币软件来验证来自其他全节点的交易和区块。它可以一直追溯到创世区块来验证交易，然后将它们转发给其他全节点。全节点存储整个区块链历史的副本，包括所有已创建的区块。截至本文撰写时，运行一个比特币全节点需要至少
    280 GB 的可用空间。


    一个新的全节点安装客户端软件，并连接到其他对等节点。客户端软件随后会嵌入“创世”区块（区块链中的第一个节点），新节点将发送提供包含区块高度的区块头的“版本”消息。


    对等节点将通过将其与自身拥有的整个区块链数据副本进行比较来检查区块高度。如果新节点的区块数量低于其副本，对等节点将知道新节点缺失了多少个区块。对等节点可以向新节点发送缺失的区块，以便新节点赶上最新的区块数据。每个全节点在每个节点连接上最多可以有
    500 个区块。


    当将一个新节点设置为连接到比特币网络的全节点时，它将启动一个初始区块下载（IBD）过程。


    ![](img/535492_1_En_3_Fig15_HTML.jpg)


    图 3-15


    全节点初始区块下载（IBD）


    IBD 指的是从创世区块开始下载并验证区块链中直到当前区块的所有区块。根据节点连接速度以及 CPU 和内存等硬件配置的不同，整个 IBD 过程可能需要几小时到几天。在
    IBD 过程中，全节点将不会接受或发送交易。


    **增加隐私：** 连接到第三方节点会广播您的交易。它可能会收集您交易的详细信息。您的交易请求与您的 IP 地址相关联，而 IP 地址可以与您的姓名关联。为了保护您的隐私并保持真正匿名，您需要连接到您自己设置的全节点来广播和验证您自己的交易。


    运行全节点的好处如下：


    **维护去中心化：** 通过加入比特币网络，您将帮助网络变得更加去中心化和安全。全节点将通过拒绝不遵循共识规则的区块和交易来确保比特币的共识得以遵守。


    **更高的安全性：** 运行全节点允许用户创建未签名的交易，称为部分签名比特币交易（PSBT）。您可以选择一个离线钱包来签署交易，然后从您的全节点广播该交易。在此过程中，您的私钥是安全的。


    运行全节点有一些最低要求，例如：


    - 更新版本的操作软件（例如，Bitcoin Core）

    - 至少 2 GB 的随机存取存储器（RAM）

    - 您的节点每天至少运行 6 小时

    - 最低速度为 400 千比特（50 千字节）/秒的快速互联网连接

    - 至少 280 GB 的可用存储空间，最低读写速度为 100 MB/秒


    ### 轻节点或 SPV


    轻节点或 SPV（简单支付验证）执行与全节点类似的功能，但仅下载先前交易的区块头并确认区块链的有效性。与全节点相比，它节省了大量存储空间，并允许更快、成本更低的交易。一个区块头的大小仅为区块的千分之一。整个比特币区块链的总大小是
    280 GB，那么区块头的总大小大约为 280 MB。许多手机照片都比这大。对于手机或平板电脑来说，这是一个可以接受的大小。


    SPV 节点或钱包应用需要知道其用户的未花费交易输出（UTXO）——交易后剩余的比特币数量。由于 SPV 节点仅包含区块头，没有所有可供花费的 UTXO 的完整信息，因此
    SPV 节点必须连接到其他全节点，并查询以通过给定的比特币地址找到相关交易。一旦 SPV 节点通过给定的比特币地址获取了所有相关交易，钱包应用就可以找出未花费的交易输出。

