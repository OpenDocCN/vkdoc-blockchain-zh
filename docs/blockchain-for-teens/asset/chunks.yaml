    # 6. NFT: Crypto As Collectibles


    The term “`NFT`” has amassed popularity on social media and has been discussed
    in major news and journals. But what exactly is an `NFT`, and why is it important?
    Why are `NFTs` so valuable?


    In this chapter, we will address those and even give you a tutorial on how to
    create your very own `NFT`.


    In this chapter, we cover the following specific topics on `NFTs`:


    *   What is an `NFT`?


    *   Fungible vs. nonfungible


    *   A brief history of `NFTs`


    *   Applications of `NFTs`


    *   Examples of `NFTs`


    *   Selling points of `NFTs`


    *   Creating your own `NFT`


    *   `NFT` market place


    *   The future of `NFT`


    ## What Is an NFT?


    `NFT` stands for “nonfungible token.” It represents ownership of unique items
    and cannot be replicated on a blockchain. In Chapter [5](#535492_1_En_5_Chapter.xhtml),
    we introduced `ERC-721` token standard. The initial `ERC-721` specification was
    proposed by `Dieter Shirley`, `William Entriken`, `Jacob Evans`, and `Nastassia
    Sachs` in January 2018 as an `Ethereum` `Improvement` `Proposal` (`EIP`) for the
    `Ethereum` network. It defines the standard smart contracts interface, which can
    represent real-world items from digital collectibles to music, artwork, sports,
    and many other real-world assets.


    When you acquire ownership of an `NFT`, you don’t get physical copy of the `NFT`.
    In fact, if the `NFT` is a form of media, anyone can still get a copy of it. But
    the important thing is that a smart contract is created to verify the buyer’s
    ownership of an `NFT`. Anyone can see transaction and contract history for `NFTs`
    on the `Ethereum` network, similar to how cryptocurrency transactions can be viewed
    and traced by anyone.


    The `NFT` itself, however, is typically not stored in the blockchain. The owner,
    hash, token name and symbol, and link to file are stored in blockchain. So, although
    anyone can make a copy of the `NFT`, that does not mean they will own or have
    rights to it. But it is important that the buyer is not always granted all rights
    to the `NFT`. The creator may keep copyright and licensing rights, and can earn
    royalties from resells of the `NFT`, as well as choose to sell multiple replicas
    of an `NFT`.


    ## Fungible vs. Nonfungible


    In economics, fungibility refers to something that is easy to exchange or trade
    and cannot be distinguished from another. Before a good or a commodity can be
    traded or exchanged, it must be fungible. For example, the US dollar is fungible.
    Therefore, a person holding one bill can exchange it for another bill without
    changing its stored value.


    Every $1 bill has the same value, uniform, and usability as another quantity of
    the bill. Divisibility is another essential feature of fungibility, and it refers
    to the property of a good or a commodity that can be broken into smaller units
    without losing value. Just like a $10 bill can purchase the same amount of goods
    as two $5 bills or ten $1 bills. In the blockchain, `Bitcoin` (`BTC`), `Ether`
    (`ETH`), and many other cryptocurrency units have the same highly divisible. One
    `Bitcoin` should carry the same purchasing value as a medium to buy or sell goods
    regardless of whether it is split into fractions of one, two, or ten `UTXOs`.
    Most daily transactions will cost less than one `Bitcoin`, and divisibility will
    make cryptocurrency easier to exchange for other like items.


    In the previous chapter, we learned about `ERC-20`, which introduces a standard
    way to create fungible tokens. `ERC-20` defines an interface with a property,
    and each token can be exchanged the same (in type and value) as another token.
    Some popular examples are `Tether` `Tether` (`USDT`), `USD` `Coin` (`USDC`), `Shiba`
    `Inu` (`SHIB`), and `Wrapped` `Bitcoin` (`WBTC`).


    In contrast, nonfungible assets are unique and not interchangeable assets that
    a person or group owns, like art, car, book, real estate, diamonds, copyright,
    collectible, and game items.


    If a lender lends a borrower his house, it is not acceptable for a borrower to
    return to a different house and have the same ownership, even if both houses have
    the same market value. Each house has its own uniqueness. The value is judged
    across multiple complex criteria, including location, home size, usable space,
    neighborhood, and sold history.


    In addition, nonfungible assets are not divisible and cannot be broken up and
    sold in multiple pieces. The whole of the item determines the value of a nonfungible
    asset. In the blockchain, a non-fungible token (`NFT`) is a unique digital asset
    representing real-world items. People can buy and sell `NFT` from marketplace
    based on the value they believe in. Every `NFT` has a unique digital signature
    stored in an `NFT` smart contract, which provides proof of ownership to ensure
    they cannot be duplicated or destroyed in the blockchain. The blockchain will
    keep track of ownership of the `NFT` assets.


    Table [6-1](#535492_1_En_6_Chapter.xhtml#Tab1) shows the differences between fungible
    and nonfungible tokens.


    **Table 6-1** Comparing fungible and nonfungible


    |   | Fungible token | Nonfungible token |

    | --- | --- | --- |

    | Interchangeable | Fungibles are interchangeable. A token can be exchanged with
    any other token of the same type. A person holding one bill can exchange it for
    another bill without changing its stored value. One `Bitcoin` value can be exchanged
    with other `Bitcoin`, which makes no difference for holders. | Nonfungibles are
    not interchangeable. A token cannot be replaced with any other token of the same
    type. If a lender lends a borrower his house, it is not acceptable for a borrower
    to return to a different house. |

    | Uniform | Fungible tokens are uniform and have the same properties and are non-unique
    | Each token is unique and different from all other tokens of the same type. |

    | Divisible | Fungible tokens are divisible and can be broken down into smaller
    units as long as the value remains the same. For example, one `Bitcoin` is divided
    into units as small as `0.00000001 BTC`. One `Ether` can be divisible up to 18
    decimal places. | Nonfungible tokens can’t be divided, and each token has its
    own value. `NFT` assets on a blockchain are cryptographically unique identification
    codes and metadata, which provide proof of ownership to ensure they cannot be
    duplicated or destroyed. |

    | `EIP` standard and example of tokens | Well-known `EIP` for Fungible token standard
    is `ERC-20`. Some popular examples are `Tether` `Tether` (`USDT`), `USD` `Coin`
    (`USDC`), `Shiba` `Inu` (`SHIB`), and `Wrapped` `Bitcoin` (`WBTC`). Blockchain
    native cryptocurrencies such as `Bitcoin` (`BTC`) and `Ether` (`ETH`) are fungible
    tokens. | `ERC-721` is a nonfungible token standard. Some popular examples are
    artwork, cars, books, domain names, real estate, diamonds, copyright, collectible,
    and game items. |

