  trans: '

    # 区块链的工作原理


    区块链由有序的区块链条构成。当新区块生成时，会通过哈希机制连接到前一个区块。这样一来，最新数据总能被添加至链的顶端。


    想象一下，有一本涵盖全年的每日挂历。日历最初从 1 月 1 日开始。当天结束时，主人会翻到下一页，即 1 月 2 日。由于日期按线性序列排列，因此很容易判断是否有任何一页缺失或被篡改。


    ![](img/535492_1_En_1_Fig4_HTML.png)


    从区块 1 到区块 n（分别记作 T1 至 Tn）的区块链示意图，包含第 3、4、5 日以及今日。


    **图 1-4** 区块链结构示意图


    同样重要的是要知道，`bit`（比特）是一个二进制数字（0 或 1），是计算机上存储的最小数据单位。8 个比特组成 1 个`byte`（字节）。


    `哈希`是一种唯一标识符，它使用数学函数从输入文本或数据记录中生成固定长度的字符串。（我们将在第 2 章更详细地解释哈希和加密函数。）密码学哈希函数旨在保护数据免受任何篡改。


    区块链哈希算法`SHA-256`，即安全哈希算法 256，会生成一个大小为 256 比特（即 32 字节）的哈希码。`SHA-256`是一种单向哈希函数，这意味着它易于计算，但几乎无法逆向哈希以找出初始输入是什么。即使输入信息发生最细微的变化，通常也会使输出哈希完全不同。破解哈希结果的最佳方法是通过暴力破解策略，即逐一测试所有可能的组合。其思路是通过应用相同的哈希函数来猜测被哈希的原始值，并检查结果是否匹配。我们需要处理`2²⁵⁶`个
    256 位字符串的变体，总计`3.2 * 10⁷⁹`种可能组合。总计算时间将超过十亿年。


    `SHA-256`哈希也是确定性的，这意味着给定相同的输入（或文件），输出将始终返回相同的哈希值。


    表 1-2 展示了`SHA-256`哈希的示例。


    **表 1-2** `SHA-256`哈希示例


    | `SHA-256` (输入) | 输出 |

    | --- | --- |

    | Hellohello | `185f8db32271fe25f561a6fc938b2e264306ec304eda518007d17648263819692cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824`
    |

    | blockchain for teens | `ae398c6f1d78e76d472c26e091869b9913f7624abea82901c00893a0015ccd50`
    |

    | Blockchain hash | `f067428fdeb5984a6eeff5dbbe39a60cdb9dbffecdb80f18830eeb1e91d3dde5`
    |


    你可以看到，输入数据的长度并不影响输出长度——输出始终是 64 字符的文本。正因如此，几乎不可能从输出中猜出输入。区块链使用这种`SHA-256`哈希函数来对交易数据进行哈希，并确保交易不易被篡改。如果有人想篡改一笔交易，他们需要重新计算哈希，而这将完全改变输出结果。因此，当我们提到哈希时，指的是哈希算法输出的
    64 字符文本。


    每个区块的结构分为区块头和区块体，如图 1-5 所示。


    ![](img/535492_1_En_1_Fig5_HTML.png)


    区块示意图包含头部和主体。头部的标注部分为：版本号、前一个区块哈希、时间戳、nBits、Nonce（随机数）、Merkle 根（默克尔根）。主体部分标记有“交易”以及一个标记为“交易计数器”的方框。


    **图 1-5** 区块链区块结构

    '
- fmt: '### Block Header


    The Block Header is made up of a few components of block version, previous block
    hash, timestamp, `nBits`, `nonce`, and Merkle root:


    - **Block version** – The version number of the blockchain.

    - **Previous block hash** – The current block must refer to the previous block
    hash, known as the parent block, to ensure the new block is added to the chain
    in the correct order. It enables the user to know previous transactions from the
    current block. By tracing back hashes that link each block to its parent, we can
    traverse back to the first block, the *genesis block*.

    - **Timestamp** – The time and date when the block was added.

    - **nBits** – The difficulty of current consensus algorithm that was used to create
    this block. (We will cover this in the next section.)

    - **Nonce** – Known as *number used once*, a random value that a block creator
    is allowed to change in order to produce a block hash which is less than the target
    hash.

    - **Merkle root** – A Merkle tree is a hash-based data structure, also known as
    Binary hash tree. A Merkle root is the root node of a Merkle tree.


    In computer science, a tree is a data structure with a collection of nodes.


    A tree has the following properties:


    - Each node has only one parent.

    - Each node can have up to two children.

    - The tree has one node without a parent called the root node (or root). The tree
    starts from the root node.

    - Nodes are connected via an edge.

    - Each node has a data element inside.


    Figure [1-6](#535492_1_En_1_Chapter.xhtml#Fig6) is an example of binary tree.
    A, B, C, D, E, F, G, and H are all nodes. A is the root node, and B and C are
    children of A; they are connected by edge. E and F are children of B. G and H
    are children of C.


    ![Tree data structure](images/535492_1_En_1_Chapter/535492_1_En_1_Fig6_HTML.jpg)


    *Figure 1-6: Tree data structure*


    Since a Merkle tree is classified as a binary hash tree, it will share the same
    tree structure. Each leaf node is a hash of a block of data. Each node contains
    blockchain transactions data, meaning that the children’s hash is contained in
    the parent node.


    In our previous tree example, the leaf nodes will be E, F, G, and H since these
    nodes don’t have children. B, C, and A are parent nodes, A is the root node.


    If we assume node E has a transaction value, the block data is hashed using hash
    function HASH (E), which will be similar for other leaf nodes: `HASH (E)`, `HASH
    (F)`, `HASH (G)`, `HASH (H)`. When we reach the parent node, each pair of child
    nodes is rehashed recursively (repeatedly, based on a rule) until we reach the
    root node.


    Parent node B is the hash of their child nodes E, F – `HASH (HASH (E) + HASH (F))`.


    Parent node C is the hash of their child nodes G, H – `HASH (HASH (G) + HASH (H))`.


    And root node A is the Merkle root; it contains the hash of the tree nodes following
    it: `HASH (HASH(B) + HASH (C))`.


    Figure [1-7](#535492_1_En_1_Chapter.xhtml#Fig7) illustrates how to calculate the
    Merkle root hash value from the leaf-node hashes up to the root.


    ![Merkle tree hash calculation](images/535492_1_En_1_Chapter/535492_1_En_1_Fig7_HTML.png)


    *Figure 1-7: Merkle tree hash calculation*


    #### Why do we need Merkle root hash?


    In the earlier example, `H (B) = H (E) + H(F)`.


    Assume E is 1, F is 2. We will use the SHA-256 hash function.


    `SHA-256(1) = 6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b`


    `SHA-256(2) = d4735e3a265e16eee03f59718b9b5d03019c07d8b6c51f90da3a666eec13ab35`


    For simplicity, let’s concatenate (combine) both hash values together into a long
    string (`H (1) + H(2)`), so we get the following value:


    `33b675636da5dcc86ec847b38c08fa49ff1cace9749931e0a5d4dfdbdedd808a`


    But if we modify it by changing the order to concatenating (`H(2) + H(1)`), we
    get `9704a05c9afffc927899ad21907866ec72b166fd58250b57bca6a184e462d554`.


    You can see that even the slightest change will lead to completely different results.
    Considering that each block data needs to include transaction data, time stamps,
    and many other types of data, changing any of these values will cause the Merkle
    root hash to be completely different. In the earlier example, we can calculate
    the Merkle root hash as follows:


    `Merkle root hash = H (B) + H(C) = H (E) + H(F) + H (G) + H(H)`


    Root node hash represents the fingerprint for the entire node data. To verify
    the node data’s integrity, you don’t need to download the data of the entire block
    and transverse the entire Merkle tree; you just need to check whether the data
    is consistent with the Merkle root hash. If a copy of the block in the blockchain
    networks has the same hash value of Merkle root to another, then the transactions
    in that block are the same. Through this way, the transaction data can be proved
    very quickly.


    In the blockchain, each block has a Merkle root stored in the block header. The
    Merkle tree allows every node on the network to verify individual transaction
    without having to download and validate the entire block. If a copy of the block
    in the blockchain networks has the same Merkle root as another, then the transactions
    in that block are the same. Even a bit of incorrect data would lead to vastly
    different Merkle roots because of the properties of the hash. Therefore, it is
    not necessary to verify the amount of required information.


    All blocks are connected through their previous block hash as a pointer in the
    blockchain and form a block list. Since the block header contains the Merkle root
    hash, we can verify whether the block header and transactions data have been tampered
    with by executing the Hash operation. Any tiny modification of transaction data
    will cause an entire chain change of all the block hash pointers.


    So now the blockchain is linked by a continuous sequence of blocks. It will look
    like Figure [1-8](#535492_1_En_1_Chapter.xhtml#Fig8).


    ![The sequence of blocks with Merkle tree and previous block hash](images/535492_1_En_1_Chapter/535492_1_En_1_Fig8_HTML.png)


    *Figure 1-8: The sequence of blocks with Merkle tree and previous block hash*


    ### Block Body


    The block body consists of a transaction counter and transactions.


    #### Transaction Counter


    A transaction number represents the number of transactions that is stored in the
    block. Transaction Counter is 1 to 9 bytes. It is typically used to measure blockchain
    daily transaction count or *tps*—transactions per second. The following diagram
    (from `https://studio.glassnode.com/`) shows daily transaction counts for Bitcoin:


    ![Daily transaction counts for Bitcoin](images/535492_1_En_1_Chapter/535492_1_En_1_Figa_HTML.png)'
