    # 比特币的诞生


    2008 年 8 月，比特币项目的首批两位开发者中本聪和马尔蒂·马尔米注册了 `Bitcoin.org` 域名。2008 年 10 月 31 日，一个化名为中本聪的实体在
    `Bitcoin.org` 上发布了一份题为 *《比特币：一种点对点电子现金系统》* 的白皮书。中本聪提出了一种利用点对点网络防止双重支付的解决方案。该系统引入了一种工作量证明共识算法，从而消除了对中心化银行或政府金库的需求。


    在传统的中心化金融系统中，物理上不可能复制黄金，也无法将一盎司黄金复制成两盎司。这就是为什么黄金是一种价值储存手段，并且可以作为商品货币用于交换商品。


    政府发行的纸币不易被复制。例如，要想复制一张美元钞票，需要专门的设备、正确的印钞纸，以及安全线和水印等多种其他材料。将纸币变成合法的法定货币，需要一个非常繁琐、安全且复杂的过程。


    使用实物货币时，当你购买东西时，你会将黄金或纸币作为支付凭证交给对方。由于是实物交付，双方可以立即验证交易。资金从你一方转移到另一方，你无法重复花费同一笔钱。


    双重支付是数字货币交易中的一个问题，因为数字货币或数字资产是一组可以被复制并发送给多个接收者的软件代码。中心化方法通常涉及一个审计者（例如银行），由其监督和控制货币的发行、分配和验证。因此，通常需要中心化权威机构做大量工作来保证不发生双重支付，这导致数字货币交易产生佣金成本。


    2009 年 1 月 3 日，有史以来第一个比特币创世区块——0 号区块，由中本聪本人挖出，这代表了这种加密货币的生日。以下是来自 `blockchain.com`
    的比特币创世区块详情链接：[`www.blockchain.com/btc/block/0`](http://www.blockchain.com/btc/block/0)。


    该区块包含中本聪留下的一条信息。让我们找点乐子，看看它是什么，以及你如何自行验证这些信息。


    打开上述创世区块链接，你会找到“交易”部分。点击哈希链接，它会导航到交易页面。在“输入”部分下，你应该能找到 `Sigscript` 数据，其十六进制值以
    `5468652054696` 开头，如图 3-2 所示。


    ![图 3-2 - 来自中本聪的比特币创世区块交易输入](img/535492_1_En_3_Fig2_HTML.png)


    文本消息解释了输入信息，包括索引、地址、`p k script`、`sig script`、详情和金额。其中 `Sig script` 被高亮显示。


    复制这个编码后的十六进制字符串。现在，前往在线十六进制解码器页面：[`https://cryptii.com/pipes/hex-decoder`](https://cryptii.com/pipes/hex-decoder)。解码这条来自中本聪的消息。


    如果您操作正确，您的屏幕应如图 3-3 所示。


    ![图 3-3 - 第一次交易中来自中本聪的消息](img/535492_1_En_3_Fig3_HTML.png)


    消息中显示了文本和字节，说明“财政大臣正处于第二次银行救助的边缘”这则新闻。


    我们已经揭示了中本聪隐藏的信息。内容是：“The Times 03/Jan/2009 Chancellor on the brink of second bailout
    for banks。”（《泰晤士报》2009 年 1 月 3 日，财政大臣正处于第二次银行救助的边缘。）同样的文本也出现在比特币原始代码的第 1616 行注释中：


    [`https://sourceforge.net/p/bitcoin/code/133/tree/trunk/main.cpp#l1613`](https://sourceforge.net/p/bitcoin/code/133/tree/trunk/main.cpp%2523l1613)


    这条消息可能通过引用英国报纸 *《泰晤士报》* 关于政府巨额支出的报道，证明了区块时间是在当天挖出的。或者，它也可能表明大型中心化银行是中本聪眼中的问题。


    创世区块包含了有史以来创造的第一笔 50 枚比特币，这笔奖励发往了中本聪的地址：`1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa`。


    2009 年 1 月 12 日，中本聪向哈尔·芬尼发送了 10 枚比特币，这是挖出第 70 号区块后的第一笔正式比特币交易。

    '
- fmt: '# Early Development


    **Bitcoin Pizza Day (May 2010)** – On May 22, 2010, a BTC fan and programmer named
    Laszlo Hanyecz posted an unusual request on a cryptocurrency forum that offered
    10,000 Bitcoins—reportedly valued at $40 at that time—in exchange for delivery
    of two Papa John’s pizzas. California student Jeremy Sturdivant noticed this intriguing
    request and sold two pizzas to Laszlo Hanyecz in exchange for 10,000 BTC. It is
    the first physical purchase made with Bitcoin in history, recognized by the annual
    Bitcoin Pizza Day on May 22.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig4_HTML.jpg)


    A photograph depicts two Papa John''s pizzas.


    Figure 3-4: Two Papa John’s pizzas worth 10,000 Bitcoins


    **First Bitcoin exchange (July 2010)** – In July 2010, Mt. Gox launched a Tokyo-based
    first cryptocurrency exchange, once the world’s biggest Bitcoin exchange. Mt.
    Gox is an acronym for “Magic: The Gathering Online Exchange,” sometimes referred
    to as `MtGox` or `Mt Gox`. Mt. Gox accounted for more than 70% of Bitcoin transactions
    at its peak.


    **First Bitcoin mining pool (September 2010)** – In the earlier days of Bitcoin,
    mining was straightforward. You could easily generate 50 BTC using your personal
    computer. When more participants joined the network and some started mining with
    GPUs, the blocks were generated faster than desired. The Bitcoin network automatically
    adjusted the difficulty level of mining. To make mining more profitable and efficient,
    in September 2010, Marek Palatinus—also known as “slush” to many people—launched
    the world’s first Bitcoin mining pool: Slush Pool, formerly known as `Bitcoin.cz`.
    On December 16, the pool mined three blocks in its first 24 hours of operation.


    **First Bitcoin online store (February 2011)** – In February 2011, Silk Road launched
    the first online store to accept Bitcoin as payment. Silk Road is also the first
    modern darknet market. Darknet markets are dark web black markets that offer illicit
    goods such as drugs, stolen information, weapons, and services and often use cryptocurrencies
    as a payment method.


    Silk Road was founded by Ross William Ulbricht, who was arrested in 2013 and is
    currently serving two life sentences in prison for his role in Silk Road. The
    FBI eventually shut down Silk Road in 2013.


    **US dollar parity (February 2011)** – February 9, 2011 was a historic date that
    Bitcoin believers had long awaited. BTC reached one US dollar. This was the prediction
    by Bitcoin forum member `jimbobway` on January 11, 2011. He said, “When one Bitcoin
    reaches $1, we need to celebrate...I call it ‘The Parity Party.’ What will you
    do for your party?”


    **Litecoin (October 2011)** – In October 2011, a former Google engineer named
    Charlie Lee created Litecoin (LTC), a cryptocurrency forked from the Bitcoin blockchain.
    Litecoin was initially designed to create fast payments with fewer block times
    and higher transaction throughput. As opposed to 10 minutes on Bitcoin, Litecoin
    takes roughly 2.5 minutes per block. Bitcoin uses SHA-256 encryption algorithm,
    and Litecoin uses `Scrypt`—a memory-intensive algorithm designed to make it more
    difficult and costly to perform large-scale hardware attacks by requiring large
    amounts of memory.


    **Bitcoin Foundation (September 2012)** – In September 2012, Bitcoin Foundation
    was established. The original members included Gavin Andresen, Charlie Shrem,
    Mark Karpeles, Peter Vessenes, Roger Ver, and Patrick Murck. The Foundation''s
    mission is “aim to standardize, protect and promote the use of Bitcoin cryptographic
    money for the benefit of users worldwide.”


    **First Bitcoin bubble (November 2013)** – Just short of four years after Bitcoin''s
    birth, on November 28, 2013, Bitcoin''s price soared to the all-time high of $1,217,
    surpassing $1,000 for the first time. The total market value of Bitcoins in circulation
    was around $4 billion. This is the first Bitcoin bubble. After that, the price
    gradually declined, dropping to US$172.15 in January 2015.'
