- fmt: '# How to Swap on Aave


    Due to its governance structure, the Aave platform treats the `USDT`, `sUSD`,
    and `SNX` tokens as a significant centralization risk. Their counterparty risk
    is too high both in terms of centralization and trust. So `USDT` as a collateral
    option is disabled in the platform:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figal_HTML.png)


    A screen displays the Aave platform presented with tether options. It includes
    reserve size, available liquidity and other details in the title bar. Below it
    is the reserve status and configuration supply info with a graph plotting supply
    APR, and collateral usage circled.


    In this case, we will convert centralized `USDT` stablecoin to Decentralized stablecoin
    `DAI`. We will use the swap function in Aave.


    **Step 1** – Click on the "swap" button from supplied `USDT` asset. A swap window
    will pop up. Enter the amount you want to Swap and select the target swap token.
    In this case, it will be `DAI`. The page will show the price impact in current
    market conditions and provide an option to select the Max slippage rate. Next,
    click on "approve to continue" button.


    **Step 2** – Once the swap gets approved, the "swap" button will be enabled. Click
    on it once the transaction is completed. An "all done" confirmation window will
    show up:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figam_HTML.png)


    A set of three screens. 1\. The Ethereum market page presented with supplies and
    assets to supply options with enabled withdraw and supply buttons, respectively.
    2\. The Swap the USDT page with price impact and enabled approve button. 3\. The
    all done window.


    **Step 3** – Close the "all done" window and return to the dashboard. The dashboard
    will show the swapped `DAI` token with collateral enabled under the "your supplies"
    section:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figan_HTML.png)


    A screen displays the supplies option presented with `DAI` and `USDT` assets,
    balance, APY and collateral details. The `DAI` asset is enabled with the collateral
    button.


    # How to Borrow on Aave


    Now we have Deposit `DAI` as collateral, and we can borrow some assets from Aave.
    In this demo, we will borrow `BUSD` (Binance USD stablecoin):


    **Step 1** – Click the `BUSD` "Borrow" button under the "asset to borrow panel."
    The "Borrow BUSD" window will pop up. Enter the amount you want to borrow for
    `BUSD`. There is Health factor information on the page. The health factor is a
    borrower''s loan-to-value ratio, representation of your liquidation threshold,
    or the percentage at which a loan is defined as undercollateralized. It uses to
    measure the risk of your fund. The higher the value means safer the state of the
    funds, and you need to keep it above `1.0` to avoid losing funds.


    Click on the "Borrow BUSD" button. Confirm the Metamask transaction.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figao_HTML.png)


    A set of three windows. 1\. The supplies panel enabled with collateral `DAI` asset.
    2\. The borrow panel has the borrow and details button in the asset to borrow,
    `BUSD`. 3\. Borrow `BUSD` popup has enabled borrow button, and amount to borrow
    option.


    **Step 2** – Once the borrow transaction is completed, an "all done" confirmation
    window will appear. Next, you will be asked to add the `BUSD` token to your wallet.
    Add the `BUSD` to your wallet.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figap_HTML.png)


    A set of two screens. 1\. The screen displays all done window with add to wallet,
    and ok close buttons. 2\. The all done window, and the add `BUSD` token to the
    wallet option is presented in the Metamask notification window.


    # How to Repay on Aave


    We just borrowed two `BUSD` from the Aave platform. In this section, we will demo
    how to pay back `BUSD`.


    **Step 1** – In order to pay back the loan, you simply go to the "Your borrowings"
    section of the dashboard and click on the "Repay" button for `BUSD`.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figaq_HTML.png)


    Two screen displays your supplies, and your borrows. The supply screen has withdraw
    and swap button with other details. The borrow screen has repay and borrow buttons
    for `BUSD` with other details.


    **Step 2** – The "Repay BUSD" window will pop up. Enter the amount you want to
    borrow for `BUSD`. The page will show your remaining debt and health factor information.
    Next, click on the "approve to continue" button.


    **Step 3** – Once repay gets approved, the "Repay BUSD" button will be enabled.
    Click on it once the transaction is completed. An "all done" confirmation window
    will show up. Your `BUSD` is now repaid:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figar_HTML.png)


    3 screen displays the steps for repaying `BUSD`. The 2 screen has the option to
    repay with wallet balance or collateral on the top. Below it the amount can be
    entered, the transaction overview is displayed. The approve to continue, and repay
    `BUSD` is enabled in the 1 and 2 screens, respectively. The all done screen displays
    the amount repaid.'
