- fmt: '# Acceptance As a Mainstream Currency


    **CME to launch Bitcoin futures (December 2017)** – The Chicago Mercantile Exchange
    (`CME`) Group Inc. is an American global markets company for trading futures and
    options. In response to increasing investors’ interest in the evolving cryptocurrency
    markets, `CME` got clearance from the U.S. Commodity Futures Commission and introduced
    a Bitcoin futures contract trading on December 18, 2017.


    `CME` Bitcoin futures will allow investors to bet on the future price of Bitcoin
    without the need to hold the underlying Bitcoin.


    A futures contract is a legal agreement in which the buyer and seller agree to
    buy or sell a commodity or asset at a predetermined future date and price. For
    example, the Bitcoin price was $22,000 on July 1. If someone thinks the price
    will go higher, they will buy a Bitcoin future at $23,000 a month later. On August
    1, if the Bitcoin market price is $23,500 and if the futures contract expires,
    the buyer will get the $500 difference.


    Futures trading has a long history. The first modern futures exchange began in
    1710 in Osaka, Japan, and cotton futures started on the New York Cotton Exchange
    in about 1870. Professional investors and firms typically trade futures. A Bitcoin
    future could open the door to bringing more Wall Street firms into the Bitcoin
    and other cryptocurrency space and help reduce volatility in the underlying Bitcoin
    market.


    **New Zealand legalizes crypto-salaries (September 2019)** – On September 1, 2019,
    New Zealand Inland Revenue Department (`IRD`) officially declared that an employee
    could be paid a salary using cryptocurrencies such as Bitcoin and Ether. It means
    a company can directly pay workers in cryptocurrency as long as it is under an
    employment agreement. As a result, New Zealand became the first country to legalize
    crypto-salary payment options and brought cryptocurrencies into everyday payment
    methods.


    **MicroStrategy Bitcoin purchased (August 2020)** – On August 11, 2020, a leading
    worldwide business intelligence company MicroStrategy Inc (`NASDAQ: MSTR`) announced
    that it had purchased 21,454 Bitcoins (worth $250 million at that time). MicroStrategy
    became the first public listed company to buy Bitcoin as a legitimate investment
    asset. The MicroStrategy purchase signifies Bitcoin’s growing legitimacy and mainstream
    adoption.


    **PayPal launched Bitcoin payment service (October 2020)** – On October 21, 2020,
    PayPal received a conditional BitLicense from the New York State Department of
    Financial Services (`DFS`). With approval from `DFS`, on November 12, 2020, PayPal
    launched a new payment service that allowed PayPal users to buy, hold, and sell
    cryptocurrency. PayPal has nearly 350 million users and over 26 million active
    merchants in the system. It almost took a decade to gain 100 million Bitcoin users.
    The payment giant’s adoption meant an additional 300 million more users could
    start using Bitcoin and other cryptocurrencies as payment methods.


    **Cryptocurrency users reached more than 100 million (January 2021)** – During
    COVID-19, global cryptocurrency users grew rapidly. According to a report from
    Crypto.com, more than 100 million people are now using cryptocurrencies worldwide
    for the first time ever.


    **Coinbase launch (April 2021)** – On April 14, 2021, riding the wave of the overall
    cryptocurrency market boom as one of the most anticipated events on Wall Street,
    Coinbase Global Inc. went public on Nasdaq. Coinbase is the largest by volume
    and the most liquid-regulated cryptocurrency exchange in the United States. As
    the first major crypto exchange listing on Nasdaq, Coinbase sets a benchmark for
    other crypto exchanges, and the launch is a watershed moment for the digital asset
    industry. Coinbase (`COIN`) opened at around $340 per share and was valued at
    $86 billion.


    **El Salvador made Bitcoin legal tender (September 2021)** – In June 2021, President
    Nayib Bukele announced his Bitcoin Law at a Miami Bitcoin 2021 conference.


    On September 7, 2021, El Salvador became the first country in the world to accept
    Bitcoin as legal tender alongside the dollar. The new law required companies to
    accept Bitcoin as payment. The government also launched a national virtual wallet
    called `chivo` based on the Lightning Network protocol that allows no-fee transactions
    and fast payments.


    **First US Bitcoin exchange-traded fund (`ETF`) (October 2021)** – An exchange-traded
    fund, or `ETF`, is exactly as the name implies: an investment fund that can be
    traded on exchanges. When you invest in an `ETF`, you can buy and sell on the
    stock market, just like company stocks. `ETF`s generally track a specific index—for
    example, the `Spider` `ETF` (The `SPDR S&P 500` – `SPY`) is the most widely known
    `ETF` that tracks the `S&P 500` Index. `ETF` is one of the most popular investment
    options today throughout the world. The first US `ETF` (`SPY`) launched in 1993;
    iShares launched its first bond `ETF` `LQD` in 2002; the `SPDR Gold Trust` `ETF`
    is the first gold-backed `ETF` in the United States. On October 19, 2021, the
    first US Bitcoin exchange-traded fund (`ETF`), ProShares Bitcoin Strategy `ETF`
    (`BITO`), started trading. The ProShares Bitcoin Strategy `ETF` attracted more
    than $1 billion in assets in its first two days of trading. Compared to the gold
    `ETF`, `GLD` took three days to reach ten digits. `BITO` became one of the most
    heavily traded `ETF`s in market history.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig10_HTML.jpg)


    A text depicts the `NYSE`. It mentions the proshares bitcoin strategy of `BITO`.
    It includes listening, trading and data, about and insights.


    **Figure 3-10** NYSE-listed `BITO`


    Bitcoin `ETF` provides a way for institutional and retail investors to invest
    in the crypto market on traditional stock market exchanges instead of cryptocurrency
    trading platforms. As a result, investors who were previously frightened by the
    technical complexity of trading and other security concerns needn’t create new
    crypto wallet accounts to hold the tokens and can indirectly invest in the Bitcoin
    market.


    **Bitcoin’s price reached over $68,000 (November 2021)** – On November 5, 2021,
    Bitcoin’s price hit a new all-time high at $68,521. The soaring Bitcoin price
    pushed the cryptocurrency market capitalization to above $3 trillion. This indicates
    that Bitcoin is becoming a leading innovative payment model and is increasing
    mainstream adoption.


    **Taproot – Bitcoin privacy update (November 2021)** – After SegWit was activated
    in August 2017 and SegWit2x was canceled three months later, it has been four
    years since Bitcoin had a major upgrade. Finally, on November 14, 2021, Taproot—Bitcoin
    community’s most anticipated upgrade since 2017—went live. It is a milestone for
    Bitcoin, and Taproot received almost universal support from miners, developers,
    and users.


    Taproot is a soft fork upgrade initially proposed by Bitcoin core developer Gregory
    Maxwell in January 2018. Since then, the proposal has been reviewed, discussed,
    and tested in numerous rounds in the community.


    While SegWit and the Lightning Network’s primary objective is improving transaction
    speed and reducing fees, Taproot aims to address Bitcoin’s scalability, privacy,
    and transparency challenges.


    The Taproot update includes three main improvements:


    *   `BIP340` – Upgrading Bitcoin’s core cryptography by replacing the legacy Elliptic
    Curve Digital Signature Algorithm (`ECDSA`) with Schnorr. Schnorr public keys
    are 32 bytes, and signatures will be 64 bytes long, compared to `ECDSA` public
    keys—33 bytes—and signatures 72 bytes long. The upgrade makes complicated Bitcoin
    transactions more secure, simpler, and cheaper.


    *   `BIP-341` – Merkleized Alternative Script Trees (`MAST`), which introduces
    a Taproot feature, aims to enable the Bitcoin network to execute smart contracts.
    It brings the potential to support decentralized finance (`DeFi`) and NFT projects
    with BTC with Schnorr signatures.'
