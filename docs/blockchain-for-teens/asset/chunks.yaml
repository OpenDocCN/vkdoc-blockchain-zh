    # 如何在 Aave 上进行兑换


    由于其治理结构，Aave 平台将 `USDT`、`sUSD` 和 `SNX` 代币视为重大的中心化风险。无论从中心化程度还是信任角度来看，它们的对手方风险都过高。因此，平台禁用了
    `USDT` 作为抵押品的选项：


    ![](img/535492_1_En_8_Figal_HTML.png)


    屏幕展示的是带有泰达币选项的 Aave 平台界面。标题栏中包含了储备规模、可用流动性以及其他详细信息。下方是储备状态和配置供应信息，并附有供应年化利率图表，以及已圈出的抵押品使用情况。


    本例中，我们将把中心化的 `USDT` 稳定币兑换为去中心化的稳定币 `DAI`。我们将使用 Aave 中的兑换功能。


    **步骤 1** – 在已供应的 `USDT` 资产上点击“兑换”按钮。将会弹出一个兑换窗口。输入您想要兑换的金额，并选择目标兑换代币。本例中为 `DAI`。页面将显示当前市场条件下的价格影响，并提供选择最大滑点率的选项。接下来，点击“批准以继续”按钮。


    **步骤 2** – 一旦兑换获得批准，“兑换”按钮将被启用。待交易完成后点击该按钮。将会出现一个“全部完成”的确认窗口：


    ![](img/535492_1_En_8_Figam_HTML.png)


    一组三个屏幕。1. 以太坊市场页面，显示了供应品和可供供应的资产，并分别启用了提现和供应按钮。2. 兑换 USDT 页面，显示了价格影响和已启用的批准按钮。3.
    “全部完成”窗口。


    **步骤 3** – 关闭“全部完成”窗口，返回仪表盘。仪表盘将在“您的供应”部分下显示已兑换的 `DAI` 代币，并已启用其抵押功能：


    ![](img/535492_1_En_8_Figan_HTML.png)


    一个屏幕显示了供应选项，列出了 `DAI` 和 `USDT` 资产、余额、年化收益率以及抵押品详细信息。`DAI` 资产的抵押按钮已启用。


    # 如何在 Aave 上进行借款


    现在我们已经存入了 `DAI` 作为抵押品，可以从 Aave 借入一些资产了。在本演示中，我们将借入 `BUSD`（币安美元稳定币）：


    **步骤 1** – 在“可借资产”面板下点击 `BUSD` 的“借入”按钮。“借入 BUSD”窗口将会弹出。输入您想要借入的 `BUSD` 金额。页面上会显示健康因子信息。健康因子是借款人的贷款价值比，代表了您的清算门槛，或者说贷款被定义为抵押不足的百分比。它用于衡量您资金的风险。数值越高意味着资金状态越安全，您需要将其保持在
    `1.0` 以上以避免损失资金。


    点击“借入 BUSD”按钮。确认 MetaMask 交易。


    ![](img/535492_1_En_8_Figao_HTML.png)


    一组三个窗口。1. 供应面板，已启用 `DAI` 资产作为抵押品。2. 借入面板，在可借资产 `BUSD` 中包含了借入和详情按钮。3. 借入 `BUSD`
    弹出窗口，已启用借入按钮和借入金额选项。


    **步骤 2** – 一旦借入交易完成，“全部完成”确认窗口将会出现。接下来，系统会要求您将 `BUSD` 代币添加到您的钱包。将 `BUSD` 添加到您的钱包。


    ![](img/535492_1_En_8_Figap_HTML.png)


    一组两个屏幕。1. 屏幕显示“全部完成”窗口，包含“添加到钱包”和“确定关闭”按钮。2. “全部完成”窗口，并且在 MetaMask 通知窗口中显示了将 `BUSD`
    代币添加到钱包的选项。


    # 如何在 Aave 上进行还款


    我们刚刚从 Aave 平台借入了两个 `BUSD`。在本节中，我们将演示如何偿还 `BUSD`。


    **步骤 1** – 为了偿还贷款，您只需前往仪表盘的“您的借款”部分，并点击 `BUSD` 的“还款”按钮。


    ![](img/535492_1_En_8_Figaq_HTML.png)


    两个屏幕分别显示您的供应品和您的借款。供应屏幕包含提现和兑换按钮以及其他详细信息。借款屏幕为 `BUSD` 提供了还款和借入按钮以及其他详细信息。


    **步骤 2** – “还款 BUSD”窗口将会弹出。输入您想要偿还的 `BUSD` 金额。页面将显示您剩余的债务和健康因子信息。接下来，点击“批准以继续”按钮。


    **步骤 3** – 一旦还款获得批准，“还款 BUSD”按钮将被启用。待交易完成后点击该按钮。将会出现一个“全部完成”的确认窗口。您的 `BUSD` 现已偿还：


    ![](img/535492_1_En_8_Figar_HTML.png)


    3 个屏幕展示了偿还 `BUSD` 的步骤。第 2 个屏幕顶部提供了使用钱包余额或抵押品进行还款的选项。其下方可输入金额，并显示交易概览。在第 1 和第 2
    个屏幕中分别启用了“批准以继续”和“还款 BUSD”按钮。“全部完成”屏幕显示了已偿还的金额。

