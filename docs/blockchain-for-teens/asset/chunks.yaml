- fmt: '### Smart Contract


    A contract is a written and oral arrangement between two or more parties to do
    certain things.


    Here are just a few examples in our everyday life:


    - **House rental contract** – A lease agreement between a landlord who rents a
    property to a tenant in exchange for monthly payments.

    - **Landscaping contract** – An obligation between the landscaper and the client.

    - **Software license agreements** – An agreement between the software company
    and customers to offer the right to use software legally.

    - **Personal loan** – A written agreement between a lender that lends money to
    a borrower in exchange for a refund plus interest.


    An effective contract will describe the formal requirements in detail, the responsibilities
    each party must follow, when and how contract items ought to be performed, and
    what happens when these rules are not followed. As a result, contracts act as
    a reliable document for each party expected to meet as planned.


    Smart contracts are very similar, but the contracts are implemented for these
    detailed agreements by using computer code. They can''t be changed once created
    in a decentralized blockchain network. When the conditions are met, smart contracts
    will be executed automatically instead of by a third party. Since blockchain is
    decentralized, immutable, and transparent, everyone in the network can publicly
    verify the smart contract transaction result.


    Nick Szabo was the first person to describe smart contracts. He published a paper
    *The Idea of Smart Contracts* in 1997. He imagined converting contracts into code
    to achieve self-enforcing contracts that removed the need for trust among the
    parties. To illustrate his concept, Nick used a vending machine to explain how
    smart contracts work. When you insert the correct amount of money into the machine,
    you get the desired product. The software instructions inside the vending machine
    guarantee that the contract will be fulfilled as intended. Today, this idea has
    now spread all over the world.


    Ethereum is the most popular smart contract platform. Anyone can create smart
    contracts in the blockchain. The code is transparent and publicly verifiable.
    Everyone can see what kind of implementation logic is for smart contracts. Here
    is an example of SHIBA INU from `etherscan.io`.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig7_HTML.png)


    A screenshot of the ethereum S H I B A I N U contract depicts a token application
    of the overview field select contract, and profile summary. At the top right there
    are 4 drop down icons.


    **Figure 4-7** Ethereum SHIBA INU contract example


    In Ethereum, smart contracts are written in a variety of programming languages,
    including `Solidity` and `Vyper`. `Solidity` is the most popular Smart contract
    language used in Ethereum as we will explore more in a later section.


    Each network computer node stores a copy of all existing smart contract codes
    and their current state alongside transaction data. A user is typically required
    to pay a gas fee to execute the function of the smart contract and include the
    transaction in a new block.


    ### Ethereum Virtual Machine (`EVM`)


    A "Virtual Machine" or "VM" is a simulated computer system you can use to run
    software on a physical computer. Virtual machines are essentially establishing
    an isolate level between a simulated computer system and the running operation
    system like Windows, macOS, or Linux. For instance, using "Parallels Desktop for
    Mac," you can run Windows on your Apple Mac computer, as shown in Figure 4-8.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig8_HTML.jpg)


    An image of a laptop showing windows running on a Mac laptop. Menu bar is in the
    top left corner and status bar is in the top right corner. 15 icons are present
    in the bottom row.


    **Figure 4-8** VM example – Window runs on Mac


    The Ethereum Virtual Machine (`EVM`) is a Turing-complete virtual machine that
    allows `EVM Byte Code` runs on an isolated and sandboxed runtime environment.
    `Bytecode` is compiled from a high-level smart contract programming language such
    as `Solidity`.


    On Ethereum, smart contracts are typically written in a high-level programming
    language called `Solidity`. `Solidity` compiler compiles smart contract into low-level
    binary machine code (`Bytecode`). A user just needs to send an Ethereum transaction
    containing these `Bytecodes`, and this transaction doesn''t need to specify any
    recipient. Once the contract transaction is committed to the blockchain, a new
    Ethereum account is created. The contract account stores the contract balance,
    the contract nonce, the code, and the data. The contract account storage hash
    is effectively a hash of the smart contract''s data. The creation of a contract
    address is determined based on the sender''s `EOA` address and nonce. `RLP` encoded
    nonce and `EOA` address data and hashed with `keccak-256` algorithm. `RLP` (Recursive
    Length Prefix) is the way of encoding arbitrarily nested arrays of binary data.
    When you call a smart contract function, you interact with this contract address,
    and the contract storage `Opcode` will instruct `EVM` to execute the operation.
    The contract deployment process is illustrated in Figure 4-9.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig9_HTML.png)


    A flow chart from a human figure flows through `EOA`, smart contract, `bytecode`
    and `OPCODE`, contract address, and block diagram of `EVM`.


    **Figure 4-9** Smart contract deployment


    Once the contract is compiled, the compiler will generate `Abi`, `Bytecode`, and
    `Opcode`. `ABI` (Application Binary Interface) is a `JSON` (JavaScript Object
    Notation) file that describes the deployed contract and its functions. It allows
    us to call contract functions externally. `Bytecode` and `Opcode` (operation code)
    are compact binary representations. They are stored on the blockchain and associated
    with a contract address.


    `EVM` runtime environment will interpret `Bytecode` to correspond to a series
    of `Opcode` as a set of instructions and execute the `Opcode` when the user calls
    smart contracts. Figure 4-10 shows compiled contract `Bytecode` and `Opcode` example.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig10_HTML.png)


    The bytecode and opcodes. They begin with object and opcodes respectively. The
    codes consist of numbers and alphabets.


    **Figure 4-10** Solidity compiled `Bytecode` and `Opcode` example


    You can find the `Opcodes` reference for each `Bytecode` from Ethereum''s official
    website ([https://ethereum.org/en/developers/docs/evm/opcodes/](https://ethereum.org/en/developers/docs/evm/opcodes/)).
    There are around 148 unique `Opcodes`, which enable `EVM` to compute almost any
    task to make it a Turing-complete machine.


    The `Opcodes` can be divided into the following categories:


    - Arithmetic operations, comparison, and bitwise logic operations (`ADD`, `SUB`,
    `GT`, `LT`, `AND`, `OR`, etc.)

    - Execution context inquiries (`CALL`, `DELEGATECALL`, `CALLCODE`, etc.)

    - Stack, memory, and storage access (`POP`, `PUSH`, `UP`, `SWAP`, `LOAD`, `STORE`,
    `MSSTORE 8`, `M SIZE`, etc.)

    - Control flow operations (`STOP`, `RETURN`, `REVERT`, etc.)'
