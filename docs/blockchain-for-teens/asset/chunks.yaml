- fmt: '# How Augmented Reality Works


    We just discussed Simultaneous Localization and Mapping technology (`SLAM`) plays
    a critical role in Marker-less AR. `SLAM` keeps track of a device’s location by
    collecting data from the indoor or outdoor environment via the device’s hardware,
    such as the video camera, GPS, and other sensors, and then creating proper virtual
    3D objects.


    `SLAM` technology is widely used in various industries, mainly autonomous vehicles,
    robots, and augmented virtual reality.


    The architecture of a `SLAM` system includes two types of components used to complete
    `SLAM`. The first component is sensor signal processing, including front-end processing,
    primarily relying on the sensors used.


    The second component is pose-graph optimization, including the sensor-agnostic
    back-end processing.


    Two types of `SLAMS` can be used for front-end processing to collect data: SLAM
    Visual `SLAM` and LiDAR `SLAM`. Visual `SLAM` (`vSLAM`) uses cameras to capture
    or collect the surrounding imagery and track a set of points through successive
    camera frames, while LiDAR `SLAM` utilizes a laser sensor to read the data.


    The front-end processing abstracts sensor data into models amenable for estimation,
    while the back end performs inference on the data produced by the front end. As
    a result, `SLAM` can estimate their 3D position to create the map. The `SLAM`
    process is shown in Figure [7-4](#535492_1_En_7_Chapter.xhtml#Fig4).


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig4_HTML.png)


    A schematic depicts the visual `SLAM` system of front and back end. The labeled
    parts are the camera, laser sensor, sensor data, `SLAM` estimation, abstracts
    and process sensor data, and map estimation.


    **Figure 7-4** — Front end and back end in a Visual `SLAM` system


    ## Virtual Reality (VR)


    The term “virtual reality” first appeared in the 1982 novel *The Judas Mandala*
    by Damien Broderick, a popular Australian science fiction author.


    Widespread adaption of the term “virtual reality” as VR technology in the popular
    media is credited to VR developer Jaron Lanier, who designed the first business-grade
    virtual reality hardware, and the 1992 Lawnmower Man movie, which introduced the
    use of virtual reality systems to a wider audience.


    ### What Is Virtual Reality?


    Virtual reality is a computer-generated environment that makes users feel a rich,
    immersive experience in their surroundings. By wearing a Virtual Reality headset
    or related application, the VR produces computer 3D images and videos by adding
    depth. The system will also reconstruct the scale and distances between static
    2D images to imitate real-life visual experiences. VR allows users to immerse
    themselves into unique simulations they can engage with and explore while believing
    that they are executing it in the real world.


    ### Types of VR


    VR systems are classified into three primary types: non-immersive VR, semi-immersive
    VR, and fully immersive VR, as shown in Figure [7-5](#535492_1_En_7_Chapter.xhtml#Fig5).


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig5_HTML.png)


    A flow diagram depicts the types of virtual reality. The labeled types are non-immersive
    VR, semi-immersive VR, and fully immersive VR.


    **Figure 7-5** — Type of VR


    #### Non-immersive VR


    Non-immersive virtual reality is a virtual reality that displays virtual content
    on screens via a computer or game console. It is the least immersive and least
    expensive of all VR types. Users interact with non-immersive VR using computer
    input devices like keyboards, mice, and controllers.


    **Example:** A video game is a good example of a non-immersive VR experience.


    #### Semi-immersive VR


    Semi-immersive virtual experiences provide users with a partially virtual environment
    between non-immersive and fully immersive VR. Using a computer screen or VR device
    such as glasses tracking sensors and projector systems, the user can move around
    in a virtual environment but still see themself. The system is not considered
    a fully immersive simulator.


    **Example:** A flight simulator for pilot trainees and a virtual tour are good
    examples of semi-immersive VR.


    #### Fully Immersive VR


    Immersive VR simulation is a technology that gives users the highest level of
    fully immersive virtual experience and is completely separated from the real world.
    It allows the participant to interact with stereoscopic 3D objects generated by
    VR devices like VR glasses, gloves, and body detectors and establish a realistic
    virtual experience.


    **Example:** An example of fully immersive VR is Virtual Mountain Biking. Players
    ride an indoor bike with a VR headset. They can ride their bikes in places they
    have never been before with an exciting experience and interact with other players
    in the virtual environment.


    ### How Virtual Reality Works


    Truly immersive virtual reality can trick people’s minds into believing it exists
    and take them somewhere virtually other than where they are. However, generating
    these experiences involves many complex technologies behind the scenes.


    #### Field of View (FOV)


    The approximate field of view (`FOV`) of an individual human eye is about 135
    degrees horizontally and slightly more than 180 degrees vertically. A human typically
    can see a 200–220-degree arc around their head. The overlap of the same scene
    from a human’s left and right eyes is around 114 degrees, which we can see in
    3D. This `FOV` is necessary for a human brain to calculate depth perception. In
    the case of virtual reality, `FOV` means how much of the virtual world a participant
    can see around them simultaneously. The VR headsets camera simulates human eye
    positions and a defined `FOV` degree that people can expect. The headsets also
    have gyroscopic sensors to track how you’re moving, adjust your view, and enable
    you to explore 360-degree scenes. All of these will greatly improve the fully
    immerses experience. Most VR headsets today generally support 114-degree 3D vision
    space to deliver virtual content.


    ![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig6_HTML.png)


    A diagram depicts the field of human virtual reality in different views left,
    up, right, and down.


    **Figure 7-6** — Field of view (FOV)


    #### Frame Rate (FPS)


    Frame rate/FPS (frames per second) defines the speed at which the Graphics Processing
    Unit (`GPU`) can process an image per second. Frame rate is related to resolution,
    which shows the amount of detail in the image over time. For example, with a frame
    rate of 50 `FPS`, you will see 50 samples in one second. In the next second, it
    will show another 50 samples. Suppose an object moves with your view. In that
    case, you will only see those 50 samples updated position per second. Other samples
    will be invisible to you between those snapshots. If you increase the frame rate
    to 500 `FPS`, you will get ten times more samples every second. The result will
    be much better imagery, smoother motion, and a more immersive experience. A lower
    frame rate will typically have worse effects. Studies have shown that anything
    less than 60 `FPS` causes feelings of disorientation, nausea, and other negative
    side effects in the user. VR developers typically aim for a minimum of 60 `FPS`–90
    `FPS`.


    #### Position and Head Tracking


    In an immersive virtual environment, tracking the user’s real-time headset position
    to determine position and orientation is important. Users can move within a virtual
    environment that adjusts when they do. `SLAM` is widely used for Head and Eye
    Tracking in VR.


    #### Spatial Audio and Sound Effects


    Spatial Audio provides multidimensional and immersive audio that follows the movement
    of the user’s device. The device intensively processes user movement data, generates
    the different frequencies of a sound, and shifts differently for every direction
    the sound could be coming from. The result creates a three-dimensional sound effect
    that gives the user an experience that mimics how they hear sound in real life.'
