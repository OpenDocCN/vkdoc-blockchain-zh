  trans: '

    ### 数字地产


    虚拟财产是一个随着元宇宙日益普及而很可能在未来增长的领域。玩家可以在虚拟世界中购买房产，供自己“居住”或日后以更高价格出售。NFT 使跟踪虚拟土地的所有权变得简单，同时也省去了对中间商的需求——买家可以直接从市场购买房产。购买记录和土地信息将自动包含在区块链中，而非办公室或纸质文件中。


    以下是一些 NFT 房地产的示例：


    - `Sandbox` 是一个虚拟世界，玩家可以使用积木来自定义他们的游戏体验。用户可以完全掌控自己的体验，并可以在其土地上添加资产。

    - 由 `Krista Kim` 创作的 `Mars House` 以 `288` 以太币（当时约合 `514,557` 美元）售出。该住宅完全虚拟，专为在元宇宙中参观而设计。


    ### 交易卡


    交易卡向来是一种实体现象，但在 NFT 领域中也越来越受欢迎。将交易卡存储为 NFT 使其更易于交换，并能证明卡片的真实性。通常，交易卡没有内在价值，其成功主要源于稀缺性和收藏欲望。


    以下是一些 NFT 交易卡的示例：


    - `Gods Unchained` 是一款基于区块链、使用交易卡牌组的多人游戏。玩家可以将游戏内物品作为 NFT 赚取，并将其出售换取现实世界的现金。

    - `Curio Cards` 是一套包含 30 张交易卡的系列。每张卡的发行量各不相同，但铸造的卡片总数为 `29,700` 张。

    - `Candy Digital` 是一个 NFT 平台，玩家可以在其中交易和收集官方美国职业棒球大联盟的 NFT。该平台还包含签名、球衣、图片、视频内容以及其他独家物品。


    ### 电子游戏物品


    许多电子游戏允许玩家收集游戏内物品，例如装备、消耗品和皮肤，以自定义体验并在游戏中取得进展。然而，获取物品可能耗时或困难，这就是为什么当游戏开发者允许玩家购买装备时，他们常常能获得巨额利润。


    将这些游戏内物品列为 NFT 可以帮助开发者和玩家跟踪物品的状态和属性。这尤其有利，因为所有者可以证明物品的真实性，而买家可以展示其所有权。将游戏内物品创建为
    NFT 还可以在玩家不再需要时帮助他们出售物品。这也消除了对二级市场的需求，二级市场通常存在欺诈者，且有时在游戏中并不被允许。


    以下是一些 NFT 电子游戏物品的示例：


    - 来自 `Axie Infinity` 的 `Genesis Land Plots` 包括游戏中的数字土地。曾有 `9` 块土地以 `150 万美元` 的价格被购买。

    - 来自 `Crypto Kitties` 的 `Dragon Kitty` 是该宠物繁殖游戏中可用的独特猫咪之一。该宠物以 `600` 以太币（约 `130
    万美元`）的价格售出。

    - `Mobile Legends` 是一款手游，推出了名为 `The Aspirants Mystery Box` 的 NFT 系列。该系列包含 `12`
    个盲盒，每个盲盒都有一个数字形象和游戏角色的动画。

    - `Summoners Arena` 是一款基于区块链的 MMORPG。其中的英雄和游戏内物品都是 NFT。


    ### 时尚


    独立设计师和大型品牌都对时尚 NFT 产生了兴趣。甚至已经出现了加密时装周和元宇宙时装周，展示虚拟系列和数字服装。NFT 时尚物品可以包括用户可在虚拟环境或数字头像中穿戴的可穿戴设备，或者是实体时尚物品的数字模型。


    以下是一些 NFT 时尚的示例：


    - 由 `Balmain` 和 `Barbie` 合作的 `Balmain x Barbie` 系列推出了三个穿着粉色服装的玩偶。购买芭比头像后，买家将拥有该头像以及一件真实大小的芭比服装。

    - `MANGO` 是一个时尚集团，为在 `Decentraland` 举办的元宇宙时装周创作了三个 NFT。该系列在虚拟空间中展示并上传至 `OpenSea`，但并未出售。


    ### 3D 模型


    3D 模型可以是抽象或现实世界物体的设计或表现。3D 模型本身可以在屏幕上或通过虚拟/增强现实头显进行查看、旋转、移动和互动。该模型也可以使用 3D 打印机打印出来。3D
    模型对于虚拟现实和增强现实、医学、工程、电子游戏、科学成像、建筑、电影、广告和插画等行业至关重要。


    ### 文本


    文本，例如书籍、诗歌、文章和引文中的文字，已经被打上品牌标签并作为 NFT 出售。


    以下是一些 NFT 文本的示例：


    - 蒂姆·伯纳斯-李爵士创作的 `“万维网源代码”` 是创建了最初万维网的 `9,555` 行代码，以 `540 万美元` 的价格售出。

    - 凯文·罗斯撰写的 `“在区块链上购买此专栏！”` 是一篇关于 NFT 的文章，其本身也作为 NFT 被拍卖。该文章在拍卖中以约 `56 万美元` 的价格售出。


    ### 域名


    区块链域名是您可以购买并拥有的地址，允许他人向一个易于记忆的地址发送加密货币。例如，一个典型的比特币地址有 `34` 个字符，以太坊地址有 `42` 个字符，因此地址可能看起来像
    `ac1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4`。购买区块链域名允许用户将地址简化为 `example.crypto`，从而更容易记忆。与
    `.com` 和 `.org` 等网站域名不同，区块链域名无需支付年度续费。


    现在我们已经涵盖了 NFT 的不同用法，让我们通过表 6-2 回顾一下 NFT 各项应用的亮点。


    **表 6-2** 不同 NFT 应用对比


    | 应用 | 总结 |

    | --- | --- |

    | 图像 | 图像没有动态；可以是照片或艺术；分为光栅图形和矢量图形 |

    | 视频 | 可以有音频和动画；分辨率可以非常高 |

    | GIF 动图 | 图像序列；自动循环；文件体积大 |

    | 音频 | 有时需要预览图像 |

    | 3D 模型 | 可在 2D 屏幕或头显上查看；可与之交互；对许多行业至关重要 |

    | 文本 | 示例包括书籍、诗歌、文章和引文 |

    | 域名 | 允许用户简化其区块链域名；无需续费 |

    | 房地产 | 虚拟财产可以增值；比传统房地产实践更具优势 |

    | 交易卡 | 作为 NFT 易于交易；因其市场价值而被收藏 |

    | 电子游戏物品 | 帮助开发者和玩家追踪物品；允许玩家轻松转售物品 |

    | 时尚 | 可以虚拟形式存在或具有现实价值；随着虚拟世界扩展，未来可能更有用 |

    '
- fmt: '# Examples of NFTs


    There have been many successful stories when it comes to NFTs. Here are some of
    the most iconic NFTs that have been sold:


    **Bored Ape Yacht Club (BAYC)**


    `Yuga Labs`, a blockchain technology company, created a collection of 10,000 NFTs
    of “Bored Apes.” The most expensive unit, `Bored Ape #2087`, was sold for 769
    `ETH`, or about $2.3 million. Owning a Bored Ape gives members exclusive benefits
    such as community events, a members-only `Discord` server, a graffiti board called
    “The Bathroom,” airdrops, and more. Owners of Bored Ape NFTs can even rent out
    their NFT to an NFT museum or use it for high returns. Many celebrities have demonstrated
    interest in the `BAYC`.


    **William Shatner’s Memorabilia**


    William Shatner sold items from his 60-year acting career as an NFT collection.
    125,000 units sold out in just 9 minutes, which included headshots of himself,
    a photo of Shatner hugging fellow Star Trek actor Leonard Nimoy, and an X-ray
    of his teeth.


    **Grimes WarNymph**


    Grimes, a singer and songwriter, sold a video called “Death of the Old” for $389,000,
    which was part of a collection of 10 NFTs. In total, he made $5.8 million selling
    the collection.


    **Nyan Cat**


    Chris Torres sold the original Nyan Cat GIF in an online auction for 300 `ETH`
    (around $600,000 at the time) in February 2021. The creator said he was “very
    surprised with the success,” but also “glad knowing that [he’s] basically opened
    the door to a whole new meme economy in the crypto world.”


    **Twitter CEO’s First Tweet**


    Jack Dorsey, the co-founder of Twitter, sold his first tweet from Twitter’s launch
    in March 2006 as an NFT for $2.9 million. Dorsey converted the money to Bitcoin
    then donated to the `GiveDirectly` charity organization.


    **NBA Top Shot**


    `Top Shot` is an NFT marketplace where users can trade and purchase videos of
    NBA highlights. `NBA Top Shot` sales were valued at over $338 million in October
    2020. Currently, the most valuable asset on `Top Shot` is a video of LeBron James
    dunking against the Houston Rockets that was sold for $387,000.


    **RTFKT sneakers**


    `RTFKT` creates virtual sneakers for online gaming avatars that sell up to $10,000
    a pair. In March 2021, `RTFKT` collaborated with an artist `Fewocious` to produce
    a series of sneakers that earned him $3.1 million in several minutes.


    **Taco Bell GIFs**


    Taco Bell, a fast food corporation, sold a series of GIFs based on food items
    from their menu as NFTs. After minutes, the GIFs sold out and Taco Bell proceeded
    to donate all of the earnings to the Taco Bell Foundation, which is their charity
    organization.


    **Reddit NFT avatars**


    Reddit, an online social platform where users can create posts and message each
    other, is inviting artists to create NFTs avatars. These NFTs are then sold on
    the official website for amounts from 15 to $100, and users can use these NFTs
    as their avatars.


    **The NFT Magazine**


    There is a project called the `NFT Magazine` by the `Cryptonomist` that allows
    people to read about different insights into the Crypto world, including important
    people, market trends, and advice on where to invest. However, to access the magazine,
    users must collect NFT magazine covers.


    # Selling Points of NFTs


    Although some NFTs have no intrinsic value, NFTs do offer many advantages that
    non-NFTs cannot provide. The success of NFTs can be attributed to many factors,
    some of which include the following:


    ## Scarcity


    A creator can mint a limited number of NFTs, which will bring up the value of
    individual assets and make people more willing to buy. The number of copies available
    is also public. Combined with a favorable reputation of the creator and high market
    demand for a certain NFT, NFTs can fetch market prices of over millions.


    ## Authenticity


    The unique digital signature allows anyone to verify the originality of the NFT
    and prevents forgery, which is a common problem when it comes to physical art.
    It also helps the buyer avoid scams because it is easy to see who created the
    NFT, and the owner does not have to worry about proving whether they made the
    work or not.


    ## Easy to Use with Cryptocurrency


    NFTs can be easily traded with cryptocurrency integration because NFTs exist on
    a blockchain. The most popular cryptocurrency by far is `ETH` on the `Ethereum`
    network, but `SOL` crypto on the `Solana` network and `ADA` on the `Cardano` network.


    ## Ownership


    NFTs make it easy to change ownership. It is also possible to share ownership
    of NFTs, which is called “fractional ownership.” Ownerships are also listed as
    public records, so there is no need for a middleman or physical document to prove
    an ownership.


    ## Permanence


    NFTs do not have limitations that physical items have and do not degrade over
    time. Physical items are subjected to ultraviolet radiation from the sun, accumulation
    of dust, damage from humidity, rust in the case of metal, and rough handling or
    other accidents. However, the owner of an NFT can permanently destroy the NFT
    if they want to, which is called burning.


    ## Efficiency


    Using a digital asset eliminates third parties. The buyer and seller can directly
    interact with each other without the need for a middleman. This can help save
    time, prevent miscommunication, and help businesses track where their products
    are reaching.


    ## Royalties


    After selling NFTs, the original artist can receive a share of the profit whenever
    their art is resold. This is a large improvement from current practices in the
    art and music industry, where many companies, streaming services, and other middlemen
    reap a large portion of profits. NFTs allow creators to have full control over
    their own work and manage their sales.


    ## Cheap to Create


    While gas fees may be high depending on the blockchain—notably `Ethereum` gas
    fees—minting an NFT can be free or only require several dollars. `Solana`, `Tezos`,
    `Avalanche`, `WAX` are cheaper blockchains and `Polygon` allows the user to create
    an NFT for free.'
