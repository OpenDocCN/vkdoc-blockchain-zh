- fmt: '#### Mining Nodes


    Mining nodes pick up transactions and produce new blocks by performing proof-of-work
    consensus. Groups of miners can team up to build a mining pool. Utilizing combined
    miners’ resources increases the probability of finding and generating blocks more
    quickly for Bitcoin. Once the mining pool is successful and receives a reward,
    that share of the reward is divided among participants by the miner’s contribution.


    ## Transactions


    Transactions are at the heart of the Bitcoin ecosystem, which can be as simple
    as just transferring some Bitcoins to a Bitcoin address.


    Suppose Alice wants to send Bob one Bitcoin. She uses her wallet’s private key
    to create and digitally sign the transaction. In the next step, Alice’s wallet
    will broadcast the transaction to the Bitcoin network. This transaction contains
    the sender’s and receiver’s addresses, the transferring amount, and Alice’s digital
    signature. Any node in the network can pick up this transaction and add it to
    unconfirmed transaction pools known as a mempool. Now, the mining process starts.
    Miners pick up these unconfirmed transactions and solve the PoW problem. The mining
    process typically needs around ten minutes. Once transactions are validated, they
    will be added to a newly mined block and publicly broadcast to the network. Other
    nodes can verify and confirm the transactions for the new block. It typically
    needs three to six confirmations (the probability of double spending is ruled
    out after six confirmations) and adds them to the current block. The transaction
    is finalized, and Bob gets one Bitcoin in his wallet.


    Figure 3-16 shows an example of a transaction detail.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig16_HTML.png)


    A table represents the details of the transaction. It includes the categories
    of hash, status, received time, size, weight, included in block, confirmation,
    total input, total output, fees, fees per byte, fees per weight, value when transacted.


    Figure 3-16 Transaction detail


    Let’s go over some concepts for a transaction data structure.


    ### The Transaction Data Structure


    Figure 3–16 shows typical transaction information. There are many other fields;
    we have chosen some of the most used ones and illustrated them in Table 3-4.


    Table 3-4 Bitcoin transaction detail


    | Field name | Description |

    | --- | --- |

    | Transaction hash(Transaction ID (TxID)) | A transaction hash is a unique string
    of characters given to every transaction verified and added to the blockchain.
    Bitcoin uses the SHA-256 hash algorithm to generate the transaction hash value.
    |

    | Transaction status | It checks the status of the Bitcoin transaction confirmation.
    |

    | Received time | The time when the sender’s wallet broadcasts the transaction
    to the network. |

    | Size | The total size of this transaction. |

    | Block | Block number to which the transaction belongs. |

    | Confirmations | The number of confirmations that succeed in hashing a transaction
    and adding it to the blockchain. |

    | Fee/Byte | The total fee paid to process this transaction. |


    Alice sends Bitcoins to Bob. Alice’s wallet will start to create a transaction.
    At a high level, the transaction has three main parts:


    1.  Inputs: contains Alice’s Bitcoin address with the amount of Bitcoin Alice
    owns.


    2.  Outputs: Bob’s Bitcoin address or public key.


    3.  Amounts: the amount of Bitcoins Alice sends to Bob.


    Figure 3-17 shows an input and output example:


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig17_HTML.png)


    A table classifies input and output in the transaction. It includes the index,
    address, p k script, sig script, and witness.


    Figure 3-17 Transaction input and output


    #### Input


    Think of inputs as spending and outputs as savings to a Bitcoin account. Generally,
    each input spends a previous output. Each output is an Unspent Transaction Output
    (UTXO) until a later input consumes it.


    A transaction can contain multiple inputs and outputs. The transaction will be
    valid if the input amount exceeds the associated output amounts, and the input
    amount also includes the transaction fee.


    A UTXO is an unspent transaction output used for the next input spent for a new
    transaction. The transaction input data structure is described in Table 3-5.


    Table 3-5 Bitcoin transaction input


    | Field name | Type (length) | Description |

    | --- | --- | --- |

    | Transaction Hash/Tx-ID | 32 bytes | SHA-256 has a transaction ID. The previous
    transaction ID with UTXO. |

    | Transaction Index | 4 bytes | The previous transaction output index. |

    | Unlock script length | 2–9 bytes | Size of the unlocked script. |

    | Unlock script | Variable | It contains the unlocked scripts. |

    | Sequence | 4 bytes | Sequence number. The default value is `0xffffffff`. |


    #### Output


    Outputs have three fields containing information about transferring Bitcoins.
    The first field is the amount of Satoshis to send, whereas the second field indicates
    the byte size of the lock script. Finally, the third field contains a locking
    script that defines the conditions that expect others in the future to spend that
    output. The transaction output data structure is explained in Table 3-6.


    Table 3-6 Bitcoin transaction output


    | Field name | Type (length) | Description |

    | --- | --- | --- |

    | Value | 8 bytes | Amount to transfer in Santoshi. |

    | Lock script length | 2–9 bytes | Size of the locking script. |

    | Lock script | Variable | It contains the lock scripts. |'
  raw: '#### Mining Nodes


    Mining nodes pick up transactions and produce new blocks by performing proof-of-work
    consensus. Groups of miners can team up to build a mining pool. Utilizing combined
    miners’ resources increases the probability of finding and generating blocks more
    quickly for Bitcoin. Once the mining pool is successful and receives a reward,
    that share of the reward is divided among participants by the miner’s contribution.


    ## Transactions


    Transactions are at the heart of the Bitcoin ecosystem, which can be as simple
    as just transferring some Bitcoins to a Bitcoin address.


    Suppose Alice wants to send Bob one Bitcoin. She uses her wallet’s private key
    to create and digitally sign the transaction. In the next step, Alice’s wallet
    will broadcast the transaction to the Bitcoin network. This transaction contains
    the sender’s and receiver’s addresses, the transferring amount, and Alice’s digital
    signature. Any node in the network can pick up this transaction and add it to
    unconfirmed transaction pools known as a mempool. Now, the mining process starts.
    Miners pick up these unconfirmed transactions and solve the PoW problem. The mining
    process typically needs around ten minutes. Once transactions are validated, they
    will be added to a newly mined block and publicly broadcast to the network. Other
    nodes can verify and confirm the transactions for the new block. It typically
    needs three to six confirmations (the probability of double spending is ruled
    out after six confirmations) and adds them to the current block. The transaction
    is finalized, and Bob gets one Bitcoin in his wallet.


    Figure [3-16](#535492_1_En_3_Chapter.xhtml#Fig16) shows an example of a transaction
    detail.


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig16_HTML.png)


    A table represents the details of the transaction. It includes the categories
    of hash, status, received time, size, weight, included in block, confirmation,
    total input, total output, fees, fees per byte, fees per weight, value when transacted.


    Figure 3-16


    Transaction detail


    Let’s go over some concepts for a transaction data structure.


    ### The Transaction Data Structure


    Figure [3–16](#535492_1_En_3_Chapter.xhtml#Fig16) shows typical transaction information.
    There are many other fields; we have chosen some of the most used ones and illustrated
    them in Table [3-4](#535492_1_En_3_Chapter.xhtml#Tab4).


    Table 3-4


    Bitcoin transaction detail


    | Field name | Description |

    | --- | --- |

    | Transaction hash(Transaction ID (TxID)) | A transaction hash is a unique string
    of characters given to every transaction verified and added to the blockchain.
    Bitcoin uses the SHA-256 hash algorithm to generate the transaction hash value.
    |

    | Transaction status | It checks the status of the Bitcoin transaction confirmation.
    |

    | Received time | The time when the sender’s wallet broadcasts the transaction
    to the network. |

    | Size | The total size of this transaction. |

    | Block | Block number to which the transaction belongs. |

    | Confirmations | The number of confirmations that succeed in hashing a transaction
    and adding it to the blockchain. |

    | Fee/Byte | The total fee paid to process this transaction. |


    Alice sends Bitcoins to Bob. Alice’s wallet will start to create a transaction.
    At a high level, the transaction has three main parts:


    1.  Inputs: contains Alice’s Bitcoin address with the amount of Bitcoin Alice
    owns.


    2.  Outputs: Bob’s Bitcoin address or public key.


    3.  Amounts: the amount of Bitcoins Alice sends to Bob.


    Figure [3-17](#535492_1_En_3_Chapter.xhtml#Fig17) shows an input and output example:


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig17_HTML.png)


    A table classifies input and output in the transaction. It includes the index,
    address, p k script, sig script, and witness.


    Figure 3-17


    Transaction input and output


    #### Input


    Think of inputs as spending and outputs as savings to a Bitcoin account. Generally,
    each input spends a previous output. Each output is an **Unspent Transaction Output**
    (**UTXO**) until a later input consumes it.


    A transaction can contain multiple inputs and outputs. The transaction will be
    valid if the input amount exceeds the associated output amounts, and the input
    amount also includes the transaction fee.


    A UTXO is an unspent transaction output used for the next input spent for a new
    transaction. The transaction input data structure is described in Table [3-5](#535492_1_En_3_Chapter.xhtml#Tab5).


    Table 3-5


    Bitcoin transaction input


    | Field name | Type (length) | Description |

    | --- | --- | --- |

    | Transaction Hash/Tx-ID | 32 bytes | SHA-256 has a transaction ID. The previous
    transaction ID with UTXO. |

    | Transaction Index | 4 bytes | The previous transaction output index. |

    | Unlock script length | 2–9 bytes | Size of the unlocked script. |

    | Unlock script | Variable | It contains the unlocked scripts. |

    | Sequence | 4 bytes | Sequence number. The default value is 0xffffffff. |


    #### Output


    Outputs have three fields containing information about transferring Bitcoins.
    The first field is the amount of Satoshis to send, whereas the second field indicates
    the byte size of the lock script. Finally, the third field contains a locking
    script that defines the conditions that expect others in the future to spend that
    output. The transaction output data structure is explained in Table [3-6](#535492_1_En_3_Chapter.xhtml#Tab6).


    Table 3-6


    Bitcoin transaction out


    | Field name | Type (length) | Description |

    | --- | --- | --- |

    | Value | 8 bytes | Amount to transfer in Santoshi. |

    | Lock script length | 2–9 bytes | Size of the locking script. |

    | Lock script | Variable | It contains the lock scripts. |'
  trans: '

    #### 挖矿节点


    挖矿节点负责收集交易，并通过执行工作量证明共识来生成新区块。矿工们可以组成团体，建立矿池。利用矿工们的合力可以增加更快找到并生成比特币区块的概率。一旦矿池成功并获得奖励，该奖励将根据每个矿工的贡献在参与者之间分配。


    ## 交易


    交易是比特币生态系统的核心，它可以简单到仅是将一些比特币转移到一个比特币地址。


    假设爱丽丝想发送一个比特币给鲍勃。她使用自己钱包的私钥来创建并数字签名这笔交易。下一步，爱丽丝的钱包会将这笔交易广播到比特币网络。这笔交易包含发送方和接收方的地址、转账金额以及爱丽丝的数字签名。网络中的任何节点都可以获取这笔交易，并将其添加到名为“内存池”的未确认交易池中。现在，挖矿过程开始了。矿工们获取这些未确认的交易，并解决工作量证明问题。挖矿过程通常需要大约十分钟。一旦交易被验证，它们将被添加到一个新挖出的区块中，并公开广播到网络。其他节点可以验证并确认这个新区块中的交易。通常需要三到六次确认（六次确认后可排除双重支付的可能性），然后这些交易被添加到当前区块。交易至此完成，鲍勃的钱包中收到了一个比特币。


    图 3-16 展示了交易明细的一个示例。


    ![](img/535492_1_En_3_Fig16_HTML.png)


    一张表格展示了交易的详细信息。它包括哈希、状态、接收时间、大小、权重、所属区块、确认数、总输入、总输出、手续费、每字节手续费、每权重手续费、交易时的价值等类别。


    图 3-16 交易明细


    让我们来了解一些关于交易数据结构的概念。


    ### 交易数据结构


    图 3-16 显示了典型的交易信息。还有许多其他字段；我们选择了其中一些最常用的字段，并在表 3-4 中进行了说明。


    表 3-4 比特币交易详情


    | 字段名 | 描述 |

    | --- | --- |

    | 交易哈希（交易 ID） | 交易哈希是每个经过验证并添加到区块链的交易被赋予的唯一字符串。比特币使用 SHA-256 哈希算法生成交易哈希值。 |

    | 交易状态 | 检查比特币交易确认的状态。 |

    | 接收时间 | 发送方钱包将交易广播到网络的时间。 |

    | 大小 | 这笔交易的总大小。 |

    | 区块 | 交易所属的区块编号。 |

    | 确认数 | 成功对交易进行哈希并将其添加到区块链的确认次数。 |

    | 手续费/字节 | 为处理这笔交易支付的总手续费。 |


    爱丽丝向鲍勃发送比特币。爱丽丝的钱包将开始创建一笔交易。从高层次来看，这笔交易包含三个主要部分：


    1.  输入：包含爱丽丝的比特币地址以及她拥有的比特币数量。

    2.  输出：鲍勃的比特币地址或公钥。

    3.  金额：爱丽丝发送给鲍勃的比特币数量。


    图 3-17 展示了一个输入和输出的示例：


    ![](img/535492_1_En_3_Fig17_HTML.png)


    一张表格对交易中的输入和输出进行了分类。它包括索引、地址、公钥脚本、签名脚本和见证数据。


    图 3-17 交易输入和输出


    #### 输入


    可以将输入视为对比特币账户的支出，输出视为储蓄。通常，每个输入花费一个之前的输出。每个输出都是一个未花费交易输出（UTXO），直到被后续的输入所消耗。


    一笔交易可以包含多个输入和输出。如果输入金额超过相关的输出金额，并且输入金额也包含了交易手续费，那么这笔交易就是有效的。


    UTXO 是一个未花费的交易输出，用作下一个新交易的输入花费。交易输入数据结构如表 3-5 所述。


    表 3-5 比特币交易输入


    | 字段名 | 类型（长度） | 描述 |

    | --- | --- | --- |

    | 交易哈希/交易 ID | 32 字节 | 对交易 ID 进行 SHA-256 哈希。包含 UTXO 的上一笔交易 ID。 |

    | 交易索引 | 4 字节 | 上一笔交易的输出索引。 |

    | 解锁脚本长度 | 2–9 字节 | 解锁脚本的大小。 |

    | 解锁脚本 | 可变 | 包含解锁脚本。 |

    | 序列号 | 4 字节 | 序列号。默认值为 `0xffffffff`。 |


    #### 输出


    输出包含三个字段，存储着关于转账比特币的信息。第一个字段是要发送的聪（Satoshi）数量，第二个字段表示锁定脚本的字节大小。最后，第三个字段包含一个锁定脚本，该脚本定义了期望未来其他人使用该输出所需满足的条件。交易输出数据结构在表
    3-6 中解释。


    表 3-6 比特币交易输出


    | 字段名 | 类型（长度） | 描述 |

    | --- | --- | --- |

    | 数值 | 8 字节 | 以聪（Santoshi）为单位的转账金额。 |

    | 锁定脚本长度 | 2–9 字节 | 锁定脚本的大小。 |

    | 锁定脚本 | 可变 | 包含锁定脚本。 |

    '
- fmt: '### UTXO (Unspent Transaction Output)


    Each output of a transaction, called Unspent Transaction Output (UTXO), is used
    as the input of the next spent transaction. UTXO can only be spent once in the
    Bitcoin network, so Bitcoin transaction outputs can be classified as either UTXOs
    or spent transaction outputs. Since the Bitcoin blockchain doesn’t maintain each
    person’s account balances, Bitcoin wallet applications can query the blockchain
    full node data and aggregate the total UTXO for the Bitcoin wallet address. Similar
    to how blocks are connected in blockchain, each transaction input is linked to
    the previous transaction’s output, and each output points to the subsequent transaction’s
    input.


    Imagine Alice has received multiple payments from 08/01/22 to 08/05/22. Each transaction
    contains different values of BTC, as shown in Figure [3-18](#535492_1_En_3_Chapter.xhtml#Fig18).


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fig18_HTML.png)


    Two tables denote the aggregating input, transaction, time, output, and value.
    It mentions total input and output values and differences. It points out three
    characters Alice, Bob, and Miner.


    Figure 3-18 Aggregating transaction inputs and generates output


    Alice’s wallet address is `18AEg8g8VWxBfFGeWLqJURuw1DLKQne8jV`. Alice wants to
    send 0.005 BTC to Bob. Alice just needs to unlock any transaction between 08/01/22
    to 08/05/22 because all of these transactions have a UTXO amount larger than 0.005
    BTC. But if Alice wants to send 0.13 BTC to Bob, she must unlock all these transactions.
    To pay 0.13 BTC, Alice can’t simply take transactions 1–4 and have 0.03 BTC from
    transaction 5. In other words, you can never use UTXO as partial spending; all
    these transactions need to be unlocked and added together to spend 0.16 BTC in
    the new transaction, pay 0.02 BTC for the miner as a transaction fee, and then
    send the remaining 0.01 BTC back to Alice.


    Once a transaction is committed in the Bitcoin network, the Bitcoin transactions
    can’t be reversible unless the recipient of that payment starts a new transaction
    and sends the Bitcoin back to your Bitcoin address.


    Unlike traditional accounts, input value can be a bit more than output value.
    In the preceding example, Alice sends Bitcoins to Bob. It needs to aggregate five
    different transaction inputs and generate three outputs: one paid for Bob, one
    for the miner, and the remainder returned to Alice.


    Let’s have a look at the most common types of Bitcoin transactions.


    #### One Input – Two Outputs


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Figa_HTML.png)


    A text screenshot represents one input and two outputs with values and it indicates
    the title summary.


    Two outputs of a transaction are the most common type of a Bitcoin transaction.
    For example, Alice sends 8 BTC to Bob, but her transaction UTXO has 10 BTC. She
    will get the remainder back to her address. This remaining amount will be the
    input of the next transaction from her address.


    #### One Input – Multiple Outputs


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Figb_HTML.png)


    A text screenshot includes one input and multiple outputs with values.


    Multiple outputs of a transaction could represent someone sending Bitcoins to
    many recipients. For example, if the account is a business account, it could be
    a payment for its employee.


    #### Multiple Inputs – One or Two Outputs


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Figc_HTML.png)


    A text screenshot includes multiple inputs and 1 or 2 outputs with values.


    The owner could move these funds to an address when they have many different wallet
    addresses with smaller amounts. Another case could be a business account receiving
    public Bitcoin payments.


    ### Transaction Pool


    Before transactions are added to the block, they are first added into a common
    transaction pool. These transactions are “unconfirmed.” A transaction pool, also
    known as memory pools, contains all unconfirmed transactions that have been validated
    but not yet mined.


    Miners then pick the unconfirmed transactions from the transaction pool based
    on the fee and their position in the order of transactions in the pool. Higher
    transaction fees will have a better chance of being selected.


    Once transactions are mined or added to the blockchain, the transaction pool is
    cleared. Then, the miner broadcasts a new block to the network. Each network node
    has a copy of the transaction pool. When the node receives an update, it will
    adjust its transaction pool.


    ### Transaction Fees


    Transaction fees are used as an incentive reward for miners to encourage them
    to validate user transactions in the block and support network security. Mathematically,
    transaction fees are the difference between the amount of Bitcoin transaction
    input and the amount out.


    When a Bitcoin wallet sends a transaction, it will usually display an option to
    select a fee rate in Satoshis per unit, abbreviated as `sats/vByte`. This transaction
    fee will be calculated based on transaction data size multiplied by this rate.
    A Bitcoin block can contain a maximum of 4 MB of data, and a larger transaction
    will occupy more block space. Thus, the larger transaction will pay more fees.
    If you want to speed up the transaction validation process with less waiting,
    you need to include more fee rates in the transaction, which makes it more likely
    to be included in the next block. However, if you do not care about waiting, pay
    a minimum fee like two `sats/vByte`. The transaction will typically be confirmed
    within a day or a week. A simple formula can be expressed as:


    ```

    fee = sum(inputs) – sum(outputs)

    ```


    A Bitcoin transaction at a high level contains three primary components: metadata
    (including headers), inputs, and outputs. Each of the preceding three components
    has its own specific size. The overall transaction size will be the sum of the
    size of these components, as shown below:


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Figd_HTML.jpg)


    A table includes three columns, Transaction input, Transaction output, and metadata.


    Assuming a transaction has the following approximate sizes with a network fee
    rate of 10 Satoshis per vbyte:


    *   120 vbytes per input


    *   58 vbytes per output


    *   22 vbytes for metadata


    ![](images/535492_1_En_3_Chapter/535492_1_En_3_Fige_HTML.jpg)


    A block diagram divides as input 0 120 v bytes, and output 0 58 v bytes. It also
    mentions 22 v bytes.


    For each transaction, the total transaction size is:


    ```

    120 (input) + 58 (output) + 22 (metadata) = 200 bytes

    ```


    If the transaction fee rate is `10 Satoshi/vByte`, then 2000 Satoshis are needed
    for sending 200 bytes.


    1 Satoshi is `0.00000001 BTC`; 2000 is `0.00002 BTC`.


    At the time of writing, the BTC price is `$23,147.80`, so the total transaction
    fee is:


    ```

    $23,147.80 * 0.00002 = $0.462956

    ```


    You need to pay `$0.462956` for the above transaction.'
