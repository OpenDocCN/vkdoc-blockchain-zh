    # 总结


    本章旨在让你熟悉去中心化金融生态中的流行产品，这些产品在参与 DeFi 项目或投资时值得了解。


    本章首先探讨了去中心化金融的概念。接着介绍了 DeFi 服务结构的五个不同层级。此外，通过详细介绍去中心化稳定币，我们深入研究了 Maker 稳定币，以理解其运作方式，并演示了如何在
    Maker Foundation 的投票门户中对提案进行投票。随后，在“去中心化交易所 (DEX)”部分，我们讨论了不同类型的 DEX，特别是自动化做市商
    (AMM)。我们学习了许多 DeFi 世界中的流行概念，包括收益 farming、滑点、无常损失和流动性池。之后，我们还探索了最受欢迎的 DEX——Uniswap。最后，我们提供了一个实用的端到端指南，向你展示如何在公共区块链上部署你自己的
    `ERC-20` 代币、创建流动性池、添加流动性、兑换你的自定义代币，并在 Uniswap 平台上获得质押奖励。


    在“去中心化借贷”部分，我们概述了最受欢迎的去中心化借贷平台——Aave。然后演示了如何在 Aave 平台上进行借出、提取、兑换、借入和偿还加密资产的操作。


    本章还讨论了去中心化保险。下一章将是我们的最后一章，我们将讨论区块链的未来。


    # 9. 区块链的未来


    区块链是一种全球性的去中心化账本技术，由不断增长的区块列表组成。这些带有时间戳、只能追加的区块通过密码学技术链接在一起。区块中的数据是永久的、不可变的，并且无法篡改。在区块链中，任何人都可以直接进行交易，无需中介即可与其他人交换任何有价值的资产。区块链在两个参与者之间建立了一种替代信任机制，开启了一个名为“价值互联网
    (IoV)”的互联网使用新时代。在价值互联网中，数字资产可以以自动化、安全且去中心化的方式即时与另一个人交换——从股票到艺术品、医药、知识产权等等。在今天的互联网上，我们可以自由地分享信息。明天，我们将可以在区块链上自由地分享价值。区块链作为一项革命性技术，是一种正在推进的现象，它将逐渐影响商业并重塑世界经济。包括金融、医疗保健、教育、房地产和供应链在内的每个行业，都可能借助区块链技术实现革命性的变革。


    完成前八章的学习后，你应该拥有足够的知识来思考区块链如何解决现实生活中的问题。在本章中，我们将首先介绍从 Web 1.0 到 Web 3.0 的互联网演进。贯穿本章，我们将讨论区块链如何改变传统行业。我们将从涵盖以下核心主题开始：


    - 互联网的演进

    - 区块链在金融领域的应用

    - 区块链在供应链领域的应用

    - 区块链在医疗保健领域的应用


    ## 互联网的演进


    互联网是世界上最流行的计算机网络，它连接了数十亿台计算机和电子设备。每天有数十亿人使用互联网发送电子邮件、在线购物、在社交媒体上与朋友联系或用于其他许多目的。没有互联网接入的生活似乎难以想象。


    1958 年，高级研究计划局 (ARPA)，即现在的国防高级研究计划局 (DARPA) 成立，其目标是创建一种在计算机之间进行直接通信和共享信息的方式。


    1967 年，ARPA 创建了第一个计算机网络的可行模型——ARPANET，它允许多台计算机在单个网络上相互通信。


    1969 年，ARPANET 将第一条消息从一台计算机传输到另一台计算机。它因此成为互联网的先驱。


    1983 年，ARPANET 采用了名为传输控制协议/网际互联协议 (TCP/IP) 的开放网络协议，该协议后来成为当今互联网的核心协议。


    然而，随着越来越多的计算机接入网络，网络用户需要找到一种更简单的方式来与它们通信。因此，在同一年，保罗·莫卡佩特里斯发明了域名系统 (DNS)，它提供了一种更简便的方式来使用计算机名称。


    1985 年，`symbolics.com` 成为第一个注册的域名。


    1989 年，ARPANET 关闭。同年，蒂姆·伯纳斯·李发明了万维网。自此，世界进入了 Web 1.0 时代。


    ### Web 1.0 (1989–2004)——万维网


    万维网，通常简称为 Web，是由网络服务器托管的一组网站或网页的集合。用户可以通过计算机上的网页浏览器访问和查看数字内容。Web 1.0 指的是万维网发展的早期阶段。Web
    1.0 时期大致从 1989 年到 2005 年。


    1990 年，蒂姆·伯纳斯·李在日内瓦的欧洲核子研究组织 (CERN) 工作。在那里，他开发了第一个网页客户端和服务器，并使用了三种特定技术：超文本标记语言
    (HTML)、统一资源定位符 (URL) 和超文本传输协议 (HTTP)。


    在 Web 1.0 时代，网站仅由静态网页组成，这些网页主要包含文本和图像内容，并链接到其他静态网页。Web 1.0 的网站不允许用户与站点进行交互。这就是为什么
    Web 1.0 被称为“只读”网络的原因。以下截图显示了一个典型的 Web 1.0 页面：


    `![](img/535492_1_En_9_Fig1_HTML.jpg)`


    此为 N C S A Mosaic for M S windows 页面的截图。其标题文字为：欢迎使用 N C S A Mosaic，一个互联网信息浏览器和万维网客户端。


    **图 9-1** Web 1.0 页面


    定义 Web 1.0 的一些特征如下：


    - 页面是静态的（页面内容不是动态的）。

    - HTML 表单通过电子邮件发送。

    - Web 内容从网络服务器的文件系统加载。

    - 网页布局使用框架和表格。

    - 可以使用 GIF 按钮和图形。

    - 网站是只读的，用作“信息门户”。

