- fmt: "#### Mobile Payment Types\n\nThere are many mobile payment types available\
    \ in the market, including the following.  \n`NFC`, or near-field communication,\
    \ is the technology that allows mobile devices to securely connect together through\
    \ a private channel. It typically requires the devices to be within a short distance\
    \ (4cm or less) of each other to initiate a connection.  \nMobile devices connect\
    \ to merchants who are using `NFC` via `NFC` tags. Customers need to activate\
    \ `NFC` to start one-on-one interactions.\n\n**QR code payments**  \nQuick response\
    \ codes, or QR codes, are a type of two-dimensional barcode. It encodes information\
    \ so the product can be purchased on the spot. The information can be read by\
    \ a digital device, such as a cell phone.  \nMany mobile wallet supports QR code\
    \ payments such as `PayPal`, `Zelle`, `Square`, and `Venmo`.\n\n**Cloud-based\
    \ mobile payments**  \n`Google`, `Amazon`, `GlobalPay`, and `GoPago` use a cloud-based\
    \ approach to process in-store mobile payments. It allows consumers to purchase\
    \ products using near-field communication (`NFC`) while placing a mobile payment\
    \ provider in the middle of the transaction.\n\nThere are still many problems\
    \ with mobile payments, and here are a few examples:\n\n**Data privacy**  \nWhen\
    \ we use a mobile payment app to buy something, the merchant and user are not\
    \ the only ones involved in the transaction. There are also other hidden vendors\
    \ or a middleman who becomes part of the process. Each of the involved parties\
    \ will record the transaction in their database for business. The vendors could\
    \ use the collected data to study user behavior and target them with ads.\n\n\
    **Hidden fee**  \nMost of the mobile payment options are tied to credit and debit\
    \ cards. Visa’s digital wallet charges the same fee as those credit card payments.\
    \ But `PayPal`, `Venmo`, and many other payment vendors charge more than the average\
    \ big bank fee. Here are examples of common hidden fees: `Balance Transfer Fee`,\
    \ `Foreign Transaction Fee`, `Inactivity Fees`, `Late Fees`, etc.\n\n**Wallet\
    \ control**  \nEven if you have your own payment account, you don’t have full\
    \ control. In certain circumstances, the payment issuer could temporarily suspend\
    \ the user account and limit borrowing ability.\n\nUsing mobile payments has lots\
    \ of advantages, but money continues to evolve. Figure [1-15](#535492_1_En_1_Chapter.xhtml#Fig15)\
    \ illustrates the evolution of monetary system.\n\n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig15_HTML.png)\n\
    \nA schematic flow-diagram for the evolution of the monetary system. The label\
    \ flows are the barter system, commodity money, metallic coin, paper money, plastic\
    \ money, mobile payments, and cryptocurrency.\n\n**Figure 1-15**  \nThe evolution\
    \ of monetary system\n\nIn mobile payments, all of the money is electronically\
    \ stored on electronic systems or digital databases. Therefore, we typically broadly\
    \ refer to it as Electronic Money, `e-money`. `E-money` can be used for electronic\
    \ payment transactions with or without bank accounts.\n\nElectronic Money has\
    \ two types of systems: a centralized system and a decentralized system. The main\
    \ difference between these two systems is decentralized digital money, also referred\
    \ to as `Cryptocurrency`, is a native currency in a decentralized system. There\
    \ is not a centralized authority to issue this currency, and `Cryptocurrency`\
    \ is defined and generated by computer protocol in the blockchain network. We\
    \ will discuss more in the next section.\n\n## Understanding Cryptocurrency\n\n\
    In a centralized money system, digital money is backed up by some central bank.\
    \ People feel their currencies have value because they trust a government to issue\
    \ this money. A cryptocurrency (or “crypto”) is decentralized digital money designed\
    \ to work as a medium of exchange for blockchain transactions, is transparent\
    \ to the public, and is resistant to censorship. Unlike centralized money, crypto\
    \ doesn’t depend on a central monetary authority, such as a government or bank,\
    \ to issue currency. Cryptocurrencies rely on modern cryptography to verify the\
    \ transaction in the blockchain, issue the creation of monetary units, protect\
    \ user accounts, and secure ledger data.\n\nThe first decentralized cryptocurrency\
    \ was `Bitcoin`. It was invented in 2008 by Satoshi Nakamoto and launched in 2009.\
    \ `Bitcoin` is the mother of all cryptos and remains as the most valuable and\
    \ popular cryptocurrency today. In 2022’s cryptocurrency by market capitalization,\
    \ `Bitcoin` holds 47% market share across all cryptocurrencies.\n\n### Cryptocurrency\
    \ Market\n\nSince `Bitcoin` was introduced in 2008, cryptocurrencies have revolutionized\
    \ the entire financial world. The total number of cryptocurrencies has proliferated\
    \ quickly. To date, there are around 20,000 cryptos, with a total market value\
    \ of nearly $1.2 trillion. Every 24 h, nearly $68b worth of cryptos are traded.\
    \ More than 500 cryptocurrency exchanges are around the world.\n\nThe daily transaction\
    \ volume for `Bitcoin` is around 270K/day at the time of writing, according to\
    \ `blockchain.com`.\n\n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig16_HTML.png)\n\
    \nAn analysis report depicts the number of confirmed `Bitcoin` transactions on\
    \ `blockchain dot com` from 23-11-2021 to 22-11-2022. The number of confirmed\
    \ transactions per day is recorded as 2,53,235, with a daily transaction volume\
    \ of about 270 k.\n\n**Figure 1-16**  \nNumber of confirmed `Bitcoin` transactions\
    \ per day (`blockchain.com`)\n\n`statista.com` shows the number of daily transactions\
    \ on the blockchain in `Bitcoin`, `Ethereum`, and 13 other cryptocurrencies from\
    \ January 2009 to November 7, 2021, displayed in Figure [1-17](#535492_1_En_1_Chapter.xhtml#Fig17).\n\
    \n![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig17_HTML.png)\n\nA graph of\
    \ the years from 2009 to 2021 versus the number of transactions represents 16\
    \ processes as color-coded curves. The highest wave level is above 7500.000.\n\
    \n**Figure 1-17**  \nNumber of daily transactions for cryptocurrencies (`statista.com`)\n\
    \n`Bitcoin` is 260,000 daily transactions per day.  \n`Ethereum` is processed\
    \ more than 1.1 million times per day.  \n`Ripple` is processed 1.4 million per\
    \ day.  \n`Stella` is processed 8.8 million per day.\n\nCredit card companies\
    \ process an average of 100 million transactions per day. It is still a long way\
    \ for cryptocurrencies to reach this level of daily transaction volume. But around\
    \ one in five Americans has used, invested in, or traded crypto, which is another\
    \ sign that cryptocurrencies continue to grow quickly and get more popular despite\
    \ their relatively recent introduction.\n\nIn 2014, a major online retailer, `Overstock`,\
    \ started accepting `Bitcoin` as payment for purchases on its website. In the\
    \ same year, `Microsoft` becomes one of the first big tech companies to adopt\
    \ cryptocurrency as payment for games, apps, and other products.\n\nMajor mobile\
    \ carrier `AT&T` accept online cryptocurrency payments through `BitPay` for customers.\
    \ `Tesla` accepts `Bitcoin` and `Dogecoin` for some merchandise on its website.\n\
    \nEven with more than one-third of small businesses and many large companies accepting\
    \ cryptocurrency as a form of payment in the United States alone, its popularity\
    \ continues to grow. Nowadays, you can buy many things with `Bitcoin`, some of\
    \ them which include:\n\nCars, mobile and television services, furniture, tickets\
    \ of movies and events, food, art and collectibles, real estate, travel, and charity.\n\
    \nWith the increasing adoption of cryptocurrencies, the blockchain transaction\
    \ volume will continue to increase."
  raw: '#### Mobile Payment Types


    There are many mobile payment types available in the market, including the following.


    NFC, or near-field communication, is the technology that allows mobile devices
    to securely connect together through a private channel. It typically requires
    the devices to be within a short distance (4cm or less) of each other to initiate
    a connection.


    Mobile devices connect to merchants who are using NFC via NFC tags. Customers
    need to activate NFC to start one-on-one interactions.


    **QR code payments**


    Quick response codes, or QR codes, are a type of two-dimensional barcode. It encodes
    information so the product can be purchased on the spot. The information can be
    read by a digital device, such as a cell phone.


    Many mobile wallet supports QR code payments such as PayPal, Zelle, Square, and
    Venmo.


    **Cloud-based mobile payments**


    Google, Amazon, GlobalPay, and GoPago use a cloud-based approach to process in-store
    mobile payments. It allows consumers to purchase products using near-field communication
    (NFC) while placing a mobile payment provider in the middle of the transaction.


    There are still many problems with mobile payments, and here are a few examples:


    **Data privacy**


    When we use a mobile payment app to buy something, the merchant and user are not
    the only ones involved in the transaction. There are also other hidden vendors
    or a middleman who becomes part of the process. Each of the involved parties will
    record the transaction in their database for business. The vendors could use the
    collected data to study user behavior and target them with ads.


    **Hidden fee**


    Most of the mobile payment options are tied to credit and debit cards. Visa’s
    digital wallet charges the same fee as those credit card payments. But PayPal,
    Venmo, and many other payment vendors charge more than the average big bank fee.
    Here are examples of common hidden fees: Balance Transfer Fee, Foreign Transaction
    Fee, Inactivity Fees, Late Fees, etc.


    **Wallet control**


    Even if you have your own payment account, you don’t have full control. In certain
    circumstances, the payment issuer could temporarily suspend the user account and
    limit borrowing ability.


    Using mobile payments has lots of advantages, but money continues to evolve. Figure
    [1-15](#535492_1_En_1_Chapter.xhtml#Fig15) illustrates the evolution of monetary
    system.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig15_HTML.png)


    A schematic flow-diagram for the evolution of the monetary system. The label flows
    are the barter system, commodity money, metallic coin, paper money, plastic money,
    mobile payments, and cryptocurrency.


    Figure 1-15


    The evolution of monetary system


    In mobile payments, all of the money is electronically stored on electronic systems
    or digital databases. Therefore, we typically broadly refer to it as Electronic
    Money, e-money. E-money can be used for electronic payment transactions with or
    without bank accounts.


    Electronic Money has two types of systems: a centralized system and a decentralized
    system. The main difference between these two systems is decentralized digital
    money, also referred to as Cryptocurrency, is a native currency in a decentralized
    system. There is not a centralized authority to issue this currency, and Cryptocurrency
    is defined and generated by computer protocol in the blockchain network. We will
    discuss more in the next section.


    ## Understanding Cryptocurrency


    In a centralized money system, digital money is backed up by some central bank.
    People feel their currencies have value because they trust a government to issue
    this money. A cryptocurrency (or “crypto”) is decentralized digital money designed
    to work as a medium of exchange for blockchain transactions, is transparent to
    the public, and is resistant to censorship. Unlike centralized money, crypto doesn’t
    depend on a central monetary authority, such as a government or bank, to issue
    currency. Cryptocurrencies rely on modern cryptography to verify the transaction
    in the blockchain, issue the creation of monetary units, protect user accounts,
    and secure ledger data.


    The first decentralized cryptocurrency was Bitcoin. It was invented in 2008 by
    Satoshi Nakamoto and launched in 2009\. Bitcoin is the mother of all cryptos and
    remains as the most valuable and popular cryptocurrency today. In 2022’s cryptocurrency
    by market capitalization, Bitcoin holds 47% market share across all cryptocurrencies.


    ### Cryptocurrency Market


    Since Bitcoin was introduced in 2008, cryptocurrencies have revolutionized the
    entire financial world. The total number of cryptocurrencies has proliferated
    quickly. To date, there are around 20,000 cryptos, with a total market value of
    nearly $1.2 trillion. Every 24 h, nearly $68b worth of cryptos are traded. More
    than 500 cryptocurrency exchanges are around the world.


    The daily transaction volume for Bitcoin is around 270K/day at the time of writing,
    according to blockchain.com.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig16_HTML.png)


    An analysis report depicts the number of confirmed Bitcoin transactions on blockchain
    dot com from 23-11-2021 to 22-11-2022\. The number of confirmed transactions per
    day is recorded as 2,53,235, with a daily transaction volume of about 270 k.


    Figure 1-16


    Number of confirmed Bitcoin transactions per day (blockchain.com)


    statista.com shows the number of daily transactions on the blockchain in Bitcoin,
    Ethereum, and 13 other cryptocurrencies from January 2009 to November 7, 2021,
    displayed in Figure [1-17](#535492_1_En_1_Chapter.xhtml#Fig17).


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig17_HTML.png)


    A graph of the years from 2009 to 2021 versus the number of transactions represents
    16 processes as color-coded curves. The highest wave level is above 7500.000.


    Figure 1-17


    Number of daily transactions for cryptocurrencies (statista.com)


    Bitcoin is 260,000 daily transactions per day.


    Ethereum is processed more than 1.1 million times per day.


    Ripple is processed 1.4 million per day.


    Stella is processed 8.8 million per day.


    Credit card companies process an average of 100 million transactions per day.
    It is still a long way for cryptocurrencies to reach this level of daily transaction
    volume. But around one in five Americans has used, invested in, or traded crypto,
    which is another sign that cryptocurrencies continue to grow quickly and get more
    popular despite their relatively recent introduction.


    In 2014, a major online retailer, Overstock, started accepting Bitcoin as payment
    for purchases on its website. In the same year, Microsoft becomes one of the first
    big tech companies to adopt cryptocurrency as payment for games, apps, and other
    products.


    Major mobile carrier AT&T accept online cryptocurrency payments through BitPay
    for customers. Tesla accepts Bitcoin and Dogecoin for some merchandise on its
    website.


    Even with more than one-third of small businesses and many large companies accepting
    cryptocurrency as a form of payment in the United States alone, its popularity
    continues to grow. Nowadays, you can buy many things with Bitcoin, some of them
    which include:


    Cars, mobile and television services, furniture, tickets of movies and events,
    food, art and collectibles, real estate, travel, and charity.


    With the increasing adoption of cryptocurrencies, the blockchain transaction volume
    will continue to increase.'
  trans: "\n#### 移动支付类型\n\n市场上存在多种移动支付类型，包括以下几种。  \n`NFC`，即近场通信，是一种允许移动设备通过私密通道安全连接的技术。通常要求设备之间保持较短距离（4\
    \ 厘米或更短）才能建立连接。  \n移动设备通过`NFC`标签与使用`NFC`的商家建立连接。客户需要激活`NFC`才能开始一对一的交互。\n\n**二维码支付**\
    \  \n快速响应码，即二维码，是一种二维条码。它编码了信息，以便商品可以当场购买。手机等数字设备可以读取这些信息。  \n许多移动钱包支持二维码支付，例如`PayPal`、`Zelle`、`Square`和`Venmo`。\n\
    \n**基于云的移动支付**  \n`Google`、`Amazon`、`GlobalPay`和`GoPago`采用基于云的方法处理店内移动支付。它允许消费者使用近场通信（`NFC`）购买商品，同时将移动支付提供商置于交易中间。\n\
    \n移动支付仍存在许多问题，以下是几个示例：\n\n**数据隐私**  \n当我们使用移动支付应用购买商品时，交易过程不仅涉及商家和用户。还有其他隐藏的供应商或中间商参与其中。每个参与方都会将交易记录在各自的数据库中用于商业目的。这些供应商可能会利用收集的数据研究用户行为，并向他们投放广告。\n\
    \n**隐藏费用**  \n大多数移动支付方式与信用卡和借记卡绑定。Visa 的数字钱包收取与信用卡支付相同的费用。但`PayPal`、`Venmo`和许多其他支付供应商收取的费用高于一般大型银行的平均费用。以下是常见隐藏费用的示例：`余额转账费`、`境外交易费`、`闲置费`、`滞纳金`等。\n\
    \n**钱包控制权**  \n即使你拥有自己的支付账户，也并非拥有完全控制权。在某些情况下，支付发行方可能临时暂停用户账户并限制借贷能力。\n\n使用移动支付有很多优势，但货币仍在不断演变。图\
    \ 1-15 展示了货币体系的演变过程。\n\n![](img/535492_1_En_1_Fig15_HTML.png)\n\n货币体系演变的示意流程图。标签流程依次为：以物易物系统、商品货币、金属硬币、纸币、塑料货币、移动支付和加密货币。\n\
    \n**图 1-15**  \n货币体系的演变\n\n在移动支付中，所有货币都以电子形式存储于电子系统或数字数据库中。因此，我们通常广义地将其称为电子货币，即`电子货币`。`电子货币`可用于有银行账户或无银行账户的电子支付交易。\n\
    \n电子货币有两种系统类型：中心化系统和去中心化系统。这两种系统的主要区别在于，去中心化数字货币（也称为`加密货币`）是去中心化系统中的原生货币。没有中心化机构发行这种货币，`加密货币`由区块链网络中的计算机协议定义和生成。我们将在下一节进行更详细的讨论。\n\
    \n## 理解加密货币\n\n在中心化货币系统中，数字货币由某个中央银行支持。人们觉得其货币具有价值，是因为他们信任发行这种货币的政府。加密货币（或“加密”）是一种去中心化的数字货币，旨在作为区块链交易的交换媒介，对公众透明，并且能够抵抗审查。与中心化货币不同，加密货币不依赖于政府或银行等中心化货币当局来发行货币。加密货币依赖现代密码学来验证区块链中的交易、发行货币单位、保护用户账户以及确保账本数据的安全。\n\
    \n第一种去中心化加密货币是`比特币`。它于 2008 年由中本聪发明，并于 2009 年推出。`比特币`是所有加密货币之母，至今仍是最具价值、最受欢迎的加密货币。在\
    \ 2022 年按市值计算的加密货币中，`比特币`在所有加密货币中占据了 47%的市场份额。\n\n### 加密货币市场\n\n自 2008 年`比特币`问世以来，加密货币已经彻底改变了整个金融世界。加密货币的总数量迅速激增。截至目前，约有\
    \ 20,000 种加密货币，总市值接近 1.2 万亿美元。每 24 小时内，就有价值近 680 亿美元的加密货币被交易。全球有超过 500 家加密货币交易所。\n\
    \n根据`blockchain.com`的数据，在撰写本文时，`比特币`的每日交易量约为 27 万笔/天。\n\n![](img/535492_1_En_1_Fig16_HTML.png)\n\
    \n一份分析报告描绘了 2021 年 11 月 23 日至 2022 年 11 月 22 日期间`blockchain dot com`上确认的`比特币`交易数量。每日确认交易数记录为\
    \ 253,235 笔，日交易量约为 27 万笔。\n\n**图 1-16**  \n每日确认的`比特币`交易数量（`blockchain.com`）\n\n\
    `statista.com`显示，2009 年 1 月至 2021 年 11 月 7 日期间，`比特币`、`以太坊`以及其他 13 种加密货币在区块链上的每日交易数量，如图\
    \ 1-17 所示。\n\n![](img/535492_1_En_1_Fig17_HTML.png)\n\n一幅 2009 年至 2021 年与交易数量的关系图，用\
    \ 16 种颜色编码的曲线表示。最高波峰值超过 7,500,000。\n\n**图 1-17**  \n加密货币每日交易数量（`statista.com`）\n\
    \n`比特币`每日交易量为 26 万笔。  \n`以太坊`每日处理超过 110 万笔交易。  \n`瑞波币`每日处理 140 万笔交易。  \n`恒星币`每日处理\
    \ 880 万笔交易。\n\n信用卡公司平均每天处理 1 亿笔交易。加密货币要达到这样的日交易量水平还有很长的路要走。但大约五分之一的美国人曾使用、投资或交易过加密货币，这是另一个迹象，表明尽管加密货币问世相对较晚，但其仍在快速增长并越来越受欢迎。\n\
    \n2014 年，大型在线零售商`Overstock`开始在其网站上接受`比特币`作为支付方式。同年，`微软`成为首批采用加密货币支付游戏、应用和其他产品的大型科技公司之一。\n\
    \n主要移动运营商`AT&T`通过`BitPay`接受客户的在线加密货币支付。`特斯拉`在其网站上接受`比特币`和`狗狗币`用于购买部分商品。\n\n仅在美国，就有超过三分之一的小企业和许多大公司接受加密货币作为一种支付形式，其受欢迎程度还在持续增长。如今，你可以用`比特币`购买许多东西，包括：\n\
    \n汽车、移动和电视服务、家具、电影和活动门票、食品、艺术品和收藏品、房地产、旅行以及慈善捐赠。\n\n随着加密货币的日益普及，区块链交易量将继续增加。\n"
- fmt: '### What Is Crypto Volatility?


    `Volatility` in financial markets is the rate that asset price increases or decreases
    over a particular period. It is an important indicator for understanding, managing,
    and quantifying the risk of investments. Typically, high volatility refers to
    prices rapidly fluctuating, and low volatility refers to the price slowly changing
    within a small range, meaning the price is relatively stable.


    High volatility often implies higher risks but higher returns. While low volatility
    usually means less risks and less returns, it is not always the case. An example
    of low volatility is government bonds, which are fully backed by the credit of
    the government and are typically considered low risk by the market. Gold is another
    example, since it has had a stable price for long period of time. Figure [1-18](#535492_1_En_1_Chapter.xhtml#Fig18)
    illustrates high and low volatility.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig18_HTML.jpg)


    *An illustration of time versus the price of high-volatility in a high-price swing
    as a larger zig-zag line, and low-volatility in a low-price swing as a smaller
    zig-zag line.*


    **Figure 1-18** *High and low volatility*


    Many people have heard of the cryptocurrency market’s high volatility. Some crypto
    prices can lose 90% of its value in a very short time. Let’s look at a few examples.


    A market correction is generally referred to be a 10% to 20% drop from a recent
    peak value. Table [1-4](#535492_1_En_1_Chapter.xhtml#Tab4) lists the history of
    Bitcoin correction from Nov 2013 to Mar 2020. For crypto newcomers, a crypto market
    crash is probably pretty scary. However, this market correction is nothing new
    to those who know Bitcoin’s history. While these drops made people feel quite
    frustrated about Bitcoin’s unstable price, the price started from `$0.0008` in
    2010 and over time, increased to `$25K` in June 2022.


    **Table 1-4** *History of Bitcoin correction*


    | Date | Price | Decline |

    | --- | --- | --- |

    | Nov 30, 2013–Jan 14, 2016 | $1163 - $152 | -86.9% |

    | Mar 10–25, 2017 | $1350–$891 | -34.0% |

    | May 25–27, 2017 | $2760–$1850 | -33.0% |

    | Jun 12–July 17, 2017 | $2980–$1830 | -38.6% |

    | Sep 2–15, 2017 | $4980–$2972 | -40.3% |

    | Nov 8–12, 2017 | $7888– $5555 | -29.6% |

    | Dec 17, 2017–Dec 15, 2018 | $19666–$3220 | -83.6% |

    | June 26, 2019–Mar 12, 2020 | $12867– $5040 | -60.8% |


    `Luna` (also known as `Terra`) is the native token of the original `Terra` blockchain,
    which was launched in 2018. At that time, the token’s name was `LUNA`. `Luna`
    is a blockchain developed by the Korean firm `Terraform Labs` in 2018. The blockchain
    aims to transform modern financial systems.


    In 2020, `Luna` started selling stablecoin called `TerraUSD`. `Luna` was a major
    crypto coin of top-ten market capitalization. But on May 11, 2022, `LUNA` dropped
    to 2% of its original price in 24 hours, according to the data from `CoinMarketCap`.
    `LUNA` price fell from `$32.71` to `$0.08384` in one day.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig19_HTML.jpg)


    *An illustration of the luna market price volatility, which fell from the value
    of 190.52719716, 119.2518039, 46.12450969, 0.80000000, and 0.00007500.*


    **Figure 1-19** *Volatility in cryptocurrency market—Luna*


    `StepN` is a move-to-earn fitness app, which introduces a new `Web3` lifestyle
    app. Users must buy `NFT` sneakers to play the game. `STEPN` uses `GST` (`Green
    Satoshi Token`), which is a `Solana` blockchain-based token. The user can earn
    `GST` by walking or running outdoors through mobile `GPS` services tracing user
    movement or by “renting” out their `NFT` sneakers to other users. Some of the
    sneakers are worth thousands of dollars in the `NFT` market. `StepN` was launched
    in December 2021 by `FindSatoshi Lab`. The creative solution enabled `STEPN` to
    quickly disrupt the fitness industry and gain lots of attention from the market.


    The Crypto market started to list `GMT(STEPN)` on March 9, 2022. The price at
    the beginning was `$0.01`. On April 28, price surged to `$4.03`—a 40200% increase
    in just 51 days (data from `coinmarketcap`). But after the entire crypto market
    dropped, the price sank to `$0.6317` in June 2022. Figure [1-20](#535492_1_En_1_Chapter.xhtml#Fig20)
    shows the volatility of the cryptocurrency market—`STEPN`. The diagram is from
    `CoinGecko`.


    ![](images/535492_1_En_1_Chapter/535492_1_En_1_Fig20_HTML.png)


    *A schematic of the volatility of the cryptocurrency market from the CoinGecko.
    The highest wave level on May 2 is above 5400.*


    **Figure 1-20** *Volatility in cryptocurrency market—Stepn (from CoinGecko)*


    ### What Could Cause a High Volatility in the Crypto Market?


    There are multiple factors that could contribute to the highly volatile and unstable
    environment. Let’s explore some of these factors.


    ### Emerging Market


    Compared to the history of the Internet, cryptocurrency is still in the very early
    stages—it has only been a decade since crypto was introduced. The crypto market
    grew exponentially in this period.


    The global crypto market cap reached around `$1.25` trillion US dollars, while
    the global stock market cap in 2021 was 121 trillion US dollars. The Crypto market
    is still relatively small compared to the global stock market, and volatility
    comes with any emerging market. Even in the early days of Internet stocks, there
    was also high volatility, like the crypto market today.


    Cryptocurrency still needs a long time for large-scale adoption. Unlike stocks,
    fiat currency, and other traditional finance products, the industry is still researching,
    understanding, and developing a reliable model to determine the fundamental value
    of cryptocurrency. This means that there is no reliable product to predict Crypto
    price in the current market.


    ### New Technology


    In the earlier `LUNA` example, `LUNA` invented `TerraUSD` (`UST`) concept. A stablecoin
    coin is controlled by `Terra` algorithms to serve as a fiat coin function, like
    the US dollar. It aims to peg the US dollar at a `1:1` ratio, but different from
    other major stablecoins, `UST` is not fully collateralized backed. `LUNA` also
    allows holders voting power over the protocol. The protocol worked as intended
    until there was a scalability problem. If users return `UST` when the market is
    down, `LUNA` protocol needs to bring `UST` back to `$1` by issuing more `UST`
    tokens to the user. This led to the total token supply of `LUNA` jumping from
    about 725 million on May 5 to about 7 trillion on May 13. Stablecoin’s `1:1` ratio
    is no longer maintainable. It drops from `$1` to `$0.009`.


    ### Decentralization


    Crypto, like Bitcoin, is native to the blockchain network. Compared to gold, a
    physical asset in the real physical world, crypto is more like a “store of value.”
    It is not backed by any physical commodity or central currency and only exists
    only virtually, so it does not have intrinsic value. The price is determined by
    supply and demand of the market, but many factors can cause the price to fluctuate.


    ### Sentimental


    Market sentiment, also known as investor attention, is the overall feeling of
    investors in regard to the price prediction of a particular asset. Many things
    could impact cryptocurrency’s investor attention, which can trigger a period of
    significant volatility. Here is the list of few: Governance, Regulations, Supply
    and demand, Security breaches, Competition, etc.


    It may feel frustrating that crypto prices are volatile and hard to predict, so
    it is all the more important to manage risk, diversify your crypto across a range
    of different crypto assets, do research and technical analysis, invest what you
    can afford, and be in it for the long term, etc.'
