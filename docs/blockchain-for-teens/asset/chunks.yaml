    a steady compound annual growth rate (CAGR) of 43.8% from 2022 to 2030.


    The DeFi ecosystem comprises a wide range of products, including infrastructure,
    decentralized exchanges (DEXs), lending and borrowing, stablecoins, insurance,
    payments, Decentralized Autonomous Organizations (DAO), and custodial services.


    The goal of this chapter is to introduce you to DeFi. We will provide an overview
    of DeFi’s core concepts and structure, as well as an in-depth look at specific
    products in DeFi, such as decentralized stablecoins (e.g., MakerDAO’s DAI), decentralized
    exchanges (e.g., Uniswap), and decentralized Lending and Borrowing (e.g., Aave).
    Finally, by providing a step-by-step guide to using DeFi products in practice,
    the chapter will help you gain the knowledge needed to make real-world DeFi investments
    and trades.


    This chapter will help you to understand the following practical topics:


    *   What is decentralized finance (DeFi)?


    *   The structure of DeFi


    *   Decentralized stablecoin


    *   Decentralized exchanges (DEXs)


    *   Decentralized lending and borrowing


    *   Decentralized insurance'
  trans: '

    ### 元宇宙发展阶段二：进阶期（2030–2050 年）


    物理世界与数字世界逐渐融合交汇。现实生活中的诸多元素，例如工作、学习、购物、社交、金融、娱乐以及现实世界中的其他服务，都与虚拟世界相连或迁移至其中。虚拟世界的人口和活动持续扩张，元宇宙已成为人类生活的重要组成部分。


    ### 元宇宙发展阶段三：成熟期（2050 年后）


    元宇宙成为一种持久且可自我维持的现实世界实体，并实现了 2018 年电影《头号玩家》中“绿洲”级别的虚拟宇宙图景。日本轻小说《刀剑神域》于 2009 年首创的概念“完全潜入
    VR”，描述了一种让人完全“沉浸”于虚拟世界并与现实物理世界断开连接的虚拟现实体验；从某种意义上说，这几乎如同瞬间传送。


    到那时，虚拟世界与现实世界将难以区分，虚拟世界的人口和使用量将极为庞大。


    ## 本章小结


    在本章中，你首先了解了元宇宙的概念，包括其历史与特征。接着，你探索了各种沉浸式技术，包括 AR、VR、MR 和 XR，并学习了这些技术的工作原理。随后，你学习了元宇宙的分层架构，以理解元宇宙格局中的不同产品或服务。此外，我们还讨论了
    NFT 和加密游戏如何在元宇宙中发挥作用。最后，你进入了一个虚拟区块链世界购买虚拟土地，以体验当前阶段元宇宙中的虚拟房地产。


    在本章末尾，我们讨论了元宇宙的未来。


    在下一章中，你将探索去中心化金融（DeFi），这是 2022 年加密领域最热门的话题之一。我们将概述 DeFi 的核心概念与结构，并深入探讨各类 DeFi
    产品，例如去中心化稳定币、去中心化交易所以及去中心化借贷。你还将看到一份实践操作 DeFi 产品的分步指南。本章将是你全面理解 DeFi 协议的绝佳机会。


    # 8. 去中心化金融（DeFi）：重塑金融服务


    全球金融体系由众多机构组成，例如银行、保险公司、证券交易所，以及监管这些机构的各类政府机关。传统金融服务是中心化的。中央机构发行货币，并控制着驱动经济发展的货币供给与分配。中心化金融机构通过中心化系统管理资产并执行交易，以减少欺诈行为。然而，这些流程也增加了系统内部的复杂性，导致了高昂的中介成本和缓慢的交易速度。此外，这些交易对所有参与方并非完全透明。


    近年来，加密货币的普及速度迅猛加快，而在去中心化网络中交易数字资产的加密市场无需第三方中介。因此，这些市场的兴起正在重塑全球金融业。


    去中心化金融（DeFi）代表了一种重建传统金融服务的创新方式。金融产品围绕公有链或联盟链以及智能合约构建。用户在 DeFi 系统中进行交易时，可以控制自己的资产和个人数据。随着加密行业的成熟，将有更多投资用于构建
    DeFi 解决方案。随之而来的是，全球去中心化金融市场自 2020 年以来经历了巨大的增长。预计从 2022 年到 2030 年，该市场将以 43.8%的稳定复合年增长率（CAGR）增长。


    DeFi 生态系统包含广泛的产品，涵盖了基础设施、去中心化交易所（DEX）、借贷、稳定币、保险、支付、去中心化自治组织（DAO）以及托管服务。


    本章旨在向你介绍 DeFi。我们将概述 DeFi 的核心概念与结构，并深入探讨 DeFi 中的特定产品，例如去中心化稳定币（如 MakerDAO 的 DAI）、去中心化交易所（如
    Uniswap）以及去中心化借贷（如 Aave）。最后，通过提供实践操作 DeFi 产品的分步指南，本章将帮助你掌握进行现实世界 DeFi 投资和交易所必需的知识。


    本章将帮助你理解以下实用主题：


    - 什么是去中心化金融（DeFi）？

    - DeFi 的结构

    - 去中心化稳定币

    - 去中心化交易所（DEX）

    - 去中心化借贷

    - 去中心化保险

