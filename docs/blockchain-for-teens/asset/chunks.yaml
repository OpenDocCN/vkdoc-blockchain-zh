    folder in the Figure [4-14](#535492_1_En_4_Chapter.xhtml#Fig14) folder structure.
    LevelDB is an open source on-disk key-value storage.


    ![](images/535492_1_En_4_Chapter/535492_1_En_4_Fig15_HTML.jpg)


    A flow diagram of E V M, flows from world state n to transaction and lastly world
