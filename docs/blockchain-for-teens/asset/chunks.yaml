- fmt: '### Difference Between Coin and Token


    There is a common misunderstanding that a token and coin are the same thing.


    In the evolution of the monetary system section, we know Metal coins were made
    of gold or silver to represent their intrinsic value. Mohammad Bin Tughlaq invented
    token money—Tanka, which used copper currency to represent the same value equal
    to a silver coin.


    In the blockchain, coins and tokens both represent a store of value and can be
    used for processing payments. But there’s some difference: crypto coins are the
    native asset of a blockchain. It is generated by blockchain consensus protocol.
    For example, `Bitcoin` in the Bitcoin network and `Ether` in the Ethereum network
    are coins.


    Crypto tokens are built on top of the blockchain network, created by a smart contract
    (a self-executing program run on the network). The number of token creations can
    be defined by a smart contract when creating tokens.


    Table [1-5](#535492_1_En_1_Chapter.xhtml#Tab5) shows the difference between coin
    and token.


    Table 1-5


    Comparing coin and token


    | Coin | Token |

    | --- | --- |

    | Coin is an independent digital asset and native token to its own blockchain,
    valid by network consensus. Coin is similar to fiat currency. | Token creation
    requires a smart contract to define the token-basic properties, then build and
    operate. |

    | Number of coin is defined by blockchain consensus. | Number of token is defined
    by Smart contract. Smart contract can define much more custom token attribute
    such as token name, total supply, some token transfer rule, etc. |

    | The use of coin is mostly to build up the blockchain network by executing consensus
    protocol. Coins can be distributed through mining or transfer coin ownership |
    The use of token could be diverse, as their function is defined as Dapps (decentralized
    application) per business required. |

    | Example: `Bitcoin`, `Ether`, `Solana`, `Cardano`, `Doge`, `LTC`, `BnB`, `Ripple`,
    etc. | Example: Security tokens, utility tokens, equity tokens, ERC-20 token,
    NFT token, etc. |


    ## Summary


    In this chapter, we learned about the main features of blockchain and explored
    decentralization. Then we went over how the blockchain works by going over each
    step in the transaction process. Consensus algorithms, such as `PoW`, `PoS`, form
    the backbone of the blockchain. We then continued on to the evolution of monetary
    systems, from the barter system to cryptocurrency. At last, we briefly introduced
    cryptocurrency and understood some basic concepts of the crypto market.


    In the next chapter, we will continue our learning journey and start to learn
    cryptography—The Backbone of Blockchain Security.


    # 2. Cryptography: The Backbone of Blockchain Security


    Blockchains are built based on a range of different cryptographic concepts. From
    safeguarding wallets and securing transactions to protecting consensus protocols
    and encrypting private data for anonymous accounts, almost everything needs cryptography
    to ensure proper functioning. Cryptography is the backbone of blockchain security.


    This chapter will dive into everything you need to know about cryptography in
    blockchains, starting with the basics. Then, you will be introduced to the classical
    symmetric key cryptography, asymmetric cryptography, and more. As you advance,
    you will become well versed in how digital signatures work.


    This chapter will also cover how to utilize hash functions to hash data, and at
    the end of the chapter, you will get an in-depth look at elliptic curve cryptography
    (`ECC`), a key type of encryption cryptography that is used in blockchain.


    In this chapter, the following topics related to cryptography will be discussed:


    - The basics of cryptography

    - Symmetric key cryptography

    - Asymmetric key cryptography

    - Digital signatures

    - Hash algorithms

    - ECC

    - Derived Ethereum addresses


    ## The Basics of Cryptography


    In Chapter [1](#535492_1_En_1_Chapter.xhtml), we have briefly discussed SHA-256
    hashing cryptography which is used to hash block data.


    Let''s use an example to illustrate how secure messages can be sent to the public.
    Suppose Alice sends a personal message to Bob. Alice wants this message to be
    private. Only Bob can understand the message, and the message cannot be altered
    during transmission. The message sent over the Internet could secretly be intercepted
    and recorded by an intruder (see Figure [2-1](#535492_1_En_2_Chapter.xhtml#Fig1)).
    How can Alice and Bob stop this from happening? This is where cryptography comes
    in.


    ![An illustration of a message sent by Alice to bob over the internet secretly
    intercepted and recorded by an intruder.](images/535492_1_En_2_Chapter/535492_1_En_2_Fig1_HTML.jpg)


    Figure 2-1: A message sent through a network


    The word “crypto” comes from the Greek word “kryptós,” meaning “hidden or secret.”


    “Cryptography” means “secret writing” and allows for the exchange of secure messages
    between willing parties.


    The message is converted into a secret code equivalent called “ciphertext” via
    an encryption algorithm to prevent unauthorized access. The ciphertext is then
    sent over a public network, it is decrypted at the receiving end, and the recipient
    can view its contents.


    In the preceding example, Alice uses a key to encrypt her message, converting
    it to ciphertext, and she sends it to Bob over the Internet. She does not need
    to worry about a hacker having access to her private message. To read ciphertext,
    a hacker must use a decryption key. When Bob receives this ciphertext message,
    he can use a key to recover the original plaintext via decryption.


    ![A schematic depicts encrypting and decrypting of a message through the internet
    by Alice to Bob. The labeled process is my secret text, encrypt, ciphertext, decrypt,
    and text.](images/535492_1_En_2_Chapter/535492_1_En_2_Fig2_HTML.png)


    Figure 2-2: Encrypting and message over the Internet


    Cryptography is mainly divided into three categories: symmetric key cryptography,
    asymmetric key cryptography, and keyless primitives such as hash function.


    ### Symmetric Key Cryptography


    Symmetric key cryptography is a cryptographic algorithm that uses a shared secret
    key between a sender and a receiver to encrypt and decrypt data. This secret key
    is called a symmetric key.


    In the preceding example, Alice and Bob share the same secret key. Alice uses
    the secret key to encrypt the message, and the secret key is used in the decryption
    process when Bob reads the message. This shows how symmetric encryption works.


    Symmetric encryption is typically more efficient than asymmetric encryption. Therefore,
    it is often used with large amounts of data encryption, personal data encryption,
    and decryption.


    While there are several symmetric algorithms, the first US standard was `DES`.


    Symmetric key cryptography can use either stream ciphers or block ciphers to encrypt
    data. Using stream ciphers is the preferred way to encrypt data in most cases.'
