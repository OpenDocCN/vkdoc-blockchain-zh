    # 去中心化借贷


    DeFi 借贷协议与传统借贷平台类似。该协议使贷方能够将资产借给借方，借方则在归还资产时支付额外的利息费用。DeFi 协议在区块链上运行，无需第三方参与，贷方和借方均为匿名状态。


    由于加密货币市场的波动性可能导致抵押资产价值突然下跌，借方通常需要超额抵押其贷款以增强信用，从而降低贷方的风险。正如我们在之前关于稳定币的章节中所见，DAI
    的工作原理是创建一个 Maker Vault，将超额抵押的价值锁定以抵御波动。借方通常需要始终保持其抵押品价值达到贷款价值的 150%，以避免无法还款。


    以下是一些最受欢迎的 DeFi 借贷平台列表：Aave、Maker 和 Compound。


    我们已经在稳定币章节中讨论过 Maker 协议。在本节中，我们将探讨 Aave 的借贷功能。


    ## DeFi 借贷平台概览——Aave


    Aave 是一个 DeFi 货币市场协议，允许用户以浮动和固定利率借贷加密货币，而无需使用中介机构。2017 年，Aave 的原始版本以 ETHLend 的名义推出。2020
    年，ETHLend 更名为 Aave。


    ### Aave 代币


    Aave 有两种代币：`AAVE` 代币和 `aToken`。


    #### AAVE


    Aave 借贷协议的原生代币是 `AAVE`，一种治理代币。与 Maker 的治理代币类似，`AAVE` 允许持有者对 Aave 社区提交的提案进行投票。


    #### aToken


    `aToken` 代表已供应或已借出并产生利息的加密资产数量。`aToken` 的价值与相应已供应资产的价值以 1:1 的比例挂钩。


    随着 Aave 流动性池的持续增长，`aToken` 的累计利息也会增加。`aToken` 持有者可以直接将质押奖励索取到他们的同一个钱包地址，或者将利息支付重定向到另一个以太坊地址。


    例如，Alice 提供了 1 个 `aETH` 代币的供应，年化收益率为 5%。假设 1 ETH 价值 2000 美元。总资产价值为 2000 美元。Alice
    持有其 `aETH` 代币一年后，赎回了她所有的 `aETH`，假设此时 1 ETH 价值 3000 美元。`aETH` 的价值将为 `1 + 1 * 0.05
    = 1.05 ETH`，换算成美元为 `1.05 * 3000 = 3150 美元`。此次投资的回报率为 57.5%。


    当贷方向流动性池提供加密资产时，Aave 借贷池会向用户账户铸造 `aTokens`。当贷方决定提取其资产时，`aToken` 合约会调用带有计算利率的 `redeem()`
    函数，将资产返还给贷方，并销毁相关的 `aTokens`。`aToken` 合约的赎回过程如图 8-16 所示。


    ![](img/535492_1_En_8_Fig16_HTML.png)


    A A V X 智能合约中的代币决策图，分块展示了代币合约赎回流程，`redeem` 函数按利率计算，最后将资产代币转移给用户。


    **图 8-16** – 在 AAVX 智能合约中赎回 `aToken`


    ### 如何在 Aave 上存款


    **第 1 步** – 访问 Aave 网站：[`https://aave.com/`](https://aave.com/)。点击启动应用程序按钮。然后选择并连接您的钱包到
    Aave 平台。在我们接下来的分步指南中，我们将使用 `USDT` 代币。您可以从流行的加密货币交易所购买 `USDT`。


    ![](img/535492_1_En_8_Figaf_HTML.png)


    一组两个屏幕显示了 Aave 平台中的连接钱包页面。其中包括浏览器钱包、Coinbase 选项等。以太坊市场页面显示了可供应的资产和可借入的资产选项。


    **第 2 步** – 在“可供应资产”面板中点击 `USDT` 供应按钮。将弹出一个窗口，要求您输入要供应的金额。在我们的示例中，我们使用 10 USDT。交易概览部分将为您提供供应年化收益率信息，对于本次供应示例，该收益率为
    1.24%。点击“批准以继续”按钮。确认 Metamask 交易确认信息。


    ![](img/535492_1_En_8_Figag_HTML.png)


    一组两个屏幕显示了以太坊市场页面，其中包含供应 `USDT` 的详细信息。1. 供应 `USDT` 弹出窗口，已输入金额 10，并包含批准以继续按钮。2.
    供应 `USDT` 预览页面，带有 Metamask 确认通知。


    **第 3 步** – 供应获得批准后，“供应 USDT”按钮将被启用。交易完成后点击该按钮。将出现一个“全部完成”确认窗口。接下来，您将被要求将 `aToken`——`aUSDT`
    添加到您的钱包。


    ![](img/535492_1_En_8_Figah_HTML.png)


    一组两个以太坊市场屏幕。1. 显示供应 `USDT` 弹出窗口，包含所有详细信息，并且“供应 USDT”选项已启用。2. 显示“全部完成”确认窗口，以及一些其他详细信息。


    **第 4 步** – 将 `aUSDT` 代币添加到您的钱包。


    ![](img/535492_1_En_8_Figai_HTML.png)


    一组两个屏幕。1. 显示 Metamask 通知页面，以及添加建议代币的选项，以及包含“添加到钱包”详细信息和“确定关闭”按钮的“全部完成”弹出窗口。2.
    在以太坊主网中，资产以 `USDT` 详细信息高亮显示。


    **第 5 步** – 关闭“全部完成”窗口并返回仪表板。仪表板将在“您的供应”部分下显示已供应的 `USDT` 信息。对于已供应的 `USDT` 资产，将启用“提取”按钮：


    ![](img/535492_1_En_8_Figaj_HTML.png)


    一个屏幕显示仪表板，在“您的供应”和“可供应资产”部分下包含 `USDT` 信息。对于已供应的 `USDT` 资产，启用了“提取”按钮。对于可供应资产，启用了“供应”按钮。


    ### 如何在 Aave 上提取


    **第 1 步** – 继续上述流程。接下来，点击已供应 `USDT` 资产旁的“提取”按钮。将弹出“提取”窗口。输入您想要提取的金额。然后点击“提取 USDT”按钮。确认
    Metamask 交易。


    **第 2 步** – 交易完成后，关闭“全部完成”窗口并返回仪表板。仪表板将显示更新后的 `USDT` 信息：


    ![](img/535492_1_En_8_Figak_HTML.png)


    三个屏幕显示了在 Aave 上提取的步骤。1. “提取 USDT”窗口，在金额列中输入了金额，并选择了“提取”按钮。2. “提取 USDT”弹出窗口，以及带有确认信息的
    Metamask 通知。3. 带有“确定关闭”按钮的“全部完成”窗口。

