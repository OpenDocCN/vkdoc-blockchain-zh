  trans: '

    ### 元宇宙简史


    **“元宇宙”一词诞生（1982 年 6 月）**


    `Metaverse` 一词最初由美国作家尼尔·斯蒂芬森在其 1982 年出版的科幻小说《*雪崩*》中创造。故事发生在 21 世纪全球金融崩溃多年后的洛杉矶。《*雪崩*》的主角是一位名叫“英雄·主角”的、手持武士刀的黑客，他在洛杉矶与一个名为
    `Metaverse`（由希腊语前缀“Meta”（意为超越）和“verse”（意为宇宙）组合而成）的虚拟世界之间来回穿梭。


    在书中，`Metaverse` 是一个由用户控制的化身所填充的三维环境。需要使用一种特殊的光滑护目镜（类似于今天的 VR 头显）才能进入。在斯蒂芬森的虚拟世界中，美元毫无价值，取而代之的是替代性的加密数字支付方式，例如
    `Kongbucks`，类似于我们今天的加密货币。


    **第二人生——迈向元宇宙的一步（2003 年 6 月）**


    2003 年，在《*雪崩*》出版近二十年后，直接受《*雪崩*》中 `Metaverse` 启发的在线虚拟世界游戏 `Second Life` 发布。用户可以创建化身、建造家园并与他人交流。


    **Roblox——一个在线多人在线游戏平台（2006 年 1 月）**


    `Roblox` 是一款多人在线视频游戏，使玩家能够编程游戏并游玩其他人制作的游戏。截至 2022 年 9 月，`Roblox` 拥有超过 2.3 亿注册玩家，每日活跃玩家达
    3000 万。


    **Decentraland——首个基于以太坊区块链的虚拟现实平台（2015 年 6 月）**


    `Decentraland` 是一个基于以太坊的去中心化 3D 虚拟现实平台，由埃斯特班·奥尔达诺和阿里尔·梅利奇于 2015 年创建。2017 年，Decentraland
    团队进行了首次代币发行（ICO），筹集了 86,206 个以太坊资金。在 `Decentraland` 中，用户可以创建虚拟对象，如赌场、艺术画廊、实验室、农场和主题公园，然后向公众开放，并收费供其他玩家参观。`Decentraland`
    有两种代币。第一种代币是 `LAND`——一种治理型 NFT 代币；第二种是 `MANA`，一种 `Decentraland` 的原生加密货币代币，用于促进
    `LAND` 的购买。


    `LAND` 管理着 `Decentraland` 中的流程，代表了其中可穿越的虚拟空间和资产。每个非同质化数字资产被划分为由 `LAND` 代币持有者拥有的
    16 米 x16 米的地块，并包含 `Decentraland` 中虚拟商品和服务的所有权。


    **Pokémon Go——首款 AR 手游（2015 年 9 月）**


    `Pokémon Go` 是首款增强现实（AR）移动游戏，由 Niantic Labs 与任天堂及宝可梦公司合作开发。宝可梦被标注在真实的手机地图上，当玩家走到该地点时，他们使用摄像头在现实中检测宝可梦，然后捕捉它们。该游戏于
    2016 年 7 月发布，迅速风靡全球。发布仅七天后，`Pokemon Go` 的单日活跃玩家就超过了 2000 万。


    **堡垒之夜——具有社群的多人游戏（2017 年 7 月）**


    `Fortnite` 是首款拥有游戏社交网络的在线多人在线视频游戏。`Fortnite` 是一款生存对战游戏，在玩家对玩家（PvP）对战模式中，最多 100
    名玩家互相战斗，直到只剩一人站立。它使玩家能够与伙伴联系、建立社群并扩展社交网络，这是玩家持续玩游戏的最强动力之一。`Fortnite` 发布仅两周后，玩家就超过了
    1000 万。截至 2022 年 6 月，`Fortnite` 上仍有大约 300 万玩家。


    **电影——《头号玩家》（2018 年 3 月）**


    史蒂文·斯皮尔伯格的《头号玩家》改编自欧内斯特·克莱因 2011 年的同名小说。故事设定在一个反乌托邦的未来，角色们大部分时间都生活在 `OASIS` 元宇宙中——包括在
    `OASIS` 中上学、工作、玩耍和社交。`OASIS` 使用数字货币进行支付。角色只需进入传送门就可以传送到多个 `Metaverse` 世界。大多数人隐藏真实身份保持匿名。《头号玩家》常被视作未来
    `Metaverse` 的一个例子。


    **Axie Infinity——边玩边赚游戏平台的 NFT（2018 年 3 月）**


    `Axie Infinity` 是一款基于 NFT 的在线视频游戏，玩家可以购买可收藏电子宠物的 NFT，并在对战中让它们相互匹配。`Axie Infinity`
    元宇宙使该游戏具备了“边玩边赚”的设计（也称“付费游玩以赚取”模式），玩家在支付初始费用后，可以通过玩游戏赚取基于以太坊的游戏内代币（`SLP`）。玩家每十四天可以兑现一次代币。


    **微软推出 Mesh（2021 年 4 月）**


    `Microsoft Mesh` 是一个完全虚拟的世界。作为一个 `Metaverse` 平台，用户可以通过任何支持 `Mesh` 的应用程序，在 `HoloLens
    2`、虚拟现实头显、手机、平板电脑或 PC 上连接到 `Mesh`。


    **Facebook 更名为 Meta（2021 年 10 月）**


    2021 年 10 月 28 日，Facebook 宣布将公司名称更改为 `Meta`。该公司基于科幻术语 `Metaverse` 踏入了新业务领域，并试图拥抱这个由虚拟现实构建的全新世界
    `Metaverse`。


    图 7-1 总结了 `Metaverse` 的简要历史。


    ![](img/535492_1_En_7_Fig1_HTML.png)


    一幅示意图描绘了从 1982 年到 2021 年的元宇宙历史。部分标签包括“元宇宙术语诞生”、“Roblox——一个在线多人在线游戏平台”、“Facebook
    更名为 Meta”和“微软推出 Mesh”。


    **图 7-1** 元宇宙简史


    ### 元宇宙的特征


    在 `Metaverse` 中，只要你能够想象，你就可以成为你想成为的人，创造你偏爱的东西，在你想要的地方，以你想要的方式。这种对开发者的完全自由将带来一些有趣的特殊体验，同时对于开放的
    `Metaverse` 运行也是必要的。开发者在构建 `Metaverse` 时应考虑几个特征，如图 7-2 所示。


    ![](img/535492_1_En_7_Fig2_HTML.png)


    一个圆形图描绘了元宇宙的特征。标签部分为：去中心化、沉浸式、虚拟经济、社交体验、持久性、无边界的互操作性。


    **图 7-2** 元宇宙的特征


    - 互操作性

    - 去中心化

    - 沉浸式

    - 无边界

    - 虚拟经济

    - 持久性

    - 社交体验


    让我们回顾一下这些特征，以理解如何开发一个提供独特体验的开放 `Metaverse`。


    #### 互操作性


    `Metaverse` 的互操作性是指个人在不同虚拟世界中与其他各种用户进行交流的能力。用户还可以将自己的数据和数字资产从一个虚拟世界转移到另一个虚拟世界，并按照公开市场确定的市场价值将其交易给其他个人。`Metaverse`
    中的互操作性功能类似于区块链中的互操作性。用户只需一个钱包即可跨不同的 `Metaverse` 虚拟世界执行所有交易。


    #### 去中心化


    虽然互操作性允许用户在虚拟世界之间交换资产，但去中心化是允许共享、开放的虚拟世界 `Metaverse` 的关键属性。用户可以生产自己具有经济价值的数字资产和体验。他们可以顺利地购买和出售它们，而无需依赖任何中央权威机构。通过去中心化，个人在
    `Metaverse` 中获得了对其资产的完全控制权。这也意味着 `Metaverse` 并非由单一公司或平台拥有。它具有跨平台互操作性，并且其内部经济应该既稳健又具有竞争力。

