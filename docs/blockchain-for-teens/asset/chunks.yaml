    In Chapter [5](#535492_1_En_5_Chapter.xhtml), we have briefly discussed the ERC-20
    token. There are many ways to create ERC-20 tokens. If you are an experienced
    smart contract developer, you can write your own ERC-20 token. To simplify, we
