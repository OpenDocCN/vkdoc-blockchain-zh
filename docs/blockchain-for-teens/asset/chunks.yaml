- fmt: "# Digital Signatures\n\nA digital signature is an asymmetric public key cryptography\
    \ technique that verifies digital messages or document owner authenticity.\n\n\
    We often use the public key for message encryption and the private key for message\
    \ decryption in public key encryption. However, in the case of a digital signature,\
    \ the message is encrypted with a sender's private key, or in other words, the\
    \ message is signed.\n\nAs the signer's public key is known, anybody can verify\
    \ a message's digital signature.\n\nA digital signature includes the following\
    \ characteristics:\n\n- **Authentication** (verification of who signed the origin\
    \ of the document)\n- **Nonrepudiation** (the identity of the signer and document\
    \ that they have digitally signed should be undeniable)\n- **Integrity** (proof\
    \ that the document has not been altered since signing)\n\n# Hash Algorithms\n\
    \nIn Chapter [1](#535492_1_En_1_Chapter.xhtml), “How Blockchain Works” section,\
    \ the hash concept was introduced, and the way that blockchain uses the `SHA-256`\
    \ hash function to hash transaction data was discussed. In the previous section,\
    \ the process of digital signatures was discussed. The process indicated that\
    \ the process needed to apply a hash function.\n\nHash algorithm is a mathematical\
    \ function that divides original data input into smaller blocks of equal size\
    \ and then executes the hash function to two fixed-size data blocks to generate\
    \ a hash code. The algorithm starts from the first block of message data with\
    \ a seed value that passes into the hash function, outputting the first hash code.\n\
    \n![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig13_HTML.jpg)\n\nAn illustration\
    \ depicts the algorithm code of the 2 data blocks generate a hash function. It\
    \ gives the hash value `356A192B7913B04C54574D18C28D46E6395428AB`.\n\n**Figure\
    \ 2-13**  \nTwo fixed-size data blocks used to generate a hash code\n\nThe process\
    \ is similar to block cipher, discussed in the previous section. The hash process\
    \ will start from the first block and end at the last block. This process can\
    \ be repeated for as many rounds as are required by the algorithm. Eventually,\
    \ all block data will be chained together and hashed.\n\n![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig14_HTML.jpg)\n\
    \nA flow diagram of the hash algorithm. The labeled flows are data seed, message\
    \ block, and hash function. The process is continued till receiving the hash value.\n\
    \n**Figure 2-14**  \nThe hash algorithm\n\n## The Keccak-256 Algorithm\n\nThe\
    \ `Keccak-256` algorithm is a hash function that is widely used in an Ethereum\
    \ blockchain. A few examples include Ethereum addresses, some smart contract functions,\
    \ and the Ethereum consensus engine known as `Ethash` that plays an important\
    \ role in producing blocks and other security actions.\n\nThe `Keccak-256` is\
    \ a family of `SHA-3` hash functions. The function input can be a variable-length\
    \ string or number, and generated output will always be a fixed-length, 64-character\
    \ (letters and numbers) output. The output can be converted to hexadecimal numbers.\
    \ Like all other hash functions, it is a one-way cryptographic hash function.\n\
    \n`Keccak-256` is based on the sponge construction and is a sponge function family.\
    \ `Keccak-256` sponge function (`Keccak[r,c]`) needs two parameters: one of size\
    \ `r` (the bitrate and the amount of data encoded for a single unit of time) and\
    \ the other of size `c` (the capacity).\n\n**Padding**  \nA padding function will\
    \ append enough bits to the input data (`M`), and the length of the padded input\
    \ can be split into multiple `r`-bit blocks.\n\n**Initialization**  \nThe padded\
    \ input is broken into `r`-bit blocks, assuming the blocks' names are called `M0`,\
    \ `M1`, `M2`, and so on.\n\n**The Absorbing Phase**  \nThe `r`-bit block is `XORed`\
    \ with small chunks of the input data `M0`. The result is then passed to a compression\
    \ function `f`. The output of function `f` is `XORed` with next message `M1`.\
    \ The process is repeated until each of the message blocks `Mn` is processed.\
    \ In each step, a small chunk of the input data (the bit length of `r`) is “absorbed”\
    \ into the buffer.\n\n**The Squeezing Phase**  \nThe same process is repeated.\
    \ The `r`-bit block of the buffer consists of the next `r` bits of output (`Z0`,\
    \ `Z1`, `Z2`, and so on). The function `f` is used to extract `r` bits of data\
    \ as the next `r` bits of the output. The process is repeated until the results\
    \ are produced.\n\nFigure [2-15](#535492_1_En_2_Chapter.xhtml#Fig15) illustrates\
    \ the `Keccak-256` hash algorithm.\n\n![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig15_HTML.png)\n\
    \nAn algorithm depicts the `Keccak-256` hash values, through 2 processes absorbing\
    \ and squeezing. The labeled process is the message, pad, and output.\n\n**Figure\
    \ 2-15**  \nThe `Keccak-256` hash algorithm"
  raw: '#### Digital Signatures


    A digital signature is an asymmetric public key cryptography technique that verifies
    digital messages or document owner authenticity.


    We often use the public key for message encryption and the private key for message
    decryption in public key encryption. However, in the case of a digital signature,
    the message is encrypted with a sender''s private key, or in other words, the
    message is signed.


    As the signer''s public key is known, anybody can verify a message''s digital
    signature.


    A digital signature includes the following characteristics:


    *   Authentication (verification of who signed the origin of the document)


    *   Nonrepudiation (the identity of the signer and document that they have digitally
    signed should be undeniable)


    *   Integrity (proof that the document has not been altered since signing)


    #### Hash Algorithms


    In Chapter [1](#535492_1_En_1_Chapter.xhtml), “How Blockchain Works” section,
    the hash concept was introduced, and the way that blockchain uses the SHA-256
    hash function to hash transaction data was discussed. In the previous section,
    the process of digital signatures was discussed. The process indicated that the
    process needed to apply a hash function.


    Hash algorithm is a mathematical function that divides original data input into
    smaller blocks of equal size and then executes the hash function to two fixed-size
    data blocks to generate a hash code. The algorithm starts from the first block
    of message data with a seed value that passes into the hash function, outputting
    the first hash code.


    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig13_HTML.jpg)


    An illustration depicts the algorithm code of the 2 data blocks generate a hash
    function. It gives the hash value 356A192B7913B04C54574 D18C28D46E6395428AB.


    Figure 2-13


    Two fixed-size data blocks used to generate a hash code


    The process is similar to block cipher, discussed in the previous section. The
    hash process will start from the first block and end at the last block. This process
    can be repeated for as many rounds as are required by the algorithm. Eventually,
    all block data will be chained together and hashed.


    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig14_HTML.jpg)


    A flow diagram of the hash algorithm. The labeled flows are data seed, message
    block, and hash function. The process is continued till receiving the hash value.


    Figure 2-14


    The hash algorithm


    ##### The Keccak-256 Algorithm


    The Keccak-256 algorithm is a hash function that is widely used in an Ethereum
    blockchain. A few examples include Ethereum addresses, some smart contract functions,
    and the Ethereum consensus engine known as Ethash that plays an important role
    in producing blocks and other security actions.


    The Keccak-256 is a family of SHA-3 hash functions. The function input can be
    a variable-length string or number, and generated output will always be a fixed-length,
    64-character (letters and numbers) output. The output can be converted to hexadecimal
    numbers. Like all other hash functions, it is a one-way cryptographic hash function.


    Keccak-256 is based on the sponge construction and is a sponge function family.
    Keccak-256 sponge function (Keccak[r,c]) needs two parameters: one of size r (the
    bitrate and the amount of data encoded for a single unit of time) and the other
    of size c (the capacity).


    **Padding**


    A padding function will append enough bits to the input data (M), and the length
    of the padded input can be split into multiple r-bit blocks.


    **Initialization**


    The padded input is broken into r-bit blocks, assuming the blocks'' names are
    called M0, M1, M2, and so on.


    **The Absorbing Phase**


    The r-bit block is XORed with small chunks of the input data M0\. The result is
    then passed to a compression function f. The output of function f XORed next message
    M1\. The process is repeated until each of the message blocks Mn is processed.
    In each step, a small chunk of the input data (the bit length of r) is “absorbed”
    into the buffer.


    **The Squeezing Phase**


    The same process is repeated. The r-bit block of the buffer consists of the next
    r bits of output (Z0, Z1, Z2, and so on). The function f is used to extract r
    bits of data as the next r bits of the output. The process is repeated until the
    results are produced.


    Figure [2-15](#535492_1_En_2_Chapter.xhtml#Fig15) illustrates the Keccak-256 hash
    algorithm.


    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig15_HTML.png)


    An algorithm depicts the Keceeak-256 hash values, through 2 processes absorbing
    and squeezing. The labeled process is the message, pad, and output.3658-89/+/


    Figure 2-15


    The Keccak-256 hash algorithm'
  trans: "\n# 数字签名\n\n数字签名是一种非对称公钥密码学技术，用于验证数字消息或文档所有者的真实性。\n\n在公钥加密中，我们通常使用公钥加密消息，使用私钥解密消息。然而，在数字签名中，消息是用发送者的私钥加密的，换句话说，就是对消息进行签名。\n\
    \n由于签名者的公钥是公开的，任何人都可以验证消息的数字签名。\n\n数字签名包含以下特征：\n\n-   **身份认证**（验证谁签署了文档的源）\n-\
    \   **不可否认性**（签名者的身份及其数字签名的文档应是不可抵赖的）\n-   **完整性**（证明文档自签名后未被更改）\n\n# 哈希算法\n\n\
    在第 1 章的“区块链如何工作”部分，介绍了哈希的概念，并讨论了区块链如何使用 `SHA-256` 哈希函数对交易数据进行哈希处理。在上一节中，讨论了数字签名的过程。该过程表明需要应用哈希函数。\n\
    \n哈希算法是一种数学函数，它将原始数据输入分割成大小相等的较小块，然后对两个固定大小的数据块执行哈希函数以生成哈希码。该算法从消息数据的第一个块开始，使用一个种子值传入哈希函数，输出第一个哈希码。\n\
    \n![](img/535492_1_En_2_Fig13_HTML.jpg)\n\n一幅插图演示了两个数据块的算法代码生成一个哈希函数。它给出了哈希值 `356A192B7913B04C54574D18C28D46E6395428AB`。\n\
    \n**图 2-13**  \n用于生成哈希码的两个固定大小的数据块\n\n该过程类似于上一节讨论的分组密码。哈希过程将从第一个块开始，到最后一个块结束。根据算法的要求，这个过程可以重复任意多轮。最终，所有块数据将被链接在一起并进行哈希处理。\n\
    \n![](img/535492_1_En_2_Fig14_HTML.jpg)\n\n哈希算法的流程图。标记的流程包括数据种子、消息块和哈希函数。该过程持续进行，直到得到哈希值。\n\
    \n**图 2-14**  \n哈希算法\n\n## Keccak-256 算法\n\n`Keccak-256` 算法是一种在以太坊区块链中广泛使用的哈希函数。一些例子包括以太坊地址、某些智能合约函数，以及被称为\
    \ `Ethash` 的以太坊共识引擎，它在区块生产和其他安全操作中扮演着重要角色。\n\n`Keccak-256` 是 `SHA-3` 哈希函数家族的一员。函数输入可以是可变长度的字符串或数字，生成的输出始终是固定长度的\
    \ 64 个字符（字母和数字）的输出。该输出可以转换为十六进制数字。与所有其他哈希函数一样，它是一个单向加密哈希函数。\n\n`Keccak-256` 基于海绵结构，是海绵函数家族的一员。`Keccak-256`\
    \ 海绵函数（`Keccak[r,c]`）需要两个参数：一个大小为 `r`（比特率，即单位时间内编码的数据量）和另一个大小为 `c`（容量）。\n\n**填充**\
    \  \n填充函数会向输入数据（`M`）追加足够的比特，使得填充后的输入长度可以被分割成多个 `r` 比特的块。\n\n**初始化**  \n填充后的输入被分解成\
    \ `r` 比特的块，假设这些块分别命名为 `M0`、`M1`、`M2` 等等。\n\n**吸收阶段**  \n将 `r` 比特的块与输入数据 `M0` 的小块进行\
    \ `XOR` 运算。结果随后被传递给压缩函数 `f`。函数 `f` 的输出与下一条消息 `M1` 进行 `XOR` 运算。重复此过程，直到每个消息块 `Mn`\
    \ 都被处理完。在每一步中，一小块输入数据（`r` 的比特长度）被“吸收”到缓冲区中。\n\n**挤压阶段**  \n重复相同的过程。缓冲区的 `r` 比特块构成输出的下\
    \ `r` 比特（`Z0`、`Z1`、`Z2` 等等）。使用函数 `f` 提取 `r` 比特的数据作为输出的下 `r` 比特。重复此过程，直到生成结果。\n\
    \n图 2-15 展示了 `Keccak-256` 哈希算法。\n\n![](img/535492_1_En_2_Fig15_HTML.png)\n\n一幅算法图展示了\
    \ `Keccak-256` 哈希值，通过吸收和挤压两个过程。标记的过程包括消息、填充和输出。\n\n**图 2-15**  \n`Keccak-256`\
    \ 哈希算法\n"
- fmt: "# Elliptic Curve Cryptography (ECC)\n\nECC was discovered in 1985 by Victor\
    \ Miller (IBM) and Neil Koblitz (University of Washington) independently and is\
    \ currently one of the most robust and widely used types of encryption cryptography.\
    \ Blockchain networks, such as Bitcoin and Ethereum, use ECC.\n\nIn 2005, the\
    \ US National Security Agency (NSA) announced a set of unpublished algorithms\
    \ known as Suite B protocols and posted a paper titled “The Case for Elliptic\
    \ Curve Cryptography” in which they recommended that the US government use ECC\
    \ to secure sensitive and unclassified communications. ^([²](#fn2))\n\nThe NSA\
    \ commented that analysts should “take advantage of the past 30 years of public\
    \ key research and analysis and move from first generation public key algorithms\
    \ and on to elliptic curves.”\n\nSuite B’s protocols included both elliptic curve\
    \ Diffie-Hellman (ECDH) and elliptic curve Menezes-Qu-Vanstone (ECMQV) for key\
    \ exchange, the elliptic curve digital signature algorithm (ECDSA) for digital\
    \ signatures, the advanced encryption standard (AES) for symmetric encryption,\
    \ and the secure hashing algorithm (SHA). After the release of these protocols,\
    \ ECC soon became the de facto standard for protecting modern industry communications.\n\
    \nECC is based on algebraic properties of elliptic curves and provides equivalent\
    \ security with much smaller key sizes than other asymmetric cryptography systems,\
    \ such as RSA or DSA. For example, a 256-bit ECC key is equal in power to a 3072-bit\
    \ RSA key. This also makes elliptic curves significantly faster.\n\n## What Is\
    \ an Elliptic Curve?\n\nAn elliptic curve is a curve given through the following\
    \ equation:\n\n`y² = x³ + Ax + B`\n\nThe curve, as required, is nonsingular and\
    \ needs to have no repeated roots or self-intersections. To ensure that the curve\
    \ is nonsingular, the condition can be expressed through the following equation:\n\
    \n`4A³ + 27B² ≠ 0`\n\nAn example of the elliptic curve when `A = -1` and `B =\
    \ 1` can be seen in Figure [2-16](#535492_1_En_2_Chapter.xhtml#Fig16):\n\n![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig16_HTML.png)\n\
    \nA curve graph depicts the elliptic of the equation `y² = x³ - x + 1`. The curve\
    \ started at point negative 3, bent in negative 1.5, and ended at 3 approximately.\n\
    \n**Figure 2-16**  \nElliptic curve `y² = x³ - x + 1`\n\n`y² = x³ - x + 1`\n\n\
    In an elliptic curve, there is a useful property to create an addition on the\
    \ curve, turning it into an abelian group. Take two points, `P` and `Q`, on the\
    \ curve, and draw a line through them. The line will intersect the curve at one\
    \ more point (`R`). Take `P + Q` as `R`, and from `R`, another line can be drawn\
    \ either straight up (if `R` is below the x-axis) or straight down (if `R` is\
    \ above the x-axis) to the other side of the curve, opposite to the point `-R`\
    \ (see Figure [2-17](#535492_1_En_2_Chapter.xhtml#Fig17)).\n\n![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig17_HTML.jpg)\n\
    \nA curve graph depicts the addition of 2 points `R` and `-R` of elliptic. The\
    \ curve passes a line of axis `P`, `Q`, and `R`. The result is calculated by `-R`\
    \ implies `P + Q`.\n\n**Figure 2-17**  \nThe elliptic curve addition of two points\
    \ (`R` and `-R`)\n\nThe group law for an elliptic curve is expressed through either\
    \ of the following equations:\n\n`P + Q + R = 0`, or `P + Q = -R`\n\nThe sum of\
    \ the points `P` and `Q` is equal to the point `-R`.\n\nWith the addition of points\
    \ `P = (x[1], y[1])` and `Q = (x[2], y[2])` of an elliptic curve, a third point\
    \ can be calculated using the following formulas:\n\n`P + Q = R = (x[3], y[3])`\
    \ where\n\n![](images/535492_1_En_2_Chapter/535492_1_En_2_Figa_HTML.jpg)\n\nEquations\
    \ for `x[3]` and `y[3]`. Value of lambda for `P ≠ Q` and `P = Q`.\n\nElliptic\
    \ curve `E` over `Z[p]` is defined by the following equations, and `Z[p]` is field\
    \ modulo `p`, meaning that `{0, 1, 2, …, n - 1}`:\n\n![](images/535492_1_En_2_Chapter/535492_1_En_2_Figb_HTML.jpg)\n\
    \nA formula depicts the mod `p` equation of `y² = x³ + Ax + B`, and `A, B ∈ Z[p]`,\
    \ `4A³ + 27B² ≠ 0`.\n\nBy applying this formula, the elliptic curve `E` over `Z[p]`\
    \ - `E(Z[p])` has a list of points `(x, y)`. In the following example, elliptic\
    \ curve `y² = x³ + Ax + B = x³ + 2x + 3 → y² (mod 5)`, where `A = 2`, `B = 3`,\
    \ and `P = 5`. This can be seen through the following:\n\n*   `X = 0 → y² = 3\
    \ → no solution (mod 5)`\n*   `X = 1 → y² = 6 → 6 (mod 5) = 1`\n*   `→ y = 1,\
    \ 4` because `1² (mod 5) = 1`, and `4² (mod 5) = 1`\n*   `X = 2 → y² = 15 → 15\
    \ (mod 5) = 0`\n*   `→ y = 0` because `0² (mod 5) = 0`\n*   `X = 3 → y² = 36 →\
    \ 36 (mod 5) = 1`\n*   `→ y = 1, 4` because `1² (mod 5) = 1`, and `4² (mod 5)\
    \ = 1`\n*   `X = 4 → y² = 75 → 75 (mod 5) = 0`\n*   `→ y = 0` because `0² (mod\
    \ 5) = 0`\n\nThen, the elliptic curve has the following seven points:\n\n`(1,\
    \ 1)`, `(1, 4)`, `(2, 0)`, `(3, 1)`, `(3, 4)`, `(4, 0)`, `∞`.\n\nNow, rearranging\
    \ the modulus operator `P = 263` leaves the following equation:\n\n`(x³ + 2x +\
    \ 3) (mod 263)`\n\nScalar multiplication over the elliptic curve `y² = x³ + 2x\
    \ + 3` in mod 263. The curve has 270 points, including the point at infinity.\n\
    \n![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig18_HTML.png)\n\nA dot depicts\
    \ the elliptic curve of equation `y² = x³ + 2x + 3`, representing the point as\
    \ `Q` and `P`. Both axis ranges from 0 to 250.\n\n**Figure 2-18**  \nElliptic\
    \ curve `y² = x³ + 2x + 3 (mod 263)`\n\nIn the elliptic curve, when if `P = (x,\
    \ y) ∈ E(Z[p])`, then `(x, y) + (x, -y) = ∞` (the point at infinity).\n\nSo, if\
    \ adding `∞` to any point `P` in `E(Z[p])`, we can always get `P` back. This can\
    \ be expressed through the following equation:\n\n`P + ∞ = ∞ + P = P` for all\
    \ `P ∈ E(Z[p])`\n\nIn Alice’s and Bob’s message communication, `P` is a `(x, y)`\
    \ point on the curve that both Bob and Alice will agree to. Bob’s private key\
    \ is represented by `n`, and `K` is his public key. We multiply `P` and `n` together\
    \ to produce `K`, as shown as follows:\n\n`K = n P`\n\nIf we multiply `K` with\
    \ `P`, it will get the point on the elliptic curve."
  raw: '##### Elliptic Curve Cryptography (ECC)


    ECC was discovered in 1985 by Victor Miller (IBM) and Neil Koblitz (University
    of Washington) independently and is currently one of the most robust and widely
    used types of encryption cryptography. Blockchain networks, such as Bitcoin and
    Ethereum, use ECC.


    In 2005, the US National Security Agency (NSA) announced a set of unpublished
    algorithms known as Suite B protocols and posted a paper titled “The Case for
    Elliptic Curve Cryptography” in which they recommended that the US government
    use ECC to secure sensitive and unclassified communications. ^([²](#fn2))


    The NSA commented that analysts should “take advantage of the past 30 years of
    public key research and analysis and move from first generation public key algorithms
    and on to elliptic curves.”


    Suite B’s protocols included both elliptic curve Diffie-Hellman (ECDH) and elliptic
    curve Menezes-Qu-Vanstone (ECMQV) for key exchange, the elliptic curve digital
    signature algorithm (ECDSA) for digital signatures, the advanced encryption standard
    (AES) for symmetric encryption, and the secure hashing algorithm (SHA). After
    the release of these protocols, ECC soon became the de facto standard for protecting
    modern industry communications.


    ECC is based on algebraic properties of elliptic curves and provides equivalent
    security with much smaller key sizes than other asymmetric cryptography systems,
    such as RSA or DSA. For example, a 256-bit ECC key is equal in power to a 3072-bit
    RSA key. This also makes elliptic curves significantly faster.


    **What Is an Elliptic Curve?**


    An elliptic curve is a curve given through the following equation:


    y ² = x ³ + Ax + B


    The curve, as required, is nonsingular and needs to have no repeated roots or
    self-intersections. To ensure that the curve is nonsingular, the condition can
    be expressed through the following equation:


    4A³ + 27B² ≠ 0


    An example of the elliptic curve when A = -1 and B = 1 can be seen in Figure [2-16](#535492_1_En_2_Chapter.xhtml#Fig16):


    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig16_HTML.png)


    A curve graph depicts the elliptic of the equation y square is equal to cubic
    x minus x plus 1\. The curve started at point negative 3, bent in negative 1.5,
    and ended at 3 approximately.


    Figure 2-16


    Elliptic curve y² = x³ - x + 1


    y² = x³ - x + 1


    In an elliptic curve, there is a useful property to create an addition on the
    curve, turning it into an abelian group. Take two points, P and Q, on the curve,
    and draw a line through them. The line will intersect the curve at one more point
    (R). Take P + Q as R, and from R, another line can be drawn either straight up
    (if R is below the x-axis) or straight down (if R is above the x-axis) to the
    other side of the curve, opposite to the point -R (see Figure [2-17](#535492_1_En_2_Chapter.xhtml#Fig17)).


    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig17_HTML.jpg)


    A curve graph depicts the addition of 2 points R and negative R of elliptic. The
    curve passes a line of axis P, Q, and R. The result is calculated by negative
    R implies P plus Q.


    Figure 2-17


    The elliptic curve addition of two points (R and -R)


    The group law for an elliptic curve is expressed through either of the following
    equations:


    P + Q + R = 0, or P + Q = - R


    The sum of the points P and Q is equal to the point - R.


    With the addition of points P = (x[1], y[1]) and Q = (x[2], y[2]) of an elliptic
    curve, a third point can be calculated using the following formulas:


    P + Q = R = (x[3], y[3]) where


    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Figa_HTML.jpg)


    Equations for x cube and y cube. Value of lambda for P not equal to Q and P equal
    to Q


    Elliptic curve E over Z[p] is defined by the following equations, and Z[p] is
    field modulo p, meaning that {0, 1, 2, …, n - 1}:


    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Figb_HTML.jpg)


    A formula depicts the mod p equation of y square equals cubic 3 plus A x plus
    B, and A B E Z of p, 4 cubic A plus 27 B square not equal to 0.


    By applying this formula, the elliptic curve E over Z[p] - E(Z[p]) has a list
    of points (x, y). In the following example, elliptic curve y² = x³ + Ax + B =
    x ³ + 2x + 3 → y²(mod 5), where A = 2, B = 3, and P = 5\. This can be seen through
    the following:


    *   X = 0 → y² = 3 → no solution (mod 5)


    *   X = 1 → y² = 6 → 6 (mod 5) = 1


    *   → y = 1, 4 because 1² (mod 5) = 1, and 4² (mod 5) = 1


    *   X = 2 → y² = 15 → 15 (mod 5) = 0


    *   → y = 0 because 0² (mod 5) = 0


    *   X = 3 → y² = 36 → 36 (mod 5) = 1


    *   → y = 1, 4 because 1² (mod 5) = 1, and 4² (mod 5) = 1


    *   X = 4 → y² = 75 → 75 (mod 5) = 0


    *   → y = 0 because 0² (mod 5) = 0


    Then, the elliptic curve has the following seven points:


    (1, 1), (1, 4), (2, 0), (3, 1), (3, 4), (4, 0), ∞.


    Now, rearranging the modulus operator P = 263 leaves the following equation:


    (x³ + 2x + 3) (mod 263)


    Scalar multiplication over the elliptic curve y² = x³ + 2x + 3 in mod 263\. The
    curve has 270 points, including the point at infinity.


    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig18_HTML.png)


    A dot depicts the elliptic curve of equation y square equal to cubic 3 plus 2
    x plus 3, representing the point as Q and P. Both axis ranges from 0 to 250.


    Figure 2-18


    Elliptic curve y² = x³ + 2x + 3 (mod 263)


    In the elliptic curve, when if P is (x, y) ∈ *E(Z*[*p*]*)*, then (x, y) + (x,
    -y) = ∞ (the point at infinity).


    So, if adding ∞ to any point P in E(Z[p]), we can always get P back. This can
    be expressed through the following equation:


    P + ∞ = ∞ + P = P for all ∈ E(Z[p])


    In Alice’s and Bob’s message communication, P is a (x,y) point on the curve that
    both Bob and Alice will agree to. Bob’s private key is represented by n, and K
    is his public key. We multiply P and n together to produce K, as shown as follows:


    K = n P


    If we multiply K with P, it will get the point on the elliptic curve.'
  trans: "\n# 椭圆曲线密码学（ECC）\n\nECC 由维克多·米勒（IBM）和尼尔·科布利茨（华盛顿大学）于 1985 年独立发现，目前是最稳健且应用最广泛的加密密码类型之一。区块链网络，如比特币和以太坊，都使用了\
    \ ECC。\n\n2005 年，美国国家安全局（NSA）公布了一套未公开的算法，称为 B 套件协议，并发布了一篇题为“椭圆曲线密码学的案例”的论文，其中建议美国政府使用\
    \ ECC 来保护敏感的非机密通信。^(²)\n\nNSA 评论称，分析师应“利用过去 30 年的公钥研究和分析成果，从第一代公钥算法转向椭圆曲线。”\n\n\
    B 套件的协议包括用于密钥交换的椭圆曲线迪菲-赫尔曼（ECDH）和椭圆曲线 Menezes-Qu-Vanstone（ECMQV）、用于数字签名的椭圆曲线数字签名算法（ECDSA）、用于对称加密的高级加密标准（AES）以及安全哈希算法（SHA）。在这些协议发布后，ECC\
    \ 很快成为保护现代工业通信的事实标准。\n\nECC 基于椭圆曲线的代数性质，与其他非对称密码系统（如 RSA 或 DSA）相比，能以更小的密钥大小提供等效的安全性。例如，一个\
    \ 256 位的 ECC 密钥与一个 3072 位的 RSA 密钥具有同等强度。这也使得椭圆曲线速度显著更快。\n\n## 什么是椭圆曲线？\n\n椭圆曲线是通过以下方程给出的一条曲线：\n\
    \n`y² = x³ + Ax + B`\n\n该曲线按要求是非奇异的，且不能有重根或自交点。为了确保曲线是非奇异的，可以通过以下方程来表示该条件：\n\n\
    `4A³ + 27B² ≠ 0`\n\n当 `A = -1` 且 `B = 1` 时，椭圆曲线的一个示例如图 2-16 所示：\n\n![](img/535492_1_En_2_Fig16_HTML.png)\n\
    \n一条曲线图描绘了方程 `y² = x³ - x + 1` 的椭圆。曲线从点负 3 开始，在负 1.5 处弯曲，并在大约 3 处结束。\n\n**图 2-16**\
    \  \n椭圆曲线 `y² = x³ - x + 1`\n\n`y² = x³ - x + 1`\n\n在椭圆曲线上，有一个有用的性质可以创建曲线上的加法，使其成为一个阿贝尔群。取曲线上的两点\
    \ `P` 和 `Q`，并画一条穿过它们的直线。该直线将与曲线相交于另一点（`R`）。将 `P + Q` 视为 `R`，然后从 `R` 出发，可以画另一条直线（如果\
    \ `R` 位于 x 轴下方则向上，如果 `R` 位于 x 轴上方则向下）到达曲线的另一侧，与点 `-R` 相对（见图 2-17）。\n\n![](img/535492_1_En_2_Fig17_HTML.jpg)\n\
    \n一条曲线图描绘了椭圆上两点 `R` 和 `-R` 的加法。曲线穿过经过 `P`、`Q` 和 `R` 的轴线。结果由 `-R` 表示 `P + Q` 计算得出。\n\
    \n**图 2-17**  \n椭圆曲线上两点的加法（`R` 和 `-R`）\n\n椭圆曲线的群律通过以下任一方程表示：\n\n`P + Q + R = 0`，或\
    \ `P + Q = -R`\n\n点 `P` 和 `Q` 的和等于点 `-R`。\n\n通过对椭圆曲线的点 `P = (x[1], y[1])` 和 `Q\
    \ = (x[2], y[2])` 进行加法运算，可以使用以下公式计算第三个点：\n\n`P + Q = R = (x[3], y[3])` 其中\n\n\
    ![](img/535492_1_En_2_Figa_HTML.jpg)\n\n`x[3]` 和 `y[3]` 的方程。当 `P ≠ Q` 和 `P = Q`\
    \ 时 lambda 的值。\n\n在 `Z[p]` 上的椭圆曲线 `E` 由以下方程定义，其中 `Z[p]` 是模 `p` 的域，即 `{0, 1, 2,\
    \ …, n - 1}`：\n\n![](img/535492_1_En_2_Figb_HTML.jpg)\n\n一个公式描述了 `y² = x³ + Ax\
    \ + B` 的模 `p` 方程，且 `A, B ∈ Z[p]`，`4A³ + 27B² ≠ 0`。\n\n通过应用此公式，在 `Z[p]` 上的椭圆曲线\
    \ `E` - `E(Z[p])` 有一组点 `(x, y)`。在以下示例中，椭圆曲线 `y² = x³ + Ax + B = x³ + 2x + 3 →\
    \ y² (mod 5)`，其中 `A = 2`，`B = 3`，且 `P = 5`。这可以通过以下内容看出：\n\n*   `X = 0 → y² = 3\
    \ → 无解 (mod 5)`\n*   `X = 1 → y² = 6 → 6 (mod 5) = 1`\n*   `→ y = 1, 4` 因为 `1²\
    \ (mod 5) = 1`，且 `4² (mod 5) = 1`\n*   `X = 2 → y² = 15 → 15 (mod 5) = 0`\n* \
    \  `→ y = 0` 因为 `0² (mod 5) = 0`\n*   `X = 3 → y² = 36 → 36 (mod 5) = 1`\n*  \
    \ `→ y = 1, 4` 因为 `1² (mod 5) = 1`，且 `4² (mod 5) = 1`\n*   `X = 4 → y² = 75 →\
    \ 75 (mod 5) = 0`\n*   `→ y = 0` 因为 `0² (mod 5) = 0`\n\n于是，该椭圆曲线有以下七个点：\n\n`(1,\
    \ 1)`, `(1, 4)`, `(2, 0)`, `(3, 1)`, `(3, 4)`, `(4, 0)`, `∞`。\n\n现在，重新排列模运算符 `P\
    \ = 263` 得到以下方程：\n\n`(x³ + 2x + 3) (mod 263)`\n\n在模 263 下椭圆曲线 `y² = x³ + 2x +\
    \ 3` 上的标量乘法。该曲线有 270 个点，包括无穷远点。\n\n![](img/535492_1_En_2_Fig18_HTML.png)\n\n一个点图描绘了方程\
    \ `y² = x³ + 2x + 3` 的椭圆曲线，将点表示为 `Q` 和 `P`。两个坐标轴范围均为 0 到 250。\n\n**图 2-18**  \n\
    椭圆曲线 `y² = x³ + 2x + 3 (mod 263)`\n\n在椭圆曲线中，如果 `P = (x, y) ∈ E(Z[p])`，则 `(x, y)\
    \ + (x, -y) = ∞`（无穷远点）。\n\n因此，如果将 `∞` 加到 `E(Z[p])` 中的任意点 `P` 上，总能得到 `P` 本身。这可以通过以下方程表示：\n\
    \n`P + ∞ = ∞ + P = P` 对于所有 `P ∈ E(Z[p])`\n\n在爱丽丝和鲍勃的消息通信中，`P` 是曲线上鲍勃和爱丽丝都将同意的\
    \ `(x, y)` 点。鲍勃的私钥由 `n` 表示，`K` 是他的公钥。我们将 `P` 和 `n` 相乘得到 `K`，如下所示：\n\n`K = n P`\n\
    \n如果将 `K` 与 `P` 相乘，将得到曲线上的点。\n"
- fmt: "### Deriving an Ethereum Address\n\nWe have learned about cryptography so\
    \ far. Now it is time to do some practice and apply our knowledge to generate\
    \ an Ethereum address. We will utilize multiple online tools to do this exercise.\
    \ Of course, you can choose a different tool if you find a better one, or you\
    \ can even write code to implement the same result:\n\n1.  Create a random private\
    \ key and derive the public key from this private key using EC curve (`secp256k1`).\n\
    \n    The private key is 64 hexadecimal characters long (32 bytes).\n\n    Here\
    \ we use an online tool ([https://​kjur.​github.​io/​jsrsasign/​sample/​sample-ecdsa.​html](https://kjur.github.io/jsrsasign/sample/sample-ecdsa.xhtml))\
    \ to get a public and private key pair. The generated public and private key pair\
    \ can be seen in Figure [2-19](#535492_1_En_2_Chapter.xhtml#Fig19).\n\n    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig19_HTML.jpg)\n\
    \n    An algorithm depicts the elliptic supported by the chosen EC curve name\
    \ and generates key pair. The process is generated by 2 keys EC private key and\
    \ EC public key.\n\n    **Figure 2-19** The elliptic curve generating public and\
    \ private keys\n\n    Private key: `8c2b80899dd44981d7f8b38c1f5b13dbf1fbb98c360d9d1cfd63a3aed0d7b498`\n\
    \n    Public key: `04502fa444861915b6a258c3daa2beaa41c9b912e6fd6cd526fa179c60362f602bd75e36cfe1513a1e460ca646476e54fab08aa42730068326ab0a8a2e57d2829b`\n\
    \n2.  Derive the address from the following public key:\n\n    Start with the\
    \ public key (128 characters) and apply the `Keccak-256` hash of the public key.\
    \ It will generate a string that is 64 characters long (32 bytes). Let’s use the\
    \ `Keccak-256` online tool ([https://​emn178.​github.​io/​online-tools/​keccak_​256.​html](https://emn178.github.io/online-tools/keccak_256.xhtml))\
    \ to see the hash result (see Figure [2-20](#535492_1_En_2_Chapter.xhtml#Fig20)).\n\
    \n    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig20_HTML.png)\n\n    Two\
    \ algorithms depict the address and derivation of the `Keccak-256` online hash\
    \ function. The keys labeled are input type, hash, and auto-update.\n\n    **Figure\
    \ 2-20** `Keccak-256` hash public key example\n\n    The result is `db97247835ec1f9d0bd8b6ed***6a6d125cf3029f4ccbe72cc1b1a4c7a8c72467a3***`\n\
    \n3.  Get the Ethereum address\n\n    Take the last 20 bytes (40 characters) of\
    \ the generated hash to get the Ethereum address with prefix `0x`. `0x` lets the\
    \ people know the address in hexadecimal format. When prefixed with `0x`, it becomes\
    \ 42 characters long. So, in our example, the Ethereum address is\n\n    `0x6a6d125cf3029f4ccbe72cc1b1a4c7a8c72467a3`\n\
    \n4.  Verify the Ethereum address\n\n    We use one of the online Ethereum address\
    \ validator tools ([`www.rfctools.com/ethereum-address-validator/`](http://www.rfctools.com/ethereum-address-validator/))\
    \ to verify our new Ethereum address.\n\n    ![](images/535492_1_En_2_Chapter/535492_1_En_2_Fig21_HTML.png)\n\
    \n    A screenshot of the valid Ethereum address validator. The labeled RFC tools\
    \ are cryptocurrency tools, of 4 steps, image tools, JSON tools, and HTML tools.\n\
    \n    **Figure 2-21** Validating the generated Ethereum address\n\nCongratulations!\
    \ We just generated a valid Ethereum address using our cryptography knowledge.\
    \ At this level, you should get a good sense of how blockchain cryptography works.\n\
    \n### Summary\n\nCryptography is an essential mechanism for securing blockchain\
    \ technology. It is used to secure the blockchain consensus mechanism, protect\
    \ blockchain data, keep user accounts safe, and more. The main purpose of this\
    \ chapter was to give a more thorough understanding of cryptography by giving\
    \ a quick overview of how it works.\n\nAlthough it only scratches the surface\
    \ of cryptography technologies, this chapter will help you to enrich your knowledge\
    \ of symmetric key cryptography and asymmetric key cryptography. More importantly,\
    \ we now know how digital signatures work. We covered the hash algorithm, and\
    \ we walked-through elliptic curve cryptography to understand how it works. Lastly,\
    \ we learned how to generate an Ethereum address.\n\nWe will continue our journey\
    \ and learn about Bitcoin, the future of money in the next chapter.\n\nFootnotes\
    \ [1](#535492_1_En_2_Chapter.xhtml#Fn1_source) [2](#535492_1_En_2_Chapter.xhtml#Fn2_source)\n\
    \n## Bitcoin: The Future of Money\n\nFrom the ancient Lydians, who invented coins\
    \ as a payment type, to the first paper money in China, money and payments have\
    \ been evolving for centuries. In 2008, an anonymous person or group using Satoshi\
    \ Nakamoto published a white paper titled, *Bitcoin: A Peer-to-Peer Electronic\
    \ Cash System*. Since then, Bitcoin (BTC) has ushered in a new era of decentralized\
    \ digital currencies and blockchain technology. As a result, digital currencies\
    \ have exploded in popularity in recent years. There are around 20,000 cryptos,\
    \ with a total market value of nearly $1.2 trillion. As the original and most\
    \ valuable cryptocurrency, Bitcoin holds about 45% of the whole cryptocurrency\
    \ market. The second-largest cryptocurrency is Ethereum, which holds a 16% market\
    \ value. The price of Bitcoin has fluctuated over the years, but it has generally\
    \ increased in the long term. In November 2021, Bitcoin reached its highest-ever\
    \ price of $68,789.63.\n\nAs a new payment technology invention, Bitcoin is a\
    \ scarce resource because there are only 21 million Bitcoins that can be mined\
    \ in the blockchain. This scarcity among other factors like supply and demand\
    \ gives Bitcoin its value, and Bitcoin will continue to be digital gold in all\
    \ cryptocurrencies.\n\nThe previous chapters were an excellent starting point\
    \ for introducing blockchain fundamentals, where we covered many basic concepts\
    \ such as cryptography, PoW consensus algorithms, and how blockchain works. In\
    \ this chapter, we’ll continue to explore Bitcoin. We will cover the following\
    \ specific topics:\n\n*   Bitcoin history\n\n*   Getting to know Bitcoin\n\n*\
    \   Transactions\n\n*   Lightning Network\n\n### Bitcoin History\n\nThere are\
    \ more than 106 million Bitcoin owners with 199,000 confirmed, active daily Bitcoin\
    \ transactions as of July 2022. Around 34 million US adults and 10% of the global\
    \ population own cryptocurrencies. Cryptocurrency popularity has skyrocketed in\
    \ recent years. However, if there’s one cryptocurrency you should first know about,\
    \ it’s Bitcoin, which most people generally refer to when they talk about digital\
    \ currency. As the world’s first cryptocurrency, Bitcoin is not the first project\
    \ that has attempted to create a new digital money financial system. Before its\
    \ creation, many projects tried to build digital money and/or electronic payment\
    \ systems. Two of those projects, DigiCash and HashCash, mostly inspired Bitcoin."
