- fmt: "# Crypto NFTs Games in the Metaverse\n\nVideo games have been around since\
    \ the early 1950s, starting in the research labs of scientists. Today, video games\
    \ are found in homes worldwide. The video game sector has been booming in the\
    \ last several years due to the growing younger population, economic growth, increasing\
    \ mobile users, and high-speed Internet. It is estimated that video game revenue\
    \ will reach $208.60bn in 2022 and be worth $321 billion by 2026.\n\nIn Feb 2022,\
    \ Microsoft CEO Satya Nadella was interviewed by Financial Times. He explained\
    \ Metaverse—“What Is the Metaverse? Metaverse is essentially about creating games.”\
    \ As we discussed in the previous section, the Metaverse is all about virtual\
    \ experience in a digital universe. However, the gaming industry has been using\
    \ a similar virtual world concept for a long time. Players can have a close-to-reality\
    \ experience while playing 3d games on the multiplayer gaming platform. Player\
    \ game data are persistent in the game platform, and player sessions will resume\
    \ after they log in. They will continue to play from their last session. That\
    \ is closer to the persistent nature of the Metaverse.\n\n## Business Model in\
    \ the Game Industry\n\nA video game business model is a monetization strategy\
    \ game creators use to gain revenue for their apps. Introducing new technologies,\
    \ such as blockchain, artificial intelligence (AI), and virtual reality (VR),\
    \ has become a major trend in evolving the game industry’s business models.\n\n\
    ### Pay-to-Play\n\nIn 1972, the first consumer-facing video computer game, Pong,\
    \ was available to the public. In 1978, the game Space Invaders declared the beginning\
    \ of the golden age of the arcades. During the 1970s and 1980s, each video game\
    \ was built in the form of Arcade machines which required a large physical space.\
    \ Gamers need to insert coins in exchange for time or lives in the game. This\
    \ is a “pay-to-play” business model.\n\n`Pay-to-play`, sometimes called `pay-for-play`\
    \ or `P2P`, refers to online games that the players must pay to play the game.\
    \ `P2P` games are the standard business gaming mode and typically have more features,\
    \ challenges, and modes than their free player. For example, most online gambling\
    \ games are `P2P` models, which require online casino players’ registration and\
    \ real-money deposit before accessing them. `P2P` is also commonly used in classic\
    \ `MMORPGs` (massively multiplayer online role-playing games) such as World of\
    \ Warcraft and Everquest.\n\n`Pay-to-play` requires the player to continue paying\
    \ the game company a monthly or annual subscription fee to access various in-game\
    \ items. If the fee is not paid, the player’s account will be suspended, and they\
    \ cannot access nor use the game. Also, the subscription is quite expensive. In\
    \ many cases, `free-to-play` business models may be an option when players just\
    \ want to play games occasionally.\n\n### Free-to-play\n\nThe first `free-to-play`\
    \ video game was Nexon’s QuizQuiz released in October 1999 and developed by Lee\
    \ Seungchan. The `free-to-play` game business model was created by Nexon in South\
    \ Korea.\n\n`Free-to-play`, also known as `free-to-start`, `F2P`, or `FtP`, refers\
    \ to online video games that give players access to the game to play and enjoy\
    \ a major part of the content without paying. However, there are always additional\
    \ game features, such as premium parts of the stories, unique abilities, special\
    \ game items, and new characters. These features typically encourage players to\
    \ pay microtransactions to get access.\n\nThe popular `free-to-play` games are\
    \ Apex Legends, League of Legends, Hearthstone, Eve Online, and Fortnite Battle\
    \ Royale.\n\n`Free-to-play` has been a great commercial success and is very popular\
    \ in current game design. Many online games follow this model.\n\nTraditional\
    \ video game companies build games on centralized servers in today’s video game\
    \ industry. They fully control player accounts and game data. Platform administrators\
    \ can remove a player’s game item or suspend players’ accounts. So even if players\
    \ play games and pay fees for years, they don’t really own the value of items\
    \ or in-game currency.\n\nThe above issues are being solved with the advent of\
    \ blockchain technologies. Crypto games take advantage of the innovations in Web\
    \ 3.0, which brings cryptocurrencies and `NFTs` into video games and creates a\
    \ new business model—`Play-to-Earn`.\n\n### Play-to-Earn\n\nThe `play-to-earn`\
    \ are decentralized games that allow players to farm or collect game and `NFTs`\
    \ tokens. Then, the players can sell them on the market to earn rewards. By completing\
    \ game tasks, combating other players, and playing the game regularly, players\
    \ can earn more cryptocurrency to trade and transfer their assets in crypto exchange\
    \ for fiat currency as income.\n\n`Play-to-earn` games take advantage of the innovations\
    \ in the blockchain, which brings cryptocurrencies and `NFTs` into the world of\
    \ video games. In crypto games, there are three main ways to let players earn\
    \ income through gameplay.\n\n#### Earning or Trading In-game NFTs\n\nIn the game,\
    \ `NFTs` represent a unique virtual collectible in-game asset. They can come in\
    \ all sorts of different forms, such as weapons, characters, skins, pets, food,\
    \ tools, and virtual land, to be used as part of the game. Once players have collected\
    \ them, they can be exchanged for other assets within the game or sold for actual\
    \ money on a real-world NFT marketplace. Players create value for the entire game\
    \ system by participating in the in-game economy. For example, in one of the most\
    \ popular blockchain games, Axie Infinity, there are creatures called Axis. Axis\
    \ is a fictional, fierce creature that loves to battle, build, and hunt for treasure.\
    \ The player can collect, trade, and raise Axis and use it to battle, other players\
    \ and enemies. The Axie as a game asset is defined as `ERC-721` NFT tokens. Players\
    \ can buy and sell their Axie `NFTs` in the marketplace (`https://app.axieinfinity.com/marketplace/`).\n\
    \n![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig8_HTML.png)\n\nA screenshot\
    \ depicts the axie infinity marketplace. The labeled process is an overview, marketplace,\
    \ collections of axies, lands, items, bundles, runes, charms, recently listed,\
    \ and recently sold with some illustration.\n\n**Figure 7-8** Axie Infinity marketplace\n\
    \n#### Earning In-game Cryptocurrency\n\n1. **Native Cryptocurrency**\n\n   Most\
    \ crypto games have native cryptocurrency in the form of game tokens created by\
    \ smart contracts. For example, in Axie Infinity, there are two native cryptocurrencies—Smooth\
    \ Love Potion (SLP) and Axie Infinity Shards (AXS).\n\n   **SLP**\n\n   `SLP`\
    \ is an `ERC-20` token used to breed Axie. Players can earn `SLP` in-game currency\
    \ through the Arena Mode in Axie Infinity when they complete daily quests or battle\
    \ monsters and other players.\n\n   **AXS**\n\n   `AXS` is an `ERC-20` governance\
    \ token for the Axie Infinity ecosystem. `AXS` token is intended to reward players\
    \ for participating in the Axie Infinity Metaverse. The top-ranking players will\
    \ be awarded after each season. `SLPs` and `AXS` can be converted to real-life\
    \ currency. One `SLP` is `0.000277 AXS`, or `$0.0034` and can be purchased and\
    \ sold in many crypto exchanges (i.e., Uniswap). `SLP` has been well known as\
    \ part of the `play-to-earn` trend, letting players earn relatively stable earnings\
    \ just by playing Axie Infinity.\n\n2. **Existing Cryptocurrency**\n\n   Some\
    \ crypto games use existing cryptocurrencies, such as Bitcoin, Ethereum, etc.,\
    \ as a reward to players. CryptoKitties is an example of using ether to buy and\
    \ sell kitties in the CryptoKitties market.\n\n![](images/535492_1_En_7_Chapter/535492_1_En_7_Fig9_HTML.png)\n\
    \nFour crypokitties images depict the market NFTs. The labeled crypto is diamond,\
    \ gilded, amethyst, and lapis.\n\n**Figure 7-9** CryptoKitties market\n\nIt typically\
    \ takes a while to accumulate a significant amount for existing cryptocurrencies\
    \ like ether, but these others are real."
