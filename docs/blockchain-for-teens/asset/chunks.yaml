- fmt: "# Lightning Network\n\nIn Jan 2016, Joseph Poon and Thaddeus published a white\
    \ paper titled *The Bitcoin Lightning Network: Scalable Off-Chain Instant Payments*.\
    \ The Lightning Network is the solution to scale up Bitcoin outside the main Bitcoin\
    \ network. The Lightning Network is a \"Layer 2\" decentralized payment protocol\
    \ layered on top of the Bitcoin blockchain, allowing off-chain transactions. The\
    \ transaction process only needs to be validated between two parties without committing\
    \ them as a transaction to the Bitcoin network. With Bitcoin adoption growing,\
    \ Lightning Network has become a popular Bitcoin scaling solution. There are more\
    \ than 20,000 active Lightning Network nodes with over 83,000 unique payment channels.\
    \ Here are some of the benefits of the Lightning Network:\n\n1. **Instant Payments:**\
    \  \n   The Bitcoin network can process around three to seven transactions per\
    \ second (tps). Lightning Network builds a peer-to-peer payment channel in which\
    \ two party nodes establish a bidirectional payment connection and allocate funds\
    \ from a 2-of-2 multi-signature address by cryptographic protocol. Two parties\
    \ in the channel can commit a transaction and pay each other directly without\
    \ creating on-chain transactions for miner validation through the Bitcoin network—so\
    \ the payment process is near-instant within the Lightning Network.\n\n2. **Scalability**\
    \  \n   Channels on the Lightning Network are \"bidirectional,\" as both participants\
    \ can send and receive payments based on channel capacity.  \n   Channel capacity\
    \ is the total balance each participant holds within a channel. For example, a\
    \ payment channel is opened by Alice and Bob by making a 10 BTC transaction. If\
    \ Alice sends 10 BTC across the channel to Bob, she can't receive any payments.\
    \ Bob can receive 10 BTC from Alice but can't send any payments. However, if Alice\
    \ sends 5 BTC to Bob, both parties can now send and receive up to 5 BTC within\
    \ the channel. Depending on channel capacity, many transactions could happen within\
    \ the off-chain payment channel without an on-chain miner involved, which can\
    \ potentially scale to millions of transactions per second (tps) and dramatically\
    \ scale the Bitcoin network capacity.\n\n3. **Low Cost**  \n   There is nearly\
    \ no transaction fee using the Lightning Network. The cost of a Lightning fee\
    \ is approximately one Satoshi or $0.000233.\n\n4. **Cross Blockchain Transactions**\
    \  \n   Lightning Network functionality is available on more than one blockchain\
    \ as long as the blockchains can support a similar cryptographic hash function.\
    \ Lightning Network could enable the ultimate decentralized exchange. The transactions\
    \ could potentially be across numerous blockchains without needing a third party.\n\
    \n5. **Privacy**  \n   No blockchain records. The details of individual Lightning\
    \ Network payment transactions are not publicly recorded on the blockchain directly.\
    \ Payments may be routed through many sequential channels where each node operator\
    \ will be able to see payments across their channels, but they will not be able\
    \ to see the source or destination of those funds if they are nonadjacent.\n\n\
    A few limitations of the Lightning Network:\n\nThe Lightning Network is made up\
    \ of bidirectional payment channels between two nodes, which, combined, create\
    \ smart contracts. If at any time either party drops the channel, the channel\
    \ will close and be settled on the blockchain.\n\nDue to the nature of the Lightning\
    \ Network's dispute mechanism, which requires all participants to always monitor\
    \ their channel and track the state of offline ledgers broadcasted to the network,\
    \ the concept of a \"watchtower\" has been developed.\n\n### How Lightning Network\
    \ Works\n\nInitially, Alice holds the `A1` commitment transaction, and Bob holds\
    \ the `B1` commitment transaction.  \nThe revocation key for `A1`, `K[A1]`, is\
    \ owned only by Alice.  \nThe revocation key for `B1`, `K[B1]`, is owned only\
    \ by Bob.\n\nSuppose Alice and Bob each own 5 BTC in their wallet. Alice wants\
    \ to send 2 BTC to Bob.\n\n![](images/535492_1_En_3_Chapter/535492_1_En_3_Figf_HTML.jpg)\n\
    \nA block figure represents the funding transaction. It indicates 2 of 2 multi\
    \ sig with 5 BTC. The keys are `A1 K a1`, `B1 K b1`. Two characters connected\
    \ are Alice and Bob.\n\nAlice and Bob are opening a payment channel on the Lightning\
    \ Network by committing funds to a 2-of-2 multi-sig address and sending a transaction,\
    \ also called a funding transaction or the anchor transaction, to the Bitcoin\
    \ network. This transaction is mined to create the channel.\n\nAlice and Bob both\
    \ deposit equal amounts of money—in our case, 5 BTC—and each puts a lock on it.\n\
    \nAfter the payment channel is established, two parties can start signing and\
    \ exchanging transactions. The transactions are called commitment transactions,\
    \ which will alter the initial state within the channel.\n\nAlice creates a new\
    \ transaction, `B2`, which allocates 3 BTC to Alice and 7 BTC to Bob.  \nAlice\
    \ signs `B2` and sends it to Bob. Bob receives `B2`, signs it, and keeps it.\n\
    \n![](images/535492_1_En_3_Chapter/535492_1_En_3_Figg_HTML.jpg)\n\nA block figure\
    \ represents the funding transaction. It indicates with 3 BTC and 7 BTC. The keys\
    \ are `A1 K a1`, `B1 K b1`. The two characters are Alice and Bob.\n\nBob creates\
    \ a new transaction, `A2`, which allocates 3 BTC to Alice and 7 BTC to Bob.  \n\
    Bob signs `A2` and sends it to Alice.\n\n![](images/535492_1_En_3_Chapter/535492_1_En_3_Figh_HTML.jpg)\n\
    \nA block figure represents the funding transaction. It indicates 3 BTC and 7\
    \ BTC. It points `A2` and `B2` with pen marks. The keys are `A1 K a1`, `B1 K b1`.\
    \ The two characters are Alice and Bob.\n\nAlice receives `A2`, signs it, and\
    \ keeps it.  \nAlice provides `K[A1]`, invalidating `A1`; she can then delete\
    \ `A1`.\n\n![](images/535492_1_En_3_Chapter/535492_1_En_3_Figi_HTML.jpg)\n\nA\
    \ block figure represents the funding transaction. It indicates 3 BTC and 7 BTC.\
    \ The keys are `A1 K a1`, `B1 K b1`. The two characters are Alice and Bob.\n\n\
    Bob provides `K[B1]`, invalidating `B1`; he can then delete `B1`.\n\n![](images/535492_1_En_3_Chapter/535492_1_En_3_Figj_HTML.jpg)\n\
    \nA block figure represents the funding transaction. It indicates 3 BTC and 7\
    \ BTC. The neglected keys are `A1 K a1`, `B1 K b1`. The two characters are Alice\
    \ and Bob.\n\nTo sum up, a payment channel creates a combination of money pooling\
    \ for both parties and then transfers the promise of ownership of the pooled-in\
    \ money in an agreed-upon manner.\n\nWhen either Alice or Bob, at some point,\
    \ decides to close the payment channel, they can sign a closing transaction. Closing\
    \ a channel means both sides take their money back and settle the final balance\
    \ between the two parties. This transaction will then be mined in the Bitcoin\
    \ network. No matter how many transactions are executed in the payment channel,\
    \ the Bitcoin network will only mine two transactions—opening and closing channel\
    \ transactions.\n\nHash Time Lock Contracts (HTLC), as its name indicates, consists\
    \ of two parts: hash verification and time expiration verification. It is a type\
    \ of payment in which two parties agree to a financial arrangement, where one\
    \ party receives from the other party a certain amount by generating cryptographic\
    \ proof before a deadline. Otherwise, the money will return to the payer. Payment\
    \ channels are time-locked by default. Extended with hash locks, payment can route\
    \ through multiple payment channels connected end-to-end. The transaction can\
    \ be sent between parties who do not have direct channel connections, so anyone\
    \ connected to the Lightning Network is part of a single, interconnected global\
    \ financial system.\n\nLet's take a look at an example."
