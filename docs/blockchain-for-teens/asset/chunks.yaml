- fmt: '#### Noncollateralized Stablecoins


    The term `noncollateralized stablecoins` refer to stablecoins whose price is pegged
    to `$1` and not backed by collateral. It typically uses algorithms written in
    smart contracts to control the stablecoins’ money supply and stabilize the price.
    There is no collateral needed to mint coins.


    `Neutrino USD` and `USDD` are algorithmic crypto-collateralized stablecoins examples.
    All operations, including issuance, collateralization, staking, and reward payouts,
    are transparent and governed by smart contracts and a liquidity pool.


    ### A Deep Dive into Stablecoins—Maker (DAI)


    Let us look into a popular stablecoins example `Maker (DAI)`, to understand more.
    `MakerDAO`, a decentralized autonomous organization (DAO), runs in the `Ethereum`
    blockchain. `MakerDAO` is the two-token model design—governance token and stablecoin.
    There are three coins in the `Maker` platform: `Maker coin (MKR)`, `Sai (SAI)`,
    and `DAI (DAI)`.


    The `MKR` is a governance token used for voting rights on the `Maker` platform
    from community participants. `MKR` is not a stablecoin. The second token is a
    stablecoin called `DAI`. `DAI` is multi-collateral `DAI` and is used for payment,
    collateral, exchange for the asset, integration with many protocols, and many
    others service in the `DeFi` ecosystem. `DAI` is currently backed by `Ether (ETH)`
    and `Basic Attention Token (BAT)`. The third token is `Sai`, which is a single
    collateral type backing `DAI`. The collateral backed in `Sai` is `ETH` only.


    #### How DAI Works


    `DAI` currently has a market cap of `$6.93 billion` and a `6.9 billion DAI` supply.
    There is no cap on the total supply of `DAI`, and supply is managed based on the
    `Maker Vault`. Before multi-collateral `DAI (MCD)` was released in November 2019,
    it was called `Collateralized Debt Position (CDP)`.


    The `Maker Vault` is a core smart contracts component in `MakerDAO` which will
    create `DAI` after holding the collateral (ether) for the `Maker` system. Once
    the borrowed `DAI` is returned, `Maker Vault` releases locked collateral and burn
    these `DAI`.


    `DAI` is over-collateralized to account for, which needs to lock up `150%` of
    the value of collateral to handle infamous volatility. For example, if you deposit
    `$100` in `Ethereum`, you will receive `$50` in `DAI`. Assume `1 Ethereum` is
    `1439.685 DAI`. `100 DAI` is backed by `0.104 Ether (ETH)`.


    Let us look at an analogy example to understand how `Maker Vault` manages the
    `DAI` peg to the dollar.


    An investor who wants to borrow `DAI` creates a `Maker Vault` and sends `ETH`
    into the `Maker Vault`. `Maker Vault` generates the amount of `DAI` and locks
    up these `ETH` collaterals in the form of `Pooled Ether (PETH)`. The amount of
    `DAI` created is based on how much ether the user has put into the `Maker Vault`.
    Generate `DAI` will deposit into the user’s wallet with interest over time, called
    `DAI Saving Rate (DSR)`. Users can freely get their escrowed collateral back at
    any time. They need to pay the `DAI` plus some of the stability fee (`MKR`) to
    the `Maker Vault`. After that, these `DAI` are burned, and `Maker Vault` is closed.


    Figure [8-6](#535492_1_En_8_Chapter.xhtml#Fig6) illustrates the entire `Maker
    Vault` flow.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig6_HTML.png)


    **Figure 8-6**

    *Maker Vault Flow Manager DAI Creation and Burn*


    When either goes down, or `DAI` goes up, it could cause the collateral ether value
    held in `Maker Vault` to be worth less than the amount of `DAI`’s original backing.
    However, since `DAI` is created by over-collateralization, `Maker` protocol will
    ensure `Maker Vault` holds enough `Eth` to pay back `DAI` and liquidates `Maker
    Vault` when the account becomes too risky. For example, if the market ether price
    has dropped below a certain threshold, the `Maker Vault` will lock up collateral
    until the user pays back enough `DAI` or auction off ether to the highest bidder.


    #### Maker (MKR) Coins Supply


    `MakerDAO` initially launched with a supply of `1 million MKR` tokens. As of September
    2022, the circulating supply of `Maker` tokens is around `977,631`, with a market
    cap of over `737 million USD`. The total supply of `MKR` is a dynamic value depending
    on market price and the overall health of the `Maker Protocol`’s system. `Maker`
    systems use complex mechanisms to govern `DAI`’s stability by issuing and removing
    `MKR`.


    `DAI`’s value is secured by collateral like `ETH`, which is stored in `Maker`
    vaults. When the `ETH` market price is down, the value of `ETH` becomes insufficient
    to stay pegged at `$1` with the corresponding amount of `DAI`. In that case, the
    `Maker Protocol` automatically triggers the liquidation of the vault.


    The `Maker Protocol` will create new `MKR` tokens to increase the total supply.
    Then, those new `MKR` tokens will sell and cover the remaining value loss.


    On the other hand, if the collateral price is up, to keep `DAI` in stable value,
    the `Maker Protocol` will buy back and burn `MKR` tokens. In this way, it will
    decrease `MKR`’s total supply, resulting in excess `DAI` being auctioned.


    The general flow is presented in Figure [8-7](#535492_1_En_8_Chapter.xhtml#Fig7).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig7_HTML.png)


    **Figure 8-7**

    *Circulation of MKR Token*


    #### MakerDAO’s Governance


    As we learned, `MKR` is the governing token of `DAI`. `MKR` token holders have
    voting power on any decision in the `MakerDAO`, including:


    *   Add a new collateral asset vault.

    *   Adjust risk parameters for existing vaults.

    *   Modify the `DAI Savings Rate`.

    *   Trigger Emergency Shutdown.

    *   Choose the stability fees.

    *   Choose the Debt Ceilings.

    *   Setup the set of Oracle Feeds.

    *   Upgrade the system.


    `Maker Protocol` supports the rules for on-chain and off-chain governance.


    Everyone, including non-`MKR` holders, can propose a new governance rule. First,
    the proposal can be discussed informally and voted on off-chain governance in
    the public `MakerDAO` forum ([`https://forum.makerdao.com`](https://forum.makerdao.com)).
    Then more formally, vote on the on-chain by `MKR` holders.


    The on-chain voting takes two forms: `Governance Polls` and `Executive Votes`.
    The on-chain vote can be accessed through the `Maker Foundation`’s voting portal
    ([`https://vote.makerdao.com/`](https://vote.makerdao.com/)).


    #### Governance Polls


    `Governance Polls`, also known as `Proposal Polling`, measure the sentiment of
    `MKR` holders on a proposal. It does not execute on-chain changes. `Governance
    Polls` must happen before the proposal moves to an executive vote. Here are examples
    proposed in the past:


    *   Community Greenlight Poll—Cabot

    *   Collateral Onboarding Project-based Funding Request (PFR)

    *   Ratification Poll for Modify DAI Foundation Core Unit Budget

    *   Oh no, this should not be here

    *   PPG—Open Market Committee Proposal


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figa_HTML.png)'
