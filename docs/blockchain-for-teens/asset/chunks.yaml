  trans: '

    ### 早期尝试


    大卫·乔姆在 1982 年的 CRYPTO 会议上发表了一篇名为《*用于不可追踪支付的盲签名*》的论文。盲签名描述了一种如何利用新型数字签名来保护数字现金用户隐私的方法。


    为了阐释盲签名过程，大卫以电子投票系统为例，展示了选举投票中心应如何验证所有选票。


    在验证过程中，选民的选择隐私信息必须受到保护。除选民本人外，无人知晓其选择。盲签名的过程描述如下：


    1.  选民将填写完毕的匿名盲选票放入一个内衬复写纸的信封中，信封外预先印有选民的标识信息。

    2.  官员验证文件凭证。

    3.  官员在不知晓信息内容的情况下对盲选票进行签名。

    4.  签名完成后，信封被返还给选民。

    5.  选民将已签名的选票放入一个新的、无标记的普通信封中。

    6.  通过这种方式，选民的匿名性和隐私得以保护。


    该流程如图 3-1 所示。


    ![](img/535492_1_En_3_Fig1_HTML.png)


    图示描绘了 6 个投票步骤：使用盲选票进行身份验证、验证盲选票凭证、对盲选票签名、解除盲选票、投票、验证投票。


    **图 3-1** 盲签名示例


    七年后，大卫·乔姆在阿姆斯特丹创立了 DigiCash 公司。数字现金，也称为 DigiCash、eCash 或 EMoney，是第一种数字匿名货币。1994
    年，DigiCash 证明了可以通过互联网进行小额支付。不幸的是，大卫·乔姆及其公司遭遇了许多问题，导致公司于 1998 年申请破产，其革命性的*eCash*也随之终结。


    随着互联网在 20 世纪 90 年代日益普及，许多公司迅速认识到它是一个极好的广告工具。甚至在 1997 年末，电子邮件垃圾邮件已经成为每个拥有电子邮件账户的人严重关切的问题。任何人都可以几乎零成本地发送数千万封邮件，广告公司可以使用群发邮件软件每天发送大量邮件。电子邮件炸弹，一种针对电子邮件服务器的拒绝服务攻击（DoS），始于
    20 世纪 90 年代末，并常导致网络中断。


    亚当·巴克在 1997 年创建了 HashCash，并使用工作量证明（PoW）算法来防止垃圾邮件和 DoS 攻击。它对比特币产生了至关重要的影响，并被用于比特币的交易中。在比特币白皮书中，中本聪引用
    HashCash 系统作为比特币中工作量证明实现的参考：


    > *为了在点对点的基础上实现分布式时间戳服务器，我们需要使用一个类似于亚当·巴克的 HashCash 的工作量证明系统，而不是报纸或 Usenet 帖子。*


    HashCash 的工作量证明相对直接。


    首先，邮件服务器选择一个难度级别来指定 PoW 必须达到的难度。HashCash 启用的 SHA-1 哈希摘要的工作量证明以二进制中默认的 20 个前导零开头。


    `SHA-1`是一种密码哈希函数，它接受输入并产生一个 160 位的值。可能的哈希值总共有`2¹⁶⁰`个。如果我们让前 30 位为 0，发送者必须尝试`2³⁰`个不同的二进制计数器来找到一个具有
    30 个前导零位的哈希值。前导零位越多，找到有效哈希值的难度就越大，解决所需的时间也就越长。


    十六进制中的单个前导零相当于二进制中的四个 0。我们可以使用在线 SHA-1 工具和暴力破解方法，以`"Hashcash!"`为输入来生成单个前导零。我们从
    0 开始依次尝试。以下是尝试不同输入的结果。


    **表 3-1** 生成十六进制中的单个前导零


    | 十六进制值 | 输入文本 |

    | --- | --- |

    | `64a0565c8ef97e847d444c6961086c2ccdad9052` | `Hashcash!00` |

    | `6e7072540d426f7bdc3d589dfd73aeac0e3050a9` | `Hashcash!01` |

    | `0e4895d7a9ef022e313d72a1c5636e51a2f8dca` | `Hashcash!02` |

    | `cf4d1b9d11cef8f1067e6e43b5593439fb412df9` | `Hashcash!03` |

    | `e2185e4362440d1a9f41f58f50032097f195aeb1` | `Hashcash!04` |

    | `05e82b6afcf3f6a4a81ba01cf9c6e44c2e16e244` | `Hashcash!05` |


    正如我们所见，仅仅为了猜出单个前导零，我们就需要尝试六次。想象一下，默认 20 个前导零，而前导 0 为 5（`2⁵`）则需付出多得多的计算量。


    为了解决这个 PoW，发送者需要不断尝试不同的输入，直到找出包含正确前导零数量的 HashCash 头部。然后，发送者才能向收件人发送邮件。


    当收件人收到一封电子邮件时，它首先检查包含所需前导零位数且有效的 HashCash 头部。收件人只需计算一次哈希值，然后将其保存到数据库中。当收到新邮件时，只需与数据库中的先前头部版本进行比较即可。因此，验证一个邮戳所需的时间远少于找到一个有效邮戳的时间。如果邮件验证失败，它将被移至垃圾邮件文件夹。


    ### 2008 年金融危机


    在 20 世纪 90 年代末到 21 世纪初，美国经济经历了强劲而稳定的增长、低失业率以及繁荣的股市。这得益于快速的技术变革以及中央银行联邦利率从 6.5%降至
    1.75%。


    联邦利率的大幅下降使银行和贷款机构能够以更低的价格提供消费信贷。在此期间，像次级抵押贷款这样的许多创新贷款产品有所增加。银行和贷款机构向许多信用记录不佳、资产少、收入不稳定或存在其他因素导致无法获得传统抵押贷款的房主提供低息抵押贷款。


    随着这些高风险（次级）贷款大量涌入，放贷机构轻松地承担了所有风险的抵押贷款，危及了整个银行体系和全球经济。随着房价持续飙升，次级抵押贷款发展到了失控的程度，很大比例的抵押贷款出现违约，许多银行和贷款机构开始面临财务困难。2007
    年 8 月，投资银行业巨头雷曼兄弟的股票因贝尔斯登的两只对冲基金倒闭而大幅下跌。2008 年 3 月，贝尔斯登破产，六个月后，雷曼兄弟申请破产。这场危机导致了经济大衰退，房价下跌超过
    30%，数百万人失业，约 250 万家企业倒闭。美国家庭遭受的损失更为严重，估计净财富损失达 16 万亿美元。


    这场危机动摇了人们对金融体系的信念和信任，这个体系是人们将资金存放在一个中央权威银行系统中的体系。中央政府机构可以印制更多钞票，因此政府印钞的数量没有限制。这将会降低系统中已流通货币的价值。中央银行依据现代货币理论（MMT）的原则发行货币。宽松的货币政策有时会导致人们资金价值下降方面的不可预测性和不确定性。


    人们开始思考一种新的金融体系来克服常规货币的缺陷。新体系需要一种不依赖第三方（如中央权威银行）信任的货币。

    '
- fmt: '# The Birth of Bitcoin


    In August 2008, `Bitcoin.org` was registered by the Bitcoin project’s first two
    developers, Satoshi Nakamoto and Martti Malmi. On October 31, 2008, an entity,
    under the name Satoshi Nakamoto, posted a white paper on `Bitcoin.org` titled
    *Bitcoin: A Peer-to-Peer Electronic Cash System*. Satoshi Nakamoto proposed a
    solution to prevent double-spending using a peer-to-peer network. The system introduced
    a proof-of-work consensus algorithm that eliminated the need for a centralized
    bank or government treasury.


    In a traditional centralized finance system, it is impossible to physically copy
    gold or reproduce one ounce of gold into two ounces. That is why gold is a store
    of value and can be used as commodity money in exchange for goods.


    Government-issued paper money is not easily duplicated. For example, one would
    need special equipment, the right currency paper, and many other materials like
    security threads and watermarks to replicate a dollar bill. Making paper money
    a legitimate fiat currency requires a very tedious, secure, and complex process.


    When using physical currencies, you hand over the gold or paper money as proof
    of payment to someone when you buy something. Since the money is given physically,
    both sides can instantly verify the trade. The money was transferred from your
    side to the other, and you can’t spend the same money twice.


    Double-spending is a problem within digital currency transactions, whereby digital
    money or assets is a set of software codes that can be copied and sent to multiple
    recipients. A centralized approach typically involves one auditor (such as a bank)
    who oversees and controls the issuance, distribution, and verification of money.
    Therefore, it generally requires a lot of work to guarantee no double-spending
    by a centralized authority, resulting in commission costs on digital currency
    transactions.


    On January 3, 2009, the first-ever Bitcoin genesis block, Block 0, was mined by
    Satoshi himself, representing the cryptocurrency’s birthday. Here is the link
    for the Bitcoin genesis block detail from `blockchain.com`: [`www.blockchain.com/btc/block/0`](http://www.blockchain.com/btc/block/0).


    This block contains a message from Satoshi. Let’s have some fun finding out what
    it is and how you can verify this information for yourself.


    By opening the above genesis block link, you will find the Transactions section.
    Click the hash link; it will navigate to the transaction page. Under the inputs
    section, you should find `Sigscript` data with a long hex vault starting from
    `5468652054696`, as shown in Figure 3-2.


    ![Figure 3-2 - Bitcoin genesis block transaction input from Satoshi](images/535492_1_En_3_Chapter/535492_1_En_3_Fig2_HTML.png)


    A text message explains inputs which includes index, address, `p k script`, `sig
    script`, details, and value. `Sig script` is highlighted.


    Copy this encoded hex string. Now, go to the online hex decoder page: [`https://cryptii.com/pipes/hex-decoder`](https://cryptii.com/pipes/hex-decoder).
    Decode this message from Satoshi.


    If you did it correctly, your screen should look like in Figure 3-3.


    ![Figure 3-3 - Message from Satoshi for the first transaction](images/535492_1_En_3_Chapter/535492_1_En_3_Fig3_HTML.png)


    A message depicts text and bytes that explain the news that chancellor is on the
    brink of a second bailout for banks.


    We have revealed the hidden message from Satoshi Nakamoto. It reads: “The Times
    03/Jan/2009 Chancellor on the brink of second bailout for banks.” The same text
    appeared in a comment on line 1616 of Bitcoin’s original code:


    [`https://sourceforge.net/p/bitcoin/code/133/tree/trunk/main.cpp#l1613`](https://sourceforge.net/p/bitcoin/code/133/tree/trunk/main.cpp%2523l1613)


    The message may prove that the block time was mined on the same day by referring
    to a UK newspaper: *The Times’* story about big government spending. Or, it might
    indicate that big centralized banks were a problem for Satoshi.


    The Genesis Block contained the first 50 Bitcoins ever created, and the reward
    went to Satoshi’s address: `1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa`.


    On January 12, 2009, Satoshi sent ten Bitcoins to Hal Finney as the first official
    Bitcoin transaction for mining block-70.'
