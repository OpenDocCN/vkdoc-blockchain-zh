- fmt: "# Writing Your First Smart Contract\n\nAccording to `dune.com`, the total\
    \ number of smart contracts created in the second quarter of 2022 was 0.93 million.\
    \ In Q2 2021, nearly 6 million smart contracts were created, as shown in Figure\
    \ [5-6](#535492_1_En_5_Chapter.xhtml#Fig6). In the current Ethereum blockchain,\
    \ most smart contracts use Solidity programming language.\n\n![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig6_HTML.png)\n\
    \nA screenshot of smart contract creation bar chart, with quarter 2 of year 2021\
    \ having the highest contract creation.\n\n**Figure 5-6** Number of Smart contract\
    \ creation from Q1 2021 to Q2 2022\n\n## Write a Contract\n\nOn Remix File Explorer\
    \ module, under `contracts` folder, click the create new contract icon (page icon)\
    \ or use context menu by right-clicking to add our first contract. We will name\
    \ our first smart contract `HelloWorld.sol`. Solidity Smart contracts will always\
    \ have an extension of `.sol` as file type.\n\n### Software License\n\nOn the\
    \ first line of a smart contract, you will write your smart contract license.\
    \ SPDX License Identifiers indicate relevant license information. The MIT License\
    \ grants anyone who uses this software the right to copy, modify, merge, distribute,\
    \ and so on:\n\n```\n// SPDX-License-Identifier: MIT\n```\n\nHere Comments (`//`)\
    \ is a line of text that appears in a Solidity program but is not executed by\
    \ the program.\n\n### Pragmas\n\nThe second line is Pragmas like the following:\n\
    \n```\npragma solidity ^0.8.15;\n```\n\nThe `pragma` keyword is similar to the\
    \ C language, which provides the current Solidity compiler. Here `0.8.15` is the\
    \ Solidity compiler version. The `^` symbol means this file will only support\
    \ compiler version starting from `0.8.7` till future break changes, which will\
    \ cause this file to not compile. For example, `pragma solidity >=0.4.0 <0.6.0`\
    \ such as the contract won't compile in `0.6.0` because of a major solidity change.\
    \ In that case, you need to modify the related syntax in the file to use the newer\
    \ version.\n\n### Define Contract\n\nTo make the code cleaner, you typically leave\
    \ a blank line after the `pragma` entry. Then, in the following line of code,\
    \ you start to declare the contract. In Solidity, we use the `contract` keyword\
    \ followed by the name of the contract. In our case, it will be `HelloWorld`.\
    \ The contract name should match the filename you created. The contents of the\
    \ contract will be enclosed within curly braces `{}`:\n\n```\ncontract HelloWorld\
    \ {\n}\n```\n\nSo far, the contract should look like Figure [5-7](#535492_1_En_5_Chapter.xhtml#Fig7).\n\
    \n![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig7_HTML.jpg)\n\nA screenshot\
    \ of the solidity compiler configuration and compiling the hello world.\n\n**Figure\
    \ 5-7** HelloWorld Empty contract\n\n### Declare Contract Variable\n\nIn the next\
    \ line, we enter `string public message`.\n\nHere the `string` keyword is a state\
    \ variable type. State variables are values permanently stored in contract storage\
    \ and are used to maintain the contract's state.\n\nThe visibility of a state\
    \ variable can be defined as `public`, `private`, or `internal`. In our case,\
    \ because we set the visibility to `public`, the `message` field can be publicly\
    \ accessed outside of the smart contract.\n\n### Define Contract Constructor\n\
    \nThe next thing is to create a constructor function:\n\n```\nconstructor(string\
    \ memory initMessage) {\nmessage = initMessage;\n}\n```\n\nThe `HelloWorld.sol`\
    \ will be like Figure [5-8](#535492_1_En_5_Chapter.xhtml#Fig8).\n\n![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig8_HTML.jpg)\n\
    \nA screenshot of hello world contract with messages.\n\n**Figure 5-8** HelloWorld\
    \ contract constructor\n\nThe constructor is a function that can be compared to\
    \ a factory machine. Once given an input, they can run a specific task to return\
    \ a result.\n\nTo declare a constructor, we use the `constructor` keyword. Once\
    \ we create our constructor, we can create many different contracts using the\
    \ same constructor. Whenever a new contract is created, the system automatically\
    \ calls on the constructor; they only need to use the constructor once to create\
    \ the contract. If a constructor is not defined explicitly, the Solidity compiler\
    \ will create a default constructor, which does not require any input.\n\nMost\
    \ often, you may need a constructor that passes one or more parameters. Inside\
    \ the `{}`, we add the initialization logic. In our example, we pass `string memory\
    \ initMessage` input. The `memory` keyword we use here indicates that we want\
    \ `initMessage` parameter to be mutable, or changeable, and the `initMessage`\
    \ value is assigned to `message` variable and initialized during contract creation\
    \ time.\n\n### Define Functions\n\n`HelloWorld` contract will have two functions.\
    \ One to update message and the other to get message:\n\n1.  **Update contract\
    \ message function**  \n    Update function will be like as follows:\n\n    ```\n\
    \    function update(string memory newMessage) public {\n    message = newMessage;\n\
    \    }\n    ```\n\n2.  **Get contract message function**\n\n    ```\n    function\
    \ getMessage() public view returns (string memory) {\n    return message;\n  \
    \  }\n    ```\n\nA Solidity function is defined with the `function` keyword, followed\
    \ by:\n\n*   The name of the function. Here `update` is the function name.\n*\
    \   A list of parameters to the function is enclosed in parentheses and separated\
    \ by commas (`parameter1`, `parameter2`, ...). It could be empty `()`. `(string\
    \ memory newMessage)` are parameters in the `HelloWorld` function.\n*   Function\
    \ visibility – `public`, `private`, `internal`, and `external`.\n*   Functions\
    \ behavior – `pure`, `view`, and `payable`.\n*   Followed by optional `returns`\
    \ keyword and return value type (`type1`, `type2`, ...) when the function has\
    \ return values. In our `update` function, we don't have a return value. But in\
    \ `getMessage`, we return `(string memory)`.\n*   A statement block that defines\
    \ the function, surrounded by curly brackets, `{...}`.\n\n#### Syntax\n\nThe basic\
    \ syntax is shown as follows:\n\n```\nfunction function_name(…) {internal|external|private|public}\
    \ [pure |view|payable] [returns(…)] {\n//statements\n}\n```\n\n#### Function Visibility\n\
    \nA function's scope of visibility can be set by one of these four modifiers:\n\
    \n*   **Public** – It can be called internally or externally.\n*   **Internal**\
    \ – Internal functions can only be accessed from inside the current contract and\
    \ related deriving contracts.\n*   **External** – It can be called from other\
    \ external contracts, but cannot be called internally (inside the current contract).\n\
    *   **Private** – Like internal visibility, but the function cannot be accessed\
    \ from related deriving contracts.\n\n#### Functions Behavior\n\nThe `pure`, `constant`,\
    \ `view`, and `payable` keywords dictate a Solidity functions behavior.\n\nIf\
    \ the function behavior is not specified, it will read and modify the state of\
    \ the blockchain.\n\n**Pure Functions**: It ensures that the caller can't read\
    \ or modify the state.\n\n**View Functions**: View functions are read-only functions\
    \ that ensure that state variables will not be modified after calling them.\n\n\
    **Payable**: A payable fallback function is also executed for plain Ether transfers.\n\
    \nOnce you completed `HelloWorld.sol`, you should have 15 lines of code, as shown\
    \ in Figure [5-9](#535492_1_En_5_Chapter.xhtml#Fig9).\n\n![](images/535492_1_En_5_Chapter/535492_1_En_5_Fig9_HTML.jpg)\n\
    \nA screenshot of the hello world completed code.\n\n**Figure 5-9** HelloWorld\
    \ completed contract"
