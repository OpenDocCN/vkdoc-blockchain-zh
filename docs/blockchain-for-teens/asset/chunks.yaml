  trans: '

    ### AMM 基本概念


    与中心化交易所相比，去中心化交易所的买家和卖家数量仍然较少。因此，要找到足够多的买家和卖家以匹配价格进行资产交易将会很困难。AMM 通过创建流动性池来解决这个问题。AMM
    为流动性提供者提供了一种称为“流动性挖矿”的实践，通过向流动性池中添加适当比例的资产来赚取额外收益。流动性提供者将自动获得奖励代币，即基于以太坊的 ERC-20
    代币，称为流动性提供者代币。这些 LP 代币代表了 LP 作为池提供者的所有权。当 LP 撤回存入的资金时，LP 代币将返还给 DeFi 系统。每当流动性池中发生交易时，该池都会收取交易费用。LP
    代币持有者将按比例获得流动性池增长的奖励，LP 可以定期领取这些奖励。例如，如果你向一个总市值为 1000 美元的 AMM DEX 池（例如 `Uniswap`）贡献了价值
    100 美元的代币，你将获得该池 10% 的 LP 代币。


    流动性池中的资产资金被锁定在智能合约中。通过 AMM，交易者可以利用流动性池在平台上无缝交易其资产，而无需中心化做市商。流动性提供者将获得其投资所产生的一部分费用和激励作为奖励。


    交易的另一方没有特定的卖家或买家。相反，自动化算法决定了 AMM 智能合约中流动性池内代币的价格。AMM 中的智能合约算法将是自动化和优化的，能够调整价格以响应市场需求。


    #### 现有 AMM 模型有哪些？


    AMM 使用数学公式，根据流动性池中的供应量以算法方式调整价格，以维持流动性池中资产的平衡。流行的 AMM 协议（如 `Uniswap`、`Bancor`
    和 `Curve`）使用了多种恒定函数做市商。CFMM 包括恒定乘积做市商、恒定总和做市商和恒定均值做市商。


    #### 恒定乘积做市商（CPMM）


    CPMM 由首个基于 AMM 的去中心化交易所 `Uniswap`、`Bancor` 以及市场上最流行的 AMM 推广开来。CPMM 基于函数 `x*y=k`，其中
    `x` 是流动性池中一种代币的数量，`y` 是另一种代币的数量。两种代币的价格范围取决于每种代币的可用流动性。当代币 X 的供应量增加时，代币 Y 的供应量必须减少以维持恒定乘积
    K，反之亦然。


    例如（`Uniswap V2`），一个流动性池中有 50% 的 DAI 和 50% 的以太坊。假设一个以太坊为 2000 美元，一个 DAI 为 1 美元。起初，该流动性池有
    9 个以太坊和 18,000 个 DAI。在这种情况下，一个以太坊和 2,000 个 DAI 配对的总价值为 4000 美元，计算方式为 `2000 + 1
    * 2000 = 4,000`。


    一位流动性提供者投资了池资产的 10%——一个以太坊和 2,000 个 DAI 进入该池。存入后，该池有 20,000 个 DAI 和 10 个以太坊，每种代币各占
    50%。CPMM 常数 `x*y=k` 为 `20,000 * 10 = 200,000`。


    现在，一位流动性购买者想购买一个以太坊。根据以下公式，以太坊的价格为 2222 个 DAI：


    `(20,000 + x) * (10 - 1) = 200,000 → x = 2,222`


    购买者需要支付 2222 个 DAI 来获得一个以太坊。最终，该池将有 9 个以太坊和 22,222 个 DAI。


    该过程如图 8-10 所示。


    ![](img/535492_1_En_8_Fig10_HTML.png)


    一个流程图展示了 AMM 恒定乘积做市商的示例。流动性提供者向池中存入 1 个以太坊和 2,000 个 DAI，流动性购买者购买了 1 个以太坊。交易前后的计算结果显示在顶部。


    **图 8-10**


    AMM CPMM 示例


    使用 CPMM 的去中心化交易所示例包括 `Uniswap V1` 和 `V2`（`Uniswap V3` 使用不同的函数）、`Bancor (V1)`、`Sushi
    Swap`、`Pancake swap` 及其他衍生品。


    #### 恒定总和做市商（CSMM）


    恒定乘积的第二种变体是恒定总和做市商，它通过简单地将恒定乘积中的乘法替换为加法（`x + y = k`）来保持 X 和 Y 资产的总和不变。只要总和保持不变，变量可以多次变化。


    这种设计使得价格预测更容易，但当其中一个代币流动性池被耗尽时，剩余的流动性就只剩一种资产，交易者将无法获得更多流动性。因此，CSMM 无法提供无限流动性，并且不盈利。因此，AMM
    很少使用 CSMM。


    #### 恒定均值做市商（CMMM）


    恒定均值做市商由 Balancer 协议首次引入，允许投资者处理超过两种代币，并维持 50/50 以外的平均权重，满足以下等式：


    ![](img/535492_1_En_8_Figf_HTML.jpg)


    `大写字母 Pi，下限 i 等于 1 到 n，R 下标 i 的 w 下标 i 次幂，等于 K。`


    其中 `R[i]` 是每种资产的储备量，`W` 是每种资产的权重，`k` 是一个常数。


    以三种锁定资产为例，CMMM 对流动性池使用的公式如下：


    `(x * y * z) ^ (1/3) = c`


    其中 `x`、`y` 和 `z` 是选定的代币，`c` 是它们的恒定乘积。


    #### 混合恒定函数


    如果底层交易对的价格几乎稳定（例如，两个以美元计价的稳定币交易对 `DAI–USDC` 进入 `Uniswap` 流动性池），恒定乘积函数可能不是最佳解决方案，因为滑点大且回报微乎其微。因此，Curve
    Finance 使用了 Stableswap 不变量公式，它是恒定乘积和恒定总和公式的混合体，其函数如下所示：


    ![](img/535492_1_En_8_Figg_HTML.png)


    `A 乘以 n 的 n 次方，求和 x 下标 i 加上 D，等于 A D 乘以 n 的 n 次方，加上 D 的 n+1 次方除以 n 的 n 次方乘以联乘
    x 下标 pi。`


    其中 `x` 是每种代币的储备量，`n` 是稳定币的数量，`D` 是代表储备中整个代币价值的不变量，`A` 是放大系数，它是一个可调常数，与资产的波动性成正比，去中心化自治组织可以调整该值。


    在 Curve stableswap-paper 中，对 Stableswap 不变量与 `Uniswap`（恒定乘积）和恒定价格不变量进行了比较，如图 8-11
    所示。


    ![](img/535492_1_En_8_Fig11_HTML.jpg)


    一个图表比较了以美元计价的 stableswap 不变量与 uniswap 和恒定价格不变量。Uniswap 曲线经过点 (20, 2)、(5, 5) 和
    (1, 30)。Stableswap 曲线经过点 (19, 0)、(5, 5) 和 (0, 30)。恒定线经过点 (10, 0)、(5, 5) 和 (0,
    10)。所有数据均为近似值。


    **图 8-11**


    Stableswap 不变量与恒定乘积和恒定总和的比较（来自 Curve Stableswap-paper）


    当投资组合平衡时，Stableswap 不变量表现为恒定总和，并为 DeFi 用户提供了一种更好的稳定币兑换工具。


    #### AMM 的局限性


    如前所述，与中心化交易所相比，去中心化交易所的流动性通常较低。因此，去中心化交易所必须吸引新用户贡献其资产以产生更多流动性。没有流动性提供者，交易所就无法提供交易服务。由于流动性较低，AMM
    通常存在两个主要问题：滑点和无常损失。

    '
- fmt: "#### Slippage\n\nIn its simplest term, slippage is the difference between\
    \ a trade's expected and executed price. Use previous CPMM example (Uniswap V2),\
    \ the CPMM constant `x*y=k` is `20,000 * 10 = 200,000`. Assume a liquidity buyer\
    \ wants to purchase three Ethers. The price for Ether is `8,571` DAI:\n\n```\n\
    (20,000 + x) * (10 -3) = 200,000 → x = 8,571\n```\n\nIn this case, the actual\
    \ price of one ETH is `2,000` DAI, but in the AMM, the user needs to pay `8,571`\
    \ DAI for each ETH. In the end, the pool will have `7` Ether and `28,571` DAI.\
    \ This is slippage.\n\nIf three ETH occupy 30% of the total ETH reserve, then\
    \ the slip is 42.9%:\n\n```\n(28,571 -20,000/20,000) → 42.9%\n```\n\nIn this case,\
    \ no one wants to pay 42.9% more DAI, and even actually, DAI keeps the same value\
    \ as $1.\n\n#### Impermanent Loss (IL)\n\nWhen a user Alice acts as a liquidity\
    \ provider, she will stake her assets in a liquidity pool (i.e., Uniswap V2).\
    \ Impermanent loss usually happens when the market price of these crypto assets\
    \ changes when Alice wants to withdraw the staking tokens from the pool. The liquidity\
    \ pool automatically adjusts the token value based on the formula `x*y=k`. Therefore,\
    \ the dollar value of the withdrawal could be lower than the dollar value of her\
    \ deposit. No real losses will happen if Alice keeps her stake in the pool. That\
    \ is why it is called \"an impermanent loss.\" The loss could be reduced or disappear\
    \ entirely, or even gain profit, depending on how the market moves. Let us look\
    \ at an example as follows:\n\n1.  Alice stake `10` ETH and `20,000` DAI in Uniswap\
    \ V2 liquidity pool when ETH price is `$2,000`. The constant product with addition\
    \ is `200,000` (`10 ETH * 20,000` DAI), and the total dollar value of tokens she\
    \ is staking are:\n\n    ```\n    10 ETH * $2,000 + 20,000 DAI * $1 = $40,000\n\
    \    ```\n\n2.  Now assume the ETH market price changes to `1 ETH = $2,500`. The\
    \ original tokens value will be:\n\n    ```\n    10 ETH* $2,500 + 20,000 DAI *\
    \ $1 = $45,000\n    ```\n\n3.  Alice wants to calculate the impermanent loss if\
    \ she withdraws the funds. Assume the liquidity pool starts to adjust and rebalance\
    \ token value. In this case, if the pool wants to keep 50% of ETH and 50% of DAI.\
    \ DAI and ETH will have `$22500` on each. The initial rebalance value will be:\n\
    \n    ```\n    ($20000 + $25000)/2 = $22500\n    ```\n\n4.  The number of ETH,\
    \ in this case, will be `22500/2500 = 9` ETH. By applying `x*y =9 ETH * 22500\
    \ DAI = 202,500`. The number is different from the original constant of `200,000`.\
    \ So, the rebalance will continue.\n\nThe new distribution of each asset can then\
    \ be calculated using the following formulas:\n\n![](images/535492_1_En_8_Chapter/535492_1_En_8_Figh_HTML.jpg)\n\
    \n`X_t` equals the root of `k` over `r_t`. `Y_t` equals the root of `K *` over\
    \ `r_t`.\n\nHere `r` is the price between two token assets in the pool, `t` is\
    \ the time in which `r` is calculated, and `k` is the CPMM constant (`x*y`).\n\
    \nLet us apply these formulae to our example to see how it works. Here `r` is\
    \ `2000` before the ETH price changed and `k` is `200,000`.\n\n![](images/535492_1_En_8_Chapter/535492_1_En_8_Figi_HTML.jpg)\n\
    \n`ETH X_t1` equals a root of `200,000` over `2,000` equals `10`. `DAI Y_t1` equals\
    \ root of `200,000 * 2,000` equals `20,000`.\n\nWe get the same original state\
    \ of the token pair in the pool—`10` ETH and `20,000` DAI. When the ETH price\
    \ is changed to `$2500` after a few days, the `r` is `2500`. Let us reapply the\
    \ same formula to do a calculation:\n\n![](images/535492_1_En_8_Chapter/535492_1_En_8_Figj_HTML.jpg)\n\
    \n`ETH X_t2` equals the square root of `200,000` over `2,500` equals `8.94`. `DAI\
    \ Y_t2` equals the square root of `200,000` times `2,500` equals `22,360.68`.\n\
    \nThe formula gave that the pool would contain about `8.94` ETH and about `22,360.68`\
    \ DAI. Therefore, we can verify if it is a match to the constant `200,000`:\n\n\
    ```\n8.94 * 22360.68 = 199,904 ≈ 200,000\n```\n\nThe new pair of token values\
    \ are correct. If Alice continues to hold tokens in the pool, total DAIs will\
    \ be `$45,000`:\n\n```\n10 * 2500 + 20000 = $45,000\n```\n\nThe return on the\
    \ investment gain will be 12.5%:\n\n```\n45,000 - 40,000 / 40,000 = 12.5%\n```\n\
    \nWe can simply earn `5,000` DAI (`45,000 – 40,000`).\n\nUsing those data, we\
    \ can calculate the impermanent loss if Alice withdraws the tokens:\n\n```\n45,000\
    \ - (8.94 * 2,500 + 20,000) = $289.32\n289.32 / 45,000 = 0.64%\n```\n\nAlice's\
    \ impermanent loss is 0.64% and `289.32` DAI.\n\nFigure [8-12](#535492_1_En_8_Chapter.xhtml#Fig12)\
    \ shows a diagram of impermanent loss estimation.\n\n![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig12_HTML.png)\n\
    \nA graph of impermanent loss in percent against the ETH price in the USD. The\
    \ y axis displays negative 80.00 to 0.00, and the x axis displays 100 to 500.\
    \ The curve is plotted through (negative 73, 0), (0, 100), (negative 20, 400),\
    \ and (negative 25, 500). All data are approximate.\n\n**Figure 8-12** Impermanent\
    \ loss estimation (from Bancor)\n\nHere is a summary of losses compared to holding\
    \ from the preceding graph:\n\n*   1.25x price change = 0.6% loss\n*   1.50x price\
    \ change = 2.0% loss\n*   1.75x price change = 3.8% loss\n*   2x price change\
    \ = 5.7% loss\n*   3x price change = 13.4% loss\n*   4x price change = 20.0% loss\n\
    *   5x price change = 25.5% loss\n\nFrom our example, the losses are 0.64% when\
    \ the price change from `$2000` to `$2500`. There is a 125% change, matching the\
    \ above graph estimation.\n\nSeveral solutions to reduce the impact, including\
    \ carrying out smaller transactions, increasing the price slippage tolerance,\
    \ and greater liquidity.\n\n#### Order Book Decentralized Exchanges\n\nAn order\
    \ book lists buy and sell orders for a specific financial asset based on its current\
    \ list price level. The market price order for an asset is seeking the lowest\
    \ asking/selling price or the highest bidding/buying price. The prices are constantly\
    \ updated, allowing traders to see an asset's outstanding orders in real time.\
    \ An order book is typically made up of three elements:\n\n**Buy orders or Bid\
    \ (Offer)** – it shows all buy orders made by traders, including the purchase\
    \ amount and the asking price.\n\n**Sell orders or Ask** – it shows all sell orders\
    \ made by traders, including the sell amount and the bid price.\n\n**Orders history**\
    \ – it shows all buy and sell orders that traders have made in the past.\n\nFigure\
    \ [8-13](#535492_1_En_8_Chapter.xhtml#Fig13) shows the Coinbase CEX and dYdX DEX\
    \ order book.\n\n![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig13_HTML.png)\n\
    \nA set of two screens display the Coinbase CEX, and dYdX DEX order book. In addition\
    \ to an updated price level, it has three components: buy orders also known as\
    \ bids, sell orders or asks, and order history.\n\n**Figure 8-13** Coinbase CEX\
    \ and dYdX DEX order book\n\nCurrently, there are two types of the order book\
    \ at DEXs—on-chain and off-chain."
  raw: '#### Slippage


    In its simplest term, slippage is the difference between a trade’s expected and
    executed price. Use previous CPMM example (Uniswap V2), the CPMM constant x*y=k
    is 20,000 * 10 = 200,000\. Assume a liquidity buyer wants to purchase three Ethers.
    The price for Ether is 8,571 DAI:


    (20,000 + x) * (10 -3) = 200,000 → x = 8,571


    In this case, the actual price of one ETH is 2,000 DAI, but in the AMM, the user
    needs to pay 8,571 DAI for each ETH. In the end, the pool will have 7 Ether and
    28,571 DAI. This is slippage.


    If three ETH occupy 30% of the total ETH reserve, then the slip is 42.9%:


    (28,571 -20,000/20,000) → 42.9%.


    In this case, no one wants to pay 42.9% more DAI, and even actually, DAI keeps
    the same value as $1.


    #### Impermanent Loss (IL)


    When a user Alice acts as a liquidity provider, she will stake her assets in a
    liquidity pool (i.e., Uniswap V2). Impermanent loss usually happens when the market
    price of these crypto assets changes when Alice wants to withdraw the staking
    tokens from the pool. The liquidity pool automatically adjusts the token value
    based on the formula x*y=k. Therefore, the dollar value of the withdrawal could
    be lower than the dollar value of her deposit. No real losses will happen if Alice
    keeps her stake in the pool. That is why it is called “an impermanent loss.” The
    loss could be reduced or disappear entirely, or even gain profit, depending on
    how the market moves. Let us look at an example as follows:


    1.  Alice stake 10 ETH and 20,000 DAI in Uniswap V2 liquidity pool when ETH price
    is $2,000\. The constant product with addition is 200,000 (10 ETH * 20,000 DAI),
    and the total dollar value of tokens she is staking are:


    10 ETH * $2,000 + 20,000 DAI * $1 = $40,000


    2.  Now assume the ETH market price changes to 1 ETH = $2,500\. The original tokens
    value will be:


    10 ETH* $2,500 + 20,000 DAI * $1 = $45,000


    3.  Alice wants to calculate the impermanent loss if she withdraws the funds.
    Assume the liquidity pool starts to adjust and rebalance token value. In this
    case, if the pool wants to keep 50% of ETH and 50% of DAI. DAI and ETH will have
    $22500 on each. The initial rebalance value will be:


    ($20000 + $25000)/2 = $22500


    4.  The number of ETH, in this case, will be 22500/2500 = 9 ETH. By applying x*y
    =9 ETH * 22500 DAI = 202,500\. The number is different from the original constant
    of 200,000\. So, the rebalance will continue.


    The new distribution of each asset can then be calculated using the following
    formulas:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figh_HTML.jpg)


    X t equals the root of k over r t. Y t equals the root of K asterisk over r t.


    Here r is the price between two token assets in the pool, t is the time in which
    r is calculated, and k is the CPMM constant (x*y).


    Let us apply these formulae to our example to see how it works. Here r is 2000
    before the ETH price changed and k is 200,000.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figi_HTML.jpg)


    E T H minus X t 1 equals a root of 200,000 over 2,000 equals 10\. D A I minus
    Y t 1 equals root of 200,000 asterisk 2,000 equals 20,000.


    We get the same original state of the token pair in the pool—10 ETH and 20,000
    DAI. When the ETH price is changed to $2500 after a few days, the r is 2500\.
    Let us reapply the same formula to do a calculation:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figj_HTML.jpg)


    E T H, X t 2 equals the square root of 200,000 over 2,500 equals 8.94\. D A I,
    Y t 2 equals the square root of 200,000 times 2,500 equals 22,360.68.


    The formula gave that the pool would contain about 8.94 ETH and about 22,360.68
    DAI. Therefore, we can verify if it is a match to the constant 200,000:


    8.94 * 22360.68 = 199,904 ≈200,000


    The new pair of token values are correct. If Alice continues to hold tokens in
    the pool, total DAIs will be $45,000:


    10* 2500 + 20000 = $45,000


    The return on the investment gain will be 12.5%:


    45,000-40,000/40,000 = 12.5%


    We can simply earn 5,000 DAI (45,000 – 40,000).


    Using those data, we can calculate the impermanent loss if Alice withdraws the
    tokens:


    45,000 - (8.94 * 2,500 + 20,000) = $289.32


    289.32/45,000 = 0.64%


    Alice’s impermanent loss is 0.64% and 289.32 DAI.


    Figure [8-12](#535492_1_En_8_Chapter.xhtml#Fig12) shows a diagram of impermanent
    loss estimation.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig12_HTML.png)


    A graph of impermanent loss in percent against the E T H price in the U S D. The
    y axis displays negative 80.00 to 0.00, and the x axis displays 100 to 500\. The
    curve is plotted through (negative 73, 0), (0, 100), (negative 20, 400), and (negative
    25, 500). All data are approximate.


    Figure 8-12


    Impermanent loss estimation (from Bancor)


    Here is a summary of losses compared to holding from the preceding graph:


    *   1.25x price change = 0.6% loss


    *   1.50x price change = 2.0% loss


    *   1.75x price change = 3.8% loss


    *   2x price change = 5.7% loss


    *   3x price change = 13.4% loss


    *   4x price change = 20.0% loss


    *   5x price change = 25.5% loss


    From our example, the losses are 0.64% when the price change from $2000 to $2500\.
    There is a 125% change, matching the above graph estimation.


    Several solutions to reduce the impact, including carrying out smaller transactions,
    increasing the price slippage tolerance, and greater liquidity.


    #### Order Book Decentralized Exchanges


    An order book lists buy and sell orders for a specific financial asset based on
    its current list price level. The market price order for an asset is seeking the
    lowest asking/selling price or the highest bidding/buying price. The prices are
    constantly updated, allowing traders to see an asset’s outstanding orders in real
    time. An order book is typically made up of three elements:


    **Buy orders or Bid (Offer)** – it shows all buy orders made by traders, including
    the purchase amount and the asking price.


    **Sell orders or Ask** – it shows all sell orders made by traders, including the
    sell amount and the bid price.


    **Orders history** – it shows all buy and sell orders that traders have made in
    the past.


    Figure [8-13](#535492_1_En_8_Chapter.xhtml#Fig13) shows the Coinbase CEX and dYdX
    DEX order book.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig13_HTML.png)


    A set of two screens display the Coinbase C E X, and d Y d X, D E X order book.
    In addition to an updated price level, it has three components: buy orders also
    known as bids, sell orders or asks, and order history.


    Figure 8-13


    Coinbase CEX and dYdX DEX order book


    Currently, there are two types of the order book at DEXs—on-chain and off-chain.'
  trans: "\n#### 滑点\n\n简单来说，滑点是指交易的预期价格与执行价格之间的差异。沿用之前的 CPMM 示例（Uniswap V2），恒定乘积`x*y=k`为`20,000\
    \ * 10 = 200,000`。假设一位流动性买家想购买三个以太币，每个以太币的价格为`8,571` DAI：\n\n```\n(20,000 + x)\
    \ * (10 - 3) = 200,000 → x = 8,571\n```\n\n在这个例子中，1 个 ETH 的实际价格为`2,000` DAI，但在\
    \ AMM 中，用户需要为每个 ETH 支付`8,571` DAI。最终，流动性池将包含`7`个以太币和`28,571` DAI。这就是滑点。\n\n如果\
    \ 3 个 ETH 占 ETH 总储备量的 30%，那么滑点就是 42.9%：\n\n```\n(28,571 - 20,000 / 20,000) → 42.9%\n\
    ```\n\n在这种情况下，没有人愿意多支付 42.9%的 DAI，而且实际上，DAI 与美元保持 1:1 的价值。\n\n#### 无常损失（IL）\n\n\
    当用户 Alice 作为流动性提供者时，她会将资产质押在流动性池（例如 Uniswap V2）中。当 Alice 想要从池中提取质押的代币时，如果这些加密资产的市场价格发生变化，就可能发生无常损失。流动性池会根据公式`x*y=k`自动调整代币价值。因此，提取时的美元价值可能低于其存入时的美元价值。如果\
    \ Alice 继续将资产留在池中，就不会产生实际损失。这就是它被称为\"无常损失\"的原因。根据市场走势，这种损失可能会减少、完全消失，甚至可能获利。让我们来看一个例子：\n\
    \n1.  当 ETH 价格为`$2,000`时，Alice 在 Uniswap V2 流动性池中质押了`10`个 ETH 和`20,000`个 DAI。加上新增流动性后的恒定乘积为`200,000`（`10\
    \ ETH * 20,000 DAI`），她质押代币的总美元价值为：\n\n    ```\n    10 ETH * $2,000 + 20,000 DAI\
    \ * $1 = $40,000\n    ```\n\n2.  现在假设 ETH 市场价格变为`1 ETH = $2,500`。原始代币价值将变为：\n\n\
    \    ```\n    10 ETH * $2,500 + 20,000 DAI * $1 = $45,000\n    ```\n\n3.  Alice\
    \ 想要计算她提取资金时的无常损失。假设流动性池开始调整和重新平衡代币价值。在这种情况下，如果池子希望保持 50%的 ETH 和 50%的 DAI，那么 DAI\
    \ 和 ETH 将各自价值`$22,500`。初始重新平衡价值为：\n\n    ```\n    ($20,000 + $25,000) / 2 = $22,500\n\
    \    ```\n\n4.  在这种情况下，ETH 的数量将为`22,500 / 2,500 = 9` ETH。应用`x*y = 9 ETH * 22,500\
    \ DAI = 202,500`。这个数字与原始常数`200,000`不同。因此，重新平衡将继续进行。\n\n然后可以使用以下公式计算每种资产的新分布：\n\
    \n![](img/535492_1_En_8_Figh_HTML.jpg)\n\n`X_t`等于`k`除以`r_t`的平方根。`Y_t`等于`K * r_t`的平方根。\n\
    \n这里`r`是池中两种代币资产之间的价格，`t`是计算`r`的时间，`k`是 CPMM 常数（`x*y`）。\n\n让我们将这些公式应用于我们的示例，看看它是如何工作的。在\
    \ ETH 价格变化之前，`r`为`2,000`，`k`为`200,000`。\n\n![](img/535492_1_En_8_Figi_HTML.jpg)\n\
    \n`ETH X_t1`等于`200,000`除以`2,000`的平方根，等于`10`。`DAI Y_t1`等于`200,000 * 2,000`的平方根，等于`20,000`。\n\
    \n我们得到了池中代币对的原始状态——`10`个 ETH 和`20,000`个 DAI。几天后，当 ETH 价格变为`$2,500`时，`r`为`2,500`。让我们重新应用相同的公式进行计算：\n\
    \n![](img/535492_1_En_8_Figj_HTML.jpg)\n\n`ETH X_t2`等于`200,000`除以`2,500`的平方根，等于`8.94`。`DAI\
    \ Y_t2`等于`200,000`乘以`2,500`的平方根，等于`22,360.68`。\n\n公式得出，池中将包含约`8.94`个 ETH 和约`22,360.68`个\
    \ DAI。因此，我们可以验证它是否与常数`200,000`匹配：\n\n```\n8.94 * 22,360.68 = 199,904 ≈ 200,000\n\
    ```\n\n新的一对代币价值是正确的。如果 Alice 继续在池中持有代币，总 DAI 价值将为`$45,000`：\n\n```\n10 * 2,500\
    \ + 20,000 = $45,000\n```\n\n投资回报率将为 12.5%：\n\n```\n45,000 - 40,000 / 40,000 =\
    \ 12.5%\n```\n\n我们可以简单赚取`5,000`个 DAI（`45,000 – 40,000`）。\n\n使用这些数据，我们可以计算如果 Alice\
    \ 提取代币所产生的无常损失：\n\n```\n45,000 - (8.94 * 2,500 + 20,000) = $289.32\n289.32 / 45,000\
    \ = 0.64%\n```\n\nAlice 的无常损失为 0.64%和`289.32`个 DAI。\n\n图 8-12 显示了无常损失的估算图。\n\n\
    ![](img/535492_1_En_8_Fig12_HTML.png)\n\n一张以太币价格与美元的无常损失百分比图。y 轴显示-80.00 到 0.00，x\
    \ 轴显示 100 到 500。曲线穿过点（-73，0）、（0，100）、（-20，400）、（-25，500）。所有数据均为近似值。\n\n**图 8-12**\
    \ 无常损失估算（来源：Bancor）\n\n以下是根据上述图表总结的与持有相比的损失情况：\n\n*   1.25 倍价格变化 = 损失 0.6%\n*\
    \   1.50 倍价格变化 = 损失 2.0%\n*   1.75 倍价格变化 = 损失 3.8%\n*   2 倍价格变化 = 损失 5.7%\n* \
    \  3 倍价格变化 = 损失 13.4%\n*   4 倍价格变化 = 损失 20.0%\n*   5 倍价格变化 = 损失 25.5%\n\n从我们的示例中，当价格从`$2,000`变为`$2,500`时，损失为\
    \ 0.64%。这是 1.25 倍的变化，与上述图表估算相符。\n\n有几种减少影响的解决方案，包括执行较小的交易、提高价格滑点容忍度以及增加流动性。\n\n\
    #### 订单簿去中心化交易所\n\n订单簿根据特定金融资产的当前列表价格水平，列出该资产的买入和卖出订单。资产的市场价格订单寻求的是最低的卖价或最高的买价。价格会不断更新，使交易者能够实时查看资产的未成交订单。一个订单簿通常由三个要素组成：\n\
    \n**买入订单或买单**——显示交易者下达的所有买入订单，包括购买数量和要价。\n\n**卖出订单或卖单**——显示交易者下达的所有卖出订单，包括卖出数量和出价。\n\
    \n**订单历史**——显示交易者过去下达的所有买入和卖出订单。\n\n图 8-13 展示了 Coinbase 中心化交易所和 dYdX 去中心化交易所的订单簿。\n\
    \n![](img/535492_1_En_8_Fig13_HTML.png)\n\n一组两个屏幕显示了 Coinbase CEX 和 dYdX DEX 的订单簿。除了更新的价格水平外，它还有三个组成部分：买入订单（也称为买单）、卖出订单（或卖单）以及订单历史。\n\
    \n**图 8-13** Coinbase CEX 和 dYdX DEX 订单簿\n\n目前，去中心化交易所有两种类型的订单簿——链上和链下。\n"
- fmt: '### On-Chain Order Books


    On-chain order books are hosted directly on the underlying blockchain, and every
    operation is done on-chain, including order submissions, updates, and cancellations.
    The blockchain records all order transactions, effectively removing the reliance
    on a centralized party. On the other side, every order is submitted to the blockchain,
    and the transactions will be broadcast to all blockchain validator/miner nodes
    to verify. It makes order book transactions slow and costly. When prices change
    dramatically, traders may need to update their on-chain orders. Because of the
    slow speed, the miner could inspect the order and then manipulate and execute
    their own orders before validating and confirming those transactions.


    Here are some on-chain order books DEXs examples: `ViteX`, `Demex`, `Bitshares`,
    and `Stellar` decentralized exchanges. The typical on-chain order book process
    is illustrated in Figure [8-14](#535492_1_En_8_Chapter.xhtml#Fig14).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig14_HTML.jpg)


    A flow diagram of the typical on-chain order book process between maker and taker.
    The maker and taker deposit funds in the smart contract, and the maker places
    an order in the order book. The taker chooses an order, and finally the order
    is settled in the smart contract.


    **Figure 8-14** *On-chain order book*


    The market maker is someone who offers an order to buy or sell, while the taker
    is someone who immediately buys or fills that order.


    The on-chain process can be described in the following steps:


    1. Market maker and taker deposit their funds in the smart contract.

    2. Maker placed an order in the order book.

    3. Taker then choose an order.

    4. Order is settled in the smart contract.


    ### Off-Chain Order Books


    Off-chain order books are ordered book applications hosted and run outside of
    the blockchain. The order data are also stored in a central entity. Once a two-sided
    order is matched, the off-chain order platform will send a transaction to the
    blockchain smart contract to settle. The advantage of an off-chain order book
    is faster order management with low fees. However, it could be a gap between on-chain
    and off-chain and not a full guarantee that a maker order is still active, which
    could exploit an order execution.


    Examples of off-chain order books are `dYdX`, `0x Protocol`, `Loopring`, `AirSwap`,
    `EtherDelta`, `IDEX`, and `Hydro`.


    The typical off-chain order book process is illustrated in Figure [8-15](#535492_1_En_8_Chapter.xhtml#Fig15).


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Fig15_HTML.png)


    A flow diagram of the off-chain order book process between maker and taker. The
    maker and taker deposit funds in the smart contract, and the maker places an order
    in the off-chain order book. Then the taker chooses an order, the off-chain service
    runs order matching, and finally the order is settled in the smart contract.


    **Figure 8-15** *Off-chain order book*


    The off-chain process can be described in the following steps:


    1. Market maker and taker deposit their funds in the smart contract.

    2. The maker placed an order in the off-chain order book.

    3. Taker, then take an order.

    4. Off-chain service runs order matching.

    5. Admin sends the order to the on-chain smart contract and settled transaction.


    ### Decentralized Exchange Aggregators


    DEX aggregators use several different protocols and methods to deal with issues
    associated with liquidity. The platforms have developed tools to aggregate liquidity
    across several centralized and decentralized crypto exchanges. Slippage occurs
    when traders cannot trade crypto at the expected price because of insufficient
    liquidity on one platform. With aggregates liquidity from different DEXs, DEX
    aggregators can efficiently minimize slippage on large orders. Cryptocurrency
    traders can access various trading pools from a single dashboard and pick the
    desired supplier for a specific token swap with optimized fees.


    Here are some top DEX Aggregators: `1Inch`, `ParaSwap`, `Open Ocean`, `Orion Protocol`,
    and `Matcha`.


    We have learned lots of theories so far. In the following section, we will delve
    into popular DEXs `Uniswap` and learn how to create a liquidity pool, staking,
    and swap tokens.


    ### A Deep Dive into the AMM DEXs—Uniswap


    `Uniswap` is the most popular DEX and AMM. The platform was launched in Nov 2018\.
    `v2` was introduced in May 2020, and the current version is `v3`, launched in
    May 2021.


    Users of the `Uniswap` platform can swap any two different `ERC-20` tokens seamlessly
    without incurring too much slippage. In addition, the protocol runs on a series
    of smart contracts, making the platform permissionless and trustless. The native
    token of the `Uniswap` protocol is `UNI`, and it also acts as a governance token,
    giving the voting right to its token holder for changes to the protocol.


    Currently, `UNI` is available in the following four liquidity mining pools:


    - `ETH/USDT`

    - `ETH/USDC`

    - `ETH/DAI`

    - `ETH/WBTC`


    As of September 2022, there are over 50,000 trading token pairs with individual
    LP tokens for each pool in `Uniswap`. The Daily trading volume is `$1.10b`, and
    the Total Valued Locked (TVL) is `$12.13b`. `Uniswap` users can participate in
    the DEXs in several ways:


    - **Create new pools** – `Uniswap` users can use smart contracts to create a pool
    for exchanging new pairs of tokens.

    - **Swap assets via existing markets** – Token swaps in `Uniswap` allow traders
    directly swap from one `ERC-20` token to another `ERC-20` token.

    - **Provide liquidity and earn rewards** – By staking the funds on the `Uniswap`
    platform, LP will reward with `UNI`.

    - **Participate in Uniswap governance** – `UNI` token holders can govern and vote
    for the change for the `Uniswap` platform.


    #### List Your Own Token on Uniswap DEX


    With the knowledge of AMM we learned, let us convert theory into practice, create
    an `ERC-20` token, and list it on `Uniswap` DEX.


    #### Prerequisites


    There are a few prerequisites that we must take care of:


    1. Create an `ERC-20` token.

    2. Deploy it to the Ethereum network. We will use the `Goerli` test network.

    3. Add deployed ERC token to your `MetaMask` wallet.'
  raw: '#### On-Chain Order Books


    On-chain order books are hosted directly on the underlying blockchain, and every
