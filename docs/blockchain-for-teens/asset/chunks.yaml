    done confirmation window, with some other details is presented.


    **Step 4** – Add the aUSDT token to your wallet.


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figai_HTML.png)


    A set of two screens. 1\. The Metamask notification page is displayed, along with
    the options to add suggested tokens, and the all done popup with add to wallet
    details and ok close button. 2\. Assets are highlighted with U S D T details in
    Ethereum Mainnet.


    **Step 5** – Close the “all done” window and return to the dashboard. The dashboard
    will show the supplied USDT information under the “your supplies” section. A withdraw
    button is enabled for supplied USDT assets:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figaj_HTML.png)


    A screen displays the dashboard with U S D T information under your supplies and
    assets to supply section. A withdraw button is enabled for supplied U S D T assets.
    A supply button is enabled for assets to supply.


    #### How to Withdraw on Aave


    **Step 1** – Continue with the above process. Next, click on Withdraw button from
    supplied USDT asset. Withdraw window will pop up. Enter the amount you want to
    withdraw. Then click on “Withdraw USDT” button. Confirm the Metamask transaction.


    **Step 2** – Once the transaction has completed, close the “all done” window and
    return to the dashboard. The dashboard will show updated USDT information:


    ![](images/535492_1_En_8_Chapter/535492_1_En_8_Figak_HTML.png)


    Three screens display the steps to withdraw on Aave. 1\. The withdraw U S D T
    window with the amount entered in the amount column, and the withdraw button is
    chosen. 2\. The withdraw U S D T popup, and Metamask notification with confirmation.
    3\. The all done window with ok close button.'
