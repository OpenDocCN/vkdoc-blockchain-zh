    and details, data, and hex tabs are at the bottom, with estimated gas fee text
    below.


    **Figure 12-15** MetaMask displays the image of the NFT when you perform a transfer
    of ownership of the NFT


    Once the transaction is confirmed, typing the token ID of 1 and then clicking
    the `ownerOf` button will confirm that the NFT now belongs to Account 2 (see Figure
    [12-16](#471881_2_En_12_Chapter.xhtml#Fig16)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig16_HTML.jpg)


    A text box `ownerOf` with `0x63eE1AEb74c52f09EaB6a2825bB1918B5e045050` at the
    bottom.


    **Figure 12-16** Confirming the ownership of the NFT


    If you click the `balanceOf` button with the address of Account 1, you will see
    that Account 1 no longer holds any NFTs (see Figure [12-17](#471881_2_En_12_Chapter.xhtml#Fig17)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig17_HTML.jpg)


    A text box `balanceOf` with `0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7` and `0`
