  raw: '### Testing the Blockchain with Multiple Nodes


    In the terminal that is running the `blockchain.py` application, press Ctrl+C
    to stop the server. Type the following command to restart it:


    ```

    $ python blockchain.py 5000

    ```


    Open another terminal window. Type the following command:


    ```

    $ python blockchain.py 5001

    ```


    Tip


    You now have two nodes running: one listening at port 5000 and another at 5001.


    Let’s mine two blocks in the first node (5000) by typing the following commands
    in *another* terminal window:


    ```

    $ curl http://localhost:5000/mine

    {

    "hash_of_previous_block": "ac46b1f492997e27612a8b5750e0fe340a217aae89e5c0efd56959d87127b4d3",

    "index": 1,

    "message": "New Block Mined",

    "nonce": 92305,

    "transactions": [{

    "amount": 1,

    "recipient": "db9ef69db7764331a6f4f23dbb8acd68",

    "sender": "0"

    }]

    }

    $ curl http://localhost:5000/mine

    {

    "hash_of_previous_block": "790ed48f5d52b3eacd2f419e6fdfb2f6b3142bcfc31943e4857b7ba4df48bd98",

    "index": 2,

    "message": "New Block Mined",

    "nonce": 224075,

    "transactions": [{

    "amount": 1,

    "recipient": "db9ef69db7764331a6f4f23dbb8acd68",

    "sender": "0"

    }]

    }

    ```


    The first node should now have three blocks:


    ```

    $ curl http://localhost:5000/blockchain

    {

    "chain": [{

    "hash_of_previous_block": "181cfa3e85f3c2a7aa9fb74f992d0d061d3e4a6d7461792413aab3f97bd3da95",

    "index": 0,

    "nonce": 61093,

    "timestamp": 1560823108.2946198,

    "transactions": []

    }, {

    "hash_of_previous_block": "ac46b1f492997e27612a8b5750e0fe340a217aae89e5c0efd56959d87127b4d3",

    "index": 1,

    "nonce": 92305,

    "timestamp": 1560823210.26095,

    "transactions": [{

    "amount": 1,

    "recipient": "db9ef69db7764331a6f4f23dbb8acd68",

    "sender": "0"

    }]

    }, {

    "hash_of_previous_block": "790ed48f5d52b3eacd2f419e6fdfb2f6b3142bcfc31943e4857b7ba4df48bd98",

    "index": 2,

    "nonce": 224075,

    "timestamp": 1560823212.887074,

    "transactions": [{

    "amount": 1,

    "recipient": "db9ef69db7764331a6f4f23dbb8acd68",

    "sender": "0"

    }]

    }],

    "length": 3

    }

    ```


    Since you have not done any mining on the second node (5001), there is only one
    block in this node:


    ```

    $ curl http://localhost:5001/blockchain

    {

    "chain": [{

    "hash_of_previous_block": "181cfa3e85f3c2a7aa9fb74f992d0d061d3e4a6d7461792413aab3f97bd3da95",

    "index": 0,

    "nonce": 61093,

    "timestamp": 1560823126.898498,

    "transactions": []

    }],

    "length": 1

    }

    ```


    To tell the second node that there is a neighbor node, use the following command:


    ```

    $ curl -H "Content-type: application/json" -d ''{"nodes" : ["http://127.0.0.1:5000"]}''
    -X POST  http://localhost:5001/nodes/add_nodes

    {

    "message": "New nodes added",

    "nodes": ["127.0.0.1:5000"]

    }

    ```


    Tip


    This command registers a new node with the node at port 5001 that there is a neighboring
    node listening at port 5000.


    To tell the first node that there is a neighbor node, use the following command:


    ```

    $ curl -H "Content-type: application/json" -d ''{"nodes" : ["http://127.0.0.1:5001"]}''
    -X POST  http://localhost:5000/nodes/add_nodes

    {

    "message": "New nodes added",

    "nodes": ["127.0.0.1:5001"]

    }

    ```


    Tip


    This command registers a new node with the node at port 5000 that there is a neighboring
    node listening at port 5001.


    Figure [3-5](#471881_2_En_3_Chapter.xhtml#Fig5) shows the two nodes aware of each
    other’s existence.


    ![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig5_HTML.png)


    A diagram illustrates the connection of 2 nodes of the blockchain network. 3 blocks
    on the left connect to a block on the right.


    Figure 3-5


    The current states of the two nodes in your blockchain network


    With the first node aware of the existence of the second node (and vice versa),
    synchronize the blockchain starting from the first node:


    ```

    $ curl http://localhost:5000/nodes/sync

    {

    "blockchain": [{

    "hash_of_previous_block": "181cfa3e85f3c2a7aa9fb74f992d0d061d3e4a6d7461792413aab3f97bd3da95",

    "index": 0,

    "nonce": 61093,

    "timestamp": 1560823108.2946198,

    "transactions": []

    }, {

    "hash_of_previous_block": "ac46b1f492997e27612a8b5750e0fe340a217aae89e5c0efd56959d87127b4d3",

    "index": 1,

    "nonce": 92305,

    "timestamp": 1560823210.26095,

    "transactions": [{

    "amount": 1,

    "recipient": "db9ef69db7764331a6f4f23dbb8acd68",

    "sender": "0"

    }]

    }, {

    "hash_of_previous_block": "790ed48f5d52b3eacd2f419e6fdfb2f6b3142bcfc31943e4857b7ba4df48bd98",

    "index": 2,

    "nonce": 224075,

    "timestamp": 1560823212.887074,

    "transactions": [{

    "amount": 1,

    "recipient": "db9ef69db7764331a6f4f23dbb8acd68",

    "sender": "0"

    }]

    }],

    "message": "Our blockchain is the latest"

    }

    ```


    As the result shows, the first node has the longest chain (three blocks), so the
    blockchain is the latest and it remains intact. You can synchronize from the second
    node:


    ```

    $ curl http://localhost:5001/nodes/sync

    {

    "blockchain": [{

    "hash_of_previous_block": "181cfa3e85f3c2a7aa9fb74f992d0d061d3e4a6d7461792413aab3f97bd3da95",

    "index": 0,

    "nonce": 61093,

    "timestamp": 1560823108.2946198,

    "transactions": []

    }, {

    "hash_of_previous_block": "ac46b1f492997e27612a8b5750e0fe340a217aae89e5c0efd56959d87127b4d3",

    "index": 1,

    "nonce": 92305,

    "timestamp": 1560823210.26095,

    "transactions": [{

    "amount": 1,

    "recipient": "db9ef69db7764331a6f4f23dbb8acd68",

    "sender": "0"

    }]

    }, {

    "hash_of_previous_block": "790ed48f5d52b3eacd2f419e6fdfb2f6b3142bcfc31943e4857b7ba4df48bd98",

    "index": 2,

    "nonce": 224075,

    "timestamp": 1560823212.887074,

    "transactions": [{

    "amount": 1,

    "recipient": "db9ef69db7764331a6f4f23dbb8acd68",

    "sender": "0"

    }]

    }],

    "message": "The blockchain has been updated to the latest"

    }

    ```


    As the second node’s blockchain only has one block, it is therefore deemed outdated.
    It now replaces its blockchain from that of the first node.


