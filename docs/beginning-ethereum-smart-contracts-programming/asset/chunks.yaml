    blockchain.add_node(node)

    response = {

    ''message'': ''New nodes added'',

    ''nodes'': list(blockchain.nodes),

    }

    return jsonify(response), 201

    ```


    The `/nodes/add_nodes` route allows a node to register one or more neighboring
    nodes.


    The `/nodes/sync` route allows a node to synchronize its blockchain with its neighboring
    nodes:


