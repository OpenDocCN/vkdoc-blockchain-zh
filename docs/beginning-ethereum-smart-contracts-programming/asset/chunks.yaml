- fmt: "#### How DAI Works\n\nFigure [13-4](#471881_2_En_13_Chapter.xhtml#Fig4) shows\
    \ how a user can buy DAI.\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig4_HTML.jpg)\n\
    \nA diagram presents the user interrelation between user and Maker DAO's Oasis\
    \ borrow dashboard. The user has $15,000 worth of cryptos and goes to the Maker\
    \ DAO, generates 10,000 DAI using $15,000 worth of Ethers as collateral. The Maker\
    \ gives the user 10,000 DAI and charges stability fee.\n\n**Figure 13-4** What\
    \ happens when you buy a DAI\n\n1.  The user goes to the Maker DAO and borrows\
    \ 10,000 DAI using $15,000 worth of cryptos (such as Ether, BAT, etc.). These\
    \ cryptos will be used as the collateral for the 10,000 DAI borrowed.\n2.  Maker\
    \ DAO generates 10,000 DAI for the user.\n3.  Maker DAO sends the 10,000 DAI to\
    \ the user and charges the user a stability fee.\n\n> **Tip**  \n> According to\
    \ the creator of Maker DAO, Rune Christensen, DAI is based on the Chinese character\
    \ 貸, which means “to lend or loan.”\n\nIn this example, the **collateral ratio**\
    \ for Ether is 150% (this varies for other cryptos). This overcollateralization\
    \ accounts for the volatility of cryptocurrency.\n\nThe price of DAI is kept in\
    \ check through a system of smart contracts automatically executing themselves.\
    \ If the price of DAI fluctuates too far from one dollar, Maker DAO will adjust\
    \ the interest fees to stabilize the price of DAI.\n\n> **Tip**  \n> You can also\
    \ buy DAI from all major exchanges like Kraken and Coinbase. You can use fiat\
    \ currency to exchange for DAI or sell some of your crypto assets for DAI.\n\n\
    #### How is DAI Kept Stable?\n\nMaker DAO controls the DAI smart contracts, such\
    \ as accepted collaterals, collateralization ratios, and interest rates. When\
    \ DAI dips below US$1, Maker DAO increases interest rates on the loans. This incentivizes\
    \ the customers to get rid of their DAI and close the loans. The returned DAI\
    \ are then destroyed and this limits the supply and drives the price of DAI up;\
    \ the reverse happens when DAI becomes more expensive than US$1.\n\nAll changes\
    \ to the smart contracts are visible to all blockchain participants, so this is\
    \ fully decentralized.\n\nDAI can be used as payment for smart contracts as well\
    \ as for passive income. You can put your DAI into a **DAI Saving Rate** (DSR)\
    \ program to earn interest.\n\n#### Examples of Crypto-backed Stablecoins\n\n\
    Besides DAI, some other examples of crypto-backed stablecoins include `WBTC` (Wrapped\
    \ Bitcoin) and `MIM` (Magic Internet Money).\n\n#### DAI Liquidation\n\nSince\
    \ DAI uses cryptos for collateral, and crypto prices fluctuate wildly, what happens\
    \ if the price of Ether drops? In this case, Maker DAO will perform a process\
    \ known as **liquidation**. Figure [13-5](#471881_2_En_13_Chapter.xhtml#Fig5)\
    \ shows the formula for liquidation.\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig5_HTML.jpg)\n\
    \nAn equation reads: `liquidation ratio = 1.5`, `liquidation price = (generated\
    \ DAI * liquidation ratio) / amount of collateral`.\n\n**Figure 13-5** The formula\
    \ for calculating liquidation price\n\nHere is the meaning of the various variables\
    \ in the formula:\n\n*   The **liquidation ratio** is the ratio of the equivalent\
    \ worth of cryptos used against DAI for collateralization. If $1.5 worth of crypto\
    \ exchanges for 1 DAI, then the liquidation ratio is 1.5.\n*   The **liquidation\
    \ price** is the price at which the collateral would be auctioned off and the\
    \ balance returned to the buyer of DAI.\n*   **Generated DAI** is the amount of\
    \ DAI generated for the user.\n*   **Amount of collateral** is the units of cryptos\
    \ used for collateral (such as 1 or 2 Ethers, etc.)\n\nLet’s work out an example\
    \ to understand how liquidation works. At the time of writing, the **liquidation\
    \ ratio** is **1.5**, which means that if 1 Ether is worth $150 today, it can\
    \ be exchanged for 100 DAI. With this, the **liquidation price** would now be\
    \ `(100 DAI * 1.5) / 1 Ether = $150`.\n\n> **Tip**  \n> The liquidation price\
    \ means that if one Ether falls below $150, the vault would be closed and collaterals\
    \ auctioned. The Maker Protocol generates new DAI through smart contracts known\
    \ as Maker **Vaults**.\n\nIf 1 Ether falls to, say, $140 (<$150), the vault would\
    \ be liquidated! It is therefore advisable not to withdraw all the generated DAI.\
    \ Assuming that only 90 DAI is withdrawn, then the **liquidation price** becomes\
    \ `(90 * 1.5) / 1 = $135`. Hence even if Ether falls to $140, liquidation will\
    \ not occur.\n\nTo prevent liquidation, you can:\n\n*   **Add more collateral**:\
    \ Assuming you add more collateral (e.g., add an additional 0.5 Ether), the liquidation\
    \ price would now be `(100 * 1.5) / 1.5 = $100`. This significantly reduces the\
    \ liquidation price.\n*   **Repay DAI**: Assuming that you now repay 20 DAI (from\
    \ a loan of 100 DAI), the liquidation price would now be `(80 * 1.5) / 1 = $120`.\
    \ Again, this significantly reduces the liquidation price.\n\nIf a vault is liquidated,\
    \ a liquidation penalty of 13% is charged to the vault owner (the buyer of the\
    \ DAI). This fee is added to the vault’s total outstanding DAI loaned and this\
    \ will result in more of the collateral sold at auction. Owners will receive the\
    \ leftover collateral after the auction.\n\n#### Similarity to How a Pawn Shop\
    \ Works\n\nThe whole liquidation process is very similar to how a pawn shop works\
    \ in real life. It goes like this:\n\n*   You bring something valuable (such as\
    \ gold) to the pawnshop and use it as collateral.\n*   The pawn shop loans you\
    \ money against the collateral. If the gold is worth $15,000, the pawn shop will\
    \ give you something like $10,000. This overcollateralization offers protection\
    \ to the pawn shop in case the price of gold falls.\n*   When you repay the loan\
    \ plus the interest, you get back your collateral.\n*   If you don’t pay back\
    \ the loan, the pawn shop keeps the collateral.\n\n### Non-Collateralized Stablecoins\n\
    \nNon-collateralized stablecoins, also known as algorithmic stable coins, do not\
    \ make use of any reserve asset. Instead, they make use of smart contracts to\
    \ regulate their prices. For example, if a coin is trading at too high a value\
    \ from its intended price, the supply is increased through minting and then sold\
    \ on the open market. This supply is increased until the price returns to $1.\
    \ Likewise, if the coin is traded too low, the smart contracts will buy up more\
    \ coins in the market to reduce the supply.\n\n#### Examples of Non-Collateralized\
    \ Stablecoins\n\nSome examples of algorithmic stablecoins include `Ampleforth`,\
    \ `Carbon`, and `Basis`."
  raw: '#### How DAI Works


    Figure [13-4](#471881_2_En_13_Chapter.xhtml#Fig4) shows how a user can buy DAI.


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig4_HTML.jpg)


    A diagram presents the user interrelation between user and maker D A O''s Oasis
    borrow dashboard. The user has dollar 15,000 worth of cryptos and goes to the
    maker D A O generates 10,000 D A I using dollar 15,000 worth of ethers as collateral.
    The maker gives the user 10,000 D A I and charges stability fee.


    Figure 13-4


    What happens when you buy a DAI


    1.  The user goes to the Maker DAO and borrows 10,000 DAI using $15,000 worth
    of cryptos (such as Ether, BAT, etc.). These cryptos will be used as the collateral
    for the 10,000 DAI borrowed.


    2.  Maker DAO generates 10,000 DAI for the user.


    3.  Maker DAO sends the 10,000 DAI to the user and charges the user a stability
    fee.


    Tip


    According to the creator of Maker DAO, Rune Christensen, DAI is based on the Chinese
    character 貸, which means “to lend or loan.”


    In this example, the **collateral ratio** for Ether is 150% (this varies for other
    cryptos). This overcollaterialization accounts for the volatility of cryptocurrency.


    The price of DAI is kept in check through a system of smart contracts automatically
    executing themselves. If the price of DAI fluctuates too far from one dollar,
    Maker DAO will adjust the interest fees to stabilize the price of DAI.


    Tip


    You can also buy DAI from all major exchanges like Kraken and Coinbase. You can
    use fiat currency to exchange for DAI or sell some of your crypto assets for DAI.


    How is DAI Kept Stable?


    Maker DAO controls the DAI smart contracts, such as accepted collaterals, collateralization
    ratios, and interest rates. When DAI dips below US$1, Maker DAO increase interest
    rates on the loans. This incentivizes the customers to get rid of their DAI and
    close the loans. The returned DAI are then destroyed and this limits the supply
    and this drives the price of DAI up; the reverse happens when DAI becomes more
    expensive than US$1.


    All changes to the smart contracts are visible to all blockchain participants,
    so this is fully decentralized.


    DAI can be used as payment for smart contracts as well as for passive income.
    You can put your DAI into a **DAI Saving Rate** (DSR) program to earn interest.


    Examples of crypto-backed Stablecoins


    Besides DAI, some other examples of crypto-backed stablecoins include **WBTC**
    (Wrapped Bitcoin) and **MIM** (Magic Internet Money).


    #### DAI Liquidation


    Since DAI uses cryptos for collateral, and crypto prices fluctuate wildly, what
    happens if the price of Ether drops? In this case, Maker DAO will perform a process
    known as **liquidation**. Figure [13-5](#471881_2_En_13_Chapter.xhtml#Fig5) shows
    the formula for liquidation.


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig5_HTML.jpg)


    An equation reads, liquidation ratio is 1.5, liquidation price equals start expression
    generated D A I times liquidation ratio over amount of collateral, end expression.


    Figure 13-5


    The formula for calculating liquidation price


    Here is the meaning of the various variables in the formula:


    *   The **liquidation ratio** is the ratio of the equivalent worth of cryptos
    used against DAI for collateralization. If $1.5 worth of crypto exchanges for
    1 DAI, then the liquidation ratio is 1.5.


    *   The **liquidation price** is the price in which the collateral would be auctioned
    off and the balance returned to the buyer of DAI.


    *   **Generated DAI** is the amount of DAI generated for the user.


    *   **Amount of collateral** is the units of cryptos used for collateral (such
    as 1 or 2 Ethers, etc.)


    Let’s work out an example to understand how liquidation works. At the time of
    writing, the **liquidation ratio** is **1.5**, which means than if 1 Ether is
    worth $150 today, it can be exchanged for 100 DAI. With this, **liquidation price**
    would now be (100 DAI * 1.5) / 1 Ether = $150.


    Tip


    The liquidation price means that if one Ether falls below $150, the vault would
    be closed and collaterals auctioned. The Maker Protocol generates new DAI through
    smart contracts known as Maker **Vaults**.


    If 1 Ether falls to, say, $140 (<$150), the vault would be liquidated! It is therefore
    advisable not to withdraw all the generated DAI. Assuming that only 90 DAI is
    withdrawn, then the **liquidation price** becomes (90 * 1.5) / 1 = $135\. Hence
    even if Ether falls to $140, liquidation will not occur.


    To prevent liquidation, you can


    *   **Add more collateral**: Assuming you add more collateral (e.g., add an addition
    0.5 Ether), the liquidation price would now be (100 * 1.5) / 1.5 = $100\. This
    significantly reduces the liquidation price.


    *   **Repay DAI**: Assuming that you now repay 20 DAI (from a loan of 100 DAIs),
    the liquidation price would now be (80 * 1.5) / 1 = $120\. Again, this significantly
    reduces the liquidation price.


    If a vault is liquidated, a liquidation penalty of 13% is charged to the vault
    owner (the buyer of the DAI). This fee is added to the vault’s total outstanding
    DAI loaned and this will result in more of the collateral sold on auction. Owners
    will receive the leftover collateral after the auction.


    Similarity To How a Pawn Shop Works


    The whole liquidation process is very similar to how a pawn shop works in real
    life. It goes like this:


    *   You bring something valuable (such as gold) to the pawnshop and use it as
    collateral.


    *   The pawn shop loans you money against the collateral. If the gold is worth
    $15,000, the pawn shop will give you something like $10,000. This overcollateralization
    offers protection to the pawn shop in case the price of gold falls.


    *   When you repay the loan plus the interest, you get back your collateral.


    *   If you don’t pay back the loan, the pawn shop keeps the collateral.


    ### Non-Collateralized Stablecoins


    Non-collateralized stablecoins, also known as *algorithmic stable coins*, do not
    make use of any reserve asset. Instead, they make use of smart contracts to regulate
    their prices. For example, if a coin is trading at too high a value from its intended
    price, the supply is increased through minting and then sold on the open market.
    This supply is increased until the price returns to $1\. Likewise, if the coin
    is traded too low, the smart contracts will buy up more coins in the market to
    reduce the supply.


    Examples Of Non-Collateralized Stablecoins


    Some examples of algorithmic stablecoins include **Ampleforth**, **Carbon**, and
    **Basis**.'
  trans: "\n#### DAI 的工作原理\n\n图 13-4 展示了用户如何购买 DAI。\n\n![](img/471881_2_En_13_Fig4_HTML.jpg)\n\
    \n这张图表展示了用户与 Maker DAO 的 Oasis 借款面板之间的交互关系。用户持有价值 15,000 美元的加密货币，前往 Maker DAO，使用价值\
    \ 15,000 美元的以太币作为抵押品，生成 10,000 DAI。Maker 将 10,000 DAI 提供给用户，并收取稳定费。\n\n**图 13-4**\
    \ 当你购买 DAI 时会发生什么\n\n1.  用户前往 Maker DAO，使用价值 15,000 美元的加密货币（例如以太币、BAT 等）借入 10,000\
    \ DAI。这些加密货币将作为所借 10,000 DAI 的抵押品。\n2.  Maker DAO 为用户生成 10,000 DAI。\n3.  Maker\
    \ DAO 将 10,000 DAI 发送给用户，并向用户收取稳定费。\n\n> **提示**  \n> 据 Maker DAO 的创始人 Rune Christensen\
    \ 称，DAI 基于汉字“貸”，意为“借出或贷款”。\n\n在这个例子中，以太币的**抵押率**为 150%（其他加密货币的抵押率各不相同）。这种超额抵押机制是为了应对加密货币的波动性。\n\
    \nDAI 的价格通过一个自动执行的智能合约系统来维持稳定。如果 DAI 的价格偏离一美元过远，Maker DAO 将调整利率以稳定 DAI 的价格。\n\n\
    > **提示**  \n> 你还可以从所有主流交易所（如 Kraken 和 Coinbase）购买 DAI。你可以使用法定货币兑换 DAI，或者出售部分加密资产来换取\
    \ DAI。\n\n#### DAI 如何保持稳定？\n\nMaker DAO 控制着 DAI 的智能合约，包括可接受的抵押品类型、抵押率以及利率。当 DAI\
    \ 的价格低于 1 美元时，Maker DAO 会提高贷款的利率。这会激励客户抛售其持有的 DAI 并结清贷款。被归还的 DAI 随后被销毁，从而减少供应量，推动\
    \ DAI 价格回升；反之，当 DAI 价格高于 1 美元时，则会采取相反的措施。\n\n对智能合约的所有更改对所有区块链参与者都是透明的，因此这是完全去中心化的。\n\
    \nDAI 既可以用于支付智能合约的费用，也可以用于产生被动收入。你可以将你的 DAI 存入一个**DAI 储蓄率**（DSR）计划来赚取利息。\n\n####\
    \ 加密货币抵押型稳定币示例\n\n除了 DAI 之外，其他加密货币抵押型稳定币的例子还包括 `WBTC`（Wrapped Bitcoin）和 `MIM`（Magic\
    \ Internet Money）。\n\n#### DAI 的清算\n\n由于 DAI 使用加密货币作为抵押品，而加密货币价格波动剧烈，如果以太币价格下跌会发生什么？在这种情况下，Maker\
    \ DAO 会执行一个称为**清算**的过程。图 13-5 展示了清算的公式。\n\n![](img/471881_2_En_13_Fig5_HTML.jpg)\n\
    \n一个等式显示：`清算率 = 1.5`，`清算价格 = （生成的 DAI * 清算率） / 抵押品数量`。\n\n**图 13-5** 计算清算价格的公式\n\
    \n以下是公式中各个变量的含义：\n\n*   **清算率**是指用于抵押 DAI 的加密货币等价价值与 DAI 的比率。如果价值 1.5 美元的加密货币兑换\
    \ 1 DAI，那么清算率就是 1.5。\n*   **清算价格**是指抵押品将被拍卖，并将余额返还给 DAI 购买者的价格。\n*   **生成的 DAI**\
    \ 是为用户生成的 DAI 数量。\n*   **抵押品数量**是指用作抵押品的加密货币单位（例如 1 个或 2 个以太币等）。\n\n让我们通过一个例子来理解清算是如何运作的。在撰写本文时，**清算率**为\
    \ **1.5**，这意味着如果 1 个以太币目前价值 150 美元，它可以兑换 100 个 DAI。由此，**清算价格**将是 `(100 DAI * 1.5)\
    \ / 1 以太币 = 150 美元`。\n\n> **提示**  \n> 清算价格意味着，如果一个以太币跌破 150 美元，该金库将被关闭，抵押品将被拍卖。Maker\
    \ 协议通过称为 Maker **金库**的智能合约生成新的 DAI。\n\n如果 1 个以太币跌至，比如说，140 美元（<150 美元），金库就会被清算！因此，建议不要提取所有生成的\
    \ DAI。假设只提取了 90 DAI，那么**清算价格**变为 `(90 * 1.5) / 1 = 135 美元`。因此，即使以太币跌至 140 美元，也不会发生清算。\n\
    \n为了防止清算，你可以：\n\n*   **增加更多抵押品**：假设你增加了更多抵押品（例如，额外增加 0.5 个以太币），那么清算价格将变为 `(100\
    \ * 1.5) / 1.5 = 100 美元`。这大大降低了清算价格。\n*   **偿还 DAI**：假设你现在偿还 20 DAI（从一笔 100 DAI\
    \ 的贷款中），那么清算价格将变为 `(80 * 1.5) / 1 = 120 美元`。同样，这也大大降低了清算价格。\n\n如果金库被清算，将向金库所有者（DAI\
    \ 的购买者）收取 13% 的清算罚金。这笔费用会加到金库未偿还的 DAI 贷款总额中，这将导致更多的抵押品在拍卖中被出售。拍卖后，所有者将获得剩余的抵押品。\n\
    \n#### 与当铺运作方式的相似性\n\n整个清算过程与现实世界中当铺的运作方式非常相似。流程如下：\n\n*   你拿一些有价值的东西（比如黄金）去当铺，并以此作为抵押品。\n\
    *   当铺根据抵押品借给你钱。如果黄金价值 15,000 美元，当铺会给你大约 10,000 美元。这种超额抵押是为了在黄金价格下跌时保护当铺的利益。\n\
    *   当你偿还贷款加上利息后，你会拿回你的抵押品。\n*   如果你不偿还贷款，当铺就会保留抵押品。\n\n### 无抵押型稳定币\n\n无抵押型稳定币，也称为算法稳定币，不使用任何储备资产。相反，它们使用智能合约来调节其价格。例如，如果某个代币的交易价格远高于其目标价格，系统就会通过增发来增加供应量，然后在公开市场上出售。供应量会一直增加，直到价格回到\
    \ 1 美元。同样，如果代币交易价格过低，智能合约会在市场上买入更多代币以减少供应量。\n\n#### 无抵押型稳定币示例\n\n一些算法稳定币的例子包括\
    \ `Ampleforth`、`Carbon` 和 `Basis`。\n"
- fmt: "# Crypto Exchanges\n\nWith all the discussions about cryptos (coins) and tokens,\
    \ an important question remains: how do you buy them? The answer is, through exchanges.\
    \ A crypto exchange is a platform on which you can buy and sell cryptocurrencies.\
    \ There are two types of crypto exchanges:\n\n- **Centralized exchanges** (CEX):\
    \ A CEX typically allows you to buy cryptocurrencies using fiat currency. Examples\
    \ of CEX are Coinbase (`www.coinbase.com`), Binance (`www.binance.com`), and Kraken\
    \ (`www.kraken.com`). Most CEXs also allow you to swap tokens from one token to\
    \ another.\n\n- **Decentralized exchanges** (DEX): A DEX is a peer-to-peer marketplace\
    \ where transactions occur directly between crypto traders. DEXs allow you to\
    \ swap tokens without going through an intermediary (like a CEX). DEX is implemented\
    \ using smart contracts.\n\nFor most crypto beginners, a CEX provides a user-friendly\
    \ platform for getting into the crypto world. Without knowing too much on how\
    \ cryptos works, a user can buy cryptos using their credit card for a fixed price\
    \ (typically). However, CEX has several risks involved that you should know. First,\
    \ there is always the risk of credit default (think of FTX, CoinBene, and Celsius).\n\
    \n**Tip**: Visit `www.cryptowisser.com/exchange-graveyard/` to see a list of exchanges\
    \ that have failed.\n\nSecond, CEXs need to comply to KYC (Know Your Customer)\
    \ and AML (Anti Money Laundering) regulations, which defeats the idea of using\
    \ cryptos in the first place (anonymity). CEXs, as its name implies, are centralized\
    \ as they are usually regulated by the governments of countries that they operate\
    \ it. Finally, CEXs are susceptible to cyber-attacks and security breaches. As\
    \ shown in Figure 13-6, when you buy cryptos from CEXs, your cryptos are stored\
    \ in wallets maintained by the CEXs. Unless you transfer the cryptos to your own\
    \ wallet (such as MetaMask or a hardware wallet), a security breach at the CEX\
    \ puts your cryptos at risk as hackers may illegally transfer your cryptos to\
    \ other wallets.\n\n![An illustration presents the C E X s maintains the cryptos\
    \ of the users in the blockchain, and the cryptos are stored in the user's wallet.](images/471881_2_En_13_Chapter/471881_2_En_13_Fig6_HTML.jpg)\n\
    \n**Figure 13-6** — A CEX stores your cryptos, which are susceptible to cyber\
    \ attacks\n\nA DEX, on the other hand, does not have the limitations of a CEX.\
    \ Using smart contracts, DEXs allow you to exchange tokens easily and quickly\
    \ from one type to another. This allows users full flexibility and control over\
    \ their own funds.\n\n**Tip**: Some popular DEXs are Uniswap, Sushiswap, and Pancakeswap.\n\
    \n### Creating a Decentralized Exchange\n\nSince DEXs are implemented using smart\
    \ contracts, it makes perfect sense for you to understand how they work by applying\
    \ all that you have learned in the previous 12 chapters in this book. For this\
    \ section, you will create a DEX contract to allow users to swap two different\
    \ ERC-20 tokens.\n\n### Creating the Token Contract\n\nLet’s create a new token\
    \ contract in the Remix IDE and name it as `token.sol`. Populate it with the following\
    \ statements:\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8;\n\
    import \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
    ;\ncontract MyToken is ERC20 {\n    // price expressed as how much an ether can\
    \ buy\n    uint256 public unitsOneEthCanBuy  = 10;\n    // the owner of the token\n\
    \    address public tokenOwner;\n    constructor(string memory name, string memory\
    \ symbol) ERC20(name, symbol) {\n        // address of the token owner\n     \
    \   tokenOwner = msg.sender;\n        // ERC20 tokens have 18 decimals\n     \
    \   // number of tokens minted = n * 10^18\n        uint256 n = 1000;\n      \
    \  _mint(msg.sender, n * 10**uint(decimals()));\n    }\n}\n```\n\nThis contract\
    \ is the same basic ERC-20 token contract you saw in Chapter 11.\n\n### Deploying\
    \ the Token Contract\n\nFor this example, you will need two accounts with some\
    \ test Ethers, Account 1 and Account 2. You will use these two accounts to create\
    \ two tokens, WML and LWM tokens.\n\nUsing Account 1, deploy the `MyToken` contract\
    \ using the following arguments for the constructor (see also Figure 13-7):\n\n\
    ![A screenshot of the contract dialog box has my token contracts with the deploy\
    \ button and publishes to the I P F S option.](images/471881_2_En_13_Chapter/471881_2_En_13_Fig7_HTML.jpg)\n\
    \n**Figure 13-7** — Deploying the first token, WML\n\n```\n\"WML token\",\"WML\"\
    \n```\n\nThis creates the WML token. Next, use Account 2 and deploy the same token\
    \ contract, this time with the following constructor argument:\n\n```\n\"LWM token\"\
    ,\"LWM\"\n```\n\nThis creates the LWM token. At this moment, the Remix IDE should\
    \ have the token contracts deployed as shown in Figure 13-8.\n\n![A screenshot\
    \ of the deployed contract has 2 tokens of account 1 and account 2 in the blockchain\
    \ along with its address.](images/471881_2_En_13_Chapter/471881_2_En_13_Fig8_HTML.jpg)\n\
    \n**Figure 13-8** — The two tokens created and their addresses\n\nRecord the addresses\
    \ of the tokens:\n\n- WML token: `0xfa8b8F0fd75ABf2aF088bf2D1115E6F97ED0cB3a`\n\
    - LWM token: `0x234273bD4D1aa3D233135dD49A26675dA7eF6A9a`\n\n**Tip**: Replace\
    \ the above contract addresses with that of your own.\n\nAdd both tokens to Account\
    \ 1 and Account 2 in MetaMask. At this moment, both Account 1 and Account 2 should\
    \ have the token balances shown in Figure 13-9.\n\n![Two screenshots depict the\
    \ pages of account 1 and account 2 with the assets. It has buy, send, and swap\
    \ options.](images/471881_2_En_13_Chapter/471881_2_En_13_Fig9_HTML.jpg)\n\n**Figure\
    \ 13-9** — The balance of tokens in both accounts"
