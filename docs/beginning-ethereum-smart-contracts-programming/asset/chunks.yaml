    \ shows the content of `node1` after this command is run.\n\n![](images/471881_2_En_4_Chapter/471881_2_En_4_Fig3_HTML.png)\n\
    \nAn illustration of 3 steps. The tilde symbol leads to `~`/MyTestNet, followed\
    \ by `data`, `node1`, `geth`, `chaindata`, `lightchaindata`, and `keystore`.\n\
    \nFigure 4-3: The content of the `node1` directory\n\nThe `geth` directory contains\
    \ two folders for storing the blockchains: `chaindata` and `lightchaindata`, while\
    \ the `keystore` directory contains accounts information (more on this later).\n\
    \nLet’s create another node called `node2`:\n\n```\n$ geth --datadir ~/MyTestNet/data/node2\
    \ init ~/MyTestNet/genesisblock.json\n```\n\nFigure [4-4](#471881_2_En_4_Chapter.xhtml#Fig4)\
    \ shows the current state of the `MyTestNet` directory.\n\n![](images/471881_2_En_4_Chapter/471881_2_En_4_Fig4_HTML.png)\n\
    \nAn illustration of 3 steps. The tilde symbol leads to `~`/MyTestNet, followed\
    \ by `data`, `node1` and `node2`, `geth`, `chaindata`, `lightchaindata`, and `keystore`.\n\
    \nFigure 4-4: The `node2` directory is now added to the `data` directory\n\n###\
    \ Starting Up the Nodes\n\nNow that the nodes have been initialized, let’s start\
    \ them up. Let’s start up `node1`:\n\n```\n$ geth --datadir ~/MyTestNet/data/node1\
    \ console 2>console1.log\n```\n\nOnce `node1` is started up, you will see the\
    \ Geth JavaScript Console:\n\n```\nWelcome to the Geth JavaScript console!\ninstance:\
