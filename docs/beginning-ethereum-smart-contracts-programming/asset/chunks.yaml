- fmt: '# How the Lottery Game Works


    For this chapter, you will build a lottery game using a smart contract. In this
    contract, you will allow players to place a bet on a number. Figure [10-1](#471881_2_En_10_Chapter.xhtml#Fig1)
    shows how the game works.


    ![](images/471881_2_En_10_Chapter/471881_2_En_10_Fig1_HTML.jpg)


    A schematic representation of the working principle of an online lottery game.
    5 silhouette person icons with their number and amount has upward arrows which
    point to the smart contract. The numbers and amounts are as follows. 1. 1 and
    2. 2. 2 and 4. 3. 3 and 2. 4. 2 and 1. 5. 5 and 1.


    Figure 10-1


    How the online lottery game works


    There are a total of five players. Each player will place a bet on a number. For
    example, player 1 bets on the number 1 using 2 Ethers, and player 2 bets on the
    number 2 with 4 Ethers, and so on. The betting will stop when the maximum number
    of players is reached. Once the betting has stopped, the owner of the contract
    will set the winning number and the payouts to the winners will be processed.


    Suppose the winning number is 2. Based on the example, players 2 and 4 have bet
    on the winning number. The amount won by each winner is proportional to how much
    they have bet. The calculation is shown in Figure [10-2](#471881_2_En_10_Chapter.xhtml#Fig2).


    ![](images/471881_2_En_10_Chapter/471881_2_En_10_Fig2_HTML.jpg)


    A schematic representation of the calculation of players winning in an online
    game 5 silhouette person icons with their number and amount has upward arrows
    which point to the smart contract. At the top, it exhibits the winning number
    as 2. Total wager, 10 ethers. Total winning wager, 5 ethers. Winnings for player
    2, 8 ethers. Winnings for player 4, 2 ethers.


    Figure 10-2


    Calculating the winnings of each player


    Your contract will automatically transfer the payout to the winners. If there
    is no winner for the game, all the Ethers will be retained by the contract and
    can be transferred to the owner of the contract.


    ## Defining the Smart Contract


    In the next few sections, you will walk through the creation of the contract so
    that you can see how it is built. You will use the Remix IDE to build this contract.


    Let’s first define some data structures to keep the information of the players
    within the smart contract.


    First, define a structure named `Player` to keep track of the amount of Ethers
    the player was wagered and the number that the player has wagered on:


    ```

    // store wager details of each player

    struct Player {

    uint amountWagered;   // e.g. 2000 wei

    uint numberWagered;   // e.g. number 5

    }

    ```


    Then, define the `playerDetailsMapping` variable, which is a `mapping` object:


    ```

    // waging details of all players in a mapping object

    mapping(address => Player) playerDetailsMapping;

    ```


    The `playerDetailsMapping` is a `mapping` object where the keys are the account
    addresses of all players. The value for each key is a structure named `Player`
    with two members: `amountWagered` (the amount of Wei bet), and `numberWagered`
    (the number that the player is betting on). Figure [10-3](#471881_2_En_10_Chapter.xhtml#Fig3)
    shows the data structure that you will use to store the details of the game.


    ![](images/471881_2_En_10_Chapter/471881_2_En_10_Fig3_HTML.jpg)


    A block diagram of the player details mapping in variable stores of each player
    in an online lottery game. The amount wagered for each player is 1000, 2000, and
    the number wagered is 5, 6.


    Figure 10-3


    The `playerDetailsMapping` variable stores the betting details of each player


    In typical dictionary objects in other programming languages, it is easy to iterate
    through the members of a dictionary and obtain all the keys in it. However, for
    the `mapping` object in Solidity, it is not possible to get the keys or iterate
    through all the members in it. So you must improvise your own solution if you
    want to do that. The easiest way is to use an array to keep track of all the account
    addresses (see Figure [10-4](#471881_2_En_10_Chapter.xhtml#Fig4)):


    ![](images/471881_2_En_10_Chapter/471881_2_En_10_Fig4_HTML.jpg)


    A block diagram of the player addresses array. It includes 2 player data in 2
    rows. The address is in a combination of numbers and letters.


    Figure 10-4


    The `playerAddressesArray` variable stores all of the players’ addresses


    ```

    // array of addresses of all players

    address payable [MAX_NUMBER_OF_PLAYERS] playerAddressesArray;

    ```


    Arrays in Solidity behave more like arrays in traditional programming languages
    like C and Java: you can iterate through an array, get its length, and so on.
    Using this array, you can use it to access each of the members in the mapping
    object and use it to determine the winner of the game.


    With the data structure defined, define the contract called `Betting`:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    import "@openzeppelin/contracts/utils/Strings.sol";

    contract Betting {

    }

    ```


    > **Note:** I imported the `Strings.sol` from OpenZeppelin to simplify strings
    handling in Solidity.


    Let’s declare some variables, constants, and events in the contract:


    ```

    contract Betting {

    // record the owner of the contract

    address owner = msg.sender;

    // minimum amount to wage (wei)

    uint constant MIN_WAGER = 1000;

    // maximum number of players allowed for each round

    uint constant MAX_NUMBER_OF_PLAYERS = 3;

    // range of numbers to bet, from 1 to MAX_NUMBER_TO_BET

    uint constant MAX_NUMBER_TO_BET = 10;

    // total amount waged by players so far

    uint totalWager = 0;

    // number of players waged so far

    uint numberOfPlayers = 0;

    // winning number

    uint winningBetNumber = 0;

    // array of addresses of all players

    address payable [MAX_NUMBER_OF_PLAYERS] playerAddressesArray;

    // store wager details of each player

    struct Player {

    uint amountWagered;

    uint numberWagered;

    }

    // waging details of all players in a mapping object

    mapping(address => Player) playerDetailsMapping;

    //---define an event---

    event Winner(

    address winner,

    uint amount

    );

    // the event to display the status of the game

    event Status (

    uint players,

    uint maxPlayers

    );

    }

    ```


    Here are some important points to note:


    *   `owner` is used to store the address of the account that deployed the contract.

    *   `MAX_NUMBER_OF_PLAYERS` lets you define the maximum number of players allowed
    in a game before the winning number is drawn. For ease of testing, it’s set to
    3. In real life, this could be set to a much larger number.

    *   `MAX_NUMBER_TO_BET` defines the maximum winning number for the lottery game.
    The numbers that can be bet on are from 1 to `MAX_NUMBER_TO_BET`.

    *   `playerAddressesArray` is a fixed size array storing the account address of
    each player. You prefix the declaration with the `payable` keyword to indicate
    that each player can send/receive Ethers.

    *   `Player` is a structure that contains two members: `amountWagered` and `numberWagered`.

    *   `playerDetailsMapping` is mapping object that stores the details of each player’s
    waging details.

    *   `Winner` and `Status` are events that are used to notify client applications.'
