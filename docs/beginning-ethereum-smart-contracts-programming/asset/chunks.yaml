    ## Synchronizing Blockchains


    In real life, a blockchain network consists of multiple nodes maintaining copies
    of the same blockchain. So, there must be a way for the nodes to synchronize so
    that every single node is referring to the same identical blockchain.


    When you use Python to run the `blockchain.py` application, only one node is running.
    The whole idea of blockchain is decentralization. There should be multiple nodes
    maintaining the blockchain, not just a single one.


    For your example, you will modify it so that each node can be made aware of neighboring
    nodes on the network (see Figure [3-4](#471881_2_En_3_Chapter.xhtml#Fig4)).


    ![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig4_HTML.jpg)


    A cycle diagram illustrates the blockchain that consists of many nodes. The links
    are h t t p colon forward slash localhost colon 5000, h t t p colon forward slash
    local host colon 5001, and h t t p colon forward slash local host colon 5002.


    Figure 3-4


    A blockchain network should consist of multiple nodes


    To do that in your example, add a number of methods to the `Blockchain` class.
    First, add a `nodes` member to the constructor of the `Blockchain` class and initialize
    it to an empty `set`:


    ```

    def __init__(self):

    self.nodes = set()

    # stores all the blocks in the entire blockchain

    self.chain = []

    ...

    ```


    This `nodes` member stores the address of other nodes. Next, add a method called
    `add_node()` to the `Blockchain` class:


    ```

    def add_node(self, address):

    parsed_url = urlparse(address)

    self.nodes.add(parsed_url.netloc)

    print(parsed_url.netloc)

    ```


    This method allows a new node to be added to the `nodes` member. For example,
    if “`http://192.168.0.5:5000`” is passed to the method, the IP address and port
    number “`192.168.0.5:5000`” will be added to the `nodes` member.


    The next method to add to the `Blockchain` class is `valid_chain()`:


    ```

    # determine if a given blockchain is valid

    def valid_chain(self, chain):

    last_block = chain[0]   # the genesis block

    current_index = 1       # starts with the second block

    while current_index < len(chain):

    block = chain[current_index]

    if block[''hash_of_previous_block''] != \

    self.hash_block(last_block):

    return False

    # check for valid nonce

    if not self.valid_proof(

    current_index,

    block[''hash_of_previous_block''],

    block[''transactions''],

    block[''nonce'']):

    return False

    # move on to the next block on the chain

    last_block = block

    current_index += 1

    # the chain is valid

    return True

    ```


    The `valid_chain()` method validates that a given blockchain is valid by performing
    the following checks:


    *   It goes through each block in the blockchain and hashes each block and verifies
    that the hash of each block is correctly recorded in the next block.


    *   It verifies that the nonce in each block is valid.


    Finally, add the `update_blockchain()` method to the `Blockchain` class:


    ```

    def update_blockchain(self):

    # get the nodes around us that has been registered

    neighbours = self.nodes

    new_chain = None

    # for simplicity, look for chains longer than ours

    max_length = len(self.chain)

    # grab and verify the chains from all the nodes in our

    # network

    for node in neighbours:

    # get the blockchain from the other nodes

    response = \

    requests.get(f''http://{node}/blockchain'')

    if response.status_code == 200:

    length = response.json()[''length'']

    chain = response.json()[''chain'']

    # check if the length is longer and the chain

    # is valid

    if length > max_length and \

    self.valid_chain(chain):

    max_length = length

    new_chain = chain

    # replace our chain if we discovered a new, valid

    # chain longer than ours

    if new_chain:

    self.chain = new_chain

    return True

    return False

    ```


    The `update_blockchain()` method works by checking that the blockchain from neighboring
    nodes is valid and that the node with the longest valid chain is the authoritative
    one; if another node with a valid blockchain is longer than the current one, it
    will replace the current blockchain.


    With the methods in the `Blockchain` class defined, you can now define the routes
