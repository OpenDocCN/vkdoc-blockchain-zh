    \ 11-20\n\nThe token balance of the account is also reduced\n\n## Selling Tokens\
    \ Programmatically\n\nIn the previous token contract, you saw how tokens are minted\
    \ when the contract is deployed to the blockchain and how tokens can be transferred\
    \ from one account to another. Once an account has the token(s), it can transfer\
    \ to any account it wish to.\n\nBut how do you make money from the tokens? In\
    \ the real world, you may want to sell the tokens in exchange for Ethers. In fact,\
    \ you can do this by programming it right onto the token contract.\n\nHere’s the\
    \ improved version of your token contract that allows tokens to be purchased with\
    \ Ethers:\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity ^0.8;\nimport\
    \ \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
