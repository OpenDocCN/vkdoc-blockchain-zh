- fmt: "### Components in DeFi\n\nTo make DeFi possible, you need the following key\
    \ components:\n\n- **Decentralized infrastructure**: A blockchain implementation\
    \ such as Ethereum\n- **Ethereum with smart contracts**: A good example is the\
    \ `ERC-20` token specification, which allows you to build *fungible* tokens.\n\
    - **Stablecoins**: Stablecoins are fungible tokens that are usually pegged to\
    \ an asset (such as USD, cryptos, gold, etc.). Stablecoins can also be unpegged\
    \ and the price adjusted algorithmically through smart contracts.\n\nStablecoins\
    \ play a very important role in DeFi as they not only replace fiat currencies;\
    \ they are an increasingly important asset in the DeFi lending market, where users\
    \ can lock their stablecoins in platforms such as `Compound` and `Aave` and earn\
    \ lending interest rates from 0.15% to 12% APY.\n\n> **Tip**  \n> Both `Compound`\
    \ and `Aave` are decentralized cryptocurrency protocols that allow users to borrow\
    \ and lend cryptos.\n\nIn the next section, you will learn more about stablecoins\
    \ and the different types that exist today.\n\n## Stablecoins\n\nIn Chapter [11](#471881_2_En_11_Chapter.xhtml),\
    \ you learned about the `ERC-20` specification that allows you to create your\
    \ own tokens. You also learned that tokens can be used as a form of investment\
    \ and used for paying smart contract services. In this section, you will learn\
    \ about a specific implementation of tokens in the real world, commonly known\
    \ as *stablecoins*.\n\nSo, what exactly are stablecoins? Stablecoins are cryptocurrencies\
    \ where the price is pegged to a reference asset, such as fiat currency, other\
    \ cryptocurrencies, or gold. As the name implies, stablecoins are built to withstand\
    \ volatility that other cryptocurrencies can’t tolerate.\n\n> **Note**  \n> The\
    \ whole purpose of stablecoins is to minimize volatility by maintaining stability.\n\
    \n### Motivation Behind Stablecoins\n\nTo really understand the motivation behind\
    \ stablecoin, you just need to look at Bitcoin. In 2011, one `BTC` (bitcoin) was\
    \ worth approximately US$1. However, at its peak in 2021, one `BTC` was worth\
    \ more than US$65,000. Imagine paying for two cups of Starbucks coffee with four\
    \ `BTC` in 2011. The same four `BTC` could buy you a Ferrari in 2021!\n\nApparently,\
    \ the aim of using Bitcoin as a fiat replacement is not feasible due to its wild\
    \ fluctuations in prices!\n\nThere are three main types of stablecoins:\n\n- **Fiat-backed\
    \ stablecoins**: Stablecoins that are backed by currencies such as `USD`, `EUR`,\
    \ `GBP`, or other fiat currencies\n- **Crypto-backed stablecoins**: Stablecoins\
    \ that are backed by other cryptocurrencies such as Ether and Bitcoin\n- **Non-collateralized\
    \ stablecoins**: Also known as algorithmic stablecoins, these types of stablecoins\
    \ do not hold any kind of collateral. To keep the value stable, they depend on\
    \ smart contracts, which alter the supply of stablecoins depending on market demand.\n\
    - **Commodity-backed stablecoins**: Stablecoins that are backed by commodities\
    \ such as gold. One coin is equally worth one unit of the pegged commodity (such\
    \ as one ounce of gold).\n\nThe following sections will discuss the first three\
    \ types of stablecoins in more detail.\n\n### Fiat-Backed Stablecoins\n\nA fiat-backed\
    \ stablecoin is a stablecoin backed by fiat-currency, such as the US Dollar, Euro,\
    \ or Pound. A good example of a fiat-backed stablecoin is the **USD Coin** (**USDC**).\n\
    \n> **Note**  \n> USD Coin is managed by a consortium called Centre, which was\
    \ founded by Circle and includes members from the cryptocurrency exchange Coinbase\
    \ and Bitcoin mining company Bitmain, an investor in Circle.\n\nFigure [13-1](#471881_2_En_13_Chapter.xhtml#Fig1)\
    \ shows how USDC works.\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig1_HTML.jpg)\n\
    \n*An illustration of the user has dollar 1 in the issuer's bank account, dollar\
    \ 2 will be held in the accounts with U S regulated financial institutions, the\
    \ issuer uses a smart contract to generate and 1 U S D C send to the user.*\n\n\
    **Figure 13-1** – What happens when you buy an USDC\n\nTo buy a USDC:\n\n1. The\
    \ user sends $1 to the issuer’s bank account.\n2. The $1 will be held in a US\
    \ regulated issuer’s bank account.\n3. The issuer uses a smart contract to generate\
    \ a `USDC` `ERC-20` token.\n4. The `USDC` token is then transferred to the user’s\
    \ wallet.\n\nSo why do you want to buy USDC? Well, using USDC you can send money\
    \ cheaply and near-instantly anywhere in the world without a traditional bank\
    \ account (a huge improvement over wire transfers, which can be expensive and\
    \ take days). You can also earn rewards on USDCs held in a Coinbase account. In\
    \ addition, you can earn even higher yields by lending your USDC via a variety\
    \ of decentralized finance (DeFi) applications.\n\n#### Examples Of Fiat-backed\
    \ Stablecoins\n\nBesides USDC, some other examples of fiat-backed stablecoins\
    \ include **BUSD** (Binance USD), **TUSD** (True USD), and **USDT** (USD Tether).\n\
    \n### Crypto-Backed Stablecoins\n\nThe next type of stablecoin is crypto-backed\
    \ stablecoins. Instead of pegging a stablecoin against a fiat currency, crypto-backed\
    \ stablecoins are pegged against some cryptos.\n\nA good example of a crypto-backed\
    \ stablecoin is **DAI**. `DAI` is a crypto-backed stablecoin running on Ethereum\
    \ that attempts to maintain a value of US$1 per token. Unlike fiat-backed stablecoins,\
    \ `DAI` isn’t backed by US dollars in a bank account. Instead, it’s backed by\
    \ crypto collaterals on the `Maker DAO` platform. `Maker DAO` is an organization\
    \ developing technology for borrowing, saving, and a stable cryptocurrency on\
    \ the Ethereum blockchain.\n\n> **Tip**  \n> `DAO` stands for Decentralized Autonomous\
    \ Organization.\n\n#### What Is a `DAO` Exactly?\n\nThe key idea of `DAO` is that\
    \ it is an organization designed to be automated and run by code (which is essentially\
    \ smart contracts in the world of Ethereum). The idea of `DAO` seems strange,\
    \ at first glance. But let’s look at how organizations function today (Figure\
    \ [13-2](#471881_2_En_13_Chapter.xhtml#Fig2)).\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig2_HTML.jpg)\n\
    \n*A diagram begins with Apple and Microsoft organizations or companies lead to\
    \ board meetings, shareholder votes on decisions for the company, and the CEO\
    \ executes the plan.*\n\n**Figure 13-2** – How organizations work today\n\nA typical\
    \ organization has board members, and they hold board meetings to discuss and\
    \ plan strategic directions for the company. Major decisions made by the board\
    \ must be approved by the shareholders, who vote on decisions for the company.\
    \ Once the votes have been tallied, the CEO of the company executes the plan.\n\
    \nA `DAO`, on the other hand, does not have board members. Instead, a `DAO` is\
    \ created using a smart contract. Central to the `DAO` is the `DAO`’s token, which\
    \ is used to manage membership in the organization and structure within the `DAO`\
    \ (Figure [13-3](#471881_2_En_13_Chapter.xhtml#Fig3)).\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig3_HTML.jpg)\n\
    \n*A diagram presents the users with different amounts of tokens, who have the\
    \ rights to propose DAO and vote for projects, and the DAO launches the tokens.*\n\
    \n**Figure 13-3** – How a `DAO` works\n\nEach member in the `DAO` can hold a different\
    \ amount of tokens, which gives them voting rights to propose and vote for projects.\n\
    \n> **Tip**  \n> To learn more about `DAO`, check out my article at [`https://bit.ly/3iviryS`](https://bit.ly/3iviryS)."
