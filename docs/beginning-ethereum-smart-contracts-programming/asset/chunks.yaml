    NFT 元数据文件的路径。


    #### 将 NFT 转移到另一个账户


    要将 NFT 转移到另一个账户，请在`transferFrom`按钮旁边的文本框中按以下格式输入字符串：`<要转出的账户>,<要转入的账户>,<令牌 ID>`。


    以下字符串将 NFT 从账户 1 转移到账户 2（见图 12-14）：


