    \ return accounts[0];\n}\nasync function load() {\n  await loadWeb3();\n  alert(await\
    \ getCurrentAccount());\n}\nload();\n```\n\n在终端中，输入以下命令：\n\n```\n$ npm install\
    \ -g serve\n```\n\n> **提示**\n> 使用 `-g` 选项全局安装 `serve` 应用程序可能需要 `sudo` 权限。或者，你也可以在当前目录下本地安装，不使用\
    \ `-g` 选项。\n\n此命令会在本地计算机上安装一个 Web 服务器。在任何目录下输入 `serve` 命令，都会使该目录通过这个 Web 服务器提供内容服务。\n\
    \n在 `web3projects` 文件夹中，输入以下命令：\n\n```\n$ cd ~/web3projects\n$ serve\n```\n\n\
    使用 Chrome 浏览器（需安装 MetaMask），加载以下 URL：`http://localhost:3000/TestWeb3.html`。\n\n\
    你会看到如图 8-1 所示的警告框。选择你想要在 MetaMask 中连接的账户，点击**下一步**，然后点击**连接**。\n\n![](img/471881_2_En_8_Fig1_HTML.jpg)\n\
    \n*图 8-1：你需要向页面授权，允许其访问你的 MetaMask 账户*\n\n现在，你应该会看到警告框显示已连接到你的网页的账户地址，如图 8-2 所示。\n\
    \n![](img/471881_2_En_8_Fig2_HTML.jpg)\n\n*图 8-2：连接到 MetaMask 的网页*\n\n让我们了解这是如何工作的。在你的\
    \ JavaScript 代码中，首先定义了一个名为 `loadWeb3` 的函数：\n\n```\nasync function loadWeb3() {\n\
    \  //---如果您的网络浏览器上安装了 MetaMask---\n  if (window.ethereum) {\n    web3 = new Web3(window.ethereum);\n\
    \    //---连接到账户---\n    const account = await window.ethereum.request(\n     \
    \ {method: 'eth_requestAccounts'});\n    console.log(account);\n  } else {\n \
    \   //---设置您想使用的 Web3.providers 提供者---\n    web3 = new Web3(\n      new Web3.providers.HttpProvider(\n\
    \        \"http://localhost:8545\"));\n  }\n}\n```\n\n如果你通过 HTTP 在安装了 MetaMask\
    \ 的浏览器上加载此页面，MetaMask 会自动通过 `window.ethereum` 注入一个 API。这个 `window.ethereum` 允许你与以太坊节点交互。在这种情况下，它会连接到\
    \ Chrome 浏览器上的 MetaMask 扩展程序。你使用 `window.ethereum` 创建一个 `Web3` 对象的实例，这允许你连接到 MetaMask\
    \ 中的用户账户、连接区块链上的智能合约等等。\n\n如果浏览器中没有检测到 MetaMask（由于缺少 `window.ethereum`），你可以连接到自己的节点。在这个例子中，你连接到一个监听\
    \ 8545 端口的本地节点（`http://localhost:8545`）。你可以运行自己的本地节点，例如 Ganache（见图 8-3）。\n\n![](img/471881_2_En_8_Fig3_HTML.jpg)\n\
    \n*图 8-3：Ganache 允许你在本地计算机上模拟一个以太坊区块链*\n\n> **注意**\n> Ganache 是一个模拟的以太坊区块链，你可以用它来部署合约、开发应用程序和运行测试。它是用于以太坊开发的\
    \ Truffle Suite 工具集的一部分。你可以从 [`https://trufflesuite.com/ganache/`](https://trufflesuite.com/ganache/)\
    \ 下载 Ganache。\n\n接下来定义的函数是 `getCurrentAccount()` 函数：\n\n```\n//---获取 MetaMask\
    \ 中的当前账户---\nasync function getCurrentAccount() {\n  const accounts = await web3.eth.getAccounts();\n\
    \  console.log(accounts)\n  return accounts[0];\n}\n```\n\n在这个函数中，你从连接的节点（无论是\
    \ MetaMask 还是像 Ganache 这样的节点）获取所有账户，并返回第一个账户。\n\n最后，定义 `load()` 函数，以便你异步地调用 `loadWeb3()`\
    \ 和 `getCurrentAccount()` 函数：\n\n```\nasync function load() {\n  await loadWeb3();\n\
    \  alert(await getCurrentAccount());\n}\n//---调用 load 函数连接到节点并显示第一个账户---\nload();\n\
    ```\n"
- fmt: "### Interacting with a Contract Using `web3.js`\n\nThe most common use of\
    \ the `web3.js` APIs is to build front ends so that users can interact with your\
    \ smart contract directly. In this section, you will learn how to use `web3.js`\
    \ to interact with your newly deployed contract. You will build a web front end.\n\
    \nCreate a new text file and name it as `main.css`. Populate the file with the\
    \ following:\n\n```\nbody {\n  background-color:#F0F0F0;\n  padding: 2em;\n  font-family:\
    \ 'Raleway','Source Sans Pro', 'Arial';\n}\n.container {\n  width: 90%;\n  margin:\
    \ 0 auto;\n}\nlabel {\n  display:block;\n  margin-bottom:10px;\n}\ninput {\n \
    \ padding:10px;\n  width: 100%;\n  margin-bottom: 1em;\n}\nbutton {\n  margin:\
    \ 2em 0;\n  padding: 1em 4em;\n  display:block;\n}\n#result {\n  padding:1em;\n\
    \  background-color:#fff;\n  margin: 1em 0;\n}\n```\n\nThis file serves as the\
    \ CSS (Cascading Style Sheet) for the web front end that you will build next.\n\
    \nCreate a new text file and name it as `index.html` (save it in the `web3projects`\
    \ folder). Populate it with the following statements:\n\n```\n<!DOCTYPE html>\n\
    <html lang=\"en\">\n  <head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"\
    viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Educational\
    \ Credentials Notarizer</title>\n    <link rel=\"stylesheet\" href=\"main.css\"\
    >\n  </head>\n  <body>\n    <div class=\"container\">\n      <h1>Educational Credentials\
    \ Notarizer</h1>\n      <div>\n        <label for=\"document\">Credential to store</label>\n\
    \        <input type=\"text\" id=\"document\" placeholder=\"Enter credential\"\
    >\n        <button id=\"btnStore\">Store</button>\n      </div>\n      <div>\n\
    \        <label for=\"document2\">Check Credential</label>\n        <input type=\"\
    text\" id=\"document2\" placeholder=\"Enter credential\">\n        <button id=\"\
    btnCheck\">Check</button>\n      </div>\n      <div id=\"result\">Status</div>\n\
    \    </div>\n    <script src=\"https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js\"\
    ></script>\n    <script src=\"https://code.jquery.com/jquery-3.6.0.min.js\"></script>\n\
    \    <script>\n      async function loadWeb3() {\n        //---if MetaMask is\
    \ available on your web browser---\n        if (window.ethereum) {\n         \
    \ web3 = new Web3(window.ethereum);\n          //---connect to account---\n  \
    \        const account = await window.ethereum.request(\n            {method:\
    \ 'eth_requestAccounts'});\n          console.log(account)\n        } else {\n\
    \          //---set the provider you want from Web3.providers---\n          web3\
    \ = new Web3(\n            new Web3.providers.HttpProvider(\n              \"\
    http://localhost:8545\"));\n        }\n      }\n      //---load the smart contract---\n\
    \      async function loadContract() {\n        abi = [ { \"anonymous\": false,\
    \ \"inputs\": [ { \"indexed\": false, \"internalType\": \"address\", \"name\"\
    : \"from\", \"type\": \"address\" }, { \"indexed\": false, \"internalType\": \"\
    string\", \"name\": \"document\", \"type\": \"string\" }, { \"indexed\": false,\
    \ \"internalType\": \"uint256\", \"name\": \"blockNumber\", \"type\": \"uint256\"\
    \ } ], \"name\": \"Result\", \"type\": \"event\" }, { \"inputs\": [], \"name\"\
    : \"cashOut\", \"outputs\": [], \"stateMutability\": \"nonpayable\", \"type\"\
    : \"function\" }, { \"inputs\": [ { \"internalType\": \"string\", \"name\": \"\
    document\", \"type\": \"string\" } ], \"name\": \"checkEduCredentials\", \"outputs\"\
    : [], \"stateMutability\": \"payable\", \"type\": \"function\" }, { \"inputs\"\
    : [], \"name\": \"kill\", \"outputs\": [], \"stateMutability\": \"nonpayable\"\
    , \"type\": \"function\" }, { \"inputs\": [ { \"internalType\": \"string\", \"\
    name\": \"document\", \"type\": \"string\" } ], \"name\": \"storeEduCredentials\"\
    , \"outputs\": [], \"stateMutability\": \"nonpayable\", \"type\": \"function\"\
    \ } ];\n        address = '0x450FdF943afec4036787f4deDA11A34526c53921'\n     \
    \   return await new web3.eth.Contract(abi,address);\n      }\n      //---get\
    \ the current account in MetaMask---\n      async function getCurrentAccount()\
    \ {\n        const accounts = await web3.eth.getAccounts();\n        console.log(accounts)\n\
    \        return accounts[0];\n      }\n      async function load() {\n       \
    \ await loadWeb3();\n        //---load the contract---\n        notarizer = await\
    \ loadContract();\n        //---get the account---\n        const account = await\
    \ getCurrentAccount();\n        //---handle the Result event fired by the smart\
    \ contract---\n        notarizer.events.Result()\n        .on('data', function(event){\n\
    \          if (event.returnValues[0] == account) {\n            console.log(event.returnValues[0]);\
    \  // from\n            console.log(event.returnValues[1]);  // text\n       \
    \     console.log(event.returnValues[2]);  // blocknumber\n            //---if\
    \ the blocknumber is 0, this means\n            // credential is not found---\n\
    \            if (event.returnValues[2] > 0) {\n              $(\"#result\").html(\"\
    Credential is valid\");\n            } else {\n              $(\"#result\").html(\"\
    Credential is NOT valid\");\n            }\n          }\n        });\n       \
    \ //---store the credential onto the blockchain---\n        $(\"#btnStore\").click(async\
    \ function() {\n          notarizer.methods.storeEduCredentials($(\"#document\"\
    ).val())\n          .send({from:account})\n          .then(function (tx) {\n \
    \           $(\"#result\").html(tx.transactionHash);\n          });\n        });\n\
    \        //---check the credential on the blockchain---\n        $(\"#btnCheck\"\
    ).click(async function() {\n          notarizer.methods.checkEduCredentials($(\"\
    #document2\").val())\n          .send({from:account, value:1000});\n        });\n\
    \      }\n      load();\n    </script>\n  </body>\n</html>\n```\n\nIn terminal,\
    \ ensure that the `serve` command is still running (if not, type `serve` in the\
    \ `web3projects` folder). Load the Chrome web browser with the following URL:\
    \ `http://localhost:3000/index.html`. You should see the page shown in Figure\
    \ 8-4.\n\n![Figure 8-4](images/471881_2_En_8_Chapter/471881_2_En_8_Fig4_HTML.jpg)\n\
    \n*Figure 8-4: The web front end to interact with the smart contract*\n\nEnter\
    \ a string such as `{ \"id\": \"1234567\", \"result\": { \"math\": \"A\", \"science\"\
    : \"B\", \"english\": \"A\" } }` in the first text box and then click the **Store**\
    \ button. You should see the popup by MetaMask (see Figure 8-5).\n\n![Figure 8-5](images/471881_2_En_8_Chapter/471881_2_En_8_Fig5_HTML.jpg)\n\
    \n*Figure 8-5: Confirming the transaction to send the credential to the smart\
    \ contract for notarization*\n\nClick **Confirm** to confirm the transaction.\
    \ When the transaction is sent, you will immediately see the transaction hash\
    \ displayed at the bottom of the page (see Figure 8-6).\n\n![Figure 8-6](images/471881_2_En_8_Chapter/471881_2_En_8_Fig6_HTML.jpg)\n\
    \n*Figure 8-6: The transaction hash is displayed at the bottom of the page*\n\n\
    Once the block containing the transaction is mined, you will be able to type the\
    \ same credential in the second text box and then click the **Check** button to\
    \ verify if the same credential was previously stored on the blockchain (see Figure\
    \ 8-7).\n\n![Figure 8-7](images/471881_2_En_8_Chapter/471881_2_En_8_Fig7_HTML.jpg)\n\
    \n*Figure 8-7: Verifying if a credential was previously stored on the blockchain*\n\
    \nIf the credential was stored previously, you should see **Credential is valid**\
    \ at the bottom of the screen (see Figure 8-8).\n\n![Figure 8-8](images/471881_2_En_8_Chapter/471881_2_En_8_Fig8_HTML.jpg)\n\
    \n*Figure 8-8: The result of the validation of the credential is shown at the\
    \ bottom of the page*\n\nLet’s see how the code works.\n\nFirst, define the `loadContract()`\
    \ function so that you can load the smart contract you deployed in the previous\
    \ chapter. This function returns an instance of the smart contract using its ABI\
    \ and address."
  raw: '### Interacting with a Contract Using web3.js


    The most common use of the web3.js APIs is to build front ends so that users can
    interact with your smart contract directly. In this section, you will learn how
    to use web3.js to interact with your newly deployed contract. You will build a
    web front end.


    Create a new text file and name it as `main.css`. Populate the file with the following:


    ```

    body {

    background-color:#F0F0F0;

    padding: 2em;

    font-family: ''Raleway'',''Source Sans Pro'', ''Arial'';

    }

    .container {

    width: 90%;

    margin: 0 auto;

    }

    label {

    display:block;

    margin-bottom:10px;

    }

    input {

    padding:10px;

    width: 100%;

    margin-bottom: 1em;

    }

    button {

    margin: 2em 0;

    padding: 1em 4em;

    display:block;

    }

    #result {

    padding:1em;

    background-color:#fff;

    margin: 1em 0;

    }

    ```


    This file serves as the CSS (Cascading Style Sheet) for the web front end that
    you will build next.


    Create a new text file and name it as `index.html` (save it in the `web3projects`
    folder). Populate it with the following statements:


    ```


    Document


    Educational Credentials Notarizer


    Credential to store


    Store


    Check Credential


    Check


    Status


    async function loadWeb3() {

    //---if MetaMask is available on your web browser---

    if (window.ethereum) {

    web3 = new Web3(window.ethereum);

    //---connect to account---

    const account = await window.ethereum.request(

    {method: ''eth_requestAccounts''});

    console.log(account)

    } else {

    //---set the provider you want from Web3.providers---

    web3 = new Web3(

    new Web3.providers.HttpProvider(

    "http://localhost:8545"));

    }

    }

    //---load the smart contract---

    async function loadContract() {

    abi = [ { "anonymous": false, "inputs": [ { "indexed": false, "internalType":
    "address", "name": "from", "type": "address" }, { "indexed": false, "internalType":
    "string", "name": "document", "type": "string" }, { "indexed": false, "internalType":
    "uint256", "name": "blockNumber", "type": "uint256" } ], "name": "Result", "type":
    "event" }, { "inputs": [], "name": "cashOut", "outputs": [], "stateMutability":
    "nonpayable", "type": "function" }, { "inputs": [ { "internalType": "string",
    "name": "document", "type": "string" } ], "name": "checkEduCredentials", "outputs":
    [], "stateMutability": "payable", "type": "function" }, { "inputs": [], "name":
    "kill", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
    { "inputs": [ { "internalType": "string", "name": "document", "type": "string"
    } ], "name": "storeEduCredentials", "outputs": [], "stateMutability": "nonpayable",
    "type": "function" } ];

    address = ''0x450FdF943afec4036787f4deDA11A34526c53921''

    return await new web3.eth.Contract(abi,address);

    }

    //---get the current account in MetaMask---

    async function getCurrentAccount() {

    const accounts = await web3.eth.getAccounts();

    console.log(accounts)

    return accounts[0];

    }

    async function load() {

    await loadWeb3();

    //---load the contract---

    notarizer = await loadContract();

    //---get the account---

    const account = await getCurrentAccount();

    //---handle the Result event fired by the smart contract---

    notarizer.events.Result()

    .on(''data'', function(event){

    if (event.returnValues[0] == account) {

    console.log(event.returnValues[0]);  // from

    console.log(event.returnValues[1]);  // text

    console.log(event.returnValues[2]);  // blocknumber

    //---if the blocknumber is 0, this means

    // credential is not found---

    if (event.returnValues[2] > 0) {

    $("#result").html("Credential is valid");

    } else {

    $("#result").html("Credential is NOT valid");

    }

    }

    });

    //---store the credential onto the blockchain---

    $("#btnStore").click(async function() {

    notarizer.methods.storeEduCredentials($("#document").val())

    .send({from:account})

    .then(function (tx) {

    $("#result").html(tx.transactionHash);

    });

    });

    //---check the credential on the blockchain---

    $("#btnCheck").click(async function() {

    notarizer.methods.checkEduCredentials($("#document2").val())

    .send({from:account, value:1000});

    });

    }

    load();


    ```


    In terminal, ensure that the `serve` command is still running (if not, type `serve`
    in the `web3projects` folder). Load the Chrome web browser with the following
    URL: `http://localhost:3000/index.html`. You should see the page shown in Figure
    [8-4](#471881_2_En_8_Chapter.xhtml#Fig4).


    ![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig4_HTML.jpg)


    A screenshot of the web page has Educational credentials notarizer tab. It has
    3 fields, credentials to store with store button, check credentials with check
    button, and status.


    Figure 8-4


    The web front end to interact with the smart contract


    Enter a string such as `{ "id": "1234567", "result": { "math": "A", "science":
    "B", "english": "A" } }` in the first text box and then click the **Store** button.
    You should see the popup by MetaMask (see Figure [8-5](#471881_2_En_8_Chapter.xhtml#Fig5)).


    ![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig5_HTML.jpg)


    A screenshot of a document window with credentials sent status. It is overlayed
    by a popup box titled, MetaMask notification. It displays the details under the
    selected account.


    Figure 8-5


    Confirming the transaction to send the credential to the smart contract for notarization


    Click **Confirm** to confirm the transaction. When the transaction is sent, you
    will immediately see the transaction hash displayed at the bottom of the page
    (see Figure [8-6](#471881_2_En_8_Chapter.xhtml#Fig6)).


    ![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig6_HTML.jpg)


    A screenshot of status code reads, 0 x c 5 2 6 7 5 c c f e d 1 4 3 f d 1 d 4 f
    0 1 c 4 7 d a 7 0 7 2 a 5 0 c 3 6 a 8 9 8 0 4 c 6 a 3 5 c d c 0 e 3 e c 7 d 9
    d d 1 1 8.


    Figure 8-6


    The transaction hash is displayed at the bottom of the page


    Once the block containing the transaction is mined, you will be able to type the
    same credential in the second text box and then click the **Check** button to
    verify if the same credential was previously stored on the blockchain (see Figure
    [8-7](#471881_2_En_8_Chapter.xhtml#Fig7)).


    ![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig7_HTML.jpg)


    A screenshot of the document window with a code under the status tab. It is overlayed
    by a popup box titled, MetaMask notification. It displays the details under the
    selected account.


    Figure 8-7


    Verifying if a credential was previous stored on the blockchain


    If the credential was stored previously, you should see **Credential is valid**
    at the bottom of the screen (see Figure [8-8](#471881_2_En_8_Chapter.xhtml#Fig8)).


    ![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig8_HTML.jpg)


    A screenshot of the web page has Eduational credentials notarizer window. It has
    3 fields with information, credentials to store with store button, check credential
    with check button, and the status with credential is valid.


    Figure 8-8


    The result of the validation of the credential is shown at the bottom of the page


    Let’s see how the code works.


    First, define the `loadContract()` function so that you can load the smart contract
    you deployed in the previous chapter. This function returns an instance of the
    smart contract using its ABI and address:'
