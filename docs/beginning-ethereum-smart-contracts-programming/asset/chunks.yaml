- fmt: '### Events in Smart Contracts


    Recall that the `checkEduCredential()` function returns the block number in which
    the hash of the base64-encoded string was stored on the blockchain. In the previous
    section, you modified the function so that it accepts payment. If you tried the
    smart contract, you would have noticed that after sending the 1000 Wei to the
    contract, the `checkEduCredential()` function does not return any value anymore.
    This is because the function is now performing a transaction, so it is not capable
    of returning you the result immediately (it needs to wait for the block to be
    added to the blockchain). So how do you solve this issue? You can solve this using
    *events*.


    In Solidity, a function can return a value back to the caller either directly
    or through events. Events are usually used by smart contracts to keep front-end
    applications updated on what is happening to the smart contract.


    Let’s define an event for your contract using the following statements:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    contract EduCredentialsStore {

    // store the owner of the contract

    address owner = msg.sender;

    //---store the hash of the strings and their

    // corresponding block number---

    // key is bytes32 and val is uint

    mapping (bytes32 => uint) private proofs;

    //---define an event---

    event Result(

    address from,

    string document,

    uint blockNumber

    );

    ```


    These statements defined an event named `Result` with three parameters: `from`,
    `hash`, and `blockNumber`. To fire this event, use the `emit` keyword. You will
    fire this event in the `checkEduCredentials()` function:


    ```

    //-----------------------------------------------

    // Check if a document has been saved previously

    //-----------------------------------------------

    function checkEduCredentials(string calldata document) public payable {

    require(msg.value == 1000 wei ,

    "This call requires 1000 wei");

    // use the hash of the string and check

    // the proofs mapping object, then fire the event

    emit Result(msg.sender,

    document,

    proofs[proofFor(document)]);

    // return proofs[proofFor(document)];

    }

    ```


    **Note:** There is now no need to return a value from this function, so modify
    the signature of the `checkEduCredentials()` function and comment out the `return`
    statement.


    To try out the updated smart contract, deploy it and then call its `checkEduCredentials()`
    function (remember to send it 1000 Wei). The Remix IDE will listen for the event
    and you will be able to see it after the transaction is confirmed (see Figure
    7-14).


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig14_HTML.jpg)


    A screenshot of the decoded output and logs. A set of codes under the event result
    is outlined.


    **Figure 7-14** You can use the Remix IDE to examine the events fired by smart
    contracts.


    ### Cashing Out


    Now that your smart contract holds Ether, you have a problem. The Ethers are stuck
    forever in the contract because you did not make any provisions to transfer them
    out. To be able to get Ethers out of a contract, there are two main ways:


    - Immediately transfer the Ethers to another account the moment they are received
    in the `checkEduCredentials()` function.

    - Add another function to transfer the Ethers to another account (such as the
    owner).


    For this example, you will use the second approach by adding a new `cashOut()`
    function to the contract:


    ```

    function cashOut() public {

    require(msg.sender == owner,

    "Only the owner of contract can cash out!");

    payable(owner).transfer(address(this).balance);

    }

    ```


    In the `cashOut()` function, you first need to ensure that only the owner can
    call this function. Once this is verified, you transfer the entire balance of
    the contract to the owner using the `transfer()` function.


    Once again, deploy the contract and then call the `checkEduCredentials()` function
    so that you can send 1000 Wei to the contract. Then, click the **cashOut** button
    in the Remix IDE to transfer the Ethers back to the owner. On Etherscan, you can
    see that there is a transfer of the balance to the owner of the contract (see
    Figure 7-15).


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig15_HTML.jpg)


    A screenshot of the Goerli Etherscan page. It displays the overview under the
    transaction details with “To” address highlighted.


    **Figure 7-15** Etherscan records the internal transfers of Ethers to another
    account.


    ### Destroying a Contract


    There will be a time when your smart contract has reached its end of life and
    needs to be shut down. To disable your smart contract so that it is no longer
    callable, you can use the `selfdestruct()` function.


    Let’s add a `kill()` function to the contract now:


    ```

    /* self-destruct function */

    function kill() public {

    require(msg.sender == owner, "Only owner can kill this contract");

    selfdestruct(payable(owner));

    }

    ```


    As usual, you need to ensure that only a specific user (usually the owner of the
    contract) can kill the contract. The `selfdestruct()` function sends all remaining
    Ethers stored in the contract to a designated address, which in this case is `owner`.


    > **Tip:** The `selfdestruct()` function was introduced in Solidity 0.5.0 as a
    way to provide an exit door in case of security threats in your smart contract.


    Finally, deploy the contract and observe the new kill button (see Figure 7-16).


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig16_HTML.jpg)


    A screenshot of deployed contracts interface. It displays the balance as 0 ETH,
    along with the following buttons: cashout, check Edu credentials, kill, and store
    Edu credentials.


    **Figure 7-16** The `kill()` function deletes the contract from the blockchain.


    #### What Happens After `selfdestruct()` Is Called?


    After you call the `selfdestruct()` function on the smart contract, it will continue
    to accept transactions, but no processing will be done and the transaction status
    is always a success. For example, if you now call the `storeEduCredentials()`
    function, it can still be called and you still need to pay a gas fee. However,
    nothing gets stored on the blockchain. Also, you can still send Ethers to the
    contract and it will hold the Ethers sent. However, you will no longer be able
    to get the Ethers out from the contract.


    After you have deployed this contract, record its deployed contract address and
    ABI. You will make use of these two pieces of information in the next chapter
    when you build a Web3 dapp (a front end to the smart contract).


    ### Summary


    In this chapter, you learned how to create a smart contract to store proofs of
    educational credentials. You also learned a few tricks that you can implement
    in your Solidity smart contracts, such as accepting payments and the ability to
    kill a smart contract. In the next chapter, you will learn how to build a front-end
    Web3 dapp to interact with the smart contract.


    ---


    # 8. Using the web3.js APIs


    In previous chapters, you learned the basics of smart contracts and how to deploy
    them onto the blockchain. So far, all interactions with smart contracts have been
    through the Remix IDE. While the Remix IDE provides an easy way for developers
    to test their smart contracts, it is not suitable for use by end users. To allow
    end users to interact with your smart contracts, you need to build a front end
    that hides the complexity of interacting with the smart contracts in the back
    end. For this purpose, you need a Web3 API.


    In this chapter, you will learn how to interact with smart contracts using the
    `web3.js` APIs. Using the `web3.js` APIs, you can build front ends (such as web
    pages, Node.js applications, etc.) to interact with smart contracts.'
