    \n**图11-20** 账户的代币余额也相应减少\n\n## 以编程方式出售代币\n\n在之前的代币合约中，你了解了代币如何在部署合约时被铸造，以及如何从一个账户转移到另一个账户。一旦账户持有代币，它就可以将代币转移给任意账户。\n\
