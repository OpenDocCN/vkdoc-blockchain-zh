    "uint256", "name": "", "type": "uint256" } ], "stateMutability": "view", "type":
    "function" } ]

    ```'
  raw: '### Cashing Out from the Contract


    When there are no winners for the game, the smart contract will hold the Ethers
    that were sent to it. To send the Ethers back to the account that deploys the
    contract, you need to add a cash-out function:


    ```

    function cashOut() public {

    require(msg.sender == owner,

    "Only the owner of contract can cash out!");

    payable(owner).transfer(address(this).balance);

    }

    ```


    Obviously, you need to ensure that only the owner (the one that deploys the contract)
    of the contract can cash out.


