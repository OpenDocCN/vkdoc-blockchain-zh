  trans: "\n### 加载合约\n\n合约部署完成后，我们通过向 `eth.contract()` 函数传入合约地址和 ABI，创建一个对它的引用：\n\n\
    ```\naddress = '0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330'\nabi = '[  {   \"\
    inputs\": [],   \"name\": \"cashOut\",   \"outputs\": [],   \"stateMutability\"\
    : \"nonpayable\",   \"type\": \"function\"  },  {   \"inputs\": [    {     \"\
    internalType\": \"string\",     \"name\": \"document\",     \"type\": \"string\"\
    \    }   ],   \"name\": \"checkEduCredentials\",   \"outputs\": [],   \"stateMutability\"\
    : \"payable\",   \"type\": \"function\"  },  {   \"inputs\": [],   \"name\": \"\
    kill\",   \"outputs\": [],   \"stateMutability\": \"nonpayable\",   \"type\":\
    \ \"function\"  },  {   \"anonymous\": false,   \"inputs\": [    {     \"indexed\"\
    : false,     \"internalType\": \"address\",     \"name\": \"from\",     \"type\"\
    : \"address\"    },    {     \"indexed\": false,     \"internalType\": \"string\"\
    ,     \"name\": \"document\",     \"type\": \"string\"    },    {     \"indexed\"\
    : false,     \"internalType\": \"uint256\",     \"name\": \"blockNumber\",   \
    \  \"type\": \"uint256\"    }   ],   \"name\": \"Result\",   \"type\": \"event\"\
    \  },  {   \"inputs\": [    {     \"internalType\": \"string\",     \"name\":\
    \ \"document\",     \"type\": \"string\"    }   ],   \"name\": \"storeEduCredentials\"\
    ,   \"outputs\": [],   \"stateMutability\": \"nonpayable\",   \"type\": \"function\"\
    \  } ]'\neduCredentialsStore = w3.eth.contract(address = address, abi = abi)\n\
    ```\n\n`eduCredentialsStore` 变量现在包含了对该智能合约的引用。\n\n### Base64 编码\n\n记住，教育凭证在传递给智能合约之前必须进行\
    \ base64 编码。这里我们将定义一个名为 `base64encode()` 的辅助函数：\n\n```\nimport base64\ndef base64encode(message):\n\
    message_bytes = message.encode('ascii')\nbase64_bytes = base64.b64encode(message_bytes)\n\
    return base64_bytes.decode('ascii')\n```\n\n该函数接收一个字符串，并返回其 base64 编码后的等价形式。\n\
    \n### 将凭证保存到区块链\n\n以下是通过智能合约将学生教育凭证保存到区块链的代码片段：\n\n```\n# 包含考试成绩的 JSON 字符串\nexam_result\
    \ = '''\n{\n\"id\": \"1234567\",\n\"result\": {\n\"math\": \"A\",\n\"science\"\
    : \"B\",\n\"english\": \"A\"\n}\n}\n'''\nexam_result = base64encode(exam_result)\n\
    # 获取账户的 nonce\nnonce = w3.eth.get_transaction_count(account1_address)\n# 估算 gas\
    \ 费用\nestimated_gas = \\\neduCredentialsStore.functions.storeEduCredentials(\n\
    exam_result).estimateGas(\n{'from':account1_address})\n# 构建交易\ntransaction = \\\
    \neduCredentialsStore.functions.storeEduCredentials(\nexam_result).buildTransaction(\n\
    {\n'gas': estimated_gas,\n'gasPrice': w3.eth.gas_price,\n'from': account1_address,\n\
    'nonce': nonce\n})\n# 签署交易\nsigned_txn = w3.eth.account.sign_transaction(\ntransaction,\
    \ private_key = account1_private_key)\n# 发送交易\ntx_hash = w3.eth.send_raw_transaction(signed_txn.rawTransaction)\n\
    print(w3.toHex(tx_hash))\n# 等待交易确认\nreceipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n\
    ```\n\n我们来逐步分析这段代码中的执行过程：\n\n*   首先，你对存储为字符串的考试成绩进行 base64 编码。\n    \n    要调用合约中的\
    \ `storeEduCredentials()` 函数，你可以使用 `eduCredentialsStore.functions.storeEduCredentials()`\
    \ 函数，然后使用 `estimateGas()` 函数来估算调用它所需的 gas。由于该函数只有合约所有者（即 `account1_address`）才能调用，你需要将\
    \ `account1_address` 传入该函数，否则会遇到错误。\n\n    ```\n    # 估算 gas 费用\n    estimated_gas\
    \ = \\\n    eduCredentialsStore.functions.storeEduCredentials(\n    exam_result).estimateGas(\n\
    \    {'from':account1_address})\n    ```\n\n*   你使用 `buildTransaction()` 函数构建交易，向其传入估算所需的\
    \ gas、gas 价格、调用合约的账户以及 nonce：\n\n    ```\n    # 构建交易\n    transaction = \\\n \
    \   eduCredentialsStore.functions.storeEduCredentials(\n    exam_result).buildTransaction(\n\
    \    {\n    'gas': estimated_gas,\n    'gasPrice': w3.eth.gas_price,\n    'from':\
    \ account1_address,\n    'nonce': nonce\n    })\n    ```\n\n*   你使用 `sign_transaction()`\
    \ 函数，通过账户 1 的私钥签署交易：\n\n    ```\n    # 签署交易\n    signed_txn = w3.eth.account.sign_transaction(\n\
    \    transaction, private_key = account1_private_key)\n    ```\n\n*   你使用 `send_raw_transaction()`\
    \ 函数发送交易：\n\n    ```\n    # 发送交易\n    tx_hash = w3.eth.send_raw_transaction(signed_txn.rawTransaction)\n\
    \    print(w3.toHex(tx_hash))\n    ```\n\n*   你使用 `eth.wait_for_transaction_receipt()`\
    \ 函数等待交易确认。交易确认后，交易详情将存储在 `receipt` 变量中。\n\n    ```\n    # 等待交易确认\n    receipt\
    \ = w3.eth.wait_for_transaction_receipt(tx_hash)\n    ```\n"
- fmt: '### Verifying the Result


    With the exam results firmly recorded on the blockchain, let’s now verify the
    result. Here’s the code snippet:


    ```

    exam_result = ''''''

    {

    "id": "1234567",

    "result": {

    "math": "A",

    "science": "B",

    "english": "A"

    }

    }

    ''''''

    exam_result = base64encode(exam_result)

    nonce = w3.eth.getTransactionCount(account1_address)

    # estimate the gas fee

    estimated_gas = eduCredentialsStore.functions.checkEduCredentials(

    exam_result).estimateGas(

    { ''value'' : 1000 }

    )  # 1000 is the wei to send

    # build the transaction

    transaction = eduCredentialsStore.functions.checkEduCredentials(

    exam_result).buildTransaction(

    {

    ''gas''      : estimated_gas,

    ''gasPrice'' : w3.eth.gas_price,

    ''from''     : account1_address,

    ''nonce''    : nonce,

    ''value''    : w3.toWei(1000, ''wei''),   # amount to send to the

    })                                        # function

    # sign the transaction

    signed_txn = w3.eth.account.sign_transaction(transaction,

    private_key = account1_private_key)

    # send the transaction

    tx_hash = w3.eth.send_raw_transaction(signed_txn.rawTransaction)

    print(w3.toHex(tx_hash))

    import time

    # create an instance of the event

    result_event = eduCredentialsStore.events.Result()

    def handle_event(event):

    receipt = \

    w3.eth.wait_for_transaction_receipt(event[''transactionHash''])

    result = result_event.processReceipt(receipt)

    # print the content of the Result event

    print(result)

    if result[0][''args''][''blockNumber''] != 0:

    print(''Result is verified.'')

    else:

    print(''Result not found on blockchain.'')

    return True

    def log_loop(event_filter, poll_interval):

    while True:

    for event in event_filter.get_new_entries():

    result = handle_event(event)

    if result == True:

    return

    time.sleep(poll_interval)

    block_filter = w3.eth.filter(

    {

    ''fromBlock'' : ''latest'',

    ''address''   : address       # address of contract

    })

    log_loop(block_filter, 2)

    ```


    The first part of this code snippet is similar to the previous code snippet. But
    here’s what is happening in this code snippet:


    - You estimate how much gas fee is needed when you call the `checkEduCredentials()`
    function together with a value of 1000 Wei (the function needs this amount):


    ```

    # estimate the gas fee

    estimated_gas = eduCredentialsStore.functions.checkEduCredentials(

    exam_result).estimateGas(

    { ''value'' : 1000 }

    )  # 1000 is the wei to send

    ```


    - You include the amount (1000 Wei) to send to the `checkEduCredentials()` function
    in the transaction:


    ```

    transaction = eduCredentialsStore.functions.checkEduCredentials(

    exam_result).buildTransaction(

    {

    ''gas''      : estimated_gas,

    ''gasPrice'' : w3.eth.gas_price,

    ''from''     : account1_address,

    ''nonce''    : nonce,

    ''value''    : w3.toWei(1000, ''wei''),   # amount to send to the

    })                                        # function

    ```


    - You then create an instance of the `Result` event so that you can listen for
    this event firing from the smart contract:


    ```

    # create an instance of the event

    result_event = eduCredentialsStore.events.Result()

    ```


    - To listen for the `Result` event, you need to implement your own looping mechanism.
    Here, you first use the `w3.eth.filter()` function to listen for specific events
    from the contract. You then use an infinite loop to keep listening for the events
    using the `get_new_entries()` function of the event filter. You use the `wait_for_transaction_receipt()`
    function to listen only for events related to this particular transaction. When
    an event is received, you call the `processReceipt()` function of the event to
    get the details of the event. In this case, as soon as the `Result` event is fetched,
    you stop listening for future events.


    - The event returned by the contract will look something like the following:


    ```

    (AttributeDict({''args'': AttributeDict({''from'': ''0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7'',
    ''document'': ''CnsKICAiaWQiOiAiMTIzNDU2NyIsCiAgInJlc3VsdCI6IHsKICAgICJtYXRoIjogIkEiLAogICAgInNjaWVuY2UiOiAiQiIsCiAgICAiZW5nbGlzaCI6ICJBIgogIH0KfQo='',
    ''blockNumber'': 7973034}), ''event'': ''Result'', ''logIndex'': 301, ''transactionIndex'':
    177, ''transactionHash'': HexBytes(''0x85c4ceb53e1f4c3e7844eba51f8d33d291a325ac191fa99a0d554ccc1e9f5864''),
    ''address'': ''0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330'', ''blockHash'': HexBytes(''0x752f3634b1970ca613e51c468e28e86186dd3603f215751fbc727392c9581460''),
    ''blockNumber'': 7973064}),)

    ```


    - The event returned is a tuple. You get the first element in the tuple, then
    look for the `args` key, and from there look for the `blockNumber` key, which
    will allow you to know if the examination result is authentic:


    ```

    if result[0][''args''][''blockNumber''] != 0:

    print(''Result is verified.'')

    else:

    print(''Result not found on blockchain.'')

    ```


    When you run this code, you will see the output like the following when the `Result`
    event is fired:


    ```

    0x85c4ceb53e1f4c3e7844eba51f8d33d291a325ac191fa99a0d554ccc1e9f5864

    (AttributeDict({''args'': AttributeDict({''from'': ''0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7'',
    ''document'': ''CnsKICAiaWQiOiAiMTIzNDU2NyIsCiAgInJlc3VsdCI6IHsKICAgICJtYXRoIjogIkEiLAogICAgInNjaWVuY2UiOiAiQiIsCiAgICAiZW5nbGlzaCI6ICJBIgogIH0KfQo='',
    ''blockNumber'': 7973034}), ''event'': ''Result'', ''logIndex'': 301, ''transactionIndex'':
    177, ''transactionHash'': HexBytes(''0x85c4ceb53e1f4c3e7844eba51f8d33d291a325ac191fa99a0d554ccc1e9f5864''),
    ''address'': ''0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330'', ''blockHash'': HexBytes(''0x752f3634b1970ca613e51c468e28e86186dd3603f215751fbc727392c9581460''),
    ''blockNumber'': 7973064}),)

    Result is verified.

    ```


    ### Calling Functions That Do Not Require Transactions


    Note that for smart contract functions that do not perform any transaction, you
    can simply call them using the `call()` function. For example, suppose the `checkEduCredentials()`
    function does not require any payment and thus it does not perform any transaction.
    In this case, you can call it like this:


    ```

    eduCredentialsStore.functions.checkEduCredentials(exam_result).call()

    ```


    ## Summary


    Overall, building a Web3 dapp using Python and `web3.py` is like building one
    using `web3.js`. The key difference is that for a Python dapp, you need to get
    intimate with the transactions yourself: connecting to a full node, signing the
    transactions, estimating the required gas fee needed, setting the gas price, and
    then finally waiting for the transactions to confirm and handle the events fired.


    # 10. Project: Online Lottery


    Now that you have seen how smart contracts work and how to interact with them
    using the `web3.js` APIs, it’s a good time to explore an application from end
    to end, from the smart contract to the front end, and perhaps give you some ideas
    for building your own decentralized applications.'
