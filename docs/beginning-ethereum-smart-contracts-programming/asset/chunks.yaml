    ''uncles'': []})

    ```


    ### Setting Up the Accounts


    Now, set up your Ethereum accounts. You will use the two accounts you created
    in MetaMask. Since you need to load the private key in your Python program, it
    is advisable to store the private key in an environment file so that you don’t
    expose it in your Python code. For this, install the **`python-dotenv`** module:


    ```

    !pip install python-dotenv

    ```


    Once the `python-dotenv` module is installed, create a file named `.env` and save
    it in the same directory as your Jupyter notebook. Populate it with the following:


    ```

    account1_private_key = ''<private_key_of_account1>''

    ```


    **Note:** Replace `<private_key_of_account1>` with the private key of Account
    1.


    To get the private key of Account 1, go to MetaMask and follow the steps outlined
    in Figure 9-6.


    **Figure 9-6** – Getting the private key of Account 1


    **Caution:** When dealing with the private keys of your accounts, ensure that
    no one else has access to them.


    Once the private key is obtained, you can paste it inside the `.env` file.


    Next, use the following code snippet to set up the details for Account 1 and 2:


    ```

    from dotenv import load_dotenv

    import os

    load_dotenv()

    # Account 1

    account1_address = ''0xa18A8E5c8242EF0DF08538C4870C638dD4667815''

    account1_private_key = os.environ.get(''account1_private_key'')

    # Account 2

    account2_address = ''0x1cc025d9A1741b51FD5dE6003884dc264F149AdC''

    ```


    You are only going to use Account 1 to sign transactions later, so you only need
    to load up the private key for Account 1.


    **Caution:** Be sure to replace `0xa18A8E5c8242EF0DF08538C4870C638dD4667815` and
    `0x1cc025d9A1741b51FD5dE6003884dc264F149AdC` with the address of your Account
    1 and Account 2, respectively.


    Ensure that Account 1 and Account 2 already have some test Ethers in the Goerli
    test network. If not, go to [`https://goerlifaucet.com/`](https://goerlifaucet.com/)
    to get some test Ethers.


    ### Getting the Balance of an Account


    The first task you want to do after setting up your account is check the balance
    of Account 1:


    ```

    w3.eth.get_balance(account1_address)

    ```


    You will get the result in Wei. Suppose you have 6.2468 ETH. You will get the
    following output (in Wei):


    ```

    6246800000000000000

    ```'
