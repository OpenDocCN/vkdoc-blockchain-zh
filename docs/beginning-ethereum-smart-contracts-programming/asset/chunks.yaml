- fmt: "### Transferring Ethers Between Accounts\n\nLet’s now transfer 1 ETH from\
    \ Account 1 to Account 2. This is a good chance for you to learn how to perform\
    \ a transaction manually using `web3.py`. For this:\n\n- First, use the `eth.get_transaction_count()`\
    \ function to get the number of transactions that have been sent from the specified\
    \ account. This will be used as the *nonce* for the transaction:\n\n    ```\n\
    \    nonce = w3.eth.get_transaction_count(account1_address)\n    ```\n\n- Then,\
    \ create a dictionary containing the transaction details:\n\n    ```\n    tx =\
    \ {\n    'nonce': nonce,                      # transaction count\n    'to': account2_address,\
    \              # who to send the ETH to\n    'value': w3.toWei(1000, 'wei'), \
    \     # the amount to transfer\n    'gasPrice': w3.eth.gas_price,        # get\
    \ the price of gas\n    }\n    ```\n\nIn this code, you are transferring 1000\
    \ Wei from Account 1 to Account 2. You use the `eth.gas_price` attribute to fetch\
    \ the current gas price.\n\n- Next, estimate how much gas is needed for this transaction\
    \ using the `eth.estimate_gas()` function and then insert the amount into the\
    \ transaction dictionary:\n\n    ```\n    gas = w3.eth.estimate_gas(tx)\n    tx['gas']\
    \ = gas\n    print(tx)\n    ```\n\n    You should see the transaction details\
    \ as follows:\n\n    ```\n    {\n    'nonce': 4,\n    'to': '0x1cc025d9A1741b51FD5dE6003884dc264F149AdC',\n\
    \    'value': 1000,\n    'gasPrice': 114287036513,\n    'gas': 21000\n    }\n\
    \    ```\n\n- You can now sign the transaction with the private key using the\
    \ `eth.account.sign_transaction()` function:\n\n    ```\n    signed_tx = w3.eth.account.sign_transaction(tx,account1_private_key)\n\
    \    ```\n\n- To send the transaction to Infura, use the `eth.send_raw_transaction()`\
    \ function:\n\n    ```\n    tx_hash = w3.eth.send_raw_transaction(signed_tx.rawTransaction)\n\
    \    print(w3.toHex(tx_hash))\n    ```\n\n    The function will return with a\
    \ hash, like this:\n\n    ```\n    0xc23d15f14f20f51b083fe6dab8f953e76b80ce6a3b4c43bfe336d02576eba1da\n\
    \    ```\n\n- The transaction will take some time to confirm. If you want to wait\
    \ for the transaction to complete, use the `eth.wait_for_transaction_receipt()`\
    \ function (this is a blocking call):\n\n    ```\n    receipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n\
    \    ```\n\n- Finally, to verify that the transfer is indeed performed correctly,\
    \ check the balance for Account 1 and 2:\n\n    ```\n    print(w3.eth.get_balance(account1_address))\n\
    \    print(w3.eth.get_balance(account2_address))\n    ```\n\nThe entire code snippet\
    \ to transfer 1 ETH from Account 1 to Account 2 looks like this:\n\n```\nnonce\
    \ = w3.eth.get_transaction_count(account1_address)\ntx = {\n'nonce': nonce,\n\
    'to': account2_address,\n'value': w3.toWei(1000, 'wei'),\n'gasPrice': w3.eth.gas_price,\n\
    }\ngas = w3.eth.estimate_gas(tx)\ntx['gas'] = gas\nsigned_tx = w3.eth.account.sign_transaction(tx,account1_private_key)\n\
    tx_hash = w3.eth.send_raw_transaction(signed_tx.rawTransaction)\nprint(w3.toHex(tx_hash))\n\
    receipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n```\n\n### Creating a\
    \ Dapp Using Python\n\nUsing Python to sign transactions is useful, but the more\
    \ important thing you want to do with the `web3.py` library is interact with your\
    \ smart contracts. For this purpose, you are going to use Python to interact with\
    \ the smart contract you created in Chapter [7](#471881_2_En_7_Chapter.xhtml).\
    \ Here is the full smart contract for your reference:\n\n```\n// SPDX-License-Identifier:\
    \ MIT\npragma solidity ^0.8;\ncontract EduCredentialsStore {\n// store the owner\
    \ of the contract\naddress owner = msg.sender;\n//---store the hash of the strings\
    \ and their\n// corresponding block number---\n// key is bytes32 and val is uint\n\
    mapping (bytes32 => uint) private proofs;\n//---define an event---\nevent Result(\n\
    address from,\nstring document,\nuint blockNumber\n);\n//--------------------------------------------------\n\
    // Store a proof of existence in the contract state\n//--------------------------------------------------\n\
    function storeProof(bytes32 proof) private {\n// use the hash as the key\nproofs[proof]\
    \ = block.number;\n}\n//----------------------------------------------\n// Calculate\
    \ and store the proof for a document\n//----------------------------------------------\n\
    function storeEduCredentials(string calldata\ndocument) external {\nrequire(msg.sender\
    \ == owner,\n\"Only the owner of contract can store the credentials\");\n// call\
    \ storeProof() with the hash of\n// the string\nstoreProof(proofFor(document));\n\
    }\nfunction cashOut() public {\nrequire(msg.sender == owner,\n\"Only the owner\
    \ of contract can cash out!\");\npayable(owner).transfer(\naddress(this).balance);\n\
    }\n//--------------------------------------------\n// Helper function to get a\
    \ document's sha256\n//--------------------------------------------\n// Takes\
    \ in a string and returns the hash of the\n// string\nfunction proofFor(string\
    \ calldata document) private\npure returns (bytes32) {\n// converts the string\
    \ into bytes array and\n// then hash it\nreturn sha256(bytes(document));\n}\n\
    //-----------------------------------------------\n// Check if a document has\
    \ been saved previously\n//-----------------------------------------------\nfunction\
    \ checkEduCredentials(string calldata document) public payable {\nrequire(msg.value\
    \ == 1000 wei ,\n\"This call requires 1000 wei\");\n// use the hash of the string\
    \ and check\n// the proofs mapping object, then fire the event\nemit Result(msg.sender,\n\
    document,\nproofs[proofFor(document)]);\n}\n/* self-destruct function */\nfunction\
    \ kill() public {\nrequire(msg.sender == owner, \"Only owner can kill this contract\"\
    );\nselfdestruct(payable(owner));\n}\n}\n```\n\n> **Tip:** If you can’t remember\
    \ the address of this contract you previously deployed on the Goerli testnet,\
    \ deploy it one more time and take note of its address.\n\nFor demonstration,\
    \ the address of my contract on the Goerli testnet is `0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330`.\
    \ Also, you need to get the ABI of the contract. For your convenience, here it\
    \ is:\n\n```\n[  {   \"inputs\": [],   \"name\": \"cashOut\",   \"outputs\": [],\
    \   \"stateMutability\": \"nonpayable\",   \"type\": \"function\"  },  {   \"\
    inputs\": [    {     \"internalType\": \"string\",     \"name\": \"document\"\
    ,     \"type\": \"string\"    }   ],   \"name\": \"checkEduCredentials\",   \"\
    outputs\": [],   \"stateMutability\": \"payable\",   \"type\": \"function\"  },\
    \  {   \"inputs\": [],   \"name\": \"kill\",   \"outputs\": [],   \"stateMutability\"\
    : \"nonpayable\",   \"type\": \"function\"  },  {   \"anonymous\": false,   \"\
    inputs\": [    {     \"indexed\": false,     \"internalType\": \"address\",  \
    \   \"name\": \"from\",     \"type\": \"address\"    },    {     \"indexed\":\
    \ false,     \"internalType\": \"string\",     \"name\": \"document\",     \"\
    type\": \"string\"    },    {     \"indexed\": false,     \"internalType\": \"\
    uint256\",     \"name\": \"blockNumber\",     \"type\": \"uint256\"    }   ],\
    \   \"name\": \"Result\",   \"type\": \"event\"  },  {   \"inputs\": [    {  \
    \   \"internalType\": \"string\",     \"name\": \"document\",     \"type\": \"\
    string\"    }   ],   \"name\": \"storeEduCredentials\",   \"outputs\": [],   \"\
    stateMutability\": \"nonpayable\",   \"type\": \"function\"  } ]\n```"
