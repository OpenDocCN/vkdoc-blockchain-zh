  trans: '

    # 什么是代币？


    要理解代币的概念，我们先从一个现实生活中的类比说起。大多数人对游乐场（或狂欢节）都很熟悉。在游乐场玩游戏时，摊位通常不接受现金支付。相反，他们需要你兑换现金（或使用信用卡）来购买硬币（或代币），以便在游戏摊位上使用（见图
    11-1）。


    ![](img/471881_2_En_11_Fig1_HTML.jpg)


    一张插图，展示法币兑换成用于游乐场游戏的代币的过程。


    图 11-1

    现实世界中在游乐场游戏里使用的代币


    游乐场老板这样做有多种原因：


    -   摊位无需处理现金；这样可以防止摊位工作人员（通常是游乐场老板的雇员）私自截留现金。

    -   在你开始玩游戏之前，游乐场老板就已预先收到现金，而未使用的代币无法退款。

    -   游乐场老板想通过给予你预先购买更多代币的激励，向你销售超过你实际需要的代币。


    在加密货币世界中，相同的概念也适用于代币。你并非直接用法定货币购买代币，而是先购买以太币，然后用以太币来购买代币（见图 11-2）。


    ![](img/471881_2_En_11_Fig2_HTML.jpg)


    一张插图，展示法定货币兑换成以太币，然后以太币用于购买代币，该代币用于在以太坊网络上运行的智能合约中。


    图 11-2

    以太坊区块链上的代币


    ## 币（Coin）与代币（Token）


    在加密货币世界中，有两个术语经常被混用：*币*和*代币*。那么它们是一样的吗？首先，*币*的定义是，它是一种原生存在于其自身区块链上的资产。比特币、莱特币和以太币都是币的例子。这些币各自存在于它们自己的区块链上。而*代币*则是在现有的区块链上创建的。最常见的代币平台是以太坊，它允许开发者使用
    ERC-20 标准创建自己的代币（本章后续部分将详细介绍）。用户可以使用以太币（以太坊区块链的原生币）在以太坊区块链上兑换特定的代币。因此，严格来说，币和代币并不相同。事实上，代币是基于币的。


    ## 代币是如何实现的？


    现在你已经清楚了代币及其工作原理，让我们来看看代币在以太坊中是如何实现的。


    代币是通过智能合约（没错，就是你在前几章读到的智能合约）来实现的，这种合约被称为*代币合约*。代币合约是一种包含账户地址及其余额映射关系的智能合约。图 11-3
    展示了这种映射的一个例子。


    ![](img/471881_2_En_11_Fig3_HTML.png)


    一个四行两列的表格。列标题是“账户地址”和“余额”。总代币数为 200。


    图 11-3

    代币合约包含账户地址及其余额的映射


    从概念上讲，代币合约是一种维护映射对象的智能合约，该映射对象在区块链上记录了账户的余额（见图 11-4）。


    ![](img/471881_2_En_11_Fig4_HTML.jpg)


    一张示意图，展示包含 `n` 个区块的区块链。其中一个区块中的智能合约信息被传递到包含多个账户地址的状态变量中。


    图 11-4

    代币合约维护一个包含账户地址及其余额的映射对象


    ## 铸造新代币


    代币的总供应量可以通过*铸造*新代币来增加。也就是说，你（代币合约的所有者）只需增加一个账户的余额，如图 11-5 所示。


    ![](img/471881_2_En_11_Fig5_HTML.png)


    一个四行两列的表格。列标题是“账户地址”和“余额”。总代币数为 300。


    图 11-5

    通过增加一个或多个账户的余额来铸造新代币


    ## 销毁代币


    代币的总供应量可以通过销毁代币来减少。也就是说，你减少一个账户的余额，如图 11-6 所示。


    ![](img/471881_2_En_11_Fig6_HTML.png)


    一个四行两列的表格。列标题是“账户地址”和“余额”。总代币数为 270。


    图 11-6

    通过减少一个账户的余额来销毁代币


    代币也可以通过发送到死地址的方式销毁，如图 11-7 所示。请注意，在这种情况下，代币的总供应量不会改变。


    ![](img/471881_2_En_11_Fig7_HTML.png)


    一个四行两列的表格。列标题是“账户地址”和“余额”。总代币数为 270。


    图 11-7

    通过将代币发送到死地址来销毁。在这种情况下，总供应量不变


    ## 代币合约内部使用的单位


    在代币合约中，*精度小数位*表示一个代币的可分割程度。考虑一个虚构代币 `MusicToken` 的例子，每个代币代表拥有一首歌的权利。在这种情况下，*精度小数位*
    设为 0。这意味着代币不能有小数部分；你不能拥有 1.1 或 1.5 个代币。换句话说，一个人可以拥有的 `MusicToken` 数量必须是离散的数字（只能是整数值）。图
    11-8 展示了 `MusicToken` 在代币合约内部的表示方式。


    ![](img/471881_2_En_11_Fig8_HTML.png)


    一个关于内部表示精度的表格，精度为 0 music token。它有 4 行 2 列。列标题是“账户地址”和“余额”。总代币数为 15。


    图 11-8

    精度小数位为 0 的代币没有小数部分


    再考虑另一个例子，虚构的 `GoldToken`，它代表一个人拥有的黄金数量。在这种情况下，精度小数位可以设为 3，这意味着一个人拥有的 `GoldToken`
    数量可以精确到小数点后 3 位，例如 2.003。图 11-9 展示了 `GoldToken` 的余额在内部是如何表示的，以及用户看到的视图是什么样的。


    ![](img/471881_2_En_11_Fig9_HTML.png)


    两个表格。表格 1 是 GoldToken 的内部表示，表格 2 是给用户看的视图。有 4 行 2 列。列标题是“账户地址”和“余额”。表格 1 中总代币数为
    15000，表格 2 中总代币数为 15。


    图 11-9

    精度为三位小数的代币：内部存储方式与外部查看方式


    在内部，对于一个具有 `n` 位精度小数的代币，余额使用以下公式表示：`token_internal = token_external * 10^n`。例如，一个用户可能拥有
    4.497 个 `GoldToken`，但在内部，代币合约将其余额存储为 4497。

    '
- fmt: '### ERC-20 Token Standard


    For tokens created on the Ethereum blockchain to be accepted by smart contracts,
    the tokens must adhere to some particular standards. In the case of Ethereum tokens,
    that standard is ERC-20. `ERC` stands for *Ethereum Request for Comments*. In
    `ERC-20`, the number 20 refers to the proposal ID number. The proposal `ERC-20`
    defines a set of rules that need to be met for a token to be able to interact
    with others.


    > **Tip:** The `ERC-20` standard is a specific set of functions developers must
    use in their fungible tokens. A fungible token means that the token is divisible
    and can be broken down into smaller denominations (e.g., 1 token is equivalent
    to the sum of 0.5 token, 0.3 token, and 0.2 token).


    `ERC20` tokens must be able to do the following:


    - Get the total token supply.

    - Get the account balance.

    - Transfer the token from one account to another.

    - Approve the use of the token as a monetary asset.


    Specifically, `ERC20` tokens must implement the following interface:


    ```

    contract ERC20Interface {

    function totalSupply() public constant returns (uint);

    function balanceOf(address tokenOwner) public constant

    returns (uint balance);

    function allowance(address tokenOwner, address

    spender) public constant returns (uint remaining);

    function transfer(address to, uint tokens) public

    returns (bool success);

    function approve(address spender, uint tokens) public

    returns (bool success);

    function transferFrom(address from, address to, uint

    tokens) public returns (bool success);

    event Transfer(address indexed from, address indexed

    to, uint tokens);

    event Approval(address indexed tokenOwner, address

    indexed spender, uint tokens);

    }

    ```


    Here are the uses for the various functions and events in the `ERC20Interface`:


    - `totalSupply`: Returns the total token supply.

    - `balanceOf(address _owner)`: Returns the account balance of `_owner`.

    - `transfer(address _to, uint256 _value)`: Transfers `_value` to `_to` and fires
    the `Transfer` event. The function should revert if the `_from` account does not
    have enough tokens to spend.

    - `approve(address _spender, uint256 _value)`: Allows `_spender` to withdraw from
    the account several times, up to the `_value` amount.

    - `transferFrom(address _from, address _to, uint256 _value)`: Transfers `_value`
    from `_from` to `_to` and fires the `Transfer` event. The function should revert
    unless the `_from` account has deliberately authorized the sender of the message
    via some mechanism.

    - `allowance(address _owner, address _spender)`: Returns the amount the `_spender`
    is still allowed to withdraw from the `_owner`.

    - `Transfer(address indexed _from, address indexed _to, uint256 _value)`: Must
    trigger when tokens are transferred, including zero-value transfers.

    - `Approval(address indexed _owner, address indexed _spender, uint256 _value)`:
    Must trigger on any successful call to `approve(address _spender, uint256 _value)`.


    ## Creating Token Contracts


    Rather than implement all these functions and events yourself, OpenZeppelin provides
    a base implementation for ERC-20. You can find this implementation at [`https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol/`](https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol/)
    .


    > **Note:** OpenZeppelin is an open-source framework for building secure smart
    contracts. OpenZeppelin provides a complete suite of security products and audit
    services to build, manage, and inspect all aspects of software development and
    operations for decentralized applications.


    So if you are writing an ERC-20 token contract, you just need to import the base
    implementation from OpenZeppelin and inherit from it.


    For your example, create a new contract in the Remix IDE and name it as `token.sol`.
    Populate it with the following statements:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    import "https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol";

    contract MyToken is ERC20 {

    constructor(string memory name, string memory symbol)

    ERC20(name, symbol) {

    // ERC20 tokens by default have 18 decimals

    // number of tokens minted = n * 10^18

    uint256 n = 1000;

    _mint(msg.sender, n * 10**uint(decimals()));

    }

    }

    ```


    In this contract, you are creating 1000 tokens (value of `n`), and each token
    can go up to 18 decimal places of precision (since the `decimals()` function by
    default returns 18). Internally within the contract, the number of tokens minted
    is dependent on `n` and the precision. In this example, while the total supply
    is 1000 tokens, the total units of base tokens minted is equal to **1000 x 10^18**,
    or **1,000,000,000,000,000,000,000**.


    > **Tip:** All operations involving tokens are based on the base token units.
    For example, if I want to send 1 token to another account, I have to transfer
    1,000,000,000,000,000,000 base token units of my tokens to the recipient account.


    ### Overriding the Number of Decimal Places of Precision


    The `decimals()` function in the token contract by default returns 18. This means
    that your tokens created have a denomination as small as 0.000000000000000001
    (18 decimal places). However, there are occasions where you don’t really need
    that kind of precision for your tokens. For example, if you do not want your tokens
    to be fractionized, you can override the `decimals()` function in the token contract,
    like this:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    import "https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol";

    contract MyToken is ERC20 {

    constructor(string memory name, string memory symbol)

    ERC20(name, symbol) {

    // ERC20 tokens have 18 decimals

    // number of tokens minted = n * 10^18

    uint256 n = 1000;

    _mint(msg.sender, n * 10**uint(decimals()));

    }

    function decimals() override public pure returns (uint8) {

    return 0;

    }

    }

    ```


    In this example, the `decimals()` function returns 0, which means that your token
    does not have any decimal places. If you return 1, the smallest denomination for
    your token is 0.1.


    For simplicity, your token contract will use the default 18 decimal places of
    precision.


    ### Deploying the Token Contract


    To deploy the token contract, you must specify two arguments:


    - The name (description) of the token

    - The symbol of the token


    > **Tip:** Symbols of tokens are not unique, but you should try to keep them to
    within three to four characters.


    Figure 11-10 shows an example name and symbol for a token. Click **Deploy** to
    deploy the token contract.


    ![A screenshot of the dialog box has the deploy tab with the user name and W M
    L drop-down, and check box for publish to I P F S.](images/471881_2_En_11_Chapter/471881_2_En_11_Fig10_HTML.jpg)


    **Figure 11-10** — Deploying the token contract with the name and symbol


    Once the contract is deployed, you can expand on the contract name to review the
    various functions (see Figure 11-11). These are the functions that you need to
    implement in your ERC-20 token contract (which was implemented by the OpenZeppelin
    base contract).


    ![A screenshot of the deployed contracts dialog box lists the various functions
    of the token contract in the blockchain.](images/471881_2_En_11_Chapter/471881_2_En_11_Fig11_HTML.jpg)


    **Figure 11-11** — The various functions defined in a ERC-20 token contract


    Copy the address of the deployed token contract (see Figure 11-12).


    ![A screenshot of the deployed contracts dialog box with the token contract in
    the blockchain and the copy option is highlighted.](images/471881_2_En_11_Chapter/471881_2_En_11_Fig12_HTML.jpg)


    **Figure 11-12** — The deployed token contract (copy its address to the clipboard)'
  raw: '### ERC-20 Token Standard


    For tokens created on the Ethereum blockchain to be accepted by smart contracts,
    the tokens must adhere to some particular standards. In the case of Ethereum tokens,
    that standard is ERC-20\. ERC stands for *Ethereum Request for Comments*. In ERC-20,
    the number 20 refers to the proposal ID number. The proposal ERC-20 defines a
    set of rules that need to be met for a token to be able to interact with others.


    Tip


    The ERC-20 standard is a specific set of functions developers must use in their
    fungible tokens. A fungible token means that the token is divisible and can be
    broken down into smaller denominations (e.g., 1 token is equivalent to the sum
    of 0.5 token, 0.3 token, and 0.2 token).


    ERC20 tokens must be able to do the following:


    *   Get the total token supply.


    *   Get the account balance.


    *   Transfer the token from one account to another.


    *   Approve the use of the token as a monetary asset.


    Specifically, ERC20 tokens must implement the following interface:


    ```

    contract ERC20Interface {

    function totalSupply() public constant returns (uint);

    function balanceOf(address tokenOwner) public constant

    returns (uint balance);

    function allowance(address tokenOwner, address

    spender) public constant returns (uint remaining);

    function transfer(address to, uint tokens) public

    returns (bool success);

    function approve(address spender, uint tokens) public

    returns (bool success);

    function transferFrom(address from, address to, uint

    tokens) public returns (bool success);

    event Transfer(address indexed from, address indexed

    to, uint tokens);

    event Approval(address indexed tokenOwner, address

    indexed spender, uint tokens);

    }

    ```


    Here are the uses for the various functions and events in the `ERC20Interface`:


    *   `totalSupply`: Returns the total token supply


    *   `balanceOf(address _owner)`: Returns the account balance of `_owner`


    *   `transfer(address _to, uint256 _value)`: Transfers `_value` to `_to` and fires
    the `Transfer` event. The function should revert if the `_from` account does not
    have enough tokens to spend.


    *   `approve(address _spender, uint256 _value)`: Allows `_spender` to withdraw
    from the account several times, up to the `_value` amount


    *   `transferFrom(address _from, address _to, uint256 _value)`: Transfers `_value`
    from `_from` to `_to` and fires the `Transfer` event. The function should revert
    unless the `_from` account has deliberately authorized the sender of the message
    via some mechanism.


    *   `allowance(address _owner, address _spender)`: Returns the amount the `_spender`
    is still allowed to withdraw from the `_owner`


    *   `Transfer(address indexed _from, address indexed _to, uint256 _value)`: Must
    trigger when tokens are transferred, including zero-value transfers


    *   `Approval(address indexed _owner, address indexed _spender, uint256 _value)`:
    Must trigger on any successful call to `approve(address _spender, uint256 _value)`


    ## Creating Token Contracts


    Rather than implement all these functions and events yourself, **OpenZeppelin**
    provides a base implementation for ERC-20\. You can find this implementation at
    [`https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol/`](https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol/)`.`


    Note


    OpenZeppelin is an open-source framework for building secure smart contracts.
    OpenZeppelin provides a complete suite of security products and audit services
    to build, manage, and inspect all aspects of software development and operations
    for decentralized applications.


    So if you are writing an ERC-20 token contract, you just need to import the base
    implementation from OpenZeppelin and inherit from it.


    For your example, create a new contract in the Remix IDE and name it as `token.sol`.
    Populate it with the following statements:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    import "https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol";

    contract MyToken is ERC20 {

    constructor(string memory name, string memory symbol)

    ERC20(name, symbol) {

    // ERC20 tokens by default have 18 decimals

    // number of tokens minted = n * 10^18

    uint256 n = 1000;

    _mint(msg.sender, n * 10**uint(decimals()));

    }

    }

    ```


    In this contract, you are creating 1000 tokens (value of `n`), and each token
    can go up to 18 decimal places of precision (since the `decimals()` function by
    default returns 18). Internally within the contract, the number of tokens minted
    is dependent on `n` and the precision. In this example, while the total supply
    is 1000 tokens, the total units of base tokens minted is equal to **1000 x 10**^(**18**),
    or **1000,000,000,000,000,000,000**.


    Tip


    All operations involving tokens are based on the base token units. For example,
    if I want to send 1 token to another account, I have to transfer 1,000,000,000,000,000,000
    base token units of my tokens to the recipient account.


    ### Overriding the Number of Decimal Places of Precision


    The `decimals()` function in the token contract by default returns 18\. This means
    that your tokens created have a denomination as small as 0.000000000000000001
    (18 decimal places). However, there are occasions where you don’t really need
    that kind of precision for your tokens. For example, if you do not want your tokens
    to be fractionized, you can override the `decimals()` function in the token contract,
    like this:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    import "https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol";

    contract MyToken is ERC20 {

    constructor(string memory name, string memory symbol)

    ERC20(name, symbol) {

    // ERC20 tokens have 18 decimals

    // number of tokens minted = n * 10^18

    uint256 n = 1000;

    _mint(msg.sender, n * 10**uint(decimals()));

    }

    function decimals() override public pure returns (uint8) {

    return 0;

    }

    }

    ```


    In this example, the `decimals()` function returns 0, which means that your token
    does not have any decimal places. If you return 1, the smallest denomination for
    your token is 0.1.


    For simplicity, your token contract will use the default 18 decimal places of
    precision.


    ### Deploying the Token Contract


    To deploy the token contract, you must specify two arguments:


    *   The name (description) of the token


    *   The symbol of the token


    Tip


    Symbols of tokens are not unique, but you should try to keep them to within three
    to four characters.


    Figure [11-10](#471881_2_En_11_Chapter.xhtml#Fig10) shows an example name and
    symbol for a token. Click **Deploy** to deploy the token contract.


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig10_HTML.jpg)


    A screenshot of the dialog box has the deploy tab with the user name and W M L
    drop-down, and check box for publish to I P F S.


    Figure 11-10


    Deploying the token contract with the name and symbol


    Once the contract is deployed, you can expand on the contract name to review the
    various functions (see Figure [11-11](#471881_2_En_11_Chapter.xhtml#Fig11)). These
    are the functions that you need to implement in your ERC-20 token contract (which
    was implemented by the OpenZeppelin base contract).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig11_HTML.jpg)


    A screenshot of the deployed contracts dialog box lists the various functions
    of the token contract in the blockchain.


    Figure 11-11


    The various functions defined in a ERC-20 token contract


    Copy the address of the deployed token contract (see Figure [11-12](#471881_2_En_11_Chapter.xhtml#Fig12)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig12_HTML.jpg)


    A screenshot of the deployed contracts dialog box with the token contract in the
    blockchain and the copy option is highlighted.


    Figure 11-12


    The deployed token contract (copy its address to the clipboard)'
