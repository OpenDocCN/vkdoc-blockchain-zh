  trans: "\n# 加密货币交易所\n\n在讨论了这么多关于加密货币（代币）和通证的话题后，一个关键问题仍然存在：你该如何购买它们？答案是：通过交易所。加密货币交易所是一个可以买卖加密货币的平台。加密货币交易所分为两种类型：\n\
    \n-   **中心化交易所**（CEX）：CEX 通常允许你使用法定货币购买加密货币。CEX 的例子包括 Coinbase（`www.coinbase.com`）、Binance（`www.binance.com`）和\
    \ Kraken（`www.kraken.com`）。大多数 CEX 还允许你将一种通证兑换成另一种通证。\n\n-   **去中心化交易所**（DEX）：DEX\
    \ 是一个点对点的市场，交易直接在加密货币交易者之间进行。DEX 允许你在没有中介（如 CEX）的情况下兑换通证。DEX 是通过智能合约实现的。\n\n对于大多数加密货币初学者来说，CEX\
    \ 提供了一个用户友好的平台，便于进入加密货币世界。用户无需深入了解加密货币的运作原理，就可以使用信用卡按固定价格（通常如此）购买加密货币。然而，CEX 也存在一些你应该了解的风险。首先，始终存在信用违约的风险（想想\
    \ FTX、CoinBene 和 Celsius）。\n\n**提示**：访问 `www.cryptowisser.com/exchange-graveyard/`\
    \ 可以查看已关闭的交易所列表。\n\n其次，CEX 需要遵守 KYC（了解你的客户）和 AML（反洗钱）法规，这首先就违背了使用加密货币的初衷（匿名性）。顾名思义，CEX\
    \ 是中心化的，因为它们通常受其运营所在国家政府的监管。最后，CEX 容易受到网络攻击和安全漏洞的影响。如图 13-6 所示，当你从 CEX 购买加密货币时，你的加密货币存储在由\
    \ CEX 维护的钱包中。除非你将加密货币转移到你自己的钱包（如 MetaMask 或硬件钱包），否则 CEX 的安全漏洞将使你的加密货币面临风险，因为黑客可能非法地将你的加密货币转移到其他钱包。\n\
    \n![一张插图显示了 CEX 在区块链中维护用户的加密货币，而加密货币则存储在用户钱包中。](img/471881_2_En_13_Fig6_HTML.jpg)\n\
    \n**图 13-6** — CEX 存储你的加密货币，这些加密货币容易受到网络攻击\n\n另一方面，DEX 没有 CEX 的那些限制。通过使用智能合约，DEX\
    \ 允许你轻松快捷地将一种类型的通证兑换成另一种。这使用户能够完全灵活地控制自己的资金。\n\n**提示**：一些流行的 DEX 包括 Uniswap、Sushiswap\
    \ 和 Pancakeswap。\n\n### 创建去中心化交易所\n\n由于 DEX 是通过智能合约实现的，因此通过应用你在本书前 12 章中学到的所有知识来理解它们的工作原理是非常有意义的。在本节中，你将创建一个\
    \ DEX 合约，允许用户兑换两种不同的 ERC-20 通证。\n\n### 创建通证合约\n\n让我们在 Remix IDE 中创建一个新的通证合约，并将其命名为\
    \ `token.sol`。用以下语句填充它：\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity\
    \ ⁰.8;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
    ;\ncontract MyToken is ERC20 {\n    // 价格表示为 1 个以太币可以购买多少\n    uint256 public\
    \ unitsOneEthCanBuy  = 10;\n    // 通证的拥有者\n    address public tokenOwner;\n  \
    \  constructor(string memory name, string memory symbol) ERC20(name, symbol) {\n\
    \        // 通证拥有者的地址\n        tokenOwner = msg.sender;\n        // ERC20 通证有 18\
    \ 位小数\n        // 铸造的通证数量 = n * 10¹⁸\n        uint256 n = 1000;\n        _mint(msg.sender,\
    \ n * 10**uint(decimals()));\n    }\n}\n```\n\n这个合约与你之前在第十一章中看到的基本 ERC-20 通证合约相同。\n\
    \n### 部署通证合约\n\n在这个示例中，你需要两个拥有一些测试以太币的账户：账户 1 和账户 2。你将使用这两个账户来创建两个通证：WML 和 LWM\
    \ 通证。\n\n使用账户 1，通过以下构造函数参数部署 `MyToken` 合约（另见图 13-7）：\n\n![合约对话框的截图，其中包含 My Token\
    \ 合约、部署按钮以及发布到 IPFS 选项。](img/471881_2_En_13_Fig7_HTML.jpg)\n\n**图 13-7** — 部署第一个通证\
    \ WML\n\n```\n\"WML token\",\"WML\"\n```\n\n这创建了 WML 通证。接下来，使用账户 2 部署相同的通证合约，这次使用以下构造函数参数：\n\
    \n```\n\"LWM token\",\"LWM\"\n```\n\n这创建了 LWM 通证。此时，Remix IDE 应该已经部署了这些通证合约，如图\
    \ 13-8 所示。\n\n![已部署合约的截图，显示了区块链中账户 1 和账户 2 的两个通证及其地址。](img/471881_2_En_13_Fig8_HTML.jpg)\n\
    \n**图 13-8** — 创建的两个通证及其地址\n\n记录通证的地址：\n\n-   WML 通证：`0xfa8b8F0fd75ABf2aF088bf2D1115E6F97ED0cB3a`\n\
    -   LWM 通证：`0x234273bD4D1aa3D233135dD49A26675dA7eF6A9a`\n\n**提示**：请将上述合约地址替换为你自己的地址。\n\
