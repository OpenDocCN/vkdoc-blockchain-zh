    ### 智能合约中的事件


    回顾一下，`checkEduCredential()` 函数会返回 base64 编码字符串的哈希值存储在区块链上的区块编号。在上一节中，你修改了该函数使其能够接收付款。如果你尝试了该智能合约，你会注意到，在向合约发送
    1000 Wei 后，`checkEduCredential()` 函数不再返回任何值。这是因为该函数现在正在执行一笔交易，因此无法立即向你返回结果（它需要等待区块被添加到区块链中）。那么如何解决这个问题呢？你可以使用*事件*来解决。


    在 Solidity 中，函数可以直接返回结果给调用者，也可以通过事件来返回。智能合约通常使用事件来让前端应用程序了解合约的当前状态。


    让我们使用以下语句为你的合约定义一个事件：


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ⁰.8;

    contract EduCredentialsStore {

    // 存储合约的所有者

    address owner = msg.sender;

    //---存储字符串的哈希值及其对应的区块编号---

    // 键为 bytes32，值为 uint

    mapping (bytes32 => uint) private proofs;

    //---定义一个事件---

    event Result(

    address from,

    string document,

    uint blockNumber

    );

    ```


    这些语句定义了一个名为 `Result` 的事件，它包含三个参数：`from`、`hash` 和 `blockNumber`。使用 `emit` 关键字来触发此事件。你将在
    `checkEduCredentials()` 函数中触发此事件：


    ```

    //-----------------------------------------------

    // 检查一个文档是否之前已保存

    //-----------------------------------------------

    function checkEduCredentials(string calldata document) public payable {

    require(msg.value == 1000 wei ,

    "此调用需要 1000 wei");

    // 使用字符串的哈希值检查 proofs 映射对象，然后触发事件

    emit Result(msg.sender,

    document,

    proofs[proofFor(document)]);

    // return proofs[proofFor(document)];

    }

    ```


    **注意：** 现在无需从此函数返回值，因此请修改 `checkEduCredentials()` 函数的签名，并注释掉 `return` 语句。


    要尝试更新后的智能合约，请部署它，然后调用其 `checkEduCredentials()` 函数（记得向它发送 1000 Wei）。Remix IDE 将监听该事件，你可以在交易确认后看到它（见图
    7-14）。


    ![](img/471881_2_En_7_Fig14_HTML.jpg)


    已解码输出和日志的截图。事件结果下面的一组代码被标出。


    **图 7-14** 你可以使用 Remix IDE 检查智能合约触发的事件。


    ### 提取资金


    现在你的智能合约持有以太币，但出现了一个问题。这些以太币永远被困在合约中，因为你没有做出任何将其转出的规定。要将以太币从合约中取出，主要有两种方式：


    - 在 `checkEduCredentials()` 函数收到以太币的瞬间，立即将其转移到另一个账户。

    - 添加另一个函数，将以太币转移到另一个账户（例如所有者）。


    对于本例，你将使用第二种方法，向合约中添加一个 `cashOut()` 函数：


    ```

    function cashOut() public {

    require(msg.sender == owner,

    "只有合约所有者才能提取资金！");

    payable(owner).transfer(address(this).balance);

    }

    ```


    在 `cashOut()` 函数中，你首先需要确保只有所有者才能调用此函数。验证通过后，你使用 `transfer()` 函数将合约的全部余额转移给所有者。


    再次部署合约，然后调用 `checkEduCredentials()` 函数，以便向合约发送 1000 Wei。然后，点击 Remix IDE 中的 **cashOut**
    按钮，将以太币转回给所有者。在 Etherscan 上，你可以看到余额被转移给了合约的所有者（见图 7-15）。


    ![](img/471881_2_En_7_Fig15_HTML.jpg)


    Goerli Etherscan 页面的截图。它显示了交易详情下的概览，其中“To”地址被高亮显示。


    **图 7-15** Etherscan 记录将以太币内部转移到另一个账户的过程。


    ### 销毁合约


    总会有那么一刻，你的智能合约的生命周期结束，需要被关闭。要禁用你的智能合约，使其不再可被调用，你可以使用 `selfdestruct()` 函数。


    现在让我们向合约中添加一个 `kill()` 函数：


    ```

    /* 自毁函数 */

    function kill() public {

    require(msg.sender == owner, "只有所有者才能销毁此合约");

    selfdestruct(payable(owner));

    }

    ```


    像往常一样，你需要确保只有特定用户（通常是合约所有者）才能销毁合约。`selfdestruct()` 函数会将合约中存储的所有剩余以太币发送到一个指定的地址，在本例中即
    `owner`。


    > **提示：** `selfdestruct()` 函数是在 Solidity 0.5.0 中引入的，旨在为智能合约面临安全威胁时提供一个退出通道。


    最后，部署合约并观察新的销毁按钮（见图 7-16）。


    ![](img/471881_2_En_7_Fig16_HTML.jpg)


    已部署合约界面的截图。它显示余额为 0 ETH，并包含以下按钮：cashout、check Edu credentials、kill 和 store Edu
    credentials。


    **图 7-16** `kill()` 函数将合约从区块链中删除。


    #### 调用 `selfdestruct()` 后会发生什么？


    在智能合约上调用 `selfdestruct()` 函数后，它仍然可以接受交易，但不会执行任何处理，且交易状态始终为成功。例如，如果你现在调用 `storeEduCredentials()`
    函数，它仍然可以被调用，并且你仍然需要支付 gas 费。但是，不会有任何数据被存储在区块链上。此外，你仍然可以向合约发送以太币，并且合约会持有这些发送来的以太币。然而，你将无法再从合约中取出这些以太币。


    部署此合约后，请记录其部署的合约地址和 ABI。在下一章构建 Web3 dapp（智能合约的前端）时，你将用到这两条信息。


    ### 本章小结


    在本章中，你学习了如何创建一个用于存储教育凭证证明的智能合约。你还学习了可以在 Solidity 智能合约中实现的一些技巧，例如接收付款以及销毁智能合约的能力。在下一章中，你将学习如何构建一个前端
    Web3 dapp 来与智能合约进行交互。


    ---


    # 8. 使用 web3.js API


    在前面的章节中，你学习了智能合约的基础知识以及如何将它们部署到区块链上。到目前为止，与智能合约的所有交互都是通过 Remix IDE 进行的。虽然 Remix
    IDE 为开发人员测试其智能合约提供了一种简便的方法，但它不适合最终用户使用。为了让最终用户能够与你的智能合约交互，你需要构建一个前端，隐藏在后端与智能合约交互的复杂性。为此，你需要一个
    Web3 API。


    在本章中，你将学习如何使用 `web3.js` API 与智能合约进行交互。使用 `web3.js` API，你可以构建前端（例如网页、Node.js 应用程序等）来与智能合约进行交互。

    '
- fmt: "# What Is web3.js?\n\n`web3.js` is a collection of libraries that allows you\
    \ to interact with a local or remote Ethereum node using HTTP, WebSocket, or IPC.\
    \ Through the `web3.js` APIs, your front end can then interact with the smart\
    \ contracts. The `web3.js` APIs contain the following modules:\n\n- `web3-eth`:\
    \ For the Ethereum blockchain and smart contracts\n- `web3-shh`: For the whisper\
    \ protocol to communicate p2p and broadcast\n- `web3-bzz`: For the swarm protocol,\
    \ the decentralized file storage\n- `web3-utils`: Contains useful helper functions\
    \ for dapp developers\n\nFor this book, you will only focus on the first module,\
    \ `web3-eth`.\n\n## Installing web3.js\n\nInstalling `web3.js` requires Node.js.\
    \ Specifically, you will make use of `npm` to download the `web3.js` APIs onto\
    \ your local computer.\n\n> **Tip**\n> The easiest way to install Node.js is to\
    \ use `nvm` (Node Version Manager). To learn how to use `nvm` to install Node.js,\
    \ check out my article at [`https://bit.ly/3QqyEBR`](https://bit.ly/3QqyEBR).\n\
    \nFor this chapter, create a folder named `web3projects` to store the `web3.js`\
    \ APIs. In terminal, type the following commands:\n\n```\n$ cd ~\n$ mkdir web3projects\n\
    $ cd web3projects\n```\n\nBefore you download the `web3.js` APIs, you want to\
    \ create an empty Node.js project:\n\n```\n$ npm init --yes\n```\n\nThis command\
    \ creates a file named `package.json`. This file contains the dependencies required\
    \ by a Node.js application. To download the `web3.js` APIs, type the following\
    \ command:\n\n```\n$ npm install web3 --save\n```\n\n> **Tip**\n> Creating the\
    \ `package.json` file will prevent `npm` (Node Package Manager) from showing pages\
    \ of warning and error messages when you install `web3.js`.\n\nThe `--save` option\
    \ informs `npm` to modify the `package.json` file and add the `web3.js` as a dependency\
    \ for the application.\n\nThe `web3projects` folder should now have a folder named\
    \ `node_modules`. Within this `node_modules` folder, you will see several folders,\
    \ all of which make up the suites of APIs that is `web3.js`.\n\n## Testing the\
    \ web3.js Using MetaMask\n\nWith `web3.js` downloaded, let’s now test it and understand\
    \ how it works. Create a text file named `TestWeb3.html` and save it in the `web3projects`\
    \ folder. Populate it as follows:\n\n```\nasync function loadWeb3() {\n  //---if\
    \ MetaMask is available on your web browser---\n  if (window.ethereum) {\n   \
    \ web3 = new Web3(window.ethereum);\n    //---connect to account---\n    const\
    \ account = await window.ethereum.request(\n      {method: 'eth_requestAccounts'});\n\
    \    console.log(account);\n  } else {\n    //---set the provider you want from\
    \ Web3.providers---\n    web3 = new Web3(\n      new Web3.providers.HttpProvider(\n\
    \        \"http://localhost:8545\"));\n  }\n}\n//---get the current account in\
    \ MetaMask---\nasync function getCurrentAccount() {\n  const accounts = await\
    \ web3.eth.getAccounts();\n  console.log(accounts)\n  return accounts[0];\n}\n\
    async function load() {\n  await loadWeb3();\n  alert(await getCurrentAccount());\n\
    }\nload();\n```\n\nIn terminal, type the following command:\n\n```\n$ npm install\
    \ -g serve\n```\n\n> **Tip**\n> Installing the `serve` application globally using\
    \ the `-g` option may require `sudo` permission. Alternatively, you can install\
    \ it locally within the current directory without using the `-g` option.\n\nThis\
    \ command installs a web server on the local computer. Typing the `serve` command\
    \ in any directory enables the directory to serve its content through the web\
    \ server.\n\nIn the `web3projects` folder, type the following command:\n\n```\n\
    $ cd ~/web3projects\n$ serve\n```\n\nUsing the Chrome browser (with MetaMask installed),\
    \ load the following URL: `http://localhost:3000/TestWeb3.html`.\n\nYou will see\
    \ the alert shown in Figure [8-1](#471881_2_En_8_Chapter.xhtml#Fig1). Select the\
    \ account that you want to connect in MetaMask, click **Next**, and then **Connect**.\n\
    \n![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig1_HTML.jpg)\n\n*Figure 8-1:\
    \ You need to give permission to the page to allow it to access your MetaMask\
    \ account(s)*\n\nYou should now see the alert showing the address of the account\
    \ that is connected to your web page, as shown in Figure [8-2](#471881_2_En_8_Chapter.xhtml#Fig2).\n\
    \n![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig2_HTML.jpg)\n\n*Figure 8-2:\
    \ The web page connecting to MetaMask*\n\nLet’s understand how this works. In\
    \ your JavaScript code, you first define a function named `loadWeb3`:\n\n```\n\
    async function loadWeb3() {\n  //---if MetaMask is available on your web browser---\n\
    \  if (window.ethereum) {\n    web3 = new Web3(window.ethereum);\n    //---connect\
    \ to account---\n    const account = await window.ethereum.request(\n      {method:\
    \ 'eth_requestAccounts'});\n    console.log(account);\n  } else {\n    //---set\
    \ the provider you want from Web3.providers---\n    web3 = new Web3(\n      new\
    \ Web3.providers.HttpProvider(\n        \"http://localhost:8545\"));\n  }\n}\n\
    ```\n\nIf you load this page through HTTP on a browser with MetaMask installed,\
    \ MetaMask automatically injects an API through `window.ethereum`. This `window.ethereum`\
    \ allows you to interact with an Ethereum node. In this case, it connects to the\
    \ MetaMask extension on your Chrome browser. You make use of `window.ethereum`\
    \ to create an instance of the `Web3` object, which allows you to connect to user\
    \ accounts in MetaMask, connect to smart contracts on the blockchain, and more.\n\
    \nIf MetaMask is not detected on the browser (due to the absence of `window.ethereum`),\
    \ you can connect to your own node. In this example, you connect to a local node\
    \ listening at port 8545 (`http://localhost:8545`). You can run your own local\
    \ node, such as Ganache (see Figure [8-3](#471881_2_En_8_Chapter.xhtml#Fig3)).\n\
    \n![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig3_HTML.jpg)\n\n*Figure 8-3:\
    \ Ganache allows you to simulate an Ethereum blockchain locally on your computer*\n\
    \n> **Note**\n> Ganache is a simulated Ethereum blockchain that you can use to\
    \ deploy contracts, develop your applications, and run tests. It is part of the\
    \ Truffle Suite of tools for Ethereum development. You can download Ganache from\
    \ [`https://trufflesuite.com/ganache/`](https://trufflesuite.com/ganache/).\n\n\
    The next function you define is the `getCurrentAccount()` function:\n\n```\n//---get\
    \ the current account in MetaMask---\nasync function getCurrentAccount() {\n \
    \ const accounts = await web3.eth.getAccounts();\n  console.log(accounts)\n  return\
    \ accounts[0];\n}\n```\n\nIn this function, you fetch all the accounts from the\
    \ connected node (either MetaMask or a node like Ganache) and return the first\
    \ account.\n\nFinally, you define the `load()` function so that you can call the\
    \ `loadWeb3()` and `getCurrentAccount()` functions asynchronously:\n\n```\nasync\
    \ function load() {\n  await loadWeb3();\n  alert(await getCurrentAccount());\n\
    }\n//---call the load function to connect to the node and display\n// the first\
    \ account---\nload();\n```"
  raw: '## What Is web3.js?


    web3.js is a collection of libraries that allows you to interact with a local
    or remote Ethereum node using HTTP, WebSocket, or IPC. Through the web3.js APIs,
    your front end can then interact with the smart contracts. The web3.js APIs contain
    the following modules:


    *   `web3-eth`: For the Ethereum blockchain and smart contracts


    *   `web3-shh`: For the whisper protocol to communicate p2p and broadcast


    *   `web3-bzz`: For the swarm protocol, the decentralized file storage


    *   `web3-utils`: Contains useful helper functions for dapp developers


    For this book, you will only focus on the first module, `web3-eth`.


    ### Installing web3.js


    Installing web3.js requires Node.js. Specifically, you will make use of npm to
    download the web3.js APIs onto your local computer.


    Tip


    The easiest way to install Node.js is to use nvm (Node Version Manager). To learn
    how to use nvm to install Node.js, check out my article at [`https://bit.ly/3QqyEBR`](https://bit.ly/3QqyEBR).


    For this chapter, create a folder named `web3projects` to store the web3.js APIs.
    In terminal, type the following commands:


    ```

    $ cd ~

    $ mkdir web3projects

    $ cd web3projects

    ```


    Before you download the web3.js APIs, you want to create an empty Node.js project:


    ```

    $ npm init --yes

    ```


    This command creates a file named `package.json`. This file contains the dependencies
    required by a Node.js application. To download the web3.js APIs, type the following
    command:


    ```

    $ npm install web3 --save

    ```


    Tip


    Creating the `package.json` file will prevent npm (Node Package Manager) from
    showing pages of warning and error messages when you install web3.js.


    The `--save` option informs npm to modify the `package.json` file and add the
    web3.js as a dependency for the application.


    The `web3projects` folder should now have a folder named `node_modules`. Within
    this `node_modules` folder, you will see several folders, all of which make up
    the suites of APIs that is web3.js.


    ### Testing the web3.js Using MetaMask


    With web3.js downloaded, let’s now test it and understand how it works. Create
    a text file named `TestWeb3.html` and save it in the `web3projects` folder. Populate
    it as follows:


    ```


    async function loadWeb3() {

    //---if MetaMask is available on your web browser---

    if (window.ethereum) {

    web3 = new Web3(window.ethereum);

    //---connect to account---

    const account = await window.ethereum.request(

    {method: ''eth_requestAccounts''});

    console.log(account);

    } else {

    //---set the provider you want from Web3.providers---

    web3 = new Web3(

    new Web3.providers.HttpProvider(

    "http://localhost:8545"));

    }

    }

    //---get the current account in MetaMask---

    async function getCurrentAccount() {

    const accounts = await web3.eth.getAccounts();

    console.log(accounts)

    return accounts[0];

    }

    async function load() {

    await loadWeb3();

    alert(await getCurrentAccount());

    }

    load();


    ```


    In terminal, type the following command:


    ```

    $ npm install -g serve

    ```


    Tip


    Installing the `serve` application globally using the `-g` option may require
    `sudo` permission. Alternatively, you can install it locally within the current
    directory without using the `-g` option.


    This command installs a web server on the local computer. Typing the `serve` command
    in any directory enables the directory to serve its content through the web server.


    In the `web3projects` folder, type the following command:


    ```

    $ cd ~/web3projects

    $ serve

    ```


    Using the Chrome browser (with MetaMask installed), load the following URL: `http://localhost:3000/TestWeb3.html`.


    You will see the alert shown in Figure [8-1](#471881_2_En_8_Chapter.xhtml#Fig1).
    Select the account that you want to connect in MetaMask, click **Next**, and then
    **Connect**.


    ![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig1_HTML.jpg)


    2 screenshots of the MetaMask notification screen. It presents the permission
    page with cancel button and highlighted next button and login page has cancel
    button, and highlighted connect button.


    Figure 8-1


    You need to give permission to the page to allow it to access your MetaMask account(s)


    You should now see the alert showing the address of the account that is connected
    to your web page, as shown in Figure [8-2](#471881_2_En_8_Chapter.xhtml#Fig2).


    ![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig2_HTML.jpg)


    A screenshot of the web page. It displays the address, that opens the account
    0 x a f 8 b 6 c a 2 1 0 2 3 a 5 9 5 f 0 c 4 9 1 9 b 8 b 4 a 9 d 1 f 0 c 1 7 7
    3 e 7.


    Figure 8-2


    The web page connecting to MetaMask


    Let’s understand how this works. In your JavaScript code, you first define a function
    named `loadWeb3`:


    ```

    async function loadWeb3() {

    //---if MetaMask is available on your web browser---

    if (window.ethereum) {

    web3 = new Web3(window.ethereum);

    //---connect to account---

    const account = await window.ethereum.request(

    {method: ''eth_requestAccounts''});

    console.log(account);

    } else {

    //---set the provider you want from Web3.providers---

    web3 = new Web3(

    new Web3.providers.HttpProvider(

    "http://localhost:8545"));

    }

    }

    ```


    If you load this page through HTTP on a browser with MetaMask installed, MetaMask
    automatically injects an API through `window.ethereum`. This `window.ethereum`
    allows you to interact with an Ethereum node. In this case, it connects to the
    MetaMask extension on your Chrome browser. You make use of `window.ethereum` to
    create an instance of the `Web3` object, which allows you to connect to user accounts
    in MetaMask, connect to smart contracts on the blockchain, and more.


    If MetaMask is not detected on the browser (due to the absence of `window.ethereum`),
    you can connect to your own node. In this example, you connect to a local node
    listening at port 8545 (`http://localhost:8545`). You can run your own local node,
    such as Ganache (see Figure [8-3](#471881_2_En_8_Chapter.xhtml#Fig3)).


    ![](images/471881_2_En_8_Chapter/471881_2_En_8_Fig3_HTML.jpg)


    A screenshot of the Ganache window. It displays the address, balance, T X count,
    and key under the accounts tab.


    Figure 8-3


    Ganache allows you to simulate an Ethereum blockchain locally on your computer


    Note


    Ganache is a simulated Ethereum blockchain that you can use to deploy contracts,
    develop your applications, and run tests. It is part of the Truffle Suite of tools
    for Ethereum development. You can download Ganache from [`https://trufflesuite.com/ganache/`](https://trufflesuite.com/ganache/).


    The next function you define is the `getCurrentAccount()` function:


    ```

    //---get the current account in MetaMask---

    async function getCurrentAccount() {

    const accounts = await web3.eth.getAccounts();

    console.log(accounts)

    return accounts[0];

    }

    ```


    In this function, you fetch all the accounts from the connected node (either MetaMask
    or a node like Ganache) and return the first account.


    Finally, you define the `load()` function so that you can call the `loadWeb3()`
    and `getCurrentAccount()` functions asynchronously:


    ```

    async function load() {

    await loadWeb3();

    alert(await getCurrentAccount());

    }

    //---call the load function to connect to the node and display

    // the first account---

    load();

    ```'
