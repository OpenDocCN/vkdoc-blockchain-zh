- fmt: '### Installing MetaMask


    The easiest way to install MetaMask is to use the Chrome browser and install MetaMask
    as a Chrome extension. To install the MetaMask extension:


    > **Note**: You can use the MetaMask extension on Chrome, Mozilla Firefox, Brave,
    and Microsoft Edge browsers.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig2_HTML.jpg)

    *A screenshot presents the logo of the MetaMask extensions under the home tab.
    An "Add to Chrome" button is at the right.*


    **Figure 5-2** — Searching for MetaMask in the Chrome Web Store


    * Launch Chrome and navigate to the Chrome Web Store at [`https://chrome.google.com/webstore/category/extensions`](https://chrome.google.com/webstore/category/extensions).

    * Search for `MetaMask`.

    * You should see the MetaMask extension in the search result. Click **Add to Chrome**
    (see Figure [5-2](#471881_2_En_5_Chapter.xhtml#Fig2)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig3_HTML.jpg)

    *A screenshot presents the logo of the MetaMask extensions with a question to
    add MetaMask. The "Cancel" and "Add Extension" buttons are at the bottom.*


    **Figure 5-3** — Adding the MetaMask extension to the Chrome browser


    * You will be prompted to add MetaMask to Chrome. Click **Add extension** (see
    Figure [5-3](#471881_2_En_5_Chapter.xhtml#Fig3)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig4_HTML.jpg)

    *A screenshot of the welcome page of MetaMask. It displays a fox clipart along
    with a "Get Started" button.*


    **Figure 5-4** — MetaMask extension added to the Chrome browser


    * Once MetaMask is added to Chrome, you will see the screen shown in Figure [5-4](#471881_2_En_5_Chapter.xhtml#Fig4).
    Click **Get Started**.


    ### Setting Up the Accounts


    If you are using MetaMask for the first time, click **Create a Wallet** (see Figure
    [5-5](#471881_2_En_5_Chapter.xhtml#Fig5)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig5_HTML.jpg)

    *A screenshot of the welcome page of MetaMask. It displays a message, "New to
    MetaMask" along with two options: to import and create a wallet.*


    **Figure 5-5** — Creating a new wallet


    Read through the terms and conditions and, if you are agreeable, click **I agree**.
    Next, create a password to secure your account. Click **Create** once you are
    done with this step (see Figure [5-6](#471881_2_En_5_Chapter.xhtml#Fig6)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig6_HTML.jpg)

    *A screenshot of the MetaMask page to create a password. It has two tabs to create
    and confirm passwords, along with the terms and a "Create" button.*


    **Figure 5-6** — Entering a password to secure your wallet


    You can watch a short video to understand how your account can be recovered if
    you ever forget your password. Once you are done, click **Next**.


    You will be shown your Secret Recovery Phrase. The Secret Recovery Phrase is a
    set of words that allows you to recover and restore all your accounts. This set
    of words is something that you need to keep under lock and key. I personally suggest
    you print it out and lock it in a secure place.


    To reveal your Secret Recovery Phrase, click the lock icon (see Figure [5-7](#471881_2_En_5_Chapter.xhtml#Fig7)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig7_HTML.jpg)

    *A screenshot of the MetaMask page. It displays the message and tips under the
    Secret Recovery Phrase. A box is blurred with a lock, along with "Remind me later"
    and "Next" buttons.*


    **Figure 5-7** — Revealing the 12-word secret phrase


    You can see your Secret Recovery Phrase. Ensure that no one except you knows these
    12 words.


    > **Tip**: The 12-word secret phrase allows you to recover your account if you
    forget your password. This 12-word secret phrase is known as the BIP39 (Bitcoin
    Improvement Proposals) *seed phrase*. MetaMask uses the BIP39 protocol to figure
    out how to use a 12-word secret phrase to get a *seed*. This seed is used to generate
    a root key for each cryptocurrency (in the case of Ethereum, it is Ether).

    >

    > The root key is then hashed to generate a *private key*, which is used to generate
    a *public key*, which in turn is used to generate the *public address* for an
    account. To generate a second account (and third account, and so on), the first
    private key is used to derive a set of child keys, which are then used to generate
    their respective public keys, and so on.

    >

    > Using this method, the seed works with a deterministic algorithm to generate
    an unlimited series of addresses for your wallet.

    >

    > The list of words used in the secret phrase can be found here: [`https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt`](https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt).
    It is based on a list of 2048 words, with 12 words selected in a particular order.


    You will be asked to confirm your Secret Recovery Phrase (see Figure [5-8](#471881_2_En_5_Chapter.xhtml#Fig8)).
    Click on the words at the bottom of the page in the order that they are presented
    to you. The order of the words selected is important. If the order is incorrect,
    drag the words around to rearrange them.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig8_HTML.jpg)

    *A screenshot of the MetaMask page. It displays an empty box, to select each phrase,
    under "Confirm Secret Recovery Phrase".*


    **Figure 5-8** — Confirming the Secret Recovery Phrase


    Click **Confirm** when you are done arranging the words. That’s it! Your account
    is now set up!


    ### Using the MetaMask Extension


    On the top-right corner of your Chrome browser, you should see the extension icon.
    Click it (see Figure [5-9](#471881_2_En_5_Chapter.xhtml#Fig9)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig9_HTML.jpg)

    *A screenshot presents the corner of an address bar. It has extensions, controls
    music and videos, show side panel, and user icons. The "Extensions" option is
    highlighted with a dark square outline.*


    **Figure 5-9** — Locating the extension icon on Chrome


    Click the pin icon displayed next to the MetaMask icon (see Figure [5-10](#471881_2_En_5_Chapter.xhtml#Fig10)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig10_HTML.jpg)

    *A screenshot presents the corner of an address bar. It displays the extensions
    list, where the pin option of the MetaMask extension is highlighted with a dark
    square outline.*


    **Figure 5-10** — Pinning MetaMask to Chrome


    The MetaMask icon (the icon with the fox) will be pinned on the browser. Click
    it and you will see the default Account 1 (see Figure [5-11](#471881_2_En_5_Chapter.xhtml#Fig11)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig11_HTML.jpg)

    *A screenshot of the MetaMask page overlays by an Ethereum Mainnet window. It
    displays the assets under Account 1.*


    **Figure 5-11** — Viewing the MetaMask wallet


    ### Selecting Ethereum Networks


    By default, MetaMask is connected to the Main Ethereum Network. This is the real
    network where real Ethers are used for transactions, running smart contracts,
    and so on. For development purposes, you do not want to connect to the real network.
    Rather, you should connect to one of the test networks available:


    * Goerli Test Network

    * Sepolia Test Network


    MetaMask allows you to connect to either of these test networks (see Figure [5-12](#471881_2_En_5_Chapter.xhtml#Fig12)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig12_HTML.jpg)

    *A screenshot of the Ethereum Mainnet page overlays the network list. The Ethereum
    Mainnet is selected. An "Add Network" button is at the bottom.*


    **Figure 5-12** — Selecting the Ethereum network to connect to


    > **Tip**: By default, the test networks are hidden in MetaMask. To view the test
    networks, click the icon displayed next to the Ethereum Mainnet dropdown list,
    select **Settings > Advanced**, and turn on the **Show test networks** option.


    In addition, MetaMask also allows you to connect to a local Ethereum node listening
    at port 8545. It also allows you to connect to a custom RPC host.


    For this chapter, you will use the Goerli Test Network, so select it in MetaMask.'
  raw: '### Installing MetaMask


    The easiest way to install MetaMask is to use the Chrome browser and install MetaMask
    as a Chrome extension. To install the MetaMask extension,


    Note


    You can use the MetaMask extension on Chrome, Mozilla Firefox, Brave, and Microsoft
    Edge browsers.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig2_HTML.jpg)


    A screenshot presents the logo of the MetaMask extensions under the home tab.
    An add to chrome button is at the right.


    Figure 5-2


    Searching for MetaMask in the Chrome Web Store


    *   Launch Chrome and navigate to the Chrome Web Store at [`https://chrome.google.com/webstore/category/extensions`](https://chrome.google.com/webstore/category/extensions).


    *   Search for MetaMask.


    *   You should see the MetaMask extension in the search result. Click **Add to
    Chrome** (see Figure [5-2](#471881_2_En_5_Chapter.xhtml#Fig2)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig3_HTML.jpg)


    A screenshot presents the logo of the MetaMask extensions with a question to add
    MetaMask. The cancel and add extension buttons are at the bottom.


    Figure 5-3


    Adding the MetaMask extension to the Chrome browser


    *   You will be prompted to add MetaMask to Chrome. Click **Add extension** (see
    Figure [5-3](#471881_2_En_5_Chapter.xhtml#Fig3)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig4_HTML.jpg)


    A screenshot of the welcome page of the MetaMask. It displays a fox clipart along
    with a get started button.


    Figure 5-4


    MetaMask extension added to the Chrome browser


    *   Once MetaMask is added to Chrome, you will see the screen shown in Figure
    [5-4](#471881_2_En_5_Chapter.xhtml#Fig4). Click **Get Started**.


    ### Setting Up the Accounts


    If you are using MetaMask for the first time, click **Create a Wallet** (see Figure
    [5-5](#471881_2_En_5_Chapter.xhtml#Fig5)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig5_HTML.jpg)


    A screenshot of the welcome page of the MetaMask. It displays a message, New to
    MetaMask along with two options, to import and create a wallet.


    Figure 5-5


    Creating a new wallet


    Read through the terms and conditions and if you are agreeable, click **I agree**.
    Next, create a password to secure your account. Click **Create** once you are
    done with this step (see Figure [5-6](#471881_2_En_5_Chapter.xhtml#Fig6)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig6_HTML.jpg)


    A screenshot of the MetaMask page to create a password. It has two tabs to create
    and confirm passwords, along with the terms and a create button.


    Figure 5-6


    Entering a password to secure your wallet


    You can watch a short video to understand how your account can be recovered if
    you ever forget your password. Once you are done, click **Next**.


    You will be shown your Secret Recovery Phrase. The Secret Recovery Phrase is a
    set of words that allows you to recover and restore all your accounts. This set
    of words is something that you need to keep under lock and key. I personally suggest
    you print it out and lock it in a secure place.


    To reveal your Secret Recovery Phrase, click the lock icon (see Figure [5-7](#471881_2_En_5_Chapter.xhtml#Fig7)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig7_HTML.jpg)


    A screenshot of the MetaMask page. It displays the message and tips under the
    secret recovery phrase. A box is blurred with a lock, along with remind me later
    and the next buttons.


    Figure 5-7


    Revealing the 12-word secret phrase


    You can see your Secret Recovery Phrase. Ensure that no one except you knows these
    12 words.


    Tip


    The 12-word secret phrase allows you to recover your account if you forget your
    password. This 12-word secret phrase is known as the BIP39 (Bitcoin Improvement
    Proposals) *seed phrase*. MetaMask uses the BIP39 protocol to figure out how to
    use a 12-word secret phrase to get a *seed*. This seed is used to generate a root
    key for each cryptocurrency (in the case of Ethereum, it is Ether).


    The root key is then hashed to generate a *private key*, which is used to generate
    a *public key*, which in turn is used to generate the *public address* for an
    account. To generate a second account (and third account, and so on), the first
    private key is used to derive a set of child keys, which are then used to generate
    their respective public keys, and so on.


    Using this method, the seed works with a deterministic algorithm to generate an
    unlimited series of addresses for your wallet.


    The list of words used in the secret phrase can be found here: [`https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt`](https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt).
    It is based on a list of 2048 words, with 12 words selected in a particular order.


    You will be asked to confirm your Secret Recovery Phrase (see Figure [5-8](#471881_2_En_5_Chapter.xhtml#Fig8)).
    Click on the words at the bottom of the page in the order that they are presented
    to you. The order of the words selected is important. If the order is incorrect,
    drag the words around to rearrange them.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig8_HTML.jpg)


    A screenshot of the MetaMask page. It displays an empty box, to select each phrase,
    under the confirm secret recovery phrase.


    Figure 5-8


    Confirming the Secret Recovery Phrase


    Click **Confirm** when you are done arranging the words. That’s it! Your account
    is now set up!


    ### Using the MetaMask Extension


    On the top-right corner of your Chrome browser, you should see the extension icon.
    Click it (see Figure [5-9](#471881_2_En_5_Chapter.xhtml#Fig9)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig9_HTML.jpg)


    A screenshot presents the corner of an address bar. It has extensions, controls
    music and videos, show side panel, and user icons. The extensions option highlight
    with a dark square outline.


    Figure 5-9


    Locating the extension icon on Chrome


    Click the pin icon displayed next to the MetaMask icon (see Figure [5-10](#471881_2_En_5_Chapter.xhtml#Fig10)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig10_HTML.jpg)


    A screenshot presents the corner of an address bar. It displays the extensions
    list, where the pin option of the MetaMask extension highlights with a dark square
    outline.


    Figure 5-10


    Pinning MetaMask to Chrome


    The MetaMask icon (the icon with the fox) will be pinned on the browser. Click
    it and you will see the default Account 1 (see Figure [5-11](#471881_2_En_5_Chapter.xhtml#Fig11)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig11_HTML.jpg)


    A screenshot of the MetaMask page overlays by an Ethereum Mainnet window. It displays
    the assets under account 1.


    Figure 5-11


    Viewing the MetaMask wallet


    ## Selecting Ethereum Networks


    By default, MetaMask is connected to the Main Ethereum Network. This is the real
    network where real Ethers are used for transactions, running smart contracts,
    and so on. For development purposes, you do not want to connect to the real network.
    Rather, you should connect to one of the test networks available:


    *   Goerli Test Network


    *   Sepolia Test Network


    MetaMask allows you to connect to either of these test networks (see Figure [5-12](#471881_2_En_5_Chapter.xhtml#Fig12)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig12_HTML.jpg)


    A screenshot of the Ethereum Mainnet page overlays the network list. The Ethereum
    Mainnet is selected. An add-network button is at the bottom.


    Figure 5-12


    Selecting the Ethereum network to connect to


    Tip


    By default, the test networks are hidden in MetaMask. To view the test networks,
    click the icon displayed next to the Ethereum Mainnet dropdown list, select Settings
    | Advanced, and turn on the **Show test networks** option.


    In addition, MetaMask also allows you to connect to a local Ethereum node listening
    at port 8545\. It also allows you to connect to a custom RPC host.


    For this chapter, you will use the Goerli Test Network, so select it in MetaMask.'
  trans: '

    ### 安装 MetaMask


    安装 MetaMask 最简单的方法是使用 Chrome 浏览器，并将其作为 Chrome 扩展程序进行安装。要安装 MetaMask 扩展程序：


    > **注意**：您可以在 Chrome、Mozilla Firefox、Brave 和 Microsoft Edge 浏览器上使用 MetaMask 扩展程序。


    ![](img/471881_2_En_5_Fig2_HTML.jpg)

    *截图展示了主页标签下的 MetaMask 扩展程序图标。右侧有一个"添加至 Chrome"按钮。*


    **图 5-2** — 在 Chrome 网上应用店中搜索 MetaMask


    *   启动 Chrome 浏览器，并导航至 Chrome 网上应用店： [`https://chrome.google.com/webstore/category/extensions`](https://chrome.google.com/webstore/category/extensions)。

    *   搜索 `MetaMask`。

    *   您应该在搜索结果中看到 MetaMask 扩展程序。点击 **添加至 Chrome**（参见图 5-2）。


    ![](img/471881_2_En_5_Fig3_HTML.jpg)

    *截图展示了 MetaMask 扩展程序的图标，并询问是否添加 MetaMask。底部有"取消"和"添加扩展程序"按钮。*


    **图 5-3** — 向 Chrome 浏览器添加 MetaMask 扩展程序


    *   系统将提示您将 MetaMask 添加到 Chrome。点击 **添加扩展程序**（参见图 5-3）。


    ![](img/471881_2_En_5_Fig4_HTML.jpg)

    *MetaMask 欢迎页面的截图。页面显示了一个狐狸剪影图和一个"开始使用"按钮。*


    **图 5-4** — MetaMask 扩展程序已添加到 Chrome 浏览器


    *   将 MetaMask 添加到 Chrome 后，您将看到如图 5-4 所示的屏幕。点击 **开始使用**。


    ### 设置账户


    如果您是首次使用 MetaMask，请点击 **创建钱包**（参见图 5-5）。


    ![](img/471881_2_En_5_Fig5_HTML.jpg)

    *MetaMask 欢迎页面的截图。页面显示了一条消息"新用户？MetaMask"，以及两个选项：导入钱包和创建钱包。*


    **图 5-5** — 创建一个新钱包


    请阅读条款和条件，如果同意，请点击 **我同意**。接着，创建一个密码以确保您的账户安全。完成此步骤后，点击 **创建**（参见图 5-6）。


    ![](img/471881_2_En_5_Fig6_HTML.jpg)

    *MetaMask 创建密码页面的截图。页面有两个输入框，用于创建和确认密码，以及条款和"创建"按钮。*


    **图 5-6** — 输入密码以保护您的钱包


    您可以观看一段简短视频，了解如果您忘记密码，如何恢复您的账户。完成后，点击 **下一步**。


    系统将向您展示您的秘密恢复短语。秘密恢复短语是一组单词，允许您恢复和还原您的所有账户。这组单词需要您妥善保管。我个人建议您将其打印出来，并锁在安全的地方。


    要显示您的秘密恢复短语，请点击锁图标（参见图 5-7）。


    ![](img/471881_2_En_5_Fig7_HTML.jpg)

    *MetaMask 页面的截图。页面在"秘密恢复短语"下方显示了一条消息和提示。一个带有锁的方块被模糊处理，并伴有"稍后提醒我"和"下一步"按钮。*


    **图 5-7** — 显示 12 个单词的秘密短语


    您可以看到您的秘密恢复短语。请确保除了您自己之外，没人知道这 12 个单词。


    > **提示**：这 12 个单词的秘密短语允许您在忘记密码时恢复您的账户。这个 12 个单词的秘密短语被称为 BIP39（比特币改进提案）*种子短语*。MetaMask
    使用 BIP39 协议来计算如何使用 12 个单词的秘密短语来获得一个*种子*。这个种子用于为每种加密货币生成一个根密钥（就以太坊而言，是 ETH）。

    >

    > 然后，根密钥会被哈希处理以生成一个*私钥*，该私钥用于生成一个*公钥*，公钥又用于生成账户的*公共地址*。要生成第二个账户（以及第三个账户，以此类推），第一个私钥会被用来派生一组子密钥，然后这些子密钥被用来生成它们各自的公钥，依此类推。

    >

    > 使用这种方法，种子通过一个确定性算法为您的钱包生成无限数量的地址。

    >

    > 秘密短语中使用的单词列表可以在这里找到：[`https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt`](https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt)。它基于一个包含
    2048 个单词的列表，并按特定顺序选择了其中的 12 个单词。


    系统将要求您确认您的秘密恢复短语（参见图 5-8）。按单词呈现的顺序点击页面底部的单词。所选单词的顺序很重要。如果顺序不正确，请拖拽单词重新排列。


    ![](img/471881_2_En_5_Fig8_HTML.jpg)

    *MetaMask 页面的截图。页面在"确认秘密恢复短语"下方显示了一个空白框，用于选择每个短语。*


    **图 5-8** — 确认秘密恢复短语


    完成单词排列后，点击 **确认**。这样就完成了！您的账户现已设置完毕！


    ### 使用 MetaMask 扩展程序


    在 Chrome 浏览器的右上角，您应该能看到扩展程序图标。点击它（参见图 5-9）。


    ![](img/471881_2_En_5_Fig9_HTML.jpg)

    *截图展示了地址栏的一角。其中有扩展程序、控制媒体播放、显示侧面板和用户图标。"扩展程序"选项被一个深色方框轮廓高亮显示。*


    **图 5-9** — 在 Chrome 浏览器中找到扩展程序图标


    点击 MetaMask 图标旁边的图钉图标（参见图 5-10）。


    ![](img/471881_2_En_5_Fig10_HTML.jpg)

    *截图展示了地址栏的一角。其中显示了扩展程序列表，MetaMask 扩展程序的图钉选项被一个深色方框轮廓高亮显示。*


    **图 5-10** — 将 MetaMask 固定在 Chrome 浏览器中


    MetaMask 图标（带有狐狸的图标）将被固定在浏览器上。点击它，您将看到默认的账户 1（参见图 5-11）。


    ![](img/471881_2_En_5_Fig11_HTML.jpg)

    *MetaMask 页面覆盖在以太坊主网窗口上的截图。它显示账户 1 下的资产。*


    **图 5-11** — 查看 MetaMask 钱包


    ### 选择以太坊网络


    默认情况下，MetaMask 连接到以太坊主网。这是一个真正的网络，使用真实的以太币进行交易、运行智能合约等。出于开发目的，您不希望连接到真实网络。相反，您应该连接到可用的测试网络之一：


    *   Goerli 测试网络

    *   Sepolia 测试网络


    MetaMask 允许您连接到这些测试网络中的任意一个（参见图 5-12）。


    ![](img/471881_2_En_5_Fig12_HTML.jpg)

    *以太坊主网页面覆盖在网络列表上的截图。以太坊主网已被选中。底部有一个"添加网络"按钮。*


    **图 5-12** — 选择要连接的以太坊网络


    > **提示**：默认情况下，MetaMask 会隐藏测试网络。要查看测试网络，请点击以太坊主网下拉列表旁边的图标，选择**设置 > 高级**，然后打开**显示测试网络**选项。


    此外，MetaMask 还允许您连接到正在监听 8545 端口的本地以太坊节点。它还允许您连接到自定义的 RPC 主机。


    在本章中，您将使用 Goerli 测试网络，因此在 MetaMask 中选择它。

