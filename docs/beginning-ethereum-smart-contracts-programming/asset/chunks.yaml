    print(''Signature is invalid!'')

    ```


    Note that you have to catch the exception raised by the `verify()` function. If
    there is no exception, the signature is deemed to be correct; otherwise, it is
    invalid.


    ## How Cryptography Is Used in Blockchain


    If you have been following up to this point, you should now have a good idea of
    how cryptography works. You might now be wondering how cryptography plays an important
    role in blockchain.


    The following sections discuss how the various cryptographic algorithms are used
    in blockchain. If you are new to blockchain, feel free to skip the following sections
    and read the next chapter. Come back to the next few sections after you have read
    the following chapters:


    *   Chapter [2](#471881_2_En_2_Chapter.xhtml): Hashing is used to “chain” the
    blocks in a blockchain.


    *   Chapters [4](#471881_2_En_4_Chapter.xhtml) and [5](#471881_2_En_5_Chapter.xhtml):
    Asymmetric cryptography is used to generate your accounts, and symmetric cryptography
    is used to secure the accounts you have created in your crypto-wallets.


    *   Chapter [4](#471881_2_En_4_Chapter.xhtml) onwards: Asymmetric cryptography
    is used to create digital signatures for all of your transactions on the blockchain.'
  trans: '

    ### 生成并保存公钥/私钥对


    让我们使用 `cryptography` 模块，采用一些常用参数来生成公钥/私钥对：


    ```

    from cryptography.hazmat.backends import default_backend

    from cryptography.hazmat.primitives.asymmetric import rsa

    # 生成私钥

    private_key = rsa.generate_private_key(

    public_exponent=65537,

    key_size=2048,

    backend=default_backend()

    )

    # 从私钥派生公钥

    public_key = private_key.public_key()

    ```


    在这段代码中，你使用 RSA 算法首先生成了一个私钥。利用私钥，你可以推导出对应的公钥。密钥生成后，将它们序列化（扁平化）保存到文件中会很有用：


    ```

    from cryptography.hazmat.primitives import serialization

    #---将私钥序列化为字节数据---

    pem = private_key.private_bytes(

    encoding = serialization.Encoding.PEM,

    format = serialization.PrivateFormat.PKCS8,

    encryption_algorithm = serialization.NoEncryption()

    )

    with open(''private_key.pem'', ''wb'') as f:

    f.write(pem)

    #---将公钥序列化为字节数据---

    pem = public_key.public_bytes(

    encoding = serialization.Encoding.PEM,

    format = serialization.PublicFormat.SubjectPublicKeyInfo

    )

    with open(''public_key.pem'', ''wb'') as f:

    f.write(pem)

    ```


    你还需要能够从文件中重新加载它们：


    ```

    with open(''private_key.pem'', ''rb'') as f:

    private_key = serialization.load_pem_private_key(

    f.read(),

    password = None,

    backend = default_backend()

    )

    with open(''public_key.pem'', ''rb'') as f:

    public_key = serialization.load_pem_public_key(

    f.read(),

    backend = default_backend()

    )

    ```


    ### 使用公钥加密


    现在你可以使用公钥进行加密了：


    ```

    from cryptography.hazmat.primitives import hashes

    from cryptography.hazmat.primitives.asymmetric import padding

    plaintext = bytes("This message is secret.",''utf-8'')

    # 使用公钥加密消息

    ciphertext = public_key.encrypt(

    plaintext,

    padding.OAEP(

    mgf = padding.MGF1(algorithm = hashes.SHA256()),

    algorithm = hashes.SHA256(),

    label = None

    )

    )

    ```


    注意


    加密后的密文是一个字节数组。


    ### 使用私钥解密


    创建密文后，你可以使用私钥对其进行解密：


    ```

    # 使用私钥解密

    plaintext = private_key.decrypt(

    ciphertext,

    padding.OAEP(

    mgf = padding.MGF1(algorithm = hashes.SHA256()),

    algorithm = hashes.SHA256(),

    label = None

    )

    )

    # 解码明文，因为它是字节数组

    print(plaintext.decode(''utf-8''))

    # This message is secret.

    ```


    注意


    解密后的明文是一个字节数组。


    ### 数字签名：使用私钥签名


    前面我提到，在数字签名中，你先使用私钥进行加密，然后使用公钥进行解密。这究竟是如何运作的，又有何用途？让我们来看看图 1-8 所示的事件流程。


    ![](img/471881_2_En_1_Fig8_HTML.jpg)


    数字签名生成的框图。文本通过哈希函数生成哈希值，该哈希值使用私钥加密，然后生成数字签名。签名的消息包括文本和数字签名。


    图 1-8


    使用私钥生成数字签名


    *   首先，使用哈希函数对要发送的文本进行哈希运算。

    *   然后使用私钥对哈希值进行加密，并将其转换为数字签名（这也包含了所使用的哈希算法信息）。

    *   原始文本和数字签名一起发送给接收方。这被称为签名的消息。


    图 1-9 显示了接收方收到签名的消息后发生的情况。


    ![](img/471881_2_En_1_Fig9_HTML.jpg)


    框图说明了如何使用公钥验证数字签名。左侧包括三个模块，如数字签名、公钥和哈希值，中央模块为解密。右侧，文本链接到哈希值。两者比较签名的消息。


    图 1-9


    使用公钥验证数字签名


    *   收到签名的消息后，接收方使用发送方的公钥从数字签名中解密出哈希值。

    *   接收方还对收到的文本进行哈希运算，并将其与上一步解密出的哈希值进行比较。

    *   如果两个哈希值匹配，则意味着文本未被篡改。


    注意


    数字签名是一种用于验证消息、软件或数字文档的真实性和完整性的数学技术。


    让我们使用私钥创建一个数字签名。


    从技术上讲，你不能在私钥上调用 `encrypt()` 函数：


    ```

    private_key.encrypt(...)    # 错误

    # AttributeError: ''_RSAPrivateKey'' object has no attribute ''encrypt''

    ```


    相反，你应该调用 `sign()` 函数：


    ```

    import base64

    plaintext = bytes("This message is public.",''utf-8'')

    # 使用私钥对消息进行签名

    signed = private_key.sign(

    plaintext,

    padding.PSS(

    mgf = padding.MGF1(algorithm=hashes.SHA256()),

    salt_length = padding.PSS.MAX_LENGTH

    ),

    hashes.SHA256()

    )

    # 使用 base64 编码打印数字签名

    signed_base64 = base64.b64encode(signed).decode(''utf-8'')

    print(signed_base64)

    ```


    这里你使用私钥对消息进行签名。`sign()` 函数返回字符串的数字签名。它返回一个字节数组形式的数字签名，在上面的代码片段中，你使用 base64 编码并将其转换为字符串。输出看起来像这样：


    ```

    

    ```


    当你传输消息（`plaintext`）时，你也需要同时发送数字签名。


    ### 使用公钥验证数字签名


    当接收方收到消息和数字签名时，他们可以通过在公钥上调用 `verify()` 函数来简单地验证消息是否未被篡改：


    ```

    from cryptography.exceptions import InvalidSignature

    # 从 base64 解码数字签名

    signed = base64.b64decode(signed_base64)

    try:

    public_key.verify(

    signed,

    plaintext,    # 来自上一节

    padding.PSS(

    mgf = padding.MGF1(hashes.SHA256()),

    salt_length = padding.PSS.MAX_LENGTH

    ),

    hashes.SHA256()

    )

    print(''签名有效！'')

    except InvalidSignature:

    print(''签名无效！'')

    ```


    请注意，你必须捕获 `verify()` 函数引发的异常。如果没有异常，则认为签名正确；否则，签名无效。


    ## 密码学在区块链中的应用


    如果你一直跟进到此处，现在应该对密码学的工作原理有了很好的了解。你可能现在想知道密码学在区块链中是如何扮演重要角色的。


    以下各节将讨论各种密码算法在区块链中的应用。如果你是区块链新手，可以随意跳过以下章节，直接阅读下一章。在阅读完以下章节后，再回过头来阅读接下来的几节：


    *   第 2 章：哈希算法用于在区块链中“链接”区块。

    *   第 4 章和第 5 章：非对称密码学用于生成账户，对称密码学用于保护你在加密钱包中创建的账户。

    *   第 4 章及之后：非对称密码学用于为你所有在区块链上的交易创建数字签名。

