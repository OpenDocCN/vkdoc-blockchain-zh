    the process to obtain the plaintext. While this algorithm may seem impressive
    (especially in the early days of cryptography), it no longer works as intended
    as soon as someone knows how the messages are encrypted. Nevertheless, this is
    a good illustration of the attempt by early inventors of cryptography to hide
    information. Today, the cryptographic algorithms we use are much more sophisticated
    and secure.


    In the following sections, I will explain the main types of cryptographic functions
    and how they are used.


    ### Types of Cryptography


    There are three main types of cryptography:


    *   Hash functions


    *   Symmetric cryptography


    *   Asymmetric cryptography


    In the following sections, I will go through each of the above types in more detail.


    ## Hash Functions


    *Hashing* is the process in which you convert a block of data of arbitrary size
    to a fixed-size value. The function that performs this process is known as a *hash
    function* . Figure [1-2](#471881_2_En_1_Chapter.xhtml#Fig2) shows the hashing
    process.


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig2_HTML.jpg)


    An illustration of 2 rectangles and a circle in the center. It describes the conversion
    of variable-length input to fixed-length output using a hash function.


    Figure 1-2


    A hash function converts a block of data of variable length to a fixed-length
    output


    Tip


    A commonly-used hash function is **SHA256.** SHA stands for Secure Hash Algorithms.


    For example, the **SHA256** hash function converts a block of text into a 256-bit
    hash output. The resultant hash is usually written in hexadecimal, and since each
    hexadecimal takes up 4 bits, a 256-bit hash will have 64 characters. To experience
    how hashing works, go to [`https://emn178.github.io/online-tools/sha256.html`](https://emn178.github.io/online-tools/sha256.html),
    type in a sentence, and observe the result (see Figure [1-3](#471881_2_En_1_Chapter.xhtml#Fig3)).


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig3_HTML.jpg)


    A screenshot titled online tools. It describes the conversion of variable-length
    input to fixed-length output using a S H A 256 online hash function.


    Figure 1-3


    Trying out the SHA256 hash function


    Hashing has the following important properties:


    *   **Preimage resistant**: Based on the hash created, you cannot obtain the original
    block of text.


    *   **Deterministic**: The same block of text will always produce the same hash
    output.


    *   **Collision resistant**: It is hard to find two different blocks of text that
    will produce the same hash.


    Another important feature of hashing is that a single change in the original text
    will cause a totally different hash to be generated. This is also known as the
    *avalanche effect*. For example, a change in a single character in the input shown
    in Figure [1-4](#471881_2_En_1_Chapter.xhtml#Fig4) will have a totally different
    output.


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig4_HTML.jpg)


    Two illustrations of 2 rectangles and a circle in the center. They describe the
    conversion of variable-length input with a single change to fixed-length output
    with a different output using a hash function.


    Figure 1-4


    A single change in the input will cause a totally different output hash


    ### Uses of Hashing


    Hashing fulfils some very important roles in computing. For one, websites use
    hashing to store your password, instead of storing it in plaintext. Storing your
    password as hashes prevents hackers from reversing the hashes and obtaining your
    original password (which may very likely be used on other websites as well).


    Hashing also plays a very crucial role in blockchain, where each block is “chained”
    to the previous block using the hash of the previous block. Any modifications
    to a block will invalidate the hash stored in the next block, and the rest of
    the blocks will hence be invalid.


    Tip


    Some commonly used hashing algorithms are MD5, SHA256, SHA512, and Keccak-256.


    ### Implementing Hashing in Python


    Note


    To install Python on your computer, the easiest way is to download the Anaconda
    package ([`www.anaconda.com/products/distribution`](http://www.anaconda.com/products/distribution)).
    If you do not want to install Python on your computer, you can use Google Colab
    ([`https://colab.research.google.com`](https://colab.research.google.com)).


    In Python, you can use the `hashlib` module to perform hashing. The following
    code snippet uses the `sha256()` function to perform hashing on a string:


    ```

    import hashlib

    result = hashlib.sha256(

    bytes("The quick brown fox jumps over the lazy dog",''utf-8''))

    ```


    Note that the string to be hashed must be passed to the `sha256()` function as
    a byte array. And so you use the `bytes()` function to convert the string into
    a byte array. Alternatively, in Python, you can prefix the string with a `b` to
    denote a *bytes string literal*:


    ```

    result = hashlib.sha256(

    b''The quick brown fox jumps over the lazy dog'')

    ```


    The `sha256()` function returns a `sha256` hash object. To get the resultant hash
    in hexadecimal, you can call the `hexdigest()` function of the `sha256` hash object:


    ```

    print(result.hexdigest())

    ```


    The hash for the above string is as follows:


    ```

    d7a8fbb307d7809469ca9abcb0082e4f8d5651e46d3cdb762d02d0bf37c9e592

    ```


    If you make a small change to the original string, the output is drastically different
    from the previous hash:


    ```

    result = hashlib.sha256(

    b''The quick brown fox jumps over the lazy dag'')

    print(result.hexdigest())

    # output:

    # 559cc2cb0e1998182b4b6343e38611b3757e8a6279d43e9914d74dfb7e7089e6

    ```'
