    到目前为止，您一直在同一台计算机内配对节点。如何从另一台计算机配对节点？


    **说明**

    我将把创建第三个节点留作读者的练习。


    假设您有另一个名为`node3`的节点在另一台计算机上运行。在该节点的Geth JavaScript控制台上，您可以使用以下命令将`node1`添加为对等节点：


    ```

