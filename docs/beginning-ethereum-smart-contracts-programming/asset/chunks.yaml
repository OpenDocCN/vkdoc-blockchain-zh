    // 记录玩家下注的数字和金额\nplayerDetailsMapping[msg.sender].amountWagered = msg.value;\n\
    playerDetailsMapping[msg.sender].numberWagered = number;\n```\n\n你还需要将玩家地址添加到地址数组中：\n\
    \n```\n// 将玩家地址添加到地址数组中\nplayerAddressesArray[numberOfPlayers] = payable(msg.sender);\n\
    ```\n\n你还需要递增下注人数并累加迄今为止的所有下注金额：\n\n```\nnumberOfPlayers++;\ntotalWager += msg.value;\n\
    ```\n\n最后，触发 `Status` 事件：\n\n```\n// 触发 Status 事件\nemit Status(numberOfPlayers,\
    \ MAX_NUMBER_OF_PLAYERS);\n```\n\n### 设置中奖号码并公布获胜者\n\n接下来要定义的函数是 `announceWinners()`。`announceWinners()`\
    \ 函数接收中奖号码，计算每位获胜者的奖金并将其转账给他们：\n\n```\nfunction announceWinners(uint winningNumber)\
    \ public {\n  require(msg.sender == owner,\n    \"Only the owner can announce\
    \ the winner\");\n  winningBetNumber = winningNumber;\n  // 用于存储获胜者\n  address\
