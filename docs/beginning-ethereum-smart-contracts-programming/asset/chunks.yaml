- fmt: "### Deploying the Contract to the Testnet\n\nWith the contract tested and\
    \ working correctly, it is time to deploy the contract onto the Goerli testnet\
    \ so that you can build a front end to interface with it.\n\nIn MetaMask, ensure\
    \ that you are connected to the Goerli testnet. Then, back in the Remix IDE, change\
    \ the environment to `Injected Provider – MetaMask` (see Figure [10-13](#471881_2_En_10_Chapter.xhtml#Fig13)).\n\
    \n![](images/471881_2_En_10_Chapter/471881_2_En_10_Fig13_HTML.jpg)\n\n**Figure\
    \ 10-13** – Change the environment to `Injected Provider – MetaMask`\n\nClick\
    \ the `Deploy` button to deploy the contract. For reference, the address of my\
    \ deployed contract is `0xA0a4a98562587211CAbdC910721e0020A52AcE11`.\n\n## Creating\
    \ the Web Front End\n\nLet’s now create the web front end for the lottery game.\
    \ Create a new text file and name it as `OnlineBetting.html`. Save it in the `web3projects`\
    \ folder (this folder was first created in Chapter [8](#471881_2_En_8_Chapter.xhtml)).\n\
    \nPopulate the `OnlineBetting.html` file as follows:\n\n```html\n<!DOCTYPE html>\n\
