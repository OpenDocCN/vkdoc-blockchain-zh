    ### 启动另一个节点


    现在你已经启动并停止了`node1`，我们来启动`node2`。在一个新的终端窗口中，输入以下命令：


    ```

    $ geth --datadir ~/MyTestNet/data/node2 --port 30304 --nodiscover --networkid
    2345 --authrpc.port 8547 console 2>console2.log

    ```


    在这个命令中，你指定了`--port`选项并将端口设置为`30304`。这是因为`Geth`默认使用端口`30303`，如果你在同一台计算机上运行多个节点，每个节点必须使用唯一的端口号。通过将其设置为`30304`，可以避免与使用默认端口的其他节点发生冲突。`--nodiscover`选项意味着节点不会自动发现彼此，它们需要手动添加。`--networkid`选项指定了网络
    ID，以便其他节点能够连接到具有相同网络 ID 的网络。同时请注意`--authrpc.port`选项。对于每个节点，必须将其设置为一个不同于默认端口`8551`的唯一编号。


    一旦`node2`启动，使用以下命令重启`node1`：


    ```

    $ geth --datadir ~/MyTestNet/data/node1 --networkid 2345 console 2>console1.log

    ```


    请注意，`node1`启动时使用了值为`2345`的`--networkid`选项。这是必需的，以便稍后它可以作为对等节点添加到`node2`中。图 4-5
    显示了此时两个节点的状态。


