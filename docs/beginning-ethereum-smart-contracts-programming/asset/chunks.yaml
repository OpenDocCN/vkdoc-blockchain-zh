    \nIn real life, a blockchain network consists of multiple nodes maintaining copies\
    \ of the same blockchain. So, there must be a way for the nodes to synchronize\
    \ so that every single node is referring to the same identical blockchain.\n\n\
    When you use Python to run the `blockchain.py` application, only one node is running.\
    \ The whole idea of blockchain is decentralization. There should be multiple nodes\
    \ maintaining the blockchain, not just a single one.\n\nFor your example, you\
    \ will modify it so that each node can be made aware of neighboring nodes on the\
    \ network (see Figure [3-4](#471881_2_En_3_Chapter.xhtml#Fig4)).\n\n![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig4_HTML.jpg)\n\
    \nA cycle diagram illustrates the blockchain that consists of many nodes. The\
    \ links are `http://localhost:5000`, `http://localhost:5001`, and `http://localhost:5002`.\n\
    \nFigure 3-4 A blockchain network should consist of multiple nodes.\n\nTo do that\
    \ in your example, add a number of methods to the `Blockchain` class. First, add\
    \ a `nodes` member to the constructor of the `Blockchain` class and initialize\
    \ it to an empty `set`:\n\n```python\ndef __init__(self):\n    self.nodes = set()\n\
    \    # stores all the blocks in the entire blockchain\n    self.chain = []\n \
    \   ...\n```\n\nThis `nodes` member stores the address of other nodes. Next, add\
    \ a method called `add_node()` to the `Blockchain` class:\n\n```python\ndef add_node(self,\
    \ address):\n    parsed_url = urlparse(address)\n    self.nodes.add(parsed_url.netloc)\n\
    \    print(parsed_url.netloc)\n```\n\nThis method allows a new node to be added\
    \ to the `nodes` member. For example, if `http://192.168.0.5:5000` is passed to\
    \ the method, the IP address and port number `192.168.0.5:5000` will be added\
    \ to the `nodes` member.\n\nThe next method to add to the `Blockchain` class is\
    \ `valid_chain()`:\n\n```python\n# determine if a given blockchain is valid\n\
    def valid_chain(self, chain):\n    last_block = chain[0]   # the genesis block\n\
    \    current_index = 1       # starts with the second block\n\n    while current_index\
    \ < len(chain):\n        block = chain[current_index]\n        if block['hash_of_previous_block']\
    \ != \\\n                self.hash_block(last_block):\n            return False\n\
    \n        # check for valid nonce\n        if not self.valid_proof(\n        \
    \        current_index,\n                block['hash_of_previous_block'],\n  \
    \              block['transactions'],\n                block['nonce']):\n    \
    \        return False\n\n        # move on to the next block on the chain\n  \
    \      last_block = block\n        current_index += 1\n\n    # the chain is valid\n\
    \    return True\n```\n\nThe `valid_chain()` method validates that a given blockchain\
    \ is valid by performing the following checks:\n\n- It goes through each block\
    \ in the blockchain and hashes each block and verifies that the hash of each block\
    \ is correctly recorded in the next block.\n- It verifies that the nonce in each\
    \ block is valid.\n\nFinally, add the `update_blockchain()` method to the `Blockchain`\
    \ class:\n\n```python\ndef update_blockchain(self):\n    # get the nodes around\
    \ us that has been registered\n    neighbours = self.nodes\n    new_chain = None\n\
