    the environment, with the highlighted Remix V M of London.


    Figure 6-6


    The Remix VM allows you to test your code directly


    - **Remix VM (London)**: Simulates running your smart contract locally without
    actually deploying it onto the blockchain.

    - **Injected Provider - Metamask**: Uses a plugin such as MetaMask in your web
    browser to inject a `web3` object (see Chapter [8](#471881_2_En_8_Chapter.xhtml)
    for more information) so that your smart contract can be associated with an account.

    - **Ganache Provider**: Connects directly to an Ethereum node so that your smart
    contract can be associated with an account. It requires you to run an Ethereum
    node such as `geth` (discussed in Chapter [4](#471881_2_En_4_Chapter.xhtml)).


    **Tip**: Notice that there is a Remix VM (London) and Remix VM (Berlin). They
    are flavors of the JavaScript VM built into the Remix IDE. Berlin was released
    earlier than London and hence Remix VM (London) is much more supported.


    Select Remix VM (London) so you can test the contract without deploying it to
    a blockchain.


    Next, click the **Deploy** button (see Figure [6-7](#471881_2_En_6_Chapter.xhtml#Fig7)).
    You should see your contract under the **Deployed Contracts** section.


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig7_HTML.jpg)


