    Introduction


    Welcome to *Beginning Ethereum Smart Contracts Programming, Second Edition*!


    This book is a quick guide to getting started with Ethereum smart contracts programming.
    It starts off with a discussion of blockchain and the motivations behind it. You
    will learn what a blockchain is, how blocks in a blockchain are chained together,
    and how blocks get added to a blockchain. You will also understand how mining
    works and discover the various types of nodes in a blockchain network. Since the
    publication of the first edition of this book, a lot of things have changed. In
    particular, Ethereum has been updated to use Proof of Stake (PoS) (instead of
    Proof of Work) as its consensus algorithm. This book has been updated to include
    a discussion of how PoS works.


    Once that is out of the way, you dive into the Ethereum blockchain. You will learn
    how to use an Ethereum client (Geth) to create a private Ethereum blockchain and
    perform simple transactions such as sending Ethers to another account.


    The next part of this book discusses smart contract programming, a unique feature
    of the Ethereum blockchain. You will jumpstart on smart contracts programming
    without needing to wade through tons of documentation. The learn-by-doing approach
    of this book makes you productive in the shortest amount of time. By the end of
    this book, you should be able to write smart contracts, test them, deploy them,
    and create web applications to interact with them. In this second edition, I have
    added more examples to make it easy for you to explore more complex smart contracts.


    The last part of this book touches on tokens and DeFi (decentralized finance),
    something that has taken the cryptocurrency market by storm. You will be able
    to create your own tokens, launch your own ICO, and write token contracts that
    allow buyers to buy tokens using Ethers. As a bonus, I show you how to write a
    DEX (decentralized exchange) smart contract to exchange two different tokens!


    This book is designed for those who want to get started quickly with Ethereum
    smart contracts programming. Basic programming knowledge and an understanding
    of Python or JavaScript are recommended.


    I hope you enjoy working on the sample projects as much as I enjoyed creating
    them!


    Acknowledgments


    Writing a book is immensely exciting, but along with it comes long hours of hard
    work and responsibility, straining to get things done accurately and correctly.
    To make a book possible, a lot of unsung heroes work tirelessly behind the scenes.


    For this, I would like to take this opportunity to thank a number of special people
    who made this book possible. First, I want to thank my acquisitions editor, Joan
    Murray, for giving me this opportunity. Thanks for suggesting that I update this
    book with the latest happenings in the crypto world!


    Next, a huge thanks to Jill Balzano, my associate editor, who was always very
    patient with me, even though I missed several of my deadlines for the revision
    of this book. Thanks, Jill, for your guidance. I could not finish the book without
    your encouragement and help!


    Equally important is my project coordinator, Shobana Srinivasan. Shobana has been
    very patient with me during the whole project while I struggle between work and
    writing. Thanks, Shobana, for the assistance rendered during the project!


    Last, but not least, I want to thank my parents and my wife, Sze Wa, for all the
    support they have given me. They have selflessly adjusted their schedules to accommodate
    my busy schedule when I was working on this book. I love you all!


    About the Author About the Technical Reviewer


    # 1. Understanding the Science Behind Blockchain: Cryptography


    The reason you are reading this book is because you want to understand what a
    blockchain is, how it works, and how you can write smart contracts on it to do
    cool things. And while I perfectly understand that you are excited to get started
    in this first chapter, we need to take a step back and look at one fundamental
    technology that makes blockchain possible: *cryptography*.


    In this chapter, I will explain what cryptography is, the different types of cryptographic
    algorithms, how they work, and how they play a vital role in the world of blockchain.
    I will also show you how to experiment with the various cryptographic algorithms
    using the Python programming language. Even if you are familiar with cryptography,
    I suggest scanning through this chapter so that you have a firm foundation for
    the subsequent chapters.'
