    # 9. Developing Web3 dapps using Python


    In the previous chapter, you learned about creating Web3 decentralized applications
    (dapps) using the web3.js library. When developing your dapp using a web browser,
    you can conveniently integrate your app with MetaMask, which holds the various
    accounts you have on the Ethereum blockchain. When you need to perform a transaction,
    your dapp will rely on MetaMask to sign the transactions. Behind the scenes, MetaMask
    connects to a node known as **Infura**.


    Infura is a full node that is connected to the Ethereum blockchain. It provides
    an easy way for apps to get connected to the Ethereum blockchain without needing
    developers to set up their own node, which can be very costly and requires a lot
    of effort. Figure [9-1](#471881_2_En_9_Chapter.xhtml#Fig1) shows the flow between
    the dapp, MetaMask, Infura, and the Ethereum blockchain.


    ![](images/471881_2_En_9_Chapter/471881_2_En_9_Fig1_HTML.jpg)


    A process flow of MetaMask. A Dapp data connects the MetaMask to access the accounts,
    in turn, signs the transactions and sends them to Infura, which further connects
    to the Ethereum blockchain.


    Figure 9-1


    How MetaMask connects to Infura in the backend


    But what if the dapp you are creating is not web-based? How do you pay for the
    transaction then? This is the topic I will address in this chapter.


    ## Interacting with Ethereum Using Python


    In this chapter, I will talk about how you can write a Web3 dapp using Python.
    For Python, you will use the web3.py library, which allows you to interact with
    the Ethereum blockchain using Python.


    Tip


    web3.py is inspired by web3.js, so you will find many functions similar to those
    you see in web3.js.


    When you develop a Python dapp, you do not have the luxury of connecting to MetaMask
    to access your accounts and use it to sign your transactions. Instead, you need
    to import your own accounts, sign your own transactions, and then connect it to
    a full node (such as Infura) yourself, as shown in Figure [9-2](#471881_2_En_9_Chapter.xhtml#Fig2).


    ![](images/471881_2_En_9_Chapter/471881_2_En_9_Fig2_HTML.jpg)


    A process flow has python Dapp data as the input data. It signs the transactions
    and sends them to Infura, which further connects to the Ethereum blockchain.


    Figure 9-2


    Connecting your Python-based dapp to Infura


    In the following sections, you will learn how to use the web.py library to connect
    to the Erherum blockchain through Infura.'
