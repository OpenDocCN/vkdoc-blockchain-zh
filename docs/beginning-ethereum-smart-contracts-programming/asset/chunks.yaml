- fmt: '### Creating the DEX Contract


    With the two tokens created, let’s create the DEX contract. Before you create
    the contract, you need to first understand how a user can use a DEX contract to
    swap tokens.


    Figure [13-10](#471881_2_En_13_Chapter.xhtml#Fig10) summarizes the flow of events
    when a user swaps `WML` tokens for `LWM` tokens.


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig10_HTML.jpg)


    A diagram presents the sender approves W M L tokens to be transferred and approves
    W M L tokens to the D E X contract, the D E x contract verifies that sender has
    approved W M L tokens to be sent to it and the D E X contract sends L W M tokens
    back to the sender.


    **Figure 13-10** How a DEX contract works


    1. The sender calls the `approve()` function of the token contract to authorize
    the transfer of WML tokens to the DEX contract.


    2. The sender sends the WML token to the DEX contract.


    3. The DEX contract needs to verify that the sender has authorized the transfer
    of WML tokens to it. If this is true, the WML tokens are transferred from the
    sender to the DEX contract.


    4. The DEX contract calculates the amount of LWM tokens to be transferred and
    sends it to the sender.


    **Tip** All transfers of tokens involve the token contract updating the amount
    of tokens held by users and the DEX contract.


    In the Remix IDE, create a new contract named `DEX.sol` and populate it with the
    following statements:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    import "https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol";

    contract DEX {

    ERC20 WML_token;

    ERC20 LWM_token;

    //=======================

    // constructor of the DEX

    //=======================

    constructor() payable{

    //---be sure to replace the following addresses with your own---

    WML_token = ERC20(address(

    0xfa8b8F0fd75ABf2aF088bf2D1115E6F97ED0cB3a));

    LWM_token = ERC20(address(

    0x234273bD4D1aa3D233135dD49A26675dA7eF6A9a));

    }

    //===================================

    // find the tokens balance in the DEX

    //===================================

    function getBalance() public view returns (uint256,uint256) {

    return (WML_token.balanceOf(address(this)),

    LWM_token.balanceOf(address(this)));

    }

    function compareStrings(string memory a, string memory b)

    private pure returns (bool) {

    return (keccak256(abi.encodePacked((a))) ==

    keccak256(abi.encodePacked((b))));

    }

    //================

    // exchange tokens

    //================

    function exchange(string calldata from_token,

    string calldata to_token,

    uint256 amount) public {

    // Remember that all transactions are based on the smallest units in the token

    //=========

    // CHECK #1

    //=========

    // ensure the amount to convert is > 0

    require(amount > 0, "You need to convert at least some tokens");

    // record the token contracts to convert from and to

    ERC20 from;  // the tokens to convert from

    ERC20 to;    // the tokens to convert to

    if (compareStrings(from_token, "WML")) {

    from = WML_token;

    } else {

    from = LWM_token;

    }

    if (compareStrings(to_token, "WML")) {

    to = WML_token;

    } else {

    to = LWM_token;

    }

    // obtain the allowance set by the sender to send to this DEX

    uint256 approvedAmt;

    approvedAmt = from.allowance(msg.sender, address(this));

    //=========

    // CHECK #2

    //=========

    // ensure the sender has enough tokens approved to convert

    require(approvedAmt >= amount,

    "Token allowance is less than what you want to convert");

    //=========

    // CHECK #3

    //=========

    // get the balance of tokens (that the sender wants to convert to) in the pool

    uint256 dexBalance = to.balanceOf(address(this));

    // need to check that DEX has enough "to" token to send to sender

    require(amount <= dexBalance,

    "Sorry, not enough tokens in the DEX");

    // transfer the tokens from sender to DEX

    from.transferFrom(msg.sender, address(this), amount);

    // transfer the exchanged tokens to the sender

    to.transfer(msg.sender, amount);

    }

    }

    ```


    Here are the details of the DEX contract:


    - You need to import the base definition of the ERC-20 token contract written
    by OpenZeppelin.

    - In the constructor, you create instances of the two tokens you are swapping
    (both instances of `ERC20` tokens). If you are trying this out, remember to replace
    the contract addresses for the WML and LWM tokens with your own.

    - You have a function named `getBalance()`. It returns the balances of the WML
    and LWM tokens held by the DEX contract.

    - In Solidity, you cannot compare strings using the `==` operator. To compare
    strings, you need to compare their hashes instead. The `compareStrings()` helper
    function compares two strings to check if they are identical.

    - The `exchange()` function allows two tokens to be swapped. For simplicity, assume
    that one unit of a WML token is equivalent to one unit of a LWM token.

    - There are a number of checks you need to perform before you can exchange the
    tokens. First, ensure that the amount to swap is more than 0. Second, ensure that
    the account performing the swap has approved the tokens (that they are converting
    from) to be sent to the DEX. The final check is to ensure that the DEX has sufficient
    tokens for swapping.

    - Once all the checks have passed, the DEX can transfer the tokens from the caller
    to the DEX, followed by transferring the token (that the caller wants to swap
    into) to the caller.


    You can now deploy the DEX contract (using Account 1 or Account 2 does not matter).


    **Note** For my example, the address of my deployed DEX contract is `0xF4d9A3b468FBc0b256Da59B5B40CB20e5eD137c6`.


    At this point, the Remix IDE should have two token contracts and one DEX contract
    deployed, as shown in Figure [13-11](#471881_2_En_13_Chapter.xhtml#Fig11).


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig11_HTML.jpg)


    A screenshot of the deployed contracts with 3 tokens of contracts in the blockchain.


    **Figure 13-11** The three contracts in the Remix IDE


    Expand the DEX contract and click the `getBalance` button (see Figure [13-12](#471881_2_En_13_Chapter.xhtml#Fig12)).
    You should see two 0s returned. This is because at this moment the DEX contract
    has 0 WML and 0 LWM tokens.


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig12_HTML.jpg)


    A screenshot of the deployed contracts has 3 tokens of contracts in the blockchain.
    The exchange and get Balance buttons are highlighted.


    **Figure 13-12** Examining the token balances in the DEX contract


    ### Funding the DEX


    For a DEX to function properly, it needs some tokens so that users can use them
    to swap tokens. So, let’s fund the DEX contract with some WML and LWM tokens.


    In MetaMask, use Account 1 and send the DEX contract 500 `WML` tokens (see Figure
    [13-13](#471881_2_En_13_Chapter.xhtml#Fig13)).


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig13_HTML.jpg)


    A screenshot of the account 1 page with the send tokens, asset, and amount. Cancel
    and highlighted next buttons are at the bottom.


    **Figure 13-13** Funding the DEX contract with 500 WML tokens


    Next, use Account 2 and send the DEX contract 500 `LWM` tokens (see Figure [13-14](#471881_2_En_13_Chapter.xhtml#Fig14)).


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig14_HTML.jpg)


    A screenshot of the page of account 2 with the send tokens, asset, and amount.
    Cancel and highlighted next buttons are at the bottom.


    **Figure 13-14** Funding the DEX contract with 500 LWM tokens


    Once the transactions are confirmed, the DEX contract has 500 WML tokens and 500
    LWM tokens. Table [13-1](#471881_2_En_13_Chapter.xhtml#Tab1) shows the current
    token balances for Account 1, Account 2, and the DEX contract.


    **Table 13-1** The Balances for the Two Accounts and the DEX Contract


    | Balance | Account 1 | Account 2 | DEX |

    | --- | --- | --- | --- |

    | WML Token | 500 | 0 | 500 |

    | LWM Token | 0 | 500 | 500 |'
