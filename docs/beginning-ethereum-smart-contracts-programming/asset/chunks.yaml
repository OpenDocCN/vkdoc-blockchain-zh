- fmt: '### Hashing


    As mentioned briefly, hashing is used to “chain” the blocks in a blockchain. Each
    block in a blockchain contains the hash of the previous block. Doing so allows
    you to ensure that data recorded on the blockchain are immutable and thus prevent
    tampering.


    Another good use case of hashing is when storing data on the blockchain. Since
    all data on public blockchains are open to scrutiny, you should not store private
    data on the public blockchain. If you need to store private data on a public blockchain
    for proofing purposes, you should instead store the hash of the data, since it
    is not reversible. Chapter [7](#471881_2_En_7_Chapter.xhtml) provides a good example
    of this.


    ### Symmetric and Asymmetric Cryptography


    Symmetric and asymmetric cryptography are used in generating and securing of accounts
    in blockchain.


    As shown in Figure [1-10](#471881_2_En_1_Chapter.xhtml#Fig10), when you create
    an account in Ethereum, a private key using asymmetric cryptography is first generated.


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig10_HTML.png)


    A flow diagram includes public and private keys, takes the last 20 bytes, prefixes
    it with 0 x account address, and encrypts the private key with a user-supplied
    password.


    Figure 1-10


    Understanding how an account is generated and secured


    Using this private key, a public key is generated using `ECDSA` (Elliptic Curve
    Digital Signature Algorithm). This public key is then used to generate the account
    address using the `Keccak256` hashing algorithm. The last 20 bytes of this output
    is used as the address of the account.


    At the same time, remember that when you create an account you must supply a password.
    This password is used to encrypt your private key using symmetric cryptography.


    ### Digital Signature


    In blockchain, a digital signature is used when creating transactions. In Chapter
    [4](#471881_2_En_4_Chapter.xhtml), you will learn how to create a simple transaction
    by sending some Ethers from one account to another.


    When you create a transaction, the transaction is signed using your account’s
    private key to derive the digital signature. The digital signature, together with
    the details of the transaction, are then broadcasted to the various miners/validators
    in the blockchain network (see Figure [1-11](#471881_2_En_1_Chapter.xhtml#Fig11)).


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig11_HTML.jpg)


    A block diagram illustrates how digital signatures create a transaction. It begins
    with the transaction, digital signature via signing the transaction using the
    private key, then ends with the broadcast of the transaction and signature.


    Figure 1-11


    A digital signature is created for a transaction to prove the identity of the
    creator


    The miners/validators, upon receiving your transaction, verify the authenticity
    of your transaction using the transaction’s digital signature. Once the transaction
    is verified to be authentic, the miners/validators proceed to verify the content
    of the transaction.


    ## Summary


    In this chapter, you learned about the main science behind blockchain: cryptography.
    You learned about hashing, symmetric cryptography, and asymmetric cryptography.
    If you are familiar with Python, I strongly suggest you try out the code samples
    so that you get first-hand experience with the various cryptographic algorithms.
    With that, you are now ready to dive into the world of blockchain. See you in
    Chapter [2](#471881_2_En_2_Chapter.xhtml)!


    # 2. Understanding Blockchain


    One of the hottest technologies of late is *blockchain*. But what exactly is a
    blockchain? And how does it actually work? In this chapter, you will explore the
    concept of blockchain, how the concept was conceived, and what problems it aims
    to solve. By the end of this chapter, the idea and motivation behind blockchain
    will be crystal clear.


    **Tip**


    For the clearly impatient, a blockchain is a digital transaction of records that
    is arranged in chunks of data called *blocks*. These blocks link with each other
    through a cryptographic validation known as a *hashing function*. Linked together,
    these blocks form an unbroken chain, a *blockchain*. A blockchain is programmed
    to record not only financial transactions but virtually everything of value. Another
    common name for blockchain is *distributed ledger*.


    Hold on tight, as I’m going to discuss a lot of concepts in this chapter. But
    if you follow along closely, you’ll understand the concepts of blockchain and
    be on your way to creating some really creative applications on the Ethereum blockchain
    in the upcoming chapters!


    **Tip**


    Ethereum is an open-source public blockchain that is similar to the Bitcoin network.
    Besides offering a cryptocurrency known as Ether (which is similar to Bitcoin),
    the main difference between it and Bitcoin is that it offers a programming platform
    on top of the blockchain called Smart Contract. This book focuses on the Ethereum
    blockchain and Smart Contract.


    ## Motivations Behind Blockchain


    Most people have heard of cryptocurrencies, or at least, Bitcoin.


    **Note**


    The technology behind cryptocurrencies is blockchain.


    To understand why we need cryptocurrencies, you have to first start by understanding
    a fundamental concept: *trust*. Today, any asset of value or transaction is recorded
    by a third party, such as a bank, government, or company. We trust banks to not
    steal our money, and they are regulated by the government. And even if the banks
    fail, they are backed by the government. We also trust our credit card companies.
    Sellers trust credit card companies to pay them the money, and buyers trust credit
    card companies to settle any disputes with the sellers.'
