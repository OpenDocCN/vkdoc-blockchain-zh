    \ {\n            $(\"#result\").html(tx.transactionHash);\n        });\n});\n\
    ```\n\n请注意，在 `storeEduCredentials()` 函数之后，你使用了 `send()` 函数。当你需要对智能合约执行交易时（例如，当智能合约改变状态变量时），会使用\
    \ `send()` 函数。交易执行后，你将交易哈希显示在网页上名为 `#result` 的标签中。\n\n类似地，为了核验凭证，你调用 `checkEduCredentials()`\
    \ 函数，传入要核验的凭证以及 1000 Wei 的价值：\n\n```javascript\n//---在区块链上核验凭证---\n$(\"#btnCheck\"\
    ).click(async function() {\n    notarizer.methods.checkEduCredentials($(\"#document2\"\
    ).val())\n        .send({from:account, value:1000});\n});\n```\n\n当事件将结果返回给你时，你将结果显示在标签中：\n\
    \n```javascript\n//---处理智能合约触发的 Result 事件---\nnotarizer.events.Result()\n    .on('data',\
    \ function(event){\n        if (event.returnValues[0] == account) {\n        \
    \    console.log(event.returnValues[0]);  // from\n            console.log(event.returnValues[1]);\
    \  // text\n            console.log(event.returnValues[2]);  // blocknumber\n\
    \            //---如果 blocknumber 为 0，表示\n            // 未找到凭证---\n           \
    \ if (event.returnValues[2] > 0) {\n                $(\"#result\").html(\"凭证有效\"\
    );\n            } else {\n                $(\"#result\").html(\"凭证无效\");\n   \
    \         }\n        }\n    });\n```\n\n回想一下，所有需要对智能合约进行付费调用的函数（无论是合约要求的，还是由于合约修改状态变量所要求的）都是交易性的，因此在调用这些智能合约函数时你需要使用\
    \ `send()` 函数。如果你调用非交易性的函数会怎样？在这种情况下，你可以使用 `call()` 函数。\n\n假设 `checkEduCredentials()`\
    \ 函数不需要付费，并直接返回结果：\n\n```javascript\n// 在 EduCredentialsStore.sol 中\n//-----------------------------------------------\n\
    // 检查文档之前是否已保存\n//-----------------------------------------------\nfunction checkEduCredentials(string\
    \ calldata\n    document) public view returns (uint){\n    // 使用字符串的哈希值并检查\n \
    \   // proofs 映射对象\n    return proofs[proofFor(document)];\n}\n```\n\n要使用 web3.js\
    \ API 调用此函数，请使用 `call()` 函数，如下所示：\n\n```javascript\nnotarizer.methods.checkEduCredentials($(\"\
    #document2\").val())\n    .call(function(error, result) {\n        if(!error)\
    \ {\n            console.log(\"结果是 \" + result);\n            if (result > 0)\
    \ {\n                $(\"#result\").html(\"凭证有效\");\n            } else {\n  \
    \              $(\"#result\").html(\"凭证无效\");\n            }\n        } else\n\
    \            console.error(error);\n    });\n```\n\n## 总结\n\n在本章中，你学习了如何使用 web3.js\
    \ API 与智能合约进行交互。你学习了如何使用 web3.js API 构建 Web 前端，以及如何与不同类型的智能合约函数进行交互。在下一章中，你将学习如何使用\
    \ Python 与智能合约进行交互。\n\n# 9. 使用 Python 开发 Web3 去中心化应用\n\n在上一章中，你学习了如何使用 web3.js\
    \ 库创建 Web3 去中心化应用（dapp）。当使用 Web 浏览器开发 dapp 时，你可以方便地将应用与 MetaMask 集成，后者持有你在以太坊区块链上的各种账户。当你需要执行交易时，你的\
    \ dapp 将依赖 MetaMask 来签署交易。在后台，MetaMask 连接到一个名为 **Infura** 的节点。\n\nInfura 是一个连接到以太坊区块链的全节点。它为应用提供了一种便捷的方式连接到以太坊区块链，而无需开发者自己搭建节点，后者成本高昂且需要大量精力。图\
    \ 9-1 展示了 dapp、MetaMask、Infura 和以太坊区块链之间的流程。\n\n![](img/471881_2_En_9_Fig1_HTML.jpg)\n\
    \n**图 9-1** – MetaMask 如何在后台连接到 Infura\n\n但如果你正在创建的 dapp 不是基于 Web 的呢？那时你如何支付交易费用？这正是本章将要讨论的主题。\n\
    \n## 使用 Python 与以太坊交互\n\n在本章中，我将讨论如何使用 Python 编写 Web3 dapp。对于 Python，你将使用 `web3.py`\
    \ 库，该库允许你使用 Python 与以太坊区块链交互。\n\n**提示**\n\n`web3.py` 的灵感来源于 `web3.js`，因此你会发现许多函数与你在\
    \ `web3.js` 中看到的类似。\n\n当你开发 Python dapp 时，你无法通过连接到 MetaMask 来访问你的账户并使用它来签署交易。相反，你需要导入自己的账户，签署自己的交易，然后自行将其连接到全节点（如\
    \ Infura），如图 9-2 所示。\n\n![](img/471881_2_En_9_Fig2_HTML.jpg)\n\n**图 9-2** – 将你的基于\
    \ Python 的 dapp 连接到 Infura\n\n在接下来的小节中，你将学习如何使用 `web.py` 库通过 Infura 连接到以太坊区块链。\n"
- fmt: '### Registering with Infura


    Now that you understand how your Python dapp is going to work, create a free account
    at [`https://infura.io`](https://infura.io) (see Figure 9-3).


    A screenshot of a sign-in window of the Infura page. It displays the email and
    password tabs with a sign-up button.


    **Figure 9-3** – Signing for a free account at Infura


    Once you have verified your email, you will be able to log into Infura. Create
    your first project (make sure you select **Ethereum** under PRODUCT) and give
    your project a name (see Figure 9-4).


    A screenshot of the Infura page to create the first project. It displays the product
    and project name tabs with a submit button.


    **Figure 9-4** – Give your project a name


    You will now be given your project ID, project secret, and endpoints for your
    application to connect to. For this article, select Görli as the endpoint (see
    Figure 9-5).


    A screenshot of the Infura page. It displays the Ethereum address details of the
    network endpoints under the endpoints tab. GORLI is outlined.


    **Figure 9-5** – Selecting Görli (Goerli) as the endpoint


    Copy the endpoint URL: [`https://ropsten.infura.io/v3/<Project_ID>`](https://ropsten.infura.io/v3/%253cProject_ID%253e).


    ### Connecting to Infura


    For the following sections, you will be using Jupyter Notebook. Go ahead and create
    a new Jupyter Notebook.


    **Tip:** If you are new to Jupyter Notebook, check out this introduction: [`https://jupyter.org/try-jupyter/retro/notebooks/?path=notebooks/Intro.ipynb`](https://jupyter.org/try-jupyter/retro/notebooks/%253Fpath%253Dnotebooks/Intro.ipynb).


    To install `web3.py`, type the following command in Jupyter Notebook:


    ```

    !pip install web3

    ```


    With the Infura endpoint URL obtained, see if you can connect it using the `web3.py`
    library:


    ```

    from web3 import Web3

    w3 = Web3(Web3.HTTPProvider(

    ''https:// goerli.infura.io/v3/''))

    w3.isConnected()

    ```


    **Caution:** Be sure to replace the `<Project_ID>` with your own.


    The `Web3` class returns an instance of a Web3 provider (a full node). The `Web3.HTTPProvider`
    class is a convenience API to access an RPC HTTP provider (which in this case
    is Infura).


    **Tip:** RPC stands for remote procedure call.


    If you see `True` as the output, it means you have connected to Infura successfully.


    ### Fetching a Block


    Using the Web3 object, let’s now check the latest block number in the Goerli testnet:


    ```

    w3.eth.get_block_number()

    # 7978182

    ```


    At the time of writing, the latest block number in the Goerli testnet is `7978182`.


    You can also fetch the last block from the Goerli test network:


    ```

    w3.eth.get_block(''latest'')

    ```


    You will see the something like the following (an array of transaction hashes):


    ```

