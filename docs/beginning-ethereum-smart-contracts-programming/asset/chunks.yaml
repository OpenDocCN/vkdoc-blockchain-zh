  trans: '

    # 彩票游戏工作原理


    本章将使用智能合约构建一个彩票游戏。在该合约中，玩家可以对某个数字下注。图 10-1 展示了游戏的工作原理。


    ![](img/471881_2_En_10_Fig1_HTML.jpg)


    在线彩票游戏工作原理示意图。5 个带编号和金额的剪影人物图标，其上方箭头指向智能合约。编号和金额如下：1. 1 号和 2；2. 2 号和 4；3. 3 号和
    2；4. 2 号和 1；5. 5 号和 1。


    图 10-1


    在线彩票游戏的工作原理


    共有五名玩家。每位玩家对一个数字下注。例如，玩家 1 用 2 个以太币下注数字 1，玩家 2 用 4 个以太币下注数字 2，以此类推。当玩家人数达到上限时停止下注。下注停止后，合约所有者将设定中奖号码，并处理向中奖者的派奖。


    假设中奖号码是 2。根据示例，玩家 2 和玩家 4 下注了该中奖号码。每位中奖者获得的金额与其下注金额成正比。计算方式如图 10-2 所示。


    ![](img/471881_2_En_10_Fig2_HTML.jpg)


    在线游戏中玩家中奖金额计算示意图。5 个带编号和金额的剪影人物图标，其上方箭头指向智能合约。顶部显示中奖号码为 2。总下注金额：10 个以太币。总中奖下注金额：5
    个以太币。玩家 2 获得：8 个以太币。玩家 4 获得：2 个以太币。


    图 10-2


    计算每位玩家的中奖金额


    你的合约将自动向中奖者转账。如果游戏中没有中奖者，所有以太币将由合约保留，并可转移给合约所有者。


    ## 定义智能合约


    在接下来的几个小节中，你将逐步创建合约，了解其构建过程。你将使用 Remix IDE 来构建此合约。


    首先定义一些数据结构，用于在智能合约中存储玩家的信息。


    首先，定义一个名为`Player`的结构体，用于记录玩家下注的以太币金额和所下注的数字：


    ```

    // 存储每位玩家的下注详情

    struct Player {

    uint amountWagered;   // 例如：2000 wei

    uint numberWagered;   // 例如：数字 5

    }

    ```


    然后，定义`playerDetailsMapping`变量，这是一个`mapping`对象：


    ```

    // 所有玩家的下注详情，存储在映射对象中

    mapping(address => Player) playerDetailsMapping;

    ```


    `playerDetailsMapping`是一个`mapping`对象，其键是所有玩家的账户地址。每个键对应的值是一个名为`Player`的结构体，包含两个成员：`amountWagered`（下注的
    Wei 数量）和`numberWagered`（玩家下注的数字）。图 10-3 展示了你将用于存储游戏详情的数据结构。


    ![](img/471881_2_En_10_Fig3_HTML.jpg)


    在线彩票游戏中，玩家详情映射在变量存储中的框图。每位玩家的下注金额为 1000、2000，下注数字为 5、6。


    图 10-3


    `playerDetailsMapping`变量存储每位玩家的下注详情


    在其他编程语言中，典型的字典对象可以轻松遍历字典成员并获取所有键。然而，在 Solidity 的`mapping`对象中，无法获取键或遍历所有成员。因此，如果你想实现这些操作，必须自行设计解决方案。最简单的方法是使用数组来记录所有账户地址（见图
    10-4）：


    ![](img/471881_2_En_10_Fig4_HTML.jpg)


    玩家地址数组的框图。包含 2 行玩家数据。地址由数字和字母组合而成。


    图 10-4


    `playerAddressesArray`变量存储所有玩家的地址


    ```

    // 所有玩家地址的数组

    address payable [MAX_NUMBER_OF_PLAYERS] playerAddressesArray;

    ```


    Solidity 中的数组行为更接近 C 和 Java 等传统编程语言中的数组：你可以遍历数组、获取其长度等。通过这个数组，你可以访问映射对象中的每个成员，并用于确定游戏获胜者。


    定义好数据结构后，定义一个名为`Betting`的合约：


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ⁰.8;

    import "@openzeppelin/contracts/utils/Strings.sol";

    contract Betting {

    }

    ```


    > **注意：** 我从 OpenZeppelin 导入了`Strings.sol`，以简化 Solidity 中的字符串处理。


    在合约中声明一些变量、常量和事件：


    ```

    contract Betting {

    // 记录合约所有者

    address owner = msg.sender;

    // 最低下注金额（wei）

    uint constant MIN_WAGER = 1000;

    // 每轮允许的最大玩家人数

    uint constant MAX_NUMBER_OF_PLAYERS = 3;

    // 可下注的数字范围，从 1 到 MAX_NUMBER_TO_BET

    uint constant MAX_NUMBER_TO_BET = 10;

    // 玩家下注的总金额

    uint totalWager = 0;

    // 已下注的玩家数量

    uint numberOfPlayers = 0;

    // 中奖号码

    uint winningBetNumber = 0;

    // 所有玩家地址的数组

    address payable [MAX_NUMBER_OF_PLAYERS] playerAddressesArray;

    // 存储每位玩家的下注详情

    struct Player {

    uint amountWagered;

    uint numberWagered;

    }

    // 所有玩家的下注详情，存储在映射对象中

    mapping(address => Player) playerDetailsMapping;

    //---定义事件---

    event Winner(

    address winner,

    uint amount

    );

    // 用于显示游戏状态的事件

    event Status (

    uint players,

    uint maxPlayers

    );

    }

    ```


    以下是一些需要注意的重要点：


    *   `owner`用于存储部署合约的账户地址。

    *   `MAX_NUMBER_OF_PLAYERS`用于定义在抽取中奖号码之前，游戏中允许的最大玩家人数。为便于测试，设置为 3。实际应用中，可以设置为更大的数字。

    *   `MAX_NUMBER_TO_BET`定义了彩票游戏的最大中奖号码。可下注的数字范围是从 1 到`MAX_NUMBER_TO_BET`。

    *   `playerAddressesArray`是一个固定大小的数组，存储每位玩家的账户地址。你使用`payable`关键字前缀声明，表示每位玩家可以发送/接收以太币。

    *   `Player`是一个结构体，包含两个成员：`amountWagered`和`numberWagered`。

    *   `playerDetailsMapping`是一个映射对象，存储每位玩家的下注详情。

    *   `Winner`和`Status`是用于通知客户端应用程序的事件。

    '
- fmt: "### Betting a Number\n\nNext, let’s define the `bet()` function within the\
    \ contract. The `bet()` function allows a player to bet on a number:\n\n```\n\
    function bet(uint number) public payable {\n  // CHECK #1\n  // ensure the max\
    \ number of players has not been reached\n  require(numberOfPlayers =1 && number\
    \ = MIN_WAGER,\n    string.concat(\"Minimum bet is \",\n    Strings.toString(MIN_WAGER),\
    \ \" wei\"));\n  // record the number and amount wagered by the player\n  playerDetailsMapping[msg.sender].amountWagered\
    \ = msg.value;\n  playerDetailsMapping[msg.sender].numberWagered = number;\n \
    \ // add the player address to the array of addresses\n  playerAddressesArray[numberOfPlayers]\
    \ = payable(msg.sender);\n  numberOfPlayers++;\n  totalWager += msg.value;\n \
    \ //  emit the Status event\n  emit Status(numberOfPlayers, MAX_NUMBER_OF_PLAYERS);\n\
    }\n```\n\n**Note**\n\nObserve that the `bet()` function has the `payable` keyword.\
    \ This means that when a player bets on a number, they must also send in Ethers.\n\
    \nIn this function, you need to perform a few checks. First, you need to check\
    \ if the maximum number of players has been exceeded:\n\n```\n// CHECK #1\n//\
    \ ensure the max number of players has not been reached\nrequire(numberOfPlayers\
    \ < MAX_NUMBER_OF_PLAYERS,\n  \"Maximum number of players reached\");\n```\n\n\
    Next, ensure that each player can only bet once by retrieving the `Player` structure\
    \ in the `playerDetailsMapping` object and checking its `numberWagered` value.\
    \ If it is zero, it means that the player has not bet previously:\n\n```\n// CHECK\
    \ #2\n// check to ensure caller has never betted\nrequire(playerDetailsMapping[msg.sender].numberWagered\
    \ == 0,\n  \"You have already betted\");\n```\n\n**Note**\n\nIf the account address\
    \ of the player cannot be found in the `playerDetailsMapping` object, the values\
    \ of the two members in the `Player` structure will be set to their default values,\
    \ which is 0 for `uint`.\n\nNext, you need to check that the number wagered falls\
    \ within the range allowed:\n\n```\n// CHECK #3\n// check the range of numbers\
    \ allowed for betting\nrequire(number >=1 && number <= MAX_NUMBER_TO_BET,\n  string.concat(\"\
    You need to bet between 1 and \",\n  Strings.toString(MAX_NUMBER_TO_BET)));\n\
    ```\n\nYou also need to check that the amount wagered is at least the minimum\
    \ amount:\n\n```\n// CHECK #4\n// ensure min. bet (note that msg.value is in wei)\n\
    require( msg.value >= MIN_WAGER,\n  string.concat(\"Minimum bet is \",\n  Strings.toString(MIN_WAGER),\
    \ \" wei\"));\n```\n\nOnce all these checks are cleared, you need to record the\
    \ number and amount wagered by the player (`msg.sender` is the address of the\
    \ player):\n\n```\n// record the number and amount wagered by the player\nplayerDetailsMapping[msg.sender].amountWagered\
    \ = msg.value;\nplayerDetailsMapping[msg.sender].numberWagered = number;\n```\n\
    \nYou also add the player address to the array of addresses:\n\n```\n// add the\
    \ player address to the array of addresses\nplayerAddressesArray[numberOfPlayers]\
    \ = payable(msg.sender);\n```\n\nYou also increment the number of wagers as well\
    \ as sum up all the amount wagered so far:\n\n```\nnumberOfPlayers++;\ntotalWager\
    \ += msg.value;\n```\n\nFinally, emit the `Status` event:\n\n```\n//  emit the\
    \ Status event\nemit Status(numberOfPlayers, MAX_NUMBER_OF_PLAYERS);\n```\n\n\
    ### Setting the Winning Number and Announcing the Winners\n\nThe next function\
    \ to define is `announceWinners()`. The `announceWinners()` function takes in\
    \ the winning number and calculates the winning for each player and transfers\
    \ the winnings to them:\n\n```\nfunction announceWinners(uint winningNumber) public\
    \ {\n  require(msg.sender == owner,\n    \"Only the owner can announce the winner\"\
    );\n  winningBetNumber = winningNumber;\n  // use to store winners\n  address\
    \ payable[MAX_NUMBER_OF_PLAYERS] memory winners;\n  uint winnerCount = 0;\n  uint\
    \ totalWinningWager = 0;\n  // find out the winners\n  for (uint i=0; i < playerAddressesArray.length;\
    \ i++) {\n    // get the address of each player\n    address payable playerAddress\
    \ = playerAddressesArray[i];\n    // if the player betted number is the winning\
    \ number\n    if (playerDetailsMapping[playerAddress].numberWagered ==\n     \
    \ winningNumber) {\n      // save the player address into the winners\n      //\
