    \ is the account that sends the ether to the\n// token contract\n// amount is\
    \ the tokens bought by the sender\nuint256 amount = msg.value * unitsOneEthCanBuy;\n\
    // ensure you have enough tokens to sell\nrequire(balanceOf(tokenOwner) >= amount,\
    \ \"Not enough tokens\");\n// transfer the token to the buyer\n_transfer(tokenOwner,\
    \ msg.sender, amount);\n// emit an event to inform of the transfer\nemit Transfer(tokenOwner,\
    \ msg.sender, amount);\n// send the ether earned to the token owner\npayable(tokenOwner).transfer(msg.value);\n\
    }\n}\n```\n\nLet’s dissect the modified contract above.\n\n*   You first define\
    \ the price of your token using the `unitsOneEthCanBuy` variable (I will discuss\
    \ this in more detail in the next section).\n\n*   You need to save the address\
    \ of the owner of this token contract, so you declare a variable called `tokenOwner`,\
    \ which you will initialize in the constructor of the token contract.\n\n*   You\
    \ add a new function named `received()` with the keyword `payable`. The `receive()`\
    \ function is called when Ethers are sent to the contract. Internally within this\
    \ function, two variables are automatically created for you:\n    *   `msg.value`:\
    \ This is the amount of Wei that is sent to the contract.\n\n    *   `msg.sender`:\
    \ This is the address of the sender that is invoking the contract."
  trans: "\n修改`checkEduCredentials()`函数，使其不再接受 Ether 支付，而只接受代币支付。为此，首先检查合约调用者已授权给本合约使用的代币数量。然后，确认授权使用的代币数量至少为\
    \ 1000 base units（这是调用此服务的费用）。如果授权数量足够，则将代币转入本合约。\n\n重新部署`EduCredentialsStore`合约，并记下其地址（见图\
    \ 11-14）。在示例中，部署的合约地址为`0x913286326233118493F2D5eA62dCA2E90133452B`。\n\n![已部署的合约截图，包括代币合约和凭证存储合约及其多个函数，并高亮显示了复制标签。](img/471881_2_En_11_Fig14_HTML.jpg)\n\
    \n**图 11-14** 重新部署修改后的智能合约以接受代币支付\n\n在调用`checkEduCredentials()`函数（现在要求支付 1000\
    \ base units 的代币而非 1000 Wei）之前，代币所有者（即你）需要授权向智能合约支付 1000 base units 的代币。为此，需要使用以下值调用代币合约的`approve()`函数（另见图\
    \ 11-15）：\n\n```\n0x913286326233118493F2D5eA62dCA2E90133452B,1000\n```\n\n此值表示你希望授权支出\
    \ 1000 base units 的代币给指定的智能合约地址（`0x913286326233118493F2D5eA62dCA2E90133452B`）。\n\
    \n![已部署的合约截图，包括代币合约及其 approve、decrease 和 increase 函数。](img/471881_2_En_11_Fig15_HTML.jpg)\n\
    \n**图 11-15** 授权在智能合约上使用代币\n\n点击**approve**按钮，MetaMask 将显示如图 11-16 所示的提示。点击**Confirm**以批准你的代币在智能合约上使用。\n\
    \n![MetaMask 通知页面截图，包括智能合约支付权限、地址和交易费用。确认按钮已高亮。](img/471881_2_En_11_Fig16_HTML.jpg)\n\
    \n**图 11-16** 授予在智能合约上支出代币的权限\n\n现在可以调用`checkEduCredentials()`函数（见图 11-17）。\n\n\
    ![已部署的合约截图，包括代币合约凭证存储及其 cash-out、checkEduCredentials、storeEduCredentials 和 getBalance\
    \ 函数。](img/471881_2_En_11_Fig17_HTML.jpg)\n\n**图 11-17** 调用`checkEduCredentials()`函数\n\
    \n交易确认后，1000 base units 的代币将被转入智能合约。如果在 Etherscan 上查看交易，你会观察到 ERC-20 代币的转账记录（见图\
    \ 11-18）。\n\n![Goerli 交易哈希窗口截图，列出概览下的多个选项及函数，并高亮显示了 ERC-20 代币转账。](img/471881_2_En_11_Fig18_HTML.jpg)\n\
    \n**图 11-18** Etherscan 记录了代币从账户到智能合约的转账\n\n要验证合约确实收到了代币，请点击**getBalance**按钮（见图\
    \ 11-19）。你应该会看到值为`1000`。\n\n![已部署的合约截图，包括 checkEduCredentials、storeEduCredentials\
    \ 和 getBalance 函数，getBalance 按钮已高亮。](img/471881_2_En_11_Fig19_HTML.jpg)\n\n**图\
    \ 11-19** 查询智能合约中的代币余额\n\n在 MetaMask 中，你还会看到持有代币的账户余额减少了（见图 11-20）。这是因为 1000 base\
    \ units 的代币已作为支付费用转入了智能合约。\n\n![MetaMask 通知页面截图，包括资产列表，高亮显示了 999.99999 WML 代币，以及购买、发送和交换按钮。](img/471881_2_En_11_Fig20_HTML.jpg)\n\
    \n**图 11-20** 账户的代币余额也相应减少\n\n## 以编程方式出售代币\n\n在之前的代币合约中，你了解了代币如何在部署合约时被铸造，以及如何从一个账户转移到另一个账户。一旦账户持有代币，它就可以将代币转移给任意账户。\n\
    \n但是，如何通过代币赚钱呢？在现实世界中，你可能希望出售代币以换取 Ether。事实上，你可以通过直接在代币合约中编写代码来实现这一点。\n\n以下是改进后的代币合约版本，允许使用\
    \ Ether 购买代币：\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\n\
    import \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
    ;\ncontract MyToken is ERC20 {\n// price expressed as how much an ether can buy\n\
    uint256 public unitsOneEthCanBuy  = 10;\n// the owner of the token\naddress public\
    \ tokenOwner;\nconstructor(string memory name, string memory symbol)\nERC20(name,\
    \ symbol) {\n// address of the token owner\ntokenOwner = msg.sender;\n// ERC20\
    \ tokens have 18 decimals\n// number of tokens minted = n * 10¹⁸\nuint256 n =\
    \ 1000;\n_mint(msg.sender, n * 10**uint(decimals()));\n}\n// this function is\
    \ called when someone sends ether to the token contract\nreceive() external payable\
    \ {\n// msg.value (in Wei) is the ether sent to the token contract\n// msg.sender\
    \ is the account that sends the ether to the\n// token contract\n// amount is\
    \ the tokens bought by the sender\nuint256 amount = msg.value * unitsOneEthCanBuy;\n\
    // ensure you have enough tokens to sell\nrequire(balanceOf(tokenOwner) >= amount,\
    \ \"Not enough tokens\");\n// transfer the token to the buyer\n_transfer(tokenOwner,\
    \ msg.sender, amount);\n// emit an event to inform of the transfer\nemit Transfer(tokenOwner,\
    \ msg.sender, amount);\n// send the ether earned to the token owner\npayable(tokenOwner).transfer(msg.value);\n\
    }\n}\n```\n\n让我们剖析一下上面修改后的合约。\n\n*   首先，使用`unitsOneEthCanBuy`变量定义代币的价格（下一节将更详细地讨论）。\n\
    *   需要保存此代币合约所有者的地址，因此声明一个名为`tokenOwner`的变量，并在代币合约的构造函数中初始化它。\n*   添加一个名为`receive()`的新函数，并带有`payable`关键字。当\
    \ Ether 被发送到合约时，会自动调用`receive()`函数。在此函数内部，会为你自动创建两个变量：\n    *   `msg.value`：这是发送到合约的\
    \ Wei 数量。\n    *   `msg.sender`：这是调用合约的发送者地址。\n"
- fmt: '### Calculating the Amount of Tokens Bought


    In order to sell a token, you need to price it. As you saw earlier, you define
    the `unitsOneEthCanBuy` variable to indirectly indicate the price of a token,
    expressed as the number of tokens you can buy with an Ether. Figure [11-21](#471881_2_En_11_Chapter.xhtml#Fig21)
    explains how you can derive the final formula where 1 Wei can buy 10 tokens (the
    base token units based on 18 decimal places of precision).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig21_HTML.jpg)


    A flow diagram illustrates 1 Wei can buy 10 tokens is based on the number of tokens
    1 ether can buy.


    Figure 11-21: Expressing the price of a token in Ether


    Based on this formula, you can now very easily calculate how many tokens a user
    can buy when they send Ethers to your token contract. Figure [11-22](#471881_2_En_11_Chapter.xhtml#Fig22)
    shows how many tokens a user will get when they send your token contract 2 Ethers.


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig22_HTML.jpg)


    A flow diagram presents the user can buy 2 times, 10 to the power of 18 times,
    10 tokens using the message value in Wei of 2 ethers.


    Figure 11-22: Calculating how many tokens a buyer can buy


    From this explanation, you now know that the amount of tokens a user can purchase
    is


    ```

    // amount is the tokens bought by the sender

    uint256 amount = msg.value * unitsOneEthCanBuy;

    ```


    In order to sell the tokens to the user, you need to ensure that your contract
    has enough tokens, so you use the `require()` function to check. The first argument
    in the `require()` function is the condition that is evaluated. If the condition
    evaluates to `false`, it will raise an exception with the second argument as the
    reason:


    ```

    // ensure you have enough tokens to sell

    require(balanceOf(tokenOwner) >= amount, "Not enough tokens");

    ```


    If the token contract has sufficient tokens, you use the `_transfer()` function
    to transfer the tokens to the user:


    ```

    // transfer the token to the buyer

    _transfer(tokenOwner, msg.sender, amount);

    ```


    When the transfer has been performed, emit the `Transfer()` event:


    ```

    // emit an event to inform of the transfer

    emit Transfer(tokenOwner, msg.sender, amount);

    ```


    Finally, with the Ethers received, you need to transfer them to the token owner:


    ```

    // send the ether earned to the token owner

    payable(tokenOwner).transfer(msg.value);

    ```


    > **Caution**: This part is important! If you don’t do this, the Ethers will be
    stuck with the token contract forever and there will be no way to get them back!
    They will be lost forever! Kiss your Ethers goodbye!


    ### Deploying the Contract


    Let’s deploy the token contract one more time, using the same arguments for the
    constructor:


    `"Wei-Meng Lee Token"`, `"WML"`


    > **Note**: For my token, the deployed contract is `0xbf9e3851D5080457a03FCA00F2f9b92C1dDf7190`.


    As usual, add the newly created tokens to MetaMask (see Figure [11-23](#471881_2_En_11_Chapter.xhtml#Fig23)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig23_HTML.jpg)


    A screenshot of the meta mask notification page. It includes 0.0362 Goerli E T
    H and assets with the highlighted 1000 W M L token, along with the buy, send,
    and swap buttons.


    Figure 11-23: Adding the newly added tokens to MetaMask


    > **Tip**: You can hide previously added tokens in MetaMask by selecting the token,
    clicking the three vertical dots, and clicking **Hide WML** (see Figure [11-24](#471881_2_En_11_Chapter.xhtml#Fig24)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig24_HTML.jpg)


    A screenshot of the meta mask notification page of account 1 lists the account
    details, and options to view assets on Ether scan, hide W M L, and token details.


    Figure 11-24: Hiding previously added tokens


    Switch to another account and send the token contract (using the address you got
    in the previous step) and send it 0.001 Ether (see Figure [11-25](#471881_2_En_11_Chapter.xhtml#Fig25)).
    You will see a warning about sending Ethers to a token contract. Click **I understand**
    and then click **Next** and in the next screen click **Confirm** to pay the transaction
    fees.


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig25_HTML.jpg)


    A screenshot of the meta mask notification page. It includes the asset and amount
    of the token contract, along with the cancel button.


    Figure 11-25: Sending Ethers to the token contract


    While waiting for the transaction to confirm, add the newly created token to the
    current account in MetaMask. When the transaction is confirmed, you will see 0.01
    WML tokens in MetaMask (see Figure [11-26](#471881_2_En_11_Chapter.xhtml#Fig26)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig26_HTML.jpg)


    A screenshot of the meta mask notification page. It includes 0.0019 Goerli E T
    H and assets with the highlighted 0.01 W M L token, along with the buy, send,
    and swap buttons.


    Figure 11-26: The token created in the buyer’s account


    Click the transaction in MetaMask and view the transaction details on the Etherscan
    blockchain explorer (see Figure [11-27](#471881_2_En_11_Chapter.xhtml#Fig27)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig27_HTML.jpg)


    A screenshot of the meta mask notification page of account 2. It includes 0.0008
    Goerli E T H and activity with the highlighted contract interaction details.


    Figure 11-27: Selecting the transaction to view on Etherscan


    You will see that the contract transfers the received 0.001 Ether to the owner
    of the contract (see Figure [11-28](#471881_2_En_11_Chapter.xhtml#Fig28)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig28_HTML.jpg)


    A screenshot of the Goerli transaction hash page lists the options under transaction
    details with the transaction hash, status, block, timestamp, and highlighted contract
    details.


    Figure 11-28: Viewing the transaction on Etherscan


    ## Summary


    In this chapter, you learned how tokens work and you created one yourself using
    a token contract. You also learned how to add tokens to your MetaMask account
    and use them to pay for smart contract services. Finally, you learned how you
    can modify token contract so that one can buy tokens by sending Ethers to it.


    # 12. Creating Non-Fungible Tokens Using ERC-721


    Non-fungible tokens (NFTs) seem to be the latest craze in the world of blockchain
    lately. Chances are you have heard from friends or the media about some guys getting
    really rich by selling selfies as NFTs. So, what exactly is an NFT and what do
    you as a developer need to know about NFTs? This chapter explains what an NFT
    is and how to mint your own NFTs.'
