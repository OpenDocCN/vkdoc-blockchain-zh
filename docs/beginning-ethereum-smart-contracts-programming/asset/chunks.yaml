    # 13. Introduction to Decentralized Finance


    The financial system that we are so familiar with today is known as *traditional
    finance*. It is still largely centralized because it still relies on central authorities,
    predominantly banks and governments. However, traditional finance has several
    flaws and I will discuss them in this chapter.


    In Chapter [2](#471881_2_En_2_Chapter.xhtml), you learned about the motivations
    behind blockchain and how it solves the trust issue that people have with central
    authorities. Using blockchain, we can build a new financial system known as *decentralized
    finance* (DeFi).


    In this chapter, I will first compare the differences between traditional finance
    and DeFi, and then introduce you to one key component of DeFi: *stablecoins*.
    You will also learn how to build a decentralized exchange (DEX) to exchange tokens
    from one type to another.


    ## Limitations of Traditional Finance


    Today, here are some common activities we perform in traditional finance:


    *   Money transfers

    *   Loans

    *   Saving plans

    *   Insurance

    *   Stock markets


    However, there are some problems/limitations with traditional finance:


    *   Some people are not able to create bank accounts and access financial services.
    For example, due to sanctions, certain political figures may not have access to
    financial services. A good example is Carrie Lam (former leader of Hong Kong).
    She has no access to banking services after the United States imposed sanctions
    on her in response to a draconian security law China imposed on the city.

    *   A hidden charge of financial services is your personal data. Your financial
    information is not a secret; people in the banks know how many assets you have
    and constantly monitor you to sell you financial products.

    *   Governments and centralized institutions can close down markets at will. A
    good example of this happened in 2022 when the Canadian government warned of freezing
    the bank accounts of those who were linked to the ongoing anti-vaccine mandate
    protests in Ottawa.

    *   Money transfers take a long time and cost too much. It typically takes a few
    working days to remit money from one country to another and banks typically charge
    a significant amount of transaction fees.


    ### Decentralized Finance


    With blockchains, we can now have an open and global financial system built for
    the Internet age, known as decentralized finance (DeFi). DeFi is an alternative
    to the traditional finance system that is opaque, tightly controlled, and built
    using decades-old technologies and systems.


    With DeFi, we can now:


    *   Eliminate (or reduce) fees imposed by banks and other financial companies
    for using their services

    *   Have more options to borrow from anyone in the world, not only banks

    *   Hold our money in a secure digital wallet instead of keeping it in a bank

    *   Use our funds without needing approval from anyone

    *   Transfer funds in seconds and minutes'
