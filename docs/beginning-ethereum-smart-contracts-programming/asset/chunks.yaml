    **Figure 12-17** Account 1 no longer holds any NFT


    > **Tip:** Now that Account 2 is the new owner of the NFT token, if Account 2
    wishes to transfer this NFT token to another account (say, Account 3), you need
    to switch to Account 2 in MetaMask before clicking the `transferFrom` button in
    the Remix IDE.


    #### Transferring Ownership of the Contract


    Recall that I mentioned that only the owner of the NFT token contract is allowed
    to mint new NFTs. If you want to transfer the ownership of this NFT token contract
    to Account 3, enter the address of Account 3 in the textbox next to the `transferOwnership`
    button and then click the button (see Figure [12-18](#471881_2_En_12_Chapter.xhtml#Fig18)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig18_HTML.jpg)


