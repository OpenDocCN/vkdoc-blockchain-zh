    At the bottom of the Remix IDE, you should see the events fired by the smart contract
    (see Figure [10-10](#471881_2_En_10_Chapter.xhtml#Fig10)).


    ![A 22-line program code presents a smart contract with winner numbers and the
    amount. The syntax for the winner and amount are present inside the box.](/images/471881_2_En_10_Chapter/471881_2_En_10_Fig10_HTML.jpg)


    **Figure 10-10** - Events fired by the smart contract containing the winner(s)
    addresses as well as the amount won


    Since there two players who wagered on 5, there are two winners. The winning amount
    for the second and third players are 1666 and 3333, respectively. The calculations
    for the winnings are as follows:


    *   Total wager amount = 5000 Wei

    *   Total winning wager = 1000 + 2000 = 3000 Wei

    *   Winnings for the second account = (1000/3000) * 5000 = 1666 Wei

    *   Winnings for the third account = (2000/3000) * 5000 = 2333 Wei


