    图 11-28：在 Etherscan 上查看交易


    ## 本章小结


    在本章中，您学习了代币的工作原理，并使用代币合约自己创建了一个代币。您还学习了如何将代币添加到您的 MetaMask 账户，并使用它们支付智能合约服务。最后，您学习了如何修改代币合约，以便人们可以通过向它发送以太币来购买代币。


    # 12. 使用 ERC-721 创建非同质化代币


    非同质化代币 (NFT) 似乎是近来区块链世界的最新热潮。您很可能从朋友或媒体那里听说过，有人通过将自拍照作为 NFT 出售而变得非常富有。那么，NFT 到底是什么？作为开发者，您需要了解关于
    NFT 的哪些知识？本章将解释什么是 NFT，以及如何铸造您自己的 NFT。

    '
- fmt: "# What Is an NFT?\n\nBefore you learn what an NFT is and how to mint one,\
    \ it is important that you understand the meaning of *fungible*. The word *fungible*\
    \ means “something whose part or quantity may be replaced by another equal part\
    \ or quantity in paying a debt or settling an account” (source: [www.merriam-webster.com/dictionary/fungible](http://www.merriam-webster.com/dictionary/fungible)).\n\
    \nA good example of a fungible item is the US dollar bill (Figure 12-1).\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig1_HTML.jpg)\n\
    \nA photograph of a 1-dollar American currency. It reads federal reserve note,\
    \ The United States of America. One dollar.\n\nFigure 12-1\n\nA US $1 bill (source:\
    \ [en.wikipedia.org](https://en.wikipedia.org/wiki/United_States_one-dollar_bill%2523/media/File:US_one_dollar_bill,_obverse,_series_2009.jpg))\n\
    \nUsing the dollar bill as an example, it is fungible because you can use it to\
    \ pay for any good or service that is equivalent to a dollar. In addition, you\
    \ can also use it to exchange for 10 dimes. Two people, each holding a dollar\
    \ note, would be happy to exchange the dollar note with each other because after\
    \ the exchange they would still have the same buying power.\n\nA baseball card\
    \ (see Figure 12-2), on the other hand, is *not fungible* because each card has\
    \ unique qualities and has different values to different people. A baseball card\
    \ collector may value the card at $1 million, while a storeowner may not see much\
    \ value in the card and may value the card at $1.\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig2_HTML.jpg)\n\
    \nA photograph of Vern Bickford with a cap on his head.\n\nFigure 12-2\n\nA baseball\
    \ card (source: [en.wikipedia.org](https://en.wikipedia.org/wiki/Baseball_card%2523/media/File:VernBickford1954Bowman.jpg))\n\
    \nNow that you know the meaning of fungible, let’s discuss what an NFT is. NFT\
    \ stands for *non-fungible token*. An NFT is basically a record on the blockchain\
    \ (predominantly on Ethereum but there are alternative blockchains that support\
    \ NFTs) that records the ownership of a digital art piece (or any item of value,\
    \ but most NFTs today are digital assets such as images, music, or videos). Buyers\
    \ of NFTs typically get limited rights to display the digital artwork they represent,\
    \ but in many ways, they’re just buying bragging rights and an asset they may\
    \ be able to resell later.\n\n> **Tip**  \n> In short, an NFT is nothing more\
    \ than a unique record on the blockchain with a transactional record and a hyperlink\
    \ to the digital asset.\n\n## Ownership vs. Copyright\n\nA lot of people tend\
    \ to confuse NFT’s ownership property with copyright. Having ownership of an NFT\
    \ does not imply that you have the copyright of an item. While of course the creator\
    \ of a digital asset may transfer the intellectual property of the asset to a\
    \ buyer, this transfer must be made in writing. Merely buying an NFT does not\
    \ automatically grant you the copyright of that item. A good analogy is this:\
    \ buying a movie DVD allows you to own that movie, but it does not grant you the\
    \ rights to replicate the DVD and sell it to your friends.\n\n## Where Do You\
    \ Buy or Sell NFTs?\n\nTo buy an NFT or sell your own, you need to go to an NFT\
    \ marketplace. An NFT marketplace is an online platform that allows you to buy/sell\
    \ NFTs. Some of the popular NFT marketplaces are:\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig3_HTML.jpg)\n\
    \nA screenshot of the open-sea, i o webpage. The text reads, discover, collect,\
    \ and sell extraordinary N F Ts with two buttons below for explore and create\
    \ next to a photograph of an abstract.\n\nFigure 12-3\n\nOpenSea is one of the\
    \ popular NFT marketplaces\n\n- OpenSea ([https://opensea.io](https://opensea.io);\
    \ see Figure 12-3)\n- Rarible ([https://rarible.com](https://rarible.com))\n-\
    \ Mintable ([https://mintable.app](https://mintable.app))\n\n# Creating NFTs Using\
    \ Token Contracts\n\nAs the name implies, an NFT is a token, and hence it uses\
    \ a token contract known as an *NFT token contract*.\n\nFor NFTs, there are two\
    \ token contracts that you can use:\n\n- **ERC-721**: Similar to ERC-20 where\
    \ you can create tokens (which are fungible), ERC-721 is another token standard\
    \ that allows you to mint NFTs.\n- **ERC-1155**: A newer NFT standard than the\
    \ ERC-20. In ERC-1155, multiple NFTs can be transferred in a single transaction,\
    \ resulting in lower transaction fees compared to ERC-721.\n\nFor this chapter,\
    \ you will focus on the ERC-721 standard for creating NFTs.\n\n## Who Deploys\
    \ the NFT Token Contract?\n\nIf you sell an NFT through a marketplace like OpenSea,\
    \ OpenSea will automatically mint your NFT using the ERC-721 (or ERC-1155) NFT\
    \ token contract. However, you can do your minting by writing your own NFT token\
    \ contract, and you can then list your minted NFT through OpenSea for selling.\n\
    \n## Using ERC-721 for Creating NFTs\n\nLet’s now see how you can mint an NFT\
    \ using the ERC-721 NFT token contract. For this, you will use the Remix IDE ([https://remix.ethereum.org/](https://remix.ethereum.org/)).\n\
    \nIn the Remix IDE, create a new contract and name it as say `MyNFT.sol`. Populate\
    \ it with the following statements:\n\n```\n// SPDX-License-Identifier: MIT\n\
    pragma solidity ^0.8.0;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/access/Ownable.sol\"\
    ;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/token/ERC721/extensions/ERC721URIStorage.sol\"\
    ;\ncontract MyNFT is Ownable, ERC721URIStorage {\n    // name and symbol\n   \
    \ constructor() ERC721(\"Learn2develop.net NFT\", \"DLS\") {\n    }\n    function\
    \ mint(address recipient, uint256 tokenId,\n        string memory tokenURI) public\
    \ onlyOwner {\n        _mint(recipient, tokenId);\n        _setTokenURI(tokenId,\
    \ tokenURI);\n    }\n}\n```\n\nObserve the following points about the NFT token\
    \ contract:\n\n- You are using the base ERC-721 NFT token contract from OpenZeppelin.\n\
    - The arguments passed to the constructor of the contract are the name of the\
    \ NFT token and its symbol. You can change this to your own desired name and symbol.\n\
    - The `mint()` function takes three arguments: the address of the owner of the\
    \ NFT, the Token ID, and the TokenURI that points to the details of the NFT.\n\
    \n## Deploying the NFT Token Contract\n\nOnce you have compiled your contract\
    \ in the Remix IDE, head over to the **DEPLOY & RUN TRANSACTIONS** section and\
    \ click **Deploy** (see Figure 12-4).\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig4_HTML.jpg)\n\
    \nA screenshot of the Deploy and Run Transactions window with drop-down boxes\
    \ for environment and account, the gas limit of 3000000, value 0, contract My\
    \ N F T dash contracts. A button for deploy is at the bottom.\n\nFigure 12-4\n\
    \nDeploying the NFT contract\n\n> **Note**  \n> For this example, you will be\
    \ deploying the NFT contract onto the Goerli testnet through MetaMask.\n\nOnce\
    \ the NFT token contract has been deployed, you should be able to expand on the\
    \ contract address and see the list of functions, as shown in Figure 12-5.\n\n\
    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig5_HTML.jpg)\n\nA screenshot\
    \ of the Deployed Contracts window with blocks for approve, mint, transferFrom,\
    \ balanceOf, owner, symbol, token U R I, and more.\n\nFigure 12-5\n\nExploring\
    \ the various functions in the deployed NFT contract"
  raw: '## What Is an NFT?


    Before you learn what an NFT is and how to mint one, it is important that you
    understand the meaning of *fungible*. The word *fungible* means “something whose
    part or quantity may be replaced by another equal part or quantity in paying a
    debt or settling an account” (source: [`www.merriam-webster.com/dictionary/fungible`](http://www.merriam-webster.com/dictionary/fungible)).


    A good example of a fungible item is the US dollar bill (Figure [12-1](#471881_2_En_12_Chapter.xhtml#Fig1)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig1_HTML.jpg)


    A photograph of a 1-dollar American currency. It reads federal reserve note, The
    United States of America. One dollar.


    Figure 12-1


    A US $1 bill (source: [`https://en.wikipedia.org/wiki/United_States_one-dollar_bill#/media/File:US_one_dollar_bill,_obverse,_series_2009.jpg`](https://en.wikipedia.org/wiki/United_States_one-dollar_bill%2523/media/File:US_one_dollar_bill,_obverse,_series_2009.jpg))


    Using the dollar bill as an example, it is fungible because you can use it to
    pay for any good or service that is equivalent to a dollar. In addition, you can
    also use it to exchange for 10 dimes. Two people, each holding a dollar note,
    would be happy to exchange the dollar note with each other because after the exchange
    they would still have the same buying power.


    A baseball card (see Figure [12-2](#471881_2_En_12_Chapter.xhtml#Fig2)), on the
    other hand, is *not fungible* because each card has unique qualities and has different
    values to different people. A baseball card collector may value the card at $1
    million, while a storeowner may not see much value in the card and may value the
    card at $1.


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig2_HTML.jpg)


    A photograph of Vern Bickford with a cap on his head.


    Figure 12-2


    A baseball card (source: [`https://en.wikipedia.org/wiki/Baseball_card#/media/File:VernBickford1954Bowman.jpg`](https://en.wikipedia.org/wiki/Baseball_card%2523/media/File:VernBickford1954Bowman.jpg))


    Now that you know the meaning of fungible, let’s discuss what an NFT is. NFT stands
    for *non-fungible token*. An NFT is basically a record on the blockchain (predominantly
    on Ethereum but there are alternative blockchains that support NFTs) that records
    the ownership of a digital art piece (or any item of value, but most NFTs today
    are digital assets such as images, music, or videos). Buyers of NFTs typically
    get limited rights to display the digital artwork they represent, but in many
    ways, they’re just buying bragging rights and an asset they may be able to resell
    later.


    Tip


    In short, an NFT is nothing more than a unique record on the blockchain with a
    transactional record and a hyperlink to the digital asset.


    ### Ownership vs. Copyright


    A lot of people tend to confuse NFT’s ownership property with copyright. Having
    ownership of an NFT does not imply that you have the copyright of an item. While
    of course the creator of a digital asset may transfer the intellectual property
    of the asset to a buyer, this transfer must be made in writing. Merely buying
    an NFT does not automatically grant you the copyright of that item. A good analogy
    is this: buying a movie DVD allows you to own that movie, but it does not grant
    you the rights to replicate the DVD and sell it to your friends.


    ### Where Do You Buy or Sell NFTs?


    To buy an NFT or sell your own, you need to go to an NFT marketplace. An NFT marketplace
    is an online platform that allows you to buy/sell NFTs. Some of the popular NFT
    marketplaces are


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig3_HTML.jpg)


    A screenshot of the open-sea, i o webpage. The text reads, discover, collect,
    and sell extraordinary N F Ts with two buttons below for explore and create next
    to a photograph of an abstract.


    Figure 12-3


    OpenSea is one of the popular NFT marketplaces


    *   OpenSea ([`https://opensea.io`](https://opensea.io); see Figure [12-3](#471881_2_En_12_Chapter.xhtml#Fig3))


    *   Rarible ([`https://rarible.com`](https://rarible.com))


    *   Mintable ([`https://mintable.app`](https://mintable.app))


    ## Creating NFTs Using Token Contracts


    As the name implies, an NFT is a token, and hence it uses a token contract known
    as an *NFT token contract*.


    For NFTs, there are two token contracts that you can use:


    *   **ERC-721**: Similar to ERC-20 where you can create tokens (which are fungible),
    ERC-721 is another token standard that allows you to mint NFTs.


    *   **ERC-1155**: A newer NFT standard than the ERC-20. In ERC-1155, multiple
    NFTs can be transferred in a single transaction, resulting in lower transaction
    fees compared to ERC-721.


    For this chapter, you will focus on the ERC-721 standard for creating NFTs.


    ### Who Deploys the NFT Token Contract?


    If you sell an NFT through a marketplace like OpenSea, OpenSea will automatically
    mint your NFT using the ERC-721 (or ERC-1155) NFT token contract. However, you
    can do your minting by writing your own NFT token contract, and you can then list
    your minted NFT through OpenSea for selling.


    ### Using ERC-721 for Creating NFTs


    Let’s now see how you can mint an NFT using the ERC-721 NFT token contract. For
    this, you will use the Remix IDE ([`https://remix.ethereum.org/`](https://remix.ethereum.org/)).


    In the Remix IDE, create a new contract and name it as say `MyNFT.sol`. Populate
    it with the following statements:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8.0;

    import "https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/access/Ownable.sol";

    import "https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/token/ERC721/extensions/ERC721URIStorage.sol";

    contract MyNFT is Ownable, ERC721URIStorage {

    // name and symbol

    constructor() ERC721("Learn2develop.net NFT", "DLS") {

    }

    function mint(address recipient, uint256 tokenId,

    string memory tokenURI) public onlyOwner {

    _mint(recipient, tokenId);

    _setTokenURI(tokenId, tokenURI);

    }

    }

    ```


    Observe the following points about the NFT token contract:


    *   You are using the base ERC-721 NFT token contract from OpenZeppelin.


    *   The arguments passed to the constructor of the contract are the name of the
    NFT token and its symbol. You can change this to your own desired name and symbol.


    *   The `mint()` function takes three arguments: the address of the owner of the
    NFT, the Token ID, and the TokenURI that points to the details of the NFT.


    ### Deploying the NFT Token Contract


    Once you have compiled your contract in the Remix IDE, head over to the **DEPLOY
    & RUN TRANSACTIONS** section and click **Deploy** (see Figure [12-4](#471881_2_En_12_Chapter.xhtml#Fig4)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig4_HTML.jpg)


    A screenshot of the Deploy and Run Transactions window with drop-down boxes for
    environment and account, the gas limit of 3000000, value 0, contract My N F T
    dash contracts. A button for deploy is at the bottom.


    Figure 12-4


    Deploying the NFT contract


    Note


    For this example, you will be deploying the NFT contract onto the Goerli testnet
    through MetaMask.


    Once the NFT token contract has been deployed, you should be able to expand on
    the contract address and see the list of functions, as shown in Figure [12-5](#471881_2_En_12_Chapter.xhtml#Fig5).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig5_HTML.jpg)


    A screenshot of the Deployed Contracts window with blocks for approve, mint, transferFrom,
    balanceOf, owner, symbol, token U R I, and more.


    Figure 12-5


    Exploring the various functions in the deployed NFT contract'
  trans: "\n# 什么是 NFT？\n\n在学习什么是 NFT 以及如何铸造 NFT 之前，首先必须理解 *同质化* 的含义。*同质化* 一词的意思是“其部分或数量可以在偿还债务或结清账目时，由另一等量部分或数量所替代的事物”（来源：[www.merriam-webster.com/dictionary/fungible](http://www.merriam-webster.com/dictionary/fungible)）。\n\
    \n一个典型的同质化物品例子是美元纸币（图 12-1）。\n\n![](img/471881_2_En_12_Fig1_HTML.jpg)\n\n一张 1\
    \ 美元美国货币的照片。其上印有“联邦储备券”、“美利坚合众国”、“一美元”字样。\n\n图 12-1\n\n一张 1 美元纸币（来源：[en.wikipedia.org](https://en.wikipedia.org/wiki/United_States_one-dollar_bill%2523/media/File:US_one_dollar_bill,_obverse,_series_2009.jpg)）\n\
    \n以美元纸币为例，它是同质化的，因为你可以用它来支付任何等值一美元的商品或服务。此外，你也可以用它来兑换 10 个 10 美分硬币。两个人，每人持有一张\
    \ 1 美元纸币，会很乐意互相交换这笔钱，因为交换后他们仍拥有相同的购买力。\n\n而与之相反，一张棒球卡（见图 12-2）则是*非同质化*的，因为每张卡都有独特属性，对不同的人具有不同的价值。一位棒球卡收藏家可能认为该卡价值\
    \ 100 万美元，而一位店主可能认为其价值不大，只值 1 美元。\n\n![](img/471881_2_En_12_Fig2_HTML.jpg)\n\n\
    一张弗恩·比克福德戴着帽子的照片。\n\n图 12-2\n\n一张棒球卡（来源：[en.wikipedia.org](https://en.wikipedia.org/wiki/Baseball_card%2523/media/File:VernBickford1954Bowman.jpg)）\n\
    \n现在你已经理解同质化的含义，我们来讨论什么是 NFT。NFT 代表 *非同质化代币*。NFT 本质上是一条区块链记录（主要在以太坊上，但也存在支持 NFT\
    \ 的其他区块链），用于记录一件数字艺术品（或任何有价值的物品，但现今大多数 NFT 是如图像、音乐或视频等数字资产）的所有权。NFT 的买家通常获得有限的展示其所代表的数字艺术作品的权利，但在很多方面，他们购买的仅仅是炫耀资本，以及以后可能转售的资产。\n\
    \n> **提示**  \n> 简言之，NFT 只不过是区块链上的一条独特记录，包含交易记录和指向该数字资产的超链接。\n\n## 所有权 vs. 版权\n\
    \n很多人容易将 NFT 的所有权属性与版权混淆。拥有 NFT 的所有权并不意味着你拥有该物品的版权。当然，数字资产的创建者可以将该资产的知识产权转让给买家，但这种转让必须以书面形式进行。仅仅购买\
    \ NFT 并不会自动授予你该物品的版权。一个很好的类比是：购买一张电影 DVD 能让你拥有这部电影，但这并不赋予你复制该 DVD 并卖给朋友的权利。\n\n\
    ## 在哪里购买或出售 NFT？\n\n要购买 NFT 或出售你自己的 NFT，你需要前往 NFT 市场。NFT 市场是一个允许你购买/出售 NFT 的在线平台。一些流行的\
    \ NFT 市场包括：\n\n![](img/471881_2_En_12_Fig3_HTML.jpg)\n\nOpenSea 网页的截图。文字显示“发现、收藏和出售非凡的\
    \ NFT”，下方有两个按钮“探索”和“创建”，旁边是一张抽象图片。\n\n图 12-3\n\nOpenSea 是流行的 NFT 市场之一\n\n- OpenSea（[`opensea.io`](https://opensea.io)；见图\
    \ 12-3）\n- Rarible（[`rarible.com`](https://rarible.com)）\n- Mintable（[`mintable.app`](https://mintable.app)）\n\
    \n# 使用代币合约创建 NFT\n\n顾名思义，NFT 是一种代币，因此它使用称为 *NFT 代币合约* 的代币合约。\n\n对于 NFT，你可以使用两种代币合约：\n\
    \n- **ERC-721**：类似于可以创建（同质化）代币的 ERC-20，ERC-721 是另一种允许铸造 NFT 的代币标准。\n- **ERC-1155**：一种比\
    \ ERC-20 更新的 NFT 标准。在 ERC-1155 中，可以在单次交易中转移多个 NFT，与 ERC-721 相比，这降低了交易费用。\n\n在本章中，你将重点使用\
    \ ERC-721 标准来创建 NFT。\n\n## 谁部署 NFT 代币合约？\n\n如果你通过像 OpenSea 这样的市场出售 NFT，OpenSea\
    \ 将使用 ERC-721（或 ERC-1155）NFT 代币合约自动铸造你的 NFT。但是，你也可以通过编写自己的 NFT 代币合约来铸造，然后通过 OpenSea\
    \ 列出你铸造的 NFT 进行销售。\n\n## 使用 ERC-721 创建 NFT\n\n现在让我们看看如何使用 ERC-721 NFT 代币合约铸造 NFT。为此，你将使用\
    \ Remix IDE（[`remix.ethereum.org/`](https://remix.ethereum.org/)）。\n\n在 Remix\
    \ IDE 中，创建一个新合约，并将其命名为 `MyNFT.sol`。然后填充以下代码：\n\n```\n// SPDX-License-Identifier:\
    \ MIT\npragma solidity ⁰.8.0;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/access/Ownable.sol\"\
    ;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/token/ERC721/extensions/ERC721URIStorage.sol\"\
    ;\ncontract MyNFT is Ownable, ERC721URIStorage {\n    // name and symbol\n   \
    \ constructor() ERC721(\"Learn2develop.net NFT\", \"DLS\") {\n    }\n    function\
    \ mint(address recipient, uint256 tokenId,\n        string memory tokenURI) public\
    \ onlyOwner {\n        _mint(recipient, tokenId);\n        _setTokenURI(tokenId,\
    \ tokenURI);\n    }\n}\n```\n\n请注意 NFT 代币合约的以下几点：\n\n- 你正在使用来自 OpenZeppelin 的基础\
    \ ERC-721 NFT 代币合约。\n- 传递给合约构造函数的参数是 NFT 代币的名称及其符号。你可以将其更改为自己想要的名称和符号。\n- `mint()`\
    \ 函数接受三个参数：NFT 所有者地址、代币 ID，以及指向 NFT 详细信息的 TokenURI。\n\n## 部署 NFT 代币合约\n\n在 Remix\
    \ IDE 中编译合约后，转到 **DEPLOY & RUN TRANSACTIONS** 部分并点击 **Deploy**（见图 12-4）。\n\n![](img/471881_2_En_12_Fig4_HTML.jpg)\n\
    \n“部署与运行交易”窗口的截图，包含环境、账户的下拉框，Gas 上限为 3000000，值为 0，合约选择为 MyNFT - contracts。底部有一个“部署”按钮。\n\
    \n图 12-4\n\n部署 NFT 合约\n\n> **注**  \n> 在本例中，你将通过 MetaMask 将 NFT 合约部署到 Goerli 测试网。\n\
    \n一旦 NFT 代币合约部署完成，你应该能够展开合约地址并看到函数列表，如图 12-5 所示。\n\n![](img/471881_2_En_12_Fig5_HTML.jpg)\n\
    \n“已部署合约”窗口的截图，包含 approve、mint、transferFrom、balanceOf、owner、symbol、tokenURI 等区块。\n\
    \n图 12-5\n\n探索已部署 NFT 合约中的各种函数\n"
- fmt: "### Testing the NFT Contract\n\nWith the NFT token contract deployed onto\
    \ the Goerli testnet, you can now test the contract. For the following sections,\
    \ assume you have the following accounts and their associated addresses:\n\n-\
    \ Address of **Account 1** (the account that deployed the NFT token contract):\
    \ `0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7`\n- Address of **Account 2**: `0x63eE1AEb74c52f09EaB6a2825bB1918B5e045050`\n\
    - Address of **Account 3**: `0xC663D99b0B5D0F6eE163173E6889AA47F787c403`\n\n####\
    \ Getting the Owner of the Token\n\nClick the **owner** button and you should\
    \ see the address of **Account 1**, the account that deployed the contract (see\
    \ Figure [12-6](#471881_2_En_12_Chapter.xhtml#Fig6)).\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig6_HTML.jpg)\n\
    \nA textbox of the owner and a text at the bottom for the 0 colon address colon\
    \ 0 x A F 8 b 6 C A 21023 A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7.\n\n\
    Figure 12-6  \nThe owner function returns the account address that deployed the\
    \ NFT contract\n\n#### Preparing the Digital Asset to be Sold as an NFT\n\nSuppose\
    \ the image in Figure [12-7](#471881_2_En_12_Chapter.xhtml#Fig7) is what you want\
    \ to sell as an NFT.\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig7_HTML.jpg)\n\
    \nA portrait of Monalisa's face.\n\nFigure 12-7  \nThe image to be sold as an\
    \ NFT (source: [`https://cdn.britannica.com/w:300,h:169,c:crop/24/189624-050-F3C5BAA9/Mona-Lisa-oil-wood-panel-Leonardo-da.jpg`](https://cdn.britannica.com/w:300,h:169,c:crop/24/189624-050-F3C5BAA9/Mona-Lisa-oil-wood-panel-Leonardo-da.jpg))\n\
    \nFirst, you need to upload this digital asset somewhere. One option is to use\
    \ IPFS. You can use the following page to upload your image using an **IPFS gateway**:\
    \ [`https://ipfs-gateway.cloud`](https://ipfs-gateway.cloud) (see Figure [12-8](#471881_2_En_12_Chapter.xhtml#Fig8)).\n\
    \n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig8_HTML.jpg)\n\nA screenshot\
    \ of i p f s gateway cloud webpage. A text i p f s gateway for decentralized internet\
    \ is above a drop file box.\n\nFigure 12-8  \nYou can upload an image to IPFS\
    \ using an IPFS gateway\n\n> **Tip**  \n> IPFS is a peer-to-peer network for storing\
    \ and sharing files. Similar to a blockchain where distributed and decentralized\
    \ nodes store the ledger (the chain of blocks), nodes in IPFS store files. For\
    \ more information on IPFS, refer to my article on IPFS at [`https://bit.ly/3Gva1Q1`](https://bit.ly/3Gva1Q1).\n\
    \nOnce the file is uploaded to IPFS, you obtain the hash of the image (known as\
    \ the *Content ID*, or CID) that has been uploaded to IPFS. You can use this hash\
    \ to fetch the file on IPFS.\n\nYou can use an IPFS gateway such as `ipfs.io`\
    \ (another IPFS gateway) to specify the location of the file using the following\
    \ format: [`https://ipfs.io/ipfs/`*<hash_of_image>*](https://ipfs.io/ipfs/%253chash_of_image%253e).\
    \ For your example, the image can be found using this URL: [`https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC`](https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC).\n\
    \n> **IPFS Gateway**  \n> IPFS gateways are how web users retrieve content on\
    \ the IPFS network without running their own IPFS node. IPFS gateways allow web\
    \ users to fetch content that resides on the IPFS network using the file’s hash\
    \ (known as the Content ID, or CID).\n\nThe next step is to create the metadata\
    \ for your NFT. An NFT metadata file contains details of the NFT. The minimum\
    \ attributes needed in the metadata are:\n\n- `name`: The name of the NFT\n- `description`:\
    \ The description of the NFT\n- `image`: The link that points to the digital asset\n\
    \nYou can create a JSON file with the following content:\n\n```\n{\n  \"name\"\
    : \"My NFT Artwork\",\n  \"description\": \"Mona Lisa\",\n  \"image\": \"https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC\"\
    \n}\n```\n\nSave the file and upload the JSON file to IPFS. Then, get the URL\
    \ that points to the metadata file on IPFS. For this example, the metadata file\
    \ can be found at [`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky).\n\
    \n> **Tip**  \n> Essentially, the `TokenURI` in your NFT token contract will point\
    \ to this NFT metadata file.\n\n#### Minting the NFT\n\nIn the textbox displayed\
    \ next to the **mint** button, enter the following string:\n\n```\n0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7,1,https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky\n\
    ```\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig9_HTML.jpg)\n\nA text\
    \ box of mint O x A F 8 b 6 C A 21023 A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773\
    \ e 7,1, h t t p s colon two forward slash l p f s. l o forward slash i p f s\
    \ forward slash Q m f J a h E i n m 6 r Y N f s D.\n\nFigure 12-9  \nMinting an\
    \ NFT for Account 1\n\nThis string has the following format: `<Owner_of_the NFT>,<TokenID>,<TokenURI>`.\
    \ In this string, Account 1 is minted with a token with token ID 1, and the link\
    \ to the NFT metadata is located at [`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky).\
    \ This means Account 1 is now the owner of the NFT.\n\n> **Note**  \n> The `TokenID`\
    \ is a number that you can specify to uniquely identify the NFT within the NFT\
    \ token contract. The `TokenURI` is usually a URL that points to the location\
    \ of the NFT metadata. A common storage for the NFT is IPFS. Alternatively, the\
    \ `TokenURI` may point to an NFT marketplace such as Opensea.\n\nClick the **mint**\
    \ button and MetaMask will prompt you to confirm the transaction.\n\n> **Tip**\
    \  \n> Note that this mint operation can only be performed by the owner of the\
    \ NFT token contract, which is the account that deployed it (Account 1 in this\
    \ case).\n\n#### Getting the Name and Symbol of the NFT Token Contract\n\nTo get\
    \ the name and the symbol of the NFT token contract, click the **name** and **symbol**\
    \ buttons (see Figure [12-10](#471881_2_En_12_Chapter.xhtml#Fig10)).\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig10_HTML.jpg)\n\
    \nA text box with text blocks for name, owner, ownerOf, supportsin, symbol. The\
    \ text blocks names and symbols highlighted with boxes.\n\nFigure 12-10  \nGetting\
    \ the name and symbol of the NFT contract\n\n#### Finding the Balance of NFTs\
    \ for an Address\n\nTo know how many NFTs a particular address has on an NFT token\
    \ contract, enter the account address and click the **balanceOf** button (see\
    \ Figure [12-11](#471881_2_En_12_Chapter.xhtml#Fig11)).\n\n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig11_HTML.jpg)\n\
    \nA text box with the balance of O X A F 8 b 6 C A 21023 A 595 F 0 C 4919 b 8\
    \ B 4 a 9 d 1 F 0 c 1773 e 7 and 0 colon u i n t 256 colon 1 at the bottom.\n\n\
    Figure 12-11  \nFinding the number of NFTs owned by an account\n\nIn this example,\
    \ you can see that Account 1 currently has one NFT in the NFT token contract.\n\
    \n#### Getting the Owner of an NFT\n\nTo know who owns a particular NFT (based\
    \ on the token ID) in the NFT token contract, enter the token ID and click the\
    \ **ownerOf** button (see Figure [12-12](#471881_2_En_12_Chapter.xhtml#Fig12)).\n\
    \n![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig12_HTML.jpg)\n\nA text box\
    \ with the owner 1 and ?0 colon address colon 0 x A F 8 b 6 C A 21023 A 595 F\
    \ 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7 at the bottom.\n\nFigure 12-12  \nFinding\
    \ out who owns a particular NFT\n\nThis output shows that token ID 1 is currently\
    \ owned by Account 1."
  raw: '### Testing the NFT Contract


    With the NFT token contract deployed onto the Goerli testnet, you can now test
    the contract. For the following sections, assume you have the following accounts
    and their associated addresses:


    *   Address of **Account 1** (the account that deployed the NFT token contract):
    0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7


    *   Address of **Account 2:** 0x63eE1AEb74c52f09EaB6a2825bB1918B5e045050


    *   Address of **Account 3:** 0xC663D99b0B5D0F6eE163173E6889AA47F787c403


    #### Getting the Owner of the Token


    Click the **owner** button and you should see the address of **Account 1**, the
    account that deployed the contract (see Figure [12-6](#471881_2_En_12_Chapter.xhtml#Fig6)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig6_HTML.jpg)


    A textbox of the owner and a text at the bottom for the 0 colon address colon
    0 x A F 8 b 6 C A 21023 A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7.


    Figure 12-6


    The owner function returns the account address that deployed the NFT contract


    #### Preparing the Digital Asset to be Sold as an NFT


    Suppose the image in Figure [12-7](#471881_2_En_12_Chapter.xhtml#Fig7) is what
    you want to sell as an NFT.


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig7_HTML.jpg)


    A portrait of Monalisa''s face.


    Figure 12-7


    The image to be sold as an NFT (source: [`https://cdn.britannica.com/w:300,h:169,c:crop/24/189624-050-F3C5BAA9/Mona-Lisa-oil-wood-panel-Leonardo-da.jpg`](https://cdn.britannica.com/w:300,h:169,c:crop/24/189624-050-F3C5BAA9/Mona-Lisa-oil-wood-panel-Leonardo-da.jpg))


    First, you need to upload this digital asset somewhere. One option is to use IPFS.
    You can use the following page to upload your image using an **IPFS gateway:**
    [`https://ipfs-gateway.cloud`](https://ipfs-gateway.cloud) (see Figure [12-8](#471881_2_En_12_Chapter.xhtml#Fig8)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig8_HTML.jpg)


    A screenshot of i p f s gateway cloud webpage. A text i p f s gateway for decentralized
    internet is above a drop file box.


    Figure 12-8


    You can upload an image to IPFS using an IPFS gateway


    Tip


    IPFS is a peer-to-peer network for storing and sharing files. Similar to a blockchain
    where distributed and decentralized nodes store the ledger (the chain of blocks),
    nodes in IPFS store files. For more information on IPFS, refer to my article on
    IPFS at [`https://bit.ly/3Gva1Q1`](https://bit.ly/3Gva1Q1).


    Once the file is uploaded to IPFS, you obtain the hash of the image (known as
    the *Content ID*, or CID) that has been uploaded to IPFS. You can use this hash
    to fetch the file on IPFS.


    You can use an IPFS gateway such as `ipfs.io` (another IPFS gateway) to specify
    the location of the file using the following format: [`https://ipfs.io/ipfs/`*<hash_of_image>*](https://ipfs.io/ipfs/%253chash_of_image%253e).
    For your example, the image can be found using this URL: [`https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC`](https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC).


    IPFS Gateway


    IPFS gateways are how web users retrieve content on the IPFS network without running
    their own IPFS node. IPFS gateways allow web users to fetch content that resides
    on the IPFS network using the file’s hash (known as the Content ID, or CID).


    The next step is to create the metadata for your NFT. AN NFT metadata file contains
    details of the NFT. The minimum attributes needed in the metadata are


    *   `name`: The name of the NFT


    *   `description`: The description of the NFT


    *   `image`: The link that points to the digital asset


    You can create a JSON file with the following content:


    ```

    {

    "name": "My NFT Artwork",

    "description": "Mona Lisa",

    "image":  "https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC"

    }

    ```


    Save the file and upload the JSON file to IPFS. Then, get the URL that points
    to the metadata file on IPFS. For this example, the metadata file can be found
    at [`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky).


    Tip


    Essentially, the `TokenURI` in your NFT token contract will point to this NFT
    metadata file.


    #### Minting the NFT


    In the textbox displayed next to the **mint** button, enter the following string:


    ```

    0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7,1,https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky

    ```


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig9_HTML.jpg)


    A text box of mint O x A F 8 b 6 C A 21023 A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F
    0 c 1773 e 7,1, h t t p s colon two forward slash l p f s. l o forward slash i
    p f s forward slash Q m f J a h E i n m 6 r Y N f s D.


    Figure 12-9


    Minting an NFT for Account 1


    This string has the following format: `<Owner_of_the NFT>,<TokenID>,<TokenURI>`.
    In this string, Account 1 is minted with a token with token ID 1, and the link
    to the NFT metadata is located at [`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky).
    This means Account 1 is now the owner of the NFT.


    Note


    The TokenID is a number that you can specify to uniquely identify the NFT within
    the NFT token contract. The TokenURI is usually a URL that points to the location
    of the NFT metadata. A common storage for the NFT is IPFS. Alternatively, the
    TokenURI may point to an NFT marketplace such as Opensea.


    Click the **mint** button and MetaMask will prompt you to confirm the transaction.


    Tip


    Note that this mint operation can only be performed by the owner of the NFT token
    contract, which is the account that deployed it (Account 1 in this case).


    #### Getting the Name and Symbol of the NFT Token Contract


    To get the name and the symbol of the NFT token contract, click the **name** and
    **symbol** buttons (see Figure [12-10](#471881_2_En_12_Chapter.xhtml#Fig10)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig10_HTML.jpg)


    A text box with text blocks for name, owner, ownerOf, supportsin, symbol. The
    text blocks names and symbols highlighted with boxes.


    Figure 12-10


    Getting the name and symbol of the NFT contract


    #### Finding the Balance of NFTs for an Address


    To know how many NFTs a particular address has on an NFT token contract, enter
    the account address and click the **balanceOf** button (see Figure [12-11](#471881_2_En_12_Chapter.xhtml#Fig11)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig11_HTML.jpg)


    A text box with the balance of O X A F 8 b 6 C A 21023 A 595 F 0 C 4919 b 8 B
    4 a 9 d 1 F 0 c 1773 e 7 and 0 colon u i n t 256 colon 1 at the bottom.


    Figure 12-11


    Finding the number of NFTs owned by an account


    In this example, you can see that Account 1 currently has one NFT in the NFT token
    contract.


    #### Getting the Owner of an NFT


    To know who owns a particular NFT (based on the token ID) in the NFT token contract,
    enter the token ID and click the **ownerOf** button (see Figure [12-12](#471881_2_En_12_Chapter.xhtml#Fig12)).


    ![](images/471881_2_En_12_Chapter/471881_2_En_12_Fig12_HTML.jpg)


    A text box with the owner 1 and ?0 colon address colon 0 x A F 8 b 6 C A 21023
    A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7 at the bottom.


    Figure 12-12


    Finding out who owns a particular NFT


    This output shows that token ID 1 is currently owned by Account 1.'
  trans: "\n### 测试 NFT 合约\n\n在将 NFT 代币合约部署到 Goerli 测试网之后，你现在可以测试该合约了。后续小节假设你拥有以下账户及其关联地址：\n\
    \n- **账户 1**（部署 NFT 代币合约的账户）的地址：`0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7`\n\
    - **账户 2** 的地址：`0x63eE1AEb74c52f09EaB6a2825bB1918B5e045050`\n- **账户 3** 的地址：`0xC663D99b0B5D0F6eE163173E6889AA47F787c403`\n\
    \n#### 获取代币的拥有者\n\n点击 **owner** 按钮，你应该会看到**账户 1** 的地址，即部署该合约的账户（见图 12-6）。\n\n\
    ![](img/471881_2_En_12_Fig6_HTML.jpg)\n\n一个显示拥有者的文本框，底部文本显示为 0 colon address colon\
    \ 0 x A F 8 b 6 C A 21023 A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7。\n\n\
    图 12-6  \nowner 函数返回部署 NFT 合约的账户地址\n\n#### 准备要作为 NFT 出售的数字资产\n\n假设图 12-7 中的图像是你想要作为\
    \ NFT 出售的内容。\n\n![](img/471881_2_En_12_Fig7_HTML.jpg)\n\n蒙娜丽莎的肖像。\n\n图 12-7  \n\
    待出售为 NFT 的图像（来源：[`https://cdn.britannica.com/w:300,h:169,c:crop/24/189624-050-F3C5BAA9/Mona-Lisa-oil-wood-panel-Leonardo-da.jpg`](https://cdn.britannica.com/w:300,h:169,c:crop/24/189624-050-F3C5BAA9/Mona-Lisa-oil-wood-panel-Leonardo-da.jpg)）\n\
    \n首先，你需要将这份数字资产上传到某个地方。一种选择是使用 IPFS。你可以使用以下页面，通过 **IPFS 网关** 上传你的图像：[`https://ipfs-gateway.cloud`](https://ipfs-gateway.cloud)（见图\
    \ 12-8）。\n\n![](img/471881_2_En_12_Fig8_HTML.jpg)\n\ni p f s gateway cloud 网页的截图。在拖放文件框上方显示文字“i\
    \ p f s gateway for decentralized internet”。\n\n图 12-8  \n你可以使用 IPFS 网关将图像上传到\
    \ IPFS\n\n> **提示**  \n> IPFS 是一个用于存储和共享文件的点对点网络。类似于区块链中分布式和去中心化节点存储账本（区块的链条），IPFS\
    \ 中的节点则存储文件。关于 IPFS 的更多信息，请参考我在 [`https://bit.ly/3Gva1Q1`](https://bit.ly/3Gva1Q1)\
    \ 上关于 IPFS 的文章。\n\n一旦文件上传到 IPFS，你就会获得已上传到 IPFS 的图像的哈希值（称为 *内容 ID*，简称 CID）。你可以使用此哈希值在\
    \ IPFS 上获取该文件。\n\n你可以使用 `ipfs.io` 等 IPFS 网关（另一个 IPFS 网关），通过以下格式指定文件位置：[`https://ipfs.io/ipfs/`*<图像哈希值>*](https://ipfs.io/ipfs/%253chash_of_image%253e)。对于你的示例，可以通过此\
    \ URL 找到该图像：[`https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC`](https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC)。\n\
    \n> **IPFS 网关**  \n> IPFS 网关允许网络用户在不运行自己 IPFS 节点的情况下检索 IPFS 网络上的内容。IPFS 网关使用文件的哈希值（称为内容\
    \ ID 或 CID）来获取 IPFS 网络中的内容。\n\n下一步是为你的 NFT 创建元数据。一个 NFT 元数据文件包含了该 NFT 的详细信息。元数据中所需的最少属性包括：\n\
    \n- `name`：NFT 的名称\n- `description`：NFT 的描述\n- `image`：指向数字资产的链接\n\n你可以创建一个包含以下内容的\
    \ JSON 文件：\n\n```\n{\n  \"name\": \"我的 NFT 艺术品\",\n  \"description\": \"蒙娜丽莎\"\
    ,\n  \"image\": \"https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC\"\
    \n}\n```\n\n保存该文件并将 JSON 文件上传到 IPFS。然后，获取指向 IPFS 上元数据文件的 URL。本文示例中，元数据文件位于 [`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky)。\n\
    \n> **提示**  \n> 本质上，你的 NFT 代币合约中的 `TokenURI` 将指向此 NFT 元数据文件。\n\n#### 铸造 NFT\n\n\
    在 **mint** 按钮旁边显示的文本框中，输入以下字符串：\n\n```\n0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7,1,https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky\n\
    ```\n\n![](img/471881_2_En_12_Fig9_HTML.jpg)\n\n一个文本框，内容为 mint O x A F 8 b 6 C\
    \ A 21023 A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7,1, h t t p s colon two\
