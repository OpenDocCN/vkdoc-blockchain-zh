    > **Caution:** Remember to switch the accounts under the Account section in the
    Remix IDE when betting.


    ### Announcing the Winner


    Now that all three players have wagered, it is time to announce the winner.


    > **Tip:** You don’t have to wait for all three players to bet before announcing
    the winner. Anytime you want to end the game, you can call the `announceWinners`
    button. You can end the game even if only two players have wagered.


    Using the first account:


    ![A screenshot of the deployed contracts. It includes dropdown options and has
    a balance of 0.000000000000005 ETH. At the bottom, 2 block labels announce and
    bet. It highlights balance and announce options.](/images/471881_2_En_10_Chapter/471881_2_En_10_Fig9_HTML.jpg)


