    ## Making Further Changes to the Smart Contract


    Your basic educational credentials smart contract is now up and running. Users
    are now able to store educational credentials onto the blockchain and use it to
    verify education qualifications. However, there are a number of improvements that
    can be made to the contract. In the following sections, you will learn the following:


    *   How to restrict access to certain functions in your smart contract


    *   How to accept payments in your smart contract


    *   How to fire events in your smart contract


    *   How to transfer funds in your smart contract to another account


    *   How to destruct a smart contract so that it is no longer available for use'
  trans: "\n### 编译合约\n\n智能合约编写完成后，接下来需要对其进行编译。在 Remix IDE 中，点击**编译器**选项卡（见图 7-4，步骤\
    \ 1），然后勾选**自动编译**。这样设置后，每次修改代码时，Remix IDE 都会自动编译你的代码。\n\n![](img/471881_2_En_7_Fig4_HTML.jpg)\n\
    \n一张 solidity 编译器界面的截图，显示了编译图标、自动编译、ABI 和字节码等选项。\n\n**图 7-4** 在 Remix IDE 中启用自动编译\n\
    \n在底部，你会看到两个选项：**ABI** 和 **字节码**。点击 **ABI** 会将应用程序二进制接口（ABI）复制到剪贴板。将其粘贴到文本编辑器中，内容如下：\n\
    \n```\n[\n{\n\"inputs\": [\n{\n\"internalType\": \"string\",\n\"name\": \"document\"\
    ,\n\"type\": \"string\"\n}\n],\n\"name\": \"checkEduCredentials\",\n\"outputs\"\
    : [\n{\n\"internalType\": \"uint256\",\n\"name\": \"\",\n\"type\": \"uint256\"\
    \n}\n],\n\"stateMutability\": \"view\",\n\"type\": \"function\"\n},\n{\n\"inputs\"\
    : [\n{\n\"internalType\": \"string\",\n\"name\": \"document\",\n\"type\": \"string\"\
    \n}\n],\n\"name\": \"storeEduCredentials\",\n\"outputs\": [],\n\"stateMutability\"\
    : \"nonpayable\",\n\"type\": \"function\"\n}\n]\n```\n\n如果你去掉 ABI 的格式并将其存储为单行，你将看到以下内容：\n\
    \n```\n[    {      \"inputs\": [        {          \"internalType\": \"string\"\
    ,          \"name\": \"document\",          \"type\": \"string\"        }    \
    \  ],      \"name\": \"checkEduCredentials\",      \"outputs\": [        {   \
    \       \"internalType\": \"uint256\",          \"name\": \"\",          \"type\"\
    : \"uint256\"        }      ],      \"stateMutability\": \"view\",      \"type\"\
    : \"function\"    },    {      \"inputs\": [        {          \"internalType\"\
    : \"string\",          \"name\": \"document\",          \"type\": \"string\" \
    \       }      ],      \"name\": \"storeEduCredentials\",      \"outputs\": [],\
    \      \"stateMutability\": \"nonpayable\",      \"type\": \"function\"    } \
    \ ]\n```\n\n### 部署合约\n\n现在准备将智能合约部署到 Goerli 测试网。在 Remix IDE 中，点击**部署**图标（见图 7-5，步骤\
    \ 1）。确保环境选择为 **注入提供者 – Metamask**（步骤 2）。选择 MetaMask 意味着合约将部署到 MetaMask 当前连接的网络（请确保\
    \ MetaMask 已连接到 Goerli 测试网）。最后，点击**部署**按钮（步骤 3）。\n\n![](img/471881_2_En_7_Fig5_HTML.jpg)\n\
    \n一张“部署和运行交易”界面的截图，显示了部署图标、注入提供者-MetaMask 和部署等选项。\n\n**图 7-5** 在 Remix IDE 中部署合约\n\
    \nMetaMask 会提示你支付交易费用。点击**确认**，稍等片刻等待交易确认。\n\n### 测试合约\n\n智能合约部署完成后，你会在 Remix\
    \ IDE 的**已部署合约**部分看到该合约。你还会看到合约地址显示在合约名称旁边。\n\n> **注意**  \n> 要在区块链上调用智能合约，你的去中心化应用（dapp）需要合约地址及其\
    \ ABI。\n\n现在，我们尝试将一个代表学生成绩的 base64 编码 JSON 字符串的哈希值存储到区块链上。将 base64 编码的字符串粘贴到文本框中后，点击\
    \ `storeEduCredentials` 按钮（见图 7-6）。\n\n![](img/471881_2_En_7_Fig6_HTML.jpg)\n\n\
    一张已部署合约的截图，列出了 store Edu credentials 和 check Edu credentials 选项。\n\n**图 7-6**\
    \ 在 Remix IDE 中查看已部署的合约\n\n> **提示**  \n> 还记得我之前提到过，在计算 JSON 字符串哈希值之前需要对其进行 base64\
    \ 编码吗？如果直接将 JSON 字符串复制粘贴到 `storeEduCredentials` 按钮旁边的文本框中，会出现问题，因为 JSON 中的键和字符串值使用双引号，而整个\
    \ JSON 字符串在传递给智能合约函数之前也需要用双引号括起来。为了解决这个问题，一个更简单的方法是对你的 JSON 字符串进行 base64 编码，然后将\
    \ base64 编码后的结果传递给函数。\n\nMetaMask 会提示你支付交易费用。点击**确认**（见图 7-7）。\n\n![](img/471881_2_En_7_Fig7_HTML.jpg)\n\
    \n一张 Remix-Ethereum 页面的截图，其上叠加了 Goerli 测试网络界面。界面显示了预估 gas 费用以及从账户 1 交易的详细信息。\n\
    \n**图 7-7** 使用 MetaMask 支付交易费用\n\n稍等片刻，交易将被确认。现在，你可以将相同的 base64 编码字符串粘贴到 `checkEduCredentials`\
    \ 按钮旁边的文本框中（见图 7-8）。点击 `checkEduCredentials` 按钮将显示该 base64 编码字符串的哈希值存储在区块链上的区块编号（本例中为\
    \ 7881763）。如果看到结果为 0，则表示区块链上未找到该哈希值。\n\n![](img/471881_2_En_7_Fig8_HTML.jpg)\n\
    \n一张余额为 0 ETH 的截图，列出了 store Edu credentials 和 check Edu credentials 选项。\n\n**图\
    \ 7-8** 验证教育凭证先前已存储在区块链上\n\n> **提示**  \n> 按钮颜色有什么区别？橙色按钮表示你需要支付交易费用（因为你在修改区块链状态），而蓝色按钮则表示无需付费（你只是在从区块链读取数据）。\n\
    \n## 对智能合约进行进一步修改\n\n你的基础教育凭证智能合约现已上线运行。用户现在能够将教育凭证存储到区块链上，并用于验证学历资格。然而，合约仍有若干可以改进之处。在接下来的章节中，你将学习以下内容：\n\
    \n- 如何限制对智能合约中特定函数的访问权限\n- 如何在智能合约中接收付款\n- 如何在智能合约中触发事件\n- 如何将智能合约中的资金转移到另一个账户\n\
    - 如何销毁一个智能合约，使其不再可用\n"
- fmt: '### Restricting Access to Functions


    Apparently, not everyone should be allowed to store the educational credentials
    of students on the blockchain. Realistically, only an educational institution
    (usually the one that deploys the smart contract) should be allowed to do so.
    You can make some changes to the smart contract to ensure that only the contract
    owner (the one that deploys the contract) is allowed to call the `storeEduCredentials()`
    function.


    First, add in the following statements in bold to the contract:


    ```

    contract EduCredentialsStore {

    // store the owner of the contract

    address owner = msg.sender;

    ```


    The `owner` variable automatically stores the address of the account (`msg.sender`)
    that deploys it. Then, in the `storeEduCredentials()` function, add in the `require()`
    function, as follows:


    ```

    function storeEduCredentials(string calldata document) external {

    require(msg.sender == owner,

    "Only the owner of contract can store

    the credentials");

    // call storeProof() with the hash of the string

    storeProof(proofFor(document));

    }

    ```


    The `require()` function first checks that whoever is calling this function (`msg.sender`)
    must be the `owner`, or else it returns an error message (`"Only the owner of
    contract can store the credentials"`). If the condition is met, execution will
    continue; if not, the execution halts.


    In the Remix IDE, you can try out the above modifications by first deploying the
    contract using Account 1. After the contract is deployed, switch to another account
    in MetaMask and try to call the`storeEduCredentials()` function. You will see
    an error, as shown in Figure [7-9](#471881_2_En_7_Chapter.xhtml#Fig9).


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig9_HTML.jpg)


    A screenshot of the gas estimation failed message has a set of codes.


    **Figure 7-9** The Remix IDE refusing the function call


    **Caution**


    Note that a smart contract is not alterable. Once it is deployed, you won’t be
    able to make any changes to it. Hence when you redeploy a contract, a new contract
    is stored on the blockchain; you will not be able to access any of the state variables
    of the old contract in the new one.


    ### Accepting Payments in Smart Contracts


    Now that you have written a smart contract that allows educational credentials
    to be written to the blockchain, you may want to see how you can financially benefit
    from such a contract. How about earning some Ethers whenever someone needs to
    verify the educational credential of a potential employee? Well, that’s easy.


    Add the `payable` keyword to the `checkEduCredentials()` function and delete the
    `view` keyword:


    ```

    function checkEduCredentials(string calldata document) public payable returns
    (uint) {

    require(msg.value == 1000 wei,

    "This call requires 1000 wei");

    // use the hash of the string and check the proofs mapping object

    return proofs[proofFor(document)];

    }

    ```


    At the same time, add the `require()` function to indicate that the caller must
    send in 1000 Wei (represented in `msg.value`).


    **Tip**


    1 Ether is equal to 1,000,000,000,000,000,000 Wei (18 zeros). Wei is the smallest
    denomination of Ether.


    Table [7-1](#471881_2_En_7_Chapter.xhtml#Tab1) shows the various denominations
    in Ethereum. For example, 1 Ether is equal to 1,000,000,000,000,000,000 Wei (18
    zeros) and 1 Ether is equal to 0.001 Kether.


    **Table 7-1** The Various Denominations in Ether


    | Unit | Value (in Ether) |

    | --- | --- |

    | Wei | 1,000,000,000,000,000,000 (18 zeros) |

    | Kwei | 1,000,000,000,000,000 (15 zeros) |

    | Mwei | 1,000,000,000,000 (12 zeros) |

    | Gwei | 1,000,000,000 (9 zeros) |

    | Szabo | 1,000,000 (6 zeros) |

    | Finney | 1,000 (3 zeros) |

    | Ether | 1 |

    | Kether | 0.001 (3 decimal places) |

    | Mether | 0.000001 (6 decimal places) |

    | Gether | 0.000000001 (9 decimal places) |

    | Tether | 0.000000000001 (12 decimal places) |


    **Tip**


    Some of the denominations in Ether are named after famous people in the crypto
    world. For example, `Finney` was named after *Hal Finney*, who was an early Bitcoin
    contributor and received the first bitcoin transaction from Bitcoin’s creator,
    Satoshi Nakamoto. `Szabo` was named after *Nick Szabo*, who first came out with
    the concept of smart contracts. `Wei` was named after *Wei Dai*, a cryptographer
    who came up with "b-money," a concept referenced in section 2 of the Bitcoin paper.


    #### Specifying Units of Ethers in Solidity


    In Solidity, the variable `msg.value` is always expressed in Wei. In the above
    statement, you could also rewrite the comparison simply as


    ```

    msg.value == 1000

    ```


    However, Solidity allows you to compare units of Ether using the special syntax
    used above:


    ```

    msg.value == 1000 wei

    ```


    This syntax is useful when you are comparing larger amounts of Ether. For example,
    if you want to check if the incoming amount is 1 Ether, instead of doing this:


    ```

    msg.value == 1000000000000000000

    // OR

    msg.value == 1e18

    ```


    you could simply do this using a simpler syntax:


    ```

    msg.value == 1 ether

    ```


    In Solidity 0.7 onwards, you can do this for the following units: `Gwei`, `Ether`,
    and `Wei`.


    When you deploy this contract, observe that the `checkEduCredentials` button is
    now red (see Figure [7-10](#471881_2_En_7_Chapter.xhtml#Fig10)). This is due to
    the `payable` keyword in the `checkEduCredentials()` function.


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig10_HTML.jpg)


    A screenshot of the deployed contract lists check and store Edu credentials.


    **Figure 7-10** The `checkEduCredentials` button is now red


    **Tip**


    If a function button is red, it indicates that besides paying for transaction
    fees, it may also require you to send Ethers to it.


    As you did previously, go ahead and paste the base64-encoded string into the texbox
    next to the `checkEduCredentials` button and then click the `storeEduCredentials`
    button. When you click the `checkEduCredential` button, you will see the error
    message shown in Figure [7-11](#471881_2_En_7_Chapter.xhtml#Fig11).


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig11_HTML.jpg)


    A screenshot of the gas estimation failed message has a set of codes. Send and
    cancel transaction buttons are at the bottom.


    **Figure 7-11** Remix refuses the transaction because the function expects Ethers
    to be sent to it


    Apparently, this is because you did not send 1000 Wei to the contract. To fix
    this in the Remix IDE, specify 1000 Wei before you click the `checkEduCredential`
    button, as shown in Figure [7-12](#471881_2_En_7_Chapter.xhtml#Fig12).


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig12_HTML.jpg)


    A screenshot of the Remix-Ethereum I D E page. It displays the deploy and run
    transactions list with the value and check Edu credentials tabs are highlighted


    **Figure 7-12** Sending 1000 Wei to the contract


    When the transaction is confirmed, you can go to Etherscan and view the balance
    of the contract. For example, the address of my contract is `0xf15e70a24a50ef1b2c3bed0d3b033e35233562f6`.
    Hence, the details of my contract on Etherscan (for the Goerli testnet) are [`https://goerli.etherscan.io/address/0xf15e70a24a50ef1b2c3bed0d3b033e35233562f6`](https://goerli.etherscan.io/address/0xf15e70a24a50ef1b2c3bed0d3b033e35233562f6).


    **Note**


    Etherscan is a blockchain explorer that allows you to view all the detailed transaction
    information that happened on the Ethereum blockchain (including the various testnets).


    Figure [7-13](#471881_2_En_7_Chapter.xhtml#Fig13) shows that the contract has
    a balance of 0.000000000000001 Ether (which is 1000 Wei). This proves that a smart
    contract can hold Ethers.


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig13_HTML.jpg)


    A screenshot of the Goerli Etherscan page. The balance under the contract overview
    is highlighted.


    **Figure 7-13** Smart contracts can also hold Ethers'
