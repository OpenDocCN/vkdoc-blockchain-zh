- fmt: '### Cashing Out from the Contract


    When there are no winners for the game, the smart contract will hold the Ethers
    that were sent to it. To send the Ethers back to the account that deploys the
    contract, you need to add a cash-out function:


    ```

    function cashOut() public {

    require(msg.sender == owner,

    "Only the owner of contract can cash out!");

    payable(owner).transfer(address(this).balance);

    }

    ```


    Obviously, you need to ensure that only the owner (the one that deploys the contract)
    of the contract can cash out.


    ## Testing the Contract


    With the contract written, it is now time to test it to make sure it works according
    to plan. The fastest way to test it locally.


    In the Remix IDE, make sure that the Remix VM (London) environment is selected
    (see Figure [10-5](#471881_2_En_10_Chapter.xhtml#Fig5)). Observe that there are
    10 accounts each with 100 Ethers created for your testing.


    ![A screenshot of the deploy and run transactions. It includes a set of icons
    on the left panel, and text box for the environment, and drop-down options for
    account options which include 10 accounts with 100 ether.](/images/471881_2_En_10_Chapter/471881_2_En_10_Fig5_HTML.jpg)


    **Figure 10-5** - Ten accounts each with 100 Ethers are created for your testing
    use


    Using the first account, deploy the contract.


    > **Note:** The first account is the owner of the smart contract.


    When the contract is successfully deployed, you will see the various functions
    shown in Figure [10-6](#471881_2_En_10_Chapter.xhtml#Fig6).


    ![A screenshot of the deployed contracts. It includes dropdown options and has
