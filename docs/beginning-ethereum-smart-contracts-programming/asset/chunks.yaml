- fmt: "### Getting Test Ethers\n\nOnce you are connected to the Goerli Test Network,\
    \ the first thing to do is to get some free test Ethers so you can use them to\
    \ pay for transacting on the network.\n\nTo get free Ethers:\n\n![A screenshot\
    \ of the welcome screen of the Goerli Faucet page. It displays a message to stop\
    \ spam, along with a bar with the send me E T H button.](images/471881_2_En_5_Chapter/471881_2_En_5_Fig13_HTML.jpg)\n\
    \n**Figure 5-13** Get free Ethers for your account using the Goerli Faucet page\n\
    \n- Go to the Goerli Faucet page located at `https://goerlifaucet.com/` (see Figure\
    \ [5-13](#471881_2_En_5_Chapter.xhtml#Fig13)).\n\n![A screenshot of the Goerli\
    \ test network interface. It displays account 1, where the address copies to the\
    \ clipboard.](images/471881_2_En_5_Chapter/471881_2_En_5_Fig14_HTML.jpg)\n\n**Figure\
    \ 5-14** Copying the address of your account in MetaMask\n\n- Register for a free\
    \ Alchemy account at `https://auth.alchemy.com/signup`. Once you have signed up\
    \ with Alchemy, go back to the Goerli Faucet page and sign in.\n- Copy the address\
    \ of your account in MetaMask (see Figure [5-14](#471881_2_En_5_Chapter.xhtml#Fig14)).\n\
    \n![A screenshot of the welcome screen of the Goerli Faucet page. It displays\
    \ an address bar filled with a code, along with the send me E T H button.](images/471881_2_En_5_Chapter/471881_2_En_5_Fig15_HTML.jpg)\n\
    \n**Figure 5-15** Getting free Ethers from the Goerli faucet\n\n- Paste the account\
    \ address into the Goerli Faucet page (see Figure [5-15](#471881_2_En_5_Chapter.xhtml#Fig15)).\
    \ Click the **Send Me ETH** button.\n\n![A screenshot of the welcome screen of\
    \ the Goerli Faucet page. It displays an empty address bar, the send me E T H\
    \ button, and an address under your transactions.](images/471881_2_En_5_Chapter/471881_2_En_5_Fig16_HTML.jpg)\n\
    \n**Figure 5-16** The link to the transaction on Etherscan\n\n- At the bottom\
    \ of the Goerli Faucet page, you will see a transaction hyperlink (see Figure\
    \ [5-16](#471881_2_En_5_Chapter.xhtml#Fig16)). Clicking it allows you to see the\
    \ status of the transaction on Etherscan.\n\n> **Tip**  \n> Etherscan is an Ethereum\
    \ Blockchain Explorer. It allows you to search the blockchain for transactions,\
    \ addresses, tokens, prices, and activities happening on the blockchain.\n\n![A\
    \ screenshot of the Goerli test network interface. It displays the assets under\
    \ account 1 with 0.05 Goerli E T H.](images/471881_2_En_5_Chapter/471881_2_En_5_Fig17_HTML.jpg)\n\
    \n**Figure 5-17** The free Ether(s) credited into your account\n\n- After a while,\
    \ you should see 0.05 Ethers deposited into your account (see Figure [5-17](#471881_2_En_5_Chapter.xhtml#Fig17)).\n\
    \n> **Tip**  \n> You can only request 0.05 free Ethers every 24 hours (this is\
    \ the policy at the time of writing). If you want more, try setting up MetaMask\
    \ on multiple computers and create additional Alchemy accounts.\n\nIt is important\
    \ to remember that the amount of Ethers in your account is valid only for the\
    \ particular Ethereum network that you have obtained it from. For example, if\
    \ you switch to another test network, say the Sepolia Test Network, you should\
    \ see 0 for your account balance.\n\n### Creating Additional Accounts\n\nMetaMask\
    \ allows you to create multiple accounts. This is useful when you want to learn\
    \ how to transfer Ethers from one account to another. It is also useful when testing\
    \ and debugging your smart contracts.\n\nTo create additional accounts in MetaMask:\n\
    \n![A screenshot of the Goerli test network interface. It displays a list under\
    \ the My accounts option, where create account option highlights with a rectangular\
    \ outline.](images/471881_2_En_5_Chapter/471881_2_En_5_Fig18_HTML.jpg)\n\n**Figure\
    \ 5-18** Creating new accounts in MetaMask\n\n- Click the colored icon located\
    \ at the top right corner of MetaMask (see Figure [5-18](#471881_2_En_5_Chapter.xhtml#Fig18)).\n\
    \n![A screenshot of the Goerli test network interface. It displays the assets\
    \ under account 2, where it has 0 Goerli E T H.](images/471881_2_En_5_Chapter/471881_2_En_5_Fig19_HTML.jpg)\n\
    \n**Figure 5-19** The second newly created account\n\n- Click the **Create account**\
    \ item.\n- In the **NEW ACCOUNT** screen, click **Create**.\n- You will see the\
    \ new account created (Account 2, see Figure [5-19](#471881_2_En_5_Chapter.xhtml#Fig19)).\n\
    \n> **Tip**  \n> You can create as many accounts as you want. In fact, for testing\
    \ your smart contracts, you should create at least three accounts for testing\
    \ purposes.\n\n![A screenshot of the Goerli test network interface. It displays\
    \ a list under the My accounts option, where account 2 is selected.](images/471881_2_En_5_Chapter/471881_2_En_5_Fig20_HTML.jpg)\n\
    \n**Figure 5-20** Switching between accounts in MetaMask\n\n- To switch between\
    \ accounts, click the colored icon (see Figure [5-20](#471881_2_En_5_Chapter.xhtml#Fig20))\
