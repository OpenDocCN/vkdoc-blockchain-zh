    In MetaMask, click the **Assets** tab and click the **Import tokens** link at
    the bottom of the screen (see Figure[11-13](#471881_2_En_11_Chapter.xhtml#Fig13)).
    In the next screen, paste the token contract you copied from the Remix IDE. The
    token symbol will automatically be displayed. Click the **Add custom token** button.
    You will see that your account has 1000 WML tokens. Make sure that the account
    that you are adding the token to is the same account that deployed the token contract.


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig13_HTML.jpg)


    3 screenshots of the meta mask notification pages of account 1 with assets, and
    import tokens of W M L, along with the back and highlighted import token buttons.


    **Figure 11-13** Adding the token to MetaMask


    ### What Can You Do with the Token?


    Now that you have created the token, what can you do with it? It is up to you
    to create a utility for the token. You can promote your token as a form of investment
    or a representation of an asset that you are selling (such as properties or securities).


    To sell a token, you can ask the recipient to pay you in fiat currency and then
    transfer them the token. Alternatively, you can also code your token contract
    to receive Ethers and then programmatically transfer the token to the sender of
    the Ether.


    ### Using Tokens for Smart Contract Payments


    In Chapters[7](#471881_2_En_7_Chapter.xhtml) and[10](#471881_2_En_10_Chapter.xhtml)
    of this book, you wrote a contract that accepts Ethers for a service (the `checkEduCredentials()`
    function). What if instead of accepting Ether, you accept tokens for payment?
    Well, this can be done quite easily. Let’s modify the `EduCredentialsStore.sol`
    contract from Chapter[10](#471881_2_En_10_Chapter.xhtml) with the following additional
    statements in bold:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    import "./token.sol";

    contract EduCredentialsStore {

    // store the owner of the contract

    address owner = msg.sender;

    MyToken token = MyToken(address(

    0xc276658A795E05374CE2BCB160c22b6A4b9eE16C));

    //---store the hash of the strings and their

    // corresponding block number---

    // key is bytes32 and val is uint

    mapping (bytes32 => uint) private proofs;

    //---define an event---

    event Document(

    address from,

    bytes32 hash,

    uint blockNumber

    );

    //==========================================

    // return the token balance in the contract

    //==========================================

    function getBalance() public view returns (uint256) {

    return token.balanceOf(address(this));

    }

    //--------------------------------------------------

    // Store a proof of existence in the contract state

    //--------------------------------------------------

    function storeProof(bytes32 proof) private {

    // use the hash as the key

    proofs[proof] = block.number;

    // fire the event

    emit Document(msg.sender, proof, block.number);

    }

    //----------------------------------------------

    // Calculate and store the proof for a document

    //----------------------------------------------

    function storeEduCredentials(string calldata

    document) external {

    require(msg.sender == owner,

    "Only the owner of contract can store the

    credentials");

    // call storeProof() with the hash of the string

    storeProof(proofFor(document));

    }

    //--------------------------------------------

    // Helper function to get a document''s sha256

    //--------------------------------------------

    // Takes in a string and returns the hash of the

    // string

    function proofFor(string calldata document) private

    pure returns (bytes32) {

    // converts the string into bytes array and then

    // hash it

    return sha256(bytes(document));

    }

    //-----------------------------------------------

    // Check if a document has been saved previously

    //-----------------------------------------------

    function checkEduCredentials(string calldata

    document) public payable returns (uint){

    // require(msg.value == 1000 wei,

    //   "This call requires 1000 wei");

    // msg.sender is the account that calls the

    // token contract

    // go and check the allowance set by the caller

    uint256 approvedAmt =

    token.allowance(msg.sender, address(this));

    // the amount is based on the base unit in the

    // token

    uint requiredAmt = 1000;

    // ensure the caller has enough tokens approved

    // to pay to the contract

    require(approvedAmt >= requiredAmt,

    "Token allowance approved is less than what you

    need to pay");

    // transfer the tokens from sender to token contract

    token.transferFrom(msg.sender,

    payable(address(this)), requiredAmt);

    // use the hash of the string and check the proofs

    // mapping object

    return proofs[proofFor(document)];

    }

    function cashOut() public {

    require(msg.sender == owner,

    "Only the owner of contract can cash out!");

    payable(owner).transfer(address(this).balance);

    }

    }

    ```


    With these additional statements in bold, you make the following changes to the
    `EduCredentialsStore` contract:


    - Import the `token.sol` token contract. This is the token contract you deployed
    earlier in this chapter.

    - Create an instance of the `MyToken` contract. You need to specify the address
    of the deployed token contract.

    - Add a function called `getBalance()`. This allows you to know the token balance
    held by the smart contract.'
