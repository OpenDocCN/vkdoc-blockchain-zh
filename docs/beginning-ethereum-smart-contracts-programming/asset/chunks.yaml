  raw: '### Deploying the Contract to the Testnet


    With the contract tested and working correctly, it is time to deploy the contract
    onto the Goerli testnet so that you can build a front end to interface with it.


    In MetaMask, ensure that you are connected to the Goerli testnet. Then, back in
    the Remix IDE, change the environment to **Injected Provider – MetaMask** (see
    Figure [10-13](#471881_2_En_10_Chapter.xhtml#Fig13)).


    ![](images/471881_2_En_10_Chapter/471881_2_En_10_Fig13_HTML.jpg)


    A screenshot of the deploy and run transactions. It includes drop-down options
    for environment and account. The environment option highlights injected provider
    metamask.


    Figure 10-13


    Change the environment to Injected Provider – MetaMask


    Click the **Deploy** button to deploy the contract. For reference, the address
    of my deployed contract is 0xA0a4a98562587211CAbdC910721e0020A52AcE11.


    ## Creating the Web Front End


    Let’s now create the web front end for the lottery game. Create a new text file
    and name it as `OnlineBetting.html`. Save it in the `web3projects` folder (this
    folder was first created in Chapter [8](#471881_2_En_8_Chapter.xhtml)).


    Populate the `OnlineBetting.html` file as follows:


    ```


    Document


    Ethereum Lottery


    Number to wager


    Number of wei to wager


    Bet


    //-----Start of JavaScript functions-----

    async function loadWeb3() {

    //---if MetaMask is available on your web browser---

    if (window.ethereum) {

    web3 = new Web3(window.ethereum);

    //---connect to account---

    const account = await window.ethereum.request(

    {method: ''eth_requestAccounts''});

    console.log(account)

    } else {

    //---set the provider you want from Web3.providers---

    web3 = new Web3(

    new Web3.providers.HttpProvider(

    "http://localhost:8545"));

    var version = web3.version;

    console.log("Version of web3: ", version);

    }

    }

    async function loadContract() {

    abi = [ { "anonymous": false, "inputs": [ { "indexed": false, "internalType":
    "uint256", "name": "players", "type": "uint256" }, { "indexed": false, "internalType":
    "uint256", "name": "maxPlayers", "type": "uint256" } ], "name": "Status", "type":
    "event" }, { "anonymous": false, "inputs": [ { "indexed": false, "internalType":
    "address", "name": "winner", "type": "address" }, { "indexed": false, "internalType":
    "uint256", "name": "amount", "type": "uint256" } ], "name": "Winner", "type":
    "event" }, { "inputs": [ { "internalType": "uint256", "name": "winningNumber",
    "type": "uint256" } ], "name": "announceWinners", "outputs": [], "stateMutability":
    "nonpayable", "type": "function" }, { "inputs": [ { "internalType": "uint256",
    "name": "number", "type": "uint256" } ], "name": "bet", "outputs": [], "stateMutability":
    "payable", "type": "function" }, { "inputs": [], "name": "cashOut", "outputs":
    [], "stateMutability": "nonpayable", "type": "function" }, { "inputs": [], "name":
    "getGameStatus", "outputs": [ { "internalType": "uint256", "name": "", "type":
    "uint256" }, { "internalType": "uint256", "name": "", "type": "uint256" } ], "stateMutability":
    "view", "type": "function" }, { "inputs": [], "name": "getWinningNumber", "outputs":
    [ { "internalType": "uint256", "name": "", "type": "uint256" } ], "stateMutability":
    "view", "type": "function" } ]

    //---change the address below to that of your own---

    address = ''0x2043C325084A74A3a5105ddC5F999ed24b56D77a''

    return await new web3.eth.Contract(abi,address);

    }

    async function getCurrentAccount() {

    const accounts = await web3.eth.getAccounts();

    console.log(accounts)

    return accounts[0];

    }

    async function load() {

    await loadWeb3();

    lottery = await loadContract();

    // handle the Winner event fired by the smart contract

    lottery.events.Winner()

    .on(''data'', function(event){

    console.log(event.returnValues[0]);  // winner address

    console.log(event.returnValues[1]);  // amount

    $("#result").append("Winner: " + event.returnValues[0] +

    ", Amount: " + event.returnValues[1] +

    " wei");

    })

    // handle the Status event fired by the smart contract

    lottery.events.Status()

    .on(''data'', function(event){

    console.log(event.returnValues[0]);  // players

    console.log(event.returnValues[1]);  // maxPlayers

    $("#result").append("Status of game: " + event.returnValues[0] +

    " of " + event.returnValues[1] + "");

    })

    // check the current status of the game

    lottery.methods.getGameStatus()

    .call(function(error, result) {

    if(!error) {

    $("#result").append("Status of game: " +

    result[0].toString() + " of " +

    result[1].toString()+ "");

    console.log("Status of game: " + result[0] +

    " of " + result[1]);

    } else

    console.error(error);

    });

    // place bet

    $("#btnBet").click(async function() {

    console.log($("#weiToWager").val());

    //---get the account---

    const account = await getCurrentAccount();

    // call the bet() function

    lottery.methods.bet($("#numberToWager").val())

    .send(

    {

    from: account,

    value: $("#weiToWager").val()

    }

    )

    .on(''transactionHash'', function(hash){

    $("#result").append("Bet has been submitted");

    console.log("Transaction hash: " + hash);

    })

    .on(''receipt'', function(receipt){

    $("#result").append("Bet has been accepted");

    console.log("Receipt: " + receipt.toString());

    })

    .on(''error'', function(error, receipt) {

    $("#result").append("An error has occurred. Betting was not successful");

    console.log("Error: " + error + "," + receipt.toString());

    });

    });

    }

    load();

    //-----End of JavaScript functions-----


    ```


    Caution


    Remember to change the address of the contract to that of your own.


    To test the web front end, type the following commands in terminal:


    ```

    $ cd ~/webprojects

    $ serve

    ```


    Using three instances of the Chrome browser, load each browser with the following
    URL: `http://localhost:3000/OnlineBetting.html`. You should see all display the
    same statuses (see Figure [10-14](#471881_2_En_10_Chapter.xhtml#Fig14)).


    ![](images/471881_2_En_10_Chapter/471881_2_En_10_Fig14_HTML.jpg)


    3 screenshots of the chrome browser with the page containing the header of Ethereum
    Lottery. The number to wager with the text box, the number of well to wager with
    the text box, and bet option button with the status of the game as 0 of 3 are
    at the bottom of the pages.


    Figure 10-14


    Three instances of Chrome displaying the same page and game status


    Using Account 1 (on the left browser), place a bet on the number 1 using 2 Ethers
    and click the **Bet** button. Observe that MetaMask will pop up a window showing
    the amount to be sent to the contract. Click **CONFIRM**. Once you click the **CONFIRM**
    button, the first browser will show the message “*Bet has been submitted.*” After
    a while (when the transaction has been confirmed), the app will also display two
    additional messages (may not be displayed in any specific order; see Figure [10-15](#471881_2_En_10_Chapter.xhtml#Fig15)):


    ![](images/471881_2_En_10_Chapter/471881_2_En_10_Fig15_HTML.jpg)


    A screenshot of the chrome browser with the page containing the header of Ethereum
    Lottery. The number to wager is 1, and the number of wel to wager is 2000\. The
    bet button is present. The status of the game is 0 of 3 and 1 of 3.


    Figure 10-15


    The messages you will see when you have submitted a bet and when the transaction
    has been confirmed


    *   Status of game: 1 of 3


    *   Bet has been accepted


    On the second browser,


    *   Using Account 2, place a bet on the number 5 using 1000 Wei.


    *   Click the **Bet** button.


    On the third browser,


    *   Using Account 3, place a bet on the number 5 using 2000 Wei.


    *   Click the **Bet** button.'
