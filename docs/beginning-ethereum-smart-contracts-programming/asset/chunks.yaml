  trans: '

    ### 从合约中提现


    当游戏没有赢家时，智能合约会持有发送给它的以太币。要将以太币返还给部署合约的账户，你需要添加一个提现函数：


    ```

    function cashOut() public {

    require(msg.sender == owner,

    "Only the owner of contract can cash out!");

    payable(owner).transfer(address(this).balance);

    }

    ```


    显然，你需要确保只有合约的**所有者**（即部署合约的人）才能提现。


    ## 测试合约


    合约编写完成后，就该测试它是否按预期运行了。最快的测试方式是在本地进行。


    在 Remix IDE 中，确保选择了 Remix VM (London) 环境（见图 10-5）。请注意，这里创建了 10 个账户，每个账户有 100 个以太币供你测试。


    ![部署和运行交易界面的截图。左侧面板包含一组图标，以及环境文本框，账户选项的下拉菜单中包含 10 个账户，每个有 100 个以太币。](img/471881_2_En_10_Fig5_HTML.jpg)


    **图 10-5** - 创建了 10 个账户，每个账户有 100 个以太币供你测试使用


    使用第一个账户部署合约。


    > **注意：** 第一个账户是智能合约的所有者。


    当合约成功部署后，你将看到如图 10-6 所示的各项功能。


    ![已部署合约的截图。包含下拉选项，余额为 0 ETH。底部有 5 个区块标签：announce、bet、cash out、get game 和 get winning
    选项。](img/471881_2_En_10_Fig6_HTML.jpg)


    **图 10-6** - 合约中的各项功能


    使用同一个第一个账户：


    ![投注数字的截图。包含数值文本框、合约下拉选项、部署按钮、发布到 IPFS 的复选框、2 个地址按钮和从地址加载合约。包含交易记录和已部署合约详情。高亮显示了
    bet 选项。](img/471881_2_En_10_Fig7_HTML.jpg)


    **图 10-7** - 下注数字 1，金额 2000 Wei


    *   使用 2000 Wei 下注数字 1（见图 10-7）。

    *   点击 `bet` 按钮。


    然后，点击 `getGameStatus` 按钮，你应该会看到结果为 1 和 3（见图 10-8）。1 表示有一名玩家已下注，3 表示最大玩家数量。


    ![已部署合约的截图。包含下拉选项，余额为 0 ETH。底部有 5 个区块标签：announce、bet、cash out、get game 和 get winning
    选项。](img/471881_2_En_10_Fig8_HTML.jpg)


    **图 10-8** - 获取游戏状态


    使用第二个账户：


    *   使用 1000 Wei 下注数字 5。

    *   点击 `bet` 按钮。


    使用第三个账户：


    *   使用 2000 Wei 下注数字 5。

    *   点击 `bet` 按钮。


    表 10-1 总结了投注状态。


    **表 10-1** - 下注的数字


    | 账户 | `numberWagered` | `amountWagered` (Wei) |

    | --- | --- | --- |

    | 1 (所有者) | 1 | 2000 |

    | 2 | 5 | 1000 |

    | 3 | 5 | 2000 |


    > **注意：** 下注时，请记得在 Remix IDE 的“账户”部分切换账户。


    ### 公布赢家


    现在三位玩家都已下注，是时候公布赢家了。


    > **提示：** 你不必等到所有三位玩家都下注后再公布赢家。如果你想随时结束游戏，可以调用 `announceWinners` 按钮。即使只有两位玩家下注，你也可以结束游戏。


    使用第一个账户：


    ![已部署合约的截图。包含下拉选项，余额为 0.000000000000005 ETH。底部有 2 个区块标签：announce 和 bet。高亮显示了余额和
    announce 选项。](img/471881_2_En_10_Fig9_HTML.jpg)


    **图 10-9** - 公布中奖数字


    *   输入数字 5（见图 10-9）。

    *   点击 `announceWinners` 按钮。


    在 Remix IDE 的底部，你应该会看到智能合约触发的事件（见图 10-10）。


    ![一段 22 行的程序代码展示了包含赢家数字和金额的智能合约。方框内显示了赢家和金额的语法。](img/471881_2_En_10_Fig10_HTML.jpg)


    **图 10-10** - 智能合约触发的事件，包含赢家地址及中奖金额


    由于有两位玩家下注了数字 5，因此有两位赢家。第二位和第三位玩家的中奖金额分别为 1666 和 3333。中奖金额的计算方式如下：


    *   总下注金额 = 5000 Wei

    *   总中奖下注金额 = 1000 + 2000 = 3000 Wei

    *   第二位账户的中奖金额 = (1000/3000) * 5000 = 1666 Wei

    *   第三位账户的中奖金额 = (2000/3000) * 5000 = 2333 Wei


    请注意，由于四舍五入，合约中会剩余 1 Wei 的余额（见图 10-11）。


    ![已部署合约的截图。包含下拉选项，余额为 0.0000000000000000001 ETH。底部有 5 个区块标签：announce、bet、cash
    out、get game（包含数字 0: uint256: 0, 1: uint256: 3）和 get winning 选项。](img/471881_2_En_10_Fig11_HTML.jpg)


    **图 10-11** - 合约中的余额


    点击 `getGameStatus` 按钮，你会看到玩家数量已重置为 0。


    ### 保存合约的 ABI


    为了准备创建投注合约的前端，请点击 **SOLIDITY COMPILER** 选项卡底部的 `ABI` 按钮（见图 10-12）。


    ![Solidity 编译器的截图。包含编译器文本栏以及编译投注方案、编译并运行脚本的按钮。在合约选项下，有下拉选项和发布到 IPFS、发布到 Swarm
    以及编译详情的按钮。高亮显示了 ABI 选项。](img/471881_2_En_10_Fig12_HTML.jpg)


    **图 10-12** - 点击 ABI 按钮获取合约的 ABI


    将 ABI 粘贴到文本文件中，以便日后参考。以下是 ABI，供你方便使用：


    ```

    [ { "anonymous": false, "inputs": [ { "indexed": false, "internalType": "uint256",
    "name": "players", "type": "uint256" }, { "indexed": false, "internalType": "uint256",
    "name": "maxPlayers", "type": "uint256" } ], "name": "Status", "type": "event"
    }, { "anonymous": false, "inputs": [ { "indexed": false, "internalType": "address",
    "name": "winner", "type": "address" }, { "indexed": false, "internalType": "uint256",
    "name": "amount", "type": "uint256" } ], "name": "Winner", "type": "event" },
    { "inputs": [ { "internalType": "uint256", "name": "winningNumber", "type": "uint256"
    } ], "name": "announceWinners", "outputs": [], "stateMutability": "nonpayable",
    "type": "function" }, { "inputs": [ { "internalType": "uint256", "name": "number",
    "type": "uint256" } ], "name": "bet", "outputs": [], "stateMutability": "payable",
    "type": "function" }, { "inputs": [], "name": "cashOut", "outputs": [], "stateMutability":
    "nonpayable", "type": "function" }, { "inputs": [], "name": "getGameStatus", "outputs":
    [ { "internalType": "uint256", "name": "", "type": "uint256" }, { "internalType":
    "uint256", "name": "", "type": "uint256" } ], "stateMutability": "view", "type":
    "function" }, { "inputs": [], "name": "getWinningNumber", "outputs": [ { "internalType":
    "uint256", "name": "", "type": "uint256" } ], "stateMutability": "view", "type":
    "function" } ]

    ```

