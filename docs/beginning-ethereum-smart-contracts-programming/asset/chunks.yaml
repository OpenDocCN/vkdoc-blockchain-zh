    * Environment: production

    WARNING: Do not use the development server in a production environment.

    Use a production WSGI server instead.

    * Debug mode: off

    * Running on http://0.0.0.0:5000/ (Press CTRL+C to quit)

    ```


    Your first blockchain on the first node is now running. It is also listening at
    port 5000, where you can add transactions to it and mine a block.


    In another terminal window, type the following command to view the contents of
    the blockchain running on the node:


    ```

    $ curl http://localhost:5000/blockchain

    ```


    You will see the following output (formatted for clarity):


