    ### DeFi 的组成部分


    要实现 DeFi，需要以下关键组成部分：


    - **去中心化基础设施**：一个区块链实现，例如以太坊

    - **支持智能合约的以太坊**：一个很好的例子是 `ERC-20` 代币标准，它允许您构建*同质化*代币。

    - **稳定币**：稳定币是一种同质化代币，通常与某种资产（如美元、加密货币、黄金等）挂钩。稳定币也可以不锚定任何资产，其价格通过智能合约按算法进行调整。


    稳定币在 DeFi 中扮演着非常重要的角色，因为它们不仅取代了法定货币；它们在 DeFi 借贷市场中也是日益重要的资产，用户可以将自己的稳定币锁定在诸如 `Compound`
    和 `Aave` 这样的平台中，并赚取年化收益率 0.15% 至 12% 的贷款利息。


    > **提示**

    > `Compound` 和 `Aave` 都是去中心化的加密货币协议，允许用户借出和借入加密货币。


    在下一节中，您将了解更多关于稳定币以及当今存在的不同类型的信息。


    ## 稳定币


    在第 11 章中，您了解了 `ERC-20` 规范，它可以用来创建您自己的代币。您还了解到，代币可以作为一种投资形式，并用于支付智能合约服务。在本节中，您将了解代币在现实世界中的一种具体实现，通常被称为*稳定币*。


    那么，到底什么是稳定币？稳定币是一种加密货币，其价格锚定于某种参考资产，例如法定货币、其他加密货币或黄金。顾名思义，稳定币旨在抵御其他加密货币无法承受的价格波动。


    > **注意**

    > 稳定币的全部目的在于通过保持稳定性来最小化价格波动。


    ### 稳定币背后的动机


    要真正理解稳定币背后的动机，您只需看看比特币就知道了。在 2011 年，一 `BTC`（比特币）价值大约 1 美元。然而，在 2021 年的峰值时，一 `BTC`
    价值超过 65,000 美元。想象一下，在 2011 年用四 `BTC` 支付两杯星巴克咖啡的费用。同样的四 `BTC` 在 2021 年可以为您买一辆法拉利！


    显然，由于价格的剧烈波动，将比特币用作法定货币替代品的目标是不可行的！


    稳定币主要有三种类型：


    - **法币抵押稳定币**：由 `USD`、`EUR`、`GBP` 或其他法定货币支持的稳定币

    - **加密货币抵押稳定币**：由其他加密货币如以太坊和比特币支持的稳定币

    - **无抵押稳定币**：也称为算法稳定币，这类稳定币不持有任何形式的抵押品。为了保持价值稳定，它们依赖智能合约，根据市场需求改变稳定币的供应量。

    - **商品抵押稳定币**：由黄金等商品支持的稳定币。一个代币等值于一单位所锚定的商品（例如一盎司黄金）。


    以下各节将更详细地讨论前三种类型的稳定币。


    ### 法币抵押稳定币


    法币抵押稳定币是一种由法定货币（如美元、欧元或英镑）支持的稳定币。法币抵押稳定币的一个很好的例子是 **USD Coin** (**USDC**)。


    > **注意**

    > USD Coin 由一个名为 Centre 的联盟管理，该联盟由 Circle 创立，成员包括加密货币交易所 Coinbase 和比特币挖矿公司 Bitmain（Circle
    的投资方）。


    图 13-1 显示了 USDC 的工作方式。


    ![](img/471881_2_En_13_Fig1_HTML.jpg)


    *示意图展示了用户将 1 美元存入发行人的银行账户，这 1 美元将被保存在美国监管金融机构的账户中，发行人使用智能合约生成 1 个 USDC 并将其发送给用户。*


    **图 13-1** – 购买 USDC 时发生的情况


    购买 USDC 的步骤：


    1. 用户将 1 美元发送到发行人的银行账户。

    2. 这 1 美元将被保存在美国监管的发行人银行账户中。

    3. 发行人使用智能合约生成一个 `USDC` `ERC-20` 代币。

    4. 然后 `USDC` 代币被转移到用户的钱包中。


    那么，您为什么要购买 USDC？使用 USDC，您无需传统银行账户，即可廉价且近乎即时地向全球任何地方汇款（相对于可能费用高昂且耗时数日的电汇，这是一个巨大的进步）。您还可以通过在
    Coinbase 账户中持有的 USDC 获得奖励。此外，您还可以通过在各种去中心化金融 (DeFi) 应用程序中借出您的 USDC 来获得更高的收益。


    #### 法币抵押稳定币示例


    除了 USDC，其他法币抵押稳定币的例子还包括 **BUSD** (Binance USD)、**TUSD** (True USD) 和 **USDT**
    (USD Tether)。


    ### 加密货币抵押稳定币


    下一种类型的稳定币是加密货币抵押稳定币。加密货币抵押稳定币不是将稳定币与法定货币挂钩，而是与某些加密货币挂钩。


    加密货币抵押稳定币的一个很好的例子是 **DAI**。`DAI` 是一种运行在以太坊上的加密货币抵押稳定币，旨在保持每个代币的价值为 1 美元。与法币抵押稳定币不同，`DAI`
    不由银行账户中的美元支持。相反，它由 `Maker DAO` 平台上的加密货币抵押品支持。`Maker DAO` 是一个以太坊区块链上进行借贷、储蓄以及发行稳定加密货币的技术开发组织。


    > **提示**

    > `DAO` 代表去中心化自治组织。


    #### 到底什么是 `DAO`？


    `DAO` 的核心思想是，它是一个被设计为由代码（在以太坊世界中本质上就是智能合约）自动运行和管理的组织。乍一看，`DAO` 的想法似乎很奇怪。但让我们看看当今组织是如何运作的（图
    13-2）。


    ![](img/471881_2_En_13_Fig2_HTML.jpg)


    *示意图以苹果和微软的组织或公司开始，引出董事会会议，股东对公司决策进行投票，CEO 执行计划。*


    **图 13-2** – 当今组织的运作方式


    一个典型的组织有董事会成员，他们召开董事会会议来讨论和规划公司的战略方向。董事会做出的重大决策必须得到股东批准，股东对公司的决策进行投票。投票统计完成后，公司的
    CEO 执行该计划。


    而一个 `DAO` 则没有董事会成员。相反，`DAO` 是使用智能合约创建的。`DAO` 的核心是 `DAO` 的代币，该代币用于管理组织内的成员资格以及
    `DAO` 内部的结构（图 13-3）。


    ![](img/471881_2_En_13_Fig3_HTML.jpg)


    *示意图显示拥有不同数量代币的用户，他们有权提议 DAO 和投票选择项目，然后 DAO 启动代币。*


    **图 13-3** – `DAO` 的运作方式


    `DAO` 中的每个成员可以持有不同数量的代币，这赋予了他们提议和投票选择项目的投票权。


    > **提示**

    > 要了解更多关于 `DAO` 的信息，请查阅我在 [`https://bit.ly/3iviryS`](https://bit.ly/3iviryS) 上的文章。

