    ### 你能用代币做什么？


    既然你已经创建了代币，你能用它做什么呢？由你来为代币创造一种实用功能。你可以将代币推广为一种投资形式，或者是你正在出售的资产（例如房产或证券）的代表。


    要出售代币，你可以要求接收方以法定货币向你付款，然后你将代币转移给他们。或者，你也可以编写你的代币合约来接收以太币，然后通过编程方式将代币转移给以太币的发送方。


    ### 使用代币进行智能合约支付


    在本书的第 7 章和第 10 章中，你编写了一个接受以太币作为服务费用的合约（`checkEduCredentials()` 函数）。如果不用以太币，而是接受代币作为支付方式呢？嗯，这很容易实现。让我们修改第
    10 章的 `EduCredentialsStore.sol` 合约，添加以下粗体显示的额外语句：


    ```

