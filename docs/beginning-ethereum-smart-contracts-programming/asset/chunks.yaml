    ### Getting the ABI and Bytecode of the Contract


    Now that the contract has been tested and works correctly, it is time to test
    it on a real blockchain. But before you do so, there is something else you need
    to understand. When a contract is compiled, there are two items that are generated:


    - **ABI** (application binary interface): The ABI is a JSON string that describes
    the makeup of the contract: the functions as well as the parameter types of each
    function.

    - **Bytecode**: When a contract is compiled, it is compiled into opcodes (think
    of opcode as the assembly language for your computer). Each opcode is then compiled
    into its hexadecimal counterpart known as bytecode. The bytecode is basically
    a collection of each opcode’s hexadecimal representation.


    In the **Compile** tab, you will see two icons representing ABI and bytecode (see
    Figure [6-10](#471881_2_En_6_Chapter.xhtml#Fig10)). If you click the ABI icon,
    the ABI will be copied to the clipboard.


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig10_HTML.jpg)


    A screenshot depicts the contract window. It exhibits the calculator, publish
    on I p f s, publish on the swarm, and compilation details, and the selected A
    B I and bytecode.


    Figure 6-10


    The ABI and Bytecode buttons provide easy access to the ABI and bytecode of the
    contract


    The ABI looks like the following:


    ```

    [

    {

    "inputs": [

    {

    "internalType": "uint256",

    "name": "num1",

    "type": "uint256"

    },

    {

    "internalType": "uint256",

    "name": "num2",

    "type": "uint256"

    }

    ],

    "name": "arithmetics",

    "outputs": [

    {

    "internalType": "uint256",

    "name": "sum",

    "type": "uint256"

    },

    {

    "internalType": "uint256",

    "name": "product",

    "type": "uint256"

    }

    ],

    "stateMutability": "pure",

    "type": "function"

    },

    {

    "inputs": [

    {

    "internalType": "uint256",

    "name": "num1",

    "type": "uint256"

    },

    {

    "internalType": "uint256",

    "name": "num2",

    "type": "uint256"

    }

    ],

    "name": "multiply",

    "outputs": [

    {

    "internalType": "uint256",

    "name": "",

    "type": "uint256"

    }

    ],

    "stateMutability": "pure",

    "type": "function"

    }

    ]

    ```


    Likewise, click the **Bytecode** button and paste it onto a text editor. It will
    look like Figure [6-11](#471881_2_En_6_Chapter.xhtml#Fig11).


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig11_HTML.jpg)


    A program code of 7 lines presents the object, opcodes, and source map of the
    debug data, along with its generated sources and link references.


    Figure 6-11


    The bytecode


    Specifically, the value of the `object` key contains the actual bytecode (think
    of it as machine language) of the contract that will be deployed onto the blockchain.
    Figure [6-12](#471881_2_En_6_Chapter.xhtml#Fig12) shows the steps performed by
    the Remix IDE when it compiles your smart contract.


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig12_HTML.jpg)


    A set of 3 codes. Solidity code leads to O p codes, then bytecode. Solidity contains
    10 line program code.


    Figure 6-12


    How the Remix IDE compiles your smart contract


    For your reference, the bytecode for your smart contract looks like this:


    ```

    

