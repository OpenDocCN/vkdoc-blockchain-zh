    **提示**

    `admin`对象派生自`web3`对象。因此，`admin.addPeer()`的全名是`web3.admin.addPeer()`。`admin`对象允许你与底层区块链进行交互。


    你会看到一大堆信息。特别要注意`enode`键（已加粗强调）。在`enode`值的末尾，请注意端口号`30303`（节点 1 使用的端口）。


