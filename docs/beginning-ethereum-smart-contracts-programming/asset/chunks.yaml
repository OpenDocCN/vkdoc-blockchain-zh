    \ and self.valid_chain(chain):\n                    max_length = length\n    \
    \                new_chain = chain\n        # replace our chain if we discovered\
    \ a new, valid chain longer than ours\n        if new_chain:\n            self.chain\
    \ = new_chain\n            return True\n        return False\n\n    # determine\
    \ if a given blockchain is valid\n    def valid_chain(self, chain):\n        last_block\
    \ = chain[0]   # the genesis block\n        current_index = 1       # starts with\
    \ the second block\n        while current_index < len(chain):\n            block\
    \ = chain[current_index]\n            if block['hash_of_previous_block'] != self.hash_block(last_block):\n\
