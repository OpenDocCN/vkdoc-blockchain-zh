- fmt: "### 区块链核心代码\n\n```\nimport sys\nimport hashlib\nimport json\nfrom time import\
    \ time\nfrom uuid import uuid4\nfrom flask import Flask, jsonify, request\nimport\
    \ requests\nfrom urllib.parse import urlparse\n\nclass Blockchain(object):\n \
    \   difficulty_target = \"0000\"\n\n    def hash_block(self, block):\n       \
    \ block_encoded = json.dumps(block, sort_keys=True).encode()\n        return hashlib.sha256(block_encoded).hexdigest()\n\
    \n    def __init__(self):\n        self.nodes = set()\n        # stores all the\
    \ blocks in the entire blockchain\n        self.chain = []\n        # temporarily\
    \ stores the transactions for the current block\n        self.current_transactions\
    \ = []\n        # create the genesis block with a specific fixed hash of previous\
    \ block\n        # genesis block starts with index 0\n        genesis_hash = self.hash_block(\"\
    genesis_block\")\n        self.append_block(\n            hash_of_previous_block\
    \ = genesis_hash,\n            nonce = self.proof_of_work(0, genesis_hash, [])\n\
    \        )\n\n    # use PoW to find the nonce for the current block\n    def proof_of_work(self,\
    \ index, hash_of_previous_block, transactions):\n        # try with nonce = 0\n\
    \        nonce = 0\n        # try hashing the nonce together with the hash of\
    \ the previous block until it is valid\n        while self.valid_proof(index,\
    \ hash_of_previous_block, transactions, nonce) is False:\n            nonce +=\
    \ 1\n        return nonce\n\n    def valid_proof(self, index, hash_of_previous_block,\
    \ transactions, nonce):\n        # create a string containing the hash of the\
    \ previous block and the block content, including the nonce\n        content =\
    \ f'{index}{hash_of_previous_block}{transactions}{nonce}'.encode()\n        #\
    \ hash using sha256\n        content_hash = hashlib.sha256(content).hexdigest()\n\
    \        # check if the hash meets the difficulty target\n        return content_hash[:len(self.difficulty_target)]\
    \ == self.difficulty_target\n\n    # creates a new block and adds it to the blockchain\n\
    \    def append_block(self, nonce, hash_of_previous_block):\n        block = {\n\
    \            'index': len(self.chain),\n            'timestamp': time(),\n   \
    \         'transactions': self.current_transactions,\n            'nonce': nonce,\n\
    \            'hash_of_previous_block': hash_of_previous_block\n        }\n   \
    \     # reset the current list of transactions\n        self.current_transactions\
    \ = []\n        # add the new block to the blockchain\n        self.chain.append(block)\n\
