    \ msg.value 单位是 wei）\n  require( msg.value >= MIN_WAGER,\n    string.concat(\"\
    Minimum bet is \",\n    Strings.toString(MIN_WAGER), \" wei\"));\n  // 记录玩家下注的数字和金额\n\
    \  playerDetailsMapping[msg.sender].amountWagered = msg.value;\n  playerDetailsMapping[msg.sender].numberWagered\
