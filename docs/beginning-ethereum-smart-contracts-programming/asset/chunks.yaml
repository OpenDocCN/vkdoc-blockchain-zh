- fmt: '# What Are Tokens?


    To understand the concept of tokens, let’s start off with a real-life analogy.
    Most people are familiar with a carnival (or fun fair). To play the games at the
    carnival, the stalls usually do not accept cash payment. Instead, they need you
    to exchange your cash (or use a credit card) to purchase coins (or tokens) for
    use at the game stalls (see Figure [11-1](#471881_2_En_11_Chapter.xhtml#Fig1)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig1_HTML.jpg)


    An illustration of the currencies exchanged into tokens used for the carnival
    games.


    Figure 11-1


    Tokens used in the real world at carnival games


    The owner of the carnival does this for a variety of reasons:


    - The stalls need not deal with cash; this will prevent the workers at the stalls
    (usually employees of the carnival owner) from pocketing the cash.

    - The owner of the carnival receives cash up front before you even play the games,
    and unused tokens cannot be refunded.

    - The owner of the carnival wants to sell you more tokens than you need by giving
    you incentives to buy more up front.


    In the cryptocurrency world, the same concepts apply to tokens. Instead of using
    fiat currency to buy the tokens directly, you first buy Ethers and then use Ethers
    to buy the tokens (see Figure [11-2](#471881_2_En_11_Chapter.xhtml#Fig2)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig2_HTML.jpg)


    An illustration of the flat currencies exchanged into Ethers, and then the Ethers
    are used to buy a token, which is used on the smart contract running on the Ethereum
    network.


    Figure 11-2


    Tokens on the Ethereum blockchain


    ## Coins VS. Tokens


    In the cryptocurrency world, two terms have been used interchangeably: *coins*
    and *tokens*. So are they the same? First, the definition of a *coin* is that
    it is an asset that is native to its own blockchain. Examples of coins are Bitcoin,
    Litecoin, and Ether. Each of these coins exists on their own blockchain. *Tokens*,
    on the other hand, are created on existing blockchains. The most common token
    platform is Ethereum, which allows developers to create their own tokens using
    the ERC-20 standard (more on this in a later section of this chapter). Using Ether
    (which is the coin native to the Ethereum blockchain), users can exchange them
    for specific tokens on the Ethereum blockchain. Hence, strictly speaking, coins
    are not the same as tokens. In fact, tokens are based on coins.


    ## How Tokens Are Implemented?


    Now that you have a clear understanding of tokens and how they work, let’s see
    how tokens are implemented in Ethereum.


    Tokens are implemented using smart contracts (yes, the same smart contracts you
    read about in the previous chapters) known as *token contracts*. A token contract
    is a smart contract that contains a mapping of account addresses and their balances.
    Figure [11-3](#471881_2_En_11_Chapter.xhtml#Fig3) shows an example of the mapping.


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig3_HTML.png)


    A table has 4 rows and 2 columns. The column headers are account addresses and
    balances. Total tokens are 200.


    Figure 11-3


    A token contract contains a map of account addresses and their balances


    Conceptually, a token contract is a smart contract that maintains a mapping object
    containing the balance of accounts onto the blockchain (see Figure [11-4](#471881_2_En_11_Chapter.xhtml#Fig4)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig4_HTML.jpg)


    A diagram presents the blockchain with `n` blocks. The information of a smart
    contract from one block is transferred to the state variables with several account
    addresses.


    Figure 11-4


    A token contract maintains a mapping object containing account addresses and their
    balances


    ## Minting New Tokens


    The total supply of tokens can be increased by *minting* new tokens. That is,
    you (the owner of the token contract) simply increase the balance of an account,
    as shown in Figure [11-5](#471881_2_En_11_Chapter.xhtml#Fig5).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig5_HTML.png)


    A table has 4 rows and 2 columns. The column headers are account addresses and
    balances. Total tokens are 300.


    Figure 11-5


    Minting new tokens by increasing the balance of one or more accounts


    ## Burning Tokens


    The total supply of tokens can be decreased by burning tokens. That is, you reduce
    the balance of an account, as shown in Figure [11-6](#471881_2_En_11_Chapter.xhtml#Fig6).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig6_HTML.png)


    A table has 4 rows and 2 columns. The column headers are account addresses and
    balances. Total tokens are 270.


    Figure 11-6


    Burning tokens by decreasing the balance of an account


    Tokens can also be burned by sending them to a dead address, as shown in Figure
    [11-7](#471881_2_En_11_Chapter.xhtml#Fig7). Note that in this case the total supply
    of tokens does not change.


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig7_HTML.png)


    A table has 4 rows and 2 columns. The column headers are account addresses and
    balances. Total tokens are 270.


    Figure 11-7


    Burning tokens by sending tokens to a dead address. In this case, the total supply
    does not change


    ## Units Used Internally in Token Contracts


    In token contracts, *decimal places of precision* represent how divisible a token
    can be. Consider the example of a fictitious token, `MusicToken`, with each token
    representing the right to own a song. In this case, the *decimal place of precision*
    is set to 0. This means that the tokens cannot have a fractional component; you
    cannot have 1.1 or 1.5 tokens. In other words, the number of `MusicToken` one
    can own must be a discrete number (only integer values). Figure [11-8](#471881_2_En_11_Chapter.xhtml#Fig8)
    shows how `MusicToken`s are represented internally within the token contract.


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig8_HTML.png)


    A table of the internal representation decimals, 0 music token. It has 4 rows
    and 2 columns. The column headers are account addresses and balances. Total tokens
    are 15.


    Figure 11-8


    Tokens with 0 decimal precision have no fractional component


    Consider another example, the fictitious `GoldToken`, which represents the amount
    of gold a person owns. In this case, the decimal place of precision could be set
    to 3, which means that the amount of `GoldToken`s a person owns can be down to
    3 decimal places, such as 2.003. Figure [11-9](#471881_2_En_11_Chapter.xhtml#Fig9)
    shows how the balance of the `GoldToken`s is represented internally and what the
    view to the user looks like.


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig9_HTML.png)


    2 tables. Table 1 is the internal representation of the gold token and table 2
    is for view to the user. It has 4 rows and 2 columns. The column headers are account
    addresses and balances. Total tokens in table 1 is 15000 and total tokens in table
    2 is 15.


    Figure 11-9


    Token with three decimal precision, stored internally and viewed from outside


    Internally, for a token with `n`-decimals of precision, the balance is represented
    using this formula: `token_internal = token_external * 10^n`. For example, a user
    may own 4.497 `GoldToken`s, but internally, the token contract stores its balance
    as 4497.'
  raw: '## What Are Tokens?


    To understand the concept of tokens, let’s start off with a real-life analogy.
    Most people are familiar with a carnival (or fun fair). To play the games at the
    carnival, the stalls usually do not accept cash payment. Instead, they need you
    to exchange your cash (or use a credit card) to purchase coins (or tokens) for
    use at the game stalls (see Figure [11-1](#471881_2_En_11_Chapter.xhtml#Fig1)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig1_HTML.jpg)


    An illustration of the currencies exchanged into tokens used for the carnival
    games.


    Figure 11-1


    Tokens used in the real world at carnival games


    The owner of the carnival does this for a variety of reasons:


    *   The stalls need not deal with cash; this will prevent the workers at the stalls
    (usually employees of the carnival owner) from pocketing the cash.


    *   The owner of the carnival receives cash up front before you even play the
    games, and unused tokens cannot be refunded.


    *   The owner of the carnival wants to sell you more tokens than you need by giving
    you incentives to buy more up front.


    In the cryptocurrency world, the same concepts apply to tokens. Instead of using
    fiat currency to buy the tokens directly, you first buy Ethers and then use Ethers
    to buy the tokens (see Figure [11-2](#471881_2_En_11_Chapter.xhtml#Fig2)).


    ![](images/471881_2_En_11_Chapter/471881_2_En_11_Fig2_HTML.jpg)


