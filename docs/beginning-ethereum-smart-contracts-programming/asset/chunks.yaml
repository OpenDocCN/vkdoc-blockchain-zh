    version: 67

    },

    snap: {

    version: 1

    }

    }

    }]

    ```


    如果对等节点添加成功，您应该会看到上述输出。从输出中，您可以看到`node1`的 IP 地址是`127.0.0.1`，这是我电脑的本地 IP 地址。图 4-6
    显示了私有测试网络的当前状态。


