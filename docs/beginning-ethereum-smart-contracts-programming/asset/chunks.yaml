- fmt: '### Placement of Trust


    All of this boils down to one key concept: the placement of trust. And that is,
    we place our trust in a central body. Think about it. In our everyday life, we
    place our trust in banks and we place our trust in our governments.


    Even for simple mundane day-to-day activities, we place our trust in central bodies.
    For example, when you go to the library to borrow a book, you trust that the library
    will maintain a proper record of the books you have borrowed and returned.


    The key theme is that we trust institutions but don’t trust each other. We trust
    our government, banks, even our library, but we just don’t trust each other. As
    an example, consider the following scenario. Imagine you work at a cafe, and someone
    walks up to you and offers you a $10 bill for two cups of coffee. Another person
    offers to pay you for the two cups of coffee using a handwritten note saying he
    owes you $10. Which one would you trust? The answer is pretty obvious, isn’t it?
    Naturally you would trust the $10 bill as opposed to the handwritten note. This
    is because you understand that you can use the $10 bill elsewhere for other goods
    or services and that it is backed by the US government. In contrast, the handwritten
    note is not backed by anyone, except perhaps the person who wrote it, and hence
    it has literally no value.


    Now let’s take the discussion a bit further. Again, imagine you are trying to
    sell something. Someone comes up to you and suggests paying for your goods using
    the currencies shown in Figure [2-1](#471881_2_En_2_Chapter.xhtml#Fig1).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig1_HTML.jpg)


    A photo of the currency notes of Venezuela at the top and Zimbabwe at the bottom.
    At the top, the 100-bolivar banknote is present, while at the bottom, the one
    hundred trillion dollar banknote is present.


    **Figure 2-1** Currencies from two countries


    Would you accept the currencies shown in the figure? Here, you have two different
    currencies, one from Venezuela and one from Zimbabwe. In this case, the first
    thing you consider is whether these currencies are widely accepted. Then you consider
    your trust in these governments. You might have read in the news about the hyperinflation
    in these two countries, and that these currencies might not retain their value
    over time. So, would you accept these currencies as payment?


    ### Trust Issues


    Earlier, I mentioned that people trust institutions and don’t trust each other.
    But even established economies can fail, such as in the case of the financial
    crisis of the United States in 2007–2008. Investment bank Lehman Brothers collapsed
    in September 2008 because of the subprime mortgage market. So, if banks from established
    economies can collapse, how can people in less-developed countries trust their
    banks and governments? Even if the banks are trusted, your deposits may be monitored
    by the government, and they could arrest you based on your transactions.


    As you saw in the example in the previous section, there are times when people
    don’t trust institutions, especially if the political situation in that country
    is not stable.


    This brings us to the next key issue: even though people trust institutions, institutions
    can fail. And when people lose trust in institutions, people turn to *cryptocurrencies*.
    In the next section, I will discuss how to solve the trust issues using *decentralization*,
    a fundamental concept behind cryptocurrency.


    ### Solving Trust Issues Using Decentralization


    Now that you have seen the challenges of trust, who to trust and who not to trust,
    it is time to consider a way to solve the trust issues. In particular, blockchain
    uses decentralization to solve the trust issue.


    In order to understand decentralization, let’s use a very simple example based
    on our daily lives.


    ### Example of Decentralization


    To understand how decentralization solves the trust issue, let’s consider a real-life
    example.


    Imagine a situation where you have three persons with DVDs that they want to share
    with one another (see Figure [2-2](#471881_2_En_2_Chapter.xhtml#Fig2)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig2_HTML.jpg)


    Three illustrations of three people labeled A, B, and C. At the bottom, there
    are DVDs arranged in a vertical position below each illustration.


    **Figure 2-2** Sharing DVDs among a group of people


    The first thing they need to do is to have someone keep track of the whereabouts
    of each DVD. Of course, the easiest is for each person to keep track of what they
    have borrowed and what they have lent, but since people inherently do not trust
    each other, this approach is not very popular among the three people.


    To solve this issue, they decided to appoint one person, say B, to keep a ledger
    of the whereabouts of each DVD (see Figure [2-3](#471881_2_En_2_Chapter.xhtml#Fig3)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig3_HTML.jpg)


    Three illustrations of three people labeled A, B, and C. At the bottom, there
    are DVDs arranged in a vertical position below each illustration. Next to B, columns
    include DVD, and Person. DVD has 1, 2, and 3, while Person has A, B, and C corresponding
    to the numbers.


    **Figure 2-3** Appointing a particular person to keep the records


    This way, there is a central body to keep track of the whereabouts of each DVD.
    But wait, isn’t this the problem with centralization? What happens if B is not
    trustworthy? Turns out that B has the habit of stealing DVDs, and he can easily
    modify the ledger to erase the record of DVDs that he has borrowed. So, there
    must be a better way.


    Then someone has an idea! Why not let everyone keep a copy of the ledger? Whenever
    someone borrows or lends a DVD, the record is broadcast to everyone, and everyone
    records the transaction. See Figure [2-4](#471881_2_En_2_Chapter.xhtml#Fig4).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig4_HTML.jpg)


    Three illustrations of three people labeled A, B, and C illustrate how everyone
    records transactions. At the bottom, there are DVDs arranged in a vertical position
    below each illustration. Next to A, B, and C, columns include DVD, and Person.
    DVD has 1, 2, and 3, while Person has A, B, and C corresponding to the numbers.


    **Figure 2-4** Getting everyone to keep the records


    So now the record keeping is decentralized. Three people now hold the same ledger.
    But wait a minute. What if A and C conspire to change the ledger so that they
    can steal the DVDs from B? Since majority wins, as long as there is more than
    50% of the people with the same records, the others would have to listen to the
    majority. And because there are only three people in this scenario, it is extremely
    easy to get more than 50% of the people to conspire.


    The solution is to have a lot more people to hold the ledger, especially people
    who are not related to the DVD-sharing business (see Figure [2-5](#471881_2_En_2_Chapter.xhtml#Fig5)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig5_HTML.jpg)


    Three illustrations of three people labeled A, B, and C illustrate how unrelated
    people help keep the records. At the bottom, there are DVDs arranged in a vertical
    position below each illustration. Next to A, B, and C, columns include DVD, and
    Person. DVD has 1, 2, and 3, while Person has A, B, and C corresponding to the
    numbers. Additionally, it includes a crowd silhouette and a column of DVD and
    Person.


    **Figure 2-5** Getting a group of unrelated people to help keep the records


    This way, it makes it more difficult for one party to alter the records in the
    ledger. In order to alter a record, it would need to involve a number of people
    to do so all at the same time, which is a time-consuming affair. And this is the
    key idea behind a *distributed ledger*, commonly known as blockchain.'
