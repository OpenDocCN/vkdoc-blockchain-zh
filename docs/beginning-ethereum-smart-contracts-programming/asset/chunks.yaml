    *   **Main Ethereum Network****:** [`https://mainnet.infura.io/v3/`](https://mainnet.infura.io/v3/)


    *   **Goerli Test Network****:** [`https://goerli.infura.io/v3/`](https://goerli.infura.io/v3/)


