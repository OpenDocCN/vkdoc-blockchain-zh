  raw: '### Getting Test Ethers


    Once you are connected to the Goerli Test Network, the first thing to do is to
    get some free test Ethers so you can use them to pay for transacting on the network.


    To get free Ethers,


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig13_HTML.jpg)


    A screenshot of the welcome screen of the Goerli Faucet page. It displays a message
    to stop spam, along with a bar with the send me E T H button.


    Figure 5-13


    Get free Ethers for your account using the Goerli Faucet page


    *   Go to the Goerli Facuet page located at [`https://goerlifaucet.com/`](https://goerlifaucet.com/)
    (see Figure [5-13](#471881_2_En_5_Chapter.xhtml#Fig13)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig14_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays account 1, where
    the address copies to the clipboard.


    Figure 5-14


    Copying the address of your account in MetaMask


    *   Register for a free Alchemy account at [`https://auth.alchemy.com/signup.`](https://auth.alchemy.com/signup.O)
    Once you have signed up with Alchemy, go back to the Goerli Faucet page and sign
    in.


    *   Copy the address of your account in MetaMask (see Figure [5-14](#471881_2_En_5_Chapter.xhtml#Fig14)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig15_HTML.jpg)


    A screenshot of the welcome screen of the Goerli Faucet page. It displays an address
    bar filled with a code, along with the send me E T H button.


    Figure 5-15


    Getting free Ethers from the Goerli faucet


    *   Paste the account address into the Goerli Faucet page (see Figure [5-15](#471881_2_En_5_Chapter.xhtml#Fig15)).
    Click the **Send Me ETH** button.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig16_HTML.jpg)


    A screenshot of the welcome screen of the Goerli Faucet page. It displays an empty
    address bar, the send me E T H button, and an address under your transactions.


    Figure 5-16


    The link to the transaction on Etherscan


    *   At the bottom of the Goerli Faucet page, you will see a transaction hyperlink
    (see Figure [5-16](#471881_2_En_5_Chapter.xhtml#Fig16)). Clicking it allows you
    to see the status of the transaction on Etherscan.


    Tip


    Etherscan is an Ethereum Blockchain Explorer. It allows you to search the blockchain
    for transactions, addresses, tokens, prices, and activities happening on the blockchain.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig17_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays the assets under
    account 1 with 0.05 Goerli E T H.


    Figure 5-17


    The free Ether(s) credited into your account


    *   After a while, you should see 0.05 Ethers deposited into your account (see
    Figure [5-17](#471881_2_En_5_Chapter.xhtml#Fig17)).


    Tip


    You can only request 0.05 free Ethers every 24 hours (this is the policy at the
    time of writing). If you want more, try setting up MetaMask on multiple computers
    and create additional Alchemy accounts.


    It is important to remember that the amount of Ethers in your account is valid
    only for the particular Ethereum network that you have obtained it from. For example,
    if you switch to another test network, say the Sepolia Test Network, you should
    see 0 for your account balance.


    ### Creating Additional Accounts


    MetaMask allows you to create multiple accounts. This is useful when you want
    to learn how to transfer Ethers from one account to another. It is also useful
    when testing and debugging your smart contracts.


    To create additional accounts in MetaMask,


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig18_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays a list under the
    My accounts option, where create account option highlights with a rectangular
    outline.


    Figure 5-18


    Creating new accounts in MetaMask


    *   Click the colored icon located at the top right corner of MetaMask (see Figure
    [5-18](#471881_2_En_5_Chapter.xhtml#Fig18)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig19_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays the assets under
    account 2, where it has 0 Goerli E T H.


    Figure 5-19


    The second newly created account


    *   Click the **Create account** item.


    *   In the NEW ACCOUNT screen, click **Create**.


    *   You will see the new account created (Account 2, see Figure [5-19](#471881_2_En_5_Chapter.xhtml#Fig19)).


    Tip


    You can create as many accounts as you want. In fact, for testing your smart contracts,
    you should create at least three accounts for testing purposes.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig20_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays a list under the
    My accounts option, where account 2 is selected.


    Figure 5-20


    Switching between accounts in MetaMask


    *   To switch between accounts, click the colored icon (see Figure [5-20](#471881_2_En_5_Chapter.xhtml#Fig20))
    and select the account you want to switch to.'
  trans: "\n### 获取测试以太币\n\n连接到 Goerli 测试网络后，首先要做的是获取一些免费的测试以太币，以便用于支付网络上的交易费用。\n\n\
    要获取免费以太币：\n\n![Goerli 水龙头页面欢迎界面的截图。界面显示了一条防垃圾信息，以及一个带有“发送我 ETH”按钮的栏位。](img/471881_2_En_5_Fig13_HTML.jpg)\n\
    \n**图 5-13** 使用 Goerli 水龙头页面为你的账户获取免费以太币\n\n- 访问位于 `https://goerlifaucet.com/`\
    \ 的 Goerli 水龙头页面（见图 5-13）。\n\n![Goerli 测试网络界面的截图。界面显示了账户 1，其中地址已复制到剪贴板。](img/471881_2_En_5_Fig14_HTML.jpg)\n\
    \n**图 5-14** 在 MetaMask 中复制你的账户地址\n\n- 在 `https://auth.alchemy.com/signup` 注册一个免费的\
    \ Alchemy 账户。完成 Alchemy 注册后，返回 Goerli 水龙头页面并登录。\n- 复制你在 MetaMask 中的账户地址（见图 5-14）。\n\
    \n![Goerli 水龙头页面欢迎界面的截图。界面显示了一个已填入代码的地址栏，以及“发送我 ETH”按钮。](img/471881_2_En_5_Fig15_HTML.jpg)\n\
    \n**图 5-15** 从 Goerli 水龙头获取免费以太币\n\n- 将账户地址粘贴到 Goerli 水龙头页面（见图 5-15）。点击 **发送我\
    \ ETH** 按钮。\n\n![Goerli 水龙头页面欢迎界面的截图。界面显示了一个空白地址栏、“发送我 ETH”按钮以及“你的交易”下方的一个地址。](img/471881_2_En_5_Fig16_HTML.jpg)\n\
    \n**图 5-16** Etherscan 上的交易链接\n\n- 在 Goerli 水龙头页面底部，你会看到一个交易超链接（见图 5-16）。点击它即可在\
    \ Etherscan 上查看交易状态。\n\n> **提示**  \n> Etherscan 是一个以太坊区块链浏览器。它允许你在区块链上搜索交易、地址、代币、价格以及链上发生的各种活动。\n\
    \n![Goerli 测试网络界面的截图。界面显示了账户 1 下的资产，其中包含 0.05 Goerli ETH。](img/471881_2_En_5_Fig17_HTML.jpg)\n\
    \n**图 5-17** 免费以太币已存入你的账户\n\n- 稍等片刻，你应该会看到 0.05 以太币存入你的账户（见图 5-17）。\n\n> **提示**\
    \  \n> 每 24 小时只能申请 0.05 免费以太币（这是撰写本文时的政策）。如果你想要更多，可以尝试在多台计算机上设置 MetaMask 并创建额外的\
    \ Alchemy 账户。\n\n请务必记住，你账户中的以太币数量仅在你获取它的特定以太坊网络内有效。例如，如果你切换到另一个测试网络，比如 Sepolia\
    \ 测试网络，你的账户余额将显示为 0。\n\n### 创建额外账户\n\nMetaMask 允许你创建多个账户。当你想要学习如何从一个账户向另一个账户转账时，这非常有用。同样，在测试和调试智能合约时，这也很有帮助。\n\
    \n要在 MetaMask 中创建额外账户：\n\n![Goerli 测试网络界面的截图。界面显示了“我的账户”选项下的列表，其中“创建账户”选项被矩形轮廓高亮显示。](img/471881_2_En_5_Fig18_HTML.jpg)\n\
    \n**图 5-18** 在 MetaMask 中创建新账户\n\n- 点击 MetaMask 右上角的彩色图标（见图 5-18）。\n\n![Goerli\
    \ 测试网络界面的截图。界面显示了账户 2 下的资产，其中 Goerli ETH 为 0。](img/471881_2_En_5_Fig19_HTML.jpg)\n\
    \n**图 5-19** 第二个新创建的账户\n\n- 点击 **创建账户** 选项。\n- 在 **新账户** 界面中，点击 **创建**。\n- 你会看到新账户已创建（账户\
    \ 2，见图 5-19）。\n\n> **提示**  \n> 你可以根据需要创建任意数量的账户。实际上，为了测试你的智能合约，出于测试目的，你至少应该创建三个账户。\n\
    \n![Goerli 测试网络界面的截图。界面显示了“我的账户”选项下的列表，其中账户 2 已被选中。](img/471881_2_En_5_Fig20_HTML.jpg)\n\
    \n**图 5-20** 在 MetaMask 中切换账户\n\n- 要切换账户，请点击彩色图标（见图 5-20）并选择你想要切换到的账户。\n"
- fmt: '# Transferring Ethers


    MetaMask allows you to transfer Ethers from one account to another very easily.
    You can transfer to another account within MetaMask or an external account using
    its public address.


    To transfer Ethers from one account to another,


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig21_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays an empty search
    bar and a message that reads transfer between my accounts, under the send-to screen.


    Figure 5-21


    Sending Ethers to another account


    - Switch to `Account 1`.

    - Click the **SEND** button.

    - You will see the screen shown in Figure 5-21.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig22_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays an empty search
    bar, a back to all option, and a list of accounts under my accounts.


    Figure 5-22


    Selecting which account to send the Ethers to


    - To send Ethers to another local account, click the **Transfer between my accounts**
    item. Select `Account 2` in this example (see Figure 5-22).


    **Tip:** To send Ethers to an external account, enter the account address of the
    recipient, or click the QR code icon and you will be able to use your Webcam to
    scan the QR code of the public address of the external account.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig23_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays account 2, along
    with its asset and amount, under the send screen. The next button highlights with
    a dark shade.


    Figure 5-23


    Specifying how many Ethers to send


    - Specify how many Ethers you want to send (0.01 in this example; see Figure 5-23).
    Click **Next**.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig24_HTML.jpg)


    A screenshot of the Edit window of the Goerli test network interface. It displays
    the 0.01 Goerlieth to be transacted from account 1 to account 2, along with the
    estimated gas fee.


    Figure 5-24


    Confirming the transaction


    - You will see the total transaction amount that you will incur for this transaction
    (see Figure 5-24). Click **Confirm** (you need to scroll down the page).


    **Note:** The total transaction amount is the amount of Ethers you are transferring
    plus the transaction fee. The transaction fee is also known as the *gas fee*.


    ## Gas Fees


    *Gas* is the internal pricing for running a transaction or contract in Ethereum.
    Instead of pricing transaction fees using Ether, Ethereum deliberately uses the
    concept of gas as the unit for pricing transactions. This is because gas more
    accurately conveys the complexity of computation, while the price of Ether fluctuates
    because of market forces. The price of gas is decided by the market demand for
    making transactions. Miner/validators often process transactions based on the
    gas price people are paying; the higher the gas price you are paying, the faster
    your transactions get confirmed.


    When you perform a transaction, MetaMask automatically specifies the maximum amount
    of gas you want to spend, and all unspent gas is refunded to your account. In
    addition, MetaMask also calculates the amount of gas needed for a transaction
    and suggests a gas price for your transaction.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig25_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays the sent Goerlith
    under the activity tab of account 1. The remaining Goerli ETH is 0.04.


    Figure 5-25


    Your account balance after the transfer


    - When the transaction goes through, your account should be deducted the total
    transaction amount (see Figure 5-25).

    - You can verify that the Ethers have been transferred to `Account 2` by switching
    to `Account 2`.


    # Recovering Accounts


    MetaMask has an inbuilt system that allows you to recover your accounts safely
    and securely. There are a few possible scenarios when you would need to recover
    your accounts:


    - You forgot your password to log into MetaMask.

    - You need to transfer your account from one computer to another (perhaps you
    have a new computer or lost your old one).


    In either case, MetaMask allows you to very easily recover your existing accounts
    provided you have backed up the 12-word pass phrase. The beauty of using the 12-word
    pass phrase is that all your accounts can be recovered. Say you created three
    accounts in MetaMask. All accounts can be recovered as long as you have the 12-word
    pass phrase.


    To recover your accounts,


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig26_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays a MetaMask logo,
    a welcome back message with a password bar, and an unlock button.


    Figure 5-26


    Recovering your account(s) using the 12-word secret seed phrase


    - Click the **Forgot password?** link in the MetaMask login screen (see Figure
    5-26).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig27_HTML.jpg)


    A screenshot of the MetaMask page. It displays the message under the reset wallet
    option, along with the secret recovery phrase, and tabs to create new and confirm
    passwords.


    Figure 5-27


    Restoring your accounts and resetting your password


    - You will be redirected to a web page that allows you to reset your wallet.

    - Enter the 12-word seed phrase in the exact order provided to you (see Figure
    5-27). You also need to assign a new password to protect your account. Click **Restore**.

    - You will now find your original `Account 1` and `Account 2`. In fact, all accounts
    you created earlier that had a non-zero balance are recovered automatically.


    **Note:** You should see the `Account 1` and `Account 2` with the same amount
    of Ethers you had earlier.


    # Importing and Exporting Accounts


    You can export your accounts in MetaMask so that they can be imported on another
    computer. All you need to do is to export the private key of your account and
    import it in another computer using the same private key.


    ## Exporting Accounts


    To export an account,


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig28_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays a list under account
    1, where the account details option is selected.


    Figure 5-28


    Viewing your account details


    - Select the account that you want to export.

    - Select the … displayed on the right of the account name and select **Account
    Details** (see Figure 5-28).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig29_HTML.jpg)


    A screenshot of the Goerli test network interface overlays by the account 1 information
    popup box. It displays the QR code, a code, and 2 buttons to view on Ethereum
    and export the private key.


    Figure 5-29


    Exporting the private key for your account


    - Click the **Export private key** button (see Figure 5-29).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig30_HTML.jpg)


    A screenshot of the Goerli test network interface overlays by the account 1 information
    popup box. It displays a warning message to never disclose the key. The confirm
    button highlights with a dark shade.


    Figure 5-30


    Viewing the private key for your account


    - Enter your MetaMask password and click **Confirm** (see Figure 5-30).

    - You should now see your private key. Click it to copy it to the clipboard and
    save it securely to a text file.


    **Caution:** When dealing with accounts in the Main Ethereum Network, do be very
    cautious when exporting your private key and be sure to save it in a secure location.
    Once the private key is leaked, the assets in your account can be stolen easily.
    Of course, when dealing with one of the test networks, it is far less important
    because the assets in the test networks have no monetary value.'
