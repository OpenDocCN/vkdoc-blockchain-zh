- fmt: "# Symmetric Cryptography\n\nIn symmetric cryptography, you use the same cryptographic\
    \ key (commonly referred to as the *shared key*) for both the encryption of plaintext\
    \ and the decryption of ciphertext. Figure [1-5](#471881_2_En_1_Chapter.xhtml#Fig5)\
    \ shows the use of the shared key for both encryption and decryption.\n\n![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig5_HTML.jpg)\n\
    \nA block diagram represents the encryption and decryption of plain text to cipher\
    \ text using a shared key.\n\n**Figure 1-5** – Using a shared key for encryption\
    \ and decryption\n\nSymmetric cryptography is fast and simple, but the main problem\
    \ is how to ensure that the key is kept secret. For example, if Tom wants to send\
    \ a secret message to Susan, Tom can encrypt the message using the shared key\
    \ and Susan can decrypt the encrypted message using the same shared key. The problem\
    \ here is how can Tom securely send Susan the shared key? Can Tom email Susan?\
    \ Send it through SMS or WhatsApp? How about through the traditional post office?\
    \ All these methods are not absolutely safe and are subject to eavesdropping.\
    \ Moreover, there is this popular saying, “Three may keep a secret if two of them\
    \ are dead.” This means, if more than one person knows the secret, it is no longer\
    \ a secret.\n\nHaving said that, symmetric cryptography has its uses and applications.\
    \ It is useful when you want to protect your private data. For example, say you\
    \ have some confidential data on your computer that you want to prevent others\
    \ from seeing. Using symmetric cryptography, you can encrypt and decrypt the data\
    \ using the same key, which is only known to you and no one else.\n\n> **Tip**\
    \  \n> Some examples of symmetric key algorithms are AES (Advanced Encryption\
    \ Standard, originally known as Rijndael), DES (Data Encryption Standard), and\
    \ IDEA (International Data Encryption Algorithm).\n\n## Generating the Shared\
    \ Key in Python\n\nIn Python, you can use the `cryptography` module for symmetric\
    \ and asymmetric cryptography. To use the `cryptography` module, install it using\
    \ `pip`:\n\n```\n$ pip install cryptography\n```\n\nLet’s generate a shared key\
    \ in Python. To do so, use the `Fernet` class:\n\n```\nfrom cryptography.fernet\
    \ import Fernet\n# generate the shared key\nshared_key = Fernet.generate_key()\n\
    print(shared_key)\n# base64 encoded, binary format\n# A new key is generated each\
    \ time you run this block of code\n# e.g. b'ixXEfrz2NTJlxy1OhxXlsCiFf0Ycg_GL0Cy0MlgTv4U='\n\
    ```\n\n> **Tip**  \n> The `Fernet` class is an implementation of symmetric (also\
    \ known as “secret key”) authenticated cryptography. Fernet uses the AES algorithm\
    \ in CBC mode with a 128-bit key for encryption. For more details, refer to [`https://github.com/fernet/spec/blob/master/Spec.md`](https://github.com/fernet/spec/blob/master/Spec.md).\n\
    \nThe `generate_key()` function returns a shared key in binary format and it is\
    \ base64 encoded.\n\n## Performing Symmetric Encryption\n\nTo encrypt your data\
    \ using the shared key, you first create an instance of the `Fernet` class using\
    \ the shared key:\n\n```\n# create an instance of the Fernet class\nfernet = Fernet(shared_key)\n\
    ```\n\nYou can then use the `encrypt()` function to encrypt your data:\n\n```\n\
    # encrypt the message with the shared key\nciphertext = fernet.encrypt(\nbytes(\"\
    Secret message!\",'utf-8'))\n# remember to pass in a byte array\n```\n\nYou can\
    \ save the encrypted data into a file:\n\n```\n# write the encrypted message to\
    \ file\nwith open('message.encrypted', 'wb') as f:\nf.write(ciphertext)\n```\n\
    \nAnd you can save the shared key to file:\n\n```\n# write the shared key to file\n\
    with open('symmetric_key.crypt', 'wb') as f:\nf.write(shared_key)\n```\n\n## Performing\
    \ Symmetric Decryption\n\nDecryption is similar to encryption. First, load the\
    \ shared key from the file (which you saved previously):\n\n```\nwith open('symmetric_key.crypt',\
    \ 'rb') as f:\nshared_key = f.read()\nprint(shared_key)\n```\n\nThen, create an\
    \ instance of the `Fernet` class using the shared key and call the `decrypt()`\
    \ function to decode the ciphertext:\n\n```\n# create an instance of the Fernet\
    \ class\nfernet = Fernet(shared_key)\n# decrypt the encrypted message read from\
    \ file\nwith open('message.encrypted', 'rb') as f:\nprint(fernet.decrypt(f.read()).decode(\"\
    utf-8\"))\n```\n\n# Asymmetric Cryptography\n\nUnlike symmetric cryptography,\
    \ which uses a single shared key, asymmetric cryptography uses a key-pair, one\
    \ public and one private.\n\n> **Tip**  \n> Asymmetric cryptography is also known\
    \ as public-key cryptography.\n\nA public key algorithm generates two keys that\
    \ are mathematically linked:\n\n- **One public and one private**: The public key,\
    \ as the name implies, should be made public. The private key, on the other hand,\
    \ absolutely must be kept a secret.\n- You can encrypt data with a public key\
    \ and decrypt with the private key. For example, if Tom wants to send a secret\
    \ message to Susan, Tom could encrypt the message using Susan’s public key and\
    \ only Susan can decrypt the secret message with her private key.\n- You can encrypt\
    \ data with a private key and decrypt with the public key. At first, this sounds\
    \ counterintuitive. If one could decrypt using the public key (which is supposed\
    \ to be public), what’s the point of this? Actually, this is useful. Suppose Tom\
    \ encrypts a message using his own private key and sends it to Susan. When Susan\
    \ receives the message, she can try to decrypt it using Tom’s public key. If the\
    \ message can be decrypted, this means that the message has not been tampered\
    \ with and that it indeed comes from Tom. On the other hand, if the message has\
    \ been tampered with, Susan would not be able to decrypt the message using Tom’s\
    \ public key. This technique is used in creating a *digital signature*.\n\n> **Tip**\
    \  \n> Some examples of public key algorithms are RSA (Rivest–Shamir–Adleman),\
    \ Elliptical Curve Cryptography (ECC), and TLS/SSL protocol.\n\nFigure [1-6](#471881_2_En_1_Chapter.xhtml#Fig6)\
    \ shows the first approach, that of encrypting the data using the public key and\
    \ then decrypting it using the private key.\n\n![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig6_HTML.jpg)\n\
    \nA block diagram represents the encryption and decryption of plain text to cipher\
    \ text using a public key and private key, respectively.\n\n**Figure 1-6** – Encrypting\
    \ data using the public key and then decrypting the ciphertext using the private\
    \ key\n\nFigure [1-7](#471881_2_En_1_Chapter.xhtml#Fig7) shows the second approach\
    \ of encrypting the data using the private key and then decrypting it using the\
    \ public key.\n\n![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig7_HTML.jpg)\n\
    \nA block diagram represents the encryption and decryption of plain text to cipher\
    \ text using a private key and public key, respectively.\n\n**Figure 1-7** – Encrypting\
    \ data using the private key and then decrypting the ciphertext using the public\
    \ key"
  raw: '## Symmetric Cryptography


    In symmetric cryptography, you use the same cryptographic key (commonly referred
    to as the *shared key*) for both the encryption of plaintext and the decryption
    of ciphertext. Figure [1-5](#471881_2_En_1_Chapter.xhtml#Fig5) shows the use of
    the shared key for both encryption and decryption.


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig5_HTML.jpg)


    A block diagram represents the encryption and decryption of plain text to cipher
    text using a shared key.


    Figure 1-5


    Using a shared key for encryption and decryption


    Symmetric cryptography is fast and simple, but the main problem is how to ensure
    that the key is kept secret. For example, if Tom wants to send a secret message
    to Susan, Tom can encrypt the message using the shared key and Susan can decrypt
    the encrypted message using the same shared key. The problem here is how can Tom
    securely send Susan the shared key? Can Tom email Susan? Send it through SMS or
    WhatsApp? How about through the traditional post office? All these methods are
    not absolutely safe and are subject to eavesdropping. Moreover, there is this
    popular saying, “Three may keep a secret if two of them are dead.” This means,
    if more than one person knows the secret, it is no longer a secret.


    Having said that, symmetric cryptography has its uses and applications. It is
    useful when you want to protect your private data. For example, say you have some
    confidential data on your computer that you want to prevent others from seeing.
    Using symmetric cryptography, you can encrypt and decrypt the data using the same
    key, which is only known to you and no one else.


    Tip


    Some examples of symmetric key algorithms are AES (Advanced Encryption Standard,
    originally known as Rijndael), DES (Data Encryption Standard), and IDEA (International
    Data Encryption Algorithm).


    ### Generating the Shared Key in Python


    In Python, you can use the `cryptography` module for symmetric and asymmetric
    cryptography. To use the `cryptography` module, install it using `pip`:


    ```

    $ pip install cryptography

    ```


    Let’s generate a shared key in Python. To do so, use the `Fernet` class:


    ```

    from cryptography.fernet import Fernet

    # generate the shared key

    shared_key = Fernet.generate_key()

    print(shared_key)

    # base64 encoded, binary format

    # A new key is generated each time you run this block of code

    # e.g. b''ixXEfrz2NTJlxy1OhxXlsCiFf0Ycg_GL0Cy0MlgTv4U=''

    ```


    Tip


    The `Fernet` class is an implementation of symmetric (also known as “secret key”)
    authenticated cryptography. Fernet uses the AES algorithm in CBC mode with a 128-bit
    key for encryption. For more details, refer to [`https://github.com/fernet/spec/blob/master/Spec.md`](https://github.com/fernet/spec/blob/master/Spec.md).


    The `generate_key()` function returns a shared key in binary format and it is
    base64 encoded.


    ### Performing Symmetric Encryption


    To encrypt your data using the shared key, you first create an instance of the
    `Fernet` class using the shared key:


    ```

    # create an instance of the Fernet class

    fernet = Fernet(shared_key)

    ```


    You can then use the `encrypt()` function to encrypt your data:


    ```

    # encrypt the message with the shared key

    ciphertext = fernet.encrypt(

    bytes("Secret message!",''utf-8''))

    # remember to pass in a byte array

    ```


    You can save the encrypted data into a file:


    ```

    # write the encrypted message to file

    with open(''message.encrypted'', ''wb'') as f:

    f.write(ciphertext)

    ```


    And you can save the shared key to file:


    ```

    # write the shared key to file

    with open(''symmetric_key.crypt'', ''wb'') as f:

    f.write(shared_key)

    ```


    ### Performing Symmetric Decryption


    Decryption is similar to encryption. First, load the shared key from the file
    (which you saved previously):


    ```

    with open(''symmetric_key.crypt'', ''rb'') as f:

    shared_key = f.read()

    print(shared_key)

    ```


    Then, create an instance of the `Fernet` class using the shared key and call the
    `decrypt()` function to decode the ciphertext:


    ```

    # create an instance of the Fernet class

    fernet = Fernet(shared_key)

    # decrypt the encrypted message read from file

    with open(''message.encrypted'', ''rb'') as f:

    print(fernet.decrypt(f.read()).decode("utf-8"))

    ```


    ## Asymmetric Cryptography


    Unlike symmetric cryptography, which uses a single shared key, asymmetric cryptography
    uses a key-pair, one public and one private.


    Tip


    Asymmetric cryptography is also known as public-key cryptography.


    A public key algorithm generates two keys that are mathematically linked:


    *   **One public and one private**: The public key, as the name implies, should
    be made public. The private key, on the other hand, absolutely must be kept a
    secret.


    *   You can encrypt data with a public key and decrypt with the private key. For
    example, if Tom wants to send a secret message to Susan, Tom could encrypt the
    message using Susan’s public key and only Susan can decrypt the secret message
    with her private key.


    *   You can encrypt data with a private key and decrypt with the public key. At
    first, this sounds counterintuitive. If one could decrypt using the public key
    (which is supposed to be public), what’s the point of this? Actually, this is
    useful. Suppose Tom encrypts a message using his own private key and sends it
    to Susan. When Susan receives the message, she can try to decrypt it using Tom’s
    public key. If the message can be decrypted, this means that the message has not
    been tampered with and that it indeed comes from Tom. On the other hand, if the
    message has been tampered with, Susan would not be able to decrypt the message
    using Tom’s public key. This technique is used in creating a *digital signature*.


    Tip


    Some examples of public key algorithms are RSA (Rivest–Shamir–Adleman), Elliptical
    Curve Cryptography (ECC), and TLS/SSL protocol.


    Figure [1-6](#471881_2_En_1_Chapter.xhtml#Fig6) shows the first approach, that
    of encrypting the data using the public key and then decrypting it using the private
    key.


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig6_HTML.jpg)


    A block diagram represents the encryption and decryption of plain text to cipher
    text using a public key and private key, respectively.


    Figure 1-6


    Encrypting data using the public key and then decrypting the ciphertext using
    the private key


    Figure [1-7](#471881_2_En_1_Chapter.xhtml#Fig7) shows the second approach of encrypting
    the data using the private key and then decrypting it using the public key.


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig7_HTML.jpg)


    A block diagram represents the encryption and decryption of plain text to cipher
    text using a private key and public key, respectively.


    Figure 1-7


    Encrypting data using the private key and then decrypting the ciphertext using
    the public key'
  trans: "\n# 对称密码学\n\n在对称密码学中，加密明文和解密密文使用的是同一个密码密钥（通常称为*共享密钥*）。图 1-5 展示了使用共享密钥进行加密和解密的过程。\n\
    \n![](img/471881_2_En_1_Fig5_HTML.jpg)\n\n这张框图展示了使用共享密钥将明文加密成密文，以及将密文解密成明文的过程。\n\
    \n**图 1-5** – 使用共享密钥进行加密和解密\n\n对称密码学快速且简单，但主要问题在于如何确保密钥的保密性。例如，如果汤姆想给苏珊发送一条秘密消息，汤姆可以使用共享密钥对消息进行加密，而苏珊则可以使用相同的共享密钥对加密后的消息进行解密。这里的问题是，汤姆如何安全地将共享密钥发送给苏珊？汤姆可以通过电子邮件发送吗？通过短信或\
    \ WhatsApp 发送？或者通过传统的邮局？所有这些方法都不是绝对安全的，都存在被窃听的风险。此外，有句流行的话说：“三人若想守密，除非两人已死。”这意味着，如果知道秘密的人不止一个，那它就不再是秘密了。\n\
    \n话虽如此，对称密码学自有其用途和应用。当你想保护自己的私人数据时，它会非常有用。例如，假设你的电脑上有一些机密数据，你想防止他人看到。使用对称密码学，你可以使用同一个密钥加密和解密这些数据，而这个密钥只有你知道，没有其他人知道。\n\
    \n> **提示**  \n> 对称密钥算法的一些例子包括 AES（高级加密标准，原名 Rijndael）、DES（数据加密标准）和 IDEA（国际数据加密算法）。\n\
    \n## 在 Python 中生成共享密钥\n\n在 Python 中，你可以使用 `cryptography` 模块来进行对称和非对称密码学操作。要使用\
    \ `cryptography` 模块，请使用 `pip` 安装它：\n\n```\n$ pip install cryptography\n```\n\n\
    让我们在 Python 中生成一个共享密钥。为此，需要使用 `Fernet` 类：\n\n```\nfrom cryptography.fernet import\
    \ Fernet\n# 生成共享密钥\nshared_key = Fernet.generate_key()\nprint(shared_key)\n# 返回\
    \ base64 编码的二进制格式\n# 每次运行这段代码都会生成一个新的密钥\n# 例如：b'ixXEfrz2NTJlxy1OhxXlsCiFf0Ycg_GL0Cy0MlgTv4U='\n\
    ```\n\n> **提示**  \n> `Fernet` 类是对称（也称为“密钥”）认证密码学的一种实现。Fernet 在 CBC 模式下使用 AES 算法，并采用\
    \ 128 位密钥进行加密。更多详情，请参阅 [`https://github.com/fernet/spec/blob/master/Spec.md`](https://github.com/fernet/spec/blob/master/Spec.md)。\n\
    \n`generate_key()` 函数返回一个共享密钥，其格式为二进制，并且是 base64 编码的。\n\n## 执行对称加密\n\n要使用共享密钥加密数据，你首先需要使用该共享密钥创建一个\
    \ `Fernet` 类的实例：\n\n```\n# 创建 Fernet 类的实例\nfernet = Fernet(shared_key)\n```\n\n\
    然后，你可以使用 `encrypt()` 函数来加密数据：\n\n```\n# 使用共享密钥加密消息\nciphertext = fernet.encrypt(\n\
    bytes(\"秘密消息！\",'utf-8'))\n# 记得传入一个字节数组\n```\n\n你可以将加密后的数据保存到文件中：\n\n```\n# 将加密消息写入文件\n\
    with open('message.encrypted', 'wb') as f:\nf.write(ciphertext)\n```\n\n你也可以将共享密钥保存到文件中：\n\
    \n```\n# 将共享密钥写入文件\nwith open('symmetric_key.crypt', 'wb') as f:\nf.write(shared_key)\n\
    ```\n\n## 执行对称解密\n\n解密过程与加密类似。首先，从文件中（即你之前保存的位置）加载共享密钥：\n\n```\nwith open('symmetric_key.crypt',\
    \ 'rb') as f:\nshared_key = f.read()\nprint(shared_key)\n```\n\n然后，使用该共享密钥创建一个\
    \ `Fernet` 类的实例，并调用 `decrypt()` 函数来解码密文：\n\n```\n# 创建 Fernet 类的实例\nfernet = Fernet(shared_key)\n\
    # 从文件中读取并解密已加密的消息\nwith open('message.encrypted', 'rb') as f:\nprint(fernet.decrypt(f.read()).decode(\"\
    utf-8\"))\n```\n\n# 非对称密码学\n\n与使用单个共享密钥的对称密码学不同，非对称密码学使用一对密钥：一个公钥和一个私钥。\n\n> **提示**\
    \  \n> 非对称密码学也称为公钥密码学。\n\n公钥算法会生成两个在数学上相关联的密钥：\n\n- **一个公钥和一个私钥**：顾名思义，公钥应该公开。而私钥则必须绝对保密。\n\
    - 你可以使用公钥加密数据，并使用私钥解密。例如，如果汤姆想给苏珊发送一条秘密消息，汤姆可以使用苏珊的公钥加密消息，只有苏珊能用她的私钥解密该秘密消息。\n\
    - 你可以使用私钥加密数据，并使用公钥解密。起初，这听起来有点违反直觉。如果有人可以用公钥（它应该是公开的）来解密，那么这样做的意义何在？实际上，这非常有用。假设汤姆用自己的私钥加密了一条消息并发送给苏珊。当苏珊收到消息后，她可以尝试使用汤姆的公钥进行解密。如果消息能够被解密，则意味着该消息未被篡改，并且确实来自汤姆。反之，如果消息被篡改过，苏珊将无法使用汤姆的公钥解密该消息。这种技术被用于创建*数字签名*。\n\
    \n> **提示**  \n> 公钥算法的一些例子包括 RSA（Rivest–Shamir–Adleman）、椭圆曲线密码学（ECC）和 TLS/SSL 协议。\n\
    \n图 1-6 展示了第一种方法，即使用公钥加密数据，然后使用私钥解密。\n\n![](img/471881_2_En_1_Fig6_HTML.jpg)\n\
    \n这张框图分别展示了使用公钥和私钥将明文加密成密文，以及将密文解密成明文的过程。\n\n**图 1-6** – 使用公钥加密数据，然后使用私钥解密密文\n\
    \n图 1-7 展示了第二种方法，即使用私钥加密数据，然后使用公钥解密。\n\n![](img/471881_2_En_1_Fig7_HTML.jpg)\n\
    \n这张框图分别展示了使用私钥和公钥将明文加密成密文，以及将密文解密成明文的过程。\n\n**图 1-7** – 使用私钥加密数据，然后使用公钥解密密文\n"
- fmt: '### Generating and Saving the Public/Private Key Pairs


    Let’s generate the public/private key pair using the `cryptography` module with
    some commonly used parameters:


    ```

    from cryptography.hazmat.backends import default_backend

    from cryptography.hazmat.primitives.asymmetric import rsa

    # generate the private key

    private_key = rsa.generate_private_key(

    public_exponent=65537,

    key_size=2048,

    backend=default_backend()

    )

    # derive the public key from the private key

    public_key = private_key.public_key()

    ```


    In this code snippet, you are using the RSA algorithm to first generate a private
    key. Using the private key, you can then derive its corresponding public key.
    Once the keys are generated, it’s useful to serialize (flatten) them to files:


    ```

    from cryptography.hazmat.primitives import serialization

    #---serialize the private key as bytes---

    pem = private_key.private_bytes(

    encoding = serialization.Encoding.PEM,

    format = serialization.PrivateFormat.PKCS8,

    encryption_algorithm = serialization.NoEncryption()

    )

    with open(''private_key.pem'', ''wb'') as f:

    f.write(pem)

    #---serialize the public key as bytes---

    pem = public_key.public_bytes(

    encoding = serialization.Encoding.PEM,

    format = serialization.PublicFormat.SubjectPublicKeyInfo

    )

    with open(''public_key.pem'', ''wb'') as f:

    f.write(pem)

    ```


    You also need to be able to load them back from files:


    ```

    with open(''private_key.pem'', ''rb'') as f:

    private_key = serialization.load_pem_private_key(

    f.read(),

    password = None,

    backend = default_backend()

    )

    with open(''public_key.pem'', ''rb'') as f:

    public_key = serialization.load_pem_public_key(

    f.read(),

    backend = default_backend()

    )

    ```


    ### Encrypting Using the Public Key


    You are now ready to perform encryption using the public key:


    ```

    from cryptography.hazmat.primitives import hashes

    from cryptography.hazmat.primitives.asymmetric import padding

    plaintext = bytes("This message is secret.",''utf-8'')

    # encrypt the message using the public key

    ciphertext = public_key.encrypt(

    plaintext,

    padding.OAEP(

    mgf = padding.MGF1(algorithm = hashes.SHA256()),

    algorithm = hashes.SHA256(),

    label = None

    )

    )

    ```


    Note


    The encrypted ciphertext is a byte array.


    ### Decrypting Using the Private Key


    With the ciphertext created, you can decrypt it using the private key:


    ```

    # decrypt using the private key

    plaintext = private_key.decrypt(

    ciphertext,

    padding.OAEP(

    mgf = padding.MGF1(algorithm = hashes.SHA256()),

    algorithm = hashes.SHA256(),

    label = None

    )

    )

    # decode the plaintext as it is a byte array

    print(plaintext.decode(''utf-8''))

    # This message is secret.

    ```


    Note


    The decrypted plaintext is a byte array.


    ### Digital Signature: Signing Using Private Key


    Earlier I mentioned that in a digital signature you perform encryption using the
    private key and then decrypt using the public key. How does this really work and
    how is it useful? Let’s look at the flow of events shown in Figure [1-8](#471881_2_En_1_Chapter.xhtml#Fig8).


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig8_HTML.jpg)


    A block diagram of digital signature generating. The text leads to a hash using
    a hash function that encrypts by a private key, then leads to a digital signature.
    The signed message includes the text and digital signature.


    Figure 1-8


    Generating a digital signature using the private key


    *   First, the text to be sent is hashed using a hash function.

    *   The hash is then encrypted using the private key and turned into a digital
    signature (this also includes the information on the hashing algorithm used).

    *   The original text, together with the digital signature, are then sent to the
    recipient. This is known as the signed message.


    Figure [1-9](#471881_2_En_1_Chapter.xhtml#Fig9) shows what happens when the signed
    message is received by the recipient.


    ![](images/471881_2_En_1_Chapter/471881_2_En_1_Fig9_HTML.jpg)


    A block diagram illustrates verifying the digital signature using the public key.
    On the left, it includes three blocks, such as digital signature, public key,
    and hash, with a central block decrypt. On the right, text links to the hash.
    Both compare the signed message.


    Figure 1-9


    Verifying a digital signature using the public key


    *   When the signed message is received, the receiver uses the sender’s public
    key to decrypt the hash from the digital signature.

    *   The receiver also hashes the received text and compares it with the hash that
    was decrypted in the previous step.

    *   If the two hashes match, this means the text has not been tampered with.


    Note


    A digital signature is a mathematical technique used to validate the authenticity
    and integrity of a message, software, or digital document.


    Let’s create a digital signature using the private key.


    Technically, you can’t call the `encrypt()` function on the private key:


    ```

    private_key.encrypt(...)    # ERROR

    # AttributeError: ''_RSAPrivateKey'' object has no attribute ''encrypt''

    ```


    Rather, you call the `sign()` function:


    ```

    import base64

    plaintext = bytes("This message is public.",''utf-8'')

    # sign the message using the private key

    signed = private_key.sign(

    plaintext,

    padding.PSS(

    mgf = padding.MGF1(algorithm=hashes.SHA256()),

    salt_length = padding.PSS.MAX_LENGTH

    ),

    hashes.SHA256()

    )

    # print out the digital signature using base64 encoding

    signed_base64 = base64.b64encode(signed).decode(''utf-8'')

    print(signed_base64)

    ```


    Here you use the private key to sign the message. The `sign()` function returns
    the digital signature of the string. It returns the digital signature as a byte
    array, and in the above code snippet you encode it using base64 encoding and then
    converted it to string. The output looks like this:


    ```

    

    ```


    When you transmit the message (`plaintext`), you also send the digital signature
    along with it.


    ### Verifying the Digital Signature Using a Public Key


    When the recipient receives the message along with the digital signature, they
    can simply verify that the message has not been tampered by calling the `verify()`
    function on the public key:


    ```

    from cryptography.exceptions import InvalidSignature

    # decode the digital signature from base64

    signed = base64.b64decode(signed_base64)

    try:

    public_key.verify(

    signed,

    plaintext,    # from the previous section

    padding.PSS(

    mgf = padding.MGF1(hashes.SHA256()),

    salt_length = padding.PSS.MAX_LENGTH

    ),

    hashes.SHA256()

    )

    print(''Signature is valid!'')

    except InvalidSignature:

    print(''Signature is invalid!'')

    ```


    Note that you have to catch the exception raised by the `verify()` function. If
    there is no exception, the signature is deemed to be correct; otherwise, it is
    invalid.


    ## How Cryptography Is Used in Blockchain


    If you have been following up to this point, you should now have a good idea of
    how cryptography works. You might now be wondering how cryptography plays an important
    role in blockchain.


    The following sections discuss how the various cryptographic algorithms are used
    in blockchain. If you are new to blockchain, feel free to skip the following sections
    and read the next chapter. Come back to the next few sections after you have read
    the following chapters:


    *   Chapter [2](#471881_2_En_2_Chapter.xhtml): Hashing is used to “chain” the
    blocks in a blockchain.

    *   Chapters [4](#471881_2_En_4_Chapter.xhtml) and [5](#471881_2_En_5_Chapter.xhtml):
    Asymmetric cryptography is used to generate your accounts, and symmetric cryptography
    is used to secure the accounts you have created in your crypto-wallets.

    *   Chapter [4](#471881_2_En_4_Chapter.xhtml) onwards: Asymmetric cryptography
    is used to create digital signatures for all of your transactions on the blockchain.'
