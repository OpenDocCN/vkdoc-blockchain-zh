    **Figure 10-7** - Betting the number 1 with 2000 Wei


    *   Bet the number 1 with 2000 Wei (see Figure [10-7](#471881_2_En_10_Chapter.xhtml#Fig7)).

    *   Click the `bet` button.


    Then, click the `getGameStatus` button and you should see a result of 1 and 3
    (see Figure [10-8](#471881_2_En_10_Chapter.xhtml#Fig8)). The 1 means one player
