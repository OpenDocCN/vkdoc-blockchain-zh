    \ You learned the basics: how to create accounts, transfer Ethers between accounts,\
    \ and export and import accounts into MetaMask. In the following chapters, you\
    \ have more opportunities to see MetaMask in action and how it helps you to run\
    \ dapps (decentralized apps) in your web browsers.\n\n# 6. Getting Started with\
    \ Smart Contracts\n\nIn the previous chapter, you learned how to manage your Ethers\
    \ using the MetaMask Chrome extension and how to get test Ethers from the Goerli\
    \ testnet. In this chapter, you will learn about one of the most interesting and\
    \ exciting features of Ethereum: smart contracts. You will get a quick look at\
    \ what a smart contract looks like as well as how to test it. In the next few\
    \ chapters, you will dive into the details of smart contracts.\n\n## What Is a\
    \ Smart Contract?\n\nA smart contract is essentially an application residing on\
    \ the blockchain that can write values onto the blockchain itself. As all the\
    \ data recorded on the blockchain are immutable and traceable, smart contracts\
    \ allow you to make use of the blockchain as a backing store for storing data\
    \ that are permanent (such as student examination results) so that you can use\
    \ it as a form of proof later on.\n\nFigure [6-1](#471881_2_En_6_Chapter.xhtml#Fig1)\
    \ shows the conceptual idea behind smart contracts.\n\n![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig1_HTML.jpg)\n\
    \nA diagram presents the blockchain with n blocks, which include transactions,\
    \ smart contracts, and state variables written by a smart contract.\n\n**Figure\
    \ 6-1** Besides storing transactions, a blockchain also contains smart contracts,\
    \ which can write values onto the blockchain itself\n\nBesides storing transactions,\
    \ a programmable blockchain (such as Ethereum) can also store smart contracts.\
    \ When a smart contract is invoked (every smart contract deployed onto the blockchain\
    \ has an address), the smart contract can execute code much like an application\
    \ can (though there are several restrictions on what a smart contract can and\
    \ cannot do). Typically, a smart contract can write values (commonly referred\
    \ to as **state variables**) onto the blockchain.\n\nBesides writing values onto\
    \ the blockchain, smart contracts can also transfer funds (such as tokens and\
    \ cryptos) between accounts. This opens a lot of possibilities for developers\
    \ to write interesting applications that run on the blockchain. Decentralized\
    \ lottery apps, anyone?\n\n### How Smart Contracts Are Executed\n\nA smart contract\
    \ basically has two main types of functions:\n\n- Functions that write values\
    \ onto the blockchain and hence change the state of the blockchain\n- Functions\
    \ that read from the blockchain\n\n> **Note**  \n> When you call a smart contract\
    \ function that writes to the blockchain, you are essentially performing a transaction\
    \ that changes the state of the storage on the blockchain.\n\nWhen you call a\
    \ function that changes the state of the blockchain (such as saving the examination\
    \ result of a student onto the blockchain), all miners/validators will execute\
    \ the smart contract function (using the EVM; more on this in the sidebar) and\
    \ add the state changes onto the block so that it can be prepared for mining/validation\
    \ and ultimately be added onto the blockchain.\n\n> **Note**  \n> Essentially,\
    \ when you call a function that changes the state of the blockchain, multiple\
    \ nodes will run the same function and try to add the state changes into the block.\
    \ Ultimately, only the winning miner/validator will add the block to the blockchain.\n\
    \nFor functions that read from the blockchain and do not make any state changes\
    \ to the blockchain, the node that is connected to the caller of the function\
    \ executes the function and directly reads the value from its local copy of the\
    \ blockchain and then returns the value back to the caller. This is more straightforward\
    \ and only involves one node.\n\n**ETHEREUM VIRTUAL MACHINE (EVM)**\n\nThe EVM\
    \ is a sandboxed execution environment on nodes that run smart contracts. The\
    \ EVM is *turing-complete*, which means that it is capable of running any programs\
    \ that can (for the most part) solve any reasonable computational problems.\n\n\
    Today, you will often hear the phrase *EVM compatibility*. It means that a particular\
    \ blockchain supports smart contracts that are compatible with Ethereum virtual\
    \ machines. This allows your smart contract written in Solidity (or any other\
    \ languages supported by Ethereum) to run on other blockchains without modifications.\n\
    \n## Your First Smart Contract\n\nYou are now ready to write your first smart\
    \ contract. To do this, you can use any of your favorite code editors, such as\
    \ Visual Studio Code or even `vi`.\n\n> **Tip**  \n> Visual Studio Code has several\
    \ Solidity extensions that you can install to make the writing of smart contracts\
    \ easy.\n\nMy personal favorite is the **Remix IDE**. The Remix IDE is a suite\
    \ of tools for interacting with the Ethereum blockchain. It can compile your smart\
    \ contract into bytecode, generate the ABI (application binary interface), and\
    \ deploy your contracts into the various Ethereum test networks (as well as the\
    \ real Ethereum blockchain). The ability to compile the contract on the fly makes\
    \ it a very handy tool for learning smart contract programming. Hence, I strongly\
    \ recommend that you use it to write your contracts.\n\nFor this book, use the\
    \ Remix IDE for writing smart contracts.\n\n> **Note**  \n> To compile a Solidity\
    \ smart contract, you need to use the `solc` compiler. But if you use the Remix\
    \ IDE, you don’t have to explicitly use it to compile your contract."
  raw: '### Importing Accounts


    To import an account into MetaMask,


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig31_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays a list under the
    My accounts option, where account 1 is selected.


    Figure 5-31


    Importing an existing account


    *   Click the colored icon located at the top right corner of MetaMask (see Figure
    [5-31](#471881_2_En_5_Chapter.xhtml#Fig31)). Click **Import Account**.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig32_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays a message under
    the import account, a private key tab, and cancel and import buttons.


    Figure 5-32


    Pasting the private key to import the account


    *   Paste the private key into the text box as shown in Figure [5-32](#471881_2_En_5_Chapter.xhtml#Fig32).
    Click **Import**. The account is now be imported into MetaMask.


    Tip


    You can only import a new account based on a private key that is not already in
    your MetaMask. If not, the import will not be successful. Also, for accounts that
    you have imported using their private keys, they are not recoverable using the
    12-word secret phrase. To restore these accounts, you have to use their private
    key or JSON file.


    Tip


    There are two ways to import accounts into MetaMask: using private key or JSON
    File. In Chapter [4](#471881_2_En_4_Chapter.xhtml), you learned about the accounts
    stored in the JSON files. This is what you can use to import the accounts in Geth
    into the MetaMask.


    ## Summary


    In this chapter, you saw how to use the MetaMask Chrome extension to manage your
    Ethereum accounts. You learned the basics: how to create accounts, transfer Ethers
    between accounts, and export and import accounts into MetaMask. In the following
    chapters, you have more opportunities to see MetaMask in action and how it helps
    you to run dapps (decentralized apps) in your web browsers.


    # 6. Getting Started with Smart Contracts


    In the previous chapter, you learned how to manage your Ethers using the MetaMask
    Chrome extension and how to get test Ethers from the Goerli testnet. In this chapter,
    you will learn about one of the most interesting and exciting features of Ethereum:
    smart contracts. You will get a quick look at what a smart contract looks like
    as well as how to test it. In the next few chapters, you will dive into the details
    of smart contracts.


    ## What Is a Smart Contract?


    A smart contract is essentially an application residing on the blockchain that
    can write values onto the blockchain itself. As all the data recorded on the blockchain
    are immutable and traceable, smart contracts allow you to make use of the blockchain
    as a backing store for storing data that are permanent (such as student examination
    results) so that you can use it as a form of proof later on.


    Figure [6-1](#471881_2_En_6_Chapter.xhtml#Fig1) shows the conceptual idea behind
    smart contracts.


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig1_HTML.jpg)


    A diagram presents the blockchain with n blocks, which include transactions, smart
    contracts, and state variables written by a smart contract.


    Figure 6-1


    Besides storing transactions, a blockchain also contains smart contracts, which
    can write values onto the blockchain itself


    Besides storing transactions, a programmable blockchain (such as Ethereum) can
    also store smart contracts. When a smart contract is invoked (every smart contract
    deployed onto the blockchain has an address), the smart contract can execute code
    much like an application can (though there are several restrictions on what a
    smart contract can and cannot do). Typically, a smart contract can write values
    (commonly referred to as **state variables**) onto the blockchain.


    Besides writing values onto the blockchain, smart contracts can also transfer
    funds (such as tokens and cryptos) between accounts. This opens a lot of possibilities
    for developers to write interesting applications that run on the blockchain. Decentralized
    lottery apps, anyone?


    ### How Smart Contracts Are Executed


    A smart contract basically has two main types of functions:


    *   Functions that write values onto the blockchain and hence change the state
    of the blockchain


    *   Functions that read from the blockchain


    Note


    When you call a smart contract function that writes to the blockchain, you are
    essentially performing a transaction that changes the state of the storage on
    the blockchain.


    When you call a function that changes the state of the blockchain (such as saving
    the examination result of a student onto the blockchain), all miners/validators
    will execute the smart contract function (using the EVM; more on this in the sidebar)
    and add the state changes onto the block so that it can be prepared for mining/validation
    and ultimately be added onto the blockchain.


    Note


    Essentially, when you call a function that changes the state of the blockchain,
    multiple nodes will run the same function and try to add the state changes into
    the block. Ultimately, only the winning miner/validator will add the block to
    the blockchain.


    For functions that read from the blockchain and do not make any state changes
    to the blockchain, the node that is connected to the caller of the function executes
    the function and directly reads the value from its local copy of the blockchain
    and then returns the value back to the caller. This is more straightforward and
    only involve one node.


    ETHEREUM VIRTUAL MACHINE (EVM)


    The EVM is a sandboxed execution environment on nodes that run smart contracts.
    The EVM is *turing-complete*, which means that it is capable of running any programs
    that can (for the most part) solve any reasonable computational problems.


    Today, you will often hear the phrase *EVM compatibility*. It means that a particular
    blockchain supports smart contracts that are compatible with Ethereum virtual
    machines. This allows your smart contract written in Solidty (or any other languages
    supported by Ethereum) to run on other blockchains without modifications.


    ## Your First Smart Contract


    You are now ready to write your first smart contract. To do this, you can use
    any of your favorite code editors, such as Visual Studio Code or even vi.


    Tip


    Visual Studio Code has several Solidity extensions that you can install to make
    the writing of smart contracts easy.


    My personal favorite is the **Remix IDE**. The Remix IDE is a suite of tools for
    interacting with the Ethereum blockchain. It can compile your smart contract into
    bytecode, generate the ABI (application binary interface), and deploy your contracts
    into the various Ethereum test networks (as well as the real Ethereum blockchain).
    The ability to compile the contract on the fly makes it a very handy tool for
    learning smart contract programming. Hence, I strongly recommend that you use
    it to write your contracts.


    For this book, use the Remix IDE for writing smart contracts.


    Note


    To compile a Solidity smart contract, you need to use the **solc** compiler. But
    if you use the Remix IDE, you don’t have to explicitly use it to compile your
    contract.'
