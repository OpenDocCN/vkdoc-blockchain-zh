    \ Merkle root is derived from the transactions.\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig17_HTML.png)\n\
    \nA tree diagram explains how Merkle roots are derived. Merkle root derives into\
    \ H subscript A B C D E E E E, then divides into H subscript A B C D and H subscript\
    \ E E E E. Further, it ends with transaction A, transaction B, transaction C,\
    \ transaction D, and transaction E.\n\nFigure 2-17\n\nHow the Merkle root is derived\
    \ from the Merkle tree\n\nAs you can see, each transaction is hashed. The hash\
    \ of each transaction is hashed together with the hash of another node. For example,\
    \ the hash of transaction A (H[A]) is combined with the hash of transaction B\
    \ (H[B]) and hashed to derive H[AB]. This process is repeated until there’s only\
    \ one resultant hash. This final hash is known as the Merkle root. In this example,\
    \ because H[E] doesn’t have another node to pair with, it’s hashed with itself.\
    \ The same applies to H[EE].\n\nThe Merkle root is stored in the block header,\
    \ and the rest of the transactions are stored in the block as a Merkle tree. In\
    \ earlier discussion, I mentioned full nodes. Full nodes download the entire blockchain.\
    \ There’s another type of node (known as a *light node*) that downloads only the\
    \ blockchain headers. Because light nodes don’t download the entire blockchain,\
    \ they’re easier to maintain and run. Using a method called *simplified payment\
    \ verifications* (SPV), a light node can query a full node to verify a transaction.\
    \ Examples of light nodes are cryptographic wallets.\n\n### Uses of Merkle Tree\
    \ and the Merkle Root\n\nBy storing the Merkle root in the block header and the\
    \ transactions as a Merkle tree in the block, a light node can easily verify if\
    \ a transaction belongs to a particular block. This is how it works. Suppose a\
    \ light node wants to verify that transaction C exists in a particular block.\n\
    \n*   The light node queries a full node for the following hashes: H[D], H[AB],\
    \ and H[EEEE] (see Figure [2-18](#471881_2_En_2_Chapter.xhtml#Fig18)).\n\n*  \
    \ Because the light node can compute H[C], it can then compute H[CD] with H[D]\
    \ supplied.\n\n*   With H[AB] supplied, it can now compute H[ABCD].\n\n*   With\
    \ H[EEEE] supplied, it can now compute H[ABCDEEEE] (which is the Merkle root).\n\
    \n*   Because the light node has the Merkle root of the block, it can now check\
    \ to see if the two Merkle roots match. If they match, the transaction is verified.\n\
    \nAs you can see from this simple example, to verify a single transaction out\
    \ of five transactions, only three hashes need to be retrieved from the full node.\
    \ Mathematically, for *n* transactions in a block, it takes log[2]n hashes to\
    \ verify that a transaction is in a block. For example, if there are 1,024 transactions\
    \ in a block, a light node only needs to request 10 hashes to verify the existence\
    \ of a transaction in the block.\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig18_HTML.jpg)\n\
    \nA tree diagram explains the transaction from the Merkle root. Block header is\
    \ H subscript A B C D E E E E, the blocks such as H subscript A B C D, H subscript\
    \ E E E E, H subscript A, H subscript B, H subscript C, H subscript D, H subscript\
    \ E belongs to block section.\n\nFigure 2-18\n\nHow the Merkle tree and Merkle\
    \ root are used to validate a transaction\n\n## Summary\n\nIn this chapter, you\
    \ learned the motivations behind blockchain and the problems that it aims to solve.\
    \ You explored how blocks are added to the blockchain through a process known\
    \ as mining. In the next chapter, you will learn how to build your own blockchain\
    \ using Python so that you can see and understand the inner workings of a blockchain.\n\
    \n# 3. Implementing Your Own Blockchain Using Python\n\nIn the previous chapter,\
    \ you learned about the basics of blockchain, the motivations behind blockchains,\
    \ how transactions are added to blocks, and how blocks are added to the previous\
    \ blocks to form a chain of blocks called a blockchain. A good way to understand\
    \ all these concepts is to build one yourself. Implementing your own blockchain\
    \ offers you a more detailed look at how concepts like *transactions*, *mining*,\
    \ and *consensus* work.\n\nObviously, implementing a full blockchain is not for\
    \ the faint of heart, and that is definitely not your goal in this chapter. What\
    \ you will try to do in this chapter is implement a conceptual blockchain using\
    \ Python and use it to illustrate the key concepts."
  trans: "\n### 节点类型\n\n在讨论将默克尔根存储在区块头中的原理之前，我需要先介绍区块链网络中的节点类型。图 2-16 展示了区块链网络中不同类型的节点。\n\
    \n![](img/471881_2_En_2_Fig16_HTML.jpg)\n\n该图展示了区块链网络中的不同类型节点，包括全节点、矿工节点和桌面钱包节点。桌面钱包节点连接至移动钱包和轻节点。\n\
    \n图 2-16\n\n区块链网络中不同类型的节点\n\n如前所述，连接到区块链网络的计算机被称为节点。我已讨论了矿工/验证者节点的作用，其主要职责是将交易收集到区块中，然后尝试将该区块添加到区块链上。矿工/验证者节点也被称为*全节点*。\n\
    \n> **提示：** 全节点不一定是矿工/验证者节点。然而，矿工/验证者节点必须是全节点。\n\n全节点的目的是确保区块链的完整性，运行全节点的人不会获得奖励。另一方面，矿工/验证者节点在成功将区块添加到区块链后可以获得奖励。\n\
    \n全节点的一个例子是桌面钱包，它允许用户使用加密货币进行交易。\n\n每个全节点都拥有整个区块链的副本。全节点还会验证提交给它的每一个区块和交易。\n\n\
    除了全节点，还有*轻节点*。轻节点通过一种称为*简单支付验证*（SPV）的方法来帮助验证交易。SPV 允许节点在不下载整个区块链的情况下，验证某笔交易是否已被包含在某个区块中。通过使用\
    \ SPV，轻节点连接到全节点，并将交易发送给全节点进行验证。\n\n轻节点只需要存储区块链中所有区块的区块头。轻节点的一个例子是移动钱包，例如适用于 iOS\
    \ 和 Android 的 Coinbase 移动应用。通过移动钱包，用户可以在移动设备上进行交易。\n\n> **注意：** 桌面钱包可以是全节点，也可以是轻节点。\n\
    \n以下是到目前为止所讨论的节点类型的总结。\n\n*   **全节点：**\n    *   维护区块链的完整副本\n    *   能够验证自创世以来的所有交易\n\
    \    *   验证新创建的区块并将其添加到区块链中\n    *   访问以下站点即可查看当前以下区块链的全节点数量：\n        *   比特币：[`https://bitnodes.earn.com`](https://bitnodes.earn.com)\n\
    \        *   以太坊：[`www.ethernodes.org/network/1`](http://www.ethernodes.org/network/1)\n\
    *   **矿工节点**（必须是全节点）：\n    *   解决一个难题（寻找随机数 nonce）\n*   **轻节点**（例如钱包）：\n    *\
    \   维护区块链的区块头\n    *   使用 SPV 验证某一区块中的交易是否存在且有效\n\n最后，你将在下一节看到将交易表示为区块头中的默克尔根的实际应用。\n\
    \n### 默克尔树与默克尔根\n\n区块中的交易列表以*默克尔树*的形式存储。默克尔树是一种树形数据结构，其中每个叶节点是一笔交易的哈希值，而每个非叶节点是其子节点的加密哈希值。图\
    \ 2-17 展示了默克尔根是如何从交易中推导出来的。\n\n![](img/471881_2_En_2_Fig17_HTML.png)\n\n该树状图解释了默克尔根是如何推导的。默克尔根推导为\
    \ `H` 下标 `A B C D E E E E`，然后分为 `H` 下标 `A B C D` 和 `H` 下标 `E E E E`。进一步地，最终节点为交易\
    \ A、交易 B、交易 C、交易 D 和交易 E。\n\n图 2-17\n\n默克尔根是如何从默克尔树中推导出来的\n\n如您所见，每笔交易都被哈希处理。每笔交易的哈希值会与另一个节点的哈希值进行配对并哈希。例如，交易\
    \ A 的哈希值 (`H[A]`) 与交易 B 的哈希值 (`H[B]`) 组合，并经过哈希计算得到 `H[AB]`。这个过程不断重复，直到只剩下一个最终的哈希值。这个最终的哈希值被称为默克尔根。在本例中，因为\
    \ `H[E]` 没有其他节点与之配对，所以它与自身进行哈希计算。`H[EE]` 也是如此。\n\n默克尔根存储在区块头中，而其余的交易则以默克尔树的形式存储在区块中。在之前的讨论中，我提到了全节点。全节点会下载整个区块链。还有另一种节点（称为*轻节点*）只下载区块链的区块头。由于轻节点不下载整个区块链，因此它们更容易维护和运行。通过一种称为*简单支付验证*（SPV）的方法，轻节点可以向全节点查询以验证一笔交易。轻节点的例子包括加密钱包。\n\
    \n### 默克尔树与默克尔根的用途\n\n通过将默克尔根存储在区块头中，并将交易以默克尔树的形式存储在区块中，轻节点可以轻松地验证一笔交易是否属于某个特定区块。其工作原理如下。假设一个轻节点想要验证交易\
    \ C 是否存在于某个特定区块中。\n\n*   轻节点向全节点查询以下哈希值：`H[D]`、`H[AB]` 和 `H[EEEE]`（见图 2-18）。\n\
    *   由于轻节点可以计算出 `H[C]`，然后它可以使用提供的 `H[D]` 计算出 `H[CD]`。\n*   有了提供的 `H[AB]`，它现在可以计算出\
    \ `H[ABCD]`。\n*   有了提供的 `H[EEEE]`，它现在可以计算出 `H[ABCDEEEE]`（即默克尔根）。\n*   由于轻节点拥有该区块的默克尔根，现在它可以检查两个默克尔根是否匹配。如果匹配，则该交易验证通过。\n\
    \n从这个简单的例子可以看出，要验证五个交易中的单个交易，只需要从全节点获取三个哈希值。从数学上讲，对于一个包含 `n` 笔交易的区块，需要 `log2[n]`\
    \ 个哈希值来验证一笔交易是否在该区块中。例如，如果一个区块中有 1,024 笔交易，轻节点只需请求 10 个哈希值即可验证该区块中是否存在某笔交易。\n\n\
    ![](img/471881_2_En_2_Fig18_HTML.jpg)\n\n该树状图解释了从默克尔根出发的交易验证过程。区块头是 `H` 下标 `A\
    \ B C D E E E E`，诸如 `H` 下标 `A B C D`，`H` 下标 `E E E E`，`H` 下标 `A`，`H` 下标 `B`，`H`\
    \ 下标 `C`，`H` 下标 `D`，`H` 下标 `E` 这些块属于区块部分。\n\n图 2-18\n\n默克尔树和默克尔根如何用于验证交易\n\n##\
    \ 本章小结\n\n在本章中，您学习了区块链背后的动机及其旨在解决的问题。您探索了如何通过称为“挖矿”的过程将区块添加到区块链中。在下一章中，您将学习如何使用\
    \ Python 构建自己的区块链，以便您能够理解并看到区块链的内部运作机制。\n\n# 3. 使用 Python 实现你自己的区块链\n\n在上一章中，您学习了区块链的基础知识、区块链背后的动机、交易如何添加到区块中，以及区块如何添加到前一个区块上以形成称为区块链的区块链条。理解所有这些概念的一个好方法就是自己动手构建一个。实现你自己的区块链能让你更深入地了解诸如*交易*、*挖矿*和*共识*等概念是如何运作的。\n\
    \n显然，实现一个完整的区块链并非易事，这当然也不是你本章的目标。本章中你将要做的是使用 Python 实现一个概念性的区块链，并用它来阐释关键概念。\n"
- fmt: "# Your Conceptual Blockchain Implementation\n\nFor this chapter, you will\
    \ build the very simple blockchain shown in Figure [3-1](#471881_2_En_3_Chapter.xhtml#Fig1).\n\
    \n![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig1_HTML.jpg)\n\nA block diagram\
    \ contains two sections, such as block 0, that is, Genesis block linked to block\
    \ 1. Each block has the following process. The hash of the previous block, nonce,\
    \ transaction, and network difficulty level.\n\n**Figure 3-1** – Your conceptual\
    \ blockchain\n\nTo keep things simple, each block in your blockchain will contain\
    \ the following components:\n\n- **Timestamp**: The time the block was added to\
    \ the blockchain\n- **Index**: A running number starting from 0 indicating the\
    \ block number\n- **Hash of the previous block**: The hash result of the previous\
    \ block. As shown in Figure [3-1](#471881_2_En_3_Chapter.xhtml#Fig1), the hash\
    \ is the result of hashing the content of the block consisting of the timestamp,\
    \ index, hash of the previous block, nonce, and all the transactions.\n- **Nonce**:\
    \ The *number used once*\n- **Transaction(s)**: Each block will hold a variable\
    \ number of transactions.\n\n> **Note**: For simplicity, you are not going to\
    \ worry about representing the transactions in a Merkle tree, nor are you going\
    \ to separate a block into block header and content.\n\nThe *network difficulty\
    \ level* is fixed at four zeros; that is, in order to derive the nonce, the result\
    \ of the hash of the block must start with four zeros.\n\n> **Tip**: Refer to\
    \ Chapter [2](#471881_2_En_2_Chapter.xhtml) for the idea behind the nonce and\
    \ how it relates to network difficulty level.\n\n## Obtaining the Nonce\n\nFor\
    \ your sample blockchain implementation, the nonce is found by combining it with\
    \ the index of the block, the hash of the previous block, and all the transactions,\
    \ and then checking if the resultant hash matches the network difficulty level\
    \ (see Figure [3-2](#471881_2_En_3_Chapter.xhtml#Fig2)).\n\n![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig2_HTML.jpg)\n\
    \nA block diagram consists of block 2, which has index with hash of previous block,\
    \ nonce, transaction, network difficulty level linked to hash on the right.\n\n\
    **Figure 3-2** – How the nonce is derived in your conceptual blockchain\n\nOnce\
    \ the nonce is found, the block gets appended to the last block in the blockchain,\
    \ with the timestamp added (see Figure [3-3](#471881_2_En_3_Chapter.xhtml#Fig3)).\n\
    \n![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig3_HTML.jpg)\n\nA diagram consists\
    \ of block 0, block 1, and block 2 which has the following processes. Timestamp\
    \ index, hash of previous block, nonce, transaction, and network difficulty level.\n\
    \n**Figure 3-3** – Once a block is mined, it will be appended to the blockchain\
    \ with the timestamp added to the block\n\n## Installing Flask\n\nFor your conceptual\
    \ blockchain, you will run it as a REST API so that you can interact with it through\
    \ REST calls. For this, you will use the **Flask** microframework. To install\
    \ Flask, type the following commands in Terminal:\n\n```\n$ pip install flask\n\
    $ pip install requests\n```\n\nThese commands install the Flask microframework.\n\
    \n> **Tip**: Flask is a web framework that makes building web applications easy\
    \ and rapid.\n\n## Importing the Various Modules and Libraries\n\nTo get started,\
    \ create a text file named `blockchain.py`. At the top of this file, import all\
    \ necessary libraries and modules:\n\n```\nimport sys\nimport hashlib\nimport\
    \ json\nfrom time import time\nfrom uuid import uuid4\nfrom flask import Flask,\
    \ jsonify, request\nimport requests\nfrom urllib.parse import urlparse\n```\n\n\
    ## Declaring the Class in Python\n\nTo represent the blockchain, declare a class\
    \ named `Blockchain`, with the following two initial methods:\n\n```\nclass Blockchain(object):\n\
    \    difficulty_target = \"0000\"\n\n    def hash_block(self, block):\n      \
    \  block_encoded = json.dumps(block, sort_keys=True).encode()\n        return\
    \ hashlib.sha256(block_encoded).hexdigest()\n\n    def __init__(self):\n     \
    \   # stores all the blocks in the entire blockchain\n        self.chain = []\n\
    \        # temporarily stores the transactions for the current block\n       \
    \ self.current_transactions = []\n        # create the genesis block with a specific\
    \ fixed hash\n        # of previous block genesis block starts with index 0\n\
    \        genesis_hash = self.hash_block(\"genesis_block\")\n        self.append_block(\n\
    \            hash_of_previous_block=genesis_hash,\n            nonce=self.proof_of_work(0,\
    \ genesis_hash, [])\n        )\n```\n\nThis creates a class named `Blockchain`\
    \ with two methods:\n\n- The `hash_block()` method encodes a block into an array\
    \ of bytes and then hashes it; you need to ensure that the dictionary is sorted\
    \ or you’ll have inconsistent hashes later.\n- The `__init__()` function is the\
    \ constructor for the class. Here, you store the entire blockchain as a list.\
    \ Because every blockchain has a genesis block, you need to initialize the genesis\
    \ block with the hash of the previous block, and in this example, you simply use\
    \ a fixed string called `genesis_block` to obtain its hash. Once the hash of the\
    \ previous block is found, you need to find the nonce for the block using the\
    \ method named `proof_of_work()` (which you will define in the next section).\n\
    \nThe `proof_of_work()` method (detailed next) will return a nonce that will result\
    \ in a hash that matches the difficulty target when the content of the current\
    \ block is hashed.\n\nFor simplicity, you fix the `difficulty_target` to a hash\
    \ result that starts with four zeros (\"`0000`\").\n\n> **Tip**: The source code\
    \ for your blockchain is shown at the end of this chapter. For the impatient,\
    \ you may wish to look at the code while you go through the various concepts in\
    \ this chapter.\n\n## Finding the Nonce\n\nNow define the `proof_of_work()` method\
    \ to find the nonce for the block:\n\n```\n# use PoW to find the nonce for the\
    \ current block\ndef proof_of_work(self, index, hash_of_previous_block, transactions):\n\
    \    # try with nonce = 0\n    nonce = 0\n    # try hashing the nonce together\
    \ with the hash of the\n    # previous block until it is valid\n    while self.valid_proof(index,\
    \ hash_of_previous_block, transactions, nonce) is False:\n        nonce += 1\n\
    \    return nonce\n```\n\nThe `proof_of_work()` function starts with zero for\
    \ the nonce and checks if the nonce together with the content of the block produces\
    \ a hash that matches the difficulty target. If not, it increments the nonce by\
    \ one and then tries again until it finds the correct nonce.\n\nThe next method,\
    \ `valid_proof()`, hashes the content of a block and checks to see if the block’s\
    \ hash meets the difficulty target:\n\n```\ndef valid_proof(self, index, hash_of_previous_block,\
    \ transactions, nonce):\n    # create a string containing the hash of the previous\n\
    \    # block and the block content, including the nonce\n    content = f'{index}{hash_of_previous_block}{transactions}{nonce}'.encode()\n\
    \    # hash using sha256\n    content_hash = hashlib.sha256(content).hexdigest()\n\
    \    # check if the hash meets the difficulty target\n    return content_hash[:len(self.difficulty_target)]\
    \ == self.difficulty_target\n```\n\n## Appending the Block to the Blockchain\n\
    \nOnce the nonce for a block has been found, you can write the method to append\
    \ the block to the existing blockchain. This is the function of the `append_block()`\
    \ method:\n\n```\n# creates a new block and adds it to the blockchain\ndef append_block(self,\
    \ nonce, hash_of_previous_block):\n    block = {\n        'index': len(self.chain),\n\
    \        'timestamp': time(),\n        'transactions': self.current_transactions,\n\
    \        'nonce': nonce,\n        'hash_of_previous_block': hash_of_previous_block\n\
    \    }\n    # reset the current list of transactions\n    self.current_transactions\
    \ = []\n    # add the new block to the blockchain\n    self.chain.append(block)\n\
    \    return block\n```\n\nWhen the block is added to the blockchain, the current\
    \ timestamp is also added to the block."
  raw: '## Your Conceptual Blockchain Implementation


    For this chapter, you will build the very simple blockchain shown in Figure [3-1](#471881_2_En_3_Chapter.xhtml#Fig1).


    ![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig1_HTML.jpg)


    A block diagram contains two sections, such as block 0, that is, Genesis block
    linked to block 1\. Each block has the following process. The hash of the previous
    block, nonce, transaction, and network difficulty level.


    Figure 3-1


    Your conceptual blockchain


    To keep things simple, each block in your blockchain will contain the following
    components:


    *   **Timestamp**: The time the block was added to the blockchain


    *   **Index**: A running number starting from 0 indicating the block number


    *   **Hash of the previous block**: The hash result of the previous block. As
    shown in Figure [3-1](#471881_2_En_3_Chapter.xhtml#Fig1), the hash is the result
    of hashing the content of the block consisting of the timestamp, index, hash of
    the previous block, nonce, and all the transactions.


    *   **Nonce**: The *number used once*


    *   **Transaction(s)**: Each block will hold a variable number of transactions.


    Note


    For simplicity, you are not going to worry about representing the transactions
    in a Merkle tree, nor are you going to separate a block into block header and
    content.


    The *network difficulty level* is fixed at four zeros; that is, in order to derive
    the nonce, the result of the hash of the block must start with four zeros.


    Tip


    Refer to Chapter [2](#471881_2_En_2_Chapter.xhtml) for the idea behind the nonce
    and how it relates to network difficulty level.


    ### Obtaining the Nonce


    For your sample blockchain implementation, the nonce is found by combining it
    with the index of the block, the hash of the previous block, and all the transactions,
    and then checking if the resultant hash matches the network difficulty level (see
    Figure [3-2](#471881_2_En_3_Chapter.xhtml#Fig2)).


    ![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig2_HTML.jpg)


    A block diagram consists of block 2, which has index with hash of previous block,
    nonce, transaction, network difficulty level linked to hash on the right.


    Figure 3-2


    How the nonce is derived in your conceptual blockchain


    Once the nonce is found, the block gets appended to the last block in the blockchain,
    with the timestamp added (see Figure [3-3](#471881_2_En_3_Chapter.xhtml#Fig3)).


    ![](images/471881_2_En_3_Chapter/471881_2_En_3_Fig3_HTML.jpg)


    A diagram consists of block 0, block 1, and block 2 which has the following processes.
    Timestamp index, hash of previous block, nonce, transaction, and network difficulty
    level.


    Figure 3-3


    Once a blocked is mined, it will be appended to the blockchain with the timestamp
    added to the block


    ### Installing Flask


    For your conceptual blockchain, you will run it as a REST API so that you can
    interact with it through REST calls. For this, you will use the **Flask** microframework.
    To install Flask, type the following commands in Terminal:


    ```

    $ pip install flask

    $ pip install requests

    ```


    These commands install the Flask microframework.


    Tip


    Flask is a web framework that makes building web applications easy and rapid.


    ### Importing the Various Modules and Libraries


    To get started, create a text file named `blockchain.py`. At the top of this file,
    import all necessary libraries and modules:


    ```

    import sys

    import hashlib

    import json

    from time import time

    from uuid import uuid4

    from flask import Flask, jsonify, request

    import requests

    from urllib.parse import urlparse

    ```


    ### Declaring the Class in Python


    To represent the blockchain, declare a class named `blockchain`, with the following
    two initial methods:


    ```

    class Blockchain(object):

    difficulty_target = "0000"

    def hash_block(self, block):

    block_encoded = json.dumps(block,

    sort_keys=True).encode()

    return hashlib.sha256(block_encoded).hexdigest()

    def __init__(self):

    # stores all the blocks in the entire blockchain

    self.chain = []

    # temporarily stores the transactions for the

    # current block

    self.current_transactions = []

    # create the genesis block with a specific fixed hash

    # of previous block genesis block starts with index 0

    genesis_hash = self.hash_block("genesis_block")

    self.append_block(

    hash_of_previous_block = genesis_hash,

    nonce = self.proof_of_work(0, genesis_hash, [])

    )

    ```


    This creates a class named `blockchain` with two methods:


    *   The `hash_block()` method encodes a block into an array of bytes and then
    hashes it; you need to ensure that the dictionary is sorted or you’ll have inconsistent
    hashes later.


    *   The `__init__()` function is the constructor for the class. Here, you store
    the entire blockchain as a list. Because every blockchain has a genesis block,
    you need to initialize the genesis block with the hash of the previous block,
    and in this example, you simply use a fixed string called `genesis_block` to obtain
    its hash. Once the hash of the previous block is found, you need to find the nonce
    for the block using the method named `proof_of_work()` (which you will define
    in the next section).


    The `proof_of_work()` method (detailed next) will return a nonce that will result
    in a hash that matches the difficulty target when the content of the current block
    is hashed.


    For simplicity, you fix the `difficulty_target` to a hash result that starts with
    four zeros (“`0000`”).


    Tip


    The source code for your blockchain is shown at the end of this chapter. For the
    impatient, you may wish to look at the code while you go through the various concepts
    in this chapter.


    ### Finding the Nonce


    Now define the `proof_of_work()` method to find the nonce for the block:


    ```

    # use PoW to find the nonce for the current block

    def proof_of_work(self, index, hash_of_previous_block,

    transactions):

    # try with nonce = 0

    nonce = 0

    # try hashing the nonce together with the hash of the

    # previous block until it is valid

    while self.valid_proof(index, hash_of_previous_block,

    transactions, nonce) is False:

    nonce += 1

    return nonce

    ```


    The `proof_of_work()` function starts with zero for the nonce and checks if the
    nonce together with the content of the block produces a hash that matches the
    difficulty target. If not, it increments the nonce by one and then tries again
    until it finds the correct nonce.


    The next method, `valid_proof()`, hashes the content of a block and checks to
    see if the block’s hash meets the difficulty target:


    ```

    def valid_proof(self, index, hash_of_previous_block,

    transactions, nonce):

    # create a string containing the hash of the previous

    # block and the block content, including the nonce

    content = \

    f''{index}{hash_of_previous_block}{transactions}{nonce}''.encode()

    # hash using sha256

    content_hash = hashlib.sha256(content).hexdigest()

    # check if the hash meets the difficulty target

    return content_hash[:len(self.difficulty_target)] == \

    self.difficulty_target

    ```


    ### Appending the Block to the Blockchain


    Once the nonce for a block has been found, you can write the method to append
    the block to the existing blockchain. This is the function of the `append_block()`
    method:


    ```

    # creates a new block and adds it to the blockchain

    def append_block(self, nonce, hash_of_previous_block):

    block = {

    ''index'': len(self.chain),

    ''timestamp'': time(),

    ''transactions'': self.current_transactions,

    ''nonce'': nonce,

    ''hash_of_previous_block'': hash_of_previous_block

    }

    # reset the current list of transactions

    self.current_transactions = []

    # add the new block to the blockchain

    self.chain.append(block)

    return block

    ```


    When the block is added to the blockchain, the current timestamp is also added
    to the block.'
