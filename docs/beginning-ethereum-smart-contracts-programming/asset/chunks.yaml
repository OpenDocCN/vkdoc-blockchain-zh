  trans: "\n### 在账户之间转账以太币\n\n现在，让我们从账户 1 向账户 2 转账 1 ETH。这是一个很好的机会，让您学习如何使用`web3.py`手动执行交易。具体步骤如下：\n\
    \n- 首先，使用`eth.get_transaction_count()`函数获取指定账户已发送的交易数量。该值将用作交易的*nonce*（交易序号）：\n\
    \n    ```\n    nonce = w3.eth.get_transaction_count(account1_address)\n    ```\n\
    \n- 然后，创建一个包含交易详情的数据字典：\n\n    ```\n    tx = {\n    'nonce': nonce,          \
    \            # 交易序号\n    'to': account2_address,              # 接收以太坊的地址\n   \
    \ 'value': w3.toWei(1000, 'wei'),      # 转账金额\n    'gasPrice': w3.eth.gas_price,\
    \        # 获取当前燃料价格\n    }\n    ```\n\n在这段代码中，您正在从账户 1 向账户 2 转账 1000 Wei。您使用`eth.gas_price`属性来获取当前的燃料价格。\n\
    \n- 接下来，使用`eth.estimate_gas()`函数估算这笔交易所需的燃料量，然后将该数量插入到交易字典中：\n\n    ```\n    gas\
    \ = w3.eth.estimate_gas(tx)\n    tx['gas'] = gas\n    print(tx)\n    ```\n\n \
    \   您应该会看到如下所示的交易详情：\n\n    ```\n    {\n    'nonce': 4,\n    'to': '0x1cc025d9A1741b51FD5dE6003884dc264F149AdC',\n\
    \    'value': 1000,\n    'gasPrice': 114287036513,\n    'gas': 21000\n    }\n\
    \    ```\n\n- 现在，您可以使用`eth.account.sign_transaction()`函数，用私钥对交易进行签名：\n\n    ```\n\
    \    signed_tx = w3.eth.account.sign_transaction(tx,account1_private_key)\n  \
    \  ```\n\n- 要将交易发送至 Infura，请使用`eth.send_raw_transaction()`函数：\n\n    ```\n   \
    \ tx_hash = w3.eth.send_raw_transaction(signed_tx.rawTransaction)\n    print(w3.toHex(tx_hash))\n\
    \    ```\n\n    该函数将返回一个哈希值，如下所示：\n\n    ```\n    0xc23d15f14f20f51b083fe6dab8f953e76b80ce6a3b4c43bfe336d02576eba1da\n\
    \    ```\n\n- 交易需要一些时间才能确认。如果您想等待交易完成，请使用`eth.wait_for_transaction_receipt()`函数（这是一个阻塞调用）：\n\
    \n    ```\n    receipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n    ```\n\
    \n- 最后，为了验证转账是否确实正确执行，检查账户 1 和账户 2 的余额：\n\n    ```\n    print(w3.eth.get_balance(account1_address))\n\
    \    print(w3.eth.get_balance(account2_address))\n    ```\n\n从账户 1 向账户 2 转账 1\
    \ ETH 的完整代码片段如下所示：\n\n```\nnonce = w3.eth.get_transaction_count(account1_address)\n\
    tx = {\n'nonce': nonce,\n'to': account2_address,\n'value': w3.toWei(1000, 'wei'),\n\
    'gasPrice': w3.eth.gas_price,\n}\ngas = w3.eth.estimate_gas(tx)\ntx['gas'] = gas\n\
    signed_tx = w3.eth.account.sign_transaction(tx,account1_private_key)\ntx_hash\
    \ = w3.eth.send_raw_transaction(signed_tx.rawTransaction)\nprint(w3.toHex(tx_hash))\n\
    receipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n```\n\n### 使用 Python 创建去中心化应用（Dapp）\n\
    \n使用 Python 对交易进行签名非常有用，但您使用`web3.py`库更重要的目标是与其智能合约进行交互。为此，您将使用 Python 与第 7 章中创建的智能合约进行交互。以下是完整的智能合约，供您参考：\n\
    \n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\ncontract EduCredentialsStore\
    \ {\n// 存储合约所有者\naddress owner = msg.sender;\n//---存储字符串的哈希值及其对应的区块号---\n// 键是\
    \ bytes32 类型，值是 uint 类型\nmapping (bytes32 => uint) private proofs;\n//---定义一个事件---\n\
    event Result(\naddress from,\nstring document,\nuint blockNumber\n);\n//--------------------------------------------------\n\
    // 在合约状态中存储存在性证明\n//--------------------------------------------------\nfunction\
    \ storeProof(bytes32 proof) private {\n// 使用哈希值作为键\nproofs[proof] = block.number;\n\
    }\n//----------------------------------------------\n// 计算并存储文档的证明\n//----------------------------------------------\n\
    function storeEduCredentials(string calldata\ndocument) external {\nrequire(msg.sender\
    \ == owner,\n\"只有合约所有者才能存储凭证\");\n// 使用字符串的哈希值调用 storeProof()\nstoreProof(proofFor(document));\n\
    }\nfunction cashOut() public {\nrequire(msg.sender == owner,\n\"只有合约所有者才能提现！\"\
    );\npayable(owner).transfer(\naddress(this).balance);\n}\n//--------------------------------------------\n\
    // 获取文档 sha256 哈希值的辅助函数\n//--------------------------------------------\n// 输入一个字符串，返回该字符串的哈希值\n\
    function proofFor(string calldata document) private\npure returns (bytes32) {\n\
    // 将字符串转换为字节数组，然后对其哈希\nreturn sha256(bytes(document));\n}\n//-----------------------------------------------\n\
    // 检查文档之前是否已被保存\n//-----------------------------------------------\nfunction checkEduCredentials(string\
    \ calldata document) public payable {\nrequire(msg.value == 1000 wei ,\n\"此调用需要\
    \ 1000 wei\");\n// 使用字符串的哈希值，检查 proofs 映射对象，然后触发事件\nemit Result(msg.sender,\n\
    document,\nproofs[proofFor(document)]);\n}\n/* 自毁函数 */\nfunction kill() public\
    \ {\nrequire(msg.sender == owner, \"只有所有者才能销毁此合约\");\nselfdestruct(payable(owner));\n\
    }\n}\n```\n\n> **提示：** 如果您不记得先前在 Goerli 测试网上部署的该合约地址，请再次部署一次，并记下其地址。\n\n为了演示，我在\
    \ Goerli 测试网上的合约地址是`0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330`。此外，您还需要获取合约的 ABI。为了方便您，现提供如下：\n\
    \n```\n[  {   \"inputs\": [],   \"name\": \"cashOut\",   \"outputs\": [],   \"\
    stateMutability\": \"nonpayable\",   \"type\": \"function\"  },  {   \"inputs\"\
    : [    {     \"internalType\": \"string\",     \"name\": \"document\",     \"\
    type\": \"string\"    }   ],   \"name\": \"checkEduCredentials\",   \"outputs\"\
    : [],   \"stateMutability\": \"payable\",   \"type\": \"function\"  },  {   \"\
    inputs\": [],   \"name\": \"kill\",   \"outputs\": [],   \"stateMutability\":\
    \ \"nonpayable\",   \"type\": \"function\"  },  {   \"anonymous\": false,   \"\
    inputs\": [    {     \"indexed\": false,     \"internalType\": \"address\",  \
    \   \"name\": \"from\",     \"type\": \"address\"    },    {     \"indexed\":\
    \ false,     \"internalType\": \"string\",     \"name\": \"document\",     \"\
    type\": \"string\"    },    {     \"indexed\": false,     \"internalType\": \"\
    uint256\",     \"name\": \"blockNumber\",     \"type\": \"uint256\"    }   ],\
    \   \"name\": \"Result\",   \"type\": \"event\"  },  {   \"inputs\": [    {  \
    \   \"internalType\": \"string\",     \"name\": \"document\",     \"type\": \"\
    string\"    }   ],   \"name\": \"storeEduCredentials\",   \"outputs\": [],   \"\
    stateMutability\": \"nonpayable\",   \"type\": \"function\"  } ]\n```\n"
- fmt: "### Loading the Contract\n\nWith the contract deployed, let’s create a reference\
    \ to it using the `eth.contract()` function by passing it the address and ABI\
    \ of the contract:\n\n```\naddress = '0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330'\n\
    abi = '[  {   \"inputs\": [],   \"name\": \"cashOut\",   \"outputs\": [],   \"\
    stateMutability\": \"nonpayable\",   \"type\": \"function\"  },  {   \"inputs\"\
    : [    {     \"internalType\": \"string\",     \"name\": \"document\",     \"\
    type\": \"string\"    }   ],   \"name\": \"checkEduCredentials\",   \"outputs\"\
    : [],   \"stateMutability\": \"payable\",   \"type\": \"function\"  },  {   \"\
    inputs\": [],   \"name\": \"kill\",   \"outputs\": [],   \"stateMutability\":\
    \ \"nonpayable\",   \"type\": \"function\"  },  {   \"anonymous\": false,   \"\
    inputs\": [    {     \"indexed\": false,     \"internalType\": \"address\",  \
    \   \"name\": \"from\",     \"type\": \"address\"    },    {     \"indexed\":\
    \ false,     \"internalType\": \"string\",     \"name\": \"document\",     \"\
    type\": \"string\"    },    {     \"indexed\": false,     \"internalType\": \"\
    uint256\",     \"name\": \"blockNumber\",     \"type\": \"uint256\"    }   ],\
    \   \"name\": \"Result\",   \"type\": \"event\"  },  {   \"inputs\": [    {  \
    \   \"internalType\": \"string\",     \"name\": \"document\",     \"type\": \"\
    string\"    }   ],   \"name\": \"storeEduCredentials\",   \"outputs\": [],   \"\
    stateMutability\": \"nonpayable\",   \"type\": \"function\"  } ]'\neduCredentialsStore\
    \ = w3.eth.contract(address = address, abi = abi)\n```\n\nThe `eduCredentialsStore`\
    \ variable now contains a reference to the smart contract.\n\n### Base64 Encoding\n\
    \nRemember the educational credentials must be base64-encoded before passing to\
    \ the smart contract. Here you will define a helper function named `base64encode()`:\n\
    \n```\nimport base64\ndef base64encode(message):\nmessage_bytes = message.encode('ascii')\n\
    base64_bytes = base64.b64encode(message_bytes)\nreturn base64_bytes.decode('ascii')\n\
    ```\n\nThis function takes in a string and returns its base64-encoded equivalent.\n\
    \n### Saving Credentials on the Blockchain\n\nHere is the code snippet to save\
    \ the educational credential of a student onto the blockchain through your smart\
    \ contract:\n\n```\n# the JSON string containing the exam result\nexam_result\
    \ = '''\n{\n\"id\": \"1234567\",\n\"result\": {\n\"math\": \"A\",\n\"science\"\
    : \"B\",\n\"english\": \"A\"\n}\n}\n'''\nexam_result = base64encode(exam_result)\n\
    # get the nonce of the account\nnonce = w3.eth.get_transaction_count(account1_address)\n\
    # estimate the gas fee\nestimated_gas = \\\neduCredentialsStore.functions.storeEduCredentials(\n\
    exam_result).estimateGas(\n{'from':account1_address})\n# build the transaction\n\
    transaction = \\\neduCredentialsStore.functions.storeEduCredentials(\nexam_result).buildTransaction(\n\
    {\n'gas': estimated_gas,\n'gasPrice': w3.eth.gas_price,\n'from': account1_address,\n\
    'nonce': nonce\n})\n# sign the transaction\nsigned_txn = w3.eth.account.sign_transaction(\n\
    transaction, private_key = account1_private_key)\n# send the transaction\ntx_hash\
    \ = w3.eth.send_raw_transaction(signed_txn.rawTransaction)\nprint(w3.toHex(tx_hash))\n\
    # wait for the transaction to confirm\nreceipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n\
    ```\n\nLet’s go through what happens in this code:\n\n*   You first base64-encode\
    \ the exam results stored as a string.\n    \n    To call the `storeEduCredentials()`\
    \ function in the contract, you use the `eduCredentialsStore.functions.storeEduCredentials()`\
    \ function and then use the `estimateGas()` function to estimate the gas needed\
    \ to call it. Because this function is only callable from the owner of the contract\
    \ (which is `account1_address`), you need to pass `account1_address` into the\
    \ function, or you will encounter an error.\n\n    ```\n    # estimate the gas\
    \ fee\n    estimated_gas = \\\n    eduCredentialsStore.functions.storeEduCredentials(\n\
    \    exam_result).estimateGas(\n    {'from':account1_address})\n    ```\n\n* \
    \  You use the `buildTransaction()` function to build the transaction, passing\
    \ it the estimated gas required, gas price, account calling the contract, and\
    \ the nonce:\n\n    ```\n    # build the transaction\n    transaction = \\\n \
    \   eduCredentialsStore.functions.storeEduCredentials(\n    exam_result).buildTransaction(\n\
    \    {\n    'gas': estimated_gas,\n    'gasPrice': w3.eth.gas_price,\n    'from':\
    \ account1_address,\n    'nonce': nonce\n    })\n    ```\n\n*   You sign the transaction\
    \ using the `sign_transaction()` function, using Account 1’s private key:\n\n\
    \    ```\n    # sign the transaction\n    signed_txn = w3.eth.account.sign_transaction(\n\
    \    transaction, private_key = account1_private_key)\n    ```\n\n*   You send\
    \ the transaction using the `send_raw_transaction()` function:\n\n    ```\n  \
    \  # send the transaction\n    tx_hash = w3.eth.send_raw_transaction(signed_txn.rawTransaction)\n\
    \    print(w3.toHex(tx_hash))\n    ```\n\n*   You use the `eth.wait_for_transaction_receipt()`\
    \ function to wait for the transaction to confirm. When the transaction is confirmed,\
    \ the details of the transaction will be stored in the `receipt` variable.\n\n\
    \    ```\n    # wait for the transaction to confirm\n    receipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n\
    \    ```"
