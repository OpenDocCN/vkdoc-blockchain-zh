- fmt: "### Testing the Smart Contract Using the Goerli Testnet\n\nThe `Remix VM`\
    \ provides a quick way to test your smart contract. However, the most realistic\
    \ way is to deploy it onto a real blockchain. Instead of spending real `Ethers`\
    \ to deploy your smart contract onto the `Mainnet`, the closest you can get is\
    \ to deploy it onto the `Goerli` testnet.\n\nLet’s change the environment in the\
    \ `Remix IDE` to `Injected Provider – MetaMask` (see Figure [6-13](#471881_2_En_6_Chapter.xhtml#Fig13)).\n\
    \n![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig13_HTML.jpg)\n\nA screenshot\
    \ depicts the `Deploy and Run transactions`, which have the environment tab with\
    \ the `injected provider - meta mask`.\n\nFigure 6-13  \nChanging the environment\
    \ in the `Remix IDE`\n\nWhen you change the environment in the `Remix IDE`, `MetaMask`\
    \ will prompt you to connect to your account (see Figure [6-14](#471881_2_En_6_Chapter.xhtml#Fig14)).\
    \ This is to ensure that when you deploy your smart contract to the `Goerli` testnet,\
    \ the account will be used to pay for the transaction fee. Click `Connect` in\
    \ `MetaMask` to connect the account to the `Remix IDE`.\n\n![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig14_HTML.jpg)\n\
    \nTwo screenshots depict the `MetaMask` notification pages. The left page contains\
    \ three accounts, with `Account 1` selected, and the right page contains the connect\
    \ button for `Account 1`.\n\nFigure 6-14  \nConnect one or more accounts in `MetaMask`\
    \ to the `Remix IDE`\n\nIf `MetaMask` is connected successfully to the `Remix\
    \ IDE`, you will see the address of the account displayed under the `ACCOUNT`\
    \ section (see Figure [6-15](#471881_2_En_6_Chapter.xhtml#Fig15)).\n\n![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig15_HTML.jpg)\n\
    \nA screenshot depicts the `Deploy and Run transactions`, which have the environment\
    \ with the `injected provider - Metamask`, and the highlighted account.\n\nFigure\
    \ 6-15  \nThe `Remix IDE` will display the account that is connected to it\n\n\
    > **Tip:** If you don’t see the account address displayed, refresh the `Remix\
    \ IDE` page.\n\nOn `MetaMask`, ensure the following:\n\n- It is connected to the\
    \ `Goerli` testnet.\n- Your account has some test `Ethers` (at least 0.02 `Ethers`).\n\
    \nClick the `Deploy` button in the `Remix IDE` to deploy the contract onto the\
    \ `Goerli` testnet. `MetaMask` will automatically calculate the amount of gas\
    \ you have to pay and prompt you (see Figure [6-16](#471881_2_En_6_Chapter.xhtml#Fig16)).\
    \ Click `Confirm`.\n\n![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig16_HTML.jpg)\n\
    \nA screenshot depicts the `MetaMask` notification page that lists the details\
    \ of `Account 1` with the estimated gas fee and total, along with the selected\
    \ `Confirm` button.\n\nFigure 6-16  \nPaying the gas for the contract deployment\n\
    \n> **Note:** The amount of gas to pay for the deployment of your smart contract\
    \ is dependent on the size and complexity of your contract.\n\nWhen the contract\
    \ is deployed, you will be able to interact with your contract just like you did\
    \ earlier.\n\n## Summary\n\nIn this chapter, you explored what a smart contract\
    \ looks like and how it works. You learned how to use the `Remix VM` to test the\
    \ contract locally, without deploying to the blockchain. You also learned how\
    \ to make use of `MetaMask` to deploy to the `Goerli` testnet. In summary, use\
    \ the `Remix VM` option to quickly test your smart contract for its functionality\
    \ and then deploy it to the `Goerli` testnet for a more realistic feel of how\
    \ it will work in real life. I strongly suggest that you use the `Remix IDE` for\
    \ developing and testing your smart contracts because it makes your life so much\
    \ simpler.\n\nIn the next few chapters, you will dive into the details of a smart\
    \ contract and the various ways you can interact with it.\n\n# 7. Storing Proofs\
    \ Using Smart Contracts\n\nIn the previous chapter, you saw what a smart contract\
    \ is, how it works, and how to create one. In this chapter, you will learn one\
    \ good use case of a smart contract and at the same time learn some advanced techniques\
    \ in `Solidity`.\n\n## A Smart Contract as a Store of Proofs\n\nRecall from Chapter\
    \ [2](#471881_2_En_2_Chapter.xhtml) that data stored on the blockchain is immutable.\
    \ Therefore, the blockchain is a good *store of proofs*. A good use case is storing\
    \ educational credentials of students on the blockchain.\n\nRecently, there have\
    \ been many cases of job applicants submitting fake degree qualifications to employers.\
    \ Employers have no easy way to verify if an applicant’s qualification is genuine\
    \ and must spend precious time verifying the authenticity of the qualification.\
    \ If an institution is able to record the educational credentials obtained by\
    \ students onto the blockchain, it will make it easier for employers (or anyone)\
    \ to verify the authenticity of potential employees’ qualifications.\n\nConsider\
    \ the following simplified example of a student’s examination result represented\
    \ as a JSON string:\n\n```\n{\n\"id\": \"1234567\",\n\"result\": {\n\"math\":\
    \ \"A\",\n\"science\": \"B\",\n\"english\": \"A\"\n}\n}\n```\n\nThe idea is to\
    \ store the examination result onto the blockchain. However, it is not advisable\
    \ to store the JSON string directly onto the blockchain for two key reasons:\n\
    \n- Storing the plain text onto the blockchain is expensive. Every additional\
    \ character stored on the blockchain incurs additional gas fees. The aim is to\
    \ only store only the absolute essential data.\n- You should never store personally\
    \ identifiable data on public blockchains (such as `Ethereum`). On public blockchains,\
    \ all data is up for public scrutiny, so storing the result in plain text will\
    \ violate privacy regulations and laws.\n\nConsidering the privacy concerns, you\
    \ should instead store the hash of the credentials onto the blockchain.\n\n> **Caution:**\
    \ Never store encrypted data on the blockchain as they are susceptible to hacking.\
    \ Storing the hash of the data is much safer.\n\nTo verify that the education\
    \ credential is authentic, pass in the JSON string representing the result and\
    \ check if the hash exists on the blockchain. If it exists, then the result is\
    \ authentic."
  raw: '### Testing the Smart Contract Using the Goerli Testnet


    The Remix VM provides a quick way to test your smart contract. However, the most
    realistic way is to deploy it onto a real blockchain. Instead of spending real
    Ethers to deploy your smart contract onto the Mainnet, the closest you can get
    is to deploy it onto the Goerli testnet.


    Let’s change the environment in the Remix IDE to **Injected Provider – MetaMask**
    (see Figure [6-13](#471881_2_En_6_Chapter.xhtml#Fig13)).


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig13_HTML.jpg)


    A screenshot depicts the Deploy and Run transactions, which have the environment
    tab with the injected provider - meta mask.


    Figure 6-13


    Changing the environment in the Remix IDE


    When you change the environment in the Remix IDE, MetaMask will prompt you to
    connect to your account (see Figure [6-14](#471881_2_En_6_Chapter.xhtml#Fig14)).
    This is to ensure that when you deploy your smart contract to the Goerli testnet,
    the account will be used to pay for the transaction fee. Click **Connect** in
    MetaMask to connect the account to the Remix IDE.


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig14_HTML.jpg)


    Two screenshots depict the meta mask notification pages. The left page contains
    three accounts, with account 1 selected, and the right page contains the connect
    button for account 1.


    Figure 6-14


    Connect one or more accounts in MetaMask to the Remix IDE


    If MetaMask is connected successfully to the Remix IDE, you will see the address
    of the account displayed under the ACCOUNT section (see Figure [6-15](#471881_2_En_6_Chapter.xhtml#Fig15)).


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig15_HTML.jpg)


    A screenshot depicts the Deploy and Run transactions, which have the environment
    with the injected provider - Metamask, and the highlighted account.


    Figure 6-15


    The Remix IDE will display the account that is connected to it


    Tip


    If you don’t see the account address displayed, refresh the Remix IDE page.


    On MetaMask, ensure the following:


    *   It is connected to the Goerli testnet.


    *   Your account has some test Ethers (at least 0.02 Ethers).


    Click the **Deploy** button in the Remix IDE to deploy the contract onto the Goerli
    testnet. MetaMask will automatically calculate the amount of gas you have to pay
    and prompt you (see Figure [6-16](#471881_2_En_6_Chapter.xhtml#Fig16)). Click
    **Confirm**.


    ![](images/471881_2_En_6_Chapter/471881_2_En_6_Fig16_HTML.jpg)


    A screenshot depicts the Meta mask notification page that lists the details of
    account 1 with the estimated gas fee and total, along with the selected confirm
    button.


    Figure 6-16


    Paying the gas for the contract deployment


    Note


    The amount of gas to pay for the deployment of your smart contract is dependent
    on the size and complexity of your contract.


    When the contract is deployed, you will be able to interact with your contract
    just like you did earlier.


    ## Summary


    In this chapter, you explored what a smart contract looks like and how it works.
    You learned how to use the Remix VM to test the contract locally, without deploying
    to the blockchain. You also learned how to make use of MetaMask to deploy to the
    Goerli testnet. In summary, use the Remix VM option to quickly test your smart
    contract for its functionality and then deploy it to the Goerli testnet for a
    more realistic feel of how it will work in real life. I strongly suggest that
    you use the Remix IDE for developing and testing your smart contracts because
    it makes your life so much simpler.


    In the next few chapters, you will dive into the details of a smart contract and
    the various ways you can interact with it.


    # 7. Storing Proofs Using Smart Contracts


    In the previous chapter, you saw what a smart contract is, how it works, and how
    to create one. In this chapter, you will learn one good use case of a smart contract
    and at the same time learn some advanced techniques in Solidity.


    ## A Smart Contract as a Store of Proofs


    Recall from Chapter [2](#471881_2_En_2_Chapter.xhtml) that data stored on the
    blockchain is immutable. Therefore, the blockchain is a good *store of proofs*.
    A good use case is storing educational credentials of students on the blockchain.


    Recently, there have been many cases of job applicants submitting fake degree
    qualifications to employers. Employers have no easy way to verify if an applicant’s
    qualification is genuine and must spend precious time verifying the authenticity
    of the qualification. If an institution is able to record the educational credentials
    obtained by students onto the blockchain, it will make it easier for employers
    (or anyone) to verify the authenticity of potential employees’ qualifications.


    Consider the following simplified example of a student’s examination result represented
    as a JSON string:


    ```

    {

    "id": "1234567",

    "result": {

    "math": "A",

    "science": "B",

    "english": "A"

    }

    }

    ```


    The idea is to store the examination result onto the blockchain. However, it is
    not advisable to store the JSON string directly onto the blockchain for two key
    reasons:


    *   Storing the plain text onto the blockchain is expensive. Every additional
    character stored on the blockchain incurs additional gas fees. The aim is to only
    store only the absolute essential data.


    *   You should never store personally identifiable data on public blockchains
    (such as Ethereum). On public blockchains, all data is up for public scrutiny,
    so storing the result in plain text will violate privacy regulations and laws.


    Considering the privacy concerns, you should instead store the hash of the credentials
    onto the blockchain.


    Caution


    Never store encrypted data on the blockchain as they are susceptible to hacking.
    Storing the hash of the data is much safer.


    To verify that the education credential is authentic, pass in the JSON string
    representing the result and check if the hash exists on the blockchain. If it
    exists, then the result is authentic.'
  trans: "\n### 使用 Goerli 测试网络测试智能合约\n\n`Remix VM` 提供了一种快速测试智能合约的方法。然而，最贴近实际的方式还是将其部署到真正的区块链上。与其花费真实的\
    \ `Ethers` 将智能合约部署到 `主网`，最接近的做法是将其部署到 `Goerli` 测试网络。\n\n现在，我们将 `Remix IDE` 中的环境更改为\
    \ `Injected Provider – MetaMask`（参见图 6-13）。\n\n![](img/471881_2_En_6_Fig13_HTML.jpg)\n\
    \n一张截图显示了 `部署并运行交易` 界面，其中环境选项卡下显示为 `injected provider - meta mask`。\n\n图 6-13\
    \  \n在 `Remix IDE` 中更改环境\n\n当您在 `Remix IDE` 中更改环境时，`MetaMask` 会提示您连接到您的账户（参见图\
    \ 6-14）。这样做是为了确保当您将智能合约部署到 `Goerli` 测试网络时，该账户将用于支付交易手续费。在 `MetaMask` 中点击 `连接`，将账户连接到\
    \ `Remix IDE`。\n\n![](img/471881_2_En_6_Fig14_HTML.jpg)\n\n两张截图展示了 `MetaMask`\
    \ 通知页面。左侧页面包含三个账户，其中 `账户 1` 被选中；右侧页面包含 `账户 1` 的连接按钮。\n\n图 6-14  \n在 `Remix IDE`\
    \ 中连接 `MetaMask` 的一个或多个账户\n\n如果 `MetaMask` 成功连接到 `Remix IDE`，您将看到 `账户` 部分下方显示该账户的地址（参见图\
    \ 6-15）。\n\n![](img/471881_2_En_6_Fig15_HTML.jpg)\n\n一张截图显示了 `部署并运行交易` 界面，其中环境显示为\
    \ `injected provider - Metamask`，并且账户被高亮显示。\n\n图 6-15  \n`Remix IDE` 将显示已连接到它的账户\n\
    \n> **提示：** 如果您没有看到账户地址显示，请刷新 `Remix IDE` 页面。\n\n在 `MetaMask` 上，请确保以下内容：\n\n-\
    \ 它已连接到 `Goerli` 测试网络。\n- 您的账户有一些测试用的 `Ethers`（至少 0.02 `Ethers`）。\n\n在 `Remix\
    \ IDE` 中点击 `部署` 按钮，将合约部署到 `Goerli` 测试网络。`MetaMask` 将自动计算您需要支付的 Gas 费用并提示您（参见图\
    \ 6-16）。点击 `确认`。\n\n![](img/471881_2_En_6_Fig16_HTML.jpg)\n\n一张截图展示了 `MetaMask`\
    \ 通知页面，该页面列出了 `账户 1` 的详细信息，包括预估的 Gas 费用和总计，以及选中的 `确认` 按钮。\n\n图 6-16  \n支付合约部署的\
    \ Gas 费用\n\n> **注意：** 部署您的智能合约所需支付的 Gas 费用取决于合约的大小和复杂程度。\n\n当合约部署完成后，您就可以像之前一样与您的合约进行交互了。\n\
    \n## 本章小结\n\n在本章中，您探索了智能合约的样子及其工作原理。您学习了如何使用 `Remix VM` 在本地测试合约，而无需部署到区块链上。您还学习了如何利用\
    \ `MetaMask` 将合约部署到 `Goerli` 测试网络。总而言之，请使用 `Remix VM` 选项快速测试智能合约的功能，然后将其部署到 `Goerli`\
    \ 测试网络，以获得更贴近真实场景的体验，了解它在实际环境中是如何工作的。我强烈建议您使用 `Remix IDE` 来开发和测试您的智能合约，因为它能极大地简化您的工作流程。\n\
    \n在接下来的几章中，您将深入了解智能合约的细节以及与其交互的各种方式。\n\n# 7. 使用智能合约存储凭证\n\n在上一章中，您了解了什么是智能合约、它的工作原理以及如何创建一个智能合约。在本章中，您将学习智能合约的一个优秀使用案例，同时学习\
    \ `Solidity` 中的一些高级技巧。\n\n## 智能合约作为凭证存储库\n\n回想一下第 2 章，存储在区块链上的数据是不可篡改的。因此，区块链是*凭证存储*的绝佳场所。一个很好的使用案例是将学生的教育凭证存储在区块链上。\n\
    \n最近，出现了许多求职者向雇主提交虚假学历证明的案例。雇主没有简单的方法来核实求职者的学历是否真实，必须花费宝贵的时间去验证资质的真实性。如果某个机构能够将学生获得的教育凭证记录到区块链上，那么雇主（或任何人）验证潜在雇员资质真实性的过程将会变得更加容易。\n\
    \n考虑以下一个简化的学生考试成绩示例，以 JSON 字符串表示：\n\n```\n{\n\"id\": \"1234567\",\n\"result\"\
    : {\n\"math\": \"A\",\n\"science\": \"B\",\n\"english\": \"A\"\n}\n}\n```\n\n\
    其核心思想是将考试成绩存储在区块链上。但是，不建议直接将 JSON 字符串存储在区块链上，主要有两个关键原因：\n\n- 将明文存储在区块链上成本高昂。区块链上每多存储一个字符都会产生额外的\
    \ Gas 费用。目标是只存储绝对必要的数据。\n- 永远不应在公共区块链（如 `以太坊`）上存储个人可识别数据。在公共区块链上，所有数据都处于公众监督之下，因此以明文形式存储结果会违反隐私法规和法律。\n\
    \n考虑到隐私问题，您应该将凭证的哈希值存储在区块链上。\n\n> **警告：** 切勿将加密数据存储在区块链上，因为这容易遭受黑客攻击。存储数据的哈希值要安全得多。\n\
    \n为了验证教育凭证的真实性，传入表示结果的 JSON 字符串，并检查该哈希值是否存在于区块链上。如果存在，则该结果是真实的。\n"
- fmt: "### Creating the Smart Contract\n\nFor operational reasons you will see later\
    \ in this chapter, you first encode the JSON string using base64 encoding before\
    \ hashing it and storing the hash on the blockchain. To try base64 encoding, you\
    \ can use the following site: [`https://codebeautify.org/json-to-base64-converter`](https://codebeautify.org/json-to-base64-converter).\
    \ The above JSON string yields the following base64-encoded output:\n\n```\newogICJpZCI6ICIxMjM0NTY3IiwKICAicmVzdWx0IjogewogICAgIm1hdGgiOiAiQSIsCiAgICAic2NpZW5jZSI6ICJCIiwKICAgICJlbmdsaXNoIjogIkEiCiAgfQp9Cg==\n\
    ```\n\nAs usual, use the Goerli testnet.\n\n**Note**  \nRecall that the Goerli\
    \ testnet is the testnet that you should use after the Merge (when Ethereum transitioned\
    \ from Proof of Work to Proof of Stake). Other testnets such as Ropsten have since\
    \ been deprecated.\n\nUsing the Remix IDE, right-click the `contracts` item and\
    \ select **New File** (see Figure [7-1](#471881_2_En_7_Chapter.xhtml#Fig1)).\n\
    \n![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig1_HTML.jpg)\n\nA screenshot\
    \ of the file explorer lists new file is selected from the contracts under the\
    \ default workspace.\n\n**Figure 7-1**  \nCreating a new contract file in the\
    \ Remix IDE\n\nName the contract `EduCredentialsStore.sol`. Populate it with the\
    \ following statements:\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity\
    \ ^0.8;\ncontract EduCredentialsStore {\n//---store the hash of the strings and\
    \ their\n// corresponding block number---\n// key is bytes32 and val is uint\n\
    mapping (bytes32 => uint) private proofs;\n//--------------------------------------------------\n\
    // Store a proof of existence in the contract state\n//--------------------------------------------------\n\
    function storeProof(bytes32 proof) private {\n// use the hash as the key\nproofs[proof]\
    \ = block.number;\n}\n//----------------------------------------------\n// Calculate\
    \ and store the proof for a document\n//----------------------------------------------\n\
    function storeEduCredentials(string calldata\ndocument) external {\n// call storeProof()\
    \ with the hash of the string\nstoreProof(proofFor(document));\n}\n//--------------------------------------------\n\
    // Helper function to get a document's sha256\n//--------------------------------------------\n\
    // Takes in a string and returns the hash of the\n// string\nfunction proofFor(string\
    \ calldata document) private\npure returns (bytes32) {\n// converts the string\
    \ into bytes array and\n// then hash it\nreturn sha256(bytes(document));\n}\n\
    //-----------------------------------------------\n// Check if a document has\
    \ been saved previously\n//-----------------------------------------------\nfunction\
    \ checkEduCredentials(string calldata\ndocument) public view returns (uint){\n\
    // use the hash of the string and check the\n// proofs mapping object\nreturn\
    \ proofs[proofFor(document)];\n}\n}\n```\n\nThe contract is now much more significantly\
    \ complex that the one you saw in the previous chapter. Here is a summary of this\
    \ contract:\n\n- The contract has two private functions named `storeProof()` and\
    \ `proofFor()`. Private functions are denoted with the `private` keyword. Private\
    \ functions are only callable within the contract and not by users.\n\n- The contract\
    \ has one external function named `storeEduCredentials()` and one public function\
    \ named `checkEduCredentials()`. Public and external functions are both visible\
    \ outside the contract and can be called directly by the user. The key difference\
    \ between public and external is that public functions are also visible to subclasses\
    \ of the contract while external functions are not visible to subclasses of the\
    \ contract.\n\n- Notice the use of the `calldata` keyword in the function parameter\
    \ declaration. Besides the `calldata` keyword, you can also use the `memory` keyword.\
    \ The `memory` and `calldata` keywords indicate that the parameter holds a temporary\
    \ value and it won’t be persisted onto the blockchain. The key difference between\
    \ the two keywords is that parameter prefixed with the `calldata` keyword is immutable\
    \ (i.e., cannot be changed) while parameters prefixed with `memory` are mutable.\n\
    \n- You will also notice that one function has the `pure` keyword while another\
    \ has the `view` keyword. The `pure` keyword (as explained in the previous chapter)\
    \ indicates that the function does not read or write values onto the blockchain.\
    \ The `view` keyword indicates that the function will read values from the blockchain.\n\
    \n- The contract has a `mapping` object named `proofs`. A `mapping` object in\
    \ Solidity is like a dictionary object: it holds key/value pairs. The value of\
    \ `proofs` is persisted on the blockchain and is known as a *state variable*.\n\
    \nWith all the different keywords for function access modifiers and parameter\
    \ declarations, which should you use? Here is a rule of thumb:\n\n- Use `calldata`\
    \ for parameter declaration if the data passed into the function need not be modified.\
    \ Declaring a function with a `calldata` parameter will save on gas fees.\n\n\
    - Use `external` instead of `public` if there is no need for your functions to\
    \ be called by subclasses of the contract. Due to the way arguments in public\
    \ functions are accessed, declaring functions as external will incur lesser gas\
    \ fees.\n\nFigure [7-2](#471881_2_En_7_Chapter.xhtml#Fig2) shows the conceptual\
    \ flow of how your smart contract can be used.\n\n![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig2_HTML.jpg)\n\
    \nA process flow has input data from the Web 3 Dapp. It sends a code to store\
    \ and check Edu credentials, which displays a blockchain code via smart contract.\n\
    \n**Figure 7-2**  \nHow the smart contract interacts with the user\n\n1.  The\
    \ examination result of a student is represented as a JSON string.\n2.  The JSON\
    \ string is encoded using base64 encoding.\n3.  The base64-encoded string is passed\
    \ into the `storeEduCredentials()` function of the smart contract.\n4.  The `storeEduCredentials()`\
    \ function hashes the base64-encoded string and then stores the hash together\
    \ with the block number (that contains the transaction) onto the blockchain.\n\
    5.  To check if an educational credential is authentic, the base64-encoded string\
    \ of the student’s result is passed into the `checkEduCredentials()` function.\n\
    6.  The `checkEduCredentials()` function hashes the base64-encoded string and\
    \ then checks if the hash already exists on the blockchain. The block number that\
    \ contains the hash is returned. If the hash is not found, a value of 0 is returned.\n\
    \n**Tip**  \nA dapp (decentralized application) is an application (such as web\
    \ or mobile application) that communicates with a smart contract in the back end.\
    \ The next chapter will discuss dapps in more detail.\n\nFigure [7-3](#471881_2_En_7_Chapter.xhtml#Fig3)\
    \ shows how the smart contract stores the hash of the exam results onto the blockchain.\
    \ The state variable is a *mapping* object containing key/value pairs. The keys\
    \ are the hashes and the values are the block numbers in which the hashes are\
    \ written onto the blockchain.\n\n![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig3_HTML.jpg)\n\
    \n2 stacks of bars labeled block n. A smart contract layer on the first stack\
    \ is mapped to state variables in the second stack. It further displays a set\
    \ of codes titled, proofs.\n\n**Figure 7-3**  \nHow the mapping object records\
    \ the hashes and block numbers"
  raw: '### Creating the Smart Contract


    For operational reasons you will see later in this chapter, you first encode the
    JSON string using base64 encoding before hashing it and storing the hash on the
    blockchain. To try base64 encoding, you can use the following site: [`https://codebeautify.org/json-to-base64-converter`](https://codebeautify.org/json-to-base64-converter).
    The above JSON string yields the following base64-encoded output:


    ```

    ewogICJpZCI6ICIxMjM0NTY3IiwKICAicmVzdWx0IjogewogICAgIm1hdGgiOiAiQSIsCiAgICAic2NpZW5jZSI6ICJCIiwKICAgICJlbmdsaXNoIjogIkEiCiAgfQp9Cg==

    ```


    As usual, use the Goerli testnet.


    Note


    Recall that the Goerli testnet is the testnet that you should use after the Merge
    (when Ethereum transitioned from Proof of Work to Proof of Stake). Other testnets
    such as Ropsten have since been deprecated.


    Using the Remix IDE, right-click the **contracts** item and select **New File**
    (see Figure [7-1](#471881_2_En_7_Chapter.xhtml#Fig1)).


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig1_HTML.jpg)


    A screenshot of the file explorer lists new file is selected from the contracts
    under the default workspace.


    Figure 7-1


    Creating a new contract file in the Remix IDE


    Name the contract **EduCredentialsStore.sol**. Populate it with the following
    statements:


    ```

    // SPDX-License-Identifier: MIT

    pragma solidity ^0.8;

    contract EduCredentialsStore {

    //---store the hash of the strings and their

    // corresponding block number---

    // key is bytes32 and val is uint

    mapping (bytes32 => uint) private proofs;

    //--------------------------------------------------

    // Store a proof of existence in the contract state

    //--------------------------------------------------

    function storeProof(bytes32 proof) private {

    // use the hash as the key

    proofs[proof] = block.number;

    }

    //----------------------------------------------

    // Calculate and store the proof for a document

    //----------------------------------------------

    function storeEduCredentials(string calldata

    document) external {

    // call storeProof() with the hash of the string

    storeProof(proofFor(document));

    }

    //--------------------------------------------

    // Helper function to get a document''s sha256

    //--------------------------------------------

    // Takes in a string and returns the hash of the

    // string

    function proofFor(string calldata document) private

    pure returns (bytes32) {

    // converts the string into bytes array and

    // then hash it

    return sha256(bytes(document));

    }

    //-----------------------------------------------

    // Check if a document has been saved previously

    //-----------------------------------------------

    function checkEduCredentials(string calldata

    document) public view returns (uint){

    // use the hash of the string and check the

    // proofs mapping object

    return proofs[proofFor(document)];

    }

    }

    ```


    The contract is now much more significantly complex that the one you saw in the
    previous chapter. Here is a summary of this contract:


    *   The contract has two private functions named `storeProof()` and `proofFor()`.
    Private functions are denoted with the `private` keyword. Private functions are
    only callable within the contract and not by users.


    *   The contract has one external function named (`storeEduCredentials()`) and
    one public function named (`checkEduCredentials()`). Public and external functions
    are both visible outside the contract and can be called directly by the user.
    The key difference between public and external is that public functions are also
    visible to subclasses of the contract while external functions are not visible
    to subclasses of the contract.


    *   Notice the use of the `calldata` keyword in the function parameter declaration.
    Besides the `calldata` keyword, you can also use the `memory` keyword. The `memory`
    and `calldata` keywords indicate that the parameter holds a temporary value and
    it won’t be persisted onto the blockchain. The key difference between the two
    keywords is that parameter prefixed with the `calldata` keyword is immutable (i.e.,
    cannot be changed) while parameters prefixed with `memory` are mutable.


    *   You will also notice that one function has the `pure` keyword while another
    has the `view` keyword. The `pure` keyword (as explained in the previous chapter)
    indicates that the function does not read or write values onto the blockchain.
    The `view` keyword indicates that the function will read values from the blockchain.


    *   The contract has a `mapping` object named `proofs`. A `mapping` object in
    Solidity is like a dictionary object: it holds key/value pairs. The value of `Proofs`
    is persisted on the blockchain and is known as a *state variable*.


    With all the different keywords for function access modifiers and parameter declarations,
    which should you use? Here is a rule of thumb:


    *   Use `calldata` for parameter declaration if the data passed into the function
    need not be modified. Declaring a function with a `calldata` parameter will save
    on gas fees.


    *   Use `external` instead of `public` if there is no need for your functions
    to be called by subclasses of the contract. Due to the way arguments in public
    functions are accessed, declaring functions as external will incur lesser gas
    fees.


    Figure [7-2](#471881_2_En_7_Chapter.xhtml#Fig2) shows the conceptual flow of how
    your smart contract can be used.


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig2_HTML.jpg)


    A process flow has input data from the Web 3 Dapp. It sends a code to store and
    check Edu credentials, which displays a blockchain code via smart contract.


    Figure 7-2


    How the smart contract interacts with the user


    1.  The examination result of a student is represented as a JSON string.


    2.  The JSON string is encoded using base64 encoding.


    3.  The base64-encoded string is passed into the `storeEduCredentials()` function
    of the smart contract.


    4.  The `storeEduCredentials()` function hashes the base64-encoded string and
    then stores the hash together with the block number (that contains the transaction)
    onto the blockchain.


    5.  To check if an educational credential is authentic, the based64-encoded string
    of the student’s result is passed into the `checkEduCredentials()` function.


    6.  The `checkEduCredentials()` function hashes the base64-encoded string and
    then checks if the hash already exists on the blockchain. The block number that
    contains the hash is returned. If the hash is not found, a value of 0 is returned.


    Tip


    A dapp (decentralized application) is an application (such as web or mobile application)
    that communicates with a smart contract in the back end. The next chapter will
    discuss dapps in more detail.


    Figure [7-3](#471881_2_En_7_Chapter.xhtml#Fig3) shows how the smart contract stores
    the hash of the exam results onto the blockchain. The state variable is a *mapping*
    object containing key/value pairs. The keys are the hashes and the values are
    the block numbers in which the hashes are written onto the blockchain.


    ![](images/471881_2_En_7_Chapter/471881_2_En_7_Fig3_HTML.jpg)


    2 stacks of bars labeled block n. A smart contract layer on the first stack is
    mapped to state variables in the second stack. It further displays a set of codes
    titled, proofs.


    Figure 7-3


    How the mapping object records the hashes and block numbers'
  trans: "\n### 创建智能合约\n\n出于你将在本章后面看到的操作原因，你首先使用 base64 编码对 JSON 字符串进行编码，然后再对其进行哈希处理，并将哈希值存储在区块链上。要尝试\
    \ base64 编码，可以使用以下网站：[`https://codebeautify.org/json-to-base64-converter`](https://codebeautify.org/json-to-base64-converter)。上述\
    \ JSON 字符串经编码后，会得到以下 base64 编码输出：\n\n```\newogICJpZCI6ICIxMjM0NTY3IiwKICAicmVzdWx0IjogewogICAgIm1hdGgiOiAiQSIsCiAgICAic2NpZW5jZSI6ICJCIiwKICAgICJlbmdsaXNoIjogIkEiCiAgfQp9Cg==\n\
    ```\n\n照常使用 Goerli 测试网。\n\n**注意**  \n回想一下，Goerli 测试网是合并（即以太坊从工作量证明过渡到权益证明之后）你应该使用的测试网。其他测试网，如\
    \ Ropsten，此后已被弃用。\n\n使用 Remix IDE，右键单击 `contracts` 项并选择**新建文件**（见图 7-1）。\n\n![](img/471881_2_En_7_Fig1_HTML.jpg)\n\
    \n这是一个文件资源管理器的截图，显示从默认工作区下的 contracts 目录中选择的新建文件。\n\n**图 7-1**  \n在 Remix IDE\
    \ 中创建新的合约文件\n\n将合约命名为 `EduCredentialsStore.sol`。并用以下语句填充它：\n\n```\n// SPDX-License-Identifier:\
    \ MIT\npragma solidity ⁰.8;\ncontract EduCredentialsStore {\n//---存储字符串的哈希值及其\n\
    // 对应的区块编号---\n// 键为 bytes32 类型，值为 uint 类型\nmapping (bytes32 => uint) private\
    \ proofs;\n//--------------------------------------------------\n// 在合约状态中存储一个存在性证明\n\
    //--------------------------------------------------\nfunction storeProof(bytes32\
    \ proof) private {\n// 使用哈希值作为键\nproofs[proof] = block.number;\n}\n//----------------------------------------------\n\
    // 计算并存储一个文档的证明\n//----------------------------------------------\nfunction storeEduCredentials(string\
    \ calldata\ndocument) external {\n// 使用字符串的哈希值调用 storeProof()\nstoreProof(proofFor(document));\n\
    }\n//--------------------------------------------\n// 辅助函数，用于获取文档的 sha256 哈希值\n\
    //--------------------------------------------\n// 接收一个字符串并返回该字符串的哈希值\nfunction\
    \ proofFor(string calldata document) private\npure returns (bytes32) {\n// 将字符串转换为字节数组，然后对其求哈希\n\
    return sha256(bytes(document));\n}\n//-----------------------------------------------\n\
    // 检查一个文档之前是否已保存\n//-----------------------------------------------\nfunction\
    \ checkEduCredentials(string calldata\ndocument) public view returns (uint){\n\
    // 使用字符串的哈希值并检查 proofs 映射对象\nreturn proofs[proofFor(document)];\n}\n}\n```\n\n\
    这个合约现在比你在上一章中看到的要复杂得多。以下是该合约的总结：\n\n- 该合约有两个私有函数，名为 `storeProof()` 和 `proofFor()`。私有函数使用\
    \ `private` 关键字标识。私有函数只能在合约内部调用，用户不能调用。\n\n- 该合约有一个外部函数，名为 `storeEduCredentials()`，以及一个公共函数，名为\
    \ `checkEduCredentials()`。公共函数和外部函数都在合约外部可见，并且可以由用户直接调用。公共函数和外部函数的主要区别在于，公共函数对合约的子类也可见，而外部函数对合约的子类不可见。\n\
    \n- 请注意函数参数声明中 `calldata` 关键字的使用。除了 `calldata` 关键字，你还可以使用 `memory` 关键字。`memory`\
    \ 和 `calldata` 关键字表示该参数持有一个临时值，并且不会持久化到区块链上。这两个关键字的主要区别在于，以 `calldata` 关键字为前缀的参数是不可变的（即不能更改），而以\
    \ `memory` 为前缀的参数是可变的。\n\n- 你还会注意到，一个函数使用了 `pure` 关键字，而另一个函数使用了 `view` 关键字。`pure`\
    \ 关键字（如前一章所述）表示该函数不会向区块链读取或写入值。`view` 关键字表示该函数将从区块链读取值。\n\n- 该合约有一个名为 `proofs`\
    \ 的 `mapping` 对象。Solidity 中的 `mapping` 对象类似于字典对象：它保存键/值对。`proofs` 的值持久化在区块链上，被称为*状态变量*。\n\
    \n对于函数访问修饰符和参数声明有这么多不同的关键字，你应该使用哪一个？以下是一个经验法则：\n\n- 如果传递给函数的数据不需要修改，则在参数声明中使用\
    \ `calldata`。使用 `calldata` 参数声明函数可以节省 gas 费用。\n\n- 如果不需要合约的子类调用你的函数，则使用 `external`\
    \ 而不是 `public`。由于公共函数中参数的访问方式，将函数声明为 `external` 会产生较少的 gas 费用。\n\n图 7-2 展示了你的智能合约可能的运行概念流程。\n\
    \n![](img/471881_2_En_7_Fig2_HTML.jpg)\n\n一个流程显示了来自 Web 3 去中心化应用的输入数据。它发送代码来存储和检查教育证书，并通过智能合约显示区块链代码。\n\
    \n**图 7-2**  \n智能合约如何与用户交互\n\n1.  学生的考试成绩表示为 JSON 字符串。\n2.  该 JSON 字符串使用 base64\
    \ 编码进行编码。\n3.  base64 编码的字符串被传入智能合约的 `storeEduCredentials()` 函数。\n4.  `storeEduCredentials()`\
    \ 函数对 base64 编码的字符串进行哈希，然后将哈希值与（包含该交易的）区块编号一起存储到区块链上。\n5.  为了检查教育证书的真实性，将学生成绩的\
    \ base64 编码字符串传入 `checkEduCredentials()` 函数。\n6.  `checkEduCredentials()` 函数对\
    \ base64 编码的字符串进行哈希，然后检查该哈希值是否已存在于区块链上。返回包含该哈希值的区块编号。如果未找到该哈希值，则返回值 0。\n\n**提示**\
    \  \ndapp（去中心化应用）是一种与后端智能合约通信的应用（例如网页应用或移动应用）。下一章将更详细地讨论 dapp。\n\n图 7-3 展示了智能合约如何将考试成绩的哈希值存储到区块链上。状态变量是一个包含键/值对的\
    \ *mapping* 对象。键是哈希值，值是这些哈希值写入区块链时的区块编号。\n\n![](img/471881_2_En_7_Fig3_HTML.jpg)\n\
    \n两堆标记为“区块 n”的条状图。第一堆上的智能合约层映射到第二堆中的状态变量。它进一步显示了一组代码，标题为“proofs”。\n\n**图 7-3**\
    \  \nmapping 对象如何记录哈希值和区块编号\n"
- fmt: "### Compiling the Contract\n\nWith the smart contract written, it is now time\
