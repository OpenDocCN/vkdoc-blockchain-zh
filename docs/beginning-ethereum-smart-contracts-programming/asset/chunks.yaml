    ## 管理账户


    在本章前面的部分，你已经学习了如何在节点中创建账户。我还提到过，账户详情存储在一个文件名以“UTC”开头的文件中，并保存在`~/MyTestNet/data/node1/keystore`目录下。让我们来剖析一下这个
    UTC 文件的内容：


    ```

    {

    "address": "6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb",

    "crypto": {

    "cipher": "aes-128-ctr",

    "ciphertext": "1f35569e89100cd6d03c7de8780a913f54129cdbce0290a3b39a798391bd2674",

    "cipherparams": {

    "iv": "0ffbe973059db7a0226cd6fced92e50d"

    },

    "kdf": "scrypt",

    "kdfparams": {

    "dklen": 32,

    "n": 262144,

    "p": 1,

    "r": 8,

    "salt": "d2c73712f61b236beb22c783502a50166049a46b0aa29503a90d2f8a4227741c"

    },

    "mac": "432ab5429c423c3c9e545397f53c64ddc6a900a6ab7dc255a58cf5da9f629242"

    },

    "id": "b9e36890-b2ff-4fdd-af90-f157f352e6bc",

    "version": 3

    }

    ```


    这显示了`node1`中第一个账户的内容，其文件名为`UTC--2022-06-21T07-44-59.385557000Z--6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb`。


    它包含以下内容：


    *   你的加密私钥（使用你提供的密码进行加密）

    *   公钥不存储在 JSON 文件中，因为它可以从私钥派生而来。私钥对应的公钥是通过 ECDSA（椭圆曲线数字签名算法）从私钥派生出来的。

    *   从派生的公钥计算出一个`keccak256`哈希值。

    *   从`keccak256`哈希值中取最后 20 个字节（即 40 位十六进制数），在其前面加上`"0x"`，这就是你的以太坊账户地址。


    图 4-8 概括了你的账户地址是如何派生的。


    ![](img/471881_2_En_4_Fig8_HTML.jpg)


    一个流程图展示了公钥和私钥、取最后 20 个字节并加上`0x`前缀、账户地址以及一个使用用户提供的密码加密的私钥。


    **图 4-8** 理解账户信息是如何派生的


    **提示** 好奇你的私钥是什么？将 JSON 文件导入 MetaMask，你的账户就会被导入到 MetaMask 中。然后你就可以在 MetaMask 中导出这个已导入账户的私钥了。


    ### 删除账户


    一旦你使用了`personal.newAccount()`函数，账户就被创建了。并没有对应的函数用于删除账户。删除账户最简单的方法是转到`~/MyTestNet/data/node1/keystore`目录，并删除与你想要删除的账户对应的
    UTC 文件。


    ### 设置 Coinbase


    `eth.coinbase`属性返回节点内所有挖矿奖励发放到的那个账户。在`node1`中，你的 coinbase 就是你的第一个账户：


    ```

    > eth.coinbase

    "0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb"

    ```


    要更改 coinbase，你可以使用`miner.setEtherbase()`函数。现在让我们试一下。


    首先，打印出你在`node1`中拥有的账户：


    ```

    > eth.accounts

    ["0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb", "0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c"]

    ```


    让我们将 coinbase 更改为第二个账户：


    ```

    > miner.setEtherbase(eth.accounts[1])

    true

    ```


    完成此操作后，你可以验证 coinbase 是否确实已更改为第二个账户：


    ```

    > eth.coinbase

    "0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c"

    ```


    ## 总结


    在本章中，你学习了如何使用 Geth 创建自己的私有以太坊测试网络。你学习了如何在节点中创建账户、连接到其他节点、在节点之间转移以太币等。部署自己的测试网络比使用以太坊的某个测试网络效率要高得多。更重要的是，它让你能够进行实验，并对以太坊有更深入的理解。


    # 5. 使用 MetaMask 加密货币钱包


    在上一章中，你学习了如何使用 Geth 创建自己的私有以太坊测试网络，以便你可以尝试各种以太坊交易，例如向不同账户转账以及执行挖矿。你还学习了如何创建账户，以便持有自己的以太币。在本章中，你将学习如何使用一个名为**MetaMask**的
    Chrome 扩展程序。MetaMask Chrome 扩展程序是一个以太坊加密货币钱包，它允许你持有你的以太坊账户；并且在接下来的几章中，它是帮助你开发和测试智能合约的重要工具。


    ## 什么是 MetaMask？


    MetaMask 是一个非常有用的工具，在你进军区块链世界的过程中扮演着关键角色。与其试图用一段话来定义 MetaMask 究竟是什么，不如让我们在后续内容中讨论
    MetaMask 所扮演的角色。


    首先，MetaMask 是一个以太坊加密货币钱包。它允许你执行以下操作：


    *   创建用于各种以太坊网络的账户

    *   维护你账户的私钥，以便你可以导出私钥或导入新账户

    *   在各种以太坊网络之间切换，以便你的账户能为每个网络显示正确的余额

    *   在账户之间执行交易

    *   从一个账户向另一个账户转移以太币

    *   在你的 MetaMask 账户中持有代币

    *   在区块链浏览器 Etherscan 上查看详细的交易信息

    *   在去中心化交易所（DEX）上进行以太币和代币之间的兑换


    **注意** 除了是以太坊钱包之外，MetaMask 还允许你通过注入一个由以太坊核心团队开发的名为`web3.js`的 JavaScript 库来与以太坊区块链进行交互。我将在下一章讨论智能合约时对此进行更详细的说明。


    ### MetaMask 的工作机制


    在幕后，MetaMask 连接到一个名为 INFURA ([`https://infura.io/`](https://infura.io/)) 的服务器。INFURA
    维护着连接到各自以太坊网络的以太坊节点。INFURA 并没有持有你的私钥（将私钥存放在由第三方持有的云端总是一种安全风险），而是允许 MetaMask 将你账户的私钥保存在你的本地计算机上，并且仅将交易中继到网络。图
    5-1 展示了 MetaMask、INFURA 和以太坊网络之间的关系。


    ![](img/471881_2_En_5_Fig1_HTML.jpg)


    一个以太坊网络的圆形示意图，其轨道上有一个 Infura 节点。它有一个 MetaMask 插件，该插件持有账户的私钥。


    **图 5-1** MetaMask 的后台工作原理


    当 MetaMask 连接到其中一个以太坊网络时，它会通过其 RPC URL 连接到相应的 INFURA 节点之一：


    *   **主以太坊网络：**[`https://mainnet.infura.io/v3/`](https://mainnet.infura.io/v3/)

    *   **Goerli 测试网络：**[`https://goerli.infura.io/v3/`](https://goerli.infura.io/v3/)

    *   **Sepolia 测试网络：**[`https://sepolia.infura.io/v3/`](https://sepolia.infura.io/v3/)


    **警告** 在合并（以太坊从 PoW 切换到 PoS）之前，大多数开发者都使用 Ropsten 测试网络。然而，Ropsten 测试网络在合并后已被弃用。你应该改用
    Goerli 测试网络。

