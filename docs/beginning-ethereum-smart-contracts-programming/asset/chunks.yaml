  trans: "\n### 创建 DEX 合约\n\n创建好两种代币后，现在我们来创建 DEX 合约。在创建合约之前，你需要先了解用户如何使用 DEX 合约来兑换代币。\n\
    \n图 13-10 总结了用户将 `WML` 代币兑换为 `LWM` 代币时的事件流程。\n\n![](img/471881_2_En_13_Fig10_HTML.jpg)\n\
    \n图示展示了发送者批准 WML 代币进行转移，并批准 WML 代币给 DEX 合约；DEX 合约验证发送者已批准将 WML 代币发送给它；然后 DEX 合约将\
    \ LWM 代币发回给发送者。\n\n**图 13-10** DEX 合约的工作原理\n\n1.  发送者调用代币合约的 `approve()` 函数，授权将\
    \ WML 代币转移到 DEX 合约。\n2.  发送者将 WML 代币发送到 DEX 合约。\n3.  DEX 合约需要验证发送者已授权将 WML 代币转移给它。如果验证通过，WML\
    \ 代币将从发送者转移到 DEX 合约。\n4.  DEX 合约计算要转移的 LWM 代币数量，并将其发送给发送者。\n\n**提示** 所有代币转移都涉及代币合约更新用户和\
    \ DEX 合约持有的代币数量。\n\n在 Remix IDE 中，创建一个名为 `DEX.sol` 的新合约，并用以下语句填充它：\n\n```\n//\
    \ SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
    ;\ncontract DEX {\n    ERC20 WML_token;\n    ERC20 LWM_token;\n    //=======================\n\
    \    // constructor of the DEX\n    //=======================\n    constructor()\
    \ payable{\n        //---be sure to replace the following addresses with your\
    \ own---\n        WML_token = ERC20(address(\n            0xfa8b8F0fd75ABf2aF088bf2D1115E6F97ED0cB3a));\n\
    \        LWM_token = ERC20(address(\n            0x234273bD4D1aa3D233135dD49A26675dA7eF6A9a));\n\
    \    }\n    //===================================\n    // find the tokens balance\
    \ in the DEX\n    //===================================\n    function getBalance()\
    \ public view returns (uint256,uint256) {\n        return (WML_token.balanceOf(address(this)),\n\
    \                LWM_token.balanceOf(address(this)));\n    }\n    function compareStrings(string\
    \ memory a, string memory b)\n        private pure returns (bool) {\n        return\
    \ (keccak256(abi.encodePacked((a))) ==\n                keccak256(abi.encodePacked((b))));\n\
    \    }\n    //================\n    // exchange tokens\n    //================\n\
    \    function exchange(string calldata from_token,\n                      string\
    \ calldata to_token,\n                      uint256 amount) public {\n       \
    \ // Remember that all transactions are based on the smallest units in the token\n\
    \        //=========\n        // CHECK #1\n        //=========\n        // ensure\
    \ the amount to convert is > 0\n        require(amount > 0, \"You need to convert\
    \ at least some tokens\");\n        // record the token contracts to convert from\
    \ and to\n        ERC20 from;  // the tokens to convert from\n        ERC20 to;\
    \    // the tokens to convert to\n        if (compareStrings(from_token, \"WML\"\
    )) {\n            from = WML_token;\n        } else {\n            from = LWM_token;\n\
    \        }\n        if (compareStrings(to_token, \"WML\")) {\n            to =\
    \ WML_token;\n        } else {\n            to = LWM_token;\n        }\n     \
    \   // obtain the allowance set by the sender to send to this DEX\n        uint256\
    \ approvedAmt;\n        approvedAmt = from.allowance(msg.sender, address(this));\n\
    \        //=========\n        // CHECK #2\n        //=========\n        // ensure\
    \ the sender has enough tokens approved to convert\n        require(approvedAmt\
    \ >= amount,\n                \"Token allowance is less than what you want to\
    \ convert\");\n        //=========\n        // CHECK #3\n        //=========\n\
    \        // get the balance of tokens (that the sender wants to convert to) in\
    \ the pool\n        uint256 dexBalance = to.balanceOf(address(this));\n      \
    \  // need to check that DEX has enough \"to\" token to send to sender\n     \
    \   require(amount <= dexBalance,\n                \"Sorry, not enough tokens\
    \ in the DEX\");\n        // transfer the tokens from sender to DEX\n        from.transferFrom(msg.sender,\
    \ address(this), amount);\n        // transfer the exchanged tokens to the sender\n\
    \        to.transfer(msg.sender, amount);\n    }\n}\n```\n\n以下是 DEX 合约的详细信息：\n\
    \n- 你需要导入由 OpenZeppelin 编写的 ERC-20 代币合约的基础定义。\n- 在构造函数中，你创建了要兑换的两个代币的实例（都是 `ERC20`\
    \ 代币的实例）。如果你想尝试，请记得更改为你自己的 WML 和 LWM 代币的合约地址。\n- 你有一个名为 `getBalance()` 的函数。它返回\
    \ DEX 合约持有的 WML 和 LWM 代币的余额。\n- 在 Solidity 中，你不能使用 `==` 运算符来比较字符串。要比较字符串，你需要比较它们的哈希值。`compareStrings()`\
    \ 辅助函数用于比较两个字符串以检查它们是否相同。\n- `exchange()` 函数允许两种代币进行兑换。为简单起见，假设一个单位的 WML 代币等价于一个单位的\
    \ LWM 代币。\n- 在兑换代币之前，你需要执行多项检查。首先，确保要兑换的数量大于 0。其次，确保执行兑换的账户已授权将其（要兑换出的）代币发送到 DEX。最后一项检查是确保\
    \ DEX 有足够的代币用于兑换。\n- 一旦所有检查通过，DEX 可以将代币从调用者转移到 DEX，然后将调用者想要兑换成的代币转移给调用者。\n\n现在你可以部署\
    \ DEX 合约（使用账户 1 或账户 2 都可以）。\n\n**注意** 在我的示例中，我部署的 DEX 合约地址是 `0xF4d9A3b468FBc0b256Da59B5B40CB20e5eD137c6`。\n\
    \n此时，Remix IDE 应该已经部署了两个代币合约和一个 DEX 合约，如图 13-11 所示。\n\n![](img/471881_2_En_13_Fig11_HTML.jpg)\n\
    \n一张已部署合约的截图，区块链中有 3 个合约。\n\n**图 13-11** Remix IDE 中的三个合约\n\n展开 DEX 合约并点击 `getBalance`\
    \ 按钮（见图 13-12）。你应该会看到返回了两个 0。这是因为此时 DEX 合约持有 0 个 WML 和 0 个 LWM 代币。\n\n![](img/471881_2_En_13_Fig12_HTML.jpg)\n\
    \n一张已部署合约的截图，区块链中有 3 个合约。exchange 和 get Balance 按钮被高亮显示。\n\n**图 13-12** 查看 DEX\
    \ 合约中的代币余额\n\n### 为 DEX 注入资金\n\n为了使 DEX 正常运行，它需要一些代币，以便用户可以用来兑换代币。因此，我们为 DEX 合约注入一些\
    \ WML 和 LWM 代币。\n\n在 MetaMask 中，使用账户 1 并向 DEX 合约发送 500 个 `WML` 代币（见图 13-13）。\n\
    \n![](img/471881_2_En_13_Fig13_HTML.jpg)\n\n账户 1 页面的截图，显示了发送代币、资产和金额。底部有“取消”和“下一步”高亮按钮。\n\
    \n**图 13-13**  向 DEX 合约注入 500 个 WML 代币\n\n接下来，使用账户 2 并向 DEX 合约发送 500 个 `LWM` 代币（见图\
    \ 13-14）。\n\n![](img/471881_2_En_13_Fig14_HTML.jpg)\n\n账户 2 页面的截图，显示了发送代币、资产和金额。底部有“取消”和“下一步”高亮按钮。\n\
    \n**图 13-14** 向 DEX 合约注入 500 个 LWM 代币\n\n一旦交易被确认，DEX 合约将拥有 500 个 WML 代币和 500 个\
    \ LWM 代币。表 13-1 显示了账户 1、账户 2 和 DEX 合约当前的代币余额。\n\n**表 13-1** 两个账户和 DEX 合约的余额\n\n\
    | 余额 | 账户 1 | 账户 2 | DEX |\n| --- | --- | --- | --- |\n| WML 代币 | 500 | 0 | 500\
    \ |\n| LWM 代币 | 0 | 500 | 500 |\n"
- fmt: "### Swapping WML Tokens for LWM Tokens\n\nYou are now ready to use the DEX\
    \ contract to swap tokens. Suppose Account 1 wants to exchange 100 WML tokens\
    \ for 100 LWM tokens.\n\n**Tip**  \nSwitch to Account 1 in MetaMask now.\n\nThe\
    \ first step that Account 1 needs to do is to go to the first deployed token contract\
    \ (WML token) and fill in the following (see Figure [13-15](#471881_2_En_13_Chapter.xhtml#Fig15))\
    \ and click the **approve** button:\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig15_HTML.jpg)\n\
    \n*A screenshot of the deployed contracts tab has 3 labels. The labels are token\
    \ contract for WML, the address for the DEX contract, and 100 tokens.*  \nFigure\
    \ 13-15 — Approving the transfer of tokens to the DEX contract\n\n```\n0xF4d9A3b468FBc0b256Da59B5B40CB20e5eD137c6,100000000000000000000\n\
    ```\n\nThis statement grants the DEX contract permission to transfer up to 100\
    \ WML tokens from Account 1 to the DEX contract.\n\nMetaMask will display a popup\
    \ asking you to confirm (see Figure [13-16](#471881_2_En_13_Chapter.xhtml#Fig16)).\
    \ Click **Confirm**.\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig16_HTML.jpg)\n\
    \n*A page of the MetaMask notification page with the DEX contract access and the\
    \ transaction fee. Reject button and highlighted confirm buttons are at the bottom.*\
    \  \nFigure 13-16 — Confirming permission to let the DEX contract access the WML\
    \ tokens\n\nOnce the transaction is confirmed, Account 1 is ready to send 100\
    \ WML tokens to the DEX contract. Fill in the following statement next to the\
    \ **exchange** button for the DEX contract (see Figure [13-17](#471881_2_En_13_Chapter.xhtml#Fig17)):\
    \ `\"WML\",\"LWM\",100000000000000000000`.\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig17_HTML.jpg)\n\
    \n*A screenshot of the dialog box has 4 labels. The labels are DEX contract, token\
    \ to convert from, a token to convert to, and 100 tokens.*  \nFigure 13-17 — Converting\
    \ WML tokens to LWM\n\nClick the **exchange** button.\n\nThis statement calls\
    \ the `exchange()` function in the DEX contract and indicates you want to swap\
    \ 100 WML to LWM tokens.\n\nClick **Confirm** in MetaMask to pay for the transaction.\
    \ Once the transaction is confirmed, you should see that Account 1 has 100 WML\
    \ tokens less and 100 LWM tokens now (see Figure [13-18](#471881_2_En_13_Chapter.xhtml#Fig18)).\n\
    \n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig18_HTML.jpg)\n\n*A page\
    \ of Account 1 has the assets of Goerli ETH, WML, and LWM tokens. It has buy,\
    \ send, and swap buttons.*  \nFigure 13-18 — Account 1 now has 100 LWM tokens\n\
    \nIf you go to the DEX contract and click the **getBalance** button, you will\
    \ see that it has 600 WML tokens and 400 LWM tokens.\n\n![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig19_HTML.jpg)\n\
    \n*A screenshot of the dialog box lists my token, DEX contract, along with the\
    \ exchange and get balance buttons.*  \nFigure 13-19 — The DEX contract now has\
    \ 100 more WML tokens and 100 fewer LWM tokens\n\nTable [13-2](#471881_2_En_13_Chapter.xhtml#Tab2)\
    \ shows the updated current token balances for Account 1, Account 2, and the DEX\
    \ contract.\n\n**Table 13-2 — The Balances for the Two Accounts and the DEX Contract**\n\
    \n| Balance | Account 1 | Account 2 | DEX |\n| --- | --- | --- | --- |\n| WML\
    \ Token | 400 | 0 | 600 |\n| LWM Token | 100 | 500 | 400 |\n\nLikewise, if Account\
    \ 2 wants to exchange 100 LWM tokens for 100 WML, they need to do the following:\n\
    \n- Go to the token contract for LWM and approve 100 tokens (`100000000000000000000`)\
    \ to be transferred to the DEX contract.\n- Go to the DEX contract and convert\
    \ 100 tokens of LWM to WML: `\"LWM\",\"WML\",100000000000000000000`.\n\n## Summary\n\
    \nIn this chapter, you explored a few important topics:\n\n- You learned what\
    \ DeFi is and the use of it.\n- You learned what stablecoins are, the different\
    \ types, and how they work to maintain price stability.\n- You learned how to\
    \ buy cryptos through the different types of crypto exchanges.\n- More importantly,\
    \ you learned how to implement a DEX using a smart contract."
  raw: '### Swapping WML Tokens for LWM Tokens


    You are now ready to use the DEX contract to swap tokens. Suppose Account 1 wants
    to exchange 100 WML tokens for 100 LWM tokens.


    Tip


    Switch to Account 1 in MetaMask now.


    The first step that Account 1 needs to do is to go to the first deployed token
    contract (WML token) and fill in the following (see Figure [13-15](#471881_2_En_13_Chapter.xhtml#Fig15))
    and click the **approve** button:


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig15_HTML.jpg)


    A screenshot of the deployed contracts tab has 3 labels. The labels are token
    contract for W M L, the address for the D E X contract, and 100 tokens.


    Figure 13-15


    Approving the transfer of tokens to the DEX contract


    ```

    0xF4d9A3b468FBc0b256Da59B5B40CB20e5eD137c6,100000000000000000000

    ```


    This statement grants the DEX contract permission to transfer up to 100 WML tokens
    from Account 1 to the DEX contract.


    MetaMask will display a popup asking you to confirm (see Figure [13-16](#471881_2_En_13_Chapter.xhtml#Fig16)).
    Click **Confirm**.


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig16_HTML.jpg)


    A page of the meta mask notification page with the D E X contract access and the
    transaction fee. Reject button and highlighted confirm buttons are at the bottom.


    Figure 13-16


    Confirming permission to let the DEX contract access the WML tokens


    Once the transaction is confirmed, Account 1 is ready to send 100 WML tokens to
    the DEX contract. Fill in the following statement next to the **exchange** button
    for the DEX contract (see Figure [13-17](#471881_2_En_13_Chapter.xhtml#Fig17)):
    `"WML","LWM",100000000000000000000`.


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig17_HTML.jpg)


    A screenshot of the dialog box has 4 labels. The labels are D E X contract, token
    to convert from, a token to convert to, and 100 tokens.


    Figure 13-17


    Converting WML tokens to LWM


    Click the **exchange** button.


    This statement calls the `exchange()` function in the DEX contract and indicates
    you want to swap 100 WML to LWM tokens.


    Click **Confirm** in MetaMask to pay for the transaction. Once the transaction
    is confirmed, you should see that Account 1 has 100 WML tokens less and 100 LWM
    tokens now (see Figure [13-18](#471881_2_En_13_Chapter.xhtml#Fig18)).


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig18_HTML.jpg)


    A page of account 1 has the assets of Goerli E T H, W M L, and L W M tokens. It
    has buy, send, and swap buttons.


    Figure 13-18


    Account 1 now has 100 LWM tokens


    If you go to the DEX contract and click the **getBalance** button, you will that
    it has 600 WML tokens and 400 LWM tokens.


    ![](images/471881_2_En_13_Chapter/471881_2_En_13_Fig19_HTML.jpg)


    A screenshot of the dialog box lists my token, D E X contract, along with the
    exchange and get balance buttons.


    Figure 13-19


    The DEX contract now has 100 more WML tokens and 100 fewer LWM tokens


    Table [13-2](#471881_2_En_13_Chapter.xhtml#Tab2) shows the updated current token
    balances for Account 1, Account 2, and the DEX contract.


    Table 13-2


    The Balances for the Two Accounts and the DEX Contract


    | Balance | Account 1 | Account 2 | DEX |

    | --- | --- | --- | --- |

    | WML Token | 400 | 0 | 600 |

    | LWM Token | 100 | 500 | 400 |


    Likewise, if Account 2 wants to exchange 100 LWM tokens for 100 WML, they need
    to do the following:


    *   Go to the token contract for LWM and approve 100 tokens (100,000,000,000,000,000,000)
    to be transferred to the DEX contract


    *   Go to the DEX contract and convert 100 tokens of LWM to WML: `"LWM","WML",100000000000000000000`.


    ## Summary


    In this chapter, you explored a few important topics:


    *   You learned what DeFi is and the use of it


    *   You learned what stablecoins are, the different types, and how they work to
    maintain price stability


    *   You learned how to buy cryptos through the different types of crypto exchanges.


    *   More importantly, you learn how to implement a DEX using a smart contract.'
  trans: "\n### 将 WML 代币兑换为 LWM 代币\n\n现在你可以使用 DEX 合约来兑换代币了。假设账户 1 想用 100 个 WML 代币兑换\
    \ 100 个 LWM 代币。\n\n**提示**  \n请在 MetaMask 中切换至账户 1。\n\n账户 1 需要做的第一步是进入第一个已部署的代币合约（WML\
    \ 代币），填写以下内容（见图 13-15），然后点击 **approve**（授权）按钮：\n\n![](img/471881_2_En_13_Fig15_HTML.jpg)\n\
    \n*已部署合约标签页的截图，包含三个标签：WML 代币合约、DEX 合约地址和 100 个代币。*  \n图 13-15 — 授权将代币转移至 DEX 合约\n\
    \n```\n0xF4d9A3b468FBc0b256Da59B5B40CB20e5eD137c6,100000000000000000000\n```\n\
    \n该语句授予 DEX 合约权限，允许其从账户 1 转移最多 100 个 WML 代币至 DEX 合约。\n\nMetaMask 将弹出一个窗口，要求你确认（见图\
    \ 13-16）。点击 **Confirm**（确认）。\n\n![](img/471881_2_En_13_Fig16_HTML.jpg)\n\n*MetaMask\
    \ 通知页面截图，显示 DEX 合约访问权限和交易费用。底部有拒绝按钮和突出显示的确认按钮。*  \n图 13-16 — 确认授权 DEX 合约访问 WML\
    \ 代币\n\n交易确认后，账户 1 即可向 DEX 合约发送 100 个 WML 代币。在 DEX 合约的 **exchange**（兑换）按钮旁填写以下语句（见图\
    \ 13-17）：`\"WML\",\"LWM\",100000000000000000000`。\n\n![](img/471881_2_En_13_Fig17_HTML.jpg)\n\
    \n*对话框截图，包含四个标签：DEX 合约、要兑换的代币、目标代币和 100 个代币。*  \n图 13-17 — 将 WML 代币兑换为 LWM 代币\n\
    \n点击 **exchange**（兑换）按钮。\n\n该语句调用了 DEX 合约中的 `exchange()` 函数，表明你想将 100 个 WML 兑换为\
    \ LWM 代币。\n\n在 MetaMask 中点击 **Confirm**（确认）以支付交易费用。交易确认后，你应该会看到账户 1 少了 100 个 WML\
    \ 代币，并增加了 100 个 LWM 代币（见图 13-18）。\n\n![](img/471881_2_En_13_Fig18_HTML.jpg)\n\n\
    *账户 1 的页面，显示其拥有 Goerli ETH、WML 和 LWM 代币资产。页面包含买入、发送和兑换按钮。*  \n图 13-18 — 账户 1 现在拥有\
    \ 100 个 LWM 代币\n\n如果你进入 DEX 合约并点击 **getBalance**（获取余额）按钮，你将看到其拥有 600 个 WML 代币和\
    \ 400 个 LWM 代币。\n\n![](img/471881_2_En_13_Fig19_HTML.jpg)\n\n*对话框截图，列出了我的代币、DEX\
    \ 合约，以及兑换和获取余额按钮。*  \n图 13-19 — DEX 合约现在增加了 100 个 WML 代币，减少了 100 个 LWM 代币\n\n\
    表 13-2 显示了账户 1、账户 2 和 DEX 合约更新的当前代币余额。\n\n**表 13-2 — 两个账户和 DEX 合约的余额**\n\n| 余额\
    \ | 账户 1 | 账户 2 | DEX |\n| --- | --- | --- | --- |\n| WML 代币 | 400 | 0 | 600 |\n\
    | LWM 代币 | 100 | 500 | 400 |\n\n同样地，如果账户 2 想用 100 个 LWM 代币兑换 100 个 WML 代币，需要执行以下操作：\n\
    \n- 进入 LWM 代币合约，授权将 100 个代币（`100000000000000000000`）转移至 DEX 合约。\n- 进入 DEX 合约，将\
    \ 100 个 LWM 代币兑换为 WML 代币：`\"LWM\",\"WML\",100000000000000000000`。\n\n## 总结\n\n\
    在本章中，你探讨了几个重要主题：\n\n- 你了解了什么是 DeFi 及其用途。\n- 你了解了什么是稳定币、不同类型的稳定币，以及它们如何维持价格稳定。\n\
    - 你了解了如何通过不同类型的加密货币交易所购买加密货币。\n- 更重要的是，你学会了如何用智能合约实现一个 DEX。"
