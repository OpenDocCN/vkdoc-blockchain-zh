    The next method to add to the `Blockchain` class is the `add_transaction()` method:


    ```

    def add_transaction(self, sender, recipient, amount):

    self.current_transactions.append({

    ''amount'': amount,

    ''recipient'': recipient,

    ''sender'': sender,

    })

    return self.last_block[''index''] + 1

    ```


    This method adds a new transaction to the current list of transactions. It then
    gets the index of the last block in the blockchain and adds one to it. This new
    index is the block that the current transaction will be added to.


    To obtain the last block in the blockchain, define a property called `last_block`
    in the `Blockchain` class:


    ```

    @property

    def last_block(self):

    # returns the last block in the blockchain

    return self.chain[-1]

    ```


    ### Exposing the Blockchain Class as a REST API


    Your `Blockchain` class is now complete, so let’s expose it as a REST API using
    Flask. Append the following statements to the end of the `blockchain.py` file:


    ```

    app = Flask(__name__)

    # generate a globally unique address for this node

    node_identifier = str(uuid4()).replace(''-'', '''')

    # instantiate the Blockchain

    blockchain = Blockchain()

    ```


    ### Obtaining the Full Blockchain


    For the REST API, you want to create a route for users to obtain the current blockchain,
    so append the following statements to the end of `blockchain.py`:


    ```

    # return the entire blockchain

    @app.route(''/blockchain'', methods=[''GET''])

    def full_chain():

    response = {

    ''chain'': blockchain.chain,

    ''length'': len(blockchain.chain),

    }

    return jsonify(response), 200

    ```


    ### Performing Mining


    You also need to create a route to allow miners to mine a block so that it can
    be added to the blockchain:


    ```

    @app.route(''/mine'', methods=[''GET''])

    def mine_block():

    blockchain.add_transaction(

    sender="0",

    recipient=node_identifier,

    amount=1,

    )

    # obtain the hash of last block in the blockchain

    last_block_hash = \

    blockchain.hash_block(blockchain.last_block)

    # using PoW, get the nonce for the new block to be added

    # to the blockchain

    index = len(blockchain.chain)

    nonce = blockchain.proof_of_work(index, last_block_hash,

    blockchain.current_transactions)

    # add the new block to the blockchain using the last block

    # hash and the current nonce

    block = blockchain.append_block(nonce, last_block_hash)

    response = {

    ''message'': "New Block Mined",

    ''index'': block[''index''],

    ''hash_of_previous_block'':

    block[''hash_of_previous_block''],

    ''nonce'': block[''nonce''],

    ''transactions'': block[''transactions''],

    }

    return jsonify(response), 200

    ```


    When a miner manages to mine a block, they must receive a reward for finding the
    proof. Here, you add a transaction to send one unit of reward to the miner to
    signify the reward for successfully mining the block.


    When mining a block, you need to find the hash of the previous block and use it
    together with the content of the current block to find the nonce for the block.
    Once the nonce is found, you append it to the blockchain.


    ### Adding Transactions


    Another route that you want to add to the API is the ability to add transactions
    to the current block:


    ```

    @app.route(''/transactions/new'', methods=[''POST''])

    def new_transaction():

    # get the value passed in from the client

    values = request.get_json()

    # check that the required fields are in the POST''ed data

    required_fields = [''sender'', ''recipient'', ''amount'']

    if not all(k in values for k in required_fields):

    return (''Missing fields'', 400)

    # create a new transaction

    index = blockchain.add_transaction(

    values[''sender''],

    values[''recipient''],

    values[''amount'']

    )

    response = {''message'':

    f''Transaction will be added to Block {index}''}

    return (jsonify(response), 201)

    ```


    An example of a transaction is a user sending cryptocurrency from one account
    to another.


    ## Testing Your Blockchain


    You are now ready to test the blockchain. In this final step, add the following
    statements to the end of `blockchain.py`:


    ```

    if __name__ == ''__main__'':

    app.run(host=''0.0.0.0'', port=int(sys.argv[1]))

    ```


    In this implementation, you allow the user to run the API based on the specified
    port number.


    To start the first node, type the following command in terminal:


    ```

