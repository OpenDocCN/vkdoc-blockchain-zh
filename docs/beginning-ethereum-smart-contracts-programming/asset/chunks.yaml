    \ Click **Confirm** and wait a while for the transaction to confirm.\n\n### Testing\
    \ the Contract\n\nOnce the smart contract is deployed, you will see the contract\
    \ under the **Deployed Contracts** section of the Remix IDE. You will also see\
    \ the address of the contract displayed next to the contract name.\n\n> **Note**\
    \  \n> To call a smart contract on the blockchain, your dapp needs the address\
