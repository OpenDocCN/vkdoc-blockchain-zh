    response = {

    ''message'':

    ''The blockchain has been updated to the latest'',

    ''blockchain'': blockchain.chain

    }

    else:

    response = {

    ''message'': ''Our blockchain is the latest'',

    ''blockchain'': blockchain.chain

    }

