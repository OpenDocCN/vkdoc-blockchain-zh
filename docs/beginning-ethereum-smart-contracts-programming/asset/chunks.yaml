    {

    "internalType": "uint256",

    "name": "num1",

    "type": "uint256"

    },

    {

    "internalType": "uint256",

    "name": "num2",

    "type": "uint256"

    }

    ],

    "name": "arithmetics",

    "outputs": [

    {

    "internalType": "uint256",

    "name": "sum",

    "type": "uint256"

    },

    {

    "internalType": "uint256",

    "name": "product",

    "type": "uint256"

    }

    ],

    "stateMutability": "pure",

    "type": "function"

    },

    {

    "inputs": [

    {

    "internalType": "uint256",

    "name": "num1",

    "type": "uint256"

    },

    {

    "internalType": "uint256",

    "name": "num2",

    "type": "uint256"

    }

    ],

    "name": "multiply",

    "outputs": [

    {

    "internalType": "uint256",

    "name": "",

    "type": "uint256"

    }

    ],

    "stateMutability": "pure",

    "type": "function"

    }

    ]

    ```


    同样地，点击 **字节码** 按钮，然后将其粘贴到文本编辑器中。它看起来会像图 6-11 所示。


    ![](img/471881_2_En_6_Fig11_HTML.jpg)


    一个包含 7 行程序代码的文本片段，展示了调试数据中的对象、操作码和源码映射，以及生成的源码和链接引用。


    图 6-11


    字节码


