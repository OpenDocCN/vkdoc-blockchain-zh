    \ i n m 6 r Y N f s D。\n\n图 12-9  \n为账户 1 铸造 NFT\n\n该字符串的格式为：`<NFT 的拥有者>,<代币 ID>,<TokenURI>`。在这个字符串中，账户\
    \ 1 被铸造了一个代币 ID 为 1 的代币，NFT 元数据的链接位于 [`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky)。这意味着账户\
