    ### Exporting Accounts


    To export an account,


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig28_HTML.jpg)


    A screenshot of the Goerli test network interface. It displays a list under account
    1, where the account details option is selected.


    Figure 5-28


    Viewing your account details


    *   Select the account that you want to export.


    *   Select the … displayed on the right of the account name and select **Account
    Details** (see Figure [5-28](#471881_2_En_5_Chapter.xhtml#Fig28)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig29_HTML.jpg)


    A screenshot of the Goerli test network interface overlays by the account 1 information
    popup box. It displays the Q R code, a code, and 2 buttons to view on Ethereum
    and export the private key.


    Figure 5-29


    Exporting the private key for your account


    *   Click the **Export private key** button (see Figure [5-29](#471881_2_En_5_Chapter.xhtml#Fig29)).


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig30_HTML.jpg)


    A screenshot of the Goerli test network interface overlays by the account 1 information
    popup box. It displays a warning message to never disclose the key. The confirm
    button highlights with a dark shade.


    Figure 5-30


    Viewing the private key for your account


    *   Enter your MetaMask password and click **Confirm** (see Figure [5-30](#471881_2_En_5_Chapter.xhtml#Fig30)).


    *   You should now see your private key. Click it to copy it to the clipboard
    and save it securely to a text file.


    Caution


    When dealing with accounts in the Main Ethereum Network, do be very cautious when
    exporting your private key and be sure to save it in a secure location. Once the
    private key is leaked, the assets in your account can be stolen easily. Of course,
    when dealing with one of the test networks, it is far less important because the
    assets in the test networks have no monetary value.'
  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，为您翻译以下文本。



    # 转移以太币


    使用 MetaMask，您可以非常轻松地将以太币从一个账户转移到另一个账户。您可以转账给 MetaMask 中的另一个账户，也可以使用其公钥地址转账给外部账户。


    要将以太币从一个账户转移到另一个账户，


    ![](img/471881_2_En_5_Fig21_HTML.jpg)


    Goerli 测试网络界面的截图。它显示了一个空的搜索栏和一条信息，内容为“在我账户间转账”，位于发送至屏幕下方。


    图 5-21


    将以太币发送到另一个账户


    - 切换到 `Account 1`。

    - 点击 **发送** 按钮。

    - 您将看到如图 5-21 所示的屏幕。


    ![](img/471881_2_En_5_Fig22_HTML.jpg)


    Goerli 测试网络界面的截图。它显示了一个空的搜索栏、一个“返回全部”选项，以及一个“我的账户”下的账户列表。


    图 5-22


    选择要将以太币发送到的账户


    - 要将以太币发送到另一个本地账户，请点击 **在我账户间转账** 选项。在此示例中选择 `Account 2`（见图 5-22）。


    **提示：** 要将以太币发送到外部账户，请输入收款人的账户地址，或点击二维码图标，然后您就可以使用网络摄像头扫描外部账户公钥地址的二维码。


    ![](img/471881_2_En_5_Fig23_HTML.jpg)


    Goerli 测试网络界面的截图。它在发送屏幕下显示了 Account 2 及其资产和数量。“下一步”按钮以深色阴影高亮显示。


    图 5-23


    指定要发送的以太币数量


    - 指定您要发送的以太币数量（本例中为 0.01；见图 5-23）。点击 **下一步**。


    ![](img/471881_2_En_5_Fig24_HTML.jpg)


    Goerli 测试网络界面“编辑”窗口的截图。它显示了将从 Account 1 交易到 Account 2 的 0.01 Goerlieth，以及预估的 Gas
    费。


    图 5-24


    确认交易


    - 您将看到本次交易产生的总交易金额（见图 5-24）。点击 **确认**（您需要向下滚动页面）。


    **注意：** 总交易金额是您转移的以太币数量加上交易费。交易费也称为 *gas 费*。


    ## Gas 费


    *Gas* 是在以太坊中运行交易或合约的内部定价单位。以太坊故意使用 Gas 作为交易定价的单位，而不是直接用以太币来计价交易费用。这是因为 Gas 能更准确地传达计算的复杂性，而以太币的价格会因市场力量而波动。Gas
    的价格由进行交易的市场需求决定。矿工/验证者通常会根据人们支付的 Gas 价格来处理交易；您支付的 Gas 价格越高，您的交易确认速度就越快。


    当您执行交易时，MetaMask 会自动指定您想要花费的最大 Gas 限额，所有未使用的 Gas 将退还到您的账户。此外，MetaMask 还会计算交易所需的
    Gas 量，并为您的交易建议一个 Gas 价格。


    ![](img/471881_2_En_5_Fig25_HTML.jpg)


    Goerli 测试网络界面的截图。它在 Account 1 的活动选项卡下显示了已发送的 Goerlieth。剩余的 Goerli ETH 为 0.04。


    图 5-25


    转账后的账户余额


    - 当交易完成时，您的账户应扣除总交易金额（见图 5-25）。

    - 您可以通过切换到 `Account 2` 来验证以太币是否已转移到 `Account 2`。


    # 恢复账户


    MetaMask 有一个内置系统，允许您安全可靠地恢复您的账户。在以下几种可能的情况下，您需要恢复您的账户：


    - 您忘记了登录 MetaMask 的密码。

    - 您需要将账户从一台计算机转移到另一台计算机（例如您有了新电脑或丢失了旧电脑）。


    无论是哪种情况，只要您备份了 12 个单词的助记词，MetaMask 都允许您非常轻松地恢复现有账户。使用 12 个单词的助记词的好处是，您的所有账户都可以被恢复。假设您在
    MetaMask 中创建了三个账户。只要您拥有 12 个单词的助记词，所有账户都可以恢复。


    要恢复您的账户，


    ![](img/471881_2_En_5_Fig26_HTML.jpg)


    Goerli 测试网络界面的截图。它显示了一个 MetaMask 徽标、一条带有密码栏的“欢迎回来”消息以及一个解锁按钮。


    图 5-26


    使用 12 词秘密种子短语恢复您的账户


    - 点击 MetaMask 登录屏幕中的 **忘记密码？** 链接（见图 5-26）。


    ![](img/471881_2_En_5_Fig27_HTML.jpg)


    MetaMask 页面的截图。它在“重置钱包”选项下显示了相关消息以及秘密恢复短语、创建新密码和确认密码的选项卡。


    图 5-27


    恢复您的账户并重置密码


    - 您将被重定向到一个允许您重置钱包的网页。

    - 按照提供给您的确切顺序输入 12 词种子短语（见图 5-27）。您还需要设置一个新密码来保护您的账户。点击 **恢复**。

    - 现在您将找到您原来的 `Account 1` 和 `Account 2`。实际上，您之前创建的所有余额非零的账户都会被自动恢复。


    **注意：** 您应该会看到 `Account 1` 和 `Account 2` 拥有与之前相同数量的以太币。


    # 导入和导出账户


    您可以导出 MetaMask 中的账户，以便它们可以被导入到另一台计算机上。您需要做的就是导出您账户的私钥，然后在另一台计算机上使用相同的私钥导入它。


    ## 导出账户


    要导出一个账户，


    ![](img/471881_2_En_5_Fig28_HTML.jpg)


    Goerli 测试网络界面的截图。它在 Account 1 下显示了一个列表，其中选择了“账户详情”选项。


    图 5-28


    查看您的账户详情


    - 选择您想要导出的账户。

    - 选择账户名称右侧显示的 … 并选择 **账户详情**（见图 5-28）。


    ![](img/471881_2_En_5_Fig29_HTML.jpg)


    Goerli 测试网络界面的截图，其上覆盖着 Account 1 信息弹出框。它显示了二维码、一个代码，以及两个按钮：在以太坊上查看和导出私钥。


    图 5-29


    导出您账户的私钥


    - 点击 **导出私钥** 按钮（见图 5-29）。


    ![](img/471881_2_En_5_Fig30_HTML.jpg)


    Goerli 测试网络界面的截图，其上覆盖着 Account 1 信息弹出框。它显示了一条警告信息，内容为切勿泄露密钥。“确认”按钮以深色阴影高亮显示。


    图 5-30


    查看您账户的私钥


    - 输入您的 MetaMask 密码并点击 **确认**（见图 5-30）。

    - 现在您应该可以看到您的私钥。点击它以将其复制到剪贴板，并安全地保存到一个文本文件中。


    **警告：** 在以太坊主网中处理账户时，导出私钥时务必非常谨慎，并确保将其保存在安全的位置。一旦私钥泄露，您账户中的资产很容易被盗。当然，在处理测试网络时，就没那么重要了，因为测试网络中的资产没有货币价值。

