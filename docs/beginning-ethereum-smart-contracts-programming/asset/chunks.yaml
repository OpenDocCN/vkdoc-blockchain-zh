  trans: '

    ### 哈希


    如前所述，哈希用于在区块链中“链接”区块。区块链中的每个区块都包含上一个区块的哈希值。这样做可以确保记录在区块链上的数据不可篡改，从而防止被修改。


    哈希的另一个良好用途是在区块链上存储数据时。由于公共区块链上的所有数据都公开可查，你不应将私有数据存储在公共区块链上。如果需要将私有数据存储在公共区块链上以作证明，则应存储数据的哈希值，因为哈希值不可逆。第
    7 章对此提供了很好的示例。


    ### 对称加密与非对称加密


    对称加密和非对称加密用于生成和保护区块链中的账户。


    如图 1-10 所示，当你在以太坊中创建账户时，首先会使用非对称加密生成一个私钥。


    ![](img/471881_2_En_1_Fig10_HTML.png)


    一个流程图包含公钥和私钥，取最后 20 个字节，在其前面加上 0x 账户地址，并用用户提供的密码对私钥进行加密。


    图 1-10


    了解账户是如何生成和保护的


    使用此私钥，通过`ECDSA`（椭圆曲线数字签名算法）生成一个公钥。然后，使用`Keccak256`哈希算法，利用此公钥生成账户地址。该输出的最后 20 个字节用作账户的地址。


    同时，请记住，当你创建账户时，必须提供一个密码。此密码用于使用对称加密对你的私钥进行加密。


    ### 数字签名


    在区块链中，创建交易时会使用数字签名。在第 4 章中，你将学习如何通过从一个账户向另一个账户发送一些以太币来创建一个简单交易。


    当你创建一笔交易时，会使用你账户的私钥对交易进行签名，从而生成数字签名。然后，数字签名连同交易详情会被广播到区块链网络中的各个矿工/验证者（见图 1-11）。


    ![](img/471881_2_En_1_Fig11_HTML.jpg)


    一个框图说明了数字签名如何创建交易。它从交易开始，通过使用私钥签署交易生成数字签名，最后以广播交易和签名结束。


    图 1-11


    为交易创建数字签名以证明创建者的身份


    矿工/验证者在收到你的交易后，会使用交易的数字签名来验证交易的真实性。一旦交易被验证为真实，矿工/验证者就会继续验证交易的内容。


    ## 总结


    在本章中，你了解了区块链背后的主要科学：密码学。你学习了哈希、对称加密和非对称加密。如果你熟悉 Python，我强烈建议你尝试运行代码示例，以便亲身体验各种加密算法。至此，你已经准备好深入区块链的世界了。我们第
    2 章见！


    # 2. 理解区块链


    近年来最热门的技术之一是*区块链*。但究竟什么是区块链？它又是如何工作的？在本章中，你将探讨区块链的概念、这一概念是如何产生的，以及它旨在解决哪些问题。本章结束时，你将清晰理解区块链的思想和动机。


    **提示**


    对于那些明显缺乏耐心的人，区块链是一种记录的数字交易，它按照称为*区块*的数据块进行排列。这些区块通过一种称为*哈希函数*的加密验证相互链接。链接在一起后，这些区块形成了一条不间断的链，即*区块链*。区块链被编程用于记录不仅限于金融交易，实际上还可以记录任何有价值的东西。区块链的另一个常用名称是*分布式账本*。


    请坐稳了，我将要在本章中讨论许多概念。但如果你仔细跟随，你将理解区块链的概念，并将在接下来的章节中开始在以太坊区块链上创建一些真正有创意的应用程序！


    **提示**


    以太坊是一个开源公共区块链，与比特币网络类似。除了提供一种称为以太币（类似于比特币）的加密货币外，它与比特币的主要区别在于，它在区块链之上提供了一个称为智能合约的编程平台。本书重点介绍以太坊区块链和智能合约。


    ## 区块链背后的动机


    大多数人听说过加密货币，或者至少听说过比特币。


    **注**


    加密货币背后的技术是区块链。


    要理解我们为何需要加密货币，你必须首先从理解一个基本概念开始：*信任*。如今，任何有价值的资产或交易都由第三方记录，例如银行、政府或公司。我们信任银行不会偷我们的钱，并且它们受到政府的监管。即使银行倒闭，它们也有政府支持。我们也信任我们的信用卡公司。卖家信任信用卡公司会支付他们款项，而买家信任信用卡公司会处理与卖家的任何纠纷。

