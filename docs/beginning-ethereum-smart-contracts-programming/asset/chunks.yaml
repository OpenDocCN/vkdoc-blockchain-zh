  trans: '好的，作为一名高级文档工程师和翻译员，我已经了解了相关规范。以下是遵照您的要求完成的翻译：



    ### 信任的寄托


    所有这些都归结为一个关键概念：信任的寄托。也就是说，我们将信任寄托于一个中央机构。试想一下，在日常生活中，我们将信任寄托于银行，也将信任寄托于政府。


    即便是日常琐事，我们也依赖中央机构。例如，当你去图书馆借书时，你相信图书馆会妥善记录你借阅和归还的书籍。


    核心主题是，我们信任机构，却不信任彼此。我们信任政府、银行，甚至图书馆，但我们就是不信任彼此。举个例子，考虑以下场景。假设你在咖啡馆工作，有人走过来递给你一张
    10 美元钞票来买两杯咖啡。另一个人则递给你一张手写便条，上面写着欠你 10 美元，以此支付两杯咖啡的费用。你会信任哪一个？答案显而易见，不是吗？你自然会相信
    10 美元钞票，而不是手写便条。这是因为你知道这张 10 美元钞票可以在别处购买其他商品或服务，并且它是由美国政府背书的。相比之下，那张手写便条没有任何人背书，除了写它的人（也许），因此它实际上毫无价值。


    现在让我们将讨论再深入一点。同样，假设你试图出售某样东西。有人走过来，提出用图 2-1 中所示的货币来支付你的商品。


    ![](img/471881_2_En_2_Fig1_HTML.jpg)


    一张货币照片，上方是委内瑞拉，下方是津巴布韦。上方是一张 100 玻利瓦尔纸币，下方是一张一百万亿津巴布韦元纸币。


    **图 2-1** 两国的货币


    你会接受图中所示的货币吗？这里有两种不同的货币，一种来自委内瑞拉，一种来自津巴布韦。在这种情况下，你首先会考虑这些货币是否被广泛接受。然后你会考虑对这些政府的信任程度。你可能在新闻中读到过这两个国家的恶性通货膨胀，这些货币可能无法长期保值。那么，你会接受这些货币作为支付方式吗？


    ### 信任问题


    之前，我提到人们信任机构而不信任彼此。但即便是成熟的经济体也可能失败，例如美国 2007-2008 年的金融危机。投资银行雷曼兄弟因次贷市场在 2008 年
    9 月倒闭。那么，如果成熟经济体的银行都可能倒闭，欠发达国家的人民又如何能信任他们的银行和政府呢？即使银行可信，你的存款也可能被政府监控，他们可能根据你的交易记录逮捕你。


    正如你在上一节的例子中看到的，有时人们并不信任机构，尤其是当该国的政治局势不稳定时。


    这就引出了下一个关键问题：即使人们信任机构，机构也可能失败。而当人们对机构失去信任时，人们便会转向*加密货币*。在下一节中，我将讨论如何利用*去中心化*（加密货币背后的一个基本概念）来解决信任问题。


    ### 利用去中心化解决信任问题


    既然你已经了解了信任的挑战，以及该信任谁、不该信任谁，现在是时候考虑一种解决信任问题的方法了。特别是，区块链利用去中心化来解决信任问题。


    为了理解去中心化，让我们用一个基于日常生活的非常简单的例子来说明。


    ### 去中心化的例子


    为了理解去中心化如何解决信任问题，让我们考虑一个现实生活中的例子。


    设想一个场景：有三个人，他们有一些 DVD 想要互相分享（见图 2-2）。


    ![](img/471881_2_En_2_Fig2_HTML.jpg)


    三个示意图，分别标记为 A、B、C 的三个人。底部，每个示意图下方都竖直摆放着 DVD。


    **图 2-2** 在一群人之间分享 DVD


    他们需要做的第一件事是找个人来记录每张 DVD 的行踪。当然，最简单的办法是每个人自己记录借出了什么、借入了什么，但由于人们天生互不信任，这种方法在三者中并不受欢迎。


    为了解决这个问题，他们决定指定一个人，比如 B，来保管一本记录每张 DVD 行踪的账本（见图 2-3）。


    ![](img/471881_2_En_2_Fig3_HTML.jpg)


    三个示意图，分别标记为 A、B、C 的三个人。底部，每个示意图下方都竖直摆放着 DVD。B 旁边有两列：DVD 和 Person。DVD 列有 1、2、3，Person
    列有与数字对应的 A、B、C。


    **图 2-3** 指定特定人员来记录


    这样，就有了一个中央机构来跟踪每张 DVD 的行踪。但是等等，这难道不是中心化的问题吗？如果 B 不值得信任会怎样？事实证明 B 有偷 DVD 的习惯，他可以轻易地修改账本，抹去他借走的
    DVD 记录。所以，一定有更好的办法。


    这时，有人想到了一个主意！为什么不让每个人都保存一份账本呢？每当有人借用或出借 DVD 时，记录就会被广播给所有人，然后每个人都记录下这笔交易。见图 2-4。


    ![](img/471881_2_En_2_Fig4_HTML.jpg)


    三个示意图，分别标记为 A、B、C 的三个人，说明了每个人如何记录交易。底部，每个示意图下方都竖直摆放着 DVD。A、B、C 旁边都有两列：DVD 和 Person。DVD
    列有 1、2、3，Person 列有与数字对应的 A、B、C。


    **图 2-4** 让每个人来记录


    所以现在记录是去中心化的。三个人现在持有相同的账本。但稍等。如果 A 和 C 合谋修改账本，以便他们能从 B 那里偷走 DVD 呢？由于少数服从多数，只要有超过
    50%的人持有相同的记录，其他人就必须听从多数人的意见。而且因为这个场景中只有三个人，让超过 50%的人合谋是非常容易的。


    解决方案是让更多的人持有账本，特别是那些与 DVD 分享业务无关的人（见图 2-5）。


    ![](img/471881_2_En_2_Fig5_HTML.jpg)


    三个示意图，分别标记为 A、B、C 的三个人，说明了无关人员如何帮助记录。底部，每个示意图下方都竖直摆放着 DVD。A、B、C 旁边都有两列：DVD 和 Person。DVD
    列有 1、2、3，Person 列有与数字对应的 A、B、C。此外，还包含一个人群剪影以及一列 DVD 和 Person。


    **图 2-5** 让一群无关的人来帮助记录


    这样一来，任何一方想要篡改账本中的记录就变得更加困难了。要修改一条记录，需要让许多人同时参与进来，这是一件耗时的事情。这就是*分布式账本*（通常被称为区块链）背后的核心理念。

    '
- fmt: "# Blockchain As a Distributed Ledger\n\nNow that you have a better idea of\
    \ a distributed ledger, you can associate it with the term *blockchain*. Using\
    \ the DVD exchange example, each time a DVD is borrowed or returned, a transaction\
    \ is created. A number of transactions are then grouped into a block. As more\
    \ transactions are performed, the blocks are linked together cryptographically,\
    \ forming what we now call a blockchain (see Figure [2-6](#471881_2_En_2_Chapter.xhtml#Fig6)).\n\
    \n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig6_HTML.jpg)\n\nAn illustration\
    \ explains the transactions and how links form a blockchain. An illustration of\
    \ a person labeled A connects to the blocks where transactions occur, then chains\
    \ with many numbers of blocks as transaction increases, thus forming a blockchain.\
    \ The transactions include A borrows D V D from B, A borrows D V D from C, and\
    \ B borrows D V D from A.\n\n**Figure 2-6** Transactions form a block, and blocks\
    \ are then chained\n\nHere’s a summary of a few important points:\n\n- Centralized\
    \ databases and institutions work when there is trust in the system of law, governments,\
    \ regulatory bodies, and people.\n- A decentralized database built on the blockchain\
    \ removes the need for the trust in a central body.\n- A blockchain can be used\
    \ for anything of value, not just currencies.\n\n## How a Blockchain Works\n\n\
    At a very high level, a blockchain consists of a number of blocks. Each block\
    \ contains a list of transactions and a timestamp (see Figure [2-7](#471881_2_En_2_Chapter.xhtml#Fig7)).\n\
    \n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig7_HTML.jpg)\n\nAn illustration\
    \ explains how blockchain connects to each block. It includes Genesis block, linked\
    \ to block 2, block 3, and block 4. Each block has a list of transaction and timestamp\
    \ reports.\n\n**Figure 2-7** Every blockchain has a beginning block known as the\
    \ genesis block\n\nThe blocks are connected to each other cryptographically, the\
    \ details of which I will discuss in the sections ahead. The first block in a\
    \ blockchain is known as the *genesis* block.\n\n> **Note**  \n> Every blockchain\
    \ has a genesis block.\n\nSo, the next important questions is, how do you chain\
    \ the blocks together?\n\n### Chaining the Blocks\n\nTo understand how blocks\
    \ in a blockchain are chained together, you must understand one key concept: *hashing*.\n\
    \n> **Tip**  \n> Chapter [1](#471881_2_En_1_Chapter.xhtml) discussed hashing in\
    \ more detail. Be sure to read it first before continuing with this section.\n\
    \nRecall that a hash function is a function that maps data of arbitrary size to\
    \ data of fixed size. By altering a single character in the original string, the\
    \ resultant hash value is totally different from the previous one. Most importantly,\
    \ observe that a single change in the original message results in a completely\
    \ different hash, making it difficult to know that the two original messages are\
    \ similar.\n\nA hash function has the following characteristics:\n\n- **It is\
    \ deterministic**: The same message always results in the same hash.\n- **It is\
    \ a one-way process**: When you hash a string, it is computationally hard to reverse\
    \ a hash to its original message.\n- **It is collision resistant**: It is hard\
    \ to find two different input messages that hash to the same hash.\n\nYou are\
    \ now ready to learn how blocks in a blockchain are chained together. To chain\
    \ the blocks together, the content of each block is hashed and then stored in\
    \ the next block (see Figure [2-8](#471881_2_En_2_Chapter.xhtml#Fig8)). This way,\
    \ if any transaction in a block is altered, this will invalidate the hash of the\
    \ current block, which is stored in the next block, which in turn invalidates\
    \ the hash of the next block, and so on.\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig8_HTML.jpg)\n\
    \nAn illustration explains how blockchain connects to each block. It includes\
    \ Genesis block, linked to block 2, block 3, and block 4. Each block has a list\
    \ of transactions, a hash of previous blocks, and timestamp reports.\n\n**Figure\
    \ 2-8** Chaining the blocks with hashes\n\nObserve that when hashing the content\
    \ of a block, the hash of the previous block is hashed together with the transactions.\
    \ However, do take note that this is a simplification of what is in a block. Later\
    \ on, you will dive into the details of a block and see exactly how transactions\
    \ are represented in a block.\n\nStoring the hash of the previous block in the\
    \ current block assures the integrity of the transactions in the previous block.\
    \ Any modifications to the transaction(s) within a block causes the hash in the\
    \ next block to be invalidated and also affects the subsequent blocks in the blockchain.\
    \ If a hacker wants to modify a transaction, not only must they modify the transaction\
    \ in a block but all other subsequent blocks in the blockchain. In addition, they\
    \ need to synchronize the changes to all other computers on the network, which\
    \ is a computationally expensive task to do. Hence, data stored in the blockchain\
    \ is *immutable*, for they are hard to change once the block they are in is added\
    \ to the blockchain.\n\nAt this juncture, you have a pretty good idea of what\
    \ a blockchain looks like. In the real world, the blockchain is stored on multiple\
    \ computers (called nodes) usually scattered geographically around the world (see\
    \ Figure [2-9](#471881_2_En_2_Chapter.xhtml#Fig9)).\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig9_HTML.jpg)\n\
    \nAn illustration explains how nodes connected to each other globally stored the\
    \ data. 6 nodes connect each other with dotted lines.\n\n**Figure 2-9** Confirmations\
    \ of blocks in a blockchain\n\nEach of these nodes are connected to each other\
    \ in a peer-to-peer fashion. Nodes that store the entire blockchain are known\
    \ as *full nodes*.\n\n### Immutability of Blockchains\n\nIn a blockchain, each\
    \ block is chained to its previous block through the use of a cryptographic hash.\
    \ A block’s identity changes if the parent’s identity changes. This in turn causes\
    \ the current block’s children to change, which affects the grandchildren, and\
    \ so on. A change to a block forces a recalculation of all subsequent blocks,\
    \ which requires enormous computation power. This makes the blockchain immutable,\
    \ a key feature of cryptocurrencies like Bitcoin and Ethereum.\n\nAs a new block\
    \ is added to the blockchain, the block of transactions is said to be *confirmed*\
    \ by the blockchain. When a block is newly added, it’s deemed to have one confirmation.\
    \ As another block is added to it, its number of confirmation increases. Figure\
    \ [2-10](#471881_2_En_2_Chapter.xhtml#Fig10) shows the number of confirmations\
    \ for the blocks in a blockchain. The more confirmations a block has, the more\
    \ difficult it is to remove it from the blockchain.\n\n> **Tip**  \n> In general,\
    \ once a block has six or more confirmations, it’s deemed infeasible for it to\
    \ be reversed. Therefore, the data stored in the blockchain is immutable.\n\n\
    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig10_HTML.jpg)\n\nAn illustration\
    \ explains how blockchain connects to each block and confirmation increases. It\
    \ includes Genesis block, linked to block 2, block 3, and block 4. Each block\
    \ has a list of transactions, hash of previous blocks, and timestamp reports.\n\
    \n**Figure 2-10** Confirmations of blocks in a blockchain"
  raw: '### Blockchain As a Distributed Ledger


    Now that you have a better idea of a distributed ledger, you can associate it
    with the term *blockchain*. Using the DVD exchange example, each time a DVD is
    borrowed or returned, a transaction is created. A number of transactions are then
    grouped into a block. As more transactions are performed, the blocks are linked
    together cryptographically, forming what we now call a blockchain (see Figure
    [2-6](#471881_2_En_2_Chapter.xhtml#Fig6)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig6_HTML.jpg)


    An illustration explains the transactions and how links form a blockchain. An
    illustration of a person labeled A connects to the blocks where transactions occur,
    then chains with many numbers of blocks as transaction increases, thus forming
    a blockchain. The transactions include A borrows D V D from B, A borrows D V D
    from C, and B borrows D V D from A.


    Figure 2-6


    Transactions form a block, and blocks are then chained


    Here’s a summary of a few important points:


    *   Centralized databases and institutions work when there is trust in the system
    of law, governments, regulatory bodies, and people.


    *   A decentralized database built on the blockchain removes the need for the
    trust in a central body.


    *   A blockchain can be used for anything of value, not just currencies.


    ## How a Blockchain Works


    At a very high level, a blockchain consists of a number of blocks. Each block
    contains a list of transactions and a timestamp (see Figure [2-7](#471881_2_En_2_Chapter.xhtml#Fig7)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig7_HTML.jpg)


    An illustration explains how blockchain connects to each block. It includes Genesis
    block, linked to block 2, block 3, and block 4\. Each block has a list of transaction
    and timestamp reports.


    Figure 2-7


    Every blockchain has a beginning block known as the genesis block


    The blocks are connected to each other cryptographically, the details of which
    I will discuss in the sections ahead. The first block in a blockchain is known
    as the *genesis* block.


    Note


    Every blockchain has a genesis block.


    So, the next important questions is, how do you chain the blocks together?


    ### Chaining the Blocks


    To understand how blocks in a blockchain are chained together, you must understand
    one key concept: *hashing*.


    Tip


    Chapter [1](#471881_2_En_1_Chapter.xhtml) discussed hashing in more detail. Be
    sure to read it first before continuing with this section.


    Recall that a hash function is a function that maps data of arbitrary size to
    data of fixed size. By altering a single character in the original string, the
    resultant hash value is totally different from the previous one. Most importantly,
    observe that a single change in the original message results in a completely different
    hash, making it difficult to know that the two original messages are similar.


    A hash function has the following characteristics:


    *   **It is deterministic**: The same message always results in the same hash.


    *   **It is a one-way process**: When you hash a string, it is computationally
    hard to reverse a hash to its original message.


    *   **It is collision resistant**: It is hard to find two different input messages
    that hash to the same hash.


    You are now ready to learn how blocks in a blockchain are chained together. To
    chain the blocks together, the content of each block is hashed and then stored
    in the next block (see Figure [2-8](#471881_2_En_2_Chapter.xhtml#Fig8)). This
    way, if any transaction in a block is altered, this will invalidate the hash of
    the current block, which is stored in the next block, which in turn invalidates
    the hash of the next block, and so on.


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig8_HTML.jpg)


    An illustration explains how blockchain connects to each block. It includes Genesis
    block, linked to block 2, block 3, and block 4\. Each block has a list of transactions,
    a hash of previous blocks, and timestamp reports.


    Figure 2-8


    Chaining the blocks with hashes


    Observe that when hashing the content of a block, the hash of the previous block
    is hashed together with the transactions. However, do take note that this is a
    simplification of what is in a block. Later on, you will dive into the details
    of a block and see exactly how transactions are represented in a block.


    Storing the hash of the previous block in the current block assures the integrity
    of the transactions in the previous block. Any modifications to the transaction(s)
    within a block causes the hash in the next block to be invalidated and also affects
    the subsequent blocks in the blockchain. If a hacker wants to modify a transaction,
    not only must they modify the transaction in a block but all other subsequent
    blocks in the blockchain. In addition, they need to synchronize the changes to
    all other computers on the network, which is a computationally expensive task
    to do. Hence, data stored in the blockchain is *immutable*, for they are hard
    to change once the block they are in is added to the blockchain.


    At this juncture, you have a pretty good idea of what a blockchain looks like.
    In the real world, the blockchain is stored on multiple computers (called nodes)
    usually scattered geographically around the world (see Figure [2-9](#471881_2_En_2_Chapter.xhtml#Fig9)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig9_HTML.jpg)


    An illustration explains how nodes connected to each other globally stored the
    data. 6 nodes connect each other with dotted lines.


    Figure 2-9


    Confirmations of blocks in a blockchain


    Each of these nodes are connected to each other in a peer-to-peer fashion. Nodes
    that store the entire blockchain are known as *full nodes*.


    ### Immutability of Blockchains


    In a blockchain, each block is chained to its previous block through the use of
    a cryptographic hash. A block’s identity changes if the parent’s identity changes.
    This in turn causes the current block’s children to change, which affects the
    grandchildren, and so on. A change to a block forces a recalculation of all subsequent
    blocks, which requires enormous computation power. This makes the blockchain immutable,
    a key feature of cryptocurrencies like Bitcoin and Ethereum.


    As a new block is added to the blockchain, the block of transactions is said to
    be *confirmed* by the blockchain. When a block is newly added, it’s deemed to
    have one confirmation. As another block is added to it, its number of confirmation
    increases. Figure [2-10](#471881_2_En_2_Chapter.xhtml#Fig10) shows the number
    of confirmations for the blocks in a blockchain. The more confirmations a block
    has, the more difficult it is to remove it from the blockchain.


    Tip


    In general, once a block has six or more confirmations, it’s deemed infeasible
    for it to be reversed. Therefore, the data stored in the blockchain is immutable.


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig10_HTML.jpg)


    An illustration explains how blockchain connects to each block and confirmation
    increases. It includes Genesis block, linked to block 2, block 3, and block 4\.
    Each block has a list of transactions, hash of previous blocks, and timestamp
    reports.


    Figure 2-10


    Confirmations of blocks in a blockchain'
  trans: "\n# 区块链作为分布式账本\n\n既然你对分布式账本有了更深入的了解，就可以将其与*区块链*这一术语联系起来。以 DVD 交换为例，每次借出或归还\
    \ DVD 时，都会创建一笔交易。多笔交易被分组到一个区块中。随着更多交易的进行，这些区块通过密码学方式链接在一起，形成了我们现在所说的区块链（见图 2-6）。\n\
    \n![](img/471881_2_En_2_Fig6_HTML.jpg)\n\n一张示意图解释了交易及其链接是如何形成区块链的。图中标记为 A 的人与发生交易的区块相连，随着交易增加，这些区块串联成链，从而形成区块链。交易内容包括\
    \ A 从 B 处借入 DVD、A 从 C 处借入 DVD，以及 B 从 A 处借入 DVD。\n\n**图 2-6** 交易形成区块，区块再串联成链\n\n\
    以下是一些要点的总结：\n\n-   当法律体系、政府、监管机构和人们之间存在信任时，中心化数据库和机构就能发挥作用。\n-   建立在区块链上的去中心化数据库消除了对中心化主体信任的需求。\n\
    -   区块链可用于任何有价值的事物，而不仅仅是货币。\n\n## 区块链的工作原理\n\n从宏观层面来看，区块链由多个区块组成。每个区块包含一组交易列表和一个时间戳（见图\
    \ 2-7）。\n\n![](img/471881_2_En_2_Fig7_HTML.jpg)\n\n一张示意图解释了区块链如何连接各个区块。它包括创世区块，并链接到区块\
    \ 2、区块 3 和区块 4。每个区块都包含交易列表和时间戳记录。\n\n**图 2-7** 每个区块链都有一个被称为创世区块的起始区块\n\n区块之间通过密码学方式相互连接，我将在后续章节中详细讨论其细节。区块链中的第一个区块被称为*创世*区块。\n\
    \n> **注意**  \n> 每个区块链都有一个创世区块。\n\n那么，下一个重要的问题是：如何将这些区块链接在一起呢？\n\n### 链接区块\n\n\
    要理解区块链中的区块是如何链接在一起的，你必须理解一个关键概念：*哈希*。\n\n> **提示**  \n> 第 1 章更详细地讨论了哈希。在继续本节之前，请务必先阅读该章节。\n\
    \n回忆一下，哈希函数是一种将任意大小的数据映射为固定大小数据的函数。通过改变原始字符串中的单个字符，得到的哈希值会与之前完全不同。最重要的是，请注意原始信息中的单一改变会导致完全不同的哈希值，这使得很难知道这两条原始信息是相似的。\n\
    \n哈希函数具有以下特征：\n\n-   **确定性**：相同的消息总是产生相同的哈希值。\n-   **单向过程**：当你对字符串进行哈希运算时，在计算上很难将哈希值逆向还原为原始消息。\n\
    -   **抗碰撞性**：很难找到两个不同的输入消息，其哈希值相同。\n\n现在，你已准备好学习区块链中的区块是如何链接在一起的。为了将区块链接起来，每个区块的内容会被哈希，然后存储在下一个区块中（见图\
    \ 2-8）。这样，如果某个区块中的任何交易被篡改，就会使当前区块的哈希值失效，该哈希值存储在下一个区块中，进而使下一个区块的哈希值失效，以此类推。\n\n\
    ![](img/471881_2_En_2_Fig8_HTML.jpg)\n\n一张示意图解释了区块链如何连接各个区块。它包括创世区块，并链接到区块 2、区块\
    \ 3 和区块 4。每个区块都包含交易列表、前一个区块的哈希值以及时间戳记录。\n\n**图 2-8** 使用哈希值链接区块\n\n请注意，在对区块内容进行哈希运算时，前一个区块的哈希值会与交易一起被哈希。但请注意，这是对区块内容的简化说明。稍后，你将深入了解区块的细节，并确切了解交易在区块中是如何表示的。\n\
    \n将前一个区块的哈希值存储在当前区块中，确保了前一个区块中交易的完整性。对区块内交易的任何修改都会导致下一个区块中的哈希值失效，并影响区块链中的后续区块。如果黑客想要修改一笔交易，他们不仅需要修改某个区块中的交易，还需要修改区块链中所有其他后续的区块。此外，他们还需要将这些更改同步到网络上的所有其他计算机，这是一项计算成本极高的任务。因此，存储在区块链中的数据是*不可篡改的*，因为一旦交易所在的区块被添加到区块链中，就极难更改。\n\
    \n此刻，你已经对区块链的样子有了相当清晰的认识。在现实世界中，区块链存储在多台计算机（称为节点）上，这些节点通常分布在全球各地（见图 2-9）。\n\n\
    ![](img/471881_2_En_2_Fig9_HTML.jpg)\n\n一张示意图解释了全球范围内相互连接的节点如何存储数据。6 个节点通过虚线相互连接。\n\
    \n**图 2-9** 区块链中区块的确认\n\n每个节点都以点对点的方式相互连接。存储整个区块链的节点被称为*全节点*。\n\n### 区块链的不可篡改性\n\
    \n在区块链中，每个区块通过使用密码学哈希值与其前一个区块链接。如果父区块的身份发生变化，当前区块的身份也会随之改变。这进而导致当前区块的子区块发生变化，并影响孙子区块，以此类推。对一个区块的更改会强制重新计算所有后续区块，这需要巨大的计算能力。这使得区块链具有不可篡改性，这是比特币和以太坊等加密货币的关键特征。\n\
    \n随着新区块被添加到区块链中，该交易区块被称为已被区块链*确认*。当一个区块被新添加时，它被认为有一个确认。随着另一个区块被添加到它之上，其确认数量会增加。图\
    \ 2-10 显示了区块链中各区块的确认数量。一个区块的确认次数越多，将其从区块链中移除就越困难。\n\n> **提示**  \n> 通常，一旦一个区块有六个或更多确认，它就被认为不可逆转。因此，存储在区块链中的数据是不可篡改的。\n\
    \n![](img/471881_2_En_2_Fig10_HTML.jpg)\n\n一张示意图解释了区块链如何连接各个区块以及确认数量如何增加。它包括创世区块，并链接到区块\
    \ 2、区块 3 和区块 4。每个区块都包含交易列表、前一个区块的哈希值以及时间戳记录。\n\n**图 2-10** 区块链中区块的确认\n"
- fmt: "### Consensus Protocols\n\nWhen a transaction is performed, the transaction\
    \ is broadcasted to the network to be collated into a block so that subsequently\
    \ the block can be added to the existing blockchain (see Figure [2-11](#471881_2_En_2_Chapter.xhtml#Fig11)).\n\
    \n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig11_HTML.jpg)\n\nAn illustration\
    \ explains how to add new blocks in the blockchain. It includes block 2, block\
    \ 3, and block 4. New Block is on the right. Each block has a list of transactions,\
    \ hash of previous blocks, and timestamp reports.\n\n*Figure 2-11 Adding a new\
    \ block to the blockchain*\n\nSo who actually collates the transactions? And since\
    \ there may be multiple transactions going on at the same time, who gets to add\
    \ the block to the blockchain? This is where *consensus protocols* (also known\
    \ as *consensus algorithms*) come in.\n\nA consensus protocol, as its name implies,\
    \ is a method for all the nodes in a blockchain to reach an agreement. Since transactions\
    \ are broadcasted to the network, there must be some sort of agreement among all\
    \ the nodes to decide which transactions go into each block. If not, the blockchain\
    \ would make no sense.\n\nIn the world of blockchain, there are quite a few consensus\
    \ protocols in use. Here are some of them:\n\n- Proof of Work (PoW)\n- Proof of\
    \ Stake (PoS)\n- Delegated Proof of Stake\n- Practical Byzantine Fault Tolerance\
    \ (pBFT)\n- Proof of Elapsed Time\n\nFor this chapter, I will only focus on the\
    \ first two consensus protocols stated above.\n\nBitcoin’s implementation of blockchain\
    \ uses Proof of Work. Ethereum initially used Proof of Work but transitioned in\
    \ September 2022 to a much more energy-efficient consensus protocol, Proof of\
    \ Stake.\n\n### Proof of Work\n\nIn PoW, nodes that collate all the transactions\
    \ are known as *mining nodes* (or *miner nodes*). When a transaction is performed,\
    \ the transaction is broadcasted to all mining nodes. Figure [2-12](#471881_2_En_2_Chapter.xhtml#Fig12)\
    \ shows four transactions created by different users on the network broadcasting\
    \ them to the various mining nodes.\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig12_HTML.jpg)\n\
    \nAn illustration describes how transactions broadcast to different mining codes.\
    \ Transaction 1, 2, 3, and 4 connects to the mining node 1, 2, and 3, then assemble\
    \ into blocks. Each block has transaction 1 as a common one.\n\n*Figure 2-12 Transactions\
    \ are broadcasted to mining nodes, which assemble them into blocks to be mined*\n\
    \nDue to network latency, each mining node may receive these transactions at different\
    \ timings. As a node receives transactions, it will try to include them in a block.\
    \ Observe that each node is free to include whatever transactions it wants in\
    \ a block. In practice, which transactions get included in a block depends on\
    \ several factors, such as transaction fees, transaction size, order of arrival,\
    \ and so on. The aim of the miner is to try to fill the block with transactions\
    \ so that it can proceed to the next step, which is adding the block to the blockchain.\n\
    \nAt this point, transactions that are included in a block but are not yet added\
    \ to the blockchain are known as *unconfirmed transactions*. Once a block is filled\
    \ with transactions, a mining node will attempt to add the block to the blockchain.\n\
    \nNow here comes the problem: with so many miners out there, who gets to add the\
    \ block to the blockchain first?\n\n#### The Mining Process\n\nTo slow down the\
    \ rate of adding blocks to the blockchain, the PoW consensus protocol dictates\
    \ a *network difficulty target* (see Figure [2-13](#471881_2_En_2_Chapter.xhtml#Fig13)).\n\
    \n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig13_HTML.jpg)\n\nA block diagram\
    \ explains the network difficulty target in block 2. Block 2 includes the network\
    \ difficulty target, hash of the previous block, transaction, and timestamp. It\
    \ is linked to the hash of the current block.\n\n*Figure 2-13 Hashing the block\
    \ to meet the network difficulty target*\n\nIn order to successfully add a block\
    \ to the blockchain, a miner hashes the content of a block and checks that the\
    \ hash meets the criteria set by the *difficulty target*. For example, the resultant\
    \ hash must start with five zeros and so on.\n\nAs more miners join the network,\
    \ the difficultly level increases. For example, the hash must now start with six\
    \ zeros and so on. This allows the blocks to be added to the blockchain at a consistent\
    \ rate.\n\n> **Note**  \n> For Bitcoin, the difficulty is adjusted every 2,016\
    \ blocks (or every 2 weeks approximately) so that the average time between each\
    \ block remains 10 minutes.\n\nBut wait a minute! The content of a block is fixed,\
    \ and so no matter how you hash it, the resultant hash is always the same. So\
    \ how do you ensure that the resultant hash can meet the difficulty target? To\
    \ do that, miners add a *nonce* to the block, which stands for *number used once*\
    \ (see Figure [2-14](#471881_2_En_2_Chapter.xhtml#Fig14)).\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig14_HTML.jpg)\n\
    \nA block diagram explains the network difficulty target in block 2 with an addition\
    \ of nonce to the block. Block 2 includes network difficulty target, nonce, a\
    \ hash of the previous block, transaction, and timestamp. It is linked to the\
    \ hash of the current block.\n\n*Figure 2-14 Adding a nonce to change the content\
    \ of the block in order to meet the network difficulty target*\n\nThe first miner\
    \ who meets the target gets to claim the reward and add the block to the blockchain.\
    \ They do so by broadcasting the block to other nodes so that they can verify\
    \ the claim and stop working on their current work of mining their own blocks.\
    \ These miners drop their current work, and the process of mining a new block\
    \ starts all over again. The transactions that were not included in the block\
    \ that was successfully mined are added to the next block to be mined.\n\n> **REWARDS\
    \ FOR MINERS**  \n> In the case of Bitcoin, the block reward initially was 50\
    \ BTC and halved every 210,000 blocks. At the time of writing, the block reward\
    \ is currently at 6.25 BTC, and it will eventually be reduced to 0 after 64 halving\
    \ events. For Ethereum, prior to the Merge, the reward for mining a block is 2\
    \ ETH (Ether). After the Merge, the rewards are slightly more complicated. You\
    \ can visit [`https://ethereum.org/en/developers/docs/consensus-mechanisms/pos/rewards-and-penalties/`](https://ethereum.org/en/developers/docs/consensus-mechanisms/pos/rewards-and-penalties/)\
    \ for more details.\n\n> **BLOCKS ADDING RATES**  \n> For Bitcoin, the network\
    \ adjusts the difficulty of the puzzles so that a new block is mined roughly every\
    \ 10 minutes. For Ethereum using PoW, a block is mined approximately every 14\
    \ seconds.\n\nWhy is this process called Proof of Work? Well, because it takes\
    \ a lot of work to find the proof! It is difficult to find the proof but easy\
    \ to validate the proof. A good example of PoW is cracking a combination lock.\
    \ It takes a lot of time to find the right combination, but it is easy to verify\
    \ once the combination is found.\n\n> **DOUBLE-SPENDING**"
  raw: '### Consensus Protocols


    When a transaction is performed, the transaction is broadcasted to the network
    to be collated into a block so that subsequently the block can be added to the
    existing blockchain (see Figure [2-11](#471881_2_En_2_Chapter.xhtml#Fig11)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig11_HTML.jpg)


    An illustration explains how to add new blocks in the blockchain. It includes
    block 2, block 3, and block 4\. New Block is on the right. Each block has a list
    of transactions, hash of previous blocks, and timestamp reports.


    Figure 2-11


    Adding a new block to the blockchain


    So who actually collates the transactions? And since there may be multiple transactions
    going on at the same time, who gets to add the block to the blockchain? This is
    where *consensus protocols* (also known as *consensus algorithms*) come in.


    A consensus protocol, as its name implies, is a method for all the nodes in a
    blockchain to reach an agreement. Since transactions are broadcasted to the network,
    there must be some sort of agreement among all the nodes to decide which transactions
    go into each block. If not, the blockchain would make no sense.


    In the world of blockchain, there are quite a few consensus protocols in use.
    Here are some of them:


    *   Proof of Work (PoW)


    *   Proof of Stake (PoS)


    *   Delegated Proof of Stake


    *   Practical Byzantine Fault Tolerance (pBFT)


    *   Proof of Elapsed Time


    For this chapter, I will only focus on the first two consensus protocols stated
    above.


    Bitcoin’s implementation of blockchain uses Proof of Work. Ethereum initially
    used Proof of Work but transitioned in September 2022 to a much more energy-efficient
    consensus protocol, Proof of Stake.


    ### Proof of Work


    In PoW, nodes that collate all the transactions are known as *mining nodes* (or
    *miner nodes)*. When a transaction is performed, the transaction is broadcasted
    to all mining nodes. Figure [2-12](#471881_2_En_2_Chapter.xhtml#Fig12) shows four
    transactions created by different users on the network broadcasting them to the
    various mining nodes.


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig12_HTML.jpg)


    An illustration describes how transactions broadcast to different mining codes.
    Transaction 1, 2, 3, and 4 connects to the mining node 1, 2, and 3, then assemble
    into blocks. Each block has transaction 1 as a common one.


    Figure 2-12


    Transactions are broadcasted to mining nodes, which assemble them into blocks
    to be mined


    Due to network latency, each mining node may receive these transactions at different
    timings. As a node receives transactions, it will try to include them in a block.
    Observe that each node is free to include whatever transactions it wants in a
    block. In practice, which transactions get included in a block depends on several
    factors, such as transaction fees, transaction size, order of arrival, and so
    on. The aim of the miner is to try to fill the block with transactions so that
    it can proceed to the next step, which is adding the block to the blockchain.


    At this point, transactions that are included in a block but are not yet added
    to the blockchain are known as *unconfirmed transactions*. Once a block is filled
    with transactions, a mining node will attempt to add the block to the blockchain.


    Now here comes the problem: with so many miners out there, who gets to add the
    block to the blockchain first?


    #### The Mining Process


    To slow down the rate of adding blocks to the blockchain, the PoW consensus protocol
    dictates a *network difficulty target* (see Figure [2-13](#471881_2_En_2_Chapter.xhtml#Fig13)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig13_HTML.jpg)


    A block diagram explains the network difficulty target in block 2. Block 2 includes
    the network difficulty target, hash of the previous block, transaction, and timestamp.
    It is linked to the hash of the current block.


    Figure 2-13


    Hashing the block to meet the network difficulty target


    In order to successfully add a block to the blockchain, a miner hashes the content
    of a block and checks that the hash meets the criteria set by the *difficulty
    target*. For example, the resultant hash must start with five zeros and so on.


    As more miners join the network, the difficultly level increases. For example,
    the hash must now start with six zeros and so on. This allows the blocks to be
    added to the blockchain at a consistent rate.


    Note


    For Bitcoin, the difficulty is adjusted every 2,016 blocks (or every 2 weeks approximately)
    so that the average time between each block remains 10 minutes.


    But wait a minute! The content of a block is fixed, and so no matter how you hash
    it, the resultant hash is always the same. So how do you ensure that the resultant
    hash can meet the difficulty target? To do that, miners add a *nonce* to the block,
    which stands for *number used once* (see Figure [2-14](#471881_2_En_2_Chapter.xhtml#Fig14)).


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig14_HTML.jpg)


    A block diagram explains the network difficulty target in block 2 with an addition
    of nonce to the block. Block 2 includes network difficulty target, nonce, a hash
    of the previous block, transaction, and timestamp. It is linked to the hash of
    the current block.


    Figure 2-14


    Adding a nonce to change the content of the block in order to meet the network
    difficulty target


    The first miner who meets the target gets to claim the reward and add the block
    to the blockchain. They do so by broadcasting the block to other nodes so that
    they can verify the claim and stop working on their current work of mining their
    own blocks. These miners drop their current work, and the process of mining a
    new block starts all over again. The transactions that were not included in the
    block that was successfully mined are added to the next block to be mined.


    REWARDS FOR MINERS


    In the case of Bitcoin, the block reward initially was 50 BTC and halved every
    210,000 blocks. At the time of writing, the block reward is currently at 6.25
    BTC, and it will eventually be reduced to 0 after 64 halving events. For Ethereum,
    prior to the Merge, the reward for mining a block is 2 ETH (Ether). After the
    Merge, the rewards are slightly more complicated. You can visit [`https://ethereum.org/en/developers/docs/consensus-mechanisms/pos/rewards-and-penalties/`](https://ethereum.org/en/developers/docs/consensus-mechanisms/pos/rewards-and-penalties/)
    for more details.


    BLOCKS ADDING RATES


    For Bitcoin, the network adjusts the difficulty of the puzzles so that a new block
    is mined roughly every 10 minutes. For Ethereum using PoW, a block is mined approximately
    every 14 seconds.


    Why is this process called Proof of Work? Well, because it takes a lot of work
    to find the proof! It is difficult to find the proof but easy to validate the
    proof. A good example of PoW is cracking a combination lock. It takes a lot of
    time to find the right combination, but it is easy to verify once the combination
    is found.


    DOUBLE-SPENDING'
  trans: "\n### 共识协议\n\n当一笔交易发生时，该交易会被广播到网络中，以便整理成一个区块，随后该区块可以添加到现有的区块链上（见图 2-11）。\n\
    \n![](img/471881_2_En_2_Fig11_HTML.jpg)\n\n一张示意图解释了如何在区块链中添加新区块。图中包含区块 2、区块 3\
    \ 和区块 4。右侧是新区块。每个区块都包含一个交易列表、前一个区块的哈希值以及时间戳报告。\n\n*图 2-11 向区块链中添加新区块*\n\n那么，究竟由谁来整理这些交易呢？而且，由于可能同时发生多笔交易，又由谁来负责将区块添加到区块链上呢？这就涉及了*共识协议*（也称为*共识算法*）。\n\
    \n顾名思义，共识协议是一种让区块链中所有节点达成一致的方法。由于交易被广播到网络中，所有节点之间必须达成某种共识，以决定哪些交易应该被包含进每个区块。否则，区块链将毫无意义。\n\
    \n在区块链世界中，存在着多种共识协议。以下列出其中几种：\n\n- 工作量证明\n- 权益证明\n- 委托权益证明\n- 实用拜占庭容错\n- 经过时间证明\n\
    \n在本章中，我将只重点介绍上述前两种共识协议。\n\n比特币的区块链实现使用了工作量证明。以太坊最初也使用工作量证明，但在 2022 年 9 月转换到了一种能效高得多的共识协议——权益证明。\n\
    \n### 工作量证明\n\n在 PoW 中，负责整理所有交易的节点被称为*挖矿节点*（或*矿工节点*）。当一笔交易发生时，该交易会被广播到所有挖矿节点。图\
    \ 2-12 展示了网络中不同用户创建的四笔交易被广播到各个挖矿节点的过程。\n\n![](img/471881_2_En_2_Fig12_HTML.jpg)\n\
    \n一张示意图描述了交易如何广播到不同的挖矿节点。交易 1、2、3 和 4 连接到挖矿节点 1、2 和 3，然后被组装成区块。每个区块都包含交易 1 作为公共交易。\n\
    \n*图 2-12 交易被广播到挖矿节点，这些节点将它们组装成待挖矿的区块*\n\n由于网络延迟，每个挖矿节点可能在不同的时间接收到这些交易。当一个节点接收到交易时，它会尝试将它们包含在一个区块中。请注意，每个节点可以自由选择将任何交易包含进区块。在实践中，哪些交易被包含进区块取决于几个因素，例如交易费用、交易大小、到达顺序等等。矿工的目标是尝试用交易填满区块，以便进入下一步，即将区块添加到区块链上。\n\
    \n此时，那些被包含在区块中但尚未添加到区块链上的交易被称为*未确认交易*。一旦区块被交易填满，挖矿节点就会尝试将该区块添加到区块链。\n\n现在问题来了：面对如此多的矿工，谁才能率先将区块添加到区块链上呢？\n\
    \n#### 挖矿过程\n\n为了减缓向区块链添加区块的速度，PoW 共识协议规定了一个*网络难度目标*（见图 2-13）。\n\n![](img/471881_2_En_2_Fig13_HTML.jpg)\n\
    \n一个区块图解释了区块 2 中的网络难度目标。区块 2 包含网络难度目标、前一个区块的哈希值、交易和时间戳。它链接到当前区块的哈希值。\n\n*图 2-13\
    \ 对区块进行哈希运算以满足网络难度目标*\n\n为了成功地将一个区块添加到区块链，矿工需要对区块内容进行哈希运算，并检查该哈希值是否满足*难度目标*设定的标准。例如，得到的哈希值必须以五个零开头，等等。\n\
    \n随着更多矿工加入网络，难度级别会提高。例如，哈希值现在必须以六个零开头，等等。这使得区块能够以一致的速度被添加到区块链。\n\n> **注意**  \n\
    > 对于比特币，难度每 2,016 个区块（大约每两周）调整一次，以便每个区块之间的平均时间保持在 10 分钟。\n\n但是等等！区块的内容是固定的，因此无论你如何对其进行哈希运算，得到的哈希值总是相同的。那么，如何确保得到的哈希值能够满足难度目标呢？为此，矿工向区块中添加一个\
    \ *nonce*，它代表*只使用一次的数字*（见图 2-14）。\n\n![](img/471881_2_En_2_Fig14_HTML.jpg)\n\n\
    一个区块图解释了在区块 2 中添加 nonce 后的网络难度目标。区块 2 包含网络难度目标、nonce、前一个区块的哈希值、交易和时间戳。它链接到当前区块的哈希值。\n\
    \n*图 2-14 添加 nonce 以改变区块内容，从而满足网络难度目标*\n\n第一个达成目标的矿工将获得奖励，并将该区块添加到区块链。他们通过将区块广播给其他节点来实现这一点，以便这些节点能够验证该声明并停止当前挖矿工作。这些矿工会放弃当前的工作，然后重新开始挖掘新区块的过程。那些未被成功挖掘的区块包含的交易将被添加到下一个待挖掘的区块中。\n\
    \n> **矿工奖励**  \n> 以比特币为例，区块奖励最初为 50 BTC，并且每 210,000 个区块减半。在撰写本文时，区块奖励为 6.25 BTC，并将在经历\
    \ 64 次减半事件后最终降至 0。对于以太坊，在合并之前，挖掘一个区块的奖励是 2 ETH（以太币）。合并之后，奖励机制稍微复杂一些。你可以访问 [`https://ethereum.org/en/developers/docs/consensus-mechanisms/pos/rewards-and-penalties/`](https://ethereum.org/en/developers/docs/consensus-mechanisms/pos/rewards-and-penalties/)\
    \ 了解更多详情。\n\n> **区块添加速率**  \n> 对于比特币，网络会调整谜题的难度，使得大约每 10 分钟挖掘出一个新区块。对于使用 PoW 的以太坊，大约每\
    \ 14 秒挖掘出一个区块。\n\n为什么这个过程被称为工作量证明呢？原因在于，要找到这个证明需要耗费大量的工作！找到证明很困难，但验证证明却很容易。PoW\
    \ 的一个典型例子是破解密码锁。找到正确的密码组合需要花费大量时间，但一旦找到组合，验证起来就非常简单了。\n\n> **双重支付**\n"
- fmt: "# Double-Spending 问题\n\n`Double-spending`是一个问题，当您试图花费同一加密货币两次时就会出现。`Double-spending`在处理法定货币时并不是问题。您手中的`$100`钞票不可能同时出现在另一个地方。然而，在加密世界中，这是一个潜在的问题。假设您的钱包中有`1\
    \ Bitcoin`，您将其发送给一位朋友。紧接着在此交易被确认之前，您又将同一`Bitcoin`发送给另一位朋友。本质上，您是在试图花费同一`Bitcoin`两次。幸运的是，由于共识协议的存在，矿工能够确保第二笔交易无效，因为您已经在之前的交易中花掉了它。\n\
    \n# 工作量证明（PoW）\n\n`PoW`消耗了巨大的计算资源。需要`GPU`（以及一些区块链的`ASIC`，即专用集成电路），而`CPU`速度并不重要。它还消耗大量电力，因为矿工们反复做同样的工作，即寻找`nonce`以使区块满足网络难度。\n\
    \n一个常见的问题是，为什么挖矿需要使用强大的`GPU`而不是`CPU`。简单比较一下：一个`CPU`内核每个时钟周期可以执行`4`条`32`位指令，而像`Radeon\
    \ HD 5970`这样的`GPU`每个时钟周期可以执行`3200`条`32`位指令。简而言之，`CPU`擅长对少量数据进行复杂操作，而`GPU`擅长对大量数据进行简单操作。由于挖矿完全是执行哈希运算和寻找`nonce`，这是一项高度重复的任务，正是`GPU`所擅长的。\n\
    \n> **提示**\n> \n> 当矿工成功挖出一个区块时，他们会获得挖矿奖励以及交易手续费。这激励着矿工投资于挖矿设备并使其全天候运行，从而产生高昂的电费账单。\n\
    \n# 权益证明（PoS）\n\n鉴于近期对可持续性的关注，如果区块链要成为去中心化解决方案的长期技术，`PoW`绝对不是可行之道。因此，许多新的区块链实现正在使用其他共识协议。特别是，`Ethereum`已从使用`PoW`迁移到一种名为`权益证明（PoS）`的新协议。\n\
    \n在`PoS`中，以前所谓的矿工现在被称为*验证者*。这些验证者铸造（或锻造）新区块。要成为验证者，一个节点必须质押（因此得名`权益证明`）至少`32 Ethers`。质押的`Ethers`数量将影响该节点被选为下一个验证者以铸造下一个区块的机会。\n\
    \n当一个节点成为验证者后，它将执行与矿工相同的任务：验证区块中的所有交易以确保其有效。当一切检查通过后，验证者签署该区块，将其添加到区块链，然后在整个网络中同步区块链。该验证者从其铸造的区块中获得交易手续费。\n\
    \n与`PoW`中每个矿工都在做相同工作相比，`PoS`看起来更高效，因为只需要一个验证者。但这引出了另一个问题：如果验证者不可信，并故意允许欺诈性交易被添加到区块中，该怎么办？这就是验证者所质押的权益发挥作用的地方。如果之后发现验证者允许了欺诈性交易被添加到区块中，验证者将失去其部分质押权益。只要质押金额高于验证者能赚取的交易手续费，我们就可以相信验证者会正确履行职责。如果验证者未能妥善履行职责，他们将损失超过收益的部分。\n\
    \n当验证者不再担任此角色时，所有交易手续费及其质押权益将在稍后日期返还给他们。这给了网络时间来惩罚验证者，以防后来发现某些铸造的区块是欺诈性的。\n\n\
    ## PoW与PoS的比较\n\n现在您了解了`PoS`的工作原理，将其与`PoW`进行快速比较会很有帮助：\n\n- 在`PoW`中，每个矿工节点都在挖矿！而在`PoS`中，只有被选中的节点才能锻造新区块。\n\
    - `PoS`更加去中心化。`PoW`利用矿池，人们联合起来以增加挖到新区块的机会。这些矿池控制着区块链（如`Bitcoin`）的很大一部分，这是危险的。如果所有大型矿池合并，它们就可以开始批准欺诈性交易。\n\
    - 与`PoW`不同，`PoS`更容易锻造新区块，且不需要昂贵的硬件。这鼓励了更多验证者参与，从而增加了网络的安全性。\n- `PoS`也是环保的，比`PoW`消耗的能量少得多。\n\
    \n# 更详细的区块链\n\n在前一节中，您了解到一个区块包含`nonce`、时间戳以及交易列表。那是一个简化版本。在实际实现中，一个区块由以下部分组成：\n\
    \n- 区块头\n- 交易列表\n\n区块头又由以下部分组成：\n\n- 前一个区块的哈希\n- 时间戳\n- `Merkle`根\n- `nonce`\n\
    - 网络难度目标\n\n注意，区块头包含的是*`Merkle`根*，而不是交易（参见图`[2-15]`）。交易被整体表示为`Merkle`根，其细节将在接下来的几节中讨论。\n\
    \n```\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig15_HTML.jpg)\n```\n\n\
    一个区块图包含以下区块：创世区块，链接到区块`2`、区块`3`和区块`4`。每个区块都有一个交易列表、前一个区块的哈希、时间戳报告、`nonce`、`Merkle`根和难度目标。\n\
    \n**图 2-15**\n\n一个区块包含区块头，区块头中又包含交易的`Merkle`根"
  raw: 'Double-spending is a problem that arises when you try to spend the same cryptocurrency
    twice. Double-spending is not a problem when dealing with fiat-currency. Your
    $100 bill in your hand can not be at another place at the same time. However,
    it is a potential problem in the crypto world. Suppose you have 1 Bitcoin in your
    wallet, and you send it to a friend. Immediately after this and before the transaction
    is confirmed, you send the same Bitcoin to another friend. Essentially, you are
    trying to spend the same Bitcoin twice. Fortunately, with the consensus protocol
    in place, miners are able to ensure that the second transaction is not valid because
    you already spent it in an earlier transaction.


    PoW uses tremendous computing resources. GPUs are required (as well as ASICs,
    application-specific integrated circuits, for some blockchains), while CPU speed
    is not important. It also uses a lot of electricity, because miners are doing
    the same work repeatedly, that of finding the nonce to meet the network difficulty
    for the block.


    A common question is why you need to use a powerful GPU instead of CPU for mining.
    Well, as a simple comparison, a CPU core can execute 4 32-bit instructions per
    clock, whereas a GPU like the Radeon HD 5970 can execute 3200 32-bit instructions
    per clock. In short, the CPU excels at doing complex manipulations to a small
    set of data, whereas the GPU excels at doing simple manipulations to a large set
    of data. And since mining is all about performing hashing and finding the nonce,
    it is a highly repetitive task, something that the GPU excels in.


    Tip


    When a miner has successfully mined a block, they earn mining fees as well as
    transaction fees. That’s what keeps miners motivated to invest in mining rigs
    and keep them running 24/7, thereby incurring substantial electricity bills.


    ### Proof of Stake (PoS)


    With the recent focus on sustainability, PoW is definitely not the way to go if
    blockchain is to become a long term technology for decentralized solutions. For
    this reason, a lot of new blockchain implementations are now using other consensus
    protocols. In particular, Ethereum has migrated from using PoW to a newer protocol
    called Proof of Stake (PoS).


    In PoS, what used to be called miners are now known as *validators*. These validators
    mint (or forge) new blocks. To become a validator, a node must stake (hence its
    name Proof of Stake) at least 32 Ethers. The size of Ethers staked will affect
    the chance of a node being selected to be the next validator to mint the next
    block.


    When a node becomes a validator, it will perform the same tasks that miners do:
    validate all the transactions in the block to ensure that they are valid. When
    everything checks out, the validator signs off the block, adds it to the blockchain,
    and then synchronize the blockchain across the network. This validator receive
    the transaction fees from the block they minted.


    Compared with PoW where every miner is doing the same work, PoS seems to be more
    efficient because only one validator is required. But this raises another issue:
    what happens if the validator is not trustworthy and purposely allowed fraudulent
    transactions to be added to a block? This is where the stake that the validator
    has placed comes in. If it is later found that the validator has allowed fraudulent
    transactions to be added to the block, the validator will lose a part of his stake.
    As long as the stake is higher than the transaction fees that the validator can
    earn, we can trust that the validator will do their job correctly. If the validator
    does not do their job properly, they will lose more than they gain.


    When the validator ceases to be one, all transaction fees plus their stake are
    released back to them at a later date. This gives the network time to punish the
    validator in the event that some of the minted blocks were later found to be fraudulent.


    #### Comparing PoW with PoS


    Now that you understand how PoS works, it is useful to do a quick comparison with
    PoW:


    *   In PoW, every miner node mines! In PoS, only a selected node gets to forge
    new blocks.


    *   PoS is more decentralized. PoW utilizes mining pools where people team up
    to increase their chances of mining new blocks. These pools control large portions
    of the blockchain (such as Bitcoin) and this is dangerous. If all the large mining
    pools merge, they can start approving fraudulent transactions.


    *   PoS makes easier to forge a new block and doesn''t need expensive hardware,
    unlike PoW. This encourages more validators and hence increases the security of
    the network.


    *   PoS is also environmentally friendly, consuming much less energy than PoW.


    ## Blockchain in More Detail


    In the previous section, you learned that a block contains a nonce, timestamp,
    and the list of transactions. That was a simplification. In a real implementation,
    a block consists of


    *   A block header


    *   The list of transactions


    The block header in turn consists of the following:


    *   The hash of the previous block


    *   A timestamp


    *   The Merkle root


    *   A nonce


    *   The network difficulty target


    Note that the block header contains the *Merkle root* and not the transactions
    (see Figure [2-15](#471881_2_En_2_Chapter.xhtml#Fig15)). The transactions are
    collectively represented as a Merkle root, the details of which will be discussed
    in the next few sections.


    ![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig15_HTML.jpg)


    A block diagram contains the following blocks. Genesis block, linked to block
    2, block 3, and block 4\. Each block has a list of transactions, hash of previous
    blocks, timestamp reports, nonce, Merkle root, and difficulty target.


    Figure 2-15


    A block contains the block header, which in turns contains the Merkle root of
    the transactions'
  trans: "\n# 双花问题\n\n`双花`是一个问题，当您试图花费同一加密货币两次时就会出现。`双花`在处理法定货币时并不是问题。您手中的`100 美元`钞票不可能同时出现在另一个地方。然而，在加密世界中，这是一个潜在的问题。假设您的钱包中有`1\
    \ 个比特币`，您将其发送给一位朋友。紧接着在此交易被确认之前，您又将同一`比特币`发送给另一位朋友。本质上，您是在试图花费同一`比特币`两次。幸运的是，由于共识协议的存在，矿工能够确保第二笔交易无效，因为您已经在之前的交易中花掉了它。\n\
    \n# 工作量证明（PoW）\n\n`PoW`消耗了巨大的计算资源。需要`GPU`（以及一些区块链的`ASIC`，即专用集成电路），而`CPU`速度并不重要。它还消耗大量电力，因为矿工们反复做同样的工作，即寻找`nonce`以使区块满足网络难度。\n\
    \n一个常见的问题是，为什么挖矿需要使用强大的`GPU`而不是`CPU`。简单比较一下：一个`CPU`内核每个时钟周期可以执行`4`条`32`位指令，而像`Radeon\
    \ HD 5970`这样的`GPU`每个时钟周期可以执行`3200`条`32`位指令。简而言之，`CPU`擅长对少量数据进行复杂操作，而`GPU`擅长对大量数据进行简单操作。由于挖矿完全是执行哈希运算和寻找`nonce`，这是一项高度重复的任务，正是`GPU`所擅长的。\n\
    \n> **提示**\n> \n> 当矿工成功挖出一个区块时，他们会获得挖矿奖励以及交易手续费。这激励着矿工投资于挖矿设备并使其全天候运行，从而产生高昂的电费账单。\n\
    \n# 权益证明（PoS）\n\n鉴于近期对可持续性的关注，如果区块链要成为去中心化解决方案的长期技术，`PoW`绝对不是可行之道。因此，许多新的区块链实现正在使用其他共识协议。特别是，`以太坊`已从使用`PoW`迁移到一种名为`权益证明（PoS）`的新协议。\n\
    \n在`PoS`中，以前所谓的矿工现在被称为*验证者*。这些验证者铸造（或锻造）新区块。要成为验证者，一个节点必须质押（因此得名`权益证明`）至少`32 个以太币`。质押的`以太币`数量将影响该节点被选为下一个验证者以铸造下一个区块的机会。\n\
    \n当一个节点成为验证者后，它将执行与矿工相同的任务：验证区块中的所有交易以确保其有效。当一切检查通过后，验证者签署该区块，将其添加到区块链，然后在整个网络中同步区块链。该验证者从其铸造的区块中获得交易手续费。\n\
    \n与`PoW`中每个矿工都在做相同工作相比，`PoS`看起来更高效，因为只需要一个验证者。但这引出了另一个问题：如果验证者不可信，并故意允许欺诈性交易被添加到区块中，该怎么办？这就是验证者所质押的权益发挥作用的地方。如果之后发现验证者允许了欺诈性交易被添加到区块中，验证者将失去其部分质押权益。只要质押金额高于验证者能赚取的交易手续费，我们就可以相信验证者会正确履行职责。如果验证者未能妥善履行职责，他们将损失超过收益的部分。\n\
    \n当验证者不再担任此角色时，所有交易手续费及其质押权益将在稍后日期返还给他们。这给了网络时间来惩罚验证者，以防后来发现某些铸造的区块是欺诈性的。\n\n\
    ## PoW 与 PoS 的比较\n\n现在您了解了`PoS`的工作原理，将其与`PoW`进行快速比较会很有帮助：\n\n- 在`PoW`中，每个矿工节点都在挖矿！而在`PoS`中，只有被选中的节点才能锻造新区块。\n\
    - `PoS`更加去中心化。`PoW`利用矿池，人们联合起来以增加挖到新区块的机会。这些矿池控制着区块链（如`比特币`）的很大一部分，这是危险的。如果所有大型矿池合并，它们就可以开始批准欺诈性交易。\n\
    - 与`PoW`不同，`PoS`更容易锻造新区块，且不需要昂贵的硬件。这鼓励了更多验证者参与，从而增加了网络的安全性。\n- `PoS`也是环保的，比`PoW`消耗的能量少得多。\n\
    \n# 更详细的区块链\n\n在前一节中，您了解到一个区块包含`nonce`、时间戳以及交易列表。那是一个简化版本。在实际实现中，一个区块由以下部分组成：\n\
    \n- 区块头\n- 交易列表\n\n区块头又由以下部分组成：\n\n- 前一个区块的哈希\n- 时间戳\n- `默克尔`根\n- `nonce`\n- 网络难度目标\n\
    \n注意，区块头包含的是*`默克尔`根*，而不是交易（参见图`[2-15]`）。交易被整体表示为`默克尔`根，其细节将在接下来的几节中讨论。\n\n```\n\
    ![](img/471881_2_En_2_Fig15_HTML.jpg)\n```\n\n一个区块图包含以下区块：创世区块，链接到区块`2`、区块`3`和区块`4`。每个区块都有一个交易列表、前一个区块的哈希、时间戳报告、`nonce`、`默克尔`根和难度目标。\n\
    \n**图 2-15**\n\n一个区块包含区块头，区块头中又包含交易的`默克尔`根\n"
- fmt: "### Types of Nodes\n\nBefore I address the rationale for storing the Merkle\
    \ root in the block header, I need to talk about the types of nodes in a blockchain\
    \ network. Figure [2-16](#471881_2_En_2_Chapter.xhtml#Fig16) shows the different\
    \ types of nodes in a blockchain network.\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig16_HTML.jpg)\n\
    \nA diagram has different types of nodes in the blockchain network. They are the\
    \ full node, mining node, and desktop wallet node. Desktop wallet node linked\
    \ to a mobile wallet and light node.\n\nFigure 2-16\n\nDifferent types of nodes\
    \ in a blockchain network\n\nAs mentioned, computers connected to the blockchain\
    \ network are known as nodes. I have discussed the role of mining/validator nodes,\
    \ whose key responsibility is to gather transactions into blocks and then try\
    \ to add the block to the blockchain. Mining/validator nodes are also known as\
    \ *full nodes*.\n\n> **Tip:** Full nodes are not necessarily mining/validator\
    \ nodes. However, a mining/validator node needs to be a full node.\n\nThe purpose\
    \ of a full node is to ensure the integrity of the blockchain, and people running\
    \ full nodes do not get rewards. On the other hand, mining/validator nodes are\
    \ rewarded when they add a block to the blockchain.\n\nAn example of a full node\
    \ is a desktop wallet, which allows users to perform transactions using the cryptocurrency.\n\
    \nEach full node has a copy of the entire blockchain. Full nodes also validate\
    \ every block and transactions presented to it.\n\nBesides full nodes, there are\
    \ also *light nodes*. Light nodes help to verify transactions using a method called\
    \ *simplified payment verification* (SPV). SPV allows a node to verify if a transaction\
    \ has been included in a block, without needing to download the entire blockchain.\
    \ Using SPV, light nodes connect to full nodes and transmit transactions to the\
    \ full nodes for verifications.\n\nLight nodes only need to store the block headers\
    \ of all the blocks in the blockchain. An example of a light node is a mobile\
    \ wallet, such as the Coinbase mobile app for iOS and Android. Using a mobile\
    \ wallet, a user can perform transactions on the mobile device.\n\n> **Note:**\
    \ Desktop wallets can be full node or light node.\n\nHere is a summary of the\
    \ types of nodes discussed thus far.\n\n*   **Full node:**\n    *   Maintains\
    \ a complete copy of the blockchain\n    *   Able to verify all transactions since\
    \ the beginning\n    *   Verifies a newly created block and adds it to the blockchain\n\
    \    *   Visit the following sites to see the current number of full nodes for\
    \ the following blockchains:\n        *   Bitcoin: [`https://bitnodes.earn.com`](https://bitnodes.earn.com)\n\
    \        *   Ethereum: [`www.ethernodes.org/network/1`](http://www.ethernodes.org/network/1)\n\
    *   **Mining node** (must be a full node):\n    *   Works on a problem (finding\
    \ the nonce)\n*   **Light node** (e.g., wallets):\n    *   Maintains the headers\
    \ of the blockchain\n    *   Uses SPV to verify if a transaction is present and\
    \ valid in a block\n\nFinally, you’ll see the use of representing the transactions\
    \ as a Merkle root in the block header in the next section.\n\n### Merkle Tree\
    \ and Merkle Root\n\nThe list of transactions in a block is stored as a *Merkle\
    \ tree*. A Merkle tree is a tree data structure in which every leaf node is the\
    \ hash of a transaction and every non-leaf node is the cryptographic hash of the\
    \ child nodes. Figure [2-17](#471881_2_En_2_Chapter.xhtml#Fig17) shows how the\
    \ Merkle root is derived from the transactions.\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig17_HTML.png)\n\
    \nA tree diagram explains how Merkle roots are derived. Merkle root derives into\
    \ `H` subscript `A B C D E E E E`, then divides into `H` subscript `A B C D` and\
    \ `H` subscript `E E E E`. Further, it ends with transaction A, transaction B,\
    \ transaction C, transaction D, and transaction E.\n\nFigure 2-17\n\nHow the Merkle\
    \ root is derived from the Merkle tree\n\nAs you can see, each transaction is\
    \ hashed. The hash of each transaction is hashed together with the hash of another\
    \ node. For example, the hash of transaction A (`H[A]`) is combined with the hash\
    \ of transaction B (`H[B]`) and hashed to derive `H[AB]`. This process is repeated\
    \ until there’s only one resultant hash. This final hash is known as the Merkle\
    \ root. In this example, because `H[E]` doesn’t have another node to pair with,\
    \ it’s hashed with itself. The same applies to `H[EE]`.\n\nThe Merkle root is\
    \ stored in the block header, and the rest of the transactions are stored in the\
    \ block as a Merkle tree. In earlier discussion, I mentioned full nodes. Full\
    \ nodes download the entire blockchain. There’s another type of node (known as\
    \ a *light node*) that downloads only the blockchain headers. Because light nodes\
    \ don’t download the entire blockchain, they’re easier to maintain and run. Using\
    \ a method called *simplified payment verifications* (SPV), a light node can query\
    \ a full node to verify a transaction. Examples of light nodes are cryptographic\
    \ wallets.\n\n### Uses of Merkle Tree and the Merkle Root\n\nBy storing the Merkle\
    \ root in the block header and the transactions as a Merkle tree in the block,\
    \ a light node can easily verify if a transaction belongs to a particular block.\
    \ This is how it works. Suppose a light node wants to verify that transaction\
    \ C exists in a particular block.\n\n*   The light node queries a full node for\
    \ the following hashes: `H[D]`, `H[AB]`, and `H[EEEE]` (see Figure [2-18](#471881_2_En_2_Chapter.xhtml#Fig18)).\n\
    *   Because the light node can compute `H[C]`, it can then compute `H[CD]` with\
    \ `H[D]` supplied.\n*   With `H[AB]` supplied, it can now compute `H[ABCD]`.\n\
    *   With `H[EEEE]` supplied, it can now compute `H[ABCDEEEE]` (which is the Merkle\
    \ root).\n*   Because the light node has the Merkle root of the block, it can\
    \ now check to see if the two Merkle roots match. If they match, the transaction\
    \ is verified.\n\nAs you can see from this simple example, to verify a single\
    \ transaction out of five transactions, only three hashes need to be retrieved\
    \ from the full node. Mathematically, for `n` transactions in a block, it takes\
    \ `log2[n]` hashes to verify that a transaction is in a block. For example, if\
    \ there are 1,024 transactions in a block, a light node only needs to request\
    \ 10 hashes to verify the existence of a transaction in the block.\n\n![](images/471881_2_En_2_Chapter/471881_2_En_2_Fig18_HTML.jpg)\n\
    \nA tree diagram explains the transaction from the Merkle root. Block header is\
    \ `H` subscript `A B C D E E E E`, the blocks such as `H` subscript `A B C D`,\
    \ `H` subscript `E E E E`, `H` subscript `A`, `H` subscript `B`, `H` subscript\
    \ `C`, `H` subscript `D`, `H` subscript `E` belongs to block section.\n\nFigure\
    \ 2-18\n\nHow the Merkle tree and Merkle root are used to validate a transaction\n\
    \n## Summary\n\nIn this chapter, you learned the motivations behind blockchain\
    \ and the problems that it aims to solve. You explored how blocks are added to\
    \ the blockchain through a process known as mining. In the next chapter, you will\
    \ learn how to build your own blockchain using Python so that you can see and\
    \ understand the inner workings of a blockchain.\n\n# 3. Implementing Your Own\
    \ Blockchain Using Python\n\nIn the previous chapter, you learned about the basics\
    \ of blockchain, the motivations behind blockchains, how transactions are added\
    \ to blocks, and how blocks are added to the previous blocks to form a chain of\
    \ blocks called a blockchain. A good way to understand all these concepts is to\
    \ build one yourself. Implementing your own blockchain offers you a more detailed\
    \ look at how concepts like *transactions*, *mining*, and *consensus* work.\n\n\
    Obviously, implementing a full blockchain is not for the faint of heart, and that\
    \ is definitely not your goal in this chapter. What you will try to do in this\
    \ chapter is implement a conceptual blockchain using Python and use it to illustrate\
    \ the key concepts."
