    ,\nnonce: \"0x43b3f9c38f75c685\",\nnumber: 22,\nparentHash: \"0xa31e844e09b21b9e2e00c9337b0c127d64b848c71fac5165cfd9b73030bf460c\"\
    ,\nreceiptsRoot: \"0x56e81f171bcc55a6ff8345e692c0f86e5b48e01b996cadc001622fb5e363b421\"\
    ,\nsha3Uncles: \"0x1dcc4de8dec75d7aab85b567b6ccd41ad312451b948a7413f0a142fd40d49347\"\
    ,\nsize: 537,\nstateRoot: \"0xa911ecd43f895f2e01538910d71734cdc149b1b9e0f88815c88438bb138e81cc\"\
    ,\ntimestamp: 1655798565,\ntotalDifficulty: 3028096,\ntransactions: [],\ntransactionsRoot:\
    \ \"0x56e81f171bcc55a6ff8345e692c0f86e5b48e01b996cadc001622fb5e363b421\",\nuncles:\
    \ []\n}\n```\n\n`eth.getBlock()`函数接受一个表示要检查的区块编号的数字。一个特别值得注意的点：`miner`键表示成功挖出该区块的账户。\n\
    \n## 在两个节点上挖矿\n\n到目前为止，只有`node1`在进行挖矿并享受所有乐趣（并获得所有奖励）。为什么不也让`node2`进行挖矿呢？如果现在尝试在`node2`上挖矿，将看到以下错误：\n\
    \n```\n> miner.start(1)\nError: etherbase missing: etherbase must be explicitly\
    \ specified\nat web3.js:6365:9(45)\nat send (web3.js:5099:62(34))\nat :1:12(4)\n\
    ```\n\n为什么？为了执行挖矿，节点中至少需要有一个账户来存放挖矿奖励。要解决这个问题，使用`personal.newAccount()`函数创建一个新账户。一旦账户创建成功，就可以再次使用`miner.start()`函数。\n\
    \n现在有两个矿工同时挖矿并竞争奖励。要了解最新区块的矿工是谁，可以使用`eth.getBlock()`函数并检查其`miner`属性，如下所示：`eth.getBlock(eth.blockNumber).miner`。结果是成功挖出最新区块的账户地址。\n\
    \n## 在节点之间转账以太币\n\n在`node1`中，使用`personal.newAccount()`函数再创建一个账户。现在应该有两个账户：\n\n\
    ```\n> eth.accounts\n[\"0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb\", \"0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c\"\
    ]\n```\n\n验证每个账户中有多少余额：\n\n```\n> eth.getBalance(eth.accounts[0])\n3.376328125e+22\n\
    > eth.getBalance(eth.accounts[1])\n```\n\n要将一些以太币从一个账户转移到另一个账户，可以使用`eth.sendTransaction()`函数。但在使用它转账之前，需要先使用`personal.unlockAccount()`函数解锁源账户：\n\
    \n```\n> personal.unlockAccount(eth.accounts[0])\nUnlock account 0x530e822163471b0e65725cbd85dc141ff6b24d59\n\
    Passphrase: \ntrue\n```\n\n账户解锁后，现在可以转账了：\n\n```\n> eth.sendTransaction({from:\
    \ eth.accounts[0], to: eth.accounts[1], value: web3.toWei(5,\"ether\")})\n\"0xbac74dffae71c5532d83ed8ae37ff97d68dd2ab8b7f62fa2b1032f88df8d543c\"\
    \n```\n\n提示\n\n如果想要将以太币转账到另一台计算机上的另一个节点，只需指定要发送到的账户地址，并用一对双引号括起来，如下所示：\n\n```\n\
    eth.sendTransaction({from: eth.accounts[0], to: \"0x9ba6f3c9cce2b172d0a85a50101ae05f3b4c8731\"\
    , value: web3.toWei(5,\"ether\")})\n```\n\n在这个例子中，从第一个账户向同一节点内的第二个账户转账五个以太币。函数的输出是交易ID。如果现在检查两个账户的余额，发现它们仍然相同，则可能是以下原因之一：\n\
    \n*   当前没有在挖矿。记住，挖矿确认交易，以便交易可以记录在区块链上。要解决这个问题，请在节点上启动挖矿。\n*   如果当前正在挖矿，很可能交易尚未被确认。稍等片刻，然后再次检查余额。\n\
    \n一段时间后，应该在第二个账户中看到五个以太币：\n\n```\n> eth.getBalance(eth.accounts[1])\n```\n\n提示\n\
    \n如果检查第一个账户的余额，可能会发现其扣除额少于五个以太币。这是因为尽管扣除了五个以太币，它也在通过挖矿赚取奖励。因此，验证第二个账户的余额更容易。"
  raw: "#### Performing Mining\n\nWith all the nodes connected, you can start to perform\
    \ some mining operations! Before you do that, let’s verify the block numbers for\
    \ the current blockchain. In any of the nodes, you can use the `eth.blockNumber`\
    \ property to display the latest block number in the blockchain:\n\n```\n> eth.blockNumber\n\
    \n```\n\nAs expected, you should see 0\\. This is because at this moment the blockchain\
    \ has only one block: the genesis block. To start mining on **node1**, use the\
    \ `miner.start()` function:\n\n```\n> miner.start(1)\nnull\n```\n\nThe number\
    \ you pass into the `start()` function is the number of threads you want to use\
    \ for the mining operation. Don’t be alarmed with the null result. The null simply\
    \ means that the function has nothing to return to you; it does not indicate the\
    \ failure of the mining operation.\n\nNote\n\nThe `miner` object is derived from\
    \ the `web3` object.\n\nThe **node1** will now start the mining operation. On\
    \ some computers, it will take a few minutes to mine the first block, while on\
    \ some slower machines, it will take a much longer time. So be patient.\n\nYou\
    \ can verify that a block has been mined by checking the result of the `eth.blockNumber`\
    \ property. If the block number is more than 0, you have mined your first block!\
    \ Congratulations!\n\nAnd since **node2** is connected to **node1**, you can also\
    \ verify the block number in **node2**. You should see the same block number.\n\
    \nCaution\n\nIf **node2** is not seeing the same block number as **node1**, it\
    \ means that the two are not paired up correctly.\n\nIf you need to stop the mining,\
    \ you can use the `miner.stop()` function. For now, leave the mining on.\n\nTip\n\
    \nThis is a good time to check the balance of your account. If you have managed\
    \ to mine a block, you should have some Ethers in your account now.\n\n#### Examining\
    \ a Block\n\nYou can examine the contents of a block by using the `eth.getBlock()`\
    \ function (e.g., `eth.getBlock(22)`):\n\n```\n{\ndifficulty: 132352,\nextraData:\
    \ \"0xd983010a13846765746888676f312e31382e338664617277696e\",\ngasLimit: 3209750,\n\
    gasUsed: 0,\nhash: \"0xa7a89c8552d7ab22064468fd8ded5ba4759734d9f877a45351e1b00048564e4c\"\
    ,\nlogsBloom: \"\"\
    ,\nminer: \"0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb\",\nmixHash: \"0x938bb57f4f1c68a1760c689028ef02d0ee464ea45ddd7be777205a90a91a9bd9\"\
    ,\nnonce: \"0x43b3f9c38f75c685\",\nnumber: 22,\nparentHash: \"0xa31e844e09b21b9e2e00c9337b0c127d64b848c71fac5165cfd9b73030bf460c\"\
    ,\nreceiptsRoot: \"0x56e81f171bcc55a6ff8345e692c0f86e5b48e01b996cadc001622fb5e363b421\"\
    ,\nsha3Uncles: \"0x1dcc4de8dec75d7aab85b567b6ccd41ad312451b948a7413f0a142fd40d49347\"\
    ,\nsize: 537,\nstateRoot: \"0xa911ecd43f895f2e01538910d71734cdc149b1b9e0f88815c88438bb138e81cc\"\
    ,\ntimestamp: 1655798565,\ntotalDifficulty: 3028096,\ntransactions: [],\ntransactionsRoot:\
    \ \"0x56e81f171bcc55a6ff8345e692c0f86e5b48e01b996cadc001622fb5e363b421\",\nuncles:\
    \ []\n}\n```\n\nThe `eth.getBlock()` function takes in a number representing the\
    \ block number that you want to examine. One particular interesting point to note:\
    \ the `miner` key indicates the account that successfully mined the block.\n\n\
    #### Mining on Both Nodes\n\nUp to this point only **node1** is doing the mining\
    \ and having all the fun (and reaping all the rewards). Why not get **node2**\
    \ to do the mining too? If you try to mine on **node2** now, you will see the\
    \ following error:\n\n```\n> miner.start(1)\nError: etherbase missing: etherbase\
    \ must be explicitly specified\nat web3.js:6365:9(45)\nat send (web3.js:5099:62(34))\n\
    at :1:12(4)\n```\n\nWhy? In order to perform mining, you need to have at least\
    \ one account in your node for the rewards to be deposited into. To solve this\
    \ problem, create a new account using the `personal.newAccount()` function. Once\
    \ the account is created, you can use the `miner.start()` function again.\n\n\
    You now have two miners mining at the same time and competing for rewards. To\
    \ know which is the miner of the latest block, you can use the `eth.getBlock()`\
    \ function and check its `miner` property like this: `eth.getBlock(eth.blockNumber).miner`.\
    \ The result is the address of the account that managed to mine the latest block.\n\
    \n#### Transferring Ethers Between Nodes\n\nIn **node1**, let’s create another\
    \ account using the `personal.newAccount()` function. You should now have two\
    \ accounts:\n\n```\n> eth.accounts\n[\"0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb\"\
    , \"0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c\"]\n```\n\nLet’s verify how much\
    \ you have in each account:\n\n```\n> eth.getBalance(eth.accounts[0])\n3.376328125e+22\n\
    > eth.getBalance(eth.accounts[1])\n\n```\n\nTo transfer some Ethers from one account\
    \ to another account, you can use the `eth.sendTransaction()` function. But before\
    \ you use it to transfer Ethers, you need to unlock the source account first,\
    \ using the `personal.unlockAccount()` function:\n\n```\n> personal.unlockAccount(eth.accounts[0])\n\
    Unlock account 0x530e822163471b0e65725cbd85dc141ff6b24d59\nPassphrase: \ntrue\n\
    Once the account is unlocked, you can now transfer the Ether:\n> eth.sendTransaction({from:\
    \ eth.accounts[0], to: eth.accounts[1], value: web3.toWei(5,\"ether\")})\n\"0xbac74dffae71c5532d83ed8ae37ff97d68dd2ab8b7f62fa2b1032f88df8d543c\"\
    \n```\n\nTip\n\nIf you want to transfer Ethers to another node on another computer,\
    \ simply specify the address of the account you want to send to, enclosed with\
    \ a pair of double quotes, like this:\n\neth.sendTransaction({from: eth.accounts[0],\
    \ to: \"0x9ba6f3c9cce2b172d0a85a50101ae05f3b4c8731\", value: web3.toWei(5,\"ether\"\
    )})\n\nIn this example, you are transferring five Ethers from the first account\
    \ to the second account within the same node. The output of the function is the\
    \ transaction ID. If you now check the balance of the two accounts and realize\
    \ that they are still the same, then one of the following causes is likely:\n\n\
    *   You are not currently mining. Remember, mining confirms transactions so that\
    \ the transactions can be recorded on the blockchain. To resolve this, start mining\
    \ on the node.\n\n*   If you are currently mining, it is likely that the transactions\
    \ have not be confirmed yet. Wait a while and check the balance again.\n\nAfter\
    \ a while, you should see five Ethers in the second account:\n\n```\n> eth.getBalance(eth.accounts[1])\n\
    \n```\n\nTip\n\nIf you check the balance of the first account, you are likely\
    \ to see it has less than five Ethers deducted. This is because in spite of the\
    \ five Ethers deducted, it is also earning rewards doing the mining. Hence, it\
    \ is easier to verify the balance of the second account."
  trans: "\n## 执行挖矿\n\n所有节点连接后，就可以开始执行一些挖矿操作了！在此之前，先验证当前区块链的区块编号。在任意节点中，都可以使用`eth.blockNumber`属性来显示区块链中的最新区块编号：\n\
    \n```\n> eth.blockNumber\n```\n\n如预期一样，应该看到`0`。这是因为此时区块链只有一个区块：创世区块。要在`node1`上开始挖矿，使用`miner.start()`函数：\n\
    \n```\n> miner.start(1)\nnull\n```\n\n传递给`start()`函数的数字是希望用于挖矿操作的线程数。不要因为返回`null`而感到惊慌。`null`仅表示该函数没有返回任何内容；并不表示挖矿操作失败。\n\
    \n注意\n\n`miner`对象派生自`web3`对象。\n\n`node1`现在将开始挖矿操作。在某些计算机上，挖出第一个区块需要几分钟时间，而在一些较慢的机器上，则需要更长时间。所以请耐心等待。\n\
    \n可以通过检查`eth.blockNumber`属性的结果来验证是否已挖出区块。如果区块编号大于`0`，说明已经挖到了第一个区块！恭喜！\n\n由于`node2`已连接到`node1`，因此也可以在`node2`中验证区块编号。应该看到相同的区块编号。\n\
    \n注意\n\n如果`node2`与`node1`看到的区块编号不一致，意味着两个节点没有正确配对。\n\n如果需要停止挖矿，可以使用`miner.stop()`函数。目前，请保持挖矿运行。\n\
    \n提示\n\n这是检查账户余额的好时机。如果成功挖到一个区块，账户中现在应该有一些以太币了。\n\n## 检查区块\n\n可以使用`eth.getBlock()`函数（例如`eth.getBlock(22)`）来检查区块的内容：\n\
    \n```\n{\ndifficulty: 132352,\nextraData: \"0xd983010a13846765746888676f312e31382e338664617277696e\"\
    ,\ngasLimit: 3209750,\ngasUsed: 0,\nhash: \"0xa7a89c8552d7ab22064468fd8ded5ba4759734d9f877a45351e1b00048564e4c\"\
    ,\nlogsBloom: \"\"\
    ,\nminer: \"0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb\",\nmixHash: \"0x938bb57f4f1c68a1760c689028ef02d0ee464ea45ddd7be777205a90a91a9bd9\"\
    ,\nnonce: \"0x43b3f9c38f75c685\",\nnumber: 22,\nparentHash: \"0xa31e844e09b21b9e2e00c9337b0c127d64b848c71fac5165cfd9b73030bf460c\"\
    ,\nreceiptsRoot: \"0x56e81f171bcc55a6ff8345e692c0f86e5b48e01b996cadc001622fb5e363b421\"\
    ,\nsha3Uncles: \"0x1dcc4de8dec75d7aab85b567b6ccd41ad312451b948a7413f0a142fd40d49347\"\
    ,\nsize: 537,\nstateRoot: \"0xa911ecd43f895f2e01538910d71734cdc149b1b9e0f88815c88438bb138e81cc\"\
    ,\ntimestamp: 1655798565,\ntotalDifficulty: 3028096,\ntransactions: [],\ntransactionsRoot:\
    \ \"0x56e81f171bcc55a6ff8345e692c0f86e5b48e01b996cadc001622fb5e363b421\",\nuncles:\
    \ []\n}\n```\n\n`eth.getBlock()`函数接受一个表示要检查的区块编号的数字。一个特别值得注意的点：`miner`键表示成功挖出该区块的账户。\n\
    \n## 在两个节点上挖矿\n\n到目前为止，只有`node1`在进行挖矿并享受所有乐趣（并获得所有奖励）。为什么不也让`node2`进行挖矿呢？如果现在尝试在`node2`上挖矿，将看到以下错误：\n\
    \n```\n> miner.start(1)\nError: etherbase missing: etherbase must be explicitly\
    \ specified\nat web3.js:6365:9(45)\nat send (web3.js:5099:62(34))\nat :1:12(4)\n\
    ```\n\n为什么？为了执行挖矿，节点中至少需要有一个账户来存放挖矿奖励。要解决这个问题，使用`personal.newAccount()`函数创建一个新账户。一旦账户创建成功，就可以再次使用`miner.start()`函数。\n\
    \n现在有两个矿工同时挖矿并竞争奖励。要了解最新区块的矿工是谁，可以使用`eth.getBlock()`函数并检查其`miner`属性，如下所示：`eth.getBlock(eth.blockNumber).miner`。结果是成功挖出最新区块的账户地址。\n\
    \n## 在节点之间转账以太币\n\n在`node1`中，使用`personal.newAccount()`函数再创建一个账户。现在应该有两个账户：\n\n\
    ```\n> eth.accounts\n[\"0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb\", \"0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c\"\
    ]\n```\n\n验证每个账户中有多少余额：\n\n```\n> eth.getBalance(eth.accounts[0])\n3.376328125e+22\n\
    > eth.getBalance(eth.accounts[1])\n```\n\n要将一些以太币从一个账户转移到另一个账户，可以使用`eth.sendTransaction()`函数。但在使用它转账之前，需要先使用`personal.unlockAccount()`函数解锁源账户：\n\
    \n```\n> personal.unlockAccount(eth.accounts[0])\nUnlock account 0x530e822163471b0e65725cbd85dc141ff6b24d59\n\
    Passphrase: \ntrue\n```\n\n账户解锁后，现在可以转账了：\n\n```\n> eth.sendTransaction({from:\
    \ eth.accounts[0], to: eth.accounts[1], value: web3.toWei(5,\"ether\")})\n\"0xbac74dffae71c5532d83ed8ae37ff97d68dd2ab8b7f62fa2b1032f88df8d543c\"\
    \n```\n\n提示\n\n如果想要将以太币转账到另一台计算机上的另一个节点，只需指定要发送到的账户地址，并用一对双引号括起来，如下所示：\n\n```\n\
    eth.sendTransaction({from: eth.accounts[0], to: \"0x9ba6f3c9cce2b172d0a85a50101ae05f3b4c8731\"\
    , value: web3.toWei(5,\"ether\")})\n```\n\n在这个例子中，从第一个账户向同一节点内的第二个账户转账五个以太币。函数的输出是交易\
    \ ID。如果现在检查两个账户的余额，发现它们仍然相同，则可能是以下原因之一：\n\n*   当前没有在挖矿。记住，挖矿确认交易，以便交易可以记录在区块链上。要解决这个问题，请在节点上启动挖矿。\n\
    *   如果当前正在挖矿，很可能交易尚未被确认。稍等片刻，然后再次检查余额。\n\n一段时间后，应该在第二个账户中看到五个以太币：\n\n```\n> eth.getBalance(eth.accounts[1])\n\
    ```\n\n提示\n\n如果检查第一个账户的余额，可能会发现其扣除额少于五个以太币。这是因为尽管扣除了五个以太币，它也在通过挖矿赚取奖励。因此，验证第二个账户的余额更容易。\n"
- fmt: '## Managing Accounts


    Earlier in this chapter you learned about creating accounts in your node. I also
    mentioned that the account details are stored in a file with the name starting
    with “UTC” and saved in the `~/MyTestNet/data/node1/keystore` directory. Let’s
    dissect the content of this UTC file:


    ```

    {

    "address": "6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb",

    "crypto": {

    "cipher": "aes-128-ctr",

    "ciphertext": "1f35569e89100cd6d03c7de8780a913f54129cdbce0290a3b39a798391bd2674",

    "cipherparams": {

    "iv": "0ffbe973059db7a0226cd6fced92e50d"

    },

    "kdf": "scrypt",

    "kdfparams": {

    "dklen": 32,

    "n": 262144,

    "p": 1,

    "r": 8,

    "salt": "d2c73712f61b236beb22c783502a50166049a46b0aa29503a90d2f8a4227741c"

    },

    "mac": "432ab5429c423c3c9e545397f53c64ddc6a900a6ab7dc255a58cf5da9f629242"

    },

    "id": "b9e36890-b2ff-4fdd-af90-f157f352e6bc",

    "version": 3

    }

    ```


    This shows the contents of the first account in `node1` with the file name `UTC--2022-06-21T07-44-59.385557000Z--6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb`.


    It contains the following:


    *   Your encrypted private key (encrypted using your supplied password)

    *   The public key is not stored in the JSON file as it can be derived from the
    private key. The corresponding public key for the private key is derived from
    the private key using the ECDSA (Elliptic Curve Signature) algorithm.

    *   From the public key derived, compute a `keccak256` hash.

    *   From the `keccak256` hash, take the last 20 bytes (which is 40 hexadecimals),
    prefix it with `"0x"`, and this is your Ethereum account address.


    Figure [4-8](#471881_2_En_4_Chapter.xhtml#Fig8) summarizes how your account address
    is derived.


    ![](images/471881_2_En_4_Chapter/471881_2_En_4_Fig8_HTML.jpg)


    A flow diagram includes public and private keys, take the last 20 bytes and prefix
    it with `0x`, the account address, and an encrypted private key with a user-supplied
    password.


    **Figure 4-8** Understanding how the account information is derived


    **Tip** Curious about your private key? Import the JSON file into MetaMask and
    your account will be imported into MetaMask. You can now export the private key
    of this imported account in MetaMask.


    ### Removing Accounts


    Once you use the `personal.newAccount()` function, the account is created. There
    is no equivalent function to remove the account. The easiest way to delete the
    account is to go to the `~/MyTestNet/data/node1/keystore` directory and delete
    the UTC file corresponding to the account that you want to delete.


    ### Setting the Coinbase


    The `eth.coinbase` property returns the account within the node that all the mining
    rewards go to. In `node1`, your coinbase is your first account:


    ```

    > eth.coinbase

    "0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb"

    ```


    To change the coinbase, you can use the `miner.setEtherbase()` function. Let’s
    try it now.


    First, print out the accounts you have in `node1`:


    ```

    > eth.accounts

    ["0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb", "0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c"]

    ```


    Let’s change the coinbase to the second account:


    ```

    > miner.setEtherbase(eth.accounts[1])

    true

    ```


    Once this is done, you can verify if the coinbase has indeed been changed to the
    second account:


    ```

    > eth.coinbase

    "0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c"

    ```


    ## Summary


    In this chapter, you learned how to use Geth to create your own private Ethereum
    test network. You learned how to create accounts in your node, connect to other
    nodes, transfer Ethers between nodes, and more. Deploying your own test network
    is much more efficient than using one of Ethereum’s test network. What’s more,
    it allows you to experiment and have a deeper understanding of Ethereum.


    # 5. Using the MetaMask Crypto-Wallet


    In the previous chapter, you learned how to create your own private Ethereum test
    network using Geth so that you can try out the various Ethereum transactions,
    such as transferring Ethers to different accounts and performing mining. You also
    learned how to create accounts so that you can hold your own Ethers. In this chapter,
    you will learn how to use a Chrome extension known as **MetaMask**. The MetaMask
    Chrome extension is an Ethereum crypto-wallet that allows you to hold your Ethereum
    account(s), and it is an essential tool to help you develop and test smart contracts
    in the next few chapters.


    ## What Is MetaMask?


    MetaMask is a very useful tool that plays a pivotal role in allowing you to make
    your foray into the world of blockchain. Rather than attempt to define what exactly
    MetaMask is in one paragraph, I will talk about the role played by MetaMask as
    we go along.


    First and foremost, MetaMask is an Ethereum crypto-wallet. It allows you to do
    the following:


    *   Create accounts for use in the various Ethereum networks

    *   Maintain the private keys for your accounts so you can export them or import
    new accounts

    *   Switch between the various Ethereum networks so that your accounts can reflect
    the correct balance for each network

    *   Perform transactions between accounts

    *   Transfer Ethers from one account to another

    *   Hold tokens in your MetaMask accounts

    *   View detail transactions on Etherscan, a blockchain explorer

    *   Swap between Ethers and tokens on decentralized exchanges (DEX)


    **Note** Besides being an Ethereum wallet, MetaMask also allows you to interact
    with the Ethereum blockchain by injecting a JavaScript library called `web3.js`,
    developed by the Ethereum core team. I will discuss this more in the next chapter
    when I discuss smart contracts.


    ### How MetaMask Works Behind the Scenes


    Behind the scenes, MetaMask connects to a server called INFURA ([`https://infura.io/`](https://infura.io/)).
    INFURA maintains Ethereum nodes that connect to the respective Ethereum networks.
    Rather than allowing INFURA to keep your private keys (which is always a security
    risk when your private key is kept in the cloud held by a third party), INFURA
    allows MetaMask to keep your private keys of your accounts on your local computer
    and simply relay the transactions to the network. Figure [5-1](#471881_2_En_5_Chapter.xhtml#Fig1)
    shows the relationships between MetaMask, INFURA, and the Ethereum network.


    ![](images/471881_2_En_5_Chapter/471881_2_En_5_Fig1_HTML.jpg)


    A circular diagram of the Ethereum network has an Infura node in its orbit. It
    has a MetaMask plugin that holds the private key of the account.


    **Figure 5-1** How MetaMask works behind the scene


    When MetaMask connects to one of the Ethereum networks, it connects to one of
    the respective INFURA nodes through their RPC URLs:


    *   **Main Ethereum Network:** [`https://mainnet.infura.io/v3/`](https://mainnet.infura.io/v3/)

    *   **Goerli Test Network:** [`https://goerli.infura.io/v3/`](https://goerli.infura.io/v3/)

    *   **Sepolia Test Network:** [`https://sepolia.infura.io/v3/`](https://sepolia.infura.io/v3/)


    **Caution** Prior to the Merge (where Ethereum switched from using PoW to PoS),
    most developers used the Ropsten test network. However, the Ropsten test network
    has been deprecated after the Merge. You should use the Goerli test network instead.'
  raw: '## Managing Accounts


    Earlier in this chapter you learned about creating accounts in your node. I also
    mentioned that the account details are stored in a file with the name starting
    with “UTC” and saved in the `~/MyTestNet/data/node1/keystore` directory. Let’s
    dissect the content of this UTC file:


    ```

    {

    "address": "6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb",

    "crypto": {

    "cipher": "aes-128-ctr",

    "ciphertext": "1f35569e89100cd6d03c7de8780a913f54129cdbce0290a3b39a798391bd2674",

    "cipherparams": {

    "iv": "0ffbe973059db7a0226cd6fced92e50d"

    },

    "kdf": "scrypt",

    "kdfparams": {

    "dklen": 32,

    "n": 262144,

    "p": 1,

    "r": 8,

    "salt": "d2c73712f61b236beb22c783502a50166049a46b0aa29503a90d2f8a4227741c"

    },

    "mac": "432ab5429c423c3c9e545397f53c64ddc6a900a6ab7dc255a58cf5da9f629242"

    },

    "id": "b9e36890-b2ff-4fdd-af90-f157f352e6bc",

    "version": 3

    }

    ```


    This shows the contents of the first account in **node1** with the file name `UTC--2022-06-21T07-44-59.385557000Z--6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb`.


    It contains the following:


    *   Your encrypted private key (encrypted using your supplied password)


    *   The public key is not stored in the JSON file as it can be derived from the
    private key. The corresponding public key for the private key is derived from
    the private key using the ECDSA (Elliptic Curve Signature) algorithm.


    *   From the public key derived, compute a keccak256 hash.


    *   From the keccak256 hash, take the last 20 bytes (which is 40 hexadecimals),
    prefix it with “0x”, and this is your Ethereum account address.


    Figure [4-8](#471881_2_En_4_Chapter.xhtml#Fig8) summarizes how your account address
    is derived.


    ![](images/471881_2_En_4_Chapter/471881_2_En_4_Fig8_HTML.jpg)


    A flow diagram includes public and private keys, take the last 20 bytes and prefix
    it with 0 x, the account address, and an encrypted private key with a user-supplied
    password.


    Figure 4-8


    Understanding how the account information is derived


    Tip


    Curious about your private key? Import the JSON file into MetaMask and your account
    will be imported into MetaMask. You can now export the private key of this imported
    account in MetaMask.


    ### Removing Accounts


    Once you use the `personal.newAccount()` function, the account is created. There
    is no equivalent function to remove the account. The easiest way to delete the
    account is to go to the `~/MyTestNet/data/node1/keystore` directory and delete
    the UTC file corresponding to the account that you want to delete.


    ### Setting the Coinbase


    The `eth.coinbase` property returns the account within the node that all the mining
    rewards go to. In **node1**, your coinbase is your first account:


    ```

    > eth.coinbase

    "0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb"

    ```


    To change the coinbase, you can use the `miner.setEtherbase()` function. Let’s
    try it now.


    First, print out the accounts you have in **node1**:


    ```

    > eth.accounts

    ["0x6e05a61f9414d2ecbe79ae9c70fd4a7f234be7cb", "0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c"]

    ```


    Let’s change the coinbase to the second account:


    ```

    > miner.setEtherbase(eth.accounts[1])

    true

    ```


    Once this is done, you can verify if the coinbase has indeed been changed to the
    second account:


    ```

    > eth.coinbase

    "0xbb6f2406a8a49746f25e5b2230af7ee9d3196e9c"

    ```


    ## Summary


    In this chapter, you learned how to use Geth to create your own private Ethereum
    test network. You learned how to create accounts in your node, connect to other
    nodes, transfer Ethers between nodes, and more. Deploying your own test network
    is much more efficient than using one of Ethereum’s test network. What’s more,
    it allows you to experiment and have a deeper understanding of Ethereum.


    # 5. Using the MetaMask Crypto-Wallet


    In the previous chapter, you learned how to create your own private Ethereum test
    network using Geth so that you can try out the various Ethereum transactions,
    such as transferring Ethers to different accounts and performing mining. You also
    learned how to create accounts so that you can hold your own Ethers. In this chapter,
    you will learn how to use a Chrome extension known as **MetaMask**. The MetaMask
    Chrome extension is an Ethereum crypto-wallet that allows you to hold your Ethereum
    account(s), and it is an essential tool to help you develop and test smart contracts
    in the next few chapters.


    ## What Is MetaMask?


    MetaMask is a very useful tool that plays a pivotal role in allowing you to make
    your foray into the world of blockchain. Rather than attempt to define what exactly
    MetaMask is in one paragraph, I will talk about the role played by MetaMask as
    we go along.


    First and foremost, MetaMask is an Ethereum crypto-wallet. It allows you to do
    the following:


    *   Create accounts for use in the various Ethereum networks


    *   Maintain the private keys for your accounts so you can export them or import
