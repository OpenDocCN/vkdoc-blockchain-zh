  \n## 对智能合约进行进一步修改\n\n你的基础教育凭证智能合约现已上线运行。用户现在能够将教育凭证存储到区块链上，并用于验证学历资格。然而，合约仍有若干可以改进之处。在接下来的章节中，你将学习以下内容：\n\
  \n- 如何限制对智能合约中特定函数的访问权限\n- 如何在智能合约中接收付款\n- 如何在智能合约中触发事件\n- 如何将智能合约中的资金转移到另一个账户\n\
  - 如何销毁一个智能合约，使其不再可用\n\n\n\n### 限制函数访问权限\n\n显然，并非所有人都应被允许将学生的教育凭证存储在区块链上。实际上，只有教育机构（通常是部署智能合约的机构）才应被允许这样做。你可以对智能合约进行一些修改，以确保只有合约所有者（即部署合约的人）才能调用\
  \ `storeEduCredentials()` 函数。\n\n首先，在合约中添加以下加粗的语句：\n\n```\ncontract EduCredentialsStore\
  \ {\n// 存储合约所有者\naddress owner = msg.sender;\n```\n\n`owner` 变量会自动存储部署合约的账户地址（`msg.sender`）。然后，在\
  \ `storeEduCredentials()` 函数中添加 `require()` 函数，如下所示：\n\n```\nfunction storeEduCredentials(string\
  \ calldata document) external {\nrequire(msg.sender == owner,\n\"只有合约所有者才能存储凭证\"\
  );\n// 使用字符串的哈希值调用 storeProof()\nstoreProof(proofFor(document));\n}\n```\n\n`require()`\
  \ 函数首先会检查调用该函数的任何地址（`msg.sender`）是否为 `owner`，如果不是，则返回错误信息（`\"只有合约所有者才能存储凭证\"`）。如果条件满足，将继续执行；否则，执行将停止。\n\
  \n在 Remix IDE 中，你可以通过首先使用账户 1 部署合约来尝试上述修改。合约部署后，在 MetaMask 中切换到另一个账户，并尝试调用 `storeEduCredentials()`\
  \ 函数。你将会看到一个错误，如图 7-9 所示。\n\n![](img/471881_2_En_7_Fig9_HTML.jpg)\n\n一张显示 Gas 估算失败消息的屏幕截图，其中包含一组代码。\n\
  \n**图 7-9** Remix IDE 拒绝函数调用\n\n**注意**\n\n请注意，智能合约不可更改。一旦部署，你将无法对其进行任何修改。因此，当你重新部署合约时，区块链上存储的是一个新合约；你将无法在新合约中访问旧合约的任何状态变量。\n\
  \n### 在智能合约中接受付款\n\n既然你已经编写了一个允许将教育凭证写入区块链的智能合约，你可能想了解如何从这样的合约中获得经济收益。每当有人需要验证潜在雇员的教育凭证时，收取一些以太币怎么样？嗯，这很简单。\n\
  \n在 `checkEduCredentials()` 函数中添加 `payable` 关键字，并删除 `view` 关键字：\n\n```\nfunction\
  \ checkEduCredentials(string calldata document) public payable returns (uint) {\n\
  require(msg.value == 1000 wei,\n\"此调用需要 1000 wei\");\n// 使用字符串的哈希值并检查 proofs 映射对象\n\
  return proofs[proofFor(document)];\n}\n```\n\n同时，添加 `require()` 函数以指明调用者必须发送 1000\
  \ Wei（通过 `msg.value` 表示）。\n\n**提示**\n\n1 以太币等于 1,000,000,000,000,000,000 Wei（18\
  \ 个零）。Wei 是以太币的最小面额。\n\n表 7-1 展示了以太坊中的各种面额。例如，1 以太币等于 1,000,000,000,000,000,000\
  \ Wei（18 个零），1 以太币等于 0.001 Kether。\n\n**表 7-1** 以太币的各种面额\n\n| 单位 | 价值（以太币） |\n|\
  \ --- | --- |\n| Wei | 1,000,000,000,000,000,000（18 个零） |\n| Kwei | 1,000,000,000,000,000（15\
  \ 个零） |\n| Mwei | 1,000,000,000,000（12 个零） |\n| Gwei | 1,000,000,000（9 个零） |\n|\
  \ Szabo | 1,000,000（6 个零） |\n| Finney | 1,000（3 个零） |\n| Ether | 1 |\n| Kether |\
  \ 0.001（3 位小数） |\n| Mether | 0.000001（6 位小数） |\n| Gether | 0.000000001（9 位小数） |\n\
  | Tether | 0.000000000001（12 位小数） |\n\n**提示**\n\n以太币的一些面额是以加密世界中的知名人物命名的。例如，`Finney`\
  \ 以*哈尔·芬尼*命名，他是比特币的早期贡献者，并收到了比特币创造者中本聪的第一笔比特币交易。`Szabo` 以*尼克·萨博*命名，他首次提出了智能合约的概念。`Wei`\
  \ 以*戴伟*命名，他是一位密码学家，提出了“b-money”，这是比特币论文第 2 节中引用的一个概念。\n\n#### 在 Solidity 中指定以太币单位\n\
  \n在 Solidity 中，变量 `msg.value` 始终以 Wei 表示。在上述语句中，你也可以将比较重写为：\n\n```\nmsg.value ==\
  \ 1000\n```\n\n然而，Solidity 允许你使用上面使用的特殊语法来比较以太币单位：\n\n```\nmsg.value == 1000 wei\n\
  ```\n\n当你比较大额以太币时，这种语法很有用。例如，如果你想检查传入的金额是否为 1 以太币，你可以这样做：\n\n```\nmsg.value == 1000000000000000000\n\
  // 或者\nmsg.value == 1e18\n```\n\n但使用更简单的语法，你只需这样做：\n\n```\nmsg.value == 1 ether\n\
  ```\n\n从 Solidity 0.7 版本开始，你可以对以下单位执行此操作：`Gwei`、`Ether` 和 `Wei`。\n\n当你部署此合约时，观察\
  \ `checkEduCredentials` 按钮现在变为红色（见图 7-10）。这是由于 `checkEduCredentials()` 函数中的 `payable`\
  \ 关键字所致。\n\n![](img/471881_2_En_7_Fig10_HTML.jpg)\n\n一张已部署合约的屏幕截图，列出了检查和存储教育凭证的功能。\n\
  \n**图 7-10** `checkEduCredentials` 按钮现在变为红色\n\n**提示**\n\n如果函数按钮是红色的，表示除了支付交易费用外，它可能还要求你向其发送以太币。\n\
  \n与之前一样，继续将 base64 编码的字符串粘贴到 `checkEduCredentials` 按钮旁边的文本框中，然后点击 `storeEduCredentials`\
  \ 按钮。当你点击 `checkEduCredential` 按钮时，你将看到如图 7-11 所示的错误信息。\n\n![](img/471881_2_En_7_Fig11_HTML.jpg)\n\
  \n一张显示 Gas 估算失败消息的屏幕截图，其中包含一组代码。底部有发送和取消交易按钮。\n\n**图 7-11** Remix 拒绝交易，因为该函数期望向其发送以太币\n\
  \n显然，这是因为你没有向合约发送 1000 Wei。要在 Remix IDE 中解决这个问题，请在点击 `checkEduCredential` 按钮之前指定\
  \ 1000 Wei，如图 7-12 所示。\n\n![](img/471881_2_En_7_Fig12_HTML.jpg)\n\n一张 Remix-Ethereum\
  \ IDE 页面的屏幕截图。其中显示了部署和运行交易列表，并高亮显示了数值和检查教育凭证的选项卡。\n\n**图 7-12** 向合约发送 1000 Wei\n\
  \n当交易被确认后，你可以前往 Etherscan 查看合约的余额。例如，我的合约地址是 `0xf15e70a24a50ef1b2c3bed0d3b033e35233562f6`。因此，我的合约在\
  \ Etherscan（针对 Goerli 测试网）上的详情页面是：[`https://goerli.etherscan.io/address/0xf15e70a24a50ef1b2c3bed0d3b033e35233562f6`](https://goerli.etherscan.io/address/0xf15e70a24a50ef1b2c3bed0d3b033e35233562f6)。\n\
  \n**注意**\n\nEtherscan 是一个区块链浏览器，允许你查看以太坊区块链（包括各种测试网）上发生的所有详细交易信息。\n\n图 7-13 显示该合约的余额为\
  \ 0.000000000000001 以太币（即 1000 Wei）。这证明了智能合约可以持有以太币。\n\n![](img/471881_2_En_7_Fig13_HTML.jpg)\n\
  \n一张 Goerli Etherscan 页面的屏幕截图。合约概览下的余额被高亮显示。\n\n**图 7-13** 智能合约也可以持有以太币\n\n\n\n\
  ### 智能合约中的事件\n\n回顾一下，`checkEduCredential()` 函数会返回 base64 编码字符串的哈希值存储在区块链上的区块编号。在上一节中，你修改了该函数使其能够接收付款。如果你尝试了该智能合约，你会注意到，在向合约发送\
  \ 1000 Wei 后，`checkEduCredential()` 函数不再返回任何值。这是因为该函数现在正在执行一笔交易，因此无法立即向你返回结果（它需要等待区块被添加到区块链中）。那么如何解决这个问题呢？你可以使用*事件*来解决。\n\
  \n在 Solidity 中，函数可以直接返回结果给调用者，也可以通过事件来返回。智能合约通常使用事件来让前端应用程序了解合约的当前状态。\n\n让我们使用以下语句为你的合约定义一个事件：\n\
  \n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\ncontract EduCredentialsStore\
  \ {\n// 存储合约的所有者\naddress owner = msg.sender;\n//---存储字符串的哈希值及其对应的区块编号---\n// 键为\
  \ bytes32，值为 uint\nmapping (bytes32 => uint) private proofs;\n//---定义一个事件---\nevent\
  \ Result(\naddress from,\nstring document,\nuint blockNumber\n);\n```\n\n这些语句定义了一个名为\
  \ `Result` 的事件，它包含三个参数：`from`、`hash` 和 `blockNumber`。使用 `emit` 关键字来触发此事件。你将在 `checkEduCredentials()`\
  \ 函数中触发此事件：\n\n```\n//-----------------------------------------------\n// 检查一个文档是否之前已保存\n\
  //-----------------------------------------------\nfunction checkEduCredentials(string\
  \ calldata document) public payable {\nrequire(msg.value == 1000 wei ,\n\"此调用需要\
  \ 1000 wei\");\n// 使用字符串的哈希值检查 proofs 映射对象，然后触发事件\nemit Result(msg.sender,\ndocument,\n\
  proofs[proofFor(document)]);\n// return proofs[proofFor(document)];\n}\n```\n\n\
  **注意：** 现在无需从此函数返回值，因此请修改 `checkEduCredentials()` 函数的签名，并注释掉 `return` 语句。\n\n要尝试更新后的智能合约，请部署它，然后调用其\
  \ `checkEduCredentials()` 函数（记得向它发送 1000 Wei）。Remix IDE 将监听该事件，你可以在交易确认后看到它（见图 7-14）。\n\
  \n![](img/471881_2_En_7_Fig14_HTML.jpg)\n\n已解码输出和日志的截图。事件结果下面的一组代码被标出。\n\n**图 7-14**\
  \ 你可以使用 Remix IDE 检查智能合约触发的事件。\n\n### 提取资金\n\n现在你的智能合约持有以太币，但出现了一个问题。这些以太币永远被困在合约中，因为你没有做出任何将其转出的规定。要将以太币从合约中取出，主要有两种方式：\n\
  \n- 在 `checkEduCredentials()` 函数收到以太币的瞬间，立即将其转移到另一个账户。\n- 添加另一个函数，将以太币转移到另一个账户（例如所有者）。\n\
  \n对于本例，你将使用第二种方法，向合约中添加一个 `cashOut()` 函数：\n\n```\nfunction cashOut() public {\n\
  require(msg.sender == owner,\n\"只有合约所有者才能提取资金！\");\npayable(owner).transfer(address(this).balance);\n\
  }\n```\n\n在 `cashOut()` 函数中，你首先需要确保只有所有者才能调用此函数。验证通过后，你使用 `transfer()` 函数将合约的全部余额转移给所有者。\n\
  \n再次部署合约，然后调用 `checkEduCredentials()` 函数，以便向合约发送 1000 Wei。然后，点击 Remix IDE 中的 **cashOut**\
  \ 按钮，将以太币转回给所有者。在 Etherscan 上，你可以看到余额被转移给了合约的所有者（见图 7-15）。\n\n![](img/471881_2_En_7_Fig15_HTML.jpg)\n\
  \nGoerli Etherscan 页面的截图。它显示了交易详情下的概览，其中“To”地址被高亮显示。\n\n**图 7-15** Etherscan 记录将以太币内部转移到另一个账户的过程。\n\
  \n### 销毁合约\n\n总会有那么一刻，你的智能合约的生命周期结束，需要被关闭。要禁用你的智能合约，使其不再可被调用，你可以使用 `selfdestruct()`\
  \ 函数。\n\n现在让我们向合约中添加一个 `kill()` 函数：\n\n```\n/* 自毁函数 */\nfunction kill() public {\n\
  require(msg.sender == owner, \"只有所有者才能销毁此合约\");\nselfdestruct(payable(owner));\n\
  }\n```\n\n像往常一样，你需要确保只有特定用户（通常是合约所有者）才能销毁合约。`selfdestruct()` 函数会将合约中存储的所有剩余以太币发送到一个指定的地址，在本例中即\
  \ `owner`。\n\n> **提示：** `selfdestruct()` 函数是在 Solidity 0.5.0 中引入的，旨在为智能合约面临安全威胁时提供一个退出通道。\n\
  \n最后，部署合约并观察新的销毁按钮（见图 7-16）。\n\n![](img/471881_2_En_7_Fig16_HTML.jpg)\n\n已部署合约界面的截图。它显示余额为\
  \ 0 ETH，并包含以下按钮：cashout、check Edu credentials、kill 和 store Edu credentials。\n\n\
  **图 7-16** `kill()` 函数将合约从区块链中删除。\n\n#### 调用 `selfdestruct()` 后会发生什么？\n\n在智能合约上调用\
  \ `selfdestruct()` 函数后，它仍然可以接受交易，但不会执行任何处理，且交易状态始终为成功。例如，如果你现在调用 `storeEduCredentials()`\
  \ 函数，它仍然可以被调用，并且你仍然需要支付 gas 费。但是，不会有任何数据被存储在区块链上。此外，你仍然可以向合约发送以太币，并且合约会持有这些发送来的以太币。然而，你将无法再从合约中取出这些以太币。\n\
  \n部署此合约后，请记录其部署的合约地址和 ABI。在下一章构建 Web3 dapp（智能合约的前端）时，你将用到这两条信息。\n\n## 本章小结\n\n在本章中，你学习了如何创建一个用于存储教育凭证证明的智能合约。你还学习了可以在\
  \ Solidity 智能合约中实现的一些技巧，例如接收付款以及销毁智能合约的能力。在下一章中，你将学习如何构建一个前端 Web3 dapp 来与智能合约进行交互。\n\
  \n---\n\n"
- '# 8. 使用 web3.js API


  在前面的章节中，你学习了智能合约的基础知识以及如何将它们部署到区块链上。到目前为止，与智能合约的所有交互都是通过 Remix IDE 进行的。虽然 Remix
  IDE 为开发人员测试其智能合约提供了一种简便的方法，但它不适合最终用户使用。为了让最终用户能够与你的智能合约交互，你需要构建一个前端，隐藏在后端与智能合约交互的复杂性。为此，你需要一个
  Web3 API。


  在本章中，你将学习如何使用 `web3.js` API 与智能合约进行交互。使用 `web3.js` API，你可以构建前端（例如网页、Node.js 应用程序等）来与智能合约进行交互。




  '
- "# 什么是 web3.js？\n\n`web3.js` 是一个库的集合，它允许你通过 HTTP、WebSocket 或 IPC 与本地或远程的以太坊节点进行交互。通过\
  \ `web3.js` 的 API，你的前端就可以与智能合约进行交互。`web3.js` 的 API 包含以下模块：\n\n- `web3-eth`：用于与以太坊区块链和智能合约交互\n\
  - `web3-shh`：用于 whisper 协议，实现 p2p 通信和广播\n- `web3-bzz`：用于 swarm 协议，即去中心化文件存储\n- `web3-utils`：包含对\
  \ dapp 开发者有用的辅助函数\n\n在本书中，你只需要关注第一个模块 `web3-eth`。\n\n## 安装 web3.js\n\n安装 `web3.js`\
  \ 需要 Node.js。具体来说，你将使用 `npm` 将 `web3.js` 的 API 下载到你的本地计算机。\n\n> **提示**\n> 安装 Node.js\
  \ 最简单的方法是使用 `nvm`（Node 版本管理器）。要了解如何使用 `nvm` 安装 Node.js，请查阅我的文章 [`https://bit.ly/3QqyEBR`](https://bit.ly/3QqyEBR)。\n\
  \n在本章中，请创建一个名为 `web3projects` 的文件夹来存放 `web3.js` 的 API。在终端中，输入以下命令：\n\n```\n$ cd\
  \ ~\n$ mkdir web3projects\n$ cd web3projects\n```\n\n在你下载 `web3.js` 的 API 之前，需要先创建一个空的\
  \ Node.js 项目：\n\n```\n$ npm init --yes\n```\n\n此命令会创建一个名为 `package.json` 的文件。该文件包含了\
  \ Node.js 应用程序所需的依赖项。要下载 `web3.js` 的 API，请输入以下命令：\n\n```\n$ npm install web3 --save\n\
  ```\n\n> **提示**\n> 创建 `package.json` 文件可以防止 `npm`（Node 包管理器）在安装 `web3.js` 时显示整页的警告和错误信息。\n\
  \n`--save` 选项指示 `npm` 修改 `package.json` 文件，并将 `web3.js` 添加为应用程序的一个依赖项。\n\n现在，`web3projects`\
  \ 文件夹中应该有一个名为 `node_modules` 的文件夹。在这个 `node_modules` 文件夹中，你会看到几个子文件夹，它们共同构成了 `web3.js`\
  \ 这套 API 库。\n\n## 使用 MetaMask 测试 web3.js\n\n下载好 `web3.js` 后，现在让我们测试它并了解其工作原理。创建一个名为\
  \ `TestWeb3.html` 的文本文件，并将其保存在 `web3projects` 文件夹中。文件内容如下：\n\n```\nasync function\
  \ loadWeb3() {\n  //---如果您的网络浏览器上安装了 MetaMask---\n  if (window.ethereum) {\n   \
  \ web3 = new Web3(window.ethereum);\n    //---连接到账户---\n    const account = await\
  \ window.ethereum.request(\n      {method: 'eth_requestAccounts'});\n    console.log(account);\n\
  \  } else {\n    //---设置您想使用的 Web3.providers 提供者---\n    web3 = new Web3(\n    \
  \  new Web3.providers.HttpProvider(\n        \"http://localhost:8545\"));\n  }\n\
  }\n//---获取 MetaMask 中的当前账户---\nasync function getCurrentAccount() {\n  const accounts\
  \ = await web3.eth.getAccounts();\n  console.log(accounts)\n  return accounts[0];\n\
  }\nasync function load() {\n  await loadWeb3();\n  alert(await getCurrentAccount());\n\
  }\nload();\n```\n\n在终端中，输入以下命令：\n\n```\n$ npm install -g serve\n```\n\n> **提示**\n\
  > 使用 `-g` 选项全局安装 `serve` 应用程序可能需要 `sudo` 权限。或者，你也可以在当前目录下本地安装，不使用 `-g` 选项。\n\n此命令会在本地计算机上安装一个\
  \ Web 服务器。在任何目录下输入 `serve` 命令，都会使该目录通过这个 Web 服务器提供内容服务。\n\n在 `web3projects` 文件夹中，输入以下命令：\n\
  \n```\n$ cd ~/web3projects\n$ serve\n```\n\n使用 Chrome 浏览器（需安装 MetaMask），加载以下 URL：`http://localhost:3000/TestWeb3.html`。\n\
  \n你会看到如图 8-1 所示的警告框。选择你想要在 MetaMask 中连接的账户，点击**下一步**，然后点击**连接**。\n\n![](img/471881_2_En_8_Fig1_HTML.jpg)\n\
  \n*图 8-1：你需要向页面授权，允许其访问你的 MetaMask 账户*\n\n现在，你应该会看到警告框显示已连接到你的网页的账户地址，如图 8-2 所示。\n\
  \n![](img/471881_2_En_8_Fig2_HTML.jpg)\n\n*图 8-2：连接到 MetaMask 的网页*\n\n让我们了解这是如何工作的。在你的\
  \ JavaScript 代码中，首先定义了一个名为 `loadWeb3` 的函数：\n\n```\nasync function loadWeb3() {\n\
  \  //---如果您的网络浏览器上安装了 MetaMask---\n  if (window.ethereum) {\n    web3 = new Web3(window.ethereum);\n\
  \    //---连接到账户---\n    const account = await window.ethereum.request(\n      {method:\
  \ 'eth_requestAccounts'});\n    console.log(account);\n  } else {\n    //---设置您想使用的\
  \ Web3.providers 提供者---\n    web3 = new Web3(\n      new Web3.providers.HttpProvider(\n\
  \        \"http://localhost:8545\"));\n  }\n}\n```\n\n如果你通过 HTTP 在安装了 MetaMask 的浏览器上加载此页面，MetaMask\
  \ 会自动通过 `window.ethereum` 注入一个 API。这个 `window.ethereum` 允许你与以太坊节点交互。在这种情况下，它会连接到\
  \ Chrome 浏览器上的 MetaMask 扩展程序。你使用 `window.ethereum` 创建一个 `Web3` 对象的实例，这允许你连接到 MetaMask\
  \ 中的用户账户、连接区块链上的智能合约等等。\n\n如果浏览器中没有检测到 MetaMask（由于缺少 `window.ethereum`），你可以连接到自己的节点。在这个例子中，你连接到一个监听\
  \ 8545 端口的本地节点（`http://localhost:8545`）。你可以运行自己的本地节点，例如 Ganache（见图 8-3）。\n\n![](img/471881_2_En_8_Fig3_HTML.jpg)\n\
  \n*图 8-3：Ganache 允许你在本地计算机上模拟一个以太坊区块链*\n\n> **注意**\n> Ganache 是一个模拟的以太坊区块链，你可以用它来部署合约、开发应用程序和运行测试。它是用于以太坊开发的\
  \ Truffle Suite 工具集的一部分。你可以从 [`https://trufflesuite.com/ganache/`](https://trufflesuite.com/ganache/)\
  \ 下载 Ganache。\n\n接下来定义的函数是 `getCurrentAccount()` 函数：\n\n```\n//---获取 MetaMask 中的当前账户---\n\
  async function getCurrentAccount() {\n  const accounts = await web3.eth.getAccounts();\n\
  \  console.log(accounts)\n  return accounts[0];\n}\n```\n\n在这个函数中，你从连接的节点（无论是 MetaMask\
  \ 还是像 Ganache 这样的节点）获取所有账户，并返回第一个账户。\n\n最后，定义 `load()` 函数，以便你异步地调用 `loadWeb3()`\
  \ 和 `getCurrentAccount()` 函数：\n\n```\nasync function load() {\n  await loadWeb3();\n\
  \  alert(await getCurrentAccount());\n}\n//---调用 load 函数连接到节点并显示第一个账户---\nload();\n\
  ```\n\n\n\n### 使用 `web3.js` 与合约交互\n\n`web3.js` API 最常见的用途是构建前端，让用户能够直接与你的智能合约交互。在本节中，你将学习如何使用\
  \ `web3.js` 与刚部署的合约交互。你将构建一个 Web 前端。\n\n新建一个文本文件，命名为 `main.css`。在文件中填入以下内容：\n\n\
  ```\nbody {\n  background-color:#F0F0F0;\n  padding: 2em;\n  font-family: 'Raleway','Source\
  \ Sans Pro', 'Arial';\n}\n.container {\n  width: 90%;\n  margin: 0 auto;\n}\nlabel\
  \ {\n  display:block;\n  margin-bottom:10px;\n}\ninput {\n  padding:10px;\n  width:\
  \ 100%;\n  margin-bottom: 1em;\n}\nbutton {\n  margin: 2em 0;\n  padding: 1em 4em;\n\
  \  display:block;\n}\n#result {\n  padding:1em;\n  background-color:#fff;\n  margin:\
  \ 1em 0;\n}\n```\n\n该文件将作为你即将构建的 Web 前端的 CSS（层叠样式表）。\n\n新建一个文本文件，命名为 `index.html`（将其保存到\
  \ `web3projects` 文件夹中）。在文件中填入以下语句：\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n\
  \  <head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"\
  width=device-width, initial-scale=1.0\">\n    <title>学历证书公证器</title>\n    <link\
  \ rel=\"stylesheet\" href=\"main.css\">\n  </head>\n  <body>\n    <div class=\"\
  container\">\n      <h1>学历证书公证器</h1>\n      <div>\n        <label for=\"document\"\
  >要存储的凭证</label>\n        <input type=\"text\" id=\"document\" placeholder=\"输入凭证\"\
  >\n        <button id=\"btnStore\">存储</button>\n      </div>\n      <div>\n    \
  \    <label for=\"document2\">检查凭证</label>\n        <input type=\"text\" id=\"document2\"\
  \ placeholder=\"输入凭证\">\n        <button id=\"btnCheck\">检查</button>\n      </div>\n\
  \      <div id=\"result\">状态</div>\n    </div>\n    <script src=\"https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js\"\
  ></script>\n    <script src=\"https://code.jquery.com/jquery-3.6.0.min.js\"></script>\n\
  \    <script>\n      async function loadWeb3() {\n        //---如果您的网络浏览器中安装了 MetaMask---\n\
  \        if (window.ethereum) {\n          web3 = new Web3(window.ethereum);\n \
  \         //---连接到账户---\n          const account = await window.ethereum.request(\n\
  \            {method: 'eth_requestAccounts'});\n          console.log(account)\n\
  \        } else {\n          //---设置您想从 Web3.providers 使用的提供商---\n          web3\
  \ = new Web3(\n            new Web3.providers.HttpProvider(\n              \"http://localhost:8545\"\
  ));\n        }\n      }\n      //---加载智能合约---\n      async function loadContract()\
  \ {\n        abi = [ { \"anonymous\": false, \"inputs\": [ { \"indexed\": false,\
  \ \"internalType\": \"address\", \"name\": \"from\", \"type\": \"address\" }, {\
  \ \"indexed\": false, \"internalType\": \"string\", \"name\": \"document\", \"type\"\
  : \"string\" }, { \"indexed\": false, \"internalType\": \"uint256\", \"name\": \"\
  blockNumber\", \"type\": \"uint256\" } ], \"name\": \"Result\", \"type\": \"event\"\
  \ }, { \"inputs\": [], \"name\": \"cashOut\", \"outputs\": [], \"stateMutability\"\
  : \"nonpayable\", \"type\": \"function\" }, { \"inputs\": [ { \"internalType\":\
  \ \"string\", \"name\": \"document\", \"type\": \"string\" } ], \"name\": \"checkEduCredentials\"\
  , \"outputs\": [], \"stateMutability\": \"payable\", \"type\": \"function\" }, {\
  \ \"inputs\": [], \"name\": \"kill\", \"outputs\": [], \"stateMutability\": \"nonpayable\"\
  , \"type\": \"function\" }, { \"inputs\": [ { \"internalType\": \"string\", \"name\"\
  : \"document\", \"type\": \"string\" } ], \"name\": \"storeEduCredentials\", \"\
  outputs\": [], \"stateMutability\": \"nonpayable\", \"type\": \"function\" } ];\n\
  \        address = '0x450FdF943afec4036787f4deDA11A34526c53921'\n        return\
  \ await new web3.eth.Contract(abi,address);\n      }\n      //---获取 MetaMask 中的当前账户---\n\
  \      async function getCurrentAccount() {\n        const accounts = await web3.eth.getAccounts();\n\
  \        console.log(accounts)\n        return accounts[0];\n      }\n      async\
  \ function load() {\n        await loadWeb3();\n        //---加载合约---\n        notarizer\
  \ = await loadContract();\n        //---获取账户---\n        const account = await getCurrentAccount();\n\
  \        //---处理智能合约触发的 Result 事件---\n        notarizer.events.Result()\n      \
  \  .on('data', function(event){\n          if (event.returnValues[0] == account)\
  \ {\n            console.log(event.returnValues[0]);  // 来源\n            console.log(event.returnValues[1]);\
  \  // 文本\n            console.log(event.returnValues[2]);  // 区块编号\n           \
  \ //---如果区块编号为 0，表示未找到凭证---\n            if (event.returnValues[2] > 0) {\n    \
  \          $(\"#result\").html(\"凭证有效\");\n            } else {\n              $(\"\
  #result\").html(\"凭证无效\");\n            }\n          }\n        });\n        //---将凭证存储到区块链上---\n\
  \        $(\"#btnStore\").click(async function() {\n          notarizer.methods.storeEduCredentials($(\"\
  #document\").val())\n          .send({from:account})\n          .then(function (tx)\
  \ {\n            $(\"#result\").html(tx.transactionHash);\n          });\n     \
  \   });\n        //---在区块链上检查凭证---\n        $(\"#btnCheck\").click(async function()\
  \ {\n          notarizer.methods.checkEduCredentials($(\"#document2\").val())\n\
  \          .send({from:account, value:1000});\n        });\n      }\n      load();\n\
  \    </script>\n  </body>\n</html>\n```\n\n在终端中，确保 `serve` 命令仍在运行（如果没有，请在 `web3projects`\
  \ 文件夹中输入 `serve`）。在 Chrome 浏览器中加载以下 URL：`http://localhost:3000/index.html`。您应该会看到如图\
  \ 8-4 所示的页面。\n\n![图 8-4](img/471881_2_En_8_Fig4_HTML.jpg)\n\n*图 8-4：与智能合约交互的 Web\
  \ 前端*\n\n在第一个文本框中输入一个字符串，例如 `{ \"id\": \"1234567\", \"result\": { \"math\": \"A\"\
  , \"science\": \"B\", \"english\": \"A\" } }`，然后点击**存储**按钮。您应该会看到 MetaMask 弹出的窗口（见图\
  \ 8-5）。\n\n![图 8-5](img/471881_2_En_8_Fig5_HTML.jpg)\n\n*图 8-5：确认交易，将凭证发送给智能合约进行公证*\n\
  \n点击**确认**以确认交易。交易发送后，您会立即看到交易哈希显示在页面底部（见图 8-6）。\n\n![图 8-6](img/471881_2_En_8_Fig6_HTML.jpg)\n\
  \n*图 8-6：交易哈希显示在页面底部*\n\n一旦包含该交易的区块被挖出，您就可以在第二个文本框中输入相同的凭证，然后点击**检查**按钮，以验证该凭证之前是否已存储在区块链上（见图\
  \ 8-7）。\n\n![图 8-7](img/471881_2_En_8_Fig7_HTML.jpg)\n\n*图 8-7：验证凭证之前是否已存储在区块链上*\n\
  \n如果该凭证之前已存储，您应该会在屏幕底部看到**凭证有效**（见图 8-8）。\n\n![图 8-8](img/471881_2_En_8_Fig8_HTML.jpg)\n\
  \n*图 8-8：凭证验证结果显示在页面底部*\n\n现在来看一下代码是如何工作的。\n\n首先，定义 `loadContract()` 函数，以便加载上一章部署的智能合约。该函数使用合约的\
  \ ABI 和地址返回一个智能合约实例。\n\n\n\n```javascript\n//---加载智能合约---\nasync function loadContract()\
  \ {\n    abi = [ { \"anonymous\": false, \"inputs\": [ { \"indexed\": false, \"\
  internalType\": \"address\", \"name\": \"from\", \"type\": \"address\" }, { \"indexed\"\
  : false, \"internalType\": \"string\", \"name\": \"document\", \"type\": \"string\"\
  \ }, { \"indexed\": false, \"internalType\": \"uint256\", \"name\": \"blockNumber\"\
  , \"type\": \"uint256\" } ], \"name\": \"Result\", \"type\": \"event\" }, { \"inputs\"\
  : [], \"name\": \"cashOut\", \"outputs\": [], \"stateMutability\": \"nonpayable\"\
  , \"type\": \"function\" }, { \"inputs\": [ { \"internalType\": \"string\", \"name\"\
  : \"document\", \"type\": \"string\" } ], \"name\": \"checkEduCredentials\", \"\
  outputs\": [], \"stateMutability\": \"payable\", \"type\": \"function\" }, { \"\
  inputs\": [], \"name\": \"kill\", \"outputs\": [], \"stateMutability\": \"nonpayable\"\
  , \"type\": \"function\" }, { \"inputs\": [ { \"internalType\": \"string\", \"name\"\
  : \"document\", \"type\": \"string\" } ], \"name\": \"storeEduCredentials\", \"\
  outputs\": [], \"stateMutability\": \"nonpayable\", \"type\": \"function\" } ];\n\
  \    address = ‘0x450FdF943afec4036787f4deDA11A34526c53921’\n    return await new\
  \ web3.eth.Contract(abi,address);\n}\n```\n\n**提示**\n\n请将高亮的合约地址替换为你自己部署的合约地址。\n\
  \n在 `load()` 函数中，你调用了 `loadContract()` 函数，同时监听智能合约在返回凭证核验结果时将触发的事件：\n\n```javascript\n\
  async function load() {\n    await loadWeb3();\n    //---加载合约---\n    notarizer\
  \ = await loadContract();\n    //---获取账户---\n    const account = await getCurrentAccount();\n\
  \    //---处理智能合约触发的 Result 事件---\n    notarizer.events.Result()\n        .on('data',\
  \ function(event){\n            if (event.returnValues[0] == account) {\n      \
  \          console.log(event.returnValues[0]);  // from\n                console.log(event.returnValues[1]);\
  \  // text\n                console.log(event.returnValues[2]);  // blocknumber\n\
  \                //---如果 blocknumber 为 0，表示\n                // 未找到凭证---\n     \
  \           if (event.returnValues[2] > 0) {\n                    $(\"#result\"\
  ).html(\"凭证有效\");\n                } else {\n                    $(\"#result\").html(\"\
  凭证无效\");\n                }\n            }\n        });\n...\n```\n\n加载智能合约后，现在你可以通过\
  \ **Store** 按钮调用合约的 `storeEduCredentials()` 函数：\n\n```javascript\n//---将凭证存储到区块链上---\n\
  $(\"#btnStore\").click(async function() {\n    notarizer.methods.storeEduCredentials($(\"\
  #document\").val())\n        .send({from:account})\n        .then(function (tx)\
  \ {\n            $(\"#result\").html(tx.transactionHash);\n        });\n});\n```\n\
  \n请注意，在 `storeEduCredentials()` 函数之后，你使用了 `send()` 函数。当你需要对智能合约执行交易时（例如，当智能合约改变状态变量时），会使用\
  \ `send()` 函数。交易执行后，你将交易哈希显示在网页上名为 `#result` 的标签中。\n\n类似地，为了核验凭证，你调用 `checkEduCredentials()`\
  \ 函数，传入要核验的凭证以及 1000 Wei 的价值：\n\n```javascript\n//---在区块链上核验凭证---\n$(\"#btnCheck\"\
  ).click(async function() {\n    notarizer.methods.checkEduCredentials($(\"#document2\"\
  ).val())\n        .send({from:account, value:1000});\n});\n```\n\n当事件将结果返回给你时，你将结果显示在标签中：\n\
  \n```javascript\n//---处理智能合约触发的 Result 事件---\nnotarizer.events.Result()\n    .on('data',\
  \ function(event){\n        if (event.returnValues[0] == account) {\n          \
  \  console.log(event.returnValues[0]);  // from\n            console.log(event.returnValues[1]);\
  \  // text\n            console.log(event.returnValues[2]);  // blocknumber\n  \
  \          //---如果 blocknumber 为 0，表示\n            // 未找到凭证---\n            if (event.returnValues[2]\
  \ > 0) {\n                $(\"#result\").html(\"凭证有效\");\n            } else {\n\
  \                $(\"#result\").html(\"凭证无效\");\n            }\n        }\n    });\n\
  ```\n\n回想一下，所有需要对智能合约进行付费调用的函数（无论是合约要求的，还是由于合约修改状态变量所要求的）都是交易性的，因此在调用这些智能合约函数时你需要使用\
  \ `send()` 函数。如果你调用非交易性的函数会怎样？在这种情况下，你可以使用 `call()` 函数。\n\n假设 `checkEduCredentials()`\
  \ 函数不需要付费，并直接返回结果：\n\n```javascript\n// 在 EduCredentialsStore.sol 中\n//-----------------------------------------------\n\
  // 检查文档之前是否已保存\n//-----------------------------------------------\nfunction checkEduCredentials(string\
  \ calldata\n    document) public view returns (uint){\n    // 使用字符串的哈希值并检查\n   \
  \ // proofs 映射对象\n    return proofs[proofFor(document)];\n}\n```\n\n要使用 web3.js\
  \ API 调用此函数，请使用 `call()` 函数，如下所示：\n\n```javascript\nnotarizer.methods.checkEduCredentials($(\"\
  #document2\").val())\n    .call(function(error, result) {\n        if(!error) {\n\
  \            console.log(\"结果是 \" + result);\n            if (result > 0) {\n  \
  \              $(\"#result\").html(\"凭证有效\");\n            } else {\n          \
  \      $(\"#result\").html(\"凭证无效\");\n            }\n        } else\n         \
  \   console.error(error);\n    });\n```\n\n## 总结\n\n在本章中，你学习了如何使用 web3.js API 与智能合约进行交互。你学习了如何使用\
  \ web3.js API 构建 Web 前端，以及如何与不同类型的智能合约函数进行交互。在下一章中，你将学习如何使用 Python 与智能合约进行交互。\n\n"
- "# 9. 使用 Python 开发 Web3 去中心化应用\n\n在上一章中，你学习了如何使用 web3.js 库创建 Web3 去中心化应用（dapp）。当使用\
  \ Web 浏览器开发 dapp 时，你可以方便地将应用与 MetaMask 集成，后者持有你在以太坊区块链上的各种账户。当你需要执行交易时，你的 dapp 将依赖\
  \ MetaMask 来签署交易。在后台，MetaMask 连接到一个名为 **Infura** 的节点。\n\nInfura 是一个连接到以太坊区块链的全节点。它为应用提供了一种便捷的方式连接到以太坊区块链，而无需开发者自己搭建节点，后者成本高昂且需要大量精力。图\
  \ 9-1 展示了 dapp、MetaMask、Infura 和以太坊区块链之间的流程。\n\n![](img/471881_2_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1** – MetaMask 如何在后台连接到 Infura\n\n但如果你正在创建的 dapp 不是基于 Web 的呢？那时你如何支付交易费用？这正是本章将要讨论的主题。\n\
  \n## 使用 Python 与以太坊交互\n\n在本章中，我将讨论如何使用 Python 编写 Web3 dapp。对于 Python，你将使用 `web3.py`\
  \ 库，该库允许你使用 Python 与以太坊区块链交互。\n\n**提示**\n\n`web3.py` 的灵感来源于 `web3.js`，因此你会发现许多函数与你在\
  \ `web3.js` 中看到的类似。\n\n当你开发 Python dapp 时，你无法通过连接到 MetaMask 来访问你的账户并使用它来签署交易。相反，你需要导入自己的账户，签署自己的交易，然后自行将其连接到全节点（如\
  \ Infura），如图 9-2 所示。\n\n![](img/471881_2_En_9_Fig2_HTML.jpg)\n\n**图 9-2** – 将你的基于\
  \ Python 的 dapp 连接到 Infura\n\n在接下来的小节中，你将学习如何使用 `web.py` 库通过 Infura 连接到以太坊区块链。\n\
  \n\n\n### 注册 Infura\n\n现在您已经了解了 Python 去中心化应用（dapp）的工作原理，请在 [`https://infura.io`](https://infura.io)\
  \ 创建一个免费账户（参见图 9-3）。\n\n一张 Infura 页面登录窗口的截图。它显示了邮箱和密码选项卡，以及一个注册按钮。\n\n**图 9-3**\
  \ – 在 Infura 注册免费账户\n\n验证电子邮件后，您就可以登录 Infura。创建您的第一个项目（确保在“产品”下选择 **Ethereum**），并为您的项目命名（参见图\
  \ 9-4）。\n\n一张 Infura 页面创建第一个项目的截图。它显示了产品和项目名称选项卡，以及一个提交按钮。\n\n**图 9-4** – 为项目命名\n\
  \n随后，您将获得项目 ID、项目密钥以及供应用程序连接的端点。就本文而言，请选择 Görli 作为端点（参见图 9-5）。\n\n一张 Infura 页面的截图。它在端点选项卡下显示了网络端点的以太坊地址详情。GORLI\
  \ 被突出显示。\n\n**图 9-5** – 选择 Görli (Goerli) 作为端点\n\n复制端点 URL：[`https://ropsten.infura.io/v3/<项目\
  \ ID>`](https://ropsten.infura.io/v3/%253cProject_ID%253e)\n\n### 连接到 Infura\n\n\
  接下来的部分，您将使用 Jupyter Notebook。请创建一个新的 Jupyter Notebook。\n\n**提示：** 如果您是 Jupyter Notebook\
  \ 的新手，请查看这篇介绍文章：[`https://jupyter.org/try-jupyter/retro/notebooks/?path=notebooks/Intro.ipynb`](https://jupyter.org/try-jupyter/retro/notebooks/%253Fpath%253Dnotebooks/Intro.ipynb)\n\
  \n要安装 `web3.py`，请在 Jupyter Notebook 中输入以下命令：\n\n```\n!pip install web3\n```\n\n\
  获取 Infura 端点 URL 后，尝试使用 `web3.py` 库进行连接：\n\n```\nfrom web3 import Web3\nw3 = Web3(Web3.HTTPProvider(\n\
  'https:// goerli.infura.io/v3/'))\nw3.isConnected()\n```\n\n**注意：** 请务必将 `<Project_ID>`\
  \ 替换为您自己的 ID。\n\n`Web3` 类返回一个 Web3 提供者（一个完整节点）的实例。`Web3.HTTPProvider` 类是一个便捷 API，用于访问\
  \ RPC HTTP 提供者（在本例中为 Infura）。\n\n**提示：** RPC 代表远程过程调用。\n\n如果输出显示为 `True`，则表示您已成功连接到\
  \ Infura。\n\n### 获取区块\n\n现在，使用 Web3 对象检查 Goerli 测试网中的最新区块编号：\n\n```\nw3.eth.get_block_number()\n\
  # 7978182\n```\n\n在撰写本文时，Goerli 测试网中的最新区块编号是 `7978182`。\n\n您还可以从 Goerli 测试网络中获取最后一个区块：\n\
  \n```\nw3.eth.get_block('latest')\n```\n\n您将看到类似如下的输出（一个交易哈希数组）：\n\n```\nAttributeDict({'baseFeePerGas':\
  \ 86766563290,\n'difficulty': 0,\n'extraData': HexBytes('0x'),\n'gasLimit': 30000000,\n\
  'gasUsed': 7186794,\n'hash': HexBytes('0x6ab97e687ce253a6e4ada4c05166a47315e60447263e510bb1e5ad85b9eab8b4'),\n\
  'logsBloom': HexBytes(''),\n\
  'miner': '0x4D496CcC28058B1D74B7a19541663E21154f9c84',\n'mixHash': HexBytes('0x8710279fe41af813c450d778c81cff9401e429974249f98cd7fa02f9788f7c25'),\n\
  'nonce': HexBytes('0x0000000000000000'),\n'number': 7969293,\n'parentHash': HexBytes('0xe1de6d5fe21da88f730faef1c39c6fcf58d3899729218c6e8abf58b7163322ad'),\n\
  'receiptsRoot': HexBytes('0x4be7e89e6fe203768fa2899c7363944d913d7b915d75b382a5f871e7d4d39f0f'),\n\
  'sha3Uncles': HexBytes('0x1dcc4de8dec75d7aab85b567b6ccd41ad312451b948a7413f0a142fd40d49347'),\n\
  'size': 109385,\n'stateRoot': HexBytes('0x78c30965c1020934b6a3cfe784b00a3fbf25106c79818a66fc21af676b608ca4'),\n\
  'timestamp': 1668684708,\n'totalDifficulty': 10790000,\n'transactions': [HexBytes('0x8fef9975fcc704e4a518370517d10563ea0a3d3edfa31b5c1bb71fa42fd0a91d'),\n\
  HexBytes('0x0a195f8876d642bbef524c4aa09df48c01471809df9614ea47a692e9f4832f7f'),\n\
  HexBytes('0x5fa6e3cb6230c97555391c85d449b6af60af1d4473cfb98a6cb194b97668110c'),\n\
  ...  HexBytes('0xe60ae4a1b51cb89bd238499c471f1df6e34eaac64ab39b7c7a0258c3c5996bfa')],\n\
  'transactionsRoot': HexBytes('0x8e20604657f9bf48b2ed24ed38c27a6f507dda3e6d8b72e56e47754954398dcf'),\n\
  'uncles': []})\n```\n\n### 设置账户\n\n现在，设置您的以太坊账户。您将使用在 MetaMask 中创建的两个账户。由于需要在 Python\
  \ 程序中加载私钥，建议将私钥存储在环境文件中，以免在 Python 代码中暴露。为此，请安装 **`python-dotenv`** 模块：\n\n```\n\
  !pip install python-dotenv\n```\n\n安装 `python-dotenv` 模块后，创建一个名为 `.env` 的文件，并将其保存在与\
  \ Jupyter notebook 相同的目录中。填入以下内容：\n\n```\naccount1_private_key = '<账户 1_ 私钥>'\n\
  ```\n\n**注意：** 将 `<账户 1_ 私钥>` 替换为账户 1 的私钥。\n\n要获取账户 1 的私钥，请转到 MetaMask 并按照图 9-6\
  \ 中概述的步骤操作。\n\n**图 9-6** – 获取账户 1 的私钥\n\n**注意：** 在处理账户私钥时，请确保没有其他人能访问它们。\n\n获取私钥后，您可以将其粘贴到\
  \ `.env` 文件中。\n\n接下来，使用以下代码片段设置账户 1 和账户 2 的详细信息：\n\n```\nfrom dotenv import load_dotenv\n\
  import os\nload_dotenv()\n# 账户 1\naccount1_address = '0xa18A8E5c8242EF0DF08538C4870C638dD4667815'\n\
  account1_private_key = os.environ.get('account1_private_key')\n# 账户 2\naccount2_address\
  \ = '0x1cc025d9A1741b51FD5dE6003884dc264F149AdC'\n```\n\n稍后，您将仅使用账户 1 来签署交易，因此只需加载账户\
  \ 1 的私钥。\n\n**注意：** 请务必将 `0xa18A8E5c8242EF0DF08538C4870C638dD4667815` 和 `0x1cc025d9A1741b51FD5dE6003884dc264F149AdC`\
  \ 分别替换为您自己的账户 1 和账户 2 的地址。\n\n确保账户 1 和账户 2 在 Goerli 测试网络中已经拥有一些测试以太币。如果没有，请访问 [`https://goerlifaucet.com/`](https://goerlifaucet.com/)\
  \ 获取一些测试以太币。\n\n### 获取账户余额\n\n设置账户后，您要做的第一件事就是检查账户 1 的余额：\n\n```\nw3.eth.get_balance(account1_address)\n\
  ```\n\n您将得到以 Wei 为单位的结果。假设您有 6.2468 ETH。您将得到以下输出（以 Wei 为单位）：\n\n```\n6246800000000000000\n\
  ```\n\n\n\n### 在账户之间转账以太币\n\n现在，让我们从账户 1 向账户 2 转账 1 ETH。这是一个很好的机会，让您学习如何使用`web3.py`手动执行交易。具体步骤如下：\n\
  \n- 首先，使用`eth.get_transaction_count()`函数获取指定账户已发送的交易数量。该值将用作交易的*nonce*（交易序号）：\n\n\
  \    ```\n    nonce = w3.eth.get_transaction_count(account1_address)\n    ```\n\n\
  - 然后，创建一个包含交易详情的数据字典：\n\n    ```\n    tx = {\n    'nonce': nonce,              \
  \        # 交易序号\n    'to': account2_address,              # 接收以太坊的地址\n    'value':\
  \ w3.toWei(1000, 'wei'),      # 转账金额\n    'gasPrice': w3.eth.gas_price,        #\
  \ 获取当前燃料价格\n    }\n    ```\n\n在这段代码中，您正在从账户 1 向账户 2 转账 1000 Wei。您使用`eth.gas_price`属性来获取当前的燃料价格。\n\
  \n- 接下来，使用`eth.estimate_gas()`函数估算这笔交易所需的燃料量，然后将该数量插入到交易字典中：\n\n    ```\n    gas\
  \ = w3.eth.estimate_gas(tx)\n    tx['gas'] = gas\n    print(tx)\n    ```\n\n   \
  \ 您应该会看到如下所示的交易详情：\n\n    ```\n    {\n    'nonce': 4,\n    'to': '0x1cc025d9A1741b51FD5dE6003884dc264F149AdC',\n\
  \    'value': 1000,\n    'gasPrice': 114287036513,\n    'gas': 21000\n    }\n  \
  \  ```\n\n- 现在，您可以使用`eth.account.sign_transaction()`函数，用私钥对交易进行签名：\n\n    ```\n\
  \    signed_tx = w3.eth.account.sign_transaction(tx,account1_private_key)\n    ```\n\
  \n- 要将交易发送至 Infura，请使用`eth.send_raw_transaction()`函数：\n\n    ```\n    tx_hash =\
  \ w3.eth.send_raw_transaction(signed_tx.rawTransaction)\n    print(w3.toHex(tx_hash))\n\
  \    ```\n\n    该函数将返回一个哈希值，如下所示：\n\n    ```\n    0xc23d15f14f20f51b083fe6dab8f953e76b80ce6a3b4c43bfe336d02576eba1da\n\
  \    ```\n\n- 交易需要一些时间才能确认。如果您想等待交易完成，请使用`eth.wait_for_transaction_receipt()`函数（这是一个阻塞调用）：\n\
  \n    ```\n    receipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n    ```\n\
  \n- 最后，为了验证转账是否确实正确执行，检查账户 1 和账户 2 的余额：\n\n    ```\n    print(w3.eth.get_balance(account1_address))\n\
  \    print(w3.eth.get_balance(account2_address))\n    ```\n\n从账户 1 向账户 2 转账 1 ETH\
  \ 的完整代码片段如下所示：\n\n```\nnonce = w3.eth.get_transaction_count(account1_address)\n\
  tx = {\n'nonce': nonce,\n'to': account2_address,\n'value': w3.toWei(1000, 'wei'),\n\
  'gasPrice': w3.eth.gas_price,\n}\ngas = w3.eth.estimate_gas(tx)\ntx['gas'] = gas\n\
  signed_tx = w3.eth.account.sign_transaction(tx,account1_private_key)\ntx_hash =\
  \ w3.eth.send_raw_transaction(signed_tx.rawTransaction)\nprint(w3.toHex(tx_hash))\n\
  receipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n```\n\n### 使用 Python 创建去中心化应用（Dapp）\n\
  \n使用 Python 对交易进行签名非常有用，但您使用`web3.py`库更重要的目标是与其智能合约进行交互。为此，您将使用 Python 与第 7 章中创建的智能合约进行交互。以下是完整的智能合约，供您参考：\n\
  \n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\ncontract EduCredentialsStore\
  \ {\n// 存储合约所有者\naddress owner = msg.sender;\n//---存储字符串的哈希值及其对应的区块号---\n// 键是 bytes32\
  \ 类型，值是 uint 类型\nmapping (bytes32 => uint) private proofs;\n//---定义一个事件---\nevent\
  \ Result(\naddress from,\nstring document,\nuint blockNumber\n);\n//--------------------------------------------------\n\
  // 在合约状态中存储存在性证明\n//--------------------------------------------------\nfunction\
  \ storeProof(bytes32 proof) private {\n// 使用哈希值作为键\nproofs[proof] = block.number;\n\
  }\n//----------------------------------------------\n// 计算并存储文档的证明\n//----------------------------------------------\n\
  function storeEduCredentials(string calldata\ndocument) external {\nrequire(msg.sender\
  \ == owner,\n\"只有合约所有者才能存储凭证\");\n// 使用字符串的哈希值调用 storeProof()\nstoreProof(proofFor(document));\n\
  }\nfunction cashOut() public {\nrequire(msg.sender == owner,\n\"只有合约所有者才能提现！\");\n\
  payable(owner).transfer(\naddress(this).balance);\n}\n//--------------------------------------------\n\
  // 获取文档 sha256 哈希值的辅助函数\n//--------------------------------------------\n// 输入一个字符串，返回该字符串的哈希值\n\
  function proofFor(string calldata document) private\npure returns (bytes32) {\n\
  // 将字符串转换为字节数组，然后对其哈希\nreturn sha256(bytes(document));\n}\n//-----------------------------------------------\n\
  // 检查文档之前是否已被保存\n//-----------------------------------------------\nfunction checkEduCredentials(string\
  \ calldata document) public payable {\nrequire(msg.value == 1000 wei ,\n\"此调用需要\
  \ 1000 wei\");\n// 使用字符串的哈希值，检查 proofs 映射对象，然后触发事件\nemit Result(msg.sender,\ndocument,\n\
  proofs[proofFor(document)]);\n}\n/* 自毁函数 */\nfunction kill() public {\nrequire(msg.sender\
  \ == owner, \"只有所有者才能销毁此合约\");\nselfdestruct(payable(owner));\n}\n}\n```\n\n> **提示：**\
  \ 如果您不记得先前在 Goerli 测试网上部署的该合约地址，请再次部署一次，并记下其地址。\n\n为了演示，我在 Goerli 测试网上的合约地址是`0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330`。此外，您还需要获取合约的\
  \ ABI。为了方便您，现提供如下：\n\n```\n[  {   \"inputs\": [],   \"name\": \"cashOut\",   \"\
  outputs\": [],   \"stateMutability\": \"nonpayable\",   \"type\": \"function\" \
  \ },  {   \"inputs\": [    {     \"internalType\": \"string\",     \"name\": \"\
  document\",     \"type\": \"string\"    }   ],   \"name\": \"checkEduCredentials\"\
  ,   \"outputs\": [],   \"stateMutability\": \"payable\",   \"type\": \"function\"\
  \  },  {   \"inputs\": [],   \"name\": \"kill\",   \"outputs\": [],   \"stateMutability\"\
  : \"nonpayable\",   \"type\": \"function\"  },  {   \"anonymous\": false,   \"inputs\"\
  : [    {     \"indexed\": false,     \"internalType\": \"address\",     \"name\"\
  : \"from\",     \"type\": \"address\"    },    {     \"indexed\": false,     \"\
  internalType\": \"string\",     \"name\": \"document\",     \"type\": \"string\"\
  \    },    {     \"indexed\": false,     \"internalType\": \"uint256\",     \"name\"\
  : \"blockNumber\",     \"type\": \"uint256\"    }   ],   \"name\": \"Result\", \
  \  \"type\": \"event\"  },  {   \"inputs\": [    {     \"internalType\": \"string\"\
  ,     \"name\": \"document\",     \"type\": \"string\"    }   ],   \"name\": \"\
  storeEduCredentials\",   \"outputs\": [],   \"stateMutability\": \"nonpayable\"\
  ,   \"type\": \"function\"  } ]\n```\n\n\n\n### 加载合约\n\n合约部署完成后，我们通过向 `eth.contract()`\
  \ 函数传入合约地址和 ABI，创建一个对它的引用：\n\n```\naddress = '0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330'\n\
  abi = '[  {   \"inputs\": [],   \"name\": \"cashOut\",   \"outputs\": [],   \"stateMutability\"\
  : \"nonpayable\",   \"type\": \"function\"  },  {   \"inputs\": [    {     \"internalType\"\
  : \"string\",     \"name\": \"document\",     \"type\": \"string\"    }   ],   \"\
  name\": \"checkEduCredentials\",   \"outputs\": [],   \"stateMutability\": \"payable\"\
  ,   \"type\": \"function\"  },  {   \"inputs\": [],   \"name\": \"kill\",   \"outputs\"\
  : [],   \"stateMutability\": \"nonpayable\",   \"type\": \"function\"  },  {   \"\
