  \n**图 10-9** - 公布中奖数字\n\n*   输入数字 5（见图 10-9）。\n*   点击 `announceWinners` 按钮。\n\n\
  在 Remix IDE 的底部，你应该会看到智能合约触发的事件（见图 10-10）。\n\n![一段 22 行的程序代码展示了包含赢家数字和金额的智能合约。方框内显示了赢家和金额的语法。](img/471881_2_En_10_Fig10_HTML.jpg)\n\
  \n**图 10-10** - 智能合约触发的事件，包含赢家地址及中奖金额\n\n由于有两位玩家下注了数字 5，因此有两位赢家。第二位和第三位玩家的中奖金额分别为\
  \ 1666 和 3333。中奖金额的计算方式如下：\n\n*   总下注金额 = 5000 Wei\n*   总中奖下注金额 = 1000 + 2000 =\
  \ 3000 Wei\n*   第二位账户的中奖金额 = (1000/3000) * 5000 = 1666 Wei\n*   第三位账户的中奖金额 = (2000/3000)\
  \ * 5000 = 2333 Wei\n\n请注意，由于四舍五入，合约中会剩余 1 Wei 的余额（见图 10-11）。\n\n![已部署合约的截图。包含下拉选项，余额为\
  \ 0.0000000000000000001 ETH。底部有 5 个区块标签：announce、bet、cash out、get game（包含数字 0: uint256:\
  \ 0, 1: uint256: 3）和 get winning 选项。](img/471881_2_En_10_Fig11_HTML.jpg)\n\n**图\
  \ 10-11** - 合约中的余额\n\n点击 `getGameStatus` 按钮，你会看到玩家数量已重置为 0。\n\n### 保存合约的 ABI\n\n\
  为了准备创建投注合约的前端，请点击 **SOLIDITY COMPILER** 选项卡底部的 `ABI` 按钮（见图 10-12）。\n\n![Solidity\
  \ 编译器的截图。包含编译器文本栏以及编译投注方案、编译并运行脚本的按钮。在合约选项下，有下拉选项和发布到 IPFS、发布到 Swarm 以及编译详情的按钮。高亮显示了\
