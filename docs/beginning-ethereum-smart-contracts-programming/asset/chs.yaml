  name\": \"getWinningNumber\", \"outputs\": [ { \"internalType\": \"uint256\", \"\
  name\": \"\", \"type\": \"uint256\" } ], \"stateMutability\": \"view\", \"type\"\
  : \"function\" } ]\n            //---将下面的地址替换为你自己的合约地址---\n            address =\
