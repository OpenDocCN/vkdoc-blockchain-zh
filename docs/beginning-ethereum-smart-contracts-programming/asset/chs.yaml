  \ A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7，底部显示 0 colon u i n t 256 colon\
  \ 1。\n\n图 12-11  \n查找某个账户拥有的 NFT 数量\n\n在此示例中，你可以看到账户 1 当前在 NFT 代币合约中拥有一个 NFT。\n\n\
  #### 获取 NFT 的拥有者\n\n要知道在 NFT 代币合约中，某个特定 NFT（基于代币 ID）属于谁，请输入代币 ID 并点击 **ownerOf**\
  \ 按钮（见图 12-12）。\n\n![](img/471881_2_En_12_Fig12_HTML.jpg)\n\n一个文本框，显示 owner 1，底部显示\
  \ ?0 colon address colon 0 x A F 8 b 6 C A 21023 A 595 F 0 C 4919 b 8 B 4 a 9 d\
  \ 1 F 0 c 1773 e 7。\n\n图 12-12  \n找出特定 NFT 的拥有者\n\n此输出显示代币 ID 1 当前由账户 1 拥有。\n\n\n\
  \n#### 获取 NFT 的 TokenURI\n\n要获取 NFT 的 TokenURI，请输入该 NFT 的令牌 ID，然后点击`tokenURI`按钮（见图\
  \ 12-13）。\n\n![](img/471881_2_En_12_Fig13_HTML.jpg)\n\n底部显示了一个包含令牌 URI 和`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`的文本框。\n\
  \n**图 12-13** 获取 NFT 的 token URI\n\n此输出表明，令牌 ID 1 的 TokenURI 当前设置为[`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky)，这是\
  \ NFT 元数据文件的路径。\n\n#### 将 NFT 转移到另一个账户\n\n要将 NFT 转移到另一个账户，请在`transferFrom`按钮旁边的文本框中按以下格式输入字符串：`<要转出的账户>,<要转入的账户>,<令牌\
  \ ID>`。\n\n以下字符串将 NFT 从账户 1 转移到账户 2（见图 12-14）：\n\n![](img/471881_2_En_12_Fig14_HTML.jpg)\n\
  \n一个文本框，内容为从 `0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7,0x63eE1AEb74c52f09EaB6a2825bB1918B5e045050,1`\
  \ 转移。\n\n**图 12-14** 将 NFT 从账户 1 转移到账户 2\n\n```\n0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7,0x63eE1AEb74c52f09EaB6a2825bB1918B5e045050,1\n\
  ```\n\n> **提示：** 请注意，转移 NFT 代币只能由该 NFT 代币的所有者执行，在本例中为账户 1。\n\n当你点击`transferFrom`按钮时，MetaMask\
  \ 会提示你确认交易（见图 12-15）。请注意，MetaMask 中会显示该 NFT 的图像。\n\n![](img/471881_2_En_12_Fig15_HTML.jpg)\n\
  \nMetaMask 通知窗口的截图。顶部显示账户 1 和账户 2，底部有详情、数据和十六进制选项卡，下方显示预估 Gas 费文本。\n\n**图 12-15**\
  \ 当你执行 NFT 所有权转移时，MetaMask 会显示该 NFT 的图像\n\n一旦交易确认，输入令牌 ID 1，然后点击`ownerOf`按钮，将确认该\
  \ NFT 现在属于账户 2（见图 12-16）。\n\n![](img/471881_2_En_12_Fig16_HTML.jpg)\n\n一个`ownerOf`文本框，底部显示`0x63eE1AEb74c52f09EaB6a2825bB1918B5e045050`。\n\
  \n**图 12-16** 确认 NFT 的所有权\n\n如果你点击`balanceOf`按钮并输入账户 1 的地址，你会看到账户 1 不再持有任何 NFT（见图\
  \ 12-17）。\n\n![](img/471881_2_En_12_Fig17_HTML.jpg)\n\n一个`balanceOf`文本框，底部显示`0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7`和`0`。\n\
  \n**图 12-17** 账户 1 不再持有任何 NFT\n\n> **提示：** 既然账户 2 是 NFT 代币的新所有者，如果账户 2 希望将此 NFT\
