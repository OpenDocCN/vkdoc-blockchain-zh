- "# 导入和导出账户\n\n您可以导出 MetaMask 中的账户，以便它们可以被导入到另一台计算机上。您需要做的就是导出您账户的私钥，然后在另一台计算机上使用相同的私钥导入它。\n\
  \n## 导出账户\n\n要导出一个账户，\n\n![](img/471881_2_En_5_Fig28_HTML.jpg)\n\nGoerli 测试网络界面的截图。它在\
  \ Account 1 下显示了一个列表，其中选择了“账户详情”选项。\n\n图 5-28\n\n查看您的账户详情\n\n- 选择您想要导出的账户。\n- 选择账户名称右侧显示的\
  \ … 并选择 **账户详情**（见图 5-28）。\n\n![](img/471881_2_En_5_Fig29_HTML.jpg)\n\nGoerli 测试网络界面的截图，其上覆盖着\
  \ Account 1 信息弹出框。它显示了二维码、一个代码，以及两个按钮：在以太坊上查看和导出私钥。\n\n图 5-29\n\n导出您账户的私钥\n\n- 点击\
  \ **导出私钥** 按钮（见图 5-29）。\n\n![](img/471881_2_En_5_Fig30_HTML.jpg)\n\nGoerli 测试网络界面的截图，其上覆盖着\
  \ Account 1 信息弹出框。它显示了一条警告信息，内容为切勿泄露密钥。“确认”按钮以深色阴影高亮显示。\n\n图 5-30\n\n查看您账户的私钥\n\n\
  - 输入您的 MetaMask 密码并点击 **确认**（见图 5-30）。\n- 现在您应该可以看到您的私钥。点击它以将其复制到剪贴板，并安全地保存到一个文本文件中。\n\
  \n**警告：** 在以太坊主网中处理账户时，导出私钥时务必非常谨慎，并确保将其保存在安全的位置。一旦私钥泄露，您账户中的资产很容易被盗。当然，在处理测试网络时，就没那么重要了，因为测试网络中的资产没有货币价值。\n\
  \n\n\n### 导入账户\n\n要将账户导入 MetaMask，\n\n![](img/471881_2_En_5_Fig31_HTML.jpg)\n\n\
  Goerli 测试网络界面截图。在“`我的账户`”选项下显示一个列表，其中账户 1 处于选中状态。\n\n**图 5-31** 导入现有账户\n\n- 点击 MetaMask\
  \ 右上角的彩色图标（见图 5-31）。点击**导入账户**。\n\n![](img/471881_2_En_5_Fig32_HTML.jpg)\n\nGoerli\
  \ 测试网络界面截图。导入账户下方显示一条消息，以及一个`私钥`选项卡以及取消和导入按钮。\n\n**图 5-32** 粘贴私钥以导入账户\n\n- 如图 5-32\
  \ 所示，将私钥粘贴到文本框中。点击**导入**。该账户现已导入 MetaMask。\n\n> **提示**  \n> 你只能基于当前不在 MetaMask 中的私钥导入新账户。否则，导入将不会成功。此外，对于使用私钥导入的账户，它们无法通过\
  \ 12 个词的助记词恢复。要恢复这些账户，你必须使用它们的私钥或 JSON 文件。\n\n> **提示**  \n> 将账户导入 MetaMask 有两种方式：使用私钥或\
  \ JSON 文件。在第 4 章中，你了解了存储在 JSON 文件中的账户。你可以用它来将 Geth 中的账户导入 MetaMask。\n\n## 本章小结\n\
  \n在本章中，你了解了如何使用 MetaMask Chrome 扩展程序管理你的以太坊账户。你学习了基础知识：如何创建账户、在账户间转账，以及如何将账户导出和导入\
  \ MetaMask。在接下来的章节中，你将有机会更多地看到 MetaMask 的实际应用，以及它如何帮助你通过网络浏览器运行去中心化应用。\n\n"
- "# 6. 智能合约入门\n\n在上一章中，你学习了如何使用 MetaMask Chrome 扩展程序管理你的以太币，以及如何从 Goerli 测试网获取测试以太币。在本章中，你将学习以太坊最有趣、最激动人心的特性之一：智能合约。你将快速了解智能合约的外观以及如何对其进行测试。在接下来的几章中，你将深入了解智能合约的细节。\n\
  \n## 什么是智能合约？\n\n智能合约本质上是一个驻留在区块链上的应用程序，它可以将值写入区块链本身。由于记录在区块链上的所有数据都是不可篡改且可追溯的，因此智能合约允许你利用区块链作为后端存储来存储永久性数据（例如学生的考试成绩），以便你日后将其用作一种证明形式。\n\
  \n图 6-1 展示了智能合约背后的概念构想。\n\n![](img/471881_2_En_6_Fig1_HTML.jpg)\n\n一张图表展示了包含 n 个区块的区块链，其中包括交易、智能合约以及由智能合约写入的状态变量。\n\
  \n**图 6-1** 除了存储交易，区块链还包含智能合约，智能合约可以将值写入区块链本身\n\n除了存储交易，一个可编程的区块链（如以太坊）还可以存储智能合约。当智能合约被调用时（每个部署到区块链上的智能合约都有一个地址），智能合约可以像应用程序一样执行代码（尽管智能合约能做什么、不能做什么有一些限制）。通常，智能合约可以将值（通常称为**状态变量**）写入区块链。\n\
  \n除了向区块链写入值，智能合约还可以在账户之间转移资金（例如代币和加密货币）。这为开发者编写运行在区块链上的有趣应用程序开辟了多种可能性。比如去中心化的彩票应用？\n\
  \n### 智能合约如何执行\n\n智能合约基本上有两种主要类型的函数：\n\n- 将值写入区块链并因此改变区块链状态的函数\n- 从区块链读取数据的函数\n\n\
  > **注意**  \n> 当你调用一个向区块链写入数据的智能合约函数时，你实际上是在执行一笔改变区块链上存储状态的交易。\n\n当你调用一个改变区块链状态的函数时（例如将学生的考试成绩保存到区块链上），所有矿工/验证者都会执行该智能合约函数（使用\
  \ EVM；更多信息见侧边栏），并将状态变更添加到区块中，以便为挖矿/验证做准备，并最终添加到区块链上。\n\n> **注意**  \n> 本质上，当你调用一个改变区块链状态的函数时，多个节点会运行相同的函数，并尝试将状态变更添加到区块中。最终，只有获胜的矿工/验证者才会将区块添加到区块链上。\n\
  \n对于从区块链读取数据且不对区块链做任何状态变更的函数，连接到函数调用者的节点会执行该函数，直接从其本地区块链副本中读取值，然后将该值返回给调用者。这种方式更为直接，只涉及一个节点。\n\
  \n**以太坊虚拟机（EVM）**\n\nEVM 是节点上运行智能合约的沙盒执行环境。EVM 是*图灵完备*的，这意味着它能够执行任何程序（在大多数情况下）来解决任何合理的计算问题。\n\
  \n如今，你经常会听到*EVM 兼容*这个短语。它意味着某个特定的区块链支持与以太坊虚拟机兼容的智能合约。这使得你用 Solidity（或以太坊支持的任何其他语言）编写的智能合约无需修改即可在其他区块链上运行。\n\
  \n## 你的第一个智能合约\n\n现在你已经准备好编写你的第一个智能合约了。为此，你可以使用你喜欢的任何代码编辑器，例如 Visual Studio Code，甚至是\
  \ `vi`。\n\n> **提示**  \n> Visual Studio Code 有几个 Solidity 扩展，你可以安装这些扩展来简化智能合约的编写。\n\
  \n我个人最喜欢的是 **Remix IDE**。Remix IDE 是一套用于与以太坊区块链交互的工具。它可以将你的智能合约编译成字节码，生成 ABI（应用程序二进制接口），并将你的合约部署到各种以太坊测试网络（以及真实的以太坊区块链）。在线编译合约的能力使其成为学习智能合约编程的便捷工具。因此，我强烈建议你使用它来编写合约。\n\
  \n本书将使用 Remix IDE 来编写智能合约。\n\n> **注意**  \n> 要编译 Solidity 智能合约，你需要使用`solc`编译器。但如果你使用\
  \ Remix IDE，则无需显式使用它来编译你的合约。\n\n\n\n### 使用 Remix IDE\n\n要使用 Remix IDE，请启动 Chrome\
  \ 浏览器并加载以下 URL：[`https://remix.ethereum.org/`](https://remix.ethereum.org/)。您将看到如图\
  \ 6-2 所示的 Remix IDE。\n\n![](img/471881_2_En_6_Fig2_HTML.jpg)\n\n截图显示了 Remix 以太坊\
  \ IDE 窗口，其中列出了工作区下的选项，并包含搜索文档对话框、项目模板和特色插件。\n\n**图 6-2** 使用 Remix IDE 创建您的智能合约\n\
  \n> **提示**  \n> 所有使用 Remix IDE 创建的合约都会存储在浏览器的本地缓存中。\n\n要创建一个新合约，右键点击 `contracts`\
  \ 项并选择 `New File`（参见图 6-3）。系统将提示您为新建的合约命名。将其命名为 `calculator.sol` 并按回车键。\n\n![](img/471881_2_En_6_Fig3_HTML.jpg)\n\
  \n截图展示了文件资源管理器窗口，其中列出了 `contracts` 下的选项，包括新建文件、新建文件夹、重命名、删除、将文件夹发布到 gist 以及复制。\n\
  \n**图 6-3** 在 Remix IDE 中创建新合约\n\n现在，让我们创建一个名为 `Calculator` 的简单合约。在 Remix IDE 中输入以下代码：\n\
  \n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\ncontract Calculator\
  \ {\n    function arithmetics(uint num1, uint num2) public\n        pure returns\
  \ (uint sum, uint product) {\n        sum = num1 + num2;\n        product = num1\
  \ * num2;\n    }\n    function multiply(uint num1, uint num2) public\n        pure\
  \ returns (uint) {\n        return num1 * num2;\n    }\n}\n```\n\n让我们剖析这段代码，了解其工作原理，然后您就可以运行它并查看结果。\n\
  \n合约的第一行指定了合约所使用的许可证类型。这是在 Solidity 0.6.8 中引入的。MIT 许可证是一种宽松的自由软件许可证，起源于 20 世纪 80\
  \ 年代末的麻省理工学院。作为一种宽松许可证，它对重用的限制非常有限，因此具有很高的许可证兼容性。\n\n接下来，`pragma solidity` 语句是一个指令，告诉编译器该源代码是为特定版本的\
  \ Solidity 编写的。在本例中，它兼容 0.8.x 版本（例如，版本 0.8.1、0.8.17 等）。但是，它与 0.7 或 0.9 等版本不兼容。\n\
  \n接下来，`contract` 关键字（可以将其视为 C# 和 Java 等语言中的 `class` 关键字）定义了名为 `Calculator` 的合约。它包含两个函数：\n\
  \n*   `arithmetics`：此函数接受两个参数 `num1` 和 `num2`，类型为 `uint`（无符号整数）。它具有 `public` 访问修饰符，并返回一个包含两个成员\
  \ `sum` 和 `product` 的元组，每个成员的类型都是 `uint`。函数中的两条语句计算两个参数的和与乘积，它们的值会从函数中自动返回。\n\n\
  *   `multiply`：此函数与上一个函数类似，只是返回语句略有不同。在这里，您指定要返回一个 `uint` 类型的值，但并未指定要返回的变量名称。而是使用\
  \ `return` 关键字返回特定变量。\n\n请注意，这两个函数在其声明中都使用了 `pure` 关键字。`pure` 关键字表示该函数不会访问也不会更改*状态变量*的值。这个关键字的使用很重要；由于未对区块链进行任何修改，因此可以在无需网络验证的情况下返回值。因此，调用此函数也是免费的，无需消耗任何\
  \ gas。\n\n> **注意**  \n> 状态变量是区块链上用于存储值的存储空间，例如您在合约中声明的变量。我将在下一章中更详细地讨论状态变量。\n\n\
