  \ 验证 NFT 合约的所有权\n\n## 本章小结\n\n在本章中，你学习了什么是 NFT 以及它是如何工作的。通过使用 ERC-721 合约，你学习了如何铸造\
  \ NFT、转移其所有权以及验证其所有权。希望本章能让你对什么是 NFT 以及如何自己创建一个 NFT 有更清晰的认识。\n\n"
- "# 13. 去中心化金融入门\n\n我们今天非常熟悉的金融体系被称为*传统金融*。它在很大程度上仍然是中心化的，因为其仍然依赖中央机构，主要是银行和政府。然而，传统金融存在若干缺陷，我将在本章中讨论这些问题。\n\
  \n在第 2 章中，你了解了区块链背后的动机，以及它如何解决人们对中央机构的信任问题。利用区块链，我们可以构建一个称为*去中心化金融*（DeFi）的新金融体系。\n\
  \n在本章中，我将首先比较传统金融和 DeFi 之间的差异，然后向你介绍 DeFi 的一个关键组成部分：*稳定币*。你还将学习如何构建一个去中心化交易所（DEX），以便将一种类型的代币兑换成另一种类型。\n\
  \n## 传统金融的局限性\n\n如今，我们在传统金融中会进行一些常见的活动：\n\n*   资金转账\n*   贷款\n*   储蓄计划\n*   保险\n\
  *   股票市场\n\n然而，传统金融存在一些问题/局限性：\n\n*   有些人无法创建银行账户并获取金融服务。例如，由于制裁，某些政治人物可能无法获得金融服务。林郑月娥（香港前领导人）就是一个很好的例子。在美国因中国在香港实施严厉的国家安全法而对其实施制裁后，她无法获得银行服务。\n\
  *   金融服务的隐性收费是你的个人数据。你的财务信息并非秘密；银行里的人知道你有多少资产，并会持续监控你，以便向你推销金融产品。\n*   政府和中心化机构可以随意关闭市场。一个很好的例子发生在\
  \ 2022 年，当时加拿大政府警告说，将冻结与渥太华持续的反强制疫苗抗议活动有关联者的银行账户。\n*   资金转账耗时且成本过高。从一个国家汇款到另一个国家通常需要几个工作日，而且银行通常会收取高额交易费。\n\
  \n### 去中心化金融\n\n通过区块链，我们现在可以拥有一个为互联网时代构建的开放、全球性的金融体系，即去中心化金融（DeFi）。DeFi 是传统金融体系的一种替代方案，传统金融体系不透明、受到严格控制，并且是使用数十年前的技术和系统构建的。\n\
  \n有了 DeFi，我们现在可以：\n\n*   消除（或减少）银行和其他金融公司因使用其服务而收取的费用\n*   有更多选择向世界上任何人借款，而不仅仅是银行\n\
  *   将我们的资金存放在安全的数字钱包中，而不是存放在银行\n*   无需获得任何人批准即可使用我们的资金\n*   在数秒或数分钟内完成资金转账\n\n\n\
  \n### DeFi 的组成部分\n\n要实现 DeFi，需要以下关键组成部分：\n\n- **去中心化基础设施**：一个区块链实现，例如以太坊\n- **支持智能合约的以太坊**：一个很好的例子是\
  \ `ERC-20` 代币标准，它允许您构建*同质化*代币。\n- **稳定币**：稳定币是一种同质化代币，通常与某种资产（如美元、加密货币、黄金等）挂钩。稳定币也可以不锚定任何资产，其价格通过智能合约按算法进行调整。\n\
  \n稳定币在 DeFi 中扮演着非常重要的角色，因为它们不仅取代了法定货币；它们在 DeFi 借贷市场中也是日益重要的资产，用户可以将自己的稳定币锁定在诸如 `Compound`\
  \ 和 `Aave` 这样的平台中，并赚取年化收益率 0.15% 至 12% 的贷款利息。\n\n> **提示**\n> `Compound` 和 `Aave`\
  \ 都是去中心化的加密货币协议，允许用户借出和借入加密货币。\n\n在下一节中，您将了解更多关于稳定币以及当今存在的不同类型的信息。\n\n## 稳定币\n\n\
  在第 11 章中，您了解了 `ERC-20` 规范，它可以用来创建您自己的代币。您还了解到，代币可以作为一种投资形式，并用于支付智能合约服务。在本节中，您将了解代币在现实世界中的一种具体实现，通常被称为*稳定币*。\n\
  \n那么，到底什么是稳定币？稳定币是一种加密货币，其价格锚定于某种参考资产，例如法定货币、其他加密货币或黄金。顾名思义，稳定币旨在抵御其他加密货币无法承受的价格波动。\n\
  \n> **注意**\n> 稳定币的全部目的在于通过保持稳定性来最小化价格波动。\n\n### 稳定币背后的动机\n\n要真正理解稳定币背后的动机，您只需看看比特币就知道了。在\
  \ 2011 年，一 `BTC`（比特币）价值大约 1 美元。然而，在 2021 年的峰值时，一 `BTC` 价值超过 65,000 美元。想象一下，在 2011\
  \ 年用四 `BTC` 支付两杯星巴克咖啡的费用。同样的四 `BTC` 在 2021 年可以为您买一辆法拉利！\n\n显然，由于价格的剧烈波动，将比特币用作法定货币替代品的目标是不可行的！\n\
  \n稳定币主要有三种类型：\n\n- **法币抵押稳定币**：由 `USD`、`EUR`、`GBP` 或其他法定货币支持的稳定币\n- **加密货币抵押稳定币**：由其他加密货币如以太坊和比特币支持的稳定币\n\
  - **无抵押稳定币**：也称为算法稳定币，这类稳定币不持有任何形式的抵押品。为了保持价值稳定，它们依赖智能合约，根据市场需求改变稳定币的供应量。\n- **商品抵押稳定币**：由黄金等商品支持的稳定币。一个代币等值于一单位所锚定的商品（例如一盎司黄金）。\n\
  \n以下各节将更详细地讨论前三种类型的稳定币。\n\n### 法币抵押稳定币\n\n法币抵押稳定币是一种由法定货币（如美元、欧元或英镑）支持的稳定币。法币抵押稳定币的一个很好的例子是\
  \ **USD Coin** (**USDC**)。\n\n> **注意**\n> USD Coin 由一个名为 Centre 的联盟管理，该联盟由 Circle\
  \ 创立，成员包括加密货币交易所 Coinbase 和比特币挖矿公司 Bitmain（Circle 的投资方）。\n\n图 13-1 显示了 USDC 的工作方式。\n\
  \n![](img/471881_2_En_13_Fig1_HTML.jpg)\n\n*示意图展示了用户将 1 美元存入发行人的银行账户，这 1 美元将被保存在美国监管金融机构的账户中，发行人使用智能合约生成\
  \ 1 个 USDC 并将其发送给用户。*\n\n**图 13-1** – 购买 USDC 时发生的情况\n\n购买 USDC 的步骤：\n\n1. 用户将 1\
  \ 美元发送到发行人的银行账户。\n2. 这 1 美元将被保存在美国监管的发行人银行账户中。\n3. 发行人使用智能合约生成一个 `USDC` `ERC-20`\
  \ 代币。\n4. 然后 `USDC` 代币被转移到用户的钱包中。\n\n那么，您为什么要购买 USDC？使用 USDC，您无需传统银行账户，即可廉价且近乎即时地向全球任何地方汇款（相对于可能费用高昂且耗时数日的电汇，这是一个巨大的进步）。您还可以通过在\
  \ Coinbase 账户中持有的 USDC 获得奖励。此外，您还可以通过在各种去中心化金融 (DeFi) 应用程序中借出您的 USDC 来获得更高的收益。\n\
  \n#### 法币抵押稳定币示例\n\n除了 USDC，其他法币抵押稳定币的例子还包括 **BUSD** (Binance USD)、**TUSD** (True\
  \ USD) 和 **USDT** (USD Tether)。\n\n### 加密货币抵押稳定币\n\n下一种类型的稳定币是加密货币抵押稳定币。加密货币抵押稳定币不是将稳定币与法定货币挂钩，而是与某些加密货币挂钩。\n\
  \n加密货币抵押稳定币的一个很好的例子是 **DAI**。`DAI` 是一种运行在以太坊上的加密货币抵押稳定币，旨在保持每个代币的价值为 1 美元。与法币抵押稳定币不同，`DAI`\
  \ 不由银行账户中的美元支持。相反，它由 `Maker DAO` 平台上的加密货币抵押品支持。`Maker DAO` 是一个以太坊区块链上进行借贷、储蓄以及发行稳定加密货币的技术开发组织。\n\
  \n> **提示**\n> `DAO` 代表去中心化自治组织。\n\n#### 到底什么是 `DAO`？\n\n`DAO` 的核心思想是，它是一个被设计为由代码（在以太坊世界中本质上就是智能合约）自动运行和管理的组织。乍一看，`DAO`\
  \ 的想法似乎很奇怪。但让我们看看当今组织是如何运作的（图 13-2）。\n\n![](img/471881_2_En_13_Fig2_HTML.jpg)\n\n\
  *示意图以苹果和微软的组织或公司开始，引出董事会会议，股东对公司决策进行投票，CEO 执行计划。*\n\n**图 13-2** – 当今组织的运作方式\n\n\
  一个典型的组织有董事会成员，他们召开董事会会议来讨论和规划公司的战略方向。董事会做出的重大决策必须得到股东批准，股东对公司的决策进行投票。投票统计完成后，公司的\
  \ CEO 执行该计划。\n\n而一个 `DAO` 则没有董事会成员。相反，`DAO` 是使用智能合约创建的。`DAO` 的核心是 `DAO` 的代币，该代币用于管理组织内的成员资格以及\
  \ `DAO` 内部的结构（图 13-3）。\n\n![](img/471881_2_En_13_Fig3_HTML.jpg)\n\n*示意图显示拥有不同数量代币的用户，他们有权提议\
  \ DAO 和投票选择项目，然后 DAO 启动代币。*\n\n**图 13-3** – `DAO` 的运作方式\n\n`DAO` 中的每个成员可以持有不同数量的代币，这赋予了他们提议和投票选择项目的投票权。\n\
  \n> **提示**\n> 要了解更多关于 `DAO` 的信息，请查阅我在 [`https://bit.ly/3iviryS`](https://bit.ly/3iviryS)\
  \ 上的文章。\n\n\n\n#### DAI 的工作原理\n\n图 13-4 展示了用户如何购买 DAI。\n\n![](img/471881_2_En_13_Fig4_HTML.jpg)\n\
  \n这张图表展示了用户与 Maker DAO 的 Oasis 借款面板之间的交互关系。用户持有价值 15,000 美元的加密货币，前往 Maker DAO，使用价值\
  \ 15,000 美元的以太币作为抵押品，生成 10,000 DAI。Maker 将 10,000 DAI 提供给用户，并收取稳定费。\n\n**图 13-4**\
  \ 当你购买 DAI 时会发生什么\n\n1.  用户前往 Maker DAO，使用价值 15,000 美元的加密货币（例如以太币、BAT 等）借入 10,000\
  \ DAI。这些加密货币将作为所借 10,000 DAI 的抵押品。\n2.  Maker DAO 为用户生成 10,000 DAI。\n3.  Maker DAO\
  \ 将 10,000 DAI 发送给用户，并向用户收取稳定费。\n\n> **提示**  \n> 据 Maker DAO 的创始人 Rune Christensen\
  \ 称，DAI 基于汉字“貸”，意为“借出或贷款”。\n\n在这个例子中，以太币的**抵押率**为 150%（其他加密货币的抵押率各不相同）。这种超额抵押机制是为了应对加密货币的波动性。\n\
  \nDAI 的价格通过一个自动执行的智能合约系统来维持稳定。如果 DAI 的价格偏离一美元过远，Maker DAO 将调整利率以稳定 DAI 的价格。\n\n\
  > **提示**  \n> 你还可以从所有主流交易所（如 Kraken 和 Coinbase）购买 DAI。你可以使用法定货币兑换 DAI，或者出售部分加密资产来换取\
  \ DAI。\n\n#### DAI 如何保持稳定？\n\nMaker DAO 控制着 DAI 的智能合约，包括可接受的抵押品类型、抵押率以及利率。当 DAI\
  \ 的价格低于 1 美元时，Maker DAO 会提高贷款的利率。这会激励客户抛售其持有的 DAI 并结清贷款。被归还的 DAI 随后被销毁，从而减少供应量，推动\
  \ DAI 价格回升；反之，当 DAI 价格高于 1 美元时，则会采取相反的措施。\n\n对智能合约的所有更改对所有区块链参与者都是透明的，因此这是完全去中心化的。\n\
  \nDAI 既可以用于支付智能合约的费用，也可以用于产生被动收入。你可以将你的 DAI 存入一个**DAI 储蓄率**（DSR）计划来赚取利息。\n\n####\
  \ 加密货币抵押型稳定币示例\n\n除了 DAI 之外，其他加密货币抵押型稳定币的例子还包括 `WBTC`（Wrapped Bitcoin）和 `MIM`（Magic\
  \ Internet Money）。\n\n#### DAI 的清算\n\n由于 DAI 使用加密货币作为抵押品，而加密货币价格波动剧烈，如果以太币价格下跌会发生什么？在这种情况下，Maker\
  \ DAO 会执行一个称为**清算**的过程。图 13-5 展示了清算的公式。\n\n![](img/471881_2_En_13_Fig5_HTML.jpg)\n\
  \n一个等式显示：`清算率 = 1.5`，`清算价格 = （生成的 DAI * 清算率） / 抵押品数量`。\n\n**图 13-5** 计算清算价格的公式\n\
  \n以下是公式中各个变量的含义：\n\n*   **清算率**是指用于抵押 DAI 的加密货币等价价值与 DAI 的比率。如果价值 1.5 美元的加密货币兑换\
  \ 1 DAI，那么清算率就是 1.5。\n*   **清算价格**是指抵押品将被拍卖，并将余额返还给 DAI 购买者的价格。\n*   **生成的 DAI**\
  \ 是为用户生成的 DAI 数量。\n*   **抵押品数量**是指用作抵押品的加密货币单位（例如 1 个或 2 个以太币等）。\n\n让我们通过一个例子来理解清算是如何运作的。在撰写本文时，**清算率**为\
  \ **1.5**，这意味着如果 1 个以太币目前价值 150 美元，它可以兑换 100 个 DAI。由此，**清算价格**将是 `(100 DAI * 1.5)\
  \ / 1 以太币 = 150 美元`。\n\n> **提示**  \n> 清算价格意味着，如果一个以太币跌破 150 美元，该金库将被关闭，抵押品将被拍卖。Maker\
  \ 协议通过称为 Maker **金库**的智能合约生成新的 DAI。\n\n如果 1 个以太币跌至，比如说，140 美元（<150 美元），金库就会被清算！因此，建议不要提取所有生成的\
  \ DAI。假设只提取了 90 DAI，那么**清算价格**变为 `(90 * 1.5) / 1 = 135 美元`。因此，即使以太币跌至 140 美元，也不会发生清算。\n\
  \n为了防止清算，你可以：\n\n*   **增加更多抵押品**：假设你增加了更多抵押品（例如，额外增加 0.5 个以太币），那么清算价格将变为 `(100 *\
  \ 1.5) / 1.5 = 100 美元`。这大大降低了清算价格。\n*   **偿还 DAI**：假设你现在偿还 20 DAI（从一笔 100 DAI 的贷款中），那么清算价格将变为\
  \ `(80 * 1.5) / 1 = 120 美元`。同样，这也大大降低了清算价格。\n\n如果金库被清算，将向金库所有者（DAI 的购买者）收取 13% 的清算罚金。这笔费用会加到金库未偿还的\
  \ DAI 贷款总额中，这将导致更多的抵押品在拍卖中被出售。拍卖后，所有者将获得剩余的抵押品。\n\n#### 与当铺运作方式的相似性\n\n整个清算过程与现实世界中当铺的运作方式非常相似。流程如下：\n\
  \n*   你拿一些有价值的东西（比如黄金）去当铺，并以此作为抵押品。\n*   当铺根据抵押品借给你钱。如果黄金价值 15,000 美元，当铺会给你大约 10,000\
  \ 美元。这种超额抵押是为了在黄金价格下跌时保护当铺的利益。\n*   当你偿还贷款加上利息后，你会拿回你的抵押品。\n*   如果你不偿还贷款，当铺就会保留抵押品。\n\
  \n### 无抵押型稳定币\n\n无抵押型稳定币，也称为算法稳定币，不使用任何储备资产。相反，它们使用智能合约来调节其价格。例如，如果某个代币的交易价格远高于其目标价格，系统就会通过增发来增加供应量，然后在公开市场上出售。供应量会一直增加，直到价格回到\
  \ 1 美元。同样，如果代币交易价格过低，智能合约会在市场上买入更多代币以减少供应量。\n\n#### 无抵押型稳定币示例\n\n一些算法稳定币的例子包括 `Ampleforth`、`Carbon`\
  \ 和 `Basis`。\n\n\n\n"
- "# 加密货币交易所\n\n在讨论了这么多关于加密货币（代币）和通证的话题后，一个关键问题仍然存在：你该如何购买它们？答案是：通过交易所。加密货币交易所是一个可以买卖加密货币的平台。加密货币交易所分为两种类型：\n\
  \n-   **中心化交易所**（CEX）：CEX 通常允许你使用法定货币购买加密货币。CEX 的例子包括 Coinbase（`www.coinbase.com`）、Binance（`www.binance.com`）和\
  \ Kraken（`www.kraken.com`）。大多数 CEX 还允许你将一种通证兑换成另一种通证。\n\n-   **去中心化交易所**（DEX）：DEX\
  \ 是一个点对点的市场，交易直接在加密货币交易者之间进行。DEX 允许你在没有中介（如 CEX）的情况下兑换通证。DEX 是通过智能合约实现的。\n\n对于大多数加密货币初学者来说，CEX\
  \ 提供了一个用户友好的平台，便于进入加密货币世界。用户无需深入了解加密货币的运作原理，就可以使用信用卡按固定价格（通常如此）购买加密货币。然而，CEX 也存在一些你应该了解的风险。首先，始终存在信用违约的风险（想想\
  \ FTX、CoinBene 和 Celsius）。\n\n**提示**：访问 `www.cryptowisser.com/exchange-graveyard/`\
  \ 可以查看已关闭的交易所列表。\n\n其次，CEX 需要遵守 KYC（了解你的客户）和 AML（反洗钱）法规，这首先就违背了使用加密货币的初衷（匿名性）。顾名思义，CEX\
  \ 是中心化的，因为它们通常受其运营所在国家政府的监管。最后，CEX 容易受到网络攻击和安全漏洞的影响。如图 13-6 所示，当你从 CEX 购买加密货币时，你的加密货币存储在由\
  \ CEX 维护的钱包中。除非你将加密货币转移到你自己的钱包（如 MetaMask 或硬件钱包），否则 CEX 的安全漏洞将使你的加密货币面临风险，因为黑客可能非法地将你的加密货币转移到其他钱包。\n\
  \n![一张插图显示了 CEX 在区块链中维护用户的加密货币，而加密货币则存储在用户钱包中。](img/471881_2_En_13_Fig6_HTML.jpg)\n\
  \n**图 13-6** — CEX 存储你的加密货币，这些加密货币容易受到网络攻击\n\n另一方面，DEX 没有 CEX 的那些限制。通过使用智能合约，DEX\
  \ 允许你轻松快捷地将一种类型的通证兑换成另一种。这使用户能够完全灵活地控制自己的资金。\n\n**提示**：一些流行的 DEX 包括 Uniswap、Sushiswap\
  \ 和 Pancakeswap。\n\n### 创建去中心化交易所\n\n由于 DEX 是通过智能合约实现的，因此通过应用你在本书前 12 章中学到的所有知识来理解它们的工作原理是非常有意义的。在本节中，你将创建一个\
  \ DEX 合约，允许用户兑换两种不同的 ERC-20 通证。\n\n### 创建通证合约\n\n让我们在 Remix IDE 中创建一个新的通证合约，并将其命名为\
  \ `token.sol`。用以下语句填充它：\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity\
  \ ⁰.8;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
  ;\ncontract MyToken is ERC20 {\n    // 价格表示为 1 个以太币可以购买多少\n    uint256 public unitsOneEthCanBuy\
  \  = 10;\n    // 通证的拥有者\n    address public tokenOwner;\n    constructor(string\
  \ memory name, string memory symbol) ERC20(name, symbol) {\n        // 通证拥有者的地址\n\
  \        tokenOwner = msg.sender;\n        // ERC20 通证有 18 位小数\n        // 铸造的通证数量\
  \ = n * 10¹⁸\n        uint256 n = 1000;\n        _mint(msg.sender, n * 10**uint(decimals()));\n\
  \    }\n}\n```\n\n这个合约与你之前在第十一章中看到的基本 ERC-20 通证合约相同。\n\n### 部署通证合约\n\n在这个示例中，你需要两个拥有一些测试以太币的账户：账户\
  \ 1 和账户 2。你将使用这两个账户来创建两个通证：WML 和 LWM 通证。\n\n使用账户 1，通过以下构造函数参数部署 `MyToken` 合约（另见图\
  \ 13-7）：\n\n![合约对话框的截图，其中包含 My Token 合约、部署按钮以及发布到 IPFS 选项。](img/471881_2_En_13_Fig7_HTML.jpg)\n\
  \n**图 13-7** — 部署第一个通证 WML\n\n```\n\"WML token\",\"WML\"\n```\n\n这创建了 WML 通证。接下来，使用账户\
  \ 2 部署相同的通证合约，这次使用以下构造函数参数：\n\n```\n\"LWM token\",\"LWM\"\n```\n\n这创建了 LWM 通证。此时，Remix\
  \ IDE 应该已经部署了这些通证合约，如图 13-8 所示。\n\n![已部署合约的截图，显示了区块链中账户 1 和账户 2 的两个通证及其地址。](img/471881_2_En_13_Fig8_HTML.jpg)\n\
  \n**图 13-8** — 创建的两个通证及其地址\n\n记录通证的地址：\n\n-   WML 通证：`0xfa8b8F0fd75ABf2aF088bf2D1115E6F97ED0cB3a`\n\
  -   LWM 通证：`0x234273bD4D1aa3D233135dD49A26675dA7eF6A9a`\n\n**提示**：请将上述合约地址替换为你自己的地址。\n\
  \n在 MetaMask 中将两个通证添加到账户 1 和账户 2。此时，账户 1 和账户 2 应该拥有如图 13-9 所示的通证余额。\n\n![两个截图展示了账户\
  \ 1 和账户 2 的资产页面。页面上有购买、发送和兑换选项。](img/471881_2_En_13_Fig9_HTML.jpg)\n\n**图 13-9**\
  \ — 两个账户中的通证余额\n\n\n\n### 创建 DEX 合约\n\n创建好两种代币后，现在我们来创建 DEX 合约。在创建合约之前，你需要先了解用户如何使用\
  \ DEX 合约来兑换代币。\n\n图 13-10 总结了用户将 `WML` 代币兑换为 `LWM` 代币时的事件流程。\n\n![](img/471881_2_En_13_Fig10_HTML.jpg)\n\
  \n图示展示了发送者批准 WML 代币进行转移，并批准 WML 代币给 DEX 合约；DEX 合约验证发送者已批准将 WML 代币发送给它；然后 DEX 合约将\
  \ LWM 代币发回给发送者。\n\n**图 13-10** DEX 合约的工作原理\n\n1.  发送者调用代币合约的 `approve()` 函数，授权将\
  \ WML 代币转移到 DEX 合约。\n2.  发送者将 WML 代币发送到 DEX 合约。\n3.  DEX 合约需要验证发送者已授权将 WML 代币转移给它。如果验证通过，WML\
  \ 代币将从发送者转移到 DEX 合约。\n4.  DEX 合约计算要转移的 LWM 代币数量，并将其发送给发送者。\n\n**提示** 所有代币转移都涉及代币合约更新用户和\
  \ DEX 合约持有的代币数量。\n\n在 Remix IDE 中，创建一个名为 `DEX.sol` 的新合约，并用以下语句填充它：\n\n```\n// SPDX-License-Identifier:\
  \ MIT\npragma solidity ⁰.8;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
  ;\ncontract DEX {\n    ERC20 WML_token;\n    ERC20 LWM_token;\n    //=======================\n\
  \    // constructor of the DEX\n    //=======================\n    constructor()\
  \ payable{\n        //---be sure to replace the following addresses with your own---\n\
  \        WML_token = ERC20(address(\n            0xfa8b8F0fd75ABf2aF088bf2D1115E6F97ED0cB3a));\n\
  \        LWM_token = ERC20(address(\n            0x234273bD4D1aa3D233135dD49A26675dA7eF6A9a));\n\
  \    }\n    //===================================\n    // find the tokens balance\
  \ in the DEX\n    //===================================\n    function getBalance()\
  \ public view returns (uint256,uint256) {\n        return (WML_token.balanceOf(address(this)),\n\
  \                LWM_token.balanceOf(address(this)));\n    }\n    function compareStrings(string\
  \ memory a, string memory b)\n        private pure returns (bool) {\n        return\
  \ (keccak256(abi.encodePacked((a))) ==\n                keccak256(abi.encodePacked((b))));\n\
  \    }\n    //================\n    // exchange tokens\n    //================\n\
  \    function exchange(string calldata from_token,\n                      string\
  \ calldata to_token,\n                      uint256 amount) public {\n        //\
  \ Remember that all transactions are based on the smallest units in the token\n\
  \        //=========\n        // CHECK #1\n        //=========\n        // ensure\
  \ the amount to convert is > 0\n        require(amount > 0, \"You need to convert\
  \ at least some tokens\");\n        // record the token contracts to convert from\
  \ and to\n        ERC20 from;  // the tokens to convert from\n        ERC20 to;\
  \    // the tokens to convert to\n        if (compareStrings(from_token, \"WML\"\
  )) {\n            from = WML_token;\n        } else {\n            from = LWM_token;\n\
  \        }\n        if (compareStrings(to_token, \"WML\")) {\n            to = WML_token;\n\
  \        } else {\n            to = LWM_token;\n        }\n        // obtain the\
  \ allowance set by the sender to send to this DEX\n        uint256 approvedAmt;\n\
  \        approvedAmt = from.allowance(msg.sender, address(this));\n        //=========\n\
  \        // CHECK #2\n        //=========\n        // ensure the sender has enough\
  \ tokens approved to convert\n        require(approvedAmt >= amount,\n         \
  \       \"Token allowance is less than what you want to convert\");\n        //=========\n\
  \        // CHECK #3\n        //=========\n        // get the balance of tokens\
  \ (that the sender wants to convert to) in the pool\n        uint256 dexBalance\
  \ = to.balanceOf(address(this));\n        // need to check that DEX has enough \"\
  to\" token to send to sender\n        require(amount <= dexBalance,\n          \
  \      \"Sorry, not enough tokens in the DEX\");\n        // transfer the tokens\
  \ from sender to DEX\n        from.transferFrom(msg.sender, address(this), amount);\n\
  \        // transfer the exchanged tokens to the sender\n        to.transfer(msg.sender,\
  \ amount);\n    }\n}\n```\n\n以下是 DEX 合约的详细信息：\n\n- 你需要导入由 OpenZeppelin 编写的 ERC-20\
  \ 代币合约的基础定义。\n- 在构造函数中，你创建了要兑换的两个代币的实例（都是 `ERC20` 代币的实例）。如果你想尝试，请记得更改为你自己的 WML 和\
  \ LWM 代币的合约地址。\n- 你有一个名为 `getBalance()` 的函数。它返回 DEX 合约持有的 WML 和 LWM 代币的余额。\n- 在\
  \ Solidity 中，你不能使用 `==` 运算符来比较字符串。要比较字符串，你需要比较它们的哈希值。`compareStrings()` 辅助函数用于比较两个字符串以检查它们是否相同。\n\
  - `exchange()` 函数允许两种代币进行兑换。为简单起见，假设一个单位的 WML 代币等价于一个单位的 LWM 代币。\n- 在兑换代币之前，你需要执行多项检查。首先，确保要兑换的数量大于\
  \ 0。其次，确保执行兑换的账户已授权将其（要兑换出的）代币发送到 DEX。最后一项检查是确保 DEX 有足够的代币用于兑换。\n- 一旦所有检查通过，DEX\
  \ 可以将代币从调用者转移到 DEX，然后将调用者想要兑换成的代币转移给调用者。\n\n现在你可以部署 DEX 合约（使用账户 1 或账户 2 都可以）。\n\n\
