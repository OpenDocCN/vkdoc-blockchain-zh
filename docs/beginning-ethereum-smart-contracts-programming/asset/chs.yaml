  \n将 ABI 粘贴到文本文件中，以便日后参考。以下是 ABI，供你方便使用：\n\n```\n[ { \"anonymous\": false, \"inputs\"\
  : [ { \"indexed\": false, \"internalType\": \"uint256\", \"name\": \"players\",\
  \ \"type\": \"uint256\" }, { \"indexed\": false, \"internalType\": \"uint256\",\
  \ \"name\": \"maxPlayers\", \"type\": \"uint256\" } ], \"name\": \"Status\", \"\
  type\": \"event\" }, { \"anonymous\": false, \"inputs\": [ { \"indexed\": false,\
  \ \"internalType\": \"address\", \"name\": \"winner\", \"type\": \"address\" },\
  \ { \"indexed\": false, \"internalType\": \"uint256\", \"name\": \"amount\", \"\
  type\": \"uint256\" } ], \"name\": \"Winner\", \"type\": \"event\" }, { \"inputs\"\
  : [ { \"internalType\": \"uint256\", \"name\": \"winningNumber\", \"type\": \"uint256\"\
  \ } ], \"name\": \"announceWinners\", \"outputs\": [], \"stateMutability\": \"nonpayable\"\
  , \"type\": \"function\" }, { \"inputs\": [ { \"internalType\": \"uint256\", \"\
  name\": \"number\", \"type\": \"uint256\" } ], \"name\": \"bet\", \"outputs\": [],\
  \ \"stateMutability\": \"payable\", \"type\": \"function\" }, { \"inputs\": [],\
  \ \"name\": \"cashOut\", \"outputs\": [], \"stateMutability\": \"nonpayable\", \"\
  type\": \"function\" }, { \"inputs\": [], \"name\": \"getGameStatus\", \"outputs\"\
  : [ { \"internalType\": \"uint256\", \"name\": \"\", \"type\": \"uint256\" }, {\
  \ \"internalType\": \"uint256\", \"name\": \"\", \"type\": \"uint256\" } ], \"stateMutability\"\
  : \"view\", \"type\": \"function\" }, { \"inputs\": [], \"name\": \"getWinningNumber\"\
  , \"outputs\": [ { \"internalType\": \"uint256\", \"name\": \"\", \"type\": \"uint256\"\
  \ } ], \"stateMutability\": \"view\", \"type\": \"function\" } ]\n```\n\n\n\n###\
  \ 将合约部署到测试网\n\n合约经过测试并确认运行正常后，就可以将其部署到 Goerli 测试网，这样就可以构建一个与之交互的前端界面了。\n\n在 MetaMask\
  \ 中，请确保已连接到 Goerli 测试网。然后，回到 Remix IDE 中，将环境切换为 `Injected Provider – MetaMask`（见图\
  \ 10-13）。\n\n![](img/471881_2_En_10_Fig13_HTML.jpg)\n\n**图 10-13** – 将环境切换为 `Injected\
  \ Provider – MetaMask`\n\n点击 `Deploy` 按钮来部署合约。作为参考，我部署的合约地址是 `0xA0a4a98562587211CAbdC910721e0020A52AcE11`。\n\
  \n## 创建 Web 前端\n\n现在，让我们为这个彩票游戏创建 Web 前端。新建一个文本文件，命名为 `OnlineBetting.html`，并将其保存在\
