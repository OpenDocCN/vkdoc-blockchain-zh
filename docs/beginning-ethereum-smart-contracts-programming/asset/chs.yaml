  \ 函数结束-----\n    </script>\n</body>\n</html>\n```\n\n> **注意：** 请记得将合约地址替换为你自己的地址。\n\
  \n要在终端中测试 Web 前端，请键入以下命令：\n\n```bash\n$ cd ~/webprojects\n$ serve\n```\n\n使用三个 Chrome\
  \ 浏览器实例，每个浏览器都加载以下 URL：`http://localhost:3000/OnlineBetting.html`。您应该会看到它们都显示相同的状态（见图\
  \ 10-14）。\n\n![](img/471881_2_En_10_Fig14_HTML.jpg)\n\n**图 10-14** – 三个 Chrome 浏览器实例显示相同的页面和游戏状态\n\
  \n使用账户 1（左侧浏览器），对数字 1 下注 2 个 Ether，然后点击 `Bet` 按钮。请注意，MetaMask 会弹出一个窗口，显示将要发送到合约的金额。点击\
  \ `CONFIRM`。一旦点击 `CONFIRM` 按钮，第一个浏览器会显示消息“下注已提交”。过一会儿（当交易被确认后），该应用还会显示另外两条消息（可能不按特定顺序显示；见图\
  \ 10-15）：\n\n![](img/471881_2_En_10_Fig15_HTML.jpg)\n\n**图 10-15** – 提交下注以及交易被确认后你会看到的消息\n\
  \n*   游戏状态: 1 / 3\n*   下注已被接受\n\n在第二个浏览器上：\n\n*   使用账户 2，对数字 5 下注 1000 Wei。\n* \
  \  点击 `Bet` 按钮。\n\n在第三个浏览器上：\n\n*   使用账户 3，对数字 5 下注 2000 Wei。\n*   点击 `Bet` 按钮。\n\
  \n\n\n### 公布中奖号码\n\n与之前在 Remix IDE 中测试合约时一样，您可以通过 `announceWinners` 按钮公布中奖号码。\n\n\
  使用账户 1（合约拥有者），\n\n![](img/471881_2_En_10_Fig16_HTML.jpg)\n\n已部署合约的截图。包含下拉选项以及余额\
  \ 0.0000000000000000005 ETH。底部有 5 个区块标签：发布、投注、提现、获取游戏状态和获取中奖选项。\n\n图 10-16 — 通过\
  \ Remix IDE 公布中奖者\n\n- 输入数字 5（见图 10-16）。\n- 点击 `announceWinners` 按钮。\n\n当交易被确认后，中奖者将被公布（见图\
  \ 10-17）。\n\n![](img/471881_2_En_10_Fig17_HTML.jpg)\n\nChrome 浏览器的截图，页面包含以太坊彩票的标题。投注数字为\
  \ 1，投注的 wei 数量为 2000。界面上显示“投注”按钮。游戏状态显示为 0/3、1/3、2/3、3/3，并展示了中奖者公告和金额。\n\n图 10-17\
  \ — 显示中奖者及其奖金的应用程序\n\n### 提现\n\n如果合约中有余额，您可以通过点击 Remix IDE 中的 `cashOut` 按钮进行提现（提现给合约拥有者），如图\
  \ 10-18 所示。\n\n![](img/471881_2_En_10_Fig18_HTML.jpg)\n\n已部署合约的截图。包含 5 个区块选项：发布、投注、提现、获取游戏状态和获取中奖选项。其中“发布”和“投注”选项有下拉菜单。\n\
  \n图 10-18 — 从合约中提现\n\n**提示：** 在点击 `cashOut` 按钮前，请确保将账户设置为账户 1。\n\n## 完整合约\n\n为了方便您查阅，此处列出了完整合约：\n\
  \n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\nimport \"@openzeppelin/contracts/utils/Strings.sol\"\
  ;\ncontract Betting {\n// 记录合约的拥有者\naddress owner = msg.sender;\n// 最小投注额（以 wei\
  \ 为单位）\nuint constant MIN_WAGER = 1000;\n// 每轮允许的最大玩家数量\nuint constant MAX_NUMBER_OF_PLAYERS\
  \ = 3;\n// 投注数字范围，从 1 到 MAX_NUMBER_TO_BET\nuint constant MAX_NUMBER_TO_BET = 10;\n\
  // 当前所有玩家的总投注额\nuint totalWager = 0;\n// 当前已投注的玩家数量\nuint numberOfPlayers = 0;\n\
  // 中奖号码\nuint winningBetNumber = 0;\n// 所有玩家地址的数组\naddress payable [MAX_NUMBER_OF_PLAYERS]\
  \ playerAddressesArray;\n// 存储每个玩家的投注详情\nstruct Player {\nuint amountWagered;\n\
  uint numberWagered;\n}\n// 使用映射对象存储所有玩家的投注详情\nmapping(address => Player) playerDetailsMapping;\n\
  //---定义事件---\nevent Winner(\naddress winner,\nuint amount\n);\n// 用于显示游戏状态的事件\n\
  event Status (\nuint players,\nuint maxPlayers\n);\nfunction getGameStatus() view\
  \ public returns (uint, uint) {\n// 返回游戏状态\nreturn (numberOfPlayers, MAX_NUMBER_OF_PLAYERS);\n\
  }\nfunction getWinningNumber() view public returns (uint) {\n// 返回中奖号码\nreturn winningBetNumber;\n\
  }\nfunction cashOut() public {\nrequire(msg.sender == owner,\n\"只有合约拥有者才能提现！\");\n\
  payable(owner).transfer(address(this).balance);\n}\nfunction bet(uint number) public\
  \ payable {\n// 检查 #1\n// 确保未达到最大玩家数量\nrequire(numberOfPlayers =1 && number = MIN_WAGER,\n\
  string.concat(\"最低投注额为 \",\nStrings.toString(MIN_WAGER), \" wei\"));\n// 记录该玩家投注的数字和金额\n\
  playerDetailsMapping[msg.sender].amountWagered = msg.value;\nplayerDetailsMapping[msg.sender].numberWagered\
  \ = number;\n// 将玩家地址添加到地址数组中\nplayerAddressesArray[numberOfPlayers] = payable(msg.sender);\n\
  numberOfPlayers++;\ntotalWager += msg.value;\n// 触发 Status 事件\nemit Status(numberOfPlayers,\
  \ MAX_NUMBER_OF_PLAYERS);\n}\nfunction announceWinners(uint winningNumber) public\
  \ {\nrequire(msg.sender == owner,\n\"只有合约拥有者才能公布中奖者\");\nwinningBetNumber = winningNumber;\n\
  // 用于存储中奖者\naddress payable[MAX_NUMBER_OF_PLAYERS] memory winners;\nuint winnerCount\
  \ = 0;\nuint totalWinningWager = 0;\n// 找出中奖者\nfor (uint i=0; i < playerAddressesArray.length;\
  \ i++) {\n// 获取每位玩家的地址\naddress payable playerAddress = playerAddressesArray[i];\n\
  // 如果该玩家投注的数字是中奖号码\nif (playerDetailsMapping[playerAddress].numberWagered ==\nwinningNumber)\
  \ {\n// 将该玩家地址保存到中奖者数组中\nwinners[winnerCount] = playerAddress;\n// 汇总中奖号码对应的总投注额\n\
  totalWinningWager +=\nplayerDetailsMapping[playerAddress].amountWagered;\nwinnerCount++;\n\
  }\n}\n// 向每位中奖玩家付款\nfor (uint j=0; j<winnerCount; j++) {\n// 计算每位玩家的奖金\nuint amount\
  \ = (playerDetailsMapping[winners[j]].amountWagered *\ntotalWager ) / totalWinningWager;\n\
  // 向玩家付款\nwinners[j].transfer(amount);\n// 触发 Winner 事件\nemit Winner(winners[j],\
  \ amount);\n}\n// 重置变量\nnumberOfPlayers = 0;\ntotalWager = 0;\n// 清除所有数组和映射\nfor\
  \ (uint i=0; i < playerAddressesArray.length; i++) {\n// 获取每位玩家的地址\naddress payable\
  \ playerAddress = playerAddressesArray[i];\ndelete playerDetailsMapping[playerAddress];\n\
  delete playerAddressesArray[i];\n}\n// 触发 Status 事件\nemit Status(numberOfPlayers,\
  \ MAX_NUMBER_OF_PLAYERS);\n}\n}\n```\n\n## 本章小结\n\n在本章中，您学习了如何构建一个在线彩票游戏。除了运用前几章学到的知识外，您还学到了一些新内容：\n\
  - 如何以编程方式将以太币转账到另一个账户\n- 如何在 Solidity 中使用各种数据结构来存储数据\n\n下一章，您将学习代币以及如何在智能合约中使用它们。\n\
  \n"
- '# 11. 创建您的代币


  如果您一直跟随前几章的学习，您应该对以太坊智能合约以及如何通过 web3.js API 与之交互有了相当不错的理解。


  以太坊智能合约的一个激动人心的特性是以太坊代币。代币是构建在以太坊区块链之上的数字资产。开发者可以用它们来支付智能合约提供的服务，也可以作为筹资的一种手段。代币同时也驱动了对以太币（以太坊区块链上的原生加密货币）的需求。


  在本章中，您将学习什么是代币、如何创建代币、如何购买代币以及如何将它们添加到您的 MetaMask 账户中。




  '
- "# 什么是代币？\n\n要理解代币的概念，我们先从一个现实生活中的类比说起。大多数人对游乐场（或狂欢节）都很熟悉。在游乐场玩游戏时，摊位通常不接受现金支付。相反，他们需要你兑换现金（或使用信用卡）来购买硬币（或代币），以便在游戏摊位上使用（见图\
  \ 11-1）。\n\n![](img/471881_2_En_11_Fig1_HTML.jpg)\n\n一张插图，展示法币兑换成用于游乐场游戏的代币的过程。\n\
  \n图 11-1\n现实世界中在游乐场游戏里使用的代币\n\n游乐场老板这样做有多种原因：\n\n-   摊位无需处理现金；这样可以防止摊位工作人员（通常是游乐场老板的雇员）私自截留现金。\n\
  -   在你开始玩游戏之前，游乐场老板就已预先收到现金，而未使用的代币无法退款。\n-   游乐场老板想通过给予你预先购买更多代币的激励，向你销售超过你实际需要的代币。\n\
  \n在加密货币世界中，相同的概念也适用于代币。你并非直接用法定货币购买代币，而是先购买以太币，然后用以太币来购买代币（见图 11-2）。\n\n![](img/471881_2_En_11_Fig2_HTML.jpg)\n\
  \n一张插图，展示法定货币兑换成以太币，然后以太币用于购买代币，该代币用于在以太坊网络上运行的智能合约中。\n\n图 11-2\n以太坊区块链上的代币\n\n\
  ## 币（Coin）与代币（Token）\n\n在加密货币世界中，有两个术语经常被混用：*币*和*代币*。那么它们是一样的吗？首先，*币*的定义是，它是一种原生存在于其自身区块链上的资产。比特币、莱特币和以太币都是币的例子。这些币各自存在于它们自己的区块链上。而*代币*则是在现有的区块链上创建的。最常见的代币平台是以太坊，它允许开发者使用\
  \ ERC-20 标准创建自己的代币（本章后续部分将详细介绍）。用户可以使用以太币（以太坊区块链的原生币）在以太坊区块链上兑换特定的代币。因此，严格来说，币和代币并不相同。事实上，代币是基于币的。\n\
  \n## 代币是如何实现的？\n\n现在你已经清楚了代币及其工作原理，让我们来看看代币在以太坊中是如何实现的。\n\n代币是通过智能合约（没错，就是你在前几章读到的智能合约）来实现的，这种合约被称为*代币合约*。代币合约是一种包含账户地址及其余额映射关系的智能合约。图\
  \ 11-3 展示了这种映射的一个例子。\n\n![](img/471881_2_En_11_Fig3_HTML.png)\n\n一个四行两列的表格。列标题是“账户地址”和“余额”。总代币数为\
  \ 200。\n\n图 11-3\n代币合约包含账户地址及其余额的映射\n\n从概念上讲，代币合约是一种维护映射对象的智能合约，该映射对象在区块链上记录了账户的余额（见图\
  \ 11-4）。\n\n![](img/471881_2_En_11_Fig4_HTML.jpg)\n\n一张示意图，展示包含 `n` 个区块的区块链。其中一个区块中的智能合约信息被传递到包含多个账户地址的状态变量中。\n\
  \n图 11-4\n代币合约维护一个包含账户地址及其余额的映射对象\n\n## 铸造新代币\n\n代币的总供应量可以通过*铸造*新代币来增加。也就是说，你（代币合约的所有者）只需增加一个账户的余额，如图\
  \ 11-5 所示。\n\n![](img/471881_2_En_11_Fig5_HTML.png)\n\n一个四行两列的表格。列标题是“账户地址”和“余额”。总代币数为\
  \ 300。\n\n图 11-5\n通过增加一个或多个账户的余额来铸造新代币\n\n## 销毁代币\n\n代币的总供应量可以通过销毁代币来减少。也就是说，你减少一个账户的余额，如图\
  \ 11-6 所示。\n\n![](img/471881_2_En_11_Fig6_HTML.png)\n\n一个四行两列的表格。列标题是“账户地址”和“余额”。总代币数为\
  \ 270。\n\n图 11-6\n通过减少一个账户的余额来销毁代币\n\n代币也可以通过发送到死地址的方式销毁，如图 11-7 所示。请注意，在这种情况下，代币的总供应量不会改变。\n\
  \n![](img/471881_2_En_11_Fig7_HTML.png)\n\n一个四行两列的表格。列标题是“账户地址”和“余额”。总代币数为 270。\n\
  \n图 11-7\n通过将代币发送到死地址来销毁。在这种情况下，总供应量不变\n\n## 代币合约内部使用的单位\n\n在代币合约中，*精度小数位*表示一个代币的可分割程度。考虑一个虚构代币\
  \ `MusicToken` 的例子，每个代币代表拥有一首歌的权利。在这种情况下，*精度小数位* 设为 0。这意味着代币不能有小数部分；你不能拥有 1.1 或\
  \ 1.5 个代币。换句话说，一个人可以拥有的 `MusicToken` 数量必须是离散的数字（只能是整数值）。图 11-8 展示了 `MusicToken`\
  \ 在代币合约内部的表示方式。\n\n![](img/471881_2_En_11_Fig8_HTML.png)\n\n一个关于内部表示精度的表格，精度为 0\
  \ music token。它有 4 行 2 列。列标题是“账户地址”和“余额”。总代币数为 15。\n\n图 11-8\n精度小数位为 0 的代币没有小数部分\n\
  \n再考虑另一个例子，虚构的 `GoldToken`，它代表一个人拥有的黄金数量。在这种情况下，精度小数位可以设为 3，这意味着一个人拥有的 `GoldToken`\
  \ 数量可以精确到小数点后 3 位，例如 2.003。图 11-9 展示了 `GoldToken` 的余额在内部是如何表示的，以及用户看到的视图是什么样的。\n\
  \n![](img/471881_2_En_11_Fig9_HTML.png)\n\n两个表格。表格 1 是 GoldToken 的内部表示，表格 2 是给用户看的视图。有\
  \ 4 行 2 列。列标题是“账户地址”和“余额”。表格 1 中总代币数为 15000，表格 2 中总代币数为 15。\n\n图 11-9\n精度为三位小数的代币：内部存储方式与外部查看方式\n\
  \n在内部，对于一个具有 `n` 位精度小数的代币，余额使用以下公式表示：`token_internal = token_external * 10^n`。例如，一个用户可能拥有\
  \ 4.497 个 `GoldToken`，但在内部，代币合约将其余额存储为 4497。\n\n\n\n### ERC-20 代币标准\n\n为了让基于以太坊区块链创建的代币能够被智能合约接受，这些代币必须遵循特定的标准。对于以太坊代币而言，该标准即为\
  \ ERC-20。`ERC` 代表*以太坊征求意见提案（Ethereum Request for Comments）*。在 `ERC-20` 中，数字 20 指的是提案\
  \ ID 号。`ERC-20` 提案定义了一组规则，代币必须满足这些规则才能与其他代币进行交互。\n\n> **提示：** `ERC-20` 标准是一组特定的函数，开发者必须在其同质化代币中使用。同质化代币意味着该代币是可分割的，可以分解成更小的面额（例如，1\
  \ 个代币等同于 0.5 个代币、0.3 个代币和 0.2 个代币的总和）。\n\n`ERC20` 代币必须能够执行以下操作：\n\n-   获取代币总供应量。\n\
  -   获取账户余额。\n-   将代币从一个账户转移到另一个账户。\n-   批准将代币用作货币资产。\n\n具体来说，`ERC20` 代币必须实现以下接口：\n\
  \n```\ncontract ERC20Interface {\nfunction totalSupply() public constant returns\
  \ (uint);\nfunction balanceOf(address tokenOwner) public constant\nreturns (uint\
  \ balance);\nfunction allowance(address tokenOwner, address\nspender) public constant\
  \ returns (uint remaining);\nfunction transfer(address to, uint tokens) public\n\
  returns (bool success);\nfunction approve(address spender, uint tokens) public\n\
  returns (bool success);\nfunction transferFrom(address from, address to, uint\n\
  tokens) public returns (bool success);\nevent Transfer(address indexed from, address\
  \ indexed\nto, uint tokens);\nevent Approval(address indexed tokenOwner, address\n\
  indexed spender, uint tokens);\n}\n```\n\n以下是 `ERC20Interface` 中各个函数和事件的用途：\n\n\
  -   `totalSupply`: 返回代币总供应量。\n-   `balanceOf(address _owner)`: 返回 `_owner` 的账户余额。\n\
  -   `transfer(address _to, uint256 _value)`: 将 `_value` 数量的代币转移到 `_to` 地址，并触发 `Transfer`\
  \ 事件。如果 `_from` 账户没有足够的代币可花费，该函数应回退。\n-   `approve(address _spender, uint256 _value)`:\
  \ 允许 `_spender` 从该账户中多次提取代币，总提取额不超过 `_value`。\n-   `transferFrom(address _from,\
  \ address _to, uint256 _value)`: 将 `_value` 数量的代币从 `_from` 转移到 `_to`，并触发 `Transfer`\
  \ 事件。除非 `_from` 账户已通过某种机制故意授权了消息发送者，否则该函数应回退。\n-   `allowance(address _owner, address\
  \ _spender)`: 返回 `_spender` 仍被允许从 `_owner` 账户中提取的代币数量。\n-   `Transfer(address indexed\
  \ _from, address indexed _to, uint256 _value)`: 在代币转移时必须触发，包括零值转移。\n-   `Approval(address\
  \ indexed _owner, address indexed _spender, uint256 _value)`: 在成功调用 `approve(address\
  \ _spender, uint256 _value)` 时必须触发。\n\n## 创建代币合约\n\n与其自行实现所有这些函数和事件，不如使用 OpenZeppelin\
  \ 提供的 ERC-20 基础实现。你可以在以下位置找到此实现：[`https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol/`](https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol/)\
  \ 。\n\n> **注意：** OpenZeppelin 是一个用于构建安全智能合约的开源框架。OpenZeppelin 提供了一套完整的安全产品和审计服务，用于构建、管理和检查去中心化应用的软件开发和运营的各个方面。\n\
  \n因此，如果你正在编写一个 ERC-20 代币合约，只需从 OpenZeppelin 导入基础实现并继承它即可。\n\n对于你的示例，在 Remix IDE\
  \ 中创建一个新合约，并将其命名为 `token.sol`。用以下语句填充它：\n\n```\n// SPDX-License-Identifier: MIT\n\
  pragma solidity ⁰.8;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
  ;\ncontract MyToken is ERC20 {\nconstructor(string memory name, string memory symbol)\n\
  ERC20(name, symbol) {\n// ERC20 tokens by default have 18 decimals\n// number of\
  \ tokens minted = n * 10¹⁸\nuint256 n = 1000;\n_mint(msg.sender, n * 10**uint(decimals()));\n\
  }\n}\n```\n\n在此合约中，你正在创建 1000 个代币（`n` 的值），并且每个代币最多可以有 18 位小数精度（因为 `decimals()` 函数默认返回\
  \ 18）。在合约内部，铸造的代币数量取决于 `n` 和精度。在此示例中，虽然总供应量是 1000 个代币，但铸造的基础代币总单位等于 **1000 x 10¹⁸**，即\
  \ **1,000,000,000,000,000,000,000**。\n\n> **提示：** 所有涉及代币的操作都基于基础代币单位。例如，如果我想向另一个账户发送\
  \ 1 个代币，我必须向收款账户转移 1,000,000,000,000,000,000 个基础代币单位的代币。\n\n### 覆盖小数位数精度\n\n代币合约中的\
  \ `decimals()` 函数默认返回 18。这意味着你创建的代币的最小面额可小至 0.000000000000000001（18 位小数）。但是，有时你可能并不需要代币拥有这种精度。例如，如果你不希望代币被分割，可以像这样覆盖代币合约中的\
  \ `decimals()` 函数：\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\n\
  import \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
  ;\ncontract MyToken is ERC20 {\nconstructor(string memory name, string memory symbol)\n\
  ERC20(name, symbol) {\n// ERC20 tokens have 18 decimals\n// number of tokens minted\
  \ = n * 10¹⁸\nuint256 n = 1000;\n_mint(msg.sender, n * 10**uint(decimals()));\n\
  }\nfunction decimals() override public pure returns (uint8) {\nreturn 0;\n}\n}\n\
  ```\n\n在此示例中，`decimals()` 函数返回 0，这意味着你的代币没有任何小数位。如果返回 1，你的代币的最小面额则为 0.1。\n\n为简化起见，你的代币合约将使用默认的\
  \ 18 位小数精度。\n\n### 部署代币合约\n\n要部署代币合约，你必须指定两个参数：\n\n-   代币的名称（描述）\n-   代币的符号\n\n\
  > **提示：** 代币的符号并非唯一，但你应尽量将其控制在三到四个字符以内。\n\n图 11-10 展示了一个代币的名称和符号示例。点击**部署**按钮来部署代币合约。\n\
  \n![对话框截图显示部署选项卡，其中包含用户名和 W M L 下拉菜单，以及发布到 I P F S 的复选框。](img/471881_2_En_11_Fig10_HTML.jpg)\n\
  \n**图 11-10** — 使用名称和符号部署代币合约\n\n合约部署完成后，你可以展开合约名称查看各种函数（参见图 11-11）。这些是你的 ERC-20\
  \ 代币合约（由 OpenZeppelin 基础合约实现）需要实现的函数。\n\n![已部署合约对话框截图列出了区块链中代币合约的各种函数。](img/471881_2_En_11_Fig11_HTML.jpg)\n\
  \n**图 11-11** — ERC-20 代币合约中定义的各种函数\n\n复制已部署的代币合约地址（参见图 11-12）。\n\n![已部署合约对话框截图显示了区块链中的代币合约，并高亮显示了复制选项。](img/471881_2_En_11_Fig12_HTML.jpg)\n\
  \n**图 11-12** — 已部署的代币合约（将其地址复制到剪贴板）\n\n\n\n### 将代币添加到 MetaMask\n\n在 MetaMask 中，点击**资产**选项卡，然后点击屏幕底部的**导入代币**链接（见图\
  \ 11-13）。在下一个页面中，粘贴你从 Remix IDE 复制的代币合约地址。代币符号将自动显示。点击**添加自定义代币**按钮。你将看到你的账户拥有 1000\
  \ 个 WML 代币。请确保你添加代币的账户与部署代币合约的账户是同一个。\n\n![](img/471881_2_En_11_Fig13_HTML.jpg)\n\
  \n账户 1 的 MetaMask 通知页面的三张截图，显示资产和导入 WML 代币，以及返回和突出显示的导入代币按钮。\n\n**图 11-13** 将代币添加到\
  \ MetaMask\n\n### 你能用代币做什么？\n\n既然你已经创建了代币，你能用它做什么呢？由你来为代币创造一种实用功能。你可以将代币推广为一种投资形式，或者是你正在出售的资产（例如房产或证券）的代表。\n\
  \n要出售代币，你可以要求接收方以法定货币向你付款，然后你将代币转移给他们。或者，你也可以编写你的代币合约来接收以太币，然后通过编程方式将代币转移给以太币的发送方。\n\
  \n### 使用代币进行智能合约支付\n\n在本书的第 7 章和第 10 章中，你编写了一个接受以太币作为服务费用的合约（`checkEduCredentials()`\
  \ 函数）。如果不用以太币，而是接受代币作为支付方式呢？嗯，这很容易实现。让我们修改第 10 章的 `EduCredentialsStore.sol` 合约，添加以下粗体显示的额外语句：\n\
  \n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\nimport \"./token.sol\"\
  ;\ncontract EduCredentialsStore {\n// 存储合约的所有者\naddress owner = msg.sender;\nMyToken\
  \ token = MyToken(address(\n0xc276658A795E05374CE2BCB160c22b6A4b9eE16C));\n//---存储字符串的哈希值及其对应的区块号---\n\
  // 键是 bytes32，值是 uint\nmapping (bytes32 => uint) private proofs;\n//---定义一个事件---\n\
  event Document(\naddress from,\nbytes32 hash,\nuint blockNumber\n);\n//==========================================\n\
  // 返回合约中的代币余额\n//==========================================\nfunction getBalance()\
  \ public view returns (uint256) {\nreturn token.balanceOf(address(this));\n}\n//--------------------------------------------------\n\
  // 在合约状态中存储存在性证明\n//--------------------------------------------------\nfunction\
  \ storeProof(bytes32 proof) private {\n// 使用哈希作为键\nproofs[proof] = block.number;\n\
  // 触发事件\nemit Document(msg.sender, proof, block.number);\n}\n//----------------------------------------------\n\
  // 计算并存储文档的证明\n//----------------------------------------------\nfunction storeEduCredentials(string\
  \ calldata\ndocument) external {\nrequire(msg.sender == owner,\n\"只有合约所有者才能存储凭据\"\
  );\n// 使用字符串的哈希调用 storeProof()\nstoreProof(proofFor(document));\n}\n//--------------------------------------------\n\
  // 辅助函数，获取文档的 sha256 哈希值\n//--------------------------------------------\n// 接收字符串并返回该字符串的哈希值\n\
  function proofFor(string calldata document) private\npure returns (bytes32) {\n\
  // 将字符串转换为字节数组然后进行哈希\nreturn sha256(bytes(document));\n}\n//-----------------------------------------------\n\
  // 检查文档之前是否已被保存\n//-----------------------------------------------\nfunction checkEduCredentials(string\
  \ calldata\ndocument) public payable returns (uint){\n// require(msg.value == 1000\
  \ wei,\n//   \"此调用需要 1000 wei\");\n// msg.sender 是调用代币合约的账户\n// 检查调用者设置的授权额度\nuint256\
  \ approvedAmt =\ntoken.allowance(msg.sender, address(this));\n// 金额基于代币的基本单位\nuint\
  \ requiredAmt = 1000;\n// 确保调用者已批准足够的代币支付给合约\nrequire(approvedAmt >= requiredAmt,\n\
  \"批准的代币额度少于你需要支付的金额\");\n// 将代币从发送者转移到代币合约\ntoken.transferFrom(msg.sender,\npayable(address(this)),\
  \ requiredAmt);\n// 使用字符串的哈希值并检查 proofs 映射对象\nreturn proofs[proofFor(document)];\n\
  }\nfunction cashOut() public {\nrequire(msg.sender == owner,\n\"只有合约所有者才能提现！\");\n\
  payable(owner).transfer(address(this).balance);\n}\n}\n```\n\n通过添加这些粗体显示的语句，你对 `EduCredentialsStore`\
  \ 合约做了以下修改：\n\n- 导入 `token.sol` 代币合约。这是你在本章前面部署的代币合约。\n- 创建一个 `MyToken` 合约的实例。你需要指定已部署代币合约的地址。\n\
  - 添加一个名为 `getBalance()` 的函数。这使你能够了解智能合约持有的代币余额。\n\n\n\n修改`checkEduCredentials()`函数，使其不再接受\
  \ Ether 支付，而只接受代币支付。为此，首先检查合约调用者已授权给本合约使用的代币数量。然后，确认授权使用的代币数量至少为 1000 base units（这是调用此服务的费用）。如果授权数量足够，则将代币转入本合约。\n\
  \n重新部署`EduCredentialsStore`合约，并记下其地址（见图 11-14）。在示例中，部署的合约地址为`0x913286326233118493F2D5eA62dCA2E90133452B`。\n\
  \n![已部署的合约截图，包括代币合约和凭证存储合约及其多个函数，并高亮显示了复制标签。](img/471881_2_En_11_Fig14_HTML.jpg)\n\
  \n**图 11-14** 重新部署修改后的智能合约以接受代币支付\n\n在调用`checkEduCredentials()`函数（现在要求支付 1000 base\
  \ units 的代币而非 1000 Wei）之前，代币所有者（即你）需要授权向智能合约支付 1000 base units 的代币。为此，需要使用以下值调用代币合约的`approve()`函数（另见图\
  \ 11-15）：\n\n```\n0x913286326233118493F2D5eA62dCA2E90133452B,1000\n```\n\n此值表示你希望授权支出\
  \ 1000 base units 的代币给指定的智能合约地址（`0x913286326233118493F2D5eA62dCA2E90133452B`）。\n\
  \n![已部署的合约截图，包括代币合约及其 approve、decrease 和 increase 函数。](img/471881_2_En_11_Fig15_HTML.jpg)\n\
  \n**图 11-15** 授权在智能合约上使用代币\n\n点击**approve**按钮，MetaMask 将显示如图 11-16 所示的提示。点击**Confirm**以批准你的代币在智能合约上使用。\n\
  \n![MetaMask 通知页面截图，包括智能合约支付权限、地址和交易费用。确认按钮已高亮。](img/471881_2_En_11_Fig16_HTML.jpg)\n\
  \n**图 11-16** 授予在智能合约上支出代币的权限\n\n现在可以调用`checkEduCredentials()`函数（见图 11-17）。\n\n\
  ![已部署的合约截图，包括代币合约凭证存储及其 cash-out、checkEduCredentials、storeEduCredentials 和 getBalance\
  \ 函数。](img/471881_2_En_11_Fig17_HTML.jpg)\n\n**图 11-17** 调用`checkEduCredentials()`函数\n\
  \n交易确认后，1000 base units 的代币将被转入智能合约。如果在 Etherscan 上查看交易，你会观察到 ERC-20 代币的转账记录（见图\
  \ 11-18）。\n\n![Goerli 交易哈希窗口截图，列出概览下的多个选项及函数，并高亮显示了 ERC-20 代币转账。](img/471881_2_En_11_Fig18_HTML.jpg)\n\
  \n**图 11-18** Etherscan 记录了代币从账户到智能合约的转账\n\n要验证合约确实收到了代币，请点击**getBalance**按钮（见图\
  \ 11-19）。你应该会看到值为`1000`。\n\n![已部署的合约截图，包括 checkEduCredentials、storeEduCredentials\
  \ 和 getBalance 函数，getBalance 按钮已高亮。](img/471881_2_En_11_Fig19_HTML.jpg)\n\n**图 11-19**\
  \ 查询智能合约中的代币余额\n\n在 MetaMask 中，你还会看到持有代币的账户余额减少了（见图 11-20）。这是因为 1000 base units\
  \ 的代币已作为支付费用转入了智能合约。\n\n![MetaMask 通知页面截图，包括资产列表，高亮显示了 999.99999 WML 代币，以及购买、发送和交换按钮。](img/471881_2_En_11_Fig20_HTML.jpg)\n\
  \n**图 11-20** 账户的代币余额也相应减少\n\n## 以编程方式出售代币\n\n在之前的代币合约中，你了解了代币如何在部署合约时被铸造，以及如何从一个账户转移到另一个账户。一旦账户持有代币，它就可以将代币转移给任意账户。\n\
  \n但是，如何通过代币赚钱呢？在现实世界中，你可能希望出售代币以换取 Ether。事实上，你可以通过直接在代币合约中编写代码来实现这一点。\n\n以下是改进后的代币合约版本，允许使用\
  \ Ether 购买代币：\n\n```\n// SPDX-License-Identifier: MIT\npragma solidity ⁰.8;\nimport\
  \ \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/v4.0.0/contracts/token/ERC20/ERC20.sol\"\
  ;\ncontract MyToken is ERC20 {\n// price expressed as how much an ether can buy\n\
  uint256 public unitsOneEthCanBuy  = 10;\n// the owner of the token\naddress public\
  \ tokenOwner;\nconstructor(string memory name, string memory symbol)\nERC20(name,\
  \ symbol) {\n// address of the token owner\ntokenOwner = msg.sender;\n// ERC20 tokens\
  \ have 18 decimals\n// number of tokens minted = n * 10¹⁸\nuint256 n = 1000;\n_mint(msg.sender,\
  \ n * 10**uint(decimals()));\n}\n// this function is called when someone sends ether\
  \ to the token contract\nreceive() external payable {\n// msg.value (in Wei) is\
  \ the ether sent to the token contract\n// msg.sender is the account that sends\
  \ the ether to the\n// token contract\n// amount is the tokens bought by the sender\n\
  uint256 amount = msg.value * unitsOneEthCanBuy;\n// ensure you have enough tokens\
  \ to sell\nrequire(balanceOf(tokenOwner) >= amount, \"Not enough tokens\");\n//\
  \ transfer the token to the buyer\n_transfer(tokenOwner, msg.sender, amount);\n\
  // emit an event to inform of the transfer\nemit Transfer(tokenOwner, msg.sender,\
  \ amount);\n// send the ether earned to the token owner\npayable(tokenOwner).transfer(msg.value);\n\
  }\n}\n```\n\n让我们剖析一下上面修改后的合约。\n\n*   首先，使用`unitsOneEthCanBuy`变量定义代币的价格（下一节将更详细地讨论）。\n\
  *   需要保存此代币合约所有者的地址，因此声明一个名为`tokenOwner`的变量，并在代币合约的构造函数中初始化它。\n*   添加一个名为`receive()`的新函数，并带有`payable`关键字。当\
  \ Ether 被发送到合约时，会自动调用`receive()`函数。在此函数内部，会为你自动创建两个变量：\n    *   `msg.value`：这是发送到合约的\
  \ Wei 数量。\n    *   `msg.sender`：这是调用合约的发送者地址。\n\n\n\n### 计算购买的代币数量\n\n要出售代币，你需要为其定价。如前所述，你可以定义\
  \ `unitsOneEthCanBuy` 变量来间接表示代币的价格，该价格表达为用 1 个以太币可以购买到的代币数量。图 11-21 展示了如何推导出最终公式，即\
  \ 1 Wei 可以购买 10 个代币（基于 18 位小数的精度单位）。\n\n![](img/471881_2_En_11_Fig21_HTML.jpg)\n\
  \n流程图说明，1 Wei 可购买 10 个代币，这是基于 1 个以太币可购买的代币数量得出的。\n\n图 11-21：用以太币表示代币价格\n\n基于这个公式，你现在可以轻松计算出用户向你的代币合约发送以太币时能购买多少代币。图\
  \ 11-22 展示了当用户向你的代币合约发送 2 个以太币时，会获得多少代币。\n\n![](img/471881_2_En_11_Fig22_HTML.jpg)\n\
  \n流程图展示，用户使用 2 个以太币的消息价值（以 Wei 为单位）可以购买 2 倍于 10 的 18 次方乘以 10 个代币的数量。\n\n图 11-22：计算买方能购买多少代币\n\
  \n通过以上解释，您现在知道用户可购买的代币数量为：\n\n```\n// amount 是发送者购买的代币数量\nuint256 amount = msg.value\
  \ * unitsOneEthCanBuy;\n```\n\n为了将代币出售给用户，你需要确保合约拥有足够的代币，因此使用 `require()` 函数进行检查。`require()`\
  \ 函数的第一个参数是待评估的条件。如果该条件评估为 `false`，则会引发异常，并将第二个参数作为原因：\n\n```\n// 确保你有足够的代币出售\n\
  require(balanceOf(tokenOwner) >= amount, \"Not enough tokens\");\n```\n\n如果代币合约有足够的代币，则使用\
  \ `_transfer()` 函数将代币转移给用户：\n\n```\n// 将代币转移给买方\n_transfer(tokenOwner, msg.sender,\
  \ amount);\n```\n\n转移完成后，触发 `Transfer()` 事件：\n\n```\n// 触发事件以通知转移\nemit Transfer(tokenOwner,\
  \ msg.sender, amount);\n```\n\n最后，对于收到的以太币，你需要将其转移给代币所有者：\n\n```\n// 将赚取的以太币发送给代币所有者\n\
  payable(tokenOwner).transfer(msg.value);\n```\n\n> **注意**：这部分很重要！如果不这样做，以太币将永远被困在代币合约中，无法取回！它们将永久丢失！和你的以太币说再见吧！\n\
  \n### 部署合约\n\n让我们再次部署代币合约，使用相同的构造函数参数：\n\n`\"Wei-Meng Lee Token\"`, `\"WML\"`\n\n\
  > **注意**：对于我的代币，部署的合约地址是 `0xbf9e3851D5080457a03FCA00F2f9b92C1dDf7190`。\n\n像往常一样，将新创建的代币添加到\
  \ MetaMask 中（见图 11-23）。\n\n![](img/471881_2_En_11_Fig23_HTML.jpg)\n\nMetaMask 通知页面的截图。它包含\
  \ 0.0362 Goerli ETH 和资产，其中高亮显示了 1000 WML 代币，以及买入、发送和兑换按钮。\n\n图 11-23：将新添加的代币添加到\
  \ MetaMask\n\n> **提示**：您可以通过选择代币、点击三个垂直点，然后点击**隐藏 WML** 来隐藏 MetaMask 中之前添加的代币（见图\
  \ 11-24）。\n\n![](img/471881_2_En_11_Fig24_HTML.jpg)\n\n账户 1 的 MetaMask 通知页面截图，列出了账户详情，以及查看\
  \ Etherscan 上的资产、隐藏 WML 和代币详情的选项。\n\n图 11-24：隐藏之前添加的代币\n\n切换到另一个账户，并向代币合约发送（使用上一步获取的地址）0.001\
  \ 以太币（见图 11-25）。您将看到一条关于向代币合约发送以太币的警告。点击**我明白**，然后点击**下一步**，在下一个界面点击**确认**以支付交易费用。\n\
  \n![](img/471881_2_En_11_Fig25_HTML.jpg)\n\nMetaMask 通知页面的截图。它包含代币合约的资产和金额，以及取消按钮。\n\
  \n图 11-25：向代币合约发送以太币\n\n在等待交易确认期间，将新创建的代币添加到当前 MetaMask 账户中。交易确认后，您将在 MetaMask 中看到\
  \ 0.01 WML 代币（见图 11-26）。\n\n![](img/471881_2_En_11_Fig26_HTML.jpg)\n\nMetaMask 通知页面的截图。它包含\
  \ 0.0019 Goerli ETH 和资产，其中高亮显示了 0.01 WML 代币，以及买入、发送和兑换按钮。\n\n图 11-26：买方账户中创建的代币\n\
  \n点击 MetaMask 中的交易，在 Etherscan 区块链浏览器上查看交易详情（见图 11-27）。\n\n![](img/471881_2_En_11_Fig27_HTML.jpg)\n\
  \n账户 2 的 MetaMask 通知页面截图。它包含 0.0008 Goerli ETH 和活动记录，其中高亮显示了合约交互详情。\n\n图 11-27：选择交易以在\
  \ Etherscan 上查看\n\n您将看到合约将收到的 0.001 以太币转移给了合约所有者（见图 11-28）。\n\n![](img/471881_2_En_11_Fig28_HTML.jpg)\n\
  \nGoerli 交易哈希页面截图，列出了交易详情下的选项，包括交易哈希、状态、区块、时间戳和高亮显示的合约详情。\n\n图 11-28：在 Etherscan\
  \ 上查看交易\n\n## 本章小结\n\n在本章中，您学习了代币的工作原理，并使用代币合约自己创建了一个代币。您还学习了如何将代币添加到您的 MetaMask\
  \ 账户，并使用它们支付智能合约服务。最后，您学习了如何修改代币合约，以便人们可以通过向它发送以太币来购买代币。\n\n"
- '# 12. 使用 ERC-721 创建非同质化代币


  非同质化代币 (NFT) 似乎是近来区块链世界的最新热潮。您很可能从朋友或媒体那里听说过，有人通过将自拍照作为 NFT 出售而变得非常富有。那么，NFT 到底是什么？作为开发者，您需要了解关于
  NFT 的哪些知识？本章将解释什么是 NFT，以及如何铸造您自己的 NFT。




  '
- "# 什么是 NFT？\n\n在学习什么是 NFT 以及如何铸造 NFT 之前，首先必须理解 *同质化* 的含义。*同质化* 一词的意思是“其部分或数量可以在偿还债务或结清账目时，由另一等量部分或数量所替代的事物”（来源：[www.merriam-webster.com/dictionary/fungible](http://www.merriam-webster.com/dictionary/fungible)）。\n\
  \n一个典型的同质化物品例子是美元纸币（图 12-1）。\n\n![](img/471881_2_En_12_Fig1_HTML.jpg)\n\n一张 1 美元美国货币的照片。其上印有“联邦储备券”、“美利坚合众国”、“一美元”字样。\n\
  \n图 12-1\n\n一张 1 美元纸币（来源：[en.wikipedia.org](https://en.wikipedia.org/wiki/United_States_one-dollar_bill%2523/media/File:US_one_dollar_bill,_obverse,_series_2009.jpg)）\n\
  \n以美元纸币为例，它是同质化的，因为你可以用它来支付任何等值一美元的商品或服务。此外，你也可以用它来兑换 10 个 10 美分硬币。两个人，每人持有一张 1\
  \ 美元纸币，会很乐意互相交换这笔钱，因为交换后他们仍拥有相同的购买力。\n\n而与之相反，一张棒球卡（见图 12-2）则是*非同质化*的，因为每张卡都有独特属性，对不同的人具有不同的价值。一位棒球卡收藏家可能认为该卡价值\
  \ 100 万美元，而一位店主可能认为其价值不大，只值 1 美元。\n\n![](img/471881_2_En_12_Fig2_HTML.jpg)\n\n一张弗恩·比克福德戴着帽子的照片。\n\
  \n图 12-2\n\n一张棒球卡（来源：[en.wikipedia.org](https://en.wikipedia.org/wiki/Baseball_card%2523/media/File:VernBickford1954Bowman.jpg)）\n\
  \n现在你已经理解同质化的含义，我们来讨论什么是 NFT。NFT 代表 *非同质化代币*。NFT 本质上是一条区块链记录（主要在以太坊上，但也存在支持 NFT\
  \ 的其他区块链），用于记录一件数字艺术品（或任何有价值的物品，但现今大多数 NFT 是如图像、音乐或视频等数字资产）的所有权。NFT 的买家通常获得有限的展示其所代表的数字艺术作品的权利，但在很多方面，他们购买的仅仅是炫耀资本，以及以后可能转售的资产。\n\
  \n> **提示**  \n> 简言之，NFT 只不过是区块链上的一条独特记录，包含交易记录和指向该数字资产的超链接。\n\n## 所有权 vs. 版权\n\n\
  很多人容易将 NFT 的所有权属性与版权混淆。拥有 NFT 的所有权并不意味着你拥有该物品的版权。当然，数字资产的创建者可以将该资产的知识产权转让给买家，但这种转让必须以书面形式进行。仅仅购买\
  \ NFT 并不会自动授予你该物品的版权。一个很好的类比是：购买一张电影 DVD 能让你拥有这部电影，但这并不赋予你复制该 DVD 并卖给朋友的权利。\n\n\
  ## 在哪里购买或出售 NFT？\n\n要购买 NFT 或出售你自己的 NFT，你需要前往 NFT 市场。NFT 市场是一个允许你购买/出售 NFT 的在线平台。一些流行的\
  \ NFT 市场包括：\n\n![](img/471881_2_En_12_Fig3_HTML.jpg)\n\nOpenSea 网页的截图。文字显示“发现、收藏和出售非凡的\
  \ NFT”，下方有两个按钮“探索”和“创建”，旁边是一张抽象图片。\n\n图 12-3\n\nOpenSea 是流行的 NFT 市场之一\n\n- OpenSea（[`opensea.io`](https://opensea.io)；见图\
  \ 12-3）\n- Rarible（[`rarible.com`](https://rarible.com)）\n- Mintable（[`mintable.app`](https://mintable.app)）\n\
  \n"
- "# 使用代币合约创建 NFT\n\n顾名思义，NFT 是一种代币，因此它使用称为 *NFT 代币合约* 的代币合约。\n\n对于 NFT，你可以使用两种代币合约：\n\
  \n- **ERC-721**：类似于可以创建（同质化）代币的 ERC-20，ERC-721 是另一种允许铸造 NFT 的代币标准。\n- **ERC-1155**：一种比\
  \ ERC-20 更新的 NFT 标准。在 ERC-1155 中，可以在单次交易中转移多个 NFT，与 ERC-721 相比，这降低了交易费用。\n\n在本章中，你将重点使用\
  \ ERC-721 标准来创建 NFT。\n\n## 谁部署 NFT 代币合约？\n\n如果你通过像 OpenSea 这样的市场出售 NFT，OpenSea 将使用\
  \ ERC-721（或 ERC-1155）NFT 代币合约自动铸造你的 NFT。但是，你也可以通过编写自己的 NFT 代币合约来铸造，然后通过 OpenSea\
  \ 列出你铸造的 NFT 进行销售。\n\n## 使用 ERC-721 创建 NFT\n\n现在让我们看看如何使用 ERC-721 NFT 代币合约铸造 NFT。为此，你将使用\
  \ Remix IDE（[`remix.ethereum.org/`](https://remix.ethereum.org/)）。\n\n在 Remix IDE\
  \ 中，创建一个新合约，并将其命名为 `MyNFT.sol`。然后填充以下代码：\n\n```\n// SPDX-License-Identifier: MIT\n\
  pragma solidity ⁰.8.0;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/access/Ownable.sol\"\
  ;\nimport \"https://github.com/OpenZeppelin/openzeppelin-contracts/blob/master/contracts/token/ERC721/extensions/ERC721URIStorage.sol\"\
  ;\ncontract MyNFT is Ownable, ERC721URIStorage {\n    // name and symbol\n    constructor()\
  \ ERC721(\"Learn2develop.net NFT\", \"DLS\") {\n    }\n    function mint(address\
  \ recipient, uint256 tokenId,\n        string memory tokenURI) public onlyOwner\
  \ {\n        _mint(recipient, tokenId);\n        _setTokenURI(tokenId, tokenURI);\n\
  \    }\n}\n```\n\n请注意 NFT 代币合约的以下几点：\n\n- 你正在使用来自 OpenZeppelin 的基础 ERC-721 NFT 代币合约。\n\
  - 传递给合约构造函数的参数是 NFT 代币的名称及其符号。你可以将其更改为自己想要的名称和符号。\n- `mint()` 函数接受三个参数：NFT 所有者地址、代币\
  \ ID，以及指向 NFT 详细信息的 TokenURI。\n\n## 部署 NFT 代币合约\n\n在 Remix IDE 中编译合约后，转到 **DEPLOY\
  \ & RUN TRANSACTIONS** 部分并点击 **Deploy**（见图 12-4）。\n\n![](img/471881_2_En_12_Fig4_HTML.jpg)\n\
  \n“部署与运行交易”窗口的截图，包含环境、账户的下拉框，Gas 上限为 3000000，值为 0，合约选择为 MyNFT - contracts。底部有一个“部署”按钮。\n\
  \n图 12-4\n\n部署 NFT 合约\n\n> **注**  \n> 在本例中，你将通过 MetaMask 将 NFT 合约部署到 Goerli 测试网。\n\
  \n一旦 NFT 代币合约部署完成，你应该能够展开合约地址并看到函数列表，如图 12-5 所示。\n\n![](img/471881_2_En_12_Fig5_HTML.jpg)\n\
  \n“已部署合约”窗口的截图，包含 approve、mint、transferFrom、balanceOf、owner、symbol、tokenURI 等区块。\n\
  \n图 12-5\n\n探索已部署 NFT 合约中的各种函数\n\n\n\n### 测试 NFT 合约\n\n在将 NFT 代币合约部署到 Goerli 测试网之后，你现在可以测试该合约了。后续小节假设你拥有以下账户及其关联地址：\n\
  \n- **账户 1**（部署 NFT 代币合约的账户）的地址：`0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7`\n-\
  \ **账户 2** 的地址：`0x63eE1AEb74c52f09EaB6a2825bB1918B5e045050`\n- **账户 3** 的地址：`0xC663D99b0B5D0F6eE163173E6889AA47F787c403`\n\
  \n#### 获取代币的拥有者\n\n点击 **owner** 按钮，你应该会看到**账户 1** 的地址，即部署该合约的账户（见图 12-6）。\n\n![](img/471881_2_En_12_Fig6_HTML.jpg)\n\
  \n一个显示拥有者的文本框，底部文本显示为 0 colon address colon 0 x A F 8 b 6 C A 21023 A 595 F 0 C\
  \ 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7。\n\n图 12-6  \nowner 函数返回部署 NFT 合约的账户地址\n\n\
  #### 准备要作为 NFT 出售的数字资产\n\n假设图 12-7 中的图像是你想要作为 NFT 出售的内容。\n\n![](img/471881_2_En_12_Fig7_HTML.jpg)\n\
  \n蒙娜丽莎的肖像。\n\n图 12-7  \n待出售为 NFT 的图像（来源：[`https://cdn.britannica.com/w:300,h:169,c:crop/24/189624-050-F3C5BAA9/Mona-Lisa-oil-wood-panel-Leonardo-da.jpg`](https://cdn.britannica.com/w:300,h:169,c:crop/24/189624-050-F3C5BAA9/Mona-Lisa-oil-wood-panel-Leonardo-da.jpg)）\n\
  \n首先，你需要将这份数字资产上传到某个地方。一种选择是使用 IPFS。你可以使用以下页面，通过 **IPFS 网关** 上传你的图像：[`https://ipfs-gateway.cloud`](https://ipfs-gateway.cloud)（见图\
  \ 12-8）。\n\n![](img/471881_2_En_12_Fig8_HTML.jpg)\n\ni p f s gateway cloud 网页的截图。在拖放文件框上方显示文字“i\
  \ p f s gateway for decentralized internet”。\n\n图 12-8  \n你可以使用 IPFS 网关将图像上传到 IPFS\n\
  \n> **提示**  \n> IPFS 是一个用于存储和共享文件的点对点网络。类似于区块链中分布式和去中心化节点存储账本（区块的链条），IPFS 中的节点则存储文件。关于\
  \ IPFS 的更多信息，请参考我在 [`https://bit.ly/3Gva1Q1`](https://bit.ly/3Gva1Q1) 上关于 IPFS 的文章。\n\
  \n一旦文件上传到 IPFS，你就会获得已上传到 IPFS 的图像的哈希值（称为 *内容 ID*，简称 CID）。你可以使用此哈希值在 IPFS 上获取该文件。\n\
  \n你可以使用 `ipfs.io` 等 IPFS 网关（另一个 IPFS 网关），通过以下格式指定文件位置：[`https://ipfs.io/ipfs/`*<图像哈希值>*](https://ipfs.io/ipfs/%253chash_of_image%253e)。对于你的示例，可以通过此\
  \ URL 找到该图像：[`https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC`](https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC)。\n\
  \n> **IPFS 网关**  \n> IPFS 网关允许网络用户在不运行自己 IPFS 节点的情况下检索 IPFS 网络上的内容。IPFS 网关使用文件的哈希值（称为内容\
  \ ID 或 CID）来获取 IPFS 网络中的内容。\n\n下一步是为你的 NFT 创建元数据。一个 NFT 元数据文件包含了该 NFT 的详细信息。元数据中所需的最少属性包括：\n\
  \n- `name`：NFT 的名称\n- `description`：NFT 的描述\n- `image`：指向数字资产的链接\n\n你可以创建一个包含以下内容的\
  \ JSON 文件：\n\n```\n{\n  \"name\": \"我的 NFT 艺术品\",\n  \"description\": \"蒙娜丽莎\",\n\
  \  \"image\": \"https://ipfs.io/ipfs/QmbjYzobwnXvpHbSBjw8aHYuWYitdr33YyoZGeN7q5J4WC\"\
  \n}\n```\n\n保存该文件并将 JSON 文件上传到 IPFS。然后，获取指向 IPFS 上元数据文件的 URL。本文示例中，元数据文件位于 [`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky)。\n\
  \n> **提示**  \n> 本质上，你的 NFT 代币合约中的 `TokenURI` 将指向此 NFT 元数据文件。\n\n#### 铸造 NFT\n\n\
  在 **mint** 按钮旁边显示的文本框中，输入以下字符串：\n\n```\n0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7,1,https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky\n\
  ```\n\n![](img/471881_2_En_12_Fig9_HTML.jpg)\n\n一个文本框，内容为 mint O x A F 8 b 6 C A\
  \ 21023 A 595 F 0 C 4919 b 8 B 4 a 9 d 1 F 0 c 1773 e 7,1, h t t p s colon two forward\
  \ slash l p f s. l o forward slash i p f s forward slash Q m f J a h E i n m 6 r\
  \ Y N f s D。\n\n图 12-9  \n为账户 1 铸造 NFT\n\n该字符串的格式为：`<NFT 的拥有者>,<代币 ID>,<TokenURI>`。在这个字符串中，账户\
  \ 1 被铸造了一个代币 ID 为 1 的代币，NFT 元数据的链接位于 [`https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky`](https://ipfs.io/ipfs/QmfJahEinm6rYNfsDPynF3vm5x4xQiE9EnKW6TnadKhdky)。这意味着账户\
  \ 1 现在是该 NFT 的拥有者。\n\n> **注意**  \n> `TokenID` 是一个可指定的数字，用于在 NFT 代币合约中唯一标识该 NFT。`TokenURI`\
  \ 通常是一个指向 NFT 元数据位置的 URL。NFT 的常见存储位置是 IPFS。或者，`TokenURI` 也可指向像 Opensea 这样的 NFT 市场。\n\
  \n点击 **mint** 按钮，MetaMask 会提示你确认交易。\n\n> **提示**  \n> 请注意，此铸造操作只能由 NFT 代币合约的拥有者执行，也就是部署它的账户（本例中为账户\
  \ 1）来执行。\n\n#### 获取 NFT 代币合约的名称和符号\n\n要获取 NFT 代币合约的名称和符号，请点击 **name** 和 **symbol**\
