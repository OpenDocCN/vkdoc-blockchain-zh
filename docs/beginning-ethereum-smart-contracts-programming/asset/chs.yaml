  : \"amount\", \"type\": \"uint256\" } ], \"name\": \"Winner\", \"type\": \"event\"\
  \ }, { \"inputs\": [ { \"internalType\": \"uint256\", \"name\": \"winningNumber\"\
  , \"type\": \"uint256\" } ], \"name\": \"announceWinners\", \"outputs\": [], \"\
