  \    }   ],   \"name\": \"storeEduCredentials\",   \"outputs\": [],   \"stateMutability\"\
  : \"nonpayable\",   \"type\": \"function\"  } ]'\neduCredentialsStore = w3.eth.contract(address\
  \ = address, abi = abi)\n```\n\n`eduCredentialsStore` 变量现在包含了对该智能合约的引用。\n\n### Base64\
  \ 编码\n\n记住，教育凭证在传递给智能合约之前必须进行 base64 编码。这里我们将定义一个名为 `base64encode()` 的辅助函数：\n\n\
  ```\nimport base64\ndef base64encode(message):\nmessage_bytes = message.encode('ascii')\n\
  base64_bytes = base64.b64encode(message_bytes)\nreturn base64_bytes.decode('ascii')\n\
  ```\n\n该函数接收一个字符串，并返回其 base64 编码后的等价形式。\n\n### 将凭证保存到区块链\n\n以下是通过智能合约将学生教育凭证保存到区块链的代码片段：\n\
  \n```\n# 包含考试成绩的 JSON 字符串\nexam_result = '''\n{\n\"id\": \"1234567\",\n\"result\"\
  : {\n\"math\": \"A\",\n\"science\": \"B\",\n\"english\": \"A\"\n}\n}\n'''\nexam_result\
  \ = base64encode(exam_result)\n# 获取账户的 nonce\nnonce = w3.eth.get_transaction_count(account1_address)\n\
  # 估算 gas 费用\nestimated_gas = \\\neduCredentialsStore.functions.storeEduCredentials(\n\
  exam_result).estimateGas(\n{'from':account1_address})\n# 构建交易\ntransaction = \\\n\
  eduCredentialsStore.functions.storeEduCredentials(\nexam_result).buildTransaction(\n\
  {\n'gas': estimated_gas,\n'gasPrice': w3.eth.gas_price,\n'from': account1_address,\n\
  'nonce': nonce\n})\n# 签署交易\nsigned_txn = w3.eth.account.sign_transaction(\ntransaction,\
  \ private_key = account1_private_key)\n# 发送交易\ntx_hash = w3.eth.send_raw_transaction(signed_txn.rawTransaction)\n\
  print(w3.toHex(tx_hash))\n# 等待交易确认\nreceipt = w3.eth.wait_for_transaction_receipt(tx_hash)\n\
  ```\n\n我们来逐步分析这段代码中的执行过程：\n\n*   首先，你对存储为字符串的考试成绩进行 base64 编码。\n    \n    要调用合约中的\
  \ `storeEduCredentials()` 函数，你可以使用 `eduCredentialsStore.functions.storeEduCredentials()`\
  \ 函数，然后使用 `estimateGas()` 函数来估算调用它所需的 gas。由于该函数只有合约所有者（即 `account1_address`）才能调用，你需要将\
  \ `account1_address` 传入该函数，否则会遇到错误。\n\n    ```\n    # 估算 gas 费用\n    estimated_gas\
  \ = \\\n    eduCredentialsStore.functions.storeEduCredentials(\n    exam_result).estimateGas(\n\
  \    {'from':account1_address})\n    ```\n\n*   你使用 `buildTransaction()` 函数构建交易，向其传入估算所需的\
  \ gas、gas 价格、调用合约的账户以及 nonce：\n\n    ```\n    # 构建交易\n    transaction = \\\n   \
  \ eduCredentialsStore.functions.storeEduCredentials(\n    exam_result).buildTransaction(\n\
  \    {\n    'gas': estimated_gas,\n    'gasPrice': w3.eth.gas_price,\n    'from':\
  \ account1_address,\n    'nonce': nonce\n    })\n    ```\n\n*   你使用 `sign_transaction()`\
  \ 函数，通过账户 1 的私钥签署交易：\n\n    ```\n    # 签署交易\n    signed_txn = w3.eth.account.sign_transaction(\n\
  \    transaction, private_key = account1_private_key)\n    ```\n\n*   你使用 `send_raw_transaction()`\
  \ 函数发送交易：\n\n    ```\n    # 发送交易\n    tx_hash = w3.eth.send_raw_transaction(signed_txn.rawTransaction)\n\
  \    print(w3.toHex(tx_hash))\n    ```\n\n*   你使用 `eth.wait_for_transaction_receipt()`\
  \ 函数等待交易确认。交易确认后，交易详情将存储在 `receipt` 变量中。\n\n    ```\n    # 等待交易确认\n    receipt =\
  \ w3.eth.wait_for_transaction_receipt(tx_hash)\n    ```\n\n\n\n### 验证结果\n\n在考试成绩被牢固记录到区块链上后，现在我们来验证结果。以下是代码片段：\n\
  \n```\nexam_result = '''\n{\n\"id\": \"1234567\",\n\"result\": {\n\"math\": \"A\"\
  ,\n\"science\": \"B\",\n\"english\": \"A\"\n}\n}\n'''\nexam_result = base64encode(exam_result)\n\
  nonce = w3.eth.getTransactionCount(account1_address)\n# 估算 gas 费用\nestimated_gas\
  \ = eduCredentialsStore.functions.checkEduCredentials(\nexam_result).estimateGas(\n\
  { 'value' : 1000 }\n)  # 1000 是要发送的 wei\n# 构建交易\ntransaction = eduCredentialsStore.functions.checkEduCredentials(\n\
  exam_result).buildTransaction(\n{\n'gas'      : estimated_gas,\n'gasPrice' : w3.eth.gas_price,\n\
  'from'     : account1_address,\n'nonce'    : nonce,\n'value'    : w3.toWei(1000,\
  \ 'wei'),   # 要发送给\n})                                        # 函数的金额\n# 签署交易\n\
  signed_txn = w3.eth.account.sign_transaction(transaction,\nprivate_key = account1_private_key)\n\
  # 发送交易\ntx_hash = w3.eth.send_raw_transaction(signed_txn.rawTransaction)\nprint(w3.toHex(tx_hash))\n\
  import time\n# 创建事件实例\nresult_event = eduCredentialsStore.events.Result()\ndef handle_event(event):\n\
  receipt = \\\nw3.eth.wait_for_transaction_receipt(event['transactionHash'])\nresult\
  \ = result_event.processReceipt(receipt)\n# 打印 Result 事件的内容\nprint(result)\nif result[0]['args']['blockNumber']\
  \ != 0:\nprint('结果已验证。')\nelse:\nprint('区块链上未找到结果。')\nreturn True\ndef log_loop(event_filter,\
  \ poll_interval):\nwhile True:\nfor event in event_filter.get_new_entries():\nresult\
  \ = handle_event(event)\nif result == True:\nreturn\ntime.sleep(poll_interval)\n\
  block_filter = w3.eth.filter(\n{\n'fromBlock' : 'latest',\n'address'   : address\
  \       # 合约地址\n})\nlog_loop(block_filter, 2)\n```\n\n这段代码的第一部分与之前的代码片段类似。但这段代码中实际发生的情况如下：\n\
  \n-   当你调用 `checkEduCredentials()` 函数并附带 1000 Wei 的值（该函数需要此金额）时，估算所需的 gas 费用：\n\n\
  ```\n# 估算 gas 费用\nestimated_gas = eduCredentialsStore.functions.checkEduCredentials(\n\
  exam_result).estimateGas(\n{ 'value' : 1000 }\n)  # 1000 是要发送的 wei\n```\n\n-   你在交易中包含要发送给\
  \ `checkEduCredentials()` 函数的金额（1000 Wei）：\n\n```\ntransaction = eduCredentialsStore.functions.checkEduCredentials(\n\
  exam_result).buildTransaction(\n{\n'gas'      : estimated_gas,\n'gasPrice' : w3.eth.gas_price,\n\
  'from'     : account1_address,\n'nonce'    : nonce,\n'value'    : w3.toWei(1000,\
  \ 'wei'),   # 要发送给\n})                                        # 函数的金额\n```\n\n-\
  \   然后，你创建一个 `Result` 事件的实例，以便监听智能合约触发此事件：\n\n```\n# 创建事件实例\nresult_event = eduCredentialsStore.events.Result()\n\
  ```\n\n-   要监听 `Result` 事件，你需要实现自己的循环机制。在这里，你首先使用 `w3.eth.filter()` 函数监听话约中的特定事件。然后，你使用一个无限循环，通过事件过滤器的\
  \ `get_new_entries()` 函数持续监听事件。你使用 `wait_for_transaction_receipt()` 函数仅监听与此特定交易相关的事件。当接收到一个事件时，你调用事件的\
  \ `processReceipt()` 函数来获取事件的详细信息。在这种情况下，一旦获取到 `Result` 事件，你就停止监听未来的事件。\n\n-   合约返回的事件将类似于以下内容：\n\
  \n```\n(AttributeDict({'args': AttributeDict({'from': '0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7',\
  \ 'document': 'CnsKICAiaWQiOiAiMTIzNDU2NyIsCiAgInJlc3VsdCI6IHsKICAgICJtYXRoIjogIkEiLAogICAgInNjaWVuY2UiOiAiQiIsCiAgICAiZW5nbGlzaCI6ICJBIgogIH0KfQo=',\
  \ 'blockNumber': 7973034}), 'event': 'Result', 'logIndex': 301, 'transactionIndex':\
  \ 177, 'transactionHash': HexBytes('0x85c4ceb53e1f4c3e7844eba51f8d33d291a325ac191fa99a0d554ccc1e9f5864'),\
  \ 'address': '0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330', 'blockHash': HexBytes('0x752f3634b1970ca613e51c468e28e86186dd3603f215751fbc727392c9581460'),\
  \ 'blockNumber': 7973064}),)\n```\n\n-   返回的事件是一个元组。你获取元组中的第一个元素，然后查找 `args` 键，再从中查找\
  \ `blockNumber` 键，这将使你能够判断考试成绩是否真实：\n\n```\nif result[0]['args']['blockNumber']\
  \ != 0:\nprint('结果已验证。')\nelse:\nprint('区块链上未找到结果。')\n```\n\n当你运行此代码时，当 `Result`\
  \ 事件被触发时，你将看到如下输出：\n\n```\n0x85c4ceb53e1f4c3e7844eba51f8d33d291a325ac191fa99a0d554ccc1e9f5864\n\
  (AttributeDict({'args': AttributeDict({'from': '0xAF8b6CA21023A595F0C4919b8B4a9d1F0c1773e7',\
  \ 'document': 'CnsKICAiaWQiOiAiMTIzNDU2NyIsCiAgInJlc3VsdCI6IHsKICAgICJtYXRoIjogIkEiLAogICAgInNjaWVuY2UiOiAiQiIsCiAgICAiZW5nbGlzaCI6ICJBIgogIH0KfQo=',\
  \ 'blockNumber': 7973034}), 'event': 'Result', 'logIndex': 301, 'transactionIndex':\
  \ 177, 'transactionHash': HexBytes('0x85c4ceb53e1f4c3e7844eba51f8d33d291a325ac191fa99a0d554ccc1e9f5864'),\
  \ 'address': '0xC1B4338a54bE22067260bbA1e0B6F3d5c1E2E330', 'blockHash': HexBytes('0x752f3634b1970ca613e51c468e28e86186dd3603f215751fbc727392c9581460'),\
  \ 'blockNumber': 7973064}),)\n结果已验证。\n```\n\n### 调用不需要交易的函数\n\n请注意，对于不执行任何交易的智能合约函数，你可以简单地使用\
  \ `call()` 函数调用它们。例如，假设 `checkEduCredentials()` 函数不需要任何支付，因此它不执行任何交易。在这种情况下，你可以像这样调用它：\n\
  \n```\neduCredentialsStore.functions.checkEduCredentials(exam_result).call()\n```\n\
  \n## 总结\n\n总的来说，使用 Python 和 `web3.py` 构建 Web3 dapp 类似于使用 `web3.js` 构建。关键区别在于，对于\
  \ Python dapp，你需要亲自处理交易的细节：连接到全节点、签署交易、估算所需的 gas 费用、设置 gas 价格，最后等待交易确认并处理触发的事件。\n\
  \n"
