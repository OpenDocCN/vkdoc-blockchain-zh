- "# 区块链作为分布式账本\n\n既然你对分布式账本有了更深入的了解，就可以将其与*区块链*这一术语联系起来。以 DVD 交换为例，每次借出或归还 DVD 时，都会创建一笔交易。多笔交易被分组到一个区块中。随着更多交易的进行，这些区块通过密码学方式链接在一起，形成了我们现在所说的区块链（见图\
  \ 2-6）。\n\n![](img/471881_2_En_2_Fig6_HTML.jpg)\n\n一张示意图解释了交易及其链接是如何形成区块链的。图中标记为\
  \ A 的人与发生交易的区块相连，随着交易增加，这些区块串联成链，从而形成区块链。交易内容包括 A 从 B 处借入 DVD、A 从 C 处借入 DVD，以及 B\
  \ 从 A 处借入 DVD。\n\n**图 2-6** 交易形成区块，区块再串联成链\n\n以下是一些要点的总结：\n\n-   当法律体系、政府、监管机构和人们之间存在信任时，中心化数据库和机构就能发挥作用。\n\
  -   建立在区块链上的去中心化数据库消除了对中心化主体信任的需求。\n-   区块链可用于任何有价值的事物，而不仅仅是货币。\n\n## 区块链的工作原理\n\
  \n从宏观层面来看，区块链由多个区块组成。每个区块包含一组交易列表和一个时间戳（见图 2-7）。\n\n![](img/471881_2_En_2_Fig7_HTML.jpg)\n\
  \n一张示意图解释了区块链如何连接各个区块。它包括创世区块，并链接到区块 2、区块 3 和区块 4。每个区块都包含交易列表和时间戳记录。\n\n**图 2-7**\
  \ 每个区块链都有一个被称为创世区块的起始区块\n\n区块之间通过密码学方式相互连接，我将在后续章节中详细讨论其细节。区块链中的第一个区块被称为*创世*区块。\n\
  \n> **注意**  \n> 每个区块链都有一个创世区块。\n\n那么，下一个重要的问题是：如何将这些区块链接在一起呢？\n\n### 链接区块\n\n要理解区块链中的区块是如何链接在一起的，你必须理解一个关键概念：*哈希*。\n\
  \n> **提示**  \n> 第 1 章更详细地讨论了哈希。在继续本节之前，请务必先阅读该章节。\n\n回忆一下，哈希函数是一种将任意大小的数据映射为固定大小数据的函数。通过改变原始字符串中的单个字符，得到的哈希值会与之前完全不同。最重要的是，请注意原始信息中的单一改变会导致完全不同的哈希值，这使得很难知道这两条原始信息是相似的。\n\
  \n哈希函数具有以下特征：\n\n-   **确定性**：相同的消息总是产生相同的哈希值。\n-   **单向过程**：当你对字符串进行哈希运算时，在计算上很难将哈希值逆向还原为原始消息。\n\
  -   **抗碰撞性**：很难找到两个不同的输入消息，其哈希值相同。\n\n现在，你已准备好学习区块链中的区块是如何链接在一起的。为了将区块链接起来，每个区块的内容会被哈希，然后存储在下一个区块中（见图\
  \ 2-8）。这样，如果某个区块中的任何交易被篡改，就会使当前区块的哈希值失效，该哈希值存储在下一个区块中，进而使下一个区块的哈希值失效，以此类推。\n\n![](img/471881_2_En_2_Fig8_HTML.jpg)\n\
  \n一张示意图解释了区块链如何连接各个区块。它包括创世区块，并链接到区块 2、区块 3 和区块 4。每个区块都包含交易列表、前一个区块的哈希值以及时间戳记录。\n\
  \n**图 2-8** 使用哈希值链接区块\n\n请注意，在对区块内容进行哈希运算时，前一个区块的哈希值会与交易一起被哈希。但请注意，这是对区块内容的简化说明。稍后，你将深入了解区块的细节，并确切了解交易在区块中是如何表示的。\n\
  \n将前一个区块的哈希值存储在当前区块中，确保了前一个区块中交易的完整性。对区块内交易的任何修改都会导致下一个区块中的哈希值失效，并影响区块链中的后续区块。如果黑客想要修改一笔交易，他们不仅需要修改某个区块中的交易，还需要修改区块链中所有其他后续的区块。此外，他们还需要将这些更改同步到网络上的所有其他计算机，这是一项计算成本极高的任务。因此，存储在区块链中的数据是*不可篡改的*，因为一旦交易所在的区块被添加到区块链中，就极难更改。\n\
  \n此刻，你已经对区块链的样子有了相当清晰的认识。在现实世界中，区块链存储在多台计算机（称为节点）上，这些节点通常分布在全球各地（见图 2-9）。\n\n![](img/471881_2_En_2_Fig9_HTML.jpg)\n\
  \n一张示意图解释了全球范围内相互连接的节点如何存储数据。6 个节点通过虚线相互连接。\n\n**图 2-9** 区块链中区块的确认\n\n每个节点都以点对点的方式相互连接。存储整个区块链的节点被称为*全节点*。\n\
  \n### 区块链的不可篡改性\n\n在区块链中，每个区块通过使用密码学哈希值与其前一个区块链接。如果父区块的身份发生变化，当前区块的身份也会随之改变。这进而导致当前区块的子区块发生变化，并影响孙子区块，以此类推。对一个区块的更改会强制重新计算所有后续区块，这需要巨大的计算能力。这使得区块链具有不可篡改性，这是比特币和以太坊等加密货币的关键特征。\n\
  \n随着新区块被添加到区块链中，该交易区块被称为已被区块链*确认*。当一个区块被新添加时，它被认为有一个确认。随着另一个区块被添加到它之上，其确认数量会增加。图\
  \ 2-10 显示了区块链中各区块的确认数量。一个区块的确认次数越多，将其从区块链中移除就越困难。\n\n> **提示**  \n> 通常，一旦一个区块有六个或更多确认，它就被认为不可逆转。因此，存储在区块链中的数据是不可篡改的。\n\
  \n![](img/471881_2_En_2_Fig10_HTML.jpg)\n\n一张示意图解释了区块链如何连接各个区块以及确认数量如何增加。它包括创世区块，并链接到区块\
  \ 2、区块 3 和区块 4。每个区块都包含交易列表、前一个区块的哈希值以及时间戳记录。\n\n**图 2-10** 区块链中区块的确认\n\n\n\n###\
  \ 共识协议\n\n当一笔交易发生时，该交易会被广播到网络中，以便整理成一个区块，随后该区块可以添加到现有的区块链上（见图 2-11）。\n\n![](img/471881_2_En_2_Fig11_HTML.jpg)\n\
  \n一张示意图解释了如何在区块链中添加新区块。图中包含区块 2、区块 3 和区块 4。右侧是新区块。每个区块都包含一个交易列表、前一个区块的哈希值以及时间戳报告。\n\
  \n*图 2-11 向区块链中添加新区块*\n\n那么，究竟由谁来整理这些交易呢？而且，由于可能同时发生多笔交易，又由谁来负责将区块添加到区块链上呢？这就涉及了*共识协议*（也称为*共识算法*）。\n\
  \n顾名思义，共识协议是一种让区块链中所有节点达成一致的方法。由于交易被广播到网络中，所有节点之间必须达成某种共识，以决定哪些交易应该被包含进每个区块。否则，区块链将毫无意义。\n\
  \n在区块链世界中，存在着多种共识协议。以下列出其中几种：\n\n- 工作量证明\n- 权益证明\n- 委托权益证明\n- 实用拜占庭容错\n- 经过时间证明\n\
  \n在本章中，我将只重点介绍上述前两种共识协议。\n\n比特币的区块链实现使用了工作量证明。以太坊最初也使用工作量证明，但在 2022 年 9 月转换到了一种能效高得多的共识协议——权益证明。\n\
  \n### 工作量证明\n\n在 PoW 中，负责整理所有交易的节点被称为*挖矿节点*（或*矿工节点*）。当一笔交易发生时，该交易会被广播到所有挖矿节点。图 2-12\
  \ 展示了网络中不同用户创建的四笔交易被广播到各个挖矿节点的过程。\n\n![](img/471881_2_En_2_Fig12_HTML.jpg)\n\n一张示意图描述了交易如何广播到不同的挖矿节点。交易\
  \ 1、2、3 和 4 连接到挖矿节点 1、2 和 3，然后被组装成区块。每个区块都包含交易 1 作为公共交易。\n\n*图 2-12 交易被广播到挖矿节点，这些节点将它们组装成待挖矿的区块*\n\
  \n由于网络延迟，每个挖矿节点可能在不同的时间接收到这些交易。当一个节点接收到交易时，它会尝试将它们包含在一个区块中。请注意，每个节点可以自由选择将任何交易包含进区块。在实践中，哪些交易被包含进区块取决于几个因素，例如交易费用、交易大小、到达顺序等等。矿工的目标是尝试用交易填满区块，以便进入下一步，即将区块添加到区块链上。\n\
  \n此时，那些被包含在区块中但尚未添加到区块链上的交易被称为*未确认交易*。一旦区块被交易填满，挖矿节点就会尝试将该区块添加到区块链。\n\n现在问题来了：面对如此多的矿工，谁才能率先将区块添加到区块链上呢？\n\
  \n#### 挖矿过程\n\n为了减缓向区块链添加区块的速度，PoW 共识协议规定了一个*网络难度目标*（见图 2-13）。\n\n![](img/471881_2_En_2_Fig13_HTML.jpg)\n\
  \n一个区块图解释了区块 2 中的网络难度目标。区块 2 包含网络难度目标、前一个区块的哈希值、交易和时间戳。它链接到当前区块的哈希值。\n\n*图 2-13\
  \ 对区块进行哈希运算以满足网络难度目标*\n\n为了成功地将一个区块添加到区块链，矿工需要对区块内容进行哈希运算，并检查该哈希值是否满足*难度目标*设定的标准。例如，得到的哈希值必须以五个零开头，等等。\n\
  \n随着更多矿工加入网络，难度级别会提高。例如，哈希值现在必须以六个零开头，等等。这使得区块能够以一致的速度被添加到区块链。\n\n> **注意**  \n>\
  \ 对于比特币，难度每 2,016 个区块（大约每两周）调整一次，以便每个区块之间的平均时间保持在 10 分钟。\n\n但是等等！区块的内容是固定的，因此无论你如何对其进行哈希运算，得到的哈希值总是相同的。那么，如何确保得到的哈希值能够满足难度目标呢？为此，矿工向区块中添加一个\
  \ *nonce*，它代表*只使用一次的数字*（见图 2-14）。\n\n![](img/471881_2_En_2_Fig14_HTML.jpg)\n\n一个区块图解释了在区块\
  \ 2 中添加 nonce 后的网络难度目标。区块 2 包含网络难度目标、nonce、前一个区块的哈希值、交易和时间戳。它链接到当前区块的哈希值。\n\n*图\
  \ 2-14 添加 nonce 以改变区块内容，从而满足网络难度目标*\n\n第一个达成目标的矿工将获得奖励，并将该区块添加到区块链。他们通过将区块广播给其他节点来实现这一点，以便这些节点能够验证该声明并停止当前挖矿工作。这些矿工会放弃当前的工作，然后重新开始挖掘新区块的过程。那些未被成功挖掘的区块包含的交易将被添加到下一个待挖掘的区块中。\n\
  \n> **矿工奖励**  \n> 以比特币为例，区块奖励最初为 50 BTC，并且每 210,000 个区块减半。在撰写本文时，区块奖励为 6.25 BTC，并将在经历\
  \ 64 次减半事件后最终降至 0。对于以太坊，在合并之前，挖掘一个区块的奖励是 2 ETH（以太币）。合并之后，奖励机制稍微复杂一些。你可以访问 [`https://ethereum.org/en/developers/docs/consensus-mechanisms/pos/rewards-and-penalties/`](https://ethereum.org/en/developers/docs/consensus-mechanisms/pos/rewards-and-penalties/)\
  \ 了解更多详情。\n\n> **区块添加速率**  \n> 对于比特币，网络会调整谜题的难度，使得大约每 10 分钟挖掘出一个新区块。对于使用 PoW 的以太坊，大约每\
  \ 14 秒挖掘出一个区块。\n\n为什么这个过程被称为工作量证明呢？原因在于，要找到这个证明需要耗费大量的工作！找到证明很困难，但验证证明却很容易。PoW 的一个典型例子是破解密码锁。找到正确的密码组合需要花费大量时间，但一旦找到组合，验证起来就非常简单了。\n\
  \n> **双重支付**\n\n\n\n"
- '# 双花问题


  `双花`是一个问题，当您试图花费同一加密货币两次时就会出现。`双花`在处理法定货币时并不是问题。您手中的`100 美元`钞票不可能同时出现在另一个地方。然而，在加密世界中，这是一个潜在的问题。假设您的钱包中有`1
  个比特币`，您将其发送给一位朋友。紧接着在此交易被确认之前，您又将同一`比特币`发送给另一位朋友。本质上，您是在试图花费同一`比特币`两次。幸运的是，由于共识协议的存在，矿工能够确保第二笔交易无效，因为您已经在之前的交易中花掉了它。


  '
- "# 工作量证明（PoW）\n\n`PoW`消耗了巨大的计算资源。需要`GPU`（以及一些区块链的`ASIC`，即专用集成电路），而`CPU`速度并不重要。它还消耗大量电力，因为矿工们反复做同样的工作，即寻找`nonce`以使区块满足网络难度。\n\
  \n一个常见的问题是，为什么挖矿需要使用强大的`GPU`而不是`CPU`。简单比较一下：一个`CPU`内核每个时钟周期可以执行`4`条`32`位指令，而像`Radeon\
  \ HD 5970`这样的`GPU`每个时钟周期可以执行`3200`条`32`位指令。简而言之，`CPU`擅长对少量数据进行复杂操作，而`GPU`擅长对大量数据进行简单操作。由于挖矿完全是执行哈希运算和寻找`nonce`，这是一项高度重复的任务，正是`GPU`所擅长的。\n\
  \n> **提示**\n> \n> 当矿工成功挖出一个区块时，他们会获得挖矿奖励以及交易手续费。这激励着矿工投资于挖矿设备并使其全天候运行，从而产生高昂的电费账单。\n\
  \n"
- '# 权益证明（PoS）


  鉴于近期对可持续性的关注，如果区块链要成为去中心化解决方案的长期技术，`PoW`绝对不是可行之道。因此，许多新的区块链实现正在使用其他共识协议。特别是，`以太坊`已从使用`PoW`迁移到一种名为`权益证明（PoS）`的新协议。


  在`PoS`中，以前所谓的矿工现在被称为*验证者*。这些验证者铸造（或锻造）新区块。要成为验证者，一个节点必须质押（因此得名`权益证明`）至少`32 个以太币`。质押的`以太币`数量将影响该节点被选为下一个验证者以铸造下一个区块的机会。


  当一个节点成为验证者后，它将执行与矿工相同的任务：验证区块中的所有交易以确保其有效。当一切检查通过后，验证者签署该区块，将其添加到区块链，然后在整个网络中同步区块链。该验证者从其铸造的区块中获得交易手续费。


  与`PoW`中每个矿工都在做相同工作相比，`PoS`看起来更高效，因为只需要一个验证者。但这引出了另一个问题：如果验证者不可信，并故意允许欺诈性交易被添加到区块中，该怎么办？这就是验证者所质押的权益发挥作用的地方。如果之后发现验证者允许了欺诈性交易被添加到区块中，验证者将失去其部分质押权益。只要质押金额高于验证者能赚取的交易手续费，我们就可以相信验证者会正确履行职责。如果验证者未能妥善履行职责，他们将损失超过收益的部分。


  当验证者不再担任此角色时，所有交易手续费及其质押权益将在稍后日期返还给他们。这给了网络时间来惩罚验证者，以防后来发现某些铸造的区块是欺诈性的。


  ## PoW 与 PoS 的比较


  现在您了解了`PoS`的工作原理，将其与`PoW`进行快速比较会很有帮助：


  - 在`PoW`中，每个矿工节点都在挖矿！而在`PoS`中，只有被选中的节点才能锻造新区块。

  - `PoS`更加去中心化。`PoW`利用矿池，人们联合起来以增加挖到新区块的机会。这些矿池控制着区块链（如`比特币`）的很大一部分，这是危险的。如果所有大型矿池合并，它们就可以开始批准欺诈性交易。

  - 与`PoW`不同，`PoS`更容易锻造新区块，且不需要昂贵的硬件。这鼓励了更多验证者参与，从而增加了网络的安全性。

  - `PoS`也是环保的，比`PoW`消耗的能量少得多。


