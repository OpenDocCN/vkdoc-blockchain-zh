  \n你可以通过执行以下命令来查看区块链的内容：\n\n```\n$ curl http://localhost:5000/blockchain\n```\n\n\
  你会看到新添加的区块中包含这两笔交易：\n\n```json\n{\n  \"chain\": [\n    {\n      \"hash_of_previous_block\"\
  : \"181cfa3e85f3c2a7aa9fb74f992d0d061d3e4a6d7461792413aab3f97bd3da95\",\n      \"\
  index\": 0,\n      \"nonce\": 61093,\n      \"timestamp\": 1560757569.810427,\n\
  \      \"transactions\": []\n    },\n    {\n      \"hash_of_previous_block\": \"\
  0e8431c4a7fe132503233bc226b1f68c9d2bd4d30af24c115bcdad461dda48a0\",\n      \"index\"\
