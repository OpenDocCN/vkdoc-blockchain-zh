  \ | 1 | 2000 |\n| 2 | 5 | 1000 |\n| 3 | 5 | 2000 |\n\n> **注意：** 下注时，请记得在 Remix IDE\
  \ 的“账户”部分切换账户。\n\n### 公布赢家\n\n现在三位玩家都已下注，是时候公布赢家了。\n\n> **提示：** 你不必等到所有三位玩家都下注后再公布赢家。如果你想随时结束游戏，可以调用\
  \ `announceWinners` 按钮。即使只有两位玩家下注，你也可以结束游戏。\n\n使用第一个账户：\n\n![已部署合约的截图。包含下拉选项，余额为\
