- "# 更详细的区块链\n\n在前一节中，您了解到一个区块包含`nonce`、时间戳以及交易列表。那是一个简化版本。在实际实现中，一个区块由以下部分组成：\n\n\
  - 区块头\n- 交易列表\n\n区块头又由以下部分组成：\n\n- 前一个区块的哈希\n- 时间戳\n- `默克尔`根\n- `nonce`\n- 网络难度目标\n\
  \n注意，区块头包含的是*`默克尔`根*，而不是交易（参见图`[2-15]`）。交易被整体表示为`默克尔`根，其细节将在接下来的几节中讨论。\n\n```\n\
  ![](img/471881_2_En_2_Fig15_HTML.jpg)\n```\n\n一个区块图包含以下区块：创世区块，链接到区块`2`、区块`3`和区块`4`。每个区块都有一个交易列表、前一个区块的哈希、时间戳报告、`nonce`、`默克尔`根和难度目标。\n\
  \n**图 2-15**\n\n一个区块包含区块头，区块头中又包含交易的`默克尔`根\n\n\n\n### 节点类型\n\n在讨论将默克尔根存储在区块头中的原理之前，我需要先介绍区块链网络中的节点类型。图\
  \ 2-16 展示了区块链网络中不同类型的节点。\n\n![](img/471881_2_En_2_Fig16_HTML.jpg)\n\n该图展示了区块链网络中的不同类型节点，包括全节点、矿工节点和桌面钱包节点。桌面钱包节点连接至移动钱包和轻节点。\n\
  \n图 2-16\n\n区块链网络中不同类型的节点\n\n如前所述，连接到区块链网络的计算机被称为节点。我已讨论了矿工/验证者节点的作用，其主要职责是将交易收集到区块中，然后尝试将该区块添加到区块链上。矿工/验证者节点也被称为*全节点*。\n\
  \n> **提示：** 全节点不一定是矿工/验证者节点。然而，矿工/验证者节点必须是全节点。\n\n全节点的目的是确保区块链的完整性，运行全节点的人不会获得奖励。另一方面，矿工/验证者节点在成功将区块添加到区块链后可以获得奖励。\n\
  \n全节点的一个例子是桌面钱包，它允许用户使用加密货币进行交易。\n\n每个全节点都拥有整个区块链的副本。全节点还会验证提交给它的每一个区块和交易。\n\n除了全节点，还有*轻节点*。轻节点通过一种称为*简单支付验证*（SPV）的方法来帮助验证交易。SPV\
  \ 允许节点在不下载整个区块链的情况下，验证某笔交易是否已被包含在某个区块中。通过使用 SPV，轻节点连接到全节点，并将交易发送给全节点进行验证。\n\n轻节点只需要存储区块链中所有区块的区块头。轻节点的一个例子是移动钱包，例如适用于\
  \ iOS 和 Android 的 Coinbase 移动应用。通过移动钱包，用户可以在移动设备上进行交易。\n\n> **注意：** 桌面钱包可以是全节点，也可以是轻节点。\n\
  \n以下是到目前为止所讨论的节点类型的总结。\n\n*   **全节点：**\n    *   维护区块链的完整副本\n    *   能够验证自创世以来的所有交易\n\
  \    *   验证新创建的区块并将其添加到区块链中\n    *   访问以下站点即可查看当前以下区块链的全节点数量：\n        *   比特币：[`https://bitnodes.earn.com`](https://bitnodes.earn.com)\n\
  \        *   以太坊：[`www.ethernodes.org/network/1`](http://www.ethernodes.org/network/1)\n\
  *   **矿工节点**（必须是全节点）：\n    *   解决一个难题（寻找随机数 nonce）\n*   **轻节点**（例如钱包）：\n    *  \
  \ 维护区块链的区块头\n    *   使用 SPV 验证某一区块中的交易是否存在且有效\n\n最后，你将在下一节看到将交易表示为区块头中的默克尔根的实际应用。\n\
  \n### 默克尔树与默克尔根\n\n区块中的交易列表以*默克尔树*的形式存储。默克尔树是一种树形数据结构，其中每个叶节点是一笔交易的哈希值，而每个非叶节点是其子节点的加密哈希值。图\
  \ 2-17 展示了默克尔根是如何从交易中推导出来的。\n\n![](img/471881_2_En_2_Fig17_HTML.png)\n\n该树状图解释了默克尔根是如何推导的。默克尔根推导为\
  \ `H` 下标 `A B C D E E E E`，然后分为 `H` 下标 `A B C D` 和 `H` 下标 `E E E E`。进一步地，最终节点为交易\
  \ A、交易 B、交易 C、交易 D 和交易 E。\n\n图 2-17\n\n默克尔根是如何从默克尔树中推导出来的\n\n如您所见，每笔交易都被哈希处理。每笔交易的哈希值会与另一个节点的哈希值进行配对并哈希。例如，交易\
  \ A 的哈希值 (`H[A]`) 与交易 B 的哈希值 (`H[B]`) 组合，并经过哈希计算得到 `H[AB]`。这个过程不断重复，直到只剩下一个最终的哈希值。这个最终的哈希值被称为默克尔根。在本例中，因为\
  \ `H[E]` 没有其他节点与之配对，所以它与自身进行哈希计算。`H[EE]` 也是如此。\n\n默克尔根存储在区块头中，而其余的交易则以默克尔树的形式存储在区块中。在之前的讨论中，我提到了全节点。全节点会下载整个区块链。还有另一种节点（称为*轻节点*）只下载区块链的区块头。由于轻节点不下载整个区块链，因此它们更容易维护和运行。通过一种称为*简单支付验证*（SPV）的方法，轻节点可以向全节点查询以验证一笔交易。轻节点的例子包括加密钱包。\n\
  \n### 默克尔树与默克尔根的用途\n\n通过将默克尔根存储在区块头中，并将交易以默克尔树的形式存储在区块中，轻节点可以轻松地验证一笔交易是否属于某个特定区块。其工作原理如下。假设一个轻节点想要验证交易\
  \ C 是否存在于某个特定区块中。\n\n*   轻节点向全节点查询以下哈希值：`H[D]`、`H[AB]` 和 `H[EEEE]`（见图 2-18）。\n*\
  \   由于轻节点可以计算出 `H[C]`，然后它可以使用提供的 `H[D]` 计算出 `H[CD]`。\n*   有了提供的 `H[AB]`，它现在可以计算出\
  \ `H[ABCD]`。\n*   有了提供的 `H[EEEE]`，它现在可以计算出 `H[ABCDEEEE]`（即默克尔根）。\n*   由于轻节点拥有该区块的默克尔根，现在它可以检查两个默克尔根是否匹配。如果匹配，则该交易验证通过。\n\
  \n从这个简单的例子可以看出，要验证五个交易中的单个交易，只需要从全节点获取三个哈希值。从数学上讲，对于一个包含 `n` 笔交易的区块，需要 `log2[n]`\
  \ 个哈希值来验证一笔交易是否在该区块中。例如，如果一个区块中有 1,024 笔交易，轻节点只需请求 10 个哈希值即可验证该区块中是否存在某笔交易。\n\n\
  ![](img/471881_2_En_2_Fig18_HTML.jpg)\n\n该树状图解释了从默克尔根出发的交易验证过程。区块头是 `H` 下标 `A B\
  \ C D E E E E`，诸如 `H` 下标 `A B C D`，`H` 下标 `E E E E`，`H` 下标 `A`，`H` 下标 `B`，`H` 下标\
  \ `C`，`H` 下标 `D`，`H` 下标 `E` 这些块属于区块部分。\n\n图 2-18\n\n默克尔树和默克尔根如何用于验证交易\n\n## 本章小结\n\
  \n在本章中，您学习了区块链背后的动机及其旨在解决的问题。您探索了如何通过称为“挖矿”的过程将区块添加到区块链中。在下一章中，您将学习如何使用 Python 构建自己的区块链，以便您能够理解并看到区块链的内部运作机制。\n\
  \n"
- '# 3. 使用 Python 实现你自己的区块链


  在上一章中，您学习了区块链的基础知识、区块链背后的动机、交易如何添加到区块中，以及区块如何添加到前一个区块上以形成称为区块链的区块链条。理解所有这些概念的一个好方法就是自己动手构建一个。实现你自己的区块链能让你更深入地了解诸如*交易*、*挖矿*和*共识*等概念是如何运作的。


  显然，实现一个完整的区块链并非易事，这当然也不是你本章的目标。本章中你将要做的是使用 Python 实现一个概念性的区块链，并用它来阐释关键概念。




  '
- "# 你的概念性区块链实现\n\n在本章中，你将构建如图 3-1 所示的极简区块链。\n\n![](img/471881_2_En_3_Fig1_HTML.jpg)\n\
  \n区块图包含两个部分，例如区块 0（即创世区块）链接到区块 1。每个区块包含以下过程：前一个区块的哈希值、随机数、交易和网络难度级别。\n\n**图 3-1**\
  \ – 你的概念性区块链\n\n为简化起见，你的区块链中的每个区块将包含以下组成部分：\n\n- **时间戳**：该区块被添加到区块链的时间\n- **索引**：从\
  \ 0 开始的递增数字，表示区块编号\n- **前一个区块的哈希值**：前一个区块的哈希结果。如图 3-1 所示，该哈希值是对区块内容（包括时间戳、索引、前一个区块的哈希值、随机数和所有交易）进行哈希运算的结果。\n\
  - **随机数**：*一次性使用的数值*\n- **交易**：每个区块将包含数量不等的交易。\n\n> **注意**：为简化起见，你无需考虑用默克尔树表示交易，也无需将区块分为区块头和区块内容。\n\
  \n*网络难度级别*固定为四个零；也就是说，为了推导出随机数，区块哈希的结果必须以四个零开头。\n\n> **提示**：关于随机数的概念及其与网络难度级别的关系，请参考第\
  \ 2 章。\n\n## 获取随机数\n\n对于你的示例区块链实现，随机数的求解方法是：将随机数与区块索引、前一个区块的哈希值以及所有交易组合，然后检查生成的哈希值是否匹配网络难度级别（见图\
  \ 3-2）。\n\n![](img/471881_2_En_3_Fig2_HTML.jpg)\n\n区块图由区块 2 组成，该区块包含索引、前一个区块的哈希值、随机数、交易、网络难度级别，并链接到右侧的哈希值。\n\
  \n**图 3-2** – 在你的概念性区块链中如何推导随机数\n\n一旦找到随机数，该区块就会被附加到区块链的最后一个区块上，并添加时间戳（见图 3-3）。\n\
  \n![](img/471881_2_En_3_Fig3_HTML.jpg)\n\n示意图包含区块 0、区块 1 和区块 2，其中区块 2 包含以下过程：时间戳、索引、前一个区块的哈希值、随机数、交易和网络难度级别。\n\
  \n**图 3-3** – 一旦某个区块被挖出，它将被附加到区块链上，并为其添加时间戳\n\n## 安装 Flask\n\n对于你的概念性区块链，你将把它运行为一个\
  \ REST API，以便通过 REST 调用与其交互。为此，你将使用 **Flask** 微框架。要安装 Flask，请在终端中输入以下命令：\n\n```\n\
  $ pip install flask\n$ pip install requests\n```\n\n这些命令将安装 Flask 微框架。\n\n> **提示**：Flask\
  \ 是一个 Web 框架，能够让构建 Web 应用程序变得简单快捷。\n\n## 导入各种模块和库\n\n首先，创建一个名为 `blockchain.py` 的文本文件。在该文件顶部，导入所有必要的库和模块：\n\
  \n```\nimport sys\nimport hashlib\nimport json\nfrom time import time\nfrom uuid\
  \ import uuid4\nfrom flask import Flask, jsonify, request\nimport requests\nfrom\
  \ urllib.parse import urlparse\n```\n\n## 在 Python 中声明类\n\n为了表示区块链，声明一个名为 `Blockchain`\
  \ 的类，并包含以下两个初始方法：\n\n```\nclass Blockchain(object):\n    difficulty_target = \"\
  0000\"\n\n    def hash_block(self, block):\n        block_encoded = json.dumps(block,\
  \ sort_keys=True).encode()\n        return hashlib.sha256(block_encoded).hexdigest()\n\
  \n    def __init__(self):\n        # 存储整个区块链中的所有区块\n        self.chain = []\n  \
  \      # 临时存储当前区块的交易\n        self.current_transactions = []\n        # 使用特定的固定哈希值创建创世区块\n\
  \        # 创世区块从前一个区块开始，索引为 0\n        genesis_hash = self.hash_block(\"genesis_block\"\
  )\n        self.append_block(\n            hash_of_previous_block=genesis_hash,\n\
  \            nonce=self.proof_of_work(0, genesis_hash, [])\n        )\n```\n\n这将创建一个名为\
  \ `Blockchain` 的类，其中包含两个方法：\n\n- `hash_block()` 方法将一个区块编码为字节数组，然后对其进行哈希运算；你需要确保字典已排序，否则后续会出现哈希值不一致的问题。\n\
  - `__init__()` 函数是类的构造函数。在这里，你将整个区块链存储为一个列表。由于每个区块链都有一个创世区块，你需要使用前一个区块的哈希值来初始化创世区块。在本示例中，你只需使用一个固定的字符串\
  \ `genesis_block` 来获取其哈希值。一旦找到前一个区块的哈希值，你需要使用名为 `proof_of_work()` 的方法（将在下一节中定义）来求解该区块的随机数。\n\
  \n`proof_of_work()` 方法（下文详述）将返回一个随机数，该随机数在对当前区块内容进行哈希运算时，会生成一个符合难度目标的哈希值。\n\n为简化起见，你将\
  \ `difficulty_target` 固定为以四个零（\"`0000`\"）开头的哈希结果。\n\n> **提示**：你的区块链的源代码将在本章末尾展示。对于心急的读者，你可以边阅读本章的各种概念边查看代码。\n\
  \n## 寻找随机数\n\n现在定义 `proof_of_work()` 方法来求解区块的随机数：\n\n```\n# 使用工作量证明来寻找当前区块的随机数\n\
  def proof_of_work(self, index, hash_of_previous_block, transactions):\n    # 从随机数\
  \ = 0 开始尝试\n    nonce = 0\n    # 不断尝试将随机数与前一个区块的哈希值进行哈希运算，直到有效为止\n    while self.valid_proof(index,\
  \ hash_of_previous_block, transactions, nonce) is False:\n        nonce += 1\n \
  \   return nonce\n```\n\n`proof_of_work()` 函数从随机数为零开始，检查随机数与区块内容一起是否能生成符合难度目标的哈希值。如果不能，则将随机数递增\
  \ 1，然后继续尝试，直到找到正确的随机数。\n\n下一个方法 `valid_proof()` 对区块内容进行哈希运算，并检查区块的哈希值是否满足难度目标：\n\
  \n```\ndef valid_proof(self, index, hash_of_previous_block, transactions, nonce):\n\
  \    # 创建一个包含前一个区块哈希值和区块内容（包括随机数）的字符串\n    content = f'{index}{hash_of_previous_block}{transactions}{nonce}'.encode()\n\
  \    # 使用 sha256 进行哈希运算\n    content_hash = hashlib.sha256(content).hexdigest()\n\
  \    # 检查哈希值是否满足难度目标\n    return content_hash[:len(self.difficulty_target)] == self.difficulty_target\n\
  ```\n\n## 将区块附加到区块链\n\n一旦找到区块的随机数，你就可以编写将区块附加到现有区块链的方法。这是 `append_block()` 方法的功能：\n\
  \n```\n# 创建一个新区块并将其添加到区块链中\ndef append_block(self, nonce, hash_of_previous_block):\n\
  \    block = {\n        'index': len(self.chain),\n        'timestamp': time(),\n\
  \        'transactions': self.current_transactions,\n        'nonce': nonce,\n \
  \       'hash_of_previous_block': hash_of_previous_block\n    }\n    # 重置当前的交易列表\n\
  \    self.current_transactions = []\n    # 将新区块添加到区块链\n    self.chain.append(block)\n\
  \    return block\n```\n\n当区块被添加到区块链时，当前的时间戳也会被添加到该区块中。\n\n\n\n### 添加交易\n\n接下来要添加到\
  \ `Blockchain` 类的方法是 `add_transaction()` 方法：\n\n```\ndef add_transaction(self, sender,\
  \ recipient, amount):\nself.current_transactions.append({\n'amount': amount,\n'recipient':\
  \ recipient,\n'sender': sender,\n})\nreturn self.last_block['index'] + 1\n```\n\n\
  该方法会将一笔新交易添加到当前交易列表中。接着，它会获取区块链中最后一个区块的索引并加一。这个新索引就是当前交易将要添加到的区块编号。\n\n为了获取区块链中的最后一个区块，需要在\
  \ `Blockchain` 类中定义一个名为 `last_block` 的属性：\n\n```\n@property\ndef last_block(self):\n\
  # returns the last block in the blockchain\nreturn self.chain[-1]\n```\n\n### 将区块链类公开为\
  \ REST API\n\n现在 `Blockchain` 类已经完成了，接下来我们使用 Flask 将其公开为 REST API。将以下语句追加到 `blockchain.py`\
  \ 文件的末尾：\n\n```\napp = Flask(__name__)\n# generate a globally unique address for\
  \ this node\nnode_identifier = str(uuid4()).replace('-', '')\n# instantiate the\
  \ Blockchain\nblockchain = Blockchain()\n```\n\n### 获取完整区块链\n\n对于 REST API，我们需要创建一个路由供用户获取当前区块链。因此，将以下语句追加到\
  \ `blockchain.py` 的末尾：\n\n```\n# return the entire blockchain\n@app.route('/blockchain',\
  \ methods=['GET'])\ndef full_chain():\nresponse = {\n'chain': blockchain.chain,\n\
  'length': len(blockchain.chain),\n}\nreturn jsonify(response), 200\n```\n\n## 执行挖矿\n\
  \n还需要创建一个路由，允许矿工挖掘新区块并将其添加到区块链中：\n\n```\n@app.route('/mine', methods=['GET'])\n\
  def mine_block():\nblockchain.add_transaction(\nsender=\"0\",\nrecipient=node_identifier,\n\
  amount=1,\n)\n# obtain the hash of last block in the blockchain\nlast_block_hash\
  \ = \\\nblockchain.hash_block(blockchain.last_block)\n# using PoW, get the nonce\
  \ for the new block to be added\n# to the blockchain\nindex = len(blockchain.chain)\n\
  nonce = blockchain.proof_of_work(index, last_block_hash,\nblockchain.current_transactions)\n\
  # add the new block to the blockchain using the last block\n# hash and the current\
  \ nonce\nblock = blockchain.append_block(nonce, last_block_hash)\nresponse = {\n\
  'message': \"New Block Mined\",\n'index': block['index'],\n'hash_of_previous_block':\n\
  block['hash_of_previous_block'],\n'nonce': block['nonce'],\n'transactions': block['transactions'],\n\
  }\nreturn jsonify(response), 200\n```\n\n当矿工成功挖到一个新区块时，他们必须获得因找到工作量证明而得到的奖励。这里，你添加了一笔交易，向矿工发送一个单位的奖励，以示对其成功挖矿的奖励。\n\
  \n在挖矿时，你需要找到上一个区块的哈希值，并将其与当前区块的内容一起使用，以找到该区块的 nonce 值。一旦找到 nonce 值，就将其追加到区块链中。\n\
  \n### 添加交易\n\n你要添加到 API 中的另一个路由是向当前区块添加交易的功能：\n\n```\n@app.route('/transactions/new',\
  \ methods=['POST'])\ndef new_transaction():\n# get the value passed in from the\
  \ client\nvalues = request.get_json()\n# check that the required fields are in the\
  \ POST'ed data\nrequired_fields = ['sender', 'recipient', 'amount']\nif not all(k\
  \ in values for k in required_fields):\nreturn ('Missing fields', 400)\n# create\
  \ a new transaction\nindex = blockchain.add_transaction(\nvalues['sender'],\nvalues['recipient'],\n\
  values['amount']\n)\nresponse = {'message':\nf'Transaction will be added to Block\
  \ {index}'}\nreturn (jsonify(response), 201)\n```\n\n交易的一个示例是用户从一个账户向另一个账户发送加密货币。\n\
  \n## 测试你的区块链\n\n现在你可以测试这个区块链了。在最后一步，将以下语句追加到 `blockchain.py` 的末尾：\n\n```\nif __name__\
  \ == '__main__':\napp.run(host='0.0.0.0', port=int(sys.argv[1]))\n```\n\n在这个实现中，你可以让用户根据指定的端口号运行\
  \ API。\n\n要启动第一个节点，请在终端中输入以下命令：\n\n```\n$ python blockchain.py 5000\n```\n\n你将看到以下输出：\n\
