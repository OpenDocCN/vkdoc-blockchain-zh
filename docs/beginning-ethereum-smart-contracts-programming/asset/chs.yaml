  **图 12-18** 将 NFT 合约的所有权转移给账户 3\n\n> **提示：** 请注意，此操作只能由 NFT 代币合约的所有者执行，即部署该合约的账户（本例中为账户\
  \ 1）。\n\n你可以通过点击`owner`按钮来验证 NFT 代币合约现在属于账户 3（见图 12-19）。\n\n![](img/471881_2_En_12_Fig19_HTML.jpg)\n\
