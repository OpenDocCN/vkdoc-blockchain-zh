  \ 10004。\n\n*本书献给我的儿子，龚天逸。*\n\n## 引言\n\n在数字创新不断演变的格局中，《Web3 革命》描绘了一幅从区块链技术理论基础到其在当今数字世界实际应用的全面图景。这本书的编写不仅是为了提供指南，更是为了搭建一座桥梁，将去中心化、密码学和智能合约的复杂机制与其有望重新定义我们数字社会结构的实际应用连接起来。\n\
  \n当我们深入探究 Web3 的复杂世界时，我们探讨了这些技术如何不仅仅是技术进步，更是促进权力从中心化实体向个人和社区转移的变革性工具。每一章都系统地展开，从以比特币和以太坊为代表的区块链技术基础开始，贯穿非同质化代币（NFTs）、去中心化自治组织（DAOs）以及蓬勃发展的去中心化金融（DeFi）领域的细微差别。\n\
  \n本书旨在服务于技术行业的新手和经验丰富的专业人士，通过清晰、语境化的理解，阐明 Web3 拼图的每一块如何契合以及其重要性。通过技术描述、行业案例研究和真实场景的结合，《Web3\
  \ 革命》不仅为读者提供知识，更提供了关于这一新数字前沿中潜在影响和机遇的愿景。\n\n踏上这段旅程，揭开区块链复杂性的神秘面纱，发现使 Web3 成为迈向更透明、更安全、更公平数字未来的革命性一步的实际应用。无论你是企业家、开发者、建设者，还是仅仅是一位科技爱好者，本书旨在为你提供对\
  \ Web3 和区块链技术的扎实理解，并激励你成为这场变革浪潮的一部分。\n\n## 致谢\n\n在编写本书的旅程中，我首先要向那些在诸多争议中支持我并接纳区块链技术的人表示最深切的感谢。在这个行业近十年，我的热情源于所有对这一领域变革潜力持有“共识”之人的支持。\n\
  \n特别感谢威斯敏斯特商学院前会计与金融学院院长哈利·萨帕教授和曾任金融科技与商业分析理学硕士课程主任的安·萨帕。他们在我 2019 年获得博士学位后决定聘用我，使我得以率先开设关于区块链的课程，包括当时尚未获得完全监管认可的代币化主题。我的创新课程深受学生欢迎，丰富了我的教学之旅。2023\
  \ 年，弗朗西斯卡·梅达教授欢迎我回到伦敦大学学院金融与技术研究所，使我有机会继续在 UCL 教授去中心化金融和区块链。他们的远见卓识，以及学生们的鼓励和热情，在我的道路上起到了关键作用，并对本书的创作至关重要，本书将作为我未来课程的资源。此外，我在撰写本书期间成立的\
  \ 4btc 铭文社区及其所有成员提供了坚定不移的支持，加深了我对区块链作为 Web3 革命一部分、能够彻底改变和颠覆金融体系的信念。\n\n最后，我向我的家人致以最深切的感谢，感谢他们无私的奉献和支持。我希望这部作品不仅能引导区块链和加密货币领域的初学者，还能激发他们的创新思维。这段旅程充满挑战，但正是这个由志同道合、共识驱动的个体组成的社区让它变得有价值。我们相信，因此我们得见。\n\
