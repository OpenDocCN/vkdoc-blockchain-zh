- "# 排版后的文档\n\n##### 创建密码后\n\n创建密码后，MetaMask 会提示您使用秘密恢复短语来保护您的钱包。该短语作为您钱包的主密钥，允许您在任何设备上重新获得对资金的访问权限。此关键步骤附有提示和最佳实践，以确保您的短语保持机密和安全。\n\
  \n![图 4-7 确认秘密恢复短语](img/616479_1_En_4_Fig7_HTML.jpg)\n\n**图 4-7** 确认秘密恢复短语\n\n![图\
