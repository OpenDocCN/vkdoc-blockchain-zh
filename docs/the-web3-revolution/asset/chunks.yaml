    \ transaction. In the cryptocurrency domain, such as Bitcoin, multi-signature\
    \ enhances security by requiring the approval of multiple parties for a transaction\
    \ to be executed. This is very useful for scenarios requiring high security and\
    \ joint management, such as partnerships, joint accounts or family trusts. For\
    \ example, a 2-of-3 multi-signature scheme requires any two of the three participants\
    \ to provide their signatures to validate and execute the transaction. Such an\
    \ arrangement provides security as well as flexibility and redundancy, addressing\
    \ situations like loss of keys or inability of one party to fulfil their duties.\n\
    \n### Case Study: Creating a Bitcoin Address Using Python\n\nIn this case study,\
    \ Python libraries like ‘bitcoin’ can be utilised to handle cryptographic operations\
    \ and Bitcoin-specific encodings.\n\n1.  **Installing Necessary Python Libraries**\n\
    \n1.  **Generating a Bitcoin Address**\n    *   **Generating a Private Key**:\
    \ Use a cryptographic library in Python to generate a private key.\n\n![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5\n\nPrivate Key\n\n```\n        from bitcoin import *\n        my_private_key\
    \ = random_key()\n        print(\"Private Key: %s\\n\" % my_private_key)\n   \
    \     ```\n\n*   **Deriving the Public Key**: Compute the public key from the\
    \ private key.\n\n![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6\n\nPublic Key\n\n```\n        my_public_key = privtopub(my_private_key)\n\
    \        print(\"Public Key: %s\\n\" % my_public_key)\n        ```\n\n*   **Creating\
    \ a Bitcoin Address**: Convert the public key to a standard Bitcoin address using\
    \ Bitcoin’s specific encoding methods.\n\n```\n        my_address = pubtoaddr(my_public_key)\n\
    \        print(\"Bitcoin Address: %s\\n\" % my_address)\n        ```\n\n```\n\
    pip install bitcoin\n```\n\n![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7\n\nBitcoin Address\n\n1.  **Creating a** **Multi-signature Address**\n\
    \    *   **Gathering Multiple Public Keys**: Collect public keys from the involved\
    \ parties.\n\n*   **Forming a Multi-signature Script**: Use a Bitcoin scripting\
    \ language to create a script that requires signatures from a specified number\
    \ of those keys (e.g. 2-of-3, 3-of-5).\n\n*   **Generating the Multi-signature\
    \ Address**: Encode the multi-signature script into a Bitcoin address.\n\n```\n\
    \        private_key1 = random_key()\n        private_key2 = random_key()\n  \
    \      private_key3 = random_key()\n        public_key1 = privtopub(private_key1)\n\
    \        public_key2 = privtopub(private_key2)\n        public_key3 = privtopub(private_key3)\n\
    \        my_mulit_sig = mk_multisig_script(private_key1, private_key2, private_key3,\
    \ 2, 3)\n        my_mulit_address = scriptaddr(my_mulit_sig)\n        print(\"\
    My Multisignature Address: %s\\n\" % my_mulit_address)\n        ```\n\n![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8\n\nMulti-signature Address\n\n1.  **Querying Address** **Transaction\
    \ History**\n    *   **Choosing a Blockchain API**: Select an appropriate API\
    \ service that allows querying Bitcoin’s blockchain (e.g. BlockCypher, Blockchain.info).\n\
    \n*   **Fetching Transaction Data**: Use Python requests to call the API with\
    \ the Bitcoin address and retrieve its transaction history.\n\n```\n        valid_address\
    \ = ' 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa'\n        print(history(valid_address))\n\
    \        ```\n\n![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9\n\nTransaction History for the ‘Genesis’ Bitcoin Address\n\nThe Bitcoin\
    \ address ‘1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa’ is significant in the history of\
    \ Bitcoin, being recognised as the ‘genesis’ Bitcoin address. This address is\
    \ notable for receiving the first-ever Bitcoin transaction. As of the last update,\
    \ it has a balance of 72.73 BTC, valued at approximately $2,715,604.42\\. The\
    \ address first received Bitcoin on 3 January 2009, and the most recent activity\
    \ was recorded on 23 November 2023\\. Interestingly, it has never sent any BTC,\
    \ indicating it has only been used to receive funds.​\n\nThis address holds a\
    \ special place in Bitcoin’s history and serves as a symbol of the network’s beginnings.\
    \ Analysing such addresses can provide insights into the early usage patterns\
    \ and distribution of Bitcoin.\n\nThis Python code example demonstrates the foundational\
    \ elements for generating a single-signature Bitcoin address, a multi-signature\
    \ address, and fetching transaction history. However, this is only a conceptual\
    \ demonstration and cannot be used for real-world applications. If you need to\
    \ create a functional Bitcoin address, it is recommended to use a reliable service\
    \ such as BitAddress ([`https://www.bitaddress.org`](https://www.bitaddress.org)).\
    \ It’s important to handle private keys securely and to understand the implications\
    \ of transaction analysis in a public blockchain like Bitcoin."
  trans: "\n### 数字签名\n\n数字签名在区块链中扮演着至关重要的角色，它确保了交易的安全性和可认证性。数字签名机制包括生成密钥对（公钥和私钥）、签名过程和验证过程。私钥用于对消息进行签名，而公钥则允许任何人验证签名的真实性。数字签名不仅确保只有签名者本人才能生成签名，还将签名与特定文档绑定，确保该签名不能用于表示对另一份文档的批准或认可。该机制的设计目标在于满足两个主要特性，这与手写签名的类比非常相似：\n\
    \n1.  **唯一性**：只有你才能生成自己的签名，但任何看到它的人都能验证其有效性。这是通过使用私钥对消息进行签名来实现的，而私钥是保密的，只有密钥的所有者才能访问。\n\
    2.  **绑定**：签名与特定的文档绑定，因此不能用于表示对另一份文档的同意或认可。换句话说，签名是对特定交易或消息的验证，不能被滥用或挪用于其他内容。\n\
    \n数字签名方案包含以下三种算法：\n\n-   **密钥生成**：此方法接收一个密钥大小参数，并生成一对密钥。私钥（秘密密钥）保持机密，用于对消息进行签名；公钥（公开验证密钥）是公开的，任何人都可以用它来验证签名。\n\
    -   **签名方法**：此方法以消息和私钥作为输入，并输出在该私钥下消息的签名。\n-   **验证方法**：此方法以消息、签名和公钥作为输入。它返回一个布尔值，如果在该公钥下签名对消息有效，则返回`true`，否则返回`false`。\n\
    \n此外，数字签名还必须满足以下两个属性：\n\n-   **有效签名必须能通过验证**：由相应私钥生成的签名在使用公钥验证时必须返回`true`。\n-\
    \   **签名具有存在性不可伪造性**：这意味着没有人能够伪造他人的签名。存在性不可伪造性这一属性确保了像比特币这样的区块链系统中交易的安全性和可信度。\n\
    \n多重签名（简称“多签”）是数字签名的一种扩展应用，它需要多个密钥共同签署一笔交易。在加密货币领域，如比特币中，多重签名通过要求多方批准交易才能执行来增强安全性。这对于需要高安全性和联合管理的场景非常有用，例如合伙关系、联合账户或家族信托。例如，一个\
    \ 2/3 多重签名方案要求三名参与者中的任意两人提供他们的签名来验证和执行交易。这样的安排既提供了安全性，也提供了灵活性和冗余性，能够应对密钥丢失或一方无法履行职责等情况。\n\
    \n### 案例分析：使用 Python 创建比特币地址\n\n在本案例分析中，可以利用如 `bitcoin` 之类的 Python 库来处理密码学运算和比特币特定的编码。\n\
    \n1.  **安装必要的 Python 库**\n\n    ```\n    pip install bitcoin\n    ```\n\n2.  **生成一个比特币地址**\n\
    \    -   **生成一个私钥**：使用 Python 中的加密库来生成一个私钥。\n\n    ![](img/616479_1_En_1_Fig5_HTML.jpg)\n\
    \n    图 1-5 私钥\n\n    ```\n    from bitcoin import *\n    my_private_key = random_key()\n\
    \    print(\"Private Key: %s\\n\" % my_private_key)\n    ```\n\n    -   **导出公钥**：从私钥计算出公钥。\n\
    \n    ![](img/616479_1_En_1_Fig6_HTML.jpg)\n\n    图 1-6 公钥\n\n    ```\n    my_public_key\
    \ = privtopub(my_private_key)\n    print(\"Public Key: %s\\n\" % my_public_key)\n\
    \    ```\n\n    -   **创建一个比特币地址**：使用比特币特定的编码方法将公钥转换为标准的比特币地址。\n\n    ![](img/616479_1_En_1_Fig7_HTML.jpg)\n\
    \n    图 1-7 比特币地址\n\n    ```\n    my_address = pubtoaddr(my_public_key)\n    print(\"\
    Bitcoin Address: %s\\n\" % my_address)\n    ```\n\n3.  **创建一个多重签名地址**\n    - \
    \  **收集多个公钥**：收集参与各方的公钥。\n    -   **构建多重签名脚本**：使用比特币脚本语言创建一个脚本，该脚本需要来自指定数量密钥的签名（例如，2/3，3/5）。\n\
    \    -   **生成多重签名地址**：将多重签名脚本编码为比特币地址。\n\n    ![](img/616479_1_En_1_Fig8_HTML.jpg)\n\
    \n    图 1-8 多重签名地址\n\n    ```\n    private_key1 = random_key()\n    private_key2\
    \ = random_key()\n    private_key3 = random_key()\n    public_key1 = privtopub(private_key1)\n\
    \    public_key2 = privtopub(private_key2)\n    public_key3 = privtopub(private_key3)\n\
    \    my_mulit_sig = mk_multisig_script(private_key1, private_key2, private_key3,\
    \ 2, 3)\n    my_mulit_address = scriptaddr(my_mulit_sig)\n    print(\"My Multisignature\
    \ Address: %s\\n\" % my_mulit_address)\n    ```\n\n4.  **查询地址的交易历史**\n    -  \
    \ **选择一个区块链 API**：选择一个允许查询比特币区块链的合适 API 服务（例如 BlockCypher、Blockchain.info）。\n\
    \    -   **获取交易数据**：使用 Python 的 `requests` 库调用 API，传入比特币地址并检索其交易历史。\n\n    ![](img/616479_1_En_1_Fig9_HTML.jpg)\n\
    \n    图 1-9 ‘创世’ 比特币地址的交易历史\n\n    ```\n    valid_address = '1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa'\n\
    \    print(history(valid_address))\n    ```\n\n比特币地址 `1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa`\
    \ 在比特币历史上意义重大，被公认为“创世”比特币地址。这个地址因接收了史上第一笔比特币交易而闻名。截至上次更新，其余额为 72.73 BTC，价值约 2,715,604.42\
    \ 美元。该地址于 2009 年 1 月 3 日首次收到比特币，最近一次活动记录于 2023 年 11 月 23 日。有趣的是，它从未发送过任何 BTC，表明它仅被用于接收资金。\n\
    \n这个地址在比特币历史中占有特殊地位，是网络起源的象征。分析此类地址可以洞察比特币的早期使用模式和分布情况。\n\n这段 Python 代码示例演示了生成单签比特币地址、多重签名地址以及获取交易历史的基本要素。然而，这仅是一个概念性演示，不能用于现实世界的应用程序。如果您需要创建一个功能性的比特币地址，建议使用可靠的服务，例如\
    \ BitAddress (`https://www.bitaddress.org`)。务必安全地处理私钥，并理解在像比特币这样的公共区块链上进行交易分析的含义。\n"
- fmt: "# Consensus Algorithms\n\nConsensus algorithms are fundamental to the functioning\
    \ and reliability of blockchain networks. They serve as the mechanism through\
    \ which multiple nodes in a decentralised network reach a common agreement on\
    \ a specific value, such as the validity of transaction records. This process\
    \ is crucial in a blockchain environment, where no central authority exists to\
    \ dictate or validate the state of the ledger.\n\nIn blockchain technology, consensus\
    \ algorithms enable all participants (or nodes) to agree on the contents of the\
    \ blockchain in a trustless environment. This agreement is necessary to ensure\
    \ that each copy of the distributed ledger is consistent and accurate, maintaining\
    \ the integrity and security of the entire blockchain system.\n\nConsensus mechanisms\
    \ also play a vital role in resolving potential conflicts in a blockchain network,\
    \ such as double-spending problems, where a digital token could be spent more\
    \ than once. They help to synchronise the ledger across different nodes, ensuring\
    \ that all transactions are recorded in the correct order and that each node has\
    \ the same version of the truth.\n\nBy leveraging consensus algorithms, blockchain\
    \ networks can operate securely, transparently and efficiently without the need\
    \ for a central authority. This decentralisation is one of the key attributes\
    \ that make blockchain technology innovative and valuable for various applications\
    \ beyond cryptocurrencies, such as supply chain management, digital identity verification\
    \ and secure voting systems.\n\nThe implementation of a consensus algorithm depends\
    \ on the specific requirements and objectives of a blockchain network, including\
    \ factors such as transaction speed, security level, energy consumption and the\
    \ degree of decentralisation desired. The choice of a particular consensus mechanism\
    \ can significantly impact the performance and characteristics of a blockchain\
    \ system.\n\nCommon consensus algorithms include:\n\n1. **Proof of Work (PoW)**\n\
    \   - **Principle**: PoW requires participants (miners) to prove they have done\
    \ a certain amount of computational work by solving complex mathematical problems.\
    \ Bitcoin is the most famous blockchain using PoW.\n   - **Advantages**: Increases\
    \ network security and prevents double-spending and other types of attacks.\n\
    \   - **Disadvantages**: High energy consumption, and over time, the tendency\
    \ for miner centralisation may lead to network centralisation.\n\n2. **Proof of\
    \ Stake (PoS)**\n   - **Principle**: PoS is based on the amount and duration of\
    \ coin holding to select validators for blocks. Unlike PoW, PoS does not require\
    \ extensive computational work.\n   - **Advantages**: Higher energy efficiency\
    \ and lower barriers to participation.\n   - **Disadvantages**: Might lead to\
    \ a ‘rich get richer’ problem as users with more currency are more likely to be\
    \ chosen as validators.\n\n3. **Delegated Proof of Stake (DPoS)**\n   - **Principle**:\
    \ In DPoS, token holders vote to select a few representatives (validators) to\
    \ validate blocks. EOS is a notable example that uses the DPoS algorithm.\n  \
    \ - **Advantages**: Faster transaction confirmation and higher energy efficiency\
    \ compared to PoW and traditional PoS.\n   - **Disadvantages**: Potential for\
    \ power concentration in the network, reducing decentralisation.\n\n4. **Practical\
    \ Byzantine Fault Tolerance (PBFT)**\n   - **Principle**: PBFT aims to tolerate\
    \ malicious behaviour from a minority of nodes in the network through intensive\
    \ communication among nodes to reach consensus.\n   - **Advantages**: Suitable\
    \ for many systems requiring high data consistency and reliability.\n   - **Disadvantages**:\
    \ As the network size grows, communication costs significantly increase.\n\nEach\
    \ algorithm has its specific use cases, advantages and disadvantages. The choice\
    \ of consensus algorithm depends on the specific needs of the blockchain, such\
    \ as security, speed, energy efficiency and degree of decentralisation. As blockchain\
    \ technology continues to evolve, new consensus algorithms may emerge to better\
    \ meet the needs of different types of networks.\n\nTable [1-3](#616479_1_En_1_Chapter.xhtml#Tab3)\
    \ lists some of the major consensus algorithms along with a representative project\
    \ for each.\n\n**Table 1-3** Consensus Algorithm for Different Blockchains\n\n\
    | Consensus Algorithm | Representative Project |\n|--------------------|------------------------|\n\
    | Proof of Work (PoW) | Bitcoin |\n| Proof of Stake (PoS) | Ethereum (upcoming\
    \ Ethereum 2.0) |\n| Delegated Proof of Stake (DPoS) | EOS |\n| Practical Byzantine\
    \ Fault Tolerance (PBFT) | Hyperledger Fabric |\n\nThese projects exemplify how\
    \ the corresponding consensus algorithm is implemented in a real-world blockchain\
    \ system. We will explore more about the PoW and PoS in the later sections.\n\n\
    ## Summary\n\nAs this chapter draws to a close, it becomes clear that blockchain\
    \ technology extends beyond merely serving as a platform for cryptocurrencies;\
    \ it heralds a new era in digital security and decentralised data management.\
    \ The transition from the inception of Bitcoin to the development of advanced\
    \ blockchain applications marks a swift evolution in this technology. Characterised\
    \ by robust security features, inherent transparency and versatility across various\
    \ sectors, blockchain emerges as a fundamental technology in the digital age.\
    \ Future chapters will delve deeper into how blockchain continues to impact industries,\
    \ redefine privacy and pose challenges to the global economic landscape. The capacity\
    \ of blockchain to drive substantial innovation is tremendous, and its development\
    \ is far from complete.\n\n## Notes\n\n1. Nakamoto, S. (2008). Bitcoin: A Peer-to-Peer\
    \ Electronic Cash System.\n2. Wallace, Benjamin (23 November 2011). ‘The Rise\
    \ and Fall of Bitcoin’. Wired. Archived from the original on 31 October 2013.\
    \ Retrieved 13 October 2012. Wallace, B. (2011). The rise and fall of Bitcoin.\
    \ Wired, 19(12).\n3. Swan, M. (2015). Blockchain: Blueprint for a New Economy.\
    \ O’Reilly Media, Inc.\n4. What Is the Byzantine Generals Problem? | River Learn\
    \ – Bitcoin Technology. (2023). River. `https://river.com/learn/what-is-the-byzantine-generals-problem/`\
    \ (Accessed: 23 November 2023).\n5. Kisters, S. (2022). Blockchain 1.0 vs. 2.0\
    \ vs. 3.0 – What’s the Difference? OriginStamp. `https://originstamp.com/blog/blockchain-1-vs-2-vs-3-whats-the-difference/`\
    \ (Accessed: 23 November 2023).\n6. Banafa, A. (2021). Blockchain and AI: A Perfect\
    \ Match?. OpenMind. `www.bbvaopenmind.com/en/technology/artificial-intelligence/blockchain-and-ai-a-perfect-match/`\
    \ (Accessed: 23 November 2023).\n\n# Bitcoin: The Pioneer of Digital Currency\n\
    \nThis chapter traces the origins of Bitcoin, from Satoshi Nakamoto’s seminal\
    \ whitepaper to the cryptocurrency’s rapid ascent as a challenger to traditional\
    \ financial systems. Through an examination of Bitcoin’s innovative technological\
    \ foundations and its impact on the financial landscape, this chapter sets the\
    \ stage for a comprehensive understanding of why Bitcoin remains the quintessential\
    \ digital currency."
