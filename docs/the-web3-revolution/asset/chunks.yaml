    \ the contract by sending raw data encoded as hexadecimal CALLDATA. It’s meant\
    \ for advanced users who need to send custom transactions not covered by the standard\
    \ interface.\n\nAfter deploying the contract, the **HGCollections** contract is\
    \ ready to manage an assortment of both fungible and non-fungible tokens using\
    \ the unified ERC1155 standard. The initial minting creates a large supply of\
    \ the fungible token (**HGT**) and a single instance of the non-fungible token\
    \ (**HGNFT**), both assigned to the deployer’s address. The contract’s URI structure\
    \ ([`'https://huigong.info/api/item/{id}.json'`](https://huigong.info/api/item/%257bid%257d.json%25E2%2580%2599))\
    \ indicates where metadata for each token ID can be found, allowing external entities\
    \ to retrieve detailed information about each token managed by the contract.\n\
    \n### Comparing the Standards\n\nThe evolution of these ERC token standards reflects\
    \ Ethereum’s response to the rapidly changing blockchain landscape. Each standard\
    \ serves specific use cases and requirements, making them integral to Ethereum’s\
    \ functionality and versatility in the digital ecosystem:\n\n*   ERC20 focuses\
    \ on fungible tokens, suitable for straightforward token transfers.\n\n*   ERC721\
    \ is for unique, non-fungible tokens, each representing something distinct.\n\n\
    *   ERC1155 offers flexibility, combining features of both ERC20 and ERC721, and\
    \ supports semi-fungible tokens."
  trans: "\n### ERC1155 标准\n\nERC1155 标准于 2018 年推出，它弥合了 ERC20 与 ERC721 之间的差距，允许单个合约同时代表多种同质化、半同质化以及非同质化代币。该标准引入了批量转账和安全代币转账的概念，降低了交易成本并缓解了网络拥堵。对于需要共存多种代币类型的游戏和数字收藏品领域，此标准尤其有益。\n\
    \n以下是一个 ERC1155 多代币标准合约的示例：\n```\n// contracts/HGCollections.sol\n// SPDX-License-Identifier:\
    \ MIT\npragma solidity ⁰.8.0;\nimport \"@openzeppelin/contracts/token/ERC1155/ERC1155.sol\"\
    ;\ncontract HGCollections is ERC1155 {\nuint256 public constant HGT = 0;\nuint256\
    \ public constant HGNFT = 1;\nconstructor() ERC1155(\"https://huigong.info/api/item/{id}.json\"\
    ) {\n_mint(msg.sender, HGT, 10**18, \"\");\n_mint(msg.sender, HGNFT, 1, \"\");\n\
    }\n}\n```\n\n以下是代码的解释：\n\n1.  **SPDX 许可证标识符和 Solidity 版本**\n\n```\n    // SPDX-License-Identifier:\
    \ MIT\n    pragma solidity ⁰.8.0;\n    ```\n这指明了该合约采用 MIT 许可证授权，并且是为 Solidity\
    \ 版本 `0.8.0` 的编译而编写的。\n\n2.  **导入语句**\n\n```\n    import \"@openzeppelin/contracts/token/ERC1155/ERC1155.sol\"\
    ;\n    ```\n这从 OpenZeppelin 合约库中导入了 `ERC1155` 合约。OpenZeppelin 合约库是一组可复用且安全的智能合约组件。\n\
    \n3.  **合约声明**\n\n```\ncontract HGCollections is ERC1155 {\n```\n`HGCollections`\
    \ 被声明为一个继承自 OpenZeppelin `ERC1155` 合约的合约，这意味着它继承了 ERC1155 代币合约的所有标准方法和属性。\n\n\
    4.  **代币类型的常量**\n\n```\n    uint256 public constant HGT = 0; uint256 public constant\
    \ HGNFT = 1;\n    ```\n声明了两个常量 `HGT` 和 `HGNFT`，用于在这个 ERC1155 合约中表示不同的代币类型。`HGT`\
    \ 表示 ID 为 `0` 的同质化代币类型，`HGNFT` 表示 ID 为 `1` 的非同质化代币类型。\n\n5.  **构造函数与代币元数据**\n\n\
    ```\n    constructor() ERC1155(\"https://huigong.info/api/item/{id}.json\") {\n\
    \    ```\n构造函数使用一个用于代币元数据的 URI 来初始化合约。该 URI 包含一个占位符 `{id}`，它可以被代币的 ID 替换，以便为每种特定的代币类型检索元数据。\n\
    \n6.  **铸造代币**\n\n```\n    _mint(msg.sender, HGT, 10**18, \"\");\n    _mint(msg.sender,\
    \ HGNFT, 1, \"\");\n    ```\n在构造函数内部，有两个 `_mint` 调用：\n- 第一个调用铸造了 `10**18`（1 后面跟\
    \ 18 个零，模拟以太币的最小单位 wei）个同质化代币 `HGT`，并将它们分配给合约部署者（`msg.sender`）。\n- 第二个调用铸造了 `1`\
    \ 个单位非代同质化代币 `HGNFT`，同样将其分配给合约部署者。这反映了 NFT 的典型属性，即它们是唯一的或者至少供应量不大。\n传递给 `_mint`\
    \ 的最后一个参数是空字符串 `\"\"`，如果有更复杂的铸造逻辑或需要触发事件，可以用数据替换该字符串。\n\n这个合约展示了 ERC1155 标准的灵活性，单个合约可以管理多种代币类型和数量。ERC1155\
    \ 标准在游戏等场景中尤其受欢迎，在这些场景中，用户可能拥有多种需要以统一方式进行管理的物品（用于消耗品的同质化代币和用于独特物品的非同质化代币）。\n\n\
    图 3-13 展示了部署名为 `HGCollections` 的 ERC1155 智能合约之后的情况。与之前讨论的 ERC721 合约类似，部署这个 ERC1155\
    \ 合约就像在 Remix 中点击“部署”按钮一样简单。一旦部署完成，合约的功能和特性便可进行交互。\n\n![](img/616479_1_En_3_Fig13_HTML.jpg)\n\
    \n**图 3-13** 已部署的合约 – ERC1155\n\n以下是已部署的 `HGCollections` 智能合约中红色方框内标明的每个函数和功能的详细说明：\n\
    \n1.  `safeBatchTransferFrom`：允许一个地址在单笔交易中将多种类型的代币转账到另一个地址。这是一个用于转账多种代币 ID 和数量的批量操作，确保每次转账都是安全的，并且接收方能够处理这些代币。\n\
    \n2.  `safeTransferFrom`：允许将特定数量的代币（通过 ID 标识）从一个地址安全地转账到另一个地址。此函数确保接收地址具备处理 ERC1155\
    \ 代币的必要逻辑。\n\n3.  `setApprovalForAll`：授予或撤销另一个地址（操作者）管理当前地址所有代币的权限。这类似于针对本合约中所有代币的授权委托书。\n\
    \n4.  `balanceOf`：提供单个账户持有的特定代币 ID 的余额，告诉你该账户持有特定 ID 代币的数量。\n\n5.  `balanceOfBatch`：`balanceOf`\
    \ 的扩展，允许同时查询多个账户和代币 ID 的余额，对于批量获取余额非常有用。\n\n6.  `HGNFT`：代表本合约中的一种非同质化代币类型，ID 为\
    \ `1`。它表明这种特定的代币类型是独一无二且不可互换的。\n\n7.  `HGT`：代表本合约中的一种同质化代币类型，ID 为 `0`。这种代币类型是可互换的，每个单位之间没有区别。\n\
    \n8.  `isApprovedForAll`：检查某个操作者是否被授权管理某个拥有者的所有代币，这可以包括同质化和非同质化代币。\n\n9.  `supportsInterface`：根据\
    \ ERC165 标准，确定该合约是否实现了某个特定的接口。这有助于其他合约或服务了解该合约支持哪些功能。\n\n10. `uri`：根据代币的 ID 检索其元数据的\
    \ URI。对于 ERC1155 合约，元数据 URI 通常指向一个包含代币详细信息的 JSON 文件。\n\n11. **低级别交互**：界面这一部分允许通过发送编码为十六进制\
    \ CALLDATA 的原始数据来与合约进行直接交互。这适用于那些需要发送标准接口未涵盖的自定义交易的高级用户。\n\n部署合约后，`HGCollections`\
    \ 合约便已准备好使用统一的 ERC1155 标准来管理一系列同质化和非同质化代币。初始铸造创建了大量同质化代币（`HGT`）和一个非同质化代币（`HGNFT`）的单一实例，两者都分配给了部署者的地址。合约的\
    \ URI 结构（`'https://huigong.info/api/item/{id}.json'`）指明了每个代币 ID 的元数据所在位置，允许外部实体检索由该合约管理的每个代币的详细信息。\n\
    \n### 标准对比\n\n这些 ERC 代币标准的演变反映了以太坊对快速变化的区块链格局的回应。每个标准都服务于特定的用例和需求，使其成为以太坊在数字生态系统中功能和多样性的组成部分：\n\
    \n-   ERC20 专注于同质化代币，适用于简单的代币转账。\n-   ERC721 适用于唯一的、非同质化的代币，每个代币代表某种独特的东西。\n-\
    \   ERC1155 提供了灵活性，结合了 ERC20 和 ERC721 的特性，并支持半同质化代币。\n"
