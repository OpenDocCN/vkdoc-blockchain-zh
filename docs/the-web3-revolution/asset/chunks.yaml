  trans: "\n### ERC 标准概述\n\n区块链上的代币代表了各种实体，例如货币、时间、服务甚至虚拟物品。通过将这些实体代币化，智能合约可以与之交互、交换或修改它们。理解代币需要区分代币合约和实际代币本身。代币合约是一种以太坊智能合约，它将地址映射到余额，并允许对这些余额进行加减操作。\n\
    \n`ERC`，即以太坊意见征求（Ethereum Request for Comment），是开发者在创建智能合约时同意遵循的一种协议或标准。这些标准确保了智能合约编码的互操作性和可重用性。⁷\n\
    \n#### `ERC20` 标准\n\n`ERC20` 标准于 2015 年提出，2017 年被广泛采用，用于创建**同质化代币**，这意味着每个代币都是相同的，并且可以互换。它被广泛应用于稳定币、首次代币发行（ICO）、众筹及其他相关活动。`ERC20`\
    \ 代币，例如 Tether（`USDT`）、Chainlink（`LINK`）和 Basic Attention Token（`BAT`），具有预设的功能，使它们能够相互交互，并与加密货币钱包等兼容服务协同工作。\n\
    \n以下是一个 `ERC20` 代币合约的示例：\n\n```solidity\n// contracts/HGToken.sol\n// SPDX-License-Identifier:\
    \ MIT\npragma solidity ⁰.8.0;\nimport \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
    ;\ncontract HGToken is ERC20 {\nconstructor(uint256 initialSupply) ERC20(\"HGToken\"\
    , \"HGT\") {\n_mint(msg.sender, initialSupply);\n}\n}\n```\n\n我们来分解一下它的组成部分：\n\
    \n1.  **SPDX 许可证标识符和 Solidity 版本**\n\n    ```solidity\n    // SPDX-License-Identifier:\
    \ MIT\n    pragma solidity ⁰.8.0;\n    ```\n\n    这几行代码指定了许可证（此处为 `MIT`）和 Solidity\
    \ 编译器版本（`⁰.8.0`），表明该合约与 Solidity 版本 `0.8.0` 或其以上的任何次要版本兼容。\n\n2.  **导入语句**\n\n\
    \    ```solidity\n    import \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
    ;\n    ```\n\n    这一行从 OpenZeppelin 库导入了 `ERC20` 代币标准实现。OpenZeppelin 是以太坊开发者社区中广泛使用且值得信赖的库，它提供了安全、标准化且经过审计的智能合约实现。OpenZeppelin\
    \ 的 `ERC20.sol` 合约包含了 `ERC20` 代币的基本功能，例如代币转账、获取账户余额、代币总供应量以及授权额度（即一个账户允许另一个账户代其花费的代币数量）。\n\
    \n3.  **合约声明**\n\n    ```solidity\n    contract HGToken is ERC20 {\n    ```\n\n\
    \    这里声明了一个名为 `HGToken` 的新智能合约，它继承了 OpenZeppelin 的 `ERC20` 代币实现。这意味着 `HGToken`\
    \ 继承了标准 `ERC20` 代币的所有功能。\n\n4.  **构造函数**\n\n    ```solidity\n    constructor(uint256\
    \ initialSupply) ERC20(\"HGToken\", \"HGT\") { _mint(msg.sender, initialSupply);\
    \ }\n    ```\n\n    构造函数在合约部署时执行一次。它接收代币的初始供应量作为参数。`ERC20(\"HGToken\", \"HGT\"\
    )` 部分调用了导入的 `ERC20` 合约的构造函数，将代币名称设置为 `HGToken`，符号设置为 `HGT`。然后调用 `_mint` 函数来创建初始供应的代币，并将其分配给部署合约的地址（`msg.sender`）。\n\
    \n总之，这个合约是一个基本的 `ERC20` 代币，在部署时设置了初始供应量。它使用了 OpenZeppelin 安全且标准的 `ERC20` 协议实现，确保了符合代币标准，并降低了代币代码中出现漏洞的风险。\n\
    \n![](img/616479_1_En_3_Fig9_HTML.jpg)\n\n图 3-9\n\n部署 `ERC20.sol`\n\n图 3-9 展示了部署\
    \ `ERC20` 代币智能合约的过程。其中几个元素被突出显示，特别是红色框内的部分。让我们详细解析红色框内的元素以及部署这个智能合约的流程：\n\n1.\
    \  `HGToken` - `contracts/ERC20.sol`：这表明智能合约 `HGToken` 已准备好部署。该合约可能位于名为 `contracts`\
    \ 的文件夹或路径下的 `ERC20.sol` 文件中。这是一个 `ERC20` 代币，是在以太坊区块链上创建同质化代币的标准。\n\n2.  `DEPLOY`（部署）：此区域用于在将智能合约部署到区块链之前，输入智能合约构造函数所需的初始参数。\n\
    \n3.  `INITIALSUPPLY`（初始供应量）：此输入字段用于填写 `HGToken` 合约构造函数的 `initialSupply` 参数。该值决定了部署时将要铸造的代币总供应量。\n"
- fmt: '4.  **1,000,000,000,000,000,000,000,000**: 在`INITIALSUPPLY`字段中输入的这个非常大的数字，是因为ERC20代币使用一种叫做`wei`的单位作为代币的最小子单元，类似于以太币的最小单位也叫`wei`。由于ERC20标准允许最多18位小数，如果你想发行100万枚代币（`1,000,000`），则需要在数字末尾添加18个零来容纳小数位。因此，`1,000,000`变为`1,000,000`后跟18个零，即**`1,000,000,000,000,000,000,000,000`**，用以表示具有18位小数的100万枚代币。


    5.  **Deploy Button (Transact)**：此按钮用于启动部署过程。点击它后，Remix会向区块链发送一笔交易，以使用指定的初始供应量创建合约。


    6.  **Console Output**：底部的控制台输出显示部署交易处于待处理状态。它显示了部署合约的账户（**`0x583...edc4`**）、交易发送的价值（本例中为0
    ETH，由**`value: 0x0`` 指示）、gas限额以及交易哈希（**`0x38...0394`**），该哈希是此交易在区块链上的唯一标识符。


    如果部署成功，`HGToken`合约将被创建在区块链上，初始供应量为100万枚代币（已考虑18位小数），部署合约的账户将初始持有所有这些代币。随后，可以根据合约逻辑及部署实体的意图，对代币进行分发或使用。


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig10_HTML.jpg)


    **Figure 3-10** – Deployed Contracts – ERC20


    **Figure 3-10** 展示了ERC20代币合约部署后的界面。该界面由Remix生成，用于与已部署智能合约的函数和查询进行交互。下面解释红框内的元素，并区分橙色和蓝色文本。以下是合约的函数和查询：


    1.  **`approve`**：这是一个函数，允许代币所有者批准另一个地址代表其花费指定数量的代币。

    2.  **`transfer`**：此函数用于将一定数量的代币从总供应量发送到另一个地址。

    3.  **`transferFrom`**：此函数允许第三方从一个地址向另一个地址转移代币，但前提是该第三方已通过`approve`函数获得代币所有者的授权额度。

    4.  **`allowance`**：此查询返回允许某个授权地址从所有者账户中提取的剩余代币数量。

    5.  **`balanceOf`**：此查询返回特定账户地址的代币余额。

    6.  **`decimals`**：显示代币可分割的小数位数，这会影响代币的可分性。在ERC20代币中，通常设置为18，允许像以太币一样分为更小的单位。

    7.  **`name`**：返回代币的名称，本例中为`''HGToken''`。

    8.  **`symbol`**：返回代币的符号，本例中为`''HGT''`，类似于代币的股票代码。

    9.  **`totalSupply`**：此查询返回此合约的流通代币总量。


    橙色文本代表构成ERC20代币接口的函数和查询的名称。它们是可以在合约上执行的操作，例如转账代币（`transfer`）、检查账户余额（`balanceOf`）或检查总供应量（`totalSupply`）。


    蓝色文本表示函数所需的参数或查询的返回类型。例如，`transfer`函数需要接收地址和转账金额。`decimals`查询旁带有蓝色`uint8: 18`，表明它返回一个8位的无符号整数，数值为18。


    橙色标识符是可以在合约上调用的操作名称。蓝色文本则为这些操作提供了额外上下文，要么指定函数所需的输入，要么指出查询返回的输出。因此，**low-level
    interactions**允许通过发送编码为十六进制`CALLDATA`的原始数据来直接与合约交互。这通常用于需要构建和发送标准接口无法覆盖的复杂调用的开发者。`CALLDATA`字段是进行低级合约调用时输入原始交易数据的地方。


    总而言之，部署ERC20代币合约后，Remix会提供一个图形界面来与合约函数交互。橙色文本标识了可用的操作，而蓝色文本则详细说明了函数的参数或查询的返回数据。低级交互适用于超出标准接口范围的复杂操作。'
  raw: '4.  **1,000,000,000,000,000,000,000,000**: The very large number entered in
    the **INITIALSUPPLY** field is due to the fact that ERC20 tokens use a unit called
    ‘wei’ for the smallest sub-unit of the token, similar to how the smallest unit
    of Ether is also called wei. Since the ERC20 standard allows for up to 18 decimal
    places, if you want to issue 1 million tokens (1,000,000), you would need to add
    18 zeros to the end of that number to account for the decimals. Hence, **1,000,000**
    becomes **1,000,000** followed by 18 zeros, making it **1,000,000,000,000,000,000,000,000**
    to represent 1 million tokens with 18 decimal places.


    5.  **Deploy Button (Transact)**: This button initiates the deployment process.
    Once you click it, Remix will send a transaction to the blockchain to create the
    contract with the specified initial supply.


    6.  **Console Output**: At the bottom, there’s a console output indicating that
    the deployment transaction is pending. It shows the account from which the contract
    is being deployed (**0x583...edc4**), the value being sent with the transaction
    (0 ETH in this case, indicated by **value: 0x0**), the gas limit and the transaction
    hash (**0x38...0394**), which is a unique identifier for this transaction on the
    blockchain.


    If the deployment is successful, the **HGToken** contract will be created on the
    blockchain with an initial supply of 1 million tokens (accounting for the 18 decimal
    places), and the account that deployed the contract will initially hold all these
    tokens. The tokens can then be distributed or used according to the contract’s
    logic and the intentions of the deploying entity.


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Deployed Contracts – ERC20


    Figure 3-10 shows the interface of an ERC20 token contract after it has been deployed.
    This interface is generated by Remix to interact with the deployed smart contract’s
    functions and queries. Let’s explain the elements within the red box and distinguish
    between the orange and blue text. Here are the contract functions and queries:


    1.  **approve**: This is a function that allows the owner of the tokens to approve
    another address to spend a specific amount of tokens on their behalf.


    2.  **transfer**: This function is used to send a certain amount of tokens from
    the total supply to another address.


    3.  **transferFrom**: This function allows a third party to transfer tokens from
    one address to another, but only if they have been given an allowance by the token
    owner using the **approve** function.


    4.  **allowance**: This query returns the remaining number of tokens that a spender
    is allowed to withdraw from an owner’s account.


    5.  **balanceOf**: This query returns the token balance of a specific account
    address.


    6.  **decimals**: This shows the number of decimal places the token can be divided
    into, which affects the token’s divisibility. In ERC20 tokens, this is often set
    to 18, allowing for fractional tokens similar to how Ether is divisible.


    7.  **name**: This returns the name of the token, which in this case is ‘HGToken’.


    8.  **symbol**: This returns the token’s symbol, ‘HGT’ in this case, which is
    like a ticker symbol for the token.


    9.  **totalSupply**: This query returns the total number of tokens in circulation
    for this contract.


    The orange text represents the names of functions and queries that are part of
    the ERC20 token’s interface. They are the operations that you can perform on the
    contract, such as transferring tokens (**transfer**), checking an account’s balance
    (**balanceOf**) or checking the total supply (**totalSupply**).


    The blue text signifies the parameters needed for a function or the return type
    of a query. For example, the **transfer** function requires the address to transfer
    to and the value to transfer. The **decimals** query has a blue ‘uint8: 18’ beside
    it, indicating that it returns an unsigned integer of 8 bits and that the value
    is 18.


    The orange identifiers are the names of the operations you can invoke on the contract.
    The blue text provides additional context for those operations, either specifying
    what inputs are required for functions or what outputs are returned by queries.
    Hence, the **low-level interactions** allows for direct interaction with the contract
    by sending raw data encoded as hexadecimal CALLDATA. This is typically used by
    developers who need to construct and send complex calls that may not be covered
    by the preceding simplified interface. And the **CALLDATA** field is where raw
    transaction data would be entered if you were to make a low-level call to the
    contract.


    In summary, after deploying an ERC20 token contract, Remix provides a user interface
    to interact with the contract’s functions. The orange text identifies the operations
    available, while the blue text details the parameters for functions or the returned
    data for queries. Low-level interactions are for advanced operations beyond the
    scope of the standard interface.'
