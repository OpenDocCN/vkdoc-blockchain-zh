- fmt: '### European Union – Markets in Crypto-Assets (MiCA)[⁴](#616479_1_En_11_Chapter.xhtml#Sec007)


    The Markets in Crypto-Assets (MiCA) regulation by the European Union represents
    a substantial step towards the harmonisation of crypto-asset activities across
    member states, establishing a clear framework aimed at protecting consumers and
    maintaining financial stability while fostering innovation. The MiCA framework
    is comprehensive, providing detailed definitions and categorisations of crypto-assets,
    particularly focusing on asset-referenced tokens (`ARTs`) and e-money tokens (`EMTs`),
    which are considered critical for their monetary substitution dimension and potential
    impact on financial systems.


    According to the MiCA, an `asset-referenced token` refers to crypto-assets intended
    to maintain a stable value by referencing any value or right, including one or
    more official currencies, addressing the store of value function of money. On
    the other hand, `e-money tokens` are digital representations of value that have
    a direct reference to a single fiat currency and are primarily intended to be
    used as a means of payment, thus ensuring their value stability. `E-money tokens`
    are similar to electronic money, substituting coins and banknotes in the digital
    arena.


    The MiCA regulation emphasises the importance of these tokens being backed by
    assets or claims recorded elsewhere, enabling value transfer between end users,
    possibly without a central third party’s involvement, depending on the design.
    This aspect is crucial in classifying crypto-assets and their alignment with existing
    financial regulations, such as the Payment Services Directive (PSD2).


    The European Central Bank (ECB) notes that the proposed MiCA regulation makes
    a clear distinction between crypto-assets and central bank money, aiming to avoid
    confusion regarding the legal nature of assets potentially issued by central banks
    compared to traditional central bank money.


    Under MiCA, most stablecoin issuers will have to be legally established and authorised
    within the EU, and significant asset-referenced tokens may come under direct supervision
    by the European Banking Authority (EBA). The EBA, in collaboration with national
    competent authorities (NCAs), will be responsible for ensuring compliance with
    the MiCA regulation’s requirements, thereby enforcing a dual supervisory arrangement
    that seeks to prevent regulatory arbitrage and enhance the oversight of significant
    e-money tokens.


    This regulation responds to the gaps exposed by events like the collapse of the
    FTX exchange, underscoring the need for a legal environment that protects against
    the volatility, fraud and manipulation risks inherent in the crypto markets. By
    establishing uniform market rules, MiCA is expected to offer a more predictable
    and sounder legal environment for crypto-assets, providing clarity for issuers
    and security for investors while enabling a larger market within the EU for crypto-asset
    activities.


    The MiCA framework is a clear indication of the EU’s commitment to integrating
    crypto-assets into its financial system, recognising both their potential for
    innovation and their need for regulation. The convergence of regulatory efforts
    under MiCA signals the EU’s dedication to shaping a sustainable digital finance
    ecosystem, leveraging advancements in technology to enhance financial services
    while maintaining a vigilant stance on consumer protection and market integrity.


    ### Switzerland – Financial Market Supervisory Authority (FINMA)[⁵](#616479_1_En_11_Chapter.xhtml#Sec007),
    [⁶](#616479_1_En_11_Chapter.xhtml#Sec007)


    In Switzerland, the Financial Market Supervisory Authority (FINMA) plays a pivotal
    role in defining the regulatory landscape for Initial Coin Offerings (ICOs) and
    the broader realm of crypto-assets. FINMA distinguishes between three primary
    categories of tokens: payment, utility and asset tokens, each with distinct regulatory
    implications, especially concerning ICOs.


    Payment tokens are synonymous with cryptocurrencies like Bitcoin and Ether. They
    are intended for use as a means of payment for acquiring goods or services or
    as a means of money or value transfer. Cryptocurrencies give rise to no claims
    on their issuer. In terms of regulation, payment ICOs that enable tokens to function
    as a means of payment and can already be transferred are subject to compliance
    with anti-money laundering regulations. However, FINMA does not classify such
    tokens as securities.


    Utility tokens are designed to provide digital access to an application or service
    via a blockchain-based infrastructure. They are not treated as securities as long
    as their sole purpose is to confer digital access rights and can be used in this
    manner at the point of issue. If, however, a utility token also or solely serves
    an investment purpose, FINMA will treat such tokens as securities, similar to
    asset tokens.


    Asset tokens represent assets such as a debt or equity claim on the issuer, akin
    to shares in future company earnings or future capital flows. As such, asset tokens
    are considered securities, meaning they are subject to securities law requirements
    for trading, as well as civil law requirements under the Swiss Code of Obligations,
    such as prospectus requirements.


    This classification by FINMA is essential for understanding how ICOs are conducted
    within Switzerland’s legal framework. It reflects the authority’s nuanced approach
    to regulating the diverse range of crypto-assets, aiming to ensure market participant
    protection, fair and reliable trading and efficient price formation while also
    recognising the innovative potential of blockchain technology.


    Such a regulatory approach underscores Switzerland’s status as a leading global
    financial centre, actively adapting its legal framework to accommodate the evolving
    landscape of digital finance and fostering an environment conducive to technological
    innovation and investment.'
