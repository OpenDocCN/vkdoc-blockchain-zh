  raw: '### Using Remix for Smart Contract Development


    Remix is an essential tool for Ethereum developers, offering a comprehensive suite
    of functionalities for smart contract development. Its ease of use, combined with
    powerful features like built-in testing and debugging tools, makes it an ideal
    platform for both beginners and experienced developers in the Ethereum ecosystem.
    Whether you’re writing your first smart contract or deploying a complex DApp,
    Remix provides the tools you need to succeed in the Ethereum development space.
    The following shows the step-by-step process from Listing [3-1](#616479_1_En_3_Chapter.xhtml#PC1):


    1.  **Writing the Contract**: Start by writing your Solidity smart contract in
    the Remix editor.


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Writing the Contract for ‘SimpleStorage.sol’


    1.  **Compilation**: Use the built-in compiler to compile your contract and check
    for any errors or warnings.


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Compile ‘SimpleStorage.sol’


    1.  **Testing**: Write and execute tests for your contract using the Remix testing
    environment.


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Test ‘SimpleStorage.sol’


    1.  **Debugging**: Utilise the debugger to step through your code and optimise
    it.


    2.  **Deployment**: Deploy your contract to a test network or the Ethereum mainnet
    directly from Remix.


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Deploy ‘SimpleStorage.sol’


    1.  **Interaction**: After deployment, interact with your contract functions using
    the Remix interface.


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Interaction ‘SimpleStorage.sol’


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Interaction ‘SimpleStorage.sol’ – transact


    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Interaction ‘SimpleStorage.sol’ – get


    Now that you have a foundational understanding of how Remix can streamline your
    Ethereum development process, let’s apply this knowledge. In the following sections,
    we will explore practical examples of smart contracts. These examples will demonstrate
    how to effectively utilise Remix’s powerful features for writing, testing and
    deploying smart contracts, providing you with hands-on experience in crafting
    efficient and secure blockchain applications.


    ## 3.4 Simple Smart Contract Examples


    The smart contract in Listing [3-2](#616479_1_En_3_Chapter.xhtml#PC2) defines
    a straightforward contract named MyContract. It primarily consists of a public
    string variable named value, initially set to ‘MyValue’. This variable’s public
    status allows external entities to read its value, thanks to an automatically
    generated getter function by Solidity. Additionally, the contract includes a function
    set, which enables the modification of value.


    ```

    pragma solidity ^0.5.1;

    contract MyContract{

    string public value = "MyValue";

    function set(string memory _value) public {

    value = _value;

    }

    }

    Listing 3-2

    Smart Contract Example – 2

    ```


    When invoked, this function accepts a new string value as an argument and assigns
    it to value, thereby updating its content. This simple structure of the contract
    suggests its utility in basic data storage and retrieval operations, demonstrating
    a fundamental example of state management and interaction within a smart contract
    on the Ethereum blockchain.


    The smart contract then establishes a contract named **MyContract** with a variety
    of state variables, each showcasing different data types and characteristics in
    Solidity (Listing [3-3](#616479_1_En_3_Chapter.xhtml#PC3)).


    ```

    pragma solidity ^0.5.1;

    contract MyContract{

    string public constant stringvalue = "MyString";

    bool public myBool = true;

    int public myInt = -1;

    uint public myUint = 1;

    uint8 public myUnit8 = 8;

    uint256 public myUnit256 = 9999;

    }

    Listing 3-3

    Smart Contract Example – 3

    ```


    Here’s a consolidated explanation:


    1.  **String Variable**: The contract declares a constant public string variable
    named **stringvalue** with an initial value of ‘MyString’. Being constant, its
    value is fixed and cannot be changed after the contract is deployed.


    2.  **Boolean Variable**: It includes a public boolean variable **myBool**, initially
    set to true. This variable, like the string, can be read externally and is mutable,
    meaning its value can be changed.


    3.  **Integer Variables**: The contract features two integer variables: **myInt**,
    an integer with a value of –1, demonstrating the capability to handle negative
    numbers, and **myUint**, an unsigned integer (cannot be negative) set to 1\. The
    distinction between int and uint is important in Solidity for representing different
    types of numeric data.


    4.  **Specific Integer Types**: Additionally, there are more specific types of
    unsigned integers declared: **myUint8** and **myUint256**, initialised with values
    8 and 9999, respectively. These types specify the size of the integer in bits,
    with **uint8** being an 8-bit unsigned integer and **uint256** being a 256-bit
    unsigned integer, which is the default size for **uint**.


    This smart contract serves as an example of how different types of variables can
    be declared and initialised in Solidity. It demonstrates the use of constant values,
    mutable state variables and the distinction between signed and unsigned integers,
    as well as integers of specific bit sizes. Such contracts are fundamental in understanding
    data storage and manipulation in the context of Ethereum smart contracts.


    Listing [3-4](#616479_1_En_3_Chapter.xhtml#PC4) provides a more advanced example
    than the previous ones. It introduces an enumeration and state management, along
    with function definitions for state manipulation and query.


    ```

    pragma solidity ^0.5.1;

    contract MyContract{

    enum State { Waiting, Ready, Active }

    State public state;

    constructor() public{

    state = State.Waiting;

    }

    function activate() public{

    state = State.Active;

    }

    function isActive() public view returns(bool) {

    return state == State.Active;

    }

    }

    Listing 3-4

    Smart Contract Example – 4

    ```


    Here’s a comprehensive explanation:'
  trans: "\n### 使用 Remix 进行智能合约开发\n\n`Remix` 是以太坊开发者不可或缺的工具，为智能合约开发提供了一套全面的功能。其易用性结合内置测试和调试工具等强大功能，使其成为以太坊生态系统中新手和经验丰富开发者的理想平台。无论是编写首个智能合约，还是部署复杂的去中心化应用（DApp），`Remix`\
    \ 都能提供你在以太坊开发领域取得成功所需的工具。以下展示了从清单 3-1 开始的逐步流程：\n\n1.  **编写合约**：首先在 `Remix` 编辑器中编写你的\
    \ `Solidity` 智能合约。\n\n![](img/616479_1_En_3_Fig2_HTML.jpg)\n\n图 3-2：为 `SimpleStorage.sol`\
