- fmt: "### Technical Overview of Bitcoin\n\nAs Bitcoin ascends in its role as a digital\
    \ currency pioneer, its underlying technology offers a blend of innovation and\
    \ practicality. Table [2-1](#616479_1_En_2_Chapter.xhtml#Tab1) is a closer look\
    \ at some key technical aspects of Bitcoin:\n\n**Table 2-1** Properties of Bitcoin\n\
    \n| Smallest Unit – Satosh | Bitcoin is divisible to eight decimal places, with\
    \ the smallest unit being called a ‘Satoshi’, named after its mysterious creator.\
    \ One Satoshi is equivalent to `0.00000001` Bitcoin. This high degree of divisibility\
    \ makes Bitcoin suitable for micro-transactions, a feature not commonly found\
    \ in traditional currencies. |\n| --- | --- |\n| Conversion Methodology | Understanding\
    \ Bitcoin conversion is crucial for transactions. The value of one Bitcoin in\
    \ terms of traditional currency (like USD, EUR, etc.) is determined by the market\
    \ demand and supply dynamics on various cryptocurrency exchanges. Due to its volatile\
    \ nature, the conversion rate can fluctuate significantly in a short period. |\n\
    | Commonly Used Block Explorers | Block explorers are essential tools for navigating\
    \ the Bitcoin blockchain. Websites like `Blockchain.com` and `BlockCypher` provide\
    \ detailed information about individual blocks, transactions and addresses. They\
    \ are invaluable for tracking transactions and understanding the blockchain’s\
    \ activity. |\n| Bitcoin Wallets | To use Bitcoin, one needs a digital wallet,\
    \ which comes in various forms like desktop wallets, mobile wallets, web wallets\
    \ and hardware wallets. These wallets store the private keys necessary to sign\
    \ Bitcoin transactions and can range from highly secure cold storage options like\
    \ hardware wallets to more convenient but less secure hot wallets like mobile\
    \ and web applications. |\n| Transaction Mechanism | A Bitcoin transaction involves\
    \ transferring value between wallets. Each wallet has one or more private keys,\
    \ which are mathematically related to the wallet address. When a transaction is\
    \ initiated, it is broadcast to the network and, upon validation, included in\
    \ a block by miners, thereby confirming the transaction. |\n\nUnderstanding these\
    \ technical aspects provides a foundation for delving deeper into how Bitcoin\
    \ works, particularly its mining mechanisms, which are central to the creation\
    \ of new bitcoins and the processing of transactions across the network. Section\
    \ [2.2](#616479_1_En_2_Chapter.xhtml#Sec7) will explore this in detail, shedding\
    \ light on the process that keeps the Bitcoin network secure and functional.\n\
    \n## 2.2 How Bitcoin Works: Mining Mechanisms\n\n### Understanding Bitcoin Mining\n\
    \nBitcoin mining is indeed the backbone of the Bitcoin network, serving as the\
    \ mechanism through which new bitcoins are introduced and transactions are added\
    \ to the blockchain. This process is decentralised, unlike traditional currency\
    \ issuance by central banks. Miners use powerful computers to solve complex mathematical\
    \ problems, and the first to solve a block’s problem earns the right to add it\
    \ to the blockchain and receives a reward in bitcoins.\n\nThe concept of Bitcoin\
    \ halving is critical to understanding Bitcoin’s supply mechanics. Halving is\
    \ a scheduled event that occurs approximately every four years, or after every\
    \ 210,000 blocks are mined. During each halving, the reward for mining a new block\
    \ is cut in half. This reduction in block rewards effectively slows down the rate\
    \ of new Bitcoin creation, making the asset more scarce over time.\n\nHistorically,\
    \ Bitcoin halving events have had significant implications for the Bitcoin ecosystem,\
    \ impacting miner incentives and the market supply of Bitcoin and often correlating\
    \ with substantial price movements.\n\nTable [2-2](#616479_1_En_2_Chapter.xhtml#Tab2)\
    \ summarises the past Bitcoin halving events, including the dates, block rewards\
    \ and the estimated number of bitcoins produced daily.\n\n**Table 2-2** Past Bitcoin\
    \ Halving\n\n| Halving Event | Date | Block Reward (BTC) | Bitcoins Produced Daily\
    \ |\n| --- | --- | --- | --- |\n| 1st Halving (2012) | 28 November 2012 | `25.000`\
    \ | `3600.0` |\n| 2nd Halving (2016) | 9 July 2016 | `12.500` | `1800.0` |\n|\
    \ 3rd Halving (2020) | 11 May 2020 | `6.250` | `900.0` |\n| 4th Halving (2024)\
    \ | 20 April 2024 | `3.125` | `450.0` |\n\nThe `Bitcoins Produced Daily` column\
    \ is calculated based on the block reward and the average number of blocks mined\
    \ per day. The Bitcoin network typically targets 6 blocks per hour, which equates\
    \ to 144 blocks per day. The daily production of bitcoins is therefore the block\
    \ reward multiplied by `144`.\n\n### The Process of Mining\n\n![Figure 2-2](images/616479_1_En_2_Chapter/616479_1_En_2_Fig2_HTML.jpg)\n\
    \n**Figure 2-2** Screenshot of Bitcoin Block 824,000  \nSource: [`www.blockchain.com/explorer/blocks/btc/824000`](http://www.blockchain.com/explorer/blocks/btc/824000)\
    \ (Accessed: 4 January 2024)\n\n1.  **Transaction Validation**: Miners collect\
    \ transactions from the network’s mempool (a collection of all unconfirmed transactions)\
    \ and validate them. This includes checking for double-spending and ensuring the\
    \ transaction has not already been included in the blockchain.\n2.  **Block Creation**:\
    \ Once transactions are validated, they are bundled into a block. Each block contains\
    \ a reference to the previous block’s hash, creating a chain of blocks – hence\
    \ the term ‘blockchain’.\n3.  **Solving the Proof of Work (PoW)**: To add a block\
    \ to the blockchain, miners must solve a PoW problem. This involves finding a\
    \ hash that is below a certain target. The process requires massive computational\
    \ effort, making it difficult and time-consuming.\n4.  **Block Reward and Transaction\
    \ Fees**: The first miner to solve the PoW problem broadcasts the new block to\
    \ the network. If other miners confirm that the block is valid, it is added to\
    \ the blockchain. The successful miner is rewarded with newly created bitcoins\
    \ (block reward) and the transaction fees paid by users. This reward serves as\
    \ an incentive for miners to contribute their computational power to the network.\n\
    \nFigure [2-2](#616479_1_En_2_Chapter.xhtml#Fig2) shows information for Bitcoin\
    \ block 824,000. Here are the key details:\n\n- **Minted**: `6.25` BTC. This is\
    \ the block reward that the miner received for successfully mining the block.\
    \ It reflects the halving event that occurred in May 2020, which reduced the block\
    \ reward from `12.5` to `6.25` BTC."
  raw: '### Technical Overview of Bitcoin


    As Bitcoin ascends in its role as a digital currency pioneer, its underlying technology
    offers a blend of innovation and practicality. Table [2-1](#616479_1_En_2_Chapter.xhtml#Tab1)
    is a closer look at some key technical aspects of Bitcoin:


    Table 2-1


    Properties of Bitcoin


    | Smallest Unit – Satosh | Bitcoin is divisible to eight decimal places, with
    the smallest unit being called a ‘Satoshi’, named after its mysterious creator.
    One Satoshi is equivalent to 0.00000001 Bitcoin. This high degree of divisibility
    makes Bitcoin suitable for micro-transactions, a feature not commonly found in
    traditional currencies. |

    | Conversion Methodology | Understanding Bitcoin conversion is crucial for transactions.
    The value of one Bitcoin in terms of traditional currency (like USD, EUR, etc.)
    is determined by the market demand and supply dynamics on various cryptocurrency
    exchanges. Due to its volatile nature, the conversion rate can fluctuate significantly
    in a short period. |

    | Commonly Used Block Explorers | Block explorers are essential tools for navigating
    the Bitcoin blockchain. Websites like Blockchain.com and BlockCypher provide detailed
    information about individual blocks, transactions and addresses. They are invaluable
    for tracking transactions and understanding the blockchain’s activity. |

    | Bitcoin Wallets | To use Bitcoin, one needs a digital wallet, which comes in
    various forms like desktop wallets, mobile wallets, web wallets and hardware wallets.
    These wallets store the private keys necessary to sign Bitcoin transactions and
    can range from highly secure cold storage options like hardware wallets to more
    convenient but less secure hot wallets like mobile and web applications. |

    | Transaction Mechanism | A Bitcoin transaction involves transferring value between
    wallets. Each wallet has one or more private keys, which are mathematically related
    to the wallet address. When a transaction is initiated, it is broadcast to the
    network and, upon validation, included in a block by miners, thereby confirming
    the transaction. |


    Understanding these technical aspects provides a foundation for delving deeper
    into how Bitcoin works, particularly its mining mechanisms, which are central
    to the creation of new bitcoins and the processing of transactions across the
    network. Section [2.2](#616479_1_En_2_Chapter.xhtml#Sec7) will explore this in
    detail, shedding light on the process that keeps the Bitcoin network secure and
    functional.


    ## 2.2 How Bitcoin Works: Mining Mechanisms


    ### Understanding Bitcoin Mining


    Bitcoin mining is indeed the backbone of the Bitcoin network, serving as the mechanism
    through which new bitcoins are introduced and transactions are added to the blockchain.
    This process is decentralised, unlike traditional currency issuance by central
    banks. Miners use powerful computers to solve complex mathematical problems, and
    the first to solve a block’s problem earns the right to add it to the blockchain
    and receives a reward in bitcoins.


    The concept of Bitcoin halving is critical to understanding Bitcoin’s supply mechanics.
    Halving is a scheduled event that occurs approximately every four years, or after
    every 210,000 blocks are mined. During each halving, the reward for mining a new
    block is cut in half. This reduction in block rewards effectively slows down the
    rate of new Bitcoin creation, making the asset more scarce over time.


    Historically, Bitcoin halving events have had significant implications for the
    Bitcoin ecosystem, impacting miner incentives and the market supply of Bitcoin
    and often correlating with substantial price movements.


    Table [2-2](#616479_1_En_2_Chapter.xhtml#Tab2) summarises the past Bitcoin halving
    events, including the dates, block rewards and the estimated number of bitcoins
    produced daily.


    Table 2-2


    Past Bitcoin Halving


    | Halving Event | Date | Block Reward (BTC) | Bitcoins Produced Daily |

    | --- | --- | --- | --- |

    | 1st Halving (2012) | 28 November 2012 | 25.000 | 3600.0 |

    | 2nd Halving (2016) | 9 July 2016 | 12.500 | 1800.0 |

    | 3rd Halving (2020) | 11 May 2020 | 6.250 | 900.0 |

    | 4th Halving (2024) | 20 April 2024 | 3.125 | 450.0 |


    The ‘Bitcoins Produced Daily’ column is calculated based on the block reward and
    the average number of blocks mined per day. The Bitcoin network typically targets
    6 blocks per hour, which equates to 144 blocks per day. The daily production of
    bitcoins is therefore the block reward multiplied by 144.


    **The Process of Mining**


    ![](images/616479_1_En_2_Chapter/616479_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Screenshot of Bitcoin Block 824,000Source: [www.​blockchain.​com/​explorer/​blocks/​btc/​824000](http://www.blockchain.com/explorer/blocks/btc/824000)
    (Accessed: 4 January 2024)


    1.  **Transaction Validation**: Miners collect transactions from the network’s
    mempool (a collection of all unconfirmed transactions) and validate them. This
    includes checking for double-spending and ensuring the transaction has not already
    been included in the blockchain.


    2.  **Block Creation**: Once transactions are validated, they are bundled into
    a block. Each block contains a reference to the previous block’s hash, creating
    a chain of blocks – hence the term ‘blockchain’.


    3.  **Solving the** **Proof of Work (PoW)**: To add a block to the blockchain,
    miners must solve a PoW problem. This involves finding a hash that is below a
    certain target. The process requires massive computational effort, making it difficult
    and time-consuming.


    4.  **Block Reward and Transaction Fees**: The first miner to solve the PoW problem
    broadcasts the new block to the network. If other miners confirm that the block
    is valid, it is added to the blockchain. The successful miner is rewarded with
    newly created bitcoins (block reward) and the transaction fees paid by users.
    This reward serves as an incentive for miners to contribute their computational
    power to the network.


    Figure [2-2](#616479_1_En_2_Chapter.xhtml#Fig2) shows information for Bitcoin
    block 824,000\. Here are the key details:


    *   **Minted**: 6.25 BTC. This is the block reward that the miner received for
    successfully mining the block. It reflects the halving event that occurred in
    May 2020, which reduced the block reward from 12.5 to 6.25 BTC.'
  trans: "\n### 比特币技术概览\n\n随着比特币作为数字货币先驱的角色日益凸显，其底层技术融合了创新性与实用性。表 2-1 详细列出了比特币的一些关键技术特性：\n\
    \n**表 2-1** 比特币的特性\n\n| 最小单位——聪 | 比特币可精确到小数点后八位，最小单位称为“聪”，以其神秘创造者的名字命名。一聪相当于 `0.00000001`\
    \ 比特币。这种高度可分性使比特币适用于小额交易，这是传统货币通常不具备的特性。 |\n| --- | --- |\n| 兑换方法 | 理解比特币兑换对于交易至关重要。一个比特币相对于传统货币（如美元、欧元等）的价值，由各种加密货币交易所上的市场供需动态决定。由于其波动性，兑换率可能在短时间内大幅波动。\
    \ |\n| 常用区块浏览器 | 区块浏览器是浏览比特币区块链的重要工具。诸如 `Blockchain.com` 和 `BlockCypher` 之类的网站提供关于单个区块、交易和地址的详细信息。它们对于追踪交易和理解区块链活动来说是不可或缺的。\
    \ |\n| 比特币钱包 | 要使用比特币，需要有一个数字钱包，其形式多种多样，如桌面钱包、手机钱包、网络钱包和硬件钱包。这些钱包存储着签署比特币交易所需的私钥，范围从高安全性的冷存储选项（如硬件钱包）到更便捷但安全性较低的热钱包（如手机和网络应用）。\
    \ |\n| 交易机制 | 比特币交易涉及钱包之间的价值转移。每个钱包都有一个或多个私钥，这些私钥与钱包地址在数学上相关联。当交易发起时，它会被广播到网络，经验证后由矿工包含在一个区块中，从而确认交易。\
    \ |\n\n理解这些技术特性为深入研究比特币的运作方式奠定了基础，特别是其挖矿机制，该机制对新区块的产生以及网络中交易的处理至关重要。2.2 节将详细探讨这一点，揭示保持比特币网络安全且正常运转的过程。\n\
    \n## 2.2 比特币如何运作：挖矿机制\n\n### 理解比特币挖矿\n\n比特币挖矿确实是比特币网络的支柱，它是引入新比特币并将交易添加到区块链的机制。与中央银行发行的传统货币不同，这个过程是去中心化的。矿工使用强大的计算机来解决复杂的数学问题，第一个解决某个区块问题的矿工有权将其添加到区块链中，并获得比特币奖励。\n\
    \n比特币减半的概念对于理解比特币的供应机制至关重要。减半是每大约四年，或每挖出 210,000 个区块就会发生一次的预定事件。每次减半，挖出一个新区块的奖励就会减半。区块奖励的减少有效地减缓了新比特币的创建速度，使得该资产随着时间的推移变得更加稀缺。\n\
    \n从历史上看，比特币减半事件对比特币生态系统产生了重大影响，影响了矿工激励和比特币的市场供应，并且常常与重大的价格波动相关。\n\n表 2-2 总结了过去的比特币减半事件，包括日期、区块奖励和每日估计产生的比特币数量。\n\
    \n**表 2-2** 过去的比特币减半事件\n\n| 减半事件 | 日期 | 区块奖励（BTC） | 每日产生的比特币数量 |\n| --- | ---\
    \ | --- | --- |\n| 第一次减半（2012 年） | 2012 年 11 月 28 日 | `25.000` | `3600.0` |\n\
    | 第二次减半（2016 年） | 2016 年 7 月 9 日 | `12.500` | `1800.0` |\n| 第三次减半（2020 年） | 2020\
    \ 年 5 月 11 日 | `6.250` | `900.0` |\n| 第四次减半（2024 年） | 2024 年 4 月 20 日 | `3.125`\
    \ | `450.0` |\n\n`每日产生的比特币数量`这一列是基于区块奖励和每日平均挖出的区块数量计算得出的。比特币网络通常以每小时 6 个区块为目标，相当于每天\
    \ 144 个区块。因此，每日比特币产量等于区块奖励乘以 `144`。\n\n### 挖矿过程\n\n![图 2-2](img/616479_1_En_2_Fig2_HTML.jpg)\n\
    \n**图 2-2** 比特币第 824,000 号区块截图  \n来源：[`www.blockchain.com/explorer/blocks/btc/824000`](http://www.blockchain.com/explorer/blocks/btc/824000)\
    \ （访问日期：2024 年 1 月 4 日）\n\n1.  **交易验证**：矿工从网络的交易内存池中收集交易（所有未确认交易的集合）并对它们进行验证。这包括检查双重支付，并确保该交易尚未被包含在区块链中。\n\
    2.  **创建区块**：交易验证通过后，它们被打包成一个区块。每个区块都包含对前一个区块哈希值的引用，形成了一条链式区块——因此得名“区块链”。\n3.\
    \  **解决工作量证明**：要将区块添加到区块链，矿工必须解决一个工作量证明问题。这涉及到寻找一个低于特定目标的哈希值。该过程需要巨大的算力，因此既困难又耗时。\n\
    4.  **区块奖励与交易费**：第一个解决工作量证明问题的矿工将新区块广播到网络。如果其他矿工确认该区块有效，它就会被添加到区块链中。成功的矿工会获得新创建的比特币（区块奖励）以及用户支付的交易费。这种奖励激励矿工为网络贡献其计算能力。\n\
    \n图 2-2 显示了比特币第 824,000 号区块的信息。以下是关键细节：\n\n- **挖矿产出**：`6.25` BTC。这是矿工成功挖出该区块所获得的区块奖励。它反映了\
    \ 2020 年 5 月发生的减半事件，该事件将区块奖励从 `12.5` 减少到了 `6.25` BTC。\n"
- fmt: '- **Fees**: `1.13960633 BTC`. This amount was collected by the miner as transaction
    fees. Miners receive transaction fees from the Bitcoin users who send transactions,
    and these fees incentivise miners to include transactions in the next block. The
    higher the fee attached to a transaction, the more likely it is to be included
    in the next block.


    - **Block Height**: `824,000`. This is the position of the block in the blockchain.
    Each block is sequentially numbered, and the height indicates the length of the
    blockchain. A higher block number means a longer chain, reflecting more cumulative
    proof of work and security.


    - **Mined on**: `11:27:15 2 January 2024`. This is the timestamp for when the
    block was successfully mined and added to the blockchain.


    The Coinbase Message, which is typically used by miners to include extra nonces
    or voting tags, in this block contains what appears to be random characters, possibly
    a result of the software or the pool that mined this block encoding their message
    in this way.


    The value of transactions in this block totalled `3,921.2643 BTC`, worth `$178,553,749`
    at the time the block was mined. This high value reflects the cumulative value
    of all transactions included in the block.


    Additionally, the block contains `3,114` transactions and has a size of `1,594,851`
    bytes, indicating the amount of data stored in the block. It also has a weight
    of `3,997,506 WU` (weight units), which is a measure of the block’s ‘size’ in
    terms of block capacity in the context of the block size limit.


    Finally, it’s worth noting that the block’s difficulty is listed, a metric that
    shows how hard it was to find a hash below a given target. The higher the difficulty,
    the more computational power and time it takes on average to mine a new block.
    Bitcoin mining difficulty is a measure of how hard it is to find a hash below
    the target value. The Bitcoin network adjusts this difficulty approximately every
    two weeks to ensure that a new block is added approximately every ten minutes.
    This adjustment is crucial to maintaining the blockchain’s steady and predictable
    creation rate. The difficulty is calculated as follows:


    ![$$ New\ difficulty= Old\ difficulty\kern0.5em \times \frac{2016\ blocks}{\ time\
    taken\ to\ mine\ last\ 2016\ blocks} $$](images/616479_1_En_2_Chapter/616479_1_En_2_Chapter_TeX_Equa.png)


    ### Evolution of Mining Hardware


    Over the years, Bitcoin mining has evolved from CPUs to GPUs and finally to specialised
    hardware known as ASICs (Application-Specific Integrated Circuits), shown in Figure
    [2-3](#616479_1_En_2_Chapter.xhtml#Fig3). ASICs are designed specifically for
    Bitcoin mining and are much more efficient than general-purpose hardware.


    ![Figure 2-3](images/616479_1_En_2_Chapter/616479_1_En_2_Fig3_HTML.jpg)


    Figure 2-3 Screenshot of Bitcoin Block 824,000 Source: [www.ecmwf.int/sites/default/files/elibrary/2020/19380-ecmwf-scalability-programme-progress-and-plans.pdf](http://www.ecmwf.int/sites/default/files/elibrary/2020/19380-ecmwf-scalability-programme-progress-and-plans.pdf)
    (Accessed: 4 January 2024)


    ### Mining Pools


    Mining pools have become a cornerstone of the Bitcoin mining landscape. They provide
    individual miners with the opportunity to combine their computational resources,
    thereby increasing the likelihood of successfully mining blocks and receiving
    Bitcoin rewards. This collective effort not only stabilises revenue for participants
    but also democratises access to mining, which might otherwise be prohibitive due
    to the escalating costs of mining hardware and the electricity required for such
    operations.


    The rise in the complexity of mining puzzles, directly tied to the number of miners
    and the overall hash rate of the network, has necessitated the pooling of resources.
    Without such collaboration, small-scale miners face significant financial risk
    due to the high variance and unpredictability of mining solo. By joining forces
    in mining pools, these individuals can attain a more steady and predictable flow
    of income, reflecting a proportionate share of the collective mining output relative
    to their individual contributions.


    Additionally, mining pools facilitate network upgrades. Central pool managers,
    who construct blocks and manage the pool’s operations, can implement software
    upgrades, thereby streamlining the process for all miners within the pool. When
    the mining pool’s software is updated, it effectively updates the software for
    all members, simplifying the transition and encouraging more consistent adoption
    across the network.


    ![Figure 2-4](images/616479_1_En_2_Chapter/616479_1_En_2_Fig4_HTML.jpg)


    Figure 2-4 Hash Rate Distribution Source: [www.blockchain.com/explorer/charts/pools](http://www.blockchain.com/explorer/charts/pools)
    (3 January 2024)


    Figure [2-4](#616479_1_En_2_Chapter.xhtml#Fig4) illustrates the distribution of
    hash rate among the largest Bitcoin mining pools over a selected period. Each
    slice represents a mining pool and its contribution to the total hash rate, measured
    in blocks mined. Foundry USA has the largest share with `318` blocks, followed
    by AntPool with `259` blocks and F2Pool with `121` blocks.


    ![Figure 2-5](images/616479_1_En_2_Chapter/616479_1_En_2_Fig5_HTML.jpg)


    Figure 2-5 Example of Bitcoin Mining Pool in China


    Figure [2-5](#616479_1_En_2_Chapter.xhtml#Fig5) shows my precious Bitcoin mining
    pool in China. Such facilities are structured to maintain critical conditions
    for efficient mining. Key aspects include a reliable and robust Internet connection
    to ensure continuous communication with the Bitcoin network, stable electrical
    voltage to keep the mining rigs running optimally and controlled temperatures
    to prevent overheating, which is especially important given the heat generated
    by the intensive computational processes. Dry conditions are also necessary to
    protect the sensitive electronic equipment from moisture-related damage. Due to
    the significant noise produced by the cooling fans required to maintain such an
    environment, these operations are typically situated in secluded areas. It’s important
    to note in May 2021, China’s State Council announced measures to crack down on
    Bitcoin mining and trading, leading to the closure of mining activities across
    several provinces. This was part of a broader effort to mitigate financial risks
    and control speculative trading of cryptocurrencies. The measures resulted in
    a significant migration of mining operations out of China.


    However, the concept of mining pools is not without its drawbacks. One significant
    concern is the centralisation they introduce to the Bitcoin network. While Bitcoin’s
    design is inherently decentralised, large mining pools amass considerable influence,
    potentially wielding significant power over the network’s operations. Although
    miners can theoretically migrate to different pools if a particular pool gains
    excessive power, the reality of such shifts in allegiance is not well documented.
    Another downside to the prominence of mining pools is the reduced number of full
    node operators. Historically, miners maintained fully validating nodes, each independently
    storing and confirming the entire blockchain. Now, the trend has shifted towards
    offloading these responsibilities to the pool managers, resulting in fewer nodes
    that fully validate and store the blockchain. This consolidation of responsibility
    could pose risks to the network’s resilience and the full verification process
    that underpins Bitcoin’s trust model.


    In essence, while mining pools have made Bitcoin mining more accessible and reliable
    for individual miners, they introduce a layer of centralisation that could, in
    theory, conflict with the cryptocurrency’s foundational ethos of decentralisation.
    The balance between making Bitcoin mining feasible for individuals and maintaining
    the decentralised nature of the network remains a delicate and ongoing consideration
    within the Bitcoin community.'
