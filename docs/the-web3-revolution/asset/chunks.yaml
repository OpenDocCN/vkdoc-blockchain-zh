    \n图 3-3：编译 `SimpleStorage.sol`\n\n3.  **测试**：使用 `Remix` 测试环境编写并执行合约的测试。\n\n![](img/616479_1_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4：测试 `SimpleStorage.sol`\n\n4.  **调试**：利用调试器逐步执行代码并对其进行优化。\n\n5.  **部署**：直接从\
    \ `Remix` 将你的合约部署到测试网络或以太坊主网。\n\n![](img/616479_1_En_3_Fig5_HTML.jpg)\n\n图 3-5：部署\
    \ `SimpleStorage.sol`\n\n6.  **交互**：部署后，使用 `Remix` 界面与你的合约函数进行交互。\n\n![](img/616479_1_En_3_Fig6_HTML.jpg)\n\
    \n图 3-6：交互 `SimpleStorage.sol`\n\n![](img/616479_1_En_3_Fig7_HTML.jpg)\n\n图 3-7：交互\
    \ `SimpleStorage.sol` – 交易\n\n![](img/616479_1_En_3_Fig8_HTML.jpg)\n\n图 3-8：交互\
    \ `SimpleStorage.sol` – 获取\n\n现在你已经对 `Remix` 如何简化以太坊开发流程有了基础了解，让我们应用这些知识。在以下章节中，我们将探索智能合约的实际示例。这些示例将演示如何有效利用\
    \ `Remix` 的强大功能来编写、测试和部署智能合约，为你提供构建高效、安全的区块链应用的实践经验。\n\n## 3.4 简单的智能合约示例\n\n清单\
    \ 3-2 中的智能合约定义了一个名为 `MyContract` 的简单合约。它主要包含一个名为 `value` 的公共字符串变量，初始设置为 `'MyValue'`。该变量的公共状态允许外部实体读取其值，这得益于\
    \ `Solidity` 自动生成的 getter 函数。此外，该合约还包含一个 `set` 函数，用于修改 `value`。\n\n```\npragma\
    \ solidity ⁰.5.1;\ncontract MyContract{\n    string public value = \"MyValue\"\
    ;\n    function set(string memory _value) public {\n        value = _value;\n\
    \    }\n}\n```\n\n清单 3-2：智能合约示例 – 2\n\n调用时，该函数接受一个新的字符串值作为参数，并将其赋值给 `value`，从而更新其内容。这个合约的简单结构表明了它在基本数据存储和检索操作中的实用性，展示了以太坊区块链上智能合约中状态管理和交互的基本示例。\n\
    \n接下来，该智能合约建立了一个名为 `MyContract` 的合约，其中包含多种状态变量，展示了 `Solidity` 中不同的数据类型和特性（清单 3-3）。\n\
    \n```\npragma solidity ⁰.5.1;\ncontract MyContract{\n    string public constant\
    \ stringvalue = \"MyString\";\n    bool public myBool = true;\n    int public\
    \ myInt = -1;\n    uint public myUint = 1;\n    uint8 public myUnit8 = 8;\n  \
    \  uint256 public myUnit256 = 9999;\n}\n```\n\n清单 3-3：智能合约示例 – 3\n\n以下是整合的说明：\n\
    \n1.  **字符串变量**：合约声明了一个名为 `stringvalue` 的常量公共字符串变量，初始值为 `'MyString'`。作为常量，其值是固定的，合约部署后无法更改。\n\
    \n2.  **布尔变量**：合约包含一个公共布尔变量 `myBool`，初始设置为 `true`。该变量与字符串类似，可以被外部读取，并且是可变的，意味着其值可以更改。\n\
    \n3.  **整数变量**：合约包含两个整数变量：`myInt`，一个值为 `-1` 的整数，展示了处理负数的能力；以及 `myUint`，一个设置为 `1`\
    \ 的无符号整数（不能为负数）。在 `Solidity` 中，`int` 和 `uint` 的区别对于表示不同类型的数值数据很重要。\n\n4.  **特定整数类型**：此外，还声明了更具体的无符号整数类型：`myUint8`\
    \ 和 `myUint256`，分别初始化为 `8` 和 `9999`。这些类型以位数指定整数的大小，`uint8` 是 8 位无符号整数，`uint256`\
    \ 是 256 位无符号整数，即 `uint` 的默认大小。\n\n该智能合约作为示例，展示了如何在 `Solidity` 中声明和初始化不同类型的变量。它演示了常量的使用、可变状态变量、有符号与无符号整数的区别，以及特定位数的整数。理解这类合约是掌握以太坊智能合约中数据存储与操作的基础。\n\
    \n清单 3-4 提供了一个比前几个更高级的示例。它引入了枚举和状态管理，以及用于状态操作和查询的函数定义。\n\n```\npragma solidity\
    \ ⁰.5.1;\ncontract MyContract{\n    enum State { Waiting, Ready, Active }\n  \
    \  State public state;\n    constructor() public{\n        state = State.Waiting;\n\
    \    }\n    function activate() public{\n        state = State.Active;\n    }\n\
    \    function isActive() public view returns(bool) {\n        return state ==\
    \ State.Active;\n    }\n}\n```\n\n清单 3-4：智能合约示例 – 4\n\n以下是全面的说明：\n"
- fmt: "#### Enumeration Declaration\nThe contract starts with the declaration of\
    \ an enumeration `State`, which includes three possible states: `Waiting`, `Ready`\
    \ and `Active`. Enumerations are user-defined types in Solidity that allow for\
    \ the creation of a set of named constants, improving code readability and maintainability.\n\
    \n#### State Variable\nIt then declares a public state variable of type `State`.\
    \ The visibility of this variable as `public` means that Solidity will automatically\
    \ create a getter for it, allowing external contracts or interfaces to check the\
    \ current state of the contract.\n\n#### Constructor\nThe contract includes a\
    \ constructor, which is a special function that is executed once when the contract\
    \ is deployed. In this constructor, the state variable is initialised to `State.Waiting`.\
    \ This sets the initial state of the contract to `Waiting` when it is deployed\
    \ on the Ethereum blockchain.\n\n#### Function to Change State\nThere is a function\
    \ `activate()` that, when called, changes the contract’s state to `Active`. This\
    \ demonstrates how contract states can be manipulated through functions.\n\n####\
    \ State Query Function\nFinally, the contract has a function `isActive()` that\
    \ returns a boolean indicating whether the contract’s current state is `Active`.\
    \ This function is a `view` function, meaning it does not modify the state of\
    \ the contract but merely reads and returns information.\n\nOverall, this contract\
    \ exemplifies the use of enums to manage and query contract states in Solidity,\
    \ showcasing a common pattern in Ethereum smart contracts where the state of a\
    \ contract changes based on interactions with functions defined within it. This\
    \ pattern is crucial in many decentralised applications, where the state of the\
    \ contract often determines the logic that should be executed.\n\nListing [3-5](#616479_1_En_3_Chapter.xhtml#PC5)\
    \ includes a combination of state management, access control and structured data\
    \ handling. It provides a practical example of how smart contracts on the Ethereum\
    \ blockchain can use access control mechanisms to restrict certain actions to\
    \ specific users.\n\n```\npragma solidity ^0.5.1;\ncontract AddPerson{\nuint256\
    \ public peopleCount = 0;\nmapping(uint => Person) public people;\naddress owner;\n\
    modifier onlyOwner() {\nrequire(msg.sender == owner);\n_;\n}\nstruct Person{\n\
    uint _id;\nstring _firstName;\nstring _lastName;\n}\nconstructor() public {\n\
    owner = msg.sender;\n}\nfunction addPerson(string memory _firstName, string memory\
    \ _lastName) public onlyOwner{\nincrementCount();\npeople[peopleCount] = Person(peopleCount,\
    \ _firstName, _lastName);\n}\nfunction incrementCount() internal {\npeopleCount\
    \ += 1;\n}\n}\nListing 3-5\nSmart Contract Example – 5\n```\n\nLet’s break down\
    \ its key components, especially focusing on the `onlyOwner` modifier:\n\n1. \
    \ **State Variables and Structure**\n    *   The contract initialises a public\
    \ state variable `peopleCount` to 0, which tracks the number of people added.\n\
    \    *   It employs a mapping `people` to associate an unsigned integer (`uint`)\
    \ with a `Person` structure, facilitating the storage and retrieval of person\
    \ data.\n    *   The `Person` structure is defined with properties `_id`, `_firstName`\
    \ and `_lastName`, allowing grouping of related information about a person.\n\n\
    2.  **Ownership and Access Control (`onlyOwner` Modifier)**\n    *   A significant\
    \ feature of this contract is the `onlyOwner` modifier. It’s designed to restrict\
    \ certain functionalities to the owner of the contract.\n    *   The contract\
    \ declares an `address` variable named `owner`. In Ethereum, addresses are used\
    \ to identify accounts, which can be external users or other contracts.\n    *\
    \   The `onlyOwner` modifier uses the `require` statement to ensure that the `msg.sender`\
    \ (the address calling the function) is equal to `owner`. This guarantees that\
    \ only the user who deployed the contract (the owner) can call functions that\
    \ are protected by this modifier.\n    *   The `_;` in the modifier represents\
    \ the placeholder for the function body that the modifier is applied to.\n\n3.\
    \  **Contract Constructor**\n    *   In the contract’s constructor, `owner` is\
    \ set to `msg.sender`, meaning the address deploying the contract is recorded\
    \ as the owner.\n\n4.  **Function to Add Person (`addPerson()`)**\n    *   The\
    \ `addPerson()` function is used to add new people with their first and last names\
    \ to the contract. This function is governed by the `onlyOwner` modifier, meaning\
    \ only the owner of the contract can add new people.\n    *   The function increments\
    \ `peopleCount` and adds a new `Person` to the `people` mapping.\n\n5.  **Internal\
    \ Function to Increment Count**\n    *   There’s also an internal function `incrementCount()`\
    \ which simply increases the `peopleCount` by one. Being internal, this function\
    \ can only be called from within the contract.\n\nThe `onlyOwner` modifier is\
    \ a common pattern in smart contracts for ensuring that sensitive functions can\
    \ only be executed by the contract’s owner, adding a layer of security and control.\n\
    \nListing [3-6](#616479_1_En_3_Chapter.xhtml#PC6) is a more complex example than\
    \ Listing [3-5](#616479_1_En_3_Chapter.xhtml#PC5) that illustrates the use of\
    \ a time-based modifier, a mapping and a structure. It is designed to manage a\
    \ list of people with a constraint on when certain operations can be performed.\n\
    \n```\npragma solidity ^0.5.1;\ncontract AddPerson{\nuint256 public peopleCount\
    \ = 0;\nmapping(uint => Person) public people;\nuint256 openingTime = 1704067200;\n\
    modifier onlyWhileOpen() {\nrequire(block.timestamp >= openingTime);\n_;\n}\n\
    struct Person{\nuint _id;\nstring _firstName;\nstring _lastName;\n}\nfunction\
    \ addPerson(string memory _firstName, string memory _lastName) public onlyWhileOpen{\n\
    incrementCount();\npeople[peopleCount] = Person(peopleCount, _firstName, _lastName);\n\
    }\nfunction incrementCount() internal {\npeopleCount += 1;\n}\n}\nListing 3-6\n\
    Smart Contract Example – 6\n```\n\nThis contract is an example of how smart contracts\
    \ can integrate time-based logic and manage a collection of structured data. The\
    \ use of the `openingTime` variable along with the `onlyWhileOpen` modifier showcases\
    \ a common pattern where certain functionalities of a contract are restricted\
    \ until a predefined condition, like a specific time or date, is met. This pattern\
    \ is useful in scenarios like timed events, restricted access periods or phased\
    \ contract functionalities.\n\nHere’s the main differences between Listings [3-5](#616479_1_En_3_Chapter.xhtml#PC5)\
    \ and [3-6](#616479_1_En_3_Chapter.xhtml#PC6):\n\n**Time-Based Modifier (`openingTime`)**\n\
    *   The contract includes a state variable `uint256 openingTime = 1704067200;`.\
    \ This value represents a specific point in time as a Unix timestamp. The specific\
    \ value `1704067200` corresponds to seconds since 1 January, 2024.\n*   A modifier\
    \ `onlyWhileOpen` is defined using this timestamp. It uses the `require` statement\
    \ to ensure that the current block’s timestamp (`block.timestamp`, which gives\
    \ the current time in Unix timestamp format) is greater than or equal to `openingTime`.\
    \ This means that the functions using this modifier can only be executed after\
    \ the time specified by `openingTime`.\n\n## 3.5 ERC Standards: ERC20, ERC721,\
    \ ERC1155\n\nIn this section, we will focus exclusively on the types of smart\
    \ contracts in the realm of Ethereum blockchain, particularly delving into token\
    \ standards. We reserve a more in-depth discussion of the legal attributes of\
    \ tokens for Part 3, ‘Decentralised Finance (DeFi) and Applications’. Here, our\
    \ attention is on the technical token standards."
