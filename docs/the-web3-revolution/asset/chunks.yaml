- fmt: '### DeFi vs. TradFi


    DeFi represents a transformative shift from traditional finance (TradFi) towards
    a more open, efficient and inclusive financial system leveraging blockchain technology.
    Unlike TradFi’s centralised and permissioned frameworks, DeFi offers a permissionless
    and transparent environment, eliminating intermediaries and reducing transaction
    times. It introduces innovative financial services through smart contracts, ensuring
    immediate settlement and promoting a trustless ecosystem where transactions are
    irreversible and publicly verifiable. While TradFi benefits from established regulatory
    practices and user familiarity, DeFi challenges these norms by offering non-custodial
    asset control and fostering rapid technological innovation. This evolution underscores
    a pivotal movement towards democratising finance, though it also emphasises the
    need for users to navigate emerging risks and regulatory landscapes independently.[¹](#616479_1_En_5_Chapter.xhtml#Sec19)


    **Table 5-1** The Comparison of TradFi and DeFi Across Various Dimensions[²](#616479_1_En_5_Chapter.xhtml#Sec19)


    | Aspect | Traditional Finance (TradFi) | Decentralised Finance (DeFi) |

    | --- | --- | --- |

    | Access | Permissioned models with exclusive, controlled access | Permissionless
    models offering inclusivity and immutability |

    | Data Integrity | Segmented, reliant on intermediaries | Composable, interoperable
    ‘money Legos’ |

    | Interoperability | Limited due to centralised control | High, facilitated by
    blockchain technology |

    | Settlement | Can take days (T+day(s)) due to intermediaries | Immediate settlement
    through smart contracts |

    | Value Representation | Uses data to record nominal value, often linked to real-world
    assets | Considers data as value itself, with blockchain verifying transactions
    |

    | Accounting | Double-entry system requiring manual reconciliation | Triple-entry
    system with blockchain as an immutable record |

    | Trust | Centralised institutions as trusted intermediaries | Trustless system
    where code enforces rules |

    | Data Availability | Transaction history is private and controlled | Transaction
    history is publicly accessible and transparent |

    | Innovation | Incremental and sustaining, with slower adaptation to new technologies
    | Radical and disruptive, quickly adapting and innovating |

    | User Experience | Established and user-friendly, but innovation-limited | Nascent
    and often requires technical knowledge, but highly innovative |

    | Risk Management | Managed through regulations and established practices | Individual
    responsibility to understand and manage risks |

    | Transaction Reversibility | Reversible with the possibility to amend permissions
    | Mostly irreversible, with transactions being append-only |

    | Custody | Custodial, with intermediaries controlling assets | Mostly non-custodial,
    granting users control over their assets |

    | Regulatory Compliance | Heavily regulated with clear guidelines | Emerging regulatory
    landscape, with code and law defining operations |

    | Transparency | Operationally opaque, disclosing limited information to authorities
    | Fully transparent with all operations verifiable on the blockchain |


    The DeFi landscape is rich with applications that are reshaping the financial
    sector. These platforms harness the power of blockchain to offer services ranging
    from exchanges and lending to stablecoins and insurance, each with the goal of
    decentralising and democratising finance.[³](#616479_1_En_5_Chapter.xhtml#Sec19),
    [⁴](#616479_1_En_5_Chapter.xhtml#Sec19), [⁵](#616479_1_En_5_Chapter.xhtml#Sec19)
    Table 5-2 exemplifies the breadth of DeFi’s reach, highlighting key players and
    innovations that exemplify this new era of financial independence and interoperability.


    **Table 5-2** DeFi Applications


    | DeFi Application Category | Examples/Platforms |

    | --- | --- |

    | Decentralised Exchanges (DEXs) | Uniswap, 1inch, SushiSwap, Balancer, dYdX,
    PancakeSwap |

    | Lending Platforms | Aave, Compound, Dharma |

    | Stablecoins | Dai, Gemini Dollar |

    | Insurance | Etherisc, Nexus Mutual |

    | Prediction Markets/Oracles | Chainlink, Band Protocol, Pyth |


    ### Decentralised Exchanges (DEXs)


    Decentralised exchanges (DEXs) have become an integral part of the cryptocurrency
    landscape, providing an alternative to traditional, centralised exchanges by facilitating
    peer-to-peer cryptocurrency trading directly between users. DEXs utilise smart
    contracts on blockchain platforms like Ethereum to execute trades without the
    need for intermediaries, preserving the user’s control and ownership of their
    private keys throughout the transaction process.


    The concept of DEXs is built on the ethos of ‘disintermediation’, aiming to remove
    middlemen from financial transactions. This approach has led to a surge in popularity
    for DEXs due to their numerous benefits, including the availability of a broader
    range of tokens, enhanced user anonymity, reduced counterparty risk and increased
    security, as users maintain custody of their funds. These benefits come from the
    fact that DEXs allow users to trade directly from their wallets without relinquishing
    control of their assets to the exchange.


    There are various models of DEXs, each addressing different aspects of decentralised
    trading:


    *   **Automated Market Makers (AMMs)**: This model removes the traditional order
    book and uses liquidity pools and smart contracts to set the price of assets.
    AMMs have gained popularity due to their ability to provide liquidity and allow
    for earning interest through liquidity mining.


    *   **On-Chain Order Books**: In this model, all orders, as well as their modifications
    and cancellations, are recorded on the blockchain. While this method offers high
    transparency, it can be less practical due to associated fees and potential delays
    due to blockchain processing times.


    *   **Off-Chain Order Books**: These DEXs store orders off the blockchain and
    only use the blockchain for transaction settlement. This approach can offer a
    balance between decentralised trading and the faster execution typically found
    on centralised exchanges.


    *   **DEX Aggregators**: These protocols source liquidity from multiple DEXs to
    find the most efficient trading routes, potentially offering better prices and
    lower slippage for users.


    Despite their advantages, DEXs also come with challenges, such as potentially
    higher fees during network congestion, lower trading volumes and liquidity compared
    to centralised exchanges, and they can be less user-friendly for those new to
    the cryptocurrency space. Furthermore, the decentralised nature of DEXs means
    that users must be diligent in safeguarding their private keys, as lost keys equate
    to irretrievable funds.


    The landscape of DEXs is continually evolving, with new innovations seeking to
    blend different models for improved efficiency and user experience. As the DeFi
    sector grows, DEXs are expected to see continued innovation and increased usage,
    aligning with the broader ethos of blockchain and cryptocurrency which emphasises
    self-sovereignty and trustless transactions.[⁶](#616479_1_En_5_Chapter.xhtml#Sec19),
    [⁷](#616479_1_En_5_Chapter.xhtml#Sec19)'
