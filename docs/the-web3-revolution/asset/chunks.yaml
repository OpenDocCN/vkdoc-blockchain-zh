- fmt: "#### ERC721 Standard\n\nIn contrast, `ERC721`, proposed in 2017 and accepted\
    \ in 2018, focuses on non-fungible tokens (NFTs). These tokens are unique and\
    \ cannot be interchanged. `ERC721` tokens represent distinct items like digital\
    \ artwork, collectibles or real estate property. They play a crucial role in creating\
    \ a market for unique digital assets, as evidenced by the sale of a $69 million\
    \ digital artwork by Beeple.[⁸](#616479_1_En_3_Chapter.xhtml#Sec16)\n\nHere is\
    \ an example of an `ERC721` token contract:\n\n```\n// contracts/HGNFT.sol\n//\
    \ SPDX-License-Identifier: MIT\npragma solidity ^0.8.0;\nimport \"@openzeppelin/contracts/token/ERC721/extensions/ERC721URIStorage.sol\"\
    ;\nimport \"@openzeppelin/contracts/utils/Counters.sol\";\ncontract HGNFT is ERC721URIStorage\
    \ {\nusing Counters for Counters.Counter;\nCounters.Counter private _tokenIds;\n\
    constructor() ERC721(\"HGNFT\", \"HGN\") {}\nfunction awardItem(address player,\
    \ string memory tokenURI)\npublic\nreturns (uint256)\n{\nuint256 newItemId = _tokenIds.current();\n\
    _mint(player, newItemId);\n_setTokenURI(newItemId, tokenURI);\n_tokenIds.increment();\n\
    return newItemId;\n}\n}\n```\n\nHere’s a breakdown of its components:\n\n1. **SPDX-License-Identifier\
    \ and Solidity Version**\n\n```\n    // SPDX-License-Identifier: MIT pragma solidity\
    \ ^0.8.0;\n```\n\nThis specifies the contract’s license and the Solidity compiler\
    \ version, indicating that the contract is to be compiled with Solidity version\
    \ 0.8.0 or newer.\n\n2. **Import Statements**\n   - `ERC721URIStorage` is an extension\
    \ of OpenZeppelin’s `ERC721` standard. It adds functionality to set and manage\
    \ a token URI (Uniform Resource Identifier), which typically points to a JSON\
    \ file that conforms to the ‘ERC721 Metadata JSON Schema’.\n   - `Counters` is\
    \ a utility library from OpenZeppelin that provides a counter variable type, which\
    \ is used to safely increment and decrement numerical values.\n\n```solidity\n\
    \    import \"@openzeppelin/contracts/token/ERC721/extensions/ERC721URIStorage.sol\"\
    ;\n    import \"@openzeppelin/contracts/utils/Counters.sol\";\n```\n\n3. **Contract\
    \ Declaration and Inheritance**\n\n```solidity\ncontract HGNFT is ERC721URIStorage\
    \ {\n```\n\nThis declares the contract `HGNFT`, which inherits from `ERC721URIStorage`,\
    \ meaning it will have all the standard functionality of an `ERC721` token plus\
    \ the additional URI storage features.\n\n4. **Using Statements and State Variables**\n\
    \   - The `using` statement allows the contract to use the functions defined in\
    \ the `Counters` library for `Counter` types.\n   - `_tokenIds` is a private state\
    \ variable that keeps track of the current token ID using the `Counter` utility.\n\
    \n```solidity\n    using Counters for Counters.Counter;\n    Counters.Counter\
    \ private _tokenIds;\n```\n\n5. **Constructor**\n\n```solidity\n    constructor()\
    \ ERC721(\"HGNFT\", \"HGN\") {}\n```\n\nThe constructor initialises the contract\
    \ by calling the `ERC721` constructor with the name of the token (`HGNFT`) and\
    \ its symbol (`HGN`).\n\n6. **`awardItem` Function**\n   - `awardItem` is a public\
    \ function that can be called to mint a new NFT and assign it to the `player`\
    \ address.\n   - It first gets the current token ID value, mints a new token with\
    \ this ID to the `player` and sets the token’s URI.\n   - Afterwards, it increments\
    \ the `_tokenIds` counter to ensure that the next token has a unique ID.\n   -\
    \ The function returns the new item ID, which can be used to reference the newly\
    \ minted token.\n\n```solidity\n    function awardItem(address player, string\
    \ memory tokenURI)\n    public\n    returns (uint256)\n    {\n    uint256 newItemId\
    \ = _tokenIds.current();\n    _mint(player, newItemId);\n    _setTokenURI(newItemId,\
    \ tokenURI);\n    _tokenIds.increment();\n    return newItemId;\n    }\n```\n\n\
    In essence, this contract provides a simple yet functional example of an NFT contract\
    \ that can be used to create unique digital assets, where each token can be associated\
    \ with a distinct URI pointing to metadata that describes the token’s properties.\
    \ The contract uses the OpenZeppelin library to ensure secure and standardised\
    \ functionality.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11** Deploy `ERC721.sol`\n\nFigure [3-11](#616479_1_En_3_Chapter.xhtml#Fig11)\
    \ shows the process of deploying an `ERC721` smart contract, specifically a non-fungible\
    \ token (NFT) contract named `HGNFT`. Here’s a breakdown of the elements within\
    \ the red box:\n\n1. **HGNFT - contracts/ERC721.sol**: This indicates that the\
    \ `HGNFT` contract is selected and ready to be deployed. The contract is located\
    \ within the `contracts` folder and in a file named `ERC721.sol`. This file conventionally\
    \ contains the code for the NFT.\n2. **Deploy**: The ‘Deploy’ button, when clicked,\
    \ will send the smart contract to the blockchain. It uses the account and gas\
    \ limit specified in the environment settings. Once deployed, the contract will\
    \ become a part of the blockchain and will be able to interact with other contracts\
    \ and addresses.\n\nIn the console at the bottom, you can see the transaction\
    \ details for the deployment. It shows the account that is deploying the contract,\
    \ the gas limit and the value being sent along with the deployment (which is 0\
    \ in this case, as deploying contracts typically does not require sending Ether\
    \ unless the constructor function specifies otherwise). The transaction hash (a\
    \ unique identifier for the transaction on the blockchain) is also visible.\n\n\
    Once the contract is deployed, it will appear under ‘Deployed Contracts’, and\
    \ you’ll be able to interact with it using the functions defined in the contract,\
    \ like `awardItem`, which is used to mint new NFTs in Figure [3-12](#616479_1_En_3_Chapter.xhtml#Fig12).\n\
    \n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig12_HTML.jpg)\n\n**Figure 3-12**\
    \ Deployed Contracts – ERC721\n\nAfter deploying an `ERC721` smart contract, which\
    \ is typically used to create non-fungible tokens (NFTs), the interface generated\
    \ by Remix highlights the functions and queries available for interaction with\
    \ the `HGNFT` contract. Below is a detailed explanation of the key elements highlighted\
    \ in the interface:\n\n1. **`approve`**: This function allows a token owner to\
    \ approve another account to transfer the specified amount of the owner’s tokens\
    \ to a third party.\n2. **`awardItem`**: This custom function in the `HGNFT` contract\
    \ allows the contract owner (or the function caller) to mint a new NFT and assign\
    \ it to a player’s address. The `tokenURI` parameter typically references a JSON\
    \ file hosted on IPFS.\n\nOnce your digital assets (e.g. images for NFTs) are\
    \ generated, the next crucial step is uploading them to IPFS (InterPlanetary File\
    \ System). IPFS is a decentralised storage solution that preserves the permanence\
    \ and integrity of your files by distributing them across multiple nodes globally.\
    \ This step is essential in the NFT creation process, as it provides a unique,\
    \ immutable URI that is embedded in the NFT’s metadata, ensuring that the digital\
    \ asset cannot be altered or removed. You can choose to either set up your own\
    \ IPFS node for full control (Option 1) or use a third-party service like Pinata\
    \ for ease of use (Option 2), depending on your technical preferences and needs.\n\
    \n**Option 1: Setting Up Your Own IPFS Node**\n\nSetting up your own IPFS node\
    \ involves installing IPFS on your machine, initialising your IPFS repository\
    \ and starting the IPFS daemon to connect your node to the IPFS network. This\
    \ method gives you full control over your content’s hosting but comes with increased\
    \ complexity and responsibility. You’ll need to manage your node’s availability\
    \ and connectivity to ensure your assets remain accessible. This approach might\
    \ involve:\n- Downloading and installing IPFS\n- Initialising your IPFS node with\
    \ `ipfs init`\n- Starting the IPFS daemon using `ipfs daemon`\n- Adding your files\
    \ to IPFS using `ipfs add -r /path/to/your/folder`"
  raw: "#### ERC721 Standard\n\nIn contrast, ERC721, proposed in 2017 and accepted\
    \ in 2018, focuses on non-fungible tokens (NFTs). These tokens are unique and\
    \ cannot be interchanged. ERC721 tokens represent distinct items like digital\
    \ artwork, collectibles or real estate property. They play a crucial role in creating\
    \ a market for unique digital assets, as evidenced by the sale of a $69 million\
    \ digital artwork by Beeple.[⁸](#616479_1_En_3_Chapter.xhtml#Sec16)\n\nHere is\
    \ an example of an ERC721 token contract:\n\n```\n// contracts/HGNFT.sol\n// SPDX-License-Identifier:\
    \ MIT\npragma solidity ^0.8.0;\nimport \"@openzeppelin/contracts/token/ERC721/extensions/ERC721URIStorage.sol\"\
    ;\nimport \"@openzeppelin/contracts/utils/Counters.sol\";\ncontract HGNFT is ERC721URIStorage\
    \ {\nusing Counters for Counters.Counter;\nCounters.Counter private _tokenIds;\n\
    constructor() ERC721(\"HGNFT\", \"HGN\") {}\nfunction awardItem(address player,\
    \ string memory tokenURI)\npublic\nreturns (uint256)\n{\nuint256 newItemId = _tokenIds.current();\n\
    _mint(player, newItemId);\n_setTokenURI(newItemId, tokenURI);\n_tokenIds.increment();\n\
    return newItemId;\n}\n}\n```\n\nHere’s a breakdown of its components:\n\n1.  **SPDX-License-Identifier\
    \ and Solidity Version**\n\n```\n    // SPDX-License-Identifier: MIT pragma solidity\
    \ ^0.8.0;\n    ```\n\nThis specifies the contract’s license and the Solidity compiler\
    \ version, indicating that the contract is to be compiled with Solidity version\
    \ 0.8.0 or newer.\n\n2.  **Import Statements**\n    *   **ERC721URIStorage** is\
    \ an extension of OpenZeppelin’s ERC721 standard. It adds functionality to set\
    \ and manage a token URI (Uniform Resource Identifier), which typically points\
    \ to a JSON file that conforms to the ‘ERC721 Metadata JSON Schema’.\n\n*   **Counters**\
    \ is a utility library from OpenZeppelin that provides a counter variable type,\
    \ which is used to safely increment and decrement numerical values.\n\n```\n \
    \   import \"@openzeppelin/contracts/token/ERC721/extensions/ERC721URIStorage.sol\"\
    ;\n    import \"@openzeppelin/contracts/utils/Counters.sol\";\n    ```\n\n3. \
    \ **Contract Declaration and Inheritance**\n\n```\ncontract HGNFT is ERC721URIStorage\
    \ {\n```\n\nThis declares the contract **HGNFT**, which inherits from **ERC721URIStorage**,\
    \ meaning it will have all the standard functionality of an ERC721 token plus\
    \ the additional URI storage features.\n\n1.  **Using Statements and State Variables**\n\
    \    *   The **using** statement allows the contract to use the functions defined\
    \ in the **Counters** library for **Counter** types.\n\n*   **_tokenIds** is a\
    \ private state variable that keeps track of the current token ID using the **Counter**\
    \ utility.\n\n```\n    using Counters for Counters.Counter;\n    Counters.Counter\
    \ private _tokenIds;\n    ```\n\n2.  **Constructor**\n\n```\n    solidityCopy\
    \ code\n    constructor() ERC721(\"HGNFT\", \"HGN\") {}\n    ```\n\nThe constructor\
    \ initialises the contract by calling the ERC721 constructor with the name of\
    \ the token (‘HGNFT’) and its symbol (‘HGN’).\n\n3.  **awardItem Function**\n\
    \    *   **awardItem** is a public function that can be called to mint a new NFT\
    \ and assign it to the **player** address.\n\n*   It first gets the current token\
    \ ID value, mints a new token with this ID to the **player** and sets the token’s\
    \ URI.\n\n*   Afterwards, it increments the **_tokenIds** counter to ensure that\
    \ the next token has a unique ID.\n\n*   The function returns the new item ID,\
    \ which can be used to reference the newly minted token.\n\n```\n    function\
    \ awardItem(address player, string memory tokenURI)\n    public\n    returns (uint256)\n\
    \    {\n    uint256 newItemId = _tokenIds.current();\n    _mint(player, newItemId);\n\
    \    _setTokenURI(newItemId, tokenURI);\n    _tokenIds.increment();\n    return\
    \ newItemId;\n    }\n    ```\n\nIn essence, this contract provides a simple yet\
    \ functional example of an NFT contract that can be used to create unique digital\
    \ assets, where each token can be associated with a distinct URI pointing to metadata\
    \ that describes the token’s properties. The contract uses the OpenZeppelin library\
    \ to ensure secure and standardised functionality.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nDeploy ‘ERC721.sol’\n\nFigure [3-11](#616479_1_En_3_Chapter.xhtml#Fig11)\
    \ shows the process of deploying an ERC721 smart contract, specifically a non-fungible\
    \ token (NFT) contract named **HGNFT**. Here’s a breakdown of the elements within\
    \ the red box:\n\n1.  **HGNFT - contracts/ERC721.sol**: This indicates that the\
    \ **HGNFT** contract is selected and ready to be deployed. The contract is located\
    \ within the **contracts** folder and in a file named **ERC721.sol**. This file\
    \ conventionally contains the code for the NFT.\n\n2.  **Deploy**: The ‘Deploy’\
    \ button, when clicked, will send the smart contract to the blockchain. It uses\
    \ the account and gas limit specified in the environment settings. Once deployed,\
    \ the contract will become a part of the blockchain and will be able to interact\
    \ with other contracts and addresses.\n\nIn the console at the bottom, you can\
    \ see the transaction details for the deployment. It shows the account that is\
    \ deploying the contract, the gas limit and the value being sent along with the\
    \ deployment (which is 0 in this case, as deploying contracts typically does not\
    \ require sending Ether unless the constructor function specifies otherwise).\
    \ The transaction hash (a unique identifier for the transaction on the blockchain)\
    \ is also visible.\n\nOnce the contract is deployed, it will appear under ‘Deployed\
    \ Contracts’, and you’ll be able to interact with it using the functions defined\
    \ in the contract, like **awardItem**, which is used to mint new NFTs in Figure\
    \ [3-12](#616479_1_En_3_Chapter.xhtml#Fig12).\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nDeployed Contracts – ERC721\n\nAfter deploying an ERC721 smart\
    \ contract, which is typically used to create non-fungible tokens (NFTs), the\
    \ interface generated by Remix highlights the functions and queries available\
    \ for interaction with the **HGNFT** contract. Below is a detailed explanation\
    \ of the key elements highlighted in the interface:\n\n1.  **approve**: This function\
    \ allows a token owner to approve another account to transfer the specified amount\
    \ of the owner’s tokens to a third party.\n\n2.  **awardItem**: This custom function\
    \ in the HGNFT contract allows the contract owner (or the function caller) to\
    \ mint a new NFT and assign it to a player’s address. The **tokenURI** parameter\
    \ typically references a JSON file hosted on IPFS.\n\nOnce your digital assets\
    \ (e.g. images for NFTs) are generated, the next crucial step is uploading them\
    \ to IPFS (InterPlanetary File System). IPFS is a decentralised storage solution\
    \ that preserves the permanence and integrity of your files by distributing them\
    \ across multiple nodes globally. This step is essential in the NFT creation process,\
    \ as it provides a unique, immutable URI that is embedded in the NFT’s metadata,\
    \ ensuring that the digital asset cannot be altered or removed. You can choose\
    \ to either set up your own IPFS node for full control (Option 1) or use a third-party\
    \ service like Pinata for ease of use (Option 2), depending on your technical\
    \ preferences and needs.\n\n**Option 1: Setting Up Your Own IPFS Node**\n\nSetting\
    \ up your own IPFS node involves installing IPFS on your machine, initialising\
    \ your IPFS repository and starting the IPFS daemon to connect your node to the\
    \ IPFS network. This method gives you full control over your content’s hosting\
    \ but comes with increased complexity and responsibility. You’ll need to manage\
    \ your node’s availability and connectivity to ensure your assets remain accessible.\
    \ This approach might involve:\n    *   Downloading and installing IPFS\n\n* \
    \  Initialising your IPFS node with `ipfs init`\n\n*   Starting the IPFS daemon\
    \ using `ipfs daemon`\n\n*   Adding your files to IPFS using `ipfs add -r /path/to/your/folder`"
  trans: "\n#### ERC721 标准\n\n相比之下，`ERC721` 于 2017 年提出，2018 年被采纳，专注于非同质化代币（NFT）。这些代币具有唯一性，不可互换。`ERC721`\
    \ 代币代表着独特的物品，如数字艺术品、收藏品或房地产。它们在为独特数字资产创建市场方面发挥着关键作用，Beeple 以 6900 万美元出售的数字艺术品便是有力证明。⁸\n\
    \n以下是一个 `ERC721` 代币合约的示例：\n\n```\n// contracts/HGNFT.sol\n// SPDX-License-Identifier:\
    \ MIT\npragma solidity ⁰.8.0;\nimport \"@openzeppelin/contracts/token/ERC721/extensions/ERC721URIStorage.sol\"\
    ;\nimport \"@openzeppelin/contracts/utils/Counters.sol\";\ncontract HGNFT is ERC721URIStorage\
    \ {\nusing Counters for Counters.Counter;\nCounters.Counter private _tokenIds;\n\
    constructor() ERC721(\"HGNFT\", \"HGN\") {}\nfunction awardItem(address player,\
    \ string memory tokenURI)\npublic\nreturns (uint256)\n{\nuint256 newItemId = _tokenIds.current();\n\
    _mint(player, newItemId);\n_setTokenURI(newItemId, tokenURI);\n_tokenIds.increment();\n\
    return newItemId;\n}\n}\n```\n\n以下是其组成部分的详细解析：\n\n1.  **SPDX-License-Identifier\
    \ 和 Solidity 版本**\n\n```\n    // SPDX-License-Identifier: MIT pragma solidity\
    \ ⁰.8.0;\n```\n\n这部分指定了合约的许可证和 Solidity 编译器版本，表明该合约应使用 Solidity 0.8.0 或更高版本来编译。\n\
    \n2.  **导入语句**\n    -   `ERC721URIStorage` 是 OpenZeppelin 的 `ERC721` 标准的一个扩展。它增加了设置和管理代币\
    \ URI（统一资源标识符）的功能，该 URI 通常指向一个符合“ERC721 元数据 JSON 模式”的 JSON 文件。\n    -   `Counters`\
    \ 是 OpenZeppelin 的一个实用工具库，提供了一个计数器变量类型，用于安全地递增和递减数值。\n\n```solidity\n    import\
    \ \"@openzeppelin/contracts/token/ERC721/extensions/ERC721URIStorage.sol\";\n\
    \    import \"@openzeppelin/contracts/utils/Counters.sol\";\n```\n\n3.  **合约声明与继承**\n\
    \n```solidity\ncontract HGNFT is ERC721URIStorage {\n```\n\n这部分声明了合约 `HGNFT`，它继承了\
    \ `ERC721URIStorage`，意味着它将拥有 `ERC721` 代币的所有标准功能以及额外的 URI 存储特性。\n\n4.  **Using\
    \ 语句与状态变量**\n    -   `using` 语句允许合约对 `Counter` 类型使用 `Counters` 库中定义的函数。\n    -\
    \   `_tokenIds` 是一个私有状态变量，它使用 `Counter` 工具来跟踪当前的代币 ID。\n\n```solidity\n    using\
    \ Counters for Counters.Counter;\n    Counters.Counter private _tokenIds;\n```\n\
    \n5.  **构造函数**\n\n```solidity\n    constructor() ERC721(\"HGNFT\", \"HGN\") {}\n\
    ```\n\n构造函数通过调用 `ERC721` 构造函数来初始化合约，并传入代币的名称（`HGNFT`）及其符号（`HGN`）。\n\n6.  **`awardItem`\
    \ 函数**\n    -   `awardItem` 是一个公共函数，可以调用来铸造一个新的 NFT 并将其分配给 `player` 地址。\n    -\
    \   它首先获取当前的代币 ID 值，用此 ID 为 `player` 铸造一个新区块，并设置该代币的 URI。\n    -   然后，它会递增 `_tokenIds`\
    \ 计数器，以确保下一个代币拥有唯一的 ID。\n    -   该函数返回新的项目 ID，可用于引用新铸造的代币。\n\n```solidity\n  \
    \  function awardItem(address player, string memory tokenURI)\n    public\n  \
    \  returns (uint256)\n    {\n    uint256 newItemId = _tokenIds.current();\n  \
    \  _mint(player, newItemId);\n    _setTokenURI(newItemId, tokenURI);\n    _tokenIds.increment();\n\
    \    return newItemId;\n    }\n```\n\n本质上，该合约提供了一个简单但功能完备的 NFT 合约示例，可用于创建独特的数字资产，其中每个代币都可以关联一个独特的\
    \ URI，该 URI 指向描述代币属性的元数据。该合约使用了 OpenZeppelin 库，以确保功能的安全性和标准化。\n\n![](img/616479_1_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11** 部署 `ERC721.sol`\n\n图 3-11 展示了部署一个 `ERC721` 智能合约（具体是一个名为 `HGNFT` 的非同质化代币合约）的过程。以下是红框内元素的详细说明：\n\
    \n1.  **HGNFT - contracts/ERC721.sol**：这表示 `HGNFT` 合约已被选中，并准备好部署。该合约位于 `contracts`\
    \ 文件夹下的 `ERC721.sol` 文件中。按照惯例，该文件包含 NFT 的代码。\n2.  **Deploy**：点击“Deploy”按钮，会将智能合约发送到区块链。它会使用环境设置中指定的账户和\
    \ gas 限额。一旦部署，该合约将成为区块链的一部分，并能够与其他合约和地址进行交互。\n\n在底部的控制台中，你可以看到部署的交易详情。它显示了部署合约的账户、gas\
    \ 限额以及随部署发送的以太币数量（此处为 0，因为部署合约通常不需要发送以太币，除非构造函数另有规定）。交易哈希（区块链上该交易的唯一标识符）也是可见的。\n\
    \n一旦合约部署完成，它将出现在“Deployed Contracts”下，你可以使用合约中定义的函数与之交互，例如图 3-12 中用于铸造新 NFT 的\
    \ `awardItem` 函数。\n\n![](img/616479_1_En_3_Fig12_HTML.jpg)\n\n**图 3-12** 已部署的合约\
    \ – ERC721\n\n部署一个通常用于创建非同质化代币（NFT）的 `ERC721` 智能合约后，Remix 生成的界面会高亮显示可用于与 `HGNFT`\
    \ 合约进行交互的函数和查询。以下是对界面中关键元素的详细解释：\n\n1.  **`approve`**：此函数允许代币所有者批准另一个账户将指定数量的代币转移给第三方。\n\
    2.  **`awardItem`**：这个在 `HGNFT` 合约中的自定义函数允许合约所有者（或函数调用者）铸造一个新的 NFT 并将其分配给玩家地址。`tokenURI`\
    \ 参数通常引用一个托管在 IPFS 上的 JSON 文件。\n\n一旦你的数字资产（例如 NFT 图像）生成，下一步关键步骤是将其上传到 IPFS（星际文件系统）。IPFS\
    \ 是一种去中心化存储解决方案，通过将文件分布到全球多个节点来维护文件的永久性和完整性。这一步在 NFT 创建过程中至关重要，因为它提供了一个唯一的、不可变的\
    \ URI，该 URI 嵌入在 NFT 的元数据中，确保数字资产无法被更改或移除。根据你的技术偏好和需求，你可以选择搭建自己的 IPFS 节点以获得完全控制权（选项\
    \ 1），也可以选择使用像 Pinata 这样的第三方服务以获得易用性（选项 2）。\n\n**选项 1：搭建你自己的 IPFS 节点**\n\n搭建你自己的\
    \ IPFS 节点涉及在你的机器上安装 IPFS、初始化你的 IPFS 仓库，并启动 IPFS 守护进程以将你的节点连接到 IPFS 网络。这种方法让你对内容的托管拥有完全控制权，但也增加了复杂性和责任。你需要管理节点的可用性和连接性，以确保资产始终可访问。这种方法可能包括：\n\
    -   下载并安装 IPFS\n-   使用 `ipfs init` 初始化你的 IPFS 节点\n-   使用 `ipfs daemon` 启动 IPFS\
    \ 守护进程\n-   使用 `ipfs add -r /path/to/your/folder` 将文件添加到 IPFS\n"
- fmt: 'While running your own node offers a high degree of control and direct engagement
    with the IPFS network, it requires a good understanding of IPFS and might not
    be the most straightforward option for beginners or those looking for quick and
    easy solutions.


    **Option 2: Using Third-Party Services like Pinata**


    For many users, especially those new to IPFS or seeking convenience, third-party
    services like Pinata offer an easier way to upload and manage content on IPFS.
    Pinata simplifies the process by providing a user-friendly interface and additional
    features like pinning services to ensure your content remains readily available
    on the IPFS network.


    To use Pinata for uploading your NFT assets:


    - **Create an Account**: Sign up on `Pinata.cloud` and log in to your account.

    - **Upload Content**: Navigate to the ‘Upload’ section and choose to upload a
    folder. Pinata will automatically pin your uploaded content, ensuring its availability
    on the IPFS network.

    - **Retrieve IPFS Hashes**: Once uploaded, Pinata will provide an IPFS hash (CID)
    for your folder and each contained file. These hashes serve as permanent, immutable
    links to your assets, which you’ll include in your NFTs’ metadata.


    Instead of providing a step-by-step explanation, please refer to Section [7.​3](#616479_1_En_7_Chapter.xhtml#Sec11)
    in Chapter [7](#616479_1_En_7_Chapter.xhtml), which covers the detailed process
    of managing metadata, including handling multiple images and JSON files for NFTs.
    Chapter [7](#616479_1_En_7_Chapter.xhtml) offers more comprehensive guidance on
    utilising Pinata and other methods for uploading digital assets and managing them
    on IPFS.


    **Option 1 vs. Option 2**


    While setting up your own IPFS node gives you full control and a hands-on experience,
    it comes with a steeper learning curve and ongoing management responsibilities.
    In contrast, third-party services like Pinata offer a more straightforward, user-friendly
    solution, making it ideal for creators who want to streamline their NFT creation
    process. Regardless of the method you choose, the key goal is to securely upload
    your digital assets to IPFS, enabling their transformation into NFTs.


    For instance, if you have a JSON file hosted on IPFS with the URI (e.g., `ipfs://Qm...`),
    you would use this URI as the `tokenURI` parameter when calling the `awardItem`
    function.


    - **`safeTransferFrom`**: There are two versions of this function. They allow
    for the safe transfer of tokens from one address to another, ensuring that the
    receiving address is capable of handling ERC721 tokens (to prevent accidental
    loss).

    - **`setApprovalForAll`**: This function allows the owner of tokens to grant permission
    to another address to transfer all of the owner’s tokens on their behalf.

    - **`transferFrom`**: This function is used to transfer a token from one address
    to another. The caller must be authorised to move the token, either by being the
    owner, approved or an authorised operator.

    - **`balanceOf`**: This query returns the number of tokens owned by a given address.

    - **`getApproved`**: This returns the approved address for a single token.

    - **`isApprovedForAll`**: This checks if an operator is approved to transfer all
    tokens owned by a given address.

    - **`name`**: This returns the name of the token collection, which is `HGNFT`
    in this case.

    - **`ownerOf`**: This query returns the owner of a specific token ID.

    - **`supportsInterface`**: Contracts in Ethereum can announce which functions
    they support by returning true for a given interface ID. This is a technical function
    used by other contracts to determine what functionalities are supported by this
    contract.

    - **`symbol`**: This query returns the token symbol, which is `HGN`.

    - **`tokenURI`**: For a given token ID, this returns the URI of the associated
    resource, which is typically a link to a JSON file containing metadata.


    In the case of `awardItem`, the function is meant to ‘award’ an NFT to a player,
    where the `player` is the address of the recipient, and the `tokenURI` is the
    link to the NFT’s metadata. The metadata file could look something like this:


    ```

    {

    "name": "Hui Gong Digital Artwork",

    "description": "A unique piece of digital art",

    "image": "ipfs://QmXxXxXxXxXxXxXxXxXxXxXxXxXxXxX",

    "attributes": [

    {

    "trait_type": "Rarity",

    "value": "Rare"

    },

    {

    "trait_type": "Artist",

    "value": "Hui Gong"

    }

    ]

    }

    ```


    This file would be uploaded to IPFS, and the resulting IPFS URI would be used
    as the `tokenURI` parameter when minting the NFT.


