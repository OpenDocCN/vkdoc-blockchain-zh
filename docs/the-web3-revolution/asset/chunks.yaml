- fmt: "### Singapore – Monetary Authority of Singapore (MAS)[⁷](#616479_1_En_11_Chapter.xhtml#Sec007)\n\
    \nThe Monetary Authority of Singapore (MAS) has made significant strides in regulating\
    \ the digital payment token (DPT) sphere, marking a proactive approach towards\
    \ ensuring user protection and stability within the digital token domain. Through\
    \ the recent amendments to the `Payment Services Act` (`PS Act`) and its subsidiary\
    \ legislation, MAS has notably expanded the regulatory scope to encompass a broader\
    \ range of payment services, emphasising user protection and financial stability\
    \ for DPT service providers.\n\nThis expansion brings under regulation the provision\
    \ of custodial services for DPTs, the facilitation of DPT transmission between\
    \ accounts, the facilitation of DPT exchanges and the facilitation of cross-border\
    \ money transfers, regardless of whether the funds are accepted or received in\
    \ Singapore. Crucially, this includes services where the provider does not directly\
    \ handle the money or DPTs, marking a comprehensive approach to oversight.\n\n\
    Under the revised framework, MAS is empowered to enforce anti-money laundering,\
    \ countering the financing of terrorism, user protection and financial stability\
    \ requirements on DPT service providers. This shift is not just regulatory but\
    \ also anticipatory, ensuring that as the digital token landscape evolves, protective\
    \ measures grow alongside to guard both consumers and the broader financial system.\n\
    \nThe amended regulations demand that entities engaged in activities now under\
    \ the `PS Act`’s expanded scope notify MAS within 30 days and submit a licence\
    \ application within six months if they wish to continue these activities temporarily.\
    \ This process includes submitting an attestation report on the entity’s compliance\
    \ with pertinent requirements, emphasising MAS’s commitment to stringent oversight.\n\
    \nA significant addition to the regulations concerns the safeguarding of customer\
    \ assets. Set to take effect six months from the enactment, these rules mandate\
    \ the segregation of customers’ assets in trust accounts, proper record-keeping\
    \ and the implementation of robust systems and controls to ensure the integrity\
    \ and security of these assets.\n\nThe MAS’s recent amendments underscore Singapore’s\
    \ forward-looking stance on digital payment tokens. By extending its regulatory\
    \ reach, MAS not only aims to protect users but also to foster a stable, trustworthy\
    \ environment for the growth and innovation of digital payment services. This\
    \ development marks a key step in Singapore’s broader strategy to position itself\
    \ as a global leader in fintech and digital finance, reflecting a nuanced understanding\
    \ of the dynamic interplay between technological innovation and regulatory oversight.\n\
    \n### Hong Kong – Monetary Authority (HKMA)[⁸](#616479_1_En_11_Chapter.xhtml#Sec007)\n\
    \nIn response to the evolving landscape of digital assets, the Hong Kong Monetary\
    \ Authority (HKMA) has taken significant steps to enhance the security and integrity\
    \ of crypto custodial services within the region. Through comprehensive guidelines\
    \ outlined in their ‘Expected Standards’ document, HKMA has established rigorous\
    \ protocols to ensure that firms offering custodial services for digital assets\
    \ adhere to stringent risk management, client protection and operational resilience\
    \ practices.\n\nA key focus of the HKMA’s guidance is the mandatory segregation\
    \ of clients’ digital assets from the custodial firm’s own assets, ensuring that\
    \ in the event of insolvency, clients’ assets remain protected and distinct from\
    \ those of the firm. This requirement not only safeguards client assets but also\
    \ promotes trust and stability within the burgeoning digital asset sector.\n\n\
    Moreover, the HKMA expects authorised institutions to undertake thorough risk\
    \ assessments and implement robust policies to manage and mitigate identified\
    \ risks effectively. This comprehensive approach encompasses governance, operations\
    \ and the management of potential conflicts of interest, highlighting the HKMA’s\
    \ commitment to maintaining high standards of practice within the industry.\n\n\
    Additionally, the guidance specifies the necessity for adequate resourcing, including\
    \ expertise and manpower, to manage custodial services responsibly. It underscores\
    \ the importance of staff and senior management possessing the requisite knowledge\
    \ and skills to fulfil their roles effectively, ensuring that custodial activities\
    \ are conducted with the highest level of competence and care.\n\nThe HKMA’s guidelines\
    \ also address the critical aspect of safeguarding client digital assets against\
    \ theft, fraud, negligence and other forms of misappropriation. Firms are required\
    \ to establish and maintain effective control measures to minimise the risk of\
    \ loss, demonstrating the HKMA’s proactive stance in protecting consumers and\
    \ ensuring the resilience of custodial services.\n\nIn response to the collapse\
    \ of major platforms such as `FTX`, `Terra` and `Three Arrows`, the HKMA’s regulations\
    \ serve as a timely and necessary measure to enhance the regulatory framework\
    \ surrounding crypto custodial services in Hong Kong. By setting clear expectations\
    \ and standards, the HKMA aims to foster a secure, reliable and transparent digital\
    \ asset environment, reflecting Hong Kong’s ambition to reclaim its status as\
    \ a leading crypto hub.\n\nThe rationale for selecting these regulators emphasises\
    \ their influential roles at the forefront of financial innovation. Their approaches\
    \ to defining tokens significantly contribute to the discourse on the integration\
    \ of digital assets within traditional financial systems and the anticipation\
    \ of future regulatory frameworks. This comparative analysis aims to provide a\
    \ structured understanding of the regulatory stance across key financial jurisdictions,\
    \ illustrating the diversity in token classification and its implications for\
    \ the global digital asset landscape.\n\n**Table 11-1**  \nToken Definition in\
    \ Different Jurisdictions"
  raw: '### Singapore – Monetary Authority of Singapore (MAS)[⁷](#616479_1_En_11_Chapter.xhtml#Sec007)


    The Monetary Authority of Singapore (MAS) has made significant strides in regulating
    the digital payment token (DPT) sphere, marking a proactive approach towards ensuring
    user protection and stability within the digital token domain. Through the recent
    amendments to the Payment Services Act (PS Act) and its subsidiary legislation,
    MAS has notably expanded the regulatory scope to encompass a broader range of
    payment services, emphasising user protection and financial stability for DPT
    service providers​​.


    This expansion brings under regulation the provision of custodial services for
    DPTs, the facilitation of DPT transmission between accounts, the facilitation
    of DPT exchanges and the facilitation of cross-border money transfers, regardless
    of whether the funds are accepted or received in Singapore. Crucially, this includes
    services where the provider does not directly handle the money or DPTs, marking
    a comprehensive approach to oversight​​.


    Under the revised framework, MAS is empowered to enforce anti-money laundering,
    countering the financing of terrorism, user protection and financial stability
    requirements on DPT service providers. This shift is not just regulatory but also
    anticipatory, ensuring that as the digital token landscape evolves, protective
    measures grow alongside to guard both consumers and the broader financial system​​.


    The amended regulations demand that entities engaged in activities now under the
    PS Act’s expanded scope notify MAS within 30 days and submit a licence application
    within six months if they wish to continue these activities temporarily. This
    process includes submitting an attestation report on the entity’s compliance with
    pertinent requirements, emphasising MAS’s commitment to stringent oversight​​.


    A significant addition to the regulations concerns the safeguarding of customer
    assets. Set to take effect six months from the enactment, these rules mandate
    the segregation of customers’ assets in trust accounts, proper record-keeping
    and the implementation of robust systems and controls to ensure the integrity
    and security of these assets​​.


    The MAS’s recent amendments underscore Singapore’s forward-looking stance on digital
    payment tokens. By extending its regulatory reach, MAS not only aims to protect
    users but also to foster a stable, trustworthy environment for the growth and
    innovation of digital payment services. This development marks a key step in Singapore’s
    broader strategy to position itself as a global leader in fintech and digital
    finance, reflecting a nuanced understanding of the dynamic interplay between technological
    innovation and regulatory oversight.


    ### Hong Kong – Monetary Authority (HKMA)[⁸](#616479_1_En_11_Chapter.xhtml#Sec007)


    In response to the evolving landscape of digital assets, the Hong Kong Monetary
    Authority (HKMA) has taken significant steps to enhance the security and integrity
    of crypto custodial services within the region. Through comprehensive guidelines
    outlined in their ‘Expected Standards’ document, HKMA has established rigorous
    protocols to ensure that firms offering custodial services for digital assets
    adhere to stringent risk management, client protection and operational resilience
    practices​​.


    A key focus of the HKMA’s guidance is the mandatory segregation of clients’ digital
    assets from the custodial firm’s own assets, ensuring that in the event of insolvency,
    clients’ assets remain protected and distinct from those of the firm. This requirement
    not only safeguards client assets but also promotes trust and stability within
    the burgeoning digital asset sector​​.


    Moreover, the HKMA expects authorised institutions to undertake thorough risk
    assessments and implement robust policies to manage and mitigate identified risks
    effectively. This comprehensive approach encompasses governance, operations and
    the management of potential conflicts of interest, highlighting the HKMA’s commitment
    to maintaining high standards of practice within the industry​​.


    Additionally, the guidance specifies the necessity for adequate resourcing, including
    expertise and manpower, to manage custodial services responsibly. It underscores
    the importance of staff and senior management possessing the requisite knowledge
    and skills to fulfil their roles effectively, ensuring that custodial activities
    are conducted with the highest level of competence and care​​.


    The HKMA’s guidelines also address the critical aspect of safeguarding client
    digital assets against theft, fraud, negligence and other forms of misappropriation.
    Firms are required to establish and maintain effective control measures to minimise
    the risk of loss, demonstrating the HKMA’s proactive stance in protecting consumers
    and ensuring the resilience of custodial services​​.


    In response to the collapse of major platforms such as FTX, Terra and Three Arrows,
    the HKMA’s regulations serve as a timely and necessary measure to enhance the
    regulatory framework surrounding crypto custodial services in Hong Kong. By setting
    clear expectations and standards, the HKMA aims to foster a secure, reliable and
    transparent digital asset environment, reflecting Hong Kong’s ambition to reclaim
    its status as a leading crypto hub​​.


    The rationale for selecting these regulators emphasises their influential roles
    at the forefront of financial innovation. Their approaches to defining tokens
    significantly contribute to the discourse on the integration of digital assets
    within traditional financial systems and the anticipation of future regulatory
