  trans: "\n### 借贷平台\n\n在 DeFi 生态系统中，贷款主要以超额抵押的形式进行，这意味着借款人必须提供超过其贷款金额的抵押品。这个概念乍看之下可能有些反直觉——如果必须锁定价值更高的资产作为抵押，为什么还要借款？答案在于\
    \ DeFi 领域中借款人和贷方各自的激励因素。贷方参与的主要动机是获得补偿，通常以利息或可在市场上出售的治理代币形式实现，从而带来潜在利润。另一方面，借款人可以利用这些贷款进行杠杆操作，以维持对其预期会升值的抵押资产的敞口，或者为了提高资本效率，将原本闲置的资产用作抵押品。\n\
    \n抵押是 DeFi 中降低金融风险的关键机制。由于区块链和智能合约不依赖传统信用评分来评估借款人风险，超额抵押充当了防范违约的缓冲垫。如果借款人未能偿还，抵押品将被清算以弥补贷方的损失，这与传统金融（TradFi）系统形成对比，后者使用信用评分、监管机制和法律执行相结合的方式来管理违约风险。\n\
    \n闪电贷代表了一种新颖的 DeFi 借贷机制，即贷款在同一交易区块内发放并偿还。它们无需抵押，因为它们依赖于一个独特原则：由于区块链交易的原子性，如果贷款在交易结束时无法偿还，那么它就好像从未发生过一样。这种机制允许进行复杂的金融操作，如套利、抵押品互换和自清算贷款，为\
    \ DeFi 用户提供了强大的工具，使其能够利用这些功能，而无需像抵押贷款那样要求同等的资本。\n\nDeFi 借贷平台的实际案例包括 Aave 引入的闪电贷，它为交易者和套利者开辟了新的策略；以及\
    \ MakerDAO 的抵押债务头寸（CDPs），允许用户用其 ETH 抵押品铸造 DAI。这些创新机制通过将金融操作范围扩展到传统银行系统无法触及的领域，推动了\
    \ DeFi 的增长。\n\n### 稳定币\n\n稳定币是 DeFi 生态系统的重要组成部分，旨在相对于目标价格（通常是像美元这样被广泛认可的资产）保持稳定价值。这些数字货币通过各种机制实现价格稳定，并且可以以中心化和去中心化两种形式发行。\n\
    \n稳定币大致可根据两个主要标准进行分类：\n\n1.  中心化/去中心化程度\n    *   **托管型或中心化稳定币**：由中心化实体发行和管理，通常由法币或其他资产的储备支持。\n\
    \    *   **非托管型或去中心化稳定币**：在区块链技术上运行，没有中心化的管理机构，使用链上抵押品或算法来维持其价值。\n\n2.  维持锚定机制\n\
    \    *   **储备支持型**：这些稳定币持有资产储备（如法币、商品，有时也包括其他加密货币）来支撑其价值。\n    *   **抵押支持型**：类似于储备支持型，但专门使用加密货币作为抵押品，这可能会更加波动。\n\
    \    *   **算法型**：没有储备，而是使用一组算法来管理稳定币的供应量以维持其锚定。\n    *   **混合型**：这些稳定币结合使用上述方法来维持价格稳定。\n\
    \n每种类型在资本效率、去中心化程度和价格稳定性方面都有其自身的权衡。例如，储备支持型稳定币通常被认为更稳定、资本效率更高，但可能缺乏去中心化。抵押支持型稳定币是去中心化和透明的，但资本效率可能较低。算法型稳定币提供了去中心化和资本效率，但有时在维持锚定方面可能不够稳定。\n\
    \n稳定币的选择取决于用户对去中心化的偏好、对发行者的信任以及在 DeFi 生态系统中的预期用途。\n\n### 保险\n\n在 DeFi 的去中心化背景下，保险至少有兩種不同的解释方式。一种更广泛的解释涵盖了针对所有可能事件的保障，无论这些事件发生在链上还是链下，线上还是线下。这种广泛的方法由去中心化预测市场促成，该市场允许针对未来事件的各种潜在结果创建和交易份额。此类市场采用具有博弈论基础的去中心化协议，以确保事件报告的真实性，并防止任何单一参与者进行操纵。这些机制特别适用于针对多种场景的保险，从恶劣天气到中心化合作伙伴的破产，尽管它们需要足够的流动性才能有效。\n\
    \n另一方面，去中心化保险的狭义解释则专门聚焦于 DeFi 领域，为与 DeFi 协议相关的故障或风险提供保障。这包括针对技术风险（如智能合约故障）、在极端市场条件下可能出现的流动性或财务风险，以及协议可能未完全去中心化的管理密钥风险。\n\
    \n例如，Nexus Mutual 是一个 DeFi 保险协议，为以太坊区块链上其他智能合约的技术风险和漏洞提供保障。它允许用户购买特定期限和金额的保险，并设有独立的理赔评估流程，以在智能合约发生故障时确定理赔的有效性。⁸\n\
    \n类似地，Opyn 不仅为智能合约故障提供保险，还覆盖流动性、财务和管理密钥风险。它使用期权来对冲这些意外事件。例如，通过 Opyn，用户可以在 Compound\
    \ 等平台上购买针对稳定币存款的看跌期权，确保在协议故障或安全漏洞发生时，能够以预定汇率出售其持有的稳定币。⁹\n\n这些保险协议通过提供符合去中心化原则的创新解决方案，为\
    \ DeFi 的风险管理生态系统做出了贡献。它们为用户提供了保护其投资免受这一新兴金融技术领域中固有各种风险影响的机制。\n"
- fmt: "### Prediction Markets/Oracles\n\nPrediction markets and oracles play a crucial\
    \ role in the decentralised finance (DeFi) ecosystem by enabling innovative financial\
    \ instruments and mechanisms for information aggregation and dissemination.\n\n\
    Here’s an in-depth look at their functionality, significance and some leading\
    \ platforms in this space:\n\n1.  Prediction Markets\n    *   **Functionality**:\
    \ Prediction markets in DeFi enable participants to buy and sell contracts based\
    \ on the outcomes of future events, similar to betting or futures markets but\
    \ with a broader scope, including non-financial outcomes like election results\
    \ or weather forecasts. These markets leverage blockchain technology and smart\
    \ contracts to create decentralised platforms where no central authority is required\
    \ to match buyers and sellers. Platforms like `Augur` and `TotemFi` are prominent\
    \ examples, utilising Ethereum’s `ERC20` protocol for creating user-generated\
    \ markets and offering low fees and innovative reward mechanisms.\n\n    *   **Advantages\
    \ over Centralised Markets**: DeFi prediction markets offer significant benefits\
    \ over their centralised counterparts, including global accessibility, reduced\
    \ need for intermediaries, lower fees, enhanced privacy and the ability to participate\
    \ using digital assets. These markets also tend to have more liquidity and can\
    \ innovate more rapidly thanks to blockchain technology and smart contracts.\n\
    \n2.  Oracles\n    *   **The Oracle Problem**: Smart contracts, while autonomous,\
    \ cannot access off-chain data independently, creating the ‘oracle problem’. Oracles\
    \ solve this by acting as data feeds between the blockchain and the external world,\
    \ enabling smart contracts to execute based on real-world events. However, designing\
    \ secure, reliable and decentralised oracles is challenging, with issues around\
    \ data accuracy, manipulation and centralisation risks.\n\n    *   **Oracle Designs**:\
    \ Oracles vary from centralised (single data source) to decentralised (multiple\
    \ data sources achieving consensus). Each design has its trade-offs regarding\
    \ speed, security and reliability. Centralised oracles are quicker but pose a\
    \ single point of failure, while decentralised oracles offer higher security and\
    \ resistance to manipulation at the cost of speed and efficiency. Innovative platforms\
    \ like `Chainlink` and `Tellor` represent advancements in oracle technology, offering\
    \ solutions to securely and accurately provide off-chain data to on-chain smart\
    \ contracts.\n\n    *   **Significance**: Oracles are vital for the functionality\
    \ of numerous DeFi applications, including prediction markets, lending platforms\
    \ and insurance contracts, by ensuring that these applications can interact with\
    \ real-world data in a trustless manner. The development and integration of reliable\
    \ oracles are critical for the DeFi ecosystem’s growth and stability.\n\nIn summary,\
    \ prediction markets and oracles are foundational components of the DeFi space,\
    \ offering mechanisms for decentralised betting on future events and securely\
    \ bridging the gap between blockchain applications and external data. Their continued\
    \ evolution and adoption are crucial for the DeFi sector’s aim to create an open,\
    \ transparent and accessible financial system.\n\n## 5.2 Analysis of Mainstream\
    \ DeFi Protocols\n\nThe DeFi (decentralised finance) ecosystem is comprised of\
    \ various protocols, each contributing unique features, mechanisms and impacts\
    \ to the broader financial landscape. Among the most influential in this space\
    \ are `Uniswap`, `Aave` and `MakerDAO`. They each play pivotal roles in liquidity\
    \ provision, lending and stablecoin issuance. Here’s an in-depth look at each\
    \ protocol along with an evaluation of their performance and impact based on Total\
    \ Value Locked (TVL), user adoption and their transformative potential on the\
    \ financial landscape.\n\n### Uniswap\n\n`Uniswap`’s evolution has been characterised\
    \ by continuous innovation and adaptation to meet the ever-changing needs of the\
    \ DeFi ecosystem. This journey reflects a series of significant upgrades from\
    \ its initial version to the latest, illustrating the protocol’s commitment to\
    \ improving liquidity, trading efficiency and user experience.\n\n**Table 5-3**\
    \ `Uniswap`’s Evolution[^(10)](#616479_1_En_5_Chapter.xhtml#Sec19)^, [^(11)](#616479_1_En_5_Chapter.xhtml#Sec19)\n\
    \n| V0 and V1 | `Uniswap`’s journey began with the creation of a prototype in\
    \ 2017, leading to the official launch of `Uniswap V1` in November 2018. `V1`\
    \ introduced the Automated Market Maker (`AMM`) mechanism to the Ethereum blockchain,\
    \ allowing permissionless token trading without the need for a traditional order\
    \ book. This version used a constant product model for pricing, laying the foundation\
    \ for future iterations of `Uniswap`. |\n| V2 | Launched in May 2020, `Uniswap\
    \ V2` introduced significant enhancements, such as enabling `ERC20` to `ERC20`\
    \ exchanges and introducing a Time-Weighted Average Price (`TWAP`) oracle. This\
    \ version marked `Uniswap`’s emergence as a pivotal player in the DeFi space,\
    \ significantly increasing its market attention and user base. |\n| V3 | In May\
    \ 2021, `Uniswap V3` was introduced, bringing the innovative concept of concentrated\
    \ liquidity. This allowed liquidity providers to allocate capital within specific\
    \ price ranges, optimising capital efficiency and providing better income opportunities.\
    \ `V3` also improved the `TWAP` oracle’s efficiency and introduced multiple fee\
    \ tiers, catering to different risk preferences among liquidity providers. |\n\
    | V4 | The evolution continued with the development of `Uniswap V4`, which aims\
    \ to further enhance flexibility and gas efficiency. It introduces customisable\
    \ pools through hooks, allowing developers to augment the concentrated liquidity\
    \ model with new functionalities. This version also moves towards a singleton\
    \ contract approach for all pools, significantly reducing the deployment cost\
    \ and gas fees associated with pool creation and trades. Moreover, `V4` reintroduces\
    \ native `ETH` support, simplifying transactions and potentially reducing gas\
    \ costs. |\n\nEach version of `Uniswap` has progressively addressed the limitations\
    \ of its predecessors, introducing new features that have significantly impacted\
    \ the DeFi ecosystem. From facilitating simple `ERC20/ETH` trades to enabling\
    \ complex, concentrated liquidity positions and customisable pool functionalities,\
    \ `Uniswap`’s evolution mirrors the broader growth and increasing sophistication\
    \ of the DeFi sector. This continuous innovation has solidified `Uniswap`’s position\
    \ as a key infrastructure component in DeFi, supporting a wide range of applications\
    \ and services while providing users with more efficient, flexible and cost-effective\
    \ trading solutions.\n\n![Figure 5-1](images/616479_1_En_5_Chapter/616479_1_En_5_Fig1_HTML.jpg)\n\
    \n**Figure 5-1** Swap Hook Flow[^(11)](#616479_1_En_5_Chapter.xhtml#Sec19)\n\n\
    `Uniswap V4`’s ‘hooks’ feature provides developers the ability to implement specialised\
    \ functionalities at certain stages of the protocol’s processes. This includes\
    \ capabilities such as the Time-Weighted Average Market Maker (`TWAMM`) for executing\
    \ large orders over time without significant price impact and on-chain limit orders\
    \ which allow users to set specific price points for trades. Additionally, dynamic\
    \ fee adjustments based on volatility and mechanisms to capture Maximum Extractable\
    \ Value (`MEV`) for liquidity providers can be created using these hooks.\n\n\
    The introduction of hooks is a significant enhancement from `Uniswap`’s previous\
    \ versions, aiming to afford developers the tools necessary to build more sophisticated\
    \ and efficient financial products while also optimising the platform’s transaction\
    \ processes and fee structures. This demonstrates `Uniswap`’s continuous push\
    \ towards innovation and adaptability in the DeFi space.\n\n**Table 5-4** `Uniswap`:\
    \ Redefining Access and Efficiency in DeFi[^(12)](#616479_1_En_5_Chapter.xhtml#Sec19)"
  raw: "### Prediction Markets/Oracles\n\nPrediction markets and oracles play a crucial\
    \ role in the decentralised finance (DeFi) ecosystem by enabling innovative financial\
    \ instruments and mechanisms for information aggregation and dissemination.\n\n\
    Here’s an in-depth look at their functionality, significance and some leading\
    \ platforms in this space:\n\n1.  Prediction Markets\n    *   **Functionality**:\
    \ Prediction markets in DeFi enable participants to buy and sell contracts based\
    \ on the outcomes of future events, similar to betting or futures markets but\
    \ with a broader scope, including non-financial outcomes like election results\
    \ or weather forecasts. These markets leverage blockchain technology and smart\
    \ contracts to create decentralised platforms where no central authority is required\
    \ to match buyers and sellers. Platforms like Augur and TotemFi are prominent\
    \ examples, utilising Ethereum’s ERC20 protocol for creating user-generated markets\
    \ and offering low fees and innovative reward mechanisms​​.\n\n    *   **Advantages\
    \ over Centralised Markets**: DeFi prediction markets offer significant benefits\
    \ over their centralised counterparts, including global accessibility, reduced\
    \ need for intermediaries, lower fees, enhanced privacy and the ability to participate\
    \ using digital assets. These markets also tend to have more liquidity and can\
    \ innovate more rapidly thanks to blockchain technology and smart contracts​​.\n\
    \n2.  Oracles\n    *   **The Oracle Problem**: Smart contracts, while autonomous,\
    \ cannot access off-chain data independently, creating the ‘oracle problem’. Oracles\
    \ solve this by acting as data feeds between the blockchain and the external world,\
    \ enabling smart contracts to execute based on real-world events. However, designing\
    \ secure, reliable and decentralised oracles is challenging, with issues around\
    \ data accuracy, manipulation and centralisation risks​​.\n\n    *   **Oracle\
    \ Designs**: Oracles vary from centralised (single data source) to decentralised\
    \ (multiple data sources achieving consensus). Each design has its trade-offs\
    \ regarding speed, security and reliability. Centralised oracles are quicker but\
    \ pose a single point of failure, while decentralised oracles offer higher security\
    \ and resistance to manipulation at the cost of speed and efficiency. Innovative\
    \ platforms like Chainlink and Tellor represent advancements in oracle technology,\
    \ offering solutions to securely and accurately provide off-chain data to on-chain\
    \ smart contracts​​.\n\n    *   **Significance**: Oracles are vital for the functionality\
    \ of numerous DeFi applications, including prediction markets, lending platforms\
    \ and insurance contracts, by ensuring that these applications can interact with\
    \ real-world data in a trustless manner. The development and integration of reliable\
    \ oracles are critical for the DeFi ecosystem’s growth and stability​​.\n\nIn\
    \ summary, prediction markets and oracles are foundational components of the DeFi\
    \ space, offering mechanisms for decentralised betting on future events and securely\
    \ bridging the gap between blockchain applications and external data. Their continued\
    \ evolution and adoption are crucial for the DeFi sector’s aim to create an open,\
    \ transparent and accessible financial system.\n\n## 5.2 Analysis of Mainstream\
    \ DeFi Protocols\n\nThe DeFi (decentralised finance) ecosystem is comprised of\
    \ various protocols, each contributing unique features, mechanisms and impacts\
    \ to the broader financial landscape. Among the most influential in this space\
    \ are Uniswap, Aave and MakerDAO. They each play pivotal roles in liquidity provision,\
    \ lending and stablecoin issuance. Here’s an in-depth look at each protocol along\
    \ with an evaluation of their performance and impact based on Total Value Locked\
    \ (TVL), user adoption and their transformative potential on the financial landscape.\n\
    \n### Uniswap\n\nUniswap’s evolution has been characterised by continuous innovation\
    \ and adaptation to meet the ever-changing needs of the DeFi ecosystem. This journey\
    \ reflects a series of significant upgrades from its initial version to the latest,\
    \ illustrating the protocol’s commitment to improving liquidity, trading efficiency\
    \ and user experience.\n\nTable 5-3\n\nUniswap’s Evolution[^(10)](#616479_1_En_5_Chapter.xhtml#Sec19)^,\
    \ [^(11)](#616479_1_En_5_Chapter.xhtml#Sec19)\n\n| V0 and V1 | Uniswap’s journey\
    \ began with the creation of a prototype in 2017, leading to the official launch\
    \ of Uniswap V1 in November 2018\\. V1 introduced the Automated Market Maker (AMM)\
    \ mechanism to the Ethereum blockchain, allowing permissionless token trading\
    \ without the need for a traditional order book. This version used a constant\
    \ product model for pricing, laying the foundation for future iterations of Uniswap​​.\
    \ |\n| V2 | Launched in May 2020, Uniswap V2 introduced significant enhancements,\
    \ such as enabling ERC20 to ERC20 exchanges and introducing a Time-Weighted Average\
    \ Price (TWAP) oracle. This version marked Uniswap’s emergence as a pivotal player\
    \ in the DeFi space, significantly increasing its market attention and user base​​.\
    \ |\n| V3 | In May 2021, Uniswap V3 was introduced, bringing the innovative concept\
    \ of concentrated liquidity. This allowed liquidity providers to allocate capital\
    \ within specific price ranges, optimising capital efficiency and providing better\
    \ income opportunities. V3 also improved the TWAP oracle’s efficiency and introduced\
    \ multiple fee tiers, catering to different risk preferences among liquidity providers​​.\
    \ |\n| V4 | The evolution continued with the development of Uniswap V4, which\
    \ aims to further enhance flexibility and gas efficiency. It introduces customisable\
    \ pools through hooks, allowing developers to augment the concentrated liquidity\
    \ model with new functionalities. This version also moves towards a singleton\
    \ contract approach for all pools, significantly reducing the deployment cost\
    \ and gas fees associated with pool creation and trades. Moreover, V4 reintroduces\
    \ native ETH support, simplifying transactions and potentially reducing gas costs​​.\
    \ |\n\nEach version of Uniswap has progressively addressed the limitations of\
    \ its predecessors, introducing new features that have significantly impacted\
    \ the DeFi ecosystem. From facilitating simple ERC20/ETH trades to enabling complex,\
    \ concentrated liquidity positions and customisable pool functionalities, Uniswap’s\
    \ evolution mirrors the broader growth and increasing sophistication of the DeFi\
    \ sector. This continuous innovation has solidified Uniswap’s position as a key\
    \ infrastructure component in DeFi, supporting a wide range of applications and\
    \ services while providing users with more efficient, flexible and cost-effective\
    \ trading solutions.\n\n![](images/616479_1_En_5_Chapter/616479_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nSwap Hook Flow[^(11)](#616479_1_En_5_Chapter.xhtml#Sec19)\n\n\
    Uniswap V4’s ‘hooks’ feature provides developers the ability to implement specialised\
