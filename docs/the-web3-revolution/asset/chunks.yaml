    ## 9.1 Web3 与元宇宙：基础与技术


    元宇宙这一术语最早出现在尼尔·斯蒂芬森 1992 年的科幻小说 *雪崩* 中，它代表着一个由虚拟增强的物理现实、增强现实（AR）和互联网融合而成的集体虚拟共享空间。这个数字宇宙允许用户与计算机生成的环境以及其他用户进行交互。该概念已从虚构想象演变为技术发展的一个重要焦点，旨在创造身临其境的数字世界，让人们可以在其中工作、娱乐、社交，并参与跨越数字与物理世界的各种体验。


    在元宇宙的发展过程中，Web3 的需求至关重要，这源于当前互联网基础设施（即 Web2）的局限性。Web2 的特点是数据集中控制，用户对数字资产和身份的所有权有限。而
    Web3 凭借其去中心化的特性、区块链技术以及对用户主权的强调，为构建一个真正身临其境、可交互且用户拥有的元宇宙提供了必要的基础要素。


    从 Web1 到 Web3 的互联网演进，标志着用户与数字内容交互方式、内容控制权归属、支撑这些交互的底层技术以及用户在该生态系统中角色的重大转变。每一代网络都建立在上一代基础之上，从静态页面集合发展到动态交互体验，如今又迈向强调用户主权和资产所有权的去中心化平台。表
    9-1 详细对比了这三个阶段，突出了定义每个时代的核心差异。


    **表 9-1** Web1、Web2 与 Web3 对比


    | 特性 | Web1（静态网络） | Web2（社交网络） | Web3（去中心化网络） |

    | --- | --- | --- | --- |

    | 交互方式 | 只读，用户交互有限 | 读写，交互式应用程序和社交网络 | 读、写并拥有，强调用户所有权及与数字资产的交互 |

    | 内容控制 | 内容由网站所有者创建和控制 | 内容创作民主化，但由平台集中控制 | 去中心化控制，用户拥有自己的内容和数据 |

    | 技术 | 基础 HTML，静态页面 | AJAX、JavaScript，支持动态内容和应用 | 区块链、去中心化应用（DApp）、智能合约 |

    | 用户角色 | 内容消费者 | 内容创作者和消费者，但存在严重的隐私和数据所有权问题 | 自身数据和数字资产的所有者，去中心化经济的参与者 |


    Web1 常被称为“静态网络”，它为数字时代奠定了基础，让用户能够访问信息，但交互有限。Web2 或“社交网络”通过支持用户生成内容和社交网络彻底改变了这一模式，促进了前所未有的互动性和社群创建。然而，它也将数据控制权集中在了少数几个主要平台手中，引发了关于隐私和数据所有权的问题。Web3
    代表了下一个前沿领域，即“去中心化网络”，其旨在通过利用区块链技术将数据与数字资产的控制权和所有权归还给用户自身，从而解决这些问题。这一转变不仅具有技术层面的意义，也深刻影响了数字生态系统的社会经济结构。


    表 9-1 展示了互联网演进过程中用户能力与自主权的逐步增强。Web1 将互联网的基础确立为一个数字信息存储库。Web2 在此基础之上，使互联网更具交互性和社交性，但却集中了权力和控制权。Web3
    试图将这些控制权重新分配给用户，确保他们能够拥有、控制自己的内容及对数字世界的贡献，并从中获利。向 Web3 的转变不仅代表着技术创新，更是对互联网赋能个人与社区潜力的重新构想。

    '
- fmt: '### Core Foundational Elements of the Metaverse


    The metaverse, a concept that has captivated the imagination of technologists,
    creators and consumers alike, stands on the brink of redefining the digital and
    physical realms. Its foundation is built upon a series of technological advancements
    that set it apart from the traditional Internet and digital spaces we’ve grown
    accustomed to. Here, we delve into the core foundational elements that make the
    metaverse a unique and transformative platform for future generations:


    - **Decentralised Architecture**: The metaverse leverages blockchain technology
    to ensure that data integrity, security and ownership are maintained across its
    vast digital landscape. Blockchain''s inherent characteristics such as decentralisation,
    immutability and transparency provide a robust framework for creating a metaverse
    where users can trust in the security of their data and transactions. By decentralising
    the architecture, the metaverse ensures that no single entity has control over
    the entire ecosystem, thus democratising digital interactions and ownership.


    - **Immersive Technologies**: At the heart of the metaverse experience are immersive
    technologies such as virtual reality (VR), augmented reality (AR) and 3D modelling.
    VR immerses users in digital environments where they can interact with the virtual
    world in a highly realistic manner. AR overlays digital information onto the physical
    world, enriching the user''s environment with interactive digital elements. 3D
    modelling and simulation technologies enable the creation of complex, lifelike
    objects and environments within the metaverse. Together, these technologies create
    compelling, immersive experiences that blur the line between the digital and physical
    worlds.[¹](#616479_1_En_9_Chapter.xhtml#Sec15)


    - **Digital Economy**: The metaverse introduces a digital economy where true ownership
    of digital assets is facilitated through non-fungible tokens (NFTs) and cryptocurrencies.
    NFTs represent unique digital items – ranging from art and collectibles to virtual
    real estate and more – while cryptocurrencies enable secure, transparent financial
    transactions within the metaverse. This economic model allows for the creation,
    buying, selling and trading of virtual goods and services, fostering a vibrant
    economy that mirrors the complexity and dynamism of real-world economies.


    - **Interoperability**: A key feature of the metaverse is its ability to ensure
    that assets and identities can seamlessly move across different environments and
    platforms. This is achieved through the development and adoption of standards
    and protocols that facilitate interoperability. By enabling assets to be portable
    and persistent across various virtual spaces, the metaverse offers a unified,
    continuous experience that transcends individual platforms or applications.[²](#616479_1_En_9_Chapter.xhtml#Sec15)


    - **Spatial Computing**: Incorporating artificial intelligence (AI), machine learning
    and spatial technologies, the metaverse enables complex interactions and behaviours
    within its environments. Spatial computing allows for the understanding and manipulation
    of digital and physical spaces, enabling AI-driven avatars to navigate the metaverse,
    realistic simulations of physics and context-aware digital content. This level
    of computational intelligence is crucial for creating dynamic, responsive environments
    that adapt to user interactions and behaviours.[³](#616479_1_En_9_Chapter.xhtml#Sec15)


    These foundational elements collectively promise a future where the convergence
    of digital and physical realities opens up unprecedented opportunities for collaboration,
    creativity and interaction. The metaverse, powered by Web3 technologies, signifies
    a fundamental shift in how we perceive and interact with digital spaces, heralding
    a new era of digital existence.


    ## 9.2 Economic Models and Opportunities in Web3 and the Metaverse


    In examining the evolving economic models and opportunities that Web3 and the
    metaverse present, it’s clear that we are on the cusp of a fundamental shift in
    how economic systems are structured, how value is created and distributed and
    how individuals and organisations interact within digital realms. This expansion
    seeks to distil key insights into these transformative shifts, drawing upon broader
    concepts within the blockchain and digital asset spheres.[⁴](#616479_1_En_9_Chapter.xhtml#Sec15)^,
    [⁵](#616479_1_En_9_Chapter.xhtml#Sec15)


    ### Decentralised Economic Systems


    The move towards decentralised economic models in Web3 and the metaverse represents
    a departure from traditional shareholder-centric models towards systems where
    stakeholders have a more significant say and share in the economic outcomes​​.
    This paradigm shift expands the definition of capital to include digital assets,
    intellectual property and user engagement, thus democratising economic participation
    and benefit distribution. Let’s delve into the **4D Metanomics** and explore their
    roles within decentralised economic systems:


    - **Digital Creation**: This dimension focuses on the production of digital content
    within the metaverse. It ranges from the creation of virtual worlds and digital
    goods to the generation of media such as music, art and literature. In a decentralised
    system, creators retain ownership and control over their works, utilising blockchain
    technology to protect intellectual property and manage rights. This empowerment
    not only fosters innovation but also ensures creators are fairly compensated.


    - **Digital Assets**: Digital assets include anything from NFTs representing ownership
    of virtual items to tokens embodying stakes in digital ventures. These assets
    are unique in that they provide proof of ownership and can be traded or used across
    different platforms and services in the metaverse. Their interoperability and
    liquidity in digital markets signify a major shift from physical asset constraints,
    enhancing the velocity and volume of economic transactions in Web3.


    - **Digital Market**: This is where digital assets are bought, sold or traded.
    Digital markets in the metaverse are designed to be open and global, operating
    24/7 without the restrictions of geographical boundaries or centralised control.
    These markets rely on blockchain to facilitate trustless transactions, smart contracts
    for self-executing agreements and decentralised exchanges that enable peer-to-peer
    trading without intermediaries.


    - **Digital Currency**: The lifeblood of transactional activity in the metaverse,
    digital currencies, such as cryptocurrencies, allow for the seamless transfer
    of value in the digital realm. Beyond mere transactional mediums, these currencies
    can also represent governance tokens, giving holders voting rights on decisions
    within decentralised autonomous organisations (DAOs) or other Web3 entities.


    Decentralised economic systems in the context of 4D Metanomics imply a holistic
    ecosystem where each dimension interplays to create a robust and inclusive economy.
    Here, stakeholders are not just passive investors but active participants with
    significant agency over the creation, valuation, trading and use of digital goods
    and services. This inclusive and participatory economy has the potential to redefine
    wealth generation, distribution and economic empowerment on a global scale, opening
    up opportunities for broad-based wealth creation and distribution far beyond what
    traditional economic systems have offered.'
