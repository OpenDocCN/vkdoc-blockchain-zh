  trans: '#### 选项 1：搭建自己的 IPFS 节点


    搭建自己的 `IPFS` 节点需要在你的机器上安装 `IPFS`，初始化你的 `IPFS` 仓库，并启动 `IPFS` 守护进程以将你的节点连接到 `IPFS`
    网络。这种方法可以让你完全掌控内容的托管，但也伴随着更高的复杂性和责任。你需要管理节点的可用性和连接性，以确保资产始终可访问。此方法可能涉及：


    - 下载并安装 `IPFS`

    - 使用 `ipfs init` 初始化 `IPFS` 节点

    - 使用 `ipfs daemon` 启动 `IPFS` 守护进程

    - 使用 `ipfs add -r /path/to/your/folder` 将文件添加到 `IPFS`


    虽然运行自己的节点能提供高度的控制权，并能直接与 `IPFS` 网络交互，但这要求你对 `IPFS` 有深入的理解，对于初学者或寻求快速简便方案的用户来说，可能并非最直接的选择。


    #### 选项 2：使用第三方服务（如 Pinata）


    对于许多用户，尤其是 `IPFS` 新手或追求便利性的用户，像 Pinata 这样的第三方服务提供了一种更简单的方式来上传和管理 `IPFS` 上的内容。Pinata
    通过提供用户友好的界面以及钉住服务等额外功能，简化了流程，确保你的内容在 `IPFS` 网络上随时可用。


    使用 Pinata 上传你的 NFT 资产：


    1.  **创建账户**：在 [Pinata.cloud](https://pinata.cloud/) 上注册并登录你的账户。


    2.  **上传内容**：进入“上传”部分，选择上传文件夹。选中包含你生成图片的 `BMTEST_IMAGE` 文件夹。Pinata 会自动钉住你上传的内容，确保其在
    `IPFS` 网络上的可用性。


    3.  **获取 IPFS 哈希**：上传完成后，Pinata 会为你的文件夹及其包含的每个文件提供一个 `IPFS` 哈希（`CID`）。这些哈希作为资产的永久、不可变链接，你将在
    NFT 元数据中引用它们。


    在本教程中，考虑到我们有 20 张图片以及后续 20 个元数据 JSON 文档，Pinata 的免费层级（提供 100 个免费钉住）足够使用。上传整个文件夹不仅简化了流程，还保持了资产的组织结构，使你在进行
    NFT 铸造时更容易引用和管理它们。


    虽然搭建自己的 `IPFS` 节点提供了亲自动手的途径和完全的控制权，但它也带来了更陡峭的学习曲线和持续的管理责任。相比之下，使用像 Pinata 这样的第三方服务提供了一个直接、用户友好的解决方案，使其成为希望简化
    NFT 创建过程的创作者的有吸引力的选择。无论选择哪种方法，关键目标都是确保你的数字资产被安全地上传到 `IPFS`，为其转化为 NFT 铺平道路。


    将图片上传到 Pinata（一个用户友好的 `IPFS` 交互界面）后，你会注意到每个文件都有一个对应的 `CID`（内容标识符）。这个 `CID` 是一个唯一哈希值，代表你的文件在
    `IPFS` 网络上的位置，并作为指向其位置的永久指针。


    ![](img/616479_1_En_7_Fig1_HTML.jpg)


    图 7-1


    Pinata 截图 – 图像文件夹


    当你将整个文件夹上传到 Pinata（如截图所示）时，该服务还会为你提供整个文件夹的 `CID`。这在处理文件集合（例如一个 10k NFT 系列中的一组图片）时特别有用，因为你可以引用文件夹的
    `CID`，并附加各个文件名，从而为每个 NFT 的元数据创建完整的 URL。


    以下是查看和使用 `CID` 的步骤详解：


    1.  **在 IPFS 上访问你的文件**：上传 `BMTEST_IMAGE` 文件夹后，进入 Pinata 的“文件”部分。你将看到该文件夹及其大小和上传日期。


    2.  **文件夹 CID**：点击该文件夹，你会看到一个文件索引，每个文件都有其自己的 `CID`，与你提供的第二张截图类似。这个索引就是文件夹的 `CID`，看起来像
    `Qm...` 这样的字母数字字符串。


    3.  **单个文件 CID**：在 `IPFS` 的索引视图中，每个文件都有一个链接，包含文件夹的 `CID` 和文件名。例如，第一张图片的 URL 类似于
    `ipfs://Qm...FolderCID/1.png`；见图 7-2。


    ![](img/616479_1_En_7_Fig2_HTML.jpg)


    图 7-2


    文件 CID 截图 – 图像


    4.  **在元数据中使用 CID**：这些 `IPFS` 链接将用于你的 NFT 元数据中。当你为每个 NFT 创建 JSON 元数据文件时，你需要在 `image`
    字段中指定指向每张图片的 `IPFS` URL，确保 OpenSea 或其他 NFT 市场能够检索并显示该图片。


    综上所述，使用 `IPFS` 托管 NFT 的图片和元数据是有益的，因为它确保了去中心化存储，与区块链和 NFT 的去中心化特性保持一致。与依赖单个服务器或公司的中心化托管解决方案不同，`IPFS`
    运行在点对点网络上，使内容能够抵御审查和服务器故障，这反过来增强了 NFT 相关数字资产的持久性和可用性。这种去中心化方法不仅仅是技术上的偏好，更是区块链技术的核心原则，提供了与
    NFT 自身不可变特性相一致的弹性和永久性。因此，虽然中心化 URL 在技术上可以达到类似目的，但它们无法提供与 `IPFS` 相同的无需信任的保证，这正是
    `IPFS` 经常成为 NFT 存储首选的原因，正如第 3.3 节所强调的。'
- fmt: "### Step 3: Create Metadata Compliant with OpenSea’s Standards\n\nAfter uploading\
    \ your digital assets to IPFS and obtaining their CIDs, the next critical step\
    \ in the NFT creation process is generating metadata that complies with OpenSea’s\
    \ standards. Metadata in the context of NFTs is a JSON file that contains detailed\
    \ information about each token, including its name, description, and a link to\
    \ the digital asset (typically an image or other multimedia files) on IPFS.\n\n\
    The metadata should be structured according to the specifications that marketplaces\
    \ like OpenSea have set out. This structure not only includes basic identification\
    \ properties but also allows for a variety of attributes that detail the NFT’s\
    \ traits, contributing to its uniqueness and collectability.\n\nBefore you execute\
    \ the script to generate metadata files, make sure to create a folder named `BMTEST_JSON`\
    \ in your working directory to store the final JSON documents. This organisational\
    \ step ensures that all metadata files are systematically arranged and easily\
    \ accessible for subsequent steps in the NFT minting process.\n\nWith your CID\
    \ at hand (in this example, `QmcdEjixt5jJq8ynXYyyNWFgicbUs7xt4CygB5DxQ62KMc`),\
    \ you will replace it with the actual CID obtained from your IPFS upload process.\
    \ The Python script iterates through each digital asset, assigning the correct\
    \ image URL and saving the metadata into individual JSON files:\n\n```python\n\
    for k in range(m):\n    metadata[k]['image'] = f'ipfs://QmcdEjixt5jJq8ynXYyyNWFgicbUs7xt4CygB5DxQ62KMc/{k+1}.png'\n\
    \    with open(f'BMTEST_JSON/{k+1}.json', 'w') as fp:\n        json.dump(metadata[k],\
    \ fp)\n```\n\nOnce the script has run, the `BMTEST_JSON` folder will contain 20\
    \ JSON files, each representing the metadata for one NFT. These files will detail\
    \ the stored location and traits of each corresponding digital asset. This metadata\
    \ plays a crucial role when minting NFTs as it tells the blockchain where the\
    \ NFT’s associated digital asset can be found and how it should be represented\
    \ on platforms like OpenSea.\n\nCompliance with metadata standards is not merely\
    \ a technical requirement but a means to ensure that the NFTs will be fully compatible\
    \ with OpenSea’s user interface and feature set. It allows for rich displays,\
    \ filtering, and sorting options within the marketplace, enhancing the user’s\
    \ experience and the discoverability of the NFTs.\n\nBy carefully preparing and\
    \ structuring your metadata, you contribute to the overall narrative and value\
    \ proposition of your NFT collection. This structured data not only informs potential\
    \ buyers about the unique characteristics of each NFT but also serves as the backbone\
    \ for how these assets are interacted with and perceived within the digital ecosystem.\n\
    \nOnce you have generated the JSON metadata files for each of your NFTs, the final\
    \ step in this phase is to upload these files to Pinata, just as you did with\
    \ the image files. This will assign a unique CID to the entire `BMTEST_JSON` folder\
    \ and individual CIDs to each JSON file within it; see Figure [7-3](#616479_1_En_7_Chapter.xhtml#Fig3).\n\
    \n![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig3_HTML.jpg)\n\nFigure 7-3\n\
    \nScreenshots of Pinata – JSON\n\nAfter the upload, you can view your JSON files\
    \ on Pinata or directly through the IPFS gateway; see Figure [7-4](#616479_1_En_7_Chapter.xhtml#Fig4).\
    \ By uploading your JSON metadata to Pinata, you are effectively pinning your\
    \ NFT descriptions to the IPFS network, ensuring they are as permanently and immutably\
    \ stored as the image files themselves. Each JSON file now has a dedicated CID\
    \ that can be used within the NFT’s metadata to point to its description, traits,\
    \ and other attributes.\n\nThis step is crucial as it completes the NFT’s data\
    \ structure, ensuring that all components – visual and descriptive – are decentralised\
    \ and resistant to changes. It maintains the integrity of the NFT by securing\
    \ its associated information in a way that is consistent with the decentralised\
    \ and permanent nature of blockchain assets.\n\nWith both the images and their\
    \ metadata now securely uploaded to IPFS and their CIDs known, you have all the\
    \ necessary components to mint your NFTs on the blockchain, ensuring that they\
    \ are ready for integration with NFT marketplaces such as OpenSea.\n\n![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nScreenshots of File CID – JSON"
  raw: '### Step 3: Create Metadata Compliant with OpenSea’s Standards


    After uploading your digital assets to IPFS and obtaining their CIDs, the next
    critical step in the NFT creation process is generating metadata that complies
    with OpenSea’s standards. Metadata in the context of NFTs is a JSON file that
    contains detailed information about each token, including its name, description
    and a link to the digital asset (typically an image or other multimedia files)
    on IPFS.


    The metadata should be structured according to the specifications that marketplaces
    like OpenSea have set out. This structure not only includes basic identification
    properties but also allows for a variety of attributes that detail the NFT’s traits,
    contributing to its uniqueness and collectability.


    Before you execute the script to generate metadata files, make sure to create
    a folder named **BMTEST_JSON** in your working directory to store the final JSON
    documents. This organisational step ensures that all metadata files are systematically
    arranged and easily accessible for subsequent steps in the NFT minting process.


    With your CID at hand (in this example, **QmcdEjixt5jJq8ynXYyyNWFgicbUs7xt4CygB5DxQ62KMc**),
    you will replace it with the actual CID obtained from your IPFS upload process.
    The Python script iterates through each digital asset, assigning the correct image
    URL and saving the metadata into individual JSON files:


    ```

    for k in range(m):

    metadata[k][''image''] = f''ipfs://QmcdEjixt5jJq8ynXYyyNWFgicbUs7xt4CygB5DxQ62KMc/{k+1}.png''

    with open(f''BMTEST_JSON/{k+1}.json'', ''w'') as fp:

    json.dump(metadata[k], fp)

    ```


    Once the script has run, the **BMTEST_JSON** folder will contain 20 JSON files,
    each representing the metadata for one NFT. These files will detail the stored
    location and traits of each corresponding digital asset. This metadata plays a
    crucial role when minting NFTs as it tells the blockchain where the NFT’s associated
    digital asset can be found and how it should be represented on platforms like
    OpenSea.


    Compliance with metadata standards is not merely a technical requirement but a
    means to ensure that the NFTs will be fully compatible with OpenSea’s user interface
    and feature set. It allows for rich displays, filtering and sorting options within
    the marketplace, enhancing the user’s experience and the discoverability of the
    NFTs.


    By carefully preparing and structuring your metadata, you contribute to the overall
    narrative and value proposition of your NFT collection. This structured data not
    only informs potential buyers about the unique characteristics of each NFT but
    also serves as the backbone for how these assets are interacted with and perceived
    within the digital ecosystem.


    Once you have generated the JSON metadata files for each of your NFTs, the final
    step in this phase is to upload these files to Pinata, just as you did with the
    image files. This will assign a unique CID to the entire **BMTEST_JSON** folder
    and individual CIDs to each JSON file within it; see Figure [7-3](#616479_1_En_7_Chapter.xhtml#Fig3).


    ![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Screenshots of Pinata – JSON


    After the upload, you can view your JSON files on Pinata or directly through the
    IPFS gateway; see Figure [7-4](#616479_1_En_7_Chapter.xhtml#Fig4). By uploading
    your JSON metadata to Pinata, you are effectively pinning your NFT descriptions
    to the IPFS network, ensuring they are as permanently and immutably stored as
    the image files themselves. Each JSON file now has a dedicated CID that can be
    used within the NFT’s metadata to point to its description, traits and other attributes.


    This step is crucial as it completes the NFT’s data structure, ensuring that all
    components – visual and descriptive – are decentralised and resistant to changes.
    It maintains the integrity of the NFT by securing its associated information in
    a way that is consistent with the decentralised and permanent nature of blockchain
    assets.


    With both the images and their metadata now securely uploaded to IPFS and their
    CIDs known, you have all the necessary components to mint your NFTs on the blockchain,
    ensuring that they are ready for integration with NFT marketplaces such as OpenSea.


    ![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Screenshots of File CID – JSON'
  trans: "\n### 步骤 3：创建符合 OpenSea 标准的元数据\n\n将数字资产上传至 IPFS 并获取其 CID 后，NFT 创建流程中的下一个关键步骤是生成符合\
    \ OpenSea 标准的元数据。在 NFT 的语境中，元数据是一个 JSON 文件，其中包含每个代币的详细信息，包括其名称、描述以及指向 IPFS 上数字资产（通常是图像或其他多媒体文件）的链接。\n\
    \n元数据的结构应符合 OpenSea 等市场所制定的规范。这种结构不仅包含基本的标识属性，还允许包含各种详细描述 NFT 特征的属性，从而彰显其独特性和收藏价值。\n\
    \n在执行脚本生成元数据文件之前，请确保在你的工作目录中创建一个名为 `BMTEST_JSON` 的文件夹，用于存放最终的 JSON 文档。这一步组织工作确保了所有元数据文件都能系统地进行整理，并且方便在后续的\
    \ NFT 铸造流程中轻松访问。\n\n当你拿到 CID（在本示例中为 `QmcdEjixt5jJq8ynXYyyNWFgicbUs7xt4CygB5DxQ62KMc`）后，需要将其替换为你从\
    \ IPFS 上传过程中获取的实际 CID。Python 脚本会遍历每一个数字资产，为其分配正确的图像 URL，并将元数据保存为独立的 JSON 文件：\n\
    \n```python\nfor k in range(m):\n    metadata[k]['image'] = f'ipfs://QmcdEjixt5jJq8ynXYyyNWFgicbUs7xt4CygB5DxQ62KMc/{k+1}.png'\n\
    \    with open(f'BMTEST_JSON/{k+1}.json', 'w') as fp:\n        json.dump(metadata[k],\
    \ fp)\n```\n\n脚本运行完成后，`BMTEST_JSON` 文件夹中将包含 20 个 JSON 文件，每个文件代表一个 NFT 的元数据。这些文件将详细说明每个对应数字资产的存储位置和特征。在铸造\
    \ NFT 时，这些元数据起着至关重要的作用，因为它会告知区块链该 NFT 关联数字资产的存储位置，以及在 OpenSea 等平台上应如何呈现。\n\n遵循元数据标准不仅仅是一项技术要求，更是一种确保\
    \ NFT 与 OpenSea 用户界面和功能集完全兼容的手段。它允许在市场内进行丰富的展示、筛选和排序操作，从而提升用户体验和 NFT 的可发现性。\n\n\
    通过精心准备和组织元数据，你将为自己的 NFT 系列的整体叙事和价值主张做出贡献。这种结构化的数据不仅能让潜在买家了解每个 NFT 的独特特征，也是这些数字资产在生态系统中被交互和认知的基础。\n\
    \n在为每个 NFT 生成 JSON 元数据文件后，此阶段的最后一步是将这些文件上传到 Pinata，就像你上传图像文件一样。这将为整个 `BMTEST_JSON`\
    \ 文件夹分配一个唯一的 CID，并为其中的每个 JSON 文件分配独立的 CID；见图 7-3。\n\n![](img/616479_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3\n\nPinata 截图 – JSON\n\n上传后，你可以在 Pinata 上或直接通过 IPFS 网关查看你的 JSON 文件；见图 7-4。通过将\
    \ JSON 元数据上传到 Pinata，你实际上是将你的 NFT 描述固定到了 IPFS 网络，确保它们与图像文件本身一样被永久且不可篡改地存储。每个 JSON\
    \ 文件现在拥有一个专用的 CID，可用于在 NFT 的元数据中指向其描述、特征和其他属性。\n\n这一步至关重要，因为它完善了 NFT 的数据结构，确保所有组成部分——视觉部分和描述部分——都是去中心化的且不可更改。它通过以与区块链资产去中心化和永久性相一致的方式保护其关联信息，从而维护了\
    \ NFT 的完整性。\n\n至此，图像及其元数据都已安全上传到 IPFS，并且已知其 CID，你便拥有了在区块链上铸造 NFT 所需的所有必要组件，确保它们已准备好与\
    \ OpenSea 等 NFT 市场集成。\n\n![](img/616479_1_En_7_Fig4_HTML.jpg)\n\n图 7-4\n\n文件 CID\
    \ 截图 – JSON\n"
- fmt: "### Step 4: Mint the NFT on the Blockchain\n\nUsing a development environment\
    \ like Remix, you write and compile your ERC721 smart contract. The contract should\
    \ include functions to mint NFTs and set base URI, which points to the location\
    \ of your metadata on IPFS. You may use the example from Section 3.3 or the following\
    \ example which has been modified based on the code provided by the YouTube influencer\
    \ Hashlips:\n\n```\n// SPDX-License-Identifier: GPL-3.0\n// Amended by HUGO\n\
    pragma solidity >=0.7.0 <0.9.0;\n\nimport \"@openzeppelin/contracts/token/ERC721/extensions/ERC721Enumerable.sol\"\
    ;\nimport \"@openzeppelin/contracts/access/Ownable.sol\";\n\ncontract NFT is ERC721Enumerable,\
    \ Ownable {\n    using Strings for uint256;\n\n    string public baseURI;\n  \
    \  string public baseExtension = \".json\";\n    uint256 public cost = 0.01 ether;\n\
    \    uint256 public maxSupply = 10000;\n    uint256 public maxMintAmount = 20;\n\
    \    bool public paused = false;\n    mapping(address => bool) public whitelisted;\n\
    \n    constructor(\n        string memory _name,\n        string memory _symbol,\n\
    \        string memory _initBaseURI\n    ) ERC721(_name, _symbol) {\n        setBaseURI(_initBaseURI);\n\
    \        mint(msg.sender, 20);\n    }\n\n    // internal\n    function _baseURI()\
    \ internal view virtual override returns (string memory) {\n        return baseURI;\n\
    \    }\n\n    // public\n    function mint(address _to, uint256 _mintAmount) public\
    \ payable {\n        uint256 supply = totalSupply();\n        require(!paused);\n\
    \        require(_mintAmount > 0);\n        require(_mintAmount <= maxMintAmount);\n\
    \        require(supply + _mintAmount <= maxSupply);\n\n        if (msg.sender\
    \ != owner()) {\n            if (whitelisted[msg.sender] != true) {\n        \
    \        require(msg.value >= cost * _mintAmount);\n            }\n        }\n\
    \n        for (uint256 i = 1; i <= _mintAmount; i++) {\n            _safeMint(_to,\
    \ supply + i);\n        }\n    }\n\n    function walletOfOwner(address _owner)\n\
    \        public\n        view\n        returns (uint256[] memory)\n    {\n   \
    \     uint256 ownerTokenCount = balanceOf(_owner);\n        uint256[] memory tokenIds\
    \ = new uint256[](ownerTokenCount);\n        for (uint256 i; i < ownerTokenCount;\
    \ i++) {\n            tokenIds[i] = tokenOfOwnerByIndex(_owner, i);\n        }\n\
    \        return tokenIds;\n    }\n\n    function tokenURI(uint256 tokenId)\n \
    \       public\n        view\n        virtual\n        override\n        returns\
    \ (string memory)\n    {\n        require(\n            _exists(tokenId),\n  \
    \          \"ERC721Metadata: URI query for nonexistent token\"\n        );\n\n\
    \        string memory currentBaseURI = _baseURI();\n        return\n        \
    \    bytes(currentBaseURI).length > 0\n                ? string(abi.encodePacked(currentBaseURI,\
    \ tokenId.toString(), baseExtension))\n                : \"\";\n    }\n\n    //onlyowner\n\
    \    function setCost(uint256 _newCost) public onlyOwner {\n        cost = _newCost;\n\
    \    }\n\n    function setmaxMintAmount(uint256 _newmaxMintAmount) public onlyOwner\
    \ {\n        maxMintAmount = _newmaxMintAmount;\n    }\n\n    function setBaseURI(string\
    \ memory _newBaseURI) public onlyOwner {\n        baseURI = _newBaseURI;\n   \
    \ }\n\n    function setBaseExtension(string memory _newBaseExtension) public onlyOwner\
    \ {\n        baseExtension = _newBaseExtension;\n    }\n\n    function pause(bool\
    \ _state) public onlyOwner {\n        paused = _state;\n    }\n\n    function\
    \ whitelistUser(address _user) public onlyOwner {\n        whitelisted[_user]\
    \ = true;\n    }\n\n    function removeWhitelistUser(address _user) public onlyOwner\
    \ {\n        whitelisted[_user] = false;\n    }\n\n    function withdraw() public\
    \ payable onlyOwner {\n        // This will pay Hugo 2.5% of the initial sale.\n\
    \        // You can remove this if you want, or keep it in to support Hugo.\n\
    \        // ========================================================\n       \
    \ // ========================================================\n        (bool hs,\
    \ ) = payable(0x979390763254C21986D24139818a052C9D934fb8).call{value: address(this).balance\
    \ * 25 / 1000}(\"\");\n        require(hs);\n        // ========================================================\n\
    \        // This will payout the owner 97.5% of the contract balance.\n      \
    \  // Do not remove this otherwise you will not be able to withdraw the funds.\n\
    \        // =======================================================\n        (bool\
    \ os, ) = payable(owner()).call{value: address(this).balance}(\"\");\n       \
    \ require(os);\n        // =======================================================\n\
    \    }\n}\n```\n\nThis is a smart contract for an ERC721 token, which is a standard\
    \ for representing ownership of non-fungible tokens, commonly used for digital\
    \ assets such as NFTs. The contract includes several important elements and features\
    \ which are standard for NFTs but also introduces some custom functions and modifiers:\n\
    \n1.  **Variables**\n    *   `baseURI`: Stores the base part of the URI used to\
    \ access the token’s metadata\n    *   `baseExtension`: The file extension appended\
    \ to the `tokenURI`\n    *   `cost`: The cost to mint each NFT\n    *   `maxSupply`:\
    \ The maximum number of tokens that can be minted\n    *   `maxMintAmount`: The\
    \ maximum number of tokens that can be minted in a single transaction\n    * \
    \  `paused`: A boolean that can pause the minting function when `true`\n    *\
    \   `whitelisted`: A mapping that keeps track of addresses that are whitelisted\
    \ to mint tokens, possibly without paying the cost or with other benefits\n\n\
    2.  **Constructor**: When the contract is deployed, it sets the initial `baseURI`\
    \ and mints 20 tokens to the contract deployer.\n\n3.  **Minting**: The `mint`\
    \ function allows a user to mint new tokens. It includes checks for whether minting\
    \ is paused, if the mint amount is appropriate and if the supply cap has not been\
    \ exceeded. It also handles whether the sender is required to pay for minting\
    \ based on their whitelist status.\n\n4.  **Helper Functions**\n    *   `walletOfOwner`:\
    \ Returns an array of tokenIds that the owner has\n    *   `tokenURI`: Returns\
    \ the full URI to the metadata of the given tokenId\n\n5.  **Owner-Only Functions**:\
    \ There are several functions that can only be called by the owner of the contract,\
    \ enabling them to change the minting cost, the maximum minting amount, the base\
    \ URI and the base extension. The owner can also pause or unpause minting, whitelist\
    \ users and withdraw funds collected from minting.\n\n6.  **Withdraw Function**:\
    \ The `withdraw` function allows the owner to withdraw funds from the contract.\
    \ It includes a feature to pay 2.5% of the withdrawal to the address presumably\
    \ belonging to Hugo (as a royalty or developer fee) and the rest to the owner’s\
    \ address.\n\nThis contract provides a customisable and ready-to-use implementation\
    \ for an NFT project with the flexibility to set various parameters and maintain\
    \ control over the minting process. By deploying this contract to the Ethereum\
    \ blockchain, a project can start minting NFTs that are compliant with the ERC721\
    \ standard and OpenSea’s metadata standards, provided the metadata URIs point\
    \ to valid JSON metadata files.\n\nThen, choose a network to deploy your contract.\
    \ For testing purposes, as mentioned, the Sepolia Testnet can be used to avoid\
    \ real transaction costs. After compiling the contract, deploy it to the Sepolia\
    \ Testnet. This will require some test Ether, which you can obtain from a faucet\
    \ specific to Sepolia. Upon successful deployment, you will receive a contract\
    \ address which is unique to your NFT collection.\n\nWhen deploying the smart\
    \ contract, it is important to ensure that you input the correct details for the\
    \ NFT’s name, symbol and the base URI of the metadata.\n\n![Figure 7-5](images/616479_1_En_7_Chapter/616479_1_En_7_Fig5_HTML.jpg)\n\
    \n**Figure 7-5** Smart Contract Deployment Information\n\nThe name (`_NAME`) is\
    \ typically a descriptive title for the collection of NFTs, such as 'Brownian\
    \ Motion Test' in this case. The symbol (`_SYMBOL`) is an abbreviation that represents\
    \ your NFT collection, like 'BMT' for Brownian Motion Test.\n\nFor the base URI\
    \ (`_INITBASEURI`), this should be the IPFS URI that points to the location where\
    \ your metadata JSON files are stored. It is essential to use the CID provided\
    \ by Pinata for the folder containing your JSON files, which in your example is\
    \ `ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/`.\n\nThe trailing slash\
    \ '/' is crucial because your smart contract appends this base URI to the token\
    \ IDs to form the full URI for each token's metadata, as indicated by the `baseURI`\
    \ and `baseExtension` variables in the contract:\n\n```\nsolidityCopy code\nstring\
    \ public baseURI; string public baseExtension = \".json\";\n```\n\nWith the base\
    \ URI set to `ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/` and the\
    \ base extension set to `.json`, the contract will automatically generate the\
    \ correct metadata URI for each NFT. For example, if you mint an NFT with a token\
    \ ID of 1, the contract will concatenate the base URI with the token ID and the\
    \ base extension to form the full metadata URI:\n\n`ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/1.json`.\n\
    \nThis full URI is where OpenSea and other platforms will look to retrieve the\
    \ NFT's metadata, which includes the name, description, image and attributes of\
    \ the NFT. Getting this right is essential for the proper display and functioning\
    \ of your NFT on marketplaces and ensures that all the metadata associated with\
    \ your NFTs is accessible and correctly linked.\n\nAfter deploying your NFT contract\
    \ to the blockchain using Remix or another development environment, you'll see\
    \ a series of functions that you can interact with directly in the Remix interface,\
    \ as shown in Figure 7-6. These functions allow you to manage various aspects\
    \ of your NFT collection.\n\nHere's an expanded explanation of the post-deployment\
    \ steps you can take:"
  raw: "### Step 4: Mint the NFT on the Blockchain\n\nUsing a development environment\
    \ like Remix, you write and compile your ERC721 smart contract. The contract should\
    \ include functions to mint NFTs and set base URI, which points to the location\
    \ of your metadata on IPFS. You may use the example from Section [3.​3](#616479_1_En_3_Chapter.xhtml#Sec6)\
    \ or the following example which has been modified based on the code provided\
    \ by the YouTube influencer Hashlips:\n\n```\n// SPDX-License-Identifier: GPL-3.0\n\
    // Amended by HUGO\npragma solidity >=0.7.0  bool) public whitelisted;\nconstructor(\n\
    string memory _name,\nstring memory _symbol,\nstring memory _initBaseURI\n) ERC721(_name,\
    \ _symbol) {\nsetBaseURI(_initBaseURI);\nmint(msg.sender, 20);\n}\n// internal\n\
    function _baseURI() internal view virtual override returns (string memory) {\n\
    return baseURI;\n}\n// public\nfunction mint(address _to, uint256 _mintAmount)\
    \ public payable {\nuint256 supply = totalSupply();\nrequire(!paused);\nrequire(_mintAmount\
    \ > 0);\nrequire(_mintAmount = cost * _mintAmount);\n}\n}\nfor (uint256 i = 1;\
    \ i  0\n? string(abi.encodePacked(currentBaseURI, tokenId.toString(), baseExtension))\n\
    : \"\";\n}\n//onlyowner\nfunction setCost(uint256 _newCost) public onlyOwner {\n\
    cost = _newCost;\n}\nfunction setmaxMintAmount(uint256 _newmaxMintAmount) public\
    \ onlyOwner {\nmaxMintAmount = _newmaxMintAmount;\n}\nfunction setBaseURI(string\
    \ memory _newBaseURI) public onlyOwner {\nbaseURI = _newBaseURI;\n}\nfunction\
    \ setBaseExtension(string memory _newBaseExtension) public onlyOwner {\nbaseExtension\
    \ = _newBaseExtension;\n}\nfunction pause(bool _state) public onlyOwner {\npaused\
    \ = _state;\n}\nfunction whitelistUser(address _user) public onlyOwner {\nwhitelisted[_user]\
    \ = true;\n}\nfunction removeWhitelistUser(address _user) public onlyOwner {\n\
    whitelisted[_user] = false;\n}\nfunction withdraw() public payable onlyOwner {\n\
    // This will pay Hugo 2.5% of the initial sale.\n// You can remove this if you\
    \ want, or keep it in to support Hugo.\n// ========================================================\n\
    // ========================================================\n(bool hs, ) = payable(0x979390763254C21986D24139818a052C9D934fb8).call{value:\
    \ address(this).balance * 25 / 1000}(\"\");\nrequire(hs);\n// ========================================================\n\
    // This will payout the owner 97.5% of the contract balance.\n// Do not remove\
    \ this otherwise you will not be able to withdraw the funds.\n// =======================================================\n\
    (bool os, ) = payable(owner()).call{value: address(this).balance}(\"\");\nrequire(os);\n\
    // =======================================================\n}\n}\n```\n\nThis\
    \ is a smart contract for an ERC721 token, which is a standard for representing\
    \ ownership of non-fungible tokens, commonly used for digital assets such as NFTs.\
    \ The contract includes several important elements and features which are standard\
    \ for NFTs but also introduces some custom functions and modifiers:\n\n1.  **Variables**\n\
    \    *   **baseURI**: Stores the base part of the URI used to access the token’s\
    \ metadata\n\n*   **baseExtension**: The file extension appended to the **tokenURI**\n\
    \n*   **cost**: The cost to mint each NFT\n\n*   **maxSupply**: The maximum number\
    \ of tokens that can be minted\n\n*   **maxMintAmount**: The maximum number of\
    \ tokens that can be minted in a single transaction\n\n*   **paused**: A boolean\
    \ that can pause the minting function when **true**\n\n*   **whitelisted**: A\
    \ mapping that keeps track of addresses that are whitelisted to mint tokens, possibly\
    \ without paying the cost or with other benefits\n\n2.  **Constructor**: When\
    \ the contract is deployed, it sets the initial **baseURI** and mints 20 tokens\
    \ to the contract deployer.\n\n3.  **Minting**: The **mint** function allows a\
    \ user to mint new tokens. It includes checks for whether minting is paused, if\
    \ the mint amount is appropriate and if the supply cap has not been exceeded.\
    \ It also handles whether the sender is required to pay for minting based on their\
    \ whitelist status.\n\n4.  **Helper Functions**\n    *   **walletOfOwner**: Returns\
    \ an array of tokenIds that the owner has\n\n*   **tokenURI**: Returns the full\
    \ URI to the metadata of the given tokenId\n\n5.  **Owner-Only Functions**: There\
    \ are several functions that can only be called by the owner of the contract,\
    \ enabling them to change the minting cost, the maximum minting amount, the base\
    \ URI and the base extension. The owner can also pause or unpause minting, whitelist\
    \ users and withdraw funds collected from minting.\n\n6.  **Withdraw Function**:\
    \ The **withdraw** function allows the owner to withdraw funds from the contract.\
    \ It includes a feature to pay 2.5% of the withdrawal to the address presumably\
    \ belonging to Hugo (as a royalty or developer fee) and the rest to the owner’s\
    \ address.\n\nThis contract provides a customisable and ready-to-use implementation\
    \ for an NFT project with the flexibility to set various parameters and maintain\
    \ control over the minting process. By deploying this contract to the Ethereum\
    \ blockchain, a project can start minting NFTs that are compliant with the ERC721\
    \ standard and OpenSea’s metadata standards, provided the metadata URIs point\
    \ to valid JSON metadata files.\n\nThen, choose a network to deploy your contract.\
    \ For testing purposes, as mentioned, the Sepolia Testnet can be used to avoid\
    \ real transaction costs. After compiling the contract, deploy it to the Sepolia\
    \ Testnet. This will require some test Ether, which you can obtain from a faucet\
    \ specific to Sepolia. Upon successful deployment, you will receive a contract\
    \ address which is unique to your NFT collection.\n\nWhen deploying the smart\
    \ contract, it is important to ensure that you input the correct details for the\
    \ NFT’s name, symbol and the base URI of the metadata.\n\n![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nSmart Contract Deployment Information\n\nThe name (_NAME) is typically\
    \ a descriptive title for the collection of NFTs, such as ‘Brownian Motion Test’\
    \ in this case. The symbol (_SYMBOL) is an abbreviation that represents your NFT\
    \ collection, like ‘BMT’ for Brownian Motion Test.\n\nFor the base URI (_INITBASEURI),\
    \ this should be the IPFS URI that points to the location where your metadata\
    \ JSON files are stored. It is essential to use the CID provided by Pinata for\
    \ the folder containing your JSON files, which in your example is **ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/**.\n\
    \nThe trailing slash ‘/’ is crucial because your smart contract appends this base\
    \ URI to the token IDs to form the full URI for each token’s metadata, as indicated\
    \ by the **baseURI** and **baseExtension** variables in the contract:\n\n```\n\
    solidityCopy code\nstring public baseURI; string public baseExtension = \".json\"\
    ;\n```\n\nWith the base URI set to **ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/**\
    \ and the base extension set to **.json**, the contract will automatically generate\
    \ the correct metadata URI for each NFT. For example, if you mint an NFT with\
    \ a token ID of 1, the contract will concatenate the base URI with the token ID\
    \ and the base extension to form the full metadata URI:\n\n**ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/1.json**.\n\
    \nThis full URI is where OpenSea and other platforms will look to retrieve the\
    \ NFT’s metadata, which includes the name, description, image and attributes of\
    \ the NFT. Getting this right is essential for the proper display and functioning\
    \ of your NFT on marketplaces and ensures that all the metadata associated with\
    \ your NFTs is accessible and correctly linked.\n\nAfter deploying your NFT contract\
    \ to the blockchain using Remix or another development environment, you’ll see\
    \ a series of functions that you can interact with directly in the Remix interface,\
    \ as shown in Figure [7-6](#616479_1_En_7_Chapter.xhtml#Fig6). These functions\
    \ allow you to manage various aspects of your NFT collection.\n\nHere’s an expanded\
    \ explanation of the post-deployment steps you can take:"
  trans: "\n### 第四步：在区块链上铸造 NFT\n\n使用类似 Remix 的开发环境，你可以编写并编译 ERC721 智能合约。智能合约应包含铸造\
    \ NFT 和设置基础 URI 的功能，该 URI 指向 IPFS 上元数据的位置。你可以使用第 3.3 节中的示例，或参考以下基于 YouTube 博主\
    \ Hashlips 提供的代码修改而成的示例：\n\n```\n// SPDX-License-Identifier: GPL-3.0\n// Amended\
    \ by HUGO\npragma solidity >=0.7.0 <0.9.0;\n\nimport \"@openzeppelin/contracts/token/ERC721/extensions/ERC721Enumerable.sol\"\
    ;\nimport \"@openzeppelin/contracts/access/Ownable.sol\";\n\ncontract NFT is ERC721Enumerable,\
    \ Ownable {\n    using Strings for uint256;\n\n    string public baseURI;\n  \
    \  string public baseExtension = \".json\";\n    uint256 public cost = 0.01 ether;\n\
    \    uint256 public maxSupply = 10000;\n    uint256 public maxMintAmount = 20;\n\
    \    bool public paused = false;\n    mapping(address => bool) public whitelisted;\n\
    \n    constructor(\n        string memory _name,\n        string memory _symbol,\n\
    \        string memory _initBaseURI\n    ) ERC721(_name, _symbol) {\n        setBaseURI(_initBaseURI);\n\
    \        mint(msg.sender, 20);\n    }\n\n    // internal\n    function _baseURI()\
    \ internal view virtual override returns (string memory) {\n        return baseURI;\n\
    \    }\n\n    // public\n    function mint(address _to, uint256 _mintAmount) public\
    \ payable {\n        uint256 supply = totalSupply();\n        require(!paused);\n\
    \        require(_mintAmount > 0);\n        require(_mintAmount <= maxMintAmount);\n\
    \        require(supply + _mintAmount <= maxSupply);\n\n        if (msg.sender\
    \ != owner()) {\n            if (whitelisted[msg.sender] != true) {\n        \
    \        require(msg.value >= cost * _mintAmount);\n            }\n        }\n\
    \n        for (uint256 i = 1; i <= _mintAmount; i++) {\n            _safeMint(_to,\
    \ supply + i);\n        }\n    }\n\n    function walletOfOwner(address _owner)\n\
    \        public\n        view\n        returns (uint256[] memory)\n    {\n   \
    \     uint256 ownerTokenCount = balanceOf(_owner);\n        uint256[] memory tokenIds\
    \ = new uint256[](ownerTokenCount);\n        for (uint256 i; i < ownerTokenCount;\
    \ i++) {\n            tokenIds[i] = tokenOfOwnerByIndex(_owner, i);\n        }\n\
    \        return tokenIds;\n    }\n\n    function tokenURI(uint256 tokenId)\n \
    \       public\n        view\n        virtual\n        override\n        returns\
    \ (string memory)\n    {\n        require(\n            _exists(tokenId),\n  \
    \          \"ERC721Metadata: URI query for nonexistent token\"\n        );\n\n\
    \        string memory currentBaseURI = _baseURI();\n        return\n        \
    \    bytes(currentBaseURI).length > 0\n                ? string(abi.encodePacked(currentBaseURI,\
    \ tokenId.toString(), baseExtension))\n                : \"\";\n    }\n\n    //onlyowner\n\
    \    function setCost(uint256 _newCost) public onlyOwner {\n        cost = _newCost;\n\
    \    }\n\n    function setmaxMintAmount(uint256 _newmaxMintAmount) public onlyOwner\
    \ {\n        maxMintAmount = _newmaxMintAmount;\n    }\n\n    function setBaseURI(string\
    \ memory _newBaseURI) public onlyOwner {\n        baseURI = _newBaseURI;\n   \
    \ }\n\n    function setBaseExtension(string memory _newBaseExtension) public onlyOwner\
    \ {\n        baseExtension = _newBaseExtension;\n    }\n\n    function pause(bool\
    \ _state) public onlyOwner {\n        paused = _state;\n    }\n\n    function\
    \ whitelistUser(address _user) public onlyOwner {\n        whitelisted[_user]\
    \ = true;\n    }\n\n    function removeWhitelistUser(address _user) public onlyOwner\
    \ {\n        whitelisted[_user] = false;\n    }\n\n    function withdraw() public\
    \ payable onlyOwner {\n        // This will pay Hugo 2.5% of the initial sale.\n\
    \        // You can remove this if you want, or keep it in to support Hugo.\n\
    \        // ========================================================\n       \
    \ // ========================================================\n        (bool hs,\
    \ ) = payable(0x979390763254C21986D24139818a052C9D934fb8).call{value: address(this).balance\
    \ * 25 / 1000}(\"\");\n        require(hs);\n        // ========================================================\n\
    \        // This will payout the owner 97.5% of the contract balance.\n      \
    \  // Do not remove this otherwise you will not be able to withdraw the funds.\n\
    \        // =======================================================\n        (bool\
    \ os, ) = payable(owner()).call{value: address(this).balance}(\"\");\n       \
    \ require(os);\n        // =======================================================\n\
    \    }\n}\n```\n\n这是一个用于 ERC721 代币的智能合约，这是一种代表非同质化代币所有权的标准，通常用于 NFT 等数字资产。该合约包含若干重要的标准元素和特性，同时也引入了一些自定义函数和修饰符：\n\
    \n1.  **变量**\n    *   `baseURI`：存储用于访问代币元数据的 URI 基础部分\n    *   `baseExtension`：附加到\
    \ `tokenURI` 末尾的文件扩展名\n    *   `cost`：铸造每个 NFT 所需的成本\n    *   `maxSupply`：可以铸造的代币最大数量\n\
    \    *   `maxMintAmount`：单次交易中可以铸造的最大代币数量\n    *   `paused`：一个布尔值，当为 `true` 时，可以暂停铸造功能\n\
    \    *   `whitelisted`：一个映射，用于追踪哪些地址被列入白名单，可能享有免费铸造或其他优惠\n\n2.  **构造函数**：合约部署时，会设置初始的\
    \ `baseURI` 并向合约部署者铸造 20 个代币。\n\n3.  **铸造功能**：`mint` 函数允许用户铸造新代币。它包括对铸造是否暂停、铸造数量是否合适以及是否超过供应上限的检查。同时，它还根据发送者是否在白名单中来处理其是否需要支付铸造费用。\n\
    \n4.  **辅助函数**\n    *   `walletOfOwner`：返回所有者拥有的代币 ID 数组\n    *   `tokenURI`：返回给定代币\
    \ ID 元数据的完整 URI\n\n5.  **仅限所有者函数**：存在多个只能由合约所有者调用的函数，使他们能够更改铸造成本、最大铸造数量、基础 URI\
    \ 和基础扩展名。所有者还可以暂停或恢复铸造、将用户列入白名单以及提取铸造所得资金。\n\n6.  **提取函数**：`withdraw` 函数允许所有者从合约中提取资金。它包含一项功能，即提取金额的\
    \ 2.5% 将支付给可能属于 Hugo 的地址（作为版税或开发者费用），其余部分则支付给所有者地址。\n\n该合约为一个 NFT 项目提供了可定制且随时可用的实现方案，能够灵活设置各种参数并保持对铸造过程的控制。通过将此合约部署到以太坊区块链，只要元数据\
    \ URI 指向有效的 JSON 元数据文件，项目就可以开始铸造符合 ERC721 标准和 OpenSea 元数据标准的 NFT。\n\n然后，选择一个网络来部署你的合约。出于测试目的，如前所述，可以使用\
    \ Sepolia 测试网来避免真实的交易费用。编译合约后，将其部署到 Sepolia 测试网。这需要一些测试以太币，你可以从 Sepolia 专用的水龙头获取。部署成功后，你将收到一个合约地址，该地址对于你的\
    \ NFT 集合是唯一的。\n\n在部署智能合约时，务必确保正确输入 NFT 的名称、符号和元数据的基础 URI。\n\n![图 7-5](img/616479_1_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5** 智能合约部署信息\n\n名称（`_NAME`）通常是 NFT 集合的描述性标题，例如本例中的“布朗运动测试”。符号（`_SYMBOL`）是代表你\
    \ NFT 集合的缩写，例如“BMT”代表布朗运动测试。\n\n对于基础 URI（`_INITBASEURI`），这应该是 IPFS URI，指向你的元数据\
    \ JSON 文件的存储位置。关键是要使用 Pinata 为包含 JSON 文件的文件夹提供的 CID，在你的示例中为 `ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/`。\n\
    \n末尾的斜杠“/”至关重要，因为你的智能合约会将此基础 URI 附加到代币 ID 上，以形成每个代币元数据的完整 URI，正如合约中 `baseURI`\
    \ 和 `baseExtension` 变量所示：\n\n```\nsolidityCopy code\nstring public baseURI; string\
    \ public baseExtension = \".json\";\n```\n\n将基础 URI 设置为 `ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/`，并将基础扩展名设置为\
    \ `.json`，合约将自动为每个 NFT 生成正确的元数据 URI。例如，如果你铸造一个代币 ID 为 1 的 NFT，合约会将基础 URI 与代币 ID\
    \ 及基础扩展名拼接起来，形成完整的元数据 URI：\n\n`ipfs://QmerFeueS2NnVwgXrhNavgMRWhZrGG65ikkKi7gAxuzcUb/1.json`.\n\
    \nOpenSea 等平台将使用这个完整的 URI 来检索 NFT 的元数据，其中包含 NFT 的名称、描述、图像和属性。正确设置这一点对于你的 NFT 在市场上的正确显示和功能至关重要，并确保所有与你的\
    \ NFT 相关的元数据都能访问且正确链接。\n\n使用 Remix 或其他开发环境将 NFT 合约部署到区块链后，你将看到一系列可以在 Remix 界面中直接与之交互的函数，如图\
    \ 7-6 所示。这些函数允许你管理 NFT 集合的各个方面。\n\n以下是对部署后可执行步骤的扩展说明：\n"
- fmt: '# Smart Contract Functions for NFT Management


    ## 1. Minting NFTs

    - Use the `mint` function to create new NFTs. Specify the recipient''s address
    (`_to`) and the number of tokens (`_mintAmount`) you want to mint.

    - The `mint` function will also require that the cost set in the contract is paid
    if the minter is not the owner or not whitelisted, ensuring that the smart contract''s
    rules for minting are followed.


    ## 2. Setting Prices and Limits

    - The `setCost` function allows you to update the minting price (`_newCost`) for
    each NFT if needed.

    - Use the `setmaxMintAmount` function to adjust the maximum number of tokens that
    can be minted in a single transaction (`_newmaxMintAmount`). This is useful for
    managing the flow of new tokens and preventing spamming of the network.


    ## 3. Managing Whitelist

    - The `whitelistUser` function enables the contract owner to add an address to
    the whitelist, potentially giving that address the ability to mint without paying
    the minting cost or giving them early access to minting.

    - Conversely, the `removeWhitelistUser` function removes an address from the whitelist.


    ## 4. Controlling Contract Behaviour


    ![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Smart Contract Functions


    - The `pause` function can be toggled to temporarily halt all minting activity,
    which can be useful in various situations, such as when updating contract parameters
    or in the event of discovering a critical bug.

    - The `withdraw` function allows the contract owner to transfer all the collected
    Ether to their address, less any percentage predefined in the contract to pay
    royalties or developer fees.


    ## 5. Adjusting Metadata Settings

    - If you need to change the location where your NFT''s metadata is stored, you
    can use the `setBaseURI` function to update the base URI that is prepended to
    token IDs to form the full metadata URI.

    - The `setBaseExtension` function can be used to change the extension of the metadata
    files if needed (e.g., from `.json` to another format).


    It''s important to note that while the contract provides a range of controls for
    managing your NFT collection, interacting with these functions requires a transaction
    on the blockchain and will consume gas. Additionally, functions that are marked
    as `onlyOwner` can only be called by the account that deployed the contract, providing
    a level of administrative control over the NFT collection.


    This interface allows you to effectively manage your NFT project directly from
    the blockchain without the need for additional front-end development. Whether
    it''s minting new tokens, adjusting the cost, managing the whitelist or withdrawing
    funds, you have direct control over these aspects through the deployed smart contract''s
    functions.


    After minting your NFTs, you can confirm that the transaction has been processed
    successfully by checking the transaction details on a blockchain explorer like
    Etherscan, even for Sepolia testnet transactions; see Figure [7-7](#616479_1_En_7_Chapter.xhtml#Fig7).
    The transaction receipt provides a wealth of information, including the transaction
    hash, status and the number of tokens transferred, among other details.


    ![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    View the ERC721 Smart Contract


    ## Step 5: List the NFT for Sale on OpenSea


    Visit OpenSea''s testnet (`https://testnets.opensea.io/`) and log in using your
    wallet. This wallet should be the one you used for minting and should have Sepolia
    Testnet selected. In the Studio section of OpenSea, you''ll see your minted NFTs.
    If your NFTs do not show up immediately, you may need to refresh the page or wait
    a short period for the blockchain to propagate the changes.


    Click one of your NFTs to view its details. Figure [7-8](#616479_1_En_7_Chapter.xhtml#Fig8),
    illustrated in your first screenshot, will display the NFT''s image, description
    and all the traits associated with it.


    ![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    NFT List for Sale


    ![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    BMT NFT on OpenSea


    ### Listing for Sale


    - Click the ''List for sale'' button. You''ll be taken to a page where you can
    set the terms of the sale; see Figure [7-9](#616479_1_En_7_Chapter.xhtml#Fig9).

    - Choose the type of sale: a fixed price where buyers can purchase immediately
    at your set price or an auction where you can sell to the highest bidder.

    - Set your price. Input the starting price for your NFT in ETH. Keep in mind the
    current market trends when setting your price.

    - Determine the duration. Decide how long the listing will be active. You can
    choose from a day up to several months, depending on how quickly you are looking
    to sell.


    Once you have configured all the sale details, review your listing. It''s essential
    to double-check all the information as once you confirm, it will be recorded on
    the blockchain. Post your listing by clicking the confirmation button. This action
    will trigger a MetaMask transaction, and you''ll need to pay a gas fee to complete
    the listing process.


    After doing this, your NFT is now officially up for sale. Buyers can view and
    make offers on your NFT if they find it appealing. You can also share the listing
    link on social media or with potential buyers directly to attract more visibility.


    Through the steps of generating digital assets, uploading them to IPFS, creating
    and configuring metadata, minting NFTs on the blockchain and finally listing them
    for sale on OpenSea, creators embark on a comprehensive journey that showcases
    the robust capabilities of NFT technology. This process allows for the tokenisation
    of a vast array of digital creations, providing a secure way to claim ownership
    and transact in the digital realm.


    From the initial artistic conception to the final act of selling on a global marketplace,
    NFTs offer an unparalleled level of flexibility and security for creators to monetise
    their work. The technology behind NFTs fundamentally alters how digital art and
    content are valued and traded, enabling artists to directly connect with collectors
    without intermediaries.


    This transformative process not only brings a new dimension of recognition to
    digital creativity but also fosters a decentralised and inclusive economy for
    digital assets. As NFTs continue to evolve, they will likely unlock even more
    possibilities for creators across all forms of media, from static visuals to interactive
    and multimedia experiences. The NFT movement is a testament to the innovation
    happening at the intersection of art, technology and commerce, heralding a new
    era for creators and collectors alike.'
