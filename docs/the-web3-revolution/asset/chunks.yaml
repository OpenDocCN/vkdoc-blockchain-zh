    owner = msg.sender;\n}\nfunction addPerson(string memory _firstName, string memory\
    \ _lastName) public onlyOwner{\nincrementCount();\npeople[peopleCount] = Person(peopleCount,\
    \ _firstName, _lastName);\n}\nfunction incrementCount() internal {\npeopleCount\
    \ += 1;\n}\n}\nListing 3-5\nSmart Contract Example – 5\n```\n\nLet’s break down\
    \ its key components, especially focusing on the **onlyOwner** modifier:\n\n1.\
    \  **State Variables and Structure**\n    *   The contract initialises a public\
    \ state variable **peopleCount** to 0, which tracks the number of people added.\n\
    \n*   It employs a mapping **people** to associate an unsigned integer (uint)\
    \ with a **Person** structure, facilitating the storage and retrieval of person\
    \ data.\n\n*   The **Person** structure is defined with properties **_id**, **_firstName**\
    \ and **_lastName**, allowing grouping of related information about a person.\n\
    \n2.  **Ownership and Access Control (onlyOwner Modifier)**\n    *   A significant\
    \ feature of this contract is the **onlyOwner** modifier. It’s designed to restrict\
    \ certain functionalities to the owner of the contract.\n\n*   The contract declares\
    \ an **address** variable named **owner**. In Ethereum, addresses are used to\
    \ identify accounts, which can be external users or other contracts.\n\n*   The\
    \ **onlyOwner** modifier uses the **require** statement to ensure that the **msg.sender**\
    \ (the address calling the function) is equal to **owner**. This guarantees that\
    \ only the user who deployed the contract (the owner) can call functions that\
    \ are protected by this modifier.\n\n*   The **_;** in the modifier represents\
    \ the placeholder for the function body that the modifier is applied to.\n\n3.\
    \  **Contract Constructor**\n    *   In the contract’s constructor, **owner**\
    \ is set to **msg.sender**, meaning the address deploying the contract is recorded\
    \ as the owner.\n\n4.  **Function to Add Person (addPerson)**\n    *   The **addPerson**\
    \ function is used to add new people with their first and last names to the contract.\
    \ This function is governed by the **onlyOwner** modifier, meaning only the owner\
    \ of the contract can add new people.\n\n*   The function increments **peopleCount**\
    \ and adds a new **Person** to the **people** mapping.\n\n5.  **Internal Function\
    \ to Increment Count**\n    *   There’s also an internal function **incrementCount**\
    \ which simply increases the **peopleCount** by one. Being internal, this function\
    \ can only be called from within the contract.\n\nThe **onlyOwner** modifier is\
    \ a common pattern in smart contracts for ensuring that sensitive functions can\
    \ only be executed by the contract’s owner, adding a layer of security and control.\n\
    \nListing [3-6](#616479_1_En_3_Chapter.xhtml#PC6) is a more complex example than\
    \ Listing [3-5](#616479_1_En_3_Chapter.xhtml#PC5) that illustrates the use of\
    \ a time-based modifier, a mapping and a structure. It is designed to manage a\
    \ list of people with a constraint on when certain operations can be performed.\n\
    \n```\npragma solidity ^0.5.1;\ncontract AddPerson{\nuint256 public peopleCount\
    \ = 0;\nmapping(uint => Person) public people;\nuint256 openingTime = 1704067200;\n\
    modifier onlyWhileOpen() {\nrequire(block.timestamp >= openingTime);\n_;\n}\n\
    struct Person{\nuint _id;\nstring _firstName;\nstring _lastName;\n}\nfunction\
    \ addPerson(string memory _firstName, string memory _lastName) public onlyWhileOpen{\n\
    incrementCount();\npeople[peopleCount] = Person(peopleCount, _firstName, _lastName);\n\
    }\nfunction incrementCount() internal {\npeopleCount += 1;\n}\n}\nListing 3-6\n\
    Smart Contract Example – 6\n```\n\nThis contract is an example of how smart contracts\
    \ can integrate time-based logic and manage a collection of structured data. The\
    \ use of the **openingTime** variable along with the **onlyWhileOpen** modifier\
    \ showcases a common pattern where certain functionalities of a contract are restricted\
    \ until a predefined condition, like a specific time or date, is met. This pattern\
    \ is useful in scenarios like timed events, restricted access periods or phased\
    \ contract functionalities.\n\nHere’s the main differences between Listings [3-5](#616479_1_En_3_Chapter.xhtml#PC5)\
    \ and [3-6](#616479_1_En_3_Chapter.xhtml#PC6):\n\n**Time-Based Modifier** **(openingTime)**\n\
    \n*   The contract includes a state variable **uint256 openingTime = 1704067200;**.\
    \ This value represents a specific point in time as a Unix timestamp. The specific\
    \ value **1704067200** corresponds to seconds since 1 January, 2024.\n\n*   A\
    \ modifier **onlyWhileOpen** is defined using this timestamp. It uses the **require**\
    \ statement to ensure that the current block’s timestamp (**block.timestamp**,\
    \ which gives the current time in Unix timestamp format) is greater than or equal\
    \ to **openingTime**. This means that the functions using this modifier can only\
    \ be executed after the time specified by **openingTime**.\n\n## 3.5 ERC Standards:\
    \ ERC20, ERC721, ERC1155\n\nIn this section, we will focus exclusively on the\
    \ types of smart contracts in the realm of Ethereum blockchain, particularly delving\
    \ into token standards. We reserve a more in-depth discussion of the legal attributes\
    \ of tokens for Part 3, ‘Decentralised Finance (DeFi) and Applications’. Here,\
    \ our attention is on the technical token standards."
  trans: "#### 枚举声明\n合约首先声明了一个枚举类型 `State`，其中包含三种可能的状态：`Waiting`、`Ready` 和 `Active`。枚举是\
    \ Solidity 中的用户自定义类型，允许创建一组命名常量，从而提高代码的可读性和可维护性。\n\n#### 状态变量\n随后，合约声明了一个 `State`\
    \ 类型的公有状态变量。将该变量的可见性设置为 `public`，意味着 Solidity 会自动为其生成一个 getter 函数，允许外部合约或接口查询合约的当前状态。\n\
    \n#### 构造函数\n合约包含一个构造函数，这是一个在合约部署时仅执行一次的特殊函数。在该构造函数中，状态变量被初始化为 `State.Waiting`。这确保了合约在部署到以太坊区块链时，其初始状态为\
    \ `Waiting`。\n\n#### 状态变更函数\n合约中有一个 `activate()` 函数，调用该函数会将合约状态更改为 `Active`。这演示了如何通过函数来操控合约状态。\n\
    \n#### 状态查询函数\n最后，合约包含一个 `isActive()` 函数，该函数返回一个布尔值，指示合约的当前状态是否为 `Active`。此函数是一个\
    \ `view` 函数，意味着它不修改合约状态，仅读取并返回信息。\n\n总体而言，该合约展示了在 Solidity 中使用枚举来管理和查询合约状态的范例，体现了以太坊智能合约中一种常见模式：合约状态根据与其内部定义函数的交互而发生变化。这种模式在许多去中心化应用中至关重要，因为合约的状态通常决定了应执行的逻辑。\n\
    \n代码清单 3-5 包含了状态管理、访问控制和结构化数据处理的组合。它提供了一个实际示例，展示了以太坊区块链上的智能合约如何利用访问控制机制将特定操作限制给特定用户。\n\
    \n```\npragma solidity ⁰.5.1;\ncontract AddPerson{\nuint256 public peopleCount\
    \ = 0;\nmapping(uint => Person) public people;\naddress owner;\nmodifier onlyOwner()\
    \ {\nrequire(msg.sender == owner);\n_;\n}\nstruct Person{\nuint _id;\nstring _firstName;\n\
    string _lastName;\n}\nconstructor() public {\nowner = msg.sender;\n}\nfunction\
    \ addPerson(string memory _firstName, string memory _lastName) public onlyOwner{\n\
    incrementCount();\npeople[peopleCount] = Person(peopleCount, _firstName, _lastName);\n\
    }\nfunction incrementCount() internal {\npeopleCount += 1;\n}\n}\n代码清单 3-5\n智能合约示例\
    \ – 5\n```\n\n我们来解析一下其关键组成部分，尤其关注 `onlyOwner` 修饰器：\n\n1.  **状态变量与结构体**\n    *\
    \   合约将公有状态变量 `peopleCount` 初始化为 0，用于跟踪已添加的人数。\n    *   它使用了一个映射 `people`，将无符号整数（`uint`）与\
    \ `Person` 结构体关联起来，便于人员数据的存储与检索。\n    *   `Person` 结构体定义了属性 `_id`、`_firstName`\
    \ 和 `_lastName`，用于对相关人员信息进行分组。\n\n2.  **所有权与访问控制（`onlyOwner` 修饰器）**\n    *   该合约的一个显著特点是\
    \ `onlyOwner` 修饰器。它旨在将某些功能限制为仅合约所有者可用。\n    *   合约声明了一个名为 `owner` 的 `address`\
    \ 类型变量。在以太坊中，地址用于标识账户，这些账户可以是外部用户或其他合约。\n    *   `onlyOwner` 修饰器使用 `require` 语句来确保\
    \ `msg.sender`（调用函数的地址）等于 `owner`。这保证了只有部署合约的用户（即所有者）才能调用受此修饰器保护的函数。\n    *  \
    \ 修饰器中的 `_;` 代表应用该修饰器的函数体的占位符。\n\n3.  **合约构造函数**\n    *   在合约的构造函数中，`owner` 被设置为\
    \ `msg.sender`，这意味着部署合约的地址被记录为所有者。\n\n4.  **添加人员函数（`addPerson()`）**\n    *   `addPerson()`\
    \ 函数用于向合约中添加新人员及其名和姓。该函数受 `onlyOwner` 修饰器约束，意味着只有合约所有者才能添加新人员。\n    *   该函数会递增\
    \ `peopleCount`，并向 `people` 映射中添加一个新的 `Person`。\n\n5.  **用于递增计数的内部函数**\n    *\
    \   还有一个内部函数 `incrementCount()`，它仅将 `peopleCount` 增加 1。作为内部函数，它只能从合约内部调用。\n\n\
    `onlyOwner` 修饰器是智能合约中的一种常见模式，用于确保敏感函数只能由合约所有者执行，从而增加一层安全性和控制。\n\n代码清单 3-6 是一个比代码清单\
    \ 3-5 更复杂的示例，展示了基于时间的修饰器、映射和结构体的使用。它旨在管理一个人员列表，并对特定操作的可执行时间施加约束。\n\n```\npragma\
    \ solidity ⁰.5.1;\ncontract AddPerson{\nuint256 public peopleCount = 0;\nmapping(uint\
    \ => Person) public people;\nuint256 openingTime = 1704067200;\nmodifier onlyWhileOpen()\
    \ {\nrequire(block.timestamp >= openingTime);\n_;\n}\nstruct Person{\nuint _id;\n\
    string _firstName;\nstring _lastName;\n}\nfunction addPerson(string memory _firstName,\
    \ string memory _lastName) public onlyWhileOpen{\nincrementCount();\npeople[peopleCount]\
    \ = Person(peopleCount, _firstName, _lastName);\n}\nfunction incrementCount()\
    \ internal {\npeopleCount += 1;\n}\n}\n代码清单 3-6\n智能合约示例 – 6\n```\n\n该合约是智能合约如何集成基于时间的逻辑并管理结构化数据集合的一个示例。`openingTime`\
    \ 变量与 `onlyWhileOpen` 修饰器的结合使用，展示了一种常见模式：合约的某些功能在预定义条件（如特定时间或日期）满足之前受到限制。这种模式在定时事件、受限访问时段或分阶段合约功能等场景中非常有用。\n\
    \n以下是代码清单 3-5 和 3-6 之间的主要区别：\n\n**基于时间的修饰器（`openingTime`）**\n*   合约包含一个状态变量 `uint256\
    \ openingTime = 1704067200;`。该值以 Unix 时间戳的形式代表一个特定的时间点。具体值 `1704067200` 对应于自 2024\
    \ 年 1 月 1 日以来的秒数。\n*   使用此时间戳定义了一个修饰器 `onlyWhileOpen`。它使用 `require` 语句来确保当前区块的时间戳（`block.timestamp`，以\
    \ Unix 时间戳格式提供当前时间）大于或等于 `openingTime`。这意味着使用此修饰器的函数只能在 `openingTime` 指定的时间之后执行。\n\
    \n## 3.5 ERC 标准：ERC20、ERC721、ERC1155\n\n在本节中，我们将专门关注以太坊区块链领域中智能合约的类型，特别是深入探讨代币标准。我们将关于代币法律属性的更深入讨论保留到第\
    \ 3 部分“去中心化金融（DeFi）与应用”。在此，我们的重点是技术性的代币标准。"
- fmt: "### A Brief Overview of ERC Standards\n\nTokens on the blockchain represent\
    \ various entities like money, time, services or even virtual items. By tokenising\
    \ these entities, smart contracts can interact, exchange or modify them. Understanding\
    \ tokens requires distinguishing between token contracts and the actual tokens.\
    \ Token contracts are Ethereum smart contracts that map addresses to balances,\
    \ allowing for the addition and subtraction of these balances.\n\n`ERC`, which\
    \ stands for Ethereum Request for Comment, is a protocol or standard that Ethereum\
    \ developers agree to follow while creating smart contracts. These standards ensure\
    \ interoperability and reusability in smart contract coding.[⁷](#616479_1_En_3_Chapter.xhtml#Sec16)\n\
    \n#### `ERC20` Standard\n\nIntroduced in 2015 and adopted in 2017, the `ERC20`\
    \ standard is used for creating fungible tokens, meaning each token is identical\
    \ and interchangeable with another. It’s widely used for various purposes like\
    \ stablecoins, ICOs, crowdfunding and other related activities. `ERC20` tokens,\
    \ such as Tether (`USDT`), Chainlink (`LINK`) and Basic Attention Token (`BAT`),\
    \ have set functionalities allowing them to interact with each other and compatible\
    \ services like cryptocurrency wallets.\n\nHere is an example of an `ERC20` token\
    \ contract:\n\n```solidity\n// contracts/HGToken.sol\n// SPDX-License-Identifier:\
    \ MIT\npragma solidity ^0.8.0;\nimport \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
    ;\ncontract HGToken is ERC20 {\nconstructor(uint256 initialSupply) ERC20(\"HGToken\"\
    , \"HGT\") {\n_mint(msg.sender, initialSupply);\n}\n}\n```\n\nLet’s break down\
    \ its components:\n\n1.  **SPDX License Identifier and Solidity Version**\n\n\
    \    ```solidity\n    // SPDX-License-Identifier: MIT\n    pragma solidity ^0.8.0;\n\
    \    ```\n\n    These lines specify the license (`MIT` in this case) and the Solidity\
    \ compiler version (`^0.8.0`), indicating the contract is compatible with Solidity\
    \ version `0.8.0` or any minor version above it.\n\n2.  **Import Statement**\n\
    \n    ```solidity\n    import \"@openzeppelin/contracts/token/ERC20/ERC20.sol\"\
    ;\n    ```\n\n    This line imports the `ERC20` token standard implementation\
    \ from the OpenZeppelin library. OpenZeppelin is a widely used and trusted library\
    \ in the Ethereum developer community that provides secure, standardised and audited\
    \ smart contract implementations. The `ERC20.sol` contract from OpenZeppelin includes\
    \ the basic functionalities of an `ERC20` token, such as transferring tokens,\
    \ getting account balances, the total supply of tokens and allowances (how many\
    \ tokens one account allows another to spend on its behalf).\n\n3.  **Contract\
    \ Declaration**\n\n    ```solidity\n    contract HGToken is ERC20 {\n    ```\n\
    \n    Here, a new smart contract named `HGToken` is declared, which extends the\
    \ `ERC20` token implementation from OpenZeppelin. This means `HGToken` inherits\
    \ all functionalities of a standard `ERC20` token.\n\n4.  **Constructor**\n\n\
    \    ```solidity\n    constructor(uint256 initialSupply) ERC20(\"HGToken\", \"\
    HGT\") { _mint(msg.sender, initialSupply); }\n    ```\n\n    The constructor is\
    \ executed once when the contract is deployed. It takes an initial supply of tokens\
    \ as a parameter. The `ERC20(\"HGToken\", \"HGT\")` part is calling the constructor\
    \ of the imported `ERC20` contract, setting the name of the token to `HGToken`\
    \ and its symbol to `HGT`. The `_mint` function is then called to create the initial\
    \ supply of tokens and assign them to the address deploying the contract (`msg.sender`).\n\
    \nIn summary, this contract is a basic `ERC20` token with an initial supply set\
    \ at deployment. It uses OpenZeppelin’s secure and standard implementation of\
    \ the `ERC20` protocol, ensuring compliance with the token standard and reducing\
    \ the risk of vulnerabilities in the token’s code.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9\n\nDeploy `ERC20.sol`\n\nFigure [3-9](#616479_1_En_3_Chapter.xhtml#Fig9)\
    \ shows the deployment of an `ERC20` token smart contract. Several elements are\
    \ highlighted, particularly within a red box. Let’s break down the elements inside\
    \ the red box and the process of deploying this smart contract:\n\n1.  `HGToken`\
    \ - `contracts/ERC20.sol`: This indicates the smart contract `HGToken` is ready\
    \ to be deployed. The contract is likely located in a file named `ERC20.sol` within\
    \ a folder or path called `contracts`. This contract is an `ERC20` token, which\
    \ is a standard for creating fungible tokens on the Ethereum blockchain.\n\n2.\
    \  `DEPLOY`: This section is where you input the initial parameters required by\
    \ the smart contract’s constructor function before deploying it to the blockchain.\n\
    \n3.  `INITIALSUPPLY`: This input field is for the `initialSupply` parameter of\
    \ the `HGToken` contract’s constructor. This value determines the total supply\
    \ of tokens that will be minted upon deployment."
