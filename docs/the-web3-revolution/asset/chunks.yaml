- fmt: '## 2.3 The Challenges of Bitcoin: Security Concerns, Wallet Storage and the
    Issue of Scaling


    ### 51% Attacks: A Theoretical Threat to Bitcoin''s Integrity


    The concept of a 51% attack in the context of Bitcoin and cryptocurrency networks
    is a significant concern, though it remains largely theoretical for more established
    networks like Bitcoin. This type of attack occurs when a single entity or group
    gains control of more than 50% of a network''s mining power. With such control,
    they could potentially double-spend coins, prevent the confirmation of certain
    transactions and monopolise the creation of new blocks.


    In the Bitcoin network, executing a 51% attack is extremely challenging, primarily
    due to the network''s vast and distributed mining power. The substantial computational
    resources and the associated financial cost required to gain such control make
    this type of attack impractical and unfeasible. Moreover, succeeding in a 51%
    attack would likely lead to a loss of trust in the network and a consequent drop
    in Bitcoin''s value, ultimately harming the attacker''s interests.


    However, other cryptocurrencies, particularly newer or less established ones,
    have been vulnerable to this type of attack. For instance, Bitcoin Gold (BTG),
    a hard fork of Bitcoin, experienced a 51% attack. This attack led to significant
    double-spending of approximately $70,000 worth of BTG. In January 2020, the BTG
    blockchain was hit by two deep reorganisations of over ten blocks, resulting in
    two separate incidents of 51% attacks within six hours. In these attacks, blocks
    were removed and new ones were added to facilitate double-spending of thousands
    of BTG, highlighting the vulnerability of smaller networks to such threats​​.[⁵](#616479_1_En_2_Chapter.xhtml#Sec17)


    These incidents underscore the importance of robust and decentralised mining networks
    for maintaining the security and integrity of blockchain systems. While Bitcoin
    itself has remained secure from such attacks, the Bitcoin Gold incidents serve
    as a reminder of the potential risks associated with blockchain and cryptocurrency
    networks.


    ### Block Size Debate and Bitcoin Forks: The Scaling Challenge


    The Bitcoin ''Blocksize War'' from 2015 to 2017 was a pivotal period debating
    the blockchain''s block size, crucial for transaction capacity and scalability.
    Originally capped at 1 MB by Satoshi Nakamoto, the block size limited the network''s
    throughput. The community was divided into ''small blockers'', prioritising decentralisation
    and the ability for individuals to run nodes, and ''big blockers'', pushing for
    larger blocks to reduce costs and enhance Bitcoin as a payment system.[⁶](#616479_1_En_2_Chapter.xhtml#Sec17)


    The debate saw several solutions: Bitcoin XT proposed progressive block size increases,
    while SegWit, a compatible restructuring of block data, offered more transactions
    within the original limit and enabled the Lightning Network for off-chain transactions,
    promoting scalability. Although forks like Bitcoin XT didn''t prevail, they led
    to the creation of Bitcoin Cash (BCH) and Bitcoin SV (BSV), which adopted larger
    blocks. SegWit and the Lightning Network''s successful implementation were milestones
    in Bitcoin''s evolution, balancing scalability with the ideals of the original
    block size debate.


    ### Diverse Wallet Types


    Bitcoin wallets are diverse, each tailored with distinct features and potential
    risks. Explore their nuances in Table [2-3](#616479_1_En_2_Chapter.xhtml#Tab3).[⁷](#616479_1_En_2_Chapter.xhtml#Sec17)


    **Table 2-3 Diverse Wallet Types with Their Challenges**


    | | Software (Hot) Wallets | Paper Wallets | Web Wallets | Brain Wallets | Hardware
    (Cold) Wallets |

    |---|---|---|---|---|---|

    | **Functionality** | Installed on personal computers, they offer control and
    access to private keys. | Physical documents containing private and public keys.
    They offer a high level of security by being completely offline. | Operated by
    third parties, they provide easy access and convenience for transactions. | Seed
    phrases memorised or written down by the user, with no physical or digital trace.
    | Similar to a USB, they store private keys offline and are accessible only through
    physical contact. |

    | **Challenges** | Vulnerable to malware and hacking. Loss of data due to hardware
    failure can result in permanent loss of Bitcoins. | Risk of physical damage or
    loss. Transferring Bitcoin back online can expose the wallet to online vulnerabilities.
    | Dependence on the security measures of the third party. Risk of hacking and
    theft. | Risk of forgetting the phrase or incapacity of the user, leading to permanent
    loss of access to the Bitcoins. | Risks include loss of the device, forgetting
    the PIN or damage to the hardware. |


    The evolution of Bitcoin involves navigating through various security and scalability
    challenges. The diversity in wallet types offers users a range of choices for
    storing their Bitcoins, each with its unique set of challenges. Meanwhile, the
    block size debate and potential security threats like 51% attacks highlight the
    ongoing need for development and adaptation in the Bitcoin ecosystem. These factors
    play a crucial role in shaping the future trajectory of Bitcoin as it continues
    to mature and evolve.'
