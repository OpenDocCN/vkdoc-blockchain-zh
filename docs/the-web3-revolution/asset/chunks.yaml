  raw: '### Step 1: Generate a Random Image with Python


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    from matplotlib import cm

    import random

    import json

    import time

    # Number of images to generate

    m = 20

    # Generate n steps for Brownian motion

    n = 8888

    # Define colormap options

    colormap = [plt.cm.binary, plt.cm.gist_yarg, plt.cm.gist_gray, plt.cm.gray,

    plt.cm.bone, plt.cm.pink, plt.cm.spring, plt.cm.summer, plt.cm.autumn,

    plt.cm.winter, plt.cm.cool, plt.cm.Wistia, plt.cm.hot, plt.cm.afmhot,

    plt.cm.gist_heat, plt.cm.copper]

    # Define color names for metadata

    color_names = [''binary'', ''gist_yarg'', ''gist_gray'', ''gray'', ''bone'', ''pink'',
    ''spring'', ''summer'', ''autumn'', ''winter'', ''cool'', ''Wistia'', ''hot'',
    ''afmhot'', ''gist_heat'', ''copper'']

    metadata = {}

    for i in range(m):

    x = np.cumsum(np.random.randn(n))

    y = np.cumsum(np.random.randn(n))

    k = 10  # Interpolation factor

    x2 = np.interp(np.arange(n * k), np.arange(n) * k, x)

    y2 = np.interp(np.arange(n * k), np.arange(n) * k, y)

    fig, ax = plt.subplots(figsize=(8, 8))

    cmap_idx = random.randint(0, len(color_names) - 1)

    ax.scatter(x2, y2, c=range(n * k), linewidths=0, marker=''o'', s=3, cmap=colormap[cmap_idx])

    ax.axis(''equal'')

    ax.set_axis_off()

    plt.savefig(f''BMTEST_IMAGE/{i+1}.png'')

    metadata[i] = {

    ''name'': f''#{i+1}'',

    ''description'': ''This is just a Brownian Motion Simulation Game.'',

    ''edition'': i + 1,

    ''date'': time.time(),

    ''attributes'': [

    {''trait_type'': ''X Starting Point'', ''value'': f''{x2[0]:.2f}''},

    {''trait_type'': ''X Ending Point'', ''value'': f''{x2[-1]:.2f}''},

    {''trait_type'': ''Y Starting Point'', ''value'': f''{y2[0]:.2f}''},

    {''trait_type'': ''Y Ending Point'', ''value'': f''{y2[-1]:.2f}''},

    {''trait_type'': ''Color'', ''value'': color_names[cmap_idx]}

    ],

    ''compiler'': ''Hugo''

    }

    ```


    Before running the provided code, it’s crucial to ensure that a folder named ‘BMTEST_IMAGE’
    has already been created in the working directory. This preparation step is essential
    because the generated images will be saved in this folder before being uploaded
    to IPFS. The purpose of uploading images to IPFS is to ensure they are stored
    on a decentralised network, which aligns with the ethos of blockchain and NFTs,
    providing permanence and integrity for the digital assets.


    The variable **m** in the script denotes the number of images (and consequently,
    NFTs) you intend to generate. While this example generates 20 images, it’s common
    in the NFT space to create collections of 10,000 or 20,000 items to ensure a sufficiently
    large pool for community tokens. Such large collections help in fostering a sense
    of exclusivity and belonging among holders. However, for demonstration purposes
    and simplicity, this script is set to produce 20 unique images.


    The variable **n** is set to dictate the complexity and uniqueness of the Brownian
    motion paths generated for each image. This parameter ensures that each resulting
    image, although not necessarily artistic in a traditional sense, exhibits distinct
    patterns that underscore the uniqueness critical to NFTs. This uniqueness is pivotal
    in demonstrating how even simple algorithmic processes can produce varied outcomes,
    enabling readers to generate distinct images for their experimentation with NFT
    creation.


    The script incorporates the creation of five traits for each NFT, which are


    1.  **X Starting Point**: The initial x-coordinate of the Brownian path, adding
    spatial uniqueness.


    2.  **X Ending Point**: The final x-coordinate of the Brownian path, further contributing
    to the image’s uniqueness.


    3.  **Y Starting Point**: The initial y-coordinate of the path, complementing
    the x-coordinates to define the path’s origin.


    4.  **Y Ending Point**: The final y-coordinate, marking where the path concludes
    on the canvas.


    5.  **Color**: The randomly selected colour scheme used in the image, adding a
    visual trait that distinguishes each NFT.


    These traits are stored in a metadata list for each generated image, capturing
    essential attributes that define and differentiate each NFT. This metadata is
    critical for potential collectors, as it provides verifiable details that contribute
    to the NFT’s value and appeal. Subsequently, the information in the metadata list
    is converted into JSON files. This step is crucial for integrating the NFTs with
    blockchain and NFT marketplaces, as JSON is a widely accepted format for encoding
    NFT metadata, ensuring compatibility with platforms like OpenSea.


    OpenSea’s metadata standards allow for a rich representation of ERC721 or ERC1155
    NFTs by providing detailed information beyond the unique identifier (tokenId).
    The metadata should be structured in a JSON format and made accessible via a URI
    returned by the **tokenURI** function in ERC721 or the **uri** method in ERC1155
    contracts. This URI can point to an HTTP or IPFS URL, which, when queried, returns
    a JSON blob containing the NFT’s metadata.


    The JSON structure for NFT metadata typically includes several key properties:


    *   **image**: A URL to the image representing the NFT. It supports various image
    types and storage solutions, including IPFS and Arweave.


    *   **name**: The name of the item.


    *   **description**: A human-readable description of the item. Markdown is supported
    for formatting.


    *   **external_url**: A URL that will direct users to a page on your site for
    more details about the NFT.


    *   **attributes**: An array of properties that provide details about the item’s
    traits or characteristics.


    Your metadata can be hosted anywhere accessible via a URI, including decentralised
    storage solutions like IPFS, to align with the decentralised nature of NFTs. OpenSea
    supports IPFS and Arweave URIs directly, allowing for immutable and permanent
    hosting of metadata, ensuring that the digital asset cannot be altered once minted.


    By adhering to these metadata standards and structuring your NFT’s metadata accordingly,
    you ensure that your digital asset is represented on OpenSea in the best possible
    way. This includes showcasing high-quality images, detailed descriptions and unique
    attributes that highlight the distinctiveness of your NFT, thereby attracting
    potential buyers and collectors on the platform.


    After generating your digital assets for NFTs, an essential next step is to securely
    upload them to a storage solution. While IPFS (InterPlanetary File System) is
    a popular choice due to its decentralised nature, ensuring the permanence and
    integrity of your files, you are not limited to this option. Your digital assets
    and NFT metadata can be stored on any platform that provides a direct link to
    the files, such as Google Drive or Dropbox.


    ### Step 2: Upload the Asset to a Storage Solution


    IPFS is one of several methods you can use to store your digital assets. As a
    decentralised storage system, it distributes your files across a global network
    of nodes, ensuring that the data remains accessible and resistant to censorship.
    This is particularly advantageous for NFTs as it links your digital asset with
    a unique, immutable URI in the NFT’s metadata, confirming that the asset cannot
    be altered or removed.


    Alternatively, centralised solutions like Google Drive or Dropbox can also be
    used to store NFT data if they provide a direct URL to the files. While these
    platforms may offer convenience and user-friendly interfaces, they do not inherently
    provide the same level of decentralisation and security as IPFS. When using centralised
    services, it’s crucial to ensure that the URLs are permanent and directly accessible,
    as any changes in the URL structure could make the metadata links in your NFTs
    ineffective.'
  trans: "\n### 第一步：使用 Python 生成随机图像\n\n```\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom matplotlib import cm\nimport random\nimport json\nimport time\n\
    \n# 要生成的图像数量\nm = 20\n# 为布朗运动生成 n 步\nn = 8888\n# 定义颜色映射选项\ncolormap = [plt.cm.binary,\
    \ plt.cm.gist_yarg, plt.cm.gist_gray, plt.cm.gray,\n            plt.cm.bone, plt.cm.pink,\
    \ plt.cm.spring, plt.cm.summer, plt.cm.autumn,\n            plt.cm.winter, plt.cm.cool,\
    \ plt.cm.Wistia, plt.cm.hot, plt.cm.afmhot,\n            plt.cm.gist_heat, plt.cm.copper]\n\
    # 为元数据定义颜色名称\ncolor_names = ['binary', 'gist_yarg', 'gist_gray', 'gray', 'bone',\
    \ 'pink', 'spring', 'summer', 'autumn', 'winter', 'cool', 'Wistia', 'hot', 'afmhot',\
    \ 'gist_heat', 'copper']\nmetadata = {}\n\nfor i in range(m):\n    x = np.cumsum(np.random.randn(n))\n\
    \    y = np.cumsum(np.random.randn(n))\n    k = 10  # 插值因子\n    x2 = np.interp(np.arange(n\
    \ * k), np.arange(n) * k, x)\n    y2 = np.interp(np.arange(n * k), np.arange(n)\
    \ * k, y)\n    fig, ax = plt.subplots(figsize=(8, 8))\n    cmap_idx = random.randint(0,\
    \ len(color_names) - 1)\n    ax.scatter(x2, y2, c=range(n * k), linewidths=0,\
    \ marker='o', s=3, cmap=colormap[cmap_idx])\n    ax.axis('equal')\n    ax.set_axis_off()\n\
    \    plt.savefig(f'BMTEST_IMAGE/{i+1}.png')\n    metadata[i] = {\n        'name':\
    \ f'#{i+1}',\n        'description': '这只是一个布朗运动模拟游戏。',\n        'edition': i +\
    \ 1,\n        'date': time.time(),\n        'attributes': [\n            {'trait_type':\
    \ 'X 轴起点', 'value': f'{x2[0]:.2f}'},\n            {'trait_type': 'X 轴终点', 'value':\
    \ f'{x2[-1]:.2f}'},\n            {'trait_type': 'Y 轴起点', 'value': f'{y2[0]:.2f}'},\n\
    \            {'trait_type': 'Y 轴终点', 'value': f'{y2[-1]:.2f}'},\n            {'trait_type':\
    \ '颜色', 'value': color_names[cmap_idx]}\n        ],\n        'compiler': 'Hugo'\n\
    \    }\n```\n\n在运行提供的代码之前，务必确保工作目录中已创建名为 `BMTEST_IMAGE` 的文件夹。这一准备工作至关重要，因为生成的图像将保存到该文件夹中，然后才能上传到\
    \ IPFS。将图像上传到 IPFS 的目的是确保它们存储在去中心化网络上，这符合区块链和 NFT 的精神，为数字资产提供持久性和完整性。\n\n脚本中的变量\
    \ `m` 表示你打算生成的图像（以及相应的 NFT）数量。虽然此示例生成 20 张图像，但在 NFT 领域，通常会创建包含 10,000 或 20,000\
    \ 个项目的集合，以确保为社区代币提供足够大的池子。如此庞大的收藏有助于在持有者中培养一种排他性和归属感。然而，出于演示和简化的目的，此脚本设置为生成 20\
    \ 张独特的图像。\n\n变量 `n` 用于控制为每张图像生成的布朗运动路径的复杂性和唯一性。该参数确保每张生成的图像，即使不一定具有传统意义上的艺术性，也能展现出独特的图案，从而凸显出\
    \ NFT 至关重要的独特性。这种独特性关键地证明了即使简单的算法过程也能产生多样化的结果，使读者能够生成不同的图像来尝试创建 NFT。\n\n该脚本为每个\
    \ NFT 创建了五个特征，分别是：\n\n1.  **X 轴起点**：布朗运动路径的起始 x 坐标，增加了空间唯一性。\n2.  **X 轴终点**：布朗运动路径的最终\
    \ x 坐标，进一步增强了图像的唯一性。\n3.  **Y 轴起点**：路径的起始 y 坐标，与 x 坐标共同定义了路径的起点。\n4.  **Y 轴终点**：路径的最终\
    \ y 坐标，标记了路径在画布上的结束点。\n5.  **颜色**：图像中使用的随机颜色方案，增加了一个视觉特征来区分每个 NFT。\n\n这些特征被存储在每张生成图像的元数据列表中，捕获了定义和区分每个\
    \ NFT 的关键属性。该元数据对潜在的收藏家至关重要，因为它提供了可验证的详细信息，有助于提升 NFT 的价值和吸引力。随后，元数据列表中的信息会被转换成\
    \ JSON 文件。这一步对于将 NFT 与区块链和 NFT 市场整合至关重要，因为 JSON 是广泛接受的 NFT 元数据编码格式，可确保与 OpenSea\
    \ 等平台的兼容性。\n\nOpenSea 的元数据标准允许通过提供超出唯一标识符（`tokenId`）的详细信息来丰富地表示 ERC721 或 ERC1155\
    \ NFT。元数据应以 JSON 格式构建，并通过 ERC721 合约中`tokenURI`函数或 ERC1155 合约中`uri`方法返回的 URI 进行访问。该\
    \ URI 可以指向 HTTP 或 IPFS URL，当查询该 URL 时，会返回包含 NFT 元数据的 JSON 数据块。\n\nNFT 元数据的 JSON\
    \ 结构通常包含以下几个关键属性：\n\n- **image**：代表 NFT 图像的 URL。它支持多种图像类型和存储解决方案，包括 IPFS 和 Arweave。\n\
    - **name**：项目的名称。\n- **description**：项目的人类可读描述。支持使用 Markdown 进行格式化。\n- **external_url**：一个\
    \ URL，会将用户引导至你网站上关于该 NFT 更多详细信息的页面。\n- **attributes**：提供有关项目特征或特性细节的属性数组。\n\n\
    你的元数据可以托管在任何能通过 URI 访问的地方，包括 IPFS 等去中心化存储解决方案，以符合 NFT 的去中心化特性。OpenSea 直接支持 IPFS\
    \ 和 Arweave URI，允许对元数据进行不可变且持久的托管，确保数字资产一旦铸造就无法被篡改。\n\n通过遵循这些元数据标准并相应地构建你的 NFT\
    \ 元数据，你就能确保你的数字资产在 OpenSea 上得到最佳展示。这包括展示高质量的图像、详细的描述以及突出 NFT 独特性的属性，从而吸引平台上的潜在买家和收藏家。\n\
    \n为 NFT 生成数字资产后，下一步关键操作是安全地将它们上传到存储解决方案。虽然 IPFS（星际文件系统）因其去中心化特性而备受欢迎，能确保文件的持久性和完整性，但你不必局限于这一选择。你的数字资产和\
    \ NFT 元数据可以存储在任何能提供文件直接链接的平台上，例如 Google Drive 或 Dropbox。\n\n### 第二步：将资产上传到存储解决方案\n\
    \nIPFS 是你可以用来存储数字资产的几种方法之一。作为一种去中心化存储系统，它将你的文件分布到全球节点网络中，确保数据保持可访问且能抵抗审查。这对于 NFT\
    \ 尤其有利，因为它能通过 NFT 元数据中的一个唯一、不可变的 URI 链接你的数字资产，确认该资产无法被篡改或移除。\n\n或者，像 Google Drive\
    \ 或 Dropbox 这样的中心化解决方案，如果它们能提供文件的直接 URL，也可以用来存储 NFT 数据。虽然这些平台可能提供了便利性和用户友好的界面，但它们通常无法提供与\
    \ IPFS 相同水平的去中心化和安全性。在使用中心化服务时，务必确保 URL 是永久且直接可访问的，因为 URL 结构的任何变化都可能导致你的 NFT 中的元数据链接失效。\n"
- fmt: '#### Option 1: Setting Up Your Own IPFS Node


    Setting up your own `IPFS` node involves installing `IPFS` on your machine, initialising
    your `IPFS` repository and starting the `IPFS` daemon to connect your node to
    the `IPFS` network. This method gives you full control over your content’s hosting
    but comes with increased complexity and responsibility. You’ll need to manage
    your node’s availability and connectivity to ensure your assets remain accessible.
    This approach might involve:


    - Downloading and installing `IPFS`

    - Initialising your `IPFS` node with `ipfs init`

    - Starting the `IPFS` daemon using `ipfs daemon`

    - Adding your files to `IPFS` using `ipfs add -r /path/to/your/folder`


    While running your own node offers a high degree of control and direct engagement
    with the `IPFS` network, it requires a good understanding of `IPFS` and might
    not be the most straightforward option for beginners or those looking for quick
    and easy solutions.


    #### Option 2: Using Third-Party Services like Pinata


    For many users, especially those new to `IPFS` or seeking convenience, third-party
    services like Pinata offer an easier way to upload and manage content on `IPFS`.
    Pinata simplifies the process by providing a user-friendly interface and additional
    features like pinning services to ensure your content remains readily available
    on the `IPFS` network.


    To use Pinata for uploading your NFT assets:


    1. **Create an Account**: Sign up on [Pinata.cloud](https://pinata.cloud/) and
    log in to your account.


    2. **Upload Content**: Navigate to the ‘Upload’ section and choose to upload a
    folder. Select the `BMTEST_IMAGE` folder containing your generated images. Pinata
    will automatically pin your uploaded content, ensuring its availability on the
    `IPFS` network.


    3. **Retrieve IPFS Hashes**: Once uploaded, Pinata will provide an `IPFS` hash
    (`CID`) for your folder and each contained file. These hashes serve as permanent,
    immutable links to your assets, which you’ll include in your NFTs’ metadata.


    For this tutorial, considering we have 20 images and subsequently 20 JSON documents
    for metadata, Pinata’s free tier, which offers 100 free pins, is sufficient. Uploading
    the entire folder not only simplifies the process but also maintains the organisational
    structure of your assets, making it easier to reference and manage them as you
    proceed with NFT minting.


    While setting up your own `IPFS` node offers a hands-on approach and complete
    control, it entails a steeper learning curve and ongoing management responsibilities.
    In contrast, using a third-party service like Pinata provides a straightforward,
    user-friendly solution, making it an attractive option for creators looking to
    streamline their NFT creation process. Regardless of the chosen method, the key
    objective is to ensure that your digital assets are securely uploaded to `IPFS`,
    paving the way for their transformation into NFTs.


    After uploading your images to Pinata, which is a user-friendly interface for
    interacting with `IPFS`, you’ll notice that each file has a corresponding `CID`
    (content identifier). This `CID` is a unique hash representing your file on the
    `IPFS` network and acts as a permanent pointer to its location.


    ![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Screenshots of Pinata – IMAGE


    When you upload an entire folder to Pinata, as shown in your screenshots, the
    service provides you with a `CID` for the entire folder as well. This is exceptionally
    useful when dealing with collections of files, such as a series of images for
    a 10k NFT collection, because you can reference the folder’s `CID` and append
    individual filenames to create complete URLs for each NFT’s metadata.


    Here’s a breakdown of the steps to view and use the `CID`s:


    1. **Access Your Files on IPFS**: Once your `BMTEST_IMAGE` folder is uploaded,
    navigate to the ‘Files’ section on Pinata. You will see the folder listed with
    its size and upload date.


    2. **Folder CID**: Click the folder, and you’ll find an index of files, each with
    its own `CID`, similar to the second screenshot you’ve provided. This index is
    the folder’s `CID`, and it will look something like `Qm...`, a string of letters
    and numbers.


    3. **Individual File CID**: In the index view on `IPFS`, each file will have a
    link that includes the folder’s `CID` and the file’s name. For instance, the URL
    for the first image would be something like `ipfs://Qm...FolderCID/1.png`; see
    Figure [7-2](#616479_1_En_7_Chapter.xhtml#Fig2).


    ![](images/616479_1_En_7_Chapter/616479_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Screenshots of File CID – IMAGE


    4. **Utilising CIDs in Metadata**: These `IPFS` links are what you’ll use in the
    metadata for your NFTs. When you create the JSON metadata file for each NFT, you’ll
    specify the `image` field with the `IPFS` URL pointing to each image, ensuring
    that OpenSea or any other NFT marketplace can retrieve and display the image.


    In summary, the use of `IPFS` for hosting the images and metadata of NFTs is advantageous
    because it ensures decentralised storage, aligning with the decentralised nature
    of blockchain and NFTs. Unlike centralised hosting solutions that depend on a
    single server or company, `IPFS` operates on a peer-to-peer network, making the
    content resistant to censorship and server outages, which in turn enhances the
    durability and availability of the NFTs’ associated digital assets. This decentralised
    approach is not just a technical preference but a core principle of blockchain
    technology, offering a level of resilience and permanence in line with the immutable
    nature of NFTs themselves. Therefore, while centralised URLs could technically
    serve a similar purpose, they do not provide the same level of trustless assurance
    as `IPFS` does, which is why `IPFS` is often the preferred choice for NFT storage,
    as also highlighted in Section [3.3](#616479_1_En_3_Chapter.xhtml#Sec6).'
