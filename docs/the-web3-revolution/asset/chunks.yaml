- fmt: '## 2.4 Gold Jewellery: Ordinals (Inscriptions)


    The introduction of the Ordinals Protocol to the Bitcoin blockchain, which allows
    for the creation of `Inscriptions` directly on Bitcoin, can be likened to the
    relationship between gold and gold jewellery. In this analogy, Bitcoin is akin
    to gold – a fundamental, valuable asset with a primary purpose as a store of value,
    akin to digital gold. The `Inscriptions`, enabled by the `Ordinals Protocol`,
    are comparable to gold jewellery – they are unique, ornamental expressions derived
    from the base material but adding a new dimension of cultural and artistic value.


    These `Inscriptions`, essentially data like images, videos or text attached to
    individual `satoshis` (the smallest unit of Bitcoin), represent a new layer of
    utility and expression within the Bitcoin ecosystem. Unlike traditional NFTs on
    other blockchains like Ethereum, `Inscriptions` are entirely native to Bitcoin,
    operating seamlessly within its existing framework without necessitating additional
    layers or protocol changes. This integration is made possible by the `SegWit`
    and `Taproot` updates to the Bitcoin protocol in 2017 and 2021, respectively,
    which expanded Bitcoin’s capacity to store arbitrary data directly on the blockchain.[⁸](#616479_1_En_2_Chapter.xhtml#Sec17)


    This development introduces a novel concept – each `satoshi`, through ordinal
    theory, is assigned a unique number based on the order it was mined. This mirrors
    how each piece of gold jewellery is distinct, carrying its own design and craftsmanship,
    despite being made from the same base material. The `Inscriptions`, like intricate
    designs on gold jewellery, add a layer of cultural, artistic and memetic value
    to the otherwise uniform `satoshis`, enhancing their significance in the digital
    realm. Some enthusiasts view these developments as a positive expansion of the
    blockchain’s uses, adding memetic and cultural value. This innovation revitalises
    the ecosystem by introducing new functionalities and applications, such as digital
    art creation and the possibility of building on-chain applications and an Internet
    built on Bitcoin.[⁹](#616479_1_En_2_Chapter.xhtml#Sec17)


    In addition to art and NFTs, the Bitcoin blockchain, through the `Ordinals Protocol`,
    also supports the `BRC-20` token standard. This standard is an experimental fungible
    token standard for the Bitcoin blockchain, created by an anonymous on-chain analyst
    named `domo` in March 2023. Inspired by Ethereum’s `ERC20`, `BRC-20` tokens enable
    developers to create and transfer fungible tokens using the `Ordinals Protocol`.
    The first token contract deployed under this standard was for the `ordi` token,
    which mirrored the Bitcoin maximum supply with a limit of 21M tokens in total
    supply, shown in Figure [2-6](#616479_1_En_2_Chapter.xhtml#Fig6). This development
    underlines the evolving nature of the Bitcoin ecosystem and the expanding range
    of its applications.[^(10)](#616479_1_En_2_Chapter.xhtml#Sec17)^, [^(11)](#616479_1_En_2_Chapter.xhtml#Sec17)


    ![](images/616479_1_En_2_Chapter/616479_1_En_2_Fig6_HTML.jpg)


    *Figure 2-6*


    *Deploy, Mint and Transfer of `ordi` Source: [`https://domo-2.gitbook.io/brc-20-experiment/`](https://domo-2.gitbook.io/brc-20-experiment/)
    (2 January 2024)*


    However, these innovations have not come without debate. The Bitcoin community
    is currently engaged in a significant discourse regarding the balance between
    preserving the original intent and design of the Bitcoin network and embracing
    innovation.[^(12)](#616479_1_En_2_Chapter.xhtml#Sec17) This debate centres on
    several key points:


    1.  **Network Integrity and Purpose**: Critics argue that these new features,
    particularly `Inscriptions`, deviate from Bitcoin’s original purpose as a decentralised
    digital currency. They express concerns that these additions might lead to network
    congestion, higher transaction fees and challenges to Bitcoin’s core value proposition
    as a digital gold.


    2.  **Decentralisation and Security**: There are also concerns about the impact
    of these new developments on Bitcoin’s decentralisation and security. Some worry
    that the additional data load from `Inscriptions` might centralise network validation
    in the hands of those with more substantial computing resources, thus potentially
    compromising the network’s security.


    3.  **Economic Implications**: From an economic standpoint, the concept of a `fair
    launch` is pivotal. In the context of Bitcoin and the `Ordinals Protocol`, a fair
    launch refers to the equitable distribution and accessibility of new tokens or
    assets. The `Ordinals` inherently support a fair launch mechanism, allowing users
    to directly participate in asset circulation by sending transactions with specific
    parameters to the blockchain. This democratises the asset issuance process, contrasting
    with traditional finance systems where asset distribution can be heavily skewed
    towards early adopters or those with insider access.


    4.  **Cultural and Memetic Value**: On the other side of the debate, proponents
    of the `Ordinals Protocol` and `Inscriptions` argue that these innovations have
    infused Bitcoin with new cultural and memetic value. They see these developments
    as a natural evolution of the blockchain technology, bringing fresh vitality and
    interest to the Bitcoin ecosystem.


    5.  **Impact on Bitcoin’s Image and Usage**: There’s also a discussion on how
    these changes might affect Bitcoin’s image as a serious financial asset. While
    some view these developments as beneficial, diversifying Bitcoin’s use cases,
    others worry that the association with digital art and NFTs might detract from
    its gravitas as a store of value.


    In conclusion, the introduction of the `Ordinals Protocol`, `Inscriptions` and
    `BRC-20` tokens on the Bitcoin blockchain marks a significant milestone in the
    evolution of Bitcoin. However, it has sparked a complex debate within the community,
    reflecting broader discussions about innovation, decentralisation and the future
    direction of Bitcoin. This debate underscores the dynamic nature of blockchain
    technology and the diverse perspectives within the cryptocurrency community.


    ## 2.5 Summary


    This chapter has charted the transformative journey of Bitcoin from a conceptual
    anomaly to a cornerstone of digital finance. Its inception marked a pivotal shift
    towards decentralised financial solutions, offering a stark alternative to conventional
    financial systems. Bitcoin’s resilience and evolution underscore its potential
    to redefine financial interactions on a global scale. The subsequent chapters
    will delve deeper into the ramifications of Bitcoin’s technology on traditional
    financial paradigms and explore the broader implications of digital currencies
    in reshaping economic transactions.'
