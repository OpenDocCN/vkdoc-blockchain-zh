- fmt: '# The Clear Distinction Between EOAs and Contract Accounts


    The clear distinction between EOAs and Contract Accounts is pivotal. EOAs offer
    full user control and necessitate private key management for all operations, emphasising
    user responsibility for security. Conversely, Contract Accounts operate under
    automated governance by contractual rules, where users do not handle private keys
    directly. This distinction is critical in highlighting the diverse array of services
    Coinbase offers, catering to both novice users seeking simplicity and security
    and experienced users demanding greater control over their digital assets.


    ## Setting Up and Using a Wallet: The MetaMask Example


    Transitioning from discussing the intricacies of Coinbase’s wallet services, we
    now focus on setting up and using a purely EOA-based wallet, such as MetaMask.
    MetaMask is widely recognised for its role in the Web3 infrastructure, offering
    a user-friendly interface for interacting with the Ethereum blockchain and beyond.
    Here’s how to get started with MetaMask:


    1. **Download and Install**: Visit the official MetaMask website (`https://metamask.io/`)
    or your device’s app store to download and install the MetaMask extension for
    your browser or the mobile app for your phone.


    ![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig2_HTML.jpg)


    Figure 4-2 MetaMask Download Page


    Figure 4-2 shows the download page for MetaMask. This page is the hub for downloading
    the MetaMask extension, ensuring that you get the legitimate version of the wallet.


    Select the Chrome Version: On the download page, you will find options for different
    platforms – Chrome, iOS and Android. Since we’re focusing on using MetaMask with
    Chrome, click the `Install MetaMask for Chrome` button. There’s no functional
    difference between the versions; they all provide the same features and security
    across different devices.


    Once you click the Chrome version button, you’ll be redirected to the Chrome Web
    Store. From there, you can add the MetaMask extension to your browser by clicking
    the `Add to Chrome` button. A pop-up window will appear, asking for permissions
    that the MetaMask extension requires to operate. Review the permissions, and if
    you agree, proceed by clicking `Add Extension`. This will initiate the download
    and installation process.


    1. **Create a Wallet**: Follow the prompts to create a new wallet. During this
    process, you will create a password that encrypts your wallet, ensuring that only
    you have access to it.


    ![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig3_HTML.jpg)


    Figure 4-3 MetaMask Download Landing Page


    The first step in using MetaMask is creating a new wallet. This process starts
    with setting a strong password, which is your first line of defence. It’s essential
    to choose a password that is both secure and memorable, as this password will
    encrypt your wallet data and ensure that only you can access your funds and manage
    your assets.


    ![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig4_HTML.jpg)


    Figure 4-4 Setting a Password in MetaMask


    MetaMask emphasises the importance of this password, reminding users that the
    password cannot be recovered by MetaMask itself. This design is a fundamental
    aspect of self-custody, placing the responsibility of wallet security in the hands
    of the user.


    1. **Backup**: Securely back up the 12-word recovery phrase provided during the
    setup process. This seed phrase, which can be extended up to 24 words for enhanced
    security against brute-force attacks, is crucial as it’s the only way to restore
    your wallet if you forget your password or if your device is lost or damaged.
    In practice, the mnemonic phrase should never be shared or exposed to others,
    as it grants complete access to your wallet. For added security, it’s possible
    to generate a mnemonic phrase using tools like the one available at [Ian Coleman’s
    BIP39 Tool](https://iancoleman.io/bip39/)³ and then use this same phrase to recover
    your wallets in applications like MetaMask. This flexibility ensures that you
    can manage your security across different platforms while maintaining control
    over your digital assets.


    ![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig5_HTML.jpg)


    Figure 4-5 Securing Your MetaMask Wallet'
