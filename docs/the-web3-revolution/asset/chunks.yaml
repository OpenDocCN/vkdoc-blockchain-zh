- fmt: '### MakerDAO


    `MakerDAO` is a pivotal project in the `DeFi` space, recognised for the creation
    of `DAI`, a stablecoin that is pegged to the US dollar, and for its `Maker Protocol`,
    a decentralised credit platform operating on the Ethereum blockchain. The protocol
    allows users to generate `DAI` by using their cryptocurrency as collateral in
    a smart contract system known as a `Vault`.


    The `Maker Protocol` uses a dual-token model comprised of its governance token,
    `MKR`, and its stablecoin, `DAI`. The system maintains the stability of `DAI`
    through a dynamic system of collateralised debt positions (`CDPs`), autonomous
    feedback mechanisms and appropriately incentivised external actors.


    `DAI` maintains its peg to the US dollar through a series of smart contracts that
    incentivise external actors to maintain the balance of supply and demand. `Maker
    Vaults` allow users to deposit collateral in exchange for generating `DAI`, which
    creates a debt that accrues interest over time known as the `Stability Fee`. To
    reclaim their collateral, users must repay their `DAI` debt along with the `Stability
    Fee`.


    The `MakerDAO` is governed by `MKR` token holders who vote on critical decisions
    affecting the system. This includes choices about the types of collateral accepted,
    risk parameters and system upgrades. The governance model is an example of ‘scientific
    governance’, where `MKR` holders manage the protocol and financial risks to ensure
    `DAI`’s stability, transparency and efficiency.


    `MakerDAO`’s protocol has a significant impact on the `DeFi` ecosystem, providing
    a decentralised and stable medium of exchange. Its resilience against volatility
    makes it a trusted asset and a building block for other `DeFi` applications. The
    platform’s `Total Value Locked (TVL)` signifies its central role and users’ trust
    in the system.


    The protocol has undergone several upgrades, each introducing more safety features,
    increasing efficiency and enhancing governance. These include the introduction
    of `Multi-Collateral DAI`, which allows various types of assets to be used as
    collateral, and improvements in the governance system to enable more decentralised
    and efficient decision-making processes.


    `MakerDAO`’s scientific governance involves `Executive Voting` and `Governance
    Polling`, allowing `MKR` holders to actively participate in the protocol’s risk
    management and strategic planning. Furthermore, the `Maker Protocol` includes
    features such as the `DAI Savings Rate (DSR)`, which provides a savings mechanism
    for `DAI` holders to earn interest on their holdings.


    **Table 5-6** Reshaping Finance: `MakerDAO`’s Approach to Traditional Challenges[^(12)](#616479_1_En_5_Chapter.xhtml#Sec19)


    | Challenges in Traditional Finance | `MakerDAO` Solutions |

    | --- | --- |

    | **Interest Rate Centralisation**: Rates largely dictated by central banks like
    the Federal Reserve. | **Decentralised Rate Setting**: Interest rates are governed
    by `MKR` holders in a transparent manner. |

    | **Gatekept Financial Services**: Many loan and credit services are only accessible
    to those with certain financial standings. | **Open-Access Finance**: `MakerDAO`
    enables equal access to financial services through decentralised governance. |

    | **High Loan Costs**: Traditional loans can have high processing fees and administrative
    costs. | **Cost-Efficient Loans**: `MakerDAO` provides loans with minimal processing
    fees through smart contracts. |

    | **Rigid Financial Systems**: Traditional financial systems are inflexible and
    slow to adapt to individual needs. | **Flexible Financial Tools**: `MakerDAO`’s
    `DAI Savings Rate (DSR)` and other features offer customisable user experiences.
    |

    | **Financial Exclusion**: A significant portion of the global population is unbanked
    or underbanked. | **Financial Inclusion**: `MakerDAO` provides global, borderless
    access to its stablecoin, `DAI`, regardless of banking status. |

    | **Currency Volatility**: Traditional currencies can be volatile, affecting savings
    and purchasing power. | **Stable Currency**: `DAI` is soft-pegged to the USD,
    offering a stable medium of exchange and store of value. |

    | **Lack of Transparency**: Traditional finance often lacks clarity on how money
    is managed and invested. | **Transparent Operations**: `MakerDAO`’s operations
    are fully transparent and verifiable on the blockchain. |


    In summary, `MakerDAO` stands as a cornerstone of `DeFi`, with its innovative
    stablecoin, `DAI`, and the `Maker Protocol`. It has addressed the volatility typically
    associated with cryptocurrencies and has introduced a system that not only rivals
    traditional banking but also represents a significant advancement in decentralised
    finance. Through its robust governance and innovative features, `MakerDAO` continues
    to play a critical role in the ecosystem, fostering transparency, efficiency and
    inclusion.


    ### Total Value Locked (TVL)


    `Total Value Locked (TVL)` is an essential metric in the `DeFi` sector, offering
    a measure of the total assets committed to `DeFi` protocols and platforms. It
    serves as a key indicator of the sector’s health and activity, reflecting the
    confidence and commitment of users in these decentralised services. `TVL` includes
    all assets that are staked, borrowed or serving as collateral.


    To calculate `TVL`, one must aggregate the current market value of all assets
    deposited in a `DeFi` protocol. This involves multiplying the quantity of each
    locked asset by its current market price. For example, if a protocol has `100
    Ethereum (ETH)` and the current market price of `ETH` is `$2,000`, the `TVL` for
    that portion of assets would be `$200,000`.


    `TVL` is significant for several reasons:


    1.  It reflects the adoption level of `DeFi` platforms – a higher `TVL` suggests
    a larger number of users engaging with the platform, implying trust and stability.


    2.  It provides a sense of the liquidity available within the ecosystem, which
    is crucial for the efficiency of various financial activities such as trading,
    lending and borrowing.


    3.  A high `TVL` can attract new users, as it implies a thriving platform with
    robust participation.


    Despite its importance, `TVL` should not be the sole metric for assessing `DeFi`
    projects as it can fluctuate with market conditions and may not fully represent
    the utility or risk profile of the underlying protocols.


    Data aggregators play a critical role in presenting `TVL` data, offering a centralised
    view of asset values across various `DeFi` protocols. These platforms help users
    track overall growth, assess potential investment opportunities and understand
    the dynamic landscape of decentralised finance​​​​​​​​.[^(14)](#616479_1_En_5_Chapter.xhtml#Sec19)^,
    [^(15)](#616479_1_En_5_Chapter.xhtml#Sec19)^, [^(16)](#616479_1_En_5_Chapter.xhtml#Sec19)


    When evaluating the performance of `DeFi` platforms like `Uniswap`, `Aave` and
    `MakerDAO`, `TVL` provides insight into user adoption rates, liquidity and overall
    market presence. Substantial growth in `TVL` across these platforms indicates
    an increasing shift towards decentralised financial solutions and a broader acceptance
    of blockchain-based financial mechanisms over traditional financial systems. This
    growth not only signifies the amount of financial capital flowing into these protocols
    but also underscores their innovative capabilities in reshaping financial access
    and services.


    ## Risks and Challenges of DeFi


    `DeFi`, while innovative and transformative, faces a spectrum of risks and challenges
    that can potentially hinder its growth and adoption. Here’s a deeper look into
    these issues.'
