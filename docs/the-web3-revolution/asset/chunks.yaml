    \ 号，邮编 10004。\n\n*本书献给我的儿子，龚天逸。*\n\n## 引言\n\n在数字创新不断演变的格局中，《Web3 革命》描绘了一幅从区块链技术理论基础到其在当今数字世界实际应用的全面图景。这本书的编写不仅是为了提供指南，更是为了搭建一座桥梁，将去中心化、密码学和智能合约的复杂机制与其有望重新定义我们数字社会结构的实际应用连接起来。\n\
    \n当我们深入探究 Web3 的复杂世界时，我们探讨了这些技术如何不仅仅是技术进步，更是促进权力从中心化实体向个人和社区转移的变革性工具。每一章都系统地展开，从以比特币和以太坊为代表的区块链技术基础开始，贯穿非同质化代币（NFTs）、去中心化自治组织（DAOs）以及蓬勃发展的去中心化金融（DeFi）领域的细微差别。\n\
    \n本书旨在服务于技术行业的新手和经验丰富的专业人士，通过清晰、语境化的理解，阐明 Web3 拼图的每一块如何契合以及其重要性。通过技术描述、行业案例研究和真实场景的结合，《Web3\
    \ 革命》不仅为读者提供知识，更提供了关于这一新数字前沿中潜在影响和机遇的愿景。\n\n踏上这段旅程，揭开区块链复杂性的神秘面纱，发现使 Web3 成为迈向更透明、更安全、更公平数字未来的革命性一步的实际应用。无论你是企业家、开发者、建设者，还是仅仅是一位科技爱好者，本书旨在为你提供对\
    \ Web3 和区块链技术的扎实理解，并激励你成为这场变革浪潮的一部分。\n\n## 致谢\n\n在编写本书的旅程中，我首先要向那些在诸多争议中支持我并接纳区块链技术的人表示最深切的感谢。在这个行业近十年，我的热情源于所有对这一领域变革潜力持有“共识”之人的支持。\n\
    \n特别感谢威斯敏斯特商学院前会计与金融学院院长哈利·萨帕教授和曾任金融科技与商业分析理学硕士课程主任的安·萨帕。他们在我 2019 年获得博士学位后决定聘用我，使我得以率先开设关于区块链的课程，包括当时尚未获得完全监管认可的代币化主题。我的创新课程深受学生欢迎，丰富了我的教学之旅。2023\
    \ 年，弗朗西斯卡·梅达教授欢迎我回到伦敦大学学院金融与技术研究所，使我有机会继续在 UCL 教授去中心化金融和区块链。他们的远见卓识，以及学生们的鼓励和热情，在我的道路上起到了关键作用，并对本书的创作至关重要，本书将作为我未来课程的资源。此外，我在撰写本书期间成立的\
    \ 4btc 铭文社区及其所有成员提供了坚定不移的支持，加深了我对区块链作为 Web3 革命一部分、能够彻底改变和颠覆金融体系的信念。\n\n最后，我向我的家人致以最深切的感谢，感谢他们无私的奉献和支持。我希望这部作品不仅能引导区块链和加密货币领域的初学者，还能激发他们的创新思维。这段旅程充满挑战，但正是这个由志同道合、共识驱动的个体组成的社区让它变得有价值。我们相信，因此我们得见。\n\
    \n## 关于作者\n\n# 第一部分：区块链的起源与基础\n\n# 第一章：解密区块链技术\n\n本章深入探讨区块链的基础方面，探索其起源、关键机制以及其在创造透明、高效、安全的数字世界方面所蕴含的变革潜力。随着我们层层揭开这项技术，我们邀请读者一同探索区块链如何不仅重塑金融，也如何重新定义现代科技与信任的边界。\n"
- fmt: '# 1.1 What Is Blockchain?


    The origin of blockchain technology is closely linked to Bitcoin, tracing back
    to 2008 when the concept of Bitcoin was first introduced. Bitcoin is not only
    a cryptocurrency but also runs on an innovative technology known as blockchain.
    This technology, evolving alongside Bitcoin, has now been widely applied in various
    fields.


    The genesis of Bitcoin dates back to 31 October 2008, when a mysterious individual
    or team known as Satoshi Nakamoto released a groundbreaking document – the Bitcoin
    whitepaper.[¹](#616479_1_En_1_Chapter.xhtml#Sec11) In this whitepaper, Nakamoto
    proposed a novel concept of digital currency, challenging the existing financial
    system and revolutionising traditional monetary concepts. Then, on 3 January 2009,
    the Bitcoin network witnessed a historic moment as the first block, known as block
    #0, was successfully mined.[²](#616479_1_En_1_Chapter.xhtml#Sec11) This block,
    commonly referred to as the genesis block or the original block, not only marked
    the official start of the Bitcoin network but also the first practical application
    of blockchain technology. This innovative application heralded a new era of digital
    currency and distributed ledger technology, laying the foundation for modern cryptocurrencies
    and blockchain technology.


    As an innovative digital ledger technology, the core of blockchain lies in its
    ability to store and transfer data in a decentralised, transparent and immutable
    manner. In a blockchain, data is grouped and stored in structures called `blocks`,
    which are linked in chronological order, forming a continuously growing chain.
    Each block contains a series of transaction records and the cryptographic hash
    of the previous block, ensuring that once data is written to the blockchain, it
    is nearly impossible to alter or delete, thus preserving the integrity and complete
    history of data.


    Decentralisation is another key characteristic of blockchain. Unlike traditional
    databases or ledger systems where data is stored in centralised servers or data
    centres, blockchain data is distributed across the entire network, with each node
    in the network maintaining a copy of the entire blockchain, shown in Figure [1-1](#616479_1_En_1_Chapter.xhtml#Fig1).
    This distributed data storage significantly reduces the risk of single points
    of failure and enhances the system’s resilience against attacks.


    ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Centralised vs. Decentralised vs. Distributed Source: [`https://berty.tech/blog/decentralized-distributed-centralized`](https://berty.tech/blog/decentralized-distributedcentralized)


    This table provides an overview of the key characteristics and trade-offs associated
    with each type of system in terms of maintenance, stability, scalability, development
    and potential for evolution and diversity.


    Table 1-1


    Comparison of Centralised vs. Decentralised vs. Distributed


    | System Type | Centralised | Decentralised | Distributed |

    | --- | --- | --- | --- |

    | Points of Failure/Maintenance | Single point of failure, easier to maintain
    | More points of failure than centralised but finite, harder to maintain | No
    single point of failure, hardest to maintain |

    | Fault Tolerance/Stability | Highly unstable if the central point fails | More
    stable than centralised, can survive central node failures | Very stable, single
    failures have little impact |

    | Scalability/Max Population | Low scalability | Moderate scalability | Infinite
    scalability |

    | Ease of Development/Creation | Fastest to create, follows a single framework
    | Slower than centralised, need to sort out lower-level details | Slowest, complex
    resource sharing and communication required |

    | Evolution/Diversity | Low diversity, evolves slowly | Once infrastructure is
    in place, can evolve quickly | High potential for evolution once infrastructure
    is set |


    Furthermore, the transparency of blockchain technology is one of its defining
    features. In public blockchains, anyone can view all transaction records and block
    information, yet the identities of transaction participants remain anonymous or
    pseudonymous, as illustrated in Figure [1-2](#616479_1_En_1_Chapter.xhtml#Fig2).
    This combination of transparency and privacy makes blockchain an ideal technology
    choice for sectors such as finance, supply chain management and healthcare.


    ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Bitcoin ExplorerSource: [*www.blockchain.com/explorer*](http://www.blockchain.com/explorer)
    (Accessed: 23 November 2023)


    To ensure the accuracy of transactions and the security of the network, blockchain
    networks typically employ a method known as the `consensus mechanism` to verify
    and add new transactions. The most famous consensus mechanism is the proof of
    work (PoW) used by Bitcoin, where participants (miners) in the network must solve
    complex computational problems to validate transactions and create new blocks.


    Hence, blockchain technology is not only designed to validate transactions and
    enhance the security of the digital ledger but also to mitigate critical issues
    such as the double-spending of cryptocurrencies and various fraudulent activities.
    Blockchain 1.0,[³](#616479_1_En_1_Chapter.xhtml#Sec11) the initial iteration of
    this technology predominantly used in cryptocurrencies like Bitcoin, targets two
    fundamental problems:


    - **Double-Spending Problem**: It uses a combination of peer-to-peer file sharing
    and public key encryption technologies to prevent the same digital currency unit
    from being used more than once. This is executed within a trustless framework
    where transactions are recorded on a publicly accessible ledger and confirmed
    by a consensus among participants, thus eliminating the need for a centralised
    authority.


    - **Byzantine Generals’ Problem**: This refers to the challenge of achieving consensus
    in a decentralised network. Blockchain 1.0 addresses this through the proof-of-work
    (PoW) mechanism, where all participants agree on a verified truth without the
    need for a trusted intermediary. This is accomplished by miners solving cryptographic
    puzzles to validate transactions and add new blocks, thereby ensuring network
    agreement on the ledger’s state.[⁴](#616479_1_En_1_Chapter.xhtml#Sec11)


    These foundational aspects underpin the robustness of blockchain against potential
    vulnerabilities and form the basis for its widespread application in various sectors
    beyond cryptocurrency.


    Blockchain 2.0 represents a significant evolution from the original blockchain
    concept, marked by the integration of smart contracts into blockchain protocols.
    Pioneered by Ethereum, smart contracts are automated codes that execute when predefined
    conditions are met, enabling complex transactions beyond simple cryptocurrency
    exchanges. This advancement fostered the development of decentralised applications
    (DApps) and decentralised autonomous organisations (DAOs), expanding blockchain’s
    utility into various domains such as governance and digital ownership, exemplified
    by non-fungible tokens (NFTs).'
