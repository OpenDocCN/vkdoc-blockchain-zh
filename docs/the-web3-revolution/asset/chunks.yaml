- fmt: "### ERC1155 Standard\n\nThe ERC1155 standard, introduced in 2018, bridges\
    \ the gap between ERC20 and ERC721 by allowing a single contract to represent\
    \ multiple fungibles, semi-fungible and non-fungible tokens. It brings in the\
    \ concept of batch transfers and secure token transfers, reducing transaction\
    \ costs and network congestion. This standard is particularly beneficial in gaming\
    \ and digital collectibles, where a variety of token types coexist.\n\nHere is\
    \ an example ERC1155 multi-token standard contract:\n```\n// contracts/HGCollections.sol\n\
    // SPDX-License-Identifier: MIT\npragma solidity ^0.8.0;\nimport \"@openzeppelin/contracts/token/ERC1155/ERC1155.sol\"\
    ;\ncontract HGCollections is ERC1155 {\nuint256 public constant HGT = 0;\nuint256\
    \ public constant HGNFT = 1;\nconstructor() ERC1155(\"https://huigong.info/api/item/{id}.json\"\
    ) {\n_mint(msg.sender, HGT, 10**18, \"\");\n_mint(msg.sender, HGNFT, 1, \"\");\n\
    }\n}\n```\n\nHere is an explanation of the code:\n\n1.  **SPDX-License-Identifier\
    \ and Solidity Version**\n\n```\n    // SPDX-License-Identifier: MIT\n    pragma\
    \ solidity ^0.8.0;\n    ```\nThis specifies that the contract is licensed under\
    \ the MIT License and is written to be compiled with Solidity version `0.8.0`.\n\
    \n2.  **Import Statement**\n\n```\n    import \"@openzeppelin/contracts/token/ERC1155/ERC1155.sol\"\
    ;\n    ```\nThis imports the `ERC1155` contract from the OpenZeppelin Contracts\
    \ library, which is a collection of reusable and secure smart contract components.\n\
    \n3.  **Contract Declaration**\n\n```\ncontract HGCollections is ERC1155 {\n```\n\
    `HGCollections` is declared as a contract extending the OpenZeppelin `ERC1155`\
    \ contract, which means it inherits all the standard methods and properties of\
    \ an ERC1155 token contract.\n\n4.  **Constants for Token Types**\n\n```\n   \
    \ uint256 public constant HGT = 0; uint256 public constant HGNFT = 1;\n    ```\n\
    Two constants, `HGT` and `HGNFT`, are declared to represent different token types\
    \ within this ERC1155 contract. `HGT` represents a fungible token type with the\
    \ ID `0`, and `HGNFT` represents a non-fungible token type with the ID `1`.\n\n\
    5.  **Constructor and Token Metadata**\n\n```\n    constructor() ERC1155(\"https://huigong.info/api/item/{id}.json\"\
    ) {\n    ```\nThe constructor initialises the contract with a URI for token metadata.\
    \ This URI contains a placeholder `{id}` which can be replaced by the token’s\
    \ ID to retrieve metadata for each specific token type.\n\n6.  **Minting Tokens**\n\
    \n```\n    _mint(msg.sender, HGT, 10**18, \"\");\n    _mint(msg.sender, HGNFT,\
    \ 1, \"\");\n    ```\nWithin the constructor, there are two `_mint` calls:\n-\
    \ The first call mints `10**18` (1 followed by 18 zeros, mimicking the smallest\
    \ denomination of Ether, wei) units of the fungible token `HGT` and assigns them\
    \ to the contract deployer (`msg.sender`).\n- The second call mints `1` unit of\
    \ the non-fungible token `HGNFT`, also assigning it to the contract deployer.\
    \ This reflects the typical property of NFTs being unique or at least not having\
    \ a large supply.\nThe empty string `\"\"` passed as the last parameter to `_mint`\
    \ could be replaced with data if needed for more complex minting logic or to trigger\
    \ events.\n\nThis contract showcases the flexibility of the ERC1155 standard,\
    \ where a single contract can manage a variety of token types and quantities.\
    \ The ERC1155 standard is especially popular in scenarios like gaming where a\
    \ user might have multiple items (fungible tokens for consumables and non-fungible\
    \ tokens for unique items) that need to be managed in a unified way.\n\nFigure\
    \ [3-13](#616479_1_En_3_Chapter.xhtml#Fig13) shows after deploying an ERC1155\
    \ smart contract named `HGCollections`. Similar to the previously discussed ERC721\
    \ contract, deploying this ERC1155 contract is as straightforward as clicking\
    \ the ‘Deploy’ button in Remix. Once deployed, the contract’s functions and features\
    \ become available for interaction.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig13_HTML.jpg)\n\
    \n**Figure 3-13** Deployed Contracts – ERC1155\n\nHere are the details of each\
    \ function and feature outlined in the red box within the deployed `HGCollections`\
    \ smart contract:\n\n1.  `safeBatchTransferFrom`: Allows an address to transfer\
    \ multiple types of tokens to another address in a single transaction. It’s a\
    \ batch operation for transferring various token IDs and amounts, ensuring that\
    \ each transfer is safe and that the recipient can handle the tokens.\n\n2.  `safeTransferFrom`:\
    \ Enables the safe transfer of a specific amount of a token (identified by ID)\
    \ from one address to another. This function ensures that the receiving address\
    \ has the necessary logic to handle ERC1155 tokens.\n\n3.  `setApprovalForAll`:\
    \ Grants or revokes permission for another address (an operator) to manage all\
    \ the current address’s tokens. This is similar to a power of attorney for all\
    \ tokens in this contract.\n\n4.  `balanceOf`: Provides the balance of a specific\
    \ token ID for a single account, telling you how many tokens of a particular ID\
    \ the account holds.\n\n5.  `balanceOfBatch`: An extension of `balanceOf`, which\
    \ allows querying balances for multiple accounts and token IDs simultaneously,\
    \ making it useful for fetching balances in bulk.\n\n6.  `HGNFT`: Represents a\
    \ non-fungible token type within this contract, with an ID of `1`. It indicates\
    \ that this specific token type is unique and non-interchangeable.\n\n7.  `HGT`:\
    \ Stands for a fungible token type within this contract, with an ID of `0`. This\
    \ token type is interchangeable, and each unit is indistinguishable from another.\n\
    \n8.  `isApprovedForAll`: Checks if an operator is approved to manage all of an\
    \ owner’s tokens, which can include both fungible and non-fungible tokens.\n\n\
    9.  `supportsInterface`: Determines if the contract implements a certain interface,\
    \ according to the ERC165 standard. This helps other contracts or services to\
    \ understand what functionalities the contract supports.\n\n10. `uri`: Retrieves\
    \ the URI for a token’s metadata based on its ID. For ERC1155 contracts, the metadata\
    \ URI often points to a JSON file with details about the token.\n\n11. **Low-Level\
    \ Interactions**: This part of the interface allows for direct interaction with\
    \ the contract by sending raw data encoded as hexadecimal CALLDATA. It’s meant\
    \ for advanced users who need to send custom transactions not covered by the standard\
    \ interface.\n\nAfter deploying the contract, the `HGCollections` contract is\
    \ ready to manage an assortment of both fungible and non-fungible tokens using\
    \ the unified ERC1155 standard. The initial minting creates a large supply of\
    \ the fungible token (`HGT`) and a single instance of the non-fungible token (`HGNFT`),\
    \ both assigned to the deployer’s address. The contract’s URI structure (`'https://huigong.info/api/item/{id}.json'`)\
    \ indicates where metadata for each token ID can be found, allowing external entities\
    \ to retrieve detailed information about each token managed by the contract.\n\
    \n### Comparing the Standards\n\nThe evolution of these ERC token standards reflects\
    \ Ethereum’s response to the rapidly changing blockchain landscape. Each standard\
    \ serves specific use cases and requirements, making them integral to Ethereum’s\
    \ functionality and versatility in the digital ecosystem:\n\n- ERC20 focuses on\
    \ fungible tokens, suitable for straightforward token transfers.\n- ERC721 is\
    \ for unique, non-fungible tokens, each representing something distinct.\n- ERC1155\
    \ offers flexibility, combining features of both ERC20 and ERC721, and supports\
    \ semi-fungible tokens."
