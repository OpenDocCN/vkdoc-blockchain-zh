  trans: "\n### 预测市场/预言机\n\n预测市场和预言机通过赋能创新金融工具以及信息聚合与传播机制，在去中心化金融（DeFi）生态系统中扮演着至关重要的角色。\n\
    \n以下是关于它们的功能、重要性以及该领域一些领先平台的深入探讨：\n\n1.  预测市场\n    *   **功能**：DeFi 中的预测市场使参与者能够基于未来事件的结果买卖合约，类似于博彩或期货市场，但范围更广，包括选举结果或天气预报等非金融结果。这些市场利用区块链技术和智能合约创建去中心化平台，无需中心化机构来撮合买卖双方。像\
    \ `Augur` 和 `TotemFi` 这样的平台是突出的例子，它们利用以太坊的 `ERC20` 协议创建用户生成的市场，并提供低费用和创新的奖励机制。\n\
    \n    *   **相对于中心化市场的优势**：DeFi 预测市场相比中心化市场具有显著优势，包括全球可访问性、减少对中介的需求、更低的费用、增强的隐私性以及使用数字资产参与的能力。得益于区块链技术和智能合约，这些市场通常也具有更强的流动性，并且能够更快地进行创新。\n\
    \n2.  预言机\n    *   **预言机问题**：智能合约虽然自主运行，但无法独立访问链下数据，这就产生了“预言机问题”。预言机通过在区块链和外部世界之间充当数据馈送来解决这个问题，使智能合约能够基于现实世界事件执行。然而，设计安全、可靠且去中心化的预言机颇具挑战性，存在数据准确性、操纵和中心化风险等问题。\n\
    \n    *   **预言机设计**：预言机的设计各不相同，从中心化（单一数据源）到去中心化（多个数据源达成共识）。每种设计在速度、安全性和可靠性方面都有其权衡。中心化预言机速度更快，但存在单点故障风险；而去中心化预言机提供了更高的安全性和抗操纵性，但代价是速度和效率。像\
    \ `Chainlink` 和 `Tellor` 这样的创新平台代表了预言机技术的进步，提供了安全准确地将链下数据提供给链上智能合约的解决方案。\n\n \
    \   *   **重要性**：预言机对于众多 DeFi 应用（包括预测市场、借贷平台和保险合约）的功能至关重要，它确保这些应用能够以无需信任的方式与现实世界数据交互。可靠预言机的开发和集成对于\
    \ DeFi 生态系统的增长和稳定性至关重要。\n\n总之，预测市场和预言机是 DeFi 领域的基础组成部分，它们提供了对未来事件进行去中心化投注的机制，并安全地弥合了区块链应用与外部数据之间的鸿沟。它们的持续演进和采用对于\
    \ DeFi 领域旨在创建一个开放、透明和可访问的金融系统这一目标至关重要。\n\n## 5.2 主流 DeFi 协议分析\n\nDeFi（去中心化金融）生态系统由多种协议组成，每种协议都为更广泛的金融格局贡献了独特的功能、机制和影响。在该领域中最具影响力的包括\
    \ `Uniswap`、`Aave` 和 `MakerDAO`。它们在流动性提供、借贷和稳定币发行方面各自扮演着关键角色。以下是对每种协议的深入探讨，以及基于总锁仓价值（TVL）、用户采用率及其对金融格局的变革潜力对其性能和影响的评估。\n\
    \n### Uniswap\n\n`Uniswap` 的发展历程以持续创新和适应 DeFi 生态系统不断变化的需求为特征。这一历程反映了从其初始版本到最新版本的一系列重大升级，体现了该协议致力于改善流动性、交易效率和用户体验的承诺。\n\
    \n**表 5-3** `Uniswap` 的演进¹⁰^, ¹¹\n\n| V0 和 V1 | `Uniswap` 的旅程始于 2017 年一个原型的创建，随后于\
    \ 2018 年 11 月正式推出 `Uniswap V1`。`V1` 将自动化做市商 (`AMM`) 机制引入以太坊区块链，无需传统订单簿即可进行无需许可的代币交易。该版本使用恒定乘积模型进行定价，为\
    \ `Uniswap` 的未来迭代奠定了基础。 |\n| V2 | 于 2020 年 5 月推出的 `Uniswap V2` 引入了重大增强功能，例如支持\
    \ `ERC20` 到 `ERC20` 的兑换，以及引入时间加权平均价格 (`TWAP`) 预言机。此版本标志着 `Uniswap` 成为 DeFi 领域的关键参与者，显著增加了其市场关注度和用户基础。\
    \ |\n| V3 | 2021 年 5 月，引入了 `Uniswap V3`，带来了集中流动性这一创新概念。这允许流动性提供者在特定价格范围内分配资本，优化资本效率并提供更好的收入机会。`V3`\
    \ 还提高了 `TWAP` 预言机的效率，并引入了多个费用层级，以满足流动性提供者不同的风险偏好。 |\n| V4 | 随着 `Uniswap V4` 的开发，演进仍在继续，旨在进一步提高灵活性和\
    \ Gas 效率。它通过钩子（hooks）引入了可定制的池，允许开发者使用新功能增强集中流动性模型。此版本还朝着所有池采用单一合约模式迈进，显著降低了与池创建和交易相关的部署成本和\
    \ Gas 费用。此外，`V4` 重新引入了对原生 `ETH` 的支持，简化了交易并可能降低 Gas 成本。 |\n\n`Uniswap` 的每个版本都逐步解决了其前代版本的局限性，引入了对\
    \ DeFi 生态系统产生重大影响的新功能。从促进简单的 `ERC20/ETH` 交易，到支持复杂的集中流动性头寸和可定制的池功能，`Uniswap` 的演进反映了\
    \ DeFi 领域的整体增长和日益复杂化。这种持续创新巩固了 `Uniswap` 作为 DeFi 关键基础设施组件的地位，支持着广泛的应用和服务，同时为用户提供更高效、更灵活、更具成本效益的交易解决方案。\n\
    \n![图 5-1](img/616479_1_En_5_Fig1_HTML.jpg)\n\n**图 5-1** 兑换钩子流程¹¹\n\n`Uniswap\
    \ V4` 的“钩子”功能使开发者能够在协议流程的特定阶段实现专门功能。这包括诸如时间加权平均做市商 (`TWAMM`) 之类的功能，用于在不产生显著价格影响的情况下随时间执行大额订单，以及允许用户为交易设定特定价格点的链上限价单。此外，还可以使用这些钩子创建基于波动性的动态费用调整机制和用于捕获最大可提取价值\
    \ (`MEV`) 并将其返还给流动性提供者的机制。\n\n钩子的引入是 `Uniswap` 相较于之前版本的一项重大增强，旨在为开发者提供构建更复杂、更高效金融产品所需的工具，同时优化平台的交易流程和费用结构。这展示了\
    \ `Uniswap` 在 DeFi 领域持续推动创新和适应性的努力。\n\n**表 5-4** `Uniswap`：重新定义 DeFi 的可访问性和效率¹²\n"
- fmt: '| Challenges in Traditional Finance | Uniswap Solutions |

    | --- | --- |

    | **Centralisation**: Market access and trade pairings are tightly controlled
    by centralised entities. | **Decentralisation**: Uniswap’s open protocol allows
    anyone to create or trade on any pair, increasing market inclusivity. |

    | **Limited Liquidity**: Traditionally, large institutions dominate market making
    and liquidity provision. | **Democratised Liquidity**: Uniswap enables individual
    liquidity providers to contribute to pools and earn fees, democratising access
    to market making. |

    | **Trading Inefficiencies**: Trades can be slow due to reliance on intermediary
    parties for clearing and settlement. | **Instant Settlement**: Utilising smart
    contracts, Uniswap allows for near-instant trades without the need for intermediaries.
    |

    | **Restrictive Asset Exchange**: Swapping assets across different platforms can
    be cumbersome and restrictive. | **Cross-Protocol Exchange**: Uniswap facilitates
    the seamless exchange of a vast array of assets, promoting a more integrated DeFi
    ecosystem. |

    | **Opacity in Operations**: Traditional systems often lack transparency in operations,
    leading to trust issues. | **Transparent Processes**: With open source code and
    on-chain transactions, Uniswap provides complete visibility into its operations.
    |


    In conclusion, Uniswap addresses fundamental inefficiencies in traditional finance
    by leveraging decentralised, blockchain-based solutions. By promoting a permissionless
    and transparent environment, it provides unparalleled access and flexibility,
    which is reshaping the financial ecosystem. Uniswap stands as a testament to the
    potential of DeFi to offer a more inclusive and efficient alternative to conventional
    financial systems.


    ## Aave


    Aave is an open source and non-custodial liquidity protocol where users can earn
    interest on deposits and borrow assets. It has evolved through several versions,
    each introducing more sophisticated features that advance the DeFi lending landscape.


    **Aave V1** was the genesis of the protocol, launched in 2017 with a pooled risk
    model and support for two assets. It allowed users to earn interest on deposits
    and engage in peer-to-peer lending.


    **Aave V2**, released in 2019, brought major improvements like the addition of
    more assets, including `DAI`, `USDC` and others. It introduced a protocol-based
    liquidation system and other features like debt tokenisation, stable and variable
    debt and the pioneering flash loans. These flash loans allow for collateral swapping,
    debt refinancing and leverage opportunities within a single transaction block.


    **Aave V3** continued this trajectory of innovation when it was launched in 2021.
    This version introduced a single-borrowable asset model for more secure lending,
    the Portal feature for cross-blockchain asset transfers and isolation mode to
    protect users’ wallets. Additionally, Aave V3 introduced dynamic interest rates,
    adjusting loan rates based on market demand and supply, ensuring a more capital-efficient
    system.[^(13)](#616479_1_En_5_Chapter.xhtml#Sec19)


    Each version aimed to improve user experience, reduce gas costs and provide more
    secure and versatile lending options. Aave has been a key player in DeFi lending
    by offering features that are responsive to the needs of its users and the market,
    advancing the capabilities of decentralised finance significantly beyond traditional
    finance.


    Aave’s significant TVL growth reflects its impact and popularity. By providing
    flexible, decentralised financial options, Aave is challenging traditional financial
    practices, enabling users to gain more control over their financial transactions
    in a transparent and efficient manner. With each version, Aave has aimed to simplify
    the complexities of lending and borrowing in the blockchain space, bringing a
    higher level of sophistication and security to DeFi.


    ### Table 5-5: Addressing Traditional Finance Limitations with Aave’s DeFi Innovations[^(12)](#616479_1_En_5_Chapter.xhtml#Sec19)


    | Challenges in Traditional Finance | Aave Solutions |

    | --- | --- |

    | **Centralisation Risk**: Financial systems are often controlled by a few entities,
    leading to single points of failure and lack of inclusion. | **Decentralisation**:
    Aave’s protocol is open source and non-custodial, reducing centralisation risks
    and increasing financial inclusion. |

    | **Limited Yield Opportunities**: Traditional finance generally offers lower
    yield opportunities, particularly for smaller investors. | **Higher Yields**:
    Aave enables users to earn higher yields on deposits through its lending pools
    and interest-bearing `aTokens`. |

    | **Restricted Access**: Investment and borrowing are often restricted by credit
    checks and institutional barriers. | **Open Access**: Aave’s protocol is permissionless,
    allowing anyone to lend, borrow or earn interest regardless of their location
    or status. |

    | **Liquidity Issues**: Traditional lending can be illiquid, with long lock-up
    periods and cumbersome processes to access funds. | **Liquid Markets**: Aave offers
    instant loans and borrowing, providing high liquidity without long-term lock-ups.
    |

    | **Lack of Transparency**: Traditional finance often has opaque practices with
    hidden fees and complex terms. | **Transparency**: Aave operates on the blockchain,
    offering full transparency on transactions, fees and contract terms. |

    | **Inflexible Terms**: Loans in traditional finance come with fixed terms and
    rates that might not suit all borrowers. | **Flexible Terms**: Aave provides variable
    and stable interest rate options, as well as features like rate switching and
    flash loans for flexibility. |

    | **Interoperability**: Assets in one financial institution are not easily transferable
    to another, leading to siloed ecosystems. | **Interoperability**: Aave’s protocol
    is compatible with various other DeFi applications, enabling seamless asset transfer
    across platforms. |


    Aave presents a robust alternative to traditional financial systems by leveraging
    DeFi innovations to overcome common challenges. Its decentralised structure promotes
    financial inclusivity, while the protocol’s transparency ensures users can trust
    the system they’re engaging with. Aave offers greater flexibility in terms of
    yield, access and liquidity, which traditional finance systems often lack. With
    features like instant loans, a variety of interest rate options and seamless interoperability
    with other DeFi platforms, Aave addresses many of the pain points experienced
    by users of conventional financial services. As a result, Aave is not only a pioneering
    force in the DeFi space but also a viable competitor to the incumbent financial
    institutions, providing solutions that redefine borrowing and lending in the digital
    age.'
  raw: '| Challenges in Traditional Finance | Uniswap Solutions |

    | --- | --- |

    | **Centralisation**: Market access and trade pairings are tightly controlled
    by centralised entities. | **Decentralisation**: Uniswap’s open protocol allows
    anyone to create or trade on any pair, increasing market inclusivity. |

    | **Limited Liquidity**: Traditionally, large institutions dominate market making
    and liquidity provision. | **Democratised Liquidity**: Uniswap enables individual
    liquidity providers to contribute to pools and earn fees, democratising access
    to market making. |

    | **Trading Inefficiencies**: Trades can be slow due to reliance on intermediary
    parties for clearing and settlement. | **Instant Settlement**: Utilising smart
    contracts, Uniswap allows for near-instant trades without the need for intermediaries.
    |

    | **Restrictive Asset Exchange**: Swapping assets across different platforms can
    be cumbersome and restrictive. | **Cross-Protocol Exchange**: Uniswap facilitates
    the seamless exchange of a vast array of assets, promoting a more integrated DeFi
    ecosystem. |

    | **Opacity in Operations**: Traditional systems often lack transparency in operations,
    leading to trust issues. | **Transparent Processes**: With open source code and
    on-chain transactions, Uniswap provides complete visibility into its operations.
    |


    In conclusion, Uniswap addresses fundamental inefficiencies in traditional finance
    by leveraging decentralised, blockchain-based solutions. By promoting a permissionless
    and transparent environment, it provides unparalleled access and flexibility,
    which is reshaping the financial ecosystem. Uniswap stands as a testament to the
    potential of DeFi to offer a more inclusive and efficient alternative to conventional
    financial systems.


    ### Aave


    Aave is an open source and non-custodial liquidity protocol where users can earn
    interest on deposits and borrow assets. It has evolved through several versions,
    each introducing more sophisticated features that advance the DeFi lending landscape.


    **Aave V1** was the genesis of the protocol, launched in 2017 with a pooled risk
    model and support for two assets. It allowed users to earn interest on deposits
    and engage in peer-to-peer lending.


    **Aave V2**, released in 2019, brought major improvements like the addition of
    more assets, including DAI, USDC and others. It introduced a protocol-based liquidation
    system and other features like debt tokenisation, stable and variable debt and
    the pioneering flash loans. These flash loans allow for collateral swapping, debt
    refinancing and leverage opportunities within a single transaction block.


    **Aave V3** continued this trajectory of innovation when it was launched in 2021\.
    This version introduced a single-borrowable asset model for more secure lending,
    the Portal feature for cross-blockchain asset transfers and isolation mode to
    protect users’ wallets. Additionally, Aave V3 introduced dynamic interest rates,
    adjusting loan rates based on market demand and supply, ensuring a more capital-efficient
    system.[^(13)](#616479_1_En_5_Chapter.xhtml#Sec19)


    Each version aimed to improve user experience, reduce gas costs and provide more
    secure and versatile lending options. Aave has been a key player in DeFi lending
    by offering features that are responsive to the needs of its users and the market,
    advancing the capabilities of decentralised finance significantly beyond traditional
    finance.


    Aave’s significant TVL growth reflects its impact and popularity. By providing
    flexible, decentralised financial options, Aave is challenging traditional financial
    practices, enabling users to gain more control over their financial transactions
    in a transparent and efficient manner. With each version, Aave has aimed to simplify
    the complexities of lending and borrowing in the blockchain space, bringing a
    higher level of sophistication and security to DeFi.


    Table 5-5


    Addressing Traditional Finance Limitations with Aave’s DeFi Innovations[^(12)](#616479_1_En_5_Chapter.xhtml#Sec19)


    | Challenges in Traditional Finance | Aave Solutions |

    | --- | --- |

    | **Centralisation Risk**: Financial systems are often controlled by a few entities,
    leading to single points of failure and lack of inclusion. | **Decentralisation**:
    Aave’s protocol is open source and non-custodial, reducing centralisation risks
    and increasing financial inclusion. |

    | **Limited Yield Opportunities**: Traditional finance generally offers lower
    yield opportunities, particularly for smaller investors. | **Higher Yields**:
    Aave enables users to earn higher yields on deposits through its lending pools
    and interest-bearing aTokens. |

    | **Restricted Access**: Investment and borrowing are often restricted by credit
    checks and institutional barriers. | **Open Access**: Aave’s protocol is permissionless,
    allowing anyone to lend, borrow or earn interest regardless of their location
    or status. |

    | **Liquidity Issues**: Traditional lending can be illiquid, with long lock-up
    periods and cumbersome processes to access funds. | **Liquid Markets**: Aave offers
    instant loans and borrowing, providing high liquidity without long-term lock-ups.
    |

    | **Lack of Transparency**: Traditional finance often has opaque practices with
    hidden fees and complex terms. | **Transparency**: Aave operates on the blockchain,
    offering full transparency on transactions, fees and contract terms. |

    | **Inflexible Terms**: Loans in traditional finance come with fixed terms and
    rates that might not suit all borrowers. | **Flexible Terms**: Aave provides variable
    and stable interest rate options, as well as features like rate switching and
    flash loans for flexibility. |

    | **Interoperability**: Assets in one financial institution are not easily transferable
    to another, leading to siloed ecosystems. | **Interoperability**: Aave’s protocol
    is compatible with various other DeFi applications, enabling seamless asset transfer
    across platforms. |


    Aave presents a robust alternative to traditional financial systems by leveraging
    DeFi innovations to overcome common challenges. Its decentralised structure promotes
    financial inclusivity, while the protocol’s transparency ensures users can trust
    the system they’re engaging with. Aave offers greater flexibility in terms of
    yield, access and liquidity, which traditional finance systems often lack. With
    features like instant loans, a variety of interest rate options and seamless interoperability
    with other DeFi platforms, Aave addresses many of the pain points experienced
    by users of conventional financial services. As a result, Aave is not only a pioneering
    force in the DeFi space but also a viable competitor to the incumbent financial
    institutions, providing solutions that redefine borrowing and lending in the digital
    age.'
