  trans: '

    | 司法管辖区 | 监管机构 | 代币定义方式 |

    | --- | --- | --- |

    | 美国 | 美国证券交易委员会（SEC） | 运用豪威测试判断数字资产是否为证券，重点关注投资合同 |

    | 英国 | 金融行为监管局（FCA） | 区分受监管代币（证券代币和电子货币代币）与不受监管代币（交易代币和功能代币） |

    | 欧盟 | 《加密资产市场监管法案》（MiCA） | 将代币分为电子货币代币和资产参考代币，为每种类型制定不同的监管标准 |

    | 瑞士 | 瑞士金融市场监管局（FINMA） | 将代币分为支付、功能或资产代币，其中资产代币被视为证券 |

    | 新加坡 | 新加坡金融管理局（MAS） | 已扩大监管范围至数字支付代币，强调用户保护和金融稳定 |

    | 香港 | 香港金融管理局（HKMA） | 发布加密资产托管服务指引，重点关注安全性和稳健的风险管理政策 |


    表 11-1 揭示了一幅监管格局：各监管机构要么趋向于代币标准的趋同，要么维持着各自独特、本地化的方法。例如，SEC 对豪威测试的依赖代表了确定数字资产性质的一种功能型方法，而
    MiCA 的分类体系则反映了欧盟协调各成员国监管标准的努力。同样，FCA 将代币划分为受监管和不受监管两类，突显了英国务实的监管方式，为蓬勃发展的加密市场提供了某种程度的灵活性。


    监管框架的差异性凸显了在数字资产领域导航的复杂性。从发行方到投资者，各利益相关者必须善于理解这些细微差别的监管环境，以便有效制定策略并遵守不同的法律要求。这种结构化的概览不仅有助于阐明全球对数字代币的监管立场，也强调了在金融技术不断演进面前采取适应性策略的重要性。随着数字资产行业持续成熟，不同监管视角之间的对话无疑将塑造数字金融的未来，促使人们根据技术进步持续评估法律框架。


    ## 11.2 数字资产的全球监管策略


    在快速发展的数字金融领域，Web3 及其相关数字资产的出现引发了全球金融监管机构的不同回应。本节旨在探讨 SEC 和 FCA 等机构建立的细致入微的监管框架，揭示其应对数字资产监管复杂性的策略。重点在于理解监管格局，而非仅聚焦于某一特定监管机构，从而提供全球数字资产治理方法的全景视图。


    ### SEC 的监管指南针


    在美国，SEC 通过运用豪威测试，在决定数字资产的监管命运方面发挥着关键作用。该测试源自 1946 年最高法院的一项里程碑式裁决，根据数字资产的投资结构以及投资者是否主要依赖他人努力来获取利润预期，判断其是否构成证券。SEC
    对数字资产的宽泛分类——可将其归类为证券、货币、商品或财产——从根本上影响了它们的监管待遇。值得注意的是，SEC 的做法强调了在适应数字资产交易复杂性的同时保护投资者的承诺。通过
    A 条例、众筹条例和 D 条例等豁免条款，SEC 在动态的数字金融格局中，平衡了促进创新与确保投资者保护之间的张力。


    ### FCA 的监管蓝图


    在大西洋彼岸，FCA 的数字资产监管框架通过清晰的分类法脱颖而出，将代币分为证券代币、电子货币代币和不受监管代币。这一分类系统在英国界定加密资产监管范围方面发挥着关键作用。证券代币类似于传统金融工具，完全属于
    FCA 的监管范畴，需要遵守既定的金融法规。相比之下，不受监管的代币（包括功能代币和交易代币）在此范围之外运作，提供了某种程度的运营灵活性。FCA 的积极姿态（如其沙盒计划所示）体现了其在监管监督与促进金融创新之间寻求平衡的努力。


    ### 驾驭跨境监管水域


    Web3 及其资产的数字性质天生就超越国界，给监管的一致性和执行带来了独特挑战。金融行动特别工作组（FATF）和全球金融创新网络（GFIN）等国际协作与标准制定机构在弥合监管差异方面发挥着关键作用。协调监管方法的努力对于管理与数字资产交易相关的风险至关重要，特别是在反洗钱（AML）和打击恐怖主义融资（CFT）等领域。


    ### 全球监管的趋同与分歧


    对 SEC 和 FCA 框架的探讨揭示了全球监管方法中既存在趋同也存在分歧。虽然都强调投资者保护和市场诚信，但这些监管机构采用的方法和分类反映了其各自独特的市场环境和监管理念。SEC
    对豪威测试的依赖和 FCA 详细的加密资产分类法都旨在为其各自管辖区提供清晰度和稳定性，但其在分类和豁免标准上的方法有所不同。


    ### 未来展望


    随着数字资产行业持续成熟，全球监管机构之间的对话可能会加深，可能导致更标准化或可互操作的监管框架。不断演变的数字金融格局要求监管方法既具适应性又具前瞻性，能够应对新出现的挑战，同时促进创新。


    本节探讨了数字资产的全球监管迷宫，提供了对 SEC 和 FCA 所采用策略的见解。通过这种方式，它强调了在驾驭复杂多变的数字金融世界时，深入理解监管环境的重要性。


    ## 11.3 数字资产托管与用户保护


    数字资产的托管和用户保护是全球监管机构最关注的问题。本节深入探讨为确保数字资产安全保管和保护投资者免受数字金融相关潜在风险而制定的机制和监管框架。通过审视全球实践和指南，本节旨在阐明为加强数字资产交易安全性和完整性所做的努力。


    ### 数字资产托管的本质


    数字资产托管涉及加密货币、代币和其他形式数字价值的安全存储和管理。随着数字金融生态系统的发展，强大的托管服务变得越来越重要。这些服务不仅保护资产免受盗窃、黑客攻击和未经授权的访问，而且在数字金融的运营完整性中发挥着关键作用，确保交易按预期执行。

    '
- fmt: '### Regulatory Approaches to Custody and Protection


    Globally, financial regulators have recognised the need for stringent custodial
    standards to protect digital asset holders. These standards often encompass requirements
    for the segregation of client assets, the implementation of comprehensive security
    measures and regular audits to ensure compliance.


    - **Security Measures and Technological Safeguards**: Regulators mandate the adoption
    of advanced security protocols, including encryption, multi-signature wallets
    and cold storage solutions, to mitigate the risks of cyberattacks and unauthorised
    access. These measures are designed to shield digital assets from the evolving
    threats in cyberspace.


    - **Operational Integrity and Transparency**: Guidelines stipulate that custodial
    service providers maintain accurate records, undergo regular audits and provide
    transparent reporting to clients. This transparency is vital for building trust
    within the digital finance ecosystem and for ensuring that users have a clear
    understanding of the status and safety of their assets.


    - **Risk Management Practices**: Regulatory frameworks require custodians to implement
    robust risk management strategies. These strategies include the assessment of
    operational, cyber and counterparty risks, ensuring that custodial services are
    prepared to address potential vulnerabilities proactively.


    ### Case Studies in Regulation


    - **United States (SEC and FINRA Guidelines)**: In the United States, the SEC
    and the Financial Industry Regulatory Authority (FINRA) have issued guidance outlining
    the expectations for broker-dealers operating as digital asset custodians. This
    guidance emphasises the necessity of secure storage practices and the legal obligations
    to protect client assets.


    - **European Union (MiCA Framework)**: The Markets in Crypto-Assets (MiCA) regulation
    provides a comprehensive approach to the custody of digital assets within the
    EU. MiCA establishes clear standards for the operation of custodial services,
    including requirements for asset segregation, operational resilience and consumer
    protection.


    - **Asia-Pacific (Hong Kong SFC Framework)**: The Hong Kong Securities and Futures
    Commission (SFC) has set forth a regulatory framework for virtual asset custodians,
    detailing requirements for custody operations, risk management and the safeguarding
    of client assets. This framework aims to enhance the regulatory oversight of digital
    asset custodians and protect investors.


    ### The Path Forward


    As the digital finance landscape continues to evolve, the role of custodial services
    and the need for effective user protection mechanisms become increasingly significant.
    Regulatory bodies worldwide are tasked with the challenge of adapting to technological
    advancements while ensuring that custodial practices are both secure and conducive
    to the growth of digital finance.


    In conclusion, the global push towards stringent digital asset custody and user
    protection standards reflects a collective effort to foster a safer and more reliable
    digital finance ecosystem. By implementing rigorous regulatory frameworks and
    encouraging best practices in asset custody, regulators aim to protect investors
    from the inherent risks of digital asset transactions, thereby promoting confidence
    and stability in the market.


    ## 11.4 Navigating the Future: Regulation, Innovation and the Standardisation
    of Web3


    As the digital era unfolds, cryptocurrencies stand at the crossroads of innovation
    and regulation, heralding a transformative period for global finance. This section
    explores the multifaceted future of cryptocurrencies, focusing on the dual engines
    driving their evolution: relentless innovation and the pressing need for standardisation
    to mitigate associated risks. By examining the trajectory of cryptocurrency markets,
    regulatory responses and emerging technologies, we can gain insights into the
    future dynamics of digital currencies.


    ### The Emergence of Bitcoin ETFs:[⁹](#616479_1_En_11_Chapter.xhtml#Sec007) Bridging
    Traditional and Digital Finance


    One of the most pivotal developments at the intersection of traditional finance
    and the digital asset world is the emergence of Bitcoin Exchange-Traded Funds
    (ETFs). Bitcoin ETFs represent a significant leap forward in the institutional
    acceptance of cryptocurrencies, offering a regulated, transparent and efficient
    vehicle for investing in Bitcoin through traditional stock exchanges. This section
    explores the implications of Bitcoin ETFs for the future of cryptocurrencies,
    highlighting their role in innovation, risk mitigation and standardisation efforts.


    Bitcoin ETFs are innovative financial products that track the price of Bitcoin
    and trade on traditional stock exchanges, offering investors an indirect exposure
    to Bitcoin’s price movements without the complexities of managing digital wallets
    or directly trading cryptocurrencies on exchanges. This innovation bridges the
    gap between the burgeoning world of digital assets and the established realm of
    traditional finance, making Bitcoin accessible to a broader range of investors,
    including institutional investors who are subject to stringent regulatory and
    compliance requirements.'
