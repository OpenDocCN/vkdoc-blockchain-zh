  trans: '

    ### 欧盟 – 加密资产市场（MiCA）⁴


    欧盟的《加密资产市场》（MiCA）监管法规代表了在成员国间协调加密资产活动方面迈出的实质性一步，它建立了一个旨在保护消费者、维护金融稳定并同时促进创新的清晰框架。MiCA
    框架非常全面，对加密资产提供了详细的定义和分类，尤其侧重于**资产参考代币**（`ARTs`）和**电子货币代币**（`EMTs`），因其在货币替代层面的作用及对金融体系的潜在影响而被视为关键。


    根据 MiCA 的规定，`资产参考代币`是指旨在通过参考任何价值或权利（包括一种或多种官方货币）来维持稳定价值的加密资产，它对应了货币的价值储存功能。另一方面，`电子货币代币`是指价值的数字表现形式，直接与单一法定货币挂钩，主要用于支付手段，从而保证其价值稳定。`电子货币代币`类似于电子货币，在数字领域替代硬币和纸币。


    MiCA 法规强调，这些代币必须有记录在其他地方的资产或债权作为支持，从而允许最终用户之间进行价值转移，根据设计的不同，可能无需中央第三方的参与。这一方面对于对加密资产进行分类、并将其与现有金融法规（如《支付服务指令（第二版）》（PSD2））保持一致至关重要。


    欧洲中央银行（ECB）指出，拟议的 MiCA 法规明确区分了加密资产与央行货币，旨在避免对央行可能发行的资产与传统央行货币的法律性质产生混淆。


    根据 MiCA 的规定，大多数稳定币发行者必须在欧盟境内合法设立并获得授权，而重要的资产参考代币则可能受到欧洲银行管理局（EBA）的直接监管。EBA 将与各国主管当局（NCAs）合作，负责确保符合
    MiCA 法规的要求，从而实施一种双重监管安排，旨在防止监管套利并加强对重要电子货币代币的监督。


    该法规是对 FTX 交易所倒闭等事件所暴露的监管空白做出的回应，强调了建立一个能够防范加密市场固有的波动性、欺诈和操纵风险的法律环境的必要性。通过建立统一的市场规则，MiCA
    有望为加密资产提供一个更可预测、更健全的法律环境，为发行者提供清晰的指引，为投资者提供安全保障，同时使欧盟内部能够形成更大的加密资产活动市场。


    MiCA 框架清晰地表明了欧盟将加密资产整合到其金融体系中的承诺，既承认了它们的创新潜力，也承认了对它们进行监管的必要性。MiCA 下监管努力的汇聚，标志着欧盟致力于构建一个可持续的数字金融生态系统，利用技术进步来增强金融服务，同时在消费者保护和市场诚信方面保持警惕。


    ### 瑞士 – 金融市场监督管理局（FINMA）⁵, ⁶


    在瑞士，金融市场监督管理局（FINMA）在定义首次代币发行（ICO）及更广泛的加密资产领域的监管格局方面发挥着关键作用。FINMA 将代币区分为三种主要类别：支付型代币、实用型代币和资产型代币，每种代币都涉及不同的监管影响，尤其是在
    ICO 方面。


    支付型代币与比特币和以太坊等加密货币同义，旨在用于获取商品或服务的支付手段，或作为货币或价值转移的工具。加密货币不对发行者产生任何债权。在监管方面，若代币能够作为支付手段并已可转移的支付型
    ICO，需遵守反洗钱法规。然而，FINMA 不将此类代币归类为证券。


    实用型代币旨在通过基于区块链的基础设施提供对应用程序或服务的数字访问权限。只要其唯一目的是赋予数字访问权，并且在发行时就可以这种形式使用，它们就不会被视为证券。但是，如果实用型代币同时或仅用于投资目的，FINMA
    将视其为证券，与资产型代币类似。


    资产型代币代表资产，例如对发行者的债权或股权，类似于对公司未来收益或未来资本流的股份。因此，资产型代币被视为证券，意味着它们需要遵守证券法关于交易的要求，以及《瑞士债务法典》中的民法要求，例如招股说明书的要求。


    FINMA 的此分类对于理解 ICO 如何在瑞士的法律框架内进行至关重要。它反映了该机构在监管多样化的加密资产方面的细致方法，旨在确保市场参与者保护、公平可靠的交易和有效的价格形成，同时也承认区块链技术的创新潜力。


    这种监管方法彰显了瑞士作为全球领先金融中心的地位，它积极调整其法律框架以适应不断发展的数字金融格局，并为技术创新和投资营造了有利环境。

