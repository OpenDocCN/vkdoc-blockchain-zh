- fmt: '# Summary


    This chapter provides an in-depth exploration of Non-Fungible Tokens (NFTs) and
    their pivotal role in the digital economy. It begins by explaining the unique
    characteristics of NFTs, including their indivisibility and uniqueness, which
    differentiate them from fungible tokens like cryptocurrencies. Built on blockchain
    technology, NFTs offer solutions to long-standing challenges in the digital world,
    such as ensuring authenticity, provenance, and secure ownership of digital assets.


    The chapter also discusses the growing applications of NFTs beyond digital art,
    extending into gaming, real estate, and digital identity management. NFTs are
    shown to redefine asset ownership by enabling true ownership and transferability
    of in-game items, property, and even personal data in a decentralised manner.
    This transformation is complemented by various distribution models like Standard
    Mints and Dutch Auctions, which play a crucial role in how NFTs are released and
    traded.


    Finally, the chapter outlines a step-by-step guide for creating and trading NFTs,
    from generating digital assets, uploading them to decentralised storage solutions
    like `IPFS`, and minting them on the blockchain, to listing NFTs on marketplaces
    such as `OpenSea`. It highlights the technical aspects of NFT creation, including
    metadata standards and smart contract functionalities, ensuring that creators
    and developers can successfully mint and sell NFTs in a secure and transparent
    manner.


    ## Note


    1. Yan, T. (2024). From Dutch Auctions to Open Editions: A Deep Dive into NFT
    Distribution Models. Delphi Digital. [`https://members.delphidigital.io/reports/from-dutch-auctions-to-open-editions-a-deep-dive-into-nft-distribution-models`](https://members.delphidigital.io/reports/from-dutch-auctions-to-open-editions-a-deep-dive-into-nft-distribution-models)
    (Accessed: 9 April 2024).


    # DEX and Market Cap Management


    ## How DEXs Work


    Decentralised exchanges (DEXs) represent a significant shift from traditional
    financial exchange mechanisms, embodying the ethos of decentralisation central
    to blockchain technology. By facilitating peer-to-peer transactions without intermediaries,
    DEXs offer a level of transparency, security and accessibility not typically found
    in centralised exchanges (CEXs).


    ### Principles of Operation


    At the core of most DEXs, including platforms like `Uniswap`, is the Automated
    Market Maker (AMM) model. Unlike traditional exchanges that rely on order books
    to match buyers and sellers, AMMs use liquidity pools for asset trading. These
    pools are funded by liquidity providers (LPs) who deposit pairs of tokens in a
    smart contract. In return, LPs earn trading fees based on the proportion of the
    pool they provide.


    ![Figure 8-1](images/616479_1_En_8_Chapter/616479_1_En_8_Fig1_HTML.jpg)


    Figure 8-1 How DEXs Work


    Figure 8-1 illustrates the core operations of a decentralised exchange (DEX) like
    `Uniswap`, utilising an Automated Market Maker (AMM) protocol.


    LPs deposit pairs of tokens into a liquidity pool, and these pairs must be in
    equivalent value to maintain the balance of the pool. In the provided image, an
    LP deposits ''10 Token A + 1 Token B'' into the `Uniswap` Pool and receives ''4
    LP Shares'' in return. This mechanism is critical as it allows the pool to have
    sufficient funds to facilitate trades for other users.


    The AMM protocol automates price discovery without the need for a traditional
    order book. The image represents this with a ''Swap'' operation where ''10 Token
    A'' is swapped for ''1 Token B''. A nominal fee (in this case, $0.03) is included
    in the transaction, which is shared among LPs as a reward for providing liquidity.


    The AMM leverages the concept of liquidity pools, which consist of reserves of
    paired tokens. These reserves are what traders transact against. The liquidity
    shares, represented in the image as ''12 Pool Tokens'', denote the proportional
    ownership of the pool''s total liquidity by the LPs. When an LP contributes liquidity,
    they receive pool tokens, which can be redeemed later for their share of the pool,
    along with a portion of the transaction fees accrued over time.


    The most commonly used pricing mechanism in AMMs is the constant product formula,
    represented as `x * y = k`, where `x` and `y` are the respective quantities of
    the two assets in the liquidity pool, and `k` is a constant. This formula ensures
    that the product of the quantities of the two assets always remains the same,
    maintaining the pool''s balance after trades. The image does not explicitly show
    this formula, but it underlies the swap operation depicted.


    Traders interact directly with the liquidity pool via their wallets. They can
    swap tokens by interacting with the smart contract that governs the liquidity
    pool, as shown in the ''Swap'' section of Figure 8-1. The fees and slippage are
    calculated automatically by the AMM based on the current state of the liquidity
    pool.


    A key principle of DEXs is their decentralised nature. Unlike centralised exchanges,
    DEXs do not hold users'' funds, and all trades are executed via smart contracts
    directly on the blockchain. This minimises counterparty risk and provides transparency
    in the execution of trades.


    For liquidity providers, the primary implication is the potential for earning
    transaction fees. However, they are also exposed to risks like impermanent loss,
    which occurs when the price of tokens in the pool changes significantly after
    they have deposited their assets.


    For traders, DEXs offer the advantage of direct and immediate token swaps with
    potentially lower fees than centralised exchanges. They also benefit from the
    security provided by blockchain technology, as there is no central point of failure.'
