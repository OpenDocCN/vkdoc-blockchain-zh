    1.  It reflects the adoption level of DeFi platforms – a higher TVL suggests a
    larger number of users engaging with the platform, implying trust and stability.


    2.  It provides a sense of the liquidity available within the ecosystem, which
    is crucial for the efficiency of various financial activities such as trading,
    lending and borrowing.


    3.  A high TVL can attract new users, as it implies a thriving platform with robust
    participation.


    Despite its importance, TVL should not be the sole metric for assessing DeFi projects
    as it can fluctuate with market conditions and may not fully represent the utility
    or risk profile of the underlying protocols.


    Data aggregators play a critical role in presenting TVL data, offering a centralised
    view of asset values across various DeFi protocols. These platforms help users
    track overall growth, assess potential investment opportunities and understand
    the dynamic landscape of decentralised finance​​​​​​​​.[^(14)](#616479_1_En_5_Chapter.xhtml#Sec19)^,
    [^(15)](#616479_1_En_5_Chapter.xhtml#Sec19)^, [^(16)](#616479_1_En_5_Chapter.xhtml#Sec19)


    When evaluating the performance of DeFi platforms like Uniswap, Aave and MakerDAO,
    TVL provides insight into user adoption rates, liquidity and overall market presence.
    Substantial growth in TVL across these platforms indicates an increasing shift
    towards decentralised financial solutions and a broader acceptance of blockchain-based
    financial mechanisms over traditional financial systems. This growth not only
    signifies the amount of financial capital flowing into these protocols but also
    underscores their innovative capabilities in reshaping financial access and services.


    ## 5.3 Risks and Challenges of DeFi


    DeFi, while innovative and transformative, faces a spectrum of risks and challenges
    that can potentially hinder its growth and adoption. Here’s a deeper look into
    these issues.'
  trans: '

    ### MakerDAO


    `MakerDAO` 是 `DeFi` 领域的关键项目，因创建与美元挂钩的稳定币 `DAI`，以及运行在以太坊区块链上的去中心化信贷平台 `Maker Protocol`
    而闻名。该协议允许用户通过 `Vault` 这一智能合约系统质押加密货币来生成 `DAI`。


    `Maker Protocol` 采用双代币模型，由治理代币 `MKR` 和稳定币 `DAI` 组成。系统通过一个由抵押债仓（`CDPs`）、自主反馈机制和适当激励的外部参与者组成的动态系统来维持
    `DAI` 的稳定性。


    `DAI` 通过一系列智能合约维持与美元的挂钩，这些合约激励外部参与者来维持供需平衡。`Maker Vaults` 允许用户存入抵押品以换取生成 `DAI`，从而产生一笔债务，该债务会随时间累积利息，称为`稳定费`。要取回抵押品，用户必须偿还其
    `DAI` 债务以及`稳定费`。


    `MakerDAO` 由 `MKR` 代币持有者治理，他们对影响系统的关键决策进行投票。这包括关于接受的抵押品类型、风险参数和系统升级的选择。该治理模型是“科学治理”的一个例子，`MKR`
    持有者管理协议和金融风险，以确保 `DAI` 的稳定性、透明度和效率。


    `MakerDAO` 的协议对 `DeFi` 生态系统产生了重大影响，提供了一种去中心化且稳定的交换媒介。它对波动的抵御能力使其成为一种值得信赖的资产和构建其他
    `DeFi` 应用的基石。该平台的`总锁仓价值（TVL）`体现了其核心地位以及用户对系统的信任。


    该协议经历了多次升级，每次升级都引入了更多安全功能、提高了效率并增强了治理。其中包括引入`多抵押品 DAI`，允许使用各种类型的资产作为抵押品，以及改进治理系统以实现更加去中心化和高效的决策过程。


    `MakerDAO` 的科学治理涉及`执行投票`和`治理民意调查`，允许 `MKR` 持有者积极参与协议的风险管理和战略规划。此外，`Maker Protocol`
    还包括诸如 `DAI` 储蓄率（`DSR`）等功能，为 `DAI` 持有者提供了一种通过持有代币赚取利息的储蓄机制。


    **表 5-6** 重塑金融：`MakerDAO` 应对传统挑战的方法¹²


    | 传统金融面临的挑战 | `MakerDAO` 解决方案 |

    | --- | --- |

    | **利率中心化**：利率很大程度上由美联储等中央银行决定。 | **去中心化利率设定**：利率由 `MKR` 持有者以透明的方式进行治理。 |

    | **金融服务的准入限制**：许多贷款和信贷服务仅对具有一定财务状况的人开放。 | **开放式金融**：`MakerDAO` 通过去中心化治理实现对金融服务的平等访问。
    |

    | **高贷款成本**：传统贷款可能有高额的手续费和管理成本。 | **低成本贷款**：`MakerDAO` 通过智能合约提供手续费极低的贷款。 |

    | **僵化的金融系统**：传统金融系统不灵活且适应个人需求缓慢。 | **灵活的金融工具**：`MakerDAO` 的 `DAI` 储蓄率（`DSR`）和其它功能提供了可定制的用户体验。
    |

    | **金融排斥**：全球有相当一部分人口没有银行账户或银行服务不足。 | **金融包容性**：`MakerDAO` 提供对其稳定币 `DAI` 的无国界全球访问，无论其银行账户状况如何。
    |

    | **货币波动**：传统货币可能波动，影响储蓄和购买力。 | **稳定货币**：`DAI` 与美元软锚定，提供稳定的交换媒介和价值储存手段。 |

    | **缺乏透明度**：传统金融通常对资金如何管理和投资缺乏明确性。 | **透明运营**：`MakerDAO` 的运营在区块链上完全透明且可验证。 |


    总而言之，`MakerDAO` 凭借其创新的稳定币 `DAI` 和 `Maker Protocol`，成为了 `DeFi` 的基石。它解决了通常与加密货币相关的波动性问题，并引入了一个不仅可与传统银行相媲美，而且代表了去中心化金融重大进步的系统。通过其强大的治理和创新功能，`MakerDAO`
    持续在生态系统中扮演关键角色，促进透明度、效率和包容性。


    ### 总锁仓价值（TVL）


    `总锁仓价值（TVL）`是 `DeFi` 领域的一个关键指标，用于衡量投入 `DeFi` 协议和平台的资产总价值。它作为该领域健康状况和活跃度的关键指标，反映了用户对这些去中心化服务的信心和承诺。`TVL`
    包括所有被质押、借贷或作为抵押品的资产。


    要计算 `TVL`，需要汇总存入 `DeFi` 协议的所有资产的当前市场价值。这涉及将每种被锁定的资产数量乘以其当前市场价格。例如，如果一个协议拥有 `100
    个以太坊（ETH）`，且 `ETH` 的当前市场价格为 `$2,000`，那么这部分资产的 `TVL` 将为 `$200,000`。


    `TVL` 的重要性体现在以下几个方面：


    1.  它反映了 `DeFi` 平台的采用水平——更高的 `TVL` 意味着有更多用户与该平台互动，暗示着信任和稳定性。


    2.  它提供了生态系统中可用流动性的概念，这对于交易、借贷等各种金融活动的效率至关重要。


    3.  高 `TVL` 可以吸引新用户，因为它意味着一个具有强大参与度的活跃平台。


    尽管 `TVL` 很重要，但它不应成为评估 `DeFi` 项目的唯一指标，因为它会随着市场状况波动，并且可能无法完全代表底层协议的效用或风险状况。


    数据聚合器在呈现 `TVL` 数据方面发挥着关键作用，提供跨各种 `DeFi` 协议的资产价值的集中视图。这些平台帮助用户追踪整体增长，评估潜在的投资机会，并理解去中心化金融的动态格局​​​​​​​​。¹⁴^,
    ¹⁵^, ¹⁶


    在评估像 `Uniswap`、`Aave` 和 `MakerDAO` 这样的 `DeFi` 平台的表现时，`TVL` 提供了对用户采用率、流动性和整体市场存在的洞察。这些平台
    `TVL` 的显著增长表明，人们正在越来越转向去中心化的金融解决方案，并且对基于区块链的金融机制的接受度超过了传统金融系统。这种增长不仅表明了流入这些协议的金融资本数量，也凸显了它们在重塑金融服务和获取方式方面的创新能力。


    ## DeFi 的风险与挑战


    `DeFi` 虽然具有创新性和变革性，但也面临着一系列可能阻碍其增长和采用的风险与挑战。以下是对这些问题的更深入探讨。

    '
- fmt: '### Security Risks


    The open source nature of DeFi’s smart contracts is a double-edged sword; it fosters
    transparency and community-driven innovation but also exposes vulnerabilities.
    The decentralised nature means that once a smart contract is deployed, it can
    be challenging to alter, making any existing vulnerabilities potentially exploitable.
    High-profile incidents, such as the DAO hack in 2016 and more recent exploits
    like the Flash Loan attacks, serve as case studies of such vulnerabilities. These
    incidents demonstrate the need for rigorous security protocols, including formal
    verification, extensive code auditing and real-time security monitoring to ensure
    the integrity of DeFi applications.


    ### Regulatory Challenges


    DeFi operates in a regulatory grey area. Traditional financial systems are heavily
    regulated with clear compliance procedures for AML (anti-money laundering) and
    KYC. DeFi’s decentralised nature complicates the enforcement of these regulations.
    There’s an ongoing debate on how to reconcile DeFi’s ethos of openness and anonymity
    with the global regulatory landscape’s demands. Regulations could provide legitimacy
    and protection for users, but overly strict policies might stifle innovation or
    push DeFi into the shadows, limiting its potential benefits.


    The Ethereum Name Service (`ENS`) emerges as a bridge between the anonymity of
    blockchain and the necessity for identity verification in DeFi. `ENS` provides
    human-readable names for Ethereum addresses, which enhances the user experience
    but also has the potential to serve as a form of decentralised identity (`DID`).
    This decentralised identity can potentially be linked to a verifiable off-chain
    identity, creating a bridge between the user’s on-chain activities and their real-world
    identity without sacrificing the decentralised ethos of blockchain technology.


    Here’s how `ENS` could interplay with KYC challenges in DeFi:


    * **ENS As DID**: `ENS` names are unique and owned by individuals, similar to
    a domain name, but for blockchain addresses. This aligns with the principles of
    self-sovereign identity (`SSI`), where individuals have ownership and control
    over their identity without relying on a central authority.


    * **Regulatory Compliance**: Integrating `ENS` with KYC processes could enable
    users to prove their identity in a privacy-preserving manner. `ENS` names could
    be associated with credentials verified by third parties without exposing the
    underlying personal data on the blockchain, allowing DeFi platforms to remain
    compliant with regulations.


    * **Reducing Friction for Users**: `ENS` can make interactions with DeFi protocols
    less cumbersome by reducing the need for managing long, hexadecimal wallet addresses.
    Instead, users can engage with DeFi products using their `ENS` names, which could
    also be linked to their verified identities.


    * **Enhanced Trust and Security**: With `ENS` names serving as DIDs, it becomes
    easier to establish trust within the DeFi ecosystem. Verified `ENS` names can
    help mitigate the risk of fraud and improve the reputation of DeFi services.


    * **KYC and AML Integration**: `ENS` names could act as pointers to off-chain
    identity verification processes that meet AML and KYC requirements. This integration
    would maintain the integrity of DeFi’s decentralised model while ensuring compliance
    with global financial regulations.


    To conclude, `ENS` offers a promising path for aligning DeFi with the necessary
    regulatory frameworks while maintaining user autonomy and privacy. It stands as
    a testament to the innovation within blockchain technology, striving to balance
    the decentralised principles of the technology with the practicalities of regulatory
    compliance.


    ### Scalability and Interoperability


    Currently, many DeFi applications are built on the Ethereum network, which has
    struggled with high transaction fees and network congestion due to its popularity.
    These issues highlight the need for scalable solutions. Layer 2 solutions, sharding
    and alternative blockchains are being developed to address these problems. Moreover,
    interoperability is crucial for creating a seamless DeFi ecosystem, where assets
    and data can flow freely between different blockchains and platforms without the
    need for intermediaries.


    ### Market Risks and Volatility


    DeFi markets are often more volatile than traditional markets due to their relative
    infancy, lower liquidity and speculative nature. Participants are exposed to market
    risks, including significant financial loss due to rapid price fluctuations. Moreover,
    the use of leverage in DeFi can amplify losses, leading to the liquidation of
    collateralised positions. Users must navigate impermanent loss, particularly in
    liquidity pools, and the risk of systemic failures precipitated by the cascading
    effects of interdependent protocols.


    Understanding and mitigating these risks requires a concerted effort from developers,
    users, regulators and other stakeholders in the DeFi space. Implementing robust
    security practices, establishing clear regulatory frameworks, improving network
    infrastructure and educating users on market risks are essential steps towards
    a resilient and sustainable DeFi ecosystem.


    ## 5.4 Summary


    This chapter provides an in-depth exploration of Decentralised Finance (DeFi),
    its foundational concepts, and its transformative impact on the traditional financial
    system (TradFi). It begins by examining the core components of DeFi, such as smart
    contracts, permissionless platforms, and the advantages of decentralisation. DeFi’s
    primary innovations, including decentralised exchanges (DEXs), lending platforms,
    stablecoins, insurance protocols, and prediction markets, are explored in detail,
    showcasing how they revolutionise traditional financial services by eliminating
    intermediaries and providing global access to financial tools.


    The chapter also offers a comprehensive analysis of key DeFi protocols such as
    `Uniswap`, `Aave`, and `MakerDAO`, highlighting their contributions to liquidity
    provision, lending, and stablecoin issuance. The role of Total Value Locked (`TVL`)
    as a crucial metric for evaluating DeFi platforms is discussed, providing insight
    into the sector’s health and user engagement.


    Finally, the chapter addresses the risks and challenges associated with DeFi,
    such as security vulnerabilities, regulatory uncertainties, scalability issues,
    and market volatility. While DeFi offers a new, more inclusive financial paradigm,
    it also requires participants to navigate a complex and evolving landscape, balancing
    innovation with emerging risks.'
