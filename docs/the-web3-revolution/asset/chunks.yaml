- fmt: '### Hash Functions


    Hash functions play a central role in blockchain, particularly in the cryptocurrency
    domain, where cryptographic hash functions possess key characteristics essential
    for ensuring security and integrity. The following three properties—collision
    resistance, hiding, and puzzle friendliness—are specifically critical for cryptographic
    hash functions used in cryptocurrencies.


    - **Collision Resistance**: In cryptography, collision resistance is a key attribute
    of hash functions, requiring that for a given hash function `H`, it should be
    computationally infeasible to find two different inputs `x` and `y` such that
    `H(x) = H(y)`. This means, despite the theoretical existence of such input pairs,
    finding them in reality is extremely difficult due to computational resource limitations.
    Collision resistance ensures the uniqueness of transactions in cryptocurrency,
    guaranteeing each transaction generates a unique hash value. Without collision
    resistance, attackers could create two different transactions with the same hash
    value, enabling undetected ledger tampering. In blockchain, as each block’s hash
    value is included in the next block, collision resistance is vital for maintaining
    the integrity of the chain.


    - **Hiding**: The hiding feature of hash functions is important for protecting
    data privacy in cryptography. A hash function with hiding properties means that
    even if the hash value is known, it is not possible to determine which specific
    input value produced it. This feature is typically achieved by combining randomness
    (like random numbers or salt) with the input data, ensuring even slight input
    variations result in significantly different outputs, making it impossible to
    deduce or guess the original data without additional information. In blockchain
    technology, hiding is extremely important as it ensures the privacy of transaction
    details while allowing network nodes to verify the validity of transactions without
    revealing actual data. For instance, Bitcoin’s hash function uses hiding to prevent
    unauthorised access to information about transaction amounts and participant identities.
    This can be likened to the practice of sealing letters with wax in ancient times
    or using envelopes to conceal the contents of a letter. Just as a sealed letter
    ensures that only the intended recipient can access the message, the hiding property
    in hash functions ensures that sensitive transaction details remain private, while
    still allowing the network to verify the authenticity of the transaction. Additionally,
    hiding plays a role in creating cryptocurrency addresses and processing smart
    contracts, further enhancing the security and privacy protection capabilities
    of the blockchain network.


    - **Puzzle Friendliness**: Puzzle friendliness is a unique property of hash functions
    in the cryptocurrency domain. It implies that for a given output value, finding
    an input value that maps to this output is very difficult. In other words, there
    is no effective way to predict which input value will produce a specific hash
    value, unless all possible inputs are tried. In the mining process of cryptocurrencies
    like Bitcoin, puzzle friendliness is crucial. Miners must try a vast number of
    different inputs (including transaction information and a random number) to find
    a hash value that meets the current difficulty target of the network, typically
    meaning the hash value must be less than a certain number. This process is computationally
    intensive, and randomness ensures no shortcuts to complete the task, thus guaranteeing
    network security and the stable issuance of currency.


    These features collectively form the cornerstone of hash functions in cryptocurrency,
    ensuring the security and functionality of the blockchain network.


    ### Encryption


    **Asymmetric Encryption**: Asymmetric encryption is a key technology in blockchain
    to ensure the security of transactions. In this system, the public key encrypts
    information into ciphertext for public transmission, while the private key decrypts
    the ciphertext back into plaintext, accessible only to the holder of the private
    key, thus ensuring the confidentiality of the information. In blockchain transactions,
    participants use their private key to digitally sign transactions. The corresponding
    public key can be used by others to verify the legitimacy of the signature, but
    not to forge it, thereby ensuring the authenticity and non-repudiation of the
    transaction.


    **Merkle Trees**: Merkle trees are structures optimised for validating data. They
    aggregate transaction data through hash functions, where each leaf node contains
    the hash value of an individual transaction, and internal nodes contain the hash
    values of their child nodes. This structure is highly efficient in ensuring data
    integrity and speeding up information verification, thus working in conjunction
    with asymmetric encryption to ensure the completeness and validity of data.


    **Hash Pointers and Data Structures**: The hash pointer structure records the
    hash value of data and pointers to other parts of the data structure. Blockchain
    uses hash pointers to link each block into a chain, where each block contains
    the hash value of the previous block, establishing the immutability and historical
    continuity of the blockchain. This sequential linking maintains a timestamped,
    orderly record of transactions, providing strong support for the authenticity
    of data. By linking each block to the hash value of its predecessor, it not only
    confirms the data’s immutability but also establishes a verifiable, sequentially
    arranged chain of transaction records.


    Combining these three elements, blockchain provides a transparent, secure and
    unalterable environment for transactions, laying the foundation for building trust
    and value transfer.


    Table [1-2](#616479_1_En_1_Chapter.xhtml#Tab2) is a comparison table of the cryptographic
    functions used by Bitcoin (BTC) and Ethereum (ETH).


    **Table 1-2** Cryptographic Function for BTC and ETH


    | Feature | Bitcoin (BTC) | Ethereum (ETH) |

    | --- | --- | --- |

    | Hash Function | SHA-256 | Keccak-256 (variant of SHA-3) |

    | Signature Algorithm | ECDSA (Elliptic Curve Digital Signature Algorithm) | ECDSA
    (Elliptic Curve Digital Signature Algorithm) |


    This table illustrates the differences and similarities in the cryptographic functions
    employed by both Bitcoin and Ethereum. While both use the `ECDSA` algorithm for
    digital signatures, they differ in their choice of hash functions, with Bitcoin
    using `SHA-256` and Ethereum using `Keccak-256`.'
  raw: '### Hash Functions


    Hash functions play a central role in blockchain, particularly in the cryptocurrency
    domain, where cryptographic hash functions possess key characteristics essential
    for ensuring security and integrity. The following three properties—collision
    resistance, hiding, and puzzle friendliness—are specifically critical for cryptographic
    hash functions used in cryptocurrencies.


    *   **Collision Resistance**: In cryptography, collision resistance is a key attribute
    of hash functions, requiring that for a given hash function H, it should be computationally
    infeasible to find two different inputs x and y such that H(x) = H(y). This means,
    despite the theoretical existence of such input pairs, finding them in reality
    is extremely difficult due to computational resource limitations. Collision resistance
    ensures the uniqueness of transactions in cryptocurrency, guaranteeing each transaction
    generates a unique hash value. Without collision resistance, attackers could create
    two different transactions with the same hash value, enabling undetected ledger
    tampering. In blockchain, as each block’s hash value is included in the next block,
    collision resistance is vital for maintaining the integrity of the chain.


    *   **Hiding**: The hiding feature of hash functions is important for protecting
    data privacy in cryptography. A hash function with hiding properties means that
    even if the hash value is known, it is not possible to determine which specific
    input value produced it. This feature is typically achieved by combining randomness
    (like random numbers or salt) with the input data, ensuring even slight input
    variations result in significantly different outputs, making it impossible to
    deduce or guess the original data without additional information. In blockchain
    technology, hiding is extremely important as it ensures the privacy of transaction
    details while allowing network nodes to verify the validity of transactions without
    revealing actual data. For instance, Bitcoin’s hash function uses hiding to prevent
    unauthorised access to information about transaction amounts and participant identities.
    This can be likened to the practice of sealing letters with wax in ancient times
    or using envelopes to conceal the contents of a letter. Just as a sealed letter
    ensures that only the intended recipient can access the message, the hiding property
    in hash functions ensures that sensitive transaction details remain private, while
    still allowing the network to verify the authenticity of the transaction. Additionally,
    hiding plays a role in creating cryptocurrency addresses and processing smart
    contracts, further enhancing the security and privacy protection capabilities
    of the blockchain network.


    *   **Puzzle Friendliness**: Puzzle friendliness is a unique property of hash
