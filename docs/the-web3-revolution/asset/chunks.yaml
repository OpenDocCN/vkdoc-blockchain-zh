    # 6. Tokenised Real-World Assets (RWA) and Decentralised Physical Infrastructure
    Networks (DePIN)


    ## 6.1 Introduction to RWA


    RWAs encapsulate both tangible and intangible assets that exist in the physical
    world but can be digitally represented through tokenisation on blockchain or other
    distributed ledger technologies (DLTs). These assets cover a wide array, including
    cash, commodities, equities, bonds, real estate, art and intellectual property.
    RWAs play a crucial role in bridging the gap between traditional financial systems
    and the rapidly evolving digital economy, promising a pathway to more accessible,
    transparent and efficient asset management and investment opportunities.


    - **From the Cryptocurrency Perspective**: In the crypto realm, the logic surrounding
    RWAs is centred on transferring the income rights of income-generating assets,
    such as US Treasuries, fixed income and stocks, onto the blockchain. It involves
    leveraging off-chain assets for on-chain collateralised loans and bringing various
    RWAs online for trading (e.g. minerals, real estate, gold). This unilateral demand
    from the crypto world for RWAs encounters numerous regulatory hurdles, illustrating
    a complex yet burgeoning interest in integrating the tangible with the digital.


    - **From the Traditional Finance (TradFi) Perspective**: From the TradFi viewpoint,
    RWA tokenisation is seen as a bidirectional bridge towards DeFi. It is considered
    a revolutionary tool that combines the reliability and vastness of traditional
    assets with the efficiency and innovation of blockchain technology. For TradFi
    institutions, asset tokenisation using DeFi protocols opens new avenues for enhancing
    liquidity, reducing operational costs and addressing long-standing inefficiencies
    within the system. It represents an evolution towards a more integrated financial
    system that utilises blockchain for transparent, efficient and inclusive asset
    markets.'
