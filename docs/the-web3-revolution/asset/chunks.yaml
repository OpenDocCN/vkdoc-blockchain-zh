    ### 图 4-15

    MetaMask 钱包上的更新余额 – Sepolia


    此交易虽未在以太坊主网上进行，但可在 `Etherscan` 的 `Sepolia` 测试网版本上验证。只需在 `Etherscan` 页面角落查找 `Sepolia`
    测试网指示器即可。这使您能够追踪交易并确认测试 ETH 已记入您的账户。


    ### 图 4-16

    Sepolia 测试网 Etherscan（来源：[*https://sepolia.etherscan.io/*](https://sepolia.etherscan.io/)）


    此过程不仅允许新手免费获取测试资产，还能让他们直接与区块链环境交互，从而促进对其操作原理及潜在应用的实际理解。


    ## 4.3 通过 Layer 2 解决方案拓展视野


    以太坊网络上的 Layer 2 解决方案至关重要，因为它们解决了去中心化、可扩展性和安全性这三难问题的区块链困境。区块链三难困境指出，同时实现这三个特性极具挑战性；通常情况下，区块链只能在其中两个方面表现出色。以太坊与其他
    Layer 1 区块链一样，是去中心化且安全的，但在可扩展性方面一直面临挑战，尤其是随着网络的发展和区块空间需求的增加。这导致在拥堵期间出现高额交易费用和较慢的处理时间。


    ### 图 4-17

    区块链三难困境


    Layer 2 解决方案（如 Rollups）旨在通过在主链之外处理交易来缓解这些问题，从而提高吞吐量并降低成本，同时不影响网络的去中心化或安全性。Rollups
    的工作原理是将多笔交易分组或“卷起”成一笔交易，然后提交至以太坊主链。此过程有助于缓解网络拥塞，并使交易更快、更便宜。


    Rollups 主要有两种类型：`Optimistic Rollups` 和 `ZK-Rollups`。`Optimistic Rollups` 默认假设交易有效，仅在出现挑战时运行计算；而
    `ZK-Rollups` 使用零知识证明来验证交易的有效性，而无需透露其内容。两者各有优缺点和权衡。例如，`ZK-Rollups` 提供更快的交易速度和更低的费用，但需要更复杂的环境，可能导致中心化。另一方面，`Optimistic
    Rollups` 更易于实现，但存在一个挑战期，可能会延迟提现。


    以下是基于几个关键因素的差异总结：


    1.  **安全性**：`Optimistic Rollups` 依赖欺诈证明和经济激励来确保交易有效性，只需一个诚实节点即可挑战欺诈。然而，这意味着安全性依赖于诚实参与者的存在。另一方面，`ZK-Rollups`
    使用加密证明（零知识证明）来验证交易，提供数学上的安全保障，无需依赖人工验证者。


    2.  **成本**：`Optimistic Rollups` 通常计算成本较低，因为它们不需要专门的硬件来进行欺诈证明。然而，它们会将所有交易数据发布到以太坊主链，这可能会增加成本。`ZK-Rollups`
    可以通过高效的数据压缩技术降低成本，但生成加密证明对硬件要求更高，这可能使用户成本更高。


    3.  **交易最终性**：在 `Optimistic Rollups` 中，存在一个挑战期，可能会延迟交易的最终确认。`ZK-Rollups` 由于有效性证明，可以立即提现，这些证明能无延迟地确认交易的真实性。


    4.  **EVM 兼容性**：`Optimistic Rollups` 与以太坊虚拟机 (EVM) 兼容，使开发者更容易迁移现有的基于以太坊的应用程序。`ZK-Rollups`
    不完全兼容 EVM，这可能会给开发者带来更高的门槛。


    至于具体的项目示例，`Arbitrum` 和 `Optimism` 等 `Optimistic Rollups` 已被 `Uniswap` 和 `SushiSwap`
    等基于以太坊的去中心化交易所使用。`ZK-Rollups`，例如 `Polygon ID` 用于私有链上验证的方案，提供了高标准的安全性和隐私性，这对于身份验证协议至关重要。


    表 4-2 展示了使用这些技术的项目对比。


    **表 4-2** Optimistic Rollups 与 ZK-Rollups 对比


    | 特性 | Optimistic Rollups 示例 | ZK-Rollups 示例 |

    | --- | --- | --- |

    | EVM 兼容性 | `Arbitrum`, `Optimism` | `Polygon zkEVM`, `Scroll zkEVM` |

    | 交易成本 | 较低，因为链上数据量最小 | 可能更高，由于需要生成证明 |

    | 安全性 | 基于经济激励和欺诈证明 | 基于加密证明 |

    | 用例 | DeFi 应用、去中心化交易所 | 身份验证、私有加密货币交易 |


    这些示例突显了在 `Optimistic` 和 `ZK-Rollups` 之间的选择可能取决于项目的具体需求和优先级，例如成本考量、安全要求以及期望的 EVM
    兼容性水平。⁴


    Layer 2 解决方案的开发和实施对以太坊的未来至关重要，因为它们为更高的可扩展性提供了途径，这对于更广泛的采用和网络的整体增长是必要的。随着 `以太坊
    2.0` 和分片技术的到来，效率和交易吞吐量预计将进一步提高，从而巩固网络在区块链生态系统中的地位​​​​。⁵^、⁶


    ## 4.4 本章小结


    本章探讨了 Web3 的基础组件，重点介绍了以太坊的钱包、水龙头和 Layer 2 解决方案。首先强调了区块链钱包的关键作用，它不仅作为数字存储解决方案，更是个人进入去中心化网络的门户。强调了外部拥有账户（`EOA`）和合约账户之间的区别，并以
    `Coinbase 钱包` 和 `MetaMask` 为例，说明了用户如何安全地管理数字资产和身份。


    接着，本章过渡到水龙头的概念，即分发少量加密货币的工具，主要用于像 `Goerli` 和 `Sepolia` 这样的测试网络。这些水龙头允许用户（尤其是新手）在没有经济风险的情况下接触区块链技术，帮助他们以实践动手的方式理解交易流程。


    最后，讨论了 Layer 2 解决方案及其在克服以太坊可扩展性挑战方面的重要性。分析了 `Optimistic Rollups` 和 `ZK-Rollups`
    等技术，展示了它们在安全性、成本和交易最终性方面各自的优势和权衡。这些解决方案对于解决区块链三难困境、确保以太坊在保持去中心化和安全性的同时实现扩展至关重要。


    通过探索，本章强调了以太坊及其生态系统的持续演进，将其定位为 Web3 基础设施发展的领导者。

