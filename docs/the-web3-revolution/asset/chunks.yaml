    # 6. 代币化的现实世界资产（RWA）与去中心化物理基础设施网络（DePIN）


    ## 6.1 RWA 简介


    RWA 涵盖了存在于物理世界中的有形和无形资产，但可以通过代币化在区块链或其他分布式账本技术（DLT）上进行数字表示。这些资产涵盖范围广泛，包括现金、大宗商品、股票、债券、房地产、艺术品和知识产权。RWA
    在缩小传统金融体系与快速发展的数字经济之间的差距方面发挥着至关重要的作用，它为获得更易获取、更透明、更高效的资产管理和投资机会铺平了道路。


    - **从加密货币视角来看**：在加密领域，围绕 RWA 的逻辑核心在于将收益型资产（例如美国国债、固定收益产品和股票）的收益权转移到区块链上。这涉及利用链下资产进行链上抵押贷款，并将各种
    RWA（例如矿产、房地产、黄金）引入线上进行交易。加密世界对 RWA 的这种单向需求面临着众多监管障碍，这说明了将实体资产与数字资产融合这一复杂但日益增长的兴趣。


    - **从传统金融（TradFi）视角来看**：从 TradFi 的角度看，RWA 代币化被视为通往 DeFi 的双向桥梁。它被认为是一种革命性工具，将传统资产的可靠性与广泛性同区块链技术的效率与创新相结合。对于
    TradFi 机构而言，使用 DeFi 协议进行资产代币化开辟了新的途径，以增强流动性、降低运营成本并解决系统中长期存在的效率低下问题。这代表了向更加一体化的金融体系演进，该体系利用区块链技术实现透明、高效和包容的资产市场。

    '
- fmt: '### The Blockchain As Ideal Infrastructure


    Blockchain technology stands as the epitome of a ''computational system'' within
    the financial domain, primarily due to its ability to automate and secure financial
    transactions and asset management through smart contracts and decentralised consensus
    mechanisms. This contrasts sharply with ''non-computational systems'' found in
    traditional finance (`TradFi`), which rely heavily on manual processes, intermediaries
    and regulatory frameworks based on trust in centralised institutions.


    `Computational systems`, like blockchain, excel in executing repetitive processes
    and delivering verifiable outcomes without the need for trust or direct human
    intervention. They are characterised by their transparency, immutability and the
    capacity to facilitate direct ownership, fractionalisation of assets and global
    access. This automation of trust and execution not only reduces operational inefficiencies
    but also opens up new avenues for financial innovation, such as the tokenisation
    of `RWAs`.


    On the other hand, `non-computational systems` in `TradFi` encompass those aspects
    of finance that remain largely outside the purview of automation and digital trust.
    These include the nuanced decisions based on human judgement, such as credit assessments,
    which rely on interpersonal trust, historical financial behaviour and regulatory
    compliance. While blockchain can streamline many aspects of financial transactions,
    it cannot fully replace the human elements and the existing legal and regulatory
    frameworks that underpin non-computational systems.


    The tokenisation of `RWAs` showcases the convergence of computational and non-computational
    systems, bringing tangible and intangible assets onto the blockchain. This process
    not only enhances the liquidity, accessibility and efficiency of asset management
    but also underscores the critical need for an integrated approach that respects
    the legal, regulatory and human contexts of asset ownership and transfer.


    In essence, the future of finance and asset management lies in a harmonious integration
    of blockchain''s computational capabilities with the non-computational aspects
    of traditional financial systems. This synergy promises to unlock unprecedented
    levels of efficiency, transparency and inclusivity in global finance, provided
    that challenges related to regulatory compliance, security and the seamless interaction
    between digital and physical assets are effectively addressed.


    ### The Disruptive Impact of RWA Tokenisation on TradFi


    The tokenisation of `RWAs` heralds a transformative shift in the financial sector,
    marrying the robust, time-tested value of tangible and intangible assets with
    the cutting-edge technology of blockchain. This fusion not only enhances the traditional
    financial landscape but also sets the stage for a radical departure from long-standing
    norms thanks to the inherent benefits of blockchain technology: decentralisation,
    transparency and immutability. The core of this disruption lies in the application
    of computational finance through decentralised finance (`DeFi`) innovations, fundamentally
    redefining how assets are managed, traded and conceptualised.


    - **Enhanced Liquidity and Global Accessibility**: One of the cornerstone benefits
    of `RWA` tokenisation is the unprecedented liquidity and accessibility it introduces
    to assets once bound by the constraints of traditional markets. Digital tokens
    representing `RWAs` can be traded 24/7 on global platforms, transcending geographical
    boundaries and the limitations of standard market operating hours. This continuous
    trading cycle not only increases liquidity but also broadens market participation,
    democratising access to investment opportunities that were previously limited
    to a select few.


    - **Inherent Transparency and Security**: Blockchain''s inherent transparency
    acts as a beacon of trust, significantly boosting investor confidence. This technology
    mitigates the risks associated with fraud and ownership disputes, laying a clear
    trail of asset ownership and transaction history that is immutable and verifiable
    by all parties involved. Furthermore, the utilisation of smart contracts automates
    and secures the management and transaction processes of tokenised assets, ensuring
    each step is executed reliably and without tampering, thereby reinforcing the
    security of digital asset transactions.


    - **Operational Efficiency and Cost Reduction**: The process of tokenising `RWAs`
    on a blockchain infrastructure notably streamlines asset management, removing
    the costly and cumbersome layers associated with intermediaries, legal proceedings
    and extensive paperwork. This efficiency not only makes high-value investments
    more accessible to a wider audience but also reduces the operational costs involved
    in asset transactions, fostering a more inclusive financial ecosystem.


    - **Computational Finance and the Paradigm Shift in TradFi**: At the heart of
    `RWA` tokenisation''s disruptive potential is the distinction between computational
    and non-computational systems within the realm of finance. Blockchain, a computational
    system, excels in executing complex algorithms and maintaining an immutable ledger
    of transactions, providing a solid foundation for the automation and innovation
    `DeFi` brings to financial services. This new paradigm facilitates a fully automated
    environment for executing traditional financial operations such as lending, borrowing
    and asset management without manual intervention, signifying a profound shift
    towards more efficient, secure and accessible financial services.


    - **Programmability and Transparency in Financial Products**: Moreover, tokenisation
    introduces a layer of programmability into financial operations, especially benefiting
    sectors like the derivatives market and `SME` financing. This feature allows for
    the creation of innovative financial products, enhancing liquidity, and access
    to capital while maintaining transparency and minimising risks. The programmability
    inherent in tokenised `RWAs` not only simplifies the creation and management of
    financial products but also ensures these processes are conducted with a higher
    degree of transparency and security.


    The integration of `RWA` with blockchain and `DeFi` innovations marks a pivotal
    moment in the evolution of traditional finance. By capitalising on the efficiencies
    of computational finance, the `DeFi` ecosystem is set to streamline, expand and
    revolutionise financial services, rendering them more accessible, efficient and
    secure for all. As such, the disruptive impact of `RWA` tokenisation on traditional
    finance is not merely a speculative future but an unfolding reality that promises
    to reshape the financial landscape in profound ways.'
