  trans: "\n### 新加坡 – 新加坡金融管理局 (MAS)⁷\n\n新加坡金融管理局（MAS）在监管数字支付代币（DPT）领域取得了重大进展，展现出在数字代币领域确保用户保护和稳定性的积极主动态度。通过对`《支付服务法》`（`PS\
    \ Act`）及其附属立法的近期修订，MAS 显著扩大了监管范围，涵盖了更广泛的支付服务，特别强调了对 DPT 服务提供商的用户保护和金融稳定。\n\n此次扩展将\
    \ DPT 的托管服务、促进 DPT 在账户间的转移、促进 DPT 兑换以及促进跨境资金转移纳入监管，无论这些资金是否在新加坡接收或收取。至关重要的是，这包括了提供商不直接处理资金或\
    \ DPT 的服务，标志着一种全面的监管方法。\n\n根据修订后的框架，MAS 有权对 DPT 服务提供商执行反洗钱、打击恐怖主义融资、用户保护和金融稳定性要求。这一转变不仅是监管性的，更是前瞻性的，确保随着数字代币格局的演变，保护措施也能同步发展，以保护消费者和更广泛的金融体系。\n\
    \n修订后的法规要求，从事目前属于`《支付服务法》`扩展范围活动的实体，若希望暂时继续这些活动，须在 30 天内通知 MAS，并在六个月内提交许可证申请。该流程包括提交一份关于该实体遵守相关要求的证明报告，强调了\
    \ MAS 致力于严格监管的承诺。\n\n法规的一个重大新增内容涉及客户资产的保护。这些规则将在颁布之日起六个月后生效，强制要求将客户资产在信托账户中进行隔离、妥善记录，并实施稳健的系统和控制措施，以确保这些资产的完整性和安全性。\n\
    \nMAS 近期的修订凸显了新加坡在数字支付代币方面的前瞻性立场。通过扩大监管范围，MAS 不仅旨在保护用户，还致力于为数字支付服务的增长和创新培育一个稳定、可信的环境。这一发展是新加坡将自己定位为金融科技和数字金融全球领导者这一更广泛战略的关键一步，反映了对技术创新与监管监督之间动态相互作用的细致理解。\n\
    \n### 香港 – 金融管理局 (HKMA)⁸\n\n为应对不断变化的数字资产格局，香港金融管理局（HKMA）已采取重要措施来加强该地区加密货币托管服务的安全性和完整性。通过其《预期标准》文件中概述的全面指南，HKMA\
    \ 建立了严格的规程，以确保提供数字资产托管服务的公司遵守严格的风险管理、客户保护和运营韧性实践。\n\nHKMA 指南的一个关键焦点是强制将客户的数字资产与托管公司自身的资产隔离，确保在公司破产的情况下，客户的资产仍受到保护，并与公司资产区分开来。这一要求不仅保护了客户资产，也促进了新兴数字资产领域的信任和稳定性。\n\
    \n此外，HKMA 期望授权机构进行全面的风险评估，并实施稳健的政策来有效管理和缓解已识别的风险。这种综合方法涵盖了治理、运营以及潜在利益冲突的管理，突显了\
    \ HKMA 致力于在行业内维持高实践标准的承诺。\n\n此外，该指南明确了需要充足资源（包括专业知识和人力）来负责任地管理托管服务的必要性。它强调了员工和高级管理层需具备有效履行职责所需知识和技能的重要性，确保托管活动以最高水平的能力和谨慎态度进行。\n\
    \nHKMA 的指南还涉及保护客户数字资产免受盗窃、欺诈、疏忽和其他形式侵占的关键方面。公司须建立并维持有效的控制措施，以最大程度地降低损失风险，这体现了\
    \ HKMA 在保护消费者和确保托管服务韧性方面的积极立场。\n\n针对诸如 `FTX`、`Terra` 和 `Three Arrows` 等主要平台崩溃的回应，HKMA\
    \ 的法规是加强香港加密货币托管服务监管框架的一项及时且必要的措施。通过设定明确的期望和标准，HKMA 旨在培育一个安全、可靠和透明的数字资产环境，这反映了香港重夺领先加密货币中心地位的雄心。\n\
    \n选择这些监管机构的原因在于它们处于金融创新前沿的影响力角色。它们定义代币的方法对数字资产融入传统金融体系以及未来监管框架的预期这一讨论做出了重要贡献。本比较分析旨在提供对主要金融司法辖区监管立场的结构性理解，阐明代币分类的多样性及其对全球数字资产格局的影响。\n\
    \n**表 11-1**  \n不同司法管辖区的代币定义\n"
