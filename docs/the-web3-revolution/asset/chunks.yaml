    \n![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig10_HTML.jpg)\n\nFigure 4-10\n\
    \nYour MetaMask Externally Owned Account Wallet Address\n\nWhen you open the MetaMask\
    \ extension from your browser’s toolbar, you are presented with a clean and intuitive\
    \ interface, designed to make your journey into Web3 as seamless as possible.\n\
    \nClicking the three dots in the upper-right corner reveals a drop-down menu packed\
