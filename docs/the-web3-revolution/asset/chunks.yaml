- fmt: "## 3.2 Getting Started with Smart Contracts\n\nA smart contract is a self-executing\
    \ contract with the terms of the agreement directly written into lines of code.\
    \ They are deployed on the blockchain and run exactly as programmed without any\
    \ possibility of downtime, fraud, censorship or third-party interference. Smart\
    \ contracts allow the performance of credible transactions without third parties.\
    \ These transactions are trackable and irreversible.\n\nThe following provides\
    \ the general architecture of smart contracts:\n\n1. **Structure and Components**\n\
    \   - **Contract Declaration**: Begins with `contract ContractName { }`. This\
    \ is akin to declaring a class in object-oriented programming.\n   - **State Variables**:\
    \ These are variables stored on the contract permanently. They represent the contract’s\
    \ state (e.g. `uint public count;` to store a numeric value).\n   - **Constructor**:\
    \ A special function called at the time of contract deployment to initialise the\
    \ contract’s state (e.g. `constructor() public { count = 0; }`).\n   - **Functions**:\
    \ Functions allow the smart contract to interact with other contracts and perform\
    \ actions. They can change the state or return some data (e.g. `function incrementCounter()\
    \ public { count += 1; }`).\n   - **Function Modifiers**: Used to change the behaviour\
    \ of a function (e.g. visibility like `public` or `private` or custom modifiers\
    \ for access control).\n   - **Events**: Events allow logging to the Ethereum\
    \ blockchain. Clients (like web3.js) can listen for these events (e.g. `event\
    \ ValueChanged(uint newValue);`).\n\n2. **Programming Language**\n   - **Solidity**:\
    \ The primary language for writing Ethereum smart contracts. It’s a contract-oriented,\
    \ high-level language influenced by C++, Python and JavaScript.\n\n3. **Execution\
    \ Environment**\n   - Executed on the Ethereum Virtual Machine (EVM) – an isolated\
    \ runtime environment.\n\n4. **Deployment and Interaction**\n   - **Deployment**:\
    \ After writing a smart contract, it’s compiled and deployed to the Ethereum blockchain,\
    \ where it gets a unique address.\n   - **Interaction**: Once deployed, it can\
    \ be interacted with through Ethereum transactions or from a web interface using\
    \ a library like `web3.js`.\n\nIn Solidity, the main programming language used\
    \ for Ethereum smart contracts, state variables can be declared with different\
    \ visibility specifiers: `public`, `private`, `internal` and `external`. These\
    \ specifiers affect how these variables can be accessed and manipulated within\
    \ and outside of the contract. Here’s a brief overview of each:\n\n- **Public**\n\
    \  - Public state variables are automatically accessible externally and internally\
    \ in the smart contract. Solidity automatically creates a getter function for\
    \ public variables.\n  - These can be read from any contract and externally via\
    \ transactions.\n\n- **Private**\n  - Private state variables are only accessible\
    \ within the contract they are defined in and not in derived contracts.\n  - No\
    \ contracts outside the one where the private variable is declared can read or\
    \ modify these, making them suitable for sensitive data that should not be exposed.\n\
    \n- **Internal**\n  - Internal state variables are accessible within the contract\
    \ they are defined in and by other contracts that inherit from it.\n  - They cannot\
    \ be accessed externally, which means that no external calls can view or modify\
    \ these variables, only transactions or calls within the contract or its derivatives.\n\
    \n- **External**\n  - External is not used for state variables but for functions.\
    \ It specifies that the function can only be called from outside the contract\
    \ and not internally, except when using `this.functionName()`.\n\nKey differences:\n\
    \n- **Accessibility**: Public variables are the most accessible, followed by internal\
    \ and then private. External is not applicable to state variables.\n- **Use Cases**\n\
    \  - Use `public` for variables that need to be readily readable from outside\
    \ the contract without a custom getter function.\n  - Use `private` for sensitive\
    \ data that should only be manipulated by the contract’s functions.\n  - Use `internal`\
    \ for variables that should be accessible to derived contracts but not outside\
    \ the smart contract framework.\n\nEach specifier plays a crucial role in defining\
    \ the security and functionality of a smart contract by controlling access to\
    \ its data, ensuring that each variable is exposed only as necessary to support\
    \ the contract’s operations and security requirements.\n\nListing [3-1](#616479_1_En_3_Chapter.xhtml#PC1)\
    \ provides the basic contract `SimpleStorage` that allows storing and retrieving\
    \ a `uint` (unsigned integer). The `set` function updates `storedData`, and `get`\
    \ returns its current value.\n\n```\npragma solidity ^0.5.0;\ncontract SimpleStorage\
    \ {\nuint storedData;\nfunction set(uint x) public {\nstoredData = x;\n}\nfunction\
    \ get() public view returns (uint) {\nreturn storedData;\n}\n}\nListing 3-1\n\
    Simple Smart Contract Example – 1\n```\n\nSmart contracts are the cornerstone\
    \ of Ethereum’s functionality, enabling automated, transparent and secure transactions\
    \ on the blockchain. Understanding their architecture and learning the basics\
    \ of Solidity is the first step towards building decentralised applications and\
    \ systems on the Ethereum platform. The provided example demonstrates a fundamental\
    \ smart contract, forming a basis for more advanced and complex contracts.\n\n\
    ## 3.3 Introduction to Remix – Ethereum IDE\n\nRemix, accessible via [`https://remix.ethereum.org/`](https://remix.ethereum.org/),\
    \ is a powerful, open source web and desktop application that is widely used for\
    \ Ethereum smart contract development. It’s an integrated development environment\
    \ (IDE) designed specifically for writing, testing, debugging and deploying smart\
    \ contracts written in Solidity, the primary programming language for Ethereum.\n\
    \n![Figure 3-1](images/616479_1_En_3_Chapter/616479_1_En_3_Fig1_HTML.jpg)\n\n\
    Key features of Remix include:\n\n1. **Accessible and User-Friendly Interface**\n\
    \   - **Web Based**: No need to install any software; it’s accessible directly\
    \ through the browser.\n   - **Desktop Version**: For offline development, a desktop\
    \ version is also available.\n\n2. **Smart Contract Development**\n   - **Solidity\
    \ Editor**: Provides an advanced code editor for writing Solidity contracts with\
    \ features like syntax highlighting and error checking.\n   - **Compilation**:\
    \ Remix compiles smart contracts and provides detailed information about warnings\
    \ and errors.\n\n3. **Testing and Debugging**\n   - **Built-in Testing Environment**:\
    \ Allows for easy testing of smart contracts within the IDE.\n   - **Debugging\
    \ Tools**: Offers step-by-step debugging to analyse and optimise code.\n\n4. **Deployment\
    \ and Interaction**\n   - **Deploy on Various Networks**: Enables deploying contracts\
    \ on Ethereum test networks (like Ropsten, Kovan, Rinkeby) or the Ethereum mainnet.\n\
    \   - **Interaction Interface**: Once deployed, Remix provides an interface to\
    \ interact with the contract functions.\n\n5. **Plug-ins and Extensibility**\n\
    \   - **Extensive Plug-in Support**: Offers a range of plug-ins for additional\
    \ functionalities like static analysis, gas estimation and more.\n   - **Custom\
    \ Plug-ins**: Developers can create and integrate their own plug-ins for personalised\
    \ needs."
  raw: "## 3.2 Getting Started with Smart Contracts\n\nA smart contract is a self-executing\
    \ contract with the terms of the agreement directly written into lines of code.\
    \ They are deployed on the blockchain and run exactly as programmed without any\
    \ possibility of downtime, fraud, censorship or third-party interference. Smart\
    \ contracts allow the performance of credible transactions without third parties.\
    \ These transactions are trackable and irreversible.\n\nThe following provides\
    \ the general architecture of smart contracts:\n\n1.  **Structure and Components**\n\
    \    *   **Contract Declaration**: Begins with **contract ContractName { }**.\
    \ This is akin to declaring a class in object-oriented programming.\n\n*   **State\
    \ Variables**: These are variables stored on the contract permanently. They represent\
    \ the contract’s state (e.g. **uint public count;** to store a numeric value).\n\
    \n*   **Constructor**: A special function called at the time of contract deployment\
    \ to initialise the contract’s state (e.g. **constructor() public { count = 0;\
    \ }**).\n\n*   **Functions**: Functions allow the smart contract to interact with\
    \ other contracts and perform actions. They can change the state or return some\
    \ data (e.g. **function incrementCounter() public { count += 1; }**).\n\n*   **Function\
    \ Modifiers**: Used to change the behaviour of a function (e.g. visibility like\
    \ **public** or **private** or custom modifiers for access control).\n\n*   **Events**:\
    \ Events allow logging to the Ethereum blockchain. Clients (like web3.js) can\
    \ listen for these events (e.g. **event ValueChanged(uint newValue);**).\n\n2.\
    \  **Programming Language**\n    *   **Solidity**: The primary language for writing\
    \ Ethereum smart contracts. It’s a contract-oriented, high-level language influenced\
    \ by C++, Python and JavaScript.\n\n3.  **Execution Environment**\n    *   Executed\
    \ on the Ethereum Virtual Machine (EVM) – an isolated runtime environment.\n\n\
    4.  **Deployment and Interaction**\n    *   **Deployment**: After writing a smart\
    \ contract, it’s compiled and deployed to the Ethereum blockchain, where it gets\
    \ a unique address.\n\n*   **Interaction**: Once deployed, it can be interacted\
    \ with through Ethereum transactions or from a web interface using a library like\
    \ web3.js.\n\nIn Solidity, the main programming language used for Ethereum smart\
    \ contracts, state variables can be declared with different visibility specifiers:\
    \ public, private, internal and external. These specifiers affect how these variables\
    \ can be accessed and manipulated within and outside of the contract. Here’s a\
    \ brief overview of each:\n\n*   **Public**\n    *   Public state variables are\
    \ automatically accessible externally and internally in the smart contract. Solidity\
    \ automatically creates a getter function for public variables.\n\n*   These can\
    \ be read from any contract and externally via transactions.\n\n*   **Private**\n\
    \    *   Private state variables are only accessible within the contract they\
    \ are defined in and not in derived contracts.\n\n*   No contracts outside the\
    \ one where the private variable is declared can read or modify these, making\
    \ them suitable for sensitive data that should not be exposed.\n\n*   **Internal**\n\
    \    *   Internal state variables are accessible within the contract they are\
    \ defined in and by other contracts that inherit from it.\n\n*   They cannot be\
    \ accessed externally, which means that no external calls can view or modify these\
    \ variables, only transactions or calls within the contract or its derivatives.\n\
    \n*   **External**\n    *   External is not used for state variables but for functions.\
    \ It specifies that the function can only be called from outside the contract\
    \ and not internally, except when using this.functionName().\n\nKey differences:\n\
    \n*   **Accessibility**: Public variables are the most accessible, followed by\
    \ internal and then private. External is not applicable to state variables.\n\n\
    *   **Use Cases**\n    *   Use public for variables that need to be readily readable\
    \ from outside the contract without a custom getter function.\n\n*   Use private\
    \ for sensitive data that should only be manipulated by the contract’s functions.\n\
    \n*   Use internal for variables that should be accessible to derived contracts\
    \ but not outside the smart contract framework.\n\nEach specifier plays a crucial\
    \ role in defining the security and functionality of a smart contract by controlling\
    \ access to its data, ensuring that each variable is exposed only as necessary\
    \ to support the contract’s operations and security requirements.\n\nListing [3-1](#616479_1_En_3_Chapter.xhtml#PC1)\
    \ provides the basic contract **SimpleStorage** that allows storing and retrieving\
    \ a uint (unsigned integer). The **set** function updates **storedData**, and\
    \ **get** returns its current value.\n\n```\npragma solidity ^0.5.0;\ncontract\
    \ SimpleStorage {\nuint storedData;\nfunction set(uint x) public {\nstoredData\
    \ = x;\n}\nfunction get() public view returns (uint) {\nreturn storedData;\n}\n\
    }\nListing 3-1\nSimple Smart Contract Example – 1\n```\n\nSmart contracts are\
    \ the cornerstone of Ethereum’s functionality, enabling automated, transparent\
    \ and secure transactions on the blockchain. Understanding their architecture\
    \ and learning the basics of Solidity is the first step towards building decentralised\
    \ applications and systems on the Ethereum platform. The provided example demonstrates\
    \ a fundamental smart contract, forming a basis for more advanced and complex\
    \ contracts.\n\n## 3.3 Introduction to Remix – Ethereum IDE\n\nRemix, accessible\
    \ via [`https://remix.ethereum.org/`](https://remix.ethereum.org/), is a powerful,\
    \ open source web and desktop application that is widely used for Ethereum smart\
    \ contract development. It’s an integrated development environment (IDE) designed\
    \ specifically for writing, testing, debugging and deploying smart contracts written\
    \ in Solidity, the primary programming language for Ethereum.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nRemix Ethereum IDE\n\nKey features of Remix include\n\n1.  **Accessible\
    \ and User-Friendly Interface**\n    *   **Web Based**: No need to install any\
    \ software; it’s accessible directly through the browser.\n\n    *   **Desktop\
    \ Version**: For offline development, a desktop version is also available.\n\n\
    2.  **Smart Contract Development**\n    *   **Solidity Editor**: Provides an advanced\
    \ code editor for writing Solidity contracts with features like syntax highlighting\
    \ and error checking.\n\n    *   **Compilation**: Remix compiles smart contracts\
    \ and provides detailed information about warnings and errors.\n\n3.  **Testing\
    \ and Debugging**\n    *   **Built-in Testing Environment**: Allows for easy testing\
    \ of smart contracts within the IDE.\n\n    *   **Debugging Tools**: Offers step-by-step\
    \ debugging to analyse and optimise code.\n\n4.  **Deployment and Interaction**\n\
    \    *   **Deploy on Various Networks**: Enables deploying contracts on Ethereum\
    \ test networks (like Ropsten, Kovan, Rinkeby) or the Ethereum mainnet.\n\n  \
    \  *   **Interaction Interface**: Once deployed, Remix provides an interface to\
    \ interact with the contract functions.\n\n5.  **Plug-ins and Extensibility**\n\
    \    *   **Extensive Plug-in Support**: Offers a range of plug-ins for additional\
    \ functionalities like static analysis, gas estimation and more.\n\n    *   **Custom\
    \ Plug-ins**: Developers can create and integrate their own plug-ins for personalised\
    \ needs."
  trans: "\n## 3.2 智能合约入门\n\n智能合约是一种自动执行合约，其协议条款直接以代码形式呈现。它们部署在区块链上，并完全按照程序设定运行，不存在停机、欺诈、审查或第三方干预的可能性。智能合约能够在无需第三方的情况下执行可信交易。这些交易可追溯且不可逆转。\n\
    \n以下概述了智能合约的通用架构：\n\n1. **结构与组件**\n   - **合约声明**：以 `contract ContractName { }`\
    \ 开始。这类似于面向对象编程中的类声明。\n   - **状态变量**：永久存储在合约中的变量。它们代表合约的状态（例如，使用 `uint public\
    \ count;` 存储一个数值）。\n   - **构造函数**：在合约部署时调用的特殊函数，用于初始化合约的状态（例如，`constructor() public\
    \ { count = 0; }`）。\n   - **函数**：函数允许智能合约与其他合约交互并执行操作。它们可以改变状态或返回数据（例如，`function\
    \ incrementCounter() public { count += 1; }`）。\n   - **函数修饰符**：用于改变函数的行为（例如，`public`\
    \ 或 `private` 等可见性修饰符，或用于访问控制的自定义修饰符）。\n   - **事件**：事件允许在以太坊区块链上进行日志记录。客户端（如 web3.js）可以监听这些事件（例如，`event\
    \ ValueChanged(uint newValue);`）。\n\n2. **编程语言**\n   - **Solidity**：编写以太坊智能合约的主要语言。它是一种面向合约的高级语言，受到\
    \ C++、Python 和 JavaScript 的影响。\n\n3. **执行环境**\n   - 在以太坊虚拟机（EVM）上执行——一个隔离的运行时环境。\n\
    \n4. **部署与交互**\n   - **部署**：编写智能合约后，将其编译并部署到以太坊区块链上，从而获得一个唯一的地址。\n   - **交互**：部署后，可以通过以太坊交易或使用\
    \ `web3.js` 等库的网页界面与之交互。\n\n在 Solidity（以太坊智能合约的主要编程语言）中，状态变量可以用不同的可见性修饰符进行声明：`public`、`private`、`internal`\
    \ 和 `external`。这些修饰符会影响这些变量在合约内部和外部的访问与操作方式。以下是每种修饰符的简要概述：\n\n- **Public（公开）**\n\
    \  - 公开状态变量在智能合约内部和外部都是自动可访问的。Solidity 会自动为公开变量创建一个 getter 函数。\n  - 任何合约都可以读取这些变量，也可以通过交易从外部读取。\n\
    \n- **Private（私有）**\n  - 私有状态变量只能在其定义的合约内部访问，派生合约无法访问。\n  - 声明私有变量的合约之外的任何合约都无法读取或修改这些变量，这使得它们适合于不应暴露的敏感数据。\n\
    \n- **Internal（内部）**\n  - 内部状态变量可以在其定义的合约内部以及继承该合约的其他合约中访问。\n  - 它们无法从外部访问，这意味着任何外部调用都无法查看或修改这些变量，只有合约内部或其派生合约的交易或调用才能操作。\n\
    \n- **External（外部）**\n  - external 不用于状态变量，而是用于函数。它指定该函数只能从合约外部调用，而不能从内部调用（除非使用\
    \ `this.functionName()`）。\n\n关键区别：\n\n- **可访问性**：公开变量的可访问性最高，其次是内部变量，最后是私有变量。external\
    \ 不适用于状态变量。\n- **使用场景**\n  - 对于需要从合约外部轻松读取且无需自定义 getter 函数的变量，使用 `public`。\n \
    \ - 对于应仅由合约函数操作的敏感数据，使用 `private`。\n  - 对于希望派生合约可以访问，但智能合约框架外部无法访问的变量，使用 `internal`。\n\
    \n每个修饰符通过控制对合约数据的访问，在定义智能合约的安全性和功能性方面都起着关键作用，确保每个变量仅在支持合约操作和安全要求所必需的范围内暴露。\n\n\
    清单 3-1 提供了基础合约 `SimpleStorage`，它允许存储和检索一个 `uint`（无符号整数）。`set` 函数更新 `storedData`，`get`\
    \ 则返回其当前值。\n\n```\npragma solidity ⁰.5.0;\ncontract SimpleStorage {\nuint storedData;\n\
    function set(uint x) public {\nstoredData = x;\n}\nfunction get() public view\
    \ returns (uint) {\nreturn storedData;\n}\n}\n清单 3-1\n简单智能合约示例 - 1\n```\n\n智能合约是以太坊功能的基石，可在区块链上实现自动化、透明且安全的交易。理解其架构并学习\
    \ Solidity 基础知识是在以太坊平台上构建去中心化应用和系统的第一步。提供的示例展示了一个基础的智能合约，为更高级、更复杂的合约奠定了基础。\n\n\
    ## 3.3 Remix 介绍 – 以太坊集成开发环境\n\nRemix 可通过 [`https://remix.ethereum.org/`](https://remix.ethereum.org/)\
    \ 访问，是一款功能强大的开源 Web 和桌面应用程序，广泛用于以太坊智能合约开发。它是一个专门为编写、测试、调试和部署用 Solidity（以太坊的主要编程语言）编写的智能合约而设计的集成开发环境（IDE）。\n\
    \n![图 3-1](img/616479_1_En_3_Fig1_HTML.jpg)\n\nRemix 的主要特性包括：\n\n1. **易于上手且用户友好的界面**\n\
    \   - **基于 Web**：无需安装任何软件，可直接通过浏览器访问。\n   - **桌面版**：对于离线开发，也提供桌面版本。\n\n2. **智能合约开发**\n\
    \   - **Solidity 编辑器**：提供高级代码编辑器，用于编写 Solidity 合约，具备语法高亮和错误检查等功能。\n   - **编译**：Remix\
    \ 可编译智能合约，并提供关于警告和错误的详细信息。\n\n3. **测试与调试**\n   - **内置测试环境**：允许在 IDE 内部轻松测试智能合约。\n\
    \   - **调试工具**：提供逐步调试功能，以分析和优化代码。\n\n4. **部署与交互**\n   - **部署到多种网络**：支持将合约部署到以太坊测试网（如\
    \ Ropsten、Kovan、Rinkeby）或以太坊主网。\n   - **交互界面**：部署后，Remix 提供一个可与合约功能进行交互的界面。\n\n\
    5. **插件与可扩展性**\n   - **广泛插件支持**：提供一系列插件，用于实现静态分析、Gas 估算等额外功能。\n   - **自定义插件**：开发者可以为个性化需求创建和集成自己的插件。\n"
- fmt: "### Using Remix for Smart Contract Development\n\n`Remix` is an essential\
    \ tool for Ethereum developers, offering a comprehensive suite of functionalities\
    \ for smart contract development. Its ease of use, combined with powerful features\
    \ like built-in testing and debugging tools, makes it an ideal platform for both\
    \ beginners and experienced developers in the Ethereum ecosystem. Whether you’re\
    \ writing your first smart contract or deploying a complex DApp, `Remix` provides\
    \ the tools you need to succeed in the Ethereum development space. The following\
    \ shows the step-by-step process from Listing [3-1](#616479_1_En_3_Chapter.xhtml#PC1):\n\
    \n1.  **Writing the Contract**: Start by writing your `Solidity` smart contract\
    \ in the `Remix` editor.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2: Writing the Contract for `SimpleStorage.sol`\n\n2.  **Compilation**:\
    \ Use the built-in compiler to compile your contract and check for any errors\
    \ or warnings.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3: Compile `SimpleStorage.sol`\n\n3.  **Testing**: Write and execute\
    \ tests for your contract using the `Remix` testing environment.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4: Test `SimpleStorage.sol`\n\n4.  **Debugging**: Utilise the debugger\
    \ to step through your code and optimise it.\n\n5.  **Deployment**: Deploy your\
    \ contract to a test network or the Ethereum mainnet directly from `Remix`.\n\n\
    ![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig5_HTML.jpg)\n\nFigure 3-5: Deploy\
    \ `SimpleStorage.sol`\n\n6.  **Interaction**: After deployment, interact with\
    \ your contract functions using the `Remix` interface.\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6: Interaction `SimpleStorage.sol`\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7: Interaction `SimpleStorage.sol` – transact\n\n![](images/616479_1_En_3_Chapter/616479_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8: Interaction `SimpleStorage.sol` – get\n\nNow that you have a foundational\
    \ understanding of how `Remix` can streamline your Ethereum development process,\
    \ let’s apply this knowledge. In the following sections, we will explore practical\
    \ examples of smart contracts. These examples will demonstrate how to effectively\
    \ utilise `Remix`’s powerful features for writing, testing and deploying smart\
    \ contracts, providing you with hands-on experience in crafting efficient and\
    \ secure blockchain applications.\n\n## 3.4 Simple Smart Contract Examples\n\n\
    The smart contract in Listing [3-2](#616479_1_En_3_Chapter.xhtml#PC2) defines\
    \ a straightforward contract named `MyContract`. It primarily consists of a public\
    \ string variable named `value`, initially set to `'MyValue'`. This variable’s\
    \ public status allows external entities to read its value, thanks to an automatically\
    \ generated getter function by `Solidity`. Additionally, the contract includes\
    \ a function `set`, which enables the modification of `value`.\n\n```\npragma\
    \ solidity ^0.5.1;\ncontract MyContract{\n    string public value = \"MyValue\"\
    ;\n    function set(string memory _value) public {\n        value = _value;\n\
    \    }\n}\n```\n\nListing 3-2: Smart Contract Example – 2\n\nWhen invoked, this\
    \ function accepts a new string value as an argument and assigns it to `value`,\
    \ thereby updating its content. This simple structure of the contract suggests\
    \ its utility in basic data storage and retrieval operations, demonstrating a\
    \ fundamental example of state management and interaction within a smart contract\
    \ on the Ethereum blockchain.\n\nThe smart contract then establishes a contract\
    \ named `MyContract` with a variety of state variables, each showcasing different\
    \ data types and characteristics in `Solidity` (Listing [3-3](#616479_1_En_3_Chapter.xhtml#PC3)).\n\
    \n```\npragma solidity ^0.5.1;\ncontract MyContract{\n    string public constant\
