  trans: '

    # 概述


    本章深入探讨了非同质化代币（NFT）及其在数字经济中的关键作用。开篇阐述了 NFT 的独特特性，包括其不可分割性和唯一性——这些特性使其与加密货币等可互换代币区分开来。基于区块链技术构建的
    NFT 为数字世界中长期存在的挑战提供了解决方案，例如确保数字资产的真伪验证、来源追溯与安全所有权。


    本章还讨论了 NFT 在数字艺术之外的广泛应用，已延伸至游戏、房地产和数字身份管理领域。NFT 通过去中心化方式实现游戏道具、房产乃至个人数据的真正所有权与可转移性，从而重新定义了资产所有权。这一变革伴随着标准铸币和荷兰式拍卖等多种分发模式的互补支持，这些模式对
    NFT 的发行与交易方式起着至关重要的作用。


    最后，本章梳理了创建和交易 NFT 的分步指南：从生成数字资产、将其上传至`IPFS`等去中心化存储方案，到在区块链上铸币，以及在`OpenSea`等市场平台挂牌销售。内容重点突出了
    NFT 创建的技术要素，包括元数据标准和智能合约功能，确保创作者与开发者能够以安全透明的方式成功铸币并出售 NFT。


    ## 备注


    1. Yan, T. (2024). 《从荷兰式拍卖到开放版：NFT 分销模式深度解析》。Delphi Digital. [`https://members.delphidigital.io/reports/from-dutch-auctions-to-open-editions-a-deep-dive-into-nft-distribution-models`](https://members.delphidigital.io/reports/from-dutch-auctions-to-open-editions-a-deep-dive-into-nft-distribution-models)（访问日期：2024
    年 4 月 9 日）。


    # DEX 与市值管理


    ## DEX 的工作原理


    去中心化交易所（DEX）代表了传统金融交易机制的重大变革，体现了区块链技术核心的去中心化精神。通过在没有中介的情况下实现点对点交易，DEX 提供了中心化交易所（CEX）通常不具备的透明度、安全性和可访问性。


    ### 运行原理


    包括`Uniswap`等平台在内的大多数 DEX，其核心是自动做市商（AMM）模型。与传统交易所依赖订单簿匹配买卖双方不同，AMM 使用流动性池进行资产交易。这些池由流动性提供者（LP）提供资金，他们将代币对存入智能合约。作为回报，LP
    根据其提供的流动性比例赚取交易费用。


    ![图 8-1](img/616479_1_En_8_Fig1_HTML.jpg)


    图 8-1 DEX 的工作原理


    图 8-1 展示了像`Uniswap`这样的去中心化交易所（DEX）如何利用自动做市商（AMM）协议运作的核心流程。


    LP 将代币对存入流动性池，这些代币对必须等值以维持池内平衡。在图示中，一位 LP 向`Uniswap`池存入"10 个代币 A + 1 个代币 B"，并收到"4
    个 LP 份额"作为回报。这一机制至关重要，因为它使池子拥有充足资金来支持其他用户的交易。


    AMM 协议自动完成价格发现，无需传统订单簿。图中通过"交换"操作展示了这一点：用"10 个代币 A"兑换"1 个代币 B"。交易中包含一笔名义费用（此处为$0.03），该费用作为提供流动性的奖励分配给
    LP。


    AMM 利用了流动性池的概念，池中包含配对代币的储备。这些储备就是交易者进行交易的对象。图中以"12 个池代币"代表的流动性份额，表示 LP 对池子总流动性的比例所有权。当
    LP 贡献流动性时，他们会收到池代币，之后可以赎回这些代币以获取其在池中的份额，以及随时间累积的交易费用的一部分。


    AMM 最常用的定价机制是恒定乘积公式，表示为`x * y = k`，其中`x`和`y`是流动性池中两种资产各自的存量，`k`是一个常数。该公式确保两种资产存量的乘积始终保持不变，从而在交易后维持池子的平衡。图中虽未明确显示此公式，但它正是所描绘的交换操作的基础。


    交易者通过钱包直接与流动性池交互。他们可以与治理流动性池的智能合约进行交互来交换代币，如图 8-1 的"交换"部分所示。费用和滑点由 AMM 根据流动性池的当前状态自动计算。


    DEX 的一个关键原则是其去中心化特性。与中心化交易所不同，DEX 不持有用户的资金，所有交易均通过区块链上的智能合约直接执行。这最大程度降低了对手方风险，并提供了交易执行的透明度。


    对于流动性提供者而言，主要好处在于赚取交易费用的潜力。然而，他们也会面临诸如无常损失等风险——当池中代币价格在他们存入资产后发生显著变化时，便会产生此类损失。


    对于交易者而言，DEX 提供了直接且即时的代币交换优势，且费用可能低于中心化交易所。他们还受益于区块链技术提供的安全性，因为不存在中心化故障点。

