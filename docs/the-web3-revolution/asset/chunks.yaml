- fmt: '## 9.1 Web3 and Metaverse: Foundations and Technologies


    The metaverse, a term first coined in Neal Stephenson’s 1992 science fiction novel
    *Snow Crash*, represents a collective virtual shared space, created by the convergence
    of virtually enhanced physical reality, augmented reality (AR) and the Internet.
    This digital universe allows users to interact with a computer-generated environment
    and other users. The concept has evolved from fictional imaginations to a significant
    focus of technological development, aiming to create immersive, digital worlds
    where people can work, play, socialise and participate in a variety of experiences
    that span across both the digital and physical worlds.


    The need for Web3 in the development of the metaverse is critical due to the limitations
    of the current Internet infrastructure, Web2, which is characterised by centralised
    data control and limited user ownership over digital assets and identities. Web3,
    with its decentralised nature, blockchain technology and emphasis on user sovereignty,
    provides the foundational elements necessary for a truly immersive, interactive
    and user-owned metaverse.


    The evolution of the Internet from Web1 to Web3 marks a significant transformation
    in how users interact with digital content, who controls that content, the underlying
    technologies that power these interactions and the roles users play within this
    ecosystem. Each iteration of the Web has built upon the previous, moving from
    a static collection of pages to a dynamic and interactive experience and now to
    a decentralised platform that emphasises user sovereignty and asset ownership.
    Table [9-1](#616479_1_En_9_Chapter.xhtml#Tab1) shows a detailed comparison of
    these three stages, highlighting the core distinctions that define each era.


    **Table 9-1** Web1, Web2 and Web3 Comparison


    | Feature | Web1 (The Static Web) | Web2 (The Social Web) | Web3 (The Decentralised
    Web) |

    | --- | --- | --- | --- |

    | Interaction | Read-only, limited user interaction | Read and write, interactive
    applications and social networks | Read, write and own, emphasising user ownership
    and interaction with digital assets |

    | Content Control | Content created and controlled by website owners | Content
    creation democratised but centrally controlled by platforms | Decentralised control,
    users own their content and data |

    | Technology | Basic HTML, static pages | AJAX, JavaScript, enabling dynamic content
    and applications | Blockchain, decentralised applications (DApps), smart contracts
    |

    | User Role | Consumers of content | Content creators and consumers, but with
    significant privacy and data ownership issues | Owners of their data and digital
    assets, participants in a decentralised economy |


    Web1, often referred to as the ‘Static Web’, laid the groundwork for the digital
    age, offering users access to information but limited interaction. Web2, or the
    ‘Social Web’, revolutionised this model by enabling user-generated content and
    social networking, fostering an unprecedented level of interactivity and community
    creation. However, it also centralised control over data in the hands of a few
    major platforms, raising issues around privacy and data ownership. Web3 represents
    the next frontier, the ‘Decentralised Web’, which aims to address these concerns
    by leveraging blockchain technology to return control and ownership of data and
    digital assets back to the users themselves. This shift not only has technological
    implications but also deeply affects the socio-economic fabric of the digital
    ecosystem.


    Table [9-1](#616479_1_En_9_Chapter.xhtml#Tab1) showcases the progressive enhancement
    of user capabilities and autonomy over the Web''s evolution. Web1 established
    the foundation of the Internet as a digital information repository. Web2 built
    upon this by making the Internet more interactive and social, yet it centralised
    power and control. Web3 seeks to redistribute this control back to users, ensuring
    they can own, control and profit from their content and contributions to the digital
    world. The transition to Web3 represents not just technological innovation but
    a reimagining of the Internet''s potential to empower individuals and communities.'
