    ### DePIN 飞轮的动力机制


    DePIN 通过一个共生循环运作，将区块链的技术实力与物理基础设施的实用性相结合。这个循环被称为 DePIN 飞轮，展示了不同利益相关者与网络之间的互动，推动着生态系统中的增长和价值创造。⁴


    ![](img/616479_1_En_6_Fig1_HTML.jpg)


    图 6-1

    DePIN 飞轮


    图 6-1 展示了 DePIN 生态系统中的不同元素如何相互促进，形成一个自我可持续的模型。以下是详细分解：


    1.  **创始人与投资者**：循环始于建立 DePIN 协议的创始人，以及提供金融资本的投资者。这笔资金对于开发基础设施和激励早期采用者至关重要。


    2.  **代币价值与矿工/部署者**：金融资本有助于确立代币价值，这是回报矿工或部署者的基础。这些参与者通过提供必要的硬件或服务来贡献生产资本。


    3.  **DePIN 平台与第三方开发者**：随着硬件就位，DePIN 平台开始运作，吸引第三方开发者。这些开发者通过创建利用该平台的去中心化应用程序（`DApps`）来贡献人力资本。


    4.  **DePIN DApps 与最终用户**：`DApps` 为与平台互动的最终用户提供实用性，使他们能够从平台提供的去中心化服务中受益。


    5.  **社区参与**：繁荣的用户群会在 DePIN 周围培育出一个强大的社区，其反馈作用于协议本身，从而完成飞轮循环。这种社区参与对于长期的可持续性和增长至关重要。


    飞轮概念强调了每个参与者角色的重要性以及他们贡献的相互关联性。通过确保激励机制在整个体系中保持一致，DePIN 旨在维持一个平衡的增长轨迹，使网络参与者获得回报，最终用户享受日益增长的实用性。


    这种模型为建设和运营基础设施提供了一种变革性的方法，使其具有参与性、激励性和去中心化的特点。它将控制权从中心化实体转移到分布式的利益相关者网络，每个人都在网络的增长中做出贡献并从中受益。


    随着 DePIN 的不断发展，它们有可能颠覆传统的基础设施管理系统，在能源、电信、健康等多个领域提供更高效、更透明、更公平的服务提供框架。


    ### 可扩展性与可持续性


    可扩展性和可持续性是 DePIN 成功和长久发展的两大支柱。为了优化可扩展性，DePIN 必须采用能够在不牺牲性能的前提下处理高交易量和数据吞吐量的区块链协议。这可能涉及采用或开发更高效、更节能的共识机制，例如使用权益证明（`PoS`）而非工作量证明（`PoW`），或者集成**第二层（Layer
    2）**解决方案，将交易处理从主区块链上分流。


    对于可持续性，DePIN 应专注于创建能够最小化能耗的网络架构，例如通过整合可再生能源，或设计激励节能运行的机制。这不仅符合全球推动绿色技术的趋势，也确保了网络在长期内保持成本效益。


    代币经济学在确保网络内的激励机制促进健康增长方面发挥着关键作用。经济模型必须以公平奖励贡献者而避免制造经济泡沫的方式进行构建。这意味着要设计能够协调所有利益相关者（从矿工、用户到开发者、投资者）利益的机制，确保代币的价值与实际效用和需求挂钩，而非仅仅是投机。


    在此背景下，不仅仅是建设基础设施，还要围绕它培育一个强大的生态系统。这包括建立一个能够适应网络不断变化需求和挑战的稳健治理模型。此外，还包括创造一个创新能够蓬勃发展的环境，以促进提升网络能力和服务的发展。


    在 DePIN 的叙事中，可持续性也意味着维护一个能够应对市场条件变化、技术进步和监管格局变化的适应性框架。DePIN 要真正蓬勃发展，不仅需要在技术挑战面前展现出韧性，还需要在经济和环境可持续性方面表现出韧性。


    重点还必须放在确保 DePIN 的物理和数字组件能够和谐扩展上。这需要在部署物理资源和支撑它们的数字基础设施的可扩展性之间进行仔细协调。


    通过专注于这些领域，DePIN 有可能彻底改变我们对待基础设施的方式，从中心化、自上而下的模式转向分布式、自下而上的模式，在赋予个人和社区权力的同时，保持与我们环境和资源的和谐。


    ## RWA 与 DePIN 之间的协同效应：机遇与复杂性


    RWA 代币化和 DePIN 是加密领域中两股变革力量，它们都旨在弥合传统金融市场与区块链生态系统之间的鸿沟。RWA 指的是将现实世界实物资产的权利转换为区块链网络上的数字代币的过程，而
    DePIN 则代表使用区块链来管理和改进物理基础设施系统的去中心化网络。两者结合在一起，意味着一个强大的组合，有望彻底改变数字资产交易和物理资源的管理。


    DePIN 可以被视为 RWA 的一个子集，其中物理基础设施的代币化起着关键作用。属于 DePIN 的项目使用代币奖励来激励社区驱动的物理网络建设和运营。例如，一个
    DePIN 项目可以激励用户分享来自移动设备摄像头的空间信息数据，为构建一个更大的地理空间信息网络做出贡献。通过代币化，此类网络可以为昂贵的基础设施提供资金，鼓励公众参与，并实现这些资源所有权的民主化。

    '
- fmt: '### The Solana Edge in DePIN Projects


    `Solana`’s architecture offers several unique advantages over `Ethereum` that
    are particularly beneficial for DePIN projects, where scalability and rapid data
    transactions are critical.


    `Solana`’s transaction throughput is significantly higher, capable of processing
    up to 2,000–3000 transactions per second (TPS), while `Ethereum` currently processes
    around 10–15 TPS. This stark contrast in performance is largely due to `Solana`’s
    innovative proof of history (`PoH`) consensus mechanism, which timestamps transactions
    to streamline the order of events, thus enabling this higher throughput without
    the delays and backlogs often experienced on `Ethereum` during periods of congestion.


    Moreover, `Solana`’s stateless architecture does not require the network’s entire
    state to be updated with each transaction, which helps to reduce memory consumption
    and allows for transactions to be processed sequentially with greater efficiency.
    This feature, along with the `Turbine` block propagation protocol, aids in breaking
    down data for easier network transfer and contributes to `Solana`’s scalability
    at the base level, without the need for Layer 2 scaling solutions.


    Another important aspect is cost-effectiveness. `Solana` maintains much lower
    transaction fees compared to `Ethereum`, making it an attractive platform for
    users and developers looking for an efficient and affordable transaction experience.
    For instance, `Solana`’s fees are measured in fractions of a cent, whereas `Ethereum`’s
    can vary widely and soar during peak usage times due to network congestion.


    `Solana` also introduces `Sealevel`, a system that allows for the parallel running
    of smart contracts, thereby optimising network efficiency and the handling of
    multiple transactions simultaneously, which is a significant advantage over `Ethereum`
    where smart contracts cannot operate in parallel.


    These features underpin `Solana`’s edge in DePIN projects, providing a high-speed,
    scalable and cost-efficient environment that supports complex infrastructure models
    and the high-frequency data transactions required to run them effectively.


    Despite these advantages, it’s important to note that `Solana` does have centralisation
    trade-offs and has faced network downtime issues, which raises concerns about
    its robustness and reliability compared to `Ethereum`, which, despite its scalability
    challenges, has a strong track record of uptime and security due to its decentralised
    nature.


    Both networks continue to evolve, with `Ethereum` making strides towards improving
    its scalability and efficiency through `Ethereum` 2.0 upgrades, including a transition
    to a proof-of-stake (`PoS`) consensus, which aims to address current bottlenecks
    and enhance the network’s performance.


    In conclusion, while `Solana` offers a specialised set of features that are conducive
    to DePIN projects, it’s crucial for stakeholders to weigh these against the broader
    context of network stability, security and decentralisation when choosing a blockchain
    platform for development.[⁵](#616479_1_En_6_Chapter.xhtml#Sec12)^,[⁶](#616479_1_En_6_Chapter.xhtml#Sec12)^,[⁷](#616479_1_En_6_Chapter.xhtml#Sec12)^,[⁸](#616479_1_En_6_Chapter.xhtml#Sec12)


    ### Challenges


    1. **Regulatory Hurdles**: RWA and DePIN initiatives often face stringent regulatory
    environments that can limit their ability to operate freely across different jurisdictions.
    The integration of traditional financial assets and blockchain technology presents
    complex legal challenges, especially in terms of compliance, asset custody and
    cross-border transactions.


    2. **Interoperability Issues**: Ensuring seamless interoperability between different
    blockchain platforms and between blockchain and traditional financial systems
    is critical. This includes the technical challenges of developing standardised
    protocols that allow for efficient and secure asset tokenisation, transfer and
    settlement across diverse platforms.


    3. **Scalability Concerns**: As DePIN projects grow, they must handle increasing
    transaction volumes without compromising performance or security. This is particularly
    challenging for blockchain networks that struggle with scalability, where higher
    transaction throughput can lead to congestion and increased transaction fees.


    4. **Data Privacy and Security**: Safeguarding sensitive financial data and ensuring
    privacy in transactions while maintaining transparency and compliance with regulations
    like GDPR is a significant challenge. This includes protecting against data breaches
    and unauthorised access to personal and financial information.


    5. **Asset Valuation and Liquidity**: Accurately valuing RWAs and ensuring their
    liquidity once tokenised on the blockchain poses challenges. This includes developing
    reliable mechanisms for price discovery, asset appraisal and managing liquidity
    pools to facilitate trading and lending.'
