    how they’re integrated within the broader ecosystem of DeFi and applications such
    as digital art platforms, will be explored in Part 3, ‘Decentralised Finance (DeFi)
    and Applications’, specifically in Chapter [7](#616479_1_En_7_Chapter.xhtml),
    ‘Non-fungible Tokens (NFTs) and Digital Art’.'
  raw: "While running your own node offers a high degree of control and direct engagement\
    \ with the IPFS network, it requires a good understanding of IPFS and might not\
    \ be the most straightforward option for beginners or those looking for quick\
    \ and easy solutions.\n\n**Option 2: Using Third-Party Services like Pinata**\n\
    \nFor many users, especially those new to IPFS or seeking convenience, third-party\
    \ services like Pinata offer an easier way to upload and manage content on IPFS.\
    \ Pinata simplifies the process by providing a user-friendly interface and additional\
    \ features like pinning services to ensure your content remains readily available\
    \ on the IPFS network.\n\nTo use Pinata for uploading your NFT assets:\n    *\
    \   Create an Account: Sign up on Pinata.cloud and log in to your account.\n\n\
    *   Upload Content: Navigate to the ‘Upload’ section and choose to upload a folder.\
    \ Pinata will automatically pin your uploaded content, ensuring its availability\
    \ on the IPFS network.\n\n*   Retrieve IPFS Hashes: Once uploaded, Pinata will\
    \ provide an IPFS hash (CID) for your folder and each contained file. These hashes\
    \ serve as permanent, immutable links to your assets, which you’ll include in\
    \ your NFTs’ metadata.\n\nInstead of providing a step-by-step explanation, please\
    \ refer to Section [7.​3](#616479_1_En_7_Chapter.xhtml#Sec11) in Chapter [7](#616479_1_En_7_Chapter.xhtml),\
    \ which covers the detailed process of managing metadata, including handling multiple\
    \ images and JSON files for NFTs. Chapter [7](#616479_1_En_7_Chapter.xhtml) offers\
    \ more comprehensive guidance on utilising Pinata and other methods for uploading\
    \ digital assets and managing them on IPFS.\n\n**Option 1 vs. Option 2**\n\nWhile\
    \ setting up your own IPFS node gives you full control and a hands-on experience,\
    \ it comes with a steeper learning curve and ongoing management responsibilities.\
    \ In contrast, third-party services like Pinata offer a more straightforward,\
    \ user-friendly solution, making it ideal for creators who want to streamline\
    \ their NFT creation process. Regardless of the method you choose, the key goal\
    \ is to securely upload your digital assets to IPFS, enabling their transformation\
    \ into NFTs.\n\nFor instance, if you have a JSON file hosted on IPFS with the\
    \ URI (e.g. ipfs://Qm...), you would use this URI as the **tokenURI** parameter\
    \ when calling the **awardItem** function.\n\n3.  **safeTransferFrom:** There\
    \ are two versions of this function. They allow for the safe transfer of tokens\
    \ from one address to another, ensuring that the receiving address is capable\
    \ of handling ERC721 tokens (to prevent accidental loss).\n\n4.  **setApprovalForAll**:\
    \ This function allows the owner of tokens to grant permission to another address\
    \ to transfer all of the owner’s tokens on their behalf.\n\n5.  **transferFrom**:\
    \ This function is used to transfer a token from one address to another. The caller\
    \ must be authorised to move the token, either by being the owner, approved or\
    \ an authorised operator.\n\n6.  **balanceOf**: This query returns the number\
    \ of tokens owned by a given address.\n\n7.  **getApproved**: This returns the\
    \ approved address for a single token.\n\n8.  **isApprovedForAll**: This checks\
    \ if an operator is approved to transfer all tokens owned by a given address.\n\
    \n9.  **name**: This returns the name of the token collection, which is **HGNFT**\
    \ in this case.\n\n10.  **ownerOf**: This query returns the owner of a specific\
    \ token ID.\n\n11.  **supportsInterface**: Contracts in Ethereum can announce\
    \ which functions they support by returning true for a given interface ID. This\
    \ is a technical function used by other contracts to determine what functionalities\
    \ are supported by this contract.\n\n12.  **symbol**: This query returns the token\
    \ symbol, which is **HGN**.\n\n13.  **tokenURI**: For a given token ID, this returns\
    \ the URI of the associated resource, which is typically a link to a JSON file\
    \ containing metadata.\n\nIn the case of **awardItem**, the function is meant\
    \ to ‘award’ an NFT to a player, where the **player** is the address of the recipient,\
    \ and the **tokenURI** is the link to the NFT’s metadata. The metadata file could\
    \ look something like this:\n\n```\n{\n\"name\": \"Hui Gong Digital Artwork\"\
    ,\n\"description\": \"A unique piece of digital art\",\n\"image\": \"ipfs://QmXxXxXxXxXxXxXxXxXxXxXxXxXxXxX\"\
    ,\n\"attributes\": [\n{\n\"trait_type\": \"Rarity\",\n\"value\": \"Rare\"\n},\n\
    {\n\"trait_type\": \"Artist\",\n\"value\": \"Hui Gong\"\n}\n]\n}\n```\n\nThis\
    \ file would be uploaded to IPFS, and the resulting IPFS URI would be used as\
    \ the **tokenURI** parameter when minting the NFT.\n\nIt’s worth noting that the\
    \ detailed mechanics of how NFTs function, including how they’re integrated within\
    \ the broader ecosystem of DeFi and applications such as digital art platforms,\
    \ will be explored in Part 3, ‘Decentralised Finance (DeFi) and Applications’,\
    \ specifically in Chapter [7](#616479_1_En_7_Chapter.xhtml), ‘Non-fungible Tokens\
    \ (NFTs) and Digital Art’."
  trans: '

    虽然运行自己的节点能提供高度的控制权和与 IPFS 网络的直接交互，但这需要对 IPFS 有深入的理解，对于初学者或寻求快捷简便解决方案的用户来说，可能并非最直接的选择。


    **方案二：使用 Pinata 等第三方服务**


    对于许多用户，尤其是刚接触 IPFS 或追求便捷的用户而言，像 Pinata 这样的第三方服务提供了一种更简单的在 IPFS 上管理和上传内容的方式。Pinata
    通过提供用户友好的界面和固定服务等附加功能来简化流程，确保你的内容在 IPFS 网络上始终可用。


    要使用 Pinata 上传你的 NFT 资产：


    -   **创建账户**：在 `Pinata.cloud` 上注册并登录你的账户。

    -   **上传内容**：导航至“上传”部分，选择上传一个文件夹。Pinata 将自动固定你上传的内容，确保其在 IPFS 网络上可用。

    -   **获取 IPFS 哈希**：上传后，Pinata 会为你的文件夹及其包含的每个文件提供 IPFS 哈希（CID）。这些哈希作为你资产永久且不可变的链接，你将把它们包含在
    NFT 的元数据中。


    此处不再提供逐步解释，请参考第 7 章的第 7.​3 节，其中涵盖了管理元数据的详细流程，包括处理 NFT 的多个图片和 JSON 文件。第 7 章提供了关于利用
    Pinata 及其他方法上传数字资产并在 IPFS 上进行管理的更全面的指导。


    **方案一 vs. 方案二**


    虽然搭建你自己的 IPFS 节点能让你拥有完全的控制权和实践经验，但它也伴随着更陡峭的学习曲线和持续的管理责任。相比之下，像 Pinata 这样的第三方服务提供了更直接、用户友好的解决方案，非常适合希望简化
    NFT 创作流程的创作者。无论你选择哪种方法，关键目标都是将你的数字资产安全上传到 IPFS，使其能够转化为 NFT。


    例如，如果你有一个托管在 IPFS 上的 JSON 文件，其 URI 为（例如 `ipfs://Qm...`），那么在调用 `awardItem` 函数时，你将使用这个
    URI 作为 `tokenURI` 参数。


    -   **`safeTransferFrom`**：此函数有两个版本。它们允许安全地将代币从一个地址转移到另一个地址，确保接收地址能够处理 ERC721
    代币（以防止意外丢失）。

    -   **`setApprovalForAll`**：此函数允许代币所有者授予另一个地址代理其转移全部代币的权限。

    -   **`transferFrom`**：此函数用于将代币从一个地址转移到另一个地址。调用者必须被授权移动该代币，无论是作为所有者、被授权者还是已授权的操作员。

    -   **`balanceOf`**：此查询返回给定地址所拥有的代币数量。

    -   **`getApproved`**：返回单个代币的授权地址。

    -   **`isApprovedForAll`**：检查操作员是否被授权转移给定地址拥有的所有代币。

    -   **`name`**：返回代币集合的名称，在本例中为 `HGNFT`。

    -   **`ownerOf`**：此查询返回特定代币 ID 的所有者。

    -   **`supportsInterface`**：以太坊中的合约可以通过对给定的接口 ID 返回 `true` 来声明其支持的函数。这是一个供其他合约使用的技术性函数，用于确定此合约支持哪些功能。

    -   **`symbol`**：此查询返回代币符号，即 `HGN`。

    -   **`tokenURI`**：对于给定的代币 ID，返回关联资源的 URI，通常是一个包含元数据的 JSON 文件的链接。


    对于 `awardItem`，该函数旨在向玩家“授予”一个 NFT，其中 `player` 是接收者的地址，`tokenURI` 是 NFT 元数据的链接。元数据文件可能看起来像这样：


    ```

    {

    "name": "惠贡数字艺术品",

    "description": "一件独特的数字艺术品",

    "image": "ipfs://QmXxXxXxXxXxXxXxXxXxXxXxXxXxXxX",

    "attributes": [

    {

    "trait_type": "稀有度",

    "value": "稀有"

    },

    {

    "trait_type": "艺术家",

    "value": "惠贡"

    }

    ]

    }

    ```


    该文件将被上传到 IPFS，生成的 IPFS URI 将作为铸造 NFT 时的 `tokenURI` 参数。


    值得注意的是，NFT 的详细运作机制，包括它们如何融入更广泛的 DeFi 生态系统和数字艺术平台等应用中，将在第 3 部分“去中心化金融（DeFi）与应用”中探讨，具体在第
    7 章“非同质化代币（NFT）与数字艺术”中。

