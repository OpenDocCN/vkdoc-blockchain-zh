    # 11. Legal Frameworks for Web3


    ## 11.1 Global Regulatory Divergence and Convergence in Token Definitions


    Here, we embark on a comparative analysis of token definitions as articulated
    by leading financial regulatory bodies across the globe. The chosen regulators
    represent the financial epicentres of the modern world – entities that not only
    influence global financial trends but also signal the regulatory future of burgeoning
    technologies. This section underscores the importance of understanding token definitions,
    given their critical role in determining the scope of regulation, compliance requirements
    and the overarching legal treatment of digital assets.


    ### United States – Securities and Exchange Commission (SEC)


    In the United States, the Securities and Exchange Commission (SEC) employs the
    `Howey Test`, a pivotal judicial tool stemming from a 1946 US Supreme Court decision,
    to determine whether a digital asset should be classified as a security. Under
    the `Howey Test`, an asset is considered a security if it involves an investment
    of money in a common enterprise with a reasonable expectation of profits predominantly
    from the efforts of others.


    When this test is applied to tokens, it often becomes a contentious debate, particularly
    regarding the third and fourth criteria: the expectation of profits and the reliance
    on the effort of others. For example, while Bitcoin escapes the security classification
    due to its decentralised nature, tokens associated with a central entity that
    guides development or operations are more likely to be considered securities.


    The SEC categorises digital assets broadly, which could be as securities, currencies,
    commodities or even property, depending on the specific nature of the asset. This
    categorisation significantly impacts how such assets are regulated. Digital assets
    deemed securities fall under the stringent requirements of the `Securities Act
    of 1933` and the `Securities Exchange Act of 1934`, which include registration
    obligations and compliance with various disclosure and reporting standards. However,
    the SEC provides several exemptions, such as `Regulation A`, `Regulation Crowdfunding`
    and `Regulation D`, each with its conditions and limits, to facilitate capital-raising
    activities while still maintaining investor protections.


    The significance of the SEC''s approach lies in its influence as a leading financial
    regulator in one of the world''s largest and most dynamic digital asset markets.
    The interpretation of token definitions by the SEC not only shapes the regulatory
    landscape within the United States but also serves as a benchmark for international
    regulators grappling with the evolving complexities of the digital asset space.


    ### United Kingdom – Financial Conduct Authority (FCA)


    In the United Kingdom, the Financial Conduct Authority (FCA) has established a
    taxonomy for crypto-assets that informs whether such assets fall inside or outside
    the regulatory perimeter. According to FCA guidance, there are three main categories:


    1. **Security Tokens**: These tokens provide rights and obligations akin to specified
    investments as outlined in the `Regulated Activities Order (RAO)`, excluding e-money.
    This category hasn''t changed significantly from prior guidance and remains within
    the regulatory perimeter. Security tokens often exhibit characteristics akin to
    shares, debentures or units in a collective investment scheme and are thus treated
    as securities.


    2. **E-money Tokens**: Tokens that meet the definition of e-money fall under this
    category and are subject to `Electronic Money Regulations (EMRs)`. These tokens
    were previously classified under utility tokens but now form a distinct regulated
    category. Entities dealing with e-money tokens must comply with applicable rules
    and regulations and hold the correct permissions.


    3. **Unregulated Tokens**: This category covers tokens that do not meet the definition
    of e-money or do not provide the same rights as other specified investments under
    the `RAO`. It includes utility tokens and exchange tokens, which can range from
    being issued centrally to being decentralised and may serve various functions
    such as giving access to goods or services or being used as a means of exchange.
    These tokens are outside the regulatory perimeter and offer a degree of flexibility
    in usage and transferability.


    The FCA has been active in providing further illustrative examples in their guidance
    to support this taxonomy. For instance, tokens referred to as ''bank'' or ''settlement''
    tokens have been examined, as well as tokens that might shift between categories,
    especially with respect to transferability.


    The importance of these distinctions is paramount for issuers navigating the UK''s
    regulatory landscape, as they must determine if their offerings are subject to
    FCA regulations. With the crypto-asset market rapidly evolving, the FCA''s taxonomy
    and guidance aim to offer clarity while accommodating the innovative nature of
    these assets. This approach reflects the FCA''s attempt to align regulatory objectives
    with market developments, ensuring that policy objectives are achieved without
    stifling innovation.


    Understanding these classifications is critical, especially for market participants
    who are either currently operating in the UK or considering entering the market.
    It helps in assessing the regulatory implications for various crypto-assets and
    in making informed decisions regarding compliance, risk management and business
    strategy.


    For entities unsure about the regulatory treatment of their tokens, the FCA advises
    consultation with their guidance, seeking legal advice or using FCA''s `Innovate`
    services, which support innovative financial products and services while ensuring
    they meet regulatory requirements.'
