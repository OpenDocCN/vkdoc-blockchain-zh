- fmt: "### Digital Signatures\n\nDigital signatures play a crucial role in blockchain,\
    \ ensuring the security and authentication of transactions. The digital signature\
    \ mechanism includes generating a key pair (public and private keys), the signing\
    \ process and the verification process. The private key is used to sign messages,\
    \ while the public key allows anyone to verify the authenticity of the signature.\
    \ Digital signatures not only ensure that only the signer can generate the signature\
    \ but also bind the signature to a specific document, ensuring that the signature\
    \ cannot be used to indicate approval or endorsement of a different document.\
    \ The design goal of this mechanism is to meet two main properties, very similar\
    \ to the analogy of handwritten signatures:\n\n1. **Uniqueness**: Only you can\
    \ generate your signature, but anyone who sees it can verify its validity. This\
    \ is achieved by using the private key to sign messages, and the private key is\
    \ confidential and accessible only to the owner of the key.\n2. **Binding**: The\
    \ signature is bound to a specific document, so it cannot be used to indicate\
    \ agreement or endorsement of a different document. In other words, the signature\
    \ is a verification of a specific transaction or message and cannot be misused\
    \ or repurposed for other content.\n\nThe digital signature scheme includes the\
    \ following three algorithms:\n\n- **Key Generation**: This method takes a key\
    \ size parameter and generates a pair of keys. The private key (secret key) is\
    \ kept confidential and used to sign messages; the public key (public verification\
    \ key) is public, and anyone can use it to verify the signature.\n- **Signing\
    \ Method**: This method takes a message and a private key as inputs and outputs\
    \ the signature of the message under that private key.\n- **Verification Method**:\
    \ This method takes a message, a signature and a public key as inputs. It returns\
    \ a Boolean value, `true` if the signature is valid for the message under the\
    \ given public key and `false` otherwise.\n\nAdditionally, digital signatures\
    \ must satisfy the following two properties:\n\n- **Valid Signatures Must Verify**:\
    \ A signature generated by the corresponding private key must return `true` when\
    \ verified with the public key.\n- **Signatures Are Existentially Unforgeable**:\
    \ This means that no one can forge someone else’s signature. The property of existential\
    \ unforgeability ensures the security and credibility of transactions in blockchain\
    \ systems like Bitcoin.\n\nMulti-signature (abbreviated as \"multisig\") is an\
    \ extended application of digital signatures, requiring multiple keys to jointly\
    \ sign a transaction. In the cryptocurrency domain, such as Bitcoin, multi-signature\
    \ enhances security by requiring the approval of multiple parties for a transaction\
    \ to be executed. This is very useful for scenarios requiring high security and\
    \ joint management, such as partnerships, joint accounts or family trusts. For\
    \ example, a 2-of-3 multi-signature scheme requires any two of the three participants\
    \ to provide their signatures to validate and execute the transaction. Such an\
    \ arrangement provides security as well as flexibility and redundancy, addressing\
    \ situations like loss of keys or inability of one party to fulfil their duties.\n\
    \n### Case Study: Creating a Bitcoin Address Using Python\n\nIn this case study,\
    \ Python libraries like `bitcoin` can be utilised to handle cryptographic operations\
    \ and Bitcoin-specific encodings.\n\n1. **Installing Necessary Python Libraries**\n\
    \n   ```\n   pip install bitcoin\n   ```\n\n2. **Generating a Bitcoin Address**\n\
    \   - **Generating a Private Key**: Use a cryptographic library in Python to generate\
    \ a private key.\n\n   ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig5_HTML.jpg)\n\
    \n   Figure 1-5 Private Key\n\n   ```\n   from bitcoin import *\n   my_private_key\
    \ = random_key()\n   print(\"Private Key: %s\\n\" % my_private_key)\n   ```\n\n\
    \   - **Deriving the Public Key**: Compute the public key from the private key.\n\
    \n   ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig6_HTML.jpg)\n\n   Figure\
    \ 1-6 Public Key\n\n   ```\n   my_public_key = privtopub(my_private_key)\n   print(\"\
    Public Key: %s\\n\" % my_public_key)\n   ```\n\n   - **Creating a Bitcoin Address**:\
    \ Convert the public key to a standard Bitcoin address using Bitcoin’s specific\
    \ encoding methods.\n\n   ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig7_HTML.jpg)\n\
    \n   Figure 1-7 Bitcoin Address\n\n   ```\n   my_address = pubtoaddr(my_public_key)\n\
    \   print(\"Bitcoin Address: %s\\n\" % my_address)\n   ```\n\n3. **Creating a\
    \ Multi-signature Address**\n   - **Gathering Multiple Public Keys**: Collect\
    \ public keys from the involved parties.\n   - **Forming a Multi-signature Script**:\
    \ Use a Bitcoin scripting language to create a script that requires signatures\
    \ from a specified number of those keys (e.g., 2-of-3, 3-of-5).\n   - **Generating\
    \ the Multi-signature Address**: Encode the multi-signature script into a Bitcoin\
    \ address.\n\n   ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig8_HTML.jpg)\n\
    \n   Figure 1-8 Multi-signature Address\n\n   ```\n   private_key1 = random_key()\n\
    \   private_key2 = random_key()\n   private_key3 = random_key()\n   public_key1\
    \ = privtopub(private_key1)\n   public_key2 = privtopub(private_key2)\n   public_key3\
    \ = privtopub(private_key3)\n   my_mulit_sig = mk_multisig_script(private_key1,\
    \ private_key2, private_key3, 2, 3)\n   my_mulit_address = scriptaddr(my_mulit_sig)\n\
    \   print(\"My Multisignature Address: %s\\n\" % my_mulit_address)\n   ```\n\n\
    4. **Querying Address Transaction History**\n   - **Choosing a Blockchain API**:\
    \ Select an appropriate API service that allows querying Bitcoin’s blockchain\
    \ (e.g., BlockCypher, Blockchain.info).\n   - **Fetching Transaction Data**: Use\
    \ Python `requests` to call the API with the Bitcoin address and retrieve its\
    \ transaction history.\n\n   ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig9_HTML.jpg)\n\
    \n   Figure 1-9 Transaction History for the ‘Genesis’ Bitcoin Address\n\n   ```\n\
    \   valid_address = '1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa'\n   print(history(valid_address))\n\
    \   ```\n\nThe Bitcoin address `1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa` is significant\
    \ in the history of Bitcoin, being recognised as the \"genesis\" Bitcoin address.\
    \ This address is notable for receiving the first-ever Bitcoin transaction. As\
    \ of the last update, it has a balance of 72.73 BTC, valued at approximately $2,715,604.42.\
    \ The address first received Bitcoin on 3 January 2009, and the most recent activity\
    \ was recorded on 23 November 2023. Interestingly, it has never sent any BTC,\
    \ indicating it has only been used to receive funds.\n\nThis address holds a special\
    \ place in Bitcoin’s history and serves as a symbol of the network’s beginnings.\
    \ Analysing such addresses can provide insights into the early usage patterns\
    \ and distribution of Bitcoin.\n\nThis Python code example demonstrates the foundational\
    \ elements for generating a single-signature Bitcoin address, a multi-signature\
    \ address, and fetching transaction history. However, this is only a conceptual\
    \ demonstration and cannot be used for real-world applications. If you need to\
    \ create a functional Bitcoin address, it is recommended to use a reliable service\
    \ such as BitAddress (`https://www.bitaddress.org`). It’s important to handle\
    \ private keys securely and to understand the implications of transaction analysis\
    \ in a public blockchain like Bitcoin."
