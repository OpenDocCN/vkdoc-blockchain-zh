    # Part II: Ethereum: The Cradle of Smart Contracts


    # 3. The Rise of Ethereum


    The origins and development of Ethereum, a platform created by Vitalik Buterin
    to extend the capabilities of blockchain technology, can be traced to his vision
    of creating a more versatile system. Ethereum introduced the Ethereum Virtual
    Machine (EVM), a core innovation that enables the execution of smart contracts
    and decentralized applications, significantly enhancing blockchain technology
    beyond its initial applications, as seen with Bitcoin. He sought to create a more
    general-purpose and powerful system, comparing Bitcoin to a pocket calculator
    and Ethereum to a smartphone, which could perform a variety of tasks, including
    those a calculator does[¹](#616479_1_En_3_Chapter.xhtml#Sec16).


    Buterin started his journey in the crypto world as a writer for *Bitcoin Weekly*
    and later co-founded *Bitcoin Magazine*. He was initially sceptical about Bitcoin,
    but his views changed, leading him to conceive Ethereum. In 2013, at the age of
    19, he published a whitepaper proposing Ethereum, and the project was launched
    in 2015[²](#616479_1_En_3_Chapter.xhtml#Sec16).


    Ethereum’s distinct features, particularly the EVM and smart contracts, are pivotal
    to its functionality and innovation. This chapter expands on these aspects to
    provide a deeper understanding of Ethereum’s capabilities and how it stands out
    from centralised computing systems like AWS.


    ## 3.1 Ethereum Virtual Machine


    The EVM is a core component of Ethereum’s architecture, serving as a runtime environment
    for smart contracts. It’s a powerful, stack-based, Turing-complete virtual machine
    that executes smart contracts in an isolated environment, ensuring security and
    stability (see Table 3-1). Features of EVM:


    **Table 3-1** Comparison with Ethereum and Centralised Systems (e.g. AWS)


    | Feature | Ethereum Virtual Machine (EVM) | AWS (Centralised System) |

    | --- | --- | --- |

    | Control | Decentralised, no single entity controls the network | Centralised,
    controlled by Amazon |

    | Uptime | High availability, designed to avoid downtime | Generally high but
    susceptible to outages |

    | Data Integrity | Immutable ledger, ensuring data integrity | Data can be altered
    or deleted by service provider |

    | Accessibility | Open to anyone, globally | Access controlled by Amazon, region-specific
    services |

    | Security | Distributed ledger reduces risk of attacks | Centralised servers
    can be more vulnerable to attacks |


    - **Turing Completeness**: EVM can perform any logical step of a computational
    function, a capability not present in many blockchain platforms.

    - **Isolation**: Smart contracts in the EVM run in an isolated environment, ensuring
    that they operate without affecting other processes on the blockchain.

    - **Deterministic Execution**: Every EVM node executes smart contracts identically,
    leading to consistent results across the network.

    - **Security**: Designed to avoid common vulnerabilities and attacks, offering
    a secure environment for executing decentralised applications.


    ### Turing Completeness of Ethereum


    Ethereum’s Turing-complete language allows it to function as a general-purpose
    computer. This means it can execute a wide range of computational tasks, from
    simple to complex algorithms, making it versatile for various applications. Implications
    of Turing Completeness:


    - **Versatility**: Ethereum can theoretically execute any algorithm, allowing
    it to support diverse applications beyond simple transactions.

    - **Complex Smart Contracts**: Enables the creation of complex smart contracts
    that can perform various functions, from automated token distribution to operating
    decentralised autonomous organisations (DAOs).

    - **Decentralised Applications (DApps)**: Facilitates the development of DApps
    with complex logic and interactions, not limited to financial transactions.


    ### Ethereum As a Decentralised Computing Infrastructure


    Ethereum is often viewed as a deterministic state machine, with a globally accessible
    state and a virtual machine that applies changes to this state. Key aspects:


    - **Open Source**: Ethereum’s codebase is open for anyone to review, contribute
    to and build upon.

    - **Decentralised Execution**: Operates on a blockchain network, ensuring decentralised
    execution and consensus.

    - **Global Accessibility**: Its infrastructure is globally accessible without
    any geographical restrictions.

    - **Smart Contract Execution**: Uses ether (`ETH`) to meter and constrain the
    execution resource costs, ensuring efficient use of the network’s resources.'
