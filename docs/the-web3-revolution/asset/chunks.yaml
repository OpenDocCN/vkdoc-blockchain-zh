- fmt: "### Ethereum Explorer: Etherscan\n\n`Etherscan` is essentially a search engine\
    \ and analytics platform for the Ethereum blockchain. It allows you to view public\
    \ data like transactions, smart contracts and addresses on the Ethereum network.\n\
    \n`Etherscan` works by retrieving real-time data from the Ethereum blockchain,\
    \ maintaining an organised record of this data and presenting it to users in an\
    \ easily navigable interface. It doesn’t store your private keys or allow you\
    \ to trade; instead, it serves as a comprehensive database of on-chain activities,\
    \ smart contracts and transactions.\n\nThe platform is widely used for various\
    \ purposes, such as tracking wallet activities, examining transaction and block\
    \ details, reading and interacting with smart contracts, checking real-time gas\
    \ prices to estimate transaction fees and much more. For developers, it offers\
    \ API access to its blockchain explorer data, which can be particularly helpful\
    \ for creating decentralised applications.\n\nYou don’t need an account to use\
    \ `Etherscan`, but having one can grant you additional functionalities like setting\
    \ up alerts for transactions to your addresses. Importantly, `Etherscan` is a\
    \ tool that can help ensure transparency and security in your blockchain interactions\
    \ by allowing you to monitor wallet authorisations and revoke them if necessary,\
    \ helping to prevent unauthorised access to your assets.\n\n## Dripping Resources\
    \ for Blockchain Newcomers: Faucets\n\nIn the burgeoning world of blockchain,\
    \ a ‘faucet’ serves as a pivotal starting point for those new to the space. A\
    \ faucet is a system that dispenses small, free amounts of cryptocurrency, acting\
    \ as a vital resource for users to experience cryptocurrency transactions firsthand\
    \ without the need for an initial investment. This not only provides a practical\
    \ learning experience but also supports the wider ecosystem by fostering a deeper\
    \ understanding of transaction processes within the blockchain network.\n\nThe\
    \ operation of a faucet is underpinned by a simple mechanism: it is typically\
    \ funded by donations or advertisements and programmed to release small quantities\
    \ of cryptocurrency at specified intervals or for completing certain tasks. This\
    \ tool is particularly crucial in test networks like Ethereum’s `Goerli` or `Sepolia`,\
    \ where developers and users can simulate transactions, test applications and\
    \ ensure the integrity of their projects in a risk-free environment.\n\nFaucets\
    \ play a role beyond the mere distribution of tokens; they are also an introduction\
    \ to the concept of airdrops. An airdrop involves the distribution of tokens,\
    \ usually for free, to the digital wallets of the active members of the blockchain\
    \ community to encourage engagement or disperse rewards. Both faucets and airdrops\
    \ are central to the infrastructure that supports the growth and accessibility\
    \ of blockchain technology, functioning as a foundational pathway for new entrants\
    \ into the space.\n\nThe smart contract example for an Ethereum faucet is designed\
    \ to dispense a specified amount of `ETH` when requested by a user. The contract\
    \ includes features such as\n\n*   An ownership designation that can be transferred\n\
    *   A set amount of `ETH` to dispense per request\n*   A donation function to\
    \ receive funds\n*   Tracking of addresses that have requested `ETH`\n*   A time\
    \ lock to limit requests to once per day\n\nHere is an example of a simple `Solidity`\
    \ smart contract for an Ethereum faucet based on the common features described\
    \ in online resources.\n\n### Smart Contract Example – Faucet\n\n```solidity\n\
    pragma solidity ^0.8.3;\ncontract ETHFaucet {\n    address public owner;\n   \
    \ uint public dispenseAmount = 1 ether;\n    mapping(address => uint) public lastAccessTime;\n\
    \    constructor() payable {\n        owner = msg.sender;\n    }\n    modifier\
    \ onlyOwner {\n        require(msg.sender == owner, \"Only the owner can call\
    \ this function.\");\n        _;\n    }\n    function requestEth() public {\n\
    \        require(address(this).balance >= dispenseAmount, \"Insufficient funds\
    \ in faucet.\");\n        require(lastAccessTime[msg.sender] + 1 days < block.timestamp,\
    \ \"Wait 24h\");\n        payable(msg.sender).transfer(dispenseAmount);\n    \
    \    lastAccessTime[msg.sender] = block.timestamp;\n    }\n    function donateToFaucet()\
    \ public payable {}\n    function setDispenseAmount(uint newAmount) public onlyOwner\
    \ {\n        dispenseAmount = newAmount;\n    }\n}\n```\n\nThis contract allows\
    \ users to request a fixed amount of `ETH` once every 24 hours and allows for\
    \ donations to the faucet. The owner can set the dispense amount. Keep in mind\
    \ that for a real implementation, additional security checks and optimisations\
    \ would be necessary. This code is for educational purposes and should be thoroughly\
    \ audited before use on the mainnet.\n\nTo illustrate the process of using the\
    \ faucet, let’s take the Ethereum test network, `Sepolia`, as an example. To receive\
    \ test `ETH` (`SepoliaETH`), one would need to do the following:\n\n1.  To get\
    \ started with Ethereum’s `Sepolia` test network using `MetaMask`, open the `MetaMask`\
    \ extension in your browser. At the top of the `MetaMask` interface where the\
    \ network is displayed, click to open the network selection drop-down menu. If\
    \ the test networks are not visible, toggle the ‘Show test networks’ option on.\
    \ From the list of available networks, select ‘Sepolia’. `MetaMask` will then\
    \ switch to the `Sepolia` test network, and your account will be connected to\
    \ it.\n\n    You can now interact with the `Sepolia` network, which mirrors the\
    \ Ethereum mainnet environment, allowing you to test transactions and smart contract\
    \ interactions without using real `ETH`. Remember to ensure that the wallet address\
    \ displayed in `MetaMask` is correct and that you have access to the private keys\
    \ or seed phrase for that wallet.\n\n    ![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig13_HTML.jpg)\n\
    \n    Figure 4-13: `Sepolia` Network\n\n2.  Visit a reputable `Sepolia` faucet\
    \ website, like the one provided by Alchemy ([`www.alchemy.com/faucets/ethereum-sepolia`](http://www.alchemy.com/faucets/ethereum-sepolia)).\
    \ On this platform, you can request free `Sepolia` `ETH` to be used for testing\
    \ purposes.\n\n    ![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig14_HTML.jpg)\n\
    \n    Figure 4-14: Alchemy `Sepolia` Faucet (Source: [`www.alchemy.com/faucets/ethereum-sepolia`](https://www.alchemy.com/faucets/ethereum-sepolia))\n\
    \n    These websites usually require you to\n\n    *   Sign in or create an account\
    \ with the faucet provider.\n    *   Enter your `Sepolia` wallet address in the\
    \ designated field.\n    *   Complete any necessary security checks, such as CAPTCHAs,\
    \ to confirm that you’re not a bot.\n    *   Click the ‘Send Me ETH’ or equivalent\
    \ button to receive the test `ETH` in your wallet.\n\n    When using the `Sepolia`\
    \ faucet, you can request up to 0.5 `Sepolia` `ETH` per day. This limitation ensures\
    \ fair distribution among users and simulates a real-world environment where transactional\
    \ limits are often in place. This daily allowance of test `ETH` allows developers\
    \ and testers to conduct numerous transactions and test various blockchain operations\
    \ without the fear of running out of funds too quickly. It’s an ideal setup for\
    \ continuous development and testing on the `Sepolia` testnet. Remember, the provided\
    \ test `ETH` has no real-world value and is meant solely for testing and development\
    \ activities within the `Sepolia` testnet environment.\n\n3.  After entering your\
    \ wallet address on the `Sepolia` Faucet website and completing any required verification\
    \ steps, you simply need to wait for approximately 10–15 seconds. Once the request\
    \ is processed, you will receive 0.5 `Sepolia` `ETH` in your `MetaMask` wallet\
    \ as depicted in Figure 4-15."
  raw: "### Ethereum Explorer: Etherscan\n\nEtherscan is essentially a search engine\
    \ and analytics platform for the Ethereum blockchain. It allows you to view public\
    \ data like transactions, smart contracts and addresses on the Ethereum network.\n\
    \nEtherscan works by retrieving real-time data from the Ethereum blockchain, maintaining\
    \ an organised record of this data and presenting it to users in an easily navigable\
    \ interface. It doesn’t store your private keys or allow you to trade; instead,\
    \ it serves as a comprehensive database of on-chain activities, smart contracts\
    \ and transactions.\n\nThe platform is widely used for various purposes, such\
    \ as tracking wallet activities, examining transaction and block details, reading\
    \ and interacting with smart contracts, checking real-time gas prices to estimate\
    \ transaction fees and much more. For developers, it offers API access to its\
    \ blockchain explorer data, which can be particularly helpful for creating decentralised\
    \ applications.\n\nYou don’t need an account to use Etherscan, but having one\
    \ can grant you additional functionalities like setting up alerts for transactions\
    \ to your addresses. Importantly, Etherscan is a tool that can help ensure transparency\
    \ and security in your blockchain interactions by allowing you to monitor wallet\
    \ authorisations and revoke them if necessary, helping to prevent unauthorised\
    \ access to your assets.\n\n## 4.2 Dripping Resources for Blockchain Newcomers:\
    \ Faucets\n\nIn the burgeoning world of blockchain, a ‘faucet’ serves as a pivotal\
    \ starting point for those new to the space. A faucet is a system that dispenses\
    \ small, free amounts of cryptocurrency, acting as a vital resource for users\
    \ to experience cryptocurrency transactions firsthand without the need for an\
    \ initial investment. This not only provides a practical learning experience but\
    \ also supports the wider ecosystem by fostering a deeper understanding of transaction\
    \ processes within the blockchain network.\n\nThe operation of a faucet is underpinned\
    \ by a simple mechanism: it is typically funded by donations or advertisements\
    \ and programmed to release small quantities of cryptocurrency at specified intervals\
    \ or for completing certain tasks. This tool is particularly crucial in test networks\
    \ like Ethereum’s Goerli or Sepolia, where developers and users can simulate transactions,\
    \ test applications and ensure the integrity of their projects in a risk-free\
    \ environment.\n\nFaucets play a role beyond the mere distribution of tokens;\
    \ they are also an introduction to the concept of airdrops. An airdrop involves\
    \ the distribution of tokens, usually for free, to the digital wallets of the\
    \ active members of the blockchain community to encourage engagement or disperse\
    \ rewards. Both faucets and airdrops are central to the infrastructure that supports\
    \ the growth and accessibility of blockchain technology, functioning as a foundational\
    \ pathway for new entrants into the space.\n\nThe smart contract example for an\
    \ Ethereum faucet is designed to dispense a specified amount of ETH when requested\
    \ by a user. The contract includes features such as\n\n*   An ownership designation\
    \ that can be transferred\n\n*   A set amount of ETH to dispense per request\n\
    \n*   A donation function to receive funds\n\n*   Tracking of addresses that have\
    \ requested ETH\n\n*   A time lock to limit requests to once per day\n\nHere is\
    \ an example of a simple Solidity smart contract for an Ethereum faucet based\
    \ on the common features described in online resources.\n\n### Smart Contract\
    \ Example – Faucet\n\n```\npragma solidity ^0.8.3;\ncontract ETHFaucet {\naddress\
    \ public owner;\nuint public dispenseAmount = 1 ether;\nmapping(address => uint)\
    \ public lastAccessTime;\nconstructor() payable {\nowner = msg.sender;\n}\nmodifier\
    \ onlyOwner {\nrequire(msg.sender == owner, \"Only the owner can call this function.\"\
    );\n_;\n}\nfunction requestEth() public {\nrequire(address(this).balance >= dispenseAmount,\
    \ \"Insufficient funds in faucet.\");\nrequire(lastAccessTime[msg.sender] + 1\
    \ days < block.timestamp, \"Wait 24h\");\npayable(msg.sender).transfer(dispenseAmount);\n\
    lastAccessTime[msg.sender] = block.timestamp;\n}\nfunction donateToFaucet() public\
    \ payable {}\nfunction setDispenseAmount(uint newAmount) public onlyOwner {\n\
    dispenseAmount = newAmount;\n}\n}\n```\n\nThis contract allows users to request\
    \ a fixed amount of ETH once every 24 hours and allows for donations to the faucet.\
    \ The owner can set the dispense amount. Keep in mind that for a real implementation,\
    \ additional security checks and optimisations would be necessary. This code is\
    \ for educational purposes and should be thoroughly audited before use on the\
    \ mainnet.\n\nTo illustrate the process of using the faucet, let’s take the Ethereum\
    \ test network, Sepolia, as an example. To receive test ETH (SepoliaETH), one\
    \ would need to do the following:\n\n1.  To get started with Ethereum’s Sepolia\
    \ test network using MetaMask, open the MetaMask extension in your browser. At\
    \ the top of the MetaMask interface where the network is displayed, click to open\
    \ the network selection drop-down menu. If the test networks are not visible,\
    \ toggle the ‘Show test networks’ option on. From the list of available networks,\
    \ select ‘Sepolia’. MetaMask will then switch to the Sepolia test network, and\
    \ your account will be connected to it.\n\nYou can now interact with the Sepolia\
    \ network, which mirrors the Ethereum mainnet environment, allowing you to test\
    \ transactions and smart contract interactions without using real ETH. Remember\
    \ to ensure that the wallet address displayed in MetaMask is correct and that\
    \ you have access to the private keys or seed phrase for that wallet.\n\n![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig13_HTML.jpg)\n\
    \nFigure 4-13\n\nSepolia Network\n\n1.  Visit a reputable Sepolia faucet website,\
    \ like the one provided by Alchemy ([`www.alchemy.com/faucets/ethereum-sepolia`](http://www.alchemy.com/faucets/ethereum-sepolia)).\
    \ On this platform, you can request free Sepolia ETH to be used for testing purposes.\n\
    \n![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig14_HTML.jpg)\n\nFigure 4-14\n\
    \nAlchemy Sepolia Faucet(Source: [*www.alchemy.com/faucets/ethereum-sepolia*](https://www.alchemy.com/faucets/ethereum-sepolia))\n\
    \nThese websites usually require you to\n    *   Sign in or create an account\
    \ with the faucet provider.\n\n*   Enter your Sepolia wallet address in the designated\
    \ field.\n\n*   Complete any necessary security checks, such as CAPTCHAs, to confirm\
    \ that you’re not a bot.\n\n*   Click the ‘Send Me ETH’ or equivalent button to\
    \ receive the test ETH in your wallet.\n\nWhen using the Sepolia faucet, you can\
    \ request up to 0.5 Sepolia ETH per day. This limitation ensures fair distribution\
    \ among users and simulates a real-world environment where transactional limits\
    \ are often in place. This daily allowance of test ETH allows developers and testers\
    \ to conduct numerous transactions and test various blockchain operations without\
    \ the fear of running out of funds too quickly. It’s an ideal setup for continuous\
    \ development and testing on the Sepolia testnet. Remember, the provided test\
    \ ETH has no real-world value and is meant solely for testing and development\
    \ activities within the Sepolia testnet environment.\n\n1.  After entering your\
    \ wallet address on the Sepolia Faucet website and completing any required verification\
    \ steps, you simply need to wait for approximately 10–15 seconds. Once the request\
    \ is processed, you will receive 0.5 Sepolia ETH in your MetaMask wallet as depicted\
    \ in Figure [4-15](#616479_1_En_4_Chapter.xhtml#Fig15)."
  trans: "\n### 以太坊浏览器：Etherscan\n\n`Etherscan` 本质上是以太坊区块链的搜索引擎和分析平台。它允许你查看以太坊网络上的公共数据，例如交易、智能合约和地址。\n\
    \n`Etherscan` 的工作原理是从以太坊区块链中检索实时数据，维护这些数据的组织记录，并以易于导航的界面呈现给用户。它不会存储你的私钥，也不允许你进行交易；相反，它充当了链上活动、智能合约和交易的综合性数据库。\n\
    \n该平台被广泛用于各种目的，例如追踪钱包活动、检查交易和区块详情、读取和交互智能合约、检查实时 Gas 价格以估算交易费用等等。对于开发者而言，它提供了对其区块链浏览器数据的\
    \ API 访问，这对于创建去中心化应用程序特别有帮助。\n\n你无需账户即可使用 `Etherscan`，但拥有账户可以为你提供额外功能，例如为你地址的交易设置提醒。重要的是，`Etherscan`\
    \ 是一个工具，通过允许你监控钱包授权并在必要时撤销授权来帮助确保区块链交互的透明度和安全性，从而防止对你的资产进行未经授权的访问。\n\n## 区块链新手的资源水龙头：Faucets\n\
    \n在蓬勃发展的区块链世界中，“水龙头”（faucet）对于该领域的新手来说是一个关键的起点。水龙头是一种分发少量免费加密货币的系统，作为用户无需初始投资即可亲身体验加密货币交易的重要资源。这不仅提供了实践学习经验，还通过促进对区块链网络内交易过程的更深入理解来支持更广泛的生态系统。\n\
    \n水龙头的运作基于一个简单的机制：它通常由捐赠或广告提供资金，并被编程为按指定间隔或完成特定任务时释放少量加密货币。该工具在像以太坊的 `Goerli`\
    \ 或 `Sepolia` 这样的测试网络中尤其重要，开发者和用户可以在无风险环境中模拟交易、测试应用程序并确保其项目的完整性。\n\n水龙头的作用不仅仅是分发代币；它们也是空投概念的入门介绍。空投涉及将代币（通常是免费的）分发给区块链社区活跃成员的数字钱包，以鼓励参与或分发奖励。水龙头和空投都是支持区块链技术增长和可及性的基础设施的核心，为新进入该领域的人提供了基础路径。\n\
    \n用于以太坊水龙头的智能合约示例旨在用户请求时分发指定数量的 `ETH`。该合约包含以下特性：\n\n*   可转让的所有权指定\n*   每次请求分发的固定\
    \ `ETH` 数量\n*   接收资金的捐赠功能\n*   追踪已请求 `ETH` 的地址\n*   限制每天只能请求一次的时间锁\n\n以下是一个基于在线资源中描述的常见功能的简单\
    \ `Solidity` 智能合约示例，用于以太坊水龙头。\n\n### 智能合约示例 – 水龙头\n\n```solidity\npragma solidity\
    \ ⁰.8.3;\ncontract ETHFaucet {\n    address public owner;\n    uint public dispenseAmount\
    \ = 1 ether;\n    mapping(address => uint) public lastAccessTime;\n    constructor()\
    \ payable {\n        owner = msg.sender;\n    }\n    modifier onlyOwner {\n  \
    \      require(msg.sender == owner, \"Only the owner can call this function.\"\
    );\n        _;\n    }\n    function requestEth() public {\n        require(address(this).balance\
    \ >= dispenseAmount, \"Insufficient funds in faucet.\");\n        require(lastAccessTime[msg.sender]\
    \ + 1 days < block.timestamp, \"Wait 24h\");\n        payable(msg.sender).transfer(dispenseAmount);\n\
    \        lastAccessTime[msg.sender] = block.timestamp;\n    }\n    function donateToFaucet()\
    \ public payable {}\n    function setDispenseAmount(uint newAmount) public onlyOwner\
    \ {\n        dispenseAmount = newAmount;\n    }\n}\n```\n\n该合约允许用户每 24 小时请求一次固定数量的\
    \ `ETH`，并允许向水龙头捐款。所有者可以设置分发数量。请记住，在真实部署中，还需要进行额外的安全检查与优化。此代码仅用于教育目的，在主网上使用前应进行彻底审计。\n\
    \n为了说明使用水龙头的过程，我们以以太坊测试网络 `Sepolia` 为例。要接收测试 `ETH`（`SepoliaETH`），需要执行以下步骤：\n\n\
    1.  要使用 `MetaMask` 开始使用以太坊的 `Sepolia` 测试网络，请在浏览器中打开 `MetaMask` 扩展程序。在 `MetaMask`\
    \ 界面顶部显示网络的位置，点击打开网络选择下拉菜单。如果测试网络不可见，请打开“显示测试网络”选项。从可用网络列表中，选择“Sepolia”。然后 `MetaMask`\
    \ 将切换到 `Sepolia` 测试网络，你的账户将连接到该网络。\n\n    现在你可以与 `Sepolia` 网络交互，该网络镜像了以太坊主网环境，允许你无需使用真实\
    \ `ETH` 即可测试交易和智能合约交互。请记住确保 `MetaMask` 中显示的钱包地址正确，并且你可以访问该钱包的私钥或助记词。\n\n    ![](img/616479_1_En_4_Fig13_HTML.jpg)\n\
    \n    图 4-13：`Sepolia` 网络\n\n2.  访问一个信誉良好的 `Sepolia` 水龙头网站，例如由 Alchemy 提供的（[`www.alchemy.com/faucets/ethereum-sepolia`](http://www.alchemy.com/faucets/ethereum-sepolia)）。在此平台上，你可以请求免费的\
    \ `Sepolia` `ETH` 用于测试目的。\n\n    ![](img/616479_1_En_4_Fig14_HTML.jpg)\n\n   \
    \ 图 4-14：Alchemy `Sepolia` 水龙头（来源：[`www.alchemy.com/faucets/ethereum-sepolia`](https://www.alchemy.com/faucets/ethereum-sepolia)）\n\
    \n    这些网站通常要求你\n\n    *   登录或创建一个水龙头提供者的账户。\n    *   在指定字段中输入你的 `Sepolia` 钱包地址。\n\
    \    *   完成任何必要的安全检查，例如 CAPTCHA 验证，以确认你不是机器人。\n    *   点击“发送 ETH 给我”或类似的按钮，在你的钱包中接收测试\
    \ `ETH`。\n\n    使用 `Sepolia` 水龙头时，每天最多可以请求 0.5 个 `Sepolia` `ETH`。此限制旨在确保用户之间的公平分配，并模拟通常存在交易限额的真实环境。每天提供的测试\
    \ `ETH` 允许开发者和测试人员进行大量交易并测试各种区块链操作，而无需担心资金过快耗尽。这是在 `Sepolia` 测试网上进行持续开发和测试的理想设置。请记住，提供的测试\
    \ `ETH` 没有实际价值，仅用于 `Sepolia` 测试网环境内的测试和开发活动。\n\n3.  在 `Sepolia` 水龙头网站输入你的钱包地址并完成任何必要的验证步骤后，你只需等待大约\
    \ 10-15 秒。一旦请求被处理，你的 `MetaMask` 钱包中将收到 0.5 个 `Sepolia` `ETH`，如图 4-15 所示。\n"
- fmt: '### Figure 4-15

    Updated Balance on the MetaMask Wallet – Sepolia


    This transaction, although not on the Ethereum mainnet, can be verified on the
    `Sepolia` Testnet version of `Etherscan`. Just look for the `Sepolia` Testnet
    indicator in the top corner of the `Etherscan` page. This allows you to follow
    the transaction and confirm that the test ETH has been credited to your account.


    ### Figure 4-16

    Sepolia Testnet Etherscan (Source: [*https://sepolia.etherscan.io/*](https://sepolia.etherscan.io/))


    This process allows newcomers to not only acquire test assets without cost but
    also to engage with the blockchain environment directly, fostering a practical
    understanding of its operations and the potential applications within.


    ## 4.3 Expanding Horizons with Layer 2 Solutions


    Layer 2 solutions on the Ethereum network are essential because they address the
    blockchain trilemma of decentralisation, scalability and security. The blockchain
    trilemma posits that it is challenging to achieve all three properties simultaneously;
    typically, a blockchain can only excel at two out of the three. Ethereum, like
    other Layer 1 blockchains, is decentralised and secure but has struggled with
    scalability, especially as the network has grown and the demand for block space
    has increased. This results in high transaction fees and slower processing times
    during periods of congestion.


    ### Figure 4-17

    Blockchain Trilemma


    Layer 2 solutions, such as Rollups, aim to alleviate these issues by handling
    transactions off the main chain, thus increasing throughput and reducing costs
    without compromising on the network’s decentralisation or security. Rollups work
    by grouping or ‘rolling up’ multiple transactions into a single one and then submitting
    this to the main Ethereum chain. This process helps in relieving congestion on
    the network and makes transactions faster and less expensive.


    There are two main types of Rollups: `Optimistic Rollups` and `ZK-Rollups`. `Optimistic
    Rollups` assume transactions are valid by default and only run computations in
    the event of a challenge, whereas `ZK-Rollups` use zero-knowledge proofs to verify
    transactions’ validity without revealing their contents. Both have their own set
    of advantages and trade-offs. `ZK-Rollups`, for instance, offer faster transaction
    speeds and lower fees but require a more complex setup that can lead to centralisation.
    `Optimistic Rollups`, on the other hand, are easier to implement but have a challenge
    period that can delay withdrawals.


    Here’s a summary of their differences based on several key factors:


    1.  **Security**: `Optimistic Rollups` depend on fraud proofs and economic incentives
    to ensure transaction validity, requiring only one honest node to challenge fraud.
    However, this means that security relies on the presence of honest actors. `ZK-Rollups`,
    on the other hand, use cryptographic proofs (zero-knowledge proofs) to validate
    transactions, offering mathematical security guarantees without relying on human
    validators.


    2.  **Cost**: `Optimistic Rollups` typically have lower computation costs since
    they don’t require specialised hardware for fraud proofs. However, they do post
    all transaction data on the Ethereum main chain, which could increase costs. `ZK-Rollups`
    can reduce costs with efficient data compression techniques, but they have higher
    hardware requirements for generating cryptographic proofs, which can make them
    more expensive for users.


    3.  **Transaction Finality**: In `Optimistic Rollups`, there’s a challenge period
    which can delay transaction finality. `ZK-Rollups` offer immediate withdrawals
    due to the validity proofs, which confirm the authenticity of transactions without
    delay.


    4.  **EVM Compatibility**: `Optimistic Rollups` are compatible with the Ethereum
    Virtual Machine (EVM), making it easier for developers to transition existing
    Ethereum-based applications. `ZK-Rollups` are not fully EVM compatible, which
    can present higher barriers for developers.


    As for specific project examples, `Optimistic Rollups` such as `Arbitrum` and
    `Optimism` have been utilised by Ethereum-based decentralised exchanges like `Uniswap`
    and `SushiSwap`. `ZK-Rollups`, such as those used by `Polygon ID` for private
    on-chain verification, offer high security and privacy standards, which are crucial
    for identity verification protocols.


    Table [4-2](#616479_1_En_4_Chapter.xhtml#Tab2) shows a comparison of projects
    using these technologies.


    **Table 4-2** Optimistic Rollups vs. ZK-Rollups


    | Feature | Optimistic Rollups Example | ZK-Rollups Example |

    | --- | --- | --- |

    | EVM Compatibility | `Arbitrum`, `Optimism` | `Polygon zkEVM`, `Scroll zkEVM`
    |

    | Transaction Costs | Lower due to minimal data on-chain | Potentially higher
    due to proof generation |

    | Security | Based on economic incentives and fraud proofs | Based on cryptographic
    proofs |

    | Use Cases | DeFi applications, decentralised exchanges | Identity verification,
    private crypto trading |


    These examples highlight how the choice between `Optimistic` and `ZK-Rollups`
