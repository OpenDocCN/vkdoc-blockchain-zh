  trans: '

    ### 元宇宙的核心基础要素


    元宇宙这一概念激发了技术专家、创作者和消费者的想象力，正站在重新定义数字与现实领域的门槛上。它的基础建立在一系列技术进步之上，这些进步使其区别于我们已习以为常的传统互联网和数字空间。在此，我们将深入探讨构成元宇宙核心基础的关键要素，这些要素使其成为未来世代独特且具有变革性的平台：


    -   **去中心化架构**：元宇宙利用区块链技术确保在其广阔的数字化版图中，数据的完整性、安全性和所有权得到维护。区块链固有的特性，如去中心化、不可篡改性和透明度，为构建一个用户能够信任其数据和交易安全的元宇宙提供了坚实框架。通过去中心化架构，元宇宙确保没有任何单一实体能够控制整个生态系统，从而实现了数字互动和所有权的民主化。


    -   **沉浸式技术**：元宇宙体验的核心是虚拟现实（VR）、增强现实（AR）和 3D 建模等沉浸式技术。VR 将用户沉浸在数字环境中，使他们能够以高度逼真的方式与虚拟世界互动。AR
    则将数字信息叠加到物理世界上，用交互式数字元素丰富用户的现实环境。3D 建模和模拟技术能够在元宇宙中创建复杂、逼真的物体和环境。这些技术共同创造了引人入胜的沉浸式体验，模糊了数字世界与物理世界之间的界限。¹


    -   **数字经济**：元宇宙引入了一种数字经济，通过非同质化代币（NFT）和加密货币促进数字资产的真正所有权。NFT 代表独特的数字物品——从艺术品和收藏品到虚拟房地产等——而加密货币则能在元宇宙内实现安全、透明的金融交易。这种经济模式允许创建、购买、出售和交易虚拟商品与服务，培育出一个反映现实世界经济复杂性和动态性的繁荣经济体。


    -   **互操作性**：元宇宙的一个关键特征是能够确保资产和身份在不同环境和平台之间无缝移动。这是通过开发和采用促进互操作性的标准和协议来实现的。通过使资产能够在各种虚拟空间中具有可移植性和持久性，元宇宙提供了一种超越单个平台或应用程序的统一、连续的体验。²


    -   **空间计算**：结合了人工智能（AI）、机器学习和空间技术的元宇宙，能够在其环境中实现复杂的交互和行为。空间计算允许理解和操控数字与物理空间，使
    AI 驱动的化身能够在元宇宙中导航，实现逼真的物理模拟和上下文感知的数字内容。这种级别的计算智能对于创建能够适应与用户交互和行为的动态、响应式环境至关重要。³


    这些基础要素共同预示着一个未来，即数字与现实世界的融合将为协作、创造力和互动开启前所未有的机遇。由 Web3 技术驱动的元宇宙，标志着我们感知和互动数字空间方式的根本性转变，预示着数字存在的新纪元。


    ## 9.2 Web3 与元宇宙中的经济模型与机遇


    在审视 Web3 和元宇宙所呈现的不断演变的经济模型与机遇时，我们显然正处于一个根本性转变的前沿——经济系统的结构方式、价值的创造与分配方式，以及个人和组织在数字领域内的互动方式都将发生改变。此番阐述旨在汲取这些变革性转变的关键见解，借鉴区块链和数字资产领域中更广泛的概念。⁴^,
    ⁵


    ### 去中心化经济系统


    Web3 和元宇宙向去中心化经济模型的转变，代表着从传统的股东中心模型，向利益相关者在经济成果中拥有更大话语权和份额的系统的转变。这一范式转变扩展了资本的定义，将数字资产、知识产权和用户参与度纳入其中，从而使经济参与和利益分配民主化。让我们深入探讨**4D
    元经济学**，并探索它们在去中心化经济系统中的作用：


    -   **数字创作**：这一维度聚焦于元宇宙中数字内容的生产。它涵盖了从虚拟世界和数字商品的创建，到音乐、艺术和文学等媒体内容的生成。在去中心化系统中，创作者保留对其作品的拥有权和控制权，利用区块链技术保护知识产权和管理权利。这种赋权不仅促进了创新，也确保了创作者获得公平的报酬。


    -   **数字资产**：数字资产包括从代表虚拟物品所有权的 NFT，到代表数字企业股份的代币。这些资产的独特之处在于它们提供了所有权的证明，并可以在元宇宙的不同平台和服务之间进行交易或使用。它们在数字市场中的互操作性和流动性，标志着从物理资产限制的重大转变，提高了
    Web3 中经济交易的速度和规模。


    -   **数字市场**：这是数字资产进行买卖或交易的地方。元宇宙中的数字市场被设计成开放且全球性的，7x24 小时运行，不受地理边界或中心化控制的限制。这些市场依赖区块链来实现无需信任的交易，利用智能合约执行自动协议，并通过去中心化交易所实现无需中介的点对点交易。


    -   **数字货币**：作为元宇宙交易活动的命脉，加密货币等数字货币允许价值在数字领域中无缝转移。除了作为交易媒介之外，这些货币还可以代表治理代币，赋予持有者在去中心化自治组织（DAO）或其他
    Web3 实体中参与决策的投票权。


    在 4D 元经济学的背景下，去中心化经济系统意味着一个整体的生态系统，其中每个维度相互作用，共同构建一个强大且包容的经济体。在这里，利益相关者不仅仅是消极的投资者，而是积极的参与者，对数字商品和服务的创建、估值、交易和使用拥有重要的话语权。这种包容性和参与性的经济有可能在全球范围内重新定义财富的创造、分配和经济赋权，开辟出远超传统经济体系所能提供的、广泛创造和分配财富的机遇。

    '
- fmt: '### Value Creation and Distribution


    The process of value creation in the metaverse hinges on the utilisation of digital
    platforms where creators can innovate without the constraints of the physical
    world. Virtual real estate development, for example, allows for the creation of
    spaces for social interactions, commerce and entertainment. The development tools
    and platforms in Web3 are designed to be more accessible, which democratises the
    process of creation. Users are not just passive consumers but also become creators
    themselves, participating in and contributing to the metaverse''s expansion and
    diversity.


    The distribution of value in the metaverse is facilitated through blockchain technology,
    enabling a fair and transparent system where contributions and transactions are
    recorded and rewarded accordingly. Smart contracts automate the distribution of
    revenues according to predefined rules agreed upon by stakeholders, ensuring that
    creators and participants receive their fair share of the profits generated from
    their contributions.


    The monetisation strategies in the metaverse are as varied as the assets themselves.
    Creators can monetise digital art via NFTs, developers can sell virtual real estate,
    and gamers can earn through ''play-to-earn'' models. The direct relationship between
    creators and consumers in the metaverse eliminates many of the middlemen present
    in traditional economies, allowing for a more efficient and equitable flow of
    funds.


    The traditional market norms are upended in the metaverse, where scarcity is not
    dictated by physical limitations but by design and consensus. The metaverse economy
    thrives on the principles of abundance and network effects, where the value of
    a digital asset often increases with its usage and integration into different
    platforms and applications. This creates a more dynamic and fluid economic model,
    where value is not solely based on scarcity or traditional supply and demand dynamics.


    The 4D Metanomics paves the way for innovative financial models, such as fractional
    ownership of digital assets and the emergence of micro-economies within the metaverse.
    These models provide opportunities for both small and large investors to participate
    in the growth of digital assets. Additionally, the integration of DeFi (decentralised
    finance) introduces new investment and funding mechanisms, like yield farming
    and liquidity mining, which are unique to the blockchain-based economy.


    In this expanded digital economy, every interaction, every creation and every
    transaction has the potential to generate value that can be captured, distributed
    and monetised in ways that traditional markets have not envisioned. As these systems
    continue to evolve, they promise to offer more personalised, empowering and democratised
    economic experiences.


    ### Collaborative Work and Innovation


    In the context of Web3 and the metaverse, the shift towards collaborative work
    and innovation heralds a new era of collective creativity and distributed entrepreneurship.
    This transformative approach reshapes the landscape of work, blurring the lines
    between creators, consumers and collaborators:


    - **Crowdsourced Innovation**: Web3 platforms empower a crowdsourced model of
    innovation where ideas and projects can be sourced from a global community. Through
    mechanisms like DAOs and open source frameworks, individuals from different backgrounds
    can contribute to a project, pushing the boundaries of innovation beyond what
    might be possible within a single organisation or geography.


    - **Decentralised Collaborative Platforms**: The metaverse provides platforms
    that allow for real-time collaboration in virtual environments. These platforms
    are not limited by geography, enabling real-time interactions and teamwork across
    the globe, which can lead to faster ideation and development cycles. Virtual spaces
    can simulate real-world conditions, or they can provide entirely new contexts
    for problem-solving and creativity.


    - **Redefining Roles and Employment**: In the metaverse, traditional roles such
    as employee, contractor and consumer are being redefined. Users can simultaneously
    be creators, market participants and beneficiaries in the value chain. This multiplicity
    of roles fosters a dynamic environment where work, participation and consumption
    are intertwined.


    - **Productivity in the Digital Economy**: Productivity metrics in the metaverse
    are reimagined, focusing on contribution and impact rather than traditional metrics
    like hours worked. In this environment, the efficiency of work can be vastly improved
    by digital tools and AI assistants that automate routine tasks, freeing human
    creativity for higher-level problem-solving and artistic endeavours.


    - **Open Talent Networks**: The metaverse creates open talent networks where individuals
    can showcase their skills and be discovered by potential collaborators or employers.
    These networks support a gig economy on a global scale, with the potential to
    match talent with opportunities more efficiently than ever before.


    - **Incentive Alignment**: In the metaverse, economic incentives can be aligned
    with contributions through tokenomics, ensuring that those who contribute value
    are rewarded. This direct incentive mechanism encourages active participation
    and continuous contribution, which is crucial for sustained innovation.


    The metaverse and Web3 are not only changing where and how we work but also why
    we work. They provide a foundation for a more collaborative, innovative and inclusive
    economic structure that incentivises and rewards participation and contribution,
    laying the groundwork for a future where the pursuit of individual passions and
    collective goals can be one and the same.'
  raw: '### Value Creation and Distribution


    The process of value creation in the metaverse hinges on the utilisation of digital
    platforms where creators can innovate without the constraints of the physical
    world. Virtual real estate development, for example, allows for the creation of
    spaces for social interactions, commerce and entertainment. The development tools
    and platforms in Web3 are designed to be more accessible, which democratises the
    process of creation. Users are not just passive consumers but also become creators
    themselves, participating in and contributing to the metaverse''s expansion and
    diversity.


    The distribution of value in the metaverse is facilitated through blockchain technology,
    enabling a fair and transparent system where contributions and transactions are
    recorded and rewarded accordingly. Smart contracts automate the distribution of
    revenues according to predefined rules agreed upon by stakeholders, ensuring that
    creators and participants receive their fair share of the profits generated from
    their contributions.


    The monetisation strategies in the metaverse are as varied as the assets themselves.
    Creators can monetise digital art via NFTs, developers can sell virtual real estate,
    and gamers can earn through ''play-to-earn'' models. The direct relationship between
    creators and consumers in the metaverse eliminates many of the middlemen present
    in traditional economies, allowing for a more efficient and equitable flow of
    funds.


    The traditional market norms are upended in the metaverse, where scarcity is not
    dictated by physical limitations but by design and consensus. The metaverse economy
    thrives on the principles of abundance and network effects, where the value of
    a digital asset often increases with its usage and integration into different
    platforms and applications. This creates a more dynamic and fluid economic model,
    where value is not solely based on scarcity or traditional supply and demand dynamics.


