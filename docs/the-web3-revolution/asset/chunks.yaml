    \ complete.\n\n## Notes\n\n1.  Nakamoto, S. (2008). Bitcoin: A Peer-to-Peer Electronic\
    \ Cash System.\n\n2.  Wallace, Benjamin (23 November 2011). ‘The Rise and Fall\
    \ of Bitcoin’. Wired. Archived from the original on 31 October 2013\\. Retrieved\
    \ 13 October 2012\\. Wallace, B. (2011). The rise and fall of Bitcoin. Wired,\
    \ 19(12).\n\n3.  Swan, M. (2015). Blockchain: Blueprint for a New Economy. O’Reilly\
    \ Media, Inc.\n\n4.  What Is the Byzantine Generals Problem? | River Learn – Bitcoin\
    \ Technology. (2023). River. [`https://river.com/learn/what-is-the-byzantine-generals-problem/`](https://river.com/learn/what-is-the-byzantine-generals-problem/)\
    \ (Accessed: 23 November 2023).\n\n5.  Kisters, S. (2022). Blockchain 1.0 vs.\
    \ 2.0 vs. 3.0 – What’s the Difference? OriginStamp. [`https://originstamp.com/blog/blockchain-1-vs-2-vs-3-whats-the-difference/`](https://originstamp.com/blog/blockchain-1-vs-2-vs-3-whats-the-difference/)\
    \ (Accessed: 23 November 2023).\n\n6.  Banafa, A. (2021). Blockchain and AI: A\
    \ Perfect Match?. OpenMind. [`www.bbvaopenmind.com/en/technology/artificial-intelligence/blockchain-and-ai-a-perfect-match/`](http://www.bbvaopenmind.com/en/technology/artificial-intelligence/blockchain-and-ai-a-perfect-match/)\
    \ (Accessed: 23 November 2023).\n\n# 2. Bitcoin: The Pioneer of Digital Currency\n\
    \nThis chapter traces the origins of Bitcoin, from Satoshi Nakamoto’s seminal\
    \ whitepaper to the cryptocurrency’s rapid ascent as a challenger to traditional\
    \ financial systems. Through an examination of Bitcoin’s innovative technological\
    \ foundations and its impact on the financial landscape, this chapter sets the\
    \ stage for a comprehensive understanding of why Bitcoin remains the quintessential\
    \ digital currency."
  trans: "\n# 共识算法\n\n共识算法对于区块链网络的功能和可靠性至关重要。它是一种机制，使得去中心化网络中的多个节点能够就特定值（例如交易记录的有效性）达成共同协议。在没有任何中央机构来指定或验证账本状态的区块链环境中，这一过程至关重要。\n\
    \n在区块链技术中，共识算法使得所有参与者（或节点）能够在无需信任的环境中就区块链的内容达成一致。这种一致性对于确保分布式账本的每个副本都保持一致且准确，从而维护整个区块链系统的完整性和安全性是必要的。\n\
    \n共识机制还在解决区块链网络中的潜在冲突中扮演着关键角色，例如双重支付（即同一数字代币被花费多次）问题。它们有助于在不同节点间同步账本，确保所有交易按正确顺序记录，并且每个节点都拥有相同的真实版本。\n\
    \n通过利用共识算法，区块链网络可以在无需中央机构的情况下安全、透明且高效地运行。这种去中心化是区块链技术能够在加密货币之外的多种应用中（例如供应链管理、数字身份验证和安全投票系统）具有创新性和价值的关键属性之一。\n\
    \n共识算法的实现取决于区块链网络的特定需求和目标，包括交易速度、安全级别、能耗以及期望的去中心化程度等因素。特定共识机制的选择会显著影响区块链系统的性能和特性。\n\
    \n常见的共识算法包括：\n\n1.  **工作量证明（PoW）**\n    -   **原理**：PoW 要求参与者（矿工）通过解决复杂的数学问题来证明他们完成了特定量的计算工作。比特币是使用\
    \ PoW 的最著名的区块链。\n    -   **优点**：增强了网络安全性，防止双重支付和其他类型的攻击。\n    -   **缺点**：能耗高，并且随着时间的推移，矿工中心化的趋势可能导致网络中心化。\n\
    \n2.  **权益证明（PoS）**\n    -   **原理**：PoS 基于持有币的数量和时间来选择区块的验证者。与 PoW 不同，PoS 不需要大量的计算工作。\n\
    \    -   **优点**：能效更高，参与门槛更低。\n    -   **缺点**：可能导致“富者愈富”的问题，因为持有更多币的用户更有可能被选为验证者。\n\
    \n3.  **委托权益证明（DPoS）**\n    -   **原理**：在 DPoS 中，代币持有者通过投票选出少数代表（验证者）来验证区块。EOS\
    \ 是使用 DPoS 算法的一个显著例子。\n    -   **优点**：与 PoW 和传统 PoS 相比，交易确认速度更快，能效更高。\n    - \
    \  **缺点**：可能导致网络中的权力集中，降低去中心化程度。\n\n4.  **实用拜占庭容错（PBFT）**\n    -   **原理**：PBFT\
    \ 旨在通过节点间密集通信以达成共识，容忍网络中少数节点的恶意行为。\n    -   **优点**：适用于许多需要高数据一致性和可靠性的系统。\n   \
    \ -   **缺点**：随着网络规模的增长，通信成本显著增加。\n\n每种算法都有其特定的用例、优点和缺点。共识算法的选择取决于区块链的具体需求，例如安全性、速度、能效和去中心化程度。随着区块链技术的不断发展，可能会出现新的共识算法来更好地满足不同类型网络的需求。\n\
    \n表 1-3 列出了一些主要的共识算法及其对应的代表性项目。\n\n**表 1-3** 不同区块链的共识算法\n\n| 共识算法 | 代表性项目 |\n\
    |--------------------|------------------------|\n| 工作量证明（PoW） | 比特币 |\n| 权益证明（PoS）\
    \ | 以太坊（即将推出的以太坊 2.0） |\n| 委托权益证明（DPoS） | EOS |\n| 实用拜占庭容错（PBFT） | Hyperledger\
    \ Fabric |\n\n这些项目展示了相应的共识算法如何在现实世界的区块链系统中实现。我们将在后续章节中进一步探讨 PoW 和 PoS。\n\n## 总结\n\
    \n随着本章接近尾声，我们可以清楚地看到，区块链技术不仅仅是为加密货币服务的平台；它预示着数字安全和去中心化数据管理的新时代。从比特币的诞生到高级区块链应用程序的开发，标志着该技术的迅速演进。凭借强大的安全特性、固有的透明度以及跨领域的多功能性，区块链已成为数字时代的基础技术。后续章节将更深入地探讨区块链如何继续影响各行各业、重新定义隐私，并对全球经济格局提出挑战。区块链驱动重大创新的潜力是巨大的，其发展远未结束。\n\
    \n## 注释\n\n1.  Nakamoto, S. (2008). Bitcoin: A Peer-to-Peer Electronic Cash System.\n\
    2.  Wallace, Benjamin (23 November 2011). ‘The Rise and Fall of Bitcoin’. Wired.\
    \ Archived from the original on 31 October 2013. Retrieved 13 October 2012. Wallace,\
    \ B. (2011). The rise and fall of Bitcoin. Wired, 19(12).\n3.  Swan, M. (2015).\
    \ Blockchain: Blueprint for a New Economy. O’Reilly Media, Inc.\n4.  什么是拜占庭将军问题？|\
    \ River Learn – 比特币技术 (2023). River. `https://river.com/learn/what-is-the-byzantine-generals-problem/`\
    \ (访问日期：2023 年 11 月 23 日).\n5.  Kisters, S. (2022). 区块链 1.0 对比 2.0 对比 3.0 – 有什么区别？OriginStamp.\
    \ `https://originstamp.com/blog/blockchain-1-vs-2-vs-3-whats-the-difference/`\
    \ (访问日期：2023 年 11 月 23 日).\n6.  Banafa, A. (2021). 区块链与人工智能：天作之合？OpenMind. `www.bbvaopenmind.com/en/technology/artificial-intelligence/blockchain-and-ai-a-perfect-match/`\
    \ (访问日期：2023 年 11 月 23 日).\n\n# 比特币：数字货币的先驱\n\n本章追溯了比特币的起源，从中本聪的开创性白皮书到这种加密货币迅速崛起成为传统金融体系的挑战者。通过审视比特币创新的技术基础及其对金融格局的影响，本章为全面理解为何比特币仍然是典型数字货币奠定了基础。\n"
- fmt: '## 2.1 The Birth of Bitcoin


    The birth of `Bitcoin` in the aftermath of the 2008 Global Financial Crisis (GFC)
    represents a fundamental shift in financial technology, introducing a groundbreaking
    concept that challenged the established monetary systems. The crisis, which began
    in the United States, quickly spiralled into global turmoil, undermining confidence
    in the banking system and triggering a liquidity crunch. Financial institutions
    teetered on the brink of insolvency, leading to government interventions to prevent
    a complete economic collapse.


    As the crisis unfolded, it exposed the inherent weaknesses in the traditional
    financial system, including a severe credit freeze that slowed economic activities
    and a general loss of faith in financial institutions and banks. This environment
    of distrust and the evident limitations of centralised financial authorities laid
    the groundwork for the inception of `Bitcoin`.[¹](#616479_1_En_2_Chapter.xhtml#Sec17)


    ### Satoshi Nakamoto and the Whitepaper


    The origin of `Bitcoin`, a groundbreaking innovation in the world of digital currency,
    is deeply rooted in a whitepaper titled ‘`Bitcoin: A Peer-to-Peer Electronic Cash
    System`’, screenshot shown in Figure [2-1](#616479_1_En_2_Chapter.xhtml#Fig1).
    Published on 31 October 2008 by an enigmatic figure or group known as `Satoshi
    Nakamoto`, this document introduced a novel concept that would go on to revolutionise
    the financial sector.


    ![](images/616479_1_En_2_Chapter/616479_1_En_2_Fig1_HTML.jpg)


    Figure 2-1 Bitcoin Whitepaper Abstract Screenshot[²](#616479_1_En_2_Chapter.xhtml#Sec17)


    The whitepaper presented a meticulously thought-out design for a decentralised
    digital currency, a concept that was radically different from traditional, centralised
    financial systems. `Nakamoto` envisioned a system where the need for financial
    intermediaries was eliminated, thereby reducing transaction costs and increasing
    efficiency.


    One of the core principles outlined in the whitepaper was the use of a decentralised
    ledger, known as the `blockchain`. This technology ensured that all transactions
    were transparently and immutably recorded, making them tamper-proof and verifiable
    by anyone. The `blockchain` was a public ledger, maintained by a network of nodes
    (computers), each holding a copy of the entire transaction history, thus ensuring
    no single point of failure.


    `Nakamoto` introduced the concept of miners, network participants who use their
    computing power to process and verify transactions. Miners compete to solve complex
    cryptographic puzzles, and the first to solve it gets the right to add a new block
    of transactions to the `blockchain`. This process, known as `proof of work (PoW)`,
    not only secures the network but also introduces new bitcoins into circulation
    as a reward for the miners.


    The whitepaper also addressed the problem of double-spending, where a single digital
    token could be spent more than once. This issue was resolved through the innovative
    design of the `blockchain`, where once a transaction is confirmed, it becomes
    irreversible and part of an unchangeable record of historical transactions.


    `Nakamoto`’s whitepaper was not just a technical document; it was a vision of
    a new form of money that was completely decentralised, without any central authority,
    and accessible to anyone with an Internet connection. It represented a paradigm
    shift in understanding money and financial transactions, laying the groundwork
    for a new era of digital currencies and the diverse applications of `blockchain`
    technology that followed.


    `Bitcoin`’s introduction was a direct response to the financial crisis, aiming
    to mitigate the risk of systemic failures and provide complete financial control
    to individuals. The cryptocurrency implemented innovative cryptographic methodologies,
    demonstrating strong resistance to fraud and intrusions. This newfound system
    of accountability and transparency in financial transactions restored public faith
    in the possibility of a secure and transparent financial system. Moreover, `Bitcoin`
    targeted the unbanked population, aiming to create an inclusive financial ecosystem.
    This approach directly addressed the issues that triggered the GFC, providing
    a more equitable and accessible financial solution for all, irrespective of their
    access to traditional banking systems.


    In essence, the birth of `Bitcoin` was not just the emergence of a new digital
    currency but a philosophical and practical challenge to the established order
    of financial systems. It represented a move towards a trustless, censorship-resistant
    financial system, paving the way for a new era of financial independence and security.


    ### The Genesis Block and the First Bitcoin Transaction


    `Bitcoin`’s journey began on 3 January 2009 with the creation of the genesis block,
    also known as block number 0. This block, mined by the enigmatic `Satoshi Nakamoto`,
    held a message that critiqued the existing financial system, highlighting the
    urgency for a decentralised alternative. The text in the coinbase transaction,
    ‘`The Times 03/Jan/2009 Chancellor on brink of second bailout for banks`’, has
    become a symbol of `Bitcoin`’s purpose: to offer a new monetary paradigm free
    from traditional banking frailties.


    ### Hal Finney’s Legendary Story and Impact on Bitcoin


    `Hal Finney`, recognised as a pivotal figure in the early days of `Bitcoin`, was
    not only a renowned cryptographer and software developer but also a significant
    figure in the cypherpunk movement. His contributions to cryptography were substantial;
    he was involved in the development of the first anonymous remailer and ran contests
    to break export-grade encryption used by `Netscape`, showcasing his commitment
    to online privacy and security.


    Before `Bitcoin`’s inception, `Finney` had created the first reusable proof-of-work
    system in 2004, foreshadowing some of the fundamental technologies that would
    later be integral to `Bitcoin`. He became one of the first `Bitcoin` users and,
    on 12 January 2009, received the first `Bitcoin` transaction from `Satoshi Nakamoto`,
    marking a historic moment in the digital currency’s journey.


    `Finney`’s life in Temple City, California, where he resided for ten years in
    the same town as `Dorian Satoshi Nakamoto`, fuelled speculation about his possible
    role as `Bitcoin`’s creator, a claim he consistently denied. Despite his battle
    with amyotrophic lateral sclerosis (ALS), which eventually led to paralysis, `Finney`’s
    passion for programming and contribution to `Bitcoin` never waned. Even in his
    final years, he continued to work on projects like ‘`bcflick`’, a software to
    enhance `Bitcoin` wallet security.[³](#616479_1_En_2_Chapter.xhtml#Sec17)


    Tragically, in the last year of his life, `Finney` and his family became victims
    of ‘swatting’ and extortion attempts, where perpetrators demanded a ransom of
    1,000 bitcoins. These incidents underscore the sometimes tumultuous and risky
    landscape that early `Bitcoin` adopters navigated.


    `Finney`’s story is not just one of technological innovation but also of personal
    resilience and an unwavering belief in the transformative potential of `Bitcoin`.
    His early involvement and contributions were crucial in shaping the network’s
    development, and his legacy continues to inspire the cryptocurrency community.[⁴](#616479_1_En_2_Chapter.xhtml#Sec17)


    ### The Legacy of Bitcoin


    The creation of `Bitcoin` sparked a new era of digital currencies and opened the
    door to a vast array of `blockchain` applications. It presented a decentralised
    solution to digital trust, eliminating the need for intermediaries in financial
    transactions. Over the years, `Bitcoin` has not only survived but thrived, growing
    in value and acceptance and paving the way for thousands of other cryptocurrencies.


    `Bitcoin`’s origin story remains shrouded in mystery, with the true identity of
    `Satoshi Nakamoto` still unknown. This anonymity adds to the enigmatic allure
    of `Bitcoin`, a currency that has fundamentally altered our perception of money,
    value and the way we transact.'
