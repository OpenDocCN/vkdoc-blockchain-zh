    This process allows newcomers to not only acquire test assets without cost but
    also to engage with the blockchain environment directly, fostering a practical
    understanding of its operations and the potential applications within.


    ## 4.3 Expanding Horizons with Layer 2 Solutions


    Layer 2 solutions on the Ethereum network are essential because they address the
    blockchain trilemma of decentralisation, scalability and security. The blockchain
    trilemma posits that it is challenging to achieve all three properties simultaneously;
    typically, a blockchain can only excel at two out of the three. Ethereum, like
    other Layer 1 blockchains, is decentralised and secure but has struggled with
    scalability, especially as the network has grown and the demand for block space
    has increased. This results in high transaction fees and slower processing times
    during periods of congestion.


    ![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig17_HTML.png)


    Figure 4-17


    Blockchain Trilemma


    Layer 2 solutions, such as Rollups, aim to alleviate these issues by handling
    transactions off the main chain, thus increasing throughput and reducing costs
    without compromising on the network’s decentralisation or security. Rollups work
    by grouping or ‘rolling up’ multiple transactions into a single one and then submitting
    this to the main Ethereum chain. This process helps in relieving congestion on
    the network and makes transactions faster and less expensive.


    There are two main types of Rollups: Optimistic Rollups and ZK-Rollups. Optimistic
    Rollups assume transactions are valid by default and only run computations in
    the event of a challenge, whereas ZK-Rollups use zero-knowledge proofs to verify
    transactions’ validity without revealing their contents. Both have their own set
    of advantages and trade-offs. ZK-Rollups, for instance, offer faster transaction
    speeds and lower fees but require a more complex setup that can lead to centralisation.
    Optimistic Rollups, on the other hand, are easier to implement but have a challenge
    period that can delay withdrawals.


    Here’s a summary of their differences based on several key factors:


    1.  **Security**: Optimistic Rollups depend on fraud proofs and economic incentives
    to ensure transaction validity, requiring only one honest node to challenge fraud.
    However, this means that security relies on the presence of honest actors. ZK-Rollups,
    on the other hand, use cryptographic proofs (zero-knowledge proofs) to validate
    transactions, offering mathematical security guarantees without relying on human
    validators.


    2.  **Cost**: Optimistic Rollups typically have lower computation costs since
    they don’t require specialised hardware for fraud proofs. However, they do post
    all transaction data on the Ethereum main chain, which could increase costs. ZK-Rollups
    can reduce costs with efficient data compression techniques, but they have higher
    hardware requirements for generating cryptographic proofs, which can make them
    more expensive for users.


    3.  **Transaction Finality**: In Optimistic Rollups, there’s a challenge period
    which can delay transaction finality. ZK-Rollups offer immediate withdrawals due
    to the validity proofs, which confirm the authenticity of transactions without
    delay.


    4.  **EVM Compatibility**: Optimistic Rollups are compatible with the Ethereum
    Virtual Machine (EVM), making it easier for developers to transition existing
    Ethereum-based applications. ZK-Rollups are not fully EVM compatible, which can
    present higher barriers for developers.


    As for specific project examples, Optimistic Rollups such as Arbitrum and Optimism
    have been utilised by Ethereum-based decentralised exchanges like Uniswap and
    SushiSwap. ZK-Rollups, such as those used by Polygon ID for private on-chain verification,
    offer high security and privacy standards, which are crucial for identity verification
    protocols.


    Table [4-2](#616479_1_En_4_Chapter.xhtml#Tab2) shows a comparison of projects
    using these technologies.


    Table 4-2


    Optimistic Rollups vs. ZK-Rollups


    | Feature | Optimistic Rollups Example | ZK-Rollups Example |

    | --- | --- | --- |

    | EVM Compatibility | Arbitrum, Optimism | Polygon zkEVM, Scroll zkEVM |

    | Transaction Costs | Lower due to minimal data on-chain | Potentially higher
    due to proof generation |

    | Security | Based on economic incentives and fraud proofs | Based on cryptographic
    proofs |

    | Use Cases | DeFi applications, decentralised exchanges | Identity verification,
    private crypto trading |


    These examples highlight how the choice between Optimistic and ZK-Rollups may
    depend on the specific needs and priorities of a project, such as cost considerations,
    security requirements and the desired level of EVM compatibility.[⁴](#616479_1_En_4_Chapter.xhtml#Sec8)


    The development and implementation of Layer 2 solutions are crucial for the future
