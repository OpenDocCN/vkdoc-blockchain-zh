  trans: '

    ### 区块链作为理想的基础设施


    区块链技术堪称金融领域“计算化系统”的典范，主要归功于其通过智能合约和去中心化共识机制实现金融交易与资产管理的自动化及安全性。这与传统金融（`TradFi`）中依赖人工流程、中介机构以及基于中心化机构信任的监管框架的“非计算化系统”形成了鲜明对比。


    像区块链这样的“计算化系统”擅长执行重复性流程并交付可验证的结果，无需依赖信任或直接的人工干预。其特点包括透明性、不可篡改性，以及支持直接所有权、资产分割和全球可访问性。这种信任与执行的自动化不仅降低了运营低效问题，还为金融创新开辟了新途径，例如`RWAs`（真实世界资产）的代币化。


    另一方面，`TradFi`中的“非计算化系统”涵盖了金融领域中那些基本未纳入自动化与数字信任范畴的部分。这些包括基于人类判断的细微决策，例如依赖人际信任、历史财务行为和监管合规性的信用评估。虽然区块链可以简化金融交易的诸多环节，但它无法完全取代支撑非计算化系统中的人工因素以及现有的法律和监管框架。


    `RWAs`（真实世界资产）的代币化展示了计算化系统与非计算化系统的融合，将有形和无形资产带入区块链。这一过程不仅提升了资产管理的流动性、可访问性和效率，也凸显了采取尊重资产所有权与转移的法律、监管及人文背景的综合方法的迫切需求。


    本质上，金融与资产管理的未来在于将区块链的计算能力与传统金融系统的非计算化方面和谐地融为一体。这种协同效应有望在全球金融领域释放出前所未有的效率、透明度和包容性，前提是能够有效解决监管合规、安全性以及数字资产与实物资产之间无缝交互的相关挑战。


    ### RWA 代币化对 TradFi 的颠覆性影响


    `RWAs`（真实世界资产）的代币化预示着金融领域的一场变革性转变，将有形和无形资产历经时间考验的稳健价值与区块链的前沿技术相结合。这种融合不仅提升了传统金融格局，还因区块链技术固有的优势——去中心化、透明性和不可篡改性——为彻底颠覆长期存在的规范奠定了基础。这场颠覆的核心在于通过去中心化金融（`DeFi`）创新应用计算化金融，从根本上重新定义了资产的管理、交易和概念化方式。


    - **增强的流动性与全球可访问性**：`RWA`代币化的核心优势之一，在于它为那些曾受传统市场限制的资产带来了前所未有的流动性和可及性。代表`RWAs`的数字代币可以在全球平台上一周七天、每天
    24 小时进行交易，超越了地理边界和标准市场交易时间的限制。这种持续的交易周期不仅增加了流动性，也拓宽了市场参与度，使此前仅限于少数人的投资机会变得民主化、触手可及。


    - **固有的透明性与安全性**：区块链固有的透明性犹如信任的灯塔，显著提升了投资者的信心。该技术降低了与欺诈和所有权纠纷相关的风险，留下了清晰且不可篡改的资产所有权与交易历史记录，所有相关方均可进行验证。此外，智能合约的运用实现了代币化资产管理和交易流程的自动化与安全保障，确保每一步都可靠执行且不被篡改，从而加强了数字资产交易的安全性。


    - **运营效率与成本降低**：在区块链基础设施上对`RWAs`进行代币化的过程显著简化了资产管理，消除了与中介、法律程序和大量文书工作相关的昂贵且繁琐的环节。这种效率不仅使高价值投资对更广泛受众更具可及性，也降低了资产交易的运营成本，促进了一个更具包容性的金融生态系统。


    - **计算化金融与 TradFi 的范式转变**：`RWA`代币化颠覆性潜力的核心在于金融领域中计算化系统与非计算化系统之间的区别。作为一种计算化系统，区块链擅长执行复杂算法并维护不可篡改的交易账本，为`DeFi`带给金融服务的自动化与创新提供了坚实基础。这种新范式为执行借贷、资产管理等传统金融操作营造了无需人工干预的完全自动化环境，标志着向更高效、更安全、更易获得的金融服务迈出了深刻的一步。


    - **金融产品的可编程性与透明度**：此外，代币化为金融操作引入了可编程性层，尤其惠及衍生品市场和`SME`（中小企业）融资等领域。这一特性允许创建创新的金融产品，在提高流动性和资本获取途径的同时，保持透明度并最小化风险。代币化`RWAs`固有的可编程性不仅简化了金融产品的创建和管理流程，也确保了这些流程以更高的透明度和安全性进行。


    `RWA`与区块链及`DeFi`创新的融合标志着传统金融演进的一个关键转折点。通过利用计算化金融的效率，`DeFi`生态系统将简化、扩展并革新金融服务，使其对所有人而言更易获取、更高效率、更加安全。因此，`RWA`代币化对传统金融的颠覆性影响并非仅仅是未来的猜想，而是一个正在展开的现实，承诺将以深远的方式重塑金融格局。

    '
- fmt: '# 6.2 Overview of DePIN


    `DePINs` herald a new era where blockchain’s inherent properties – security, transparency
    and collective control – converge with the physical infrastructures that underpin
    our society. This synergy is set to redefine the creation, operation and utilisation
    of our core physical systems. `DePINs` are much more than a blockchain adaptation
    of existing services; they are a re-envisioning and an evolutionary leap in infrastructure
    management. These networks are designed to be self-regulating, robust and inherently
    protected against the vulnerabilities that centralised systems often face. The
    vision for `DePINs` extends towards a future where infrastructure is not only
    shared but also collectively nurtured, leading to ecosystems that are equitable,
    sustainable and adaptable to the collective will of their participants.[²](#616479_1_En_6_Chapter.xhtml#Sec12)^,[³](#616479_1_En_6_Chapter.xhtml#Sec12)


    ## Core Components of DePINs


    - **Blockchain and Smart Contracts**: At the core of `DePINs` lies blockchain
    technology, serving as the immutable ledger that records all transactions and
    interactions within the network. Smart contracts automate the execution of these
    transactions, facilitating trustless and secure exchanges of services and resources.

    - **Internet of Things (IoT)**: `IoT`’s role in `DePINs` is indispensable as it
    equips the network with data-gathering capabilities, ensuring constant communication
    between the physical and digital realms. The data collected from sensors and devices
    are fed into the blockchain, enabling real-time monitoring and management.

    - **Tokenomics and Incentives**: A robust incentive model is vital for encouraging
    participation in `DePINs`. Tokenomics involves creating a digital currency or
    token system that rewards contributors for their role in building, maintaining
    or utilising the network, aligning individual incentives with the network’s health.

    - **Interoperability Protocols**: `DePINs` require seamless interaction between
    different blockchain platforms and traditional systems. Interoperability protocols
    ensure that information and value can be exchanged across diverse networks without
    friction.


    ### Real-World Applications


    - **Energy Grids**: `DePINs` can revolutionise energy distribution by facilitating
    `P2P` energy trading, allowing individuals with solar panels to sell excess energy
    directly to neighbours or back to the grid.

    - **Telecommunications**: In the realm of telecommunications, `DePINs` can create
    decentralised networks where individuals contribute to the network’s coverage
    by hosting nodes, enhancing connectivity and reducing reliance on traditional
    providers.

    - **Transportation and Logistics**: `DePINs` can track goods in real time across
    the supply chain, ensuring transparency and authenticity. In transportation, they
    can support decentralised ride-sharing networks or vehicle data marketplaces.

    - **Urban Development and Real Estate**: In urban development, `DePINs` can play
    a role in smart city initiatives, integrating various infrastructural elements
    into a cohesive, responsive and efficient whole. They can also streamline real
    estate transactions, making property ownership more accessible and secure.


    `DePINs` can be categorised into two distinct types based on the nature of the
    resources they deal with: Physical Resource Networks (`PRNs`) and Digital Resource
    Networks (`DRNs`). Table [6-1](#616479_1_En_6_Chapter.xhtml#Tab1) shows an analytical
    comparison of the two.


    **Table 6-1 PRNs vs. DRNs**


    | Aspect | Physical Resource Networks (PRNs) | Digital Resource Networks (DRNs)
    |

    | --- | --- | --- |

    | Resource Nature | Tangible, immovable assets | Intangible, virtual resources
    |

    | Localisation | Services and resources are location-specific and non-portable
    | Services are not location-bound and can be accessed globally |

    | Interchangeability | Non-fungible; resources are unique to their function and
    location | Fungible; resources can be replicated and are not unique to a location
    |

    | Deployment | Involves physical installation, which can be capital and labour-intensive
    | Deployment is software based, requiring minimal physical intervention |

    | Capital Requirements | Typically higher due to the need for physical hardware
    and infrastructure | Lower initial capital needed; resources are digital and more
    easily distributed |

    | Scalability | Scalability is constrained by physical factors like geography
    and infrastructure | Highly scalable without the constraints of physical geography
    |

    | Maintenance | Physical upkeep is necessary, potentially leading to higher long-term
    costs | Mainly requires software maintenance, which can be managed remotely |

    | Service Scope | Localised to specific service areas due to the physical nature
    of resources | Global service provision is possible due to the digital nature
    of resources |

    | Examples | Helium (decentralised wireless networks), Power Ledger (peer-to-peer
    energy trading) | Filecoin (decentralised storage), IoTeX (decentralised machine
    network) |

    | Service Continuity | Can be affected by physical damage or local disruptions
    | Generally more resilient to local disruptions; continuity is maintained as long
    as the network is operational |

    | Regulatory Environment | May face more stringent regulations due to the physical
    aspect of the infrastructure and its impact on the environment and communities
    | Regulation can be more challenging due to the intangible nature and rapid evolution
    of digital assets and services |


    Table [6-1](#616479_1_En_6_Chapter.xhtml#Tab1) summarises the fundamental distinctions
    between `PRNs` and `DRNs` within the `DePIN` framework. While `PRNs` deal with
    physical, often infrastructural resources that are bound to a specific location,
    `DRNs` handle virtual resources that are more versatile and globally accessible.
    Each has its own set of benefits and challenges, making them suitable for different
    types of decentralised applications.'
