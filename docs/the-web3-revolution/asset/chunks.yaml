  trans: "\n### 代币上架与流动性池\n\n以 Uniswap 为例，上架您的代币并建立流动性池，是启动交易、为代币开拓初始市场的基石步骤。此方法普遍适用于各类去中心化交易所（DEX）平台。\n\
    \n![](img/616479_1_En_8_Fig2_HTML.jpg)\n\n图 8-2 添加流动性 – 1\n\n- **步骤 1：准备您的代币**\
    \  \n  开始前，请确保您的`ERC20`代币合约已部署至以太坊主网，并且您已将代币发送至您的`MetaMask`钱包。\n\n- **步骤 2：访问\
    \ Uniswap 界面**  \n  前往 Uniswap 界面。第一张截图展示的是 Uniswap 上的“添加流动性”页面。您将由此开启为代币创建流动性池的流程。\n\
    \n- **步骤 3：连接您的钱包**  \n  使用`MetaMask`或其他兼容钱包连接至 Uniswap。连接成功后，您的钱包地址将显示在右上角。\n\
    \n- **步骤 4：添加流动性**  \n  点击“Pool”标签页，然后选择“添加流动性”。在界面中，您需要选择希望提供流动性的代币对。在这里，您可以选择您的代币及一个配对币种（如`ETH`），如图\
    \ 8-2 所示。\n\n![](img/616479_1_En_8_Fig3_HTML.jpg)\n\n图 8-3 添加流动性 – 2\n\n- **步骤\
    \ 5：设置代币对与初始价格**  \n  点击“选择代币”，输入您代币的合约地址并选中它。然后，决定您要存入多少您的代币及其配对币种（例如`ETH`）。两种代币的比例将设定您的初始代币价格。例如，如果您存入\
    \ 1 个`ETH`和 1000 个您的代币，这实质上意味着 1 `ETH` = 1000 个您的代币。\n\n- **步骤 6：批准并供应流动性**  \n\
    \  设定好数量后，您需要通过`MetaMask`批准交易，确认您要将这些代币存入流动性池。随后，点击“供应”按钮，完成流动性池的创建并存入您的代币。\n\n\
    - **步骤 7：管理您的头寸**  \n  图 8-3 展示了“头寸”标签页，您可以在其中查看和管理您的活跃流动性头寸。添加流动性后，您的头寸将显示在此处，您将看到池份额、累计费用等详细信息，并可以增加或移除流动性。\n\
    \n- **步骤 8：监控与调整**  \n  监控您的流动性池并根据需要调整头寸至关重要，尤其是在应对市场变化、收取费用或重新配置资金时。\n\n###\
    \ 去中心化、安全性与治理\n\n像 Uniswap 这样的去中心化交易所（DEX）利用去中心化基础设施，通过自动化智能合约实现交易。这不仅最大限度地降低了中心化托管常见的安全漏洞风险，还赋予了用户对其资金的完全控制权。DEX\
    \ 的非托管性质意味着用户直接与合约交互，始终保持对其私钥（从而对其资产）的所有权。然而，智能合约赋予的自主权也伴随着尽职调查的责任；用户必须认识到这些合约中潜在漏洞的风险。因此，定期审计和严格的安全检查对于维护这些平台的可信度与信任至关重要。\n\
    \nDEX 的治理结构通常通过去中心化自治组织（DAO）来实现，社区通过基于代币的投票系统参与其中。与通常层级分明的传统公司治理不同，DAO 提倡扁平化和包容性的结构。代币持有者直接参与决策过程，影响平台运营的关键方面，例如费用结构、代币支持、协议升级乃至资金管理。\n\
    \n这种民主治理模式是去中心化精神的基础，确保权力动态平衡，并使社区能够引导平台朝着符合共同利益和价值观的方向发展。DAO 透明且基于共识的性质，与公司环境中常见的闭门决策和自上而下的指令形成鲜明对比。\n\
    \n本质上，DEX 中融合的去中心化、安全性和基于 DAO 的治理，培育了一个安全、透明和社区赋权相互交织的生态系统。这种从中心化权威到集体治理的范式转变，是\
    \ DEX 的一个显著特征，也是数字资产交易领域的一次重大演变。\n\n## 8.2 代币市值管理策略\n\n市值不仅仅是加密资产当前价值的简单体现；它是建立投资者信心和评估市场稳定性的基石。本节详细阐述有效管理市值的方法，特别是针对在去中心化交易所（DEX）上上架的代币。\n\
    \n### 代币销毁\n\n代币销毁是一种通缩机制，即通过将代币发送到无法找回的地址（即所谓的“死”钱包）来将其永久移出流通。此策略类似于公司回购股票——它减少了供应量，并且在需求不变或增加的前提下，可能推高剩余代币的价值。这一概念类似于通过操纵供给来影响价值和流通速度的货币政策工具，其额外好处是传递了对代币经济健康发展的长期承诺信号。\n\
    \n### 流动性提供\n\n提供流动性对于维持 DEX 的平稳运行和代币价格的稳定性至关重要。在 Uniswap 及类似协议中，流动性池使参与者能够进行交易和产生收益，是代币健康状况和生态系统活力的有力指标。流动性提供充当着抵御波动的缓冲垫，确保大额交易不会显著影响价格，从而保护市值免受剧烈波动的冲击。\n\
    \n### 合作伙伴关系与集成\n\n建立战略合作伙伴关系并将代币集成到更广泛的生态系统中，可以创造多方面的需求，进而可能提升市值。合作范围从实现不同区块链平台之间的互操作性，到将代币嵌入去中心化金融（DeFi）协议。此类集成扩展了代币的实用性，通常能形成积极的正反馈循环，维持并增长用户基础，从而巩固资产估值。\n\
    \n### 机制与财政政策设计\n\n在多个交易所提供流动性的做市策略，对于管理代币在市场上的存在感和表现至关重要。此类策略可以镜像流动性，创造无缝的交易体验，并统一各交易所的价格，进而影响市值认知。此外，质押奖励等财政激励措施鼓励持有，降低了代币流通速度，并增加了代币的感知价值。\n\
    \n### 算法做市\n\n可以利用算法交易来优化流动性提供、增强订单簿深度并更有效地管理风险。通过高频交易和利用计算模型，DEX 可以为代币提供更好的价格稳定性，这是市值管理的关键因素。这些算法对市场状况的反应速度远快于手动交易，能够调整订单以维持最佳流动性水平和价差。\n"
- fmt: '### Strategic Distribution


    A well-thought-out token distribution strategy is critical for ensuring a wide
    and even spread of tokens, which can reduce volatility and encourage a healthy
    trading environment. Techniques such as airdrops can serve as both marketing tools
    and mechanisms for increasing the number of token holders, thereby potentially
    stabilising and increasing market cap.


    ### Monetary Policies: Burn-and-Mint Equilibrium


    Incorporating burn-and-mint mechanisms can help manage the token’s velocity and
    its market cap. By burning tokens during transaction processing and minting new
    tokens in alignment with ecosystem growth, a dynamic equilibrium is established.
    This approach can stabilise the token’s supply-demand dynamics, promoting sustainable
    growth in market cap over time.


    The strategies highlighted earlier are not exhaustive but provide a foundational
    understanding of the complexities involved in market cap management for crypto-assets
    on DEXs. These strategies must be employed judiciously, with a deep understanding
    of the token economics, market trends and the unique attributes of each crypto-asset.
    It is through this multifaceted approach that a token can achieve a balanced and
    robust market cap, reflecting its true value and utility within the digital economy.


    ## 8.3 Future Development of DEXs


    In the future development of decentralised exchanges (DEXs), the trajectory is
    set to address crucial challenges and leverage emerging technologies. While scalability
    solutions such as Layer 2 have been previously discussed in Section [4.3](#616479_1_En_4_Chapter.xhtml#Sec6)
    and regulatory concerns along with decentralised identity (DID) aspects in Section
    [5.3](#616479_1_En_5_Chapter.xhtml#Sec13), they continue to underpin the evolution
    of DEXs. Here, our focus areas are the integration with traditional finance and
    addressing challenges such as Just-in-Time (JIT) Liquidity Attacks and Sandwich
    Attacks, which have been problematic for users and liquidity providers (LPs).
    These foundational aspects will seamlessly blend with future initiatives, ensuring
    DEXs are well equipped to navigate the complexities of a maturing digital economy.


    ### Integration with Traditional Finance


    Integration with traditional finance is a pivotal area in the evolution of DEXs.[³](#616479_1_En_8_Chapter.xhtml#Sec18)
    DEXs are expected to bridge the gap with traditional finance through several initiatives:


    1. **Tokenisation of Assets**: DEXs will likely expand to include a wider array
    of tokenised assets, such as real estate, stocks or commodities, allowing traditional
    assets to be traded in a decentralised environment.


    2. **Hybrid Financial Products**: With Uniswap V4, hooks enable more customisation
    and can cater to complex interactions with various DeFi protocols, potentially
    attracting traditional financial players to the decentralised space by mimicking
    familiar financial instruments​​​​.[⁴](#616479_1_En_8_Chapter.xhtml#Sec18)


    3. **Increased Regulatory Compliance**: While maintaining decentralisation and
    privacy, DEXs will likely incorporate regulatory frameworks that align with global
    standards to foster institutional adoption.


    ### Addressing JIT Liquidity and Sandwich Attacks


    JIT Liquidity Attacks, where adversaries manipulate liquidity pools for profit,
    are a concern in DEXs. However, with Uniswap V4, there is an emphasis on enhanced
    security measures that could mitigate such risks:


    1. **Singleton Contract**: This contract reduces the need for multiple transactions,
    thus potentially decreasing the opportunities for JIT Liquidity Attacks​​.


    2. **Flash Accounting**: By combining multiple actions, such as swaps and liquidity
    additions, Uniswap V4 aims to reduce the chance of JIT Liquidity Attacks by settling
    all debts at the end of the transaction​​.[⁵](#616479_1_En_8_Chapter.xhtml#Sec18)


    Sandwich Attacks, which involve manipulating market prices to profit from trades
    queued in a mempool, have also been problematic. To counteract these:


    1. **Time-Weighted Average Market Maker (TWAMM)**: Uniswap V4 will implement TWAMM
    to protect users from price manipulation, as it executes large orders over time
    to minimise market impact​​.


    2. **Better Oracles**: With built-in oracles, Uniswap V4 will make it more difficult
    and costly for attackers to manipulate market prices​​.


    3. **Countermeasures**: Solutions like the introduction of `flashbot transactions`
    by platforms like 1inch, which are not visible in the mempool, could be adopted
    widely to prevent front-running attacks such as Sandwich Attacks​​.[⁶](#616479_1_En_8_Chapter.xhtml#Sec18)


    ### TWAMM vs. CFMM


    Time-Weighted Average Market Maker (TWAMM) is a new concept introduced in Uniswap
    V4, designed to combat certain inefficiencies in traditional Automated Market
    Makers (AMMs), especially the Constant Function Market Maker (CFMM).


    TWAMM allows large orders to be executed over a longer period, thus minimising
    the immediate impact on the market price. It achieves this by breaking up a large
    transaction into smaller pieces and executing these pieces at regular intervals
    over time. This gradual execution can prevent the drastic price slippage often
    seen with large orders in CFMMs.


    CFMMs, like those used in Uniswap V2 and V3, rely on a formula to ensure that
    the product of the quantities of two assets remains constant. They allow liquidity
    providers to create a pool by depositing two assets, which traders can then use
    to swap one asset for another. While this design ensures liquidity, it has certain
    drawbacks:


    1. **Slippage**: Large trades can significantly alter the ratio of assets in a
    pool, leading to substantial price impact.


    2. **Impermanent Loss**: Liquidity providers may suffer losses when the price
    of assets in a pool changes after they’ve contributed liquidity.


    3. **Capital Efficiency**: CFMMs often require more capital to provide liquidity
    effectively across a wide range of prices.


    The TWAMM design in Uniswap V4 provides several advantages:


    **Table 8-1** TWAMM and CFMMs: Comparison Table


    | Aspect | CFMM (like Uniswap V2/V3) | TWAMM (Uniswap V4) |

    | --- | --- | --- |

    | Trade Execution | Immediate, based on the current pool ratio | Over time, reducing
    immediate impact |

    | Market Impact | High for large trades | Reduced impact due to time distribution
    |

    | Capital Efficiency | Varies depending on the price range | Potentially higher
    due to optimised execution |

    | Arbitrage | Opportunities arise from price slippage | Reduced opportunities
    due to gradual execution |

    | Implementation Complexity | Relatively simple | More complex due to time-weighted
    execution |

    | User Experience | Instant swaps | Orders executed over a duration |


    1. **Minimised Market Impact**: By breaking up and spreading out trades, TWAMM
    reduces the likelihood of large trades creating significant price slippage.


    2. **Reduced Arbitrage Opportunities**: The gradual execution of large orders
    over time diminishes the potential for arbitrage that can occur in the wake of
    large trades in CFMMs.


    3. **Long-Term Order Fulfilment**: TWAMM is advantageous for traders or entities
    looking to execute substantial trades without immediately affecting the market,
    similar to dollar-cost averaging strategies in traditional finance.


    By incorporating TWAMM, Uniswap V4 aims to provide a more sophisticated, efficient
    and user-friendly trading experience for both traders and liquidity providers.
    The key innovation here is to combine the immediacy and simplicity of CFMMs with
    a time-distributed approach to order execution, which could lead to a more stable
    and predictable market, especially beneficial for DeFi protocols.'
