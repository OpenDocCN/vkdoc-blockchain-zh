    | Scalability/Max Population | Low scalability | Moderate scalability | Infinite
    scalability |

    | Ease of Development/Creation | Fastest to create, follows a single framework
    | Slower than centralised, need to sort out lower-level details | Slowest, complex
    resource sharing and communication required |

    | Evolution/Diversity | Low diversity, evolves slowly | Once infrastructure is
    in place, can evolve quickly | High potential for evolution once infrastructure
    is set |


    Furthermore, the transparency of blockchain technology is one of its defining
    features. In public blockchains, anyone can view all transaction records and block
    information, yet the identities of transaction participants remain anonymous or
    pseudonymous, as illustrated in Figure [1-2](#616479_1_En_1_Chapter.xhtml#Fig2).
    This combination of transparency and privacy makes blockchain an ideal technology
    choice for sectors such as finance, supply chain management and healthcare.


    ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Bitcoin ExplorerSource: [*www.blockchain.com/explorer*](http://www.blockchain.com/explorer)
    (Accessed: 23 November 2023)


    To ensure the accuracy of transactions and the security of the network, blockchain
    networks typically employ a method known as the ‘consensus mechanism’ to verify
    and add new transactions. The most famous consensus mechanism is the proof of
    work (PoW) used by Bitcoin, where participants (miners) in the network must solve
    complex computational problems to validate transactions and create new blocks.


    Hence, blockchain technology is not only designed to validate transactions and
    enhance the security of the digital ledger but also to mitigate critical issues
    such as the double-spending of cryptocurrencies and various fraudulent activities.
    Blockchain 1.0,[³](#616479_1_En_1_Chapter.xhtml#Sec11) the initial iteration of
    this technology predominantly used in cryptocurrencies like Bitcoin, targets two
    fundamental problems:


    *   **Double-Spending Problem**: It uses a combination of peer-to-peer file sharing
    and public key encryption technologies to prevent the same digital currency unit
    from being used more than once. This is executed within a trustless framework
    where transactions are recorded on a publicly accessible ledger and confirmed
    by a consensus among participants, thus eliminating the need for a centralised
    authority​​​​.


    *   **Byzantine Generals’ Problem**: This refers to the challenge of achieving
    consensus in a decentralised network. Blockchain 1.0 addresses this through the
    proof-of-work (PoW) mechanism, where all participants agree on a verified truth
    without the need for a trusted intermediary. This is accomplished by miners solving
    cryptographic puzzles to validate transactions and add new blocks, thereby ensuring
    network agreement on the ledger’s state.​​​​​​​​[⁴](#616479_1_En_1_Chapter.xhtml#Sec11)


    These foundational aspects underpin the robustness of blockchain against potential
    vulnerabilities and form the basis for its widespread application in various sectors
    beyond cryptocurrency.


    Blockchain 2.0 represents a significant evolution from the original blockchain
    concept, marked by the integration of smart contracts into blockchain protocols.
    Pioneered by Ethereum, smart contracts are automated codes that execute when predefined
    conditions are met, enabling complex transactions beyond simple cryptocurrency
    exchanges. This advancement fostered the development of decentralised applications
    (DApps) and decentralised autonomous organisations (DAOs), expanding blockchain’s
    utility into various domains such as governance and digital ownership, exemplified
    by non-fungible tokens (NFTs).'
  trans: '

    # 1.1 什么是区块链？


    区块链技术的起源与比特币密切相关，可追溯至 2008 年比特币概念的首次提出。比特币不仅是一种加密货币，更运行在一种称为区块链的创新技术之上。这项技术随着比特币的发展而演进，如今已广泛应用于各个领域。


    比特币的诞生可追溯至 2008 年 10 月 31 日，一位化名中本聪的神秘人物或团队发布了一份开创性文件——比特币白皮书。¹ 在这份白皮书中，中本聪提出了一种新颖的数字货币概念，挑战了现有的金融体系，并彻底革新了传统的货币理念。随后，在
    2009 年 1 月 3 日，比特币网络迎来了一个历史性时刻——第一个被称为 0 号区块的区块被成功挖出。² 这个通常被称为创世区块或原始区块的区块，不仅标志着比特币网络的正式启动，也标志着区块链技术的首次实际应用。这项创新应用预示了数字货币和分布式账本技术的新纪元，为现代加密货币及区块链技术奠定了基础。


    作为一种创新的数字账本技术，区块链的核心在于其能够以去中心化、透明且不可篡改的方式存储和传输数据。在区块链中，数据被分组存储在称为 `blocks` 的结构中，这些区块按时间顺序链接，形成一条持续增长的链条。每个区块都包含一系列交易记录以及前一个区块的加密哈希值，这确保了数据一旦写入区块链，就几乎无法更改或删除，从而维护了数据的完整性和完整历史记录。


    去中心化是区块链的另一个关键特性。与传统数据库或账本系统将数据存储在中心化服务器或数据中心不同，区块链数据分布在整个网络中，网络中的每个节点都维护着一份完整的区块链副本，如图
    1-1 所示。这种分布式数据存储显著降低了单点故障的风险，并增强了系统抵御攻击的能力。


    ![](img/616479_1_En_1_Fig1_HTML.jpg)


    图 1-1


    中心化 vs. 去中心化 vs. 分布式 来源：[`https://berty.tech/blog/decentralized-distributed-centralized`](https://berty.tech/blog/decentralized-distributedcentralized)


    下表概述了每种系统类型在维护、稳定性、可扩展性、开发以及演进和多样性潜力方面的关键特征和权衡。


    表 1-1


    中心化 vs. 去中心化 vs. 分布式对比


    | 系统类型 | 中心化 | 去中心化 | 分布式 |

    | --- | --- | --- | --- |

    | 故障点/维护 | 单点故障，较易维护 | 故障点比中心化多但有限，较难维护 | 无单点故障，最难维护 |

    | 容错性/稳定性 | 如果中心节点失效则极不稳定 | 比中心化稳定，能承受中心节点故障 | 非常稳定，单个故障影响很小 |

    | 可扩展性/最大规模 | 可扩展性低 | 可扩展性中等 | 无限可扩展性 |

    | 易开发性/创建速度 | 创建最快，遵循单一框架 | 比中心化慢，需梳理底层细节 | 最慢，需要复杂的资源共享和通信 |

    | 演进/多样性 | 多样性低，演进缓慢 | 基础设施就位后可快速演进 | 基础设施建立后具有很高的演进潜力 |


    此外，区块链技术的透明性是其标志性特征之一。在公有链中，任何人都可以查看所有交易记录和区块信息，但交易参与者的身份是匿名或假名的，如图 1-2 所示。这种透明性与隐私性的结合，使得区块链成为金融、供应链管理和医疗保健等领域的理想技术选择。


    ![](img/616479_1_En_1_Fig2_HTML.jpg)


    图 1-2


    比特币浏览器来源：[*www.blockchain.com/explorer*](http://www.blockchain.com/explorer)（访问日期：2023
    年 11 月 23 日）


    为确保交易的准确性和网络的安全性，区块链网络通常采用一种称为 `consensus mechanism` 的方法来验证和添加新交易。最著名的共识机制是比特币使用的工作量证明（PoW），网络中的参与者（矿工）必须解决复杂的计算问题来验证交易并创建新区块。


    因此，区块链技术不仅旨在验证交易并增强数字账本的安全性，还旨在缓解加密货币的双重支付和各种欺诈活动等关键问题。区块链 1.0，³ 作为此项技术的初始迭代，主要应用于像比特币这样的加密货币，其目标是解决两个基本问题：


    - **双重支付问题**：它结合使用点对点文件共享和公钥加密技术，防止同一数字货币单位被多次使用。这在一个无需信任的框架内执行，其中交易记录在公开可访问的账本上，并由参与者之间的共识进行确认，从而消除了对中心化权威机构的需求。


    - **拜占庭将军问题**：这指的是在去中心化网络中达成共识的挑战。区块链 1.0 通过工作量证明（PoW）机制解决了这个问题，所有参与者无需可信中介即可就验证过的真相达成一致。这是通过矿工解决加密谜题来验证交易并添加新区块来实现的，从而确保网络就账本状态达成一致。⁴


    这些基础方面强化了区块链抵御潜在漏洞的能力，并构成了其在加密货币之外的各个领域广泛应用的基石。


    区块链 2.0 代表了从最初区块链概念的显著演进，其标志是将智能合约集成到区块链协议中。由以太坊率先推出的智能合约是自动执行的代码，当满足预设条件时运行，使得超越简单加密货币交换的复杂交易成为可能。这一进步促进了去中心化应用程序（DApps）和去中心化自治组织（DAOs）的发展，将区块链的实用性扩展到治理和数字所有权等各个领域，例如以非同质化代币（NFTs）为代表的领域。

    '
- fmt: 'Blockchain 3.0 extends blockchain’s application beyond financial sectors to
    diverse industries, emphasising sustainability, scalability and enhanced security.
    It integrates enterprise-level systems with blockchain, enabling industries like
    healthcare and supply chain management to utilise smart contracts for functions
    like medical services and logistics. Additionally, Blockchain 3.0 supports interoperability
    between different blockchain networks, as seen in `Cosmos` and `Chainlink` ecosystems.
    Technological innovations like proof-of-stake consensus models and Directed Acyclic
    Graph (`DAG`) algorithms in this generation of blockchains, exemplified by platforms
    like `Cardano`, `Solana` and `Avalanche`, address previous limitations by reducing
    energy consumption and significantly increasing transaction processing speeds.[⁵](#616479_1_En_1_Chapter.xhtml#Sec11)


    In summary, blockchain technology offers a novel, more secure and reliable method
    for digital transactions and data storage through its unique decentralised structure,
    immutable data recording, transparency and robust consensus mechanism.


    ### Blockchain vs. Internet


    The Internet revolutionised the way information is disseminated, enabling rapid,
    cost-efficient and seamless exchange of knowledge across the globe. However, it
    falls short in transmitting value due to inherent trust issues and centralisation,
    often requiring intermediaries for validation.


    In contrast, blockchain technology is engineered to transfer value. It does so
    by providing a decentralised platform where transactions are not only transparent
    but also immutable, creating an environment where trust is established through
    cryptographic verification rather than central authorities. Blockchain’s capability
    to transmit value is exemplified by its ability to facilitate the exchange of
    digital assets, execute smart contracts and ensure the authenticity and integrity
    of transactions without centralised oversight. This makes blockchain an ideal
    infrastructure for the digital economy, where value transfer is as critical as
    information exchange.


    ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Information vs. Value Transfer


    Figure [1-3](#616479_1_En_1_Chapter.xhtml#Fig3) outlines the evolution of technology
    from text-paper to digital formats. At the top, ‘Text-paper technology’ serves
    as the starting point. From there, two paths diverge: one leads to ‘Typography’,
    eventually evolving into the ‘Internet’, symbolising the digital upgrade of text
    for information dissemination. The other path heads towards ‘Textual Contracts,
    Signatures, Contract Creation, Payments, Proofs’, which then lead to ‘Blockchain’,
    representing the digitisation of contractual and transactional processes. The
    diagram suggests that while the Internet evolved as the digital successor of typography
    for text, blockchain serves a similar role for transactions and contractual agreements.


    ### Blockchain and AI


    Blockchain and artificial intelligence (`AI`) are forging a strategic alliance
    that not only amplifies their individual strengths but also addresses fundamental
    societal and economic challenges. Blockchain’s architecture, celebrated for its
    security and immutability, establishes a bedrock for `AI` to function in a manner
    that is both transparent and verifiable, paving the path for ‘decentralised AI’
    systems like `SingularityNET`. `AI`, in reciprocation, elevates blockchain’s operational
    efficiency through intelligent optimisation of complex computations. This symbiosis
    further empowers individuals to take control of their data, facilitating personal
    data monetisation while disrupting the data monopoly held by tech behemoths. As
    `AI` algorithms evolve in complexity, the trust and clarity provided by blockchain
    become crucial in validating and understanding `AI`-driven decisions. Although
    still nascent and ripe with undiscovered possibilities, the convergence of blockchain
    and strong `AI` is a testament to their potential in revolutionising both the
    mechanics of productivity and the infrastructure of production relations, ensuring
    that `AI`’s expansive capabilities are harnessed within a framework that upholds
    transparency, accountability and ethical standards​.[⁶](#616479_1_En_1_Chapter.xhtml#Sec11)


    ![](images/616479_1_En_1_Chapter/616479_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Image Generated by the `ChatGPT DALL·E 3` Model Based on the Preceding Text Source:
    [*https://chat.openai.com/?model=gpt-4*](https://chat.openai.com/?model=gpt-4)


    ## 1.2 How Blockchain Works: Hash Functions, Encryption and Digital Signatures


    The working mechanism of blockchain technology relies on two core components:
    hash functions and encryption technologies.'
