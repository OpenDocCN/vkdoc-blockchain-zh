    # 4. The Pillars of Web3: Ethereum’s Wallet, Faucet and Layer 2 Solutions


    ## 4.1 The Gateway to Web3: Crypto Wallets


    Blockchain wallets are not just digital equivalents of physical wallets; they
    are more akin to personal bankers, integrated seamlessly into the fabric of the
    Web3 experience. These wallets are the essential interface for interacting with
    the decentralised web, allowing users to manage their digital identities and assets.
    The type of Ethereum wallets is the same as the Bitcoin’s, which we have introduced
    in Section [2.​3](#616479_1_En_3_Chapter.xhtml#Sec11).


    Within these wallet types, security practices are paramount. Private keys are
    the literal keys to one’s digital vault and must be guarded with utmost diligence.
    Wallet backups through seed phrases and secure storage options are critical. Against
    hacking and theft, measures like two-factor authentication (`2FA`), multi-signature
    requirements and avoiding phishing attacks are necessary defences.


    Ethereum hosts two distinct account types:


    Table 4-1


    Accounts: EOA vs. Contract Account[¹](#616479_1_En_4_Chapter.xhtml#Par095)


    | Feature | EOA | Contract Account |

    | --- | --- | --- |

    | Control | By a private key | By contract code |

    | Transactions | Can initiate transactions | Can only respond to received transactions
    |

    | Creation | Created by users | Created when a contract is deployed |

    | Use Case | Holding, sending/receiving ETH and other crypto-assets, interacting
    with DApps | Smart contract operations |

    | Example | Coinbase Wallet, MetaMask | Coinbase.com |


    - **Externally Owned Accounts (EOAs)**: Controlled by private keys and capable
    of initiating transactions

    - **Contract Accounts**: Governed by their contract code and can execute complex
    functions when transactions are received


    Coinbase operates both as a crypto brokerage and a wallet provider, offering distinct
    services tailored to the nature of the account – whether it’s an Externally Owned
    Account (EOA) or a Contract Account. This differentiation underpins their provision
    of both custodial and non-custodial wallet solutions to meet diverse user needs.[²](#616479_1_En_4_Chapter.xhtml#Sec8)


    ![](images/616479_1_En_4_Chapter/616479_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Coinbase.com (Left) Logo vs. Coinbase Wallet (Right) Logo (Source: [*https://help.coinbase.com/en/wallet/getting-started/what-s-the-difference-between-coinbase-com-and-wallet*](https://help.coinbase.com/en/wallet/getting-started/what-s-the-difference-between-coinbase-com-and-wallet))


    **Coinbase.com As a Crypto Brokerage (Contract Account)**: Utilising `Coinbase.com`
    for buying or selling cryptocurrency engages the platform’s role as a Contract
    Account. In this capacity, all transactions are managed through the platform’s
    smart contracts, not directly by users. This arrangement is typical of custodial
    wallets, where Coinbase retains control over the private keys, securing the assets
    purchased on their exchange. Users must complete a Know Your Customer (`KYC`)
    process, enhancing security and compliance. This setup exemplifies the custodial
    aspect, where a third party manages the security and access to funds.


    **Coinbase Wallet (EOA)**: In contrast, the `Coinbase Wallet` operates as a non-custodial
    solution, typifying an EOA. It allows users to retain direct control over their
    cryptocurrencies by storing the private keys on their own devices. This setup
    demands that users maintain their 12-word recovery phrase securely since the loss
    of this phrase means irreversible loss of access to their funds. The direct control
    afforded by EOAs enables real-time interactions with the blockchain and decentralised
    applications (`DApps`), such as engaging in decentralised exchange (`DEX`) trading,
    lending and liquidity pools.


    Coinbase also offers a hybrid solution in the form of a `DApp` wallet, blending
    both custodial and non-custodial features. In this hybrid model, Coinbase manages
    one part of your private key, while the other resides securely on your device,
    providing a balance between ease of use and control over assets.'
